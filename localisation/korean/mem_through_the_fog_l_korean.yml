l_korean:
 mem_through_the_fog_dig_site:0 "안개 속으로"
 mem_through_the_fog_dig_site_desc:0 "이 [From.Planet.GetPlanetMoon]의 표면은 두꺼운 독성 안개에 가려진 버려진 도시의 부패한 유적들로 덮여 있습니다. 대기 중의 높은 전기 활동으로 인해 궤도에서 이들을 연구하기 어렵지만, 차폐 장비를 사용하면 안전하게 표면을 탐사할 수 있을 것입니다."
 mem_through_the_fog.1.name:0 "조마르 유적"
 mem_through_the_fog.1.desc:0 "§Y[From.Planet.GetName]§! 표면에서의 고고학적 연구는 이 행성의 유적이 스스로를 §SZomarr§!라고 부르는 멸종된 종족에 속한다는 것을 확인합니다.\n\n대부분과는 달리, 그들은 우주 여행에 관심이 없는 듯 보였으며 초공간 네트워크를 발견한 적이 없습니다. 그러나 그들은 고향 세계의 근처를 거의 떠나지 않으면서도 인상적인 기술을 개발했습니다. §Y[Leader.GetName]§!는 그들의 주요 전문 분야로 §Snanotechnologies§!를 언급합니다.\n\n그들은 아마도 소행성이나 혜성과 충돌하여 [From.Planet.GetPlanetMoon]를 거주 불가능하게 만든 다른 거대한 천체에 의해 멸종된 것으로 보입니다. 흥미롭게도, 지정된 매장지 외부에서 발견된 천체는 매우 적으며, 이와 같은 대재앙의 경우 예상되는 것보다 훨씬 적습니다."
 mem_through_the_fog.2.name:0 "멸망의 징조"
 mem_through_the_fog.2.desc:0 "Zomarr는 조작과 혼란을 두려워하여 저기술 하드 카피의 뉴스 출판물을 집착적으로 제작하고 유지해온 것으로 보입니다. 그 저장소 중 일부는 여전히 온전하며, §Y[Leader.GetName]§!는 그들의 문명이 몰락하게 된 사건의 일부를 재구성할 수 있었습니다. \n\n많은 보고서가 "§SPortent of Doom§!"에 관한 것으로, 이는 [From.Planet.GetName]와 충돌할 경로에 있는 거대한 혜성입니다. 이후 Zomarr의 지도자는 멸종 수준의 사건을 대비하기 위해 준비된 비밀 프로젝트의 존재를 밝혔지만, 사건의 정확한 성격은 현재로서는 불분명합니다. 주요 나노기술 전문가들이 이 프로젝트에 기여하기 위해 소집된 것으로 보입니다."
 mem_through_the_fog.3.name:0 "클라우드마인더 프로젝트"
 mem_through_the_fog.3.desc:0 "아카이브에서 복구된 정보에 따르면, §Y[Leader.GetName]§!는 연구원들이 조마르를 멸종에서 구하기 위해 목표로 했던 시설 중 하나를 찾을 수 있었습니다. 코드명 \"§SProject Cloudminder§!\"인 이 시설은 어떤 방식으로든 나나이트 스웜과 관련이 있는 것으로 보이지만, 정확한 목표는 불분명합니다. 이 프로젝트는 충돌 직전에 완료되었으며, 임박한 파멸을 고려할 때 아무것도 백업할 이유가 없었기 때문에 대부분이 버려지고 후세를 위해 저장되지 않았습니다."
 mem_through_the_fog.4.name:0 "조마르는 살아있다!"
 mem_through_the_fog.4.desc:0 "광범위한 연구 끝에, §Y[From.Planet.GetName]§!의 고고학자들은 오랫동안 의심해왔던 사실을 확인했습니다. 조마르(Zomarr)는 그들의 행성을 파괴한 충돌 사건을 생존했지만, 우리가 인식할 수 있는 형태는 아닙니다. \n\n광범위한 센서 보정 후, 공기가 이제 나노입자로 포화 상태라는 것이 분명해졌습니다. 각 나노입자는 조마르의 정신 조각을 포함하고 있습니다. 충돌을 예상하여, 조마르 당국은 시민들이 주입할 수 있는 새로운 유형의 나노 기계 샘플을 배포했습니다. 몇몇은 거부했지만, 대부분은 그들의 뇌가 스캔되고 몸이 나노입자 떼로 분해되어 소비된 조마르 정신을 유지할 수 있는 형태로 변환되었습니다. 이렇게 그들은 그들의 세계의 황폐화를 견뎌냈습니다. \n\n우리가 이 행성에 발을 디딘 이후로, 그들은 의사소통을 시도해왔지만, 전력 요구 사항으로 인해 대부분은 휴면 상태에 있으며, 주어진 시간에 활성화된 것은 극소수입니다. 주요 인력 대부분은 성공적인 대전환을 보장하기 위해 물질적 형태로 남아 있어야 했기 때문에, 이 과정을 복제할 충분한 데이터를 찾기는 어려울 것입니다. 그러나 이러한 존재의 가능성 자체는 매혹적입니다."
 mem_through_the_fog.4.a:0 "EMP 발생장치로 나노봇들을 파괴해라."
 mem_through_the_fog_site:0 "안개 속으로"
 mem_through_the_fog_site_desc:0 "이 [From.Planet.GetPlanetMoon]의 표면은 두꺼운 독성 안개에 가려진 버려진 도시의 부패한 유적들로 덮여 있습니다. 대기 중의 높은 전기 활동으로 인해 궤도에서 이들을 연구하기 어렵지만, 차폐 장비를 사용하면 안전하게 표면을 탐사할 수 있을 것입니다."
