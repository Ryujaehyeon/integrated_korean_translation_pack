l_korean:
 mem_version_check.2.name:0 "안내"
 mem_version_check.2.desc:0 "이 메시지는 More Events Mod가 현재 진행 중인 게임에서 활성화되었거나, 이 게임이 시작된 후 업데이트되었기 때문에 나타납니다.\n\n현재 진행 중인 게임에서 이 모드가 활성화된 경우, 문제는 발생하지 않지만 일부 기능은 새로 시작한 게임에서만 사용할 수 있습니다.\n\nMEM이 이미 활성화된 상태에서 이 게임이 시작된 경우, 이는 업데이트가 있었음을 의미합니다. 반드시 문제를 일으키는 것은 아니지만, 항상 그렇듯이 업데이트는 이전 게임 저장 파일이 손상될 가능성이 있습니다. 문제가 발생하면, 버그로 신고하기 전에 이러한 문제가 새로 시작한 게임에서도 발생하는지 확인해 주시기 바랍니다. 문제는 이전 게임 저장 파일과 새로운 모드 버전 간의 버전 불일치로 인해 발생할 수 있습니다.\n\n이 경고 메시지는 이번 플레이에서 다시 나타나지 않을 것입니다. 저희 모드를 즐기시길 바랍니다!"
