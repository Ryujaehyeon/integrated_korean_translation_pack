l_korean:
 mem_spiritualists_pilgrimage.2.name:0 "거부된 순례자"
 mem_spiritualists_pilgrimage.2.desc:0 "우리의 순례자들이 여러분의 총독으로 인해 §Y[pilgrims_destination.GetName]§!에 있는 성지에 들어갈 수 없게 되었습니다. 그는 알 수 없는 이유로 우리를 거부했습니다. 이는 터무니 없는 행동입니다. 여러분이 우리의 길을 가로막는다면, 우리는 우리의 고귀한 국민들에 대한 이러한 행동을 결코 잊지 않을 것입니다!"
 mem_spiritualists_pilgrimage.2.a:0 "외교적 위험을 무릅쓸수는 없지. 허가해!"
 mem_spiritualists_pilgrimage.2.b:0 "통과시켜. 다만 우리 눈에 잘 보이게 말이지."
 mem_spiritualists_pilgrimage.2.c:0 "총독이 왜 그런 선택을 내렸는지 먼저 알아봐."
 mem_spiritualists_pilgrimage.3.name:0 "순례자의 기쁨"
 mem_spiritualists_pilgrimage.3.desc:0 "§Y[pilgrims_origin.GetSpeciesAdj]§! 순례자들은 우리 식민지 주민들의 환영을 받았으며, 이들의 존재 덕분에 감명을 깊게 받은 주민들의 생산력이 크게 향상되었습니다. §Y[pilgrims_origin.GetSpeciesAdj]§! 정부가 당신의 선택에 감사를 표시했습니다. 두 국가 사이의 관계가 크게 개선된 것으로 보입니다!"
 mem_spiritualists_pilgrimage.3.a:0 "새 손님을 받는건 좋은 일이지!"
 mem_spiritualists_pilgrimage.4.name:0 "성공적인 순례"
 mem_spiritualists_pilgrimage.4.desc:0 "§Y[pilgrims_origin.GetSpeciesAdj]§! 순례자들 때문에 주민들이 처음에 언짢은 표정을 지었지만, 이내 아무 문제를 일으키지 않고 평범한 식민지 생활 안에 녹아들었습니다. 이들 정부는 우리의 순례 허가 명령에 감사함을 표시했으며, 두 국가 사이의 관계 또한 향상되었습니다!"
 mem_spiritualists_pilgrimage.4.a:0 "최선의 결과를 얻었군."
 mem_spiritualists_pilgrimage.5.name:0 "이상한 손님들"
 mem_spiritualists_pilgrimage.5.desc:0 "비록 §Y[pilgrims_origin.GetSpeciesAdj]§! 순례자들이 우리 개척민들에 의해 따뜻하게 맞이받았지만, 그들 사이에는 항상 눈에 띄는 긴장이 있었습니다. 우리 사람들은 손님을 좋아하지만, 때때로 그들이 떠나면 안도감이 들기도 합니다..."
 mem_spiritualists_pilgrimage.5.a:0 "손님은 영원히 머무는 존재는 아니니..."
 mem_spiritualists_pilgrimage.6.name:0 "야만인들"
 mem_spiritualists_pilgrimage.6.desc:0 "그 순례자들은 성스러운 장소를 방문하여 영적 인도를 구하고 있을지도 모르지만, 그들의 종교적 관습은 많은 개척민들의 불쾌감을 샀고, 이로 인해 그들에 대한 공개적인 적대감이 발생하기도 했습니다. 그들은 계획보다 더 빨리 떠났고, 그들의 정부와 우리의 정치적 관계는 그 결과로 악화되었습니다."
 mem_spiritualists_pilgrimage.6.a:0 "이 야만인들이 다시 돌아오지 않기를 바랄 뿐..."
 mem_spiritualists_pilgrimage.7.name:0 "배은망덕한 손님"
 mem_spiritualists_pilgrimage.7.desc:0 "이 순례자들은 §Y[pilgrims_destination.GetName]§!에 발을 디딘 날부터 문제만을 가져왔습니다. 사건이 잇따랐고, 결국 총독은 그들을 행성에서 쫓아내야 했습니다. §Y[pilgrims_origin.GetName]§!와의 관계는 악화되었고, 우리 개척민들은 그들이 처음에 §Y[pilgrims_destination.GetName]§!에 올 수 있었던 것에 화가 나 있습니다."
 mem_spiritualists_pilgrimage.7.a:0 "총독의 뜻이 무엇이였는지 이제 알겠군..."
 mem_spiritualists_pilgrimage.8.name:0 "테러리스트!"
 mem_spiritualists_pilgrimage.8.desc:0 "자신을 순례자라고 부른 이들은 우리 행정 건물을 폭파하고는 사라졌습니다. 아무런 증거가 없기는 하지만, §Y[pilgrims_origin.GetName]§!의 비밀 요원들이었을 겁니다. [pilgrims_origin.GetSpeciesNamePlural]들이 자기들이 하지 않았다고 말하지 않는 것으로 보아 이들이 범인임은 틀림없습니다."
 mem_spiritualists_pilgrimage.8.a:0 "괘씸하고... 비겁한 침략 행위다..!"
 mem_spiritualists_pilgrimage.9.name:0 "테러리스트!"
 mem_spiritualists_pilgrimage.9.desc:0 "자신을 순례자라고 부른 이들은 우리 행정 건물을 폭파하고는 사라졌습니다. 아무런 증거가 없기는 하지만, §Y[pilgrims_origin.GetName]§!의 비밀 요원들이었을 겁니다."
 mem_spiritualists_pilgrimage.9.a:0 "괘씸하고... 비겁한 침략 행위다..!"
 mem_spiritualists_pilgrimage.10.name:0 "잡힌 테러리스트들"
 mem_spiritualists_pilgrimage.10.desc:0 "보안군이 §Y[pilgrims_destination.GetName]§!의 행정구역에서 일어날뻔한 폭발 테러를 막아냈습니다. 자신을 순례자라고 부른 이들은 현행범으로 체포되어 감옥에 갇혔고, 이제는 사형 선고를 받고 죽을 때를 기다릴 뿐입니다. §Y[pilgrims_origin.GetSpeciesAdj]§! 정치 관계자들은 이에 대해 부정하고 있으나 §Y[pilgrims_destination.owner.GetSpeciesAdj]§! 첩보부는 이들이 §Y[pilgrims_origin.GetName]§!의 비밀 요원이라고 추측하고 있습니다."
 mem_spiritualists_pilgrimage.10.a:0 "외계종은 믿을 수 없어..."
 mem_spiritualists_pilgrimage.11.name:0 "도망가는 테러리스트들"
 mem_spiritualists_pilgrimage.11.desc:0 "보안군이 §Y[pilgrims_destination.GetName]§!의 행정구역에서 일어날뻔한 폭발 테러를 막아냈습니다. 자신을 순례자라고 부른 이들은 현행범으로 체포되었지만, 곧 탈출해버렸습니다. 우리 내부에서 누군가 도움을 준 것이 분명합니다. §Y[pilgrims_origin.GetSpeciesAdj]§! 정치 관계자들은 이에 대해 부정하고 있으나 §Y[pilgrims_destination.owner.GetSpeciesAdj]§! 첩보부는 이들이 §Y[pilgrims_origin.GetName]§!의 비밀 요원이라고 추측하고 있습니다."
 mem_spiritualists_pilgrimage.11.a:0 "이 괘씸한 배신자를 당장 찾아내!"
 mem_spiritualists_pilgrimage.12.name:0 "테러리스트와 배신자!"
 mem_spiritualists_pilgrimage.12.desc:0 "우리 보안군은 §Y[pilgrims_destination.GetName]§!의 행정 구역에서 발생한 폭탄 공격을 막지 못했습니다. 수많은 생명이 희생되었고, 그 구역은 폐허가 되었습니다. 모든 증거는 이른바 순례자들이 범인이라는 것을 시사하며, 그들은 사실 §Y[pilgrims_origin.GetName]§!의 비밀 요원일 것입니다. 그들이 지금 어디에 있는지는 놀랍게도 알 수 없지만, 모든 요원이 그들을 감시하고 있는 상황에서 이 일을 성공적으로 수행하기 위해서는 누군가의 도움이 있었던 것이 분명합니다. 우리의 정보 기관은 관련된 모든 인원에 대한 심문을 시작했습니다."
 mem_spiritualists_pilgrimage.12.a:0 "그냥 넘어가지 않겠다!"
 mem_spiritualists_pilgrimage.13.name:0 "밝혀지는 음모"
 mem_spiritualists_pilgrimage.13.desc:0 "주지사는 당신이 성급한 결정을 내리기 전에 그와 먼저 대화할 시간을 가졌다는 사실에 안도하는 것 같습니다. 그는 §Y[pilgrims_origin.GetName]§!의 비밀 요원들이 계획한 임박한 테러 공격에 대한 단서를 알려줍니다. 그들은 자신의 계획을 지지할 사람들을 찾으려 했지만, 다행히도 그들은 잘못된 사람에게 연락했습니다. 그들은 보안 요원의 충성스러운 직원을 그들의 계획에 끌어들이려 했고, 그 직원은 주지사와 연락할 수 있을 때까지 연극을 할 수 있었습니다. 불행히도, 그들은 우리 측 인원 중 몇 명이 이 음모에 연루되어 있는지 알아내지 못했기 때문에 그는 지금까지 자신의 이유에 대해 침묵을 지켰습니다."
 mem_spiritualists_pilgrimage.13.a:0 "보안 담당자들을 전부 교체하고 함정을 파라."
 mem_spiritualists_pilgrimage.13.b:0 "위험을 감수하지 마십시오. 그들에게 접근을 거부하십시오."
 mem_spiritualists_pilgrimage.13.c:0 "편집증적이군. 그냥 순례하게 냅둬라."
 mem_spiritualists_pilgrimage.14.name:0 "미끼를 물음"
 mem_spiritualists_pilgrimage.14.desc:0 "우리 총독 덕분에 보안군이 §Y[pilgrims_destination.GetName]§!의 행정구역에서 일어날뻔한 폭발 테러를 막아냈습니다. 자신을 순례자라고 부른 이들은 현행범으로 체포되어 감옥에 갇혔고, 이제는 사형 선고를 받고 죽을 때를 기다릴 뿐입니다. 당연하겠지만, §Y[pilgrims_origin.GetSpeciesAdj]§! 정치 관계자들은 혐의를 부인하고 있습니다."
 mem_spiritualists_pilgrimage.14.a:0 "총독에게 훈장을 수여하게!"
 mem_spiritualists_pilgrimage.15.name:0 "편집증"
 mem_spiritualists_pilgrimage.15.desc:0 "아마 누군가 미리 경고한 것인지 아무런 테러도 일어나지 않았습니다. 저 \"순례자들\"은 그냥 성지를 방문하고 아무런 문제도 일으키지 않은 채 떠났습니다. 아니면... 편집증적인 총독의 실수였을지도 모릅니다."
 mem_spiritualists_pilgrimage.15.a:0 "대비하는건 나쁘지 않으니까..."
 mem_spiritualists_pilgrimage.16.name:0 "거짓말쟁이"
 mem_spiritualists_pilgrimage.16.desc:0 "완벽한 계획이라고 생각했던 작전은 작전에 너무 집중해버린 한 보안 요원에 의해 공중분해 되었습니다. 순례자 한 명이 다가올 때 보안 요원이 자신의 무기를 빼앗으려 다가온다고 생각하고 격발해 순례자를 사살해버린 것입니다. 더 끔찍한 것은 순례자들이 진짜 순례를 목적으로 방문했다는 것입니다. 총독에게 귀띔을 했던 보안군 관계자는 그저 쓸모없는 거짓말이나 하는 협잡꾼이었습니다."
 mem_spiritualists_pilgrimage.16.a:0 "그럴 줄 누구 알았겠어?"
 mem_spiritualists_pilgrimage.17.name:0 "안전의 대가"
 mem_spiritualists_pilgrimage.17.desc:0 "§Y[pilgrims_origin.GetSpeciesAdj]§! 정치 관계자들이 우리의 결정에 불편해합니다. 하지만 긍정적으로 보자면, 우리 식민지는 안전해진 것이죠... 일단 당장은 안전해진 것입니다..."
 mem_spiritualists_pilgrimage.17.a:0 "안전보다 중요한 것은 없다."
 mem_spiritualists_pilgrimage.18.name:0 "편집증적 총독"
 mem_spiritualists_pilgrimage.18.desc:0 "우리 총독의 걱정은 근거가 없는 것으로 판단되었습니다. §Y[pilgrims_origin.GetSpeciesAdj]§! 순례자들은 우리 식민지 주민들의 환영을 받았으며, 이들의 존재 덕분에 감명을 깊게 받은 주민들의 생산력이 크게 향상되었습니다. §Y[pilgrims_origin.GetSpeciesAdj]§! 정부가 당신의 선택에 감사를 표시했습니다. 두 국가 사이의 관계가 크게 개선된 것으로 보입니다!"
 mem_spiritualists_pilgrimage.18.a:0 "새 손님을 받는건 좋은 일이지!"
 mem_spiritualists_pilgrimage.19.name:0 "편집증적 총독"
 mem_spiritualists_pilgrimage.19.desc:0 "우리 총독의 걱정은 근거가 없는 것으로 판단되었습니다. §Y[pilgrims_origin.GetSpeciesAdj]§! 순례자들 때문에 주민들이 처음에 언짢은 표정을 지었지만, 이내 아무 문제를 일으키지 않고 평범한 식민지 생활 안에 녹아들었습니다. 이들 정부는 우리의 순례 허가 명령에 감사함을 표시했으며, 두 국가 사이의 관계 또한 향상되었습니다!"
 mem_spiritualists_pilgrimage.19.a:0 "최선의 결과를 얻었군!"
 mem_spiritualists_pilgrimage.20.name:0 "편집증적 총독"
 mem_spiritualists_pilgrimage.20.desc:0 "주지사의 두려움은 근거가 없었을지도 모르지만, §Y[pilgrims_origin.GetSpeciesAdj]§! 순례자들이 우리 개척민들에 의해 따뜻하게 맞이받았음에도 불구하고, 순례자들과 우리 국민 사이에는 항상 눈에 띄는 긴장이 있었습니다. 우리 국민이 가끔 손님을 맞이하는 것을 좋아하긴 하지만, 그들이 떠나면 안도감이 듭니다..."
 mem_spiritualists_pilgrimage.20.a:0 "손님은 영원히 머무는 존재는 아니니..."
 mem_spiritualists_pilgrimage.21.name:0 "편집증적 총독"
 mem_spiritualists_pilgrimage.21.desc:0 "그 순례자들은 테러리스트는 아니었지만, 그들의 종교적 관습은 많은 개척민들에게 불쾌감을 주었고, 이로 인해 그들에 대한 공개적인 적대감이 발생하기도 했습니다. 그들은 계획보다 빨리 떠났고, 그들의 정부와의 정치적 관계는 그 결과로 악화되었습니다."
 mem_spiritualists_pilgrimage.21.a:0 "이 야만인들이 다시 돌아오지 않기를 바랄 뿐..."
 mem_spiritualists_pilgrimage.22.name:0 "테러리스트가 아닌 문제아"
 mem_spiritualists_pilgrimage.22.desc:0 "이 순례자들은 테러리스트가 아님에도 불구하고 §Y[pilgrims_destination.GetName]§!에 발을 디딘 날부터 문제만 일으켰습니다. 사건이 잇따랐고, 결국 총독은 그들을 행성에서 쫓아내야 했습니다. 그 결과 §Y[pilgrims_origin.GetName]§!와의 관계는 악화되었고, 우리 개척민들은 그들이 처음에 §Y[pilgrims_destination.GetName]§!에 올 수 있었던 것에 대해 분노하고 있습니다."
 mem_spiritualists_pilgrimage.22.a:0 "더 심한 결과가 발생했을 수도 있어... 아마도..."
 mem_spiritualists_pilgrimage.23.name:0 "총독의 경고"
 mem_spiritualists_pilgrimage.23.desc:0 "우리 총독의 우려에 더 많은 주의를 기울였어야 했습니다. 첫 번째 폭탄이 터졌을 때 우리의 보안 요원들은 완전히 방심하고 있었습니다. 수많은 생명이 희생되었고 행정 구역은 폐허가 되었습니다. 모든 단서는 이른바 순례자들에게로 향하고 있으며, 그들은 사실 §Y[pilgrims_origin.GetName]§!의 비밀 요원일 것입니다.\n\n놀랍지 않게도, 이 "순례자들"은 지금 어디에도 없습니다. 누군가 그들이 탈출하도록 도왔던 것 같으며, 이는 총독의 보안 직원 침투 이야기를 뒷받침합니다."
 mem_spiritualists_pilgrimage.23.a:0 "그의 말을 믿었어야 했는데!"
