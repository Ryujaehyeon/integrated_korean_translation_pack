 pc_pd_cold_gaia_desc:0 "얼어붙은 가이아 행성"
 pc_pd_cold_gaia_adj:0 "이상적이고 얼음 행성인 이곳은 질소-산소 대기와 회복력 있는 생태계를 가지고 있습니다. 다양한 위도의 얼음 행성에서 알려진 모든 고등 생명체에 최적의 조건을 제공합니다."
 mod_pc_pd_cold_gaia_habitability:0 "얼어붙은 가이아 거주 가능성"
 trait_pc_pd_cold_gaia_preference:0 "얼어붙은 가이아 선호"
