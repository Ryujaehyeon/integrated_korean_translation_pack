 pc_pd_cold_gaia_tidally_locked_desc:0 "질소-산소 대기와 회복력 있는 생태계를 가진 온화한 이상적, 조석 고정 세계입니다. 다양한 위도에서 알려진 모든 고등 생명체에 최적의 조건을 제공합니다."
