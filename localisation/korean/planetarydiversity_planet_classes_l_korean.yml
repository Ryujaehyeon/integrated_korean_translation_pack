 trait_pc_pd_gaia_superhabitable_preference_desc:0 "$trait_pc_arctic_preference_desc$"
 pc_pd_nuked_superhabitable:0 "초거주 가능 죽은 행성"
 pc_pd_nuked_superhabitable_desc:0 "질소-산소 대기를 가진 암석형 초거주 가능 세계인 이 행성은 현재 핵 겨울을 겪고 있으며, 대기 중에는 두꺼운 그을음 에어로졸 층이 형성되어 있습니다. 생명체의 흔적은 거의 없으며, 중력은 이에 익숙하지 않은 이들에게는 힘든 도전입니다."
 pc_pd_wet_tidally_locked:0 "습기 있는 조석 고정 세계"
 pc_pd_wet_tidally_locked_desc:0 "습기 있는 암석 세계로, 질소-산소로 이루어진 두꺼운 대기를 가진 이 조석 고정 행성의 온도와 안정적인 수계는 낮과 황혼 지역에서 풍부한 생물 다양성을 가능하게 합니다."
 pc_pd_wet_tidally_locked_adj:0 "조석 고정"
 mod_pc_pd_wet_tidally_locked_habitability:0 "습기 있는 조석 고정 거주 가능성"
