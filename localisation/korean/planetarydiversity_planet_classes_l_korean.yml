 pc_pd_wet_superhabitable:0 "습기 있는 초거주 가능 세계"
 pc_pd_wet_superhabitable_desc:0 "습기 있는 바위로 이루어진 초지구 세계인 이 행성은 밀집한 질소-산소 대기를 가지고 있습니다. 평균 기온은 약 25도 섭씨이며 얕은 해양 분지가 있어 생명이 진화하기에 완벽한 요람입니다. 그러나 중력이 강해 익숙하지 않은 이들에게는 힘든 환경입니다."
