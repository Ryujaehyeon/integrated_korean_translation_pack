 trait_pc_pd_wet_tidally_locked_preference_desc:0 "$trait_pc_arctic_preference_desc$"
 pc_pd_dry_tidally_locked:0 "건조한 조석 고정 세계"
 pc_pd_dry_tidally_locked_desc:0 "조석 고정된 이 행성은 질소-산소 대기를 가진 암석 세계로, 한쪽은 항상 낮이고 다른 쪽은 지속적인 밤입니다. 희미한 거주 가능 지역이 황혼 지역에 존재합니다. 지속적인 햇빛과 바람은 이상적인 식량과 에너지 생산을 가능하게 합니다."
 pc_pd_dry_tidally_locked_adj:0 "조석 고정"
 mod_pc_pd_dry_tidally_locked_habitability:0 "건조 조석 고정 거주 가능성"
 trait_pc_pd_dry_tidally_locked_preference:0 "건조한 조석 고정 선호"
 trait_pc_pd_dry_tidally_locked_preference_desc:0 "$trait_pc_arctic_preference_desc$"
 pc_pd_cold_tidally_locked:0 "차가운 조석 고정 행성"
 pc_pd_cold_tidally_locked_desc:0 "부모 항성에 조석 고정된 이 암석으로 이루어진 얼어붙은 습기 있는 세계는 질소-산소 대기를 가지고 있습니다. 낮 쪽은 햇빛에 의해 지속적으로 폭격당하는 해양으로 녹아 있으며, 밤 쪽은 얼어붙은 빙하로 이루어져 있습니다. 강인한 바람과 강력한 해류가 이 두 개의 뚜렷한 경계에서 만납니다."
 pc_pd_cold_tidally_locked_adj:0 "조석 고정"
