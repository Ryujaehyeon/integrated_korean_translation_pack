 concept_pd_uncommon:0 "비범한 행성"
 concept_pd_uncommons:0 "희귀 행성"
 concept_pd_uncommons_desc:0 "- 일반 행성에서 거주 가능성이 낮음\n- 출현 확률이 낮음\n- 독특한 테라포밍 후보가 있음\n- 특별한 행성 수정자가 있음\n- 기술로 업그레이드되는 건물이 있음\n- 보장된 거주 가능한 세계가 테라포밍 후보로 변경됨"
 pc_pd_superhabitable_tooltip:0 "§Y초거주 가능 세계§!는 ['concept_pd_uncommons']\n- 행성 크기는 §G31-35§! 사이입니다\n- 다른 §Y초거주 가능 세계§!에서의 거주 가능성 보너스\n- 다른 §Y초거주 가능 세계§! 사이에서만 §Y테라포밍§!될 수 있습니다\n- £district£ §Y$district_farming_plural$§!: §G+4§!\n- 인구 성장 속도: §G+10%§!\n- 건물 및 구역 비용: §R+25%§!\n- 거주 가능성: §R-20%§!\n- $rare_building_warning$\n$t$- ['building:building_superhab_lab']\n$t$- ['building:building_superhab_farm']\n$t$- ['building:building_superhab_foundry']"
 pc_pd_tidally_locked_tooltip:0 "§Y조석 고정 세계§!는 ['concept_pd_uncommons']\n- 다른 §Y조석 고정 세계§!에서의 거주 가능성 보너스\n- 다른 §Y조석 고정 세계§! 사이에서만 §Y테라포밍§!될 수 있습니다\n- £district£ §Y$district_generator_plural$§!: §G+4§!\n- 최대 구역: §R-30%§!\n- $rare_building_warning$\n$t$- ['building:building_wet_td_farm']\n$t$- ['building:building_wet_td_grid']\n$t$- ['building:building_wet_td_bio_lab']"
 pc_pd_cave_tooltip:0 "§Y동굴 세계§!는 ['concept_pd_uncommons']\n- 다른 §Y동굴 세계§!에서의 거주 가능성 보너스\n- 다른 §Y동굴 세계§! 사이에서만 §Y테라포밍§!될 수 있습니다\n- £district£ §Y$district_mining_plural$§!: §G+4§!\n- 궤도 폭격 피해: §G-30%§!\n- 암석류 팝 성장 속도: §G+10%§!\n- 생물학적 팝 성장 속도: §R-10%§!\n- 건물 및 구역 비용: §R+10%§!\n- $rare_building_warning$\n$t$- ['building:building_karst_grid']\n$t$- ['building:building_karst_mine']\n$t$- ['building:building_karst_lab']"
 pc_nuked_relic:0 "무덤 유물 행성"
 pc_nuked_relic_desc:0 "이 세계 전역에 걸쳐 도시가 펼쳐져 있었습니다. 지금은 고대의 버려진 폐허만 남아 있으며, 원래의 주민들은 오래전에 떠났습니다. 현재 이곳은 핵 겨울을 겪고 있으며, 대기 중에는 두꺼운 그을린 에어로졸 층이 있습니다. 표면 방사선 수치가 높고, 생명의 흔적은 거의 없습니다."
 pc_pd_dry_gaia:0 "건조한 가이아 행성"
 pc_pd_dry_gaia_desc:0 "이상적이고 건조한 세계로, 질소-산소 대기와 회복력 있는 생태계를 가지고 있습니다. 다양한 위도의 건조 세계에서 알려진 모든 고등 생명체에 최적의 조건을 제공합니다."
 pc_pd_dry_gaia_adj:0 "lush"
