 trait_pc_pd_cold_tidally_locked_preference_desc:0 "$trait_pc_arctic_preference_desc$"
 pc_pd_gaia_tidally_locked:0 "습기 있는 가이아 조석 고정 세계"
 pc_pd_gaia_tidally_locked_desc:0 "질소-산소 대기와 회복력 있는 생태계를 가진 습기 있는 이상적이고 온화한 조석 고정 세계. 다양한 위도에서 알려진 모든 고등 생명체에 최적의 조건입니다."
