 pc_pd_barren_tidally_locked:0 "황량한 조석 고정 행성"
 pc_pd_barren_tidally_locked_desc:0 "조용한, 바위로 이루어진 세계로, 얇거나 존재하지 않는 대기를 가지고 있으며 조석 고정되어 있습니다. 표면은 운석 충돌 크레이터로 덮여 있으며 생명체가 전혀 존재하지 않습니다."
 pc_pd_nuked_tidally_locked:0 "조석 고정된 죽은 행성"
 pc_pd_nuked_tidally_locked_desc:0 "질소-산소 대기를 가진 바위로 된 조석 고정 행성으로, 현재 핵 겨울을 겪고 있으며 대기 중에는 두꺼운 그을음 에어로졸 층이 형성되어 있습니다. 생명의 흔적은 거의 없습니다."
 pc_pd_cold_cave:0 "차가운 동굴 세계"
 pc_pd_cold_cave_desc:0 "질감이 거친 세계로 질소-산소 대기를 가지고 있습니다. 약한 자기권을 가진 이 세계의 표면 대부분은 황량한 바위로 이루어져 있습니다. 표면 아래에는 얼어붙은 수권이 지의류와 이끼를 지탱하는 끝없는 동굴들이 있습니다."
 pc_pd_cold_cave_adj:0 "cavernous"
 mod_pc_pd_cold_cave_habitability:0 "차가운 동굴 거주 가능성"
 trait_pc_pd_cold_cave_preference:0 "차가운 동굴 선호"
 trait_pc_pd_cold_cave_preference_desc:0 "$trait_pc_arctic_preference_desc$"
 pc_pd_dry_cave:0 "건조한 동굴 세계"
 pc_pd_dry_cave_desc:0 "질소-산소 대기를 가진 암석 세계입니다. 약한 자기권으로 인해 이 세계의 표면 대부분은 황량한 암석으로 이루어져 있습니다. 표면 아래에는 끝없이 이어지는 사암 동굴이 약한 수권과 강한 내건조 식물 생명을 지탱하고 있습니다."
 pc_pd_dry_cave_adj:0 "cavernous"
 mod_pc_pd_dry_cave_habitability:0 "건조한 동굴 거주 가능성"
 trait_pc_pd_dry_cave_preference:0 "건조한 동굴 선호"
 trait_pc_pd_dry_cave_preference_desc:0 "$trait_pc_arctic_preference_desc$"
 pc_pd_wet_cave:0 "습기 있는 동굴 세계"
 pc_pd_wet_cave_desc:0 "질산-산소 대기를 가진 바위 행성입니다. 약한 자기권으로 인해 이 세계의 표면 대부분은 황량한 바위로 이루어져 있습니다. 표면 아래에는 지하 강과 바다를 포함한 풍부한 수권을 가진 끝없는 동굴이 숨겨져 있습니다."
 pc_pd_wet_cave_adj:0 "cavernous"
 mod_pc_pd_wet_cave_habitability:0 "습기 있는 동굴 거주 가능성"
 trait_pc_pd_wet_cave_preference:0 "습기 있는 동굴 선호"
 trait_pc_pd_wet_cave_preference_desc:0 "$trait_pc_arctic_preference_desc$"
 pc_pd_gaia_cave:0 "가이아 동굴 세계"
 pc_pd_gaia_cave_desc:0 "이상적이고 동굴 같은 온화한 세계로, 질소-산소 대기와 회복력 있는 생태계를 가지고 있습니다. 약한 자기권을 가진 이 세계의 표면 대부분은 황량한 바위로 이루어져 있지만, 동굴의 다양한 위도에서 알려진 모든 고등 생명체에 최적의 조건을 제공합니다."
 pc_pd_gaia_cave_adj:0 "cavernous"
 mod_pc_pd_gaia_cave_habitability:0 "Habitability"
 trait_pc_pd_gaia_cave_preference:0 "Preference"
 trait_pc_pd_gaia_cave_preference_desc:0 "$trait_pc_arctic_preference_desc$"
 pc_pd_barren_cave:0 "황량한 동굴 세계"
 pc_pd_barren_cave_desc:0 "황량하고 동굴 같은 암석 세계로, 대기가 얇거나 존재하지 않습니다. 표면은 운석 충돌 크레이터로 덮여 있으며, 생명체가 전혀 존재하지 않지만, 표면 아래에는 광범위한 동굴 네트워크가 숨겨져 있습니다."
 pc_pd_nuked_cave:0 "동굴 죽은 행성"
 pc_pd_nuked_cave_desc:0 "질소-산소 대기를 가진 바위 동굴 세계인 이 행성은 현재 핵 겨울을 겪고 있으며, 대기 중에는 두꺼운 그을음 에어로졸 층이 형성되어 있고, 표면과 동굴 네트워크에는 높은 수준의 방사선이 존재합니다. 생명의 흔적은 거의 없습니다."
 pc_carbon:0 "탄소 세계"
 pc_carbon_desc:0 "얇거나 존재하지 않는 대기를 가진 황량하고 바위투성이의 세계입니다. 표면은 운석 충돌 크레이터로 덮여 있으며 생명체가 전혀 존재하지 않습니다. 대부분의 실리콘-산소 화합물 기반 세계와 달리, 이 세계는 탄소-산소 비율이 훨씬 높습니다."
 pc_iron:0 "철의 세계"
 pc_iron_desc:0 "얇거나 존재하지 않는 대기를 가진 황량하고 바위투성이의 세계입니다. 표면은 운석 충돌 분화구로 덮여 있으며 생명체가 전혀 없습니다. 이 행성은 주로 철이 풍부한 핵으로 구성되어 있으며 맨틀은 거의 없거나 전혀 없습니다."
 pc_subglacial:0 "빙하 아래 세계"
 pc_subglacial_desc:0 "영구적으로 얼어붙은 두꺼운 얼음층으로 덮인 암석 세계입니다. 낮은 온도와 얇은 대기 때문에 표면에서 생명체가 존재할 수 없습니다. 단단한 얼음 표면 아래에서는 조수 열이나 지열 활동으로 인해 해양이 형성될 수 있습니다."
 pc_hydrocarbon:0 "탄화수소 세계"
 pc_hydrocarbon_desc:0 "영구적으로 얼어붙은 두꺼운 얼음과 바위 물자로 덮인 암석 세계입니다. 질소, 메탄, 에탄의 구름으로 이루어진 조밀하고 불투명한 대기입니다. 이 생명 없는 세계에서는 액체 탄화수소 호수와 바다가 발견될 수 있습니다."
 pc_hothouse:0 "온실 세계"
 pc_hothouse_desc:0 "온실 효과가 극단적으로 진행되고 있는 대기가 있는 암석 행성. 모든 생명체에 치명적입니다."
 pc_ethane_ocean:0 "에탄 해양 행성"
 pc_ethane_ocean_desc:0 "모든 알려진 고등 생명체에 치명적인 두꺼운 대기를 가진 암석 행성입니다. 이 세계는 액체 탄화수소 에탄 바다로 덮여 있습니다."
 pc_diamond:0 "다이아몬드 세계"
 pc_diamond_desc:0 "황량하고 바위투성이의 세계로, 대기가 얇거나 존재하지 않습니다. 표면은 운석 충돌 크레이터로 덮여 있으며 생명체가 전혀 없습니다. 이 행성은 높은 수준의 탄소와 높은 온도 및 압력으로 인해 대부분이 다이아몬드로 형성되었습니다."
 pc_volcanic_pd:0 "화산 행성"
 pc_volcanic_pd_desc:0 "화산으로 뒤덮인 암석형 행성입니다. 대기는 희박하거나 존재하지 않으며, 내부의 높은 지질 활동이 끊임없는 화산 분출을 일으킵니다. 이 유형의 행성은 유기 생명을 유지할 수 없습니다. 황 기둥은 표면 위 500km까지 솟아오를 수 있습니다."
 pc_chthonian:0 "지하 세계"
 pc_pd_ash:0 "잿더미 행성"
 pc_pd_ash_desc:0 "황빛이 도는 대기와, 깊게 쌓인 화산재 아래에 묻힌 식은 현무암의 광대한 평원을 가진 암석형 행성입니다. 지열 활동이 화산재 사구와 휴면 원뿔을 뚫고 분출하는 곳에는 고립된 용암호와 느린 용암 흐름이 남아 있습니다. 생명체가 있다면 극한미생물뿐입니다."
 pc_pd_ash_adj:0 "재가 내린"
 mod_pc_pd_ash_habitability:0 "화산형 거주적합도"
 trait_pc_pd_ash_preference:0 "화산형 선호"
 trait_pc_pd_ash_preference_desc:0 "$trait_pc_arctic_preference_desc$"
 pc_chthonian_desc:0 "얇거나 존재하지 않는 대기가 있는 황량하고 바위 투성이의 세계입니다. 표면은 운석 충돌 크레이터로 덮여 있으며 생명체가 전혀 없습니다. 이 행성은 한때 거대 가스 행성이었으나, 수소와 헬륨 대기가 제거되어 황량한 금속 핵만 남아 있습니다."
 pc_hot_gas_giant:0 "뜨거운 거대 가스 행성"
 pc_hot_gas_giant_desc:0 "수소와 헬륨으로 주로 구성된 대기를 가진 기체 행성으로, 밀집된 핵을 둘러싸고 있습니다. 이 거대 가스 행성의 온도는 평균보다 훨씬 높아 극단적인 기상 패턴이 발생하며, 이는 에너지와 희귀 가스 수집에 활용될 수 있습니다."
 pc_cold_gas_giant:0 "차가운 거대 가스 행성"
 pc_cold_gas_giant_desc:0 "수소와 헬륨으로 주로 구성된 대기를 가진 기체 행성으로, 밀집된 핵을 둘러싸고 있습니다. 이 거대 가스 행성의 온도는 평균보다 낮아 보다 안정적인 연구 기회를 제공합니다."
 pc_cloudless_gas_giant:0 "구름 없는 거대 가스 행성"
 pc_cloudless_gas_giant_desc:0 "구름이 형성될 수 있는 적절한 화학 물질이 대기 중에 부족하여 전 세계적으로 구름 덮개가 형성되지 않는 대기층을 가진 기체 행성입니다."
 pc_dwarf_gas_giant:0 "가스 난쟁이"
 pc_dwarf_gas_giant_desc:0 "수소와 헬륨으로 주로 구성된 대기를 가진 기체 행성으로, 밀집된 핵을 둘러싸고 있습니다. 두꺼운 수소-헬륨 대기를 가지고 있으며, 깊은 얼음, 암석 또는 액체 상태의 물과 암모니아 바다가 있는 층을 포함하고 있습니다."
 concept_pd_rare:0 "희귀 행성"
 concept_pd_rares:0 "희귀 행성"
 concept_pd_rares_desc:0 "- 거주 가능성이 모체 클래스와 일치합니다.\n- 자연 발생 확률이 낮습니다.\n- 효과가 있는 행성 수정자가 있습니다.\n- 세 가지 가능한 행성 고유 건물이 있습니다.\n- §Y세계 조형사§!로 테라포밍 가능합니다."
