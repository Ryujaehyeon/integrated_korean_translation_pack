 pc_pd_dry_superhabitable:0 "건조 초거주 가능 세계"
 pc_pd_dry_superhabitable_desc:0 "건조하고 바위로 이루어진 초지구 세계인 이 행성은 밀집한 질소-산소 대기를 가지고 있습니다. 먼지로 덮인 지형은 주로 메사와 협곡으로 구성되어 있습니다. 풍부하고 생산적인 관목지대와 얕은 강 유역이 있어 생명이 진화하기에 완벽한 요람입니다. 그러나 중력이 강해 익숙하지 않은 이들에게는 힘든 환경입니다."
 pc_pd_dry_superhabitable_adj:0 "super-terrestrial"
 mod_pc_pd_dry_superhabitable_habitability:0 "건조 초거주 가능성"
 trait_pc_pd_dry_superhabitable_preference:0 "건조 초거주 가능 선호"
 trait_pc_pd_dry_superhabitable_preference_desc:0 "$trait_pc_arctic_preference_desc$"
 pc_pd_barren_superhabitable:0 "불모 초거주 가능 세계"
 pc_pd_barren_superhabitable_desc:0 "얇거나 존재하지 않는 대기를 가진 황량하고 바위투성이의 초지구 세계입니다. 표면은 운석 충돌 분화구로 덮여 있으며 생명체가 완전히 결여되어 있습니다."
 pc_pd_gaia_superhabitable:0 "가이아 초거주 가능 세계"
 pc_pd_gaia_superhabitable_desc:0 "이상적이고 온화한 초지구 세계로, 질소-산소 대기와 회복력 있는 생태계를 가지고 있습니다. 다양한 위도에서 알려진 모든 고등 생명체에 최적의 조건을 제공합니다. 풍부하고 생산적인 관목지대와 얕은 하천 유역이 있어 생명이 진화하기에 완벽한 요람입니다. 그러나 중력이 강해 익숙하지 않은 이들에게는 힘든 환경입니다."
 pc_pd_gaia_superhabitable_adj:0 "super-terrestrial"
 mod_pc_pd_gaia_superhabitable_habitability:0 "가이아 초거주 가능성"
