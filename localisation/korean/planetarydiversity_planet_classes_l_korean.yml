 pc_pd_lichen_desc:0 "질소-산소 대기가 있는 차갑고 바위투성이의 세계입니다. 이 세계는 매우 안정적인 수권을 가지고 있으며 일반적으로 예측 가능한 낮은 온도를 유지하여, 거친 산과 빙하 사이에서 거대한 행성 전역에 걸친 이끼 숲이 자생할 수 있게 합니다. 이 이끼들은 지역의 광물에서 영양분을 흡수합니다."
