l_korean:
 mem_amazed_pops:0 "놀란 POP들"
 mem_the_ancient_signal_category:0 "알 수 없는 신호"
 mem_the_ancient_signal_desc:0 "우리 감지기가 행성의 밀림 지역으로부터 이상한 신호를 포착했습니다. 과학 탐사대를 보내서 이 수치들을 확인해 보는 것이 좋을 것 같습니다."
 mem_the_ancient_signal.1.name:0 "신기한 생물?"
 mem_the_ancient_signal.1.desc:0 "우리는 §Y[fauna_planet.GetName]§!의 표면이 매우 밀집한 정글로 덮여 있는 것을 발견했습니다. 이곳에 서식하는 다양한 종류의 동물들이 어떻게든 꽤 강인한 EM 신호를 방출하고 있습니다. 우리는 이 이상한 현상에 대해 더 알아보기 위해 궤도에 연구 기지를 설립할 수 있습니다."
 mem_the_ancient_signal.2.name:0 "진전 없음"
 mem_the_ancient_signal.2.desc:0 "과학자들은 행성 표면에서 별달리 흥미로울 만한 점을 찾지 못했습니다. 우리를 들뜨게 했던 신호는 감지기의 오작동으로 인한 것이었던 것 같습니다."
 mem_the_ancient_signal.3.name:0 "무슨 일이 일어나고 있는 거지?"
 mem_the_ancient_signal.3.desc:0 "지난 몇 달 동안 과학 담당관 §Y[Root.leader.GetName]§!는 §Y[fauna_planet.GetName]§!에서의 임무에 대해 계속 떠들어대며 우리가 돌아가야 한다고 말했습니다. 지난 며칠 동안 그들의 상태는 악화되었고, 누군가 그 행성을 언급할 때마다 광기로 변해버렸습니다. 그들은 또한 모두와 모든 것에 대해 편집증적으로 변했습니다. 정말 걱정스러운 신호입니다."
 mem_the_ancient_signal.3.a:0 "우리는 그곳에 돌아가서 이렇게 된 원인이 무엇인지 파악해야 한다."
 MEM_THE_ANCIENT_SIGNAL_PROJECT:0 "다시 §Y[fauna_planet.GetName]§!(으)로"
 MEM_THE_ANCIENT_SIGNAL_PROJECT_DESC:0 "우리는 그곳에 돌아가서 이렇게 된 원인이 무엇인지 파악해야 합니다."
 mem_the_ancient_signal.4.name:0 "외계인의 유적?"
 mem_the_ancient_signal.4.desc_default:0 "조밀한 정글 아래, 거대한 고대 도시가 발견되었습니다. 이 도시는 수십만 년 전 이 행성을 지배했던 외계 종족이 한때 거주했던 곳으로 보입니다. 이 도시는 그들의 문명에서 남아 있는 전부인 것 같습니다. 폐허의 중앙에는 39개의 독특한 기호가 새겨진 미지의 물자로 만들어진 직립 링이 서 있습니다 - 그 중 하나는 우리 제국의 기호입니다. 이것은 무엇을 의미할까요?"
 mem_the_ancient_signal.4.desc_materialist:0 "조밀한 정글 아래, 거대한 고대 도시가 발견되었습니다. 이 도시는 수십만 년 전 이 행성을 지배했던 외계 종족이 한때 거주했던 곳으로 보입니다. 이 도시는 그들의 문명에서 남은 전부인 것 같습니다. 폐허의 중앙에는 39개의 독특한 기호가 새겨진 미지의 물자로 만들어진 수직 링이 서 있습니다 - 그 중 하나는 우리의 제국을 나타내는 기호입니다. 이것은 무엇을 의미할까요?"
 mem_the_ancient_signal.4.desc_xenophobe:0 "조밀한 정글 아래, 거대한 고대 도시가 발견되었습니다. 분명히 이 도시는 수십만 년 전 이 행성을 지배했던 외계 종족이 한때 거주했던 곳입니다. 이 도시는 그들의 문명과 문화의 유일한 잔재로 보입니다."
 mem_the_ancient_signal.4.a:0 "위대한 발견이군!"
 mem_the_ancient_signal.4.b:0 "이 훌륭한 구조물에서 많은 것을 배울 수 있겠어."
 mem_the_ancient_signal.4.c:0 "더러운 외계종 놈들, 이들의 문화를 말살시켜야 한다."
 mem_the_ancient_signal.4.a.tooltip:0 "너무 대단한 발견이라 무엇을 말해야 할 지도 모르겠습니다..."
 mem_the_ancient_signal.4.b.tooltip:0 "놀라운 발견입니다! 인구는 이러한 발견에 매우 기뻐할 것입니다! 인구 행복도가 365일 동안 10% 증가합니다."
 mem_the_ancient_signal.4.c.tooltip:0 "우리 문화를 더럽힐 수도 있는 것들입니다. 적당한 가격을 매겨서 처리합니다."
