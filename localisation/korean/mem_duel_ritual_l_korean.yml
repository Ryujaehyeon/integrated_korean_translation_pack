l_korean:
 mem_duel_ritual.4.name:0 "불안한 원주민"
 mem_duel_ritual.4.desc:0 "[This.GetName]의 사람들 대부분은 새로운 삶의 운명을 받아들이게 되었지만, 특히 군국주의 파벌은 독립을 잃으면서 불안을 일으키고 있습니다. 원주민들이 우리 당국의 명령을 따르기를 거부하거나 심지어 우리 점령군을 노골적으로 거부하는 사건이 이미 여러 번 있었습니다."
 mem_duel_ritual.4.a:0 "단지 적응 과정일 뿐이야."
 mem_duel_ritual.4.b:0 "그들은 선택의 여지가 있다는 오해를 가지고 있는 것 같군."
 mem_duel_ritual.4.tooltip:0 "§Y[This.GetName]§!의 모든 원주민 POP들은 §Y외계종에게 점령당함§! 변동치를 얻을 것입니다. 5년 동안 그들의 행복도는 10% 감소합니다."
 mem_duel_ritual.5.name:0 "긴장관계"
 mem_duel_ritual.5.desc:0 "§Y[This.GetName]§! 군국주의 파벌의 대표는 계속되는 긴장에 대해 가능한 해결책을 제시하고 있습니다."
 mem_duel_ritual.5.a:0 "들려주게"
 mem_duel_ritual.5.b:0 "하등한 것들과의 협상은 없다."
 mem_duel_ritual.5.b.tooltip:0 "§Y[This.GetName]§!의 모든 원주민 POP들에게 적용되던 §Y외계종에게 점령당함§! 변동치가 강화됩니다. 행복도가 5년 동안 20% 감소합니다."
 mem_suppressed_primitives_01:0 "외계종에게 점령당함"
 mem_suppressed_primitives_02:0 "외계종에게 점령당함"
 mem_impressed_primitives:0 "인상적인 결투"
 mem_proud_masterrace:0 "자랑스러운 힘"
 mem_humiliated_masterrace:0 "모욕적인 패배"
 mem_duel_ritual.6.name:0 "결투 의식"
 mem_duel_ritual.6.desc:0 "대표가 설명합니다: \"§Y[This.GetName]§!의 사람들은 이러한 사회적 문제를 명예 결투의 방식으로 해결하는 오랜 전통을 가지고 있습니다. 우리 두 민족의 대표들이 원시적인 무기만을 가지고 전투에 임할 것입니다. 이러한 결투는 대부분 상징적이지만, 이 상징성은 우리 민족에게 매우 중요합니다.\n\n이 제안을 수락하신다면, 의식이 끝날 때까지 모든 적대 행위는 즉시 중단될 것입니다. 어떻게 생각하십니까?"
 mem_duel_ritual.6.a:0 "제안에 합의하도록 하지. [mem_duel_ritual_champion.GetName] 장군이 우리의 대표로 참여할 것이다."
 mem_duel_ritual.6.a.tooltip:0 "장군 §Y[mem_duel_ritual_champion.GetName]§!은 우리 종족의 대표로 자원했습니다"
 mem_duel_ritual.6.a.response:0 "\"당신들의 대표는 앞으로 한 달 안에 결투를 시작할 것입니다.\"\n\n 두 전사 모두 준비 시간이 필요합니다. 결투는 원시 무기로 진행되기 때문에 치명적 사고는 피할 수 있겠지만 우발적 사고가 발생할 수는 있습니다."
 mem_duel_ritual.6.b:0 "제안에 동의한다. 우리 특수 부대원이 우리 대표로 참여할 것이다."
 mem_duel_ritual.6.b.tooltip:0 "특수 부대원 중 한 명이 우리 종족의 대표로 자원할 것입니다."
 mem_duel_ritual.6.c:0 "이 의식은 미개하군."
 mem_duel_ritual.6.c.tooltip:0 "당신이 그들의 관습을 존중하지 않기로 한 결과로, §Y[This.GetName]§!의 모든 원시 팝은 §YForeign Occupation§! 수정자의 강화된 버전을 받게 되어, 5년 동안 행복도가 20% 감소합니다."
 mem_duel_ritual.6.c.response:0 "\"우리의 전통을 완전히 무시하다니! 우리 종족들은 당신들을 절대로 받아들이지 않을 것입니다!\"\n\n원주민의 대표는 매우 화가 난 것으로 보입니다."
 mem_duel_ritual.7.name:0 "결투 의식"
 mem_duel_ritual.7.desc_01:0 "날이 왔습니다. 짖어대는 군중 앞에서, 우리 제국의 우주 전역에서 이 역사적인 사건의 생중계를 지켜보는 열렬한 관중과 함께, 두 상대가 고대 경기장에 들어섭니다. 이곳의 모래는 수세기 동안 많은 [mem_duel_ritual_species.GetSpeciesName]의 피를 흡수해왔습니다. 우리 종족도 그곳에 얼룩을 남길지는 아직 두고 봐야 합니다.\n\n[mem_duel_ritual_champion.GetHisHer] 현재의 지휘관 위치에 앞서, 장군 [mem_duel_ritual_champion.GetName]은 우리 특수부대의 일원이었으며, 300건 이상의 확인된 적을 처치한 경력이 있습니다. 게릴라 전쟁의 전문가였던 [mem_duel_ritual_champion.GetSheHe] [mem_duel_ritual_champion.GetIsAre] 근접 전투에 익숙합니다. 시간이 다가오면서, 가족들 사이에 서둘러 나누는 말들이 오가고, 전문가들은 마지막 내기를 하느라 분주합니다. 전투자들이 앞으로 나아가 경례를 할 때, 정적이 감돌기 시작합니다."
 mem_duel_ritual.7.desc_02:0 "날이 왔습니다. 고함치는 군중 앞에서, 우리 제국의 우주를 가로지르는 이 역사적인 사건의 생중계를 지켜보는 열렬한 관중과 함께, 두 상대가 고대 경기장에 들어섭니다. 이곳의 모래는 수세기 동안 많은 [mem_duel_ritual_species.GetSpeciesName]의 피를 흡수해왔습니다. 우리 종족이 그곳에 얼룩을 남길지는 아직 두고 봐야 할 일입니다.\n\n현재 [mem_duel_ritual_champion.GetHisHer] 지휘관 자리에서, [mem_duel_ritual_champion.GetName] 장군은 우리 특수부대의 일원으로 300건 이상의 확인된 적을 처치한 경력을 가지고 있습니다. 게릴라 전쟁의 전문가였던 [mem_duel_ritual_champion.GetSheHe]는 [mem_duel_ritual_champion.GetIsAre] 근접 전투에 익숙합니다. 시간이 다가오면서 가족 간에 급히 나누는 말, 아마도 마지막일, 이 오고 가고, 전문가들은 마지막 내기를 하느라 분주합니다. 전투자들이 앞으로 나아가 경의를 표할 때, 정적이 감돌기 시작합니다."
 mem_duel_ritual.7.desc_03:0 "그날이 왔습니다. 짖어대는 군중 앞에서, 우리 제국의 우주 전역에서 이 역사적인 사건의 생중계를 지켜보는 열렬한 관중과 함께, 두 상대가 고대 경기장에 들어섭니다. 이곳의 모래는 시대를 초월한 많은 [mem_duel_ritual_species.GetSpeciesName]의 수액을 흡수해왔습니다. 우리 종족이 그곳에 얼룩을 남길지는 아직 두고 봐야 할 일입니다.\n\n[mem_duel_ritual_champion.GetHisHer] 현재의 지휘관 자리 이전에, 장군 [mem_duel_ritual_champion.GetName]은 우리 특수부대의 일원이었으며, 300건 이상의 확정된 적을 처치한 경력이 있습니다. 게릴라 전쟁의 전문가였던 [mem_duel_ritual_champion.GetSheHe] [mem_duel_ritual_champion.GetIsAre] 근접 전투에 익숙하지 않습니다. 시간이 다가오면서, 가족들 사이에 서두르는 말들, 아마도 마지막일,이 오가고, 전문가들은 마지막 내기를 하느라 분주합니다. 전투자들이 앞으로 나아가고 경례를 할 때, 정적이 감돌기 시작합니다."
 mem_duel_ritual.7.a:0 "이제 시작하도록"
 mem_duel_ritual.8.name:0 "이미 결정된 승리"
 mem_duel_ritual.8.desc:0 "[mem_duel_ritual_champion.GetName] 장군은 승리했습니다! 이 전투는 첫 타격에서부터 거의 결정되었습니다. §Y[mem_duel_ritual_planet.GetName]§!들은 종족에 대한 우월에 대한 명확한 표시를 받아들였고 우리 사회를 받아들였습니다. 미래의 문제는 없을 것입니다."
 mem_duel_ritual.8.a:0 "당연한 결과지"
 mem_duel_ritual.8.a.tooltip:0 "§Y외계종에게 점령당함§!을 제거하고 §Y[mem_duel_ritual_planet.GetName]§!의 원주민들에게 그들의 행복도를 증가시키는 §Y인상적인 결투§! 변동치를 적용합니다. 당신의 주종족은 §Y자랑스러운 힘§!을 얻습니다. 이 변동치는 5년간 행복도를 증가합니다."
 mem_duel_ritual.9.name:0 "무승부라고??"
 mem_duel_ritual.9.desc:0 "전투원이 서로 접근하자, 장군 [mem_duel_ritual_champion.GetName]와 [mem_duel_ritual_champion.GetHisHer]의 상대가 자신의 팔다리에 걸려 넘어져 바닥의 돌에 머리를 부딪혀 의식을 잃었습니다. 밝은 면으로는, 이 모든 문제를 일으킨 군사 운동이 방금 일어난 일을 이해하지 못해 완전히 소멸한 것 같습니다. 그러나 나머지 은하계는 충분히 이해하고 있으며, 그들의 조롱 섞인 웃음소리가 우리의 귀에 메아리칩니다. 장군의 자존심은 결코 회복되지 않을 것이며, 그럴 만한 이유가 있습니다."
 mem_duel_ritual.9.a:0 "은하의 웃음거리가 되었군."
 mem_duel_ritual.9.a.tooltip:0 "§Y외계종에게 점령당함§!을 제거하고 §Y[mem_duel_ritual_planet.GetName]§!의 원주민들에게 행복도를 증가하는 §Y인상적인 결투§! 변동치를 적용합니다. 당신의 주종족은 §Y모욕적인 패배§!를 얻습니다. 이 변동치는 5년간 행복도를 감소합니다."
 mem_duel_ritual.10.name:0 "결투 의식"
 mem_duel_ritual.10.desc_01:0 "그날이 왔습니다. 짖어대는 군중 앞에서, 우리 제국의 우주 전역에서 이 역사적인 사건의 생중계를 지켜보는 열렬한 관중과 함께, 두 상대가 고대 경기장에 들어섭니다. 이곳의 모래는 시대를 초월해 많은 [mem_duel_ritual_species.GetSpeciesName]의 피를 흡수해왔습니다. 우리 종족이 그곳에 얼룩을 남길지는 아직 미지수입니다.\n\n시간이 다가오면서, 가족 간에 급히 주고받는 말들, 아마도 마지막일지도 모르는 말들이 오갑니다. 전문가들은 마지막 내기를 하느라 분주합니다. 전투자들이 앞으로 나아가고 경의를 표하자, 조용해지는 분위기가 감돌기 시작합니다."
 mem_duel_ritual.10.desc_02:0 "날이 왔습니다. 짖어대는 군중 앞에서, 우리 제국의 우주 전역에서 이 역사적인 사건의 생중계를 지켜보는 열렬한 관중과 함께, 두 상대가 고대 경기장에 들어섭니다. 이곳의 모래는 세월을 거치며 많은 [mem_duel_ritual_species.GetSpeciesName]의 이코르를 흡수해왔습니다. 우리의 종족도 그곳에 얼룩을 남길지는 아직 두고 봐야 할 일입니다.\n\n시간이 다가오면서, 가족들 사이에 서두르는 말들이 오가고, 아나운서들은 마지막 내기를 하느라 분주합니다. 전투자들이 앞으로 나아가 경례를 할 때, 정적이 감돌기 시작합니다."
 mem_duel_ritual.10.desc_03:0 "그날이 왔습니다. 짖어대는 군중 앞에서, 우리 제국의 우주 전역에서 이 역사적인 사건을 생중계로 지켜보는 열렬한 관중과 함께, 두 상대가 고대 경기장에 들어섭니다. 이곳의 모래는 시대를 초월하여 많은 [mem_duel_ritual_species.GetSpeciesName]의 수액을 흡수해왔습니다. 우리 종족이 그곳에 얼룩을 남길지는 아직 두고 봐야 할 일입니다.\n\n시간이 다가오면서, 가족들 간에 서두르는 말들이 오고 가고, 아나운서들은 마지막 내기를 하느라 분주합니다. 전투자들이 앞으로 나아가 경의를 표하자, 정적이 감돌기 시작합니다."
 mem_duel_ritual.10.a:0 "이제 시작하지."
 mem_duel_ritual.11.name:0 "이미 결정된 승리"
 mem_duel_ritual.11.desc:0 "우리 병사가 승리했습니다! 격렬한 전투 후에 [mem_duel_ritual_species.GetSpeciesName] 대표는 패배를 인정했습니다. 가벼운 상처를 입었지만 생명을 위협할 정도는 되지 못했습니다. 그들이 원하는 결과는 아니지만, [mem_duel_ritual_species.GetSpeciesName]의 강경파들조차 이 결과를 받아들이는 것으로 보입니다."
 mem_duel_ritual.11.a:0 "당연한 결과지."
 mem_duel_ritual.11.a.tooltip:0 "§Y외계종에게 점령당함§!을 제거하고 §Y[mem_duel_ritual_planet.GetName]§!의 원주민들에게 행복도를 증가하는 §Y인상적인 결투§! 변동치를 적용합니다. 당신의 주종족은 §Y자랑스러운 힘§!을 얻습니다. 이 변동치는 5년간 행복도를 증가합니다."
 mem_duel_ritual.12.name:0 "아까운 패배"
 mem_duel_ritual.12.desc:0 "[mem_duel_ritual_species.GetSpeciesName] 챔피언이 승리했습니다! 긴장된 싸움 끝에 우리의 군인이 패배를 인정했습니다. 양측 모두 경미한 부상을 입었지만 생명에 지장을 주는 것은 아닙니다. 비록 우리가 바랐던 결과는 아니지만, [mem_duel_ritual_species.GetSpeciesName] 군사 파벌의 가장 극단적인 요소들조차도 명예가 만족스러운 것 같습니다. 그들의 애국심은 오히려 더욱 강해졌습니다."
 mem_duel_ritual.12.a:0 "만족스럽지 못한 결과로군..."
 mem_duel_ritual.12.a.tooltip:0 "§Y외계종에게 점령당함§!을 제거하고 §Y[mem_duel_ritual_planet.GetName]§!의 원주민들에게 행복도를 증가하는 §Y인상적인 결투§! 변동치를 적용합니다. 당신의 주종족은 §Y모욕적인 패배§!을 얻습니다. 이 변동치는 5년간 행복도를 감소합니다."
 mem_duel_ritual.13.name:0 "비극적인 무승부"
 mem_duel_ritual.13.desc:0 "격렬한 전투에서, 서로의 신체 구조에 익숙하지 않은 두 대표는 서로에게 치명적인 상처를 입혔습니다. 땅에 쓰러지기 전 서로의 경쟁자에게 경의를 표하는 영상이 제국 전역에 목격되었습니다. [mem_duel_ritual_planet.GetName]의 사람들은 치명상을 입은 두 전사의 이 상호 존중의 표시를 큰 존경심을 가지고 보는 것 같습니다."
 mem_duel_ritual.13.a:0 "비극적인 결과로군..."
 mem_duel_ritual.13.a.tooltip:0 "§Y외계종에게 점령당함§!을 제거하고 §Y[mem_duel_ritual_planet.GetName]§!의 원주민들에게 행복도를 증가하는 §Y인상적인 결투§! 변동치를 적용합니다."
