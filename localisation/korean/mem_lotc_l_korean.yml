l_korean:
 mem_lotc_first_chain_title:0 "카르차로리온"
 mem_lotc_first_chain_desc:0 "오랜 옛날에 카르차로리온이라 불린 종족은 우리 조상들을 강제로 이주시키기 위한 프로젝트를 준비했습니다. 그들이 남긴 좌표들을 따라가면 단서를 더 발견할 수 있을지도 모릅니다."
 mem_lotc_clues:0 "조사 완료"
 MEM_LOTC_FIRST:0 "수중 시설"
 MEM_LOTC_FIRST_DESC:0 "이 좌표들을 보아하니 외딴 행성의 바닷속에 시설이 하나 숨겨져 있는 듯합니다."
 mem_lotc_poi.2:0 "집결지"
 mem_lotc_poi.2.desc:0 "이 좌표는 카르차로리온들의 집결지로 보입니다. 카르차로리온들이 여전히 존재한다면 그곳에 있을 것입니다."
 MEM_LOTC_THIRD:0 "중심지"
 MEM_LOTC_THIRD_DESC:0 "이 좌표는 카르카로리온이 운영하는 상업 또는 레크리에이션 허브와 관련된 것으로 추정됩니다."
 MEM_LOTC_FOURTH:0 "기념관"
 MEM_LOTC_FOURTH_DESC:0 "이 좌표는 어떤 종류의 기념물이나 박물관일 수 있는 고립된 복합체로 이어져야 합니다."
 MEM_LOTC_BOARDING_CRUISER:0 "순앙함에 승선하다."
 MEM_LOTC_BOARDING_CRUISER_DESC:0 "카르차로리온 순양함이 무력화되었으니 우린 이제 승선할 수 있습니다."
 mem_lotc_poi.5:0 "카르사르 성계"
 mem_lotc_poi.5.desc:0 "이는 카르차로리온의 고향 행성의 위치일 가능성이 큽니다."
 mem_lotc_second_chain_title:0 "카르사르 성계"
 mem_lotc_second_chain_desc:0 "우리는 카르카로리온의 고향 항성계를 발견했습니다. 이곳에서는 카르카로리온의 활동 흔적이 없지만, 이 항성계의 행성과 위성에서 그 흔적을 찾아야 합니다."
 mem_lotc_surveyed:0 "탐사된 천체"
 MEM_LOTC_I:0 "그윌리우르 조사"
 MEM_LOTC_I_DESC:0 "비록 이 행성에 우리가 아는 생명을 유지할 능력이 없지만, 카르차로리안의 기록들에 여러 번 등장합니다. 자세히 조사해볼 가치가 있습니다."
 MEM_LOTC_IA:0 "크라우 조사"
 MEM_LOTC_IA_DESC:0 "이 용융된 달은 카르카로리온의 주요 산업 중심지로 알려져 있습니다. 우리는 이를 조사할 필요가 있습니다."
 MEM_LOTC_II:0 "에일위드 조사"
 MEM_LOTC_II_DESC:0 "이 행성이 카르차로리온의 고향 행성일 가능성이 가장 큽니다."
 MEM_LOTC_IIA:0 "콰아르 조사"
 MEM_LOTC_IIA_DESC:0 "우리가 그들의 기록에서 얻은 정보에 따르면, 추정되는 카르카로리온 본향의 이 자연 위성은 그들에게 매우 중요한 존재였던 것으로 보입니다."
 MEM_LOTC_III:0 "오파누 조사"
 MEM_LOTC_III_DESC:0 "이 행성은 카르차로리온의 고향 행성의 두 번째 후보입니다. 우리의 탐사와 연관성이 큽니다."
 MEM_LOTC_IIIA:0 "모르스윌 조사"
 MEM_LOTC_IIIA_DESC:0 "이 작은 위성은 카르차로리온의 기록에서 몇 번 등장했습니다. 흥미로운 것을 발견할 수 있을지도 모릅니다."
 MEM_LOTC_AS:0 "파르크나드 조사"
 MEM_LOTC_AS_DESC:0 "이 거대한 소행성은 카르차로리온의 기록 보관소에 여러 번 등장했습니다. 아마 고리에서 벌어지는 모든 활동의 중심지였을 것입니다."
 MEM_LOTC_IVA:0 "마르크호그 조사"
 MEM_LOTC_IVA_DESC:0 "카르차로리온의 기록에 수차례나 등장한 것을 보니 이 위성은 상당히 중요했던 것으로 보입니다."
 MEM_LOTC_IVB:0 "카이어르 조사"
 MEM_LOTC_IVB_DESC:0 "이 달은 카르카로리온 기록에서 불리한 설명을 가지고 있습니다."
 MEM_LOTC_V:0 "엔겐필 조사"
 MEM_LOTC_V_DESC:0 "이 거대 가스 행성은 시스템의 외곽에 위치해 있으며, 많은 위성과 고리 시스템을 제공합니다. 만약 카르카로리온이 숨기고 싶은 것이 있다면, 그곳에 있을 가능성이 높습니다."
 MEM_LOTC_VA:0 "돌레누 조사"
 MEM_LOTC_VA_DESC:0 "이 위성은 카르차로리온 기록 보관소에 한 번 언급되어 자세히 살펴볼 가치가 있습니다."
 MEM_LOTC_VB:0 "엘리드 조사"
 MEM_LOTC_VB_DESC:0 "이 위성은 카르차로리온 기록 보관소에서 불법 활동의 주요 연결점으로 설명되었습니다."
 MEM_LOTC_VI:0 "퓌리아우 조사"
 MEM_LOTC_VI_DESC:0 "이 성계의 가장 외곽에 있는 행성은 카르차로리온 기록 보관소에서 여러 번 언급되었습니다."
 mem_lotc_poi.6:0 "우니게즈 성계"
 mem_lotc_poi.6.desc:0 "이곳은 아마도 카르차로리온 식민지의 위치일 것입니다."
 mem_lotc_third_chain_title:0 "카르차로리온의 운명"
 mem_lotc_third_chain_desc:0 "우리는 카르차로리온의 흔적이 남아있을지도 모르는 성계를 찾기 위해 충분한 자료를 수집했습니다."
 MEM_LOTC_FINAL:0 "접촉 수립"
 MEM_LOTC_FINAL_DESC:0 "트리스우흐 내에서 발생하는 희미한 신호가 카르차로리온에 연결되었을 가능성이 있습니다."
 mem_lotc.1.name:0 "밀거래 기업"
 mem_lotc.1.desc:0 "복잡한 구조를 광범위하게 탐사한 결과, 우리의 과학 팀은 놀라운 발견을 하였습니다. 데이터 코어는 대부분 삭제되었거나 침식된 것으로 보이지만, 이 복합체가 Carcharorion이라는 이름의 우리에게 낯선 문명에 속했음을 확인하였습니다. 그들은 수천 년 전 이 은하의 이 구역에서 활동했던 것으로 보입니다. \n\n그러나 다른 한 가지는 훨씬 더 이상합니다. 하층은 우리 종의 시체가 담긴 많은 동결 포드로 밀집해 있습니다. 그들 중 많은 이들은 여전히 고급 수갑을 차고 있거나 신경계에 조잡한 이식물이 박혀 있습니다. 이 Carcharorion이 우리의 원시 조상 중 일부를 납치하여 실험에 가담시킨 후, 이유는 알 수 없지만 동결 포드의 전원을 차단하여 질식시켜 죽인 것으로 보입니다. \n\n또한 우리는 복합체의 벽과 내부 장비에서 방사능 수치가 상승한 것을 감지하였습니다. 전원 코어는 과거에 고의로 파괴되었거나 누수가 발생한 것으로 보이지만, 확실하지는 않습니다. 데이터 코어에서 추출된 잔여 데이터에는 여러 세트의 좌표도 포함되어 있습니다."
 mem_lotc.1a:0 "이곳에서 무슨 일이 일어난거지?"
 mem_lotc.2.name:0 "수중 시설"
 mem_lotc.2.desc:0 "물속에 잠겨 있는 우리 과학 팀은 자급자족 생태계의 유적을 발견했습니다. 이 생태계는 전적으로 우주선 부품으로 만들어진 것으로 보입니다. [Leader.GetName]는 수백 명의 개인이 여기에서 궤도 폭격을 맞기 전까지 살았던 것으로 추정합니다. 대부분의 장비는 염수에 의해 손상되었지만, 우리 과학 팀은 유용할 것으로 예상되는 단편적인 항법 데이터를 회수하는 데 성공했습니다. 이상하게도, 복합체 자체에 저장된 탄약과 현장에서 회수된 온전한 발사체는 유사한 디자인을 사용하고 있습니다."
 mem_lotc.2a:0 "내전이 벌어졌나?"
 mem_lotc.3.name:0 "[From.GetName] 성계"
 mem_lotc.3.desc:0 "거대 가스 행성 주위를 떠도는 우주선 하나를 감지했습니다. 상태가 좋지 않은 것처럼 보이지만 분명히 여전히 작동하고 있습니다. 우리는 조심스럽게 접근해야 합니다."
 mem_lotc.4.name:0 "중심지"
 mem_lotc.4.desc:0 "여러 개의 카르카로리온 선박들이 서로 용접되어 [event_target:mem_lotc_third_planet.GetName] 주위를 안정적인 궤도로 돌고 있는 것 같습니다. 우리의 과학 팀이 내부로 들어갔을 때, 그들은 부패와 방치된 것 외에는 아무것도 발견하지 못했습니다. 대부분의 생명 유지 장치와 기타 필수 시스템은 분해되었지만, 팀은 그들의 우주선 시스템으로 잠시 가동할 수 있었던 고립된 홀로스위트를 발견했습니다. 그들이 홀로스위트를 가동했을 때, 그들은 낯선 하늘을 바라보며 이상한 세계의 표면에 서 있었습니다. 그들은 홀로스위트가 영구적으로 고장 나기 전에 하늘의 별들을 기록할 수 있었습니다. 만약 정확하다면, 이 별들은 우리가 재창조된 행성의 위치를 좁히는 데 도움을 줄 수 있습니다."
 mem_lotc.4a:0 "그들의 고향이 아닐까?"
 mem_lotc.5.name:0 "기념관"
 mem_lotc.5.desc:0 "안타깝게도 우리는 수세기 늦었습니다. 복합체의 잔해는 충돌 크레이터의 가장자리에 여전히 식별 가능하지만, 대부분은 유성 충돌로 obliterated되었습니다. 그러나 남아 있는 것들은 매우 흥미롭습니다. 우리는 Carcharorion의 그림 문자가 새겨진 몇 개의 큰 바위 슬래브를 확인했습니다. 발견된 데이터 코어 [Leader.GetName]는 그들의 고향 항성계에 대한 언급을 포함하고 있었습니다. 추가 데이터를 통해 공백을 채운다면, 우리는 그것으로 곧장 갈 수 있을 것입니다."
 mem_lotc.5a:0 "우리가 조사해 보겠습니다."
 mem_lotc.7.name:0 "함선 무력화"
 mem_lotc.7.desc:0 "이제 카르차로리온 순양함이 무력화되었으므로 승선해서 조사할 준비를 해야 합니다."
 mem_lotc.7a:0 "부대를 준비해라."
 mem_lotc.8.name:0 "함선 무력화"
 mem_lotc.8.desc:0 "다른 누군가가 카르차로리온 순양함을 무력화시키고 목적 없이 표류하도록 내버려 두었습니다. 우리는 그것을 조사하기 위해 승선을 준비해야 합니다."
 mem_lotc.8a:0 "부대를 준비해라."
 mem_lotc.9.name:0 "[From.GetName] 성계"
 mem_lotc.9.desc:0 "목적 없이 표류하는 망가진 카르차로리온 우주선을 감지했습니다. 우리는 그것을 조사하기 위해 승선을 준비해야합니다."
 mem_lotc.9a:0 "부대를 준비해라."
 mem_lotc.10.name:0 "승선 성공"
 mem_lotc.10.desc:0 "우리 군대가 배에 탑승하자 끔찍한 광경이 그들을 맞이했습니다. 여러 종의 시체가 있었고, 그 중 일부는 우리의 동족이기도 했습니다! 그들은 분명히 죽어 있어야 했지만, 비틀거리며 돌아다니고 심지어 배를 방어하려고 시도했습니다. \n\n그들은 죽음 이후에도 계속 움직일 수 있도록 하는 광범위한 신경 이식에 의해 여전히 추진되고 있는 것으로 보입니다. 끝까지 싸우며, 우리의 탑승 팀은 배의 다리로 진입했습니다. 비행 컴퓨터의 일부 데이터는 여전히 사용 가능했습니다. 이는 배의 초공간 기술이 우리가 고향 항성계를 떠나기 전에 제거했던 문제와 유사한 주요 문제를 겪고 있음을 나타냈습니다. \n\n배의 시스템을 조작한 것이 어떤 종류의 자폭 시퀀스를 촉발한 것으로 보이며, 우리의 탑승 팀이 돌아온 직후 배는 증발했습니다."
 mem_lotc.10a:0 "충격적이군."
 mem_lotc.11.name:0 "카르차로리온 고향 성계"
 mem_lotc.11.desc:0 "우리가 수집한 데이터를 바탕으로 신비로운 카르카로리온의 추정 고향 항성계를 확인할 수 있습니다. 우리는 그곳을 탐사하여 그들에게 무슨 일이 있었는지 알아내고 우리 종과의 연결 고리를 밝혀내야 합니다."
 mem_lotc.11a:0 "해답을 위해 계속 나아가자!"
 mem_lotc.12.name:0 "카르사르 성계"
 mem_lotc.12.desc:0 "우리는 카르차로리온의 고향 성계인 카르사르를 찾았습니다. 우리는 성간 문명을 나타내는 시스템에서 활동을 감지하지 못하므로 답을 찾기 위해 그들의 행성을 탐색하는 것은 우리의 몫입니다.\n\n우리가 이미 수집한 정보로 기본적인 조사를 할 필요가 없습니다. 하지만, 우리가 더 자세히 검토해야 할 관심사가 많이 있습니다."
 mem_lotc.12a:0 "진행하도록."
 mem_lotc.13.name:0 "그윌리우르"
 mem_lotc.13.desc:0 "그윌리워르의 밀집하고 독성이 있는 온실가스 대기는 우리에게는 그리 희망적이지 않지만, 카르카로리온은 다른 의견을 가진 것으로 보입니다. 여러 대의 공기보다 가벼운 대형 선박들이 여전히 상층 대기에서 떠 있으며, 각각은 수천 명의 시민을 위한 거주지로 보입니다. 그 중 몇 대는 궤도에서 발사된 포탄에 의해 손상되었지만, 그 강도가 낮았던 것으로 보아 빗나간 발사였던 것으로 판단됩니다. \n\n우리 과학 팀은 거주지 지역에서 개인 소지품이 전혀 없는 것을 발견했으며, 시신도 회수되지 않아 인구가 자발적으로 이곳을 떠났음을 시사합니다."
 mem_lotc.13a:0 "다 어디갔지?"
 mem_lotc.14.name:0 "크라우"
 mem_lotc.14.desc:0 "이 행성에는 전투의 흔적이 남아 있으며, 많은 잔해가 여전히 궤도를 떠돌고 있습니다. 이곳에서 무슨 일이 있었는지는 우주선이 입은 광범위한 피해로 인해 완전히 명확하지 않지만, [Leader.GetName]의 예측에 따르면 이 행성의 궤도에 여러 주요 조선소가 설립되었으며, 이들은 표면에서 채굴한 광물을 사용하여 우주선을 생산했습니다. 조선소는 아마도 귀중한 군사 목표였던 것으로 보이며, 이로 인해 조선소를 두고 대규모 전투가 벌어진 것으로 설명됩니다."
 mem_lotc.14a:0 "인상적이군."
 mem_lotc.15.name:0 "에일위드"
 mem_lotc.15.desc:0 "얼어붙은 행성을 관찰할 때 두 가지 주요 특징이 뚜렷하게 나타납니다: 그 표면을 점령하고 있는 거대한 파괴된 아르콜로지와 훨씬 더 거대한 충돌 크레이터입니다. 크레이터가 행성의 가장 큰 육지에 집중되어 있는 것으로 보아, 이는 의도적인 폭격의 결과로 추정됩니다. 이로 인해 행성은 작은 빙하기를 겪었던 것으로 보입니다. \n\n한편, 아르콜로지에 대한 피해는 시간의 파괴를 훨씬 넘어섭니다. 많은 아르콜로지에는 대량 발사체와 유사한 형태의 거대한 파손이 있습니다. 각 구조물 내부는 우리가 카르카로리온으로 확인한 종의 시체로 가득 차 있습니다. \n\n그러나 아르콜로지 중 하나는 직접적인 타격을 피한 것으로 보입니다. 그곳에서는 기근과 추위의 희생자인 여러 시체가 발견되었지만, 이들은 의도적으로 아래층으로 옮겨져 저장된 것으로 보입니다. 누군가 아르콜로지를 비우기 전에 시체를 그곳으로 옮겼던 것으로 추정됩니다."
 mem_lotc.15a:0 "누가 이런 일을 벌인 거지?"
 mem_lotc_terraforming_candidate_tooltip_1:0 "§Y[terraforming_candidate_1.GetName]§!는 £society£ §H$tech_climate_restoration$§! 기술이 연구된 후에 테라포밍이 가능해질 것입니다."
 mem_lotc.16.name:0 "콰아르"
 mem_lotc.16.desc:0 "달의 표면에는 여러 아르콜로지가 존재하며, 이들을 연결하는 지하 터널이 있습니다. 행성의 표면에는 많은 전투함의 잔해가 흩어져 있으며, 표면의 구조물은 강력한 무기에 의해 관통된 것으로 보입니다. 카르카로리온의 시체가 구조물 곳곳에서 발견되며, 이는 벽이 뚫리면서 진공에 노출되어 사망했거나, 공급 부족으로 인해 느리게 죽어간 경우입니다. 일부는 자살 총상으로 사망한 것으로 보입니다. \n\n과학 팀은 또한 외부에서 mass graves를 발견했으며, 시체가 단순히 참호에 버려지고 불도저로 덮인 상태입니다."
 mem_lotc.16a:0 "전쟁은 절대로 변하지 않는 법이지."
 mem_lotc.17.name:0 "오파누"
 mem_lotc.17.desc:0 "행성의 표면에는 여러 개의 생물권이 덮여 있으며, 그 모든 것이 폐허가 되었습니다. 우리의 과학 팀은 인구 중심을 겨냥한 행성 폭격의 흔적을 확인했습니다. 발견된 일부 생존 장비를 통해 판단할 때, 현지인들은 적대 세력에 의해 그들의 사회가 멸망하기 전 대규모 테라포밍 프로젝트를 진행하고 있었습니다."
 mem_lotc.17a:0 "어떻게 이런 일이 있을 수 있지?"
 mem_lotc_terraforming_candidate_tooltip_2:0 "§Y[terraforming_candidate_2.GetName]§!는 £society£ §H$tech_climate_restoration$§! 기술이 연구된 후에 테라포밍이 가능해질 것입니다."
 mem_lotc.18.name:0 "모르스윌"
 mem_lotc.18.desc:0 "이 달에는 몇 개의 파괴된 레이더 기지와 소량의 잔해가 흩어져 있습니다. 이곳은 주요 시설을 보호하기 위해 해군 기지가 있었던 것으로 보입니다. 분명히 공격을 받았지만, 누가 승리했는지는 알 수 없습니다."
 mem_lotc.18a:0 "신기하군."
 mem_lotc.19.name:0 "파르크나드"
 mem_lotc.19.desc:0 "소행성이 비어 있는 상태로 파내어져 주요 거주지이자 소행성 채굴 작전의 공급 허브로 만들어진 것으로 보입니다. 또한, 거주자들을 위해 인위적으로 중력을 생성하기 위해 비정상적으로 빠르게 회전하고 있습니다. 내부에서는 많은 시신이 발견되었습니다. \n\n우리 과학 팀은 전쟁 초기에 공급망 중단의 영향을 받았음을 나타내는 여러 디지털 목록을 회수하는 데 성공했습니다. 공급이 부족한 생명 유지 시스템이 결국 어느 시점에서 실패하여 전체 소행성이 집단 무덤으로 변한 것 같습니다."
 mem_lotc.19a:0 "끔찍하군."
 mem_lotc.21.name:0 "마르크호그"
 mem_lotc.21.desc:0 "한때 이 행성에 여러 전초 기지가 있었던 것으로 보이지만 지금은 폐허만 남아 있습니다. 그들은 아마도 성계의 다른 곳에 공급하기 위해 얼음과 다양한 광물을 채굴하고 있었습니다. 그들 모두는 어느 시점에서 정밀 궤도 타격으로 제거되었습니다."
 mem_lotc.21a:0 "흥미롭군."
 mem_lotc.22.name:0 "카이어르"
 mem_lotc.22.desc:0 "우리 과학 팀은 한때 카르카로리온 감옥으로 사용되었던 abandoned complex를 발견했습니다. 그 감방은 대부분 비어 있는 것으로 보아, 수감자들이 대규모로 대피했거나, 이 시설이 정원 이하로 운영되었음을 시사합니다. 표면에서 주목할 만한 또 다른 요소는 보안 요원들의 시체로, 그들 중 많은 이들이 자해로 사망한 것으로 보입니다. 하층에서는 다른 모습이 드러납니다 - 신경 삽입물로 장착된 수감자들의 시체입니다. [Leader.GetName]는 이들이 가장 위험한 수감자들을 통제하고 유순하게 만들기 위해 사용되었을 가능성이 높음을 시사합니다."
 mem_lotc.22a:0 "그들은 신경 이식물을 실험하고 있었나? 흥미롭군."
 mem_lotc.22b:0 "이 기술은 혐오스럽군."
 mem_lotc.22c:0 "신경 이식물이라고? 우리가 한번 조사해보자."
 mem_lotc.23.name:0 "엔겐필"
 mem_lotc.23.desc:0 "이곳에서 대규모 전투가 벌어졌고 수많은 함선이 파괴되었습니다. 거대한 파편 구름이 이제 행성을 공전하며 목적 없이 허공을 떠돌고 있습니다. [Leader.GetName]은(는) [Leader.GetSheHe] [Leader.GetWasWere]이(가) 여러 비행 컴퓨터를 복구할 수 있다고 보고했습니다. 손상되었지만 수리할 수 있는 범위가 아닙니다. 우리가 카르차로리온에 더 익숙해짐에 따라 자료를 추출할 수 있습니다."
 mem_lotc.23a:0 "그들은 무엇을 위해 싸운거지?"
 mem_lotc.24.name:0 "돌레누"
 mem_lotc.24.desc:0 "우리 과학 팀은 달 표면에서 미공개 연구 단지를 발견했습니다. 대부분 온전하지만, 거의 모든 데이터 코어를 포함한 대부분의 귀중품이 제거된 것으로 보입니다. 그러나 일부 데이터 코어는 회수되었습니다. 그 안에는 두 가지 뚜렷한 항목 세트가 있습니다. 첫 번째 세트는 시스템 내 외계 활동의 증거와 몇 가지 흥미로운 연구 데이터에 대한 언급을 포함하고 있습니다. 주로 광속 초과 기술과 관련이 있지만, 조잡하고 때때로 완전히 잘못된 경우가 많아 [leader.GetName]는 코어가 의도적인 잘못된 정보를 포함하고 있다고 거의 의심할 정도입니다. \n\n두 번째 세트는 이전 저자의 연구 결과를 확보하기 위해 파견된 특수 팀에 의해 작성된 것으로 보입니다. 팀은 시설을 장악한 후 명령과의 접촉이 갑자기 끊겼다고 기록하고 있습니다. [Leader.GetName]는 기지의 식당에서 특수 팀의 시신을 발견했으며, 자해로 사망한 것으로 보입니다."
 mem_lotc.24a:0 "여기서 무엇을 연구하고 있던 거지?"
 mem_lotc.25.name:0 "엘리드"
 mem_lotc.25.desc:0 "우리 과학 팀이 미공개 시설을 발견했습니다. 그곳의 인원들은 학살당한 것으로 보이며 시스템은 삭제되었습니다. 그러나 [Leader.GetName]는 여러 개의 미공개 은닉처를 추적하는 데 성공했습니다. 이들은 주로 시스템 외곽의 광부를 겨냥한 반모행성 선전과 Carcharorion 함대 작전에 대한 통찰을 제공하는 전술 데이터를 포함하고 있습니다."
 mem_lotc.25a:0 "그들은 무엇을 달성하려고 한 걸까?"
 mem_lotc.26.name:0 "퓌리아우"
 mem_lotc.26.desc:0 "행성의 궤도에 위치한 우리 팀은 클램프에 아직 완성되지 않은 우주선이 있는 조선소를 발견했습니다. 우주선에 탑재된 동면 기술과 기타 요소들 덕분에 우리는 이것이 식민지선임을 확인할 수 있었습니다. 그러나 그 설계에서 몇 가지 주요한 이상점이 드러납니다. 수년간 보급 없이 우주에서 작동하도록 설계되었으며, 초공간 기술이 전혀 없는 것으로 보아, 이 우주선은 아마도 아음속 속도로 여행하도록 설계된 것 같습니다. \n\n동면 포드는 냉동 및 해동의 흔적을 보이지만, 시체는 없어서 내부에 있던 사람들이 추출되기 전에 이미 점유된 것처럼 보입니다."
 mem_lotc.26a:0 "그들은 정말 광속으로만 항해 한 것일까?"
 mem_lotc.27.name:0 "어떤 비밀은 묻어두는 게 좋은 법"
 mem_lotc.27.desc:0 "알려지지 않은 곳에서 여러 함대가 성계에 진입하고 있습니다. 그들은 우리의 통신에 반응하지 않지만 움직임은 적대적인 의도를 드러냅니다. 이 함선들로부터 오는 유일한 신호는 \"어떤 비밀은 묻어두는 것이 낫다\"는 카르차오리온어로 된 간단한 메시지입니다."
 mem_lotc.27a:0 "그것에 대해서는 두고 보겠습니다."
 mem_lotc.28.name:0 "카르차오리온의 운명"
 mem_lotc.28.desc:0 "카르차오리온에 대한 우리의 이해는 여전히 완전하지 않지만, 우리는 그들의 고향 성계에 대한 연구에서 그들이 식민지 건설을 고려했을 수 있는 성계를 식별하기에 충분한 자료를 수집했습니다. 아마도 그곳에서 답을 찾을 수 있을 것입니다."
 mem_lotc.28a:0 "계속해!"
 mem_lotc.30.name:0 "우니게즈 성계"
 mem_lotc.30.desc:0 "우리는 단서의 흔적을 따라 성공적으로 유니게드 시스템에 도달했습니다. 이는 카르카로리온 생존자들이 그들의 고향 시스템에서 향한 곳입니다. \n\n우리는 지역 거대 가스 행성의 궤도를 도는 카르카로리온 표식이 있는 대규모 함대를 탐지할 수 있습니다."
 mem_lotc.31.name:0 "우니게즈 성계"
 mem_lotc.31.desc:0 "우리는 단서의 흔적을 따라 성공적으로 유니게드 시스템에 도달했습니다. 이곳은 카르카로리온 생존자들이 그들의 고향 시스템에서 향한 곳입니다. \n\n우리는 시스템의 거대 가스 행성에서 발신되는 희미한 신호를 감지할 수 있으며, 마치 누군가 우리에게 연락하려는 것 같습니다."
 mem_lotc.31.desc.fallback:0 "성계의 적대 세력을 물리치자, 우리는 누군가 우리에게 연락을 시도하는 것처럼 성계의 거대 가스 행성으로부터 오는 희미한 신호를 감지할 수 있습니다."
 mem_lotc.31a:0 "연락할 준비를 해라."
 mem_lotc.33.name:0 "최후의 카르차로리온"
 mem_lotc.33.desc:0 "성계의 거대 가스 행성에서 희미한 신호가 발생합니다. 마치 누군가가 그들을 물리친 자들을 만나려고 하는 것처럼 성계의 수호자들이 제거된 직후에 활성화되었습니다."
 mem_lotc.34.name:0 "통신 수립"
 mem_lotc.34.desc:0 "[Root.GetName]이(가) 거대 가스 행성의 신호가 성공적으로 해독되었다고 보고합니다. 거대 가스 행성 안에 숨겨진 함선이 우리를 맞이합니다."
 mem_lotc.35.desc:0 "반갑소, 이방인. 꽤 긴 여정이었소. 나는 마지막 카르차오리온 브래드위르요."
 mem_lotc.35a:0 "그래서 뭘 하면 되지?"
 mem_lotc.35a.response:0 "모르오. 나는 늙었소. 난 내 수명보다 천 배나 더 오랫동안 살아남았소이다. 내 우주선이 내 삶을 연장했소만, 그것에도 한계가 있다오. 내 함선을 끌어 올릴 테니 당신이 그걸 가졌으면 좋겠소. 비록 내가 당신네 종족에 대해 아는 것은 거의 없지만, 나는 당신이 위대한 운명을 타고났다는 것을 알 수 있구려. 마지막에는 카르차오리온이 무언가로 기억되기를 원하오. 이 함선은 우리 함대의 기함이었고 내가 여러 번 개선해두었으니 다른 일을 위해 쓰시오."
 mem_lotc.35b:0 "당신들에게 무슨 일이 있던 거지?"
 mem_lotc.35b.response:0 "우리는 한때 당신의 제국과 다르지 않은 위대한 문명이었습니다. 우리는 하늘을 바라보며 그곳에서 우리의 자리를 찾기를 꿈꿨습니다. 그러나 우리는 운이 없었습니다. 지금 생각하면 사소한 일이지만, 우리는 빛의 장벽을 넘지 못했습니다. 필요한 발견을 할 수 없었던 것 같습니다. \n\n우리의 고향 항성계에 갇힌 우리는 다른 이들이 하지 않는 방식으로 확장할 수밖에 없었습니다. 우리는 황량한 세계를 식민지화하고, 그것들을 우리의 필요에 맞게 변화시키고자 했습니다. 하지만 우리는 충분한 자원이 없었습니다. 일부는 새로운 고향을 찾기 위해 수백 년 동안 여행할 수 있는 우주선을 만들려고 시도하기도 했습니다. \n\n우리 문명이 성장함에 따라 그 필요도 커졌습니다. 자원의 부족은 전쟁으로 이어졌습니다. 우리의 고향 세계는 반란하는 식민지들과 싸웠습니다. 반란은 진압되었지만, 그들이 세운 모든 것은 파괴되었습니다. 최후의 저항으로 반란 생존자들은 고향 세계를 향해 여러 개의 소행성을 발사했습니다. 우리의 행성 방어가 무너진 상태에서 이를 막을 수 없었습니다. 이 전쟁은 우리의 인구의 99%를 앗아갔습니다. \n\n하지만 그것이 끝은 아니었습니다. 전쟁 직전, 운이 우리에게 미소를 지었습니다. 우리의 항성계에 어떤 외계 종족이 방문한 것 같지만, 우리는 그들과 만날 기회를 얻지 못했습니다. 그들의 우주선 중 하나가 추락하여 우리가 발견할 수 있는 잔해를 남겼습니다. 이것은 생존자들에게 항성계를 벗어날 수 있는 방법이었습니다. \n\n우리는 그 시절에 고급 문명과 만나지 못했지만, 당신의 종족을 포함한 많은 원주율을 발견했습니다. 그러나 우리는 길을 잃었습니다. 많은 이들이 생존의 의지 외에는 아무것도 이끌지 못하게 되었습니다. 우리는 신경 삽입물로 실험하며 다른 이들의 마음을 우리를 수용할 수 있도록 다시 쓰려고 했습니다: 우리의 기억, 우리의 개성, 우리의 문화. 만약 가능했다면, 우리는 은밀히 한 행성을 차지하고 새로운 몸으로 우리의 사회를 재건했을 것입니다. 하지만 우리는 실패했습니다."
 mem_lotc.35c:0 "당신은 누구지?"
 mem_lotc.35c.response:0 "제가 말했듯이, 제 이름은 브래드워입니다. 저는 외계 선박을 연구하는 프로젝트의 수석 과학자였습니다. 우리가 이 선박을 우리의 종족을 구할 수 있는 방법으로 인식했을 때, 우리는 그것이 우리의 정부나 반군의 손에 넘어가서는 안 된다는 것을 알았습니다. 우리는 우리의 작업을 방해하고 숨었습니다. 우리는 비밀리에 작업을 계속하며 소수의 선택된 이들이 우리의 후원자가 되도록 했습니다. 결국 우리는 초공간 능력을 가진 강력한 함선과 더 많은 함선을 만들 수 있는 청사진을 가지게 되었습니다. \n\n전쟁이 시작되었을 때, 저는 구조 작전을 이끌었습니다. 우리는 겨우 몇 천 명만 구했습니다. 우리는 우리의 문명을 재건하려 했지만, 그렇게 하는 과정에서 다시 분열되었습니다. 저는 카르카로리온의 나머지 이들이 저지른 실수를 반복해서는 안 된다고 믿었습니다. 우리는 은하계를 보호하는 것을 우리의 의무로 삼아야 했습니다. 그러나 제 반대자들은 동의하지 않았습니다. 그들은 어떤 대가를 치르더라도 생존하려 했습니다. 우리는 다시 나뉘어 서로 싸웠고, 제 편이 패배했습니다. \n\n마지막 공격에서, 저는 남아 있는 우리의 군대를 이끌고 전투에 나섰습니다. 우리가 패배한 것이 분명해지자, 저는 이 거대 가스 행성으로 뛰어들었습니다. 그들은 제가 제 함선을 추락시켰다고 생각했지만, 저는 단지 숨었을 뿐입니다."
 mem_lotc.35d:0 "당신이 마지막이라고? 나머지를 죽인 것이 유감스럽군."
 mem_lotc.35d.response:0 "자신을 과대평가하지 마십시오. 카르카로리온은 당신이 별에 손을 뻗기 훨씬 이전에 이미 죽었습니다. 당신이 싸운 것은 단지 껍데기일 뿐입니다 - 조잡한 신경 삽입물에 의해 움직이는 훼손된 시체들입니다. 사라져가는 디지털 메아리. 과거의 유령들일 뿐입니다."
 mem_lotc.36.name:0 "카르차오리온의 유산"
 mem_lotc.36.desc:0 "거대 가스 행성의 표면에서 거대한 함선이 나타났습니다. 내부에서 생명의 징후를 포착되지 않습니다. 함선은 우리가 가져가야 할 것 같습니다."
 mem_lotc.36a:0 "함선을 우리를 잘 섬길 것이다."
 mem_lotc.36a.phile:0 "카르차오리온을 잊지 않을 것이다."
 mem_lotc.36a.phobe:0 "그들의 종은 시간의 시험에 실패했습니다."
 mem_lotc.36a.mat:0 "그들의 지식을 유용하게 활용할 것이다."
 mem_lotc.36a.sp:0 "섭리는 우리를 그들에게로 인도했다."
 mem_lotc.36a.mil:0 "자랑스러운 카르차오리온에게 경의를 표한다."
 mem_lotc.36a.pac:0 "우리는 그들과 같은 실수를 반복하지 않아."
 mem_lotc.36.tooltip:0 "§Y[mem_lotc_final.GetName]§에 있는 전함 §Y에테뷔지아에스 아크 앗덴니일§!을 사용할 수 있습니다."
 mem_lotc_reward_ship:0 "카르차오리온의 유산"
 mem_lotc_wear_and_tear:0 "마모된"
