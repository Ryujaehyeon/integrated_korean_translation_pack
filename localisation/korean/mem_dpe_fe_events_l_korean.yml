l_korean:
 mem_fe.1.name:0 "고대인들의 도움을 구하다?"
 mem_fe.1.desc:0 "지난 몇 세기 동안 이루어진 엄청난 발전에도 불구하고, 최고의 [root.GetSpeciesAdj] 의사들도 치료할 수 없는 질병이 있습니다. [root.GetRulerTitle] [root.GetRulerName]는 그러한 질병에 진단된 불행한 사람입니다. 의사들은 갑작스럽게 발생한 [root.leader.GetHisHer] 희귀 퇴행성 뇌 질환에 당황해 있으며, [root.leader.GetHimHer]는 남은 개월 수가 불과 몇 개월밖에 없습니다. 그러나 그들에게는 우리에게는 기적이 될 만한 일이 일상적인 사실인 고급 사회가 존재합니다. 이러한 사회에서는 이와 같은 질병조차도 근절됩니다. 그러나 그들의 관심을 끌면 위험할 수 있으며, 그들의 기분은 예측할 수 없고 그들의 분노는 끔찍합니다. 그럼에도 불구하고, 아마도 고대인들은 적절한 대가를 제시한다면 [root.GetRulerName]를 구해줄 의향이 있을지도 모릅니다."
 mem_fe.1.materialist:0 "[mem_materialist_fe.GetSpeciesNamePlural]에 접근하다."
 mem_fe.1.spiritualist:0 "[mem_spiritualist_fe.GetSpeciesNamePlural]에 접근하다."
 mem_fe.1.xenophile:0 "[mem_xenophile_fe.GetSpeciesNamePlural]에 접근하다."
 mem_fe.1.xenophobe:0 "[mem_xenophobe_fe.GetSpeciesNamePlural]에 접근하다."
 mem_fe.1.machine:0 "[mem_machine_fe.GetSpeciesNamePlural]에 접근하다."
 mem_fe.1.no:0 "자연사하는 것이 더 낫습니다."
 mem_fe.1.no.tooltip:0 "우린 그 대가를 치를 수 없다."
 mem_fe.12.name:0 "[mem_xenophobe_fe.GetSpeciesNamePlural]가 우리의 메신저를 격추했습니다."
 mem_fe.12.desc:0 "[mem_xenophobe_fe.GetSpeciesNamePlural]는 우리의 사신을 메시지를 듣기도 전에 격추했습니다. 우리는 그 대답이 "아니오"라고 가정할 수 있습니다."
 mem_fe.15.name:0 "[mem_fe.GetName]이(가) 응답하다"
 mem_fe.15.desc:0 "유기체의 도움 요청 수신. 관리자 프로토콜 317-2 가동. 메시지: 모든 유기체는 우리의 도움을 받을 것이다. 환자를 우리 행성으로 보내면 우리는 §R<<에러: 데이터 손상>> <<에러: 데이터 손상>>§!. 응답 기다리는 중."
 mem_fe.15.A:0 "감사합니다."
 mem_fe.15.B:0 "생각해본 결과 정중히 거부하겠습니다..."
 mem_fe.16.name:0 "[root.GetRulerTitle][root.GetRulerName]\\"치료받음\\"
 mem_fe.16.desc:0 "공지사항: 너희들의 지도자[root.leader.GetHisHer]의 병은 치료되었다. 이제 [root.leader.GetSheHeCap]은(는) [root.leader.GetHisHer]의 남은 삶을 우리 보호소에서 보낼 수 있다."
 mem_fe.2.name:0 "[mem_fe.GetName]가 응답하다"
 mem_fe.2.desc.friendly:0 "대가를 지불한다면 우리 친구들을 돕겠다."
 mem_fe.2.desc.angry:0 "우린 [root.GetSpeciesName]와 같은 열등한 필멸자들을 돕지 않을 것이다."
 mem_fe.2.desc.change:0 "우린 너희가 삶의 방식을 바꾼다면 도와줄 것이다 [root.GetSpeciesName]들이여."
 mem_fe.2.desc.pay:0 "정당한 가격에 [root.GetSpeciesName]들을 도와주겠다."
 mem_fe.2.change:0 "해야 한다면 하겠다."
 mem_fe.2.pay:0 "생존을 위해서라면 기꺼이 받아들이겠다."
 mem_fe.2.friendly:0 "$mem_fe.2.pay$"
 mem_fe.2.nopay:0 "가격이 너무 비쌉니다 - 저는 치명적인 죽음을 맞이할 것입니다."
 mem_paying_spirFE:0 "몰락한 제국 플레이중"
 mem_paying_friendly_spirFE:0 "$mem_paying_spirFE$"
 mem_paying_xenoFE:0 "$mem_paying_spirFE$"
 mem_paying_friendly_xenoFE:0 "$mem_paying_spirFE$"
 mem_paying_matFE:0 "$mem_paying_spirFE$"
 mem_paying_friendly_matFE:0 "$mem_paying_spirFE$"
 mem_fe.3.name:0 "[root.GetRulerTitle] [root.GetRulerName]\"치료받음\"
 mem_fe.3.desc:0 "당신의 지도자를 치유하였습니다. 당신을 위한 우리의 호의의 표시로 [root.leader.GetHisHer] 능력을 향상시켰습니다. [root.leader.GetSheHe] 잘 활용하시기 바랍니다!"
 mem_fe.3.option.spiritualist:0 "특성 $leader_trait_psionic$이(가) [root.leader.GetName]에 추가됩니다."
 mem_fe.3.option.xenophile:0 "특성 $leader_trait_erudite$가 [root.leader.GetName]에 추가됩니다."
 mem_fe.3.option.materialist:0 "특성 $leader_trait_cyborg$ 가 [root.leader.GetName] 에 추가됩니다."
 mem_fe.3.option:0 "도와주셔서 감사합니다. 우린 당신에게 큰 빚을 졌습니다."
 mem_fe_disturbed_us:0 "우리를 방해하다"
 mem_spurned_our_help:0 "우리의 도움을 거절하다"
 mem_sought_our_help:0 "우리의 도움을 구하다"
 mem_fe.4.name:0 "[root.GetRulerTitle] [root.GetRulerName]이(가) 사망"
 mem_fe.4.desc:0 "[root.GetRulerTitle] [root.GetRulerName]의 퇴행성 뇌 질환이 [mem_fe.GetName]의 치유자들이 [root.Leader.GetHimHer]를 살펴보기 전에 갑자기 악화되었습니다."
 mem_leader_trait_reinvigorated:0 "활력을 되찾다"
 mem_leader_trait_reinvigorated_desc:0 "지도자는 고대인들에 의해 치료되었으며 30년은 젊어진 기분입니다."
 mem_leader_die_soon:0 "[root.GetRulerTitle] [root.GetRulerName]은(는) 곧 사망합니다."
 mem_fe.20.name:0 "몰락한 제국에서 탈출"
 mem_fe.20.desc:0 "안녕하세요, 제 [root.GetRulerTitle]님. 저는... [mem_escaped_scientist.GetName]... 당신의 충실한 신하입니다.\n\n*깔깔 웃음*\n\n최근에 저는 [FallenEmpireTaskOrigin.GetName]에서 탈출했으며, 그곳에서 그들의 기술에 대한 면밀한 연구를 수행했습니다. 저는 대부분의 자재를 가지고 올 수 있었고, 그들의 여러 기술을 복제할 수 있을 것이라고 믿습니다.\n\n게다가, [FallenEmpireTaskOrigin.GetSpeciesNamePlural]가 저에게 몇 가지... 개선을... 했습니다. 저는 이제 가장 위대한 [root.GetSpeciesAdj] 천재를 넘어서는 사고 과정을 수행할 수 있습니다. 그것이 저를 약간 미치게 만들었을 수도 있지만, 그건 신경 쓰지 마세요.\n\n*깔깔 웃음*\n\n음, 제가 언급해야 할 것은, [FallenEmpireTaskOrigin.GetSpeciesNamePlural]가 저에게 약간 짜증이 날 수도 있다는 것입니다... 하지만 당신이 처리할 수 없는 것은 아닐 거라고 확신합니다.\n\n*깔깔 웃음*"
 mem_fe.20.option:0 "잘...된건가?"
 mem_fe.20.tooltip:0 "[mem_escaped_scientist.GetName], 특성 $leader_trait_erudite$, $leader_trait_maniacal$ 및 $leader_trait_mem_ancient_knowledge$를 가진 5급 과학자가 지도자 풀에 추가됩니다."
 mem_fe.22.name:0 "현상수배: [mem_escaped_scientist.GetName]"
 mem_fe.22.desc:0 "친애하는 [root.GetSpeciesName]님. 당신이 정신적으로 불안정한 범죄자 [mem_escaped_scientist.GetName]를 숨기고 있다는 사실이 우리에게 알려졌습니다. [mem_escaped_scientist.GetSheHeCap]는 우리 당국으로부터 도망치면서 위험한 기술의 대량 저장고를 가지고 끔찍한 만행을 저질렀습니다. [mem_escaped_scientist.GetSheHe]가 우리에게 반환되어야 하며, [mem_escaped_scientist.GetSheHe]가 [mem_escaped_scientist.GetHisHer] 범죄로 재판을 받을 수 있도록 하는 것이 중요합니다... 그리고 당신은 [mem_escaped_scientist.GetHisHer] 저장고를 우리에게 넘겨야 합니다 - 당신의 안전을 위해서입니다. 그것은 미성숙한 종족의 손에 남겨둘 수 없습니다."
 mem_fe.22.A:0 "[mem_escaped_scientist.GetSheHeCap]은(는) 우리가 보호할 것이다."
 mem_fe.22.A.response:0 "언젠가 이것을 후회하게 될 것이다 [root.GetSpeciesName]들이여."
 mem_fe.22.B:0 "우리는 [mem_escaped_scientist.GetHimHer]와 [mem_escaped_scientist.GetHisHer] 캐시를 당신에게 돌려줄 것입니다."
 mem_fe.22.B.tooltip:0 "[mem_escaped_scientist.GetName]이(가) 지도자에서 제거됩니다."
 mem_fe.22.B.response:0 "올바른 선택을 한 것이다 [root.GetSpeciesName]들이여."
 mem_fe.22.C:0 "(거짓) 우리는 [mem_escaped_scientist.GetHimHer]를 당신에게 돌려줄 것입니다. 하지만 어떤 캐시를 말씀하시는 건가요?"
 mem_fe.22.C.tooltip:0 "$mem_fe.22.B.tooltip$ [root.GetName]은(는) 몰래 [mem_escaped_scientist.GetName]이(가) 훔친 기술들을 빼돌릴 것입니다."
 mem_fe.22.C.response:0 "조심하도록 [root.GetSpeciesName]들이여, 너희들은 불장난하는 어린아이와도 같다."
 mem_leader_trait_ancient_knowledge:0 "고대인의 지식"
 mem_leader_trait_ancient_knowledge_desc:0 "이 과학자는 몰락한 제국의 기술력을 두 눈으로 보았으며 이를 재현하기 위해 고대 기술 저장고를 가지고 있습니다."
 CCREMOVERULER.tooltip:0 "[root.GetRulerTitle] [root.GetRulerName]이(가) 게임에서 제거됩니다."
 leader_trait_mem_reinvigorated:0 "활력을 되찾다"
 leader_trait_mem_reinvigorated_desc:0 "지도자는 고대인들에 의해 치료되었으며 30년은 젊어진 기분입니다."
 leader_trait_mem_ancient_knowledge:0 "고대인의 지식"
 leader_trait_mem_ancient_knowledge_desc:0 "이 과학자는 몰락한 제국의 기술력을 두 눈으로 보았으며 이를 재현하기 위해 고대 기술 저장고를 가지고 있습니다."
