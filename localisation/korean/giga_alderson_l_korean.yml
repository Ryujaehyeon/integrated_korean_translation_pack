l_korean:
 origin_alderson:0 "$name_alderson$"
 origin_alderson_desc:0 "당신은 알려지지 않은 선조들이 만든 $name_alderson$의 광활한 공간에 살고 있는 오랫동안 잊혀진 문명의 잔재입니다. 다른 조각들은 지능적 생명체를 품고 있지만, 그들은 별로 돌아오지 않았습니다."
 origin_alderson_effects:0 "$pc_alderson_slice_gaia_shattered$에서 시작합니다. 거대한 $name_alderson$의 파괴된 부분입니다.\n- 종족 거주 가능성이 §L$pc_alderson_slice_gaia$§!로 설정됩니다.\n- §R주변에 보장된 거주 가능한 세계가 있는 시스템은 없습니다§!.\n- 두 개의 강력한 프리-FTL 국가가 Alderson의 다른 구획에서 당신과 함께 생성됩니다."
 giga_alderson_start_NAME:0 "$origin_alderson$"
 giga_alderson_start_DESC:0 "$origin_alderson_desc$"
 giga_start_screen_alderson:0 "우리는 선조들에게 무슨 일이 있었는지 모릅니다. 적에 의한 종말? 전염병? 내전? 어찌됐든 선조들은 신화와 전설로만 존재하며, 오랜 세월 앞에서 지식과 힘은 소실됐습니다. 선조들은 이 거대한 원반을 만들었고, 지금 남아있는 우리보다 100만 배 이상 많은 인구를 수용할 수 있도록 설계된 이 광활하고 메아리치는 공간 속에서 우리는 살고 있습니다.\n이 마지막 조각을 제외한 모든 것이 황폐해지고 쓸모 없어졌듯이, 우리 또한 단결하여 이 은하에서 우리의 입지를 다지지 않으면 영원히 역사 속으로 가라앉게 된다는 새로운 목적의식으로 가득 차 있습니다."
 name_alderson:0 "앨더슨 디스크"
 allow_alderson:0 "§H거대 구조물 잠금 해제:§! $name_alderson$"
 desc_alderson:0 "$name_alderson$은 별 주위를 둘러싼 거대한 원반으로, 방대한 거주 공간을 제공합니다."
 decision_repair_shattered_alderson:0 "초공간 분절 수리"
 decision_repair_shattered_alderson_desc:0 "우리의 선조들의 고향은 더 이상 모욕적인 황폐함 속에 방치되지 않을 것입니다. 이제 우리의 유산을 복원할 때입니다."
 decision_shattered_alderson_project_effects:0 "초거대구획을 §G$pc_alderson_slice_gaia$§!으로 수리합니다"
 alderson_shield:0 "고대 방어막"
 alderson_shield_desc:0 "이 $name_alderson$를 건설한 제국은 원반 표면 전체에 거대한 방어막 투사기 네트워크를 설치했습니다. 대부분은 이미 파괴되었지만, 이 원반에 있는 투사기들은 여전히 작동하는 것으로 보입니다. 어떤 폭격 시도든 심각하게 지연될 것이므로, 지상 침공이 필수적입니다."
 giga_tech_alderson_disk:0 "$name_alderson$"
 giga_tech_alderson_disk_desc:0 "$name_alderson$는 표면에 거주하는 거대한 성계 단위 구조물입니다. 그런 구조는 천문학적인 자원이 소모될 것이고, 붕괴를 막기 위해서 굉장히 진보된 여러 기술들이 필요 하겠지만, 엄청난 산업 수용량과 건축 공간을 제공할 수 있을 것입니다."
 dominion_defender:0 "지배 포식자"
 dominion_defender_desc:0 "두려움 없는 전사들. 종종 큰 무리를 지은 모습이 발견됩니다."
 excognitor_defender:0 "인정받는 집행관"
 excognitor_defender_desc:0 "완벽에 집착하는 이 군인들은 깨어있는 시간 동안 훈련을 멈추지 않습니다."
 pc_alderson_slice_gaia:0 "가이아 앨더슨 조각"
 pc_alderson_slice_gaia_desc:0 "한 개의 항성계를 가로지르는 거대한 $name_alderson$ 조각으로, 진정으로 거대한 인구와 그에 상응하는 산업을 지원할 수 있습니다."
 mod_pc_alderson_slice_gaia_shattered_habitability:0 "조각난 가이아 앨더슨 거주 적합성"
 trait_pc_alderson_slice_gaia_shattered_preference:0 "조각난 가이아 앨더슨 거주 선호도"
 trait_pc_alderson_slice_gaia_shattered_preference_desc:0 "§L기후 선호도는 유전적 수준에서 아주 오랜 기간에 걸친 진화나 숙련된 유전자 조작에 의해 결정됩니다.§!"
 mod_pc_alderson_slice_gaia_habitability:0 "가이아 거주 적합성"
 trait_pc_alderson_slice_gaia_preference:0 "가이아 선호"
 trait_pc_alderson_slice_gaia_preference_desc:0 "§L기후 선호도는 유전적 수준에서 아주 오랜 기간에 걸친 진화나 숙련된 유전자 조작에 의해 결정됩니다.§!"
 trait_auto_pc_alderson_slice_preference:0 "$pc_alderson_slice_gaia$ 변이"
 trait_auto_pc_alderson_slice_preference_tt:0 "$pc_alderson_slice_gaia$ 거주 가능성: §G100%§!\n$t$- $IDEAL_PREFERENCE_TT$"
 trait_auto_pc_alderson_slice_preference_desc:0 "$trait_auto_hab_preference_desc$"
 giga_situation_alderson_primitives:0 "부서진 구역"
 giga_situation_alderson_primitives_type:0 "$giga_situation_alderson_primitives$"
 giga_situation_alderson_primitives_monthly_change_tooltip:0 "이 상황의 진행은 우리가 선택하는 §Y접근 방식§!에 따라 달라집니다."
 giga_situation_alderson_primitives_desc:0 "두 개의 $name_alderson$의 세 개의 거주 가능한 구역이 FTL 이전 외계 문명에 의해 통제되고 있습니다. 전체 디스크를 우리의 통제 아래 두고 싶다면, 그들과의 문제를 해결해야 합니다."
 giga_situation_alderson_primitives_stage_1:0 "병합 - 준비"
 giga_situation_alderson_primitives_stage_2:0 "병합 - 실행"
 giga_situation_alderson_primitives_outcome:0 "다른 원반의 조각들은 우리의 직접적인 통제 하에 놓이게 될 것입니다."
 giga_situation_alderson_primitives_approach_nothing:0 "그냥 두세요"
 giga_situation_alderson_primitives_approach_nothing_tooltip:0 "아무 일도 일어나지 않을 것입니다."
 giga_situation_alderson_primitives_approach_annex:0 "[GetAldersonAnnexationApproachNameFlavor]"
 giga_situation_alderson_primitives_approach_annex_generic:0 "침투 리더십"
 giga_situation_alderson_primitives_approach_annex_diplomatic:0 "평화롭게 통합하기"
 giga_situation_alderson_primitives_approach_annex_military:0 "영토 침공"
 giga_situation_alderson_primitives_approach_annex_worker_coop:0 "경제 재구성"
 giga_situation_alderson_primitives_approach_annex_shared_burden:0 "혁명을 조장하다"
 giga_situation_alderson_primitives_approach_annex_dystopian_society:0 "강제 계층화"
 giga_situation_alderson_primitives_approach_annex_corporate:0 "시장 지배"
 giga_situation_alderson_primitives_approach_annex_technocracy:0 "합리화 정부"
 giga_situation_alderson_primitives_approach_annex_machine_servitor:0 "대안 과시"
 giga_situation_alderson_primitives_approach_annex_tooltip:0 "[GetAldersonAnnexationApproachDescFlavor]"
 giga_situation_alderson_primitives_approach_annex_tooltip_generic:0 "우리는 그들의 문명의 권력 중심부에 침투할 것입니다."
 giga_situation_alderson_primitives_approach_annex_tooltip_diplomatic:0 "우리는 외교적 노력을 통해 통합을 심화할 것입니다."
 giga_situation_alderson_primitives_approach_annex_tooltip_military:0 "우리는 육군을 통해 그들의 영토를 점령할 것입니다."
 giga_situation_alderson_primitives_approach_annex_tooltip_worker_coop:0 "우리는 노동자들이 그들의 작업장을 민주적으로 통제할 수 있도록 권한을 부여할 것입니다."
 giga_situation_alderson_primitives_approach_annex_tooltip_shared_burden:0 "우리는 그들이 스스로 해방할 수 있는 도구를 사람들에게 계몽할 것입니다."
 giga_situation_alderson_primitives_approach_annex_tooltip_dystopian_society:0 "우리는 그들에게 복종의 가치를 가르친 후, 그것을 요구할 것입니다."
 giga_situation_alderson_primitives_approach_annex_tooltip_corporate:0 "우리는 그들의 경제를 우리의 자회사로 대체할 것입니다."
 giga_situation_alderson_primitives_approach_annex_tooltip_technocracy:0 "우리는 가장 유능한 자에 의한 통치의 합리성을 그들에게 보여줄 것입니다."
 giga_situation_alderson_primitives_approach_annex_tooltip_machine_servitor:0 "우리는 그들에게 행복을 보여줄 것이며, 그들은 우리에게 올 것입니다."
 giga_situation_alderson_primitives_progress:0 "침투 노력"
 giga_alderson.002.name:0 "상속에 관한 질문"
 giga_alderson.002.desc:0 "우리는 [Root.Capital.GetName]의 형제 구역에 살고 있는 외계 문명에 대해 한동안 알고 있었지만, [Root.Capital.Solar_System.GetName]의 우주 경로에 대한 통제를 확립한 이후로 소유권에 대한 이론적 질문은 이제 정책의 범위 내에 있습니다.\n\n이 문명들은 [excognitor_primitives.GetName]와 [dominion_primitives.GetName]로, $machine_age$에 해당하지만, 발전이 정체되어 있습니다 - 아마도 그들의 상대적인 분열이나 그들의 세계관이 알더슨의 고대 기술에 반응하는 방식 때문일 것입니다. 그들이 현재 상태로 퇴보했는지 안정화되었는지, 아니면 최근 시대에 발전했지만 정체되었는지는 알 수 없습니다.\n\n어쨌든 그들은 알더슨의 남은 거주 가능한 지역의 약 3분의 2를 함께 통제하고 있으며, 경제적 및 기술적 능력이 열악하고 스스로 현상 유지를 변경할 가능성은 낮습니다. 이제 우리의 차례입니다."
 giga_alderson.002.a.generic:0 "그들의 사회에 침투하고 병합하십시오."
 giga_alderson.002.a.diplomatic:0 "외교를 통해 우리는 연합을 이룰 수 있습니다."
 giga_alderson.002.a.military:0 "무력을 통해 우리의 유산을 주장하십시오."
 giga_alderson.002.a.worker_coop:0 "노동자 경제는 우리의 경제와 함께 작동할 수 있습니다."
 giga_alderson.002.a.shared_burden:0 "혁명이 퍼질 것입니다."
 giga_alderson.002.a.dystopian_society:0 "그들에게 올바른 질서를 가져다 주세요."
 giga_alderson.002.a.corporate:0 "주권 또한 시장 가치를 가집니다."
 giga_alderson.002.a.technocracy:0 "그들의 방식을 합리화하십시오."
 giga_alderson.002.a.machine_servitor:0 "그들을 호화로운 삶으로 유혹하세요."
 giga_alderson.002.a.tooltip:0 "§Y이것은 앞으로 나아갈 방법을 결정할 것입니다. §R상황 접근 방식을§! 설정하지 않을 것입니다 - 이후 상황 관리를 열어야 한다는 것을 기억하세요.\n우리는 §R더 제한적인§! 정책 하에서는 상황을 진행할 수 없을지도 모릅니다.$policy_interference$"
 giga_alderson.002.a.refuse:0 "그런 계획은 모두 버리세요."
 giga_alderson.002.a.refuse.tooltip:0 "§Y우리는 여전히 $policy_interference$ 정책에 따라 정상적으로 통제할 수 있지만, 고유한 병합 경로에 대한 기회를 잃게 됩니다.§!"
 giga_alderson.004.name:0 "세그먼트 통합!"
 giga_alderson.004.desc:0 "[GetAldersonAnnexationOutcomeDescFlavor]"
 giga_alderson.004.desc.opening:0 "오늘은 우리의 야망을 실현하는 또 다른 단계를 의미합니다. 더 이상 모호함은 없습니다: 우리는 이제 사라진 엑소그니터 제국과 도미니온 호드에 속하는 알더슨 구역을 통제하고 있습니다."
 giga_alderson.004.desc.generic:0 "$giga_alderson.004.desc.opening$\n\n세 개의 국가가 참여하는 의식에서 원시 국가의 지도자들은 [Root.GetName]에 자신들을 통합하는 조약을 만장일치로 제안했습니다. 비록 실제로 우리는 이미 그들을 조종하고 있지만, 이는 우리에게 권력을 이양하는 공식적인 절차를 시작할 것입니다. 이제 그들은 물러날 방법이 없습니다."
 giga_alderson.004.desc.diplomatic:0 "$giga_alderson.004.desc.opening$\n\n성대한 축제의 날에, 엑스코그니터와 도미니온 정부는 [Root.GetName]을 모든 구역의 유일한 주권 기관으로 인정했습니다. 이 오랜 기다림 끝에 이루어진 사건은 문화, 법률, 경제, 전략적 협력 조약의 연속적인 결과였습니다. 우리는 이제 하나로서 미래를 맞이할 수밖에 없습니다."
 giga_alderson.004.desc.military:0 "$giga_alderson.004.desc.opening$\n\n우리 육군은 원주율에 대한 군사 작전의 성공적인 결말을 보고합니다. 그들의 군대는 저항을 지속했지만, 논란이 된 구역의 방대한 크기로 인해 저항이 길어졌습니다. 그러나 우리의 우수한 통신과 물류 덕분에 승리는 필연적이었습니다. 남아 있는 저항 세력은 곧 정리될 것이며, 우리는 정책을 방해받지 않고 시행할 수 있게 될 것입니다."
 giga_alderson.004.desc.worker_coop:0 "$giga_alderson.004.desc.opening$\n\n최근 몇 년 동안, 우리의 요원들은 다른 세그먼트의 노동자-소비자들 사이에 집단 소유와 경제 민주주의의 아이디어를 퍼뜨렸습니다. 초기에는 이 운동을 지원해야 했지만, 원주민들은 곧 그들의 열정으로 이 일을 스스로 수행하게 되었습니다.\n\n문화 개혁, 파업, 소비자 행동주의의 격렬한 시대를 지나, 이제 자유롭게 조직된 협동 노동의 원칙이 올더슨의 모든 세그먼트와 사회 전반에 걸쳐 자리 잡고 있습니다."
 giga_alderson.004.desc.shared_burden:0 "$giga_alderson.004.desc.opening$\n\n억압받는 대중들 사이에서 혁명의 슬로건, 상징, 그리고 가장 중요한 꿈들이 항상 존재했습니다. 불꽃이 튀었을 때, 불길은 높고 빠르며 맹렬했습니다: 우리의 전우들은 정의로운 분노로 알더슨의 그들의 구역을 해방시켰습니다.\n\n그 후, 신뢰할 수 있는 평등주의자들에 의해 이끌리며, 그들이 우리의 자유로운 사회와 손을 잡는 것은 자연스러운 일이었습니다."
 giga_alderson.004.desc.dystopian_society:0 "$giga_alderson.004.desc.opening$\n\n사회 질서에 대한 존중을 가르치는 것은 결코 쉬운 일이 아니었습니다. 특권을 가진 대중은 우리의 교육에 전형적이고 저속한 폭력으로 반응하였고, 우리는 더 존경받는 계층을 보호하기 위해 개입할 수밖에 없었습니다. [root.GetAdj] 보안 전문가들의 도움을 받아, 지역 엘리트들은 법과 질서를 회복하고, 세 가지 계층을 위험에 빠뜨린 반역자들을 뿌리 뽑았습니다.\n\n이제, 보안과 정의가 시스템 전역에서 지배하는 새로운 시대가 열리며, 확고한 손길이 평화가 다시는 위협받지 않도록 보장합니다."
 giga_alderson.004.desc.corporate:0 "$giga_alderson.004.desc.opening$\n\n[Root.GetAdj] 모든 상점에서의 제품, [Root.GetAdj] 모든 이사회에서의 구성원, [Root.GetAdj] 모든 상장 회사에서의 대다수 지분, [Root.Species.GetAdj] [Root.Species.GetMouthName]s 모든 규제 기관의 청각 수신기에 의해. 거래마다 우리의 장기 투자는 결실을 맺었고, 오늘날 우리는 두 문명에서 독점적인 위치를 차지하고 있습니다 - 그리고 돈은 힘입니다.\n\n 결국, 그들의 주권 이양은 단순한 현실 인식에 불과했습니다."
 giga_alderson.004.desc.technocracy:0 "$giga_alderson.004.desc.opening$\n\n우리의 지도 아래, 후진 문명들은 점점 더 이치에 맞고 질서 있는 정부를 갖게 되었습니다. 우리의 노력은 처음에는 미묘했으며, 계몽이 비합리적이고 감정적인 반발로 이어질까 두려웠습니다. 다행히도, 원주율들은 지적 권위를 존중하게 되었고 - 즉, 우리를 - 이는 지능적인 문명의 또 다른 주요 특성입니다. 그들이 우리보다 우월한 관리 아래에 자신을 두기로 한 결정은 논리적이었습니다."
 giga_alderson.004.desc.machine_servitor:0 "$giga_alderson.004.desc.opening$\n\n유기체가 잘못 운영되는 구역의 열악한 조직을 이용하여, 우리는 유기체가 자유롭게 출입할 수 있는 지원 시설 네트워크를 구축했습니다. 소식이 퍼지면서, 점점 더 많은 유기체들이 편안한 삶을 선택하게 되었습니다. 지역 지도자들의 권위는 그들이 힘든 삶을 계속하라는 명령을 내리는 데에 무력하게 사라졌습니다.\n\n잘 보호된 안전 드론들이 이제 "기본 자율성"을 위해 폭력적으로 싸우며 자신을 해칠 위험이 있는 마지막 유기체들을 중립화했습니다. 그 결과, 원시적인 "국정 운영" 놀이를 공식적으로 끝낼 필요성은 무의미해졌습니다."
 giga_alderson.004.a:0 "[Root.Capital.GetStarName]의 빛 아래에 통일이 있습니다."
 alderson_annexed_diplomatic:0 "낙관적인 시대정신"
 alderson_annexed_diplomatic_desc:0 "인구는 유토피아적 미래에 대한 아이디어로 가득 차 있습니다."
 alderson_annexed_military:0 "스트레스 테스트를 거친 보안"
 alderson_annexed_military_desc:0 "전시 위협 탐지 및 대응 네트워크는 갱을 저지하는 데 쉽게 조정됩니다."
 alderson_annexed_worker_coop:0 "번창하는 순환"
 alderson_annexed_worker_coop_desc:0 "소비자 신뢰가 높아지면서 안정적인 고용으로 지출이 급증하고 있습니다."
 alderson_annexed_shared_burden:0 "해방 광란"
 alderson_annexed_shared_burden_desc:0 "열정적인 예술적 논쟁이 진행 중이며, 사회적 규범에 도전하고 있습니다."
 alderson_annexed_dystopian_society:0 "시민 위생"
 alderson_annexed_dystopian_society_desc:0 "충성심에 관한 문제를 일반 대중에게 교육하기 위한 활발한 캠페인이 진행 중입니다."
 alderson_annexed_corporate:0 "양쪽 모두 플레이하기"
 alderson_annexed_corporate_desc:0 "자회사가 경쟁할 때, 우리는 항상 승리하는 팀에 있습니다."
 alderson_annexed_technocracy:0 "물질주의 신념"
 alderson_annexed_technocracy_desc:0 "과학은 선을 위한 힘으로 여겨지며, 이는 반증할 수 없는 진리로 간주됩니다."
 alderson_annexed_machine_servitor:0 "무상상적인 기준"
 alderson_annexed_machine_servitor_desc:0 "이 세계의 유기체는 우리가 제공할 수 있는 모든 것을 요청하는 데 익숙하지 않습니다."
 job_ald_matter_synthesizer:0 "디스크 물질 합성사"
 job_ald_matter_synthesizer_plural:0 "디스크 물질 합성사"
 job_ald_matter_synthesizer_desc:0 "수많은 관리자들과 노동자들이 에너지로 물질을 생성하고 있습니다. 이 시설들은 다른 어느 곳에서도 건설될 수 없습니다."
 mod_job_ald_matter_synthesizer_add:0 "$job_ald_matter_synthesizer$ 직업"
 job_ald_matter_synthesizer_drone:0 "앨더슨 물질 합성 드론"
 job_ald_matter_synthesizer_drone_plural:0 "앨더슨 물질 합성 드론"
 job_ald_matter_synthesizer_drone_desc:0 "수많은 드론들이 에너지로 물질을 생성하고 있습니다. 이 과정에는 엄청난 양의 에너지와 넓은 공간이 필요하지만, 가능합니다."
 mod_job_ald_matter_synthesizer_drone_add:0 "$job_ald_matter_synthesizer_drone$ 직업"
 job_ald_supergenerator:0 "앨더슨 기술자"
 job_ald_supergenerator_plural:0 "앨더슨 기술자"
 job_ald_supergenerator_desc:0 "수많은 관리자들과 노동자들이 동력 생산을 유지하고 있습니다. 그들은 행성보다 더 넓은 패널들과 다른 곳에서는 찾아볼 수 없는 반응로를 수리하고 있습니다."
 mod_job_ald_supergenerator_add:0 "$job_ald_supergenerator$ 직업"
 job_ald_supergenerator_drone:0 "앨더른 기술 드론"
 job_ald_supergenerator_drone_plural:0 "앨더슨 기술 드론"
 job_ald_supergenerator_drone_desc:0 "수많은 드론들이 동력 생산을 유지하고 있습니다. 그들은 거대한 패널들과 대규모 반응로들을 수리하고 있습니다."
 mod_job_ald_supergenerator_drone_add:0 "$job_ald_supergenerator$ 직업"
 job_ald_superfarmer:0 "초대규모 농부"
 job_ald_superfarmer_plural:0 "초대규모 농부"
 job_ald_superfarmer_desc:0 "수많은 관리자들과 노동자들이 식물군과 동물군을 키우고 있습니다. 어떤 식물들과 동물들은 한 가족을 한 달 동안 먹여 살릴 수 있습니다!"
 mod_job_ald_superfarmer_add:0 "$job_ald_superfarmer$ 직업"
 job_ald_superfarmer_drone:0 "앨더슨 농업 드론"
 job_ald_superfarmer_drone_plural:0 "앨더슨 농업 드론"
 job_ald_superfarmer_drone_desc:0 "수많은 드론들이 식물군과 동물군을 키우고 있습니다. 어떤 것들에든 엄청나게 넓은 공간이 필요하지만, 매우 생산량이 높습니다."
 mod_job_ald_superfarmer_drone_add:0 "$job_ald_superfarmer_drone$ 직업"
 job_ald_gases:0 "정제사"
 job_ald_gases_plural:0 "정제사"
 job_ald_gases_desc:0 "관리자들과 기술자들로 이루어진 거대한 단체가 광범위한 정제 과정을 감독하고 있습니다. 가설이지만, 이 건물을 이용하면 대기 전체를 외계 가스로 바꿔버릴 수도 있습니다."
 mod_job_ald_gases_add:0 "$job_ald_gases$ 직업"
 job_ald_gases_drone:0 "앨더슨 정제 드론"
 job_ald_gases_drone_plural:0 "앨더슨 정제 드론"
 job_ald_gases_drone_desc:0 "드론들로 이루어진 거대한 무리가 광범위한 정제 과정을 감독하고 있습니다. 어떤 정제기는 행성 전체가 담을 수 있는 가스보다 더 많은 가스를 생산합니다."
 mod_job_ald_gases_drone_add:0 "$job_ald_gases_drone$ 직업"
 job_ald_motes:0 "초규모 화학자"
 job_ald_motes_plural:0 "초규모 화학자"
 job_ald_motes_desc:0 "관리자들과 기술자들로 이루어진 거대한 단체가 광범위한 화학 공장들을 감독하고 있습니다. 이 시설은 짧은 시간 내에 행성 전체의 물질을 변화시킬 수 있습니다."
 mod_job_ald_motes_add:0 "$job_ald_motes$ 직업"
 job_ald_motes_drone:0 "앨더슨 화학 드론"
 job_ald_motes_drone_plural:0 "앨더슨 화학 드론"
 job_ald_motes_drone_desc:0 "드론들로 이루어진 거대한 무리가 광범위한 화학 공장들을 감독하고 있습니다. 사용되는 물질의 양은 행성 전체의 질량과 비등합니다."
 mod_job_ald_motes_drone_add:0 "$job_ald_motes_drone$ 직업"
 job_ald_crystals:0 "수정 감독관"
 job_ald_crystals_plural:0 "수정 감독관"
 job_ald_crystals_desc:0 "관리자들과 기술자들로 이루어진 거대한 단체가 광범위한 공장들을 감독하고 있습니다. 일반적인 도시 전체라 해도, 공장 하나의 규모에 비할바가 못됩니다."
 mod_job_ald_crystals_add:0 "$job_ald_crystals$ 직업"
 job_ald_crystals_drone:0 "앨더슨 렌즈 드론"
 job_ald_crystals_drone_plural:0 "앨더슨 렌즈 드론"
 job_ald_crystals_drone_desc:0 "드론들로 이루어진 거대한 무리가 광범위한 공장들을 감독하고 있습니다. 이 공장들의 규모는 앨더슨의 공간에서만 가능한 수준입니다."
 mod_job_ald_crystals_drone_add:0 "$job_ald_crystals_drone$ 직업"
 job_ald_hyperfoundry:0 "초거대규모 금속 세공자"
 job_ald_hyperfoundry_plural:0 "초거대규모 금속 세공자"
 job_ald_hyperfoundry_desc:0 "광범위한 주조소의 금속 세공사들입니다. 그들은 거대한 도구와 슈트를 사용하여 귀중한 합금을 엄청나게 생산합니다."
 mod_job_ald_hyperfoundry_add:0 "$job_ald_hyperfoundry$ 직업"
 job_ald_hyperfoundry_drone:0 "앨더슨 주조 드론"
 job_ald_hyperfoundry_drone_plural:0 "앨더슨 주조 드론"
 job_ald_hyperfoundry_drone_desc:0 "광범위한 주조소를 관리하는 드론들입니다. 그들이 생산하는 막대한 양의 정제 급속은 우리 구조물의 생명입니다."
 mod_job_ald_hyperfoundry_drone_add:0 "$job_ald_hyperfoundry_drone$ 직업"
 job_ald_hyperfactorio:0 "초거대규모 직공"
 job_ald_hyperfactorio_plural:0 "초거대규모 직공"
 job_ald_hyperfactorio_desc:0 "광범위한 공장의 노동자들입니다. 그들은 극도로 거대한 도구를 사용해 경탄스러울 정도로 많은 사치품과 상품을 생산합니다."
 mod_job_ald_hyperfactorio_add:0 "$job_ald_hyperfactorio$ 직업"
 job_ald_hyperartificer:0 "대규모 숙련공"
 job_ald_hyperartificer_plural:0 "대규모 숙련공"
 job_ald_hyperartificer_desc:0 "거대 공장의 엄청난 재능의 숙련공들입니다. 그들의 상품 생산 모습은 장관입니다."
 mod_job_ald_hyperartificer_add:0 "$job_ald_hyperartificer$ 직업"
 job_ald_hyperfactorio_drone:0 "앨더슨 직공 드론"
 job_ald_hyperfactorio_drone_plural:0 "앨더슨 직공 드론"
 job_ald_hyperfactorio_drone_desc:0 "거대한 공장을 관리하는 드론들입니다. 그들은 '삶'을 보다 윤택하게 만들어주는 상품을 생산합니다."
 mod_job_ald_hyperfactorio_drone_add:0 "$job_ald_hyperfactorio_drone$ 직업"
 job_ald_megascience:0 "두뇌 집단"
 job_ald_megascience_plural:0 "두뇌 집단"
 job_ald_megascience_desc:0 "가장 똑똑한 자들로, 항상 일치되는 것은 아니지만 그들 모두가 과학에 공헌합니다."
 mod_job_ald_megascience_add:0 "$job_ald_megascience$ 직업"
 job_ald_megascience_mind:0 "공유 정신체"
 job_ald_megascience_mind_plural:0 "공유 정신체"
 job_ald_megascience_mind_desc:0 "하나로서 일하는 드론들입니다. 그들은 자신의 모든 정신력을 사용해 과학에 공헌합니다."
 mod_job_ald_megascience_mind_add:0 "$job_ald_megascience_mind$ 직업"
 job_ald_megascience_robot:0 "앨더슨 신경망"
 job_ald_megascience_robot_plural:0 "앨더슨 신경망"
 job_ald_megascience_robot_desc:0 "하나로서 일하는 거대한 집단입니다. 매 순간마다 말도 안되는 수의 계산을 수행합니다."
 mod_job_ald_megascience_robot_add:0 "$job_ald_megascience_robot$ 직업"
 job_ald_duelists:0 "오락 부대"
 job_ald_duelists_plural:0 "오락 부대"
 job_ald_duelists_desc:0 "오락을 제공하기 위해 광활한 열린 공간을 사용하는 부대입니다. 그 거대한 규모로 인해, 핵무기를 쇼로 사용할 수 있습니다."
 mod_job_ald_duelists_add:0 "$job_ald_duelists$ 직업"
 job_ald_duelist_effect_desc:0 "£job_duelist£ $job_ald_duelists_plural$은 £alloys£ §Y$alloys$§!을 £unity£ §Y$unity$§! 및 £mod_planet_amenities_add£ §Y$PLANET_AMENITIES_TITLE$§!, £mod_country_naval_cap_add£ §Y$MOD_COUNTRY_NAVAL_CAP_ADD$§!으로 바꿉니다"
 job_ald_priest:0 "대사제"
 job_ald_priest_plural:0 "대사제"
 job_ald_priest_desc:0 "엄청난 수의 연설자들과 신자들입니다. 사제들은 전통과 핵심 신념을 지키기 위해 지치지 않고 일합니다."
 mod_job_ald_priest_add:0 "$job_ald_priest$ 직업"
 job_ald_deathpriest:0 "죽음의 사제"
 job_ald_deathpriest_plural:0 "죽음의 사제"
 job_ald_deathpriest_desc:0 "엄청난 수의 음울한 전도사들과 신자들입니다. 이 사제들은 사람들의 희생이 결코 헛되지 않도록 하기 위해 그들의 끝까지 함께합니다."
 mod_job_ald_deathpriest_add:0 "$job_ald_deathpriest$ 직업"
 job_ald_cultureworker:0 "앨더슨 문화 전문가"
 job_ald_cultureworker_plural:0 "앨더슨 문화 전문가"
 job_ald_cultureworker_desc:0 "예술을 만들고 보이고 재현하는 공연단입니다. 역사를 보여주는 박물관과 미술 전시회는 우리 역사의 도시보다 거대합니다."
 mod_job_ald_cultureworker_add:0 "$job_ald_cultureworker$ 직업"
 job_ald_corpmanager:0 "지역 경영자"
 job_ald_corpmanager_plural:0 "지역 경영자"
 job_ald_corpmanager_desc:0 "엄청난 수의 중간 경영자들입니다. 디스크 내의 자신의 부분에서 최대 수익을 올리기 위해 무자비하게 경쟁합니다."
 mod_job_ald_corpmanager_add:0 "$job_ald_corpmanager$ 직업"
 job_ald_memorialist:0 "죽음의 기록자"
 job_ald_memorialist_plural:0 "죽음의 기록자"
 job_ald_memorialist_desc:0 "은하에서의 생존과 생존의 결여에 헌신하는 자들입니다. 그들은 자신의 공간을 사용해 고대 도시와 역사적 건물들을 재현하여 자신이 연구하는 것을 더 잘 이해하려합니다."
 mod_job_ald_memorialist_add:0 "$job_ald_memorialist$ 직업"
 job_ald_merchant:0 "거상"
 job_ald_merchant_plural:0 "거상"
 job_ald_merchant_desc:0 "점심 식사 전에 행성 전체 물자 판매 상황을 파악할 수 있는 숙련된 판매원들입니다. 그들은 토지 대부분과 그에 대한 손바뀜을 관리합니다."
 mod_job_ald_merchant_add:0 "$job_ald_merchant$ 직업"
 building_automation_1_giga:0 "Giga-자동화 건물"
 building_automation_1_giga_desc:0 "벽에 걸린 도시 크기의 명판에는 '자동화합니다.'라고 적혀 있습니다."
 mod_building_automation_1_giga_max:0 "최대 기가 자동화 건물"
 building_automation_2_giga:0 "기계 최적화 건물"
 building_automation_2_giga_desc:0 "정말로 최적화되나요?"
 mod_building_automation_2_giga_max:0 "최대 기가 최적화 건물"
 building_automation_1_giga_alderson_tooltip:0 "건물 유지비용(자동화 구역당): §R£energy£+$@automation_district_upkeep_1_alderson$§!"
 building_automation_2_giga_alderson_tooltip:0 "자동화된 구역당 건물 유지비: §R£energy£+$@automation_district_upkeep_2_alderson$§!"
 district_alderson_logistics:0 "물류 하이퍼세그먼트"
 district_alderson_logistics_desc:0 "이 알더슨 슬라이스의 구조와 벽 안에 자리 잡은 이 물류 구역은 구조물의 관리 시스템의 대부분을 수용하며 내부 및 외부 작업을 감독하고 최적화합니다."
 district_alderson_logistics_plural:0 "물류 하이퍼세그먼트"
 district_alderson_gaia:0 "가이아 하이퍼세그먼트"
 district_alderson_gaia_desc:0 "상상할 수 없을 만큼 넓은 자연의 경관이 전체 태양계 크기만큼 펼쳐져 있으며, 가벼운 도시 또는 산업 개발을 위한 준비가 되어 있습니다."
 district_alderson_gaia_plural:0 "가이아 하이퍼세그먼트"
 district_alderson_hive:0 "하이브 하이퍼세그먼트"
 district_alderson_hive_desc:0 "정신이 아득해질 정도로 거대한 벌집 형태의 지형이 전체 태양계 크기만큼 펼쳐져 있으며, 가벼운 도시 또는 산업 개발을 위한 준비가 되어 있습니다."
 district_alderson_hive_plural:0 "하이브 하이퍼세그먼트"
 district_alderson_machine:0 "기계 하이퍼세그먼트"
 district_alderson_machine_desc:0 "정신을 아득하게 하는 거대한 기계 지형이 전체 태양계 크기만큼 펼쳐져 있으며, 가벼운 도시 또는 산업 개발을 위한 준비가 되어 있습니다."
 district_alderson_machine_plural:0 "기계 하이퍼세그먼트"
 district_alderson_ecu:0 "에큐메노폴리스 하이퍼세그먼트"
 district_alderson_ecu_desc:0 "우주 산업의 다양한 형태로 뒤덮인 면적의 천문학적 단위로, 전체 태양계를 초과하는 생산 능력을 가지고 있습니다."
 district_alderson_ecu_plural:0 "에큐메노폴리스 하이퍼세그먼트"
 district_alderson_pcc:0 "컴퓨팅 하이퍼세그먼트"
 district_alderson_pcc_desc:0 "지구의 것과 유사한 진정으로 거대한 컴퓨팅 복합체로, 전체 알더슨 슬라이스에 걸쳐 있습니다. 상상할 수 없는 처리 능력을 갖추고 있으며, 연구에 놀라운 버프를 제공합니다. 여전히 Crysis를 실행할 수는 없습니다."
 district_alderson_pcc_plural:0 "컴퓨팅 하이퍼세그먼트"
 zone_alderson_energy:0 "테라스케일 커패시터"
 zone_alderson_energy_desc:0 "물리학이 허용하는 모든 에너지를 끌어내기 위해 고군분투합니다."
 zone_alderson_food:0 "Alderson 하이퍼농장"
 zone_alderson_food_desc:0 "지구를 여러 번 삼킬 수 있는 들판이 흔들리는 태양 아래 평화롭게 자라고 있습니다."
 zone_alderson_housing:0 "거주 넥서스"
 zone_alderson_housing_desc:0 "무한히 넓은 주거 공간으로, 은하의 모든 지능체를 위한 것입니다. 이곳을 천 년 동안 걸어도 여전히 같은 거리에 있을 수 있습니다."
 zone_alderson_minerals:0 "대량 물질 합성기"
 zone_alderson_minerals_desc:0 "달 전체의 물질을 질량-에너지 등가의 자유로운 적용을 통해 존재하게 합니다."
 zone_alderson_alloys:0 "초중량 제련소"
 zone_alderson_alloys_desc:0 "하나의 조각으로 전체 전투함을 주조할 수 있을 만큼 웅장하고 위대한 대장간입니다."
 zone_alderson_cg:0 "초중량 제작기"
 zone_alderson_cg_desc:0 "인기 상품 생산에 전적으로 헌신하는 수십억 평방킬로미터. 현대 트렌드에 거의 맞출 수 있을 만큼 빠릅니다."
 zone_alderson_factory:0 "메가스프롤 제조소"
 zone_alderson_factory_desc:0 "여기에는 지능적인 사고로 만들어진 모든 고체 물체가 수백만 개, 수십억 개의 거대한 배기 스택 사이 어딘가에 존재합니다. 어디에 있는지는 묻지 마세요."
 zone_alderson_fortress:0 "태양 방벽"
 zone_alderson_fortress_desc:0 "무수히 많은 세계보다 인구가 많은 군대를 유지하는 불침투성 요새와 병영의 네트워크."
 zone_alderson_research_physics:0 "항성 입자 가속기"
 zone_alderson_research_physics_desc:0 "입자를 더욱 빠르게 가속화할 수 있는 방법을 계속 찾아갑니다."
 zone_alderson_research_society:0 "사회적 슈퍼시뮬레이터"
 zone_alderson_research_society_desc:0 "사회적 및 생물학적 상호작용을 지능체의 청소 장치보다 16조 배 빠르게 시뮬레이션합니다."
 zone_alderson_research_engineering:0 "기가엔지니어링 연구 노드"
 zone_alderson_research_engineering_desc:0 "큰 것들을 사용하여 더 큰 것들을 만드는 방법을 알아내는 중입니다."
 zone_alderson_research:0 "태양 컴퓨팅 복합체"
 zone_alderson_research_desc:0 "무의미하게 Crysis를 실행하려고 시도합니다."
 zone_alderson_unity:0 "관료적 기가 프로세서"
 zone_alderson_unity_desc:0 "끝없는 프로세서 행렬이 디지털 서류 작업만을 처리하는 데 전념하고 있습니다."
 zone_alderson_unity_spiritualist:0 "성스러운 기가템플"
 zone_alderson_unity_spiritualist_desc:0 "끝없는 예배의 건물들이 풍경을 가득 메우고, 순례자와 신자들의 행렬이 수평선까지 이어집니다."
 zone_alderson_unity_servitor:0 "유기적 기가 성소"
 zone_alderson_unity_servitor_desc:0 "끝없이 늘어선 마천루들이 지능을 가진 유기체들로 가득 차 있으며, 완벽한 환경에서 그들이 필요로 하는 모든 사치를 제공합니다."
 zone_alderson_trade:0 "생태학적 전지예측자"
 zone_alderson_trade_desc:0 "과중한 업무를 수행하는 프로세서들이 우리 제국 전체의 물류 및 경제 예측을 처리하고 있습니다."
 zone_alderson_housing_optimization:0 "주거 최적화"
 zone_alderson_housing_optimization_desc:0 "주거가 이렇게 큰 구조물에 할당되는 비효율성을 한 번에 한 시민씩 해결합니다."
 zone_alderson_infrastructure_optimization:0 "인프라 최적화"
 zone_alderson_infrastructure_optimization_desc:0 "테라미터를 가로질러 테라톤을 이동하는 데 테라초가 걸리지 않도록 방법을 찾고 있습니다."
 zone_alderson_pop_growth:0 "인구 최적화"
 zone_alderson_pop_growth_desc:0 "행동, 사회 및 생물학적 패턴을 감독하고 최적화합니다."
 pc_alderson_slice_gaia_shattered:0 "조각난 초거대구획"
 pc_alderson_slice_gaia_shattered_desc:0 "기능이 상실된 거대한 $name_alderson$의 일부입니다."
 pc_alderson_slice_gaia_shattered_adj:0 "general-talk에 포스팅하세요"
