 mem_scfe_alshigans_yutela:0 "유텔라"
 mem_scfe_savannah_ruins:0 "초원 유적"
 mem_scfe_savannah_ruins_desc:0 "적막한 문명의 잔해."
 mem_scfe_alpine_ruins:0 "고산 유적"
 mem_scfe_alpine_ruins_desc:0 "제국의 수도의 버려진 유적."
 mem_scfe_jungle_ruins:0 "정글 유적"
 mem_scfe_jungle_ruins_desc:0 "무너진 문명의 덩굴이 우거진 유적."
 mem_scfe_project_result:0 "데이터 분석"
 mem_scfe_alshigans.asteroid.name:0 "알시간 문명"
 mem_scfe_alshigans.asteroid.desc:0 "알시간은 조류 종으로, 8세기 전부터 은하 탐사를 시작했습니다. 그들의 뛰어난 적응력 덕분에 다양한 행성을 식민지화할 수 있었고, 이는 별들 사이에서 빠른 확장을 가능하게 했습니다. 그러나 그들의 진보는 원시적인 초공간 기술에 의해 저해되었습니다. 그들은 자원fulness에도 불구하고, 아무도 연구할 생각을 하지 않았던 비전통적인 개념을 바탕으로 기능적인 엔진을 개발했습니다. 안타깝게도, 이 접근 방식은 막다른 길로 이어져 짧은 거리 여행만 가능하게 했고, 엔진 재충전을 위해 여러 날이 필요했습니다."
 mem_scfe_alshigans_savannah.name:0 "하늘의 길"
 mem_scfe_alshigans_savannah.desc:0 "알시기안 함선의 공간 추진 엔진은 확실히 비전통적이었지만, 하늘을 가로지르며 순수한 에너지의 긴 흔적을 남기는 놀라운 광경이었습니다. 이 경이로운 장관은 분명 지상에서도 볼 수 있었습니다. 그러나 이 에너지 흔적이 사라지는 데 몇 분이 걸리는 지속적인 위험 때문에 조종사들은 신중한 항로 계획이 필요했습니다."
 mem_scfe_alshigans.alpine.name:0 "울라디르, 알시간의 수도"
 mem_scfe_alshigans.alpine.desc:0 "알시기안의 버려진 산악 수도에 대한 초기 탐사는 놀라운 건축 기술을 드러냈으며, 이는 봉우리에서 아래의 계곡까지 정교하게 조각되었습니다. 많은 건물들은 환경을 대체하는 것이 아니라 통합하는 놀라운 공학적 업적입니다. 그들의 적응력은 단순히 생물학의 산물이 아니었으며, 환경을 보존하고 그것을 지배하는 것이 아니라 자신의 삶에 통합하려는 헌신에서 비롯되었습니다."
 mem_scfe_alshigans_jungle.name:0 "우주 속의 고독"
 mem_scfe_alshigans_jungle.desc:0 "알시간은 은하를 탐험하려는 열망이 크지만, 다른 우주 항해 제국과는 결코 마주치지 않았습니다. 기록에 따르면 먼 항성계에서 원시 종의 발견이 언급되었고, 이는 상당한 열정을 불러일으켰습니다. 그러나 이 만남은 원주율 종의 발전을 방해하지 않기 위해 해당 항성계에 대한 추가 진입을 금지하는 법률의 제정을 촉발했습니다. 알시간 함선의 뚜렷한 존재는 비밀스러운 여행에는 너무 눈에 띄게 만들었고, 추가적인 간섭을 방지하기 위해 엄격한 제한이 부과되었습니다."
 mem_scfe_alshigans.11.name:0 "새로운 스포츠 대회"
 mem_scfe_alshigans.11.desc:0 "§Y[mem_scfe_ships_race.GetName]§!에서 새로운 스포츠 대회의 시작에 대한 보고가 접수되었습니다: Alshigan 엔진으로 개조된 함선을 사용하는 항성계 경주입니다. 이 광경은 분명히 놀라운 것으로, 맨눈으로도 감지할 수 있으며, 최소한 이 사라진 종의 경험의 일부가 다시 살아나는 듯한 감정을 불러일으킵니다."
 mem_scfe_alshigans.12.name:0 "알시간의 비밀"
 mem_scfe_alshigans.12.desc:0 "우리 과학자들은 알시간의 건축 기술을 깊이 연구하였고, 그들의 고급 기술 중 일부를 통합하여 우리의 식민지를 개선하는 데 성공하였습니다."
 mem_scfe_alshigan_architecture:0 "알시간 건축"
 mem_scfe_alshigan_architecture_desc:0 "알시간의 건축 기술을 통합하여 우리의 식민지를 개선하였습니다."
 mem_scfe_ships_race:0 "알시간 함선 경주"
 mem_scfe_ships_race_desc:0 "알시간 엔진으로 개조된 함선을 사용하는 행성 간 경주가 여기에서 열립니다. 그 광경은 눈으로 직접 보아도 부인할 수 없이 인상적입니다."
 mem_scfe_alshigans_engines:0 "알시간 엔진"
 mem_scfe_alshigans_engines_desc:0 "알시간 엔진의 비효율성에도 불구하고, 그들의 집속 시스템은 놀라울 정도로 혁신적이며, 우리의 에너지 무기를 증강할 기회를 제공합니다."
 mem_scfe_alshigans_chain_title:0 "선조 - 알시간"
 mem_scfe_alshigans_chain_desc:0 "$mem_scfe_alshigans_init.2.desc$"
 mem_scfe_alshigans_artifacts:0 "알시간 유물 회수됨"
 mem_scfe_alshigan_engine_activated:0 "알시간 엔진 활성화됨"
 r_mem_scfe_alshigan_engine:0 "알시간 엔진"
 r_mem_scfe_alshigan_engine_desc:0 "알시간이 예전에 사용하던 독특한 엔진 중 하나를 회수했습니다. 현재 모델에 비해 효율성은 떨어지지만, 완전히 새로운 에너지 조작 개념을 사용하여 작동합니다."
 artifact_mem_scfe_precursor_alshigans_research:0 "알시간의 비밀"
 artifact_mem_scfe_precursor_alshigans_research_desc:0 "알시간의 비밀을 더 깊이 파헤칩니다."
 SCFE_PRECURSOR_ALSHIGANS_SECRETS:0 "알시간의 비밀을 파헤치다"
 SCFE_PRECURSOR_ALSHIGANS_SECRETS_DESC:0 "우리 과학자들은 우리가 수집한 모든 데이터를 신중하게 검토하여 알시간의 지식을 우리의 지식에 추가하려고 합니다."
 mem_scfe_war_torn.1.name:0 "전쟁으로 피폐해진 제국"
 mem_scfe_war_torn.1.desc:0 "흩어진 잔존자로부터 얻은 정보에 따르면 §Y[From.GetName]§!는 약 700년 전 치열한 갈등에 휘말린 군사적 우주 제국의 주둔지였던 것으로 보입니다. 행성의 현재 상태는 이 고대 전쟁의 무자비한 본성을 뚜렷하게 드러냅니다. 심각한 포격에도 불구하고, 우리 팀은 산 깊숙이 자리 잡고 있는 거의 온전한 요새를 관찰하였으며, 탐사를 시작하기 위해 캠프를 설치할 것을 제안합니다."
 mem_scfe_war_torn.2.name:0 "금고 내용 분석 완료"
 mem_scfe_war_torn.2.desc:0 "금고의 내용물과 주둔지의 데이터베이스, 그리고 보안 보고서에 대한 우리의 연구가 완료되었습니다. 클론들은 자신들이 찾고 있는 것이 무엇인지 정확히 알고 있었습니다: 독특한 길쭉한 상자입니다. 당시 시스템을 방어하던 궤도 기지가 그들의 도착 경로를 추적할 수 있었으나, 그 기지는 파괴되었습니다. 이 경로를 따라가면 그들의 기원에 대한 추가 정보를 발견할 수 있을 것으로 예상합니다."
 mem_scfe_war_torn.3.name:0 "버려진 기지"
 mem_scfe_war_torn.3.desc:0 "이 행성에서 숨겨진 기지를 발견한 후, 즉시 탐사대를 파견하여 조사하였습니다. 유감스럽게도, 기지는 모든 내용물이 철저히 제거되어 있었습니다. 클론의 흔적은 여기서 끝나는 것처럼 보이지만, 미래에 또 다른 단서가 나타나기를 희망합니다."
 mem_scfe_war_torn_dig:0 "요새를 위한 전투"
 mem_scfe_war_torn_dig_desc:0 "무자비한 전쟁으로 황폐해진 세계에서 잃어버린 요새의 유적을 탐사할 것입니다."
 mem_scfe_war_torn_dig.1.name:0 "파괴된 문"
 mem_scfe_war_torn_dig.1.desc:0 "요새의 중무장한 게이트 근처에서 치열한 전투가 벌어졌으며, 이제 플라스마 무기에 의해 돌파되었습니다. 우리의 과학 리더는 공격자들이 단순한 파괴를 목표로 했다면 궤도로부터 전체 산을 obliterate할 수 있었을 것이라고 주장하지만, 그들은 요새에 대한 비용이 많이 드는 지상 공격을 선택했습니다. 그들이 추구한 것은 내부에 포함된 특정한 무언가임이 분명합니다."
 mem_scfe_war_torn_dig.2.name:0 "타락한 요새"
 mem_scfe_war_torn_dig.2.desc:0 "요새 안에서는 군인의 해골이 흩어져 있는 음산한 장면이 펼쳐집니다. 전투는 치열했지만, 공격자들은 끊임없는 증원군을 유지하며 지친 방어군을 압도했습니다. 이상하게도, 승리한 세력은 전사한 동료의 시신을 회수하려는 노력을 하지 않았고, 대신 목표를 향해 나아가다가 급히 후퇴했습니다. 남은 질문은 그들이 그렇게 열망했던 보상이 무엇이었는가입니다."
 mem_scfe_war_torn_dig.2.a:0 "이 시체들은 익숙한 모습입니다..."
 mem_scfe_war_torn_dig.2.b:0 "분석을 진행합니다."
 mem_scfe_war_torn_dig.3.name:0 "클론 군인"
 mem_scfe_war_torn_dig.3.desc_1:0 "공격자들은 독특한 전투 갑옷을 입고 있었지만, 우리의 종과 불안한 유사성을 지니고 있어 분석을 진행하게 되었습니다. 놀랍게도 그들은 우리와 유사한 클론 군인으로 밝혀졌습니다! 이 사실은 우리 창조자들이 얼마나 오랫동안 우리를 은하계의 갈등에서 그들의 졸개로 사용해왔는지에 대한 깊은 사유를 불러일으킵니다. 이 요새가 그들에 대한 통찰을 제공할 수 있을까요? 팀은 주둔지의 핵심으로 이어지는 중앙 구덩이로 하강하기 위한 엘리베이터를 설치하기 위해 동원되고 있습니다."
 mem_scfe_war_torn_dig.3.desc_2:0 "분석 결과 예상치 못한 사실이 드러났습니다: 공격자들은 전적으로 클론입니다. 우리는 이 기술을 활용하고 있지만, 이 군인들은 생식 능력을 희생하면서 상당히 강화되었습니다. 팀은 주둔지의 중심 구덩이로 내려가기 위한 엘리베이터를 적극적으로 준비하고 있습니다."
 mem_scfe_war_torn_dig.3.desc_3:0 "분석 결과 예상치 못한 사실이 드러났습니다: 공격자들은 전적으로 클론입니다! 이 기술은 이러한 군인들로 인해 고급화되어 최대한의 한계에 도달했으며, 그들의 생식 능력을 희생하면서 튼튼한 강화가 이루어졌습니다. 팀은 주둔지의 중심 구덩이로 내려갈 엘리베이터를 적극적으로 준비하고 있습니다."
 mem_scfe_war_torn_dig.4.name:0 "금고"
 mem_scfe_war_torn_dig.4.desc:0 "요새 깊숙한 곳에는 한때 위압적이었던 금고가 자리하고 있었으나, 이제는 우리의 여정 중 만난 다른 방어 시설들처럼 침입당한 상태입니다. 비어 있는 방을 예상했으나, 우리의 기대는 부분적으로 확인되었습니다: 금고의 중앙 부분은 완전히 비어 있어, 그곳에 있던 것이 강제로 제거되었음을 나타냅니다. 금고의 나머지 부분은 신비로운 장치들이 담긴 금속 상자들로 가득 차 있으며, 이들의 비밀을 풀기 위해서는 광범위한 분석 과정이 필요할 것입니다."
 mem_scfe_war_torn_lore.1.name:0 "클론 군인"
 mem_scfe_war_torn_lore.1.desc:0 "주둔지의 데이터베이스에 자세히 설명된 바와 같이, 클론 군인들은 정당한 이유로 두려운 적이었습니다. 유전자 강화로 사실상 저지할 수 없는 존재로 설계된 그들은 끊임없이 보충 가능한 군대를 구성하며, 빠르게 배양되어 은하 전역으로 전투에 파견되었습니다. 그들은 분명히 더 큰 힘을 위한 졸개였지만, 그들의 주인에 대한 정보는 기록 내에서 discernible하지 않았습니다."
 mem_scfe_war_torn_lore.1.desc_c:0 "주둔지의 데이터베이스에 자세히 설명된 바와 같이, 우리의 동료 클론 군인들은 정당한 이유로 두려운 적이었습니다. 유전자 강화로 거의 멈출 수 없는 존재로 설계된 그들은 끊임없이 보충 가능한 군대를 구성하였으며, 빠르게 배양되어 은하 전역으로 전투에 파견되었습니다. 우리와 마찬가지로 그들은 더 큰 힘을 위한 졸이었으나, 기록 내에서 우리의 주인에 대한 정보는 discernible하지 않았습니다."
 mem_scfe_war_torn_lore.1.a:0 "안타깝습니다."
 SCFE_WAR_TORN_PROJECT_1:0 "고대의 길"
 SCFE_WAR_TORN_PROJECT_1_DESC:0 "주둔지에서 발견된 좌표를 따라 이 항성계로 왔습니다. 이제 클론의 잔여 흔적이 있는지 찾아야 합니다."
 mem_scfe_clone_prowess:0 "클론 군인 영감"
 mem_scfe_clone_prowess_desc:0 "고대 클론 군인들이 보여준 뛰어난 능력과 전문성은 우리 군대가 개선을 위해 노력하도록 영감을 주었습니다. 우리는 새로운 훈련 프로그램을 시작했으며, 적에 대한 승리를 보장하기 위해 새로운 전략을 면밀히 연구하고 있습니다."
 mem_scfe_znkar_chain_title:0 "선조 - 제트카르"
 mem_scfe_znkar_chain_desc:0 "고대 문명이 수천 년 전 우리 고향 세계 위에 관측소를 세웠습니다. 우리는 그들이 누구였는지, 그리고 그들의 운명이 무엇이었는지를 밝혀내고자 합니다."
 mem_scfe_znkar_artifacts:0 "Z'nkar 유물 회수됨"
 SCFE_ZNKAR_STATION_PROJECT_1:0 "관측소 탐사"
 SCFE_ZNKAR_STATION_PROJECT_1_DESC:0 "우리 고향 세계의 궤도를 따라 이전에 감지되지 않았던 외계 구조물이 나타났습니다. 우리의 감지기는 이 물체가 방금 전까지 은폐되어 있었으며, 갑작스러운 시스템 오류로 인해 시각적으로 드러났음을 나타냅니다.\n초기 스캔 결과, 이것은 알 수 없는 기원의 관측소로 보입니다. 이 구조물은 우리의 행성 위에 불확실한 기간 동안 은폐되어 있었던 것으로 보이며, 아마도 우리의 문명을 관찰하고 있었던 것 같습니다. 현재 이 관측소는 활동의 징후를 보이지 않으며, 버려진 것처럼 보입니다.\n우리는 이 관측소를 조사하기 위해 탐사 팀을 파견하고 있습니다."
 SCFE_ZNKAR_NUKED_PROJECT:0 "파괴된 Z'nkar 행성"
 SCFE_ZNKAR_NUKED_PROJECT_DESC:0 "Z'nkar 회수 명령의 좌표에 도착했습니다. 추가 단서로 이어지는 흔적을 탐지하기 위한 스캔이 진행 중입니다."
 SCFE_ZNKAR_NUKED_MOON_PROJECT:0 "Z'nkar 달 기지"
 SCFE_ZNKAR_NUKED_MOON_PROJECT_DESC:0 "Z'nkar 감시 팀은 달의 비밀 기지로 후퇴하였으며, 이는 마지막 저항이거나 그들의 유산을 보존하기 위한 것일 수 있습니다. 우리는 그들이 무엇을 계획하고 있었는지 밝혀내야 합니다."
 SCFE_ZNKAR_RELIC_ANALYSIS:0 "Z'kar 유물 분석"
 SCFE_ZNKAR_RELIC_ANALYSIS_DESC:0 "Z'nkar 유물에 대한 연구를 준비하면서, 달 기지에서 가져온 이 유물의 휴면 상태는 매혹적인 수수께끼를 제시합니다. 귀환하는 동안의 초기 관찰에서는 유물과 우리의 함선 간의 예상치 못한 상호작용이 드러났습니다. 이 유물은 우리의 함선의 방어막 능력과 추진 효율성을 향상시킨 것으로 보이며, 이는 고급 형태의 에너지 조작 또는 증강 기술을 암시합니다. 이제 중요한 질문은 이 유물이 활성화되었을 때의 효과입니다. Z'nkar가 마지막 출발 전에 활성화한 이 유물은 아직 발굴되지 않은 비밀을 간직하고 있습니다."
 mem_scfe_znkar_pakrta:0 "파크르타"
 mem_scfe_znkar_dantiy:0 "다'ntiY"
 mem_scfe_znkar_kamva:0 "카므바"
 mem_scfe_znkar.2.name:0 "적색 경고!"
 mem_scfe_znkar.2.desc:0 "§Y[znkar_start_planet.GetName]§! 궤도를 돌고 있는 이전에 탐지되지 않은 외계 구조물이 방금 나타났습니다. 우리의 감지기는 이 물체가 방금 전까지 은폐되어 있었으며, 갑작스러운 시스템 오류로 인해 시각적으로 드러났음을 나타냅니다.\n초기 스캔 결과, 이것은 알 수 없는 기원의 관측소로 보입니다. 이 구조물은 우리의 행성 위에 불확실한 기간 동안 은폐되어 있었던 것으로 보이며, 우리의 문명을 관찰하고 있었을 가능성이 있습니다. 현재 이 관측소는 활동의 징후가 전혀 없으며, 버려진 상태인 것 같습니다.\n이 관측소를 조사하기 위해 탐사 팀을 파견할 것을 강력히 권장합니다."
 mem_scfe_znkar.3.name:0 "버려진 관측소"
 mem_scfe_znkar.3.desc:0 "최근에 은폐가 해제된 외계 관측소에 파견된 탐사 팀이 구조물이 고대의 버려진 상태임을 확인했습니다. 곳곳에서 부패의 징후가 뚜렷하게 나타나며, 여러 시스템 고장이 시간이 지남에 따라 심화되고 있습니다. 제어소에 접근하자, 우리의 과학자들은 방대한 역사적 데이터의 보물창고를 발견했습니다.\n관측소의 기록 보관소에는 수천 년 전 우리의 먼 조상에 대한 광범위한 기록이 포함되어 있어, 우리의 과거를 엿볼 수 있는 독특한 창을 제공합니다. 그러나 최근 관측 기록은 발견되지 않아, 오랜 비활동 기간을 시사합니다. 우리는 또한 우리의 감시자들의 이름을 발견했습니다: §HZ'nkar§!."
 mem_scfe_znkar.4.name:0 "관측소 컴퓨터"
 mem_scfe_znkar.4.desc:0 "제어소의 데이터에 대한 추가 분석 결과 놀라운 발견이 있었습니다: 긴급 소환 명령이 기지의 인원에게 발령되었습니다. 이 지시는 즉각적이어서 기지를 해체하거나 퇴역시키는 것을 불가능하게 했습니다. 승무원들은 서둘러 대피하였고, 우리 과학자들이 기지의 희미해지는 데이터베이스에서 추출한 목적지로 향했습니다. 이는 전력 핵이 완전히 정지되기 직전의 일이었습니다.\n이 마지막 정보는 한때 우리를 지켜보았던 문명의 기원과 동기를 밝혀내는 열쇠가 될 수 있습니다."
 mem_scfe_znkar.4.a:0 "사고를 방지하기 위해 기지를 해체합니다."
 mem_scfe_znkar.5.name:0 "파괴된 Z'nkar 행성"
 mem_scfe_znkar.5.desc:0 "지정된 좌표에 도착하자, 우리는 냉혹한 현실과 마주하게 됩니다: 한때 생명으로 가득했던 행성이 이제는 폐허가 되었고, 그 표면은 재앙적인 전쟁의 잔존자들로 인해 상처투성이입니다. 두꺼운 핵 겨울이 땅을 덮고 있으며, 방사선 수치는 치명적으로 높습니다. 우리의 초기 스캔이 진행 중이며, 과거 문명의 흔적이나 관측소의 긴급 대피에 대한 단서를 찾고 있습니다."
 mem_scfe_znkar.6.name:0 "Z'nkar 유적 발견"
 mem_scfe_znkar.6.desc:0 "우리의 스캔 결과, 허물어진 구조물 군집에서 희미하지만 뚜렷한 에너지 신호가 감지되었습니다. 행성 표면의 광범위한 파괴와 이 건물들의 불안정한 상태를 고려하여, 우리는 발굴 및 안정화를 위한 필수 자재를 갖춘 안전한 기지 캠프를 설치하기로 결정했습니다."
 mem_scfe_znkar.7.name:0 "Z'nkar 달 기지"
 mem_scfe_znkar.7.desc:0 "우리의 최신 탐사는 달에서 한때 숨겨져 있던 기지를 발견하게 되었으며, 이는 고대 소행성의 충돌로 인해 부분적으로 드러났습니다. 광범위한 피해와 오랜 시간이 흐른 덕분에 기지의 방어 시스템은 더 이상 작동하지 않아 우리는 방해받지 않고 접근할 수 있었습니다. 파괴된 복도를 지나 우리는 컴퓨터실에 성공적으로 침입했습니다. 여기에는 기지의 핵심이 있습니다: 온전한 데이터뱅크가 있으며, 이는 Z'nkar 문명의 최후의 전략과 희망을 밝혀낼 잠재력을 지니고 있습니다. 우리가 Z'nkar의 최종 계획과 그들의 신비로운 적의 정체에 대해 찾고 있는 답이 곧 우리의 손에 들어올 수 있습니다."
 mem_scfe_znkar.8.name:0 "보이지 않는 전쟁"
 mem_scfe_znkar_administration_methods:0 "Z'nkar 행정 방법"
 mem_scfe_znkar_administration_methods_desc:0 "$mem_scfe_znkar.10.desc$"
 mem_scfe_znkar_relic_1:0 "Z'nkar 왜곡 엔진"
 mem_scfe_znkar_relic_1_desc:0 "이 기술적 경이로움은 선조들의 고급 능력을 보여줍니다. 그 주요 기능은 우리의 함선을 둘러싼 초공간의 상태를 조작하는 것으로 보이며, 그 결과 성능이 향상됩니다."
 mem_scfe_znkar_relic_2:0 "$mem_scfe_znkar_relic_1$"
 mem_scfe_znkar_relic_2_desc:0 "$mem_scfe_znkar_relic_1_desc$"
 mem_scfe_znkar_observation_tech:0 "Z'nkar 관측 기술"
 mem_scfe_znkar_observation_tech_desc:0 "Z'nkar는 원시 문명을 관찰하는 데 많은 경험이 있으며, 우리는 그들이 축적한 지식을 잘 활용할 수 있습니다."
 r_mem_scfe_znkar_distortion_generator:0 "$mem_scfe_znkar_relic_1$"
 r_mem_scfe_znkar_distortion_generator_desc:0 "$mem_scfe_znkar_relic_1_desc$"
 mem_scfe_znkar_dig:0 "Z'nkar 건물 발굴"
 mem_scfe_znkar_dig_desc:0 "$mem_scfe_znkar.6.desc$"
 mem_scfe_znkar_dig.1.name:0 "기지"
 mem_scfe_znkar_dig.1.desc:0 "우리의 방사선 차폐 기지 캠프가 설립됨에 따라, 이제 잔해가 가득한 장소의 발굴을 시작할 준비가 되었습니다. 우리의 고급 스캐너는 유적 아래에 방과 복도의 네트워크를 매핑하였으며, 이는 상당한 지하 구조물이 존재함을 시사합니다. 그러나 탐지된 에너지 신호의 정확한 출처는 여전히 불분명하며, 주변의 잔해와 간섭에 가려져 있습니다. 우리는 깊이 파고들 준비를 하면서 잠재적인 위험과 이 한때 번성했던 세계의 그림자 속에 기다리고 있는 신비를 염두에 두고 조심스럽게 진행합니다."
 mem_scfe_znkar_dig.2.name:0 "지하 복합체"
 mem_scfe_znkar_dig.2.desc:0 "우리의 노력은 주목할 만한 발견으로 이어졌습니다: 면밀한 발굴을 통해 드러난 지하 복합체입니다. 구조의 불안정한 특성으로 인해 초기 탐사를 위해 드론을 배치했습니다. 드론은 화면과 컴퓨팅 장치로 가득 찬 크고 원형의 방의 이미지를 전달했습니다. 놀랍게도, 전쟁실의 특징을 지닌 이 방은 여전히 작동 중이며, 우리가 추적해온 에너지 신호를 방출하고 있습니다. 이 발견은 우리의 조사 중심지를 정확히 지목하는 중요한 돌파구를 의미합니다. 우리 팀의 안전한 접근을 확보하기 위해 노력하는 동안, 이 활성 허브는 이 세계의 재앙적인 운명의 비밀을 밝혀낼 가능성을 지니고 있습니다."
 mem_scfe_znkar_dig.3.name:0 "전쟁실"
 mem_scfe_znkar_dig.3.desc:0 "신중한 준비 기간을 거쳐 우리는 마침내 전쟁실에 들어섰습니다. 우리의 초기 관찰에 따르면 이 복합체는 원래 군사적 목적을 위해 설계된 것이 아닙니다. 이는 우리 고향 행성 위의 관측소와 같은 수많은 관측소에서 수집된 데이터의 중앙 노드로 보이며, 여러 항성계를 아우르는 방대한 감시 네트워크를 나타냅니다. 현재 정적만을 표시하는 화면은 갈등에 대비하지 못한 제국의 마지막 잔존자들에 대한 조용한 증언입니다. 이 시설이 민간인 시설로 보이는 가운데 임시 군사 센터로 사용된 것은 Z'nkar의 평화주의적 성향이나 초기 군사 인프라 손실 이후의 절박한 재활용을 암시합니다. 여기서 수집된 데이터에 대한 종합 분석은 시간이 필요하지만, 이 제국과 그 예상치 못한 멸망의 신비를 밝혀낼 준비가 되어 있습니다."
 mem_scfe_znkar_dig.4.name:0 "보이지 않는 적"
 mem_scfe_znkar_dig.4.desc:0 "전쟁실의 기록은 Z'nkar의 몰락에 대한 가슴 아픈 이야기를 드러냈습니다. 그들은 보이지 않는 적에게 기습당했으며, 그 적은 그들의 기술보다 훨씬 우수한 은폐 기술을 보유하고 있었습니다. 이 적들은 치명적인 정밀도로 공격하여 Z'nkar의 방어를 무력화한 후 사라졌습니다. 두 번째, 더 파괴적인 공격을 예상한 Z'nkar는 인구를 구하기 위해 필사적인 대피를 시작했습니다. 한편, 감시 팀은 달의 비밀 기지로 후퇴했으며, 이는 마지막 저항이거나 그들의 유산을 보존하기 위한 것이었을 가능성이 있습니다. 안타깝게도 대피가 진행 중일 때 압도적인 적 함대가 돌아와 행성에 파괴를 퍼부어 결국 폐허로 남겨졌습니다. 우리는 이제 달로 탐사를 전환하여 Z'nkar의 마지막 노력과 그들의 신비로운 공격자의 정체에 대해 더 많은 것을 밝혀내기를 희망하고 있습니다."
 artifact_mem_scfe_precursor_znkar_research:0 "Z'nkar의 비밀"
 artifact_mem_scfe_precursor_znkar_research_desc:0 "Z'nkar의 비밀을 더 깊이 탐구합니다."
 SCFE_PRECURSOR_ZNKAR_SECRETS:0 "Z'nkar의 비밀을 탐구합니다"
 SCFE_PRECURSOR_ZNKAR_SECRETS_DESC:0 "우리 과학자들은 우리가 수집한 모든 데이터를 신중하게 검토하여 Z'nkar의 지식을 우리의 지식에 추가하려고 합니다."
 mem_scfe_vanishing_act.1.name:0 "초기 평가 보고서"
 mem_scfe_vanishing_act.1.desc:0 "§Y[From.GetName]§! 궤도로 진입하자, 우리의 선박은 고급 문명의 여러 지표를 확인했습니다. 안정된 궤도에 있는 수많은 인공 위성과 여러 대형 우주 정거장의 존재는 거주자들의 기술적 능력을 명확히 증명합니다. 놀랍게도, 이 구조물들은 온전하고 기능적이지만 활동의 징후는 전혀 보이지 않습니다.\n게다가, 행성에 대한 종합적인 스캔은 혼란스러운 상황을 제시합니다. 광활한 도시와 복잡한 교통망을 포함한 표면의 도시 인프라가 눈에 띄는데도 불구하고, 고급 사회의 전형적인 특징인 전자기 전송이 완전히 결여되어 있습니다. 더욱 혼란스러운 것은, 우리의 스캐너가 표면에서 생명체나 어떤 움직임의 징후도 탐지하지 못했다는 것입니다. 이 음산한 침묵은 문명의 상태에 대한 중대한 질문을 제기하며, 추가 조사가 필요합니다. 우리는 이 이상하고 불안한 상황에 대한 더 많은 데이터를 수집하기 위해 가까운 정찰 임무를 시작할 준비를 하고 있습니다."
 mem_scfe_vanishing_act_dig:0 "소멸 행위"
 mem_scfe_vanishing_act_dig_desc:0 "우리는 주민이 없는 세계를 발견했습니다. 여기서 무슨 일이 있었던 걸까요? 이 미스터리를 조사해야 합니다."
 mem_scfe_vanishing_act_dig.1.name:0 "비어 있는 기지"
 mem_scfe_vanishing_act_dig.1.desc:0 "§Y[From.Planet.GetName]§! 궤도를 도는 가장 가까운 우주 정거장을 탐사하는 동안 우리는 일련의 혼란스러운 발견을 하였습니다. 정거장은 구조적으로 온전하고 완전히 작동 중이지만, 거주자는 전혀 없는 상태입니다. 승무원과 거주자들이 갑작스럽게 떠났거나, 더 불안하게도, 우리의 도착 직전에 사라진 것처럼 보입니다. 개인 소지품, 작동 콘솔, 생명 유지 시스템 모두 갑작스럽고 예기치 않은 대탈출을 암시하는 상태입니다.\n그러나 가장 우려스러운 발견은 정박된 우주선과 관련이 있습니다. 모든 도킹 베이가 차지되어 있어 모든 선박이 정거장으로 대규모 귀환했음을 나타냅니다. 선박의 블랙 박스를 분석한 결과, 각 선박의 자동 시스템이 조종사가 반응하지 않을 경우 표준 비상 프로토콜을 실행하도록 트리거되었습니다: 조종사가 반응하지 않을 경우 가장 가까운 정거장으로 돌아가고 도킹하라는 것입니다. 이 프로토콜의 활성화는 모든 조종사와 승무원에게 영향을 미치는 동시적이고 광범위한 사건을 시사합니다.\n현재 우리는 행성 표면을 직접 탐사하기 위해 우주 정거장을 떠나고 있으며, 특히 도시 중심지를 목표로 추가 조사를 진행할 예정입니다. 이 현상의 본질은 여전히 깊은 혼란을 주며, 전체 문명이 갑자기 사라진 것에 대한 즉각적인 설명이 없습니다. 우리는 진행하면서 주의와 철저한 분석을 우리의 원칙으로 삼을 것입니다."
 mem_scfe_vanishing_act_dig.2.name:0 "천 개의 노래의 도시"
 mem_scfe_vanishing_act_dig.2.desc:0 "§Y[From.Planet.GetName]§! 근처의 주요 도시 중심지에 착륙한 후, 우리는 광범위한 지상 탐사를 시작했습니다. 이 도시는 거대한 유령 도시로, 우주 정거장에서 목격된 불안한 버려짐을 훨씬 더 큰 규모로 반영하고 있습니다. 거리에는 정지된 차량들이 늘어서 있고, 주택들은 갑작스러운 유기迹을 보이고 있습니다. 우리가 행성의 주민으로 확인한 §HVaanclars§!의 인프라와 기술 수준은 인상적으로 고급스럽지만, eerily 조용합니다.\n우리 번역가들은 Vaanclar 언어를 성공적으로 해독하여 그들의 디지털 기록에 접근할 수 있게 되었습니다. 흥미롭게도, Vaanclars는 시각적 인식에 의존하지 않았으며, 대신 환경을 탐색하고 상호작용하기 위해 소리의 교향곡을 사용하는 정교한 형태의 에코로케이션을 개발했습니다. 이 독특한 감각 접근 방식은 Vaanclars나 그들의 실종에 대한 시각적 기록이나 이미지가 없음을 의미합니다. 우리는 방대한 역사적 및 과학적 데이터를 수용할 가능성이 있는 주요 아카이브 시설을 발견했습니다. 우리는 Vaanclar 문명과 그들의 신비로운 실종을 둘러싼 상황에 대한 더 많은 정보를 발견하기를 희망하며 이 아카이브에 들어갈 준비를 하고 있습니다."
 mem_scfe_vanishing_act_dig.3.name:0 "반클라르 아카이브 조사"
 mem_scfe_vanishing_act_dig.3.desc:0 "바안클라르 기록 보관소에서의 조사 결과는 이 문명의 감각 인식의 신비에 가려져 있지만 중요한 통찰력을 제공하였습니다. 기록 보관소는 세심하게 관리되었으며 놀라울 정도로 포괄적이어서 방대한 지식을 제공합니다. 그러나 그 지식의 대부분은 우리에게 낯선 감각 경험에 맞춰져 있습니다. 그럼에도 불구하고 우리의 기술은 그들의 기록의 기초 내용을 해독할 수 있게 해주었습니다.\n가장 중요한 발견은 §H더 큰 노래에 귀 기울이기§!라는 최근의 중대한 과학적 노력과 관련이 있습니다. 이 문구는 주요 연구 센터에서 수행된 실험과 연관되어 있습니다.\n전체 바안클라르 인구가 이 프로젝트에 몰두했던 것으로 보입니다. 기록은 이 실험의 시작 이후 갑자기 끝나며, 이후의 업데이트나 결과는 문서화되어 있지 않습니다. 이 기록의 갑작스러운 중단은 그들의 실종 시점과 일치합니다. 우리는 이제 이 실험과 그 잠재적 결과에 대한 보다 구체적인 정보를 발견하기 위해 지정된 연구 센터로 향하고 있습니다."
 mem_scfe_vanishing_act_dig.4.name:0 "위대한 송가"
 mem_scfe_vanishing_act_dig.4.desc:0 "Vaanclar 연구 센터에 대한 우리의 탐사는 획기적인 발견으로 이어졌습니다. 이 시설은 Vaanclar의 음향 과학에 대한 숙련도를 증명하는 장소로, 주로 조화를 활용하여 우리가 알고 있는 현실의 경계를 넘어설 가능성에 초점을 맞추고 있었습니다. 센터의 방대한 기록은 여전히 운영 시스템을 통해 접근할 수 있으며, 야심차고 전례 없는 실험을 자세히 설명하고 있습니다: 정신적으로 재능 있는 개인들의 합창을 사용하여 더 높은 차원으로 관통할 수 있는 찬트를 방출하는 것입니다.\n연구 센터의 중앙 실을 성공적으로 열었을 때, 우리는 현재의 과학적 이해를 초월하는 현상을 마주했습니다. 고립된 금고 안에서 우리는 수십억 개의 목소리로 구성된 조화로운 합창과 이 실의 중심에 있는 현실의 구조에 찢어진 틈을 마주했습니다. 그러나 더 깊이 파고들수록 그 틈은 불안정한 징후를 보이기 시작했고, 우리의 안전을 보장하기 위해 신속히 해당 지역을 대피해야 했습니다.\n우리가 배로 달려가던 중 이 만남의 가장 오싹한 측면은, 이 초현실적인 합창을 구성하는 목소리들이 틀림없이 Vaanclar의 것이며, 그것들이 균열 너머에서 왔다는 사실을 깨달았다는 점이었습니다."
 mem_scfe_vanishing_act_dig.4.a:0 "불길한."
 mem_scfe_infrastructure:0 "생존 인프라"
 mem_scfe_infrastructure_desc:0 "버려진 건물, 황폐한 거리, 손대지 않은 시설들은 번창할 수 있었던 정착지의 가능성을 암시합니다. 시간이 흘렀음에도 불구하고 남아 있는 인프라는 재활용될 수 있으며, 새로운 식민지가 세워질 수 있는 독특한 기반을 제공합니다."
 mem_scfe_subterranean_knowledge_1:0 "지하 건축 지식"
 mem_scfe_subterranean_knowledge_2:0 "$mem_scfe_subterranean_knowledge_1$"
 mem_scfe_subterranean_bombardment_1:0 "지하 대인 폭격"
 mem_scfe_subterranean_bombardment_2:0 "$mem_scfe_subterranean_bombardment_1$"
 mod_planet_districts_minerals_cost_mult:0 "£minerals£ $minerals$ $planet_districts$ 비용"
 mem_scfe_subterraneans_pleased:0 "[Root.GetSubMantleLower] 문명과의 관계가 개선될 것입니다."
 mem_scfe_subterraneans_displeased:0 "[Root.GetSubMantleLower] 문명과의 관계가 악화될 것입니다."
 mem_scfe_subterraneans_displeased2:0 "우리는 200 £minerals£ $minerals$를 받지만, [Root.GetSubMantleLower] 문명과의 관계가 악화될 것입니다."
 mem_scfe_subterranean.2.name:0 "미지의 발굴"
 mem_scfe_subterranean.2.desc:0 "§Y[mem_scfe_subterranean_planet.GetName]§!에서의 정기적인 채굴 작업 중, 작업자들이 고대 유적이 가득한 거대한 동굴에 도달했습니다. 이 동굴은 고급 지하 문명의 잔존자들이 있는 고고학적 보물창고처럼 보입니다. 이 발견은 우리가 이전에 본 것과는 전혀 다르며, 식민지의 총독은 긴급히 과학 팀의 조사를 요청했습니다."
 mem_scfe_subterranean.2.a:0 "즉시 탐사 팀을 파견합니다."
 mem_scfe_subterranean.2.b:0 "이 £minerals£ $minerals$가 필요합니다."
 mem_scfe_subterranean.3.desc:0 "$mem_scfe_subterranean.2.desc$\n우리의 지하 동맹은 이 발견에 매우 관심이 있으며, 이 탐사에 협력할 것을 요청합니다."
 mem_scfe_subterranean.3.a:0 "우리는 이 공동 작전에 동의합니다."
 mem_scfe_subterranean.3.b:0 "우리는 이 도시를 혼자 탐험할 것입니다."
 mem_scfe_subterranean.4.name:0 "남은 것"
 mem_scfe_subterranean.4.desc:0 "우리 과학자들은 크락타니안 컴퓨터에서 우려스러운 정보를 발견했습니다. 그들은 주 계획이 실패할 경우를 대비한 비상 계획을 가지고 있었으며, 미공개 행성의 깊은 지하에 두 번째 정화 장치를 숨겨 놓았습니다. 그들은 이 장치를 활성화할 기회를 갖지 못했지만, 누군가 결국 이를 발견할 가능성은 소름 끼치는 생각입니다."
 mem_scfe_subterranean.5.name:0 "요청"
 mem_scfe_subterranean.5.desc:0 "많은 논의 끝에 우리는 버려진 크락타니안 동굴을 식민지화할 수 있도록 귀하의 허가를 요청하기로 결정했습니다. 이 결정은 그들의 실수로부터 배우고 우리 민족을 위한 더 나은 미래를 구축하고자 하는 우리의 열망에서 비롯되었습니다. 우리는 그곳에서 발견한 자원과 발견물을 귀하의 제국과 공유할 것을 약속하며, 상호 성장과 이해를 촉진할 것입니다.\n이번 사업은 우리가 앞으로 나아가는 올바른 길이 무엇인지 되새기는 중요한 단계입니다. 우리는 귀하가 이 노력에 지지해 주시고 우리의 협력을 강화해 주시기를 희망합니다."
 mem_scfe_subterranean.5.a:0 "우리는 당신에게 동굴을 식민지화할 수 있는 허가를 부여합니다."
 mem_scfe_subterranean.5.b:0 "죄송하지만 이건 허용할 수 없습니다."
 mem_scfe_subterranean.6.name:0 "지하 식민지 설립"
 mem_scfe_subterranean.6.desc:0 "[Root.GetSubMantleLower] 식민지 선박이 §Y[mem_scfe_subterranean_planet.GetName]§!에 도착하였고 개척민들이 지하 도시들에 정착하였습니다. 그들은 그들의 필요를 충족시키기 위한 필수 인프라를 신속하게 건설하고 있습니다. 우리 개척민들과의 거래를 원활하게 하기 위해 교환 구역이 마련되었으며, 우리의 과학자들과 공학자들은 언제든지 방문할 수 있습니다. 여기서 두 민족 모두의 미래는 밝아 보입니다."
 mem_scfe_subterranean_dig:0 "지하 수수께끼"
 mem_scfe_subterranean_dig_desc:0 "정기적인 채굴 작업 중, 작업자들이 고대 유적이 가득한 거대한 동굴에 도달했습니다. 이 동굴은 고급 지하 문명의 잔존자들로 가득 차 있는 고고학적 보물창고로 보입니다. 이 발견은 우리가 이전에 본 적이 없는 것입니다."
 mem_scfe_subterranean_dig.1.name:0 "지하 제국"
 mem_scfe_subterranean_dig.1.desc:0 "우리 과학 팀은 동굴 안에 기지 캠프를 세우고 지하 유적 조사를 시작했습니다. 초기 발견에 따르면 이 문명은 행성의 깊은 곳에서 번성하며 인상적인 지하 제국을 건설했습니다. 그들의 기술은 놀라울 정도로 고급이며, 기대를 뛰어넘습니다. 유적은 발견되지 않았지만, 환경 분석 결과 그들이 생존을 위해 산소에 의존하지 않았던 것으로 보입니다."
 mem_scfe_subterranean_dig.2.name:0 "미공개 우주항구"
 mem_scfe_subterranean_dig.2.desc:0 "광대한 지하 네트워크 내의 또 다른 동굴을 탐험하던 중, 우리 팀은 놀라운 발견을 하였습니다: 미공개 우주항구입니다. 그 위로는 숨겨진 접근 지점으로 이어지는 큰 개구부가 있어, 사용하지 않을 때에도 별선이 통과할 수 있도록 숨겨져 있었습니다. 우리는 이 수수께끼 같은 고대 제국과 그 운명에 대한 단서를 열심히 찾고 있습니다."
 mem_scfe_subterranean_dig.3.name:0 "크락타니안"
 mem_scfe_subterranean_dig.3.desc:0 "이 매혹적인 결정체 컴퓨터가 마침내 이 지하 문명에 대한 정보를 밝혀냈습니다. §HKraktanians§!는 행성의 지각 깊숙한 곳에서 발생한 리토이드 종으로, 점차 위로 올라왔습니다. 그들이 표면을 뚫고 나와 그 너머의 공허를 발견했을 때, 그들은 혐오감을 느꼈습니다. 그들의 반감에도 불구하고, 그들은 탐험을 계속하며 별들에까지 도달했습니다. 그리고 은하계를 더 많이 볼수록, 그들은 그것을 더욱 싫어하게 되었습니다."
 mem_scfe_subterranean_dig.4.name:0 "파괴된 장치"
 mem_scfe_subterranean_dig.4.desc:0 "더 깊은 동굴로 들어가자, 황량한 광경을 목격하게 됩니다. 중앙에 있는 거대한 장치에서 폭발이 발생한 것으로 보입니다. 그 잔해를 조사한 결과, 이것이 행성 방패의 일종이었다고 추측합니다. 여기서의 파괴는 더 많은 정보를 밝혀내려는 우리의 노력을 방해하므로, 더 나은 발견을 가져올 수 있는 더 큰 동굴로 이동하기로 결정했습니다."
 mem_scfe_subterranean_dig.5.name:0 "지하 수도"
 mem_scfe_subterranean_dig.5.desc:0 "이 거대한 동굴에는 주요 도시가 자리 잡고 있으며, 높은 결정체 건물들이 먼 천장까지 솟아 있습니다. 철저한 수색 끝에 우리는 크락타니안에 대한 더 많은 정보를 발견했습니다. 그들의 은하로의 확장은 일시적이었으며, 필요한 자원을 모으기 위한 것이었습니다. 그들의 임무가 완료되자, 그들은 자신의 통과 흔적을 지우고 고향으로 후퇴하여 행성 방패로 봉인했습니다. 그곳에서 그들은 그들이 혐오하는 외계 생명체로부터 은하 전체를 정화하기 위한 계획을 세우기 시작했습니다."
 mem_scfe_subterranean_dig.6.name:0 "프로젝트"
 mem_scfe_subterranean_dig.6.desc:0 "크락타니안은 은하 전체에 걸쳐 모든 형태의 생명을 용해할 수 있는 장치를 만들었습니다. 장치가 완성되자 그들은 즉시 이를 활성화했습니다. 설계에 결함이 있었던 것인지, 아니면 고의로 방해받은 것인지 확실히 알 수는 없지만, 장치의 에너지가 행성 방패와 공명하여 통과하지 않고 다시 생성기로 반사된 것으로 보입니다. 치명적인 방사선이 동굴을 가득 채우며 크락타니안을 순식간에 멸망시키고 그들의 운명을 봉인했습니다."
 mem_scfe_subterranean.10.name:0 "지하 외교관"
 mem_scfe_subterranean.10.desc:0 "안녕하세요! 저는 제 엔지니어링 전문 지식을 바탕으로 이 탐험을 도와주기 위해 선택받은 사회입니다. 이 종이 어떻게 도시를 건설했는지 보는 것이 매우 기대됩니다. 우리는 우리의 발전을 돕기 위한 개선된 기술을 찾고 있으며, 이러한 발견이 귀하의 제국에도 도움이 될 것이라고 확신합니다."
 mem_scfe_subterranean.10.a:0 "환영합니다!"
 mem_scfe_subterranean.11.name:0 "기술적 수수께끼"
 mem_scfe_subterranean.11.desc:0 "이 문명의 기술력에 감탄하지 않을 수 없습니다. 그들의 발전은 특별히 지하 문명으로서는 놀라울 정도입니다. 우리 민족이 귀하의 제국을 만나기 전 오랜 시간 동안 고군분투했던 것과 비교할 때, 그들이 어떻게 이러한 성과를 이루었는지 궁금해집니다. 이 이야기에는 눈에 보이는 것 이상의 무언가가 있을지도 모릅니다. 아마도 그들은 외부의 영향을 받았거나 발전을 가속화할 수 있는 무언가를 발견했을 것입니다."
 mem_scfe_subterranean.12.name:0 "미공개 산업"
 mem_scfe_subterranean.12.desc:0 "그들이 우주 여행자였다는 사실은 놀랍지만, 그들의 고급 상태를 설명합니다. 저는 이러한 모든 공학적 노력이 그들의 존재를 숨기는 데 초점을 맞추었고, 표면에는 어떤 인프라스트럭처도 없었다는 것을 알게 되었습니다. 이는 엄청난 자원을 소모했을 것이며, 그들이 편집증적인 상태에서 살았던 것 같다고 느낍니다. 그들이 호기심이 아니라 필요에 의해 우주로 나갔던 것 같습니다."
 mem_scfe_subterranean.13.name:0 "우리가 우주를 바라보는 방식"
 mem_scfe_subterranean.13.desc:0 "크락타니안은 자신들의 지하 환경이 영원히 그들을 지탱해 줄 것이라고 진심으로 믿었습니다. 표면을 뚫고 나가는 것은 깊은 충격이었고, 그들의 반응은 비극적으로 극단적이었습니다. 이를 되새기며, 처음 귀하의 제국을 만났을 때 우리의 열린 마음과 호기심에 감사하게 생각합니다. 하지만 궁금한 점이 있습니다. 만약 그 행성의 표면에 그 당시 거주자가 있었다면 크락타니안의 운명이 달라졌을까요? 아니면 그들은 항상 이 비극적인 결말을 맞이할 운명이었을까요?"
 mem_scfe_subterranean.14.name:0 "지하 행성 방패"
 mem_scfe_subterranean.14.desc:0 "천장에 있는 이 결정질 광맥을 보십시오. 이 광맥은 위의 산맥까지 이어져 있으며, 행성 방패의 에너지를 전달하는 역할을 하고 있습니다. 그러나 이 광맥은 대규모 에너지 급증의 흔적을 보이고 있으며, 이로 인해 우리가 이 동굴에서 목격하는 파괴가 발생했습니다. 이러한 재앙적인 사건을 일으킨 원인은 무엇일까요? 우리는 이 급증의 원인을 밝혀내어 여기서 무슨 일이 있었는지 이해해야 합니다."
 mem_scfe_subterranean.15.name:0 "건축 설계"
 mem_scfe_subterranean.15.desc:0 "크락타니안 도시의 건축을 살펴본 결과, 정말 감명받았습니다. 그들이 크리스탈 구조를 사용하여 이렇게 높은 건물을 만드는 것은 놀랍습니다. 건물과 동굴 천장을 통합하여 지지하는 방식은 우리가 분명히 배울 수 있는 기술입니다. 우리의 지하 건축과 비교할 때, 크락타니안의 방법은 강함과 우아함이 독창적으로 조화를 이루어 우리의 공학 관행을 크게 향상시킬 수 있습니다. 하지만 그들의 철학은 그다지 마음에 들지 않습니다."
 mem_scfe_subterranean.16.name:0 "어리석은 시도"
 mem_scfe_subterranean.16.desc:0 "크락타니안의 운명은 명확하며, 매우 불안합니다. 이 문명은 우리가 선택하지 않은 길을 보여줍니다. 이 계시는 깨달음을 주지만, 그들의 어리석음은 제가 찾고자 했던 것이 아닙니다. 그럼에도 불구하고, 이 공동 작전에 참여할 기회를 주셔서 감사합니다. 여기 크락타니안 공학에 대한 제 노트가 있습니다. 귀하의 제국에 유용하길 바랍니다. 작별 인사를 드리며, 우리의 협력이 계속해서 결실을 맺기를 바랍니다."
 mem_scfe_subterranean.16.a:0 "안녕히 가세요."
 mem_scfe_inasir_category:0 "신호 탐지됨"
 mem_scfe_inasir_desc:0 "우리는 이 무인 행성의 표면에서 발신되는 약한 신호를 받고 있습니다."
 mem_scfe_inasir.1.name:0 "지하 복합체"
 mem_scfe_inasir.1.desc:0 "신호의 출처를 찾던 중 §Y[From.GetName]§!에서 우리 감지기가 지하 구조물의 미로 같은 네트워크를 발견했습니다. 해당 장소는 추가적인 고고학적 조사를 위해 표시되었습니다."
 mem_scfe_site_inasir:0 "$mem_scfe_inasir.1.name$"
 mem_scfe_site_inasir_desc:0 "우리는 지하 구조물의 미로 같은 네트워크를 발견했습니다."
 mem_scfe_inasir_dig.1.name:0 "발굴 보고서"
 mem_scfe_inasir_dig.1.desc:0 "행성 표면에 기지 캠프가 성공적으로 설립되었습니다. 초기 조사에서 고대 지하 구조물로의 여러 진입로가 확인되었으나, 모두 수천 년에 걸쳐 심각한 붕괴를 겪었습니다. 우리 팀은 이 중 가장 안정적인 진입로를 선택하고 잔해를 치우는 섬세한 작업을 시작했습니다. 초기 진전은 느리지만, 희망적입니다."
 mem_scfe_inasir_dig.2.name:0 "창고"
 mem_scfe_inasir_dig.2.desc:0 "정리된 출입구는 거대한 지하 창고에 접근할 수 있게 해주었습니다. 이 방은 천장까지 금속 주괴가 쌓여 있습니다. 그러나 초기 분석 결과, 혼란스러운 발견이 드러났습니다 - 이 금속은 매우 취약하며, 서로 호환되지 않는 광물의 무질서한 혼합물로 구성되어 있어 전혀 쓸모가 없습니다. 겉보기에는 쓸모가 없어 보이지만, 이 주괴는 정교하게 여기 저장되어 있었으며, 우리는 이 수수께끼 같은 저장소의 목적에 대해 의문을 제기하게 됩니다."
 mem_scfe_inasir_dig.3.name:0 "제조 복합체"
 mem_scfe_inasir_dig.3.desc:0 "우리는 광대한 지하 제조 단지의 내부를 침입하였고, 이제 그곳은 폐허가 되었습니다. 이 시설은 한때 행성의 중심에서 마그마를 끌어와 우리가 발견한 합금 주괴를 제작하였습니다. 분명 대량 생산이 가능했으나, 현재 대부분의 주조소는 미지의 깊이로 무너져 내렸습니다. 살아남은 기계들은 조잡한 수정의 흔적을 보이고 있습니다: 품질 관리 시스템이 고의로 우회되었으며, 이는 물자 무결성을 희생하면서까지 출력을 극대화하려는 절박한 시도로 보입니다."
 mem_scfe_inasir_dig.4.name:0 "격납고"
 mem_scfe_inasir_dig.4.desc:0 "우리 팀은 또 다른 붕괴된 터널에 도달하였고, 이제는 파괴된 우주항과 연결되어 있었던 일련의 거대한 격납고가 드러났습니다. 이러한 시설의 규모는 이들이 정기적으로 대형 화물선을 수용했음을 시사하며, 각 화물선은 한 번의 항해로 수천 톤의 합금을 운반할 수 있었습니다. 남아있는 컴퓨터 기록 분석 결과, 이러한 화물의 주요 고객은 제1 연합이었습니다."
 mem_scfe_inasir_dig.5.name:0 "행정 구역"
 mem_scfe_inasir_dig.5.desc:0 "우리의 탐사는 시설의 안전 구역인 행정 허브에 침입했습니다. 한때 방어 시스템으로 강화되어 있었지만, 시간이 지나면서 이 시스템들은 비활성화되었습니다. 감독의 사무실을 지나, 우리는 예상치 못한 발견을 했습니다: 이와 같은 제조 사이트에 필요한 규모를 훨씬 초과하는 방대한 데이터뱅크 복합체입니다. 내부에 저장된 잠재적인 비밀에 매료된 우리 팀은 데이터를 분석하는 고된 과정을 시작했습니다."
 mem_scfe_inasir_dig.6.name:0 "데이터뱅크 분석"
 mem_scfe_inasir_dig.6.desc:0 "우리 과학자들이 데이터뱅크의 내용에 당황했다고 말하는 것은 과소평가입니다. 추가 조사를 통해 이 방대한 데이터 저장소의 진정한 성격이 드러났습니다 - 모든 항목은 이나시르 기업이 생산한 합금의 품질이 열악하다는 불만입니다. 여기 저장된 불만의 양은 엄청나며, 이는 운영 규모에 필적하는 불만족의 수준을 반영합니다."
 mem_scfe_inasir_dig.6.a:0 "그들은 왜 그들을 지켰을까요?"
 mem_scfe_unseen_chain_title:0 "$mem_scfe_unseen.2.name$"
 mem_scfe_unseen_chain_desc:0 "$mem_scfe_unseen.2.desc$"
 mem_scfe_unseen.2.name:0 "이상한 방사선 탐지됨"
 mem_scfe_unseen.2.desc:0 "우리 전초 기지의 감지기가 §Y[mem_scfe_unseen_system.GetName]§! 항성계에서 §Y[mem_scfe_unseen_planet.GetName]§! 표면의 비정상적인 이상 현상을 감지했습니다. 이례적인 강도로 이국적인 입자가 방출되고 있습니다. 이 현상을 조사하기 위해 즉시 과학 함선을 파견해야 합니다."
 SCFE_UNSEEN_PROJECT_1:0 "방출의 출처 분석 중입니다."
 SCFE_UNSEEN_PROJECT_1_DESC:0 "$mem_scfe_unseen.2.desc$"
 mem_scfe_unseen.3.name:0 "행성 균열"
 mem_scfe_unseen.3.desc:0 "초기 분석 결과, 이 현상은 행성 표면의 단일 지점에 국한되어 있는 것으로 나타났습니다. 이 장소에서는 현실 자체가 풀어지고 있는 듯 보이며, 마치 다른 차원에서 나타나는 거대한 무언가에 의해 밀려나는 것처럼 보입니다."
 mem_scfe_unseen.3.a:0 "열리기 전에 닫아버리자"
 mem_scfe_unseen.3.b:0 "열리기 전에 파괴합시다."
 mem_scfe_unseen.3.c:0 "열리게 하십시오."
 mem_scfe_unseen.4.name:0 "균열 폐쇄"
 mem_scfe_unseen.4.desc:0 "우리는 초공간 균열에 대한 지식을 바탕으로, 고도로 전하된 초공간 실타래를 사용하여 이 현상을 성공적으로 역전시켰습니다. 우리 우주에 들어오려 했던 것은 자신의 차원으로 강제로 되돌려졌습니다 - 희망적으로, 영원히."
 mem_scfe_unseen.5.desc:0 "우리는 균열에 대규모 반물질 폭탄을 배치하였고, 계획대로 폭발하여 이상 현상을 불안정하게 만들었습니다. 차원 균열은 예상대로 붕괴되었지만, 그로 인해 발생한 충격파는 재앙적이었습니다 - 너무 강력하여 전체 행성이 갈라지기 시작했습니다."
 mem_scfe_unseen.6.name:0 "균열에서 온 존재"
 mem_scfe_unseen.6.desc:0 "현상이 전개되는 동안 우리의 지속적인 관찰은 중요한 과학 데이터를 제공하고 있으며, 우리의 과학자들은 확장의 연구로 바쁘게 지내고 있습니다. 무언가가 나타나기 시작했습니다 - 구조물, 아마도 건물의 꼭대기일 가능성이 있습니다 - 그러나 균열의 엄청난 크기는 더 많은 것들이 곧 나타날 가능성이 높음을 시사합니다."
 mem_scfe_unseen.7.name:0 "저 너머의 도시"
 mem_scfe_unseen.7.desc:0 "구조물이 완전히 드러났고, 균열은 흔적도 없이 사라졌습니다. 이제 황량한 행성 위에 광대한 도시가 펼쳐져 있으며, 고급 문명에 의해 건설된 것처럼 보입니다. 그러나 에너지 수치는 없고, 생명의 흔적도 없습니다. 도시는 섬뜩할 정도로 조용하며 탐사를 기다리고 있습니다."
 mem_scfe_unseen.7.a:0 "탐험해 봅시다."
 mem_scfe_site_unseen:0 "보이지 않는 자의 메아리"
 mem_scfe_site_unseen_desc:0 "$mem_scfe_unseen.7.desc$"
 mem_scfe_unseen_dig.1.name:0 "$mem_scfe_unseen.7.name$"
 mem_scfe_unseen_dig.1.desc:0 "우리는 이 이상한 도시의 광활한 광장에 캠프를 세웠습니다. 고요함이 불안감을 조성하며, 우릴 둘러싼 높은 건물들이 있습니다. 이 건물들은 매끄러운 현무암으로 만들어진 것처럼 보이지만, 특정 각도에서는 희미한 보라색 광채를 발산합니다. 우리의 기기는 이 물자를 분석할 수 없습니다. 마치 이 물자가 여전히 원래의 우주에 속해 있는 것처럼, 우리의 물리 법칙이 적용되지 않는 곳입니다."
 mem_scfe_unseen_dig.2.name:0 "낯선 땅의 낯선 이들"
 mem_scfe_unseen_dig.2.desc:0 "도시를 탐험하기 시작하자 그 이국적인 본질이 점점 더 뚜렷해집니다. 다른 우주에서 온 것임에도 불구하고, 여기서는 우리가 외부인처럼 느껴집니다. 다리가 허공에서 나타났다가 건너면 사라지고, 매끄러운 벽 속에 문이 나타납니다. 그러나 우리는 여전히 완전히 혼란스러워합니다. 글자의 흔적도, 버튼도, 레버도 - 상호작용할 수 있는 것이 없습니다. 우리는 우주를 항해하는 문명에서 온 과학자들에게는 불안한 경험인 첨단 메트로폴리스를 방황하는 원시인과 같습니다."
 mem_scfe_unseen_dig.3.name:0 "이 세상 밖"
 mem_scfe_unseen_dig.3.desc:0 "우리는 희미한 희망을 안고 기지로 돌아옵니다. 나머지 팀은 우리의 가장 민감한 기기를 배치하여 도시의 포괄적인 분석을 시작했습니다. 우리가 의심했던 대로, 이 도시는 우리의 인식을 넘어 여러 차원으로 확장되어 있습니다. 그 시스템은 필요에 따라 차원 변형 사이를 이동하며, 우리가 마주한 다리와 문이 그 증거입니다. 우리는 가장 가까운 차원에 대해 하루살이처럼 잠깐의 엿보기를 할 수 있었지만, 이 도시의 범위는 현재 우리의 기기가 감지할 수 있는 것보다 훨씬 더 넓습니다."
 mem_scfe_unseen_dig.4.name:0 "미지의 경계"
 mem_scfe_unseen_dig.4.desc:0 "우리는 주변에서 활동의 징후를 감지하기 시작했습니다. 일부 건물의 구조가 변화하고, 경로가 나타났다 사라지는 것처럼 보입니다 - 그러나 우리는 어떤 존재도 감지할 수 없습니다. 다시 한 번, 우리가 여기 존재하지 않는다는 압도적인 느낌이 우리를 사로잡습니다. 이 도시는 우리의 이해를 초월하는 존재들을 위해 지어졌으며, 우리는 자동화된 과정에 의해 지워질 수 있다는 두려움을 느낍니다 - 그들의 세계에서 잔해에 불과한 존재처럼, 아무도 알아차리지 못한 채로."
 mem_scfe_unseen_dig.5.name:0 "인식 너머"
 mem_scfe_unseen_dig.5.desc:0 "우리는 경이로움과 불안이 뒤섞인 감정으로 이 행성을 떠납니다. 우리는 우리의 이해를 훨씬 초월하는 문명과 교차하였으며, 그들의 존재는 우리가 인지할 수 없는 더 높은 차원에서 펼쳐지고 있습니다. 우리는 아마도 그들과 결코 만나지 못할 것이며, 서로를 볼 일도 없겠지만, 이제 우리는 같은 은하의 지역을 공유하고 있습니다. 우리의 기술이 언젠가 이 거대한 간극을 메울 만큼 발전할지는 오직 시간만이 알 것입니다 - 아마도 수천 년 후의 일일 것입니다."
 mem_scfe_znkar_wur_den_kaar:0 "우르-덴-카르"
 mem_scfe_znkar_kaar_da_kruun:0 "카르-다-크룬"
 mem_scfe_precursor_cruiser_01_amb:0 "태양가르기"
 mem_scfe_znkar.8.desc:0 "Z'nkar 달 기지에 대한 우리의 탐사는 그들의 역사에서 중요한 발견을 드러냈습니다. 한때 군사적 사회였던 Z'nkar는 보다 평화로운 삶으로 전환하였고, 그들의 가장 강력하고 위험한 기술을 이 달 기지에 남겨두었습니다. 중앙 발견은 거대한 은폐된 선박의 존재로, 이는 우리의 현재 이해를 도전하는 기술적 경이입니다. 감시 팀의 궁극적인 임무는 이 보이지 않는 거대선에 탑승하여 그들의 공격자를 추적하고, 그들을 자신의 세계로 되돌아가게 하는 것이었습니다."
 mem_scfe_znkar.9.name:0 "그들의 흔적을 따라"
 mem_scfe_znkar.9.desc:0 "우리가 떠나려 할 때, 한 과학자가 중요한 정보를 발견했습니다: Z'nkar의 거대 기계가 마지막 신호를 전송했으며, 이는 그들의 미공개 기지 내 컴퓨터에 포착되었습니다. §HMission accomplished§!라고 적혀 있습니다. 그러나 더욱 흥미로운 것은 전송에 포함된 좌표입니다. 우리는 이제 공격자들의 모행성으로 돌아가는 경로를 추적할 수 있는 수단을 갖게 되었습니다."
 mem_scfe_znkar.10.name:0 "$mem_scfe_znkar_wur_den_kaar$"
 mem_scfe_znkar.10.desc:0 "목적지에 도착하자, 우리의 기기는 황량한 폐허의 장면을 드러냅니다: 파편으로 부서진 행성이 파괴된 지 수천 년이 지난 지금도 여전히 빛나는 잔존자들로 가득 차 있습니다. 그 위에는 거대한 선박의 잔해 - Z'nkar의 거대함이 떠 있습니다. 운이 좋다면, 그 잔해는 귀중한 정보를 제공할 것입니다."
 mem_scfe_znkar_colossus_dig:0 "고대 거대상자"
 mem_scfe_znkar_colossus_dig_desc:0 "파괴된 행성 위에 거대한 선박의 잔해 - Z'nkar의 거대함선이 떠 있습니다. 운이 좋다면, 그 잔해는 귀중한 정보를 제공할 것입니다."
 mem_scfe_znkar_dig.5.name:0 "비어 있는 격납고"
 mem_scfe_znkar_dig.5.desc:0 "콜로서스 잔해의 핵심 부분은 놀랍도록 온전하게 남아 있어, 우리는 그 중 하나의 격납고에 접안할 수 있습니다. 격납고는 섬뜩하게 비어 있으며, 바깥의 잔해를 보아하니 Z'nkar 함대는 마지막 함선까지 콜로서스를 방어한 것으로 보이며, 아마도 주 무기가 발사될 충분한 시간을 벌기 위해서였던 것 같습니다. 우리는 지휘소, 생활 구역, 전원 핵, 그리고 주 무기실과 같은 주요 지역을 탐사하기 위해 네 팀으로 나누었습니다."
 mem_scfe_znkar_dig.6.name:0 "거주 구역"
 mem_scfe_znkar_dig.6.desc:0 "거주 공간은 군함치고는 예상외로 편안하며, 대량 파괴 무기에서 복무하는 심리적 부담을 덜어주기 위해 설계된 것으로 보입니다. 온 우주를 파괴하기 위해 만들어진 장치입니다. 클랜 문양이 새겨진 정교한 램프, 개인 기록, 가끔씩 보이는 악기들이 여기저기 흩어져 있습니다. 기록에 따르면 승무원들은 이 임무에서 돌아오지 못할 것이라는 것을 이해하고 있었습니다. 그들이 파괴하려 했던 외계인에 의해 고향이 황폐화된 상황에서도, 그들은 앞으로 나아가기로 결심하며 자신의 민족을 복수하고 궁극적으로 다른 이들의 오용을 막기 위해 콜로서스를 파괴할 것을 다짐했습니다."
 mem_scfe_znkar_dig.7.name:0 "전력 코어"
 mem_scfe_znkar_dig.7.desc:0 "전력 코어에 도달하려는 우리의 시도는 실패했습니다; 우리는 코어가 한때 있던 황폐한 구역을 발견했습니다. 무기가 발사된 후 코어가 폭발한 것으로 보이며, 이는 콜로서스를 산산조각냈습니다. 적 함대는 콜로서스가 폭발할 때 주위에 있었던 것으로 보이며, 그들 중 생존자가 있을 가능성은 낮습니다. 선박의 큰 파편들이 생존한 것은 그 튼튼한 설계에 대해 많은 것을 말해줍니다."
 mem_scfe_znkar_dig.8.name:0 "주 무기 챔버"
 mem_scfe_znkar_dig.8.desc:0 "Z'nkar는 바보가 아니었습니다. 자폭 시스템이 주요 무기를 파괴하여 잔존자에게서 배울 수 있는 것은 남기지 않았습니다. 우리의 팀이 계속해서 수색하는 다른 구획에서도 유사한 보고가 있습니다: 공학, 추진, 보호막 - 어느 것도 분석할 만큼 온전하지 않습니다. 이 거대한 배를 숨겼던 은폐 장치는 아직 찾지 못했지만, 더 이상 존재하지 않는다고 확신합니다. 만약 어떤 귀중한 정보가 남아 있다면, 그것은 지휘소에 있을 것입니다."
 mem_scfe_znkar_dig.9.name:0 "지휘소"
 mem_scfe_znkar_dig.9.desc:0 "지휘소는 여러 겹의 방어 껍질로 둘러싸여 있으며, 최후의 순간까지 작동을 보장하도록 설계되었습니다. 그러나 이제 중무장한 문이 열려 있습니다. 우리는 컴퓨터에서 스캔을 시작하지만, 그 결과는 별로 가치가 없습니다. Z'nkar는 적을 이해하려는 관심을 보이지 않았으며, 그들의 언어를 해독하거나 동기를 배우려는 노력을 하지 않았습니다. 그들의 유일한 목표는 근절이었습니다.\n지휘소에 흩어져 있는 콘솔과 디스플레이 사이에서 하나의 장치가 눈에 띕니다 - 급히 선박 시스템에 통합된 특이한 장치입니다. 그 디자인은 복잡하고 낯설습니다. 우리의 과학자들은 이를 면밀히 분리하여 추가 분석을 위해 준비하며, 이것이 Z'nkar 기술의 희귀한 조각일 수 있기를 바라며 그들의 고급 공학을 엿볼 수 있기를 희망합니다."
 mem_scfe_znkar.20.name:0 "Z'nkar 왜곡 엔진"
 mem_scfe_znkar.20.pdesc:0 "우리의 광범위한 분석은 Z'nkar 유물에 대한 획기적인 이해로 이어졌으며, 이제 이는 §HZ'nkar 왜곡 엔진§!으로 지정되었습니다."
 mem_scfe_znkar.20.desc_1:0 "$mem_scfe_znkar.20.pdesc$ 이 기술적 경이로움은 선행자들의 고급 능력을 보여줍니다. 그 주요 기능은 우리 함선을 둘러싼 초공간의 상태를 조작하는 것으로 보이며, 이는 엔진 성능을 향상시킵니다. 이 수정은 우리의 방어 시스템에도 적용되어 공격에 대한 방어 능력을 크게 강화합니다. Z'nkar 왜곡 엔진을 우리의 함대에 도입하는 것은 적들에 대한 상당한 전술적 이점을 제공합니다. 그들이 보이지 않는 한..."
 mem_scfe_znkar.20.desc_2:0 "$mem_scfe_znkar.20.pdesc$ 이 장치는 우리 함선 주변의 초공간 환경을 미세하게 수정하여 엔진 성능을 향상시킬 수 있는 능력을 가지고 있습니다. 엔진은 또한 우리의 은폐 생성기와 상호작용하여 그 효율성을 상당히 개선합니다. 더욱이, 이 유물의 흥미로운 특성은 범위 내의 은폐된 함선을 방해하고 드러낼 수 있는 능력으로, 적 함선이 스스로 모습을 드러내도록 강요합니다. 이 기능은 우리의 은폐 작전과 방어 기동에 전략적인 요소를 추가합니다. 이러한 변혁적인 기술이 최종 사용 전에 Z'nkar에 의해 저장소에 맡겨졌다는 것은 그들의 운명을 바꿀 수 있는 중요한 깨달음입니다."
 mem_scfe_znkar.20.desc_3:0 "$mem_scfe_znkar.20.desc_2$\n이 장치에 대한 분석 덕분에 우리는 은폐 기술에 대한 새로운 지식을 얻었습니다."
 mem_scfe_znkar.21.name:0 "즌카르의 비밀"
 mem_scfe_znkar.21.desc:0 "Z'nkar는 오랫동안 우리의 문명을 포함한 수많은 원시 문명을 관찰해왔으며, 정보 조직 및 저장 방식에서 혁신을 이루었습니다. 우리는 이를 통해 우리의 행정 개선에 활용할 수 있습니다."
 sc_mem_scfe_empty_space:0 "$pc_mem_scfe_empty_space$"
 pc_mem_scfe_empty_space:0 "빈 공간"
 pc_mem_scfe_empty_space_desc:0 "별이나 기준점 역할을 하는 다른 천체가 없어 이 우주 영역은 텅 빈 채로 남아 있습니다."
 mem_scfe_tower_city_site:0 "불가능한 도시"
 mem_scfe_tower_city_site_desc:0 "표면 곳곳에 흩어진 광범위한 잔해와 허물어진 구조물은 잠재적인 고고학적 발견을 암시합니다."
 mem_scfe_tower_city_site.1.name:0 "도시 탐험"
 mem_scfe_tower_city_site.1.desc:0 "첫 방문 때 가장 큰 유적 군집이 우리 팀의 진입점이 됩니다. 대기의 압력과 온도가 거주 가능한 환경을 이루는 곳에 거대한 탑이 세워져 있습니다. 탑의 꼭대기와 옆면에는 그것에 매달리듯 서로 다른 도시 층들이 나타납니다. 도시 유적은 의심할 여지 없이 이 원기둥 정상부의 대부분에 걸쳐 뻗어 있습니다. 기둥 옆면에 매달린 수직 마을들을 탐사하러 아래로 내려가려는 이는 거의 없습니다."
 mem_scfe_tower_city_site.2.name:0 "과거의 수수께끼"
 mem_scfe_tower_city_site.2.desc:0 "이 도시의 주민들은 불가능한 보금자리의 절대적인 자원 부족에 발목이 잡혀, 분명 우주 이전 기술 단계에 머물러 있었습니다. 이러한 발견은 수많은 의문을 불러일으킵니다. 기둥의 건설은 그들의 소행일 수 없습니다. 이는 다른 존재들, 즉 건설자들이 있었음을 시사합니다. 그 목적이 무엇이든 여전히 수수께끼에 싸여 있습니다."
 mem_scfe_tower_city_site.3.name:0 "침입"
 mem_scfe_tower_city_site.3.desc:0 "과학 팀은 부분적으로 파손된 상태에도 불구하고 여전히 위엄 있는 웅장한 건물 앞에 도착했습니다. 침입한 후, 그들은 인간형 거주자의 첫 번째 유해를 발견하고 몇몇 팀원을 배치하여 샘플을 수집하고 분석을 진행했습니다. 더 나아가, §G[Root.Leader.GetName]§!는 제한 구역으로 보이는 곳에 들어갔습니다. 스캔 결과 내부는 대체로 온전한 상태로 남아 있지만, 손상된 천장과 강화된 벽을 고려할 때 접근하기 위해서는 상당한 노력이 필요할 것입니다."
 mem_scfe_tower_city_site.4.name:0 "전쟁으로 파괴됨"
 mem_scfe_tower_city_site.4.desc:0 "우리는 마침내 벙커 내부에 접근할 수 있게 되었고, 전체 실린더와 복잡하게 연결된 거대한 컴퓨터를 발견했습니다. 우리가 획득한 초기 데이터셋은 머리를 어지럽힐 만큼 방대합니다. 이 구조물은 단순한 거대한 기둥이 아니라 거대한 마천루라는 사실이 밝혀졌습니다. 내부는 수천 년 전 잔혹한 내전으로 그들의 사회가 무너진 이후로 버려졌습니다. 시간이 지나면서 그들은 고급 장비가 고장 나면서 원시적인 상태로 퇴보했습니다. 지표를 떠돌던 마지막 부족은 그들의 고대 기술을 이해하지 못하게 되었습니다. 마지막 합성기가 작동을 멈추자, 그들의 멸망이 빠르게 뒤따랐습니다."
 mem_scfe_tower_city_site.4a:0 "비극적인 이야기."
 mem_scfe_tower_city_site.4tt:0 "이 고대 건축물은 우리의 과학자들을 수세기 동안 바쁘게 할 공학의 경이로움입니다."
 mem_scfe_tower_city_site.4b:0 "우리는 엄청난 양의 합금을 쌓아두고 있습니다."
 mem_scfe_belltower_site:0 "종탑"
 mem_scfe_belltower_site_desc:0 "[from.planet.GetName]의 표면에서 초기 스캔이 나선형 구조물을 발견했습니다. 탐사정 조사 결과, 모래에 거의 뒤덮인, 기원을 알 수 없는 거의 온전한 건물이 드러났습니다."
 mem_scfe_belltower_site.1.name:0 "야영지 설치"
 mem_scfe_belltower_site.1.desc:0 "이제 팀은 야영지를 세우고 모래 위에 통로를 건설하였으며, 건물의 정점에 대한 철저한 조사를 실시했습니다. 이곳은 내부에서 감지된 에너지원과 하나가 되어 공명하는 것으로 보입니다. 이 공명은 보호 역장을 생성하여, 표면이 우리의 돌파 시도를 견뎌내게 만듭니다. 우리의 유일한 실행 가능한 선택지는 감지기가 약 70미터 아래에서 포착한 상당한 크기의 입구를 향해 파 내려가는 것입니다."
 mem_scfe_belltower_site.2.name:0 "문"
 mem_scfe_belltower_site.2.desc:0 "모래를 성공적으로 안정시킨 뒤, 팀은 아래로 정성껏 파 내려가며 탑의 정교한 외벽을 서서히 드러냈습니다. 등불 아래에서 그들은 마침내 다양한 외계 종족이 양식화된 태양에 경의를 표하는 모습을 새긴 수많은 조각으로 장식된 거대한 금속 문에 도달했습니다. 문은 탑의 나머지 부분과 마찬가지로 우리 도구로는 뚫을 수 없는 것으로 드러나, 현재 그 상징들을 해독하는 일은 팀에게 여전히 난제로 남아 있습니다."
 mem_scfe_belltower_site.3.name:0 "종탑"
 mem_scfe_belltower_site.3.desc:0 "새벽의 첫 빛이 사막을 비추자, 햇빛이 문을 감쌌고, 태양 조각이 이에 반응하여 번쩍이며 문이 열리기 시작했습니다. 승무원들은 불안한 마음으로 조심스럽게 탑 안으로 발을 들였습니다. 그들이 내부에서 마주한 것은 예상과는 전혀 달랐습니다 - 맥동하는 에너지로 웅웅거리는 미로 같은 기계 복합체가 거대한 종으로 보이는 것을 향해 위로 뻗어 있었습니다."
 mem_scfe_belltower_site.4.name:0 "신호탑"
 mem_scfe_belltower_site.4.desc:0 "우리 과학자들은 건물 내부를 철저히 조사했지만 데이터나 기록은 발견하지 못했습니다. 내부의 기계는 거대한 규모의 통신탑을 닮았습니다. 이는 우리 은하의 초공간 시스템을 통해 메시지를 전송하고 있는 것으로 보입니다. 그러나 흥미로운 점은 현재 휴면 상태로 어떠한 신호도 전송하지 않고 있다는 것입니다. 탑의 나머지 부분은 수천 년 동안 작동해 왔지만, 발신기만은 비활성 상태로 남아 있습니다."
 mem_scfe_belltower_site.5.name:0 "딩"
 mem_scfe_belltower_site.5.desc:0 "면밀한 조사 끝에 §G[Root.Leader.GetName]§!는 탑의 목적을 밝혀내는 유일한 방법이 발신기를 활성화하는 것임을 결론지었습니다. 스위치를 결정적으로 전환하자, [Root.Leader.GetSheHeCap]가 과정을 시작했습니다. 에너지의 빔이 즉시 종에 닿아 조화로운 §RDING§!을 방출하며 건물을 가득 채우고, 바깥의 모래를 따라 흐르며, 송신기를 통해 은하로 퍼져 나갔습니다. 그 장치는 완전히 정지되었고, 그 구조를 유지하던 힘의 장치도 포함되었습니다. 탑은 즉시 무너지기 시작했고, 우리 승무원은 간신히 탈출해야 했습니다."
 mem_scfe_belltower_site.5.a:0 "우리가 무엇을 한 것인가?"
 mem_scfe_reverse_engine_site:0 "역설계 엔진"
 mem_scfe_reverse_engine_site_desc:0 "과학자 팀이 신비로운 신호의 출처와 그들의 통신을 방해하는 특이한 간섭을 밝혀내기 위해 열심히 파고듭니다."
 mem_scfe_reverse_engine_site.1.name:0 "지하 벙커"
 mem_scfe_reverse_engine_site.1.desc:0 "우리의 발굴 작업은 신호의 출처로 이어졌습니다: 심각한 피해를 견딜 수 있도록 설계된 거대한 지하 벙커입니다. 이 세계의 이전 거주자들은 자신의 멸망을 예견한 듯, 궁극적으로 그들에게 닥친 대재앙을 견딜 수 있도록 이 벙커를 건설했습니다. 내부에서는 상당한 에너지원이 감지되고 있으며, 이국적인 입자 방출의 주파수가 꾸준히 상승하고 있습니다."
 mem_scfe_reverse_engine_site.2.name:0 "침입"
 mem_scfe_reverse_engine_site.2.desc:0 "벙커의 입구를 뚫는 데 며칠이 걸렸습니다. 탐사 결과, 이 시설은 장기 거주를 위한 것이 아님이 분명합니다. 사용 가능한 컴퓨터에 대한 분석 결과, 이곳은 내부 구조물 건설을 담당한 작업자들의 생활 공간이었으며, 그들이 §S리버스 엔진§!이라고 부르는 것을 생산하는 공장이었습니다. 그들은 이 장치가 다가오는 대재앙으로부터 자신들을 구해줄 것이라고 매우 낙관적으로 생각했던 것으로 보입니다."
 mem_scfe_reverse_engine_site.2.a:0 "시작이 가까워지고 있습니다..."
 mem_scfe_reverse_engine_site.3.name:0 "외부 핵"
 mem_scfe_reverse_engine_site.3.desc:0 "고대 벙커를 더 깊이 탐사하던 중, 우리는 더 중요한 발견을 하게 되었습니다. 넓은 방은 이 야심찬 사업을 감독하는 지도자의 사무실로 사용되었던 것으로 보입니다. 이 방 안에서 컴퓨터는 중앙 공장을 관리하는 고급 AI가 있었음을 밝혔으며, 그 임무는 단 하나: §SReverse Engine§!을 만드는 것이었습니다. 이는 그들의 문명을 구하기 위해 과거로 보내질 시간 여행 장치입니다. §G[Root.Leader.GetName]§!는 이러한 장치의 실현 가능성에 대해 회의적인 입장을 표명합니다."
 mem_scfe_reverse_engine_site.3.a:0 "이 보고서들이 역순으로 되어 있는 건가?"
 mem_scfe_reverse_engine_site.4.name:0 "공장"
 mem_scfe_reverse_engine_site.4.desc_1:0 "공장 중심에 도달했을 때, 우리의 스캐너는 갑작스럽고 강렬한 방사선의 급증을 감지했습니다. 다행히도, 우리의 방호복은 짧은 시간 동안의 유해한 영향으로부터 우리를 보호하는 데 효과적이었습니다. 방 중앙에는 비어 있는 공간이 비활성화된 제작 기계들로 둘러싸여 있었습니다. 갑자기 우리의 통신기가 기분 나쁜 외계인의 목소리로 활성화되었고, §S리버스 엔진§!이 시간 속으로 보내졌으며, 이로 인해 벙커의 원자로가 불안정해졌다고 알렸습니다. 그것은 우리가 너무 늦기 전에 도망치라고 조언했습니다. 우리는 급히 우리의 배로 돌아가, 행성이 거대한 폭발로 산산조각나는 순간에 떠났습니다."
 mem_scfe_reverse_engine_site.4.desc_2:0 "공장 중심에 도달했을 때, 우리의 스캐너는 갑작스럽고 강렬한 방사선의 급증을 감지했습니다. 다행히도, 우리의 튼튼한 구조와 차폐 장치가 그 짧은 지속 시간으로 인한 유해한 영향으로부터 우리를 효과적으로 보호했습니다. 방 중앙에는 비어 있는 공간이 비활성화된 제작 기계들로 둘러싸여 있었습니다.\n갑자기 우리의 통신기가 생경한 외계인의 목소리로 crackled하며 §SReverse Engine§!이 시간 속으로 되돌려졌고, 이로 인해 벙커의 원자로가 불안정해졌다고 알렸습니다. 그것은 우리가 너무 늦기 전에 도망치라고 조언했습니다. 우리는 우주선으로 급히 돌아가, 행성이 거대한 폭발로 산산조각 나는 바로 그 순간에 떠났습니다."
 mem_scfe_reverse_engine_site.4.a:0 "보고서의 나머지는 어디에 있습니까?"
 mem_scfe_failed_hive_site:0 "실패한 벌집"
 mem_scfe_failed_hive_site_desc:0 "구조물 모양을 한 유기 잔해가 [from.planet.GetName]의 표면에 널려 있습니다."
 mem_scfe_failed_hive_site.1.name:0 "적대적인 은하"
 mem_scfe_failed_hive_site.1.desc:0 "우리는 허물어진 우주항에 기지 야영지를 세우고, 궤도에서 포착한 가장 유망한 유적들, 즉 우주항으로 추정되는 곳부터 탐사를 시작했습니다. 우주선의 잔해는 이 구조물을 지은 이들이 한동안 FTL 여행을 달성했었음을 시사합니다. 온전한 블랙박스는 그들의 은하 탐사에 대한 통찰을 제공하는데, 수많은 적대 세력과의 조우 끝에 결국 그들이 모항성계로 후퇴할 수밖에 없었음을 드러냅니다."
 mem_scfe_failed_hive_site.2.name:0 "대의회"
 mem_scfe_failed_hive_site.2.desc:0 "중앙 건물을 추가로 조사한 결과, 이 문명의 대소사를 관장하며 법령을 집행하던 재판소의 위계질서가 드러났습니다. 그들의 기록은 이 문명이 항성계 너머에서 마주친 위협에 대해 점점 더 불안해했으며, 그 위험이 자신들의 세계에 미칠 가능성을 두려워했음을 보여줍니다. 이에 대응하여 재판소는 제국을 두려움 없는 불굴의 전쟁 기계로 탈바꿈시킬 계획을 세웠습니다."
 mem_scfe_failed_hive_site.3.name:0 "계획"
 mem_scfe_failed_hive_site.3.desc:0 "손상된 성직자 건물에서 발견된 문서들은 잔해를 치우고 그 기록 보관소에 접근하기까지 며칠이 걸렸습니다. 그 깊숙한 곳에서 여전히 온전하고 작동하는 거대한 컴퓨터가 발견되었습니다. 더 이상의 지식은 중앙 데이터 노드에서 추출해야 합니다."
 mem_scfe_failed_hive_site.4.name:0 "모두 하나로"
 mem_scfe_failed_hive_site.4.desc:0 "각고의 노력 끝에, 우리는 중앙 데이터 노드에 성공적으로 접근하여 그 기록 보관소의 분석을 시작했습니다. 재판소의 계획은 은하의 위험에 맞서는 것이었고, 그들은 전체 주민이 비유적으로나 문자 그대로나 하나로 통합되기를 열망했습니다. 그들은 전체 인구의 유전적 구성을 재프로그래밍하여 자기 종족을 집단 정신으로 탈바꿈시키고자 했습니다."
 mem_scfe_failed_hive_site.5.name:0 "반란"
 mem_scfe_failed_hive_site.5.desc:0 "새로운 분석에 따르면 인구의 상당수가 우주에서 비롯된 외부 위협에 진정으로 겁을 먹어 이 극단적인 희생을 받아들일 각오가 되어 있었지만, 그 전망을 끔찍하게 여기는 이들 또한 많았습니다. 재판소의 권위는 절대적인 것으로 여겨졌지만, 그들의 사회는 처음으로 회복할 수 없이 분열되었습니다. 이 분열은 무자비한 내전에 불을 지폈고, 그 내전은 끊임없는 갈등으로 그들의 문명이 황폐해져 결국 멸종에 이를 때까지 계속되었습니다."
 mem_scfe_failed_hive_site.5.a:0 "무시무시한 계획입니다."
 mem_scfe_failed_hive_site.5.b:0 "한심합니다."
 mem_scfe_failed_hive_site.5.c:0 "우리는 그들에게 우리의 통합에 대해 많은 것을 가르칠 수 있었을 것입니다."
 mem_scfe_war_torn_site:0 "요새 쟁탈전"
 mem_scfe_war_torn_site_desc:0 "전쟁으로 황폐해진 세계에 남은 잃어버린 요새의 잔해."
 mem_scfe_war_torn_site.1.name:0 "파괴된 문"
 mem_scfe_war_torn_site.1.desc:0 "요새의 중무장한 게이트 근처에서 치열한 전투가 벌어졌으며, 이제 플라스마 무기에 의해 돌파되었습니다. 우리의 과학 리더는 공격자들이 단순한 파괴를 목표로 했다면 궤도로부터 전체 산을 obliterate할 수 있었을 것이라고 주장하지만, 그들은 요새에 대한 비용이 많이 드는 지상 공격을 선택했습니다. 그들이 추구한 것은 내부에 포함된 특정한 무언가임이 분명합니다."
 mem_scfe_war_torn_site.2.name:0 "타락한 요새"
 mem_scfe_war_torn_site.2.desc:0 "요새 안에서는 군인들의 해골이 바닥에 흩어져 있는 음산한 광경이 펼쳐집니다. 전투는 치열했지만, 공격자들은 끊임없는 증원 병력을 유지하며 끝내 지친 방어군을 압도했습니다. 이상하게도, 승리한 세력은 전사한 동료들의 시신을 회수하려는 어떠한 노력도 하지 않았습니다. 대신 그들은 목표를 향해 밀고 나아갔다가 서둘러 후퇴했습니다."
 mem_scfe_war_torn_site.2.a:0 "이 시체들은 익숙한 모습입니다..."
 mem_scfe_war_torn_site.2.b:0 "분석한다."
 mem_scfe_war_torn_site.3.name:0 "클론 군인"
 mem_scfe_war_torn_site.3.desc_1:0 "독특한 전투 갑옷을 두른 공격자들은 우리 팀으로 하여금 분석에 나서게 했습니다. 놀랍게도, 그들은 우리와 마찬가지로 클론 병사임이 밝혀졌습니다! 이 사실은 우리의 창조주들이 은하 곳곳의 분쟁에서 얼마나 오랫동안 우리를 졸로 부려왔는가를 곱씹게 만듭니다. 이 요새는 그들에 관한 통찰을 품고 있을지도 모릅니다. 팀은 요새의 핵심부로 이어지는 중앙 수직 통로를 따라 내려가기 위해 승강기를 설치하려 준비하고 있습니다."
 mem_scfe_war_torn_site.3.desc_2:0 "분석 결과 예상치 못한 사실이 드러났습니다: 공격자들은 전적으로 클론입니다. 우리는 이 기술을 활용하고 있지만, 이 군인들은 생식 능력을 희생하면서 상당히 강화되었습니다. 팀은 주둔지의 중심 구덩이로 내려가기 위한 엘리베이터를 적극적으로 준비하고 있습니다."
 mem_scfe_war_torn_site.3.desc_3:0 "분석 결과 예상치 못한 사실이 드러났습니다: 공격자들은 전적으로 클론입니다! 이 기술은 이러한 군인들로 인해 고급화되어 최대한의 한계에 도달했으며, 그들의 생식 능력을 희생하면서 튼튼한 강화가 이루어졌습니다. 팀은 주둔지의 중심 구덩이로 내려갈 엘리베이터를 적극적으로 준비하고 있습니다."
 mem_scfe_war_torn_site.4.name:0 "금고"
 mem_scfe_war_torn_site.4.desc:0 "요새 깊숙한 곳에는 한때 위압적이었던 금고가 자리하고 있었으나, 이제는 우리의 여정 중 만난 다른 방어 시설들처럼 침입당한 상태입니다. 비어 있는 방을 예상했으나, 우리의 기대는 부분적으로 확인되었습니다: 금고의 중앙 부분은 완전히 비어 있어, 그곳에 있던 것이 강제로 제거되었음을 나타냅니다. 금고의 나머지 부분은 신비로운 장치들이 담긴 금속 상자들로 가득 차 있으며, 이들의 비밀을 풀기 위해서는 광범위한 분석 과정이 필요할 것입니다."
 mem_scfe_vanishing_act_site:0 "소멸 행위"
 mem_scfe_vanishing_act_site_desc:0 "잘 보존된 구조물로 가득하지만 주민은 전혀 없는 세계를 발견했습니다."
 mem_scfe_vanishing_act_site.1.name:0 "비어 있는 기지"
 mem_scfe_vanishing_act_site.1.desc:0 "§Y[From.Planet.GetName]§! 궤도를 도는 가장 가까운 우주 정거장을 탐사하던 중, 우리는 일련의 당혹스러운 발견을 했습니다. 정거장은 구조적으로 온전하고 완전히 작동 중이었지만, 거주자는 전혀 없었습니다. 승무원과 거주자들이 갑작스럽게 떠났거나, 더 불안하게도 우리가 도착하기 직전에 사라진 것처럼 보입니다. 개인 소지품, 작동 중인 콘솔, 생명 유지 장치 모두 갑작스럽고 예기치 못한 대탈출을 암시하는 상태입니다.\n\n그러나 가장 우려스러운 발견은 정박된 우주선들과 관련이 있습니다. 모든 도킹 베이가 차 있어, 모든 함선이 정거장으로 대거 귀환했음을 나타냅니다. 함선들의 블랙박스를 분석한 결과, 각 함선의 자동 시스템이 표준 비상 절차를 실행하도록 작동했음이 드러났습니다: 조종사가 응답하지 않을 경우 가장 가까운 정거장으로 귀환하여 정박하라는 것입니다. 이는 모든 조종사와 승무원에게 영향을 미친 동시적이고 광범위한 사건을 시사합니다.\n\n팀은 추가 조사를 위해, 특히 도시 중심지를 목표로 삼아 행성 표면으로 향하고 있습니다."
 mem_scfe_vanishing_act_site.2.name:0 "천 개의 노래가 흐르는 도시"
 mem_scfe_vanishing_act_site.2.desc:0 "§Y[From.Planet.GetName]§!의 주요 도시 중심지 근처에 착륙한 뒤, 우리는 광범위한 지상 탐사를 시작했습니다. 이 도시는 우주 정거장에서 목격한 불안한 유기 상태를 훨씬 더 큰 규모로 재현하는, 거대한 유령 도시입니다. 거리에는 멈춰 선 차량들이 늘어서 있고, 주거지들은 갑작스레 버려진 흔적을 보입니다. 우리가 이 행성의 주민으로 규정하게 된 §HVaanclars§!의 기반 시설과 기술 수준은 인상적일 만큼 발전해 있으면서도, 섬뜩할 정도로 고요합니다.\n\n우리 번역기는 반클라르 언어를 성공적으로 해독하여, 그들의 디지털 기록 보관소에 접근할 수 있게 되었습니다. 흥미롭게도, 반클라르는 시각적 지각에 의존하지 않았습니다. 대신 그들은 정교한 형태의 반향정위를 발전시켜, 온갖 소리의 교향곡으로 환경을 탐색하고 상호작용했습니다. 이 독특한 감각 방식 때문에 반클라르나 그들의 실종에 관한 어떠한 시각적 기록이나 이미지도 남아 있지 않습니다. 우리는 주요 기록 보관 시설로 보이는 곳을 찾아냈습니다."
 mem_scfe_vanishing_act_site.3.name:0 "반클라르 기록 보관소 조사"
 mem_scfe_vanishing_act_site.3.desc:0 "반클라르 기록 보관소 내에서의 조사는, 비록 이 문명의 감각 지각이라는 수수께끼에 싸여 있긴 하지만, 중요한 통찰을 제공했습니다. 세심하게 관리되고 놀랍도록 포괄적인 이 기록 보관소는 방대한 지식을 담고 있으나, 그 상당수는 우리에게 낯선 감각 경험에 맞춰져 있습니다. 그럼에도 우리 기술로 그들 기록의 기본적인 내용을 해독할 수 있었습니다.\n\n가장 중대한 발견은 §H더 큰 성가에 귀 기울이기§!라고 묘사된 최근의 기념비적인 과학적 시도와 관련이 있습니다. 반클라르 인구 전체가 이 계획에 몰두했던 것으로 보입니다. 기록은 이 실험이 시작된 직후 돌연 끊기며, 그 이후의 갱신 내용은 전혀 남아 있지 않습니다. 이 기록의 갑작스러운 중단은 그들이 실종된 시점과 일치합니다."
 mem_scfe_vanishing_act_site.4.name:0 "위대한 송가"
 mem_scfe_vanishing_act_site.4.desc:0 "반클라르 연구 센터를 탐사하면서 우리는 획기적인 발견에 이르렀습니다. 이 시설은 주로 화음을 활용하여 우리가 아는 현실의 경계를 돌파할 가능성을 연구하는 데 집중해 있었습니다. 센터의 방대한 기록은 야심 차고 전례 없는 실험을 상세히 담고 있습니다: 사이오닉 재능을 지닌 개체들의 합창을 이용해 고차원을 꿰뚫을 수 있는 성가를 발하는 것이었습니다.\n\n연구 센터의 중앙 방을 성공적으로 열었을 때, 우리는 하나의 현상과 마주쳤습니다. 격리된 금고 안에서, 압도적이고 설명할 수 없는 소리가 우리를 맞이했습니다. 수십억의 목소리로 이루어진 듯한 조화로운 합창, 그리고 이 방 한가운데에 현실의 직물이 찢어진 균열이 있었습니다. 그러나 그 균열이 불안정한 조짐을 보이기 시작하여, 우리는 안전을 위해 서둘러 그 구역에서 대피할 수밖에 없었습니다.\n\n이 조우에서 가장 소름 끼치는 점은, 이 이계의 합창을 이루는 목소리들이 틀림없이 반클라르의 것이었다는 깨달음이었습니다."
 mem_scfe_vanishing_act_site.4.a:0 "불길하군."
 mem_scfe_subterranean_site:0 "지하의 수수께끼"
 mem_scfe_subterranean_site_desc:0 "일상적인 채굴 작업이 고대 유적으로 가득한 광대한 동굴을 드러냈습니다. 이 동굴은 고고학적 보물 창고로 보입니다. "
 mem_scfe_subterranean_site.1.name:0 "지하 제국"
 mem_scfe_subterranean_site.1.desc:0 "우리 과학 팀은 동굴 안에 기지 야영지를 세우고 지하 유적 조사를 시작했습니다. 초기 발견에 따르면 이 문명은 행성 깊은 곳에서 번성하며 인상적인 지하 제국을 건설했습니다. 그들의 기술은 놀라울 만큼 정교하여 예상을 뛰어넘습니다. 유해는 발견되지 않았지만, 환경 분석 결과 그들은 생존에 산소를 필요로 하지 않았던 것으로 보입니다."
 mem_scfe_subterranean_site.2.name:0 "미공개 우주항구"
 mem_scfe_subterranean_site.2.desc:0 "광대한 지하 연결망 속의 또 다른 동굴을 탐사하던 중, 우리 팀은 숨겨진 우주항을 발견했습니다. 그 위로는 은폐된 접근 지점으로 이어지는 커다란 개구부가 솟아 있어, 사용하지 않을 때는 숨겨진 채로 함선이 드나들 수 있게 했습니다. 우리는 이 수수께끼 같은 고대 제국과 그 운명에 관한 단서를 부지런히 찾고 있습니다."
 mem_scfe_subterranean_site.3.name:0 "크락타니안"
 mem_scfe_subterranean_site.3.desc:0 "이 매혹적인 결정체 컴퓨터가 마침내 이 지하 문명에 대한 정보를 밝혀냈습니다. §HKraktanians§!는 행성의 지각 깊숙한 곳에서 발생한 리토이드 종으로, 점차 위로 올라왔습니다. 그들이 표면을 뚫고 나와 그 너머의 공허를 발견했을 때, 그들은 혐오감을 느꼈습니다. 그들의 반감에도 불구하고, 그들은 탐험을 계속하며 별들에까지 도달했습니다. 그리고 은하계를 더 많이 볼수록, 그들은 그것을 더욱 싫어하게 되었습니다."
 mem_scfe_subterranean_site.4.name:0 "파괴된 장치"
 mem_scfe_subterranean_site.4.desc:0 "더 깊은 동굴로 들어서자, 우리는 황폐한 광경과 마주합니다. 중앙에 있던 거대한 장치에서 격렬한 폭발이 일어난 것으로 보입니다. 그 잔해를 조사한 결과, 우리는 그것이 일종의 행성 방어막이었으리라 추정합니다. 이곳의 파괴는 더 많은 정보를 밝혀내려는 우리의 노력을 방해합니다. 더 큰 동굴로 이동하면 더 나은 성과를 얻을 수 있을지도 모릅니다."
 mem_scfe_subterranean_site.5.name:0 "지하 수도"
 mem_scfe_subterranean_site.5.desc:0 "이 거대한 동굴에는 주요 도시가 자리 잡고 있으며, 높은 결정체 건물들이 먼 천장까지 솟아 있습니다. 철저한 수색 끝에 우리는 크락타니안에 대한 더 많은 정보를 발견했습니다. 그들의 은하로의 확장은 일시적이었으며, 필요한 자원을 모으기 위한 것이었습니다. 그들의 임무가 완료되자, 그들은 자신의 통과 흔적을 지우고 고향으로 후퇴하여 행성 방패로 봉인했습니다. 그곳에서 그들은 그들이 혐오하는 외계 생명체로부터 은하 전체를 정화하기 위한 계획을 세우기 시작했습니다."
 mem_scfe_subterranean_site.6.name:0 "프로젝트"
 mem_scfe_subterranean_site.6.desc:0 "크락타니안은 은하 전체에 걸쳐 모든 형태의 생명을 용해할 수 있는 장치를 만들었습니다. 장치가 완성되자 그들은 즉시 이를 활성화했습니다. 설계에 결함이 있었던 것인지, 아니면 고의로 방해받은 것인지 확실히 알 수는 없지만, 장치의 에너지가 행성 방패와 공명하여 통과하지 않고 다시 생성기로 반사된 것으로 보입니다. 치명적인 방사선이 동굴을 가득 채우며 크락타니안을 순식간에 멸망시키고 그들의 운명을 봉인했습니다."
 mem_scfe_unseen_site:0 "보이지 않는 자의 메아리"
 mem_scfe_unseen_site_desc:0 "$mem_scfe_unseen.7.desc$"
 mem_scfe_unseen_site.1.name:0 "$mem_scfe_unseen.7.name$"
 mem_scfe_unseen_site.1.desc:0 "우리는 이 이상한 도시의 광활한 광장에 캠프를 세웠습니다. 고요함이 불안감을 조성하며, 우릴 둘러싼 높은 건물들이 있습니다. 이 건물들은 매끄러운 현무암으로 만들어진 것처럼 보이지만, 특정 각도에서는 희미한 보라색 광채를 발산합니다. 우리의 기기는 이 물자를 분석할 수 없습니다. 마치 이 물자가 여전히 원래의 우주에 속해 있는 것처럼, 우리의 물리 법칙이 적용되지 않는 곳입니다."
 mem_scfe_unseen_site.2.name:0 "낯선 땅의 낯선 이들"
 mem_scfe_unseen_site.2.desc:0 "도시를 탐험하기 시작하자 그 이국적인 본질이 점점 더 뚜렷해집니다. 다른 우주에서 온 것임에도 불구하고, 여기서는 우리가 외부인처럼 느껴집니다. 다리가 허공에서 나타났다가 건너면 사라지고, 매끄러운 벽 속에 문이 나타납니다. 그러나 우리는 여전히 완전히 혼란스러워합니다. 글자의 흔적도, 버튼도, 레버도 - 상호작용할 수 있는 것이 없습니다. 우리는 우주를 항해하는 문명에서 온 과학자들에게는 불안한 경험인 첨단 메트로폴리스를 방황하는 원시인과 같습니다."
 mem_scfe_unseen_site.3.name:0 "이 세상 밖"
 mem_scfe_unseen_site.3.desc:0 "나머지 팀원들이 우리의 가장 민감한 장비를 배치하여 도시에 대한 종합적인 분석을 시작했습니다. 우리가 짐작했던 대로, 이 도시는 우리의 지각을 넘어선 여러 차원으로 뻗어 있습니다. 우리가 마주한 다리와 문에서 알 수 있듯이, 그 시스템은 필요에 따라 차원 변형들 사이를 오갑니다. 우리는 가장 가까운 차원들을 잠깐 엿보는 데 그쳤지만, 이 도시의 범위는 현재 우리 장비가 감지할 수 있는 것보다 훨씬 더 멀리 뻗어 있습니다."
 mem_scfe_unseen_site.4.name:0 "미지의 경계"
 mem_scfe_unseen_site.4.desc:0 "우리는 주변에서 활동의 징후를 감지하기 시작했습니다. 일부 건물의 구조가 변화하고, 경로가 나타났다 사라지는 것처럼 보입니다 - 그러나 우리는 어떤 존재도 감지할 수 없습니다. 다시 한 번, 우리가 여기 존재하지 않는다는 압도적인 느낌이 우리를 사로잡습니다. 이 도시는 우리의 이해를 초월하는 존재들을 위해 지어졌으며, 우리는 자동화된 과정에 의해 지워질 수 있다는 두려움을 느낍니다 - 그들의 세계에서 잔해에 불과한 존재처럼, 아무도 알아차리지 못한 채로."
 mem_scfe_unseen_site.5.name:0 "인식 너머"
 mem_scfe_unseen_site.5.desc:0 "우리는 경이로움과 불안이 뒤섞인 감정으로 이 행성을 떠납니다. 우리는 우리의 이해를 훨씬 초월하는 문명과 교차하였으며, 그들의 존재는 우리가 인지할 수 없는 더 높은 차원에서 펼쳐지고 있습니다. 우리는 아마도 그들과 결코 만나지 못할 것이며, 서로를 볼 일도 없겠지만, 이제 우리는 같은 은하의 지역을 공유하고 있습니다. 우리의 기술이 언젠가 이 거대한 간극을 메울 만큼 발전할지는 오직 시간만이 알 것입니다 - 아마도 수천 년 후의 일일 것입니다."
 mem_scfe_belltower_category:0 "사막의 신호"
 mem_scfe_belltower_desc:0 "우리 과학선의 스캐너가 이 사막 행성에 있는 외딴 건물에서 나오는 에너지 신호를 발견했습니다. 승무원들은 이를 조사하기 위한 탐사를 준비하고 있습니다."
 mem_scfe_tower_city_category:0 "예상치 못한 탑"
 mem_scfe_tower_city_category_desc:0 "우리 과학선의 스캐너가 이 거대 가스 행성에서 예상치 못한 것을 감지했습니다: 구름 속에서 거대한 탑이 솟아오르고 있습니다."
 mem_scfe_reverse_engine_category:0 "매장된 문명"
 mem_scfe_reverse_engine_desc:0 "우리 과학선의 스캐너가 황폐화된 세계의 깊은 지하에서 신호를 감지했습니다. 우리 팀은 그 출처를 파악하기 위해 §Y[Root.GetName]§!에 탐사를 보내고자 합니다."
 mem_scfe_failed_hive_category:0 "파괴된 문명"
 mem_scfe_failed_hive_desc:0 "우리 과학선의 스캐너가 §Y[Root.GetName]§!에 고급 문명의 유적을 발견했습니다. 우리 승무원은 조사할 준비가 되어 있습니다."
 mem_scfe_lonely_shroud_category:0 "불가능한 메시지"
 mem_scfe_lonely_shroud_category_desc:0 "우리의 과학 선박이 이 시스템의 깊은 곳에서 장막에 덮인 행성을 발견했습니다. 가까이 다가가자, 비정상적인 방출이 승무원들의 호기심을 자극합니다. 이 저주받은 세계에서 우리와 소통하려는 미공개 지능이 존재할까요?"
 mem_scfe_war_torn_category:0 "황폐해진 행성"
 mem_scfe_war_torn_category_desc:0 "우리 과학선의 스캐너가 먼 과거에 §Y[Root.GetName]§!에 가해진 상당한 궤도 폭격의 증거를 발견했습니다."
 mem_scfe_the_first_music_anomaly:0 "첫 번째 음악"
 mem_scfe_the_first_music_anomaly_desc:0 "§Y[Root.GetName]§!을 탐사하는 동안, 우리는 반복적으로 괴력 신호를 수신했습니다. 우리의 과학자들은 이 항성계에서 격렬한 태양풍이 관측되었다고 주장하지만, 이 신호는 태양풍과 같은 자연적 요인에서 발생한 것이 아닙니다.\n\n우리의 과학자들은 이것이 인공 신호라고 판단했으며, 우리가 이 신호를 얼마나 쉽게 발견했는지를 고려할 때, 이 신호를 연구할 필요가 있는 것 같습니다."
 mem_scfe_mem_woorskyr_world_category:0 "산 위에 우뚝 솟은"
 mem_scfe_mem_woorskyr_world_category_desc:0 "§Y[Root.GetName]§!에서 가장 두드러진 특징은 행성을 휘감고 산들 위로 우뚝 솟은 듯한 거대한 나무의 존재입니다. 우리 제국의 식물학자들은 이 비범한 나무의 본질을 더 깊이 이해하기 위해 심층적인 연구를 열렬히 주장하고 있습니다."
 mem_scfe_mem_koeleothan_world_category:0 "파도 아래의 이동하는 대량"
 mem_scfe_mem_koeleothan_world_category_desc:0 "우리 승무원은 §Y[Root.GetName]§! 아래의 거대한 이동을 관찰했습니다. 그들은 이 현상의 원인을 파악하기 위해 추가 연구를 허용해 줄 것을 요청합니다."
 mem_scfe_mem_xenograss_world_category:0 "외계 농작물 밭"
 mem_scfe_mem_xenograss_world_category_desc:0 "§Y[Root.GetName]§!에서 샘플링 임무를 수행하는 동안 조사 팀은 독특한 풀 종류를 발견했습니다. 이 풀의 특이한 구성과 성장 주기는 이 세계의 토착 식물이 아님을 시사합니다. 흥미롭게도, 이 풀은 주로 큰 분화구 군집에서 자생하며, 우리 과학자들은 수세기 전 중요한 유성 사건에 의해 이 행성에 도입되었을 것이라고 이론화하고 있습니다. 이 발견을 바탕으로, 그들은 외계 풀의 이 광범위한 지역을 더 탐험하기 위해 연장 임무를 요청했습니다. 그들은 또한 조사 중에 어떤 농작물 원형도 만들지 않겠다고 유머러스하게 보장했습니다."
 mem_scfe_quantummem_pearl_world_category:0 "천 개의 세계가 있는 세계"
 mem_scfe_quantummem_pearl_world_category_desc:0 "§Y[Root.GetName]§!에 대한 철저한 조사 및 목록 작성을 진행하는 동안, 우리의 스캐너는 특정 목표 위치와 일치하지 않는 수천 개의 비정상적인 신호를 순간적으로 감지했습니다. 이에 혼란스러워한 탐사 팀은 조사를 계속 진행하며, 이 특이한 장소에 대한 보다 자세한 조사를 위해 다시 돌아오기로 메모했습니다."
 mem_scfe_mem_beetle_world_category:0 "기다리는 딱정벌레"
 mem_scfe_mem_beetle_world_category_desc:0 "§Y[Root.GetName]§!에 대한 우리의 초기 탐사에서, 우리는 감정이 있는 존재가 아닌 기괴한 통찰력을 가진 딱정벌레로부터 예상치 못한 환영을 받았습니다. 이 딱정벌레는 마치 항상 우리를 관찰하고 있는 것처럼, 우리의 도착과 행보를 예측하는 기괴한 능력을 보여주었습니다. 조사 완료 후, 여러 곤충학자들이 이 매혹적인 곤충에 대한 보다 철저한 연구를 위해 체류를 연장하고자 하는 강한 관심을 표명했습니다."
 mem_scfe_vanishing_act_category:0 "거주 행성"
 mem_scfe_vanishing_act_category_desc:0 "우리의 과학선이 §Y[Root.GetName]§! 궤도에 도착하였고, 즉시 우주 항해 문명의 흔적을 감지하였습니다. 승무원들이 첫 접촉 절차를 시작할 준비를 하고 있습니다."
