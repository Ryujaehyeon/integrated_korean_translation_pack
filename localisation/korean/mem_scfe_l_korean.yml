 SCFE_ALSHIGANS_MOON_PROJECT:0 "달 연구 센터"
 SCFE_ALSHIGANS_MOON_PROJECT_DESC:0 "여기서 발견할 무언가가 있어야 합니다."
 mem_scfe_alshigans_velaen:0 "벨레안"
