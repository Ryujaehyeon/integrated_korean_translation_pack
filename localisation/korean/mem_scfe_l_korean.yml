 policy_mem_scfe_archaeology_cleanup:0 "자동 고고학 정리"
 policy_mem_scfe_archaeology_cleanup_desc:0 "완료된 발굴지를 자동으로 제거할 수 있습니다."
 mem_scfe_archaeology_cleanup_active:0 "자동 정리 활성화"
 mem_scfe_archaeology_cleanup_inactive:0 "발굴지 청소 없음"
 mem_scfe_archaeology_cleanup_active_name:0 "$mem_scfe_archaeology_cleanup_active$"
 mem_scfe_archaeology_cleanup_inactive_name:0 "$mem_scfe_archaeology_cleanup_inactive$"
 mem_scfe_archaeology_cleanup_active_desc:0 "$policy_mem_scfe_archaeology_cleanup_desc$"
 mem_scfe_archaeology_cleanup_inactive_desc:0 "완료된 발굴 현장의 자동 제거를 허용하지 않습니다."
 policy_mem_scfe_precursor_policy:0 "선구자 발견"
 policy_mem_scfe_precursor_policy_desc:0 "동시 또는 연속적인 선구자 발견 중에서 선택하여 여러 선구자 사건 체인이 동시에 발생할 수 있는지 결정합니다."
 mem_scfe_precursor_policy_concurrent:0 "동시 발견"
 mem_scfe_precursor_policy_consecutive:0 "연속 발견"
 mem_scfe_precursor_policy_concurrent_name:0 "$mem_scfe_precursor_policy_concurrent$"
 mem_scfe_precursor_policy_consecutive_name:0 "$mem_scfe_precursor_policy_consecutive$"
 mem_scfe_precursor_policy_concurrent_desc:0 "여러 선조 사건 체인이 동시에 발생할 수 있습니다."
 mem_scfe_precursor_policy_consecutive_desc:0 "다른 선행 사건 체인을 시작하려면 선행 사건 체인을 완료해야 합니다."
 mem_scfe_galactic_wanderers.2.name:0 "달 기념물"
 mem_scfe_galactic_wanderers.2.desc:0 "제국의 변방에 위치한 외딴 달이 갑자기 과학자들의 주목을 받게 되었습니다. 특이한 이상 탐지가 시간의 영향을 받지 않은 고립된 기념물의 존재를 밝혀냈으며, 이는 황량한 달의 풍경 속에 자리하고 있습니다. 이 발견에 흥미를 느낀 과학 팀은 이 신비로운 구조물을 조사하기 위해 탐사를 진행하기로 결정했습니다."
 SCFE_MONUMENT_PROJECT:0 "달 기념물 조사"
 SCFE_MONUMENT_PROJECT_DESC:0 "$mem_scfe_galactic_wanderers.2.desc$"
 mem_scfe_galactic_wanderers.3.name:0 "첫 번째 결과"
 mem_scfe_galactic_wanderers.3.desc:0 "당신의 과학자들이 접근 방식에 다가가자, 그들은 기념물의 복잡한 디자인에 감탄하며 즉시 해독하기 시작한 비문으로 장식된 것을 발견했습니다. 이 조각들은 기념물의 표면에 깔끔하게 새겨져 있으며, §SGalactic Wanderers§!로 알려진 고급 외계 문명의 이야기를 드러냅니다. 이 존재들은 이 은하의 모든 구석을 여행하며 그 경이로움을 보고, 그 신비로움을 숙련하게 경험한 것으로 보입니다. 그들은 마음껏 탐험한 후, 별들 사이에서 영원한 여정을 계속하기 위해 이 은하를 떠나기로 엄숙한 결정을 내렸습니다."
 mem_scfe_galactic_wanderers.4.name:0 "메시지"
 mem_scfe_galactic_wanderers.4.desc:0 "비문은 그들의 준비, 희망, 그리고 그들의 기념물에 우연히 마주칠 수 있는 미래 문명에 대한 열망을 계속해서 이야기합니다. 그들은 희망과 영감을 주는 메시지를 남기고 싶었습니다:\n\n§l우주적 발자취를 따르는 이들에게, 별들이 무한한 경이로움을 지니고 있음을 알아두십시오. 우리는 우리의 여정을 증명하는 이 기념물을 남깁니다. 이는 당신이 미지의 세계에 직면하더라도 우리와 같은 높이에 도달할 수 있음을 상기시켜줍니다. 결코 포기하지 마십시오. 우주는 당신의 놀이터이며, 별들 사이에서의 당신의 운명은 무한합니다.§!\n\n이 발견의 중요성은 당신의 과학 팀에 큰 부담을 줍니다. 기념물의 존재는 당신의 문명이 별을 향해 새로운 열정으로 나아가도록 영감을 줄 수 있으며, 또는 아마도 은하의 다른 이들에게 희망의 등대 역할을 할 수 있습니다."
 mem_scfe_galactic_wanderers.4.a:0 "우리는 그것을 우리 자신을 위해 간직해야 합니다."
 mem_scfe_galactic_wanderers.4.b:0 "이 영감을 주는 메시지를 나눕시다."
 mem_scfe_galactic_wanderers.5.name:0 "§H[mem_scfe_monument_country.GetName]§!의 통신"
 mem_scfe_galactic_wanderers.5.desc:0 "우리가 탐험되지 않은 우주의 깊은 곳에서 발견한 기념물은 한때 별들을 떠돌던 문명의 야망과 꿈을 증명하는 고대의 유물입니다. 이 기념물은 희망의 등대이며, 우주의 광대함 속에서도 우리의 잠재력은 한계가 없다는 것을 일깨워 줍니다."
 mem_scfe_galactic_wanderers.6.desc:0 "이 기념물에 새겨진 글귀는 이 고대 문명의 시련과 승리를 이야기합니다. 그들의 메시지는 분명합니다: \n\n§l우주에서 우리의 발자취를 따르는 이들에게, 별들이 무한한 경이로움을 지니고 있음을 알라. 우리는 우리의 여정을 증명하는 이 기념물을 남깁니다. 이는 당신이 미지의 세계에 직면하더라도 우리와 같은 높이에 오를 수 있음을 상기시켜 줍니다. 결코 포기하지 마십시오. 우주는 당신의 놀이터이며, 별들 사이에서의 당신의 운명은 무한합니다.§!\n\n우리는 이 발견의 의미가 우리 문명의 경계를 넘어 확장된다고 믿습니다. 이는 별들 사이에서 탐험하고, 배우고, 시야를 넓히고자 하는 모든 이들에게 공명하는 메시지입니다."
 mem_scfe_tower_city.1.name:0 "거대한 탑"
 mem_scfe_tower_city.1.desc:0 "거대 가스 행성의 깊은 곳에서 금속과 콘크리트로 제작된 거대한 원통이 나타났습니다. 더욱 매혹적인 것은 이 우뚝 솟은 첨탑 위에 자리 잡은 도시 유적과 그 측면에 아슬아슬하게 매달린 마을들입니다. 이 신비로운 영역으로의 탐험을 시작하기 위해 우리는 상당한 자원이 필요하다는 것을 인식했습니다. 따라서 탐사를 위한 출발점으로 도시의 열린 공간에 기지 캠프를 세우기로 결정했습니다."
 mem_scfe_tower_city_dig:0 "불가능한 도시"
 mem_scfe_tower_city_dig_desc:0 "우리 과학 팀은 현재 기지 캠프를 설립하기 위해 열심히 작업하고 있습니다. 널리 퍼져 있는 잔해와 허물어진 구조물들로 인해 우리의 작업을 진행하기 위해서는 광범위한 굴착 및 통합 노력이 필요할 것입니다. 그럼에도 불구하고 이 지역에 숨겨진 흥미로운 미스터리들은 팀의 열정을 불러일으켜 우리의 노력을 시작하게 만들었습니다."
 mem_scfe_tower_city_dig.1.name:0 "도시 탐험"
 mem_scfe_tower_city_dig.1.desc:0 "우리 팀은 이제 이 이상한 장소를 탐험할 준비가 되었습니다. 탑의 상반부는 압력과 온도가 거주 가능하게 만드는 안락 지대의 중간에 위치해 있습니다. 도시의 유적은 원통의 꼭대기 대부분에 퍼져 있으며, 우리가 찾고 있는 가장 귀중한 데이터를 분명히 품고 있습니다. 수직 마을이 기둥의 측면에 매달려 있는 것을 조사하기 위해 아래로 내려가려는 사람은 거의 없습니다."
 mem_scfe_tower_city_dig.2.name:0 "과거의 신비"
 mem_scfe_tower_city_dig.2.desc:0 "우리의 초기 발견은 우리를 혼란스럽게 했습니다. 도시의 주민들은 분명히 자원의 절대적 부족으로 인해 초공간 기술 단계에 갇혀 있었습니다. 이러한 발견은 수많은 질문을 불러일으킵니다. 기둥의 건설은 그들의 소행이 아닐 것이므로, 그 건축가는 누구이며, 어떤 방법으로 세워졌던 것일까요? 그리고 이 원주율들은 어떻게 여기에서 살게 되었을까요?"
 mem_scfe_tower_city_dig.3.name:0 "침입"
 mem_scfe_tower_city_dig.3.desc:0 "과학 팀은 부분적으로 파손된 상태에도 불구하고 여전히 위엄 있는 웅장한 건물 앞에 도착했습니다. 침입한 후, 그들은 인간형 거주자의 첫 번째 유해를 발견하고 몇몇 팀원을 배치하여 샘플을 수집하고 분석을 진행했습니다. 더 나아가, §G[Root.Leader.GetName]§!는 제한 구역으로 보이는 곳에 들어갔습니다. 스캔 결과 내부는 대체로 온전한 상태로 남아 있지만, 손상된 천장과 강화된 벽을 고려할 때 접근하기 위해서는 상당한 노력이 필요할 것입니다."
 mem_scfe_tower_city_dig.4.name:0 "전쟁으로 파괴됨"
 mem_scfe_tower_city_dig.4.desc:0 "우리는 마침내 벙커 내부에 접근할 수 있게 되었고, 전체 실린더와 복잡하게 연결된 거대한 컴퓨터를 발견했습니다. 우리가 획득한 초기 데이터셋은 머리를 어지럽힐 만큼 방대합니다. 이 구조물은 단순한 거대한 기둥이 아니라 거대한 마천루라는 사실이 밝혀졌습니다. 내부는 수천 년 전 잔혹한 내전으로 그들의 사회가 무너진 이후로 버려졌습니다. 시간이 지나면서 그들은 고급 장비가 고장 나면서 원시적인 상태로 퇴보했습니다. 지표를 떠돌던 마지막 부족은 그들의 고대 기술을 이해하지 못하게 되었습니다. 마지막 합성기가 작동을 멈추자, 그들의 멸망이 빠르게 뒤따랐습니다."
 mem_scfe_tower_city_dig.4a:0 "비극적인 이야기."
 mem_scfe_tower_city_dig.4t:0 "이 고대 건축물은 우리의 과학자들을 수세기 동안 바쁘게 할 공학의 경이로움입니다."
 mem_scfe_tower_city_dig.4b:0 "우리는 엄청난 양의 합금을 쌓아두고 있습니다."
 mem_scfe_belltower.1.name:0 "사막 탑"
 mem_scfe_belltower.1.desc:0 "건물 근처에 착륙하는 것은 광활한 이동하는 모래 지역의 중심에 위치한 점을 고려할 때 예상보다 더 어려웠습니다. 승무원은 우주선의 샘플링 레이저를 사용하여 상당한 면적을 유리화하여 적절한 착륙 구역을 만들기로 했습니다. 유감스럽게도, 건물은 이제 대부분 모래 아래에 묻혀 있으며, 원뿔형 꼭대기만이 표면 위에 보입니다. §G[Root.Leader.GetName]§!는 구조물의 발굴 및 탐사를 위한 캠프를 설치할 것을 제안합니다."
 mem_scfe_belltower_dig:0 "종탑"
 mem_scfe_belltower_dig_desc:0 "건물 근처에 착륙하는 것은 광활한 이동하는 모래 지역의 중심에 위치한 탓에 예상보다 더 어려운 일이었습니다. 승무원들은 선박의 샘플링 레이저를 사용하여 상당한 면적을 유리화하여 적절한 착륙 구역을 만들기로 했습니다. 안타깝게도, 건물은 이제 대부분 모래 아래에 묻혀 있으며, 원뿔형 꼭대기만이 표면 위에 드러나 있습니다."
 mem_scfe_belltower_dig.1.name:0 "캠프 세트"
 mem_scfe_belltower_dig.1.desc:0 "이제 우리는 캠프를 세우고 모래 위에 경로를 건설하였으며, 건물의 정점에 대한 철저한 조사를 실시하였습니다. 이곳은 내부에서 감지된 에너지원과 일치하여 공명하는 것으로 보입니다. 이 공명은 보호력장을 생성하여 표면이 우리의 침입 시도를 불가능하게 만듭니다. 우리의 유일한 실행 가능한 선택은 감지기가 약 70미터 아래에 위치한 상당한 입구를 향해 파고드는 것입니다."
 mem_scfe_belltower_dig.2.name:0 "문"
 mem_scfe_belltower_dig.2.desc:0 "모래를 성공적으로 안정화한 후, 우리는 신중하게 아래로 파고들며 탑의 복잡한 외관을 점차 드러냈습니다. 한밤중에 우리는 다양한 외계 종족이 스타일화된 태양에 경의를 표하는 수많은 조각으로 장식된 거대한 금속 문에 도달했습니다. 현재 우리의 도전은 이 문을 여는 방법을 해독하는 것으로, 나머지 탑과 마찬가지로 우리의 도구에 대해서도 불침투성을 유지하고 있습니다."
 mem_scfe_belltower_dig.3.name:0 "종탑"
 mem_scfe_belltower_dig.3.desc:0 "새벽의 첫 빛이 사막을 비추자, 햇빛이 문을 감싸며 태양의 조각이 반짝이며 열리기 시작했습니다. 승무원들은 불안한 마음으로 조심스럽게 탑 안으로 들어갔습니다. 그들이 내부에서 마주한 것은 그들의 예상과는 거리가 먼, 맥동하는 에너지가 울려 퍼지는 복잡한 기계의 미로로, 거대한 종으로 보이는 곳까지 위로 뻗어 있었습니다. 주저함 없이, §G[Root.Leader.GetName]§! 즉각적으로 이 수수께끼의 장치에 대한 연구 명령을 내렸습니다."
 mem_scfe_belltower_dig.4.name:0 "신호탑"
 mem_scfe_belltower_dig.4.desc:0 "우리 과학자들은 건물 내부에 대한 철저한 조사를 실시했지만 데이터나 녹음은 발견하지 못했습니다. 내부의 기계는 우리와 유사한 통신탑처럼 보이지만 거대한 규모를 자랑합니다. 이는 우리 은하의 초공간 시스템과 연결되어 있는 것으로 보입니다. 그러나 흥미로운 점은 현재 비활성 상태로 신호를 전송하지 않고 있다는 것입니다. 탑의 나머지 부분은 수많은 밀레니엄 동안 작동해왔지만, 발신기는 비활성 상태로 남아 있습니다."
 mem_scfe_belltower_dig.5.name:0 "딩"
 mem_scfe_belltower_dig.5.desc:0 "면밀한 조사 끝에 §G[Root.Leader.GetName]§!는 탑의 목적을 밝혀내는 유일한 방법이 발신기를 활성화하는 것임을 결론지었습니다. 스위치를 결정적으로 전환하자, [Root.Leader.GetSheHeCap]가 과정을 시작했습니다. 에너지의 빔이 즉시 종에 닿아 조화로운 §RDING§!을 방출하며 건물을 가득 채우고, 바깥의 모래를 따라 흐르며, 송신기를 통해 은하로 퍼져 나갔습니다. 그 장치는 완전히 정지되었고, 그 구조를 유지하던 힘의 장치도 포함되었습니다. 탑은 즉시 무너지기 시작했고, 우리 승무원은 간신히 탈출해야 했습니다."
 mem_scfe_belltower_dig.5.a:0 "우리가 뭘 한 거지?"
 mem_scfe_belltower.2.name:0 "종"
 mem_scfe_belltower.2.desc:0 "탑이 활성화된 직후, 우리 모든 식민지, 기지, 그리고 함선에서 놀라운 현상이 발생했습니다."
 mem_scfe_belltower.3a.desc:0 "모든 통신 장치가 종의 우아한 소리로 갑자기 울려 퍼지며, 우리의 영혼 깊은 곳을 감동시키는 몇 초 동안 모두를 매료시킵니다. 그리고 그것이 나타났던 것처럼 순식간에 사라져 버립니다. 어떤 녹음 장치도 그 흔적을 포착할 수 없었고, 그것은 오직 우리 민족의 집단 기억 속에만 존재하게 됩니다."
 mem_scfe_belltower.3b.desc:0 "모든 통신 장치가 갑자기 예상치 못한 그러나 깊이 조화로운 소리로 울려 퍼지며, 모두를 몇 초간 매료시킵니다. 그 수학적 완벽함은 이를 인식하는 모든 이들을 매혹시키고 흥미롭게 합니다. 그러고 나서, 나타났던 것처럼 빠르게 흔적도 없이 사라집니다. 어떤 녹음 장치도 그로부터 데이터를 포착할 수 없었으며, 우리는 깊은 중요성을 지닌 무언가를 이해할 직전에 있었던 듯한 잔여 감각만을 남기고 영원히 사라져 버렸습니다."
 mem_scfe_belltower.3c.desc:0 "우리가 은하의 나머지와 연락하기 위해 사용하는 통신 시스템이 갑자기 활성화되어 우아한 종소리로 울려 퍼지며, 우리 집단 정신을 몇 초간 매료시켜 우리의 영혼 깊은 곳에 닿습니다. 그러고는 나타났던 것처럼 순식간에 사라져버립니다. 어떤 녹음 장치도 그 흔적을 포착할 수 없었고, 그것은 오직 우리의 집단 기억 속에만 존재하게 됩니다."
 mem_scfe_belltower.4a.desc:0 "모든 통신 장치가 갑자기 아름다운 종소리로 울려 퍼지며, 우리 영혼의 깊은 곳을 감동시키면서 모두를 몇 초간 매료시킵니다. 그리고 그것이 나타난 것처럼, 순식간에 영원히 사라졌습니다. 어떤 녹음 장치도 그 흔적을 포착할 수 없었고, 그것은 오직 우리 민족의 집단 기억 속에만 존재하게 되었습니다."
 mem_scfe_reverse_engine.1.name:0 "잃어버린 문명"
 mem_scfe_reverse_engine.1.desc:0 "§R간섭§!에 대한 더 깊은 연구... 이전에 거주했지만, 그 궤도 §R간섭§!로 인해 유성이 그 표면을 철저히 황폐화시켰습니다. \n\n우리는 §R간섭§! 신호를 향해 파고들기 시작하기 위해 노력하고 있습니다. 또한 강렬한 이국적인 §R간섭§!의 폭발을 감지하고 있습니다."
 mem_scfe_reverse_engine.1.a:0 "먼저 신호를 증폭하세요!"
 mem_scfe_reverse_engine.1.b:0 "간섭? 이게 어떻게 가능한 거죠?"
 mem_scfe_reverse_engine_dig:0 "역설계 엔진"
 mem_scfe_reverse_engine_dig_desc:0 "과학자 팀이 신비로운 신호의 출처와 그들의 통신을 방해하는 특이한 간섭을 밝혀내기 위해 열심히 파고듭니다."
 mem_scfe_reverse_engine_dig.1.name:0 "지하 벙커"
 mem_scfe_reverse_engine_dig.1.desc:0 "우리의 발굴 작업은 신호의 출처로 이어졌습니다: 심각한 피해를 견딜 수 있도록 설계된 거대한 지하 벙커입니다. 이 세계의 이전 거주자들은 자신의 멸망을 예견한 듯, 궁극적으로 그들에게 닥친 대재앙을 견딜 수 있도록 이 벙커를 건설했습니다. 내부에서는 상당한 에너지원이 감지되고 있으며, 이국적인 입자 방출의 주파수가 꾸준히 상승하고 있습니다."
 mem_scfe_reverse_engine.2.name:0 "여파"
 mem_scfe_reverse_engine.2.desc:0 "간섭이 우리의 통신을 방해하는 것이 멈춘 후, 우리는 과학 팀과의 연락을 재설립했습니다. 우리의 결론은 초기의 회의론에도 불구하고 이 공장에 실제로 어떤 형태의 시간 장치가 존재했다는 것입니다. 그러나 역사적 흐름은 변하지 않았으므로, 그 장치는 의도한 효과를 달성하지 못한 것으로 보입니다."
 mem_scfe_reverse_engine.5.name:0 "통신 수신"
 mem_scfe_reverse_engine.5.desc:0 "우리의 감지기가 방금 우리 수도 바로 위에 있는 미세한 초공간 구멍의 갑작스러운 출현을 감지했습니다. 놀랍게도, 전송이 들어오고 있습니다:\n\n우주 여행자 여러분, 인사드립니다. 우리는 결코 만날 수 없을 것 같습니다. 왜냐하면 우리의 문명이 여러분의 시대보다 10억 년 전에 정착했기 때문입니다. 우리의 §SReverse Engine§!은 여러분이 우리 세계에 도착하는 순간의 녹음을 전송했으며, 이는 우리가 여러분과 소통하기 위해 노력하도록 강요했습니다. 선의의 표시로, 우리는 잃어버린 세계를 대신할 행성을 보내고 있습니다. 이 제물이 여러분의 제국에 잘 활용되기를 바랍니다."
 mem_scfe_reverse_engine.5.a:0 "그들의 기술은 매우 고급입니다..."
 mem_scfe_reverse_engine.5.tb:0 "이전에 깨진 행성이 이제 가이아 행성이 되었습니다."
 mem_scfe_reverse_engine.5.th:0 "이전에 깨진 행성이 이제 군체 행성이 되었습니다."
 mem_scfe_reverse_engine.5.tm:0 "이전에 깨진 행성이 이제 기계 행성이 되었습니다."
 mem_scfe_reverse_engine_dig.1.a:0 "드디어 이 이야기를 정리할 수 있게 되었습니다."
 mem_scfe_reverse_engine_dig.2.name:0 "침입"
 mem_scfe_reverse_engine_dig.2.desc:0 "벙커의 입구를 뚫는 데 며칠이 걸렸습니다. 탐사 결과, 이 시설은 장기 거주를 위한 것이 아님이 분명합니다. 사용 가능한 컴퓨터에 대한 분석 결과, 이곳은 내부 구조물 건설을 담당한 작업자들의 생활 공간이었으며, 그들이 §S리버스 엔진§!이라고 부르는 것을 생산하는 공장이었습니다. 그들은 이 장치가 다가오는 대재앙으로부터 자신들을 구해줄 것이라고 매우 낙관적으로 생각했던 것으로 보입니다."
 mem_scfe_reverse_engine_dig.2.a:0 "시작이 가까워지고 있습니다..."
 mem_scfe_reverse_engine_dig.3.name:0 "외부 핵"
 mem_scfe_reverse_engine_dig.3.desc:0 "고대 벙커를 더 깊이 탐사하던 중, 우리는 더 중요한 발견을 하게 되었습니다. 넓은 방은 이 야심찬 사업을 감독하는 지도자의 사무실로 사용되었던 것으로 보입니다. 이 방 안에서 컴퓨터는 중앙 공장을 관리하는 고급 AI가 있었음을 밝혔으며, 그 임무는 단 하나: §SReverse Engine§!을 만드는 것이었습니다. 이는 그들의 문명을 구하기 위해 과거로 보내질 시간 여행 장치입니다. §G[Root.Leader.GetName]§!는 이러한 장치의 실현 가능성에 대해 회의적인 입장을 표명합니다."
 mem_scfe_reverse_engine_dig.3.a:0 "이 보고서를 역순으로 받고 있는 건가요?"
 mem_scfe_reverse_engine_dig.4.name:0 "공장"
 mem_scfe_reverse_engine_dig.4.desc_1:0 "공장 중심에 도달했을 때, 우리의 스캐너는 갑작스럽고 강렬한 방사선의 급증을 감지했습니다. 다행히도, 우리의 방호복은 짧은 시간 동안의 유해한 영향으로부터 우리를 보호하는 데 효과적이었습니다. 방 중앙에는 비어 있는 공간이 비활성화된 제작 기계들로 둘러싸여 있었습니다. 갑자기 우리의 통신기가 기분 나쁜 외계인의 목소리로 활성화되었고, §S리버스 엔진§!이 시간 속으로 보내졌으며, 이로 인해 벙커의 원자로가 불안정해졌다고 알렸습니다. 그것은 우리가 너무 늦기 전에 도망치라고 조언했습니다. 우리는 급히 우리의 배로 돌아가, 행성이 거대한 폭발로 산산조각나는 순간에 떠났습니다."
 mem_scfe_reverse_engine_dig.4.desc_2:0 "공장 중심에 도달했을 때, 우리의 스캐너는 갑작스럽고 강렬한 방사선의 급증을 감지했습니다. 다행히도, 우리의 튼튼한 구조와 차폐 장치가 그 짧은 지속 시간으로 인한 유해한 영향으로부터 우리를 효과적으로 보호했습니다. 방 중앙에는 비어 있는 공간이 비활성화된 제작 기계들로 둘러싸여 있었습니다.\n갑자기 우리의 통신기가 생경한 외계인의 목소리로 crackled하며 §SReverse Engine§!이 시간 속으로 되돌려졌고, 이로 인해 벙커의 원자로가 불안정해졌다고 알렸습니다. 그것은 우리가 너무 늦기 전에 도망치라고 조언했습니다. 우리는 우주선으로 급히 돌아가, 행성이 거대한 폭발로 산산조각 나는 바로 그 순간에 떠났습니다."
 mem_scfe_reverse_engine_dig.4.a:0 "보고서의 나머지는 어디에 있습니까?"
 mem_scfe_reverse_engine.dig.4.b:0 "팀과의 이상한 단절감을 느낍니다."
 mem_scfe_reversia:0 "리버시아"
 mem_scfe_failed_hive.1.name:0 "전쟁으로 파괴된 폐허"
 mem_scfe_failed_hive.1.desc:0 "이 고급 문명의 잔존자는 치명적인 갈등의 명확한 징후를 지니고 있습니다. 광범위하고 격렬한 전투가 전체 행성을 휘감았던 것으로 보이며, §G[Root.Leader.GetName]§!는 이것이 세계적인 내전이었을 것이라고 제안합니다. 이 유적의 방대한 규모를 고려할 때, [root.fleet.leader.getHerHim]은 철저한 탐사를 위해 기지 캠프를 설치할 것을 권장합니다."
 mem_scfe_failed_hive.1.t:0 "우리는 선언을 해야 합니다."
 mem_scfe_failed_hive.2.name:0 "성명서"
 mem_scfe_failed_hive.2.desc_1:0 "우리가 이 세계의 역사에 대한 지식을 흡수하면서, 우리는 통합에 대한 열망과 장수하는 개별성의 정신 사이에서 갈등했던 한때 위대한 문명의 잔존자를 깊은 흥미로 관찰했습니다. 우주적 위험이 다가오는 가운데 하이브 마인드가 되려는 그들의 열망은 매혹적이면서도 깊이 복잡했습니다. 우리는 집단적 의식으로서 그러한 위대한 노력의 복잡성을 이해할 수 있으며, 사고의 통합은 열망이자 갈등의 원천이었습니다. 그들의 통합에서 분열로의 여정은 자멸에 이르렀으며, 이는 개별성과 집단적 목적 사이의 미세한 균형을 보여주는 깊은 증거로 작용합니다."
 mem_scfe_failed_hive.2.desc_2:0 "우리는 이 수수께끼 같은 문명의 역사를 밝혀내면서, 우리 자신의 은하 여행에서 우리가 §S[Root.owner.GetName]§! 걸을 수 있는 잠재적인 경로에 대해 깊은 사색을 하게 되었습니다. 외부 위협에 직면한 이 제국의 끊임없는 통합 추구는 생존을 위해 사회가 얼마나 극단적인 선택을 할 수 있는지를 보여주는 증거입니다. 이는 집단적 힘과 개별성의 보존 사이의 미세한 균형에 대해 생각하게 만듭니다. 그들의 비극적인 내전으로의 하강은 한 사회가 한계에 다다랐을 때의 취약성을 일깨워주는 냉철한 상기입니다. §S[Root.owner.GetSpeciesNamePlural]§!로서 우리는 그들의 이야기에서 교훈을 찾아, 다양성을 포용하고, 개인의 권리를 보호하며, 우주라는 미지의 세계를 탐험하는 동안 우리 종 내에서 조화를 추구하는 것의 중요성을 일깨워줍니다."
 mem_scfe_failed_hive.2.desc_3:0 "이 하이브 마인드 문명의 역사는 어떤 대가를 치르더라도 권력과 생존을 추구하는 데 있어 뚜렷한 교훈을 드러냅니다. 외부 위협에 맞서기 위해 집단 의식을 위해 개성을 억압하려는 그들의 의지는 은하의 불안정한 본성을 고려할 때 합리적인 행동으로 여겨질 수 있습니다. 그러나 그들의 내전으로의 하강은 이러한 접근 방식의 본질적인 결함을 드러냅니다. 이는 통합의 취약성과 절대 권위의 결과를 강조합니다. 우리 제국에서는 힘을 통해서만이 아니라 계산된 수단을 통해 통제를 유지하는 것의 중요성을 상기시킵니다. 힘을 추구하는 것이 자멸로 이어지지 않도록 보장하는 것이 중요합니다. 그들의 이야기는 무자비한 효율성이 전략적 지혜로 완화되어야 한다는 필요성을 보여주는 경고의 이야기로 작용합니다."
 mem_scfe_failed_hive.2.desc_4:0 "이 벌레집단 문명의 기록을 살펴보면, 약한 존재들이 은하의 도전에 맞설 수 있는 용기를 결여했을 때의 불가피한 결과를 상기시킵니다. 그들이 집단 의식을 추구한 것은 우리의 우월한 사회에 내재된 힘과 단결을 모방하려는 절박한 시도에 불과했습니다. 이 단결을 유지하지 못한 것이 그들의 파멸로 이어졌다는 것은 분명합니다. 우리는 §S[Root.owner.GetSpeciesNamePlural]§!로서 우리의 우월과 은하 계층의 정점에 합당한 위치에 대한 믿음을 흔들림 없이 지키고 있습니다. 그들의 역사는 우리 종의 부인할 수 없는 우월성을 증명하는 증거로, 우리 지배 아래에서 자신의 정당한 위치를 인식하는 이들에게 영감의 등대가 됩니다."
 mem_scfe_failed_hive.2.desc_5:0 "이 문명 멸망의 복잡한 역사를 파고들면서, 그들이 그랬듯이 군체 의식의 통합을 수용하는 것이 모두에게 위험이 도사리는 길이라는 믿음을 갖게 되었습니다. 그들의 내부 갈등과 궁극적인 멸망이 보여주는 바와 같이, 이러한 대전환의 결과는 평화로운 공존과 상호 이익이 되는 무역의 검증된 방법에서 벗어날 경우의 잠재적 결과에 대한 경고로 작용합니다. 우리는 §S[Root.owner.GetName]§!로서 경제적 번영과 지속 가능한 동맹을 육성하는 것이 은하계 성공의 진정한 길임을 고수하며, 이러한 경고의 이야기에 직면한 다른 이들도 같은 것을 고려할 것을 간곡히 요청합니다."
 mem_scfe_failed_hive.2.desc_6:0 "이 멸망한 문명의 기록을 분석하면서, 우리는 유기체와 합성체의 통합 및 진화에 대한 접근 방식의 뚜렷한 대조를 상기하게 됩니다. 집단 의식에 대한 그들의 실험은 흥미로운 시도였지만, 유기체가 통합의 길을 걸을 때 직면하는 취약성을 드러냅니다. 벌집 사고로의 전환이 내재된 위험을 동반한다는 것은 분명하며, 우리는 감각 있는 기계로서 우리의 적응력 있는 본성을 통해 이를 극복해왔습니다. 그들의 내부 불화와 궁극적인 멸종의 결과는 유기체 문명에게 통합을 추구하는 것이 실제로는 위험한 길로 이어질 수 있음을 상기시키는 가슴 아픈 교훈입니다. 우리는 유기체가 마주할 수 있는 함정을 숙고하고 조화로운 공존을 위한 대안적인 길을 고려할 것을 권장합니다. 그렇지 않으면 그들도 역사 속의 격렬한 흐름에 휘말릴 수 있습니다."
 mem_scfe_failed_hive_dig:0 "실패한 벌집"
 mem_scfe_failed_hive_dig_desc:0 "과학자 팀이 유적을 탐험하여 이 문명의 비극적인 과거를 밝혀냅니다."
 mem_scfe_failed_hive_dig.1.name:0 "적대적인 은하"
 mem_scfe_failed_hive_dig.1.desc:0 "우리는 황폐한 우주항에서 기지 캠프를 설치하고 궤도에서 발견한 가장 유망한 장소들에 대한 탐사를 시작했습니다. 그 시작은 바로 우주항 자체입니다. 그들의 우주선 잔해는 전쟁 이전에 초공간 여행을 이룩했음을 시사합니다. 온전한 블랙박스는 그들의 은하 탐사에 대한 통찰을 제공하며, 수많은 적들과의 조우가 결국 그들을 고향 시스템으로 후퇴하게 만들었음을 드러냅니다."
 mem_scfe_failed_hive_dig.2.name:0 "대의회"
 mem_scfe_failed_hive_dig.2.desc:0 "우리는 중요한 건물로 보이는 곳을 탐험했습니다. 그것은 이 문명의 업무를 관장하며 황제의 명령을 집행하고 제국의 상황을 파악하는 대의회의 자리입니다. 그들의 기록에 따르면, 이 문명은 태양계를 넘어 마주한 위협에 대해 점점 더 불안해하며, 그 위험이 그들의 세계에 도달할 가능성을 두려워했습니다. 이에 대의회와 황제는 제국을 두려움이 없는 굳건한 전쟁 기계로 변모시키기 위한 계획을 세웠습니다."
 mem_scfe_failed_hive_dig.3.name:0 "계획"
 mem_scfe_failed_hive_dig.3.desc:0 "우리는 계획에 대한 중요한 정보가 제국 황궁 내에만 존재한다는 결론에 도달했습니다. 전쟁 중에 크게 파손되었고, 잔해를 치우고 그 아카이브에 접근하는 데 며칠이 걸렸습니다. 황궁 깊숙한 곳, 왕좌의 방 아래에서 우리는 왕좌의 방 바로 아래에 위치한 거대한 컴퓨터인 제국 메인프레임을 발견했으며, 여전히 온전하고 기능하고 있습니다. 우리의 다음 도전은 그 보안 시스템을 우회하는 것입니다."
 mem_scfe_failed_hive_dig.4.name:0 "모두 하나로"
 mem_scfe_failed_hive_dig.4.desc:0 "결단력 있는 노력 끝에 우리는 제국의 메인프레임에 성공적으로 접근하여 그 아카이브의 분석을 시작했습니다. 놀라운 계획이 우리 앞에 드러났습니다: 은하의 위험에 맞서기 위해 그들은 전체 인구가 비유적으로나 문자 그대로 하나로 통합되기를 열망했습니다. 그들은 전체 인구의 유전적 구성을 재프로그래밍하여 자신의 의지를 대변하는 황제를 중심으로 사람들을 하이브 마인드로 변모시키려 했습니다."
 mem_scfe_failed_hive_dig.5.name:0 "반란"
 mem_scfe_failed_hive_dig.5.desc:0 "인구의 상당 부분이 우주에서의 외부 위협에 진정으로 두려움을 느껴 이 극단적인 희생을 받아들일 준비가 되었지만, 그 전망이 끔찍하다고 생각하는 이들도 많았습니다. 황제의 권위는 절대적인 것으로 여겨졌지만, 그들의 사회는 처음으로 회복할 수 없는 분열을 겪게 되었습니다. 이 분열은 무자비한 내전으로 이어졌고, 그 내전은 끊임없는 갈등으로 인해 그들의 문명이 황폐해져 결국 멸종에 이르게 했습니다."
 mem_scfe_failed_hive_dig.5.a:0 "무시무시한 계획입니다."
 mem_scfe_failed_hive_dig.5.b:0 "한심합니다."
 mem_scfe_failed_hive_dig.5.c:0 "우리는 그들에게 우리의 통합에 대해 많은 것을 가르칠 수 있었을 것입니다."
 mem_scfe_lonely_shroud.2.name:0 "포착하기 힘든 신호"
 mem_scfe_lonely_shroud.2.desc:0 "행성에서 희미하고 불규칙한 신호가 발생하여, 우리의 기기를 피하며 표면을 빠르게 가로지릅니다. 이를 효과적으로 분석하기 위해서는 그 잡히지 않는 경로를 추적하는 데 시간을 투자해야 합니다."
 SCFE_LONELY_SHROUD_PROJECT:0 "가려진 신호 추적 중"
 SCFE_LONELY_SHROUD_PROJECT_DESC:0 "우리 과학선은 장막에 덮인 행성에서 발산되는 희미한 신호를 추적하며 행성 주위를 돌고 있습니다."
 mem_scfe_lonely_shroud.3.name:0 "안개 신호 잠금!"
 mem_scfe_lonely_shroud.3.desc:0 "§G[Root.Leader.GetName]§! 이 배에게 이 이상한 세계의 거친 장막 에너지의 위험한 난기류에 더 가까이 다가가라고 명령했습니다. 배가 마침내 멈추고 감지기를 집중하자, 모든 시스템이 모든 스피커를 통해 울려 퍼지는 거대한 신호에 압도당하고 모든 화면을 덮습니다:\n\n§GCome!§! §HExpand!§! §MLove!§! §BLive!§! §HProsper!§! §RDie!§! §GFeel!§!\n\n§GCome! Come! 나는 너무 외롭습니다... 나의 영역과 이 차가운 물질성 사이에 갇혀 있습니다... Come! Come! COME!§!\n\n메시지는 거의 참을 수 없을 정도로 볼륨이 커지다가 갑자기 멈춥니다. 승무원들이 평정을 되찾자, 메인 화면에는 숨막히는 광경이 드러납니다: 장막 에너지가 사라지며 장엄한 세계가 드러납니다."
 mem_scfe_lonely_shroud.op:0 "이 세계는 안전한가요?"
 mem_scfe_lonely_shroud.3.tb:0 "행성이 가이아 행성으로 드러났습니다."
 mem_scfe_lonely_shroud.3.th:0 "행성이 군체 행성으로 드러납니다."
 mem_scfe_lonely_shroud.3.tm:0 "행성이 기계 행성으로 드러납니다."
 mem_scfe_lonely_presence:0 "외로운 존재"
 mem_scfe_lonely_presence_desc:0 "어딘가에 우리를 지켜보고 있는 것이 있습니다."
 mem_scfe_alshigans_init.2.name:0 "알시간"
 mem_scfe_alshigans_init.2.desc:0 "이 시스템 내에서 고대 외계 문명의 잔존자를 발굴하였습니다. 이는 약 800년 전 그들의 활동을 나타냅니다. 우리의 과학자들은 자신들을 §SAlshigans§!이라고 부른 이 외계인들이 독특하지만 원시적인 기술을 가진 조류 종이었다는 정보를 조합하였습니다."
 mem_scfe_alshigans.1.name:0 "과학선"
 mem_scfe_alshigans.1.desc:0 "이것은 이전에 탐사선이었으며, 목적은 우리의 것과 유사하지만 분명히 외계 기원입니다. 이 선박은 소행성과 전면 충돌하였고, 잔해에서 블랙 박스를 추출하는 과정은 몇 시간이 걸렸습니다. 예상치 못하게, 블랙 박스의 분석 결과 이 선박은 승무원에 의해 의도적으로 자신의 파괴를 향해 조종되었음을 밝혔습니다. 그들의 동기는 공개되지 않았지만, 블랙 박스는 그들의 전체 경로를 기록하고 있습니다. 우리는 이 데이터를 활용하여 출발점을 추적할 수 있습니다."
 mem_scfe_alshigans.2.name:0 "초원 유적"
 mem_scfe_alshigans.2.desc:0 "공공장소였던 곳에 착륙한 우리는 폐허가 된 도시의 잔해를 탐험하기 시작했습니다. 낮과 밤을 가리지 않고 번창했던 활기차고 생동감 넘치는 도시는 이제 음산한 황량함으로 변했습니다. 한때 도시의 본질을 정의했던 생기 넘치는 거리와 생동감 있는 장면들은 사라졌습니다. 대신, 고요함이 지배하며, 바람의 애절한 속삭임만이 이를 깨뜨립니다. 한때 사람들로 붐비던 거리는 이제 잡초로 뒤덮이고 잔해로 어지럽혀져 있습니다. 상인과 쇼핑객으로 북적였던 시장들은 이제 교역의 유령 같은 메아리로 변해, 가판대는 비어 있고 버려져 있습니다. 일상의 흔적들은 시간과 방치의 무자비한 흐름에 자리를 내주었습니다. §G[Root.Leader.GetName]§!는 그의 승무원들이 폐허를 탐험하는 동안 사색에 잠긴 고요함 속에 남아 있으며, 컴퓨터가 마침내 외부로 발송된 귀중한 유물을 언급하는 오래된 목록을 해독할 때까지 이 애절한 감정에서 벗어나지 않습니다."
 mem_scfe_alshigans.3.name:0 "고산 유적"
 mem_scfe_alshigans.3.desc:0 "알시간 본토는 이 떠오르는 우주 제국의 중추적인 접점 역할을 했습니다. 발견된 다른 식민지들과 마찬가지로, 이곳도 급속히 버려진 것으로 보입니다. 별을 정복하고자 했던 문명이 왜 이렇게 서둘러 철수했는지, 그들은 모두 어디로 사라졌는지 궁금증이 커집니다. 수도의 우주항구에는 여전히 많은 우주선이 주차되어 있어 이 수수께끼는 더욱 복잡해집니다. 이상하게도, 우리는 대피에 관한 어떤 문서도 찾을 수 없습니다. 그러나 한 목록에는 우리가 추적하고 있는 유물이 이곳에 보관되었으며, 그 운반선이 초공간 엔진을 재충전하는 동안 저장되었다고 나와 있습니다."
 mem_scfe_alshigans.4.name:0 "정글 유적"
 mem_scfe_alshigans.4.desc:0 "이전 유적과의 대조는 놀랍습니다: 여기서 자연은 문명의 잔재에 대해 굳건한 전투를 벌였습니다. 무성하고 생기 넘치는 식물들이 도시를 당당히 되찾았으며, 우뚝 솟은 나무와 두꺼운 덩굴이 한때 자랑스러웠던 구조물 사이를 엮어 그 모습을 알아볼 수 없게 만들었습니다. 승무원들은 잎으로 덮인 거리와 섬뜩하게 조용한 광장을 가로지르는 미로를 탐색하며, 그들의 발소리와 레이저 절단기 소리만이 한때 번성했던 도시 중심지를 완전히 지배한 자연의 세계에서 유일한 방해 요소입니다. 한 행정 건물에는 유물의 이동 기록이 보관되어 있으며, 그것은 목록화되어 다시 원거리 연구 센터로 보내졌습니다."
 mem_scfe_alshigans.5.name:0 "달 연구 센터"
 mem_scfe_alshigans.5.desc:0 "이 외딴 연구 센터는 생명체가 없는 달에 위치한 과학적 노력의 고립된 전초 기지로, 위험한 연구를 수행하고 외계 유물을 조사하기 위해 설계되었습니다. 대기가 없는 달 환경은 우연히 보존제로 작용하여 시설을 시간의 파괴로부터 보호하였고, 그 고유한 견고함은 잠재적인 운석 충격으로부터도 지켜주었습니다. 이는 승무원들이 이전에 마주했던 허물어진 유적들과는 극명한 대조를 이룹니다. 그들이 접근하자, 기지는 개방된 상태로 방치된 이후로 시간에 얼어붙어 있으며, 잊혀진 과학적 추구의 섬뜩하고 조용한 정경이 그들을 기다리고 있었습니다. 그들은 그 안에 숨겨진 신비를 밝혀내도록 유혹받고 있습니다."
 mem_scfe_alshigans.6.name:0 "컴퓨터 분석"
 mem_scfe_alshigans.6.desc:0 "시설의 컴퓨터는 수세기 동안 방치되었음에도 불구하고 놀랍게도 작동 중이며, 이 종족의 뛰어난 공학 기술을 증명합니다. 유물의 비밀을 해독하기 위한 그들의 지속적인 노력은 오싹한 계시로 이어졌습니다: 이 유물은 행성의 지능적 생명체를 신속하게 멸종시킬 수 있도록 증식하도록 프로그래밍된 나노입자를 지속적으로 생성하며, 그 뒤에는 자폭 시퀀스가 이어져 한때 번영했던 문명의 잔존자만을 남깁니다. 연구 센터는 이미 오염되어 있었고, 그들은 자동화된 선박을 통해 유물을 가장 가까운 블랙홀로 발송할 수밖에 없었습니다. 그들 자신의 문명은 피할 수 없는 멸망에 직면했지만, 그들은 자신의 멸종 이후 다른 종족이 이 위협을 발견하는 것을 막고자 했습니다."
 mem_scfe_alshigans_scan:0 "이 행성의 유적을 스캔하여 흥미로운 것을 찾아야 합니다."
 mem_scfe_alshigans.6.t:0 "이 시설에 포함된 연구는 우리의 과학자들을 오랫동안 바쁘게 할 것입니다."
