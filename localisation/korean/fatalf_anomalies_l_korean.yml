l_korean:
 d_fatalf_overgrowth_desc:0 "더 퍼지기 전에 이것을 제거해야 합니다."
 d_fatalf_overgrowth:0 "감염성 과성장"
 empty_asteroid_space_fatalf_category_desc:0 "소행성대 안에서, 우리의 센서는 완전히 비어 있는 공간을 포착했습니다. 성계 대부분에는 적어도 약간의 잔열이나 미량 분자가 남아 있기 마련이므로, 이 지점은 꽤 흥미롭습니다."
 empty_asteroid_space_fatalf_category:0 "빈 공간"
 fatalf_anomaly.001.desc:0 "[Root.GetLeaderName]이 벙커를 탐사하던 중, 낡은 컴퓨터와 계산 기계로 가득 찬 큰 방을 발견했습니다. 그 순간 갑자기 울부짖는 경보가 잇따라 울리고 모든 기계가 빛을 냅니다. 그들은 무슨 일이 벌어지고 있든 막을 수 있을지도 모른다고 생각하지만, 아직 도망칠 시간도 있습니다."
 fatalf_anomaly.001.title:0 "숨겨진 벙커"
 fatalf_anomaly.002.desc:0 "벙커를 빠르게 조사한 결과, 각 기계가 벙커에 진입하면 활성화되는 경보 체계의 일부라는 사실이 드러났습니다. 그러나 [Root.GetLeaderName]은 시스템을 멈추기 위해 파괴할 기계를 찾아냈고, 그 시스템이 수많은 폭발물을 기폭시켜 일대를 초토화하려 했음을 알아냈습니다."
 fatalf_anomaly.002.title:0 "숨겨진 벙커"
 fatalf_anomaly.003.desc:0 "벙커를 빠르게 조사한 결과, 각 기계가 벙커에 진입하면 활성화되는 경보 체계의 일부라는 사실이 드러났습니다. 그러나 [Root.GetLeaderName]은 울부짖는 사이렌을 비활성화할 방법을 찾지 못했습니다. 노력이 헛수고임을 깨닫는 순간, 벙커 전체와 주변 지형이 거대한 화염구 속에서 폭발했습니다. 누구도, 무엇도 살아남았을 가능성은 낮습니다."
 fatalf_anomaly.003.title:0 "숨겨진 벙커"
 fatalf_anomaly.004.desc:0 "원인이 무엇이든 좋은 일일 리 없습니다. 우리 팀은 최대한 빠르게 움직여 벙커에서 후퇴했습니다. 그들이 행성을 떠나기 시작하자마자 벙커와 주변 지형이 거대한 화염구로 폭발했습니다. 그 안에 휘말린 자는 살아남을 가망이 없었을 것입니다."
 fatalf_anomaly.004.title:0 "숨겨진 벙커"
 fatalf_anomaly.005.desc:0 "§Y[From.GetName]§! 궤도에서 버려진 우주 정거장을 발견했습니다. 이 정거장은 우리 센서에서 자신을 숨기는 원시적인 은폐 형태를 갖추고 있었지만, 우리가 접근하자 사라졌습니다. 정거장 곳곳의 금속을 가로지르는 거대한 찢긴 흔적 외에는 명백한 생명 징후가 없습니다."
 fatalf_anomaly.005.title:0 "버려진 기지"
 fatalf_anomaly.006.desc:0 "그 끔찍한 흔적을 남긴 원인은 오래전에 사라졌습니다. 정거장은 현재든 과거든 생명의 흔적 하나 없이 비어 있습니다. 내부의 유용한 것은 모두 제거되었습니다. 그러나 정거장 자체는 원시적일지라도 유용한 기술을 제공할 수 있습니다."
 fatalf_anomaly.006.title:0 "버려진 기지"
 fatalf_anomaly.007.desc:0 "알고 보니 정거장은 우리가 기대했던 것만큼 비어 있지 않았습니다. 내부는 알 수 없는 바퀴벌레 같은 생물의 오래된 사체로 가득했고, 그 몸은 알아보기 힘들 정도로 훼손되어 있었습니다. 안타깝게도 그들을 죽인 자동 방어 장치는 아직 작동 중이었고, 우리 팀이 더 깊이 들어가자 작동했습니다. 생존자는 없었습니다."
 fatalf_anomaly.007.title:0 "버려진 기지"
 fatalf_anomaly.008.desc:0 "알고 보니 정거장은 우리가 기대했던 것만큼 비어 있지 않았습니다. 내부는 알 수 없는 바퀴벌레 같은 생물의 오래된 사체로 가득했고, 그 몸은 알아보기 힘들 정도로 훼손되어 있었습니다. 그들을 죽인 자동 방어 장치는 아직 작동 중이었지만, 우리 팀은 시스템이 그들을 포착하기 전에 제어 장치를 찾아 꺼낼 수 있었습니다. 이제 정거장은 가능한 한 안전합니다."
 fatalf_anomaly.008.title:0 "버려진 기지"
 fatalf_anomaly.009.desc:0 "정밀 조사 결과, 그 빈 공간은 사실 원시적인 은폐 형태로 개조된 소행성임이 밝혀졌습니다. 그 외에는 이 소행성에 전혀 흥미로운 점이 없어 보입니다."
 fatalf_anomaly.009.title:0 "은폐된 소행성"
 fatalf_anomaly.010.desc:0 "빈 공간을 정밀 조사한 결과, 그곳은 정말로 완전히 비어 있음이 밝혀졌습니다. 미량 분자와 배경 복사조차 전혀 존재하지 않습니다."
 fatalf_anomaly.010.title:0 "완전한 무"
 fatalf_anomaly.011.desc:0 "지형을 조사한 결과, 서로 연결된 여러 대형 기계가 드러났습니다. 이들은 알 수 없는 곳에서 에너지를 빨아들이고, 웜홀에서 발견되는 것과 유사한 방사선 패턴을 방출하는 듯합니다. 우리는 현재 하던 일을 계속하게 그냥 둘 수도 있고, 그 잠재력을 완전히 활성화하려 시도할 수도 있습니다."
 fatalf_anomaly.011.title:0 "웜홀 생성기"
 fatalf_anomaly.012.desc:0 "설계는 우리가 전에 본 어떤 것과도 다르지만, 우리는 기계를 작동하는 방법을 대체로 이해할 수 있었습니다. 흡입 장치에 더 많은 전력을 할당하자 시스템은 §Y[Root.System.GetName]§!에 안정적인 웜홀을 만들어내는 데 필요한 추진력을 얻었습니다!"
 fatalf_anomaly.012.title:0 "웜홀 생성기"
 fatalf_anomaly.013.desc:0 "지형을 조사한 결과, 서로 연결되어 있던 여러 폐허가 된 기계가 드러났습니다. 우리가 파악한 바로는 이들의 목적은 알 수 없는 곳에서 에너지를 빨아들여 축적한 뒤 안정적인 웜홀을 만들어내는 것이었습니다. 안타깝게도 상태가 너무 심하게 망가져 다시 가동할 수 있을 가능성은 낮습니다."
 fatalf_anomaly.013.title:0 "파손된 웜홀 생성기"
 fatalf_anomaly.014.desc:0 "[From.GetName]의 이상한 광자 방출을 조사한 결과, 그 패턴이 완전히 무작위는 아니라는 사실이 드러났습니다. 밀리초 길이의 빛 덩어리는 세 가지 길이로 나타나며, 이는 첫 23개의 피보나치 수를 삼진법으로 표현한 것이 초당 두 번 반복되는 형태로 해석됩니다."
 fatalf_anomaly.014.title:0 "별빛 메시지"
 fatalf_anomaly.015.desc:0 "[From.GetName]의 광구 안에는 알 수 없는 금속으로 된 거대한 판처럼 보이는 것이 수백만 개 존재합니다. 그것들은 알 수 없는 힘에 의해 항성 내부에서 터무니없는 속도로 추진되고 있으며, 우리가 관측한 반복적인 섬광을 일으키고 있습니다. 이 금속들의 목적이나 기원은 전혀 알 수 없습니다."
 fatalf_anomaly.015.title:0 "광휘의 무덤"
 fatalf_anomaly.016.desc:0 "[Root.GetLeaderName]이 오벨리스크에 접근하자, 장비가 장거리 무선 신호의 잔재를 희미하게 감지했습니다. 그들은 기둥 내부에 어떤 동력원이 있으며, 쓰러지기 전에는 정보를 송신하는 데 사용되었을 가능성이 높다고 판단했습니다."
 fatalf_anomaly.016.title:0 "송신 오벨리스크"
 fatalf_anomaly.017.desc:0 "[Root.GetLeaderName]이 쓰러진 오벨리스크에 가까이 다가가자, 그 표면이 아름다운 풍경 그림들로 덮여 있음을 볼 수 있었습니다. 그중 다수는 이 단일 행성에서는 불가능한 풍경입니다. 각각의 그림 아래에는 어떤 외계 언어로 된 문장이 있습니다. 하지만 더 연구할 것이 없다면, 정확히 무엇을 말하는지는 영영 알 수 없을지도 모릅니다."
 fatalf_anomaly.017.title:0 "아름다운 오벨리스크"
 fatalf_anomaly.101.desc:0 "더 자세히 조사한 결과, 그 암석 지형은 사실 §Y[From.GetName]§!의 지하에 있는 거대한 벙커였습니다. 시간이 좀 걸리겠지만, 원한다면 입구를 찾아 내부를 탐사할 수 있을 것입니다."
 fatalf_anomaly.101.title:0 "숨겨진 벙커"
 FATALF_BUNKER_STUDY_DESC:0 "§Y[From.GetName]§!에 매우 부자연스러워 보이는 거대한 암석 지형이 있습니다. 조사할 인원을 보내야 합니다."
 FATALF_BUNKER_STUDY:0 "기묘한 지형 연구"
 fatalf_colony_colony_ship_DESC:0 "웜홀은 당분간 대체로 안정적입니다. 닫히기 전에 식민선을 통과시킬 기회는 아마 한 번뿐일 것입니다. 만약 닫힌다면, 그 결과 발생하는 에너지 방출이 성계 안의 모든 것을 소멸시킬 가능성이 극히 높습니다."
 fatalf_colony_colony_ship:0 "원정대 파견"
 fatalf_stable_wormhole_desc:0 "이 웜홀은 다시 움직일 것 같지 않으며, 스캔 결과 통과해도 안전한 것으로 보입니다. 우리가 통과한다면, 잃어버린 이들을 찾을 수 있을까요?"
 fatalf_stable_wormhole_title:0 "고정된 웜홀"
 fatalf_stable_wormhole:0 "고정된 웜홀"
 fatalf_study_colony_wormhole_DESC:0 "우리 과학자가 갑작스러운 웜홀 속으로 사라졌다가, 우리 종족에게 완벽한 거대하고 자유로운 행성에 대한 이야기를 가지고 돌아왔습니다. 노력을 집중한다면 웜홀을 일시적으로 안정화해 통과할 수 있을지도 모릅니다. 하지만 기회를 잃기 전까지 남은 시간은 많지 않습니다."
 fatalf_study_colony_wormhole:0 "닫힌 웜홀 조사"
 fatalf_wormhole_generator_project_DESC:0 "근처 행성에서 작동 중인 웜홀 생성기를 발견했습니다. 이 기계를 연구하면 성계 안에 기능하는 웜홀을 안정화할 수 있을지도 모릅니다."
 fatalf_wormhole_generator_project:0 "웜홀 생성기 연구"
 hidden_bunker_fatalf_category_desc:0 "§Y[From.GetName]§!의 지형에서 솟아난 이상한 암석 지형이 있습니다. 매우 부자연스러워 보입니다. 조사해야 합니다."
 hidden_bunker_fatalf_category:0 "기묘한 지형"
 orbiting_station_fatalf_category_desc:0 "§Y[From.GetName]§! 궤도에 있는, 겉보기에는 비어 있는 우주 공간에서 신호가 나오고 있습니다. 신중하게 조사하면 그 근원을 찾을 수 있을지도 모릅니다."
 orbiting_station_fatalf_category:0 "잊힌 신호"
 overgrowth_hangar:0 "과성장 격납고"
 pulsating_star_fatalf_category_desc:0 "항성 [From.GetName]은 예상되는 방식으로 빛을 방출하지 않고 있습니다. 무언가가 간섭하여 빛이 밀리초 단위로 차단되고 있으며, 스트로브 효과를 흉내 내고 있습니다."
 pulsating_star_fatalf_category:0 "깜빡이는 항성"
 rosetta_stone_fatalf_category_desc:0 "§Y[From.GetName]§!의 표면에서, 우리 과학자는 거대한 기둥 모양 물체가 땅에 누워 있는 듯한 것을 포착했습니다. 더 자세히 살펴보려면 착륙해야 합니다."
 rosetta_stone_fatalf_category:0 "오벨리스크"
 wormhole_generator_fatalf_category_desc:0 "우리 센서가 §Y[From.GetName]§!에서 나오는 이상한 수치를 감지하고 있습니다. 자연 웜홀이 방출하는 것과 비슷하지만, 이것은 지하에 위치해 있습니다."
 wormhole_generator_fatalf_category:0 "이상한 기계"
