 ottereditor.13.desc:0 "은하에 새로 소환될 성계를 선택하세요.\n이미 존재하는 성계의 위치는 핑으로 알려줍니다.\n§Y알림: 만약 새 게임을 바로 시작한 상태라면 몇몇 성계들은 소환되지 않을 수 있습니다. 이 현상을 해결하려면 세이브를 한번 하고 다시 불러오는 것이 필요합니다.§!"
 ottereditor.13.ping:0 "맵 핑"
 ottereditor.13.k:0 "§Y[ott_target.System.GetName]§! §E주위에 소환되게 설정§! "
 ottereditor.13.l:0 "§E랜덤한 위치에 소환되게 설정§!"
 ottereditor.13.sys_random:0 "현재 이 메뉴의 성계들은 §Y랜덤§!한 위치에 소환되게 설정되어 있습니다.\n이 옵션을 토글하면 현재 타겟팅되어 있는 성계의 부근에 소환되게 설정합니다.\n이 옵션은 오직 현 메뉴에서만 유효하고 옵션이 선택된 후에는 §Y랜덤§! 으로 리셋됩니다."
 ottereditor.13.sys_origin:0 "현재 이 메뉴의 성계들은 §Y[ott_target.System.GetName]§!의 주위에 소환되게 설정되어 있습니다.\n만약 랜덤한 위치에 소환되길 바란다면 이 옵션을 토글하십시오."
