l_korean:
 giga_colony.1.pc_giga_edge_of_eternity:0 "우리의 개척선이 §Y[Root.GetName]§!의 폐허가 된 고고학 우주항에 있는 커다란 착륙대에 부드럽게 착륙했습니다. 비록 고대 고고학 단지의 주요 부분에서 멀리 떨어져 있지만, 우주 기지는 그러한 위험한 바다에 착륙하는 것보다 훨씬 안전합니다.\n\n이 배는 새로운 정착지의 행정 본부로 영구 개조되었고, 식민지의 임시 동력원 역할을 할 수 있도록 원자로 노심을 제거하는 과정에 있습니다.\n\n식민지 개척자들이 대거 상륙하기 시작하면서 인근 유적지 곳곳에 수백 개의 조립식 쉘터가 생겨났습니다. 이 도시는 외계 최초의 [Root.Owner.GetSpeciesName] 도시입니다."
