l_korean:
 mem_refuel_category:0 "연료 누출"
 mem_refuel_category_desc:0 "스캔에 의하면 거대 기체 행성의 대기층 상류에서 미확인 성분이 확산하고 있습니다. 성분의 화학적 구조, 방사선과 높은 에너지 밀도는 이것이 우주선 연료임을 시사합니다."
 mem_refuel.1.name:0 "버려진 급유 정거장"
 mem_refuel.1.desc:0 "[Root.GetName]는 [From.GetName] 주위의 연료 구름을 추적하여 그 출처를 밝혀냈습니다 - 알 수 없는 기원의 오래된 우주 정거장입니다. \n\n[Leader.GetName]는 이 정거장이 최소 400년 된 것으로 추정합니다. [Leader.GetSheHeCap]는 [Leader.GetSXX] 이 정거장이 그동안 안전하게 보존되었으나, 최근 소행성에 의해 타격을 받아 궤도가 불안정해지고 주요 저장 탱크가 파손되었다고 믿습니다. 이 정거장이 오래 버티지 못할 것이 분명하며, 그 귀중한 내용물도 마찬가지입니다."
 mem_refuel.1.a:0 "[Root.GetName]에 연료를 넣어라."
 mem_refuel.1.a.tooltip:0 "§R알 수 없는 출처에서 연료를 추출하는 것은 위험할 수 있습니다...§!"
 mem_refuel.1.b:0 "추가적인 회수를 위해 연료 구름을 추적하라."
 mem_refuel.1.c:0 "추가적인 연구를 위해 정거장의 파괴를 막을 방법을 찾아라."
 mem_refuel.1.d:0 "이 기회에 정거장을 연구하라."
 mem_refuel.1.e:0 "멀리 떨어져라. 그럴 만한 값어치가 없다."
 mem_refuel.2.name:0 "공짜란 없다"
 mem_refuel.2.desc:0 "[Root.GetName]에서 구조 요청을 받고 있습니다. [FROMFROM.GetName]에서 얻은 연료가 시스템을 불안정하게 만들어 치명적인 엔진 고장을 일으켰고, 결국 매우 큰 폭발로 이어진 것 같습니다. \n\n적절한 테스트 없이 미지의 출처에서 연료를 사용하는 것이 올바른 선택이 아니었을지도 모릅니다."
 mem_refuel.20.name:0 "실패"
 mem_refuel.20.desc:0 "[Root.GetName]는 [FROMFROM.GetName]의 붕괴 궤도에서 연료가 누출되는 우주 정거장을 발견했습니다. 그러나 [Leader.GetHisHer] 승무원의 최선의 노력에도 불구하고 [Leader.GetSheHe]는 [Leader.GetWasWere]와 함께 추가 조사를 위해 도킹할 수 없었고, [Leader.GetWasWere]는 정거장이 거대 가스 행성의 더 밀집된 대기로 사라져버려 분리할 수밖에 없었습니다."
 mem_refuel.20.a:0 "불행하군."
 mem_refuel.30.name:0 "실패"
 mem_refuel.30.desc:0 "[Root.GetName]는 [FROMFROM.GetName]의 붕괴 궤도에서 연료가 누출되는 우주 정거장을 발견했습니다. 추가 조사를 위해 도킹을 시도했으나, [Root.GetName]와 정거장이 충돌로 파괴되는 재앙적인 결과를 초래했습니다."
 mem_refuel_modifier:0 "외계 연료"
