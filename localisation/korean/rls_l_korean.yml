 rls_direction_unity_7_desc:0 "$rls_direction_prefix_desc$각 행성의 £building£ §Y건물§!은 §G+0.5§! $unity$ §Y£unity£§!을 생산합니다.[Root.rls_check_ruler_direction_7_level]"
 rls_direction_unity_8_desc:0 "$rls_direction_prefix_desc$§Y$MOD_PLANETARY_ASCENSION_COST_MULT$§!을 §G-3%§! 줄입니다.[Root.rls_check_ruler_direction_8_level]"
