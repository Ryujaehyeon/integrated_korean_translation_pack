 edict_play_as_ruler_campaign_ethic_focus:0 "통치자 캠페인: 생각 변동"
 edict_play_as_ruler_campaign_ethic_focus_desc:0 "§L$play_as_ruler_gaining_influence$ 카테고리§!\n제국의 왕조가 이어지는 동안, 사람들의 생각은 자연스럽게 시간의 흐름에 따라 진화합니다. 그러나 올바른 방향으로 부드러운 자극을 주는 것은 우리의 목표에 유리할 수 있습니다."
 rls_direction_influence_4_desc:0 "$rls_direction_prefix_desc$우리의 §Y$MOD_COUNTRY_TRUST_CAP_ADD$§!가 §G+10§! 증가합니다.[Root.rls_check_ruler_direction_4_level]"
