 edict_play_as_ruler_campaign_sensor_focus:0 "통치자 캠페인: 심우주 관측"
 edict_play_as_ruler_campaign_sensor_focus_desc:0 "§L$play_as_ruler_researcher$ 카테고리§!\n우주의 광활함 속에서, 눈에 보이지 않는 것이 많습니다. 우리의 관측을 향상시키고 더 명확한 통찰을 얻기 위해 고급 모션 센서의 구현이 필요합니다."
 rls_direction_researcher_4_desc:0 "$rls_direction_prefix_desc$모든 과학선의 §Y$MOD_SHIP_SCIENCE_SURVEY_SPEED$§!가 §G+15%§! 증가합니다.[Root.rls_check_ruler_direction_4_level]"
