 play_as_ruler_not_enough_skill_point:0 "§R£trigger_no£§Y[root.GetRulerName]§!의 능력을 성장시키기에 §Y기술 점수§!가 부족합니다.§!"
 ruler_botton_rls_access_skill_point_ui:0 "§H기술 점수 메뉴§!\n§E§H기술 점수§!는 제국의 방향성을 정하는 통치자의 경험을 나타내며, 시간이 지남에 따라 천천히 이를 획득하고 자신의 통치 수준을 전문화하는 데 사용할 수 있습니다. 현명한 통치자는 경험에서 배우고 사용하는 것을 잊지 않을 것입니다.§!\n\n우리는 §H[root.leader.GetName]§!의 기술 점수를 사용하여 [root.ruler.GetHerHis]의 능력을 향상시킬 수 있고, 여분의 기술 점수를 §B실행 점수§! 나 §Y아이디어 점수§!로 전환할 수 있습니다."
 ruler_botton_rls_reset_botton:0 "§H초기화§!\n우리가 사용한 모든 기술 점수를 초기화합니다.\n\n§G눌러서 초기화합니다§!"
 ruler_botton_rls_plus_botton:0 "§G기술 점수를 §Y2§! 소모하여 이 레벨을 §Y1§! 증가시킵니다.§!"
 ruler_botton_rls_minus_botton:0 "§G 이 레벨을 §Y1§! 낮춰 기술 점수를 §Y2§! 되돌려 받습니다§!"
 ruler_botton_rls_click_to_access:0 "\n§G눌러서 접근§!"
 play_as_ruler_show_available_skill_point:0 "현재 §H[root.GetRulerName]§!은(는) §Y[root.leader.rls_ruler_skill_point_num]§! 기술 포인트를 사용할 수 있습니다."
 ruler_botton_rls_change_for_execution_point_botton:0 "§G기술 점수 §Y5§!를 실행 점수 §Y1§!로 전환하기§!"
 ruler_botton_rls_change_for_idea_point_botton:0 "§G기술 점수 §Y5§!를 아이디어 점수  §Y1§!로 전환하기§!"
 ruler_botton_rls_change_for_point_undo_botton:0 "§G기술 점수 §Y5§!를 관련 점수 §Y1§!로 전환하기§!"
 rls_no_skill_point:0 "§R사용할 수 있는 §Y기술 점수§!가 충분하지 않습니다.§!"
 rls_skill_point_cap_reached:0 "§R최대치 도달.§!"
 rls_no_spend_point:0 "§R£trigger_no£ 이 카테고리에 사용된 §Y기술 점수§!가 없습니다.§!"
 rls_auto_unlock_desc:0 "§H자동 해금§!\n시간이 지남에 따라 채택된 중점 방향을 자동으로 잠금 해제합니다.\n\n§Y자동 언락을 사용하면 통치자는 아이디어 점수를 얻지 못하며 잠금 해제 진행은 일반적으로 수동보다 느립니다.§!"
 rls_auto_unlock_enabled_tooltip:0 "§H활성화 됨, 통치자는 아이디어 점수를 얻지 못하며 채택된 카테고리의 중점 방향을 잠금 해제합니다.§!"
 rls_to_enable:0 "§G알림 차단 클릭§!"
 rls_to_disable:0 "§G알림 허용 클릭§!"
 rls_min_window_desc:0 "§H알림 비활성화§!\n제국의 통치자가 사용할 수 있는 상당한 수의 §Y아이디어 포인트§! 또는 §E기술 포인트§!를 보유하고 있을 때 알림을 비활성화합니다.\n\n§Y멀티플레이어 모드에서는 기본적으로 알림이 비활성화되어 있습니다.§!"
