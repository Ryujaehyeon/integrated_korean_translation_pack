 MOD_RULER_TITLE_MACHINE:0 "$play_as_ruler_hobby_category_machine$"
 MOD_RULER_DESC:0 "§E이 페이지는 통치자가 관심을 갖거나 전문 지식을 가질 수 있는 특정 영역을 보여줍니다.§!"
 MOD_RULER_DESC2:0 "§E이를 수행하려면 위에 나열된 카테고리 중 하나를 선택하십시오.§!"
 MOD_RULER_DESC3:0 "§E여기 우리가 잠금 해제할 수 있는 모든 §Y방향§!이 나열되어 있습니다.§!"
 MOD_RULER_DESC4:0 "§E아이콘 위에 마우스를 올리면 자세한 정보를 볼 수 있습니다.§!"
 MOD_RULER_DESC5:0 "§G적용된 방향 변경은 다음 달에만 효과를 발휘합니다.§!"
 MOD_RULER_DESC6:0 "§PUI가 작동을 멈췄습니다§!"
 MOD_RULER_DESC7:0 "§YUI를 올바르게 활성화 하기 위해, 먼저 다른 모든 창을 닫으세요.§!"
 MOD_RULER_DESC8:0 "§Y다른 창이 닫히기 전까지 UI는 작동을 안합니다.§!"
 rls_direction_modifier_tooltip:0 "§G이 변동치는 선택된 카테고리가 채택되는 동안 계속 혜택을 줄 것 입니다.\n\n더 상세한 정보를 위해 §Y통치자 중점§! 메뉴를 보십시오.§!"
