 edict_play_as_ruler_campaign_ship_survey_focus:0 "통치자 캠페인: 탐험 장려책"
 edict_play_as_ruler_campaign_ship_survey_focus_desc:0 "§L$play_as_ruler_researcher$ 카테고리§!\n수많은 미지의 경이로움이 발견을 기다리고 있으므로, 우리의 과학선이 수행하는 탐사 이니셔티브에 대한 인센티브를 제공하는 것이 필수적입니다. 이를 통해 우리는 은하의 신비를 더 빠르고 효과적으로 밝혀낼 수 있습니다."
 edict_play_as_ruler_campaign_ship_survey_focus_tooltip:0 "과학자는 탐사로부터 §G+50%§! 추가 경험치를 획득합니다."
