 rls_trait__ruler_execution_desc_prefix:0 "현재 실행 포인트: §B[root.rls_ruler_execution_exp]|15§!\n현재 아이디어 포인트: §Y[root.rls_ruler_idea_exp]|15§!\n\n§E§B실행 포인트§!는 통치자가 통치 캠페인 및 호의 카테고리와 같은 목표를 달성할 수 있는 능력을 나타냅니다.\n\n§Y아이디어 포인트§!는 [Root.GetName]가 [Root.GetSXX]를 통해 전체 국가에 이익이 될 수 있는 아이디어를 얼마나 많이 얻을 수 있는지를 나타내며, 관련 포커스 방향을 잠금 해제함으로써 가능합니다.\n\n[Root.GetName]는 [Root.GetHerHis] §M카리스마 수준§!을 통해 §B실행 포인트§!를 얻을 수 있으며, §Y영감을 주는 수준§!은 [Root.GetHerHis][Root.GetSXX]가 §Y아이디어 포인트§!를 얻는 속도를 결정합니다. §!"
