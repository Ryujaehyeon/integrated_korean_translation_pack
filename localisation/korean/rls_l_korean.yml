 edict_play_as_ruler_campaign_robot_focus_desc:0 "§L$play_as_ruler_engineering_research$ 카테고리§!\n정밀하게 조정된 기계 유닛의 생산량은 추가 개발을 통해 크게 증가할 수 있으며, 이로 인해 튼튼한 유닛의 상당한 양이 생산됩니다."
