 edict_play_as_ruler_campaign_colony_ascend_focus_desc:0 "§L$play_as_ruler_power_unity$ 카테고리§!\n식민지는 우리가 거주하는 수많은 상호 연결된 점들처럼, 다른 세계와 연결되는 공기 같은 선의 네트워크를 형성합니다. 이러한 식민지의 번영은 우리의 전반적인 성공과 밀접하게 연결되어 있습니다."
 rls_direction_researcher_1_desc:0 "$rls_direction_prefix_desc$§Y$MOD_COUNTRY_ALL_TECH_RESEARCH_SPEED$§!이 §G+2%§! 증가합니다.[Root.rls_check_ruler_direction_1_level]"
