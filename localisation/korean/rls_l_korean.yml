 edict_play_as_ruler_campaign_claim_focus:0 "통치자 캠페인: 외교적 주장"
 edict_play_as_ruler_campaign_claim_focus_desc:0 "§L$play_as_ruler_gaining_influence$ 카테고리§!\n외교적 주장에 있어서는 다른 문제들에 비해 과정을 신속하게 진행하는 것이 중요합니다. 그렇게 함으로써, 우리의 제국은 응답 및 행동을 위한 예측 가능한 시간을 확보할 수 있습니다."
 rls_direction_edict_1_desc:0 "$rls_direction_prefix_desc$우리의 §Y$mod_edicts_cost_mult$§!는 §G-5%§! 감소합니다.[Root.rls_check_ruler_direction_1_level]"
