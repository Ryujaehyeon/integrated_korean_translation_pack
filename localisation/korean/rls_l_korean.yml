 play_as_ruler.120.desc:0 "[rls_ruler.GetName]의 잠재 지수 수준: [rls_ruler.rls_ruler_affair_level]\n매달 잠재 지수 상승폭: +[root.rls_affair_monthly_increase]\n현재 잠재 지수: [root.rls_country_affair]/100\n통치자 캠페인 획득 예상 시간: [root.rls_country_affair_cap] 개월\n[rls_ruler.GetName]의 중점 방향 제한치: [rls_ruler.rls_ruler_category_num_cap]"
