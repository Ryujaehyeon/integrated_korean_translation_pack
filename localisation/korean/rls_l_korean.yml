 edict_play_as_ruler_campaign_trust_focus:0 "통치자 캠페인: 믿을 수 있는 거래자"
 edict_play_as_ruler_campaign_trust_focus_desc:0 "§L$play_as_ruler_gaining_influence$ 카테고리§!\n외교적 노력은 우리의 은하적 입장을 반영하며, 타인에게 우리의 정책의 강점이나 약점을 형성합니다."
 play_as_ruler_campaign_trust_focus_tooltip:0 "우리가 다른 제국에 설립한 각 대사관은 우리의 £unity£ §Y$unity$§!를 §G+3§! 증가시키고 £influence£ §Y$influence$§!를 §G+0.1§! 증가시킵니다.\n$MOD_DIPLO_WEIGHT_MULT$: §G+15%§!"
