 play_as_ruler.122.desc:0 "[rls_ruler.GetName]의 매력 수준: [rls_ruler.rls_ruler_charm_level]\n매달 매력 상승량: +[root.rls_charm_monthly_increase]\n현재 매력: [root.rls_country_charm]/100\n실행 점수 획득 예상 시간: [root.rls_country_charm_cap] 개월"
 ruler_rls_charm_level_tooltip:0 "§H카리스마 수준:§! §M[root.rls_ruler_charm_level_country]§!\n진행도: §Y[root.rls_country_charm]§!/§Y100§! (§G매달 +[root.rls_charm_monthly_increase]§!)\n§Y[root.rls_country_charm_cap]§! 개월 뒤, §B실행 점수§!를 얻을 것입니다.\n------------\n카리스마 넘치는 지도자는 사람들이 일을 끝내도록 쉽게 설득할 수 있으며, 이는 통치자가 §B실행 점수§!를 모으는 속도를 결정합니다."
 ruler_rls_affair_level_tooltip:0 "§HAffair Level:§! §B[root.rls_ruler_affair_level_country]§!\n진행 상황: §Y[root.rls_country_affair]§!/§Y100§! (§G+[root.rls_affair_monthly_increase]§!/월)\n초점 방향 용량: §Y[root.rls_ruler_category_num_cap_country]§!\n새로운 §BRuler Campaigns§! 세트가 §Y[root.rls_country_affair_cap]§! 개월 내에 나열되며 §Y2§! 기술 포인트가 함께 제공됩니다.\n------------\n이 사건은 이 통치자의 통치 능력과 나타날 수 있는 §BRuler Campaigns§!의 빈도, 그리고 동시에 보유할 수 있는 §YCategories§!의 수를 결정합니다."
 ruler_rls_idea_level_tooltip:0 "§H영감 수준:§! §Y[root.rls_ruler_idea_level_country]§!\n진행도: §Y[root.rls_country_idea]§!/§Y100§! (§G매달 +[root.rls_idea_monthly_increase]§!)\n§Y[root.rls_country_idea_cap]§! 개월 뒤, §Y아이디어 점수§!를 얻을 것 입니다.\n------------\n영감은 통치자가 §Y아이디어 점수§!를 모으는 속도를 결정합니다. 레벨이 높을수록 더 빨리 얻습니다."
