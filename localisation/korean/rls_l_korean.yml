 edict_play_as_ruler_campaign_ship_combat_focus:0 "통치자 캠페인: 함대 전투력 향상"
 edict_play_as_ruler_campaign_ship_combat_focus_desc:0 "§L$play_as_ruler_physics_research$ 범주§!\n우리가 은하계를 지배할 것인지 여부에 관계없이, 우리의 해군 능력은 중대한 역할을 할 것입니다. 그들의 무기와 전투 능력을 향상시키는 것은 우리의 성공을 보장하는 데 필수적입니다."
