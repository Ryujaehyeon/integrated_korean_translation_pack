 rls_direction_agrarian_prefix:0 "$play_as_ruler_agrarian$ 범주"
 rls_direction_agrarian_1_desc:0 "$rls_direction_prefix_desc$농업 방향은 £food£ §Y$food$§! 생산을 £job£ §Y직업§!에서 §G+10%§! 증가시킵니다.[Root.rls_check_ruler_direction_1_level]"
 edict_play_as_ruler_campaign_food:0 "통치자 캠페인: 수확 계획"
 edict_play_as_ruler_campaign_food_desc:0 "§L$play_as_ruler_agrarian$ 카테고리§!\n식량 생산에서 품질 측정의 궁극적인 목표는 기아와 식량 낭비를 방지하여 아무도 굶주리거나 상한 음식이나 먹을 수 없는 음식을 소비하지 않도록 하는 것입니다."
 play_as_ruler_campaign_food_tooltip:0 "우리 행성의 §Y£food£ $food$ £job£ 직업§!은 캠페인 효과 동안 증가된 출력을 낼 수 있습니다 (통치자의 §M카리스마§! 수준에 따라 조정됨)."
 RLS_MESSAGE_FOOD_TITLE:0 "$rls_campaign_food_modifier$"
 RLS_MESSAGE_FOOD_DESC:0 "열매 맺은 $rls_campaign_food_modifier$의 결과로 $PLANET|H$은 추가적인 §Y£food£ $food$§!을 생산할 수 있습니다."
 rls_campaign_food_modifier:0 "수확 계획"
 rls_campaign_food_modifier_desc:0 "이 세계는 $rls_campaign_food_modifier$의 풍성한 결과로 인해 추가적인 §Y£food£ $food$§!을(를) 일정 기간 동안 생산할 수 있습니다."
 rls_direction_agrarian_2_desc:0 "$rls_direction_prefix_desc$농업인 £job_farmer£ §Y$job_farmer_plural$§!의 £food£ §Y$food$§! 생산량을 §G+0.3§! 증가시킵니다.[Root.rls_check_ruler_direction_2_level]"
 rls_direction_agrarian_3_desc:0 "$rls_direction_prefix_desc$§Y$job_farmer_plural$§!인 £job_farmer£이(가) §Y£energy£ $energy$ 유지비§!가 §G-0.15§! 감소하도록 허용합니다.[Root.rls_check_ruler_direction_3_level]"
 rls_direction_agrarian_4_desc:0 "$rls_direction_prefix_desc$모든 행성이 §Y[root.rls_direction_agrarian_3_5_swap_text]§! 생산하는 §G+1§! $food$ §Y£food£§!.[Root.rls_check_ruler_direction_4_level]"
 rls_direction_agrarian_5_desc:0 "$rls_direction_prefix_desc$§Y'$edict_play_as_ruler_direction_agrarian_3_7$'§! 법령에 접근하여 건물의 일부인 §Y$energy$ £energy£ 유지비§!를 §Y$food$ £food£ 유지비§!로 대체합니다.[Root.rls_check_ruler_direction_5_level]"
 edict_play_as_ruler_direction_agrarian_3_7:0 "유기체 유지비"
 edict_play_as_ruler_direction_agrarian_3_7_desc:0 "에너지 집약적인 연료 대신 환경 친화적인 자연 유기체 연료를 사용하면 우리의 일일 전력 사용량을 일부 줄일 수 있습니다."
 edict_play_as_ruler_direction_agrarian_3_7_tooltip:0 "대부분의 §Y£building£ $buildings$ $energy$ £energy£§! 유지비를 §Y$food$ £food£§! 하나당 §Y1§!로 교체합니다."
