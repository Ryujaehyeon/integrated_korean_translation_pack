 edict_play_as_ruler_campaign_observer_focus:0 "통치자 캠페인: 원시 관찰"
 edict_play_as_ruler_campaign_observer_focus_desc:0 "§L$play_as_ruler_social_research$ 카테고리§!\n원시 문명은 그들의 독특한 행성 조건에 영향을 받은 다양한 행동을 보입니다. 이러한 관찰을 장려하고 수행하는 것은 사회적 현상에 대한 귀중한 통찰을 제공하여 이러한 문명에 대한 우리의 이해에 도움이 될 수 있습니다."
