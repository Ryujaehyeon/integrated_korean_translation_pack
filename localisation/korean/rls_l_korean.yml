 edict_play_as_ruler_campaign_ancrel_focus:0 "통치자 캠페인: 유물광"
 edict_play_as_ruler_campaign_ancrel_focus_desc:0 "§L$play_as_ruler_researcher$ 카테고리§!\n우리 지역에 흩어져 있는 고대 유물들은 우리의 도착 이전부터 존재해 왔으며, 이제 밝혀지고 탐험될 준비가 된 비밀들을 담고 있습니다."
 edict_play_as_ruler_campaign_ancrel_focus_tooltip:0 "사이트를 완전히 발굴할 때 추가로 §G+100§! $minor_artifacts$ §Y£minor_artifacts£§!를 얻습니다."
