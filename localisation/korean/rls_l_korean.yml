 edict_play_as_ruler_campaign_ftl_focus:0 "통치자 캠페인: 성간 항해"
 edict_play_as_ruler_campaign_ftl_focus_desc:0 "§L$play_as_ruler_physics_research$ 범주§!\n초공간 여행은 우주가 지녀야 할 무한한 가능성을 지니고 있습니다. 광대한 거리를 초월하기 위해 유연한 광속 초과 방법을 채택하면 우리를 앞으로 나아가게 할 수 있습니다."
