 edict_play_as_ruler_campaign_speed_focus_als_tooltip:0 "함대의 모든 지휘관은 시간이 지남에 따라 §L유연성§!을 점차적으로 향상시킵니다."
 rls_direction_ship_1_desc:0 "$rls_direction_prefix_desc$§Y$MOD_STARBASE_SHIPYARD_BUILD_COST_MULT$§!는 §G-2%§! 감소합니다.[Root.rls_check_ruler_direction_1_level]"
 rls_direction_ship_2_desc:0 "$rls_direction_prefix_desc$모집된 §Y관료§!는 시간이 지남에 따라 §Y함선 건설 특성§!을 얻을 수 있습니다.[Root.rls_check_ruler_direction_2_level]"
 rls_direction_ship_1_3_message1:0 "$rls_direction_leader_gain_message_prefix$§H$leader_trait_retired_fleet_officer$§!"
 rls_direction_ship_1_3_message2:0 "$rls_direction_leader_gain_message_prefix$§H$leader_trait_shipwright$§!"
 rls_direction_ship_3_desc:0 "$rls_direction_prefix_desc$§Y$MOD_STARBASE_SHIPYARD_BUILD_SPEED_MULT$§!이 §G+10%§! 증가합니다.[Root.rls_check_ruler_direction_3_level]"
 edict_play_as_ruler_campaign_ship_build_focus:0 "통치자 캠페인: 함선 건조 가속"
 edict_play_as_ruler_campaign_ship_build_focus_desc:0 "§L$play_as_ruler_ship_builder$ 카테고리§!\n우주선 건설을 가속화하기 위해, 우리의 조선소에 적응 가능한 기준이 설정되어 모든 필요한 자원의 적시 배분과 배치를 보장합니다."
 rls_direction_ship_4_desc:0 "$rls_direction_prefix_desc$§Y$MOD_COUNTRY_SHIP_UPGRADE_COST_MULT$§!이 §G-10%§!만큼 감소합니다.[Root.rls_check_ruler_direction_4_level]"
 rls_direction_ship_5_desc:0 "$rls_direction_prefix_desc$우리 함대의 §Y$MOD_SHIP_FIRE_RATE_MULT$§!를 §G+3%§! 증가시킵니다.[Root.rls_check_ruler_direction_5_level]"
 rls_direction_ship_6_desc:0 "$rls_direction_prefix_desc$우리의 §Y$MOD_SHIP_WEAPON_DAMAGE$§!이 §G+3%§! 증가합니다.[Root.rls_check_ruler_direction_6_level]"
 rls_COUNTRY_MIA_TIME_MULT:0 "행방불명 시간"
 rls_direction_ship_7_desc:0 "$rls_direction_prefix_desc$우리 함선의 §Y$MOD_FLEET_MIA_TIME_MULT$§!이 §G-10%§! 감소합니다.[Root.rls_check_ruler_direction_7_level]"
 edict_play_as_ruler_campaign_ship_power_focus:0 "통치자 캠페인: 피해량 최적화"
 edict_play_as_ruler_campaign_ship_power_focus_desc:0 "§L$play_as_ruler_ship_builder$ 카테고리§!\n피해를 최적화하기 위해 우리는 공격이 최고의 방어라는 원칙을 채택해야 합니다. 우리의 함대 무기에 추가 전력을 할당함으로써, 우리는 잠재적인 적이 중대한 위협을 가할 기회를 갖기 훨씬 이전에 그들을 무력화할 수 있습니다."
 edict_play_as_ruler_campaign_ship_power_focus_als:0 "$edict_play_as_ruler_campaign_ship_power_focus$"
 edict_play_as_ruler_campaign_ship_power_focus_als_desc:0 "$edict_play_as_ruler_campaign_ship_power_focus_desc$"
 edict_play_as_ruler_campaign_ship_power_focus_als_tooltip:0 "함대의 모든 사령관은 시간이 지남에 따라 §L충격§!을 점진적으로 상승시킵니다."
 rls_direction_ship_8_desc:0 "$rls_direction_prefix_desc$우리 수도 행성의 궤도에 해군을 임명할 수 있습니다. 임명된 해군은 다음 효과를 받습니다:\n $MOD_SHIP_DISENGAGE_OPPORTUNITIES_ADD$: §G+1§!\n $MOD_SHIP_HOME_TERRITORY_FIRE_RATE_MULT$: §G+15%§!\n $MOD_SHIP_EXPERIENCE_GAIN_MULT$: §G+100%§!\n $MOD_SHIP_NAVAL_CAP_USAGE_MULT$: §G-50%§!\n\n§E임명 비용은 §Y200§! £influence£ $influence$.[Root.rls_check_ruler_direction_8_level]"
 play_as_ruler.15800.title:0 "해군 임명"
 play_as_ruler.15800.desc:0 "§H[rls_fleet.GetName]§!는 §H[from.GetName]§!의 궤도에 도달하였으며 임명될 준비가 되었습니다.\n\n임명 비용은 §Y200§! £influence£ $influence$입니다."
 play_as_ruler_ship_1_8_modifier:0 "임명된 해군"
 play_as_ruler.15801.title:0 "임명 가능"
 play_as_ruler.15801.desc:0 "이제 다른 해군을 임명할 수 있습니다."
 rls_direction_ship_9_desc:0 "$rls_direction_prefix_desc$우리의 §Y$mod_ships_upkeep_mult$§!을 §G-3%§! 감소시킵니다.[Root.rls_check_ruler_direction_9_level]"
 rls_direction_ship_10_desc:0 "$rls_direction_prefix_desc$§Y$MOD_SHIP_HULL_REGEN_ADD_PERC$§!이 §G+5%§! 증가합니다.[Root.rls_check_ruler_direction_10_level]"
 rls_direction_ship_11_desc:0 "$rls_direction_prefix_desc$§Y$MOD_SHIP_ARMOR_REGEN_ADD_PERC$§!이 §G+5%§! 증가합니다.[Root.rls_check_ruler_direction_11_level]"
 edict_play_as_ruler_campaign_ship_cost_focus:0 "통치자 캠페인: 함선 유지비 관리"
 edict_play_as_ruler_campaign_ship_cost_focus_desc:0 "§L$play_as_ruler_ship_builder$ 분류§!\n우리의 대규모 해군을 효율적으로 관리하기 위해서는 효과적인 유지 관리 행정 시스템을 구축하는 것이 중요합니다. 이 시스템은 우리의 함선을 유지하는 데 사용되는 모든 자재가 최적으로 활용되어 낭비가 발생하지 않도록 보장할 것입니다."
 edict_play_as_ruler_campaign_repair_focus:0 "통치자 캠페인: 함선 수리"
 edict_play_as_ruler_campaign_repair_focus_desc:0 "§L$play_as_ruler_ship_builder$ 분류§!\n모든 우주선은 시간이 지남에 따라 마모와 손상을 겪지만, 뛰어난 공학 수리를 통해 그들의 운영 수명을 상당히 연장할 수 있어, 더 오랜 기간 동안 임무를 수행할 수 있습니다."
 rls_direction_army_1_desc:0 "$rls_direction_prefix_desc$우리의 §Y$mod_armies_cost_mult$§!는 §G-5%§! 감소합니다.[Root.rls_check_ruler_direction_1_level]"
 rls_direction_army_2_desc:0 "$rls_direction_prefix_desc$우리의 §Y$MOD_PLANET_ARMY_BUILD_SPEED_MULT$§!을 §G+10%§! 증가시킵니다.[Root.rls_check_ruler_direction_2_level]"
 edict_play_as_ruler_campaign_warrior_culture_not:0 "통치자 캠페인: 고향 방위"
 edict_play_as_ruler_campaign_warrior_culture_not_desc:0 "§L$play_as_ruler_army_parade$ 카테고리§!\n지상 방어의 시기에는 모두가 적에 맞서 자신의 위치를 유지하는 것이 중요합니다. 누구도 후퇴해서는 안 되며, 우리는 고향을 보호하기 위해 함께 굳건히 서 있습니다."
 rls_direction_army_3_desc:0 "$rls_direction_prefix_desc$§Y$MOD_PLANET_ARMY_BUILD_TIME_MULT$§!을 §G-5%§! 감소시킵니다.[Root.rls_check_ruler_direction_3_level]"
 edict_play_as_ruler_campaign_war_focus:0 "통치자 캠페인: 방어 계획"
 edict_play_as_ruler_campaign_war_focus_desc:0 "§L$play_as_ruler_army_parade$ 카테고리§!\n자위 전쟁에서 승리를 보장하기 위해, 우리는 모든 노력을 기울이고 방어 능력을 강화하기 위해 추가 자원을 할당할 것입니다."
 rls_direction_army_4_desc:0 "$rls_direction_prefix_desc$§Y$MOD_COUNTRY_DEFENSIVE_WAR_INFLUENCE_GAIN_ADD$§!이 §G+1§!만큼 증가합니다.[Root.rls_check_ruler_direction_4_level]"
 rls_direction_army_5_desc:0 "$rls_direction_prefix_desc$§Y$MOD_COUNTRY_WAR_EXHAUSTION_MULT$§!은 §G-5%§! 감소합니다.[Root.rls_check_ruler_direction_5_level]"
 rls_direction_army_6_desc:0 "$rls_direction_prefix_desc$§Y$MOD_SHIP_LANDING_TIME_MULT$§!이 §G-10%§! 감소합니다.[Root.rls_check_ruler_direction_6_level]"
 rls_direction_army_7_desc:0 "$rls_direction_prefix_desc$§Y$mod_armies_upkeep_mult$§!의 유지비가 §G-4%§! 감소합니다.[Root.rls_check_ruler_direction_7_level]"
 edict_play_as_ruler_campaign_global_offensive:0 "통치자 캠페인: 총 공격"
 edict_play_as_ruler_campaign_global_offensive_desc:0 "§L$play_as_ruler_army_parade$ 범주§!\n가장 강력한 방어선을 뚫기 위해서는 결정적인 승리를 거두기 위해 차단점을 돌파할 수 있는 상당한 힘의 과시가 필요합니다."
 edict_play_as_ruler_campaign_voice_of_people:0 "통치자 캠페인: 대중의 목소리"
 edict_play_as_ruler_campaign_voice_of_people_desc:0 "§L$play_as_ruler_civilian_care$ 분류§!\n사람들이 노래하는 소리가 들리십니까? 시민의 목소리를 무시하는 국가는 수명이 제한될 가능성이 높습니다. 국민에게 실질적인 지원을 제공함으로써 우리는 번영과 장기적인 성공을 향한 길을 열 수 있습니다."
 edict_play_as_ruler_campaign_trebuchet:0 "통치자 캠페인: 투석기 점프"
 edict_play_as_ruler_campaign_trebuchet_desc:0 "§L$play_as_ruler_physics_research$ 카테고리§!\n점프 드라이브 시대에 다양한 점프 방법의 가용성은 우리가 원하는 목적지로 안전하고 효율적으로 이동하기 위해 매우 중요합니다. 우리는 광활한 우주를 탐색하기 위해 'Yeeting' 기술의 레퍼토리를 지속적으로 확장해야 합니다."
 edict_play_as_ruler_campaign_flexable_edict:0 "통치자 캠페인: 유연한 법령"
 edict_play_as_ruler_campaign_flexable_edict_desc:0 "§L$play_as_ruler_flavor_edicts$ 카테고리§!\n우리의 법령에 새로운 유연성을 도입하는 것은 평의원들의 협력에 달려 있습니다. 그들의 협력적인 노력이 의제와 법령의 원활한 통과를 촉진하여, 변화하는 상황에 효과적으로 적응하고 대응할 수 있게 해줄 것입니다."
 edict_play_as_ruler_campaign_political_satisfactions:0 "통치자 캠페인: 정치적 만족"
 edict_play_as_ruler_campaign_political_satisfactions_desc:0 "§L$play_as_ruler_power_unity$ 카테고리§!\n어떤 세력이 우리의 현재 정책에 만족을 표명할 때, 그들의 지지를 활용하는 것은 공동의 목표를 향한 단결을 촉진할 것입니다. 그들의 긍정적인 입장에 맞추어 나아감으로써, 우리는 공동의 목표를 달성하기 위해 함께 노력할 수 있습니다."
 edict_play_as_ruler_campaign_hide_n_seek:0 "통치자 캠페인: 숨바꼭질"
 edict_play_as_ruler_campaign_hide_n_seek_desc:0 "§L$play_as_ruler_ship_builder$ 범주§!\n'안개 전쟁'의 개념은 우주 전쟁에서도 일관성을 유지합니다."
 desc_rls_leader1:0 "도전적인 비밀 임무를 성공적으로 수행하여 존경을 받는 유명한 용병입니다."
 desc_rls_leader2:0 "혁신을 불러일으키고 다른 이들에게 영감을 주는 창의적인 발명가입니다."
 desc_rls_leader3:0 "대담한 전술을 실행하는 데 능숙한 숙련된 제독으로, 해상 전투에서 유명한 §Y'바렐 롤'§!을 포함한 기동에 대한 전문가입니다."
 desc_rls_leader4:0 "복잡하고 세밀한 우주선을 제작하는 데 열정을 가진 조선사입니다."
 desc_rls_leader5:0 "한때 세심하고 엄격한 마이크로 관리로 유명했던 도시 관리자로, 도시의 모든 측면이 신중하게 통제되고 최적화되도록 보장하며, 전략적으로 통행료 부스가 배치되었습니다."
 desc_rls_leader6:0 "우주에서 새로운 현상과 미지의 영역을 발견하는 데 열정을 가진 용감한 탐험가입니다."
 desc_rls_leader7:0 "이 뛰어난 인물은 공학 연구에 깊은 매력을 느끼며, 다양한 공학 분야의 복잡성을 풀어내는 데 자신의 전문 지식을 바치고 있습니다."
 desc_rls_leader8:0 "항상 운이 좋은 기계적 존재로, §Y'공항'§!과 같은 특정 현대 개념에 대한 지식이 없을지라도 운이 항상 그들의 편인 듯합니다."
 desc_rls_leader9:0 "이 존경받는 파벌 창립자는 그들의 가르침과 원칙을 깊이 존중하는 많은 헌신적인 추종자들을 모았습니다."
 desc_rls_leader10:0 "이 세심한 탐험가는 세부 사항에 대한 비할 데 없는 주의력과 정확하게 행성 자원을 찾으려는 변함없는 헌신을 가지고 있어, 자신의 분야에서 완벽주의자입니다."
 desc_rls_leader11:0 "이 존경받는 건설자는 건설 프로젝트를 신속하게 진행하는 뛰어난 능력 덕분에 §Y'City-Assist'§!라는 칭호를 가지고 있습니다."
 desc_rls_leader12:0 "이 성실한 관리는 환경 보존의 옹호자로, 모든 정책과 결정에서 행성의 복지를 최우선으로 생각합니다."
 desc_rls_leader13:0 "전직 우주선 CEO는 개인 브랜드에 대한 전문성으로 유명하며, 그들은 자신만의 매우 효율적이고 혁신적인 제조업체를 설립하였습니다."
 desc_rls_leader14:0 "이 강력한 전사는 타고난 보호자로, 어떤 대가를 치르더라도 고향을 지키는 데 헌신합니다."
 desc_rls_leader15:0 "이 지도자는 적에게 자비를 보이지 않고 승리를 향한 끊임없는 추구로 인해 §Y'콜론el 슬로터'§!라는 칭호를 가지고 있습니다."
 desc_rls_leader16:0 "균형적인 공격과 방어의 조합을 우선시하는 접근 방식과는 달리, 이 사령관은 §Y'Naken Fleet'§!의 건설 극대화에만 집중합니다."
 desc_rls_leader17:0 "이 장군은 자신의 역할을 수행하는 데 있어 헌신과 효율성을 지속적으로 보여주는 모범적인 지도자입니다."
 desc_rls_leader18:0 "이 제독은 적의 진형을 효과적으로 돌파하기 위해 특별히 설계된 전략적 접근 방식인 돌진 전략의 숙련도로 유명합니다."
 desc_rls_leader19:0 "이 함대 전투기는 오직 콘베트 전투기 조합의 이론과 실천에 깊이 몰두하고 있습니다."
 desc_rls_leader20:0 "이 지휘관은 \"전투 그룹 지휘\"로 알려진 전략을 구현하여 함대를 지휘하는 독특한 접근 방식을 가지고 있습니다. #500 함선 함대"
 desc_rls_leader21:0 "모든 천체가 기본적인 정사각형 §Y'블록'§!으로 구성되어 있다고 믿는 비전 있는 과학자입니다."
 desc_rls_leader22:0 "숙련하고 지혜로운 원로가 젊은 세대에게 귀중한 지식과 지혜를 전합니다."
 desc_rls_leader23:0 "이 제독은 치열한 전투 상황에서 상대를 손쉽게 지배하며, '§Y단순함§!'이라는 단어가 그들의 전략적 능력과 동의어가 됩니다."
 desc_rls_leader24:0 "모험심에 이끌린 전직 우주 경주자가 과학자의 대열에 합류하여 은하계를 탐험하고 있습니다."
 desc_rls_leader25:0 "자신의 자동화 회사를 설립하기로 결정한 뛰어난 로봇 과학자입니다."
 desc_rls_leader26:0 "이 숙련된 지질학자는 개발할 가치가 있는 땅을 식별하는 뛰어난 안목을 가지고 있어, 그들은 땅의 대가라는 명성을 얻었습니다."
 desc_rls_leader27:0 "이 고도로 숙련된 전술가는 은밀하고 비밀스러운 공격의 대가로, 정밀하고 효과적인 타격을 실행하는 능력에서 다른 이들을 능가합니다."
 desc_rls_leader28:0 "이 뛰어난 개인은 망토 기술의 진정한 대가로, 이 분야에 대한 뛰어난 이해와 전문성을 보여줍니다."
 desc_rls_leader29:0 "이 카리스마 있는 장군은 변함없는 충성을 보여주며 뛰어난 지도자 능력을 발휘하여 자신의 충성을 맹세한 이들에게 변함없는 헌신을 불어넣습니다."
 desc_rls_leader30:0 "이론 물리학에 전문화된 고도로 훈련된 전문 과학자입니다."
 play_as_ruler.15602.name:0 "저명한 지도자 합류"
 play_as_ruler.15602.desc:0 "§Y[root.GetTitle] [root.GetName]§!이(가) 우리 나라에 합류하였으며, 지휘할 준비가 되어 있습니다.\n\n자세한 내용은 지도자 페이지를 확인하십시오."
 play_as_ruler.16201.name:0 "무한한 잠재력"
 play_as_ruler.16201.desc:0 "우리 드론은 무한한 잠재력을 보여주며, 이 특성은 §H[rls_leader.GetTitle] [rls_leader.GetName]§!에도 확장됩니다. [rls_leader.GetSheHeCap] [rls_leader.GetIsAre]는 이제 미래에 도움이 될 주요 속성 중 하나를 수용할 준비가 되어 있습니다.\n\n아래에서 그 중 하나를 선택하세요."
 play_as_ruler.16202.name:0 "최적화된 서브루틴"
 play_as_ruler.16202.desc:0 "§E유닛 유형: §H[rls_leader.GetTitle]§!\n모델: §H[rls_leader.GetName]§!§!\n\n유닛의 알고리즘 용량은 §G1§! 단일, 최적화된 버전과 완벽하게 일치합니다. 향상 프로토콜을 시작합니다. 알고리즘 선택 및 원활한 구현을 위한 입력을 기다리고 있습니다...\n\n아래에서 하나를 선택하세요."
