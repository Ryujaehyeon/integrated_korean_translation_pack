 rls_direction_agrarian_main_botton_desc:0 "§H$play_as_ruler_agrarian$ 카테고리§!\n[Root.GetRulerName]는 농작물과 농지를 생산하고 유지하는 데 참여할 것입니다."
 rls_direction_recycle_main_botton_desc:0 "§H$play_as_ruler_resource_recycling$ 범주§!\n[Root.GetRulerName] 자원을 절약하기 위해 노력[Root.Ruler.GetSXX] 하여 우리 국가의 지출을 줄입니다."
 rls_direction_growth_main_botton_desc:0 "§H$play_as_ruler_civilian_care$ 카테고리§!\n인구의 만족도는 안정적인 거주지를 만드는 데 기여합니다."
 rls_direction_investor_main_botton_desc:0 "§H$play_as_ruler_credit_investor$ 범주§!\n[Root.GetRulerName] 에너지 생성에 대한 강한 관심을 보이며 [Root.Ruler.GetSXX] 전체 용량을 증대시키는 것을 목표로 합니다.[Root.Ruler.GetSXX]"
 rls_direction_builder_main_botton_desc:0 "§H$play_as_ruler_constructor$ 카테고리§!\n[Root.GetRulerName] 모든 필요한 건설 절차가 적절하게 실행되고 준비되어 있도록[Root.Ruler.GetSXX] 합니다."
 rls_direction_trade_main_botton_desc:0 "§H$play_as_ruler_market_trading$ 카테고리§!\n번영하는 시장 경로를 추구하는 과정에서, 종종 '올인' 접근 방식으로 나아가거나 아무것도 얻지 못할 위험을 감수해야 합니다."
 rls_direction_miner_main_botton_desc:0 "§H$play_as_ruler_miner$ 카테고리§!\n원자재 추출의 양은 한 국가의 운명을 좌우할 수 있는 힘을 지니고 있으며, 이는 우리의 최우선 과제입니다."
 rls_direction_factory_main_botton_desc:0 "§H$play_as_ruler_artisan_support$ 카테고리§!\n정제된 제조업체를 지원하는 것은 민간인 및 군사 부문 모두를 포괄하는 지속적인 성장을 촉진하는 것과 동의어입니다."
 rls_direction_influence_main_botton_desc:0 "§H$play_as_ruler_gaining_influence$ 범주§!\n[Root.GetRulerName] 외교 및 정치적 책략에 적극적으로 참여[Root.Ruler.GetSXX] 하여 권력의 게임을 탐색합니다."
 rls_direction_intel_main_botton_desc:0 "§H$play_as_ruler_intel$ 카테고리§!\n이용 가능한 정보보다 두 발 앞서 나가는 것은 명확한 의사결정을 가능하게 하며 다음 행동 방침을 결정하는 데 있어 명확성을 보장합니다."
 rls_direction_edict_main_botton_desc:0 "§H$play_as_ruler_flavor_edicts$ 범주§!\n[Root.GetRulerName]는 자원의 중대한 영향을 최소화하기 위해 의회 문제를 철저히 감독하며, 실행할 가치가 있는 흥미로운 법령을 식별하고 고려할 것입니다."
 rls_direction_unity_main_botton_desc:0 "§H$play_as_ruler_power_unity$ 카테고리§!\n[Root.GetRulerName] 단결을 촉진하기 위해[Root.Ruler.GetSXX] 국가, 민족, 그리고 다양한 문화들 사이에서 노력합니다."
 rls_direction_researcher_main_botton_desc:0 "§H$play_as_ruler_researcher$ 범주§!\n우주 발견의 경이로움은 끝이 보이지 않는 무한함으로, 처음부터 끝이 없습니다."
 rls_direction_physics_main_botton_desc:0 "§H$play_as_ruler_physics_research$ 카테고리§!\n우리는 물리학의 발견과 발전에 기여하는 모든 연구 노력을 후원할 준비가 되어 있습니다."
 rls_direction_society_main_botton_desc:0 "§H$play_as_ruler_social_research$ 범주§!\n[Root.GetRulerName] 철학 학자에게[Root.Ruler.GetSXX] 지원을 확대하여 그들의 지식과 비판적 사고에 대한 기여의 가치와 중요성을 인식합니다."
 rls_direction_engineering_main_botton_desc:0 "§H$play_as_ruler_engineering_research$ 카테고리§!\n[Root.GetRulerName] 제공[Root.Ruler.GetSXX] 공학과 관련된 연구에 상당한 향상을 가져오며, 과학적 발전과 기술 혁신에서 그들의 중요한 역할을 인식합니다."
 rls_direction_ship_main_botton_desc:0 "§H$play_as_ruler_ship_builder$ 카테고리§!\n모든 우주선 부품은 신중하게 고정되고 배치 준비가 되어야 하며, 필요할 때 생산이 확대되어야 합니다."
 rls_direction_army_main_botton_desc:0 "§H$play_as_ruler_army_parade$ 카테고리§!\n[Root.GetRulerName] 각 행성 군대의 훈련 상태를 면밀히 점검[Root.Ruler.GetSXX] 하여 잠재적인 전투에 대비할 수 있도록 준비성과 효율성을 보장합니다."
