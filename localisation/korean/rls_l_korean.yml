 edict_play_as_ruler_campaign_clean_tile:0 "통치자 캠페인: 개간 준비"
 edict_play_as_ruler_campaign_clean_tile_desc:0 "§L$play_as_ruler_flavor_edicts$ 카테고리§!\n악명 높은 장소의 정비는 도전적인 작업입니다. 그러나 추가 자원을 할당함으로써, 우리는 겉보기에는 불가능해 보이는 공간을 재생되고 깨끗한 지역으로 변화시킬 수 있습니다."
 rls_direction_edict_find_one_of_them_first:0 "§R£trigger_no£  이를 해금하려면 먼저 외계 종에 대해 자세히 알아보십시오.§!"
 edict_play_as_ruler_campaign_space_creature_focus:0 "통치자 캠페인: 괴물 처리"
 edict_play_as_ruler_campaign_space_creature_focus_desc:0 "§L$play_as_ruler_flavor_edicts$ 카테고리§!\n우주 생물들은 확실히 은하에서 경이로운 존재이지만, 때때로 우리는 그들과 맞서야 할 때가 있습니다. 그들이 제기하는 어떤 위협도 효과적으로 무력화할 것을 약속드립니다."
 play_as_ruler_campaign_space_creature_focus_modifier_desc:0 "우주 괴물에 대한 피해: §G+50%§!\n레비아탄에 대한 피해: §G+25%§!"
