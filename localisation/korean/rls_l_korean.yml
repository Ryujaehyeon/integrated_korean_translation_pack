 edict_play_as_ruler_campaign_recycle:0 "통치자 캠페인: 자원 재활용"
 edict_play_as_ruler_campaign_recycle_desc:0 "§L$play_as_ruler_resource_recycling$ 카테고리§!\n자원에 대한 무모한 행동은 우리의 세계를 멸망시킬 수 있습니다. 재활용을 통해 새로운 보상 시스템을 구축하면 세계가 지속될 수 있습니다."
 edict_play_as_ruler_campaign_recycle_tooltip:0 "$mod_planet_jobs_upkeep_mult$: §G-5%§!\n$mod_planet_pops_upkeep_mult$: §G-10%§!\n모든 £job£ §Y직업§!은 §G-20%§! 적게 섭취합니다 £minerals£ §Y$minerals$§!."
 rls_direction_recycle_2_desc:0 "$rls_direction_prefix_desc$우리의 £job£ §Y직업 유지비§!를 §G-4%§! 줄입니다.[Root.rls_check_ruler_direction_2_level]"
 rls_direction_recycle_3_desc:0 "$rls_direction_prefix_desc$우리의 §Y$mod_planet_buildings_upkeep_mult$§!이 §G-5%§!만큼 감소합니다.[Root.rls_check_ruler_direction_3_level]"
 rls_direction_recycle_4_desc:0 "$rls_direction_prefix_desc$£building£ §Y건물§!의 §Y전략 자원 유지비§!가 §G-5%§! 감소합니다.[Root.rls_check_ruler_direction_4_level]"
 rls_direction_recycle_5_desc:0 "$rls_direction_prefix_desc$§Y$mod_planet_districts_upkeep_mult$§!이 §G-5%§! 만큼 감소합니다.[Root.rls_check_ruler_direction_5_level]"
 rls_direction_recycle_6_desc:0 "$rls_direction_prefix_desc$철거할 때마다 £building£ §Y건물§! 또는 £district£ §Y구역§!의 §G-15%§! 환급을 받습니다.[Root.rls_check_ruler_direction_6_level]"
 rls_direction_growth_1_desc:0 "$rls_direction_prefix_desc$모든 팝의 £happiness£ §Y$MOD_POP_HAPPINESS$§!를 §G+2.5%§! 증가시킵니다.[Root.rls_check_ruler_direction_1_level]"
 edict_play_as_ruler_campaign_happy_focus:0 "통치자 캠페인: 지역 복지 할당"
 edict_play_as_ruler_campaign_happy_focus_desc:0 "§L$play_as_ruler_civilian_care$ 카테고리§!\n모두의 필요를 충족하기 위해 복지 자원을 배분하는 것은 도전이 될 수 있습니다. 그러나 물자의 배분을 늘림으로써 우리는 시민들의 만족을 보장하고 이 문제를 효과적으로 해결하기 위해 노력할 수 있습니다."
 edict_play_as_ruler_campaign_growth:0 "통치자 캠페인: 출산 장려"
 edict_play_as_ruler_campaign_growth_desc:0 "§L$play_as_ruler_civilian_care$ 범주§!\n상당 부분의 인구가 건강하고 빠르게 성장할 수 있도록 충분한 영양을 관대하게 분배하는 것이 중요합니다."
 rls_direction_growth_2_desc:0 "$rls_direction_prefix_desc$£amenities£ §Y$MOD_PLANET_AMENITIES_MULT$§! 증가량이 §G+4%§!입니다.[Root.rls_check_ruler_direction_2_level]"
