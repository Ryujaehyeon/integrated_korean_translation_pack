 edict_play_as_ruler_campaign_research:0 "통치자 캠페인: 연구 집중"
 edict_play_as_ruler_campaign_research_desc:0 "§L$play_as_ruler_researcher$ 카테고리§!\n진정한 과학자는 이미 존재하는 것으로 입증된 경이로움의 발견을 끊임없이 추구하며 지루함에 면역입니다."
 edict_play_as_ruler_campaign_science_fund:0 "통치자 캠페인: 과학 기금"
 edict_play_as_ruler_campaign_science_fund_desc:0 "§L$play_as_ruler_researcher$ 카테고리§!\n과학적 진보는 부인할 수 없는 사실입니다. 우리의 기본 존재에 대한 다양한 분야에서의 저명한 연구를 통해 우리는 중요한 혜택을 얻을 것입니다."
 edict_play_as_ruler_campaign_science_fund_tooltip:0 "£job_researcher£ §Y$job_researcher_plural$§! 또한 우리의 최고 연구 수익을 기준으로 100 £pop£ 팝당 추가로 §G+3§! £energy£ £food£ £minerals£ §Y기본 자원§!을 제공합니다."
