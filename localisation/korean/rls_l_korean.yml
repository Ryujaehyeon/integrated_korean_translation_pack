 edict_play_as_ruler_campaign_imperial_cult_not:0 "통치자 캠페인: 재능 탐색"
 edict_play_as_ruler_campaign_imperial_cult_not_desc:0 "§L$play_as_ruler_power_unity$ 카테고리§!\n지도자가 없는 상황에서 개인들은 종종 자신의 길을 찾는 데 어려움을 겪습니다. 따라서 우리 제국의 관청은 우리의 운영이 제대로 이루어지도록 하기 위해 뛰어난 지도자를 적극적으로 찾고 있습니다."
 edict_play_as_ruler_campaign_imperial_cult_tooltip:0 "리더의 모집 선택에서 시작 §Y기술 수준§!을 최대 §G+3§!까지 증가시킬 수 있습니다."
