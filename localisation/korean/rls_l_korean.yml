 rls_direction_unity_1_4_desc:0 "§H문화 변동§!$rls_ruler_campaign$\n$edict_play_as_ruler_campaign_unity_focus_desc$$rls_unlock_effect$$play_as_ruler_campaign_unity_focus_tooltip$"
 edict_play_as_ruler_campaign_unity_focus:0 "통치자 캠페인: 문화 변동"
 edict_play_as_ruler_campaign_unity_focus_desc:0 "§L$play_as_ruler_power_unity$ 카테고리§!\n문화 교류에 참여하면 다양한 문화가 융합되어 풍부한 하위 문화의 직물과 다양한 문화 표현의 후속 층이 형성됩니다."
 play_as_ruler_campaign_unity_focus_tooltip:0 "$mod_country_unity_produces_mult$: §G+10%§!\n£pop£ 생활 수준이 근로자 이상인 팝은 매달 £unity£ §Y$unity$§! ( §G0.33§! 100 £pop£ 팝당 ) 생산합니다."
 rls_direction_unity_2_desc:0 "$rls_direction_prefix_desc$§Y$MOD_LEADER_SPECIES_EXP_GAIN$§!이 §G+5%§! 증가합니다.[Root.rls_check_ruler_direction_2_level]"
 edict_play_as_ruler_campaign_education_focus:0 "통치자 캠페인: 비행 교육"
 edict_play_as_ruler_campaign_education_focus_desc:0 "§L$play_as_ruler_power_unity$ 카테고리§!\n조류가 하늘을 나는 것처럼, 사람들은 이 초공간 시대에서 자신의 역할과 기여를 올바른 교육과 인식을 통해 이해하는 것이 중요합니다."
 edict_play_as_ruler_campaign_modify_leader:0 "통치자 캠페인: 무한한 잠재력"
 edict_play_as_ruler_campaign_modify_leader_desc:0 "§L$play_as_ruler_power_unity$ 카테고리§!\n우리의 드론 지도자들은 완전히 발휘되고 활용되기를 기다리는 풍부한 잠재력을 가지고 있습니다."
 edict_play_as_ruler_campaign_modify_leader_machine:0 "통치자 캠페인: 최적화된 서브루틴"
 edict_play_as_ruler_campaign_modify_leader_machine_desc:0 "§L$play_as_ruler_power_unity$ 범주§!\n충분한 데이터 저장 용량이 주어지면, 유닛은 가장 복잡한 알고리즘 개선의 배치를 준비합니다."
 play_as_ruler_campaign_modify_leader_tooltip:0 "$edict_play_as_ruler_campaign_education_focus_tooltip$\n§Y기술 수준§!이 8 이상인 지도자는 시간이 지남에 따라 §d운명 특성§!을 얻을 수 있습니다."
 rls_direction_unity_3_desc:0 "$rls_direction_prefix_desc$§Y$MOD_LEADER_UPKEEP_EMPIRE_SIZE_MULT$§!은 §G-5%§! 감소합니다.[Root.rls_check_ruler_direction_3_level]"
 rls_direction_unity_4_desc:0 "$rls_direction_prefix_desc$우리의 §Y$MOD_COUNTRY_LEADER_POOL_SIZE$§!가 §G+1§! 증가합니다.[Root.rls_check_ruler_direction_4_level]"
 edict_play_as_ruler_campaign_elitist_focus:0 "통치자 캠페인: 엘리트 중의 엘리트"
 edict_play_as_ruler_campaign_elitist_focus_desc:0 "§L$play_as_ruler_power_unity$ 카테고리§!\n시민들이 우리 세계의 미래를 구상하기에는 너무 젊을 수 있지만, 제국의 정확한 궤적을 예측하고 그에 따라 이끌 수 있는 영향력 있는 리더가 있는 것은 필수적입니다."
 edict_play_as_ruler_campaign_elitist_focus_gestalt:0 "통치자 캠페인: 리더 수정"
 edict_play_as_ruler_campaign_elitist_focus_gestalt_desc:0 "§L$play_as_ruler_power_unity$ 카테고리§!\n시간이 지남에 따라, 우리의 지도자들은 부패와 오류를 경험할 수 있습니다. 이러한 문제를 해결하기 위해서는 그들의 무결성과 효율성을 회복하기 위한 적절한 수정이나 업그레이드가 필요합니다."
 rls_direction_unity_5_desc:0 "$rls_direction_prefix_desc$각 £district£ §Y구역§!은 §Y[root.rls_direction_agrarian_3_5_swap_text]§! 외에 §G+1§! $unity$ §Y£unity£§!을 생산합니다.[Root.rls_check_ruler_direction_5_level]"
