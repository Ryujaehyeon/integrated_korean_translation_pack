 edict_play_as_ruler_campaign_influence_focus:0 "통치자 캠페인: 정치적 노력"
 edict_play_as_ruler_campaign_influence_focus_desc:0 "§L$play_as_ruler_gaining_influence$ 카테고리§!\n세상에 변화를 가져오기 위해서는 우리 제국에 변화를 가져올 수 있어야 합니다."
