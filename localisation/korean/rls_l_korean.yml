 edict_play_as_ruler_campaign_terraform_focus:0 "통치자 캠페인: 테라포밍 목록"
 edict_play_as_ruler_campaign_terraform_focus_desc:0 "§L$play_as_ruler_flavor_edicts$ 카테고리§!\n행성을 테라포밍할 가치가 있는 목록을 작성함으로써 테라포밍 과정을 간소화하고 효율성을 높일 수 있습니다."
 edict_play_as_ruler_campaign_decline_focus:0 "통치자 캠페인: 강제 추방"
 edict_play_as_ruler_campaign_decline_focus_desc:0 "§L$play_as_ruler_flavor_edicts$ 카테고리§!\n우리의 목적에 부적합한 개인을 적극적으로 제거함으로써, 단호하고 결정적인 접근 방식이 그들을 우리 중에서 쫓아내는 가장 효과적인 방법인 경우가 많습니다."
 edict_play_as_ruler_campaign_efficient_bureaucracy_not:0 "통치자 캠페인: 국가 전역 방송"
 edict_play_as_ruler_campaign_efficient_bureaucracy_not_desc:0 "§L$play_as_ruler_flavor_edicts$ 카테고리§!\n과도한 확장은 은하 제국에 중대한 장애물이 되며, 우리 국가의 안정성과 성공을 보장하기 위해 최소화해야 합니다."
 edict_play_as_ruler_campaign_efficient_bureaucracy_not_tooltip:0 "$MOD_EMPIRE_SIZE_PENALTY_MULT$: §G-25%§!\n§Y$MOD_TRADITION_COST_EMPIRE_SIZE_MULT$§!는 효과가 발휘되는 동안 §G제로§!로 간주됩니다."
