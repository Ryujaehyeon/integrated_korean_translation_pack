 rls_direction_agrarian_3_5_swap_text_machine:0 "$district_nexus$"
 rls_direction_agrarian_6_desc:0 "$rls_direction_prefix_desc$§G+100§! §Y£job_farmer£ $job_farmer$§! 식민지 전역에서.[Root.rls_check_ruler_direction_6_level]"
 rls_direction_agrarian_7_desc:0 "$rls_direction_prefix_desc$§Y'$policy_rls_direction_food_policy$'§! 정책에 접근할 수 있으며, 이를 통해 잉여 식량 수입의 §Y50%§!를 대체 효과로 전환할 수 있습니다.[Root.rls_check_ruler_direction_7_level]"
 policy_rls_direction_food_policy:0 "잉여 농경 전환"
 policy_rls_direction_food_policy_desc:0 "과잉 생산된 식량은 부패하기 쉬워 유용하게 사용될 수 없습니다. 여기서 우리는 이를 우리 국가의 이익을 위해 전환할 수 있습니다."
 rls_direction_food_default_policy:0 "없음"
 rls_direction_food_default_policy_desc:0 "매달 $food$ £food£에 대한 실제 조치는 없습니다."
 rls_direction_food_energy_policy:0 "에너지 변환"
 rls_direction_food_energy_policy_desc:0 "일부 £food£ $food$를 바이오 연료 £energy£ $energy$로 전환합니다.\n\n$rls_direction_food_policy_prefix$\n§E각 £food£ §Y1§!는 £energy£ §Y0.66§!로 전환됩니다."
 rls_direction_food_happiness_policy:0 "열매의 기쁨"
 rls_direction_food_happiness_policy_desc:0 "정직한 일에는 정직한 보상이 따릅니다.\n\n$rls_direction_food_policy_prefix$\n§E각 £food£ §Y10§!는 £happiness£ §Y+0.5%§!로 변환됩니다 (최대 §Y+25%§!)."
 rls_direction_food_growth_policy:0 "다산 출생"
 rls_direction_food_growth_policy_desc:0 "건강한 몸은 건강한 출생을 가져옵니다.\n\n$rls_direction_food_policy_prefix$\n§E각 £food£ §Y10§!는 $mod_BIOLOGICAL_pop_growth_speed$ §Y+0.5%§!로 변환됩니다 (최대 §Y+25%§!)."
 rls_direction_food_immigration_policy:0 "식량 저장소"
 rls_direction_food_immigration_policy_desc:0 "이 과일 같은 음식은 가장 끔찍한 세계조차 관광객을 끌어들일 수 있습니다.\n\n$rls_direction_food_policy_prefix$\n§E각 £food£ §Y1§!는 $MOD_PLANET_IMMIGRATION_PULL_ADD$ §Y+0.2§!로 변환됩니다 (최대 §Y+100§!)."
 rls_direction_food_policy_prefix:0 "§E§Y50%§!의 잉여 월간 $food$ §Y£food£§!가 변환됩니다§!"
 play_as_ruler_food_policy_energy_modifier:0 "전환된 식량"
 play_as_ruler_food_policy_energy_modifier_desc:0 "§G이 수정자는 §Y$policy_rls_direction_food_policy$§! 정책에서 비롯된 것입니다.§!"
