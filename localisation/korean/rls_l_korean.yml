 play_as_ruler_select_category_first:0 "§R통치자 중점 UI가 열려있는 동안에는 할 수 없습니다.§!"
 play_as_ruler.9499.name:0 "통치자 취미 중점 사용가능"
 play_as_ruler.9499.desc:0 "§H[ruler.GetName]§!은(는) [ruler.GetHerHis]가 원하는대로 방향이나 카테고리를 선택할 수 있습니다.\n\n여러분은 §H$MOD_RULER_TITLE$§! 창에서 [ruler.GetHerHim]에게 지시해 특정 카테고리에 집중하거나 방향을 전문화하라고 할 수 있습니다."
 play_as_ruler.9499.a:0 "확인."
 play_as_ruler.9499.b:0 "가져와봐라."
 play_as_ruler.9499.b.tooltip:0 "§R이미 열려져 있습니다.§!"
 play_as_ruler.9499.tooltip:0 "§E§Y통치자 중점 페이지 열기§! 시행령은 §H시행령§! 창에서 찾을 수 있습니다 (Dynamic Mod Menu에서도 가능합니다)§!"
 play_as_ruler.9499.tooltip2:0 "\n§R우리는 현재 통치자가 없습니다.§!"
 play_as_ruler.9499.tooltip3:0 "\n§R현재 열려 있음§!"
 play_as_ruler.15011.meme:0 "이게 마피아의 방식이다."
 play_as_ruler.15002.name:0 "엘리트의 지도"
 play_as_ruler.15002.desc:0 "거리의 소문에 따르면 §H[selected_leader.GetTitle] [selected_leader.GetName]§!은(는) 드디어 자신의 문제를 우리 개입 이후로 해결했습니다."
 play_as_ruler.15003.name:0 "드론 재조정"
 play_as_ruler.15003.desc:0 "우리는 개입 후 §H[selected_leader.GetTitle] [selected_leader.GetName]§!에 대한 모든 문제를 제거했습니다."
 play_as_ruler.15004.name:0 "유닛 재조정"
 play_as_ruler.15004.desc:0 "§E유닛 유형: §H[selected_leader.GetTitle]§!\n모델: §H[selected_leader.GetName]§!§!\n\n오류가 감지되었습니다. 수정 프로토콜을 시작합니다. 재프로그래밍을 시작합니다... 성공.\n\n프로세스가 완료되었습니다. 유닛 무결성이 복원되었습니다."
 play_as_ruler.42689.title:0 "§E[rls_ruler.GetTitle]§!\n§H[rls_ruler.GetName]§!"
 play_as_ruler.42689.desc:0 "설명은 여기로"
 play_as_ruler_campaign_amount:0 "캠페인 점수"
 play_as_ruler_campaign_amount_needed:0 "$TRIGGER_FAIL$§R활성화하기 위한 §Y캠페인 점수§!가 부족합니다.§!"
 play_as_ruler_campaign_amount_having:0 "§E여러분의 통치자는 국가를 그저 그런 수준 너머로 발전시킨다는 자신의 의무를 수행하고자 합니다. 그들은 간간이 조사할 가치가 있는 몇 가지 방향을 엮었습니다.§!\n\n"
 play_as_ruler_campaign_amount_ongoing:0 "$TRIGGER_FAIL$캠페인이 진행 중입니다."
 play_as_ruler_campaign_war_focus_holded_timehold:0 "$TRIGGER_FAIL$§R우린 전쟁 중이거나 매우 위험한 상태가 아닙니다.§!"
 edict_play_as_ruler_campaign_topbar:0 "§L----통치자 캠페인----§!"
 edict_play_as_ruler_campaign_topbar_desc:0 "$play_as_ruler_campaign_amount_having$모든 통치자 캠페인은 활성화를 할려면 §B실행 점수§!가 필요합니다. §B실행 점수§!는 통치자의 통치 경험으로부터 얻을 수 있으며, §M카리스마§! 수준에 의해 간접적으로 결정됩니다. 새로운 통치자가 등극하면 §B실행 점수§!가 초기화됩니다."
 edict_play_as_ruler_hobby_open_it:0 "§H통치자 중점 메뉴§!"
 edict_play_as_ruler_hobby_open_it_desc:0 "§Y통치자 중점§! 메뉴를 엽니다."
 edict_play_as_ruler_campaign_minerals_mining_guild:0 "통치자 캠페인: 광란의 광물"
 edict_play_as_ruler_campaign_minerals_mining_guild_desc:0 "광물 조합의 지원과 통치자의 승인이 합쳐져, 한동안 제국의 채굴 활동이 활발해질 것입니다."
 edict_play_as_ruler_campaign_growth_lithoid:0 "통치자 캠페인: 암초 성장"
 edict_play_as_ruler_campaign_growth_lithoid_desc:0 "돌은 암석 없이는 석질류가 될 수 없습니다. 전체 성장률을 증가시킬 수 있을 것입니다."
 edict_play_as_ruler_campaign_food_synth:0 "통치자 캠페인: 수확 계획"
 edict_play_as_ruler_campaign_food_synth_desc:0 "우린 유기농 식품을 필요로 하지 않지만, 다른 종족은 여전히 기본적인 유기물 섭취를 필요로 합니다."
 edict_play_as_ruler_campaign_recycle_environmentalist:0 "통치자 캠페인: 환경 보호"
 edict_play_as_ruler_campaign_recycle_environmentalist_desc:0 "삶은 항상 환경과 연관되어 있습니다. 자연을 유지하는 것은 우리의 필수 과제입니다."
 edict_play_as_ruler_campaign_research_synth:0 "통치자 캠페인: 혁신적인 해결책"
 edict_play_as_ruler_campaign_research_synth_desc:0 "우주의 목적에 대한 추구는 제국에서 끝날 부분이 아닙니다. 모든 이가 계산에 참가해, 마침내 답을 찾아낼 것입니다."
 play_as_ruler_campaign_research_synth_tooltip:0 "일반적인 생활수준 이상의 기계 £pop£ POP 노동자가 매달 §G0.25§! £science£ §Y연구§!를 생산합니다.\n$play_as_ruler_campaign_research_synth_tooltip_letter$"
 play_as_ruler_campaign_research_synth_tooltip_letter:0 "월간 £science£ 연구: §G+15%§!"
 play_as_ruler_strategic_resource_focus_modifier:0 "$edict_play_as_ruler_strategic_resource_focus$"
 play_as_ruler_strategic_resource_focus_modifier_desc:0 "긴 목록을 만들지 않고도 모든 전략 자원이 캠페인의 영향을 받을 수 있도록 합니다.\n\n§Y이 변동치는 시행령이 만료되면 사라집니다.§!"
 edict_play_as_ruler_campaign_build_functional_architecture:0 "통치자 캠페인: 건축적 감각"
 edict_play_as_ruler_campaign_build_functional_architecture_desc:0 "건물의 단순화, 우리의 통치자는 이를 더욱 발전시키는 방법을 찾아내고자 합니다. 이를 통해 유지비는 더 감소할 것입니다."
 edict_play_as_ruler_campaign_war_focus_mil:0 "통치자 캠페인: 동원"
 edict_play_as_ruler_campaign_war_focus_mil_desc:0 "전쟁이 우리를 부르고 있습니다. 우리는 적의 심장을 치고 승리의 노래를 부를 것입니다."
 edict_play_as_ruler_campaign_repair_focus_metal:0 "통치자 캠페인: 액체 금속 수리"
 edict_play_as_ruler_campaign_repair_focus_metal_desc:0 "액체 금속을 통해 함선을 순식간에 수리할 수 있습니다. 거기에 우리의 훌륭한 공학적 능력이 합쳐지면 함선의 수명을 크게 연장할 수 있을 것입니다."
 edict_play_as_ruler_campaign_elitist_focus_elder:0 "통치자 캠페인: 장로 중의 장로"
 edict_play_as_ruler_campaign_elitist_focus_elder_desc:0 "우리의 대중들은 그 어디에서도 찾아볼 수 없을 만큼 뛰어납니다. 새로운 발견을 항상 선도해나가는 것이 바로 우리의 대중들입니다. 하지만 미래를 향해 나아갈 길을 결정하기엔, 대중들은 아직 어립니다. 우리에겐 오랜 시간의 경험을 가진 지혜로운 장로가 필요합니다. 우릴 단순하거나 어리석게 만들지 않고, 큰 사고 없이 나아갈 수 있도록 지도할 수 있는 장로가 필요합니다."
 edict_play_as_ruler_campaign_elitist_focus_tooltip:0 "지도자들은 시간이 지남에 따라 부정적인 특성을 제거할 수 있을 것입니다."
 edict_play_as_ruler_campaign_sensor_focus_psi:0 "통치자 캠페인: 사이오닉 관측"
 edict_play_as_ruler_campaign_sensor_focus_psi_desc:0 "사이오닉 이론에 대한 연구결과를 통해 사이오닉을 공허한 우주를 관측하는데 사용할 수 있게 되었습니다."
 edict_play_as_ruler_campaign_trust_focus_auth:0 "통치자 캠페인: 노예 상인"
 edict_play_as_ruler_campaign_trust_focus_auth_desc:0 "모든 노예는 평등합니다. 살아서 그 가치를 다 할 수만 있다면요."
 edict_play_as_ruler_campaign_influence_focus_demo:0 "통치자 캠페인: 민주주의 정치"
 edict_play_as_ruler_campaign_influence_focus_demo_desc:0 "선거와 관련된 노력은 단순히 행성 하나 뿐만 아니라, 제국 전체에 영향을 미칩니다."
 edict_play_as_ruler_campaign_robot_focus_synth:0 "통치자 캠페인: 인공적 재생산"
 edict_play_as_ruler_campaign_robot_focus_synth_desc:0 "우리의 행성을 번성하게 하는 것은 우리의 시민들에게는 문제일지도 모릅니다. 우리의 시민들이 더 이상 유기체처럼 아기를 낳을 수 없기 때문입니다. 따라서, 인공 번식의 속도를 더 높여야 합니다."
 edict_play_as_ruler_campaign_immigration_focus:0 "통치자 캠페인: 이주 열풍"
 edict_play_as_ruler_campaign_immigration_focus_desc:0 "새로운 집이 우릴 기다립니다. 많은 시민들이 새로운 삶에 뛰어들 준비가 되었습니다."
 edict_play_as_ruler_campaign_immigration_focus_xeno:0 "통치자 캠페인: 외계종 보관함"
 edict_play_as_ruler_campaign_immigration_focus_xeno_desc:0 "외계종들이 우릴 위해 일하는 것으로 끝내면 안됩니다. 그들은 적절한 대가도 치러야만 합니다."
 edict_play_as_ruler_campaign_education_focus_elder:0 "통치자 캠페인: 조언자 교육"
 edict_play_as_ruler_campaign_education_focus_elder_desc:0 "제국이 나아갈 길을 찾기 위해, 훌륭한 조언가가 필요합니다."
 edict_play_as_ruler_campaign_education_focus_tooltip:0 "모든 지도자는 매달 §G+8§! 경험치를 얻습니다."
 edict_play_as_ruler_campaign_imperial_cult:0 "통치자 캠페인: 신성한 후손"
 edict_play_as_ruler_campaign_imperial_cult_desc:0 "우리의 신과 같은 통치자께서 뛰어난 지도자를 물색하기 위해 직접 제국을 떠돌 것입니다."
 edict_play_as_ruler_campaign_warrior_culture:0 "통치자 캠페인: 군사 전통"
 edict_play_as_ruler_campaign_warrior_culture_desc:0 "국가를 지키는 군대는 그 어떤 적에게도 용감히 맞서야 합니다."
 edict_play_as_ruler_campaign_distinguished_admiralty:0 "통치자 캠페인: 함대 완편"
 edict_play_as_ruler_campaign_distinguished_admiralty_desc:0 "적은 언제라도 나타날 수 있습니다. 함대를 미리 준비해둬야 합니다."
 edict_play_as_ruler_campaign_distinguished_admiralty_tooltip:0 "활성화되면 모든 사령관이 매달 경험치를 얻습니다."
 edict_play_as_ruler_campaign_efficient_bureaucracy:0 "통치자 캠페인: 은하 전역 방송"
 edict_play_as_ruler_campaign_efficient_bureaucracy_desc:0 "성간제국의 몰락의 원인엔 과도한 팽창 역시 한 몫을 합니다만, 올바른 방법을 사용하여 이 문제의 여파를 최소한으로 줄일 수 있을 것입니다."
 none:0 "비전문 장비"
 MOD_RULER_TITLE:0 "통치자 초점"
