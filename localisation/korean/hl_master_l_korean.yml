 hl_master.602.name:0 "시스템 생성 확인"
 hl_master.602.desc.free:0 "새로운 태양계를 [hl_from_system.GetName] 근처에 생성하시겠습니까? 이 시스템은 하이퍼레인을 통해 연결됩니다.\n\n§H비용: 무료§!"
 hl_master.602.desc.cheap:0 "새로운 태양계를 [hl_from_system.GetName] 근처에 생성하시겠습니까? 이 시스템은 하이퍼레인을 통해 연결됩니다.\n\n§Y비용: §! £energy£ $@hl_system_create_energy_cheap$ 에너지, £alloys£ $@hl_system_create_alloys_cheap$ 합금, £minerals£ $@hl_system_create_minerals_cheap$ 광물, £influence£ $@hl_system_create_influence_cheap$ 영향력"
 hl_master.602.desc.normal:0 "[hl_from_system.GetName] 근처에 새로운 태양계를 생성하시겠습니까? 이 시스템은 하이퍼레인을 통해 연결됩니다.\n\n§Y비용: §! £energy£ $@hl_system_create_energy_normal$ 에너지, £alloys£ $@hl_system_create_alloys_normal$ 합금, £minerals£ $@hl_system_create_minerals_normal$ 광물, £influence£ $@hl_system_create_influence_normal$ 영향력"
 hl_master.602.desc.expensive:0 "새로운 태양계를 [hl_from_system.GetName] 근처에 생성하시겠습니까? 이 시스템은 하이퍼레인을 통해 연결됩니다.\n\n§Y비용: §! £energy£ $@hl_system_create_energy_expensive$ 에너지, £alloys£ $@hl_system_create_alloys_expensive$ 합금, £minerals£ $@hl_system_create_minerals_expensive$ 광물, £influence£ $@hl_system_create_influence_expensive$ 영향력"
