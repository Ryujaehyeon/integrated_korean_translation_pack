 hl_changelog_v193:0 "§Y버전 1.9.3§!\n- 1440p 미만 해상도를 위한 간소화된 제어 패널 UI 추가\n- 상태 및 성계 생성이 하이퍼레인 작전으로 통합됨\n- 행성 선택 없이 행성 창을 열지 않을 때 수도 연결 버튼이 표시되지 않던 버그 수정"
 hl_changelog_v195:0 "§YVersion 1.9.5§!\n- Added optional DMM(Dynamic Mod Menu) support. This adds "Hyperlane Master Control Panel" button the DMM. This only happens if you have DMM enabled. It will pick up on save games after 1 month, and instantly on new games. DMM is NOT required. Only supported now if you use it."
