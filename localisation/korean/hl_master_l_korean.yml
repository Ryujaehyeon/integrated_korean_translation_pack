 hl_master.600.desc:0 "새로운 태양계를 생성하기 위해 배치 방법과 시스템 유형을 선택하세요. 이 시스템은 하이퍼레인을 통해 [hl_from_system.GetName]에 자동으로 연결됩니다.\n\n§H현재 기원: §! [hl_from_system.GetName]"
