 hl_master.120.desc.normal:0 "[hl_from_system.GetName]와 연결된 모든 하이퍼레인을 파괴하시겠습니까? 이로 인해 시스템이 완전히 고립됩니다!\n\n§Y비용:§! £energy£ $@hl_destroy_all_energy_normal$ 에너지, £alloys£ $@hl_destroy_all_alloys_normal$ 합금, £minerals£ $@hl_destroy_all_minerals_normal$ 광물, £influence£ $@hl_destroy_all_influence_normal$ 영향력"
