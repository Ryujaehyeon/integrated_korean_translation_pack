 hl_master.100.desc.cheap:0 "[hl_from_system.GetName]에서 [hl_to_system.GetName]까지 새로운 하이퍼레인을 생성하시겠습니까?\n\n§Y비용: §! £energy£ $@hl_create_energy_cheap$ 에너지, £alloys£ $@hl_create_alloys_cheap$ 합금, £minerals£ $@hl_create_minerals_cheap$ 광물, £influence£ $@hl_create_influence_cheap$ 영향력"
