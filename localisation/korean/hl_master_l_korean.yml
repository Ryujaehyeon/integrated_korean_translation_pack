 hl_master.131.desc:0 "[hl_from_system.GetName]와 당신의 수도를 연결하는 하이퍼레인이 생성되었습니다!"
 hl_changelog_v191:0 "§Y버전 1.9.1§!\n- 기술이 잠금 해제되지 않았을 때 하이퍼레인 작업에 경고 텍스트 추가\n- 제어판/모드 전반에 걸쳐 다양한 방어 검사 추가\n- 변경 로그에 지연 추가. 이제 다음 게임 월 시작 시에 표시됩니다. 여러 모드로 인해 새로운 게임 팝업 스팸을 방지하고 적절한 저장 게임 상태를 보장하는 데 도움이 됩니다."
 hl_changelog_v190:0 "§Y버전 1.9.0§! \n- 태양계 생성 추가 - 시스템 유형을 선택하고 어떤 기원 시스템 근처에 생성하며, 하이퍼레인을 통해 연결됩니다.\n- 하이퍼레인 운영 비용에 광물 추가\n- 행성 결정 제거 - 모든 작업은 이제 제어판을 통해 진행됩니다.\n- 콘솔 명령 제거 - 전체 GUI가 필요해지지 않았습니다.\n- 결정/명령에서 제어판으로 전달된 범위 수정\n- 어떤 행성/별을 직접 클릭하여 기원 또는 목표로 설정 (행성 창 필요 없음)\n- 다양한 버그 수정 및 내부 정리"
 hl_changelog_v121:0 "§Y버전 1.2.1§!\n- 별/행성 창이 열려 있을 때 올바른 범위 처리를 사용하여 버튼 효과가 제대로 작동하도록 수정했습니다.\n- 콘솔 명령어(콘솔 활성화, 플래그 지우기, 도움말)가 창 상태에 관계없이 모든 범위에서 작동하도록 수정했습니다.\n- 각 슬롯(기원 1-3, 목표 1-3)에 대한 특정 저장 버튼이 있는 새로운 북마크 시스템을 추가했습니다.\n- 개별 북마크 제거를 위한 각 북마크 옆에 삭제(X) 버튼을 추가했습니다.\n- 선택 시 설정 버튼과 교체되는 기원 및 목표에 대한 선택 해제 버튼을 추가했습니다.\n- 더 나은 사용성을 위해 버튼 레이아웃과 위치를 개선했습니다."
