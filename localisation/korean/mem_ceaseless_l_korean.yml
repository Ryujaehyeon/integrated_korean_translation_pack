 origin_tooltip_mem_ceaseless_gaze_negative:0 "- $NO_GUARANTEED_WORLDS$"
 mem_ceaseless_base:0 "중력 터널"
 mem_ceaseless_base_DESC:0 "우주 시간의 한 지점이 너무 무거워 존재를 뚫고 은하의 다른 부분으로 떨어집니다."
 mem_ceaseless_base_MEGASTRUCTURE_DETAILS:0 "이 메시지가 보인다면, 제가 실수를 한 것입니다."
 BYPASS_DESC_INACTIVE_MEM_CEASELESS:0 "이 이상한 웜홀을 이해할 수 없습니다."
 MESSAGE_MEM_CEASELESS_FOUND_PROBE_SIGNATURE_TITLE:0 "또 다른 탐사선의 신호"
 MESSAGE_MEM_CEASELESS_OPENED_PORTAL_TITLE:0 "웜홀 차트"
 pc_mem_ceaseless_star:0 "$NAME_mem_mirror_hall_system$"
 pc_mem_ceaseless_star_desc:0 "거대한 웜홀로, 느슨한 물자와 함선을 갈망합니다. 강인한 중력의 끌림은 함선의 선체에 많은 스트레스를 줍니다."
 NAME_mem_mirror_hall_system:0 "위대한 입구"
 mem_ceaseless_system:0 "중력 소용돌이"
 MEM_CEASELESS_PROBE_SIGNATURE_PROJECT:0 "프로브 신호"
 MEM_CEASELESS_PROBE_SIGNATURE_PROJECT_DESC:0 "우리는 또 다른 탐사의 흔적을 발견했습니다. 이를 식별하고 우리에게 필요한 것을 회수하기 위해 더 자세히 살펴봐야 합니다."
 preset_specialist_mem_frontier_sector:0 "$specialist_mem_frontier_sector$"
 preset_specialist_mem_frontier_sector_desc:0 "종속국임은 $specialist_mem_frontier_sector$ 전문화된 종속국으로, 주군의 정부 용량을 과도하게 초과하지 않으면서 국경을 안전하게 유지하는 데 전문화되어 있습니다."
 preset_specialist_mem_frontier_sector_flavor_desc:0 "$preset_specialist_mem_frontier_sector_desc$"
