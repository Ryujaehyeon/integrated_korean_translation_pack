 mem_ceaseless_wormhole_galactic:0 "$mem_ceaseless_base$"
 mem_ceaseless_wormhole_desc:0 "이 성계에는 §Y$mem_ceaseless_base$§!이(가) 포함되어 있습니다."
 mem_ceaseless_lost_probes_title:0 "타락한 탐사자"
 mem_ceaseless_lost_probes_desc:0 "이 probes는 용감하지도 cowardly하지도 않으며, 오직 하나의 목적을 위해 제작되었습니다: 미지의 세계를 탐사하고 적대적인 생명체를 제거하는 것입니다 - 이를 통해 알크리 제국의 안전을 보장합니다. 수세기 동안 그들 중 하나를 제외한 모든 probes가 작동을 중단했습니다. 남아 있는 것들을 회수합시다."
 mem_ceaseless_lost_probes_found:0 "발견된 탐사선 잔해"
 mem_ceaseless_lost_probes_wormholes_charted:0 "복구된 탐사선 데이터"
 concept_mem_ceaseless_mirror_system:0 "$NAME_mem_mirror_hall_system$"
 concept_mem_ceaseless_mirror_system_desc:0 "$NEW_LINE$- §Y$mem_ceaseless_base$§! 네트워크의 주요 허브를 포함합니다.$NEW_LINE$- 강인한 $mem_ceaseless_system$이(가) 모든 주둔 함선에 큰 피해를 입힙니다.$NEW_LINE$- §L$pc_mem_ceaseless_star_desc$§!"
