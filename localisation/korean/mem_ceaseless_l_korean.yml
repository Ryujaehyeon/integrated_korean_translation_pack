l_korean:
 origin_mem_ceaseless_gaze:0 "끊임없는 응시"
 origin_mem_ceaseless_gaze_desc:0 "먼 옛날에 이 문명은 우주의 발전을 관찰할 수 있는 다수의 측량 프로브를 발사할 수 있었습니다. 과거의 문명과 우주여행 기술이 재난에 의해 파괴된 후, 이들은 다시 한번 우주로 진출할 준비를 마쳤습니다."
 origin_tooltip_mem_ceaseless_gaze:0 "§Y유물 행성§!을 모성으로 가지고 시작합니다.\n은하 어딘가에 §S측량 프로브§!가 반드시 나타납니다. 프로브는 우리를 주인으로 생각하지 않겠지만, 그와 연락할 수는 있을 것입니다."
 START_SCREEN_MEM_CEASELESS_GAZE:0 "우리의 먼 조상들은 우주 여행이 가능했음에도 불구하고, 우리 세계를 떠나는 것을 선택하지 않았습니다. 대신, 그들은 외계 위협을 탐지하고 무력화할 수 있는 정교한 탐사선을 제작하여 미지의 세계로 보냈습니다. 그들의 첫 번째 위대한 발견은 우리와 경계를 이루는 매혹적인 항성계로, 다수의 항성계와 연결된 비정상적이고 불안정한 웜홀을 품고 있었습니다.\n\n이 웜홀을 이용하여 그들의 탐사선은 빠르게 우리 은하의 먼 곳으로 퍼져 나갔습니다. 적절한 은하 감시가 그들을 안전하게 지켜줄 것이라는 믿음 속에서 그들은 안일해졌고, 그곳에 도사리고 있는 진정한 외계의 위험을 인식하지 못했습니다. 그들의 종말은 빠르고 예상치 못한 것이었음에 틀림없으며, 그들의 문명을 파괴한 대재앙으로 이어진 사건에 대한 문서가 존재하지 않습니다. 그것이 내부의 위협이었는지 외부의 위협이었는지는 우리에게 여전히 미스터리입니다.\n\n우리가 재건하는 데 걸린 세기 동안, "Ceaseless Gaze" 클래스 탐사선들은 은하를 가로질러 멀리 여행했습니다. 시간이 지나면서, 아마도 그들 대부분은 고장 나거나 파괴되었을 것입니다. 오늘날, 단 하나만이 여전히 정기적으로 위치 업데이트를 보내고 있습니다. 얼마 전, 그것은 [Capital_Scope.GetName]로 돌아와 우리가 해독할 수 없는 보고서를 제출하고 죽은 창조자에게 새로운 명령을 요청했습니다. 우리는 여러 번 그 AI와 대화하려고 했지만, 그것은 한때 자신을 만든 알크리 제국의 정당한 후계자로 우리를 인식하지 않았습니다.\n\n이제 우리는 다시 한 번 우리의 조상 고향의 경계를 넘어 나갈 수 있게 되었습니다. 우리는 옛 제국과 같은 실수를 반복하지 않을 것입니다."
 specialist_mem_frontier_sector:0 "전초 기지"
 MESSAGE_SUBJECT_LEVEL_UP_specialist_mem_frontier_sector_TITLE:0 "외곽 보유지 전문화 주제가 승급했습니다."
 MESSAGE_WE_LEVEL_UP_specialist_mem_frontier_sector_TITLE:0 "외곽 지역 $MESSAGE_WE_LEVEL_UP_TITLE$"
 mem_surveyor_ambient_object:0 "고장난 탐사 프로브"
