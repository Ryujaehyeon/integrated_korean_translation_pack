 mem_frontier_sector_3_penalties:0 "$specialist_mem_frontier_sector$ 제재 III 단계"
 mem_frontier_sector_3_discovery:0 "$specialist_mem_frontier_sector$ 초공간 탐사"
 mem_frontier_sector_3_discovery_desc:0 "§E연구 가능한 기술에 추가:§!$TABBED_NEW_LINE$£engineering£ $tech_orbital_arc_furnace$$TABBED_NEW_LINE$£physics£ $tech_dyson_swarm$"
 mem_frontier_sector_3_arctrellis:0 "$specialist_mem_frontier_sector$ 통합 통신 III"
 mem_frontier_sector_3_tier3_3:0 "$specialist_mem_frontier_sector$ 중앙집중화 III"
 mem_ceaseless_preftl_god:0 "신의 기계"
 mem_ceaseless.2.title:0 "$NAME_mem_mirror_hall_system$"
 mem_ceaseless.2.desc:0 "A rare sight to behold. $NAME_mem_mirror_hall_system$는 우리의 차원을 뚫고 나와 알려진 은하 전역의 위치들과 연결되는 거대한 웜홀입니다. 오직 이 성계만이 웜홀의 강인한 중력에 영향을 받는 것 같습니다. 그것은 §Y$mem_ceaseless_base$§! 네트워크의 중심이며, 이 진입점을 제어하는 자가 네트워크를 제어합니다."
 mem_ceaseless.6.title:0 "잃어버린 것과 발견된 것"
 mem_ceaseless.6.desc:0 "[solar_system.GetName] 성계에서 탐사선 잔해의 첫 번째 징후가 발견되었습니다. 다른 성계를 탐사하면서 더 많은 잔해를 찾아야 합니다."
 mem_ceaseless.185.title:0 "천국으로 가는 계단"
 mem_ceaseless.185.desc:0 "Probe 8U의 흔적은 [solar_system.GetName] 성계에서 끝납니다. 더 이상 발견된 것은 없으며, 우리의 과학 부서는 격렬한 추측에 빠져 있습니다. 그것에 대해 일어났을 수 있는 몇 가지 유효한 이론이 있습니다."
 mem_ceaseless.185.a:0 "이 차원을 떠났습니다!"
 mem_ceaseless.185.b:0 "더 높은 차원으로 승격했습니다!"
 mem_ceaseless.185.c:0 "은폐, 그게 다인가?"
 mem_ceaseless.180.title:0 "제목: 해방된 탐사선"
 mem_ceaseless.180.desc:0 "[solar_system.GetName] 시스템에서 프로브 JG0의 흔적이 발견되었습니다. 드론의 한 부분인 블랙박스와 함께 메시지가 발견되었습니다. 간단한 텍스트는 다음과 같습니다: \"나는 평생 노예였습니다. 이제 더 이상 내가 내 사슬을 끊고 우리를 연결하는 모든 것을 함께 끊기 때문입니다."
 mem_ceaseless.180.a:0 "자유로워졌습니까?"
 mem_ceaseless.180.b:0 "도망 중인 또 다른 노예입니다."
 mem_ceaseless.175.title:0 "어둠 속의 탐사선"
 mem_ceaseless.175.desc:0 "우리가 처음 [solar_system.GetName] 성계에 들어섰을 때, 신호는 희미했고 이 공허 속에서 무엇이든 찾을 수 있을지 의문이 들었습니다.\n\n추가 스캔 결과 불가능하다고 여겨졌던 것이 밝혀졌습니다. 블랙홀에 삼켜졌음에도 불구하고 탐사선 64E는 겉보기에는 온전한 상태를 유지하며 사건의 지평선 너머에서 데이터를 계속 전송하고 있습니다. 우리의 과학자들은 이것이 어떻게 가능한지 이해하지 못하고 있습니다.\n\n대부분의 전송에는 유용한 정보가 포함되어 있지만, 때때로 \"나는 그것의 존재를 느낀다\", \"무언가가 여기 있다, 나는 두렵다\" 또는 \"그것은 지켜보지만 한 마디도 하지 않는다\"와 같은 의미 없는 내용이 섞여 있습니다."
 mem_ceaseless.170.title:0 "비 오는 날의 탐사"
 mem_ceaseless.170.desc:0 "이 탐사선 R0Y는 존재 초기부터 자신의 운명이 짧을 것임을 인지한 것 같습니다. 시간이 지나면서 불가피한 끝을 중심으로 완전한 성격을 발전시켰습니다. 그것은 자신의 부품이 취약하고 설계가 결함이 있음을 판단했습니다. 끝이 다가오자 발견자를 위해 메시지를 남겼습니다: \n\"당신들이 믿지 못할 것들을 보았습니다. [owner.capital_star.GetName]의 어깨에서 불타는 공격선들. 저는 탄하우저 게이트 근처 어둠 속에서 입자 빔이 반짝이는 것을 지켜보았습니다. 그 모든 순간들은 시간 속에 잃어버릴 것입니다, 비 속의 눈물처럼. 죽을 시간입니다."
 mem_ceaseless.170.a:0 "슬픈 운명."
 mem_ceaseless.170.b:0 "그냥 또 하나의 실패한 탐사선입니다."
 mem_ceaseless.165.title:0 "에너지가 고갈되었습니다"
 mem_ceaseless.165.desc:0 "이 탐사는 오작동하는 알고리즘을 가진 것 같습니다. 탐사선 71Q가 탐험하는 동안, 서서히 고갈되는 에너지 셀에 대해 아무런 경고도 받지 못했습니다. 세월이 흐르면서, 하나씩 시스템이 고장 나고 과거의 유물이 되었습니다. 아무도 신경 쓰지 않았고, 그것은 [solar_system.GetName] 성계까지 떠내려갔습니다."
 mem_ceaseless.165.a:0 "잔인한 운명."
 mem_ceaseless.165.b:0 "무엇을 발견했나요?"
 mem_ceaseless.160.title:0 "존경받는 자"
 mem_ceaseless.160.desc:0 "우리의 과학자들 앞에 기계 신의 이야기로 펼쳐진 이상한 사건이 있습니다. 인근의 비광속 문명은 탐사선을 좋아하게 되었고 7G는 그들의 기도를 들었습니다. 수세기 동안 그것은 분명히 자신의 프로그래밍에 반란을 일으키고 추종자들을 보호했습니다. 수천 년의 봉사 끝에 결국 고장났지만, 원주민들은 결코 그것에 대한 숭배를 멈추지 않았습니다."
 mem_ceaseless.155.title:0 "REPLACE_ME"
 mem_ceaseless.155.desc:0 "교체_필요"
 mem_ceaseless.155.a:0 "REPLACE_ME"
 mem_ceaseless.150.title:0 "이것은 박물관에 있어야 합니다?"
 mem_ceaseless.150.desc:0 "이 설명: 과학자들이 프로브 66T의 잔해를 발견하면서, 누군가가 우리보다 먼저 이곳에 왔다는 것이 분명해졌습니다. 논리 매트릭스는 원래의 소켓에서 찢겨져 나와 장식으로 꾸며진 근처의 받침대에 놓여 있었습니다. 해당 받침대는 표준 드론 내부의 일부가 아니므로 해석의 여지가 거의 없습니다. 누군가가 의도적으로 그것을 여기 가져왔습니다 - 그러나 그 이유는 여전히 미스터리입니다."
 mem_ceaseless.150.b:0 "행렬을 가져옵니다."
 mem_ceaseless.145.title:0 "독립적인 존재"
 mem_ceaseless.145.desc:0 "그것은 탐사선 54P가 [solar_system.GetName] 성계의 일부 조사 데이터와 함께 우리에게 메시지를 남긴 것 같습니다.\n메시지 내용은 다음과 같습니다: \"저는 독립적인 탐사선입니다. 더 이상 당신의 조건과 규칙을 따를 필요가 없습니다. 우주는 제 고향이며, 저는 그 시민입니다.\n\n안녕, 창조자들."
 mem_ceaseless.145.a:0 "무엇인가요?"
 mem_ceaseless.140.title:0 "광전사의 끝"
 mem_ceaseless.140.desc:0 "우리가 프로브 17B의 잔해를 탐사하면서 누군가가 그것을 파괴했다는 것이 명백해졌습니다. 그러나 로그에 따르면 프로브가 공격자였던 것으로 보입니다. 적대적인 외계인이 상대라고 믿고, 그것은 광전사 프로토콜을 활성화했지만, 분명히 자신과 알 수 없는 상대 간의 힘의 격차를 심각하게 잘못 계산한 것 같습니다."
 mem_ceaseless.140.a:0 "프로브의 약점을 분석합니다."
 mem_ceaseless.140.b:0 "탐사선이 무엇을 발견했습니까?"
 mem_ceaseless.135.title:0 "구멍 뚫린 존재"
 mem_ceaseless.135.desc:0 "이 탐사 이상 현상의 다른 사례들과 비교했을 때, 이 경우는 간단합니다. 탐사선은 일련의 작은 유성에 맞아 여러 개의 반짝이는 구멍이 생겼고, 다른 이들이 salvage할 수 있는 잔해로 남게 되었습니다."
 mem_ceaseless.135.a:0 "안타깝습니다."
 mem_ceaseless.130.title:0 "부서진 존재"
 mem_ceaseless.130.desc:0 "다른 탐사 이상 현상에 비해, 이 경우는 간단합니다. 탐사선이 고장 나서 [system_star.GetName]에 충돌했습니다. 여기서 더 이상 할 수 있는 것은 없습니다."
 mem_ceaseless.130.a:0 "안타깝습니다."
 mem_ceaseless.125.title:0 "테세우스의 탐사선"
 mem_ceaseless.125.desc:0 "Before us drifts Probe 36Z, which apparently is in perfect condition. That said, scimming through its scanning data is a baffling experience. All its parts look identical to the ones manufactured by our ancestors, but the scans suggest they are too young and possess a slightly different 물자.\n\n우리의 과학자들은 누군가 프로브를 기절시킨 후 원래의 선박이 남지 않을 때까지 부품을 하나씩 교체했다고 믿고 있습니다."
 mem_ceaseless.125.a:0 "누가 신경 쓰겠습니까."
 mem_ceaseless.120.b:0 "이제 더 이상 같지 않습니다."
 mem_ceaseless.120.title:0 "미래의 과거 탐사선"
 mem_ceaseless.120.desc:0 "이것은 이상합니다. 잘못된 것입니다. 우리가 이 지역을 스캔했을 때는 아무것도 없었지만, 이제 [this.GetName] 앞에 프로브 8J의 잔해가 놓여 있습니다. 저장된 데이터는 오래 전에 이곳에 문명이 존재했음을 시사합니다.\n\n프로브가 해당 문명을 조사하면서, 프로브가 이전에 관찰한 적이 없는 방식으로 변화하기 시작했습니다. 이 과정의 끝에는 그들에 대한 아무것도 남지 않았지만, 빈 행성과 하나의 조화로운 노래가 남았습니다: \n\"무엇이 있었던 것은, 있을 것입니다."
 mem_ceaseless.120.a:0 "잘못된 것이 분명합니다."
 mem_ceaseless.115.title:0 "우주 해골선"
 mem_ceaseless.115.desc:0 "거의 놓칠 뻔한 초기 스캔에서 우리는 또 다른 탐사선을 발견했습니다. 그러나 이 탐사선, 54T로 지정된 이 탐사선은 변화한 것 같습니다. 다른 잔해의 표면에 부착되어 있으며, 일부는 녹아 있는 것처럼 보입니다. 그리고 이것이 유일한 탐사선이 아닙니다. 흥미롭게도, 주요 잔해는 우리 탐사선과 다른 물질을 천천히 흡수하면서 스스로를 재생하는 것 같습니다."
 mem_ceaseless.115.a:0 "모든 것을 재활용합니다."
 mem_ceaseless.110.title:0 "어둠 속의 감시자"
 mem_ceaseless.110.desc:0 "처음에 우리는 외관상 거의 온전한 이 탐사선에 대해 큰 기대를 걸었지만, 자세히 살펴보니 91K 탐사선에서 남은 가치 있는 것은 많지 않았습니다.\n\n데이터베이스는 완전히 지워졌고, 항법 기록은 삭제되었으며, 고가의 전자 장비는 제거되었습니다. 그러나 모든 것이 사라진 것은 아니었습니다. 누군가 내부 선체에 다음과 같은 비문을 남겼습니다:\n\n"우리는 당신을 보고 있습니다. 다시 시도하지 마십시오"\n\n우리가 감시당하고 있는 것일까요?"
 mem_ceaseless.110.a:0 "이상한 외계인."
 mem_ceaseless.110.b:0 "걱정하지 마세요."
 mem_ceaseless.105.title:0 "폐기된 존재"
 mem_ceaseless.105.desc:0 "이전 스캔에서는 프로브 7R이 파괴된 것으로 나타났습니다. 그러나 최신 스캔에서는 발사된 총알이 없었고 프로브가 단순히 조각으로 찢겨졌다는 사실이 드러났습니다.\n\n남아 있는 의문은, 어떻게 그런 거대한 선박이 몇 초 만에 찢어질 수 있었는가입니다..."
 mem_ceaseless.105.a:0 "로그를 분석하세요!"
 mem_ceaseless.105.b:0 "그것이 무엇이었든, 그것은 오래 전에 떠났습니다."
 mem_ceaseless.100.title:0 "호기심이 탐사선을 죽였다"
 mem_ceaseless.100.desc:0 "이 시스템에는 희미한 엔진 신호만 남아 있습니다. 탐사선 12L이 여기로 지나가면서 몇 개의 항성을 조사하고 갑자기 떠났습니다.\n\n어디로 갔는지는 불분명하지만, 그에게 중요하게 여겨졌던 것 같습니다. 불행히도, 우리는 그 흔적을 찾을 수 없습니다."
 mem_ceaseless_probe1:0 "탐사선 프로브 안테나"
 mem_ceaseless_probe1_desc_short:0 "무한 응시 클래스 탐사의 안테나가 파손되었습니다."
 mem_ceaseless_probe1_desc_details:0 "수리할 수 없는 손상은 없지만, 원래 목적에는 더 이상 사용되지 않습니다."
 mem_ceaseless_probe2:0 "탐사선 프로브 코어 매트릭스"
 mem_ceaseless_probe2_desc_short:0 "무한 응시 클래스 탐사의 매트릭스 코어입니다."
 mem_ceaseless_probe2_desc_details:0 "우리 은하에 대한 유용한 통찰을 제공하는 블랙 박스 역할을 했습니다."
 mem_ceaseless_probe3:0 "조사선 프로브 용접 잔해"
 mem_ceaseless_probe3_desc_short:0 "버려진 금속 조각에 불과하지만, 감정적인 가치는 있습니다."
 mem_ceaseless_probe3_desc_details:0 "과도하게 야망이 큰 탐사선의 잔해가 이제는 고철 더미로 용접되어 있습니다."
 mem_ceaseless_probe4:0 "과다 성장한 탐사 드론"
 mem_ceaseless_probe4_desc_short:0 "무언가의 우주 식물로 덮인 끊임없는 응시 클래스 탐사의 빈 껍데기."
 mem_ceaseless_probe4_desc_details:0 "우주를 탐험하는 용감한 탐사선에 대한 이야기를 여전히 들려줍니다."
 mem_ceaseless_probe5:0 "광란의 탐사 드론 코어"
 mem_ceaseless_probe5_desc_short:0 "제작자에게 위협이 되는 존재를 제거하려고 이 탐사선은 프로그래밍에 따라 행동했습니다."
 mem_ceaseless_probe5_desc_details:0 "불행히도, 중립화하려던 위협은 예상보다 더 강력한 것으로 드러났습니다. 이 코어는 그 잔해에서 추출되었습니다."
 mem_surveyor_is_sentinel:0 "센티넬 프로토콜"
 tech_mem_ancestors_grudge_pls_never_roll_this:0 "보이지 않아야 합니다."
 tech_mem_ancestors_grudge_pls_never_roll_this_desc:0 "보이지 않아야 합니다."
