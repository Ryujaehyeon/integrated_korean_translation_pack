l_korean:
 mem_splinter_colony_category:0 "시간 유동"
 mem_splinter_colony_category_desc:0 "주변의 에너지 수치가 불규칙하게 변동하며, 이는 여러 시간 왜곡에 의해 발생한 것으로 보입니다."
 mem_splinter_colony.1.name:0 "연락 두절"
 mem_splinter_colony.1.desc:0 "[root.GetName](이)가 [from.GetName]에서의 시간 이상에 대한 조사 결과를 전송하던 중 갑자기 모든 연락이 끊겼습니다. \n\n처음에는 사소한 기계 오작동으로 추정했지만, 이제는 더 심각한 원인이 있을 가능성이 크다고 보입니다. 해당 선박은 우리 장거리 센서에도 감지되지 않고, 통신 또한 불가능한 상태입니다. \n\n이들의 수색 및 구조를 위한 임무가 시작되었습니다."
 mem_splinter_colony.1.a:0 "그들을 찾아내라."
 MEM_SPLINTER_COLONY_PROJECT:0 "수색"
 MEM_SPLINTER_COLONY_PROJECT_DESC:0 "우리의 과학선 중 하나가 실종되었습니다. 마지막으로 알려진 위치의 지역을 철저히 스캔하면 그 행방을 찾을 수 있기를 바랍니다."
 mem_splinter_colony.3.name:0 "[root.GetSpeciesAdj] 식민지!?"
 mem_splinter_colony.3.desc:0 "그녀가 도착했을 때, [fromfrom.GetName]와 그녀의 승무원은 실종된 과학 탐사선이 연구하고 있던 시간적 이상 현상의 흔적을 감지할 수 없었습니다. 그러나 수색 작전에서 [mem_splinter_colony.GetName]에 작은 식민지가 발견되었습니다. 이전 조사에서 전혀 발견되지 않았던 것보다 더 기이한 것은 그 주민들이었습니다. 그들은 [root.GetSpeciesNamePlural]입니다!\n\n연락을 설정한 후, 우리의 수색 팀은 이 식민지가 수백 년 전에 추락한 항성선의 생존자들에 의해 설립된 것으로 보인다는 사실을 알게 되었습니다 - 모든 증거에 따르면, 분명히 우리의 실종된 과학 탐사선입니다. 그들은 [root.GetName]의 일원이 되고 싶다는 의사를 표현했습니다. 그들에게는 조상들의 전설을 통해서만 알려진 전설적인 국가입니다."
 mem_splinter_colony.3.a:0 "예상치 못했던 재회로군."
 mem_splinter_colony.4.name:0 "잘못된 시간여행"
 mem_splinter_colony.4.desc:0 "그녀가 도착했을 때, [fromfrom.GetName]와 그녀의 승무원은 실종된 과학 탐사선이 연구하고 있던 시간적 이상 현상의 흔적을 감지할 수 없었습니다. 긴 수색 끝에, 잃어버린 과학 탐사선은 마침내 [mem_splinter_colony.GetName]에 추락한 채 발견되었습니다. 그러나 처음에는 고대처럼 보였던 추락 지점은 나중에 수세기 전으로 거슬러 올라가는 것으로 밝혀졌습니다.\n\n회수된 선박의 데이터 코어는 그 선박과 승무원에게 무슨 일이 있었는지를 밝혀냈습니다. 마지막 전송 중, 과학 탐사선이 이전에 연구하도록 지시받았던 이상 현상 중 하나가 급격히 확장되어, 회피 조치를 취하기도 전에 선박을 붙잡고 그 직후 강제로 다시 내보냈습니다. 심각하게 손상된 상태로, [mem_splinter_colony.GetName]를 향해 떠내려가다가 추락하였고, 이후 우리의 수색 팀이 그것을 발견하게 되었습니다. 데이터에 따르면, 승무원들이 이를 방지할 수 있는 방법은 없었습니다."
 mem_splinter_colony.4.a:0 "고이 잠들기를."
 mem_splinter_colony.4.b:0 "알겠다."
 mem_splinter_colony.5.name:0 "시간 여행자"
 mem_splinter_colony.5.desc:0 "그녀가 도착했을 때, [fromfrom.GetName]와 그녀의 승무원은 실종된 과학 탐사선이 연구하고 있던 시간적 이상 현상의 흔적을 감지할 수 없었습니다. 긴 시간 동안의 실패한 수색 끝에, 우리 팀은 작전을 종료할 준비를 하고 있었을 때, 실종된 과학 탐사선의 마지막으로 알려진 위치에서 발생한 갑작스러운 에너지 급증이 감지되었습니다.\n\n엔진이 손상되고 작동이 중지된 상태에서 이미 잃어버린 것으로 생각되던 선박이 다시 나타났습니다. 다행히도, 수색 팀은 여전히 그곳에 있어 손상을 수리할 수 있었습니다. 승무원들에게는 마지막 전송을 보낸 이후 거의 시간이 지나지 않았습니다.\n\n그들에 따르면, 그들의 선박은 그들이 연구하고 있던 갑자기 확장된 이상 현상 중 하나에 휘말렸습니다. 짧지만 거친 항해 끝에 그들은 튕겨져 나왔고, 다음 순간 구조자들에게 인사받아 놀랐습니다."
 mem_splinter_colony.5.a:0 "기이한 현상이군."
 mem_splinter_colony.6.name:0 "잃은 것과 찾은 것"
 mem_splinter_colony.6.desc:0 "그녀가 도착했을 때 [fromfrom.GetName]와 그녀의 승무원은 실종된 과학 탐사선이 연구하고 있던 시간적 이상 현상의 흔적을 감지할 수 없었습니다. 그러나 수색 작전에서 [mem_splinter_colony.GetName]에 여러 개의 임시 거주지가 발견되었습니다. 이들이 이전 조사에서 발견되지 않았다는 사실보다 더 기이한 것은 그 거주자들이었습니다. 그들은 [root.GetSpeciesNamePlural]입니다!\n\n연락을 취한 후 우리 수색 팀은 그 거주자들이 여러 세대 전에 이 행성에 고립된 탐사 임무의 과학자 승무원들의 후손이라는 것을 알게 되었습니다. 그들의 우주선이 사실상 우리의 실종된 과학 탐사선이라는 것은 분명합니다.\n\n[mem_splinter_colony.GetName]의 가혹하고 비우호적인 조건에도 불구하고 생존자들은 잔해를 활용하여 그들의 첫 번째 거주지를 만들며 견뎌냈습니다. 시간이 지나면서 그들의 공동체는 인구가 증가하기도 했습니다.\n\n그럼에도 불구하고 그곳의 생활 조건은 결코 양호하지 않으며, [capital_scope.GetName]로 그들을 수송하겠다는 우리 수색 팀의 제안은 환영받았습니다."
 mem_splinter_colony.6.a:0 "\"집\"에 잘 왔다."
 mem_splinter_colony.6.a.tooltip:0 "§G2§! £pop£ §HPOP§!을 §Y[capital_scope.GetName]§!(으)로 이송합니다."
