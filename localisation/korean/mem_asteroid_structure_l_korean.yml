l_korean:
 mem_asteroid_structure_category:0 "소행성 네트워크 구조물"
 mem_asteroid_structure_category_desc:0 "우리 과학선이 소행성 표면에 인공적인 것으로 보이는 이상한 구조물을 발견했습니다. 아마도 조사할 가치가 있어 보입니다."
 mem_asteroid_structure.11.name:0 "소행성 충돌"
 mem_asteroid_structure.11.desc:0 "이 구조는 소행성 표면의 모양이 변형된 것일 뿐입니다. 분명히 지난 몇백만 년 동안의 소행성이 충돌하여 생긴 결과일 것입니다. 이 성계에서 소행성 충돌은 드물지만, 딱히 주목할 만한 것은 아닙니다."
 mem_asteroid_structure.11.a:0 "아. 그래."
 mem_asteroid_structure.10.name:0 "소행성 무기"
 mem_asteroid_structure.10.desc:0 "인공 구조물은 소행성의 한쪽 면에서만 발견됩니다. 우리의 추측으로는 이것이 정교하게 숨겨진 엔진의 네트워크일 가능성이 높습니다. 제한된 추진력을 발휘할 수 있지만, 전통적인 항성 간 추진 방법의 감지 가능한 배출 없이 이처럼 큰 물체를 오랜 시간 동안 목적지로 유도하는 데 완벽한 것으로 보입니다. 레이더와 중력 측정 데이터는 또한 소행성의 핵이 자연 형성물이라면 있어야 할 밀도보다 훨씬 더 밀도가 높다는 것을 밝혀냈습니다.\n\n우리의 작업 이론은 이것이 행성, 위성 또는 대형 기지를 목표로 한 무기였으며, 겉보기에는 길을 잃은 소행성처럼 보이도록 위장되었다는 것입니다. 목표에 충돌한 후에야 목표된 운동 에너지 살상 장치로서의 본성이 드러날 것입니다. 원래의 핵이 텅스텐과 다른 중금속으로 교체되었기 때문에, 전체 세계를 거주 불가능하게 만들 수 있는 충분한 질량을 가지고 있었을 것입니다. 그 존재와 연료 포드가 비어 있다는 사실은 목표를 놓쳤음을 암시합니다. 이 행성 파괴 무기의 엔진에 대한 연구는 몇 가지 흥미로운 세부 사항을 밝혀냈습니다."
 mem_asteroid_structure.10.a:0 "나중에 이런 무기에 당하지 않도록 조심해야겠군."
