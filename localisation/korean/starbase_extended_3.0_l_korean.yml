 BATTERY_STARBASE_SECTION:0 "중형 스테이션"
 LARGE_STARBASE_SECTION:0 "대형 배터리 구역"
 EXTRA_LARGE_STARBASE_SECTION:0 "초대형 배터리 구역"
 TITANIC_STARBASE_SECTION:0 "타이타닉 배터리 구역"
 MISSILE_STARBASE_SECTION:0 "미사일 스테이션"
 HANGAR_STARBASE_SECTION:0 "격납고 스테이션"
 PD_STARBASE_SECTION:0 "거점방호 스테이션"
 sm_orbital_ring_shield_module:0 "궤도 고리 보호막 생성기"
 sm_orbital_ring_shield_module_desc:0 "궤도 고리에 보호막 모듈 1개를 추가합니다.\n§R최대 수용량: 모듈 4개.§!"
