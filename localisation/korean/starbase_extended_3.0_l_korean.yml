 sm_shield_module:0 "보호막 생성기 모듈"
 sm_shield_module_desc:0 "스타베이스에 보호막을 추가합니다.\n§R최대 4개의 보호막 모듈 용량.§!"
 sm_armor_module:0 "증가장갑 모듈"
 sm_armor_module_desc:0 "스타베이스에 더 많은 장갑을 추가합니다.\n§R최대 용량 4개의 장갑 모듈.§!"
 sm_pd_battery:0 "거점방호 모듈"
 sm_pd_battery_desc:0 "스타베이스에 1점 방어 포대를 추가합니다.\n§R최대 용량 5 PD 포대.§!"
 sm_gun_battery:0 "중형 포대"
 sm_gun_battery_desc:0 "스타베이스에 중형 포대 1개를 추가합니다.\n§R최대 용량 10개의 포대.§!"
 sm_large_battery:0 "대형 배터리"
 sm_large_battery_desc:0 "스타베이스에 대형 배터리 1개를 추가합니다.\n§R최대 용량 5개 배터리.§!"
 sm_xl_battery:0 "초대형 포대 모듈"
 sm_xl_battery_desc:0 "스타베이스에 초대형 배터리 1개를 추가합니다.\n§R최대 용량 5개 배터리.§!"
 sm_titanic_battery:0 "타이타닉 배터리"
 sm_titanic_battery_desc:0 "스타베이스에 거대 무기 배터리 1개를 추가합니다.\n§R최대 용량 2개 배터리.§!"
 sm_hangar_bay:0 "수납 격납고"
 sm_hangar_bay_desc:0 "스타베이스에 격납고 1개를 추가합니다.\n§R최대 용량 5개의 격납고입니다.§!"
 sm_missile_battery:0 "어뢰 발사기"
 sm_missile_battery_desc:0 "스타베이스에 어뢰 발사기를 1개 추가합니다.\n§R최대 용량 5개 발사기.§!"
 sm_trader_bay:0 "식량 시장 구획"
 sm_trader_bay_desc:0 "성계의 식량 상업을 개선하는 시장 구획을 건설합니다."
 sm_adv_space_engineers:0 "고급 우주 공병"
 sm_adv_space_engineers_desc:0 "항성기지 건물과 모듈을 더 빠르게 더 많이 건설하도록 돕는 고급 우주 공병을 모집합니다.\n"
 sm_asteroid_mining:0 "소행성 채굴 팀"
 sm_asteroid_mining_desc:0 "작업 팀을 발사하여 시스템 내에서 광산 기지의 표적이 되기에는 너무 작은 소행성을 채굴합니다. §GAsteroid Mining Experts§!가 있으면 §Y2 Minerals§! £minerals£의 생산량이 향상됩니다.\n"
 sm_mining_experts:0 "소행성 채굴 전문가"
 sm_mining_experts_desc:0 "소행성 채굴을 돕는 전문가를 모집하여 모든 소행성 채굴 팀의 생산량을 향상시킵니다. 모든 §GAsteroid Mining Team§!의 생산량을 §Y2 Minerals§! £minerals£ 만큼 향상시킵니다.\n"
 sm_reinforced_defenses:0 "강화된 항성기지 방어 지휘소"
 sm_reinforced_defenses_desc:0 "스타베이스의 보호막과 갑옷을 개선합니다.\n"
 sm_strategic_defenses:0 "항성기지 전략방어 지휘소"
 sm_strategic_defenses_desc:0 "스타베이스의 보호막과 무기를 개선합니다.\n"
 sm_adv_starbase:0 "고급 항성기지 방어"
 sm_adv_starbase_desc:0 "항성기지의 장갑과 무기를 개선합니다.\n"
 sm_orbital_lab:0 "궤도 연구소"
 sm_orbital_lab_desc:0 "궤도에 있는 연구소입니다. §G지원 연구소§!가 있으면 연구 생산성이 향상됩니다.\n"
 sm_energy_collector:0 "에너지 수집기"
 sm_energy_collector_desc:0 "항성에서 에너지를 수집하는 특수 모듈입니다.\n"
 sm_orbital_physics_support_lab:0 "물리학 보조 연구 모듈"
 sm_orbital_physics_support_lab_desc:0 "물리학 분야의 연구를 향상시키는 지원 연구소입니다. 모든 §G궤도 연구소§!의 결과물을 §Y2 물리학 연구§!만큼 향상시킵니다.\n"
 sm_orbital_society_support_lab:0 "사회학 보조 연구 모듈"
 sm_orbital_society_support_lab_desc:0 "사회 분야의 연구를 향상시키는 지원 연구소입니다. 모든 §G궤도 연구소§!의 생산량을 §Y2 사회 연구§!만큼 향상시킵니다.\n"
 sm_orbital_engineering_support_lab:0 "공학 보조 연구 모듈"
 sm_orbital_engineering_support_lab_desc:0 "공학 분야의 연구를 향상시키는 지원 연구소입니다. 모든 §G궤도 연구소§!의 산출량을 §Y2 공학 연구§!만큼 향상시킵니다.\n"
 sm_navy_expert_sector:0 "해군 전문가 구역"
 sm_navy_expert_sector_desc:0 "함선, 방어 플랫폼, 모듈을 더 낮은 비용으로 건조합니다.\n"
 sm_adv_assembly_yard:0 "고급 조립장"
 sm_adv_assembly_yard_desc:0 "해군 생산을 개선합니다.\n"
 sm_experienced_crews:0 "숙련 승무원 구역"
 sm_experienced_crews_desc:0 "각 전투 후 획득하는 경험치를 증가시킵니다.\n"
 sm_navy_veteran:0 "해군 베테랑 구역"
 sm_navy_veteran_desc:0 "이 성계에서 건조되는 함선의 효율을 증가시킵니다.\n"
 sm_advanced_military_program:0 "고급 군사 프로그램"
 sm_advanced_military_program_desc:0 "성계 내 신규 지상군 모집 속도를 개선합니다.\n"
 sm_space_power_plant:0 "궤도 발전소"
 sm_space_power_plant_desc:0 "항성기지 주변 궤도에 있는 에너지 생산 발전소입니다.\n"
 sm_repair_module:0 "수리 플랫폼"
 sm_repair_module_desc:0 "스타베이스 주변에 수리 플랫폼을 추가하여 빠른 선박 유지보수 및 수리를 수행합니다.\n"
 sm_tile_blocker_cleaner:0 "타일 장애물 제거팀"
 sm_tile_blocker_cleaner_desc:0 "성계에 행성 타일 장애물 제거 전문팀을 배치합니다.\n"
 sm_space_foundry:0 "우주 주조 시설"
 sm_space_foundry_desc:0 "우주 주조소는 광물을 합금으로 정제합니다. §G체인 제조§!를 보유하면 출력이 §Y1 합금§! £alloys£만큼 향상됩니다.\n"
 sm_space_factory:0 "우주 산업 시설"
 sm_space_factory_desc:0 "우주 공장은 광물을 소비재로 정제합니다. §G체인 제조§!를 보유하면 §Y2 소비재§! £consumer_goods£의 생산량이 향상됩니다.\n"
 sm_security_branch_office:0 "보안 모듈"
 sm_security_branch_office_desc:0 "보안 지사 사무소는 지역 해적에 대한 무역 경로의 방어에 집중할 것입니다."
 sm_administration_office:0 "행정 모듈"
 sm_administration_office_desc:0 "행정 사무소는 국가의 행정 용량을 증가시킬 수 있는 특별한 항성기지 건물입니다."
 sm_synthetic_crystal_fabricator:0 "인공 희귀 크리스탈 변환기"
 sm_synthetic_crystal_fabricator_desc:0 "우주에서의 특별한 조건 덕분에 광물을 희귀한 결정으로 변환합니다."
 sm_synthetic_volatile_motes_fabricator:0 "인공 불안정 분말 변환기"
 sm_synthetic_volatile_motes_fabricator_desc:0 "우주에서의 특별한 조건 덕분에 광물을 휘발성 모터로 변환합니다."
 sm_synthetic_gase_fabricator:0 "인공 외계 가스 변환기"
 sm_synthetic_gase_fabricator_desc:0 "우주에서의 특별한 조건 덕분에 광물을 이국적인 가스로 변환합니다."
 sm_orbital_assembly:0 "궤도 조립 시설"
 sm_orbital_assembly_desc:0 "항성기지에서 로봇 인구를 제작하고 성계의 식민지로 이전합니다."
 sm_chain_manufacturing:0 "연쇄 제조"
 sm_chain_manufacturing_desc:0 "우주와 행성에서 합금과 소비재의 생산에 도움이 됩니다. 모든 §G우주 주조소§!의 생산량을 §Y1 합금§! £alloys£과 §G우주 공장§!의 생산량을 §Y2 소비재§! £consumer_goods£로 향상시킵니다.\n"
 sm_construction_planificator:0 "건설 계획 장치"
 sm_construction_planificator_desc:0 "성계 행성의 건물, 지구, 프로젝트 건설을 가속하기 위한 건설 도식을 작성합니다."
 sm_financial_space_center:0 "우주 금융 센터"
 sm_financial_space_center_desc:0 "금융 전문가들의 도움으로 성계의 무역 가치를 증가시킵니다."
 sm_terraforming_module:0 "테라포밍 구역"
 sm_terraforming_module_desc:0 "성계 내 현지 식민지의 거주 적합도를 높이기 위해 테라포밍 팀을 파견합니다."
 sm_stasis_chambers:0 "정지 챔버"
 sm_stasis_chambers_desc:0 "성계 내 현지 인구의 성장을 증가시킵니다."
 sm_emergency_portal:0 "비상 포털"
 sm_emergency_portal_desc:0 "비상 점프 상황에서 생존 가능성을 높이기 위해 모든 해군 조종사가 좌표를 기록해 둔 비상 포털입니다."
 sm_starbase_optimal_systems:0 "항성기지 최적화 시스템"
 sm_starbase_optimal_systems_desc:0 "항성기지를 훨씬 더 효율적으로 만드는 항성기지 시스템의 최고 기술입니다."
 sm_market_computers:0 "궤도 기관"
 sm_market_computers_desc:0 "성계의 식민지 개발을 돕는 궤도 기관입니다."
 sm_stellar_housing:0 "항성 주거 시설"
 sm_stellar_housing_desc:0 "성계 내 식민지 인구를 약간 증가시키기 위해 식민지 주변에 궤도 주거 시설을 배치합니다."
 sm_administration_computers:0 "행정 컴퓨터"
 sm_administration_computers_desc:0 "식민지의 주요 업무 관리를 돕는 자동 프로토콜을 배치하여 안정도를 증가시킵니다."
 sm_research_computers:0 "연구 컴퓨터"
 sm_research_computers_desc:0 "식민지 주변 궤도에 연구 기지를 배치하여 더 많은 연구원 직업을 만들 수 있게 합니다."
 sm_ship_disruptor:0 "함선 교란기"
 sm_ship_disruptor_desc:0 "적 함선의 효율을 낮추도록 설계된 특수 교란기입니다."
 sm_ship_amplifier:0 "함선 증폭기"
 sm_ship_amplifier_desc:0 "아군 함선의 효율을 높이도록 설계된 특수 장치입니다."
 sm_corvette_assembly_yard:0 "초계함 자동 조립장"
 sm_corvette_assembly_yard_desc:0 "초계함 건조에 특화된 자동 조립장입니다. 자동 조립장은 한 종류만 보유할 수 있습니다."
 sm_destroyer_assembly_yard:0 "구축함 자동 조립장"
 sm_destroyer_assembly_yard_desc:0 "구축함 건조에 특화된 자동 조립장입니다. 자동 조립장은 한 종류만 보유할 수 있습니다."
 sm_cruiser_assembly_yard:0 "순양함 자동 조립장"
 sm_cruiser_assembly_yard_desc:0 "순양함 건조에 특화된 자동 조립장입니다. 자동 조립장은 한 종류만 보유할 수 있습니다."
 sm_battleship_assembly_yard:0 "전함 자동 조립장"
 sm_battleship_assembly_yard_desc:0 "전함 건조에 특화된 자동 조립장입니다. 자동 조립장은 한 종류만 보유할 수 있습니다."
 sm_crew_formation_modules:0 "승무원 양성 모듈"
 sm_crew_formation_modules_desc:0 "새 항성기지 승무원의 심화 양성에 집중하는 항성기지 특수 구역입니다. 이들은 우리 영토에 배치되어 다른 항성기지의 유지보수를 개선합니다."
 tech_starbase_6:0 "항성보루"
 tech_starbase_6_desc:0 "항성보루는 강력하고 고도로 발전된 시스템을 가진 방어 스테이션입니다."
 TECH_UNLOCK_STRONGHOLD_CONSTRUCTION_TITLE:0 "§H항성기지 업그레이드:§! 항성성새"
 TECH_UNLOCK_STRONGHOLD_CONSTRUCTION_DESC:0 "§H항성성새§!\n함대가 점점 더 크고 강력해짐에 따라, 우리의 항성기지와 방어 시설도 강해져야 할 필요가 있었습니다. 항성성새는 고도의 기술력이 집약된 성계 방어 시설이며, 기존의 항성성채에서 대대적인 개수를 거쳤습니다. 이곳에선 다량의 시설을 지원할 수 있습니다."
 tech_starbase_7:0 "항성보루"
 tech_starbase_7_desc:0 "항성기지의 최종 강화형인 항성보루는 궁극의 지휘 및 방어 거점입니다. 적의 함대를 가장 앞에서 막아설 방파제이며, 제국의 가장 중요한 자산이고, 은하계의 가장 중요한 곳을 방어합니다."
 TECH_UNLOCK_HEADQUARTERS_CONSTRUCTION_TITLE:0 "§H항성기지 업그레이드:§! 항성보루"
 TECH_UNLOCK_HEADQUARTERS_CONSTRUCTION_DESC:0 "§H항성보루§!\n항성기지의 최종 강화형인 항성보루는 궁극의 지휘 및 방어 거점입니다. 적의 함대를 가장 앞에서 막아설 방파제이며, 제국의 가장 중요한 자산이고, 은하계의 가장 중요한 곳을 방어합니다."
 POINT_DEFENCE_STARBASE:0 "자동화된 방어 시스템"
 POINT_DEFENCE_STARBASE_DESC:0 "자동화된 방어 시스템"
 PERDITION_BEAM_STARBASE:0 "원자상 분해기"
 PERDITION_BEAM_STARBASE_DESC:0 "적들을 원자로 분해해 버리는 무기입니다."
 XL_BEAM_STARBASE:0 "편광 전자 변조기"
 XL_BEAM_STARBASE_DESC:0 "원자상 분해기의 두배 정도의 화력에 차지하는 공간은 절반 정도인 무기입니다."
 CITADEL_DARK_MATTER_REACTOR:0 "암흑 물질 반응로"
 CITADEL_DARK_MATTER_REACTOR_DESC:0 "암흑 물질 반응로"
