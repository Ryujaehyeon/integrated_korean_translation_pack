l_korean:
 mem_descended_catchphrase:0 "너와 나... 우리는 좋은 시간을 보낼 거야. 그런 기분이 들어."
 mem_descended_backstory:0 "신황제 네오카다무스 불사의 존재, 그의 이름을 이어받은 첫 번째, 토랄로니안 제국의 통치자, 은하의 상승하는 주님, 보이지 않는 하늘의 주권자, 고대와 선구자의 왕, 별들의 주님이자 영역의 보호자...\n\n그가 상승하기 전의 이전 생에서는 그렇게 불렸습니다. 이제 이 목록은 더욱 길어졌고... 그의 자존심은 더욱 커졌습니다."
 leader_trait_legendary_mem_descended_ascendant:0 "전설적인 후계자"
 leader_trait_legendary_mem_descended_ascendant_desc:0 "이전에 상승한 존재로, 불투명한 상황에 의해 필멸의 영역에 머물게 되었습니다. 다시 상승하려는 야망 속에서, 그는 자신의 지휘 아래 있는 이들을 더욱 위대한 성취로 이끌고 있습니다."
 leader_trait_legendary_mem_descended_aspect:0 "Aspect"
 leader_trait_legendary_mem_descended_aspect_desc:0 "네오카다무스의 승천 이후 남겨진 화신입니다. 그는 여전히 주 의식과 느슨하게 연결되어 있지만, 화신에 나타난 것은 그 의식의 일부에 불과하여 예전의 힘을 갖추고 있지 않습니다. 여전히 강력하지만, 전체의 그림자에 불과합니다."
 mem_descended_colorful_sky:0 "다채로운 하늘"
 mem_descended_colorful_sky_desc:0 "하늘이 다양한 색조로 나타나는 매혹적인 현상입니다. 이를 관찰하는 모두에게 진정 효과를 줍니다. 그 결과, 우리 인구의 근무 윤리에 긍정적인 영향을 미쳐 식민지의 생산 효율성이 상승했습니다."
 mem_descended_celebrations:0 "제국 전체 축제"
 mem_descended_celebrations_desc:0 "우리 제국에서 사는 것에 사람들은 행복해합니다."
 mem_descended_lowered_output:0 "생산량 감소"
 mem_descended_lowered_output_desc:0 "우리 인구가 지도자를 기리는 축하 행사에 너무 몰두하고 있어 생산량이 급감했습니다."
 mem_descended_his_likeness:0 "그의 형상"
 mem_descended_his_likeness_desc:0 "이 세계의 한 반구는 상승한 존재의 형상으로 재구성되어 후세와 그의 위엄을 나누고 있습니다."
 mem_descended_recently_recruited:0 "최근 모집된 신앙 전사"
 mem_descended_recently_shield_boosted:0 "네오카다무스의 축복을 받았습니다."
 mem_d_ascension_throne:0 "승천의 왕좌"
 mem_d_ascension_throne_desc:0 "제국 전역의 수많은 자발적인 존재들로부터 에너지를 모으고 집중시키는 데 사용되는 장치로, 완전히 충전되면 더 높은 존재의 차원으로의 상승을 가능하게 한다고 전해진다..."
 mem_d_ascension_throne_after:0 "승천의 왕좌"
 mem_d_ascension_throne_after_desc:0 "전설의 존재가 더 높은 존재의 차원에 도달하기 위해 사용했던 장치입니다. 이후에는 준종교적 순례의 장소가 되었습니다."
 MEM_DESCENDED_AUDIENCE_PROJECT:0 "초대장"
 MEM_DESCENDED_AUDIENCE_PROJECT_DESC:0 "우리는 빛나는 불꽃 항성계의 원시 문명의 통치자에게 초대를 받았습니다. 그들이 우리와 연락을 취하거나 우리의 존재를 인식할 수 있는 능력을 갖추었다는 사실은 조사를 진행할 충분한 이유가 됩니다. 우리는 대표단을 파견하고 그들의 제안을 수락하여 더 많은 정보를 알아내야 합니다."
 MEM_DESCENDED_MEETING_PROJECT:0 "청중 요청"
 MEM_DESCENDED_MEETING_PROJECT_DESC:0 "논의할 사항이 있다면, 공식 회의를 마련할 수 있습니다."
 mem_descended_chain_title:0 "네오카다무스의 재승천"
 mem_descended_chain_desc:0 "네오카다무스가 더 높은 존재의 차원에서 자신의 위치를 되찾기 위해서는 우리 문명의 전체 집단 의지가 필요합니다. 이 목표를 달성하기 위해서는 헤아릴 수 없는 양의 정신 에너지가 요구됩니다.\n\n다행히도 이를 위해 우리 인구가 정신적으로 재능이 있을 필요는 없습니다. 우리 문명 자체의 단결이 그 힘을 제공할 것이며, 따라서 단결을 주요 생산물로 하는 모든 전문직이나 통치자 직업이 이 과정에 기여할 것입니다."
 mem_descended_ascension_progress:0 "승천 진행"
 mem_descended_ascension_complete:0 "승천 완료"
 mem_descended_antics:0 "숙련의 장난"
 mem_descended.1.name:0 "중력 이상현상"
 mem_descended.1.desc:0 "§Y[from.GetName] 항성계§!에 진입할 때, 우리 승무원들은 기이한 광경을 맞이합니다. 시공간의 균열이 항성계를 가로지르며 우리의 감지기의 정확성을 제한하고 있습니다. 이전에 단일 별과 몇 개의 행성으로 추정되었던 것은 사실상 주 별을 동반한 훨씬 더 작고 거의 보이지 않는 갈색 왜성이 있는 이중 항성계이며, 그 궤도를 도는 행성들은 예외 없이 불길한 구름층에 가려져 있습니다.\n\n그러나 기이함은 여기서 끝나지 않으며, 우리의 관측에 따르면 중심의 중력은 [from.GetName]가 아니라 행성입니다. 이 행성은 실제로 거주 가능할 뿐만 아니라, 겉보기에는 원시적인 문명이 거주하고 있습니다. 이곳의 모든 것은 적어도 그 행성을 중심으로 돌아갑니다.\n\n이 모든 것이 어떻게 가능한지는 이미 우리 전문가들 사이에서 뜨거운 논쟁의 주제가 되고 있습니다. 그러나 그들이 모두 동의하는 한 가지는 그 기원이 의심할 여지 없이 인공이라는 점입니다."
 mem_descended.2.desc:0 "균열 근처에서 탐지된 함대가 우리에게 신호를 보내고 있습니다. 그 구성은 지금까지 우리가 접한 어떤 설계와도 다릅니다. 그들은 우리의 위치로 접근하기 시작했으며, 아마도 탈출 경로를 차단하기 위함일 것입니다."
 mem_descended.3.desc:0 "...우리는 형체가 없고... 무색으로 만들어졌으며... 악마는 대가를 치를 것이다... 하지만 먼저 우리는 당신을 연회할 것이다..."
 mem_descended.3.a:0 "우리는 평화를 위해 왔습니다."
 mem_descended.3.a.response:0 "...우리는..."
 mem_descended.3.b:0 "무생물"을 귀하의 목록에 추가할 것을 제안할 수 있습니다."
 mem_descended.3.b.response:0 "...당신의 대담함이... 당신을 구하지는 못할 것입니다..."
 mem_descended.5.name:0 "초대"
 mem_descended.5.desc:0 "우리는 미지의 공격자를 처치한 직후 원시 세계에서 발신된 신호를 수신했습니다. 원시인들이 우리의 존재를 어떻게 알았는지, 더 나아가 우리와 소통할 수 있었는지는 불확실하지만, 지금 바로 그런 일이 일어나고 있습니다. 더욱 신비로운 것은 메시지가 우리의 언어로 작성되어 있으며, 그들의 통치자와의 면담을 초대하고 있다는 점입니다."
 mem_descended.6.name:0 "청중"
 mem_descended.6.desc:0 "§L표면에 도착하자, 우리의 대표단은 소수의 [mem_descended_native_species.GetName] 원주민들과 마주칩니다. 그들 중 한 명이 앞으로 나서 이 겸손한 환영 위원회의 리더임을 알리며, 다른 이들은 호기심 어린 눈빛으로 새로운 방문자들을 바라봅니다. 간단한 인사 후, 우리의 대표단은 그들의 다른 기본적인 건축물에 비해 꽤 화려하고 어울리지 않는 궁전으로 안내됩니다.\n\n입구 홀에서, 안내자는 연설을 시작합니다:§!\n\n여러분은 곧 황금의 존재, 다채로운 존재, 신제국의 불멸자 네오카다무스, 그의 이름의 첫 번째, 토랄로니아 제국의 통치자, 은하의 상승하는 군주, 보이지 않는 하늘의 주권자, 고대와 선구자의 왕, 별의 군주이자 영역의 보호자를 만나게 될 것입니다...\n\n§L잠시의 정적 동안, 이 많은 칭호의 끝을 바라는 희망이 피어나지만, 그것은 오래가지 못합니다. [mem_descended_native_species.GetName]은 잠깐의 숨을 쉬고 나서 무자비하게 이 기대를 무너뜨리며 그의 통치자의 칭호와 주장된 업적을 또 다른 고통스러운 한 시간 반 동안 계속해서 잘 훈련된 듯 하지만 건조하게 낭독합니다...\n\n마침내 고통을 끝내고 눈에 띄게 지친 그는 다시 대표단에게 말합니다:§!\n\n이제 여러분은 우리 군주를 직접 만나기 위해 내실로 들어갈 수 있습니다."
 mem_descended.6.a:0 "앞으로 나아갑시다."
 mem_descended.7.desc:0 "§L대표단 앞에는 독특한 금색을 가진 원주율 하나가 그들의 도착을 기다리고 있습니다.§!\n\n아... 정말 멋진 모습입니다. 너무 단조롭고, 감정이 전혀 없는 모습이 정말 경이롭습니다. 솔직히 말하자면, 그들은 생명이 걸린 상황에서도 미소 하나 지을 수 없을 겁니다. 하지만 그들은 충성스럽고 근면한 일꾼입니다, 그 점은 인정해야 합니다.\n\n처음 그들을 발견했을 때, 그들은 허름한 동굴에서 살고 있었고, 사라져가는 별 주위를 도는 죽어가는 세계에서 멸종의 위기에 처해 있었습니다. 지금 그들을 보세요, 따뜻한 태양 아래의 천국 같은 세계에서 살고 있네요... 조금 덜 허름한 오두막에서요. 네, 알죠, 아직 진행 중입니다. 어떤 변화는 그들에게 더 쉽게 다가옵니다. 하지만 그건 제 얘기가 아닙니다...\n\n§L그는 손짓으로 자신을 가리키며 손님들에게 한 걸음 더 다가갑니다.§!\n\n들으셨겠지만, 저는 네오카다무스입니다... 네오-카다-무스, 기억해 주시겠어요? 제 이름을 잘못 발음한 마지막 사람은 지금 진정한 그늘의 표면에 있습니다 - 이 행성의 위성입니다, 모르셨다면요... 기술적으로 이 시스템의 모든 것이 이 행성의 위성이지만, 심지어 태양도요... 하지만 세부사항은... 세부사항은...\n\n제가 친구라고 부르는 이들에게는, 차다로 충분할 것입니다. 그리고 당신과 저는 정말 빠른 친구가 될 것 같은 기분이 듭니다."
 mem_descended.7.a:0 "당신은 원주율이 아니군요?"
 mem_descended.8.name:0 "테스트"
 mem_descended.8.desc_01:0 "§HA 눈부신 빛의 섬광이 순간적으로 홀 전체를 가득 채웁니다. 빛이 가라앉자, 황금색 Krrr'tek은 사라지고 그 자리에 이전에 만났던 것과 유사한 순수한 에너지의 존재가 서 있습니다.§!\n\n네, 당신이 맞습니다. 이 허세를 끝냅시다..."
 mem_descended.8.desc_02:0 "§H그가 대답할 때 당신은 약간의 초조함을 감지합니다§!\n\n원하시는 대로, 무엇을 알고 싶으신가요?"
 mem_descended.8.a:0 "이것이 당신의 진정한 모습입니까?"
 mem_descended.8.a.response:0 "이것이 나의 자연스러운 상태라고 할 수 있지만, 나는 내가 원하는 어떤 형태로든 변할 수 있습니다."
 mem_descended.8.b:0 "당신은 어디에서 왔습니까?"
 mem_descended.8.b.response:0 "원래 이 은하에서 왔습니다, 믿거나 말거나요. 하지만 최근에는 저의 "친구들"과 마찬가지로 타 차원 존재의 공간에서 왔습니다. \n\n그건 그렇고, 그에 대해 감사드립니다. 그들을 저지하는 것은 제 에너지 저장고에 큰 부담이었습니다."
 mem_descended.8.c:0 "이 시스템을 생성하셨습니까?"
 mem_descended.8.c.response:0 "오, 안타깝지만 저는 여기저기에서 몇 가지 부수적인 프로젝트를 진행하면서 대규모 개조 작업을 했다고 말할 수 있습니다."
 mem_descended.8.d:0 "무색이 왜 이곳을 포위했을까요?"
 mem_descended.8.d.response:0 "글쎄요... 그들은 정말 지기 싫어하는 사람들이라고 할 수 있습니다. 더 높은 차원에서도 "먹거나 먹히거나"이니, 저는 그들의 자원을 무한리필 뷔페처럼 여기고 더 자격 있는 주체인 저에게 에너지를 쏟았습니다.\n\n그러니까, 제발 저를 그렇게 판단하지 마세요. 그들이 당신의 종족을 똑같이 대하는 걸 보셨잖아요. 그러니 그들에게도 이 정도는 당연하다고 생각합니다."
 mem_descended.8.e:0 "우리가 당신에게 무엇을 원하나요?"
 mem_descended.8.f:0 "제안에 관하여..."
 mem_descended.9.desc_01:0 "솔직히 말하자면, 나는 당신의 에너지가 필요합니다. 그렇게 쳐다보지 마세요... 나는 이 다른 자들처럼 야만인이 아닙니다...\n\n나는 상위 평면에서 내 위치를 되찾고 유지할 계획이지만, 다시 상승하기 위해서는 제국의 양에 해당하는... 더 나은 표현이 없으니 영적 에너지라고 부르겠습니다. 이는 전체 인구가 공통의 목표로 단결하고 하나로 일할 때 방출되므로, 정신적으로 재능 있는 개인이 필요하지 않습니다. 따라서 이는 무기물이나 합성체 생명체와도 작동할 수 있습니다.\n\n대신, 나는 내 전문 지식과 상승이 성공한 후 지속적인 지원을 약속합니다. 선한 행동은 보상을 받아야 하지 않겠습니까?\n\n어떻게 생각하십니까? 이 거래에는 단점이 없습니다. 내 신하들도 당신의 제국에 합류할 것입니다. 당신은 반드시 이길 수 있습니다.\n\n§H그가 당신의 대답을 기다리며, 그의 눈은 이전보다 조금 더 밝게 빛나기 시작합니다...§!"
 mem_descended.9.desc_02:0 "그래서, 어떻게 생각하십니까? 제 노력을 지지해 주시겠습니까?\n\n§H그의 눈빛이 다시 강렬해지는 것을 볼 수 있습니다...§!"
 mem_descended.9.a:0 "...먼저 다른 질문을 해도 될까요?"
 mem_descended.9.b:0 "아니요, 우리는 그렇지 않습니다."
 mem_descended.10.desc:0 "알겠습니다. 그럼 이 대화를 계속할 의미가 없군요. 떠나셔도 좋지만, 당신과 당신의 민족을 위해 천 년의 기회를 낭비했다는 것을 명심하시기 바랍니다."
 mem_descended.10.a:0 "잠깐만요, 다시 생각해보니 우리가 실수를 했습니다..."
 mem_descended.11.name:0 "승천의 끝"
 mem_descended.11.desc:0 "차원 균열 근처의 §Y[mem_descended_system.GetName] 시스템§!에 있는 우리의 센서 기지에서 대규모 함대가 우리의 영역으로 진입하고 있다는 소식을 전해왔습니다. 이번에는 통신이 없었습니다. 전투는 이미 시작되었습니다."
 mem_descended.12.name:0 "두 번째는 매력이다"
 mem_descended.12.desc:0 "아, 사랑하는 [root.GetRulerTitle], 지금 당신이 꽤 바쁘다는 것을 알고 있지만, 제가 그곳에서 당신을 도와줄 수 있을지도 모릅니다.\n\n여러분이 친절하게 팔을 들어 에너지를 저에게 보내주실 수 있을까요?... 아, 농담입니다.\n\n§L그가 얼굴에 미소를 띠고 손을 들어 손가락을 튕깁니다...\n\n무색의 배들이 아이가 장난감을 던지듯이 균열 속으로 던져집니다. 그 뒤로 균열이 닫히고 전투는 끝납니다.§!\n\n이 일이 처리되었으니, 여기서 할 일이 하나 남았습니다.\n\n하지만 당신과 당신의 사람들은 저에게 잘해주셨습니다. 그래서 아무것도 없이 당신을 그냥 두는 것은 무례할 것입니다. 제가 작은 선물을 남겨드리겠습니다, 그래서 제가 없더라도 외롭지 않으실 겁니다.\n\n§L그렇게 말하자, 그는 점점 더 강렬하게 빛나기 시작합니다. 그 빛은 곧 모든 것을 압도하고, 참을 수 없을 정도가 되자 갑자기 멈춥니다. 끝난 건가요? 네오카다무스가 서 있던 자리에는 이제... 그는 여전히 거기 있습니다!?§!\n\n\"음, 그의 계획이 의도한 대로 진행된 것 같군요. 안녕하세요, 사랑하는 [root.GetRulerTitle], 만나서 반갑습니다. 그렇게 놀라지 마세요, 그가 당신에게 말했죠, 그렇죠? 그는 저를 당신의 고난을 지원하기 위해 남겨두었습니다. 저는 그의 측면, 아바타입니다, 원하신다면요. 그 자신만큼 강력하지는 않지만, 제가 일을 해낼 것임을 확신합니다."
 mem_descended.12.a:0 "당신을 만나서 기쁩니다."
 mem_descended.50.name:0 "함대가 접근합니다"
 mem_descended.50.desc:0 "함대가 §Y[mem_descended_system.GetName] 항성계§!로 점프했습니다. 통신이 들어오고 있습니다."
 mem_descended.51.name:0 "신념의 군대 도착"
 mem_descended.51.desc_01:0 "§L낯선 이는 우리에게 말을 걸기 전에 여러 가지 신비로운 제스처를 취합니다.§!\n\n우리는 그의 귀환을 알게 되었고, 조상들처럼 그의 자발적인 도구로서 상승하는 주님 아래에서 봉사할 의향이 있습니다.\n\n그의 이름이 찬양받기를!"
 mem_descended.51.desc_02:0 "안개가 우리에게 기쁜 소식을 가져다주었습니다. 그의 신실한 자들이 다시 그를 따를 것입니다."
 mem_descended.51.desc_03:0 "우리 주님이 돌아오셨습니다. 그의 충성스러운 추종자들이 다시 그를 섬길 것입니다."
 mem_descended.51.desc_04:0 "우리는 그의 검과 방패로서 존재합니다. 우리는 그의 손에 있는 도구일 뿐입니다. 그의 통치가 영원하길 바랍니다."
 mem_descended.51.desc_05:0 "은하는 어둡고 공포로 가득 차 있습니다. 그가 그들을 물리치고 있습니다. 우리는 그의 팔과 갑옷이 될 것입니다."
 mem_descended.52.desc:0 "예상대로 §Y[mem_descended_leader.GetName]§! 그의 충성스러운 추종자들로 구성된 함대가 §Y[mem_descended_system.GetName] 시스템§!에 도착했습니다. 그들이 우리에게 신호를 보내고 있습니다."
 mem_descended.60.name:0 "침공"
 mem_descended.60.desc:0 "무색 선박의 또 다른 세력이 §Y[mem_descended_system.GetName] 시스템§!의 차원 균열을 떠났습니다. 우리는 전송을 받고 있습니다."
 mem_descended.61.desc_01:0 "...악마는 대가를 치를 것이다... 너는 그를 섬기고... 너도 멸망할 것이다..."
 mem_descended.61.desc_02:0 "...악마의 자식들이 사방에... 우리는 너를 연회로 삼을 것이다..."
 mem_descended.61.desc_03:0 "...우리는 연회를 열 것이고... 당신은 멸망할 것입니다..."
 mem_descended.61.desc_04:0 "...악마에게 항복하고... 죽어라..."
 mem_descended.61.desc_05:0 "...당신은 모르고 있습니다... 당신이 누구와... 동맹을 맺었는지..."
 mem_descended.61.a:0 "우리를 이길 수 없습니다!"
 mem_descended.61.a.response:0 "...die..."
 mem_descended.101.name:0 "그의 형상 안에서"
 mem_descended.101.desc:0 "우리는 §Y[mem_descended_flavor_system.GetName] 시스템§!에서 이상한 사건에 대한 보고를 받았습니다.\n\n[mem_descended_flavor_planet.GetPlanetMoon] §Y[mem_descended_flavor_planet.GetName]§!의 반구 중 하나가 익숙한 얼굴을 닮도록 변형되었습니다...\n\n이 문제에 대해 질문을 받은 §Y[mem_descended_leader.GetName]§!는 그의 재등극 이후 후세를 위해 자신의 위엄을 기록하는 것의 중요성을 강조했습니다. 그는 창작 과정 중에 다양한 자원 매장지를 발견했다고 언급하지만, 자신의 "예술작품"을 손상시키지 않도록 조심스럽게 발굴해 달라고 요청합니다."
 mem_descended.102.name:0 "제국 전체 축제"
 mem_descended.102.desc:0 "제국 전역의 식민지 행정 기관들은 소수의 [root.GetSpeciesNamePlural]가 모이는 곳마다 자발적인 축제가 발생하면서 생산성이 거의 붕괴되었다고 보고합니다. 만약 이런 상황이 계속된다면, 우리의 경제는 완전히 무너질 수 있습니다.\n\n전혀 걱정하지 않는 §Y[mem_descended_leader.GetName]§!는 이 사람들이 스트레스를 풀 필요가 있다고 언급하며, 그들이 즐길 수 있는 시간을 마련했습니다. 그의 말에 따르면, 이 상황은 두 달 이상 지속되지 않을 것이며, 장기적으로는 더 나은 생산량을 가져올 가능성이 높습니다."
 mem_descended.102.a:0 "이 춤추는 전염병은 전염성이 있나요?!"
 mem_descended.103.name:0 "신비로운 구조물"
 mem_descended.103.desc:0 "광적인 활동의 소용돌이 속에서 §Y[mem_descended_leader.GetName]§!는 자신의 "작은 애완 프로젝트" 중 하나에 자원을 쏟기 시작했습니다. 며칠 만에 §Y[mem_descended_flavor_planet.GetName]§!의 표면 위에 아직 알려지지 않은 목적의 건물이 세워지기 시작했습니다.\n\n그가 작업을 마쳤을 때, [mem_descended_leader.GetName]는 다음과 같이 언급했습니다: §T"여기 당신을 위한 작은 것이 있습니다. 현재 연구보다 꽤 앞설 수 있지만, 아마도 문제 없이 작동할 수 있을 것입니다..."§!"
 mem_descended.104.name:0 "저 너머의 통찰"
 mem_descended.104.desc:0 "신비로운 L-게이트를 연구하려는 우리의 시도에 §Y[mem_descended_leader.GetName]§!가 끼어들며 말했습니다: §T"그냥 이렇게 하면 돼..."§!\n\n[root.GetSpeciesAdj] [root.GetScientistPlural]가 놀라움을 금치 못하며 지켜보는 가운데, 그는 그들의 작업에 몇 가지 겉보기에는 간단하지만 사실은 깊은 의미를 지닌 수정을 가하여, 순식간에 그들의 연구를 수년 앞당겼습니다."
 mem_descended.105.name:0 "격렬한 폭풍"
 mem_descended.105.desc:0 "우리 식민지 행정기관인 §Y[mem_descended_flavor_planet.GetName]§!에서 비정상적인 기상 활동을 보고했습니다. 여러 개의 슈퍼셀들이 형성되어 행성 표면을 강풍으로 휩쓸고 있으며, 그 속도는 정상적인 기준을 훨씬 초과합니다. 이러한 조건을 염두에 두고 설계되지 않은 우리의 인프라는 엄청난 피해를 입었습니다.\n\n이 사건의 원인을 파악하는 데 오랜 시간이 걸리지 않았습니다. [mem_descended_flavor_planet.GetName]가 발전소 세계인 §Y[mem_descended_leader.GetName]§!는 자신의 에너지 출력을 영구적으로 증가시키기로 결정하며, 사과하지 않는 듯한 발언을 했습니다: §T"오믈렛을 만들려면 몇 개의 달걀을 깨야 하죠. 이 말이 당신 문명에서 유행하는 표현인가요? 아니라면, 적어도 그래야 할 것입니다..."§!"
 mem_descended.105.a:0 "다음 번에는 최소한 경고를 주시기 바랍니다."
 mem_descended.106.name:0 "외계의 하늘"
 mem_descended.106.desc:0 "§Y[mem_descended_flavor_planet.GetName]§!의 주민들은 오늘 하늘을 올려다보았을 때 혼란스러웠습니다. 하늘의 일반적인 색깔이 다양한 색조로 대체되었기 때문입니다. 이 시각적 장관은 모두가 일을 멈추고 현상을 지켜보는 바람에 생산성이 잠시 저하되는 결과를 초래했습니다.\n\n현재 질서는 회복되었지만, 이 사건의 주범으로 보이는 §Y[mem_descended_leader.GetName]§!에 따르면 다채로운 하늘은 조금 더 오래 지속될 가능성이 높습니다."
 mem_descended.107.name:0 "반응로 과부하"
 mem_descended.107.desc:0 "우리의 항성 기지 중 하나의 에너지 출력을 의도된 한계를 훨씬 넘어가도록 하려는 시도에서, 여러 안전 시스템이 연쇄적인 고장에 직면하여 기지가 완전히 파괴되는 참사를 초래했습니다.\n\n§Y[mem_descended_leader.GetName]'§!의 신속한 대응 덕분에 전체 승무원이 안전하게 대피했음에도 불구하고, 이 사건의 원인이 보조 냉각 시스템 중 하나의 이전에 감지되지 않은 구조적 약점이라는 그의 반복적인 보장에도 불구하고, 이러한 종류의 실험은 무기한 연기되었습니다. 전체 항성 기지를 잃는 것은 결코 간과할 수 없는 일입니다."
 mem_descended.107.a:0 "그 항성 기지는 건설하는 데 수년이 걸렸습니다..."
 mem_descended.108.name:0 "예상치 못한 초신성"
 mem_descended.108.desc:0 "우리의 과학자들은 §Y[mem_descended_flavor_system.GetName] 시스템§!이 별의 초신성 폭발로 파괴되었다는 보고를 받고 충격을 받았습니다. 다행히 그곳에는 자동화된 시설만 있었고 인명 피해는 발생하지 않았습니다. 왜 이런 일이 발생했는지는 처음에 우리의 전문가들을 당황하게 했지만, 곧 그 이유가 밝혀졌습니다.\n\n조금 실망한 듯한 §Y[mem_descended_leader.GetName]§!는 이 문제에 대해 다음과 같이 언급했습니다: §T"아, 만약 잘 진행되었다면 정말 멋졌을 텐데. 하지만, 아쉽게도 우리는 낙담하지 말아야 합니다. 우리는 실수를 하지 않아요, 그저 행복한 작은 사고들일 뿐입니다... 그리고 그 시스템은 이제 나름의 매력이 있습니다. 아마 그 특이점을 좀 더 자세히 살펴보는 것이 좋을 것입니다.\n\n그 일에 대해 속상할 필요는 없죠, 그렇죠? 지나간 일은 지나간 일입니다, 모든 별먼지는 초공간 아래에 있지 않습니까? 당신이 단 하나의 태양계를 폭파시키면 어떤 사람들은 영원히 그에 대해 불평할 것입니다... 당신은 그런 사람이 아니죠? 그곳에 중요한 것은 없었죠?"§!"
 mem_descended.108.a:0 "잠깐... 그 일이 이전에 일어난 적이 있나요?!"
 mem_descended.109.name:0 "어두운 욕망"
 mem_descended.109.desc:0 "§Y[mem_descended_leader.GetName]§!는 오늘 일반 참모 회의에 참석하여 §Y[root.GetRulerTitle] [ruler.GetName]§!에게 직접 말했습니다: §T"안녕하세요, 사랑하는 [root.GetRulerTitle]님. 오늘은 꽤 관대하게 느끼고 있습니다. 그 작은 사고로 인해 획득한 암흑 물질 저장소를 기억하시죠? 하지만 그 옛날 이야기는 꺼내지 말죠. 어쨌든 이 물자는 다양한 응용 가능성을 가지고 있습니다. 저는 당신의 [root.GetScientistPlural]를 올바른 방향으로 밀어줄 수 있을지도 모릅니다. 나머지는 그들에게 달려 있습니다. 만약 제가 그냥 당신에게 주어버린다면 자부심과 성취감은 어디에 있겠습니까, 맞죠?\n\n당신의 선택을 하세요."§!"
 mem_descended.109.a:0 "우리는 §Y방어막§!에 관심이 있습니다."
 mem_descended.109.b:0 "우리는 §Y반응로§!에 관심이 있습니다."
 mem_descended.109.c:0 "우리는 §Y추진§!에 관심이 있습니다."
 mem_descended.109.d:0 "우리는 §Ysensors§!에 관심이 있습니다."
 mem_descended.109.e:0 "우리는 §Y투명 장치§!에 관심이 있습니다."
 mem_descended.110.name:0 "우연한 이종 간 호환성"
 mem_descended.110.desc:0 "우리의 식민지 개척 노력을 위해 보다 적응력이 뛰어난 농업 동물을 만들기 위한 노력의 일환으로, 우리의 [root.GetScientistPlural]는 §Y[mem_descended_leader.GetName]§!의 도움을 받았습니다. 그들의 작업 결과는 정말 놀라웠지만, 알고 보니 너무 성공적이었습니다. 테스트 샘플 중 하나가 구속에서 탈출하여 회수 시도가 실패한 후 실종된 것으로 보고되었습니다.\n\n아무도 예상하지 못했던 것은 그것이 자신의 종과 다른 종과 번식할 수 있는 능력이었습니다. 처음에는 시야가 좋지 않아 혼동된 사례로 치부되었던 미지의 생물체와 기형 변종의 목격이 우리 식민지 외곽에서 점점 더 빈번해지고 있습니다.\n\n목격이 가장 많이 발생한 지역은 예방 조치로 차단되었지만, 이 상황이 더 악화되는 것은 시간 문제일 가능성이 높습니다."
 mem_descended.111.name:0 "완벽한 애완동물"
 mem_descended.111.desc:0 "§Y[mem_descended_leader.GetName]'§! 최근의 부수 프로젝트 중 하나가 드디어 결실을 맺은 것 같습니다. 그와 함께 작은 귀여운 생물이 회의실에 들어왔습니다. 그의 말에 따르면, 그의 목표는 그가 한때 소중히 여겼던 생물을 재현하는 것이었지만, 결과는 부분적인 실패였습니다.\n\n그럼에도 불구하고 이 생물은 꽤 특이한 속성을 가지고 있습니다. 참석한 모두가 당황한 가운데, 아무도 그 생물의 세부 사항을 같은 방식으로 설명하지 않았습니다. 유일한 공통된 합의는 그들이 본 것 중 가장 귀여운 생물이라는 사실이었습니다. 일부는 그것이 본능적인 자기 방어의 형태로 다른 이들의 인식을 수정할 수 있는 내재된 사이오닉 능력을 가질 가능성에 대해 이론을 세웠습니다.\n\n이 호기심 많은 속성 외에도 이 생물은 유순한 애완동물처럼 행동합니다. 회의 중에 그 생물은 §Y[mem_descended_flavor_target_leader.GetName]§!에게 특별한 애착을 보였고, 이후 그 생물을 돌보겠다고 요청했습니다. 해당 제안에 아무런 문제가 없다고 판단한 [mem_descended_leader.GetName]는 동의했지만, [mem_descended_flavor_target_leader.GetHimHer]와 [mem_descended_flavor_target_leader.GetHisHer]의 새로운 동반자에게 불길하지만 엄중한 경고를 남겼습니다: §T"물은 주지 마세요. 자정 이후에는 먹이를 주지 마세요. 왜 그런지 묻지 않는 게 좋습니다. 그냥 하지 마세요, 저를 믿으세요."§!"
 mem_descended.112.name:0 "청소의 날"
 mem_descended.112.desc:0 "두 개의 새로운 행성이 §Y[mem_descended_flavor_system.GetName] 시스템§!에 갑자기 나타났습니다. 두 행성 모두 §Y[mem_descended_flavor_planet.GetName]§!와 같은 궤도를 공유하고 있습니다. 그러나 이 사건으로 인한 혼란은 오래가지 않았습니다. 곧 §Y[mem_descended_leader.GetName]§!가 그의 개입을 드러냈기 때문입니다: §T"보시다시피, 제 작은 시스템 개조의 잔여물을 정리할 시간이었습니다. 제가 그들을 당신의 이웃으로 옮긴 것에 불만이 없으시길 바랍니다. 그들이 적절히 오염 제거되었고 어떤 위협도 되지 않는다는 것을 보장합니다. 제 말을 믿으세요. 어쩌면 당신의 목표를 위해 그들을 재활용할 수도 있을 것입니다?"§!"
 mem_descended.113.name:0 "완벽한 혼란"
 mem_descended.113.desc:0 "최근 §Y[mem_descended_flavor_planet.GetName]§!는 이상한 변화가 있었습니다. 공중에 떠 있는 동물들이 거꾸로 날아다니고, 일부 육상의 동물들이 지면 위에 떠 있는 모습이 관찰되었습니다. 어둠 속에서 빛나고 신비로운 소리를 내는 식물에 대한 보고가 이 상황을 더욱 완벽하게 만들어 줍니다.\n\n누가 책임인지에 대해서는 의심의 여지가 없었습니다. 이상한 관찰에 대해 질문을 받자, §Y[mem_descended_leader.GetName]§!는 대답했습니다: §T"글쎄요, 저는 여기서 다이아몬드를 발견하고 몇 가지 조정을 해서 완벽하게 만들었습니다. 그리고, 이봐요... 그냥 잘 작동해요!\n\n네, 예상치 못한 부작용이 있었을 수도 있습니다... 하지만 몇 달만 더 주시면, 아마도 해결할 수 있을 겁니다..."§!"
 mem_descended.114.name:0 "순례와 해적질"
 mem_descended.114.desc:0 "§Y[mem_descended_flavor_system.GetName] 시스템§!은 §Y[mem_descended_leader.GetName]§!가 그 중 하나의 행성에 흔적을 남긴 이후 여행이 다소 증가했습니다.\n\n불행히도 순례자들의 행렬이 독수리들의 주목을 끌었습니다. 해적들이 점점 더 노골적으로 행동하고 있으며, 우리의 무역로를 위협하고 있습니다. §Y[mem_descended_leader.GetName]§!는 이러한 신성모독으로 여겨지는 상황에 불쾌해하며 우리의 개입을 요청했습니다."
 mem_descended.115.name:0 "이단 기계"
 mem_descended.115.desc:0 "§Y[mem_descended_flavor_system.GetName] 시스템§!은 시간이 지남에 따라 우리의 의식의 통합 중심점이 되었습니다. 이는 §Y[mem_descended_leader.GetName]§!이 그 중 하나의 행성에 흔적을 남겼기 때문이지만, 이 효과의 정확한 이유는 불분명합니다.\n\n하지만 최근 이곳의 평화는 출처가 불분명한 자동 드론 함대의 채굴 작업으로 인해 방해받고 있습니다. 그들의 작업은 §Y[mem_descended_leader.GetName]'§!의 모습에 위협이 되고 있으며, 이에 따라 그는 이들을 이단으로 선언하고 중립화를 요구하고 있습니다."
 mem_descended.300.name:0 "회의"
 mem_descended.300.desc_01:0 "아, 안녕하세요, 사랑하는 [root.GetRulerTitle]님. 오늘 무엇을 도와드릴까요?"
 mem_descended.300.desc_02:0 "원하시는 다른 것이 있습니까?"
 mem_descended.300.a:0 "원하는 대로 외모를 바꿀 수 있습니까?"
 mem_descended.300.b:0 "신념 군단에 대해 무엇을 말씀해 주실 수 있습니까?"
 mem_descended.300.c:0 "이전 질문을 몇 가지 반복해도 될까요?"
 mem_descended.300.d:0 "무색에 대해 무엇을 말씀해 주실 수 있습니까?"
 mem_descended.301.desc:0 "확실히 가능합니다. 제 작은 묘기를 또 한 번 보시겠습니까? 특별히 원하시는 것이 있으신가요?"
 mem_descended.301.a:0 "§Y골든 크르르텍§!로 변신할 수 있습니까?"
 mem_descended.301.a.response:0 "당신의 호기심은 충족되었습니까, 아니면 다른 것을 보고 싶으신가요? 그렇지 않다면, 저는 잠시 이렇게 있을 생각입니다."
 mem_descended.301.b:0 "원래의 모습으로 돌아갈 수 있습니까?"
 mem_descended.301.c:0 "승천하기 전 당신은 어떻게 보였습니까?"
 mem_descended.301.c.response:0 "오, 사랑하는 [root.GetRulerTitle], 당신은 정말 호기심이 많군요, 그렇죠? 하지만 제가 당신을 기쁘게 해줄 수 있을지도 모르겠습니다...\n\n§LA 빛의 섬광이 그와 그의 주변을 눈부신 빛의 바다 속으로 사라지게 합니다. 그것이 가라앉으면, 낯선 존재의轮郭이 드러납니다.§!\n\n오, 이건 추억을 되살리네요... 제가 감상적이 될지도 모르겠습니다."
 mem_descended.301.d:0 "놀라게 해줄 수 있나요?"
 mem_descended.301.e:0 "§Y휴머노이드§! 할 수 있습니까!?"
 mem_descended.301.f:0 "§Ymammalian§! 할 수 있습니까!?"
 mem_descended.301.g:0 "§Y파충류§! 할 수 있습니까?"
 mem_descended.301.h:0 "§Yavian§!를 할 수 있습니까?"
 mem_descended.301.i:0 "§Yarthropoid§를 할 수 있습니까§!?"
 mem_descended.301.j:0 "§Ymolluscoid§를 할 수 있습니까§!?"
 mem_descended.301.k:0 "§Y균류§!를 할 수 있습니까?"
 mem_descended.301.l:0 "§Y플란토이드§! 할 수 있습니까?"
 mem_descended.301.m:0 "§Ylithoid§를 할 수 있습니까§!?"
 mem_descended.301.n:0 "§Ynecroid§!를 할 수 있습니까?"
 mem_descended.301.o:0 "§Yaquatic§! 할 수 있습니까?"
 mem_descended.301.p:0 "§Y톡소이드§! 할 수 있습니까!?"
 mem_descended.301.q:0 "§Y로봇§! 할 수 있습니까!?"
 mem_descended.301.r:0 "좀 더 위엄 있는 것은 어떻습니까?"
 mem_descended.301.r.response:0 "이 모습이 당신의 마음에 더 드나요, 나의 사랑 [root.GetRulerTitle]? 그렇다면, 저는 잠시 이렇게 지내겠습니다."
 mem_descended.301.z:0 "당신은 우리 중 한 명처럼 보이게 할 수 있습니까?"
 mem_descended.302.desc:0 "음, 그건 긴 이야기입니다... 간단히 말하자면, 그들은 제가 첫 번째 승천하기 전의 신하들의 후손입니다.\n\n제 대의에 대한 자원 기여가 있다면, 그들 중 일부를 당신의 하인으로 설득할 수 있을 것입니다..."
 mem_descended.302.a:0 "그들은 어디서 온 것입니까? 우리는 그들에 대해 들어본 적이 없습니다."
 mem_descended.302.a.response:0 "은하계는 초공간으로 연결된 몇몇 항성계 이상입니다. 과거 우리는 별들 사이를 자유롭게 이동했습니다... 그리고 지금도 그렇게 하는 이들이 있습니다. 네트워크 밖에 미공개된 수도원 단체의 은둔지가 꽤 있는 것 같습니다. 그들은 제 귀환을 기다리고 있었던 것인데 - 계획된 일은 아니었지만, 어쨌든... 여기까지 왔습니다."
 mem_descended.302.b:0 "우리는 그들의 함대 중 하나를 고용하고 싶습니다."
 mem_descended.302.b.response:0 "원하시는 대로 하겠습니다. 호출을 보낼 것입니다... 그들은 반 주기 이내에 도착할 것입니다."
 mem_descended.303.desc:0 "아, 왜 안 그러겠어요? 당신의 호기심을 받아들이겠습니다. 그럼 무엇을 알고 싶으신가요?"
 mem_descended.303.a:0 "당신의 에너지 형태가 당신의 진정한 모습입니까?"
 mem_descended.303.a.response:0 "자연 상태라고 할 수 있지만, 내가 원하는 어떤 형태로든 변할 수 있습니다."
 mem_descended.304.desc:0 "그들은 상승한 존재들의 집단입니다. 하지만 당신이 아직 눈치채지 못했다면, 저처럼 대인 관계에 능숙하지는 않습니다.\n\n그들은 기술을 사용하며, 이를 통해 차원 간 여행을 하고 하위 종족에게 끔찍한 일을 저지르는 데 의존합니다. 하지만 이 주제에 대해 너무 깊이 들어가지 맙시다. 기분이 나빠질 뿐입니다."
 mem_descended.304.a:0 "그들과 싸우는 방법에 대한 조언을 해주실 수 있습니까?"
 mem_descended.304.a.response:0 "당신이 관찰했듯이, 그들의 함선은 공격과 방어 모두에서 에너지 기반 기술에 전적으로 의존하고 있습니다. 제 생각에는 치명적인 결함입니다. 그러나 그들의 오만함 속에서는 이를 깨닫지 못하는 것 같습니다.\n\n하지만 당신에게는 이것이 이용할 수 있는 약점입니다: 그들의 무기는 §Y보호막§!에 대해 약합니다. 그러니 방어를 여기에 집중하세요. 그리고 그들의 무기에 대해서는... 당신의 원시적인 §Y미사일§!과 §Y어뢰§!가 그들의 선체를 쉽게 무너뜨릴 것입니다. 이들은 보호막을 완전히 우회하니까요. 그들 주위의 공간을 포화시키면, 그들이 포인트 방어를 가지고 있든 상관없습니다.\n\n당신의 함대가 이에 맞게 준비된다면, 적어도 그들에 대해서는 당신의 힘을 훨씬 초과하여 싸울 수 있을 것입니다."
 mem_descended.304.b:0 "우리에게 제공할 수 있는 다른 것이 있습니까?"
 mem_descended.304.b.response:0 "내 힘에 대한 자원 기여로 귀하의 함대의 보호막을 일시적으로 개선하고 전투에서 우위를 점할 수 있게 해드리겠습니다.\n\n그 외에도, 은하 어딘가에 저의 추종자들이 있을 수 있으며, 그들을 설득하여 우리의 곤경을 도와줄 수 있을 것입니다."
 mem_descended.304.c.response:0 "내 힘에 대한 자원 기여가 modest하다면, 당신의 함대의 보호막을 일시적으로 개선하고 전투에서 우위를 점할 수 있도록 도와드리겠습니다.\n\n그 외에도, 당신의 전투를 돕기 위해 제 추종자 몇 명을 호출할 것을 제안할 수 있습니다."
 mem_descended.304.d:0 "우리의 보호막을 개선해 주십시오."
 mem_descended.304.d.response:0 "원하시는 대로, 제 축복을 드리겠습니다."
