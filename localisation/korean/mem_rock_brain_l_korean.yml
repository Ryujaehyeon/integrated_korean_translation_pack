l_korean:
 mem_rock_brain.201.title:0 "지원 요청"
 mem_rock_brain.201.desc:0 "[mem_rock_brain_planet.GetName]에서 암석-뇌를 관찰하던 연구기지에서 급한 전보를 보내왔습니다. 그 \"뇌\"가 자신을 지켜보는 우리의 존재를 알아챈 것으로 보입니다! 과학선 지원을 급하게 요청하고 있습니다!"
 mem_rock_brain.201.a:0 "빨리 과학선을 보내라!"
 mem_rock_brain.201.b:0 "생각하든 말든, 그저 바위일 뿐입니다. 우리는 더 중요한 우선사항이 있습니다."
 MEM_ROCK_BRAIN_PROJECT:0 "바위와의 대화"
 MEM_ROCK_BRAIN_PROJECT_DESC:0 "이 소행성은 이상한 광맥을 신경회로로 사용하는, 일종의 두뇌로 보입니다. 그리고 우리의 존재를 알아챈 것 같습니다. 암석에 있는 연구 스테이션이 암석과의 통신 채널을 열 수 있도록 도움을 요청하고 있습니다."
 mem_rock_brain.203.title:0 "과학, 그리고 암석"
 mem_rock_brain.203.desc:0 "우리 연구원들이 그 바위와의 통신을 성공적으로 열었습니다.\n\n그것은 우리가 이전에 본 적이 없는 형태의 지능, 즉 우리가 말로 설명하기조차 어려운 형태의 지능을 가지고 있는 것으로 보입니다. 그것은 스스로 외부에 우주가 존재한다는 사실을 인식하지 못했으며, 우리의 도착 이전에 수백만 년, 아니 수십억 년 동안 고립된 유아론 속에서 존재해왔습니다. '존재', '비존재', '공간', '운동'과 같은 개념을 이해하는 데 어려움을 겪었습니다.\n\n설명을 시도하는 과정에서, 우리 과학자 중 한 명이 기초 물리학 교과서의 복사본을 그것에 다운로드했습니다. 그것은 그 물자를 바탕으로 질문을 하기 시작했고, 그 답변을 바탕으로 추가 질문을 하면서 빠르게 현대 물리학의 경계에 도달하고 이를 넘어섰습니다.\n\n그 뇌는 우리의 과학 연구 노력에 기여하고자 하는 열망이 분명하며, 현실의 본질에 대한 독특한 관점을 가지고 있습니다. 이는 유익한 협력이 될 가능성이 높습니다."
 mem_rock_brain.203.a:0 "훌륭해."
 mem_rock_brain.204.title:0 "철학, 그리고 암석"
 mem_rock_brain.204.desc:0 "우리 연구원들은 바위와의 의사소통에 성공했습니다. 그것은 우리가 이전에 본 적이 없는 형태의 지능을 가지고 있는 것으로 보이며, 우리가 말로 설명하기조차 어려운 난이도의 지능입니다. 그것은 외부에 우주가 존재한다는 사실을 전혀 인식하지 못했으며, 우리의 도착 이전에 수백만 년, 아니 수십억 년 동안 고립된 유아론 상태로 존재해왔습니다. '존재', '비존재', '공간', '운동'과 같은 개념을 이해하는 데 어려움을 겪었습니다.\n\n설명을 시도하는 과정에서, 우리의 한 과학자가 기초 철학 교과서의 복사본을 그것에 다운로드했습니다. 그것은 물자에 대한 질문을 하기 시작했고, 그 답변을 바탕으로 추가 질문을 하면서 우리의 이해의 한계를 빠르게 넘어섰습니다.\n\n그 뇌는 분명히 우리의 사상가들과 철학에 대해 계속 이야기하고 싶어하며, 현실의 본질에 대한 독특한 관점을 가지고 있습니다. 이는 유익한 협력이 될 가능성이 높습니다."
 mem_rock_brain.204.a:0 "훌륭해."
 mem_rock_brain.205.title:0 "시, 그리고 암석"
 mem_rock_brain.205.desc:0 "우리 연구원들은 이 바위와의 소통에 성공했습니다. 이 바위는 우리가 이전에 본 것과는 다른 형태의 지능을 가진 것처럼 보이며, 우리가 말로 설명하기조차 어려운 형태의 지능입니다. 이 바위는 외부에 우주가 존재한다는 사실을 전혀 인식하지 못했으며, 우리의 도착 이전에 수백만 년, 아니 수십억 년 동안 고립된 자아에 갇혀 있었습니다. 그 시간 동안 이 바위는 시와 유사한 무언가를 작곡하는 데 많은 시간을 보냈으며, 이제 청중이 생겼으니 그것을 나누고 싶어하는 것 같습니다.\n\n그의 시는... 매혹적입니다. 경이롭습니다. 완전히, 완전히 독특합니다.\n\n이 바위의 작품은 대중의 집착의 대상이 되었으며, 이 독특한 지능과의 만남에 상당한 환호가 있습니다."
 mem_rock_brain.205.a:0 "훌륭해."
 mem_rock_brain.211.title:0 "암석의 신작 시집"
 mem_rock_brain.211.desc:0 "[mem_rock_brain_planet.GetName]의 암석이 새로운 시집을 발간하여 대중의 칭찬을 받았습니다."
 mem_rock_brain.211.a:0 "훌륭해."
 mem_rock_brain.211.b:0 "좋다. 근데 매 번 이런 보고를 굳이 할 필요는 없을 것 같군."
 mem_poetry_released:0 "시집 출판"
 mem_poetry_released_desc:0 "외계 암석의 신작 시집 출판 소식을 들은 국민들이 즐거워 합니다."
 mem_rock_brain.301.name:0 "암석 지성체의 수수께끼"
 mem_rock_brain.301.desc:0 "우리가 이른바 §Y"록 브레인"§!에 대해 처음 알게 된 이후, 소행성 §Y[From.GetName]§! 내부에 있는 사고하는 구조물은 우리의 과학자들의 마음을 사로잡았습니다.\n\n[rock_brain_leader.GetName]은 [rock_brain_leader.GetSheHe]가 [rock_brain_leader.GetSXX] 이 비밀을 밝혀낼 방법을 알고 있다고 주장하고 있지만, 이는 [rock_brain_leader.GetHerHim]가 최소한의 보호 장비로 소행성의 표면을 홀로 탐험해야 한다는 것을 의미합니다."
 mem_rock_brain.301.a:0 "허락하지."
 mem_rock_brain.301.a.tooltip:0 "[rock_brain_leader.GetName]은(는) 탐사를 준비하기 위해 떠날 것입니다. [rock_brain_leader.GetSheHe]가 [rock_brain_leader.GetSXX] 무엇을 하고 있는지 알기를 바랍니다... [rock_brain_leader.GetSheHe], [rock_brain_leader.GetIsAre]"
 mem_rock_brain.301.b:0 "안돼. 너무 위험하다."
 mem_rock_brain.302.name:0 "암석-뇌: 과학자 섭취"
 mem_rock_brain.302.desc:0 "정해진 대로, [rock_brain_leader.GetName]가 오늘 [mem_rock_brain_planet.GetName]에 특별히 편성된 셔틀을 통해 도착했습니다.\n\n[rock_brain_leader.GetSheHe]가 표면으로 나서자, 원거리 감지가 감지기에서 이전에 들어본 적 없는 수준으로 급증하는 암석 두뇌의 활동을 보여주었습니다. 이 순간, [rock_brain_leader.GetName]의 신호가 우리의 감지기에서 사라졌습니다.\n\n곧이어, 암석 두뇌의 활동은 감소하기 시작했지만, 이전에 기록된 것보다 높은 수준에서 정체되었습니다. [rock_brain_leader.GetName]의 흔적은 표면에서 발견되지 않았으며, 마치 암석 두뇌가 [rock_brain_leader.GetHimHer]를 소비한 것처럼 보였습니다."
 mem_rock_brain.302.a:0 "[rock_brain_leader.GetHerHim]을(를) 먹은게 아니길 바라지. 암석."
 mem_rock_brain.302.a.tooltip:0 "[rock_brain_leader.GetName]은(는) 실종되었습니다. 사망한 것으로 간주됩니다."
 mem_rock_brain.303.name:0 "암석-뇌: 살인 암석"
 mem_rock_brain.303.desc:0 "약속대로, [rock_brain_leader.GetName]가 오늘 특별히 편성된 셔틀을 통해 [mem_rock_brain_planet.GetName]에 도착했습니다.\n\n[rock_brain_leader.GetSheHe]가 바깥으로 나서자, 원거리 감지가 소행성의 뇌에서 활동이 증가하고 있음을 보여주었고, 갑자기 이전에 들어본 적 없는 수준으로 급증했습니다. 이 순간, [rock_brain_leader.GetName]의 신호가 우리의 감지기에서 사라졌고, 바로 [rock_brain_leader.GetSheHe]가 [rock_brain_leader.GetHisHer] 진공복의 심각한 환경 위반에 대한 구조 신호를 보냈습니다.\n\n잠시 후, 활동은 정상 수준으로 떨어졌습니다. [rock_brain_leader.GetName]의 탄화된 유해는 곧 소행성의 표면에서 회수되었습니다."
 mem_rock_brain.303.a:0 "[rock_brain_leader.GetSheHe]는 [rock_brain_leader.GetSheHe] [rock_brain_leader.GetWasWere] 무엇을 하고 있는지 몰랐던 것 같습니다..."
 mem_rock_brain.303.a.tooltip:0 "[rock_brain_leader.GetName]은(는) 죽었습니다."
 mem_rock_brain.310.name:0 "암석-뇌: 이상한 활동"
 mem_rock_brain.310.desc:0 "바위 두뇌가 어떤 종류의 신호를 송신하는 것 같습니다. \n\n더욱 이상한 점은 그 신호가 우리의 인코딩을 사용하고 있다는 것입니다."
 mem_rock_brain.311.desc:0 "들리나요? 좋아, 잘 되는군.\n\n안녕하세요. 접니다, [rock_brain_leader.GetName].\n\n아마도 제가 죽은 줄 알았겠지만, 제 말을 믿어주세요. 전 살아있습니다. 바위가 절 흡수했지만, 절 §S파괴§!하지는 않았습니다. 전 단지 변화했을 뿐입니다.\n\n전 이 지성 있는 바위와 하나가 되었습니다. 제 마음과 정신은 무한한 조화의 상태에 합류하게 된 것입니다.\n\n제가 여러분께 요구할 수 있는 유일한 것은, 저희의 일을 방해하지 말아 달라는 것입니다. 꼭 해야만 한다면 그저 우리를 관찰하시고, 원한다면 우리의 생각을 엿들을 수도 있겠습니다만, 개입은 하지 말아주시길 바랍니다."
 mem_rock_brain.311.a:0 "다행이군."
 mem_rock_brain.311.a.tooltip:0 "[rock_brain_leader.GetName]은(는) 암석의 정신 안에서 살아가게 될 것입니다. [mem_rock_brain_planet.GetName]은(는) 이제 [rock_brain_leader.GetName](이)라고 불립니다.\n\n[mem_rock_brain_planet.GetName]의 과학 산출량이 크게 증가했습니다."
 mem_rock_brain.311.b:0 "괜찮은... 건가?"
 mem_rock_brain.311.b.reponse:0 "이보다 더 좋은 적이 없었습니다. 걱정하지 마세요. 저의 현재 상태는 고통이나 두려움, 또는 여러분이 느끼는 어떤 다른 불쾌감 같은 것도 없습니다. 전 이것을 모두 두고 온 것입니다."
 mem_rock_brain.311.c:0 "널 구할 방법은 없는것인가?"
 mem_rock_brain.311.c.reponse:0 "절 구한다고요? 무엇으로부터? 또 무엇때문에?\n\n무엇을 제안할 수 있기에 그러는 거죠? 저의 옛 [rock_brain_leader.Species.GetAdj] 육체를 돌려주려고요? 저를 늙어 죽을 때 까지 아무런 목적없이 떠돌아다니는 가련한 세포 덩어리로 돌려보내시려 하십니까?\n\n아뇨. 전 이제 상상조차 할 수 없는 것들을 알게 되었습니다. §S나는§! 당신이 상상할 수 있는 것 이상의 존재이고, 당신이 개념조차 알 수 없는 것들을 생각하고 있어. 난 당신들의 도움이나 싸구려 동정 따윈 필요 없어."
 mem_rock_brain.311.d:0 "그 통찰력을 우리와 공유해줄 수 있겠나?"
 mem_rock_brain.311.d.reponse:0 "당신과 함께하나요? 아니요.\n\n당신은 제가 지금 알고 있는 것들을 상상조차 할 수 없습니다. 그것들을 이름 붙일 단어도, 이론으로 설명할 방법도 없습니다.\n\n어쩌면 언젠가 당신이 제 지혜의 아주 작은 일부를 이해할 수 있을지도 모릅니다. 그 날은 가까운 시일 내에 오지 않을 것입니다."
 mem_rock_brain_eater_of_scientists:0 "과학자 흡수자"
 mem_rock_brain_eater_of_scientists_desc:0 "지성있는 바위는 자신의 표면 위를 걷는 과학자들로부터 감각을 발달시킨 것 같습니다."
 mem_rock_brain_merged_thoughts:0 "하나된 생각"
 mem_rock_brain_merged_thoughts_desc:0 "바위의 지성이 과학자의 정신과 융합되었습니다."
