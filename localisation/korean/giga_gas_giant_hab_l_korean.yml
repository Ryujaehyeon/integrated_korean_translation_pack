 giga_gas_giant_hab:0 "거주 가능한 가스 거성"
 giga_gas_giant_hab_desc:0 "풍부한 이종 가스 덕분에 수집은 쉽지만, 행성 핵 채굴 작업 환경은 더 가혹합니다."
