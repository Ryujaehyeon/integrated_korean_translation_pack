 district_giga_gas_giant_craglands:0 "공동체의 눈"
 district_giga_gas_giant_craglands_plural:0 "공동체의 눈"
 district_giga_gas_giant_craglands_desc:0 "다양한 공생체와 그들의 구조물이 잔잔한 바람 속에서 둘러싸여 있습니다."
 district_giga_gas_giant_habitat_wind:0 "풍력 터빈 배열"
 district_giga_gas_giant_habitat_wind_plural:0 "풍력 터빈 배열"
 district_giga_gas_giant_habitat_wind_desc:0 "거대 가스 행성의 대기 속에 떠 있는 거대한 풍력 터빈 배열이 막대한 양의 에너지를 생성합니다."
 district_giga_gas_giant_habitat_wind_wilderness:0 "제피릭 포토리프트"
 district_giga_gas_giant_habitat_wind_wilderness_plural:0 "제피릭 포토리프트"
 district_giga_gas_giant_habitat_wind_wilderness_desc:0 "구름 꼭대기에서 생명이 번성하며, 바람을 타고 위아래로 이동하여 적절한 양의 햇빛을 쬐고 있습니다."
 district_giga_gas_giant_habitat_science:0 "연구소"
 district_giga_gas_giant_habitat_science_plural:0 "연구소"
 district_giga_gas_giant_habitat_science_desc:0 "이 고급 연구 시설은 최신 과학 장비와 매우 큰 인력 수용 능력을 갖추고 있습니다."
 district_giga_gas_giant_habitat_science_wilderness:0 "신경증기 매듭"
 district_giga_gas_giant_habitat_science_wilderness_plural:0 "신경증기 매듭"
 district_giga_gas_giant_habitat_science_wilderness_desc:0 "여기서 전기화학적 및 생물학적 사고의 흐름이 모여 서로 아이디어를 꽃피우며 바람의 소용돌이를 형성합니다."
 district_giga_gas_giant_habitat_exotic:0 "가스 펌핑 시설"
 district_giga_gas_giant_habitat_exotic_plural:0 "가스 펌핑 시설"
 district_giga_gas_giant_habitat_exotic_desc:0 "이 행성의 대기 속 고립된 주머니에서 가스를 추출할 수 있는 기계입니다."
