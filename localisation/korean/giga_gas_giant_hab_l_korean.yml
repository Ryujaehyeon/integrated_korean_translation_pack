l_korean:
 giga_gas_giant_home_system_NAME:0 "거대 가스 행성 고향"
 giga_gas_giant_home_system_DESC:0 "기존 모성은 파괴되고 대신 거주 가능한 거대 가스 행성 거주지에서 시작합니다"
 origin_gas_giant:0 "거대 가스 행성에서의 이륙"
 origin_gas_giant_desc:0 "이 종족은 초기 우주시기에 거대한 혜성 충돌이 충돌하면서 고향을 잃었습니다. 다행스럽게도 그들은 이미 우주에 자신의 멸종을 피할수 있을만큼 충분한 기반시설들을 가지고 있었습니다. 이에 그들이 연료 채굴에 사용하던 유별나게 잔잔한 대기권을 가진 거대 가스 행성이 그들의 주요 식민지가 되었습니다."
 origin_gas_giant_robot:0 "가스 거성 이륙"
 origin_gas_giant_robot_desc:0 "이 제국의 초기 우주 시대에 모성은 떠돌이 혜성과 충돌했습니다. 이미 일시적으로 생존할 만큼의 우주 기반 시설을 보유하고 있었기에, 가스 거성 채굴 기지가 새로운 고향이 되었습니다. 세월이 흐르며 그 가스 거성은 이들의 필요를 몇 번이고 충족시켰고, 은하 곳곳에 존재하는 다양한 가스에 대한 새로운 통찰을 가져다주었습니다. 이 제국의 발전 과정에서 이종 가스가 풍부했던 덕분에, 이러한 가스를 활용하는 향상된 산업 기술이 정제되었습니다. 다만 가장 기본적인 산업조차 이 가스에 의존하게 되었습니다."
 origin_gas_giant_effects:0 "$HOMEWORLD$ ['concept_giga_habitable_gas_giant'] (크기: £planetsize£ 16-28)$NEW_LINE$- 종족 특성:$TABBED_NEW_LINE$- ['trait:trait_giga_gas_giant_hab']$NEW_LINE$- $ADDITONAL_TECHNOLOGIES_STRING$$TABBED_NEW_LINE$- ['technology:tech_space_mining_1', £engineering_research£ $tech_space_mining_1$]$TABBED_NEW_LINE$- ['technology:tech_hydroponics', £society_research£ $tech_hydroponics$]"
 origin_gas_giant_effects_robot:0 "- $HOMEWORLD$ ['concept_giga_habitable_gas_giant'] (크기: £planetsize£ 16-28)$NEW_LINE$- 종족 특성:$TABBED_NEW_LINE$- ['trait:trait_giga_gas_giant_hab_robot']$NEW_LINE$- $ADDITONAL_TECHNOLOGIES_STRING$ ['technology:tech_space_mining_1', £engineering_research£ $tech_space_mining_1$]"
 concept_giga_habitable_gas_giant:0 "$pc_habitable_gas_giant$"
 concept_giga_habitable_gas_giant_desc:0 "$pc_habitable_gas_giant_desc$"
 concept_giga_gas_worlds:0 "가스 행성"
 concept_giga_gas_worlds_desc:0 "거주 가능한 가스 거성, 인공적으로 대기에 가스를 주입한 행성, 그리고 조금 더 거주에 적합해진 일부 유독성 행성은 \"가스 행성\"으로 분류됩니다."
 building_giga_gas_giant_habitation_module:0 "거대 가스 행성 거주 모듈"
 building_giga_gas_giant_habitation_module_desc:0 "기존의 거대 가스 행성 거주지를 유지보수하던 인구를 부양하기 위해 만들어진 필수 시설물들 입니다. 이 시설물에는 거주지에 전력을 공급하는 원자로, 주변 위성에서 수집된 광물을 하역하기 위한 도킹 베이, 수경 농장에 사용할 수있는 대형 기후 제어 격납고가 포함됩니다. 뿐만 아니라 이러한 시설물은 자원 분배 네트워크의 본부 역할을하며 지역 주민들에게 다양한 서비스를 제공합니다."
 trait_giga_gas_giant_hab:0 "이종 가스 의존"
 trait_giga_gas_giant_hab_desc:0 "§L가스 거성에서 살아가며 수 세기 동안 이종 가스에 노출된 결과, 이 종족은 일상 기능에서 어느 정도 그것에 의존하게 되었습니다.§!"
 trait_giga_gas_giant_hab_tooltip:0 "§Y과학§! 및 §Y산업§! 직업 이종 가스 유지비: §R+0.03§!\n    - ['concept_giga_gas_worlds', §YGas§!] 행성에서 주거 사용량: §G-10%§!\n    - £job_researcher£ $job_researcher$ 유지비, ['concept_giga_gas_worlds', §YGas§!] 행성: §G-10%§!\n    - ['concept_giga_gas_worlds', §YGas§!] 행성에서 직업 이종 가스 유지비: §G-33%§!\n    - 비 ['concept_giga_gas_worlds', §YGas§!] 행성에서 주거 사용량: §R+30%§!\n    - 비 ['concept_giga_gas_worlds', §YGas§!] 행성에서 거주 적합도: §R-20%§!\n    - 비 ['concept_giga_gas_worlds', §YGas§!] 행성에서 직업 이종 가스 유지비: §R+50%§!"
 trait_giga_gas_giant_hab_robot:0 "이종 가스 연료"
 trait_giga_gas_giant_hab_robot_desc:0 "§L시간이 흐르며 이루어진 작은 자기 개조들이 누적되어, 이 기계들은 연료로서 이종 가스에 거의 의존하게 되었습니다."
 trait_giga_gas_giant_hab_robot_tooltip:0 "$trait_giga_gas_giant_hab_tooltip$"
 giga_gas_giant_hab_colony_tt:0 "가스 거성 이륙 종족에게는 ['concept_giga_gas_worlds', §YGas§!] 행성으로 간주됩니다."
 giga_gas_giant_hab_colony:0 "침수된 대기"
 giga_gas_giant_hab_colony_desc:0 "여기 두꺼운 공기 조성은 가스 거대행성에서 발견되는 것과 다르지 않습니다."
 decision_giga_flood_atmosphere:0 "행성 대기 침수"
 decision_giga_flood_atmosphere_desc:0 "우리는 우리의 생물학에 맞게 대기 조성을 수정할 것입니다."
