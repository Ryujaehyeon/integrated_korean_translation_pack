 job_giga_gas_extraction_manager:0 "이종 가스 추출 관리자"
 job_giga_gas_extraction_manager_plural:0 "이종 가스 추출 관리자"
 job_giga_gas_extraction_manager_desc:0 "풍부한 대기나 다른 이종 환경 특성 덕분에, 이 행정가들은 우리의 $job_technician_plural$가 이러한 자원을 최대한 활용하도록 보장합니다."
