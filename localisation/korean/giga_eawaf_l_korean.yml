 giga_eawaf_outer_strife_field_modifier:0 "외부 갈등 필드 영향"
 giga_eawaf_outer_strife_field_modifier_desc:0 "§W이 세계는 §R[THIS.giga_eawaf_planet_strife]§! §P갈등§!을 생성하고 있습니다. Sirenalia를 위한 \n§W§P갈등§!은 §Y90 안정성§! 이하일 때만 생성됩니다. 공식은 다음과 같습니다: §!\n(§Y80 - 안정성§!) x (§Y행성 인구§!) x (§Y1§! + §Y범죄 비율§!)§!\n§W§Y안정성§!/§Y범죄§! 페널티는 Enthraller의 §M효능§! 수준에 따라 조정됩니다.§!.\n\n§L외부 갈등 필드는 이 세계의 주민들에게 영향을 미쳐 그들을 증오로 몰아가고, 이 증오를 §P갈등§!으로 전환하여 Sirenalia의 Shroudsonic Enthraller에 힘을 제공합니다. ['concept_giga_eawaf_disenchanter_buildings']을 건설하면 이를 완화하거나 심지어 무효화하는 데 도움이 될 수 있습니다.§!"
 giga_eawaf_outer_strife_field_modifier_halved:0 "외부 갈등 필드 영향"
 giga_eawaf_outer_strife_field_modifier_halved_desc:0 "§W이 세계는 Sirenalia를 위해 §R[THIS.giga_eawaf_planet_strife]§! §P갈등§!을 생성하고 있습니다.\n§W§P갈등§!은 §Y90 안정성§! 이하일 때만 생성되며, 다음 공식을 따릅니다: §!\n(§Y80 - 안정성§!) x (§Y행성 인구§!) x (§Y1§! + §Y범죄 비율§!)§!\n§W§Y안정성§!/§Y범죄§! 처벌은 Enthraller의 §M효능§! 수준에 따라 조정됩니다§!.\n효과는 §Y절반으로 줄어듭니다§! ['concept_giga_eawaf_disenchanter_building_1'].\n\n§L외부 갈등 필드는 이 세계의 주민들에게 영향을 미쳐 그들을 증오로 몰아가고, 이 증오를 §P갈등§!으로 변환하여 Sirenalia의 Shroudsonic Enthraller를 강화합니다. ['concept_giga_eawaf_disenchanter_buildings']을 건설하면 이를 완화하거나 심지어 무효화하는 데 도움이 될 수 있습니다.§!"
 giga_eawaf_outer_strife_field_modifier_quartered:0 "외부 갈등 필드 영향"
 giga_eawaf_outer_strife_field_modifier_quartered_desc:0 "§W이 세계는 §R[THIS.giga_eawaf_planet_strife]§! §P갈등§!을 생성하고 있습니다. \n§W§P갈등§!은 §Y90 안정성§! 이하일 때만 생성되며, 공식은 다음과 같습니다: §!\n(§Y80 - 안정성§!) x (§Y행성 인구§!) x (§Y1§! + §Y범죄 비율§!)§!\n§W§Y안정성§!/§Y범죄§! 처벌은 Enthraller의 §M효능§! 수준에 따라 조정됩니다.§!.\n효과는 §Y4분의 1로 줄어듭니다.§! ['concept_giga_eawaf_disenchanter_building_2'].\n\n§L외부 갈등 필드는 이 세계의 주민들에게 영향을 미쳐 그들을 증오로 몰아가고, 이 증오를 §P갈등§!으로 전환하여 Sirenalia의 Shroudsonic Enthraller를 강화합니다. ['concept_giga_eawaf_disenchanter_buildings']을 건설하면 이를 완화하거나 심지어 무효화하는 데 도움이 될 수 있습니다.§!"
 giga_sirens_spawnlater:0 "사이렌이 §G나중에§!\n선택한 생성 날짜로부터 §Y5년§! 이내에 생성되기 시작합니다. §Y보장됨§!으로 설정하면, 정확한 날짜에 생성됩니다."
 giga_sirens_spawnearlier:0 "사이렌이 §R더 일찍§!\n선택된 생성 날짜로부터 §Y5년§! 이내에 생성되기 시작합니다. §Y보장됨§!으로 설정하면, 정확한 날짜에 생성됩니다."
 giga_sirens_randomgame:0 "사이렌알리아 출현 날짜: §L무작위§!\n사이렌알리아는 무작위 시간에 출현합니다. §Y사이렌의 점령§! 상황은 §Y25년 후§! 발생하며, §Y비물질의 장막§!은 무작위 시간 후에 사라집니다.\n$sirens_spawn_warning$"
 giga_sirens_lateendgame:0 "Sirenalia 출현 날짜: §E2500§!\nSirenalia는 §Y2500§! 이후에 출현할 수 있습니다. §Y사이렌의 점령§! 상황은 §Y25년 후에§! 발생하며, §Y천상의 장막§!은 2500년까지 지속됩니다.\n$sirens_spawn_warning$"
 giga_sirens_regularendgame:0 "Sirenalia 출현 날짜: §G2450§!\nSirenalia는 §Y2450§! 이후에 출현할 수 있습니다. §Y사이렌의 점령§! 상황은 §Y25년 후에§! 발생하며, §Y에테리얼 수의§!는 2450년까지 지속됩니다.\n$sirens_spawn_warning$"
 giga_sirens_endgame:0 "사이렌알리아 출현 날짜: §Y2400§! (기본) \n사이렌알리아는 §Y2400§! 이후에 출현할 수 있습니다. §Y사이렌의 점령§! 상황은 §Y25년 후에§! 발생하며, §Y천상의 장막§!은 2400년까지 지속됩니다.\n$sirens_spawn_warning$"
 giga_sirens_latemidgame:0 "Sirenalia 출현 날짜: §H2350§!\nSirenalia는 §Y2350§! 이후에 출현할 수 있습니다. §Y사이렌의 점령§! 상황은 §Y25년 후에§! 발생하며, §Y천상의 장막§!은 2350년까지 지속됩니다.\n$sirens_spawn_warning$"
 giga_sirens_midgame:0 "Sirenalia 출현 날짜: §S2300§!\nSirenalia는 §Y2300§! 이후에 출현할 수 있습니다. §Y사이렌의 점령§! 상황은 §Y25년 후에§! 발생하며, §Y에테리얼 수의§!는 2300년까지 지속됩니다.\n$sirens_spawn_warning$"
 giga_sirens_lateearlygame:0 "Sirenalia 출현 날짜: §P2250§!\nSirenalia는 약 §Y2250§!에서 출현할 수 있습니다. §Y사이렌의 점령§! 상황은 §Y25년 후에 발생하며§! §Y에테리얼 수의 장막§!은 2250년까지 지속됩니다.\n$sirens_spawn_warning$"
 giga_sirens_earlygame:0 "사이레날리아 출현 날짜: §R게임 시작§!\n사이레날리아는 §Y게임 시작§! 근처에서 출현할 수 있습니다. §Y사이렌의 점령§! 상황이 즉시 시작되며, §Y에테리얼 장막§!은 1년 이내에 사라질 것입니다.\n$sirens_spawn_warning$"
 sirens_spawn_warning:0 "\n§Y사이렌알리아를 §G보장된§! 상태로 설정하면 사이렌알리아가 생성되도록 보장할 수 있습니다.§!\n\n§G사이렌알리아의 생성 날짜를 변경하려면 클릭하세요.§!"
 giga_eawaf_sirens_guaranteed:0 "§Y사이렌§!은 §G항상§! §Y파우스트§!를 정복하려는 시도에서 성공할 것이며, 플레이어에 의해 저지되지 않는 한 위기로 변모할 것입니다."
 giga_sirens_not_guaranteed:0 "§Y사이렌§!은 대략 §Y50%§!의 확률로 §Y파우스트§!를 장악하고 위기가 될 수 있습니다, 플레이어의 개입이 없을 경우에 한합니다."
 giga_eawaf_sirens_disabled:0 "§Y사이렌§!은(는) §Y파우스트§!를 지배하려고 하지 않을 것입니다. 그러나 시스템은 비활성화되지 않은 경우 사용자 정의 원시 종족으로 여전히 생성될 수 있습니다.\n\n§B §Y사이레날리아§! 위기는 §Y2024년 만우절§!과의 협업의 일환으로 만들어졌습니다. §Y전쟁의 에퀘스트리아§! 팀이 그들의 모드에 §Y카이저 캣테일§! 경로를 추가했습니다.§!"
 giga_sirens_enabled:0 "The §Y사이렌§!은 §Y파우스트§!를 장악하려 시도하고 결국 §R사이레날리아§!가 될 것입니다. 그들은 마법의 매혹적인 노래를 사용하여 전체 은하를 §R정신 지배§!하려고 시도할 것입니다!\n\n§B §Y사이레날리아§! 위기는 §Y2024년 만우절§!에 §Y전쟁의 에퀘스트리아§! 팀과의 협업의 일환으로 만들어졌으며, 그들은 자신의 모드에 §Y카이저 캣테일§! 경로를 추가했습니다.§!"
 giga_eawaf_sirens_easy:0 "Sirenalia (§BLargo§!)\nSirenalia는 §B디버프됩니다§!.\n\n§M효능§!은 §Y0.5§!에서 시작하며, §YShroudsonic Enthraller§!의 각 레벨은 이를 §Y0.25§!만큼 증가시킵니다."
 giga_eawaf_sirens_normal:0 "사이레날리아 (§GLento§!)\n사이레날리아는 §G정상§!이 될 것입니다.\n\n§M효능§!은 §Y1§!에서 시작하며, §YShroudsonic Enthraller§!의 각 레벨은 이를 §Y0.5§!만큼 증가시킬 것입니다."
 giga_eawaf_sirens_hard:0 "Sirenalia (§YModerato§!)\nSirenalia는 §Y강화될§! 것입니다.\n\n§M효능§!은 §Y5§!에서 시작하며, §YShroudsonic Enthraller§!의 각 레벨은 이를 §Y2§!만큼 증가시킵니다."
 giga_eawaf_sirens_veryhard:0 "사이레날리아 (§HAllegro§!)\n사이레날리아는 §H매우 강력해질 것입니다§!.\n\n§M효능§!은 §Y10§!에서 시작하며, §YShroudsonic Enthraller§!의 각 레벨은 이를 §Y5§!만큼 증가시킬 것입니다."
 giga_eawaf_sirens_extreme:0 "Sirenalia (§RVivace§!)\nSirenalia는 §R매우 강화될§!.\n\n§M효능§!은 §Y25§!에서 시작하며, §YShroudsonic Enthraller§!의 각 레벨은 이를 §Y10§!만큼 증가시킵니다."
 giga_eawaf_sirens_impossible:0 "Sirenalia (§P프레스토§!)\nSirenalia는 §P불가능하게 강화될§!.\n\n§M효능§!은 §Y50§!에서 시작하며, §Y안개 소닉 매혹자§!의 각 레벨은 이를 §Y25§!만큼 증가시킬 것입니다."
 giga_eawaf_sirens_abyss:0 "Sirenalia (§g심연§!)\n§R주기가 찢겨지고 현실의 벽이 사라지는 가운데, 존재의 깊이에서 이해할 수 없는 힘이 깨어납니다.§!\n\n§M효능§!은 §Y1000§!에서 시작되며, §Y장막 소닉 매혹자§!의 각 레벨은 이를 §Y500§!만큼 증가시킵니다.\n\n§R모든§! 세력은 사이렌에 의해 매혹될 수 있습니다."
 d_everfree_forest:0 "에버프리 숲"
 d_everfree_forest_desc:0 "겉보기에는 마법같은 에너지로 가득한 특이하고 거의 뚫을 수 없는 숲입니다. 이를 청소하는 것에는 엄청난 노력이 들겠지만, 그 난해한 생태계를 연구하면 분명 흥미로운 데이터를 얻을 수 있을 것입니다."
 d_everfree_forest_thaumonuclear:0 "$d_everfree_forest$"
 d_everfree_forest_thaumonuclear_desc:0 "독특하고 거의 침투할 수 없는 - 그리고 분명히 거의 파괴할 수 없는 - 숲으로, 겉보기에는 마법 같은 에너지로 가득 차 있습니다. 그 신비로운 생태계를 연구하면 흥미로운 데이터를 얻을 수 있을 것입니다."
 d_thaumonuclear_wastes:0 "타우모핵 폐허"
 d_thaumonuclear_wastes_desc:0 "파우스트의 이제 멸종한 주민들은 그들의 행성에 타우모핵 폭발을 일으켰습니다. 폐허 속에서 소용돌이치는 에너지 폭풍은 귀중한 연구 주제가 될 것입니다."
 giga_eaw_faust_planet_modifier:0 "수정 융합 행성"
 giga_eaw_faust_planet_modifier_desc:0 "이 행성에는 희귀 크리스탈과 밀접한 관련이 있는 난해한 수정 매장층이 비정상적으로 풍부합니다. 적절히 개발한다면, 이 수정들을 사용해 말도 안되는 양의 에너지를 얻을 수 있습니다.\n\n§R성계의 갈색왜성을 점화시키면 이 행성이 파괴될 것입니다!§!"
 giga_eawaf.7002.name:0 "파우스트가 원자 시대에 진입하다"
 giga_eawaf.7002.desc:0 "보고서에 따르면, §Y파우스트§!의 특이한 대륙 세계에 거주하는 원주율들이 §Y[giga_eawaf_system.GetName]§! 시스템 내에서 저출력 핵 장치를 성공적으로 제작하고 시험했다고 합니다.\n\n현재로서는 상대적으로 드물고 비쌉니다만, 이 무기들은 기술이 정제되고 행성의 다양한 국가들에 퍼짐에 따라 기하급수적으로 확산될 것으로 예상됩니다.\n\n흥미롭게도, 이 무기들은 전통적인 우라늄 핵분열 대신 행성의 풍부한 결정 광물에 포함된 에너지를 이용하여 엄청난 파괴력을 발휘하며, 우리 관측소는 이를 §Y타우모핵 장치§!라고 부르기 시작했습니다.\n\n앞으로 행성에서 대규모 충돌이 발생한다면, 그 파괴력은 이전보다 훨씬 더 클 것입니다."
 giga_eawaf.7002.a:0 "흥미롭군요."
 giga_eawaf.7004.name:0 "파우스트가 타우모핵 전쟁으로 내려온다"
 giga_eawaf.7004.desc:0 "우리 §Y파우스트§! 관측소는 행성의 지정학적 상황 내에서 극도로 높은 긴장으로 인해, 파우스트의 주요 강대국 두 나라 간의 비교적 사소한 어선 사건이 행성의 세 주요 대륙을 서로 대립하게 만드는 대규모 갈등으로 확대되었다고 보고했습니다.\n\n불행히도, 대부분의 주요 국가들이 상당한 양의 무기를 보유하게 되면서 타우모핵 무기가 널리 퍼졌고, 이로 인해 갈등은 행성의 다양한 초국가적 동맹들이 서로에게 막대한 양의 타우모핵 전투기를 발사하기 시작하면서 빠르게 멸종 수준의 사건으로 변모했습니다.\n\n행성의 표면이 장치에서 방출된 격변의 에너지에 완전히 휩싸이는 데는 단 며칠밖에 걸리지 않았으며, 한때 푸르렀던 세계는 이제 행성을 덮고 있는 거대한 마법 같은 에너지의 끓어오르는 폭풍으로 변모했습니다.\n\n궤도 스캔 결과, 타우모핵 장치에서 방출된 에너지로 인해 번성하는 듯한 놀랍도록 꺼리는 정글을 제외하고, 원시 문명은 완전히 소멸된 것으로 나타났습니다."
 giga_eawaf.7004.a:0 "그렇게 폭력적인 결말이라니. 안타깝습니다."
 giga_eawaf.7006.name:0 "파우스트가 초기 우주 시대에 진입하다"
 giga_eawaf.7006.desc:0 "§Y파우스트§! 원주율들은 행성 간 비행이 가능한 첫 번째 궤도 우주선의 개발로 사회적 진화의 또 다른 중요한 단계를 완료했습니다.\n\n행성의 풍부한 결정의 액체 형태로 구동되는 이 우주선 여러 대가 그들의 별계 탐사를 위해 발사되었으며, 원주율들은 그들의 신비로운 행성계의 본질에 대해 본격적으로 탐구하기 시작했습니다.\n\n더욱 강력한 결정 렌즈 망원경의 개발로, 원주율들은 그들의 행성의 독특한 천문 지형이 진정으로 독특하다는 것을 더 많은 \"표준\" 외계 행성을 연구함으로써 배웠을 가능성이 높습니다.\n\n행성 전역의 긴장감이 완화되기 시작하고 있으며, 여러 주요 강국들이 국제 협력을 위한 매우 실질적인 조치를 취하고 있지만, 이러한 노력이 결실을 맺을지 아니면 재앙적인 멸종 사건으로 끝날지는 두고 봐야 할 것입니다.\n\n그들의 독특한 존재들이 별들 사이에 우리와 함께할 준비를 하는 데는 그리 오랜 시간이 걸리지 않을 것입니다."
 giga_eawaf.7006.a:0 "흥미롭습니다."
 giga_eawaf.shared.faust_achieves_ftl:0 "우리 §Y파우스트§! 관측소는 이 행성의 원주율들이 마침내 작동하는 FTL 드라이브를 구상했음을 나타냅니다. 그들의 기술 대부분과 마찬가지로, 이 드라이브는 행성의 독특하고 풍부한 수정체를 광범위하게 사용하여, 그들의 모항 시스템 내에서 이용 가능한 수정체의 양을 고려할 때 놀랍도록 저렴하게 제조됩니다."
 giga_eawaf.7012.name:0 "§Y그랜드 파우스티안 회의§!가 FTL을 달성했습니다."
 giga_eawaf.7011.desc.eawun:0 "$giga_eawaf.shared.faust_achieves_ftl$\n\n이 행성 자체는 §Y그랜드 파우스티안 회의§!라는 초국가적 실체에 의해 통합되었습니다. 이는 행성의 주요 민주 정부 몇 개의 연합으로 형성된 것입니다. 이러한 정부들은 여전히 어느 정도 존재하지만, 회의는 사실상 파우스트의 성간 권위 역할을 맡게 되었으며 문명의 별들 사이의 확장을 안내할 책임을 지게 됩니다.\n\n행성의 다양한 종들 간의 큰 문화적 및 물리적 차이를 고려할 때, 전체 행성을 단일 정부로 평화롭게 연방화한 것은 우리 전초 기지의 승무원과 행성 대부분의 주민들에게 경이로운 업적으로 여겨집니다.\n\n그러나 우리가 이 시스템의 스타베이스를 소유하고 있기 때문에, 우리는 그들의 지도자 §Y정글 트렉 III§!로부터 스타베이스의 소유권을 그들에게 이전해 달라는 전송을 받았습니다. 그렇게 함으로써 파우스트의 주민들이 마침내 그들의 행성 간 여행을 시작할 수 있게 될 것입니다."
 giga_eawaf.7013.name:0 "§Y그리포니안 제국§!이 FTL을 달성했습니다."
 giga_eawaf.7011.desc.eawgriffon:0 "$giga_eawaf.shared.faust_achieves_ftl$\n\n이 행성은 §Y그리포니안 제국§!으로 알려진 제국주의 국가의 전쟁과 외교적 책략을 통해 통합되었습니다. 이 제국은 전면적인 정복이나 경제적 지배를 통해 행성의 대부분의 이전 국가들을 정복했습니다.\n\n이러한 상황에 만족하지 않는 사람들도 있지만, 그리포니안 제국의 점령에 맞설 수 있는 외국 세력은 남아 있지 않으며, 따라서 행성의 운명은 정해진 것처럼 보입니다.\n\n우리가 이 시스템의 스타베이스를 소유하고 있기 때문에, 우리는 §Y그로버 XI§!의 §Y그로버 왕조§!의 지도자로부터 스타베이스의 소유권을 그들에게 이전해 달라는 전송을 받았습니다. 그리포니안 제국이 독립적인 은하 국가로 인정받기 위해서입니다."
 giga_eawaf.7014.name:0 "§Y파우스트와이드 사회주의 공화국§!이 FTL을 달성했습니다."
 giga_eawaf.7011.desc.eawcommunist:0 "$giga_eawaf.shared.faust_achieves_ftl$\n\n이 행성은 다소 평화롭게 §Y파우스트와이드 사회주의 공화국§!으로 통합되었습니다. 이는 여러 친사회주의 동맹국과의 합병 및 여러 전쟁을 통해 파우스트의 대부분의 국가에 대한 통제권을 확립한 적절한 이름의 사회주의 정부입니다.\n\n몇몇 국가가 독립적으로 남아 있지만, 그들은 새로운 사회주의 정부의 압도적인 우세에 비해 너무나도 미미하여 중요하지 않습니다. 이 정부는 종이나 출신에 관계없이 모든 생명체에게 평등과 번영을 가져다줄 것을 약속합니다.\n\n우리는 이 시스템의 스타베이스를 소유하고 있으므로, 그들의 최고 위원회의 대표인 지도자로부터 스타베이스 소유권 이전을 요청하는 전송을 받았습니다."
 giga_eawaf.70141.name:0 "§Y파우스티안 연합§!이 FTL을 달성했습니다."
 giga_eawaf.70141.desc:0 "$giga_eawaf.shared.faust_achieves_ftl$\n\n이 행성은 §Y파우스티안 연합§!의 지도 아래 통합되었습니다. 이 연합은 원래 그리포니안 대륙의 동부 지역에서 형성된 조화주의 정부입니다.\n\n처음에는 §Y리버 연합§!이라는 군사 및 경제 동맹에 불과했지만, 결국 외교와 이웃 그리포니안 제국과 같은 권위주의 정권에 대한 가끔의 십자군을 통해 초국가로 연합하게 되었고, 결국 이 행성의 유일한 초강대국이 되었습니다.\n\n그들은 이제 시스템을 그들에게 넘기는 문제를 논의하기 위해 우리에게 연락하고 있습니다."
 giga_eawaf.70142.name:0 "§Y아퀼레아-윙바르디 대제국§!이 FTL을 달성했습니다."
 giga_eawaf.70142.desc:0 "$giga_eawaf.shared.faust_achieves_ftl$\n\n이 행성은 §Y아퀼레이아-윙바르디§!의 지도 아래 통합되었습니다. 이는 그리포니아의 두 주요 국가가 융합하여 형성된 제국으로, 대륙의 초강대국으로 부상한 후 전체 대륙과 수많은 해외 군사, 경제 및 식민지 사업을 장악하면서 행성의 하이퍼파워로 발전하였습니다.\n\n우리가 이 시스템의 스타베이스를 소유하고 있기 때문에, 자원과 교환하여 시스템의 통제를 요청하는 그들의 여제에게서 전송을 받았습니다."
 giga_eawaf.70143.name:0 "§Y파우스티안 기업§!이 FTL을 달성했습니다."
 giga_eawaf.70143.desc:0 "$giga_eawaf.shared.faust_achieves_ftl$\n\n이 행성은 주로 §Y키리아§!의 막대한 경제력에 의해 통합되었습니다. 이 국가는 급속한 산업화와 강력한 자본주의 체제로의 전환을 거쳐, 빠르게 행성 경제를 지배하게 되었고 결국 수많은 다른 국가들의 경제를 장악하여 유일한 초강대국으로 자리 잡았습니다.\n\n우리가 이 시스템의 스타베이스를 소유하고 있기 때문에, 그들의 이사로부터 시스템을 구매하고 싶어하는 전송을 받았습니다."
 giga_eawaf.70144.name:0 "§Y혁명적인 파우스트§!가 FTL을 달성했습니다."
 giga_eawaf.70144.desc:0 "$giga_eawaf.shared.faust_achieves_ftl$\n\n이 행성은 §Y히포그리피아§!의 섬에서 유래한 국가의 통치 아래 통합되었습니다. 공산주의 정권 장악 이후, 이 국가는 모든 권위주의 정권에 대한 대대적인 십자군 전쟁으로 이어지는 급속한 확장 캠페인을 시작했습니다.\n\n핵 에너지의 광범위한 사용과 물질주의 정책을 통해, 이 신생 국가는 승리를 거두고 대부분의 파우스트를 통합할 수 있었으며, 마지막으로 남은 국가는 이후 비교적 쉽게 무너졌습니다.\n\n우주 여행에 대한 막대한 투자와 FTL 드라이브의 급속한 발전 이후, 새롭게 통합된 세계는 별들로 나아가고 있으며, 이제 외교 관계를 수립하기 위해 우리에게 열렬한 전송을 보내고 있습니다."
 giga_eawaf.70145.name:0 "§Y두려운 재앙§!이 FTL을 달성했습니다."
 giga_eawaf.70145.desc:0 "$giga_eawaf.shared.faust_achieves_ftl$\n\n이 행성은 재활성화된 생명체로 구성된 끔찍한 '하이브마인드' 아래 통합되었습니다. 이들은 파우스트의 생명체와 생태계에 대해 큰 '어둠의 십자군'을 벌였습니다.\n\n처음에는 불확실했지만, 하이브마인드의 압도적인 수와 자신과 적의 전사들을 되살리는 능력 덕분에 결국 승리하여 파우스트 전체를 흡수하게 되었습니다.\n\n놀랍게도, '두려운 재앙'으로 알려진 이 하이브마인드는 어떤 형태의 외교도 전혀 원하지 않는 것 같으며, 즉석에서 만든 FTL 선박을 사용하여 우리의 스타베이스에 전면 공격을 감행했습니다. 우리는 신속하게 행동하여 이 위협을 조기에 차단해야 합니다!"
 giga_eawaf.70146.name:0 "§Y파우스티안 디렉토리§!가 FTL을 달성했습니다."
 giga_eawaf.70146.desc:0 "$giga_eawaf.shared.faust_achieves_ftl$\n\n이 세계는 §Y레오폴드 슈멜러§!라는 이름의 기계 신에 의해 완전히 통합되었습니다. 그는 이전에 일반적인 그리폰이었으나, 중대한 사이버네틱 강화와 거대한 기계 몸으로의 승천을 겪었습니다.\n\n그 이후로 그는 세계의 나머지에 대한 거대한 십자군을 이끌며, 모든 반대 세력을 정복하고 파우스트의 유기체 인구를 그의 계속 성장하는 기계 의식에 통합하기 위해 고급 시계 장치의 거대한 군대를 풀어놓고 있습니다.\n\n우리가 이 시스템의 스타베이스를 소유하고 있기 때문에, 레오폴드는 파우스트 구매를 협상하기 위해 우리에게 연락했습니다."
 giga_eawaf.70147.name:0 "§Y고양이 같은 제국§!이 FTL을 달성했습니다."
 giga_eawaf.70147.desc:0 "$giga_eawaf.shared.faust_achieves_ftl$\n\n이 세계는 독특한 §Y카이저 카타일§!의 지도 아래 완전히 통합되었습니다. 그는 §Y아비시니아§!의 파우스 국가에서 나타났으며, 국가의 비참한 상태에도 불구하고 일련의 놀라운 정복을 이끌어내며 결국 파우스 전체와의 전면전으로 이어졌습니다.\n\n모든 역경에도 불구하고 카타일은 승리를 거두었고, 행성 전체에 대한 지배를 확보했으며, 심지어 행성의 위성인 셀레네에서 일종의 메가 엔지니어링 프로젝트를 시작했습니다.\n\n우리가 이 시스템의 스타베이스를 소유하고 있기 때문에, 그는 시스템 구매를 협상하기 위해 우리에게 연락했습니다."
 giga_eawaf.7011.a:0 "화면에."
 giga_eawaf.7015.name:0 "[giga_eawaf_country.GetName]"
 giga_eawaf.7015.desc.eawun:0 "안녕하세요, 별의 여행자 여러분. 대파우스 회의는 마침내 별을 항해할 수 있는 기술을 획득했습니다.\n\n하지만, 여러분의 종족이 우리의 별 시스템에 대한 권리를 주장한 것을 알게 되었습니다. 따라서, 우리의 대의회는 여러분의 문명에 §Y7500§! £energy£ 우리의 가장 위대한 수정체 반응기에서 조달된 재정적 보상을 제공하여 §Y[giga_eawaf_system.GetName]§! 시스템의 완전한 소유권을 요청하기로 결정했습니다."
 giga_eawaf.7015.desc.eawgriffon:0 "안녕하세요, 외계 존재들. 그리포니안 제국은 마침내 물리 법칙을 정복하여 별들 사이의 광활한 공허를 가로지를 수 있게 되었습니다.\n\n하지만, 우리는 당신의 종이 우리의 별 시스템에 대한 주장을 하고 있다는 것을 알게 되었습니다. 따라서, 저는 카이저 §Y그로버 XI§!가 당신의 종이 이 시스템을 우리의 통제 아래로 이전해 주기를 바랍니다. 우리는 당신보다 훨씬 더 오랫동안 이곳에 거주해 왔습니다.\n\n그것이 옳습니다."
 giga_eawaf.7015.desc.eawcommunist:0 "우주를 여행하는 여러분, 안녕하세요. 파우스트와이드 사회주의 공화국의 가장 뛰어난 지성들이 다른 별에 도달할 수 있는 거대한 장치를 고안했습니다.\n\n하지만, 여러분이 우리 별계에 대한 권리를 주장한 것을 알게 되었습니다. 따라서 우리의 최고 의회는 여러분의 문명에 §Y5000§! £energy£와 §Y2500§!의 재정적 보상을 제공하기로 결정했습니다. 이는 £consumer_goods£의 전량을 교환하는 대가입니다.§Y[giga_eawaf_system.GetName]§! 시스템에 대한 완전한 소유권을 위해서입니다.\n\n우리가 실망하지 않기를 바랍니다."
 giga_eawaf.7015.desc.riverun:0 "안녕하세요, 별의 여행자들. 파우스티안 연합은 마침내 별을 항해할 수 있는 기술을 획득했습니다.\n\n하지만, 우리는 여러분이 우리 별 시스템에 대한 권리를 주장한 것을 알게 되었습니다. 따라서 우리는 여러분의 문명에 §Y7500§! £energy£ 우리 최고의 수정체 반응기에서 조달된 재정적 보상을 제공하기로 결정했습니다. §Y[giga_eawaf_system.GetName]§! 시스템의 완전한 소유권을 대가로 합니다."
 giga_eawaf.7015.desc.jerwng:0 "안녕하세요, 외계 존재들. 윙바르디와 아퀼레아의 공동 노력으로, 우리 종족은 마침내 물리 법칙을 정복하여 별들 사이의 광활한 공허를 가로지를 수 있게 되었습니다.\n\n하지만, 우리는 귀하의 종족이 우리의 별계를 주장하고 있다는 것을 알게 되었습니다. 따라서, 저는 §Y알레산드라 디스크레트§! 황후로서 귀하의 종족이 이 시스템을 우리에게 넘겨주기를 바랍니다. 우리는 귀하보다 훨씬 오랫동안 이곳에 거주해 왔습니다.\n\n그것은 당연한 일입니다."
 giga_eawaf.7015.desc.kiria:0 "안녕하세요, 외계의 사업 파트너 여러분! 우리가 여러분과 마찬가지로 FTL 여행의 비밀을 풀었으니, 거래를 제안하고자 합니다! §Y7500§! £energy£를 우리의 최고의 수정체 반응기에서 공급받아 §Y[giga_eawaf_system.GetName]§! 시스템의 완전한 소유권과 교환하는 것은 어떻습니까? 경제적 기회를 고려해 보세요!"
 giga_eawaf.7015.desc.posada:0 "드디어, 우리가 이 순간을 기다려왔습니다! 별의 민족들! 우리 세계의 가장 뛰어난 지성들이 다른 별에 도달할 수 있는 거대한 장치를 고안했습니다.\n\n하지만, 당신들 별의 민족이 우리의 별 시스템에 대한 권리를 주장한 것 같습니다. 따라서, 우리는 시스템을 양도해 주실 것을 정중히 요청드립니다. 그 대가로 §Y5000§! £energy£와 §Y2500§!의 우리의 최고의 £consumer_goods£을 제공하겠습니다!\n\n우리가 결실 있는 파트너십을 맺을 수 있기를 바랍니다!"
 giga_eawaf.7015.desc.kaiser:0 "안녕하세요, 외계인. 카첸아르티그 제국은 이제 FTL을 해제하였으며 역사상 가장 위대한 모험을 시작하려고 합니다. 따라서, 저는 당신에게 파우스트 시스템의 스타베이스 통제를 우리에게 이전해 줄 것을 요청합니다. §Y7500§! £energy£의 재정적 보상을 제공할 수 있지만, 당신이 거부한다면 싸우는 것을 두려워하지 않습니다."
 giga_eawaf.7015.desc.dread:0 "죽음 그 자체가 죽을 때까지는 쉴 수 없습니다."
 giga_flavor_systems.7005.dread:0 "전투 기지!"
 giga_eawaf.7015.desc.leopold:0 "<<안녕하세요, 별 여행자 여러분>>\n\n<<파우스트 시스템 소유권에 대한 보상 제안>>\n\n<<제안: §Y7500§! £energy£>>\n\n<<거부하면 우리의 힘을 직면하게 될 것입니다>>"
 giga_eawaf.7015.a:0 "당신은 그 시스템을 가질 수 있습니다."
 giga_eawaf.7015.a.response:0 "[giga_eawaf_country.GetName]은(는) 당신의 협력에 감사드립니다."
 giga_eawaf.7015.a.tooltip:0 "우리는 §Y[giga_eawaf_system.GetName]§! 시스템의 모든 것을 §Y[giga_eawaf_country.GetName]§!에게 이전할 것이며, 시스템 내에 있을 수 있는 다른 식민지도 포함됩니다."
 opinion_eaw_gave_system:0 "고향 성계를 줌"
 opinion_eaw_gave_system_neighbors:0 "고향 성계와 이웃 성계를 줌"
 giga_eawaf.7015.b:0 "당신은 이 시스템과 그 인근의 이웃들도 가질 수 있습니다."
 giga_eawaf.7015.b.tooltip:0 "우리는 §Y[giga_eawaf_system.GetName]§! 시스템 전체와 §Y인접 시스템§!을 §Y[giga_eawaf_country.GetName]§!에 이전할 것이며, 이 시스템에 있는 다른 식민지도 포함됩니다.\n\n [giga_eawaf_country.GetName]은 분명히 감사할 것입니다."
 giga_eawaf.7015.b.response:0 "정말 기쁩니다! [giga_eawaf_country.GetName]이(가) 감사할 것입니다."
 giga_flavor_systems.7005.c:0 "불가능합니다."
 giga_flavor_systems.7005.c.tooltip:0 "우리는 그들에게 시스템을 제공하는 것을 거부할 것입니다. 그들이 우리에게 보복할 수도 있습니다."
 giga_flavor_systems.7005.c.response:0 "우리는 갈등을 두려워하지 않는다는 것을 알아두세요, [ROOT.GetName]."
 giga_tech_thaumaturgic_weaponry:0 "마법에 준하는 수정 병기"
 giga_tech_thaumaturgic_weaponry_desc:0 "파우스트의 주민들은 병기와 강력한 수정을 융합시켜, 일반적인 병기를 훨씬 뛰어넘는 소총과 무기를 고안했습니다. 수정이 그들에게는 마법처럼 보일지도 모르고 자신들이 기술을 얼마나 많이 전파할 수 있을지를 극적으로 제한한 반면, 이 수정의 본질에 대한 철저한 연구를 통해 우리는 우리의 무장군 내에서 이를 표준화할 수 있을지도 모릅니다. 그러나 희귀 크리스탈 유지비가 상당히 들 것입니다."
 edict_giga_eawaf_thaumaturgic_weaponry:0 "세미타우마투르기 무기"
 edict_giga_eawaf_thaumaturgic_weaponry_desc:0 "강력한 수정체 무기로 우리의 군대를 무장시키는 것은 그들의 공격 능력을 확실히 향상시킬 것입니다."
 giga_eawaf.7100.name:0 "파우스트 정복"
 giga_eawaf.7100.desc:0 "우리 군대는 §Y파우스트§!의 무장 세력 대부분을 성공적으로 정복하는 데 성공했으며, 몇몇 낙오자들이 파우스트의 가장 외진 지역에서 여전히 저항하고 있지만, 우리는 이제 행성의 주요 인구 중심지 전역에 대한 통제를 확보했습니다.\n\n그러나 파우스트는 최소 2개의 주요 종이 행성을 공유하고 각기 다른 이념과 신념을 가진 수십 개의 아종이 존재하는 매우 다양한 국가와 문화로 구성되어 있습니다.\n\n결국, 이는 새로 정복한 인구를 통제하는 데 놀라울 정도로 어려움을 주고 있으며, 앞서 언급한 종들 중 일부가 정신 능력과 유사한 능력을 가진 것으로 보인다는 사실과 결합되어 행성 전역에서 주요 저항 운동이 이미 조직되고 있다는 것을 의미합니다.\n\n우리가 원시적인 파우스티안들을 완전히 정복할 수 있을 것이라는 데는 의심의 여지가 없지만, 당분간 우리는 파우스트 주민들이 우리 문명의 일원으로서의 새로운 지위에 대한 불가피한 현실을 이해하고 있기 때문에 행성에서 우리의 지배에 대해 극도로 강한 저항을 예상해야 합니다."
 giga_eawaf.7100.a:0 "그들은 때가 되면 처리될 것입니다."
 giga_eaw_faust_harsh_resistance:0 "거친 저항"
 giga_eaw_faust_harsh_resistance_desc:0 "이 행성의 토착민들이 우리의 통치에 저항하고 있지만, 영원히 저항하지는 못할 것입니다."
 giga_eawaf.7101.name:0 "수정체 무기"
 giga_eawaf.7101.desc:0 "정복한 §Y파우스트§!의 주민들과 그들의 기술을 연구하는 동안, 우리 군인들은 이들이 원시 문명으로 분류되었음에도 불구하고 기술 발전 수준에 비해 놀라울 정도로 강력한 무기를 사용하고 있다는 것을 발견했습니다.\n\n추가 조사를 통해 파우스트인들의 무기 대부분이 그들의 기술에 내장된 이국적인 종류의 §Y희귀 결정§!을 사용하고 있다는 것이 밝혀졌습니다. 이 결정들은 막대한 양의 에너지를 저장하고 방출할 수 있는 능력을 가지고 있으며, 사실상 \"결정 배터리\" 역할을 하여 그들의 무기에 거의 끝없는 에너지 흐름을 제공합니다.\n\n이들은 우리가 아는 희귀 결정과 밀접한 관련이 있는 것으로 보이며, 아마도 인근의 결정 소행성대에서 수세기 동안의 유성 충돌로 인해 파우스트에 침착되었고, 아마도 지역의 시공간 왜곡에 의해 이보다 더 이국적인 형태로 변형되었을 것입니다.\n\n어쨌든, 우리의 과학자들은 이 특이한 결정들을 연구하고 싶어하며, 이미 우리 무기에 통합하여 군사력을 더욱 강화하기 위한 여러 제안을 내놓았습니다.\n\n한 과학자는 만약 이러한 문명이 진정한 마법 무기의 잠재력을 완전히 수용한다면, 그들은 분명히 은하 전체에서 가장 위협적인 세력 중 하나가 될 것이라고 언급했습니다. 다행히도, 파우스트의 주민들은 이 결정들을 전적으로 의존하기보다는 그들의 \"일반\" 기술에 대한 업그레이드처럼 사용했습니다. 하지만 우리를 위해, 우리는 어떤 문명도 이러한 이론적이고 사실상 \"마법 같은\" 기술의 진정한 잠재력을 알아내지 않기를 바래야 합니다..."
 giga_eawaf.7101.a:0 "흥미롭군요."
 giga_eawaf.7016.name:0 "[giga_eawaf_country.GetName] [giga_eawaf_system.GetName] 스타베이스를 점령하라!"
 giga_eawaf.7016.desc:0 "그들의 요구를 거부한 우리의 결정을 노골적으로 무시하고, §Y[giga_eawaf_country.GetName]§!는 §Y[giga_eawaf_system.GetName]§! 시스템 내의 우리의 스타베이스를 탈취하고 점령하기 위한 작전을 수행했습니다.\n\n스타베이스 자체를 점령하는 데는 성공했지만, 우리는 그들의 함대를 파괴하고 시스템과 그들의 행성을 되찾는 것이 그리 어렵지 않을 것이라고 추정합니다. 그러나 우리의 고위 지휘부는 그들의 지상군이 이렇게 젊은 문명치고는 비정상적으로 강력하다고 경고합니다."
 giga_eawaf.7016.a:0 "그들이 감히? 즉시 그들을 짓밟아라!"
 giga_eawaf.7016.a.tooltip:0 "우리는 §R전쟁을 선언§!할 것이며 §Y[giga_eawaf_country.GetName]§!를 정복해야 승리를 거둘 수 있습니다.§Y파우스트§!를 확보해야 합니다."
 giga_eawaf.7016.b:0 "그들은 그 시스템을 가질 수 있습니다. 어차피 우리에게는 가치가 없습니다."
 giga_eawaf.7016.b.tooltip:0 "§Y[giga_eawaf_system.GetName]§! 시스템과 그 모든 행성이 §Y[giga_eawaf_country.GetName]§!에게 이전됩니다."
 giga_eawaf.7103.name:0 "알리콘이 침략에 맞서 동원합니다!"
 giga_eawaf.7103.desc:0 "우리의 §Y파우스트§! 침공은 분명 이 행성의 주요 수호자들에게 간과되지 않았습니다. 실제로 §Y파우스트§!의 하늘이 떨고 있으며, 이 행성의 쌍둥이 천체 신들인 §Y셀레스티아 공주§!와 §Y루나 공주§!가 이제 우리에 맞서 그들의 세계를 외계의 지배로부터 구하기 위해 동원되고 있습니다.\n\n우리는 최악의 상황을 예상해야 합니다. 이 존재들의 강력한 마법은 물리학을 초월하는 헬리오스와 셀레네가 파우스트를 공전할 수 있게 할 만큼 강력하다고 하니, 그들은 거의 확실히 우리의 군대를 파괴할 수 있는 능력을 가지고 있습니다.\n\n이미 우리의 지휘관들은 셀레스티아가 발산한 강력한 고온 플라스마 마법의 광선에 의해 전체 사단이 전멸당하고 있다고 보고하고 있으며, 행성의 밤쪽에서 모든 물류 작전은 루나 자신이 던진 것으로 보이는 모든 것을 집어삼키는 어둠에 의해 방해받고 있어 우리의 병사들은 한밤중에 무력해지고 있습니다.\n\n파우스트를 정복하는 데는 우리의 막대한 투자가 필요할 것이 분명하지만, 만약 우리가 이러한 초자연적인 적들과 마주치고 싶지 않다면, 우리는 이 모든 수렁에서 완전히 빠져나올 수도 있습니다. 그러나 파우스트 사회에 대한 피해는 부인할 수 없이 영구적일 것입니다."
 giga_eawaf.7103.a:0 "우리는 말하는 말에게 절대 항복하지 않을 것입니다!"
 giga_eawaf.7103.a.tooltip:0 "§Y셀레스티아§!와 §Y루나§!가 우리에 맞서 동원될 것입니다!"
 giga_eawaf.7103.b:0 "이 빌어먹을 바위는 그럴 가치가 없습니다."
 giga_eawaf.7103.b.tooltip:0 "우리는 파우스트에서 철수할 것입니다. 그러나 §Y셀레스티아§!와 §Y루나§!의 동원과 파우스트 전체의 동원, 그리고 외계 생명체의 존재가 확실하다는 점은 이 행성이 발전하는 데 거의 확실히 §R큰 결과§!를 초래할 것입니다."
 giga_eawaf.10151.name:0 "파우스트 스타베이스 건설 중"
 giga_eawaf.10151.desc:0 "주어진 §Y파우스트§! 시스템의 특이한 특성으로 인해, 우리의 탐사 팀은 이 시스템에서 §Y전초기지§!를 가장 시급히 설립해야 한다고 제안했습니다."
 giga_eawaf.10151.a:0 "가치 있는 노력입니다!"
 giga_eawaf.10151.b:0 "우리는 더 중요한 일에 집중해야 합니다."
 r_eawaf_sirens_crystal:0 "심연의 수정"
 r_eawaf_sirens_crystal_desc:0 "원래 사이렌에게 속했던 이 매혹적인 붉은 수정은 알 수 없는 방법으로 만들어졌으며, 거의 모든 지능 생물의 생각에 영향을 미칠 수 있는 매우 강력한 마법을 지니고 있습니다.\n우리가 사이렌이 한때 그랬던 것처럼 이 수정들을 완전히 활용할 수는 없겠지만, 특히 문제를 일으키는 개인이나 정치적 실체를 다룰 때 유용할 수 있습니다."
 r_eawaf_eqg_portal:0 "수정 거울"
 r_eawaf_eqg_portal_desc:0 "신비로운 포털 같은 장치로, 원시적이고 이상하게 다채로운 인간형 생물들이 어떤 교육 센터에 다니는 아기자기한 대체 차원과 연결되어 있습니다. 차원 자체는 우리에게 큰 도움이 되지 않지만, 포털의 불가사의한 속성은 우리 우주와 그 구성 영역의 근본적인 본질에 대한 매혹적인 탐구를 제공합니다. 게다가, 그 주민들은 때때로 문화적으로 흥미로운 재미있는 음악 작품을 만들어냅니다."
 giga_eawaf_portal_relic_tooltip:0 "\n우정의 장점을 주제로 한 매혹적인 조화로운 음악 공연을 다른 차원에서 추출하여 우리 국가의 단결을 강화합니다.\n§L'점프하고, 소리를 내세요! 발굽을 구르고, 돌아서세요!'§!"
 giga_eawaf_eqg_portal_modifier:0 "조화로운 음악"
 giga_eawaf_eqg_portal_modifier_desc:0 "거울 차원에서 추출된 음악 작품들은 우리의 연예인들에게 풍부한 자료를 제공합니다."
 giga_eawaf_eqg_portal_modifier_gestalt:0 "$giga_eawaf_eqg_portal_modifier$"
 giga_eawaf_eqg_portal_modifier_gestalt_desc:0 "거울 차원에서 추출된 음악 작품들은 우리의 사회학자들에게 풍부한 자료를 제공합니다."
 giga_eawaf_crystal_relic_tooltip:0 "모든 적대적인 세력과 제국에 대해 §R증오§!와 §R갈등§!의 마법을 걸어, 함선 능력을 감소시키고 행성의 불안을 증가시킵니다."
 giga_eawaf_crystal_relic_modifier:0 "전쟁의 마법"
 giga_eawaf_crystal_relic_modifier_desc:0 "우리를 향해 분쟁의 주문이 걸리고 있습니다."
 giga_eawaf_mindwardens_relic_altreward_modifier:0 "확인된 신념"
 giga_eawaf_mindwardens_relic_altreward_modifier_desc:0 "전투에서 사이렌 위협에 맞서 싸우는 과정은 우리의 목표를 더욱 분명히 하고 우리의 임무를 정당화했습니다."
 giga_eawaf_mindwardens_psifusion_altreward_modifier:0 "정신 촉매 융합 연구"
 giga_eawaf_mindwardens_psifusion_altreward_modifier_desc:0 "헬리오스의 융합을 이끄는 신비로운 과정은 에너지의 차원 간 이동에 대해 많은 것을 가르쳐 주었습니다.\n\n$giga_eawaf.1017.hatepsi.a.tooltip$"
 giga_eawaf.60252.name:0 "전투 마법이 도착했습니다!"
 giga_eawaf.60252.desc:0 "giga_eawaf.60252.desc,"The §Y[giga_eawaf_strife_spell_caster.GetName]§!는 §Y심연의 수정§!을 사용하여 우리 문명에 갈등의 마법을 걸어 우리 국민의 응집력을 감소시켰습니다!"
 giga_eawaf.60252.a:0 "저주받았다!"
 giga_eawaf.60253.name:0 "전투 마법 시전!"
 giga_eawaf.60253.desc:0 "에너지의 표적화된 충동 덕분에 §Y심연의 수정§!이(가) 은하 전역에 에너지를 방출하여 우리에게 해를 끼치려는 자들의 마음을 혼란스럽게 했습니다."
 giga_eawaf.60253.a:0 "훌륭합니다. 그들이 고통받게 하세요."
 GIGA_EAWAF_EQG_PORTAL:0 "파우스티안 해방"
 GIGA_EAWAF_EQG_PORTAL_DESC:0 "가장 중요한 것은 파우스트를 사이렌의 손아귀에서 벗어나게 할 방법을 찾는 것입니다. 그렇지 않으면 그곳의 모든 인구가 무의미한 죽음을 맞이할 것입니다."
 GIGA_EAWAF_SIRENS_COUNTRY:0 "조화로운 매혹자"
