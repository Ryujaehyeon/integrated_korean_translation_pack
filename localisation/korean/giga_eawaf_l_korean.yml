 concept_giga_eawaf_war_materials:0 "전쟁 물자"
 concept_giga_eawaf_war_materials_desc:0 "이 자원들은 포획된 세계에서 그들의 인구에 의해 생성된 사이렌의 고급 자원 비축을 나타냅니다. 이들은 함선을 제작하고 §Y그림자 음향 지배자§!를 업그레이드하는 데 사용되어 그 효과를 더욱 강렬하게 만들어, 범위 내의 행성과 함선에 적용되는 디버프를 증가시킵니다."
 concept_giga_eawaf_thaumaturgic_weapons:0 "신비로운 무기"
 concept_giga_eawaf_thaumaturgic_weapons_desc:0 "이 강력한 무기는 시레날리아에서 역설계된 것으로, 행성 파우스트의 독특한 수정체 기술을 활용합니다.\n이 구성 요소에는 다음이 포함됩니다:\n- $concept_giga_eawaf_strike_craft$\n- $concept_giga_eawaf_crystal_autocannon$\n- $concept_giga_eawaf_crystal_artillery$\n- $concept_giga_eawaf_psionic_charge$\n- $concept_giga_eawaf_crystal_impactor$\n- $concept_giga_eawaf_grand_void_beam$"
