l_korean:
 eawaf_army:0 "마도 군대"
 eawaf_army_desc:0 "마도 군대"
 eaw_early_army:0 "수정 강화 산업 군대"
 eaw_early_army_desc:0 "이 무장군은 다양한 수정 기반 병기로 강화되었습니다."
 giga_eaw_crystal_army:0 "수정 융합 군대"
 giga_eaw_crystal_army_desc:0 "일반적인 화기보다 약간 더 손상되기 쉽고 신뢰도는 떨어지지만, 수정 기반의 병기는 단연코 더 강력합니다. 이 군인들은 이러한 마법 무기를 통해 잠재력을 최대한 끄집어낼 수 있습니다."
 giga_eaw_crystal_army_drone:0 "수정 융합 태엽 장치"
 giga_eaw_crystal_army_drone_desc:0 "일반적인 화기보다 약간 더 손상되기 쉽고 신뢰도는 떨어지지만, 수정 기반의 병기는 단연코 더 강력합니다. 이 자동화 드론들은 이러한 마법 무기를 통해 잠재력을 최대한 끄집어낼 수 있습니다."
 eawaf_army_celestia:0 "알리콘"
 eawaf_army_celestia_desc:0 "알리콘"
 eawaf_army_luna:0 "알리콘"
 eawaf_army_luna_desc:0 "Alicorn"
 eawaf_sirens_army:0 "심연 군대"
 eawaf_sirens_army_desc:0 "심연 군대"
 giga_eawaf.1001.name:0 "깜빡이는 별"
 giga_eawaf.1001.desc:0 "우리 종족이 처음 별을 관측하기 시작한 이래—처음에는 원시적인 광학 망원경으로, 이후에는 궤도 위성으로, 그리고 이제는 타키온 방사기로—예상치 못한 방식으로 행동하는 항성계들이 항상 존재해왔다.

천문학자들을 혼란에 빠뜨린 가장 흔한 원인은 대개 항성 광도의 변화나 불규칙한 외계행성 통과 패턴이었지만, 물리학에 대한 우리의 이해가 깊어지면서 이러한 미스터리들도 제대로 평가, 분석, 해결될 수 있게 되었다. 대부분의 경우 원시 망원경의 단순한 측정 오류로 밝혀졌고, 나머지 경우에도 이 현상들을 연구함으로써 외계행성과 항성 거동에 대한 이해를 더욱 심화할 수 있었다.

그러나 망원경이 지속적으로 개선되고 우주에 대한 이해가 갈수록 깊어지는데도 불구하고, 한 항성계만은 여전히 모든 천체물리학 모델을 완전히 거스르고 있다—바로 §Y파우스트§!라 불리는 신비로운 별이다. 언뜻 보면 평범한—다소 어두운—별처럼 보이지만, 항성계를 두어 시간 이상 관측하다 보면 별이 그냥... 사라지는 것처럼 보이다가, 약 12시간 후 다시 나타났다가, 또 12시간 후 다시 사라지는 것을 알아챌 수 있다.

천문학자들에게 '깜빡이는 별'이라 불리게 된 이 별의 규칙적인 소멸을 설명하는 이론은 아직 없으며, 이 미스터리를 풀 수 있는 유일한 방법은 직접 그곳에 가는 것뿐이라는 것이 분명해졌다. 다행히 최근 초광속 항법의 발견으로 그러한 직접 조사가 마침내 가능해졌고, 이 미스터리를 마침내 풀 수 있다는 전망에 과학계 전체가 이미 흥분으로 들썩이고 있다."
 giga_eawaf.1001.a:0 "그렇다면 시작해보자."
 giga_eawaf.1001.a.tooltip:0 "§B이 항성계와 이에 관련된 모든 것은 HOI4의 §Y에쿠에스트리아 앳 워§! 모드와의 §Y2024년 만우절§! 협업의 일부입니다! 어떤 이유로든 이 이벤트 체인에 참여하고 싶지 않다면 기가메뉴에서 비활성화할 수 있지만, 한 번 해보시길 권장합니다!§!"
 giga_eawaf_faust_chain_title:0 "파우스트의 미스터리"
 giga_eawaf_faust_chain_desc:0 "파우스트 항성계는 모든 논리를 거스른다. 반드시 더 깊이 조사해야 한다!"
 giga_eawaf_poi_faust_name:0 "깜빡이는 별"
 giga_eawaf_poi_faust_desc:0 "파우스트 항성계는 '깜빡인다'—약 12시간 간격으로 보였다 사라졌다 한다. 이 미스터리를 규명하는 유일한 방법은 직접 그곳에 가보는 것뿐이다."
 giga_eawaf_shroud_chain_title:0 "에테르 장막"
 giga_eawaf_shroud_chain_desc:0 "파우스트 항성계가 뚫을 수 없는 장막 뒤로 사라졌다."
 giga_eawaf_poi_shroud_name:0 "숨겨진 별"
 giga_eawaf_poi_shroud_desc:0 "파우스트의 원시 행성은 시레날리아에 의해 정복되었고, 시레날리아는 그 후 '주문'을 걸어 항성계 전체를 뚫을 수 없는 장막 속으로 끌어들였다. 장막의 요동치는 파동은 미래에 사라질 수도 있음을 시사하며, 그 이후 무슨 일이 일어나든 대비해야 한다.

§R장막에 직접 인접한 항성계들로부터는 거리를 두는 것이 현명할 것이다...§!"
 giga_eawaf_sirens_chain_title:0 "시레날리아"
 giga_eawaf_sirens_chain_desc:0 "사이렌들은 은하 전체를 홀리려는 집착에 사로잡혀 있다. 반드시 막아야 한다!"
 giga_eawaf_poi_sirens_stats_name:0 "사이렌 추적"
 giga_eawaf_poi_sirens_stats_desc:0 "§R총 분쟁§! - [giga_eawaf_country.giga_eawaf_total_strife]
사이렌들은 §R분쟁§!—증오와 멸시의 '발현'—을 먹고 번성한다. §P외부 필드§! 내에 있는 행성들은 §Y인구§!, §Y범죄§!, §Y안정도§!에 따라 §R분쟁§!을 생성하며, 후자 두 가지는 §P외부 필드§!에 의해 약화된다.

§M분쟁 필드 도달 수준§! - [giga_eawaf_country.giga_eawaf_outer_strife_field_range_level]
§R내부 분쟁 필드 범위§! - [giga_eawaf_country.giga_eawaf_inner_strife_field_range]
§P외부 분쟁 필드 범위§! - [giga_eawaf_country.giga_eawaf_outer_strife_field_range]
§Y필드 확장 전 분쟁 임계값§! - [giga_eawaf_country.giga_eawaf_strife_field_range_next_level_cost]
§Y필드 축소 전 분쟁 임계값§! - [giga_eawaf_country.giga_eawaf_strife_field_range_prev_level_cost]
사이렌들이 보유한 §R분쟁§!이 많을수록 그들의 주문은 더 멀리 뻗어나간다. 그러나 분쟁이 부족하면 필드는 축소된다. 크기 변화는 §Y2.5년§!마다 한 번씩만 가능하다.


§M분쟁 필드 강도§! - [giga_eawaf_country.giga_eawaf_field_potency_multiplier]
필드의 강도가 높을수록 함선과 행성에 강력한 디버프를 부여한다.

§Y현재 ['concept_giga_eawaf_war_materials']§! - [giga_eawaf_country.giga_eawaf_sirens_warmaterial_count]
§Y음파 홀리기 강화기 수준§! - [giga_eawaf_country.giga_eawaf_sirens_megaphone_level]
§Y음파 홀리기 강화기 다음 수준 비용§! - [giga_eawaf_country.giga_eawaf_sirens_megaphone_next_level_cost]
이 자원들은 점령한 세계의 주민들이 생산하는 사이렌의 고급 자원 비축량을 나타낸다. 함선을 제조하고 §Y음파 홀리기 강화기§!를 업그레이드하여 범위 내 행성 및 함선에 적용되는 디버프를 강화하는 데 사용된다."
 giga_eawaf.1010.name:0 "지구 중심"
 giga_eawaf.1010.desc:0 "§Y[ROOT.GetName]§!이 파우스트 항성계에 도착하여 수세기 동안 천문학자와 과학자들을 모두 당혹스럽게 해온 신비로운 '깜빡이는 별' 현상의 해결책을 찾아내기를 바라고 있다.

그런데 아이러니하게도, 그 해답은 우리의 가장 발전한 이론이 아닌, 우리 종족이 하늘의 별들의 움직임을 설명하기 위해 처음 내놓았던—그리고 틀렸던—우주관, 즉 천동설에 있었다.

§Y파우스트§! 항성계는 어떻게든 파우스트 자체를 중심으로 구성되어 있다. 파우스트는 여러 작은 행성(또는 위성)들이 공전하는 암석 세계로, 파우스트에 온기와 빛을 제공하는 소형 태양까지 함께 공전하고 있다.

항성의 스펙트럼 방출을 측정한 결과 지름이 3천 킬로미터에 불과함에도 평범한 G형 항성처럼 거동함을 알 수 있다. 이런 크기라면 어떤 기준으로도 중성자별이거나 기껏해야 가스 거성이어야 하지만... 그럼에도 불구하고 파우스트 주위를 24시간 주기로 충실히 공전하며, 12시간마다 행성 뒤로 사라졌다가 반대편으로 다시 나타난다.

'깜빡이는 별' 미스터리는 마침내 풀렸지만, 이 기이한 항성계에서 실제로 무슨 일이 일어나는지 이해하려면 아직 갈 길이 멀다."
 giga_eawaf.1010.a:0 "참으로 기묘하구나."
 giga_eawaf.1011.name:0 "마도 수정"
 giga_eawaf.1011.desc:0 "파우스트 주위를 도는 소행성대에는 이전에 본 적 없는 이상한 보라빛-분홍빛 수정이 곳곳에 돌출되어 있다.

초기 실험 결과, 이 수정의 샘플들은 분자 구조 내에 일종의 에테르 에너지를 '저장'하고 있으며, 이를 수정에 특정 자극을 가하면 '방출'할 수 있고, 종종 파괴적인 결과를 초래한다.

그러나 이를 무기와 에너지 시스템에 활용하려는 모든 희망은, 수정을 파우스트 항성계 밖으로 반출하는 모든 시도가 고유 에너지의 자발적 소멸과 수정의 산산조각으로 이어졌을 때 산산이 부서졌다.

분명 파우스트 항성계에는 이 수정들에 에너지를 '공급'하는 고유한 특성이 있는 것 같지만, 이 에너지의 실제 근원은 과학자들의 이해를 완전히 벗어나 있다."
 giga_eawaf.1011.a:0 "흥미롭군."
 giga_eawaf.1012.name:0 "악몽 같은 위성"
 giga_eawaf.1012.desc:0 "§Y셀레네§!, 신비로운 §Y헬리오스§! 반대편에서 파우스트를 공전하는 암석 위성은, 언뜻 보면 파우스트 항성계에서 가장 평범한 부분처럼 보인다. 대기가 없어 수많은 충돌 분화구가 패여 있고 많은 다른 천연 위성처럼 얇은 달 먼지 층으로 덮인, 비교적 큰 암석 위성이다.

아이러니하게도 이상 징후는 §Y[ROOT.GetName]§!의 승무원들이 쉬기 시작했을 때 처음 나타났다. 위성에 가까이 접근하자마자, 승무원들의 평소에는 쾌적하던 꿈이 끔찍한 악몽으로 변하기 시작했고, 대부분은 어둡고 위압적인 말의 형상이 잠결에 나타나 복수와 세계 전체를 뒤덮는 영원한 어둠을 약속했다고 보고했다.

위성으로부터 배가 떠나자마자 이 악몽은 사라졌지만, 많은 이들이 이제 이 천체가 알 수 없는 복수심에 불타는 영혼에 의해 '홀린' 것이라 믿고 있으며, [Owner.GetScientist] §Y[ROOT.GetLeaderName]§!은 이 야간 공포에 크게 영향을 받은 것 같다..."
 giga_eawaf.1012.desc_machine_intelligence:0 "§Y셀레네§!, 신비로운 §Y헬리오스§! 반대편에서 파우스트를 공전하는 암석 위성은, 언뜻 보면 파우스트 항성계에서 가장 평범한 부분처럼 보인다. 대기가 없어 수많은 충돌 분화구가 패여 있고 많은 다른 천연 위성처럼 얇은 달 먼지 층으로 덮인, 비교적 큰 암석 위성이다.

아이러니하게도 이상 징후는 §Y[ROOT.GetName]§!의 승무원들이 위성에 가까이 접근했을 때 처음 나타났다. 그들은 이상 행동을 보이기 시작했으며, 어둡고 위압적인 말의 형상으로 나타나는 시각적 왜곡을 보고했다.

배가 위성으로부터 떠나자마자 이 시각적 오류는 사라졌지만, 이 천체가 알 수 없는 복수심에 불타는 영혼에 의해 '홀린' 것이라 여겨진다."
 giga_eawaf.1012.desc_hive_mind:0 "§Y셀레네§!, 신비로운 §Y헬리오스§! 반대편에서 파우스트를 공전하는 암석 위성은, 언뜻 보면 파우스트 항성계에서 가장 평범한 부분처럼 보인다. 대기가 없어 수많은 충돌 분화구가 패여 있고 많은 다른 천연 위성처럼 얇은 달 먼지 층으로 덮인, 비교적 큰 암석 위성이다.

아이러니하게도 이상 징후는 §Y[ROOT.GetName]§!의 승무원들이 위성에 가까이 접근했을 때 처음 나타났다. 그들은 이상 행동을 보이기 시작했으며, 어둡고 위압적인 말의 형상으로 나타나는 환각을 보고했다.

배가 위성으로부터 떠나자마자 이 환각은 사라졌지만, 이 천체가 알 수 없는 복수심에 불타는 영혼에 의해 '홀린' 것이라 여겨진다."
 giga_eawaf.1012.a:0 "다 그들 마음속에 있는 것일 뿐이겠지... 그렇지?"
 giga_eawaf.1012.b:0 "불안하군."
 giga_eawaf.1012.c:0 "좋지 않은 징조다."
 giga_eawaf.1013.name:0 "불가능한 태양"
 giga_eawaf.1013.desc:0 "§Y헬리오스§!를 더 자세히 들여다보면 신비로운 천체에 대한 단서를 얻을 수 있으리라 기대했지만, 여전히 겉보기에 불가능한 방식으로 행동하고 있다.

우선, 헬리오스와 셀레네 모두 24시간 궤도 주기가 실제보다 훨씬 짧다—파우스트의 질량을 기반으로 한 계산에 따르면 논리적으로 약 2주 주기로 공전해야 한다.

또한 두 천체의 궤도는 원형이고 예측 가능하지만, 궤도상의 임의적인 지점에서 거의 감지하기 어려운 '진동'을 보이는데, 마치 알 수 없는 힘에 갑자기 '당기는' 것처럼 보인다.

별이 행성 주위를 도는 항성계에서 궤도가 정상적으로 작동하기를 기대하는 것 자체가 이미 꽤 무리한 일이지만, 이러한 불일치들은 파우스트를 둘러싼 끊임없이 커져가는 미해결 미스터리 더미에 더 쌓일 뿐이다.

더 나아가, 항성은 말 그대로 무에서 에너지를 끌어내는 것으로 보이는데, 어떤 알려진 핵융합 과정도 생성할 수 없을 만큼 훨씬 더 많은 방사선을 방출하며, 심지어 일부 경우에는 질량-에너지 등가의 기본 원리조차 깨뜨리고 있다."
 giga_eawaf.1013.a:0 "대체 어떻게 작동하는 거야?"
 giga_eawaf.1014.name:0 "전쟁 중인 말들"
 giga_eawaf.1014.desc:0 "항성계 자체로도 충분한 이상 현상이 아니라는 듯, §Y파우스트§!의 중심 세계는 헬리오스의 빛 덕분에 완전히 거주 가능할 뿐만 아니라, 표면에서 방출되는 무선 신호 쇄도가 이 세계가 실제로 사람이 살고 있다는 사실을 드러낸다!

이 행성은 약 12개의 종이 공유하는데, 모두 완전히 이성적이고 복잡한 사고를 할 수 있으며, 기계 시대에 해당하는 수준의 기술 발전을 이룩했다. 그러나 특히 말처럼 생긴 종들은 터무니없이 효율적인 농업, 비행, 염동력 등 다양한 초자연적 능력을 보유하고 있다.

항성계 소행성대에서 발견된 마도 수정의 상당한 매장량이 세계 전체에서도 발견되었으며, 일부 원주민 종들은 이를 자신들의 타고난 능력을 강화하고 촉매하는 데 상당히 활용하고 있다. 이로 인해 과학자들은 수정과 이 능력들이 어떤 방식으로 연관되어 있을 것이라 생각하게 되었다.

흥미롭게도, 우리는 이 행성 역사의 전환점을 목격할 시기에 딱 맞게 도착한 것 같다. 여러 종들이 실험 방법의 발전으로 자신들의 능력과 수정에 대한 이해를 엄청나게 향상시킬 수 있는 시점에 접근하고 있다. 이는 광범위한 영향을 미칠 가능성이 높고 그들의 기술 발전을 극적으로 변화시킬 수도 있다.

§Y[ROOT.GetName]§!의 보고에 따르면 소규모 팀이 지상에 배치되어 보다 영구적인 관측 기지가 설립되기 전에 이 특이한 다종 문명의 작동 방식에 대한 더 많은 통찰을 얻기를 바라고 있다."
 giga_eawaf.1014.a:0 "이제 그들이 자폭하지 않기를 바라는 수밖에."
 giga_eawaf.10141.name:0 "파우스트 조사 보고서"
 giga_eawaf.10141.desc:0 "§Y파우스트§! 표면으로의 탐험대는 행성의 원주민 문명—아니, 여러 문명들에 관한 방대한 데이터를 수집하면서도 별다른 문제 없이 진행되었다.

행성의 육지는 세 개의 큰 대륙으로 나뉘는데, 북쪽의 작은 두 대륙은 §Y에쿠스§!와 §Y그리포니아§!라 불리며, 남반구 대부분을 차지하는 큰 대륙은 §Y제브리카§!로 알려져 있다. 이 대륙들은 놀라울 만큼 다양하여, 각각 여러 독자적인 지성 종족을 품고 있다.

원주민 종들은 §Y예티§!라 불리는 두발 인간형부터, 단순히 §Y곰§!이라 불리는 네발 곰류, §Y그리폰§!이라 불리는 조류까지 다양하지만, 이 종들의 상당 부분은 말을 닮은 생명체로 §Y에퀴니언§!이라 통칭된다.

이는 여러 종을 아우르는 포괄적인 명칭으로, 특히 소형이지만 마도 능력이 뛰어난 §Y포니§!(그리폰과 함께 세 대륙 모두에 분포하는 압도적으로 다수의 종), 사막 기후에 적응한 §Y제브라§!, 더 큰 §Y호스§!, 그리고 제브리카 동쪽 끝에 서식하는 특이한 §Y키린§! 등이 포함된다.

그러나 파우스트에서 가장 흥미로우면서도 위험한 존재는 행성 표면을 누비는 여러 반신(半神) 같은 존재들의 존재다. §Y알리콘§!이라 알려진 이들은 현실을 왜곡하는 엄청나게 강력한 능력을 지니고 있으며, 행성에서 가장 강력한 국가인 §Y에퀘스트리아§!의 거의 이론의 여지 없는 통치자로 행동하는 것처럼 보인다.

탐험대원들의 공통된 의견은 이 알리콘들의 압도적인 힘을 고려할 때 파우스트를 침략하려는 시도는 §R매우 무모한§! 짓이며, 따라서 멀리서 관측하는 것이 훨씬 안전하다는 것이다."
 giga_eawaf.10141.a:0 "참으로 기묘한 세계구나."
 giga_eawaf.1015.name:0 "파우스트의 미스터리"
 giga_eawaf.1015.desc.nopsi:0 "§Y파우스트§! 항성계는 이제 §Y[ROOT.GetName]§!에 의해 완전히 탐사되었다. '깜빡이는 태양'의 미스터리는 헬리오스가 파우스트 뒤로 지나가는 것으로 쉽게 설명되었지만, 이 탐사는 해결한 것보다 더 많은 의문을 불러일으켰다.

헬리오스는 어떻게 작동하는가? 셀레네에 가까이 가면 나타나는 이상한 악몽의 근원은 무엇인가? 마도 수정들은 어디서 에너지를 끌어내는가? 그리고 가장 중요하게, 이 모든 것의 근저에 있는 현상은 무엇인가?

이 모든 것을 하나로 묶으려는 수많은 이론이 고안되었지만, 어느 것도 파우스트 항성계의 미스터리를 다른 곳에서 중대한 결함에 부딪히지 않고 정확히 설명하는 데 성공하지 못했다. 당분간은 파우스트와 그 신비로운 주민들이 수수께끼로 남아 있을 것 같다."
 giga_eawaf.1015.a.nopsi:0 "언젠가는 우리의 이해가 충분해질 것이다..."
 giga_eawaf.1015.a.nopsi.tooltip:0 "적절한 기술을 연구하면 파우스트에 대한 더 많은 통찰을 얻을 수 있을 것이다."
 giga_eawaf.1015.desc.hatepsi:0 "§Y파우스트§! 항성계는 이제 §Y[ROOT.GetName]§!에 의해 완전히 탐사되었다. '깜빡이는 태양'의 미스터리는 헬리오스가 파우스트 뒤로 지나가는 것으로 쉽게 설명되었지만, 이 탐사는 해결한 것보다 더 많은 의문을 불러일으켰다.

헬리오스는 어떻게 작동하는가? 셀레네에 가까이 가면 나타나는 이상한 악몽의 근원은 무엇인가? 마도 수정들은 어디서 에너지를 끌어내는가? 그리고 가장 중요하게, 이 모든 것의 근저에 있는 현상은 무엇인가? 이 모든 것을 하나로 묶으려는 수많은 이론이 고안되었지만, 그 중 특히 두드러지는 이론이 하나 있었다: 사이오닉 간섭의 가능성이다.

우리의 이해에 따르면, 사이 방사선은 차원 외적 기원을 가지며, 이 외부 차원의 구체적인 내용은 불분명하지만, 일부는 파우스트 항성계가 사이 방사선 원점으로부터 우리를 보호하는 자연적인 보호막이 얇은 지역에 위치할 수 있다고 주장한다.

사실이라면 파우스트 항성계는 사이오닉 오염의 온상으로서 심각한 우려의 대상이 되어야 한다. 우리 과학계에서 더 공격적인 진영은 이제 우리가 무엇을 다루고 있는지 이해하기 위해 항성계를 철저히 조사할 것을 촉구하고 있다."
 giga_eawaf.1015.a.hatepsi:0 "우선 위협 분석을 시작하라."
 giga_eawaf.1015.desc.psi:0 "§Y파우스트§! 항성계는 이제 §Y[ROOT.GetName]§!에 의해 완전히 탐사되었다. '깜빡이는 태양'의 미스터리는 헬리오스가 파우스트 뒤로 지나가는 것으로 쉽게 설명되었지만, 이 탐사는 해결한 것보다 더 많은 의문을 불러일으켰다.

헬리오스는 어떻게 작동하는가? 셀레네에 가까이 가면 나타나는 이상한 악몽의 근원은 무엇인가? 마도 수정들은 어디서 에너지를 끌어내는가? 그리고 가장 중요하게, 이 모든 것의 근저에 있는 현상은 무엇인가? 이 모든 것을 하나로 묶으려는 수많은 이론이 고안되었지만, 그 중 특히 두드러지는 이론이 하나 있었다: 사이오닉 간섭의 가능성이다.

우리의 이해에 따르면, 사이오닉스는 우리의 현실 너머 어떤 비물질적인 영역에서 기원하는 것 같으며, 이 영역의 구체적인 내용은 불분명하지만, 일부는 파우스트 항성계가 우리의 현실과 이 영역 사이의 장막이 더 얇은 현실의 한 지점에 위치할 수 있다고 주장한다.

파우스트의 모든 미스터리를 설명하는 데 지금까지 큰 가능성을 보이는 이 이론은 빠르게 인기를 얻고 있으며, 우리 과학계가 이 이론이 실제로 타당한지 확인하기 위해 항성계를 더 철저히 조사할 것을 촉구하는 수준에 이르렀다."
 giga_eawaf.1015.a.psi:0 "지체할 시간이 없다!"
 giga_eawaf.1015.b:0 "솔직히, 이 정도면 충분히 본 것 같다."
 giga_eawaf.1015.b.hatepsi:0 "이곳에 머무를 곳이 아니다."
 giga_eawaf.1015.b.tooltip:0 "파우스트의 미스터리에 대해 더 이상 조사를 진행하지 않을 것이다."
 GIGA_EAWAF_SURVEY_HELIOS:0 "헬리오스 조사"
 GIGA_EAWAF_SURVEY_HELIOS_DESC:0 "파우스트 항성계의 이상 현상이 사이오닉 간섭에 의해 발생한다는 증거가 있다. 신비로운 항성을 즉시 철저히 조사해야 한다."
 giga_eawaf.1016.name:0 "사이오닉 유레카"
 giga_eawaf.1016.desc:0 "최근 §Y사이오닉스§! 영역으로의 탐구가 과학자들로 하여금 수많은 이전 발견과 이론을 새로운 시각으로 재평가하게 만들었다.

그 중에는 다름 아닌 신비로운 §Y파우스트§! 항성계도 포함되는데, 그 마도 수정, 소형 항성, 마법처럼 보이는 생명체들은 항성계 탐사 이래로 물리학에 대한 우리의 이해에 완강히 맞서왔다.

그러나 물질 세계 너머에 있는 것에 대한 통찰로 얻은 새로운 관점 덕분에, 일부 과학자들이 파우스트 항성계를 다시 방문하여 눈에 보이는 것 이상이 있는지 확인해볼 것을 제안하고 있다..."
 giga_eawaf.1016.a:0 "당장 시작하자!"
 giga_eawaf.1017.name:0 "사이오닉 핵융합"
 giga_eawaf.1017.desc:0 "시간과 자원 모두에서 상당한 투자가 필요했지만, 과학자들은 마침내 헬리오스의 내부 작동 원리와 파우스트 항성계의 나머지 미스터리를 꿰뚫었다고 믿는다.

텔레파시 능력자들의 사이오닉 감수성 실험을 통해 항성계 전체가 현실과 이마테리움 사이의 장막이 더 얇은 공간 내에 있음이 확인되었으며, 이로 인해 초자연적 현상이 발생할 수 있다. 항성계는 지속적으로 우주를 이동하기 때문에, 과학자들은 이 현실의 '얇아짐'을 유발하는 어떤 현상이 있을 것이라 결론 짓고 헬리오스 자체를 탐사하여 답을 찾으려 했다.

열 차폐 탐침이 이 심원한 핵융합로의 깊은 곳으로 내려가면서, 헬리오스의 핵심에는 현실 자체의 소형 '균열'이 자리하고 있음이 밝혀졌는데, 이 균열은 순수한 사이오닉 에너지의 영역으로 직접 이어지는 것으로 추정된다. 헬리오스 중심의 물질이 이 균열에 정기적으로 떨어졌다가 끓어오르는 초가열 사이오닉 에너지 형태로 다시 나온다. 이 에너지는 헬리오스의 수소 외층으로 '떠오르며' 핵융합 반응을 촉발시킨다.

잘 이해되지 않는 과정을 통해 '소진된' 사이오닉 에너지는 다시 수소 핵으로 '응결'되고, 이는 신선한 사이오닉 에너지에 의해 점화된다. 융합된 헬륨 핵은 더 높은 질량으로 인해 균열에 떨어지고 사이클이 사실상 무한히 반복되어 소형 항성이 계속 빛날 수 있는 것이다!

이제 §Y사이촉매 핵융합§!이라 불리는 이 심원한 과정의 발견과 이해는 사이오닉스와 핵과학 모두에 혁명을 일으켰다. 결과적으로 많은 과학자들이 에너지를 생성하기 위해 이 과정을 직접 복제할 수 있는지 논의하고 있다."
 giga_eawaf.1017.hatepsi.desc:0 "상당한 위험과 비용을 감수하며, 과학자들은 마침내 헬리오스의 내부 작동 원리와 파우스트 항성계의 나머지 미스터리를 꿰뚫었다고 믿는다.

광범위한 사이 방사선 관측을 통해 항성계 전체가 현실과 이마테리움 사이의 장막이 더 얇은 공간 내에 있음이 확인되었으며, 이로 인해 심화된 사이 방사성 이상이 발생할 수 있다. 항성계는 지속적으로 우주를 이동하기 때문에, 과학자들은 이 현실의 '얇아짐'을 유발하는 어떤 현상이 있을 것이라 결론 짓고 헬리오스 자체를 탐사하여 답을 찾으려 했다.

열 차폐 탐침이 이 심원한 핵융합로의 깊은 곳으로 내려가면서, 헬리오스의 핵심에는 현실 자체의 소형 '균열'이 자리하고 있음이 밝혀졌는데, 이 균열은 사이오닉 위협이 기원하는 영역으로 직접 이어지는 것으로 추정된다. 헬리오스 중심의 물질이 이 균열에 정기적으로 떨어졌다가 매우 고에너지 형태의 사이 방사선으로 다시 나온다. 이 에너지는 헬리오스의 수소 외층으로 이동하여 핵융합 반응을 촉발시킨다.

잘 이해되지 않는 과정을 통해 '소진된' 사이오닉 에너지는 다시 수소 핵으로 '응결'되고, 이는 신선한 사이 방사선에 의해 점화된다. 융합된 헬륨 핵은 더 높은 질량으로 인해 균열에 떨어지고 사이클이 사실상 무한히 반복되어 소형 항성이 계속 빛날 수 있는 것이다!

이제 §Y사이촉매 핵융합§!이라 불리는 이 불길한 과정의 발견과 이해는 사이오닉스와 핵과학 모두에 혁명을 일으켰다. 이 과정을 의도적으로 재현하여 활용하는 것은 분명 너무 위험하지만, 사이오닉 과정에 대한 새로운 이해가 미래의 위협에 맞서는 데 유용할 수 있다."
 giga_eawaf.1017.a:0 "정말 놀랍다! 이 과정을 복제할 수 있는지 확인해보라."
 giga_eawaf.1017.hatepsi.a:0 "파우스트적인 연구, 이 정도면 충분하다."
 giga_eawaf.1017.a.tooltip:0 "통제된 환경에서 사이촉매 핵융합을 유도하려 시도하겠지만, 현재 보유한 것보다 더 높은 사이오닉스 이해가 필요할 수도 있다. 그래도 시도해볼 가치는 있다."
 giga_eawaf.1017.hatepsi.a.tooltip:0 "§G이 발견은 파우스트 항성계에서 사이오닉 위협이 발생할 경우 유용할 수 있다.§!"
 giga_eawaf.1017.b:0 "이 발견은 훌륭하지만, 이 정도면 충분히 멀리 왔다."
 GIGA_EAWAF_PSIONIC_FUSION:0 "사이촉매 핵융합 복제"
 GIGA_EAWAF_PSIONIC_FUSION_DESC:0 "헬리오스 핵융합 과정을 이끄는 메커니즘은 이마테리움 속으로 직접 떨어지는 물질의 복잡한 유입에 의존한다. 이 과정을 인공적으로 복제하면 훨씬 더 강력한 핵융합 반응로를 건설할 수 있다. 과학자들은 강력한 §Y사이오닉 촉매§!를 찾고, 가능하면 §Y이마테리움을 돌파할§! 방법을 발견해야 성공할 것으로 추정한다. 이 전제 조건 중 적어도 하나를 충족할 것으로 판단될 때까지 이 프로젝트를 보류하는 것이 좋다."
 giga_eawaf.10171.name:0 "사이촉매 핵융합 성공"
 giga_eawaf.10171.desc:0 "오랜 실패와 막다른 길 끝에, §Y사이촉매 핵융합§!을 통제된 환경에서 복제하려는 최신 실험이 마침내 긍정적인 에너지 출력을 달성했다.

인공 사이오닉 균열이 헬륨의 응축된 구 내에서 사이커들에 의해 유도·유지되었고, 이것이 자발적으로 균열 속으로 붕괴했다가, 헬리오스 핵심 내부처럼 끓어오르는 사이오닉 에너지로 다시 나타났다. 그런 다음 수소 핵이 나오는 에너지에 정확한 타이밍으로 주입되어, 기존 핵융합 반응로나 심지어 일반 항성에서 발견되는 것보다 몇 배나 더 강력한 극도로 강력한 핵융합 반응을 촉발시켰다.

초기 실험적 장애물을 넘어선 이제, 이 기술의 잠재적 응용은 무한하다. 상당한 에너지를 생성할 뿐만 아니라, 더 강력한 핵융합 반응은 이론적으로 현재 방법보다 훨씬 쉽게 매우 무거운 원소를 만드는 데 사용될 수 있다. 뿐만 아니라 안정화된 균열은 파우스트에서 발견되는 것과 유사한 '현실 얇아짐' 효과를 생성하여 인접 지역 내 사이오닉스의 효율성을 크게 향상시키는 것으로 나타났다.

이 빛나는 성공 이후, 이제 남은 것은 산업적으로 실용 가능한 수준으로 설계를 확대하는 것뿐이다."
 giga_eawaf.10171.a:0 "훌륭하다!"
 giga_eawaf.10172.name:0 "사이촉매 핵융합 실패"
 giga_eawaf.10172.desc:0 "유감스럽게도 §Y사이촉매 핵융합§!을 복제하려는 우리의 시도는 모두 실패로 끝났다. 우리의 현재 사이오닉스 이해가 헬리오스의 심원한 핵심에서 발견되는 매우 특정한 조건을 정확히 복제하기에는 너무 원시적인 것 같다.

우리 자체 반응로 설계는 이마테리움 돌파에 완전히 실패하거나, 사이오닉 핵융합 반응을 제대로 촉매하지 못한다. 이 프로젝트는 많은 이들에게 비싼 시간 낭비로 묘사되었지만, 일부 과학자들은 그럼에도 불구하고 그러한 프로젝트의 타당성을 믿으며, 우리가 아직 준비가 되지 않았을 뿐이라고 주장한다."
 giga_eawaf.10172.a:0 "다시 시도해라! 이번에는 될 것이다..."
 giga_eawaf.10172.a.tooltip:0 "통제된 환경에서 사이촉매 핵융합을 다시 유도하려 시도하겠지만, 사이오닉스에 대한 이해가 더 커진 후에 프로젝트를 개시하는 것이 현명할 것이다—그렇지 않으면 또 실패할 가능성이 높다."
 giga_eawaf.10172.b:0 "이것은 우리 시간 낭비였다. 프로젝트를 취소하라."
 giga_eawaf.2001.name:0 "심연이 깨어나다"
 giga_eawaf.2001.desc:0 "파우스트 표면에 무언가가 꿈틀거리고 있다. 제브리카 북서쪽 끝에 위치한 국가 §Y히포그리피아§!의 시포니 탐험가들이 최근 파우스트의 광대한 바다 중 가장 깊고 어두운 협곡 중 하나인 §Y마레이아나 해구§!의 깊은 곳을 탐험하는 원정에 나섰다.

탐험가들이 돌아왔을 때, 그들 안에는 무언가가 변해 있었다. 어떤 신비로운 존재가 그들을 사로잡은 것 같았고, 마치 그들의 영혼 자체가 홀린 것 같았다. 그 존재는 다른 시포니들에게 퍼져나가며 그들의 정신을 장악하고 히포그리피아 전역으로 영향력을 확산시키기 시작했다.

불과 몇 주 만에 이 영향력은 비교적 유혈이 없는 쿠데타로 절정에 달해 전 히포그리피아 정부를 무너뜨리고, 명백히 이 모든 행위의 배후인 심연의 뱀 같은 마음 지배 악마 삼인방 §Y사이렌§!들이 이제 §Y시레날리아§!라 부르는 땅의 새로운 통치자로 들어섰다.

우리의 전초 기지가 파악한 바에 따르면, 이 사이렌들은 오래전 그들의 종족에게 닥친 잊혀진 재앙에 대한 강렬한 복수심에 이끌리는 것 같다. 따라서 그들이 단순히 히포그리피아에 머무르지 않고 제브리카의 나머지 지역, 나아가 파우스트 전체로 영향력을 확산하려 할 것이 분명하다.

당면한 과제는 어렵다. 이미 전 히포그리피아 여왕을 포함한 저명한 히포그리피아 관리들로 구성된 저항 단체 §Y아리스 저항군§!이 시레날리아의 부상에 맞서 그들의 권리 있는 땅에서 사이렌의 통치를 끝내기 위해 봉기했으며, 그들이 구 질서를 회복하는 데 성공할지는 아무도 알 수 없다.

결과가 어찌 되든, 이 상황을 예의 주시하는 것이 우리에게 최선이다."
 giga_eawaf.2001.a:0 "기묘하군. 상황을 계속 지켜봐라."
 giga_eawaf.2002.name:0 "사이렌들, 히포그리피아 장악"
 giga_eawaf.2002.desc:0 "히포그리피아의 구 질서 위에 §Y시레날리아§!가 군림한다. 몇 년에 걸친 힘겨운 반 파르티잔 전쟁과 방첩 작전 끝에 §Y아리스 저항군§!은 체계적으로 해체되었다.

흥미롭게도 저항군의 전 대원들은 추방되거나 암살된 것이 아니라, 사이렌들에 의해 직접 홀려 마치 이전의 이상을 단순히 포기하고 전 적들과 힘을 합친 것처럼 보이는 소름 끼치는 모습을 보였다.

그러한 관찰은 사이렌들이 실제로 신비롭고 매혹적인 노래를 통해 다른 지성 존재를 직접 정신 지배할 수 있다는 것을 확인해주었다. 이 노래는 사이렌들 자체 내에 박힌 특이한 수정들에 의해 구동되는 것으로 보이나, 이 홀림의 실제 메커니즘은 우리에게 완전히 알려지지 않았다.

이 능력이 사이렌들이 능동적으로 통제를 부과할 수 있게 해주며, 이미 시레날리아의 인근 국가들에 영향력을 확보하는 데 이 힘을 활용하고 있다.

특히 전 히포그리피아 정부로부터 물려받은 강력한 해군과 공군을 보유한 시레날리아를 고려할 때, 우리는 사이렌들이 앞으로 몇 년 안에 제브리카 북부의 나머지 지역으로 영향력을 확산하는 데 큰 어려움이 없을 것으로 추정한다.

파우스트의 나머지에 대해서는, 일부에서 사이렌들의 성장에 우려를 표하고 있지만, 대부분은 현재 사이렌들을 미래의 연합군 손에 결국 종말을 맞을 또 다른 제국으로 무시하고 있다."
 giga_eawaf.2002.a:0 "계속 지켜봐라."
 giga_eawaf.20021.name:0 "사이렌들, 전복되다"
 giga_eawaf.20021.desc:0 "사이렌들의 새 질서는 애초에 지속되어서는 안 됐던 것 같다. 수개월의 은밀한 활동 끝에 §Y아리스 저항군§! 대원들이 시레날리아에 맞선 전면 반란을 일으켰다.

국가의 거리와 도시 곳곳에서 홀리지 않은 자들이 홀린 자들과 싸우며, 후자는 자신들의 주인을 지키기 위해 죽을 때까지 싸운다. 그러나 결국 §Y에퀘스트리아§!의 충분한 지원을 받아 조화로운 저항군이 승리를 거두면서 사이렌의 질서가 무너지고 그들의 홀리는 마법은 양분을 잃어 사라진다.

구 현상을 복원하기 위한 새로운 통합 히포그리피아 정부가 수립되었으며, 사이렌들의 행방은 알 수 없다. 전투에서 사망했거나, 다시 한 번 힘을 모으고 어쩌면 다음 행성 지배 시도를 준비하기 위해 바다의 깊은 곳으로 돌아갔을 것이다.

하지만 가까운 미래에는 히포그리피아인들이 적어도 향후 몇 세기 동안 사이렌이 더 이상 위협이 되지 않는다는 사실을 알고 안심할 수 있다."
 giga_eawaf.20021.a:0 "그들도 적수를 만났구나."
 giga_eawaf.2003.name:0 "제브리카 북부의 함락"
 giga_eawaf.2003.desc:0 "시레날리아의 이웃 국가들은 사이렌들의 집요한 진격에 맞설 기회가 거의 없었다. 강력한 해군과 공군을 앞세운 사이렌들은 인근 국가인 §Y키롭테라§!와 §Y콜타지§!를 향한 일련의 공세를 개시하며 §Y제브리카 북부 전쟁§!을 발발시켰다. 이 전쟁은 결국 총 사이렌 승리로 끝났고, 이후 제브리카 북부 대부분에 자신들의 패권을 강요했다.

이 엄청난 승리 이후, 사이렌들은 이미 다음 주요 목표인 시레날리아 북서쪽 바다 건너 위치한 대륙 규모 국가 §Y에퀘스트리아§!를 노리고 있다. 과학자들은 처음에 사이렌들이 다음 목표로 그토록 강력한 적을 선택한 이유에 혼란스러웠지만, 추가 연구를 통해 §Y에퀘스트리아의 기둥§!이라 알려진 집단이 수천 년 전 사이렌들의 몰락을 초래한 것으로 보인다는 사실이 밝혀졌다.

에퀘스트리아 자체에서 기원한 이 '기둥들'은 모든 예상을 뒤엎고 여전히 살아 있는 것으로 밝혀졌으며, 따라서 사이렌들은 마레이아나 해구 깊은 곳으로의 이전 추방에 대해 기둥들에게 복수를 실행하기로 결심한 것 같다.

이 곧 닥쳐올 전쟁은 파우스트가 지금까지 경험한 것 중 가장 엄청난 규모가 될 것이 확실하다. 이미 사이렌들은 미래의 에퀘스트리아 침공을 위한 발판으로 활용하기 위해 남서쪽의 §Y마레집트§!와 §Y아비시니아§!를 포함한 지리적으로 핵심적인 위치의 더 많은 국가들을 정복하고 있다.

에퀘스트리아의 힘을 감안할 때, 파우스트의 많은 주민들은 이것이 결국 사이렌들의 때 이른 종말로 끝날 것이라 믿지만, 사이렌들 자신은 이 야심찬 계획을 끝까지 실행하기로 결심한 것 같다."
 giga_eawaf.2003.a:0 "꽤나 큰 싸움이 될 것 같군."
 giga_eawaf.20031.name:0 "시레날리아, 패배하다"
 giga_eawaf.20031.desc:0 "불행히도 사이렌들에게, 제브리카 북부 국가들은 시레날리아의 신생 제국에 충분한 적수임이 드러났다.

§Y키롭테라§!와 §Y콜타지§! 국가들을 향한 처음에는 성공적인 일련의 공세로 §Y제브리카 북부 전쟁§!을 발발시켰지만, 앞서 언급한 국가들이 재빨리 예상치 못하게 연합하여 사이렌들의 진격에 하나로 맞서면서 사이렌들의 공세는 금세 정체되었다.

그리포니아 남부 출신의 강력한 국가 §Y윙바디§!가 전쟁에 참전하면서 상황은 더욱 악화되었다. 윙바디아 해군이 분명히 저울을 사이렌들에게 불리하게 기울였고, 불과 몇 달 만에 시레날리아의 핵심 영토가 위협을 받게 되었다.

몇 달간의 포위 끝에 시레날리아의 수도들을 향한 몇 번의 힘겨운 공세 끝에, 패배가 불가피하다는 것을 깨달은 사이렌들은 현장에서 도망쳐 다시 바다 깊은 곳으로 자취를 감췄다.

사이렌들이 사라지자 시레날리아 정부의 남은 세력은 빠르게 붕괴했고, 그들의 전 영토는 지역 재건과 소수 남은 광신적인 친-사이렌 세력의 완전한 제거를 담당하는 재건 위임통치하에 놓였다.

사이렌들의 진짜 행방은 알 수 없지만, 적어도 몇 세기 동안은 다시 나타날 가능성이 없으며, 파우스트 주민 대다수는 그들이 영구적으로 패배했다고 판단하고 있다."
 giga_eawaf.20031.a:0 "그들도 적수를 만났구나."
 giga_eawaf.2004.name:0 "사이렌들, 에퀘스트리아를 무너뜨리다"
 giga_eawaf.2004.desc:0 "상상도 못했던 일이 벌어졌다! 모든 예상을 뒤엎고 §Y시레날리아§!가 대륙 규모 국가 §Y에퀘스트리아§!를 제압하는 데 성공했다.

일련의 맹렬한 해상 침공이 전례 없는 속도와 힘으로 에퀘스트리아 남동부 해안을 강타했고, 수백만 명의 홀린 군대가 에퀘스트리아 수도 §Y캔터롯§!을 향해 북쪽으로 진격했다.

자살 돌격과 가스전의 결합으로 사이렌 군대는 방심하고 있던 에퀘스트리아인들에게 치명적인 사기 타격을 입혔고, 얼마 지나지 않아 시레날리아가 수도를 포위하고 에퀘스트리아의 주요 산업·인구 거점 대부분을 점령했다.

결국 캔터롯이 함락되자, 사이렌들은 에퀘스트리아의 가장 강력한 수호자들을 홀리고 그들의 힘을 이용해 에퀘스트리아의 두 통치 §Y알리콘§! 영혼을 §Y헬리오스§!와 §Y셀레네§!에 유배시킨 후, 에퀘스트리아의 기둥들을 이마테리움 깊은 곳으로 추방함으로써 에퀘스트리아와 그 국민에 대한 완전한 지배권을 확보했다.

파우스트에서 가장 강력한 국가가 함락됨에 따라, 사이렌들은 이제 전례 없는 규모의 인력과 산업에 접근할 수 있게 되었으며, 이를 이미 §Y에쿠스§! 대륙 전체를 완전히 장악하기 위해 에퀘스트리아 북쪽 이웃들을 향한 공세에 활용하고 있다.

우리 전초 기지는 이제 사이렌들의 영향력이 파우스트 전체, 그리고 어쩌면 그 너머까지 확대되는 것은 시간 문제라고 판단하고 있다..."
 giga_eawaf.2004.a:0 "상당히 효율적이구나."
 giga_eawaf.2004.a.tooltip:0 "사이렌들을 막으려 했다면, 이제는 직접적인 지상 침공 외에는 아무것도 할 수 없다."
 giga_eawaf.20042.name:0 "초자연적 통찰"
 giga_eawaf.20042.desc:0 "사이렌들의 방식에 대한 연구와 파우스트의 매우 이례적인 마도 수정에 대한 추가 조사가 마침내 결실을 맺었다.

실제로 이 세계와 그 본질에 관한 모든 것은 의식이 있는 모든 것에 스며드는 근본적인 '힘'의 존재를 가리키며, 사이렌들은 이를 능동적으로 조종하여 목적을 달성하는 것 같다. 우리 과학팀은 이 현상을 더 깊이 탐구하고 싶어 한다."
 giga_eawaf.20042.a:0 "매혹적이다... 추가 연구를 진행하라!"
 giga_eawaf.20042.b:0 "우리 시간을 쏟을 가치가 없다."
 giga_eawaf.20041.name:0 "에퀘스트리아가 사이렌을 정복하다"
 giga_eawaf.20041.desc:0 "많은 사람들이 예상했던 대로, §Y에쿼스트리아§!에 대한 사이렌의 공격은 완전한 재앙으로 드러났습니다. 침공은 처음에는 성공적이었지만, 에쿼스트리아는 막대한 인력 자원을 신속하게 동원하여 사이렌알리아의 에쿠스 침공을 먼저 저지한 후, 이를 물리쳤습니다.\n\n그 뒤로 사이렌알리아의 본토에 대한 대규모 다각적 수륙 침공이 시작되었고, 사이렌들은 엄청난 저항에 직면했지만, 결국 에쿼스트리아의 압도적인 산업력과 군사력에 의해 무너졌습니다.\n\n사이렌알리아가 완전히 점령된 후, 에쿼스트리아의 통치자 알리콘들은 사이렌들이 도망치려 할 때 그들을 포획했습니다. 사이렌알리아가 다시는 부활할 수 없도록 하기 위해, 에쿼스트리아의 기둥들과 알리콘들은 힘을 모아 사이렌의 영혼을 이마테리움의 깊은 곳으로 추방하여 최소 몇 천 년 동안 감금될 수 있도록 했습니다.\n\n사이렌알리아가 패배하고 그 통치자들이 현실에서 추방됨에 따라, 사이렌들의 세계 지배에 대한 희망은 확실히 좌절되었습니다."
 giga_eawaf.20041.a:0 "그래도 파우스트에게 희망이 있습니다."
 giga_eawaf.2005.name:0 "파우스트를 정복하는 사이렌"
 giga_eawaf.2005.desc:0 "§Y에퀘스트리아§!가 사이렌들에게 함락되면서, 파우스트의 나머지 지역도 함락되는 것은 시간 문제일 뿐이었습니다. 사이렌의 부상을 저지하기 위해 다른 국가들이 급하게 통합을 시도했지만, 결국 그것은 너무 적고 너무 늦었습니다.\n\n그리고 이렇게 몇 년간의 치열한 전쟁 끝에, 사이렌들은 마침내 §Y사이레날리아§!의 영향력을 파우스트 전역으로 확장했습니다. 세계의 표면에서, 20억의 지성이 사이렌의 매혹적인 마법에 빠져들어, 사이레날리아의 끊임없이 성장하는 산업력을 위해 끝없이 수고하고 있습니다.\n\n전 세계가 그들의 통제 아래에 놓인 지금, 사이렌들이 다음 단계로 별들로 나아갈 가능성이 분명해 보입니다. 그러나 그들이 그렇게 할 방법은 불확실합니다. 강력한 마법에도 불구하고, 사이레날리아는 현재로서는 심지어 초기의 항성 제국에게도 완전히 그리고 절망적으로 뒤처져 있으며, 우주로의 확장을 시도할 경우 압도적인 화력에 직면할 가능성이 높습니다.\n\n현재로서는, 우리의 전초 기지가 사이렌을 계속 관찰할 것이며, 사이레날리아가 우주로의 확장을 계획하기 시작하면 즉시 우리 정부와 군대에 알릴 것입니다."
 giga_eawaf.2005.a:0 "우리가 그들이 무슨 짓을 하려 한다면 그들을 짓밟을 것입니다."
 giga_eawaf.20051.name:0 "사이렌의 비밀인가?"
 giga_eawaf.20051.desc:0 "우리의 시렌에 대한 비밀스러운 지원은 시렌의 마법 작용과 파우스트의 마법 결정이 시레날리아에 의해 어떻게 적극적으로 활용되었는지에 대한 귀중한 통찰을 얻을 수 있게 해주었습니다.\n\n우리 과학자들은 이제 지역 소행성대에서 회수한 이 결정 샘플을 사용하여 이 효과를 어느 정도 재현할 수 있을 것이라고 확신하고 있습니다. 비록 규모는 작고 효율성은 훨씬 낮겠지만, 이는 우리 정부와 사회 내에서... 흥미로운 응용을 가질 것입니다."
 giga_eawaf.20051.hatepsi.desc:0 "우리의 비밀리에 사이렌을 지원한 덕분에 사이렌의 마법 작용과 파우스트의 마법 결정이 사이레날리아에 의해 어떻게 활용되었는지에 대한 귀중한 통찰을 얻을 수 있었습니다.\n\n우리 과학자들은 이제 지역 소행성대에서 회수한 이 결정 샘플을 사용하여 이러한 효과를 어느 정도 재현할 수 있을 것이라고 확신하고 있습니다. 비록 규모는 작고 효율성은 훨씬 낮겠지만, 이를 통해 우리는 이러한 악의적인 위협에 대한 방어를 연구할 수 있습니다."
 giga_eawaf.20051.a:0 "우리는 그들의 방법을 더 조사해야 합니다."
 giga_eawaf.20051.b:0 "이것은 너무 위험합니다."
 giga_eawaf.20061.name:0 "신비로운 힘의 급증"
 giga_eawaf.20061.desc:0 "이는 시레날리아의 수도를 중심으로 형성된 것처럼 보입니다.\n\n시렌들이 파우스트의 마법 결정체를 모아 거대한 주문을 시전하려는 과정에 있는 것으로 보입니다. 우리의 측정에 따르면, 파우스트의 모든 결정체에 포함된 에너지는 파우스트 표면을 넘어 그 지역 행성계 전체에 걸쳐 마법장을 생성하기에 충분할 것입니다.\n\n이 '주문'의 효과가 무엇일지는 알 수 없지만, 모든 일이 너무 빠르게 진행되고 있어 우리가 실제로 개입할 수 있는 상황이 아닙니다. 따라서 우리의 과학자들은 §R파우스트 시스템에서 모든 귀중한 자산을 대피시킬 것을 권고하고 있습니다§!전력 서지가 정점에 도달하기 전에, 이는 약 §Y3개월§! 후에 발생할 것으로 예상됩니다."
 giga_eawaf.20061.a:0 "그건 좋지 않습니다."
 giga_eawaf.20071.name:0 "에테리얼 장막에 휩싸인 파우스트"
 giga_eawaf.20071.desc:0 "Faust와 그 행성계가 단순히 사라지는 동안, 힘의 급증이 최대 강도에 도달합니다.\n\n사이렌의 대마법이 절정에 이르면서, 거대한 양의 에테리얼 에너지가 Faust에서 방출되며, 이는 아마도 엄청난 양의 마법 결정체에 의해 발생한 것일 것입니다. 이 필드는 처음에 Sirenalia를 둘러싼 후, Faust를 감싸고, 결국 전체 시스템을 감싸게 됩니다.\n\n필드가 Faust의 행성 이웃을 모두 집어삼키는 데는 몇 시간밖에 걸리지 않으며, 그 근처에 있는 모든 것, 즉 배, 행성, 떠다니는 잔해는 필드에 의해 불가피하게 흡수됩니다.\n\n대략 하루가 지나고, 이제 §Y에테리얼 장막§!으로 불리는 이 필드는 안정화되며, 모든 하이퍼레인을 방해하고 다른 형태의 FTL 여행을 완전히 불가능하게 만듭니다. 시스템을 조사하기 위해 발송된 배와 전송물은 단순히 존재에서 사라져 다시는 볼 수 없게 됩니다. 결론은 명확합니다: 당분간 Faust 시스템은 사실상 은하에서 제거된 상태이며, 이는 분명히 사이렌의 계획의 결과입니다.\n\n이 이상한 장막이 과연 사라질지는 불확실하지만, 그 에너지 신호의 미세한 변동은 약 §Y한 세기가§! 지나면 결국 사라질 수 있음을 나타내는 것처럼 보입니다. 그러나 이것이 정확한지 아니면 단순한 추측인지 여부는 두고 볼 일입니다."
 giga_eawaf.20071.a:0 "어떻게... 특이하군요. 그들이 간 것 같네요."
 giga_eawaf.20071.hatepsi.a:0 "우리의 현재 방어력은 우리를 보호하기에 충분하지 않습니다."
 giga_eawaf.20071.a.tooltip:0 "§Y파우스트§!는 §Y에테리얼 장막§!에 최소한 §Y백 년§! 동안 휩싸여 있습니다. 시스템에 침입하려는 시도는 재앙적으로 끝날 것입니다.\n§R장막과 직접 인접한 시스템은 피하는 것이 현명할 수 있습니다...§!"
 giga_eawaf.20072.name:0 "파우스트 시스템이 에테리얼 장막에 휩싸였습니다."
 giga_eawaf.20072.desc:0 "기이한 §Y파우스트§! 시스템은 지구형 세계 주위를 도는 미니어처 별을 품고 있는 것으로 알려져 있으며, 갑자기 은하 전역의 모든 센서에서 사라졌습니다.\n\n추가 조사 결과, 파우스트 자체와 그곳에 있었던 모든 함선을 포함한 전체 시스템이 거대한 §Y에테리얼 장막§!에 휩싸여 있어 시스템 자체에 대한 관찰이나 진입이 금지되었습니다.\n\n산발적인 보고에 따르면, 이는 최근 일련의 힘든 전쟁을 거쳐 파우스트 전역을 매혹적인 정신 지배 마법으로 통합한 행성 하이퍼파워인 §Y사이레날리아§!의 일종의 '주문'에 의한 것으로 보입니다.\n\n이 장막의 목적이 무엇인지는 알 수 없지만, 장막의 에너지 패턴의 변동은 대략 §Y1세기§!가 지난 후에 장막이 사라질 가능성이 있음을 나타내고 있으며, 이것이 단순한 예측 이상인지 여부는 누구도 알 수 없습니다.\n\n현재로서는 전체 시스템이 사실상 은하에서 제거되었으며, 이 기이한 영역 근처에서는 주의하는 것이 현명할 것입니다."
 giga_eawaf.20072.a:0 "가장 기이합니다."
 giga_eawaf.20072.hatepsi.a:0 "우리가 놓친 게 뭐죠?!"
 giga_eawaf.30001.name:0 "에테리얼 수의 변동"
 giga_eawaf.30001.desc:0 "이전 몇 개월 동안, §Y에테리얼 장막§!에서 발생하는 마법적 에너지 수치가 §Y파우스트§!의 실종 이후 안정적으로 유지되었으나, 이제는 명확한 이유 없이 변동하기 시작했습니다.\n\n장막 내부에서 무슨 일이 일어나고 있는지에 대한 세부 사항은 여전히 파악할 수 없지만, 이는 분명히 몇 년 전 무력으로 시스템을 장악한 §Y사이렌§!의 어떤 활동을 나타냅니다.\n\n우려스럽게도, 변동 패턴은 에테리얼 장막이 다음 §Y5년§! 내에 스스로 unraveling될 가능성이 높다는 것을 시사합니다."
 giga_eawaf.30001.a:0 "우리는 최악의 상황을 예상해야 합니다."
 giga_eawaf.30002.name:0 "시레날리아 - §H아다지오 다즐§!"
 giga_eawaf.30002.desc:0 "인간들! 저는 프리쇼를 좋아하지 않으니 이번에는 바로 본 공연으로 넘어갑시다. 여러분이 어떻게든 자신의 것이라고 생각하는 이 은하는 사실 우리가 차지할 수 있는 것입니다. 우리는 곧 이 은하를 우리의 것으로 만들 계획입니다. 지금 항복하는 것을 선택할 수도 있지만, 우리는 이 게임이 어떻게 진행되는지 잘 알고 있지 않습니까? 결국 여러분이 우리에게 무엇을 제공할지 기대하고 있습니다."
 giga_eawaf.30002.bye:0 "우리는 당신의 종족을 심연으로 되돌려 보낼 것입니다!"
 giga_eawaf.30003.name:0 "사이렌의 귀환"
 giga_eawaf.30003.desc:0 "사이렌들이 스스로 고립되는 것이 아니라, 에테리얼 수막 아래에서 음모와 계획을 세우고 있다는 것은 분명합니다. 한때 푸르렀던 §Y파우스트§!의 세계 주위에는 §Y수막음악 지배자§!라는 이름의 신비로운 거대 구조물이 떠오르고 있으며, 그 목적은 분명합니다: 사이렌의 정신 조종 노래의 범위를 확대하여 §R전체 은하§!를 덮는 것입니다.\n\n이를 위해, 지배자는 분명히 파우스트를 중심으로 강력한 §R갈등 필드§!를 생성합니다. 파우스트 근처, 현재 §R내부 필드§!로 알려진 지역 내에서는, 마법이 충분히 강력하여 너무 가까이 접근하는 어떤 선박도 즉시 §R정신 조종§!할 수 있으며, 따라서 우리는 반드시 §R이 내부 필드§!를 피해야 합니다. 반격 조치가 마련될 때까지는 어떤 대가를 치르더라도 말입니다.\n\n더 멀리 떨어진 곳에서는 필드의 효과가 약해지지만, 그럼에도 불구하고 §P외부 필드§!에서는 여전히 존재하며, 외부 필드에 갇힌 세계의 인구는 서로에 대한 갈등과 증오의 수준이 높아지는 것을 경험하게 됩니다.\n\n놀랍게도, 이 갈등은 분명히 사이렌들이 '먹고 사는' 것이며, 즉 그들이 얻는 §R갈등§!이 많을수록 §Y수막음악 지배자§!가 마법을 더 멀리 투사할 수 있게 되고... 사이렌들이 더 많은 갈등을 가지게 됩니다. 따라서 사이렌알리아는 지배자가 긍정적인 피드백 루프를 시작하여 §R내부 필드§!가 우리의 전체 은하를 집어삼키기 전에 반드시 저지해야 합니다.\n\n'갈등', 지배자, 마법 및 필드의 실제 작동 방식은 여전히 우리를 피하고 있기 때문에, 사이렌에 대한 우리의 지식을 추적하기 위해 §Y상황§!이 시행되었습니다."
 giga_eawaf.30003.a:0 "지속적으로 그들을 모니터링하세요."
 giga_eawaf.30003.hatepsi.a:0 "모든 두려움이 현실이 됩니다."
 giga_eawaf.4000.name:0 "시레날리아"
 giga_eawaf.4000.desc.adagio:0 "당신은 완전하고 무조건적인 항복을 제안하러 오셨습니까? 아니요? 그렇다면 왜 여기 있는 것조차 귀찮게 하고 있습니까?\n\n\n\n$giga_eawaf_adagio_buffs$"
 giga_eawaf.4000.desc.aria:0 "이걸 빨리 끝내세요. 당신 같은 생물과 시간을 낭비할 여유가 없어요.\n\n\n\n$giga_eawaf_aria_buffs$"
 giga_eawaf.4000.desc.sonata:0 "오오, 당신을 본 적이 없는 것 같아요! 아니면 본 적이 있을지도 모르겠네요! 당신처럼 이상한 새로운 사람들이 너무 많아서 기억하기가 힘들어요!\n\n\n\n$giga_eawaf_sonata_buffs$"
 giga_eawaf.4000.bye:0 "화면을 끕니다."
 giga_eawaf.6000.name:0 "기계 외부 방어가 뚫렸습니다!"
 giga_eawaf.6000.desc:0 "우리의 용감한 함대는 사이렌의 두려운 §Y안개 음향 조종기§!의 외부 무기 배치를 파괴하는 데 성공했습니다.\n\n이러한 중요한 하드포인트의 손실로 인해 조종기의 §Y심연의 핵§!이 파우스트 자체를 감싸고 있으며 전체 장비에 전력을 공급하고 있습니다. 이를 파괴하지 않으면 사이렌의 광기를 끝낼 수 없습니다."
 giga_eawaf.6000.a:0 "즉시 공격하라!"
 giga_eawaf.6001.name:0 "장막음향 매혹자 파괴!"
 giga_eawaf.6001.desc:0 "Enthraller의 §Y심연의 핵§!이 파괴되면서, 은하 전역에서 사이렌의 마법을 증폭시키는 '커패시터' 역할을 하던 이 거대한 구조물은 빠르게 재앙적인 붕괴를 겪어 파우스트 자체를 둘러싼 행성 크기의 잔해 필드로 변했습니다.\n\n이후 §Y갈등의 필드§!의 완전한 분해가 이어졌고, 사이렌은 이제 파우스트 자체 바로 외부에 있는 대부분의 자산에 대한 통제를 잃었으며, 그들은 절망적인 최후의 저항을 기대하며 이제 파우스트로 후퇴했습니다."
 giga_eawaf.6001.a:0 "그들은 이제 더 이상 도망칠 곳이 없습니다."
 giga_eawaf.60022.name:0 "사이렌의 최후의 저항"
 giga_eawaf.60022.a.desc:0 "우리 군대가 §Y파우스트§!에 착륙하자, 코너에 몰린 사이렌들이 수백만의 정신 지배된 파우스티안들을 우리의 군단에 직접 던지기 시작했습니다!\n\n우리 지휘관들이 실망하는 것과는 달리, 전체 국가의 하인들이 종종 적절한 장비나 전투 경험 없이 이제 그들의 세계에 대한 우리의 불가피한 진격을 늦추기 위한 필사적인 시도로 죽음을 향해 행진하고 있습니다.\n\n아무런 조치가 취해지지 않는다면, 사이렌들은 파우스트의 무고한 인구 전체를 희생할 의도가 분명하며 - 따라서 행성의 실제 가치 대부분을 - 자신들에게 조금 더 시간을 벌기 위해 희생할 것입니다..."
 giga_eawaf.60022.b.desc:0 "우리 함대가 §Y파우스트§!를 폭격하는 동안, 코너에 몰린 사이렌들은 행성의 방어를 유지하기 위해 수백만의 정신 지배된 파우스티안들을 던지기 시작했습니다!\n\n우리 제독들이 실망하는 것과는 달리, 제대로 된 장비나 전투 경험 없이도 전체 국가의 하수인들이 파우스트의 반궤도 무기의 찌꺼기를 장착하기 위해 줄을 서고 있어, 우리 함선들은 계속 발포해야만 합니다.\n\n아무런 조치가 취해지지 않는다면, 사이렌들이 파우스트의 무고한 인구 전체를 희생시키려는 의도가 분명하며 - 따라서 행성의 실제 가치 대부분을 - 그들 스스로에게 조금 더 시간을 벌기 위해서입니다..."
 giga_eawaf.60022.a:0 "우리는 즉시 이 일을 중단해야 합니다! 파우스티안들을 구출할 방법을 조사하십시오."
 giga_eawaf.60022.b:0 "이 세계가 그들이 원하는 대로 우리의 힘 아래에서 부서지게 하자."
 giga_eawaf.60024.name:0 "파우스트의 파괴"
 giga_eawaf.60024.desc:0 "__STELLARIS_TOKEN_N__ 힘의 압도적인 세력으로 §Y파우스트§!의 세계는 그들의 사이렌 주인들과 함께 완전히 파괴되었습니다. 이로 인해 수많은 생명이 희생되었지만, 이는 마침내 사이렌의 광기의 확실한 종말을 보장할 것입니다."
 giga_eawaf.60024.a:0 "더 큰 선을 위해서였습니다."
 giga_eawaf.60025.name:0 "파우스트의 몰락"
 giga_eawaf.60025.desc:0 "사이렌의 최선의 시도에도 불구하고, 수십억의 파우스티안들이 헛된 희생을 치른 끝에, §Y파우스트§!의 세계는 우리의 힘 아래 무너졌습니다.\n\n적어도, 그 잔여물은 그렇습니다. 행성 인구의 99% 이상이 전투 중에 사망하여, 전체 대륙이 지능적인 생명체 없이 황폐해지고, 우리의 군대가 점령하기 시작한 거대한 도시와 산업 지대의 음침한 해골 잔해로 덮여 있습니다. 사이렌의 마법이 파우스트의 급격한 인구 감소로 인해 사라졌을 때, 전 인구의 겨우 1%만이 생존할 수 있었습니다.\n\n사이렌 §Y자체는 §!명백히 §Y마레이나 해구§!의 깊이로 다시 후퇴했지만, 우리의 지휘관들은 행성 측 군대가 이 괴물들을 한 번에 처치하기 위해 이미 해양 깊이로의 원정을 조직하고 있다고 보장했습니다."
 giga_eawaf.60025.a:0 "승리, 하지만 대가가 무엇인가?"
 giga_eawaf.60251.name:0 "사이렌의 몰락"
 giga_eawaf.60251.desc:0 "사이렌의 끝은, 더 나은 표현이 없어서 그렇지만, 다소 비극적이지 않은 결말이었습니다. 우리의 탐사대가 마레이나 해구로 내려간 후, 그 구성원들은 해저의 신비로운 지질 형성물 속에 숨어 있는 사이렌을 빠르게 발견했습니다.\n\n그들은 물론 마법을 사용하여 저항하려 했지만, 증오를 끌어낼 인구가 전혀 없고, 우리의 마법 해제 기술에 의해 절망적으로 저지당한 이 시도는 우리 병사들의 잠수복 내에서 에너지 수치를 급증시키는 것 외에는 별다른 효과가 없었으며, 따라서 이어진 일은 고에너지 무기에 의해 세 사이렌이 신속하게 기화되는 것이었습니다.\n\n그러나 이상하게도, 한때 사이렌에 박혀 있었고 그들에게 힘을 제공했다고 전해지는 붉은 결정들이 이 모든 고난을 somehow 견뎌낸 것으로 밝혀졌으며, 추가 조사를 위해 마법적으로 안전한 용기 안에서 우리 병사들에 의해 회수되었습니다."
 giga_eawaf.60251.a:0 "이 수정체들은... 유용할 수 있습니다."
 giga_eawaf.60251.b:0 "그들을 태양으로 던져버려, 그들을 파괴하라!"
 giga_eawaf.60251.hatepsi.b:0 "우리는 이제 주저하지 않을 것입니다. 그들을 파괴하십시오."
 giga_eawaf.60026.name:0 "파우스트의 몰락"
 giga_eawaf.60026.desc:0 "비록 사이렌들이 최선을 다했지만, 수십억의 파우스티안들이 헛된 희생을 치렀음에도 불구하고, §Y파우스트§!의 세계는 §Y[giga_eawaf_sirens_killer_country.GetName]§!의 힘에 굴복했습니다.\n\n혹은 적어도 남아 있는 것들입니다. 행성 인구의 99% 이상이 전투 중에 사망하여, 전체 대륙이 지능적인 생명체 없이 황폐해지고 거대 도시와 산업 지대의 음산한 해골 잔해로 덮여 있습니다. 사이렌의 마법이 파우스트의 급격히 줄어드는 인구로 인해 사라졌을 때, 이전 인구의 겨우 1%만이 생존할 수 있었습니다.\n\n사이렌들(§Y사이렌§!)은 처음 나타났던 §Y마레이나 해구§!의 깊숙한 곳으로 명백히 후퇴했지만, §Y[giga_eawaf_sirens_killer_country.GetName]§!가 그들을 신속히 처리할 가능성이 높습니다."
 giga_eawaf.60026.a:0 "암울한 승리."
 giga_eawaf.60027.name:0 "거울의 비전"
 giga_eawaf.60027.desc:0 "우리 과학 부서는 파우스트의 궤도 스캔과 지표에 대한 대담한 탐험을 통해, 파우스트의 모든 인구를 희생하지 않고도 사이렌을 무력화할 수 있는 방법을 발견했을지도 모른다고 보고했습니다.\n\n실제로, 파우스트가 '현실'이 약한 시공간의 영역에 위치하고 있다는 것은 이미 알려져 있었지만, 이제 파우스트의 표면에 있는 특정 지점, 즉 원주민들이 §Y캔터롯§!이라고 부르던 근처가 '거울 영역'과 가까운 차원적 근접성에 있다는 것이 밝혀졌습니다.\n\n연결의 이유와 이 영역의 본질은 알려지지 않았지만, 우리 과학 부서는 사이렌이 사용하는 정신 조종 수정체 샘플과 주어진 지역에 대량의 에너지를 갑작스럽게 방출함으로써 '현실의 구조'를 '부수고' 일시적인 '차원 소용돌이'를 생성할 수 있을 것이라고 이론화하고 있습니다. 이를 통해 우리는 사이렌을 앞서 언급한 대체 차원으로 '추방'할 수 있을 것입니다.\n\n하지만 이 계획은 최대한의 신속함과 상황에 대한 완벽한 지식을 요구하며, '희생'이 조정된 수정체를 가지고 소용돌이에 뛰어들어 사이렌을 끌어당기고 추방하는 데 필요한 마법적 연쇄 반응을 일으켜야 합니다.\n\n현재로서는 오직 §Y[giga_eawaf_sirens_scientist_sacrifice.GetName]§!만이 이러한 업적을 이룰 수 있을 것입니다."
 giga_eawaf.60027.a:0 "승인되었습니다. 비용에 상관없이 즉시 진행하십시오!"
 giga_eawaf.60027.b:0 "거부되었습니다. 이 세계는 [giga_eawaf_sirens_scientist_sacrifice.GetName]의 가치가 없습니다."
 giga_eawaf.60028.name:0 "사이렌 추방"
 giga_eawaf.60028.desc:0 "korean_value:우리의 궤도 자산에서 방출되는 에너지가 차원 균열이 있는 파우스트의 표면에 충격을 주면서, §Y[giga_eawaf_sirens_scientist_sacrifice.GetName]§!가 시공간의 넓어지는 찢어진 틈으로 뛰어들고, 그곳에는 사이렌들에 내장된 수정체와 유사하게 조정된 일련의 마법적 수정체가 함께합니다.\n\n예상대로, 이는 마법적 '얽힘'을 일으켜 무력한 사이렌들을 파우스트의 은신처에서 끌어내어 우리의 장교와 함께 차원 소용돌이로 직행하게 만듭니다 - 바로 그 순간, 우리의 현실에서 몇 초 이상 존재할 수 없는 전체 소용돌이가 스스로 붕괴되면서 [giga_eawaf_sirens_scientist_sacrifice.GetName]와 사이렌들을 함께 삼켜버립니다.\n\n그 결과는 사이렌들이 파우스트에 대한 지배를 완전히 붕괴시키고, 그들의 악마 같은 손아귀에서 파우스트의 주민들을 해방시키는 것이며, 이는 그들의 끊임없는 대규모 공격 전술을 효과적으로 중단시킵니다. 파우스트와 그 주민들은 앞으로 수년간 상처를 입을 가능성이 높지만, 사이렌들은 마침내 우리의 현실에서 확실히 퇴출되었습니다."
 giga_eawaf.60028.a:0 "그들은 더 이상 우리를 괴롭히지 않을 것이다."
 giga_eawaf.60029.name:0 "이상한 거울"
 giga_eawaf.60029.desc:0 "우리의 과학자들은 §Y캔터롯§!에서 원래 이상한 차원 결함이 감지된 위치에 대한 조사를 수행했습니다.\n\n그들은 표면 아래 깊은 곳에서 화려한 '크리스탈 거울'과 유사한 특이한 유물이 발견되었으며, 추가 연구를 통해 이 특이한 장치가 Sirens를 우리의 현실에서 추방할 수 있게 해준 차원 간 연결의 기원일 가능성이 매우 높다고 보고했습니다.\n\n거울의 제어된 활성화와 은폐된 탐사선을 사용한 신중한 탐사가 다채로운 인간형 생물들이 정기적으로 의식적인 음악 축제를 즐기는 대체 영역과의 연결을 드러냈습니다.\n\n사실 이 차원에 우리의 존재를 드러내거나 누구를 끌어내는 것은 Sirens가 우리의 현실로 돌아가는 이 경로를 알아차릴 위험 때문에 전혀 바람직하지 않지만, 우리는 이 거울을 안전한 시설 내에 보관하여 그 특이한 주민들과 그들의 음악 의식을 연구할 수 있을 것입니다."
 giga_eawaf.60029.a:0 "호기심이 생깁니다. 그대로 두도록 합시다."
 giga_eawaf.60029.b:0 "너무 위험합니다! 영원히 봉인하세요."
 giga_eawaf.60032.name:0 "사이레날리아 정복됨"
 giga_eawaf.60032.desc:0 "key: giga_eawaf.60032.desc,korean_value:§H아다지오 다즐§!와 §M아리아 블레이즈§! 및 §B소나타 더스크§!가 §Y [giga_eawaf_sirens_killer_country.GetName] §!의 손에 의해 최후를 맞이한 후, 두려운 §Y사이렌§!이 수십 년 동안 파우스트와 더 큰 은하계를 정신 지배하려고 위협했던 그들의 제국 §Y사이레날리아§!는 역사 속으로 완전히 사라졌습니다.\n \n사이렌의 영향 아래 남아 있는 모든 함선과 행성은 자폭하거나 스스로 해방되었거나 이전 소유자에게 돌아갔습니다. 그리고 은하 공동체는 사이렌의 '영원한 은하 통합'을 달성하려는 미친 계획이 마침내 영원히 좌절되었다는 안도의 한숨을 내쉬고 있습니다."
 giga_eawaf.60032.a:0 "사이렌의 합창이 마침내 침묵에 빠집니다."
 giga_eawaf.5001.name:0 "프로토타입 마법 해제기"
 giga_eawaf.5001.desc:0 "우리 연구원들은 사이렌을 이해하고 대응하기 위한 우리의 노력이 조금씩 결실을 맺기 시작했다고 보고했습니다.\n\n사이렌의 신비로운 노래의 깊은 본질은 여전히 우리를 피하고 있지만, 초기 연구에 따르면 특정 주파수로 준공간에 에너지를 집중 발사하면 갈등 필드의 일부 효과를 완화할 수 있으며, 이는 이러한 장치가 장착된 함선의 유지비를 급격히 증가시키고 활성화 시 이동성을 저해하는 대가를 치르게 됩니다.\n\n이러한 고급 장치는 §Y마법 해제 장치§!로 명명되었으며, 사이렌에 대응하기 위한 실행 가능한 옵션으로 보이며, 추가 조사가 진행될 것입니다."
 giga_eawaf.5001.a:0 "희망이 있습니다."
 giga_eawaf.5001.a.tooltip:0 "우리는 §Y사이렌 대응§! 상황을 계속하기 위해 마법 해제 기술을 연구해야 합니다. 현재 자원을 낭비하지 않기 위해 우리의 접근 방식은 §Y사이렌 연구 없음§!으로 설정되어 있습니다."
 giga_eawaf.5002.name:0 "조정된 마법 해제기"
 giga_eawaf.5002.desc:0 "더 나아진 반-사이렌 연구는 더 높은 효율성을 가진 개선된 마법 해제기 모델을 만들어냈습니다.\n\n이 모델들이 여전히 사악한 §R내부 필드§!을 저지할 만큼 강력하지는 않지만, 이러한 설계는 우리 함선이 §P외부 필드§! 내에서 속도 패널티 없이 작동할 수 있도록 해줄 것입니다."
 giga_eawaf.5002.a:0 "즉시 착수하세요."
 giga_eawaf.5003.name:0 "조화로운 마법 해제기"
 giga_eawaf.5003.desc:0 "우리 과학 팀은 최근의 마법 해제 기술의 돌파구가 이러한 향상된 설계가 §P외부 영역§!을 방어할 수 있을 뿐만 아니라, §R내부 영역§!조차도 충분히 효율적으로 격퇴할 수 있으며, 우리 함선이 사이렌의 영토 깊숙한 곳에서도 작동할 수 있게 해줄 것이라고 보고했습니다. 다만 속도는 크게 감소할 것입니다.\n\n이는 우리가 충분한 화력을 보유하고 있다면, 이제 사이렌의 광기를 마침내 끝낼 수 있을 것임을 의미합니다."
 giga_eawaf.5003.a:0 "훌륭합니다."
 giga_eawaf.5004.name:0 "유포닉 디스인챈터 구상"
 giga_eawaf.5004.desc:0 "기존의 마법 해제 장치에 대한 추가 개선이 §Y유포니크 마법 해제 장치§!를 탄생시켰습니다. 이는 반-사이렌 기술의 최종 결정체입니다. 이 장치는 분쟁 필드 내 어디에서나 작동할 수 있으며, 선박의 속도에 영향을 미칠 수 있어 우리의 함선이 사이렌에 대해 언제 어디서나 공격을 수행할 수 있도록 해줄 것입니다.\n\n우리의 엔지니어들은 또한 마법 해제 장치 계열의 메가구조 형제인 §Y$anti_sirens_shield$§!의 계획을 세웠습니다. 이는 사이렌의 노래로부터 전체 항성계를 보호할 수 있습니다.\n\n"
 giga_eawaf.5004.a:0 "즐거워요! 그들은 곧 무력해질 것입니다."
 giga_eawaf.1104.name:0 "신비로운 무기"
 giga_eawaf.1104.desc:0 "우리가 사이렌으로부터 역설계한 §Y타우마투르기 무기§!는 우리가 안전하게 주입할 수 있는 에너지 양만큼 강력한 특성을 보입니다.\n\n따라서 우리는 이러한 무기의 힘을 지속적으로 증가시키기 위한 새로운 반복 가능한 기술을 고안했습니다."
 giga_eawaf.1104.a:0 "흥미롭군요."
 giga_tech_eawaf_psifusion:0 "산업 심리촉매 융합"
 giga_tech_eawaf_psifusion_desc:0 "헬리오스의 지옥 같은 핵의 신비로운 작용을 통제된 환경에서 산업 규모로 복제함으로써 막대한 에너지 생산과 중원소의 용이한 생산이 가능해집니다."
 giga_tech_eawaf_weapons_repeatable:0 "초전도 마법 무기"
 giga_tech_eawaf_weapons_repeatable_desc:0 "기술적 무기의 불가사의한 특성은 본질적으로 그 잠재력에 대한 상한선이 없음을 의미합니다. 더 많은 에너지를 주입하고 그 에너지를 전달할 더 많은 수정체가 함께 제공되는 한, 그들은 점점 더 강력해질 수 있습니다."
 giga_tech_eawaf_weapons_repeatable_title:0 "['concept_giga_eawaf_thaumaturgic_weapons', Thaumaturgic Weapons] 피해: §G+10%§!\n['concept_giga_eawaf_thaumaturgic_weapons', Thaumaturgic Weapons] 유지비: §R+5%§!"
 giga_tech_eawaf_sirens_secret:0 "신비로운 매혹"
 giga_tech_eawaf_sirens_secret_desc:0 "매혹적인 마법을 발휘하는 사이렌의 연구는 우리 정부와 사회에 큰 응용 가능성을 가질 수 있습니다."
 edict_giga_eawaf_sirens_secret:0 "$giga_tech_eawaf_sirens_secret$"
 edict_giga_eawaf_sirens_secret_desc:0 "기적의 결정 샘플은 사이렌의 정신 제어 능력을 제한적으로 재현할 수 있게 하여, 우리의 의지가 조화로운 패권을 이루게 합니다."
 edict_giga_eawaf_sirens_secret_gestalt:0 "$edict_giga_eawaf_sirens_secret$"
 edict_giga_eawaf_sirens_secret_gestalt_desc:0 "$edict_giga_eawaf_sirens_secret_desc$"
 edict_giga_eawaf_sirens_secret_mindwardens:0 "신비한 사회 강화"
 edict_giga_eawaf_sirens_secret_mindwardens_desc:0 "타우마투르기 크리스탈 샘플은 사이렌의 정신 제어 능력을 제한적으로 재현할 수 있게 해주며, 이를 통해 무기화된 불화에 대한 우리 사회의 회복력을 향상시키기 위한 연구를 신중하게 진행할 수 있습니다."
 giga_tech_eawaf_sirens_strike_craft:0 "$GIGA_EAWAF_STRIKE_CRAFT$"
 giga_tech_eawaf_sirens_strike_craft_desc:0 "$GIGA_EAWAF_STRIKE_CRAFT_DESC$"
 giga_tech_eawaf_sirens_autocannon:0 "$GIGA_EAWAF_CRYSTAL_AUTOCANNON$"
 giga_tech_eawaf_sirens_autocannon_desc:0 "$GIGA_EAWAF_CRYSTAL_AUTOCANNON_DESC$"
 giga_tech_eawaf_sirens_artillery:0 "$GIGA_EAWAF_CRYSTAL_ARTILLERY$"
 giga_tech_eawaf_sirens_artillery_desc:0 "$GIGA_EAWAF_CRYSTAL_ARTILLERY_DESC$"
 giga_tech_eawaf_sirens_missile:0 "$GIGA_EAWAF_PSIONIC_CHARGE$"
 giga_tech_eawaf_sirens_missile_desc:0 "$GIGA_EAWAF_PSIONIC_CHARGE_DESC$"
 giga_tech_eawaf_sirens_impactor:0 "$GIGA_EAWAF_CRYSTAL_IMPACTOR$"
 giga_tech_eawaf_sirens_impactor_desc:0 "$GIGA_EAWAF_CRYSTAL_IMPACTOR_DESC$"
 giga_tech_eawaf_sirens_voidbeam:0 "$GIGA_EAWAF_GRAND_VOID_BEAM$"
 giga_tech_eawaf_sirens_voidbeam_desc:0 "$GIGA_EAWAF_GRAND_VOID_BEAM_DESC$"
 giga_tech_eawaf_disenchanter_1:0 "초기 사이렌 대응책"
 giga_tech_eawaf_disenchanter_1_desc:0 "신비로운 사이렌의 노래의 깊은 본질은 여전히 우리에게 미지수로 남아 있지만, 초기 연구에 따르면 특정 주파수로 준-공간에 집중된 에너지 방전을 발사하면 갈등 필드의 일부 영향을 완화할 수 있다는 것이 제안됩니다. 그러나 이러한 장치가 장착된 함선의 유지비는 급격히 증가하게 됩니다."
 giga_tech_eawaf_disenchanter_2:0 "마법 해제 조정"
 giga_tech_eawaf_disenchanter_2_desc:0 "더 신중한 조정으로 Disenchanter 기계가 Strife Field의 악의적인 효과를 보다 효율적으로 반격할 수 있게 되었습니다."
 giga_tech_eawaf_disenchanter_3:0 "서브사이코닉 심포니"
 giga_tech_eawaf_disenchanter_3_desc:0 "우리의 갈등 필드에 대한 이해의 돌파구는 우리가 비물질계 내에서 사이렌의 노래에 맞서 반주를 직접 방출할 수 있게 해주며, 이는 사악한 내부 필드의 정신 조종 효과조차 막을 수 있습니다."
 giga_tech_eawaf_disenchanter_3_effects:0 "§Y스타베이스§!와 §Y행성§!을 §R내부 필드§!에서 포획할 수 있습니다."
 giga_tech_eawaf_disenchanter_4:0 "유포닉 갈등 해소"
 giga_tech_eawaf_disenchanter_4_desc:0 "우리의 사이렌 노래에 대한 이해는 이제 그들의 정신 제어 필드를 어떤 규모에서도 편안하게 무효화할 수 있을 정도로 발전했습니다. 다만, 상당한 에너지 비용이 발생합니다."
 building_giga_eawaf_psifusion_reactor:0 "정신 촉매 융합로"
 building_giga_eawaf_psifusion_reactor_desc:0 "이 거대한 원자로 단지는 Shroud 균열에 의해 구동되는 인공 '정신별'을 수용하고 있습니다. 이곳은 막대한 양의 에너지를 생산할 뿐만 아니라, 중원소를 생성하는 데에도 사용될 수 있으며, 전체 행성의 정신 능력 효율성을 강화합니다."
 building_giga_eawaf_sirens_capital:0 "행성 파놉티콘"
 building_giga_eawaf_sirens_capital_desc:0 "이 세계에서 사이렌의 의지를 전달하기 위해 설계된 거대한 복합체로, 최대한의 사회적 및 산업적 효율성을 보장합니다."
 building_giga_eawaf_disenchanter_building_1:0 "프로토타입 마법 해제 필드"
 building_giga_eawaf_disenchanter_building_1_desc:0 "이 세계에서 갈등 필드의 일부 효과를 무효화할 수 있는 업그레이드된 마법 해제기입니다. §P외부 필드§!의 패널티를 절반으로 줄입니다."
 building_giga_eawaf_disenchanter_building_2:0 "조화로운 마법 해제 필드"
 building_giga_eawaf_disenchanter_building_2_desc:0 "이 정제된 마법 해제 필드는 이 세계에 대한 갈등 필드의 영향을 극적으로 줄일 수 있을 뿐만 아니라, 내부 필드의 손아귀로부터 보호합니다. §P외부 필드§!의 영향을 4분의 1로 줄이고 §R내부 필드§!에 대한 보호 기능을 제공합니다."
 col_giga_eawaf_sirens_capital:0 "정신적 메가공장"
 col_giga_eawaf_sirens_capital_desc:0 "지옥 같은 공장들이 펼쳐진 공간으로, 마음의 노예들이 시레날리아의 지배를 확장하기 위해 고군분투하고 있습니다."
 col_giga_eawaf_sirens_capital_tt:0 "$col_giga_eawaf_sirens_capital_desc$"
 job_giga_eawaf_sirens_toiler:0 "사이렌 노동자"
 job_giga_eawaf_sirens_toiler_plural:0 "사이렌 노동자들"
 job_giga_eawaf_sirens_toiler_desc:0 "사이렌 노동자들은 사이렌의 전쟁 기계를 가동하는 데 필요한 자원을 생산하기 위해 낮과 밤으로 일합니다."
 mod_job_giga_eawaf_sirens_toiler_add:0 "$job_giga_eawaf_sirens_toiler$ 직업"
 mod_job_giga_eawaf_sirens_toiler_per_pop:0 "$job_giga_eawaf_sirens_toiler$ 인구당 직업"
 job_giga_eawaf_sirens_naval:0 "사이렌 함대 운영자"
 job_giga_eawaf_sirens_naval_plural:0 "사이렌 함대 운영자"
 job_giga_eawaf_sirens_naval_desc:0 "사이렌 함대 운영자는 사이렌의 우주 함대 물류를 관리하는 임무를 맡고 있습니다."
 mod_job_giga_eawaf_sirens_naval_add:0 "$job_giga_eawaf_sirens_naval$ 직업"
 mod_job_giga_eawaf_sirens_naval_per_pop:0 "$job_giga_eawaf_sirens_naval$ 인구당 직업"
 job_giga_eawaf_sirens_scientist:0 "사이렌 과학 경제학자"
 job_giga_eawaf_sirens_scientist_plural:0 "사이렌 과학경제학자들"
 job_giga_eawaf_sirens_scientist_desc:0 "사이렌 사회의 상위 계층인 과학경제학자들은 몇 안 되는 비종속자로 남을 수 있는 개인들로 구성되어 있습니다. 그들의 임무는 사이렌 사회의 효율성을 개선할 새로운 방법을 찾고, 과학의 경계를 더욱 확장하는 것입니다."
 mod_job_giga_eawaf_sirens_scientist_add:0 "$job_giga_eawaf_sirens_scientist$ 직업"
 mod_job_giga_eawaf_sirens_scientist_per_pop:0 "$job_giga_eawaf_sirens_scientist$ 직업"
 job_giga_eawaf_sirens_strifer:0 "사이렌 스트라이퍼"
 job_giga_eawaf_sirens_strifer_plural:0 "사이렌 스트라이퍼스"
 job_giga_eawaf_sirens_strifer_desc:0 "사이렌의 필요는 일부 개인이 서로 간의 분노와 갈등의 상태를 지속적으로, 그러나 통제된 방식으로 유지해야 한다는 것을 요구합니다. 이는 완벽하게 조절된 내부 필드 내에서도 귀중한 갈등의 흐름을 계속 생성하기 위함입니다."
 mod_job_giga_eawaf_sirens_strifer_add:0 "$job_giga_eawaf_sirens_strifer$ 직업"
 mod_job_giga_eawaf_sirens_strifer_per_pop:0 "$job_giga_eawaf_sirens_strifer$ 직업"
 origin_eawaf_sirens_splinter:0 "환멸을 느낀"
 origin_eawaf_sirens_splinter_desc:0 "이 국가는 한때 사이렌에게 매료되었던 생존자들에 의해 세워졌습니다."
 situation_eawaf_sirens_takeover:0 "사이렌의 점령"
 situation_eawaf_sirens_takeover_desc:0 "정신을 조종하는 능력을 가진 '세이렌' 삼인조가 파우스트에 대한 지배를 강요하기 위해 나섰습니다. 그들은 이 어려운 과제를 성공적으로 수행하기 위해 할 수 있는 모든 일을 다할 의지가 분명합니다. 이 상황을 면밀히 주시하는 것이 우리의 이익에 부합할 가능성이 높습니다."
 situation_eawaf_sirens_takeover_type:0 "사이렌의 점령"
 situation_eawaf_sirens_takeover_monthly_change_tooltip:0 ""
 approach_giga_eawaf_stop_sirens:0 "사이렌을 멈추세요"
 approach_giga_eawaf_stop_sirens_tooltip:0 "우리는 보이지 않게 사이렌을 저지하기 위해 할 수 있는 모든 일을 할 것입니다. 그들의 주요 자산에 대한 은밀한 암살, 공급망의 방해 및 반사이렌 운동의 강화는 그들이 적에게 압도당할 때까지 그들의 진전을 저지해야 합니다.\n이것은 사이렌이 정복의 각 단계에서 적에게 무너질 확률을 높일 것입니다.\n§R우리는 사이렌을 저지하기 시작하면 물러설 수 없습니다.§!"
 approach_giga_eawaf_do_nothing:0 "아무것도 하지 않기"
 approach_giga_eawaf_do_nothing_tooltip:0 "우리는 단순히 이 상황이 전개되는 것을 지켜봅시다. 우리가 걱정해야 할 더 시급한 문제가 있습니다.\n§Y나중에 마음을 바꿀 수도 있습니다.§!"
 approach_giga_eawaf_study_sirens:0 "사이렌을 연구하다"
 approach_giga_eawaf_study_sirens_tooltip:0 "자원과 인력을 투자하여 사이렌과 그들의 정신 제어 방법을 연구할 것입니다. 그렇게 함으로써 의식과 마음의 진정한 본질에 대해 많은 것을 배울 수 있습니다.\n§Y나중에 마음을 바꿀 수도 있습니다.§!"
 approach_giga_eawaf_bolster_sirens:0 "사이렌을 강화합니다."
 approach_giga_eawaf_bolster_sirens_tooltip:0 "우리는 사이렌의 장악을 비밀리에 지원할 것입니다. 그렇게 함으로써 우리는 그들의 잠재력을 온전히 목격할 수 있으며, 귀중한 데이터를 풍부하게 얻을 수 있습니다.\n§G우리는 언제든지 마음을 바꿀 수 있지만, 그들을 지원하는 시간이 길어질수록 더 많은 것을 배울 수 있습니다.§!"
 situation_eawaf_sirens_takeover_effects:0 "사이렌이 파우스트의 장악을 진행할 것입니다."
 giga_eawaf_sirens_too_strong_tooltip:0 "사이렌이 우리에게 은밀히 저항하기에는 너무 강해졌습니다. 우리는 그들을 그대로 두거나, 파우스트에 대한 잠재적으로 위험한 지상 침공을 통해 직접 개입해야 합니다."
 situation_eawaf_sirens_understanding:0 "사이렌에 맞서기"
 situation_eawaf_sirens_understanding_type:0 "$situation_eawaf_sirens_understanding$"
 situation_eawaf_sirens_understanding_desc:0 "사이렌들은 전체 은하에 걸쳐 신비로운 정신 조종 노래를 퍼뜨리려 하고 있습니다. 우리는 모두 그들의 악마 같은 주문에 걸리기 전에 이 현상에 대응할 방법을 찾아야 합니다. 사이렌에 대응하는 §Y연구§!와 §Y단결§! 비용은 필드의 §M효능§!에 따라 달라질 것입니다. 만약 우리가 감당할 수 없다면 우리는 §Y사이렌 연구 없음§!으로 되돌아가게 될 것입니다."
 situation_eawaf_sirens_understanding_monthly_change_tooltip:0 ""
 approach_giga_eawaf_sirens_research_1:0 "사이렌 연구 없음"
 approach_giga_eawaf_sirens_research_1_tooltip:0 "강화될 것입니다."
 approach_giga_eawaf_sirens_research_2:0 "제한된 반사이렌 연구"
 approach_giga_eawaf_sirens_research_2_tooltip:0 "사이렌은 그리 중요하지 않지만, 확실히 하기 위해 조금 투자해 봅시다."
 approach_giga_eawaf_sirens_research_2_cost_tooltip:0 "우리 $r_physics$과 $r_society$ 생산은 이를 지속할 수 없습니다!"
 approach_giga_eawaf_sirens_research_3:0 "광범위한 반사이렌 연구"
 approach_giga_eawaf_sirens_research_3_tooltip:0 "우리는 사이렌을 저지해야 하므로, 이를 위해 충분한 자원을 투자합시다."
 approach_giga_eawaf_sirens_research_3_cost_tooltip:0 "우리 $r_physics$와 $r_society$ 생산은 이를 지속할 수 없습니다!"
 approach_giga_eawaf_sirens_research_4:0 "대규모 반사이렌 연구"
 approach_giga_eawaf_sirens_research_4_tooltip:0 "사이렌은 어떤 대가를 치르더라도 저지해야 합니다! 그들을 저지하기 위해 우리가 할 수 있는 모든 것을 투자합시다!"
 approach_giga_eawaf_sirens_research_4_cost_tooltip:0 "우리 $r_physics$와 $r_society$ 생산은 이를 지속할 수 없습니다!"
 situation_eawaf_sirens_disenchanters_effect:0 "우리는 사이렌에 대한 대응 조치를 개선할 것입니다."
 situation_eawaf_sirens_understanding_finish:0 "우리의 대응 조치가 완벽해질 것입니다."
 giga_eawaf_has_sirens_secret:0 "기아의 매혹 연구"
 giga_eawaf_has_psifusion_secret:0 "정신 촉매 융합 연구"
 giga_eawaf_has_psifusion_secret_tooltip:0 "우리의 파우스트에서의 정신 간섭에 대한 이전 연구가 우리의 진전을 가속화할 것입니다."
 sc_giga_eawaf_faust_shroud:0 "신비로운 장막"
 giga_eawaf_sirens_megaphone_1:0 "신비로운 매혹자"
 giga_eawaf_sirens_megaphone_1_DESC:0 "신비로운 메가구조로, 강력한 정신 조종 '노래'를 증폭하고 전달하여 성운을 통해 수천 광년 떨어진 전체 시스템을 매료시킬 수 있습니다."
 anti_sirens_shield:0 "위대한 교향곡 방어막"
 anti_sirens_shield_DESC:0 "이 시스템 전체를 사이렌의 갈등 필드로 인한 모든 효과로부터 보호하는 초대형 마법 해제 장치입니다. §P외부 필드§!와 §R내부 필드§!를 완전히 무효화합니다."
 anti_sirens_shield_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_kilostructure$ - $giga_list_category_miscellaneous$\n전체 시스템을 §Y갈등 필드§!으로부터 완전히 보호합니다.\n§L이 시스템 전체를 사이렌의 갈등 필드로 인해 발생하는 모든 효과로부터 보호하는 초거대 마법 해제 장치입니다.§!"
 allow_anti_sirens_shield:0 "§H거대 구조물 잠금 해제:§! $anti_sirens_shield$"
 requires_no_existing_anti_sirens_shield:0 "$TRIGGER_FAIL$기존 $anti_sirens_shield$ 때문에 건설할 수 없습니다."
 anti_sirens_shield_dismantle:0 "방어막 해체"
 anti_sirens_shield_dismantle_DESC:0 "더 이상 이 방어벽이 필요하지 않습니다. 철거합시다."
 STRIFE_FIELD_ABOUT_TO_SHRINK_TITLE:0 "갈등의 장이 사라지려 합니다"
 STRIFE_FIELD_ABOUT_TO_SHRINK_DESC:0 "The §R갈등 필드§!는 현재 크기를 유지하기에 충분한 갈등이 없습니다. §M도달 범위§!는 §Y1§!만큼 §Y6개월§! 동안 감소할 것입니다."
 STRIFE_FIELD_SHRINKING_TITLE:0 "갈등의 장이 후퇴하고 있습니다."
 STRIFE_FIELD_SHRINKING_DESC:0 "The §R갈등 필드§!는 현재 크기를 유지하기에 충분한 갈등이 없습니다. 그 §M범위§!는 §Y1§!만큼 감소했습니다.\n현재 $outer_strife_field_name$의 범위는 §Y[giga_eawaf_country.giga_eawaf_outer_strife_field_range]§!이며, $inner_strife_field_name$의 범위는 §Y[giga_eawaf_country.giga_eawaf_inner_strife_field_range]§!입니다."
 STRIFE_FIELD_ABOUT_TO_GROW_TITLE:0 "전투 지역이 확장 중입니다."
 STRIFE_FIELD_ABOUT_TO_GROW_DESC:0 "이 §R갈등 필드§!는 경계를 확장할 충분한 갈등을 가지고 있습니다. 그 §M도달 범위§!는 §Y1§!만큼 증가할 것입니다. §Y6개월§! 후에."
 STRIFE_FIELD_GROWING_TITLE:0 "갈등 필드 확장"
 STRIFE_FIELD_GROWING_DESC:0 "The §R갈등 필드§!는 경계를 확장할 수 있는 충분한 갈등을 가지고 있습니다. 그 §M도달 범위§!는 §Y1§!만큼 확장되었습니다.\n현재 $outer_strife_field_name$의 범위는 §Y[giga_eawaf_country.giga_eawaf_outer_strife_field_range]§!이며, $inner_strife_field_name$의 범위는 이제 §Y[giga_eawaf_country.giga_eawaf_inner_strife_field_range]§!입니다."
 SIRENS_SWAPPING_LEADER_TITLE:0 "사이렌 교체 리더"
 SIRENS_SWAPPING_LEADER_DESC_ADAGIO:0 "§R사이렌§!은 이제 §H아다지오 다즐§!가 이끌고 있습니다.\n그녀는 함선 §Y피해§!와 §Y사거리§!에 보너스를 제공합니다."
 giga_eawaf_adagio_buffs:0 "§H아다지오 다즐§!는 함선 §Y피해§! 및 §Y사거리§!에 보너스를 제공합니다."
 SIRENS_SWAPPING_LEADER_DESC_ARIA:0 "§R사이렌§!은 이제 §M아리아 블레이즈§!가 이끌고 있습니다.\n그녀는 함선 §Y정확도§!, §Y추적§! 및 §Y속도§!에 보너스를 제공합니다."
 giga_eawaf_aria_buffs:0 "§M아리아 블레이즈§!는 함선의 §Y정확도§!, §Y추적§! 및 §Y속도§!에 보너스를 제공합니다."
 SIRENS_SWAPPING_LEADER_DESC_SONATA:0 "§R사이렌§!은 이제 §B소나타 더스크§!가 이끌고 있습니다.\n그녀는 §Y메가구조물 건설 속도§!와 §Y['concept_giga_eawaf_war_materials'] 생산§!에 보너스를 제공합니다."
 giga_eawaf_sonata_buffs:0 "§B소나타 황혼§!은 §Y메가구조물 건설 속도§!와 §Y['concept_giga_eawaf_war_materials'] 생산§!에 보너스를 제공합니다."
 SIRENS_MEGAPHONE_UPGRADED_TITLE:0 "안개음향 매혹기 업그레이드"
 SIRENS_MEGAPHONE_UPGRADED_DESC:0 "§Y음향 매혹기§!가 §Y단계로 업그레이드되었습니다.[giga_eawaf_country.giga_eawaf_sirens_megaphone_level]§!. 이제 §M효능§!은 §Y[giga_eawaf_country.giga_eawaf_field_potency_multiplier]§!와 같으며, §P외부 필드§! 디버프와 §Y마법 해제기§! 유지비에 영향을 미칩니다."
 inner_strife_field_name:0 "§R내부 갈등 분야§!"
 outer_strife_field_name:0 "§P외부 갈등 영역§!"
 NAME_Giga_Eawaf_Sirens_Megaphone:0 "셔드소닉 매혹자 - 마크 [giga_eawaf_country.giga_eawaf_sirens_megaphone_level]"
 GIGA_EAWAF_DISENCHANTER_1:0 "프로토타입 마법 해제기"
 GIGA_EAWAF_DISENCHANTER_1_DESC:0 "초기 버전의 장치로, 배 주위에 특정 조율된 에너지 소음을 방출하여 사이렌의 매혹적인 노래를 무효화할 수 있습니다. 이 프로토타입은 불행히도 비싸고 매우 많은 전력을 소모하여, 작동을 유지하기 위해 상당한 양의 외부 에너지와 자재가 필요합니다."
 GIGA_EAWAF_DISENCHANTER_2:0 "조정된 마법 해제기"
 GIGA_EAWAF_DISENCHANTER_2_DESC:0 "이 개선되고 간소화된 마법 해제기는 이전 프로토타입을 기반으로 하여 에너지 소음을 통해 사이렌의 노래를 보다 효율적으로 저지합니다. 이 장치들이 성숙해짐에 따라 적절한 정신적 소음을 생성하는 데 필요한 복잡성은 점점 더 커지는 물류 요구 사항을 수반하지만, 이들은 함선의 이동을 그리 방해하지는 않습니다."
 GIGA_EAWAF_DISENCHANTER_3:0 "화음의 마법 해제기"
 GIGA_EAWAF_DISENCHANTER_3_DESC:0 "마침내 이러한 새로운 설계가 사이렌의 내부 필드로 진입할 수 있게 합니다. 그러나 유지 관리 비용은 계속 증가하고 있습니다."
 GIGA_EAWAF_DISENCHANTER_4:0 "유쾌한 마법 해제기"
 GIGA_EAWAF_DISENCHANTER_4_DESC:0 "이 완벽한 마법 해제기 설계는 우리의 함선이 사이렌의 매혹적인 노래의 영향을 완전히 무효화할 수 있게 하여, 사이렌이 우리에게 던질 수 있는 모든 것에 사실상 면역이 되도록 합니다. 그러나 불행히도 이는 갈등 필드의 깊이에서 이러한 장치를 유지하는 데 엄청난 비용이 필요하다는 단점이 있습니다."
 GIGA_EAWAF_ENTHRALLING_BEAM:0 "매혹적인 광선"
 GIGA_EAWAF_COMPUTER_KAMIKAZE:0 "예지 인터페이스 (카미카제)"
 GIGA_EAWAF_KAMIKAZE_BEHAVIOR_DESC:0 "§H카미카제 전술:§! 이 함선은 적에게 돌진하여 근거리에서 공격합니다."
 GIGA_EAWAF_PANOPTICON_AURA:0 "미니-갈등 필드"
 aura_panopticon:0 "$aura_category_offensive$"
 GIGA_EAWAF_GRAND_VOID_BEAM:0 "거대한 공허 광선"
 GIGA_EAWAF_GRAND_VOID_BEAM_DESC:0 "이 거대한 빔은 목표의 엔트로피를 정신적으로 극대화하는 효과를 가지고 있어, 방어 시스템에 대해 매우 효율적입니다."
 GIGA_EAWAF_CRYSTAL_IMPACTOR:0 "결정체 충격기"
 GIGA_EAWAF_CRYSTAL_IMPACTOR_DESC:0 "수정체 충격기는 부분적인 자아가 깃든 마법 수정체에 의존하여 극도로 높은 속도로 발사되는 강력한 유도 발사체를 생산하며, 이를 통해 장갑을 손상시키고 관통합니다."
 GIGA_EAWAF_CRYSTAL_ARTILLERY:0 "결정체 포병"
 GIGA_EAWAF_CRYSTAL_ARTILLERY_DESC:0 "이 포병은 과도한 사이오닉 에너지가 주입된 대형 수정체 발사체를 발사하여 다소 불안정하게 만들어 일반적인 적 방어에 매우 효과적입니다."
 GIGA_EAWAF_CRYSTAL_AUTOCANNON:0 "결정체 자동포"
 GIGA_EAWAF_CRYSTAL_AUTOCANNON_DESC:0 "이 자동포는 날카로운 마법 결정체를 퍼붓습니다. 이 결정체는 두꺼운 갑옷을 뚫는 데 어려움을 겪고 일반적으로 방패에 의해 완전히 저지되지만, 에너지 우주선의 더 취약한 선체가 노출될 경우에는 절대적으로 파괴적인 피해를 줄 수 있습니다."
 GIGA_EAWAF_STRIKE_CRAFT:0 "교란용 미끼 공격기"
 GIGA_EAWAF_STRIKE_CRAFT_DESC:0 "이 고전적인 공격 전투기 대신, 이 고강도 전투기는 적의 전투기와 PD 시스템을 압도하고 괴롭히며 혼란에 빠뜨리기 위해 존재하며, 따라서 우리의 다른 무기가 더 많은 피해를 입히도록 돕습니다."
 GIGA_EAWAF_PSIONIC_CHARGE:0 "신비한 충전"
 GIGA_EAWAF_PSIONIC_CHARGE_DESC:0 "이 비정통적인 미사일 설계는 우주의 공허를 통해 발사된 전하를 띤 마법 결정체의 구체에 의존합니다. 오직 적의 파괴를 바라며 부분적인 자아에 의해 유도되는 이 미사일은 방패와 갑옷을 뚫고 최대한의 참화를 일으키기 위해 적에게 접근할 수 있습니다."
