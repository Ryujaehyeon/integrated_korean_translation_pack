 concept_giga_eawaf_disenchanter_buildings:0 "탈마법 필드"
 concept_giga_eawaf_disenchanter_buildings_desc:0 "마법 해제 건물은 §Y$situation_eawaf_sirens_understanding$§! 상황을 통해 얻은 기술에서 연구되며, §R갈등 필드§!에 대한 보호 기능을 제공합니다.\n이 건물에는 다음이 포함됩니다:\n- $concept_giga_eawaf_disenchanter_building_1$\n- $concept_giga_eawaf_disenchanter_building_2$"
 concept_giga_eawaf_disenchanter_building_1:0 "['building:building_giga_eawaf_disenchanter_building_1', $building_giga_eawaf_disenchanter_building_1$]"
