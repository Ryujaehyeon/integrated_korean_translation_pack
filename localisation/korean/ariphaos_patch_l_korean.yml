 policy_ariphaos_patch_juggernaut_shipyards:0 "저거너트 조선소 정책"
 policy_ariphaos_patch_juggernaut_shipyards_desc:0 "저거너트가 새로운 군함을 건조할 수 있게 허용할지 선택합니다. 함선 수리는 영향을 받지 않습니다."
