 ariphaos_patch_juggernaut_disabled_desc:0 "저거너트의 군함 생산을 끕니다. 저거너트는 여전히 함선을 수리합니다."
 ariphaos_patch_juggernaut_disabled_tooltip:0 "정책으로 저거너트의 군함 건조가 비활성화되었습니다. 저거너트에서 군함을 생산하려면 이를 활성화하십시오."
 ariphaos_patch.7201.name:0 "놀랄 일은 없다"
 ariphaos_patch.7201.desc:0 "센서가 세돔 성계에서 이상한 수치를 감지하고 있습니다. 남아 있던 장막에 가려진 행성들은 다른 행성들처럼 봉인이 풀린 것으로 보이며, 성계는 현재 의도된 조화 상태로 안정되었습니다."
 ariphaos_patch.7201.option:0 "이건 끝이 없군."
 progress.3.desc_gaia:0 "우리 개척선은 §Y[Root.GetName]§!의 거대한 강 계곡에 부드럽게 착륙했습니다. 어디를 보아도 숨 막힐 듯 아름다운 풍경이 펼쳐져 있으며, 아름다운 전망에 대한 보고가 우리 네트워크를 압도하고 있습니다.\n\n이 함선은 새 정착지의 행정 본부로 영구 개조되었고, 반응로 핵은 식민지의 임시 전력원으로 쓰기 위해 분리 작업 중입니다.\n\n이전 우주선의 거대한 선체 주변에는 수백 개의 작은 천막과 조립식 대피소가 세워졌고, 수많은 개척민이 하선하기 시작했습니다. 외계 행성에 세워지는 첫 [Root.Owner.GetSpeciesName] 도시입니다."
 progress.3.desc_relic:0 "우리 개척선은 §Y[Root.GetName]§!의 비교적 구조가 온전하고 비어 있는 플랫폼에 부드럽게 착륙했습니다. 식물 비슷한 것이 이 세계를 다시 뒤덮기 시작했지만, 식량으로 보기는 어렵습니다. 하지만 막대한 저수지가 있고, 이용 가능한 거처도 부족하지 않습니다.\n\n함선은 새 정착지의 행정 중심지로 사용할 건물을 보강하기 위해 해체되고 있으며, 반응로 핵은 식민지의 임시 전력원으로 쓰기 위해 분리 작업 중입니다.\n\n이전 우주선의 거대한 선체 주변 잔해 속으로 수백 개의 길이 뚫렸고, 수많은 개척민이 하선하기 시작했습니다. 외계 행성에 세워지는 첫 [Root.Owner.GetSpeciesName] 도시입니다."
 progress.3.desc_city:0 "우리 개척선은 §Y[Root.GetName]§!에 마련된 수많은 착륙 전용 플랫폼 중 하나에 착륙했습니다. 이 거대한 도시 경관은 영양 공급에는 아무것도 제공하지 않지만, 거대한 저수지는 충분한 물을 제공합니다.\n\n함선은 천천히 해체되어 새 정착지의 임시 행정 본부 역할을 하고 있으며, 개척민들은 행성 전체를 뒤덮은 도시를 탐험하고 그 안으로 퍼져 나가기 시작했습니다.\n\n함선에서 내린 개척민들은 여러 기능을 수행하기 위해 수백 채의 건물을 확보하고 있습니다. 외계 행성에 세워지는 첫 [Root.Owner.GetSpeciesName] 도시입니다."
 progress.3.desc_nuked:0 "우리 개척선은 §Y[Root.GetName]§!의 비교적 무성한 평원에 부드럽게 착륙했습니다. 근처에는 적당한 양의 식생과 비교적 깨끗한 수원이 있지만, 방사성 물질을 제거하기 위해 우선 함선의 여과 장치를 거치고 있습니다.\n\n이 함선은 새 정착지의 행정 본부로 영구 개조되었고, 반응로 핵은 식민지의 임시 전력원으로 쓰기 위해 분리 작업 중입니다.\n\n이전 우주선의 거대한 선체 주변에는 수백 개의 작은 천막과 조립식 대피소가 세워졌고, 수많은 개척민이 하선하기 시작했습니다. 외계 행성에 세워지는 첫 [Root.Owner.GetSpeciesName] 도시입니다."
 progress.3.desc_habitat:0 "우리 개척선은 §Y[Root.GetName]§!에 조심스럽게 도킹했습니다. 개척민들은 거주지 내부를 신중히 탐사하며, 찾을 수 있는 자원을 확보하고 거주지의 물 공급망을 활용하는 방법을 익히고 있습니다.\n\n함선은 내부에서부터 천천히 해체되고 있으며, 거대한 에어록 근처의 임시 건물이 새 정착지의 행정 본부로 바뀌고 있고, 함선의 반응로 핵은 식민지의 임시 전력원으로 쓰기 위해 분리 작업 중입니다.\n\n구조물의 빈 공간에는 수백 개의 조립식 대피소와 천막이 들어섰고, 수많은 개척민이 하선하기 시작했습니다. 외계 플랫폼에 세워지는 첫 [Root.Owner.GetSpeciesName] 도시입니다."
 progress.3.desc_ringworld:0 "우리 개척선은 §Y[Root.GetName]§!의 적합한 평탄 지형에 부드럽게 착륙했습니다. 인공적인 풍경임에도 어디를 보아도 숨 막힐 듯 아름다우며, 아름다운 전망에 대한 보고가 우리 네트워크를 압도하고 있습니다.\n\n이 함선은 새 정착지의 행정 본부로 영구 개조되었고, 반응로 핵은 식민지의 임시 전력원으로 쓰기 위해 분리 작업 중입니다.\n\n이전 우주선의 거대한 선체 주변에는 수백 개의 작은 천막과 조립식 대피소가 세워졌고, 수많은 개척민이 하선하기 시작했습니다. 상상조차 어려울 만큼 거대한 링월드에 세워지는 첫 [Root.Owner.GetSpeciesName] 도시입니다."
 progress.3.desc_other:0 "우리 개척선은 §Y[Root.GetName]§!에 부드럽게 착륙했습니다. 이 외계 풍경은 험난하지만, 우리의 개척민들은 굴하지 않습니다.\n\n이 함선은 새 정착지의 행정 본부로 영구 개조되었고, 반응로 핵은 식민지의 임시 전력원으로 쓰기 위해 분리 작업 중입니다.\n\n이전 우주선의 거대한 선체 주변에는 수백 개의 작은 천막과 조립식 대피소가 세워졌고, 수많은 개척민이 하선하기 시작했습니다. 외계 행성에 세워지는 첫 [Root.Owner.GetSpeciesName] 도시입니다."
