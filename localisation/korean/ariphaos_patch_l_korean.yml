 origin_star_pack:0 "성단 무리"
 origin_star_pack_desc:0 "이 사이오닉 종족은 여러 성계에 걸쳐 별을 향한 진출을 조직적으로 조율했습니다."
 origin_prison_escapees:0 "감옥 탈출자"
 origin_prison_escapees_desc:0 "이 우주적 말살 성향의 도마뱀들은 우주의 나머지 존재들이 사라져야 한다고 결심했습니다. 알 수 없는 세력에게 수감되어 있었지만, 이제 자유를 얻어 본래의 임무를 계속 수행하려 합니다."
