 ariphaos_patch_requires_neighbor:0 "$TRIGGER_FAIL$이주 조약을 체결하려면 서로 이웃해야 합니다!"
 ariphaos_patch_requires_actor_not_fanatic_xenophobe:0 "$TRIGGER_FAIL$우리는 §Y광적인 외계종 혐오§! 윤리관을 지니고 있으며, 외계인과 우리의 행성을 공유할 생각이 없습니다!"
