l_korean:
 trait_mem_crawler_pet_owner:0 "애완 크라울러"
 trait_mem_crawler_pet_owner_desc:0 "이 지도자는 단 하나만 존재하는 애완동물, '크라울러'의 자랑스러운 소유자입니다."
 trait_mem_crawler_pet_owner_cloned:0 "애완 크라울러"
 trait_mem_crawler_pet_owner_cloned_desc:0 "이 지도자는 애완 크라울러를 가지고 있습니다."
 trait_mem_crawler_pet_owner_ruler:0 "$trait_mem_crawler_pet_owner$"
 trait_mem_crawler_pet_owner_ruler_desc:0 "$trait_mem_crawler_pet_owner_desc$"
 mem_crawler_anomaly:0 "외로운 생명의 징조"
 mem_crawler_anomaly_desc:0 "생명이 없어 보이는 [This.GetName]의 표면에서 미약한 생체 신호가 감지되고 있습니다."
 mem_crawler.1.name:0 "상자 속의 벌레"
 mem_crawler.1.desc:0 "§Y[From.GetName]§!의 표면에서 감지된 생명 신호를 추적한 후, [Leader.GetName]은 그 출처를 발견했습니다 - 소행성의 표면에 고정된 큰 유리 상자입니다. 내부에서 [Leader.GetSheHe]은 큰 생물을 발견했습니다. \n\n약 40센티미터 길이의 가늘고 분절된 몸체는 검은 키틴 판으로 덮여 있으며 138개의 다리에 의해 지탱되고 있습니다. 꼬리는 가시로 끝나고, 머리는 두 개의 거대한 더듬이와 긴 감각 털, 그리고 크기가 다른 18개의 구슬 같은 눈으로 장식된 큰 입으로 끝납니다. 그 중 절반은 현재 [Leader.GetName]를 바라보며, [Leader.GetHerHim]를 조용히 판단하고 있습니다. \n\n누군가 이 생물을 수년간 살아있게 할 수 있는 충분한 힘과 자원을 가지고 이 용기를 여기 두었습니다. 질문은: 이제 우리는 이것을 어떻게 해야 할까요?"
 mem_crawler.1.a:0 "[Leader.GetName]이(가) 잘 보살피도록."
 mem_crawler.1.xenophile:0 "어머나, 너무 귀엽다! 이거 우리가 키우면 안될까?"
 mem_crawler.1.b:0 "[Owner.Capital_Scope.GetName](으)로 가져가 해부해보지."
 mem_crawler.1.c:0 "죽여! 불로 태워버려!"
 mem_crawler.1.swarm:0 "[Leader.GetName]이(가) 먹어치우게 둬."
 mem_crawler.2.name:0 "애완 크라울러"
 mem_crawler.2.desc:0 "이전 소유자가 사망하여 크라울러가 [new_owner.GetName]에게 분양 되었습니다.\n\n[new_owner.GetSheHeCap]은(는) 이 생명체를 잘 보살피겠다고 약속했습니다."
 mem_crawler.2.desc.machine:0 "기존 관리 유닛의 작동이 중지되었기에 크라울러는 [new_owner.GetName]의 관리하에 놓였습니다."
 mem_crawler.2.tooltip:0 "§Y[new_owner.GetName]§!이(가) 크라울러의 새 주인이 됩니다."
 mem_crawler.4.name:0 "애완 크라울러"
 mem_crawler.4.desc:0 "최근 사건으로 [From.Leader.GetName]의 관리하에 있던 크라울러가 사망했다는 보고를 받았습니다."
 mem_crawler.4.a:0 "안타깝군."
 mem_crawler.5.name:0 "애완 크라울러"
 mem_crawler.5.desc:0 "[crawler_owner.GetName]의 관리하에 있던 크라울러는 예상보다 지능적인 것으로 보입니다.\n\n이 생물은 지나가는 사람을 알아볼 수도 있고, 그들과 유대를 형성할 수도 있습니다. 먹이를 주는 사람이 서식지에 접근하면 기뻐서 흥분된 반응을 보이기도 하고, 귀찮게만 하지 않는다면 실제로 꽤 친절하고, 때로는 장난기 가득한 것처럼 보입니다."
 mem_crawler.6.name:0 "크라울러의 죽음"
 mem_crawler.6.desc:0 "[crawler_owner.GetName]는 [crawler_owner.GetHerHis]의 관리 하에 있는 크롤러 생물이 사망했다고 보고합니다. \n\n오늘 밤, 그것은 마지막으로 난방 램프 아래의 좋아하는 자리에 누워 몸을 말고 호흡을 멈췄습니다. 그 이후로 생명 신호는 감지되지 않았으며, 생물의 고급 나이가 주요 원인일 가능성이 높습니다. 우리는 여전히 생물의 기원에 대한 정보와 다른 크롤러가 다른 곳에 존재하는지 여부에 대한 정보가 없기 때문에, 우리는 이 종의 완전한 멸종을 목격했을 가능성이 큽니다."
 mem_crawler.6.a:0 "편히 잠들기를..."
 mem_crawler.6.b:0 "전 제국에 크라울러 감사의 날을 선포하라."
 mem_crawler.6.c:0 "이제 우리는 저 생물을 안전하게 해부해볼 수 있겠군."
 mem_crawler.6.d:0 "이건 끝이 아니다."
 mem_crawler.10.desc:0 "당신의 시민 중 한 명인 [crawler_owner.GetName]가 당신이 §YCrawler§!라고 부르는 외계 생물을 애완동물로 삼았다는 사실이 우리의 주목을 받았습니다. \n\n해당 생물은 [request_sender.GetName]의 신성한 문서에 있는 설명과 일치합니다 - 강력한 악마, 공허의 포식자, 어둠의 존재입니다. 이 괴물이 더 강력해지기 전에 반드시 처치하는 것이 매우 중요합니다."
 mem_crawler.10.a:0 "우리는 그깟 전설때문에 반려동물을 죽이지 않는다."
 mem_crawler.10.a.mat:0 "이건 바보같아. 너네도 다 바보같고..."
 mem_crawler.10.a.spi:0 "우리의 경전에는 그런 내용따윈 없다."
 mem_crawler.10.b:0 "좋다. 그렇게 해라."
 mem_crawler.10.b.tooltip:0 "크라울러가 더 이상 우리 소유가 아닙니다."
 mem_crawler.11.desc:0 "안녕하세요. \n\n우리 [request_sender.GetRulerTitle] [request_sender.Ruler.GetName]는 이상하고 이국적인 존재들을 훌륭하게 채굴하는 채굴가입니다. 당신이 '크롤러'라고 부르는 독특한 생물을 발견했다는 소식을 들었습니다. \n\n판매할 의향이 있으시다면, 우리는 당신에게 £energy §Y1000§!을 지급하겠습니다. 거래를 하시겠습니까?"
 mem_crawler.11.a:0 "아니."
 mem_crawler.11.b:0 "거래하지."
 mem_crawler.11.b.tooltip:0 "크라울러가 더 이상 우리 소유가 아니게되며 [request_sender.Ruler.GetTitle] [request_sender.Ruler.GetName]의 야생 동물원으로 이송됩니다."
 mem_crawler.12.desc:0 "은하계 생명체의 보호자로서 멸종위기종을 지키는 것은 우리의 신성한 임무입니다. 그 중 크라울러라고 불리는 생명체는 우리의 흥미를 끄는군요. \n\n그 생물체를 우리에게 보내신다면 정말 감사하겠습니다. 약속하죠, 잘 돌보겠습니다."
 mem_crawler.12.a:0 "그럴 일은 없을 것이다."
 mem_crawler.12.b:0 "잘 부탁하지."
 mem_crawler.12.b.tooltip:0 "$mem_crawler.10.b.tooltip$"
 mem_crawler_harboring:0 "악마를 숨기고 있음"
 mem_crawler_killed:0 "악마를 죽임"
 mem_crawler_denied_request:0 "크라울러 판매 거부"
 tech_mem_crawler_physiology:0 "크라울러 생리학"
 tech_mem_crawler_physiology_desc:0 "우리가 소행성에서 주워온 크라울러는 매우 특이한 생리를 가지고 있습니다. 그러니 그 생물을 해치지 않고 비침습적인 연구를 수행하여 무엇이 이 생물을 특별하게 만드는지 연구해야 합니다."
 mem_crawler_cloning_possibility:0 "§H기능 잠금 해제:§! 크라울러 증식."
 mem_crawler_cloning_possibility_desc:0 "언젠가 §Y크라울러§!의 유전 조직을 이용해 그 종족을 다시 증식시킬 수 있을 것입니다."
 mem_crawler_cloned_pets:0 "애완 크라울러"
 mem_crawler_cloned_pets_desc:0 "복원된 크라울러는 똑똑하고 충성하는 애완동물로 주민들 사이에서 인기입니다."
 mem_crawler_cloned_pets_tooltip:0 "지도자들이 특별한 특성을 얻을 수도 있습니다."
 MEM_CRAWLER_CLONING_PROJECT:0 "크라울러 복제"
 MEM_CRAWLER_CLONING_PROJECT_DESC:0 "크롤러는 오랫동안 충성스러운 애완동물이었지만, 그 죽음이 그 종의 끝이 될 필요는 없습니다. 우리가 살아있을 때 수집한 데이터와 사후 샘플인 세포 및 조직을 활용하여 클론 기술을 사용해 그 개체 수를 복원할 수 있습니다."
 mem_crawler.13.name:0 "크라울러 복제 성공"
 mem_crawler.13.desc:0 "우리의 생리학 지식을 활용하여 크롤러의 특정 세포 배양을 활성화하고 자가 수정 생식을 유도할 수 있었습니다. 첫 번째 배치의 크롤러 알이 지금 부화하고 있습니다. \n\n이 종은 자연적으로 변이 가능하며, 약간의 조정을 통해 그들의 유전자 코드에 충분한 변이를 도입하여 안정적인 생식을 가능하게 하고, 밀접하게 관련된 소규모 집단에서 일반적으로 발생하는 유전적 붕괴를 피할 수 있었습니다."
 mem_crawler.13.a:0 "제국 전역에 애완동물로 배포해라."
 mem_crawler.13.b:0 "자연 보존 구역에 풀어놓아라."
 mem_crawler.13.b.tooltip:0 "§YCrawler Sanctuary§!를 생성하는 일회성 결정을 활성화합니다. 이는 독특한 제거할 수 없는 방해물입니다."
 decision_mem_crawler_sanctuary:0 "크라울러 보호구역 설치"
 decision_mem_crawler_sanctuary_desc:0 "크라울러의 취향에 맞게 넓은 구역을 개조합니다."
 d_mem_crawler_sanctuary:0 "크라울러 보호구역"
 d_mem_crawler_sanctuary_desc:0 "크라울러의 생리적 욕구에 맞게 섬세하게 조정된 자연 구역입니다. 수 천마리의 생명이 살아가고 있습니다."
 mem_crawler_cant_clear_sanctuary:0 "크라울러 보호구역은 제거할 수 없습니다."
