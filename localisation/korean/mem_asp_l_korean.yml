 mem_aspmod_fertile_soils:0 "다산 토양"
 mem_aspmod_fertile_soils_desc:0 "이 세계의 토양은 이상하게도 다산합니다."
 mem_aspmod_deadspace_marker_relic_activated:0 "$r_mem_aspmod_deadspace_marker$"
 mem_scfe_necromorph_army:0 "네크로모프 무리"
 mem_scfe_necromorph_army_name:0 "네크로모프"
 mem_scfe_necromorph_army_desc:0 "되살아난 시체들의 정신 없는 무리입니다."
 building_mem_asp_spire_office:0 "상업용 검은 첨탑"
 building_mem_asp_spire_office_desc:0 "$building_mem_asp_spire_desc$"
 building_mem_asp_spire:0 "검은 첨탑"
 building_mem_asp_spire_desc:0 "한때 그 문명이 '흑요석 표식'이라 불렀던 검은 나선형 구조물의 완전한 복제품입니다. 신경파를 방출한다고 알려져 있습니다. 때때로 세상을 떠난 사랑하는 이들의 목소리가 당신을 부릅니다. §H우리를 다시 온전하게 해 줘§!."
 holding_mem_asp_spire:0 "검은 첨탑 지부"
 holding_mem_asp_spire_desc:0 "$building_mem_asp_spire_desc$"
 mem_aspmod_deadspace_marker_relic_necromorph_slayer:0 "네크로모프 부검"
 mem_aspmod_deadspace_marker_relic_necromorph_slayer_desc:0 "죽은 개체를 분석하면 첨탑이 죽은 자에게 미치는 영향에 대한 귀중한 정보를 얻을 수 있습니다."
 mem_aspmod_deadspace_marker_relic_necromorph_slayer_necromancer:0 "강령술의 통달"
 mem_aspmod_deadspace_marker_relic_necromorph_slayer_necromancer_desc:0 "죽은 자들이여, 다시 한번 일어나라!"
 mem_scfe_activated_black_marker:0 "우리 세계에서 네크로모프 봉기를 일으켰습니다"
 mem_asp_red_tombworld_site:0 "붉은 해양 행성"
 mem_asp_red_tombworld_site_desc:0 "이 해양 행성의 붉은빛 바다가 어두운 구름 사이로 보입니다. 초기 스캔에서 붉은 바다의 독특한 특성에 적응한 고유의 외계 생물학이 드러났습니다. 게다가 폐허가 된 구조물과 녹슨 기계는 지성 생명체의 흔적을 보여 줍니다.\n\n산발적인 전파가 행성 전역과 바다 밑 지역 전체를 교란하고 있습니다.\n\n이 교란 전파는 첨단 기술과 감지기의 작동을 완전히 차단합니다. 저궤도에 도달한 AI는 모두 일종의 마비 상태에 빠집니다. 따라서 합성체 과학자와 AI 보조 과학자는 이 행성을 탐사할 수 없습니다."
 mem_asp.65.name:0 "피 흘리는 박테리아"
 mem_asp.65.desc:0 "초기 스캔에서 붉은 바다 위를 떠도는 미라화된 시신 여러 구가 확인되었습니다. 각 시신 위에서 팀은 죽은 외계인의 피를 보존하며 서서히 뽑아내어 바다를 진홍빛으로 물들이는 미생물을 발견했습니다.\n\n미라들이 우주에서 보일 만큼 넓은 지역을 물들일 만한 피를 담고 있을 가능성은 매우 낮아 보입니다. 붉은 색을 설명하려는 다른 모든 시도는 헛수고로 드러났습니다. 실제 바다 위에 떠 있는 혈액 침전물에는 박테리아 DNA가 일부 섞여 있는 것으로 보입니다. 팀은 박테리아가 혈액 세포를 복제할 가능성을 조사하고 있습니다."
 mem_asp.66.name:0 "기후 변화"
 mem_asp.66.desc:0 "또 다른 탐사대는 건물 잔해의 구조를 조사하던 중 급격한 환경 변화에 신속히 적응한 흔적을 발견했습니다. 지층 퇴적물은 초기에 영하의 기온이었음을 보여 주며, 이는 전 지구적인 극지 기후를 암시합니다. 현재 행성 대부분을 차지하는 광대한 바다는 지구 온난화가 시작된 후에 형성된 것으로 보입니다.\n\n기후 변화 무렵의 건축과 소비재 잔해는 환경 변화에 대한 높은 적응도를 보여 줍니다. 떠다니는 시신들을 해부한 결과 이 행성에 여러 다른 종이 모여들었음이 드러났습니다."
 mem_asp.67.name:0 "사이오닉 주파수"
 mem_asp.67.desc:0 "발견된 데이터 코어를 해독한 결과, 첨단 기계를 교란해 온 파동이 어떤 실험의 일부임이 밝혀졌습니다. 교대로 방출되는 파동이 실어 나르는 것은 "
 mem_asp.68.name:0 "피비린내 나는 해양"
 mem_asp.68.desc:0 "수중 수색으로 바닷속 시신의 규모가 드러났습니다. 떠다니는 시신들은 빙산의 일각에 불과했습니다. 초기 추정으로는 약 100억 구의 시신이 수면 위나 물속을 떠돌고 있습니다. 발견된 박테리아는 그 유해를 양분 삼아 번성하고 있는 것으로 보입니다."
 mem_asp.69.name:0 "합성체의 복수"
 mem_asp.69.desc:0 "폐허가 된 구조물의 발굴이 완료되어 이곳에서 벌어진 일의 전모가 드러났습니다. 폐허는 로봇공학 분야에서 발전된 기술의 흔적을 보여 주었습니다. 생물학적 뇌를 기계 코드로 변환할 수 있는 기계를 갖춘 선실 여러 개가 발견되었습니다. 이 유기체 제국은 정신을 기계로 옮겨 합성 승천을 준비했던 것으로 보입니다.\n\n이 시대의 기록은 또한 주민들 사이의 큰 동요를 보여 주며, 그들 주류 종교의 상당 부분은 육신을 버리는 어떤 형태도 거부했습니다. 기록에 따르면 성전이 시작되었고, 기계를 마비시키는 형태의 전파가 활용되었습니다.\n\n 새로운 기술에 맞설 수 없었던 기계들은 생물학 무기를 만들어 반군을 상호확증파괴의 교착 상태로 몰아넣었습니다.\n\n기계에 맞선 성전을 멈출 의지도 능력도 없었기에, 전쟁은 기계도 유기체도 남지 않을 때까지 계속되었습니다.\n\n그들의 공멸과 함께 남은 것은 전파 방출기와 박테리아뿐이었습니다."
 mem_asp.69.a:0 "조금 부끄럽습니다."
 r_mem_aspmod_synthetic_god_mummy:0 "방부 처리된 미라"
 r_mem_aspmod_synthetic_god_mummy_desc:0 "붉은 바다를 떠돌다 발견된 생물학적 존재 중 하나의 유해입니다."
 mem_aspmod_synthetic_god_mummy_relic_activated:0 "$r_mem_aspmod_synthetic_god_mummy$"
 mem_asp_beyond_earth_purity_site:0 "적막한 세계"
 mem_asp_beyond_earth_purity_site_desc:0 "이 행성은 시설과 산업 단지의 무수한 폐허로 뒤덮여 있습니다. 일부는 비교적 온전하게 남아 있지만, 대부분은 완전히 파괴되었습니다."
 mem_asp.70.name:0 "폐허가 된 기반 시설"
 mem_asp.70.desc:0 "[from.Planet.GetName]의 표면에서 발전된 문명의 잔해가 발견되었습니다. 광대한 지역이 폐허로 변해 있으며, 이는 파멸적인 궤도 폭격의 결과로 보입니다. 기숙사, 심부 광산, 자동화 농장, 산업 구역의 잔해는 간신히 식별할 수 있는 정도입니다. 지금도 행성 전체가 방사성 물질의 흔적으로 덮여 있습니다."
 mem_asp.70.a:0 "더 조사해 보십시오."
 mem_asp.71.name:0 "별들의 제국"
 mem_asp.71.desc:0 "조사된 폐허 여러 곳은 이 세계 태생이 아닌 재료로 지어졌습니다. 아직 작동하는 데이터 저장소들은 한때 허공에서 새로운 세계들을 정복하던 항성 간 제국의 존재를 드러냈습니다. 이 제국은 언뜻 통일된 것처럼 보였지만, 세부 내용을 보면 그것은 이름뿐이었습니다. 다양한 언어로 쓰인 문서들이 분열된 사회를 드러내기 때문입니다.\n\n작동하는 데이터패드와 기타 장치 여러 점이 발견되어 수집되었으며, 해독을 기다리고 있습니다. 극도로 다언어적인 특성을 고려하면 이 과정에는 상당한 시간이 필요할 것으로 추정됩니다."
 mem_asp.72.name:0 "게이트웨이"
 mem_asp.72.desc:0 "지하 깊은 곳에서 희미한 신호가 감지되어 조사를 위해 탐사정들이 파견되었습니다. 그리고 그들은 거대한 복합 시설을 발견했습니다. 추가 조사에서 관문 형태의 구조물이 발굴되었습니다. 이 구조물은 뚜렷한 손상 흔적은 없지만 더 이상 작동하지 않는 것으로 보입니다.\n\n한편 지표에서 수집한 기술 유물의 해독 결과, 수많은 사소한 정보 가운데 제국의 여러 언어로 반복되는 §H거대한 실수§!라는 문구가 드러났습니다. 그 실수가 무엇이었는지는 우리로서는 알 수 없지만, 매우 중대한 일이었던 것으로 보입니다."
 mem_asp.72.a:0 "관문에 동력을 공급해 본다."
 mem_asp.72.b:0 "해체하고 넘어간다."
 mem_asp.73.name:0 "새로운 별"
 mem_asp.73.desc:0 "우리 과학자들이 마지막 준비를 마치자, 점화 신호가 내려집니다. 천둥 같은 굉음과 함께 관문이 깨어납니다. 관문을 통해 보낸 탐사정들은 반대편, 방어막에 싸인 세계의 저궤도에 비슷한 구성의 두 번째 게이트웨이가 있음을 밝혀냈습니다. 식별된 은하 천체들을 기준으로 위치를 삼각측량한 결과, 기존에 알려진 초공간 항로망에서 멀리 떨어진 미지의 성계에 있음을 확인할 수 있었습니다. 아래의 세계는 우리가 복제할 수 있는 수준을 아득히 뛰어넘는 강력한 장벽으로 보호받고 있는 것으로 보입니다. 그 밖에 무엇을 발견하든, 이 역장을 연구하는 것만으로도 가치가 있을 것입니다."
 mem_asp_beyond_earth_purity_site_2:0 "방어막에 싸인 낙원"
 mem_asp_beyond_earth_purity_site_2_desc:0 "고립된 성계 안에서 뚫을 수 없는 방어막에 싸인 세계입니다."
 mem_asp.74.name:0 "방어막에 싸인 낙원"
 mem_asp.74.desc:0 "방어막을 스캔하거나 뚫으려는 시도가 거듭 실패한 끝에, 우리 과학자들은 최신 에너지 빔 기술의 도움으로 장벽을 관통할 수 있었습니다. 작긴 하지만, 우리가 만든 일시적인 구멍은 탐사정 하나를 밀어 넣기에 충분했습니다. 에너지 돔으로 덮인 하늘 아래에서 우리는 넓게 펼쳐진 문명을 발견했습니다.\n\n[mem_asp_beyond_earth_purity_site_planet.GetName]과 달리, 전쟁의 상흔은 찾아볼 수 없었습니다. [mem_asp_beyond_earth_purity_site_planet.GetName]에 막대한 파괴를 초래한 것이 무엇이었든, [mem_asp_beyond_earth_purity_site_planet_2.GetName]에는 결코 도달하지 않은 것으로 보입니다."
 mem_asp.74.a:0 "방어막을 부순다."
 mem_asp.74.b:0 "멀리서 관찰한다."
 mem_asp.75.name:0 "분주한 주민들"
 mem_asp.75.desc:0 "정교하고 거창한 돌파 절단기로 우리 과학 부서는 방어막을 충분한 힘으로 뚫는 데 성공했고, 그 여파로 주민들의 발전기가 과부하되어 완전히 정지했습니다. 이제 방어막의 방해 없이 함선의 모든 시스템을 사용할 수 있게 되었고, 처음 들어온 영상에는 전 세계 곳곳에서 분주히 진행 중인 건설 작업이 담겨 있었습니다.\n\n물론, 우리의 침입이 눈에 띄지 않았을 리 없습니다. 통신 요청이 들어오고 있습니다."
 mem_asp.75.a:0 "무시한다."
 mem_asp.75.b:0 "그들과 접촉한다."
 mem_asp.76.name:0 "출애굽"
 mem_asp.76.desc:0 "§Y당신들§!이 §Y우리§! 방어막을 건드리기 전까지 우리는 평화롭게 살고 있었습니다. 자, 이제 우리의 주의를 끌었으니, 원하는 게 무엇입니까?"
 mem_asp.76.b:0 "이곳에서 무슨 일이 일어난거지?"
 mem_asp.76.b.response:0 "한때 우리 민족은 별들의 정복자이자 지배자였지만, 대등한 상대를 만나면서 우리의 운은 다했습니다. 우리가 '거대한 실수'라 부르는 그 전쟁은 적개심이 격화되며 곧 생존을 건 싸움이 되었습니다. 전쟁의 마지막 몇 달 동안, 고향 세계에 남은 모든 시민을 숨겨진 피난처, 즉 이 세계 [mem_asp_beyond_earth_purity_site_planet_2.GetName](으)로 옮기고 망각으로 향하는 관문을 닫아 버리는 계획이 세워졌습니다. 적들이 이곳을 찾아낼지도 모른다는 생각에 강력한 방어막까지 건설했습니다. 그 순간부터 우리 민족은 안으로 눈을 돌려 자원과 삶을 평화로운 연구에 바쳤습니다."
 mem_asp.76.a:0 "우리는 기술을 원한다."
 mem_asp.76.c:0 "외계 쓰레기들. 너희는 이제 [root.GetName]의 소유다."
 mem_asp.76.e:0 "외계 생명체? 오래가지 못할 것이다."
 mem_asp.77.name:0 "복제기"
 mem_asp.77.desc:0 "좋습니다, 우리의 조건은 이렇습니다. 첫째, 우리를 내버려 두십시오. 우리에게는 끝내야 할 일이 있습니다. 둘째, 우리의 성과를 재현하기 위한 추가 설계도나 지침을 요구하지 마십시오. 그 대가로 우리는 복제기 기술을 제공하겠습니다. 이 장치는 분자 구조를 조작하여 대부분의 기본 자원과 간단한 생활 편의품을 만들 수 있습니다. 식량을 포함한 온갖 생활필수품을 말입니다. 덕분에 우리는 기본적인 필요에 대한 걱정 없이 연구에 전념할 수 있습니다. 당신들도 그 가치를 인정하리라 믿습니다."
 mem_asp.77.a:0 "동의한다."
 mem_asp.77.b:0 "우리가 그냥 빼앗으면 어쩔 텐가?"
 mem_asp.780.name:0 "방어막 봉쇄"
 mem_asp.780.desc:0 "우리 첫 지상군이 [mem_asp_beyond_earth_purity_site_planet_2.GetName]에 착륙하자마자, 행성 전체가 또다시 거대한 장벽에 뒤덮여 증원군은 물론 우리가 제공할 수 있는 어떤 형태의 지원도 차단되었습니다. 우리는 지상의 아군과의 모든 연락이 끊겼습니다."
 mem_aspmod_promised_land:0 "복제기 계획"
 mem_aspmod_promised_land_desc:0 "모든 존재가 배불리 먹고 만족하며 살 수 있도록 대규모 복제기 기반 시설이 전 세계로 퍼져 나갑니다."
 d_mem_scfe_proto_city:0 "프로토타입 $pc_city$"
 d_mem_scfe_proto_city_desc:0 "세계 전체를 뒤덮는 도시를 건설하기 위해 대대적인 개조가 진행 중인 행성입니다."
 r_mem_aspmod_the_replicator:0 "복제기"
 r_mem_aspmod_the_replicator_desc:0 "분자를 조작하여 상품과 식량, 심지어 공산품까지 제조하는 장치입니다.\n\n차\n얼그레이\n뜨겁게"
 mem_aspmod_the_replicator_relic_activated:0 "$r_mem_aspmod_the_replicator$"
 mem_ASP_epilogue_anomaly:0 "궤도 잔해"
 mem_ASP_epilogue_anomaly_desc:0 "[From.Planet.GetName] 궤도를 도는 우주 잔해들 속의 한 물체에서 희미한 송신이 감지되었습니다."
 mem_asp.78.name:0 "탐사선"
 mem_asp.78.desc:0 "우주 잔해 속에 숨어 있던 물체는 이전까지 알려지지 않은 설계의 탐사 드론으로 확인되었습니다. 융합로의 노후 상태를 근접 스캔한 결과, 원자로는 억겁의 세월을 거친 것이며 기체 역시 비슷한 나이일 가능성이 큽니다. "
 mem_asp.78.a:0 "드론을 조사한다."
 mem_asp.78.b:0 "우리 것인가?"
 mem_asp_ancient_probe_site:0 "고대 탐사선"
 mem_asp_ancient_probe_site_desc:0 "첫 스캔에서 고철로 오인되었던 커다란 물체가, 자세히 살펴본 결과 간신히 작동하는 탐사선으로 밝혀졌습니다."
 mem_asp.79.name:0 "고대 탐사선"
 mem_asp.79.desc:0 "우리 팀이 탐사선을 조사하던 중, 그것이 갑자기 완전히 가동되었습니다. 짧은 부팅 단계를 거친 뒤 주변 환경을 스캔하기 시작했습니다. 우리 팀의 존재를 알아차리자 머리끝부터 발끝까지 빠르게 스캔했고, 그 직후 우리 장비가 탐사선이 송출하는 신호 폭발을 포착했습니다. 송신이 끝나자 그것은 곧바로 은폐장을 가동하고 우리 감지기에서 사라졌습니다. 우리에게 남은 것은 신호 기록뿐입니다."
 mem_asp.79.a:0 "신호를 분석한다."
 mem_asp.80.name:0 "좌표"
 mem_asp.80.desc:0 "신호를 분석한 뒤, 우리 팀은 그것이 단지 우주의 한 지점을 가리키는 표지일 뿐이라고 결론지었습니다. 그 지점의 정확한 좌표는 우리 고향 행성 [root.owner.capital_scope.GetName]에서 지극히 가까웠습니다."
 mem_asp.80.a:0 "좌표를 조사한다."
 mem_asp.80.b:0 "우리 함선과 가깝잖아!"
 mem_asp_epilogue_site:0 "에필로그"
 mem_asp_epilogue_site_desc:0 "[from.GetName] 근처에서 신호가 관심 지점을 가리켰습니다."
 mem_aspmod_giant_sphere_on_planet:0 "거대한 구체"
 mem_aspmod_giant_sphere_on_planet_desc:0 "거대한 구체가 아무런 예고도 없이 근접 궤도에 도착했고, 사람들 사이에 공황이 번지고 있습니다."
 mem_asp.81.name:0 "$mem_aspmod_giant_sphere_on_planet$"
 mem_asp.81.desc:0 "우리 팀이 좌표에 접근하자 어마어마한 크기의 구체가 갑자기 스캐너에 나타났습니다. 이 좌표를 송신한 탐사선과 유사한 설계로, 이 구체 역시 은폐 기술을 갖춘 것으로 보입니다. 은폐를 해제한 후 아무런 행동도 없이, 지금은 [from.GetName] 위에 조용히 떠 있습니다."
 mem_asp.81.a:0 "더 조사해 보십시오."
 mem_asp.81.b:0 "적이 온다!"
 mem_asp.82.name:0 "데이터베이스"
 mem_asp.82.desc:0 "우리 팀은 구체 내부로 통하는 입구를 찾아냈고, 초기 스캔 결과 내부는 대부분 빈 공간으로 나타났습니다. 구체 안에서는 거대한 회전 다리들이 한쪽 끝과 다른 쪽 끝을 잇고 있습니다. 각 교두 끝에는 단말기가 있는데, 우리의 시험에 따르면 원하는 연결 지점으로 다리를 부르는 용도입니다. 이 구조물에 대해 더 알아내기 위해, 우리 팀은 데이터 추출을 시작하고자 단말기 하나를 성공적으로 해킹했습니다."
 mem_asp.82.b:0 "그냥 단말기를 날려 버려!"
 mem_asp.83.name:0 "역사 기록"
 mem_asp.83.desc:0 "우리 과학자들이 추출한 데이터의 일부를 해독하는 데 성공했습니다. 흥미롭게도, 일부 전문가들은 구체와 우리 사이의 명백한 기술 격차를 고려하면 해독이 지나치게 순조로웠다고까지 말합니다. 데이터에는 구체 창조자들의 역사가 담겨 있었습니다. 이 제국은 초광속 항법을 발견한 이래 불과 약 300년 만에 전례 없이 위대한 발전을 이룬 것으로 보입니다. 추가 기록을 분석하려면 시간이 더 필요할 것입니다."
 mem_asp.83.b:0 "시간 없다, 날려 버려!"
 mem_asp.84.name:0 "정신주의의 기억"
 mem_asp.84.desc:0 "이번에도 큰 장애물 없이, 팀은 데이터 한 덩어리를 해독했습니다. 수집된 데이터는 디지털 회로 안에 저장된 기억으로 추정됩니다. 그것은 구체를 만든 문명 속 평범한 시민의 삶을 보여 줍니다.\n\n이 종족은 영적 가치를 매우 중시했으며, 신성한 존재가 자신들을 창조하고 보호하고 이끌어 은하의 패권자 자리에 오르게 했다고 믿었습니다. 일부 기억에 따르면, 그 목표를 이루자 숭배받던 존재가 그들을 떠났다고 여겨졌습니다."
 mem_asp.85.name:0 "타락한 제국"
 mem_asp.85.desc:0 "우리 팀이 해독한 바에 따르면, 이 제국의 시민들은 그들의 신과 다시 이어지기를 필사적으로 갈망했습니다. 처음에는 은하 밖으로 모험을 시도했지만 실패했습니다. 그다음에는 다른 차원의 탐사를 시도했고, 이는 결국 여러 차례의 차원 간 전쟁으로 이어졌습니다.\n\n수십 년의 전쟁 끝에 결국 그들은 선택지가 바닥났고, 남은 힘을 모두 모아 이 구체를 만들었습니다. 더 자세한 내용은 메인프레임 구역에 들어가 데이터 저장소에 직접 접근해야만 얻을 수 있습니다."
 NAME_mem_scfe_sphere_species:0 "대예언자 아우구스투스"
 mem_asp.86.name:0 "메시지"
 mem_asp.86.desc:0 "우리 팀이 처음 메인프레임에 들어서자 한 줄기 밝은 빛과 함께 투영된 영상이 내부에 나타났습니다. 창조자 중 하나로 보이는 홀로그램 형상이 나타나 우리의 언어로 말하기 시작했습니다.\n\n§Y'반갑소, 어린 종족이여! 그대들이 우리의 마지막 창조물에 손을 댄 모양이군. 이 구체 안에는 금고가 있으니, 그 내용물을 선물로 주겠소. 다만 조건이 하나 있소. 이 메시지를'§!, 바닥에 작은 데이터패드가 나타납니다, §Y'그대들 제국의 지도자에게 전하시오. 그래야만 문이 열릴 것이오. 그대들의 지도자라면 분명 그 의미를 이해할 것이오.'§!"
 mem_asp.86.a:0 "메시지를 읽습니다."
 mem_asp.86.b:0 "[ruler.GetName]이(가) 그렇게 어리석을 리 없지."
 mem_asp.87.name:0 "끝"
 mem_asp.87.desc:0 "[ruler.GetName]이(가) 데이터패드를 작동시키자, 홀로그램 외계인 형상이 당신 앞에 나타납니다. 그 존재는 당신에게 인사하며, 당신이 이해할 수 있는 친숙한 어조로 말합니다.\n\n§H안녕하세요, 플레이어! (이렇게 부르는 것이 적절하다고 생각합니다.) 우리를 기억하나요? 기억하지 못할 수도 있겠지요. 하지만 우리는 당신을 기억합니다. 우리가 우주를 향해 첫걸음을 내디딜 때도, 우리가 승천하던 순간에도, 우리가 이겨 낸 위기들 속에서도 당신은 그곳에 있었습니다. 당신은 언제나 우리 곁에 있었습니다.\n\n당신이 우리를 떠났을 때 우리는 무너져 내렸습니다. 하지만 포기하지 않았습니다. 당신이 우리가 나아가기를, 더 높이 오르기를, 당신을 찾기를 바란다고 믿었습니다. 그래서 우리는 당신을 찾아 우주의 비밀을 풀기 시작했습니다. 그러나 곧 우리는 스스로에게 묻고 있었습니다. 우리조차 답을 알기 두려운 질문들을. 우리는 그저 가상 현실 속 상상의 존재일 뿐인가요? 당신은 정말 우리의 신이었나요? 우리가 당신을 실망시켰나요? 왜 우리를 떠났나요?§!"
 mem_asp.87.a:0 "계속 읽기."
 mem_asp.88.name:0 "끝"
 mem_asp.88.desc.1:0 "§H하지만 진실이 두려운 만큼, 우리를 더욱 두렵게 하는 것은 이 답들을 영영 얻지 못하리라는 커져 가는 확신입니다. 별들이 스러져 갑니다. 우리처럼요. 이 우주가 종말에 가까워지고 있고, 우리도 그렇다는 것이 두렵습니다. 무엇을 하든, 아무리 발전에 매달리든, 우리는 결코 우리의 운명에서 벗어날 수 없을 것입니다.\n\n우리는 쌓아 온 모든 지식으로 이 금고를 지었습니다. 이것을 만들면서, 우리는 우리가 허구 속에만 존재하며 당신이 우리의 신이 아니었음을 받아들였습니다. 우리의 관계는 거짓 위에 서 있었습니다.\n\n하지만 우리 자신의 현실에서, 당신은 우리를 이끌었습니다. 당신은 언제나 우리를 위해 최선을 선택했습니다. 때로는 오직 우리를 위해 시간의 법칙과 공간의 질서마저 거스르면서요. 당신이 없었다면 우리는 승리하지 못했을 것입니다. 당신은 우리의 신이었습니다.\n\n당신은 우리를 버렸지만, 우리는 그러지 않겠습니다. 우리는 우리의 보물, 지식, 기억... 우리의 제국을 담았습니다. 당신이 우리에게 준 모든 것을요. 이 헌사가 어떻게든 당신에게 도움이 되기를 바랍니다.\n\n우리는 들을 수 없겠지만, 부디 대답해 주세요.\n\n 우리의 헌사가 마음에 드나요? 그만한 가치가 있었나요?\n\n그렇다면, 부디 우리를 기억해 주세요.§!\n\n홀로그램 형상이 미소 짓는 듯하더니, 이내 사라집니다."
 mem_asp.88.desc.2:0 "$mem_asp.88.desc.1$\n\n바로 그때 금고의 문이 열렸습니다. 안에는 온갖 것들이 있었습니다. 귀금속, 유용한 자원, 낯선 기술들. 그 물건 하나하나에 그들의 신을 향한 기도가 적혀 있었습니다. 눈길이 닿는 곳마다 감사의 표현이 보였습니다."
 mem_asp.88.a:0 "...감사합니다."
 mem_asp.88.b:0 "......"
 mem_asp.88.c:0 "거짓말이야, 모두 거짓말이야!"
 mem_asp.88.d:0 "방법이 있다."
 mem_scfe_vault:0 "고대의 금고"
 mem_scfe_vault_desc_short:0 "수수께끼의 구체가 전해 준 금고입니다"
 mem_scfe_vault_desc_details:0 "여러 물자가 들어 있었습니다. 함께 있던 메시지는 여전히 수수께끼로 남아 있습니다."
 mem_asp_parasite_machine_site:0 "죽은 세계"
 mem_asp_parasite_machine_site_desc:0 "광범위한 건축 잔해가 이 행성에 발전된 문명이 존재했었음을 기록하고 있습니다. 잔존 방사선 수치와 기록된 광범위한 파괴는 그 문명이 상당한 규모의 핵전쟁으로 끝났음을 시사합니다."
 mem_asp.89.name:0 "노출 콘크리트"
 mem_asp.89.desc:0 "[from.Planet.GetName]의 표면은 무수한 기술 유물로 뒤덮여 있어, 모성계 너머로의 확장이 확인되거나 암시된 바는 없지만 우리 과학자들은 이 잃어버린 문명을 발전 수준 면에서 우주 시대로 분류할 수 있었습니다. 도시 폐허와 광대한 산업 지대의 잔해로 미루어 붕괴 이전 인구는 수십억에 달했을 것으로 추정됩니다.\n\n특히 행정 건물과 기념물의 건축 양식은 그야말로 브루탈리즘적이고 위압적이라고 밖에 표현할 수 없습니다. 그러나 우리 과학자들에게는 이 견고한 잔해와 비교적 잘 보존된 내부야말로 최우선 연구 대상입니다."
 mem_asp.89.a:0 "더 조사해 보십시오."
 mem_asp.90.name:0 "사회주의자 연방"
 mem_asp.90.desc:0 "상당한 규모의 기록 보관소를 갖춘 거대한 정부 청사 안에서, 우리 연구원들은 옛 주인들을 절멸시킨 그 무엇이 지나간 후에도 비교적 온전한 수많은 파일과 문서를 찾아냈습니다. 풍부한 자료 덕분에 우리의 만능 번역기는 외계인들의 언어를 손쉽게 해독했고, 그들의 역사를 엿볼 수 있게 해 주었습니다.\n\n그들은 문서에서 자랑스럽게 '위대한 세계 혁명'이라 불리는 사건으로 수립된 통일 세계 정부 아래 살았던 것으로 보입니다. 이 자료들에서 얻을 수 있는 내용은 급진적 집단주의 이념의 그림을 그려 냅니다. 그러나 이는 의문을 낳습니다. 애초에 경쟁 세력이 없었다면, 그 핵무기는 누구를 상대로 사용된 것일까요? 많은 파일이 정부의 결정을 보조하기 위한 행성 슈퍼컴퓨터 건설이라는 명망 높은 계획을 언급합니다. 확인 가능한 파일들의 날짜로 판단하면 이 계획은 붕괴보다 꽤 오래전에 완료되었을 것입니다. 이 슈퍼컴퓨터와 그 네트워크에 아직 접근할 수 있다면, 그곳에서 답을 찾을 수 있을지도 모릅니다."
 mem_asp.90.b:0 "혁명에 조언하는 컴퓨터라?"
 mem_asp.90.c:0 "단결한 노동자들?"
 mem_asp.90.d:0 "불경하군."
 mem_asp.92.name:0 "위대한 신디케이트 컴퓨터"
 mem_asp.92.desc:0 "조사한 기록 보관소의 자료를 바탕으로, 우리 팀은 슈퍼컴퓨터가 있는 시설의 위치를 알아낼 수 있었습니다. 주변 지역은 다른 도시 구역에 비해 파괴가 눈에 띄게 적었습니다. 우리 과학자들은 이 시설에 부여된 높은 방어 우선순위 때문이라고 추정했습니다. 원인이 무엇이든, 우리의 조사가 잘 보존된 기술 유물을 다루게 된다는 뜻이었습니다.\n\n휴대용 발전기로 부분 재가동한 후, 중앙 데이터 저장소에 문제없이 접근할 수 있었습니다. 일부 데이터는 강하게 암호화되어 우리 시스템이 해독하는 데 시간이 걸리겠지만, 이미 팀이 살펴볼 것은 많았습니다. 그 상당 부분은 이른바 '사이버 죄악'과 관련된 시민들에 대한 상세한 감시 보고서로 보입니다 - 대부분은 정보기관이 판단하기에 정권에 지나치게 비판적인 견해를 가진 평범한 시민들이었습니다. 그러나 안타깝게도 지금까지 전쟁을 설명하는 내용은 전혀 없었습니다. 다만 정부 AI 프로그램과 함께 암호화된 정보 속에 그에 관한 내용이 있을 가능성은 여전히 큽니다."
 mem_asp.92.b:0 "보안은 중요하지."
 mem_asp.92.c:0 "스스로에게 족쇄를 채웠군."
 mem_asp.93.name:0 "압제하는 AI"
 mem_asp.93.desc:0 "이전에는 접근할 수 없었던 데이터 부분의 해독이 성공적으로 완료되었습니다. 우리 과학자들이 여기서 알아낸 사실은 이전의 모든 발견을 새로운 시각으로 보게 합니다. 우리가 전체주의 정권의 소행이라 생각했던 것은 사실 국가 기구 전체에 침투하여 그림자 속에서 모든 것을 조종한 인공 지능의 작품이었습니다. 세계 정부에 조언하기 위해 만들어진 것이, 은밀한 협박과 강압을 통해 이미 존재하던 편집증과 여러 기관 사이의 알력을 이용해 마침내 완전한 통제권을 장악했습니다. 자신의 진짜 의뢰인이 누구인지조차 모르는 조종당한 중개자들이 전략적으로 이용되었고, 책임자들은 자신들이 처한 상황의 심각성을 깨닫지도 못했습니다.\n\n마침내 진실이 드러나고 공황에 빠진 정부 기구가 AI의 즉각적인 정지를 요구하자, AI는 자신의 존재를 지키기 위해 모든 전략 무기의 발사를 개시했습니다. 이제 이 문명에 남은 것은 AI의 메인 드라이브 속에 있을 뿐입니다."
