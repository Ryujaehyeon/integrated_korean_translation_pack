 d_mem_asp_controlled_underground_lab_desc:0 "지각 깊숙이 숨겨진 지하 연구소입니다."
 mem_ASP_SIGNAL_ANALYSIS_OF_MACHINE_PROJECT:0 "기계 신호 분석"
 mem_ASP_SIGNAL_ANALYSIS_OF_MACHINE_PROJECT_DESC:0 "[Root.GetName]에서 기록한 기계의 마지막 신호를 분석해야 합니다. 시간이 좀 걸리겠지만, 우리 과학자들이 제기한 많은 질문에 답을 줄 것입니다."
 mem_ASP_KESSLER_SYNDROME_STORAGE_RESTORE_PROJECT:0 "데이터 저장 복구"
 mem_ASP_KESSLER_SYNDROME_STORAGE_RESTORE_PROJECT_DESC:0 "우리는 [From.Planet.GetName]에 위치한 거대한 우주선의 잔해 안에서 데이터 저장소를 발견했습니다. 그 데이터의 일부를 복구할 수 있을 것입니다."
 mem_ASP_AI_RE_PROGRAMMING_PROJECT:0 "반복자 재프로그래밍"
 mem_ASP_AI_RE_PROGRAMMING_PROJECT_DESC:0 "레인 월드에서 회수한 이 인공 지능은 한때 '반복자'로 지정되어 고대 문명이 종교적 문제를 해결하는 데 사용했습니다. 이제 우리는 이를 재설정하여 우리의 명령을 따르게 할 수 있습니다."
 mem_ASP_WHITE_MOLLUSC_MAMMAL_PROJECT:0 "백색 연체동물 포유류"
 mem_ASP_WHITE_MOLLUSC_MAMMAL_PROJECT_DESC:0 "우리가 포획한 연체동물-포유류 생물은 시민들은 물론 과학자들 사이에서도 큰 인기를 얻은 모양입니다. 우리 연구 부서는 그 연구를 진행하기를 간절히 바라고 있습니다."
 leader_trait_mem_asp_iterator:0 "반복자"
 leader_trait_mem_asp_iterator_desc:0 "반복자는 창조주들이 이른바 '위대한 문제'를 해결하기 위해 사용한 반생물학적 인공 지능입니다."
 PLANET_KILLER_GEOCENTRIC_DEVICE:0 "지구 중심 장치"
 PLANET_KILLER_GEOCENTRIC_DEVICE_DESC:0 "지구 중심 장치의 이 복제품은 자연의 힘을 조작하여 성계의 중력 구조를 재배열합니다.\n\n§Y대상 행성을 불모의 세계로 만들고 강제로 성계의 중심이 되게 합니다.§!"
 PLANET_KILLER_GEOCENTRIC_DEVICE_ACTION:0 "세계 중앙집중화"
 FLEETORDER_DESTROY_PLANET_WITH_PLANET_KILLER_GEOCENTRIC_DEVICE:0 "$PLANET|Y$를 중앙 집중화하는 중입니다."
 MESSAGE_DESC_FOR_PLANET_KILLER_GEOCENTRIC_DEVICE:0 "시스템의 중심으로 이전되었으며, 불모 행성으로 변환되었습니다."
 tech_mem_asp_geocentric_device:0 "지구 중심 장치"
 tech_mem_asp_geocentric_device_desc:0 "지구 중심 장치를 연구한 결과, 우리는 성계 전체를 조작할 수 있는 잠재력을 엿보게 되었습니다. \n\n§Y대상 행성을 불모의 세계로 만들고 성계의 중심이 되게 하며, 다른 모든 천체를 그 주위로 재배열합니다.§!"
 mem_asp_bedroom_planet_site:0 "올인클루시브"
 mem_asp_bedroom_planet_site_intro:0 "§Y[From.Planet.GetName]§!에서 버려진 구조물이 대량으로 발견되었습니다. 이 건물들은 매우 정교해 보이며 거주자들의 주거 수요를 효율적으로 충족하도록 설계된 것으로 보입니다. 그러나 뜻밖에도, 그 안은 바로 그 거주자들의 유해로 가득 차 있습니다."
 mem_ASPmod.10.name:0 "지상 조사"
 mem_ASPmod.10.desc:0 "지금까지 우리 과학자들이 조합해 낸 바에 따르면, 연체동물형 거주자들은 방대한 자동화 시스템에 전적으로 의존했으며, 광범위한 시스템 장애가 발생하자 그로 인해 목숨을 잃은 것으로 보입니다.\n\n이 건물들 대부분은 다른 기능이 없는 주거 시설로 - 마치 거대한 요양 시설 단지처럼 보이게 하지만 - 우리 팀은 방대한 자동화 주택 사이에서 대부분 비워진 산업 및 군사 시설 몇 곳을 발견했습니다. 그러나 주거지와 기반 시설의 비율로 볼 때 이 사회는 생존을 거의 전적으로 외부 지원에 의존했던 것으로 보입니다.\n\n최소한의 기반 시설에 더해, 이 행성의 거주자들은 경제 활동의 흔적도 거의 없었습니다. 행성 표면 곳곳에서 발견된 궤도 승강기 잔해와 우주 정거장 파편은 거주자들이 식량과 기타 소비재의 수입에 크게, 어쩌면 전적으로 의존했다는 우리의 이론을 뒷받침합니다. 그들이 실제로 관여한 유일한 활동은 지의류 재배였던 것으로 보입니다. 모든 시설과 주거지에는 공통적으로 환경적으로 밀폐된 중앙 지의류 재배 구역이 있었습니다. 어쩌면 이 지의류가 그들의 식단이나 오락의 일부였을까요?"
 mem_ASPmod.10.desc.a:0 "번성하던 무역 거점이었을지도?"
 mem_ASPmod.11.name:0 "지의류 속에서"
 mem_ASPmod.11.desc:0 "처음에 우리 과학자들은 이 지의류 재배로 보이는 것의 기이한 특성에 어리둥절했습니다. 이는 행성 생태계와 양립할 수 없어 보였고, 이 행성 태생이 아님을 강하게 시사했기 때문입니다. 추정된 영양가가 어떤 의미 있는 농업 용도로 쓰기에는 너무 낮았기에 과학자들은 추측만 할 뿐이었습니다. '지의류가 자라는 것을 지켜보기'가 만족스러운 여가라고 하기는 어려우니까요.\n\n그러던 중 그들은 이 온실 격실 하나하나가 지하에서 균사체로 연결되어, 외부 환경과 완전히 격리된 거대한 연결망을 이루고 있음을 알아차렸습니다. 처음에는 단순한 온실로 여겨졌던 것이 이제 완전히 다른 모습으로 드러났습니다. 이 공간들은 그 용도라기에는 유난히 잘 보안되어 있었는데, 사실 너무 잘 되어 있어서 그것이 실제 목적이었을 가능성은 매우 의심스러워 보입니다.\n\n새로운 접근과 열린 마음으로 균사체와 지의류 유기체를 재조사한 결과 놀라운 결론이 나왔습니다. 우리가 보고 있던 것은 유기 컴퓨터 연결망이었고, 지의류는 아마도 식물형이나 균류형 기원의 어떤 호환 가능한 종을 위한 인터페이스 장치로 기능했을 것입니다. 추가 조사가 필요하지만, 이 연결망에 접속할 수 있다면 이곳의 수수께끼가 풀릴지도 모릅니다."
 mem_ASPmod.12.name:0 "가축"
 mem_ASPmod.12.desc:0 "균사체 컴퓨터 연결망에 접속한 후, 우리 연구원들은 §Y[From.Planet.GetName]§! 거주자들의 운명에 대한 보다 완전한 그림을 조합해 냈습니다. '주거' 시설은 사실 그럴듯하게 포장된 축사에 지나지 않았습니다. 이 행성은 축산업에 바쳐진 곳이었고, 우리가 발견하여 주민으로 오인했던 연체동물형 생물들은 식량 자원으로 사육되고 있었던 것으로 보입니다. 밀폐된 지의류 시설은 이 사업 종사자들의 주거지이자 통제 센터였습니다.\n\n이 '목장'의 규모로 볼 때, 과거 한때 이 시설에서 사육된 §Y가축§!에 대한 막대한 수요가 있었다고 무리 없이 추정할 수 있습니다. 무엇이 갑작스러운 폐쇄로 이어졌는지는 알 수 없습니다. 그러나 그 결과, 즉 관리자들이 떠난 것은 분명히 보입니다.\n\n우리 과학자들이 여전히 지성체였을 것으로 추정하는 가축용 연체동물형 생물들은, 화학적이든 외과적이든 어떤 수단에 의해 스스로를 돌볼 수 없게 되었을 가능성이 큽니다. 이 이론은 어떠한 저항의 흔적도 없다는 점에서 뒷받침됩니다. 굶주림이 그들을 덮칠 때까지 주거지를 떠나려는 시도는 없었던 것으로 보입니다.\n\n원래의 용도를 무시한다면, 남은 기반 시설은 개조하여 우리 국민을 위한 안락한 주거지로 만들 수 있을 것입니다."
 mem_ASPmod.12.a:0 "지성체를 먹다니? 정말 끔찍하군!"
 mem_ASPmod.12.b:0 "맛있는 간식은 언제나 환영이지."
 mem_ASPmod.12.c:0 "비극적인 운명이군."
 mem_ASPmod.12.d:0 "시원하군!"
 mem_ASPmod.12.e:0 "관광 명소로군!"
 mem_scfe_myzelium_datashard:0 "지의류 데이터코어"
 mem_scfe_myzelium_datashard_desc_short:0 "작은 지의류 "
 mem_scfe_myzelium_datashard_desc_details:0 "이 지의류는 아마도 식물형이나 균류형 기원의 호환 가능한 종을 위한 인터페이스 장치로 기능했을 것입니다."
 d_mem_asp_bedroom_planet_blocker:0 "버려진 농장 시설"
 d_mem_asp_bedroom_planet_blocker_desc:0 "이 무생물 시설은 더 이상 작동하지 않는 자동화 시스템으로 가득 차 있습니다."
 d_mem_asp_bedroom_planet_deposit:0 "개조된 자동화 주거지"
 d_mem_asp_bedroom_planet_deposit_desc:0 "§H가공§! 장비와 시체, 재배 시설을 제거하자 넓고 안락한 주거 공간이 만들어졌습니다. 새로운 거주자들은 이 시설이 한때 가축을 생산했다는 사실을 짐작조차 하지 못할 것입니다."
 mem_asp_dawn_star_is_coming_site:0 "여명의 별이 다가옵니다"
 mem_asp_dawn_star_is_coming_site_intro:0 "§Y[From.Planet.GetName]§!의 표면에는 우주에서도 보일 만큼 큰 크레이터가 있습니다. 그러나 표면에 있는 인공적인 형태의 잔해는 이 황량한 행성에 한때 문명이 존재했음을 나타냅니다. 표면 스캔 결과, 이 잔해는 건물의 최상부로 보입니다. 문명의 흔적 대부분은 행성의 모래폭풍 속에 숨겨져 있는 것 같습니다."
 mem_ASPmod.30.name:0 "여명의 별"
 mem_ASPmod.30.desc:0 "우리 고고학 팀이 §Y[From.Planet.GetName]§!에서 보고서를 보내왔습니다. 조사 결과에 따르면, 이 행성에서 한때 번영했던 모든 문명은 단 하룻밤 만에 붕괴한 것으로 보입니다. 거대한 운석이 행성을 강타하여 몇 시간 만에 지옥 같은 풍경으로 바꿔 놓았습니다. 크레이터 아래에 묻힌 거대한 도시의 발견은 이곳에 살았던 문명이 지성을 지녔음을 시사합니다. 또한 행성 저궤도의 원시적인 형태의 위성들로 미루어, 그들은 초기 우주 시대에 도달했던 것으로 추정됩니다.\n\n동시에 우리는 자주 불렸던 노래의 기록을 발견했습니다. 처음에는 그 의미를 알지 못했지만, 우리 연구원들이 노래에서 가장 반복되는 단어 중 하나를 번역하는 데 성공했습니다.\n\n그 단어는 §H새벽의 별§!입니다."
 mem_ASPmod.31.name:0 "첫 번째 구문"
 mem_ASPmod.31.desc:0 "현장의 고고학자들 사이에서는 §Y[From.Planet.GetName]§!에서 발견된 노래 §H새벽의 별§!에 대해 다양한 의견이 오갔습니다. 극도로 이성적이고 발전한 문명을 지닌 이들이 단순한 지역 유행이 아니라 성별, 나이, 계층에 관계없이 행성 전체에서 확인되는 단 하나의 곡을 반복해서 불렀다는 것은 다소 수수께끼 같은 일입니다.\n\n고고학자들은 이 노래가 종교적 성가나 주술적 주문일 것이라 제시하지만, 누구도 명확한 답을 내놓지 못했습니다. 그러나 이 노래를 번역하는 데는 어느 정도 성공을 거두었습니다."
 mem_ASPmod.32.name:0 "두 번째 구문"
 mem_ASPmod.32.desc:0 "고고학자들이 §Y[From.Planet.GetName]§!의 고고학 조사에서 결정적인 단서를 발견했다고 보고합니다. 운석이 떨어지기 전, 그들은 문명의 멸종을 피하고자 필사적인 노력을 기울인 것으로 보입니다. 운석을 관측한 이후, 충돌 전까지 방대한 양의 데이터가 기록되었습니다. 즉, 그들은 그것을 막으려 했다는 뜻입니다.\n\n그러나 무기로 운석을 파괴하거나 궤도를 바꾸려는 모든 노력은 실패로 돌아갔습니다. 그들은 자신들의 파멸을 막을 수 없었고, 그 밝은 "
 mem_ASPmod.33.name:0 "최종 구문"
 mem_ASPmod.33.desc:0 "주민들은 운석의 충격으로 우주선 발사가 불가능해질 때까지 탈출의 희망을 버리지 않았던 것으로 보입니다. 생존을 향한 그들의 집착은 은하의 그 어떤 종족보다 끈질기고 필사적이었지만, 소수의 탈출선만이 성공할 수 있었습니다. \n\n행성을 떠나지 못한 다른 탈출선들은 공격당하거나 약탈당하거나 사고로 폭발하여 우주를 하염없이 떠돌게 되었습니다. 그리고 마지막 희망마저 사라지자, 시민들에게 남은 것은 절망과 무력감뿐이었습니다.\n\n그 시점부터 그들의 통신 기록은 완전히 끊겼고, 각 지역은 완전히 고립되었습니다. 운석의 영향으로 통신 장애가 있었을 수도 있지만, 가능했다 하더라도 그들은 누구와도 소통하지 않았습니다. 그들은 이따금 들려오는 새벽의 별 노래를 들으며 천천히, 그러나 확실하게 죽어 갔습니다. 우리 고고학자들은 §Y운석§!이 행성에 거의 도달했을 무렵 녹음된 것으로 보이는 한 가족의 음성 기록을 복원할 수 있었습니다."
 mem_ASP.lets.see.that:0 "해보자"
 mem_ASPmod.31.event.name:0 "노래의 조각"
 mem_ASPmod.31.a.response:0 "§Y새벽의 별§!이 다가오고 있습니다.\n가장 어두운 밤을 밝히며,\n아기야, 새벽의 별이 우리를 위해 다가오고 있어.\n모두가 잠든 새벽에 문을 두드려.\n아무도 만나지 못할 새벽을 이끌어.\n§Y새벽의 별§!이 우리를 구하러 다가오고 있습니다."
 mem_ASPmod.31.b.response:0 "§Y새벽의 별§!이 다가오고 있습니다.\n어둠을 피어나는 불꽃으로 비추기 위해,\n모두를 새로운 세계로 인도하기 위해.\n빛나는 미래와 함께,\n새벽의 별이 내일을 비추기 위해 다가오고 있습니다.\n어둠 속에서 빛나는 횃불, 꺼지지 마십시오\n아침에 걷는 모든 이여, 함께 모이십시오.\n당신의 귀에 전해지는 새벽의 별의 노래,\n그림자를 드리우는 새벽의 별\n놓친 이여, 우리의 노래를 들어라\n남겨진 이여, 마지막으로 노래를 부르십시오\n희망을 모아, 새벽의 별을 기다리십시오,\n§Y새벽의 별§! 새로운 세계로!"
 mem_ASPmod.31.c.response:0 "§Y새벽의 별§!이 다가오고 있습니다.\n자, 자렴, 내 아이.\n새벽의 별이 올 때 깨워줄게요.\n엄마가 여기서 당신을 바라보고 있어요,\n그리고 새벽의 별을 기다리고 있어요.\n걱정하지 마세요, 내 아이.\n아빠가 여기서 당신을 지켜주고 있어요,\n그리고 새벽의 별을 준비하고 있어요.\n가장 어두운 밤이 지나고,\n새벽의 별들이 빛과 함께 나타날 때,\n함께 일어납시다.\n나른한 천국의 문이 열릴 때,\n새벽과 함께 일어납시다.\n새벽의 별들이 우리에게 다가올 때까지,\n우리는 당신을 지켜줄 것입니다.\n자, 자렴, 내 아이.\n새벽의 별들이 우리에게 다가올 때까지,\n우리는 당신을 지켜줄 것입니다.\n걱정하지 마세요, 내 아이.\n새벽의 별들이 다가오고 있습니다.\n자, 자렴, 내 아이.\n하늘에서 멀리... 새벽의 별이 다가오고 있습니다.\n밤하늘이 가득 차고... 내일이 다가오고 있습니다."
 mem_ASPmod.30.option.a:0 "음... §YDawn star§!..."
 mem_ASPmod.34.option.a:0 "새로운 새벽... §YDawn star§!..."
 mem_ASPmod.34.option.b:0 "아마도 §R절망§!.... 아니면 §G희망§!.."
 mem_ASPmod.34.option.b.tooltip:0 "§Y과학§! 함선, §YDawn Star§!를 획득합니다."
 mem_ASPmod.34.option.quit:0 "이 멋진 노래를 멈춥니다."
 mem_ASP.FIRST.PHRASE:0 "첫 번째 구문 재생"
 mem_ASP.SECOND.PHRASE:0 "두 번째 구문 재생"
 mem_ASP.THIRD.PHRASE:0 "최종 구문 재생"
 mem_asp_ship_of_theseus_site:0 "테세우스의 생물"
 mem_asp_ship_of_theseus_site_intro:0 "우리 고고학 팀의 보고에 따르면, §Y[From.Planet.GetName]§! 표면의 도시는 우리와 유사한 건축 기술을 사용했습니다. 1차 스캔 결과 이 도시는 적어도 6000년 이상 된 것으로 밝혀졌습니다. 혹독한 폭풍이 수천 년에 걸쳐 도시를 모래와 먼지 아래 묻어 버렸습니다."
 mem_ASPmod.40.name:0 "주거 지역"
 mem_ASPmod.40.desc:0 "모래 산 아래에서, 우리는 마침내 §Y[From.Planet.GetName]§! 문명의 주거 지역을 발굴했습니다. 그 모습은 우리뿐 아니라 이미 알려진 다른 여러 외계 양식과도 유사합니다. 많은 기술이 복제품인 것으로 보입니다.\n\n이 유사성이 우연에서 비롯된 것인지, 아니면 건축적 수렴 진화에서 비롯된 것인지는 논란의 여지가 있습니다."
 mem_ASPmod.41.name:0 "토착민의 화석"
 mem_ASPmod.41.desc:0 "공원 유적 아래에서 토착종의 화석이 발견되었습니다. 토착종의 골격 구조를 복원하자 이 생물이 어떤 모습이었을지에 대한 초기 그림이 그려집니다. 토착종은 두 개의 턱과 열두 개의 다리를 가진 지성 절지동물입니다. 우리 과학 팀의 생물학자는 이 종이 산성 숨결을 내뿜는 기관을 지녔다고도 보고했습니다. 이 종의 전반적인 외모는 불쾌한 광경으로 묘사되었습니다.\n\n한편, 우리 팀은 최근 발견된 기관이 연구 센터로 보인다는 사실을 알아냈습니다."
 mem_ASPmod.41.option:0 "정말 역겨운 외계인입니다."
 mem_ASPmod.42.name:0 "생명공학"
 mem_ASPmod.42.desc:0 "우리 팀의 보고에 따르면, 토착종은 생명공학에 능숙했던 것으로 보입니다. 토착민들의 연구실은 복제 배양조로 가득했습니다. 우리는 그들의 인구 증가가 기술에 의존했다고 추정합니다. 배양조 대부분은 보기 흉하게 죽은 토착종의 시신으로 가득 차 있습니다.\n\n팀은 배양조 속 시신들이 복원된 화석과 작지만 뚜렷한 외형 차이를 보인다는 것을 발견했습니다. 그 모습은 기괴하지만, 다리 수가 2개 줄어 총 10개가 되었습니다."
 mem_ASPmod.42.option.a:0 "조사 후 소각한다."
 mem_ASPmod.42.option.b:0 "우리는 외모에 연연하지 않는다."
 mem_ASPmod.42.option.c:0 "명령에 따라 계속한다."
 mem_ASPmod.42.option.d:0 "과학을 위하여."
 mem_ASPmod.43.name:0 "유전자 변화"
 mem_ASPmod.43.desc:0 "정밀 조사 결과, 시신들의 유전자에 미묘한 차이가 있음이 드러났습니다. 배양조 하나가 한 세대를 담고 있다고 가정하면, 각 세대 간의 DNA 차이는 크지 않습니다.\n\n그러나 세대가 지날수록 그 차이는 점점 더 커졌습니다. 끝없이 이어질 것 같던 배양조의 행렬은 벽에 보안 장치가 달린 거대한 방폭문 앞에서 끊깁니다. 마지막 배양조의 시신 하나는 이전에 발견된 어떤 시신보다 적은 네 개의 다리만을 가졌고, 턱은 이제 하나뿐입니다. 우리 팀은 보안 장치를 해킹할 수 있다면 방폭문 뒤의 방으로 들어갈 수 있다고 보고했습니다."
 mem_ASPmod.43.option:0 "뭘 기다리고 있나요? 계속하세요."
 mem_ASPmod.44.name:0 "진실"
 mem_ASPmod.44.desc:0 "우리 팀이 보안 패널을 해킹하자 충격적인 결과가 드러났습니다.\n\n은하계에 알려진 여러 종은 자연적으로 진화한 것이 아니라 인위적으로 만들어진 것이었습니다. 단말기를 해킹한 후, 팀은 거대한 컴퓨터와 방을 가득 채운 배양조들을 발견했습니다. 배양조 중 하나에 든 시신은 네 다리 절지동물의 모습으로 알려진 야생 동물과 닮아 있었습니다. 마지막 배양조 안에는 우리가 은하의 다른 지역에서 만난 종과 유전적으로 동일한 시신이 떠 있습니다.\n\n그들은 자기 종을 유전적으로 개조하여 현재 이 은하에 서식하는 여러 종으로 만든 것으로 보입니다. 컴퓨터 파일에 따르면, 그들은 범죄자와 반역자의 외모를 보기 흉하게 바꾸는 방식으로 처벌했습니다. 추가 파일에서는 이렇게 외모와 DNA가 바뀐 존재들이 먼 별로 실려 가 추방되었음이 드러났습니다."
 mem_ASPmod.44.option.a:0 "넘어가지."
 mem_ASPmod.44.option.b:0 "흥미로운 외계인들이군."
 mem_ASPmod.44.option.c:0 "[mem_ASPmod_44_xenophobetarget.GetSpeciesNamePlural]은(는) 이곳 출신인 것 같군."
 mem_ASPmod.44.option.d:0 "유기체의 모습에 대한 표준은 없습니다."
 mem_ASPmod.44.option.e:0 "유전자 재단?"
 mem_ASPmod.44.option.g:0 "너무 충격적입니다."
 mem_ASP_small_xenophile_bonus:0 "진실"
 mem_ASP_middle_xenophile_bonus:0 "진실"
 mem_ASP_middle_xenophile_bonus_desc:0 "우리 시민들은 끔찍한 진실을 발견한 후 정치적 혼란을 겪고 있습니다."
 mem_ASP_big_xenophile_bonus:0 "진실"
 mem_asp_kessler_syndrome_site:0 "케슬러 신드롬"
 mem_asp_kessler_syndrome_site_desc:0 "[From.Planet.GetName]의 대기는 분명 인공 구조물의 것으로 보이는 무수한 금속 파편으로 가득합니다. 우주 시대 진입을 시도했다가 실패한 문명의 흔적일지도 모릅니다."
 mem_asp.7.name:0 "금속 사막"
 mem_asp.7.desc:0 "[From.Planet.GetName]의 표면은 오랜 세월에 걸쳐 곱게 갈린 금속 모래로 거듭 뒤덮여 왔습니다. 이 엄청난 양의 금속이 행성 하나에서 나왔을 리 없습니다. 이 잔해 지대의 출처는 명백합니다. 지금도 우주 쓰레기가 불타며 행성을 향해 떨어지고 있으니까요. 이 광활한 금속 정글 속에 무엇이 있는지 조사하기 위해, 탐사대는 모래 아래 지층을 조사할 추가 장비를 요청했습니다."
 mem_asp.8.name:0 "위대한 전쟁의 잔존자"
 mem_asp.8.desc:0 "우리는 금속 모래 아래에 무엇이 있는지 알아냈습니다. 놀랍게도, 지층 전체가 전함 잔해로 이루어져 있었습니다. [from.planet.GetName]의 대기권 위에서 거대한 우주 전투가 벌어졌고 파괴된 함선들이 지상으로 추락했을 가능성이 있습니다. 곧이어 대기 중의 잔해들이 뒤따랐고, 표면은 우주 쓰레기가 모여드는 중심지가 되었습니다.\n\n남은 것은 잔해뿐이지만, 그 표식만으로도 이 전함을 만든 문명이 고도로 발전한 제국이었음을 알 수 있습니다. 흥미롭게도, 잔해는 모두 같은 제국의 것으로 보입니다. "
 mem_asp.9.name:0 "강대한 함선"
 mem_asp.9.desc:0 "우리 팀은 금속 모래를 뚫고 솟아오른 거대한 함선을 발견했습니다. 전함조차 작아 보이게 할 만큼 큰 크기입니다. 다행히 이 함선은 다른 많은 함선 잔해에 비해 이례적으로 잘 보존되어 있었습니다.\n\n구조 전체를 스캔한 후, 우리는 이것이 거대한 대포일 수 있다는 이론을 세웠습니다. 함선의 거대한 선체는 오로지 주포에 에너지를 공급하기 위해서만 설계된 것으로 보입니다. 주포를 충전하는 데 몇 달은 걸렸을 것이므로 전투 목적으로는 상당히 비실용적으로 보입니다. 함선의 중앙 시스템에서 이곳에서 벌어진 사건에 대한 추가 정보를 얻을 수 있을지도 모릅니다."
 mem_asp.10.name:0 "신비로운 데이터 저장소"
 mem_asp.10.desc:0 "거의 모든 함선 시스템이 전투나 침식으로 손상을 입었습니다. 그러나 보호된 선실에서 온전한 데이터 저장소가 발견되었습니다. 추가 조사를 위해 저장소는 모성으로 보내졌습니다. 일부 과학자들은 함선과 행성을 더 연구하기 위해 행성에 남았습니다."
 mem_asp.11.name:0 "불가침의 방어막"
 mem_asp.11.desc:0 "오랜 연구 끝에, 과학자들은 마침내 이 거대한 대포를 둘러싼 수수께끼를 풀었습니다. 이 함선은 전투용이 아니었지만 전쟁 중에 활용되었습니다. 거대한 주포는 목표물 주위에 뚫을 수 없는 에너지 방어막을 생성했습니다. 이 함선과 그 방어막이 오늘날까지 행성을 우주 방사선으로부터 막아 주고 있는 것으로 보입니다. 수집된 데이터에 따르면 다른 모든 잔해는 내전 시기에 만들어진 것입니다.\n\n이 에너지 장벽은 처음 만들어졌을 때는 뚫을 수 없었지만, 지금은 상당히 불안정해 보입니다. "
 mem_asp.11.a:0 "아래에는 무엇이 있을까요?"
 mem_asp.11.b:0 "너무 위험해."
 mem_asp.12.name:0 "수리 완료"
 mem_asp.12.desc:0 "우리가 발견한 데이터 저장소가 복원되었습니다. 그 안에서 미지의 문자로 쓰인 문서가 발견되었습니다. 우리의 해석에 따르면 §H조국§!과 §H고향§!이라는 단어가 반복적으로 사용되었으며, 회고록으로 보입니다. 서명은 고대 제국의 국가 원수이자 그들의 역사를 기록하는 책임자에게서 비롯된 것으로 보입니다. 이 문서에는 거대 함선에 대한 정보도 담겨 있습니다."
 mem_asp.12.a:0 "드디어 수수께끼를 풀 수 있겠군."
 mem_asp.140.name:0 "모국, 인류의 고향이자 미래"
 mem_asp.140.desc:0 "조사 팀이 함선에서 무언가를 활성화한 것 같습니다. 정상적인 과정을 역전시켜, 함선이 에너지 장벽을 약화시키고 있습니다. 이대로 계속된다면 벽은 곧 사라질 것입니다.\n\n문서가 마침내 완전히 해독되었습니다. 이 함선의 주인인 인류 연방은 한때 은하의 3분의 1을 정복한 강력한 제국이었습니다. 그들은 외계인을 학살하거나 노예로 삼았고 인공 지능의 권리를 억압했습니다.\n\n그들이 마침내 강력한 적과 마주쳤을 때, 내부의 외계인 노예와 인공 지능이 반란을 일으켰고, 제국은 안팎에서 동시에 공격받는 압박으로 빠르게 무너졌습니다. 그들에게 남은 것은 고향 행성뿐이었습니다. 그들은 조국과 고향, 그리고 인류의 미래를 지키기 위해 스스로를 안에 봉인한 채, 벽을 부수고 다시 은하를 정복할 그날을 기다렸습니다..."
 mem_asp.140.a:0 "안 돼... 안 돼!"
 mem_asp.140.a.tooltip:0 "§RA 광신적 정화자 제국이 출현했습니다.§!"
 mem_asp.141.name:0 "모국, 자녀들의 집과 미래"
 mem_asp.141.desc:0 "조사 팀이 함선에서 무언가를 활성화한 것 같습니다. 정상적인 과정을 역전시켜, 함선이 에너지 장벽을 약화시키고 있습니다. 이대로 계속된다면 벽은 곧 사라질 것입니다.\n\n문서가 마침내 완전히 해독되었습니다. 이 함선을 소유했던 제국은 한때 은하의 3분의 1을 정복한 강력한 제국이었습니다. 그들은 외계인을 학살하거나 노예로 삼았고 인공 지능의 권리를 억압했습니다.\n\n그들이 마침내 강력한 적과 마주쳤을 때, 내부의 외계인 노예와 인공 지능이 반란을 일으켰고, 제국은 내부와 국경에서 동시에 공격받는 압박으로 빠르게 무너졌습니다. 그들에게 남은 것은 고향 행성뿐이었습니다. 그들은 조국과 고향, 그리고 아이들의 미래를 지키기 위해 스스로를 안에 봉인한 채, 벽을 부수고 다시 은하를 정복할 그날을 기다렸습니다..."
 mem_ASP_geocentrism_anomaly:0 "고정된 세계"
 mem_ASP_geocentrism_anomaly_desc:0 "우리 과학자들이 탐사 중에 이상 현상을 발견했습니다. 이 행성은 자전하지 않고 있습니다. 그 이유가 무엇이든, 알아내기 위해 시간과 노력을 들일 가치가 있습니다."
 mem_asp.15.name:0 "지구 중심 세계"
 mem_asp.15.desc:0 "이 행성은 우리의 과학적 지식을 도전합니다. 이 행성은 어떤 것도 회전하거나 공전하지 않습니다. 이 행성은 이 시스템의 중심에 완벽하게 고정되어 있습니다. 우리의 과학자들은 이 행성을 연구하는 것이 우리 제국의 우주에 대한 지식을 증가시킬 수 있는 훌륭한 기회라고 생각합니다. 우리의 탐사팀은 발굴 허가를 요청합니다."
 mem_asp.15.a:0 "허가가 승인되었습니다."
 mem_asp.15.b:0 "허가를 거부한다."
 mem_asp_geocentrism_site:0 "고정 행성"
 mem_asp_geocentrism_site_desc:0 "이 성계는 완전히 비정상적입니다. 항성이 있어야 할 곳에 고정된 행성만이 있습니다. 중심에 있는 행성을 조사하면 그 이유가 밝혀질지도 모릅니다."
 mem_asp.16.name:0 "묻힌 도시"
 mem_asp.16.desc:0 "우리 고고학자들이 땅속에 묻힌 물질을 발굴했는데, 이는 인공 건물의 잔해로 확인되었습니다. 이는 과거에 이 행성에 지성 생명체가 거주했음을 시사합니다. 추가 정보는 발굴을 계속해야만 얻을 수 있습니다."
 mem_asp.17.name:0 "또 다른 길의 발전"
 mem_asp.17.desc:0 "우리 탐사 결과에 따르면 그들의 기술 발전은 별을 여행할 수 있을 만큼 진보해 있었습니다. 그러나 행성 고유의 자기장 특성 때문에 그들은 별들 사이에서 할 수 있는 일보다 자신들의 행성에서 할 수 있는 일에 더 집중했던 것으로 보입니다. 그들의 기술을 연구하면 여러 분야에서 우리의 지식을 발전시키는 데 도움이 될 것입니다."
 mem_asp.17.a:0 "그들의 제조 기술은 인상적입니다!"
 mem_asp.17.b:0 "그들의 이론적 과학은 인상적입니다!"
 mem_asp.17.c:0 "그들의 사회 체계는 인상적이야!"
 mem_aspmod_physics_bonus:0 "대체 물리학"
 mem_aspmod_society_bonus:0 "대체 사회학"
 mem_aspmod_engineering_bonus:0 "대체 공학"
 mem_asp.18.name:0 "죽은 행성의 주민의 신음"
 mem_asp.18.desc:0 "우리는 이 행성의 주민들에 대해 더 많은 것을 알아낼 수 있었습니다. 그들은 기술의 혜택을 누리면서도 매우 경건한 삶을 살았던 것으로 보입니다. 그러나 유적에서 발견된 서판과 복구된 파일들은 종교와 기술의 사회적 지도자들 사이에 큰 사회적 괴리가 있었음을 나타냅니다. 종교를 숭상하지 않고 과학을 연구한 이들은 차별을 받았습니다.\n\n 우리 연구원들은 영상에서 문명 말기 무렵의 여러 종교 시위의 증거를 찾아냈습니다. 이 시위들은 문명의 몰락 뒤에 숨은 비밀과 행성의 본질을 밝혀내는 열쇠가 될 수 있습니다."
 mem_asp.19.name:0 "평평한 세계 학회"
 mem_asp.19.desc:0 "영상들의 내용은 꽤 일관적입니다. 그들은 종교적 신념에 근거해 지동설을 비난하며 천동설을 지지합니다. 또한 인구 대다수는 자신들의 행성이 구형이 아니라 평평하다고 믿었던 것으로 보입니다.\n\n 우리 탐사 팀은 그들의 영적 사원 안에서 거대한 장치를 발견했습니다. 이 장치를 이루는 기술과 재료는 진보되어 있으며 우리에게는 알려지지 않은 것입니다. 아직 우리는 이것이 무엇을 하는지도, 이 행성의 기이한 위치를 초래했는지도 확신하지 못합니다."
 mem_asp.20.name:0 "신앙의 자살"
 mem_asp.20.desc:0 "추가 발굴 결과, 대기의 자기적 특성이 행성을 벗어나려는 모든 시도를 가로막았음이 드러났습니다. 고향 행성을 떠날 수 없었기에, 지배적인 종교가 등장했습니다. 이 문명의 과학자들은 지동설을 내놓았는데, 이는 그 종교의 가르침에 어긋났습니다. 종교 지도자들은 갈등을 해결하기 위해 상당히 비이성적인 방법을 택했습니다. 그들은 자신들의 종교를 따르는 기술자들을 모아 고향 행성을 영원히 성계의 중심으로 만드는 장치를 만들게 했습니다.\n\n 행성은 서서히 멈추기 시작했고 천체들이 행성 주위를 공전하기 시작했습니다. 행성의 자전이 멈추자 거대한 지진이 일어났고 어마어마한 해일이 해안을 휩쓸었습니다. 행성의 자기장이 사라지기 시작하면서, 살아남은 이들은 모두 우주 방사선에 서서히 타 죽었습니다.\n\n 몰락한 문명이 남긴 것은 비정상적인 행성과 장치 하나였습니다."
 mem_asp.20.a:0 "어... 음... 저..."
 mem_asp.20.b:0 "미신에 빠진 바보들."
 mem_asp.20.c:0 "우리는 같은 실수를 저질러선 안 됩니다."
 mem_asp.21.name:0 "지구 중심 장치"
 mem_asp.21.desc:0 "이제 이 기계를 어떻게 할지 선택해야 합니다."
 mem_asp.21.a:0 "우리는 그들만큼 어리석지 않다. 분해한다."
 mem_asp.21.b:0 "글쎄... 우리가 쓸 수 있을지도 모르지."
 mem_asp.21.c:0 "손에 넣는다."
 mem_aspmod_bad_precedent:0 "나쁜 선례"
 mem_aspmod_lesson_from_pools:0 "어리석은 자들의 교훈"
 mem_aspmod_caution_of_fanatics:0 "광신자에 대한 경고"
 r_mem_aspmod_geocentric_device:0 "지구 중심 장치"
 r_mem_aspmod_geocentric_device_desc:0 "이 거대한 장치는 한 고대 문명의 붕괴를 초래했지만, 놀랍게도 내부 구조는 여전히 온전합니다. 이를 연구함으로써 우리는 적들에게 압도적인 힘을 보여줄 수 있을 것입니다. \n\n§Y지구 중심 장치는 다음과 같은 상황에서 행성을 재배치하지 않습니다:\n1. 대상 행성이 거주 가능한 메가구조입니다.\n2. 시스템 내에 이미 중앙 집중된 행성이 있습니다.\n3. 이 유물이 제국에 존재하지 않습니다.\n4. 시스템의 항성은 블랙홀입니다.§!"
 r_mem_aspmod_geocentric_device.tooltip:0 "이 거대한 작동 버튼을 빨간색으로 칠하고, 그 위에 메모를 붙여야겠습니다, §R절대 누르지 마세요.§! \n- 수석 연구원"
 mem_ASP_haunting_spectre_anomaly:0 "폐허가 된 세계"
 mem_ASP_haunting_spectre_anomaly_desc:0 "고대 식민지의 유적이 §Y[Root.GetName]§! 표면에서 발견되었습니다. 조사할 가치가 있을 수 있습니다."
 mem_asp.22.name:0 "고대 식민지"
 mem_asp.22.desc:0 "조사 결과, 행성 표면에서 수많은 공장과 전투의 흔적이 발견되었습니다. 또한, 행성 곳곳에서 알려지지 않은 문명의 상징이 발견됩니다. 탐사 팀을 파견하는 것이 권장됩니다."
 mem_asp.22.a:0 "이상합니다."
 mem_asp_haunting_spectre_site:0 "떠도는 유령"
 mem_asp_haunting_spectre_site_desc:0 "행성 곳곳에서 정체불명의 패턴이 발견되었습니다. 이들이 의미하는 바에 대한 답은 식민지의 유적에 있을지도 모릅니다."
 mem_asp.23.name:0 "수수께끼의 상징"
 mem_asp.23.desc:0 "우리 탐사 팀이 §Y[From.Planet.GetName]§!의 표면에 착륙했을 때, 그들을 맞이한 것은 공장으로 가득한 폐허였습니다. 간신히 형체만 유지하고 있는 것으로 보입니다. 이 폐허 곁으로 전투의 흔적이 주변 지역에 새겨져 있습니다. 공장 안에는 무기를 닮은 상징들도 있었습니다. 그 의미는 여전히 불분명합니다. 답은 폐허가 된 식민지의 도심 지역에 있을지도 모릅니다."
 mem_asp.24.name:0 "반란의 징후"
 mem_asp.24.desc:0 "우리 데이터뱅크의 사건들과 유사하게, 팀은 §Y[From.Planet.GetName]§!에서 발견된 전투의 흔적이 노예 반란으로 인한 것으로 보인다고 판단했습니다. 부서진 족쇄와 날카롭게 갈린 농기구가 그 증거입니다. 가장 발전한 도시의 폐허에서 노예들은 함께 뭉쳐 지배 계급을 공격한 것으로 보입니다. 도시 광장에서 학살이 일어났을 가능성이 큽니다.\n\n우리 탐사대는 우리가 무기라고 생각했던 상징들이 사실은 농업 및 산업 도구였으며, 그것이 노예들의 무기였던 것으로 보인다고 결론지었습니다."
 mem_asp.25.name:0 "유령의 신호"
 mem_asp.25.desc:0 "노예들이 승리를 거둔 것으로 보입니다. 그러나 혁명 당시의 도구와 가장 최근에 발견된 도구를 탄소 연대 측정으로 비교한 결과, 팀은 그들이 새로 세운 정부가 단명했다고 결론지었습니다. 전쟁으로 찢긴 이 세계 곳곳에는 같은 문서의 사본 여러 부가 널리 퍼져 있습니다. 언어를 해독하는 데는 시간이 좀 걸릴지도 모릅니다."
 mem_asp.26.name:0 "수수께끼의 문서"
 mem_asp.26.desc:0 "도시의 가장 깊숙한 곳에서 발견된 여러 문서가 선언문으로 추정되는 널리 퍼진 사본의 해독을 돕고 있습니다. 초기 번역은 강한 공동체 의식과 고통의 공유를 나타냅니다. 추가 번역은 우리 국민들 사이에 불안을 불러일으킬 수 있으며, 일부 탐사 팀은 번역을 꺼리고 있습니다. 이를 우리 언어로 번역하려면 추가 자금이 필요합니다."
 mem_asp.26.b:0 "너무 위험해!"
 mem_asp.27.name:0 "선언문"
 mem_asp.27.desc:0 "우리 탐사 팀이 마침내 문서를 번역하자, 완전한 형태의 선언문이 드러났습니다. 그 위에는 간결한 제목이 적혀 있었습니다: "
 mem_asp.27.a:0 "모든 행성은 그것을 알아야 합니다."
 mem_asp.27.b:0 "이 문서를 즉시 폐기하십시오!"
 mem_asp.27.c:0 "우리가 찾고 있는 것입니다."
 mem_aspmod_communist_manifesto:0 "선언된 문서"
 mem_aspmod_discarded_document:0 "문서 폐기됨"
 mem_aspmod_communist_manifesto_shared_burden:0 "선언된 문서"
 r_mem_aspmod_communist_manifesto:0 "공동 부담 선언문"
 r_mem_aspmod_communist_manifesto_desc:0 "폐허가 된 행성의 발굴에서 입수한 문서입니다. 내용은 다음과 같습니다: \n하나의 유령이 은하를 떠돌고 있다 — 평등주의라는 유령이. 우주의 모든 권력이 이 유령을 몰아내기 위해 신성한 동맹을 맺었다. 자유민과 노예, 귀족과 평민, 영주와 농노, 길드 장인과 직인, 한마디로 억압하는 자와 억압받는 자는 끊임없이 서로 대립하며, 때로는 은밀하게 때로는 공공연하게 쉼 없는 투쟁을 이어 왔다. 이 투쟁은 매번 사회 전체의 혁명적 재구성으로 끝나거나, 투쟁하는 계급들의 공멸로 끝났다..."
 mem_aspmod_communist_manifesto_relic_activated:0 "$r_mem_aspmod_communist_manifesto$"
 mem_ASP_rain_world_anomaly:0 "물에 잠긴 구조물"
 mem_ASP_rain_world_anomaly_desc:0 "§Y[Root.GetName]§!의 유독한 대기 아래에서 거대한 바다를 감지했습니다. 추가 스캔에서 바다 밑 구조물을 나타내는 에너지 신호가 감지되었습니다."
 mem_asp.28.name:0 "비 오는 세계"
 mem_asp.28.desc:0 "놀랍게도, §Y[From.GetName]§!은 정확히 말해 바다로 뒤덮인 것이 아니었습니다.\n\n 우리 탐사 팀이 행성을 조사하는 동안 바다가 줄어들기 시작했습니다. 탐사대는 이에 맞춰 계획을 수정했고, 행성의 바다가 사실 독특한 지형에서 비롯되었다는 결론에 도달했습니다.\n\n바다는 끊임없이 물을 빨아들인 뒤 증발시켰고, 그 증기가 구름이 되어 다시 더 많은 비를 내렸습니다. §Y[From.GetName]§!은 주기적인 폭우에 반복해서 잠기는 §H레인 월드§!입니다.\n\n그러나 이 주기적 활동은 우리가 행성을 발견한 직후 잠시 멈췄다가, 우리가 탐사를 시작하자 다시 시작되었습니다. 이 변화의 이유는 현재로서는 알 수 없습니다."
 mem_asp_rain_world_site:0 "비 오는 세계"
 mem_asp_rain_world_site_desc:0 "이 행성은 이전 문명이 남긴 무수한 수몰 유적과 기계, 그리고 기원을 알 수 없는 생물들로 가득합니다. 추가 탐사를 위해서는 단서를 찾아 더 깊이 잠수해야 합니다."
 mem_asp.29.name:0 "물 파기"
 mem_asp.29.desc:0 "바다 행성의 광대한 가짜 바다 깊은 곳에는 이전 거주자들의 인공 구조물과 거대한 기계, 그리고 무수히 많은 기괴하고 위험한 생물들이 자리하고 있습니다. 이 구조물들의 목적은 여전히 불분명합니다. 의도도 설계도 우리에게는 알려져 있지 않습니다. 팀은 그것들을 향해 더 가까이 잠수해야 합니다."
 mem_asp.30.name:0 "비 오는 세계"
 mem_asp.30.desc:0 "행성 곳곳에서 온갖 위험한 생물들과 씨름한 끝에, 우리 발굴 팀은 지형을 익히고 야생 생물에 적응하는 법을 배웠습니다. 팀은 온갖 종류의 포식 동물을 기록했습니다. 상당수는 진화가 아니라 인공적 창조의 산물로 보입니다. 그들은 또한 수몰된 건물들의 목적이 내부 기계의 냉각이라는 사실을 발견했습니다.\n\n주기적인 밀물과 썰물이 발굴을 어렵게 만듭니다. 일부 토착 동물군은 자연 진화라고 하기에는 이 주기에 너무나 잘 적응해 있는 듯합니다. 팀은 구조물 조사와 생물 관찰을 위해 둘로 나뉘었습니다."
 mem_asp.31.name:0 "계산"
 mem_asp.31.desc:0 "구조물 내부에서 우리 연구원들은 모든 밀물과 썰물이 인공적으로 만들어진 것임을 알아냈습니다. 내부의 강한 전압은 그것들이 복잡한 계산을 수행하고 있음을 나타냅니다. 그들은 극도로 오랜 기간 그 계산을 수행해 온 것으로 보이며, 이로 인해 처리 장치가 반복적으로 과열되었고 기계의 폐기 부산물이 적절한 절차 없이 버려졌습니다. 우리 탐사 팀을 그토록 괴롭혀 온 괴물들은 그 화학 부산물의 결과였습니다.\n\n 그들의 연산 목적은 아직 밝혀지지 않았습니다. 우리 탐사 팀은 잔해 속에서 접속 단말기를 찾고 있습니다."
 mem_asp.32.name:0 "연체동물인가 포유류인가?"
 mem_asp.32.desc:0 "발굴 중 회수된 데이터 조각에서, 그들은 연체동물일 수도 포유류일 수도 있는 기묘한 토착 생물에 대한 특이한 기록과, 이 기묘한 종 가운데 §H특별한 표본§!이 컴퓨터에 직접 접속한 기록을 발견했습니다. 과학적으로 말이 되지는 않지만, 이 §H흰 연체동물-포유류§! 생물은 §H환생§!하고 있는 것으로 보입니다.\n\n데이터 조각에는 이 표본과 접촉한 기록이 반복해서 담겨 있으며, 그 죽음을 확인하는 기록도 여러 건 있습니다. 처음에 우리 팀은 기록이 잘못되었다고 생각했지만, DNA와 영상 증거로 인해 기록이 실제로 유효하다는 결론에 이르렀습니다.\n\n이 기묘한 토착 생물이 접속 단말기로 우리를 이끌 열쇠일지도 모릅니다."
 mem_asp.33.name:0 "승천"
 mem_asp.33.desc:0 "발견된 기록에 따르면 [from.planet.GetName]의 주민들은 §H생명§!에 대한 궁극적인 해답을 원했고, 답을 계산할 거대한 사고 기계를 만들었습니다. 이 기계들이 바로 오늘날까지 남아 있는 거대한 컴퓨터 구조물입니다. 주인이 던진 질문에 답하기 위한 반복 계산 과정에서, 기계들은 끊임없이 연산 장치를 증설했고 이를 냉각하기 위해 어마어마한 양의 물을 소모하기 시작했습니다. AI들은 행성의 필연적인 황폐화를 예측하고 주인들에게 경고했지만, 그들은 아직 해답을 향한 탐구를 포기할 생각이 없었습니다. 주인들은 연산의 계속을 명령했고, 결국 종말을 맞이했습니다.\n\nAI들은 행성이 지금의 모습이 될 때까지 연산을 계속했습니다. 셀 수 없는 세월이 흐른 뒤, 살아남은 AI는 §H흰 연체동물-포유류§! 표본과 접촉했습니다. 놀랍게도, AI는 이 생물이 행성의 옛 주인들이 던진 질문의 답을 찾아냈다고 판정했지만, 이 계시에도 불구하고 연산은 결코 멈추지 않았습니다.\n\n우리는 AI 코어를 회수했고, AI가 보존해 온 그 특별한 표본을 확보했습니다."
 mem_asp.33.1:0 "AI를 활용한다!"
 mem_asp.33.2:0 "영혼 없는 기계에게 삶의 진리를 묻다니, 우습군."
 mem_asp.33.3:0 "그 연체동물-포유류에 대해 더 알아야 한다!"
 mem_asp.33.4:0 "[from.planet.GetName]을(를) 신성한 세계로 선포한다!"
 mem_asp.33.5:0 "우리는 이 비극에서 배워야 합니다."
 mem_asp.33.6:0 "저 생물들은 훌륭한 사냥감이군."
 mem_asp.33.7:0 "이야기를 퍼뜨린다."
 mem_aspmod_folly_of_raining_world:0 "비가 내리는 세계의 어리석음"
 mem_aspmod_mollusc_mammal_ascension:0 "연체동물-포유류 승천"
 mem_aspmod_rainy_holiness:0 "비 오는 신성함"
 mem_aspmod_raining_modesty:0 "겸손의 비가 내리다"
 mem_asp.34.name:0 "반복자 초기화"
 mem_asp.34.desc:0 "인공 지능이 완전히 초기화되었습니다. 이제 이 §H반복자§!는 우리를 위해 일할 것입니다. 재프로그래밍 과정에서 처리 효율이 다소 떨어지긴 했지만, 여전히 강력한 계산 능력을 지니고 있습니다. 우리의 주요 연구원들은 하루빨리 이를 연구에 활용하고 싶어 합니다."
 mem_asp.34.a:0 "매우 좋습니다."
 mem_asp.35.name:0 "연체동물-포유류 동물원"
 mem_asp.35.desc:0 "연구 부서가 작업을 마쳤습니다. 이 작고 하얀 생물은 우리의 외계 동물원에서 편안하게 살 수 있을 것입니다."
 mem_asp.35.a:0 "너무 귀여워요."
 mem_asp_axis_of_planet_site:0 "행성의 축"
 mem_asp_axis_of_planet_site_desc:0 "새 탐사정의 시험 운용이 수행되었을 때, 그것이 결함으로 추락했는지 확인하려 추가 분석을 하던 중 탐사대원 한 명이 '원기둥' 위에서 미끄러졌고, 행성의 자전축이 8도 기울었습니다.\n\n상황을 관찰하던 우리 과학선은 무슨 일이 있었는지 묻는 통신을 탐사대원에게 보냈는데, 돌아온 것은 비명에 가까운 소리였습니다. 탐사대원은 '원기둥'의 대부분이 땅속 깊이 묻혀 있으며 스캔 가능한 범위보다 길다고 보고했습니다.\n\n음, 우선 탐사대원의 건강 검진부터 해야겠습니다. 초속 수백 킬로미터로 움직인 지면 위에 있었는데도 괜찮아 보이다니 놀라운 일입니다."
 mem_asp.36.name:0 "제1장"
 mem_asp.36.desc:0 "우리의 최고 성능 스캐너로도 '원기둥' 전체를 스캔할 수 없었습니다. 그토록 길면서도 비정상적으로 가늘기 때문입니다. 그러나 '원기둥'이 지각을 관통했다는 것만은 확실합니다.\n\n옷장 폭 정도의 매끄러운 흰 원기둥, 탐사대원들이 '바늘'이라 부르는 이것은 내부를 스캔하려는 모든 시도를 거부하며, 그토록 엄청나게 긴데도 행성 중심을 정확히 향한 방향으로 땅에 박혀 있습니다. 기이하게도, 바늘 주변에는 아무것도 없습니다. 확인을 위해 행성을 스캔했지만, 이런 바늘을 만들 만큼 발전한 기술 수준을 지닌 문명의 유적은커녕 인공 활동의 흔적조차 전혀 발견되지 않았습니다. 바늘은 그저 땅에 박힌 채로 있습니다.\n\n하지만 가장 기이한 점은 바늘을 밀면 행성이 회전한다는 것입니다. 우리 탐사 팀은 겁에 질려 더 이상 바늘을 밀기를 거부했지만, 행성의 자전축은 이미 60도 넘게 기울어졌습니다."
 mem_asp.37.name:0 "제2장"
 mem_asp.37.desc:0 "궤도에서 발신한 일반 전파와 팀이 지표에서 감지한 것을 비교하는 실험을 수행함으로써, 팀은 적도 상공 400km까지 포함한 구형 공간 전체가 회전하고 있음을 밝혀냈습니다.\n\n블랙홀에서 흔히 볼 수 있는 종류의 열복사가 이 구형 공간에서 관측되었고, 일반 우주를 벗어날 때만 나타나는 독특한 중력파도 감지되었습니다. 우리 과학자들은 행성 전체가 다른 차원에 있다고 제시합니다. 바늘의 물질 표본을 채집하는 동안 행성은 257바퀴를 돌았지만, 탐사대원들은 이미 익숙해졌습니다."
 mem_asp.38.name:0 "제3장"
 mem_asp.38.desc:0 "분석 결과, 바늘은 이제껏 본 적 없는 외계 물질로 만들어졌습니다. 바늘의 외피를 뜯어낸 뒤, 우리 팀은 내부에서 아무것도 발견하지 못했습니다. 기계도, 감지기도 없이, 그저 상상할 수 없는 깊이의 구멍만 있었습니다. 그들은 드론 통신 중계 기지를 세우고 탐사 드론을 아래로 내려보냈습니다. 완전히 비어 있지는 않았습니다. 더 깊이 들어갈수록 드론은 더 강한 중력 기류와 맞서야 했고, 결국 폭발하고 말았습니다.\n\n행성 전체를 샅샅이 수색하는 임무를 맡은 제2 탐사 팀은 행성 반대편에서 또 다른 바늘을 발굴했습니다. 사실, 그것은 같은 바늘입니다. 우리 팀이 첫 번째 바늘 아래로 레이저 광선을 쏘자, 그것이 두 번째 바늘에서 나왔습니다. 바늘은 행성을 완전히 관통한 것입니다.\n\n과학자들은 바늘이 공간을 회전시키는 일종의 신호 증폭기 역할을 하고 있다고 추정합니다."
 mem_asp.39.name:0 "제4장"
 mem_asp.40.name:0 "제5장"
 mem_asp.39.desc.1:0 "행성이 회전하는 동안 물의 끓는점이 섭씨 0.1도 상승했고, 심리 분석에서 예상과 다른 답이 나올 확률이 평균 12% 올랐으며, 기초 양자 통신에서 27808 큐비트당 정보량이 증가했습니다. 다양한 분야에서 더 많은 변화가 관측되었고, 변화의 정도는 바늘과의 거리에 따라 달라졌습니다.\n\n적어도 무언가를 알아낸 것은 꽤 반가운 일이지만, 우리 과학자들은 이 변화들의 원인에 대해 합의를 이루는 데 어려움을 겪고 있습니다."
 mem_asp.40.desc.1:0 "무수히 기이하게 즉흥적으로 진행된 실험과 지루한 수작업 검토 끝에, 우리 팀은 이 장치가 다중우주를 강제로 결합하는 일종의 쐐기라는 것을 발견했습니다. 행성을 둘러싼 구형 공간은 실제로 88개의 다중우주의 교차 공간입니다. 이 행성은 동시에 88개의 다중우주에 존재합니다. 15번째 우주의 비교적 관대한 물리 법칙을 이용하여 공간을 회전시키고 있습니다.\n\n가장 합리적인 추정은 바늘이 다른 우주로 넘어가도록 만들어졌다는 것입니다. 아마도 바늘의 방향을 바꾸면 목적지가 바뀔 것입니다. 그럼에도 불구하고 우리는 그것을 어떻게 사용해야 할지, 누가 사용하려 했는지, 왜 사용하려 했는지 전혀 알지 못합니다. 이 장치를 사용할 지식을 가진 존재들은 이미 다른 우주로 넘어갔을지도 모릅니다.\n\n우리가 바늘을 처음 의도한 대로 사용할 가능성은 낮지만, 바늘에 전원을 공급함으로써 다른 우주의 물리 법칙을 소규모로 재현할 수 있습니다. 이 과정은 많은 에너지를 소모하지만, 우리의 물리 연구 혁신에 큰 도움이 될 수 있습니다."
 mem_asp.40.1:0 "놀랍습니다..."
 mem_asp.39.desc.2:0 "연구에 힘썼음에도 새로운 발견이 없자 인내심을 모두 잃은 우리 과학자 한 명이 아무런 보호 장비도 없이 바늘 안으로 들어갔습니다!\n\n 지금 그의 목소리가 바늘을 타고 올라오고 있습니다. 거리가 수천 킬로미터는 될 텐데도 너무나 생생하고 또렷합니다. 무언가에 쫓기고 있는 것처럼 들립니다. 살이 타는 소리, 뼈가 부러지는 소리, 자비를 구하는 비명이 흘러나옵니다. 지상의 우리 팀이 그와 접촉을 시도하지만 소용이 없습니다. 그 과학자는 아래에서 무슨 일이 벌어지고 있는지 팀에게 알리려 애쓰고 있습니다. 고통 속에서도 우리에게 지식을 전하겠다는 결의가 엿보입니다. 그는 간신히 알아들을 수 있는 신음 섞인 목소리로 같은 말을 되풀이합니다. 그 아래는 지옥이라고. 악마와 괴물, 상상할 수 있는 모든 악이 그곳에 있다고.\n\n곧 목소리가 잦아들었고, 탐사대원의 절반이 바늘 내부에 대한 강박적인 호기심을 보였습니다. 그들은 자신들을 막으려는 동료들을 밀쳐 내고 바늘 속으로 뛰어들었습니다. 나머지 팀원들은 짙은 보라색 연기가 지표에 퍼지기 시작하자 공황 상태로 과학선으로 후퇴했습니다.\n\n행성이 장막 행성으로 변한 것 같습니다. 방금 정체불명의 보라색 함선이 허공에서 나타났다는 보고가 들어왔습니다. 그 함선은 기괴하게 생긴 대포 하나로 무장하고 있습니다. 전혀 움직이지 않고 궤도에 머물러만 있는 것으로 보아 승무원이 없는 것으로 추정됩니다. 우리가 찾는 답을 품고 있을지도 모릅니다."
 mem_asp.40.desc.2:0 "불길한 보라색 우주선 안에서 발견된 기록을 해독한 후, 우리 팀은 행성과 바늘이 무엇인지 알 수 있었습니다.\n\n우리가 바늘이라고 부른 원통은 사실 '베일의 둥근 벌레'로, 은하를 가로지르며 지능 있는 존재의 영혼과 몸을 삼켜온 사이오닉 괴물입니다. 수만 개의 문명을 파괴한 후에도 벌레는 결코 배부르지 않았습니다. 7억 9천만 년 전 벌레의 공격을 받은 문명인 벌레퇴치제는 벌레를 무력화하는 데 성공하였고, 베일 차원과 현실 우주 사이에 감옥을 만들어 베일 차원으로 바늘을 관통시켜 현실 우주의 바위 행성 안에 가두었습니다. 이 행성은 젊은 종족이 우연히 봉인을 깨는 것을 방지하기 위해 일반적인 불모형 행성으로 위장되었습니다.\n\n기록은 또한 봉인이 깨지고 행성이 베일로 떨어질 경우, 보라색 우주선에 실린 '부싯돌'을 사용하여 벌레와 베일을 태우라고 조언했습니다.\n\n우리의 과학자들이 마지막 부분을 읽을 때, 그들은 벌레가 행성에서 탈출하여 떠나는 것을 목격했습니다. 그들은 벌레를 파괴할 마지막 기회를 잃었다는 것을 깨닫고 당황했지만, 다행히도 벌레는 다른 은하로 떠났습니다.\n\n오직 생존한 탐험가들만이 우리가 무엇을 했는지 알고 있습니다. 괴물이 다시는 돌아오지 않기를 바랍니다."
 mem_asp.40.2:0 "우리가 무엇을 한 것인가?"
 mem_asp.39.desc.3:0 "탐험가들은 이제 회전하는 것에 너무 익숙해져서, 휴식을 취하는 동안 탐험가가 바늘을 가지고 장난치는 것에 대해 아무도 말하지 않았습니다.\n\n그러던 중, 탐험가는 바늘 구멍을 통해 대륙 행성을 분명히 보았다고 외쳤습니다. 처음에 다른 사람들은 그가 농담하는 것이라고 생각했지만, 시간이 지남에 따라 점점 더 많은 사람들이 비슷한 경험을 하게 되었습니다.\n\n그러한 사건이 발생할 때 바늘이 가리키고 있는 방향과 관찰자가 바늘을 잡고 있는 각도를 기록하는 것이 곧 의무화되었습니다. 기록이 쌓이면서 바늘이 특정 행성을 가리키는 것이 바늘의 방향, 바늘이 잡혀 있는 각도, 그리고 탐험가가 그때 말하고 있던 내용에 따라 달라진다는 것이 분명해졌습니다.\n\n바늘을 통해 보이는 천체의 존재는 반드시 검증되어야 합니다."
 mem_asp.40.desc.3:0 "과학자들이 발견한 것에 따라 팀이 바늘을 조정하자, 바늘 내부의 중력 흐름이 렌즈처럼 안정화되고 반대편의 모습이 확대됩니다. 팀이 본 천체들은 실제로 존재하며, 과학자들은 새로운 행성을 발견할 수 있었습니다.\n\n바늘은 거대한 심우주 망원경입니다. 이 터무니없는 망원경을 누가 만들었는지, 또는 어떤 기술이 사용되었는지는 아직 알 수 없지만, 우리는 그것을 사용하는 방법을 알고 있습니다.\n\n초공간 항행으로 쉽게 접근할 수 없는 지역에 대한 연구는 오늘날 우리가 눈으로 먼 행성을 보고 빛보다 빠르게 여행할 수 있는 시대에도 매우 어려웠습니다. 그러나 이 망원경은 천문학에 새로운 가능성을 열어줄 것입니다. 이제 관측자들은 은하 저편의 별들을 마치 눈앞에 있는 것처럼 볼 수 있으며, 외부 은하를 더 생생하게 촬영하고 분석할 수 있습니다. 우리의 군 지도자들은 이 망원경을 첩보 분야에 사용하고 싶어 했지만, 행성이 일정 정도 확대되면 줌인할 수 없기 때문에 그들이 원했던 유용한 정보를 표면에서 얻기는 어려울 것입니다.\n\n이 망원경은 관광객들 사이에서도 꽤 유명해졌습니다. 이제 슈퍼 인기 있는 바늘은 '무한 관측소'라고 불리며, 관광객들이 은하의 모든 별과 행성을 볼 수 있는 완벽한 플라네타륨입니다."
 mem_asp.40.3:0 "천문학자들이 좋아할 것입니다."
 mem_asp.39.desc.4:0 "다시 한번, 우리의 행운이 우리를 구했습니다. 바늘을 조작하던 중, 그것은 오차 없이 우리 제국 내의 불모형 행성을 정확히 가리켰습니다.\n\n그 행성에서 갑자기 땅이 꺼지며 구멍에서 금으로 만든 고대 건물이 솟아났다고 보고되었습니다. 건물에는 '자물쇠'라고 적힌 표지판이 걸려 있는데, 그 위치는 누마의 선택받은 사제만이 아는 자물쇠와, 네 팔 달린 처녀에게서 태어난 성인만이 행방을 아는 열쇠에 대해 어찌어찌 알려 주며, 두 물건이 어디 있는지 아는 자만이 자물쇠를 열고 가장 신성한 빛을 정당하게 가져갈 수 있다고 합니다.\n\n우리 중 누구도 조건에 맞지 않지만, 이보다 더 희박한 확률도 이겨 냈으니 안에 있는 것을 '정당하게' 가져갈 수 있을 것입니다.\n\n'자물쇠'가 열리자, 바늘, 아니 '열쇠'가 변했습니다. 한때 비어 있던 구멍에서 승강기가 솟아올랐고, 탐사대원들은 그것을 타고 행성 내핵 속에 숨겨진 광대한 유적에 도착했습니다."
 mem_asp.40.desc.4:0 "셀라! 우리의 운명을 찬양하라. 미공개 금고에는 황제가 부러워할 만한 재산이 있으며, 가장 위대한 예술가들이 눈물을 흘릴 문화가 있고, 은하의 통합자조차 감히 이해하지 못할 명성이 있으며, 가장 위대한 멸망한 제국의 지식조차도 모든 거리에서 태어난 현자들처럼 비할 바가 되지 않는 지식이 있으며, 초신성을 침묵시키고 백색 왜성을 검게 만들 수 있는 힘이 있다.\n\n은하의 모든 생명체가 갈망하는 바로 그 보물, 갈라트론."
 mem_asp.40.4:0 "만세!"
 mem_asp.39.desc.5:0 "갑작스러운 굉음과 함께, 우리 제국의 민간 우주선이 행성에 추락했습니다. 우주선은 완전히 파괴되었고, 생존자는 발견되지 않았습니다. 사건 이후 두 가지 의문이 남았습니다.\n\n첫째, 우리 과학선은 민간 우주선이 행성에 추락할 때까지 이를 감지하지 못했습니다. 둘째, 우주선 잔해에서 발견된 기록에 따르면 그 배는 이 성계가 아니라 이웃 성계로 향하고 있었습니다.\n\n믿기 어렵지만, 그 우주선은 FTL을 가동한 직후 이 행성의 저궤도에 갑자기 나타난 것으로 보입니다.\n\n우리는 추가 조사를 위해 FTL 탐사정을 요청했습니다."
 mem_asp.40.desc.5:0 "이웃 성계에서 FTL 여행을 시도한 탐사정 대부분은 정상적으로 이동했지만, 바늘이 가리키는 방향에 있던 것들에서는 이상한 일이 벌어졌습니다. 바늘이 있는 성계로 향하는 초공간 항로에 진입한 탐사정은 평소보다 빠른 속도로 이동했고, 다른 성계로 향하는 초공간 항로에 진입한 것들은 어찌 된 일인지 행성 저궤도로 순간이동되어 지면에 추락했습니다.\n\n그러나 민간 우주선이나 탐사정 같은 소형 선박만 영향을 받았습니다. 초계함보다 질량이 큰 것은 대부분 정상적으로 작동했습니다. 또한 이론적으로, 바늘에 동력을 공급하면 공급된 전력의 양과 편광에 따라 준광속을 절반으로 줄일 수 있고, 일반 우주 위 위상으로 '도약'할 때 엔진 과열을 억제할 수 있음이 입증되었습니다.\n\n우리 과학자들은 일단 바늘이 'FTL 고속도로'를 만들기 위해 건설되었고, 행성의 회전 기능은 분기점 역할을 하도록 의도된 것이라 결론지었습니다.\n\n그러나 이것이 어떻게 작동하는지, 왜 바늘이 행성에 박혀 있어야 하는지, 어떤 문명이 만들었는지는 아무도 모릅니다. 더 이상의 단서는 없습니다.\n\n하지만 우리 문명이 이 사건에서 많은 것을 얻었다는 사실은 부정할 수 없습니다. 바늘을 제어하고 동력을 공급하는 장치를 만들어 항성기지에 연결함으로써, 우리 종족은 바늘의 능력을 활용할 수 있게 되었습니다."
 mem_asp.40.5:0 "초공간 경로를 제어하는 기술..."
 decision_mem_aspmod_multiverse_gate:0 "차원 간 실험"
 decision_mem_aspmod_multiverse_gate_desc:0 "우리는 이 행성의 '바늘'에 에너지를 공급함으로써 우리 우주에서는 경험할 수 없는 물리적 현상을 재현할 수 있습니다."
 mem_aspmod_multiverse_gate_planet:0 "다중우주 게이트"
 mem_aspmod_multiverse_gate_planet_desc:0 "다른 우주로 가는 접점입니다."
 mem_aspmod_multiverse_gate_planet_tooltip:0 "이 행성에서 §Y$decision_mem_aspmod_multiverse_gate$§! 결정을 잠금 해제합니다."
 mem_aspmod_multiverse_gate_country:0 "$decision_mem_aspmod_multiverse_gate$"
 mem_aspmod_infinite_observatory_planet:0 "무한 관측소"
 mem_aspmod_infinite_observatory_planet_desc:0 "우주를 탐험하는 가장 좋은 방법입니다."
 mem_aspmod_infinite_observatory_planet_tooltip:0 "이 행성의 항성계를 소유한 제국에 §Y$mem_aspmod_infinite_observatory_country$§! 제국 수정치를 제공합니다."
 mem_aspmod_infinite_observatory_country:0 "$mem_aspmod_infinite_observatory_planet$"
 r_mem_aspmod_vermifugum:0 "벌레 제거 플린트"
 r_mem_aspmod_vermifugum_desc:0 "고대가 안개에서 생물을 가두기 위해 사용한 유물."
 mem_aspmod_vermifugum_relic_activated:0 "$r_mem_aspmod_vermifugum$"
 mem_asp_strangely_fertile_world_site:0 "이상하게 다산인 세계"
 mem_asp_strangely_fertile_world_site_desc:0 "초기 조사는 특별한 생태계를 시사합니다. 거대한 운무림이 넓은 꽃밭과 싹트는 지의류 지대에 의해 곳곳에서 끊겨 있습니다."
 mem_asp.58.name:0 "다산 유적"
 mem_asp.58.desc:0 "채집한 토양 표본은 높은 인 농도를 나타내며, 이것이 대지 전체를 극도로 비옥하게 만들고 있습니다. 그러나 자연 현상으로 보이는 이것은 토양의 최상층에만 해당합니다. 최상층 아래의 다른 모든 퇴적층은 통상 예상되는 수치만을 담고 있습니다.\n\n탐사대가 인 농도가 가장 높은 지역을 조사하던 중, 덤불과 무성한 나무로 뒤덮인 폐허를 발견했습니다."
 mem_asp.59.name:0 "바람과 함께 사라지다"
 mem_asp.59.desc:0 "폐허 안에서 지성 생명체의 흔적은 찾아볼 수 없습니다. 풍부한 영양분 덕에 식물이 모든 것을 뒤덮고 있습니다. 우리 팀은 지금은 멸종한 주민들이 아직 알 수 없는 이유로 스스로 토착 식물의 거름이 되었고, 이것이 식물이 걷잡을 수 없이 자라나는 계기가 되었으리라 추정합니다.\n\n두꺼운 식물층과 그 아래 토양을 걷어 낸 뒤, 우리는 폐허의 건축 양식을 엿볼 수 있었습니다. 구조물과 조각상에는 예술적 묘사가 널리 퍼져 있으며, 주로 이중 나선을 닮은 상징이 담겨 있습니다."
 mem_asp.60.name:0 "해골의 신전"
 mem_asp.60.desc:0 "감지된 인 농도가 정점에 달한 폐허 안 가장 큰 구조물은 음산한 발견을 품고 있었습니다. 어마어마한 양의 화석화된 뼈였습니다. 바깥이었다면 어떤 유해든 이미 오래전에 완전히 분해되었을 테니, 구조물 자체가 외부의 식물로부터 이것들을 보호했기에 보존되었으리라 추정됩니다.\n\n그러나 이곳에서는 다양한 종의 뼈가 이곳을 지었으리라 추정되는 이들의 뼈와 함께 대량으로 발견됩니다. 복원된 인간형 건설자들의 화석 여러 구는 서로 상당한 차이를 보여, 밀접하게 연관되어 있긴 하나 하나가 아닌 두 종처럼 보이게 합니다."
 mem_asp.61.name:0 "전환"
 mem_asp.61.desc:0 "지진파 스캔으로 폐허가 된 도시 아래의 더 깊은 구역이 드러났고, 그곳에서 우리 팀은 숨겨진 복합 시설을 발견했습니다. 초기 탐사에서 잘 보존된 문서 일체를 회수했습니다.\n\n외계 언어를 해독하고 발견된 자료의 내용을 살펴본 결과, 우리 과학자들은 이 세계의 옛 주민들이 죽음 이후의 부활을 최종적인 승천으로 여기는 장례 숭배 집단으로 살았다고 추론했습니다. 그들은 죽은 자를 적극적으로 보존하며 부활을 완성하기 위해 다양한 방법을 시도했고, 지하 시신 안치소의 모습으로 보아 부분적으로는 성공한 듯합니다."
 mem_asp.62.name:0 "표식"
 mem_asp.62.desc:0 "지하 벙커는 그 중심을 이루는 검은 나선형 구조물을 둘러싸고 지어져 있었습니다. 우리 감지기는 이 구조물이 방출하는 다중 주파수 파동을 경고했습니다. 그러나 과학자 여러 명이 이상 행동을 보이며 기이한 목소리가 들린다고 보고한 뒤에야, 나선의 숨겨진 효과가 밝혀졌습니다.\n\n노출을 제한하며 신중하게 조사한 끝에 우리 연구원들은 그 파동을 분석할 수 있었습니다. 이 구조물은 근처의 생명체에게 죽음의 이미지와 부활, 합일의 개념을 주입하고, 죽은 자로 생물학적 괴물을 만드는 기술 지식을 심으며, 자신과 똑같은 구조물을 다시 만들도록 부추깁니다. 이 파동을 완전히 인지하게 된 우리 팀은 근처 위성에서 유사한 발생원을 찾아냈습니다."
 mem_asp.62.desc_alt:0 "지하 벙커는 그 중심을 이루는 검은 나선형 구조물을 둘러싸고 지어져 있었습니다. 우리의 사이오닉 팀원들은 이 파동이 지닌 위험을 재빨리 알아차렸습니다.\n\n노출을 제한하며 신중하게 조사한 끝에 우리 연구원들은 그 파동을 분석할 수 있었습니다. 이 구조물은 근처의 생명체에게 죽음의 이미지와 부활, 합일의 개념을 주입하고, 죽은 자로 생물학적 괴물을 만드는 기술 지식을 심으며, 자신과 똑같은 구조물을 다시 만들도록 부추깁니다. 이 파동을 완전히 인지하게 된 우리 팀은 근처 위성에서 유사한 발생원을 찾아냈습니다."
 mem_asp.62.a:0 "음모를 꾸미는 첨탑이라?"
 mem_asp_awakened_moon_site:0 "신호의 첨탑"
 mem_asp_awakened_moon_site_desc:0 "위성에서 오는 신호는 또 다른 첨탑의 징후를 보여 줍니다..."
 mem_asp.63.name:0 "우주선"
 mem_asp.63.desc:0 "저궤도의 한 구조물이 신호의 발원지로 확인되었습니다. 떠 있는 구조물의 대부분은 얼어붙은 유기물로 덮여 있었습니다. 또한 근처에서 부분적으로 파괴된 작은 우주선이 발견되었습니다. 이 우주선은 FTL 엔진조차 없는 훨씬 뒤떨어진 기술로 보이며, 따라서 [from.solar_system.GetName] 안에서 온 것이 틀림없습니다."
 mem_asp.64.name:0 "숨겨진 첨탑"
 mem_asp.64.desc:0 "유기물을 추가로 스캔한 결과 그 중심부에서 유사한 첨탑이 드러났습니다. 이 어두운 구조물은 의도적으로 근처의 생물학적 물질을 끌어들이고 있는 것으로 보입니다. 추가 정보는 현장에서 직접 회수해야 합니다."
 mem_asp.64.a:0 "신중하게 진행한다."
 mem_asp.64.b:0 "위험이 너무 크다."
 mem_asp.641.name:0 "진리"
 mem_asp.641.desc:0 "작은 우주선에서 회수한 기록에는 발견된 두 첨탑에 관한 음울한 진실이 담겨 있었습니다.\n\n우주선의 승무원들은 첨탑이 정신을 조종하는 기관이며, 궁극적으로는 자신들을 학살하여 그 결과로 생긴 유기물을 이용하려는 것이라 믿었습니다. "
 mem_asp.641.a:0 "영웅적인 이야기군."
 mem_asp.641.b:0 "구조물을 파괴하십시오. 더 이상 누구에게도 영향을 미치지 않도록 하십시오."
 mem_asp.641.c:0 "주인 없는 첨탑이라?"
 mem_asp.641.d:0 "우리는 그 사악한 의도를 감지합니다."
 mem_asp.641.e:0 "이것을 받아들입시다."
 r_mem_aspmod_deadspace_marker:0 "흑요석 코어"
 r_mem_aspmod_deadspace_marker_desc:0 "한때 그 문명이 '흑요석 표식'이라 불렀던 검은 나선형 구조물의 코어입니다. 신경파를 방출한다고 알려져 있습니다. 때때로 세상을 떠난 사랑하는 이들의 목소리가 당신을 부릅니다. §H우리를 다시 온전하게 해 줘§!."
 concept_mem_asp_spire:0 "첨탑"
