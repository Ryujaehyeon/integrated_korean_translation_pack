 d_giga_job_upkeep_tooltip:0 "이 행성 유형은 일반 행성보다 훨씬 더 많은 인구를 수용할 수 있으므로 잠재적으로 정상적인 경우보다 더 많은 보너스가 쌓일 수 있습니다. 이 기능은 여러 범주의 작업이 0에 도달하지 않도록 마이너스 유지 보수를 상쇄합니다."
