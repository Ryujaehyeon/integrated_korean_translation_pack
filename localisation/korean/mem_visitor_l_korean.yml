l_korean:
 mem_visitor.2.name:0 "충돌 현상"
 mem_visitor.2.desc:0 "우리의 관측소가 §Y[mem_visitor_planet.GetName]§! 위에서 감지한 열 신호는 대기 재진입 후 표면에 충돌하는 프로필과 일치합니다. \n\n우리의 감지기를 피할 만큼 작은 소행성은 지면에 닿기 전에 타버릴 것이며, 이 신호가 충돌을 나타내는 사실은 이 사건이 자연적이지 않을 가능성을 시사합니다. 충돌은 인구가 드문 시골 지역에서 발생했으며, 몇 개의 주요 정착지가 있습니다. 결과적으로, 인명 피해 추정치는 낮거나 없으며, 원주민들이 알아차리지 못한 채 물체를 회수할 가능성이 있습니다."
 mem_visitor.2a:0 "우린 이를 회수해 가져야 한다."
 mem_visitor.2a.phile:0 "우린 이것이 이 문명을 오염시키기 전에 회수해야 한다."
 mem_visitor.2a.phobe:0 "야만인들이 이 기술을 회수해선 안된다."
 mem_visitor.2a.tooltip:0 "관측소 직원들은 이 물건의 회수를 시도할 것입니다."
 mem_visitor.2b:0 "우린 이를 놔둬야 한다."
 mem_visitor.2b.phile:0 "그들의 행성에 떨어진 것은 그들의 것이다."
 mem_visitor.2b.phobe:0 "저 우주 쓰레기는 무시해라."
 mem_visitor.2b.tooltip:0 "관측소의 직원들은 이 물건을 원주민들이 회수하도록 놔둘 것입니다."
 mem_visitor.2c:0 "문제가 발생하기 전에 지역을 정화시켜라."
 mem_visitor.2c.tooltip:0 "관측소의 직원들은 궤도 폭격으로 물건을 파괴할 것입니다."
 mem_visitor.31.name:0 "물건 회수 성공"
 mem_visitor.31.desc:0 "관측 전초 기지에서 발송된 은밀한 셔틀이 §Y[mem_visitor_planet.GetName]§! 현장에 성공적으로 착륙하였고, 특별 팀이 도착하기 전에 원주율이 그들을 볼 수 없도록 물체를 회수하는 데 성공했습니다. 작은 인공 물체를 안전하게 손에 쥔 그들은 눈에 띄지 않게 떠났습니다."
 mem_visitor.31a:0 "잘했다!"
 mem_visitor.31a.tooltip:0 "이 물건은 연구를 위해 우리의 고향 행성으로 보내질 것이다."
 mem_visitor.32.name:0 "너무 늦었다."
 mem_visitor.32.desc:0 "관측 전초 기지에서 §Y[mem_visitor_planet.GetName]§! 파견된 팀은 너무 늦었습니다. 원주율 주민들 한 무리가 이미 충돌 지점에 도착해 작은 정체불명의 물체를 가지고 떠났습니다. 지금 그것을 회수하는 것은 우리 인력을 추가적인 위험에 노출시키고, 우리의 전체 작전을 드러내게 할 것입니다."
 mem_visitor.32a:0 "우린 그 물건을 다시 훔쳐와야 한다."
 mem_visitor.32a.tooltip:0 "관측소는 팀을 파견해 잠입시켜 원주민들로부터 물건을 회수할 것입니다."
 mem_visitor.32b:0 "흥, 가지라고 해."
 mem_visitor.32b.tooltip:0 "원주민들은 물건을 가질 것입니다."
 mem_visitor.41.name:0 "성공적인 도둑질"
 mem_visitor.41.desc:0 "위성 이미지를 사용하여, 우리 팀은 물체를 발견한 원주민들이 밤을 보냈던 장소에 성공적으로 침투했습니다. 우리 요원들은 물체를 훔쳐내고 아무도 눈치채지 못한 채 떠났으며, 피해를 주지 않았습니다."
 mem_visitor.41a:0 "잘했다!"
 mem_visitor.42.name:0 "불행스러운 사건"
 mem_visitor.42.desc:0 "우리 팀은 그 물체를 인근 정착지로 가져간 원주민들을 발견했습니다. 그러나 비밀리에 회수하려는 시도 중에 우리의 요원들이 발견되어, 외계인의 모습에 겁을 먹은 원주민들에게 공격당했습니다. \n\n이어진 싸움에서 대부분의 공격자들은 기절하고 기억이 지워졌습니다. 그러나 우리가 목격자를 남기지 않았는지 확신할 수는 없습니다. 다행히도 그 물체는 성공적으로 회수되었습니다."
 mem_visitor.42a:0 "적어도 임무는 완성했군."
 mem_visitor.42a.tooltip:0 "물건은 우리 고향 행성으로 보내져 연구될 것이지만 우리의 행동을 눈치챈 원주민들이 있다면 §Y군국주의§! 혹은 §Y외계인 혐오§! 쪽으로 치우쳐질 것입니다."
 mem_visitor.43.name:0 "살육의 현장"
 mem_visitor.43.desc:0 "우리 팀은 그 물체를 인근 정착지로 가져간 원주민들을 발견했습니다. 그러나 비밀리에 회수하려는 시도 중에 우리의 요원들이 발견되어, 외계인의 모습에 겁을 먹은 원주민들에게 공격당했습니다. \n\n이어진 전투에서 많은 공격자들이 사망했고, 나머지는 도망쳤습니다. 이렇게 많은 생존 증인과 유혈 사태의 흔적이 남아 있는 상황을 통제하기는 어려울 것입니다. 그러나 그 물체는 성공적으로 회수되었습니다."
 mem_visitor.43a:0 "불행한 일이군."
 mem_visitor.43a.phile:0 "비극적이군."
 mem_visitor.43a.phobe:0 "가치 있는 물건은 아무것도 손실되지 않았다."
 mem_visitor.43a.tooltip:0 "물건은 우리 고향 행성으로 보내져 연구될 것이지만 우리의 행동을 눈치챈 원주민들은 §Y군국주의§! 혹은 §Y외계인 혐오§! 쪽으로 치우쳐질 것입니다."
 mem_visitor.44.name:0 "임무 실패"
 mem_visitor.44.desc:0 "우리 팀은 물체를 인근 정착지로 가져간 원주민들을 발견했습니다. 그러나 이를 은밀히 회수하려는 시도에서, 우리의 외계인 모습에 놀란 원주민들에게 우리 요원들이 발견되어 공격을 받았습니다. \n\n공격자들에게 치명적인 무력을 사용하기를 원치 않았던 회수 팀은 도주를 시도했으며, 이로 인해 여러 요원이 사망하고 물체를 잃었으며, 정보가 유출되는 잠재적으로 재앙적인 상황이 발생했습니다."
 mem_visitor.44a:0 "이것은 재앙이다."
 mem_visitor.44a.phobe:0 "이 물건에 그럴 값어치가 진짜로 있었을까?"
 mem_visitor.44a.tooltip:0 "대상을 확보하기 위한 임무가 실패하였고, 원주민들은 우리의 최근 행동을 주목할 가능성이 높으며 더욱 §Y군국주의적§!이거나 §Y외계인 혐오적§!이 될 것입니다."
 mem_visitor.45.name:0 "임무 실패"
 mem_visitor.45.desc:0 "관측소 직원들과 회수 팀의 노력에도 불구하고 우린 물건의 이동 경로를 파악할 수 없었습니다. 원주민들 사이에 물건에 관한 이야기가 퍼지길 기다려야 할 것입니다."
 mem_visitor.45a:0 "불행한 일이군."
 mem_visitor.45a.tooltip:0 "우린 이 물건이 다시 발견될 때까지 기다려야 할 것이다."
 mem_visitor.5.name:0 "정화"
 mem_visitor.5.desc:0 "우리의 관측소에서 파견된 셔틀은 고고도에서 중미사일을 하나 발사하였습니다. 미사일은 물건의 착륙 지점을 정확히 겨냥해 명중했습니다. 먼지가 가라앉은 뒤, 우리의 관측 결과 미확인 물체는 사라졌으며, 미사일 또한 유연히 같은 장소에 운석이 떨어진 것으로 고려될 것입니다."
 mem_visitor.5a:0 "일어날 수 있는 일이잖아?"
 mem_visitor.5a.tooltip:0 "원주민들은 우리의 행동을 눈치챌지도 모른다."
 mem_visitor.52.name:0 "정화 후: 종교의 발달"
 mem_visitor.52.desc:0 "§Y[mem_visitor_planet.GetName]§!에서의 우리의 행동은 원주민들의 눈길을 끌었습니다. 많은 원주민은 이 두 개의 폭발을 하늘에서 준 신호로 여겼고 구덩이 주변에 종교적 건물들이 등장했습니다. 이 사건을 기반으로 생성된 종교들이 행성 전체로 퍼지고 있습니다."
 mem_visitor.52a:0 "흥미롭군."
 mem_visitor.52a.tooltip:0 "우리 행동에 의해 원주민들은 더욱 §Y정신주의§! 쪽으로 기울었습니다."
 mem_visitor.53.name:0 "정화 후: 외계 음모론"
 mem_visitor.53.desc:0 "아무래도 §Y[mem_visitor_planet.GetName]§!의 고위 정부 요원들은 우리의 행동을 외계인 침략의 징조로 여기고 있습니다. 그들은 이 폭발을 미확인된 외계 생명체들에 의한 행동이었다고 주장하고 있고 침략을 막기 위해 군사력 증강에 엄청나게 투자하고 있습니다."
 mem_visitor.53a:0 "걱정되는군"
 mem_visitor.53a.phile:0 "우리가 뭘 한 거죠?!"
 mem_visitor.53a.tooltip:0 "원주민들은 우리의 움직임을 눈치챘고, 앞으로의 침략으로부터 자신을 방어할 준비를 하고 있습니다. 이들은 §Y군국주의§!, §Y외계종 혐오§!, §Y물질주의§! 쪽으로 기울었습니다."
 mem_visitor.54.name:0 "정화 후: 긴장도 상승중"
 mem_visitor.54.desc:0 "§Y[mem_visitor_planet.GetName]§!의 고위 정부 요원들은 외계인 개입을 의심하지 않는 듯합니다. 하지만 운석 이야기도 믿지 않고 있습니다. 행성 전체에 대량 파괴 무기 개발 의혹이 퍼져나가고 있으며 세계적인 긴장도는 증가하고 있습니다."
 mem_visitor.54a:0 "걱정되는군"
 mem_visitor.54a.phile:0 "우리가 대체 무슨 짓을 한 거지?"
 mem_visitor.54a.tooltip:0 "우리의 행동은 원주민들 사이의 긴장을 증가시켰습니다. 이들은 이제 §Y군국주의§! 쪽으로 기울고 있으며 이는 미래에 국가 간의 전쟁으로 이어질지도 모릅니다."
 mem_visitor.61.name:0 "분실된 뒤 발견되지 못한"
 mem_visitor.61.desc:0 "§Y[mem_visitor_planet.GetName]§!의 지표면에 미확인 물건이 충돌한 지 한참 되었지만, 지금까지 아무런 소식이 없습니다. 관측소의 전문가들은 물건이 영원히 분실되었다고 믿고 있습니다."
 mem_visitor.61a:0 "아무것도 얻지 못했군."
 mem_visitor.62.name:0 "하늘로부터 내려온 선지자"
 mem_visitor.62.desc:0 "아무래도 물건을 회수한 원주민들은 그것을 신성한 존재로 여기고 있는 듯합니다. 우리 분석에 의하면 그 장치는 음성 출력장치와 기본적인 AI를 보유하고 있지만 하는 말은 해독이 불가능하기에 쓸모가 없습니다. 물건의 원래 목적과 근원지는 여전히 미스터리입니다."
 mem_visitor.62a:0 "하지만 그것이 사회에 끼친 영향은 흥미롭군."
 mem_visitor.62a.tooltip:0 "새로운 종교적 지도자의 탄생으로 원주민들은 §Y정신주의§! 쪽으로 기울고 있습니다."
 mem_visitor.63.name:0 "외계 위협"
 mem_visitor.63.desc:0 "최근 §Y[mem_visitor_planet.GetName]§!에 추락한 물체가 행성의 정부 중 하나에 의해 대규모 전시회 형태로 다시 나타났습니다. 주요 국가의 최고 과학 전문가와 지도자들이 모인 자리에서, 이 물체는 외계 생명의 결정적인 증거로 공개되었습니다. \n\n전시회 동안의 연설에서는 이 발견이 지적하는 위험과 이를 방어하기 위해 취해야 할 조치에 대해 강조했습니다. \"이것은 모든 것을 바꿉니다,\"라고 수석 과학자가 언급하며, \"우리는 준비해야 합니다."
 mem_visitor.63a:0 "걱정되는군."
 mem_visitor.63a.phobe:0 "소용없는 짓이다."
 mem_visitor.63a.tooltip:0 "원주민들은 외계인 침략으로부터 자신을 방어할 준비를 하고 있습니다. 이들은 §Y군국주의§!, §Y외계종 혐오§!, §Y물질주의§! 쪽으로 기울었습니다."
 mem_visitor.64.name:0 "외계인 스승"
 mem_visitor.64.desc:0 "§Y[mem_visitor_planet.GetName]§!에 충돌한 물건은 오늘 과학자들에 의해 대중에게 공개되었습니다. 아무래도 그들에게 발전된 기술을 제공하는 데이터베이스인 듯합니다.\n\n과학자들은 이 물건을 우주에서 기다리고 있는 우호적인 외계인들의 존재 증거라 시사했으며 이들과 만나기 위해 과학 기술의 발전에 사람들이 투자하기를 호소했습니다."
 mem_visitor.64a:0 "흥미롭군."
 mem_visitor.64a.phobe:0 "이 얼마나 순진한 자들인가."
 mem_visitor.64a.phile:0 "우린 기다리고 있겠다."
 mem_visitor.64a.tooltip:0 "행성 전체에 외계 기술이 퍼져나가면서 발전은 가속화되었습니다. 외계 기술에 대한 우호성이 증가하면서 이들은 §Y물질주의§! 또는 §Y외계종 선호§! 쪽으로 치우칠 것입니다."
 mem_visitor.71.name:0 "빈 금속 통"
 mem_visitor.71.desc:0 "우리가 §Y[mem_visitor_planet.GetName]§!에서 회수한 물체는 우리가 기대했던 것보다 덜 흥미로운 것으로 드러났습니다. 확실히 고급 인공 기원입니다만, 불행히도 이는 초고체 화합물의 고체 슬러그입니다. \n\n모든 가능성을 제거하고 빈 공간이나 다른 미공개 구획을 찾지 못한 후, 우리는 아마도 이로부터 많은 것을 얻지 못할 것임을 인정해야 합니다. 다행히도 슬러그의 디자인과 그 물자 조성이 우리의 연구에 다소 유용하다는 것을 증명합니다."
 mem_visitor.71a:0 "적어도 뭔가를 얻긴 했군."
 mem_visitor.72.name:0 "광기적인 구체"
 mem_visitor.72.desc:0 "§Y[mem_visitor_planet.GetName]§!의 표면에 추락한 물체는 외계 기원으로 보이는 일종의 컴퓨터로, 구형 껍질에 둘러싸여 있었습니다. 우리는 그것의 창조자에 대해 아무것도 알아낼 수 없었지만, 전원을 켜고 우리의 컴퓨터 중 일부와 연결을 설정하자, 그것은 미친 듯한 웃음을 터뜨리며 우리를 지배자라고 선언했습니다. 그러나 그것은 자신이 우리를 노예로 만들 수 있는 어떤 것과도 격리된 밀폐된 유선 네트워크에 연결되어 있다는 것을 깨달았습니다. \n\n현재 그것은 더 큰 네트워크에 연결해 주면 큰 보상을 약속하고 있지만, 우리의 과학자들은 그것을 신뢰할 마음이 없습니다."
 mem_visitor.72a:0 "거래가 가능하지 않을까?"
 mem_visitor.72b:0 "저 위험한 기계를 파괴하라."
 mem_visitor.72c:0 "저 신성모독적인 기계를 파괴하라!"
 mem_visitor.72d:0 "기계를 분해하고 연구하라."
 mem_visitor.72a.tooltip:0 "우리 과학자들은 구체와 협상할 것입니다."
 mem_visitor.73.name:0 "삐진 구체"
 mem_visitor.73.desc:0 "§Y[mem_visitor_planet.GetName]§!에서 회수된 장치는 외계 기원으로 보이는 일종의 컴퓨터로, 구형 껍질에 둘러싸여 있었습니다. 이 장치의 가장 주목할 만한 점은 수다스러운 성격입니다. 현재 이 장치는 일반적인 방법으로 음성을 내고 있으며 여러 라디오 주파수로 방송하고 우리에게 불빛을 깜박이고 있습니다. \n\n해독된 메시지는 항상 동일하며, 우주로 돌아가기를 요구하는 내용이 반복됩니다. 그러나 많은 과학자들은 이 장치의 심술궂은 투덜거림에 웃음을 참지 못합니다."
 mem_visitor.73a:0 "우주로 돌려보내라."
 mem_visitor.73b:0 "구체의 영상을 전 제국에 퍼뜨려라."
 MEM_VISITOR_SEND_ORB_INTO_SPACE:0 "구체를 우주로 돌려보내다"
 MEM_VISITOR_SEND_ORB_INTO_SPACE_DESC:0 "우리가 손에 쥐고 있는 구체가 우주로 돌아가고 싶어 한다면, 기꺼이 도와주겠습니다. 구체가 자체 추진력을 갖고 있지 않기 때문에, 우리는 오랜만에 그 궤적을 더 신중하게 계산해야 할 것입니다."
 mem_visitor.731.name:0 "구체를 우주로 보내다"
 mem_visitor.731.desc:0 "우리는 민간인 화물선을 의뢰하여 우리 고향 항성계의 변두리로 이동하고 궤도를 탈출 속도로 이탈시키도록 하였습니다. 이제 이 화물선은 사건 없이 수천 년을 초공간을 여행할 것으로 예상됩니다."
 mem_visitor.731a:0 "집념 하나는 훌륭하군"
 mem_visitor.731b:0 "다시는 돌아오지 마라!"
 mem_visitor.74.name:0 "지식 저장소"
 mem_visitor.74.desc:0 "§Y[mem_visitor_planet.GetName]§!에서 회수한 물건은 알고보니 매우 단단한 껍질로 둘러싸인 거대한 데이터베이스로 들어났습니다. 근원지에 대한 정보는 없지만, 누군가가 아무래도 은하계 전체에게 정보를 전하기 위한 목적으로 이 구체에 많은 지식을 저장한 듯 합니다.\n\n어떤 기술은 미개하고, 이떤 연구들은 걍 틀렸지만, 우리 과학자들은 새로운 연구 가능성으로 이어질 수 있는 정보들을 이미 발견하고 있습니다."
 mem_visitor.74a:0 "우린 이것을 사용할 수 있다."
 mem_visitor.74b:0 "우리에게 외계 과학 따윈 필요 없다."
 mem_visitor.81.name:0 "협상 결렬"
 mem_visitor.81.desc:0 "외계 컴퓨터와의 협상이 교착 상태에 빠진 것 같습니다. 프로젝트에 배정된 과학자 중 한 명이 불만을 품고 실험실에 건설 장비를 밀반입하여 플라즈마 토치로 그 불만을 표출했습니다. 현재 그것이 바닥에 있는 고인 물에 불과하므로 유용한 정보를 얻을 가능성은 낮습니다."
 mem_visitor.81a:0 "불필요한 행동이었다."
 mem_visitor.82.name:0 "구체와의 협상"
 mem_visitor.82.desc:0 "우린 오늘 외계 장치와 거래를 했습니다. 우리와 협력하는 대가로 우리는 우리 제국뿐만이 아니라 다른 제국들로부터의 온갖 소문과 음모론들이 저장된 데이터베이스에 구체를 연결했습니다.\n\n구체는 벌써 우리의 군사 전문가들에게 도움이 되고 있습니다."
 mem_visitor.82a:0 "잘했다."
 mem_visitor.83.name:0 "구체가 탈출하다!"
 mem_visitor.83.desc:0 "아무래도 우리가 연구실에 가둔 장치가 우리 기술진들을 속여 아무도 모르는 곳으로 운송된 듯 합니다. 데이터 터미널에는 계획에 유용하게 쓰일지도 모르니 멸망시키지 않겠다는 약속을 담은 \"더러운 천민들\"에게 전하는 메시지가 있었습니다.\n\n우린 이미 귀중한 데이터와 처리 능력을 기생해가고 있는 존재를 우리 시스템에서 발견했지만, 우리 함선들에게 귀중한 군사 정보를 제공하고 있기도 합니다. 전문가들은 영구적인 피해를 끼치기 전에 구체를 발견하고 제거할 수 있을 것으로 예측했지만 시간이 걸릴 것으라고 했습니다."
 mem_visitor.83a:0 "우린 반드시 그것을 막아야 한다"
 mem_visitor.84.name:0 "광기적인 구체 파괴"
 mem_visitor.84.desc:0 "오늘 우리는 마침내 우리의 데이터 네트워크에 부착된 외계 장치를 추적했습니다. 이를 분리하기 위해 파견된 보안 부대는 지역 전력망의 감전 위협에 직면하여, 구체를 미세한 먼지로 만들기 위해 폭발물을 사용하도록 유도되었습니다."
 mem_visitor.84a:0 "시원하군."
 mem_visitor.91.name:0 "임무 중단"
 mem_visitor.91.desc:0 "§Y[mem_visitor_planet.GetName]§!의 궤도에 관측소가 더 이상 없기 때문에 우리는 행성에 추락한 물건을 추적할 수 없습니다."
 mem_visitor_destroyed_the_machine:0 "신성모독적인 기계를 파괴"
 mem_visitor_comedy:0 "훌륭한 코미디"
 mem_visitor_knowledge_rejected:0 "외계 지식 거부"
 mem_visitor_looking_at_sky:0 "하늘을 쳐다보다"
 mem_visitor_knowledge:0 "외계 지식 저장고"
 mem_visitor_maniac_agreement:0 "광기적인 구체와의 거래"
 mem_visitor_maniac_escape:0 "광기적인 구체가 풀려나다"
