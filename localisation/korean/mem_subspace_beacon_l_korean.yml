l_korean:
 mem_subspace_beacon_category:0 "수수께끼의 송신기"
 mem_subspace_beacon_category_desc:0 "소행성 §Y[Root.GetName]§!에는 어떤 종류의 송신기가 설치되어 있는 것으로 보입니다. 다른 소행성들 사이에서 지속해서 우주 공간에 신호를 보내고 있습니다."
 mem_subspace_beacon.1.name:0 "소형 블랙홀"
 mem_subspace_beacon.1.desc:0 "§Y[From.From.GetName]§!에서 오는 비정상적인 신호는 기적적으로 작은 블랙홀로 추적되었습니다. 그 크기는 몇 킬로미터에 불과합니다. 과일보다 작은 소행성들이 정기적으로 사건의 지평선을 넘어 빨려 들어갑니다. 이는 §Y[Root.leader.GetName]§!에 따르면 블랙홀의 크기로 인해 발생하는 초공간 교란을 만듭니다. 이 비정상적인 위치를 고려할 때, 이 이상현상은 어떤 알 수 없는 목적을 위해 의도적으로 만들어졌을 가능성이 높습니다. 무엇이든, 더 연구할 가치가 있습니다."
 mem_subspace_beacon.11.name:0 "자동화 방송"
 mem_subspace_beacon.11.desc:0 "§Y[Root.leader.GetName]§!의 보고서에 따르면, §Y[From.From.GetName]§!에서 온 신비로운 신호는 소행성 표면에 박혀 있는 작은 물체에서 발생합니다. 이 물체는 외계 제작물이며, 불규칙한 간격으로 시스템 내 여러 라그랑주 지점에 초공간 신호를 방송합니다.\n\n이 신호를 해독하면, 오래전에 사라진 외계 종족을 위한 자동 생성된 홀로비드 프로그램이 표시되는 것 같습니다. 각 에피소드는 1시간에서 3시간 사이이며, 제작자들이 겪었던 여러 시대 중 하나에 설정된 독립적인 이야기입니다. 가장 고급인 시대는 우리의 문명보다 불과 몇 세기 더 발전한 것으로 보입니다. 프로그램의 톤, 장르, 설정 및 플롯 구조가 wildly 다양하기 때문에, §Y[Root.leader.GetName]§!는 이 이상체가 이러한 프로그램을 절차적으로 생성하기 위해 만들어졌다고 이론화했습니다. 추가 연구는 외계 종족의 사회와 우리가 좋은 이야기를 만드는 것에 대한 개념에 귀중한 통찰을 제공할 수 있습니다."
 mem_subspace_beacon.21.name:0 "나노봇 소행성"
 mem_subspace_beacon.21.desc:0 "§Y[From.From.GetName]§!의 \"소행성\"이 사실은 소행성이 아니고 기술적으로 발전된 나노봇의 군집인 것으로 보입니다. 정확히 누가 이 나노봇 군집을 만들었는지는 모르지만, 만든 목적은 쉽게 추론할 수 있습니다. 성계 내에 아공간 신호를 보내 부딪혀 반사되는 신호를 분석함으로써 근처에 있는 함선을 기록하는 것입니다. 감시를 위해서인지 연구를 위해서인지 기록의 목적은 알 수 없지만, 한 가지 확실한 것은 들키기 위해 만든 것은 아니란 것입니다. 들키지 않기 위해 군집은 자신을 소행성으로 위장했습니다. 표면에 운석이 부딪혀도 스스로 복구하고 성계 감시를 지속했습니다. 미사일이나 여러 다른 물체를 §Y[From.GetName]§!에 충돌시켜 나노봇이 어떻게 \"소행성\"을 수리하는지 지켜보고 이를 통해 나노봇 공학에 대해 지식을 얻을 수 있을 것입니다."
 mem_subspace_beacon.100.name:0 "아공간 이상현상"
 mem_subspace_beacon.100.desc:0 "§Y[From.From.GetName]§!에서 발생하는 초공간 신호는 전혀 아무 곳에서도 발생하지 않는 것처럼 보입니다. 이 신호는 소행성의 정확한 중심에서 자발적으로 생성되며, §Y[Root.leader.GetName]§!는 이 지역에서 특별한 것을 발견하지 못했습니다.\n\n확실히 매력적이지만, 이 신호는 실험실에서 쉽게 복제될 수 있으며, 범인이 보이지 않는 상황에서 소행성이 더 이상 비밀을 드러내지 않는 것처럼 보입니다."
 mem_subspace_beacon.100.a:0 "어떤 것들은 우리 이해의 범주 밖이지."
 mem_subspace_beacon.150.name:0 "버려진 채굴 드론"
 mem_subspace_beacon.150.desc:0 "§Y[From.From.GetName]§!에서 발산되는 아공간 신호는 소행성 표면 내부 깊숙한 곳에 있는 자동화 채굴 스테이션에서 발산되는 것으로 보입니다. 송신기가 긴급 신호를 내보내고 있고, 이웃한 다른 스테이션에 도움을 요청하고 있습니다. 불행하게도 §Y[Root.Owner.GetName]§!은(는) 우리 동맹의 스테이션이 아니며, 해당 스테이션에는 무장된 드론과 장비가 장착되어 있습니다. 이미 스테이션과 무장 드론들이 §Y[Root.GetName]§!에 발포하기 시작했습니다."
