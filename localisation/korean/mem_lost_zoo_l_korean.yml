l_korean:
 mem_life_barren_category:0 "$life_barren_category$"
 mem_lost_zoo.8.name:0 "신비한 돔"
 mem_lost_zoo.8.desc:0 "추가 조사 결과, 행성 표면에 열두 개 이상의 무너진 돔으로 구성된 대규모 복합체가 발견되었습니다. 이 구조물들은 한때 행성의 나머지 부분과 차단되어 있었습니다. 가장 큰 건물의 발굴 작업에서 표면 아래로 200미터 이상 깊이 내려가는 엘리베이터 샤프트가 발견되었습니다."
 mem_lost_zoo.8.a:0 "아래에 뭐가 있으려나?"
 MEM_LOST_ZOO_PROJECT:0 "돔 복합단지 조사"
 MEM_LOST_ZOO_PROJECT_DESC:0 "이 승강기는 §Y[From.GetName]§!의 깊은 바닥까지 연결되어 있습니다. 과학 탐사대를 조직해 아래로 내려가 봐야 뭐가 있는지 알 수 있을 겁니다."
 mem_lost_zoo.1.name:0 "고대 동물원"
 mem_lost_zoo.1.desc:0 "이 샤프트를 탐사한 결과, 거대한 동굴 안에 완전한 자급자족 생태계가 발견되었습니다. 현재까지 최소 세 개의 서로 다른 열대 행성을 대표하는 생물들이 목록화되었습니다. 이 시스템은 고도로 자동화되어 있으며, 수많은 전문 드론들이 관찰하고 유지하며 때때로 개체 수를 조절하여 인공적으로 식량 순환과 시설 자체를 유지하고 있습니다. 동굴 천장에 설치된 느리게 움직이는 인공 조명 바를 통해 37시간의 주야 주기가 시뮬레이션되고 있으며, 이는 지표면보다 훨씬 깊은 곳에 묻힌 지열 탭으로 전원이 공급됩니다.\n\n이 인공 생태계는 40,000년 이상 된 것으로 추정되며, 자동화 시스템이 수리할 수 없는 방식으로 붕괴되기 시작하고 있습니다. §Y[Root.leader.GetName]§!는 이 시설이 다음 천 년 내에 치명적인 고장 지점에 도달할 것이라고 추정합니다."
 mem_lost_zoo.1.a:0 "기계를 파괴하고 역설계를 통해 기술을 얻어내라."
 mem_lost_zoo.1.b:0 "해부 실험실로 바꿔라."
 mem_lost_zoo.1.c:0 "보존구역으로 바꾸자."
