 d_giga_lifeless_zro_1:0 "즈로 매장지"
 d_giga_lifeless_zro_1_desc:0 "이 행성에는 이용 가능한 즈로 분말 매장지가 있습니다."
 d_giga_lifeless_dark_matter_1:0 "암흑 물질 매장지"
 d_giga_lifeless_dark_matter_1_desc:0 "이 행성에는 이용 가능한 암흑 물질 매장지가 있습니다."
 d_giga_lifeless_living_metal_1:0 "생체 금속 매장지"
 d_giga_lifeless_living_metal_1_desc:0 "이 행성에는 이용 가능한 생체 금속 매장지가 있습니다."
 d_giga_lifeless_nanites_1:0 "나노봇 매장지"
 d_giga_lifeless_nanites_1_desc:0 "이 행성에는 이용 가능한 나노봇 매장지가 있습니다."
 d_giga_lifeless_iodizium_1:0 "아이오디지움 매장지"
 d_giga_lifeless_iodizium_1_desc:0 "이 행성에는 이용 가능한 아이오디지움 매장지가 있습니다."
 d_giga_hab_iodizium_1:0 "아이오디지움 매장지"
 d_giga_hab_iodizium_1_desc:0 "이 거주지는 이용 가능한 아이오디지움 수정 매장지 근처에 건설되었습니다."
 d_small_natural_tunnel:0 "보레아스의 땅굴"
 d_small_natural_tunnel_desc:0 "행성의 대륙 중앙에 위치한 거대한 호수와 바다를 연결하는 조그마한 자연 땅굴입니다. 이성적으로도, 자연 법칙 상으로도 존재해서는 안되는 듯 하지만, 이로 인해 원주민들은 신들이 이 땅굴을 만들었다고 믿고 있습니다."
 d_arcane_mineral_generator:0 "불가사의한 변환기"
 d_arcane_mineral_generator_desc:0 "얇은 대기에서 광물 자원을 생산하는 불가사의한 고대 비전 제조 장치입니다."
 d_giga_orbital_effects:0 "성계 운송망"
 d_giga_orbital_effects_desc:0 "이 성계의 $name_giga_orbital$가 지역 물류 계획을 좌지우지하고 있습니다."
 d_pcc_origin_blocker:0 "썩은 전송관"
 d_pcc_origin_blocker_desc:0 "현재 컴퓨터 하위 구획 간의 연결이 손상되어서 연구 시설이 행성의 거대 처리 시설들의 상당 부분에 닿을 수 없습니다."
 d_giga_rogue_ai_relay_servers:0 "독자적 처리 장치 어레이"
 d_giga_rogue_ai_relay_servers_desc:0 "독자적 AI가 기반 시설을 파괴하고 적극적으로 개척자를 죽이는 시도를 통해 우리와 싸우려 하며, 이에 AI는 방대한 처리 장치 및 서버 어레이를 사용해 행성 컴퓨팅 단지로 동력을 보냅니다."
 d_giga_rogue_ai_corrupt_code:0 "오염된 코드"
 d_giga_rogue_ai_corrupt_code_desc:0 "행성 컴퓨팅 단지의 데이터 뱅크 상당수가 위험한 블로트웨어 코드로 가득 찼으며, 이 행성에 대한 우리의 과학적 노력을 적극적으로 방해합니다."
 d_ringworld_capital_city:0 "거대한 수도"
 d_ringworld_capital_city_desc:0 "링 월드에 건설된 거대한 수도입니다. 링 월드 구획의 중심 허브 역할을 하며, 지역 주민들에게 다양한 서비스를 제공합니다."
 d_interstellar_ringworld_commerce_blocker:0 "버려진 인프라"
 d_interstellar_ringworld_commerce_blocker_desc:0 "링 월드는 엄청난 공간을 제공하기 때문에 토지 재개발에 대한 고려가 거의 없었습니다. 이에 많은 토지가 오랫동안 버려진 건물로 가득 차게 되었으나, 이 영토를 정리하고 재개발하면 지역 사업이 상당히 성장하여 제국의 부를 늘릴 수 있습니다."
 d_great_ring_excavated_mountain:0 "채굴 가능한 산"
 d_great_ring_excavated_mountain_desc:0 "이 거대한 산에는 채굴할 수 있는 기본적인 광물 자원이 있습니다. 영원히 문명을 지탱할 수는 없지만, 우주 시대까지 버티기에는 충분합니다."
