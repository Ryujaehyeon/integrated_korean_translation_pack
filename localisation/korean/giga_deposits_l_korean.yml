 d_decrepit_tunnels_squareworld_desc:0 "$d_decrepit_tunnels_1_desc$"
 d_predictable_solar_flares:0 "예측 가능한 태양 플레어"
 d_predictable_solar_flares_desc:0 "우리 모성의 궤도 중심 항성은 태양 플레어가 발생하기 전에 특정한 행동을 보이며, 덕분에 에너지 추출이 훨씬 쉬워집니다."
