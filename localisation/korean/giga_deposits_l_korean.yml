 d_ehof_solar_array:0 "태고의 태양열 집열기"
 d_ehof_solar_array_desc:0 ""
 d_flusio_arcology_wreck:0 "파괴된 거대도시"
 d_flusio_arcology_wreck_desc:0 "플러션-아콜로지에서의 전투로 인해 부분적으로 혹은 완전히 파괴된 도시입니다."
 d_flusio_arcology_anarchy:0 "무정부 상태의 플러션"
 d_flusio_arcology_anarchy_desc:0 "행성에서 카이저를 몰아내기 위한 싸움의 피해로 플러션 대부분이 완전한 무정부 상태가 되어버렸습니다."
 d_flusio_arcology_administration:0 "플루시오 아콜로지 행정"
 d_flusio_arcology_administration_desc:0 "플루시오를 둘러싼 물류 악몽을 관리하는 것은 쉬운 일이 아닙니다. 플루시오 아콜로지가 지원할 수 있는 구역 수가 막대하기 때문에, 이를 제대로 관리하려면 더 많은 주의가 필요합니다."
 d_flusio_arcology_administration_tooltip:0 "[giga_flusion_administration_mechanics]"
 d_solaktropa_project:0 "솔라크트로파 프로젝트"
 d_solaktropa_project_desc:0 "솔라크트로파 프로젝트는 플러션의 자연 기후를 파괴하는 대신, 캇첸에게 사용 가능한 광대한 토지를 만들어주며, 농업을 위한 대량의 물을 공급해줍니다."
 d_solaktropa_project_wreck:0 "솔라크트로파의 잔해"
 d_solaktropa_project_wreck_desc:0 "솔라크트로파 댐의 파괴로 인해 플러션과 그 주민들은 이루말할 수 없는 피해를 입었습니다."
 d_katlantropa_project:0 "캣틀란트로파 프로젝트"
 d_katlantropa_project_desc:0 "캣틀란트로파 프로젝트는 사막이었던 지역에 물을 대어 농업과 관개에 맞는 땅으로 바꿉니다."
 d_katlantropa_project_wreck:0 "캣틀란트로파 사막화"
 d_katlantropa_project_wreck_desc:0 "캣틀란트로파의 파괴로 농지가 광대한 사막으로 바뀌었습니다."
 d_aeternum_gigantic_fission_reactor:0 "거대한 핵분열 반응로"
 d_aeternum_gigantic_fission_reactor_desc:0 "먼 과거에 에테르눔이 건설한 이상한 핵분열 반응로로 거대한 우라늄 덩어리를 사용하며 대량의 전기를 생산합니다."
 d_exp_civ_primitive_preserve:0 "버치 원시 문명 보존소"
 d_exp_civ_primitive_preserve_desc:0 "원시 문명 전체가 버치 월드 한 곳에서 살고 있습니다. 그들에 대한 연구는 놀라운 과학적 잠재력을 보입니다."
 d_exp_civ_space_preserve:0 "버치 우주-시대 문명 보존소"
 d_exp_civ_space_preserve_desc:0 "우주-시대 문명 전체가 버치 월드 한 곳에서 살고 있습니다. 그들에 대한 연구는 놀라운 과학적 잠재력을 보입니다."
 d_exp_civ_fe_preserve:0 "버치 선조 문명 보존소"
 d_exp_civ_fe_preserve_desc:0 "선구자 문명 전체가 버치 월드 한 곳에서 살고 있습니다. 그들에 대한 연구는 놀라운 과학적 잠재력을 보입니다."
 d_aeternum_decaying_hyperstructure:0 "부식된 극초거대 구조물"
 d_aeternum_decaying_hyperstructure_desc:0 "이 버치 월드의 거대한 조각이 수천년 간의 방치로 인해 파손되고 말았습니다. 이를 수리하는 것은 당연히 거대한 작업이 될 것이지만, 다시 한 번 이 버치 월드의 거주 가능 구역을 확장할 수 있습니다.\n\n이를 해내면 $aeternum_tech_intel$를 §G3§! 얻을 것입니다."
