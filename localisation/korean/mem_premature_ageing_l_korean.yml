l_korean:
 mem_premature_ageing_category:0 "가속된 노화"
 mem_premature_ageing_category_desc:0 "[From.GetName]의 질량, 에너지 방출량과 스펙트럼은 기댓값으로부터 큰 오차를 보이며 가속된 노후화의 징조로 보입니다."
 mem_premature_ageing.1.name:0 "실패"
 mem_premature_ageing.1.desc:0 "별은 의심할 여지 없이 우리가 예상했던 것보다 더 빠르게 노화하고 있으며, 20억 년도 채 되기 전에 초신성으로 폭발할 것으로 예상됩니다 - 최소한 20억 년은 너무 이른 시점입니다. 그러나 우리는 이 이상현상의 원인을 파악할 수 없었습니다."
 mem_premature_ageing.1.a:0 "안타깝군."
 mem_premature_ageing.2.name:0 "항성 소멸기"
 mem_premature_ageing.2.desc:0 "별의 코로나에 존재하는 구멍과 우주에서 발견된 에너지 방출의 흔적으로 보아하니 [From.GetName]의 노후화는 인공적으로 가속화된 것으로 보입니다. 아무래도 수백만 년 전에 우리가 모르는 기술로 제작된 에너지 광선이 근처 성계에서 이 항성을 향해 발사된 것으로 보입니다.\n\n이것이 무기였는지 우주적 규모의 건설 시도였는지는 모르지만, 광선은 항성의 핵을 파괴하여 내부에서 벌어지는 핵융합 반응을 방해하여 초신성 폭발을 유도한 것으로 보입니다. 다행히도 실패하였지만, 20억 년 뒤에 있을 자들은 그 결과를 직접 확인할 수 있을 것입니다."
 mem_premature_ageing.2.normal:0 "무기 출처를 추적할 수 없다는 것이 아쉽습니다."
 mem_premature_ageing.2.alternate:0 "무기의 발사지점을 추적할 수 있을 것이다."
 MEM_PREMATURE_AGEING_WEAPON_TRACING_PROJECT:0 "항성 소멸기 추적"
 MEM_PREMATURE_AGEING_WEAPON_TRACING_PROJECT_DESC:0 "강력한 무기가 시공간 연속체를 찢고 초광속으로 막대한 양의 에너지를 이동시켰습니다. 수백만 년이 지난 지금도 초공간 균열 지점이 여전히 항성 근처에 남아 있으며, 약간의 기술이 있다면 우리는 무기의 출처를 추적할 수 있을 것입니다."
 mem_premature_ageing.3.name:0 "발사 지점 발견"
 mem_premature_ageing.3.desc:0 "운이 좋습니다! 일반적인 초공간 활동을 추적하는 데 보통 쓸모없는 방법들이 이번 경우에는 사용된 막대한 에너지 덕분에 유용하게 작용했습니다. 우리는 이 에너지 전송의 출발점을 한 외딴 항성계로 정확히 찾아냈습니다."
 mem_premature_ageing_chain_title:0 "무기 발사 지점을 찾아라"
 mem_premature_ageing_chain_desc:0 "우린 무기의 발사 지점을 찾아야 합니다. 무기를 분석하면 별의 빠른 노후화의 원인인 기술에 대해 더 알 수 있을지도 모릅니다."
 mem_premature_ageing_asteroid_checked:0 "발사 지점 발견"
 mem_premature_ageing_weapon_origin.1.name:0 "무기의 발사 지점"
 mem_premature_ageing_weapon_origin.1.desc:0 "무기가 발사된 지점."
 MEM_PREMATURE_AGEING_WEAPON_ANALYZE_PROJECT:0 "소행성을 조사"
 MEM_PREMATURE_AGEING_WEAPON_ANALYZE_PROJECT_DESC:0 "우리는 시스템의 소행성대 근처에서 잔여물 유출 지점을 발견할 수 있었습니다. 우리가 무엇을 찾아야 할지 알지 못했다면, 우리는 그것조차 알아차리지 못했을 것입니다. 하지만 이곳이 태양 소멸기를 찾기에 가장 유망한 장소인 것 같습니다."
 mem_premature_ageing.5.name:0 "항성 소멸기"
 mem_premature_ageing.5.desc:0 "초보자에게는 단순한 우주 암석처럼 보일 수 있지만, 우리는 다릅니다. 특별히 조정된 스캐너로 우리는 이 소행성이 한때 매우 고급의 에너지 전송 시스템의 일부였음을 알 수 있습니다. 지금은 단순한 금속 침착물처럼 보이는 것들이 사실은 한때 행성의 지각에서 작동하던 고급 회로망입니다.\n\n극도로 강력한 무기의 첫 번째 사용이 마지막이었던 것 같습니다 - 대규모 에너지 과부하가 그것을 수용하고 있던 행성을 찢어버려 우리가 지금 보는 소행성대가 되었습니다. 내부에 숨겨진 고대 기술은 수천 년 앞서 있지만, 이 상태에서도 에너지 분배 회로를 매핑하는 것은 에너지 무기 기술에 대한 귀중한 통찰력을 제공합니다."
 mem_premature_ageing_solar_extinguisher_tech:0 "항성 소멸기 기술"
 mem_premature_ageing_solar_extinguisher_tech_desc:0 "이 기술을 연구함으로 우리 에너지 무기들의 피해량을 증가시킬 수 있었습니다."
