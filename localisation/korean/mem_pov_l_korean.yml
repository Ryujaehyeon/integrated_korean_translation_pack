 leader_trait_mem_dedicated_teacher_gestalt_desc:0 "모든 사람을 가르침이 필요한 방황하는 학생으로 여기는 교수입니다. 엄격한 커리큘럼을 유지하며, 그 강의를 피할 수 있는 사람은 거의 없습니다."
