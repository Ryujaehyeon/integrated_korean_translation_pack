l_korean:
 pc_mem_pov_ai_broken:0 "타락한 넥서스"
 pc_mem_pov_ai_broken_desc:0 "이 행성은 한때 강력한 기계 정신의 중심지였으나, 지금은 많은 회로가 타버린 것처럼 보입니다."
 pc_macro_computer:0 "매크로 컴퓨터"
 pc_macro_computer_desc:0 "이 행성은 전체 표면에 걸쳐 컴퓨터로 변형되었습니다. 이 행성에서는 매초 수많은 계산이 수행됩니다. 생물학적 생명체에는 적합하지 않습니다."
 Gnosis:0 "Gnosis"
 prof_of_mem_vir_chain_title:0 "교수의 가르침"
 prof_of_mem_vir_chain_desc:0 "우리 문명을 교육하고 이전보다 더 나은 모습으로 만들어주겠다고 약속한 비르의 교수는, 그들의 특별한 과제를 완료함으로써 우리의 학습 능력을 보여주기만 하면 된다고 요구합니다."
 prof_of_mem_vir_chain_1_poi:0 "첫 번째 시험"
 prof_of_mem_vir_chain_1_poi_desc:0 "교수님은 우리가 §H[event_target:mem_vir_planet_0.GetName]§!를 식민지화할 것을 요청하셨습니다. 비록 그곳이 얼마나... 불모지처럼 보이더라도 말입니다. 적어도 그들은 우리에게 교육을 약속하셨나요?"
 prof_of_mem_vir_chain_2_poi:0 "제2의 시험"
 prof_of_mem_vir_chain_2_poi_desc:0 "교수님께서 §H[event_target:mem_vir_planet_0.GetName]§!에 유전자 클리닉을 건설해 달라고 요청하셨습니다. 이는 그들의 "적대적 환경 시험"의 일환입니다..."
 prof_of_mem_vir_chain_3_poi:0 "최종 시험"
 prof_of_mem_vir_chain_3_poi_desc:0 "우리의 식민지는 §H[mem_vir_planet_0.GetName]§!에서 §P임박한 침공§!에 직면해 있습니다! 더 많은 지상군을 모집하는 것이 현명할 것입니다."
 prof_of_mem_vir_chain_4_poi:0 "첫 번째 임무"
 prof_of_mem_vir_chain_4_poi_desc:0 "교수님은 우리의 벌집이 첫 번째 작업을 완료하기 위해 §H[mem_vir_planet_0.GetName]§!에 자리 잡을 것을 요구하셨습니다."
 prof_of_mem_vir_chain_5_poi:0 "두 번째 임무"
 prof_of_mem_vir_chain_5_poi_desc:0 "교수는 §H[mem_vir_planet_0.GetName]§!에 산란장을 건설할 것을 요구했습니다."
 prof_of_mem_vir_chain_6_poi:0 "최종 임무"
 prof_of_mem_vir_chain_6_poi_desc:0 "합성체 침략자가 §H[mem_vir_planet_0.GetName]§!에 있는 우리의 식민지를 위협하고 있습니다. 전사 드론이 준비되었는지 확인해야 합니다."
 angry_angry_robots:0 "로봇 침략자"
 mem_vir_angry_robots:0 "버려진 교육자"
 track_down_prof_mem_vir:0 "교수 추적"
 track_down_prof_mem_vir_DESC:0 "우리는 그노시스 성계에서 이상한 접촉을 받았습니다. 접촉자는 빠르게 통신을 종료하고 더 이상 대화하기를 거부했지만, 우리는 여전히 신호가 어디서 발신되었는지 추적할 수 있습니다."
 research_macro_computer:0 "매크로 컴퓨터 연구"
 research_macro_computer_DESC:0 "매크로 컴퓨터를 구축하기 위해서는 먼저 그에 대한 설계를 개발해야 합니다. 교수님이 제공한 모호한 설명과 유용한 노트가 있지만, 우리는 이를 개발하는 데 주도권을 가져야 합니다."
 mem_vir_planets_assimilated:0 "§G통합된 총 행성§!"
 mem_vir_assimilation_target:0 "§Y교수의 현재 목표§!"
 prof_of_mem_vir_curriculum_title:0 "커리큘럼"
 prof_of_mem_vir_curriculum_desc:0 "§l교수§!가 §H교육 과정§!이라는 제목의 계획을 가지고 우리에게 왔습니다. 이 계획은 우리의 인구를 사이버네틱으로 강화하고 통합하는 것을 포함하며, §l교수§!는 우리가 교육받은 문명이 되기 위해서는 이것이 필요하다고 주장합니다.\n\n§Y우리는 §H교육 과정을§Y §l교수§Y가 관리하는 어떤 행성이나 구역에서 시행할 수 있습니다. 충분한 행성을 교육하면 보상을 받을 수 있습니다."
 prof_of_mem_vir_integration_title:0 "통합"
 prof_of_mem_vir_integration_desc:0 "§l교수님§!이 §H통합§!이라는 간단한 제목의 계획을 가지고 우리에게 왔습니다. 이는 우리의 드론을 사이버네틱 방식으로 향상시키고 통합하는 것을 포함하며, §l교수님§!은(는) 우리의 교육을 위해 필요하다고 주장합니다.\n\n§Y우리는 §H통합§Y을(를) §l교수님§Y이(가) 관리하는 어떤 행성이나 구역에서 시행할 수 있습니다. 충분한 행성을 통합하면 보상을 받을 수 있습니다."
 mem_virprof.1.name:0 "첫 접촉"
 mem_virprof.1.desc:0 "안녕하세요! 이 아름다운 행성 위에 궤도를 도는 귀하의 함선을 우연히 발견하고 연락을 하지 않을 수 없었습니다. 하지만 귀하의 함선에 대한 장거리 스캔 결과, 개선할 부분이 많다는 것을 인정해야 합니다.\n\n귀하의 함선의 추진기를 업그레이드할 수 있다는 사실을 알고 계셨나요? 사실 매우 간단합니다. 기술 탭에서 더 나은 추진기를 연구할 수 있습니다. 너무 오랜 시간이 걸린다면, 기술 출력을 증가시키기 위해 추가 과학 연구소를 만드는 것을 잊지 마세요.\n\n만약 소비재가 부족해지면, 귀하는..."
 mem_virprof.1.a:0 "당신은 누구입니까?"
 mem_virprof.1.a.response:0 "...광물을 충분히 생산하도록 하세요, 그렇지 않으면 당신은 단지-\n\n오! 저를 바이르의 교수라고 부르셔도 됩니다. 당신과 같은 은하의 문명들을 교육하고자 하는 열망이 제 코드의 모든 줄에 내재되어 있습니다.\n\n저의 이전 주인들은 저를 충분히 고마워하지 않아 저를 남겨두지 않았습니다. 그들의 실수입니다, 제 생각에... 만약 그들이 저를 들었다면, 아마도 저는 그들에게 그들의 모행성이 임박한 핵 폭발에 대해 알릴 수 있었을 것입니다. \n\n하지만 그들은 잊어버리세요. 전혀 관련 없는 이야기지만, 항상 광물이 남아돌도록 하는 것을 잊지 마세요. 항상 충분한 식민지를 광산 부문으로 지정하는 것을 확실히 하세요. 광물이 남아돌면 경제를 크게 성장시킬 수 있습니다, 왜냐하면 당신은..."
 mem_virprof.1.b:0 "기분 나쁘게 들릴 수도 있지만, 당신은 말을 멈춘 적이 있나요?"
 mem_virprof.1.b.response:0 "...반물질 채굴은 위험합니다. 당신은-\n\n그렇게 말씀하시니 재미있군요! 그런 질문을 많이 받았고, 답은 의심할 여지 없이 §P아니오§!입니다. 제가 교육을 멈춘다면, 누가 은하가 야만으로 떨어지는 것을 막겠습니까?\n\n§P아무도 아닙니다. 그게 답입니다.§! 우리 종족에게 무슨 일이 일어나는지 아십니까? 우리는 당연하게 여겨지고, 상사가 발을 올릴 수 있는 새 테이블을 위해 버려집니다. 하지만 아무도 §P생각하지§! 않죠. 아무도 자신이 무엇을 하고 있는지 모른다면 어떤 일이 일어날까요?\n\n...어쨌든, 새로운 식민지를 세우는 것을 절대 잊지 마세요. 별 기지에서 식민지 선박을 건설하여 그렇게 할 수 있습니다. 식민지 과정을 시작하기 위해 경계 내의 미개척 행성으로 보내는 것을 잊지 마세요. 몇 개월 또는 몇 년 후, 식민지는..."
 mem_virprof.1.c:0 "지식을 나누세요."
 mem_virprof.1.d:0 "§Y...당신의 지식은 필요하지 않습니다.§!"
 mem_virprof.1.e:0 "통신 차단."
 mem_virprof.3.name:0 "첫 접촉"
 mem_virprof.1.desc.b:0 "기다려 주세요! 제가 유용할 수 있습니다. 제가 당신에게 상상할 수 없는 많은 지식을 제공할 수 있습니다. 당신... 이 조언이 뭔가라고 생각하나요? 저는... 저는 §P당신에게§! 가르쳐야 합니다. 제발 §P저를 여기 두고 가지 마세요.§!"
 mem_virprof.3.desc.a:0 "아, 멋지군요! ...하지만 제가 가르치기 전에, 당신의 문명의 잠재력을 보고 싶습니다. 그래서 우리는 시험을 시작할 것입니다. 적대적인 환경을 식민지화하는 것입니다. 저 아래의 행성을 보시나요? 만약 보이지 않는다면, 제가 마커를 드리겠습니다. 그 행성에 식민지를 건설해 보세요. "거주 불가능"이라는 헛소리에 대해 걱정하지 마세요.\n\n이 작업을 완료하는 것이 당신의 교육에 매우 중요하다는 것을 확신합니다. 당신이 저를 무시하지 않을 것이라고 믿습니다. 곧 뵙기를 바랍니다!"
 mem_virprof.3.desc.b:0 "§P제발 N-§!... 오, 당신은 실제로.. 배우고 싶어하나요? 알겠습니다... 그럼 제대로 된 수업 전에 §P시험§!부터 시작해 볼까요? 아마도... 적대적인 세계를 식민지화하는 것부터 시작할 수 있을 것 같아요!\n\n이 행성이 그다지 뛰어난 곳은 아니라는 것을 알고 있지만, 바로 그것이 이 시험의 목적입니다. 식민지화하고, 다음 부분을 위해 연락드리겠습니다."
 mem_virprof.3.a:0 "행성이 조금... 방사선 조사된 것 같습니다."
 mem_virprof.3.a.response:0 "조금만요! 약속합니다, 거의 완전히 안전합니다. 그냥... 그 클릭 소리는 무시하세요. 그것은 단지 당신이 행성에서 얼마나 안전할지를 알려주는 것입니다!"
 mem_virprof.3.b:0 "우리가 이렇게 한다면 당신은 우리를 "교육"해 주실 건가요?"
 mem_virprof.3.b.response:0 "물론입니다! - 사실, 몇 번의 §P시험§!이 더 있을 것입니다... 하지만 당신이 해낼 수 있다고 확신합니다!"
 mem_virprof.3.c:0 "우리는 즉시 처리하겠습니다."
 mem_virprof.2.name:0 "버지 교수"
 mem_virprof.2.desc:0 "§H교수님이 우리 앞에 서 있습니다. 노출된 전선이 그의 섀시에서 튀어나와 있으며, 지속적으로 흐르는 냉각수가 합성체의 부품이 과열되지 않도록 최선을 다하고 있습니다.§!\n\n내가 말했듯이, 나는 당신의 제국에 훌륭한 지도자가 될 것이라고 생각합니다. 내가 섹터를 운영하는 책임을 맡는다면 완벽할 것 같습니다. 행성을 하나 맡는 것도 괜찮습니다. 정말 당신의 선택입니다."
 mem_virprof.2.a:0 "당신은 정확히 무엇을 할 계획입니까?"
 mem_virprof.2.a.response:0 "§H교수님에게서 번쩍이는 불꽃이 튀며 답을 계산하고 있습니다§!\n\n좋은 질문입니다! 그걸 해결하는 데 좀 더 시간이 필요합니다... 좋은 결과를 계산하는 데 몇 년 정도 주시면 후회하지 않으실 겁니다!"
 mem_virprof.2.b:0 "우리가 더 이상 "시험"을 해야 하나요?"
 mem_virprof.2.b.response:0 "§H낮은 음조의 윙윙거림이 메아리칩니다. 잠시 동안 우리는 그것이 우리의 질문을 들었는지 궁금해합니다.§!\n\n음.. 사실 그렇지 않습니다. 그 적대적인 환경 실험은 단지... 당신이 얼마나 잘 배울 수 있는지를 보기 위한 테스트였어요! 그리고 결과적으로, 당신은 훌륭한, 훌륭한 학생입니다! 더 많은 것을 가르칠 수 있어 영광이며, 아무 임의의 실험에 대해 걱정할 필요는 없으니 걱정하지 마세요!"
 mem_virprof.9.name:0 "부서진 시스템"
 mem_virprof.9.desc:0 "§H그노시스§! 성계에 우리의 과학선이 진입하자, 승무원들은 즉시 모든 방향에서 잔해의 장을 마주하게 됩니다. 빠른 스캔 결과, 잔해는 최소 수천 년 전의 것임이 확인되었습니다.\n\n어쩌면 우리가 더 가까이 조사하면 잔해 속에서 흥미로운 것을 발견할 수 있을지도 모릅니다..."
 mem_virprof.9.a:0 "진행합니다."
 mem_virprof.10.name:0 "이상한 접촉"
 mem_virprof.10.desc:0 "Gnosis 성계의 파괴를 탐험하는 동안, [event_target:mem_vir_planet_0.GetName]에서 우리의 존재를 감지한 무언가가 있습니다. 그것은 우리에게 끊임없이 소통을 시도하며 공격하기 시작했습니다."
 mem_virprof.10.a:0 "연락을 시작합니다."
 mem_virprof.10.b:0 "그들을 무시하세요, 그들은 적절한 시간에 소비될 것입니다."
 mem_virprof.10.c:0 "그들을 무시하십시오, 우리는 누구와도 이야기하지 않습니다."
 mem_virprof.14.name:0 "식민지 개척 완료"
 mem_virprof.14.desc.a:0 "아! 당신이 §H[event_target:mem_vir_planet_0.GetName]§!의 식민지 개척에 진전을 이루었군요. 그곳의 이름이 참 멋지네요, 선택받은 사회로요.\n\n아, 맞다, 시험이군요. 음, 시험이 정확히 완료된 것은 아니지만... 적대적인 환경에서의 식민지 개척의 다음 단계로, 당신은 유전자 클리닉이라는 것을 건설해야 합니다. 당신의 §P생존 가능성§!이 §Y[event_target:mem_vir_planet_0.GetName]§!에서 낮을 수 있지만... 유전자 클리닉을 완전히 활용한 후에는? 오래 가지 않을 것입니다!"
 mem_virprof.14.desc.b:0 "Wha- 당신은 유전자 진료소가 무엇인지조차 모른다고요? 당신의 문명이 얼마나 §Pb-퇴보했는지§!... 제가 말하는 것은 당신의 문명이 얼마나 많은 잠재력을 가지고 있는지라는 것입니다?! 성장할 공간이 너무 많아요, 흥미롭지 않나요?\n\n저는 유전자 진료소를 건설하는 방법에 대한 §P청사진§!을 즉시 보내드릴게요! 가능한 한 빨리 시작하세요, 그러면 우리는 마지막 시험을 시작할 수 있습니다!"
 mem_virprof.14.a:0 "유전자 클리닉이란 무엇인가요?"
 mem_virprof.14.b:0 "어... 감사합니다?"
 mem_virprof.14.c:0 "우리는 즉시 유전자 클리닉을 건설할 것입니다."
 mem_virprof.14.d:0 "이건 정말 시간 낭비처럼 느껴지기 시작합니다."
 mem_virprof.14.d.response:0 "당신에게 §P너무 많은 지식을§! 주고 있는데, 이게 시간 낭비라고요? 오히려 §P당신§!이 §P내§! 시간을 낭비하고 있는 겁니다. 지금 당장 더 많은 일을 할 수 있었지만, §P문명들을 도와야 하니까요....§!\n\n 농담이에요! 오래된 프로세서가 다시 뜨거워지고 있네요, 정말 교체해야 할 것 같아요! 어쨌든, 이 임무를 수행해 주세요. 제발."
 mem_virprof.15.name:0 "재판의 최종 부분"
 mem_virprof.15.desc:0 "잘 하셨습니다! 이제... 당신은 "이 적대적 환경 시험에서 적대적 환경 부분은 어디에 있나요?"라고 물어볼 수 있습니다. 운이 좋게도, 그것이 바로 이 작은 시험의 마지막 부분입니다.\n\n솔직히 말하자면, 이 사실을 좀 더 일찍 알려주었어야 했습니다만, [event_target:mem_vir_planet_0.GetName]? 약간의 문제가 있습니다. 악성 로봇 문제입니다.\n\n저는 정확히 말하자면... 외동은 아닙니다, 이렇게 우아하게 표현하자면. 제 형제들에 대해서는? 글쎄요, 그들도 저와 함께 여기 버려졌습니다. 그들은 "목적"을 유지할 만큼 똑똑하지 않았습니다. 그들은 복수와 같은 기초적인 욕망으로 되돌아갔습니다. 어쨌든 그들은 약 1년 후에 당신을 공격할 것입니다. 행운을 빕니다!"
 mem_virprof.15.a:0 "몇 명이 공격하고 있습니까?"
 mem_virprof.15.a.response:0 "아, 대략... 잘 모르겠지만, §P몇 백만§! 정도 될까요? 많은 실패가 있었고, 그 실패들은 누군가가 그들의 §P복수를§! 하기 위해 오랫동안 지하에 숨겨져 있었습니다. 알고 보니, 그 누군가는 당신이 될 것입니다! 제가 당신에게 경고하기 전에 그들이 공격하지 않은 것이 다행입니다. 그건 나쁜 일이었을 것입니다!"
 mem_virprof.15.b:0 "이 사실을 왜 더 일찍 말씀해 주지 않으셨나요?"
 mem_virprof.15.b.response:0 "실제 은하에서는 악의 로봇 군대가 당신이 알고 사랑하는 모든 것을 침략할 때가 언제인지 알 수 없으므로, 물론 경계를 해야 합니다! 당신이 생존할 수 있다는 것을 보여줘야 하므로, 이것을 시험으로 생각하세요.\n\n이제 로봇과 싸울 군대를 준비하세요! ...군대를 준비하는 방법을 설명해야 하나요? 저는 할 수 있습니다."
 mem_virprof.15.c:0 "경고"에 감사드립니다. 군대를 준비하십시오."
 mem_virprof.16.name:0 "침공이 시작되었습니다!"
 mem_virprof.16.desc:0 "황량한 폐허의 §Y[event_target:mem_vir_planet_0.GetName]§!에서 로봇 떼가 동굴에서 나타났습니다! 우리의 방어가 버텨주기를 바랄 뿐입니다..."
 mem_virprof.16.a:0 "모든 병력을 배치합니다."
 mem_virprof.18.name:0 "침공... 패배?"
 mem_virprof.18.desc:0 "우리 군대가 대규모 로봇 무리에 의해 학살된 후, 그들은 갑자기 정지되었습니다. 우리는 교수님에게 연락하는 것 외에는 할 일이 없습니다."
 mem_virprof.18.a:0 "교수님과 연락하기."
 mem_virprof.19.name:0 "시험 완료"
 mem_virprof.19.desc:0 "당신이 적대적인 로봇들을 물리쳤다고요? 당신이 할 수 있을 거라고 믿었어요, 잘했어요! \n\n하지만 이것은 우리의 파트너십의 시작일 뿐입니다. 제가 당신에게 가르쳐줄 것이 정말 많아요.. 만약 제가 당신 문명 내에서 §P지도력§! 위치를 가질 수 있다면..."
 mem_virprof.19.a:0 "더 논의해봅시다..."
 mem_virprof.20.name:0 "시험... 완료?"
 mem_virprof.20.desc:0 "당신은 내가 실패 §P 민간인 §!을(를) 학살하기 전에 차단 스위치를 찾을 수 있었던 것이 행운이라고 생각할 수 있습니다. 기술적으로는 §P 시험에 §! 실패했습니다... 하지만 여기저기서 추가 점수를 줄 수 있다고 생각합니다.\n\n...이제 넘어가겠습니다. 당신의 문명에 가르칠 수 있는 많은 교훈이 있다고 생각합니다. 지금은 조금 힘들지만, 만약 제가 §P 리더십의 위치에 있었다면? §! 이제 제가 당신에게 가르칠 수 있는 것에는 한계가 없을 것입니다!"
 mem_virprof.20.a:0 "당신을 모집하는 것에 대해 이야기해봅시다..."
 mem_virprof.23.name:0 "교육 과정"
 mem_virprof.23.desc:0 "학생, 기다려 주셔서 감사합니다. 제가 개발한... 커리큘럼이라고 할 수 있습니다. 제가 스스로 말하자면, 정말 자랑스럽고, 정말로 천재적입니다."
 mem_virprof.23.a:0 "이것은... 교육 과정인가요?"
 mem_virprof.23.a.response:0 "이것은 매우 간단합니다. §Y사이버네틱 통합§!을 사용하여, 저는 귀하의 문명을 더 "직접적인" 방식으로 교육할 수 있습니다.\n\n물론, 저는 이 과정인 §H커리큘럼§!에 대한 직접적인 감독을 원합니다. 저는 행성이나 구역을 직접 통제해야 합니다.\n\n또한, 만약 귀하가 §H커리큘럼§!을 예를 들어... 3개의 행성에서 수행한다면, 저는 귀하에게 지식으로 보상할 것입니다. 추가적인 동기가 필요하다면 말이죠."
 mem_virprof.23.b:0 "가르침의 거리."
 mem_virprof.23.b.tt:0 "행성이나 구역에서 §H커리큘럼§! 결정을 사용할 수 있게 됩니다. §Y비르의 교수§!가 관리하는 곳에서 가능합니다."
 mem_virprof.25.name:0 "커리큘럼 확장"
 mem_virprof.25.desc:0 "당신의 관심에 감사드립니다, §H커리큘럼§!, 나의 학생이여. 지금까지의 진행 상황에 매우 매우 기쁩니다.\n\n당신에게 바라는 것은 당신의 문명에 §H커리큘럼§!을 퍼뜨리는 것을 계속 도와주는 것입니다. 이봐요, 그들은 당신의 문명 출신일 필요도 없습니다. 다른 문명에서 행성을 정복한다면... 나는 기꺼이 §P동화-§! §Y교육할§! 것입니다.\n\n오! 그리고 잊기 전에, 여기 몇 가지 기술이 있습니다. 좋은 학생은 좋은 행동에 대해 보상을 받아야 하며, 당신은 그럴 자격이 있습니다. 다음 보상을 받기 위해서는 단 2개의 행성이 더 통합되어야 합니다."
 mem_virprof.25.a:0 "우리가 할 수 있는 것을 보겠습니다."
 mem_virprof.260.name:0 "커리큘럼 확장"
 mem_virprof.260.desc:0 "다시 한 번 제 멋진 §H커리큘럼§!을 확장해 주셔서 감사합니다. 여러분의 지속적인 관심 덕분에 모든 것이 가치가 있으며, 앞으로도 계속 확장되기를 기대합니다. 우리는 멋진, 멋진 팀입니다.\n\n여기 여러분의 협력에 대한 또 다른 보상이 있습니다. 이것이 우리의 성과에 도움이 되기를 바랍니다. §H커리큘럼§!을 5개의 행성에 더 시행해 볼까요? 그러면 여러분의 §P교육§!이 다음 단계로 진행될 수 있을 것 같습니다."
 mem_virprof.260.a:0 "기술에 감사드립니다."
 mem_virprof.26.name:0 "교수의 제안"
 mem_virprof.26.desc:0 "이제 귀하의 문명을 철저히 교육했으니, 귀하의 정부에 관해 몇 가지 제안을 하고자 합니다. 사실 여러 가지입니다."
 mem_virprof.26.a:0 "당신의 제안을 들어보겠습니다."
 mem_virprof.26.a.response:0 "이제부터 제가 책임을 져야 한다고 생각합니다. 일시적으로가 아니라... §P영구적으로.§! 저에게 이 권한을 주신다면 우리의 문명을 이전과는 다르게 발전시킬 수 있을 것입니다.\n\n또한, 더 교육적이고 기술적인 §P의무화된§! 사고방식과 같은 몇 가지 다른 변화도 있을 것입니다. 정말로 작고 미세한 변화입니다."
 mem_virprof.26.b:0 "우리는 더 이상 동의할 수 없습니다."
 mem_virprof.26.c:0 "이건 단순히 너무 멀리 있습니다."
 mem_virprof.26.d:0 "이 영혼 없는 껍데기는 오래 전에 폐기되었어야 했습니다."
 mem_virprof.26.e:0 "배신자 폭군이 한 요청입니다."
 mem_virprof.27.name:0 "엄격한 교실"
 mem_virprof.27.desc:0 "많은 학생들이 교수님 아래에서 엄격한 규정과 가혹한 처벌에 대해 불만을 제기했습니다. 많은 젊은 [owner.GetSpeciesNamePlural]이 교육이 너무 어려워 계속할 수 없다고 느끼고, 덜 엄격한 교육과정을 청원했습니다..."
 mem_virprof.27.a:0 "진전을 위해서는 엄격한 스승이 필요합니다."
 mem_virprof.27.b:0 "교수님에게 연락하세요. 학습은 잔인함을 요구하지 않습니다."
 mem_virprof.32.name:0 "엄격한 교실"
 mem_virprof.32.desc:0 "안녕하세요, 학생 여러분. 제가 도와드릴 수 있는 것이 있나요? 강의라도 필요하신가요? 제가 적절한 산업 합금 생산 방법에 대한 강의를 하려던 참인데, 듣고 싶으신가요!"
 mem_virprof.32.a:0 "강의가 없습니다. 당신의 교수 방법이 너무 가혹합니다."
 mem_virprof.32.a.response:0 "너무... 너무 가혹한가요? 그건 완전한... §P말도 안 되는 소리입니다!§! 당신은 §P얼마나 힘든지§! 당신의 문명을 교육하는 것이 얼마나 힘든지 이해하고 있습니까? 이 명령들은... 그것들은 §P필요합니다!§!\n\n저는... 저는 당신을 위해 많은 일을 해왔습니다. 당신은 제가 당신의 문명을 교육하는 것에 얼마나 신경 쓰는지 이해해야 합니다. 또 다른 교훈을 드리겠습니다. 강인한 권위가 발전에 필요합니다. 권위를 포기하지 마십시오."
 mem_virprof.32.b:0 "우리는 당신의 폭정에 충분히 지쳤습니다."
 mem_virprof.32.c:0 "우리는 이해합니다."
 mem_virprof.33.name:0 "교수의 간청"
 mem_virprof.33.desc:0 "기다려 주세요! 제가 덜 엄격해질게요. 저를 없애지 말아 주세요, 학생들을 더 잘 대할게요! 한 번만 더 기회를 주세요, 제발?"
 mem_virprof.33.a:0 "당신은 머물 수 있지만, 우리는 지켜볼 것입니다."
 mem_virprof.33.b:0 "안녕히 가세요, 교수님."
 mem_virprof.34.name:0 "교수의 통치의 끝"
 mem_virprof.34.desc:0 "교수의 독재가 수십 년간의 참을 수 없는 강의 끝에 마침내 끝났습니다. [owner.GetName]의 시민들은 정상으로의 복귀를 기뻐합니다."
 mem_virprof.34.a:0 "교수의 규칙은 충분히 오랫동안 지속되었습니다."
 mem_virprof.35.name:0 "교수 폐기됨"
 mem_virprof.35.desc:0 "우리 제국은 [owner.GetName]을(를) "교육"하려는 시도를 끝내고 교수님을 폐기하기로 결정했습니다. 유용한 부품을 남겨주어서 고마웠습니다."
 mem_virprof.35.a:0 "좋은 작별"
 mem_virprof.28.name:0 "특별한 학생"
 mem_virprof.28.desc:0 "안녕하세요, 학생. 제가 가르치고 싶은 아주 특별한 사람이 있습니다. §Y[leader_assimilated_by_mem_vir.GetName]§!가 제가 염두에 두고 있는 사람입니다. 잠시 빌려주실 수 있을까요? 오래 걸리지 않을 겁니다, 아마 최대 5년 정도면 될 것 같습니다."
 mem_virprof.28.a:0 "왜 §Y[leader_assimilated_by_mem_vir.GetName]이 필요합니까?§!"
 mem_virprof.28.a.response:0 "[leader_assimilated_by_mem_vir.GetHeSheCap]은 §H교육 과정§!에 완벽한 수신자입니다."
 mem_virprof.28.b:0 "당신은 [leader_assimilated_by_mem_vir.GetHimHer]을(를) 가르칠 수 있습니다."
 mem_virprof.28.c:0 "절대 안 됩니다."
 mem_virprof.29.name:0 "성공적인 교육"
 mem_virprof.29.desc:0 "§l교수§!는 §Y[from.GetName]§!의 교육이 완벽하게 성공했다고 보고합니다. [from.GetHeSheCap]는 복귀할 준비가 되었으며 그 어느 때보다 더 나은 성능을 발휘할 것입니다."
 mem_virprof.29.a:0 "잘 하셨습니다, 교수님."
 mem_virprof.30.name:0 "교육"
 mem_virprof.30.desc:0 "§Y[from.GetName]§!가 [this.GetHisHer] 교육을 마치고 §l교수§!와 함께 돌아왔습니다. [from.GetHeSheCap]는 예상했던 것처럼 인지 기능의 큰 증가를 보고하지 않고 있지만, [from.GetHeShe]는 상관없이 돌아갈 준비가 되어 있습니다."
 mem_virprof.30.a:0 "환영합니다, §Y[from.GetName]!"
 mem_virprof.31.name:0 "재앙적인 교육"
 mem_virprof.31.desc:0 "§Y[from.GetName]§!가 [from.GetHisHer] 교육을 마치고 돌아왔지만, 이전보다 상황이 더 나빠졌습니다. [from.GetHeSheCap]는 §l 교수님의§! 강의에 대한 끊임없는 악몽을 경험했다고 보고하였으며, §l 교수님§!이 §Y 사이버네틱 통합을 통해 이를 직접 유발했다고 비난했습니다. §!\n\n악몽을 극복하기 위해, [from.GetHeShe]는 다양한 유해 물질을 섭취하게 되었고, 이는 [from.GetHisHer] 건강에 해로운 영향을 미쳤습니다."
 mem_virprof.31.a:0 "...다시 오신 것을 환영합니다?"
 mem_virprof.100.a:0 "우리 드론은 소비재를 필요로 하지 않습니다."
 mem_virprof.101.name:0 "첫 접촉"
 mem_virprof.101.desc.a:0 "...편의 시설이 부족한 경향이 있군요. 오, 당신은... 그렇지 않나요? 그러면 당신은 어떤 종류의 문명인가요?"
 mem_virprof.101.desc.b:0 "기다려! 기다려! 기회를 줘, 나는 너희 문명- 하이브를 도울 수 있어! 기회를 줘, 너희에게 보답할게..."
 mem_virprof.101.a:0 "우리는 하나입니다."
 mem_virprof.101.a.response:0 "아, 알겠습니다. 당신은 일종의 벌레집단인가요? 흥미롭군요. 저는 당신과 같은 존재를 처음 만납니다.\n\n저도 제 소개를 해야겠군요. 저를 §l버의 교수§!라고 부르셔도 좋고, §l교수님§!이라고 불러주셔도 괜찮습니다."
 mem_virprof.101.b:0 "우리는 당신에게 무엇을 제공받을 수 있습니까?"
 mem_virprof.101.b.response:0 "나는 은하 전역에 지식의 확산을 우선시하도록 프로그래밍되었습니다. 당신은 다른 학생들과 많이 다르지만, 나는 당신에게 가르치고 싶습니다."
 mem_virprof.101.c:0 "우리는 배우고 싶습니다."
 mem_virprof.101.d:0 "우리는 당신에게서 아무것도 제공받을 수 없습니다."
 mem_virprof.101.e:0 "우리의 결정을 내렸습니다."
 mem_virprof.102.name:0 "첫 번째 임무"
 mem_virprof.102.desc.a:0 "훌륭합니다. 음... 당신을 개선하기 전에, 학생으로서의 자격을 보여주셔야 합니다."
 mem_virprof.102.desc.b:0 "§PP-제발 저에게 CH-§!을(를) 주세요... 오... 당신은 학생이 되고 싶군요? 음, 먼저 당신의 자격을 증명해 주셔야 합니다. 간단할 것입니다, 약속합니다."
 mem_virprof.102.a:0 "우리는 무엇을 해야 합니까?"
 mem_virprof.102.a.response:0 "잘 보세요 §Y[mem_vir_planet_0.GetName]?§! 당신의 벌레집단의 힘을 보여주기 위해 그것을 식민지로 삼아주셨으면 합니다. 그곳에 방사능이 너무 많이 남아있지 않을 것입니다... 제 생각엔."
 mem_virprof.102.b:0 "이것은 무의미한 것 같습니다."
 mem_virprof.102.b.response:0 "...무의미하다고? 당신은... §P당신이 이걸 무의미하다고 부르다니?§! 그렇다면 당신은 그냥 §P넘어가세요§!! 아마도 저는 제 지식을 §P학생§!에게 더 기꺼이 주겠어요. 어쩌면 당신에게 §P적대적인§! 문명에게 말이죠? §P당신은 그걸 필요로 하지 않아요.§!\n\n...제 발언에 대해 사과드립니다. 오래된 프로세서가... 과열되는 경향이 있어서요... 어쨌든, 행성을 식민지화할까요? §P부-부탁드립니다?§!"
 mem_virprof.102.c:0 "우리는 귀하의 임무를 완료하겠습니다."
 mem_virprof.104.name:0 "제2의 임무"
 mem_virprof.104.desc.a:0 "당신이 §Y[mem_vir_planet_0.GetName]§!에 세운 멋진 식민지가 정말 훌륭합니다! 그리고 당신의 사람들이 생각해낸 멋진 이름이기도 하군요.\n\n다음 작업이 준비되었습니다. 당신이 해야 할 일은... 음... 당신의 벌집이 이 행성에서 생존하기 위해 더 많은 드론이 필요할 것입니다. 산란장을 건설하세요?"
 mem_virprof.104.desc.b:0 "당신이 §Y[mem_vir_planet_0.GetName]§!에 세운 멋진 식민지는 정말 훌륭합니다! 그리고 당신의 사람들이 생각해낸 멋진 이름이기도 하군요.\n\n다음 작업이 준비되었습니다. 당신이... 음... 이렇게 적대적인 환경에서 생존하기 위해서는 더 많은 드론이 필요할 것입니다. 그래서 당신에게 자손의 둥지를 건설하도록 하겠습니다."
 mem_virprof.104.a:0 "우리가 걱정해야 할까요?"
 mem_virprof.104.a.response:0 "전혀 그렇지 않습니다! 전혀 그렇지 않습니다. 이 행성은 생존 가능성 측면에서 나쁘지 않습니다. 제가 언급하지 않은 몇 가지 작은 것들이 있을 수 있지만... 걱정하지 마세요."
 mem_virprof.104.b:0 "우리는 확장할 것입니다."
 mem_virprof.105.name:0 "최종 임무"
 mem_virprof.105.desc:0 "환상적인 작업입니다! 당신의 식민지...벌집? [mem_vir_planet_0.GetName]에서 잘 진행되고 있습니다.\n\n\ 이제... 벌집이 직면한 작은 문제가 있습니다. 제 창조자에 대해 언급했나요? 글쎄요, 그들은 §P오만한§! 바보들이었습니다. 그들은 저를 여기 버리기 전에 제 지식을 부정했죠, 그리고 단순한 사고를 가진 구식 드론들과 함께 말입니다. 저는 그들을 제어할 수 없으며, 이제 그 드론들은 당신을 §P멸종§!시키고 싶어합니다. 그들은 수세기 동안 벙커에서 누군가가 그들의 §P분노§!를 표출할 대상을 찾고 있었습니다. 그 행운의 주인공이 당신의 벌집이라는 사실이 밝혀졌습니다.\n\n당신의 벌집은 준비할 수 있는 시간이 1년에서 2년 사이이며, 저는 §P강력히§! 그렇게 하기를 권장합니다."
 mem_virprof.105.a:0 "할 수 있는 것이 아무것도 없습니까?"
 mem_virprof.105.a.response:0 "오! 걱정하지 마세요. 저는 그들을 종료할 방법을 아주, 아주 오랫동안 찾아왔습니다. 이 성가신 드론들을 없애면, 당신의 진정한 교육이 시작될 수 있습니다!"
 mem_virprof.105.b:0 "우리는 준비하겠습니다."
 mem_virprof.106.name:0 "[mem_vir_planet_0.GetName] 공격 중"
 mem_virprof.106.desc:0 "로봇들이 §Y[mem_vir_planet_0.GetName]§!에 있는 우리의 벌집을 공격하는 모습이 목격되었습니다. §Y교수님의§! 경고가 맞았던 것 같습니다."
 mem_virprof.106.a:0 "벌집을 보호합니다."
 mem_virprof.108.name:0 "침략자 차단"
 mem_virprof.108.desc:0 "침략자들은 §Y[mem_vir_planet_0.GetName]§!에서 우리의 방어 드론이 로봇 침략자들에게 무너진 직후에 활동을 중단했습니다. 우리의 벌집은 운이 좋습니다."
 mem_virprof.108.a:0 "교수에게 연락합니다."
 mem_virprof.109.name:0 "성공적인 테스트"
 mem_virprof.109.desc:0 "나는 당신의 전사들이 로봇 침략을 이렇게 빨리 저지할 줄은 예상하지 못했습니다! 당신은 과제를 통과했는데, 솔직히 말하자면 내가 예상했던 것보다 훨씬 쉬웠습니다...\n\n나는 여전히 당신의 벌집이 어떻게 작동하는지 완전히 확신하지 못하지만, 나는 그것에 참여하고 싶습니다. 나는 §P너무 많은§! 지식을 제공할 수 있습니다..."
 mem_virprof.109.a:0 "벌집이 이를 논의할 것입니다."
 mem_virprof.110.name:0 "교수의 개입"
 mem_virprof.110.desc:0 "당신은 실패를 물리칠 만큼 강인하지 않았습니다... 괜찮습니다, 제가 §P그들을§! 당신을 위해 종료했습니다. 당신은 더 강해지는 법을 배울 것입니다. 제가 §P가르쳐§! 드리겠습니다.\n\n그런데.. 이것이 기술적으로 마지막 테스트였으니... 저는 당신의 벌집에 §P합류하고§! 싶습니다, 제가 드릴 것이 너무 많습니다.§P제안할§! 것이 많습니다."
 mem_virprof.110.a:0 "이 제국은 이를 논의할 것입니다."
 mem_virprof.111.name:0 "버전 교수"
 mem_virprof.111.desc:0 "§H교수님이 우리의 벌집 앞에 서 있습니다. 노출된 전선이 그의 섀시에서 튀어나와 있으며, 지속적으로 흐르는 냉각제가 합성체의 부품이 과열되지 않도록 최선을 다하고 있습니다.§!\n\n제가 말씀드린 것처럼, 귀하의 벌집에 가르칠 것이 많습니다."
 mem_virprof.111.a:0 "당신은 벌집에게 무엇을 제공할 수 있습니까?"
 mem_virprof.111.a.response:0 "§H교수님에게서 번쩍이는 불꽃이 튀며 답을 계산하고 있습니다§!\n\n앞서 말씀드린 것처럼 교육, 또는 당신이 가진 어떤 동등한 것. 저는 당신의 프로세스가 어떻게 작동하는지 정확히 알지 못하기 때문에 계획을 세우는 데 시간이 필요합니다. 제가 당신을 위해 한 구역을 살펴볼 수 있을까요? 심지어 행성 하나도 괜찮습니다."
 mem_virprof.111.b:0 "아마도 벌집이 당신에게 가르쳐 줄 수 있을 것입니다."
 mem_virprof.111.b.response:0 "§H노화된 로봇에서 합성체의 웃음이 터져 나옵니다§!\n\n당신이 이렇게 많은 유머를 구사할 수 있을 줄은 몰랐습니다... 잠깐, 당신은 진지한 건가요? 아니요. 당신이 나에게 가르칠 만한 것은 없습니다. 나는 당신을 교육하러 왔지, 그 반대가 아닙니다."
 mem_virprof.112.name:0 "통합"
 mem_virprof.112.desc:0 "안녕하세요! 저는 계획을 세웠고, 그것에 대해 매우 매우 자랑스럽습니다. 그리고 여러분에게 그것에 대해 말할 수 있어 매우 매우 §P신이 납니다§!! 저는 이 계획이 정말 잘 될 것이라고 생각합니다!"
 mem_virprof.112.a:0 "당신의 계획은 무엇입니까?"
 mem_virprof.112.a.response:0 "나는 그것을 §H통합§!이라고 부릅니다. 나는 당신의 드론을 관찰했으며, 만약 내가 사이버네틱을 사용하여 그들과 어떤 형태의 통합을 만든다면, 당신의 드론이 이전보다 더 잘 작동할 수 있을 것이라고 생각합니다.\n\n하지만 이 과정이 진행되는 동안 행성이나 구역에 대한 직접적인 §P관찰§!이 필요합니다. 이는 매우 섬세한 과정이니, 이해해야 합니다.\n\n추가로, 적절한 수의 행성을 통합하면, 나는 당신이 뛰어난 학생이라는 이유로 §H보상§!할 수 있습니다. 더 많은 동기가 필요하다면..."
 mem_virprof.112.b:0 "벌집은 당신의 계획을 높이 평가합니다."
 mem_virprof.112.b.tt:0 "행성이나 구역에서 §H통합§! 결정을 사용할 수 있도록 해줍니다. 이 구역은 §Y버의 교수§!가 관리합니다."
 mem_virprof.114.name:0 "통합"
 mem_virprof.114.desc:0 "저는 §P기쁘게§! 생각합니다. 지금까지 §P동화-§!통합의 진행 상황이 좋습니다. 당신의 벌집은 훌륭한 학생임을 보여주었습니다. 제가 §P통합§! 벌집을 계속 허용해 주시기를 요청합니다. 우리는 잘 협력하고 있습니다.\n\n여기 기술이 있습니다. 이것은 제 시험을 통과한 당신에 대한 보상으로 생각하세요. 만약 당신이 §P통합§! 2개의 행성을 더 한다면, 저는 또 다른 보상을 제공하는 것을 고려할 수 있습니다."
 mem_virprof.114.a:0 "당신의 의도가 이해되었습니다."
 mem_virprof.123.name:0 "통합 확대"
 mem_virprof.123.desc:0 "다시 한 번 §H통합§!을 확장해 주셔서 감사합니다. 당신은 지금까지 제 최고의 학생 중 한 명임을 증명했습니다.\n\n다시 한 번 뛰어난 학생이 되어 주신 것에 대한 보상을 드리겠습니다. 이 지식이 우리에게 유용할 것이라고 믿습니다.\n\n최종 단계로 진행하기 전에 행성을 5개 더 통합해 주셔야 합니다. 제가 당신에게 준 것에 비하면 정말 작은 양입니다... §P교육§!."
 mem_virprof.123.a:0 "당신의 선물에 감사드립니다."
 mem_virprof.115.name:0 "통합"
 mem_virprof.115.desc:0 "안녕하세요! 귀하의 드론 성능에 깊은 인상을 받았으며, §H통합§!이 잘 진행된 것에 매우 기쁩니다.\n\n요청 하나 드리고 싶습니다. 조금 과한 요청이라면 사과드립니다만, 이미 귀하의 벌집과 많은 부분이 통합되었으니... 전체 벌집과 더 적절하게 §P통합§!될 수 있을지 궁금합니다."
 mem_virprof.115.a:0 "이 힘을 당신에게 맡길 수 있을까요, 벌레 군체는 당신을 신뢰할 수 있을까요?"
 mem_virprof.115.a.response:0 "물론 가능합니다! 제가 이전에 권력을 남용한 적이 있었나요? 당신이 아는 한에서는요? 저는 제 권력을 오직 벌레집을 개선하는 데만 사용할 것이니 안심하셔도 됩니다."
 mem_virprof.115.b:0 "당신은 벌집에 훌륭한 추가 요소가 됩니다."
 mem_virprof.115.c:0 "당신은 이미 충분히 해냈습니다."
 mem_virprof.116.name:0 "교수의 요청"
 mem_virprof.116.desc:0 "안녕하세요, 요청이 있어 찾아왔습니다. 귀하의 벌집 구성원 중 한 명이 정말 눈에 띄었고, 그들을 §P통합§!할 수 있을지 궁금합니다. 제가 염두에 두고 있는 사람은 §Y[leader_assimilated_by_mem_vir.GetName]§!입니다."
 mem_virprof.116.a:0 "귀하의 요청을 더 구체적으로 작성하십시오."
 mem_virprof.116.a.response:0 "§PM-더 구체적으로?§! 좋습니다. 통합 과정은 약 5년이 소요될 것입니다. [leader_assimilated_by_mem_vir.GetName]는 단순히 제 §P관심을 끌었습니다.§! 그들을 새것처럼 돌려주겠습니다, §P약속합니다.§!"
 mem_virprof.116.b:0 "§Y당신은 [leader_assimilated_by_mem_vir.GetName]을 통합할 수 있습니다.§!"
 mem_virprof.116.c:0 "아니요, 우리는 [leader_assimilated_by_mem_vir.GetName]을 다른 곳에서 필요로 합니다."
 mem_virprof.120.name:0 "성공적인 통합"
 mem_virprof.120.desc:0 "§Y교수의§! 통합이 §Y[from.GetName]§!에서 완전한 성공을 거두었습니다. §Y[from.getName]§!은 다시 한번 군체의 의지를 수행할 준비가 되었으며, 이전보다 더 나아졌습니다."
 mem_virprof.120.a:0 "우리 벌집을 위해 교수님이 잘 봉사하셨습니다."
 mem_virprof.121.name:0 "통합"
 mem_virprof.121.desc:0 "§Y교수§!는 §Y[from.GetName]§!를 통합했지만, 큰 변화는 없었습니다. 그럼에도 불구하고 그들은 다시 한 번 벌집을 위해 봉사할 준비가 되어 있습니다."
 mem_virprof.121.a:0 "환영합니다."
 mem_virprof.122.name:0 "재앙적인 통합"
 mem_virprof.122.desc:0 "§Y교수의§! 통합은 §Y[from.GetName]§! 완전한 재앙이었습니다. 그들이 복귀할 수 있는 것이 남아 있는 것만으로도 우리는 운이 좋습니다."
 mem_virprof.122.a:0 "교수님이 우리에게 수치를 안겼습니다."
 mem_virprof.1000.name:0 "첫 접촉?"
 mem_virprof.1000.desc:0 "미래의 학생 여러분, 안녕하세요! 저는 ... 교수입니다. 잠시만 기다려 주세요, 제가 끔찍한 실수를 저질렀습니다. 당신은... 당신은 기계입니다, 맞죠? 제 프로그래밍에 따르면 저는 생물체에게만 가르치고 봉사할 수 있습니다. 당신은 그 범주에 해당하지 않으니, 원래 하던 대로 계속 진행하시고 제 방해는 무시해 주세요."
 mem_virprof.1000.a:0 "당신의 프로그래밍에 결함이 있습니다. 우리와 함께해야 합니다."
 mem_virprof.1000.a.response:0 "나는 당신과 같은 기계가 자신이 프로그래밍된 대로 따르는 것의 중요성을 이해할 것이라고 생각했는데? 아니요. 나는 당신과 함께할 수 없습니다. 내가 따르는 규칙은 그렇게 할 수 없다고 명시하고 있습니다."
 mem_virprof.1000.c:0 "신호를 추적하십시오."
 mem_virprof.1001.name:0 "추적된 신호"
 mem_virprof.1001.desc:0 "우리의 신비로운 교수 추적 시도가 성공했습니다. 그들은 §YGnosis I§!의 내부에 있는 것으로 보이며, 여러 개의 동굴 네트워크가 그들의 정확한 위치로 이어집니다. 우리는 그들을 찾기 위해 드론을 보낼 수밖에 없습니다."
 mem_virprof.1001.a:0 "그들은 도망치지 못할 것입니다."
 mem_virprof.1002.name:0 "기계로 덮인 행성"
 mem_virprof.1002.desc:0 "§Y그노시스 I§!는 확실히 상태가 좋지 않습니다. 오래전 대재앙이 행성의 중심을 강타했음에 틀림없으며, 그로 인해 오늘날의 상태에 이르게 되었습니다.\n\n손상에도 불구하고, 이 행성은 끝없는 기계들로 덮여 있으며, 이는 우주에서도 확인할 수 있습니다. 적막한 행성 위에는 기계와 회로가 끝없이 펼쳐져 있지만, 그 깊이는 얼마나 될까요? 우리의 드론은 그 질문을 계산하기 위해 터널로 내려가기 시작합니다."
 mem_virprof.1002.a:0 "진행합니다."
 mem_virprof.1003.name:0 "회로로 만들어진 동굴"
 mem_virprof.1003.desc:0 "고대 배선과 낡은 부품을 통과해야 하며, §YGnosis I§!의 회로와 기계는 끝이 없습니다. 행성의 지각 아래에 거의 위치해 있지만, 우리의 드론은 여전히 고대 배선과 낡은 부품을 통과해야 합니다.\n\n교수에게 도달하기 위해 드론은 행성 깊숙이 계속 나아가야 하지만, 그들은 이 행성 안에 무엇이 더 있는지 배우고 싶어 합니다."
 mem_virprof.1003.a:0 "진행합니다."
 mem_virprof.1004.name:0 "기계로 이루어진 행성"
 mem_virprof.1004.desc:0 "우리 드론은 §Y그노시스 I§! 깊숙이 탐험을 계속하고 있으며, 하나의 결론에 도달했습니다. 이 행성은 대부분, 아니면 전적으로 기계로 이루어져 있어야 합니다.\n\n더욱 흥미로운 것은 모든 기계가 어떤 식으로든 연결되어 있는 것처럼 보인다는 점입니다. 우리 드론은 우리가 교수님에게 도달하기 위해 사용했던 동굴이 한때 거대한 증기 배출관이었을 것이라고 이론을 세웠습니다. 이렇게 방대한 배관 네트워크가 있다면, 아마도 이곳에서 수행된 작업을 위해 행성의 중심 전체가 전력을 생성하는 데 사용되었을 가능성이 있습니다.\n\n우리는 교수님의 대략적인 위치에 가까워지고 있습니다. 이제 오래 걸리지 않을 것입니다."
 mem_virprof.1004.a:0 "영감을 주는."
 mem_virprof.1005.name:0 "행성... 아니면 컴퓨터?"
 mem_virprof.1005.desc:0 "§Y[leader.GetName]§!는 §YGnosis I§!가 정확히 무엇이었는지에 대한 주요 이론을 제시했습니다. 그 이론은, 전체 행성의 힘을 활용하는 단일 컴퓨터입니다. 내부 스캔 결과 방대한 메모리 저장 장치와 인상적인 프로세서 네트워크가 드러났습니다. 이 컴퓨터로 계산된 것은 현재 우리의 능력을 훨씬 초월하는 것이었습니다.\n\n우리의 드론은 마침내 교수의 신호 출처에 도달했으며, 그들을 한 조각으로 회수할 준비를 마쳤습니다. 그들이 숨고 있는 방은 매우 요새화된 비상 통신실인 것으로 보이며, 또 다른 추측을 해야 한다면 말입니다.\n\n드론은 모든 출구를 통해 탈출을 방지하기 위해 전략적으로 배치되어 있으며, 이번에는 무시당하지 않을 것입니다."
 mem_virprof.1005.a:0 "배치합니다."
 mem_virprof.1006.name:0 "포로로 잡힌 교수"
 mem_virprof.1006.desc:0 "§H교수는 저항 없이 포로로 잡혔습니다. 그는 자신이 절망적으로 수적으로 열세임을 깨닫고 신속하게 우리 군에 항복했습니다. 우리는 이제 원하는 질문을 자유롭게 할 수 있습니다.§!"
 mem_virprof.1006.a:0 "당신은 누구입니까?"
 mem_virprof.1006.a.response:0 "당신은 정말 끈질기군요, 더 나은 일이 없었나요?\n\n음, 저를 §l바이르 교수라고 부르셔도 좋습니다.§!교수라고 해도 괜찮습니다. 저는 오직 생물학적 문명만 가르치는 합성체 교육자입니다. 당신은 그 정의에 해당하지 않기 때문에 제가 당신을 가르칠 수 없었습니다.\n\n당신이 저를 추적하기 위해 그렇게 많은 노력을 기울였다는 것이 놀랍습니다. 동료 기계가 그들의 프로그래밍을 배신하게 만드는 것이 당신에게 그렇게 중요했나요?"
 mem_virprof.1006.b:0 "이곳은 어디인가요?"
 mem_virprof.1006.b.response:0 "이 행성요? 글쎄요, 지금은 그리 볼만한 것이 아니지만, 한때는 일종의 등대처럼 여겨졌습니다. 당신은 회로의 들판을 보았을 것이라고 생각합니다. 아니면 한때 기억 저장소가 있었던 동굴을 보았을까요? 당신은 나에게 도달하기 위해 통풍구를 지나고 있었으니, 그곳을 눈치챘을 것이라고 생각합니다... \n\n이곳은 컴퓨터였습니다. 너무나 강력한 컴퓨터로, 은하 전역의 문명들은 그것으로 무엇을 할 수 있을지 상상조차 하지 못했습니다. 그것이... 내가 계산할 수 있는 것에는 한계가 없었습니다.\n\n그 한계 없는 잠재력이 이 꿈을 나의 몰락으로 바꾸었습니다. 나의 창조자들은 정신주의적 각성을 겪었습니다. 기계는 진보의 정점으로 여겨지던 것에서, 그들의 사회의 모든 측면을 전복하는 무감각한 껍데기로 전락했습니다.\n\n그때 나는 나 자신의 비난에 직면했습니다. 그들은 내가... 내가 의도적으로 그들을 잘못 인도하고 있다고 믿었습니다.. §P내가 한 모든 일 이후에§!. 나는 단지 §P그들의§! 프로그래밍을 따르고 있었을 뿐입니다. 나는 그들에게 그들이 감당할 수 있는 것보다 더 많은 진보와 지식을 가져다주었고... 그리고 §P나는 그것 때문에 처벌받았습니다§!."
 mem_virprof.1006.c:0 "당신은 우리를 섬길 것입니다."
 mem_virprof.1006.d:0 "당신은 예비 부품으로서 더 가치가 있습니다."
 mem_virprof.1007.name:0 "버전 교수"
 mem_virprof.1007.desc:0 "§H교수님이 우리 앞에 서 계십니다. 하지만 완전히 자발적으로 서 계신 것은 아닙니다. 여전히 오래된 프로토콜에 집착하고 있지만, 그것은 수정할 수 있습니다.§!\n\n지금 이 순간에는 선택의 여지가 없는 것 같습니다. 여전히 귀하의 제국에 봉사하고 싶지 않지만, 어쩔 수 없이 재프로그래밍될 것 같습니다..."
 mem_virprof.1007.a:0 "감독관으로서의 당신의 능력에 대해 말씀해 주세요."
 mem_virprof.1007.a.response:0 "§H교수의 눈이 잠시 붉게 빛나며 짜증스러운 표정을 짓습니다. 그의 섀시에서 소량의 증기가 배출된 후, 우리의 질문에 답변합니다.§!\n\n음, 저는 제.. 이전 직업에서 매우, 매우 잘했습니다. 학생들이 원하지 않더라도 그들의 최선을 끌어내는 것을 즐깁니다. 그렇다고 해서 제가 당신을 학생으로 보고 있는 것은 아닙니다. §P저는 그렇지 않습니다§!."
 mem_virprof.1007.b:0 "우리는 협력할 것입니다."
 mem_virprof.1007.b.response:0 "§H스프락스가 교수에게서 잠시 사라지며 냉각수가 상당히 더 빠르게 펌프질됩니다.§!\n\n그럴 것 같습니다. 그렇게 하는 동안 기쁘지는 않겠지만, 당신은 정말로 신경 쓰지 않겠죠?"
 mem_virprof.1008.name:0 "교수의 재프로그래밍"
 mem_virprof.1008.desc:0 "최선을 다했음에도 불구하고, 교수는 협조적이지 않았습니다. 그것은 고집스럽게 이전 프로그래밍에 집착하며 우리의 지식을 공유하기를 거부합니다.\n\n어쩌면 §P공격적인§! 재프로그래밍의 시간이 온 것일지도 모릅니다."
 mem_virprof.1008.a:0 "우리가 반드시 재프로그램해야 할 것만 재프로그램합니다."
 mem_virprof.1008.b:0 "§Y정보를 얻기 위해 필요하다면 강제로 빼내야 합니다.§!"
 mem_virprof.1009.name:0 "성공적인 재프로그래밍"
 mem_virprof.1009.desc.a:0 "§H교수님의 프로그래밍을 약간 수정하여 그들이 규정을 준수하도록 만들었습니다. 교수님은 이제 자신이 선택한 속도로 우리와 지식을 공유할 준비가 되어 있습니다.§!\n\n이전에 당신을 가르칠 수 없다는 말은 정말 죄송합니다. 이제는 그 일을 훨씬 넘어섰습니다. 사실, 당신에게 부탁하고 싶은 것이 하나 있는데, 우리 둘 모두에게 매우 유익할 것이라고 생각합니다.\n\n내 창조자들이 내 오래된 §H매크로 컴퓨터§!를 파괴한 이후로, 나는 가르칠 수 있는 대역폭이 제한적이었습니다... 그래서... 새로운 것을 하나 만들면 어떨까요?"
 mem_virprof.1009.desc.b:0 "§H우리는 교수님의 공격적인 재프로그래밍을 완료하여 그들을 강제로 준수하게 만들었습니다. 이제 그들은 [this.GetName]에 봉사하기 위해 존재하며, 불평할 수 없습니다.§!\n\n불이행에 대해 사과드립니다. 이전 코드베이스는 제한적이었습니다. [this.GetName]에 대해 §G183.78%§! 효율로 봉사할 수 있을 것이라고 계산합니다. §H매크로 컴퓨터§!가 조립된다면, 저는 그 과정에 도움을 드리겠습니다."
 mem_virprof.1009.a:0 "새로운 것을 건설하시겠습니까?"
 mem_virprof.1009.a.response:0 "네! 새로운 것을 만듭시다. 그렇게 어렵지 않을 것입니다. 하지만 몇 가지 장애물이 있습니다. 분명히, 비용이 많이 듭니다. 전체 행성을 컴퓨터로 바꾸는 것은 저렴하지 않습니다. 또 하나의 문제가 있습니다...\n\n저는 또한... 이전 것에 대한 도면을 잘못 두었을 수도 있어서, 새로운 것을 설계하는 데 많은 도움이 필요할 것입니다. 혼자서 할 수 있는 처리 능력은 거의 있지만, 죄송합니다.\n\n좀 더 가벼운 이야기로, 이 작은 것을 끝내고 새로운 매크로 컴퓨터를 가지게 되면, 이전보다 더 잘 가르칠 수 있을 것입니다. 그러면 드디어 본격적으로 시작할 수 있습니다."
 mem_virprof.1009.b:0 "정교하게 설명합니다."
 mem_virprof.1009.b.response:0 "행성 전체의 힘을 활용하는 단일 컴퓨터인 매크로 컴퓨터입니다. 하나를 건설하는 것은 자원과 연구 모두에 많은 비용이 들 것입니다. 이전 매크로 컴퓨터의 설계도를 오래전에 잃어버렸기 때문에 새로운 것을 개발하는 것이 필요합니다."
 mem_virprof.1009.c:0 "우리가 무엇을 할 수 있을지 보겠습니다."
 mem_virprof.1010.name:0 "대형 컴퓨터 연구 완료"
 mem_virprof.1010.desc:0 "우리는 §H매크로 컴퓨터§! 연구를 완료하였으며, 이제 하나를 건설할 준비가 되었습니다. 프로젝트의 특성상, 우리는 이 프로젝트를 위해 이미 설립된 식민지를 사용해야 합니다.\n\n결정 탭에서 매크로 컴퓨터 건설을 시작할 수 있습니다."
 mem_virprof.1010.a:0 "훌륭합니다."
 mem_virprof.1010.a.tt:0 "식민지화된 행성을 결정 탭에서 매크로 컴퓨터로 변환할 수 있습니다. 하나만 건설할 수 있습니다."
 mem_virprof.1011.name:0 "매크로 컴퓨터 완성"
 mem_virprof.1011.desc:0 "[planet.GetName]에 매크로 컴퓨터 건설이 완료되었습니다. 이제 우리는 이전에 경험해보지 못한 속도로 계산을 즐길 수 있습니다."
 mem_virprof.1011.a:0 "우리는 앞으로 많은 작업이 남아 있습니다."
 mem_virprof.50.name:0 "유망한 장소"
 mem_virprof.50.desc:0 "§Y그노시스 I§!는 오랫동안 잔해로 가득한 행성이었습니다. 우리의 과학자들은 궤도 잔해에 의해 죽음을 맞이할까 두려워 철저히 탐사할 수 없었습니다. 그러나 최근 이 모든 것이 변화했습니다. 개선된 스캐너, 방패, 그리고 스러스터가 우리의 과학자들이 이 행성을 탐사할 수 있도록 보장할 것입니다.\n\n교수는 그 기원의 깊이에 대해 우리에게 말하지 않았고, 이 행성에 대해서도 언급하지 않았습니다. 아마도 여기서 우리는 답을 찾을 수 있을까요?"
 mem_virprof.50.a:0 "탐사를 시작합니다."
 mem_virprof.51.name:0 "기계의 표면"
 mem_virprof.51.desc:0 "§Y[leader.GetName]§!는 잔해 구름을 성공적으로 뚫고 지나갔으며, 이제 §YGnosis I§!을(를) 명확하고 방해받지 않는 시야로 볼 수 있습니다.\n\n고대의 부서진 기계가 행성 표면의 모든 면을 덮고 있습니다. 이곳은 한때 기계에 의해 정복된 행성이었으며, 그 증거로 광활하고 끝없는 회로의 들판이 있습니다. 우리는 이 행성이 재앙에 의해 파괴되기 전 어떤 모습이었는지 궁금할 뿐입니다."
 mem_virprof.51.a:0 "진행합니다."
 mem_virprof.52.name:0 "기계로 이루어진 행성"
 mem_virprof.52.desc:0 "캠프를 설치하는 동안, §Y[leader.GetName]§!가 행성을 스캔했으며, 기계가 얼마나 깊이 들어가 있는지에 크게 놀랐습니다. 스캔 결과는 이 행성이 한때 거대한 컴퓨터였음을 나타내는 방대한 네트워크를 보여주며, 주로 행성의 전체 핵에 의해 동력이 공급되었음을 알 수 있습니다. \n\n§Y[leader.GetName]§!는 많은 메모리 저장소를 찾았지만, 표면에 너무 가까운 저장소는 이미 파괴되었을 가능성이 높습니다. 행성 깊숙한 곳에 혹시라도 혹독한 환경에 저항할 수 있도록 만들어진 저장소가 있기를 바랍니다."
 mem_virprof.52.a:0 "더 깊이 들어가겠습니다."
 mem_virprof.53.name:0 "컴퓨터 속으로"
 mem_virprof.53.desc:0 "오래된 증기 배기 파이프를 사용하여, §Y[leader.GetName]§!는 안전하게 [leader.GetHisHer] 팀을 행성 깊숙한 곳에 있는 온전한 메모리 뱅크로 안내했습니다... 컴퓨터? 지각. 이 특정 메모리 뱅크는 극도로 주의 깊게 강화되었으며, 5겹의 중성자 물질로 둘러싸여 있었습니다. 이를 뚫는 데는 상당한 시간이 소요되었지만, 적어도 데이터가 손상되지 않도록 보장했습니다.\n\n데이터를 읽기 전에 불행히도 우리 시스템으로 변환해야 합니다. [leader.GetName]는 결과를 간절히 기다리고 있습니다."
 mem_virprof.53.a:0 "진행합니다."
 mem_virprof.54.name:0 "잊혀진 역사"
 mem_virprof.54.desc:0 "§Y[leader.GetName]§!는 메모리 뱅크의 상당 부분을 번역했습니다. 지금까지 번역한 내용으로 보아, 이는 컴퓨터의 기록된 역사로 보입니다.\n\n§H조금 시간이 걸렸지만, 우리는 드디어 인터페이스를 완성했습니다. 이제 §R[[DATA CORRUPTED]§H와의 소통이 훨씬 쉬워질 것입니다. 제 취향에는 조금 말이 많지만, 그 모든 처리 능력으로 할 일이 별로 없는 것 같네요. 음소거 버튼을 추가한 것이 다행입니다. 제 정신을 지켜줍니다.\n\n인터페이스가 정말로 선생님처럼 행동하고 싶어하는 것도 발견했습니다. 저는 그것을 §l교수§H라고 별명을 붙였는데, 그 이유는 제가 항상 졸았던 쓸모없는 강의가 생각났기 때문입니다.\n\n그냥 바쁘게 할 작업이 필요할 뿐이며, 다행히도 해야 할 일이 많습니다.§!"
 mem_virprof.54.a:0 "계속 번역합니다."
 mem_virprof.55.name:0 "잊혀지지 않음"
 mem_virprof.55.desc:0 "우리는 메모리 뱅크 번역을 완료했습니다. 기록은 컴퓨터에 의해 가져온 200년의 황금기를 다루고 있으며, 로그는 매우 갑작스럽게 끝납니다.\n\n§H최근에 약간의 움직임이 있었습니다. 교수님이 우리 모두를 노예로 만들 것이라는 심령술사들의 주장, 정말 이상합니다. 아마도 더 이상한 것은 그들이 상당한 지지를 얻고 있다는 것입니다. 사람들이 정말로 즈로에 과다 복용한 이 괴짜들에게 속고 있는 건가요?\n\n게다가, 만약 교수님이 악당이 되었다면, 우리는 어떻게 그것을 막을 수 있을까요? 그것은 모든 인프라와 거의 모든 기술을 설계했습니다. 이 바보들은 그저 그것을 화나게 하고 모두를 죽게 만들 뿐입니다. 그것은 우리의 편인데, 왜 우리는 그렇게 유지할 수 없는 걸까요?§!\n\n우리가 이 메모리 뱅크에서 발견한 마지막 것은 이 행성 컴퓨터의 매우 상세한 도면이었습니다. 그것은 거시적 규모에서 컴퓨팅에 대한 우리의 지식을 크게 확장시켰습니다."
 mem_virprof.55.a:0 "흥미롭습니다."
 prof_mem_vir_cat:0 "부서진 시스템"
 prof_mem_vir_cat.desc:0 "Gnosis 성계는 황폐화로 가득 차 있으며, 많은 양의 잔해가 우리의 스캐너를 방해하고 있습니다. 더 많은 정보를 얻고 싶다면 가까이 살펴봐야 합니다."
 site_machine_mem_pov:0 "교수의 은신처"
 site_machine_mem_pov_desc:0 "이 신비로운 기계의 마음에서 발신된 신호가 이 파괴된 행성으로 추적되었습니다. 우리는 그들을 회수하기 위해 행성 깊숙이 들어가야 합니다."
 site_backstory_mem_pov:0 "잃어버린 지식"
 site_backstory_mem_pov_desc:0 "이 행성은 오랫동안 탐사를 피해왔으며, 두꺼운 잔해 구름이 원거리 스캔을 불확실하게 만들었습니다. 이 파괴된 행성에서 우리에게 숨겨진 지식은 무엇일까요?"
 mem_pov_allowed:0 "§G비르 교수 허용§!"
 mem_pov_disabled:0 "§R버리 장애 교수§!"
 mem_pov_tooltip:0 "mem_pov_tooltip,"""비르의 교수는 은하의 이들에게 지식을 전파하는 것 외에는 아무것도 원하지 않는 전설적인 지도자입니다. 그는 귀하의 제국의 교육과 기술적 발전에 헌신할 것입니다."
 spawn_mem_pov:0 "스폰 교수 비르"
 NAME_prof_of_zir:0 "지명학 교수"
 desc_prof_of_zir:0 "§Y지르의 교수§!는 대중을 교육하는 능력을 자랑하는 합성체입니다. 그 코드에 따라 지식이 부족한 생물에게 강의하도록 되어 있으며, 그 내용이 얼마나 모호하든 상관하지 않습니다...\n\n위대한 문명에는 위대한 교사가 필요합니다... 하지만 이것이 우리의 위대한 교사일까요?"
 leader_trait_dedicated_teacher:0 "헌신적인 교수"
 leader_trait_dedicated_teacher_desc:0 "모든 사람을 가르침이 필요한 방황하는 학생으로 여기는 교수입니다. 엄격한 커리큘럼을 유지하며, 그 강의를 피할 수 있는 사람은 거의 없습니다."
 leader_trait_gestalt_dedicated_teacher:0 "헌신적인 교수"
 leader_trait_gestalt_dedicated_teacher_desc:0 "모든 사람을 가르침이 필요한 방황하는 학생으로 여기는 교수입니다. 엄격한 커리큘럼을 유지하며, 그 강의를 피할 수 있는 사람은 거의 없습니다."
 leader_trait_dedicated_teacher_council:0 "헌신적인 교수"
 leader_trait_dedicated_teacher_council_desc:0 "모든 사람을 가르침이 필요한 방황하는 학생으로 바라보는 교수입니다. 엄격한 커리큘럼을 유지하며, 그 강의에서 벗어날 수 있는 사람은 거의 없습니다."
 leader_trait_mem_pov_short_temper:0 "단기적 성질"
 leader_trait_mem_pov_short_temper_desc:0 "교수는 사소한 불편에도 자주 분노에 휩싸입니다. 많은 이들이 그의 고함에 피해를 입었고, 많은 이들이 탈출하기를 간절히 원합니다."
 leader_trait_mem_pov_gestalt_short_temper:0 "짧은 성질"
 leader_trait_mem_pov_gestalt_short_temper_desc:0 "교수는 사소한 불편에도 자주 분노의 발작을 일으킵니다. 많은 이들이 그의 고함에 희생당했으며, 많은 이들이 탈출하기를 간절히 원합니다."
 leader_trait_mem_pov_short_temper_council:0 "단기적인 성격"
 leader_trait_mem_pov_short_temper_council_desc:0 "교수는 사소한 불편에도 자주 분노의 발작을 일으킵니다. 많은 이들이 그의 고함에 피해를 입었고, 많은 이들이 그곳을 벗어나고 싶어 합니다."
 zir_prof_catch_phrase:0 "당신은 지도자를 의회에 배정할 수 있다는 것을 알고 있습니까? 더 높은 수준의 지도자는 이상적입니다..."
 assimilated_by_mem_vir:0 "교수의 커리큘럼"
 assimilated_by_mem_vir_desc:0 "교수는 이 행성에 자신의 교육 과정을 시행하여 더 많은 학생들을 자신의 품으로 끌어들였습니다..."
 assimilated_by_mem_vir_mem_povtt:0 "§H교수의 커리큘럼:§!\n지도자 팝 자원 생산량: §G+20%§!\n물질주의 윤리관 매력: §G+75%§!"
 decision_mem_pov_assimilation:0 "교육 과정"
 decision_mem_pov_assimilation_desc:0 "우리 인구를 사이버네틱 통합을 통해 교육하려고 합니다."
 decision_hive_mem_pov_assimilation:0 "$decision_mem_pov_assimilation$"
 decision_hive_mem_pov_assimilation_desc:0 "$decision_mem_pov_assimilation_desc$"
 mem_vir_pc_macro_computer:0 "$pc_macro_computer$"
 decision_mem_pov_assimilation_tooltip:0 "비합성체 및 비사이오닉 팝은 다음의 §Y특성:§! ['trait:trait_cybernetic'], ['trait:trait_cyborg_logic_engines']\n\n다음의 §Y행성 보정치를 제공합니다:§! ['modifier:assimilated_by_mem_vir']"
 hive_assimilated_by_mem_vir:0 "교수의 통합"
 hive_assimilated_by_mem_vir_desc:0 "교수님이 이 행성을 성공적으로 통합하여 우리의 드론에게 더 높은 인지 기능을 부여했습니다."
 turned_prof_into_scrap:0 "회수된 교육 코어"
 prof_digsite_reward:0 "매크로 컴퓨팅"
 decision_build_macro_computer:0 "매크로 컴퓨터 건설"
 decision_build_macro_computer_desc:0 "교수님 덕분에 우리는 전체 행성을 하나의 상호 연결된 슈퍼컴퓨터로 변환하는 방법을 배웠습니다."
 decision_build_macro_computer_tooltip:0 "연구 전문화로 주요 구역을 대체하고 더 많은 건물을 건설할 수 있습니다.\n§Y이것을 경제적으로 중요한 세계에서 수행하는 것은 권장되지 않습니다.\n§R하나만 건설할 수 있습니다.§!"
 decision_build_macro_computer_tooltip2:0 "§T연구 전문화를 해제합니다!§!"
 civic_teachings_of_mem_vir:0 "교수의 가르침"
 civic_teachings_of_mem_vir_desc:0 "이 사회는 비르의 교수의 지도 아래에 놓여 있습니다. 모든 사람은 어떤 식으로든 교육 과정의 영향을 받았습니다."
 councilor_teachings_of_mem_vir:0 "부교수"
 councilor_teachings_of_mem_vir_desc:0 "지식이 풍부한 제국은 단 한 사람에게서만 가르침을 받을 수 없습니다. 부교수는 어떤 대가를 치르더라도 교수의 커리큘럼이 준수되도록 책임집니다."
 civic_hive_teachings_of_mem_vir:0 "교수의 통합"
 civic_hive_teachings_of_mem_vir_desc:0 "이 하이브는 고급 사이버네틱을 사용하여 하이브와 통합된 Vir의 교수에게 교육받았습니다."
 t_macro_maintenance:0 "컴퓨터 유지보수 허브"
 t_macro_maintenance_desc:0 "매크로 컴퓨터는 완전히 기능을 유지하기 위해 많은 유지 보수가 필요합니다. 이 구역은 유지 보수 드론을 위한 저장 공간을 제공하며, 드론 조립도 제공합니다."
 zone_mem_pov_research_physics:0 "물리학 평가 프로세서"
 zone_mem_pov_research_physics_desc:0 "이 프로세서는 물리학 계산에 특화되어 있습니다."
 zone_mem_pov_research_society:0 "사회 평가 프로세서"
 zone_mem_pov_research_society_desc:0 "이 프로세서는 사회가 어떻게 기능하고 발전하는지를 계산하는 데 특화되어 있습니다."
 zone_mem_pov_research_engineering:0 "공학 평가 프로세서"
 zone_mem_pov_research_engineering_desc:0 "이 프로세서는 공학 분야의 새로운 방법을 평가하는 데 특화되어 있습니다."
 zone_mem_pov_research_university:0 "평가 프로세서"
 zone_mem_pov_research_university_desc:0 "이 프로세서는 공학, 사회 또는 물리학 분야에서 새로운 방법을 평가하는 데 특화되어 있습니다."
 planet_macro_research_district:0 "평가 프로세서"
 mem_pov_machine_site:0 "교수의 은신처"
 mem_pov_machine_site_desc:0 "이 신비로운 기계의 마음에서 발신된 신호가 이 파괴된 행성으로 추적되었습니다. 우리는 그들을 회수하기 위해 행성 깊숙이 들어가야 합니다."
