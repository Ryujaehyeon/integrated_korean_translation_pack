 ESC_SENSOR_7_DESC:0 "이전의 모든 감지기보다 더 많은 것을 볼 수 있는 초끈 기반의 차세대 감지기입니다."
 ESC_SENSOR_PRECURSOR:0 "선구자 감시망"
 ESC_SENSOR_PRECURSOR_DESC:0 "£sr_dark_matter£ §Y$sr_dark_matter$§!의 불가사의한 특성을 사용하는 첨단 감시망으로 우주 전체에서 즉시 대상을 찾아낼 수 있습니다."
 ESC_SENSOR_PSIONIC:0 "사이오닉 감지기"
 ESC_SENSOR_PSIONIC_DESC:0 "승무원의 사이오닉 에너지를 이용해 우주를 안내하는 감지기입니다."
 ESC_SENSOR_AVATAR:0 "장막의 눈"
 ESC_SENSOR_AVATAR_DESC:0 "이 사이오닉 개체는 불가사의한 장막의 눈을 통해 우리 영역을 인식합니다."
 ESC_BIO_SENSOR_5:0 "첨단 타키온 감지 기관"
 ESC_BIO_SENSOR_5_DESC:0 "타키온 입자에 맞춰진 추가 돌연변이 감각 기관으로, 생명체에 크게 향상된 공간 인식을 부여합니다."
