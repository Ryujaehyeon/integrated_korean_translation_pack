 mod_decisions_cost_mult:0 "행성 결정 비용"
 mod_planet_researchers_physics_research_produces_add:0 "£job_researcher£ $job_researcher_plural$이 생산하는 £physics_research£ $physics_research$"
 mod_planet_researchers_society_research_produces_add:0 "£job_researcher£ $job_researcher_plural$이 생산하는 £society_research£ $society_research$"
 mod_planet_researchers_engineering_research_produces_add:0 "£job_researcher£ $job_researcher_plural$이 생산하는 £engineering_research£ $engineering_research$"
 policy_sls_survey_focus:0 "연구단"
 policy_sls_survey_focus_desc:0 "과학자의 탐사 성과를 어떤 방향으로 사용할 지 결정합니다."
 sls_survey_energy:0 "£energy£ 항성 조사"
 sls_survey_energy_desc:0 "새로운 수준의 태양광 패널을 사용하여 조사 팀은 전송 가능한 태양 에너지를 가치 크레딧으로 수집할 수 있습니다.\n\n$sls_survey_prefix$행성을 조사하면 §Y3-15§! £energy£ §H$energy$§!를 얻습니다. 별을 조사하면 추가로 §Y50-100§! £energy£ §H$energy$§!를 얻습니다."
 sls_survey_minerals:0 "£minerals£ 소행성 수집"
 sls_survey_minerals_desc:0 "각 과학 함선은 소행성을 발견할 경우 희귀 금속을 수집하는 동력 드릴을 설치합니다.\n\n$sls_survey_prefix$행성을 조사하면 §Y3-15§! £minerals£ §H$minerals$§!을(를) 얻습니다. 소행성을 조사하면 §Y25-50§! £minerals£ §H$minerals$§!을(를) 얻습니다."
 sls_survey_physics_research:0 "£physics£ 물리학 분석"
 sls_survey_physics_research_desc:0 "물리학 연구의 미래는 이제 탐사 임무에 있습니다.\n\n$sls_survey_prefix$행성을 탐사하는 대가로 매달 §Y20%§!의 £physics£ §H$physics_research$§!를 제공합니다."
 sls_survey_society_research:0 "£society£ 사회학 연구"
 sls_survey_society_research_desc:0 "모든 생명체는 그 목적에 관계없이 고유한 행동을 가지고 있습니다.\n\n$sls_survey_prefix$행성을 조사할 때 매달 £society£ §H$society_research$§!의 §Y20%§!를 부여합니다."
 sls_survey_engineering_research:0 "£engineering£ 공학 실험"
 sls_survey_engineering_research_desc:0 "로켓이 꿈꾸는 꿈, 무한과 그 너머로.\n\n$sls_survey_prefix$행성을 조사하기 위해 매달 £engineering£ §H$engineering_research$§!의 §Y20%§!를 부여합니다."
 sls_survey_unity:0 "£unity£ 영감 자극"
 sls_survey_unity_desc:0 "탐사대가 모든 흥미로운 정보를 기록하고 전송합니다. 예술가들에게 영감을 주는 독특한 형태의 모양도 포함됩니다. \n\n$sls_survey_prefix$ 행성을 탐사할 때 마다 월간 £unity£ §H$unity$§!의 §Y15%§!를 받습니다."
 sls_survey_prefix:0 "§E과학선에 적용되는 효과:§!\n"
 edict_sls_simple_eureka_edict:0 "유레카 선형화"
 edict_sls_simple_eureka_edict_desc:0 "모두가 '획기적인' 방법을 선호하는 것은 아닙니다. 때로는 보편적인 것이 가장 좋을 수도 있습니다."
 edict_sls_simple_eureka_edict_tooltip:0 "연구 지도자의 유레카 효과는 연구 선택지 대신 해당 분류의 연구 포인트를 제공합니다."
 sls.205.message:0 "$sls_scientist|H$는 해당 분야에서 획기적인 발전을 이루어냈으며, 관련 연구 포인트를 제공합니다."
 sls_physics_add_modifier:0 "$sls_physics_add_lv0$"
 sls_physics_add_modifier_desc:0 "$sls_physics_add_lv0_desc$"
 sls_society_add_modifier:0 "$sls_society_add_lv0$"
 sls_society_add_modifier_desc:0 "$sls_physics_add_lv0_desc$"
 sls_engineering_add_modifier:0 "$sls_engineering_add_lv0$"
 sls_engineering_add_modifier_desc:0 "$sls_physics_add_lv0_desc$"
 sls_add_tooltip:0 "의회에 지도자를 배정하여 우리의 §Y연구 노력§!을 증가시킵니다."
 sls_trait_research_ability_bar:0 "연구 상태"
 sls_trait_research_ability_bar_desc:0 "물리학: §B[root.sls_leader_physics_points]|100§!\n사회: §G[root.sls_leader_society_points]|100§!\n공학: §H[root.sls_leader_engineering_points]|100§!\n\n§E이 특성은 지도자의 연구 능력을 나타냅니다. §H3 연구 상태§!는 지도자의 과학적 능력을 결정합니다.§!\n\n§E§H과학자§!, §H공무원§!는 연구 노력을 가질 수 있으며, §H과학자§!는 일반적으로 이러한 분야에서 더 능력이 뛰어납니다.\n\n위원회에서 §H연구 책임자§!로 지정할 때, 과학자는 §HEureka 상태§!를 가질 수 있습니다.§!"
 sls_physics_add_lv0:0 "물리학 수석 연구"
 sls_physics_add_lv0_desc:0 "§G이 수정자는 당신의 $councilor_research$에서 발생합니다.§!"
 sls_society_add_lv0:0 "사회 연구 책임자"
 sls_engineering_add_lv0:0 "공학 헤드 연구"
 sls_trait_research_desc:0 "§G§Y연구 기술 수준§!은 과학자가 연구를 주도할 때의 능력과 같은 범주 내에서 §Y연구 단체§!의 효과를 결정합니다.§!"
