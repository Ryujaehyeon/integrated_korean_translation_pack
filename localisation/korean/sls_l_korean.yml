 sls.100.name:0 "연구 사무실"
 sls.100.desc:0 "제국 연구 사무실에 온 것을 환영합니다!\n\n이곳에서 과학자의 조사단을 변경할 수 있습니다. 조사단을 변경하길 원하는 연구 지도자를 선택하세요.(역주:연구에 종사하는 과학자 3명 중 하나를 선택 가능합니다)"
 sls.100.a:0 "§B[sls_physics_leader_name.GetName]§!"
 sls.100.b:0 "§G[sls_society_leader_name.GetName]§!"
 sls.100.c:0 "§H[sls_engineering_leader_name.GetName]§!"
 sls.100.d:0 "떠나기."
 sls.100.d.tooltip:0 "아무일 없었다는 듯 떠납니다."
 sls.204.name:0 "천재적인 번뜩임"
 sls.204.desc.head_researcher:0 "§H[sls_scientist.GetName]§! 훌륭한 아이디어가 떠올랐고, 이미 우리가 채택할 수 있는 [sls_scientist.GetHerHis] 연구 이론이 준비되어 있습니다! [sls_scientist.GetSXX]"
 sls.204.desc.head_researcher_machine:0 "우리는 새로운 이론 옵션 중 하나가 우리의 기술 개발로 실현 가능하고 실행 가능하다는 계산 주기를 마쳤습니다."
 sls.204.desc.head_researcher_hive:0 "우리는 우리의 확장으로 이론 중 하나가 가능하고 실행 가능하다는 것을 확인했습니다."
