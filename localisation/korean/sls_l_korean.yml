 edict_sls_scientist_swap_desc:0 "연구 사무실은 과학자가 연구를 이끄는 위치에 배정되는 한, 당신이 연구단을 조정할 수 있도록 합니다"
 sls_swap_window_select_tooltip:0 "§G연구 사무실에 접촉하기 위해 클릭하십시오§!"
 sls_swap_window_opened_tooltip:0 "§R이제 연구 사무실에 접촉하고 있습니다.§!"
 sls.51.name:0 "연구단 해금"
 sls.51.desc:0 "우리 [Owner.GetScientist] §H[sls_swap_leader_name.GetName]§!는 [sls_swap_leader_name.GetHerHis] §Y연구단§!!를 잠금 해제할 수 있습니다.\n\n아래에서 그 중 하나를 선택하세요."
 sls.51.desc.b:0 "우리의 [Owner.GetScientist] §H[sls_swap_leader_name.GetName]§!에서 §H[sls_swap_leader_name.fleet.GetName]§!는 [sls_swap_leader_name.GetHerHis] §Y연구단§!을 잠금 해제할 수 있습니다.\n\n아래에서 그 중 하나를 선택하세요."
 sls.51.desc.head_researcher_phy:0 "§H[sls_swap_leader_name.GetName]§!, 주 [Owner.GetScientist]인 §B물리학 연구§! 분야에서 [sls_swap_leader_name.GetHerHis] §Y연구단§!을 잠금 해제할 수 있습니다.\n\n아래에서 그들 중 하나를 선택하세요."
 sls.51.desc.head_researcher_soc:0 "§H[sls_swap_leader_name.GetName]§!, 주요 [Owner.GetScientist]인 §GSociety Research§! 분야에서 [sls_swap_leader_name.GetHerHis] §YResearch Corps§!를 잠금 해제할 수 있습니다.\n\n아래에서 그 중 하나를 선택하세요."
 sls.51.desc.head_researcher_eng:0 "§H[sls_swap_leader_name.GetName]§!, 주 [Owner.GetScientist]인 §HEngineering Research§! 분야에서 [sls_swap_leader_name.GetHerHis] §YResearch Corps§!를 잠금 해제할 수 있습니다.\n\n아래에서 그 중 하나를 선택하세요."
 sls.51.a:0 "[sls_swap_leader_name.GetHerHim]과 관련된 특별한 전문 분야는 없습니다."
 sls.51.a.tooltip:0 "§H[sls_swap_leader_name.GetName]§!는 일반 §H연구 증대§! 군단을 잠금 해제합니다."
 sls.51.r.tooltip:0 "이 옵션은 연구를 이끌 때 §H[sls_swap_leader_name.GetName]§!에게 추가 기술 옵션을 부여합니다."
 sls_trait_research_industry_tooltip:0 "공학 연구 생산량, 광물 생산, 건물 건설과 관련이 있습니다."
 sls_trait_research_materials_tooltip:0 "선체, 장갑, 선체 또는 장갑에 대한 무기 피해와 관련됨."
 sls_trait_research_propulsion_tooltip:0 "운동 에너지 및 폭발성 무기, 스러스터와 관련됨."
 sls_trait_research_voidcraft_tooltip:0 "선박, 항성 기지 및 가능하다면 메가구조물과 관련이 있습니다."
 sls_trait_research_computing_tooltip:0 "물리학 연구 결과, 무기 정확도 및 추적, 근접 방어, 그리고 스파이 활동과 관련이 있습니다."
 sls_trait_research_field_manipulation_tooltip:0 "에너지 크레딧, 보호막, 보호막에 대한 피해와 관련이 있습니다."
 sls_trait_research_particles_tooltip:0 "에너지 무기, 함선 유지비, 초공간과 관련됨."
 sls_trait_research_biology_tooltip:0 "사회 연구 출력, 식량 생산, 인구 성장, 팝 유지비, 그리고 종 수정과 관련이 있습니다."
 sls_trait_research_military_theory_tooltip:0 "전쟁 피로도, 전투 능력, 이탈 및 청구 비용과 관련이 있습니다."
 sls_trait_research_new_worlds_tooltip:0 "식민지 개발, 테라포밍, 행성 결정 및 이주와 관련됨."
 sls_trait_research_statecraft_tooltip:0 "통합 및 법령 자금과 관련이 있습니다."
 sls_trait_research_archaeostudies_tooltip:0 "$minor_artifacts$와 관련된 일련의 고대기술학 연구입니다."
 sls_trait_research_psionics_tooltip:0 "말로 설명할 수 없는 이국적인 분야와 관련이 있습니다."
 sls_check_scientist_physics_points_tooltip:0 "현재 §H[sls_swap_leader_name.GetName]§!은(는) §Y[sls_swap_leader_name.sls_leader_physics_points]§! 기술 수준(들)을 §B물리학 연구§!에서 보유하고 있습니다."
 sls_check_scientist_society_points_tooltip:0 "현재 §H[sls_swap_leader_name.GetName]§!은(는) §Y[sls_swap_leader_name.sls_leader_society_points]§! 기술 수준(들)을 §G사회학 연구§!에서 보유하고 있습니다."
 sls_check_scientist_engineering_points_tooltip:0 "현재 §H[sls_swap_leader_name.GetName]§!은(는) §Y[sls_swap_leader_name.sls_leader_engineering_points]§! 기술 수준(들)을 §H공학 연구§!에서 보유하고 있습니다."
 sls_eureka:0 "§L유레카 상태: §!"
 sls_trait_eureka.desc:0 "유레카 상태는 장기적인 연구 노력이나 빛의 불꽃이 시간이 지남에 따라 빛을 발하는 순간을 나타냅니다.\n\n§E유레카 상태는 시간이 지남에 따라 발전하며, 다음 요소들에 의해 가속화될 수 있습니다:\n §G+ 전문 분야가 최소 하나 이상 있음\n + 해당 분야에서 높은 연구 기술 수준 보유\n + 긍정적인 연구 특성 보유\n\n§!§R비과학자와 과학자는 §Y연구 책임자§!가 아닐 경우 유레카 상태를 가질 수 없습니다.§!§!"
 sls_trait_eureka.tooltip:0 "§E상태가 §H100%§!에 도달하면 연구 포인트 또는 해당 연구 옵션을 얻습니다.§!\n$sls_trait_eureka_text$"
 sls_trait_eureka_text:0 "§H<리더 재배치가 유레카 상태를 초기화합니다>§!"
 sls_message_eureka_removed:0 "$LEADER|H$의 §H유레카 상태§!가 인원 재할당으로 인해 초기화되었습니다."
