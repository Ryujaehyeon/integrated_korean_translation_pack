l_korean:
 MEM_PRIMITIVE_CIVIL_WAR_INTERVENTION:0 "신의 개입"
 MEM_PRIMITIVE_CIVIL_WAR_INTERVENTION_DESC:0 "우리 함선 중 하나가 패배 직전의 [mem_primitive_civil_war_planet.GetName] 반군에게 필요한 지원을 제공해줄 것입니다. 비록 원주민들은 무슨 일이 벌어지고 있는지 모르겠지만, 위치가 잘 잡힌 궤도 폭격 몇 방은 제국군을 쉽게 물리칠 것입니다."
 mem_primitive_civil_war.2.name:0 "전사의 길"
 mem_primitive_civil_war.2.desc:0 "우리의 관측소가 [mem_primitive_civil_war_planet.GetName] 궤도를 돌고 있으며, 선도하는 [mem_primitive_civil_war_planet_owner.GetAdj] 국가 내에서 진행 중인 내전이 보고되었습니다. 모든 것은 젊고 진보적인 왕위 계승자의 즉위식에서 시작된 것으로 보이며, 그의 많은 개혁은 곧 그의 나라의 문화와 사회에 광범위한 영향을 미쳤습니다.\n\n[mem_primitive_civil_war_planet_owner.species.GetNamePlural]는 여전히 준중세 시대에 살고 있지만, 그들의 기술 발전은 그보다 훨씬 고급입니다. 오직 전통에 대한 엄격한 고수만이 지금까지 많은 혁신의 광범위한 적용을 막아왔습니다. 그러나 이러한 변화는 그의 모든 신하들에 의해 승인되지 않았습니다. 특히, 사회 계급에 관계없이 징집된 신설 제국 군대는 이제 구식이 된 귀족 전사 계급을 깊이 모욕했습니다.\n\n그들의 무의미한 쇠퇴에 직면하여, 많은 이들이 고대의 권리를 방어하기 위해 일어섰습니다. 그러나 그들의 능력과 경험에도 불구하고 성공 가능성은 작습니다. 그들은 전사 코드와 전통에 얽매여 있어 새로운 제국 군대가 사용하는 현대 장비를 사용할 수 없습니다.\n\n칼은 총을 마주합니다."
 mem_primitive_civil_war.2.a:0 "계속해서 관찰하라."
 mem_primitive_civil_war.3.name:0 "운명의 시각에 가까워지다"
 mem_primitive_civil_war.3.desc:0 "[mem_primitive_civil_war_planet.GetName] 위의 관측 직원이 보고하기를, 초기 몇 차례의 성공 이후 반란군은 일련의 주요 패배를 겪어 병력이 감소하고 퇴각할 수밖에 없었다고 합니다. 그들은 마지막 저항을 준비하기 위해 방어 가능한 위치를 차지한 것으로 보입니다. 제국군은 현재 수적 우세에도 불구하고 전술적 불리함을 인식하고 공격을 주저하는 것 같습니다.\n\n어쨌든 반란군이 선택의 여지가 없어진 지금, 제국군의 완전한 승리는 시간 문제일 뿐입니다. 아니면 그럴까요?"
 mem_primitive_civil_war.3.a:0 "그들은 포위되었고 수적 열세에 처했다. 끝났다..."
 mem_primitive_civil_war.3.b:0 "그들을 구할 수 있는 것은 \"기적\"뿐이다..."
 mem_primitive_civil_war.4.name:0 "운명의 시각"
 mem_primitive_civil_war.4.desc:0 "[mem_primitive_civil_war_planet_owner.GetAdj] 반란 지도자는 [mem_primitive_civil_war_planet.GetName]에서 그의 부하들을 최후의 전투를 위해 준비시켰습니다. 그는 황제 자신이 보낸 항복 제안을 받아들이는 수치스러운 일을 하기보다는 영광의 불꽃 속에서 나가기를 원합니다.\n\n그들의 마지막 돌격은 빠르게 발사되는 총기의 교차 사격으로 끝났으며, 이는 [mem_primitive_civil_war_planet_owner.GetAdj] 역사에서 처음으로 도입된 혁신이었습니다. 그것은 최후의 전투가 아니라 일방적인 학살이었습니다.\n\n그럼에도 불구하고 반란이 끝나면서, 오래된 방식의 마지막 남은 강력한 수호자들이 죽고 미래를 위한 길을 열었습니다. 더 밝은 미래가 되기를 바랍니다."
 mem_primitive_civil_war.4.a:0 "새로운 것이 고대의 것과 만날 때, 항상 고대의 방식은 끝이 납니다."
 mem_primitive_civil_war.5.name:0 "제국군에 저항하다"
 mem_primitive_civil_war.5.desc:0 "반란군 지도자가 확실한 죽음으로의 마지막 돌격을 시작하려던 찰나, [root.owner.GetAdj] 무기 공격으로 땅이 흔들렸습니다. 공격은 포위 중인 군대 근처에 떨어졌으며, 원하는 효과를 낼 만큼 가까웠지만 인명 피해를 초래할 정도는 아니었습니다.\n\n제국 군대는 완전히 무너졌고, 반란군은 추가적인 인명 피해 없이 승리했습니다. 신의 가호를 받는 것으로 보이는 군사 지도자의 소식은 빠르게 전국에 퍼져나가, 그의 초기 목적만으로는 얻을 수 없었던 더 많은 지지를 얻게 되었습니다.\n\n자신의 국민들로부터 지지가 줄어드는 상황에 직면한 젊은 황제는 자신의 반대자들과 타협할 수밖에 없었고, 이는 그의 개혁을 철회하고 남아 있는 반란군에 대한 사면으로 이어져 그의 통치를 구하는 결과를 낳았습니다.\n\n현재로서는 [mem_primitive_civil_war_planet_owner.GetAdj] 문명이 중세에 머물러 있는 것 같습니다."
 mem_primitive_civil_war.5.a:0 "신이 그들의 편이다 이 말이지?"
