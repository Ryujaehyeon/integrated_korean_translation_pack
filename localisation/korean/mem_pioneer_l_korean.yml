l_korean:
 mem_pioneer_category:0 "소형 선박 추정"
 mem_pioneer_category_desc:0 "[Root.GetName] 궤도에서 작은 인공 물체의 존재가 감지되었습니다."
 mem_pioneer.1.name:0 "외계 항성 탐사선"
 mem_pioneer.1.desc:0 "[Root.leader.GetName]는 물체의 성공적인 회수를 보고합니다. 조사 결과, 이는 별들 사이를 무인으로 여행하기 위해 설계된 오래된 원시 우주선으로 보입니다. 아마도 수천 년 전에 발사되어 여러 항성계를 서브라이트 속도로 여행하다가 [From.GetName]의 중력에 포착된 것으로 보입니다. \n\n우주선의 선체에는 이상한 기하학적 형태, 식별되지 않은 항성계의 도식, 그리고 우리에게 알려지지 않은 종의 두 명의 나체 구성원을 나타내는 픽토그램이 새겨진 명판이 부착되어 있습니다. 왜 어떤 문명이 이러한 정보를 우주에 퍼뜨릴 필요가 있었는지는 불분명합니다."
 mem_pioneer.1.a:0 "흥미롭군."
 mem_pioneer.1.b:0 "누군가 자신들을 발견해 주기를 간절히 원해서겠지!"
 mem_pioneer.1.c:0 "단체로 지능이 퇴화된 놈들이군."
 mem_pioneer.2.name:0 "화물선"
 mem_pioneer.2.desc:0 "[Root.GetName]에 의해 회수된 작은 우주선은 일종의 외계 상업 화물선인 것으로 밝혀졌습니다.\n\n신원이 확인되지 않은 유기체 둘과 화학 동력원을 사용하는 단순한 신스 하나에 의해 운항하던 이 선박은 귀중품을 운송하다 매복하고 있던 해적들에게 습격받은 것으로 보입니다.\n\n선원들은 공격으로 사망했고, 습격범들이 화물을 탈취해간 후 텅 빈 함선은 떠돌다 별의 중력에 붙잡혔던 것으로 보입니다."
 mem_pioneer.3.name:0 "경군함"
 mem_pioneer.3.desc:0 "[Leader.GetName]의 추정에 따르면, [Root.GetName]에 의해 발견된 함선은 여러 가지 독특하고 미확인된 종들이 승무원으로 탑승한 군사 선박이었습니다. \n\n생존한 데이터뱅크에 따르면, 이 함선은 [From.GetName] 근처에서 매복당했을 때 어떤 종류의 "반란군"에 대한 군사적 승리를 확보하는 데 중요한 귀중한 정보를 운반하고 있었습니다. \n\n시기가 좋지 않은 태양 플레어로 인해 함선 전역에서 화재가 발생하였고, 승무원들은 이를 진압하기 위해 압력을 낮추려 했으나, 그 화재로 인해 공기 잠금 장치 제어와 생명 유지 시스템이 손상된 것을 발견하게 되었습니다. 압력을 다시 높일 수 없게 된 승무원들은 사망하였고, 그들의 함선은 별 주위를 무작정 떠돌게 되었습니다."
 mem_pioneer.4.name:0 "구명선"
 mem_pioneer.4.desc:0 "[Root.GetName]가 회수한 우주선은 외계 어린 생명체의 미라화된 유해를 실은 작은 생명 포드인 것으로 보입니다. \n\n이 포드는 알려지지 않은 행성에서 다른 행성으로 발송된 것으로 보이며, 아마도 어떤 대재앙을 피하기 위해서였고, 탑승자에게 외계 행성에서 살아갈 기회를 주기 위한 것이었을 것입니다. \n\n그러나 포드는 별의 중력에 잡혀 그 이후로 계속 공전하고 있으며, 생명 유지 시스템은 결국 고장났습니다. \n\n[Leader.GetName]는 탑승자의 비정상적인 유전 구성을 주목했습니다. 만약 그것이 생존하고 성장했다면, 우리 과학자들이 알고 있는 가장 강력하고 회복력 있는 유기체 중 하나가 되었을 가능성이 있습니다. 심지어 어떤 종류의 증강 없이도 말입니다."
 mem_pioneer.4.a:0 "걱정거리가 하나 줄었군."
 mem_pioneer.5.name:0 "개인용 함선"
 mem_pioneer.5.desc:0 "[Leader.GetName]는 [From.GetName]의 궤도에서 [Leader.GetSheHe]가 회수한 것이 무엇인지 확실하지 않지만, 매우 내구성 있는 물자로 만들어진 밀봉된 자가 추진 원뿔형 캡슐의 일종인 것 같습니다. \n\n기타 특이한 요소로는 전방을 향한 줄기 위에 있는 단일 광학 센서, 전방을 향한 단일 총기, 그리고 일종의 조작기가 포함됩니다. 내부에는 어떤 종류의 소형 다리 가진 존재를 위한 작은 조종사 구역이 들어 있었던 것으로 보입니다. \n\n과거의 어느 시점에서, 이 캡슐은 공격을 받았고, 강력한 폭발이 센서를 강타했습니다. 충격은 조종사에게 치명적이었고, 조종사는 즉시 사망했습니다."
 mem_pioneer.5.a:0 "그게 뭐였든, 이젠 죽었다."
 mem_pioneer.99.name:0 "실패"
 mem_pioneer.99.desc:0 "[Root.leader.GetName]는 [Leader.GetSheHe] [Leader.GetWasWere] 물체를 찾고 회수할 수 없었다고 알려드립니다. 그것이 무엇이든, 이제 영원히 잃어버린 것일 가능성이 높습니다."
