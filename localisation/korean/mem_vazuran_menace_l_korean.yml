 zone_mem_vazuran_spare_parts_secondary_ancestors:0 "군사 장비 창고"
 zone_mem_vazuran_spare_parts_secondary_ancestors_desc:0 "$zone_mem_vazuran_spare_parts_secondary_desc$"
 zone_mem_vazuran_support_ancestors:0 "룬의 전당"
 zone_mem_vazuran_support_ancestors_desc:0 "부속 역할을 위한 전용 소규모 작업장, 유물 단조소를 위한 것입니다."
 zone_mem_vazuran_workforce_tt:0 "§Y$foundry_type_plural_with_icon$§! 직업에 따라 변동합니다."
