 mem_vazuran_fallen_empires_situation_monthly_change_tooltip:0 "$mem_vazuran_fallen_empires_situation$"
 mem_vazuran_fallen_empires_situation_desc:0 "$mem_vazuran_fallen_empires_situation$"
 MEM_VAZUR_HOSTILE_GREETING_1:0 "이것이 또 다른 간청이나 위협이라면, 끝으로 건너뛰십시오. 우리는 이미 그 결말을 알고 있습니다."
 MEM_VAZUR_HOSTILE_GREETING_2:0 "빠르게 말해라. 우리는 하위 세력에 대한 인내심이 미세하다."
 MEM_VAZUR_NEUTRAL_GREETING_1:0 "대화하러 오셨다면, 이야기하세요. 우리는 모든 주기가 있는 것은 아닙니다."
 MEM_VAZUR_FRIENDLY_GREETING_1:0 "우리는 귀하의 제안을 들을 준비가 되어 있습니다. 감명을 주신다면, 호의를 얻을 수 있을 것입니다."
 MEM_VAZUR_FRIENDLY_GREETING_2:0 "우리는 듣고 있습니다. 걱정하지 마세요, 중요한 부분은 우리가 처리하겠습니다."
 MEM_VAZUR_WAR_GREETING_1:0 "준비하세요. 우리는 이 과정을 즐길 생각입니다."
 MEM_VAZUR_WAR_GREETING_2:0 "우리가 필요할 운동을 위해 당신이 가진 모든 것을 가져왔기를 바랍니다."
 MEM_VAZUR_OVERLORD_GREETING_1:0 "이것을 간단하게 유지해 주세요. 우리는 많은 것을 기대하지 않지만, 놀라움을 주세요."
 MEM_VAZUR_PEACE_ACCEPT:0 "우리는 당신의 제안을 수락하겠습니다. 이것은 드문 자비의 행위로 간주하십시오."
 MEM_VAZUR_PEACE_REFUSE:0 "우리는 거절합니다. 당신은 아직 충분히 낮은 곳까지 기어가지 않았습니다."
 MEM_VAZUR_INSULT_PROPOSE_1:0 "당신의 제국 전체가 성과 부족의 사례 연구입니다."
 MEM_VAZUR_INSULT_PROPOSE_2:0 "무지함이 힘이라면, 당신은 실제로 중요할 수 있습니다."
 MEM_VAZUR_INSULT_ACCEPT_FE:0 "당신은 경쟁조차 되지 않습니다. 당신은 방해일 뿐입니다."
 council_agenda_agenda_mem_vazurans_march_of_progress_name:0 "진보의 행진"
 council_agenda_agenda_mem_vazurans_march_of_progress_desc:0 "젠트로늄 연구는 차세대 함대 물자입니다. 신속한 조치가 필요합니다."
 tradition_mem_vazurans:0 "튼튼함"
 tradition_mem_vazurans_desc:0 "완벽한 무기를 위해, 우리는 먼저 가장 강력한 합금을 필요로 하고 강인한 정신이 필요합니다."
 tr_mem_vazurans_adopt:0 "젠트로늄 시대"
 tr_mem_vazurans_1:0 "조밀한 구조물"
 tr_mem_vazurans_2:0 "작업 할당량"
 tr_mem_vazurans_3:0 "젠트로늄 탄약"
 tr_mem_vazurans_4:0 "노동 부족"
 tr_mem_vazurans_4_swap:0 "일할 권리"
 tr_mem_vazurans_5:0 "견고한 연구"
 tr_mem_vazurans_1_desc:0 "재료의 안정성과 무결성에 대한 집중이 가장 중요합니다."
 tr_mem_vazurans_2_desc:0 "동기 부여된 노동자는 성공적인 산업의 핵심입니다."
 tr_mem_vazurans_3_desc:0 "초밀집 Xentronium 기반 탄약이 우리의 포탄 관통력을 증가시킵니다."
 tr_mem_vazurans_4_desc:0 "우리의 대장간뿐만 아니라, 우리의 노동력도 지속적인 연료 공급이 필요합니다. 훨씬 더 많은 연료가 필요합니다."
 tr_mem_vazurans_4_swap_desc:0 "모두는 일할 권리와 책임이 있습니다."
 tr_mem_vazurans_5_desc:0 "두뇌와 근육."
 tr_mem_vazurans_finish:0 "위조"
