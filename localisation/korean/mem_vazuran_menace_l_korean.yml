 concept_mem_vazuran_zones_forge_world_desc:0 "- $zone_mem_vazuran_alloys$\n- $zone_mem_vazuran_research_engineering$\n- $zone_mem_vazuran_trains_secondary$\n- $zone_mem_vazuran_spare_parts_secondary$"
 zone_mem_vazuran_alloys:0 "젠트로늄 용접 배열"
 zone_mem_vazuran_alloys_desc:0 "이 배열의 광활함 속에는 천 개의 거대한 용광로가 타오르며, 행성의 생명선인 금속을 제련합니다. 이 구역은 연기와 소음으로 가득 찬 거대한 살아있는 작업장으로, 내부의 불꽃에 의해 밝게 비추어지고 거대한 크기와 힘을 가진 기계들에 의해 움직입니다."
 zone_mem_vazuran_research_engineering:0 "젠트로늄 연구소"
 zone_mem_vazuran_research_engineering_desc:0 "중앙 집중식 연구 구역으로, 이 행성의 용접공들과 직접 연결되어 있습니다. 그들은 함께 Xentronium 생성 과정에서 모든 방법을 정제합니다."
 zone_mem_vazuran_trains_secondary:0 "신속 물류 넥서스"
 zone_mem_vazuran_trains_secondary_desc:0 "상호 연결된 철도망이 필요한 곳에 필수 자재를 번개처럼 빠르게 운송합니다."
 zone_mem_vazuran_spare_parts_secondary:0 "군사 예비 부품 조립체"
 zone_mem_vazuran_spare_parts_secondary_desc:0 "해군에서 사용하는 예비 부품을 제작하기 위한 소형 조립 라인입니다. 전시에는 미리 조립된 장치를 쉽게 교체할 수 있습니다."
 zone_mem_vazuran_alloys_ancestors:0 "젠트로늄 작업장"
 zone_mem_vazuran_alloys_ancestors_desc:0 "$zone_mem_vazuran_alloys_desc$"
 zone_mem_vazuran_research_engineering_ancestors:0 "젠트로늄 아카이브"
