 mod_damage_vs_country_type_mem_vazurans_mult:0 "바주란에 대한 피해량"
 mem_vazurans_damper_field_exploit:0 "완충막 이해"
 mem_vazurans_damper_field_exploit_desc:0 "그 능력과 한계점들을 이해함으로 우린 우리 무기들이 완충막의 약점을 노리도록 개조했습니다."
 mem_vazurans_defender_of_galaxy:0 "우주에서 사건이 많은 은하의 수호자"
 mem_vazurans_raided:0 "바주란 함대의 목표가 됨"
 mem_vazurans_raided_desc:0 "이 행성은 바주란의 잔혹한 공격으로 황폐해지었습니다. 회복되려면 꽤 오랜 시간이 걸릴 것입니다."
 mem_vazurans_stance_bunker_down:0 "고향 방어"
 mem_vazurans_stance_provoke:0 "도발된 바주란스"
 mem_vazurans_stance_provoke_tt:0 "§R습격 확률 증가§!"
 mem_vazurans_stance_tribute:0 "배상금 지급"
 mem_vazurans_stance_tribute_tt:0 "§G약탈이 발생하지 않습니다§!"
 mem_vazurans_forge_planet:0 "제작 행성"
 mem_vazurans_forge_planet_tt:0 "['concept_mem_vazuran_zones_forge_world']을(를) 잠금 해제합니다."
 mem_vazurans_forge_planet_desc:0 "특수화된 행성을 위한 기초입니다. 이 행성은 군용 등급 합금을 생산하는 대규모 주조소를 보유하고 있습니다. 추가적인 지원 인프라가 용광로를 계속 가동합니다."
 mem_vazurans_raided_system:0 "약탈당한 시스템"
 mem_vazurans_raided_planet:0 "약탈당한 행성"
 d_mem_vazuran_bomb_crater:0 "$d_bomb_crater$"
 d_mem_vazuran_bomb_crater_desc:0 "$d_bomb_crater_desc$"
 d_mem_vazuran_ruined_section:0 "폐허가 된 구역"
 d_mem_vazuran_ruined_section_desc:0 "이 거주지 구역은 여러 발의 폭격으로 파괴되었습니다. 거주 가능한 지역으로 만들려면 대대적인 수리와 청소가 필요합니다."
 mem_ended_vazuran_menace:0 "바주란의 위협을 끝냄"
 mem_vazuran_opinion_immitators:0 "기술 도둑"
 mem_vazuran_gateway:0 "안정화된 균열"
 mem_vazuran_gateway_DESC:0 "이 성계와 균열 연결체를 잇는 복구된 균열."
 mem_vazuran_gateway_MEGASTRUCTURE_DETAILS:0 ""
 mem_vazuran_gateway_CONSTRUCTION_INFO_DELAYED:0 ""
 mem_vazuran_gateway_nexus:0 "균열 연결체"
 mem_vazuran_gateway_nexus_DESC:0 "차원 균열을 통해 순식간에 이동할 수 있게 해주는 연결체."
 mem_vazuran_gateway_nexus_MEGASTRUCTURE_DETAILS:0 ""
 mem_vazuran_gateway_nexus_CONSTRUCTION_INFO_DELAYED:0 ""
 mem_vazuran_gateway_endpoint:0 "균열 종점"
 mem_vazuran_gateway_endpoint_DESC:0 "차원 균열을 안정화하기 위해 해당 위치에 설치된 시설로, 균열이 연결된 항성계로의 즉각적인 이동 수단으로 지속적으로 사용할 수 있습니다."
 mem_vazuran_gateway_endpoint_MEGASTRUCTURE_DETAILS:0 ""
 mem_vazuran_gateway_endpoint_CONSTRUCTION_INFO_DELAYED:0 ""
 mem_vazuran_gateway_endpoint_ruined:0 "폐허가 된 균열 종점"
 mem_vazuran_gateway_endpoint_ruined_DESC:0 "이 파괴된 시설은 복구될 경우, 해당 위치의 차원 균열을 안정화하는 데 사용될 수 있으며, 균열이 연결된 항성계로의 즉각적인 이동 수단으로 지속적으로 활용될 수 있습니다."
 mem_vazuran_gateway_endpoint_ruined_MEGASTRUCTURE_DETAILS:0 ""
 mem_vazuran_gateway_endpoint_ruined_CONSTRUCTION_INFO_DELAYED:0 ""
 mem_vazuran_habitat_ruined:0 "폐허가 된 선구자 거주지"
 mem_vazuran_habitat_ruined_DESC:0 "파괴된 선조 거주지. 수천 년 전 약탈자들에 의해 내부가 완전히 비워졌지만, 이 거대 구조물의 주요 외형은 여전히 대부분 온전합니다. 적절한 기술과 많은 자원이 있다면, 복원할 수 있을 것입니다."
 mem_vazuran_habitat_ruined_MEGASTRUCTURE_DETAILS:0 ""
 mem_vazuran_habitat:0 "선구자 거주지"
 mem_vazuran_habitat_DESC:0 "도시화한 행성 조건을 가진 선구자 아콜로지. 수경 재배 농장과 발전된 필터 기술을 통해 자급자족이 가능한 구조며 정거장 내의 시설들로 행성의 내부에서 광물을 채취할 수 있습니다."
 GATEWAY_VAZURAN:0 "차원 균열"
 GATEWAY_VAZURAN_DESC:0 "두 공간 사이의 이동이 가능하도록 인위적으로 만들어진 균열."
 mem_vazurans.4.name:0 "아공간 균열의 생성"
 mem_vazurans.4a.desc:0 "지역 센서 스테이션에서 [from.GetName] 시스템에서 거대한 에너지 급증이 보고되었습니다. 초기 보고서에 따르면 그 출처는 우주 속의 균열 - 현실 자체의 구멍으로 묘사됩니다.\n\n시스템 방어가 경계 태세에 있으며, 지역 당국은 우리의 해군 힘으로부터 즉각적인 지원을 요청합니다."
 mem_vazurans.4a.desc.gestalt:0 "우리의 지역 센서 기지에서 [from.GetName] 항성계의 엄청난 에너지 급증을 감지했습니다. 우리는 우주에서의 균열, 즉 현실 자체의 구멍으로 보이는 것을 조사하기 위해 드론을 파견했습니다.\n\n시스템 방어가 높은 경계 상태입니다. 시스템을 담당하는 서브루틴을 강화하기 위해 우리의 함대를 보내는 예방 조치를 취해야 합니다."
 mem_vazurans.4b.desc:0 "지역 센서 스테이션에서 [from.GetName] 항성계에서 거대한 에너지 급증이 보고되었습니다. 첫 보고서에서는 그 출처를 공간의 균열 - 현실 자체의 구멍으로 설명하고 있습니다.\n\n우리의 가장 지혜로운 룬세공사들이 경고의 종을 울렸습니다. 그들은 위대한 적이 돌아왔다는 소식을 전하고 있습니다. 우리의 해군은 서둘러야 합니다. 만약 장로들이 맞다면, 해결해야 할 고대의 원한이 있습니다..."
 mem_vazurans.4b.desc.gestalt:0 "우리의 지역 센서 기지에서 [from.GetName] 성계의 거대한 에너지 급증을 감지했습니다. 우리는 우주에 존재하는 균열 - 현실 자체의 구멍으로 보이는 것을 조사하기 위해 드론을 파견했습니다.\n\n우리는 고대의 시절에서 이러한 신호를 기억합니다. 하나의 생각이 우리를 가득 채웁니다: 복수. 우리의 해군은 서둘러야 합니다. 우리의 기억 조각이 신뢰할 수 있다면, 우리는 과거의 구축함들과 마주하게 될 것입니다."
 mem_vazurans.4d.desc:0 "[from.GetName] 성계의 센서 기지에서 새로운 초공간 균열이 형성되고 있다고 보고했습니다. 우리의 함대는 이미 경계 태세를 갖추었습니다. 최악의 상황에 대비해야 합니다."
 mem_vazurans.4c.desc:0 "[from.GetName] 항성계의 센서 기지에서 거대한 초공간 균열이 형성되고 있다고 보고했습니다. 그 크기로 보아 강력한 폭풍이 다가오고 있습니다. 최악의 상황에 대비해야 합니다."
 mem_vazurans.4.a:0 "이 이상현상 조사를 시작하라."
 mem_vazurans.4.b:0 "함대를 준비시켜."
 mem_vazurans.4.d:0 "그 수염들로, 그들이 돌아왔습니다!"
 mem_vazurans.4.c:0 "약해져서는 안된다."
 mem_vazurans.4.c.tt:0 "§L추가적인 습격은 사건이 아닌 알림으로 표시됩니다§!"
 MEM_VAZURANS_RIFT_INVESTIGATION:0 "아공간 균열 조사"
 MEM_VAZURANS_RIFT_INVESTIGATION_DESC:0 "우리 과학자들은 이 시공간의 균열이 어떻게 형성되었는지 여전히 혼란스러워하고 있습니다. 우리는 답을 찾아야 합니다."
 mem_vazurans.5.name:0 "공격의 시작"
 mem_vazurans.5a.desc:0 "균열에서 차원 문의 종류로 보이는 무언가가 생성되었습니다. 전에 보지 못한 설계를 지닌 함선들이 차원 문에서 쏟아져 나옵니다. 이들이 우리에게 신호를 보내고 있습니다."
 mem_vazurans.5b.desc:0 "차원문이 열렸고 이어 나타난 적대적 함대가 우리 식민지로 향하고 있는 것이 확인되었습니다. 또 다른 습격 함대인 것으로 보입니다."
 mem_vazurans.5c.desc:0 "거대한 차원문이 열리고 엄청난 규모의 함대가 나타났습니다. 우리 본성으로 향하고 있습니다!"
 mem_vazurans.5.a:0 "연결해."
 mem_vazurans.5.b:0 "식민지를 지켜라."
 mem_vazurans.5.c:0 "무슨 수를 쓰더라도 [root.Capital.GetName]을(를) 지켜내야만 한다!"
 mem_vazurans.6.name:0 "메시지 수신"
 mem_vazurans.6a.desc:0 "우리는 바주란이다. 아주 오래전, 너희 조상들이 하찮은 동굴 속에서 살고 있을 때조차 이 은하는 우리의 것이었다...\n\n우리에게 복종하지 아니하면 이전에 있었던 자들과 같은 운명을 마주하게 될 것이다.\n\n너희가 존재할 수 있는 이유는 우리가 너희의 존재를 용납하기 때문인 것을 깨달아라...\n\n그리고 저항할 생각은 절대 하지마라... 우리가 원하면 끝을 보게 될 것이니."
 mem_vazurans.6b.desc:0 "당신의 종족은 예상보다 회복력이 강합니다...\n\n우리는 바주란입니다. 우리는 당신의 조상들이 비참한 동굴을 떠나기 훨씬 이전에 이 은하를 우리의 것으로 만들었습니다...\n\n당신은 우리에게 복종하거나, 이전에 당신과 같은 운명을 공유하게 될 것입니다. 우리는 한 번 당신의 세계를 불태웠고, 다시 그렇게 할 수 있습니다.\n\n당신이 존재하는 것은 단지 우리가 허락하기 때문임을 알아두십시오...\n\n그리고 만약 당신이 저항할 용기를 낸다면, 당신은 우리가 요구하는 대로 끝날 것입니다."
 mem_vazurans.6.a:0 "넌 누구지?"
 mem_vazurans.6.a.response:0 "너희의 주인... 더 알 필요는 없다..."
 mem_vazurans.6.b:0 "거, 서로 평화롭게 공존하는 방법은 없는거요!?"
 mem_vazurans.6.b.response:0 "존재하지... 우리가 다스리고, 너희가 복종하고..."
 mem_vazurans.6.c:0 "우리는 두렵지 않다, 외계종..."
 mem_vazurans.6.c.response:0 "때가 되면... 두려워 할 것이다..."
 mem_vazurans.6.d:0 "너는 우리가 기억하는 것처럼 못생겼구나, 벌레 얼굴."
 mem_vazurans.6.d.response:0 "우리를 두려워할 것입니다...."
 mem_vazurans.6.e:0 "우리는 당신의 친절을 기억합니다..."
 mem_vazurans.6.e.response:0 "우리는 다시 한 번 당신을 두렵게 할 것입니다...."
 mem_vazurans.7.name:0 "메시지 수신"
 mem_vazurans.7a.desc:0 "너희의 저항이 계속 우리를 귀찮게 했다. 너희의 이 행동에 관한 결과를 보여주기 위해 강력한 함대를 보냈다."
 mem_vazurans.7b.desc:0 "우리의 기술을 가지고 장난치면 모를 것으로 생각했나? 너희들은 이제 이 모독의 대가를 치르게 될 것이다."
 mem_vazurans.7.a:0 "통신을 종료해라."
 mem_vazurans.8.name:0 "식민지 상실"
 mem_vazurans.8.desc:0 "이번에는 바주란 함대가 자원을 약탈하는 것으로 만족하지 못했던 것으로 보입니다. 식민지 하나가 아예 파괴되었고, 우리는 이 악행에 아무런 대응도 하지 못했습니다."
 mem_vazurans.8.a:0 "멈출 방법이 분명 존재할거야!"
 mem_vazurans.8.b:0 "국민을 지켜야만 한다... 어떻게 지킬지는 모르겠다!"
 mem_vazurans.9.name:0 "공격당한 식민지"
 mem_vazurans.9.desc.a:0 "우리의 식민지인 [mem_vazurans_raid_planet_name.GetName]가 바주란 약탈 함대의 공격을 받았습니다. 수많은 시민들이 이 무모한 공격으로 목숨을 잃었고, 행성 방어가 파괴되었습니다.\n\n이 끔찍한 결과에도 불구하고, 행성 방어 덕분에 인명 피해와 피해 규모는 훨씬 더 커졌을 것입니다."
 mem_vazurans.9.desc.b:0 "우리의 식민지인 [mem_vazurans_raid_planet_name.GetName]가 바주란 약탈 함대의 공격을 받았습니다. 수많은 시민들이 이 무모한 공격으로 목숨을 잃었고, 행성의 인프라가 파괴되었습니다."
 mem_vazurans.9.a:0 "우리는 견뎌낼 것이다!"
 mem_vazurans.9.b:0 "방어 체계를 강화시켜라!"
 mem_vazurans.9.c:0 "국민을 지켜야 하지만... 대체 어떻게?!"
 MEM_VAZURANS_DEFENSE_PLAN:0 "방어 강화"
 MEM_VAZURANS_DEFENSE_PLAN_DESC:0 "우리 식민지가 공격받은 이후, 이것을 교훈으로 삼아 바주란의 위협으로부터 우리 사람들을 지키기 위해 새로운 방어 체계를 개발해내기 위한 계획이 개시되었습니다."
 mem_vazurans.21.name:0 "어수선한 은하"
 mem_vazurans.21a.desc:0 "무역상들로부터 얻은 소식에 의하면 많은 제국이 알 수 없는 세력에게 공격받고 있다고 합니다. 또한 공격자가 매우 잘 무장한 상태라고 합니다."
 mem_vazurans.21b.desc:0 "초공간 통신 채널이 다시 한 번 바주란의 습격에 대한 보고로 넘쳐나고 있습니다."
 mem_vazurans.30.name:0 "바주란 본토 함대가 패배함!"
 mem_vazurans.30a.desc:0 "[mem_vazuran_victor.GetAdj] 함대에 결정적인 패배를 당한 바주란에 대한 보고가 우리에게 도달했습니다. 이들의 함대가 격퇴되면서 온 은하가 바주란의 공포에서 벗어났다는 사실에 기뻐하고 있습니다."
 mem_vazurans.31.name:0 "바주란 본성의 함락"
 mem_vazurans.31a.desc:0 "함대가 없는 바주란의 본성을 점령하는 것은 식은 죽 먹기였습니다. [mem_vazuran_invader.GetAdj] 군대가 이 성공적이었던 작전을 기념하였고, 이는 오랫동안 이어졌던 바주란의 위협에서 벗어난 은하가 새로운 시대에 접어들었다는 것을 의미합니다."
 mem_vazurans_31.a:0 "드디어!"
 mem_vazurans.40.name:0 "차원문"
 mem_vazurans.40.desc:0 "우리의 첫 번째 Vazurans와의 조우 직전에 균열로 보낸 탐사선의 원거리 측정 데이터가 시사하듯이, 이는 자연적으로 발생하는 웜홀과 크게 다르지 않은 포털이었습니다. 그러나 웜홀과는 달리, 이 균열은 인위적으로 생성된 것으로 보입니다. 우리의 [root.GetScientistResearchSubroutinePlural]는 이것이 어떻게 이루어졌는지에 대한 설명을 제공할 수 없었습니다.\n\n더 잘 알기 전까지는 이러한 포털이 어디에서나 열릴 수 있다고 가정해야 합니다. 우리는 경계를 늦추지 말아야 합니다."
 mem_vazurans.40.a:0 "매우 불안해지는군."
 mem_vazurans.50.name:0 "전투는 끝났다"
 mem_vazurans.50a.desc:0 "우리 함대는 [root.capital_scope.GetName]에 대한 치열한 전투에서 승리했습니다. 남은 바주란 세력은 전면 후퇴 중입니다. 우리 함대의 피해는 아직 평가 중이며, 많은 함선이 심각한 피해를 입었거나 심지어 포기해야 했습니다. 하지만 우리가 치른 대가는 그만한 가치가 있었습니다. 그들은 다시는 이런 시도를 하기 전에 두 번 생각할 것입니다.\n\n그들이 우리 시스템에 들어오기 위해 사용한 균열은 이미 닫히기 시작했습니다. 그러나 이번에는 이전의 조우보다 훨씬 더 느리게 진행되고 있습니다. 우리의 [root.GetScientistResearchSubroutinePlural]는 이 과도하게 큰 포털이 결코 완전히 사라지지 않을 수도 있다고 이론화하고 있습니다. 이는 우려스러운 사실이지만 동시에 우리가 이전에는 예상하지 못했던 기회를 열어줍니다. 만약 우리가 이를 안정화할 수 있다면, 바주란 작전 기지에 대한 반격이 가능해질 것입니다."
 mem_vazurans.50b.desc:0 "우리 함대는 공격하는 바주란 세력을 저지하는 데 실패했습니다. 그들은 우리의 수도 행성을 폭격하고 황폐화했습니다. 도시 인구 중심을 특히 겨냥했기 때문에 사상자는 수십억에 이릅니다. 파괴된 것을 복구하는 데는 수년이 걸릴 것입니다.\n\n그들이 우리 시스템에 들어오기 위해 사용한 균열은 이미 닫히기 시작했습니다. 그러나 이번에는 이전의 조우보다 훨씬 더 느리게 진행되고 있습니다. 우리의 과학자들은 이 거대한 포털이 완전히 사라지지 않을 수도 있다는 이론을 세우고 있습니다. 이는 우려스러운 사실이지만 동시에 우리가 예상하지 못했던 기회를 열어줍니다. 만약 우리가 이를 안정화할 수 있다면, 바주란 작전 기지에 대한 반격이 가능해져 우리의 죽음에 대한 보복을 확보할 수 있을 것입니다."
 mem_vazurans.50b.desc.gestalt:0 "우리 함대는 공격하는 바주란 세력을 저지하는 데 실패했습니다. 그들은 우리의 수도 행성을 폭격하고 황폐화시키고 있습니다. 행성 인프라의 주요 요소들이 상당한 피해를 입었고, 수십억의 드론이 주요 전략적 중요성이 있는 장소를 목표로 하면서 파괴되었습니다. 파괴된 것을 복구하는 데는 수년이 걸릴 것입니다.\n\n그들이 우리 시스템에 들어오기 위해 사용한 균열은 이미 닫히기 시작했습니다. 그러나 이번에는 이전의 조우보다 훨씬 더 느리게 진행되고 있습니다. 우리의 [root.GetScientistResearchSubroutine]는 이 거대한 포털이 완전히 사라지지 않을 수도 있다고 이론화하고 있습니다. 이는 우려스러운 사실이지만 동시에 우리가 이전에는 예상하지 못했던 기회를 열어줍니다. 만약 우리가 이를 안정화할 수 있다면, 바주란 작전 기지에 대한 반격이 가능해져 우리의 죽음에 대한 보복을 확보할 수 있을 것입니다."
 mem_vazurans.50.a:0 "그리 되기를 바라자."
 mem_vazurans.51.name:0 "관문 수호자"
 mem_vazurans.51.desc:0 "균열의 이해와 기반 기술의 연구가 완료되었으니 [root.GetScientistResearchSubroutinePlural]들은 기존 균열 근처에 정거장의 건설을 제안했습니다. 계획에 의하면 이 정거장은 균열을 다시 열고 유지하는 데에 필요한 에너지를 공급할 것입니다."
 mem_vazurans.51.a:0 "그리하라."
 MEM_VAZURANS_RIFT_STABILIZATION:0 "균열 안정화"
 MEM_VAZURANS_RIFT_STABILIZATION_DESC:0 "우린 바주란 본진으로의 침공로를 만들고 유지하는 데에 필요한 장비를 준비해야 합니다."
 mem_vazurans.53.name:0 "차원문"
 mem_vazurans.53.desc:0 "우리 공학자들이 균열 기지에서 작업을 마쳤습니다. 안정화 절차가 시작되었고, 영원처럼 느껴진 후에 새로운 균열이 천천히 다시 열리며 새로운 포털이 형성되었습니다. 우리가 보낸 탐사선들이 확인한 바에 따르면, 우리는 반대편과 강인한 연결을 달성했습니다. 이제 우리는 유인 원정대를 보낼 만큼 충분히 자신감을 얻었습니다."
 mem_vazurans.53.desc.gestalt:0 "우리의 공학 드론이 균열 기지에서 작업을 마쳤습니다. 안정화 절차가 시작되었고, 영원처럼 느껴진 후에 새로운 균열이 천천히 다시 열리며 새로운 포털이 형성되었습니다. 우리가 보낸 탐사선이 반대편과 강인한 연결을 확인했으므로, 이제 우리는 유인 원정대를 보낼 만큼 충분히 자신감이 생겼습니다."
 mem_vazurans.53.a:0 "잘했다."
 mem_vazurans.60.name:0 "고대의 시설"
 mem_vazurans.60.a.desc:0 "어떤 고대 시설이 [mem_vazuran_gateway_endpoint_system.GetName] 항성계의 가장자리에 위치해 있습니다. 여기에서 시공간의 구조에 균열이 형성되어 "§H웜홀§!"이 만들어졌으며, 우리의 [Root.Owner.GetScientistPlural]는 이것이 초공간을 통해 우리 은하의 다른 웜홀로 이어지는 통로를 제공할 수 있다고 추측합니다. 그 주변의 구조물은 이 인공 균열을 안정화하고 격리하는 기능을 하는 것으로 보입니다.\n\n현상에 보내진 탐사선은 우리의 기술과 내부 환경 간의 불일치를 드러냈습니다. 그들 중 어느 것도 통과하지 못했으며, 초광속 드라이브와 원자로 고장을 겪어 파괴되었습니다. 이러한 균열을 통한 여행을 시도하기 전에 우리는 이러한 부정적인 영향을 상쇄하기 위해 우리의 함선 시스템을 수정해야 할 것입니다."
 mem_vazurans.60.b.desc:0 "또 다른 고대 시설이 [mem_vazuran_gateway_endpoint_system.GetName] 항성계의 가장자리에 위치해 있습니다. 이번에는 온전한 버전을 발견했습니다. 이전 위치에서의 관찰을 바탕으로 예상했던 대로, 여기서 시공간의 구조에 균열이 형성되어 "§H웜홀§!"이 생성되었습니다. 우리의 [Root.Owner.GetScientistPlural]는 이것이 초공간을 통해 우리 은하의 다른 곳에 위치한 또 다른 웜홀로 이어지는 통로를 제공할 수 있다고 추측합니다. 그 주위의 구조물은 이 인공 균열을 안정화하는 수단이자 격리 기능을 하는 것으로 보입니다.\n\n현상에 보내진 탐사선은 우리의 기술과 내부 환경 간의 불일치를 드러냈습니다. 그 중 어느 것도 통과하지 못했으며, 초광속 드라이브와 원자로 고장을 겪어 파괴되었습니다. 이러한 균열을 통한 여행을 시도하기 전에 우리는 이러한 부정적인 영향을 상쇄하기 위해 우리의 함선 하위 시스템을 수정해야 할 것입니다."
 mem_vazurans.60.a:0 "먼저 개조해야겠군."
 mem_vazurans.61.name:0 "폐허가 된 시설"
 mem_vazurans.61.a.desc:0 "어떤 고대 시설이 [mem_vazuran_gateway_endpoint_system.GetName] 시스템의 가장자리에 위치해 있습니다. 그 폐허 상태는 그것을 만든 존재가 우리가 훨씬 고급이었다는 사실을 숨기지 않습니다. 초기 스캔에서 시설 중앙에 이상 현상이 발견되었습니다. 우리의 [Root.Owner.GetScientistPlural]는 이것이 훨씬 더 큰 현상의 잔재라고 판단합니다. 만약 그들의 이론이 맞다면, 이 구조물의 목적은 이상 현상을 안정화하고 어떤 형태의 포털을 형성하는 것입니다. 현재로서는 그것이 어디로 이어질지 추측할 수밖에 없습니다.\n\n이 기술을 스스로 재현할 수 있을 것이라는 희망은 그리 크지 않지만, 충분한 시간이 주어진다면 이 시설을 작동 상태로 복원할 수 있을지도 모릅니다."
 mem_vazurans.61.b.desc:0 "또 다른 고대 시설이 [mem_vazuran_gateway_endpoint_system.GetName] 항성계의 가장자리에 위치해 있습니다. 이번에는 적막한 상태에서 발견되었습니다. 이 구조물이 포함하고 있는 균열은 거의 스스로 무너져 내릴 지경입니다. 광범위한 피해에도 불구하고, 이 시설을 만든 존재가 우리가 현재보다 훨씬 고급이었다는 사실에는 의심의 여지가 없습니다. 이 시설은 또한 우리의 [Root.Owner.GetScientistPlural]의 주장을 올바르게 증명합니다. 이 구조물의 목적은 실제로 균열을 안정화하고 유지하는 것입니다.\n\n우리가 이 기술을 스스로 재현할 수 있을 것이라는 희망은 그리 크지 않지만, 충분한 시간이 주어진다면 이 시설을 작동 가능한 상태로 복원할 수 있을지도 모릅니다."
 mem_vazurans.61.a:0 "어찌저찌 복구할 수만 있다면..."
 mem_vazurans.62.name:0 "완전한 파괴"
 mem_vazurans.62.desc:0 "이 시스템은 폐허로 남아 있습니다. 잔해 필드가 한때 강력했던 기지의 부서진 껍질을 둘러싸고 있습니다. 두 번째 행성의 잔해 근처에 있는 부서진 거대한 구조물은 그 건설자들의 과거 위대함에 대한 기념물처럼 풍경을 지배하고 있습니다. 여기에서 발견된 잔해는 균열 설치물의 스타일과 물자 구성과 일치하여 그 건설자들이 동일한 존재였음을 시사합니다.\n\n그들의 문명에 대해 더 이상 밝혀낼 수 있는 것은 많지 않습니다. 공허 속에서 떠다니는 버려진 기지와 선박은 오래전에 약탈당하고 귀중한 기술이 모두 제거된 것처럼 보이며, 남아 있는 데이터 코어는 그들의 창조자에 대한 정보를 제거하기 위해 의도적으로 지워진 것 같습니다 - 우리는 그들이 누구인지 추론할 수 없습니다.\n\n이 시스템의 균열 설치물은 은하 본체에 있는 것들과는 상당히 다릅니다. 균열을 둘러싼 추가 구조물이 있으며 - 더 정확히 말하자면, 여러 개의 균열이 동시에 포함되어 있어 여러 종착점에 연결된 넥서스처럼 기능하고 있습니다. 이 시스템을 점령함으로써 얻는 전략적 가능성은 과장할 수 없습니다. 우리의 계획을 지원하기 위해서든 적에게 이를 차단하기 위해서든, [owner.GetName]를 위해 이 장소를 확보하는 것은 높은 우선순위를 가져야 합니다."
 mem_vazurans.62.a:0 "우리는 이 성계를 차지할 것이다."
 mem_vazurans.63.name:0 "복구된 균열 종점"
 mem_vazurans.63.a.desc:0 "[mem_vazuran_rift_system.GetName] 시스템의 균열 종점이 복원되었습니다. 이 기술에 대한 기초적인 이해만으로 이 퍼즐을 다시 맞추는 것은 꽤 힘든 작업이었습니다. 그러나 우리가 직면한 더 큰 도전은 균열을 안정화하기 위해 필요한 활성화 절차였습니다. 결국 잘 해결되었고 균열은 이제 안정적이지만, 이 일이 어떻게 발생했는지에 대한 보고서는 적어도 걱정스럽습니다.\n\n여러 번의 불면의 밤 끝에, 우리 [Root.GetScientistPlural] 중 한 명이 진전이 없다는 것에 실망하여 분노에 휩싸여 설치의 메인 프레임에서 제어 크리스탈을 무작위로 교체하기 시작했으며, 그 결과 균열이 복원되었습니다. [Root.GetScientist]는 이제 일부에게는 천재로 칭송받고 있지만, 다른 이들은 전체 시스템이 폭발하지 않은 것에 안도하고 있습니다..."
 mem_vazurans.63.a.name:0 "앞으로는 더 많은 휴식 시간을 강제해라."
 mem_vazurans.63.b.desc:0 "[mem_vazuran_rift_system.GetName] 시스템의 균열 종점이 복원되었습니다. 이전 사건에서 관찰된 것과 동일한 절차를 사용하여 균열이 문제 없이 안정화되었습니다."
 mem_vazurans.63.c.desc:0 "[mem_vazuran_rift_system.GetName] 시스템의 균열 종점이 복원되었습니다. 구조물 자체의 복원은 우리의 드론에 의해 효율적으로 수행되었지만, 이를 활성화하는 것은 우리의 [Root.GetScientistPlural]에게 엄청난 도전이었습니다. 여러 주간의 진전 없이 지연된 후, 그 중 하나가 갑자기 설치의 메인 프레임에서 제어 크리스탈을 무작위로 재배치하기 시작하였고, 이로 인해 균열이 안정화되었습니다."
 mem_vazurans.63.c.name:0 "우리는 군체의식의 완벽 이상을 기대했다."
 mem_vazurans.63.d.desc:0 "[mem_vazuran_rift_system.GetName] 시스템의 균열 종점이 복원되었습니다. 구조물 자체의 복원은 우리의 드론에 의해 효율적으로 수행되었습니다. 그러나 재활성화 과정은 다소 문제가 있었습니다. 여러 개의 결함이 있는 [Root.GetScientistPlural]가 폐기되어야 했고, 그 중 하나가 이전의 성공을 재현할 수 있었습니다. 그럼에도 불구하고 균열은 안정화되었습니다."
 mem_vazurans.63.d.name:0 "결함 있는 자들을 제거하라, 그들은 우리의 완벽함에 걸맞지 않다."
 mem_vazurans.63.e.desc:0 "[mem_vazuran_rift_system.GetName] 항성계의 균열 종점이 복원되었습니다. 구조물 자체의 복원은 우리의 드론에 의해 효율적으로 수행되었지만, 이를 활성화하는 것은 우리의 [Root.GetScientistPlural]에게 엄청난 도전이었습니다. 여러 주 동안 진전이 없던 중, 그 중 한 명이 설치의 메인 프레임 내에서 제어 크리스탈의 새로운 배열을 결정하기 위해 표준 무작위화 서브루틴을 적용했습니다. 이 작업은 성공적으로 이루어졌고 균열이 안정화되었습니다."
 mem_vazurans.63.e.name:0 "무작위화 하위 루틴을 찬양합니다."
 mem_vazurans.63.f.desc:0 "[mem_vazuran_rift_system.GetName] 항성계의 균열 종점이 복원되었습니다. 구조물 복원은 우리의 드론에 의해 효율적으로 수행되었습니다. 이전 작업 절차를 복제하는 데 성공하였습니다. 이제 균열은 안정적입니다."
 mem_vazurans.63.f.name:0 "예상대로군."
 requires_technology_mem_vazuran_rift_stabilization:0 "$TRIGGER_FAIL$기술 £physics£ §Y$tech_gateway_activation$§!이(가) 필요합니다."
 BYPASS_DESC_INACTIVE_MEM_VAZURAN_INTERDIM_GATEWAY:0 "§Y균열 종점§!을 복구해 활성화해야 합니다."
 GATEWAY_VAZURAN_DESC_UNEXPLORED:0 "이 성계에는 §R미탐사§! §Y균열§!이 존재합니다."
 ENTRY_BYPASS_MEM_VAZURAN_INTERDIM_GATEWAY:0 "우회."
 EXIT_BYPASS_MEM_VAZURAN_INTERDIM_GATEWAY:0 "퇴출."
 mem_vazurans.64.name:0 "선구자 거주지 복구됨"
 mem_vazurans.64.desc:0 "파괴된 선조 거주지가 완전히 복원되었습니다. 주변의 잔해 지역이 정리되었고, 그 물자는 복원 작업에 사용되었습니다. 우리의 건설 팀은 이 거주지를 '별의 왕좌'라고 부르게 되었습니다. 이 이름을 누가 지었는지, 왜 그런지는 불분명하지만, 현재로서는 이 이름이 정착되었고, 만약 우리가 지금 바꾼다면 일부는 불쾌감을 느낄지도 모릅니다..."
 mem_vazurans.70.name:0 "바주란 공격자 패배"
 mem_vazurans.70.desc.a:0 "우리 함대는 공격하는 표식을 새긴 자 세력을 물리칠 수 있었습니다. 구조 작업이 이미 진행 중이며, 과학 연구를 위한 여러 목표가 표식으로 새겨졌습니다."
 mem_vazurans.70.desc.b:0 "우리 함대는 공격하는 바주란 세력을 물리칠 수 있었습니다. 구조 작업이 이미 진행 중이지만, 광범위한 피해로 인해 과학적으로 흥미로운 발견은 거의 없었습니다."
 mem_vazurans.200.name:0 "페허"
 mem_vazurans.200a.desc:0 "[From.GetName] 항성계에 도달하자, 우리의 감지기가 그 항성계의 한 행성이 과거의 어느 시점에 조각으로 부서졌음을 밝혀냈습니다. 이 사건의 원인은 불분명합니다. 추가 조사가 권장됩니다."
 mem_vazurans.200b.desc:0 "우리는 또 다른 파괴된 행성을 발견했습니다. 그 주변을 간단히 스캔한 결과, 우리가 이전에 발견했던 중금속 합금의 흔적이 드러났습니다. 이 행성은 같은 힘의 희생양이 되었음에 틀림없습니다."
 mem_vazurans.200c.desc:0 "우리는 또 다른 파괴된 행성을 발견했습니다. 그 주변을 간단히 스캔한 결과, 바주란들이 사용한 중금속 합금의 흔적이 드러났습니다. 또 다른 세계가 그들의 공포의 지배에 희생되었습니다."
 MEM_VAZURANS_BROKEN_PLANET_INVESTIGATION:0 "파괴된 행성"
 MEM_VAZURANS_BROKEN_PLANET_INVESTIGATION_DESC:0 "이 장소의 장기간 연구를 한다면 행성에 무슨 일이 일어났는지를 알 수 있을 것입니다."
 mem_vazurans.201.name:0 "아포칼립스"
 mem_vazurans.201a.desc:0 "이 세계의 잔해를 연구한 후, 수석 과학자 [root.Leader.GetName]와 [root.Leader.GetHerHis] 동료들은 우려스러운 결론에 도달했습니다. 이용 가능한 모든 정보를 고려할 때, 현재 [From.From.GetName]의 상태는 격변적인 궤도 폭격의 결과입니다.\n\n그 장소 근처에서는 자연적으로 발생하지 않는 초중량 원소의 흔적을 발견할 수 있습니다. 누가 이 일을 저질렀고 그 이유는 여전히 미스터리입니다."
 mem_vazurans.201b.desc:0 "이 세계의 잔해를 연구한 결과, 수석 과학자 [root.Leader.GetName]와 [root.Leader.GetHerHis] 동료들은 우려스러운 결론에 도달했습니다. 모든 가용 정보를 고려할 때, [From.From.GetName]의 현재 상태는 대재앙적인 궤도 폭격의 결과입니다.\n\n그 장소 근처에서는 바주란 기술에 고유한 초중량 원소의 흔적을 발견할 수 있습니다. 그들은 이곳에 살고 있던 이들을 본보기로 삼았던 것으로 보입니다. 이 세계에 이전에 살았던 문명의 흔적은 발견되지 않습니다."
 mem_vazurans.201.a:0 "조금 우려스럽군."
 mem_vazurans_category_1:0 "크레이터 투성이"
 mem_vazurans_category_1_desc:0 "황무지 행성에서 소행성 충돌의 흔적이 발견되는 것은 흔한 일이지만, 이 경우에는 크레이터들이 자연스럽게 생성되었다기에는 배치가 너무 규칙적입니다."
 mem_vazurans.202.name:0 "세상의 끝"
 mem_vazurans.202.desc:0 "낮은 고도의 조사 비행을 통해 분화구 지역을 연구하는 동안, 우리의 과학자들은 잔해 아래에서 발생하는 약한 자기 반복 전송을 수신했습니다. [root.Leader.GetName]는 그 출처를 정확히 파악할 수 있었지만, 너무 위험하다는 이유로 그것에 접근하려는 생각을 빠르게 포기했습니다.\n\n[root.GetName]로 돌아온 [root.Leader.GetSheHe]는 기록된 전송을 해독하는 데 성공했습니다.\n\n전송은 공공 축하 행사에 대한 생중계 뉴스 보도의 중간 부분에서 시작되는 몇 분간의 비디오 피드로 구성되어 있었습니다.\n\n§SLarge parades are carrying debris through the streets accompanied by cheering masses, until suddenly the atmosphere changes completely and panic spreads. Then the view is abruptly moved towards the darkening sky. A burning wreck draws a fiery line as it falls towards the ground. Before it reaches the surface, there are giant explosions all around and the video ends abruptly.§!\n\n무엇이 말해졌는지 번역할 수 있는 물자가 충분하지 않지만, [root.Leader.GetName]는 [From.GetName]가 외계 함대의 탄도 폭격의 희생자가 되었다는 증거로 이를 받아들입니다. 행성 표면에 퍼져 있는 초고밀도 화합물의 흔적이 이 이론을 뒷받침합니다."
 mem_vazurans.203.name:0 "악의로 가득한 장난"
 mem_vazurans.203.desc:0 "[From.GetName]의 표면 조사는 결정적인 통찰을 제공하지 않았습니다. 그러나 또 다른 미스터리를 남겼습니다: 자연적으로 발생하지 않는 초고밀도 화합물의 흔적이 행성 전역에 퍼져 있습니다.\n\n그러나 [root.GetName]이 [From.GetName]를 공전하는 속이 빈 소행성 안에 미공개 기지를 발견했을 때 진정한 돌파구가 마련되었습니다. 우리의 기준으로 볼 때 다소 원시적인 이 시설은 수천 개의 죽은 존재를 수용하는 기초적인 동결 장치로 가득 차 있습니다.\n\n시설의 컴퓨터 시스템에 저장된 데이터 조각을 검색하는 동안, 우리의 과학 팀은 [From.GetName]의 주민들이 직면했던 심각한 상황을 조합할 수 있었습니다. 그들의 문명은 과거 여러 차례 기술적 우월함을 가진 세력의 공격을 받았습니다. 그들의 저항이 커짐에 따라 점점 더 잔인한 보복 행위가 이어졌고, 그들은 - 정당하게도 보입니다 - 자신의 세계가 이러한 공격에 무너질 것을 두려워했습니다. 최악의 상황이 발생할 경우 문명을 재시작하기 위한 수단으로, 이 미공개 기지가 그들의 가장 뛰어난 인재들을 보존하고 문명을 재부팅할 수 있는 충분한 유전적 다양성을 담기 위한 방주 역할을 하도록 설치되었습니다.\n\n그러나 그들은 적이 자신의 고향을 생명 없는 완전히 거주 불가능한 암석으로 만들 것이라고는 예상하지 못했습니다. '미공개' 기지는 의도적으로 보존된 것으로 보입니다 - 우리가 그것을 탐지할 수 있었던 만큼, 그들의 적도 그랬을 것으로 예상됩니다. 로그에 명시된 바와 같이, 동결 시스템은 표면과의 접촉이 끊어진 후 10년이 지나 정해진 일정에 따라 종료되었습니다. [root.Leader.GetName]는 이 사람들이 자신의 상황을 깨달았을 때 느꼈을 공포와 절망을 상상조차 할 수 없습니다. FTL 능력이 없는 두 대의 셔틀만 장착된 채, 돌아갈 세계도 없이 그들은 고립되었습니다. 그 후 얼마 지나지 않아 동결 시스템은 무기한으로 재가동되었습니다."
 mem_vazurans.203.desc.gestalt:0 "[From.GetName]의 표면 조사는 결정적인 통찰을 제공하지 않았습니다. 그러나 또 다른 미스터리를 남겼습니다: 자연적으로 발생하지 않는 초밀도 화합물의 흔적이 행성 전역에 퍼져 있습니다.\n\n하지만 [root.GetName]이 [From.GetName]를 공전하는 속이 빈 소행성 안에 미공개 기지를 발견했을 때 진정한 돌파구가 열렸습니다. 우리 기준으로는 다소 원시적인 이 시설은 수천 개의 죽은 존재를 수용하는 기초 동결 장치로 가득 차 있습니다.\n\n시설의 컴퓨터 시스템에 저장된 데이터 조각을 검색하면서, 우리 과학 팀은 [From.GetName]의 주민들이 직면했던 심각한 상황을 조합할 수 있었습니다. 그들의 문명은 과거 여러 차례 기술적 우월함을 가진 세력의 공격을 받았습니다. 그들의 저항이 커지자 점점 더 잔인한 보복 행위가 뒤따랐고, 그들은 - 정당하게도 보이는 - 자신들의 세계가 이러한 공격에 무너질 것을 두려워했습니다. 최악의 상황이 발생할 경우 문명을 재시작하기 위한 수단으로, 이 미공개 기지가 그들의 가장 뛰어난 인재를 보존하고 문명을 재부팅할 수 있는 충분한 유전적 다양성을 포함하기 위해 아크 역할을 하도록 설치되었습니다.\n\n그러나 그들은 적이 그들의 고향을 생명 없는 완전히 거주 불가능한 암석으로 만들 것이라고는 예상하지 못했습니다. '미공개' 기지는 의도적으로 보존된 것으로 보입니다 - 우리가 그것을 탐지할 수 있었던 만큼, 그들의 적도 탐지했을 것으로 예상됩니다. 기록에 따르면, 동결 시스템은 표면과의 접촉이 끊어진 지 10년 후에 예정대로 종료되었습니다. 생존자들이 자신의 상황을 깨달았을 때 느꼈을 공포와 절망을 상상하기조차 어렵습니다. FTL 능력이 없는 두 대의 셔틀만 장착한 채, 돌아갈 세계도 없이 그들은 고립되었습니다. 그 후 얼마 지나지 않아 동결 시스템은 무기한으로 재가동되었습니다."
 mem_vazurans.204.name:0 "과거의 망령"
 mem_vazurans.204.desc:0 "[From.GetName]의 표면에 대한 보다 철저한 조사 중, [root.Leader.GetName]의 조수 중 한 명이 나중에 지상에 있는 우리의 원정대에 의해 확인된 인공 구조물을 발견했습니다.\n\n이 유적에 대한 조사는 계획대로 진행되지 않았으며, 주로 [root.GetName]와 [root.Leader.GetName]가 이끄는 과학자들 간의 통신이 여러 차례 중단된 결과입니다. 이 순간 동안 몇몇 인원은 '정신병적 에피소드'라고 묘사한 경험을 했습니다. 이 현상에 영향을 받은 수석 과학자는 팀이 더 오래 남아 있는 것이 위험할 것이라고 우려하여 셔틀로 돌아가기로 결정했습니다. 그러나 그들이 이륙하기 전에, 이전보다 훨씬 더 오랜 시간 지속된 또 다른 정전이 발생했습니다. 통신이 재설정되었을 때, 매우 동요한 목소리의 과학자가 즉시 떠날 것이라고 보고했습니다. 그들이 [root.GetName]와의 집합 좌표에 도착했을 때, 그들 중 절반은 여전히 의식을 잃고 있었습니다.\n\n회복한 후, [root.Leader.GetName]는 무자비한 적의 손에 의해 전체 세계의 집단적 죽음을 경험했다고 보고했습니다. [root.Leader.GetHisHer]의 이론에 따르면, [From.GetName]의 주민들은 광범위한 정신적 능력을 가지고 있었으며, 이는 그들의 끔찍한 마지막 순간이 행성 자체에 각인되도록 했습니다. 신체적으로는 무사했지만, 이 사건은 [root.Leader.GetHimHer]에 지속적인 영향을 미쳤습니다.\n\n추가 스캔 결과, 행성 표면에 퍼져 있는 초밀집 화합물의 흔적이 발견되었으며, 이는 파괴에 사용된 무기에서 유래한 것으로 보이며, [root.Leader.GetName]의 주장을 뒷받침합니다."
 mem_vazurans_category_2:0 "크레이터 투성이"
 mem_vazurans_category_2_desc:0 "[From.GetName]의 스캔 결과 의심스러운 분화구 형성과 자연적으로 발생하지 않는 것으로 알려지지 않은 동일한 초밀도 화합물의 흔적이 발견되었습니다. 이 화합물은 이전에 조사된 행성에서 여러 문명의 붕괴와 연관되어 있습니다."
 mem_vazurans.205.name:0 "수상한 위성"
 mem_vazurans.205.desc:0 "[From.GetName]에 대한 추가 조사가 진행된 결과, 이 행성은 한때 거주 가능했으나 궤도 폭격의 결과로 추정되는 초밀도 물자가 행성에 쌓이면서 거주 불가능하게 되었다는 사실이 밝혀졌습니다. 이러한 사건은 수천 년 전 발생했으며, 표면에 남아 있는 잔존자는 너무 부패하고 침식되어 더 이상의 결론을 도출하기 어렵습니다.\n\n[root.Leader.GetName]가 [root.Leader.GetHisHer] 조사를 마무리하려던 찰나, [root.GetName]의 스캐너가 [From.GetName]의 위성을 공전하는 작고 의심스러운 동일한 물체 세트를 감지했습니다. 이들은 데이터 코어를 포함한 인공 위성으로 밝혀졌습니다. 수석 과학자는 이들이 발견되기를 의도했으며 일종의 타임 캡슐 역할을 하도록 설계되었을 것이라고 추정합니다.\n\n그러나 이들 내부에 저장된 데이터에 접근하고 해독하는 데는 상당한 노력이 필요할 것입니다."
 mem_vazurans.205.a:0 "안에 무엇이 들었지?"
 MEM_VAZURANS_ANOMALY_PLANET_INVESTIGATION:0 "데이터 코어 해독"
 MEM_VAZURANS_ANOMALY_PLANET_INVESTIGATION_DESC:0 "[From.From.GetName]가 파괴되었을 때 우주에 남겨진 데이터 코어를 회수했습니다. 그 안에 어떤 비밀이나 메시지가 담겨 있을지 누가 알겠습니까?"
 mem_vazurans.206.name:0 "타임캡슐"
 mem_vazurans.206.desc:0 "우리 과학자들은 데이터 코어의 일부를 해독하는 데 성공했습니다. 지금까지 각 예시가 다른 것들의 정확한 복제본이며 동일한 정보를 포함하고 있는 것으로 보입니다. 이는 보존 가능성을 높이기 위한 전략으로 추정됩니다. 포함된 데이터는 매우 방대하며, 우리 과학자들이 완전히 해독하는 데 몇 달, 아니면 몇 년이 걸릴 것입니다.\n첫 번째 항목은 제목 페이지로 보이며, 이미 번역되었습니다:\n\n\"우리는 스스로 무적이라고 생각했습니다. 우리는 '구축함'을 막을 수 있다고 생각했습니다. 우리는 그들이 무너뜨린 다른 종족들과 같은 젊은 종족이 아니었습니다 - 우리는 천 년 동안 은하계를 여행해왔습니다. 그러나 그들은 우리를 이겼습니다. 이 메시지가 발견될 때쯤이면, 한때 자랑스러웠던 우리의 종족의 다른 것은 남아있지 않을 것입니다. 우리는 우리의 가장 소중한 보물인, 우리의 위대한 철학자들의 말 -- 우리의 문화유산 -- 이 우리의 종족의 멸종을 초월하기를 바라며 이 기록을 남깁니다."
 mem_vazurans.206.a:0 "잘했다."
 mem_vazurans.240.name:0 "행성 방어 계획 완료"
 mem_vazurans.240.desc:0 "이 야심찬 노력의 시작 이후로 많은 접근 방식이 제시되었다가 다시 폐기되었지만, 하나는 매우 유망해 보입니다.\n\n우리는 오랫동안 우리의 우주선과 기지를 보호하기 위해 보호막을 사용해왔지만, 이 기술을 행성 규모로 적용하는 것은 항상 경제적으로 불가능하다고 여겨졌습니다. 그러나 [root.GetName] 위에 드리운 바주란의 위협을 고려할 때, 이 기술의 오랜 지지자들이 마침내 그들의 목표를 추구하기 위한 필요한 자금을 확보하는 데 성공했습니다."
 mem_vazurans.240.a:0 "연구를 시작해라."
 mem_vazurans.251.name:0 "외계 잔해 발견"
 mem_vazurans.251.desc:0 "정기적인 광물 탐광 작업 중 [root.GetName]에서 탐광꾼들이 예상치 못한 발견을 하였습니다: 자연 잔해에 반쯤 덮인 고대 잔해가 있습니다. 정부 관계자들은 이 특이한 발견에 대해 신속하게 통보받았습니다."
 mem_vazurans.251.desc.gestalt:0 "[root.GetName]에서의 정기적인 광물 탐광 작업 중, 탐광꾼 드론이 예상치 못한 발견을 하였습니다: 자연 잔해에 반쯤 덮인 고대 잔해가 있습니다. 책임 있는 서브루틴이 신속하게 통보되었습니다."
 mem_vazurans.251.a:0 "조사를 개시하라."
 mem_vazurans_category_3:0 "외계 함선 잔해"
 mem_vazurans_category_3_desc:0 "[From.GetName]에서 고대 외계인 잔해가 발견되었습니다. 추가 조사가 필요합니다."
 mem_vazurans.252.name:0 "기술적 보물"
 mem_vazurans.252.desc:0 "처음에 우리 과학 팀은 파손과 고급 상태의 열화로 인해 잔해의 출처를 인식하지 못했지만, 물자 구성의 스캔 결과 그것이 틀림없이 Vazuran임을 밝혀냈습니다.\n\nVazurans가 장애가 있는 함선을 적의 손에 떨어뜨리기보다는 자폭시키는 경향이 있다는 점을 고려할 때, 이곳에 어떻게 도착했는지는 여전히 미스터리입니다. 상황은 더욱 행운입니다. 대부분의 함선 시스템이 알아볼 수 없는 상태인 반면, 그들의 기술의 핵심 구성 요소는 대체로 온전하게 남아 있습니다. 수석 과학자 [root.Leader.GetName]에 따르면, 우리는 이제 감쇠 필드 생성기를 보유하고 있습니다 -- 그들의 함선의 뛰어난 내구성의 주요 원천입니다.\n\n그 능력을 연구할 충분한 시간이 주어진다면, 우리는 그것이 우리의 무기에 미치는 영향을 우회할 방법을 찾을 수 있을지도 모릅니다."
 mem_vazurans.252.desc.gestalt:0 "처음에는 파손과 고급 상태의 열화로 인해 잔해의 출처를 인식할 수 없었지만, 물자 구성의 스캔 결과 그것이 명백히 Vazuran임을 밝혀냈습니다.\n\nVazurans는 장애가 있는 함선을 적의 손에 기술이 넘어가는 것을 허용하기보다는 자폭시키는 경향이 있기 때문에, 이곳에 어떻게 도착했는지는 우리에게 여전히 미스터리입니다. 상황은 더욱 다행스럽게도, 대부분의 함선 시스템이 인식할 수 없는 상태임에도 불구하고 그들의 기술의 주요 구성 요소가 대체로 온전하게 남아 있습니다. [root.owner.GetScientistResearchSubroutine] [root.Leader.GetName]에 따르면, 우리는 이제 그들의 함선의 뛰어난 내구성의 주요 원천인 감쇠 필드 생성기를 소유하게 되었습니다.\n\n그 능력을 연구할 충분한 시간이 주어진다면, 우리는 그것이 우리의 무기에 미치는 영향을 우회할 방법을 찾을 수 있을지도 모릅니다."
 mem_vazurans.252.a:0 "흥미롭군."
 mem_vazurans.253.name:0 "외계 함선 잔해 발견"
 mem_vazurans.253.desc:0 "[root.GetName]에서 탐사 드릴링을 수행하는 동안, 우리의 외계 광산 회사 중 하나가 고대의 잔해를 발견했습니다. 소행성을 절반 정도 뚫고 막히기 전까지 잘려 나갔음에도 불구하고, 여전히 한 덩어리인 것 같습니다. 정부 관계자들은 이 특이한 발견에 대해 신속하게 통보받았습니다."
 mem_vazurans.253.desc.gestalt:0 "[root.GetName]에서 탐사 드릴링을 수행하는 동안, 우리의 외계 광산 작업 중 하나가 고대 잔해를 발견했습니다. 소행성을 절반 정도 파고 들어갔지만 갇히기 전까지 여전히 한 덩어리인 것 같습니다. 해당 서브루틴은 이 특이한 발견에 대해 신속하게 통보받았습니다."
 mem_vazurans.253.a:0 "조사를 개시하라."
 mem_vazurans_category_4:0 "외계 함선 잔해"
 mem_vazurans_category_4_desc:0 "[From.GetName]에서 고대 외계인 잔해가 발견되었습니다. 추가 조사가 필요합니다."
 mem_vazurans.254.name:0 "기술적 보물"
 mem_vazurans.254.desc:0 "처음에 우리 과학 팀은 소행성에 진입할 때 입은 피해로 인해 잔해의 출처를 인식하지 못했지만, 물자의 구성 성분을 스캔한 결과 그것이 확실히 Vazuran임을 밝혀냈습니다.\n\nVazurans는 장애가 발생한 함선을 적의 손에 떨어뜨리기보다는 자폭하는 경향이 있기 때문에, 이곳에 어떻게 도착했는지는 여전히 미스터리입니다. 상황은 더욱 다행스럽게도, 비록 대부분의 함선 시스템이 알아볼 수 없지만, 그들의 기술의 핵심 구성 요소는 대체로 온전하게 남아 있습니다. 수석 과학자 [root.Leader.GetName]에 따르면, 우리는 이제 그들의 함선의 뛰어난 내구성의 주요 원천인 감쇠 필드 생성기를 소유하게 되었습니다.\n\n그 능력을 연구할 충분한 시간이 주어진다면, 우리는 그것이 우리의 무기에 미치는 영향을 우회할 방법을 찾을 수 있을지도 모릅니다."
 mem_vazurans.254.desc.gestalt:0 "처음에는 소행성에 진입할 때 입은 피해로 인해 잔해의 출처를 인식할 수 없었으나, 물자의 구성 성분을 스캔한 결과 이것이 확실히 Vazuran임을 밝혀냈습니다.\n\nVazuran은 장애가 발생한 함선을 적의 손에 기술이 넘어가는 것을 허용하기보다는 자폭하는 경향이 있기 때문에, 이곳에 어떻게 도착했는지는 여전히 미스터리입니다. 상황은 더욱 다행스럽게도, 대부분의 함선 시스템이 인식할 수 없을 정도로 손상되었지만, 그들의 기술의 핵심 구성 요소는 대체로 온전하게 남아 있습니다. [root.owner.GetScientistResearchSubroutine] [root.Leader.GetName]에 따르면, 우리는 이제 그들의 함선의 뛰어난 내구성의 주요 원천인 댐퍼 필드 생성기를 소유하게 되었습니다.\n\n그 능력을 연구할 충분한 시간이 주어진다면, 우리는 그것이 우리의 무기에 미치는 영향을 우회할 방법을 찾을 수 있을지도 모릅니다."
 mem_vazurans.254.a:0 "흥미롭군."
 mem_vazurans.255.name:0 "외계 잔해 발견"
 mem_vazurans.255.desc:0 "센서가 [mem_vazurans_wreckage_system.GetName] 성계를 통과하는 물체를 포착했습니다. 식별할 수 있는 에너지 신호가 없으므로 버려진 것으로 보입니다."
 mem_vazurans.255.a:0 "조사를 개시하라."
 MEM_VAZURANS_WRECKAGE_INVESTIGATION:0 "공허를 떠돌다"
 MEM_VAZURANS_WRECKAGE_INVESTIGATION_DESC:0 "우린 [mem_vazurans_wreckage_system.GetName] 성계 내에서 발견된 이 잔해를 빠르게 조사해야 합니다."
 mem_vazurans.256.name:0 "기술적 보물"
 mem_vazurans.256.desc:0 "처음에 우리 과학 팀은 파손된 잔해의 출처를 인식하지 못했지만, 물자 구성의 스캔 결과 그것이 확실히 Vazuran임을 밝혀냈습니다.\n\nVazurans는 장애가 있는 함선을 적의 손에 떨어뜨리지 않기 위해 자폭하는 경향이 있기 때문에, 이 잔해가 이곳에 어떻게 오게 되었는지는 우리에게 여전히 미스터리입니다. 상황은 더욱 다행스럽게도, 대부분의 함선 시스템이 알아볼 수 없지만, 그들의 기술의 핵심 구성 요소는 대체로 온전한 상태로 남아 있습니다. 수석 과학자 [root.Leader.GetName]에 따르면, 우리는 이제 그들의 함선의 뛰어난 내구성의 주요 원천인 감쇠 필드 생성기를 소유하게 되었습니다.\n\n그 능력을 연구할 충분한 시간이 주어진다면, 우리는 그것이 우리 무기에 미치는 영향을 우회할 방법을 찾을 수 있을지도 모릅니다."
 mem_vazurans.256.desc.gestalt:0 "처음에는 파손으로 인해 잔해의 출처를 인식할 수 없었으나, 물자의 조성을 스캔한 결과 이는 분명히 Vazuran임을 밝혀냈습니다.\n\nVazurans는 장애가 발생한 함선을 적의 손에 기술이 넘어가는 것을 허용하기보다는 자폭시키는 경향이 있기 때문에, 이 잔해가 이곳에 어떻게 도착했는지는 여전히 미스터리입니다. 상황은 더욱 다행스럽게도, 대부분의 함선 시스템이 인식 불가능한 상태임에도 불구하고 그들의 기술의 핵심 구성 요소는 대부분 온전하게 남아 있습니다. [root.owner.GetScientistResearchSubroutine] [root.Leader.GetName]에 따르면, 우리는 이제 그들의 함선의 뛰어난 내구성의 주요 원천인 감쇠 필드 생성기를 소유하게 되었습니다.\n\n그 능력을 연구할 충분한 시간이 주어진다면, 우리는 우리의 무기에 미치는 영향을 우회할 방법을 찾을 수 있을지도 모릅니다."
 mem_vazurans.256.a:0 "흥미롭군."
 MEM_VAZURANS_DAMPER_FIELD_GENERATOR_INVESTIGATION:0 "역설계"
 MEM_VAZURANS_DAMPER_FIELD_GENERATOR_INVESTIGATION_DESC:0 "우리 과학자들은 마지막 바주란 균열에서 측정 가능한 변동을 발견했습니다. 그들은 이를 이용해 그들의 기술을 불안정하게 만들 수 있다고 믿고 있습니다.\n\n§R성공 여부와 관계없이 이 실험은 분명 그들의 주목을 받을 것입니다. 우리는 싸움에 대비해야 합니다.§!"
 mem_vazurans.260.name:0 "에너지 전달 방해"
 mem_vazurans.260.desc:0 "구조물의 감쇠 필드 생성기에 대한 여러 실험을 진행한 결과, 우리의 [root.GetScientistResearchSubroutinePlural]는 그 기능에 대한 확고한 이해를 확립할 수 있었습니다. 우리의 보호막이 들어오는 공격의 에너지를 흡수하여 소모될 때까지 지속되는 것과 달리, 이 생성기가 만드는 필드는 에너지 전송을 영구적으로 억제하여 보호된 물체에 도달하는 에너지의 일부만이 전달되도록 합니다.\n\n이 기술은 모든 종류의 무기에 효과적이지만, 테스트 결과 에너지 기반 무기에 대해 가장 효과적임을 보여주었습니다. 이 기술을 우리의 함대에 적용하는 것이 처음에는 매력적으로 보일 수 있지만, 우리의 실험은 이 보호 장치로 인해 발생하는 문제적인 부작용을 입증했습니다. 에너지 전송의 억제는 외부의 에너지만 제한되지 않고 내부 선박 시스템에도 영향을 미칩니다. 현재까지 감쇠 필드의 영향을 차단할 방법은 발견되지 않았습니다.\n\n우리의 [root.GetScientistResearchSubroutinePlural]는 이 기술의 기본 과학 원리에 대한 기초적인 이해만을 얻었습니다. 그러나 이는 Vazuran의 기술적 우위를 극복하는 데 있어 중요한 단계이며, 그들의 함선과의 전투에서 우리의 승산을 높일 것입니다."
 mem_vazurans.260.a:0 "흥미롭군."
 mem_vazurans.280.name:0 "바주란 고향 성계"
 mem_vazurans.280.desc:0 "우리 정찰선이 균열의 반대편에 도달했습니다. 예상대로, 감지기가 그곳이 철저히 요새화되어 있음을 확인합니다. 시스템 경계 주위에는 강력한 요새들이 원형으로 배치되어 있고, 우리가 고향 행성을 공격받을 때 맞닥뜨린 것과 비슷한 규모의 함대가 있습니다. 그 외에도 우리가 이전에 본 것 중 가장 큰 크기의 또 다른 선박이 있습니다. 이 선박은 거대한 구조물 근처의 부서진 행성을 공전하고 있으며, 이 구조물은 Vazuran 작전 기지로 보입니다.\n\n우리 함선이 데이터를 처리하는 동안, 요새에서 에너지 수치의 급증을 감지합니다. 공격받을 위험 없이 더 이상 그곳에 머물 수 없습니다. 우리가 돌아가려면, 반드시 힘을 모아야 합니다."
 mem_vazurans.280.a:0 "당장 그곳을 벗어나라!"
 mem_vazurans.281.name:0 "바주란 함대의 패배"
 mem_vazurans.281.desc:0 "바주란 함대가 쓰러졌습니다. 바주란의 콜로서스는 전투에서 패배했고 우리가 이 전투에서 승리했습니다.\n\n이제 이들의 고향에 진격할 우리 군대를 막을 적은 남지 않았습니다."
 mem_vazurans.281:0 "승리를 향하여."
 mem_vazurans.282.name:0 "재앙의 끝"
 mem_vazurans.282.desc:0 "오늘은 새로운 시대의 시작을 알리는 날입니다. 바주란의 위협이 물리쳤습니다. 더 이상 우리의 국민은 그들의 공격에 두려움 속에서 살지 않을 것입니다.\n\n우리의 군대는 이 승리를 위해 큰 대가를 치러야 했습니다. 남아있는 바주란 방어군은 여전히 서 있는 모든 구조물을 방어하기 위해 진을 쳤습니다. 그들의 패배가 불가피해지자, 그들은 자폭 장치를 작동시켜 대부분의 거주 가능한 지역을 파괴했습니다.\n\n하지만 우리의 군대는 빈손으로 돌아오지 않았습니다. 기술 정보를 회수하는 임무를 맡은 우리의 특수 작전 팀이 '젠트로늄'의 생산 과정에 대한 세부 정보를 담고 있는 데이터 코어를 가지고 돌아왔습니다. 바주란 갑옷이 이 물자로 만들어졌습니다. 그 특성, 특히 극단적인 밀도를 고려할 때, 이는 우리의 함선 갑옷에만 가치가 있는 것이 아니라 우리의 운동 에너지 탄환에 상당한 개선을 가능하게 할 수도 있습니다."
 mem_vazurans.282.desc.gestalt:0 "오늘은 새로운 시대의 시작을 알리는 날입니다. 바주란의 위협이 물리쳐졌습니다. 더 이상 [root.GetName]는 그들의 공격에 두려움 속에 살지 않을 것입니다.\n\n우리의 군대는 이 승리를 위해 큰 대가를 치러야 했습니다. 남아있는 바주란 방어자들은 여전히 남아있는 모든 구조물을 방어하기 위해 진지를 구축했습니다. 그들의 패배가 불가피해지자, 그들은 자폭 시퀀스를 활성화하여 대부분의 거주 가능한 지역을 파괴했습니다.\n\n하지만 우리의 전투 드론은 빈손으로 돌아오지 않았습니다. 기술 정보를 회수하는 임무를 맡은 우리의 특수 작전 드론 팀 중 하나가 '젠트로늄'의 생산 과정에 대한 세부 정보를 담고 있는 데이터 코어를 가지고 돌아왔습니다. 그 특성, 특히 극단적인 밀도를 고려할 때, 이는 우리의 함선 갑옷에만 가치가 있을 뿐만 아니라 우리의 운동 에너지 탄환에 상당한 개선을 가능하게 할 수도 있습니다."
 mem_vazurans.282.a:0 "잘했어!"
 mem_vazurans.282.b:0 "영원히 사라졌습니다!"
 resolution_category_mem_vazurans:0 "바주란의 위협"
 resolution_mem_galactic_focus_crisis_vazurans_1:0 "바주란의 위협: 식민지 방어"
 resolution_mem_galactic_focus_crisis_vazurans_1_desc:0 "바주란 함대가 온 은하를 공격하기에 은하에 안전한 식민지는 존재하지 않다는 것이 확실해졌습니다. 이 결의안으로 은하 공동체 회원국들은 바주란 군대의 공격 패턴과 식민지를 보호할 대책에 대한 지식을 공유하게 될 것입니다."
 resolution_mem_galactic_focus_crisis_vazurans_1_effect_success:0 "식민지는 바주란의 습격으로 인한 파괴와 팝 손실이 감소합니다."
 resolution_mem_galactic_focus_crisis_vazurans_2:0 "바주란의 위협: 판 뒤집기"
 resolution_mem_galactic_focus_crisis_vazurans_2_desc:0 "은하 공동체는 너무 오랫동안 바주란의 공격에 무방비한 채로 있었습니다. 저들의 맹공격으로부터 살아남기 위해 이제 서로 힘을 합쳐 상대해야 할 시간입니다."
 resolution_mem_galactic_focus_crisis_vazurans_2_effect_success:0 "바주란 함선의 공유 전술 데이터와 초광속 엔진 성능 개선을 위한 협력적 노력이 위협받는 식민지에 제때 도달할 확률을 높이고 공격자와의 전투에서 더 나은 성과를 거두는 데 기여할 것입니다."
 resolution_mem_galactic_focus_crisis_vazurans_1_weight_tooltip_1:0 "아, 그렇습니다. 고대 종족인 바주란이 다른 차원에서 공격하고 있습니다. 우리는 그 주장을 일축했습니다..."
 resolution_mem_galactic_focus_crisis_vazurans_1_weight_tooltip_2:0 "우리는 그들의 공격 중 하나를 받았습니다."
 mem_vazurans.1101.name:0 "미납 십일조"
 mem_vazurans.1101.desc:0 "이 작은 힘의 시연은 당신이 우리에게 저항할 수 없음을 보여주기에 충분해야 합니다... 우리는 당신에게 선택을 제공합니다: 복종하든지... 아니면 죽든지.\n\n이 은하의 정당한 지배자로서 우리는 세계의 착취에 대한 세금을 요구합니다."
 mem_vazurans.1101.a:0 "당신과 어떤 함대가 있습니까?"
 mem_vazurans.1101.b:0 "통신을 차단하고 방어 위치를 준비하십시오!"
 mem_vazurans.1101.c:0 "우리는 어떤 상황에서도 지불하지 않을 것입니다!"
 mem_vazurans.1101.d:0 "당신은 세금을 내고 우리는 평화를 누릴 것입니다."
 mem_vazurans.1101.e:0 "그 칼다리 괴물들은 아무것도 얻지 못할 것이다!"
 mem_vazurans.1205.name:0 "타락한 존재"
 mem_vazurans.1205.desc:0 "Reports all over the galaxy indicate an end of the vazuran raiding and an apparent return to normality. While none of the involved empires reported any relevant information a covert agents stationend within their territory report that the Vazuran Hegemony lost a considerable amount of manpower and 물자. Allied forces appear to have triangulated the source of the rifts and our troubles. We should now be able to jump into their home system and finish them off."
 mem_vazurans.1205.a:0 "끝났습니다."
 mem_vazurans.1205.b:0 "이제 그 놈들을 끝내자!"
 mem_vazurans.1210.name:0 "잃어버린 열정"
 mem_vazurans.1210.desc:0 "모든 은하에서 보고된 바에 따르면 바주란의 습격이 끝나고 정상으로 돌아온 것으로 보입니다. 바주란 헤게모니는 작은 공간을 차지하고 이전에 미공개였던 고향 행성과 영구적인 연결을 구축했습니다. 그들은 더 이상 습격을 계속할 수 없거나 할 의사가 없는 것처럼 보이지만, 그들의 기술은 여전히 우리의 기술보다 훨씬 앞서 있습니다. 만약 우리가 그들의 전초 기지 수비대를 압도하고 고향 행성을 정복할 수 있다면, 우리는 귀중한 지식을 얻을 수 있을 것입니다."
 mem_vazurans.1210.a:0 "최소한 습격은 멈췄습니다."
 mem_vazurans.1210.b:0 "그들의 몰락의 시작."
 mem_vazurans.1215.name:0 "옛 영광"
 mem_vazurans.1215.desc:0 "모든 은하에서 보고된 바에 따르면 바주란의 약탈이 끝나고 정상으로 돌아온 것으로 보입니다. 그러나 바주란 헤게모니는 넓은 우주를 차지하고 이전에 미공개였던 고향 세계와의 영구적인 연결을 확립했습니다. 이제 그들의 발판이 마련된 만큼, 그들은 은하 정복을 위한 더 큰 계획을 가지고 있는 것으로 보입니다."
 mem_vazurans.1215.a:0 "문제적입니다."
 mem_vazurans.1215.b:0 "그들이 오게 하라!"
 mem_vazurans.1220.name:0 "조용한 스캔"
 mem_vazurans.1220.desc:0 "바주란 세금 징수자들이 지난 몇 년 동안 오고 갔습니다. 이제 위기가 끝났으니, 일부 과학자들이 미공개 계획을 밝혔습니다. 그들은 바주란 선체와 무기 특성을 분석하고 젠트로늄 기술에 대한 통찰을 얻었습니다. 관련된 일부는 예상보다 쉬웠다고 언급하며, 바주란들이 자신들과 그들의 기술 발전에 대해 매우 자부심을 느꼈기 때문에 우리가 그것을 이해하고 복제할 가능성을 전혀 고려하지 않았을 것이라고 말했습니다."
 mem_vazurans.1310.name:0 "상승하는 요구"
 mem_vazurans.1310.desc:0 "주제들, 우리의 대장간은 식어버렸고 우리는 작업량을 처리할 준비가 된 추가 노동자가 필요합니다. 여러분이 정당히 우리의 것인 것을 차지하고 있는 만큼, 우리는 우리의 광산을 위해 노동자의 십일조를 요구합니다. 우리의 시간을 낭비하지 말고 거부할 생각을 하지 마십시오."
 mem_vazurans.1310.a:0 "그들을 데려가세요."
 mem_vazurans.1310.c:0 "노예면 충분합니다."
 mem_vazurans.1310.b:0 "우리는 누구에게도 판매하지 않을 것입니다."
 mem_vazurans.1310.d:0 "여기서 당신의 이야기는 끝납니다."
 mem_vazurans.1310.e:0 "와서 가져가세요!"
 mem_vazuran_wormhole_big_object:0 "차원 간 균열"
