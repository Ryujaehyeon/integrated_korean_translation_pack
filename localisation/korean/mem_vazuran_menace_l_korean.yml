l_korean:
 precursor_mem_vazurans:0 "바주란의 위협"
 precursor_mem_vazurans_desc:0 "§Y$mem_vazuran_menace_chain_title$과 관련된 기능을 활성화합니다.§!\n(선구자 수에 포함되지 않음)\n\n설정: \n- £trigger_no£ 조상 기원 및 £trigger_no£ 바주란 선구자: §Y비활성§!\n- £trigger_no£ 조상 기원 및 £trigger_yes£ 바주란 선구자: §Y무작위§!\n- £trigger_yes£ 조상 기원 및 £trigger_no£ 바주란 선구자: §Y['concept_advanced_empires']§!\n- £trigger_yes£ 조상 기원 및 £trigger_yes£ 바주란 선구자: §Y활성§!\n\n현재 시대의 균열 기술 개선으로 바주란은 이를 통해 제한된 이동이 가능해졌고, 이는 약탈의 시대를 시작하게 되었습니다. 바주란의 고향 시스템은 그들의 감옥이 될 예정이었으나, 이 시점에서 그들은 은하에 대한 힘을 발휘하는 불굴의 요새가 되었습니다."
 personality_mem_vazuran_personality:0 "고대 위협"
 personality_mem_vazuran_personality_desc:0 "이 문명은 오직 약탈과 전쟁에 기반하고 있습니다. 그들은 오직 자신의 우월성과 힘이 정의를 만든다는 원칙만을 믿습니다."
