 pc_mem_vazuran_habitat:0 "선구자 거주지"
 pc_mem_vazuran_habitat_desc:0 "도시화한 행성 조건을 가진 선구자 아콜로지. 수경 재배 농장과 발전된 필터 기술을 통해 자급자족이 가능한 구조며 정거장 내의 시설들로 행성의 내부에서 광물을 채취할 수 있습니다."
 pc_mem_vazuran_habitat_tile:0 "선구자 거주지"
