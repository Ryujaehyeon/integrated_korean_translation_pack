 building_mem_vazuran_core_forge:0 "젠트로늄 연구소"
 building_mem_vazuran_core_forge_desc:0 "Xentronium 분야의 선도적인 연구 단지입니다. 수백 명의 연구원이 지역 합금 제련소에서 얻은 모든 정보를 문서화하여 우리의 함선 설계를 지속적으로 개선하는 데 헌신하고 있습니다."
 building_mem_vazuran_worker_exploiter:0 "채굴 구덩이"
 building_mem_vazuran_worker_exploiter_desc:0 "이 홀에서는 근로자들이 끊임없이 요구하는 \"관리자\"에 의해 최고의 성과를 내도록 압박받습니다."
 building_mem_vazuran_worker_exploiter_tt:0 "평균적으로 매년 §Y1%§!의 노예를 죽입니다."
 mem_vazuran_raiding:0 "신성 모독"
 mem_vazuran_raiding_type:0 "s"
