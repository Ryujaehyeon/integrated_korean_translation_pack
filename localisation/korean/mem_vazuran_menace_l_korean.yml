 mem_VAZURAN_AURA:0 "에너지 감쇠 필드"
 mem_VAZURAN_AURA_DESC:0 "전투 중 함선을 공격하려는 모든 발사체나 빔을 저지하기 위한 전하가 가득한 장필드."
