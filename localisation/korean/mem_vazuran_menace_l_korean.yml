 REQUIRES_MEM_VAZURAN_DECISION_DISTRICT_SET:0 "§R도시 행성 또는 동등한 인프라가 필요합니다!§!"
 decision_mem_forge_world:0 "제작 공장 세계 만들기"
 decision_mem_forge_world_abolish:0 "제작 세계 폐지"
 decision_mem_forge_world_desc:0 "전문화된 세계를 창조하여 그 안에 천 개의 거대한 용광로가 타오르며, 행성의 생명선이 될 금속을 제련합니다. 내부의 불꽃에 의해 밝혀지고, 거대하고 강력한 기계에 의해 구동됩니다."
 decision_mem_forge_world_abolish_desc:0 "Xentronium과 관련된 모든 인프라를 제거합니다."
 tech_mem_vazuran_xentronium_armor:0 "젠트로늄 장갑"
 tech_mem_vazuran_xentronium_armor_desc:0 "이 초밀도 물자는 한때 바주란 선박에 극도의 내구성을 제공했습니다. 이는 알려진 다른 어떤 갑옷 유형보다 훨씬 우수합니다."
 tech_mem_vazuran_xentronium_armor_bio:0 "젠트로늄 갑옷"
 tech_mem_vazuran_xentronium_armor_bio_desc:0 "$tech_mem_vazuran_xentronium_armor_desc$"
 tech_mem_vazuran_xentronium_aura:0 "젠트로늄 플럭스 공간 조작"
 tech_mem_vazuran_xentronium_aura_desc:0 "초밀도 합금인 젠트로늄에 대한 지속적인 연구는 플럭스 필드 생성기와 관련된 놀라운 실험으로 이어졌습니다. 결과는 관통탄에 대한 우리 함선의 방어에 적용할 수 있는 가능성을 보여줍니다."
 tech_mem_vazuran_xentronium_hangar:0 "젠트로늄 드론 설계"
 tech_mem_vazuran_xentronium_hangar_desc:0 "최신 드론 기술과 운동 에너지를 통합할 수 있는 독특한 기회를 제공하는 Vazuran 잔해에서 공급된 드론입니다."
 REQUIRES_MEM_OBTAINED_VAZURAN_TECH:0 "패배한 §Y바주란 함대 또는 군대§!"
 tech_mem_vazuran_xentronium_rounds:0 "젠트로늄 탄약"
 tech_mem_vazuran_xentronium_rounds_desc:0 "이 초밀도 물자는 한때 바주란 선박에 극도의 내구성을 제공했습니다. 또한, 그 특성 덕분에 우리의 운동 에너지 탄약에 적합한 물자가 되었습니다."
 tech_mem_vazuran_damper_field_bypass:0 "완충막 관통"
 tech_mem_vazuran_damper_field_bypass_desc:0 "완충막 기술의 물리적인 법칙들을 깊숙이 이해하면 그것이 우리의 무기들에 끼치는 영향을 어느 정도 줄일 수 있을 것입니다."
 tech_mem_vazuran_rift_stabilization:0 "균열 안정화"
 tech_mem_vazuran_rift_stabilization_desc:0 "우리 과학자들은 바주란 함대가 우리 수도를 공격할 때 사용한 균열을 재현시킬 수 있다고 하며, 이를 통해 그들에게 반격을 가할 수 있다고 합니다."
 feature_mem_vazuran_rift_stabilization:0 "§H기능 잠금 해제:§! 균열 안정화"
 feature_mem_vazuran_rift_stabilization_desc:0 "§HRift Stabilization§!\n바주란이 우리 고향을 공격하기 위해 사용한 균열을 안정화할 수 있게 됩니다."
 tech_mem_vazuran_rift_travel:0 "균열 이동"
 tech_mem_vazuran_rift_travel_desc:0 "일반적인 웜홀과 피상적인 유사성이 있기는 하지만, 균열의 작동 방식과 균열의 완전히 인공적인 기원은 우리의 과학자들을 당황스럽게 합니다. 그래도 이 구멍을 통해 안전하게 이동하는 것은 현실이 될지도 모릅니다."
 feature_mem_vazuran_rift_travel:0 "§H기능 잠금 해제:§! 균열 여행"
 feature_mem_vazuran_rift_travel_desc:0 "§HRift Travel§!\n우리 함선이 균열을 통해 이동할 수 있습니다."
 mem_vazuran_wreckage_object:0 "바주란 함선 잔해"
 MEM_VAZURANS_ENERGY_DAMPENER:0 "에너지 완충막"
 mem_vazurans_aura_energy_dampener:0 "에너지 완충기"
 mem_VAZURAN_ARMOR:0 "젠트로늄 장갑"
 mem_VAZURAN_ARMOR_DESC:0 "이 초고밀도 물자는 한때 바주란 함선에 극도의 내구성을 제공했습니다. 이는 알려진 다른 어떤 갑옷 유형보다 훨씬 우수합니다."
 mem_XENTRONIUM_ARMOR_L:0 "대형 $mem_VAZURAN_ARMOR$"
 mem_XENTRONIUM_ARMOR_M:0 "중형 $mem_VAZURAN_ARMOR$"
