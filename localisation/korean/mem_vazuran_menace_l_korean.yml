 mem_VAZURAN_CARAPACE:0 "젠트로늄 갑옷"
 mem_VAZURAN_CARAPACE_DESC:0 "이 초밀도 물자는 한때 바주란 함선에 극도의 내구성을 제공했습니다. 이를 우리의 생체 함선의 갑옷에 주입하면 우리가 알고 있는 다른 어떤 갑옷 유형보다 우수하게 만들 것입니다."
 mem_XENTRONIUM_CARAPACE_SMALL:0 "작은 $mem_VAZURAN_CARAPACE$"
