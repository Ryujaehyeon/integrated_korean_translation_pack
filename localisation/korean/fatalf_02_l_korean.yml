l_korean:
 OVERGROWTH:0 "$terraformation_nucleus_side_effect$"
 edict_fatalf_manager:0 "치명적 토대 관리자"
 edict_fatalf_manager_desc:0 "이 메뉴를 사용해 치명적 토대 이벤트의 여러 요소를 변경합니다. 불안정성은 무작위 이벤트와 이상 현상의 발생 가능성을 결정합니다. 나머지는 특정 이벤트와 위기의 발생 가능 여부를 결정합니다."
 fatalf.054.desc:0 "흥미롭게도, 현재 활성화된 각 $lgate$가 일련의 맥동을 방출하기 시작했으며, 우리의 센서는 은하 초공간로 네트워크가 붕괴하기 시작했음을 감지했습니다. 원인은 은하의 모든 $lgate$에서 비롯되는 것으로 보이며, 이는 어떤 제국이 각 관문을 통제해 연구하기 전까지 초공간로가 계속 예측 불가능하게 변할 것임을 의미합니다."
 fatalf.054.title:0 "$lgates$ 재활성화"
 fatalf.055.desc:0 "이제 L-성단이 개방되면서 $lgates$가 최대 출력으로 가동되기 시작했습니다. 하지만 이상하게도 장거리 센서는 그곳에서 초공간로 네트워크를 교란하는 일련의 강력한 맥동을 감지하고 있습니다. 원인을 찾고 싶다면 은하의 각 $lgate$를 통제해야 합니다."
 fatalf.055.title:0 "초공간로 교란"
 fatalf.057.desc:0 "각 $lgate$를 통제한 결과 초공간로 교란의 비밀이 드러났습니다. 각 $lgate$에는 자연 초공간 우회로에서 에너지를 빨아들이는 거대한 기계의 일부인 신호 장치가 있는 듯합니다. 이들은 자연 발생 현상과는 현저히 다른 방향으로 에너지를 보내고 있습니다. 기계를 최대 출력으로 활성화하면 은하의 지형은 바뀌겠지만, 초공간로 연결을 잃은 온전한 성계들도 드러날 것입니다."
 fatalf.057.title:0 "초공간로 기계"
 fatalf.059.desc:0 "이전에는 전혀 감지되지 않았던 여러 성계가 은하 곳곳에 갑자기 나타났습니다. 흥미롭게도 각 성계는 여러 항성으로 이루어져 있으며, 행성이나 다른 천체는 전혀 없는 것으로 보입니다."
 fatalf.059.title:0 "예상치 못한 성계"
 fatalf.060.desc:0 "우리 제국의 시민 수천 명이 갑자기 하던 일을 멈추고, 알 수 없는 설계의 구조물을 짓기 위해 재료를 모으기 시작했습니다. 영향을 받은 이들과 대화를 시도했지만 모두 실패했습니다."
 fatalf.060.title:0 "이상한 행동"
 fatalf.061.desc:0 "머지않아 구조물들이 완성되었습니다. 영향을 받은 모든 시민은 이제 가만히 선 채 동시에 말하고 있습니다.\n§M<우리 건축가 우리 돕는다 나쁘지 않다 성공 원한다 모두 신경 쓰지 않는다 승리 원한다 고난 온다 도움 받아들여 개입한다>"
 fatalf.061.title:0 "건축가들"
 fatalf.061_a_tooltip:0 "모든 §Y[Root.Owner.GetSpeciesName]§! 팝에게 §Y$trait_architect_adaptive_good$§! 특성을 부여하여: \n- ['trait:trait_architect_adaptive_good']\n- ['trait:trait_architect_adaptive_bad']"
 fatalf.061_b_tooltip:0 "모든 §Y[Root.Owner.GetSpeciesName]§! 팝에게 §Y$trait_architect_intelligent_good$§! 특성을 부여합니다. 효과:\n§Y과학 산출량§! +10%, §Y$MOD_POP_GOVERNMENT_ETHIC_ATTRACTION$§! -30%"
 fatalf.061_c_tooltip:0 "모든 §Y[Root.Owner.GetSpeciesName]§! 팝에게 §Y$trait_architect_industrious_good$§! 특성을 부여합니다. 효과:\n§Y광물 및 $consumer_goods$ 산출량§! +10%, §Y식량 성장§! -15%"
 fatalf.064.desc:0 "우리가 수수께끼의 제안을 받아들이자, 구조물들은 격렬하게 흔들리기 시작하다가 무너져 내렸습니다. 눈에 띄는 변화는 없어 보입니다.\n\n§M<가치 만들라 좋을지도 순환 같음 나중 나쁜 순환 너희>"
 fatalf.064.title:0 "좋음"
 fatalf.065.desc:0 "우리가 수수께끼의 제안을 거절하자, 영향을 받은 모든 이들이 즉시 땅에 쓰러져 죽었습니다.\n\n§M<너희 어리석다 우리 돕는다 너희 아니다>"
 fatalf.065.title:0 "어리석음"
 fatalf.071.desc:0 "나는 [lost_country.GetName]의 [lost_country.GetRulerTitle] [lost_country.GetRulerName]입니다. 갑작스러운 도착을 용서해 주십시오. 시간이 촉박했고, 우리 제국은 도저히 구제할 수 없을 만큼 길을 잃었기에, 우리가 연구하던 차원 균열을 통해 도망쳐 왔습니다. 우리가 보기에는 우리는 당신들과 같지만 다른 길을 걸어온 존재입니다. 그래서 당신들이 우리를 도와주기를 바랍니다. 우리에게는 시민이 너무 많고, 자원은 너무 적습니다. 도와주시겠습니까?"
 fatalf.071.response:0 "우리 기술은 얼마 전 당신들과 비슷한 수준까지 발전했지만, 우리는 중대한 실수를 저질렀습니다. 우리가 연구하던 해로운 균류가 빠르게 변이하여 치명적인 병원체가 되었습니다. 원인을 알아냈을 때는 이미 우리 제국 전체가 영향을 받은 뒤였습니다. 우리는 아직 살아 있던 소수에게 줄 백신을 만들 수 있었고, 남은 모든 자원을 들여 이전에 발견한 균열을 통과할 방법을 찾았습니다."
 fatalf.072.desc_01:0 "당신은 [lost_country.GetName]에서 온 새로운 이주민들을 우리 제국에 받아들였습니다. 그들은 매우 감사해하며, 사회에서 어떤 역할이든 충실히 수행하겠다고 약속했습니다. 나머지 인구는 은하로 나아가 확장을 시작했습니다."
 fatalf.072.desc_02:0 "당신은 어렵게 모은 자원 일부를 [lost_country.GetName]에 제공했습니다. 그들은 매우 감사해하며, 이제 필요한 물자를 얻었으므로 은하로 나아가 확장을 시작했습니다."
 fatalf.072.desc_03:0 "당신은 [lost_country.GetName]에 아무것도 제공하지 않았습니다. 그들은 만족하지는 않지만 이해합니다. 그들은 제국을 재건할 준비를 하고 은하로 떠났습니다."
 fatalf.073.desc:0 "우리의 행성 및 항성기지 방어망은 은하의 문턱에 나타난 식민선을 손쉽게 찢어버렸습니다. 그들의 나머지 함선들은 아직 은하 어딘가에 있으며, 그들은 결코 기뻐하지 않을 것입니다."
 fatalf.073.title:0 "발포하라!"
 fatalf.074.desc:0 "§Y[From.GetName]§!을 조사하던 중, 과학자 §Y[Root.Leader.GetName]§!이 함선에서 수수께끼처럼 사라졌습니다. 그가 어디로 갔는지, 또는 어떻게 되었는지 알 수 있는 단서는 없습니다."
 fatalf.074.title:0 "사라진 과학자"
 fatalf.075.desc:0 "아무런 예고도 없이, 우리 과학자가 §Y[Root.GetName]§!에 다시 나타났습니다. 어디로 사라졌었는지 묻자, 그는 손대지 않은 완벽한 행성의 표면으로 수수께끼처럼 옮겨졌다고 말했습니다. 그는 이 성계 안에 불확실성과 예측 불가능성이 극도로 높은 자연 웜홀이 있을 가능성이 크며, 적절한 노력을 기울이면 이를 안정화해 그 행성으로 이동할 수 있다고 믿고 있습니다."
 fatalf.075.title:0 "떠도는 웜홀"
 fatalf.076.desc:0 "우리는 떠도는 웜홀을 일시적으로 안정화하는 데 성공했으며, 이제 남은 것은 함선을 통과시키는 일뿐입니다. 첫 배치 이후에도 열린 상태가 유지된다는 보장은 없으므로, 우리는 첫 배치를 위해 할 수 있는 모든 준비를 해야 합니다."
 fatalf.077.desc:0 "우리 함선들이 웜홀을 통과한 직후, 웜홀은 닫히며 성계 전체에 거대한 에너지 폭발을 방출했고 은하 전역의 센서를 교란했습니다. 그 성계에 있던 모든 함선이 사라졌습니다. 하지만 이상하게도 웜홀은 자연 웜홀에 걸맞은 크기로 커졌고, 제대로 안정화되었으며, 어딘가 새로운 곳으로 이어지고 있습니다. 우리는 다시 개척민들을 볼 수 있을까요?"
 fatalf.077.title:0 "에너지 방출"
 fatalf.078.desc:0 "안타깝게도 시간이 다 되었습니다. 일시적으로 안정화되었던 웜홀은 닫혔고, 반대편에 있던 것이 무엇이든 우리에게서 영원히 사라졌습니다."
 fatalf.078.title:0 "기회의 소멸"
 fatalf.079.desc:0 "안타깝게도 이 성계 어디에서도 우리 함선들을 찾을 수 없는 듯합니다. 이곳에 없다면 대체 어디에 있는 걸까요? 우리는 영영 알 수 없을지도 모릅니다."
 fatalf.079.title:0 "새로운 성계"
 fatalf.151.desc:0 "§Y[eaten_sun.GetName]§!에서 이상한 신호가 나오고 있습니다. 이 신호는 우리 은하, 어쩌면 이 우주에서조차 기원할 수 없어 보입니다. 아직 아무 일도 일어나지 않았지만, 계속 주시해야 합니다."
 fatalf.151.title:0 "항성 신호"
 fatalf.153.desc:0 "이상한 신호가 나오던 §Y[eaten_sun.GetName]§! 성계가 우리의 센서에서 완전히 사라졌습니다! 그 안의 모든 것은 알 수 없는 어딘가로 사라졌습니다."
 fatalf.153.title:0 "삼켜진 성계"
 fatalf.161.desc:0 "§Y[Root.GetHomeWorldName]§!에서 수많은 시민들이 이상하고 초현실적인 꿈을 꾸고 있다고 호소한다는 보고가 들어왔습니다. 꿈은 사람마다 다른 듯하지만, 그 의미에 대해서는 누구도 의견을 모으지 못하고 있습니다."
 fatalf.161.title:0 "이상한 꿈"
 fatalf.162.desc:0 "우리 지도자 §Y[fatalf_dream_leader.GetName]§!이 당신에게 [fatalf_dream_leader.GetSheHe] 역시 꿈을 꾸고 있으며, 누군가가 소통하려 한다고 믿고 있다고 털어놓았습니다."
 fatalf.162.title:0 "더 많은 꿈"
 fatalf.163.desc:0 "§M<보다 우리 너희 우리를 받아들여 그것을 받아들여 더 좋게 만들라 앞서 가라 받아들여>§!"
 fatalf.163.tip:0 "§M<우리가 너희를 돕는다>§!"
 fatalf.163.title:0 "청취"
 fatalf.171.desc:0 "§Y[Root.GetHomeWorldName]§! 근처에서 거대한 에너지 급증이 감지되었습니다. 무언가가 오고 있지만, 그것이 무엇인지는 알 방법이 없습니다."
 fatalf.171.title:0 "에너지 급증"
 fatalf.259.desc:0 "수동 스캐너가 [fatalf_hyperlane_1.GetName]와 [fatalf_hyperlane_2.GetName] 사이에 곧 새로운 초공간로가 나타날 것임을 표시했습니다. 제한된 시간 동안만 안정적일 것이므로, 이용할 수 있을 때 활용해야 합니다."
 fatalf.259.title:0 "초공간로 가교"
 fatalf.400.desc:0 "안녕하십니까, [Root.GetName]. 평생에 몇 번 없을 거래를 제안하러 왔습니다. 우리는 '스피카'라고 부르는 독특한 자원의 대규모 매장지를 발견했습니다. 유기체의 수명과 집중력을 극적으로 증가시키죠. 다만 금단 증상은 다소 불편할 수 있습니다. 어떻습니까? 이런 기회는 다시 오지 않을 것입니다!"
 fatalf.400.name:0 "독특한 거래"
 fatalf.400.tip:0 "§R하나쯤은 괜찮겠지.§!"
 fatalf.4011.desc:0 "다시 뵙는군요, [Root.GetName]. 안타깝게도 스피카를 더 채취하는 데 약간의 어려움이 생겼습니다. 아직 드릴 물량은 있지만, 전보다 조금 더 비쌀 것입니다. 믿어 주십시오. 이런 일은 다시 일어나지 않을 것이라고 확신합니다."
 fatalf.4011.name:0 "스피카 갱신"
 fatalf.4011.tip:0 "§R한 번만 더...§!"
 fatalf.machine_activate.tip:0 "§R초공간로 네트워크가 완전히 재설정되지만, 숨겨진 성계도 드러납니다.§!"
 fatalf.machine_dismantled.tip:0 "§R초공간로 네트워크가 안정화되며, 발견된 효과로 아공간 이동이 더 빨라집니다.§!"
 fatalf.machine_running.tip:0 "§R초공간로 네트워크는 계속 불안정하게 유지되며, 연구 기회도 남아 있습니다.§!"
 fatalf_hyperlane_1.desc:0 "곧 이곳에 새로운 임시 초공간로가 나타날 예정입니다. 최대 1년 정도만 지속될 것으로 예상됩니다."
 fatalf_hyperlane_1.name:0 "새 초공간로 위치"
 fatalf_mysterious_portal:0 "수수께끼의 포털"
 fatalf_mysterious_portal_desc:0 "이 포털과 포털이 내보내는 것들을 연구할 수 있습니다."
 fatalf_spica:0 "스피카 섭취"
 fatalf_spica_text:0 "스피카 섭취"
 fatalf_spica_withdrawl:0 "스피카 금단"
 name_list_Overgrowth:0 "$terraformation_nucleus_side_effect$"
 opinion_fatalf_lost_country:0 "창립 식민지를 지원함"
 opinion_fatalf_shot_colony:0 "우리의 진입 함선에 발포함!"
 shipsize_seed_ship_build_cost_mult:0 "$fatalf_seed_ship$"
 shipsize_seed_ship_construction_speed_mult:0 "$fatalf_seed_ship$"
 shipsize_seed_ship_upkeep_mult:0 "$fatalf_seed_ship$"
