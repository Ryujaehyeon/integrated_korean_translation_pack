l_korean:
 mem_ancient_robots.201.name:0 "최초의 지성체"
 mem_ancient_robots.201.desc:0 "우리가 유망한 지역을 탐사하는 동안, 우리의 식민지 광산 기업은 §Y[Root.GetName]§!에서 놀라운 발견을 하였습니다. 그들은 수백만 년 된 것으로 보이는 고대 인류형 로봇의 조각을 발견하였습니다. 이 발견은 우리가 이 행성을 최초로 지능적 생명체가 거주한 것이라는 가정을 반박합니다. 이 선행 문명에 대한 더 많은 정보를 얻기 위해서는 행성에 대한 보다 철저한 스캔이 필요할 것입니다."
 mem_ancient_robots.201.a:0 "조사를 시작해!"
 MEM_ANCIENT_ROBOTS_PROJECT:0 "추가적 행성 조사"
 MEM_ANCIENT_ROBOTS_PROJECT_DESC:0 "우리 과학 공동체는 고대 [This.GetName] §Y§!에 대한 보다 철저한 스캔을 수행할 것을 촉구합니다. 이를 통해 고고학적 발굴을 위한 유망한 장소를 파악할 수 있을 것입니다. 그들은 우리가 한때 이 행성을 거주했던 고대 선조 문명에 대해 더 많은 것을 밝혀낼 수 있다고 강조합니다."
 mem_ancient_robots.203.name:0 "산이... 아니네?"
 mem_ancient_robots.203.desc:0 "우리 과학자들은 §Y[Root.GetName]§!에 대한 무의미한 스캔을 마침내 중단해 달라고 애원하고 있었을 때, 산이 - 아니, 적어도 우리가 이전에 산이라고 믿었던 것이 - 다른 무언가로 드러났습니다. 그것이 무엇인지 구체적으로는 아직 알려지지 않았지만, 한 가지는 확실합니다: 그것은 금속으로 만들어졌으며, 그 양이 엄청납니다. §Y[From.leader.GetName]§!는 바위 아래에 무엇이 있는지 알아내기 위해 발굴을 제안했습니다.\n\n이 작업에 대한 예상 비용은 1000£energy£와 1000£minerals£입니다."
 mem_ancient_robots.203.a:0 "진행해!"
 mem_ancient_robots.203.b:0 "나중에 다시 보고하도록."
 mem_ancient_robots.203.c:0 "아니. 필요없을 듯 하군."
 mem_ancient_robots.204.name:0 "발굴 계획"
 mem_ancient_robots.204.desc:0 "§Y[Root.GetName]§!의 과학 공동체는 그들의 행성에 여전히 해결되지 않은 주요 미스터리가 남아 있음을 상기시키고 싶어 합니다. 기괴한 금속 산의 발굴 계획은 지금까지 연기되었습니다. 우리의 과학자들은 다시 한 번 이 사업을 지원해 줄 것을 요청합니다.\n\n이 사업의 예상 비용은 1000£energy£와 1000£minerals£입니다."
 mem_ancient_robots.204.a:0 "진행해!"
 mem_ancient_robots.204.b:0 "나중에 다시 보고하도록."
 mem_ancient_robots.204.c:0 "아니. 필요없을 듯 하군."
 MEM_ANCIENT_ROBOTS_PROJECT_2:0 "수수께끼 발굴"
 MEM_ANCIENT_ROBOTS_PROJECT_2_DESC:0 "필요한 자금을 모으고 난 후에, 건설업자들이 마침내 불가사의한 금속 산을 조사하는 작업을 시작할 수 있었습니다. 산 전체를 파내는 것은 하루 만에 끝나는 작은 작업이 아닙니다."
 mem_ancient_robots.206.name:0 "고대 공장"
 mem_ancient_robots.206.desc:0 "이전 스캔 덕분에 발굴팀은 두꺼운 암석층 아래에서 외계 구조물을 발견했을 때도 놀라지 않았습니다. 그들을 놀라게 한 것은 구조물의 존재가 아니라 수백만 년이라는 시간의 흐름을 이겨내고 온전히 존재하던 구조물의 상태였습니다. 이미 조사팀이 부품 제작 공장에 연결된 로봇 조립 공장으로 보이는 건물에 진입했습니다. 거기에 있던 일부 로봇들은 연구실로 보내져 한창 연구가 진행 중입니다. 그동안 연구팀은 구조물 안에 전진기지를 세웠습니다. 고대 기계를 일부만이라도 작동시킬 수 있게 연구하고 있습니다."
 mem_ancient_robots.206.a:0 "대단하군! 계속해."
 mem_ancient_robots.207.name:0 "고대 공장"
 mem_ancient_robots.207.desc:0 "사적인 투자자들이 몇 년 전 우리가 발견한 이상한 산맥 아래에 어떤 신비가 숨겨져 있는지 알아보기 위해 §Y[Root.GetName]§!에서 발굴 작업을 자금 지원한 것 같습니다. 처음에는 그들의 사업이 매우 수익성이 있다고 판단했지만, 그들의 발견의 중요성을 깨닫고 우리에게 알리지 않을 경우 법적 조치를 받을 수 있다는 사실에 직면하자, 그들은 지역 총독에게 연락했습니다. 수많은 암석 아래에는 한 종류의 로봇을 대량 생산하는 데 사용되었던 인상적인 구조물이 있습니다. 일부 유닛은 이미 연구소로 보내져 더 면밀한 조사를 받고 있으며, 현장에 있는 우리의 과학 팀은 그 복잡한 구조물에 더 깊이 들어갈 준비를 하고 있습니다."
 mem_ancient_robots.207.a:0 "현명한 선택이군. 계속해."
 MEM_ANCIENT_ROBOTS_PROJECT_3:0 "고대 로봇 분석"
 MEM_ANCIENT_ROBOTS_PROJECT_3_DESC:0 "우리 과학자들은 선구자 공장에서 발견된 고대 로봇을 연구하기를 열망하고 있습니다."
 mem_ancient_robots.208.name:0 "껍질 속의 유령"
 mem_ancient_robots.208.desc:0 "과학자들이 식민지 에너지망에 복합단지를 연결하자, 일부만 작동시켜보자는 의도와는 다르게 얼떨결에 모든 복합단지를 활성화해버리게 되었습니다. 이 때문에 식민지 도시들에 일시적 정전이 일어나버렸습니다. 처음 혼란이 수습된 이후에 작은 드론들이 비행하며 구조물에 가해진 피해를 복구하는 것을 발견했습니다. 그중에서도 가장 흥미로운 발견은 시설을 작동시키는 AI였습니다. 군사용 시설로 보이기는 하나, 우리 말을 순순히 따르고 주인으로 받아들이는 것처럼 보입니다."
 mem_ancient_robots.208.a:0 "그래야지."
 mem_ancient_robots.209.name:0 "성의 왕"
 mem_ancient_robots.209.desc:0 "과학자들이 식민지 에너지망에 복합단지를 연결하자, 일부만 작동시켜보자는 의도와는 다르게 얼떨결에 모든 복합단지를 활성화해버리게 되었습니다. 이 때문에 식민지 도시들에 일시적 정전이 일어나버렸습니다. 정전에서 복구가 되자마자 연구팀으로부터 AI가 시설의 통제권을 가져갔다는 소식을 듣게 되었습니다. 그 이후로 아무런 연구팀과 아무런 통신도 되고 있지 않습니다. 궤도 위성에서 송신되는 정보에 따르면 시설에서 로봇 군대가 쏟아져 나오고 있다고 합니다. 식민지 주둔군은 현재 초경계 태세에 들어갔습니다."
 mem_ancient_robots.209.a:0 "지원군을 보내!"
 mem_ancient_robots.210.name:0 "성의 왕"
 mem_ancient_robots.210.desc:0 "§Y[Root.GetName]§!의 고대 공장을 관리하던 AI가 갑자기 멋대로 굴기 시작했습니다. 복합단지에서 로봇 군대가 쏟아져 나오고 있습니다. 식민지 주둔군은 이 긴급 사태에 제대로 대응하지 못하고 위치를 고수하는 데에 고전하고 있습니다. 당장 지원군을 보내 달라고 요청하고 있으며, 요청에 불응하면 식민지가 함락당할 것입니다."
 mem_ancient_robots.210.a:0 "지원군을 보내!"
 mem_under_siege:0 "계속되는 충돌"
 mem_under_siege_desc:0 "지속되는 충돌 사태가 행성의 경제를 나락으로 떨어뜨리고 있습니다."
 mem_ancient_robots.211.name:0 "공세 우위를 점함"
 mem_ancient_robots.211.desc:0 "우리 군대는 로봇들을 그들의 출처로 되돌려 보낼 수 있었습니다. 그러나 우리 장군들이 공장이라고 부르는 항성 성채에 대한 공격은 적절한 준비와 상당한 지상군 없이는 무의미할 것입니다. 그들은 항성 성채를 탈환하기 위한 군사 작전 계획을 세웠습니다. 우리의 지상군이 준비되는 대로 우리는 포위를 시작할 수 있습니다."
 mem_ancient_robots.211.a:0 "준비를 시작한다."
 mem_ancient_robots.212.name:0 "식민지 유린"
 mem_ancient_robots.212.desc:0 "우리의 식민지 방어군이 기계들에 의해 점령당했습니다. 우리의 개척민들은 도망치고 있으며 식민지 외곽에 숨어 있지만, 로봇들은 이미 그들을 추적하기 시작했습니다. 우리는 그들을 물리쳐야 합니다!"
 mem_ancient_robots.212.a:0 "군대를 보내!"
 MEM_SIEGE_PROJECT:0 "요새 포위"
 MEM_SIEGE_PROJECT_DESC:0 "우리의 모든 군대가 자리를 잡았습니다. 포병대의 제압 사격으로 로봇 군대가 수세에 몰렸고 그 와중에 우리 군대는 돌파를 위한 마지막 돌격을 준비하고 있습니다."
 mem_ancient_robots.213.name:0 "멸망의 날"
 mem_ancient_robots.213.desc:0 "마지막 공격이 시작되었습니다. 모든 군대가 요새를 향해 전면적인 공격을 가하기 시작했습니다."
 mem_ancient_robots.213.a:0 "승리를 위하여!"
 mem_ancient_robots.214.name:0 "승리!"
 mem_ancient_robots.214.desc:0 "공격은 성공적이었습니다. 우리의 군대는 항성 성채의 중심에 도달하여 AI의 처리 코어를 비활성화했습니다. AI의 통제를 벗어난 후, 남아 있는 모든 로봇은 스스로 비활성화되었습니다. 전투가 끝난 후, 우리의 군인들은 이제는 정지된 AI 코어 근처에서 역사적 문서부터 과학적 통찰에 이르기까지 다양한 유용한 데이터를 포함한 고대 데이터 캐시를 발견했습니다.\n\n이 공장이 다시 우리의 통제 하에 들어오면서, 우리는 남아 있는 희귀 자원을 사용하여 우리 군대에 필요한 제한된 수의 로봇을 제작할 수 있습니다. 아마도 이것들이 우리의 적들에 대해 우위를 점할 수 있게 해줄 것입니다."
 mem_ancient_robots.214.a:0 "군인들을 위한 개선식을 올려라!"
 mem_ancient_robots.215.name:0 "심판의 날"
 mem_ancient_robots.215.desc:0 "우리 군대는 함정에 그대로 빠졌습니다. 전투는 우리의 장군들이 함정이 발동되었다는 사실조차 알기 전에 끝났습니다. 로봇들이 공격하는 군대를 둘러싼 땅에서 쏟아져 나와 그들을 완전히 방심하게 만들었습니다. 그 직후, 우리는 지상 인원과의 모든 연락을 잃었습니다. 궤도 위성은 우리의 패배 이후에 무슨 일이 일어났는지를 보여줍니다: §Y[FROM.FROM.GetName]§!는 이제 거주 불가능합니다 - 우리의 이해를 훨씬 초월하는 기술을 획득하려는 실패한 시도의 거대한 묘지이자 기념물입니다."
 mem_ancient_robots.215.a:0 "끔찍하군!"
 mem_ancient_robots.220.name:0 "고대 로봇"
 mem_ancient_robots.220.desc:0 "이 회수된 로봇 유닛들은 수백만 년이 지났음에도 불구하고, 우리 과학자들이 현재 기술 수준으로는 재현할 수조차 없는 매우 고급 설계로 보입니다. 이들은 모든 부품이 전쟁을 외치듯 단 하나의 목적을 위해 만들어진 것 같습니다. 우리는 이들을 복제할 수는 없지만, 고급 로봇 공학에 대한 우리의 연구는 이 발견으로 인해 큰 혜택을 받을 것입니다."
 mem_ancient_robots.220.a:0 "훌륭해."
 mem_ancient_robots.225.name:0 "고립"
 mem_ancient_robots.225.desc:0 "포위 공격으로 많은 생명이 죽었습니다. 소수의 시민만이 안전한 지역에서 당분간 자신을 스스로 지킬 수 있었습니다."
 mem_ancient_robots.225.a:0 "그들을 구해야해!"
 d_mem_ancient_robots_factory_closed:0 "고대의 복합단지"
 d_mem_ancient_robots_factory_closed_desc:0 "아직 탐험되지 않은 고대의 복합단지입니다."
 d_mem_ancient_robots_factory:0 "고대 AI 공장"
 d_mem_ancient_robots_factory_desc:0 "고대 AI 공장이 산 아래에서 발견되었습니다."
 mem_super_robot_army:0 "전쟁로봇 군대"
 mem_super_robot_army_plural:0 "전쟁로봇 군대"
 mem_super_robot_army_desc:0 "이 기계적 전사들은 우리가 스스로 생산할 수 있는 것을 훨씬 초월하는 고대 기술의 산물입니다."
 mem_super_robot_army_limit_tooltip:0 "자동화된 공장은 이제 우리의 완전한 통제하에 있지만, 제한된 수의 군대를 만들 만큼의 부품만을 가지고 있습니다."
 mem_evil_robot_army:0 "전쟁로봇 군대"
 mem_evil_robot_army_plural:0 "전쟁로봇 군대"
 mem_evil_robot_army_desc:0 "이 기계적 전사들은 우리가 스스로 생산할 수 있는 것을 훨씬 초월하는 고대 기술의 산물입니다."
 d_mem_strange_mountain:0 "£blocker£ 이상한 산"
 d_mem_strange_mountain_desc:0 "이 산은 뭔가 이상합니다..."
 mem_ancient_robots_chain_title:0 "고대 유산"
 mem_ancient_robots_chain_desc:0 "과학자들은 먼 과거의 유물을 발굴했습니다."
