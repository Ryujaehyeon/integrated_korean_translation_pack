l_korean:
 mem_lunar_gate.2.name:0 "루나 게이트"
 mem_lunar_gate.2.desc:0 "[mem_lunar_gate_moon.GetName]에 있는 탐광꾼들이 달 자체에 장거리 웜홀 생성기를 건설할 수 있는 독특한 원소의 대규모 광맥을 발견했습니다! 현재 우리가 알고 있는 웜홀과 자연 게이트와는 달리, 제안된 웜홀 게이트는 [mem_lunar_gate_planet.GetName]를 우리 우주 내 모든 다른 식민지와 동시에 연결할 것입니다!\n\n하지만 몇 가지 문제가 있습니다: 첫째, Lunar Gate에 의해 생성된 웜홀은 우리의 표준 우주선 설계와 완전히 호환되지 않습니다. 웜홀이 현재 이해하고 있는 웜홀 기술보다 훨씬 작고 불안정하기 때문에 소형 민간인 우주선만이 게이트에 접근하고 사용할 수 있습니다. 우리의 군사와 민간인 우주선에게는 불편하겠지만, 이 게이트는 다른 식민지와 거의 즉각적인 연락을 제공함으로써 식민지 경제를 크게 증대시킬 것입니다.\n\n둘째, Lunar Gate는 완전히 새로운 웜홀 이론을 활용하므로 테스트되지 않았습니다. 우리의 표준 웜홀 이론은 웜홀이 시스템의 중력장 밖에만 존재해야 한다고 요구합니다. [mem_lunar_gate_moon.GetName]의 독특한 원소는 이 제약을 우회할 수 있게 해주지만, 실패의 위험은 상당합니다.\n\n마지막으로, Lunar Gate의 건설은 비용이 발생합니다: 게이트를 건설하기 위해 상당한 투자가 필요할 것입니다."
 mem_lunar_gate.2.a:0 "위험보다 이득이 많을 것 같군."
 mem_lunar_gate.2.b:0 "너무 도박이다. 희귀 자원들이나 연구하도록."
 mem_lunar_gate.2.c:0 "그럴 가치가 없다. 희귀 자원들이나 연구하도록."
 mem_lunar_gate.2.d:0 "아직 자원이 부족하다. 자원 축적을 시작하라."
 mem_lunar_gate.2.new:0 "흥미롭군."
 mem_lunar_gate.2.new.tooltip:0 "$mem_lunar_gate_construct_decision$와(과) $mem_lunar_gate_research_decision$결정이 [mem_lunar_gate_planet.GetName]에서 해금됩니다."
 mem_lunar_gate.3.name:0 "루나 게이트를 건설할 마지막 기회"
 mem_lunar_gate.3.desc:0 "[mem_lunar_gate_planet.GetName]의 세력들이 우리가 루나 게이트와 관련하여 결단을 내리길 압박하고 있습니다. 아무래도 지방 정부가 이렇게 큰 투자를 망설이고 있는 듯합니다. 루나 게이트를 건설하고 싶다면 지금 시작해야 합니다. 만약에 루나 게이트를 지을 충분한 자원을 모아놓지 않았다면 정부에 대한 식민지 사람들의 신뢰가 바닥칠 것입니다."
 mem_lunar_gate.3.a:0 "위험보다 이득이 많을 것 같군."
 mem_lunar_gate.3.b:0 "너무 도박이다. 희귀 자원들이나 연구하도록."
 mem_lunar_gate.3.c:0 "그럴 가치가 없다. 희귀 자원들이나 연구하도록."
 MEM_LUNAR_GATE_PROJECT:0 "루나 게이트 건설"
 MEM_LUNAR_GATE_PROJECT_DESC:0 "[mem_lunar_gate_moon.GetName]에 있는 달 게이트의 건설에는 새로운 소형 웜홀 기술을 개척할 우리의 최고의 과학자 중 한 명이 필요합니다. 달 게이트의 건설로 [mem_lunar_gate_planet.GetName]의 경제는 우리가 식민지화한 모든 공간에 민간인이 빠르게 접근할 수 있게 되어 혁신을 맞이할 것입니다."
 mem_lunar_gate.4.name:0 "루나 게이트 완성"
 mem_lunar_gate.4.desc:0 "[mem_lunar_gate_moon.GetName]의 루나 게이트 건설이 성공적으로 완성되었고 벌써 [mem_lunar_gate_planet.GetName]의 경제를 혁신하고 있습니다. 다른 식민지로의 이동 시간이 거의 0에 가까워진 지금 경제 성장률이 모든 예상을 웃돌고 있습니다. 아직 루나 게이트가 문제를 일으킬지도 모르기에 [mem_lunar_gate_planet.GetName]을 자세히 관찰해야 하지만, 루나 게이트 프로젝트는 성공적이었다고 단언할 수 있을 듯합니다."
 mem_lunar_gate.5.name:0 "루나 게이트 재앙"
 mem_lunar_gate.5.desc:0 "[mem_lunar_gate_moon.GetName]에서의 사고로 인해 달 게이트에 재앙이 발생했습니다! 게이트를 테스트하는 과정에서 중력 이상 현상이 발생하여 거대한 웜홀을 생성하였고, 이로 인해 달이 찢어졌습니다. 말할 필요도 없이, 달 게이트는 [mem_lunar_gate_moon.GetName]와 함께 사라졌습니다. 이전 달의 거대한 파편들이 [mem_lunar_gate_planet.GetName]에 비처럼 쏟아지고 있으며, 이미 여러 지역을 파괴하여 그 인구에 큰 피해를 주었습니다. 또한, [mem_lunar_gate_moon.GetName]의 잔해가 [mem_lunar_gate_planet.GetName]의 환경에 영향을 미치고 있으며, 전 세계적으로 건강 문제를 일으키고 있습니다. 식민지가 회복되기까지는 상당한 시간이 걸릴 것입니다."
 mem_lunar_gate.5.a:0 "비극이군!"
 mem_lunar_gate.6.name:0 "루나 게이트 붕괴"
 mem_lunar_gate.6.desc:0 "[mem_lunar_gate_moon.GetName]에서의 사고로 인해 달 게이트에 재앙이 발생했습니다! 게이트를 테스트하는 동안 웜홀이 붕괴되어 미세 블랙홀이 생성되어 [mem_lunar_gate_moon.GetName]를 삼켜버렸습니다! 다행히도 새로운 블랙홀은 [mem_lunar_gate_planet.GetName] 주위를 안정적으로 공전하고 있으며 [mem_lunar_gate_planet.GetName]에 간섭하는 것 같지 않습니다. 현재 우리의 예측으로는 이 밀레니엄 안에 블랙홀이 증발할 것으로 보이지 않으므로, 지금은 식민지가 안전합니다. 다른 것이 없다면, 적어도 새로운 블랙홀은 우리에게 흥미로운 연구 대상을 제공할 것입니다."
 mem_lunar_gate_broken_promise:0 "약속을 깨다"
 mem_lunar_gate_broken_promise_desc:0 "달 게이트 건설에 대한 논의는 아무것도 이루어지지 않았습니다."
 mem_lunar_gate_completed:0 "루나 게이트"
 mem_lunar_gate_completed_desc:0 "달 게이트는 민간인 선박에 대한 장거리 웜홀 접근을 제공합니다."
 mem_lunar_gate_access:0 "루나 게이트 이용"
 mem_lunar_gate_access_desc:0 "식민지로 개발된 모든 세계에 거의 즉각적으로 접근할 수 있게 되어 지역 경제가 활성화되었습니다."
 mem_lunar_gate_catastrophe:0 "루나 게이트 실패"
 mem_lunar_gate_catastrophe_desc:0 "실패한 달 게이트가 달을 파괴했습니다."
 mem_lunar_gate_pollution:0 "루나 게이트 재앙"
 mem_lunar_gate_pollution_desc:0 "루나 게이트와 파괴된 위성의 잔해가 이 행성의 환경을 오염시킵니다."
 mem_lunar_gate_former_moon:0 "위성. 이었던 것"
 mem_lunar_gate_former_moon_desc:0 "달 게이트 실험은 블랙홀에 의해 달이 소멸되면서 종료되었습니다."
 mem_lunar_gate_success_tooltip:0 "실험은 성공했으며 루나 게이트가 작동 중입니다."
 mem_lunar_gate_disaster_tooltip:0 "실험이 대실패하다."
 mem_lunar_gate_unexpected_tooltip:0 "예상하지 못한 결과."
 mem_lunar_gate_construct_decision:0 "루나 게이트 건설"
 mem_lunar_gate_construct_decision_desc:0 "루나 게이트 건설을 시도합니다. 이 프로젝트는 많은 잠재능력을 보유하고 있지만, 위험성이 없는 것도 아닙니다."
 mem_lunar_gate_research_decision:0 "루나 게이트의 원리 연구"
 mem_lunar_gate_research_decision_desc:0 "루나 게이트를 건설하는 것은 너무 위험합니다. 연구만 합시다."
 d_mem_lunar_gate_completed:0 "루나 게이트"
