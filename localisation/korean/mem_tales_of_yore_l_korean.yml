l_korean:
 mem_tales_of_yore_modifier_gen:0 "웅장한 이야기"
 mem_tales_of_yore_modifier_gen_desc:0 "이 행성의 풍부한 역사는 우리 시민들에게 더욱 매력적으로 다가옵니다."
 mem_tales_of_yore_modifier_mat:0 "지혜의 이야기"
 mem_tales_of_yore_modifier_mat_desc:0 "이 세계의 풍부한 역사는 우리 시민들에게 더 매력적으로 다가오며, 이곳의 위대한 사상가들이 남긴 해독된 가르침은 과학적 사고를 장려합니다."
 mem_tales_of_yore_modifier_spi:0 "깨달음의 이야기"
 mem_tales_of_yore_modifier_spi_desc:0 "이 행성의 풍부한 역사는 우리 시민들에게 더욱 매력적으로 다가옵니다. 이곳에서 발견된 성지와 경전은 시민들이 우리의 종교를 더욱 잘 따를 수 있게 합니다."
 mem_tales_of_yore_modifier_mil:0 "용맹의 이야기"
 mem_tales_of_yore_modifier_mil_desc:0 "이 세계의 풍부한 역사 덕분에 우리 시민들에게 더욱 매력적으로 다가오며, 고대 전투의 유적지와 위대한 영웅들의 무덤이 우리에게 힘과 무예에 대한 야망을 불어넣습니다."
 mem_tales_of_yore_modifier_pac:0 "예술의 이야기"
 mem_tales_of_yore_modifier_pac_desc:0 "이 행성의 풍부한 역사는 우리 시민들에게 더욱 매력적으로 다가옵니다. 복원된 수많은 고대 예술품들은 시민들의 행복과 창의성을 유지해 줍니다."
 mem_tales_of_yore.1.name:0 "유물 보관소"
 mem_tales_of_yore.1.desc:0 "[Root.Owner.GetSpeciesAdj] 개척민이 [Root.GetName] 세계에 퍼져나가면서, 원정대는 새로운 도시와 생산 센터를 위한 적합한 장소를 찾기 위해 국경으로 나아갑니다. 결국 궤도 스캔은 한계가 있습니다. 그러나 그러한 원정대 중 하나가 예상보다 훨씬 더 주목할 만한 것을 발견했습니다.\n\n어떤 외계어로 된 방대한 고대 책 더미와 다양한 종류의 유물이 발견되었습니다. 그림, 조각상, 심지어 미라로 보존된 외계 생명체가 포함된 이 더미에서, [Root.GetName]에서 불확실한 시기에 외계 문명이 존재했었던 것으로 보입니다. 텍스트를 해독하기 위한 특별 프로젝트가 발주되었습니다."
 mem_tales_of_yore.1.a:0 "흥미롭군."
 MEM_TALES_OF_YORE_PROJECT:0 "보관소 조사"
 MEM_TALES_OF_YORE_PROJECT_DESC:0 "다양한 외계 미술품과 유물이 보관된 대형 보관소가 [This.GetName]에서 발견되었습니다. 이 발견의 중요성을 판단하려면 세심한 연구가 필요합니다."
 mem_tales_of_yore.2.name:0 "옛날 이야기"
 mem_tales_of_yore.2.desc:0 "우리 번역 팀은 [Root.GetName]에서 발견된 텍스트 안에 얼마나 많은 정보가 담겨 있는지 알고 놀랐습니다. 오래전 사라진 문명은 늦은 철기 시대를 벗어나지 못했지만, 이야기로 가득한 역사를 가지고 있었던 것으로 보이며, 이 캐시의 내용에는 유물과 이 서사시에서 언급된 몇몇 영웅들이 포함되어 있습니다.\n\n이 서사시는 수천 년에 걸쳐 일어난 이야기들을 전하며, 방사성 연대 측정에 따르면 수십만 년 전, 문명이 갑작스럽고 신비롭게 사라지기 전의 일입니다. 위대한 전사들, 뛰어난 철학자들, 그리고 찬란한 도시들에 대한 이야기들이 그들의 가죽 제본 안에 모두 담겨 있습니다. 더욱이, 서사시가 가장 위대한 도시들이 위치해 있다고 말하는 곳으로의 탐험은 지도에 거의 완벽하게 묘사된 유적들을 밝혀냈습니다.\n\n이미 개척민들은 그들의 세계에 더 큰 자부심을 느끼기 시작했으며, 미디어는 서사시를 영화, 책, 가상 현실 경험, 심지어 비디오 게임으로 각색하는 열풍에 휘말리고 있습니다. 행성 자체에 대해서는 상황이 좋아 보입니다."
 mem_tales_of_yore.2.default:0 "그들의 웅장한 영웅담에 찬사를 보내라!"
 mem_tales_of_yore.2.mat:0 "그들의 지혜를 향한 탐구심에 찬사를 보내라!"
 mem_tales_of_yore.2.spi:0 "그들의 심오한 영성에 찬사를 보내라!"
 mem_tales_of_yore.2.mil:0 "그들의 용맹스러운 전사들에게 찬사를 보내라!"
 mem_tales_of_yore.2.pac:0 "그들의 아름다운 예술에 찬사를 보내라!"
