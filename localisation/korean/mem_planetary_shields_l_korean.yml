l_korean:
 building_mem_planetary_shield_generator:0 "행성 보호막 생성소"
 building_mem_planetary_shield_generator_desc:0 "$tech_planetary_shield_generator_desc$"
 building_mem_planetary_shield_generator_heavy:0 "행성 방어 장벽 생성소"
 building_mem_planetary_shield_generator_heavy_desc:0 "고대 문명을 연구함으로써 얻어낸 새롭고 더 진보된 방어막 생성기입니다."
 building_mem_planetary_shield_generator_orila:0 "선구자 행성 보호막 생성소"
 building_mem_planetary_shield_generator_orila_desc:0 "고대의 고급 행성 보호막 생성기로, 통합된 에너지 원이 포함되어 있습니다. 이 기술은 우리의 기술보다 수천 년 앞설 수 있습니다...\n\n우리가 이 기술을 복제할 수는 없겠지만, 우리의 공학자들은 여기에서 §Y분해§!한 다음, 우리가 선택한 다른 행성에서 §Y재조립§!할 수 있을 것입니다."
 mem_tech_planetary_shield_generator_heavy:0 "진보된 방어 장벽"
 mem_tech_planetary_shield_generator_heavy_desc:0 "우리 과학자들이 역장 조작 기술과 선구자 보호막 기술에 대해 밤낮으로 연구한 결과, 더 진보한 보호막 생성기를 개발할 수 있게 되었습니다."
 mem_tech_planetary_shield_generator_orila:0 "선조 방패 유지보수"
 mem_tech_planetary_shield_generator_orila_desc:0 "이 방어막 생성기의 기술은 우리의 재현 능력을 훨씬 초월합니다. 그렇지만, 우리가 이를 기본적으로 이해하고 있는 만큼, 우리는 이를 분해하고 적절한 곳에 재조립할 수 있을 것입니다."
 mem_planetary_precursor_shield:0 "퇴화된 행성 선행자 방어막"
 mem_planetary_precursor_shield_desc:0 "이 세계는 고대 선행자 방어막으로 보호되고 있다. 퇴화된 발생기 인프라를 발견했으며, 복원이 가능할 수 있다."
 mem_planetary_precursor_shield_storms:0 "$mem_planetary_precursor_shield$"
 mem_planetary_precursor_shield_storms_desc:0 "$mem_planetary_precursor_shield_desc$"
 decision_mem_planetary_precursor_shield_restoration:0 "선행자 방어막 발생기 복원"
 decision_mem_planetary_precursor_shield_restoration_desc:0 "퇴화된 발생기 인프라를 복원하고, 원하는 곳에 재조립할 수 있는 건물 키트를 받을 것이다."
 mem_planetary_shields.15.name:0 "복원 완료"
 mem_planetary_shields.15.desc:0 "[root.GetName]의 퇴화된 선행자 방어막 발생기에 대한 작업이 완료되었다. 이제 어디서든 재조립할 수 있게 되었다."
 tech_mem_planetary_shield_generator_heavy:0 "진보된 방어 장벽"
 tech_mem_planetary_shield_generator_heavy_desc:0 "우리 과학자들이 역장 조작 기술과 선구자 보호막 기술에 대해 밤낮으로 연구한 결과, 더 진보한 보호막 생성기를 개발할 수 있게 되었습니다."
 tech_mem_planetary_shield_generator_orila:0 "선조 방패 유지보수"
 tech_mem_planetary_shield_generator_orila_desc:0 "이 방어막 생성기의 기술은 우리의 재현 능력을 훨씬 초월합니다. 그렇지만, 우리가 이를 기본적으로 이해하고 있는 만큼, 우리는 이를 분해하고 적절한 곳에 재조립할 수 있을 것입니다."
