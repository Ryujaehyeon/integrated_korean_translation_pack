l_korean:
 tile_building_resource_unity_add:0 "$tile_resource_unity_add$"
 mem_maze.2.name:0 "숨겨진 건축물"
 mem_maze.2.desc.j:0 "§Y[Root.GetName]§!의 울창한 덤불을 제거하는 과정에서, 풍경 공학자들은 놀라운 발견을 하였습니다. 식물의 덤불에 의해 위장되어 있던 외계 구조물이 드러났습니다. 스캔에 저항하는 이 구조물은 매우 고급 기술로 보이지만, 형태와 물자 선택은 원시적입니다. 벽면은 추상적인 형태와 기괴한 장면의 이미지로 정교하게 장식되어 있습니다."
 mem_maze.2.desc.machine:0 "§Y[Root.GetName]§!의 밀집한 식생을 제거하는 동안, 우리는 외계 구조물을 발견했습니다. 스캔에 대해 무적이며, 매우 고급 기술로 보이지만 형태와 물자 선택은 원시적입니다. \n\n그러나 추가 탐사를 시도한 모든 시도는 실패했습니다. 우리가 보낸 어떤 유닛도 방패가 장착되어 있든 없든 접근 방식에서 즉시 무력화되었습니다."
 mem_maze.2.desc.hive:0 "§Y[Root.GetName]§!의 밀집한 식생을 제거하는 동안, 우리는 외계 구조물을 발견했습니다. 스캔에 저항하며, 이는 고급 기술로 보이지만 형태와 물자 선택은 원시적입니다. \n\n그러나 우리가 더 자세히 살펴보려고 보낸 드론은 우리와의 연결이 끊어지고 빠르게 시들어버려, 현장을 추가로 탐사하는 것을 방해했습니다."
 mem_maze.2.gest:0 "어찌나 매혹적으로 이상한지..."
 mem_maze.4.name:0 "외계 구조물"
 mem_maze.4.desc:0 "§Y[Root.GetName]§!의 신비한 외계 구조물이 과학자와 일반인 모두의 관심을 끌고 있습니다. 추측이 난무하지만 구조의 기원에 대해 일관된 이론을 제시할 수 있는 사람은 거의 없습니다.\n\n이것을 둘러싼 가장 유망한 이론 중 하나는 피라미드의 바깥 부분이 일종의 \"거대한 수수께끼 자물쇠\"라는 것입니다. 봉인 해제 시도를 허가해야 할까요?"
 mem_maze.4a:0 "좋다. 필요한 모든 것을 준비해라."
 mem_maze.4b:0 "우리는 외계 유물에 함부로 손대서는 안 됩니다."
 mem_maze.4b.tooltip:0 "이 구조물에 손대지 말자."
 mem_maze.4c:0 "신성한 유물로 취급해야 합니다."
 mem_maze.4c.tooltip:0 "구조물에서 생산하는 £unity£ 통합력 산출량은 증가할 것이지만 우리는 구조물이 숨기고 있는 비밀을 파헤치려고 시도하지 않을 것입니다."
 mem_maze.5.name:0 "외계 미로"
 mem_maze.5.desc:0 "신비로운 구조물의 표면에 새겨진 이미지와 패턴을 탐색하려는 시도가 마침내 결과를 가져왔습니다. 이를 올바른 순서로 누르자 미공개 출입구가 열리며 내부로 들어가는 길이 드러났습니다. \n\n구조물의 내부는 끝없이 이어지는 복도의 미로처럼 보이며, 비틀리고 지하로 깊숙이 파고듭니다. 에너지원은 감지되지 않지만, 벽이 부드럽게 빛나 시각을 가능하게 합니다."
 mem_maze.5a:0 "더 탐구해볼 필요가 있군."
 mem_maze.6.name:0 "첫 번째 원정 실패"
 mem_maze.6.desc:0 "팀이 터널로 내려간 후, 우리는 그들과의 모든 연락을 잃었습니다. \n\n우리는 그들이 좋은 소식을 가지고 돌아오기를 바라며 오랜 시간 기다렸지만, 기다림은 예상보다 훨씬 길어졌습니다. 마침내, 팀원 중 한 명이 미로의 깊은 곳에서 나타났습니다. 그는 반 미친 상태로 지쳐 있었고, 그들이 미로를 탐색하는 동안 팀 리더가 우연히 트립 와이어를 작동시켜 거대한 바위가 복도를 굴러 내려와 모두를 짓누른 것이라고 밝혔습니다. 단 한 명의 생존자를 제외하고 모두가 희생되었습니다."
 mem_maze.6a:0 "함정을 파악했으니 다시 한번 시도해보자."
 mem_maze.6b:0 "이것은 용납할 수 없는 위험입니다. 미로를 봉인하십시오."
 mem_maze_cancellation:0 "우리는 미로를 봉인하고 다시는 돌아오지 않을 것입니다.\n§R이 결정은 다시는 수정할 수 없습니다. 절대로.§!"
 mem_maze.7.name:0 "두 번째 원정 실패"
 mem_maze.7.desc:0 "두 번째 팀은 기계적 함정에 대한 고급 지식을 갖추고 있으며 이를 피할 수 있는 장비를 갖추고 있었습니다. 이전과 마찬가지로 그들이 미로로 내려가면서 우리는 그들과의 연락이 끊겼습니다. 우리는 한동안 헛되이 기다렸고, 결국 몇몇 생존자들이 미로에서 나타났습니다. \n\n그들은 함정을 피하는 데 성공했음에도 불구하고, 문을 지키고 있는 일종의 퍼즐에 의해 저지당했다고 말했습니다. 이 퍼즐은 하이퍼큐브의 와이어프레임에 고정된 다채로운 구슬을 재배치하여 추가 차원을 사용해 어떻게든 제거하는 것을 포함합니다. 팀이 퍼즐을 해결하지 못했을 때, 그들 대부분은 알려지지 않은 형태의 방사선에 의해 녹아버렸습니다. 생존자들이 가지고 있는 스케치는 미리 해결책을 해독할 수 있게 해줄 것입니다."
 mem_maze.7a:0 "미리 해답을 준비해서 다시 시도해보자."
 mem_maze.8.name:0 "세 번째 원정 실패"
 mem_maze.8.desc:0 "고급 계산 기계에 접근할 수 있게 되면서, 우리는 팀에게 퍼즐에 대한 해결책을 제공할 수 있었습니다. 그들이 떠날 때 다시 연락이 끊겼고, 우리는 다시 그들의 귀환을 기다렸습니다. 결국, 한 명의 생존자가 미로에서 실패에 대한 새로운 이야기를 가지고 나타났습니다. \n\n이번에는 팀이 함정을 피하고 하이퍼큐브 퍼즐을 성공적으로 해결했습니다. 그러나 그들이 더 나아가면서, 여러 수수께끼로 덮인 슬랩이 있는 방에 들어가게 되었습니다. 일부는 쉽게 풀 수 있었지만, 다른 것들은 그렇지 않았습니다. 팀이 발견한 바에 따르면, 실수는 치명적이었습니다. 거의 전체 팀이 슬랩에서 떨어진 번개에 의해 감전된 후, 마지막 생존자는 후퇴하여 모든 수수께끼의 전사와 함께 소식을 전하기로 선택했습니다."
 mem_maze.8a:0 "우리는 너무 멀리 와버렸다. 수수께끼는 우릴 막지 못할 것이다."
 mem_maze.9.name:0 "네 번째 원정 실패"
 mem_maze.9.desc:0 "우리 제국의 가장 뛰어난 과학자, 철학자, 민속학자 및 테이블탑 게임 마니아로 구성된 위원회가 미로의 수수께끼에 대한 해결책이라고 믿는 목록을 팀에 제공했습니다. 그들이 다시 떠난 후, 우리는 그들의 귀환을 걱정하며 기다렸습니다. 결국, 몇몇 생존자들이 미로에서 돌아왔지만 다시 나쁜 소식을 전했습니다. \n\n최소한의 인명 피해로 수수께끼 석판을 해결했음에도 불구하고, 팀은 복잡한 기계적 퍼즐에 의해 저지당했습니다. 이 퍼즐은 이국적인 물질로 구성된 정교한 기계와 중량을 사용하여 바닥이 없는 방을 통해 안전한 통로를 만드는 것을 요구했습니다. 퍼즐을 해결하려는 시도 중에 방이 수평 축을 중심으로 회전하여 대부분의 팀원이 천장에 치여 치명적인 피해를 입었습니다. \n\n생존자들은 방의 상세한 도면을 가지고 있었으며, 이는 우리가 가상 시뮬레이션 내에서 먼저 해결책을 시험할 수 있도록 해줄 것입니다."
 mem_maze.9a:0 "거의 다 왔다. 멈추지 마라."
 mem_maze.10.name:0 "다섯 번째 원정 결과"
 mem_maze.10.desc:0 "우리는 §Y[officer.GetName]§!의 팀을 임무에 보내기 전에 철저히 준비했습니다. 그들이 출발하자, 우리는 소식을 기다렸습니다. 갑자기, 라디오 침묵이 깨졌습니다. §Y[officer.GetName]§!가 미로의 중심에 도달한 것 같습니다! \n\n[officer.GetSheHeCap]는[officer.GetSXX] 중앙의 받침대 위에 밝게 빛나는 녹색 구체가 있는 큰 홀을 묘사합니다. 과학자에 따르면, 이는 [officer.GetSheHe] [officer.GetHasHave]가 이전에 본 것과는 전혀 다릅니다. [officer.GetSheHeCap]는[officer.GetSXX] 그것이 어 somehow... 살아있는 것 같다고 생각합니다? \n\n갑자기 신호가 중단됩니다. 우리는 이제 같은 지역에서 발생하는 또 다른 신호를 받고 있습니다!"
 mem_maze.11.desc:0 "방랑자 여러분을 환영합니다. 당신은 우리를 찾았고 그렇게 함으로써 당신의 가치와 결단력을 입증했습니다. 당신은 우리의 지식을 들을 가치가 있습니다.\n\n그러나 먼저 우리에게 말씀하십시오. 당신에게 가장 큰 미덕은 무엇입니까?"
 mem_maze.11a:0 "모르겠다."
 mem_maze.11a.tooltip:0 "답변을 선택합니다. 혹은 아예 고르지 않습니다."
 mem_maze.11b.eg:0 "평등."
 mem_maze.11b.au:0 "충성심."
 mem_maze.11b.ma:0 "지식."
 mem_maze.11b.sp:0 "신앙."
 mem_maze.11b.mi:0 "용기."
 mem_maze.11b.pa:0 "자비."
 mem_maze.11b.phile:0 "관용."
 mem_maze.11b.phobe:0 "순결."
 mem_maze.11c:0 "당신은 누구지?"
 mem_maze.11c.response:0 "우리는 많고 많은 이름을 가지고 있습니다. 지식을 지키고 가치가 있다고 생각하는 사람들과 지식을 공유합니다. 우리는 당신과 지식을 공유할 것입니다."
 mem_maze.12.desc:0 "흥미롭군요. 이제 가장 큰 악덕이 무엇이라고 생각합니까?"
 mem_maze.12b.eg:0 "불의."
 mem_maze.12b.au:0 "이기심."
 mem_maze.12b.ma:0 "미신."
 mem_maze.12b.sp:0 "부정."
 mem_maze.12b.mi:0 "비겁함."
 mem_maze.12b.pa:0 "잔인함."
 mem_maze.12b.phile:0 "편견."
 mem_maze.12b.phobe:0 "오염."
 mem_maze.12.farewell:0 "당신의 대답은 매력적입니다, 방랑자. 이제 우리는 선물을 제공할 것입니다."
 mem_maze.13.name:0 "연구원들의 귀환"
 mem_maze.13.desc:0 "§Y[officer.GetName]§의 탐사대가 미로에서 승리를 거두었습니다. 그들은 실제로 일어난 일을 기억하는 데 어려움을 겪지만 그들의 눈에는 광기의 불꽃이 있습니다. 그들은 데이터 패드, 펜과 종이, 막대기, 흙 조각 등 무엇이든 즉시 사용할 수 있도록 요구했습니다. 그림을 그리고 글을 쓰는 데 많은 시간을 보낸 후 그들은 정상으로 돌아온 것처럼 보입니다. 한편 그들의 작품에는 많은 우리 민족이 태초부터 찾고 있던 몇 가지 답이 담겨 있는 것 같습니다!"
 mem_maze.13a:0 "우리는 많은 것을 배웠다."
 mem_maz.13a.tooltip:0 "외계 미로는 이제 새로운 직업을 생성합니다. 무엇을 생산할지는 우리가 제공한 답변에 따라 달라집니다."
 mem_maze_dig_site:0 "외계 구조물"
 mem_maze_dig_site_desc:0 "고대 구조물로, 디자인은 원시적이지만 믿을 수 없을 만큼 고급 기술로 구동됩니다. 그 안에는 큰 수수께끼가 숨겨져 있습니다."
 mem_virtue_eg:0 "선택된 미덕: 평등"
 mem_virtue_au:0 "선택된 미덕: 충성심"
 mem_virtue_ma:0 "선택된 미덕: 지식"
 mem_virtue_sp:0 "선택된 미덕: 신앙"
 mem_virtue_pa:0 "선택된 미덕: 자비"
 mem_virtue_mi:0 "선택된 미덕: 용기"
 mem_virtue_phile:0 "선택된 미덕: 관용"
 mem_virtue_phobe:0 "선택된 미덕: 순결"
 mem_vice_eg:0 "선택된 악덕: 불의"
 mem_vice_au:0 "선택된 악덕: 이기심"
 mem_vice_ma:0 "선택된 악덕: 미신"
 mem_vice_sp:0 "선택된 악덕: 부정"
 mem_vice_pa:0 "선택된 악덕: 잔인함"
 mem_vice_mi:0 "선택된 악덕: 비겁함"
 mem_vice_phile:0 "선택된 악덕: 편견"
 mem_vice_phobe:0 "선택된 악덕: 오염"
 mem_maze_unhappy:0 "실패한 탐사"
 mem_leader_strange_insight:0 "이상한 통찰력"
 mem_leader_strange_insight_desc:0 "이 지도자는 미로에 가본 적이 있으며 이제 다른 사람들이 이해하지 못하는 것을 이해합니다."
 d_mem_maze_overgrowth:0 "눈에 띄는 밀림"
 d_mem_maze_overgrowth_desc:0 "주변 환경에 눈에 띄게 어울리지 않고 스캔에 관해 설명할 수 없을 정도로 영향을 받지 않는 조밀하고 탄력적인 초목 군집입니다. 분명히 무언가를 숨기고 있지만 그게 무엇일까요?"
 mem_maze_overgrowth_effect_tooltip:0 "그 안에 감추어진 것은 무엇이든지 드러날 것입니다."
 d_mem_maze_temple:0 "고대 구조물"
 d_mem_maze_temple_desc:0 "$mem_maze_dig_site_desc$"
 job_mem_maze_orb_watcher:0 "구체 관찰자"
 job_mem_maze_orb_watcher_plural:0 "구체 관찰자들"
 job_mem_maze_orb_watcher_desc:0 "어떤 사람들은 그것을 광기라고 부릅니다. 어떤 사람들은 그것을 영감이라고 부릅니다. 대부분은 그것이 당신에게 말하는 것을 들을 때까지 떠다니는 녹색 구체를 응시한다고 말합니다."
 mod_job_mem_maze_orb_watcher_add:0 "$job_mem_maze_orb_watcher$ 직업"
