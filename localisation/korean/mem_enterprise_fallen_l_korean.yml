l_korean:
 d_mem_ancient_library_deposit:0 "고대 도서관"
 d_mem_ancient_library_deposit_desc:0 "이곳을 지은 문명은 사라진 지 오래지만 그들의 글은 지금까지도 남아있습니다."
 mem_enterprise_fallen_category:0 "고대 유적"
 mem_enterprise_fallen_category_desc:0 "우리 탐사대는 §Y[From.GetName]§!에서 조사할 가치가 있어 보이는 건물들을 발견했습니다."
 mem_enterprise_fallen.1.name:0 "거대한 도서관"
 mem_enterprise_fallen.1.desc:0 "우리 과학 팀이 대박을 터뜨렸습니다. 그들이 탐사하고 있던 고대 건축 복합체는 이 고대 문명의 거대한 도서관으로 밝혀졌습니다. 그곳에 저장된 모든 것을 연구하는 데는 수년, 아니 수십 년이 걸릴 것입니다."
 mem_enterprise_fallen.2.name:0 "진전 없음"
 mem_enterprise_fallen.2.desc:0 "이 고대 건물들이 매우 오래됬음에도 불구하고 우리 과학자들은 시설의 기존 거주민들에 대한 단서를 제공할 그 어떤 것도 발견하지 못했습니다. 모든 승무원은 다시 §Y[Root.GetName]§!에 탑승하였고 넘어갈 준비가 되었습니다."
 mem_enterprise_fallen.3.name:0 "멸망한 자들의 우주선"
 mem_enterprise_fallen.3.desc:0 "이 죽은 행성에 대한 추가 연구와 우리가 발견한 역사 문서들은 이곳의 이전 거주자들이 우리가 생각했던 것보다 더 고급이었을 가능성을 시사합니다. 표면에서 회수된 문서와 도면에는 고급 항공모함에 대한 상세한 검토가 포함되어 있습니다. 이는 추가 조사가 필요할 수 있습니다."
 mem_enterprise_fallen.3.a:0 "매우 흥미롭군."
 MEM_ENTERPRISE_FALLEN_PROJECT:0 "멸망한 자들의 우주선"
 MEM_ENTERPRISE_FALLEN_PROJECT_DESC:0 "§Y[ruins_planet.GetName]§!에서 작업중인 우리 과학자들은 이 함선과 있을 법한 장소에 대한 추가적인 연구를 위한 인원 증강을 요구하고 있습니다."
 mem_enterprise_fallen.4.name:0 "멸망한 자들의 우주선"
 mem_enterprise_fallen.4.desc_default:0 "조사 결과, 완전히 연구하는 데 수년이 걸릴 수 있는 상세한 아카이브가 발견되었습니다. 그러나 즉각적인 결론은 명확합니다: "프로젝트"로 알려진 선박은 존재하지 않습니다.\n\n그것은 결코 존재하지 않았습니다. §Y[ruins_planet.GetName]§!의 주민들은 매우 창의적인 상상력을 가지고 있었으며 우주 탐사에 대해 광범위하게 환상했습니다. "프로젝트"는 "별들 속으로 길을 개척한" 허구의 선박이었습니다.\n아카이브 분석에서 얻을 수 있는 연구 데이터는 없지만, 채굴가나 엔터테인먼트 산업에 흥미로울 수 있습니다."
 mem_enterprise_fallen.4.desc_xenophile:0 "조사 결과, 전체를 연구하는 데 수년이 걸릴 수 있는 상세한 기록이 발견되었습니다. 그러나 즉각적인 결론은 명확합니다: "활동"으로 알려진 우주선은 존재하지 않습니다.\n\n안타깝습니다. §Y[ruins_planet.GetName]§!의 주민들은 우리와 매우 비슷했습니다 - 그들은 이상한 새로운 세계와 문명을 꿈꾸었고, 우주가 어떤 모습일지에 대한 긴 연속 모험 이야기를 만들었습니다. 스타쉽 "활동"과 그 용감한 함장은 우리의 해군에 완벽하게 어울릴 것입니다 - 만약 §Y[ruins_planet.GetName]§!의 사람들이 살아남았다면 말입니다.\n\n우리는 그들을 기억할 것입니다. §Y[Root.leader.GetName]§!는 기록을 우리의 언어로 번역하는 프로그램을 만들었습니다. 명령을 내리면 우리는 이를 대중에게 배포할 것입니다.\n\n인기가 충분하다면, 새로운 에피소드를 만들 수도 있습니다. 이 항해가 계속되기를 바랍니다."
 mem_enterprise_fallen.4.desc_xenophobe:0 "§Y[ruins_planet.GetName]§!의 주민들은 외계인 기준으로도 왜곡되어 있었습니다. 그들의 녹화를 검토한 결과 §Y[Root.leader.GetName]§!는 영구적으로 정신이 혼란스러워졌습니다. 그들이 소위 말하는 우주선, 지금은 "챌린저"로 알려진 것은 다름 아닌 멜로 드라마에 불과했습니다. 그들의 어리석음이 핵 폭발 크레이터로 행성에 새겨져 있는 것을 보는 것은 여전히 기쁜 일입니다.\n\n비록 이 녹화들이 우리 과학자들에게는 쓸모가 없지만, 우리는 이를 선전 목적으로 편집하거나 단순히... 수집가에게 판매할 수 있습니다. 명령만 내려주십시오."
 mem_enterprise_fallen.4.a:0 "모든 것을 경매에 부쳐라."
 mem_enterprise_fallen.4.b:0 "영화를 틀어라!"
 mem_enterprise_fallen.4.c:0 "순수함을 잃을 때 무슨 일이 벌어지는지를 대중에게 보여줘라."
 mem_enterprise_fallen.4.b.tooltip:0 "(평화주의자 인구): §Y대담하게 나아가다§!를 §Y12§!개월 동안 얻고, 다음과 같은 효과를 받습니다:\n행복도: §G+5%§!\n윤리관 변동치: §G-5%§!"
 mem_enterprise_fallen.4.c.tooltip:0 "(외계종 혐오자 인구): §Y악의적인 즐거움§!를 §Y12§!개월 동안 얻고, 다음과 같은 효과를 받습니다:\n행복도: §G+5%§!"
 mem_boldly_going:0 "대담하게 나아가다"
 mem_malicious_joy:0 "악의적인 즐거움"
