l_korean:
 mem_placeholder:0 "PLACEHOLDER"
 mem_czar_alexei_catchphrase:0 "우리 제국이 빛나는 등대가 되게 합시다. 은하는 어둡고 공포로 가득 차 있습니다."
 mem_czar_alexei_backstory:0 "한때 그의 민족의 통치자였던 그는 야망이 넘치고 배은망덕한 신하들에게 배신당해 추방당했지만, 여전히 충족해야 할 비전을 가지고 있으며 필요하다면 우주의 끝까지 갈 것입니다."
 r_mem_czar_alexei_sword:0 "주권자의 검"
 r_mem_czar_alexei_sword_desc:0 "이 유물의 역사는 여전히 신비에 싸여 있지만, 고대의 것이며 사용이나 시간에 의해 훼손되지 않았다는 것은 분명합니다. 진정한 걸작입니다."
 mem_czar_alexei_sword_effect:0 "다른 제국과의 모든 휴전이 종료됩니다."
 mem_czar_alexei_sword:0 "공격적인 외교"
 leader_trait_legendary_mem_manifest_destiny:0 "운명 실현"
 leader_trait_legendary_mem_manifest_destiny_desc:0 "이 남자의 존재에 깊이 새겨진 야망. 운명을 굽히고 아직 은하에 드러나지 않은 미래에 대한 그의 비전을 실현하려는 의지."
 astral_rift_mem_czar_alexei:0 "균열 넥서스"
 mem_czar_alexei.1.name:0 "균열 넥서스"
 mem_czar_alexei.1.desc:0 "우리는 거주 가능한 세계의 궤도에 도착했습니다. 문명의 뚜렷한 흔적은 없지만, 표면은 생명으로 가득 차 있습니다.\n우리가 여기 도착한 균열 외에도, 다양한 활동 단계에 있는 수많은 균열이 있습니다. 일부는 열려 있어 물체가 통과할 수 있는 반면, 다른 일부는 비활성 상태인 것처럼 보입니다.\n우리의 감지기가 신호를 포착하고 있습니다 - 아마도 구조 신호일 가능성이 있으며 - 행성의 북반구 표면에서 위치를 반복적으로 방송하고 있습니다.\n\n어떻게 진행할까요?"
 mem_czar_alexei.1.a:0 "다른 균열을 스캔하고 목록화하여 나중에 조사합니다."
 mem_czar_alexei.1.b:0 "즉시 방송된 위치로 이동하십시오."
 mem_czar_alexei.2.name:0 "신비로운 적들"
 mem_czar_alexei.2.desc:0 "우리의 스캔 초기 결과에 따르면 이 균열은 이 장소를 서로 분리된 다양한 평행 현실과 연결하고 있는 것으로 보입니다. 이러한 관찰은 우리 승무원들 사이에서 활발한 논의를 촉발했으며, 우리 은하 내에서는 이와 같은 장소가 결코 발견된 적이 없었습니다. 그러나 이 주제에 대한 논의는 또 다른 물체 - 우리와 비슷한 균열을 가로지르는 선박 - 가 균열에서 나타나자마자 즉시 우리에게 포격을 가하면서 중단되었습니다. 우리 것과는 상당히 다르게, 이 균열 스피어는 중무장한 것으로 보입니다. 발사된 포탄은 우리의 서브라이트 엔진에 심각한 피해를 주었고, 우리의 연결을 끊어버렸습니다.\n\n우리 조종사는 통제된 착륙을 수행하면서 가능한 한 신호등에 가깝게 다가가려 최선을 다하고 있습니다. 우리는 이전에 위치를 파악한 신호가 어떤 형태의 도움으로 이어지기를 희망합니다."
 mem_czar_alexei.2.a:0 "충격에 대비하라!"
 mem_czar_alexei.3.name:0 "Crashlanding"
 mem_czar_alexei.3.desc.a:0 "폭력적인 착륙 이후, 우리 승무원들은 긴장 속에 마무리 타격을 기다리고 있지만, 지금까지 아무 일도 일어나지 않았습니다. 우리의 감지기에 따르면, 공격자들은 우리의 추락 지점을 지나쳤고 즉각적인 지역을 떠났습니다.\n입은 피해에 대한 표면적인 평가로는 필요한 수리가 가능할 경우에도 광범위할 것이라는 의심의 여지가 거의 없습니다. 우리의 연결이 끊어진 이상, 다시 끌려가는 것은 불가능합니다.\n\n우리는 신호 비콘에 충분히 가까워서 도움이나 사용할 수 있는 자재를 찾기 위해 도보로 이동할 수 있습니다. 또는, 이전에 우리의 스캐너가 발견한 인근 추락 지점으로 우회할 수도 있습니다. 마지막으로, 우리는 손에 있는 자재로 구체를 수리하는 데 집중할 수 있습니다."
 mem_czar_alexei.3.desc.b:0 "대기 속으로의 하강이 갑자기 무기 발사에 의해 방해받아 우리의 초광속 엔진이 손상되고 연결이 끊어졌습니다. 공격자는 - 분명히 우리의 것과 유사한 균열 스피어이지만, 틀림없이 더 강력한 무장을 갖추고 있습니다 - 우리의 체류 기간 동안 그림자처럼 따라다니며 공격할 순간을 기다렸던 것 같습니다.\n\n$mem_czar_alexei.3.desc.a$"
 mem_czar_alexei.3.a:0 "신호를 향해 나아갑니다."
 mem_czar_alexei.3.b:0 "추락 지점으로 향합니다."
 mem_czar_alexei.3.c:0 "수리 작업을 계속합니다."
 mem_czar_alexei.4.name:0 "수리는 무의미합니다"
 mem_czar_alexei.4.desc_1:0 "우리의 균열 스피어에서 지속된 피해를 자세히 살펴보면, 비행 가능한 상태로 복구할 희망이 거의 없다는 것이 분명해집니다. 특히, 우리가 사용할 수 있는 자원이 제한적이라는 점이 우리의 심각한 상황에 기여하고 있습니다.\n\n"
 mem_czar_alexei.4.desc:0 "$mem_czar_alexei.4.desc_1$우리의 수리 노력이 무의미하다는 것이 분명해짐에 따라, 여전히 우리가 추구할 수 있는 두 가지 더 유망한 옵션이 남아 있습니다.\n\n우리는 신호 비콘으로 가는 길에 충분히 가까워져 도움이나 사용할 수 있는 자재를 찾을 수 있기를 희망합니다. 또는, 신호 방향으로 대략 중간 지점에서 우리의 스캐너가 발견한 다른 추락 지점으로 우회할 수 있습니다."
 mem_czar_alexei.5.name:0 "예기치 않은 조우"
 mem_czar_alexei.5.desc.a:0 "$mem_czar_alexei.6.desc_1$우리 팀이 여전히 작동 가능한 상태의 남은 시스템을 평가하고 있을 때, 이 배의 소유자로 보이는 인간형 외계인이 접근하여 면담을 요청했습니다.\n\n$mem_czar_alexei.5.desc$"
 mem_czar_alexei.5.desc.b:0 "$mem_czar_alexei.7.desc_1$우리의 몇몇 과학자들이 호기심으로 데이터 코어에 접근하여 구의 도면을 추출해 나중에 연구하기 위해 노력하는 동안, 다른 과학자들은 갑자기 인간형 외계인과 마주쳤고, 면담을 요청했습니다.\n\n$mem_czar_alexei.5.desc$"
 mem_czar_alexei.5.desc.c:0 "$mem_czar_alexei.4.desc_1$우리 상황의 현실이 서서히 받아들여지고 팀이 선택지를 논의하고 있을 때, 한 인간형 외계인이 자신을 알리고 면담을 요청해 온 것은 큰 놀라움이었습니다.\n\n$mem_czar_alexei.5.desc$"
 mem_czar_alexei.5.desc:0 "그에 따르면, 그는 다른 현실에서 온 선택받은 사회로, 우리와 마찬가지로 균열 중 하나를 통해 이곳에 왔습니다. 그의 존재에 대한 구체적인 상황은 의도적으로 모호하게 유지되고 있습니다.\n\n이전 탐사 중 그의 동료들은 이미 우리의 공격자들과 접촉했었다고 주장합니다. 그는 그들을 개인적인 사냥터로 이곳을 주장하는 사냥꾼의 부족 사회로 묘사합니다. 그들이 이곳에 있는 이유는 야생 동물을 사냥하기 위함이 아닌 것이 분명합니다. 대신, 그들이 선택한 목표는 다중 우주 전역의 균열 탐험가들입니다.\n\n우리의 새로운 지인은 적의 균열 스피어를 차지하고 이곳을 무사히 떠나기 위해 함께 일할 것을 제안합니다."
 mem_czar_alexei.5.a:0 "그와 협력합니다."
 mem_czar_alexei.5.b:0 "그를 이용하고 나중에 배신할 수 있습니다."
 mem_czar_alexei.6.name:0 "신호에서"
 mem_czar_alexei.6.desc_1:0 "우리 팀은 방송된 신호의 출처에 도착했습니다. 그들 앞에는 추락한 균열 스피어의 잔해가 놓여 있습니다. 주변 식물에 대한 비교적 최근의 손상을 고려할 때, 이곳에 오래 있지 않았던 것으로 보입니다. 최근 거주 흔적이 명확히 있었음에도 불구하고, 우리의 과학자들은 주변에 아무도 없는 것을 발견했습니다.\n\n내부 탐사는 승무원의 행방에 대한 단서를 거의 제공하지 않았습니다. 그 배 자체는 우리의 배처럼 수리가 불가능합니다. 우리의 과학자가 놀란 것은, 지속된 손상이 우리의 배와 매우 유사하다는 점이었습니다.\n\n"
 mem_czar_alexei.6.desc:0 "$mem_czar_alexei.6.desc_1$기능을 유지하고 있는 시스템은 통신 배열과 스캐너뿐입니다. 후자는 우리 위치를 둘러싸고 있는 생명 신호 그룹을 감지하여 행동 방침을 준비할 수 있는 시간을 주었습니다.\n\n우리는 남아 싸울 것인가, 스스로를 바리케이드로 막고 그들이 돌진하기를 기다릴 것인가, 아니면 돌파를 시도하고 도망칠 것인가요?"
 mem_czar_alexei.6.a:0 "돌파를 시도하고 도망칩니다."
 mem_czar_alexei.6.b:0 "서서 싸우십시오."
 mem_czar_alexei.6.c:0 "우리 자신을 바리케이드로 막고 그들을 안으로 유인합시다."
 mem_czar_alexei.7.name:0 "추락 지점"
 mem_czar_alexei.7.desc_1:0 "우리 팀은 수십 년 전 발생했을 것으로 보이는 추락 현장에 도착했습니다. 균열 스피어의 잔해는 반쯤 덤불로 덮여 있었습니다. 이전 소유자의 흔적은 전혀 발견되지 않았습니다. 간단한 점검 결과, 이 우주선에는 명백히 복구할 수 없는 손상이 발견되었으며, 이는 아마도 버려지게 된 원인일 것입니다. 그러나 그 기술은 우리의 기술보다 훨씬 고급으로 보였습니다.\n\n"
 mem_czar_alexei.7.desc:0 "$mem_czar_alexei.7.desc_1$우리의 몇몇 과학자들이 나중에 연구하기 위해 스피어의 도면을 추출하기 위해 데이터 코어에 접근하는 동안, 다른 몇몇은 스피어의 스캐너를 활성화하려고 시도했습니다. 그들의 시도는 성공적이었고, 우리는 앞으로 나아갈 수 있는 또 다른 가능성을 제공받았습니다. 우리가 이미 알고 있는 신호 지점 외에도, 또 다른 균열 스피어를 탐지했습니다 - 아마도 이전에 우리를 공격했던 스피어일 가능성이 높으며, 상대적으로 가까운 곳에 착륙했습니다.\n\n생명 신호 그룹이 그 착륙 지점에서 신호 비콘의 위치로 이동하고 있으며, 그곳에서 다른 생명 신호 하나가 발견되었습니다. 이 개인은 우리와 마찬가지로 그들에게 의해 격추되었을 가능성이 높습니다.\n\n우리는 공격자들이 도착하기 전에 그들에게 도달하려고 시도할 수 있습니다. 또는 이 상황을 우리의 이점으로 활용하여 착륙한 배를 탈취하고 여기서 빠져나갈 수 있습니다."
 mem_czar_alexei.7.a:0 "신호로 가서 전투를 예상하십시오."
 mem_czar_alexei.7.b:0 "공격자의 함선을 빼앗으려 시도합니다."
 mem_czar_alexei.8.name:0 "사냥꾼의 사냥"
 mem_czar_alexei.8.desc_1:0 "낯선 이와 계획한 대로 매복이 설정되어 사냥대를 기습했습니다. 전투가 시작된 지 얼마 지나지 않아 그들이 우리의 계획을 알고 있다는 것이 분명해졌습니다. 우리가 측면에서 포위당할 위협을 감지한 우리의 동맹은 가장 가까운 사냥꾼에게 돌진하며 방패로 여러 차례의 공격을 무시하고 반격을 시작했습니다. 이전에 순전히 의식용 아이템으로 오해했던 그의 검으로 몇 번의 정확한 타격을 가해 우리의 측면을 위협하던 두 명의 공격자를 제압했습니다.\n\n나머지 이들은 어리둥절하게 그에게 화력을 집중하는 동안, 우리의 팀은 그들을 하나씩 무력화할 수 있었습니다.\n\n"
 mem_czar_alexei.8.desc:0 "$mem_czar_alexei.8.desc_1$사냥꾼들이 처리되자, 그들의 배가 압수되었고 우리의 탐사 팀과 그들과 함께 돌아가기로 결정한 새로운 동맹이 균열을 통해 우리의 우주로 돌아왔습니다."
 mem_czar_alexei.8.a:0 "승리한 이들을 환영합시다!"
 mem_czar_alexei.9.name:0 "연락 끊김"
 mem_czar_alexei.9.desc:0 "낯선 이와 계획한 대로 매복이 설정되어 사냥대원을 기습했습니다. 전투가 시작된 직후 그들이 우리의 계획을 알고 있다는 것이 분명해졌습니다. 우리의 사격 위치는 빠르게 포위당했고 전투는 일방적인 학살로 변했습니다.\n\n전투 중에 죽지 않은 이들은 포로로 잡혔을 가능성이 높으며 실종된 것으로 추정됩니다. 이는 이 불운한 모험의 끝을 의미합니다."
 mem_czar_alexei.9.a:0 "정말 불운하군요."
 mem_czar_alexei.10.name:0 "배신"
 mem_czar_alexei.10.desc:0 "$mem_czar_alexei.8.desc_1$사냥꾼의 마지막 일원이 처리된 후, 그들은 지친 낯선 이를 겨냥하여 일제 사격으로 그의 방어막을 무너뜨리고 그 문제를 해결했습니다. 우리의 탐사대장은 그의 검을 가져와 전리품으로 삼았습니다.\n\n그 후 남은 일은 사냥꾼들이 가져온 이제 주인이 없는 구체를 확보하고 균열을 통해 돌아가는 것이었습니다."
 mem_czar_alexei.10.a:0 "승리한 자들을 환영합시다!"
 mem_czar_alexei.11.name:0 "연락 끊김"
 mem_czar_alexei.11.desc.a:0 "우리 팀은 포위를 뚫고 안전한 곳으로 가려고 했지만, 치열한 저항에 부딪혔습니다. 여러 방향에서 쏟아지는 무기 사격이 그들을 하나씩 무자비하게 쓰러뜨렸습니다. $mem_czar_alexei.11.desc_2$"
 mem_czar_alexei.11.desc.b:0 "우리 팀은 적과 공개적으로 교전하려 했으나 그들의 우수한 화력에 상대가 되지 못했습니다. 여러 방향에서 쏘아지는 무기의 불꽃이 무자비하게 그들을 하나씩 쓰러뜨렸습니다. $mem_czar_alexei.11.desc_2$"
 mem_czar_alexei.11.desc.c:0 "우리 팀은 잔해 속에 자신들을 바리케이드로 막고 적을 사격 각도로 유인하여 우위를 점하려 했습니다. 그러나 그들의 예상과는 달리, 뒤에서 발생한 폭발이 갑자기 새로운 출구를 만들어냈고, 그 직후 여러 적들이 그들의 위치를 향해 돌진해 들어왔습니다. $mem_czar_alexei.11.desc_2$"
 mem_czar_alexei.11.desc.d:0 "우리 팀은 싸움에 개입하기에는 너무 늦게 도착했습니다. 그들은 땅에 몇 구의 시체만 발견했습니다. 그 중 하나는 인간형 외계인에게 속하고 나머지는 그의 공격자들에게 속합니다. 그들이 발견한 것들을 더 자세히 조사하려고 했을 때, 갑자기 그들이 함정에 빠졌다는 것이 분명해졌습니다. 여러 방향에서 쏟아지는 무기 사격이 그들을 무자비하게 하나씩 쓰러뜨렸습니다. $mem_czar_alexei.11.desc_2$"
 mem_czar_alexei.11.desc_2:0 "우리는 총격전이 시작된 직후 탐사대와의 연락이 끊겼습니다.\n\n전투 중에 사망하지 않은 이들은 포로로 잡혔을 가능성이 높으며, 실종된 것으로 추정됩니다. 이는 이 불행한 모험의 끝을 의미합니다."
 mem_czar_alexei.12.name:0 "새로운 친구"
 mem_czar_alexei.12.desc.a:0 "우리 팀은 적과 공개적으로 교전했지만, 여러 방향에서 쏟아지는 포화에 압도당해 즉시 은신처를 찾아야 했습니다. 잔해 뒤에 몸을 숨기고 그들이 할 수 있는 최선은 불가피한 상황을 지연시키고 마지막까지 저항하는 것이었습니다.\n\n갑작스러운 폭발로 공격자 두 명이 제거된 후, 명백한 제3의 세력과의 근접 전투가 벌어졌습니다. 점점 더 많은 공격자들이 다른 세력에 집중하자, 우리 팀은 주도권을 잡았습니다. 결국, 단 한 명의 인간형 존재였던 새로운 동료와 함께 전투에서 승리했습니다.\n\n$mem_czar_alexei.12.desc_2$"
 mem_czar_alexei.12.desc.b:0 "우리 팀은 공격자들과 외로운 인간형 존재 간의 전투를 목격하기 위해 제때 도착했습니다. 개인 방패에 의해 흡수되는 듯한 여러 차례의 타격을 받으면서도, 그 낯선 이는 근접 전투에서 주로 검으로 적들과 맞섰고, 때때로 손목에 장착된 레이저로 더 먼 공격자들을 저지했습니다. 이러한 용감한 전시에도 불구하고, 상대 세력은 여전히 우세한 상황이었습니다.\n\n우리 팀은 기습을 이용해 첫 공격에서 일부 공격자를 제압하는 데 성공하여 전세를 확실히 우리 쪽으로 기울였습니다. 그 낯선 존재와 함께 남은 세력을 물리치고 전투에서 승리했습니다.\n\n$mem_czar_alexei.12.desc_2$"
 mem_czar_alexei.12.desc_2:0 "그에 따르면, 그는 다른 현실에서 온 존재로, 우리와 마찬가지로 균열 중 하나를 통해 이곳에 왔습니다. 그의 존재에 대한 구체적인 상황은 의도적으로 모호하게 유지되고 있습니다.\n\n이전 탐사 중 그의 동료들은 이미 우리의 공격자들과 접촉했었다고 전해집니다. 그는 그들을 개인적인 사냥터로 이곳을 주장하는 사냥꾼의 부족 사회로 묘사합니다. 그들이 이곳에 온 목적은 야생 동물을 사냥하기 위한 것이 아닌 것이 분명합니다. 대신, 그들이 선택한 목표는 다중 우주 전역의 균열 탐사자들이었습니다.\n\n사냥꾼들이 처리된 후, 그들의 배는 압수되었고 우리의 탐사대와 그들의 새로운 동맹이 되어 우리 우주로 돌아가고 균열을 통해 돌아가기로 결정했습니다."
 mem_czar_alexei.12.a:0 "승리한 이들을 환영합시다!"
 mem_czar_alexei.13.name:0 "Souvenir"
 mem_czar_alexei.13.desc.a:0 "우리 팀은 적을 사격 각도로 유도하고 우위를 점하기 위해 잔해 속에 바리케이드를 쳤습니다. 그들이 잔해에 들어가려 할 때, 갑자기 외부에서 전투가 벌어졌습니다. 우리 팀이 출구로 나아가던 중, 공격자들과 외로운 인간형 사이의 전투가 진행되고 있는 것을 목격했습니다. $mem_czar_alexei.13.desc_2$"
 mem_czar_alexei.13.desc.b:0 "우리 팀은 공격자들과 외로운 인간형 사이의 진행 중인 전투를 목격하기 위해 제때 도착했습니다. $mem_czar_alexei.13.desc_2$"
 mem_czar_alexei.13.desc_2:0 "여러 차례 공격을 받으면서 개인 방패에 흡수되는 듯한 모습으로, 낯선 이는 적들과 근접 전투를 벌이며 주로 검으로 싸웠고, 때때로 손목에 장착된 레이저로 더 먼 공격자들을 저지했습니다. 이러한 용감한 전시에도 불구하고, 상대 세력은 여전히 우세한 상황이었습니다.\n\n우리 팀은 기습의 요소를 이용해 첫 공격에서 일부 공격자를 처치하여 전세를 확실히 유리하게 바꿀 수 있었습니다. 비록 낯선 이를 구하는 데 실패했지만, 우리 팀은 남은 세력을 물리치고 전투에서 승리했습니다. 우리의 탐사대장은 죽은 낯선 이의 검을 기념품으로 가져가기로 했습니다.\n\n그 후 남은 일은 사냥꾼들이 가져온 이제 주인이 없는 구체를 확보하고 균열을 통해 돌아가는 것이었습니다."
 mem_czar_alexei.14.name:0 "성공적인 후퇴"
 mem_czar_alexei.14.desc:0 "우리 탐사대는 자신들의 싸움이 아닌 전투에 뛰어들지 않기로 결정하고 공격자들의 방치된 배로 향했습니다. 내부에 들어가 시스템에 접근하는 것은 꽤 힘든 일이었지만, 우리 팀은 적들이 발이 묶인 채로 필사적으로 저지하려는 모습을 보며 이륙하는 데 성공했습니다."
 mem_czar_alexei.14.a:0 "그들을 다시 맞이합시다."
 mem_czar_alexei.15.desc_01:0 "당신의 이전 도움에 감사드립니다. 하지만 우선 소개가 필요할 것 같습니다.\n\n저는 유니타리안 테란 연방의 전 통치자 알렉세이 코롤레프 차르입니다. 그러나 불행한 상황으로 인해 우리가 만난 세계에서 추방당하게 되었습니다. 현재로서는, 제가 알기로 이곳은 제가 알고 있는 것과는 매우 다른 평행 현실이기 때문에 제 이전 직함이나 제국은 당신에게 아무런 의미가 없을 것입니다."
 mem_czar_alexei.15.desc_02:0 "기꺼이 말씀드리겠습니다. 다른 궁금한 점이 있으신가요?"
 mem_czar_alexei.15.a:0 "이 공격자들에 대해 무엇을 말씀해 주실 수 있습니까?"
 mem_czar_alexei.15.a.response:0 "우리는 이전의 균열 탐사 중에 그들과 접촉하게 되었습니다. 말할 필요도 없이, 외교적 교류는 없었습니다. 그들의 사회는 고대의 무예 철학에 지배받고 있으며, 강인한 상대를 사냥하고 물리치는 행위는 그 안에서 높은 평가를 받는 것 같습니다. 그들은 다른 종족을 자신들보다 열등하게 여깁니다.\n\n그들이 이 균열 넥서스를 사냥터로 삼았다는 것은 놀라운 일이 아닙니다. 서로 연결된 많은 평행 현실이 존재하므로, 흥미로운 "먹이"의 다양성을 유인할 수밖에 없습니다."
 mem_czar_alexei.15.b:0 "어떻게 그 행성에 오게 되었습니까?"
 mem_czar_alexei.15.b.response:0 "간단히 말해 쿠데타입니다.\n\n저의 가장 가까운 부하들 중 일부가 저에게 반란을 일으켰습니다. 신뢰와 우정이 그들의 탐욕과 권력에 대한 욕망이 서서히 그들을 부패시키고 있다는 사실을 보지 못하게 했습니다. 그들의 진짜 모습이 드러났을 때, 선택을 해야 했습니다: 남아서 싸우거나 망명하느냐.\n\n저는 후자를 선택했습니다. 저는 제국을 세운 것이 내전의 불길과 그로 인한 고통에 의해 소모되는 것을 보기 위해서가 아니었습니다.\n\n제 의도는 균열 넥서스와 연결된 다른 은하 중 하나에 도달하는 것이었습니다. 그러나 사냥꾼들은 이에 불쾌감을 느끼고 저를 더 오랜 체류를 위해 "초대"했습니다. 그 이후로 저는 그들의 사냥대와 일련의 소규모 전투를 벌였습니다."
 mem_czar_alexei.15.c:0 "거기서 혼자 어떻게 살아남을 수 있었습니까?"
 mem_czar_alexei.15.c.response:0 "고대 기술. 나는 항상 우리보다 앞선 문명에 매료되어 있었고, 테란 공간 내에서 다양한 고고학 발굴에 자금을 지원해왔습니다. 그 중 일부 발견물은 이제 내 갑옷에 통합되어 있습니다. 팔찌에 장착된 소형 레이저 포, 개인 방어막 생성기, 그리고 여러분이 눈치챘듯이 단순한 금속 조각 이상의 의미를 지닌 이 검을 잊지 말아야 합니다.\n\n이것들은 꽤 유용했지만, 내가 고고학 프로젝트를 통해 얻은 가장 중요한 증강은 우리 은하 가장자리에 위치한 외딴 별 집단에서 얻은 나노 기계들이었습니다. 독에 대한 면역, 증가된 치유 능력, 그리고 노화 방지 특성 - 이 작은 기계들은 정말 유용합니다.\n\n하지만 나를 추적해온 사냥꾼들은 점점 더 커져갔습니다. 내 장비가 얼마나 더 오랫동안 내 편에 유리하게 작용할 수 있었는지 확신할 수 없습니다."
 mem_czar_alexei.15.d:0 "이제 무엇을 하시겠습니까?"
 mem_czar_alexei.15.e:0 "우리와 함께 하자는 제안으로 돌아갑니다."
 mem_czar_alexei.16.desc_01:0 "아직 확신이 서지 않습니다.\n\n저는 당신과 함께하고 다양한 분야에서 제 전문 지식을 나눌 수 있습니다. 만약 저에게 자리를 제공해 주신다면요. 결국 저는 당신에게 빚을 지고 있습니다. 그렇지 않다면, 저를 탐험할 새로운 은하가 기다리고 있습니다."
 mem_czar_alexei.16.desc_02:0 "내 제안을 고려해 보셨습니까?"
 mem_czar_alexei.16.a:0 "먼저 우리가 더 묻고 싶은 질문이 있습니다."
 mem_czar_alexei.16.hire.tooltip:0 "§G기술 5§!의 전설적인 지휘관이 귀하의 지도자 풀에 합류합니다."
