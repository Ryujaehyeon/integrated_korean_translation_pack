l_korean:
 mem_last_orila_ship_debuff:0 "고대의 자부심"
 mem_ancient_alt_science:0 "과학 순양함"
 mem_ancient_alt_science_plural:0 "과학 순양함들"
 mem_pride_of_harilla_object:0 "하릴라의 자부심"
 mem_pride_of_harilla_object_desc:0 "이 모든 시간이 지난 후에 존재하는 것만으로 진보된 설계에 대한 증거입니다."
 mem_pride_of_harilla_reactor_object:0 "사라진 원자로"
 mem_pride_of_harilla_reactor_object_desc:0 "이것은 '하릴라의 자부심'의 잃어버린 원자로입니다."
 mem_last_orila_1_chain_title:0 "오랫동안 잃어버린 자부심"
 mem_last_orila_1_chain_desc:0 "수천 년 전, 오릴라 함대는 함정에 빠졌습니다. 그들의 적들은 함대가 궤도를 돌고 있던 항성을 붕괴시켜, 오릴라 함선을 거대한 폭발로 산산조각냈습니다.\n\n당시 오릴라 기함의 지휘관이었던 챕린 자신도 몇 안 되는 생존자 중 한 명이었습니다. 함대의 다른 모든 함선은 완전히 파괴되었지만, '하릴라의 자부심'은 심각한 피해를 입었음에도 불구하고 폭발을 견뎌냈습니다. 생존자들은 그럼에도 불구하고 함선을 포기할 수밖에 없었고, 그 함선은 오늘날까지 회수되지 않았습니다.\n\n함대의 손실은 오릴라 국가에 큰 타격을 주었습니다. 그들은 기술적으로 열세인 적들이 어떻게 전체 항성을 붕괴시킬 수 있었는지 baffled되었습니다. 문명이 무너져 내리면서, 오릴라는 외부 세력의 소행일 것이라고 추측할 수밖에 없었지만, 마지막 우주 요새는 어떤 증거도 발견되기 전에 무너졌습니다.\n\n오릴라가 사실상 멸종된 지금, 항성 붕괴의 진정한 원인은 여전히 미스터리로 남아 있습니다. 그러나 잔해는 여전히 그곳에 있을지도 모릅니다. 만약 우리가 그것을 회수하고 복원할 수 있다면, 우리의 목적에 분명히 도움이 될 것입니다."
 mem_last_orila_2_chain_title:0 "오랫동안 잃어버린 자부심"
 mem_last_orila_2_chain_desc:0 "'하릴라의 자존심'의 잔해를 발견했습니다. 이를 연구하는 동안 해적 함대가 우리의 연구팀을 공격했습니다. 챕린에 따르면, 이 배의 에너지 코어가 사라졌습니다. 그들의 공격적인 행동을 고려할 때, 이 해적들은 이 잔해의 가치를 인식하고 이미 고급 기술을 위해 이를 약탈하기 시작했을 것입니다. 잃어버린 에너지 코어를 찾을 수 있는 유일한 희망은 해적들을 그들의 본거지로 추적하는 것입니다."
 mem_last_orila_1_system:0 "결정적 패배의 현장"
 mem_last_orila_1_system_desc:0 "수천 년 전, 오릴라 함대는 적들이 놓은 함정으로 유인되었습니다."
 mem_last_orila.1.name:0 "잃어버린 함대"
 mem_last_orila.1.desc:0 "Chap'Lin의 메시지가 도착했습니다. 그의 구식 정보를 검증하기 위해 우리의 데이터베이스를 연구한 결과가 잘 진행된 것 같습니다.\n\n데이터 동기화의 결과 중 하나가 [root.GetName]에 대해 그가 특별한 관심을 두게 되었습니다. 그의 말에 따르면, 이 메시지에 첨부된 좌표는 Orila의 결정적인 패배와 궁극적인 멸망이 일어난 곳으로 우리를 이끌 수 있을 것입니다.\n\n더 자세한 정보는 상황 로그에서 확인할 수 있습니다."
 mem_last_orila.1.a:0 "그곳으로 가보자."
 mem_last_orila.2.name:0 "필로스 시그마 도착"
 mem_last_orila.2.desc:0 "우리는 필로스 시그마 성계에 도착했습니다. 오릴라의 운명이 영겁 전에 봉인된 곳입니다.\n\n중앙 교량 감시기는 블랙홀의 위협적인 아귀 앞에 있는 잔해와 거대한 난파선으로 보이는 광경을 확대해서 보여줍니다. 다행히도, 우리 센서에 따르면, 그것은 안전한 거리에 있습니다.\n\n우리의 발견을 조사하기 위한 프로젝트가 상황 로그에 추가되었습니다."
 mem_last_orila.2.a:0 "잘했다. 더 이상 시간을 낭비하지 말자고."
 MEM_LAST_ORILA_WRECKAGE_INVESTIGATION:0 "하릴라의 자부심"
 MEM_LAST_ORILA_WRECKAGE_INVESTIGATION_DESC:0 "잔해는 여전히 필로스 시그마 시스템에 남아 있으며, 오랜 세월에도 불구하고 여전히 대부분 손상되지 않았습니다. 가능한 한 빨리 조사해야 합니다. 복원할 수 있다면 [root.owner.GetName]에 확실히 도움이 될 것입니다."
 mem_last_orila.3.name:0 "미확인 함대 접근"
 mem_last_orila.3.desc:0 "미확인 함대가 성계에 도착했습니다. 오릴라 잔해에 접근해 모든 통신을 차단하고 있습니다. 우리는 그들을 적으로 간주합니다. 고대 기술이 다른 사람의 손에 넘어가는 위험을 감수할 수는 없습니다."
 mem_last_orila.3.a:0 "함대를 보내 그들을 막아라."
 mem_last_orila.5.name:0 "사라진 원자로"
 mem_last_orila.5.desc:0 "잔해에 대한 조사 결과 우리가 처음으로 그 잔해에 손을 댄 것이 아님이 밝혀졌습니다. 채플'린에 따르면 우주선의 중요한 부분인 원자로 모듈이 누락되었습니다.\n\n다행히 우리는 조사 전에 우리가 싸운 해적들이 들어온 경로를 추정하여 해적들의 근거지를 추적할 수 있었습니다. 우리는 그들이 처음에 원자로 모듈을 제거한 책임이 있기를 바랄 뿐입니다."
 mem_last_orila.5.a:0 "우리가 가진 단서는 이것뿐이다."
 mem_last_orila_2_system:0 "해적함대의 근거지"
 mem_last_orila_2_system_desc:0 "우리의 센서 자료에 따르면, 우리 연구팀을 공격한 해적단은 이 성계에서 왔습니다."
 mem_last_orila.6.name:0 "해적 소굴"
 mem_last_orila.6.desc:0 "우리 함대가 해적들의 고향 성계에 도착했습니다. 그들은 실제로 잔해에서 원자로 모듈을 가져갔습니다. 우리의 센서에 의해 이미 감지되었습니다. 아쉽게도 이 성계는 매우 요새화되어 있으며 이러한 무법자들과의 지난번 교전을 고려할 때 외교는 선택 사항이 아닌 것 같습니다."
 mem_last_orila.6.a:0 "성계를 장악하고 원자로를 찾아라."
 MEM_LAST_ORILA_REACTOR_PICKUP_1:0 "원자로 조사"
 MEM_LAST_ORILA_REACTOR_PICKUP_1_DESC:0 "잃어버린 원자로 모듈을 찾았습니다. 그러나 우리 과학자들은 '하릴라의 자존심'을 재건하려는 계획을 진행하기 전에 먼저 그것을 조사해야 할 것입니다."
 mem_last_orila.7.name:0 "원자로 조사 완료"
 mem_last_orila.7.desc:0 "우리 과학자들은 원자로 모듈이 여전히 한 덩어리라는 사실에 안도하고 있습니다. 다행히도 해적들은 우리의 함대가 도착하기 전에 그것을 만질 시간이 부족했던 것 같습니다. 나이가 있음에도 불구하고, 이 모듈은 상황을 고려했을 때 양호한 상태인 것 같습니다. 이제 이를 챕린의 함선에 연결할 수 있을 것입니다."
 mem_last_orila.7.a:0 "좋아. 계속해."
 mem_last_orila_pickup_1:0 "원자로 연결"
 mem_last_orila_pickup_1_desc:0 "이제 원자로 모듈을 채플'린의 선박에 연결할 준비가 되었습니다. 이 좌표에 '슬레이프니르'를 가져오세요."
 MEM_LAST_ORILA_REACTOR_PICKUP_2:0 "원자로 연결"
 MEM_LAST_ORILA_REACTOR_PICKUP_2_DESC:0 "이제 원자로 모듈을 채플'린의 함선에 연결할 준비가 되었습니다."
 mem_last_orila.81.name:0 "연결 성공"
 mem_last_orila.81.desc:0 "'Sleipnir'의 연결 과정이 완료되었습니다. 우리는 이를 운영할 준비가 되었습니다."
 mem_last_orila.81.a:0 "훌륭해. 계속해라."
 mem_last_orila.9.name:0 "연결 중단"
 mem_last_orila.9.desc:0 "이 시스템에 채플'린이 없으면 연결 프로젝트를 완료할 수 없습니다."
 mem_last_orila.9.a:0 "알았다."
 MEM_LAST_ORILA_HULL_PICKUP_1:0 "선체 안정화"
 MEM_LAST_ORILA_HULL_PICKUP_1_DESC:0 "선체 모듈이 심하게 손상되었으며 '하릴라의 자부심'을 재조립하려는 계획을 진행하기 전에 광범위한 수리가 필요합니다."
 mem_last_orila.10.name:0 "선체 안정화 완료"
 mem_last_orila.10.desc:0 "선체 안정성이 허용 가능한 수준으로 복원되었습니다. 여전히 광범위한 수리가 필요하지만, [root.owner.Capital.GetName]로 이동하는 것은 가능할 것입니다. 이제 Chap'Lin의 선박에 연결할 수 있을 것입니다."
 mem_last_orila.10.a:0 "좋아. 계속해."
 mem_last_orila_pickup_2:0 "선체 연결"
 mem_last_orila_pickup_2_desc:0 "이제 선체 모듈을 채플'린의 함선에 연결할 준비가 되었습니다. 이 좌표에 '슬레이프니르'를 가져오세요."
 MEM_LAST_ORILA_HULL_PICKUP_2:0 "선체 연결"
 MEM_LAST_ORILA_HULL_PICKUP_2_DESC:0 "이제 선체 모듈을 Chap'Lin의 함선에 연결할 준비가 되었습니다."
 mem_last_orila_3_chain_title:0 "오랫동안 잃어버린 자부심"
 mem_last_orila_3_chain_desc:0 "이제 '하릴라의 자부심'의 잔해를 회수했으므로 마침내 고대의 영광을 되찾을 때입니다."
 mem_last_orila.12.name:0 "연결 완료"
 mem_last_orila.12.desc:0 "모든 모듈이 채플'린의 함선에 연결된 상태에서 [root.Capital.GetName]에 있는 궤도 조선소는 채플'린이 복원 과정을 시작하기 위해 도착을 기다리고 있습니다."
 mem_last_orila.12.a:0 "알았다."
 mem_last_orila_pickup_3:0 "복원 준비"
 mem_last_orila_pickup_3_desc:0 "복원을 시작하기 위해 [mem_last_orila_capital.GetName]의 궤도 조선소에서 '하릴라의 자부심'이 기다리고 있습니다."
 MEM_LAST_ORILA_RESTORATION_1:0 "복원 준비"
 MEM_LAST_ORILA_RESTORATION_1_DESC:0 "복원을 시작하기 위해 [root.owner.Capital.GetName]의 궤도 조선소에서 '하릴라의 자부심'이 기다리고 있습니다."
 mem_last_orila.14.name:0 "연기된 복원 준비"
 mem_last_orila.14.desc:0 "이 성계에 채플'린이 없으면 우리는 준비를 마칠 수 없습니다."
 mem_last_orila.14.a:0 "알았다."
 MEM_LAST_ORILA_RESTORATION_2:0 "복원"
 MEM_LAST_ORILA_RESTORATION_2_DESC:0 "'하릴라의 자부심'은 [root.owner.Capital.GetName]의 궤도 조선소에서 예전의 영광을 되찾고 있습니다."
 mem_pride_of_harilla_restoration_object:0 "하릴라의 자부심"
 mem_pride_of_harilla_restoration_object_desc:0 "이 함선은 현재 대대적인 수리를 진행하고 있습니다."
 mem_last_orila.15.name:0 "복원 완료?"
 mem_last_orila.15.desc:0 "마침내 '하릴라의 자부심'이 수리되었고, 적어도 처음에는 그랬습니다. 채플'린은 비록 수리가 성공적이었지만 배의 많은 시스템이 최적 수준 이하에서 작동하고 있다고 설명합니다. 그의 폭넓은 지식에도 불구하고, 고대 기술에 적용된 다소 원시적인 수정 사항에 적응하고 새로운 형태의 함선의 잠재력을 최대한 발휘하는 데 몇 년이 걸릴 수 있습니다. 그는 자신이 몇 가지 교정 중이라고 말하면서 자리를 비워달라고 간청합니다."
 mem_last_orila.15.a:0 "나중에 이야기하겠습니다... 그렇게 생각합니다."
 mem_last_orila.18.name:0 "함선 손실"
 mem_last_orila.18.desc:0 "채플'린의 함선이 손실되면서 '하릴라의 자부심'을 복원하려는 모든 희망이 사라졌습니다. 다행히 잔해를 수색하는 공학자들은 아직 손상되지 않은 데이터 핵을 회수할 수 있었습니다. 그는 조언자로서 [root.GetName]을(를) 더 돕기 위해 [root.Capital.GetName](으)로 이동합니다.\n\n나머지 잔해 부품은 우리의 미래 연구 노력이 가치가 있음을 증명할 것입니다. 추가 연구를 위한 프로젝트가 상황 로그에 추가되었습니다."
 mem_last_orila.18.a:0 "적어도 우리는 채플'린을 잃지 않았어."
 mem_last_orila.19.name:0 "함선 손실"
 mem_last_orila.19.desc:0 "Chap'Lin의 우주선이 잃어버리면서 '하릴라의 자존심'을 복구할 희망이 사라졌습니다. 다행히 잔해를 수색하던 엔지니어 팀이 그의 데이터 코어를 온전하게 회수할 수 있었습니다. 그는 [root.Capital.GetName]로 옮겨져 [root.GetName]의 자문 역할을 할 것입니다."
 mem_last_orila.19.a:0 "적어도 우리는 채플'린을 잃지 않았어."
 MEM_LAST_ORILA_WRECKAGE_STUDY:0 "고대의 함선 설계"
 MEM_LAST_ORILA_WRECKAGE_STUDY_DESC:0 "선체가 심하게 손상되었지만 공학 분야에서 지식을 향상시키기 위해 많은 내부 시스템을 연구할 수 있습니다."
 MEM_LAST_ORILA_REACTOR_STUDY:0 "고대의 원자로 기술"
 MEM_LAST_ORILA_REACTOR_STUDY_DESC:0 "현재 그것을 재현할 수 있을지 의문이지만, 우리는 이 고대 기술을 연구함으로써 물리학 분야에 대한 우리의 이해를 엄청나게 높일 수 있습니다."
 mem_last_orila.20.name:0 "함선 설계 연구 완료"
 mem_last_orila.20.desc:0 "우리 [root.GetName]에 탑승한 과학자들이 고대 잔해에 대한 연구를 마쳤습니다. 그것은 분명히 잃기 전에는 인상적인 배였을 것입니다. 그럼에도 불구하고, 우리는 그 시스템을 기반으로 연구에서 상당한 진전을 이루었습니다."
 mem_last_orila.20.a:0 "진행하도록."
 mem_last_orila.21.name:0 "원자로 연구 완료"
 mem_last_orila.21.desc:0 "우리의 과학자들이 [root.GetName]에 탑승하여 고대 반응기에 대한 연구를 마쳤습니다. 이 유물이 생성할 수 있는 에너지 양은 우리의 가장 고급 에너지 생성기조차 능가합니다. 이 고대 기술을 연구함으로써 얻은 통찰력은 우리의 기술 발전에 크게 기여할 것입니다."
 mem_last_orila.21.a:0 "아주 좋군."
