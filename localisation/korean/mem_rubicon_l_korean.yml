 MEM_RUBICON_UP_BEAM:0 "루비코니드 UP 광선"
 MEM_RUBICON_DROD:0 "루비코니드 DROD 방출기"
 MEM_RUBICON_WORLDMENDER_GUN:0 "월드멘더 대포"
 MEM_RUBICON_AUX_MODULE:0 "월드멘더 기술 저장고"
 MEM_RUBICON_AUX_MODULE_DESC:0 "이 거대한 데이터 코어는 월드멘더들이 모은 대량의 지식을 저장하고 있습니다."
 mem_rubicon.1.name:0 "루비콘 성계"
 mem_rubicon.1.desc:0 "우린 오래된 전투의 잔해들로 가득한 §Y[From.GetName]§! 성계를 미확인 함선들이 순찰하는 것을 발견하였습니다. §Y루비코니드§!라 이름 붙인 이 함선들은 소행성 지대에 마치 무언가를 지키고 있는 것처럼 집중되어 있습니다."
 mem_rubicon.1.a:0 "상황을 계속해서 지켜봐라."
 mem_rubicon_core_category:0 "은폐된 함선"
 mem_rubicon_core_category_desc:0 "거대한 함선의 형태가 잔해의 더미 속에서 발견되었습니다."
 mem_rubicon.2.name:0 "은폐된 함선"
 mem_rubicon.2.desc:0 "[Leader.GetName]는 [Leader.GetSheHe] [Leader.GetHasHave]가 행성 잔해 필드의 가장 밀집된 부분에 미지의 선박이 존재한다는 것을 확인했다고 보고합니다. \n\n초기 관측 결과, 이 선박은 큰 바위 옆에 주차되어 있으며 현재로서는 안전하지만, 위험한 환경 때문에 안전하게 이동시키는 것은 불가능할 것입니다."
 mem_rubicon.2.a:0 "계속 관찰해야 한다."
 mem_rubicon.2.a.tooltip:0 "§S$mem_rubicon_hidden_ship$§!을 §Y[From.GetName]§!에 추가합니다: \n£engineering£ 공학 §G+6§!입니다. \n그 위에 §S연구 기지§!를 건설하여 더 많은 정보를 찾아보세요."
 mem_rubicon_hidden_ship:0 "은폐된 함선"
 mem_rubicon_hidden_ship_desc:0 "우주 쓰레기 속에 함선이 하나 숨겨져 있습니다.\n\n§L연구 스테이션을 건설§!해야 더 자세히 조사할 수 있습니다."
 mem_rubicon.4.name:0 "흔치 않은 기회"
 mem_rubicon.4.desc:0 "한동안 §Y[From.GetName]§!을 관찰한 결과, 우리 과학자들은 잔해 사이를 통과해 함선까지 도달할 계획을 수립했습니다. 상당히 위험한 임무가 되겠지만, 보고된 내용에 의하면 그곳에 상당히 발전된 기술이 숨겨져 있을 것으로 보입니다."
 mem_rubicon.4.a:0 "실행해라."
 MEM_RUBICON_EXPEDITION:0 "은폐된 함선"
 MEM_RUBICON_EXPEDITION_DESC:0 "§Y[mem_rubicon_core_planet.GetName]§!이라 명명된 잔해의 구름 사이에 함선이 하나 숨겨져 있습니다. 정확한 타이밍과 순발력을 통해 우리는 함선에 도달하려고 할 것입니다."
 mem_rubicon.5.name:0 "월드멘더"
 mem_rubicon.5.desc:0 "과학자 [Leader.GetName]가 [Root.GetName]에 탑승하여 보고하기를 [Leader.GetHerHis] 팀이 §Y[mem_rubicon_core_planet.Solar_System.GetName]§! 시스템의 밀집 잔해 필드를 성공적으로 탐색하고 그 가운데 숨겨진 비활성 함선에 탑승했다고 합니다. \n\n해당 함선은 인상적으로 오래된 것으로, 수천 년에서 수십만 년에 이르는 추정 연대가 있습니다. 함선에 탑재된 대부분의 장비와 데이터 코어는 노화와 잔해 충격으로 인해 손실되었습니다. 그러나 우리가 수집한 것들은 여전히 매우 매혹적입니다. 이 함선은 월드멘더라는 전투함-테라포머 혼합형으로 보입니다. 원래는 대규모 승무원과 많은 승객을 수용할 수 있었으나, 현재는 "플릿마인드"라는 AI 유닛의 감독 아래 보존되고 있습니다. \n\n전체 월드멘더는 탈출할 수 없을 정도로 손상되었지만, 일부는 우리의 도움으로 탈출할 수 있을지도 모릅니다."
 mem_rubicon.5.a:0 "함선의 주 모듈들만 보호하면 된다."
 mem_rubicon.5.a.tooltip:0 "AI 제독과 함께 강력한 함선 하나가 우리 함대에 추가됩니다. 이 함선을 보유하는 한 우리는 §Y$mem_rubicon_mender_archives$§!의 혜택을 받을 것입니다."
 mem_rubicon.5.b:0 "함선 모듈들은 지키되 AI는 파괴하라."
 mem_rubicon.5.b.tooltip:0 "강력한 함선 하나가 우리 함대에 추가됩니다. 이 함선을 보유하는 한 우리는 §Y$mem_rubicon_mender_archives$§!의 혜택을 받을 것입니다."
 mem_rubicon.5.c:0 "테라포밍 장치를 가동시켜라."
 mem_rubicon.5.c.tooltip:0 "이 시스템을 가동하면 함선을 잃을 것입니다. 주변 잔해들을 다시 행성으로 복구시킬 것입니다."
 mem_rubicon.5.c.tooltip.gaia:0 "§G가이아§! 행성이 생성됩니다."
 mem_rubicon.5.c.tooltip.regular:0 "평범한 행성이 생성됩니다."
 mem_rubicon.5.c.tooltip.tomb:0 "§L죽은§! 행성이 생성됩니다."
 mem_rubicon.5.c.tooltip.barren:0 "§R황폐한§! 행성이 생성됩니다."
 mem_rubicon.5.d:0 "함선을 만든 자들의 기록을 확인해보아라."
 mem_rubicon.5.d.response:0 "이 배는 단순히 §SMenders§!로 알려진 문명에 속했습니다. 그들의 이념의 핵심 원칙은 "생태적 우월"이라는 감각으로 보이며, 즉 그들은 고향 행성의 자연 생태계가 은하의 다른 어떤 생태계보다 우수하다고 믿었습니다. 여러 세대에 걸쳐 그들은 토착 생명체에 대한 무관심 속에서 공격적인 테라포밍을 실천해 왔으며, 종종 전체 행성의 생물권을 파괴하고 새롭게 재구성했습니다. 때때로 그들은 이른바 월드멘더 함선이 이끄는 함대를 사용하여 행성을 분해하고 그들의 이상적 기준에 맞게 재구성하기도 했습니다."
 mem_rubicon.5.e:0 "그들의 멸망에 대해 더 자세히 조사해봐라."
 mem_rubicon.5.e.response:0 "멘더의 정치적 소속에 대한 정보는 미비하지만, 그들의 몰락의 역사는 명확해 보입니다. \n\n멘더의 테라포밍 광풍에 휘말린 문명 중 하나는 자동화된 미공개 조선소 네트워크에 의존했던 것으로 보이며, 그들의 세계는 멘더의 디자인에 맞춰 빠르게 정원으로 변모했지만, 몇몇 조선소는 남아 있었습니다. \n\n그들의 주인이 멸종한 지 약 한 세기 후, 드론의 무리가 과도하게 확장되고 안일해진 멘더 제국의 경계에 나타나 그들의 함대를 수적 우세로 압도했습니다. 한때 창조주를 멸망시킨 멘더들은 드론의 자비에 놓이게 되었고, 곧 미공개 기지로 후퇴할 수밖에 없었습니다. 그들의 최선의 노력에도 불구하고 적은 그들을 추격하여 남아 있는 함대를 파괴했습니다."
 mem_rubicon.5.f:0 "마지막 기록을 확인해라."
 mem_rubicon.5.f.response:0 "여기, [mem_rubicon_core_planet.Solar_System.GetName] 항성계에서, 관리인들은 그들의 파괴를 위해 필사적으로 달려드는 기계들에 맞서 마지막 저항을 했습니다. 한때 유망한 테라포밍 프로젝트가 진행되던 장소였던 이곳은 그들이 끝을 맞이할 장소가 되었습니다.\n\n 패배가 불가피해 보였을 때, 심각하게 손상된 기함이 반쯤 형성된 행성의 껍질 속으로 잠수하여 미공개 상태로 남아 있었고, 관리인 AI에 의해 운영되고 유지되었습니다. 그것을 추적할 수 없었던 드론들은 항성계에서 경계를 서고 있었습니다. 시간이 지나면서, 생존한 드론들은 그들의 진정한 목표를 알지 못한 은하 탐험가들에 의해 §SRubiconids§!로 지정된 것 같습니다."
 mem_rubicon_mender_archives:0 "멘더들의 기록 보관소"
 mem_rubicon_mender_archives_desc:0 "월드멘더의 데이터뱅크에는 엄청난 양의 테라포밍 기술들이 저장되어 있습니다. 정보를 옮길 수단이 없으므로 이 함선을 보존하는 것이 유일한 방법입니다."
 trait_mem_rubicon_mender:0 "멘더 마인드"
 trait_mem_rubicon_mender_desc:0 "이 AI는 멘더들의 함대를 이끌고 행성을 재건하는 역할을 둘 다 수행하였습니다. 이제는 다른 함대를 이끌도록 개조되었습니다."
 mem_rubicon.6.name:0 "행성 복구 성공."
 mem_rubicon.6.desc:0 "§Y[mem_rubicon_core_planet.GetName]§!은(는) 성공적으로 가이아 행성이 되었습니다. 멘더들이 멸종한 지 수천 년이 지난 지금, 그들의 꿈은 이곳에 살아있습니다."
 mem_rubicon.7.name:0 "행성 복구 완료"
 mem_rubicon.7.desc:0 "테라포밍 장비가 입은 손상 때문에 능력 전부를 발휘할 수 없었지만, §Y[mem_rubicon_core_planet.GetName]§!은 성공적으로 거주가 가능한 행성이 되었습니다. 멘더들이 멸종한 지 수천 년이 지난 지금, 그들의 꿈은 이곳에 살아있습니다."
 mem_rubicon.7.a:0 "그럭저럭한 결과로군."
 mem_rubicon.8.name:0 "결함있는 행성 복구"
 mem_rubicon.8.desc:0 "terraforming 장비가 입은 피해가 너무 심각한 것 같습니다. §Y[mem_rubicon_core_planet.GetName]§!는 부분적으로 거주 가능한 세계로 성공적으로 변형되었지만, 대규모 방사선 누출로 인해 완전히 거주 가능한 상태가 되지 못했습니다. \n\n회복자들의 약속의 땅에 대한 꿈은 완전히 실현되지 않았습니다."
 mem_rubicon.8.a:0 "적어도 다시 부서지지는 않는군."
 mem_rubicon.9.name:0 "행성 복구 실패"
 mem_rubicon.9.desc:0 "테라포밍 장비가 입은 손상이 너무 심했던 것으로 보입니다. §Y[mem_rubicon_core_planet.GetName]§!은 다시 행성이 되었지만, 생명을 유지할 수 없습니다. 멘더들의 꿈은 이루어지지 못했습니다."
 mem_rubicon.9.a:0 "실망스럽군."
 mem_rubicon_mended_ecosystem:0 "멘더 생태계"
 mem_rubicon_mended_ecosystem_desc:0 "이 행성의 생태계는 오래전에 멸종한 \"멘더\"들의 설계를 따라 처음부터 재구축되었습니다. 모든 것이 조화를 이룹니다."
 mem_rubicon_country_buff:0 "루비코니드"
