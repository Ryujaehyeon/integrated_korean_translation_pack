 mem_asteroid_derelict_structure_category.field_manipulation_bias:0 "버려진 구조물"
 mem_asteroid_derelict_structure_category.particles_bias:0 "버려진 구조물"
 mem_asteroid_derelict_structure_category.biology_bias:0 "버려진 구조물"
 mem_asteroid_derelict_structure_category_desc:0 "조사 중 연구팀이 소행성 표면의 구조물을 발견했습니다."
 mem_asteroid_derelict_structure.1.name:0 "위험한 상태"
 mem_asteroid_derelict_structure.1.desc:0 "구조물이 한때 무엇이었는지는 알 수 없지만, 시간의 파괴로 잃어버린 상태입니다. 우리의 탐사선은 구조물에 안전하게 접근할 수 있는 경로를 찾지 못해, 구조 작업은 비현실적인 노력이 되었습니다. [Root.leader.GetName]는 탐사를 중단하였습니다."
 mem_asteroid_derelict_structure.1.a:0 "안됐군."
 mem_asteroid_derelict_structure.2.name:0 "비어있는"
 mem_asteroid_derelict_structure.2.desc:0 "이 구조물을 만든 이가 오래전에 버리고 간 것으로 보이며, 그 목적을 알 수 있는 어떤 흔적도 남아 있지 않습니다. 실망스럽지만, 적어도 구조물을 구성하는 자재는 회수하여 다른 곳에 사용할 수 있습니다."
 mem_asteroid_derelict_structure.2.a:0 "젠장."
 mem_asteroid_derelict_structure.3.name:0 "이상한 동력원"
 mem_asteroid_derelict_structure.3.desc:0 "기지에 대한 조사는 특이한 에너지원이 발견되었습니다. 이는 알려지지 않은 기술에 의해 안정화된 미니어처 특이점에 의존하는 것으로 보이며, 우리의 연구원들은 이러한 잠재적으로 귀중한 지식의 원천에 간섭하려는 시도에 대해 understandably 조심스러워하고 있습니다. 그러나 나머지 기술은 우리의 이해 범위 내에 있는 것으로 보이며, 이 구조는 우리의 필요에 맞게 조정할 수 있습니다."
 mem_asteroid_derelict_structure.3.a:0 "그렇게 하자."
 mem_asteroid_derelict_structure.4.name:0 "이상한 것"
 mem_asteroid_derelict_structure.4.desc:0 "우리 연구원들은 이 시설의 원래 의도에 대해 아직 확신하지 못하고 있습니다. 그러나 구조물 자체의 디자인은 매혹적이며, 우리 연구원들은 이를 '메스꺼움', '무서움', 그리고 '완전히, 전혀 불가능함'이라고 묘사했습니다. 이 시설에 거주했던 존재는 전통적인 디자인 원칙을 완전히 무시했으며, 그들이 어떻게 이렇게 놀라운 구조물을 만들었는지에 대한 다양한 이론이 제기되고 있습니다. \n\n연구 시설을 궤도에 배치하면 관련 기술을 더 잘 이해하는 데 도움이 될 수 있습니다."
 mem_asteroid_derelict_structure.4.a:0 "흥미롭군."
 mem_asteroid_derelict_structure.5.name:0 "시계추"
 mem_asteroid_derelict_structure.5.desc:0 "기지는 연구를 위해 설계된 것으로 보입니다. \n\n소행성 근처에는 불안정한 초공간의 안정적인 형성이 있는 것으로 보이며, 그 안에는 여러 개의 큰 소행성이 갇혀 있는 것 같습니다. 이 루프는 소행성이 기지 근처에서 진동하게 하며, 각 소행성은 한 시간 이내에 원래 위치로 돌아옵니다.\n\n이 사건이 쇠퇴하고 있는 것처럼 보이지만, 루프의 효과는 최소 26억 년 동안 지속될 것으로 예측되며, 이는 우리가 그 효과를 충분히 연구할 수 있는 충분한 시간을 제공합니다. 우리 자신의 연구 기지를 설치하는 것은 이 현상에 대한 이해를 더욱 촉진하는 데 도움이 될 것입니다."
 mem_asteroid_derelict_structure.5.a:0 "환상적이야."
 mem_asteroid_derelict_structure.6.name:0 "실수"
 mem_asteroid_derelict_structure.6.desc:0 "이 기지를 설계한 사람은 초공간 여행을 위한 미지의 추진 기술을 연구하기 위해 그렇게 했습니다. 기지 잔해 근처의 분화구 크기를 고려할 때, 그들의 시도가 전혀 성공적이지 않았던 것으로 보입니다. 시설 내에는 우리 연구원들이 보다 면밀히 테스트하여 정확히 작동 여부와 작동 방식을 파악할 수 있는 여러 프로토타입이 있습니다. 기지를 재건하는 것은 이러한 실험을 진행하는 데 도움이 될 것입니다."
 mem_asteroid_derelict_structure.6.a:0 "그렇게 하지."
 mem_asteroid_derelict_structure.7.name:0 "잃어버린 연구실"
 mem_asteroid_derelict_structure.7.desc:0 "우리는 대부분 파괴된 기지에서 여러 흥미로운 단서를 발견했습니다. \n\n우주에 개방된 구조물의 부분에서 우리는 강력한 재생 능력을 가진 생물 샘플의 대규모 저장소를 발견했습니다. 파편화된 기록에서 우리는 연구 기지가 그들의 종에 영향을 미치는 전염성이 강한 전염병과 싸우기 위해 설계되었음을 해독할 수 있었습니다. 적어도 수백 년 전의 일입니다. 우리가 발견한 실험실의 상태를 고려할 때, 그 이니셔티브는 아마도 실패한 것으로 보입니다. \n\n바이러스가 우리의 생물학에 어떤 영향을 미치지 않을 것으로 보이지만, [Root.leader.GetName]은 샘플과 원래 연구에 접근하기 위해 시설을 궤도로 배치할 것을 제안했습니다. 실험실에 접근한 모든 인원은 일정 기간 격리되었습니다."
 mem_asteroid_derelict_structure.7.a:0 "신중하군."
