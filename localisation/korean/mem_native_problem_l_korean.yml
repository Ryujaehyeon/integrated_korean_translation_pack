l_korean:
 mem_native_problem.2.name:0 "원주민 갈등"
 mem_native_problem.2.desc:0 "새로 개척된 행성 §Y[Root.GetName]§!의 주요 정착지 외곽에서 여러 개척민이 사망한 채 발견되었습니다. 사망 원인은 원거리에서 발사된 다수의 총상입니다. \n\n우리 당국은 지금까지 범인을 확인하지 못했지만, 총성이 발생한 지역에 개척민이 없었다고 확신하고 있습니다. 해당 지역에 파견된 대응팀도 단서를 찾지 못했습니다. \n\n조사가 결론에 이르지 못하면서 많은 개척민이 집을 나서는 것을 두려워하고 있으며, 추측이 난무하고 있습니다 - [Root.GetName]가 우리가 생각했던 것만큼 무인 지역이 아니었을까요?"
 mem_native_problem.2.a:0 "주의할 필요가 있군."
 mem_native_problem.2.purifiers:0 "원주민이 있다면, 우리는 그들 모두를 죽이면 그만이다."
 mem_native_problem.3.name:0 "총격 사건에 대한 추가 조사"
 mem_native_problem.3.desc:0 "§Y[Root.GetName]§! 지도부는 지난 몇 달 동안 식민지 주민들이 의문의 총격에 목숨을 잃는 사건이 추가로 여럿 발생했다고 보고했습니다. \n\n그렇지만 가해자들을 색출하는 일에도 진전이 있었습니다. 이 행성에는 광활한 석회암 동굴망이 지하 깊숙이 이어져 있고, 입구는 황무지 곳곳 발견하기 어려운 장소에 흩어져 있는 것으로 보입니다. 총격 사건의 범인은 동굴 깊숙한 곳에 숨어있지만, 지역 전체의 장애물들을 제거하는 데는 상당한 시간이 걸릴 것입니다."
 mem_native_problem.3.a:0 "동굴망 전체를 붕괴시켜라."
 mem_native_problem.3.a.tooltip:0 "동굴은 가스 형태의 열기압 폭발물로 채워진 후 폭파될 것이고, 총격 사건의 범인은 영원히 묻힐 것입니다..."
 mem_native_problem.3.b:0 "동굴에 진입할 준비를 해라."
 mem_native_problem.3.b.tooltip:0 "동굴 내부를 정리하는 작업이 시작될 것입니다. 총격 사건의 범인이 생포될 가능성도 있지만, 이를 장담할 수는 없습니다."
 mem_native_problem.3.c:0 "동굴에 진입하고 내부 인원을 생포할 방안을 마련해라."
 mem_native_problem.3.c.tooltip:0 "비살상적 해결책에는 §S상당히 오랜 시간§!이 소요되지만, 총격범들은 확실히 생포할 수 있을 것입니다."
 mem_native_problem.4.name:0 "총격범의 최후"
 mem_native_problem.4.desc:0 "§Y[Root.GetName]§!에서 여러 명의 사망을 초래한 신비로운 총잡이가 마침내 당국에 의해 석회암 동굴 네트워크 깊숙이 코너에 몰려 격렬한 저항 끝에 사살되었습니다. \n\n놀랍게도 범인은 [Owner.GetSpeciesName]로 밝혀졌지만, 식민지 프로젝트의 일환으로 공식적으로 행성으로 이주한 개척민은 아닙니다. 누더기 같은 비행복 [the_guy.GetSheHe]를 입고 있었던 것은 약 10년 전 흔적도 없이 사라진 소형 민간 선박의 함장 [the_guy.GetName]임을 나타냅니다. \n\n[the_guy.GetSheHe]가 그 배를 추락시켰고 그 이후로 행성 표면에서 어떻게든 생존해 온 것으로 보입니다. [the_guy.GetHerHim]가 개척민을 공격한 원인은 완전히 명확하지 않지만, 장기간의 광야 공생군 노출이 [the_guy.GetHerHis]의 정신에 부정적인 영향을 미쳤을 가능성이 높습니다."
 mem_native_problem.4.a:0 "비극적인 이야기군."
 mem_native_problem.5.name:0 "총격범이 체포되다"
 mem_native_problem.5.desc:0 "§Y[Root.GetName]§!에서 여러 명의 사망을 초래한 신비로운 총잡이가 마침내 당국에 의해 석회암 동굴 네트워크 깊숙한 곳에서 포위되었습니다. 짧은 교전 후, [the_guy.GetSheHe]이 제압되어 구금되었습니다. \n\n놀랍게도 범인은 [Owner.GetSpeciesName]로 밝혀졌지만, 식민지 프로젝트의 일환으로 공식적으로 행성으로 이주한 개척민은 아니었습니다. [the_guy.GetSheHe]이 입고 있던 너덜너덜한 비행 슈트는 이것이 §Y[the_guy.GetName]§! - 약 10년 전 흔적도 없이 사라진 소형 민간 선박의 함장임을 나타냅니다. \n\n의료진이 [the_guy.GetHerHim]을 [the_guy.GetHerHis] 의식으로 되돌린 후, [the_guy.GetSheHe]은 [the_guy.GetHerHis]의 이야기에 대해 밝힐 수 있었습니다. 행성 표면에서 [the_guy.GetHerHis]의 배가 추락한 유일한 생존자인 [the_guy.GetSheHe]은 그 이후로 생존을 위해 싸워왔지만, 안전하지 않은 지역 식물의 섭취로 인한 장기적인 고립은 [the_guy.GetHerHim]이 다양한 인지 문제를 발전시키게 했습니다. 첫 번째 개척민을 발견했을 때, [the_guy.GetSheHe]은 그들을 괴물로만 인식하고 공격했습니다."
 mem_native_problem.5.a:0 "[the_guy.GetHerHim]을(를) 반역죄로 처형해라."
 mem_native_problem.5.b:0 "재판이 [the_guy.GetSheHe]의 [the_guy.GetHerHis] 행동에 대한 책임이 있는지를 결정할 것입니다."
 mem_native_problem.5.c:0 "[the_guy.GetSheHeCap]이(가) 여기서 10년 동안이나 살아남았다고? 제법 쓸만한 능력이군."
 mem_native_problem.5.c.tooltip:0 "§Y[the_guy.GetName]§!(은)는 우리 제국의 §S장군§!이 될 것입니다."
 mem_native_problem_fear:0 "공포에 사로잡힘"
 mem_native_problem_fear_desc:0 "이 행성의 주민들은 의문의 총격범에 대한 공포 속에서 살고 있습니다. 누구라도 다음 표적이 될 수 있습니다!"
 mem_leader_trait_native_problem_general:0 "생존자"
 mem_leader_trait_native_problem_general_desc:0 "이 지도자는 먼 행성에서 10년 이상 홀로 지내며 생존에 대한 몇 가지 지식을 가지고 있습니다."
