l_korean:
 mem_shapes_under_ice_category:0 "수수께끼의 무늬"
 mem_shapes_under_ice_category_desc:0 "§Y[Root.GetName]§!의 표면에는 높은 궤도에서도 보이는 수십만 개의 흑점이 있습니다. 그러나 궤도에 오른 지 불과 며칠 만에 우리 조사대는 점들의 형체가 이리저리 변하고 있는 것을 알아챘습니다. 점 몇 개는 희미해졌고, 새로운 점이 나타나기도 했으며, 다수의 점은 위치가 바뀌었습니다."
 mem_shapes_under_ice.1.name:0 "거대한 앵무조개들"
 mem_shapes_under_ice.1.desc:0 "§Y[From.GetName]§!의 표면 아래에서 프로브를 발사하고 면밀히 조사한 결과, §Y[Root.leader.GetName]§!는 이 행성이 전체가 해양으로 덮여 있으며, 그 위에 두꺼운 얼음층이 덮여 있음을 확인했습니다. 그럼에도 불구하고 빛은 거대한 덮개를 뚫고 들어올 수 있어 수생류 생태계가 풍부하게 형성되어 있습니다. 그러나 가장 주목할 만한 것은 §Y[From.GetName]§!의 이동하는 지점 뒤에 있는 범인들입니다: 킬로미터에 달하는 거대한 나우틸로이드들이 세계 생태계의 최상위 자리를 차지하고 있으며, 자연적인 포식자가 없습니다. 이 생물들을 더 자세히 연구하기 위해 특별 프로젝트가 발주되었습니다."
 mem_shapes_under_ice.1.a:0 "정말 어마어마한 크기군!"
 MEM_SHAPES_UNDER_ICE_PROJECT:0 "앵무조개 조사"
 MEM_SHAPES_UNDER_ICE_PROJECT_DESC:0 "한 조사대가 §Y[From.GetName]§!의 얼음층 아래에서 생명체가 가득한 바다를 발견했습니다. 우리 과학자들은 [From.GetPlanetMoon]의 생물권에서 최상위에 있는 수 킬로미터 넓이의 거대 앵무조개 종을 더 자세히 연구하고 싶어 합니다."
 mem_shapes_under_ice.2.name:0 "흥미로운 앵무조개들"
 mem_shapes_under_ice.2.desc:0 "더 많은 연구와 여러 차가운 수중 탐사를 통해 §Y[Root.GetName]§!의 승무원들은 나우틸로이드에 대해 몇 가지 매혹적인 사실을 발견했습니다. 첫째, 그들은 굳센 재료를 생성하는 생물학적 과정을 가지고 있어 건설에 적합한 껍질을 만듭니다. 그러나 이 재료를 얻기 위해서는 그들을 죽여야 합니다. 나우틸로이드가 대부분의 반지능 종과 유사한 기초적인 수준의 지능을 보여주었다는 사실로 인해 이 가능성은 매력적이지 않습니다. 또한, 그들은 자신을 떠받치지 않을 때 빠르게 깊은 곳으로 가라앉아 죽은 개체를 수확하는 것이 불가능하게 만듭니다. 이는 우리가 그들의 껍질을 회수하고자 한다면 적극적으로 이 생물들을 도살해야 한다는 것을 의미합니다."
 mem_shapes_under_ice.2.a:0 "우리 생물학자들은 그것을 기쁘게 연구하겠지."
 mem_shapes_under_ice.2.b:0 "가슴아픈 일이지만, 우리 이익을 위해서라면 어쩔 수 없다."
 mem_shapes_under_ice.2.phile:0 "그들이 얼만큼의 지능을 가지고 있는지 확인하겠다. 통신을 시도해라."
 mem_shapes_under_ice.2.mat:0 "물질을 얻지는 못하더라도, 살아있는 개체의 껍질을 연구할 수는 있겠지."
 mem_shapes_under_ice.99.name:0 "더러운 창문"
 mem_shapes_under_ice.99.desc:0 "§Y[From.From.GetName]§!에 대한 추가 조사에 따르면 움직이는 흑점으로 보였던 것은 행성 표면에 있던 것이 아니라 압력 누설로 인해 §Y[Root.GetName]§!의 창문에 시각적인 문제가 나타났던 것이라고 합니다. 선내 공학자 팀이 고장 난 압력 밸브를 수리했고, 이 장소에 더는 주목할 만한 점은 없는 것 같습니다."
 mem_shapes_under_ice.99.a:0 "실망스럽군."
