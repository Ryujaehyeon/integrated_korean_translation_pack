l_korean:
 elven_accident_events.210.name:0 "§R존속살인§!"
 elven_accident_events.210.desc:0 "§R[assassinated_leader.GetName]§!는 [assassinated_leader.GetHerHis] [Root.GetSpeciesSpawnNamePlural]의 손에 살해되었습니다. 일반 대중들은 §R[assassinated_leader.GetName]§!가 혹시 존속살인을 실패했을 수 있는 생각에 대하여 경각심을 가지며 소식에 반응했습니다."
 elven_accident_events.211.name:0 "§R사고§!"
 elven_accident_events.211.desc:0 "§R[assassin_leader.GetName]§!의 암살 음모가 §R[surviving_leader.GetName]§!에 의해 저지되었습니다! 이 음모는 복잡했으며 §R[surviving_leader.GetName]§!의 기민한 판단이 없었다면 성공했을 것입니다."
 elven_accident_events.211.a:0 "존속살인에 실패한 것은 쓸모없는 지도자다. [assassin_leader.GetHerHim]을 죽여라!"
 elven_accident_events.211.b:0 "다음에는 더 잘하길."
 elven_accident_events.220.name:0 "§R살인§!"
 elven_accident_events.220.desc:0 "[assassinated_leader.GetHerHis] 저택에서 피 웅덩이에 놓인 §R[assassinated_leader.GetName]§!의 망가진 시신이 발견되었습니다. 다양한 동기가 존재합니다. [assassinated_leader.GetName]가 [assassinated_leader.GetHerHis]의 어린이 및 최근 정책에 관해 여러 평의원과 의견이 일치하지 않은 것으로 알려져 있습니다."
 elven_accident_events.221.name:0 "§R살인이 시도됨§!"
 elven_accident_events.221.desc:0 "긴급 뉴스! §R[assassin_leader.GetName]§!가 [assassinated_leader.GetName]의 암살 시도에서 현행범으로 체포되었습니다. [assassin_leader.GetName]는 발각된 불운으로 처형되었습니다!"
 elven_accident_events.222.name:0 "§RAssassination Attempt§!"
 elven_accident_events.222.desc:0 "긴급 뉴스! §R[assassin_leader.GetName]§!가 §R[assassinated_leader.GetName]§!의 암살 시도에서 현행범으로 체포되었습니다. 시도의 엉성함을 고려하여, 의회는 더 나은 계획을 촉진하기 위해 §R[assassin_leader.GetName]§!를 처형하기로 결정했습니다. 불행히도 [assassinated_leader.GetName]는 사건 발생 몇 시간 후 [assassinated_leader.GetHerHis] 부상으로 사망했습니다."
 elven_accident_events.230.name:0 "§R살해된§!"
 elven_accident_events.230.desc:0 "§R[assassinated_leader.GetName]§!가 [assassinated_leader.GetHisHer]의 부하 중 하나에게 살해 당했습니다! 모든 사람이 [assassinated_leader.GetHerHim]를 죽일 수 있는 잠재적 동기와 기회를 갖고 있는 것 처럼 보인다는 점을 감안할 때 범인을 확정하는 것은 불가능합니다."
 elven_accident_events.231.name:0 "§R실험 실패§!"
 elven_accident_events.231.desc:0 "§R[assassinated_leader.GetName]§!는 불행한 실험실 사고로 인해 방금 사망했습니다. [assassinated_leader.GetHisHer] 보조원 중 한 명이 추가 피해를 완화하는 데 중요한 역할을 했으며, 과학 위원회는 이 개인이 적합한 대체 인물이라고 보장합니다. 이 보조원이 사고에 연루되었다는 소문은 순전히 허구라고 보장받았습니다."
 elven_accident_events.232.name:0 "§R불화§!"
 elven_accident_events.232.desc:0 "우리는 §R[assassinated_leader.GetName]§!와 §R[assassin_leader.GetName]§!의 계속된 불화에 주목했습니다. 불화의 최정점은 서로가 연구를 방해하다가 우연히 두 사람 모두 사망하는 결과를 낳을 뻔했습니다. 의회는 이 상황을 처리하는 방법에 대한 조언을 요청했습니다."
 elven_accident_events.232.a:0 "그 둘의 몸을 과학에 기증해버려라!"
 elven_accident_events.232.b:0 "싸우게 나둬라."
 elven_accident_events.240.name:0 "§R분노한 여사제§!"
 elven_accident_events.240.desc:0 "[assassinated_leader.GetHerHim]이 불행하게도, §R[assassinated_leader.GetName]§!는 우연히 분노한 여사제를 만났습니다. 그러나 [assassinated_leader.GetSheHe]는 헛되이 죽지 않았습니다. [assassinated_leader.GetHerHis]의 죽음은 다행히도 여사제의 분노를 누그러뜨렸으며 더 이상의 사망은 보고되지 않았습니다."
 elven_accident_events.241.name:0 "elven_accident_events.211.name$"
 elven_accident_events.241.desc:0 "§R[assassinated_leader.GetName]§!는 좁은 거리를 무심코 걷고 있을 때 [assassinated_leader.GetSheHe] 갑자기 [assassinated_leader.GetHerHis] 등에서 단검이 꽂혀 있는 것을 발견했습니다! 우리 모두에게 교훈이 되는 순간입니다. 절대 방심하지 마십시오!"
 elven_accident_events.242.name:0 "§R여사제의 변덕§!"
 elven_accident_events.242.desc:0 "§R[assassinated_leader.GetName]§!은(는) 좁은 길을 걸어가던 도중, 순간적으로 자신의 가슴에 튀어나온 칼날을 발견했습니다. 우리 모두에게 교훈이 되는 죽음이었습니다. 방심은 금물!"
 elven_accident_events.243.name:0 "elven_accident_events.211.name$"
 elven_accident_events.243.desc:0 "§R[assassinated_leader.GetName]§!가 갑자기 사라졌습니다! [assassinated_leader.GetHerHis] 시신이나 복수의 메시지의 흔적이 발견되지 않았습니다. 이는 [assassinated_leader.GetSheHe]가 죽었거나 비겁하게 사라졌음을 나타냅니다. 어느 쪽이든 [assassinated_leader.GetSheHe]는 더 이상 중요하지 않으며 추가 조사는 필요하지 않습니다."
 elven_accident_events.244.name:0 "elven_accident_events.211.name$"
 elven_accident_events.244.desc:0 "§R[assassinated_leader.GetName]§! 가 갑자기 사라졌습니다! [assassinated_leader.GetHerHis] 시신의 흔적이 발견되지 않았습니다. [assassinated_leader.GetName] 이(가) 산성 호수에 빠졌다는 소문이 돌고 있습니다. 흥미롭게도 인근 지역에는 알려진 산성 호수가 없습니다."
 elven_accident_events.245.name:0 "§R여신의 변덕§!"
 elven_accident_events.245.desc:0 "여신께서 합당한 희생을 요구하셨고, 우리 [Root.GetRulerTitle]는 그녀의 은총을 위해 무엇이든 할 준비가 되어 있습니다. §R[assassinated_leader.GetName]§!보다 더 합당한 자가 있을까요? 게다가 [assassinated_leader.GetSheHe]를 더 충성스럽고 유용한 개인으로 교체할 때가 되었습니다. 여신께 찬양을!"
 elven_accident_events.246.name:0 "§RSuicide Surely§!"
 elven_accident_events.246.desc:0 "§R[assassinated_leader.GetName]§!가 자살한 것으로 밝혀졌습니다! [assassinated_leader.GetSheHeCap]는 어떻게든 [assassinated_leader.GetHerHis] 죽음에 동시에 도달하면서 [assassinated_leader.GetHerHis] 신체에 여러 개의 치명적인 칼자국을 남겼습니다. 수사 책임자는 이것이 지금까지 계획된 자살 중 가장 잘 계획된 것일 가능성이 높다고 말했습니다."
 elven_accident_events.247.name:0 "§R가까스로 피한 암살§!"
 elven_accident_events.247.desc:0 "§R[surviving_leader.GetName]§!은 [surviving_leader.GetHerHis]에 대한 암살 시도를 간신히 피했습니다! 그들의 음모가 신원을 숨기기에 충분하지 않았기 때문에 범인은 이미 처리되었습니다. 그러나 그 경험은 그대로 §R[surviving_leader.GetName]§!을 나쁘게 변화 시켰습니다."
 elven_accident_events.248.name:0 "§R가까스로 피한 암살§!"
 elven_accident_events.248.desc:0 "§R[surviving_leader.GetName]§!는 [surviving_leader.GetHerHis]에 대한 암살을 간신히 피했습니다! 그들의 음모가 신원을 숨기기에 충분하지 않았기 때문에 범인은 이미 처리되었습니다. 이 경험은 오히려 §R[surviving_leader.GetName]§!에게 활력을 불어넣었습니다. [surviving_leader.GetSheHeCap]은 이전보다 훨씬 더 생산적입니다!"
 elven_accident_events.249.name:0 "§R그들이 말한 살인§!"
 elven_accident_events.249.desc:0 "우리는 방금§R[assassin_leader.GetName]§!가 §R[assassinated_leader.GetName]§!에 의해 살해당했다고 들었습니다! §R[assassin_leader.GetName]§!가 §R[assassinated_leader.GetName]§!의 암살 시도에 직접 가담한 것으로 밝혀졌습니다. 무능한 리더를 상대해야 하는 수고를 덜어주기 위해 §R[assassinated_leader.GetName]§!는 §R[assassin_leader.GetName]§!를 칼로 찔러 문제를 해결했습니다. 살인은 신속했고, 수사관들은 이례적으로 어려운 환경에서 해냈다고 말합니다. §R[assassinated_leader.GetName]§!는 칼날을 가진 전문가입니다!"
 elven_accident_events.250.name:0 "§R불행한 사고§!"
 elven_accident_events.250.desc:0 "유감스럽게도 §R[assassinated_leader.GetName]§!은 훈련 중 비극적으로 사망했습니다. [assassinated_leader.GetHerHisCap]는 충돌로 인한 목 부러짐으로 사망했습니다. 중요한 점은 함선이 손상되지않고 완벽하다는 것입니다."
 elven_accident_events.251.name:0 "§R훈련 사고?§!"
 elven_accident_events.251.desc:0 "최근 훈련 중, 장군 §R[assassinated_leader.GetName]§!이 실제 총격에 의해 치명적인 부상을 입은 사건이 발생했습니다. 조사관들은 훈련에 사용된 모든 무기가 비치명적이라는 점과 사건의 목격자가 발견되지 않았다는 점을 지적했습니다. 따라서 추가 조사는 무의미하다고 판단되었으며, 이 사건은 공식적으로 사고로 선언되었습니다."
 elven_accident_events.252.name:0 "§R암살 회피§!"
 elven_accident_events.252.desc:0 "§R[surviving_leader.GetName]§!는 최근 예비 암살자의 공격에 맞서 싸웠습니다! 암살자는 유감스럽게도 [surviving_leader.GetName]에 의해 내장이 벗겨져 잠재적인 가해자에 대한 정보를 제공할 수 없습니다. 사건 직후 여러 고위 장교가 실종되었다는 보고는 [surviving_leader.GetName]가 이미 문제를 처리했음을 나타낼 수 있습니다."
 elven_accident_events.253.name:0 "§R암살 회피§!"
 elven_accident_events.253.desc:0 "최근 훈련 중 §R[assassinated_leader.GetName]§! 장군에 대한 암살 시도가 있었습니다. 다행히 [assassinated_leader.GetSheHe]는 암살 시도를 회피했을 뿐만 아니라 암살자를 죽였습니다! 우리는 범인이 이미 처리되었고 군대가 준비태세 상태를 유지했다고 들었습니다."
