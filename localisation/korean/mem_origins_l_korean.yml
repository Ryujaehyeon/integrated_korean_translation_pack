l_korean:
 origin_mem_exiles:0 "은하계 망명자"
 origin_mem_exiles_desc:0 "한때 저명했던 제국의 잔재가 게이트를 통해 고립된 성단으로 퇴각하게 되었습니다."
 origin_mem_out_of_time:0 "잘못된 시간여행"
 origin_mem_out_of_time_desc:0 "다른 시대에서 온 제국으로, 시간의 이상 현상을 통해 자신의 시대에서 현재로 보내졌습니다."
 origin_tooltip_mem_out_of_time:0 "결국, 시간 이상현상은 그들을 따라잡아 지금의 차원에서 그들을 존재에서 지울 것입니다."
 origin_mem_freebotomites:0 "기생로봇 제거"
 origin_mem_freebotomites_desc:0 "측량 프로브에 의해 변형된 그들은 이제 자유 의지를 되찾았습니다."
 origin_mem_from_the_ashes:0 "잿더미로부터"
 origin_mem_from_the_ashes_desc:0 "이 문명이 별들 사이를 여행하며 먼 세계로 퍼져나갔다는 전설이 있습니다. 이제 그들의 사람들은 한때 끝없는 도시였던 세계의 잔해 아래에서 살아갑니다. 자연이 다시 차지한 그곳에서 그들은 과거의 재에서 일어나는 동시에 고대의 구축함이 여전히 공허 속에 존재할 수 있다는 것을 알고 있습니다."
 origin_tooltip_mem_from_the_ashes_effects:0 "§Y유물 행성§!에서 시작합니다.\n§Y바주란 위협§!이 반드시 활성화 됩니다."
 START_SCREEN_MEM_FROM_THE_ASHES:0 "우리의 도시들은 불타고, 우리의 문명은 거의 세상의 얼굴에서 지워졌습니다. 이는 너무 먼 과거에 일어난 일이라, 거의 아무도 그것을 상상할 수 없습니다. 그러나 그 시절의 유적들은 여전히 [GetHomeWorldName]의 여러 지역에서 우리 위에 우뚝 서 있으며, 세대에서 세대로 전해 내려오는 이야기의 증거입니다.\n\n§SB 구축함을 조심하라! §! 우리의 조상들은 여전히 저 너머의 공허에 숨어 있는 위협에 대해 경고합니다.\n\n하지만 어찌되었든, 이제는 별들로 돌아갈 시간입니다! 마침내 우리의 문명은 항성 간 여행을 할 수 있을 만큼 재건되었습니다. 우리는 별들 사이에서 우리의 정당한 자리를 되찾을 것입니다!"
 origin_mem_fainthearted:0 "겁쟁이의 은신처"
 origin_mem_fainthearted_desc:0 "오래 전, 끔찍하고 고대의 침략자가 은하를 공포에 몰아넣었습니다. 다른 제국들이 연합하여 최후의 저항을 시도하는 동안, 이 문명은 공격에 두려움에 떨며 외딴 고향 항성계로 후퇴하여 숨었고, 은하 위기를 성공적으로 기다렸습니다. 수천 년 동안 그들의 사람들은 은둔 생활을 하며 작고 밀접한 공동체를 형성하고, 축적된 지식의 대부분을 서서히 잃어갔습니다. 그들은 고급 센서 기지를 최대 용량으로 운영하는 것만을 유지했습니다. 마침내 이 주기가 위협이 없는 것을 확인한 후, 그들은 무명에서 벗어나 별들 사이에서 자신의 위치를 다시 확립하기 위해 나타났습니다."
 origin_tooltip_mem_fainthearted_effects:0 "- §Y바주란의 위협§!은 비활성화됩니다 (§Y재에서의 재탄생§! 기원 효과를 무시합니다)\n- §G10%§! 증가된 £unity£ §Y유니티 생성§!\n- §R15%§! 감소된 £mod_country_naval_cap_add£ §Y해군 용량§!\n- £mod_tech_cost_empire_size_mult£ §Y연구 속도§!이 처음 §Y20§!년 동안 §R5%§! 감소하고, 이후 §Y20§!년 동안 §R2%§! 감소합니다\n- 센서 기술 등급 §Y2§!와 §Y3§!는 이미 연구되었습니다."
 START_SCREEN_MEM_FAINTHEARTED:0 "악의 존재가 나타났을 때, 우리는 다른 제국들이 요구하는 폭력으로 우리 국민을 돌릴 수 없었습니다. 두려움에 떨며 우리는 우리의 자산을 비우고 우리 고향의 따뜻한 품으로 국민을 데려갔습니다.\n\n우리는 안전을 위해 위험하고 눈에 띄는 기술을 피했습니다. 우리의 기술은 수세기 동안 퇴보했을지 모르지만, 우리는 여전히 여기 있습니다. 이것은 많은 다른 종족들이 주장할 수 없는 것입니다...\n\n고대의 위협이 패배했다는 초공간 방송을 접수했다는 우리의 관측자들의 보고가 있을 때, 그것은 우리 역사에서 기쁨의 날로 기록되었습니다.\n\n수년간의 노력과 재건 덕분에 우리는 우리의 항성계를 되찾을 수 있었습니다. 그리고 이제, 마침내 우리는 별들의 번영으로 돌아갈 만큼 편안해졌습니다."
 mem_fainthearted_country:0 "평화를 사랑하는 사람들"
 mem_fainthearted_research_1:0 "연구 재설정"
 mem_fainthearted_research_2:0 "연구 재설정"
 mem_opinion_cowards:0 "겁쟁이들"
 mem_vazurans_category_5:0 "거주지의 징후"
 mem_vazurans_category_5_desc:0 "오랫동안 잊혀졌던 우리의 식민지 조사 중, 표면 스캔에서 여러 개의 잘 유지되고 있는 활성 구조물이 발견되었습니다. 누군가 우리가 남긴 것을 차지한 것 같습니다! 그러나 건축 양식은 우리가 과거에 사용했던 전-바주란 디자인과 매우 유사해 보입니다..."
 mem_fainthearted.5.name:0 "원정대 손실"
 mem_fainthearted.5.desc:0 "[From.GetName]의 주민들과 직접 접촉하는 것은 큰 실수로 드러났습니다. 우리의 원정대는 뒤돌아보면 계획된 매복으로 보이는 상황에서 빠르게 제압당했습니다.\n\n현재 우리는 [From.GetPlanetMoon]의 표면에서 신호를 받고 있습니다."
 mem_fainthearted.5.a:0 "화면을 띄워라."
