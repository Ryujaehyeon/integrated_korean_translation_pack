l_korean:
 LOST_DESIRE_PROJECT:0 "사원 탐사"
 LOST_DESIRE_PROJECT_DESC:0 "[desire_planet_1.GetName]에 수수께끼의 사원이 나타났습니다. 우리가 발견한 좌표와 관련이 있을 것입니다. 가능한 한 빨리 탐사해야 합니다."
 WHITE_HOLE_STUDY:0 "이상 현상 연구"
 WHITE_HOLE_STUDY_DESC:0 "전자기 이상 현상이 [Root.GetName] 상공에 안정화되었습니다. 사라지기 전에 이를 연구하고 닫을 방법을 찾아야 합니다."
 desire_desc:0 "우리가 발견한 좌표는 이 행성을 가리킵니다. 이곳을 식민화하고 무슨 일이 일어나는지 확인해야 합니다."
 desire_name:0 "고대의 방향"
 fatalf.001.desc_a:0 "[Root.GetName]은 작은 물체와 충돌하기 직전 센서가 이상한 에너지 신호를 감지했다고 보고했습니다. 정밀 조사 결과, 그것은 [Root.Owner.GetSpeciesAdj] 제작 탐사정이었으며 원주율의 첫 112자리를 반복 송신하고 있었습니다. 이제는 고철일 뿐입니다."
 fatalf.001.desc_b:0 "[Root.GetName]은 작은 물체와 충돌하기 직전 센서가 이상한 에너지 신호를 감지했다고 보고했습니다. 정밀 조사 결과, 그것은 [Root.Owner.GetSpeciesAdj] 제작 탐사정이었으며 인기 있는 [Root.Owner.GetSpeciesAdj] 노래를 송신하고 있었습니다. 이제는 고철일 뿐입니다."
 fatalf.001.desc_c:0 "[Root.GetName]은 작은 물체와 충돌하기 직전 센서가 이상한 에너지 신호를 감지했다고 보고했습니다. 정밀 조사 결과, 그것은 [Root.Owner.GetSpeciesAdj] 제작 탐사정이었으며 엇갈린 운명의 두 연인에 대한 짧은 사랑 이야기를 송신하고 있었습니다. 이제는 고철일 뿐입니다."
 fatalf.001.desc_d:0 "[Root.GetName]은 작은 물체와 충돌하기 직전 센서가 이상한 에너지 신호를 감지했다고 보고했습니다. 정밀 조사 결과, 그것은 [Root.Owner.GetSpeciesAdj] 제작 탐사정이었으며 고전적인 [Root.Owner.GetSpeciesAdj] 전쟁 함성을 송신하고 있었습니다. 이제는 고철일 뿐입니다."
 fatalf.001.desc_e:0 "[Root.GetName]은 작은 물체와 충돌하기 직전 센서가 이상한 에너지 신호를 감지했다고 보고했습니다. 정밀 조사 결과, 그것은 [Root.Owner.GetSpeciesAdj] 제작 탐사정이었고 송신기를 갖추고 있었지만 아무 데이터도 내보내지 않았습니다. 이제는 고철일 뿐입니다."
 fatalf.001.desc_f:0 "[Root.GetName]은 작은 물체와 충돌하기 직전 센서가 이상한 에너지 신호를 감지했다고 보고했습니다. 정밀 조사 결과, 그것은 [Root.Owner.GetSpeciesAdj] 제작 탐사정이었으며 [Root.Owner.GetSpeciesAdj] 신체에 대한 임상적 묘사를 송신하고 있었습니다. 이제는 고철일 뿐입니다."
 fatalf.001.name:0 "이상한 탐사정"
 fatalf.003.desc:0 "[Root.GetName] 근처에서 익숙한 에너지 급증이 포착되었습니다. 우리는 최악을 우려했지만, 분명한 것은 알 수 없는 조류 생물의 포장육 몇 톤이 나타났다는 사실뿐입니다. 모든 조사 결과에 따르면 안전하게 먹을 수 있습니다."
 fatalf.003.title:0 "냉동 식품"
 fatalf.004.desc:0 "우리 행성 센서가 [Root.GetName] 저궤도에서 극도로 높은 방사선 수치를 감지하고 있습니다. 이전의 설명되지 않은 현상과 비슷한 에너지 신호입니다. 원인을 추측하기도 전에, 거대한 폭발이 식민지화된 넓은 지역을 찢어발기며 사람과 건물을 모두 소멸시켰습니다."
 fatalf.004.title:0 "엉뚱한 폭탄"
 fatalf.005.desc:0 "[Root.GetName] 궤도에 작은 소행성이 나타났습니다. 불과 얼마 전까지 알려지지도 감지되지도 않았지만, 익숙한 에너지 신호와 함께 발견되었습니다. 위험할 만큼 크지는 않지만, 많은 양의 광물을 제공할 수 있을지도 모릅니다."
 fatalf.005.title:0 "외차원 소행성"
 fatalf.006.desc:0 "원인을 알 수 없는 크고 지속적인 에너지 맥동이 [Root.GetName]의 자기장을 약화시킵니다. 치명적이지는 않지만, 일상생활을 상당히 불편하게 만듭니다."
 fatalf.007.desc:0 "[Root.GetName] 상공에 작은 포털이 열렸습니다. 그 너머를 볼 수는 없지만, 파괴된 탐사정과 마찬가지로 흥미로운 데이터를 제공하여 유용한 연구가 가능합니다."
 fatalf.008.desc:0 "[Root.GetName] 저궤도에서 거대한 에너지 신호가 감지되었습니다. 거의 즉시 행성 전역에 번개가 떨어져 수많은 민간인을 증발시켰습니다. 이것도 이상한 탐사정을 가져온 것과 같은 효과로 인해 발생한 것일까요?"
 fatalf.008.title:0 "급속 에너지 타격"
 fatalf.009.desc:0 "동시에, 우리 제국의 모든 센서가 수도 바로 위에 위치한 극도로 거대한 에너지 이상 현상을 감지했습니다. 센서는 파괴된 탐사정에서 발견된 것과 같은 수치를 보여주고 있습니다. 그것은 나타난 만큼이나 빠르게, 눈에 띄는 효과 없이 흩어졌습니다."
 fatalf.009.title:0 "아무것도?"
 fatalf.010.desc:0 "연구를 위해 우리 함선들이 가까이 다가가자, 우주 공간에 떠 있는 작은 균열이 보입니다. 조사 결과, 이 균열은 궤도에서 작은 탐사정을 통과시킬 수 있을 만큼 안정화되었으며, 특정한 에너지 폭발의 맥동을 방출하게 하면 영구적으로 닫을 수 있을 것으로 보입니다. 누군가가 찾을 가능성에 대비해 음성을 송신하게 할 수도 있습니다."
 fatalf.011.desc:0 "놀랍게도, 우리 탐사정이 균열을 통과하자 짧은 시간 동안 작은 웜홀이 열렸습니다. 이것이 탐사정의 이동과 송신에 어떤 영향을 주는지 관찰하면, 이러한 우회로의 비밀을 배우는 데 활용할 수 있을 것입니다."
 fatalf.011.title:0 "안정화"
 fatalf.012.desc:0 "우리 탐사정은 계획대로 균열을 통과해 맥동을 내보냈습니다. 잠시 후 균열이 스스로 닫히면서 모든 통신이 끊겼습니다. 이제 이 문제로 걱정할 필요는 없을 것입니다."
 fatalf.012.title:0 "완전히 사라짐"
 fatalf.020.desc:0 "[From.From.GetName]을 조사하던 중, 우리 과학선이 궤도에 떠 있는 거대한 철제 석판을 발견했습니다. 그 위에는 은하 저편의 두 행성으로 향하는 방향과, 각 행성으로 여러 에너지가 수렴하는 모습을 보여주는 일련의 상형 그림이 새겨져 있습니다. 이러한 수렴의 목적은 알려져 있지 않으며, 우리가 아는 어떤 과학 현상과도 닮지 않았습니다."
 fatalf.020.title:0 "고대의 방향"
 fatalf.022.desc:0 "개척민들이 행성에 발을 디디고 퍼져 나가기 시작하자, [Root.GetName] 상공에 수많은 '떠다니는 창문'이 보인다는 보고가 들어왔습니다. 현재는 매우 많지만, 일부는 천천히 사라지고 있습니다."
 fatalf.022.title:0 "떠다니는 창문"
 fatalf.023.desc:0 "과학자들이 조사에 나서면서, 이 창문들이 사실 다른 대체 세계를 엿보는 틈이라는 보고를 보내왔습니다. 더욱 흥미롭게도 [Root.GetName]의 주민들은 저마다 이상한 꿈을 꾸고 있으며, 오직 한 가지를 요구한다고 말합니다. 우리의 가장 큰 욕망입니다."
 fatalf.023.tip1:0 "우리는 §R부§!를 원한다."
 fatalf.023.tip10:0 "우리는 §R지혜§!를 원한다."
 fatalf.023.tip2:0 "우리는 §R힘§!을 원한다."
 fatalf.023.tip3:0 "우리는 §R목적§!을 원한다."
 fatalf.023.tip4:0 "우리는 §R행복§!을 원한다."
 fatalf.023.tip5:0 "우리는 §R순수§!를 원한다."
 fatalf.023.tip6:0 "우리는 §R공동체§!를 원한다."
 fatalf.023.tip7:0 "우리는 §R강함§!을 원한다."
 fatalf.023.tip8:0 "우리는 §R사랑§!을 원한다."
 fatalf.023.tip9:0 "우리는 §R지식§!을 원한다."
 fatalf.023.title:0 "희미한 조망"
 fatalf.024.desc:0 "§E우리가 지식을 제공하겠다. 너희가 전에 발견한 것이 이제 주어졌다. 너희의 가치를 보여라. 이 순환의 최고가 다음 순환의 최악이 되기를.§!"
 fatalf.024.tip:0 "§R실망시키지 마라§!"
 fatalf.024.title:0 "주기"
 fatalf.0301.desc:0 "모든 센서가 동시에 거대한 교란을 포착했습니다. 무엇이 원인인지 도저히 알 수 없지만, 그것이 무엇이든 은하 전역에서 느껴졌다는 것만은 알고 있습니다."
 fatalf.0301.name:0 "현실의 진동"
 fatalf.0302.desc:0 "심하게 과성장한 균류 함선으로 보이는 수십 척의 물체가 은하 전역에서 물질화되고 있습니다. 이들은 근처의 모든 거주 가능 행성을 향해 이동하고 있습니다!"
 fatalf.0303.desc:0 "우리 함대가 $fatalf_seed_ship$을 파괴하자, 그것은 감염성 포자의 소나기로 폭발했습니다."
 fatalf.0303.name:0 "과성장의 함선"
 fatalf.0304.desc:0 "$fatalf_seed_ship$이 [Root.GetName] 상공을 지나가며 수백 개의 작은 포자를 떨어뜨렸고, 그것들은 빠르게 끔찍한 괴물로 성장했습니다. 식민지를 구하려면 이들을 물리쳐야 합니다."
 fatalf.0304.name:0 "과성장 침공"
 fatalf.0305.desc:0 "[Root.GetName]의 과성장이 완전히 박멸되었습니다. 이곳에서는 더 이상 우리를 괴롭히지 않을 것입니다."
 fatalf.0305.name:0 "과성장 박멸"
 fatalf.100.desc:0 "이 이상한 물체들이 어디서 오는지, 왜 모두 같은 에너지 신호를 공유하는지 몇 달 동안 전혀 알지 못한 끝에, 장거리 스캐너가 그 이상 현상이 [Root.Owner.GetHomeWorldName] 근처에 나타났고 빠른 속도로 얼음 파편을 발사하고 있음을 포착했습니다."
 fatalf.100.name:0 "균열"
 fatalf_new_colony_desc:0 "우리 과학자는 다른 곳의 훌륭한 행성으로 이어진다고 말하는 불안정한 웜홀을 발견했습니다. 웜홀을 안정화할 수 있다면 새로운 식민지를 시작할 수 있을지도 모릅니다."
 fatalf_new_colony_title:0 "떠도는 웜홀"
 fatalf_seed_ship:0 "씨앗 함선"
 fatalf_seed_ship_plural:0 "씨앗 함선"
 fatalf_stable_wormhole_name:0 "고정된 웜홀"
 hyperlane_machine_desc:0 "$lgates$가 초공간로 교란과 관련이 있는 듯합니다. 우리나 동맹이 모든 관문을 통제한다면 문제의 근원을 찾을 수 있을지도 모릅니다."
 hyperlane_machine_title:0 "초공간로 교란"
 lost_desire_desc:0 "우리 은하의 여러 행성을 가리키는 은하 좌표를 발견했습니다. 그곳을 우리의 고향으로 삼는다면 우리 국민이 가장 바라는 것을 받게 될 것이라고 약속받았습니다."
 lost_desire_title:0 "잃어버린 욕망"
 seed_army:0 "씨앗 지상군"
 seed_army_desc:0 "닿는 모든 생명체를 감염시키는 집요한 살아있는 포자입니다."
 seed_army_plural:0 "씨앗 지상군"
 seed_attack_desc:0 "수십 척의 감염성 함선이 우리의 현실로 탈출했습니다. 행성들이 압도당하기 전에 파괴해야 합니다!"
 seed_attack_title:0 "과다 성장"
 seed_poi:0 "이 $fatalf_seed_ship$이 번식하기 전에 파괴해야 합니다."
 seed_ship:0 "$fatalf_seed_ship$"
 seed_ship_plural:0 "$fatalf_seed_ship_plural$"
 seed_start_desc:0 "우리 현실의 결속이 흔들리고 있습니다. 무슨 일이 벌어지고 있는 것일까요?"
 seed_start_title:0 "현실의 진동"
 tb_overgrowth:0 "감염성 과성장"
 tb_overgrowth_desc:0 "반드시 박멸해야 하는 급속 확산 감염입니다."
 trait_architect_adaptive_bad:0 "건축가들의 골칫거리"
 trait_architect_adaptive_bad_desc:0 "...그러나 신중함도 함께."
 trait_architect_adaptive_good:0 "건축가들의 축복"
 trait_architect_adaptive_good_desc:0 "고난과 함께 다재다능함이 온다..."
 trait_architect_industrious_bad:0 "건축가들의 골칫거리"
 trait_architect_industrious_bad_desc:0 "...그러나 방종도 함께."
 trait_architect_industrious_good:0 "건축가의 축복"
 trait_architect_industrious_good_desc:0 "목적과 함께 노력이 온다..."
 trait_architect_intelligent_bad:0 "건축가들의 골칫거리"
 trait_architect_intelligent_bad_desc:0 "...그러나 불화도 함께."
 trait_architect_intelligent_good:0 "건축가들의 축복"
 trait_architect_intelligent_good_desc:0 "지식과 함께 지혜가 온다..."
