 origin_pd_interplanetary_settlers:0 "행성 간 정착민"
 origin_pd_interplanetary_settlers_desc:0 "별들이 닿을 수 없던 시절, 이 제국은 기초를 다지며 고향 항성계의 위성들과 행성들에 돔형 서식지를 세웠습니다. 이제 초공간 기술을 갖춘 그들은 새로운 시대의 문턱에 서 있으며, 미지의 우주로 그들의 영역을 확장할 준비가 되어 있습니다."
