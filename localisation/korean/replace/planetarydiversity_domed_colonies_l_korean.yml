l_korean:
 pd_domed_colony_0:0 "돔형 식민지"
 pd_domed_colony_0_DESC:0 "이 행성은 테라포밍의 잠재력을 지니고 있습니다. 돔 식민지를 설립함으로써 우리는 행성 환경의 점진적인 대전환을 위한 거점을 만들 수 있습니다."
 pd_domed_colony_0_MEGASTRUCTURE_DETAILS:0 "§Y돔형 식민지§!는 테라포밍이 가능한 행성에 위치한 자급자족하는 행성 표면 거주 돔의 식민지입니다."
 requires_terraforming_candidate:0 "$TRIGGER_FAIL$테라포밍 후보 수정자가 필요합니다."
 requires_correct_planet_class:0 "$TRIGGER_FAIL$행성 클래스는 돔형 식민지 건설을 지원해야 합니다."
 requires_pd_colony:0 "$TRIGGER_FAIL$이 시스템에는 최소 1개의 비인공 식민지가 있어야 합니다."
 requires_pd_moon_base_site:0 "$TRIGGER_FAIL$행성 전초 기지 사이트 수정자가 필요합니다."
 pd_domed_base_0:0 "전초 기지"
 pd_domed_base_0_DESC:0 "이 불모의 행성은 전초 기지를 위한 이상적인 장소입니다. 이곳은 항성계의 인근 식민지를 지원하는 중심지가 될 준비가 되어 있습니다."
 pd_domed_base_0_MEGASTRUCTURE_DETAILS:0 "§Y전초 기지§!는 거주 불가능한 행성에 위치한 전략적 가치가 있는 자급자족 기지입니다. 완전한 식민지화에는 충분히 크지 않지만, 해당 항성계의 경제를 증대시킵니다."
 TARGET_DOME_BASE_NAME:0 "[FROM.from.planet.GetName] 기지"
 mod_job_angler_per_pop:0 "§G+1§! £job_angler£ $job_angler$ 직업당 $VALUE$ 팝"
 mod_job_angler_per_pop_short:0 "\n$VALUE$ £pop£마다 £mod_job_angler_add£ §G+1§!"
 pc_pd_domed_colony_barren:0 "황량한 돔 식민지"
 pc_pd_domed_colony_barren_desc:0 "얇거나 존재하지 않는 대기를 가진 황량하고 바위투성이의 세계입니다. 표면은 운석 충돌 분화구로 덮여 있으며 생명체가 전혀 존재하지 않습니다. 표면에는 영구 거주가 가능한 돔형 식민지가 건설되었습니다."
 pc_pd_domed_colony_barren_adj:0 "domed"
 mod_pc_pd_domed_colony_barren_habitability:0 "자리 표시자/보이지 않아야 합니다."
 trait_pc_pd_domed_colony_barren_preference:0 "자리 표시자/보이지 않아야 합니다."
 trait_pc_pd_domed_colony_barren_preference_desc:0 "자리 표시자/보이지 않아야 합니다."
 pc_pd_domed_colony_barren_cold:0 "$pc_pd_domed_colony_barren$"
 pc_pd_domed_colony_barren_cold_desc:0 "$pc_pd_domed_colony_barren_desc$"
 pc_pd_domed_colony_barren_cold_adj:0 "$pc_pd_domed_colony_barren_adj$"
 mod_pc_pd_domed_colony_barren_cold_habitability:0 "자리 표시자/보이지 않아야 합니다."
 trait_pc_pd_domed_colony_barren_cold_preference:0 "자리 표시자/보이지 않아야 합니다."
 trait_pc_pd_domed_colony_barren_cold_preference_desc:0 "자리 표시자/보지 않아야 합니다."
 pc_pd_domed_colony_frozen:0 "얼음 돔 식민지"
 pc_pd_domed_colony_frozen_desc:0 "영구적으로 얼어붙은 두꺼운 얼음층으로 덮인 바위 세계입니다. 낮은 온도와 희박한 대기 때문에 표면에서 생명체가 존재할 수 없습니다. 표면에는 영구 거주가 가능한 돔형 식민지가 건설되었습니다."
 pc_pd_domed_colony_frozen_adj:0 "$pc_pd_domed_colony_barren_adj$"
 mod_pc_pd_domed_colony_frozen_habitability:0 "자리 표시자/보이지 않아야 합니다."
 trait_pc_pd_domed_colony_frozen_preference:0 "자리 표시자/보이지 않아야 합니다."
 trait_pc_pd_domed_colony_frozen_preference_desc:0 "플레이스홀더/보지 않아야 합니다."
 pc_pd_domed_colony_toxic:0 "독성 돔 식민지"
 pc_pd_domed_colony_toxic_desc:0 "이 세계는 모든 알려진 고등 생명체에 치명적인 두꺼운 대기를 가진 암석 행성입니다. 독성 구름 위에 떠 있는 대형 돔 도시들이 영구적인 거주를 가능하게 합니다."
 pc_pd_domed_colony_toxic_adj:0 "$pc_pd_domed_colony_barren_adj$"
 mod_pc_pd_domed_colony_toxic_habitability:0 "자리 표시자/보이지 않아야 합니다."
 trait_pc_pd_domed_colony_toxic_preference:0 "자리 표시자/보이지 않아야 합니다."
 trait_pc_pd_domed_colony_toxic_preference_desc:0 "자리 표시자/보이지 않아야 합니다."
 pc_pd_domed_colony_superhabitable:0 "초거주 가능 돔 식민지"
 pc_pd_domed_colony_superhabitable_desc:0 "얇거나 존재하지 않는 대기를 가진 황량하고 바위투성이의 초거주 가능 세계로, 표면은 생명체가 전혀 없고 운석 충돌 분화구로 덮여 있습니다. 표면에는 영구 거주를 위한 돔형 식민지가 건설되었습니다."
 pc_pd_domed_colony_superhabitable_adj:0 "$pc_pd_domed_colony_barren_adj$"
 mod_pc_pd_domed_colony_superhabitable_habitability:0 "자리 표시자/보이지 않아야 합니다."
 trait_pc_pd_domed_colony_superhabitable_preference:0 "자리 표시자/보이지 않아야 합니다."
 trait_pc_pd_domed_colony_superhabitable_preference_desc:0 "자리 표시자/보지 않아야 합니다."
 pc_pd_domed_colony_tidally_locked:0 "조석 고정 돔 식민지"
 pc_pd_domed_colony_tidally_locked_desc:0 "barren하고 바위로 뒤덮인 조석 고정 세계로, 얇거나 존재하지 않는 대기를 가지고 있으며, 표면은 생명체가 전혀 없고 운석 충돌 분화구로 덮여 있습니다. 표면에는 돔형 식민지가 건설되어 영구적인 거주가 가능하게 되었습니다."
 pc_pd_domed_colony_tidally_locked_adj:0 "$pc_pd_domed_colony_barren_adj$"
 mod_pc_pd_domed_colony_tidally_locked_habitability:0 "자리 표시자/보이지 않아야 합니다."
 trait_pc_pd_domed_colony_tidally_locked_preference:0 "자리 표시자/보지 않아야 합니다."
 trait_pc_pd_domed_colony_tidally_locked_preference_desc:0 "자리 표시자/보지 않아야 합니다."
 pc_pd_domed_colony_cave:0 "동굴 돔 식민지"
 pc_pd_domed_colony_cave_desc:0 "barren하고 바위로 가득 찬 동굴 세계로, 얇거나 존재하지 않는 대기를 가지고 있으며, 표면은 생명체가 전혀 없고 운석 충돌 분화구로 덮여 있습니다. 표면에는 영구 거주가 가능한 돔형 식민지가 건설되었습니다."
 pc_pd_domed_colony_cave_adj:0 "$pc_pd_domed_colony_barren_adj$"
 mod_pc_pd_domed_colony_cave_habitability:0 "자리 표시자/보이지 않아야 합니다."
 trait_pc_pd_domed_colony_cave_preference:0 "자리 표시자/보이지 않아야 합니다."
 trait_pc_pd_domed_colony_cave_preference_desc:0 "자리 표시자/보이지 않아야 합니다."
 hab_terraforming_candidate:0 "행성 테라포밍 후보"
 hab_terraforming_candidate_desc:0 "황량하고 생명이 없는 이 행성은 얼어붙은 형태로 물을 가지고 있으며, 한때는 번성하는 생태계의 고향이었을지도 모릅니다. 적절한 기술이 있다면, 이 행성은 거주 가능한 세계로 테라포밍될 수 있습니다."
 pd_domed_colony:0 "돔형 식민지"
 pd_domed_colony_desc:0 "식민지 주민들은 고급 보호 돔 네트워크 아래에서 살아가며, 이들은 행성의 불모한 환경으로부터 그들을 보호합니다. 안전을 제공하는 동시에, 이러한 구조물은 높은 유지비와 확장 비용을 요구합니다."
 pd_moon_base_trade:0 "상업용 달 전초 기지"
 pd_moon_base_trade_desc:0 "상업 지구, 창고, 우주항이 이 고급 보호 돔 네트워크를 구성하여 분주한 무역 중심지로 자리 잡았습니다. 모행성과 연결된 이 돔 기지는 생존을 위해 인근 거주 가능한 세계와의 중요한 연결고리에 의존하고 있습니다."
 pd_moon_base_military:0 "군사 전초 기지"
 pd_moon_base_military_desc:0 "고급 방어 돔 네트워크 주변에는 무기고, 병영, 발사대가 지배적인 풍경을 이루고 있습니다. 이 돔 기지는 인근의 거주 가능한 세계에 물류 지원을 의존하고 있습니다."
 pd_moon_base_factory:0 "공장 달 전초 기지"
 pd_moon_base_factory_desc:0 "고급 보호 돔 네트워크의 심장부인 공장, 직공 작업장 및 제조 센터입니다. 인근 거주 가능한 세계와 연결되어 있으며, 자원과 제작된 상품의 유통을 위해 이 연결에 의존합니다."
 pd_moon_base_foundry:0 "주조 월면 전초 기지"
 pd_moon_base_foundry_desc:0 "이 고급 보호 돔 네트워크의 핵심에는 주조소와 합금 가공 공장이 있습니다. 이 돔 기지는 모행성과 밀접하게 연결되어 있으며, 원자재와 완성된 합금의 수출을 위해 인근 거주 가능한 세계와의 필수적인 연결에 의존합니다."
 pd_moon_base_admin:0 "행정 전초 기지"
 pd_moon_base_admin_desc:0 "고급 네트워크의 보호 돔은 정부 사무소와 관료 기관으로 가득 차 있습니다. 이 돔 기지는 모행성과 연결되어 있으며, 인근 거주 가능한 세계와의 중요한 연결에 의존하여 보급과 유지 관리를 수행합니다."
 pd_moon_base_priest:0 "교회 전초 기지"
 pd_moon_base_priest_desc:0 "사원과 신전이 이 고급 보호 돔 네트워크를 차지하고 있어, 신자들에게 영적 중심지로 구별됩니다. 이 돔 형태의 기지는 모행성과 연결되어 있으며, 인근 거주 가능한 세계와의 신성한 연결에 의존합니다."
 pd_domed_base_research:0 "행성 전초 기지 연구"
 pd_domed_base_research_desc:0 "고급 보호 돔 네트워크를 지배하는 연구소와 연구 시설들입니다. 이 네트워크는 항성계 내의 행성들과 연결되어 있으며, 필수 자원을 위해 그 연결에 의존합니다."
 pd_domed_base_mining:0 "행성 전초 기지 채굴"
 pd_domed_base_mining_desc:0 "광산과 자원 추출 시설은 이 고급 보호 돔 네트워크의 중추입니다. 이 네트워크는 항성계 내의 행성에 고정되어 있으며, 필수 자원을 공급하고 채굴된 자재를 운송하기 위해 이 연결에 의존합니다."
 pd_domed_base_energy:0 "에너지 전초 기지"
 pd_domed_base_energy_desc:0 "전력 발전소와 에너지 변환기는 이 고급 보호 돔 네트워크의 핵심을 형성합니다. 항성계 내의 행성과 연결되어 있으며, 필수 자원과 에너지 크레딧의 분배를 위해 이 연결에 의존합니다."
 pd_domed_base_food:0 "수경 재배 전초 기지"
 pd_domed_base_food_desc:0 "고급 보호 돔 네트워크를 가로지르는 수경 재배 농장과 농업 모듈이 있습니다. 항성계 내의 행성과 연결되어 있으며, 이 연결을 통해 식량 공급과 배급을 의존합니다."
 pd_domed_moonbase_site_1:0 "위성 기지 사이트"
 pd_domed_moonbase_site_1_desc:0 "이 위성은 행성 전초기지를 설치하기에 이상적이지만, 물자 공급과 지속 가능성을 보장하기 위해 태양계 내 식민화된 행성이 필요합니다."
 pd_domed_research_site_1:0 "연구 행성 전초기지 가능 사이트"
 pd_domed_research_site_1_desc:0 "이 소행성체는 돔형 연구 기지를 설치하기에 이상적이지만, 물자 공급과 지속 가능성을 보장하기 위해 태양계 내 식민화된 행성이 필요합니다."
 pd_domed_mining_site_1:0 "채광 행성 전초기지 가능 사이트"
 pd_domed_mining_site_1_desc:0 "이 소행성체는 돔형 채광 기지를 설치하기에 이상적이지만, 물자 공급과 지속 가능성을 보장하기 위해 태양계 내 식민화된 행성이 필요합니다."
 pd_domed_food_site_1:0 "수경 재배 행성 전초기지 가능 사이트"
 pd_domed_food_site_1_desc:0 "이 소행성체는 돔형 수경 재배 기지를 설치하기에 이상적이지만, 물자 공급과 지속 가능성을 보장하기 위해 태양계 내 식민화된 행성이 필요합니다."
 pd_domed_energy_site_1:0 "발전 행성 전초기지 가능 사이트"
 pd_domed_energy_site_1_desc:0 "이 소행성체는 돔형 발전 기지를 설치하기에 이상적이지만, 물자 공급과 지속 가능성을 보장하기 위해 태양계 내 식민화된 행성이 필요합니다."
 d_phab_energy_1:0 "방사성 동위 원소"
 d_phab_energy_1_desc:0 "이 장소는 방사성 동위원소의 풍부한 광맥을 자랑하며, 쉽게 접근할 수 있고 이상적인 효율적인 전력 생산에 적합합니다."
 d_phab_energy_2:0 "얼어붙은 가스 호수"
 d_phab_energy_2_desc:0 "고대 가스가 이 차가운 호수에서 엄청난 압력 아래 고체화되어 독특하고 귀중한 얼어붙은 자원의 저장소를 형성했습니다."
 d_phab_energy_3:0 "지하 통풍구"
 d_phab_energy_3_desc:0 "금속 함유 퇴적물과 과열된 지하수가 불안정한 반응을 일으켜 에너지가 풍부한 화학 분출구를 생성합니다. 이는 전력을 harnessing하기에 적합합니다."
 d_phab_mining_1:0 "광물 매장지"
 d_phab_mining_1_desc:0 "지질학적 격변으로 인해 이 귀중한 광물이 오래전에 행성 표면에 노출되었습니다."
 d_phab_mining_2:0 "광물 풍부한 동굴"
 d_phab_mining_2_desc:0 "이 깊은 동굴은 금속과 광물 광석이 풍부합니다."
 d_phab_mining_3:0 "풍부한 산맥"
 d_phab_mining_3_desc:0 "이 산비탈은 풍부한 광물 자원과 귀중한 보석으로 반짝입니다."
 d_phab_food_1:0 "질소 매장지"
 d_phab_food_1_desc:0 "이 행성의 흩어진 질소 광상은 테라포밍 후 식량 생산을 위한 다산 토지로 지형을 변형하는 데 필수적일 수 있습니다."
 d_phab_food_2:0 "인산염 광상"
 d_phab_food_2_desc:0 "이 행성의 흩어진 인산염 매장지는 테라포밍 후 식량 생산을 위한 다산 토지로 변환하는 데 필수적일 수 있습니다."
 d_phab_food_3:0 "칼륨 광상"
 d_phab_food_3_desc:0 "이 행성의 흩어진 칼륨 광상은 테라포밍 후 식량 생산을 위한 다산 토지로 변모시키는 데 필수적일 수 있습니다."
 d_pd_solar_system_network_hub:0 "항성계 내 네트워크 허브"
 d_pd_solar_system_network_hub_desc:0 "이 허브는 이 항성계의 행성 전초 기지에 중요한 연결 고리입니다. 기지는 고용과 숙소를 제공하는 반면, 중앙 식민지는 운영을 유지하는 데 필요한 필수 물자와 자원을 제공합니다."
 tech_pd_domed_colonies:0 "돔형 거주지"
 tech_pd_domed_colonies_desc:0 "기술 발전으로 인해 이전에 불모였던 행성의 최전선에 돔형 식민지를 세우는 것이 가능해졌습니다."
 allow_domed_colonies:0 "§H메가구조물 잠금 해제:§! §Y돔형 식민지§! 및 §Y전초 기지§!"
 allow_domed_colonies_DETAILS:0 "이 기술은 일부 거주 불가능한 세계에 돔형 식민지와 기지를 건설할 수 있게 해줍니다."
 decision_build_solar_system_network_hub:0 "$d_pd_solar_system_network_hub$ 건설"
 decision_build_solar_system_network_hub_desc:0 "우리는 이 세계의 경제와 태양계의 행성 전초 기지를 연결하는 허브를 건설할 것입니다."
 decision_remove_solar_system_network_hub:0 "$d_pd_solar_system_network_hub$ 제거"
 decision_remove_solar_system_network_hub_desc:0 "이 행성의 경제와 태양계의 행성 전초 기지를 연결하는 허브를 제거하겠습니다."
 decision_change_moon_base:0 "달 행성 전초 기지 교체"
 decision_change_moon_base_desc:0 "이것은 이 달의 행성 전초 기지를 변경할 것입니다."
 decision_change_moon_base_effects:0 "이 달의 전초 기지에 대해 다른 용도를 선택할 수 있게 됩니다."
 decision_pd_flood_domed_colony:0 "홍수 돔 식민지"
 decision_pd_flood_domed_colony_desc:0 "돔형 식민지는 우리에게 이상적일 수 있습니다 - 충분한 물만 있다면 말입니다. 우리의 얼음 채굴 네트워크는 다른 천체에서 얼음을 수확하여 [This.GetName]를 홍수로 만들어 돔형 수족관으로 변환할 수 있게 해줍니다."
 pddomebases.100.name:0 "[From.GetName] 달 전초 기지 완공"
 pddomebases.100.desc:0 "§Y[From.GetName]§!에 있는 달 전초 기지의 건설이 완료되었습니다.\n\n어떤 기능으로 운영해야 할까요?"
 pddomebases.100.trade:0 "상업용 달 전초 기지"
 pddomebases.100.trade.tt:0 "이 달의 전초 기지는 행성 측 §Y$d_pd_solar_system_network_hub$§!에 연결되어 연결된 식민지에서 추가적인 £job_trader£ $job_trader_plural$를 제공합니다."
 pddomebases.100.military:0 "군사 월면 전초 기지"
