 pddomebases.100.admin:0 "행정 월 전초 기지"
 pddomebases.100.admin.tt:0 "이 달의 전초 기지는 행성 측 §Y$d_pd_solar_system_network_hub$§!에 연결되어 연결된 식민지에 추가적인 [GetBureaucratWithIcon]을 제공합니다."
