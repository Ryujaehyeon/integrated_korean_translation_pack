 ui_overhaul_qhd_ascension.10.desc:0 "이 §HUI Overhaul Dynamic - Ascension Slots§!에서 사용 가능한 반복 가능한 승격 슬롯 기술을 활성화하시겠습니까? 그렇다면 선호하는 수량을 선택해 주십시오. 이 변경 사항은 AI를 포함한 모든 플레이어에게 영향을 미칩니다. 숫자는 기본 Stellaris에서의 초기 승격 기술 추가를 포함합니다.\n현재 기술은 §H[global_event_country.uiod_max_ascension_perk_slots]§!로 설정되어 있습니다.\nUIOD 하위 모드의 전통 카테고리는 §H[global_event_country.uiod_max_tradition_categories]§!입니다.\n전통 카테고리를 늘리는 경우, 100을 초과하지 않도록 특정 옵션이 비활성화됩니다."
