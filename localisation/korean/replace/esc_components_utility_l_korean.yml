 ESC_REPAIR_DRONES_DESC:0 "긴급 선체 복구용 자동장치입니다."
 ESC_BIO_REPAIR_DRONES:0 "치유 효소 공생체"
 ESC_BIO_REPAIR_DRONES_DESC:0 "전쟁생물의 외부 조직층에 사는 작은 공생체 군락입니다. 이들의 특화 효소는 생물 자신의 생물학으로 가능한 수준을 훨씬 넘어 상처 치유를 가속합니다."
 ESC_ADV_SHIELD_CAPACITOR:0 "고급 보호막 축전기"
 ESC_ADV_SHIELD_CAPACITOR_DESC:0 "기존 축전기보다 보호막 강도를 크게 높여주는 신형 보호막 축전기입니다."
 ESC_BLUE_CRYSTAL_CAPACITOR:0 "결정 주입 보호막 축전기"
 ESC_BLUE_CRYSTAL_CAPACITOR_DESC:0 "결정 물질이 주입된 보호막 축전기 덕분에 함선의 선체가 강화될 뿐만 아니라 보호막의 강도 또한 향상되었습니다."
 ESC_RED_CRYSTAL_CAPACITOR:0 "결정 단조 보호막 축전기"
 ESC_RED_CRYSTAL_CAPACITOR_DESC:0 "보조제인 결정 물질로 주조된 보호막 축전기 덕분에 함선의 선체가 강화될 뿐만 아니라 보호막의 강도 또한 향상되었습니다."
 ESC_STELLARITE_POWER_CORE:0 "항성 포식자 동력 핵"
 ESC_STELLARITE_POWER_CORE_DESC:0 "이 초소형 인공 항성은 한 때 항성 포식자의 대사 과정을 역공학하여 만들어진 것입니다. 함선의 무장에 추가 에너지를 제공하여 파괴력과 발사 속도를 향상시킵니다."
 ESC_STANDARDIZED_WARHEADS:0 "표준 탄두"
 ESC_STANDARDIZED_WARHEADS_DESC:0 "폭발 무기를 위한 표준 탄두입니다. 이를 사용함으로써 미사일 포대를 더욱 빠르게 장전할 수 있고 탄약고의 안전성이 향상됩니다."
 ESC_BIO_STANDARDIZED_WARHEADS:0 "구획화 휘발성 주머니"
 ESC_BIO_STANDARDIZED_WARHEADS_DESC:0 "생물의 휘발성 주머니를 격리된 구획으로 나누는 진화된 내부 구조입니다. 우발적인 파열도 내부에 억제되며, 생물학적 투사체가 더 빠르게 재생됩니다."
 ESC_TEMPORAL_DISPLACER:0 "시간 왜곡 장치"
 ESC_TEMPORAL_DISPLACER_DESC:0 "시공간을 말 그대로 왜곡하여 함선이 전투에서 생존할 확률을 높여주는 기이한 소형 장치입니다."
 ESC_BIO_TEMPORAL_DISPLACER:0 "$ESC_TEMPORAL_DISPLACER$"
 ESC_BIO_TEMPORAL_DISPLACER_DESC:0 "불분명한 기원의 소형 장치가 전쟁생물의 생물학에 통합되어, 미묘한 방식으로 시공간을 휘게 합니다. 이를 갖춘 생물은 살아남을 수 없어야 할 교전에서 빠져나옵니다."
 ESC_AFTERBURNER_3:0 "펄스 플라즈마 재연소 장치"
 ESC_AFTERBURNER_3_DESC:0 "전투 속도와 회피 능력을 향상시켜주는 첨단 플라즈마 재연소 장치입니다."
 ESC_BIO_AFTERBURNER_1:0 "단순 기동 촉수"
 ESC_BIO_AFTERBURNER_1_DESC:0 "생물의 기존 추진을 보조하는 추가 촉수로, 전투 중 방향 전환에 더 민감하게 반응하게 합니다."
 ESC_BIO_AFTERBURNER_2:0 "기동 촉수"
 ESC_BIO_AFTERBURNER_2_DESC:0 "더 강한 기동 촉수 계통으로, 기본 변형으로는 따라갈 수 없는 빠른 항로 수정과 속도 변화를 수행할 수 있습니다."
 ESC_BIO_AFTERBURNER_3:0 "진화형 기동 촉수"
 ESC_BIO_AFTERBURNER_3_DESC:0 "지금까지 생산된 가장 유능한 기동 촉수 계통으로, 생물을 어떤 방향으로든 거의 즉각적으로 전환할 힘과 반응 시간을 지녔습니다."
 ESC_AUX_THRUSTERS:0 "보조 기동 추진기"
 ESC_AUX_THRUSTERS_DESC:0 "반동 제어 체계에서 사용되는 보조 추진기입니다. 함선의 기동성은 더 좋아지고 적의 공격을 회피하는 능력이 향상됩니다."
