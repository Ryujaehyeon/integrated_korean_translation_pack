 ESC_BIO_ARCHAEO_ARMOR_2_DESC:0 "선구자 펄스 장갑에서 회수한 기술과 유도 진화 기법이 이 갑각에서 수렴합니다. 생물학이나 고고학 어느 쪽만으로도 이 결과에는 미치지 못합니다."
