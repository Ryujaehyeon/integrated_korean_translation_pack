 ESC_BIO_REACTOR_BOOSTER_4:0 "보조 영점 대사 결절"
 ESC_BIO_REACTOR_BOOSTER_4_DESC:0 "영점 에너지를 수확하도록 적응한 보조 기관 군집으로, 생물 자신의 생물학이 부족할 때 추가 전력을 생물의 체계에 공급합니다."
 ESC_REACTOR_BOOSTER_5:0 "보조 특이점 반응로"
 ESC_REACTOR_BOOSTER_5_DESC:0 "함선의 동력망에 추가 동력을 공급해주는 보조 특이점 반응로입니다."
 ESC_BIO_REACTOR_BOOSTER_5:0 "보조 특이점 대사 결절"
 ESC_BIO_REACTOR_BOOSTER_5_DESC:0 "생물의 주 특이점 수확 기관과 짝을 이루는 보조 기관으로, 같은 원천에서 추가 전력을 끌어내 주 생물학 체계만으로는 유지할 수 없는 것을 지탱합니다."
 ESC_STRUCTURAL_REINFORCEMENT:0 "선체 강화"
 ESC_STRUCTURAL_REINFORCEMENT_DESC:0 "강화 소재 층을 추가하여 함선 장갑의 강도를 향상시킵니다."
 ESC_ADV_AUX_FIRE_CONTROL:0 "고급 사격 통제 체계"
 ESC_ADV_AUX_FIRE_CONTROL_DESC:0 "이 보조 컴퓨터는 극도로 개량된 병기 발사 체계를 제공합니다."
 ESC_BIO_AUX_FIRE_CONTROL:0 "전투 시냅스"
 ESC_BIO_AUX_FIRE_CONTROL_DESC:0 "전투 분석에 특화된 전용 신경 경로로, 생물의 무기 기관에 지속적인 조준 보정을 제공합니다. 정확도와 위협 우선순위 지정이 전반적으로 향상됩니다."
 ESC_BIO_ADV_AUX_FIRE_CONTROL:0 "진화형 전투 시냅스"
 ESC_BIO_ADV_AUX_FIRE_CONTROL_DESC:0 "원래의 전투 시냅스를 바탕으로 구축된 더 정교한 신경 구조로, 가장 혼란스러운 교전에서도 생물의 조준을 날카롭게 할 만큼 빠르고 깊게 전투 데이터를 처리합니다."
 ESC_PSIONIC_REINFORCEMENT:0 "사이오닉 강화"
 ESC_PSIONIC_REINFORCEMENT_DESC:0 "이 알 수 없는 장치는 승무원의 사이오닉 에너지를 이용해 함선 주위에 보호 거품을 만들어내어 함선의 보호막과 선체를 크게 강화시킵니다."
 ESC_PRECURSOR_ARMS_ENHANCER:0 "선구자 무기 강화 장치"
 ESC_PRECURSOR_ARMS_ENHANCER_DESC:0 "고대 문명이 무기 성능을 향상시키기 위해 고안한 특별한 암흑 물질 반응로입니다."
 ESC_NANITE_ARMOR_HARDENER:0 "나노 반응형 갑옷"
 ESC_NANITE_ARMOR_HARDENER_DESC:0 "이 반응형 갑옷에 내장된 나노입자는 들어오는 공격에 반응하여 분자 구조를 지속적으로 재형성하며, 수동 갑옷이 접근할 수 없는 효율로 에너지를 분산시키고 흡수합니다."
 ESC_SHIELD_HARDENER_3:0 "항성 성채 방어막 강화기 3"
 ESC_SHIELD_HARDENER_3_DESC:0 "특수화된 발전기로, 방패 필드 밀도를 크게 증가시켜 특정 무기가 이용하도록 설계된 기존 방패 기하학의 틈을 메웁니다."
 ESC_ARMOR_HARDENER_LMETAL_2:0 "생명 흡수판"
 ESC_ARMOR_HARDENER_LMETAL_2_DESC:0 "이전 모델보다 더 넓은 범위의 공격을 차단하면서 방어막에 기본적인 강도를 추가하는 정제된 생체 금속 반응형 장갑입니다."
 ESC_SHIELD_HARDENER_PSI_2:0 "안개 강화 방패 강화기"
 ESC_SHIELD_HARDENER_PSI_2_DESC:0 "이 장치는 수막에서 직접 끌어낸 사이오닉 에너지를 우주선의 보호막으로 흘려보내어, 일반적으로 통과하는 공격에 대해 보호막을 강화합니다. 남는 에너지는 기본 보호막 강도를 보강합니다."
 mod_esc_damage_enemy_ship_on_death:0 "사망 시, 이 함선의 선체와 장갑의 일정 비율을 주변 적에게 피해로 가합니다"
 ESC_AUX_DEAD_HAND_KILL_CMD_1:0 "데드 핸드 스위치: 살상 명령"
 ESC_AUX_DEAD_HAND_KILL_CMD_1_DESC:0 "함선이 치명적 피해를 입으면 자폭 프로토콜이 자동으로 작동합니다. 승무원 사상자가 발생할 가능성이 높지만, 그 결과 발생하는 폭발은 적어도 적 함선 하나를 함께 데려갈 수 있습니다."
 ESC_BIO_AUX_DEAD_HAND_KILL_CMD_1:0 "촉매 방광"
 ESC_BIO_AUX_DEAD_HAND_KILL_CMD_1_DESC:0 "생물 내부 전반에 분포한 고휘발성 물질 주머니는 사망 시 파열되어, 사거리 안의 적 함선을 위협할 만큼 충분한 에너지를 방출합니다."
 ESC_AUX_DEAD_HAND_KILL_CMD_2:0 "데드 핸드 스위치: 섬멸 명령"
 ESC_AUX_DEAD_HAND_KILL_CMD_2_DESC:0 "함선이 치명적 피해를 입으면 완전 자폭 절차가 동력핵을 파국적인 과부하로 몰아갑니다. 어떤 승무원도 살아남지 못하지만, 폭발은 여러 적 함선을 무력화하거나 파괴할 수 있습니다."
 ESC_BIO_AUX_DEAD_HAND_KILL_CMD_2:0 "휘발성 촉매 방광"
 ESC_BIO_AUX_DEAD_HAND_KILL_CMD_2_DESC:0 "생물의 몸 전체에 분포한 크게 확장된 극휘발성 화합물 주머니는 사망 시 폭발하여, 주변의 모든 것을 집어삼킬 만큼 강한 힘을 냅니다."
 mod_esc_repair_allied_ship_on_death:0 "사망 시, 함대 내 무작위 아군 함선 하나가 선체와 장갑 일부를 회복합니다"
 ESC_AUX_DEAD_HAND_HEAL_CMD_1:0 "데드 핸드 스위치: 아군 수리 명령"
 ESC_AUX_DEAD_HAND_HEAL_CMD_1_DESC:0 "함선이 치명적 피해를 입으면 수리 드론이 가장 가까운 아군 함선으로 자동 재지정됩니다. 함선의 상실은 비극이지만, 그 희생은 다른 함선들이 교전에서 살아남는 데 필요한 여유를 줄 수 있습니다."
 ESC_BIO_AUX_DEAD_HAND_HEAL_CMD_1:0 "회복 효소 주머니"
 ESC_BIO_AUX_DEAD_HAND_HEAL_CMD_1_DESC:0 "생물의 외부 갑각 전반에 있는 효소 주머니는 사망 시 파열되어, 충분히 가까운 아군 생물의 재생을 가속하는 회복성 화합물을 퍼뜨립니다."
 ESC_AUX_DEAD_HAND_HEAL_CMD_2:0 "데드 핸드 스위치: 아군 지원 명령"
 ESC_AUX_DEAD_HAND_HEAL_CMD_2_DESC:0 "함선이 치명적 피해를 입으면 사용 가능한 모든 수리 드론과 회수 가능한 물자가 아군 함선으로 향합니다. 함선의 상실은 비극이지만, 그 희생은 다른 함선들이 교전에서 살아남는 데 필요한 여유를 줄 수 있습니다."
 ESC_BIO_AUX_DEAD_HAND_HEAL_CMD_2:0 "최고 회복 효소 주머니"
 ESC_BIO_AUX_DEAD_HAND_HEAL_CMD_2_DESC:0 "표준 변형보다 더 강력한 효소 주머니로, 외부 갑각 전반에 분포합니다. 생물이 사망하면 여러 가까운 아군의 치유를 동시에 가속할 만큼 충분한 회복 출력을 퍼뜨립니다."
 ESC_ARCHAEO_ARMOR_2:0 "기술-합성체 갑옷"
 ESC_ARCHAEO_ARMOR_2_DESC:0 "최신 물자 과학과 힘의 장 기술이 선구자 펄스 갑옷에서 역설계된 원칙과 결합되었습니다. 그 결과는 각 접근 방식이 독자적으로 생산할 수 있는 것을 초월합니다."
