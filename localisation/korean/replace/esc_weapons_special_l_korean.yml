 ESC_ARCHAEO_TITANLASER_3:0 "고급 기술-합성체 파괴자"
 ESC_ARCHAEO_TITANLASER_3_DESC:0 "현재 과학이 허용하는 한, 선행 문명과 현대 부품이 철저히 통합된 이 $ESC_ARCHAEO_TITANLASER_2$의 후계자는 초중량 에너지 무기 설계의 결정적인 표현으로 자리 잡고 있습니다."
 ESC_ARCHAEO_TITANLASER_3_JUGGERNAUT:0 "$ESC_ARCHAEO_TITANLASER_3$ ($juggernaut$)"
 ESC_ARCHAEO_TITANLASER_3_JUGGERNAUT_DESC:0 "$ESC_ARCHAEO_TITANLASER_3_DESC$"
 ESC_MANDIBLES_4:0 "중성자 미네랄 주입 아래턱"
 ESC_MANDIBLES_4_DESC:0 "알려진 가장 단단한 물질 중 하나인 중성자 미네랄을 전쟁생물 아래턱의 구조 매트릭스에 주입하여 이미 강력한 자연 무기를 거의 어떤 선체 재료도 관통할 수 있는 탑승 도구로 바꿉니다."
 ESC_MANDIBLES_5:0 "아다만틴 아래턱"
 ESC_MANDIBLES_5_DESC:0 "아래턱 구조 전체에 걸친 정밀하게 공학화된 중성자 미네랄 내포물 분포는 가장 이국적인 장갑 재료 외에는 모두 쉽게 절단할 수 있는 복합 무기를 만들어냅니다."
 ESC_MANDIBLES_CYBER_1:0 "사이버네틱 강화 아래턱"
 ESC_MANDIBLES_CYBER_1_DESC:0 "합성 근육 강화가 원시 물기 힘을 크게 높이고, 통합된 에너지 방전기는 생물이 전기와 운동 피해를 동시에 줄 수 있게 하여, 어느 한 가지만으로는 더 큰 결합 효과를 냅니다."
 ESC_MANDIBLES_CYBER_2:0 "바이오닉 아래턱"
 ESC_MANDIBLES_CYBER_2_DESC:0 "더 강한 합성 근육과 더 강력한 에너지 방전기가 결합되어 이 아래턱을 이용 가능한 가장 파괴적인 근접 전투 무기 중 하나로 만들며, 생체-기계 통합이 얼마나 발전했는지를 보여줍니다."
 ESC_LENS_FLARE_GUN_2:0 "눈멀림 렌즈 섬광 총"
 ESC_LENS_FLARE_GUN_2_DESC:0 "더 큰 전력 출력이 이 무기 방출의 방해 능력을 높여, 지속적인 공격을 위한 충분한 시간 동안 상대 함선의 핵심 체계를 손상시킵니다."
 ESC_LENS_FLARE_GUN_3:0 "항성 섬광 방출기"
 ESC_LENS_FLARE_GUN_3_DESC:0 "그 출력이 의미 있게 항성 방사선에 비유되는 방출기로, 동등한 무관심으로 센서를 눈멀리고 체계를 태웁니다."
 ESC_NOVA_FLARE_GUN:0 "신성 섬광 포"
 ESC_NOVA_FLARE_GUN_DESC:0 "그 방출이 공격 기회를 만들면서 동시에 공격 자체가 될 수 있을 만큼 상대 체계를 완전히 방해하는 고도로 특화된 무기입니다."
 ESC_SUPERNOVA_FLARE_GUN:0 "초신성 섬광 포"
 ESC_SUPERNOVA_FLARE_GUN_DESC:0 "$ESC_NOVA_FLARE_GUN$의 후계 무기로 더 큰 전력 출력이 직접 피해와 표적에 가하는 체계 방해 심각성 모두를 높입니다."
 ESC_LM_ACCELERATOR_2:0 "고급 재형성 투사체 가속기"
 ESC_LM_ACCELERATOR_2_DESC:0 "투사체의 형성을 관장하는 고급 예측 알고리즘은 마주치는 장갑에 최적 형태를 채택하게 하여, 고정 형상 투사체가 따라올 수 없는 관통력을 달성합니다."
 ESC_LM_ACCELERATOR_BIO_2:0 "$ESC_LM_ACCELERATOR_2$"
 ESC_LM_ACCELERATOR_BIO_2_DESC:0 "$ESC_LM_ACCELERATOR_2_DESC$"
 ESC_LM_ACCELERATOR_3:0 "유동 형상 투사체 가속기"
 ESC_LM_ACCELERATOR_3_DESC:0 "이 가속기는 표적을 실시간으로 읽고 발사에서 충돌까지 비행 내내 자체 형상을 지속적으로 조정하여, 통과하는 모든 층에서 최대 피해를 추출하는 투사체를 발사합니다."
