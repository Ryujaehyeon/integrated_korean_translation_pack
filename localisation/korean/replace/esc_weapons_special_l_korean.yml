 ESC_ARCHAEO_TITANLASER_2:0 "기술-합성체 파괴자"
 ESC_ARCHAEO_TITANLASER_2_DESC:0 "현재의 에너지 무기 물리학이 극한으로 발전하고, 선조 문명의 역설계된 Ruinator Glare의 원리와 융합되어 비범한 힘을 가진 타이탄급 빔 무기가 탄생했습니다."
 ESC_ARCHAEO_TITANLASER_2_JUGGERNAUT:0 "$ESC_ARCHAEO_TITANLASER_2$ ($juggernaut$)"
