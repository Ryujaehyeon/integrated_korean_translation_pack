 ESC_LM_ARMOR_6_DESC:0 "$sr_living_metal$ 과학의 발전으로 단순히 피해에 저항하는 것이 아니라 적극적으로 자가 수리하는 중성자 미네랄 장갑을 생산할 수 있게 되었으며, 재래식 장갑판을 영구적으로 손상시킬 충격에서도 회복합니다."
