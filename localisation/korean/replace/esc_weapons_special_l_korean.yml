 ESC_ARCHAEO_POINTDEFENSE_3_DESC:0 "__ESC_ARCHAEO_POINTDEFENSE_3_DESC__   $ESC_ARCHAEO_POINTDEFENSE_2$를 기반으로 한 더욱 정교한 합성으로, 추가적인 전조 통합을 통해 목표 탐지 속도와 요격 신뢰성에서 측정 가능한 개선을 이루었습니다."
 ESC_BIO_ARCHAEO_POINTDEFENSE_3:0 "진화형 기술 합성 거미줄 발사기"
 ESC_BIO_ARCHAEO_POINTDEFENSE_3_DESC:0 "이 $ESC_BIO_ARCHAEO_POINTDEFENSE_2$의 진화에서 선구자 구성 요소들이 생물의 생물학에 더 완전히 흡수되어, 놀라운 반응 속도와 정밀도를 지닌 거점 방어 생물이 만들어집니다."
