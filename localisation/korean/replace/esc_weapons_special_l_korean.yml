 ESC_BIO_MISSILE_1:0 "산성 방울 폭탄"
 ESC_BIO_MISSILE_1_DESC:0 "크고 끈적한 산성 담즙 방울을 만들어내는 분비샘을 지닌 거대한 인공 생명체로, 초소형 미사일처럼 방울을 뱉어냅니다."
 ESC_BIO_MISSILE_2:0 "역겨운 산성 방울 폭탄"
 ESC_BIO_MISSILE_2_DESC:0 "더 크고 더 강력한 종류의 산성 방울 폭탄 생명체입니다."
 ESC_BIO_MISSILE_3:0 "포식귀 산성 방울 폭탄"
 ESC_BIO_MISSILE_3_DESC:0 "이 산성 방울 폭탄 스피터는 생물 진화의 정점이며 산성 담즙 폭탄을 만들고 '발사'하는 능력은 압도적입니다."
 ESC_BIO_X_MISSILE_1:0 "연발 산성 방울"
 ESC_BIO_X_MISSILE_1_DESC:0 "산성 방울 폭탄으로 만들어진 초거대 유기체로, 다수의 산성 담즙 방울을 빠르게 발사할 수 있습니다. 그러나 그 크기 때문에 거대한 함선에서만 사용할 수 있습니다."
 ESC_BIO_X_MISSILE_2:0 "포식귀 연발 산성 방울"
 ESC_BIO_X_MISSILE_2_DESC:0 "훨씬 더 강력한 산성 담즙을 만들고 '발사'할 수 있는 연속 산성 방울의 변형체입니다."
 ESC_BIO_X_MISSILE_3_TITAN:0 "산성 방울 폭풍"
 ESC_BIO_X_MISSILE_3_TITAN_DESC:0 "이 무지막지한 생명체는 연발 산성 방울이 발전된 것이며 우리 과학자들이 만든 가장 강력한 담즙 스피터입니다. 그 파괴력은 매우 강력한 재래식 화포을 쉽게 눌러버릴 정도입니다."
