l_korean:
 from_the_ashes_site_desc: "The surface of [Planet.GetName] is scorching hot, and hostile to biological life. Images of clearly artificial ruins have therefore caught the attention of [Owner.GetScientistPlural]. An archaeological investigation could reveal who was here, and what happened to them."
 infernals.2700.desc: "While the ruins on [From.Planet.GetName] first appeared to be built of stone, excavation and analysis suggests that many of the structures in this lost city are made of a petrified organic material comparable to wood. No source for such materials exists on the planet today. Smaller artifacts are built of crude metals, glass, and similar petrified organics, and [Owner.GetScientistPlural] have also found fossils of native creatures that no longer exist. \n\nIt appears the civilization in question inhabited the planet at a time when its climate was much more temperate. Did they disappear long before the planet turned to its current state, or did they witness the violent transition in their final years?"
