 regentmaker.1:0 "$ap_powerful_vassals$"
 regentmaker.1.desc:0 "이제 우리가 선택한 세계에서 대신 행동할 $IMPERIALIST_UNDERLING$을(를) 세울 수 있습니다. 계속하시겠습니까?"
 regentmaker.1.a:0 "§Y주권 국가§!를 설립합니다."
 regentmaker.1.b:0 "§Y종속 국가§! 설립."
 regentmaker.1.c:0 "$SUBJECT_TITLE_TEXT$을(를) 설립합니다."
 regentmaker.2.desc:0 "이제 선택받은 사회 $IMPERIALIST_UNDERLING$ 다수 종을 정립할 수 있습니다. 계속할까요?"
 regentmaker.2.a:0 "주요 종족 아래에 국가를 설립합니다."
 regentmaker.2.b:0 "무작위 외계 종족 아래에 국가를 설립합니다."
 regentmaker.2.c:0 "행성의 다수 종족에 따라 국가를 수립합니다."
 regentmaker.4:0 "$ap_powerful_vassals$: 기술 이전"
 regentmaker.4.desc:0 "우리는 속국을 세웠습니다. 우리의 동맹을 강인하게 유지하고 서로 동등한 입장을 유지하기 위해 그들과 기술을 공유해야 할까요?"
 regentmaker.4.a:0 "그들을 우리의 속국에게 주십시오."
 regentmaker.4.b:0 "우리의 속국들이 그들의 기술을 우리와 공유하도록 강요합니다."
 regentmaker.7:0 "$ap_powerful_vassals$: 윤리 선택"
 regentmaker.7.desc:0 "이것은 우리의 신하의 윤리를 선택하여 그들이 유용하도록 유지할 수 있게 해줍니다."
 regentmaker.7.a:0 "모든 $subjects$의 윤리를 동등하게 맞춥니다."
 regentmaker.7.b:0 "특정 속국의 윤리를 선택합니다."
 regentmaker.50.a:0 "모든 우리의 속국의 윤리를 개혁하여 새로운 윤리를 선택할 수 있도록 합니다."
 regentmaker.8:0 "$ap_powerful_vassals$: 정부 선택"
 regentmaker.8.desc:0 "이것은 우리의 신하의 정부를 선택하여 그들이 유용하게 유지되도록 할 수 있게 해줍니다."
