 war_goal_wg_forced_decentralization:0 "정복하고 발칸화하기"
 war_goal_wg_forced_decentralization_desc:0 "이 전쟁에서 승리하면, 목표의 모든 항성계가 $subjects$로 해방되어 그들의 개별 영토가 미래에 우리에게 저항할 힘을 결집할 수 없게 됩니다. 현상 유지 시에는 점령된 항성계만 해방됩니다."
