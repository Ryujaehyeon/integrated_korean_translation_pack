l_korean:
 mem_broken_clock.1.name:0 "고장난 시계"
 mem_broken_clock.1.desc:0 "§Y[From.GetName] 시스템§!은 이상한 장소입니다.\n\n오래 전에 죽은 별을 공전하는 거대한 고대 링 월드가 있습니다. 수년간 입은 명백한 피해에도 불구하고, 눈에 띄는 잔해는 거의 없습니다. 또 다른 이상한 광경은 불투명한 보라색 안개로 덮인 행성과 여러 개의 위성인 다수의 가려진 천체입니다.\n\n하지만 가장 중요한 것은 이 시스템이 일반 상대성 이론의 알려진 원리와 일치하지 않는 기괴한 시간 팽창 효과의 영향을 받고 있다는 점입니다. 이러한 효과는 시스템 전역에 왜곡된 시간의 주머니를 생성하고 있습니다.\n\n시간에 대한 우리의 인식에 영향을 미치는 것 외에는 해롭지 않은 것 같습니다. 그러나 이곳에는 분명히 뭔가 매우 잘못된 것이 있습니다..."
 mem_broken_clock.1.a:0 "불길하군."
 mem_broken_clock.101.name:0 "고장난 시계: 불길한 소식"
 mem_broken_clock.101.desc:0 "관측소는 §Y[From.Solar_System.GetName]§! 성계의 시간 이상이 더욱 빈번하고 불규칙적으로 증가하고 있다고 보고해왔습니다.\n\n이 일이 어떤 원인으로 일어나는 것이건, 매우 활발하게 활동 중인 것은 분명해 보입니다. 이 활동의 결과가 어떻게 될지는 아무도 모를 것입니다."
 mem_broken_clock.101.a:0 "뭐가 되었건 대비를 해야 할 거야."
 mem_broken_clock.102.name:0 "고장난 시계: 불길한 소식"
 mem_broken_clock.102.desc:0 "우리의 장거리 감지기는 §Y[From.Solar_System.GetName]§! 시스템에서 발생하는 시간적 이상 현상이 점점 더 빈번하고 불규칙해지고 있음을 나타냅니다. \n\n이 현상의 배후에 있는 존재나 무언가가 활동 중인 것으로 보입니다. 이 활동의 결과가 무엇일지는 누가 알겠습니까?"
 mem_broken_clock.102.a:0 "골칫거리로군."
 mem_broken_clock.1001.name:0 "고장난 시계: 틈"
 mem_broken_clock.1001.desc:0 "§Y[From.Solar_System.GetName]§! 항성계에서 기이한 사건이 보고되었습니다. [Root.MemBrokenClock1001] 신비로운 안개가 행성을 감싸고 있던 것이 사라져 행성의 표면이 드러났습니다. 거대한 링월드 구조물은 모든 피해를 somehow 복구한 것 같습니다. 심지어 항성 자체도 구성 성분이 변화하여 밝은 A급 항성으로 변모하였으며, 수십억 년의 노화를 되돌린 듯합니다. \n\n가장 이상한 점은, 적막한 항성계가 이제 생명으로 가득 차 있다는 것입니다. 광활한 도시와 산업 지역이 링월드와 더 큰 행성 중 하나를 덮고 있으며, 공허에서 갑자기 나타난 두 개의 완전히 개발된 서식지가 거대한 함대에 의해 보호받고 있습니다. 마치 이 항성계가 결코 버려지지 않았던 것처럼 보입니다. \n\n신비로운 신참들이 우리에게 신호를 보내고 있습니다."
 mem_broken_clock.1001.a:0 "참 이상하군."
 mem_broken_clock.1001.a.phobe:0 "불쾌한 손님들이군..."
 mem_broken_clock.1001.we_are_owners:0 "우리 전초기지와 다른 영구 구조물들이 갑자기 성계에서 자취를 감추었습니다.\n\n그와 동시에"
 mem_broken_clock.1001.we_are_not_owners:0 "\n\n"
 mem_broken_clock.1002.name:0 "고장난 시계: 접촉"
 mem_broken_clock.1002.desc:0 "우리는 현재 §Y[From.Solar_System.GetName]§!성계를 차지하고있는 제국으로부터 통신을 받았습니다.\n\n그들이 우리의 언어를 해독하기까지는 오랜 시간이 걸리지 않았습니다."
 mem_broken_clock.1003.desc:0 "은하의 인민들이여! 이 메시지를 주의 깊게 듣고 절망하십시오.\n\n두울라칸이 다시 살아났습니다. 우리는 악과 약자를 태우는 불꽃입니다. 우리의 신성한 임무는 우주를 불순하고 혐오스러운 외계 생명체로부터 정화하는 것입니다.\n\n다른 시대에, 우리의 적들의 배신으로 우리는 시간의 주머니에 갇히게 되었습니다. 그러나 무너져가는 현실과 부서진 시간 속에서 보낸 영원은 우리의 결의를 더욱 강하게 만들었습니다.\n\n우리에 맞서 싸우든, 운명에 복종하든 상관없습니다. 당신의 파멸은 피할 수 없는 일입니다."
 mem_broken_clock.1003.generic:0 "우리가 그렇게 쉬운 먹잇감으로 보였더냐!"
 mem_broken_clock.1003.agressive:0 "침략할 시간을 잘못 선택했구나!"
 mem_broken_clock.1003.purifier:0 "당신은 여기까지 왔습니다... 죽기 위해서요."
 mem_broken_clock.1003.peacekeeper:0 "너희의 잔학무도한 시간은 여기서 끝난다."
 mem_broken_clock.1003.friendly:0 "그냥 친구로 지내면 안되나?"
 mem_broken_clock.1004.desc:0 "정보.\n\n개체: 지속적인 근절 계획\n목적: 은하계의 모든 고등 유기생물 제거.\n\n예상치 못한 간섭으로 인해 작업이 일시 연기됨\n\n이제 근절이 재개됨"
 mem_broken_clock.1004.terminator:0 "\"집\"에 잘 왔다."
 mem_broken_clock.1005.desc:0 "먹잇감, 이번엔 벗어날 수 있다고 생각지 말아라. 우리는 최상위 유기체이며, 궁극의 포식자이니. 너희의 유일한 미래는 우리의 배를 채우는 것뿐이라. 더 강한 적들이 저항하려 했으나, 일시적으로 함정에 빠뜨릴 수만 있었으니.\n\n일시적인 시간의 거품 속에서 소비된 영원은 단지 우리의 굶주림을 증가시켰을 뿐이다. 이제, 자유로이 사냥을 시작할 준비를 마쳤노라."
 mem_broken_clock.1005.swarm:0 "이제 진짜 포식자를 만나보겠군."
 mem_broken_clock.3001.name:0 "고장난 시계: 시간 초과"
 mem_broken_clock.3001.desc:0 "우리 관측자들은 오늘 매우 기이한 사건을 보고했습니다.\n\n[From.GetSpeciesAdj] 무리가 하룻밤 사이에 사라진 것 같습니다. 이러한 사건의 원인이 무엇인지 명확하지 않지만, 그들을 이곳으로 데려온 시간적 사건이 되돌려졌거나 실패했을 가능성이 높습니다. 그들이 남긴 파괴의 흔적이 없었다면, 마치 그들이 존재하지 않았던 것처럼 보였을 것입니다. [Root.MemBrokenClock3001]"
 mem_broken_clock.3001.desc.system_reverted:0 "우리 관측자들은 오늘 매우 기이한 사건을 보고했습니다.\n\n[From.GetSpeciesAdj] 무리들이 하룻밤 사이에 사라진 것 같습니다. 그들의 고향 항성계인 §Y[broken_clock_system.GetName]§!도 원래의 부패 상태로 되돌아갔습니다. 이러한 사건의 원인이 무엇인지 명확하지 않지만, 그들을 이곳으로 데려온 어떤 시간적 사건이 되돌려졌거나 실패했을 가능성이 높습니다. 그들이 남긴 파괴의 흔적이 없었다면, 그들이 존재하지 않았던 것처럼 보였을 것입니다. [Root.MemBrokenClock3001]"
 mem_broken_clock.3001.a:0 "골칫거리가 사라졌군."
 mem_broken_clock.3001.survivors:0 "\n\n하지만 그들이 한때 차지했던 공간이 완전히 비어있는 것 같지는 않습니다. 정화 행위에서 살아남은 몇몇 생존자들이 자신들의 세계를 되찾고 은하 제국으로서의 미래를 키우고 있습니다."
 mem_broken_clock.3001.no_survivors:0 ""
 mem_broken_clock.3002.name:0 "고장난 시계: 소멸점"
 mem_broken_clock.3002.desc.home:0 "§Y[Fromfrom.GetName]§!의 표면에서의 우리의 교전이 [From.GetName]을(를) 이 시대로 데려온 시간의 흐름을 불안정하게 만든 것 같습니다. 행성이 다시 숨겨진 상태로 돌아가 우리 군대는 철수해야 했습니다. \n\n하지만 우리는 이 시간의 이상 현상에서 몇 가지를 배울 수 있었습니다."
 mem_broken_clock.3002.desc.ring:0 "§Y[Fromfrom.GetName]§!의 표면에서의 우리의 접촉이 링 구간의 파괴를 되돌린 시간의 흐름을 불안정하게 만든 것 같습니다. \n\n하지만 우리는 이 시간의 이상 현상에서 몇 가지를 배울 수 있었습니다."
 mem_broken_clock.3002.desc.hab:0 "시간이 왜곡된 거주지에 대한 우리의 침공이 이 시간대에 고정되어 있던 시간의 흐름을 불안정하게 만들어 자멸을 초래한 것 같습니다.  \n\n하지만, 우리는 이 시간적 이상 현상으로부터 몇 가지를 배울 수 있었습니다."
 mem_broken_clock.3002.a:0 "이상하군..."
 mem_broken_clock_scientist_trait:0 "시간 여행자"
 mem_broken_clock_scientist_trait_desc:0 "이 지도자는 왜곡된 시간과 공간을 여행하며 다른 이들이 상상조차 할 수 없는 것들을 보았습니다."
 mem_broken_clock_admiral_trait:0 "$mem_broken_clock_scientist_trait$"
 mem_broken_clock_admiral_trait_desc:0 "$mem_broken_clock_scientist_trait_desc$"
 mem_broken_clock_general_trait:0 "$mem_broken_clock_scientist_trait$"
 mem_broken_clock_general_trait_desc:0 "$mem_broken_clock_scientist_trait_desc$"
 mem_broken_clock_governor_trait:0 "$mem_broken_clock_scientist_trait$"
 mem_broken_clock_governor_trait_desc:0 "$mem_broken_clock_scientist_trait_desc$"
 mem_broken_clock_ai_cheat:0 "시간 초과"
 mem_broken_clock_ai_cheat_temp:0 "최근 도착한 자"
 mem_broken_clock_rebel_country:0 "떠나간 폭군"
 mem_broken_clock_free_ships:0 "반군 함선"
 d_mem_broken_clock_fissure:0 "시간 균열"
 d_mem_broken_clock_fissure_desc:0 "균열된 시간이 존재하는 이곳에서는 모든 것이 원래대로 보이지 않습니다."
 mem_broken_clock_fellow_rebels:0 "동료 반란군"
