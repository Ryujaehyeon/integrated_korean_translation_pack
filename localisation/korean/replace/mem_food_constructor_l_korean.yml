l_korean:
 mem_food_constructor_chain_title:0 "식량 제조기"
 mem_food_constructor_chain_desc:0 "우리가 소유 중인 이상한 외계 장치가 끝없이 식량 분말을 찍어내고 있습니다. 너무 늦기 전에 이를 막을 방법을 찾아야 합니다."
 mem_food_constructor_modifier_1:0 "식량 분말"
 mem_food_constructor_modifier_1_desc:0 "이 행성은 주민들이 섭취할 수 있는 영양가 있는 분말을 계속 생성하는 기계를 보유하고 있습니다."
 mem_food_constructor_modifier_2:0 "과도한 식량 분말"
 mem_food_constructor_modifier_2_desc:0 "이 행성은 식량 제조기의 생산품에 묻힐 위기에 처했습니다. 주변 지역에 옅은 회색 분말이 떠다니고 있으며 바람은 영양가 있는 분말 폭풍들을 일으키고 있습니다."
 mem_food_constructor_modifier_3:0 "온 사방에 퍼진 식량 분말"
 mem_food_constructor_modifier_3_desc:0 "행성 표면 전체에 얇은 식량 먼지층이 덮여 있으며, 식량 건설기가 출력 증가를 위해 매 순간 에너지망을 소모하고 있습니다. 먼지가 먹을 수 있는 것은 사실이나, 이 축복은 지역 주민들에게 끔찍한 저주로 변해버렸습니다."
 mem_food_constructor_modifier_4:0 "떠오르는 식량 조류"
 mem_food_constructor_modifier_4_desc:0 "식량 제조기는 행성 전체를 약 1km의 식량 분말로 뒤덮었습니다. 주민들은 다시는 배고파하지 않겠지만, 행성 표면의 이동은 불가능해졌습니다."
 mem_food_constructor_modifier_5:0 "먼지가 가라앉다"
 mem_food_constructor_modifier_5_desc:0 "식량 제조기의 영구적인 작동 정지로 행성의 생태계가 회복하고 있습니다. 부패하는 분말층은 훌륭한 비료로 작용하여 행성의 환경 복구를 가속하고 있습니다."
 mem_food_constructor.1.name:0 "수수께끼 발견"
 mem_food_constructor.1.desc:0 "§Y[Root.GetName]§!의 개척민 중 한 명이 정착지 외곽에서 거대한 외계 유물을 우연히 발견하면서 혼란스러운 발견을 하였습니다. 그가 우연히 이를 활성화한 후, 이 유물이 고운 회색 먼지를 생성한다는 것을 알게 되었습니다. 추가 분석 결과, 이 먼지는 무해하며 사실상 거의 모든 생물체가 섭취할 수 있는 매우 영양가 있는 음식이라는 것이 밝혀졌습니다. 이는 지역 주민과 [Owner.GetName] 전체에 큰 이익을 가져다줄 것으로 기대됩니다."
 mem_food_constructor.1.desc.machine:0 "§Y[Root.GetName]§!의 탐사 드론 중 하나가 광야 공생군에서 출처가 불확실한 외계 유물을 발견했습니다. 초기 조사 중에 이 유물이 어떤 방식으로 활성화되어 미세한 회색 먼지를 생성하기 시작했습니다. 초기 분석에 따르면 이 먼지는 어떤 면에서도 위험하지 않으며 상당량의 화학 에너지를 포함하고 있습니다. 그러나 이를 처리하는 것은 전력망에 연결하기에는 효율적이지 않습니다."
 mem_food_constructor.1.desc.hive:0 "§Y[Root.GetName]§!의 조사 드론 중 하나가 광야 공생군에서 출처가 불확실한 외계 유물을 발견했습니다. 초기 조사 중에 이 유물이 어떻게든 활성화되어 미세한 회색 먼지를 생성하기 시작했습니다. 추가 분석 결과, 이 먼지는 무해하며 사실상 거의 모든 생물체가 섭취할 수 있는 매우 영양가 있는 음식이라는 것이 밝혀졌습니다. 이는 지역 주민과 [Owner.GetName] 전체에 큰 혜택을 약속합니다."
 mem_food_constructor.1a:0 "흥미롭군."
 mem_food_constructor.1b:0 "이것은 외계 지능의 선물입니다."
 mem_food_constructor.1c:0 "함정일지도 모른다."
 mem_food_constructor.1d:0 "신이 내린 축복이다."
 mem_food_constructor.1e:0 "우린 외계 기술을 신뢰할 수 없다."
 mem_food_constructor.1.machine:0 "추가 연구 필요."
 mem_food_constructor.1.tooltip:0 "§Y[Root.GetName]§!의 식량 생산량 증가."
 mem_food_constructor.2.name:0 "[Root.GetName]에서 과도한 분말 생산량"
 mem_food_constructor.2.desc:0 "§Y[Root.GetName]§!의 놀라운 보고에 따르면 식량 제조기의 생산량이 계속 증가하고 있음을 보여줍니다. 사람들이 더는 생산된 식량을 먹지 못하고 행성 밖으로 보낼 수 없는 수준까지 도달했습니다. 장치를 종료하려는 시도는 소용없는 것으로 판명되었습니다. 제조기의 해독된 설명서에는 비활성화 방법으로 §Y\"리산 열쇠\"§!가 언급되어 있습니다. 그러나 우리는 그런 것을 가지고 있지 않습니다. 기계를 파괴하려는 시도도 헛된 것으로 판명되었습니다. 장치는 우리가 알고 있는 어떤 인공 재료보다 더 단단해 보입니다. 매립지가 넘칠 위기에 처했고 사람들은 장치가 있는 건물 주변 지역을 탈출하고 있습니다."
 mem_food_constructor.2.desc.machine:0 "§Y[Root.GetName]§!에서 \"식량 제조기\"로 지정된 개체를 계속 관찰하면 분말의 생산량이 계속 증가하는 것을 볼 수 있습니다. 생산은 우리의 드론이 이제는 충분히 빨리 청소할 수 없는 수준에 도달했습니다. 장치를 종료하려는 시도는 소용없는 것으로 판명되었습니다. 제조기의 해독된 설명서에는 비활성화 방법으로 §Y\"리산 열쇠\"§!가 언급되어 있습니다. 그러나 우리는 그런 것을 가지고 있지 않습니다. 장치를 파괴하려는 시도도 헛된 것으로 판명되었습니다. 그 장치는 우리가 알고 있는 어떤 인공 재료보다 더 단단해 보입니다. 매립지가 범람할 위기에 처해 있으며, 이러한 조건에서 더는 기능을 수행할 수 없어서 장치 주변의 거주 시설을 버려야 했습니다."
 mem_food_constructor.2.desc.hive:0 "§Y[Root.GetName]§!의 놀라운 보고에 따르면 식량 제조기의 생산량이 계속 증가하고 있음을 보여줍니다. 드론들이 더는 생산된 식량을 먹지 못하고 행성 밖으로 보낼 수 없는 수준까지 도달했습니다. 장치를 종료하려는 시도는 소용없는 것으로 판명되었습니다. 제조기의 해독된 설명서에는 비활성화 방법으로 §Y\"리산 열쇠\"§!가 언급되어 있습니다. 그러나 우리는 그런 것을 가지고 있지 않습니다. 기계를 파괴하려는 시도도 헛된 것으로 판명되었습니다. 장치는 우리가 알고 있는 어떤 인공 재료보다 더 단단해 보입니다. 매립지가 범람할 위험이 있으며, 드론들은 장치가 있는 건물 주변 지역에서 쫓겨나고 있습니다."
 mem_food_constructor.2a:0 "우리는 그것을 끝낼 수 있는 방법을 찾아야 한다!"
 mem_food_constructor.2b:0 "오래된 \"OFF\" 버튼은 어떻게 되었나?"
 mem_food_constructor.2c:0 "우리는 외계 기술을 믿지 말았어야 했다."
 mem_food_constructor.2.tooltip:0 "[Root.GetName]이(가) 어려움을 겪기 시작합니다."
 mem_food_constructor.3.name:0 "[Root.GetName]이(가) 식량에 익사합니다."
 mem_food_constructor.3.desc:0 "[Root.GetName]의 지역 당국은 상황을 억제하려는 시도를 공식적으로 포기했습니다. 계속해서 증가하는 식량 생산량은 매립지에 버리거나 행성 밖으로 운반하려는 모든 시도를 넘어섰습니다. 행성은 두꺼운 회색 식량 분말 층으로 가득 찼습니다. 더 나쁜 것은 제조기가 지역 발전기에서 에너지를 끌어와 발전기와 행성 전체 경제의 흐름을 방해한다는 것입니다."
 mem_food_constructor.3.desc.machine:0 "[Root.GetName]에서 진행 중인 상황에 대한 분석이 결론이 났습니다. 절망적입니다. 계속해서 증가하는 식량 생산량은 매립지에 버리거나 행성 밖으로 운반하려는 모든 시도를 넘어섰습니다. 행성은 두꺼운 회색 식량 분말 층으로 가득 찼습니다. 더 나쁜 것은 제조기가 지역 발전기에서 에너지를 끌어와 발전기와 행성 전체 경제의 흐름을 방해한다는 것입니다."
 mem_food_constructor.3.desc.hive:0 "[Root.GetName]의 상황이 실제로 심각해졌습니다. 계속해서 증가하는 식량 생산량은 매립지에 버리거나 행성 밖으로 운반하려는 모든 시도를 넘어섰습니다. 행성은 두꺼운 회색 식량 분말 층으로 가득 찼습니다. 더 나쁜 것은 제조기가 지역 발전기에서 에너지를 끌어와 발전기와 행성 전체 경제의 흐름을 방해한다는 것입니다."
 mem_food_constructor.3a:0 "이것은 재앙이다!"
 mem_food_constructor.3b:0 "과학이 뭘 한 거지?!"
 mem_food_constructor.3c:0 "외계 기술을 §R절대로§! 믿지 말았어야 했어!"
 mem_food_constructor.3d:0 "부비 트랩을 할 필요도 없었던 것 같은데."
 mem_food_constructor.3e:0 "틀림없어. 제작자들 입장에서 보면 비극적인 실수야."
 mem_food_constructor.3.tooltip:0 "§Y[Root.GetName]§!에서의 생활은 더 어려워집니다."
 mem_food_constructor.4.name:0 "식량 조류"
 mem_food_constructor.4.desc:0 "[Root.GetName]의 생활은 증가하는 식량 조류에 대한 끊임없는 경쟁으로 바뀌었고 사람들은 끝없이 증가하는 식량 제조기의 생산량을 피하고자 계속 새로운 높은 곳으로 이동해야 합니다. 행성 산업 대부분은 행성을 덮고 있는 미세한 회색 분말에 목이 멨습니다."
 mem_food_constructor.4.desc.machine:0 "[Root.GetName]의 일과는 증가하는 식량 조류에 대한 끊임없는 경쟁으로 바뀌었고 작업 유닛들은 끝없이 증가하는 식량 제조기의 생산량을 피하고자 계속 새로운 높은 곳으로 이동해야 합니다. 행성 산업 대부분은 행성을 덮고 있는 미세한 회색 분말에 목이 멨습니다."
 mem_food_constructor.4a:0 "제발 멈춰!"
 mem_food_constructor.4.machine:0 "용납할 수 없어."
 mem_food_constructor.4.tooltip:0 "§Y[Root.GetName]§!의 거의 모든 사회 기능이 완전히 마비되었습니다."
 mem_food_constructor.5.name:0 "리산 열쇠 단서 찾기"
 mem_food_constructor.5.desc:0 "우리의 장거리 센서는 우리가 소유하고 있는 것과 유사한 작업 식량 제조기의 에너지 신호와 비슷한 희미한 에너지 신호를 포착했습니다. 누구든 그것을 보낸 사람은 오래전에 사라졌을지 모르지만, 찾아내기 힘든 §Y리산 열쇠§!를 찾는 데 도움이 될 수 있는 단서가 남아 있을 수 있습니다."
 mem_food_constructor.5a:0 "최대한 빨리 조사하도록!"
 mem_food_constructor_poi1:0 "식량 제조기 신호"
 mem_food_constructor_poi1_desc:0 "우리가 최근에 포착한 에너지 신호는 이 성계에서 보내졌습니다. 아마도 식량 제조기의 제작자를 찾을 수 있을 것입니다. 아니면 최소한 단서라도..."
 mem_food_constructor.6.name:0 "현장 도착"
 mem_food_constructor.6.desc:0 "에너지 흔적은 §Y[From.GetName]§!성계로 이어졌습니다. 작동하는 식량 제조기의 매우 희미한 에너지 신호는 성계의 행성 중 하나 근처에 집중된 것 같습니다."
 mem_food_constructor.6a:0 "확인하는게 좋겠다."
 MEM_FOOD_CONSTRUCTOR_CRASHSITE:0 "행성 조사"
 MEM_FOOD_CONSTRUCTOR_CRASHSITE_DESC:0 "희미한 에너지 신호는 식량 제조기가 한 때 근처에서 작동했음을 나타냅니다. 우리는 그것을 끄는 방법에 대한 중요한 단서를 찾을 수 있습니다."
 mem_food_constructor.7.name:0 "거의 다 왔어."
 mem_food_constructor.7.desc:0 "고대 에너지 흔적을 따라 우리는 결국 적막한 세계에 추락한 거대한 화물선을 발견했습니다. 선원들은 여전히 선체에 용접된 건설기를 별로 끌어들이려 했으나, 비행 중 건설기에 의해 시스템의 에너지가 고갈되었습니다. 죽은 배는 한동안 방향 없이 떠다니다가 이 행성의 중력에 잡혀 결국 표면에 추락했습니다.\n\n우리가 죽은 비행 컴퓨터에서 추출한 소량의 데이터에 따르면, 원래 임무는 건설기를 소유한 은둔 외계 연구원이 이를 비활성화할 수 있기를 바라며 소행성 기지로 전달하는 것이었습니다. 우리는 그 기지의 좌표를 복사했습니다."
 mem_food_constructor.7a:0 "아직 기회가 있을지도 몰라."
 mem_food_constructor_poi2:0 "은둔한 과학자"
 mem_food_constructor_poi2_desc:0 "우리가 발견한 우주선은 은둔한 과학자를 만나러 가는 중이었습니다. 우리는 그를 방문해야합니다."
 mem_food_constructor.8.name:0 "고독한 성계"
 mem_food_constructor.8.desc:0 "우리는 식량 제조기를 연구하는 과학자들의 연구실이 한때 운영되었던 좌표에 도착했습니다. 비행 경로가 정확하다면 그의 기지는 큰 소행성 안에 있어야 합니다."
 mem_food_constructor.8a:0 "그를 찾아가 보자."
 MEM_FOOD_CONSTRUCTOR_RECLUSE:0 "소행성 기지 조사"
 MEM_FOOD_CONSTRUCTOR_RECLUSE_DESC:0 "식량 제조기를 연구하는 과학자는 한때 소행성 기지에서 작업을 하고 있었습니다. 그가 어떤 단서를 남겼는지 살펴봐야 합니다."
 mem_food_constructor.9.name:0 "소행성 기지"
 mem_food_constructor.9.desc:0 "우리 과학자들은 연구소와 거주지를 수용하기 위해 비어 있는 소행성을 성공적으로 발견했습니다. 그 시스템은 이전의 우주선처럼 에너지가 고갈되어 있으며, 내부는 오래된 음식 먼지로 가득 차 있습니다. \n\n소형 드릴을 사용하여, 우리의 과학 팀은 시설의 중심부를 성공적으로 파고들어 역전된 소행성의 이전 소유자를 발견했습니다. 그의 유해는 먼지 속에서 잘 보존되어 있었습니다. 그들은 그의 디지털 보조 장치에서 일부 데이터를 추출하는 데 성공했습니다. 그는 음식 제작기 중 하나를 정지시키기 위한 실험을 진행하고 있었던 것으로 보이며, 갑작스러운 생산 급증이 격리 장치를 뚫고 그를 질식시켰습니다. \n\n그는 제작기를 끌 수는 없었지만, 제작자의 작업 위치를 추론한 것으로 보입니다."
 mem_food_constructor.9.desc.machine:0 "우리의 연구 유닛은 어떤 연구소와 거주지를 수용하기 위해 비어 있는 소행성을 성공적으로 발견했습니다. 그 시스템은 이전의 우주선처럼 에너지가 고갈되어 있으며, 내부는 오래된 음식 먼지로 가득 차 있습니다. \n\n전문 드릴 유닛이 시설의 핵심으로 성공적으로 진입하여, 그곳의 이전 소유자를 발견했습니다. 그의 유해는 먼지 속에서 잘 보존되어 있었습니다. 그들은 그의 디지털 보조 장치에서 일부 데이터를 추출하는 데 성공했습니다. 그가 음식 생성기 중 하나를 정지시키기 위한 방법을 찾기 위해 실험하고 있었던 것으로 보이며, 갑작스러운 생산 급증이 격리 장치를 뚫고 그를 질식시켰습니다. \n\n비록 그가 생성기를 끌 수는 없었지만, 그는 생성기 설계자들이 활동했던 위치를 추론한 것으로 보입니다."
 mem_food_constructor.9.desc.hive:0 "우리의 연구 드론이 어떤 연구소와 거주지를 수용하기 위해 비어 있는 소행성을 성공적으로 발견했습니다. 그 시스템은 이전의 우주선처럼 에너지가 고갈되어 있으며, 내부는 오래된 음식 먼지로 가득 차 있습니다. \n\n우리 과학팀은 소형 드릴을 사용하여 시설의 중심부를 성공적으로 파고들어, 그 연구소의 이전 소유자를 발견했습니다. 그의 유해는 먼지 속에서 잘 보존되어 있었습니다. 그들은 그의 디지털 보조 장치에서 일부 데이터를 추출하는 데 성공했습니다. 그는 생산량의 갑작스러운 급증으로 인해 격리구역이 파괴되고 질식당할 때, 음식 제작기 중 하나를 정지시키기 위한 실험을 하고 있었던 것으로 보입니다. \n\n비록 그가 제작기를 끌 수는 없었지만, 그는 제작기의 설계자들이 활동했던 위치를 추론한 것으로 보입니다."
 mem_food_constructor.9a:0 "리산 열쇠는 거의 우리 손 안에 있다!"
 mem_food_constructor_poi3:0 "리산 기업"
 mem_food_constructor_poi3_desc:0 "찾기 힘든 리산 기업은 한때 이 성계에서 영업했습니다. 그들은 여전히 ​​거기에 있을 수도 있습니다."
 mem_food_constructor.10.name:0 "리산 기업"
 mem_food_constructor.10.desc:0 "우리는 고인이 된 연구원이 식별한 시스템에 도착했습니다. 거대한 링 월드가 시스템을 가로지르고 있지만, 심각하게 파손되어 있습니다. 강력한 기술 문명이 분명히 한때 이곳에서 번영했지만, 이곳은 더 이상 작동하는 상태가 아닙니다. 그럼에도 불구하고 심각하게 파손된 링 월드의 한 구역은 온전한 것으로 보입니다. \n\n우리가 §Y리산 열쇠§!를 어디에서 찾을 수 있다면, 그곳일 것입니다. \n\n하지만 모든 것이 차갑고 죽어 있는 것은 아닙니다. 우리는 시스템에서 강력한 자동화된 함대가 탐지되고 있습니다. 그들이 우리에게 신호를 보내고 있습니다."
 mem_food_constructor.11.desc:0 "우리는 고인이 된 연구원이 식별한 시스템에 도착했습니다. 거대한 링 월드가 시스템을 가로지르고 있지만, 심각하게 손상되어 있습니다. 강력한 기술 문명이 분명히 한때 이곳에서 번영했지만, 이곳은 더 이상 작동하는 상태가 아닙니다. 그럼에도 불구하고 심각하게 손상된 링 월드의 한 구역은 온전한 것으로 보입니다. \n\n우리가 §Y리산 열쇠§!를 어디에서 찾을 수 있다면, 그곳일 것입니다."
 mem_food_constructor.11a:0 "훌륭해. 진행하라."
 mem_food_constructor.12.name:0 "리산 기업에 오신 것을 환영합니다!"
 mem_food_constructor.12.desc:0 "고객 지원 센터를 방문해 주셔서 감사합니다. 안타깝게도 현재 인증된 서비스가 제공되지 않으므로, 관리자가 다른 세계에서 도착할 때까지 거리를 유지해 주시기 바랍니다. 시설에 접근하지 마십시오. 그렇지 않으면 파괴될 것입니다.\n\n이 자동 메시지는 §MReesan Matter Constructors and Deconstructors§!에 의해 제공되었습니다. \nReesan Matter Constructors and Deconstructors: 과거는 끔찍했습니다. 그래서 우리는 미래를 발명했습니다."
 mem_food_constructor.12a:0 "관리자가 도착하는데 얼마나 걸리나?"
 mem_food_constructor.12a.response:0 "현재 §RINTEGER_OVERFLOW§!년 동안 서비스가 일시 중단되었으며 이는 평소보다 약간 더 깁니다. 죄송합니다. 하지만 장담컨데 관리자가 곧 도착할 것입니다. 그 동안 제가 좀 더 편안하게 기다릴 수 있게 할 수 있는지 알려주세요.\n\n이러한 상황이 발생하면 일반적으로 우리 고유의 전통 조리법으로 만든 특별한 쿠키를 고객님께 제공합니다. 안타깝게도 지금은 §RPETRIFIED_DUST§!만 제공할 수 있습니다. 좀 드셔보시겠어요?"
 mem_food_constructor.12b:0 "서비스가 중단된 이유가 뭐죠?"
 mem_food_constructor.12b.response:0 "죄송하지만, 이 정보를 공개할 수 없어요. 우리 관리자가 도착하면 그중 한 명에게 물어보세요."
 mem_food_constructor.12c:0 "리산 열쇠를 가지고 있나?"
 mem_food_constructor.12c.response:0 "물론이죠. 저희 제품 중 하나를 구입한 후 처음 100년 동안 리산 열쇠를 잘못 배치했거나 손상된 경우 무료 교체를 받을 수 있어요. 관리자 중 한 명에게 고객님의 성함과 구매 증명서를 제공하면 곧 교체품을 받게 될거에요.\n\n무료 교체품을 이미 받으셨다면 교체 비용에 대한 최신 정보는 당사 관리자에게 문의하세요."
 mem_food_constructor.12d:0 "이 문제를 평화롭게 해결할 방법이 필요해."
 mem_food_constructor.12d.response:0 "있어요. 관리자를 기다리기만 하면 가능한 한 폭력적인 언쟁을 최소화하면서 필요한 지원을 받을 수 있습니다."
 mem_food_constructor.12e:0 "비켜! 우리가 강제로 지나가기전에."
 mem_food_constructor.12e.response:0 "당신이 삶에 지치고 자살을 고려하고 있다는 것이 안타깝습니다. 다시 생각해 보도록 설득할 방법이 있을까요?"
 mem_food_constructor.12f:0 "안녕히."
 mem_food_constructor.12f.response:0 "네 다시 오세요!"
 MEM_FOOD_CONSTRUCTOR_REESAN:0 "리산 기업 조사"
 MEM_FOOD_CONSTRUCTOR_REESAN_DESC:0 "거대한 링 월드의 폐허 속에서, 한 구역이 여전히 온전합니다. 아마도 그곳을 뒤지면 리산 키를 찾을 수 있을 것입니다."
 mem_food_constructor.13.name:0 "리산 열쇠 위치"
 mem_food_constructor.13.desc:0 "우리 과학 팀은 링 월드의 수많은 창고를 조사했습니다. 우리의 이해를 훨씬 초월하는 많은 장치들 중에서 우리는 의심할 여지 없이 리산 키로 가득 찬 거대한 창고를 발견했습니다. 우리 과학 팀은 하나를 회수하는 데 아무런 문제도 없었다고 보고했습니다. 나머지 기이한 리산 장치들은 앞으로 수년간 귀중한 통찰력을 제공할 것입니다."
 mem_food_constructor.13.desc.machine:0 "우리의 연구 유닛은 링 월드의 수많은 창고를 조사했습니다. 우리의 분류를 초월하는 많은 장치들 중에서, 그들은 96% 확률로 식별 가능한 거대한 창고를 발견했습니다. 회수 과정에서 복잡한 문제는 없었습니다. 나머지 기이한 리산 장치들은 앞으로 수년간 귀중한 통찰을 제공할 것입니다."
 mem_food_constructor.13.desc.hive:0 "우리 드론은 링 월드의 수많은 창고를 조사했습니다. 우리의 이해를 초월하는 많은 장치들 중에서, 우리는 의심할 여지 없이 리산 키로 가득 찬 거대한 창고를 발견했습니다. 회수 과정에서 복잡한 문제는 없었습니다. 나머지 기이한 리산 장치들은 앞으로 수년간 귀중한 통찰력을 제공할 것입니다."
 mem_food_constructor.13a.tooltip:0 "이제 결정 §Y$decision_mem_food_constructor_shut_down$§!을(를) 사용할 수 있습니다."
 mem_food_constructor.13b:0 "이제 모든 식량 제조기를 쉽게 종료할 수 있습니다."
 mem_food_constructor.13b.tooltip:0 "식량 제조기를 다시 제어할 수 있다면 결정 §Y$decision_mem_food_constructor_shut_down$§을(를) 사용할 수 있습니다."
 mem_food_constructor.14.name:0 "식량 제조기 종료"
 mem_food_constructor.14.desc:0 "§Y[Root.GetName]§!의 시민들이 리산 키가 그들에게 전달되어 식량 생성기에 삽입되자 축하합니다. 회색의 영양가 있는 악몽은 마침내 끝났습니다. 장치가 꺼진 것처럼 보입니다."
 mem_food_constructor.14.desc.machine:0 "리산 열쇠가 [Root.GetName]에 전달되었고 식량 제조기에 삽입되었습니다. 장치가 종료되었으며 모든 에너지가 고갈된 것 같습니다."
 mem_food_constructor.14.desc.hive:0 "리산 키가 §Y[Root.GetName]§!에 전달되어 식량 생성기에 삽입되었습니다. 회색의 영양가 있는 악몽은 마침내 끝났습니다. 장치가 종료된 것으로 보입니다."
 mem_food_constructor.14a:0 "이제 완전히 다 끝났군!"
 mem_food_constructor.14.tooltip:0 "[Root.GetName]의 생활은 식량 제조기의 남은 혜택으로 정상으로 돌아갑니다."
 mem_food_constructor.15.name:0 "생태계 혁신"
 mem_food_constructor.15.desc:0 "놀라운 소식이 §Y[Root.GetName]§!에서 전해졌습니다. 행성을 덮고 있던 두꺼운 식량 먼지층이 행성의 생태계에 극적인 변화를 가져왔습니다. 풍부하고 쉽게 얻을 수 있는 에너지의 유입으로 행성의 생명체가 번창하였고, 생물 다양성이 급증하였습니다. 이 극적인 변화로 인해 행성은 공식적으로 가이아 행성으로 재분류되었습니다."
 mem_food_constructor.15.desc.machine:0 "§Y[Root.GetName]§!를 덮고 있던 두꺼운 식량 먼지 층이 행성의 생태계에 극적인 변화를 가져왔습니다. 쉽고 풍부한 에너지의 유입으로 행성의 생명체가 번창하였고 생물 다양성이 급증하였습니다. 이 극적인 변화로 인해 행성은 공식적으로 가이아 행성으로 재분류되었습니다."
 mem_food_constructor.15b:0 "영혼은 신비로운 방식으로 작용하지..."
 mem_food_constructor.15c:0 "수수께끼의 리산들에게 평생 고마워해야겠군."
 mem_food_constructor.15.machine:0 "행성 목록 갱신."
 MEM_FOOD_CONSTRUCTOR_LANCE:0 "억제 광선"
 MEM_FOOD_CONSTRUCTOR_MEDIUM_LASER:0 "중형 유화 광선"
 MEM_FOOD_CONSTRUCTOR_LARGE_LASER:0 "대형 유화 광선"
 MEM_FOOD_CONSTRUCTOR_DISRUPTOR:0 "소개 방출기"
 d_mem_food_constructor:0 "식량 제조기"
 d_mem_food_constructor_desc:0 "거대한 외계 기계가 수많은 먹을 수 있는 회색 먼지를 뿜어내고 있습니다."
 d_mem_food_constructor_dust_field:0 "분말층"
 d_mem_food_constructor_dust_field_desc:0 "행성의 전체 지역은 반화석화된 회색 분말의 두꺼운 층으로 덮여 있습니다."
 mem_food_constructor_need_resolve_quest_first:0 "§R이 먼지를 제거할 능력이 아직 없습니다.§!"
 d_mem_food_constructor_fertile_dust_fields:0 "비옥한 분말"
 d_mem_food_constructor_fertile_dust_fields_desc:0 "반 분해된 회색 분말은 휼륭한 비료를 만듭니다."
 job_mem_food_constructor_dust_gatherer:0 "분말 채집가"
 job_mem_food_constructor_dust_gatherer_plural:0 "분말 채집가들"
 job_mem_food_constructor_dust_gatherer_desc:0 "농사를 위한 더 간단하고 쉬운 대안. 삽과 양동이로 같은 결과를 얻을 수 있는데 누가 농작물 순환과 수확 달력이 필요할까요?"
 job_mem_food_constructor_dust_gatherer_effect_desc:0 "£job_mem_dust_gatherer£ $job_mem_food_constructor_dust_gatherer_plural$은(는) £food£ §Y$food$§!를 생산합니다. 그들의 생산량은 식량 제조기의 생산량과 함께 증가합니다."
 mod_job_mem_food_constructor_dust_gatherer_add:0 "$job_mem_food_constructor_dust_gatherer$ 직업"
 mod_job_mem_food_constructor_dust_gatherer_per_pop:0 "$VALUE$ POP마다 §G+1§! $job_mem_food_constructor_dust_gatherer$ 직업"
 mod_job_mem_food_constructor_dust_gatherer_per_pop_short:0 "\n$VALUE$ £pop£마다 §G+1§! £job_mem_dust_gatherer£"
 job_mem_food_constructor_dust_gatherer_gestalt:0 "분말 채집 드론"
 job_mem_food_constructor_dust_gatherer_gestalt_plural:0 "분말 채집 드론들"
 job_mem_food_constructor_dust_gatherer_gestalt_desc:0 "농사를 위한 더 간단하고 쉬운 대안. 삽과 양동이로 같은 결과를 얻을 수 있는데 누가 농작물 순환과 수확 달력이 필요할까요?"
 job_mem_food_constructor_dust_gatherer_gestalt_effect_desc:0 "£job_mem_dust_gatherer£ $job_mem_food_constructor_dust_gatherer_plural$은(는) £food£ §Y$food$§!를 생산합니다. 그들의 생산량은 식량 제조기의 생산량과 함께 증가합니다."
 mod_job_mem_food_constructor_dust_gatherer_gestalt_add:0 "$job_mem_food_constructor_dust_gatherer_gestalt$ 직업"
