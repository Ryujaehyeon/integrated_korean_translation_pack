 r_mem_wpdr_production_matrix:0 "UTA 제조 장치"
 r_mem_wpdr_production_matrix_desc:0 "UTA 리그 인도미터블 발러에서 회수된 이 구성 요소는 §Y유니버설 트랜스포트 얼라이언스§!가 조기 멸망하기 전에 사용했던 이동식 무기 플랫폼의 신속한 생산을 담당합니다."
 mem_wpdr_production_matrix_tooltip:0 "랜덤 무기가 장비된 기동 무기 플랫폼 8개를 수도에 배치합니다.(§Y$ENERGY_LANCE_1$§!, §Y$MASS_ACCELERATOR_1$§!, §Y$ARC_EMITTER_1$§!)"
 MEM_WPDR_BOARD_WRECK:0 "불굴의 용기 승선"
 MEM_WPDR_BOARD_WRECK_DESC:0 "거대한 함선이 §Y[capital_ship.Solar_System.GetName]§!성계에서 작동을 멈추었습니다.\n\n함선의 비밀을 밝혀내기 위해 팀을 하나 파견했습니다."
 mem_wpdr.3.name:0 "불굴의 용기 기능 정지"
 mem_wpdr.3.desc:0 "우리가 §Y[From.Solar_System.GetName]§! 시스템에서 전투 중 §SIndomitable Valor§!에 가한 상당한 피해로 인해 해당 함선이 무력화되었습니다.\n\n우리는 §YScience Vessel§!를 파견하여 함선을 점거하고 그 독특한 기술과 역사에 대해 더 알아볼 수 있습니다."
 mem_wpdr.3.a:0 "그리하도록"
 mem_wpdr.4.name:0 "불굴의 용기"
 mem_wpdr.4.desc:0 "§Y[Leader.GetName]§!는 [capital_ship.Solar_System.GetName]에서 발견된 거대한 전함인 §SIndomitable Valor§!의 내부를 성공적으로 탑승하고 연구했다고 보고합니다.\n\n데이터 코어에 따르면, 이 배는 수천 년 전 어떤 종류의 은하 정치 위기 이후에 결성된 조직인 §SUniversal Transport Alliance§!에 의해 건조되고 운영되었습니다. 당시 존재했던 많은 강대국들이 붕괴되었고, 무역로는 보호받지 못한 채 증가하는 해적의 위협에 취약해졌습니다. 그러던 중 이 비정부 조직이 개입하게 되었습니다. 동맹은 §YMobile Weapon Deployment Rigs§!로 알려진 여러 대형 자본 함선을 운영하였으며, 이들은 해적 선박을 효과적으로 추적하고 장거리 무기로 교전할 수 있는 소형 자동화 선박을 제조했습니다.\n\n한동안 동맹은 정부 및 민간 후원자들로부터 관대하게 재정 지원을 받아 해적을 저지할 뿐만 아니라 자체 인프라에 대규모 투자를 할 수 있었습니다. 그러나 해적의 위협이 줄어들고 동맹의 힘이 커지면서, 다양한 세력들이 UTA의 지배에 불만을 품고 그 해체를 요구하게 되었습니다.\n\n대부분의 장교들은 결국 고향 제국으로 이탈하였고, 이탈하지 않은 이들은 추적당했습니다. §SIndomitable Valor§!는 동맹 본부를 방어하기 위해 남아 있던 마지막 리그였으나 결국 퇴각해야 했습니다. 적들은 그 배의 능력을 알고 단독 선박을 추적하지 않기로 결정한 것처럼 보이며, 시간이 지나면서 승무원들은 서서히 이탈하여 자동 방어 모드로 남겨졌습니다.\n\n현재 이 배는 수리 불가능할 정도로 손상되었습니다. 그러나 우리는 새로운 플랫폼을 생성하는 제조 매트릭스를 추출할 수 있었습니다."
 mem_wpdr.4.a:0 "우리의 고향 행성까지 끌고 와라."
 mem_wpdr.5.name:0 "불굴의 용기 전투 그룹"
 mem_wpdr.5.desc:0 "우리는 §Y[From.GetName]§! 시스템에 배치된 함선 그룹을 발견하였으며, 그 중에는 거대한 선박이 있습니다. 스캔 결과 이 선박의 광범위한 함선 건조 능력이 드러났으며, 함선과 항성 기지의 경계가 모호해졌습니다.\n\n자동 송신기 신호는 이 선박을 §SIndomitable Valor§!로 식별하며, 이 선박과 그 호위함들은 §SIndomitable Battlegroup§!을 형성하고 있습니다. 그 의도는 적대적인 것으로 보입니다."
 mem_wpdr.5.a:0 "거대하군!"
