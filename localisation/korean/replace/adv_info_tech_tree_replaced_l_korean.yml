 tech_maulers_desc:0 "생명공학의 혁신 덕분에 군사적 용도로 사용 가능한 우주 항해 및 FTL 기능을 갖춘 우주선의 성장에 성공했습니다.$tech_maulers_adv_info_tech_tree$"
 tech_mauler_growth_1_desc:0 "정제된 배양 과정은 성숙 시간을 단축하고 유기 스타쉽의 구조적 무결성을 향상시킵니다. 향상된 영양 공급 시스템과 유전자 조정은 선박이 빠르고 탄력적임을 보장합니다.$tech_mauler_growth_1_adv_info_tech_tree$"
 tech_weavers_desc:0 "초기 생명공학의 기초 위에 세워진 위버는 민첩성과 향상된 전투 능력을 균형 있게 조화시키도록 제작되었습니다.$tech_weavers_adv_info_tech_tree$"
 tech_weaver_growth_1_desc:0 "이 시설들은 성장 주기를 가속화하고 선박의 적응력을 향상시키기 위해 향상된 생명 공학 기술을 사용합니다. 개선된 유전 매트릭스와 최적화된 환경은 이러한 생물학적 선박이 내구성이 뛰어나고 전투에서 매우 반응성이 뛰어나도록 보장합니다.$tech_weaver_growth_1_adv_info_tech_tree$"
 tech_harbingers_desc:0 "하르빙거는 생물 공학 전쟁에서 중요한 도약을 나타내며, 강력한 화력과 생명 기술의 회복력을 결합합니다. 이 함선들은 함대의 중추 역할을 합니다.$tech_harbingers_adv_info_tech_tree$"
 tech_harbinger_growth_1_desc:0 "정제된 시설은 성장 속도를 높이고 구조적 무결성을 강화하기 위해 정교한 생명 공학 기술을 사용합니다. 그 결과로 생성된 선박은 향상된 내구성과 증가된 전투 효율성을 갖추게 됩니다.$tech_harbinger_growth_1_adv_info_tech_tree$"
 tech_stingers_desc:0 "스팅어는 고가치 목표에 치명적인 타격을 가하도록 설계되었습니다. 적 방어의 약점을 이용하는 데 뛰어납니다.$tech_stingers_adv_info_tech_tree$"
 tech_stinger_growth_1_desc:0 "정제된 시설은 성장 주기를 가속화하고 생물 공학적 정밀도를 향상시켜, 뛰어난 기동성과 정확성을 가진 함선을 만들어냅니다. 이러한 향상은 스팅어를 전술적 전투에서 파괴적인 힘으로 만듭니다.$tech_stinger_growth_1_adv_info_tech_tree$"
 tech_bio_hyper_drive_2_desc:0 "우리는 우주에서 선박이 하이퍼레인으로 "침입"하는 데 더 적은 에너지를 소모하는 지점을 확인했습니다. 이는 새로운 세대의 하이퍼 드라이브로 이어질 것입니다.$tech_bio_hyper_drive_2_adv_info_tech_tree$"
 tech_bio_hyper_drive_3_desc:0 "하이퍼 드라이브의 새로운 세대로, 서브스페이스 슬립스트림에 접근할 수 있습니다. 이는 드라이브 성능을 극적으로 향상시킵니다.$tech_bio_hyper_drive_3_adv_info_tech_tree$"
