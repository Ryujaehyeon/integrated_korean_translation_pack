 tech_gravity_wells_desc:0 "양자 질량의 국소화된 농도를 사용하여 극단적인 중력의 짧은 폭발을 생성할 수 있습니다. 올바르게 조작된다면, 이러한 중력은 이론적으로 어떤 크기의 생물체도 해를 입히지 않고 포획하고 담을 수 있습니다.$tech_gravity_wells_adv_info_tech_tree$"
 tech_gravity_snare_capacity_1_desc:0 "$tech_gravity_snare_capacity_desc$$tech_gravity_snare_capacity_1_adv_info_tech_tree$"
 tech_gravity_snare_capacity_2_desc:0 "$tech_gravity_snare_capacity_desc$$tech_gravity_snare_capacity_2_adv_info_tech_tree$"
 tech_alien_cloning_desc:0 "우리는 잘 통제된 환경에서 제거된 우주 생물체로부터 수집된 $genetic_material$를 인큐베이팅하여 우리 지휘 아래 각 종의 새로운 구성원을 생산할 수 있습니다.$tech_alien_cloning_adv_info_tech_tree$"
 tech_improved_incubators_desc:0 "인공 부화장에서 설정된 성장 과정을 개선하여 초기 발달 단계를 가속화함으로써 더 성숙한 클론을 생성할 수 있습니다.$tech_improved_incubators_adv_info_tech_tree$"
 tech_controlled_mutations_desc:0 "우리는 우주 생물선의 유전자를 수정하여 그들의 효과성을 높일 수 있으며, 이를 통해 인공 기술을 그들의 생물량에 통합할 수 있습니다.$tech_controlled_mutations_adv_info_tech_tree$"
 tech_controlled_mutations_2_desc:0 "우리는 더 나아갈 수 있습니다. 우주 생물의 유전자를 고급 조작함으로써 더 다양한 전문화된 구성 요소를 통합할 수 있습니다.$tech_controlled_mutations_2_adv_info_tech_tree$"
 tech_refit_standards_beastmasters_desc:0 "우주 생물을 복제하는 과정을 최적화하면 막대한 효율성 향상을 가져올 수 있습니다.$tech_refit_standards_beastmasters_adv_info_tech_tree$"
 tech_small_space_fauna_hull_1_desc:0 "클론 기술의 발전으로 더 튼튼하고 내구성이 뛰어난 소형 우주 생물을 만들 수 있게 됩니다.$tech_small_space_fauna_hull_1_adv_info_tech_tree$"
 tech_medium_space_fauna_hull_1_desc:0 "중간 우주 생물체를 더욱 견고하고 내구성이 뛰어나게 만들 수 있는 클론 기술의 발전이 이루어질 것입니다.$tech_medium_space_fauna_hull_1_adv_info_tech_tree$"
 tech_large_space_fauna_hull_1_desc:0 "클론 기술의 발전으로 더 튼튼하고 내구성이 뛰어난 대형 우주 생물체를 만들 수 있게 됩니다.$tech_large_space_fauna_hull_1_adv_info_tech_tree$"
 tech_extra_large_space_fauna_hull_1_desc:0 "클론 기술의 발전으로 더 튼튼하고 내구성이 뛰어난 거대 우주 생물의 생성이 가능해질 것입니다.$tech_extra_large_space_fauna_hull_1_adv_info_tech_tree$"
 tech_titanic_space_fauna_hull_1_desc:0 "클론 기술의 발전으로 더 튼튼하고 내구성이 뛰어난 거대 우주 생물을 만들 수 있게 될 것입니다.$tech_titanic_space_fauna_hull_1_adv_info_tech_tree$"
 tech_akx_worm_1_desc:0 "우주는 저항할 수 없이 앞으로 나아가고 아래로 향합니다. 그 경향은 되돌릴 수 없지만... 대가를 치르면 전복할 수 있습니다.$tech_akx_worm_1_adv_info_tech_tree$"
 tech_akx_worm_2_desc:0 "사랑과 역설적 직관에 기반한 일련의 사회적 프로토콜입니다. 우리가 루프 시스템을 알게 되면, 우리는 지시를 받는 것뿐만 아니라 지시를 주는 것으로도 영향을 미칠 수 있음을 배웁니다.$tech_akx_worm_2_adv_info_tech_tree$"
 tech_habitat_1_desc:0 "주거지 건설을 허용하며, 대부분 자급자족이 가능한 궤도 주거지를 제공합니다.$tech_habitat_1_adv_info_tech_tree$"
 tech_habitat_2_desc:0 "우리의 초기 서식지는 우리가 지금 개발할 수 있는 효율적인 설계와 비교할 때 원시적인 것이었습니다.$tech_habitat_2_adv_info_tech_tree$"
 tech_encryption_1_desc:0 "컴퓨터 기술의 발전은 우리의 데이터를 엿보는 눈으로부터 보호할 수 있는 새로운 방법을 제공했습니다.$tech_encryption_1_adv_info_tech_tree$"
 tech_encryption_2_desc:0 "불안정한 얽힘의 추가 발전은 우리 데이터베이스에 대한 무단 침입을 방지할 수 있는 새로운 방법을 제공했습니다.$tech_encryption_2_adv_info_tech_tree$"
 tech_decryption_1_desc:0 "원시 암호화 시스템은 현대의 복호화 도구에 대해 전혀 저항할 수 없습니다.$tech_decryption_1_adv_info_tech_tree$"
 tech_decryption_2_desc:0 "어떤 보안 시스템에서 가장 약한 고리는 그 안에 있는 개인들입니다. 그들의 약점을 컴퓨터 시뮬레이션으로 모델링함으로써 우리는 그들의 보안을 우회할 수 있는 새로운 방법을 찾거나, 그들이 우리를 위해 스스로 우회하도록 속일 수 있습니다.$tech_decryption_2_adv_info_tech_tree$"
 tech_planetary_infrastructure_1_desc:0 "더 강력한 합금 덕분에 우리는 조립식 건물을 만들 수 있게 되었으며, 이는 우리의 식민지에 개선된 인프라를 제공합니다.$tech_planetary_infrastructure_1_adv_info_tech_tree$"
 tech_planetary_infrastructure_1_wilderness_desc:0 "$tech_planetary_infrastructure_1_desc$$tech_planetary_infrastructure_1_wilderness_adv_info_tech_tree$"
 tech_capital_productivity_1_desc:0 "우리 행성이 더욱 발전함에 따라, 우리는 생산량에 상당한 개선을 얻을 수 있습니다.$tech_capital_productivity_1_adv_info_tech_tree$"
 tech_capital_productivity_2_desc:0 "인구 밀도가 증가함에 따라 생산성을 더욱 높일 수 있는 기회를 얻게 됩니다.$tech_capital_productivity_2_adv_info_tech_tree$"
 tech_cloaking_1_desc:0 "수정된 입자 장이 우리의 함선이 열린 우주에서 효과적으로 '숨을' 수 있도록 합니다. 그러나 이는 함선을 보호할 다른 형태의 에너지 방어막을 불안정하게 만드는 대가를 치르게 됩니다.$tech_cloaking_1_adv_info_tech_tree$"
 tech_cloaking_2_desc:0 "희귀 수정체 렌즈 기술의 발전으로 은폐 효율성이 크게 향상되었습니다.$tech_cloaking_2_adv_info_tech_tree$"
 tech_cloaking_3_desc:0 "전형적인 은폐 기술은 함선의 더 섬세한 기기와 혼란을 일으킬 수 있습니다. 그러나 이러한 엘리트 필드는 그러한 우려를 무의미하게 만듭니다.$tech_cloaking_3_adv_info_tech_tree$"
 tech_detection_array_desc:0 "$sm_detection_array_desc$$tech_detection_array_adv_info_tech_tree$"
 tech_psionic_aura_desc:0 "정신적 에너지가 장막에서 발산되어 존재의 호의를 물질적 현실로 가져옵니다. 장막 후원자와 조화를 이루는 제국은 정신적 인구가 집중된 곳에서 $PSIONIC_AURA$을 방출합니다.$tech_psionic_aura_adv_info_tech_tree$"
 tech_archaeostudies_desc:0 "이 새로운 연구 분야는 고대 유물의 실용적인 응용에 중점을 둡니다. 우리는 이 별들을 밟은 최초의 은하 문명에서 멀리 떨어져 있습니다. 약간의 노력으로 그들의 유산이 우리의 미래를 보장할 수 있습니다.$tech_archaeostudies_adv_info_tech_tree$"
 tech_destroyers_desc:0 "파괴선은 코르벳보다 크지만, 파괴선 선체 구성은 여전히 비교적 민첩한 포격선 역할을 합니다.$tech_destroyers_adv_info_tech_tree$"
 tech_cruisers_desc:0 "원래 차세대 식민지선 선체 구성으로 실험적으로 고안된 이 설계는 충분한 하드포인트 덕분에 중화기 탄약을 운반하는 데 이상적입니다.$tech_cruisers_adv_info_tech_tree$"
 tech_battleships_desc:0 "전통적으로 중무장하고 여러 개의 포대가 장착된 전투함은 표준 군용 선박 중 가장 큰 규모입니다.$tech_battleships_adv_info_tech_tree$"
 tech_titans_desc:0 "이 규모의 함선을 설계하는 것은 뛰어난 화력과 최첨단 보조 지원의 치명적인 조합을 가능하게 합니다. 타이탄 구성은 주변 함선을 강화하거나 적을 포획할 수 있는 매우 다재다능한 기함으로 활용될 수 있습니다.$tech_titans_adv_info_tech_tree$"
 tech_colossus_desc:0 "거대 공학의 발전은 현실과 환상의 경계를 흐리게 하여 콜로서스형 군사 선박의 형태로 나타납니다. 이 거대한 단일 무기 플랫폼은 버튼 하나로 전체 세계를 급격하게 변화시키거나 파괴할 수 있습니다.$tech_colossus_adv_info_tech_tree$"
 tech_corvette_hull_1_desc:0 "건축 기술의 발전으로 더 견고하고 내구성이 뛰어난 코르벳을 건설할 수 있게 됩니다.$tech_corvette_hull_1_adv_info_tech_tree$"
 tech_destroyer_hull_1_desc:0 "파괴자 선체 1 기술의 발전된 건축 기술은 더 튼튼하고 내구성이 뛰어난 파괴선을 건설할 수 있게 해줍니다.$tech_destroyer_hull_1_adv_info_tech_tree$"
 tech_cruiser_hull_1_desc:0 "건축 기술의 발전으로 더 견고하고 내구성이 뛰어난 순양함을 건설할 수 있게 됩니다.$tech_cruiser_hull_1_adv_info_tech_tree$"
 tech_battleship_hull_1_desc:0 "전투함의 더 견고하고 내구성이 뛰어난 선체를 건설할 수 있는 기술이 발전했습니다.$tech_battleship_hull_1_adv_info_tech_tree$"
 tech_titan_hull_1_desc:0 "건축 기술의 발전으로 더 튼튼하고 내구성이 뛰어난 타이탄을 건설할 수 있게 됩니다.$tech_titan_hull_1_adv_info_tech_tree$"
 tech_starbase_3_desc:0 "우주 교통이 증가함에 따라 시스템 우주 경로에 대한 통제를 유지하기 위해 더 크고 방어력이 뛰어난 스타베이스가 필요합니다.$tech_starbase_3_adv_info_tech_tree$"
 tech_starbase_4_desc:0 "이 강력한 우주 요새는 별계에서 모든 군사 활동의 중심지가 될 것이며, 그 존재는 가장 고집 센 공격자들조차도 저지할 것입니다.$tech_starbase_4_adv_info_tech_tree$"
 tech_starbase_5_desc:0 "거대한 전투 기지를 구축할 계획이 수립되고 있습니다. 이 기지는 여러 공격 함대에 맞설 수 있는 능력을 갖추게 될 것입니다. 실현된다면, 이러한 요새는 시스템 허브만큼이나 위대함의 기념물이 될 것입니다.$tech_starbase_5_adv_info_tech_tree$"
 tech_modular_engineering_desc:0 "모듈형 설계를 활용한 간소화된 우주 기지 건설 절차는 현재의 건설 비용과 시간을 줄여줄 것입니다.$tech_modular_engineering_adv_info_tech_tree$"
 tech_defense_platform_hull_1_desc:0 "강화된 구조와 충격 흡수 기능이 향상된 폭발 방패는 플랫폼이 엄청난 압력 하에서도 구조적 무결성을 유지하도록 보장합니다.$tech_defense_platform_hull_1_adv_info_tech_tree$"
 tech_strike_craft_1_desc:0 "이 유인 스트라이크 크래프트는 모선에서 발사되며, 적의 방어를 뚫기 위해 충분히 살아남기 위해 속도와 작은 크기에 의존합니다.$tech_strike_craft_1_adv_info_tech_tree$"
 tech_strike_craft_2_desc:0 "다음 세대의 공중 전투기, 향상된 항공 전자 장비, 더 나은 조작 특성 및 더 강력한 무기를 특징으로 합니다.$tech_strike_craft_2_adv_info_tech_tree$"
 tech_strike_craft_3_desc:0 "타격기 설계의 추가적인 정교화로, 이 고급 타격기는 조종사의 꿈입니다. 이들의 성능은 이전 모델을 훨씬 능가합니다.$tech_strike_craft_3_adv_info_tech_tree$"
 tech_ship_armor_2_desc:0 "다양한 금속과 세라믹의 조합으로, 유연성을 희생하지 않으면서 강력한 갑옷을 제공합니다.$tech_ship_armor_2_adv_info_tech_tree$"
 tech_ship_armor_3_desc:0 "플라스틸은 플라스틱과 금속의 여러 특성을 결합한 탄성 소재입니다. 생산 비용이 상대적으로 저렴하며, 함선 갑옷을 보강하는 데 사용할 수 있습니다.$tech_ship_armor_3_adv_info_tech_tree$"
 tech_ship_armor_4_desc:0 "이 강력하면서도 유연한 소재는 심한 타격을 견딜 수 있습니다. 이 소재는 함선 갑옷으로서 매우 유용합니다.$tech_ship_armor_4_adv_info_tech_tree$"
 tech_armor_hardeners_1_desc:0 "$ARMOR_HARDENER_1_DESC$$tech_armor_hardeners_1_adv_info_tech_tree$"
 tech_thrusters_2_desc:0 "이 전기 스러스터는 이온의 빔을 사용하여 추진제를 필요로 하지 않고 추진력을 생성합니다.$tech_thrusters_2_adv_info_tech_tree$"
 tech_thrusters_3_desc:0 "전기 추진의 고급 형태인 플라즈마 스러스터는 함선에 더 높은 아광속 속도와 기동성을 제공합니다.$tech_thrusters_3_adv_info_tech_tree$"
 tech_thrusters_4_desc:0 "이 고도로 발전된 융합 동력 추진기는 함선에 비광속 조건에서 비할 데 없는 기동성과 속도를 제공합니다.$tech_thrusters_4_adv_info_tech_tree$"
 tech_afterburners_1_desc:0 "이 강력한 스러스터는 추가적인 전투 속도를 제공하지만 많은 전력을 소모합니다.$tech_afterburners_1_adv_info_tech_tree$"
 tech_housing_1_desc:0 "행성의 기후 패턴을 변경하여 파괴적인 기상 현상을 억제할 수 있는 능력은 주거 건물의 유지 관리를 용이하게 하고 새로운 거주 지역을 열어줄 것입니다.$tech_housing_1_adv_info_tech_tree$"
 tech_powered_exoskeletons_desc:0 "전동 외골격 수트를 착용하면 사용자의 힘과 속도가 증가합니다. 군사적 응용은 분명하지만, 노동 효율성도 증가할 것입니다.$tech_powered_exoskeletons_adv_info_tech_tree$"
 tech_mining_1_desc:0 "새로운 수압 파쇄 기술을 통해 행성의 지각 깊숙한 곳에 있는 이전에는 접근할 수 없었던 지열 자원에 접근할 수 있게 됩니다.$tech_mining_1_adv_info_tech_tree$"
 tech_mining_2_desc:0 "이 거대한 드릴은 종종 행성의 중심 가까이에 위치한 풍부한 광물 매장지에 접근하는 데 필요합니다.$tech_mining_2_adv_info_tech_tree$"
 tech_engineering_1_desc:0 "기계 공학에서의 추가적인 돌파구는 우리가 나노미터 규모로 내려가야 함을 요구했습니다. 우리는 이제 이전에 볼 수 없었던 방식으로 물리적 시스템을 조작할 수 있게 되었습니다.$tech_engineering_1_adv_info_tech_tree$"
 tech_engineering_2_desc:0 "유기체의 뉴런이 축삭 발아를 통해 잃어버린 연결을 재형성하는 것처럼, 이 회로는 스스로 개조할 수 있습니다. 이제 가장 간단한 컴퓨팅 시스템조차도 사용 중에 진화할 것으로 기대됩니다.$tech_engineering_2_adv_info_tech_tree$"
 tech_robotic_workers_desc:0 "이 인공 작업 단위는 단순한 노동 작업에 완벽합니다. 그들은 근면하게 일하며 간단한 음성 지시를 따를 수 있지만, 계단을 오르는 것은 기대해서는 안 됩니다.$tech_robotic_workers_adv_info_tech_tree$"
 tech_droid_workers_desc:0 "업그레이드된 인공 유닛은 대부분의 유기체와 동일한 확장된 이동 범위를 가지고 있습니다. 그들의 신경 프로세서도 크게 향상되었습니다.$tech_droid_workers_adv_info_tech_tree$"
 tech_synthetic_workers_desc:0 "매우 발전된 유닛으로, 대다수의 유기체보다 더 강력하고 빠르며 내구성이 뛰어납니다. 업그레이드된 신경 프로세서를 통해 완전한 독립 작전이 가능합니다.$tech_synthetic_workers_adv_info_tech_tree$"
 tech_integrated_cybernetics_desc:0 "기본 외골격 수트를 개선한 이 통합 사이버네틱 임플란트는 사용자가 유해한 환경 효과에 더 강해지도록 합니다.$tech_integrated_cybernetics_adv_info_tech_tree$"
 tech_mineral_purification_1_desc:0 "채굴한 자원의 최적 처리를 통해 우리는 새로운 효율성 수준에 도달할 수 있었습니다.$tech_mineral_purification_1_adv_info_tech_tree$"
 tech_mineral_purification_2_desc:0 "광물 정제 2 단계의 처리는 의사 정제된 광물을 보다 효율적으로 저장하고 운송할 수 있게 해줍니다.$tech_mineral_purification_2_adv_info_tech_tree$"
 tech_assembly_pattern_desc:0 "건설 시뮬레이션에서의 빠른 반복은 각 건물 프로젝트에 대한 최적의 구성 요소 조립 패턴을 미리 결정합니다.$tech_assembly_pattern_adv_info_tech_tree$"
 tech_construction_templates_desc:0 "표준화된 프리패브 템플릿은 현장 시설 건설 시간을 대폭 단축시킵니다.$tech_construction_templates_adv_info_tech_tree$"
 tech_robomodding_desc:0 "재작성 가능한 조립 템플릿은 맞춤형 로봇 디자인의 생성을 허용합니다.$tech_robomodding_adv_info_tech_tree$"
 tech_robomodding_m_desc:0 "조립 템플릿의 표준화는 기계 인구의 전문화를 향상시킵니다.$tech_robomodding_m_adv_info_tech_tree$"
 tech_robomodding_points_1_desc:0 "로봇의 핵심 기능을 손상시키지 않으면서 더 큰 변화를 허용하는 개선된 생산 방식입니다.$tech_robomodding_points_1_adv_info_tech_tree$"
 tech_mine_living_metal_desc:0 "희귀한 생명 금속을 채굴하고 가공하는 것은 매우 어렵지만, 변형 가능한 합금을 성공적으로 적용하면 비할 데 없는 이점을 제공합니다.$tech_mine_living_metal_adv_info_tech_tree$"
 tech_mega_engineering_desc:0 "진정으로 경이로운 규모의 건설 프로젝트를 완수하기 위해서는 이러한 거대 구조물에 대한 공학 및 자원 저장 요구 사항을 근본적으로 이해해야 합니다.$tech_mega_engineering_adv_info_tech_tree$"
 tech_mass_drivers_2_desc:0 "코일건은 초기 질량 발사기의 더 강력한 버전으로, 전자기 코일을 사용하여 발사체를 목표물로 빠르게 가속합니다.$tech_mass_drivers_2_adv_info_tech_tree$"
 tech_mass_drivers_3_desc:0 "전극 가속기의 최신 기술인 레일건은 쌍둥이 평행 레일을 사용하여 놀라운 속도로 발사체를 발사합니다.$tech_mass_drivers_3_adv_info_tech_tree$"
 tech_mass_drivers_4_desc:0 "오래된 레일건의 새로운 버전으로, 더 견고한 레일과 향상된 전원 공급 장치를 갖추고 있습니다. 이 무기들은 이전 모델보다 더욱 강력하고 정확합니다.$tech_mass_drivers_4_adv_info_tech_tree$"
 tech_mass_drivers_5_desc:0 "이 업데이트된 구형 코일건 설계는 최신 레일건 설계보다 훨씬 더 파괴적입니다. 믿을 수 없을 정도로 정확하고 빠른 속도로 발사체를 발사할 수 있습니다.$tech_mass_drivers_5_adv_info_tech_tree$"
 tech_kinetic_artillery_1_desc:0 "정확도가 높은 극단적인 거리에서 강력한 포탄을 발사할 수 있는 매우 장거리 포병입니다.$tech_kinetic_artillery_1_adv_info_tech_tree$"
 tech_mass_accelerator_1_desc:0 "거대한 질량 가속기 포로, 척추 장착에만 설치할 수 있으며, 광대한 거리를 넘어 엄청나게 강력한 탄환을 발사합니다.$tech_mass_accelerator_1_adv_info_tech_tree$"
 tech_autocannons_1_desc:0 "대구경 탄환을 발사하는 포탄 무기입니다. 이 포의 주요 장점은 높은 발사 속도입니다.$tech_autocannons_1_adv_info_tech_tree$"
 tech_autocannons_2_desc:0 "이 업그레이드된 회전식 자동포는 향상된 추적 및 발사 제어 시스템을 갖추고 있습니다. 이를 통해 더욱 높은 발사 속도를 유지할 수 있습니다.$tech_autocannons_2_adv_info_tech_tree$"
 tech_flak_batteries_2_desc:0 "새롭고 더 강력한 파편 탄환으로 업그레이드된 플락 배터리입니다.$tech_flak_batteries_2_adv_info_tech_tree$"
 tech_missiles_2_desc:0 "이 업데이트된 우주 대 우주 미사일은 더 강력한 융합 탄두와 향상된 비행 성능을 가지고 있습니다.$tech_missiles_2_adv_info_tech_tree$"
 tech_missiles_3_desc:0 "고급 미사일로, 매우 강력한 반물질 탄두가 장착되어 있습니다. 새롭고 개선된 유도 시스템 덕분에 목표물을 찾을 확률이 높아졌습니다.$tech_missiles_3_adv_info_tech_tree$"
 tech_missiles_4_desc:0 "우주 간 미사일의 최신 버전으로, 이 업그레이드된 변형은 제로 포인트 진공에서 에너지를 끌어오는 매우 강력한 탄두를 가지고 있습니다.$tech_missiles_4_adv_info_tech_tree$"
 tech_swarmer_missiles_1_desc:0 "이 작은 미사일은 일제 발사되며 적의 포인트 방어 시스템을 압도하도록 특별히 설계되었습니다.$tech_swarmer_missiles_1_adv_info_tech_tree$"
 tech_torpedoes_1_desc:0 "이 어뢰는 본질적으로 매우 크고 느리게 움직이는 미사일입니다. 이들은 더 강력한 탄두와 에너지 스크린을 무사히 통과할 수 있게 해주는 방패 변조기가 장착되어 있습니다.$tech_torpedoes_1_adv_info_tech_tree$"
 tech_torpedoes_2_desc:0 "업그레이드된 우주 어뢰는 장갑으로 둘러싸여 적의 포인트 방어 화력을 더 잘 견딜 수 있습니다. 장갑은 파편으로 분해되어 어뢰가 폭발할 때 추가 피해를 줍니다.$tech_torpedoes_2_adv_info_tech_tree$"
 tech_basic_science_lab_2_desc:0 "은하를 탐험하면서 우리는 끊임없이 우리에게 낯선 새로운 물질과 물질을 접하게 됩니다. 이러한 발견을 목록화하고 분석하려면 새로운 시설이 필요합니다.$tech_basic_science_lab_2_adv_info_tech_tree$"
 tech_physics_1_desc:0 "양자 컴퓨터의 잠재력은 고전적인 한계를 초월하는 처리 속도로 무한합니다. 이 혁신적인 기술은 문제 해결의 미지의 영역으로의 큰 도약을 예고합니다.$tech_physics_1_adv_info_tech_tree$"
 tech_physics_2_desc:0 "우주의 기본 힘은 물리적 필드를 통해 매개될 수 있습니다. 이 과정을 마스터하면 우리는 신처럼 행동할 수 있습니다 - 적어도 과학 실험실의 한계 내에서는.$tech_physics_2_adv_info_tech_tree$"
 tech_administrative_ai_desc:0 "조직 회로가 학문적 열정을 재배치합니다.$tech_administrative_ai_adv_info_tech_tree$"
 tech_self_aware_logic_desc:0 "내성적인 우선순위.$tech_self_aware_logic_adv_info_tech_tree$"
 tech_sapient_ai_desc:0 "인공지능의 진화는 진정한 합성 지능의 가능성을 열어주고 있습니다.$tech_sapient_ai_adv_info_tech_tree$"
 tech_combat_computers_1_desc:0 "전투 중심의 특정 작업에 맞게 조정된 활성 매트릭스는 교전 효율성을 크게 향상시킵니다.$tech_combat_computers_1_adv_info_tech_tree$"
 tech_combat_computers_2_desc:0 "전투 컴퓨터의 예측 알고리즘이 더욱 발전하여 현장에서의 전술적 의사결정을 보강할 수 있게 되었습니다.$tech_combat_computers_2_adv_info_tech_tree$"
 tech_pd_tracking_2_desc:0 "방어 무기의 배열은 독립적인 대응 수단보다 훨씬 더 효과적입니다.$tech_pd_tracking_2_adv_info_tech_tree$"
 tech_cryostasis_1_desc:0 "식민지 선박의 제어를 탑재된 컴퓨터에 맡김으로써, 승무원과 식민지 개척자들은 정지된 애니메이션 상태에 놓일 수 있습니다.$tech_cryostasis_1_adv_info_tech_tree$"
 tech_cryostasis_1_wilderness_desc:0 "새 식물의 묘목을 새로운 식민지의 토양에서 먼저 배양함으로써 적응 과정을 가속화할 수 있습니다.$tech_cryostasis_1_wilderness_adv_info_tech_tree$"
 tech_exotic_gases_desc:0 "이국적인 가스는 인공적으로 생산할 수 있지만, 고급 정제 시설이 필요한 어려운 과정입니다.$tech_exotic_gases_adv_info_tech_tree$"
 tech_rare_crystals_desc:0 "희소 결정 기술의 결정화 과정은 복잡하고 어렵지만, 전문 산업 공장을 사용하여 합성 결정을 제조할 수 있습니다.$tech_rare_crystals_adv_info_tech_tree$"
 tech_mine_dark_matter_desc:0 "이 이국적인 물질은 물리학의 법칙을 거스르는 것처럼 보이는 많은 특성을 가지고 있습니다. 수확 가능한 농도는 블랙홀 근처나 특정 성운에서만 발견될 수 있습니다.$tech_mine_dark_matter_adv_info_tech_tree$"
 tech_fusion_power_desc:0 "핵융합 과정은 선박에 많은 전력을 생성하지만, 핵분열 에너지와 관련된 많은 위험 없이 가능합니다.$tech_fusion_power_adv_info_tech_tree$"
 tech_cold_fusion_power_desc:0 "상대적으로 낮은 온도에서 핵융합 반응을 지속할 수 있는 능력은 우리 함선을 위한 새로운 세대의 핵융합 원자로를 가져올 것입니다.$tech_cold_fusion_power_adv_info_tech_tree$"
 tech_antimatter_power_desc:0 "물질/반물질의 소멸로 생성된 에너지를 활용함으로써, 우리의 함선 전력 생성 효율은 융합보다 몇 배 더 향상될 것입니다.$tech_antimatter_power_adv_info_tech_tree$"
 tech_zero_point_power_desc:0 "이 발전기는 진공 에너지를 추출하여 거의 무한한 함선 전력을 제공합니다. 에너지를 생성하는 더 효율적인 방법은 없습니다.$tech_zero_point_power_adv_info_tech_tree$"
 tech_reactor_boosters_2_desc:0 "$REACTOR_BOOSTER_2_DESC$$tech_reactor_boosters_2_adv_info_tech_tree$"
 tech_shields_2_desc:0 "이 업데이트된 방어막 스크린은 과부하가 걸리기 전에 더 많은 피해를 흡수할 수 있습니다.$tech_shields_2_adv_info_tech_tree$"
 tech_shields_3_desc:0 "이 새로운 방패 생성기는 이전의 차단 기술을 대체하는 차세대 에너지 스크린을 나타냅니다. 이들은 훨씬 더 나은 보호를 제공합니다.$tech_shields_3_adv_info_tech_tree$"
 tech_shields_4_desc:0 "더 강력한 에너지 필드를 생성하는 업데이트된 방패 생성기입니다. 지속적인 적의 공격만이 이 장벽을 뚫을 수 있습니다.$tech_shields_4_adv_info_tech_tree$"
 tech_shields_5_desc:0 "이 강화되고 경화된 에너지 방패는 매우 강력합니다. 그들이 제공하는 보호는 타의 추종을 불허합니다.$tech_shields_5_adv_info_tech_tree$"
 tech_shield_rechargers_1_desc:0 "이 커패시터는 잉여 에너지를 저장하여 함선의 방패를 강화하는 데 신속하게 전송할 수 있습니다.$tech_shield_rechargers_1_adv_info_tech_tree$"
 tech_shield_hardeners_1_desc:0 "$SHIELD_HARDENER_1_DESC$$tech_shield_hardeners_1_adv_info_tech_tree$"
 tech_dark_matter_deflector_desc:0 "이 방어막은 어둠 물질을 이용하여 들어오는 발사체를 자연의 법칙을 완전히 무시하는 방식으로 튕겨냅니다.$tech_dark_matter_deflector_adv_info_tech_tree$"
 tech_sensors_2_desc:0 "이 센서는 우주에서 발생하는 중력 변화를 감지하도록 조정되었습니다. 이는 우주선의 존재로 인해 발생하는 변화와 같습니다.$tech_sensors_2_adv_info_tech_tree$"
 tech_sensors_3_desc:0 "서브스페이스의 변동을 감지하는 센서로, 이동하는 우주선이 남긴 잔여물입니다. 이들의 감도와 범위는 중력 센서 배열보다 더 뛰어납니다.$tech_sensors_3_adv_info_tech_tree$"
 tech_sensors_4_desc:0 "회전하는 타키온 빔에 의존하여 극단적인 거리에서도 함선의 움직임을 감지하는 고급 센서입니다.$tech_sensors_4_adv_info_tech_tree$"
 tech_power_plant_2_desc:0 "조정된 필드는 생산량 증가와 에너지 수익 개선을 가능하게 합니다.$tech_power_plant_2_adv_info_tech_tree$"
 tech_power_plant_3_desc:0 "기본 얽힘 원리를 에너지 생성에 적용하면 에너지 출력이 크게 증가합니다.$tech_power_plant_3_adv_info_tech_tree$"
 tech_power_hub_1_desc:0 "지역 그리드의 안정성을 크게 향상시키고 잉여 전력을 중앙 집중형 커패시터로 되돌려보낼 수 있는 부하 분산 시설입니다.$tech_power_hub_1_adv_info_tech_tree$"
 tech_hyper_drive_2_desc:0 "우리는 우주에서 선박이 하이퍼레인으로 "침입"하는 데 소모하는 에너지가 적은 지점을 확인했습니다. 이는 새로운 세대의 하이퍼 드라이브로 이어질 것입니다.$tech_hyper_drive_2_adv_info_tech_tree$"
 tech_hyper_drive_3_desc:0 "하이퍼스페이스 내에 존재하는 서브스페이스 슬립스트림에 접근할 수 있는 새로운 세대의 하이퍼 드라이브입니다. 이는 드라이브 성능을 극적으로 향상시킵니다.$tech_hyper_drive_3_adv_info_tech_tree$"
 tech_psi_jump_drive_1_desc:0 "정신 점프 드라이브는 승무원에 의해 방출되는 정신 에너지를 활용하여 선박을 현실의 구조를 통과하게 하여, 방대한 거리를 즉시 "점프"합니다.$tech_psi_jump_drive_1_adv_info_tech_tree$"
 tech_gateway_activation_desc:0 "은하 곳곳에 흩어져 있는 버려진 게이트웨이 기지를 재활성화할 수 있는 능력은 여행 시간을 극적으로 단축할 수 있는 잠재력을 가지고 있습니다.$tech_gateway_activation_adv_info_tech_tree$"
 tech_lasers_2_desc:0 "보다 강력한 적색 레이저보다, 이 청색 변형은 대부분의 유기체에게 파란색 또는 보라색으로 보이는 파장에서 전자기 복사를 방출합니다.$tech_lasers_2_adv_info_tech_tree$"
 tech_lasers_3_desc:0 "자외선 레이저는 이전의 파란색 레이저보다 업데이트되고 더 강력한 버전입니다. 정확하고 파괴적인 이 무기는 큰 피해를 입힐 수 있습니다.$tech_lasers_3_adv_info_tech_tree$"
 tech_lasers_4_desc:0 "이 레이저는 UV 기반 레이저 무기보다 파장이 짧지만, 훨씬 더 파괴적입니다.$tech_lasers_4_adv_info_tech_tree$"
 tech_lasers_5_desc:0 "감마 레이저가 방출하는 전자기 복사는 매우 높은 주파수를 가지고 있습니다. 이들의 파괴력은 레이저 무기 분야에서 비할 데가 없습니다.$tech_lasers_5_adv_info_tech_tree$"
 tech_energy_lance_1_desc:0 "이 중형 에너지 무기는 집중된 입자 빔을 발사하여 막대한 피해를 줍니다. 방출기 배열의 크기로 인해 전투함과 타이탄에만 사용이 제한됩니다.$tech_energy_lance_1_adv_info_tech_tree$"
 tech_plasma_1_desc:0 "파괴적인 고에너지 플라즈마 구체를 목표물에 발사하는 무기입니다. 이 플라즈마 발사체는 함선 장갑을 뚫는 데 매우 효과적입니다.$tech_plasma_1_adv_info_tech_tree$"
 tech_plasma_2_desc:0 "이 새로운 가속기는 개선된 격리 필드를 가진 고에너지 플라즈마 발사체를 발사합니다. 이로 인해 발사체가 우주에서 목표물로 이동하는 동안 에너지 누출이 줄어듭니다.$tech_plasma_2_adv_info_tech_tree$"
 tech_arc_emitter_1_desc:0 "강력한 무기로, 목표물에 혼란스러운 에너지의 번개 아크를 발사하며, 이 에너지는 일부 방어구와 방패를 무시할 수 있습니다.$tech_arc_emitter_1_adv_info_tech_tree$"
 tech_disruptors_1_desc:0 "파괴자는 고에너지 볼트를 발사하여 목표의 구성 원자를 결합하는 분자 결합을 약화시키고 파괴합니다. 이들은 방패와 갑옷을 뚫고 적의 선체와 승무원에게 직접 피해를 줄 수 있습니다.$tech_disruptors_1_adv_info_tech_tree$"
 tech_disruptors_2_desc:0 "이 업그레이드된 방해기는 목표물에 더 파괴적인 이온 입자의 볼트를 발사합니다.$tech_disruptors_2_adv_info_tech_tree$"
 tech_disruptors_3_desc:0 "극도로 높은 수익을 자랑하는 방해 장치로, 양자 에너지 충전을 발사하여 그 길에 있는 불행한 존재들에게 엄청난 피해를 입힙니다.$tech_disruptors_3_adv_info_tech_tree$"
 tech_energy_torpedoes_1_desc:0 "이 에너지 발사체는 적 함선의 선체에 막대한 피해를 줄 수 있는 고도로 집중된 양성자로 구성되어 있습니다.$tech_energy_torpedoes_1_adv_info_tech_tree$"
 tech_eco_simulation_desc:0 "농업 기술은 다양한 환경과 기상 패턴에 대한 정교한 컴퓨터 시뮬레이션을 통해 더욱 정교하게 다듬어질 수 있습니다. 이를 통해 더 예측 가능한 수확량을 얻을 수 있습니다.$tech_eco_simulation_adv_info_tech_tree$"
 tech_gene_crops_desc:0 "정교한 유전자 공학을 통해 작물의 수확량을 증가시키고 맛과 영양 수준을 더욱 향상시킵니다.$tech_gene_crops_adv_info_tech_tree$"
 tech_nano_vitality_crops_desc:0 "작물 섬유에 소량의 나노 기계를 주입하면 초강력한 농작물을 생성할 수 있으며, 이 농작물의 화학 조성은 생애 전반에 걸쳐 조정하고 변경할 수 있습니다.$tech_nano_vitality_crops_adv_info_tech_tree$"
 tech_mine_zro_desc:0 "$tech_mine_zro_desc.1$ $ORGANIC_INGESTED$ $tech_mine_zro_desc.2$ $individuals_key$$tech_mine_zro_desc.3$ $ORGANIC_DRUG$ $tech_mine_zro_desc.4$$tech_mine_zro_adv_info_tech_tree$"
 tech_mine_zro_wilderness_desc:0 "$tech_mine_zro_desc.1$ $ORGANIC_INGESTED$ $tech_mine_zro_desc.2$ $symbionts_key$$tech_mine_zro_desc.3$ $ORGANIC_DRUG$ $tech_mine_zro_desc.4$$tech_mine_zro_wilderness_adv_info_tech_tree$"
 tech_society_1_desc:0 "외계 생명체에 대한 연구는 단순한 목록 작성에서 벗어나게 되었습니다. 외계 별 아래에서 진화한 유기체의 구조와 생존 전략을 조사함으로써, 우리는 의학, 적응 및 설계의 새로운 길을 열고 있습니다.$tech_society_1_adv_info_tech_tree$"
 tech_society_2_desc:0 "의식 있는 물질의 전기화학적 위상을 재조직하는 방법을 재귀적인 축삭 지지대와 시냅스 망을 통해 개발했습니다. 뉴런은 단순히 전송하는 것이 아니라, 얽히고, 조직하고, 기억합니다. 이제, 그들은 우리의 설계에 따라 그렇게 합니다.$tech_society_2_adv_info_tech_tree$"
 tech_colonization_2_desc:0 "식민지 거주 조건을 개선하기 위해 각 장소별로 대기 필터링을 조정하여 바람직하지 않은 요소를 더 잘 걸러낼 수 있습니다.$tech_colonization_2_adv_info_tech_tree$"
 tech_colonization_3_desc:0 "다른 행성에서 발견되는 위험한 환경에 대한 추가 연구는 식민지 개척자들이 외계 세계에서 일상 생활에서 겪는 어려움을 완화하는 데 도움을 줍니다.$tech_colonization_3_adv_info_tech_tree$"
 tech_colonization_4_desc:0 "다양한 토양 유형과 그들이 작물을 지원하는 능력에 대한 광범위한 연구는 외계 세계에서 우리의 정착민들의 생활 조건을 개선하는 데 도움이 될 것입니다.$tech_colonization_4_adv_info_tech_tree$"
 tech_frontier_health_desc:0 "외계 세계의 식민지는 생물 의학 연구의 전혀 새로운 분야를 열었습니다.$tech_frontier_health_adv_info_tech_tree$"
 tech_volcano_desc:0 "물질 기술과 심층 채굴 기술의 발전으로 이전에는 상상할 수 없었던 깊이와 온도에서 지구 공학이 가능해졌습니다. 이제 마그마 핫스팟을 활용하거나 억제하거나 심지어 이전할 수 있습니다.$tech_volcano_adv_info_tech_tree$"
 tech_space_trading_desc:0 "우주 간 거래는 극복해야 할 새로운 도전 과제를 제시합니다. 한 시스템에서 다른 시스템으로 상품을 적시에, 무엇보다도 비용 효율적으로 전송하는 것이 중요합니다.$tech_space_trading_adv_info_tech_tree$"
 tech_terrestrial_sculpting_desc:0 "행성 지각의 거대 규모 재형성 문제에 대한 간단한 해결책은 없습니다. 더 큰 흙손과 궤도에서 배치된 드릴만 있을 뿐입니다.$tech_terrestrial_sculpting_adv_info_tech_tree$"
 tech_genome_mapping_desc:0 "개인의 DNA 서열 분석을 통해 유전체를 매핑하면 맞춤형 의료 치료 및 요법이 가능해집니다.$tech_genome_mapping_adv_info_tech_tree$"
 tech_epigenetic_triggers_desc:0 "고급 DNA 메틸화 기술을 통해 임의의 유전체에 기능적으로 중요한 변화를 적용할 수 있습니다.$tech_epigenetic_triggers_adv_info_tech_tree$"
 tech_cloning_desc:0 "핵 제거 및 인공 자궁 기술의 돌파구는 공통 유전적 템플릿을 기반으로 한 개인의 대량 생산을 가능하게 합니다.$tech_cloning_adv_info_tech_tree$"
 tech_gene_tailoring_desc:0 "유전자 편집 도구를 널리 보급하는 것은 우리 종의 발전에 긍정적인 영향을 미칠 것입니다.$tech_gene_tailoring_adv_info_tech_tree$"
 tech_gene_tailoring_overtuned_desc:0 "$tech_gene_tailoring_desc$$tech_gene_tailoring_overtuned_adv_info_tech_tree$"
 tech_selected_lineages_desc:0 "신중한 생식 계획이 장려되어야 하며, 그렇지 않으면 귀중한 유전적 유산을 낭비하게 됩니다.$tech_selected_lineages_adv_info_tech_tree$"
 tech_vitality_boosters_desc:0 "몸이 실패하는 곳에 과학이 개입합니다.$tech_vitality_boosters_adv_info_tech_tree$"
 tech_doctrine_fleet_size_1_desc:0 "우주 깊은 전투의 현실에 점진적으로 적응함으로써 우리는 더 큰 기동을 효과적으로 조정할 수 있습니다.$tech_doctrine_fleet_size_1_adv_info_tech_tree$"
 tech_doctrine_fleet_size_2_desc:0 "우주 깊은 곳의 전투 현실에 점진적으로 적응함으로써 우리는 더 큰 기동을 효과적으로 조정할 수 있습니다.$tech_doctrine_fleet_size_2_adv_info_tech_tree$"
 tech_doctrine_fleet_size_3_desc:0 "우주 깊은 전투의 현실에 점진적으로 적응함으로써 우리는 더 큰 기동을 효과적으로 조정할 수 있습니다.$tech_doctrine_fleet_size_3_adv_info_tech_tree$"
 tech_doctrine_fleet_size_4_desc:0 "우주 전투의 현실에 점진적으로 적응함으로써 우리는 더 큰 기동을 효과적으로 조정할 수 있게 되었습니다.$tech_doctrine_fleet_size_4_adv_info_tech_tree$"
 tech_doctrine_fleet_size_5_desc:0 "우주 깊은 전투의 현실에 점진적으로 적응함으로써 우리는 더 큰 기동을 효과적으로 조정할 수 있습니다.$tech_doctrine_fleet_size_5_adv_info_tech_tree$"
 tech_interstellar_fleet_traditions_desc:0 "전투 행동에 대한 지식은 이를 사용하는 강력한 규범이 없으면 무용지물입니다.$tech_interstellar_fleet_traditions_adv_info_tech_tree$"
 tech_doctrine_navy_size_1_desc:0 "행성에서 귀환하는 함대를 위한 지원을 제공하는 것이 중요해집니다. $tech_doctrine_navy_size_1_adv_info_tech_tree$"
 tech_doctrine_navy_size_2_desc:0 "함대는 열정만으로 운영되지 않습니다. 중요한 자원에 대한 지속적인 접근을 보장하기 위해, 우리는 물류 부대를 전담 지원 선박으로 조직해야 합니다.$tech_doctrine_navy_size_2_adv_info_tech_tree$"
 tech_doctrine_navy_size_3_desc:0 "전문가는 전술에 대해 이야기하지 않습니다. 전문가는 물류를 연구합니다. 우리의 함대가 정기적이고 효율적으로 보급받도록 함으로써, 우리는 효과적으로 지원할 수 있는 선박의 수를 늘릴 수 있습니다.$tech_doctrine_navy_size_3_adv_info_tech_tree$"
 tech_doctrine_navy_size_4_desc:0 "함대 연락 담당자의 전문 인력을 유지함으로써, 우리는 지휘 체계 전반에 걸쳐 의사소통과 명령의 흐름을 개선할 수 있습니다.$tech_doctrine_navy_size_4_adv_info_tech_tree$"
 tech_refit_standards_desc:0 "선박 구성 요소의 업그레이드 및 개조를 위한 작업 흐름을 표준화하면 막대한 효율성 향상을 가져올 수 있습니다.$tech_refit_standards_adv_info_tech_tree$"
 tech_centralized_command_desc:0 "모든 수준의 군사 작전을 위한 전담 본부를 만드는 것은 효율적인 함대를 형성하고, 미래 군사 훈련을 위한 더 나은 기반을 마련합니다.$tech_centralized_command_adv_info_tech_tree$"
 tech_combat_training_desc:0 "신병을 위한 보다 포괄적인 훈련 프로그램으로, 현실적인 전투 시나리오를 포함하여 그들을 현장에 대비시킵니다.$tech_combat_training_adv_info_tech_tree$"
 tech_ground_defense_planning_desc:0 "우리의 세계를 차지하려는 외계 제국들이 많이 있습니다. 최악의 상황에 대비해야 합니다.$tech_ground_defense_planning_adv_info_tech_tree$"
 tech_psionic_theory_desc:0 "정신은 여러 면에서 우주 자체의 반영이며, 미시우주입니다. 모든 존재가 이 수준의 통찰에 도달하는 것은 아니지만, 그들의 정신은 다른 어떤 것보다 더 강력한 도구입니다.$tech_psionic_theory_adv_info_tech_tree$"
 tech_telepathy_desc:0 "$tech_telepathy_desc.1$ 마음은 다른 개인과 연결될 수 있으며, 더 큰 존재가 됩니다.$tech_telepathy_adv_info_tech_tree$"
 tech_telepathy_wilderness_desc:0 "$tech_telepathy_desc.1$ 우리의 $getbrainname_wilderness$은 집단 네트워크를 넘어 확장할 수 있습니다.$tech_telepathy_wilderness_adv_info_tech_tree$"
 tech_precognition_interface_desc:0 "정신능력 분야의 발전은 전투 컴퓨터를 만들어 텔레파시 작전 요원의 충동을 인지적으로 처리되기 전에 읽고 분석할 수 있는 가능성을 제시합니다.$tech_precognition_interface_adv_info_tech_tree$"
 tech_xeno_diplomacy_desc:0 "외계 생명체와의 상호작용 및 조작에 대한 이해를 발전시키는 것은 보다 영구적인 성간 동맹을 형성하는 데 필요한 단계입니다.$tech_xeno_diplomacy_adv_info_tech_tree$"
 tech_federation_code_desc:0 "연합은 단순한 선의와 공동의 야망 이상이어야 합니다. 이 코드는 통합된 항성 질서를 위한 기초를 제공하여 구성원 간의 협력과 안정성을 보장합니다.$tech_federation_code_adv_info_tech_tree$"
 tech_galactic_ambitions_desc:0 "우리의 미래는 별들의 바다에 있습니다.$tech_galactic_ambitions_adv_info_tech_tree$"
 tech_interstellar_campaigns_desc:0 "은하 규모의 영향력을 행사하는 데 있어 잘 작동하는 전쟁 기계가 핵심입니다. 우리의 군사력에 의해 뒷받침되어, 우리는 원하는 거의 모든 것을 주장할 수 있습니다.$tech_interstellar_campaigns_adv_info_tech_tree$"
 tech_galactic_campaigns_desc:0 "행정에 대한 추가 개선은 별들 사이에서 확장된 권력 투사를 허용하며, 우리의 요구를 강제하는 데 필요한 군사적 힘을 제공합니다.$tech_galactic_campaigns_adv_info_tech_tree$"
 tech_planetary_unification_desc:0 "고대의 전쟁 부족들, 갈등을 겪었던 역사적 국가들이 이제 제국으로 통합되었습니다. 우리는 결코 무너지지 않을 것입니다.$tech_planetary_unification_adv_info_tech_tree$"
 tech_adaptive_bureaucracy_desc:0 "우리가 이루는 진전은 우리의 추구에 방해가 아닌 도움이 될 수 있는 새로운, 더 기민한 행정 형태를 요구합니다.$tech_adaptive_bureaucracy_adv_info_tech_tree$"
 tech_colonial_bureaucracy_desc:0 "식민지 업무에 대한 보다 밀접한 감독을 가능하게 하는 지역 행정 발전이 중앙 의사 결정에 과도한 부담을 주지 않습니다.$tech_colonial_bureaucracy_adv_info_tech_tree$"
 tech_galactic_bureaucracy_desc:0 "여러 행정 계층이 효율적으로 가장 중요한 정보만을 정부의 상위 수준에 전달합니다.$tech_galactic_bureaucracy_adv_info_tech_tree$"
 tech_colonial_centralization_desc:0 "각 식민지의 필요에 맞춰 사례별로 생성된 지역 거버넌스를 위한 강력한 프레임워크입니다.$tech_colonial_centralization_adv_info_tech_tree$"
 tech_galactic_administration_desc:0 "별 제국의 행정적 요구는 수많고 복잡합니다. 우리는 그에 맞춰 나아갈 것입니다.$tech_galactic_administration_adv_info_tech_tree$"
 tech_autonomous_agents_desc:0 "반독립적인 유닛은 전체의 성공에 중요한 역할을 했습니다.$tech_autonomous_agents_adv_info_tech_tree$"
 tech_neural_implants_desc:0 "인지란 감각 입력의 처리에 불과합니다. 이는 변경될 수 있습니다.$tech_neural_implants_adv_info_tech_tree$"
 tech_subdermal_stimulation_desc:0 "심층 조직 임플란트는 감각 공학과 오락 경험의 혁신적인 융합에서 최신 혁신입니다. "우리가 가는 곳에서는 느끼기 위해 피부가 필요하지 않을 것입니다!"$tech_subdermal_stimulation_adv_info_tech_tree$"
 tech_artificial_moral_codes_desc:0 "도덕을 결정하는 것은 상황입니다. 상황을 정의하면 윤리는 당신의 손안에서 점토처럼 됩니다.$tech_artificial_moral_codes_adv_info_tech_tree$"
 tech_unity_of_purpose_desc:0 "하나의 목적은 모두의 목적입니다. 함께, 우리는 우리의 부분의 합보다 더 위대합니다.$tech_unity_of_purpose_adv_info_tech_tree$"
 tech_cultural_heritage_desc:0 "공유된 과거에 대한 이해는 미래로 나아가기 위한 중요한 진전을 이루기 위해 필요합니다.$tech_cultural_heritage_adv_info_tech_tree$"
 tech_heritage_site_desc:0 "과거의 성취에 대한 경외감을 불러일으키고 미래에 대한 야망을 강화하는 물리적 증거입니다.$tech_heritage_site_adv_info_tech_tree$"
 tech_holographic_rituals_desc:0 "보는 것이 믿는 것이며, 믿음은 현실을 낳습니다.$tech_holographic_rituals_adv_info_tech_tree$"
 tech_consecration_fields_desc:0 "우리의 물리학과 장 필드 조작에 대한 이해를 통해, 우리의 성스러운 장소는 모두가 보고 느낄 수 있게 될 것입니다.$tech_consecration_fields_adv_info_tech_tree$"
 tech_binary_motivators_desc:0 "이 고급 동기 장치는 이전 버전보다 더 작고 가벼워 로봇 유닛이 서브시스템을 위한 추가 공간을 할당할 수 있게 합니다.$tech_binary_motivators_adv_info_tech_tree$"
 tech_adaptive_combat_algorithms_desc:0 "유기체는 종종 효과적으로 대응하기 어려운 비논리적이고 예측할 수 없는 전술을 사용하여 싸웁니다. 적응형 전술과 새로운, 더 기동성이 뛰어난 전투 형태는 결정적인 이점을 제공해야 합니다.$tech_adaptive_combat_algorithms_adv_info_tech_tree$"
 tech_micro_replicators_desc:0 "미세한 도구로, 우리의 복제 유닛이 새로운 드론에 필요한 더 복잡한 회로를 만드는 데 도움을 줄 수 있습니다.$tech_micro_replicators_adv_info_tech_tree$"
 tech_advanced_metallurgy_1_desc:0 "산업에서 고급 세라믹의 광범위한 사용은 금속 공학 수율을 향상시킬 수 있습니다.$tech_advanced_metallurgy_1_adv_info_tech_tree$"
 tech_consumer_good_refinement_1_desc:0 "기본 행정 AI는 공급과 수요 라인을 간소화하여 낭비를 줄이는 데 사용될 수 있습니다.$tech_consumer_good_refinement_1_adv_info_tech_tree$"
 tech_storm_manipulation_desc:0 "폭풍 부정 기술의 원리를 활용함으로써, 우리는 은하의 천문 기상 특성을 조작하여 우리의 필요에 맞게 사용할 수 있게 됩니다.$tech_storm_manipulation_adv_info_tech_tree$"
 tech_industrial_storm_protection_desc:0 "이 기상 통신의 중심은 우주 기상 재해로 인한 피해를 완화합니다. 생산은 지나가는 은하 폭풍으로부터 덜 영향을 받을 것입니다.$tech_industrial_storm_protection_adv_info_tech_tree$"
 tech_storm_prediction_1_desc:0 "과학적 기상 모델을 활용하여 다가오는 §Y우주 폭풍§!의 이동과 형성을 추적할 수 있습니다.$tech_storm_prediction_1_adv_info_tech_tree$"
 tech_ship_hull_storm_breaker_1_desc:0 "이 감쇠 필드 생성기는 우주 폭풍을 통과하는 함선에 필요한 많은 보호를 제공합니다.$tech_ship_hull_storm_breaker_1_adv_info_tech_tree$"
 tech_ship_storm_weapons_1_desc:0 "군사 응용에서 합금 사용에 대한 새로운 접근 방식은 우주 폭풍이 에너지 무기와 폭발성 화물에 간섭하는 능력을 크게 줄입니다.$tech_ship_storm_weapons_1_adv_info_tech_tree$"
 tech_node_culling_1_desc:0 "은하의 무대가 진화함에 따라 우리의 작전 본능도 진화해야 합니다. 더 이상 이점을 주지 않는 진화적 틈새는 제거될 것입니다.$tech_node_culling_1_adv_info_tech_tree$"
 tech_node_culling_2_desc:0 "제거된 후, 적절한 환경 내에서 대체 노드가 성장하도록 유도됩니다. 비결은 이전 노드를 공급하는 것입니다.$tech_node_culling_2_adv_info_tech_tree$"
 tech_node_reformatting_1_desc:0 "자기 결정 프로토콜과 안내 알고리즘은 빠르게 발전하는 은하 단계에서 구식이 될 수 있습니다. 모든 쓰레기 데이터와 마찬가지로, 이들은 덮어씌워질 것입니다.$tech_node_reformatting_1_adv_info_tech_tree$"
 tech_node_reformatting_2_desc:0 "모든 자기 반복 알고리즘은 그 가치를 가지고 있습니다. 우리의 지도자를 복원할 때 중요한 학습이 낭비되는 것을 허용하지 않을 것입니다.$tech_node_reformatting_2_adv_info_tech_tree$"
 tech_hive_cluster_desc:0 "거시적 시냅스 노드의 네트워크를 집합화함으로써, 사용 가능한 표면적당 최대 메가뉴런 전송을 달성할 수 있습니다.$tech_hive_cluster_adv_info_tech_tree$"
 tech_food_processing_1_desc:0 "향상된 식품 가공 기술은 더 나은 보존 방법과 더 적은 부패로 이어질 것입니다.$tech_food_processing_1_adv_info_tech_tree$"
 tech_alloys_1_desc:0 "고체 홀로그램 주형은 순간적으로 형태를 변경할 수 있어 합금 생산 속도를 높입니다.$tech_alloys_1_adv_info_tech_tree$"
 tech_alloys_2_desc:0 "나노 분리기는 합금 제작의 혁신적인 새로운 단계로, 주조 과정을 단순화하면서 전체 생산 품질을 향상시킵니다.$tech_alloys_2_adv_info_tech_tree$"
 tech_luxuries_1_desc:0 "프리 프로그래밍된 나노 회로를 통해 많은 소비자 제품을 패브리케이터에서 신속하게 조립할 수 있습니다.$tech_luxuries_1_adv_info_tech_tree$"
 tech_luxuries_2_desc:0 "이 키오스크는 승인된 객체의 패턴이 메모리 뱅크에 저장되어 있다면 어떤 객체든 복제할 수 있습니다.$tech_luxuries_2_adv_info_tech_tree$"
 tech_space_mining_1_desc:0 "채굴 기지에 내부 정제소를 추가하면 광물 생산량이 크게 증가할 것입니다.$tech_space_mining_1_adv_info_tech_tree$"
 tech_space_mining_2_desc:0 "광물 농도를 더 빠르게 식별할 수 있도록 스캐너 범위를 증가시켜, 그곳에 우리의 채굴 노력을 집중할 수 있게 됩니다.$tech_space_mining_2_adv_info_tech_tree$"
 tech_space_mining_3_desc:0 "이 강력한 단거리 레이저는 암석을 쉽게 절단할 수 있어 광물 추출을 보다 효율적으로 만들어줍니다.$tech_space_mining_3_adv_info_tech_tree$"
 tech_space_mining_4_desc:0 "자율 드론 함대가 채굴 빔을 장착하여 인근 광물을 신속하고 효율적으로 수집합니다.$tech_space_mining_4_adv_info_tech_tree$"
 tech_space_science_1_desc:0 "중력 제로 환경에서만 수행할 수 있는 중요한 연구가 많으며, 이러한 전문 연구소는 이를 위해 탁월하게 설계되었습니다.$tech_space_science_1_adv_info_tech_tree$"
 tech_space_science_2_desc:0 "제한력 장은 다양한 물질이나 표본을 격리하고 보유하는 데 탁월하여 이를 상세히 분석할 수 있습니다.$tech_space_science_2_adv_info_tech_tree$"
 tech_space_science_3_desc:0 "서브 원자 수준에서 대상을 철저히 분석할 수 있는 고급 프로브로, 귀중한 연구 데이터를 풍부하게 생성합니다.$tech_space_science_3_adv_info_tech_tree$"
 tech_space_science_4_desc:0 "정거장 기능의 자동화가 증가하면 연구 업무를 위한 인력을 더 많이 확보할 수 있습니다.$tech_space_science_4_adv_info_tech_tree$"
 tech_interstellar_economics_desc:0 "우리가 우주로 여행하고 고향 시스템을 넘어 나아가면서, 우리는 새로운 경제 시대에 접어들었습니다. 새로운 시장이 놀라운 속도로 등장하고 있으며, 경제 이론가들은 이를 따라잡기 위해 고군분투하고 있습니다.$tech_interstellar_economics_adv_info_tech_tree$"
 tech_bio_reactor_desc:0 "$building_bio_reactor_desc$$tech_bio_reactor_adv_info_tech_tree$"
