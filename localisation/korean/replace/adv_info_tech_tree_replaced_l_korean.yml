 tech_fe_administration_1_desc:0 "우리의 행정 요구 사항은 고급 기술에 대한 숙련도가 발전함에 따라 확장될 것입니다. 우리는 성장하는 제국의 요구에 능숙하게 대응해야 합니다.$tech_fe_administration_1_adv_info_tech_tree$"
