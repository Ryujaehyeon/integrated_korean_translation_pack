 tech_wilderness_cluster_desc:0 "우리는 공통의 집단적 사고의 유창성을 가속화할 수 있습니다. 그 목적은 바로 같은 의지를 촉진하는 공생체의 모임에 투자하는 것입니다.$tech_wilderness_cluster_adv_info_tech_tree$"
 tech_genome_mapping_wilderness_desc:0 "우리의 다양한 DNA 계통의 유전자 지도를 작성하는 것은 우리가 성장하는 방식을 이해하는 데 도움을 주고, 복잡한 요소를 제거하는 데 기여합니다.$tech_genome_mapping_wilderness_adv_info_tech_tree$"
 tech_mining_1_wilderness_desc:0 "점액 두께 증가제와 수압을 기존 광물 매장지에 적용하여 더 깊이 파고들고 수확량을 증가시킬 수 있습니다.$tech_mining_1_wilderness_adv_info_tech_tree$"
 tech_powered_exoskeletons_wilderness_desc:0 "전투용 외골격 슈트는 사용자의 힘과 속도를 증강시켜 명백한 군사적 응용을 제공하며, 수작업의 효율성도 증가시킵니다.$tech_powered_exoskeletons_wilderness_adv_info_tech_tree$"
