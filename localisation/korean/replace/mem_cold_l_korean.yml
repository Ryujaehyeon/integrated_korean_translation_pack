l_korean:
 mem_cold_dig_site:0 "달갑지 않은 위로"
 mem_cold_dig_site_desc:0 "§Y[From.Planet.GetName]§!의 표면은 매우 차가워, 시스템 내 위치에 기반한 예상보다 훨씬 더 차갑습니다. 현재 거주할 수는 없지만, [From.Planet.GetPlanetMoon]의 표면에는 산업 문명의 부패한 유적이 흩어져 있어, 상대적으로 최근에 매우 급격한 기후 변화가 있었음을 시사합니다."
 mem_cold.1.name:0 "죽은 행성"
 mem_cold.1.desc:0 "§Y[From.Planet.GetName]§! 표면에서의 고고학적 연구는 궤도에서의 초기 관측을 결정적으로 확인합니다 - 이 행성은 실제로 어느 시점에 지능을 가진 유기체 생명체, 즉 자신들을 §SHoreef§!라고 부르는 대형 포유류 종의 고향이었습니다. 그들의 기술 수준은 분명히 우주 비행 이전이었지만, 그들이 멸망할 당시 원주민들은 산업화와 급속한 기술 발전을 겪고 있었습니다. 이 과정은 제한된 에너지 공급으로 인해 다소 방해를 받았으며, 행성에는 충분한 양의 화석 연료나 핵분열 물질이 없었습니다.\n\n대량 파괴 무기에 접근할 수 있었음에도 불구하고, Horeef는 종말적인 전쟁에서 스스로를 파괴하지 않았으며, 내전이나 우주에서의 침략에 대한 어떤 징후도 없습니다. 그러나 이 행성에는 분명히 뭔가 잘못된 점이 있으며, 이는 건물, 다른 Horeef의 유해 및 토양에서의 비정상적인 부패 패턴과 불확실한 출처에서 나오는 이온화 방사선으로 입증됩니다.\n\n그들의 문명을 파괴한 것이 무엇인지 여전히 미스터리입니다 - 마치 행성의 모든 생명이 하룻밤 사이에 사라진 것 같습니다. 만약 그것이 무기였다면, 우리가 이전에 접한 적이 없는 것입니다."
 mem_cold.2.name:0 "붕괴 상태"
 mem_cold.2.desc:0 "§Y[Leader.GetName]§!와 [Leader.GetHerHis] 탐사가 호리프 문명의 유적을 탐험할수록, 그들은 더 많은 이상 현상을 마주하게 됩니다.\n\n이전에 감지된 방사선은 방사성 물질에 의한 오염에서 발생한 것이 아닙니다. 대신, 수백만 년의 반감기를 가진 안정 동위 원소들이 매우 증가된 속도로 붕괴되고 있으며, 이는 표준 방사선 장비로 감지될 수 있을 정도입니다. 복합 화합물들은 영하의 온도에서 발생할 것으로 예상되는 어떤 화학적 과정과도 일치하지 않는 방식으로 측정 가능한 속도로 분해되고 있습니다. 심지어 별이 빛나는 하늘도 [From.Planet.GetPlanetMoon]의 표면에서 관찰할 때 뭔가 더 어두워 보입니다.\n\n이러한 현상은 더 큰 육지 덩어리 중 하나의 한 지점에서 방사状으로 퍼지고 있습니다. 이는 그들의 원천일 가능성이 높습니다."
 mem_cold.3.name:0 "스카이 레이저 프로젝트"
 mem_cold.3.desc:0 "이상한 이상 현상의 기원 지점을 탐사하는 것은 §Y[From.Planet.GetName]§!에 치명적이고 무의미한 것으로 판명되었습니다. 해당 지역은 대부분 방사능이 있는 변동 모래로 변해버렸습니다. 그러나 그곳의 데이터는 원격 위치로 전송되어 백업되었으며, 그 중 일부는 여전히 사용 가능합니다.\n\n앞서 언급했듯이, 호리프는 문명을 유지하기 위해 에너지 부족에 시달렸고, 이를 해결하기 위해 §SSky Razor§!라는 코드명으로 프로젝트를 시작했습니다. 그들은 차원 균열을 열어 다른 우주에서 에너지를 흡수함으로써 무한한 에너지원의 발견을 희망했습니다.\n\n연구가 진행된 시설은 호리프 문명을 파괴한 재앙이 발생할 때까지 작동하며 보고서를 보냈지만, 그들이 성공하지 못한 것처럼 보입니다. 사실, §Y[Leader.GetName]§!에 따르면, 그들은 작동하는 프로토타입에 가까운 것도 아니었으며, 그들의 연구는 완전한 헛소리였습니다.\n\n이는 Sky Razor가 행성 파괴의 원인일 가능성이 매우 낮다는 것을 의미합니다. 그럼에도 불구하고 분명히 연결고리가 존재합니다."
 mem_cold.4.name:0 "행성의 구멍"
 mem_cold.4.desc:0 "이전 스카이 레이저 시설의 현장에서 수행된 추가 측정과 보고서에 대한 확대 연구는 §Y[Leader.GetName]§! 놀라운 결론에 도달하게 했습니다. 호리프가 그들의 파괴에 책임이 없다는 것입니다: 다른 누군가가 그랬습니다.\n\n스카이 레이저 연구원들은 어떤 종류의 균열을 열기에는 전혀 미치지 못했음이 분명하지만, 다른 우주 - 아마도 호리프의 대체 우주 버전 - 에서 누군가가 그랬던 것 같습니다. 그들의 스카이 레이저에 해당하는 것은 성공적이었고, 스카이 레이저 시설이 있던 바로 그 지점에서 균열을 만들어 우리의 우주에서 무한한 에너지를 끌어냈습니다. 초기 균열 개방은 지역 공간에서 대량의 에너지가 흡수되도록 했습니다. 이 에너지는 화학 및 핵 결합의 열과 에너지를 포함하여 물질이 찢어지게 했습니다. 이 효과는 스카이 레이저 현장에서 가장 파괴적이었지만, 다른 곳의 모든 생명체에 치명적이었으며, 특히 온도가 급격히 떨어질 때 더욱 그랬습니다.\n\n그 이후 에너지 흐름은 느려졌지만 여전히 지속적인 소모가 있으며, 균열은 계속해서 행성에서 에너지를 흡수하고 있습니다. 불행히도, 우리는 우리 쪽에서 균열을 붕괴시키거나 다른 쪽과 접촉할 방법이 없습니다 - 누군가 여전히 인위적으로 균열을 열어두고 있다고 가정하더라도, 그것이 자가 지속적인 runaway 과정이 아닐 경우입니다.\n\n반면, [From.Planet.GetPlanetMoon]의 표면을 피하기만 한다면 우리는 어떤 부정적인 영향을 경험하지 않을 것입니다. 소모 강도가 기하급수적으로 감소하기 때문입니다. 이 과정이 계속된다면, §Y[From.Planet.Solar_System.GetName]§! 시스템의 별의 생애 주기는 단지 몇 천 년 줄어들 것이며, 우주의 열적 죽음은 약 10년 더 빨리 올 것입니다. 걱정할 만한 일이 아닙니다."
 mem_cold.4.a:0 "골칫거리군."
 mem_cold_irradiated_trait:0 "노출된"
 mem_cold_irradiated_trait_desc:0 "이 지도자는 대량의 이질적인 방사선에 노출되었습니다. 현재까지 초능력은 나타나지 않았으나, 악성 신생물은 다수 발생할 것으로 예상됩니다."
