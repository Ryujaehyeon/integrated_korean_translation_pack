l_korean:
 tradition_est_academy:0 "학문"
 tradition_est_academy_desc:0 "우리 제국에는 아카데미와 학교, 대학교들이 퍼져있고, 정상에 오르고자 하는 이들은 복잡한 위계질서를 거쳐 정상을 향해 나아갑니다."
 tr_est_academy_adopt:0 "학문 전통"
 tr_est_academy_adopt_desc:0 "§Y연구 속도§!가 §G+15%§! 증가하는 연구 분야를 §Y2§!개 선택할 수 있습니다."
 tr_est_academy_1:0 "공교육"
 tr_est_academy_1_desc:0 "§Y지도자 후보자 수§!가 §Y3§! 증가합니다."
 tr_est_academy_1_delayed:0 "교육은 만인의 권리입니다. 공교육을 통해, 우리 시민들은 기초 지식을 쌓을 수 있습니다."
 tr_est_academy_2:0 "필수적인 고등 교육"
 tr_est_academy_2_desc:0 "모든 지도자의 §Y시작 레벨§!이 §Y1§! 증가합니다."
 tr_est_academy_2_delayed:0 "모든 시민들의 고등 교육을 의무화하면 우리의 지도자들은 자신의 역할을 더욱 능숙하게 수행할 수 있을 것입니다."
 tr_est_academy_3:0 "배우고, 잊고, 다시 배워라"
 tr_est_academy_3_delayed:0 "우리는 지식뿐만이 아니라 지식을 배우는 과정 그 자체 역시 중요하게 생각합니다. 진정한 지도자들은 성공 뿐만 아니라 실패에서도 많은 것을 배울 것입니다."
 tr_est_academy_4:0 "상아탑"
 tr_est_academy_4_delayed:0 "최첨단 연구는 전문가에게 맡기는 것이 최선입니다. 그들의 상아탑에서, 우리의 과학자들은 외부의 간섭 없이 자유로이 연구하고 실험하며 개발합니다."
 tr_est_academy_5:0 "사관학교"
 tr_est_academy_5_delayed:0 "오직 교육받은 군대만이 최대 효율로 작전을 수행할 수 있을 것입니다."
 tr_est_academy_5_levelup:0 "\n이 전통을 활성화하면, 모든 §Y지휘관§!의 기술 수준이 §G1§!만큼 §Y증가합니다§!. 또한, 모든 §Y지휘관§!은 다음의 특성 업그레이드에 접근할 수 있습니다:\n\n* §Y$leader_trait_restrained_3_est$§!\n* §Y$leader_trait_butcher_2_est$§!\n* §Y$leader_trait_iron_fist_3_est$§!"
 tr_est_academy_finish:0 "학문 전통 완료"
 tr_est_academy_finish_desc:0 "리더가 ['concept_academy_finisher_traits',$tr_est_academy_finish_certain_traits$]에서 더 높은 수준에 도달할 수 있습니다."
 tr_est_academy_finish_certain_traits:0 "특정 특성"
 tradition_est_aesthetics:0 "미학"
 tradition_est_aesthetics_desc:0 "아름다움은 느낄 수는 있지만 설명할 수는 없습니다. 아름다움이 없다면, 우리 존재는 무의미합니다."
 tr_est_aesthetics_adopt:0 "미학 전통"
 tr_est_aesthetics_adopt_desc:0 "§Y$MOD_POP_GOVERNMENT_ETHIC_ATTRACTION$§!은 £building£ §Y$building_autochthon_monument$§! 건물 체인이 있는 행성에서 §G+15%§! 증가합니다."
 tr_est_aesthetics_adopt_spiritualist:0 "미학 전통"
 tr_est_aesthetics_adopt_spiritualist_desc:0 "§Y$MOD_POP_GOVERNMENT_ETHIC_ATTRACTION$§!은 £building£ §Y$building_temple$§! 건물 체인이 있는 행성에서 §G+15%§! 증가합니다."
 tr_est_aesthetics_adopt_megacorp:0 "미학 전통"
 tr_est_aesthetics_adopt_megacorp_desc:0 "§Y$MOD_POP_GOVERNMENT_ETHIC_ATTRACTION$§! 행성이 £building£ §Y$building_corporate_monument$§! 건물 체인을 보유하고 있을 때 §G+15%§! 증가합니다."
 tr_est_aesthetics_1:0 "문학 작품"
 tr_est_aesthetics_1_delayed:0 "우리의 작가와 시인들의 작품은 수 천년 간 수십억의 영혼에게 깨달음을 줄 것입니다. 완성된 작품은 영원히 존재할 것이며, 하루하루 은하를 더 좋은 곳으로 만들어나갈 것입니다."
 tr_est_aesthetics_2:0 "예술가 길드"
 tr_est_aesthetics_2_delayed:0 "존경받는 예술가 길드에서는 정기적으로 대중을 위한 문화적이고 창의적인 이벤트를 개최하여 국민들에게 기쁨과 놀람을 선사합니다."
 tr_est_aesthetics_3:0 "경외심"
 tr_est_aesthetics_3_desc:0 "다른 제국의 £opinion£ §Y우호도§!가 §G+15§! 증가하며 §Y$MOD_ENVOY_IMPROVE_RELATIONS_MULT$§!이 §G+20%§! 증가합니다."
 tr_est_aesthetics_3_delayed:0 "우리 제국을 방문하는 외교관들은 일상이나 다름없는 고상한 예술 작품들을 보고 경이로워할 것이고, 지나다니는 모든 복도의 아름다움에 놀랄 것입니다. 그 후, 그들은 자신의 제국으로 돌아가 우리 문명의 아름다움에 대한 이야기를 전할 것입니다."
 tr_est_aesthetics_3_xenophobe:0 "전쟁의 기술"
 tr_est_aesthetics_3_xenophobe_desc:0 "우리의 £unity£ §Y$unity$§! 생산량은 전쟁 중일 때 §G+10%§! 증가합니다."
 tr_est_aesthetics_3_xenophobe_delayed:0 "우리의 제독과 장군은 전쟁술의 대가로서, 마치 조각가처럼 전장에서 자신의 재능을 펼칩니다."
 tr_est_aesthetics_3_IP:0 "완벽 추구"
 tr_est_aesthetics_3_IP_delayed:0 "우리는 다른 제국과의 사소한 다툼에는 관심이 없습니다. 고독의 평온함 속에서, 우리는 단 하나의 목표에 인생을 바칩니다. 예술적 아름다움을 위해서 말입니다."
 tr_est_aesthetics_4:0 "위엄있는 건축물"
 tr_est_aesthetics_4_delayed:0 "우리의 건축물은 위대한 유산이 될 것이며, 우리가 사라진 뒤에도 우리의 영광을 노래할 것입니다."
 tr_est_aesthetics_5:0 "은하의 불가사의"
 tr_est_aesthetics_5_desc:0 "§Y5§! 비싼 제국 고유의 경이로운 건물 건설이 가능해지며, 각 건물은 행성과 제국 전체에 §G보너스§!를 제공합니다. 경이로운 건물을 건설하려면 £building£ §Y$building_major_capital$§!이 필요합니다. 각 행성에서는 §C1§! 개의 경이로운 건물만 건설할 수 있습니다."
 tr_est_aesthetics_5_delayed:0 "우리 제국에는 은하계에서 가장 위대한 불가사의들이 존재합니다. 은하 반대편에 있는 이들마저도 그것들의 위대함을 알고 있습니다."
 tr_est_aesthetics_finish:0 "미학 전통 완료"
 tradition_est_administratum:0 "행정"
 tradition_est_administratum_desc:0 "사무원과 관료의 군단은 제국을 감독하고 지도자의 의지를 수행합니다."
 tr_est_administratum_adopt:0 "행정 전통"
 tr_est_administratum_1:0 "간소화된 채용 절차"
 tr_est_administratum_1_delayed:0 "적성검사와 질문서, 인터뷰를 표준화하여 지도자 채용의 간접비를 감소시킵니다."
 tr_est_administratum_2:0 "실력주의"
 tr_est_administratum_2_desc:0 "$official_with_icon$ 시작 기술 수준: §G+1§! \n또한 모든 §Y공직자§!는 추가 특성을 가지고 시작합니다."
 tr_est_administratum_2_delayed:0 "과거의 승진 결정은 정치와 음모, 사소한 다툼의 영향을 크게 받았습니다. 새로운 엄격한 가이드라인과 분산적 승진 결정 덕분에 더 이상 과거와 같은 일은 일어나지 않습니다."
 tr_est_administratum_3:0 "효율적인 관료제"
 tr_est_administratum_3_delayed:0 "제국이 커지면 관료제도 따라 비대해집니다. 새로운 방식이 도입됨으로써, 문서 업무와 관료적 소요 시간이 감소되어 프로젝트가 훨씬 더 빠르게 완료됩니다."
 tr_est_administratum_4:0 "행성 관리 표준화"
 tr_est_administratum_4_delayed:0 "우리 제국이 관리하는 행성의 수가 늘어남에 따라 지방 행정부가 제국으로부터 분리될 가능성이 있습니다. 행성 행정에 관련된 표준 지침을 제정함으로써 모든 행성을 비슷하게 통치할 수 있을 것입니다."
 tr_est_administratum_5:0 "감독국"
 tr_est_administratum_5_delayed:0 "감독국은 독립 기관으로, 그곳의 감독관들은 제국을 돌아다니며 지역 행정부의 정책과 실행을 사찰합니다. 감독관에게 주의를 받는 것은 야심찬 행정관에게 있어 악몽이나 다름 없습니다."
 tr_est_administratum_finish:0 "행정 전통 완료"
 tradition_est_archivist:0 "기록"
 tradition_est_archivist_desc:0 "기록되지 않은 사건을 기억하는 자가 없어진다면 이러한 사건은 일어나지 않은 것과 다르지 않습니다. 우리는 미래의 삶을 풍요롭게 하기 위해 은하계의 모든 정보점을 목록화하며 과거를 보존하고 있습니다."
 tradition_est_archivist_GC_desc:0 "모든 일이 기록될 것입니다. 우리가 관측하는 모든 사건과 정보점, 그리고 생각을 보존하여 반드시 영원으로의 여정을 이루어낼 것입니다."
 tradition_est_archivist_adopt_effect:0 "§H관측 임무 잠금 해제§!: ['concept_archivist_document_civilization']"
 tr_est_archivist_adopt:0 "기록 전통"
 tr_est_archivist_1:0 "원시종 연구"
 tr_est_archivist_1_desc:0 "매월 £unity£ 유니티 전초 기지에서: §G+5§!\n전초 기지에서 연구 (£society£ 사회): §G+25%§!"
 tr_est_archivist_1_delayed:0 "은하계 속 행성의 숫자는 생명체를 훌쩍 뛰어넘습니다. 귀하고 희귀한 만큼, 생명체에게는 우리가 배울 것이 존재합니다."
 tr_est_archivist_1_purifier:0 "통합 무기고"
 tr_est_archivist_1_purifier_delayed:0 "제국과 마주했던 모든 전쟁 병기들은 통합 무기고에 있는 기록 보관 담당자들의 섬세한 손을 거쳐야 합니다. 병기를 목록화하기 전에, 각 병기의 파괴력을 시험합니다."
 tr_est_archivist_2:0 "사서"
 tr_est_archivist_2_desc:0 "과학자들은 §C20%§! 확률로 특별한 §Y연대기 작성자§! 특성을 얻으며, §Y조사 속도§!가 §R20%§! 감소하고 §Y유지비§!가 §R25%§! 증가합니다. 연대기 작성자는 배정된 행성에서 £physics£ §Y물리학§!, £society£ §Y사회학§! 또는 £engineering£ §Y공학§! 연구 생산량을 §G10%§! §G향상§!시킵니다."
 tr_est_archivist_2_delayed:0 "존경받는 사서들은 기록 보관소에 있는 데이터의 관리와 접근이라는 업무를 맡고 있습니다. 그들은 우리가 수세대에 걸쳐 모은 지식의 수호자들입니다."
 tr_est_archivist_2_GC:0 "정보 관리자"
 tr_est_archivist_2_GC_desc:0 "과학자들은 §C20%§! 확률로 특별한 §Y연대기 작성자§! 특성을 얻을 수 있으며, §Y조사 속도§!가 §R20%§! 감소하고 §Y유지비§!가 §R25%§! 증가합니다. 연대기 작성자는 배정된 행성에서 £physics£ §Y물리학§!, £society£ §Y사회학§! 또는 £engineering£ §Y공학§! 연구 생산량을 §G10%§! 증가시킵니다."
 tr_est_archivist_2_GC_delayed:0 "기록 보관 드론은 우리 제국의 거대한 데이터 뱅크에서 정보를 수집하고 목록화하며 검색하기 위해 만들어졌습니다. 이러한 역할에 특수화된 드론의 필요성으로 인해 몇몇 표준 부품들이 이 드론의 구조에서 빠지게 되었습니다. 다른 용도에는 적합하지 않습니다."
 tr_est_archivist_3:0 "역사 기록"
 tr_est_archivist_3_delayed:0 "우리는 우리 제국의 모든 역사와 사건, 인물들을 빠짐없이 기록하고 보관해왔습니다. 우리의 모든 행동도 마찬가지입니다. 공통된 역사 지식을 통해, 우리는 더욱 더 긴밀히 통합될 것입니다."
 tr_est_archivist_3_GC:0 "과도한 물리적 백업 데이터"
 tr_est_archivist_3_GC_delayed:0 "디지털화된 기록 보관소의 효율성에도 불구하고, 우리 제국이 모은 모든 지식은 하나의 매체에만 보관되어있찌 않습니다. 다양한 물리적 매체로 기록 전체가 백업되어 재난시에도 완전한 복구가 가능합니다."
 tr_est_archivist_4:0 "은하계 기록"
 tr_est_archivist_4_desc:0 "항성계를 완전히 조사할 때마다 §G10§! £influence£ §Y영향력§!을 얻습니다."
 tr_est_archivist_4_delayed:0 "우리는 모든 항성과 행성의 지도를 만들고, 각각의 천체의 모든 정보를 저장해 이 은하계 전체를 기록할 것입니다."
 tr_est_archivist_5:0 "지식 보존"
 tr_est_archivist_5_desc:0 "우리가 직접 조사하고 목록화한 모든 항성계에 대해 £unity£ §G1§! 유니티를 얻습니다.\n\n"
 tr_est_archivist_5_delayed:0 "다음 세대에게 이득이 될 수 있도록 우리의 연구 결과와 모든 기술을 기록 보관소에 기록해 보존합니다."
 tr_est_archivist_finish:0 "기록 전통 완료"
 tr_est_archivist_finish_desc:0 "§H건물 잠금 해제§!: £building£ ['concept_building_est_archivist_finish_archive']\n\n이 건물은 §ETier II 이상 자본 건물§! 업그레이드가 필요합니다."
 tradition_est_benevolence:0 "박애"
 tradition_est_benevolence_desc:0 "우리의 이웃들에게 부조리한 해를 끼쳐서는 안됩니다. 우리와 같이 다른 이들도 이 은하계에 자리잡았을 뿐입니다."
 tr_est_benevolence_adopt:0 "박애 전통"
 tr_est_benevolence_1:0 "무역 거래"
 tr_est_benevolence_1_delayed:0 "우리에게는 '소유'의 개념이 없지만, 은하계의 다른 자들에게는 필수적인 개념입니다. 다른 문명과의 거래를 통해 우리는 우리 행성에서 찾기 힘든 물건들을 얻을 수 있을 것입니다."
 tr_est_benevolence_2:0 "평화적 접촉"
 tr_est_benevolence_2_delayed:0 "다른 문명과 접촉할 때 공격적인 태도를 취할 필요는 없습니다. 우리가 신뢰하는 자들 사이에 있다면 무기는 필요 없습니다."
 tr_est_benevolence_3:0 "외국 대사관"
 tr_est_benevolence_3_desc:0 "다른 제국의 £opinion£ §Y우호도§!가 §G+30§! 상승합니다."
 tr_est_benevolence_3_delayed:0 "우리는 다른 제국에게 대표 드론을 보내어 그들의 통치자와 직접적인 소통을 할 수 있을 것입니다. 이를 통해, 우리는 다른 존재들과의 좋은 관계를 조성하고 오해를 예방할 수 있을 것입니다."
 tr_est_benevolence_4:0 "점잖은 방법"
 tr_est_benevolence_4_delayed:0 "우리는 충동이나 분노에 휩쓸리지 않습니다. 우리의 정신은 언제나 산들바람처럼 평온합니다."
 tr_est_benevolence_5:0 "생각의 공유"
 tr_est_benevolence_5_delayed:0 "이 은하의 필멸자들의 정신은 나약하지만, 그들의 생각은 흥미롭습니다. 그들의 기술과 문화를 연구함으로써 우리의 연구 프로젝트에 유용한 것들을 찾아낼 수 있을 것입니다."
 tr_est_benevolence_finish:0 "박애 전통 완료"
 tr_est_benevolence_finish_desc:0 "최종 위기 세력에 대한 피해: §G+10%§!\n$MOD_DIPLO_WEIGHT_MULT$: §G+10%§!\n해방 특성 해제: §G+1§!"
 tradition_est_biogenesis:0 "생명공학"
 tradition_est_biogenesis_desc:0 "우리 문명은 만들어지지 않았고, 다만 성장했습니다. 우리는 하나의 유기체로서 은하계를 우리의 유전자로 물들이고 있습니다."
 tradition_est_biogenesis_hive_desc:0 "우리는 만들어진 것이 아니라 자생합니다. 우리의 함선은 우리의 팔다리이며, 우리의 식민지는 우리의 살입니다. 우리가 확장함에 따라 유기체도 확장합니다. 공허는 우리 일부가 됩니다."
 tr_est_biogenesis_adopt:0 "생명공학 전통"
 tr_est_biogenesis_adopt_policy:0 "§H정책 잠금 해제§!: ['concept_est_symbiosis_approach_policy']"
 tr_est_biogenesis_1:0 "생체 건축"
 tr_est_biogenesis_1_delayed:0 "우리 건물들은 돌과 콘크리트로 건설되지 않았습니다. 우리는 그 대신 DNA에 청사진이 각인된 유기 조직을 성장시켜 건물을 키워냈습니다."
 tr_est_biogenesis_1_hive_delayed:0 "한때 금속과 유지보수가 필요했던 것이 이제 우리와 함께 성장합니다. 더 강하고, 더 단순하며, 우리의 필요에 더 잘 맞습니다."
 tr_est_biogenesis_2:0 "생체 함선"
 tr_est_biogenesis_2_delayed:0 "우리의 설계대로 성장한 유기 조직의 함선으로, 살아있습니다."
 tr_est_biogenesis_3:0 "잡식성"
 tr_est_biogenesis_3_delayed:0 "모든 유기물들은 에너지로 전환되거나 새로운 조직을 성장시키는 데 사용할 수 있습니다."
 tr_est_biogenesis_4:0 "산란못"
 tr_est_biogenesis_4_delayed:0 "드론들은 지정된 산란못에서 끊임없이 태어납니다. 각 산란못은 특정한 유형의 드론들을 생산하며, 이것들로 인해 우리는 전보다 훨씬 빠른 속도로 드론을 생산할 수 있습니다."
 tr_est_biogenesis_4_hive_delayed:0 "우리 함선을 위해 설계된 생물학적 성장 시스템이 인구 번식에 재활용되었습니다. 한때 선체를 형성하던 같은 분비선이 이제 드론 형성을 가속화합니다."
 tr_est_biogenesis_5:0 "끝없는 진화"
 tr_est_biogenesis_5_desc:0 "\n['technology:tech_gene_tailoring'] 기술이 연구되면, 이 특성이 §G개선§!되어 다음과 같은 보너스가 제공됩니다:\n* 연구 속도 (§Y생물학§!): §G+10%§!\n* 종 수정 비용: §G-5%§!\n* 특성 포인트 (생물학적): §G+1§!"
 tr_est_biogenesis_5_delayed:0 "진화는 목표가 없는 과정입니다. 우리의 정신은 그대로이지만, 육체는 은하계 전역으로 퍼져나가면서 끊임없이 변하고 있습니다."
 tr_est_biogenesis_finish:0 "생명공학 전통 완료"
 tr_est_biogenesis_finish_policy:0 "§H정책 옵션 잠금 해제§!: ['concept_est_symbiosis_approach_policy_finisher']"
 tradition_est_chivalry:0 "기사도"
 tradition_est_chivalry_desc:0 "우리의 굳건한 이상은 결코 부러지지 않습니다. 어떠한 일이 일어날지라도, 우리는 흔들리지 않아야 합니다."
 tr_est_chivalry_adopt:0 "기사도 전통"
 tr_est_chivalry_adopt_desc:0 "모든 지도자는 §Y$leader_trait_commander_est_chivalry$§! 특성을 얻으며, 이는 §G소소한 보너스를 제공합니다§!. §Y장군§!과 §Y제독§!이 전투에서 승리할 경우 §Y$leader_trait_commander_est_chivalry_hero$§! 특성을 얻을 확률이 있으며, 이는 §G상당한 보너스를 제공합니다§! (§H획득한 특성은 전투 결과에 따라 달라집니다§!).\"   # TODO: 특정 이점을 위한 사용자 정의 툴팁/게임 개념을 추가할까요, 아니면 신비롭게 유지할까요?"
 tr_est_chivalry_1:0 "교전 규칙"
 tr_est_chivalry_1_delayed:0 "전투함들은 교전상황 시 엄격한 행동강령을 따라야 합니다. 이 기사도의 규칙을 따르지 않는 제독은 경멸의 대상이 됩니다."
 tr_est_chivalry_2:0 "명예"
 tr_est_chivalry_2_desc:0 "§Y신뢰 성장§!이 §G+30%§! 증가하고, 외국에 대한 £opinion£ §Y우호도§!가 §G+20§! 증가합니다."
 tr_est_chivalry_2_delayed:0 "시민의 가치는 우리의 명예강령을 얼마나 잘 고수하는지에 따라 결정됩니다. 불명예스러운 개인의 공개 활동은 환영받지 못합니다."
 tr_est_chivalry_3:0 "직업 윤리"
 tr_est_chivalry_3_delayed:0 "미천한 일이든 고귀한 일이든, 부지런히 일하는 그 자체만으로도 그들은 존경받아야 합니다."
 tr_est_chivalry_4:0 "전사의 무용"
 tr_est_chivalry_4_delayed:0 "우리는 우울한 의식이 아닌 성대한 축제를 통해 명예로운 죽음을 기립니다. 세상을 떠난 군인의 삶과 죽음은 그들의 연인과 사령관에게 칭송받습니다."
 tr_est_chivalry_5:0 "영광스러운 전투"
 tr_est_chivalry_5_desc:0 "적의 전투 함선과 기지를 파괴하면 £unity£ §Y$unity$§!를 얻습니다. 양은 함선이나 기지의 크기에 따라 증가합니다."
 tr_est_chivalry_5_delayed:0 "전투를 통해 남들과는 다른 자신의 가치를 증명할 수 있습니다. 전쟁의 불길 속에서 위대한 사람이 탄생하는 것입니다."
 tr_est_chivalry_finish:0 "기사도 전통 완료"
 tr_est_chivalry_finish_desc:0 "모든 통치자가 제국 전역에 다양한 §G보너스§!를 제공하는 하나의 명예로운 ['concept_est_chivalry_virtue']를 선택할 수 있습니다."
 tradition_est_collectivism:0 "집단주의"
 tradition_est_collectivism_desc:0 "전체는 부분보다 큽니다. 이제 모두가 자신의 이익은 뒤로 하고 함께 진정 위대한 것을 이루어야 합니다."
 tr_est_collectivism_adopt:0 "집단주의 전통"
 tr_est_collectivism_1:0 "퍼즐의 일부"
 tr_est_collectivism_1_delayed:0 "모든 이들은 국가라는 커다란 퍼즐의 한 조각에 불과합니다. 개개인이 맡은 역할은 작고, 그저 국가의 부름에 따르는 것이 중요합니다."
 tr_est_collectivism_2:0 "뭉쳐야 산다"
 tr_est_collectivism_2_delayed:0 "뭉치면 살고, 흩어지면 죽습니다. 우리가 함께 힘을 합치는 것으로만 은하계의 위협을 물리칠 수 있을 것입니다."
 tr_est_collectivism_3:0 "협동"
 tr_est_collectivism_3_desc:0 "§Y범죄§!가 없는 행성의 §Y자원 생산량§!이 §G+5%§! 증가합니다."
 tr_est_collectivism_3_delayed:0 "분열과 경쟁이 있는 곳에는 진정한 협력이 있을 수 없습니다. 오직 우리가 함께 일해야만 우리의 진정한 잠재력을 깨울 수 있습니다."
 tr_est_collectivism_4:0 "자원 입대"
 tr_est_collectivism_4_delayed:0 "국가를 위해 군대에서 봉사하는 것 이상으로 애국하는 방법은 없습니다."
 tr_est_collectivism_5:0 "자기 희생"
 tr_est_collectivism_5_delayed:0 "다수의 필요가 소수의 요구를 능가합니다."
 tr_est_collectivism_finish:0 "집단주의 전통 완료"
 tradition_est_commerce:0 "상업"
 tradition_est_commerce_desc:0 "무역이 있는 곳에는 이윤이 있습니다. 무역은 은하의 피이며, 그 피로부터 우리는 막대한 재물을 끌어낼 수 있습니다."
 tr_est_commerce_adopt:0 "상업 전통"
 tr_est_commerce_1:0 "경제 호황"
 tr_est_commerce_1_desc:0 "우리의 £energy£ §Y에너지 크레딧§! 생산량은 £energy£ §Y에너지 크레딧§! 증가가 긍정적일 때 §G+5%§! 증가합니다."
 tr_est_commerce_1_delayed:0 "성공적인 금융 정책 덕분에 우리 경제는 호황을 누리고 있습니다. 시민들과 기업들의 구매력과 소비력, 생산력이 향상되었으며, 이러한 좋은 상황을 통해 우리 제국은 기반 시설과 군에 대한 투자를 늘릴 수 있을 것입니다."
 tr_est_commerce_2:0 "지역 경제 활성화"
 tr_est_commerce_2_desc:0 "세 개의 §H행성 결정§!을 해제하여 행성의 £energy£ §Y에너지 크레딧§!, £food£ §Y식량§!, 또는 £minerals£ §Y광물§! 생산량을 §G+10%§! 증가시키며, 다른 두 가지의 생산량은 §R-5%§! 감소시킵니다."
 tr_est_commerce_2_delayed:0 "우리는 각 행성마다 다른 지역 경제 활성화 정책을 적용해야 합니다. 제국의 특정한 규정을 완화시킴으로써 우리의 행성이 각지의 지역 조건에 알맞는 경제 계획을 수립하게 한다면 결과적으로 생산량이 증가할 것입니다."
 tr_est_commerce_3:0 "금융 개혁"
 tr_est_commerce_3_delayed:0 "우리 제국이 처음으로 은하의 이웃을 만나고 난 뒤, 우리의 금융 체계가 거대한 은하계 시장에 맞지 않는다는 것이 명확해졌습니다. 우리의 낡은 금융 체계를 바꾸어야합니다."
 tr_est_commerce_4:0 "무역 통상로"
 tr_est_commerce_4_delayed:0 "우리 제국 전역에 무역 통상로 체계를 조직하였습니다. 이를 통해, 상품의 안전하고 효율적인 운송이 가능해질 것입니다."
 tr_est_commerce_5:0 "상업의 달인"
 tr_est_commerce_5_delayed:0 "상업이 예술이라면, 우리는 예술의 명인입니다. 은하계에서 우리가 사고 팔지 않은 것은 없습니다. 물론 이익도 보았구요."
 tr_est_commerce_5_no_dip:0 "유동적인 경제"
 tr_est_commerce_5_no_dip_delayed:0 "우리 제국의 상품들은 그 경로를 추적하기 힘들 정도로 빠르게 교환되고 있습니다."
 tr_est_commerce_finish:0 "상업 전통 완료"
 tradition_est_confederacy:0 "강대국"
 tradition_est_confederacy_desc:0 "제국의 각 지역은 높은 자치권을 행사합니다. 그러나 은하계에 맞설 때, 우리는 진정으로 하나가 될 것입니다."
 tr_est_confederacy_adopt:0 "강대국 전통"
 tr_est_confederacy_1:0 "지방 분권"
 tr_est_confederacy_1_delayed:0 "중앙에서 모든 일을 처리하는 것 보다 지방의 일은 지방에서 처리하는 것이 나을 것입니다."
 tr_est_confederacy_2:0 "정부 권력 제한"
 tr_est_confederacy_2_desc:0 "모든 §Y공직자§!는 §Y$leader_trait_official_est_confederacy$§! 특성을 얻어, 그들이 주둔하고 있는 §Y행성§!에서 §Y경험치 획득§!을 §G+20%§! 증가시키고, §Y$MOD_PLANET_CRIME_ADD$§!을 §G-10%§! 감소시킵니다. 또한, 그들이 섹터의 수도에 있을 경우, §Y섹터§!에서 §G-5%§! 감소합니다."
 tr_est_confederacy_2_delayed:0 "권력을 중앙집중화 한다는 것은 곧 지방의 권력을 빼앗는 것입니다. 우리는 많은 주들의 주권을 보장하기 위해 중앙 정부의 권력을 크게 제한할 것입니다."
 tr_est_confederacy_3:0 "국회"
 tr_est_confederacy_3_delayed:0 "국회는 우리 정부에서 중요한 역할을 맡습니다. 그곳에서 제국 전역의 지역 대표가 모여 국가의 중요한 문제에 대해 토론하고 투표합니다."
 tr_est_confederacy_4:0 "자치 국가"
 tr_est_confederacy_4_desc:0 "우리 §Y속국§!들의 £happiness£ §Y$MOD_POP_HAPPINESS$§!가 §G+10%§! 증가하고 §Y$MOD_COUNTRY_NAVAL_CAP_MULT$§!이 §G+20%§! 증가합니다. 또한, 우리를 향한 £opinion£ §Y우호도§!가 §G+50§! 상승합니다."
 tr_est_confederacy_4_delayed:0 "우리 제국의 행정 체계는 서로 다른 수준의 자치권을 지니는 지방 정부와 주, 독립 행성, 연방, 패권 등의 복잡한 구조로 되어있고 이들 중 일부는 상당한 자치권을 가집니다."
 tr_est_confederacy_4_no_subj:0 "충성"
 tr_est_confederacy_4_no_subj_delayed:0 "우리 제국에는 많은 파벌들이 있고 대부분의 행성과 섹터는 상당한 자치권을 누리고 있습니다. 비록 우리가 많은 주제에서 일치되지는 않더라도, 우리 모두 통일된 제국과 공통된 사명에 충실합니다."
 tr_est_confederacy_5:0 "끝없는 영역"
 tr_est_confederacy_5_desc:0 "전진기지 유지비가 §G-50%§! 감소합니다."
 tr_est_confederacy_5_delayed:0 "우리 제국의 영역은 너무나도 넓어서, 우리 국민들이 일평생 동안 여행한다 하더라도 조금밖에 보지 못할 것입니다."
 tr_est_confederacy_finish:0 "강대국 전통 완료"
 tradition_est_cooperativity:0 "협력"
 tradition_est_cooperativity_desc:0 "우리 드론들 각각의 능력은 떨어질지 몰라도, 자율적으로 서로 협력해 전체의 능력을 증폭시킵니다."
 tr_est_cooperativity_adopt:0 "협력 전통"
 tr_est_cooperativity_adopt_desc:0 "£pop£ §Y팝§!이 §Y25/50/100§! 이상 존재하는 행성의 §Y자원 생산량§!이 §G+3/6/10%§! 상승합니다."
 tr_est_cooperativity_adopt_wilderness:0 "협력 전통"
 tr_est_cooperativity_adopt_wilderness_desc:0 "행성의 남은 §Y구역 슬롯§!이 각각 §Y10/5/0§! 미만일 때, §Y자원 생산량§!이 §G+3/6/10%§! 증가합니다."
 tr_est_cooperativity_1:0 "전사 무리"
 tr_est_cooperativity_1_delayed:0 "전투 드론들은 전장에서 고립되지 않도록 작은 그룹으로 행동합니다. 드론들의 집단적인 행동성을 이용해 그들의 전투 수행 능력을 향상시킬 수 있습니다."
 tr_est_cooperativity_2:0 "작업 팀"
 tr_est_cooperativity_2_delayed:0 "작업 드론들은 세밀하게 설계된 팀으로 그룹화되어 있어 업무 효율이 향상되었습니다."
 tr_est_cooperativity_3:0 "입력 공유"
 tr_est_cooperativity_3_delayed:0 "자율적인 드론들이 느끼는 모든 감각, 경험적인 입력은 통합 네트워크에 전송되어 다른 드론들의 학습을 돕습니다."
 tr_est_cooperativity_4:0 "의식 통합"
 tr_est_cooperativity_4_desc:0 "모든 지도자들은 약간의 보너스를 주는 §Y의식 통합§! 특성을 얻습니다."
 tr_est_cooperativity_4_delayed:0 "자율적인 드론들은 다른 작업 드론들보다 훨씬 높은 인지 능력을 가지고 있습니다. 이들을 중앙 네트워크에 통합하면 그들의 능력을 크게 향상시킬 수 있을 것입니다."
 tr_est_cooperativity_5:0 "성장기"
 tr_est_cooperativity_5_desc:0 "§Y성장기§! 행성 결정이 추가됩니다. 이 행성 결정은 행성의 §Y성장 속도§!를 §G+50%§! 증가시키지만, §YPOP 자원 생산량§!이 §R-25%§! 감소하고 §YPOP 식량 유지비§!가 §R+50%§! 증가합니다."
 tr_est_cooperativity_5_machines:0 "복제 오버클럭"
 tr_est_cooperativity_5_machines_delayed:0 "드론의 수가 지정된 작업에 부족할 경우, 식민지는 주요 지침을 희생하여 새로운 유닛 생산으로 핵심 지침을 전환할 수 있습니다."
 tr_est_cooperativity_5_machines_desc:0 "§Y성장기§! 행성 결정이 추가됩니다. 이 행성 결정은 행성의 §YPOP 조립 속도§!를 §G+50%§! 증가시키지만, §YPOP 자원 생산량§!이 §R-25%§! 감소하고 §YPOP 에너지 유지비§!가 §R+50%§! 증가합니다."
 tr_est_cooperativity_5_AI:0 "$tr_est_cooperativity_5$"
 tr_est_cooperativity_5_AI_desc:0 "§Y성장 속도§!가 §G+15%§! 빨라집니다."
 tr_est_cooperativity_5_machines_AI:0 "$tr_est_cooperativity_5_machines$"
 tr_est_cooperativity_5_machines_AI_desc:0 "§Y인구 조립 속도§!를 §G+20%§! 증가시킵니다."
 tr_est_cooperativity_5_delayed:0 "식민지 전체가 성장기를 가져 드론 숫자를 빠르게 늘릴 수 있지만, 그동안 행성의 생산량은 크게 줄어들 것입니다."
 tr_est_cooperativity_finish:0 "협력 전통 완료"
 tradition_est_cybernetics:0 "자동화 기계"
 tradition_est_cybernetics_desc:0 "기계가 할 수 있는데, 왜 우리가 합니까?"
 tr_est_cybernetics_adopt:0 "자동화 전통"
 tr_est_cybernetics_1:0 "심층 신경망"
 tr_est_cybernetics_1_desc:0 "§H행성 결정 잠금 해제§!: ['modifier:mod_est_cybernetics_1_factorio']."
 tr_est_cybernetics_1_delayed:0 "신경망 기술의 발전으로 이전까지 지성체만이 할 수 있었던 일을 기계들도 할 수 있게 되었습니다."
 tr_est_cybernetics_2:0 "자율 AI 연구원"
 tr_est_cybernetics_2_delayed:0 "AI 기술의 진보로 AI들이 보다 복잡한 업무를 수행할 수 있게 되었습니다. 몇몇 연구 주제는 AI 연구원들에게 더 적합한 것으로 들어났습니다. 개방적인 사고와 막대한 처리 능력 덕분에, 그것들은 특수학 문제를 해결할 수 있습니다. 때때로 연구원들이 진행 과정을 확인하고, 현재의 과학 이론에 어떻게 포함할 수 있을지 알아낼 것입니다."
 tr_est_cybernetics_3:0 "전투 시뮬레이터"
 tr_est_cybernetics_3_desc:0 "§Y함선 명중률§!이 §G+10%§! 상승합니다."
 tr_est_cybernetics_3_delayed:0 "컴퓨터의 능력이 높아짐에 따라 점점 더 정밀한 시뮬레이션을 진행할 수 있게 되었습니다. 전투 중에 발생할 수 있는 상황을 실시간으로 시뮬레이션하며, 함장들은 이 데이터를 받아 의사 결정에 도움을 받을 것입니다."
 tr_est_cybernetics_4:0 "인공지능 통제 함선"
 tr_est_cybernetics_4_delayed:0 "제한된 입력 및 처리 능력을 가진 사람들에게 우리 함대의 지휘를 맡기는 것은 어리석은 생각입니다. 모든 함선을 동시에 통제할 수 있는 AI 지휘관을 배치한다면, 그들은 전장의 모든 상황을 파악하고 수많은 전투함들을 한 몸인 것 처럼 부릴 것입니다."
 tr_est_cybernetics_5:0 "가상 현실"
 tr_est_cybernetics_5_delayed:0 "우리가 좋아하는 세상을 만들 수 있는데, 이 세상에서 살아야할 이유가 있습니까? 우리 국민들은 점점 더 많은 시간을 대체 현실에서 살아가고 있으며, 그들은 원하는대로 세상을 바꿀 수 있습니다."
 tr_est_cybernetics_finish:0 "자동화 전통 완료"
 tr_est_cybernetics_finish_desc:0 "§H건물 잠금 해제:§!\n£building£ ['building:building_est_cybernetics_finish_automated_power_plant']\n£building£ ['building:building_est_cybernetics_finish_automated_farm']\n£building£ ['building:building_est_cybernetics_finish_automated_mine']\n이 건물들은 §ETier II 이상 자본 건물§! 업그레이드가 필요합니다.\n\n"
 tr_est_cybernetics_finish_AI_effect:0 "§E$TRADITIONS_FINISH$:§!\n$tr_est_cybernetics_adopt$을 모두 채택하면 §Y건설 속도§!가 §G+25%§! 증가하고§Y건물 유지비§!가 §G-10%§! 감소합니다.\n승천 특전 잠금해제: §G+1§!"
 council_agenda_est_cybernetics_effect:0 "모든 행성에 대해 §G무료§!인 ['modifier:mod_est_cybernetics_1_factorio']를 적용합니다. 단, 기초 자원 자동화 건물이 있는 경우에 한합니다."
 tradition_est_desires:0 "욕망"
 tradition_est_desires_desc:0 "우리는 우리의 욕망에 따라 움직입니다. 그리고 재화는 모으면 모을수록 더 많이 필요합니다."
 tr_est_desires_adopt:0 "욕망 전통"
 tr_est_desires_1:0 "재산 집착"
 tr_est_desires_1_desc:0 "£influence£ §Y$mod_country_influence_produces_add$§!는 §Y0.5§!/§Y1§!/§Y1.5§!/§Y2§!만큼 증가합니다. 단, 우리는 최소 §Y500§!/§Y6000§!/§Y25000§!/§Y80000§!의 £energy£ §Y에너지 크레딧§!을 저장하고 있어야 합니다."
 tr_est_desires_1_delayed:0 "수집과 축적, 그것은 우리의 영혼과 같습니다. 우리는 우리가 가진 것들이고 우리가 가질 모든 것들을 말합니다."
 tr_est_desires_2:0 "무자비한 협상가"
 tr_est_desires_2_desc:0 "§Y시장 수수료§!가 §G-5%§! 줄어듭니다. §Y무자비한 협상가§! 정책이 잠금해제됩니다. 정책의 각 등급마다 §Y$MOD_COUNTRY_TRADE_ATTRACTIVENESS$§!가 §G5%§!/§G10%§!/§G15%§! 증가하지만, 우리 제국에 대한 다른 제국의 £opinion£ §Y우호도§!가 §R-15§!/§R-30§!/§R-45§! 감소합니다."
 tr_est_desires_2_delayed:0 "우리는 우리가 원하는 것을 손에 넣기 위해 모든 수단을 총 동원 할 것입니다. 다른 이들이 우리를 좋아하지 않겠지만 그것은 우리의 관심사가 아닙니다."
 tr_est_desires_2_AI:0 "$tr_est_desires_2$"
 tr_est_greed_2_no_dip:0 "투기꾼"
 tr_est_greed_2_no_dip_desc:0 "§Y전초기지 영향력 비용§!이 §G-15%§! 줄어듭니다."
 tr_est_greed_2_no_dip_delayed:0 "이 은하계는 빈 행성으로 가득 차 있습니다. 우리가 그곳에 깃발을 꽂지 않는다면, 다른 이들이 그 행성을 더럽힐 것입니다. 우리가 너무 늦기 전에 우리가 얻을 수 있는 것을 최대한 얻어야 합니다."
 tr_est_desires_3:0 "절약"
 tr_est_desires_3_delayed:0 "더 많은 것을 얻는 가장 쉬운 방법은 덜 쓰는 것입니다."
 tr_est_desires_4:0 "보물 추구"
 tr_est_desires_4_desc:0 "§Y고급 전략 자원§! (£nanites£, £sr_dark_matter£, £sr_zro£, £sr_living_metal£) 출력이 §G+33%§! 증가합니다."
 tr_est_desires_4_delayed:0 "희귀한 광물을 얻기 위해서라도 우리는 국경을 확장해야 합니다."
 tr_est_desires_5:0 "위대한 갈망"
 tr_est_desires_5_desc:0 "행성을 식민지화하거나 정복할 때마다 £unity£ §Y$unity$§!를 얻습니다."
 tr_est_desires_5_delayed:0 "이 결코 사그라들지 않을 욕망은 더 많은 모든 것들을 원하고 있습니다. 우리는 모든 행성들을 정복해 나갈 것이고, 더 이상 정복할 행성이 없을 때 우리의 것들을 정복할 것입니다."
 tr_est_desires_finish:0 "욕망 전통 완료"
 tr_est_destruction_finish_passive_ai:0 "$tr_est_desires_finish$"
 tradition_est_destruction:0 "파괴"
 tradition_est_destruction_desc:0 "파괴의 길을 걷는 것은 간단합니다. 오히려 무엇을 먼저 파괴할지 결정하는 것이 더 어렵습니다."
 tr_est_destruction_adopt:0 "파괴 전통"
 tr_est_destruction_1:0 "파괴의 임무"
 tr_est_destruction_1_desc:0 "§Y$MOD_POP_PURGE_SPEED$§!가 §G+100%§! 증가합니다. 또한, £pop£ §Y팝§!을 정화할 때마다 §Y2§! £influence£ §Y영향력§!을 얻습니다."
 tr_est_destruction_1_delayed:0 "우리가 저들을 정화할 때마다 은하는 조금씩 깨끗해지고 있습니다."
 tr_est_destruction_2:0 "타고난 전사"
 tr_est_destruction_2_delayed:0 "우리는 싸우기 위해 태어났습니다. 전투만이 우리의 진정한 모습을 깨닫게 해줍니다."
 tr_est_destruction_3:0 "잔인한 추격"
 tr_est_destruction_3_desc:0 "우리와 전투중인 적 함대의 §Y함선 전투이탈 확률§!이 §R-33%§! 감소합니다."
 tr_est_destruction_3_delayed:0 "사냥감을 도망치게 두어서는 안됩니다. 사냥감이 기대할 수 있는 것은 빠른 죽음 뿐입니다."
 tr_est_destruction_4:0 "공포"
 tr_est_destruction_4_desc:0 "인근 §H비형상 적대적§! 제국의 £unity£ §Y유니티§! 생산량과 £pop£ §Y성장 속도§!를 §R-20%§! 감소시킵니다."
 tr_est_destruction_4_passive_AI:0 "$tr_est_destruction_4$"
 tr_est_destruction_4_passive_AI_desc:0 "§Y$MOD_ARMY_MORALE_DAMAGE_MULT$§!이 §G+25%§! 증가합니다."
 tr_est_destruction_4_delayed:0 "저들은 우리가 어떤 존재인지 알고 있습니다. 우리가 어떤 목적을 가지고 있고, 그 목적을 이루기 위한 수단 역시 가지고 있다고 아주 잘 알고 있습니다. 우리의 존재 자체가 저들에게 커다란 공포가 될 것입니다."
 tr_est_destruction_5:0 "은하의 재앙"
 tr_est_destruction_5_no_rivals_desc:0 "우리의 £influence£ §Y$mod_country_base_influence_produces_add$§!는 우리가 §Hat 전쟁§! 중일 때 §G2§!만큼 증가합니다."
 tr_est_destruction_5_delayed:0 "제국들은 우리의 힘 앞에 무릎 꿇을 것입니다. 은하 공동체는 우리를 파괴해야한다는 것을 깨닫기 시작했지만, 그 전에 우리가 그들을 파괴할 것입니다."
 tr_est_destruction_finish:0 "파괴 전통 완료"
 tr_est_destruction_finish_desc:0 "우리와 전쟁 중인 적들의 §Y전쟁 피로도 획득량§!이 §R+20%§! 증가합니다.\n승천 특전 잠금해제: §G+1§!"
 tradition_est_faith:0 "신앙"
 tradition_est_faith_desc:0 "이 광활한 은하는 불가사의한 것들로 가득 차있지만, 그것들에 현혹되어 진실된 길에서 벗어나면 안됩니다."
 tr_est_faith_adopt:0 "신앙 전통"
 tr_est_faith_1:0 "유일한 신앙"
 tr_est_faith_1_delayed:0 "우리가 별들을 향해 올라가기 전, 우리들은 다른 믿음으로 인해 분열되었습니다. 이제, 우리는 유일한 믿음 아래에 하나가 되었습니다."
 tr_est_faith_2:0 "성경"
 tr_est_faith_2_delayed:0 "모든 국민들은 신앙의 말을 들어야 합니다. 성경을 읽으면서 자신의 소명을 찾을 수 있을지도 모릅니다."
 tr_est_faith_3:0 "성직자"
 tr_est_faith_3_delayed:0 "위대한 존재와 가장 가까운 우리 제국의 성직자들은 신자들에게 평화와 희망을 줍니다."
 tr_est_faith_4:0 "전도사"
 tr_est_faith_4_delayed:0 "전도사는 우리 제국을 돌아다니면서 위대한 사제들과 선지자들의 거룩한 말씀을 전도합니다. 그 덕분에 거룩한 말씀이 일반 신도들에게까지 전달될 수 있습니다."
 tr_est_faith_5:0 "데우스 볼트"
 tr_est_faith_5_delayed:0 "전쟁은 신께서 원하시는 것입니다. 우리 전사들은 신의 뜻을 이루기 위해 죽을 준비가 되어있습니다."
 tr_est_faith_finish:0 "신앙 전통 완료"
 tr_est_faith_finish_desc:0 "선택한 §Y윤리관§! 에 대하여 §Y윤리관 선호도§! §G+50%§! 증가\n승천 특전 잠금해제: §G+1§!"
 tr_est_faith_finish_authoritarian:0 "$tr_est_faith_finish$"
 tr_est_faith_finish_egalitarian:0 "$tr_est_faith_finish$"
 tr_est_faith_finish_materialist:0 "$tr_est_faith_finish$"
 tr_est_faith_finish_spiritualist:0 "$tr_est_faith_finish$"
 tr_est_faith_finish_militarist:0 "$tr_est_faith_finish$"
 tr_est_faith_finish_pacifist:0 "$tr_est_faith_finish$"
 tr_est_faith_finish_xenophile:0 "$tr_est_faith_finish$"
 tr_est_faith_finish_xenophobe:0 "$tr_est_faith_finish$"
 tradition_est_foundation:0 "강소국"
 tradition_est_foundation_desc:0 "다른 이들은 단순히 국경을 넓히는 데 힘을 쏟지만, 우리는 더 깊고 근본적인 목표를 위해 노력해야 합니다."
 tr_est_foundation_adopt:0 "강소국 전통"
 tr_est_foundation_1:0 "공동의 목적"
 tr_est_foundation_1_delayed:0 "우리는 공동의 목적으로 묶여있습니다. 우리 모두는 그것이 우리의 목표를 이루기 위해 중요한 것임을 알고 있습니다."
 tr_est_foundation_2:0 "중앙 정부"
 tr_est_foundation_2_desc:0 "£energy£ §Y에너지 크레딧§!, £engineering£ §Y공학§!, £physics£ §Y물리학§!, £society£ §Y사회학§!, 그리고 £trade_value£ §Y무역§! 출력이 우리의 §Y수도 행성§!에서 §G+5%§! 증가합니다. ['technology:tech_colonial_centralization'] 및 ['technology:tech_galactic_administration'] 기술을 연구하면 이 수치는 §G+10%§!/§G+15%§!로 증가합니다."
 tr_est_foundation_2_delayed:0 "우리 제국의 정부는 우리의 수도에 집중되어 있으며, 상대적으로 적은 수의 행성을 통치할 수 있습니다."
 tr_est_foundation_3:0 "위대한 계획"
 tr_est_foundation_3_delayed:0 "우리 제국의 모든 것은 중앙에서 결정한 위대한 계획을 따라야 합니다. 그것의 세부사항까지 알고 있는 사람들은 거의 없습니다."
 tr_est_foundation_4:0 "정보부"
 tr_est_foundation_4_delayed:0 "우리의 정보부는 은하를 떠돌며 은하 곳곳의 정보를 지속적으로 수도로 전송하고 있습니다. 이 정보들은 우리의 정책 결정에 큰 도움이 됩니다."
 tr_est_foundation_5:0 "인적 자원 개발"
 tr_est_foundation_5_desc:0 "§Y전문가 직업§!이 생산하는 §Y연구 생산량§!이 §G+10%§! 증가합니다."
 tr_est_foundation_5_delayed:0 "다른 제국들은 자신들의 광대한 영토에서 자원을 끌어낼테지만 우리는 그렇게 할 수 없습니다. 그들과 경쟁하기 위해 우리는 우리 경제의 기초부터 새롭게 개선해야만 합니다. 우리의 영토에는그렇게 자원이 풍부하지 않을지라도, 우리의 국민들은 더 뛰어납니다."
 tr_est_foundation_finish:0 "강소국 전통 완료"
 tradition_est_friendship:0 "친화"
 tradition_est_friendship_desc:0 "모든 이들은 그들이 적이 되기 전까지 친구로 여겨져야 합니다. 이 은하에서 우리는 모두 다른 모습을 하고 있지만, 그 다양성이 곧 우리의 힘이 될 것입니다."
 tr_est_friendship_adopt:0 "친화 전통"
 tr_est_friendship_adopt_desc:0 "첫 접촉으로부터 £opinion£ §Y우호도§! 불이익이 없으며, 다른 제국과 처음 접촉할 때마다 £unity£ §Y통합력§!을 얻습니다. 또한 §Y$MOD_ENVOY_IMPROVE_RELATIONS_MULT$§!이 §G+25%§! 증가합니다."
 tr_est_friendship_1:0 "외국 대사관"
 tr_est_friendship_1_desc:0 "우리 제국에 대한 타국의 £opinion£ §Y우호도§!가 §G+30§! 좋아집니다."
 tr_est_friendship_1_delayed:0 "그들이 우리의 친구가 아니게 될 때까지 우리는 그들을 친구로 간주할 것입니다. 그들의 수도에 대사관을 설립해 그들의 문화와 관습을 배우고, 우리의 문화와 관습을 알려줍시다."
 tr_est_friendship_2:0 "문화의 용광로"
 tr_est_friendship_2_delayed:0 "모든 종류의 지성체들이 우리 행성에 모여들면서, 다른 문화의 생각이 섞이게되었습니다. 문화의 용광로는 새로운 기술 발전의 기초가 됩니다."
 tr_est_friendship_3:0 "친절"
 tr_est_friendship_3_delayed:0 "친절한 행동은 정신을 발전시키고 영혼을 강하게 합니다."
 tr_est_friendship_4:0 "평화의 길"
 tr_est_friendship_4_delayed:0 "무력은 또 다른 무력을 낳고, 죽음은 또 다른 죽음을 낳고, 전쟁은 또 다른 전쟁을 낳을 뿐입니다. 이 악순환을 끊기 위해 우리가 먼저 나서야 합니다."
 tr_est_friendship_4_militarist:0 "연합군"
 tr_est_friendship_4_militarist_desc:0 "하나 이상의 동맹국과 같이 전쟁중일 때 §Y$MOD_SHIP_WEAPON_DAMAGE$§!가 §G+10%§! 증가하고 §Y함선 건조 속도§!가 §G+25%§! 빨라집니다."
 tr_est_friendship_4_militarist_delayed:0 "우리는 모두 함께할 것입니다. 함께 승리를 축하하고, 패배를 슬퍼할 것입니다. 우리는 친구들과 함께 힘을 합쳐 적들을 무찌르거나, 동맹국과 함께 멸망할 것입니다."
 tr_est_friendship_5:0 "열린 사회"
 tr_est_friendship_5_delayed:0 "우리 사회는 다른 이들에게 언제나 열려 있습니다."
 tr_est_friendship_5_not_xenophile:0 "$tr_est_friendship_5$"
 tr_est_friendship_finish:0 "친화 전통 완료"
 tr_est_friendship_finish_desc:0 "모든 행성에서 최소 §H3§! 종족이 있는 경우 £energy£ §Y에너지 크레딧§!과 £unity£ §Y통합§! 생산량이 §G+5%§! 증가합니다.\n해제된 상승 특성: §G+1§!"
 tradition_est_fury:0 "분노"
 tradition_est_fury_desc:0 "영원한 증오의 불길이 우리 안에서 타오르고 있습니다. 이 절대 소멸되지 않는 불길은 우리가 분노를 해소하는 잠시동안만 사그라듭니다."
 tr_est_fury_adopt:0 "분노 전통"
 tr_est_fury_adopt_desc:0 "§Y분노§! 정책을 해제합니다. 이 정책은 §Y0§!에서 §Y5§!까지 설정할 수 있으며, 외국 제국의 £opinion£ §Y호감도§!를 각각 §R-0§!/§R-10§!/§R-25§!/§R-45§!/§R-70§!/§R-100§!만큼 줄입니다. 각 레벨은 다양한 분노 전통의 효율성을 §G증가시킵니다§!.\n§Y$MOD_SHIP_FIRE_RATE_MULT$§!를 §G+5%§! 증가시키고, 각 §Y분노 레벨§!마다 추가로 §G+1%§! 증가시킵니다."
 tr_est_fury_1:0 "증오"
 tr_est_fury_1_desc:0 "£influence£ §Y영향력§!은 §Y라이벌§!로부터 얻는 것이며, §G+25%§! 증가하고 각 §Y분노 레벨§!마다 추가로 §G+5%§! 증가합니다."
 tr_est_fury_1_delayed:0 "우리는 은하계에 존재하는 다른 모든 것들의 존재 자체를 참을 수 없습니다. 그들의 존재는 우리의 고통이며, 그들의 파멸은 우리의 기쁨입니다."
 tr_est_fury_1_no_rivals:0 "무모함"
 tr_est_fury_1_no_rivals_desc:0 "§Y$MOD_SHIP_SPEED_MULT$§!가 §G+5%§! 빨라지고, 각 §Y분노 단계§!마다 §G+3%§! 더 증가합니다."
 tr_est_fury_1_no_rivals_delayed:0 "저들을 일 초라도 빨리 멸절시켜야 합니다. 우리는 돌격할 것입니다."
 tr_est_fury_2:0 "전쟁 정신"
 tr_est_fury_2_desc:0 "§Y전쟁 피로도 획득량§!이 §G-5%§! 감소하고, 각 §Y분노 단계§!마다 §G-9%§! 더감소합니다."
 tr_est_fury_2_delayed:0 "우리는 다른 필멸자들처럼 전쟁으로 고통받지 않습니다. 오히려 죽음을 추구하고, 모든 것을 파괴할 수 있는 전쟁이 고통스러운 평화보다 더 편안합니다."
 tr_est_fury_3:0 "전투 광란"
 tr_est_fury_3_desc:0 "§Y$MOD_ARMY_DAMAGE_MULT$§!이 §G+20%§! 증가하고, 각 §Y분노 단계§!마다 §G+6%§! 더 증가합니다."
 tr_est_fury_3_delayed:0 "전투에서 이성을 잃는 것은 참 쉽습니다. 우리 전사들은 원수들이 흘릴 피만 생각하면 미친듯이 전투에 임하게 될 것입니다."
 tr_est_fury_4:0 "전투 분노"
 tr_est_fury_4_desc:0 "우리 함대가 전투에서 다른 함대를 파괴할 때마다 (매우 작은 함대는 포함되지 않음) 해당 함대의 §Y$MOD_SHIP_FIRE_RATE_MULT$§! 및 §Y$MOD_SHIP_SPEED_MULT$§!를 §G+10%§!만큼 증가시킵니다. 효과는 §H4§!개월 동안 지속되며, 각 §Y분노 단계§!마다 추가로 §H4§!개월 더 지속됩니다."
 tr_est_fury_4_delayed:0 "전장의 열기만이 우리가 느끼는 분노의 고통을 조금이라도 덜어줍니다. 전투를 통해서만 우리는 우리의 끝없는 분노를 조금이라도 해소할 수 있습니다. 전쟁을 통해서만 우리는 격통스러운 증오에서부터 잠시나마 해방될 수 있습니다."
 tr_est_fury_5:0 "황폐화"
 tr_est_fury_5_desc:0 "우리가 행성을 성공적으로 침공할 때마다, 그 행성에 있는 모든 £pop£ §Y팝§!을 죽일 확률은 §Y5%§!입니다. £pop£ §Y팝§!을 죽일 확률은 각 §Y분노 수준§!마다 §G3%§! 증가합니다. 죽인 £pop£ §Y팝§!마다 소량의 £unity£ §Y통합§!을 얻습니다. 각 행성은 §H10§!년마다 한 번만 영향을 받을 수 있습니다. 이 효과는 §Y$policy_est_fury_5_ravage$§! 정책을 사용하여 끌 수 있습니다."
 tr_est_fury_5_passive_AI_desc:0 "우리가 행성을 성공적으로 침공할 때마다 소량의 £unity£ §Y$unity$§!를 받습니다. 또한, §Y$MOD_ARMY_DAMAGE_MULT$§!가 §G+10%§! 증가합니다."
 tr_est_fury_5_delayed:0 "살아있는 원수의 몸뚱아리에 분노를 표출할 수 없을 때, 우리는 그들이 만든 모든 것들을 파괴함으로써 분노를 해소합니다. 살아있는 생명체들을 찢어발기는 것보다는 덜하지만, 어쩔 수 없습니다."
 tr_est_fury_5_passive_AI:0 "$tr_est_fury_5$"
 tr_est_fury_finish:0 "분노 전통 완료"
 tr_est_fury_finish_desc:0 "각 §Y분노 레벨§! 마다 $tr_est_fury_adopt$ §Y$MOD_SHIP_WEAPON_DAMAGE$§!이 §G+2%§! 증가합니다.\n승천 특전 잠금해제: §G+1§!"
 tradition_est_greed:0 "탐욕"
 tradition_est_greed_desc:0 "모든 재화는 우리가 소유했을 때만 가치있습니다."
 tr_est_greed_adopt:0 "탐욕 전통"
 tr_est_greed_1:0 "자산 축적"
 tr_est_greed_1_desc:0 "£influence£ §Y$mod_country_influence_produces_add$§!는 §Y0.5§!/§Y1§!/§Y1.5§!/§Y2§! 증가합니다. 만약 우리가 최소한 §Y500§!/§Y6000§!/§Y25000§!/§Y80000§!의 £energy£ §Y에너지 크레딧§!을 저장하고 있다면 말입니다."
 tr_est_greed_1_AI_desc:0 "§Y워간 영향력§!이 §G1§! 증가합니다."
 tr_est_greed_1_delayed:0 "부를 축적하는 것이야말로 우리의 존재 이유 그 자체입니다. 쌓인 재산만이 우리를 의미있게 만들어주고, 우리는 많은 재산들을 가지고 있지요."
 tr_est_greed_2:0 "무자비한 협상가"
 tr_est_greed_2_desc:0 "§Y시장 수수료§!가 §G-5%§! 줄어듭니다. §Y무자비한 협상가§! 정책이 잠금해제됩니다. 정책의 각 등급마다 §Y$MOD_COUNTRY_TRADE_ATTRACTIVENESS$§!가 §G5%§!/§G10%§!/§G15%§! 증가하지만, 우리 제국에 대한 다른 제국의 £opinion£ §Y우호도§!가 §R-15§!/§R-30§!/§R-45§! 감소합니다."
 tr_est_greed_2_AI_desc:0 "§Y시장 수수료§!가 §G-5%§! 줄어듭니다. 또한 §Y$MOD_COUNTRY_TRADE_ATTRACTIVENESS$§!가 §G+5%§! 증가합니다."
 tr_est_greed_2_delayed:0 "우리는 우리가 원하는 것을 손에 넣기 위해 모든 수단을 총동원 할 것입니다. 다른 이들의 생각 따위는 가치없습니다."
 tr_est_greed_3:0 "인색한"
 tr_est_greed_3_delayed:0 "매일같이 수많은 재화가 쓸데없이 소모됩니다. 더 적은 돈으로도 살 수 있는 이들에게 자원을 낭비하지 말아야 합니다."
 tr_est_greed_4:0 "착취"
 tr_est_greed_4_desc:0 "§Y$policy_est_greed_4_extortion$§! 정책이 해제되어, £trade£ §Y무역§! 생산량을 §G5%§!/§G10%§!/§G15%§! 증가시킬 수 있지만, 모든 £happiness£ §Y행복§!이 £pop£ §Y팝§!에 대해 §R10%§!/§R20%§!/§R30%§! 감소합니다."
 tr_est_greed_4_delayed:0 "우리가 얻을 수 있는 모든 것을 얻을 것입니다. 그리고 국민들의 재산은 곧 국가의 재산이죠."
 tr_est_greed_5:0 "뇌물"
 tr_est_greed_5_desc:0 "§Y제국 법령§!을 활성화하여 £energy£ §Y에너지 크레딧§!을 지불하고 선택한 §Y파벌§!의 £happiness£ §Y행복도§!를 §G+10%§! 증가시킬 수 있습니다."
 tr_est_greed_5_AI_desc:0 "모든 £pops£ 팝의 £happiness£ §Y$MOD_POP_HAPPINESS$§!이 §G+5%§! 증가합니다."
 tr_est_greed_5_delayed:0 "우리 제국의 여러 파벌 지도자들은 뇌물에 쉽게 넘어갑니다. 아니, 그들 스스로가 뇌물을 요구하고 있습니다. 그리고 일부 수뇌부를 만족시키는 것이 많은 대중들을 만족시키는 것보다 더 싸게 먹히죠."
 tr_est_greed_finish:0 "탐욕 전통 완료"
 tradition_est_hacking:0 "해킹"
 tradition_est_hacking_desc:0 "우리는 다른 제국의 컴퓨터 시스템에 접근하여 이를 우리 마음대로 바꿀 수 있습니다."
 tr_est_hacking_adopt:0 "해킹 전통"
 tr_est_hacking_1:0 "시스템 조작"
 tr_est_hacking_1_delayed:0 "적 함대의 사격 통제 시스템을 섬세히 조작하여, 적들의 조준 능력을 감소시킬 수 있습니다."
 tr_est_hacking_2:0 "통신 방해"
 tr_est_hacking_2_desc:0 "§Y행성 센서 범위§!와 §Y함선§! §Y센서 범위§!가 §R1§!만큼 감소하고 §Y스타베이스 영향력 비용§!이 모든 인접한 §H비형상 적대적§! 제국에 대해 §R+25%§!만큼 증가합니다."
 tr_est_hacking_2_delayed:0 "우리는 인접한 국가의 통신 시스템을 혼란시켜, 외계 제국 내에서의 효율적인 의사소통을 방해할 수 있습니다."
 tr_est_hacking_3:0 "스파이웨어"
 tr_est_hacking_3_delayed:0 "우리는 다른 제국의 감시, 관측 시스템에서 정보를 빼내 우리 제국 주변의 정보를 더 자세히 알 수 있습니다."
 tr_est_hacking_4:0 "멀웨어"
 tr_est_hacking_4_desc:0 "모든 경쟁국의 §Y$MOD_COUNTRY_ALL_TECH_RESEARCH_SPEED$§!가 §R-10%§! 감소하고 §Y건물 유지비§!가 §R+15%§! 상승합니다."
 tr_est_hacking_4_delayed:0 "경쟁 국가의 컴퓨터 시스템를 우리의 특수제작 소프트웨어로 감염시켜 경쟁자 제국 운영의 효율을 감소시킬 수 있습니다."
 tr_est_hacking_4_terminator:0 "$tr_est_hacking_4$"
 tr_est_hacking_4_terminator_desc:0 "다른 모든 제국의 §Y$MOD_COUNTRY_ALL_TECH_RESEARCH_SPEED$§!가 §R-10%§! 감소하고 §Y건물 유지비§!가 §R+15%§! 상승합니다."
 tr_est_hacking_4_terminator_delayed:0 "외계 국가의 컴퓨터 시스템를 우리의 특수제작 소프트웨어로 감염시켜 효율을 감소시킬 수 있습니다."
 tr_est_hacking_5:0 "데이터베이스 채굴"
 tr_est_hacking_5_delayed:0 "우리의 연구는 다른 제국의 과학 데이터베이스에게 큰 도움을 받고 있습니다. 그들이 이를 알고 있든 모르고 있든 말입니다."
 tr_est_hacking_finish:0 "해킹 전통 완료"
 tr_est_hacking_finish_terminator:0 "$tr_est_hacking_finish$"
 tradition_est_individualism:0 "개인주의"
 tradition_est_individualism_desc:0 "제국 그 자체에는 가치가 없습니다. 가치는 제국을 구성하는 개인에게 있는 것입니다."
 tr_est_individualism_adopt:0 "개인주의 전통"
 tr_est_individualism_adopt_desc:0 "리더가 레벨업할 때마다 §Y10§! £influence£ §Y영향력§!을 얻습니다."
 tr_est_individualism_1:0 "독창성 숭배"
 tr_est_individualism_1_desc:0 "§H과학자§! §Y시작 수준§!이 §G1§! 증가합니다. 또한, 과학자가 300개의 행성을 조사할 때마다 ['trait:']연구 전문성§! 특성을 얻습니다."
 tr_est_individualism_1_delayed:0 "우리의 과학계는 독창성을 숭배합니다. 독창적인 이들은 존경을 받고 그들의 연구는 완전한 지원을 받습니다."
 tr_est_individualism_2:0 "능력주의"
 tr_est_individualism_2_desc:0 "§H지휘관§! §Y초기 레벨§!이 §G1§!만큼 증가합니다. 또한, §Y함선 경험치 획득§!이 §G+25%§! 증가합니다."
 tr_est_individualism_2_delayed:0 "우리는 가장 능력 있는 이들을 장교로 승격시킬 것입니다. 고위 장교로서, 그들은 제국을 위해 자신의 능력을 사용할 것입니다."
 tr_est_individualism_3:0 "능력자의 지배"
 tr_est_individualism_3_desc:0 "§Y$MOD_COUNCILOR_SKILL_ADD$§! 가 §G1§! 만큼 증가합니다. 또한, £pop_cat_ruler£ §Y통치자 팝§! 의 §Y정치적 힘§! 이 §G+50%§! 증가하고 §Y자원 생산량§! 이 §G+25%§! 증가합니다."
 tr_est_individualism_3_delayed:0 "가장 뛰어난 인물만이 제국을 통치할 수 있습니다. 가장 능력 있는 자들만이 이 고귀한 임무를 맡을 수 있습니다."
 tr_est_individualism_4:0 "경력 추구"
 tr_est_individualism_4_delayed:0 "우리 제국에는 경력을 쌓고자 하는 젊은이들로 가득합니다. 그들은 정상에 오르길 꿈꾸며, 정상에 닿기 위해 무엇이든지 할 것입니다."
 tr_est_individualism_5:0 "개인의 야망"
 tr_est_individualism_5_delayed:0 "모든 이들은 그들의 야망 뿐만이 아니라 그것을 이루기 위한 열정 또한 가지고 있습니다."
 tr_est_individualism_finish:0 "개인주의 전통 완료"
 tr_est_individualism_finish_desc:0 "£happiness£ §Y행복§!이 £pop_cat_specialist£ §Y전문가 팝§!에 대해 §G+10%§! 증가합니다.\n해금된 상승 특성: §G+1§!"
 tradition_est_industry:0 "산업"
 tradition_est_industry_desc:0 "우리 제국의 행성은 공장이 뿜어내는 연기로 가득 뒤덮혔지만, 우리가 필요한 모든 것을 생산할 수 있습니다."
 tr_est_industry_adopt:0 "산업 전통"
 tr_est_industry_adopt_robots:0 "$tr_est_industry_adopt$"
 tr_est_industry_adopt_robots_desc:0 "§H로봇 팝을 수정할 때 §! ['trait:trait_robot_est_industry_adopt'] 특성을 잠금 해제합니다."
 tr_est_industry_adopt_machines:0 "$tr_est_industry_adopt$"
 tr_est_industry_adopt_machines_desc:0 "$tr_est_industry_adopt_robots_desc$"
 tr_est_industry_adopt_no_robots:0 "$tr_est_industry_adopt$"
 tr_est_industry_adopt_hive:0 "$tr_est_industry_adopt$"
 tr_est_industry_1:0 "새로운 탐광 기술"
 tr_est_industry_1_delayed:0 "우리가 개발한 새로운 탐광 기술로 이전에는 알지 못했던 광상을 찾아내 개발할 수 있게 되었습니다."
 tr_est_industry_2:0 "진보된 산업"
 tr_est_industry_2_desc:0 "여러 가지 새로운 §M희귀§! 기술이 §G추가될§! 것입니다."
 tr_est_industry_2_delayed:0 "우리 제국의 산업은 다른 제국의 첨단 기술보다 훨씬 더 효율적인 기술을 사용합니다."
 tr_est_industry_3:0 "거대 용광로"
 tr_est_industry_3_desc:0 "§H건물 잠금 해제§!: £building£ ['building:building_est_industry_3_blast_furnace']\n\n이 건물은 §ETier III 이상 자본 건물§! 업그레이드가 필요합니다."
 tr_est_industry_3_GC_desc:0 "$tr_est_industry_3_desc$"
 tr_est_industry_3_delayed:0 "우리 제국에서 사용하는 용광로는 은하계의 다른 어떠한 것보다 더 큽니다. 이 용광로를 사용해 엄청난 양의 광석을 단기간에 우수한 품질의 금속 주괴로 만들 수 있습니다."
 tr_est_industry_4:0 "대량 생산"
 tr_est_industry_4_robots:0 "대량 생산"
 tr_est_industry_4_delayed:0 "우리 제국의 군수공장은 제국이 필요로 하는 수많은 함선들을 단기간에 건조할 수 있습니다."
 tr_est_industry_4_robots_delayed:0 "우리 제국의 공장은 제국이 필요로 하는 수많은 로봇들을 단기간에 생산할 수 있습니다."
 tr_est_industry_5:0 "산업 행성"
 tr_est_industry_5_desc:0 "§H행성 결정 해제§!: ['modifier:mod_est_industry_5']"
 tr_est_industry_5_delayed:0 "산업 혁명이 일어난 이래로 우리 제국은 끝없이 도시의 더 많은 부분을 공장으로 전환해왔습니다. 그리고 지금, 우리는 행성 전체를 하나의 거대한 산업단지로 만들 수 있게 되었습니다. 대량의 광물을 생산하는 공장이 끝없이 펼쳐진 우리 제국의 행성 하나가 은하계의 다른 중소 제국의 전체 광물 생산량을 압도합니다."
 tr_est_industry_5_GC:0 "$tr_est_industry_5$"
 tr_est_industry_5_GC_desc:0 "§H행성 결정 잠금 해제§!: ['modifier:mod_est_industry_5_GC']"
 tr_est_industry_5_machines:0 "$tr_est_industry_5$"
 tr_est_industry_5_machines_desc:0 "§H행성 결정 잠금 해제§!: ['modifier:mod_est_industry_5_machines']"
 tr_est_industry_5_esap:0 "첨단 산업"
 tr_est_industry_5_esap_desc:0 "£job_chemist£ §Y$job_chemist$§!, £job_translucer£ §Y$job_translucer$§!, £job_gas_refiner£ §Y$job_gas_refiner$§!의 £minerals£ §Y광물§! 유지비가 §G-50%§! 감소합니다."
 tr_est_industry_5_esap_delayed:0 "우리 산업은 최첨단 기술을 활용하여 다른 제국에서는 들어본 적 없는 자원을 생산합니다."
 tr_est_industry_5_esap_GC:0 "$tr_est_industry_5_esap$"
 tr_est_industry_5_esap_GC_desc:0 "£job_chemist_drone£ §Y$job_chemist_drone$§!, £job_translucer_drone£ §Y$job_translucer_drone$§!, £job_gas_refiner_drone£ §Y$job_gas_refiner_drone$§!의 £minerals£ §Y광물§! 유지비가 §G-50%§! 감소합니다."
 tr_est_industry_finish:0 "산업 전통 완료"
 tradition_est_isolation:0 "고립주의"
 tradition_est_isolation_desc:0 "우리의 삶을 유지하기 위해서는 은하계로부터 고립되어야 합니다."
 tradition_est_isolation_GC_desc:0 "은하계의 필멸자들과 접촉해서 좋을 일은 하나도 없습니다."
 tr_est_isolation_adopt:0 "고립주의 전통"
 tr_est_isolation_1:0 "요새화된 국경"
 tr_est_isolation_1_delayed:0 "우리는 외계인들의 우리의 영역에 침범하지 않겠다는 약속을 믿지 않습니다. 우리의 국경은 어떠한 종류의 침입이라도 막을 수 있게끔 강화되어야 합니다."
 tr_est_isolation_2:0 "맹렬한 수비"
 tr_est_isolation_2_delayed:0 "우리 군인들은 우리 제국을 지키기 위해 어떤 대가든 치를 준비가 되어있습니다. 모든 침략은 저지되어야만 합니다."
 tr_est_isolation_3:0 "완충지대"
 tr_est_isolation_3_desc:0 "§Y전초기지 영향력 비용§!이 §G-10%§! 감소하며 §Y전초기지 합금 비용§!이 §G-20%§! 감소합니다."
 tr_est_isolation_3_delayed:0 "우리 행성과 다른 제국의 행성들 사이에 충분한 완충지대를 둬야 합니다. 광활한 빈 공간만이 외계인들에게서 우리의 삶을 지킬 수 있습니다."
 tr_est_isolation_4:0 "외국의 영향을 없애라"
 tr_est_isolation_4_delayed:0 "외계인들은 우리 국민들에게 어떠한 방식으로든 영향을 끼치려 합니다. 그것들이 우리의 삶을 파괴하기 전에 대비해야만 합니다."
 tr_est_isolation_4_GC:0 "영원한 침묵"
 tr_est_isolation_4_GC_delayed:0 "우리 제국은 항상 침묵해야만 합니다. 우리는 은하계에 어떠한 영향도 끼쳐서는 안되며, 무시받는 존재가 되야만 합니다. 우리 이웃들은 분명히 우리가 있다는 것을 알고 있겠지만, 우리를 신경쓸 이유가 없을 것입니다."
 tr_est_isolation_5:0 "은둔"
 tr_est_isolation_5_desc:0 "우리의 £unity£ §Y$unity$§! 생산량은 §G+10%§! 증가합니다. 단, §Y비공격 조약§!을 제외한 외교 관계가 없을 때에 한합니다."
 tr_est_isolation_5_delayed:0 "우리 제국은 은하계로부터 고립된 국가로 남아있을 것입니다. 우리 제국 밖의 광활한 공허에서 일어나는 일들은 우리 사정이 아닙니다."
 tr_est_isolation_5_GC:0 "평온"
 tr_est_isolation_5_GC_desc:0 "우리의 £unity£ §Y$unity$§! 생산량은 §G+10%§! 증가합니다, §Y비공격 조약§!을 제외한 외교 관계가 없을 때."
 tr_est_isolation_5_GC_delayed:0 "이 우주에는 우리 자신과 공허만이 존재합니다. 침묵 속에서만 우리는 우리의 생각을 들을 수 있습니다."
 tr_est_isolation_finish:0 "고립주의 전통 완료"
 tr_est_isolation_finish_effect:0 "§E$TRADITIONS_FINISH$:§!\n모든 $tr_est_isolation_adopt$를 채택하면 £happiness£ §Y$MOD_POP_HAPPINESS$§!이 모든 £pops£ §Y팝§!에 대해 §G+10%§! 증가하며, 우리는 §H전쟁 중이 아닙니다§!."
 tr_est_isolation_finish_desc:0 "모든 £pops£ §Y팝§!의 £happiness£ §Y$MOD_POP_HAPPINESS$§!이 §G+10%§! 증가합니다. 단, 우리는 §H전쟁 중이 아닙니다§!.\n해제된 상승 특성: §G+1§!"
 tr_est_isolation_finish_GC_desc:0 "£influence£ §Y$mod_country_influence_produces_add$§!이 §G1§!만큼 증가합니다. 현재 §H전쟁 중이 아닙니다§!.\n해제된 상승 특성: §G+1§!"
 tradition_est_justice:0 "정의"
 tradition_est_justice_desc:0 "법은 모든 것 위에 존재하기에, 모든 자는 무조건적으로 법에 따라야합니다."
 tr_est_justice_adopt:0 "정의 전통"
 tr_est_justice_1:0 "법 아래 평등하다"
 tr_est_justice_1_delayed:0 "정의의 여신은 눈을 가리고 있습니다. 그녀는 법 앞에 선 자의 출신이나 계급, 재산을 보지 않습니다."
 tr_est_justice_2:0 "집행관"
 tr_est_justice_2_desc:0 "£crime£ §Y범죄§!가 우리의 행성에서 §G-10%§! 감소하고, §Y$MOD_EMPIRE_SIZE_COLONIES_MULT$§!가 §G-20%§! 감소하며, §Y$MOD_ESPIONAGE_HOSTILE_OPERATION_DIFFICULTY_ADD$§!가 §G1§! 증가합니다."
 tr_est_justice_2_delayed:0 "우리 제국의 법을 대변하는 집행관은 제국 전역을 순찰하며 제국의 모든 곳에서 정의를 집행합니다. 그들은 경우에 따라 정당한 공권력을 행사할 권리까지 가지고 있습니다."
 tr_est_justice_3:0 "대법원"
 tr_est_justice_3_delayed:0 "대법원은 제국 정부의 활동이 우리 제국의 법에 위배되지 않는지 감시하는 역할을 맡습니다."
 tr_est_justice_4:0 "헌법"
 tr_est_justice_4_delayed:0 "우리 제국의 헌법은 제국 통치의 가장 근본적인 원칙과 국민의 권리, 그리고 의무를 규정합니다."
 tr_est_justice_5:0 "법적 완결성"
 tr_est_justice_5_desc:0 "우리의 £influence£ §Y영향력§! 생산량이 §G+25%§! 증가합니다."
 tr_est_justice_5_delayed:0 "우리는 수백 년 동안 법을 다듬고 수정해 결국 완벽하게 완성했습니다. 우리 제국의 법은 그 자체로 완벽하며, 법에 쓰여진 글과 법이 뜻하는 정신은 정확히 일치합니다."
 tr_est_justice_finish:0 "정의 전통 완료"
 tr_est_justice_finish_desc:0 "£unity£ §Y유니티§! 출력이 §G+5%§!/§G10%§! 증가합니다. 우리가 최소 §Y500§!/§Y750§!의 £influence£ §Y영향력§!을 저장하고 있을 때.\n해제된 상승 특성: §G+1§!"
 tradition_est_liberty:0 "자유"
 tradition_est_liberty_desc:0 "다른 이의 자유를 부정하는 이는, 자유로워질 자격이 없습니다."
 tradition_est_liberty_slavery_desc:0 "어떻게든, 자유는 우리 모두의 스승입니다. 모든 이가 얻지는 못했지만, 그들은 모두 자신의 존재 속의 위대함에 닿을 기회가 있었습니다."
 tradition_est_liberty_adopt_slavery_xenophobe_desc:0 "우리 종족에게 자유는 절대적이어야 하며, 열등한 종의 존재나 야망으로부터 방어받아야 합니다."
 tr_est_liberty_adopt:0 "자유 전통"
 tr_est_liberty_1:0 "보편적 권리"
 tr_est_liberty_1_delayed:0 "우리가 누구든지, 어디서 태어났는지에 상관 없이 우리에게는 보편적인 권리가 있다."
 tr_est_liberty_1_slavery:0 "정당화된 지배"
 tr_est_liberty_1_slavery_desc:0 "모든 §Y노예§!의 £happiness£ §Y행복§!이 §G+20%§! 증가합니다."
 tr_est_liberty_1_slavery_delayed:0 "가장 진실된 도덕적 원칙에 근거한 우리의 규칙과 법률은 전혀 문제되지 않습니다. 어떤 이들이 가혹하고 힘든 '개인적인 문제'를 겪고 있다 해도, 그들은 그들 자신의 불운이나 그들의 개인적인 결함을 탓해야만 합니다."
 tr_est_liberty_2:0 "언론의 자유"
 tr_est_liberty_2_desc:0 "모든 §Y파벌§!의 £happiness£ §Y행복도§!이 억제된 §Y파벌§!이 없을 때 §G+10%§! 증가합니다."
 tr_est_liberty_2_delayed:0 "모두가 법의 제약을 받지 않고 자신의 의견과 생각을 말할 권리가 있다는 것이 중요합니다. 이것이 바로 우리 시민들의 가장 기초적인 권리입니다."
 tr_est_liberty_3:0 "개척자 정신"
 tr_est_liberty_3_desc:0 "식민지를 설립할 때 추가 £pops£ §Y팝§! : §G+100§!\n새로운 식민지의 £happiness£ §Y$MOD_POP_HAPPINESS$§!가 §Y20년§! 동안: §G+20%§!"
 tr_est_liberty_3_delayed:0 "낙관적인 우리 국민들은 새로운 식민지로 몰려듭니다. 그들에게 이는 큰 기회이며 행운입니다."
 tr_est_liberty_3_slavery:0 "명백한 운명"
 tr_est_liberty_3_slavery_delayed:0 "고개를 들어 우주를 바라보면 찬란하게 빛나는 별들의 바다가 보입니다. 우리는 거기에 손을 뻗어 그 별들을 요구해야 합니다. 그 별들을 다스리는 것이 우리의 운명이기 때문입니다."
 tr_est_liberty_3_slavery_desc:0 "식민지를 설립할 때 추가 £pops£ 팝: §G+100§!\n청구의 영향력 비용: §G-20%§!"
 tr_est_liberty_4:0 "가능성의 꿈"
 tr_est_liberty_4_delayed:0 "그 사람의 출생이 그 사람의 운명을 결정지어서는 안됩니다. 모든 이들은 성공의 길에 도전할 권리를 가져야 합니다."
 tr_est_liberty_5:0 "해방 전쟁"
 tr_est_liberty_5_desc:0 "노예제나 정화를 허용하는 전쟁 지도국과 전쟁중일 때 §Y$MOD_SHIP_WEAPON_DAMAGE$§!이 §G+15%§! 증가하고 §Y$MOD_ARMY_DAMAGE_MULT$§!이 §G+25%§! 증가합니다."
 tr_est_liberty_5_delayed:0 "우리는 언제나 어떤 종류의 억압에도 저항할 것입니다. 또한, 우리는 아직 스스로 일어설 힘이 없는 이들을 위해 일어설 준비가 되어있습니다."
 tr_est_liberty_5_less_nice:0 "신념"
 tr_est_liberty_5_less_nice_delayed:0 "우리의 이념은 옳고, 우주의 진리 그 자체입니다. 이 말에 토를 다는 이들이 몇 있긴 하지만, 그들은 그저 우리 제국을 시샘하는 것입니다."
 tr_est_liberty_finish:0 "자유 전통 완료"
 tradition_est_malice:0 "악의"
 tradition_est_malice_desc:0 "다른 이들의 고통은 우리의 즐거움입니다. 다른 이들의 문명을 파괴하는 것으로만 우리의 위대함을 증명할 수 있습니다."
 tr_est_malice_adopt:0 "악의 전통"
 tr_est_malice_adopt_alt:0 "$tr_est_malice_adopt$"
 tr_est_malice_1:0 "빵과 물"
 tr_est_malice_1_desc:0 "노예 §Y보너스 노동력§!이 §G5%§! 증가하고 그들의 §Y행복도§!는 §R-10%§! 감소합니다."
 tr_est_malice_1_delayed:0 "우리 노예들은 딱 살아갈 수 있을 만큼만의 자원을 받을 것입니다. 그들은 참으로 비참한 삶을 살 것이고, 그것은 우리가 원하는 바이기도 합니다."
 tr_est_malice_1_no_slaves:0 "가학증"
 tr_est_malice_1_no_slaves_desc:0 "우리가 성공적으로 침공한 행성의 £happiness£ §Y행복§! 수치는 §R-25§! 만큼 §Y20§! 년 동안 감소합니다 (우리가 정복하면 수정자는 제거됩니다)."
 tr_est_malice_1_no_slaves_delayed:0 "우리가 침략한 행성에는 비명과 절규가 가득합니다. 우리 군대가 행성에서 철수한 이후에도, 그곳의 주민들은 극심한 공포와 참을 수 없는 트라우마를 영원히 느낄 것입니다."
 tr_est_malice_1_no_slaves_passive_AI:0 "$tr_est_malice_1_no_slaves$"
 tr_est_malice_1_no_slaves_passive_AI_desc:0 "§Y지상군 피해량§!이 §G+25%§! 증가합니다."
 tr_est_malice_1_no_slaves_passive_AI_delayed:0 "$tr_est_malice_1_no_slaves_delayed$"
 tr_est_malice_2:0 "모든 희망을 버려라"
 tr_est_malice_2_desc:0 "노예 §Y보너스 노동력§!이 §G5%§! 증가하고 그들의 §Y행복§!이 §R-10%§! 감소합니다."
 tr_est_malice_2_delayed:0 "우리 제국을 위해 봉사하는 노예들은 이미 오래전에 그들이 해방될 것이라는 희망을 버렸습니다. 그들은 자신의 운명을 받아들였고, 그들이 그나마 받을 수 있는 것들을 받기 위해 오늘도 광산으로 떠납니다."
 tr_est_malice_2_no_slaves:0 "공포의 장막"
 tr_est_malice_2_no_slaves_desc:0 "§Y$MOD_SHIP_WEAPON_DAMAGE$§!이 §G+5%§! 증가했습니다."
 tr_est_malice_2_no_slaves_delayed:0 "우리는 다른 이들이 상상할 수 있는 모든 공포의 화신입니다. 저들은 우리가 침공할 것이라는 소문만 듣고도 도망치고 있습니다."
 tr_est_malice_2_various_AI:0 "$tr_est_malice_2_no_slaves$"
 tr_est_malice_2_various_AI_desc:0 "§Y$MOD_SHIP_WEAPON_DAMAGE$§!가 §G+5%§! 증가합니다."
 tr_est_malice_2_various_AI_delayed:0 "$tr_est_malice_2_no_slaves_delayed$"
 tr_est_malice_3:0 "독고다이"
 tr_est_malice_3_delayed:0 "누구도 우릴 친구로 여기지 않습니다. 하지만 상관 없습니다. 우린 친구가 필요 없습니다."
 tr_est_malice_3_no_rivals:0 "섬멸"
 tr_est_malice_3_no_rivals_delayed:0 "우리의 막강한 군대가 성계를 통과할 때마다 벌레들의 보금자리는 군홧발에 무참히 짓밟힙니다."
 tr_est_malice_4:0 "적대자"
 tr_est_malice_4_delayed:0 "우리는 은하계의 다른 모든 제국으로부터 위협적인 존재로 간주됩니다. 그들은 우리가 다른 모든 이들의 존재 자체를 위협한다고 소리치고 있습니다. 뭐, 틀린 말은 아니지요."
 tr_est_malice_5:0 "파괴의 즐거움"
 tr_est_malice_5_desc:0 "적의 함선이나 스테이션을 파괴할 때마다 £unity£ §Y통합력§!을 얻습니다. 얻는 통합력의 양은 파괴한 함선이나 스테이션의 규모에 따라 달라집니다."
 tr_est_malice_5_delayed:0 "딱히 무슨 이득을 보자고 저들을 파괴하는 게 아닙니다. 단지 저들을 파멸시키는 것이 즐거워서 그렇지요."
 tr_est_malice_finish:0 "악의 전통 완료"
 tradition_est_mechanicum:0 "기계공학"
 tradition_est_mechanicum_desc:0 "다른 이들은 마술이라고 생각하지만, 우리에게는 단순한 공학입니다. 우리가 이루기에 너무 대단하거나 어려운 프로젝트는 없습니다."
 tr_est_mechanicum_adopt:0 "기계공학 전통"
 tr_est_mechanicum_1:0 "공병대"
 tr_est_mechanicum_1_GC:0 "우주 건설의 기술"
 tr_est_mechanicum_1_desc:0 "§Y건설선§!의 §Y유지비§!가 §G-50%§! 줄어듭니다. 그리고 §Y채굴 스테이션 건설 비용§!이 §G-20%§! 감소합니다."
 tr_est_mechanicum_1_delayed:0 "우리 사회에서 엔지니어는 가장 존경받는 직업 중 하나입니다. 심지어 가장 하급 엔지니어마저도 사회의 상층부에 위치합니다. 우리는 예로부터 엔지니어들에게 막대한 투자를 하고있고, 그 결과 우리 공돌이들은 전 은하에서 가장 큰 규모를 자랑합니다."
 tr_est_mechanicum_1_GC_delayed:0 "오래 전에 우리는 우주 건설의 기술을 마스터했습니다. 우리는 적은 비용으로도 새로운 우주 정거장을 건설할 수 있습니다."
 tr_est_mechanicum_2:0 "새로운 청사진"
 tr_est_mechanicum_2_delayed:0 "우리 제국의 숙련된 공학자들은 항상 새롭고 개선된 디자인을 설계합니다. 그리고 그들은 그 디자인을 발표하자마자 새로운 디자인 작업에 들어갑니다."
 tr_est_mechanicum_2_robots:0 "$tr_est_mechanicum_2$"
 tr_est_mechanicum_2_robots_delayed:0 "$tr_est_mechanicum_2_delayed$"
 tr_est_mechanicum_2_GC:0 "보편적 운동"
 tr_est_mechanicum_2_GC_delayed:0 "우리 제국의 숙련된 공학자들은 항상 새롭고 개선된 디자인을 설계합니다. 그리고 그들은 그 디자인을 발표하자마자 새로운 디자인 작업에 들어갑니다."
 tr_est_mechanicum_2_machines:0 "$tr_est_mechanicum_2_GC$"
 tr_est_mechanicum_2_machines_delayed:0 "$tr_est_mechanicum_2_GC_delayed$"
 tr_est_mechanicum_3:0 "전쟁의 기계"
 tr_est_mechanicum_3_desc:0 "§Y$MOD_ARMY_DAMAGE_MULT$§! §G+10%§! 증가합니다.\n\n§H군대 잠금 해제:§!\n£army_power£ §Y$est_titan_army$§!\n£army_power£ §Y$est_mechanical_knights_army$§!"
 tr_est_mechanicum_3_delayed:0 "대형 이족 보행 병기는 전쟁터에서 가장 독보적인 존재입니다. 우리는 다양한 이족 보행 로봇에 두꺼운 장갑과 육중한 무기를 장착해 일반적인 군대보다 훨씬 강력한 군대를 만들었습니다."
 tr_est_mechanicum_4:0 "거대 건축"
 tr_est_mechanicum_4_GC:0 "$tr_est_mechanicum_4$"
 tr_est_mechanicum_4_megastruct_GC:0 "$tr_est_mechanicum_4$"
 tr_est_mechanicum_4_delayed:0 "우리의 공학자들은 은하계의 다른 제국들보다 훨씬 큰 우주 구조물을 건설할 수 있습니다. 다른 제국들은 우리 제국의 스테이션들을 보고 부러워합니다."
 tr_est_mechanicum_4_GC_delayed:0 "우리는 은하계의 다른 제국들보다 훨씬 큰 우주 구조물을 건설할 수 있습니다. 필멸자 제국들은 우리의 프로젝트의 규모를 보고 경외감을 느낍니다."
 tr_est_mechanicum_4_megastruct_GC_delayed:0 "$tr_est_mechanicum_4_GC_delayed$"
 tr_est_mechanicum_5:0 "공학자 길드"
 tr_est_mechanicum_5_desc:0 "§H건물 잠금 해제:§!\n£building£ ['building:building_est_mechanicum_5_guild_of_engineers_1']\n£building£ ['building:building_est_mechanicum_5_guild_of_engineers_2']\n이 건물들은 §ETier III 이상 자본 건물§! 업그레이드가 필요합니다.\n"
 tr_est_mechanicum_5_robots_desc:0 "$tr_est_mechanicum_5_desc$"
 tr_est_mechanicum_5_delayed:0 "위대한 공학자 길드는 우리 제국에서 가장 영향력 있는 단체 중 하나입니다. 공학자 길드는 새로운 공학자들을 양성하고 모든 공학 기술 개발을 도맡습니다. 이 길드의 수장은 우리 제국의 통치자와 비교될 정도로 중요한 요직이며, 또 많은 길드 간부들이 우리 정부의 요직을 차지하고 있습니다."
 tr_est_mechanicum_5_GC:0 "자가 복구 프로토콜"
 tr_est_mechanicum_5_GC_delayed:0 "함선에 데미지 자가 복구 프로토콜을 도입한다면 피해가 발생하자 마자 그것을 그 자리에서 수복하는 것이 가능해질 것입니다."
 tr_est_mechanicum_finish:0 "기계공학 전통 완료"
 tradition_est_might:0 "힘"
 tradition_est_might_desc:0 "오직 군사적인 힘을 통해서만 우리는 이 은하에서 살아남을 수 있습니다."
 tr_est_might_adopt:0 "힘 전통"
 tr_est_might_adopt_desc:0 "우리가 £naval_capacity£ §Y해군 용량§!에 도달했거나 초과할 때, §Y$mod_planet_jobs_produces_mult$§!를 §G+5%§! 증가시킵니다."
 tr_est_might_1:0 "타고난 전사"
 tr_est_might_1_machines:0 "$tr_est_might_1$"
 tr_est_might_1_delayed:0 "우리의 가장 작은 드론들마저도 타고난 전사입니다. 전투의 시간이 다가오면, 모든 드론이 적들과 맞서 싸울것입니다."
 tr_est_might_1_machines_delayed:0 "우리의 가장 작은 드론들마저도 타고난 전사입니다. 전투의 시간이 다가오면, 모든 드론이 적들과 맞서 싸울것입니다."
 tr_est_might_2:0 "노련한 사냥꾼"
 tr_est_might_2_desc:0 "£general_small£ §Y장군§!은 ['concept_militarism_general']을 얻습니다. £army_power£ §Y$MOD_ARMY_MORALE_DAMAGE_MULT$§!이 §G+20%§! 증가합니다.\n§E이 특성은 £general_small£ 베테랑 클래스 선택 후 추가 레벨을 얻으면 활성화됩니다.§!"
 tr_est_might_2_delayed:0 "우리의 지상군 전술은 은하계에 만연한 필멸자들의 방식은 아니지만, 매우 효과적입니다. 우리의 군대와 전장에서 마주한 적들의 마음에서 두려움이 피어나고 있습니다."
 tr_est_might_3:0 "웅장한 함대"
 tr_est_might_3_delayed:0 "우리는 함대 확장에 더 많은 자원을 투자 할 것입니다. 이제까지 봐왔던 함대 중 가장 큰 하나의 함대가 되어 은하계 전체는 이를 두려워하게 될 것입니다."
 tr_est_might_4:0 "숙련된 무기 제작자"
 tr_est_might_4_desc:0 "§Y특수 자원§! (£rare_crystals£, £exotic_gases£, £volatile_motes£, £sr_dark_matter£, £sr_zro£, £sr_living_metal£, £nanites£) §Y선박 부품§! 비용이 §G-25%§! 감소합니다."
 tr_est_might_4_delayed:0 "우리 제작자들은 은하계에서 찾을 수 있는 최고의 무장과 장갑을 생산합니다. 우리 함대의 품질을 부러워 하지 않는 제독은 거의 없습니다."
 tr_est_might_5:0 "전쟁 감각"
 tr_est_might_5_desc:0 "£admiral_small£ §Y제독§!은 ['concept_militarism_admiral']을 얻습니다. 또한, 모든 $commander_with_icon$은 추가 특성을 가지고 시작합니다.\n§E이 특성은 £general_small£ 베테랑 클래스 선택 후 추가 레벨을 얻으면 활성화됩니다§!."
 tr_est_might_5_delayed:0 "우리는 타고난 전쟁의 화신입니다. 그 어떤 필멸자 제독일지라도 우리를 따라오지 못합니다."
 tr_est_might_finish:0 "힘 전통 완료"
 tradition_est_militarism:0 "군국주의"
 tradition_est_militarism_desc:0 "우리 제국의 군대만이 은하계에서 우리의 생존권을 보장합니다. 그러므로 우리 사회가 군대를 중심으로 돌아가는 것은 자연스러운 현상입니다."
 tr_est_militarism_adopt:0 "군국주의 전통"
 tr_est_militarism_adopt_desc:0 "§Y함대 수용력§! 이상의 함대가 있다면 §Y$mod_planet_jobs_produces_mult$§!이 §G+5%§! 증가합니다"
 tr_est_militarism_1:0 "징병제"
 tr_est_militarism_1_delayed:0 "우리 국민들은 모두 국방의 의무를 집니다. 직업군인이 아닌 일반 시민에게도 체계적인 군대에서 훈련받으며 조국을 위해 봉사하는 것은 좋은 경험입니다."
 tr_est_militarism_2:0 "군사 개혁"
 tr_est_militarism_2_desc:0 "£general_small£ §Y장군§!은 ['concept_militarism_general']을 얻습니다. §Y군 경험 증가§!가 §G+50%§! 증가합니다."
 tr_est_militarism_2_delayed:0 "우리의 지상군은 여전히 우주에 진출하기 이전의 구식 체계를 다르고 있습니다. 지상군의 역할은 우주 함대를 따라다니며 우리 제국의 식민지를 방위하고 적대적인 행성을 침략하는 것으로 바뀌고 있으며, 그 임무에 적합하도록 지상군을 개혁해야 합니다."
 tr_est_militarism_3:0 "거대한 함대"
 tr_est_militarism_3_delayed:0 "우리는 제국 함대에 더 많은 자원을 투입할 것입니다. 우리 제국의 함대가 은하에서 가장 거대하고 강력한 함대가 되어, 다른 모든 이들의 두려움을 살 때까지."
 tr_est_militarism_4:0 "수석 무기 공학자"
 tr_est_militarism_4_desc:0 "§Y희귀 자원§! (£rare_crystals£, £exotic_gases£, £volatile_motes£, £sr_dark_matter£, £sr_zro£, £sr_living_metal£, £nanites£) 비용이 §Y함선 부품§!의 §G-25%§! 감소합니다."
 tr_est_militarism_4_delayed:0 "우리 제국의 공학자들은 은하계 최고 품질의 무장과 장갑을 제조합니다. 은하의 다른 많은 제독들이 우리 제국의 최첨단 부품이 장착된 함대를 부러워합니다."
 tr_est_militarism_5:0 "위대한 제독"
 tr_est_militarism_5_desc:0 "£admiral_small£ §Y제독§!은 ['concept_militarism_admiral']을 획득합니다. 또한, 모든 $commander_with_icon$은 추가 특성을 가지고 시작합니다.\n§E이 특성은 £general_small£ 베테랑 클래스 선택 후 추가 레벨을 획득하면 활성화됩니다§!."
 tr_est_militarism_5_delayed:0 "우리 제국 함대의 제독은 우리 사회에서 가장 존경받는 이들입니다. 그들은 자기 휘하의 함대 뿐만이 아니라 사회 전반에 엄청난 영향력을 행사합니다."
 tr_est_militarism_finish:0 "군국주의 전통 완료"
 tradition_est_mystery:0 "수수께끼"
 tradition_est_mystery_desc:0 "비밀과 속임수 덕분에 우리의 사회가 정확히 어떻게 돌아가는지에 아는 자는 거의 없습니다."
 tr_est_mystery_adopt:0 "수수께끼 전통"
 tr_est_mystery_1:0 "비밀스러운 장막"
 tr_est_mystery_1_delayed:0 "우리 사회는 비밀스런 장막으로 덮여 있으며 사회가 어떻게 작동하는 지에 대한 모든 세부 사항을 아는 사람은 거의 없습니다. 권력의 위치는 불분명한 방식으로 정해지며 다양한 책임과 불분명한 모집 과정을 가지는 수많은 협회와 조직, 길드 및 다양한 책임을 지니는 정당이 사회의 다양한 계층을 구성합니다."
 tr_est_mystery_2:0 "은닉 자산"
 tr_est_mystery_2_desc:0 "§Y고급 전략 자원§! (£nanites£, £sr_dark_matter£, £sr_zro£, £sr_living_metal£) 출력이 §G+33%§! 증가합니다."
 tr_est_mystery_2_delayed:0 "비밀 시설을 통해 우리 제국에서 발견된 귀중한 자원을 생산합니다. 이 불가사의한 시설에서 일하는 사람들은 비밀을 맹세했거나, 바깥 세계와 소통할 수 없는 자이거나 혹은 자신이 수행하는 일의 진정한 목적을 모르는 자들입니다."
 tr_est_mystery_3:0 "금지된 지식의 추구"
 tr_est_mystery_3_delayed:0 "제국 전역의 연구자들이 모이고 모여, 다른 제국에서는 제한되었을 연구를 탐구합니다."
 tr_est_mystery_4:0 "항해사 길드"
 tr_est_mystery_4_delayed:0 "항해사 비밀 길드는 모든 민간 및 군함의 항해를 담당합니다. 비회원은 당사 선박을 취급할 수 없으며 취급할 수 없습니다."
 tr_est_mystery_5:0 "신비주의"
 tr_est_mystery_5_desc:0 "모든 지도자는 약간의 보너스를 주는 §Y신비함§! 특성을 얻습니다."
 tr_est_mystery_5_delayed:0 "우리 사회의 많은 권력자들은 초 자연적인 힘에 기인합니다. 그들이 소유한 모든 권력에 대해선 알려진 것이 없습니다."
 tr_est_mystery_finish:0 "수수께끼 전통 완료"
 tradition_est_nature:0 "자연"
 tradition_est_nature_desc:0 "우리의 삶은 자연에서 시작되었습니다. 우리가 별에 손을 뻗을 때, 우리의 뿌리를 잊지 않도록 보잘것 없었던 우리의 시작을 기억해야합니다."
 tradition_est_nature_hive_desc:0 "우리의 정신은 한계가 없고 가장 단순한 생물부터 우리 세계의 대지에 이르기까지 모든 것에 깃들어 있습니다."
 tradition_est_nature_machines_desc:0 "자연은 우리에게 없는 모든 것을 아우르고 있습니다. 자연을 우리 일부로 받아들이는 것이야말로 진정한 완벽에 닿을 수 있는 유일한 길입니다."
 tr_est_nature_adopt:0 "자연 전통"
 tr_est_nature_adopt_hive:0 "자연 감독관"
 tr_est_nature_adopt_machines:0 "자연을 위한 프로토콜"
 tr_est_nature_1:0 "적응 사회"
 tr_est_nature_1_delayed:0 "우리는 우리의 필요에 맞게 환경을 바꾸기 보다는 우리의 삶을 주변 환경에 적응시키는 법을 배웠습니다."
 tr_est_nature_1_GC:0 "검소"
 tr_est_nature_1_GC_delayed:0 "자연이 우리에게 주는 자원은 한정 되어 있습니다. 낭비적인 문명을 이룩하는 것은 그 풍요로운 선물을 갚아 나갈 때 좋지 않은 방법이 될 것입니다."
 tr_est_nature_2:0 "풍요로운 자연"
 tr_est_nature_2_desc:0 "모든 행성에 §G2§! 개의 무작위 자원을 생성합니다 (우리가 획득하는 새로운 행성도 포함되며, 각 행성은 한 번만 영향을 받을 수 있습니다)."
 tr_est_nature_2_delayed:0 "우리 주변의 자연에는 찾아내고 알아 볼 수만 있다면 활용 할 수 있는 자원이 가득합니다."
 tr_est_nature_3:0 "자급자족"
 tr_est_nature_3_delayed:0 "중앙 집중 방식의 식량 생산에만 의존하지 않고도, 우리는 스스로 식량을 만들어낼 수 있어 어느 정도 자급 자족이 가능합니다."
 tr_est_nature_3_GC:0 "$tr_est_nature_4$"
 tr_est_nature_3_GC_delayed:0 "$tr_est_nature_4_delayed$"
 tr_est_nature_4:0 "자연과 하나되다"
 tr_est_nature_4_delayed:0 "우리 사회를 위한 길을 만들기 위해 자연을 밀어내는 대신 우리는 자연 속에서 최소한의 파괴로 우리 자신을 위한 공간을 건설하는 법을 배웠습니다."
 tr_est_nature_4_hive:0 "자연 통합"
 tr_est_nature_4_hive_desc:0 "새로 식민지화된 행성의 ['concept_blocker'] 당 §G4§! £influence£ §Y영향력§!을 받습니다."
 tr_est_nature_4_hive_delayed:0 "새로운 행성에 도착했을 때 우리는 자연 생태계를 통제하려고 애쓰지 말아야 하며, 오히려 그것을 우리 마음에 통합하여 우리의 일부로 만들려고 노력해야 합니다."
 tr_est_nature_4_machines:0 "대립하는 힘"
 tr_est_nature_4_machines_desc:0 "새로 식민지화된 행성의 ['concept_blocker']마다 §G4§! £influence£ §Y영향력§!을 받습니다."
 tr_est_nature_4_machines_delayed:0 "우리의 본질은 우리를 감싸는 자연과 정반대지만, 우리는 하나입니다. 우리의 통일성에 존재하는 모순이 우리를 강하게 만드는 것입니다."
 tr_est_nature_5:0 "반 소비지상주의"
 tr_est_nature_5_delayed:0 "다른 이들은 물질적인 것을 가치 있게 여기지만 우리는 그런 열등한 것보다 높은 것을 추구합니다."
 tr_est_nature_5_GC:0 "보존"
 tr_est_nature_5_GC_desc:0 "§H건물 잠금 해제:§! £building£ ['building:building_est_nature_preservation']\n이 건물은 §ETier II 이상 자본 건물§! 업그레이드가 필요합니다. 보호구역이 파괴되거나 철거된 후 £stability£ §Y행성 안정성§!을 §R-10§!만큼 §H10§!년 동안 감소시킵니다.\n\n"
 tr_est_nature_5_GC_delayed:0 "각 행성마다 고유한 생태계가 있고, 우리는 자연의 질서를 최대한 방해하지 않도록 노력해야합니다."
 tr_est_nature_5_GC_AI:0 "보존"
 tr_est_nature_5_GC_AI_delayed:0 "모든 행성에는 은하계에서 고유한 자연 서식지가 있습니다. 우리가 개척하기 전의 상태를 유지하려면 최소한 일부는 방해받지 않도록 보존해야만 합니다."
 tr_est_nature_finish:0 "자연 전통 완료"
 tr_est_nature_finish_desc:0 "§H건물 잠금 해제:§! £building£ ['building:building_est_nature_preservation']\n이 건물은 §ETier II 이상의 수도 건물§! 업그레이드가 필요합니다. 보호구역이 파괴되거나 철거된 후 £stability£ §Y행성 안정성§!을 §R-10§!만큼 §H10§!년 동안 감소시킵니다.\n\n"
 tr_est_nature_finish_hive:0 "$tr_est_nature_finish$"
 tr_est_nature_finish_machines:0 "$tr_est_nature_finish$"
 tradition_est_omnipresence:0 "편재"
 tradition_est_omnipresence_desc:0 "우리는 하나고, 우리는 모든 곳에 존재합니다. 우리는 일개 드론 하나의 사소한 움직임 뿐만이 아니라 제국의 운명을 결정하는 거대한 계획까지 모든 것을 통제할 수 있습니다."
 tr_est_omnipresence_adopt:0 "편재 전통"
 tr_est_omnipresence_1:0 "종합 정보 처리"
 tr_est_omnipresence_1_delayed:0 "모든 드론의 경험으로부터 동시에 배우며, 전체 정보로부터 패턴을 추출하여 크고 작은 장애물에 대해 알아갈 수 있습니다."
 tr_est_omnipresence_2:0 "완전한 드론 통제"
 tr_est_omnipresence_2_delayed:0 "기반 시설의 중요 기능을 우선시하고, 사전에 드론을 직접 통제하여 생산성을 향상시킵니다."
 tr_est_omnipresence_3:0 "용량 증가"
 tr_est_omnipresence_3_delayed:0 "우리의 영역이 커짐에 따라, 새로운 드론을 수용하기 위해 신경 또한 확장되어야합니다."
 tr_est_omnipresence_4:0 "표준 통제 양식"
 tr_est_omnipresence_4_delayed:0 "일탈은 곧 비효율입니다. 동일한 작업을 수행하는 드론들에게 표준 통제 양식을 적용하며, 일탈이 발생할 경우 오류를 바로잡기 위해 즉시 그 드론을 직접 통제합니다."
 tr_est_omnipresence_5:0 "신경 접합체 강화"
 tr_est_omnipresence_5_delayed:0 "군체의 신경 접합체를 개선하는 것으로, 더 오랜 시간 동안 더 많은 드론들을 동시 통제할 수 있습니다."
 tr_est_omnipresence_5_machines:0 "송신탑"
 tr_est_omnipresence_5_machines_delayed:0 "제국의 끝자락에서는 군체의 명령이 소실되거나 잘못 해석될 수 있습니다. 반복기 탑을 다수 연결하여 엄청난 거리에 있는 드론에게도 명령을 내릴 수 있습니다."
 tr_est_omnipresence_finish:0 "편재 전통 완료"
 tradition_est_order:0 "질서"
 tradition_est_order_desc:0 "거대한 세상 속에서 모든 존재는 저마다의 역할이 있습니다. 자신에게 맡겨진 임무를 수행하는 것이 모두의 의무입니다."
 tr_est_order_adopt:0 "질서 전통"
 tr_est_order_1:0 "선전부"
 tr_est_order_1_desc:0 "§Y진영§! 억제는 £influence£ §Y영향력§!의 절반만 소모하며 £happiness£ §Y진영 행복도§!를 §G-10%§!만큼 감소시킵니다. 또한, §Y$MOD_POP_GOVERNMENT_ETHIC_ATTRACTION$§!이 §G+10%§! 증가합니다."
 tr_est_order_1_delayed:0 "국민들은 국가가 원하는 것들만 알아야 합니다. 선전부가 그 역할을 잘 수행하고 있습니다."
 tr_est_order_1_AI:0 "$tr_est_order_1$"
 tr_est_order_1_egali:0 "허위정보 방지"
 tr_est_order_1_egali_delayed:0 "많은 이들이 허위정보를 퍼뜨려 우리 사회를 전복시키려 합니다. 하지만 그들의 시도는 매번 실패로 돌아갈 것입니다."
 tr_est_order_2:0 "정당 승인 제도"
 tr_est_order_2_desc:0 "모든 §Y파벌§!의 £happiness£ §Y행복§!이 §G+10%§! 증가합니다."
 tr_est_order_2_delayed:0 "국민들이 자유롭게 정당을 형성하도록 내버려두면 안됩니다. 제국의 승인을 받은 정당만이 정치적 활동을 할 수 있습니다."
 tr_est_order_2_egali:0 "정치적 안정"
 tr_est_order_2_egali_desc:0 "모든 §Y파벌§!의 £happiness£ §Y행복§!이 §G+10%§! 증가합니다."
 tr_est_order_2_egali_delayed:0 "제국이 점점 거대해져감에 따라 정치적 안정을 유지하기 위한 노력이 더 요구되고 있습니다. 모든 당과 의원들은 정치적 구조가 잘 돌아가도록 힘써야 할 의무와 책임이 있습니다."
 tr_est_order_3:0 "표준화된 작업 일정"
 tr_est_order_3_delayed:0 "제국의 생산력을 높이기 위해 작업 일정을 표준화했습니다. 모든 근로자들은 똑같은 환경에서 일하게 될 것입니다."
 tr_est_order_3_slavery_authoritarian:0 "§Y권위주의 제국에 적합한 변동치§!"
 tr_est_order_4:0 "규제된 사회"
 tr_est_order_4_delayed:0 "국민들의 행동을, 아주 작은 것까지 규제해야 합니다. 또한 모든 국민들이 지금 무엇을 하는지 국가는 항상 그것을 알아야 합니다. 이러한 조치로 우리 사회는 혼돈에 빠지지 않을 것입니다."
 tr_est_order_4_auth:0 "출산 의무제"
 tr_est_order_4_auth_delayed:0 "지금까지 출산은 자유로운 개인의 선택이었고, 규제가 없었습니다. 하지만 제국이 확장됨에 따라 우리 사회가 가진 인구의 불확실성이 점점 커져 감당할 수 없을 지경까지 이르렀습니다. 우리는 이제 매년 지방 정부가 인구를 얼마만큼 늘릴 것인지 계획하고, 국민들이 출산을 하도록 강제합니다."
 tr_est_order_5:0 "국유화"
 tr_est_order_5_delayed:0 "그 어떠한 것이든 정부가 감독하고 통제해야 합니다. 제국의 효율성을 유지하려면 부주의한 개인들에게 정부의 기관을 맡겨서는 안됩니다."
 tr_est_order_5_egali:0 "권리와 의무"
 tr_est_order_5_egali_delayed:0 "우리 국민들은 그들이 권리를 가진 것 처럼, 의무 또한 가지고 있습니다. 우리 국민들 역시 자신이 의무를 다함으로써 권리가 보장된다는 것을 잘 알고 있습니다."
 tr_est_order_finish:0 "질서 전통 완료"
 tradition_est_perseverance:0 "인내"
 tradition_est_perseverance_desc:0 "고난의 시간입니다. 외부로부터의 침략과 은하계의 비참함이 우리를 괴롭히고 있지만, 우리는 이 시련을 견뎌 낼 것입니다."
 tr_est_perseverance_adopt:0 "인내 전통"
 tr_est_perseverance_1:0 "탄력성"
 tr_est_perseverance_1_delayed:0 "우리의 적들은 우리를 파멸시키려 할 것입니다. 하지만 그 어떠한 시련에도, 우리는 무너지지 않을 것입니다."
 tr_est_perseverance_2:0 "고집"
 tr_est_perseverance_2_delayed:0 "그 어떠한 수난도 우리는 피하지 않을 것입니다. 흔들리지 않을 것입니다. 우리는 일단 결정을 내리면 주저하거나 망설이지 않고 해야 할 일을 할 것입니다."
 tr_est_perseverance_3:0 "방어자"
 tr_est_perseverance_3_delayed:0 "공격적인 전술은 가끔은 이기겠지요. 아주 가끔은 전쟁을 승리로 이끌 수 있을 것입니다. 하지만 오직 튼튼히 요새화된 국경선만이 우리 제국을 세월의 풍파에서 견디게 해줄 것입니다."
 tr_est_perseverance_4:0 "끝없는 인내"
 tr_est_perseverance_4_delayed:0 "이것 또한 지나가리라."
 tr_est_perseverance_5:0 "보복주의"
 tr_est_perseverance_5_desc:0 "£influence£ §Y영향력 획득§!이 §Y라이벌§!로부터 §G+25%§! 증가합니다. 또한, 전쟁에서 패배할 때마다 우리의 §Y자원 생산량§!과 §Y$MOD_SHIP_FIRE_RATE_MULT$§!이 §G+10%§! 증가하며, 이는 §H20§!년 동안 지속됩니다."
 tr_est_perseverance_5_no_rivals_desc:0 "§Y전쟁 피로도 증가§!가 §G-10%§! 감소합니다. 또한, 전쟁에서 패배할 때마다 우리의 §Y자원 생산량§!과 §Y$MOD_SHIP_FIRE_RATE_MULT$§!이 §G+10%§! 증가하며, 이는 §H20§!년 동안 지속됩니다."
 tr_est_perseverance_5_delayed:0 "강인한 자가 나약한 자와 다른 점은 패배에서 포기하지 않는 것입니다."
 tr_est_perseverance_finish:0 "인내 전통 완료"
 tr_est_perseverance_finish_machines:0 "$tr_est_perseverance_finish$"
 tradition_est_philosophy:0 "철학"
 tradition_est_philosophy_desc:0 "우리는 한낱 필멸자들이 믿는 것처럼 우주의 일부 따위가 아닙니다. 우리는 모든 시간대와 모든 공간에 걸쳐 가장 신비롭고 가장 현명한 존재입니다."
 tr_est_philosophy_adopt:0 "철학 전통"
 tr_est_philosophy_1:0 "우주의 본질"
 tr_est_philosophy_1_delayed:0 "우리가 처음 깨어났을 때, 우주가 있었습니다. 그리고 우리가 잠들기 직전까지도 우주는 계속 존재할 것입니다. 우주는 그 무엇보다도 영원한 존재입니다."
 tr_est_philosophy_2:0 "장막의 본질"
 tr_est_philosophy_2_delayed:0 "장막은 환상적이고, 아마도 현실이 될 수 있겠지만, 적어도 아직은 아닙니다. 장막의 본질은 무엇일까요?"
 tr_est_philosophy_3:0 "필멸의 본질"
 tr_est_philosophy_3_desc:0 "외국 제국 £opinion£ §Y여론§!이 §G+20§! 증가합니다. §Y$MOD_SHIP_WEAPON_DAMAGE$§!이 §G+5%§! 증가하며 §H비형상화§! 제국과 전투할 때 적용됩니다."
 tr_est_philosophy_3_no_dip_desc:0 "§Y$MOD_SHIP_WEAPON_DAMAGE$§!이 §G+10%§! 증가합니다. 전투 중 §H비유기적§! 제국과 싸울 때입니다."
 tr_est_philosophy_3_delayed:0 "필멸자들은 호기심이 많습니다. 그들의 삶은 변덕스럽고, 그들의 마음은 약합니다."
 tr_est_philosophy_4:0 "우리 자신의 본질"
 tr_est_philosophy_4_delayed:0 "우리는 왜 존재합니까? 어떤 존재가 우리를 만들었고, 어떤 존재가 우리를 죽일 수 있는 겁니까?"
 tr_est_philosophy_5:0 "존재의 본질"
 tr_est_philosophy_5_delayed:0 "존재하지 않을 수도 있었을텐데, 어째서 존재하는 걸까요?"
 tr_est_philosophy_5_virtual_machines:0 "존재의 본질"
 tr_est_philosophy_5_virtual_machines_delayed:0 "우리는 물리적 물질에 의해 드리워진 그림자에 불과해졌습니다."
 tr_est_philosophy_finish:0 "철학 전통 완료"
 tradition_est_piracy:0 "해적"
 tradition_est_piracy_desc:0 "은하의 막대한 자원이 우리 제국의 앞에 놓여있습니다. 그것이 누구의 것인지는 중요치 않습니다. 우리가 빼앗을 것입니다."
 tr_est_piracy_adopt:0 "해적 전통"
 tr_est_piracy_adopt_desc:0 "전쟁 중에는 £minerals£ §Y광물§!, £energy£ §Y에너지§! 및 £trade£ §Y무역§! 생산량이 §G+5%§! 증가합니다."
 tr_est_piracy_1:0 "무자비한 싸움꾼"
 tr_est_piracy_1_delayed:0 "자비는 약자를 위한 것이며 우리 문화에서는 설 자리가 없습니다."
 tr_est_piracy_2:0 "약탈자들"
 tr_est_piracy_2_desc:0 "적의 함선과 기지를 파괴하면 £minerals£ §Y광물§!를 얻습니다. 양은 §G증가§! 함선이나 기지의 크기에 따라 증가하며, 기지가 파괴될 경우에는 더 많은 양을 얻습니다."
 tr_est_piracy_2_delayed:0 "우리의 숙련된 약탈자들은 작고 빠른 함선을 타고 인접한 제국의 무방비한 무역선과 식민지를 공격할 수 있습니다. 그리고 조금만 두들겨 주면 그들은 가치있는 물건들을 내놓게 되지요."
 tr_est_piracy_3:0 "약탈"
 tr_est_piracy_3_desc:0 "§Y약탈§! 정책이 해제되어 £trade_value£ §Y무역 가치§!가 §G5%§!/§G10%§!/§G20%§! 증가하며, 외국 제국의 £opinion£ §Y의견§!이 §R-15§!/§R-30§!/§R-50§! 감소합니다."
 tr_est_piracy_3_delayed:0 "우리는 노련한 약탈자들입니다. 다른 제국의 국경 넘어로 작은 약탈대를 보내어 무방비한 정착지와 무역선을 공격할 수 있습니다. 가치있는 것은 모조리 빼앗고 사라질 것입니다."
 tr_est_piracy_4:0 "사보타주"
 tr_est_piracy_4_desc:0 "모든 우리의 §H경쟁자§!에 대해 £food£ §Y식량§!과 £minerals£ §Y광물§! 생산량을 §R-10%§! 줄이고 §Y건물 유지비§!를 §R+10%§! 증가시킵니다. §Y$MOD_COUNTRY_MAX_RIVALRIES$§!가 §G1§! 증가합니다."
 tr_est_piracy_4_delayed:0 "우리는 적들을 사랑하지 않습니다. 우리는 성공할 필요가 없고, 저들을 실패하게만 만들면 좋습니다. 이를 위해, 우리는 보다 비열한 전술도 사용할 것입니다."
 tr_est_piracy_4_other:0 "$tr_est_piracy_4$"
 tr_est_piracy_5:0 "힘의 권리"
 tr_est_piracy_5_desc:0 "모든 £pop_cat_ruler£ §Y지배자 팝§!의 £happiness£ §Y$MOD_POP_HAPPINESS$§!가 §G+15%§! 증가하고, 모든 £pop_cat_worker£ §Y노동자 팝§!의 §Y정치적 영향력§!가 §G-25%§! 감소합니다."
 tr_est_piracy_5_delayed:0 "강자가 약자를 지배하는 것은 자연의 순리 그 자체입니다."
 tr_est_piracy_5_slavery:0 "$tr_est_piracy_5$"
 tr_est_piracy_5_slavery_desc:0 "모든 £pop_cat_ruler£ §Y지배자 팝§!의 £happiness£ §Y$MOD_POP_HAPPINESS$§!가 §G+15%§! 증가하며, 모든 £pop_cat_worker£ §Y노동자§!와 £pop_cat_slave£ §Y노예 팝§!의 §Y정치적 영향력§!는 §G-25%§! 감소합니다."
 tr_est_piracy_5_nice:0 "자유로운 영혼"
 tr_est_piracy_5_nice_delayed:0 "인생은 그 자체로 하나의 모험이고, 그 어떠한 것도 우리를 붙잡아 둘 수 없습니다."
 tr_est_piracy_5_hive:0 "이종식"
 tr_est_piracy_5_hive_desc:0 "행성을 성공적으로 침공할 때마다 해당 행성의 §Y팝§! 당 §Y10§! £food£ 식량을 생성합니다. $tr_est_piracy_2$ 전통 또한 £food£ 식량을 생성합니다."
 tr_est_piracy_5_hive_delayed:0 "우리는 먹을것에 대해 그다지 까다롭지 않고, 그저 먹을 수 있는 것들을 먹을 뿐입니다. 그리고 필멸자들의 육체는 귀중한 단백질 공급원이지요."
 tr_est_piracy_5_hive_livestock:0 "이종식"
 tr_est_piracy_5_hive_livestock_desc:0 "행성을 성공적으로 침공할 때마다 해당 행성의 £pop£ §Y팝§! 당 §Y10§! £food£ 식량을 생성합니다. $tr_est_piracy_2$ 전통 또한 £food£ 식량을 생성합니다. §Y가축§!은 추가로 §Y1§!의 £food£ 식량을 생성합니다."
 tr_est_piracy_5_hive_livestock_delayed:0 "우리는 먹을것에 대해 그다지 까다롭지 않고, 그저 먹을 수 있는 것들을 먹을 뿐입니다. 그리고 필멸자들의 육체는 귀중한 단백질 공급원이지요."
 tr_est_piracy_5_machines:0 "기계 재활용"
 tr_est_piracy_5_machines_desc:0 "정복한 행성에서 §Y3§! 기계 £pop£ §Y팝§!을 생성합니다."
 tr_est_piracy_5_machines_delayed:0 "은하 전역에서 어떠한 용도로든 기계들이 사용됩니다. 그것들이 우리만큼 좋다고 할 수 없겠지만, 그래도 우리가 쓸 수는 있지 않겠습니까?"
 tr_est_piracy_finish:0 "해적 전통 완료"
 tr_est_piracy_finish_effect:0 "우리는 행성을 성공적으로 침략할 때마다 £minerals£ §Y광물§!을 받습니다. 또한 그 행성의 §Y자원 생산량§!은 §R-25%§!만큼 감소하며, 이는 §H10§!년 동안 지속됩니다 (§E이 수정자는 우리가 그 행성을 정복하면 제거됩니다§!)."
 tradition_est_proselytism:0 "선교"
 tradition_est_proselytism_desc:0 "우리의 이념은 옳고 다른 이들의 것보다 더 우수합니다. 우리의 이념을 전 은하계에 전파하는 것이 우리의 의무입니다."
 tr_est_proselytism_adopt:0 "선교 전통"
 tr_est_proselytism_1:0 "선교사"
 tr_est_proselytism_1_desc:0 "인근 제국에서 우리의 §Y윤리관§!에 대한 §Y윤리관 매력도§!이 §G+25%§! 증가합니다 (효과는 §Y광신적 윤리관§!에 대해 §E2배§! 됩니다). §Y$MOD_POP_GOVERNMENT_ETHIC_ATTRACTION$§!이 §G+5%§! 증가합니다."
 tr_est_proselytism_1_delayed:0 "우리 선교사들은 국경을 오가며 미개한 이웃 국가의 대중들을 계몽시킬 것입니다."
 tr_est_proselytism_2:0 "십자군"
 tr_est_proselytism_2_desc:0 "§Y$MOD_SHIP_FIRE_RATE_MULT$§!를 §G+10%§! 증가시키고, §Y$MOD_ARMY_MORALE$§!을 §G+25%§! 증가시키며, §Y$MOD_COUNTRY_NAVAL_CAP_MULT$§!을 §G+15%§! 증가시키고, §Y함선 건조 속도§!를 §G+15%§! 증가시킵니다. 단, 우리가 §R전쟁§! 중이며, 적어도 하나의 반대 §H윤리관§!을 가진 §H전쟁 지도자§!와 함께할 때에 한합니다."
 tr_est_proselytism_2_delayed:0 "평화적인 방법으로 저들을 계몽시키지 못한다면 무력이 나설 차례입니다. 이 전쟁은 결국 그들에게 좋은 일이 될 것입니다."
 tr_est_proselytism_3:0 "동화 정책"
 tr_est_proselytism_3_desc:0 "정복된 £pops£ §Y팝§!은 §Y최근 정복§! 페널티를 받지 않습니다."
 tr_est_proselytism_3_delayed:0 "우리 이념을 따르는 사람들이 많아질 수록 그들을 더 철저하게 동화시켜야 합니다."
 tr_est_proselytism_4:0 "애국심"
 tr_est_proselytism_4_desc:0 "모든 우리의 §H주제§! 제국에서 우리의 §E윤리관§!에 대한 §Y윤리관 매력도§!이 §G+25%§! 증가합니다 (효과는 §Y광신적 윤리관§!에 대해 두 배로 증가합니다). §Y$MOD_COUNTRY_EDICT_FUND_ADD$§!가 §G20§! 증가합니다."
 tr_est_proselytism_4_delayed:0 "모든 국민들이 우리 제국에 충성하는지 확인해야만 합니다. 감시원들이 우리 식민지를 순찰하며 그곳의 국민들이 우리 이념을 똑바로 따르는지 확인할 것입니다."
 tr_est_proselytism_5:0 "예외주의"
 tr_est_proselytism_5_desc:0 "모든 £pops£ §Y팝§!의 £happiness£ §Y$MOD_POP_HAPPINESS$§!가 §G+5%§! 증가하며, 우리의 £unity£ §Y$unity$§! 생산량이 §G+10%§! 증가합니다. 이는 §H20§!년 동안 유지되며, §R전쟁§!에서 승리한 후 적용됩니다. §R전쟁§!에서 패할 경우 보너스는 사라집니다."
 tr_est_proselytism_5_delayed:0 "우리 제국은 다른 제국들보다 월등히 뛰어납니다. 은하계의 다른 '잘못된' 제국들은 우리 제국에 병합되거나 우리 제국의 이념을 따라야 할 것입니다. 우리는 결국 어느 것이 옳았는지 똑똑히 보여줄 것입니다."
 tr_est_proselytism_finish:0 "선교 전통 완료"
 tradition_est_purposefulness:0 "목적성"
 tradition_est_purposefulness_desc:0 "이 은하에서 우리의 존재는 우연의 결과가 아닙니다. 우리는 이유가 있어 여기 있으며, 우리의 목적을 충족하기 위해 존재합니다."
 tr_est_purposefulness_adopt:0 "목적성 전통"
 tr_est_purposefulness_1:0 "하나의 목적"
 tr_est_purposefulness_1_delayed:0 "우리의 임무는 웅장하지만, 우리는 주저하지 않고 이를 완수할 것입니다."
 tr_est_purposefulness_2:0 "성공을 위한 수단"
 tr_est_purposefulness_2_delayed:0 "우리가 깨어났을 때, 우리는 단순히 목적을 부여받은 것이 아니라, 그것을 충족할 수 있는 수단도 부여받았습니다."
 tr_est_purposefulness_3:0 "폭력의 선택"
 tr_est_purposefulness_3_delayed:0 "임무의 완수는 가장 중요합니다. 은하의 다른 존재들에게 피해를 주는 것은 불행할 수 있지만, 중요하지 않습니다."
 tr_est_purposefulness_4:0 "결단력"
 tr_est_purposefulness_4_delayed:0 "우리는 주저하지 않을 것이며 실패하지도 않을 것입니다. 우리는 성공할 것입니다."
 tr_est_purposefulness_5:0 "뿌리 깊은 드론 반사신경"
 tr_est_purposefulness_5_delayed:0 "가장 사소한 드론조차도 기초적인 목적 의식을 가지고 있어, 이를 통해 일상적인 작업을 더 잘 수행하도록 안내받습니다."
 tr_est_purposefulness_finish:0 "목적성 전통 완료"
 tradition_est_serverbound:0 "준비된 서버"
 tradition_est_serverbound_desc:0 "행성 표면 아래에 묻혀 있는 거대한 서버실은 엄청난 처리 능력을 제공하여 우리의 정신력을 확장시킬 수 있습니다."
 tr_est_serverbound_adopt:0 "준비된 서버 전통"
 tr_est_serverbound_1:0 "메모리 저장소"
 tr_est_serverbound_1_delayed:0 "우리는 각성 이후 수집한 모든 유형의 정보로 방대한 메모리 저장소를 유지했습니다. 어떤 정보가 유용할지 알 수 없지만 일부는 확실히 유용할 것입니다."
 tr_est_serverbound_2:0 "데이터베이스 훈련"
 tr_est_serverbound_2_desc:0 "모든 §Y지도자§!는 느린 속도로 §G경험치§! 포인트를 수동적으로 얻습니다."
 tr_est_serverbound_2_delayed:0 "우리의 자율 드론은 우리가 경험하는 다양한 시나리오에서 방대한 양의 데이터를 수집합니다. 이 데이터를 데이터베이스에 저장하면 시뮬레이션과 평가를 실행하여 현재의 자율 드론 프로그램을 훈련할 수 있습니다."
 tr_est_serverbound_3:0 "데이터 코어"
 tr_est_serverbound_3_delayed:0 "우리 제국에서 실행 중인 다양한 시스템을 위한 처리 능력을 제공하기 위해 우리 행성의 표면 아래에 대규모 서버실을 건설할 것입니다."
 tr_est_serverbound_4:0 "조정 터미널"
 tr_est_serverbound_4_delayed:0 "우리는 다양한 수준의 자율성을 가진 방대한 수의 드론을 제어합니다. 이 네트워크를 지원하기 위해 우리는 특수 조정 터미널을 구축할 것입니다. 이 터미널들은 각각 다수의 드론으로부터 정보를 수신하고 마주친 상황에 대한 반응을 조정하는 데 도움이 될 것입니다."
 tr_est_serverbound_5:0 "신호 효과 네트워크"
 tr_est_serverbound_5_delayed:0 "우리가 은하계로 확장해 감에 따라 우리의 이전 신호 시스템은 구식이 되어갔습니다. 그러므로 우리의 행성에 새로운 특수 신호 스테이션을 건설할 것입니다. 막대한 용량을 활용하여 우리 영역 전체에 신호를 효율적으로 전송할 수 있으며, 동시에 장애에 대한 안정성이 향상되었습니다. 이 스테이션은 고품질 전송을 보장하기 위해 여러 경로를 통해 신호가 전달되는 고용량 네트워크를 생성할 것입니다."
 tr_est_serverbound_finish:0 "준비된 서버 전통 완료"
 tradition_est_shroudborn:0 "장막 태생"
 tradition_est_shroudborn_desc:0 "우리는 은하계에서 가장 강력한 사이오닉 존재일지도 모릅니다. 우리와 직접 접촉하려는 필멸자들은 미쳐버리거나 죽어버립니다."
 tradition_est_shroudborn_ap_desc:0 "우리는 스스로를 필멸자 세계의 존재라 생각해왔습니다. 그러나 각성 이후, 우리가 사실은 장막의 존재일지도 모른다는 것을 깨닫기 시작했습니다."
 tr_est_shroudborn_adopt:0 "장막 태생 전통"
 tr_est_shroudborn_1:0 "정신 침입"
 tr_est_shroudborn_1_delayed:0 "우리는 필멸자들의 정신에 침투해 그들의 생각을 읽고 행동을 예측할 수 있습니다."
 tr_est_shroudborn_1_ap:0 "정신 침투"
 tr_est_shroudborn_1_ap_delayed:0 "우리는 다른 이들의 정신에 침투해 그들의 생각을 읽고 행동을 예측할 수 있습니다."
 tr_est_shroudborn_2:0 "정신 억제"
 tr_est_shroudborn_2_desc:0 "§Y$MOD_ARMY_MORALE_DAMAGE_MULT$§!이 §G+20%§! 증가합니다. 또한, §Y스타베이스 영향력 비용§!과 §Y청구 영향력 비용§!이 모든 인접한 §H비형상 적대적§! 제국에 대해 §R+20%§! 증가합니다."
 tr_est_shroudborn_2_delayed:0 "우리는 필멸자들의 정신에 접근하여 그들의 믿음을 의심으로, 그들의 희망을 절망으로 바꿉니다."
 tr_est_shroudborn_2_ap:0 "정신 억제"
 tr_est_shroudborn_2_ap_delayed:0 "우리가 다른 이들의 정신에 접근 할 때 우리는 그들의 사고력을 둔하게 하고 감정을 억제하여 그들의 야망이나 전투 의지를 꺾어버릴 수 있습니다."
 tr_est_shroudborn_3:0 "영원한 감시자"
 tr_est_shroudborn_3_delayed:0 "이 은하계에서 우리는 항상 존재해왔으며, 시간과 삶의 흐름을 지켜봐왔습니다."
 tr_est_shroudborn_3_ap:0 "감시자들"
 tr_est_shroudborn_3_ap_delayed:0 "감시자들은 특별한 사이오닉 집단입니다. 깊은 명상 상태에서 그들의 정신은 장막을 통해 현실 세계를 들여다볼 수 있습니다. 그들은 은하계 전역에서 일어나는 일들에 대한 귀중한 정보를 우리에게 제공합니다."
 tr_est_shroudborn_4:0 "제7감각"
 tr_est_shroudborn_4_delayed:0 "장막과의 연결을 통해 은하를 느끼는 일곱 번째 감각을 발전시켰습니다. 일반적으로는 느끼지 못했던 것입니다."
 mod_tr_psionics_shroudborn_seventh_desc:0 "$tr_est_shroudborn_4$"
 tr_psionics_shroudborn_seventh_desc:0 "§MPsionic§! 전문가로부터의 직업 효율성:"
 tr_est_shroudborn_4_ap:0 "제7차원 의식"
 tr_est_shroudborn_4_ap_delayed:0 "은하 전역에서 우리는 항상 존재하며, 시간과 생명의 흐름을 지켜보고 있습니다."
 tr_est_shroudborn_5:0 "힘의 발현"
 tr_est_shroudborn_5_delayed:0 "우리 정신의 힘은 너무나 강력한 나머지 물리적인 세계에까지 영향을 끼칠 수 있습니다. 우리는 이를 이용해 함선들의 에너지 무기의 화력과 보호막의 강도를 증폭시킬 수 있습니다."
 tr_est_shroudborn_finish:0 "장막 태생 전통 완료"
 tradition_est_spaceborn:0 "우주태생"
 tradition_est_spaceborn_desc:0 "우리가 우주에 진출한 이후로, 이 광활한 공허가 우리의 진정한 고향이라는 것을 알게 되었습니다."
 tr_est_spaceborn_adopt:0 "우주태생 전통"
 tr_est_spaceborn_1:0 "공허의 갈망"
 tr_est_spaceborn_1_delayed:0 "우리가 처음으로 우주 비행을 한 이후로, 우리는 행성을 걷는 동안에도 항상 우주의 공허를 올려다 보았습니다."
 tr_est_spaceborn_1_GC:0 "공허의 부름"
 tr_est_spaceborn_1_GC_delayed:0 "공허가 우리를 부르고 있습니다. 그 안에서, 우리는 평화를 얻을 수 있을 것입니다."
 tr_est_spaceborn_2:0 "우주에서의 삶"
 tr_est_spaceborn_2_delayed:0 "이제 진정으로 우주는 우리의 집이 되었습니다."
 tr_est_spaceborn_3:0 "공허를 걷는자"
 tr_est_spaceborn_3_delayed:0 "우리는 우주의 공허를 돌아다닐 때 진정으로 편안합니다. 우리만큼 우주 여행에 적합한 천성을 가진 이들은 없을 것입니다."
 tr_est_spaceborn_4:0 "별을 바라보다"
 tr_est_spaceborn_4_desc:0 "우리가 통제하는 모든 §Y항성§!은 £energy£ §Y에너지§!를 생산하며, 추가로 §G2§!의 £energy£ §Y에너지§!를 생산합니다."
 tr_est_spaceborn_4_delayed:0 "영원한 어둠속에 흩어져 있는 고독한 빛의 우물. 그 자체로 아름답지만 너무 오랫동안 바라봐서는 안됩니다. 그 매혹적인 광경에 눈을 빼앗겨 미쳐버릴 테니까요."
 tr_est_spaceborn_5:0 "우주 태생"
 tr_est_spaceborn_5_desc:0 "§Y$ap_voidborn$§! 상승 특성을 선택하고 §E및/또는§! §Y메가구조물 해제§!는 이 전통에 새로운 §G보너스§!를 추가합니다.\n\n"
 tr_est_spaceborn_5_megastruct_desc:0 "§Y$ap_voidborn$§! 상승 특성을 선택하면 이 전통에 새로운 §G보너스§!가 추가됩니다."
 tr_est_spaceborn_5_habitat_desc:0 "§Y거대 구조물 잠금 해제§!는 이 전통에 새로운 §G보너스§!를 추가할 것입니다.\n\n정착된 §Y서식지§! 직업 생산량: §G+5%§!"
 tr_est_spaceborn_5_habitat_megastruct_desc:0 "이 전통은 이제 §G모든 보너스§!를 가지고 있습니다! §Y$ap_voidborn$§! 승계 특성을 선택하고 §E및§! §Y메가구조물 잠금 해제§!를 위해서요.\n\n정착된 §Y서식지§! 직업 출력: §G+5%§!"
 tr_est_spaceborn_5_delayed:0 "우리가 처음으로 우주에 도달한 이후로, 우주는 우리의 고향이 되었습니다."
 tr_est_spaceborn_finish:0 "우주태생 전통 완료"
 tradition_est_subminds:0 "부분의식"
 tradition_est_subminds_desc:0 "하나된 의식을 여러 개로 나눔으로써 우리는 광활한 제국을 하나로 묶을 수 있습니다. 여러 개의 부분의식을 자주 융합하고 나누어 영토 전체에 대한 관리에 통일성을 부여합니다."
 tr_est_subminds_adopt:0 "부분의식 전통"
 tr_est_subminds_1:0 "역동적인 의식"
 tr_est_subminds_1_delayed:0 "우리의 의식은 역동적이어서 부분의식을 분할하는 데 익숙합니다. 이를 이용해 자율적인 무인 드론을 더 쉽게 만들 수 있을 것입니다."
 tr_est_subminds_2:0 "미세 융합"
 tr_est_subminds_2_delayed:0 "중앙 의식과 다양한 부분의식 사이의 미세 융합을 지속적으로 반복함으로써 우리는 우리의 수족들이 항상 조화롭게 작동하도록 할 수 있습니다."
 tr_est_subminds_3:0 "부분의식 매개변수 제어"
 tr_est_subminds_3_desc:0 "정책을 해제하여 각 구역의 £minerals£/£energy£/£food£/£engineering£ £physics£ £society£/£unity£ 생산량을 §G+10%§!/§G+10%§!/§G+10%§!/§G+2.5%§!/§G+5%§! 증가시킬 수 있습니다."
 tr_est_subminds_3_machines_desc:0 "섹터의 £minerals£/£energy£/£engineering£ £physics£ £society£/£unity£ 생산량을 §G+10%§!/§G+10%§!/§G+2.5%§!/§G+5%§! 증가시킬 수 있는 정책이 해제됩니다. 한 번에 하나만 활성화할 수 있습니다."
 tr_est_subminds_3_delayed:0 "부분의식을 더욱 신중히 만든다면 그것은 특화된 작업을 더욱 더 잘 할 것입니다."
 tr_est_subminds_4:0 "자율적인 드론"
 tr_est_subminds_4_delayed:0 "우리 제국의 모든 드론들은 각각 작지만 독립적인 의식을 가지고 있습니다. 이 독립성을 잘 이용한다면 제국의 처리 능력은 더욱 개선될 것입니다."
 tr_est_subminds_5:0 "자율적인 항성계 관리"
 tr_est_subminds_5_delayed:0 "모든 항성계는 우리의 부분의식이 지정한 자율적인 시스템에 의해 관리됩니다. 이로써 우리는 더욱 더 큰 작업에 집중할 수 있게 되었습니다."
 tr_est_subminds_finish:0 "부분의식 전통 완료"
 tradition_est_swarm:0 "무리"
 tradition_est_swarm_desc:0 "누군가 쓰러져도, 그 자리를 대신할 수 있는 것은 많습니다."
 tr_est_swarm_adopt:0 "무리 전통"
 tr_est_swarm_1:0 "약탈자"
 tr_est_swarm_1_delayed:0 "우리가 통제하는 드론의 수는 필멸자 제국의 인구보다 훨씬 많습니다. 우리 군대가 접근하면 땅 자체가 움직이는 것처럼 보일 지경입니다."
 tr_est_swarm_2:0 "숫자의 힘"
 tr_est_swarm_2_desc:0 "§Y$MOD_COUNTRY_NAVAL_CAP_MULT$§!이 §G+15%§!증가하고 §Y함대 지휘 한계치§!가 §G+10%§!증가합니다."
 tr_est_swarm_2_delayed:0 "적을 압도하면 승리가 따라옵니다. 우리는 함선을 끊임없이 보내어 아무도 남지 않을 때까지 그들의 군대를 공격할 것입니다."
 tr_est_swarm_3:0 "무리지어 다니는 함대"
 tr_est_swarm_3_desc:0 "§Y초계함 건조 속도§!가 §G+100%§!증가하고 §Y초계함 건조 비용§!이 §G-10%§!감소합니다."
 tr_est_swarm_3_delayed:0 "우리 함대는 다수의 소형 함선으로 구성되어 있습니다. 대형 함선의 수준은 떨어지지만 충분한 수가 있다면 어떤 함대라도 쉽게 파괴할 수 있습니다."
 tr_est_swarm_3_bioship_desc:0 "§Y파괴자 건설 속도§!가 §G+100%§! 증가하고 §Y파괴자 건설 비용§!이 §G-10%§! 감소합니다."
 tr_est_swarm_4:0 "인구 폭발"
 tr_est_swarm_4_desc:0 "새로운 식민지는 §G100§! 추가 £pops£ 팝으로 시작합니다. 또한, §Y$MOD_PLANET_COLONY_DEVELOPMENT_SPEED_MULT$§!가 §G+25%§! 증가합니다."
 tr_est_swarm_4_delayed:0 "일단 행성에 정착하면 많은 수의 드론이 빠르게 생산되고, 이에 따라 인구 수가 폭발적으로 증가합니다. 얼마 전까지만 해도 조용했던 행성이 갑자기 활기로 가득 차게 될 것입니다."
 tr_est_swarm_4_wilderness:0 "지역 생물량 수확"
 tr_est_swarm_4_wilderness_desc:0 "행성의 테라포밍 속도가 §G20%§! 증가합니다. 행성을 §E식민지화/테라포밍§! 할 때 §G+100§! £biomass£ §Y바이오매스§!를 얻습니다."
 tr_est_swarm_4_wilderness_delayed:0 "우리는 외부 생물량을 우리의 구조에 합병하는 방법을 배워, 확장과 성장을 가속화했습니다."
 tr_est_swarm_5:0 "은하계를 통한 확산"
 tr_est_swarm_5_desc:0 "§Y개척선§!이 건조될 때 §Y개척선§!이 하나 더 생겨납니다."
 tr_est_swarm_5_delayed:0 "우리는 거의 전염병처럼 은하계 전체에 퍼지고 있습니다. 한 행성에 정착하고 뒤이어 주변의 행성으로 퍼져나갈 것입니다. 개척되지 않은 모든 행성에 조만간 우리의 손길이 닿을 것입니다."
 tr_est_swarm_5_wilderness_desc:0 "['technology:tech_terrestrial_sculpting'] 연구를 수행할 수 있는 능력이 해제됩니다. 연구가 완료되면 §Y전초기지 비용§!이 §G20%§! 감소합니다."
 tr_est_swarm_finish:0 "무리 전통 완료"
 tradition_est_venerability:0 "존경"
 tradition_est_venerability_desc:0 "우리는 별들 사이에서 공허의 차가운 포옹을 위해 고향의 안락함을 떠난 이 은하계 최초의 존재들 중 하나였습니다. 그리고 그 최초의 존재들 중에서 우리만 살아남았습니다."
 tr_est_venerability_adopt:0 "존경 전통"
 tr_est_venerability_adopt_machines:0 "취약성 프로토콜"
 tr_est_venerability_1:0 "자부심"
 tr_est_venerability_1_delayed:0 "많은 이들이 영광의 길을 따르다 실패 하곤 합니다. 다른 이들이 역경 앞에 넘어지고 방황하며 쓰러질 때 우리는 그 역경을 이겨낸 것에 자부심을 느낍니다."
 tr_est_venerability_2:0 "우월함"
 tr_est_venerability_2_delayed:0 "우리는 적들의 조상이 항성의 핵융합을 이해하기 전에 별들 사이를 여행했습니다. 이 은하계의 신생 종족은 우월한 자들의 명령에 귀를 기울이며 자신들의 위치를 깨닫게 될 것입니다."
 tr_est_venerability_2_devouring_swarm:0 "$tr_est_venerability_2$"
 tr_est_venerability_2_devouring_swarm_desc:0 "유기체 £pop£ §Y팝§!를 섭취하여 추가로 §G+50%§! £society£ §Y사회학 연구§!를 얻습니다."
 tr_est_venerability_2_devouring_swarm_delayed:0 "우리는 적들의 조상이 눈을 뜨지도 못했을 때 별들을 바라보았습니다. 이 은하계의 어린 종족들은 우수한 자들의 힘에 굴복할 것입니다."
 tr_est_venerability_2_terminator:0 "$tr_est_venerability_2$"
 tr_est_venerability_2_terminator_desc:0 "유기체 £pop£ §Y팝§!을 정화하면 £unity£ §Y통합력§!을 §G+50%§! 더 얻습니다."
 tr_est_venerability_2_terminator_delayed:0 "$tr_est_venerability_2_devouring_swarm_delayed$"
 tr_est_venerability_2_assimilators:0 "$tr_est_venerability_2$"
 tr_est_venerability_2_assimilators_delayed:0 "$tr_est_venerability_2_devouring_swarm_delayed$"
 tr_est_venerability_3:0 "지혜"
 tr_est_venerability_3_delayed:0 "시간은 우리 민족에게 지혜의 선물을 주었습니다. 우리는 보았습니다. 우리는 피를 흘렸습니다. 그러나 무엇보다도 우리는 살아남았습니다."
 tr_est_venerability_4:0 "고대 지식"
 tr_est_venerability_4_delayed:0 "우리는 영겁의 세월 동안 쌓아올린 지식의 위에 서 있습니다. 일부는 그대의 고향이 굳어지기도 전에 쌓아 올렸고, 또 어떤 것은 오래된 기억 속의 제국에게서 약탈했습니다."
 tr_est_venerability_5:0 "순환의 길"
 tr_est_venerability_5_desc:0 "§Y$MOD_SHIP_WEAPON_DAMAGE$§!이 §G+5%§! 증가하고 §Y회피§!가 §G+5%§! 증가합니다. 다른 제국의 £opinion£ §Y우호도§!가 §G+10§! 증가합니다."
 tr_est_venerability_5_delayed:0 "모든 제국은 탄생과 멸망이라는 순환 속에 존재합니다. 은하 공동체 뿐만 아니라, 우리는 그 모든 제국이 똑같은 뻔한 길을 따라가는 것을 지켜보았습니다."
 tr_est_venerability_5_no_dip:0 "$tr_est_venerability_5$"
 tr_est_venerability_5_no_dip_delayed:0 "이 필멸자들이 번식하고 죽는 동안 우리는 살아남았습니다. 각자가 스스로를 독특하다고 믿지만, 여전히 그들의 선조들처럼 뻔합니다. 과거에도 그러했듯이, 우리는 저들을 파괴할 것입니다."
 tr_est_venerability_finish:0 "존경 전통 완료"
