l_korean:
 mem_mountain_guardian_ship:0 "수호자"
 mem_mountain_guardian_ship_plural:0 "수호자들"
 mem_mountain_guardian_key:0 ""
 mem_mountain_gas_giant_dig_site:0 "고리 정거장"
 mem_mountain_gas_giant_dig_site_desc:0 "§Y[From.Planet.GetName]§! 주의에 인공적인 고리가 하나 있습니다 - 잊힌 지 오래인 문명의 우주 정거장입니다.\n\n이 정거장에서 발견된 기술은 성계에서 발견된 잔해들과 일치합니다. 근처의 달을 둘러싸는 보호막의 발생기도 그 안에 있을 것입니다.."
 mem_mountain_moon_dig_site:0 "거대한 산"
 mem_mountain_moon_dig_site_desc:0 "이 황폐한 행성의 유일한 흥미로운 점은 극에 있는 거대한 산 하나입니다. 산속에 착륙장, 터널들과 다른 구조들이 외계인 방문자들을 맞이할 준비가 되어 있습니다."
 mem_mountain.1.name:0 "고리 정거장"
 mem_mountain.1.desc:0 "§Y[From.GetName]§! 주위를 도는 원형 정거리는 비교적 온전해 보이며, 인근 행성을 둘러싼 힘의 장의 주요 원인으로 보입니다. \n\n더 많은 정보를 알아내기 위해서는 적절한 고고학 탐사가 필요합니다."
 mem_mountain.10.name:0 "경유지"
 mem_mountain.10.desc:0 "§Y[Leader.GetName]§! 은(는) 정거장의 목적에 대한 [Leader.GetHerHis]의 발견을 보고할 준비가 되었습니다. \"경유지\"라 이름 지은 이 시설은 이중 목적을 가지고 한 민간 군사 회사에 의해 운영되었습니다: 성계 전체를 지키는 군사 기지와 근처의 보호막으로 둘러싸인 위성과 연결된 운송 중심지. 이 시설이 사용되었던 시기는 불확실하지만, 최소 수백 년 전에 사용되었던 것으로 보입니다. 회사의 계약자는 지금은 없지만, 과거 우주의 이 구역에서 상당한 영향력을 지녔던 종교 단체였던 것으로 보입니다. [From.Planet.Solar_System.GetName]의 중요성 또한 여전히 불분명합니다"
 mem_mountain.11.name:0 "성지"
 mem_mountain.11.desc:0 "우리의 링 스테이션 탐사는 스테이션의 목적에 대한 더 많은 정보를 제공하는 데이터의 보물창고를 발견했습니다. 대부분은 이름과 설명, 숙소 요청 및 자격 증명 목록입니다. 과거 수많은 세계에서 온 수백만 명의 다양한 종족이 이 시스템을 방문하며 강력한 방패로 보호된 어떤 신성한 장소에 접근하기를 희망했습니다. \n\n하지만 은하계의 모두가 이에 만족하지는 않았습니다. 어느 시점에서 숭배자들은 [From.Planet.GetName] 스테이션을 포함한 그들의 세계를 포위한 대규모 군사 작전의 표적이 되었습니다. 갈등의 최종 결과는 상호 파괴로 보입니다. 스테이션의 인원은 전멸하였고 다시는 대체되지 않았지만, 그 이후에도 일부 자동 시스템은 오랫동안 작동을 유지하였고 아무도 이를 끄러 돌아오지 않았습니다."
 mem_mountain.12.name:0 "보호막 발생기"
 mem_mountain.12.desc:0 "우리는 [From.Planet.GetName]의 기지 안에서 방패 생성기의 출처를 찾았습니다. 그것은 실제로 적절한 승인을 받지 않은 누구에게도 거대 가스 행성의 위성에 접근을 허용하지 않는 힘의 장을 작동시키고 있습니다. §Y[Leader.GetName]§!는 이제 해당 승인을 얻고 방패를 우회할 방법을 찾으려 할 것입니다."
 mem_mountain.13.name:0 "이 전선들은 무엇을 할까?"
 mem_mountain.13.desc:0 "§Y[Leader.GetName]§!는 우리의 함선이 §Y[shielded_moon.GetName]§!를 둘러싼 방어막을 우회할 수 있도록 해주는 암호 코드를 해독할 수 없었습니다. 대신, [Leader.GetSheHe]는 방어막 생성 장치에서 전선을 순서대로 제거하여 힘의 장이 사라질 때까지 진행했습니다. \n\n이제 우리는 달의 표면을 연구하고 그 표면이 왜 그렇게 중요한지 알아볼 수 있는 길이 열렸습니다."
 mem_mountain.13.a:0 "발굴 작업을 준비해라."
 mem_mountain.20.name:0 "순례"
 mem_mountain.20.desc:0 "§Y[Leader.GetName]§!는 산의 내부 구조에 접근하게 되었습니다. 광활한 터널 시스템은 종교적 추종자들이 반성, 명상 및 벽에 고정된 고양된 슬로건을 읽는 끝없는 홀을 통해 정신주의적 여정을 떠나도록 설계된 것 같습니다. 진정한 신성한 경험은 깊은 지하에서 그들을 기다리고 있었지만, 모두가 그곳에 도달할 수 있었던 것은 아닙니다. \n\n[Leader.GetName]는 복잡한 구조를 통해 퍼져나가는 일종의 에너지 필드를 감지했지만, 그 본질은 불분명합니다."
 mem_mountain.21.name:0 "고룡 숭배자들"
 mem_mountain.21.desc:0 "§Y[Leader.GetName]§!는 지하 통로와 홀에 대한 조사를 마쳤으며, 이제 §Y[From.Planet.GetName]§!를 중심으로 한 종교의 본질에 대한 주요 발견을 발표할 준비가 되었습니다. \n\n그들이 숭배한 존재는 여러 이름으로 불렸으며, 가장 두드러진 이름은 §SThe Wyrm§!와 §SPale Wing§!입니다. 이 존재는 이 복잡한 구조물의 하층 중 하나에 거주하는 것으로 보이며, 고대의 지혜롭고 믿을 수 없을 만큼 강력하다고 전해집니다. Wyrm의 방은 나머지 복잡한 구조물보다 더 안전하게 봉인되어 있어, 이를 뚫기 위해서는 상당한 노력이 필요할 것입니다."
 mem_mountain.22.name:0 "속박된 고룡"
 mem_mountain.22.desc:0 "§Y[From.Planet.GetName]§!의 탐사대는 시설의 최심층에 성공적으로 진입했다고 보고했습니다. 거대한 방에는 실로 놀라운 존재가 있었습니다 - 방의 벽에 속박된 거대한 생물체였습니다. 이것이 고룡 숭배자들이 보러 온 것이었나요?\n\n거대한 생물체는 우리와 대화를 시도하고 있습니다."
 mem_mountain.23.name:0 "창백한 날개"
 mem_mountain.23.desc:0 "음? 새로운 방문자군... 오랜만이긴 하네. 나를 죽이러 왔는가, 놓아주러 왔는가, 아니면 그냥 비웃으러 왔는가?\n\n이 방의 지하에 있는 기계가 나를 약화하고 있다. 그 기계가 나를 이곳에 속박한다. 난 그 기계가 작동하는 원리를 여기 사람들을 관찰하며 배웠다. 작동시키면 난 죽을 것이다. 끄면 난 이곳에 다시는 속박되지 않을 것이다. 난 여기 암반을 뚫고 지상으로 나갈 수 있을 것이다. 어느 것을 선택해도 좋으니 부탁한다. 나를 해방해라."
 mem_mountain.23.a:0 "넌 살려두기에 너무 위험하다."
 mem_mountain.23.a.purifier:0 "너 같은 괴물이라면 기쁘게 죽여주지."
 mem_mountain.23.b:0 "우린 차라리 너를 이곳에 계속 가둬두겠다."
 mem_mountain.23.b.response:0 "§R<<<번역 실패. 불쾌함이 포함된 음성으로 유추됨>>>§!"
 mem_mountain.23.c:0 "우린 너를 풀어주겠다."
 mem_mountain.23.c.response:0 "§G우리가 기계를 정지시키자, 고룡을 약화하던 에너지망이 사라졌습니다. 용은 안심한 듯 사슬을 끊고 날아오를 준비를 했습니다. 빨리 이곳에서 탈출해야 합니다.§!"
 mem_mountain.23.d:0 "넌 대체 무엇이고 어떻게 이곳에 도달했지?"
 mem_mountain.23.d.tooltip:0 "나는 많은 이름을 가지고 있습니다. 내 동족은 나를 창백한 날개라고 불렀습니다. 당신 같은 작은 존재들은 나를 다르게 불렀습니다. \n\n우리는 한때 우주에 퍼져 있던 수많고 자랑스러운 종족이었습니다. 그러나 우주는 변했습니다. 우리에게 불친절해졌습니다. 대부분은 죽었고 일부는 적응했지만, 우리는 결코 예전처럼 강력하지 않을 것입니다. \n\n나는 매우 오랜 시간을 살아왔습니다. 내가 기억할 수 있는 것보다 더 오랜 시간입니다. 내 기억의 대부분은 이제 이 장소에 관한 것입니다. 나는 여기 갇혀 너무 오랜 시간을 보냈기에, 어떻게 시작되었는지조차 기억할 수 없습니다. \n\n나를 가둔 자들은 나를 신이라고 불렀습니다. 하지만 말해보세요, 당신은 당신의 신을 이렇게 대할 수 있습니까? 정말 우스운 일입니다. 그들은 멀리서 나를 달래기 위해 공물을 바치고 그들의 결정을 정당화하려고 왔습니다. 그들의 권력과 중요성에 대한 주장. 나는 가끔 그들을 즐겁게 해주곤 했습니다. 결국, 내가 무엇을 할 수 있었겠습니까? \n\n그러다 그들은 멈췄습니다. 이제 나는 혼자입니다."
 mem_mountain.23.e:0 "우리가 왜 너를 믿어야 하지?"
 mem_mountain.23.e.tooltip:0 "아니요. 막 만난 사람을 어떻게 믿을 수 있겠습니까? 자신과 너무 다른 사람을 어떻게 믿을 수 있겠습니까? \n\n당신을 설득할 수 있는 이야기는 없습니다. 어떤 논리도 통하지 않을 것입니다. 당신은 위험을 감수하고 낯선 사람의 말을 믿어야 합니다."
 mem_mountain.23.f:0 "정말로 죽기를 바라는가?"
 mem_mountain.23.f.tooltip:0 "뭐가 이상한 거지? 난 다시 한번 별들을 보고 무한한 공허를 날고 싶다, 방사선을 듣고 태양풍을 피부로 느끼고 싶다. 하지만 그보다 더 난 이곳에서 벗어나고 싶다.\n\n나를 죽이거나 풀어줘라. 무슨 선택을 하든 난 자유로워질 것이다."
 mem_mountain.24.name:0 "용의 죽음"
 mem_mountain.24.desc:0 "용이 설명한 대로, 우리는 감쇠 필드 생성기를 찾아내고 가동했습니다. \n\n창백한 날개는 마지막으로 포효한 뒤 사라졌고, 그 육체는 분해되었습니다. \n\n이 한때 거대한 생물의 유해는 여전히 연구를 위해 남아 있습니다."
 mem_mountain.25.name:0 "용의 승천"
 mem_mountain.25.desc:0 "우리는 [mem_mountain_the_planet.GetName]에서 놀라운 사건을 목격하고 있습니다. 자신이 주장한 대로, 페일 윙이 속박에서 벗어나 산을 뚫고 하늘로 날아올라, 자유를 향해 가는 길에 바위 잔해만을 남겼습니다. \n\n다시 소통하고 싶어하는 것 같습니다."
 mem_mountain_dragon:0 "용"
 mem_mountain_dragon_plural:0 "용들"
 mem_mountain_dragon_key:0 ""
 mem_mountain_imprisoned_dragon:0 "속박된 용"
 mem_mountain_imprisoned_dragon_desc:0 "이 달의 표면 깊숙한 곳, 가장 큰 산 아래에는 페일 윙이라는 이름의 갇힌 용이 있습니다."
 mem_mountain_dragon_fatigue:0 "고대인의 피로"
 mem_mountain_imprisoned_dragon_control:0 "$mem_mountain_imprisoned_dragon$"
 mem_mountain_dragon_friendship:0 "창백한 날개의 우정"
 mem_mountain.26.desc:0 "드디어 자유다! 오랜 속박 끝에 난 드디어 자유의 몸이다. 저 가증스러운 기계를 정지시킨 너희들에게 내가 느끼는 감사는 표현할 수 없을 정도다. 우주는...달라졌다. 이제 거의 기억나지도 않는군. 하지만 새로운 것을 발견할 생각에 기쁘군."
 mem_mountain.26.a:0 "우리와 함께하겠는가?"
 mem_mountain.26.a.response:0 "당신은 이것을 원할 것입니다, 그렇죠? 저와 같은 강력한 존재가 당신의 함대를 알리는 모습을 보고 싶어 하실 겁니다. \n\n제가 당신에게 빚을 지고 있는 것 같습니다. 저는 다른 곳으로 갈 데가 없습니다. 제가 예전의 제 종족만큼 강인하지 않다는 것을 경고해야 합니다. 이미 태양풍이 저를 감싸고 힘을 주고 있지만... 그건 긴 과정입니다. 제 상처 대부분은 비교적 곧 치유되겠지만, 제가 진정으로 강인함을 되찾으려면... 당신의 문명이 그보다 훨씬 전에 무너지고 사라질 것이라고 생각합니다. 기분 나쁘게 들리셨다면 사과드립니다."
 mem_mountain.26.b:0 "그럼 이걸로 작별이겠군."
 mem_mountain.26.b.resonse:0 "작별이군. 하지만 저 산에서 순례자들에게 주었던 것처럼 너희들에게 나의 지혜의 일부를 주겠다. 제물은 필요 없다 - 불쾌한 기억이다."
 mem_mountain.26.c:0 "이제 어쩔 것이지?"
 mem_mountain.26.c.response:0 "오랫동안, 나의 세계는 작은 동굴에 불과했습니다. 이제는 훨씬 더 커졌습니다. \n\n앞으로 나아가기 위해서는 시간이 필요합니다. 많은 시간이 필요할 것입니다. 나는 외딴 곳으로 여행할 생각입니다. 평화를 찾기를 바랍니다. 가능하다면 어떤 종류의 광신자들로부터도 멀리 떨어져서요."
 mem_mountain.26.d:0 "저 바위들이 무거워 보이던데, 상처를 입었나?"
 mem_mountain.26.d.response:0 "괜찮다. 너희들의 걱정은 고맙지만 의미 없는 것이다. 비록 속박된 기간 동안 약해졌지만, 그 정도로 약하진 않다."
 tech_mem_mountain_scales:0 "용의 비늘 장갑 강화"
 tech_mem_mountain_scales_desc:0 "인공적으로 자란 용의 비늘을 우리 함선의 선체와 융합시킴으로 내구도를 크게 올릴 수 있습니다."
 MEM_MOUNTAIN_DRAGONSCALE:0 "$tech_mem_mountain_scales$"
 MEM_MOUNTAIN_DRAGONSCALE_DESC:0 "인위적으로 자란 용의 비늘은 함선의 선체와 융합되어 내구도를 매우 증가시킵니다."
 mem_mountain_slain_dragon:0 "창백한 날개가 쓰러지다"
 mem_mountain.41.name:0 "용이 쓰러지다"
 mem_mountain.41.desc:0 "우린 한 우주적 존재와의 싸움에서 승리했습니다. 존재의 근원이나 삶에 대해서는 아무것도 모르지만, 그 거대한 사체는 우리의 연구를 도울 것입니다."
 mem_mountain.42.name:0 "창백한 날개가 죽다"
 mem_mountain.42.desc:0 "아무래도 창백한 날개의 자유는 얼마 가지 못한 것으로 보입니다. 우리의 장거리 스캐너들에 의하면 그는 [fromfromfrom.solar_system.GetName] 성계에서 §Y[From.GetName]§!에 의해 죽임당했습니다."
 mem_mountain.42.a:0 "비극적이군."
 mem_mountain.44.desc:0 "마지막으로 작별 인사를 전하기 위해 당신에게 다시 전화를 겁니다. 이제 충분한 힘을 되찾았으니 이 은하에 머무를 이유가 없다고 생각합니다. \n\n저는 새로운 무언가를 향해 나아갈 것입니다. 은하의 공허를 가로지르는 데는 매우 오랜 시간이 걸리겠지만, 저는 고독에 익숙합니다. \n\n행운을 빕니다."
 mem_mountain.44.a:0 "잘가거라 창백한 날개여."
 mem_mountain.46.name:0 "창백한 날개를 죽이다"
 mem_mountain.46.desc:0 "우리는 창백한 날개를 파괴했습니다. 원래 우리는 그것에게 자유를 주기로 선택했지만, 이제 그러한 생물이 자유롭게 돌아다니게 한 것은 실수였다는 것이 분명해졌습니다. \n\n일부는 이를 배신이라고 부를 수 있지만, 우리의 이유는 반박할 수 없습니다."
 mem_mountain.46.a:0 "그리 되는군."
