l_korean:
 mem_under_blanket.1.name:0 "담요 아래"
 mem_under_blanket.1.desc:0 "초기 보고서에 따르면 [Root.GetName]의 깊은 곳에서 신비로운 활동이 감지되었습니다. 스캔된 신호의 분석은 이전에 알려지지 않았던 종의 존재를 암시합니다. 우리의 과학자들은 이들을 찾고 연구하기 위한 지상 작전을 시도할 준비가 되어 있습니다."
 mem_under_blanket.1.materialist:0 "우리는 그것들을 즉시 연구해야 합니다. 이것은 흥미로운 발견입니다."
 mem_under_blanket.1.xenomilit:0 "이 외계인들은 위험할 수 있습니다. 필요한 모든 예방 조치를 취하십시오."
 mem_under_blanket.1.others:0 "그들을 보내되 필요한 모든 안전 예방 조치를 취하십시오."
 mem_under_blanket.1.deny:0 "그들에게는 더 중요한 일이 있습니다."
 mem_under_blanket.2.name:0 "지도자 선정 문제"
 mem_under_blanket.2.desc:0 "간단한 과학자 컨소시엄이 끝난 후, 모든 자원과 자금이 배정되었고 탐사가 거의 시작될 준비가 되었습니다. 그러나 누가 탐사를 이끌어야 할지는 아직 결정하지 못했습니다. 그들은 당신의 의견을 요청합니다.\n\n탐사 기간 동안 선택된 과학자는 다른 작업을 수행할 수 없다는 점은 주목할 만합니다.\n\n탐사 지도자 후보는 다음과 같습니다:"
 mem_under_blanket.2.expertleader:0 "[mem_under_blanket_expert_leader.GetName]은(는) 해당 분야의 전문가로 인정받고 있습니다."
 mem_under_blanket.2.expertleader.tooltip:0 "[mem_under_blanket_expert_leader.GetName]은(는) 이 작업에 완전히 집중하므로 다른 작업을 수행할 수 없습니다."
 mem_under_blanket.2.expertleader.random:0 "[mem_under_blanket_expert_leader_random.GetName]의 활약상은 주목할만한 것 이상입니다."
 mem_under_blanket.2.expertleader.random.tooltip:0 "[mem_under_blanket_expert_leader_random.GetName]은(는) 이 작업에 완전히 집중하므로 다른 작업을 수행할 수 없습니다."
 mem_under_blanket.2.newbieleader:0 "[mem_under_blanket_newbie_leader.GetName]은(는) 결단력 있는 것으로 알려져 있습니다."
 mem_under_blanket.2.newbieleader.tooltip:0 "[mem_under_blanket_newbie_leader.GetName]은(는) 이 작업에 완전히 집중하므로 다른 작업을 수행할 수 없습니다."
 mem_under_blanket.2.newbieleader.random:0 "[mem_under_blanket_newbie_leader_random.GetName]은(는) 대단한 적성을 보여줍니다."
 mem_under_blanket.2.newbieleader.random.tooltip:0 "[mem_under_blanket_newbie_leader_random.GetName]은(는) 이 작업에 완전히 집중하므로 다른 작업을 수행할 수 없습니다."
 mem_under_blanket.2.randomleader:0 "[mem_under_blanket_random_leader.GetName], 유능한 과학자이자 자원봉사자입니다."
 mem_under_blanket.2.randomleader.tooltip:0 "[mem_under_blanket_random_leader.GetName]은(는) 이 작업에 완전히 집중하므로 다른 작업을 수행할 수 없습니다."
 mem_under_blanket.3.name:0 "지상팀"
 mem_under_blanket.3.desc:0 "우리의 탐사는 첫 번째 퇴적암 층을 지나 보고를 하였습니다. 벽 주위의 인공 침식의 징후는 생명체의 존재를 나타냅니다. 추정에 따르면 이 종의 수천 마리가 근처에 있었거나 얼마 전 이 장소를 지나갔던 것으로 보입니다. 첫 번째 보고서가 나온 직후, 팀의 근접 감지기가 다가오는 열 신호를 경고하였습니다. 멈출 수밖에 없었던 그들은 바위 속에서 점점 가까워지는 바스락거림을 들었습니다. 만약 이 외계인들이 공격적이라면, 우리의 작은 탐사는 순식간에 압도당할 수 있습니다.\n\n접촉이 임박했습니다."
 mem_under_blanket.3.retreat.xenomilit:0 "모든 대원들에게 알린다 즉시 후퇴하라."
 mem_under_blanket.3.retreat.others:0 "계속 진행하기엔 너무 위험하다, 후퇴해라."
 mem_under_blanket.3.contact.materialist:0 "저들의 의도가 뭐지? 우리가 그들을 방해한건가?"
 mem_under_blanket.3.contact.xenomilit:0 "병사들을 준비시켜, 과학자들을 보호해라."
 mem_under_blanket.3.contact.others:0 "주의를 기울이되 조사를 계속해라."
 mem_under_blanket.10.name:0 "후퇴"
 mem_under_blanket.10.desc:0 "명령을 받은 후, 분대는 탈출을 위해 돌진했습니다. 정체불명의 외계인들의 시끄럽고 거친 신음 소리가 동굴의 벽을 울렸습니다. 그림자 속에서 수십 마리의 짐승이 우리 팀을 향해 돌진했고, 우리의 군인 세 명이 즉시 찢겨졌습니다. 벽의 틈새에서 공격한 여러 개의 큰 발톱이 다른 탐사대원 여섯 명을 잔인하게 찢어놓았습니다. [mem_under_blanket_selected_leader.GetName]와 한 명의 군인만이 탈출구에 도달할 수 있었습니다. [Root.GetName]를 보호하는 것이 자신의 의무라고 느낀 남은 군인은 비상 핵탄두로 자신을 희생하여 [mem_under_blanket_selected_leader.GetName]가 탈출하고 그 끔찍한 상황을 뒤로할 수 있도록 했습니다."
 mem_under_blanket.10.xenomilit:0 "망할 괴물새끼들!"
 mem_under_blanket.10.others:0 "우린 그들을 기억할 것이다."
 mem_under_blanket.11.name:0 "후퇴"
 mem_under_blanket.11.desc:0 "후퇴하는 동안, 그룹은 잘 위장된 존재가 그림자 속에서 그들을 따라오고 있다는 것을 깨달았습니다. 우리 군인들은 그것이 갑자기 접근했을 때 사격을 시작하여 그 정체불명의 위협을 성공적으로 무력화시켰습니다. 이전에 탐지한 무리와는 떨어진 이 고립된 공격은 우리 팀에게 표본을 추출할 수 있는 절호의 기회를 제공했습니다. 우리 과학자들은 그것이 단지 유체일 뿐이라고 판단했습니다. 그것이 단독으로 제기하는 위험을 고려할 때, 성체 표본의 무리와 맞서는 것은 불가능했습니다.\n\n터널의 출구는 그 이후로 봉쇄되었습니다."
 mem_under_blanket.11.xenomilit:0 "이 외계인의 해부는 우리가 알지 못한것을 알려 줄 것이다."
 mem_under_blanket.11.others:0 "관측을 통해 이 외계인들의 비밀을 알아낼 것이다."
 mem_under_blanket.12.name:0 "후퇴"
 mem_under_blanket.12.desc:0 "조심스럽게, 탐사 팀은 터널의 출구로 향하고 있습니다.\n모니터는 섬뜩할 정도로 조용했습니다. 현재 외계 생명체의 본질은 미스터리로 남아 있지만, 동굴 네트워크를 떠나기 전에 우리의 과학자들은 드론을 발사할 시간을 가졌고, 이를 통해 안전한 거리에서 탐사를 계속할 기회를 얻었습니다.\n\n[mem_under_blanket_selected_leader.GetName]는 상황을 원격으로 계속 모니터링할 계획입니다."
 mem_under_blanket.12.xenomilit:0 "현장을 폭격하라"
 mem_under_blanket.12.others:0 "이 새로운 종족은 아직 모든 비밀들이 밝혀지지 않았다."
 mem_under_blanket.20.name:0 "첫 접촉"
 mem_under_blanket.20.desc:0 "[mem_under_blanket_selected_leader.GetName]는 호위를 멈추라고 명령했습니다. 주저하는 가운데, 작은 형체가 우리 그룹에 다가왔습니다. 과학자가 평화로운 접촉을 시작하기 위해 손을 내밀자, 그 생물은 조심스럽게 킁킁거리며 머리를 비비기 시작했습니다. 잠시 후, 그 생물은 거친 신음 소리를 내더니 갑자기 [mem_under_blanket_selected_leader.GetName]는 수백 마리의 이 작은 털복숭이 표본에게 빠르게 둘러싸였습니다. 이 이상하고 순진한 동물들은 포옹하는 것을 매우 좋아하는 것 같습니다."
 mem_under_blanket.20.xenomilit:0 "그들은 노예 노동에 사용될 수 있습니다."
 mem_under_blanket.20.others:0 "우리 시민들은 아마 그들을 받아들일 것입니다."
 mem_under_blanket.21.name:0 "첫 접촉"
 mem_under_blanket.21.desc:0 "우리 탐사는 큰 방을 조사하고 있습니다. 우리의 온도 및 습도 측정 기기는 열대 생태계를 드러냈으며, 이곳에는 식물과 물이 있어 고급 형태의 생명체가 번성할 수 있습니다. 수만 마리의 작은 유기체가 이곳에서 평화롭게 살고 있는 것으로 보입니다. 초기 관찰에 따르면, 활동 중인 생물들은 사실상 단순한 감시자일 뿐이며, 더 큰 수의 동면 중인 생물들을 지키고 있습니다.\n\n[mem_under_blanket_selected_leader.GetName]와 과학 컨소시엄은 오염을 방지하고 생물들을 방해하지 않기 위해 원격으로 연구를 계속할 계획입니다."
 mem_under_blanket.21.xenophobe:0 "현장을 폭격하라, 우린 그 위협을 감수할수 없다"
 mem_under_blanket.21.others:0 "대단히 매력적인 자급자족이 가능한 종족이군"
 mem_under_blanket.22.name:0 "첫 접촉"
 mem_under_blanket.22.desc:0 "우리가 발견한 야생 동물은 우리가 처음 예상했던 것보다 훨씬 더 폭력적이고 위험합니다. 평화로운 의도를 전달하려고 시도하는 동안, [mem_under_blanket_selected_leader.GetName]는 그 중 하나의 짐승의 발톱에 찔렸습니다. 우리는 임무를 중단하고 구역을 확보해야 했습니다. 탐사를 동반한 중무장 군인 덕분에 우리는 짐승들의 돌진을 저지할 수 있었습니다. 백업 팀이 출구를 확보하는 동안, 주요 탐사 팀은 으르렁거리며 할퀴는 짐승들의 무리 뒤를 바짝 쫓기며 동굴에서 전투 후퇴를 하며 나왔습니다.\n\n그들의 성공적인 대피 후, 남은 탐사 리더들은 동굴 시스템의 입구를 봉쇄하기로 결정했습니다."
 mem_under_blanket.22.xenomilit:0 "망할 괴물새끼들!"
 mem_under_blanket.22.others:0 "유감스러운 손실이군."
 mem_under_blanket.23.name:0 "첫 접촉"
 mem_under_blanket.23.desc:0 "야생 동물에 접근하는 동안 상상할 수 있는 모든 예방 조치를 취한 후에도, [mem_under_blanket_selected_leader.GetName]는 여전히 포위당하게 되었습니다. 그 생물 중 하나가 과학자에게 다가와 단 한 번의 잔인하고 저음의 신음 소리를 내고는 [mem_under_blanket_selected_leader.GetHimHer]을 찢어버렸습니다. 이를 관찰한 호위대는 사격을 시작했지만, 수천 마리의 이러한 생물들에게 짓밟혔습니다.\n\n백업 팀과의 마지막 통신 중에 강인한 지진이 신호가 끊기기 직전에 보고되었습니다. 그들의 위치가 점령당했을 것이라고 추정해야 합니다.\n\n이 사건들 이후 얼마 지나지 않아, 이러한 생물들의 지상에서의 목격에 대한 보고가 쏟아지기 시작했습니다."
 mem_under_blanket.23.desc.delayed:0 "처음에는 [Root.GetName] 지역에서 지역 지진 경고 시스템에 의해 일반 지진으로 여겨졌던 것이 군사적 비상 사태로 변했습니다.\n\n여러 정착지가 이전에 알려지지 않은 생물체의 공격을 받았다고 보고했으며, 연락이 끊기기 전에 이미 이들 지역은 완전히 점령당했습니다. 공중 지원이 이 지역에 도착했을 때는 이미 완전히 점령된 상태였습니다. 이러한 생물체의 추가 확산을 막기 위해 궤도 폭격이 명령되었습니다.\n\n원시 데이터 분석 결과, 이 침략은 탐사되지 않고 안전하지 않은 지하 공동에서 발생한 것으로 나타났습니다. 과학계는 우리가 기회를 가졌을 때 이 현상을 연구하지 못한 것에 대해 강력히 비판하고 있습니다."
 mem_under_blanket.23.desc.captured:0 "포획된 청소년 생물에 대한 연구가 그 비밀을 드러내기 시작했습니다. [root.owner.GetName]의 절반 정도 크기로 보이는 만큼 순진해 보였지만, 목에 고정된 세 개의 크고 날카로운 발톱은 과소평가해서는 안 됩니다. 여러 보안 요원에 의해 면밀히 감시되는 이 외계 생물은 이동하면서 자신의 감옥의 보안 조치를 시험하는 동안 놀라운 민첩성을 보여주었습니다. 덩치 큰 가슴은 하나가 아닌 열두 개의 작은 심장을 숨기고 있었습니다. 전체 몸체는 키틴에 버금가는 경화된 조직으로 만들어진 갑옷 같은 외피로 보호받고 있었습니다. 진정되지 않은 상태에서는 어떤 접근 방식에도 격렬한 저항을 보였습니다. 식성 면에서는 순수한 육식성으로 보였으며, 특히 뇌 물질에 대한 놀라운 선호를 보였습니다. 우리의 전문가들은 지능의 징후를 발견하지 못했습니다. 생존 본능에 의해 주로 움직이는 것으로 보였습니다.\n\n그들은 또한 생물이 지면으로 방출하고 있는 저주파 신호를 감지했습니다. 불행히도 이 관찰은 당시에는 중요하지 않다고 판단되었습니다.\n\n그 후, [Root.GetName] 주변에서 매우 우려스러운 지진 데이터가 들어오기 시작하여 행성 전체의 보안 프로토콜이 발동되었고, 군대가 모든 지역에 배치되었습니다. 지하에서 대규모 생물 떼가 우리 군대를 향해 돌진하고 있다는 보고가 들어왔습니다. 다행히도 우리의 군대는 잘 준비되어 있었고 진지에 있었으며, 우리 군의 용기 덕분에 공격을 저지할 수 있었습니다. 대부분의 사상자는 동굴 주변 지역에서 발생한 것으로 보고되었습니다. 불행히도 그 지역에서 많은 생명이 잃었고, 생물들이 주기적으로 계속해서 쏟아져 나왔습니다. 이로 인해 우리의 군대는 동굴 입구에서 더 멀리 후퇴하고 위협을 차단하기 위해 확장된 배제 구역을 만들어야 했습니다."
 mem_under_blanket.23.tooltip:0 "POP 하나가 사망했으며 §R위험한 야생동물§!이 [Root.GetName]의 지표면에서 날뜁니다."
 mem_under_blanket.23.xenomilit:0 "저주받을 괴물새끼들!"
 mem_under_blanket.23.others:0 "끔찍한 비극이군"
 mem_under_blanket.120.name:0 "담요 아래"
 mem_under_blanket.120.desc:0 "우리 탐사선은 주민들에 의해 파괴되기 전에 지하 동굴 네트워크에서 경로를 마쳤습니다. 수집된 데이터에 대한 추가 분석을 통해 우리는 알려지지 않은 유기체에 대한 더 나은 이해를 얻었습니다. 이 생물들은 평생 동안 계속 성장하는 것으로 보이며, 이는 좋은 소식이자 나쁜 소식입니다. 한편으로는 생물이 나이가 들어 - 그리고 충분히 커져 - [Root.GetName]에 있는 우리의 식민지에 심각한 위협이 될 만큼 성장하면 더 이상 좁은 출구를 통해 동굴 시스템을 떠날 수 없습니다. 그러나 다른 한편으로, 만약 그들이 지표면에 도달하여 지상에 인구를 형성한다면, 신속하게 처리하지 않으면 관리할 수 없는 위협이 될 수 있습니다.\n\n그러나 [mem_under_blanket_selected_leader.GetName]이 이끄는 과학 부서는 이 종이 장기 생존을 위해 동굴에서만 발견되는 가스를 필요로 하는 것으로 보인다고 언급합니다. 또한 그들은 이곳에서 풍부하게 존재하는 희귀한 결정체를 먹고 있는 것을 관찰했습니다. [Root.GetName]의 우리의 지도자는 이 희귀한 결정체를 채굴하고 외계의 위협을 제거하는 것의 중요성을 강조합니다."
 mem_under_blanket.120.noxenophile:0 "전략적 자원의 우선순위를 정해야 합니다."
 mem_under_blanket.120.all:0 "그들을 해치지 말라, 호위를 보내라."
 mem_under_blanket.121.name:0 "학살"
 mem_under_blanket.121.desc:0 "결정이 내려진 후 남은 것은 작전을 시작하는 것이었습니다. 지상에 있는 어떤 것도 위험에 빠뜨리지 않기 위해 우리가 선택한 무기는 단순한 비반응성, 공기보다 무거운 가스로, 전체 동굴 시스템을 채워 내부의 모든 것을 질식시키는 것이었습니다. 일이 끝난 후 우리 팀은 더 큰 방들을 조사하다가 탐사선의 마지막 알려진 위치인 외계 둥지에 도달했습니다.\n\n다양한 크기의 질식한 생물들이 바닥에 널려 있었습니다. 우리는 전체 종의 멸종을 초래했습니다.\n\n밝은 면으로는, 희귀한 결정들이 수확할 준비가 되어 있습니다."
 mem_under_blanket.121.a:0 "챔버를 청소하고 발굴을 시작합니다."
 mem_under_blanket.121.b:0 "대가가 무엇인가?"
 mem_under_blanket.122.name:0 "유산"
 mem_under_blanket.122.desc:0 "생명체와 접촉하기로 결심한 팀은 드론의 마지막 알려진 위치로 조심스럽게 이동했습니다. 동굴 깊은 곳에서 터지는 가스의 우르릉거리는 소리가 그들과 함께했습니다. 곧 생물들과의 시각적 접촉이 이루어졌습니다. 놀랍게도 그들은 우리의 존재에 전혀 신경 쓰지 않는 것처럼 보였습니다. 팀은 몇 가지 빠른 관찰을 했습니다: 무거운 암석 갑옷으로 장식된 생물들은 지오파지아 식단을 가진 것처럼 보였습니다. 이 식단의 결과로, [mem_under_blanket_selected_leader.GetName]는 확신합니다, 그들이 거대한 몸체의 하부에서 큰 확장을 통해 배출하는 희귀한 결정체들입니다."
 mem_under_blanket.122.a:0 "흥미롭군."
 mem_under_blanket.123.name:0 "유산"
 mem_under_blanket.123.desc:0 "[mem_under_blanket_selected_leader.GetName]가 실종된 것으로 보고되었습니다. 조사 결과, [mem_under_blanket_selected_leader.GetHisHer] 실험실에서 사건 기록부와 맞춤형 분석 기계의 비밀 저장소가 발견되었습니다. 스펙트로그래프 스케치, 여러 번의 지우기 및 페이지 전반에 걸친 다양한 주석들은 경험이 부족한 과학자가 발견한 놀라운 사실을 인정하고 있습니다: 동굴 네트워크에서 발견된 가스가 의사소통을 하는 것 같습니다. 매우 휘발성이며 돌연변이를 일으키는 이 가스의 연기는 서로 다른 화학 서명을 형성할 수 있습니다.\n\nH-I, Co-N-V-Er-Ge, U-S, He-Re, F-O-U-Nd, La-W-S, As, O-Ne.\n\n화학 원자량 값에 대한 추가 분석 결과, 메시지가 동굴 네트워크 내의 위치 좌표를 포함하고 있음을 밝혀냈습니다. 구조 팀이 즉시 파견되었습니다.\n해당 위치에서 [mem_under_blanket_selected_leader.GetName]가 나체로, 의식이 없고 큰 결정체 방 중앙에서 떠 있는 상태로 발견되었으며, 구형 흑요석 돌을 움켜잡고 있었습니다. 팀이 가까이 다가가자, [mem_under_blanket_selected_leader.GetHisHer]의 몸에서 밀집된 다채로운 증기 베일이 나타났습니다. 의식이 돌아온 [mem_under_blanket_selected_leader.GetName]는 갑자기 선언했습니다: '나는 모든 것을 안다, 법칙이 하나로 수렴한다.' 그러고 나서 [mem_under_blanket_selected_leader.GetSheHe]가 땅에 쓰러졌습니다. 구조 팀은 [mem_under_blanket_selected_leader.GetHimHer]를 지상으로 데려왔고, [mem_under_blanket_selected_leader.GetSheHe]는 빠르게 회복했습니다."
 mem_under_blanket.123.a:0 "흥미롭군."
 d_mem_crystalline_caverns:0 "포식자 동굴"
 d_mem_crystalline_caverns_desc:0 "위험한 포식 생물들에 의해 보호받는 희귀한 결정으로 가득 찬 동굴입니다."
