l_korean:
 r_mem_doom_capacitor:0 "악의적인 축전기"
 r_mem_doom_capacitor_desc:0 "다른 차원의 에너지를 뽑아낼 뿐만이 아니라 강력한 구조물로 전환하는 장치."
 mem_doom_capacitor_effect_tooltip:0 "우리의 명령을 따를 유령 고룡을 소환합니다.\n유령 고룡은 강력한 무기를 보유하지만 크기와 비교하면 연약합니다."
 mem_doom_requires_no_other_ship:0 "우린 이미 유령 고룡을 하나 소환했습니다."
 mem_doom_dragon_ship:0 "유령 고룡"
 mem_doom_dragon_ship_plural:0 "유령 고룡들"
 mem_doom_dragon_section:0 ""
 MEM_COMPONENT_DOOM_DRAGON_BEAM:0 "악의적인 광선"
 MEM_COMPONENT_DOOM_DRAGON_PROJECTION:0 "악의적인 투영체"
 MEM_DOOM_SHIELD:0 "마이너스 에너지 보호막"
 MEM_DOOM_AURA_SHIELD_DAMPENER:0 "이차원적 왜곡장"
 mem_doom_dig_site:0 "파멸의 문 앞에서"
 mem_doom_dig_site_desc:0 "이 황폐한 행성은 한때는 발전된 연구 기지였습니다. 하지만 현재는 폐허에 불과하며 기지는 미라가 된 기존 거주민들로 가득합니다. 이들을 죽인 자들은 발견되지 않았습니다.\n\n이 기지의 파괴는 수백 년 전에 일어났었음에도 스캔에 의하면 지하에 있는 일부 시설들은 여전히 기능 중인 것으로 밝혀졌습니다. 대체 무엇이 지금까지 살아남아 기능을 유지하고 있었을까요?"
 mem_doom.1.name:0 "입구"
 mem_doom.1.desc:0 "고고학 탐사대가 돌파구를 마련했습니다. §Y[Leader.GetName]§!는 [Leader.GetSheHe]이 마침내 지표에서 구획으로 이어지는 비교적 온전한 통로를 발견했다고 보고합니다. \n\n지표와 마찬가지로, 복도에는 이전 거주자들의 시체가 널려 있습니다. 그들의 죽음은 폭력적이었지만, 시체와 주변 환경이 입은 광범위한 피해로 인해 그 원인은 완전히 명확하지 않습니다. 또한 일부 시체는 어떤 군사 세력에 속했던 것으로 보이며, 아마도 상황을 통제하기 위해 파견된 피해 통제팀이나 은폐팀일 것입니다. \n\n전반적인 상황을 판단할 때, 그들은 그리 성공적이지 않았던 것으로 보입니다."
 mem_doom.1.a:0 "$DIG$"
 mem_doom.2.name:0 "중앙 명령 핵"
 mem_doom.2.desc:0 "고고학 탐사대가 주요 돌파구를 마련했습니다. 최근 발견된 방은 시설 주변의 컴퓨터 시스템을 제어하는 명령 핵심이 위치한 곳으로 밝혀졌습니다.\n\n여기에서 큰 총격전이 있었던 것이 분명하며, 방치되고 파괴된 컴퓨터들 속에서 겨우 몇 대만이 여전히 작동하고 있습니다. 이들 컴퓨터는 주로 §SSite Zero§!라는 무언가에서 행성 표면의 배급 네트워크로 흐르는 대규모 에너지 흐름에 관한 로그를 포함하고 있습니다. 또한 §SCritical Incident 05484§!라는 제목의 백업 기록이 있으며, 내용은 다음과 같습니다: \n§g감독자:§! 오, 이건 좋지 않은 상황입니다. \n§Y<<이해할 수 없는 소리>>\n<<큰 정체불명의 소음>>§!\n§R경고:§! 감지기 2의 수치가 허용 범위를 초과했습니다.\n§R경고:§! 감지기 1, 2, 4, 5, 7 및 9에서 수치가 없습니다. \n§SError:§! 제어 모듈 4 오프라인입니다.\n§g<<기록 종료>>§!"
 mem_doom.3.name:0 "석판 저장고"
 mem_doom.3.desc:0 "고고학 팀이 새로운 발견을 보고합니다: 주요 작업 지역에서 약간 떨어진 곳에서, §Y[Leader.GetName]§! 석판 모음을 발견했습니다. \n\n석판 자체는 §Y[From.Planet.GetName]§! 깊은 곳에서 조달된 것으로 보이며, 석판에 새겨진 문자는 시설이 아직 운영 중이던 시기에 작성된 것으로 보입니다. 그러나 그 중 대부분의 언어는 우리가 현장의 다른 지역에서 발견한 것과 완전히 다르며 해독할 수 없습니다. 현장 운용원의 언어로 쓰인 부분은 단지 잡담에 불과하며 거의 이해할 수 없는 수준으로, §YTalnekhreck§!라는 무언가를 암시하고 있습니다. \n\n이상하게도 방 안에는 전투의 흔적이 없지만, 많은 돌들이 과도한 양의 말라붙은 피로 덮여 있습니다. 그 중 일부는 시설이 무너지기 수십 년 전으로 거슬러 올라가는 것으로 추정됩니다."
 mem_doom.4.name:0 "헤아릴 수 없는 깊이"
 mem_doom.4.desc:0 "그들이 외계 시설의 중심으로 더 깊이 들어가면서, §Y[Leader.GetName]§!와 [Leader.GetHerHis] 팀은 점점 더 많은 이해할 수 없는 것들을 마주하게 됩니다. \n\n여러 방은 어떤 에너지 장으로 가득 차 있는 것처럼 보입니다. 대부분의 감지기에 보이지 않으며, 방에 들어가는 모든 물체를 공중에서 사라지게 만듭니다. 또한, 구형의 방사선 주머니가 우주에서 떠다니며, 모든 핵물리학의 법칙을 무시합니다. \n\n시설 직원의 유해는 점점 더 드물게 발견됩니다. 반면, 벽은 더 이상 익숙한 합금과 폴리머의 혼합물이 아니며, 이제는 화석화된 살과 매우 유사해졌습니다. \n\n생존한 컴퓨터 단말기에서 추가 정보를 얻을 수 있습니다. 이 시설은 §Y[From.Planet.GetName]§!의 지각에 자연적으로 발생하는 차원 균열 위에 세워졌습니다. 그 목적은 반대편의 포켓 우주의 특이한 본질을 연구하고, 제국의 필요를 위해 그로부터 에너지를 채널링하는 것이었습니다. 그러나 그들이 연결한 영역은 그들이 생각했던 것만큼 비어 있지 않았고, 에너지 흐름을 따라 적대적인 무언가가 따라왔습니다."
 mem_doom.5.name:0 "사이트 제로"
 mem_doom.5.desc:0 "고고학 팀은 시설의 가장 깊은 층에 도달했습니다. 그들은 이제 그 바닥에 서 있으며, 바로 위에는 §SSite Zero§!라는 거대한 동굴이 있습니다. \n\n금속과 플라스틱으로 만들어진 시설의 일반 기술은 이상한 톱니 모양의 바위로 대체되었으며, 이는 거대한 짐승의 이빨이나 발톱을 닮았습니다. 이상한 유기체 물질로 이루어진 기둥들은 시설의 나머지 부분으로 이어지는 지붕의 해치에 닿으려 하지만 몇 미터가 모자랍니다. 거대한 탄 시체 더미가 동굴 바닥을 덮고 있습니다. \n\n[Leader.GetName]는 정예 군인 한 팀이 한때 이곳에 들어와 동굴로 내려갔다가 다시 올라와 시설의 다른 구역으로 이동했음을 결론지었습니다."
 mem_doom.5.a:0 "그들의 흔적을 따라가라."
 mem_doom.6.name:0 "악의적인 축전기"
 mem_doom.6.desc:0 "우리가 §SSite Zero§!에서 감지한 정예 분대의 최종 목적지는 그리 멀지 않았습니다. 우리가 추측할 수 있는 한, 그들이 마주한 저항은 그리 크지 않았으나, 탄약과 인력이 부족해 분대는 점차 줄어들었습니다. \n\n그들의 목표는 이러한 사건이 발생할 경우를 대비해 특별히 설립된 보조 시설이었던 것으로 보입니다. 그러나 최악의 상황이 발생하고 필요할 때, 그 시설은 점령당했습니다. 최후의 전투에서 남아 있는 군인들의 목숨이 희생된 것으로 보이나, 그들은 시설을 확보하는 데 성공했습니다. \n\n그들의 동력 갑옷에서 발견된 로그는 상황에 대한 추가적인 명확성을 제공합니다. 그들이 §YTalnekhreck§!이라고 부른 존재가 자신의 자손 중 하나를 시설로 보내, 인원들에게 미세하게 영향을 미치며 자신과 부모를 먹여 살리기 위해 희생을 요구했습니다. 시간이 지나면서 §YTalnekhreck§! 자신이 침입하여 시설 인원 중 일부를 죽이고 다른 이들을 변이시켰습니다. 큰 대가를 치르며 포털은 붕괴되었습니다. \n\n책임 분대는 다른 세계의 영향을 포함한 모든 것을 파괴하려고 시도했습니다. 그들은 실패했습니다. \n\n다른 세계의 에너지로 여전히 스스로를 동력화하고 있는 단일 유닛이 마지막 죽은 자의 손이 닿지 않는 곳에 앉아 있습니다."
 mem_doom.6.a:0 "우리가 가져가지. 조심히 다루면 안전할 것이다."
 mem_doom.6.b:0 "장치를 파괴하고 임무를 완성하자."
 mem_doom.7.name:0 "유령 고룡이 형체를 얻다"
 mem_doom.7.desc:0 "악의적인 축전기가 최고 전력에 도달하자 에너지는 형태를 취하기 시작했습니다. 탈넥흐렉에 의해 형체를 얻은 강력한 이차원적인 존재가 §Y[Capital_Scope.GetName]§!의 상공에 등장했고 우리의 명령을 따를 준비가 되었습니다."
 mem_doom.7.a:0 "탈넥흐렉 만세!"
 mem_doom.100.name:0 "폐허가 된 기지"
 mem_doom.100.desc:0 "[From.GetName]의 대규모 파괴에도 불구하고 [Leader.GetName]은(는) 행성 표면에서 인공적인 무언가의 폐허를 발견하였습니다.\n\n추가적인 조사를 위해 고고학 현장으로 지정되었습니다."
