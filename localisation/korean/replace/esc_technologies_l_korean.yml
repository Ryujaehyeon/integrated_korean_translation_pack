l_korean:
 esc_tech_grand_research_initiative:0 "거대 연구 계획"
 esc_tech_grand_research_initiative_desc:0 "지난 수 세기간, 우리를 둘러싼 세상에 대한 지식은 비약적으로 성장했지만, 이 우주에는 여전히 많은 비밀들이 있습니다. 이러한 비밀을 이해하는 것이 우리의 밝은 미래를 위한 열쇠이며 이를 깨우치기 위해 우리의 지성과 모든 자원을 모야아합니다."
 ESC_TECH_UNLOCK_ADV_RESEARCH_TITLE:0 "§H잠금해제§!: 첨단 기술 및 연구 방안"
 ESC_TECH_UNLOCK_ADV_RESEARCH_DESC:0 "$esc_tech_grand_research_initiative_desc$"
 gateway_ESC_TECHNOLOGIES:0 "첨단 기술"
 esc_tech_culture_nexus:0 "선진 사회 생물학 연구"
 esc_tech_culture_nexus_desc:0 "우리 제국을 더욱 발전시키기 위해, 우리는 건강한 육체와 정신이 어떻게 작용하는지 이해하고자 노력합니다. 사회 생물학 연구 특화 시설이 이러한 노력에 이바지할 것입니다."
 esc_tech_advanced_materials_lab:0 "첨단 소재 연구실"
 esc_tech_advanced_materials_lab_desc:0 "우리가 진보할 수록, 유용하고 흥미로운 성질을 지니는 새로운 소재에 대한 요구는 계속 커져만 갑니다. 첨단 소재를 연구하는 특수 연구실을 건설한다면 우리 제국에 큰 이익이 될 것입니다."
 esc_tech_technology_institute:0 "기술 연구소"
 esc_tech_technology_institute_desc:0 "세상, 곧 이를 관장하는 자연의 힘을 더욱 잘 이해하기 위해서는 새롭고 혁신적인 기술들이 필요합니다. 이는 우리의 삶을 더 쉽고 안락하게 만들어주기도 할 것입니다. 이러한 연구 방안에 충실한 특화 연구소나 기관을 통해, 우리 제국의 과학력은 최첨단에 머무를 수 있을 것입니다."
 esc_tech_new_age_warfare:0 "신세대 전쟁"
 esc_tech_new_age_warfare_desc:0 "군사력은 은하계의 유일한 보편 언어입니다. 개량된 신형 무기를 통해 우리는 은하계에서 우리의 입지를 확고하게 만들어줄 것입니다. 이러한 무기를 개발하고 사용하는 데에는, 혁신적인 방식이 필요하며 우리는 군사원칙의 변화에 대비해야할 것입니다."
 ESC_TECH_UNLOCK_ADV_WEAPONS_TITLE:0 "§H기술 잠금해제§!: 고급 무기 유형."
 ESC_TECH_UNLOCK_ADV_WEAPONS_DESC:0 "개량된 신형 무기를 개발하는 것은 은하계에서 우리의 힘을 유지하는데 필수적입니다."
 gateway_ESC_WEAPONS:0 "첨단 무기"
 esc_tech_advanced_heavy_weapons:0 "첨단 중화기 체계"
 esc_tech_advanced_heavy_weapons_desc:0 "중추 무기의 개발로 우리 함대는 이전과는 차원이 다른 화력을 지니게 되었습니다. 하지만 여기서 멈춰서는 안되며 계속해서 강력한 중화기를 개발해야 합니다."
 ESC_TECH_UNLOCK_ADV_HEAVY_WEAPONS_TITLE:0 "§H기술 잠금해제§!: 첨단 중추 무기."
 ESC_TECH_UNLOCK_ADV_HEAVY_WEAPONS_DESC:0 "전함에 장착할 강력한 신형 중추 무기의 개발."
 gateway_ESC_SUPERHEAVY_WEAPONS:0 "첨단 중추 무기"
 esc_tech_synthesis_tech_age:0 "기술 시대의 합성"
 esc_tech_synthesis_tech_age_desc:0 "고대의 단순한 모방만으로는 한계가 있습니다. 선구자 문명을 진정으로 초월하기 위해서는 그들의 지식을 우리의 시대의 현실과 결합해야 합니다."
 ESC_TECH_UNLOCK_ADV_ARCHEO_WEAPONS_TITLE:0 "§H고급 고대 기술 무기의 개발을§! 잠금 해제합니다."
 ESC_TECH_UNLOCK_ADV_ARCHEO_WEAPONS_DESC:0 "고급 형태의 고고학 무기 개발."
 gateway_ESC_ARCHEOTECH_WEAPONS:0 "고급 고대 기술 무기"
 esc_tech_gravity_manipulation:0 "중력 조작 기법"
 esc_tech_gravity_manipulation_desc:0 "특정 공간의 중력을 조작하는 기술로 새로운 지평이 열렸습니다. 건설 기술이 대폭 개선되었으며 국민들의 생활도 편리해졌습니다. 혹은 우리의 적을 찢어버리는데 사용할 수도 있습니다."
 ESC_TECH_UNLOCK_GRAVITY_MANIPULATION_TITLE:0 "§H기술 잠금해제§!: 중력 조작 기법."
 ESC_TECH_UNLOCK_GRAVITY_MANIPULATION_DESC:0 "중력의 힘을 이용하여 우리 생활의 다양한 측면을 개선하는 것이 우리 문명의 다음 단계가 될 것입니다."
 gateway_ESC_GRAVITY_MANIPULATION:0 "중력 조작"
 esc_tech_gravity_weapons:0 "중력 병기"
 esc_tech_gravity_weapons_desc:0 "중력 조작은 우리의 적을 공격하기 위한 수단으로 활용될 수 있습니다. 자연의 기본 힘을 이용하는 우리가 은하계의 전쟁을 정복할 것입니다!"
 ESC_TECH_UNLOCK_GRAV_WEAPONS_TITLE:0 "§H기술 잠금해제§!: 중력 병기."
 ESC_TECH_UNLOCK_GRAV_WEAPONS_DESC:0 "제국의 적을 분쇄하기 위한 중력 기반 무기."
 gateway_ESC_GRAVITIC_WEAPONS:0 "중력 무기"
 esc_tech_advanced_materials:0 "첨단 소재"
 esc_tech_advanced_materials_desc:0 "우리는 더 강하고 개선되고 지능적인 신소재가 필요합니다. 이러한 첨단 소재만 있다면, 우리가 꿈꿔왔던 것들을 해낼 수 있을 것입니다."
 ESC_TECH_UNLOCK_ADV_MATERIALS_TITLE:0 "§H기술 잠금해제§!: 첨단 소재 및 나노기술"
 ESC_TECH_UNLOCK_ADV_MATERIALS_DESC:0 "신소재가 새로운 지평을 열어주었습니다. 이제껏 꿈도 꾸지 못한 것들이 가능해졌습니다."
 gateway_ESC_MATERIALS:0 "첨단 소재"
 esc_tech_superconductors:0 "초전도 물질"
 esc_tech_superconductors_desc:0 "고온 초전도체가 광범위하게 사용되면서 에너지 전송시 손실률이 매우 감소합니다."
 esc_tech_neutronium_tools:0 "뉴트로늄 도금 공구"
 esc_tech_neutronium_tools_desc:0 "극도로 얇은 뉴트로늄 합금 층을 입힘으로써, 공구가 마모에 강해지고 보다 공격적인 채굴이 가능해졌습니다."
 esc_tech_synthetic_lifeform_studies:0 "합성 생명체 연구"
 esc_tech_synthetic_lifeform_studies_desc:0 "나노 기기를 연구하고 창조합니다."
 ESC_TECH_UNLOCK_NANITIES_TITLE:0 "§H기술 잠금해제§!: 나노 물질 장갑 및 무기"
 ESC_TECH_UNLOCK_NANITIES_DESC:0 "특수 제작된 나노봇은 엄청난 속도와 정확도로 수많은 작업을 수행할 수 있습니다. 함선이 받은 모든 피해를 완벽하고 빠르게 수리하거나 적의 함선을 원사 수준으로 분해할 수도 있습니다. 나노봇의 한계는 없습니다."
 gateway_ESC_NANITE_COMPONENTS:0 "나노물질 무기 및 장갑"
 esc_tech_psionic_weapons:0 "사이오닉 무기"
 esc_tech_psionic_weapons_desc:0 "정신이 현실에 미치는 영향이 증명되었으니, 사이오닉을 우리 제국의 검과 방패로 사용해야합니다."
 ESC_TECH_UNLOCK_PSI_WEAPONS_TITLE:0 "§H기술 잠금해제§!: 사이오닉 무기"
 ESC_TECH_UNLOCK_PSI_WEAPONS_DESC:0 "사이오닉 무기는 승무원의 정신력을 사용합니다."
 gateway_ESC_PSIONIC_WEAPONS:0 "사이오닉 무기 및 부품"
 esc_tech_biological_weapons:0 "생체 무기"
 esc_tech_biological_weapons_desc:0 "생명의 비밀에 대한 지식이 크게 진보하며, 우리가 주변의 생명체를 병기화할 수 있는지에 대한 의문이 생겨났습니다. 어쨌든, 불가능한 것은 없고, 생명은 항상 답을 찾으니까 말입니다."
 ESC_TECH_UNLOCK_BIO_WEAPONS_TITLE:0 "§H기술 잠금해제§!: 생체 장갑 및 무기"
 ESC_TECH_UNLOCK_BIO_WEAPONS_DESC:0 "부분적으로 살아있는 특수한 무기와 장갑입니다."
 gateway_ESC_BIOLOGICAL_WEAPONS:0 "생체 무기 및 장갑"
 esc_tech_tesla_weapons:0 "테슬라 무기"
 esc_tech_tesla_weapons_desc:0 "차세대 초전도체 물질의 사용으로 인해, 공허를 통해 지나가는 전격 폭발을 만들 수 있게 되었습니다. 조금 더 생각해본다면, 이 작은 마술을 파괴적인 무기로 바꿀 수 있을 것입니다."
 ESC_TECH_UNLOCK_TESLA_WEAPONS_TITLE:0 "§H기술 잠금해제§!: 테슬라 무기"
 ESC_TECH_UNLOCK_TESLA_WEAPONS_DESC:0 "테슬라 코일을 통해 전격 폭발이 된 순수한 에너지이며 효과적인 무기입니다."
 esc_tech_tesla_weapons_bio:0 "생체 전기 무기"
 esc_tech_tesla_weapons_bio_desc:0 "자연은 이미 수많은 포식 종에서 생체 전기 무기의 실용성을 증명했습니다. 적절한 생명공학적 증강이 있다면 이 천연 무장은 우리 전쟁생물에서 파괴적인 효과로 확대될 수 있습니다."
 ESC_TECH_UNLOCK_TESLA_WEAPONS_BIO_TITLE:0 "§H개발 해금§!: 생체 전기 무기."
 ESC_TECH_UNLOCK_TESLA_WEAPONS_BIO_DESC:0 "생명공학적 수단을 통해 번개 폭발로 유도된 순수 에너지는 적 함선에 효과적인 무기가 될 것입니다."
 gateway_ESC_TESLA_WEAPONS:0 "테슬라 무기"
 esc_tech_spacetime_manipulation:0 "시공간 연속체 조작"
 esc_tech_spacetime_manipulation_desc:0 "현실 그 자체를 제어하는 힘을 이용함으로써, 우리는 새로운 수준의 과학에 도달할 것입니다."
 ESC_TECH_UNLOCK_REALITY_ALTER_TITLE:0 "§H기술 잠금해제§!: 현실-조작 기술."
 ESC_TECH_UNLOCK_REALITY_ALTER_DESC:0 "원하는대로 현실을 바꾸어버리는 힘을 통해 이전까지 꿈꿀 수 없었던 것을을 할 수 있습니다."
 gateway_ESC_SPACETIME_TECH:0 "시공간 조작 기술"
 esc_tech_chrono_spatial_weapons:0 "현실 조작 무기화"
 esc_tech_chrono_spatial_weapons_desc:0 "새로이 발견된 현실 왜곡 능력은 우주에서 가장 강력한 무기가 될 수 있습니다."
 gateway_ESC_CHRONOSPATIAL_WEAPONS:0 "시공간 무기"
 esc_tech_watcher_of_eternity:0 "영원의 관측자"
 esc_tech_watcher_of_eternity_desc:0 "우리의 마음대로 현실을 왜곡함으로써, 과거와 먼 미래를 들여다볼 수 있습니다. 맨 앞자리에서 우리 우주가 만들어진 과정을 볼 수 있는 것이지요. 이를 통해 우리는 자연의 범칙과 존재하는, 존재했던 그리고 존재할 모든 것을 이해할 수 있을 것입니다."
 esc_tech_phase_shifted_ammunition:0 "위상 전이 무기"
 esc_tech_phase_shifted_ammunition_desc:0 "시공간 연속체에 대한 지식을 무기에 적용하면 뚫지 못할 방어따윈 없습니다."
 esc_tech_time_dilation_chambers:0 "시간 확장실"
 esc_tech_time_dilation_chambers_desc:0 "모든 사람에게 추가적인 시간을 제공하는 것은 현재의 기술 수준에서는 불가능하지만, 가장 필요한 사람들에게 추가적인 시간을 제공한다면 대단히 도움이 될 것입니다."
 esc_tech_reactor_6:0 "개량 영점 반응로"
 esc_tech_reactor_6_desc:0 "소형화를 통해 더욱 효율적인 신형 영점 반응로가 개발되었습니다."
 esc_tech_reactor_6_bio:0 "개량형 영점 대사"
 esc_tech_reactor_6_bio_desc:0 "선택 교배를 통해 우리는 훨씬 적은 암흑 물질에서 훨씬 더 많은 영점 에너지를 끌어내는 새로운 대사 기관 계통을 개발하여, 전쟁생물에 상당한 전력 우위를 제공할 수 있습니다."
 ESC_TECH_UNLOCK_REACTOR_6_TITLE:0 "§H부품 잠금해제§!: 개량 영점 반응로"
 ESC_TECH_UNLOCK_REACTOR_6_DESC:0 "에너지 추출 밀도를 개선한 영점 반응로."
 gateway_ESC_REACTORS:0 "함선 반응로"
 esc_tech_reactor_7:0 "특이점 반응로"
 esc_tech_reactor_7_desc:0 "영점 반응로의 메커니즘을 약간 조작하여, 크기나 복잡성은 그대로인데 훨씬 더 많은 에너지를 생산하는 반응로를 만들었습니다. 이제까지의 반응로들 중 가장 효율적인 반응로입니다."
 esc_tech_reactor_7_bio:0 "특이점 대사"
 esc_tech_reactor_7_bio_desc:0 "영점 추출 대사 경로의 표적 생명공학은 원초적 에너지 출력에서 모든 이전 세대를 능가하는 새로운 기관 계통을 낳습니다."
 ESC_TECH_UNLOCK_REACTOR_7_TITLE:0 "§H부품 잠금해제§!: 특이점 반응로"
 ESC_TECH_UNLOCK_REACTOR_7_DESC:0 "훨씬 더 많은 양의 에너지를 생산하는 차세대 영점 반응로."
 esc_tech_reactor_8:0 "개량 특이점 반응로"
 esc_tech_reactor_8_desc:0 "반응로를 더욱 소형화하여, 표준적인 함선 반응로의 크기에 훨씬 더 강력한 에너지 발전기를 집어넣을 수 있게되었습니다. 개량된 신형 특이점 반응로는 이제까지의 반응로들보다 안전하며 강력합니다."
 esc_tech_reactor_8_bio:0 "개량형 특이점 대사"
 esc_tech_reactor_8_bio_desc:0 "정밀하게 유도된 돌연변이의 연쇄는 영점 대사 기관을 우리 전쟁생물에게 거의 무한한 에너지 샘을 공급하는 구조로 바꿉니다."
 ESC_TECH_UNLOCK_REACTOR_8_TITLE:0 "§H부품 잠금해제§!: 개량 특이점 반응로"
 ESC_TECH_UNLOCK_REACTOR_8_DESC:0 "훨씬 더 많은 에너지를 생산할 수 있는 개량형 특이점 반응로."
 esc_tech_dark_matter_power_core_2:0 "개량 암흑 물질 반응로"
 esc_tech_dark_matter_power_core_2_desc:0 "고에너지 입자를 보내는 프로토콜을 갱신하여 암흑 물질 반응로의 에너지 생산량이 높아졌습니다."
 esc_tech_dark_matter_power_core_2_bio:0 "개량형 암흑 물질 대사"
 esc_tech_dark_matter_power_core_2_bio_desc:0 "일련의 공생 돌연변이가 전쟁생물과 암흑 물질 사이의 대사 결합을 깊게 하여, 각 상호작용에서 훨씬 더 많은 에너지를 끌어냅니다."
 ESC_TECH_UNLOCK_DM_REACTOR_2_TITLE:0 "§H부품 잠금해제§!: 개량 암흑 물질 반응로"
 ESC_TECH_UNLOCK_DM_REACTOR_2_DESC:0 "선구자 제국이 사용하는 암흑 물질 반응로의 개량형입니다."
 esc_tech_dark_matter_power_core_3:0 "완벽한 암흑 물질 반응로"
 esc_tech_dark_matter_power_core_3_desc:0 "암흑 물질의 본질에 대한 깊은 이해도 덕분에, 암흑 물질의 엄청난 잠재력을 이용하는 완벽한 반응로를 만들 수 있습니다."
 esc_tech_dark_matter_power_core_3_bio:0 "완성형 암흑 물질 대사"
 esc_tech_dark_matter_power_core_3_bio_desc:0 "특수 생체고분자를 전쟁생물의 살에 융합하면 암흑 물질 추출이 완성된 대사 과정으로 바뀌어, 아주 미량의 암흑 물질만으로도 우리 전 함대의 탐욕스러운 에너지 요구를 충족합니다."
 ESC_TECH_UNLOCK_DM_REACTOR_3_TITLE:0 "§H부품 잠금해제§!: 완벽한 암흑 물질 반응로"
 ESC_TECH_UNLOCK_DM_REACTOR_3_DESC:0 "암흑 물질을 사용하는 완벽한 반응로."
 esc_tech_reactor_psionic:0 "장막 우물"
 esc_tech_reactor_psionic_desc:0 "§M장막§!의 영역에는 거의 무한에 가까운 에너지가 있습니다. 약간의 조작을 가해주면, 우리는 장막을 보다 일반적인 에너지의 형태로 변환할 수 있습니다. 연구해보아야 합니다."
 ESC_TECH_UNLOCK_PSI_REACTOR_TITLE:0 "§H부품 잠금해제§!: 장막 우물"
 ESC_TECH_UNLOCK_PSI_REACTOR_DESC:0 "§M장막§!은 거의 무한에 가까운 사이오닉 에너지를 품고 있습니다. 이를 사용하지 않는 것은 멍청한 짓입니다."
 esc_tech_dreadnought_computer:0 "자동화 드레드노트 전투 알고리즘"
 esc_tech_dreadnought_computer_desc:0 "자동화 드레드노트는 천년 넘게 작동해온 고대의 전함으로, 강력한 함대와 훌륭한 제독을 물리치는 수준입니다. 이 전함의 전투 프로토콜을 복제하면 우리 함선의 능력이 크게 개선될 것입니다."
 ESC_TECH_UNLOCK_DREADNOUGHT_COMPUTER_TITLE:0 "§H부품 잠금해제§!: 자동화 드레드노트 전투 컴퓨터 프로토콜"
 ESC_TECH_UNLOCK_DREADNOUGHT_COMPUTER_DESC:0 "자동화 드레드노트의 관측된 행동 논리에 기반한 전투 컴퓨터."
 esc_tech_nanite_thought_matrix:0 "나노봇 사고 연결망"
 esc_tech_nanite_thought_matrix_desc:0 "뇌의 구조를 모방한 나노봇 구조를 기반으로 하는 인공지능은 이론상 모든 종류의 특질을 흉내낼 수 있으며, 수 밀리초 내에 복잡한 의사 결정을 수행할 수 있습니다. 해당 AI를 함선에 도입하여 더욱 뛰어난 성능을 낼 수 있을 것입니다."
 ESC_TECH_UNLOCK_COMBAT_COMPUTERS_NANITE_TITLE:0 "§H부품 잠금해제§!: $esc_tech_nanite_thought_matrix$ 전투 컴퓨터"
 ESC_TECH_UNLOCK_COMBAT_COMPUTERS_NANITE_DESC:0 "뇌의 구조를 모방한 나노봇 구조를 기반으로 하는 인공지능은 이론상 모든 종류의 특질을 흉내낼 수 있으며, 수 밀리초 내에 복잡한 의사 결정을 수행할 수 있습니다."
 esc_tech_gigapredator_instincts:0 "거대 포식자 본능"
 esc_tech_gigapredator_instincts_desc:0 "우주 레비아탄은 자신들을 사실상 죽일 수 없게 만드는 본능을 오랜 세월 진화시켜 왔고, 우리 연구자들은 그 본능의 충실한 모방을 지휘하의 전쟁생물에 이식하는 방법을 찾아냈습니다."
 ESC_TECH_UNLOCK_GIGAPREDATOR_TITLE:0 "§H부품 해금§!: 거대 포식자 본능 신경 이식체"
 ESC_TECH_UNLOCK_GIGAPREDATOR_DESC:0 "우주에서 가장 크고 강한 포식자들의 행동 적응을 구현한 신경 이식체입니다."
 esc_tech_sensors_5:0 "개량 타키온 감지기"
 esc_tech_sensors_5_desc:0 "이전 세대보다 더 깊고 먼 곳을 볼 수 있는 개량형 타키온 감지기입니다."
 ESC_TECH_UNLOCK_ADV_TACHYON_SENSOR_TITLE:0 "§H부품 잠금해제§!: 개량 타키온 감지기"
 ESC_TECH_UNLOCK_ADV_TACHYON_SENSOR_DESC:0 "$esc_tech_sensors_5_desc$"
 esc_tech_sensors_6:0 "초끈 이론"
 esc_tech_sensors_6_desc:0 "우리 세계에 대한 의문점들을 설명하는 상대적으로 새로운 이론입니다."
 ESC_TECH_UNLOCK_STRING_SENSOR_TITLE:0 "§H부품 잠금해제§!: 차원 초끈 감지기"
 ESC_TECH_UNLOCK_STRING_SENSOR_DESC:0 "$esc_tech_sensors_6_desc$"
 esc_tech_sensors_7:0 "초끈 요동 분석"
 esc_tech_sensors_7_desc:0 "초끈 이론으로 인해 생긴 지식에 통달함으로써, 마침내 우리는 이 세상을 이해할 수 있습니다."
 ESC_TECH_UNLOCK_ADV_STRING_SENSOR_TITLE:0 "§H부품 잠금해제§!: 개량 초끈 센서"
 ESC_TECH_UNLOCK_ADV_STRING_SENSOR_DESC:0 "$esc_tech_sensors_7_desc$"
 esc_tech_sensors_psionic:0 "사이오닉 감지기"
 esc_tech_sensors_psionic_desc:0 "차원 초끈에 사이오닉을 적용하면 주위 세상에 대한 엄청난 수준의 인지 능력이 생겨납니다."
 ESC_TECH_UNLOCK_PSI_SENSOR_TITLE:0 "§H부품 잠금해제§!: 사이오닉 감지기"
 ESC_TECH_UNLOCK_PSI_SENSOR_DESC:0 "$esc_tech_sensors_psionic_desc$"
 esc_tech_sensors_precursor:0 "선구자 감시망"
 esc_tech_sensors_precursor_desc:0 "£sr_dark_matter£ §Y$sr_dark_matter$§!의 불가사의한 특성을 사용하는 첨단 감시망으로 우주 전체에서 즉시 대상을 찾아낼 수 있습니다."
 esc_tech_sensors_precursor_bio:0 "선구자 전쟁생물 눈"
 esc_tech_sensors_precursor_bio_desc:0 "£sr_dark_matter£ §Y$sr_dark_matter$§!를 조작하는 역설계된 선구자 방식은 우리 전쟁생물의 감각 기관을 우주 어디에서든 무엇이든 찾아낼 수 있는 지각 도구로 바꾸게 해줍니다."
 ESC_TECH_UNLOCK_PRECURSOR_SENSOR_TITLE:0 "§H부품 잠금해제§!: $esc_tech_sensors_precursor$"
 ESC_TECH_UNLOCK_PRECURSOR_SENSOR_DESC:0 "$esc_tech_sensors_precursor_desc$"
 esc_tech_clairvoyancy_eyes_1:0 "천리안의 눈"
 esc_tech_clairvoyancy_eyes_1_desc:0 "고대 전설은 비범한 눈으로 필멸자의 한계를 훨씬 넘어선 시야를 얻은 영웅들을 이야기합니다. 우리 종족에게는 그런 선물을 받을 생물학적 기반이 없을지 몰라도, 우리 함선의 가변적인 유전 암호는 전혀 다른 문제입니다."
 ESC_TECH_UNLOCK_CLAIVOYANCY_1_TITLE:0 "§H부품 해금§!: $esc_tech_clairvoyancy_eyes_1$"
 ESC_TECH_UNLOCK_CLAIVOYANCY_1_DESC:0 "$esc_tech_clairvoyancy_eyes_1_desc$"
 esc_tech_clairvoyancy_eyes_2:0 "상급 천리안의 눈"
 esc_tech_clairvoyancy_eyes_2_desc:0 "천리안의 눈은 실전에서 그 가치를 증명했지만, 설계에는 아직 성장할 여지가 있다고 확신하는 연구자들이 있으며 상급 변형에 대한 초기 전망은 설득력 있습니다."
 ESC_TECH_UNLOCK_CLAIVOYANCY_2_TITLE:0 "§H부품 해금§!: $esc_tech_clairvoyancy_eyes_2$"
 ESC_TECH_UNLOCK_CLAIVOYANCY_2_DESC:0 "$esc_tech_clairvoyancy_eyes_2_desc$"
 esc_tech_clairvoyancy_eyes_3:0 "신의 눈"
 esc_tech_clairvoyancy_eyes_3_desc:0 "천리안의 눈을 이루는 유전 암호는 연구자들이 아직 이름 붙일 수 없는 무언가로 더 변이하고 싶어 하는 명백한 징후를 보이며, 그들은 그 진화 경로의 끝에 무엇이 있는지 정확히 알아내려 합니다."
 ESC_TECH_UNLOCK_CLAIVOYANCY_3_TITLE:0 "§H부품 해금§!: $esc_tech_clairvoyancy_eyes_3$"
 ESC_TECH_UNLOCK_CLAIVOYANCY_3_DESC:0 "$esc_tech_clairvoyancy_eyes_3_desc$"
 esc_tech_thrusters_5:0 "반물질 추진기"
 esc_tech_thrusters_5_desc:0 "쌍소멸을 통해 생성된 에너지를 이용해 이전보다 더 강력한 엔진을 만들 수 있습니다."
 esc_tech_thrusters_5_bio:0 "반물질 활용 추진 기관"
 esc_tech_thrusters_5_bio_desc:0 "반물질을 안전하게 격리하고 전달할 적절한 돌연변이 조합이 있다면, 우리 전쟁생물은 속도와 기동성에서 완전히 다른 등급의 추진 능력을 얻게 됩니다."
 ESC_TECH_UNLOCK_THRUSTERS_5_TITLE:0 "§H부품 잠금해제§!: 반물질 추진기"
 ESC_TECH_UNLOCK_THRUSTERS_5_DESC:0 "$esc_tech_thrusters_5_desc$"
 esc_tech_thrusters_6:0 "중력 조작 엔진"
 esc_tech_thrusters_6_desc:0 "아광속 이동에 워프 기술 이론을 적용하여 엄청난 속도로 나아가는 함선을 만들 수 있게 되었습니다."
 esc_tech_thrusters_6_bio:0 "중력 조작 추진 기관"
 esc_tech_thrusters_6_bio_desc:0 "유전공학은 우리 전쟁생물에게 추진을 위해 중력을 직접 조작하는 능력을 부여합니다. 이들은 재래식 엔진이 따라올 수 없는 속도로 움직입니다."
 ESC_TECH_UNLOCK_THRUSTERS_6_TITLE:0 "§H부품 잠금해제§!: 중력 조작 엔진"
 ESC_TECH_UNLOCK_THRUSTERS_6_DESC:0 "$esc_tech_thrusters_6_desc$"
 esc_tech_jump_drive_2:0 "개량 점프 드라이브"
 esc_tech_jump_drive_2_desc:0 "점프 드라이브 기술이 충분히 발달함에 따라, 현존 점프 드라이브의 설계를 개선하여 점프 거리를 확장하고 시공간 연속체를 찢으면서 발생하는 영향으로부터 더 안전해질 수 있습니다."
 esc_tech_jump_drive_2_bio:0 "개량형 초차원 내이"
 esc_tech_jump_drive_2_bio_desc:0 "표적 돌연변이 연쇄는 효율이 더 높고 우리 전쟁생물을 필요한 곳에 정확히 전달할 정밀성을 지닌 새로운 유기 점프 드라이브 계통을 만들어냅니다."
 esc_tech_jump_drive_3:0 "초쌍곡형 점프 드라이브"
 esc_tech_jump_drive_3_desc:0 "일반적으로 보이지 않는 고차원을 FTL 사출기의 고정대로 이용하여 점프 드라이브의 범위와 속도를 더욱 향상시킬 수 있습니다. 당연하게도 이러한 초쌍곡형 드라이브는 엄청난 에너지가 필요하겠지만, 우리의 반응로 기술이 그 정도 문제는 해결할 수 있습니다."
 esc_tech_jump_drive_3_bio:0 "초쌍곡 내이"
 esc_tech_jump_drive_3_bio_desc:0 "우리 전쟁생물에게 고차원 공간에 점프를 고정하는 능력을 부여하면 성간 도달 범위가 확장되고 이동 시간이 이전의 일부로 줄어듭니다."
 esc_tech_jump_drive_precursor:0 "선구자 점프 드라이브"
 esc_tech_jump_drive_precursor_desc:0 "고대의 문명에 의해 만들어진, 아주 오랜 세월동안 개선된 완벽한 점프 드라이브입니다."
 esc_tech_jump_drive_precursor_bio:0 "선구자 초차원 급류 시야"
 esc_tech_jump_drive_precursor_bio_desc:0 "£sr_dark_matter£ §Y$sr_dark_matter$§! 조작에 대한 선구자의 숙련을 바탕으로, 우리는 이전의 모든 유기 드라이브 설계를 완전히 구식으로 만드는 은하 이동 방식을 전쟁생물 안에 설계할 수 있습니다."
 esc_tech_psi_jump_drive_2:0 "개량 사이오닉 점프 드라이브"
 esc_tech_psi_jump_drive_2_desc:0 "점프 범위가 확장되고 더 빨리 다음 점프를 준비할 수 있는 사이오닉 점프 드라이브입니다."
 esc_tech_psi_jump_drive_2_bio:0 "개량형 정신 강화 생체 드라이브"
 esc_tech_psi_jump_drive_2_bio_desc:0 "전쟁생물의 더 큰 사이오닉 잠재력을 길러내면 §M장막§!과의 연결이 깊어져, 이전 계통으로는 달성할 수 없던 속도와 확신으로 은하를 가로질러 자신을 끌어당길 수 있습니다."
 esc_tech_psi_jump_drive_3:0 "장막의 인도"
 esc_tech_psi_jump_drive_3_desc:0 "장막을 거니는 이들에게 배움으로써 사이오닉 점프 드라이브를 완벽하게 만들 수 있습니다."
 esc_tech_psi_jump_drive_3_bio:0 "공생 §M장막§! 안내자"
 esc_tech_psi_jump_drive_3_bio_desc:0 "이 현실로 끌어들인 §M장막§! 존재와 전쟁생물을 결속하는 특수 기관은 정상 우주와 언제나 신비로운 §M장막§! 차원을 모두 같은 안전성과 확신으로 항해하게 합니다."
 esc_tech_aura_mirage_system:0 "타이탄 오라: 신기루 체계"
 esc_tech_aura_mirage_system_desc:0 "함선이 실제로 존재하지 않는 곳에 모습만을 투영하는 것으로 적의 목표 설정의 효율성을 크게 감소시킬 수 있습니다."
 ESC_TECH_UNLOCK_TITAN_AURA_MIRAGE:0 "§H타이탄 오라 잠금해제§!: 신기루 체계"
 ESC_TECH_UNLOCK_TITAN_AURA_MIRAGE_DESC:0 "$esc_tech_aura_mirage_system_desc$"
 esc_tech_aura_nanite_swarm:0 "타이탄 오라: 나노봇 침투 군집"
 esc_tech_aura_nanite_swarm_desc:0 "적 함선의 장갑층과 내부 선체를 공격하기 위해 나노봇을 프로그래밍하여 무기 피해에 훨씬 더 취약하게 만들 수 있습니다."
 ESC_TECH_UNLOCK_TITAN_AURA_NANITES:0 "§H타이탄 오라 잠금해제§!: 나노봇 침투 군집"
 ESC_TECH_UNLOCK_TITAN_AURA_NANITES_DESC:0 "$esc_tech_aura_nanite_swarm_desc$"
 esc_tech_aura_space_distortion:0 "타이탄 오라: 공간 왜곡 모듈"
 esc_tech_aura_space_distortion_desc:0 "우주 전투에 중력장 조작 기술을 적용하는 것은 전장을 통제하는 데 있어서 비할 데 없는 능력을 보여주며, 적의 회피 성능을 극도로 떨어트려 우리의 과녁으로 전락시킵니다."
 ESC_TECH_UNLOCK_TITAN_AURA_SPATIAL:0 "§H타이탄 오라 잠금해제§!: 공간 왜곡 모듈"
 ESC_TECH_UNLOCK_TITAN_AURA_SPATIAL_DESC:0 "$esc_tech_aura_space_distortion_desc$"
 esc_tech_precursor_armaments:0 "선구자 무장 기술"
 esc_tech_precursor_armaments_desc:0 "고대 문명은 자신들의 무기를 새로운 수준으로 끌어올리기 위해 특화된 반응로를 만들었습니다."
 esc_tech_bio_cannon_1:0 "담즙 스피터"
 esc_tech_bio_cannon_1_desc:0 "오랫동안 적대적 환경에서 살아남고 번성한 우주 동물입니다. 먹잇감을 사냥하기 위해 놀라운 도구와 방법을 진화시켰습니다. 이들에게서 많은 것을 배울 수 있는 것은 물론이고, 어쩌면 우리 제국에서 사용할 수 있도록 시험체 몇 마리를 개조할 수 있을지도 모릅니다."
 gateway_ESC_BIOLOGICAL_CANNON:0 "생체 화포"
 esc_tech_bio_cannon_2:0 "역겨운 담즙 스피터"
 esc_tech_bio_cannon_2_desc:0 "개조된 우주 유기체를 무기로 바꾸고자하는 실험이 대성공을 거두었습니다. 이제, 대자연이 만들어낸 것을 살아있는 화포로 바꿀 때가 되었습니다."
 esc_tech_bio_cannon_3:0 "산성 스피터"
 esc_tech_bio_cannon_3_desc:0 "우리는 생명 그 자체에 통달했습니다. 생명체 기반 무기에 대한 논의를 다시 시작할 때가 되었으며 새롭고 개량된 유전자로 이들을 개량시켜 훨씬 더 강력한 무기로 만들어야합니다."
 esc_tech_bio_cannon_4:0 "산성 에루케이터"
 esc_tech_bio_cannon_4_desc:0 "프로젝트를 위한 새로운 유전자 서열을 여러개 만들었고, 이제 생체 화포로 사용할 완벽한 생명체를 만들기 직전입니다. 이를 통해 우리는 은하의 진정한 지배자가될 수 있을 것입니다."
 esc_tech_bio_missile_1:0 "산성 방울 폭탄"
 esc_tech_bio_missile_1_desc:0 "오랫동안 적대적 환경에서 살아남고 번성한 우주 동물입니다. 먹잇감을 사냥하기 위해 놀라운 도구와 방법을 진화시켰습니다. 이들에게서 많은 것을 배울 수 있는 것은 물론이고, 어쩌면 우리 제국에서 사용할 수 있도록 시험체 몇 마리를 개조할 수 있을지도 모릅니다."
 gateway_ESC_BIOLOGICAL_MISSILES:0 "생체 미사일"
 esc_tech_bio_missile_2:0 "역겨운 산성 방울 폭탄"
 esc_tech_bio_missile_2_desc:0 "우리는 생명 그 자체에 통달했습니다. 생명체 기반 무기에 대한 논의를 다시 시작할 때가 되었으며 새롭고 개량된 유전자로 이들을 개량시켜 훨씬 더 강력한 무기로 만들어야합니다."
 esc_tech_bio_missile_3:0 "포식귀 산성 방울 폭탄"
 esc_tech_bio_missile_3_desc:0 "프로젝트를 위한 새로운 유전자 서열을 여러개 만들었고, 이제 생체 미사일 발사기로 사용할 완벽한 생명체를 만들기 직전입니다. 이를 통해 우리는 은하의 진정한 지배자가될 수 있을 것입니다."
 esc_tech_bio_missile_x_1:0 "연발 산성 방울"
 esc_tech_bio_missile_x_1_desc:0 "거대한 함선에 맞는 거대한 무기가 필요하며 여러 명의 연구자들이 산성 방울 폭탄 스피터의 종류를 개조하여 더 크게 만들고 더 빠르게 산성 방울을 발사하도록 만들어야한다고 제안했습니다."
 gateway_ESC_BIOLOGICAL_X_MISSILES:0 "초대형 생체 미사일"
 esc_tech_bio_missile_x_2:0 "포식귀 연발 산성 방울"
 esc_tech_bio_missile_x_2_desc:0 "거대한 미사일 발사기인 연발 산성 방울의 유전자를 약간 조작하여, 훨씬 더 강력한 무기를 만들어냈습니다."
 esc_tech_bio_missile_titanic:0 "산성 방울 폭풍"
 esc_tech_bio_missile_titanic_desc:0 "정말 거대한 신형 전함의 개발과 함께, 다시 한 번 우리의 연발 산성 방울을 더 크고 더 강력하게 만들어야할 필요가 생겼습니다. 공격을 할 때마다 산성 폭풍을 만들어냅니다."
 esc_tech_repeatable_bio_damage:0 "산성 무기 휘발성"
 esc_tech_repeatable_bio_damage_desc:0 "산성 무기의 피해량을 높이는 방법 중 하나는 산의 휘발성과 산성도를 높이는 것입니다."
 esc_tech_repeatable_bio_fire_rate:0 "대용량 산성 분비선"
 esc_tech_repeatable_bio_fire_rate_desc:0 "생체 무기의 산성 분비선을 더 크게 만들고 작용을 더 빠르게 하여 생체 무기가 잠시동안만 이라도 더 빠르게 공격하게 만들 수 있습니다."
 esc_tech_archaeo_laser_2:0 "기술-합성체 빔 포격기"
 esc_tech_archaeo_laser_2_desc:0 "선구자 캐비테이션 붕괴 장치를 우리의 레이저 기술 발전과 결합하여 부품의 합보다 훨씬 더 강력한 빔 포를 만들어냅니다."
 esc_tech_archaeo_laser_2_bio:0 "기술 합성 붕괴자 안광"
 esc_tech_archaeo_laser_2_bio_desc:0 "선구자 공동 붕괴기 기술을 생물학 빔 방출기에 엮어 넣으면, 순수한 자체 연구로 달성한 모든 것을 압도하는 출력을 지닌 새로운 유기 무기 계열이 만들어집니다."
 esc_tech_archaeo_laser_3:0 "고급 기술-합성체 빔 포신"
 esc_tech_archaeo_laser_3_desc:0 "합성체 접근 방식의 지속적인 개선은 캐비테이션 콜랩서 구조에서 더욱 강력한 파괴력을 이끌어내어, 이러한 무기와 기존의 빔 포 사이의 격차를 더욱 확대합니다."
 esc_tech_archaeo_laser_3_bio:0 "진화형 기술 합성 붕괴자 안광"
 esc_tech_archaeo_laser_3_bio_desc:0 "붕괴자 안광은 아직 그 모든 위력을 드러내지 않았으며, 생물학적 숙주 구조의 세심한 유도 진화가 이를 해금하는 열쇠입니다."
 esc_tech_archaeo_mass_driver_2:0 "기술-합성체 배터리"
 esc_tech_archaeo_mass_driver_2_desc:0 "선구자 매크로 배터리 구조와 우리의 질량 발사기 연구를 융합하면 훨씬 더 강력하고 정밀한 레일건을 제공합니다."
 esc_tech_archaeo_mass_driver_2_bio:0 "기술 합성 매크로 파편 포대"
 esc_tech_archaeo_mass_driver_2_bio_desc:0 "선구자 기술을 유기 매크로 파편 포대에 더 긴밀히 통합하면 세대가 지날수록 투사체 위력과 정확도가 크게 향상됩니다."
 esc_tech_archaeo_mass_driver_3:0 "고급 기술-합성체 배터리"
 esc_tech_archaeo_mass_driver_3_desc:0 "합성체 운동 에너지형 포대의 또 다른 세대 정제는 새로운 기준을 설정하는 관통력과 발사 속도를 가진 레일건을 생산합니다."
 esc_tech_archaeo_mass_driver_3_bio:0 "진화형 기술 합성 매크로 파편 포대"
 esc_tech_archaeo_mass_driver_3_bio_desc:0 "초기 결과는 탁월했지만 매크로 파편 포대 계통에는 아직 탐구되지 않은 상당한 잠재력이 남아 있으며, 그 진화를 적극적으로 유도하면 이 유기 무기를 진정한 한계까지 밀어 올릴 수 있습니다."
 esc_tech_archaeo_mass_accelerator_2:0 "기술-합성체 포병"
 esc_tech_archaeo_mass_accelerator_2_desc:0 "선구자 포화 포를 우리의 초대형 질량 가속기 설계와 결합함으로써, 가장 까다로운 함대 전투에 걸맞은 파괴적인 타격력을 지닌 포신이 탄생합니다."
 esc_tech_archaeo_mass_accelerator_2_bio:0 "기술 합성 파편화 포병"
 esc_tech_archaeo_mass_accelerator_2_bio_desc:0 "통합 선구자 기술로 정밀하게 조절되는 더 강한 휘발성 혼합물은 파편화 포병의 파괴 출력을 완전히 새로운 단계로 밀어 올립니다."
 esc_tech_archaeo_mass_accelerator_3:0 "고급 기술-합성체 포병"
 esc_tech_archaeo_mass_accelerator_3_desc:0 "기술-합성체 포병 프레임워크에 대한 또 다른 정제 과정을 통해 우리의 무기고에서 가장 강력한 대형 포를 생산하게 되었으며, 이는 가장 두꺼운 함선 장갑도 뚫을 수 있습니다."
 esc_tech_archaeo_mass_accelerator_3_bio:0 "진화형 기술 합성 파편화 포병"
 esc_tech_archaeo_mass_accelerator_3_bio_desc:0 "기술 합성 파편화 포병 계통의 세심한 유도 진화는 더 큰 질량과 폭발력을 지닌 계통을 해금하여, 매 발을 명중 대상에게 파국적인 사건으로 만듭니다."
 esc_tech_archaeo_missiles_2:0 "기술-합성체 나노 미사일"
 esc_tech_archaeo_missiles_2_desc:0 "선구자 나노 미사일 구름 발사기를 우리의 미사일 연구와 결합하여, 두 기술이 단독으로 생성할 수 있는 것보다 더 조밀하고 빠르며 치명적인 발사체의 무리를 발사합니다."
 esc_tech_archaeo_missiles_2_bio:0 "기술 합성 발톱 구름 발사기"
 esc_tech_archaeo_missiles_2_bio_desc:0 "선구자 기술을 발톱 구름 발사기에 더 긴밀히 통합하면 방출되는 생물학 미사일 군집의 속도, 규모, 치명성이 크게 증가합니다."
 esc_tech_archaeo_missiles_3:0 "고급 기술-합성체 나노 미사일"
 esc_tech_archaeo_missiles_3_desc:0 "합성체 미사일 프레임워크의 추가적인 정제는 우리에게 비상한 관통력을 가진 나노 미사일을 제공합니다. 이 미사일은 점 방어 시스템을 압도할 수 있으며, 여전히 중요한 화물량을 실을 수 있습니다."
 esc_tech_archaeo_missiles_3_bio:0 "진화형 기술 합성 발톱 구름 발사기"
 esc_tech_archaeo_missiles_3_bio_desc:0 "기술 합성 발톱 구름 발사기 계통의 유도 진화는 고대 선구자의 힘과 살아 있는 조직의 원초적 적응성을 결합한 생물학 무기를 만들어냅니다."
 esc_tech_archaeo_strikecraft_2:0 "기술-합성체 드론 공예"
 esc_tech_archaeo_strikecraft_2_desc:0 "선구자 드릴러 드론 기술과 우리의 전투기 개발을 융합하여, 우리가 이전에 배치한 것보다 더 빠르고, 더 강력하며, 더 치명적인 공격 플랫폼을 만들어냅니다."
 esc_tech_archaeo_strikecraft_2_bio:0 "기술 합성 드릴러 야수"
 esc_tech_archaeo_strikecraft_2_bio_desc:0 "고급 유전공학은 선구자 기술을 우리 드릴러 야수의 생리에 근본적인 수준에서 융합합니다. 그 결과 탄생한 공격 생물은 훨씬 더 흉포하고 회복력이 강합니다."
 esc_tech_archaeo_strikecraft_3:0 "고급 기술-합성체 드론 함선"
 esc_tech_archaeo_strikecraft_3_desc:0 "다음 세대의 기술-합성체 드론 전투기가 적들이 운용할 수 있는 어떤 기존의 전투기와도 차별화된 전투 성능 수준에 도달했습니다."
 esc_tech_archaeo_strikecraft_3_bio:0 "진화형 기술 합성 드릴러 야수"
 esc_tech_archaeo_strikecraft_3_bio_desc:0 "선구자 기술을 드릴러 야수 유전체 깊숙이 밀어 넣으면 전투 효율에서 거의 초월적인 공격 생물이 만들어집니다."
 esc_tech_archaeo_point_defense_2:0 "기술-합성체 근접 요격 무기 시스템"
 esc_tech_archaeo_point_defense_2_desc:0 "선구자 웹 슬링거 기술과 우리의 CIWS 연구를 융합하여 추적 속도와 요격 신뢰성이 크게 향상된 포인트 방어 시스템을 만듭니다."
 esc_tech_archaeo_point_defense_2_bio:0 "기술 합성 거미줄 발사기"
 esc_tech_archaeo_point_defense_2_bio_desc:0 "거미줄 발사기의 유기 거점 방어 체계를 선구자 기술로 증강하면, 유능한 무기가 들어오는 사격에 맞서는 거의 뚫을 수 없는 방어막으로 바뀝니다."
 esc_tech_archaeo_point_defense_3:0 "고급 기술-합성체 근접 요격 무기 시스템"
 esc_tech_archaeo_point_defense_3_desc:0 "합성체 CIWS 아키텍처의 추가적인 정제는 접근하는 미사일과 공격기를 위험한 거리로 접근하기 전에 분쇄할 수 있는 근접 방어 시스템을 제공합니다."
 esc_tech_archaeo_point_defense_3_bio:0 "진화형 기술 합성 거미줄 발사기"
 esc_tech_archaeo_point_defense_3_bio_desc:0 "유도 진화는 거미줄 발사기의 생물학적 구성 요소와 선구자 구성 요소를 더욱 긴밀히 통합하여, 소수의 무기 체계만이 관통할 수 있는 유기 방어막을 만듭니다."
 esc_tech_archaeo_titanic_2:0 "기술-합성체 파괴자"
 esc_tech_archaeo_titanic_2_desc:0 "선구자 파괴자의 눈부심을 우리의 거대 무기 연구와 결합함으로써, 함대 전투의 흐름을 바꿀 수 있는 두려운 힘을 지닌 주력급 무기를 개발하게 되었습니다."
 esc_tech_archaeo_titanic_3:0 "고급 기술-합성체 파괴자"
 esc_tech_archaeo_titanic_3_desc:0 "합성체 루이나이터에 대한 모든 개선은 그 힘을 더욱 강력하게 만들었으며, 이번 세대는 거대한 빔 포를 은하에서 몇몇 것들만이 견딜 수 있는 파괴적인 출력 수준으로 끌어올렸습니다."
 esc_tech_archaeoarmor_2:0 "기술-합성체 갑옷"
 esc_tech_archaeoarmor_2_desc:0 "선구자 펄스 갑옷과 우리의 최고의 재료 과학 및 방어 기술을 결합하면, 어느 한 계통만으로는 생산할 수 없는 복합 방어가 탄생합니다."
 esc_tech_archaeoarmor_2_bio:0 "기술 합성 갑각"
 esc_tech_archaeoarmor_2_bio_desc:0 "유도 진화는 선구자 기술을 전쟁생물 갑각의 구조 수준에 엮어 넣어, 훨씬 큰 내구성과 보호 에너지장을 생성하는 더 정제된 능력을 지닌 장갑을 만들어냅니다."
 esc_tech_archaeoarmor_3:0 "고급 기술-합성체 갑옷"
 esc_tech_archaeoarmor_3_desc:0 "이 합성체 갑옷의 이 버전은 선행 문명과 토착 기술의 궁극적인 결합을 나타내며, 어떤 기존의 함선도 무력화할 공격을 무시하는 보호력을 제공합니다."
 esc_tech_archaeoarmor_3_bio:0 "진화형 기술 합성 갑각"
 esc_tech_archaeoarmor_3_bio_desc:0 "선구자 기술의 통합을 전쟁생물 자신의 살 깊숙이 밀어 넣으면, 생물학 장갑이 달성할 수 있는 절대 한계를 나타낼지도 모르는 갑각이 만들어집니다."
 esc_tech_archaeoshield_2:0 "기술-합성체 보호막"
 esc_tech_archaeoshield_2_desc:0 "선구자 프레임워크와 함께 우리의 가장 가치 있는 힘의 장 연구를 통합한 개선된 서스펜션 필드 설계로, 두 가지 접근 방식 중 어느 것보다도 상당히 강력한 결합된 방패를 제공합니다."
 esc_tech_archaeoshield_2_bio:0 "기술 합성 현수장 조직"
 esc_tech_archaeoshield_2_bio_desc:0 "전쟁생물 조직의 유도 진화는 선구자 현수장 결절과의 공명을 개선하여, 보호막을 강화하고 회복을 가속합니다."
 esc_tech_archaeoshield_3:0 "고급 기술-합성체 보호막"
 esc_tech_archaeoshield_3_desc:0 "고급 합성체 서스펜션 필드 기술의 가장 정교한 정제는 상대적으로 강력한 보호막을 생성하여 적 함대 지휘관들이 전체 전투 계획을 재고하게 만듭니다."
 esc_tech_archaeoshield_3_bio:0 "고급 기술 합성 현수장 조직"
 esc_tech_archaeoshield_3_bio_desc:0 "전쟁생물 조직과 선구자 현수장 결절 사이의 생명공학적 결합을 더 정제하면, 적이 지닌 어떤 무기도 의미 있게 관통하기 어려운 강도의 역장이 만들어집니다."
 esc_tech_crystal_cannon_1:0 "수정 파편 발사기"
 esc_tech_crystal_cannon_1_desc:0 "수정 결정체가 발사하는 것과 같은 유기 수정 발사기."
 gateway_ESC_CRYSTALLINE_CANNON:0 "수정 무기"
 esc_tech_crystal_cannon_2:0 "개량 수정 파편 발사기"
 esc_tech_crystal_cannon_2_desc:0 "개선된 성장 프로토콜은 더 강력한 수정 조각과 더욱 강력한 발사 메커니즘을 생성하여, 첫 번째 세대에 비해 각 발사에서 관통력을 크게 증가시킵니다."
 esc_tech_crystal_cannon_3:0 "수정 쐐기 투척기"
 esc_tech_crystal_cannon_3_desc:0 "더 강한 수정과 더 개선되고 정확한 발사 체계로 무장한 차세대 수정 무기입니다."
 esc_tech_crystal_cannon_4:0 "개량 수정 쐐기 투척기"
 esc_tech_crystal_cannon_4_desc:0 "크리스탈 스파이크 발사기의 성장 챔버와 발사 메커니즘을 점진적으로 개선하여 더 높은 화력을 제공하며, 작은 크리스탈 조각조차도 장갑 목표물에 대한 신뢰할 수 있는 위협이 될 수 있는 정밀도를 제공합니다."
 esc_tech_crystal_cannon_5:0 "수정 스피어"
 esc_tech_crystal_cannon_5_desc:0 "말도 안되는 정밀도와 화력을 자랑하는 5세대 수정 화포입니다."
 gateway_ESC_CRYSTALLINE_LANCE:0 "초대형 수정 무기"
 esc_tech_crystal_lance_1:0 "크리스탈 자벨린 발사기"
 esc_tech_crystal_lance_1_desc:0 "척추 장착 무기에 대한 검증된 경험은 이제 그 구조를 결정체 기술과 결합할 수 있게 해주며, 함대에서 가장 크고 강력한 함선에 걸맞은 무기를 생산합니다."
 esc_tech_crystal_lance_2:0 "크리스탈 자벨린 포"
 esc_tech_crystal_lance_2_desc:0 "거대한 규모의 가속기로, 거의 모든 것을 튕겨내는 장갑을 관통할 수 있을 만큼의 속도로 반유기체 크리스탈의 거대한 창을 발사합니다."
 esc_tech_crystal_lance_3:0 "크리스탈 랜스 포격기"
 esc_tech_crystal_lance_3_desc:0 "업그레이드된 성장 챔버와 더 강력한 가속 시스템이 결정체 랜스를 이전 세대의 프로토타입처럼 보이게 만드는 속도로 가속합니다."
 esc_tech_crystal_lance_titanic:0 "수정 임패럴"
 esc_tech_crystal_lance_titanic_desc:0 "우리의 거대한 전함의 크기에 맞춰 조정된 이 수정 창은 엄청난 질량과 속도로 발사되는 투사체를 발사하여, 가장 중무장한 기함조차도 그 위협을 무시할 수 없습니다."
 esc_tech_improved_crystal_farm:0 "개량 수정 농장"
 esc_tech_improved_crystal_farm_desc:0 "유기 크리스탈에 대한 이해가 증진되어 농장을 더 효율적으로 개선할 수 있게 되었습니다."
 esc_tech_laser_6:0 "개량 전투 레이저"
 esc_tech_laser_6_desc:0 "새로운 광학 및 양자 발전기 기술 덕분에, 이전까지의 모든 것을 압도하는 차세대 전투 레이저가 탄생했습니다."
 esc_tech_laser_6_bio:0 "고급 전투 빔 투사기"
 esc_tech_laser_6_bio_desc:0 "유도 진화는 생물학 빔 투사기의 출력, 결맞음, 열 관리를 원래 표본이 스스로 도달할 수 없던 수준까지 밀어 올립니다."
 gateway_ESC_LASERS:0 "첨단 레이저 무기"
 esc_tech_laser_7:0 "오로라 레이저"
 esc_tech_laser_7_desc:0 "최근 신형 레이저 발전기가 개발되었습니다. 말도 안되는 집광 수준을 보이고 매우 강력한 광선을 발사합니다. 아직까지 시연 제품은 몇 없지만, 이를 거대화할 수 있다면, 적절한 함선에 탐재할 수 있을 것입니다..."
 esc_tech_laser_7_bio:0 "오로라 빔 투사기"
 esc_tech_laser_7_bio_desc:0 "빔 투사기 생명공학의 최근 돌파구는 비범한 빔 결맞음과 원초적 위력을 지닌 유기 무기를 성장시킬 수 있게 하며, 이는 우리 고급 함대의 기준에서도 강력합니다."
 esc_tech_energy_torpedo_3:0 "뮤온 발사기"
 esc_tech_energy_torpedo_3_desc:0 "특이하고 불안정한 입자를 사용해 훨씬 더 강력해진 에너지 발사기입니다."
 esc_tech_energy_torpedo_3_bio:0 "생물학 뮤온 발사기"
 esc_tech_energy_torpedo_3_bio_desc:0 "유도 진화는 대량의 불안정 뮤온을 안전하게 축적하고 폭발적으로 발사할 수 있는 특수 기관을 만들어, 전쟁생물에게 놀라운 다재다능함과 파괴력을 지닌 생물학 무기를 제공합니다."
 gateway_ESC_ENERTY_LAUNCHERS:0 "첨단 에너지 발사기"
 esc_tech_energy_torpedo_4:0 "반물질 발사기"
 esc_tech_energy_torpedo_4_desc:0 "반물질은 스치는 모든 물질을 에너지로 바꾸는 궁극의 '폭발물'입니다. 반입자 혼합물을 발사하는 에너지 발사기는 궁극의 파괴 무기입니다."
 esc_tech_energy_torpedo_4_bio:0 "생물학 반물질 발사기"
 esc_tech_energy_torpedo_4_bio_desc:0 "뮤온 발사기의 추가 진화는 농축된 반물질 덩어리를 축적, 격리, 방출할 수 있는 특수 기관을 만들어내며, 매 사격마다 비범하게 격렬한 변환 사건을 일으킵니다."
 esc_tech_disruptors_4:0 "타키온 분열기"
 esc_tech_disruptors_4_desc:0 "일반적인 입자가 아닌 타키온을 이용하는 분열기를 만들어낸다면, 우리는 이전까지 보지 못한 위력의 무기를 손에 넣을 것이고 은하에 압도적인 힘을 보여줄 수 있을 것입니다."
 esc_tech_disruptors_4_bio:0 "타키온 생체 분열기"
 esc_tech_disruptors_4_bio_desc:0 "생물학 분열기의 지속적인 유도 진화는 재래식 입자 대신 타키온을 투사하는 계통을 만들어, 적 선체 물질의 아원자 결합을 무자비한 효율로 녹여냅니다."
 gateway_ESC_DISRUPTORS:0 "첨단 분열기"
 esc_tech_disruptors_5:0 "분열 랜스"
 esc_tech_disruptors_5_desc:0 "분열 광선은 집광하기 매우 어렵지만, 새로운 양자 발전기 기술 덕분에 랜스와 같은 매우 강력한 분열기 무기를 만들 수 있게 되었습니다."
 esc_tech_disruptors_5_bio:0 "생체 분열기 랜스"
 esc_tech_disruptors_5_bio_desc:0 "생물학 분열기 견본의 추가 개선은 장갑, 선체, 보호막이 존재하지 않는 것처럼 모두 꿰뚫는 유기 무기를 만들어냅니다."
 esc_tech_plasma_4:0 "첨단 플라즈마 포"
 esc_tech_plasma_4_desc:0 "새로운 기술을 통해, 우리는 플라즈마를 더욱 안정적으로 유지할 수 있게 되었고 더욱 강력하고 정밀한 플라즈마 포를 만들 수 있게 되었습니다."
 esc_tech_plasma_4_bio:0 "고급 생체 플라즈마 포"
 esc_tech_plasma_4_bio_desc:0 "더 뜨거운 플라즈마 생산과 더 큰 자기 안정성을 향해 생물학 플라즈마 무기를 선택 교배하면 우수한 위력의 새 계통이 만들어집니다."
 gateway_ESC_PLASMA_CANNONS:0 "개량 플라즈마 포"
 esc_tech_plasma_5:0 "용의 숨결"
 esc_tech_plasma_5_desc:0 "새로운 첨단 소재와 차세대 플라즈마 펌프를 통해, 플라즈마 포가 사용하는 플라즈마의 온도를 크게 높여 놀라운 성능의 무기를 만들어낼 수 있게 되었습니다."
 esc_tech_plasma_5_bio:0 "용숨결 생체 플라즈마 포"
 esc_tech_plasma_5_bio_desc:0 "생체 플라즈마 포의 한 실험 배치에서 나타난 특이한 돌연변이가 생물학적으로 불가능해야 할 플라즈마 온도를 해금했으며, 이를 표준 유전 견본에 통합하는 것은 명백하고도 즉각적인 다음 단계입니다."
 esc_tech_chrono_cannon:0 "시공 와류 대포"
 esc_tech_chrono_cannon_desc:0 "불안정하고 끊임없이 변하는 시공간 왜곡보다 파괴적인 것은 없습니다. 이는 모든 형태의 장갑과 보호막을 파괴할 수 있는 진정한 공포의 무기입니다."
 esc_tech_chrono_cannon_bio:0 "시공 소용돌이 발사기"
 esc_tech_chrono_cannon_bio_desc:0 "생체 플라즈마 포에 시공간 기술을 부여하면 불안정한 시공 이상을 투사하는 살아 있는 장치로 바뀌어, 어떤 방어 체계도 대응할 수 없는 왜곡으로 표적을 찢어냅니다."
 esc_tech_cloud_lightning_2:0 "증폭 클라우드 라이트닝"
 esc_tech_cloud_lightning_2_desc:0 "우리 과학자들이 클라우드 라이트닝을 현대 우주전에 적합한 무기로 개량할 방법을 고안해냈습니다."
 gateway_ESC_ADV_CLOUD_LIGHTNING:0 "첨단 클라우드 라이트닝 무기"
 esc_tech_cloud_lightning_3:0 "폭풍우 발생기"
 esc_tech_cloud_lightning_3_desc:0 "약간의 개선을 통해, 우리의 클라우드 라이트닝 발전기는 우주에 치명적인 폭풍우를 만들 수 있게 되었습니다."
 esc_tech_mining_laser_2:0 "플라즈마 커터"
 esc_tech_mining_laser_2_desc:0 "채굴 드론이 사용하는 레이저에서 유래된 첨단 채굴 광선으로 적 함선의 선체를 쉽게 갈라버릴 것입니다."
 esc_tech_mining_laser_2_bio:0 "플라즈마 빔 투사기"
 esc_tech_mining_laser_2_bio_desc:0 "원래 채굴 레이저에서 파생된 이 생물학 빔 투사기는 장갑판을 상대로 놀라울 만큼 치명적임을 증명했으며, 확장된 생명공학 지식은 그 파괴 잠재력을 더욱 배양할 수 있게 합니다."
 gateway_ESC_ADV_MINING_LASER:0 "첨단 채굴 드론 레이저"
 esc_tech_mining_laser_3:0 "개량 플라즈마 커터"
 esc_tech_mining_laser_3_desc:0 "최근 발전한 기술을 적용함으로써, 플라즈마 커터의 화력을 더욱 향상시킬 수 있게되었습니다."
 esc_tech_mining_laser_3_bio:0 "고급 플라즈마 빔 투사기"
 esc_tech_mining_laser_3_bio_desc:0 "추가 유도 진화는 플라즈마 빔 투사기의 출력 강도와 빔 안정성을 정제하여, 지속 명중마다 어떤 장갑 표적에도 심각한 구조적 위협이 되게 합니다."
 esc_tech_juggernaut_beam_1:0 "저거너트 광선포"
 esc_tech_juggernaut_beam_1_desc:0 "저거너트는 매우 비싸고 소중한 전함이며 특수 광선 무기와 같은 특별한 병기를 이용합니다. 이 광선포가 적임입니다."
 gateway_ESC_JUGGERNAUT_BEAM_CANNONS:0 "저거너트 광선포"
 esc_tech_juggernaut_beam_1_bio:0 "$esc_tech_juggernaut_beam_1$"
 esc_tech_juggernaut_beam_1_bio_desc:0 "극단적인 크기와 출력을 향해 생물학 빔 방출기를 선택 교배하면, 우리 저거너트급 전쟁생물은 생물 자체의 규모에 걸맞은 무기를 얻게 됩니다."
 esc_tech_juggernaut_beam_2:0 "개량 저거너트 광선 포"
 esc_tech_juggernaut_beam_2_desc:0 "기존의 저거너트 광선포도 인상적인 무기 체계였지만, 우리는 더 크고 더 강력한 무기를 만들 수 있습니다!"
 esc_tech_juggernaut_beam_2_bio:0 "$esc_tech_juggernaut_beam_2$"
 esc_tech_juggernaut_beam_2_bio_desc:0 "저거너트 빔 포 계통의 추가 유도 진화는 더 높은 출력 강도와, 그 힘을 적 선체의 가장 중요한 지점에 집중할 발사 정밀도를 제공합니다."
 esc_tech_particle_lance_3:0 "개량 타키온 랜스"
 esc_tech_particle_lance_3_desc:0 "우주 전쟁과 그에 맞는 무기에 대한 지식이 갱신됨에 따라, 우리는 타키온 랜스의 동력과 피해량이 높아지도록 설계를 개선할 수 있습니다."
 esc_tech_particle_lance_3_bio:0 "개량형 타키온 입자 빔"
 esc_tech_particle_lance_3_bio_desc:0 "더 큰 위력과 빔 집중을 향해 유기 타키온 빔 방출기를 선택 교배하면, 더 높은 정밀도와 훨씬 큰 사격당 피해를 지닌 무기가 만들어집니다."
 gateway_ESC_PARTICLE_LANCES:0 "첨단 파티클 랜스"
 esc_tech_particle_lance_4:0 "초차원 랜스"
 esc_tech_particle_lance_4_desc:0 "타키온 랜스의 몇 안되는 단점 중 하나는 광선이 하나의 차원으로만 지나기 때문에 상대적으로 막아내기 쉽다는 점입니다. 어떻게든 우리의 무기가 동시에 여러 차원을 통해 공격하게 한다면, 말도 안되는 힘의 랜스를 손에 넣을 수 있을 것입니다."
 esc_tech_particle_lance_4_bio:0 "초차원 입자 빔"
 esc_tech_particle_lance_4_bio_desc:0 "기존 타키온 빔 방출기 견본과 초차원 기술을 결합하면, 여러 차원에 동시에 닿아 알려진 어떤 보호막 체계도 완전히 감당할 수 없는 각도에서 표적을 타격하는 유기 무기가 만들어집니다."
 esc_tech_particle_lance_titanic:0 "파멸의 빛"
 esc_tech_particle_lance_titanic_desc:0 "정말 거대한 신형 전함의 개발과 함께, 더 크고 더 강력한 파티클 랜스가 필요해졌습니다. 잘된다면, 이 설계가 답이 되어줄 것입니다."
 esc_tech_particle_lance_titanic_bio:0 "$esc_tech_particle_lance_titanic$"
 esc_tech_particle_lance_titanic_bio_desc:0 "유도 진화는 타키온 빔 방출기를 극단적인 크기와 위력으로 밀어 올립니다. 그 결과는 경외로운 파괴력을 지닌 생물 장착 랜스, 궁극의 유기 빔 무기입니다."
 esc_tech_arc_emitter_3:0 "번개 포"
 esc_tech_arc_emitter_3_desc:0 "차세대 동력 발전기와 집광망을 이용하여, 벼락을 발사하는 아크 방출기를 만들 수 있을 것입니다."
 esc_tech_arc_emitter_3_bio:0 "번개 생체 포"
 esc_tech_arc_emitter_3_bio_desc:0 "생물학 아크 방출기의 유도 진화는 모든 것을 관통하는 강력한 전기 번개를 방출할 수 있는 생물을 만들어내며, 그 천연 생체전기 구조는 함대전에서 파괴적일 만큼 확장됩니다."
 gateway_ESC_ADV_ARC_EMITTERS:0 "첨단 아크 방출기"
 esc_tech_arc_emitter_4:0 "아크 포"
 esc_tech_arc_emitter_4_desc:0 "자기 렌즈 배열을 약간 조작하여, 번개 포의 전격 폭발을 더 강하게 만들 수 있을 것입니다."
 esc_tech_arc_emitter_4_bio:0 "아크 생체 포"
 esc_tech_arc_emitter_4_bio_desc:0 "생체전기 저장과 방전 강도를 겨냥한 추가 돌연변이는 압도적인 전압을 전달해 적이 대응하기 전에 적 체계를 무력화하는 생물학 아크 포를 만들어냅니다."
 esc_tech_arc_emitter_titanic:0 "신의 번개"
 esc_tech_arc_emitter_titanic_desc:0 "무자비한 천상의 폭풍의 힘으로 적을 파괴하는 무기."
 esc_tech_arc_emitter_titanic_bio:0 "$esc_tech_arc_emitter_titanic$"
 esc_tech_arc_emitter_titanic_bio_desc:0 "극단적인 크기와 생체전기 용량을 향해 유기 아크 포를 선택 교배하면, 천상의 폭풍이 지닌 무자비한 격노로 타격하여 매 방전마다 적 편대 전체를 쓰러뜨리는 생물이 만들어집니다."
 esc_tech_wave_motion_gun_1:0 "파동포"
 esc_tech_wave_motion_gun_1_desc:0 "특수한 배기구를 통해 일시적으로 엔진 출력부를 무장으로 이어 앞의 모든 것을 파괴합니다."
 esc_tech_wave_motion_gun_1_bio:0 "양성자 비명"
 esc_tech_wave_motion_gun_1_bio_desc:0 "전쟁생물의 내부 기관을 재설계하고 목구멍에 특수 집속 근육을 설치하면, 생물은 적에게 일관되고 매우 파괴적인 입자 빔을 내뿜을 수 있게 됩니다. 무시무시할 만큼 밀접한 살아 있는 무기입니다."
 gateway_ESC_WAVE_MOTION_GUN:0 "파동포"
 esc_tech_wave_motion_gun_2:0 "차원 파동포"
 esc_tech_wave_motion_gun_2_desc:0 "업그레이드된 파동포로, 높은 명중률과 파괴력에 초점을 맞춘 개선된 광선을 발사합니다."
 esc_tech_wave_motion_gun_2_bio:0 "원자 숨결"
 esc_tech_wave_motion_gun_2_bio_desc:0 "추가 기관 개조는 단일 양성자를 고도로 이온화된 원자핵으로 대체해 빔 매질로 삼으며, 각 숨결 공격의 파괴적 충격을 몇 배로 증폭합니다."
 esc_tech_wave_motion_gun_titanic:0 "타이탄급 차원 파동포"
 esc_tech_wave_motion_gun_titanic_desc:0 "자기 렌즈 배열을 약간 조작하여, 마침내 기존 설계자들이 생각했던 수준의 화력과 크기를 갖춘 파동포를 만들 수 있게 되었습니다."
 esc_tech_wave_motion_gun_titanic_bio:0 "초충전 원자 숨결"
 esc_tech_wave_motion_gun_titanic_bio_desc:0 "타이탄급 크기를 향해 원자 숨결 생물을 선택 교배하면, 그 입자 비명이 적 함대 편대를 종이처럼 갈라낼 수 있는 아종이 만들어집니다."
 esc_tech_arcenciel:0 "아르크 앙 시엘"
 esc_tech_arcenciel_desc:0 "시간과 공간 그 자체를 통달하였으니, 포켓 디멘션에 목표를 봉인한 뒤 빅 크런치를 일으켜 목표물의 흔적마저도 소멸시키는 무기를 만들 수 있습니다."
 esc_tech_arcenciel_titanic:0 "$esc_tech_arcenciel$"
 esc_tech_arcenciel_titanic_desc:0 "$esc_tech_arcenciel_desc$"
 esc_tech_extradimensional_weapon_2:0 "물질 절멸기"
 esc_tech_extradimensional_weapon_2_desc:0 "현재의 기술력과 언비든 함선의 잔해를 연구해 배운 신기술을 융합함으로써, 개량된 물질 분해기를 만들 수 있습니다."
 gateway_ESC_EXTRADIMENSIONAL:0 "첨단 물질 분해기"
 esc_tech_extradimensional_weapon_2_x:0 "거대 물질 절멸기"
 esc_tech_extradimensional_weapon_2_x_desc:0 "물질 절멸기는 대성공이었으나, 우리 전함의 주포로 사용될 수 있는 비슷한 수준의 무기가 필요합니다."
 esc_tech_extradimensional_weapon_2_t:0 "타이탄급 물질 절멸기"
 esc_tech_extradimensional_weapon_2_t_desc:0 "정말 거대한 신형 전함의 개발과 함께, 기함을 위한 더욱 거대하고 강력한 물질 절멸기가 필요해졌습니다."
 esc_tech_extradimensional_weapon_3:0 "현실 말소기"
 esc_tech_extradimensional_weapon_3_desc:0 "물질 절멸기에 널 보이드 에너지를 추가하여 공격 대상이 되는 물질이 차지하는 공간 자체를 지워버리는, 현실을 지우는 무기를 만들 수 있습니다"
 esc_tech_extradimensional_weapon_3_x:0 "거대 현실 말소기"
 esc_tech_extradimensional_weapon_3_x_desc:0 "현실 말소기를 거대화한 것으로 우리 무기고의 그 어떤 무기보다 더 빠르게 적을 제거할 수 있습니다."
 esc_tech_extradimensional_weapon_3_t:0 "타이탄급 현실 말소기"
 esc_tech_extradimensional_weapon_3_t_desc:0 "정말 거대한 신형 전함의 개발과 함께, 기함을 위한 더욱 거대하고 강력한 현실 말소기가 필요해졌습니다."
 esc_tech_gravity_cannon_1:0 "이상 중력 발생기"
 esc_tech_gravity_cannon_1_desc:0 "지정 공간의 중력장을 정밀하게 조작하여 적에게 엄청난 힘을 가해 찢어버릴 수 있습니다."
 esc_tech_gravity_cannon_1_bio:0 "$esc_tech_gravity_cannon_1$"
 esc_tech_gravity_cannon_1_bio_desc:0 "전쟁생물 조직에 이식된 암흑 물질 포접 결절은 적 함선을 내부에서 찢어낼 만큼 강한 중력 이상을 투사할 수 있는 유기 무기를 만들어냅니다."
 gateway_ESC_GRAVITY_CANNONS:0 "중력포"
 esc_tech_gravity_cannon_2:0 "초소형 특이점 대포"
 esc_tech_gravity_cannon_2_desc:0 "중력 기술 덕분에 우리는 원하는 공간에 초소형 블랙홀을 생성할 수 있게 되었습니다. 당연히 군용으로 사용할 수 있으며, 이를 사용하지 않는 것은 멍청한 짓일 겁니다."
 esc_tech_gravity_cannon_2_bio:0 "$esc_tech_gravity_cannon_2$"
 esc_tech_gravity_cannon_2_bio_desc:0 "암흑 물질 포접 결절의 유도 진화는 중력 출력을 요구 시 마이크로 특이점을 생성할 수 있는 수준까지 끌어올립니다. 그 군사적 의미는 더 설명할 필요가 없습니다."
 esc_tech_gravity_torpedo_1:0 "공간 왜곡 탄두"
 esc_tech_gravity_torpedo_1_desc:0 "이제 우리는 어떻게 중력을 다룰 수 있는지 배웠기 때문에, 소형 블랙홀을 생성할 수 있는 장치를 만들 수 있습니다. 적절한 운송 시스템만 갖춰진다면, 그러한 장치들은 가장 견고한 목표물을 제외한 모든 목표물을 쉽게 파괴할 수 있는 강력한 무기가 될 수 있습니다."
 esc_tech_gravity_torpedo_1_bio:0 "$esc_tech_gravity_torpedo_1$"
 esc_tech_gravity_torpedo_1_bio_desc:0 "암흑 물질 포접체는 엄청난 폭력성의 생물학 미사일 탑재체가 되어, 재래식 폭발력이 아니라 중력 전단으로 표적을 갈가리 찢는 심각한 공간 왜곡과 함께 폭발합니다."
 gateway_ESC_GRAVITY_TORPEDOES:0 "중력자 어뢰"
 esc_tech_gravity_torpedo_2:0 "국소특이점 탄두"
 esc_tech_gravity_torpedo_2_desc:0 "약간의 수정만 가해진다면 공간 왜곡 탄두의 '효율'은 크게 늘어나게 되고, 우주전에서 훨씬 더 무서운 무기가 될 수 있습니다."
 esc_tech_gravity_torpedo_2_bio:0 "$esc_tech_gravity_torpedo_2$"
 esc_tech_gravity_torpedo_2_bio_desc:0 "더 조밀한 암흑 물질 포접 충전과 개량된 유기 격납 조직은 폭발을 충돌 지점에서 짧지만 파국적인 진짜 마이크로 특이점이 생길 정도로 증폭합니다."
 esc_tech_gravity_lance_1:0 "초중력포"
 esc_tech_gravity_lance_1_desc:0 "중력자를 일관된 빔 형태로 응축함으로써, 우리는 발사 경로를 따라 시공간 연속체를 뒤틀어 그곳에 존재하던 불운한 타겟은 무엇이든 찢어버릴 수 있는 무기를 만들 수 있습니다. 우리 무기고에 진정으로 무시무시한 무기가 추가된 것입니다."
 gateway_ESC_GRAVITY_LANCES:0 "초중력포"
 esc_tech_gravity_lance_2:0 "집중형 초중력포"
 esc_tech_gravity_lance_2_desc:0 "새로운 중력 렌즈 기술로 중력자 빔의 집중도를 높여 일명 초중력포의 파괴력을 크게 높일 수 있습니다."
 esc_tech_gravity_lance_titanic:0 "타이탄급 초중력포"
 esc_tech_gravity_lance_titanic_desc:0 "엄청나게 거대한 새로운 전함의 개발로, 이미 존재하는 무기의 설계는 그것에 충분하지 않을 수 있다는 것이 분명해졌습니다. 적절한 크기의 초중력 대포를 개발해야 합니다."
 esc_tech_gravity_bombers:0 "특이점 폭격기"
 esc_tech_gravity_bombers_desc:0 "블랙홀 발생 장치를 탑재한 '폭탄'을 표준형 함재기에 장착함으로써 우리는 정말로 무서운 유형의 공격적 타격기를 만들 수 있습니다."
 esc_tech_gravity_bombers_bio:0 "특이점 전쟁생물"
 esc_tech_gravity_bombers_bio_desc:0 "암흑 물질 포접 결절을 우주 아메바에 통합하면 놀라운 위력의 중력 무기를 투사하는 자연 능력이 생겨, 수동적인 생물을 살아 있는 공격 폭격기로 바꿉니다."
 esc_tech_mass_driver_6:0 "개량형 가우스 캐논"
 esc_tech_mass_driver_6_desc:0 "우주전에 대한 우리의 새로운 이해가 축척되며, 이제 가우스 캐논을 좀 더 강력하고 정확하게 만들 수 있는 몇 가지 디자인 개선 방법을 볼 수 있습니다."
 esc_tech_mass_driver_6_bio:0 "진화형 파편 가우스 가속기"
 esc_tech_mass_driver_6_bio_desc:0 "더 조밀한 파편 생성과 향상된 조준 반사를 향해 생물학 파편 가우스 가속기를 선택 교배하면, 각 일제 사격이 더 강력하고 더 확실하게 배치됩니다."
 gateway_ESC_MASS_DRIVERS:0 "개량형 매스 드라이버"
 esc_tech_mass_driver_7:0 "타격포"
 esc_tech_mass_driver_7_desc:0 "새로운 초자성체 기술은 더 작고 강력한 선형 가속기를 가능하게 합니다. 우리는 그것을 이용하여 우리의 매스 드라이버 입자포들을 훨씬 더 정확하고 강력한 것으로 업그레이드해야 합니다."
 esc_tech_mass_driver_7_bio:0 "필중 파편 가속기"
 esc_tech_mass_driver_7_bio_desc:0 "유도 진화는 특화된 포식자의 빗나가지 않는 조준과 재래식 장갑이 안정적으로 흡수할 수 없는 운동 출력을 결합한 파편 가우스 가속기를 개발합니다."
 esc_tech_autocannon_4:0 "개량형 스톰파이어 기관포"
 esc_tech_autocannon_4_desc:0 "우주전에 대한 새로운 이해를 통해, 우리는 스톰파이어 기관포의 기존 설계를 개선하여 출력과 화력을 더욱 높일 수 있습니다."
 esc_tech_autocannon_4_bio:0 "진화형 폭풍불 가시 포대"
 esc_tech_autocannon_4_bio_desc:0 "선택 교배는 가시 밀도와 생물학 발사 메커니즘의 속도 모두를 겨냥하며, 새 계통은 거점 방어 체계가 추적하기 버거운 속도로 더 무거운 투사체 폭풍을 쏟아냅니다."
 gateway_ESC_AUTOCANNONS:0 "개량형 기관포"
 esc_tech_autocannon_5:0 "파쇄자 기관포"
 esc_tech_autocannon_5_desc:0 "여러 첨단 소재와 향상된 초자성체로 기관포의 설계를 여러 번 업그레이드할 수 있었으며, 그 결과 적들을 쉽게 산산조각 낼 수 있는 무기가 탄생했습니다."
 esc_tech_autocannon_5_bio:0 "분쇄기 가시 포대"
 esc_tech_autocannon_5_bio_desc:0 "생명공학은 가시 포대를 진화의 정점으로 밀어 올립니다. 주변 공간을 투사체로 가득 채우는 그 속도와 밀도 앞에서 전술적 후퇴만이 합리적인 대응입니다."
 esc_tech_kinetic_artillery_3:0 "개량형 실탄 자주포"
 esc_tech_kinetic_artillery_3_desc:0 "우주 전쟁에 대한 우리의 새로운 이해가 축척되며, 실탄 자주포를 좀 더 강력하고 정확하게 만드는 몇 가지 방법을 볼 수 있습니다."
 esc_tech_kinetic_artillery_3_bio:0 "진화형 키틴 포병"
 esc_tech_kinetic_artillery_3_bio_desc:0 "유도 진화는 키틴 포병의 발사 근육과 조준 본능을 정제하여, 생물학 무기가 더 강하게 타격하고 훨씬 더 일관되게 명중하게 합니다."
 gateway_ESC_KINETIC_ARTILLERY:0 "개량형 실탄 자주포"
 esc_tech_kinetic_artillery_4:0 "천공 자주포"
 esc_tech_kinetic_artillery_4_desc:0 "우리의 실탄 자주포 설계를 더욱 개선하여 적들뿐만 아니라 하늘까지도 관통할 수 있는 진정으로 강력한 무기를 만들 수 있습니다."
 esc_tech_kinetic_artillery_4_bio:0 "창공 관통 키틴 포병"
 esc_tech_kinetic_artillery_4_bio_desc:0 "선택 교배와 표적 생명공학은 비범한 투사체 밀도와 속도의 키틴 포병을 만들어, 이전 세대를 모두 막아냈던 선체 장갑판을 깨끗이 관통할 수 있게 합니다."
 esc_tech_giga_cannon_3:0 "개량형 기가 캐논"
 esc_tech_giga_cannon_3_desc:0 "새로운 초자성체 기술은 더 작고 강력한 선형 가속기를 가능하게 합니다. 우리는 그것을 이용하여 우리의 기가 캐논을 훨씬 더 정확하고 강력한 것으로 업그레이드해야 합니다."
 esc_tech_giga_cannon_3_bio:0 "진화형 기가 캐논"
 esc_tech_giga_cannon_3_bio_desc:0 "더 큰 위력과 더 정밀한 조준을 향해 유기 기가 캐논 진화를 유도하면, 모든 이전 반복형이 이 설계가 늘 되고자 했던 것의 근사치처럼 보이게 하는 무기가 만들어집니다."
 gateway_ESC_GIGA_CANNONS:0 "개량형 매스 액셀러레이터"
 esc_tech_giga_cannon_4:0 "그랜드 캐논"
 esc_tech_giga_cannon_4_desc:0 "질량 가속기에 대한 우리의 디자인은 더욱 정교해지고 개선될 수 있고, 그 결과 타의 추종을 불허하는 힘과 정확성을 가진 대포가 탄생했습니다."
 esc_tech_giga_cannon_4_bio:0 "$esc_tech_giga_cannon_4$"
 esc_tech_giga_cannon_4_bio_desc:0 "유기 질량 가속기 구조에 대한 표적 유전공학은 우리 전쟁생물이 지금까지 탑재한 최고의 운동 에너지 무기인 비범한 위력과 정밀도의 생물학 포를 만들어냅니다."
 esc_tech_giga_cannon_titanic:0 "상대론적 질량 발사체"
 esc_tech_giga_cannon_titanic_desc:0 "상대론적 질량 발사체는 그것의 진정함 힘을 오판할 정도로 단순한 구조와 작동 방식를 가지고 있습니다. 그냥 큼지막한 고밀도 금속 덩어리를 가속기에 넣어서 쏘는 거죠. 강력한 탄두도 없고, 뭔가 과학 법칙을 농락하는 특이한 에너지를 가진 것도 아닙니다.하지만... 만약, 이 금속 덩어리가 상대론적인 속도, 그러니까 광속에 가까운 속도로 움직인다면? 저런 병기들 따위는 가볍게 짓누를 정도로 파괴적일 것입니다. 아아!! 하지만 그렇게 빠른 속도로 발사되기 위해 필요한 가속기는 너무 거대하고 엄청납니다. 이 대포는 가장 큰 함선을 제외한 다른 함선에는 사용할 수 없죠."
 esc_tech_giga_cannon_titanic_bio:0 "$esc_tech_giga_cannon_titanic$"
 esc_tech_giga_cannon_titanic_bio_desc:0 "빛에 가까운 속도로 조밀한 키틴 탄자를 발사하는 살아 있는 유기체인 유기 상대론적 운동 에너지 살상체는 탄두도 이국적인 빔도 필요 없습니다. 물리학이 일을 해내며, 그 속도에 도달할 수 있는 유기 가속기는 함대에서 가장 거대한 전쟁생물에만 이 무기를 허락할 만큼 큽니다."
 esc_tech_autocannon_x_1:0 "헤일스톰 기관포"
 esc_tech_autocannon_x_1_desc:0 "우리의 가장 큰 기관포의 힘을 목격한 해군 부서는 그것이 필요하다고 결정했습니다. 그리고 더 큰 것도 요구했습니다 - 전함에서 주력 대포로 사용될 수 있는 것 말입니다."
 esc_tech_autocannon_x_1_bio:0 "우박폭풍 가시 포대"
 esc_tech_autocannon_x_1_bio_desc:0 "거대화와 순수 출력 방향으로 가시 포대를 선택 교배하면, 무리 우두머리 전쟁생물의 주 무장으로 기능하는 특수 계통이 만들어져 주력함마저 압도하는 집중 운동 폭풍을 전달합니다."
 gateway_ESC_X_AUTOCANNONS:0 "초대규모 기관포"
 esc_tech_autocannon_x_2:0 "파이어스톰 기관포"
 esc_tech_autocannon_x_2_desc:0 "새로운 첨단 소재와 향상된 초자성체를 통해 헤일스톰 기관포의 디자인을 더욱 개선할 수 있었고, 더욱 강력한 화력을 가진 무기가 탄생했습니다."
 esc_tech_autocannon_x_2_bio:0 "화염폭풍 가시 포대"
 esc_tech_autocannon_x_2_bio_desc:0 "우박폭풍 가시 포대의 발사 메커니즘과 가시 재생률에 대한 표적 유전공학은 피로 없이 더 오랫동안 더 많은 화력을 유지할 수 있는 계통을 만들어냅니다."
 esc_tech_autocannon_titanic:0 "템페스트 기관포"
 esc_tech_autocannon_titanic_desc:0 "정말 거대한 신형 전함의 개발과 함께, 기함을 위한 더욱 거대하고 강력한 파이어스톰 기관포가 필요해졌습니다."
 esc_tech_autocannon_titanic_bio:0 "폭풍우 가시 포대"
 esc_tech_autocannon_titanic_bio_desc:0 "추가 생명공학은 비할 데 없는 위력과 발사 속도의 타이탄급 가시 포대 계통을 만들어, 함대의 가장 거대한 전쟁생물을 어떤 것도 편히 접근할 수 없는 살아 있는 오토캐논 플랫폼으로 바꿉니다."
 esc_tech_juggernaut_artillery_1:0 "저거너트 주포"
 esc_tech_juggernaut_artillery_1_desc:0 "저거너트는 매우 비싸고 소중한 전함이며 특수 자주포 무기와 같은 특별한 병기를 이용합니다. 이  자주포가 적임입니다."
 esc_tech_juggernaut_artillery_1_bio:0 "저거너트 키틴 포병"
 esc_tech_juggernaut_artillery_1_bio_desc:0 "저거너트급 전쟁생물의 독특한 생리에 맞춘 유전공학은 그 규모에 걸맞은 키틴 포병 계통을 만들어내며, 각 발사는 발사한 생물에 상응하는 파괴력을 전달합니다."
 gateway_ESC_JUGGERNAUT_ARTILLERY:0 "저거너트 자주포"
 esc_tech_juggernaut_artillery_2:0 "개선된 저거너트 주포"
 esc_tech_juggernaut_artillery_2_desc:0 "기존의 저거너트 자주포도 인상적인 무기 체계였지만, 우리는 더 크고 더 강력한 무기를 만들 수 있습니다!"
 esc_tech_juggernaut_artillery_2_bio:0 "진화형 저거너트 키틴 포병"
 esc_tech_juggernaut_artillery_2_bio_desc:0 "더 무거운 투사체 질량과 예리한 조준 본능을 향한 저거너트 키틴 포병의 표적 진화는 함대에서 가장 강대한 생물에게 이상적인 생물학 무기를 만들어냅니다."
 esc_tech_mhd_cannon_1:0 "강자성 액체 포"
 esc_tech_mhd_cannon_1_desc:0 "흥미로운 무기에 대한 한 제안이 제기되었습니다. 문제의 제안은 일명 '강자성 액체 포'라고 불리는 것으로서, 본질적으로 물 대신 용해된 금속을 자력을 이용하여 가속한 채로 사용하는 거대한 워터제트 절단기입니다. 특수 제작된 노즐 구조는 층류의 흐름을 보장하여 제트 형태의 일관성을 보장합니다. 이 아이디어는 약간 이상하게 들릴 수 있지만, 초기 계산 결과는 이것이 무시무시하고 강력한 무기로 만들어질 수 있다는 것을 보여줍니다. 우리는 분명히 그것을 더 연구해야 합니다."
 esc_tech_mhd_cannon_1_bio:0 "산성 제트 절단 포"
 esc_tech_mhd_cannon_1_bio_desc:0 "이 유기 무기는 개별 투사체를 완전히 포기하고, 우주전의 광대한 거리에서도 층류를 유지하는 특수 근육군으로 결맞음을 유지한 강산의 상대론적 흐름을 만들어냅니다."
 gateway_ESC_MHD_CANNONS:0 "자기 유체 역학 대포"
 esc_tech_mhd_cannon_2:0 "개량 강자성 액체 포"
 esc_tech_mhd_cannon_2_desc:0 "더 강력한 초자성체를 이용하면 강자성 액체 포의 위력을 더욱 높일 수 있으며, 내열성을 높인 신소재로 인해 대포가 발사하는 용융된 액체 금속의 온도를 높일 수 있습니다."
 esc_tech_mhd_cannon_2_bio:0 "진화형 산성 제트 절단 포"
 esc_tech_mhd_cannon_2_bio_desc:0 "노즐 근육 배열의 유전공학은 훨씬 더 큰 절단력을 지닌 더 조밀하고 안정적인 산성 제트를 만들어냅니다. 이는 이 무기의 원 설계자들이 시행착오로 수년간 얻으려 했던 개선입니다."
 esc_tech_mhd_cannon_titanic:0 "자기 유체 역학 대포"
 esc_tech_mhd_cannon_titanic_desc:0 "정말 거대한 신형 전함의 개발과 함께, 기함을 위한 더욱 거대하고 강력한 강자성 액체 포가 필요해졌습니다."
 esc_tech_mhd_cannon_titanic_bio:0 "초대형 산성 제트 절단기"
 esc_tech_mhd_cannon_titanic_bio_desc:0 "선택 교배와 표적 생명공학은 타이탄급 전쟁생물에 맞춰 확장된 산성 제트 절단기를 만들어냅니다. 그 지속 흐름은 주력함 장갑판을 불편할 만큼 효율적으로 녹일 수 있는 생물학 무기입니다."
 esc_tech_enigmatic_energy_harvesting:0 "수수께끼 에너지 수확"
 esc_tech_enigmatic_energy_harvesting_desc:0 "최근에 우리가 패배시킨 수수께끼 요새는 암흑 물질에 의해 힘을 얻는, 이전에는 알려지지 않은 형태의 에너지를 이용했습니다. 이 불가사의하고 수수께끼 같은 에너지는 군사적인 응용을 포함하여 다양한 방법으로 수확되고 사용되어질 수 있습니다."
 gateway_ESC_ENIGMATIC_WEAPONS:0 "수수께끼 에너지 무기"
 esc_tech_enigmatic_cannon:0 "수수께끼 에너지 방출기"
 esc_tech_enigmatic_cannon_desc:0 "수수께끼 에너지를 불안정한 패킷을 통해 발사한다면, 접촉 시에 강력한 폭발을 일으킬 수 있습니다. 만약 수수께끼 에너지 덩어리가 충분히 크다면, 모든 대상을 파괴할 수 있는 효과적인 포병 무기가 될 수 있을 것입니다."
 esc_tech_enigmatic_lash:0 "수수께끼 에너지 채찍"
 esc_tech_enigmatic_lash_desc:0 "수수께끼 에너지는 표준적 에너지 방출기의 힘을 증가시키는 데 사용되어, 파괴적인 힘의 마치 빛처럼 휘둘러지는 채찍과 같은 충격을 만들 수 있습니다. 이 채찍은 미사일과 같은 작은 물체에도 이끌리기 때문에, 이 무기는 거점 방어 무기의 역할을 두 배로 효율적으로 할 수 있습니다."
 esc_tech_enigmatic_autocannon:0 "수수께끼 에너지 기관포"
 esc_tech_enigmatic_autocannon_desc:0 "수수께끼 에너지를 불안정한 패킷을 통해 발사한다면, 접촉 시에 강력한 폭발을 일으킬 수 있습니다.더 작고 빠르게 발사되는 수수께끼 에너지 덩어리는 어떠한 방어 장치라도 빠르게 압도할 수 있는 기관포와 같은 무기를 만들 수 있습니다."
 esc_tech_enigmatic_lance:0 "수수께끼 에너지 랜스"
 esc_tech_enigmatic_lance_desc:0 "수수께끼 에너지가 만약 입자 빔의 형태로 방출된다면, 어떤 것이든 없앨 수 있는 믿을 수 없는 힘의 광선 무기가 될 것입니다."
 gateway_ESC_ENIGMAITC_LANCES:0 "수수께끼 에너지 랜스"
 esc_tech_enigmatic_lance_titanic:0 "수수께끼 에너지 랜스 대형화"
 esc_tech_enigmatic_lance_titanic_desc:0 "정말 거대한 신형 전함의 개발과 함께, 기함을 위한 더욱 거대하고 강력한 수수께끼 에너지 랜스가 필요해졌습니다. 그리고 우리는 그것을 영광스러운 기함에 장착할 것입니다!"
 esc_tech_extradimensional_pd:0 "이차원 쐐기"
 esc_tech_extradimensional_pd_desc:0 "이차원의 공포가 포탈을 통해 자신의 일부분을 이동하며 공격하는 방식을 관찰한 결과, 우리는 이제 동일한 원칙에 따라 작동하는 무기를 만드는 데 필요한 지식을 갖게 되었습니다: 목표한 위치에서 포탈을 열고, 이차원적 존재가 공격을 수행하도록 하는 무기 말입니다."
 esc_tech_space_whale_weapon_2:0 "고급 에너지 흡수기"
 esc_tech_space_whale_weapon_2_desc:0 "티얀키의 에너지 흡수기는 영겁에 걸쳐 섭식 및 방어 도구로 진화했으며, 함대전에서 이를 운용한 실전 경험은 훨씬 더 효과적으로 만들 명확한 아이디어를 연구자들에게 제공했습니다."
 esc_tech_space_whale_weapon_3:0 "역설 에너지 흡수기"
 esc_tech_space_whale_weapon_3_desc:0 "우리 연구 공동체의 일부 비전통적 사고는 생물학적으로 예상되지 않았던 방식으로 에너지 흡수기의 흡수장을 조작하는 아이디어를 만들어냈으며, 이를 상상할 수 없는 위력의 무기로 변화시킬 수 있습니다."
 esc_tech_tiyanki_beam:0 "티얀키 빔 대포"
 esc_tech_tiyanki_beam_desc:0 "본래의 티얀키 종은 상대적으로 약한 에너지 흡수 방식을 자기보호 수단으로 사용하지만, 예외적인 개체인 티얀키 대모는 이를 빔 형태의 '무기'로 바꿔 그녀만이 구가할 수 있는 파괴적인 공격을 개시할 수 있었습니다. 만약 우리가 그것을 복제하는 데 성공한다면, 많은 우주전에서 쉽게 이길 수 있는 거대 함선을 위한 훌륭한 무기를 가지게 될 것입니다."
 gateway_ESC_TIYANKI_BEAM:0 "티얀키 빔 대포"
 esc_tech_tiyanki_beam_titanic:0 "티얀키 빔 대형화"
 esc_tech_tiyanki_beam_titanic_desc:0 "이제 우린 진정으로 티얀키 대모가 사용하던 유기체 광선 무기를 복제할 수 있게 되었습니다. 이는 우리의 기함에 사용할 무기가 될 것입니다!"
 esc_tech_junk_mines:0 "고철 발사기"
 esc_tech_junk_mines_desc:0 "고철 수집기가 사용하는 자가주행형 지뢰는 그 단순한 구조에도 불구하고 엄청난 피해를 입히는 독특한 무기입니다. 사실, 이 기뢰들은 꽤 많은 하이테크 쓰레기로 만들어져 있고, 그것들을 사용하는 것은 확실히 우리의 함대를 더 빠르게 무장시킬 것입니다."
 esc_tech_voidspawn_missile:0 "공허태생체 미사일"
 esc_tech_voidspawn_missile_desc:0 "보이드스폰 새끼가 사용하는 유기체적 미사일은 정말 파괴적인 무기였습니다. 이제 우리는 그것을 복제해 우리들을 위해 사용할 수 있습니다."
 esc_tech_voidspawn_missile_x:0 "공허태생체 미사일 탄막"
 esc_tech_voidspawn_missile_x_desc:0 "우리의 가장 큰 함선들은 본래의 공허태생체 미사일이 제공할 수 있는 것보다 더 강력한 화력을 지닌 무기를 필요로 합니다. 우리는 이 도전에 답하기 위해 미사일 구조를 적절히 확장할 필요가 있습니다."
 esc_tech_missiles_6:0 "조커 미사일"
 esc_tech_missiles_6_desc:0 "우리가 개발하고 있는 새로운 기술들 덕분에, 새롭고 강력하고 더 까다로운 미사일을 개발하는 것은 우리에게 그다지 어려운 일이 아닙니다."
 gateway_ESC_ADVANCED_MISSILES:0 "첨단 미사일"
 esc_tech_missiles_7:0 "레이스 미사일"
 esc_tech_missiles_7_desc:0 "우리는 우리 함대에 탑재할 차세대 전투 미사일을 생각해야 합니다. 그들이 무엇이 되든 그들은 조용하고, 탐지되지 않으며, 무엇보다도 치명적이어야 합니다."
 esc_tech_plasma_missiles_1:0 "플라즈마 미사일"
 esc_tech_plasma_missiles_1_desc:0 "플라즈마 대포의 치명적인 힘과 미사일의 유도 능력을 결합하는 아이디어는 새로운 것이 아닙니다. 그러나 이제 우리는 역사상 처음으로 이 아이디어를 현실로 바꿀 수 있는 능력을 갖게 되었습니다."
 gateway_ESC_PLASMA_MISSILES:0 "플라즈마 미사일"
 esc_tech_plasma_missiles_2:0 "개량형 플라즈마 미사일"
 esc_tech_plasma_missiles_2_desc:0 "원래의 플라즈마 미사일도 큰 성공을 거두었지만, 우리는 여전히 더 강력한 무기를 원합니다. 입자 조작 기술의 새로운 발전 덕분에, 우리는 미사일의 온도를 높일 수 있습니다. 플라즈마 미사일의 플라즈마를 더 뜨겁고 더 치명적으로 만들 수 있는 것입니다."
 esc_tech_plasma_missiles_3:0 "소각 미사일"
 esc_tech_plasma_missiles_3_desc:0 "차세대 초자성체는 우리에게 훨씬 더 뜨겁고 에너지 넘치는 플라즈마를 억제하고 발사할 수 있도록 해줍니다. 이를 플라즈마 미사일에 적용할 경우, 미사일은 더욱 강력해져 제아무리 강한 장갑이라도 미사일에 맞설 수 없게 됩니다."
 esc_tech_torpedoes_4:0 "파괴자 어뢰"
 esc_tech_torpedoes_4_desc:0 "우리가 개발하고 있는 새로운 기술을 적용한다면, 현재의 어뢰 설계를 개선하여 함대 전체를 금속 껍데기들의 폐허로 만들어버릴 수 있는 파괴적인 힘을 가진 새로운 무기를 만들 수 있습니다."
 gateway_ESC_ADVANCED_TORPEDOES:0 "개선된 어뢰"
 esc_tech_torpedoes_5:0 "초토화 어뢰"
 esc_tech_torpedoes_5_desc:0 "우리는 어뢰 설계를 한층 더 다듬을 수 있습니다. 몇 가지 업그레이드를 통해, 우리는 현재의 어뢰를 절멸의 무기로 만들 수 있습니다."
 esc_tech_corrosive_warhead_torpedo:0 "현실 부식 어뢰"
 esc_tech_corrosive_warhead_torpedo_desc:0 "시공 연속체를 국소적으로 조작할 수 있는 장치를 어뢰 프레임에 장착함으로써, 우리는 현실을 말 그대로 산산조각 낼 수 있는 정말로 무서운 무기를 만들 수 있습니다."
 esc_tech_swarmer_missiles_3:0 "타이푼 미사일"
 esc_tech_swarmer_missiles_3_desc:0 "우리의 기술이 계속 발전함에 따라, 새로운 군집 미사일 설계가 필요하다는 것을 알게 되었습니다. 새로운 미사일이 무엇이 되든, 그것들은 숫자와 폭발력으로 적의 방어를 압도할 수 있어야 합니다."
 esc_tech_swarmer_missiles_3_bio:0 "태풍 생체 미사일"
 esc_tech_swarmer_missiles_3_bio_desc:0 "더 높은 산란 수와 더 강력한 생물학 탄두를 향해 군집 생체 미사일 플랫폼을 선택 교배하면, 순수한 물량으로 거점 방어망을 포화시킬 수 있는 새로운 세대의 살아 있는 발사기가 만들어집니다."
 gateway_ESC_ADVANCED_SWARMER_MISSILES:0 "첨단 군집 미사일"
 esc_tech_swarmer_missiles_4:0 "허리케인 미사일"
 esc_tech_swarmer_missiles_4_desc:0 "더 빠르고 강력하며 적의 거점 방어 시스템을 계속 압도할 수 있는 차세대 군집 미사일의 발명을 검토할 때입니다."
 esc_tech_swarmer_missiles_4_bio:0 "허리케인 생체 미사일"
 esc_tech_swarmer_missiles_4_bio_desc:0 "더 큰 속도, 탄두 위력, 회피 본능을 향해 태풍 생체 미사일 계통을 유도 진화시키면, 거점 방어 체계가 추적할 수는 있어도 제때 막을 수 없는 살아 있는 군집이 만들어집니다."
 esc_tech_xmissile_1:0 "이종물질 탄두"
 esc_tech_xmissile_1_desc:0 "우리는 주력함 대응 전투에 적합한 미사일을 보유하고 있지 않다는 사실을 알게 되었습니다. 그러한 미사일은 매우 크고 강력하며, 파괴하기 매우 힘들 것입니다. 우리는 가능한 한 빨리 이런 무기를 개발해야 합니다."
 gateway_ESC_X_MISISLES:0 "초대형 미사일 무기"
 esc_tech_xmissile_2:0 "기묘체 탄두"
 esc_tech_xmissile_2_desc:0 "다양한 형태의 이종 물질에 대한 우리의 새로운 통찰이 생김에 따라, 우린 이제 이종 물질을 이용하는 더 강력한 탄두를 가진 미사일의 초기적 설계를 적용할 수 있습니다."
 esc_tech_xmissile_titanic:0 "반사식 미사일 런처"
 esc_tech_xmissile_titanic_desc:0 "최근의 반사형 탄두의 프로토타입이 개발되면, 마침내 우리는 이 은하에서 가장 강력한 군함에 대항할 수 있을 만큼 충분히 강력한 장치를 갖게 되었습니다. 그것을 위해 설계된 새로운 미사일은 즉시 개발되어야 합니다."
 esc_tech_nanite_cannon_1:0 "나노봇 대포"
 esc_tech_nanite_cannon_1_desc:0 "나노봇은 강력한 무기가 될 수 있습니다. 말 그대로 방치하면 함선 전체를 분해할 수 있는 무기 말입니다. 문제는 나노봇을 목표물로 운반하는 것 뿐이고, 한 가지 해결책은 간단히 나노봇으로 가득 채워진 통을 대포로 발사하는 것입니다."
 esc_tech_nanite_cannon_1_bio:0 "나노봇 생체 포"
 esc_tech_nanite_cannon_1_bio_desc:0 "고급 생명공학은 대규모 나노봇 군집을 숙주로 삼고 무기화하는 공생 무기 유기체를 만들어, 자기 유지와 전쟁생물이 섭취할 표적을 분해하는 공격적 탄약으로 나노봇을 사용합니다."
 gateway_ESC_NANITE_CANNONS:0 "나노봇 대포"
 esc_tech_nanite_cannon_2:0 "개량 나노봇 대포"
 esc_tech_nanite_cannon_2_desc:0 "나노봇에 대한 연구의 많은 발전과 함께, 우리는 더 나은 탄통 설계를 활용하고, 더 공격적인 나노봇을 이용하는 새롭고 개선된 버젼의 나노봇 대포를 개발할 준비가 되었습니다."
 esc_tech_nanite_cannon_2_bio:0 "진화형 나노봇 생체 포"
 esc_tech_nanite_cannon_2_bio_desc:0 "유기 발사기의 조직에 더 깊이 통합된 나노봇과, 투사체로 쓰이는 더 공격적으로 프로그램된 나노봇은 매 사격이 자기 증식 분해 사건이 되는 생체 포를 만들어냅니다."
 esc_tech_nanite_reconstructor:0 "나노봇 재구성 빔"
 esc_tech_nanite_reconstructor_desc:0 "나노봇은 함선 사이에 임시 분자 다리를 만들어 물질을 운반할 수 있으며, 이 능력을 무기화하면 적 선체를 해체하고 수확한 물질을 직접 우리 수리에 투입하는 빔이 만들어집니다."
 esc_tech_nanite_reconstructor_bio:0 "나노봇 조직 재구성기"
 esc_tech_nanite_reconstructor_bio_desc:0 "나노봇-사이버네틱 무기를 전쟁생물에 이식하면, 표적과 자신을 연결해 분자 터널을 통해 구조 물질을 빨아들이고, 수확한 물질이 빠른 조직 재생에 필요한 회복 효소의 선내 합성을 먹여 살리게 할 수 있습니다."
 esc_tech_nanite_torpedo_1:0 "나노봇 어뢰"
 esc_tech_nanite_torpedo_1_desc:0 "나노봇은 강력한 무기가 될 수 있습니다. 말 그대로 방치하면 함선 전체를 분해할 수 있는 무기 말입니다. 문제는 나노봇을 목표물로 운반하는 것 뿐이고, 한 가지 해결책은 어뢰와 미사일을 운송 시스템으로 활용하는 것입니다"
 esc_tech_nanite_torpedo_1_bio:0 "$esc_tech_nanite_torpedo_1$"
 esc_tech_nanite_torpedo_1_bio_desc:0 "유기 미사일은 대규모 나노봇 탑재체의 이상적인 운반체로, 분해 군집을 표적 표면에 직접 전달해 착지한 즉시 체계적인 해체를 시작하게 합니다."
 gateway_ESC_NANITE_TORPEDOES:0 "나노봇 어뢰"
 esc_tech_nanite_torpedo_2:0 "그레이 구 어뢰"
 esc_tech_nanite_torpedo_2_desc:0 "나노봇 연구의 많은 발전과 함께, 우리는 새롭고 더 공격적인 나노봇을 운반할 개선된 버전의 나노봇 탄두를 탑재한 어뢰를 개발할 준비가 되었습니다."
 esc_tech_nanite_torpedo_2_bio:0 "$esc_tech_nanite_torpedo_2$"
 esc_tech_nanite_torpedo_2_bio_desc:0 "개량된 유기 미사일 설계는 더 공격적인 분해 규약을 지닌 더 큰 나노봇 탑재량을 허용하여, 명중한 모든 것에 축소판 회색 점액 사태를 전달하는 생물학 무기를 만듭니다."
 esc_tech_nanite_missile_x_1:0 "나노봇 미사일 발사대"
 esc_tech_nanite_missile_x_1_desc:0 "우리의 나노봇 어뢰는 이미 충분히 강력한 무기이지만, 우리의 거대한 함선들은 더 큰 것을 필요로 합니다. 그리고 가장 간단한, 해결책은 나노이트 탄두를 탑재한 미사일을 더 많이 발사할 수 있는 커다란 미사일 발사대를 만드는 것입니다."
 esc_tech_nanite_missile_x_1_bio:0 "나노봇 탄두 생체 미사일 발사기"
 esc_tech_nanite_missile_x_1_bio_desc:0 "거대화를 향해 나노봇 생체 미사일 발사 기관을 선택 교배하면, 일제 사격 전체를 동시에 방출해 거점 방어 체계와 적 나노봇 대응책을 모두 압도할 수 있는 특수 계통이 만들어집니다."
 gateway_ESC_NANITE_X_WEAPONS:0 "초대규모 나노봇 미사일 발사대"
 esc_tech_nanite_missile_x_2:0 "다연장 나노봇 미사일 발사대"
 esc_tech_nanite_missile_x_2_desc:0 "우리는 여전히 더 크고 강력한 무기가 필요합니다. 그리고 이 나노봇 미사일 발사대를 업그레이드 하는 것은 우리가 필요로 하는 것과 똑같습니다."
 esc_tech_nanite_missile_x_2_bio:0 "$esc_tech_nanite_missile_x_2$"
 esc_tech_nanite_missile_x_2_bio_desc:0 "나노봇 생체 미사일 발사기 계통의 추가 진화는 탄두 위력과 재생률을 모두 개선하여, 교전 전체에 걸쳐 나노봇 탑재체의 끈질긴 비를 유지할 수 있는 살아 있는 무기를 만들어냅니다."
 esc_tech_nanite_missile_titanic:0 "나노봇 로켓 자주포"
 esc_tech_nanite_missile_titanic_desc:0 "우리가 새롭고 거대한 전함을 배치하기 시작하면서, 이미 존재하는 무기 설계는 그들에게 충분하지 않을 수 있다는 것이 분명해졌습니다. 신뢰성 있는 나노봇 미사일 발사대를 한 번 더 업그레이드 시켜서 우리 기함들에게 그들이 수용할 수 있는 무기를 장착할 때입니다."
 esc_tech_nanite_missile_titanic_bio:0 "$esc_tech_nanite_missile_titanic$"
 esc_tech_nanite_missile_titanic_bio_desc:0 "극단적인 크기와 탑재 용량을 향한 선택 교배는 놀라운 범위의 유기 나노봇 로켓 포병을 만들어내며, 이는 주력함 교전의 결과를 단독으로 결정할 수 있는 무기입니다."
 esc_tech_nanite_bomber:0 "나노봇 폭격기"
 esc_tech_nanite_bomber_desc:0 "나노봇은 강력한 무기가 될 수 있습니다. 말 그대로 방치하면 함선 전체를 분해할 수 있는 무기 말입니다. 문제는 나노봇을 목표물로 운반하는 것 뿐이고, 한 가지 해결책은 타격 함재기를 활용하는 것입니다"
 esc_tech_nanite_bomber_bio:0 "나노봇 증강 폭격 아메바"
 esc_tech_nanite_bomber_bio_desc:0 "우주 아메바를 대규모 무기화 나노봇 군집으로 증강하면, 접촉 시 적 선체를 분해하는 공격 생물로 바뀌며, 그 천연 회복력은 이들을 강력한 공격 플랫폼으로 만듭니다."
 esc_tech_repeatable_nanite_damage:0 "나노봇 공격성 프로토콜"
 esc_tech_repeatable_nanite_damage_desc:0 "나노봇을 더 효과적인 파괴 무기로 만드는 한 가지 방법은 그들의 공격성을 증가시켜 마주치는 어떤 것이든 더 분해하고 싶어하도록 만드는 것입니다."
 esc_tech_repeatable_nanite_fire_rate:0 "나노봇 자가복제 프로토콜"
 esc_tech_repeatable_nanite_fire_rate_desc:0 "나노봇을 더 효과적인 파괴 무기로 만드는 한 가지 방법은 단순히 좀 더 많은 나노봇을 발사하는 것입니다. 그러나 이를 위해서는 최적화된 자가 복제 프로토콜로 높고 안정적인 생산률을 달성해야 합니다."
 esc_tech_flak_cannon_4:0 "개량형 대공 자주포"
 esc_tech_flak_cannon_4_desc:0 "최근의 기술 발전은 우리가 현재 이용할 수 있는 거점 방어 체계를 다시 한 번 들여다보게 합니다. 불행하게도, 현재 그들은 다소 부족한 것처럼 보입니다. 개량형 대공 자주포와 같은 새롭고 더 나은 거점 방어 무기가 필요합니다."
 esc_tech_flak_cannon_4_bio:0 "진화한 가시 포"
 esc_tech_flak_cannon_4_bio_desc:0 "위협 추적을 위한 추가 감각 기관과 전용 신경망을 진화시키면, 우리의 가시 포병은 어떤 기계도 따라올 수 없는 정밀함으로 다가오는 투사체를 식별하고, 추적하며, 파괴할 수 있는 생체 근접 방어 시스템으로 변모합니다."
 gateway_ESC_FLAK_CANNONS:0 "첨단 대공 자주포"
 esc_tech_flak_cannon_5:0 "아이언클라우드 대공포"
 esc_tech_flak_cannon_5_desc:0 "미사일 기술은 '검'으로서 기능할 수 있는 모든 것을 보여주었고, 이제 우리는 그들에게 대항하는 '방패'가 무엇인지에 대한 명확한 비전을 갖게 되었습니다. 이 새롭게 제안된 대공 자주포 설계는 그 어떤 미사일도 놓치지 말아야 할 것입니다."
 esc_tech_flak_cannon_5_bio:0 "철갑구름 가시 포"
 esc_tech_flak_cannon_5_bio_desc:0 "우리 가시 포병을 더 빠른 반사 신경과 더 높은 발사 속도를 갖도록 유도 진화시키면, 적 미사일과 공격기가 우리 함선에 접근할 모든 경로를 차단하는 생체 근접 방어 시스템이 생성됩니다."
 esc_tech_point_defense_4:0 "수호 거점 방어"
 esc_tech_point_defense_4_desc:0 "최근의 기술 발전은 우리가 현재 이용할 수 있는 거점 방어 체계를 다시 한 번 들여다보게 합니다. 불행하게도, 현재 그들은 다소 부족한 것처럼 보입니다. 개량형 CIWS 자주포와 같은 새롭고 더 나은 거점 방어 무기가 필요합니다"
 esc_tech_point_defense_4_bio:0 "보호 스내퍼 포"
 esc_tech_point_defense_4_bio_desc:0 "빠른 감각 처리를 위한 전용 신경 클러스터는 스내퍼 건이 가장 빠른 현대식 발사체가 목표물에 도달하기 전에 이를 추적하고 요격하는 데 필요한 인지 속도를 갖추게 합니다."
 gateway_ESC_PD_CANNONS:0 "첨단 거점 방어 대포"
 esc_tech_point_defense_5:0 "철의 장막"
 esc_tech_point_defense_5_desc:0 "이 새롭고 급진적인 디자인의 거점 방어 대포는 적의 미사일로부터 우리 함선을 보호하는 철의 장막이 될 것입니다."
 esc_tech_point_defense_5_bio:0 "철의 장막 급격포"
 esc_tech_point_defense_5_bio_desc:0 "신경 다발과 특화된 감각 기관의 유도된 진화는 우리의 생체 요격 시스템을 발전시켜, 적이 우리에게 발사할 가능성이 있는 거의 모든 발사체를 추적하고 파괴할 수 있는 수준으로 끌어올렸습니다."
 esc_tech_juggernaut_pd_1:0 "저거너트 거점 방어 체계"
 esc_tech_juggernaut_pd_1_desc:0 "저거너트는 매우 비싸고 소중한 전함이며 특수 거점 방어 무기와 같은 특별한 병기를 이용합니다. 이 대포가 적임입니다."
 esc_tech_juggernaut_pd_1_bio:0 "점멸자 스냅퍼 건"
 esc_tech_juggernaut_pd_1_bio_desc:0 "여러 스냅퍼 총 변종이 자연스럽게 거대화 경향을 보였으며, 그 크기와 함께 비례적으로 요격 능력이 증가하여 우리의 저거너트급 전투 짐승을 위한 전용 방어 무기로 선택적 번식에 적합한 후보가 됩니다."
 gateway_ESC_JUGGERNAUT_PD:0 "저거너트 거점 방어 체계"
 esc_tech_juggernaut_pd_2:0 "개량 저거너트 거점 방어 체계"
 esc_tech_juggernaut_pd_2_desc:0 "기존의 저거너트 거점 방어도 인상적인 무기 체계였지만, 우리는 더 낫고 더 강력한 무기를 만들 수 있습니다!"
 esc_tech_juggernaut_pd_2_bio:0 "진화된 저거너트 스냅퍼 건"
 esc_tech_juggernaut_pd_2_bio_desc:0 "추가적인 감각 기관과 확장된 신경 처리 클러스터는 우리의 저거너트 스냅퍼 건이 이전 모델들이 혼란 속에서 놓쳤던 위협을 추적하고 제거할 수 있는 지각적 민첩성을 제공합니다."
 esc_tech_point_defense_laser:0 "번개폭풍 거점 방어"
 esc_tech_point_defense_laser_desc:0 "레이저를 이용한 거점 방어 체계를 만든다는 아이디어는 새로운 것이 아니며, 우리는 과거에 이미 그러한 시스템으로 제한적인 성공을 거두었지만 마침내 극한의 우주전에 적합한 레이저 기반의 거점 방어 체계를 만드는 데 필요한 기술을 얻었습니다."
 esc_tech_point_defense_laser_bio:0 "강렬한 눈부심 빔 발사기"
 esc_tech_point_defense_laser_bio_desc:0 "생선 총의 감각 기관과 신경 집합체를 눈빔 발사기에 이식함으로써 생물학적 레이저 시스템은 전투 범위에서 들어오는 공격을 신뢰성 있게 요격하는 데 필요한 포식자의 위협 추적 본능을 갖추게 됩니다."
 esc_tech_psionic_cannon_1:0 "사이오닉 에너지 투사기"
 esc_tech_psionic_cannon_1_desc:0 "다른 형태의 많은 에너지와 마찬가지로, 사이오닉은 일관성 있는 빔의 형태로 넓은 거리에 걸쳐 전달될 수 있습니다. 만약 충분한 사이오닉 에너지가 그러한 빔 속에 들어간다면, 그것은 꽤 강력한 파괴 무기가 될 수 있습니다. 우리는 이 효과의 잠재적인 적용에 대해 연구해야 합니다."
 esc_tech_psionic_cannon_1_bio:0 "$esc_tech_psionic_cannon_1$"
 esc_tech_psionic_cannon_1_bio_desc:0 "전문화된 뇌샘의 성장을 의도적으로 조절함으로써 우리의 전투 야수들에서 잠재된 정신 능력을 깨울 수 있으며, 이는 순수한 물리적 방어로는 완전히 막을 수 없는 공격 수단을 제공합니다."
 gateway_ESC_PSIONIC_CANNONS:0 "사이오닉 대포"
 esc_tech_psionic_cannon_2:0 "사이오닉 광선 포"
 esc_tech_psionic_cannon_2_desc:0 "사이오닉 파워에 대한 이해가 커지면서, 이제 사이오닉 에너지를 조작하는 새로운 기술과 방법을 배울 수 있습니다. 이 지식을 군사적인 용도에 적용해 사이오닉 에너지 방출기를 업그레이드해야 할 때입니다."
 esc_tech_psionic_cannon_2_bio:0 "$esc_tech_psionic_cannon_2$"
 esc_tech_psionic_cannon_2_bio_desc:0 "뇌샘 구조의 지향적 진화는 정신적 출력을 상당히 증대시켜, 우리의 전투 야수들에게 첫 번째 세대가 가졌던 것보다 훨씬 더 큰 사거리와 힘을 가진 무기를 제공합니다."
 esc_tech_psionic_strike_1:0 "군소 장막 계약"
 esc_tech_psionic_strike_1_desc:0 "우리가 '장막'으로 알려진 영역을 탐험하기 시작하면서, 몇몇 소수의 존재들이 나서서 우리에게 상호 이익이 되는 협정을 제안했습니다. 그 조약들 중 일부는 적을 무찌르기 위해 그들의 힘을 요청할 수 있도록 해줍니다. 만약 우리가 목표물을 정확히 찾아낼 수 있는 수단을 만들 수 있다면, 이 힘은 함대함 전투에도 적용될 수 있습니다."
 esc_tech_psionic_strike_1_bio:0 "$esc_tech_psionic_strike_1$"
 esc_tech_psionic_strike_1_bio_desc:0 "전쟁 짐승들이 §M안개§! 계약의 살아있는 앵커 역할을 하면서, 기본적인 지능을 가진 생물조차 전투에서 하위 안개 주민들을 목표로 지시할 수 있게 되어, 살아있는 배 자체가 초차원 폭력의 매개체로 변모합니다."
 gateway_ESC_PSIONIC_STRIKES:0 "장막 공습 무기"
 esc_tech_psionic_strike_2:0 "하위 장막 계약"
 esc_tech_psionic_strike_2_desc:0 "장막의 거주자들과 맺은 계약의 수가 계속 늘어남에 따라, 우리는 이제 더 강력한 실체들의 힘과 접선할 수 있게 되었습니다. 안내 시스템을 재설계한다면, 우리는 그것들을 무기에도 사용할 수 있습니다."
 esc_tech_psionic_strike_2_bio:0 "$esc_tech_psionic_strike_2$"
 esc_tech_psionic_strike_2_bio_desc:0 "전투 짐승의 뇌 조직의 사이오닉 능력을 확장하는 추가 변이는 그들이 §M안개§! 거주자와의 계약을 유지할 수 있게 하여, 1세대 유기적 앵커가 결코 수용할 수 없었던 힘을 지휘할 수 있게 합니다."
 esc_tech_psionic_torpedo_1:0 "사이-블래스트 어뢰"
 esc_tech_psionic_torpedo_1_desc:0 "만약 농축된 사이오닉 에너지가 갑자기 방출된다면, 그 성질상 꽤 폭발적인 효과를 만들어낼 수 있습니다. 우린 이걸 무기로도 이용할 수 있습니다."
 esc_tech_psionic_torpedo_1_bio:0 "$esc_tech_psionic_torpedo_1$"
 esc_tech_psionic_torpedo_1_bio_desc:0 "유기 미사일 기술과 전문 생물학적 조직을 결합하여 정신 에너지를 저장함으로써, 집중된 정신력의 폭발 잠재력을 목표에 직접 전달하는 생명 무기를 생산합니다."
 gateway_ESC_PSIONIC_TORPEDOES:0 "사이오닉 어뢰"
 esc_tech_psionic_torpedo_2:0 "개량 사이-블래스트 어뢰"
 esc_tech_psionic_torpedo_2_desc:0 "새로운 소재와 사이오닉 기술을 통해, 사이오닉 에너지를 훨씬 더 조밀하게 저장할 수 있습니다. 이는 우리가 훨씬 더 큰 파괴력을 가진 차세대 사이오닉 어뢰를 만들 수 있다는 것을 의미합니다."
 esc_tech_psionic_torpedo_2_bio:0 "$esc_tech_psionic_torpedo_2$"
 esc_tech_psionic_torpedo_2_bio_desc:0 "정제된 유기 미사일 구조는 생물학적 운반 조직이 정신 에너지를 훨씬 더 밀집하게 저장하고 압축할 수 있게 하여, 폭발력을 배가시키고 각 타격이 잘 방어된 목표물에게도 중요한 사건이 되도록 만듭니다."
 esc_tech_psionic_lance_1:0 "사이오닉 랜스"
 esc_tech_psionic_lance_1_desc:0 "우리는 이전에는 상상할 수 없었던 규모의 사이오닉 빔 무기를 만들 수 있는 단계에 도달했습니다. 이 새로운 사이오닉 랜스는 우리의 강력한 함대에게 훌륭한 무기가 될 것입니다."
 gateway_ESC_PSIONIC_LANCES:0 "사이오닉 랜스"
 esc_tech_psionic_lance_2:0 "장막 관통자"
 esc_tech_psionic_lance_2_desc:0 "최근의 기술적인 업적 덕분에, 우리는 이제 사이오닉 랜스를 훨씬 더 강력하고 치명적인 무기로 만들 수 있습니다."
 esc_tech_psionic_lance_titanic:0 "공허 광선"
 esc_tech_psionic_lance_titanic_desc:0 "정말 거대한 신형 전함의 개발과 함께, 기함을 위한 더욱 거대하고 강력한 무기가 필요해졌습니다.우리는 더 크고 강력한 버젼의 사이오닉 랜스를 만들 것입니다"
 esc_tech_psionic_interceptors:0 "사이오닉 요격기"
 esc_tech_psionic_interceptors_desc:0 "사이오닉 무기의 첫 번째 비유동적 테스트 이후에도, 사이오닉이 우주전을 위한 타격기를 포함한 다양한 응용 프로그램에 사용될 수 있다는 것이 분명했습니다. 그리고 이제 그러한 무기를 현실로 만들 때가 왔습니다."
 esc_tech_psionic_interceptors_bio:0 "정신적으로 증강된 아메바"
 esc_tech_psionic_interceptors_bio_desc:0 "선택적 번식과 목표 지향적 유전자 공학은 우주에서 태어난 아메바의 잠재적인 염력 능력을 크게 발휘하게 하여, 자연적인 공허 저항력과 기존 무기로 쉽게 복제할 수 없는 염력 치명성을 결합한 공격 생물을 만들어냅니다."
 esc_tech_repeatable_psionic_damage:0 "집중된 정신"
 esc_tech_repeatable_psionic_damage_desc:0 "정신, 한 가지 것에 집중하는 정신은, 사이오닉 파워의 가장 위대한 수준을 성취할 수 있습니다"
 esc_tech_repeatable_psionic_fire_rate:0 "힘의 샘"
 esc_tech_repeatable_psionic_fire_rate_desc:0 "사이오닉 파워를 사용하는 것은 마음과 몸에 부담을 줍니다. 더 강해지도록 훈련을 반복함으로써, 우리는 말 그대로 사이오닉 파워가 넘쳐가는, 바닥이 없는 우물로 변할 수 있습니다."
 esc_tech_psionic_disruptor_2:0 "집중된 정신 파괴기"
 esc_tech_psionic_disruptor_2_desc:0 "정신 에너지를 밀집된 방해 필드로 집중하는 기술이 개선되어 무기의 적 함선의 선체 무결성을 저하시킬 수 있는 능력과 중요한 함선 시스템을 방해하는 능력이 크게 증가했습니다."
 esc_tech_bio_psionic_disruptor_2:0 "$esc_tech_psionic_disruptor_2$"
 esc_tech_bio_psionic_disruptor_2_desc:0 "$esc_tech_psionic_disruptor_2_desc$"
 esc_tech_psionic_disruptor_3:0 "안개로 강화된 방해기"
 esc_tech_psionic_disruptor_3_desc:0 "정신 에너지를 §M장막§!에서 직접 채널링하여 승무원의 자체 자원을 통해서가 아니라 방해 장치 출력을 어떤 수행자의 개인적인 힘으로도 유지할 수 없는 수준으로 끌어올려, 매우 불안한 효과를 가진 무기를 생산합니다."
 esc_tech_bio_psionic_disruptor_3:0 "$esc_tech_psionic_disruptor_3$"
 esc_tech_bio_psionic_disruptor_3_desc:0 "$esc_tech_psionic_disruptor_3_desc$"
 esc_tech_psionic_lightning_2:0 "집중된 사이오닉 번개"
 esc_tech_psionic_lightning_2_desc:0 "정신적 방전 집중에 대한 향상된 제어로 인해 우리의 번개 무기가 더 높은 정확도로 더 파괴적인 강도로 타격할 수 있게 되어, 보조적인 도구가 아닌 신뢰할 수 있는 대형 함선 전투 도구가 되었습니다."
 esc_tech_bio_psionic_lightning_2:0 "$esc_tech_psionic_lightning_2$"
 esc_tech_bio_psionic_lightning_2_desc:0 "$esc_tech_psionic_lightning_2_desc$"
 esc_tech_psionic_lightning_3:0 "정신의 장막 번개"
 esc_tech_psionic_lightning_3_desc:0 "정신적 에너지의 광대한 §M장막§!을 직접 활용하여 생성된 번개는 매우 강렬하여 무기 자체의 승무원들이 방전으로부터 보호받아야 하지만, 적 함대에 가하는 피해는 이러한 복잡성을 충분히 가치 있게 만듭니다."
 esc_tech_bio_psionic_lightning_3:0 "$esc_tech_psionic_lightning_3$"
 esc_tech_bio_psionic_lightning_3_desc:0 "$esc_tech_psionic_lightning_3_desc$"
 esc_tech_strikecraft_4:0 "공습 함재기"
 esc_tech_strikecraft_4_desc:0 "우주전 방식이 계속 발전함에 따라, 우리는 더 강력한 새로운 타격기가 필요하다는 것을 알게 되었습니다. 몇 가지 새롭고 혁신적인 디자인이 제출되었으며, 가까운 미래에 우리의 요구에 가장 적합한 디자인을 찾아야 합니다."
 gateway_ESC_STRIKECRAFTS:0 "첨단 타격기"
 esc_tech_strikecraft_5:0 "공성 함재기"
 esc_tech_strikecraft_5_desc:0 "신기술과 신무기가 계속 등장하고 있는 지금, 우리의 타격기들도 뒤처져서는 안 됩니다. 따라서, 차세대 타격기에 대한 개발은 더 이상 지체되지 않고 집약되어야 합니다."
 esc_tech_strikecraft_6:0 "공허추적자 함재기"
 esc_tech_strikecraft_6_desc:0 "놀라울 정도로 발전된 선구자 기술에 접근함으로써, 과거에는 꿈도 꿀 수 없었던 능력을 갖춘 타격기를 제작할 수 있습니다."
 esc_tech_amoeba_2:0 "혼종 아메바"
 esc_tech_amoeba_2_desc:0 "길들여진 아메바 편모 무리는 이미 무시무시한 하나의 '무기'이지만, 우리는 선택적 번식을 통해 그것들을 더 강하고, 더 빠르고, 더 단단하도록 유전적으로 개조함으로써 훨씬 더 목적에 부합하도록 만들 수 있습니다."
 gateway_ESC_AMOEBA_STRIKECRAFT:0 "개량된 아메바 편모"
 esc_tech_amoeba_3b:0 "유전공학적 아메바"
 esc_tech_amoeba_3b_desc:0 "유전 공학에 대한 우리의 새로운 통달로 인해, 우리는 아메바 편모들의 약점을 제거하고 강점만을 더욱 강화시켜 이 동물을 함대를 위한 훨씬 더 강력한 '무기'로 탈바꿈시킬 수 있습니다."
 gateway_ESC_AMOEBA_STRIKECRAFT_BIO:0 "바이오-증강 아메바 편모"
 esc_tech_amoeba_4b:0 "완벽한 우주적 유기체"
 esc_tech_amoeba_4b_desc:0 "우리가 아메바 편모를 군사적인 필요를 충족시키는 그야말로 완벽한 우주적 생물로 바꿔놓기까지 겨우 한 걸음 남았습니다. 우리는 이 단계를 지나가야만 합니다."
 esc_tech_amoeba_3c:0 "사이버네틱 증강 아메바"
 esc_tech_amoeba_3c_desc:0 "사이버네틱 기술과 기계기능의 향상은 이제 우리 일상생활의 일부가 되었습니다. 이러한 기계와의 공생이 가져오는 이득은 엄청나고, 이것이 우리의 명령 하에 있는 아메바 편모들에게도 적용되지 않을 것이라고 생각할 이유는 없습니다: 사이버네틱 임플란트는 그들을 더 강하고, 더 잘 보호되며, 더 똑똑하게 만들어 그들을 훨씬 더 효과적인 '무기'로 만들 수 있습니다."
 gateway_ESC_AMOEBA_STRIKECRAFT_CYBER:0 "사이버네틱 아메바 편모"
 esc_tech_amoeba_4c:0 "바이오닉 아메바"
 esc_tech_amoeba_4c_desc:0 "사이버네틱 증강이 더욱 발전하면서, 우리는 이제 아메바 편모를 우리 함대를 위한 믿을 수 없을 정도로 적절한 '무기'로 바꿀 수 있습니다"
 esc_tech_strikecraft_mercenary_1:0 "용병 고용"
 esc_tech_strikecraft_mercenary_1_desc:0 "돈으로는 많은 것을 살 수 있습니다. 군사력은 특히 그렇습니다. 독립적으로 살아가는 우주 비행사들과 접촉함으로써, 우리는 강하고 경험이 풍부한 조종사를 보충할 수 있을 것입니다. 그들의 전투기는 덤입니다."
 gateway_ESC_MERCENARY_CTRIKECRAFT:0 "용병 전대"
 esc_tech_strikecraft_mercenary_2:0 "정예 용병 계약"
 esc_tech_strikecraft_mercenary_2_desc:0 "관대한 고용주로사의 우리의 평판이 퍼지게 되면서, 더 많은 용병들이 기꺼이 우리를 위해 봉사할려고 합니다. 물론, 꽤 많은 크레딧을 받아야겠지만요..."
 esc_tech_swarm_strike_craft_2:0 "포식자 무리"
 esc_tech_swarm_strike_craft_2_desc:0 "우리는 이미 생포하고 재프로그래밍한 스커지 무리들을 일련의 특수 훈련과 정신 변화 약물을 통해 훨씬 더 강력하고 사나운 생체 전사로 만들 수 있습니다."
 esc_tech_tesla_coil_1:0 "테슬라 코일"
 esc_tech_tesla_coil_1_desc:0 "전기에 대한 우리의 깊은 지식에 따라, 우리는 레이저 빔으로 만들어진, 무형의 전도성 띠를 따라 생성기에서 목적지까지 치솟는 일련의 에너지의 흐름을 만들 수 있습니다. 이 기술에 기반을 둔 무기는 보호막이 없는 전자제품에 대해 파괴적일 것입니다."
 esc_tech_tesla_coil_1_bio:0 "생물 전기 방전기"
 esc_tech_tesla_coil_1_bio_desc:0 "생체 공학적으로 설계된 비범한 전기 용량의 근육 그룹과 정밀하게 방전을 형성하고 유도하는 전도성 조직이 결합되어 우리의 전투 야수에게 자연 전기 기원을 가진 무기를 제공합니다. 이는 방패가 없는 전자기기와 우주 생물 모두에게 치명적입니다."
 gateway_ESC_TESLA_CANNONS:0 "테슬라 포"
 esc_tech_tesla_coil_2:0 "개량 테슬라 코일"
 esc_tech_tesla_coil_2_desc:0 "새로운 초전도체를 이용할 수 있게 됨에 따라, 우리는 이제 훨씬 더 큰 전류를 견딜 수 있는 발전기와 축전기를 만들 수 있게 되었습니다. 이것은 테슬라 코일에 상당한 힘을 불어넣을 것입니다."
 esc_tech_tesla_coil_2_bio:0 "진화된 생체 전기 방전기"
 esc_tech_tesla_coil_2_bio_desc:0 "생체 전기 방전기 근육과 저장 조직의 유도 진화는 축적할 수 있는 전하와 각 방전의 폭발성을 모두 증가시킵니다."
 esc_tech_tesla_bomb_1:0 "테슬라 폭탄"
 esc_tech_tesla_bomb_1_desc:0 "강력한 전류가 끊임없이 순환하는 초전도 고리는 만약 깨지게 된다면, 엄청나게 치명적인 전자적 폭탄으로 바뀔 수 있습니다. 우리는 이것을 바탕으로 차세대 어뢰를 만들 것입니다."
 esc_tech_tesla_bomb_1_bio:0 "생체 전기 폭탄"
 esc_tech_tesla_bomb_1_bio_desc:0 "전문화된 유기 미사일은 전도성 조직으로 덮여 있어 비행 중에 막대한 전하를 축적하고 충돌 시 한 번에 모두 방출하여 즉각적인 지역 내 모든 것을 무력화하고 손상시키는 전자기 폭발을 발생시킵니다."
 gateway_ESC_TESLA_TORPEDOES:0 "테슬라 폭탄"
 esc_tech_tesla_bomb_2:0 "개량 테슬라 폭탄"
 esc_tech_tesla_bomb_2_desc:0 "새로운 초전도 물질을 이용할 수 있게 됨에 따라, 우리는 더 높은 충전 용량 가진 초전도체를 만들 수 있게 되었고, 테슬라 폭탄은 더더욱 위험해졌습니다."
 esc_tech_tesla_bomb_2_bio:0 "진화된 생체 전기 폭탄"
 esc_tech_tesla_bomb_2_bio_desc:0 "유도된 전도성 조직 밀도와 전하 저장 용량의 진화는 훨씬 더 큰 전자기 출력을 가진 생체 전기 폭탄을 생성하여, 적의 함선 집단을 적절한 시점에 폭발시켜 무력화할 수 있습니다."
 esc_tech_tesla_cannon_1:0 "테슬라 캐논"
 esc_tech_tesla_cannon_1_desc:0 "우리의 현존하는 테슬라 코일은 가장 강력한 함선의 주 무기로 사용되기엔 충분히 크지 않습니다. 우리는 이 부적절함을 바로잡고 우리의 기함에 맞는 거대한 크기와 힘을 가진 테슬라 대포를 개발할 것입니다."
 esc_tech_tesla_cannon_1_bio:0 "생체 전기 포"
 esc_tech_tesla_cannon_1_bio_desc:0 "선택적 번식은 극단적인 크기와 생체 전기 용량을 향상시켜, 우리의 가장 큰 전투 야수의 주요 장거리 무기로 사용될 수 있는 방전 장치의 변종을 생산합니다. 이 장치는 함선의 전체 구획을 태울 수 있는 방전 사건을 발생시킵니다."
 gateway_ESC_TESLA_LANCES:0 "초대형 테슬라 캐논"
 esc_tech_tesla_cannon_2:0 "개량된 테슬라 캐논"
 esc_tech_tesla_cannon_2_desc:0 "테슬라 대포는 더욱 정교하게 조정되어 적들에게 훨씬 더 강력하고 치명적인 전기 폭발을 전달할 수 있습니다."
 esc_tech_tesla_cannon_2_bio:0 "진화된 생체 전기 포"
 esc_tech_tesla_cannon_2_bio_desc:0 "생체 전기 포 계통의 추가 진화는 극단적인 전하 저장 및 방전 속도로 이어져, 전기 출력이 심지어 강력한 방어막을 가진 목표물도 압도할 수 있는 생명 무기를 만들어냅니다."
 esc_tech_tesla_cannon_titanic:0 "타이탄급 테슬라 대포"
 esc_tech_tesla_cannon_titanic_desc:0 "정말 거대한 신형 전함이 개발되면서, 우리는 현존하는 테슬라 대포들 중 가장 큰 것조차도 불충분하다는 것을 알게 되었습니다. 따라서, 새롭고 더 큰 무기 설계가 개발되어야 합니다."
 esc_tech_tesla_cannon_titanic_bio:0 "타이타닉 생체 전기 포"
 esc_tech_tesla_cannon_titanic_bio_desc:0 "생물 전기 포 아키텍처의 추가적인 유도 진화는 비할 데 없는 크기와 방전 용량을 가진 타이탄급 변종을 생산하며, 이는 우리의 가장 위대한 레비아탄급 전투 짐승을 위한 기록적인 생물 무기입니다."
 esc_tech_tesla_interdictor:0 "테슬라의 금제"
 esc_tech_tesla_interdictor_desc:0 "강력한 전기 방전은 치명적인 무기지만 쉴드에 너무 쉽게 막힙니다. 적들의 쉴드 뒤에 있는 취약한 보호용 거품 안으로 아군의 대포를 전달한 뒤, 그곳에서부터 그들의 왕국을 날려보낼 수 있는 플랫폼을 개발하는 것도 좋은 생각입니다."
 esc_tech_tesla_interdictor_bio:0 "생체 전기 전투수"
 esc_tech_tesla_interdictor_bio_desc:0 "특수화된 번식 프로그램은 적의 방어막 버블 안으로 직접 생체 전기 무기를 운반하는 공격 생물을 생산한 후, 방어를 막기 위해 설계된 방어막 내부에서 발사하여 타격합니다."
 esc_tech_mandibles_4:0 "중성자 함유 턱발톱"
 esc_tech_mandibles_4_desc:0 "전문가들이 알고 있는 가장 강력한 물질 중 하나인 중성자 물질을 전투 야수의 턱 구조 매트릭스에 주입함으로써, 이미 강력한 자연 무기를 거의 모든 선체 재료를 관통할 수 있는 보딩 도구로 변형시킵니다."
 esc_tech_mandibles_5:0 "아다만틴 턱날개"
 esc_tech_mandibles_5_desc:0 "정밀하게 설계된 중성자 포함물의 분포가 하악 구조 전반에 걸쳐 이루어져 복합 무기를 형성하며, 이 무기의 물림 힘과 날 유지력 덕분에 가장 이국적인 방어구 재료를 제외한 모든 방어구를 쉽게 관통할 수 있습니다."
 esc_tech_mandibles_cyber_1:0 "사이버네틱 강화 턱"
 esc_tech_mandibles_cyber_1_desc:0 "사이버네틱 증강은 전투 야수의 턱이 가진 상당한 물리적 힘을 생물학적 한계를 넘어 확장시키며, 통합된 에너지 방출 장치는 적들이 우리에 맞서 배치하는 반탐입 방어 수단을 무력화할 수 있도록 보장합니다."
 esc_tech_mandibles_cyber_2:0 "바이오닉 집게발"
 esc_tech_mandibles_cyber_2_desc:0 "사이버네틱 턱 강화의 새로운 세대는 기계 등급의 서보 증폭을 생물의 자연적인 타격 패턴과 통합하여 뛰어난 속도와 압도적인 힘을 가진 보딩 무기를 생산합니다."
 esc_tech_shockwave:0 "아크 에너지 충격파"
 esc_tech_shockwave_desc:0 "전통적인 전기 무기 개선은 사거리와 위력을 추구하지만, 다른 접근 방식은 방전을 모든 방향으로 동시에 유도하여 함선 자체를 발사기로 만들고 사거리 내의 모든 목표를 한 번에 타격하는 것을 제안합니다."
 esc_tech_shockwave_dark_matter:0 "어두운 물질 헤일로 폭발"
 esc_tech_shockwave_dark_matter_desc:0 "어둠 물질에 대한 에너지 충격파 무기 개발에서 배운 전방향 폭발 원리를 적용하면, 상당한 반경 내의 모든 적 함선을 동시에 파괴하는 범주적으로 더 강력한 무기가 만들어집니다."
 esc_tech_shockwave_psionic:0 "정신적 재앙"
 esc_tech_shockwave_psionic_desc:0 "모든 방향으로 방출되는 정신적 방전이 발사선 주변에 파괴의 구체를 생성합니다. 이 무기는 거리 좁히기와 우리의 진형을 압도하려는 적의 공격에 처벌하기에 이상적으로 적합합니다."
 esc_tech_shockwave_tesla:0 "옴니 방향 테슬라 충격파"
 esc_tech_shockwave_tesla_desc:0 "테슬라 포병 기술을 아크 에너지 충격파 프레임워크에 통합하면, 적의 함선이 교전 범위에 접근하는 것만으로도 무력화할 수 있는 훨씬 더 강력한 전방향 전자기 폭발이 생성됩니다."
 esc_tech_armor_6:0 "개량형 뉴트로늄 장갑"
 esc_tech_armor_6_desc:0 "표준 뉴트로늄 장갑의 구성 및 레이어를 개선하면, 내구성과 내손성을 높일 수 있습니다. 그런 장갑은 일단 만들어지면 거의 모든 공격을 물리칠 수 있을 것입니다."
 esc_tech_armor_6_bio:0 "진화된 중성자 갑옷"
 esc_tech_armor_6_bio_desc:0 "고급 생명공학은 전투 야수 갑옷 내부의 중성자 섬유를 특수한 맞물림 구조로 변형하여 운동 에너지를 놀라운 효율로 흡수하고 분산시킵니다. 이는 생물학적 선체를 주로 겨냥하는 발사체 무기에 대한 저항력을 크게 증가시킵니다."
 gateway_ESC_ARMOR:0 "첨단 장갑 유형"
 esc_tech_armor_7:0 "아다만티움 장갑"
 esc_tech_armor_7_desc:0 "장갑 제작 기술이 좀 더 발전함에 따라 우리는 뉴트로늄 장갑을 만들 수 있게 되었고, 그보다 더 강력한 버전도 만들 수 있습니다. 우리의 예측은 향상의 결과로 나온 물질이 거의 파괴될 수 없을 것이라는 것을 보여주며, 몇몇 과학자들은 이미 이 물질이 그것과 많은 기적적인 특징들을 공유하는 신화적인 금속의 이름을 따서 '아다만티움'이라고 부르고 있습니다."
 esc_tech_armor_7_bio:0 "아다만티움 갑옷"
 esc_tech_armor_7_bio_desc:0 "더욱 발전된 생명공학과 유도 진화 과정을 거친 중성자 갑옷 계통은 매우 강력한 새로운 변종을 만들어내어 연구자들은 이를 아다만티움이라고 부르기 시작했습니다. 초기 테스트 결과, 이 신화적인 금속과의 비교가 전적으로 은유적이지 않다는 것을 시사합니다."
 esc_tech_bio_armor_1:0 "생체 물질 장갑"
 esc_tech_bio_armor_1_desc:0 "전통적인 장갑과 유전자 조작 생물들의 거대한 군집을 융합함으로써, 우리는 거의 커다란 인공 피부와도 같은 장갑을 만들 수 있습니다. 이러한 물질은 특히 손상에 매우 강해서, 마치 살아있는 유기체의 조직처럼 자가 치유될 수 있습니다."
 gateway_ESC_BIO_ARMOR:0 "생체 물질 장갑"
 esc_tech_bio_armor_2:0 "개량 생체 물질 장갑"
 esc_tech_bio_armor_2_desc:0 "유전자 조작에 대한 우리의 새로운 통달은 기존의 생체물질 장갑에 새로운 유형의 장갑 형태와 새로운 생물체를 추가할 수 있도록 해줍니다. 새로운 유전자 조작 생명체들과 향상된 소재를 결합한 이 차세대 생체물질 장갑은 더욱 강력하고 빠르게 재생될 것입니다."
 esc_tech_armor_nanite_1:0 "나노물질 장갑"
 esc_tech_armor_nanite_1_desc:0 "수리 프로토콜이 프로그래밍된 나노봇을 주입한다면, 손상으로부터 보호할 뿐만 아니라 예측하지 못한 손상도 효과적적으로 수리할 수 있는 진보된 갑옷 유형을 만들 수 있습니다."
 esc_tech_armor_nanite_1_bio:0 "나노물질이 주입된 갑옷"
 esc_tech_armor_nanite_1_bio_desc:0 "나노입자 클러스터가 전투 야수의 갑옷에 통합되어 구조적 저항력을 향상시키고, 생물체가 비증강 유기체의 외피를 영구적으로 손상시킬 상처에서 회복할 수 있도록 하는 자가 수리 기능을 제공합니다."
 gateway_ESC_NANITE_ARMOR:0 "나노-증강 장갑"
 esc_tech_armor_nanite_2:0 "개량 나노물질 장갑"
 esc_tech_armor_nanite_2_desc:0 "최신형 수리 나노봇 모델과 결합한 첨단 장갑 소재는 이전의 모델보다 더 단단하고 더 빠르게 손상을 수리할 수 있는 차세대 나노물질 장갑으로 만들어질 수 있습니다."
 esc_tech_armor_nanite_2_bio:0 "개선된 나노물질 주입 갑옷"
 esc_tech_armor_nanite_2_bio_desc:0 "고급 생명공학과 향상된 나노 기술을 결합하여 생산된 갑옷은 보호 강도와 자가 수리 속도가 첫 번째 세대의 나노 주입 생물학적 갑옷에 비해 측정 가능한 발전을 나타냅니다."
 esc_tech_armor_dragonscales_nanite:0 "나노-증강형 용린 장갑"
 esc_tech_armor_dragonscales_nanite_desc:0 "수리 나노봇과 에테르 드레이크의 비늘을 결합함으로써, 우리는 스스로 수리할 수 있으면서도, 믿을 수 없을 만큼 튼튼한 장갑을 만들 수 있습니다. 이는 우리의 장갑 공학의 핵심이 될 것입니다."
 esc_tech_armor_dragonscales_nanite_bio:0 "나노기계가 주입된 드래곤 스케일"
 esc_tech_armor_dragonscales_nanite_bio_desc:0 "에테르 드레이크의 비늘은 우리의 전투 야수들이 자연적으로 진화한 것과 비교할 수 없을 정도로 뛰어난 구조적 특성을 보여주며, 이를 나노 기계와 통합하면 기존 무기고의 어떤 것과도 합리적으로 비교할 수 없는 비범한 능력을 가진 생물학적 갑옷이 생성됩니다."
 esc_tech_armor_shield_1:0 "보호막 장갑"
 esc_tech_armor_shield_1_desc:0 "에너지 역장을 생성하고 유지하도록 프로그래밍된 특수 나노봇을 추가한다면, 쉴드 생성기의 역할을 겸하는 도금된 장갑을 만들 수 있습니다."
 esc_tech_armor_shield_1_bio:0 "갑옷 방패"
 esc_tech_armor_shield_1_bio_desc:0 "전투 야수의 갑각에 방패 생성 나노입자를 주입하면 운동 에너지와 에너지 무기에 모두 효과적인 생물학적 방어 시스템이 생성되며, 생명체의 살아있는 갑옷과 그가 발산하는 장이 협력하여 작동합니다."
 gateway_ESC_SHIELD_ARMOR:0 "실드 생성 장갑"
 esc_tech_armor_shield_2:0 "개량 보호막 장갑"
 esc_tech_armor_shield_2_desc:0 "더 많은 양의 에너지를 조작할 수 있는 차세대의 나노봇을 이용한다면, 우리는 더 강력한 쉴드 효과를 낼 수 있도록 우리의 보호막 장갑을 업그레이드 할 수 있습니다"
 esc_tech_armor_shield_2_bio:0 "진화된 방어 갑옷"
 esc_tech_armor_shield_2_bio_desc:0 "향상된 방패 생성 나노입자와 전투 야수 외골격 조직의 통합은 물리적 갑옷과 방출하는 힘의 장을 모두 강화하여, 어떤 방법으로도 생물을 손상시키기 어렵게 만듭니다."
 esc_tech_armor_shield_3:0 "보호막 방벽"
 esc_tech_armor_shield_3_desc:0 "나노봇이 더 향상되면서, 더더욱 단단하고 강력한 쉴드를 내뿜는, 말 그대로의 성채와도 같은 장갑을 만들 수 있습니다."
 esc_tech_armor_shield_3_bio:0 "완벽한 방어 갑옷"
 esc_tech_armor_shield_3_bio_desc:0 "가장 정교한 방패 생성 나노입자가 생물공학적으로 설계된 갑각 조직과 결합되어 그 출력을 수용하고 전달하도록 최적화되어 궁극적인 생물학적 방어를 생성합니다: 갑옷과 방패가 하나의 불가분한 시스템으로 작동합니다."
 esc_tech_armor_wraith:0 "고형광선 장갑"
 esc_tech_armor_wraith_desc:0 "스펙트럴 망령은 겉보기엔 아무것도 아닌 것처럼 보이는, 단단한 빛으로만 만들어진 신기한 생물입니다. 그 물질을 복제함으로써, 우리는 은하계에서 이전에 볼 수 있었던 그 어떤 것과도 다른 장갑을 만들 수 있을 것입니다."
 esc_tech_armor_horror:0 "이차원 괴물 장갑"
 esc_tech_armor_horror_desc:0 "이차원 포탈의 잔여물을 연구하면서 이차원 공포의 가죽이 가진 성분을 알아낼 수 있습니다. 이 엄청난 물질은 우리 함선에게 새로운 수준의 보호를 제공할 것입니다."
 esc_tech_crystal_armor_3:0 "강화된 결정 단조판"
 esc_tech_crystal_armor_3_desc:0 "크리스탈 물질은 놀라운 내구성을 가지고 있으며, 우리는 이를 이용하여 선체를 도금할 수 있습니다."
 esc_tech_crystal_core_armor_1:0 "크리스탈 코어 중성자 갑옷"
 esc_tech_crystal_core_armor_1_desc:0 "표준 중성자 격자를 수정체 코어 주위에 구축함으로써, 전례 없는 경도와 파괴 전파 저항성을 가진 물질을 설계할 수 있습니다. 이러한 물질은 함선 갑옷 판에 이상적입니다."
 esc_tech_crystal_core_armor_2:0 "크리스탈 코어 아다만티움 갑옷"
 esc_tech_crystal_core_armor_2_desc:0 "고급 중성자 금속 방어구 플레이트의 개선을 수정체 코어 재료에 적용함으로써, 현재 우리가 접근할 수 있는 것 이상의 새로운 수준의 방어구 재료를 약속합니다."
 esc_tech_shields_6:0 "개량 초강화 보호막"
 esc_tech_shields_6_desc:0 "차세대 보호막 축전지를 통해, 초강화 보호막의 강도와 충전 속도를 더더욱 높여 적의 공격으로부터 아군 함선을 보호하는 능력을 크게 향상시킬 수 있습니다."
 esc_tech_shields_6_bio:0 "개선된 하이퍼 방패 근육 구조"
 esc_tech_shields_6_bio_desc:0 "에너지 채널링 생물 조직의 유도 진화는 더 강력한 방패를 생성할 수 있는 전투 야수를 만들어내며, 각 타격에서 더 빠르게 회복하게 하여 지속적인 전투에서 그들에게 훨씬 덜 위험하게 만듭니다."
 gateway_ESC_SHIELDS:0 "첨단 보호막"
 esc_tech_shields_7:0 "초쌍곡형 보호막"
 esc_tech_shields_7_desc:0 "보호막 축전지에서 생성된 에너지 역장을 대체 차원에 고정함으로써, 우리는 역장의 강도를 크게 높일 수 있습니다. 이러한 기술을 구현한다면 이전에는 볼 수 없었던 강도의 실드 부품을 만들 수 있습니다."
 esc_tech_shields_7_bio:0 "초고속 방어 근육 구조"
 esc_tech_shields_7_bio_desc:0 "생물학적 방패 조직에 초고차원 차원 기술을 전투 야수의 육체에 통합하면, 생물학적 방패 조직에 고차원 앵커가 부여되어 방어 필드의 강도가 생물체의 대사만으로는 유지할 수 있는 수준을 훨씬 초과하여 극적으로 증폭됩니다."
 esc_tech_shields_8:0 "파동 장갑"
 esc_tech_shields_8_desc:0 "만약 그들이 우리에게 들어오는 공격의 일부나 전체를 다른 차원으로 우회시킬 수 있다면, 우리 방패의 강도를 더 높일 수 있습니다."
 esc_tech_shields_8_bio:0 "파동력 갑옷"
 esc_tech_shields_8_bio_desc:0 "생물학적 방패는 전례 없는 효율성을 발휘하며, 전투가 진행됨에 따라 공격할수록 더욱 위험해지는 전투 야수를 생성합니다. 이는 초고차원 생명공학을 발전시켜 들어오는 공격 에너지를 대체 차원으로 완전히 전환하는 결과입니다."
 esc_tech_shields_cyclonic_1:0 "사이클로닉 왜곡장"
 esc_tech_shields_cyclonic_1_desc:0 "사이클로닉 실드 조화 기술은 중첩된 장벽들이 서로의 재생력을 향상시키는 것으로, 이는 왜곡장 설계의 새로운 길을 열었습니다."
 esc_tech_shields_cyclonic_1_bio:0 "사이클론 에너지 흐름 근육 구조"
 esc_tech_shields_cyclonic_1_bio_desc:0 "근육층이 서로 반대 방향으로 에너지를 흐르게 하면 서로의 출력을 강화할 수 있어, 우리의 전투 야수들에게 단일층 시스템이 관리할 수 있는 것보다 훨씬 빠르게 재충전되는 보호 장벽을 제공합니다."
 gateway_ESC_CYCLONIC_SHIELDS:0 "사이클로닉 보호막"
 esc_tech_shields_cyclonic_2:0 "사이클로닉 보호막"
 esc_tech_shields_cyclonic_2_desc:0 "사이클로닉 왜곡장 기술은 좀 더 개선되어 강력한 실드 축전기와 통합되었고, 실드의 재생 속도에 영향을 미치지 않고 더 강력한 실드 역장을 사용할 수 있게 했습니다."
 esc_tech_shields_cyclonic_2_bio:0 "진화된 사이클론 에너지 흐름 근육 구조"
 esc_tech_shields_cyclonic_2_bio_desc:0 "유도 진화는 기존의 사이클론 근육 구조를 강화할 수 있으며, 생성하는 방패의 원시적인 힘과 충격 간 방패가 회복되는 속도를 모두 증가시킵니다."
 esc_tech_shields_cyclonic_3:0 "개량된 사이클로닉 보호막"
 esc_tech_shields_cyclonic_3_desc:0 "몇 가지 새로운 역장 조작 기술로 우리는 더 강력한 버전의 사이클로닉 쉴드를 개발할 수 있습니다. 이는 우리의 함선에 더 높은 수준의 보호를 제공할 것입니다."
 esc_tech_shields_cyclonic_3_bio:0 "완벽한 사이클론 에너지 흐름 근육 구조"
 esc_tech_shields_cyclonic_3_bio_desc:0 "전반적인 유전자 공학은 우리의 전투 야수들의 사이클론 에너지 흐름 근육 구조를 이론적인 정점으로 끌어올리며, 생명체에서 이 방어 접근 방식의 궁극적인 형태를 만들어냅니다."
 esc_tech_dark_matter_shields_2:0 "개량형 암흑 물질 보호막"
 esc_tech_dark_matter_shields_2_desc:0 "암흑 물질의 특성과 본질에 대한 이해가 지속적으로 증가함에 따라, 우리는 기본적인 암흑물질 쉴드의 설계에 여러 가지 개선 사항을 구현하여 보호 영역의 강도와 재생률을 크게 높일 수 있었습니다."
 esc_tech_dark_matter_shields_2_bio:0 "진화된 암흑 물질 주입 근육 조직"
 esc_tech_dark_matter_shields_2_bio_desc:0 "유도 진화는 우리의 전투 야수의 근육 구조와 그 속에 얽힌 암흑 물질 간의 상호작용을 강화하여, 원래의 변종들이 달성할 수 있었던 것보다 훨씬 높은 보호 출력을 끌어올립니다."
 gateway_ESC_DARK_MATTER_SHIELDS:0 "첨단 암흑물질 보호막"
 esc_tech_dark_matter_shields_3:0 "완벽한 암흑 물질 보호막"
 esc_tech_dark_matter_shields_3_desc:0 "암흑 물질의 본질에 대한 깊은 이해는 우리가 극도로 강력한 보호막을 만들 수 있게 해 줍니다."
 esc_tech_dark_matter_shields_3_bio:0 "완벽한 암흑 물질 주입 근육 구조"
 esc_tech_dark_matter_shields_3_bio_desc:0 "정밀한 생명공학적 정제와 목표 지향적인 유전자 개입이 우리의 전투 야수들에 주입된 암흑 물질 근육을 완벽하게 만들어, 이전 세대의 선택적 번식이 시작한 것을 완성합니다."
 esc_tech_psionic_shield_2:0 "개선된 사이오닉 보호막"
 esc_tech_psionic_shield_2_desc:0 "더 강력한 두뇌는 더 강력한 사이오닉 에너지를 투사할 수 있고, 적절한 기술만 있다면 우리는 더 강력한 사이오닉 보호막을 만들어낼 수 있습니다."
 esc_tech_psionic_shield_2_bio:0 "진화된 즈로 주입 근육 구조"
 esc_tech_psionic_shield_2_bio_desc:0 "유전자 개선을 통해 우리의 zro가 주입된 근육 조직에서 동일한 조직으로부터 더 많은 사이오닉 에너지를 끌어내어 이를 지닌 모든 생물의 보호 필드를 강화합니다."
 gateway_ESC_PSIONIC_SHIELDS:0 "첨단 사이오닉 보호막"
 esc_tech_psionic_shield_3:0 "A.T. 필드"
 esc_tech_psionic_shield_3_desc:0 "사이오닉에 대한 우리의 이해가 증가하면서, 우리는 앱솔루트 테러 필드, 즉 A.T. 필드를 만들 수 있습니다: 자신의 자아를 다른 세상과 분리하는 일종의 상상의 경계 말입니다. 좀 더 큰 집단이라 해도 공동의 경계를 만드는 것은 가능하고, 많은 사이오닉 능력자들이 힘을 합친다면 A.T. 필드들은 믿을 수 없을 만큼 강력해져서 우리 함선들에게 믿을 수 없는 보호막을 제공합니다."
 esc_tech_auxiliary_fire_control_2:0 "고급 사격 통제 체제"
 esc_tech_auxiliary_fire_control_2_desc:0 "표적 알고리즘을 개선한다면 우리의 사격 통제 시스템이 더 빠르고 정확한 사격 방식을 제시할 수 있을 것입니다."
 esc_tech_auxiliary_fire_control_2_bio:0 "진화된 전투 시냅스"
 esc_tech_auxiliary_fire_control_2_bio_desc:0 "전투 분석을 담당하는 신경 노드를 선택적으로 진화시키면 우리의 전투 짐승들이 전투의 흐름을 읽는 능력이 향상되어 기회를 식별하고 활용하는 데 있어 결정적인 우위를 제공합니다."
 esc_tech_afterburners_3:0 "펄스 플라즈마 재연소 장치"
 esc_tech_afterburners_3_desc:0 "펄스 플라즈마 추진 방법을 이용한 진보된 애프터버너를 통한다면, 함선은 최소한의 연료로도 필요할 때마다 빠르게 가속할 수 있습니다."
 esc_tech_afterburners_3_bio:0 "진화된 조작 촉수"
 esc_tech_afterburners_3_bio_desc:0 "고급 생명공학은 뛰어난 강도와 반응성을 가진 조작 촉수를 개발할 수 있으며, 이를 통해 우리의 전투 야수들은 폭발적인 속도로 모든 방향으로 가속할 수 있는 능력을 갖추게 됩니다."
 esc_tech_reactor_booster_4:0 "보조 영점 반응로"
 esc_tech_reactor_booster_4_desc:0 "영점 반응로를 소형화함으로써 우리는 작지만 매우 강력한 함선용 보조 반응로를 생산할 수 있습니다."
 esc_tech_reactor_booster_4_bio:0 "보조 제로 포인트 대사 노드"
 esc_tech_reactor_booster_4_bio_desc:0 "생물체의 대사 결절을 제로 포인트 에너지를 활용하도록 설계함으로써, 기존의 생물학적 과정만으로는 공급할 수 있는 것보다 훨씬 뛰어난 막대한 에너지 저장량을 제공합니다."
 esc_tech_reactor_booster_5:0 "보조 특이점 반응로"
 esc_tech_reactor_booster_5_desc:0 "소형화된 특이점 반응로는 여전히 많은 동력을 제공할 수 있으며, 이것은 상상할 수 있는 최고의 보조 반응로 중 하나를 만들 것입니다."
 esc_tech_reactor_booster_5_bio:0 "보조 특이점 대사 결절"
 esc_tech_reactor_booster_5_bio_desc:0 "선택적 번식은 제로 포인트 대사 노드를 유전자 공학만으로는 달성할 수 있는 것 이상의 수준으로 정제하여, 놀라운 효율성을 가진 생물학적 전력 기관을 생성합니다."
 esc_tech_advanced_shield_capacitors:0 "개량 보호막 축전기"
 esc_tech_advanced_shield_capacitors_desc:0 "차세대의 고효율 축전 장치가 개발됨에 따라, 우리는 이제 함선의 쉴드 강도를 상당히 높일 수 있는 개선된 버전의 보호막 축전기를 개발할 수 있습니다."
 esc_tech_crystal_infused_capacitor:0 "결정 주입 보호막 축전기"
 esc_tech_crystal_infused_capacitor_desc:0 "크리스탈형 물질이 더해진다면 보호막 축전기는 함선의 선체를 강화시킬 수 있을 것입니다."
 esc_tech_crystal_forged_capacitor:0 "결정 단조 보호막 축전기"
 esc_tech_crystal_forged_capacitor_desc:0 "주된 축전기가 이제 크리스탈형 물질과 함께 제조된 금속을 사용하므로, 보호막 축전기들은 함선의 선체를 크게 강화할 수 있습니다."
 esc_tech_aux_maneuver_thrusters:0 "보조 기동 추진기"
 esc_tech_aux_maneuver_thrusters_desc:0 "첨단 반응 제어 시스템은 함선이 항로를 빠르게 바꿀 수 있도록 해주므로, 적의 포격을 더 효과적으로 피할 수 있습니다."
 esc_tech_stellarite_powercore:0 "항성 포식자 파워 코어"
 esc_tech_stellarite_powercore_desc:0 "항성 포식자의 장기는 일종의 핵융합로의 역할을 하는 것으로 보입니다. 아마도, 이것들을 우리 함선의 전력을 보충하는 데 사용할 수 있지 않을까요?"
 esc_tech_standardized_warheads:0 "탄두 표준화"
 esc_tech_standardized_warheads_desc:0 "미사일 탄두의 표준화로 위력을 향상시킴과 동시에 우리 함선 무기고의 안전률과 고장률을 최소화할 수 있었습니다."
 esc_tech_standardized_warheads_bio:0 "구획화된 휘발성 주머니"
 esc_tech_standardized_warheads_bio_desc:0 "유기 미사일을 생성하는 데 사용되는 휘발성 물질을 별도의 내구성이 강한 주머니에 분리하여 수납함으로써 단일 타격으로 인한 치명적인 내부 폭발의 위험을 크게 줄일 수 있으며, 보다 정돈된 내부 구조는 새로운 발사체를 생산하는 속도를 가속화합니다."
 esc_tech_structural_reinforcement:0 "선체 강화"
 esc_tech_structural_reinforcement_desc:0 "특수한 건조 기술을 통해 선체의 내구성과 파손에 대항 저항력을 높일 수 있습니다."
 esc_tech_repair_drones:0 "수리 드론"
 esc_tech_repair_drones_desc:0 "우리 함선에 현장 수리를 담당할 특수한 기계를 포함시킴으로써, 우리 함대의 내구성을 크게 높일 수 있습니다."
 esc_tech_repair_drones_bio:0 "치유 효소 공생체"
 esc_tech_repair_drones_bio_desc:0 "전투 중에 우리의 전투 짐승의 외부 표면에서 살아가도록 맞춤화된 공생 유기체가 필요에 따라 특수 효소를 생성하여 상처 치유와 조직 재생을 극적으로 가속화하며, 생물이 치유를 위해 자신의 자원을 전환할 필요가 없습니다."
 esc_tech_psionic_reinforcement:0 "사이오닉 강화"
 esc_tech_psionic_reinforcement_desc:0 "선원들의 사이오닉 파워는 배 주변의 보호용 거품에 연결되어 보호막과 선체 강도를 높일 수 있습니다."
 esc_tech_temporal_displacer:0 "시간적 변위 방법론"
 esc_tech_temporal_displacer_desc:0 "시공간 연속체를 조작하고 뒤틂으로써, 우리는 부분적으로 다른 차원으로 함선을 위상 이동시킬 수 있습니다. 이는 공격을 회피하는 능력을 높이고, 불리한 전투 상황에서 쉽게 도망칠 수 있도록 합니다."
 esc_tech_temporal_displacer_bio:0 "$esc_tech_temporal_displacer$"
 esc_tech_temporal_displacer_bio_desc:0 "제어된 지역 시공간 왜곡은 우리의 전투 야수를 인접한 차원 층으로 부분적으로 이동시켜, 들어오는 공격이 생물이 더 이상 존재하지 않는 빈 공간을 통과하게 하며, 전술적 후퇴를 적절한 순간을 선택하는 간단한 문제로 만듭니다."
 esc_tech_armor_hardening_3:0 "나노 반응 장갑"
 esc_tech_armor_hardening_3_desc:0 "나노입자가 구조를 몇 초의 일부만에 재조직할 수 있어, 각 공격의 특성을 읽고 최적의 방식으로 재구성하는 반응형 장갑의 가능성을 열어줍니다. 이 장갑은 에너지, 운동, 그리고 이국적인 공격에 대해 동등한 효과로 대응할 수 있습니다."
 esc_tech_shield_hardening_3:0 "항성 성채 보호막 경화 발전기"
 esc_tech_shield_hardening_3_desc:0 "방패 축전기 기술의 발전으로 이전 설계보다 침투 화력에 대한 저항력이 상당히 향상된 새로운 유형의 경화 생성기가 개방됩니다."
 esc_tech_armor_hardening_lm_2:0 "생명 흡수 플레이트"
 esc_tech_armor_hardening_lm_2_desc:0 "생체 금속의 자기 조직화 행동에 대한 더 깊은 이해는 첫 번째 세대 설계가 달성할 수 있는 것 이상의 관통 화력에 대한 우리의 함선의 취약성을 줄이는 반응형 장갑판의 새로운 구성을 밝혀냅니다."
 esc_tech_shield_hardening_psi_2:0 "안개 강화 방패 경화기"
 esc_tech_shield_hardening_psi_2_desc:0 "무한한 사이오닉 에너지를 더 깊이 활용함으로써 우리는 방패 강화기를 기존의 어떤 기술의 한계를 넘어 더욱 강력하게 만들 수 있으며, 이는 관통 화력에 대한 저항력을 증가시키고 전체 필드를 강화합니다."
 esc_tech_dead_hand_switch_kill_1:0 "죽은 손 스위치: 제거 명령 프로토콜"
 esc_tech_dead_hand_switch_kill_1_desc:0 "자기 파괴 프로토콜은 필연적인 패배에 직면한 함선이 조용히 사라지지 않도록 보장하며, 남아 있는 승무원의 희생을 대가로 마지막 순간을 주변 적에 대한 일격으로 전환합니다."
 esc_tech_dead_hand_switch_kill_1_bio:0 "촉매 방광 증강"
 esc_tech_dead_hand_switch_kill_1_bio_desc:0 "전문적으로 설계된 고도로 휘발성 화합물로 가득 찬 분비선은 생물의 생명 징후가 멈추는 순간 즉시 파열되도록 제작되어, 우리의 전투 짐승들에게 마지막 반항의 행동을 부여합니다: 자신을 죽인 존재에게 피해를 주는 죽음입니다."
 esc_tech_dead_hand_switch_kill_2:0 "죽은 손 스위치: 전멸 명령 프로토콜"
 esc_tech_dead_hand_switch_kill_2_desc:0 "조정된 자폭 이벤트의 전술적 가치는 더 이상 논쟁의 여지가 없습니다. 개선된 프로토콜은 이제 마지막 순간에 전달되는 파괴를 극대화하는 데 집중하여, 잃어버린 각 함선이 적에게 가능한 한 큰 비용을 초래하도록 합니다."
 esc_tech_dead_hand_switch_kill_2_bio:0 "휘발성 촉매 방광"
 esc_tech_dead_hand_switch_kill_2_bio_desc:0 "유전적 정제를 추가로 진행하여 우리 생물체의 촉매 방광에 저장된 화합물의 양과 변동성을 증가시킵니다. 이로 인해 우리의 전투 짐승 중 하나가 쓰러질 경우, 뒤따르는 폭발은 그 주변의 모든 함선에 위협이 될 만큼 파괴적입니다."
 esc_tech_dead_hand_switch_heal_1:0 "죽은 손 스위치: 동맹 수리 명령 프로토콜"
 esc_tech_dead_hand_switch_heal_1_desc:0 "비상 전송 프로토콜은 파괴가 불가피해지면 선박의 수리 드론이 즉시 동맹 함선으로 흩어지도록 허용하여, 완전한 손실이 될 뻔한 상황을 함대의 생존을 위한 마지막 기여로 전환합니다."
 esc_tech_dead_hand_switch_heal_1_bio:0 "회복 효소 주머니"
 esc_tech_dead_hand_switch_heal_1_bio_desc:0 "효소 주머니가 우리의 전투 짐승의 몸에 분포되어 있으며, 죽음에 이르면 파열되어 주변 공간에 회복 화합물을 방출합니다. 이는 가까운 동맹에게 가장 필요할 때 치유를 가속화하여 마지막 선물을 제공합니다."
 esc_tech_dead_hand_switch_heal_2:0 "죽은 손 스위치: 동맹 지원 명령 프로토콜"
 esc_tech_dead_hand_switch_heal_2_desc:0 "비상 수리 드론 전송 시스템은 전투에서 그 가치를 여러 번 입증했습니다. 새로운 세대의 조정 프로토콜은 전송의 속도와 효율성을 모두 개선하여, 가장 필요한 곳에 더 능력 있는 드론을 전달합니다."
 esc_tech_dead_hand_switch_heal_2_bio:0 "최고의 회복 효소 주머니"
 esc_tech_dead_hand_switch_heal_2_bio_desc:0 "치유 효소 공식의 효능이 증가함에 따라, 우리의 전투 야수들이 죽을 때 방출하는 화합물이 근처의 동료들을 더 철저하게 치유하게 되어, 각 전사한 생물이 살아남은 이들에게 더 의미 있는 희생이 됩니다."
 esc_tech_orbital_powerplant:0 "궤도 발전 스테이션"
 esc_tech_orbital_powerplant_desc:0 "대규모 우주 설비를 유지하기 위해 개조된 표준 영점 반응로."
 esc_tech_stellar_energy_tower:0 "항성 에너지 탑"
 esc_tech_stellar_energy_tower_desc:0 "항성 포식자에게 동력을 공급했던 복잡한 핵융합 과정을 복제함으로써, 우리는 작은 태양 역할을 하는 전문화된 건물을 만들 수 있습니다. 이는 지역의 농업 생산량을 크게 늘리고, 과학자들이 연구를 수행할 수 있는 추가적인 장소를 제공할 것입니다."
 esc_tech_quantum_node:0 "양자 계산 노드"
 esc_tech_quantum_node_desc:0 "무한 기계에서 얻은 첨단 컴퓨터들의 설계를 이용하여, 우리는 이제 기술 연구 속도를 크게 높일 수 있는 반자동화 연구 시설을 개발할 수 있습니다."
 esc_tech_reprocessing_plant:0 "재처리 공장"
 esc_tech_reprocessing_plant_desc:0 "패배한 고철 수집기 안에서 발견된 매우 효율적인 자원 재처리 시설을 복제할 수 있다는 것은 의심의 여지가 없는 사실입니다. 이는 우리의 민간 부문에서 일반적인 쓰레기가 귀중한 자원으로 회수되어질 수 있도록 도울 것입니다."
 esc_tech_zro_distilleries:0 "지로 증류"
 esc_tech_zro_distilleries_desc:0 "자연적으로 채굴되는 £sr_zro£ §Y$sr_zro$§!는 매우 희귀하여 우리의 증가하는 수요를 맞출 수 없습니다. 다행히도, 상당한 비용이 들지만 그것을 인공적으로 합성할 수 있는 것처럼 보입니다"
 esc_tech_dark_matter_facilities:0 "암흑 물질 생산 시설"
 esc_tech_dark_matter_facilities_desc:0 "£sr_dark_matter£ §Y$sr_dark_matter$§!에 대한 우리의 수요가 점점 늘어남에 따라, 블랙홀에서의 채굴만으로는 공급이 불가능해졌습니다. 우리는 새로운 공급처를 찾아야 합니다."
 esc_tech_magmaminer_1:0 "행성 핵 채굴"
 esc_tech_magmaminer_1_desc:0 "원자재의 수요가 점점 늘어나고 있습니다. 우리는 행성의 내부에 눈을 돌렸습니다. 적절한 기술을 개발한다면 맨틀과 핵에서조차 귀중한 자원을 뽑아낼 수 있을 것입니다. 이 부는 마침내 우리 것이 될 것입니다!"
 esc_tech_magmaminer_2:0 "개선된 행성 핵 채굴"
 esc_tech_magmaminer_2_desc:0 "행성 핵과 맨틀에서 직접 귀중한 자원을 채굴하는 정교한 절차는 우리 행성의 핵에서 더 많은 부를 약속합니다."
 esc_tech_dragon_hatchery:0 "거대 생명체 복제"
 esc_tech_dragon_hatchery_desc:0 "생명 그자체에 대한 통달로 인해, 이제 완전히 다른 생물학적 체계를 가진 거대한 생명체들을 복제하는 것이 가능합니다. 하지만 굳이 그래야 할까요?"
 esc_tech_autocannons_m:0 "기관포 대형화"
 esc_tech_autocannons_m_desc:0 "기관포는 진실한 무기이지만 그것의 오래된 반복은 상대적으로 더 작으며, 더 크고 단단한 대형 표적을 효과적으로 처리할 수 없습니다. 기관포의 크기를 늘림으로써 이러한 문제를 완화할 수 있고, 기관포를 다시 한번 효과적인 무기로 만들 수 있습니다."
 ESC_TECH_UNLOCK_M_AUTOCANNONS_TITLE:0 "§H부품 잠금해제:§! M-슬롯 기관포"
 ESC_TECH_UNLOCK_M_AUTOCANNONS_DESC:0 "더 큰 대포! 더 많은 다카!!"
 gateway_ESC_BIG_AUTOCANNONS:0 "거대 기관포"
 esc_tech_autocannons_l:0 "초대형 기관포"
 esc_tech_autocannons_l_desc:0 "$esc_tech_autocannons_m$의 성공적인 테스트 이후에, 우리가 훨씬 더 높은 목표를 잡고 훨씬 더 크고 강력한 기관포를 개발하는 것은 당연한 수순입니다."
 ESC_TECH_UNLOCK_L_AUTOCANNONS_TITLE:0 "§H부품 잠금해제:§! L-슬롯 기관포"
 ESC_TECH_UNLOCK_L_AUTOCANNONS_DESC:0 "더 많은 다카!! 화력에 과잉이란 없습니다!"
 esc_tech_bio_horror_army:0 "바이오-호러 군대"
 esc_tech_bio_horror_army_desc:0 "유전학에 대한 우리의 통달로 인해, 우리는 지상에서 전투를 수행할 무서우면서도 치명적인 생물들을 창조할 수 있습니다. 당연한 말이지만, 우리는 이 짐승들이 통제될 수 있도록 할 것입니다.... 있어야 합니다."
 esc_tech_psi_avatar_army:0 "사이오닉 아바타 소환"
 esc_tech_psi_avatar_army_desc:0 "사이오닉에 대한 우리의 통달과 장막과의 연결로 인해 우리는 이차원에 존재하는 강력한 실체들과 계약을 맺을 수 있습니다 그리고 그들로 하여금 전투에서 우리를 돕기 위해 우리 자신만의 실체로써 데려올 수 있습니다"
 esc_tech_extradimensional_weapon_1:0 "$tech_extradimensional_weapon_1$"
 esc_tech_extradimensional_weapon_1_desc:0 "$tech_extradimensional_weapon_1_desc$"
 esc_tech_swarm_strike_craft_1:0 "$tech_swarm_strike_craft_1$"
 esc_tech_swarm_strike_craft_1_desc:0 "$tech_swarm_strike_craft_1_desc$"
 esc_tech_swarm_missile:0 "$tech_scourge_missile_1$"
 esc_tech_swarm_missile_desc:0 "$tech_scourge_missile_1_desc$"
 esc_tech_energy_lens_beam_2:0 "개선된 플레어 발사기"
 esc_tech_energy_lens_beam_2_desc:0 "전투 경험을 통해 렌즈 플레어 마비기와 태양 플레어 방출기가 무시할 수 없는 상당한 이점을 보여주었으며, 이는 출력이 크게 향상된 2세대 방출기 설계를 향해 나아가고 있음을 나타냅니다."
 esc_tech_energy_lens_beam_3:0 "고급 플레어 포신"
 esc_tech_energy_lens_beam_3_desc:0 "이론적 모델에 따르면 플레어 방출기 출력은 현재 한계를 훨씬 넘어설 수 있으며, 이는 죽어가는 별의 최후의 대재앙에 필적하는 무기를 만들어낼 수 있습니다."
 esc_tech_lm_accelerator_2:0 "고급 재형성 발사체 가속기"
 esc_tech_lm_accelerator_2_desc:0 "고급 예측 알고리즘이 $sr_living_metal$ 발사체를 제어하는 재형성 논리를 정제하여 치명성을 증가시키고 무기의 작동 수명을 제한했던 기계적 마모를 줄입니다."
 esc_tech_lm_bio_accelerator_2:0 "$esc_tech_lm_accelerator_2$"
 esc_tech_lm_bio_accelerator_2_desc:0 "$esc_tech_lm_accelerator_2_desc$"
 esc_tech_lm_accelerator_3:0 "흐르는 형태의 발사체 가속기"
 esc_tech_lm_accelerator_3_desc:0 "다음 세대의 예측 알고리즘은 $sr_living_metal$ 발사체가 비행 중에 계속해서 스스로 형태를 바꾸고, 발사와 충돌 사이의 실시간으로 목표에 적응할 수 있을 만큼 빠릅니다. 이로 인해 가장 큰 피해를 주는 형태로 도착하게 됩니다."
 esc_tech_lm_bio_accelerator_3:0 "$esc_tech_lm_accelerator_3$"
 esc_tech_lm_bio_accelerator_3_desc:0 "$esc_tech_lm_accelerator_3_desc$"
 esc_tech_lm_armor_6:0 "재생 가능한 고급 중성자 방어막"
 esc_tech_lm_armor_6_desc:0 "지옥 갑옷의 내구성과 자가 수리 능력을 이전에 생각했던 한계를 넘어서는 새로운 구조적 구성을 드러내는 $sr_living_metal$ 과학의 획기적인 발전입니다."
 esc_tech_lm_armor_7:0 "재생 아다만티움 갑옷"
 esc_tech_lm_armor_7_desc:0 "살아있는 금속 단조 기술의 지속적인 개선은 우리의 예측에 따르면 거의 파괴 불가능한 물질을 생성하며, 손상된 만큼 거의 즉시 회복되고, 그 특성을 처음 분석한 과학자들은 수십 년 전에는 터무니없게 여겨졌던 신화적인 비교를 하게 만들었습니다."
 esc_tech_lm_armor_bio_6:0 "지옥의 진화된 중성자 갑옷"
 esc_tech_lm_armor_bio_6_desc:0 "$sr_living_metal$ 과학의 돌파구가 살아있는 금속과 유기 조직을 통합하는 새로운 접근 방식을 열어주어, 지옥 갑옷의 내구성과 재생 능력을 이전 세대 연구자들이 수용했던 모든 한계를 초월하게 합니다."
 esc_tech_lm_armor_bio_7:0 "지옥의 아다만티움 갑옷"
 esc_tech_lm_armor_bio_7_desc:0 "유도 진화와 집중적인 생명공학이 결합하여 우리의 예측에 따르면 거의 파괴 불가능한 갑각 변종을 생산합니다. 이 변종은 들어오는 피해에 맞먹을 만큼 빠른 재생 능력을 가지고 있으며, 그 극단적인 결과로 인해 우리의 연구자들은 더 이상의 과학적 용어가 없어서 이를 아다만티움이라고 부르기 시작했습니다."
