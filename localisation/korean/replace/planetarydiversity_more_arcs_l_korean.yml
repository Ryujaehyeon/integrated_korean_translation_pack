 pd_hive_military:0 "초월 정신 세계"
 pd_hive_military_desc:0 "이 세계는 하이브 마인드의 핵심 기능에 중추적인 역할을 하며 외부 위협과 영향에 대항해 요새화되어 있습니다. 강력한 방어막이 행성을 감싸고 전사 드론들이 대기하여 방어를 보장합니다."
 pd_machine_military:0 "넥서스 세계"
 pd_machine_military_desc:0 "이 행성 유닛은 이 기계 지능의 운영 매트릭스에 필수적입니다. 외부 간섭에 대해 차폐되어 있으며 불멸의 방어 메커니즘으로 캡슐화되어 있습니다. 전투 유닛들은 영구적인 준비 상태를 유지하며 유닛 무결성을 보존합니다."
