l_korean:
 stb_shipyard:0 "조선소"
 stb_shipyard_desc:0 "선박 건설에 중점을 둔 항성 기지입니다.\n"
 sm_drydock:0 "건선거"
 sm_drydock_desc:0 "이 특별히 설계된 시설은 고급 기술을 활용하여 조선소 내의 대기 압력을 유지함으로써 작업자들이 전투함을 보다 쉽게 건조, 유지, 업그레이드 및 수리할 수 있도록 합니다.\n"
 sm_drydock_desc_modifier:0 "각 §Y$sm_shipyard$§!의 건설 용량을 §G1§!만큼 증가시킵니다.\n"
 sm_fleet_anchorage:0 "함대 선거"
 sm_fleet_anchorage_desc:0 "빠르게 확장되는 우리 해군을 위한 표준 함대 정박지의 훨씬 더 큰 버전입니다.\n"
 sm_fleet_anchorage_desc_modifier:0 "§Y$함대 수용력$§! +100\n"
 sm_sensor_station:0 "감지 스테이션"
 sm_sensor_station_desc:0 "스타베이스 센서 스테이션은 고급 센서 배열을 사용하여 여러 항성계에 걸쳐 우리의 정보 수집 능력을 확장하며, 우리의 국경 근처에서 발생할 수 있는 위협에 대한 고급 경고를 제공합니다.\n"
 sm_solar_panel:0 "태양광 패널"
 sm_solar_panel_desc:0 "이 태양광 패널 세트는 스타베이스에 에너지를 공급하여 시설 운영 비용을 상쇄하고 잉여 에너지를 생성하는 데 도움을 줍니다.\n"
 sm_starbase_management:0 "항성기지 행정부"
 sm_starbase_management_desc:0 "일부 항성계는 우리 제국의 무역 네트워크 유지에 절대적으로 중요합니다. 항성기지 관리 사무소는 지역 무역로 보호와 이 중요한 항성기지 방어를 담당하는 우리 제국의 매우 중요한 관료가 있는 자리입니다.\n"
 sm_customs_office:0 "성간 세관"
 sm_customs_office_desc:0 "우리 제국으로 들어가는 이 항구를 통해 우리는 국경을 통한 성간 무역과 관광을 보다 효과적으로 규제할 수 있습니다."
 sm_starbase_management_machine:0 "항성기지 네트워크 중추"
 sm_starbase_management_machine_desc:0 "01000101 01110010 01110010 01101111 01110010 00100000 00110100 00110000 00110100 0001010\n"
 sm_starbase_management_hive:0 "항성기지 비밀 심층부"
 sm_starbase_management_hive_desc:0 "우리는 하나입니다.\n"
 sm_mining_base:0 "성계 광물 정제소"
 sm_mining_base_desc:0 "일부 항성계는 우리의 경제를 지원하기 위해 광물 자원을 추출하는 데 특화되어 있습니다. 항성계 광물 정제소는 해당 항성계 내 모든 행성에서 광물 추출 작업의 효율성을 높일 수 있는 능력을 스타베이스에 부여합니다.\n"
 sm_farming_base:0 "성계 농업 관리 시설"
 sm_farming_base_desc:0 "일부 항성계는 끊임없이 증가하는 인구를 부양하기 위해 대량의 식량을 생산하는 데 특화되어 있습니다. 시스템 농업 터미널은 항성계 내 모든 농업 기업의 노력을 조정하여 영향을 받는 모든 행성에서 농작물 수확량을 증가시킵니다.\n"
 sm_power_station:0 "성계 에너지 연결망"
 sm_power_station_desc:0 "일부 항성계는 모든 문명이 기능하기 위해 필요한 원시 에너지를 생산하는 데 특화되어 있습니다. 시스템 에너지망은 항성계 내 모든 발전 노력을 감독하여, 해당 항성계의 모든 행성에서 기술자의 효율성을 증가시킵니다.\n"
 sm_artifact_silo:0 "소형 유물 저장소"
 sm_artifact_silo_desc:0 "이 특수 사일로는 항성 기지에서 소형 유물을 저장하는 데 사용할 수 있습니다.\n"
 sm_public_plaza:0 "공공 광장"
 sm_public_plaza_desc:0 "사람들이 모여서 휴식을 취할 수 있는 아름다운 광장입니다."
 sm_fleet_club:0 "함대 장교 클럽"
 sm_fleet_club_desc:0 "함대 장교들을 위한 휴식과 이완의 공간입니다."
 sm_storage_room:0 "저장소"
 sm_storage_room_desc:0 "다양한 자원을 위한 작은 저장 공간입니다."
 sm_nightclub:0 "Nightclub"
 sm_nightclub_desc:0 "항성기지 파티처럼 신나는 파티는 없으니, 항성기지 파티는 멈추지 않습니다."
 sm_public_market:0 "공공 시장"
 sm_public_market_desc:0 "일반 대중이 이용할 수 있는 대규모 거래 시장입니다."
 sm_shield_module:0 "보호막 생성기 모듈"
 sm_shield_module_desc:0 "스타베이스에 보호막을 추가합니다.\n"
 sm_armor_module:0 "증가장갑 모듈"
 sm_armor_module_desc:0 "스타베이스에 더 많은 장갑을 추가합니다.\n"
 sm_pd_battery:0 "거점방호 모듈"
 sm_pd_battery_desc:0 "스타베이스에 4개의 포인트 방어 슬롯을 추가합니다.\n"
 sm_gun_battery:0 "포병대"
 sm_gun_battery_desc:0 "스타베이스에 중형 무기 슬롯 2개를 추가합니다.\n"
 sm_missile_battery:0 "어뢰 발사기"
 sm_missile_battery_desc:0 "스타베이스에 어뢰 무기 슬롯을 두 개 추가합니다.\n"
 sm_large_battery:0 "대형 배터리"
 sm_large_battery_desc:0 "스타베이스에 대형 무기 슬롯 2개를 추가합니다.\n"
 sm_xl_battery:0 "초대형 포대 모듈"
 sm_xl_battery_desc:0 "스타베이스에 추가 대형 무기 슬롯 1개를 추가합니다.\n\n§Y경고: 스타베이스당 최대 5개까지 건설할 수 있습니다.§!"
 sm_titanic_battery:0 "거대 배터리"
 sm_titanic_battery_desc:0 "스타베이스에 거대한 무기 슬롯 하나를 추가합니다.\n\n§Y경고: 스타베이스당 최대 2개까지 건설할 수 있습니다.§!"
 sm_construction_office:0 "항성 기지 건설 사무소"
 sm_construction_office_desc:0 "항성 기지가 모듈, 건물 및 업그레이드를 건설하는 효율성을 증가시킵니다.\n"
 sm_planetary_construction_office:0 "행성 건설 사무소"
 sm_planetary_construction_office_desc:0 "행성에서 건물이 건설되는 효율성을 증가시킵니다.\n"
 sm_asteroid_mining:0 "소행성 채굴 팀"
 sm_asteroid_mining_desc:0 "표준 채굴 기지로 목표로 삼기에는 너무 작은 유랑 소행성을 채굴하는 팀입니다. §GAsteroid Mining Manager§!가 있으면 §Y2 Minerals§! £minerals£의 생산량이 향상됩니다.\n"
 sm_mining_manager:0 "소행성 채굴 관리자"
 sm_mining_manager_desc:0 "모든 소행성 채굴 팀의 효율성을 증가시키는 관리자입니다. 모든 §GAsteroid Mining Team§!의 생산량을 §Y2 Minerals§! £minerals£ 만큼 향상시킵니다.\n"
 sm_solar_capacitor:0 "태양 용량기"
 sm_solar_capacitor_desc:0 "태양광 패널의 에너지 생산 효율을 증가시키는 커패시터 시스템입니다.\n\n§YSolar Panel§! 생산: §G+2 Energy§! £energy£ §YSolar Panel§! 유지비: §R+1 Minerals§! £minerals£ (게스탈트용) 및 §R+1 Consumer Goods§! £consumer_goods£ (비게스탈트용)"
 sm_reinforced_defenses:0 "강화된 항성기지 방어 지휘소"
 sm_reinforced_defenses_desc:0 "항성 기지의 보호막과 방어구를 강화합니다.\n"
 sm_strategic_defenses:0 "항성기지 전략방어 지휘소"
 sm_strategic_defenses_desc:0 "항성 기지의 보호막과 무기를 개선합니다.\n"
 sm_adv_starbase_defenses:0 "고급 항성 기지 방어 시스템"
 sm_adv_starbase_defenses_desc:0 "스타베이스의 방어구와 무기를 개선합니다.\n"
 sm_orbital_lab:0 "궤도 연구소"
 sm_orbital_lab_desc:0 "고급 연구 실험실입니다. §G지원 연구소§!가 있으면 연구 생산성이 향상됩니다.\n"
 sm_orbital_physics_support_lab:0 "물리학 보조 연구 모듈"
 sm_orbital_physics_support_lab_desc:0 "물리학 연구를 전문으로 하는 실험실입니다. 모든 §G궤도 연구소§!의 출력이 §Y2 물리학 연구§!만큼 향상됩니다.\n"
 sm_orbital_society_support_lab:0 "사회학 보조 연구 모듈"
 sm_orbital_society_support_lab_desc:0 "사회 연구를 전문으로 하는 실험실입니다. 모든 §G궤도 연구소§!의 출력이 §Y2 사회 연구§!만큼 향상됩니다.\n"
 sm_orbital_engineering_support_lab:0 "공학 보조 연구 모듈"
 sm_orbital_engineering_support_lab_desc:0 "우주 공학 연구를 전문으로 하는 실험실입니다. 모든 §G우주 연구소§!의 출력을 §Y2 공학 연구§!만큼 향상시킵니다.\n"
 sm_ground_forces_academy:0 "지상군 아카데미"
 sm_ground_forces_academy_desc:0 "지상 군대의 모집 및 훈련 효율성을 증가시킵니다.\n"
 sm_repair_module:0 "수리 플랫폼"
 sm_repair_module_desc:0 "항성 기지를 공전하는 함선의 신속한 수리를 전문으로 하는 시설입니다.\n"
 sm_space_foundry:0 "우주 주조 시설"
 sm_space_foundry_desc:0 "우주 조립소는 광물을 합금으로 정제합니다. §G조립 라인 제조§!를 보유하면 출력이 §Y1 합금§! £alloys£만큼 향상됩니다.\n"
 sm_space_factory:0 "우주 산업 시설"
 sm_space_factory_desc:0 "우주 공장은 광물을 소비재로 정제합니다. §G조립 라인 제조§!를 보유하면 출력이 §Y2 소비재§! £consumer_goods£만큼 향상됩니다.\n"
 sm_security_branch_office:0 "보안 모듈"
 sm_security_branch_office_desc:0 "보안 지사 사무소는 지역 해적에 대한 무역 경로의 방어에 집중할 것입니다.\n"
 sm_administration_office:0 "행정 모듈"
 sm_administration_office_desc:0 "제국 차원의 관리 작업을 지원하여 제국의 행정 능력을 증가시킵니다.\n"
 sm_synthetic_crystal_fabricator:0 "인공 희귀 크리스탈 변환기"
 sm_synthetic_crystal_fabricator_desc:0 "광물을 희귀한 결정으로 변환하는 특별한 정제소입니다.\n"
 sm_synthetic_volatile_motes_fabricator:0 "인공 불안정 분말 변환기"
 sm_synthetic_volatile_motes_fabricator_desc:0 "광물을 휘발성 모티스로 변환하는 특별한 정제소입니다.\n"
 sm_synthetic_gase_fabricator:0 "인공 외계 가스 변환기"
 sm_synthetic_gase_fabricator_desc:0 "광물을 이국적인 가스로 변환하는 특별한 정유소입니다.\n"
 sm_robot_assembly:0 "로봇 조립 시설"
 sm_robot_assembly_desc:0 "로봇 인구를 건설하고 이를 시스템의 식민지로 자동으로 전송합니다.\n"
 sm_assembly_line_manufacturing:0 "조립 라인 제조"
 sm_assembly_line_manufacturing_desc:0 "우주와 행성에서 합금과 소비재의 생산을 돕습니다. 또한 모든 §G우주 주조소§!의 출력이 §Y1 합금§! £alloys£과 §G우주 공장§!의 출력이 §Y2 소비재§! £consumer_goods£로 향상됩니다.\n"
 sm_federal_reserve_bank:0 "중앙 준비 은행"
 sm_federal_reserve_bank_desc:0 "항성계 내 무역을 개선하는 데 도움을 주는 대규모 금융 은행입니다.\n"
 sm_cloning_facilities:0 "클론 기술"
 sm_cloning_facilities_desc:0 "인구 행복도를 희생하여 시스템 전역의 인구 성장을 증가시키는 시설입니다.\n"
 sm_navcom_ai:0 "항법 컴퓨터 AI"
 sm_navcom_ai_desc:0 "비상 점프를 위한 좌표를 신속하게 계산할 수 있는 매우 고급 내비게이션 시스템입니다. 함선이 전투에서 성공적으로 이탈할 확률을 증가시킵니다.\n"
 sm_starbase_ai:0 "스타베이스 인공 지능"
 sm_starbase_ai_desc:0 "매우 고급 AI 컴퓨터로, 항성기의 공격, 방어 및 무역 보호 능력을 향상시킬 수 있습니다.\n"
 sm_tv_studio:0 "오락 TV 스튜디오"
 sm_tv_studio_desc:0 "행성의 편의 시설을 증가시키는, 시스템 전역의 시민을 위한 오락 프로그램을 제작하는 TV 스튜디오입니다.\n"
 sm_real_estate_dev:0 "부동산 개발자"
 sm_real_estate_dev_desc:0 "부동산 중개인이 시민들이 새로운 주택을 위한 적합한 위치를 찾도록 돕는 사무소입니다. 행성의 주택 수를 증가시킵니다.\n"
 sm_tv_network:0 "TV 뉴스 네트워크"
 sm_tv_network_desc:0 "시스템 전역의 시민을 위한 뉴스 프로그램을 제작하는 TV 스튜디오로, 행성의 안정성을 증가시킵니다. 더 알고 싶으신가요?\n"
 POINT_DEFENCE_STARBASE:0 "자동화된 방어 시스템"
 POINT_DEFENCE_STARBASE_DESC:0 "자동화된 방어 시스템"
 CITADEL_DARK_MATTER_REACTOR:0 "암흑 물질 반응로"
 CITADEL_DARK_MATTER_REACTOR_DESC:0 "암흑 물질 반응로"
 STARBASE_AURA_SHIP_DISRUPTOR:0 "함선 교란기"
 STARBASE_AURA_SHIP_AMPLIFIER:0 "함대 통신 증폭기"
