 mod_pop_category_bio_trophy_unity_produces_mult:0 "생체기념물 통합"
 mod_station_researchers_physics_research_produces_mult:0 "연구소 물리학 £physics£ 생산량"
 mod_station_researchers_society_research_produces_mult:0 "연구 기지 사회 £society£ 생산량"
 mod_station_researchers_engineering_research_produces_mult:0 "연구 기지 공학 £engineering£ 생산량"
