 aura_starbase_ship_amplifier:0 "$defensive_aura$ - $STARBASE_AURA_SHIP_AMPLIFIER$"
 TITANIC_STARBASE_SECTION:0 "거대 구역"
 EXTRA_LARGE_STARBASE_SECTION:0 "초대형 우주 기지 구역"
 LARGE_STARBASE_SECTION:0 "대형 구역"
 PD_STARBASE_SECTION:0 "거점방호 스테이션"
