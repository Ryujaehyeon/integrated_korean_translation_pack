 pse_power_botton_shroud_cause_left_desc:0 "가끔씩 장막으로의 여행에는 대가가 따르고, 우리는 그 대가를 치르길 원하지 않습니다. 따라서 장막의 존재가 우리를 저주할 때, 우리는 우리에게 마법을 거는 그 에너지를 없애버릴 수 있습니다.\n\n$pse_power_botton_shroud_cause_left_tooltip$\n$pse_power_botton_shroud_cause_left_tooltip2$\n\n$pse_power_botton_shroud_cause_left_tooltip_end$\n$pse_power_botton_shroud_cause_left_cooldown$"
