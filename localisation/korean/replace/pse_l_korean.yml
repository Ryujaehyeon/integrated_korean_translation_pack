 pse_power_botton_shroud_cause_left_cooldown_over:0 "$pse_power_botton_cooldown_over$$pse_power_botton_shroud_cause_left_title$"
 pse_power_botton_planet_unity_title:0 "§H일시적 단일화§!"
 pse_power_botton_planet_unity_desc:0 "우리는 함께이면서도 개별적입니다. 대규모 사이오닉 의식을 거행하면 우리의 마음은 짧은 시간 동안... 하나가 될 수 있습니다.\n\n$pse_power_botton_planet_unity_tooltip$\n$pse_power_botton_planet_unity_tooltip2$\n$pse_power_botton_planet_unity_tooltip3$\n\n$pse_power_botton_planet_unity_tooltip_end$\n$pse_power_botton_planet_unity_cooldown$"
 pse_power_botton_planet_unity_tooltip:0 "§E§Y$trait_latent_psionic$§!이나 §Y$trait_psionic$§! 특성을 가진 종족에게 적용되는 효과:§!"
 pse_power_botton_planet_unity_tooltip2:0 "모든 팝은 §Y매월 $unity$ £unity£§! ( §G+0.5§! 당 §Y100§! 팝 ) 동안 §Y5§! 년 동안 생산합니다."
 pse_power_botton_planet_unity_tooltip3:0 "발현 시간에만 영향을 받습니다."
 pse_power_botton_planet_unity_tooltip_end:0 "$pse_power_botton_base_cost_text$§H85§!"
 pse_power_botton_planet_unity_cooldown:0 "$pse_power_botton_cooldown_1800$"
 pse_power_botton_planet_unity_cooldown_over:0 "$pse_power_botton_cooldown_over$$pse_power_botton_planet_unity_title$"
 pse_power_botton_gestalt_consciousness_cannot:0 "£trigger_no£ §R우리는 §Y$ethic_gestalt_consciousness$§!이므로 몇몇 능력을 발휘할 수 없습니다.§!"
 pse_power_botton_planet_crime_title:0 "§H도덕관념§!"
 pse_power_botton_planet_crime_desc:0 "우리 모두가 친사회적이지는 않다는 점은 안타까운 일입니다. 우리 사회의 기준에 맞지 않는 자들은 제거될 것이며 집단에서 방출될 것입니다.\n\n$pse_power_botton_planet_crime_tooltip$\n$pse_power_botton_planet_crime_tooltip2$\n$pse_power_botton_planet_crime_tooltip3$\n\n$pse_power_botton_planet_crime_tooltip_end$\n$pse_power_botton_planet_crime_cooldown$"
 pse_power_botton_planet_crime_tooltip:0 "§E§Y5§!년간 제국에 적용되는 효과:§!"
 pse_power_botton_planet_crime_tooltip2:0 "$MOD_INTEL_ENCRYPTION_ADD$: §G+1§!, $MOD_PLANET_CRIME_ADD$: §G-10%§!"
 pse_power_botton_planet_crime_tooltip3:0 "낮은 범죄도의 모든 행성에서 불법 행위를 근절합니다."
 pse_power_botton_planet_crime_tooltip_end:0 "$pse_power_botton_base_cost_text$§H70§!"
 pse_power_botton_planet_crime_cooldown:0 "$pse_power_botton_cooldown_1800$"
 pse_power_botton_planet_crime_cooldown_over:0 "$pse_power_botton_cooldown_over$$pse_power_botton_planet_crime_title$"
 pse_power_botton_planet_ethic_title:0 "§H이데올로기 조작§!"
 pse_power_botton_planet_ethic_desc:0 "이데올로기는 대중의 생각이 아니라, 이익의 신념을 나타냅니다. 따라서 우리가 하나의 이데올로기를 함께 나타낼 수 있다면, 지배 권력의 명령에 따라 반대 의견을 없애버릴 수 있습니다.\n\n$pse_power_botton_planet_ethic_tooltip$\n$pse_power_botton_planet_ethic_tooltip2$\n$pse_power_botton_planet_ethic_tooltip3$\n\n$pse_power_botton_planet_ethic_tooltip_end$\n$pse_power_botton_planet_ethic_cooldown$"
 pse_power_botton_planet_ethic_tooltip:0 "$pse_power_botton_planet_crime_tooltip$"
 pse_power_botton_planet_ethic_tooltip2:0 "$MOD_POP_GOVERNMENT_ETHIC_ATTRACTION$: §G+25%§!"
 pse_power_botton_planet_ethic_tooltip3:0 "반대되는 윤리관을 가진 £pops£ §YPOP§!이 시간이 지남에 따라 국가의 윤리관으로 변합니다."
 pse_power_botton_planet_ethic_tooltip_end:0 "$pse_power_botton_base_cost_text$§H100§!"
 pse_power_botton_planet_ethic_cooldown:0 "$pse_power_botton_cooldown_1800$"
 pse_power_botton_planet_ethic_cooldown_over:0 "$pse_power_botton_cooldown_over$$pse_power_botton_planet_ethic_title$"
 pse_power_botton_planet_healing_title:0 "§H자연 치유§!"
 pse_power_botton_planet_healing_desc:0 "파괴의 피해는 시간이 흐름에 따라 치유될 수 있으며, 우리의 세계에 퍼져 있는 사이오닉 에너지로 가능합니다.\n\n$pse_power_botton_planet_healing_tooltip$\n$pse_power_botton_planet_healing_tooltip2$\n$pse_power_botton_planet_healing_tooltip3$\n\n$pse_power_botton_planet_healing_tooltip_end$\n$pse_power_botton_planet_healing_cooldown$"
 pse_power_botton_planet_healing_tooltip:0 "§E소유한 식민지에 대한 효과 §Y5§! 년 동안:§!"
 pse_power_botton_planet_healing_tooltip2:0 "$PLANET_DEVASTATION$은 매달 서서히 감소합니다."
 pse_power_botton_planet_healing_tooltip3:0 "비인공 식민지는 시간이 지남에 따라 자원 §Y$DEPOSITS_TITLE$§!을(를) 얻을 수 있습니다."
 pse_power_botton_planet_healing_tooltip_end:0 "$pse_power_botton_base_cost_text$§H120§!"
 pse_power_botton_planet_healing_cooldown:0 "$pse_power_botton_cooldown_1800$"
 pse_power_botton_planet_healing_cooldown_over:0 "$pse_power_botton_cooldown_over$$pse_power_botton_planet_healing_title$"
 PSE_HEALING_TITLE:0 "$pse_power_botton_planet_healing_title$"
 PSE_HEALING_DESC:0 "$PLANET|H$는 새로운 행성 자원의 발견을 보고합니다."
 pse_healing_power_modifier:0 "자연 치유"
 pse_healing_power_modifier_desc:0 "이 행성은 미세하게 사이오닉 에너지를 발산하며, 이는 행성 자체를 치유하고 활력을 주는 자연의 힘입니다."
 pse_power_botton_planet_build_title:0 "§H즉각적인 건설§!"
 pse_power_botton_planet_build_desc:0 "건설 단계를 4개의 평행 우주에서 미리 진행할 수 있습니다. 시공간 연속체를 건설 현장 주변으로 이동시켜, 건설이 거의 완료된 상태로 뛰어넘을 수 있습니다.\n\n$pse_power_botton_planet_build_tooltip$\n$pse_power_botton_planet_build_tooltip2$\n$pse_power_botton_planet_build_tooltip3$\n\n$pse_power_botton_planet_build_tooltip_end$\n$pse_power_botton_planet_build_cooldown$"
 pse_power_botton_planet_build_tooltip:0 "$pse_power_botton_leader_tech_tooltip$"
 pse_power_botton_planet_build_tooltip2:0 "모든 £building£ §Y행성 건물§!을 최대 §Y20§!개까지 즉시 건설합니다."
 pse_power_botton_planet_build_tooltip3:0 "모든 §Y테라포밍§!, §Y결정§!, 및 §Y메가구조물§! 건설 진행 속도를 몇 년 앞당깁니다."
 pse_power_botton_planet_build_tooltip_end:0 "$pse_power_botton_base_cost_text$§H250§!"
 pse_power_botton_planet_build_cooldown:0 "$pse_power_botton_cooldown_3600$"
 pse_power_botton_planet_build_cooldown_over:0 "$pse_power_botton_cooldown_over$$pse_power_botton_planet_build_title$"
 pse_power_botton_planet_build_effect_over:0 "$pse_power_botton_planet_build_title$의 효과가 만료되었습니다."
 pse_power_botton_planet_build_effect_still_here:0 "§Y참고: $pse_power_botton_planet_build_title$의 효과는 여전히 유효하므로, 다시 시도하기 전에 사용해 버리는 것이 좋습니다.§!"
 pse_power_botton_cleanse_psi_title:0 "§H정화 가속§!"
 pse_power_botton_cleanse_psi_desc:0 "오염은 사이오닉 파워를 성급히 발휘할 때마다 스며드는 것입니다. 우리는 그것에 마음을 집중하여, 오염으로부터 빠르게 벗어날 수 있습니다.\n\n$pse_power_botton_cleanse_psi_tooltip$\n$pse_power_botton_cleanse_psi_tooltip2$\n\n$pse_power_botton_cleanse_psi_tooltip_end$\n$pse_power_botton_cleanse_psi_cooldown$"
 pse_power_botton_cleanse_psi_tooltip:0 "$pse_power_botton_leader_tech_tooltip$"
 pse_power_botton_cleanse_psi_tooltip2:0 "부패를 §G-20§! 감소시킵니다."
 pse_power_botton_cleanse_psi_tooltip_end:0 "$pse_power_botton_base_cost_text$§H125§!"
 pse_power_botton_cleanse_psi_cooldown:0 "$pse_power_botton_cooldown_1080$"
 pse_power_botton_cleanse_psi_cooldown_over:0 "$pse_power_botton_cooldown_over$$pse_power_botton_cleanse_psi_title$"
 pse_power_botton_cleanse_cap_title:0 "§H사이오닉 정화§!"
 pse_power_botton_cleanse_cap_desc:0 "약간의 $pse_power_bar_cap_name$을 사용하여 길잃은 심령들을 그들이 속한 곳으로 돌려보냅니다.\n\n$pse_power_botton_cleanse_cap_tooltip$\n$pse_power_botton_cleanse_cap_tooltip2$\n$pse_power_botton_cleanse_cap_tooltip3$\n\n$pse_power_botton_cleanse_cap_tooltip_end$\n$pse_power_botton_cleanse_cap_cooldown$"
 pse_power_botton_cleanse_cap_tooltip:0 "§E제국 효과:§!"
 pse_power_botton_cleanse_cap_tooltip2:0 "다음 §Y5§! 년 동안 매달 §G-0.5§! 만큼 부패를 감소시킵니다."
 pse_power_botton_cleanse_cap_tooltip3:0 "재사용 대기시간이 만료될 때 까지 $pse_power_bar_cap_name$이 §R-35§!만큼 감소합니다."
 pse_power_botton_cleanse_cap_tooltip_end:0 "$pse_power_botton_base_cost_text$§H50§!"
 pse_power_botton_cleanse_cap_cooldown:0 "$pse_power_botton_cooldown_3600$"
 pse_power_botton_cleanse_cap_cooldown_over:0 "$pse_power_botton_cooldown_over$$pse_power_botton_cleanse_cap_title$"
 pse_power_botton_cleanse_cannot_use_zro:0 "§R£trigger_no£ 정화의 힘은 £sr_zro£ §Y$sr_zro$§!로 인한 비용 감소가 적용되지 않습니다.§!"
 pse_power_botton_cleanse_corruption_is_too_low:0 "§Y£trigger_no£ 오염 수치가 낮아서 당분간 정화할 필요가 없습니다.§!"
 pse_power_botton_cleanse_zro_title:0 "§H지로 주입§!"
 pse_power_botton_cleanse_zro_desc:0 "많은 양의 지로를 휘발시킨 사이오닉 강화 분말을 사용해 오염 수치를 놀라운 속도로 줄일 수 있습니다. 정확한 원리는 알 수 없습니다.\n\n$pse_power_botton_cleanse_zro_tooltip$\n$pse_power_botton_cleanse_zro_tooltip2$\n$pse_power_botton_cleanse_zro_tooltip3$\n\n$pse_power_botton_cleanse_zro_tooltip_end$\n$pse_power_botton_cleanse_zro_cooldown$"
 pse_power_botton_cleanse_zro_tooltip:0 "$pse_power_botton_leader_tech_tooltip$"
 pse_power_botton_cleanse_zro_tooltip2:0 "$sr_zro$ 하나당 §Y20§! 만큼 §G-1§! 부패를 줄입니다."
 pse_power_botton_cleanse_zro_tooltip3:0 "오염 수치가 $sr_zro$ 사용량을 결정합니다."
 pse_power_botton_cleanse_zro_tooltip_end:0 "$pse_power_botton_base_cost_text$§H15§!"
 pse_power_botton_cleanse_zro_cooldown:0 "$pse_power_botton_cooldown_1800$"
 pse_power_botton_cleanse_zro_cooldown_over:0 "$pse_power_botton_cooldown_over$$pse_power_botton_cleanse_zro_title$"
 pse_power_botton_cleanse_need_sr_zro:0 "§R£trigger_no£ 우리는 이 힘을 위해 £sr_zro£ §Y$sr_zro$§!의 사용을 적용할 지식이 필요합니다.§!"
 pse_power_botton_cleanse_sublimate_title:0 "§H오염 승화§!"
 pse_power_botton_cleanse_sublimate_desc:0 "우리를 둘러싼 오염의 일부를 승화 과정으로 이전하여, 그들을 영혼의 정수로 전환합니다.\n\n$pse_power_botton_cleanse_sublimate_tooltip$\n$pse_power_botton_cleanse_sublimate_tooltip2$\n$pse_power_botton_cleanse_sublimate_tooltip3$\n\n$pse_power_botton_cleanse_sublimate_tooltip_end$\n$pse_power_botton_cleanse_sublimate_cooldown$"
 pse_power_botton_cleanse_sublimate_tooltip:0 "$pse_power_botton_leader_tech_tooltip$"
 pse_power_botton_cleanse_sublimate_tooltip2:0 "£sr_psionic_sublimate£ §Y$sr_psionic_sublimate$§!의 양을 §G+10%§! 증가시킵니다."
 pse_power_botton_cleanse_sublimate_tooltip3:0 "부패의 §Y15%-50%§!를 £sr_psionic_sublimate£ §Y$sr_psionic_sublimate$§!로 변환합니다."
 pse_power_botton_cleanse_sublimate_tooltip_end:0 "$pse_power_botton_base_cost_text$§H175§!"
 pse_power_botton_cleanse_sublimate_cooldown:0 "$pse_power_botton_cooldown_3600$"
 pse_power_botton_cleanse_sublimate_not_subbed_title:0 "$pse_power_botton_cleanse_sublimate_title$"
 pse_power_botton_cleanse_sublimate_not_subbed_desc:0 "우리를 둘러싼 오염의 일부를 승화 과정으로 이전하여, 그들을 영혼의 정수로 전환합니다.\n\n$pse_power_botton_cleanse_sublimate_not_subbed_tooltip$\n$pse_power_botton_cleanse_sublimate_not_subbed_tooltip2$\n$pse_power_botton_cleanse_sublimate_not_subbed_tooltip3$\n\n$pse_power_botton_cleanse_sublimate_not_subbed_tooltip_end$\n$pse_power_botton_cleanse_sublimate_not_subbed_cooldown$"
 pse_power_botton_cleanse_sublimate_not_subbed_tooltip:0 "$pse_power_botton_cleanse_sublimate_tooltip$"
 pse_power_botton_cleanse_sublimate_not_subbed_tooltip2:0 "£sr_zro£의 양을 §Y$sr_zro$§! §G5%§! 증가시킵니다."
 pse_power_botton_cleanse_sublimate_not_subbed_tooltip3:0 "부패의 §Y15%-50%§!를 £sr_zro£ §Y$sr_zro$§!로 전환합니다."
 pse_power_botton_cleanse_sublimate_not_subbed_tooltip_end:0 "$pse_power_botton_cleanse_sublimate_tooltip_end$"
 pse_power_botton_cleanse_sublimate_not_subbed_cooldown:0 "$pse_power_botton_cleanse_sublimate_cooldown$"
 pse_power_botton_cleanse_sublimate_not_sub_giga:0 "§R£trigger_no£ §YGigastructural Engineering & More§! 모드가 필요합니다.§!"
 pse_power_botton_cleanse_sublimate_need_psi_becon:0 "§R£trigger_no£ §Y$name_psychic_beacon$§! 거대구조물을 가지고 있어야 합니다.§!"
 pse_power_botton_cleanse_sublimate_cooldown_over:0 "$pse_power_botton_cooldown_over$$pse_power_botton_cleanse_sublimate_title$"
 pse_power_botton_summon_spacefaring_title:0 "§H우주의 존재§!"
 pse_power_botton_summon_spacefaring_desc:0 "우리의 고향 성계 위에 끔찍한 우주 사이오닉 존재를 탄생시킵니다. 일반적인 장막 소환과 달리, 일이 잘못될 수 없습니다.\n\n$pse_power_botton_summon_spacefaring_tooltip$\n$pse_power_botton_summon_spacefaring_tooltip2$\n\n$pse_power_botton_summon_spacefaring_tooltip_end$\n$pse_power_botton_summon_spacefaring_cooldown$"
 pse_power_botton_summon_spacefaring_tooltip:0 "$pse_power_botton_leader_tech_tooltip$"
 pse_power_botton_summon_spacefaring_tooltip2:0 "수도에서 사이오닉 존재를 소환합니다. 이는 적에게 사이오닉 공격을 사용할 수 있는 우주 항해 생명체입니다."
 pse_power_botton_summon_spacefaring_tooltip_end:0 "$pse_power_botton_base_cost_text$§H100§!"
 pse_power_botton_summon_spacefaring_cooldown:0 "$pse_power_botton_cooldown_1800$"
 pse_power_botton_summon_spacefaring_cooldown_over:0 "$pse_power_botton_cooldown_over$$pse_power_botton_summon_spacefaring_title$"
 pse_power_botton_summon_avatar_title:0 "§H사이오닉 아바타§!"
 pse_power_botton_summon_avatar_desc:0 "우리의 사이오닉 에너지를 거대한 아바타로 모아 수도 행성에 소환하고 싸우게 합니다.\n\n$pse_power_botton_summon_avatar_tooltip$\n$pse_power_botton_summon_avatar_tooltip2$\n\n$pse_power_botton_summon_avatar_tooltip_end$\n$pse_power_botton_summon_avatar_cooldown$"
 pse_power_botton_summon_avatar_tooltip:0 "$pse_power_botton_leader_tech_tooltip$"
 pse_power_botton_summon_avatar_tooltip2:0 "수도에서 §Y1-3§! 강력한 거대한 아바타 군대를 소환합니다."
 pse_power_botton_summon_avatar_tooltip_end:0 "$pse_power_botton_base_cost_text$§H35§!"
 pse_power_botton_summon_avatar_cooldown:0 "$pse_power_botton_cooldown_1800$"
 pse_power_botton_summon_avatar_cooldown_over:0 "$pse_power_botton_cooldown_over$$pse_power_botton_summon_avatar_title$"
 pse_power_botton_summon_resource_title:0 "§H자원 수확§!"
 pse_power_botton_summon_resource_desc:0 "우리의 욕망을 베일에 쏟아붓는 것으로, 우리는 저 너머에서 일부 자원을 회수할 수 있습니다. 이 '차용' 자원은 우리가 특정할 수 없는 다양한 예상치 못한 형태를 가지고 있습니다.\n\n$pse_power_botton_summon_resource_tooltip$\n$pse_power_botton_summon_resource_tooltip2$\n$pse_power_botton_summon_resource_tooltip3$\n\n$pse_power_botton_summon_resource_tooltip_end$\n$pse_power_botton_summon_resource_cooldown$"
 pse_power_botton_summon_resource_tooltip:0 "$pse_power_botton_leader_tech_tooltip$"
 pse_power_botton_summon_resource_tooltip2:0 "자원 소환. 비물질 유형은 제외됩니다."
 pse_power_botton_summon_resource_tooltip3:0 "자원의 양은 제국의 발전에 의해 다소 결정됩니다."
 pse_power_botton_summon_resource_tooltip_end:0 "$pse_power_botton_base_cost_text$§H110§!"
 pse_power_botton_summon_resource_cooldown:0 "$pse_power_botton_cooldown_1800$"
 pse_power_botton_summon_resource_cooldown_over:0 "$pse_power_botton_cooldown_over$$pse_power_botton_summon_resource_title$"
 pse_power_botton_summon_construct_title:0 "§H영혼 노동자§!"
 pse_power_botton_summon_construct_desc:0 "우리의 영역으로 열정적이고 도움이 되는 존재들을 소환합니다. 이 '노동자들'은 스스로를 유지하는데 사이오닉 파워가 필요하지 않으며, 우리의 성계에서 놓친 모든 우주 스테이션을 건설할 것입니다.\n\n$pse_power_botton_summon_construct_tooltip$\n$pse_power_botton_summon_construct_tooltip2$\n$pse_power_botton_summon_construct_tooltip3$\n\n$pse_power_botton_summon_construct_tooltip_end$\n$pse_power_botton_summon_construct_cooldown$"
 pse_power_botton_summon_construct_tooltip:0 "$pse_power_botton_leader_tech_tooltip$"
 pse_power_botton_summon_construct_tooltip2:0 "우리의 공간을 떠돌고 있는 §Y4 영혼 작업자§!를 소환합니다."
 pse_power_botton_summon_construct_tooltip3:0 "§Y정신 작업자§!는 요구 사항을 무시하고 모든 자원 기지를 건설할 것입니다."
 pse_power_botton_summon_construct_tooltip_end:0 "$pse_power_botton_base_cost_text$§H130§!"
 pse_power_botton_summon_construct_cooldown:0 "$pse_power_botton_cooldown_3600$"
 pse_power_botton_summon_construct_too_many_workers:0 "§R£trigger_no£ §Y영혼 노동자§!의 수가 최대입니다.§!"
 pse_power_botton_summon_construct_effect_over:0 "$pse_power_botton_summon_construct_title$의 사이오닉 파워 효과가 만료되었습니다."
 pse_power_botton_summon_construct_cooldown_over:0 "$pse_power_botton_cooldown_over$$pse_power_botton_summon_construct_title$"
 pse_power_botton_summon_ship_title:0 "§H저 너머의 함선§!"
 pse_power_botton_summon_ship_desc:0 "여기 그림자 영역의 깊은 협곡에 고립된 함대 존재들이 있습니다. 이들을 방치하여 썩게 하는 것은 아쉬운 일입니다. salvaging하여 유용하게 활용해야 합니다.\n\n$pse_power_botton_summon_ship_tooltip$\n$pse_power_botton_summon_ship_tooltip2$\n$pse_power_botton_summon_ship_tooltip3$\n\n$pse_power_botton_summon_ship_tooltip_end$\n$pse_power_botton_summon_ship_cooldown$"
 pse_power_botton_summon_ship_tooltip:0 "$pse_power_botton_leader_tech_tooltip$"
 pse_power_botton_summon_ship_tooltip2:0 "함대를 우리의 §H£navy_size£ $NAVY_SIZE_TITLE$§!의 §Y~15%§!까지 소환합니다."
 pse_power_botton_summon_ship_tooltip3:0 "소환된 함선은 §Y$SHIP_UPKEEP$§!이 감소하고 §Y$MOD_SHIP_EXPERIENCE_GAIN_MULT$§!이 증가합니다."
 pse_power_botton_summon_ship_tooltip_end:0 "$pse_power_botton_base_cost_text$§H240§!"
 pse_power_botton_summon_ship_cooldown:0 "$pse_power_botton_cooldown_7200$"
 pse_power_botton_summon_ship_cooldown_over:0 "$pse_power_botton_cooldown_over$$pse_power_botton_summon_ship_title$"
 pse_power_botton_combat_boon_title:0 "$pse_power_botton_shroud_boon_title$"
 pse_power_botton_combat_boon_desc:0 "장막의 강력한 에너지를 빌려와 우주전에서 유용하게 사용합니다.\n\n$pse_power_botton_combat_boon_tooltip$\n$pse_power_botton_combat_boon_tooltip2$\n\n$pse_power_botton_combat_boon_tooltip_end$\n$pse_power_botton_combat_boon_cooldown$"
 pse_power_botton_combat_boon_tooltip:0 "$pse_power_botton_leader_tech_tooltip$"
 pse_power_botton_combat_boon_tooltip2:0 "$pse_power_botton_shroud_boon_tooltip2$"
 pse_power_botton_combat_boon_tooltip_end:0 "$pse_power_botton_base_cost_text$§H60§!"
 pse_power_botton_combat_boon_cooldown:0 "$pse_power_botton_cooldown_1800$"
 pse_power_botton_combat_boon_cooldown_over:0 "$pse_power_botton_cooldown_over$$pse_power_botton_combat_boon_title$"
 pse_power_botton_combat_range_title:0 "§H예지 공격§!"
 pse_power_botton_combat_range_desc:0 "우리 함대의 무기를 감사는 역동적인 사이오닉 에너지장입니다. 사이오닉으로 강화된 모든 탄약이 적의 앞으로 순간이동될 것이며 거리나 회피 능력에 무관하게 계속해서 적을 공격할 것입니다.\n\n$pse_power_botton_combat_range_tooltip$\n$pse_power_botton_combat_range_tooltip2$\n$pse_power_botton_combat_range_tooltip3$\n\n$pse_power_botton_combat_range_tooltip_end$\n$pse_power_botton_combat_range_cooldown$"
 pse_power_botton_combat_range_tooltip:0 "$pse_power_botton_combat_ship_tooltip$"
 pse_power_botton_combat_range_tooltip2:0 "§Y6§!개월 동안 $MOD_SHIP_WEAPON_RANGE_MULT$가 크게 증가하고, 언제나 적중합니다."
 pse_power_botton_combat_range_tooltip3:0 "함선/스테이션에만 적용됩니다."
 pse_power_botton_combat_range_tooltip_end:0 "$pse_power_botton_base_cost_text$§H165§!"
 pse_power_botton_combat_range_cooldown:0 "$pse_power_botton_cooldown_3600$"
 pse_power_botton_combat_range_cooldown_over:0 "$pse_power_botton_cooldown_over$$pse_power_botton_combat_range_title$"
 pse_power_botton_combat_shield_title:0 "§H거품 보호막§!"
 pse_power_botton_combat_shield_desc:0 "보호막 체계의 외곽층을 덮은 거품형태의 지속적인 고밀도 사이오닉 장입니다. 이는 보호막이 관통되기 전 물리적인 피해를 추가적으로 흡수하며 보호막의 고장을 방지합니다. 또한 보호막의 재충전 속도를 높입니다.\n\n$pse_power_botton_combat_shield_tooltip$\n$pse_power_botton_combat_shield_tooltip2$\n$pse_power_botton_combat_shield_tooltip3$\n\n$pse_power_botton_combat_shield_tooltip_end$\n$pse_power_botton_combat_shield_cooldown$"
 pse_power_botton_combat_shield_tooltip:0 "$pse_power_botton_combat_ship_tooltip$"
 pse_power_botton_combat_shield_tooltip2:0 "§Y보호막§!의 내구력을 강화합니다. 대부분의 보호막 무력화 환경에서도 멀쩡합니다."
 pse_power_botton_combat_shield_tooltip3:0 "기존의 보호막이 있는 함선/우주 정거장에만 적용됩니다. §Y12§!개월 동안 지속됩니다."
 pse_power_botton_combat_shield_tooltip_end:0 "$pse_power_botton_base_cost_text$§H170§!"
 pse_power_botton_combat_shield_cooldown:0 "$pse_power_botton_cooldown_3600$"
 pse_power_botton_combat_shield_cooldown_over:0 "$pse_power_botton_cooldown_over$$pse_power_botton_combat_shield_title$"
 pse_power_botton_combat_shield_effect_over:0 "$pse_power_botton_combat_shield_title$의 사이오닉 파워 효과가 만료되었습니다."
 pse_power_botton_combat_arc_title:0 "§H사이오닉 격류§!"
 pse_power_botton_combat_arc_desc:0 "함선과 스테이션에 충분한 힘을 저장해둡니다. 선체에 손상이 생기면, 저장된 힘의 격류가 적에게 반격할 것입니다.\n\n$pse_power_botton_combat_arc_tooltip$\n$pse_power_botton_combat_arc_tooltip2$\n$pse_power_botton_combat_arc_tooltip3$\n\n$pse_power_botton_combat_arc_tooltip_end$\n$pse_power_botton_combat_arc_cooldown$"
 pse_power_botton_combat_arc_tooltip:0 "§E함선/스테이션에 적용되는 효과:§!"
 pse_power_botton_combat_arc_tooltip2:0 "적의 함선이 우리의 기존 함선/기지를 파괴하고 철수할 때, 비례적인 선체 피해를 입게 됩니다."
 pse_power_botton_combat_arc_tooltip3:0 "현재 존재하는 함선/스테이션에만 적용되며, 1회성으로 적용됩니다."
 pse_power_botton_combat_arc_tooltip_end:0 "$pse_power_botton_base_cost_text$§H150§!"
 pse_power_botton_combat_arc_cooldown:0 "$pse_power_botton_cooldown_3600$"
 pse_power_botton_combat_arc_cooldown_over:0 "$pse_power_botton_cooldown_over$$pse_power_botton_combat_arc_title$"
 pse_power_botton_combat_range_effect_over:0 "$pse_power_botton_combat_range_title$ 사이오닉 파워 효과가 만료되었습니다."
 pse_power_botton_combat_ship_title:0 "§H절대방벽§!"
 pse_power_botton_combat_ship_desc:0 "사이오닉 역장으로 함선과 스테이션을 둘러싸, 짧은 시간 동안 모든 물리적 공격으로부터 보호합니다. 그러나 강제적인 충돌을 방지하지는 않습니다.\n\n$pse_power_botton_combat_ship_tooltip$\n$pse_power_botton_combat_ship_tooltip2$\n$pse_power_botton_combat_ship_tooltip3$\n\n$pse_power_botton_combat_ship_tooltip_end$\n$pse_power_botton_combat_ship_cooldown$"
 pse_power_botton_combat_ship_tooltip:0 "§E함선/스테이션에 적용되는 효과:§!"
 pse_power_botton_combat_ship_tooltip2:0 "§Y100§!일 간 모든 종류의 함선 무기로부터 보호받습니다."
 pse_power_botton_combat_ship_tooltip3:0 "$pse_power_botton_combat_range_tooltip3$ 항성기지는 제외됩니다."
 pse_power_botton_combat_ship_tooltip_end:0 "$pse_power_botton_base_cost_text$§H275§!"
 pse_power_botton_combat_ship_cooldown:0 "$pse_power_botton_cooldown_7200$"
 pse_power_botton_combat_ship_cooldown_over:0 "$pse_power_botton_cooldown_over$$pse_power_botton_combat_ship_title$"
 pse_power_botton_combat_ship_effect_over:0 "$pse_power_botton_combat_ship_title$ 사이오닉 파워 효과가 만료되었습니다."
 pse_power_botton_break_unity_title:0 "§H나쁜 분위기§!"
 pse_power_botton_break_unity_desc:0 "최악의 이웃이 문제와 분열을 겪게 만들 수 있습니다. 모든 지성체는 서로에게 성가실 뿐입니다.\n\n$pse_power_botton_break_unity_tooltip$\n$pse_power_botton_break_unity_tooltip2$\n$pse_power_botton_break_unity_tooltip3$\n\n$pse_power_botton_break_unity_tooltip_end$\n$pse_power_botton_break_unity_cooldown$"
 pse_power_botton_break_unity_tooltip:0 "§E관계가 좋지 않은 이웃에게 적용되는 효과:§!"
 pse_power_botton_break_unity_tooltip2:0 "§Y5§! 년 후, 대부분의 항성계 문제에서 $influence$ §Y£influence£§!의 비용이 §R+50%§! 증가합니다."
 pse_power_botton_break_unity_tooltip3:0 "모든 팝은 £influence£ §Y$influence$ 유지비§! (§R-0.1§! per §Y100§! 팝) 동안 §Y12§! 개월이 소요됩니다."
 pse_power_botton_break_unity_tooltip_end:0 "$pse_power_botton_base_cost_text$§H115§!"
 pse_power_botton_break_unity_cooldown:0 "$pse_power_botton_cooldown_3600$"
 pse_power_botton_break_unity_effect_over:0 "$pse_power_botton_break_unity_title$가 만료되었습니다."
 pse_power_botton_break_unity_cooldown_over:0 "$pse_power_botton_cooldown_over$$pse_power_botton_break_unity_title$"
 pse_power_botton_break_dont_have_vaild_target:0 "§R£trigger_no£ 적용 가능한 국가가 없습니다.§!"
 pse_power_botton_break_dont_have_vaild_neighbor:0 "§R£trigger_no£ 적용 가능한 이웃이 없습니다.§!"
 pse_power_botton_break_dont_have_war:0 "§R£trigger_no£ 우리는 전쟁 중이 아닙니다.§!"
 pse_power_botton_break_stability_title:0 "§H마음의 불협화음§!"
 pse_power_botton_break_stability_desc:0 "이웃의 정신을 뒤틀고 비틀어 그들의 행동을 비이성적이고 조화를 이룰 수 없게 만듭니다.\n\n$pse_power_botton_break_stability_tooltip$\n$pse_power_botton_break_stability_tooltip2$\n$pse_power_botton_break_stability_tooltip3$\n\n$pse_power_botton_break_stability_tooltip_end$\n$pse_power_botton_break_stability_cooldown$"
 pse_power_botton_break_stability_tooltip:0 "§E§Y5§!년간 관계가 좋지 않은 이웃에게 적용되는 효과:§!"
 pse_power_botton_break_stability_tooltip2:0 "$MOD_PLANET_STABILITY_ADD$: §R-15§!, $MOD_POP_AMENITIES_USAGE_BASE$: §R+100%§!"
 pse_power_botton_break_stability_tooltip3:0 "$MOD_PLANET_CRIME_MULT$/$MOD_PLANET_CRIME_NO_HAPPINESS_MULT$: §R+100%§!"
 pse_power_botton_break_stability_tooltip_end:0 "$pse_power_botton_base_cost_text$§H135§!"
 pse_power_botton_break_stability_cooldown:0 "$pse_power_botton_cooldown_3600$"
 pse_power_botton_break_stability_effect_over:0 "$pse_power_botton_break_stability_title$이 만료되었습니다."
 pse_power_botton_break_stability_cooldown_over:0 "$pse_power_botton_cooldown_over$$pse_power_botton_break_stability_title$"
 pse_power_botton_break_building_title:0 "§H지각 불안정화§!"
 pse_power_botton_break_building_desc:0 "적의 행성에 광범위한 지진을 발생시켜, 건축물을 뿌리뽑아버립니다. 하지만 개발이 거의 되지 않은 행성에는 큰 효과가 없습니다.\n\n$pse_power_botton_break_building_tooltip$\n$pse_power_botton_break_building_tooltip2$\n$pse_power_botton_break_building_tooltip3$\n\n$pse_power_botton_break_building_tooltip_end$\n$pse_power_botton_break_building_cooldown$"
 pse_power_botton_break_building_tooltip:0 "§E전쟁 중 적 행성에 미치는 영향:§!"
 pse_power_botton_break_building_tooltip2:0 "사이오닉 지진이 §Y33%§!확률로 건물을 파괴하고 황폐화 수치를 올립니다."
 pse_power_botton_break_building_tooltip3:0 "행성의 인구가 파괴되는 건물의 수와 황폐화 수치를 결정합니다."
 pse_power_botton_break_building_tooltip_end:0 "$pse_power_botton_base_cost_text$§H175§!"
 pse_power_botton_break_building_cooldown:0 "$pse_power_botton_cooldown_3600$"
 pse_power_botton_break_building_cooldown_over:0 "$pse_power_botton_cooldown_over$$pse_power_botton_break_building_title$"
 pse_power_botton_break_stop_title:0 "§H느린 시간 흐름§!"
 pse_power_botton_break_stop_desc:0 "상대방의 행동을 멈추는 것은 불가능한 방법이지만, 우리는 정신적으로 그들의 반응 시간을 늦추려고 시도할 수 있습니다. 그들의 시간 흐름을 늦춤으로써, 그들이 깨닫기 전에 행동할 수 있는 기회를 더 많이 얻을 수 있습니다.\n\n$pse_power_botton_break_stop_tooltip$\n$pse_power_botton_break_stop_tooltip2$\n$pse_power_botton_break_stop_tooltip3$\n\n$pse_power_botton_break_stop_tooltip_end$\n$pse_power_botton_break_stop_cooldown$"
 pse_power_botton_break_stop_tooltip:0 "§E전쟁 중 적 제국에 미치는 영향:§!"
 pse_power_botton_break_stop_tooltip2:0 "다음 §Y12§! 개월 동안 대부분의 건설 진행 속도를 늦춥니다."
 pse_power_botton_break_stop_tooltip3:0 "적 함선은 §Y12§!개월 동안 하강 상태를 유지해야 합니다."
 pse_power_botton_break_stop_tooltip_end:0 "$pse_power_botton_base_cost_text$§H200§!"
 pse_power_botton_break_stop_cooldown:0 "$pse_power_botton_cooldown_3600$"
 pse_power_botton_break_stop_effect_over:0 "$pse_power_botton_break_stop_title$이 만료되었습니다."
 pse_power_botton_break_stop_cooldown_over:0 "$pse_power_botton_cooldown_over$$pse_power_botton_break_stop_title$"
 pse_power_botton_galaxy_storm_title:0 "§H은하적 아공간 교란§!"
 pse_power_botton_galaxy_storm_desc:0 "은하 전체에 걸쳐있는 아공간을 붕괴시키는 거대한 폭풍을 소환합니다. 폭풍은 아광속 엔진과 감지기에 수 년간 피해를 줍니다.\n\n$pse_power_botton_galaxy_storm_tooltip$\n$pse_power_botton_galaxy_storm_tooltip2$\n$pse_power_botton_galaxy_storm_tooltip3$\n\n$pse_power_botton_galaxy_storm_tooltip_end$\n$pse_power_botton_galaxy_storm_cooldown$"
 pse_power_botton_galaxy_storm_tooltip:0 "§E은하에 적용되는 효과:§!"
 pse_power_botton_galaxy_storm_tooltip2:0 "우리의 수도 항성계에 $shroud_storm_color_tooltip$을 소환합니다."
 pse_power_botton_galaxy_storm_tooltip3:0 "$shroud_storm_color_tooltip$는 $job_telepath_plural$의 능력을 강화하며, 그 비용은 $PLANET_DEVASTATION$과 $PLANET_STABILITY_TITLE$입니다."
 pse_power_botton_galaxy_storm_tooltip_end:0 "$pse_power_botton_base_cost_text$§H210§!"
 pse_power_botton_galaxy_storm_cooldown:0 "$pse_power_botton_cooldown_7200$"
 pse_power_botton_galaxy_storm_cannot_use:0 "§R£trigger_no£ 은하에 이미 일종의 아공간 폭풍이 발생했습니다.§!"
 pse_power_botton_galaxy_storm_cooldown_over:0 "$pse_power_botton_cooldown_over$$pse_power_botton_galaxy_storm_title$"
 pse_power_botton_galaxy_field_title:0 "§H중력장§!"
 pse_power_botton_galaxy_field_desc:0 "우리의 성계에 FTL 포획기를 살포합니다. 일단 사이오닉 장이 대상을 포착하면, 이 초대받지 않은 손님들은 한동안 그곳에서 벗어날 수 없을 것입니다.\n\n$pse_power_botton_galaxy_field_tooltip$\n$pse_power_botton_galaxy_field_tooltip2$\n$pse_power_botton_galaxy_field_tooltip3$\n\n$pse_power_botton_galaxy_field_tooltip_end$\n$pse_power_botton_galaxy_field_cooldown$"
 pse_power_botton_galaxy_field_tooltip:0 "$pse_power_botton_galaxy_storm_tooltip$"
 pse_power_botton_galaxy_field_tooltip2:0 "우리의 성계에 중력장을 §Y5§!년간 설치합니다."
 pse_power_botton_galaxy_field_tooltip3:0 "중력장이 설치된 성계에 진입하는 적대적 함선은 §Y30§!일간 이동 속도가 감소합니다."
