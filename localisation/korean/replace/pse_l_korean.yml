 pse_potential_desc:0 "$pse_potential$\n§L[Ruler.GetName] [Ruler.GetHasHave] 잠재적 사이오닉 능력으로 [Ruler.GetHerHim]의 힘을 증가시킬 수 있습니다.§!\n\n§E제국에 미치는 영향:§!\n$pse_power_increase_month$: §G+0.25§!\n$pse_power_bar_cap_name$: §G+10§!"
