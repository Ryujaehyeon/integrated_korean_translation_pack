 pse_power_botton_leader_mirage_desc:0 "사이오닉은 형체가 없거나 고체입니다. 우리의 집단적인 힘을 복잡한 객체로 구현함으로써, 상상이 힘이 될 때 장애물은 존재하지 않을 것입니다.\n\n$pse_power_botton_leader_mirage_tooltip$\n$pse_power_botton_leader_mirage_tooltip2$\n$pse_power_botton_leader_mirage_tooltip3$\n\n$pse_power_botton_leader_mirage_tooltip_end$\n$pse_power_botton_leader_mirage_cooldown$"
