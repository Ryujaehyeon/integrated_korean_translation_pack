 pse_power_main_botton_effect_leader_title:0 "§H지도자§!\n§E지도자의 만족이 제국의 미래를 여는 열쇠가 될 것입니다.§!$pse_power_main_botton_click_tooltip$"
 pse_power_main_botton_effect_shroud_title:0 "§H장막§!\n§E장막을 탐사하여 우주의 비밀을 밝혀낼 수 있을 것입니다.§!$pse_power_main_botton_click_tooltip$"
 pse_power_main_botton_effect_planet_title:0 "§H행성§!\n§E찬란하고 적합한 거대한 물체에 훌륭한 국가가 깃드는 법입니다.§!$pse_power_main_botton_click_tooltip$"
 pse_power_main_botton_effect_cleanse_title:0 "§H오염 정화§!\n§E사고를 방지하기 위해서 오염을 정화해야 합니다.§!$pse_power_main_botton_click_tooltip$"
 pse_power_main_botton_effect_summon_title:0 "§H소환§!\n§E힘을 희생해 힘을 소환합니다.§!$pse_power_main_botton_click_tooltip$"
 pse_power_main_botton_effect_combat_title:0 "§H전투§!\n§E전투야말로 사이오닉 능력이 빛을 발하는 곳입니다.§!$pse_power_main_botton_click_tooltip$"
 pse_power_main_botton_effect_break_title:0 "§H파괴§!\n§E우리의 적들은 불행히도 '사고'를 당할 예정입니다.§!$pse_power_main_botton_click_tooltip$"
 pse_power_main_botton_effect_galaxy_title:0 "§H우주§!\n§E우주의 힘은 보이는 만큼 강력합니다.§!$pse_power_main_botton_click_tooltip$"
 pse_power_main_botton_effect_chosen_title:0 "\n§G클릭하여 [Root.Ruler.GetName]의 도움을 받을 수 있는 사이오닉 파워를 엽니다§!"
 pse_power_main_botton_effect_realm_title:0 "§H장막 범주§!\n§E장막 내에서 우리의 조화가 어떻게 이루어지고, 후원자들이 우리를 어떻게 바라보는지를 나타냅니다.§!$pse_power_main_botton_click_tooltip$"
 pse_power_main_botton_effect_covenant_cycle_title:0 "§Y주기의 끝§!"
 pse_power_main_botton_effect_covenant_cycle_desc:0 "§R모든 것을 희생해야 합니다. 심판이 다가오고 있습니다.§!"
