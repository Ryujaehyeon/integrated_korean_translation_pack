 pse_power_botton_shroud_boon_title:0 "§H장막의 축복§!"
 pse_power_botton_shroud_boon_desc:0 "장막의 존재와 우리 사이의 사이오닉 유대감을 높이기 위해, 장막의 존재에게 축복을 받습니다.\n\n$pse_power_botton_shroud_boon_tooltip$\n$pse_power_botton_shroud_boon_tooltip2$\n\n$pse_power_botton_shroud_boon_tooltip_end$\n$pse_power_botton_shroud_boon_cooldown$"
