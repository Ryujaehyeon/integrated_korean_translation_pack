 pse_power_botton_leader_tech_desc:0 "가장 뛰어난 이들을 정신적으로 조사하여, 그들의 위대한 계획에 대한 계획을 모든 사람에게 전달해 새로운 깨달음을 줍니다.\n\n$pse_power_botton_leader_tech_tooltip$\n$pse_power_botton_leader_tech_tooltip2$\n$pse_power_botton_leader_tech_tooltip3$\n\n$pse_power_botton_leader_tech_tooltip_end$\n$pse_power_botton_leader_tech_cooldown$"
 pse_power_botton_leader_tech_tooltip:0 "§E제국 효과:§!"
 pse_power_botton_leader_tech_tooltip2:0 "각 연구 카테고리에서 §Y연구 옵션§!을 얻습니다."
 pse_power_botton_leader_tech_tooltip3:0 "유효한 연구 옵션이 없으면, 대신 매달 연구 포인트를 얻습니다."
