 pse_patron_double_eater_text:0 "각 $pse_power_text_icon$의 쿨타임이 끝날 때마다 우리의 §H$MOD_SHIP_FIRE_RATE_MULT$§!와 §H$MOD_SHIP_WEAPON_DAMAGE$§!가 §G+5%§!씩 증가합니다 (최대 §G+50%§!)."
 pse_patron_double_desire_text:0 "각 $pse_power_text_icon$의 쿨타임이 있을 때 (최대 10회) 우리의 §H$mod_planet_jobs_produces_mult$§!를 §G+2.5%§! 증가시키고 우리의 §H$mod_planet_jobs_upkeep_mult$§!를 §G-1.5%§! 감소시킵니다."
 pse_patron_double_knowledge_text:0 "$pse_power_text_icon$를 발휘할 때 마다, 약간의 §H월간 연구 점수§!를 획득합니다."
 pse_patron_double_composer_text:0 "$pse_power_text_icon$를 발휘할 때 마다, §H1-2§! 유기체 £pops£ §GPOP§!을 획득합니다."
 tech_pse_pop_1:0 "염동력 응용"
 tech_pse_pop_1_desc:0 "염동력 재교육 세미나를 지원하면 제국 내에서 사이오닉 재능이 있는 자들이 염동력을 배워 일상을 더 낫게 만들 수 있습니다."
 tech_pse_pop_2:0 "염동력 증폭 수술"
 tech_pse_pop_2_desc:0 "수술을 통한 강화를 의무화하여 사이오닉 능력을 지닌 국민의 염력 잠재성을 대폭 증가시킬 수 있습니다. 결과적으로, 많은 산업에서 이전까지 사용했던 반중력 공학의 필요가 없어질 것입니다."
 tech_pse_pop_1_tooltip:0 "§E모든 §Y$trait_latent_psionic$§! 및 §Y$trait_psionic$§! POP:§!\n$mod_planet_jobs_upkeep_mult$: §G-5%§!\n$mod_planet_jobs_produces_mult$: §G+5%§!"
 tech_pse_pop_2_tooltip:0 "§E모든 §Y$trait_psionic$§! POP:§!\n$mod_planet_jobs_upkeep_mult$: §G-10%§!\n$mod_planet_jobs_produces_mult$: §G+5%§!"
 tech_pse_leader_1:0 "순간이동 훈련"
 tech_pse_leader_1_desc:0 "일반적인 순간이동 즉응 훈련을 실시하면, 함선에 얽매인 지도자들이 고위험 상황에서 탈출할 수도 있습니다."
 tech_pse_leader_2:0 "예측 순간이동 프로토콜"
 tech_pse_leader_2_desc:0 "예지 이론이 발달함에 따라, 우리는 사이오닉 지도자들에게 예측 순간이동의 우수 사례에 관해 교육할 수 있습니다. 이로써 지도자들이 위험에서 탈출할 확률이 더욱 증가합니다. 가끔씩은 자신이 도망치고 있다는 것을 알기도 전에 순간이동을 합니다."
 feature_pse_leader_feature:0 "§H기능 잠금 해제:§! 예측 탈출"
 feature_pse_leader_feature_desc:0 "§H예측 탈출§!\n전투 중, 함선에 탄 사이오닉 지도자는 함선이 파괴되기 전 일정 확률로 탈출합니다."
 tech_pse_leader_1_tooltip:0 "§EEvery §Y$leader_trait_psionic$§! 함선의 지도자:§!\n$pse_narrow_escape_name$: §G+50%§!"
 tech_pse_leader_2_tooltip:0 "$mod_leaders_upkeep_mult$: §G-10%§!\n§EEvery §Y$leader_trait_psionic$§! 함선의 지도자들:§!\n$pse_narrow_escape_name$: §G+25%§!"
 tech_pse_zro_1:0 "$sr_zro$ 응용"
 tech_pse_zro_1_desc:0 "$sr_zro$를 사용하는 새로운 방법을 찾았습니다. 이로써 우리의 사이오닉 잠재력은 강력해지고 힘을 발휘하는데 필요한 사이오닉 능력은 줄어들 것입니다."
 feature_pse_zro_feature:0 "§H기능 잠금 해제:§! 지로 흡입"
 feature_pse_zro_feature_desc:0 "§H지로 흡입§!\n£sr_zro£ §Y$sr_zro$§!를 사용해 힘을 발휘하는데 드는 §Y$pse_power_text_icon$§! 비용을 감소시킬 수 있습니다."
 tech_pse_power_1:0 "사이오닉 조작 이론"
 tech_pse_power_1_desc:0 "우리는 장막과 우리와 장막 간의 연결을 조작하는 법에 대해 알아가기 시작했습니다. 우리는 이전의 헤아릴 수 없는 양의 사이오닉 에너지를 모을 수 있습니다."
 tech_pse_power_1_tooltip:0 "$pse_power_increase_month$: §G+0.5§!\n$pse_power_bar_cap_name$: §G+15§!"
 tech_pse_power_2:0 "사이오닉 궁전 현현"
 tech_pse_power_2_desc:0 "우리의 커져만 가는 이해 너머에 아직 많은 것이 남아있습니다. 우리는 사이오닉 에너지를 보관할 장소를 떠올리는 것으로 에너지를 더 많이 유지할 수 있는 법에 대해 알게 되었습니다."
 tech_pse_power_2_tooltip:0 "$pse_power_increase_month$: §G+0.25§!\n$pse_power_bar_cap_name$: §G+30§!"
 tech_pse_power_3:0 "잠든 자의 사이오닉"
 tech_pse_power_3_desc:0 "수년간의 연구 결과, 사이오닉 재능이 있는 자들은 잠자고 있는 동안에도 세상에 영향을 미친다는 것이 증명되었습니다. 따라서, 우리의 대중들에게 꿈을 꾸면서도 우리의 대업에 공헌하는 방법을 가르칠 수 있을지도 모릅니다."
 tech_pse_power_3_tooltip:0 "$pse_power_increase_month$: §G+0.5§!\n$pse_power_bar_cap_name$: §G+30§!\n사이오닉 파워 발휘시 얻는 오염: §G-20%§!"
 tech_pse_circle_1:0 "사이오닉 변천 증폭"
 tech_pse_circle_1_desc:0 "세상은 변하고 있으며, 우리도 그에 맞춰 변해야합니다. 우리는 우리의 감각을 은하의 사건에 맞추고 승리에 대한 긍정적인 반응을 증폭시키는 법을 배웠습니다. 심지어는 멀리 떨어진 항성계에서도 말입니다."
 feature_pse_circle_feature:0 "§H사이오닉 파워:§! 수행의 은혜"
 feature_pse_circle_feature_desc:0 "§H수행의 은혜§!\n오염이 없을 때 추가로 §G+3§! $pse_power_increase_month$을 획득합니다.\n우리의 군사 함선이 적 함선/스테이션을 파괴/후퇴 시키면 §G+0.25§! $pse_power_text_icon$를 획득합니다."
 feature_pse_circle_feature_2:0 "§H오염:§! 비참한 자의 정화"
 feature_pse_circle_feature_2_desc:0 "§H비참한 자의 정화§!\n월간 오염: §G-0.1§!\n§Y$pse_power_text_icon$§!가 최대치일 때 추가적으로 오염이 감소합니다. $pse_power_increase_month$에 따라 감소량이 변동됩니다."
 tech_pse_bomb_1:0 "영혼 점화"
 tech_pse_bomb_1_desc:0 "영혼 불꽃의 정수와 안정적인 연결을 유지하는 방법을 통해, 생각만으로 불꽃을 피워낼 수 있습니다."
 feature_pse_bomb_feature2:0 "§H기능 잠금 해제:§! $tech_pse_bomb_1$"
 feature_pse_bomb_feature2_desc:0 "§H$tech_pse_bomb_1$§!\n함대의 §H해산§!명령으로 모든 곳에 §Y영혼 불꽃§!을 일으킬 수 있습니다. 반드시 적이 파괴할 필요는 없습니다."
 feature_pse_bomb_feature:0 "§H영혼 불꽃:§! 면역"
 feature_pse_bomb_feature_desc:0 "§H영혼 불꽃§!\n우리가 일으킨 §Y영혼 불꽃§!은 우리에게 피해를 입히지 않습니다."
 edict_pse_psi_ruler_ui:0 "사이오닉 파워 메뉴"
 edict_pse_psi_ruler_ui_desc:0 "사이오닉 능력이 발전해감에 따라, 마침내 우리는 우주에 우리의 의지를 투영할 수 있게 되었습니다. 더 많은 연구와 준비가 있다면, 우리가 어디까지 할 수 있는지 다른 그 누구도 모를 것입니다."
 edict_pse_psi_ruler_ui_tooltip:0 "사이오닉 파워 메뉴에서 잠금 해제된 모든 $pse_power_text_icon$를 사용할 수 있습니다."
 edict_pse_zro_edict:0 "민간 $sr_zro$ 응용"
 edict_pse_zro_edict_desc:0 "사이오닉 재능이 있는 종족에게 $sr_zro$를 배급하여 생산량을 높입니다. 그러나 이에 중독되는 자들도 있을 것입니다."
 edict_pse_zro_edict.tooltip:0 "$mod_pop_telepath_bonus_workforce_mult$: §G+100%§!\n매 100명의 £job_telepath£ $job_telepath_plural$는 매달 §G0.05§! §Y£influence£ $influence$§!를 생산합니다.\n  노예제 또는 그 이상의 생활 수준을 가진 100명의 £pops£ §YPops§!는 매달 §R0.05§! £sr_zro£ §Y$sr_zro$§!의 비용이 듭니다."
 pse_zro_edict_fail_text:0 "§R£trigger_no£ 이 시행령을 유지하기에 충분한 양의 £sr_zro£ §Y$sr_zro$§!가 없습니다.§!"
 edict_pse_zro_gas_edict:0 "지로 증류"
 edict_pse_zro_gas_edict_desc:0 "우리 제국의 기초는 강력한 사이오닉 능력을 가진 지도자들에게 의존합니다. 그들의 '도움'으로 귀중한 $sr_zro$를 추출할 수 있습니다."
 edict_pse_zro_gas_edict.tooltip:0 "모든 §Y$leader_trait_psionic$§! 특성을 가진 지도자는 매달 §G0.25§! £sr_zro£ §Y$sr_zro$§!를 생산합니다.\n모든 §Y$leader_trait_psionic$§! 지도자의 유지비가 §R5§! £energy£ §Y$energy$§!와 §R5§! £minerals£ §Y$minerals$§! 증가합니다."
 edict_pse_psi_power:0 "의무적 발휘 경관"
 edict_pse_psi_power_desc:0 "사이오닉 재능이 있는 자들은 우리 문명에게 제공할 것이 너무나 많습니다. 그들이 이를 알고 있다면 말입니다. 우리는 사이오닉 발휘 경관을 배치하여 사이오닉 능력자들이 우리의 대업에 이바지하게 만들 수 있습니다."
