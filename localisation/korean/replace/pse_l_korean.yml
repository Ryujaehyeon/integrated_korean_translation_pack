 PSE_CORRUPTION_BAR_TOOLTIP:0 "§R오염§!: §Y[root.pse_corruption]§!/§Y100§!\n------------\n$PSE_CORRUPTION_BAR_DESC$"
 PSE_CORRUPTION_BAR_DESC:0 "§E오염은 우리가 반복해서 발휘한 사이오닉 파워가 얼마나 우리를 틀어지게 만들었는지를 나타냅니다.\n\n오염은 사이오닉 파워를 발휘할 때 증가하며, 정화 범주의 사이오닉 파워를 사용하면 감소합니다. 오염이 넘칠때 파워를 발휘하면 §R불행한 사태§!가 발생할 수 있습니다.§!"
