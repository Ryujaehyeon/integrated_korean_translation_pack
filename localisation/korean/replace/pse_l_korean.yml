 MOD_pse_power_covenant_knowledge_code_effect_desc:0 "§G공허 속의 속삭임이 우리의 첩보망의 확장에 큰 도움을 주고 있습니다.§!"
 MOD_pse_power_covenant_all_bribe_effect:0 "$MOD_pse_power_prefix$$pse_power_botton_covenant_all_bribe_title$"
 MOD_pse_power_covenant_all_bribe_effect_tooltip:0 "§Y변동치가 사라지기 전까지 계약으로부터 부정적인 사건은 발생하지 않습니다.§!"
 MOD_pse_power_covenant_all_bribe_effect_desc:0 "우리와 계약을 맺은 존재가 우리의 공물에 만족하고 있습니다."
 MOD_pse_power_patron_double_effect:0 "계약 : 공동의 위협"
 MOD_pse_power_patron_double_effect_desc:0 "우리와 계약을 맺은 존재가 장막의 공동의 위협에 맞서는 데 도움이 될 능력을 제공합니다."
