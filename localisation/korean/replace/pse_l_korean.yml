 PSE_POWER_BAR_CAP_DESC:0 "§E사이오닉 능력의 양은 다음에 의해 영향을 받습니다:§!\n§G+ 사이오닉 특성을 가진 통치자, 지도자 및 팝\n+ 텔레파시 직업, 관련 기술§!\n§R- 쿨타임 중인 능력으로 인한 정신적 소모§!\n------------\n[root.pse_power_bar_num_text_base][root.pse_power_bar_num_text_hive_mind][root.pse_power_bar_num_text_ruler][root.pse_power_bar_num_text_peak][root.pse_power_bar_num_text_job][root.pse_power_bar_num_text_tech][root.pse_power_bar_num_text_leader][root.pse_power_bar_num_text_pops][root.pse_power_bar_num_text_power1][root.pse_power_bar_num_text_psy_siphon][root.pse_power_bar_num_cooldown_power]"
