 pse.120.title:0 "지각 불안정화"
 pse.120.desc:0 "주문이 끝났습니다. 적어도 §Y[root.pse_power_break_affected_num]§!개의 행성이 엄청난 사이오닉 지진의 영향을 받았습니다."
 pse_power_botton_break_building_effect_result:0 "우리는 전쟁중인 적의 $pse_power_break_affected_num|Y$ 행성에 영향을 미쳤습니다."
 pse_power_botton_break_stop_effect_result:0 "$pse_country|Y$는 우리의 함선과 건설물의 움직임을 멈추기 위해 사이오닉 힘의 급증을 발휘했습니다!"
 pse.125.desc:0 "우리는 원하는 성계로 수많은 장막의 존재들을 안내했습니다.\n\n복수심에 불타는 이 존재들은 엄청난 사이오닉 에너지를 축적하고 있으며, 눈앞에 있는 모든 것을 맹렬히 공격할 것입니다."
 pse.127.desc:0 "현실에 존재하는 아바타가 시간이 지남에 따라 서서히 약해져 실체를 유지할 수 없게 되었습니다. 대부분은 다시금 장막으로 추방되었습니다."
 pse.128.desc:0 "현실에 존재하는 사이오닉 개체가 시간이 지남에 따라 서서히 약해져 실체를 유지할 수 없게 되었습니다. 대부분은 다시금 장막으로 추방되었습니다."
 pse.129.title:0 "존재의 등장"
 pse.129.desc:0 "어떠한 전조도 없이 장막의 사이오닉 존재가 [shroud_spawn_system.GetName]에서 현실화되었습니다! 복수심에 불타는 이 존재는 엄청난 사이오닉 에너지를 축적하고 있으며, 눈앞에 있는 모든 것을 맹렬히 공격할 것입니다."
 pse.131.title:0 "저 너머로부터의 저주"
 pse.131.desc:0 "경고 없이, 전례 없는 규모의 강력한 사이오닉 반동이 우리 문명에 강타하여, 우리를 깊은 혼란과 불확실성의 상태로 몰아넣었습니다!"
 pse.131.desc.a:0 "$pse.131.desc$\n\n우리 시민들의 행복에 지대한 영향을 끼쳤으며, 암울한 기운만이 [Root.GetName]을 떠돌고 있습니다. 장막에 접근할 수 없는 자들 조차도 이를 느낄 수 있습니다."
 pse.131.desc.b:0 "$pse.131.desc$\n\n이 부정적인 에너지가 시민들의 마음속에 의심을 확산시켰습니다. 많은 사람들이 우리 정부의 생각과 맞지 않는 새로운 급진적인 생각으로 향하고 있습니다. 사이오닉 능력이 없는 시민들에게도 영향이 미쳤습니다!"
 pse.131.desc.c:0 "$pse.131.desc$\n\n함선의 장갑이 갑자기 불안정해졌고, 더 이상 공격을 버틸 수 없습니다."
 pse.131.desc.d:0 "$pse.131.desc$\n\n어떤 이유에서인지, [Root.GetName]의 출산율이 급격하게 낮아졌습니다."
 pse.131.desc.e:0 "$pse.131.desc$\n\n연구자들의 정신이 흐리멍텅해졌으며, 연구에 집중하지 못하고 있습니다."
 pse.131.desc.f:0 "$pse.131.desc$\n\n정치적 영향력의 축적 속도가 크게 느려졌습니다."
 pse.131.desc.g:0 "$pse.131.desc$\n\n한때 단결했던 우리 시민은 이젠 분duf되었습니다."
 pse.131.desc.h:0 "$pse.131.desc$\n\n마치 보이지 않는 힘이 함선에 작용하는 것 같습니다. 함선의 이동 속도가 크게 감소합니다."
 pse.131.desc.i:0 "$pse.131.desc$\n\n부정적인 에너지가 지상군의 사기를 크게 떨어트렸습니다."
 pse.131.desc.j:0 "$pse.131.desc$\n\n모든 종류의 감지기의 범위가 크게 감소했습니다."
 pse.131.desc.geth:0 "$pse.131.desc$\n\n다행히도, 이러한 에너지는 우리에게 영향을 주지 못했습니다."
 pse.131.a:0 "계속해라."
 pse.132.title:0 "서로에게"
 pse.132.desc:0 "먼저, 우리 제국 내에서 변화시키고자 하는 윤리를 선택합니다."
 pse.132.a:0 "$ethic_xenophile$"
 pse.132.b:0 "$ethic_xenophobe$"
 pse.132.c:0 "$ethic_spiritualist$"
 pse.132.d:0 "$ethic_materialist$"
 pse.132.e:0 "$ethic_militarist$"
 pse.132.f:0 "$ethic_pacifist$"
 pse.132.g:0 "$ethic_egalitarian$"
 pse.132.h:0 "$ethic_authoritarian$"
 pse.132.a.tooltip:0 "우리는 §Y[root.pse_xenophile_num]§! £pops£ 팝이 이 윤리에 속합니다."
 pse.132.b.tooltip:0 "우리는 §Y[root.pse_xenophobe_num]§! £pops£ 팝이 이 윤리에 속합니다."
 pse.132.c.tooltip:0 "우리는 §Y[root.pse_spiritualist_num]§! £pops£ 팝이 이 윤리에 속합니다."
 pse.132.d.tooltip:0 "우리는 §Y[root.pse_materialist_num]§! £pops£ 팝이 이 윤리에 속합니다."
 pse.132.e.tooltip:0 "우리는 §Y[root.pse_militarist_num]§! £pops£ 팝이 이 윤리에 속합니다."
 pse.132.f.tooltip:0 "우리는 §Y[root.pse_pacifist_num]§! £pops£ 팝이 이 윤리에 속합니다."
 pse.132.g.tooltip:0 "우리는 §Y[root.pse_egalitarian_num]§! £pops£ 팝이 이 윤리에 속합니다."
 pse.132.h.tooltip:0 "우리는 §Y[root.pse_authoritarian_num]§! £pops£ 팝이 이 윤리에 속합니다."
 pse.133.desc:0 "그들에게 어떤 윤리가 퍼질 것인가?"
 pse.133.casted:0 "우리는 우리 제국의 $pse_pop_worship|Y$ £pops£ 팝을 우리가 원하는 윤리에 맞추었습니다."
 pse.135.casted:0 "우린 적어도 다른 제국의 $pse_pop_worship|Y$ £pops£에게 우리의 윤리관을 강요했습니다."
 pse.136.title:0 "사이오닉 신기루"
 pse.136.desc_first_time:0 "우리는 곧 혼란스러운 현상을 발견하게 되었습니다. 사이오닉 능력을 발휘할 때마다 의도한 효과와 함께, 우리의 텔레파시 능력자 주변에 신비롭고 형체가 없는 물체들이 떠오르는 것이 관찰되었습니다.\n\n이러한 호기심을 자아내는 발전은 더 많은 능력을 발휘할 유인을 제공하는 것처럼 보였으며, 이는 우리가 일반적으로 얻지 못하는 추가적인 보상과 자원을 가져왔습니다.\n\n하지만 조심해야 합니다 - 이전에 논의한 바와 같이, 부패의 유령이 불길하게 드리워져 우리의 행동이 초래할 수 있는 잠재적 결과를 상기시킵니다."
 pse.136.desc:0 "당신의 지도자가 발전기일 때, 그들이 더 많은 에너지를 생성하기를 원합니다."
 pse.136.desc2:0 "실업자 지도자 농장에서 경력을 시작하게 된다면, 문제가 생길 수 있습니다."
 pse.136.desc3:0 "§MZrocola(TM)§!를 이 에너지에서 추출할 수 없다는 것은 아쉽습니다. 그렇지 않았다면, 그 기원의 또 다른 수수께끼가 해결되었을 것입니다."
 pse.136.desc4:0 "어떤 측면에서는, 사이오닉 힘으로 Zro의 가루를 미라지하는 것이 변장한 영구 기관차가 되었을지도 모릅니다."
 pse.136.desc5:0 "원하는 것을 조심하세요. 이렇게 진행된다면, 우리의 지도자들은 그것으로 전투함의 환상을 만들어낼지도 모릅니다."
 pse.136.desc6:0 "§Y\"이제 빛을 사용해, 우리는 보고 싶어!\"§!\n\n어? 너가 영혼이 아니라고?"
 pse.136.first_time:0 "하나를 찾을 수 없다면, 우리는 그것을 만듭니다."
 pse.136.tooltip:0 "각각의 §Y$pse_power_text_icon$§! 발현 시, §Y$trait_psionic$§! 특성을 가진 지도자들(통치자 제외)은 다양한 자원을 생성합니다."
 MOD_pse_power_leader_mirage_modifier_prefix:0 "$trait_psionic$ 통치자 외의 지도자들은 생산합니다."
 MOD_pse_power_leader_mirage_modifier_latter:0 "§Y10§! 사용된 $pse_power_text_icon$.$MOD_pse_power_leader_mirage_modifier_end$"
 MOD_pse_power_leader_mirage_modifier_end:0 "\n효과는 일반적으로 시간에 따라 §Y-1§!에서 §Y-3§!까지 매달 감소합니다."
