 pse_power_botton_shroud_enter_desc:0 "우리는 아직 알지 못했던 것을 보기 위한 힘이 있다면 다시 한 번 그림자에 들어가려 할 수 있습니다.\n\n$pse_power_botton_shroud_enter_tooltip$\n$pse_power_botton_shroud_enter_tooltip2$\n$pse_power_botton_shroud_enter_tooltip3$\n\n$pse_power_botton_shroud_enter_tooltip_end$\n$pse_power_botton_shroud_enter_cooldown$"
