 pse_power_botton_leader_remove_negative_trait_tooltip_end:0 "$pse_power_botton_base_cost_text$§H35§!"
 pse_power_botton_leader_remove_negative_trait_cooldown:0 "$pse_power_botton_cooldown_1800$"
