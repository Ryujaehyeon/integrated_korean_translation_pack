 pse_power_botton_shroud_enter_tooltip2:0 "§Y$shroud_cooldown$§!을 줄이고 장막에 다시 들어갈 수 있습니다."
 pse_power_botton_shroud_enter_tooltip3:0 "§Y$mod_shroud_delve_cooldown$§!이 §G-33%§!만큼 §Y5§!년 동안 감소합니다."
