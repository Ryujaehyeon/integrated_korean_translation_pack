 pse.90.title:0 "사이오닉 파워"
 pse.90.normal:0 "점점 더 많은 이들에게 사이오닉 재능이 나타남에 따라, 마법과 주문에 대한 주장이 들려오고 있습니다. 처음엔 쉽사리 무시할 수 있는 주장이었습니다. 우리가 사이오닉 능력을 가지게 되었을 때, 그 무엇을 마법이라고 부를 수 있을까요?\n\n이제, 우린 알고 있습니다. 한때 주술로 숭배받던 능력은 사이오닉 능력의 발휘에 지나지 않았습니다. 함께라면 신이나 다른 비현실적인 존재의 권능으로 여겨졌던 것 이상을 해낼 수 있습니다.\n\n우리는 §H[Root.GetSpeciesNamePlural]§!의 가장 뛰어난 이들을 모아 §Y정신감응자 비밀회의§!를 설립하였습니다. 그들은 한 번에 일정량의 사이오닉 에너지만을 지니고있을 수 있지만, 함께라면 우리 문명 전체의 사이오닉 잠재력을 위한 초점의 역할을 할 수 있습니다. 우리가 또 무엇을 할 수 있는지, 그리고 사이오닉 능력의 발휘의 위험성은 무엇인지 알기위해 더 많은 연구를 해야합니다."
 pse.90.desc:0 "충분히 많은 수의 재능있는 이들이 사이오닉의 비밀을 알게 된다면, 우리는 지금껏 §H[Root.GetSpeciesName]§!이 경험하지 못한 강력한 능력을 사용할 수 있습니다.\n\n물론 강력한 힘에는 그 대가가 따릅니다. 만일 우리가 이 힘을 멋대로 사용한다면, 그 뒤엔 무슨 일이 일어날 지 알 수 없습니다..."
 pse.90.a:0 "새로운 세상이 열렸고, 그 세상은 우리의 것이다."
 pse.90.tooltip:0 "§H시행령 잠금 해제:§! $edict_pse_psi_ruler_ui$"
 pse.101.title:0 "아이디어 시각화"
 pse.101.desc:0 "천재의 반짝임이 마침내 현실이 됩니다."
 pse.101.desc2:0 "우리의 가장 거친 꿈이 현실이 됩니다."
 pse.101.desc3:0 "생각의 대상이 실존하는 지에 대한건 중요치 않습니다."
 pse.101.desc4:0 "상상이 현실이 되는 곳, 우리의 앞에 있습니다."
 pse.101.desc5:0 "흐릿한 시야 너머로 우리를 인도하는 불빛. 모든 이들이 의미를 이해하기 위해 최선을 다합니다."
 pse.102.name:0 "일치된 인도"
 pse.102.desc:0 "우리는 §H[selected_leader.GetTitle] [selected_leader.GetName]§! [selected_leader.GetHasHave]가 드디어 [selected_leader.GetHisHer] 자신의 문제를 우리 개입 이후로 해결했음을 감지했습니다.\n\n"
 pse.102.desc_a:0 "앞으로 [selected_leader.GetHimHer]는 더 열린 생각을 가질 수 있을 것입니다."
 pse.102.desc_b:0 "[selected_leader.GetHimHer]는 더 건강한 삶을 살아갈 수 있을 것입니다."
 pse.102.desc_c:0 "[selected_leader.GetHeSheCap]가 마침내 진전을 보일 것입니다."
 pse.102.desc_d:0 "[selected_leader.GetHeSheCap]는 이전의 패배를 딛고 일어섰고, 이제 그전보다 용감해졌습니다."
 pse.102.desc_e:0 "[selected_leader.GetHeSheCap] [selected_leader.GetHasHave] 함대에 대한 더 나은 감각을 가지고 있습니다."
 pse.102.desc_f:0 "[selected_leader.GetHeSheCap] [selected_leader.GetIsAre] 앉았다 일어설 수 있는 책상을 사용하기로 결정했습니다."
 pse.102.desc_g:0 "[selected_leader.GetHeShe] [selected_leader.GetIsAre] 더 이상 불법적인 이익에 관심이 없다고 말할 수 있습니다."
 pse.102.desc_h:0 "[selected_leader.GetHeShe] [selected_leader.GetIsAre] 더 이상 그들의 승무원에게 거칠게 대하지 않는다고 말할 수 있습니다."
 pse.103.name:0 "저주 해주"
 pse.103.desc:0 "우리 사이의 사이오닉 연결을 방해하는 것이 어떤 영혼이든, 그것들은 우리의 고밀도 에너지에 의해 사라졌습니다.\n\n다시 연결망에서 안전하게 이동할 수 있습니다. 현재는 말입니다."
 pse.104.title:0 "자원 하사"
 pse.104.desc:0 "비축된 자원이 갑자기 나타났습니다.\n\n이 자원이 어디서 왔는지는 아직 모릅니다. 다른 문명일까요? 아니면 다른 현실? 어쩌면 절대 알 수 없을지도 모릅니다."
 pse.104.desc2:0 "언젠가 지식이 늘어난다면, 이 변환된 물질을 이해할 수 있을 것입니다."
 pse.104.desc3:0 "솔직히 말하자면 맛있는 §MZroCola(TM)§!가 아니라는 것이 아쉽습니다."
 pse.104.desc4:0 "대부분의 §Y[Root.GetSpeciesNamePlural]§! 기준에서 그것은 과소비입니다. 사용 방법을 모른다면 말입니다."
 pse.104.desc5:0 "이 모든 §Y'rock on'§! 소환 코드는 진짜입니다. 놀랍지 않죠."
 pse.104.tooltip:0 "[root.pse_104_scripted_loc_energy][root.pse_104_scripted_loc_minerals][root.pse_104_scripted_loc_food][root.pse_104_scripted_loc_alloys][root.pse_104_scripted_loc_consumer_goods][root.pse_104_scripted_loc_trade][root.pse_104_scripted_loc_influence][root.pse_104_scripted_loc_unity][root.pse_104_scripted_loc_minor_artifacts][root.pse_104_scripted_loc_exotic_gases][root.pse_104_scripted_loc_rare_crystals][root.pse_104_scripted_loc_volatile_motes][root.pse_104_scripted_loc_sr_dark_matter][root.pse_104_scripted_loc_sr_living_metal]"
