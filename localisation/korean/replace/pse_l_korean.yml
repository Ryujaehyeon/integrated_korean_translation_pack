 BYPASS_PSE_WORMHOLE:0 "$PSE_WORMHOLE$"
 PSE_WORMHOLE:0 "사이오닉 균열"
 PSE_WORMHOLE_DESC:0 "이 성계에 §Y$PSE_WORMHOLE$§!이 존재합니다."
 PSE_WORMHOLE_CANNOT_USE:0 "§Y[from.GetName]§!의 사이오닉 장 때문에 §Y$PSE_WORMHOLE$§!에 접근하지 못했습니다."
 pse_wormhole_megastructure:0 "사이오닉 균열"
 pse_wormhole_megastructure_DESC:0 "사이오닉 장이 강하게 몰아쳐 우주의 차원을 찢어버렸습니다. 모든 적대적 존재의 접근을 거부하면서, 함대가 이곳 저곳으로 빠르게 이동할 수 있게 되었습니다."
 pse_power_botton_galaxy_spacefaring_title:0 "§H분노의 존재§!"
 pse_power_botton_galaxy_spacefaring_desc:0 "성계 주변에 적대적이고 통제할 수 없는 장막의 존재를 불러옵니다. 굶주림에 미쳐버린 장막의 존재는 눈에 보이는 모든 것을 공격할 것입니다.\n\n$pse_power_botton_galaxy_spacefaring_tooltip$\n$pse_power_botton_galaxy_spacefaring_tooltip2$\n$pse_power_botton_galaxy_spacefaring_tooltip3$\n\n$pse_power_botton_galaxy_spacefaring_tooltip_end$\n$pse_power_botton_galaxy_spacefaring_cooldown$"
 pse_power_botton_galaxy_spacefaring_tooltip:0 "$pse_power_botton_galaxy_storm_tooltip$"
 pse_power_botton_galaxy_spacefaring_tooltip2:0 "성계를 가로지르며 보이는 모든 것을 공격하는 장막의 생명체를 소환합니다."
 pse_power_botton_galaxy_spacefaring_tooltip3:0 "은하 전체의 발달 수준이 장막의 생명체의 수를 결정합니다."
 pse_power_botton_galaxy_spacefaring_tooltip_end:0 "$pse_power_botton_base_cost_text$§H190§!"
 pse_power_botton_galaxy_spacefaring_cooldown:0 "$pse_power_botton_cooldown_7200$"
 pse_power_botton_galaxy_spacefaring_cannot_use:0 "§R£trigger_no£ 이 우주엔 이미 장막의 분노가 소환되었습니다.§!"
 pse_power_botton_galaxy_spacefaring_cooldown_over:0 "$pse_power_botton_cooldown_over$$pse_power_botton_galaxy_spacefaring_title$"
 pse_power_botton_galaxy_cause_title:0 "§H우주적 저주§!"
 pse_power_botton_galaxy_cause_desc:0 "잔인한 장막의 영혼을 은하로 끌어들이고 그것의 저주를 퍼트립니다. 우리를 제외한 모든 제국이 저주의 영향을 받을 것입니다.\n\n$pse_power_botton_galaxy_cause_tooltip$\n$pse_power_botton_galaxy_cause_tooltip2$\n$pse_power_botton_galaxy_cause_tooltip3$\n\n$pse_power_botton_galaxy_cause_tooltip_end$\n$pse_power_botton_galaxy_cause_cooldown$"
 pse_power_botton_galaxy_cause_tooltip:0 "$pse_power_botton_galaxy_storm_tooltip$"
 pse_power_botton_galaxy_cause_tooltip2:0 "무작위 §Y$shroud_neg_happiness$§! 효과가 모든 문명에 적용됩니다."
 pse_power_botton_galaxy_cause_tooltip3:0 "우리 제국엔 영향을 미치지 않습니다."
 pse_power_botton_galaxy_cause_tooltip_end:0 "$pse_power_botton_base_cost_text$§H130§!"
 pse_power_botton_galaxy_cause_cooldown:0 "$pse_power_botton_cooldown_7200$"
 pse_power_botton_galaxy_cause_cooldown_over:0 "$pse_power_botton_cooldown_over$$pse_power_botton_galaxy_cause_title$"
 pse_power_botton_chosen_worship_title:0 "§H매력§!"
 pse_power_botton_chosen_worship_desc:0 "신앙의 본질은 [root.Ruler.GetName] [root.Ruler.GetHerHim]셀[root.Ruler.GetFVes]이며, [root.Ruler.GetHerHis] 정령의 의지가 우리의 이념을 결정합니다.\n\n$pse_power_botton_chosen_worship_tooltip$\n$pse_power_botton_chosen_worship_tooltip2$\n$pse_power_botton_chosen_worship_tooltip3$\n\n$pse_power_botton_chosen_worship_tooltip_end$\n$pse_power_botton_chosen_worship_cooldown$"
 pse_power_botton_chosen_worship_tooltip:0 "$pse_power_botton_leader_tech_tooltip$"
 pse_power_botton_chosen_worship_tooltip2:0 "우리 £pops£ §YPops§! 중 하나의 윤리를 즉시 다른 윤리로 전환하도록 선택합니다."
 pse_power_botton_chosen_worship_tooltip3:0 "£pops£ §YPops§! 신념이 변경된 경우 §G+25%§! §Y$MOD_POP_HAPPINESS$§! 를 §Y10§! 년 동안 받습니다."
 pse_power_botton_chosen_worship_tooltip_end:0 "$pse_power_botton_base_cost_text$§H120§!"
 pse_power_botton_chosen_worship_cooldown:0 "$pse_power_botton_cooldown_3600$"
 pse_power_botton_chosen_worship_cooldown_over:0 "$pse_power_botton_cooldown_over$$pse_power_botton_chosen_worship_title$"
 pse_power_botton_chosen_twist_title:0 "§HMindtwists§!"
 pse_power_botton_chosen_twist_desc:0 "우리는 우리의 사이오닉 에너지를 사용하여 [root.Ruler.GetTitle]의 자력을 강화할 수 있습니다 - 이를 통해 우리의 [root.pse_get_god_gender]가 [root.Ruler.GetHerHim]의 반대자들의 마음을 마음대로 비틀 수 있으며, 우리 앞에 서는 자들은 [root.Ruler.GetHerHim]의 분노를 맛보게 될 것입니다.\n\n$pse_power_botton_chosen_twist_tooltip$\n$pse_power_botton_chosen_twist_tooltip2$\n$pse_power_botton_chosen_twist_tooltip3$\n\n$pse_power_botton_chosen_twist_tooltip_end$\n$pse_power_botton_chosen_twist_cooldown$"
 pse_power_botton_chosen_twist_tooltip:0 "§E긴장한 이웃에게 미치는 영향:§!"
 pse_power_botton_chosen_twist_tooltip2:0 "각 £pops£ §Y팝§!은 §Y50%§! 확률로 즉시 우리의 윤리에 맞춰 전환됩니다."
 pse_power_botton_chosen_twist_tooltip3:0 "£pops£ §YPops§!는 §Y5§!년 동안 부정적인 수정자를 가질 확률이 있습니다."
 pse_power_botton_chosen_twist_tooltip_end:0 "$pse_power_botton_base_cost_text$§H215§!"
 pse_power_botton_chosen_twist_cooldown:0 "$pse_power_botton_cooldown_7200$"
 pse_power_botton_chosen_twist_effect_over:0 "$pse_power_botton_chosen_twist_title$의 사이오닉 파워 효과가 만료되었습니다."
 pse_power_botton_chosen_twist_cooldown_over:0 "$pse_power_botton_cooldown_over$$pse_power_botton_chosen_twist_title$"
 pse_power_botton_chosen_speed_title:0 "§H차원 여행§!"
 pse_power_botton_chosen_speed_desc:0 "시공간 연속성을 왜곡하면 우리의 함대가 다음 성계로 '뛰어넘을' 수 있을 것입니다.\n\n$pse_power_botton_chosen_speed_tooltip$\n$pse_power_botton_chosen_speed_tooltip2$\n$pse_power_botton_chosen_speed_tooltip3$\n\n$pse_power_botton_chosen_speed_tooltip_end$\n$pse_power_botton_chosen_speed_cooldown$"
 pse_power_botton_chosen_speed_tooltip:0 "$pse_power_botton_combat_ship_tooltip$"
 pse_power_botton_chosen_speed_tooltip2:0 "다른 성계로 즉시 이동할 수 있습니다. 전투 중엔 비활성화됩니다."
 pse_power_botton_chosen_speed_tooltip3:0 "§Y12§!개월 동안, §Y30§!일마다 모든 함선에 적용됩니다 ."
 pse_power_botton_chosen_speed_tooltip_end:0 "$pse_power_botton_base_cost_text$§H280§!"
