 pse_power_botton_chosen_speed_effect_over:0 "$pse_power_botton_chosen_speed_title$의 사이오닉 파워 효과가 만료되었습니다."
 pse_power_botton_chosen_speed_cooldown_over:0 "$pse_power_botton_cooldown_over$$pse_power_botton_chosen_speed_title$"
 pse_power_botton_chosen_shroud_title:0 "§H배회하는 장막§!"
 pse_power_botton_chosen_shroud_desc:0 "장막은 [Root.Ruler.GetName]의 등장 전까진 예측할 수 없는 영역이었습니다. 우리의 [Root.GetRulerTitle]이(가) 말을 하자, 장막은 우리의 부름에 응했습니다.\n\n$pse_power_botton_chosen_shroud_tooltip$\n$pse_power_botton_chosen_shroud_tooltip2$\n$pse_power_botton_chosen_shroud_tooltip3$\n\n$pse_power_botton_chosen_shroud_tooltip_end$\n$pse_power_botton_chosen_shroud_cooldown$"
 pse_power_botton_chosen_shroud_tooltip:0 "$pse_power_botton_leader_tech_tooltip$"
 pse_power_botton_chosen_shroud_tooltip2:0 "장막에 들어가 우리가 원하는 것을 얻을 수 있습니다."
 pse_power_botton_chosen_shroud_tooltip3:0 "§Y$shroud_cooldown$§!이 발생하지 않습니다."
 pse_power_botton_chosen_shroud_tooltip_end:0 "$pse_power_botton_base_cost_text$§H60§!"
 pse_power_botton_chosen_shroud_cooldown:0 "$pse_power_botton_cooldown_1800$"
 pse_power_botton_chosen_shroud_upset:0 "§R£trigger_no£ §Y[Ruler.GetName]§!이(가) 우리의 재촉에 분노했으며, 한동안은 도와주지 않을 것입니다.§!"
 pse_power_botton_chosen_shroud_cooldown_over:0 "$pse_power_botton_cooldown_over$$pse_power_botton_chosen_shroud_title$"
 pse_power_botton_chosen_backstab_title:0 "§H변절자의 생각§!"
 pse_power_botton_chosen_backstab_desc:0 "땅의 아래에, 가장 평온한 종족 조차도 분노를 가지고 있습니다. 그 분노를 끓어오르게 하여, 당연한 결과를 이끌어냅니다.\n\n$pse_power_botton_chosen_backstab_tooltip$\n$pse_power_botton_chosen_backstab_tooltip2$\n$pse_power_botton_chosen_backstab_tooltip3$\n\n$pse_power_botton_chosen_backstab_tooltip_end$\n$pse_power_botton_chosen_backstab_cooldown$"
 pse_power_botton_chosen_backstab_tooltip:0 "§E긴장된 제국에 미치는 영향:§!"
 pse_power_botton_chosen_backstab_tooltip2:0 "안정성이 낮은 각 행성은 몇 년 내에 반란을 일으킬 가능성이 있습니다."
 pse_power_botton_chosen_backstab_tooltip3:0 "이 힘은 기본 국가에서만 작동합니다."
 pse_power_botton_chosen_backstab_tooltip_end:0 "$pse_power_botton_base_cost_text$§H155§!"
 pse_power_botton_chosen_backstab_cooldown:0 "$pse_power_botton_cooldown_3600$"
 pse_power_botton_chosen_backstab_effect_unlikely:0 "§R£trigger_no£ 유효한 국가가 없거나 현재 반란의 가능성이 너무 낮습니다.§!"
 pse_power_botton_chosen_backstab_effect_over:0 "$pse_power_botton_chosen_backstab_title$의 사이오닉 파워 효과가 만료되었습니다."
 pse_power_botton_chosen_backstab_cooldown_over:0 "$pse_power_botton_cooldown_over$$pse_power_botton_chosen_backstab_title$"
 pse_power_botton_chosen_bomb_title:0 "§H영혼 불꽃§!"
 pse_power_botton_chosen_bomb_desc:0 "작지만 극도로 압축된 단일 사이오닉 존재인 영혼 불꽃을 불러냅니다. 파괴된다면, 압축된 힘을 해방하여 성계 내의 모든 함선을 제거할 것입니다.\n\n$pse_power_botton_chosen_bomb_tooltip$\n$pse_power_botton_chosen_bomb_tooltip2$\n$pse_power_botton_chosen_bomb_tooltip3$\n\n$pse_power_botton_chosen_bomb_tooltip_end$\n$pse_power_botton_chosen_bomb_cooldown$"
 pse_power_botton_chosen_bomb_tooltip:0 "§E다음 효과를 가진 아바타 소환:§!"
 pse_power_botton_chosen_bomb_tooltip2:0 "그 존재가 파괴되면, 성계의 모든 함대를 파괴할 것입니다."
 pse_power_botton_chosen_bomb_tooltip3:0 "성계 내의 행성은 황폐화되고 개척할 수 없는 행성에는 £sr_zro£ §Y$sr_zro$§! 매장지가 생길 수도 있습니다."
 pse_power_botton_chosen_bomb_tooltip_end:0 "$pse_power_botton_base_cost_text$§H300§!"
 pse_power_botton_chosen_bomb_cooldown:0 "$pse_power_botton_cooldown_7200$"
 pse_power_botton_chosen_bomb_cooldown_over:0 "$pse_power_botton_cooldown_over$$pse_power_botton_chosen_bomb_title$"
 pse_power_botton_chosen_bomb_can_only_have_one:0 "§R£trigger_no£ 강력한 에너지가 필요하기 때문에, 한 번에 하나의 §Y영혼 불꽃§!만을 다룰 수 있습니다.§!"
 pse_power_botton_covenant_composer_life_title:0 "§H길어진 삶§!"
 pse_power_botton_covenant_composer_life_desc:0 "장수하는 것 보다 더 좋은 것은, 더 오래 사는 것 말고는 없습니다.\n\n$pse_power_botton_covenant_composer_life_tooltip$\n$pse_power_botton_covenant_composer_life_tooltip2$\n$pse_power_botton_covenant_composer_life_tooltip3$\n\n$pse_power_botton_covenant_composer_life_tooltip_end$\n$pse_power_botton_covenant_composer_life_cooldown$"
 pse_power_botton_covenant_composer_life_tooltip:0 "§E§Y$leader_trait_psionic$§! 특성을 가진 지도자에게 적용되는 효과:§!"
 pse_power_botton_covenant_composer_life_tooltip2:0 "추가 자원 생산으로 수명을 추가로 늘립니다."
 pse_power_botton_covenant_composer_life_tooltip3:0 "의도하지 않은 효과가 있을 수 있습니다."
 pse_power_botton_covenant_composer_life_tooltip_end:0 "$pse_power_botton_base_cost_text$§H50§!"
 pse_power_botton_covenant_composer_life_cooldown:0 "$pse_power_botton_cooldown_1080$"
 pse_power_botton_covenant_composer_life_cooldown_over:0 "$pse_power_botton_cooldown_over$$pse_power_botton_covenant_composer_life_title$"
 pse_power_botton_covenant_composer_pop_title:0 "§H인구 성장§!"
 pse_power_botton_covenant_composer_pop_desc:0 "운명의 작곡가로부터 얻은 힘의 일부를 타고난 자들에게 전달하고 엄청난 인구 성장을 이루어냅니다. 마치 설명할 수 없는 마법처럼 말입니다.\n\n$pse_power_botton_covenant_composer_pop_tooltip$\n$pse_power_botton_covenant_composer_pop_tooltip2$\n$pse_power_botton_covenant_composer_pop_tooltip3$\n\n$pse_power_botton_covenant_composer_pop_tooltip_end$\n$pse_power_botton_covenant_composer_pop_cooldown$"
 pse_power_botton_covenant_composer_pop_tooltip:0 "$pse_power_botton_leader_tech_tooltip$"
 pse_power_botton_covenant_composer_pop_tooltip2:0 "english_value: 사이오닉 인구 수를 £pops£ §YPops§!의 §G+10%§!만큼 증가시킵니다."
 pse_power_botton_covenant_composer_pop_tooltip3:0 "최대 §G5000§! £pops£ §YPops§!가 이 진행에서 나타날 수 있습니다. 불임 §YPops§!는 제외됩니다."
 pse_power_botton_covenant_composer_pop_tooltip_end:0 "$pse_power_botton_base_cost_text$§H200§!"
