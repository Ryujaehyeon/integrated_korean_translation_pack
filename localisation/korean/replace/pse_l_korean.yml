 pse_power_botton_leader_remove_negative_trait_title:0 "§H일치된 생각§!"
 pse_power_botton_leader_remove_negative_trait_desc:0 "우리의 지도자는 반사회적 특성으로 고통받기엔 너무나 소중합니다. 함께라면 우리는 긍정적인 생각을 할 수 있고, 지도자를 더 나은 방향으로 이끌어갈 수 있습니다.\n\n$pse_power_botton_leader_remove_negative_trait_tooltip$\n$pse_power_botton_leader_remove_negative_trait_tooltip2$\n\n$pse_power_botton_leader_remove_negative_trait_tooltip_end$\n$pse_power_botton_leader_remove_negative_trait_cooldown$"
