 MOD_pse_power_galaxy_field_effect_tooltip:0 "사이오닉 중력장이 이 성계를 둘러쌌으며 성계에 진입하는 적대적 함선은 §Y30§! 일간 이동 속도가 감소합니다."
 MOD_pse_power_galaxy_field_effect:0 "중력장"
 pse_power_botton_galaxy_wormhole_title:0 "§H사이오닉 균열§!"
 pse_power_botton_galaxy_wormhole_desc:0 "우리 영토 전역에 균열을 다수 생성하고 현현시킵니다. 그렇게 함으로써, 우리는 매복을 당할 걱정 없이 먼 별들 사이를 빠르게 이동할 수 있습니다.\n\n$pse_power_botton_galaxy_wormhole_tooltip$\n$pse_power_botton_galaxy_wormhole_tooltip2$\n$pse_power_botton_galaxy_wormhole_tooltip3$\n\n$pse_power_botton_galaxy_wormhole_tooltip_end$\n$pse_power_botton_galaxy_wormhole_cooldown$"
 pse_power_botton_galaxy_wormhole_tooltip:0 "$pse_power_botton_galaxy_storm_tooltip$"
 pse_power_botton_galaxy_wormhole_tooltip2:0 "우리 시스템의 스타베이스에서 §YPsionic Rifts§!를 §Y10§!년 동안 소환합니다."
 pse_power_botton_galaxy_wormhole_tooltip3:0 "§Y$PSE_WORMHOLE$§!은 $GATEWAY_GALACTIC$처럼 작동하며 비적대적 함선이 우리 성계로 쉽게 이동할 수 있게 합니다."
