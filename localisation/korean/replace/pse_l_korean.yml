 pse_chosen_covenant:0 "§HChampion§!"
 pse_chosen_covenant_desc:0 "$pse_chosen$\n§L[Ruler.GetName]는 $leader_trait_chosen$ - 계약의 힘으로 그들의 챔피언으로 축복받았습니다.§!\n\n§E제국에 대한 효과:§!\n$pse_power_increase_month$: §G+2§!\n$pse_power_bar_cap_name$: §G+150§!"
