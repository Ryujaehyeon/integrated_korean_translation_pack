 pse.139.title:0 "미라지 종료"
 pse.139.desc:0 "§YP사이오닉 미라지§!의 효과가 종료되었으며 몇 달 내에 사라질 것입니다. 우리의 채널 자원이 나타나기를 원한다면, 또 다른 발현이 필요합니다."
 pse.139.message_pre:0 "사이오닉 지도자들이 환영을 일으킬 것입니다."
 pse.139.message_end:0 "다음 발현부터입니다.\n\n효과가 지속되는 동안, 이는 각 발현마다 변경됩니다."
 pse.137.message:0 "$pse.139.message_pre$ [root.pse_mirage_get_resource_type] $pse.139.message_end$"
 pse.145.title:0 "$utopia.3000.name$"
 pse.145.desc1:0 "모든 길이 우리의 목적지로 이어지나, 우리조차도 그 목적지를 아직 알지 못합니다. 모든 것이 이곳에서 시작하고 끝이 납니다."
 pse.145.desc2:0 "우리가 현실 세계에서 배운 모든 것은 이 초현실적인 영역에서 상황을 이해하는 데 도움이 되지 않습니다... 여기에는 우리의 행동을 지배하고, 우리가 다른 이들에게 했던 것처럼 우리의 잠재의식을 전복시키는 악의적인 에너지가 존재합니다. 지금도 그것은 우리를 지켜보고 있으며, 다음 행동을 계획하고 있습니다.\n\n[Ruler.GetName]은([Ruler.GetSXX]) 약간 미소를 지으며 [Ruler.GetSheHe]는([Ruler.GetSXX]) 다음에 어떤 일이 일어날지 알고 있는 듯합니다."
 pse.145.desc3:0 "스텔라리스 사이오닉 제국, 25배 위기, 후반 연도 2250년, 스피드런..."
 pse.145.desc4:0 "이런 분위기는 [Ruler.GetName]에겐 익숙합니다. 언제나 즐겼던 것 처럼."
 pse.145.desc5:0 "[Ruler.GetName]이 끝없는 길의 중심지를 다시 방문하자, 어디선가 호출하는 소리가 들립니다.\n\n그 목소리는 마치 [Ruler.GetName] [Ruler.GetHimHer] 자신이 [Ruler.GetFVes]인 것처럼 들리며, 아마도 다른 시간과 공간에서 온 것일지도 모릅니다."
 pse.145.desc6:0 "이곳에서 시간은 존재하기도 하지만, 존재하지 않기도 하기에 의미가 없습니다."
 pse.145.desc7:0 "역설에 숙달한 자가 이 장소를 받아들인다면, 만족하지 않을까요? 모든 것이 끝났을 때 우리의 컴퓨터 뱅크에 다운로드받아야할 것이 남아있을까요? 아래의 모든 세상에서 열심히 일하고 있는 우리의 중앙 기록 관리 드론의 부담을 덜 수 있을까요?\n\n잘 모르겠습니다. 이는 더 위대한 정신이 생각해야할 일입니다."
 pse.145.desc8:0 "이 장소가 가지고 있는 무작위성이 고쳐지기나 할까요? 아니면 보다 합당한 힘이 이 광기의 공간에 질서를 가져다 주어야 할까요?"
 pse.145.desc9:0 "사이오닉을 위한 봄은 오는가?"
 pse.145.desc10:0 "우리의 위대한 꿈이 당신의 악몽이 될 수 있을까요?"
 pse.145.desc11:0 "우리가 3차원 이상을 가지고 있었다면 세상이 더 나아지지 않았을까요? 더 높은 곳, 어쩌면 4차원 혹은 5차원을 가지고 있는 곳을 추구해야합니다."
 pse.145.desc12:0 "행성, 심지어는 우주 전체를 만들고 파괴할 수 있는 유물이 있다고 합니다. 장막의 존재들초자 이를 막을 수는 없습니다. 그 유물은 버튼처럼 생겼고, 구부러진 행성의 물결 표시가 있으며 한 개의 수직선으로 깨져있습니다.\n\n§B\"솔직히 말해서, 해롭고 평범해 보입니다.\"§!"
 pse.145.desc13:0 "1일 1 지로콜라(TM)는 행운을 가져다 줄 것입니다"
 pse.145.desc14:0 "§B\"이번엔 어디로 가려고?\"§!"
 pse.145.desc15:0 "[Ruler.GetName]이(가) 길을 압니다."
 pse.145.desc16:0 "§B\"이번 게임에선 승리가 가까워 오는 것 같기도 하고.\"§!"
 pse.145.desc17:0 "§B\"더 이상 목적없이 안개로 가려진 길에 들어서서 수년을 기다릴 필요는 없어. 앞으로는 언제든지 원할때면 갈망할 수 있어.\"§!"
 pse.145.desc18:0 "§B\"난 널 위해 이걸 하는거야.\"§!"
 pse.145.desc19:0 "시간을 갖고, 주변을 둘러보며, 우리가 뭘 원하는지 물어보십시오."
 pse.145.desc20:0 "§B\"이곳에서 우리의 운명을 결정합니다.\"§!"
 pse.145.desc21:0 "[Ruler.GetName] [Ruler.GetIsAre] 걱정하지 않으면서 우리가 다음으로 나아갈 길을 찾고 있습니다. [Ruler.GetHeShe] [Ruler.GetHasHave] 그것들을 수없이 지나쳤기 때문입니다."
 pse.145.desc22:0 "§B\"지름길로 가볍게 산책하는 정도일 뿐이야.\"§!"
 pse.145.desc23:0 "§B\"읽을 순 있는거 맞지?\"§!"
 pse.145.desc24:0 "§B"메타게이머라면, 절차를 잘 알고 있을 것입니다."§!"
 pse.145.desc25:0 "§P\"정신의 불꽃을 사용하지 마세요. 제 §YOversized-Ships-Featuring-Planets-With-Moons-Attached(TM)§!가 모두 폭발해버립니다. 이런 미미한 존재는 커뮤니티에 있을 이유가 없습니다!\"§!\n\n게임을 과도하게 수정한 어떤 안개 존재가 CPU가 멈추기 전에 이 게임을 수정했다고 말했습니다.\" #AI가 멍청한 이유에 대해 Paradox에 불만을 제기해 주세요..."
 pse.145.desc26:0 "§B"리더-원 국가를 어디에서 찾을 수 있습니까? 여기에는 하나도 보이지 않습니다."§!"
 pse.145.0:0 "§B알려지지 않은 길§!"
 pse.145.0.tooltip:0 "§B이 길은 여기서 벗어난 어디로든 이어지며, 그 끝은 우리에게 이익이 될 것입니다.§!"
 pse.145.1:0 "§B비밀의 길§!"
 pse.145.1.tooltip:0 "우리의 시야가 은하계를 넘어 하나의 고대 제국으로 내려가는 길입니다."
 pse.145.shroud_dlc_seek_contact_patron:0 "§M후원자의 길§!"
 pse.145.shroud_dlc_seek_contact_patron.tooltip:0 "§B장막은 고위 존재들이 사는 장소입니다.§!"
 pse.145.a:0 "§B반짝이는 별의 길§!"
 pse.145.a.tooltip:0 "§B이 길에는 혜성처럼 생긴 특이한 배가 있다고 합니다. 조사해볼만 합니다.§!"
 pse.145.b:0 "§B낮은 곳의 길§!"
 pse.145.b.tooltip:0 "§B강력한 사이오닉 에너지의 보호를 받는 분노한 존재가 이곳에 도사리고 있습니다.§!"
 pse.145.c:0 "§B예지의 길§!"
 pse.145.c.tooltip:0 "§B많은 가능성 중 오직 하나만이 진실입니다.§!"
 pse.145.d:0 "§Y속삭임의 길§!"
 pse.145.d.tooltip:0 "§B광기의 지식이 탐나나요?§!"
 pse.145.e:0 "§Y작곡가의 길§!"
 pse.145.e.tooltip:0 "§B작곡가는 생물체를 좋아합니다. 기계를 재배치하는 것은 훨씬 더 어렵습니다 - 쌍둥이와는 다르게.§!"
 pse.145.f:0 "§Y굶주림의 길§!"
 pse.145.f.tooltip:0 "§B원하는 모든 것을 먹겠지만, 여전히 배가 고플 것입니다.§!"
 pse.145.g:0 "§Y하수인의 길§!"
 pse.145.g.tooltip:0 "§B하수인은 여러분이 더 많은 것을 갈망할 수 있음을, 더 많은 것을 갈망해야 함을 알고 있습니다.§!"
 pse.145.zro_launcher:0 "§B즈로의 길§!"
 pse.145.zro_launcher.tooltip:0 "§B즈로콜라의 힘이 발사할 준비가 되어 있습니다.§!"
 pse.145.psionic_lightning:0 "§B번개의 길§!"
 pse.145.psionic_lightning.tooltip:0 "§B조명 쇼입니다.§!"
 pse.145.psionic_disruptor:0 "§B파괴자의 길§!"
 pse.145.psionic_disruptor.tooltip:0 "§B모든 것을 방해할 수 있는 그러한 패턴의 빛입니다.§!"
 pse.145.psionic_bombers:0 "§B폭격기 경로§!"
 pse.145.psionic_bombers.tooltip:0 "§B폭격기의 포화를 발사합니다.§!"
 pse.145.h:0 "§R끝의 길§!"
 pse.145.h.tooltip:0 "§B마지막 휴식입니다. 정말로.§!"
 pse.145.nope:0 "신경쓰지마."
 pse.145.nope.tooltip:0 "그냥 장막을 나가십시오. 우리 뒤에 가장 강력한 존재 중 하나를 두는 것은 재미있지만 §Y[Ruler.GetName]§!는 그걸 재미있게 생각하지 않을지도 모릅니다..."
 pse.147.title:0 "남아있기를 선택한 자"
 pse.147.desc:0 "우리는 §Y[Ruler.GetName]§!를 당연하게 여겼습니다. 우리는 도움을 요청했고, 선택받은 사회를 위해, 우리의 선택받은 사회는 어디에 두었나요? 그늘 속에 있습니다.\n\n[Ruler.GetHeSheCap] [Ruler.GetIsAre] 우리의 숨바꼭질 놀이에 재미가 없습니다. 우리는 [Ruler.GetHeShe]가 이 모든 시간 동안 어디에 있다고 생각했나요? 우리는 [Ruler.GetHerHim]를 되찾으려는 시도를 했나요?\n\n이제 [Ruler.GetHeShe][Ruler.GetSXX] 우리가 요청하는 어떤 사이오닉 작업도 거부하고 있습니다 - 간청해도 소용이 없습니다. 수년간 그늘 속에 갇혀 있었던 후에 §Y[Root.GetRulerTitle]§!가 경험한 분노가 시간이 지나면서 씻겨 나가지 않는 한, §Y텔레파시 능력자 집단§!은 몇 년 동안 스스로 해결해야 할 것입니다."
 pse.147.a:0 "§B그렇게 할 일이 없나?§!"
 pse.147.tooltip:0 "§Y[Ruler.GetName]§! 우리에게 어떤 $pse_power_text_icon$도 도와주기를 거부합니다. 왜 [Ruler.GetIsAre] [Ruler.GetHeShe] 그렇게 화가 난 걸까요? 우리가 [Root.GetRulerTitle]를 Shroud에서 [Ruler.GetHerHim]sel[Ruler.GetFVes] 혼자 두고 간 것이 우리의 잘못은 아닌데... 맞죠?\n\n우리가 위험한 은혜를 요청하고 거절당한 것도 아닌데 말입니다."
 pse.148.desc:0 "미지의 길에 관해서는, 그것은..."
 pse.148.desc2:0 "그 길의 끝에는 무엇이 있을까요?"
 pse.148.desc3:0 "§B"현재 가장 기대하는 것은 무엇입니까?"§!"
 pse.148.a:0 "§BHappiness§!"
 pse.148.b:0 "§BLogistics§!"
 pse.148.c:0 "§BResearch§!"
 pse.148.d:0 "§BShield§!"
 pse.148.e:0 "§B무기 피해§!"
 pse.148.f:0 "§B사격 속도§!"
 pse.148.g:0 "§BEthics§!"
 pse.148.h:0 "§BInfluence§!"
 pse.148.i:0 "§BUnity§!"
 pse.148.j:0 "§BEvasion§!"
 pse.148.k:0 "§BRepair§!"
 pse.148.l:0 "§BLife§!"
 pse.148.m:0 "§BSpeed§!"
 pse.148.n:0 "§BMorale§!"
 pse.148.o:0 "§BSensor§!"
 pse.148.nope:0 "돌아가기."
 pse.148.nope.tooltip:0 "§B결정을 내리세요.§!"
 pse.160.title:0 "영혼 불꽃"
 pse.160.desc:0 "감히 상상할 수 조차 없는 강렬한 사이오닉 에너지가 §Y[Root.GetRulerTitle]§!에게서 스며나와 초고밀도 사이오닉 특이점으로 압축되었습니다.\n\n우연히라도 이 사이오닉 폭탄이 터진다면 해당 성계의 모든 것이 사이오닉 에너지에 휩쓸려 파괴될 것입니다. 예측하기론 폭발 후 몇년간 사이오닉 구름과 번개가 해당 성계를 뒤덮을 것이며, 감지기로도 해당 성계의 피해를 측정할 수 없을 것입니다."
 pse.160.a:0 "조심히 다뤄라."
 pse.160.b:0 "위기를 끝내기에 좋은 선택지로군."
 pse.160.meme:0 "폭탄이 설치되었다!"
 pse.160.tooltip:0 "§R경고 : 영혼 불꽃이 폭파시키면 해당 성계에 엄청난 폭발을 일으킬 것입니다.§!"
 pse.162.bomb_exploded:0 "영혼 불꽃이 $pse_system|H$ 성계를 아수라장으로 만들었습니다."
 pse.162.bomb_exploded2:0 "$pse_country|H$의 영혼 불꽃이 $pse_system|H$ 성계를 아수라장으로 만들었습니다."
 pse.163.title:0 "$pse.160.title$: §H폭파됨§!"
 pse.163.desc:0 "우리의 영혼 불꽃이 §H[event_target:pse_system.GetName]§! 성계에서 폭발했습니다! 엄청난 양의 사이오닉 에너지가 성계 전체를 휩쓸고 지나가며, 엄청난 사태를 불러일으켰습니다.\n\n폭발에서 살아남은 식민지의 대부분은 파괴되었으며, 복구하는데 수십년 이상이 걸릴 것입니다.."
 pse.163.desc_has_tech:0 "우리의 영혼 불꽃이 §H[event_target:pse_system.GetName]§! 성계에서 폭발했습니다! 엄청난 양의 사이오닉 에너지가 성계 전체를 휩쓸고 지나가며, 모든 종류의 사이오닉 주파수를 교란시켰습니다.\n\n영혼 불꽃이 인식하지 못한 모든 식민지가 파괴되었으며, 복구하는데 수십년 이상이 걸릴 것입니다."
 pse.163.a:0 "장막이 저들의 영혼에 자비를 베풀길."
 pse.163.b:0 "큰 힘에는 큰 책임이 따르는 법이다."
 pse.163.meme:0 "테러리스트 승리!"
 pse.163.xeno:0 "역병을 쓸어버릴 좋은 방법이군."
 pse.163.tooltip:0 "£sr_zro£ §H$sr_zro$§! 매장지가 §H[event_target:pse_system.GetName]§! 성계의 미개척지에 나타납니다."
 pse.175.title:0 "저편의 함선"
 pse.175.desc:0 "배에 기쁜 미소를 지으며 저 너머에서 온 함선들이 도착했습니다."
 pse.175.desc2:0 "여분의 함선은 어떻게 처리할까요? 이제 혼자서는 salvage할 방법이 없습니다."
 pse.175.desc3:0 "함대가 우리의 §Y$COMMAND_LIMIT$§!보다 더 많은 경우, 해체하거나 다른 조치를 취하는 것이 최선입니다."
 pse.175.desc4:0 "죽음의 스택을 어떻게 구축하나요? 첫 번째 단계, 함대를 소환합니다. 두 번째 단계, 이익을 얻습니다."
 pse.175.desc5:0 "단점 없이 무료로 제공되는 함선, 불만 없음."
 pse.175.tooltip:0 "우리의 설계로 제작된 함대가 §Y[Root.Capital.GetName]§! 항성계에 나타납니다."
 pse.180.title:0 "생명 연장"
 pse.180.desc:0 "기적이라고 할 수 있습니다. §H[pse_leader.GetTitle] [pse_leader.GetName]§! 이제 [pse_leader.GetHasHave] 단점 없이 더 건강한 생활 방식을 누리고 있어 다른 사람들의 부러움을 사고 있습니다."
 pse.180.desc2:0 "확장된 생명의 힘은 §H[pse_leader.GetTitle] [pse_leader.GetName]§!에게는 큰 영향을 미치지 않는 것 같으며, [pse_leader.GetHerHim]의 사이오닉 에너지가 마법 같은 발전을 방해했는지 여부는 알 수 없습니다.\n\n그럼에도 불구하고, [pse_leader.GetName] [pse_leader.GetDoesDo] 장수 지도자가 됩니다."
 pse.180.desc3:0 "검은 테의 얀경을 쓴 위대하고 현명한 노인이 §H[pse_leader.GetTitle] [pse_leader.GetName]§!의 눈 앞에 나타나, [pse_leader.GetHerHim]에게 1초의 삶을 부여했습니다."
 pse.180.desc4:0 "모두가 더 나은 삶을 살게 될 것이다."
 pse.181.desc:0 "§H[pse_leader.GetTitle] [pse_leader.GetName]§! [pse_leader.GetDoesDo] 장수 지도자가 되었지만, 더 정확한 표현은 그가 젊은 시절로 되돌아갔다는 것입니다.\n\n지금까지 §H[pse_leader.GetName]§!에게서 심각한 부작용의 징후는 발견되지 않았지만, [pse_leader.GetTitle]의 경험은 [pse_leader.GetHerHim]에게서 사라지는 것 같고, [pse_leader.GetSheHe]는 다시 운동을 해야 그 경험을 되찾을 수 있을 것입니다."
 pse.181.a:0 "좋은...건가?"
 pse.181.a.tooltip:0 "§H[pse_leader.GetName]§!의 나이가 거꾸로 돌아가며, [pse_leader.GetHerHis]의 레벨이 §Y1§!로 설정됩니다."
 pse.185.title:0 "인구 폭발"
 pse.185.desc:0 "소식에 따르면 §H[root.GetSpeciesName]§!의 모든 가정에서 열둘 이상의 아이가 동시에 태어났습니다.\n\n현재까지 알려진 부작용은 없습니다."
 pse.185.desc2:0 "과학자들이 설명할 수 없는 신비로운 사건 10가지 - 갑작스러운 탄생이 그 중 하나입니다."
 pse.185.desc3:0 "평행우주에선 인구가 곧 국력입니다."
 pse.185.desc4:0 "§Y$CARRY_CAP$§!이나 §Y$FE_LOGISTIC_CEILING$§!에 방해받지 않습니다."
 pse.185.desc5:0 "이 출산이 프린터로 인쇄하는 것처럼 작용한다면, 우리는 문제가 있을 수 있습니다."
 pse.185.desc6:0 "이제, §H[root.Species.GetName]§! 하루에 10억 [root.Species.GetSpawnNamePlural]이 태어나는 모습을 상상해 보십시오..."
 pse.185.tooltip:0 "최대 §Y[root.pse_population]§!만큼의 £pops£ POP이 며칠 내로 생겨날 것입니다."
 pse.200.title:0 "경제 성장"
 pse.200.desc1:0 "창고에 식량이 어마무시한 속도로 쌓이고 있습니다."
 pse.200.desc2:0 "대부분의 작물에는 약간의 미네랄이 포함되어 있습니다만, 이젠 '풍부한 미네랄'이 아니라 광물에 가까운 수준입니다."
 pse.200.desc3:0 "가장 값진 작물만이 상품화됩니다. 부디 구석에서 썩어가지만 않기를."
 pse.200.desc4:0 "광산 아래로 내려가서 광물과 광부와 광산을 찾습니다."
 pse.200.desc5:0 "광산에서 희귀한 광물을 발견하는 건 드문 일입니다. 심지어 최근에는 당장 그대로 사용해도 무방한 많은 양의 중금속이 발견되었습니다."
 pse.200.desc6:0 "태양빛이 비추는 곳 아래에서, 화려하게 빛나는 황금을 찾을 수 있으리라고 그 누가 생각할 수 있었을까요?\n\n그야말로 골드러시 그 자체입니다."
 pse.200.desc7:0 "광업이 무서운 속도로 발전하는 동안, 에너지 사업도 그에 맞춰 발전시킬 필요가 있습니다."
 pse.200.desc8:0 "얻을 수 있다면 얻는 것이 좋습니다. §H욕망의 하수인§!의 전기분해 효과를 통해 우리의 공장 중 한 곳에서 §Y$exotic_gases$§!를 만들어내기 시작했습니다."
 pse.200.desc9:0 "에너지 생산이 개선되고 안정되어, 건물과 지구에 대한 유지비를 줄여줍니다."
 pse.200.desc10:0 "정제된 금속에 대한 수요가 사상 최고치를 갱신하고 있습니다."
 pse.200.desc11:0 "§H욕망의 하수인§!의 힘으로 합금을 생산하고 남은 광석을 결정화합니다."
 pse.200.desc12:0 "광물을 합금으로 만드는 합금 주조 공장에 분명히 광물을 넣었는데, 어찌된 일인지 교활한 광물들이 교묘하게 살아남았습니다."
 pse.200.desc13:0 "낭비적인 행동이 우리의 매일매일에 깊숙히 침투해야만 합니다. 그래야 이렇게 기나긴 주문목록을 볼 수 있을테니까요."
 pse.200.desc14:0 "악명높은 '해쉬태그계산' 작업에 그래픽 장비가 소모되고 있으며, 심각한 품절 사태가 이어지고 있습니다. 이 광기넘치는 현상을 해결하기 위해 생산라인 일부를 전환해야만 합니다."
 pse.200.desc15:0 "§H욕망의 하수인§!의 힘이 민간 공장에서 매우 민감한 §Y$volatile_motes$§!을 생산할 수 있게 만들어줬습니다.\n\n거짓말같다면, 결과를 보십시오."
 pse.200.desc16:0 "§Y떡상§!입니다! 더 높이! 저 하늘 높이!"
 pse.200.desc17:0 "에너지 크레딧을 더 많은 에너지 크레딧과 교환할 수 있던 날을 기억하십니까?"
 pse.200.desc18:0 "§H[Root.GetName]§!은(는) 모든 천상의 별들이 자신만의 가치를 가지고 있다고 판단했습니다. 단지 어떤 가치를 가졌는지 알 수 없을 뿐입니다."
 pse.200.a:0 "경제가 성장하리라!"
 pse.200.meme:0 "떡상!"
 pse.205.title:0 "자원 교환"
 pse.205.desc:0 "먼저 §H욕망의 하수인§!에게 교환받길 원하는 자원을 선택하십시오."
 pse.205.trade:0 "£trade£ $trade$"
 pse.205.energy:0 "£energy£ $energy$"
 pse.205.food:0 "£food£ $food$"
 pse.205.minerals:0 "£minerals£ $minerals$"
 pse.205.alloys:0 "£alloys£ $alloys$"
 pse.205.consumer_goods:0 "£consumer_goods£ $consumer_goods$"
 pse.205.exotic_gases:0 "£exotic_gases£ $exotic_gases$"
 pse.205.rare_crystals:0 "£rare_crystals£ $rare_crystals$"
 pse.205.volatile_motes:0 "£volatile_motes£ $volatile_motes$"
 pse.205.sr_living_metal:0 "£sr_living_metal£ $sr_living_metal$"
 pse.205.sr_dark_matter:0 "£sr_dark_matter£ $sr_dark_matter$"
 pse.206.desc:0 "§H욕망의 하수인에게§! §Y[root.pse_resource_go_out_inital_number]§! §H[root.pse_205_exchange_resource_icon]§!을(를) 주고서 어떤 자원을 받길 원하십니까?"
 pse.207.desc:0 "곧이어, 우리가 원하던 대량의 자원이 나타났습니다.\n\n서로에게 좋은 거래라고 생각합니다. §H욕망의 하수인§!은 매우 기뻐하며 다음 거래를 기대하고 있습니다."
 pse.210.title:0 "다크 유레카"
 pse.210.desc:0 "이거 어떻게 켜지?"
 pse.210.desc2:0 "과학자들이 설명할 수 없는 10가지 주요 질문."
 pse.210.desc3:0 "조금은 이것, 조금은 저것. 모든 것을 잘못 배치한 부서진 언어의 조각이지만 여전히 의미를 읽을 수 있는 것은 어떨까요?"
 pse.210.desc4:0 "어떤 이들은 이것이 쓰레기라고 하지만, §Y[GetShroudPatron]§!는 그것을 보물이라고 불렀습니다."
 pse.210.desc5:0 "우리의 마음은 지금 거의 아무런 지식을 얻지 못했습니다. 아마도 좋은 일입니다."
 pse.210.desc6:0 "다음으로 해야 할 일은 채팅 상자에 §Y'marco'§!와 §Y'polo'§!를 입력하는 것입니다."
 pse.215.title:0 "공물"
 pse.215.desc:0 "모두가 지로콜라(TM)를 사랑합니다. 심지어 장막의 존재조차도 지로콜라(TM)를 공물로 요구했습니다."
 pse.215.desc2:0 "§Y[GetShroudPatron]§!는 이러한 스릴 넘치는 거래가 계속되는 한 즉시 수십 개의 ZroCola를 주문할 수 있습니다."
 pse.215.desc3:0 "우리는 우리의 미끼를 배치했습니다. 그렇게 함으로써, §Y[GetShroudPatron]§!는 그것을 처리하느라 바쁠 것입니다."
 pse.215.desc4:0 "이제 RNG 장막조차 우리에게 해를 끼칠 수 없습니다."
 pse.215.desc5:0 "우리는 어떤 사고도 발생하기를 원하지 않습니다."
 pse.215.meme:0 "그걸 받아라, 장막!"
 pse.216.title:0 "공물 만료"
 pse.216.desc:0 "우리의 사이오닉 에너지의 기여된 흐름이 §Y[GetShroudPatron]§!의 공허로 가라앉았습니다.\n\n예기치 않은 사건이 우리에게 발생하지 않도록 하려면, 우리의 텔레파시 능력자들이 §Y[GetShroudPatron]§!를 위해 또 다른 에너지를 기여해야 합니다."
 pse.220.title:0 "마음의 불협화음"
 pse.220.desc:0 "우리 사회는 현재 비이성적인 증오와 구성원 간의 불안한 수준의 불신에 직면해 있습니다. 이러한 갑작스럽고 극단적인 사고 방식의 변화는 가장 자비로운 개인조차도 무자비한 범죄자로 변모시킬 잠재력을 가지고 있습니다."
 pse.220.desc_no_psionic:0 "직접적인 증거는 부족하지만, 이 불안한 파괴 행위가 §H[pse_country.GetName]§!에서 비롯되었다는 지배적인 믿음이 있으며, 그들의 악의적이고 왜곡된 정신 능력을 통해 우리의 행성들 사이에 무정부 상태를 조장하려는 의도가 있다고 여겨집니다."
 pse.220.desc_psionic:0 "모든 가용한 증거는 이 불안한 현상이 실제로 사이오닉 힘의 결과임을 강하게 나타내며, 이 힘의 기원은 §H[pse_country.GetName]§!로 거슬러 올라갑니다. 그들의 의도는 그들의 악의적이고 교활한 힘을 사용하여 우리의 행성들 사이에 무정부 상태를 조장하는 것처럼 보입니다."
 pse.220.a:0 "어떻게 감히!"
 pse.220.tooltip:0 "§Y$casus_belli_cb_humiliation$§! §HCasus Belli§!를 §Y[pse_country.GetName]§!에 대해 §Y20§!년 동안 획득합니다."
 pse.221.desc:0 "$pse.220.desc$\n\n우리는 이 갑작스러운 불화의 원인인 힘의 본질에 대해 여전히 확신이 없으며, 이러한 불안한 부정적인 생각들이 사라지기 전에 한동안 지속될 것처럼 보입니다."
 pse.225.title:0 "사상의 부조화"
 pse.225.desc:0 "제국 내에서 사회적 파괴 행위가 증가하고 있다는 보고를 받고 있습니다. 이러한 위협적인 생각을 가진 개인들은 수많은 문화적 파괴 행위에 책임이 있으며, 종종 자신의 행동에 대한 인식이나 후회 없이 행하고 있습니다."
 pse.226.desc:0 "$pse.225.desc$\n\n우리는 이 갑작스러운 불화의 원인인 힘의 본질에 대해 여전히 불확실하며, 이러한 불안한 부정적인 생각은 사라지기 전에 한동안 지속될 것으로 보입니다."
 pse.230.title:0 "지각 불안정화"
 pse.230.desc:0 "우리는 방금 일부 행성에서 여러 건물 붕괴와 대형 구조물 충돌에 대한 수많은 보고를 받았습니다! 이러한 사이오닉 힘이 우리의 행성 건물 해체를 초래하여 전시 진전을 방해하려는 의도적인 시도를 하고 있음을 분명히 알 수 있습니다."
 pse.230.tooltip:0 "많이 개발된 몇몇 행성에서 건물이 파괴되고 황폐화되었습니다."
 pse.222.title:0 "Mindtwist"
 pse.222.desc:0 "§H[Root.Capital.GetName]§!가 긴급 보고서를 방금 받았습니다! 방금 전, 우리는 우리 문명을 휩쓰는 대규모 사이오닉 에너지의 급증을 감지했습니다. 많은 시민들이 심오한 대전환을 겪으며 마음의 변화를 경험했습니다. 이 급격한 변화는 그들의 종교적 신념과 일상 습관에 영향을 미쳐 그들을 전혀 다른 개인으로 만들었습니다. 더욱이, 우리 인구의 행동은 기이한 방향으로 바뀌어, 시위와 불안, 비합리적인 문제에 대한 요구가 급속도로 증가하고 있습니다.\n\n$pse.222.desc_latter$"
 pse.222.desc_latter:0 "모든 가용 증거는 이 불안한 현상의 원인이 사이오닉 능력임을 가리키며, 그 출처는 §H[pse_worship_country.GetName]§!'s 유일한 존재인 §H[pse_worship_country.Ruler.GetTitle] [pse_worship_country.Ruler.GetName]§! [pse_worship_country.Ruler.GetHerHim]sel[pse_worship_country.Ruler.GetFVes]로 추적됩니다. [pse_worship_country.Ruler.GetHerHis]의 마음 조작은 우리의 행성들 사이에 무정부 상태를 조장하기 위한 것으로 보이며, [pse_worship_country.Ruler.GetHerHis] §Y'선택받은 사회'§! 능력을 통해 이루어집니다."
 pse.222.tooltip:0 "§Y$casus_belli_cb_ideology$§! §HCasus Belli§!를 §Y[pse_worship_country.GetName]§!에서 §Y20§!년 동안 획득합니다."
 pse.223.title:0 "느린 시간 흐름"
 pse.223.desc:0 "우리 제국 전체를 강타한 불안한 사이오닉 힘이 있습니다. 이 감싸는 힘은 마치 시간이 멈춘 것처럼 우리의 건설 및 함선 활동을 강제로 중단시켰습니다.\n\n다행히도 우리의 무기 시스템 대부분은 여전히 작동 중이며 반격을 감행할 수 있습니다. 우리는 이 이상 현상이 약 1년 후에 사라질 것으로 예상하고 있습니다. 그때까지 이 §Y'시간 정지'§! 현상은 우리 모두를 잠시 동안 정지된 상태로 유지할 것입니다."
 pse.223.meme:0 "세상이다! 시간이 멈췄다."
 pse.223.tooltip:0 "우리의 대부분의 건설과 함대가 §Y12§!개월 동안 보류 중입니다."
 pse.235.title:0 "$name_psy_siphon$의 힘"
 pse.235.desc:0 "비록 부분적인 완성이긴 하지만, [pse_system.GetName] 성계에 건설한 §Y$name_psy_siphon$§!는 §H$pse_power_text_icon$§!의 수용량을 늘려주어, 힘의 발휘를 더욱 쉽게 만들어줍니다."
 pse.235.a:0 "다행이군."
 pse.235.tooltip:0 "부분적으로 완성된 §Y$name_psy_siphon$§!는 §H$pse_power_bar_cap_name$§!을 §G50§!만큼 증가시킵니다."
 pse.240.title:0 "$name_psy_siphon$"
 pse.240.desc:0 "완전히 기능하는 §Y$name_psy_siphon$§! 덕분에, 이 §H\"장막 라우터\"§!는 우리의 사이오닉 능력을 크게 확장시켰으며, 더 강력한 힘을 사용할 수 있을 것입니다."
 pse.240.tooltip:0 "§Y$name_psy_siphon$§!는 §H$pse_power_increase_month$§!를 §G+1§!만큼, §H$pse_power_bar_cap_name$§!을 §G125§!만큼 증가시킵니다."
 pse.245.title:0 "오염 승화"
 pse.245.desc:0 "부패를 거부하고 나무가 됩니다.\" #Ori (부드러운)"
 pse.245.desc2:0 "이 오염은 무언가 엄청난 것이 되었고 언젠가 유용하게 사용할 수 있을 것입니다."
 pse.245.desc3:0 "급증하는 오염이 정화되었으며, 그 과정에서 영혼이 담긴 것으로 바뀌었습니다."
 pse.245.tooltip:0 "오염의 일부를 §G[root.pse_sublimate_int_num]§! £sr_psionic_sublimate£ §Y$sr_psionic_sublimate$§!로 전환했습니다."
 pse.246.tooltip:0 "부패의 일부를 §G[root.pse_sublimate_int_num]§! £sr_zro£ §Y$sr_zro$§!으로 전환했습니다."
 pse.275.title:0 "영혼 노동자"
 pse.275.desc:0 "저들은 월급날이 뭔지는 모르겠지만, 그들의 고된 노동을 사서 보답해 주어야합니다.\n\n월급날은 아마 2보단 크고 4보단 작은 숫자일 것입니다."
 pse.275.desc2:0 "벽을 강화하면서 추가적인 능률을 뽑아내기 위해 저들을 채찍질 하는 것을 잊지 마세요. 그리고 무슨 수를 써서라도 함정과 문으로 Dungeon Heart(TM)을 보호하세요."
 pse.275.desc3:0 "당신은 영원한 §H영혼 노동자§!의 축복을 받았습니다."
 pse.275.desc4:0 "여러분의 요정들을 안전한 방에 가두어두세요. 그리하면 평범한 모자를 바라지도 않고 탈주 중인 영웅들을 끌어들이지도 않을 것입니다."
 pse.275.desc5:0 "당신은 다른 요정들의 축복을 받았습니다."
 pse.275.tooltip:0 "§Y4§! 마리의 §H영혼 노동자§!가 생성됩니다. 그들은 자동적으로 매장지를 찾아 스테이션을 건설할 것입니다."
 pse.300.desc_end:0 "따라서 협정은 끝났습니다... 문제는 해결되었습니다."
 pse.300.title:0 "후원자 파괴"
 pse.300.desc:0 "거래에 이점이 없는 것은 아니지만, 단점 때문에 계약의 가치가 상실되었습니다.\n\n$pse.300.desc_end$"
 pse.300.desc2:0 "계약은 계속해서 §YRacket-Roll§! 당하고 있었고, 일정 기간 동안 모든 접촉을 사막으로 돌리기로 결정했습니다. 우리는 그들을 절대 포기하지 않을 것입니다.\n\n$pse.300.desc_end$"
 pse.300.desc3:0 "계약의 역효과는 우리가 감당하기에는 너무 비쌌습니다. 분명히 우리가 더 이상 그것들을 전혀 필요로 하지 않기 때문은 아닙니다.\n\n$pse.300.desc_end$"
 pse.300.meme:0 "안녕히 가세요!"
 pse.300.chosen:0 "§B시간이 지나면, 그들은 배울 것입니다.§!"
 pse.300.tooltip:0 "이전 §YCovenant§!의 효과는 더 이상 없습니다. 이제 다른 하나와 협정을 체결할 수 있습니다."
 pse.313.title:0 "권력이 커진다"
 pse.313.desc:0 "우리는 §H$shroud_storm$§!의 영향에 익숙합니다. 그것이 우리 성계 내 현실을 형성함에 따라, 우리는 사이오닉 능력이 크게 강화되는 것을 관찰했습니다. 이러한 힘을 집단의 노력으로 활용하고 통합하는 것은 그 어느 때보다 쉬워졌습니다.\n\n우리 국가 내에 §H$shroud_storm$§!의 흔적이 남아 있는 한, 우리의 사이오닉 잠재력은 정점에 이를 것입니다."
 pse.313.a:0 "이것은 우리에게 도움이 될 것입니다."
 pse.313.tooltip:0 "각 성계가 §M$shroud_storm$§!의 영향을 받으면 매달 §G+0.1§! §H$pse_power_text_icon$§!를 제공합니다."
 pse.500.title:0 "대가: §R오염§!"
 pse.500.desc:0 "무절제한 사이오닉 파워의 사용이 마침내 우리의 발목을 붇잡았습니다. 사이오닉 오염이 §H[root.GetName]§!의 모두를 휩쓸고 지나가면서, 몸을 고문했고 많은 이들을 미치게 만들었습니다."
 pse.500.meme:0 "가서 지로콜라(TM)나 가져와라!"
 pse.500.leader_death:0 "$leader_name|H$이 §R오염§!으로 인해 사망했습니다."
 pse.500.planet_ruin:0 "$planet_name|H$의 행성 건물이 §R오염§!으로 인해 파괴되었습니다."
 pse.500.ship:0 "침식으로 인해 §R[root.pse_ship]§!이 손실되었습니다."
 pse.500.pop:0 "§R[root.pse_pop]§! §Y£pops£ POP§!이 §R오염§!으로 인해 사망했습니다."
 pse.1002.title:0 "$edict_pse_psi_ruler_ui$"
 pse.1002.desc:0 "§Y$edict_pse_psi_ruler_ui$§!에 접근 - 시행령을 비활성화하고, 다시 활성화하십시오."
 pse.15005.desc:0 "§H$pse_power_text_icon$§!가 가득 찼으며, 그 힘을 드러낼 준비를 마쳤습니다."
