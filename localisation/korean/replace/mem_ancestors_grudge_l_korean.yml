 d_mem_ancestors_grudge_boulder_park:0 "알려지지 않은 전사의 기념비"
 d_mem_ancestors_grudge_boulder_park_desc:0 "과거의 외톨이 기념물은 이제 부속된 박물관과 그를 둘러싼 목가적인 공원으로 확장되었습니다. 먼 곳에서 온 방문객들이 여기 모여 예전의 전사들에게 경의를 표합니다."
 d_mem_ancestors_grudge_boulder_hive:0 "거대한 고철 더미"
