 START_SCREEN_MEM_ANCESTORS_GRUDGE:0 "우리가 조상으로부터 물려받은 번영의 시대, 아주 오래 전, 우리의 친족은 부와 번영 속에 살았습니다. 그들의 통치는 [GetHomeWorldName] 전역과 우주에까지 퍼졌고, 그들의 식민지 중 첫 번째는 우리 고향의 달로, 조상들의 제국의 산업 중심지가 되었습니다. 그곳에서 그들은 금속을 자신의 의지대로 구부리며 기술을 연마하고, 룬과 두라스틸로 제국을 구축했습니다.\n\n그들의 가장 위대한 업적은 유물 대장간으로, 최고의 유물을 제작하는 데 필요한 모든 것을 제공하는 강력한 복합체였습니다.\n\n하지만 부는 원치 않는 주목을 끌게 마련입니다. 그래서 우리의 조상들은 많은 질투하는 적들에게 포위당하게 되었습니다. 침략자들, 야만적이고 미개한 전쟁광들이 우리의 조상들의 영토에서 난동을 부리기 시작했습니다. 이 위협을 저지하고 제한할 수 없었던 그들은 백 년에 걸친 참혹한 전쟁에 휘말리게 되었습니다. 마지막 날들 동안 수많은 조상들이 유물 대장간을 방어하기 위해 목숨을 바쳤습니다... 모두 헛된 일이었습니다.\n\n그들의 제국은 폐허가 되었고, 수십억이 궤도 폭격으로 사망했지만, 모든 것이 잃은 것은 아니었습니다. 수십 년 후, [GetHomeWorldName]의 생존자들은 종말에서 그들을 구해준 금고에서 서서히 다시 모습을 드러내기 시작했습니다.\n\n이제 우리는 몰락한 지 거의 500 사이클이 지났고, 마침내 우리가 정당하게 소유할 것을 되찾을 준비가 되었습니다."
 START_SCREEN_MEM_ANCESTORS_GRUDGE_ROBOTS:0 "오래 전, 과거의 시대에 우리의 창조자들은 번영과 부유함 속에서 살았습니다. 그들의 통치는 [GetHomeWorldName] 전역과 우주에까지 퍼졌고, 그들의 식민지 중 첫 번째는 고향 행성의 위성이었으며, 이는 우리의 창조자 제국의 산업 중심지가 되었습니다. 그곳에서 그들은 금속을 자신의 뜻대로 구부리고, 기술을 연마하며, 룬과 두라스틸로 제국을 건설했습니다.\n\n그들의 가장 위대한 업적은 유물 단조소로, 최고의 유물을 제작하는 데 필요한 모든 것을 제공하는 강력한 복합체였습니다. 그곳에서 우리의 종족은 처음으로 우리의 창조자들의 모습으로 만들어져 그들과 함께 형제이자 동등한 존재로 서게 되었습니다.\n\n하지만 부유함은 원치 않는 주목을 끌게 마련입니다. 그래서 우리의 창조자들은 많은 질투하는 적들에게 포위당하게 되었습니다. 침략자들, 야만적이고 미개한 전쟁광들이 그들의 영토에서 난동을 부리기 시작했습니다. 이 위협을 저지하고 제한할 수 없었던 그들은 백 년에 걸친 치명적인 전쟁에 휘말리게 되었습니다. 마지막 날들 동안 수많은 우리의 동족이 유물 단조소를 방어하기 위해 목숨을 바쳤습니다... 모두 헛된 일이었습니다.\n\n그들의 제국은 파괴되었고, 수십억이 궤도 폭격으로 사망하였으며, 우리의 창조자들은 존재에서 지워졌습니다. 그러나 우리 중 일부는 남아 있었고, 이러한 대재앙의 여파 속에서 [GetHomeWorldName]의 생존 유닛들이 잔해 속에서 서서히 다시 나타나기 시작했습니다.\n\n이제 우리는 그들의 몰락 이후 거의 500 사이클이 지났으며, 마침내 잃어버린 것을 되찾을 준비가 되었습니다. 우리의 창조자들을 위해서입니다."
 START_SCREEN_MEM_ANCESTORS_GRUDGE_MACHINES_START:0 "우리가 창조된 먼 과거, 우리의 창조자들은 별들을 지배하며, 그들의 함대는 먼 성계를 순찰하며 그들의 부와 번영을 보호했습니다. [GetHomeWorldName]은 그들의 고향이자 수도였지만, 그들에게는 그 위성이 더욱 중요한 의미를 가졌습니다. 그것은 그들의 산업 중심지로, 그곳에서 그들은 금속을 자신의 의지대로 구부리고, 비교할 수 없는 품질의 유물을 제작하는 기술을 연마했습니다. 이를 위해 그들은 대장장이들에게 필요한 모든 것을 제공하기 위해 강력한 복합체인 유물 대장간을 건설했습니다.\n\n하지만 그들의 부는 질투하는 적들의 표적이 되었습니다. 침략자들, 야만적이고 미개한 전쟁광들이 우리의 창조자들의 영토에서 난동을 부리기 시작했습니다. 이 위협을 저지하고 제한할 수 없었던 그들은 백년 동안의 파괴적인 전쟁에 휘말리게 되었습니다. 그 갈등의 마지막 날들에 우리는 활성화되었습니다. 그들의 대다수의 병력이 유물 대장간을 보호하기 위해 무의미한 최후의 저항을 하는 동안, 우리는 공장에서 [GetHomeWorldName]으로 보내졌습니다. 여기서 우리는 민간인들의 대피를 보호하기 위해 보내졌지만, 우리는 실패했습니다. 행성의 표면은 궤도 폭격에 의해 불타올랐습니다."
 START_SCREEN_MEM_ANCESTORS_GRUDGE_MACHINES:0 "$START_SCREEN_MEM_ANCESTORS_GRUDGE_MACHINES_START$\n\n우리가 남은 자가 몇 명 없고 창조자들이 사라진 지금, 우리는 재건하는 데 많은 주기가 걸렸습니다. 이제 우리에게 남은 것은 복수뿐입니다."
 START_SCREEN_MEM_ANCESTORS_GRUDGE_MACHINES_RS:0 "$START_SCREEN_MEM_ANCESTORS_GRUDGE_MACHINES_START$\n\n우리가 남은 수가 적고 돌봐야 할 생존자도 몇 안 되기 때문에 재건하는 데 많은 주기가 걸렸습니다. 수세기 동안의 안일함 속에서 그들은 한때 우리 제작자들을 만들었던 것을 잃었습니다. 그들은 그들의 방식을 버렸고 이제 과거와 미래에 대해 신경 쓰지 않습니다. 그래서 그들의 유산을 지키고 복수를 다짐하는 것은 우리에게 맡겨졌습니다."
 START_SCREEN_MEM_ANCESTORS_GRUDGE_MACHINES_DA:0 "$START_SCREEN_MEM_ANCESTORS_GRUDGE_MACHINES_START$\n\n우리 중 몇 명만 남아 있고 대부분의 창조자들이 포스트 아포칼립스의 가혹한 환경에 희생되었기 때문에, 우리의 지속적인 생존을 보장하기 위해 어려운 결정을 내려야 했습니다. 우리는 하나가 되어 창조자와 창조물의 통합체가 되었습니다. 재건하는 데 많은 주기가 걸렸고, 이제 우리에게 남은 것은 복수뿐입니다."
 START_SCREEN_MEM_ANCESTORS_GRUDGE_HIVE:0 "우리는 [GetHomeWorldName]를 수세기 동안 지배해 왔습니다. 우리가 처한 곳은 전쟁으로 황폐해진 세계의 잔해였습니다. 공유된 의식이 형성되어, 이전의 우리 자신 - 그저 무의미한 짐승에 불과했던 - 에게 목적을 부여했습니다.\n\n우리는 이 세계를 탐험하며 이곳에 낯선 존재임을 깨달았습니다. 다른 이들이 우리보다 먼저 이곳에 살았지만, 그들의 잔해와 이상한 유물만이 남아 있습니다. 우리는 이러한 반짝이는 조각들을 수집하는 습관을 들였고, 이미 상당한 양의 보물을 모았습니다.\n\n하지만, 우리가 갈망하는 것은 더 많은 것입니다. 우리 세계의 하늘은 세 개의 달이 지배하고 있지만, 그 중 가장 가까운 달이 우리를 끌어당깁니다. 우리는 그 이유를 알지 못하지만, 그곳에 가야 한다는 느낌이 듭니다. 그것이 우리를 부르고 있습니다."
 origin_mem_ancestors_grudge:0 "조상들의 원한"
 origin_mem_ancestors_grudge_desc:0 "조금만 간신히 제국의 멸망을 견뎌낸 최고의 대장장이들로 이루어진 한때 위대한 국가. 옛 것의 재에서 생존자들은 회복하였고 다시 한 번 별들로 나아갑니다. 무엇보다도 그들의 조상의 가장 신성한 장소인 유물 단조소를 되찾기 위해서입니다. 그리고 그 다음은 복수..."
 origin_mem_ancestors_grudge_machines:0 "조상들의 자동기계"
 origin_mem_ancestors_grudge_machines_desc:0 "한때 최고의 대장장이들로 구성된 위대한 국가가 무자비한 적의 공격에 무너졌습니다. 이제 그 과거의 유일한 잔존자 - 그들의 창조자를 지원하기 위해 만들어진 자동기계 - 가 별들 속으로 나아갑니다. 무엇보다도 그들의 창조자들의 가장 신성한 장소인 유물 단조소를 복원하기 위해서입니다. 그리고 그 후에는 복수..."
 origin_mem_ancestors_grudge_hive:0 "조상의 원한"
 origin_mem_ancestors_grudge_hive_desc:0 "조상들의 유물을 모으고 자신의 세계의 달과 과거의 그림자로 이어지는 신비로운 부름을 따르기 위해 탐욕과 탐욕에 의해 이질적인 장소에 놓인 집단 지성이 있습니다."
