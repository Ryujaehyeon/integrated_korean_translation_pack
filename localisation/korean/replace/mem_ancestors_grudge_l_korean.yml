 approach_mem_ancestors_grudge_forge_repairs_debug_tt:0 "§R주 건물 슬롯이 주요 구역 / 핵심 구역에 있는지 확인하세요§!. 무언가가 당신의 대장간을 먹어버린 것 같고 이제 당신은 갇혔습니다. 제가 도와드리겠습니다. Stellaris 4.x는 이상할 수 있으며 많은 제 유물 대장간을 먹어버렸습니다.\n 또한 엣지 케이스와 이상한 모드 상호작용을 추적하는 것은 정말 복잡합니다.\n\n재미있는 사실: 드라니르는 리프러버스 스페셜을 즐깁니다."
