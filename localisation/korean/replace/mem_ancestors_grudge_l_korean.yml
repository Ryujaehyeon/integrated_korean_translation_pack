 situation_mem_ancestors_grudge_dranir_ratmen_invasion_progress_bad:0 "행성을 점령하다"
 mem_ancestors_grudge_dranir_underground_cities:0 "지하 도시"
 mem_ancestors_grudge_dranir_underground_cities_desc:0 "거주 가능한 지형으로 이루어진 광대한 지하 네트워크로, 행성의 영향을 받지 않습니다."
 mem_ancestors_grudge_dranir_warprock:0 "전쟁 보석"
 mem_ancestors_grudge_dranir_warprock_desc_short:0 "쥐인간의 결정화된 에너지 원천"
 mem_ancestors_grudge_dranir_warprock_desc_details:0 "이 돌들은 다양한 전쟁 기계를 작동시키는 데 사용되었으며, 쥐인들이 신속하게 병력을 이동할 수 있도록 합니다."
 tech_mem_ancestors_grudge_dranir_spacelife:0 "행성 헤일로"
 tech_mem_ancestors_grudge_dranir_spacelife_desc:0 "행성 근처의 밀접한 궤도에 위치한 거대한 구조물들이 지역 인프라와 물류를 지원합니다."
 mem_ancestors_grudge_dranir.2.name:0 "$mem_ancestors_grudge_dranir$의 유산"
 mem_ancestors_grudge_dranir.2.desc:0 "고대부터 우리의 전설은 $mem_ancestors_grudge_dranir$에 대한 이야기를 전해옵니다. 그는 살아있던 가장 위대한 룬 대장장이입니다. 하늘의 별들조차 그의 명예를 기리기 위해 그 이름을 가지고 있습니다.\n\n그 중 하나가 $mem_ancestors_grudge_dranir$의 전당입니다. 그것은 하늘에서 가장 밝은 별도 아니고 중요한 별자리의 일부도 아니지만, 전설의 장소로 여겨지며 그의 마지막 안식처이자 우리 제국의 복원을 위한 탐사의 가치가 있는 목표라고 전해집니다."
 mem_ancestors_grudge_dranir.2.a:0 "우리는 그곳에 가야 합니다!"
 mem_ancestors_grudge_dranir.2.a.tt:0 "복구 속도: §R-35%§!"
 mem_ancestors_grudge_dranir.2.b:0 "어떤 보유도 [capital_scope.GetName]보다 크지 않습니다."
 mem_ancestors_grudge_dranir.2.b.tt:0 "복구 속도: §G+25%§!"
 mem_ancestors_grudge_dranir_hall.1.name:0 "$mem_ancestors_grudge_dranir$의 전당을 방문하세요"
 mem_ancestors_grudge_dranir_hall.1.desc:0 "전설적인 별 §Y$mem_ancestors_grudge_dranir$의 홀§!를 방문하세요."
 mem_ancestors_grudge_dranir.3.name:0 "조상들의 전당 $mem_ancestors_grudge_dranir$"
 mem_ancestors_grudge_dranir.3.desc:0 "우리의 첫 번째 장거리 스캐너가 거주 가능한 세계를 나타냈을 때, 탐험가들은 그들이 발견한 것에 대해 예상하지 못했습니다. 시스템에 도착하자 탐험가들은 외로운 행성을 공전하는 거대한 구조물을 발견했습니다. 그 표면은 파괴된 거대 구조물의 잔해로 덮여 있었습니다. 우리는 가능한 한 빨리 그것을 조사해야 합니다."
 mem_ancestors_grudge_dranir_hall.2.name:0 "조사 $mem_ancestors_grudge_dranir$의 안식처"
 mem_ancestors_grudge_dranir_hall.2.desc:0 "이곳은 무엇인가요?"
 mem_ancestors_grudge_dranir.4.name:0 "[Root.GetName] 과거"
 mem_ancestors_grudge_dranir.4.desc:0 "A severely damaged gigantic ring orbits a planet covered in dense clouds of dust and toxic gasses. High radiation measurements are reported by our probes.\n\n고대에 이 지역 주민들이 깊은 지하에서 살았던 것으로 보입니다. 어떤 이유에서인지 그들은 더 이상 여기 살지 않으며, 링은 폐허가 되었습니다."
 mem_ancestors_grudge_dranir.4.a:0 "우리는 더 많은 정보를 찾아야 합니다."
 mem_ancestors_grudge_dranir.4.b:0 "옛 보유지인가? 되찾으세요!"
 mem_ancestors_grudge_dranir.40.name:0 "발굴된 통로"
 mem_ancestors_grudge_dranir.40.desc:0 "마지막 발굴 지역은 특별한 비밀을 간직하고 있었습니다. 우리 팀은 지하 네트워크로 가는 거대한 관문을 발견했습니다. 우리가 관문을 열자 수백만 마리의 블로그 크기의 쥐들이 쏟아져 나왔습니다. 우리의 탐사는 현장에서 도살당했습니다. 그들은 점점 더 많은 수로 쏟아져 나오고 있으며, 우리의 식민지에 대한 전면 공격을 준비하고 있습니다."
 mem_ancestors_grudge_dranir.40.a:0 "방어 위치!"
 mem_ancestors_grudge_dranir.45.name:0 "제13언더제국"
 mem_ancestors_grudge_dranir.45.desc:0 "환영합니다-환영합니다, 둥지-집에 오신 것을 [owner_main_species.GetThingThing]님. 우리는 하위 제국입니다, 예-예, 발톱-미공개로 숨겨져 있고 세상 아래에서 기다리고 있습니다. 당신이 우리의 우리를 부수고, 우리의 털과 송곳니를 자유롭게 해주었군요… 좋은-좋은 서비스입니다.\n\n하지만 이제 당신의 목적은 소모되어 사라졌고, 쓸모없는 [owner_main_species.GetThingThing]입니다. [MemAncestorsGrudgeEatScrap]"
 mem_ancestors_grudge_eat_eat:0 "우리는 당신을 먹습니다. 우리는 살과 뼈를 연회로 즐깁니다, 예-예."
 mem_ancestors_grudge_scrap_scrap:0 "우리는 당신을 폐기합니다. 우리는 반짝이는 부품을 만집니다, 예-예."
 mem_ancestors_grudge_dranir.45.a:0 "우리는 평화롭게 왔습니다."
 mem_ancestors_grudge_dranir.45.a.response:0 "외계 존재에게 평화는 없다. 오직 음식-살만 있다. 우리는 먹고-연회를 즐긴다."
 mem_ancestors_grudge_dranir.45.b:0 "이 녹색 빛은 무엇인가요?"
 mem_ancestors_grudge_dranir.45.b.response:0 "가장 소중한 모든 것, 맞습니다, 전쟁 바위라고 불리는 그것. 우리 사회의 삶의 초록색 맥박입니다. 그것의 용도는 끝이 없고 셀 수 없이 많습니다. 영원한 불의 심장처럼 타오릅니다. 가장 작은 조각조차도 영원히 힘을 저장하며, 우리의 엔진에 연료를 공급하고 많은 장치들이 스스로 기어가고 움직일 수 있게 합니다."
 mem_ancestors_grudge_dranir.45.c:0 "여기 살았던 이들은 어떻게 되었을까요?"
 mem_ancestors_grudge_dranir.45.c.response:0 "우리는 먹고 잔치를 벌였지, 맞아 맞아."
 mem_ancestors_grudge_dranir.45.e:0 "외계인 쓰레기."
 mem_ancestors_grudge_dranir.45.f:0 "종결 프로토콜을 실행합니다."
 mem_ancestors_grudge_dranir.45.g:0 "음식"
 mem_ancestors_grudge_dranir.55.name:0 "전쟁암석 폭발"
 mem_ancestors_grudge_dranir.55.desc:0 "한 Ratmen의 기계 중 하나가 그들의 진영에서 폭발했습니다. 군인들은 거대한 녹색 폭발이 일어난 후 수천 명의 Ratmen 노예가 현장에서 도망치는 것을 보고했습니다. 이것은 그들에게 분명히 큰 타격이 될 것입니다."
 mem_ancestors_grudge_dranir.55.a:0 "이것이 정상인가요?"
 mem_ancestors_grudge_dranir.60.name:0 "드라니르의 쥐인 노예의 물결"
 mem_ancestors_grudge_dranir.60.desc:0 "구획의 전체 지역 방어가 쥐인 노예로 완전히 구성된 대규모 군대가 보고되고 있습니다. 이 병력은 오로지 우리의 탄약을 낭비하고 우리를 후퇴시키기 위해 사용되고 있습니다. 초기 교전에서는 적의 손실이 수백만에 이른다고 보고되었습니다."
 mem_ancestors_grudge_dranir.60.a:0 "해충 쓰레기."
 mem_ancestors_grudge_dranir.65.name:0 "해충 - 근절됨"
 mem_ancestors_grudge_dranir.65.desc:0 "행성 전역의 지상군이 끝이 보이지 않는 쥐인간의 홍수가 드디어 멈췄다고 보고했습니다. 일부 장군들은 이미 해충 홍수가 끝났다고 선언했지만, 그것이 확실하다고 말할 수는 없습니다. 그들이 포기하고 지하 깊숙이 숨었거나, 우리가 정말로 이 위협을 제거하는 데 성공했을 수도 있습니다. 오직 시간만이 이를 증명할 것입니다."
 mem_ancestors_grudge_dranir.66.name:0 "우주에서 태어난 해충"
 mem_ancestors_grudge_dranir.66.desc:0 "이 캠페인 동안 쥐인간들은 여러 우주선을 점령하였고, 이제 행성과 그 성계에 대한 소유권을 주장하고 있습니다. 쥐인간의 함선에 의해 모든 보급선이 차단된 우리 지역군은 더 이상 그 위치를 유지할 수 없었습니다. 우리는 그들과 우주에서 교전할 준비를 해야 합니다."
 mem_ancestors_grudge_dranir.66.a:0 "그들이 이제 날아다니나요?"
 Verminflood:0 "은하적 해충 범람"
 mem_ancestors_grudge_dranir.70.name:0 "$tech_mem_ancestors_grudge_dranir_spacelife$ 복원됨"
 mem_ancestors_grudge_dranir.70.desc:0 "우리는 수집된 쥐인 장비의 도움으로 $tech_mem_ancestors_grudge_dranir_spacelife$을 복원할 수 있었습니다. 이제 그것은 행성을 다시 공전하며 지역 교역을 지원합니다."
 mem_ancestors_grudge_dranir.70.tt:0 "수리됨: §G$tech_mem_ancestors_grudge_dranir_spacelife$§!"
