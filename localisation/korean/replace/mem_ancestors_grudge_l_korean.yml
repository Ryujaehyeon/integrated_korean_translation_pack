 building_mem_ancestors_grudge_ruins_1_desc:0 "이 세계는 돌 하나하나씩 다시 세워질 것입니다."
 building_mem_ancestors_grudge_forge_0:0 "파괴된 유물 단조소"
 building_mem_ancestors_grudge_forge_0_desc:0 "한때 위대한 유물 단조체의 잔재."
 building_mem_ancestors_grudge_forge_1:0 "조정된 유물 공장"
 building_mem_ancestors_grudge_forge_1_desc:0 "고작 작동하는 대장간입니다. 우리 중 일부가 여기서 일하기에 충분합니다."
 building_mem_ancestors_grudge_forge_1_tt:0 "£trigger_no£ 우리는 $situation_mem_ancestors_grudge_forge_repairs_type$에서 추가적인 진전을 필요로 합니다."
 building_mem_ancestors_grudge_forge_2:0 "복원된 유물 단조소"
 building_mem_ancestors_grudge_forge_2_desc:0 "조합소가 복원되었지만, 여전히 100% 용량에는 미치지 않습니다."
 building_mem_ancestors_grudge_forge_3:0 "향상된 유물 단조체"
 building_mem_ancestors_grudge_forge_3_desc:0 "행성을 이전의 영광으로 복원하는 우리의 지속적인 진전은 새로운 정점에 도달했습니다."
 building_mem_ancestors_grudge_forge_4:0 "위대한 유물 단조소"
 building_mem_ancestors_grudge_forge_4_desc:0 "이 세계와 함께 유물 공장을 완전히 복원했습니다."
 building_mem_ancestors_grudge_forge_effect_designation:0 "§Y유물 제작소§!는 지정에 따라 소비재(또는 통합)에서 합금 생산으로 일자리를 전환하며, £district£구역\n당 추가 일자리를 제공합니다.\n"
 building_mem_ancestors_grudge_forge_effect_zones:0 "['concept_mem_ancestors_zones']을(를) 잠금 해제합니다 \n"
 building_mem_ancestors_grudge_forge_terraform_tt:0 "행성을 §Y에큐메노폴리스§!\n로 변환합니다."
 building_mem_ancestors_grudge_forge_empireeffect_tt:0 "§L제국 전체에 ['concept_mem_ancestors_grudge_artifact_intensity'] 및 ['concept_mem_ancestors_grudge_rune_intensity']에 기반한 효과를 제공합니다.§!"
 building_mem_ancestors_grudge_robot_factory:0 "고대 골렘 시설"
 building_mem_ancestors_grudge_robot_factory_desc:0 "로봇의 새로운 세대를 만들기 위해 응용된 골레멘시."
 building_mem_ancestors_grudge_robot_factory_tt:0 "인구가 증가함에 따라 이 조립의 효율성이 감소합니다."
 building_mem_ancestors_grudge_hoarder_depot:0 "반짝임의 금고"
 building_mem_ancestors_grudge_hoarder_depot_desc:0 "거대한 금고입니다. 어떤 이들은 이 금고가 지금까지 지어진 금고 중 가장 위대한 것이라고 말하기도 합니다. 이 금고의 진정한 목적은 소유자가 수집한 모든 귀중한 유물을 보관하는 것입니다."
 building_mem_ancestors_grudge_hoarder_depot_effect_desc:0 "정책 §Y$policy_mem_ancestors_grudge_is_hoarder_policy$§!에 따른 보정치 \n 소유한 \n유물§Y당 효과 증가 §!"
 building_mem_ancestors_grudge_living_metal_factory:0 "생체 합금 정제소"
 building_mem_ancestors_grudge_living_metal_factory_desc:0 "고급 시설로 룬 대장기술을 더욱 발전시킵니다. $sr_living_metal$으로 일반 재료를 도금함으로써 기존 생산을 증대시키고 금속을 강화할 수 있습니다."
 building_mem_ancestors_grudge_living_metal_factory_tt:0 "§G+1%§! $BONUS_WORKFORCE_FOR$ §Y$job_mem_ancestors_grudge_runesmith_plural$§! $mem_ancestors_grudge_pop_group_unit$ §Y$job_mem_ancestors_grudge_runesmith_plural$§!"
 r_mem_ancestors_grudge_pauldron:0 "룬이 주입된 어깨 갑옷"
 r_mem_ancestors_grudge_pauldron_desc:0 "우리 대장장이들이 만든 걸작. 모든 장인은 최고의 품질을 자랑합니다."
 r_mem_ancestors_grudge_ring:0 "룬 링"
 r_mem_ancestors_grudge_ring_desc:0 "우리 대장장이들이 만든 걸작입니다. 모든 장인은 최고의 품질을 자랑합니다."
 r_mem_ancestors_grudge_sword:0 "룬 단조 검"
 r_mem_ancestors_grudge_sword_desc:0 "우리 대장장이들이 만든 걸작입니다. 모든 장인은 최고의 품질을 자랑합니다."
 r_mem_ancestors_grudge_anvil:0 "고대 룬-망치"
 r_mem_ancestors_grudge_anvil_desc:0 "고대의 전설에 얽힌 룬이 새겨진 모루로, 고대의 마스터 유물 대장장이에 의해 떨어진 바주란 함선에서 추출한 희귀 물자로 만들어졌습니다. 수세기 동안 영원히 잃어버린 것으로 여겨졌고, 그 운명은 옛 세계의 멸망과 함께 봉인되었습니다. 그러나 조상들의 지혜와 통찰력은 비할 데 없는 것이었습니다. 그들은 모루를 보호하며 파괴로부터 지켰고, 끝까지 그 존재를 지켰습니다."
 r_mem_ancestors_grudge_anvil_effect_tt:0 "각 ['concept_mem_ancestors_grudge_rune_relics'] 사용 시 증가합니다. 현재: \n"
