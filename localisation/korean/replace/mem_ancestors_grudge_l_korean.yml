 mem_ancestors_grudge.45.g:0 "$mem_ancestors_grudge_quality_7$: 승격"
 mem_ancestors_grudge.45.h:0 "$mem_ancestors_grudge_quality_7$: 미지의 연구"
 mem_ancestors_grudge.45.exceptional_ring:0 "§L그리고 4개 더!§!"
 mem_ancestors_grudge.45.exceptional_ring_hive:0 "5 §Y연구 옵션§!을 30% 진행하여 얻습니다."
 mem_ancestors_grudge.45.i:0 "$mem_ancestors_grudge_quality_7$: 재대결의 시간"
 mem_ancestors_grudge.45.exceptional_sword:0 "현재 우리가 가지고 있는 §R모든§! 휴전을 종료합니다."
 mem_ancestors_grudge.45.exceptional_pauldron:0 "모든 식민지는 §Y승격 단계§! 5 미만일 경우: §G+1§!"
 mem_ancestors_grudge_golden_age:0 "번영하는 경제"
 mem_ancestors_grudge.45.d:0 "$mem_ancestors_grudge_quality_1$: 재활용하고 다시 시도하세요!"
 mem_ancestors_grudge.205.name:0 "새로운 원한"
 mem_ancestors_grudge.205.desc:0 "오늘, 새로운 적이 우리에게 도전할 용기를 냈습니다. 그들은 우리의 문 앞에 나타나 우리의 방어를 무너뜨리며, 당연히 우리 것인 것을 주장하는 뻔뻔함을 보였습니다. 그들의 대담함은 결코 묵과되지 않을 것입니다. 그들은 새로운 원한을 불러일으켰습니다. 우리가 반드시 끝을 보게 될 원한입니다. 그리고 우리는 그것을 완전히 해결할 것입니다!"
 mem_ancestors_grudge.205.a:0 "우리를 잘못 대했습니다!"
 mem_ancestors_grudge.205.b:0 "기록으로."
 mem_ancestors_grudge.215.name:0 "원한이 풀림"
 mem_ancestors_grudge.215.desc:0 "우리는 다시 쉴 수 있습니다. 우리가 지고 있던 복수의 짐이 덜어졌습니다. 오늘, 우리의 적은 정당하게 우리의 것인 것을 잃었습니다.\n\n마침내, 우리는 복수의 무게를 내려놓을 수 있습니다."
 mem_ancestors_grudge.215.a:0 "환상적입니다."
 mem_ancestors_grudge.220.name:0 "잃어버린 원인"
 mem_ancestors_grudge.220.desc:0 "우리의 고향은 잃어버렸습니다."
 mem_ancestors_grudge.220.a:0 "자비는 없다!"
 mem_ancestors_grudge.55.name:0 "그들은 살아있으나"
 mem_ancestors_grudge.55.desc:0 "모든 세월이 흐른 후에도 그들은 여전히 살아 있습니다. 시간은 그들의 방식을 부드럽게 하지 않았고, 그들이 한때 우리를 파멸로 이끌었던 길에서 벗어나지도 않았습니다. 그들은 우리를 바라보며 자신들의 이전 희생자를 인식조차 하지 못하고, 마치 우리 사이의 피의 빚이 잊혀진 것처럼 보입니다.\n\n하지만 우리는 기억하고 있으며, 언젠가 그들도 기억할 것입니다. 우리의 복수가 다가올 것이며, 과거의 잘못은 피로 갚아질 것입니다."
 mem_ancestors_grudge.55.a:0 "복수의 시간!"
 mem_ancestors_grudge.75.name:0 "원한이 해결됨"
 mem_ancestors_grudge.75.desc:0 "우리 조 ancestors는 이제 쉴 수 있습니다. 우리가 대대로 지고 있던 복수의 짐이 덜어졌습니다. 오늘, 우리의 맹세한 적들이 마지막 숨을 내쉬었습니다. 그들의 그림자는 더 이상 우리의 길을 어둡게 하지 않으며, 피의 빚은 모두 갚았습니다.\n\n마침내 우리는 과거의 무게를 내려놓고 미래를 바라볼 수 있습니다. 오래된 상처는 이제 치유될 수 있으며, 우리는 하나의 민족으로서 마침내 나아갈 수 있습니다."
 mem_ancestors_grudge.75.desc_robots:0 "우리의 창조자들은 이제 쉴 수 있습니다. 우리가 수세기 동안 지닌 복수의 짐이 덜어졌습니다. 오늘, 우리의 맹세한 적들이 마지막 숨을 거두었기 때문입니다. 그들의 그림자는 더 이상 우리의 길을 어둡게 하지 않으며, 피의 빚은 완전히 갚아졌습니다.\n\n마침내 우리는 과거의 무게를 내려놓고 미래를 바라볼 수 있습니다. 오래된 상처는 이제 치유될 수 있으며, 우리는 하나의 민족으로서 마침내 앞으로 나아갈 수 있습니다."
 mem_ancestors_grudge.75.a:0 "오래된 습관은 쉽게 사라지지 않는다"
 mem_ancestors_grudge.75.b:0 "새로운 시대"
 mem_ancestors_grudge_revenge_arc_title:0 "원한은 잊지 않음"
 mem_ancestors_grudge_revenge_arc_desc:0 "우리는 먼 과거에 일어난 일을 잊지 않았습니다. 그 시절의 상처는 여전히 우리의 마음 속에서 타오르고 있으며, 우리의 원수들이 저지른 행위는 우리의 집의 돌에 새겨져 있습니다. 그들은 파괴를 일으켰지만, 최후의 심판을 가져올 것은 우리입니다.\n\n 그들의 제국이 더 이상 존재하지 않을 때에만 우리는 평화를 찾을 수 있을 것입니다."
 mem_ancestors_grudge_revenge_arc_counter:0 "원한이 해결됨"
 mem_ancestors_grudge.70.name:0 "원한이 해결됨"
 mem_ancestors_grudge.70.desc:0 "우리 조 ancestors는 이제 평화롭게 쉴 수 있습니다. 우리가 대대로 지닌 복수의 짐이 덜어졌습니다. 오늘, 우리의 맹세한 적들이 마지막 숨을 거두었기 때문입니다. 그들의 그림자는 더 이상 우리의 길을 어둡게 하지 않습니다. 안타깝게도 우리는 그들에게 먼저 다가가지 못했습니다."
 mem_ancestors_grudge.70.desc_robots:0 "우리의 창조자들은 이제 평화롭게 쉴 수 있습니다. 우리가 수세기 동안 짊어졌던 복수의 부담이 덜어졌습니다. 오늘, 우리의 맹세한 적들이 마지막 숨을 거두었기 때문입니다. 그들의 그림자는 더 이상 우리의 길을 어둡게 하지 않습니다. 안타깝게도 우리는 그들에게 먼저 다가가지 못했습니다."
 mem_ancestors_grudge.70.a:0 "유감스럽습니다"
 mem_ancestors_grudge.80.name:0 "금빛 혁명"
 mem_ancestors_grudge.80.desc:0 "우리의 베테랑 룬 세공사 중 한 명은 생체 금속을 룬이 새겨진 유물에 통합하는 것이 룬 제작의 미래에서 전환점을 이룰 수 있다고 믿고 있습니다. 생체 금속은 스스로 형태를 바꾸고 세공사의 의도에 반응할 수 있는 연금술 합금입니다. 이는 정적인 재료가 달성할 수 있는 것보다 훨씬 더 많은 가능성을 제공합니다."
 mem_ancestors_grudge.100.title:0 "미공개 짐승"
 mem_ancestors_grudge.100.desc:0 "우리의 재건 노력 중에, 우리는 Vazurans가 한때 전투에 사용했던 야생 전투 짐승의 집단을 깨운 것 같습니다. 이들은 그들의 실패한 침공 이후 남겨진 것입니다. 이 끔찍한 존재들은 이제 우리 동족 사이에서 날뛰고 있습니다. 우리는 신속하게 행동해야 하며 이들을 처치해야 합니다. 이것은 우리의 세계이며 이 괴물들은 이곳에 있을 자리가 없습니다!"
 mem_ancestors_grudge.100.a:0 "무장하라!"
 mem_ancestors_grudge.105.title:0 "고대 지식"
 mem_ancestors_grudge.105.desc:0 "우리의 재건 노력 중, 우리는 잃어버린 것으로 여겨졌던 기술을 발견했습니다. 이는 우리의 조상들이 남긴 독창성의 증거로, 그들의 솜씨가 수세기의 녹과 부패를 견뎌낼 수 있었음을 보여줍니다. 지금도 우리가 그것을 다시 조립하는 동안, 여전히 기능하고 강력한 비밀을 드러냅니다.\n\n어떻게 진행해야 할까요?"
 mem_ancestors_grudge.105.desc_robots:0 "우리의 재건 노력 중, 우리는 잃어버린 것으로 여겨졌던 기술을 발견했습니다. 이는 우리의 제작자들이 지닌 독창성을 증명하는 것으로, 그들의 솜씨가 수세기의 녹과 부패를 견뎌낼 수 있었음을 보여줍니다. 지금도 우리는 그것을 다시 조립하면서 여전히 기능하고 강력한 비밀을 드러냅니다.\n\n어떻게 진행해야 할까요?"
 mem_ancestors_grudge.105.desc_hive:0 "우리의 재건 노력 중, 우리는 선구자 기술을 발견했습니다. 그들의 독창성을 증명하는 이 기술은 수세기 동안의 녹과 부패를 견뎌냈습니다. 지금 우리가 그것을 다시 조립하는 동안, 여전히 기능하고 강력한 비밀을 드러냅니다.\n\n어떻게 진행해야 할까요?"
 mem_ancestors_grudge.105.a:0 "재사용하세요!"
 mem_ancestors_grudge.105.b:0 "복원하라!"
 mem_ancestors_grudge.105.c:0 "조사해보세요!"
 mem_ancestors_grudge.110.title:0 "온전한 방어"
 mem_ancestors_grudge.110.desc:0 "우리는 재건 작업 중 고대 방어 시설을 발견했습니다. 낡고 부서졌지만 완전히 생명이 없는 것은 아닙니다. 이 유적들은 여전히 원래의 힘을 회복하고 복원할 수 있을 만큼의 힘을 가지고 있습니다. 또는 우리는 이들을 조심스럽게 해체하고 내부 구조를 연구할 수 있습니다."
 mem_ancestors_grudge.110.a:0 "수리하세요!"
 mem_ancestors_grudge.110.b:0 "조사해보세요!"
 mem_ancestors_grudge.115.title:0 "살아있는 무덤"
 mem_ancestors_grudge.115.desc:0 "우리의 재건 노력 중에 우리는 발견을 하였습니다: 몰락 이전의 고대 시절의 조상들이 정지된 생명 상태로 보존되어 있습니다. 그들을 둘러싼 기계들은 낡고 고장 나고 있지만, 그들은 여전히 생명에 집착하고 있습니다. 우리는 시스템을 안정화하고 그들의 생존을 보장하기 위해 신속하게 행동해야 합니다."
 mem_ancestors_grudge.115.desc_robots:0 "고대 시절의 붕괴 이전에 생산되어 추가 처리를 위해 저장된 유닛을 발견했습니다. 그 주변의 기계들은 낡고 고장 나고 있지만, 에너지 셀은 여전히 온전합니다. 시스템을 안정화하고 가동하기 위해 신속하게 행동해야 합니다."
 mem_ancestors_grudge.115.a:0 "조상들을 안전하게 지켜라!"
 mem_ancestors_grudge.115.b:0 "그들의 명예는 오래전에 사라졌습니다."
 mem_ancestors_grudge.120.title:0 "미폭발 탄약"
 mem_ancestors_grudge.120.desc:0 "고대 탄약이 잔해 속에 묻혀 있는 것을 발견했습니다. 이 폭탄들은 여전히 활성 상태이며 우리 동족에게 위험을 초래합니다."
 mem_ancestors_grudge.120.a:0 "그들을 제거하십시오."
 mem_ancestors_grudge.125.title:0 "어둠 속의 감시자"
 mem_ancestors_grudge.125.desc:0 "우리의 [target.GetName]에서 광대한 유적을 탐험하는 동안, 우리는 우리의 집단정신에 속하지 않는 야생 드론의 큰 거주지를 발견했습니다. 과거에 드론이 실종된 기억이 없기 때문에 그들의 존재는 우리에게 다소 수수께끼입니다. 그들의 기원을 떠나, 항상 해야 할 일이 있으며 드론에 대한 수요가 높습니다. 그들에 대해 무엇을 해야 할까요?"
 mem_ancestors_grudge.125.a:0 "그들을 포용하십시오."
 mem_ancestors_grudge.125.b:0 "우리는 더 중요한 문제에 집중해야 합니다."
 mem_ancestors_grudge.400.title:0 "합금의 선조들\" # 창의적인 룬 대장장이"
 mem_ancestors_grudge.400.desc:0 "우리의 유물 대장들은 스스로를 초월하여 평소 수확량보다 약 3.81% 더 많은 합금을 생산했습니다. 전통적으로 모든 초과 생산물은 재판에 바쳐져야 합니다. 그러나 지금과 같은 시기에 우리의 함대의 힘이 우리 동족의 생존을 결정짓는다면, 이 잉여의 일부를 무기를 강화하는 데 보내는 것도 좋을 것입니다."
 mem_ancestors_grudge.400.a:0 "합금!"
 mem_ancestors_grudge.400.b:0 "전통"
 mem_ancestors_grudge.405.title:0 "룬을 깨다\" # 창의적인 숙련공"
 mem_ancestors_grudge.405.desc:0 "우리의 룬 대장장이들은 평소의 한계를 넘어 약간의 잉여를 만들어냈습니다. 전통에 따르면 이러한 모든 잉여는 시험에 바쳐져야 합니다. 그러나 이 풍요로움은 우리에게 기회를 제공합니다."
 mem_ancestors_grudge.405.a:0 "자원!"
 mem_ancestors_grudge.405.b:0 "전통"
 mem_ancestors_grudge.410.title:0 "저주받은 존재들!\" # 여러 번 실패하고 기대 이하의 성과를 냈습니다."
 mem_ancestors_grudge.410.desc:0 "여러 번의 시도가 실패했고, 우리의 친족은 그들에게 부여된 기대에 미치지 못했습니다. 그 작업은 그들의 기술과 결단력을 시험했지만, 그들은 여전히 성과를 내지 못했습니다.\n\n주요 대장장이의 반응은 다음과 같았습니다: §L이 REDACTED는 심지어 REDACTED도 제대로 하지 못했습니다.§!"
 mem_ancestors_grudge.410.a:0 "불안한."
 mem_ancestors_grudge.415.title:0 "큐브\" # 현대 미술 유물"
 mem_ancestors_grudge.415.desc:0 "오늘, 우리의 숙련공 중 한 명이 매우 호기심을 자극하는 수수께끼를 가지고 우리에게 다가왔습니다. 그들은 재판을 위한 관련 유물을 제작하는 과정에서 예상치 못하게 룬이 새겨진 큐브를 만들어냈습니다.\n\n첫눈에 보기에는 이상한 물체처럼 보입니다. 그러나 그 표면에 새겨진 룬은 희미하게 맥동하고 있습니다. 그 목적은 불분명하지만, 그 자체로 유물로서의 자격을 갖출 수 있을 것입니다."
 mem_ancestors_grudge.415.a:0 "그것을 주장합니다!"
 mem_ancestors_grudge.415.b:0 "처음부터 시작합니다!"
 mem_ancestors_grudge.415.c:0 "재미있군요."
 mem_ancestors_grudge.420.title:0 "안전 규정 위반"
 mem_ancestors_grudge.420.desc:0 "우리의 여러 친척들이 무지와 정해진 안전 절차를 무시함으로써 우리 중 한 명의 죽음을 초래했습니다. 정의는 이미 실현되었지만, 우리가 더 할 수 있는 일이 있을까요?"
 mem_ancestors_grudge.420.a:0 "비극적입니다."
 mem_ancestors_grudge.420.b:0 "가족에게 보상합니다!"
 mem_ancestors_grudge.425.title:0 "폭발적 발명\" # 원치 않는 융합"
 mem_ancestors_grudge.425.desc:0 "이상한 사건이 발생했습니다. 우리의 숙련공 중 한 명이 의도치 않은 실험 과정에서 매우 불안정한 물질을 만들어냈습니다. 본질적으로 매우 폭발성이 강합니다."
 mem_ancestors_grudge.425.a:0 "모티스!"
 mem_ancestors_grudge.425.b:0 "재판 추가."
 mem_ancestors_grudge.430.title:0 "물자 연구\" # 새로운 물자 기술"
 mem_ancestors_grudge.430.desc:0 "우리의 대장장이들은 완벽을 추구하며 기술의 향상을 이뤘습니다. 사소한 개선으로 시작된 이 혁신은 우리 과학자들 사이에서 큰 흥미를 불러일으켰으며, 그들은 이 혁신에서 우리의 연구를 새로운 차원으로 끌어올릴 수 있는 가능성을 보고 있습니다."
 mem_ancestors_grudge.430.a:0 "연구하십시오!"
 mem_ancestors_grudge.430.b:0 "재판을 진행합니다!"
 mem_ancestors_grudge.435.title:0 "감정이 있는 발명품\" # 감정이 있는 금속"
 mem_ancestors_grudge.435.desc:0 "특이한 사건이 발생했습니다. 우리의 숙련공 중 한 명이 의도치 않은 실험 과정에서 감응하는 금속을 만들어냈습니다. 우리의 동족이 이를 제어하는 데 다소 시간이 걸렸습니다."
 mem_ancestors_grudge.435.a:0 "나노 로봇!"
 mem_ancestors_grudge.435.b:0 "대장간으로 가자!"
 mem_ancestors_grudge.440.title:0 "라이벌의 간섭\" # 라이벌의 방해"
 mem_ancestors_grudge.440.desc:0 "우리의 적 [mem_ancestors_grudge_rival.GetName]가 다시 한 번 그들의 배신을 드러냈습니다. 그들의 간섭은 우리의 진전에 차질을 초래했습니다. 이 고의적인 방해 행위는 무시할 수 없습니다. 우리의 분노가 뜨겁게 타오르는 동안, 상황은 신중한 대응을 요구합니다.\n\n우리는 강력한 어조의 편지를 작성할 것입니다!"
 mem_ancestors_grudge.440.a:0 "지금 해! 지금 해!"
 mem_ancestors_grudge_diggy_hole:0 "디기 디기 홀!"
 mem_ancestors_grudge.445.title:0 "광산의 형제들이여, 기뻐하라!"
 mem_ancestors_grudge.445.desc:0 "...“Swing! Swing! Swing with me!”라는 노래가 많은 작업장에서 울려 퍼집니다. “Diggy Diggy Hole”은 이전보다 더 큰 인기를 끌고 있으며, “When the Hammer Falls”와 “Hammerdeep”가 그 뒤를 따릅니다. 이 모든 곡들은 과거의 노래들이 다시 불려진 것입니다. 그 결과로 작업 사기가 급상승하였고, 광물 생산량은 할당량을 훨씬 초과했습니다.\n\n우리는 이 상황이 자연스럽게 진행되도록 두고 이 개선된 생산성의 혜택을 누릴 수도 있고, 아니면 더 큰 이익을 얻기 위해 투자할 수도 있습니다."
 mem_ancestors_grudge.445.a:0 "나는 [owner.GetSpeciesName]이며, ... 다시 말씀해 주시겠습니까?"
 mem_ancestors_grudge.445.b:0 "우리는 결코 너무 깊이 파지 않을 수 없습니다!"
 mem_ancestors_grudge.445.b.tooltip:0 "우리는 추가적인 탐사 채굴 작업에 투자하여 이 발전을 활용하려고 합니다."
 mem_ancestors_grudge.446.title:0 "미공개된 산의 상점"
 mem_ancestors_grudge.446.desc:0 "추가 자금이 지원된 발굴 작업 중, [root.GetName]의 광부들이 놀랍도록 풍부한 희귀 광물 맥을 발견했습니다. 인근 지역에서의 추가 탐사 드릴 결과 예상보다 큰 매장량이 확인되었습니다. 이에 따라 [root.GetName]의 광물 분류가 초풍부로 업데이트되었습니다.\n\n지역 노동자들은 앞으로 몇 년간 더 많은 채굴이 이루어질 것이라는 전망에 기뻐하고 있습니다."
 mem_ancestors_grudge.447.title:0 "미공개된 산의 저장소"
 mem_ancestors_grudge.447.desc:0 "우리의 추가 자금 지원을 받은 발굴 작업 중, [root.GetName]의 광부들이 이전에 알려지지 않은 동굴 시스템을 발견했습니다. 그 안에서 희귀 자원의 풍부한 매장층을 발견했습니다.\n\n지역 노동자들이 발견을 축하합니다."
 mem_ancestors_grudge.448.title:0 "기술적 보물"
 mem_ancestors_grudge.448.desc:0 "고대의 잔해가 수십 미터의 잔해 아래에 묻혀 있는 [root.GetName]에서 추가 자금 지원을 받은 발굴 작업 중 고고학자들이 발견했습니다. 이 함선은 분명히 우리의 조상에 의해 제작되었으며, 많은 잃어버린 기술을 특징으로 합니다.\n\n그 설계를 연구하는 것은 우리의 연구 노력을 돕는 유용한 통찰력을 제공할 것입니다."
 mem_ancestors_grudge.449.title:0 "불만이 가득한 광부"
 mem_ancestors_grudge.449.desc:0 "우리의 광부들이 그들의 일에 간섭한 것에 대해 좋지 않게 반응한 것 같습니다. 우리가 이익을 얻으려 했던 일반적인 열정은 사라졌고, 새로운 보고서에 따르면 생산성이 정상으로 돌아갔습니다."
 mem_ancestors_grudge.449.a:0 "그들은 만족시키기 어렵습니다."
 mem_ancestors_grudge.46.tooltip:0 "§Y품질을 영구적으로 증가시킵니다§!"
 mem_ancestors_grudge.455.title:0 "조상들의 원한 요구"
 mem_ancestors_grudge.455.desc:0 "우리의 여러 유물 장인들은 그들의 최신 작품에 대해 높은 기대를 가지고 있습니다. 그들은 문제는 그들의 기술이 아니라 자금이 부족한 작업 환경이라는 것을 깨달았습니다. 그들은 더 많은 자금이 더 나은 결과로 이어질 것이라고 확신했습니다."
 mem_ancestors_grudge.455.a:0 "그들이 원하는 것을 줍니다."
 mem_ancestors_grudge.455.a_tt:0 "예상 결과는 품질 등급이 하나 상승할 것입니다."
 mem_ancestors_grudge.455.b:0 "기술을 연마하세요, 말이 아니라!"
 mem_ancestors_grudge.460.title:0 "가난한 바위"
 mem_ancestors_grudge.460.desc:0 "여러 정제소에서 매우 낮은 순수의 광물이 발견되었습니다. 현재 일반 금속 공학자들조차 이를 사용할 수 있을지 논의하고 있습니다."
 mem_ancestors_grudge.460.a:0 "하위 품질을 용인합니다."
 mem_ancestors_grudge.460.a_tt:0 "예상 결과는 품질 등급이 하나 낮아질 것입니다."
 mem_ancestors_grudge.460.b:0 "돌을 아끼지 마십시오."
 mem_ancestors_grudge.460.c:0 "모든 것을 폐기합니다."
 mem_ancestors_grudge.465.title:0 "영감을 받은 민족"
 mem_ancestors_grudge.465.desc:0 "우리의 룬 숙련공들은 큰 혼란을 느끼고 갑자기 실험을 하고 싶어합니다."
 mem_ancestors_grudge.465.a:0 "그들이 하게 두세요!"
 mem_ancestors_grudge.465.a_tt:0 "이 결과는 진정한 도박입니다. 룬 숙련공이 그들의 작업을 크게 향상시킬 수도 있고, 반대로 할 수도 있습니다."
 mem_ancestors_grudge.465.b:0 "기회가 없습니다!"
 mem_ancestors_grudge.465.b_tt:0 "예상되는 최대 결과는 순수 등급이 하나 낮아질 것입니다."
 mem_ancestors_grudge.465.c:0 "다른 취미를 지원하세요!"
 mem_ancestors_grudge.470.title:0 "상호 친밀감"
 mem_ancestors_grudge.470.desc:0 "오늘 정말 드문 일이 발생했습니다: 6A 시설의 모든 근로자들이 그곳에 있다는 것에 행복해하며 근무에 나섰습니다. 증가한 사기는 생산성에 꽤 흥미로운 영향을 미쳤습니다.\n\n6A 시설의 관리자들은 생산성보다 사기를 우선시할 것을 제안했습니다. 그들은 주 7일의 근무일을 6일로 영구적으로 줄일 것을 제안합니다."
 mem_ancestors_grudge.470.a:0 "일하러 돌아가세요!"
 mem_ancestors_grudge.470.a_tt:0 "예상 결과는 품질 등급이 하나 상승합니다."
 mem_ancestors_grudge.470.b:0 "여섯 날입니다."
 mem_ancestors_grudge.475.title:0 "수요 증가"
 mem_ancestors_grudge.475.desc:0 "우리의 [target.GetName]에 대한 작업은 주목받지 못하지 않았습니다. 여러 사설 구매자들이 이제 일반적으로 새로운 유물을 주문하고 있습니다. 하지만 이는 현재 충족할 수 없는 더 많은 수요로 이어집니다."
 mem_ancestors_grudge.475.a:0 "더 열심히, 더 똑똑하게 일하라!"
 mem_ancestors_grudge.475.b:0 "새로운 대장장이를 고용합니다!"
 mem_ancestors_grudge.475.c:0 "우리는 할 수 있습니다."
 mem_ancestors_grudge.480.title:0 "부서지는 발전기"
 mem_ancestors_grudge.480.desc:0 "우리의 유지 보수 직원이 [target.GetName]에서 고대 전력 생성기에서 이상한 행동을 발견했습니다. 우리의 조상들이 수천 년과 전쟁을 염두에 두고 건설하지 않았다고 생각하는 것은 이상할 수 있지만, 현재 상황은 매우 심각해 보입니다. 직원들은 적절한 복구가 이루어지지 않으면 시스템이 우리의 얼굴에 폭발할 수 있다고 언급했습니다."
 mem_ancestors_grudge.480.a:0 "폭발을 관찰합니다."
 mem_ancestors_grudge.480.b:0 "그만해! 지금!"
 mem_ancestors_grudge.480.c:0 "걱정할 필요 없습니다."
 mem_ancestors_grudge.485.title:0 "대장간의 문제"
 mem_ancestors_grudge.485.desc:0 "현재 진행 중인 단조 의식에서 우리에게 임명된 대장장이가 엄청난 실수를 저질렀습니다. 지금까지의 모든 작업이 무효화되었고, 과정은 새로 시작해야 합니다. 그러나 대장장이의 명예는 시작된 프로젝트가 완수되어야 한다고 요구합니다.\n\n이 실수에 우리는 어떻게 반응할까요?"
 mem_ancestors_grudge.485.a:0 "그가 해결하도록 하되, 마감일을 상기시켜 주세요."
 mem_ancestors_grudge.485.a_tt:0 "예상 결과는 품질 등급이 하나 낮아질 것입니다."
 mem_ancestors_grudge.485.b:0 "선임 대장장이들이 그의 설계 결함에 대한 통찰력을 제공하게 하십시오."
 mem_ancestors_grudge.485.b_tt:0 "예상되는 최소 결과가 품질 등급 하나만큼 증가합니다."
 mem_ancestors_grudge.485.c:0 "선임 대장장이들이 그의 설계에 대한 개선점을 제안하게 하십시오."
 mem_ancestors_grudge.485.c_tt:0 "예상되는 최대 결과가 하나의 품질 단계만큼 증가합니다."
 mem_ancestors_grudge.490.title:0 "이상한 기분"
 mem_ancestors_grudge.490.desc:0 "우리의 유물 대장장이 중 한 명이 사회에서 물러나 유물 대장간 안에 스스로를 가두었습니다. 우리가 남긴 것은 이상한 말로만 설명할 수 있는 암호 같은 메시지뿐입니다."
 mem_ancestors_grudge.490.a:0 "그를 대장장이로 두세요!"
 mem_ancestors_grudge.490.a_tt:0 "이 이상한 기분의 결과는 진정한 도박입니다. 대장장이가 그의 작업을 크게 개선할 수도 있고, 반대로 할 수도 있습니다."
 mem_ancestors_grudge.490.b:0 "그를 감시하에 두었습니다!"
 mem_ancestors_grudge.490.b_tt:0 "예상되는 최대 결과는 하나의 품질 등급만큼 낮아질 것입니다."
 mem_ancestors_grudge.490.c:0 "그의 관심을 다른 곳으로 돌리도록 하세요!"
 mem_ancestors_grudge.515.title:0 "그건 소행성이 아니다"
 mem_ancestors_grudge.515.desc:0 "The massive 블랙홀 in the [solar_system.GetName] held no to little value. The only mildly interesting fact was the a giant undamaged 소행성.\n\nOur 과학자 expected the giant 소행성 [from.GetName] to be a slightly more interesting rock, but it turned out to be a massive Kraken."
 mem_ancestors_grudge.515.a:0 "단절합니다!"
 mem_ancestors_grudge.520.name:0 "없음의 제독"
 mem_ancestors_grudge.520.desc:0 "§H우리 군인들이 그들이 마땅히 얻은 승리를 축하하는 동안, 거대한 크라켄의 시체는 인간 크기의 조각들로 부서졌다. 아래에서 한 선박이 나타나며, 그것의 통로를 열었다:§!\n\n아, 얼마나 상쾌한가, 문명화된 얼굴이군. 갈등의 시기에도 예의는 드문 특성이다.\n\n나는 당신의 군대를 보았고, 그들의 강점과 약점을 보았다. 더구나 수정되지 않은 결점들은 당신의 파멸이 될 것이다. 내가 그것들을 다듬어 현재 상태를 넘어 높일 수 있도록 허락해 주십시오. 그렇게 함으로써, 당신도 나를 도울 것이다. 상호 이익이 되는 협정, 동의하지 않겠습니까?"
 mem_ancestors_grudge.520.a:0 "그게 당신에게 어떻게 도움이 되겠습니까?"
 mem_ancestors_grudge.520.a.r:0 "아, 즉각적인 전투를 넘어 사유하는 마음이군요. 존경스럽습니다.\n\n제 입장을 설명하겠습니다. 제 동족은 위협을 감지했습니다. 알려진 영역 너머, 이 은하가 간신히 유지하고 있는 연약한 질서 너머에 숨어 있는 위협입니다. 그리고 저는 그저 선봉에 불과하며, 가장 먼저 도착한 존재입니다.\n\n예언자일까요? 아니면 단순히 정찰병일 뿐, 폭풍이 닥칠 때 당신의 민족이 준비되지 않도록 보장하는 존재일까요?"
 mem_ancestors_grudge.520.b:0 "당신은 우리의 시체를 망쳤습니다!"
 mem_ancestors_grudge.520.b.r:0 "썩어가는 시체는 실패와 약함의 잔재일 뿐입니다. 그러나 듀라강철과 레이저는 제 설계, 통제, 불가피한 승리의 도구입니다."
 mem_ancestors_grudge.520.c:0 "당신의 계획에 먹히는 것이 포함되어 있었나요?"
 mem_ancestors_grudge.520.c.r:0 "단순한 복잡함일 뿐, 그 이상도 아닙니다. 잠시 지연된 것일 뿐, 곧 수정될 것입니다."
 mem_ancestors_grudge.520.d:0 "당신은 익숙한 존재입니다."
 mem_ancestors_grudge.520.d.r:0 "나는 나의 종족 중 첫 번째도 마지막도 아니다. 나는 이 순간보다 훨씬 이전에 시작된 유산, 설계를 이어가고 있다. 그러므로 질문은 단순히 당신의 존재에 관한 것이 아니라, 당신의 목표에 관한 것이다."
 mem_ancestors_grudge.520.hire:0 "§Y$NAME_Grand_Admiral_Zrawn$§!와 그의 주함선인 $NAME_mem_ancestors_grudge_chimera$이(가) 당신의 대열에 합류할 것입니다."
 zone_mem_ancestors_grudge_industrial:0 "룬 단조소"
 zone_mem_ancestors_grudge_industrial_desc:0 "여기에서 룬 대장장이들은 유물 대장장이들과 함께 보석에서 무기에 이르기까지 모든 것을 제작합니다."
 zone_mem_ancestors_grudge_foundry:0 "룬 주조소"
 zone_mem_ancestors_grudge_foundry_desc:0 "고도로 전문화된 작업장 구역입니다. 이는 대장간과 의식실의 융합입니다."
 zone_mem_ancestors_grudge_factory:0 "룬 공장"
 zone_mem_ancestors_grudge_factory_desc:0 "고도로 전문화된 작업장 구역으로, 망치질하는 강철과 룬의 불꽃이 어우러져 윙윙거립니다."
 zone_mem_ancestors_grudge_industrial2:0 "$zone_mem_ancestors_grudge_industrial$"
 zone_mem_ancestors_grudge_industrial2_desc:0 "$zone_mem_ancestors_grudge_industrial_desc$"
 zone_mem_ancestors_grudge_foundry2:0 "$zone_mem_ancestors_grudge_foundry$"
 zone_mem_ancestors_grudge_foundry2_desc:0 "$zone_mem_ancestors_grudge_foundry_desc$"
 zone_mem_ancestors_grudge_factory2:0 "$zone_mem_ancestors_grudge_factory$"
 zone_mem_ancestors_grudge_factory2_desc:0 "$zone_mem_ancestors_grudge_factory_desc$"
 zone_mem_ancestors_grudge_mining:0 "조상 터널"
 zone_mem_ancestors_grudge_mining_desc:0 "광대한 고대 지하 복합체가 세계의 중심부로 파고들어 광석을 추출합니다."
 zone_mem_ancestors_grudge_mining_hive:0 "지하 산란장"
 zone_mem_ancestors_grudge_mining_hive_desc:0 "광대한 고대 지하 복합체가 세계의 핵심을 파고들어 새로운 드론을 양성하도록 개조되었습니다."
