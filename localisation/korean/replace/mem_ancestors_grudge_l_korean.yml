 situation_mem_ancestors_grudge_dranir_ratmen_invasion:0 "버민플러드"
 situation_mem_ancestors_grudge_dranir_ratmen_invasion_desc:0 "대규모의 쥐인간들이 식민지를 덮치고 있습니다. 그들의 침입은 어디에서든 시작될 수 있으며, 그 수는 끝이 없어 보입니다. 그들의 기술은 초록색으로 빛나는 결정에 의해 구동되는 것 같으며, 이는 전투에서 그들을 광란으로 몰아넣습니다."
