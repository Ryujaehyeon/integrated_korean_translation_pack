 tech_mem_ancestors_grudge_robot_traits:0 "룬 골렘 숙련"
 tech_mem_ancestors_grudge_robot_traits_desc:0 "우리 제작자들이 한때 지니고 있던 잃어버린 지식의 마지막 조각. 이제 우리 자신을 재창조할 시간이 왔습니다."
