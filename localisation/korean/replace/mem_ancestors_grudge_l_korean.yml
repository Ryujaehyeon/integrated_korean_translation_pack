 tech_repeatable_mem_ancestors_grudge:0 "고대 합금 연구"
 tech_repeatable_mem_ancestors_grudge_desc:0 "고대 합금 방법에 대한 지속적인 연구는 그들의 기술에 대한 더 나은 이해를 제공할 것입니다."
