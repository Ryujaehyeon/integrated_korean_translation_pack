 d_mem_ancestors_grudge_ruined_district:0 "£blocker£ 파괴된 구역"
 d_mem_ancestors_grudge_ruined_district_desc:0 "구획의 주거, 산업 및 상업 구역이 완전히 파괴되었습니다."
 d_mem_ancestors_grudge_ruined_stasis:0 "얼어붙은 조상"
 d_mem_ancestors_grudge_ruined_stasis_desc:0 "수천 명의 우리의 동족이 이 황폐한 세계의 잔해 아래에 있는 거대한 민방위 대피소에서 정지된 애니메이션 상태로 저장되어 발견되었습니다."
 d_mem_ancestors_grudge_ruined_stasis_robots:0 "묻힌 유닛"
 d_mem_ancestors_grudge_ruined_stasis_robots_desc:0 "수천 개의 우리의 설계로 새롭게 생산된 유닛들이 고대 생산 공장의 생존 구역에 저장되어 있습니다. 이 유닛들은 몰락 이전에 한 번도 활성화된 적이 없으며, 아직 성격 지침이 각인되지 않았습니다."
 d_mem_ancestors_grudge_feral_drones:0 "야생 드론"
 d_mem_ancestors_grudge_feral_drones_desc:0 "수천 개의 야생 드론이 선조 유적 아래에 거주하고 있습니다. 그들은 우리의 집단 정신의 일부는 아니지만, 우리 편으로 끌어들일 수 있습니다."
