 building_mem_ancestors_grudge_ruins:0 "유적"
 building_mem_ancestors_grudge_ruins_desc:0 "한때 위대한 건물들이었으나, 이제는 우리가 치워야 할 잔해일 뿐입니다."
 building_mem_ancestors_grudge_ruins_effect:0 "\n§L업그레이드하여 제거하세요!§!\n"
