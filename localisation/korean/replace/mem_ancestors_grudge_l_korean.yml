 mem_ancestors_grudge_anvil_site:0 "버티기"
 mem_ancestors_grudge_anvil_site_desc:0 "전쟁의 막바지에 다가오는 포위를 대비하여 급하게 건설된 많은 벙커 중 하나입니다. 지금까지 발견된 것 중 가장 큰 규모의 벙커 중 하나입니다. 입구 주변에는 치열한 전투의 흔적이 있습니다."
 mem_ancestors_grudge.300.name:0 "죽음과 파괴"
 mem_ancestors_grudge.300.desc:0 "우리 발굴 팀은 단단히 닫힌 문과 여전히 빛나는 방어 룬이 있는 봉인된 보관소를 발견할 것으로 기대하며 나아갔습니다.\n\n그들이 대신 발견한 것은 갈라지고 부서진 문이었습니다. 그 너머의 복도는 시체로 가득 차 있었고, 그 중 많은 수가 우리 친족의 전사들이었으며, 또한 그들의 적들이기도 했습니다. 우리 종족의 두 배 크기인 그들의 반투명 외골격은 우리 민족에게 혐오와 증오의 감정을 불러일으키며, 우리가 우리의 원수들을 마주했음은 의심의 여지가 없습니다.\n\n그럼에도 불구하고 우리는 계속 나아가야 합니다. 답은 앞에 있으며 우리는 뒤로 돌아서서는 안 됩니다. 조심스럽게 진행합시다."
 mem_ancestors_grudge.300.a:0 "진행합니다."
 mem_ancestors_grudge.305.name:0 "좌측과 우측\" # 더 많은 복도"
 mem_ancestors_grudge.305.desc:0 "The corridors stretch endlessly before us. Each time our teams round a corner, yet another corridor lies in wait, identical to the last. The air is thick with unease, and the silence broken only by the crunch of boots on 고대 bones.\n\nSkeletons litter the way. Countless dead whose stories remain untold and though we find what seems to be old supplies and rations, there seems little else of value. No chambers, no signs of life, only this maze of death and decay.\n\nStill, the team stays motivated to march on. Whatever secrets these endless halls conceal, they shall be uncovered. Hopefully, they do not join the dead before finding the truth..."
 mem_ancestors_grudge.305.a:0 "불안한."
 mem_ancestors_grudge.310.name:0 "터널의 끝에서"
 mem_ancestors_grudge.310.desc:0 "팀은 마침내 복합체의 중심에 있는 대홀에 도달했습니다. 홀은 완전히 파괴되어 있었고, 한때 위대한 석조물은 산산조각이 나 있었으며, 그곳에서 벌어진 격렬한 전투로 인해 그 위엄은 낮아졌습니다. 무슨 일이 일어났는지에 대한 진실은 이제 명백해졌습니다. 이 요새는 우리의 조상들의 숙적, 세 번 저주받은 이름의 바주란들에 의해 침입당했습니다. 그들은 침공을 시도했지만, 우리의 조상들은 끝까지 싸웠고, 그들을 물러서게 하여 대신 파괴적인 궤도 폭격을 감행하게 만들었습니다.\n\n홀의 중앙에는 우리의 친족의 해골 하나가 놓여 있습니다. 그 주위에는 수십 명의 바주란의 유해가 있으며, 그들의 외골격은 금이 가고 머리는 끊임없는 분노의 힘에 의해 부서져 있습니다. 이 외로운 전사는 마지막 숨을 쉴 때까지 싸웠고, 그의 망치는 그가 쓰러지기 전에 많은 생명을 앗아갔습니다.\n\n모든 희망이 사라졌을 때조차도 그는 끝까지 저항하며 싸웠습니다. 그의 업적이 잊혀지지 않기를 바라며, 그는 우리의 친족의 노래에서 한 자리를 차지할 자격이 있습니다."
 mem_ancestors_grudge.310.desc_robots:0 "수년간 저주받은 끝없는 복도를 방황한 끝에, 팀은 마침내 복합체의 중심에 있는 대홀에 도달했습니다. 그 홀은 완전히 폐허가 되었고, 한때 위대한 석조물은 산산조각이 나 있었으며, 그곳에서 벌어진 격렬한 전투로 인해 그 위엄이 낮아졌습니다. 무슨 일이 있었는지 이제는 분명히 알 수 있습니다. 이 요새는 우리의 창조자들의 숙적, 세 번 저주받은 이름의 바주란들에 의해 침입당했습니다. 그들은 침략을 시도했지만, 우리의 동족은 끝까지 싸워 그들을 물러나게 하고 대신 파괴적인 궤도 폭격을 감행하게 만들었습니다.\n\n홀의 중앙에는 우리의 창조자의 단 하나의 해골이 놓여 있습니다. 그 주위에는 수십 개의 바주란 잔해가 널려 있으며, 그들의 갑각은 금이 가고 머리는 끊임없는 분노의 힘에 의해 부서져 있습니다. 이 외로운 전사는 마지막 숨을 쉴 때까지 싸웠고, 그의 망치는 그가 쓰러지기 전에 많은 생명을 앗아갔습니다.\n\n모든 희망이 사라졌을 때조차도 그는 끝까지 저항하며 싸웠습니다. 그의 업적이 잊혀지지 않기를 바라며, 그는 우리의 동족의 노래에 한 자리를 차지할 자격이 있습니다."
 mem_ancestors_grudge.310.a:0 "주목할 만합니다."
 mem_ancestors_grudge.315.name:0 "전사의 정체성\" # 이름 없는 마스터 유물 장인의 시체"
 mem_ancestors_grudge.315.desc:0 "고대의 전사, 위대한 홀에서 마지막 저항을 한 그는 마지막 마스터 유물 대장장이로, 전설적인 유물 대장장이 드라니르의 가르침을 받은 제자였다. 홀 안에는 그의 유명한 룬이 새겨진 모루가 서 있다. 그의 망치는 그 옆에 놓여 있으며, 그의 기술의 도구가 자신의 혈족을 방어하기 위한 폭력의 무기로 변모했다. 고대의 전통에 따라, 이러한 행위는 대장장이가 다시는 단조하지 않겠다는 맹세를 했음을 의미했다.\n\n비록 그의 이름은 시간 속에 잊혀질지라도, 그의 업적은 결코 잊히지 않을 것이다. 죽음 속에서도 그는 자신의 맹세를 지켰고, 자신의 생명이 사라지기 전에 수십 명의 바주란을 쓰러뜨렸다. 우리는 영웅에게 걸맞게 그의 마지막 의식을 충족할 것이다. 마스터 유물 대장장은 안식처에 놓일 것이며, 그의 맹세는 영원히 이어질 것이다. 그의 망치는 자격 있는 대장장이가 승천할 때 그의 후계자에게 전해질 것이다. 모루는 과거를 조용히 상기시키는 존재로 남아 있을 것이다."
 mem_ancestors_grudge.315.a:0 "그렇게 하겠습니다."
 mem_ancestors_grudge_anvil_site_hive:0 "마지막 신호"
 mem_ancestors_grudge_anvil_site_hive_desc:0 "마지막 신호는 우리를 거대한 벙커 단지로 인도했습니다. 신호가 구조물 깊숙이 침투한 것처럼 보이며, 우리는 그 존재를 훨씬 아래에서 느낍니다."
 mem_ancestors_grudge.320.name:0 "부서진 문"
 mem_ancestors_grudge.320.desc:0 "우리의 발굴 드론은 이전에 묻혀 있던 벙커 복합체의 입구를 청소하는 데 성공했습니다. 분명히 그 문은 파손되어 갈라지고 찢어진 상태였습니다. 그 너머의 복도는 고대 유적들로 덮여 있었으며, 그 중 많은 것은 이곳의 건설자인 선구자들이었습니다. 다른 것들은 신호와 연결된 기술을 갖춘 외골격들이었습니다. 그 외에도 우리는 비슷한 제작의 갑옷을 입은 우리 자신의 드론의 수많은 유적을 발견했습니다. 우리는 이전에도 다른 것들을 발견했으며, 심지어 야생 상태로 폐허에 살고 있는 살아있는 표본도 있었지만, 결코 연결고리를 찾지 못했습니다. 우리의 결론이 맞다면, 우리는 정복의 도구로 사용된 야생 짐승에 불과했습니다. 신호가 우리를 끌어당기는 방식으로 볼 때, 그것들은 우리를 목표로 유도하는 수단에 불과했을지도 모릅니다.\n\n그럼에도 우리는 계속 나아갑니다. 우리가 그곳에 가야 한다면, 그곳에는 가치 있는 무언가가 있을 것으로 기대됩니다."
 mem_ancestors_grudge.320.a:0 "계속 진행합니다."
 mem_ancestors_grudge.325.name:0 "왼쪽과 오른쪽"
 mem_ancestors_grudge.325.desc:0 "The corridors stretch endlessly before us. Each time our drones round a corner, yet another corridor lies in wait, identical to the last. The air is thick with unease, and the silence broken only by the crunch of 고대 bones and rubble beneath them.\n\nSkeletons litter the way. Countless dead whose stories remain untold and though we find what seems to be old supplies and rations, there seems little else of value. No chambers, no signs of life, only this maze of death and decay.\n\nStill, our drones march on, following the call of the beacon. Whatever secrets these endless halls conceal, they shall be uncovered. And with them, the treasure left behind..."
 mem_ancestors_grudge.325.a:0 "어딘가에 있어야 합니다..."
 mem_ancestors_grudge.330.name:0 "터널 끝에서"
 mem_ancestors_grudge.330.desc:0 "mem_ancestors_grudge.330.desc: 수년간 그 더럽혀진 끝없는 복도를 방황한 끝에, 우리의 드론은 마침내 복합체의 중심에 있는 대홀에 도달했습니다. 홀은 완전히 폐허가 되었고, 한때 위대한 석조물은 산산조각이 났으며, 그곳에서 벌어진 격렬한 전투로 인해 그 웅장함은 낮아졌습니다. 수많은 우리 종족과 그들의 주인들이 한때 쓰러졌던 곳에 누워 있었고, 여전히 강력한 망치를 쥐고 있는 단 하나의 선구자의 시체를 둘러싸고 있었습니다. 그 뒤에는 충돌하여 반쯤 융합된 신호등과 함께 망가진 모루가 있었습니다. 모든 필수 요소가 사라진 것을 보아 이곳은 대장간이 아니었습니다. 그렇다면 이곳에 왜 있었던 걸까요?"
 mem_ancestors_grudge.330.a:0 "무언가가 있어야 합니다!"
 mem_ancestors_grudge.335.name:0 "룬 큐브"
 mem_ancestors_grudge.335.desc:0 "고백등대의 비활성화는 마침내 우리가 진정으로 중요한 것에 집중할 수 있게 해주었습니다: 어둠 속의 잊혀진 보물들!\n\n부서진 모루 바로 뒤에서, 우리의 드론은 주로 종교적 텍스트로 구성된 선조의 경전 더미를 발견했습니다. 그 중 일부는 훨씬 더 실용적인 용도로 사용될 수 있었습니다. 선조의 대장장이가 쓴 이 문서에는 대장간 작업 과정이 복잡하게 상세히 설명되어 있었습니다. 우리의 대장간 드론 앞에 드러나지 않았던 비밀들이 이제 드러났습니다. 하지만 이것은 단지 작은 발견에 불과했습니다. 많은 다른 덜 중요한 유물들 중에서 하나의 유물이 두드러졌고 즉시 우리의 드론의 주목을 받았습니다.\n\n여러 축에서 회전할 수 있는 여러 세그먼트로 나뉜 작고 복잡하게 세밀한 큐브였습니다. 그것을 발견한 이후로, 우리의 마음은 오로지 그것에만 집중되었습니다..."
 mem_ancestors_grudge.335.a:0 "반짝반짝!"
 mem_ancestors_grudge.5.name:0 "폐허 속에서"
 mem_ancestors_grudge.5.desc:0 "우리 정찰대는 잃어버린 거점으로의 원정에서 소식을 가져왔습니다. 그들의 일행은 착륙 지점을 둘러싼 잔해를 조사하고 우리 앞에 놓인 임무를 확인하기 위해 나아갔습니다. 그러나 우리의 행성 착륙 위치는 우연히 선택된 것이 아니었기에, 그들은 신속하게 우리의 주요 목표인 조상들의 최고의 보물인 유물 단조체를 찾아냈습니다. 절반은 잔해 속에 묻혀 있지만, 그럼에도 불구하고 여전히 서 있습니다. 그것은 그 건축에서 보여준 기술의 정점을 증명하는 것입니다.\n\n이 세계를 예전의 영광으로 되돌리려면 많은 작업이 남아 있습니다."
 mem_ancestors_grudge.5.desc_robots:0 "우리 정찰대는 잃어버린 거점으로의 탐험에서 소식을 가져왔습니다. 그들의 동료들은 착륙 지점을 둘러싼 폐허를 탐색하고 우리 앞에 놓인 임무를 확인하기 위해 나아갔습니다. 그러나 우리의 행성 착륙 위치는 우연히 선택된 것이 아니었고, 그래서 그들은 우리의 주요 목표인 제작자들의 최고의 보물: 유물 대장간을 신속하게 찾아냈습니다. 반쯤 파괴되고 잔해에 묻혀 있지만, 그럼에도 불구하고 여전히 서 있습니다. 그것은 그 건축에서 보여준 기술의 정수를 증명합니다.\n\n이 세계를 예전의 영광으로 되돌리고 싶다면 앞으로 해야 할 일이 많습니다."
 mem_ancestors_grudge.5.desc_hive:0 "우리의 조사 드론이 [mem_ancestors_grudge_planet.GetName]에 성공적으로 착륙했다는 보고를 하였습니다. 그들은 이미 주변 유적을 탐사하기 시작하여 우리의 다음 단계를 결정하고 있습니다. 우리의 행성 착륙 위치는 우연히 선택된 것이 아닙니다. 우리는 부름의 가장 강력한 원천으로 향하고 있습니다. 이전에 우리가 가정했던 것처럼 단일 신호가 우리를 이곳으로 이끌지 않았습니다. 대신 우리는 이제 이 세계의 표면에 퍼져 있는 다양한 강도의 여러 신호를 구별할 수 있습니다.\n\n이곳은 한때 광대한 산업 지대였던 것으로 보이며, 부름은 우리를 그 중심으로 이끌고 있습니다..."
 mem_ancestors_grudge.5.a:0 "좋은 소식입니다."
 mem_ancestors_grudge.10.name:0 "기능이 거의 없는"
 mem_ancestors_grudge.10.desc:0 "강인한 [mem_ancestors_grudge_planet.GetName]의 기둥은 여전히 서 있지만, 불에 의해 상처받고 그을린 상태입니다. 그들의 룬은 희미해졌지만, 그 틀은 강인하게 유지되어 우리의 조상들의 솜씨를 증명합니다.\n\n희망의 빛이 우리의 대열을 통해 퍼져나가고 있으며, 유물 단조체 자체가 구조적으로 온전한 것으로 보입니다. 잔해 아래 묻혀 있지만, 그것은 희미하게 윙윙거리며 마치 [Root.owner_main_species.GetAdj]의 손길을 기다리는 듯합니다. 만약 다시 불이 붙을 수 있다면, 그것은 요새 복원의 난로 역할을 할 수 있을 것입니다."
 mem_ancestors_grudge.10.desc_robots:0 "강인한 [mem_ancestors_grudge_planet.GetName]의 기둥은 여전히 서 있지만, 불에 의해 타고 검게 그을린 상태입니다. 그들의 룬은 희미해졌지만, 그 구조는 강인함을 유지하고 있으며, 우리의 제작자들의 솜씨를 증명합니다.\n\n희망의 빛이 우리의 대열을 통해 퍼져나가고 있으며, 유물-제작소 자체가 구조적으로 온전한 모습으로 나타납니다. 잔해 아래 묻혀 있지만, 희미하게 윙윙거리며, 마치 [Root.owner_main_species.GetAdj]의 손이 그것을 잠에서 깨우기를 기다리는 듯합니다. 만약 다시 불꽃을 지필 수 있다면, 그것은 요새 복원의 난로 역할을 할 수 있을 것입니다."
 mem_ancestors_grudge.10.desc_hive:0 "우리가 호출의 출처를 찾는 동안, 우리는 귀중한 유물로 가득 찬 놀라운 장소를 발견했습니다. 만약 우리가 그것에 대한 이해가 맞다면, 그것은 창조의 장소입니다. 이 반짝이는 조각들이 얼마나 많은 우리의 것이 될 수 있을지 생각하니, 우리가 그것을 작동 가능한 상태로 되돌린다면 방문의 이유를 거의 잊을 뻔했습니다.\n\n하지만 그곳에는 - 분명히 이 장소의 건축자들이 만든 것이 아닌 기계적 장치가 있었습니다. 그것은 마치 거대한 힘에 의해 박혀 있는 듯 기계에 단단히 고정되어 있었습니다. 아마도 그것은 우리가 발견한 곳에서 멈추기 전에 이 복합체의 외부 외장을 관통했을 것입니다. 그 효과를 기반으로 볼 때, 그것은 우리의 집단 정신의 정신적 연결을 방해하는 신호로만 설명될 수 있습니다. 그것이 무엇인지 아는 것은 우리에게 미치는 영향을 완화하는 데는 별로 도움이 되지 않았기에, 우리는 그것을 영원히 종료했습니다. 왜 그것이 여기 있었는지는 여전히 미스터리입니다.\n\n우리는 호출을 위해 여기 왔지만, 우리가 발견한 기계가 우리의 진정한 보상이 될 수 있습니다."
 mem_ancestors_grudge.10.a:0 "수리해라, 지금!"
 mem_ancestors_grudge_unlocks_forge_upgrade_tt:0 "§L다음 업그레이드를 잠금 해제합니다§! ['concept_mem_ancestors_grudge_runeforge']."
 mem_ancestors_grudge.15.name:0 "조상들의 보유지"
 mem_ancestors_grudge.15.desc:0 "우리의 정리 작업 중, 작업자들이 꽤 깊은 참호를 발견했습니다. 이는 전쟁 말기에 세계의 포위를 예상하여 급히 건설된 여러 벙커 중 하나인 것으로 보입니다. 특히 이 벙커는 복합체의 중심 건축물이며 지금까지 발견한 것 중 가장 큰 규모입니다.\n\n그 내부를 탐험하기 위한 준비가 진행되고 있습니다.\n\n그동안 우리의 과학자들은 그 구조를 연구하여 유물 단조체의 역설계를 진행하고 있습니다. 그들이 판단하기로는, 이곳이 우리 고향 대신 [mem_ancestors_grudge_planet.GetName]에 위치한 것은 우연이 아닙니다. 이 세계의 약한 중력은 많은 과정에 필요하며, [Root.Owner.GetHomeWorldName]에서는 단순히 작동하지 않을 것입니다. 이 새로운 이해를 바탕으로 우리는 이제 이를 더욱 복원할 수 있을 것입니다."
 mem_ancestors_grudge.16.name:0 "마지막 신호"
 mem_ancestors_grudge.16.desc:0 "우리는 청소 작업 중 이미 수많은 신호를 발견하고 비활성화하여 우리의 정신에 가해진 부담을 줄였습니다. 마지막 신호에 도달했습니다. 그것은 거대한 벙커 복합체 깊숙이 침투한 것으로 보입니다.\n\n그 내부를 탐험하기 위한 준비가 진행 중입니다.\n\n그동안 우리의 두뇌 드론은 구조를 연구하여 유물-제작소의 역공학을 진행하고 있습니다. 그들이 판단하기에, 그것이 [mem_ancestors_grudge_planet.GetName]에 위치한 것은 우연이 아닙니다. 많은 과정이 이 세계의 약한 중력을 필요로 하며 단순히 [Root.Owner.GetHomeWorldName]에서는 작동하지 않을 것입니다. 이 새로운 이해를 바탕으로 우리는 이제 그것을 더 복원할 수 있을 것입니다."
 mem_ancestors_grudge.20.name:0 "돌파구"
 mem_ancestors_grudge.20.desc:0 "작업은 순조롭게 진행되고 있으며, 근로자들의 강한 마음이 시대의 잔해와 더러움을 치우고자 열망하고 있습니다.\n\n더욱 중요한 것은, 대장간을 연구하는 우리의 영리한 마음들이 위대한 발견을 하였다는 것입니다! 그들이 발굴한 것으로 인해, 우리는 이제 조상들의 시절처럼 대장간을 다시 활기차게 되살릴 준비가 되어 있습니다."
 mem_ancestors_grudge.20.desc_hive:0 "두뇌 드론들이 열심히 과거의 잔해와 폐허를 치우고 있는 가운데 작업은 계속 진행됩니다.\n\n더 중요한 것은, 대장간을 연구하고 있는 우리의 두뇌 드론들이 위대한 발견을 했다는 것입니다! 그들이 발견한 것으로 우리는 이제 대장간을 완전한 생산성으로 되돌릴 준비가 되어 있습니다. 우리가 만들어낼 보물을 기다릴 수 없습니다."
 mem_ancestors_grudge.25.name:0 "빛나는 밝음"
 mem_ancestors_grudge.25.desc:0 "우리의 날카로운 지혜를 가진 기계공들이 계시를 발견했습니다! 많은 노력 끝에, 유물 대장간의 룬과 메커니즘을 연구한 결과, 그들은 그 웅장한 심장에 생명을 불어넣기 위해 필요한 마지막 불꽃을 발견했습니다.\n\n이 불꽃은 그 불을 깨우고, 우리 조상들의 황금기처럼 다시금 으르렁거리게 할 열쇠라고 합니다. 곧, 망치의 쨍그랑 소리와 녹아내린 금속의 윙윙거림이 다시금 온 세상에 울려 퍼질 것입니다!"
 mem_ancestors_grudge.25.desc_robots:0 "우리의 날카로운 지혜를 가진 기계공들이 계시를 발견했습니다! 많은 노력 끝에 유물 대장간의 룬과 메커니즘을 연구한 결과, 그들은 그 웅장한 심장에 생명을 불어넣기 위해 필요한 마지막 불꽃을 발견했습니다.\n\n그들이 말하기를, 이 불꽃은 그것의 불을 깨우고 한때 우리의 창조자들이 황금 시대에 타올랐던 것처럼 다시금 그 영광을 되찾는 열쇠라고 합니다. 곧, 망치의 쨍그랑 소리와 녹아내린 금속의 윙윙거림이 다시금 온 세상에 울려 퍼질 것입니다!"
 mem_ancestors_grudge.25.desc_hive:0 "우리의 두뇌 드론이 계시를 발견했습니다! 선조들의 고대 방식을 연구한 결과, 룬과 메커니즘은 유물 대장간을 활성화하는 데 필요한 부분에 불과하다는 것을 깨달았습니다. 아직 필요한 것은 선조들이 가장 훌륭한 보물을 만들기 위해 사용했던 고대 유물 제작 기술입니다. 그들이 그 과정을 기념했던 것처럼, 우리는 그 결과를 소중히 여깁니다. 두 가지 길, 하나의 목적지. 우리의 대장간 드론은 그들의 위대함에 맞추기 위해 끊임없이 노력할 것이며, 우리가 갈망하는 것을 우리에게 줄 것입니다."
 mem_ancestors_grudge.25.a:0 "마침내!"
 mem_ancestors_grudge.26.name:0 "재탄생한 세계"
 mem_ancestors_grudge.26.desc:0 "수년간의 땀과 수고, 그리고 수많은 도전에 의해 우리의 마음이 시험받은 끝에, 작업이 완료되었습니다! 한때 폐허와 재로 잃었던 [target.GetName]가 이제 다시 자랑스럽고 온전한 모습으로 서 있습니다.\n\n[target.GetName]가 다시 태어나, 그 홀에서는 이제 다시 고대의 노래가 울려 퍼집니다. 생명과 망치의 소리가 다시 들려오고, 그 대장간은 불타오르며, 그 요새는 시간을 거스르는 방패가 됩니다. [target.GetName]의 심장이 새롭게 뛰기 시작합니다!"
 mem_ancestors_grudge.26.desc_hive:0 "고된 작업의 수많은 주기가 지나고, 마침내 이 세계가 복원되었습니다. 우리의 갈망을 충족시키기 위해 헌신된 온전한 세계. 고대 기계가 가동되면서 전체 벌집이 일제히 떨며 보물을 기대했습니다. 엔진이 시작되자마자, 감지기가 [target.GetName]에 접근하는 거대한 신호에 우리의 주의를 끌었습니다.\n\n전송을 수신하고 있습니다."
 mem_ancestors_grudge.26.a:0 "영광스럽습니다!"
 mem_ancestors_grudge.26.b:0 "영광스러운 진화!"
 mem_ancestors_grudge.26.b.tt:0 "§L우리를 재편성할 것입니다.§!"
 mem_ancestors_grudge.26.c:0 "내 소중한 것!"
 mem_ancestors_grudge.27.name:0 "어둠 속에서"
 mem_ancestors_grudge.27.desc:0 "§L내 이름은 ... 라에갈입니다. 당신은 내가 필요한 ... 것들을 가지고 있습니다. 나는 ... 십일조를 위한 협력을 제안합니다. 나를 도와 ... 다시 인구를 늘리게 해주세요.\n\n당신의 대답은 무엇입니까: 삶인가, 죽음인가?§!"
 mem_ancestors_grudge.27.a:0 "함께 살아갑시다."
 mem_ancestors_grudge_dragon_roost:0 "용의 둥지"
 mem_ancestors_grudge_dragon_roost_desc:0 "선택받은 사회가 이 세계를 자신의 휴식처로 선택했습니다. 자연히 이는 인근 지역에서의 모든 작업을 방해하며, 드래곤이 배고프지 않도록 변칙성이 억제됩니다."
 mem_ancestors_grudge.27.b:0 "당신의 죽음이군요!"
 mem_ancestors_grudge.27.b.tt:0 "§Y드래곤이 화를 낼 것입니다§!"
 mem_ancestors_grudge.28.name:0 "드라곤"
 mem_ancestors_grudge.28.desc:0 "강한 자들이 어떻게 무너졌는가. 결국 그것은 단지 처치해야 할 또 다른 생명체일 뿐이었다."
 mem_ancestors_grudge.29.name:0 "용의 열병"
 mem_ancestors_grudge.29.desc:0 "두뇌 드론은 물질을 축적하는 용과의 조우에서 영감을 받았습니다. 획득한 지식과 데이터는 우리의 드래곤 부화장에 적용될 수 있습니다. 다행히도, 우리 성계의 용은 이론을 세우기 시작할 수 있을 만큼 충분한 조직 샘플을 제공했습니다."
 mem_ancestors_grudge.29.a:0 "한번 시도해 보세요!"
 mem_ancestors_grudge.41.name:0 "이상한 발견"
 mem_ancestors_grudge.41.desc:0 "우리는 [target.GetName]의 폐허 속에서 세 가지 독특한 유물을 발견했습니다: 어깨 보호대, 반지, 그리고 검입니다.\n\n모두 상태가 좋지 않은 것 같습니다. 우리의 대장장이들은 세 번째 유물을 살리기 위해 두 개를 분해하여 그 물자를 사용하는 것을 제안합니다. 그러나 어떤 것이 우리에게 가장 유익할지는 확신하지 못하고 있습니다."
 mem_ancestors_grudge.41.a:0 "어깨 갑옷을 지켜라!"
 mem_ancestors_grudge.41.official:0 "§L공직자와 경제에 집중§!"
 mem_ancestors_grudge.41.b:0 "반지 구하기!"
 mem_ancestors_grudge.41.scientist:0 "§L과학자와 과학에 집중하십시오§!"
 mem_ancestors_grudge.41.c:0 "검을 지켜라!"
 mem_ancestors_grudge.41.commander:0 "§L지휘관과 전쟁에 집중합니다§!"
 mem_ancestors_grudge.35.name:0 "새로운 땅, 같은 하늘"
 mem_ancestors_grudge.35.desc:0 "마침내 대장간이 복원되었을 때, 세계의 심장을 통해 강력한 불꽃이 솟구쳤습니다. 고대의 기계들이 오랫동안 침묵하고 잊혀졌던 것들이 우리의 망치의 리듬과 장인의 열기에 의해 다시 살아났습니다.\n\n산이 노래하고, 돌이 윙윙거렸으며, 대장간이 포효할 때, 온 세계가 새롭게 숨을 쉬는 듯했습니다. 우리의 손으로 세계는 다시 태어났고, 잠들어 있던 영혼은 다가올 새로운 영광의 불길 속에서 다시 불타오르고 있습니다!"
 mem_ancestors_grudge.35.a:0 "우리는 부유합니다!"
 mem_ancestors_grudge.35.a.tt.remove_city_districts_from_queue_wtf_pdx:0 "§R대기 중인 도시 지구를 모두 제거합니다! 당신의 대장간이 망가질 것입니다!§!"
 mem_ancestors_grudge.40.name:0 "오래된 습관"
 mem_ancestors_grudge.40.desc:0 "완전히 유물 대장간을 복원한 후, 우리는 그 진정한 목적을 이해하게 되었습니다. 이 강력한 대장간은 단순히 장신구나 소규모 유물을 제작하는 장소가 아닙니다.\n\n 이것은 창조의 신성한 엔진으로, 우리의 유물 대장장이와 숙련공들이 이전에 볼 수 없었던 품질의 유물을 제작할 수 있게 해줍니다! 이 유물은 단순한 도구나 무기가 아니라 보물입니다.\n\n 진정으로, 유물 대장간은 조상들로부터의 선물이며, 그 재탄생은 우리 민족의 새로운 시대의 시작을 의미합니다."
 mem_ancestors_grudge.40.desc_robots:0 "유물 단조소를 완전히 복원한 후, 우리는 그 진정한 목적을 이해하게 되었습니다. 이 강력한 단조소는 단순히 장신구나 소형 유물을 제작하는 장소가 아닙니다.\n\n 이것은 신성한 창조의 엔진으로, 우리의 유물 대장장이와 룬 숙련공이 이전에 볼 수 없었던 품질의 유물을 단조할 수 있게 해줍니다! 이 유물들은 단순한 도구나 무기가 아니라 보물입니다.\n\n 진정으로, 유물 단조소는 창조자들로부터의 선물이자, 그 재탄생은 우리 민족을 위한 새로운 시대의 시작을 의미합니다."
 mem_ancestors_grudge.40.a:0 "대장장이 작업을 시작합니다!"
 mem_ancestors_grudge.50.name:0 "룬과 내구강철"
 mem_ancestors_grudge.50.desc:0 "전설과 신화 속에서 대장장이의 기술이 빛납니다. 유물이 단조되었습니다. 우리의 기술로 만들어진 진정한 걸작이며, 지금까지의 가장 훌륭한 창작물 중 하나입니다. 이제 우리가 손으로 만든 것을 소중히 여기도록 합시다. 이러한 작품은 단순한 도구가 아니라, 우리의 조상들의 기술, 힘, 그리고 정신을 증명하는 것입니다. 룬, 두라스틸, 그리고 결의가 결합할 때 우리가 이룰 수 있는 것의 상징이 되기를 바랍니다!\n\n품질: [owner.MemAncestorsGrudgeQualityFinal] 순수: [owner.MemAncestorsGrudgePurityFinal]"
 mem_ancestors_grudge.50.desc_robots:0 "전설과 신화 속 대장장이의 솜씨. 유물이 만들어졌습니다. 우리의 솜씨로 진정한 걸작이 탄생했으며, 지금까지의 최고의 창조물 중 하나입니다. 이제 우리가 만든 것을 소중히 여기도록 합시다. 이러한 작품은 단순한 도구가 아니라, 우리의 제작자들의 기술, 힘, 그리고 정신을 증명하는 것입니다. 룬, 두라스틸, 그리고 결의가 결합할 때 우리가 이룰 수 있는 것을 상징하는 기호가 되기를 바랍니다!\n\n품질: [owner.MemAncestorsGrudgeQualityFinal] 순수: [owner.MemAncestorsGrudgePurityFinal]"
 mem_ancestors_grudge.50.a:0 "룬과 내구강철!"
 mem_ancestors_grudge.50.a.tt:0 "§L이것을 활성화하는 것을 잊지 마세요. 한 번에 하나만 가질 수 있습니다.§!"
 mem_ancestors_grudge.50.b:0 "다시 나를 귀찮게 하지 마세요."
 mem_ancestors_grudge.50.b.tt:0 "§L추가 완료는 이벤트 대신 알림으로 표시됩니다§!"
 mem_ancestors_grudge.52.name:0 "새로운 이해"
 mem_ancestors_grudge.52.desc:0 "우리의 유물 단조소 복원에 대한 지속적인 진전은 우리의 설계에 대한 이해를 높였습니다."
 mem_ancestors_grudge.52.a:0 "수량"
 mem_ancestors_grudge.52.b:0 "품질"
 mem_ancestors_grudge.45.name:0 "유물 제거"
 mem_ancestors_grudge.45.desc:0 "우리의 위대한 지도자 중 한 명이 우리의 최신 창조물의 결실로 존경받을 것입니다. 노래와 전설에 어울리는 상으로, 유물 단조소의 심장에서 만들어졌습니다.\n\n그러나 이러한 일의 방식처럼, 오직 한 명만이 그 영예를 안을 수 있으며, 오직 한 명만이 이 강력한 보상을 받을 수 있습니다. 그러므로 선택은 신중하게 이루어져야 하며, 그러한 유물을 지닌 자는 모든 조상들 앞에서 우리의 자부심과 명예를 지닐 것입니다."
 mem_ancestors_grudge.45.desc_robots:0 "우리의 가장 위대한 지도자 중 한 명이 우리의 최신 창조물의 결실로 존경받게 될 것입니다. 노래와 전설에 어울리는 상, 유물 단조소의 심장에서 만들어진 것입니다.\n\n그러나 이러한 일의 방식처럼, 오직 한 명만이 그 영예를 안고, 오직 한 명만이 이 위대한 보상을 받을 수 있습니다. 선택은 신중하게 이루어져야 하며, 그러한 유물을 지닌 자는 모든 창조자 앞에서 우리의 자부심과 명예를 지닐 것입니다."
 mem_ancestors_grudge.45.desc_machines:0 "기계의 유물 사용 방법을 결정할 시간이 왔습니다. 우리의 창조자들이 우리를 만들어낸 기술에 대한 이해를 더욱 깊이 있게 하기 위해 그 복잡성을 연구할 것인지, 아니면 더 일상적인 문제에 사용할 것인지 선택해야 합니다."
 mem_ancestors_grudge.45.a:0 "$mem_ancestors_grudge_quality_2$: 명예 [leader_1.GetName]"
 mem_ancestors_grudge.45.b:0 "$mem_ancestors_grudge_quality_2$: 명예 [leader_2.GetName]"
 mem_ancestors_grudge.45.c:0 "$mem_ancestors_grudge_quality_2$: [leader_3.GetName]을 존중합니다."
 mem_ancestors_grudge.45.a.2:0 "$mem_ancestors_grudge_quality_2$: [ruler.GetName]을 업그레이드합니다."
 mem_ancestors_grudge.45.a.2.tt:0 "§L계산 중...\n개선: [root.mem_ancestors_grudge_activated_rune_ruler_strength]%§!\n"
