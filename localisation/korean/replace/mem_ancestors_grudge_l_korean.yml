 mem_ancestors_grudge_zrawn_catchphrase:0 "내 목표를 달성하기 위해 필요한 모든 것을 할 것이며, 나의 길을 막는 것은 아무것도 허용하지 않을 것입니다."
 mem_ancestors_grudge_zrawn_backstory:0 "외계인 장교인 그랜드 제독 즈론은 눈에 띄는 푸른 피부와 붉은 눈, 각진 얼굴로 잘 알려져 있으며, 뛰어난 전략가이자 무자비한 전투 지휘관입니다. 그는 전쟁에서 승리를 거두기 위해서는 적을 알아야 한다고 믿습니다. 그래서 즈론은 자신의 적의 철학, 예술, 문화에 대한 이해에 헌신하고 있습니다."
