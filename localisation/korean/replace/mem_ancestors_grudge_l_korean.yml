 mem_ancestors_grudge_grudgebook:0 "가장 큰 원한"
 mem_ancestors_grudge_grudgebook_desc_short:0 "우리에게 가한 Vazuran의 잘못과 끔찍한 행위에 대한 긴 상세 목록입니다."
 mem_ancestors_grudge_grudgebook_desc_details:0 "이 끔찍한 바르주란의 위협이 끝남에 따라, 이 원한은 "갚아졌다"고 볼 수 있습니다."
