 tech_mem_ancestors_grudge_zarkin_doctrin:0 "자킨 교리"
 tech_mem_ancestors_grudge_zarkin_doctrin_desc:0 "확실히 공포의 교리로 알려진 이 교리는 뿌리 깊은 자르킨의 "공포에 의한 지배" 이론에 기반하고 있으며, 힘 자체보다는 압도적인 힘의 과시가 내부 보안과 종속 세계의 충성을 유지하는 가장 효과적인 수단이라는 주장을 담고 있습니다."
 tech_mem_ancestors_grudge_living_metal_works:0 "생체 금속 혁명"
 tech_mem_ancestors_grudge_living_metal_works_desc:0 "개방적인 룬 대장장이들은 새로 발견된 $sr_living_metal$에서 잠재력을 보았습니다."
 trait_mem_ancestors_grudge_robot_rune_golem:0 "룬 골렘"
