 mem_ancestors_grudge_dranir_hall_title:0 "별로의 여정"
 mem_ancestors_grudge_dranir_hall_desc:0 "오랫동안 별들은 우리의 전설에서 중심적인 부분이었습니다. 시간과 전쟁에 잃어버린 장소들. 우리의 전설에서 가장 중요한 별인 §Y드라니르 홀$mem_ancestors_grudge_dranir$§!은(는) 우리의 귀환을 기다리고 있습니다."
 mem_ancestors_grudge_dranir_khazad_dum_title:0 "신비로운 장소"
 mem_ancestors_grudge_dranir_khazad_dum_desc:0 "우리는 우주에서 발견할 수 있을 것이라고는 상상도 못했던 더 신비로운 장소를 발견했습니다. 우리는 그것을 더 조사해야 합니다."
