 situation_mem_ancestors_grudge_forge_repairs_desc_normal:0 "우리의 이전 산업 수도는 폐허가 되었습니다. 한때의 위대함의 그림자입니다. 이제 우리는 룬과 듀라강철의 자녀로서, 하나가 되어 부서진 것을 고치고 이 세상을 예전의 영광으로 되돌려야 합니다."
 situation_mem_ancestors_grudge_forge_repairs_desc_hive:0 "우리의 선조들이 남긴 폐허가 된 세계. 한때 가졌던 위대함의 그림자에 불과합니다. 그러나 폐허 속에서도 보물이 발견될 수 있습니다. 그것은 우리의 것이 될 것입니다."
