l_korean:
 astral_situation.55.desc:0 "$astral_rift_discovery_event_text$\n\n이전에는 아무것도 없던 곳에, 우리가 §Y[planet_rift_in_space.GetName]§!(이)라 부르는 수수께끼의 행성이 나타났습니다. 우리의 어떤 성도에도 이 행성이 이전에 존재했다는 기록은 없습니다.\n\n이곳에는 [Owner.GetPreFTLLower] 문명이 거주하고 있습니다.\n\n우리가 추정할 수 있는 최선의 설명은, 이 행성이 어떻게든 우리 우주 바깥에서 도착했다는 것입니다."
