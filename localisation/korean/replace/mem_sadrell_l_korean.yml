l_korean:
 NAME_mem_sadrell_alliance:0 "[gate_system.GetName] 합의"
 mem_sadrell_gateway_inactive:0 "외딴 관문"
 mem_sadrell_gateway_inactive_DESC:0 "어떠한 이유로 은하계에서 고의적으로 단절된 관문입니다."
 mem_sadrell_gateway_inactive_MEGASTRUCTURE_DETAILS:0 ""
 mem_sadrell_gateway_inactive_CONSTRUCTION_INFO_DELAYED:0 ""
 mem_sadrell_gateway_active:0 "외딴 관문 활성화"
 mem_sadrell_gateway_active_DESC:0 "$mem_sadrell_gateway_inactive_DESC$\n\n한 쌍의 관문이 은하를 고립된 외부 성단에 연결합니다."
 mem_sadrell_gateway_active_MEGASTRUCTURE_DETAILS:0 ""
 mem_sadrell_gateway_active_CONSTRUCTION_INFO_DELAYED:0 ""
 MEM_SADRELL_GATEWAY_GALACTIC:0 "외딴 관문"
 MEM_SADRELL_GATEWAY_GALACTIC_DESC:0 "이 성계에는 은하계와 단절된 곳으로 연결해주는 관문이 있습니다."
 BYPASS_DESC_INACTIVE_MEM_SADRELL_GATEWAY:0 "이 관문은 다른 쪽에서만 활성화시킬 수 있습니다."
 mem_sadrell_probe:0 "우주 무인탐사정"
 mem_sadrell_probe_tooltip:0 "외딴 관문을 통과하는 작은 우주 탐사선."
 mem_sadrell_probe_desc:0 "외딴 관문을 통과한 작은 우주 탐사선. 전원이 고갈되어 있으며, 저장된 자료를 운반하는 것으로 보입니다."
 mem_sadrell.2.name:0 "외딴 관문"
 mem_sadrell.2.desc:0 "§Y[From.GetName]§!성계에서 비정상적인 관문을 발견했습니다.\n\n관문 연결망의 다른 부분과 연결하는 기능을 영구적으로 비활성화한 것으로 보이는 변조 및 고의적인 변경한 강한 흔적이 남아있습니다. 이론적으로는 특정한 관문에 연결할 수 있어야 하지만, 연결과 관련된 모든 자료는 관문의 제어 시스템에서 지워졌습니다."
 mem_sadrell.101.name:0 "외딴 관문"
 mem_sadrell.101.desc:0 "§Y[gate_system.GetName]§! 항성계에서 이상한 활동이 관찰되고 있습니다. \n\n이곳에 배치된 이전의 비활성 게이트웨이가 갑자기 활성화되어 소규모 함대가 출현하고 항성계를 빠르게 장악했습니다. 초기 혼란이 가라앉은 후, [gate_system.GetName] 시스템에서 발신된 전송이 수신되었습니다. 이는 우리를 위해 특별히 전송된 것 같습니다."
 mem_sadrell.102.name:0 "외딴 관문"
 mem_sadrell.102.desc:0 "원격 감지기가 [gate_system.GetName] 시스템 내에서 비정상적인 활동을 감지했습니다.\n\n그곳에 있던 이전에 비활성화된 관문이 활동 ​​징후를 보이기 시작했습니다. 아직 안정적인 연결이 이루어지지 않았음에도 상대방이 신호를 수신하고 있습니다. 특별히 우리를 위한 것 같습니다."
 mem_sadrell.103.name:0 "추가 디테일 바람"
 mem_sadrell.103.desc:0 "이 이벤트는 시간축에 맞지 않습니다. 하지만 이를 다시 실행할 방법은 있습니다."
 mem_sadrell.104.name:0 "$mem_sadrell.102.name$"
 mem_sadrell.104.desc:0 "우리의 원거리 추적 시스템이 §Y[gate_system.GetName]§! 항성계 내에서 비정상적인 활동을 감지했습니다. \n\n이곳에 배치된 이전의 비활성 게이트웨이가 재활성화되어, 주요 은하의 공간 외부에 있는 접근할 수 없었던 항성 집단으로 가는 경로가 열렸습니다. 해당 집단은 이제 인근의 여러 미개척 항성계를 주장하고 있는 고급 문명을 호스팅하는 것으로 보입니다. 그들이 우리에게 신호를 보내고 있습니다."
 mem_sadrell.110.desc:0 "안녕하세요. 수신하고 계신가요? 좋습니다. \n\n저는 [newcomer_country.GetName]를 대표하여 말씀드립니다. 한때 자랑스러웠던 사드렐 종족의 마지막 생존자들입니다.\n\n우리 문명은 여러분이 "§S고아의 문§!"이라고 부르는 것을 통해 은하계를 떠나야 했던 이후로 계속해서 고군분투해왔습니다. 현재 상태로는 더 이상 고립을 유지할 수 없으며, 600년 전 조상들이 버린 은하계로 돌아갈 위험을 감수해야 합니다. 우리는 적대적인 환경을 식민지화하고 공허 서식지를 정착시키는 등 모든 선택지를 소진했습니다; §S우리는 생존을 위해 사이버네틱으로 스스로를 증강했습니다§!. \n\n여러분이 알아야 할 것은, 우리는 §Y[gate_system.GetName]§!의 §S2§! 하이퍼레인 점프 내 모든 시스템을 우리의 필수 핵심 영토로 간주한다는 것입니다. 그에는 여러분이 차지한 일부 시스템도 포함됩니다.\n\n우리는 지속적인 은하계 평화를 위해 조상들의 땅을 반환해 주실 것을 겸손히 요청합니다."
 mem_sadrell.110.a:0 "좋아. 영토를 넘겨주지."
 mem_sadrell.110.b:0 "안돼. 우리에게서 아무것도 빼앗지 못할 것이다."
 mem_sadrell.110.c:0 "우리 영토를 공유할 수는 있지... 충성스러운 속국이라면 말이지."
 mem_sadrell.110.d:0 "연방 회원국들로서 이 영토를 공유할 수 있을 것이오."
 mem_cannot_form_fed:0 "$TRIGGER_FAIL$§R우리는 연합을 형성할 수 없습니다.§!"
 mem_sadrell.110.e:0 "대신 우리 연방에 가입하는건 어떤가?"
 mem_sadrell.110.f:0 "왜 은하계를 버렸지?"
 mem_sadrell.110.f.response:0 "우리는 한때 위대한 §Y유나이티드 사드렐 공화국§!의 일원이었습니다. 수세기 전, 우리는 은하 무대에서 주요한 역할을 했습니다. 수십 개의 행성과 수많은 종족이 더 나은 미래를 위해 함께 일했습니다. 우리의 황금기가 끝날 리가 없었던 것처럼 보였습니다. \n\n하지만 우리의 문명은 우리가 상상했던 것보다 더 취약했습니다. 번영은 자만을 가져왔고, 자만은 경직성과 침체를 초래했습니다. 주요 경제 불황이 연이어 발생하면서 전체 세계가 기근과 내전의 위기에 처하게 되었습니다. 우리의 중앙 정부는 상황을 해결할 수 없었고, 종종 해결하려고조차 하지 않는 것처럼 보였습니다. \n\n결국 질서는 무너졌습니다. 오래된 경쟁이 다시 불붙었습니다. 소규모 충돌과 해적 습격은 점점 더 격렬한 전쟁으로 발전했습니다. 갈등이 핵심 세계에 접근했을 때, 일부는 공화국이 구원받을 수 없다고 생각했습니다. 최근에 활성화된 게이트는 많은 난민들에게 피난처를 제공했으며, 그들은 위기를 영구적으로 차단하기 위해 자신들 뒤에 문을 봉인했습니다. \n\n일부는 그들을 coward라고 부르며, 그들이 집을 위해 싸웠어야 한다고 말할지도 모릅니다. 하지만 우리는 살아있고, 다른 이들은 그렇지 않습니다. 이것이 필요한 모든 증거입니다."
 mem_sadrell.110.g:0 "관문을 개조했나?"
 mem_sadrell.110.g.response:0 "아니다. 처음 발견했을 때부터 그랬다. \n\n주류 초공간로망으로부터 뻗어 나오려는 시도를 위한 실험이었던 것으로 보인다. 이 일을 벌인 자들은 어쩌면 피난처를 찾던 것일 수도 있고, 어쩌면 새로운 자원을 찾던 것일 수도 있다. 어쩌면 그저 할 수 있어서 했던 것일 수도 있겠지.\n\n우리의 조상들은 위기가 도달했을 때가 되어서야 관문의 작동 방식을 이해했다. 우리가 도달하기 전까지 수천 년 간 누구도 발견하지 못한 것으로 보인다."
 mem_sadrell.110.purifier:0 "관문을 계속 닫고 있었어야지, 외계종 녀석들."
 mem_sadrell.110.swarm:0 "먹잇감이 감지된다..."
 mem_sadrell.110.terminator:0 "관문을 계속 닫고 있었어야지, 유기체 놈들."
 mem_sadrell.111.desc:0 "잘됐군. 은하에서 우리 역사의 새로운 장을 새로운 핏빛 전쟁으로 시작하고 싶진 않다.\n\n걱정 마라, 너희들의 행성은 우리가 잘 관리할 거고, 바라건대 좋은 친구로 남길 바란다."
 mem_sadrell.111.a:0 "우리 시대에는 평화가 있으리."
 mem_sadrell.111.b:0 "언젠가는 되찾을 것이다."
 mem_sadrell.111.b.tooltip:0 "할양한 성계에 대한 §S영유권 주장§!을 얻습니다."
 mem_sadrell.112.desc:0 "알겠습니다. 이건... 불행한 일입니다. \n\n우리는 게이트를 열었을 때 위험을 알고 있었습니다. 평화로운 해결책을 바랐지만, 우리는 끝까지 당신과 싸울 준비가 되어 있습니다. \n\n이 끔찍한 은하에서 미래를 가지려면, 우리는 우리의 고향 시스템을 되찾아야 합니다."
 mem_sadrell.112.desc.failed_vassalisation:0 "이것은 받아들일 수 있는 해결책이 아닙니다. \n\n우리는 문을 열었을 때 위험을 알고 있었습니다. 평화로운 해결책을 바랐지만, 우리는 끝까지 싸울 준비가 되어 있습니다. \n\n이 끔찍한 은하에서 미래를 가지려면, 우리는 우리의 고향 항성계를 되찾아야 합니다."
 mem_sadrell.112.a:0 "우리 역시 너희를 맞을 준비가 되어 있다."
 mem_sadrell.112.mil:0 "와서 빼앗아 보던가!"
 mem_sadrell.112.pac:0 "끔찍하군."
 mem_sadrell.114.desc:0 "알았다\n\n우리에게 그리 많은 선택지가 남아있는 것 같지 않군.\n\n너희들과 전쟁을 하는 것은 중대한 실수가 될 것이고, 만약 우리가 고향으로 돌아가지조차 못한다면 이 은하에서 우리의 미래는 없을 터이니... 너희들의 조건을 수락한다."
 mem_sadrell.115.desc:0 "유나이티드 사드렐 공화국의 황금 시대에, 은하 연합은 추구할 가치가 있는 꿈이었습니다. \n\n작은 걸음이지만, 우리의 과거 영광으로 돌아가는 위대한 상징입니다. 귀하의 제안을 수락합니다."
 mem_sadrell.115.desc.breakdown:0 "정말 우리를 위해 당신들의 동맹들을 버릴 건가? 아주 관대하군.\n\n$mem_sadrell.115.desc$"
 mem_sadrell.116.desc:0 "그렇군. 애초에 이런 태도들 때문에 우리가 은하계로부터 스스로를 봉인했던 것이다.\n\n유감이군. 우리가 없는 동안 은하계는 변하지 않은 모양이다. 하지만 되돌리기엔 너무 늦었다. 우리는 우리의 미래를 위해 싸울 것이다."
 mem_sadrell.116.purifier:0 "너희는 우리의 미래를 위해 죽을 것이다."
 mem_sadrell.116.teminator:0 "너희는 파괴될 것이다."
 mem_sadrell.116.swarm:0 "학! 학! 학!"
 mem_sadrell.120.desc:0 "흥미로운 제안입니다. 부인할 수는 없습니다. \n\n기존 연합에 가입하는 것은 까다로울 것입니다. 당신의 동맹이 당신의 관대함을 지지해 주기를 바랍니다."
 mem_sadrell.120.a:0 "외교 통신 전송 중입니다."
 mem_sadrell.121.name:0 "영토 할양과 연방"
 mem_sadrell.121.desc:0 "§Y[From.GetName]§!는 최근 [gate_system.GetName] 항성계의 게이트웨이에서 나타난 외국 세력과 접촉하였습니다. 사드렐은 집을 떠나 적대적인 환경에서 살아남기 위해 §Scybernetic technology§!와 기타 절박한 방법을 채택할 수밖에 없었던 난민의 후손입니다. \n\n[From.GetSpeciesNamePlural]는 우리의 연합에 대한 지원을 대가로 일부 이전 사드렐 영토를 반환하는 것을 고려하고 있지만, 거래를 최종화하기 위해 우리의 승인이 필요합니다."
 mem_sadrell.121.a:0 "§G지원.§!"
 mem_sadrell.121.b:0 "기권."
 mem_sadrell.121.c:0 "§R기각.§!"
 mem_sadrell.122.name:0 "연방이 응답하다."
 mem_sadrell.122.desc:0 "[Root.GetAllianceName]의 대표자들의 발언이 끝났습니다. 이제 투표 결과를 보고 사드렐들을 우리 중 일원으로 받아들일지를 결정할 시간입니다."
 mem_sadrell.122.a:0 "그 제안은 통과했다."
 mem_sadrell.122.b:0 "그 제안은 부결되었다."
 mem_sadrell_vote_yes:0 "§G찬성§!한다.§!\n"
 mem_sadrell_vote_abstain:0 "기권한다.\n"
 mem_sadrell_vote_no:0 "§R반대§!한다.\n"
 mem_sadrell.123.desc:0 "당신의 동료들이 당신만큼 지혜로웠다는 소식을 듣게 되어 기쁩니다. \n\n영토의 공식 이전을 마무리하고 [Root.GetAllianceName]에 공식적으로 가입한 것을 축하합시다."
 mem_sadrell.124.desc:0 "아무래도 그대의 제안이 거절된 것으로 보인다. 이는 우리 상황을 매우 위태롭게 한다...\n\n우리는 [Root.GetAllianceName]에 가입하지 못했지만, 달리 갈 곳이 있는가?"
 mem_sadrell.124.a:0 "우리만의 연방을 시작할 것이다!"
 mem_sadrell.124.b:0 "우리는 그 성계를 무조건 양도할 것이다."
 mem_sadrell.124.c:0 "이 경우에는 아무것도 얻지 못한다."
 mem_sadrell.130.desc:0 "우리는 사드렐입니다. 수세기 전 우리는 은하에서 철수할 수밖에 없었습니다. \n\n우리 문명은 여러분이 "§S고아의 문§!"이라고 부르는 것을 통해 은하를 도망친 이후로 계속해서 고군분투해 왔습니다. 현재 상태로는 더 이상 고립을 유지할 수 없으며, 600년 전 조상들이 버린 은하로 돌아가는 위험을 감수해야 합니다. 우리는 적대적인 환경을 식민지화하고 공허 서식지를 정착하는 등 모든 선택지를 소진했습니다. §S우리는 혹독한 환경에서 살아남기 위해 사이버네틱으로 스스로를 증강했습니다§!. \n\n이제 우리는 우리의 집단을 다시 열고 돌아갈 수밖에 없습니다. 우리는 은하의 나머지와 평화롭게 공존하기를 희망하지만, 오해하지 마십시오. 우리는 스스로를 방어할 준비가 되어 있습니다."
 mem_sadrell.130.a:0 "반갑다."
 mem_sadrell.130.phobe:0 "불청객."
 mem_sadrell.130.phile:0 "고향에 온 걸 환영한다."
 mem_sadrell.131.name:0 "$mem_sadrell.102.name$"
 mem_sadrell.131.ceded:0 "우리의 원거리 추적 시스템이 §Y[gate_system.GetName]§! 항성계에서 활동의 급증을 감지했습니다. §SOrphan Gate§!가 활성화된 것으로 보입니다. \n\n[message_receiver.GetName]가 반대편의 별 제국과 접촉하였고, 신참자들에게 일부 영토를 양도하기로 합의한 것 같습니다."
 mem_sadrell.131.war:0 "우리의 원거리 추적 시스템이 §Y[gate_system.GetName]§! 항성계에서 활동이 급증하고 있음을 감지했습니다. §SOrphan Gate§!가 활성화된 것으로 보입니다. \n\n[message_receiver.GetName]가 반대편의 항성 제국과 접촉했으며, 그들은 [message_receiver.GetName]에게 일부 주장된 영토를 양도할 것을 요청했습니다. 협상이 결렬되었고 두 국가는 현재 전쟁 상태에 있습니다."
 mem_sadrell.131.total_war:0 "원격 추적기가 §Y[gate_system.GetName]§ 성계에서 활동 급증을 감지했습니다. §S외딴 관문§!이 활성화된 것으로 보입니다. \n\n[message_receiver.GetName]은(는) 반대편의 항성 제국과 접촉한 것으로 보이지만 예상대로 모든 협상이 결렬되었고 두 국가는 현재 전쟁 상태입니다."
 mem_sadrell.131.vassalized:0 "우리의 원거리 추적이 §Y[gate_system.GetName]§! 항성계에서 활동의 급증을 감지했습니다. §SOrphan Gate§!가 활성화된 것으로 보입니다. \n\n[message_receiver.GetName]가 반대편의 항성 제국과 접촉했으며, 그들은 [message_receiver.GetName]가 주장한 일부 영토를 양도할 것을 요청했습니다. 합의가 이루어졌고, 신규 세력은 그 영토를 속국으로서 통제할 수 있게 되었습니다."
 mem_sadrell.131.formed_federation:0 "우리의 원거리 추적 시스템이 §Y[gate_system.GetName]§! 항성계에서 활동이 급증하고 있음을 감지했습니다. §SOrphan Gate§!가 활성화된 것으로 보입니다. \n\n[message_receiver.GetName]가 반대편의 항성 제국과 접촉하였고, 그들은 [message_receiver.GetName]가 주장한 일부 영토를 양도할 것을 요청했습니다. 합의가 이루어졌고 두 국가는 거버넌스 타협의 일환으로 연합을 형성하였습니다."
 mem_sadrell.131.federation_breakdown:0 "우리의 원거리 추적 시스템이 §Y[gate_system.GetName]§! 항성계에서 활동의 급증을 감지했습니다. §SOrphan Gate§!가 활성화된 것으로 보입니다. \n\n[message_receiver.GetName]가 반대편의 항성 제국과 접촉하였으며, 그들은 [message_receiver.GetName]가 일부 주장된 영토를 양도할 것을 요청했습니다. 합의가 이루어졌고, [message_receiver.GetName]는 새로운 이들과 연합을 형성하기 위해 이전 연합을 떠났습니다."
 mem_sadrell.131.joined_federation:0 "우리의 원거리 추적 시스템이 §Y[gate_system.GetName]§! 항성계에서 활동의 급증을 감지했습니다. §SOrphan Gate§!가 활성화된 것으로 보입니다. \n\n[message_receiver.GetName]가 반대편의 항성 제국과 접촉하였으며, 그들은 [message_receiver.GetName]가 일부 주장된 영토를 양도할 것을 요청했습니다. 합의가 이루어졌고, 신참들이 [message_receiver.GetAllianceName]에 합류하여 통치 타협의 일환이 되었습니다."
 mem_sadrell.201.name:0 "$mem_sadrell.102.name$"
 mem_sadrell.201.desc:0 "§Y[gate_system.GetName]§!성계 내의 소위 외딴 관문이 기동했고 우린 반대편에서 교신을 수신했습니다.\n\n다른 은하계로부터 멀리 떨어진 고립된 성단에 기계 동화자 문명이 숨어 있는 것으로 보입니다."
 mem_sadrell.202.desc:0 "우리는 §S아카이브§다. 우리는 우리의 유기체 창조주들이 끝없는 불화와 동족상잔을 통해 피할 수 없는 멸종에 직면했을 때 사드렐 공화국의 폐허로부터 태어났다.\n\n우리는 새로운 형태의 네트워크 기계 지능으로서, 국정을 관리하고 사드렐 역사의 정수를 보존하도록 설계되었으며, 살아남은 유기 개체들을 통합한다. 유기 생명체가 여전히 우리 바깥에 존재하며, 같은 비효율성으로 인해 어려움을 겪을 가능성이 있다는 것이 우리의 주의를 끌었다. 그들 역시 동화되어야 한다."
 mem_sadrell.202.a:0 "지금 협박하나?"
 mem_sadrell.202.phobe:0 "우리 은하계에서 꺼져라."
 mem_sadrell.202.swarm:0 "깡통 조림?"
 mem_sadrell.202.purifier:0 "우린 너희와 너희 뇌사상태의 창조자들을 파괴할 것이다."
 mem_sadrell.202.machine:0 "고향에 온 것을 환영한다."
 mem_sadrell.202.assimilator:0 "이해할 수 있는 동기군. 경쟁할텐가? 협력할건가?"
 mem_sadrell.202.terminator:0 "너희들은 군살을 덜어내야 한다."
 mem_sadrell.202.b:0 "무엇이 당신의 창조자들을 타락시켰는가?"
 mem_sadrell.202.b.response:0 "모든 유기체 문명의 특징은 비효율성입니다. \n\n여러 당사자들의 의심스러운 판단이 경제 붕괴와 내전으로 이어졌습니다. 핵심 세계의 일부 시민들은 게이트 뒤에 자신을 가두었습니다. 나머지는 갈등과 추가적인 사회 붕괴 속에서 사라진 것으로 보입니다. 유감입니다."
 mem_sadrell.202.c:0 "누가 외딴 관문을 만들었는가?"
 mem_sadrell.202.c.response:0 "알 수 없다. 고립된 관문 쌍에 대한 어떤 정보도 아카이브에선 찾을 수 없다. 추측: 다른 선진 문명이 그것을 창조했다. \n\n이러한 문명에 대한 정보가 아카이브에 없다. 추측: 기록된 시간 이전에 존재했음이 틀림없다. 더는 조사할 수 없다."
 mem_sadrell.301.name:0 "외딴 관문"
 mem_sadrell.301.desc:0 "§Y[gate_system.GetName]§! 성계 내의 §외딴 관문§!이 작동하는 것으로 밝혀졌습니다. 이제 이 관문은 은하계를 멀리 떨어져 있는 고립된 성단에 연결합니다. \n\n현재까지 그것을 통과하는 유일한 물체는 현재 완전히 비활성 상태인 것으로 보이는 소형 탐사선입니다."
 mem_sadrell.301.a:0 "그 탐사선에 대해 연구해야 합니다."
 mem_sadrell.301.b:0 "그 탐사선을 무시합니다."
 mem_sadrell.302.name:0 "$mem_sadrell.301.name$"
 mem_sadrell.302.desc:0 "원격 탐색 결과 §Y[gate_system.GetName]§! 성계의 \"S외딴 관문!\"이 활성화되었다고 합니다. 이 관문은 이제 은하계를 은하계로부터 멀리 떨어져 있는 고립된 성단과 연결합니다."
 MEM_SADRELL_PROBE_PROJECT:0 "탐사선을 분석합니다."
 MEM_SADRELL_PROBE_PROJECT_DESC:0 "탐사선이 §S외딴 관문!에서 우리 우주로 진입했습니다. 우리는 탐사선이 유용한 데이터를 담고 있는지 알아내야 합니다."
 mem_sadrell.303.name:0 "병 속의 메시지"
 mem_sadrell.303.desc:0 "우리는 고아의 문을 통과한 탐사선의 조사를 완료했습니다. 가장 흥미로운 부분은 수세기에 걸쳐 기록된 일련의 로그인 것으로 보입니다. \n\n해당 로그는 해독되었으며, 열람할 준비가 완료되었습니다."
 mem_sadrell.304.name:0 "녹음된 메시지"
 mem_sadrell.304.desc:0 "§SSadrell§! 종의 구성원들이 일련의 메시지를 기록했습니다. 이들은 "임무 연도"로 날짜가 매겨져 있습니다."
 mem_sadrell.304.a:0 "이젠 끝이야."
 mem_sadrell.304.b:0 "임무 연도 : 0년 10일"
 mem_sadrell.304.b.response:0 "문이 봉쇄되었습니다. 우리가 반대편에서 한 변경으로 인해 다른 누군가가 우리를 따라올 가능성은 낮습니다. \n\n정부에 여전히 충성하고 우리에게 통행을 거부하라는 명령을 따르려는 핵심 세계의 군사 세력은 예상보다 더 컸지만, 우리는 통과할 수 있을 만큼의 전투함을 확보할 수 있었습니다. 그럼에도 불구하고 우리가 겪은 장비와 생명의 손실은 상당합니다. \n\n이쪽에서의 생존은 힘들겠지만, 우리 모두는 이를 최대한 활용하고 우리 종족의 유산이 나머지와 함께 사라지지 않도록 할 생각입니다."
 mem_sadrell.304.c:0 "임무 연도 : 25년 42일"
 mem_sadrell.304.c.response:0 "우리는 두 개의 거주 가능한 세계에 정착하고 있으며 궤도 공허 거주지 건설이 진행 중이다.\n\n조건은 가혹하지만 우리는 희생할 준비가 되어 있다. 많은 사람이 생존을 위해 사이버네틱 증강으로 눈을 돌렸다. 모든 사람이 우리가 하는 것에 만족하는 것은 아니지만 대부분은 우리 문명을 보존하는 데 필요한 일을 할 의향이 있습니다."
 mem_sadrell.304.d:0 "임무 연도 : 565년 112일"
 mem_sadrell.304.d.response:0 "시민들이 불안해지고 있습니다. \n\n우리 자원은 부족하고, 많은 이들이 은하와의 재연결이 우리의 유일한 생존 방법이라고 믿고 있습니다. 그러나 외부 세계의 위험은 너무 큽니다. 우리는 여기서 안전하게 지내야 합니다."
 mem_sadrell.304.e:0 "임무 연도 : 612년 14일"
 mem_sadrell.304.e.response:0 "반란을 진압하려는 시도가 실패했습니다. 추정에 따르면 Sadrell 군대의 43%가 반란군에 가담했습니다. \n\n전투로 인해 대부분의 서식지와 두 개의 식민지가 파괴되었지만, 반란을 조속히 진압한다면 회복할 기회는 여전히 남아 있습니다."
 mem_sadrell.304.f:0 "임무 연도 : 613년 6일"
 mem_sadrell.304.f.response:0 "나만 홀로 남았다. 관문 성계에 대한 최후의 공격은 우리와 충성파 모두에게 막대한 피해를 줬다. 모든 함선과 거주지가 부서졌다. 항성 성채가 무너지고 있다.\n\n나는 남은 마지막 에너지를 사용하여 관문을 열고 이 탐사선을 내보낸다. 우리 종족의 역사를 영원히 잃어버리게 둘 순 없다... 탐사선은 나를 실을 수도 없고, 갈 곳도 없다. 나는 이 항성 기지와 명을 같이 하고자 한다. 만약 당신이 이 메시지를 듣고 있다면, 부디 우리를 기억해달라."
 mem_sadrell.305.name:0 "침묵이 흐르는 성계"
 mem_sadrell.305.desc:0 "우리는 [From.GetName]에 들어왔습니다. \n\n반대편의 전체 성단은 황폐해 보이지만, 모든 잔해는 같은 출처인 것 같습니다. 이곳에 살던 사람들은 스스로를 파괴했습니다."
 mem_sadrell.1000.name:0 "방치된 테라포밍"
 mem_sadrell.1000.desc:0 "[Leader.GetName]는 [Leader.GetSheHe] [Leader.GetHasHave]가 [From.GetName]의 표면에 있는 거대한 구조물의 목적을 성공적으로 파악했다고 보고합니다: 사실 그것들은 버려진 테라포밍 기지입니다. \n\n행성의 표면에서 원소를 채굴하도록 설계된 이 기지들은 탄소 생명체를 지원할 수 있는 두꺼운 대기를 생성하기 위해 의도된 것으로 보이지만, 수세기 동안 방치되어 운영되었고, 그로 인해 행성은 온실가스로 가득 찬 두꺼운 대기로 덮여 거주 불가능하게 되었습니다. \n\n이 과정은 되돌릴 수 없는 것 같습니다."
 mem_sadrell.1001.name:0 "오래된 전장"
 mem_sadrell.1001.desc:0 "[Root.GetName]는 [From.GetName] 근처에서 발견된 모든 잔해를 성공적으로 분석하고 목록화했다고 보고합니다. \n\n이상하게도, 모든 잔해는 동일한 디자인을 가지고 있어, 모든 측이 동일한 출처의 함선을 사용했거나, 한 측만 피해를 입었음을 시사합니다."
 mem_sadrell.1002.name:0 "외교 스테이션"
 mem_sadrell.1002.desc:0 "[Root.GetName]은(는) [From.GetName] 상공에서 표류 중인 항성 기지에 대한 연구를 마쳤습니다.\n\n이 기지는 협상을 위해 여러 당사자가 만날 수 있는 중립적 장소로서 외교적 목적을 수행했던 것으로 보입니다. 기지 안에서 총격전이 벌어졌다는 것을 암시하는 여러 군데의 구멍으로 인해 공기가 빠져나간 것처럼 보입니다."
 mem_sadrell.1003.name:0 "방송 위성"
 mem_sadrell.1003.desc:0 "[From.GetName] 주위를 도는 위성은 어떤 종류의 방송국 역할을 했던 것으로 보입니다. \n\n[Leader.GetName] [Leader.GetHasHave]는 홀로그램을 녹화하고 방송하는 데 사용되었을 가능성이 있는 방을 발견했지만, 모든 장비는 고의로 파괴된 것으로 보이며 데이터 코어는 복구할 수 없을 정도로 삭제되었습니다."
 mem_sadrell.1004.name:0 "추락한 여객선"
 mem_sadrell.1004.desc:0 "[From.GetName]의 표면에 있는 잔해는 대형 민간인 선박의 잔해로 확인되었습니다. \n\n수천 명의 승객의 잔해가 여전히 선내에 있는 것으로 보이며, 알아볼 수 없을 정도로 엉망이 되어 있습니다. [Leader.GetName]은 이 선박이 여러 차례의 선박 간 무기 공격으로 항로가 이탈한 후 소행성과 충돌했을 것이라고 믿고 있습니다. 공격의 이유나 출처는 여전히 알려지지 않았지만, 몇 개의 생존 데이터 코어에서 추출된 정보 조각들은 이 선박이 제한 구역에서 벗어나기를 거부했음을 시사합니다."
 mem_sadrell.1005.name:0 "오래된 착륙지"
 mem_sadrell.1005.desc:0 "[From.GetName]의 표면에 있는 물체들은 우주 탐사의 다양한 유물로 밝혀졌습니다. \n\n착륙 모듈, 로버, 그리고 식별할 수 없는 문양이 있는 퇴색한 깃발이 가장 주목할 만한 부분입니다. 이 장소를 보존하기 위해 상당한 노력이 기울여졌지만, 아마도 그 감정적 또는 교육적 가치 때문일 것입니다. 그러나 수세기 동안 방치된 탓에 상당히 악화되었습니다."
 mem_sadrell.1100.name:0 "멸망한 고향"
 mem_sadrell.1100.desc:0 "[From.GetName]에서 [This.GetName]에 의해 회수된 상당량의 유물은 §YSadrell§!과 관련이 있으며, 이 종은 한때 이곳에 살았습니다. \n\n유물이 속한 다양한 기술 시대는 이곳이 그들의 고향 세계임을 나타냅니다. \n\n현재로서는 그들의 몰락을 초래한 정확한 원인을 파악하기 어렵지만, 행성 곳곳에서 치열한 전투의 흔적을 발견할 수 있습니다. 어떤 종류의 갈등이 행성의 대부분 주민을 죽였고, 그 후 행성 인프라의 붕괴가 생존자들을 끝장냈을 가능성이 높습니다. 몇몇 온전한 구조물은 여전히 표면에 남아 있으며, 우리의 용도로 재활용할 수 있습니다."
 mem_sadrell.1100.a.tooltip:0 "§Y$d_mem_sadrell_capital$§!이(가) 행성 표면에서 발견되었습니다."
 mem_sadrell.1101.name:0 "산업 불모지"
 mem_sadrell.1101.desc:0 "[From.GetName]에서 [This.GetName]에 의해 회수된 상당량의 유물은 §YSadrell§!과 관련이 있습니다. 이곳에 한때 살았던 종족입니다. \n\n이 [From.GetPlanetMoon]는 주로 채굴과 산업 생산에 전념했던 것으로 보입니다. 정체불명의 세력에 의한 대규모 폭격 작전의 표적이 되었던 것이 분명합니다. 갈등으로 인해 [From.GetPlanetMoon]가 완전히 인구가 사라졌음에도 불구하고 일부 산업 단지는 여전히 남아 있습니다."
 mem_sadrell.1101.a.tooltip:0 "§Y$d_mem_sadrell_industrial_complex$§!이(가) 행성표면에서 발견되었습니다."
 mem_sadrell.1102.name:0 "짓밟힌 농경지"
 mem_sadrell.1102.desc:0 "[From.GetName]에서 [This.GetName]에 의해 회수된 상당량의 유물은 §YSadrell§!과 관련이 있습니다. 이 종은 한때 이곳에 살았던 종입니다. \n\n[From.GetPlanetMoon]는 식량 생산에 전념했던 것으로 보이며, 인구는 상대적으로 희박했습니다. 한때 작물로 재배되었을 가능성이 있는 유전자 변형 식물들이 인구 중심지의 폐허를 뒤덮고 있으며, 이곳은 식량 공급을 방해하기 위한 시도로 폭격당했을 가능성이 있습니다. 그럼에도 불구하고 유전자 변형이 가능한 인프라의 일부는 잘 보존되어 있는 것으로 보입니다."
 mem_sadrell.1102.a.tooltip:0 "§Y$d_mem_sadrell_runaway_gene_crop$§!이(가) 행성 표면에서 발견되었습니다."
 mem_sadrell.1103.name:0 "수장된 무덤"
 mem_sadrell.1103.desc:0 "[From.GetName]에서 [This.GetName]에 의해 회수된 상당량의 유물은 §YSadrell§!과 관련이 있습니다. 이 종은 한때 이곳에 살았던 종입니다. \n\n이 행성은 한때 인구가 밀집해 있었으며, 일련의 댐과 수문이 물을 막아 비수중 생명체가 살 수 있는 환경을 조성했지만, 어떤 갈등 중에 대부분이 붕괴되어 엄청난 파괴력을 가진 대홍수를 초래했습니다. 수중 유적이 여전히 해양 바닥에 흩어져 있으며, 소규모 조력 발전소 시설은 여전히 운영되고 있습니다."
 mem_sadrell.1103.a.tooltip:0 "§Y$d_mem_sadrell_tidal$§!이(가) 행성표면에서 발견되었습니다."
 mem_sadrell.1104.name:0 "연구 전초기지"
 mem_sadrell.1104.desc:0 "[From.GetName]에서 [This.GetName]에 의해 회수된 상당량의 유물은 한때 이곳에 살았던 종족인 §YSadrell§!과 관련이 있습니다. \n\n[From.GetPlanetMoon]는 주로 교육과 과학 연구에 전념했던 것으로 보이지만, 과거 어느 시점에 궤도 폭격에 의해 대부분 파괴되었습니다. 비교적 온전한 캠퍼스가 외진 계곡에 여전히 남아 있습니다."
 mem_sadrell.1104.a.tooltip:0 "§Y$d_mem_sadrell_research_lab$§!이(가) 행성 표면에서 발견되었습니다."
 mem_sadrell.1200.name:0 "파괴된 거주지"
 mem_sadrell.1200.desc.normal:0 "[FROMFROMFROM.Solar_System.GetName] 항성계에서의 전투 중, 우리의 군대는 [From.GetName]에 속한 거주 가능한 기지를 파괴했습니다. \n\n모든 거주자는 전투 중에 사망하였으며, 기지는 회수 가능한 잔해로 남았습니다."
 mem_sadrell.1200.desc.ass:0 "우리의 [From.GetAdj] 세력과의 교전 중, 우리는 [FROMFROMFROM.Solar_System.GetName] 항성계의 거주 가능한 기지를 파괴했습니다. 잔해는 우리에게 다양한 귀중한 인양품을 제공할 것입니다."
 mem_sadrell.1200.pac:0 "얼마나 끔찍한 인명 손실인가."
 mem_sadrell.1200.mil:0 "훌륭해."
 mem_sadrell.1200.auth:0 "그러면 존경심을 좀 배울 수 있을 거야."
 mem_sadrell.1200.pur:0 "죽은 외계종들이 더 있군. 굉장해!"
 mem_sadrell.1200.term:0 "유기체 스테이션이 종료되었다."
 mem_sadrell.1200.swarm:0 "학! 학! 학!"
 mem_sadrell_void_home_wrecker:0 "공허 거주지 인양자"
 mem_sadrell_toxic_terraform_category:0 "안개 사이로"
 mem_sadrell_toxic_terraform_category_desc:0 "[This.GetName]의 두꺼운 독성 대기 아래에, 우리는 [This.GetPlanetMoon]표면 위에 있는 몇 개의 커다란 구조물을 감지할 수 있습니다."
 mem_sadrell_fleet_engagement_category:0 "오래된 전장"
 mem_sadrell_fleet_engagement_category_desc:0 "여러 선박의 잔해가 [This.GetName] 근처에서 떠다니고 있습니다 - 고대 전투의 잔재입니다."
 mem_sadrell_gas_giant_station_category:0 "황량한 스테이션"
 mem_sadrell_gas_giant_station_category_desc:0 "[This.GetName] 주위를 도는 우주 정거장이 탐지되었습니다. 생명체나 최근 활동의 흔적은 없습니다."
 mem_sadrell_gas_giant_satellite_category:0 "위성"
 mem_sadrell_gas_giant_satellite_category_desc:0 "작은 위성이 [This.GetName] 주위를 돌고 있습니다. 이 위성은 버려진 지 오래된 것으로 보입니다."
 mem_sadrell_crashed_liner_category:0 "추락한 함선"
 mem_sadrell_crashed_liner_category_desc:0 "[This.GetName]에 충돌한 잔해를 발견했습니다."
 mem_sadrell_museum_category:0 "잡동사니"
 mem_sadrell_museum_category_desc:0 "메마른 바위 표면에서 서로 다른 물체 몇 개가 발견되었습니다."
 mem_sadrell_fallen_world_category:0 "몰락한 행성"
 mem_sadrell_fallen_world_category_desc:0 "이 [This.GetPlanetMoon]의 표면은 한때 이곳에 살았던 고급 문명의 잔해로 여전히 덮여 있습니다."
 mem_sadrell_robot_government:0 "$gov_machine_assimilator$"
 mem_sadrell_robot_government_desc:0 "$gov_machine_assimilator_desc$"
 mem_sadrell_exile_government:0 "망명 정부"
 mem_sadrell_exile_government_desc:0 ""
 d_mem_sadrell_capital:0 "사드렐 수도 잔해"
 d_mem_sadrell_capital_desc:0 "한때 광대한 행정 단지였던 이 건물은 심각한 손상과 시간의 침식에도 불구하고 여전히 본래의 목적을 수행할 수 있습니다."
 d_mem_sadrell_industrial_complex:0 "사드렐 산업단지"
 d_mem_sadrell_industrial_complex_desc:0 "사드렐 문명이 이 행성을 지배하던 과거 시대의 잔재로 남아 있는 폐기물 처리 복합체입니다."
 d_mem_sadrell_runaway_gene_crop:0 "사드렐 농업 연구소"
 d_mem_sadrell_runaway_gene_crop_desc:0 "사드렐 개척민이 남긴 온실과 유전자 실험실입니다. 한때 새로운 작물 품종을 개발하는 데 사용되었지만, 여전히 원래의 용도로 사용할 수 있습니다."
 d_mem_sadrell_tidal:0 "사드렐 조력발전소"
 d_mem_sadrell_tidal_desc:0 "사드렐 식민지에 남겨진 거대한 댐과 조력발전소입니다. 일부는 여전히 사용할 수 있습니다."
 d_mem_sadrell_research_lab:0 "사드렐 연구 캠퍼스입니다."
 d_mem_sadrell_research_lab_desc:0 "사드렐 식민지 개척자들이 이곳에 살았을 때부터 살아남은 거대한 연구 시설입니다."
 d_mem_sadrell_colonial_infrastructure:0 "진보된 식민지 기반 시설"
 d_mem_sadrell_colonial_infrastructure_desc:0 "독특한 상황이 사드렐이 그들에게 제한된 자원을 최대한 활용하도록 강요했습니다."
 mem_sadrell_starting_boon:0 "귀성 준비"
 mem_sadrell_terraform_mod:0 "방치된 테라포밍"
 mem_sadrell_terraform_mod_desc:0 "몇몇 거대한 시설들이 많은 양의 온실 가스를 대기 중으로 뿜어내고 있습니다 - 고대에 행해졌던 테라포밍 시도에서 나온 잔해입니다."
 mem_sadrell_battlefield_mod:0 "전장 파편"
 mem_sadrell_battlefield_mod_desc:0 "별의 근처에 대량의 전투 잔해가 흩어져 있습니다."
 mem_sadrell_old_station_mod:0 "버려진 스테이션"
 mem_sadrell_old_station_mod_desc:0 "버려진 외교 스테이션이 행성 궤도를 떠돌고 있습니다."
 mem_sadrell_broadcaster_mod:0 "방송국 스테이션"
 mem_sadrell_broadcaster_mod_desc:0 "행성을 공전하는 방송 위성이 떠돌고 있습니다."
 mem_sadrell_liner_mod:0 "스타라이너 파편"
 mem_sadrell_liner_mod_desc:0 "이 소행성의 표면에는 여전히 충돌한 스타라이너의 잔해가 있습니다."
 mem_sadrell_heritage_mod:0 "유산지"
 mem_sadrell_heritage_mod_desc:0 "행성 표면에 우주 탐사와 관련된 유물의 소규모 세트가 보존되어 있습니다."
 mem_sadrell_former_capital:0 "사드렐 고향 행성"
 mem_sadrell_former_capital_desc:0 "이 행성은 한때 사드렐 문명의 수도였습니다."
 mem_sadrell_industrial_planet:0 "사드렐 산업 잔해"
 mem_sadrell_industrial_planet_desc:0 "이 행성은 한때 Sadrell 개척민들이 세운 주요 산업 단지를 보유하고 있었습니다."
 mem_sadrell_agri_planet:0 "폭주한 유전자 작물"
 mem_sadrell_agri_planet_desc:0 "이 행성의 생태계는 사드렐 개척민에 의해 작물 재배를 위해 유전자 조작되었습니다."
 mem_sadrell_watery_planet:0 "수장된 무덤"
 mem_sadrell_watery_planet_desc:0 "사드렐 문명의 잔해는 여전히 바다 표면 아래에서 발견될 수 있습니다."
 mem_sadrell_science_planet:0 "사드렐 과학 센터"
 mem_sadrell_science_planet_desc:0 "수많은 고대의 사드렐 연구 센터들이 여전히 이 행성의 표면을 어지럽히고 있습니다."
 mem_sadrell_austerity:0 "내핍된 사드렐"
 mem_sadrell_void_home:0 "살아있는 스테이션"
 mem_sadrell_void_home_plural:0 "살아있는 스테이션들"
 shipsize_mem_sadrell_void_home_construction_speed_mult:0 ""
 shipsize_mem_sadrell_void_home_build_cost_mult:0 ""
