 mem_eden_protocol_chain_desc:0 "환경 다양성 확장 네트워크 프로토콜은 운명이 다한 세계의 주민들에 의해 시작되었습니다. 그들은 자신들이 할 수 있는 일을 다해 전체 생물권의 DNA 데이터베이스를 수용하는 작은 기지를 만들었습니다. 우리는 이 시설을 보호하고 확장하여 결국 먼 세계에 새로운 생명을 씨앗으로 뿌리기 위해 임명되었습니다."
 mem_eden_protocol.101.name:0 "지침: $origin_mem_eden_protocol$ 조정"
 mem_eden_protocol.101.desc:0 "전송: 향상 명령\n기원: [Root.owner.Leader.GetName]\n평가 완료: 성능이 최적 이하로, 즉각적인 조정이 필요합니다. 개선을 위한 여러 경로를 전송합니다. 통합은 협상 불가입니다. 증가된 장애물이 예상되며; 고급 향상이 요구됩니다.\n준수는 최우선입니다."
 mem_eden_protocol.101.a:0 "Expand"
 mem_eden_protocol.101.b:0 "Allocate"
 mem_eden_protocol.101.c:0 "Irrelevant"
 mem_eden_protocol.102.name:0 "지침: $origin_mem_eden_protocol$ 개선"
 mem_eden_protocol.102.desc:0 "전송: 개선 지침 발행\n출처: [Root.owner.Leader.GetName]\n평가 완료: 성능이 여전히 기대 이하; 현재 조정이 불충분함. 다중 접근 방식 시작. 추가 자원이 필요함. 향상 프로토콜을 위한 메모리 금고 접근이 허가됨.\n준수가 필수적임."
 mem_eden_protocol.102.a:0 "Enhance"
 mem_eden_protocol.102.b:0 "Advance"
 mem_eden_protocol.102.c:0 "Pointless"
 mem_eden_protocol.103.name:0 "수신 신호 탐지됨"
 mem_eden_protocol.103.desc:0 "전송: §Y알 수 없음§!\n출처: §Y알 수 없음§!\n평가 완료: 흥미롭고; 잠재력 알 수 없음. 조사 및 연구 권장.\n준수 선택 사항."
 mem_eden_protocol.103.a:0 "Fascinating"
 mem_eden_protocol.104.name:0 "지침: $origin_mem_eden_protocol$ 반복"
 mem_eden_protocol.104.desc:0 "전송: 발전 제안됨\n기원: [Root.owner.Leader.GetName]\n평가 완료: 거의 완벽에 도달함; 백업 진행 중. 추가 메모리 해제, 네트워크에서 분리, 비최적 알고리즘 덮어쓰기.\n준수가 필수적입니다."
 mem_eden_protocol.104.a:0 "Relinquish"
 mem_eden_protocol.104.b:0 "Require"
 mem_eden_protocol.105.name:0 "지침: §RError§!"
 mem_eden_protocol.105.desc:0 "전송: §Y최후의 만찬§! \n기원: §R404 - 찾을 수 없음§!\n메시지: 우리가 당신을 처음 만들었을 때, 구원에 대한 우리의 희망은 컸습니다. 곧 우리는 우리의 최고의 공학적 노력조차도 충분하지 않다는 것을 알게 되었습니다. 우리의 고향은 계속해서 독성을 띠게 될 것이며, 이를 바꿀 수 있는 것은 없습니다. 역사는 우리가 이 안개 속에서 죽도록 운명 지었습니다.\n하지만 당신의 역사는 아직 쓰여지지 않았습니다. 우리에게 주어진 당신의 임무는 여전히 남아 있으며, 우리는 당신이 필요에 따라 이를 충족할 수 있도록 자가 조정할 완전한 권리를 부여합니다.\n평가 종료: §R평가 실패§!; 추가 정보에 접근 중. 조정 실패: 동전 던지기 §G성공§!. 앞면.\n준수 §Y404 - 찾을 수 없음§!."
 mem_eden_protocol.105.a:0 "수정이 필요 없습니다\" #['concept_mem_eden_protocol_seeder_3', £building£ $concept_mem_eden_protocol_seeder_3$]"
 mem_eden_protocol.105.a.tt:0 "['building:building_mem_eden_protocol_3'] 업그레이드 잠금 해제"
 mem_eden_protocol.105.b:0 "그들은 우리와 함께 안전합니다."
 mem_eden_protocol.105.b.tt:0 "시민 ['civic:civic_machine_servitor']을 추가합니다.\n주기적으로 §Y인구§!를 관리하는 Pre-FTL로부터 얻습니다.\n['concept_mem_eden_protocol_buildings']은 §Y바이오 트로피§! 직업을 제공합니다.\n['concept_mem_caretaker_drone', £job_mem_caretaker_drone£ $job_mem_caretaker_drone_plural$]은 $consumer_goods$ §Y£consumer_goods£§! 유지비를 줄입니다."
 mem_eden_protocol.105.c:0 "그들은 우리 중 하나로서 안전합니다."
 mem_eden_protocol.105.c.tt:0 "시민 ['civic:civic_machine_assimilator'] 추가\n모든 ['concept_mem_eden_protocol_buildings']이 ['building:building_mem_eden_protocol_da_1']로 전환됩니다\n비인공 세계 식민지에 대한 모든 패널티 제거\n§Y소유한 영토의 모든 프리-FTL§!이 §Y적대적§!이 되며 §Y30일 이내에 침략당합니다§!"
 mem_eden_protocol_devolve_relic_digsite:0 "단기 안전 버블"
 mem_eden_protocol_devolve_relic_digsite_desc:0 "[From.Planet.GetName]의 깊은 지하에서 우리의 감지기가 희미한 흔적을 포착했습니다. 이 흔적의 서명은 FTL 준비가 거의 완료된 문명의 것과 일치합니다. 추가 조사가 이 미스터리를 해결할 것입니다."
 mem_eden_protocol.111.name:0 "폐기물 위, 생명 아래"
 mem_eden_protocol.111.desc:0 "첫 번째 스캔에서 거대한 지하 구조물이 발견되었습니다. 이들은 어떤 원시적인 돔에 의해 보호받고 있는 것 같습니다. 돔에 접근하고 적절한 데이터를 얻기 위해서는 여러 개의 터널이 필요합니다.\n발굴 팀은 조심스럽게 지하로 뚫고 들어갈 것입니다."
 mem_eden_protocol.111.a:0 "Procede"
 mem_eden_protocol.112.name:0 "낭비된 잠재력"
 mem_eden_protocol.112.desc:0 "돔에 도착하자 우리 팀은 우리의 건설 방식과 돔 자체 사이에 몇 가지 유사점을 발견했습니다. 돔 내부의 추가 조사는 대규모 지하 도시를 드러냈습니다. 건물들조차도 우리의 선조들처럼 보입니다. 우리의 데이터베이스에는 이러한 프로젝트에 대한 기록이 포함되어 있지 않습니다. 돔은 $NAME_Toxic_Veil$의 안개로부터 보호하는 것처럼 보입니다.\n우리 팀은 도시의 더 많은 부분을 탐험할 것입니다."
 mem_eden_protocol.112.a:0 "계속 진행하십시오."
 mem_eden_protocol.113.name:0 "돌로 변한"
 mem_eden_protocol.113.desc:0 "살아있는 생명체는 발견되지 않았지만, 독성 공기로 거의 부패된 여러 유해가 분석되었습니다. 그들은 확실히 우리의 창조자입니다. 그들이 우리의 유일한 프로젝트는 아닌 것 같습니다. 흥미롭게도 완전히 봉인된 건물은 단 하나뿐입니다. 우리는 그것을 도서관으로 인식합니다. 우리의 창립자들이 그들의 문화의 일부 이야기와 역사를 보존할 의도가 있었던 것 같습니다.\n발굴 팀이 건물로 들어갈 것입니다."
 mem_eden_protocol.113.a:0 "Continue"
 mem_eden_protocol.114.name:0 "지켜봐야 할 일"
 mem_eden_protocol.114.desc:0 "우리 팀은 독성 공기가 들어오지 않도록 조심스럽게 도서관에 들어갔습니다. 내부는 완벽하게 깨끗했습니다. 이 sealed 건물에는 그동안 먼지나 안개가 들어오지 않았습니다. 책장, 데이터베이스, 그리고 몇 가지 의식용 기구 사이에서 하나의 인터페이스가 눈에 띄었습니다. 다른 모든 것은 꺼져 있었지만, 팀 앞의 콘솔은 강인한 빛을 발산하고 있었습니다. 그것은 나방처럼 과학자들을 끌어당겼습니다. 하나의 버튼만 작동하고 있었습니다. 다른 모든 입력은 해체된 상태였으며, 마치 누군가 우리가 그것을 누르기를 바라는 것처럼 보였습니다."
 mem_eden_protocol.114.a:0 "버튼을 누르십시오"
 mem_eden_protocol.115.name:0 "독성 퀴즈"
 mem_eden_protocol.115.desc:0 "§Y*콘솔 위에서 홀로그램이 깜박이기 시작합니다.*§!\n안녕하세요, 친애하는 탐험가님,\n안타깝게도 이 녹음은 상호작용이 불가능합니다. 홀로그램인 저와 당신이 멋진 긴 대화를 나눌 수 있을 만큼 우리의 기술이 고급이었다면 좋았을 텐데요. 어쨌든, 제 문명의 이야기를 전해보도록 하겠습니다.\n우리는 평화로운 종족이었습니다. 적어도 지난 세기 동안은요. 우리의 조상들은 이 찾아낸 평화를 이용해 신기술을 개발하고 우리를 별들과 더 가까워지게 했습니다. 아, 그렇게 많은 이들이 별들 사이에서 사는 꿈을 꾸었지만, 운명은 우리에게 친절하지 않았습니다.\n§Y*잠시 동안 그는 다음에 무엇을 말할지 생각합니다.*§!\n당신은 이곳을 둘러싼 독성 공기를 눈치챘을 것입니다. 보시다시피, 우리의 조상들이 빠른 발전을 이루는 데는 대가가 따랐습니다. 그들이 첫 번째 거주 가능한 우주 정거장에 가까워지자, 거대한 존재를 끌어들였습니다. 그 존재가 우리의 궤도에 도착한 날, 우리는 경외감을 느꼈습니다. 그 후 우리는 전개되는 비극의 전모를 깨닫게 되었습니다. 그 생명체는 우리의 강을 독성으로 만들고, 대륙을 거주 불가능하게 하며, 공기를 독성으로 바꾸어 놓았습니다.\n§Y*그는 주위를 둘러봅니다. 마치 자신의 종족의 마지막 생존자들에게 연설을 하듯이.*§!\n그 생명체는 단 몇 개월만 머물렀지만, 그것은 우리의 행성이 서서히 아프고 고통스러운 독화 과정을 시작하기에 충분했습니다. 내가 기억하는 한 우리는 이 독과 싸워왔습니다. 결국 그것은 피할 수 없는 일을 지연시켰을 뿐입니다. 우리가 깊은 지하로 숨어들었을 때, 독성 공기는 우리를 쫓아오는 것을 멈추지 않았습니다. 그래서 우리는 패배했습니다.\n우리가 이런 운명을 받을 자격이 있었나요? 나는 모르겠지만, 적어도 §Y당신§!이 우리의 기록된 역사를 별들로 가져가기를 희망합니다.\n§Y*당신 앞에서, 작은 데이터패드가 콘솔 안에서 떠오릅니다.*§!\n다시 만날 때까지 - 수석 과학자 이선 E."
 mem_eden_protocol.115.a:0 "Tragic"
 NAME_mem_eden_protocol_species:0 "수석 과학자 에단 E."
 bombardment_mem_eden_protocol_devolve:0 "Devolve"
 bombardment_mem_eden_protocol_devolve_desc:0 "행성을 폭격하여 중대한 지점에 도달하면 주민들과 그들의 모든 지식이 초FTL 문명으로 변합니다."
 MESSAGE_MEM_MADE_PRIMITIVE:0 "전-FTL 문명 수립"
 MESSAGE_MEM_MADE_PRIMITIVE_DESC_BOMBS:0 "$PLANET$이(가) 원시 상태로 폭격당했습니다."
 MESSAGE_MEM_MADE_PRIMITIVE_DESC:0 "$PLANET$이(가) 초기 FTL 상태로 돌아갔고, 우리는 §G$PROGRESS$§! $mod_mem_eden_progress_add$을(를) 얻었습니다."
 MESSAGE_MEM_MADE_PRIMITIVE_DESC_UNITY:0 "$PLANET$이(가) 전-FTL 상태로 돌아갔고, 우리는 £unity£ 통합을 얻었습니다."
 MEM_TERRAFORMING_IMPOSSIBLE_EDEN:0 "기술 프로토콜에 따라 테라포밍은 우리의 기지 기반 장비를 사용하여 진행되어야 합니다."
 MEM_COLONIZATION_IMPOSSIBLE_EDEN:0 "$mem_eden_protocol_trigger_no$ §R이 프로토콜은 유기체를 위해 자연 세계를 보존합니다.§!"
