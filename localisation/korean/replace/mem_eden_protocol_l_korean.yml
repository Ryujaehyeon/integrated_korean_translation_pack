 decision_mem_eden_protocol_turn_primitive_desc:0 "우리 프로토콜은 행성 작업을 강력히 반대하며, 특히 지능적 유기체와의 직접적인 접촉에서는 더욱 그렇습니다. 이 세계를 유기체에게 맡기는 것이 우리의 창조자들이 원하는 바입니다."
