 building_mem_eden_protocol_1:0 "인도된 진화 허브"
 building_mem_eden_protocol_1_desc:0 "유기체 생명체가 이 태양계의 해당 행성에서 적합한 조건을 생성하고 유지하기 위한 시설입니다. 이를 통해 일반 테라포밍 후보는 결국 거주 가능한 행성으로 테라포밍될 것입니다."
 building_mem_eden_protocol_2:0 "인도된 진화 센터"
 building_mem_eden_protocol_2_desc:0 "유기체 생명을 이 태양계의 거주 가능한 세계에 씨앗을 뿌리고 유지하는 목적의 시설로, 일반 테라포밍 후보를 거주 가능한 세계로 테라포밍하는 역할도 수행합니다."
 building_mem_eden_protocol_3:0 "인도된 진화 넥서스"
 building_mem_eden_protocol_3_desc:0 "유기체 생명을 이 태양계 내의 거주 가능한 행성에 씨앗을 뿌리고 유지하는 목적의 시설로, 일반 테라포밍 후보를 거주 가능한 행성으로 테라포밍하는 역할도 수행합니다. 또한, 시간이 지남에 따라 거주 가능한 행성을 가이아 행성으로 변형시킬 것입니다."
 building_mem_eden_protocol_da_1:0 "사이보그 정원"
