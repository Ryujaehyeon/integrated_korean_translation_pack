 r_mem_eden_protocol_devolve_relic_desc:0 "이 데이터패드는 $NAME_Toxic_Veil$의 멸종한 주민들에 대한 유일한 남아있는 기록입니다. 이곳에는 독성 세계에서의 생명과 고급 사회의 퇴화에 관한 인상적인 연구가 포함되어 있습니다. 이 주민들의 역사는 잊혀져서는 안 되지만, 다시 반복될 수 있습니다."
