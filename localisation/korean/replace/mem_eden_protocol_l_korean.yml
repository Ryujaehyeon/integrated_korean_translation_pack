 job_mem_caretaker_drone:0 "관리인 드론"
 job_mem_caretaker_drone_plural:0 "관리인 드론"
 job_mem_caretaker_drone_desc:0 "원시 생명체의 지속적인 존재를 보장하기 위해 돌보는 임무를 맡은 이 드론들은 그들의 기계 양심의 주요 기능 중 하나를 충족합니다."
