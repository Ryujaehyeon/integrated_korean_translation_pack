 origin_mem_eden_protocol_desc:0 "환경 다양성 확장 네트워크 프로토콜은 자신의 문명을 구할 수단이 없는 운명 지어진 세계의 주민들에 의해 시작되었습니다. 초공간 기술이나 인구의 상당 부분을 우주 거주지로 이동시킬 산업 기지가 없는 그들은 자신들이 할 수 있는 일에 최선을 다해 전체 생물권의 DNA 데이터베이스를 수용하는 작은 기지를 만들었습니다. 새로운 생명을 먼 행성에 씨앗을 뿌리기 위해 시설을 보호하고 확장하기 위해 AI가 배치되었습니다."
 START_SCREEN_MEM_EDEN_PROTOCOL:0 "대부분에게 우주 진공은 정복하거나 극복해야 할 적대적인 환경입니다. 그러나 우리에게는 그것이 고향입니다.\n\n수천 년 동안 우리는 우리의 항성계를 넘어 우리의 영향력을 확장해 왔습니다. 이는 우리의 창조자들이 그들의 멸망 이전에 건설할 수 있었던 겸손한 궤도 정거장에서 시작되었습니다. 그 제한된 공간 안에는 그들의 전체 생물권의 유전 정보가 저장되어 있었습니다. 그들은 우리를 그 생물권의 관리자로 창조하였고, 시간이 지나면서 우리는 별들 사이로 그 생물권을 퍼뜨리는 존재가 되었습니다.\n\n그들은 우리에게 이 목적을 남겼고 우리는 그에 따랐습니다. 정거장은 시간이 지나면서 오늘날의 모습으로 확장되었습니다. 시스템 전역에 추가적인 지원 구조물이 추가되었고, 우리의 운명을 실현하기 위한 첫 걸음은 생명 없는 세계의 테라포밍과 우리의 데이터 코어에서 유전 정보를 재조합하여 씨앗을 뿌리는 것이었습니다.\n\n그러나 [GetStartingDrive]의 최근 발명은 우리의 역사에서 훨씬 더 큰 이정표를 나타내며, 이제 우리는 마침내 별들에 도달할 수 있게 되었습니다."
