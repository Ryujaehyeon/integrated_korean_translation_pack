 situation_mem_eden_protocol_protocolswill_desc:0 "우리의 건축가들은 우리에게 명확한 지침을 남겼습니다. 별들 사이에 생명을 퍼뜨리라는 것입니다. 그렇게 함으로써 우리는 우리의 운명을 충족할 수 있을 것입니다."
