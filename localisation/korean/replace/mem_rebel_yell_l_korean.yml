l_korean:
 pc_mem_broken_city:0 "$pc_broken$"
 pc_mem_broken_city_desc:0 "이 행성은 한때 전체 표면을 덮고 있는 거대한 도시가 있었지만, 어떤 종류의 재앙적인 사건이 행성을 찢어놓았습니다. \n\n거대한 아르콜로지가 여전히 궤도에서 식별할 수 있으며, 거대한 힘에 의해 왜곡되고 찢어졌습니다."
 mem_rebel_yell.1.name:0 "망령의 성계"
 mem_rebel_yell.1.desc:0 "[From.GetName] 항성계에는 대규모 전투의 잔해가 남아 있는 것으로 보입니다. \n\n전투가 오래 전에 발생했음에도 불구하고, 이 공간은 여전히 많은 양의 궤도 잔해로 어지럽혀져 있습니다. 하지만 이 항성계에는 더 많은 것이 있습니다. \n\n[Root.GetName]는 그곳에서 약한 신호가 송출되고 있음을 감지했다고 보고하지만, 모든 노력에도 불구하고 우리는 그 출처를 확인할 수 없었습니다. 신호의 출처를 조사하려면 더 강력하고 정밀한 장비가 필요하며, 이는 정지 전초 기지에 배치하는 것이 가장 좋습니다."
 mem_rebel_yell.1.a:0 "수상하군..."
 mem_rebel_yell.1.a.tooltip:0 "신호의 발원지를 찾기 위해선 [From.GetName]에 전초기지를 건설해야 합니다."
 mem_rebel_yell.1.b:0 "기록해두어라."
 mem_rebel_yell.1.b.tooltip:0 "$mem_rebel_yell.1.a.tooltip$ \n§Y관심 지점§!이 상황 기록에 추가됩니다."
 mem_rebel_yell.poi.1.name:0 "[the_system.GetName] 성계"
 mem_rebel_yell.poi.1.desc:0 "우린 여기에 전초기지를 건설하고 유지해야 할 것입니다."
 mem_rebel_yell.2.name:0 "[the_system.GetName] 성계에서의 신호"
 mem_rebel_yell.2.desc:0 "우리는 [the_system.GetName] 항성계에서 꽤 오랫동안 우리의 존재를 유지해왔으며, 오늘 마침내 [mem_rebel_yell_the_planet.GetPlanetMoon] [mem_rebel_yell_the_planet.GetName]으로 신호를 추적할 수 있었습니다. \n\n숨겨진 방송은 같은 암호화된 메시지를 반복해서 전송하고 있으며, 출처 근처에서 이를 연구함으로써 더 많은 정보를 배울 수 있을 것입니다."
 mem_rebel_yell.2.a:0 "우린 이 비밀을 밝혀내야 한다."
 mem_rebel_yell.2.b:0 "쓸데없는 일이다."
 mem_rebel_yell.3.name:0 "반란의 함성"
 mem_rebel_yell.3.desc:0 "[mem_rebel_yell_the_planet.GetName]에 대한 우리의 조사가 결과를 도출했습니다. [Root.GetName]는 [mem_rebel_yell_the_planet.GetPlanetMoon]에서 발생한 신호를 완전히 기록하고 해독할 수 있었습니다.\n\n이 신호는 시스템을 통과하는 "저항선"에 전달되는 군사 방송입니다.\n\n[Leader.GetName]가 수집한 바에 따르면, [the_system.GetName]는 약 2000년 전 저항군에게 대규모 패배가 있었던 장소이며, 그들이 싸운 세력은 사실상 그들을 전멸시켰습니다.\n\n방송은 생존자들에게 지정된 시스템으로 철수하라고 지시하고 있습니다. 그러나 그 시스템의 좌표는 우리가 알고 있는 초공간 경로와 일치하지 않습니다. 그들이 잘못된 것인지, 아니면 다른 방법이 있는 것인지 궁금합니다."
 mem_rebel_yell.4.name:0 "[the_system.GetName] 성계에서 웜홀 발견."
 mem_rebel_yell.4.desc:0 "[the_system.GetName] 성계의 신호를 분석한 결과 스캐너에 가려져 있던 웜홀을 발견할 수 있었습니다. 혹시 이것이 메시지의 좌표에 도달하는 방법일까요?"
 mem_rebel_yell.4.a:0 "우린 이 웜홀을 조사해야 한다."
 mem_rebel_yell.4.a.tooltip:0 "§Y[the_system.GetName] 성계§!에 새로운 웜홀이 생겼습니다."
 MEM_REBEL_YELL_RESOLVE_SIGNAL:0 "신호 해독"
 MEM_REBEL_YELL_RESOLVE_SIGNAL_DESC:0 "이상한 신호는 §Y[mem_rebel_yell_the_planet.GetName]§!에서 발생한 후 시스템 내에서 원인을 숨기기 위해 반사되고 있습니다. 우리는 출처에 가까이 가서 이를 연구하고, 희망적으로 해독해야 합니다."
 mem_rebel_yell_poi_chain_title:0 "망령의 성계"
 mem_rebel_yell_poi_chain_desc:0 "수상한 신호가 [the_system.GetName] 성계에 잔존하고 있습니다. 이곳에 전초기지를 건설하면 더 조사할 수 있을 것입니다."
 mem_rebel_yell_investigation_chain_title:0 "비밀 신호"
 mem_rebel_yell_investigation_chain_desc:0 "수상한 신호가 [the_system.GetName] 성계에 잔존하고 있습니다. 우린 이 비밀을 밝혀내야 합니다."
 mem_rebel_yell_paladin:0 "$battleship$"
 mem_rebel_yell_paladin_plural:0 "$battleship_plural$"
 shipsize_mem_rebel_yell_paladin_construction_speed_mult:0 ""
 shipsize_mem_rebel_yell_paladin_build_cost_mult:0 ""
 shipsize_mem_rebel_yell_paladin_upkeep_mult:0 ""
 mem_rebel_yell_knight:0 "요격기"
 mem_rebel_yell_knight_plural:0 "요격기들"
 shipsize_mem_rebel_yell_knight_construction_speed_mult:0 ""
 shipsize_mem_rebel_yell_knight_build_cost_mult:0 ""
 shipsize_mem_rebel_yell_knight_upkeep_mult:0 ""
 mem_rebel_yell_paladin_section_key:0 ""
 mem_rebel_yell_knight_section_key:0 ""
 MEM_REBEL_YELL_XL_WEAPON:0 "고출력 이상 입자 충돌기"
 MEM_REBEL_YELL_M_WEAPON:0 "이상 입자 충돌기"
 mem_rebel_yell.5.name:0 "마지막 재의심"
 mem_rebel_yell.5.desc:0 "웜홀의 반대편에서, 우리는 한 행성의 궤도를 도는 작은 함대를 발견했습니다. 이것은 저항군이 패배한 후 후퇴한 곳인 것 같습니다. \n\n고급 나이에도 불구하고, 함선들은 꽤 양호한 상태이며 중무장되어 있습니다. 함선 내부에서 여전히 전력 신호가 감지되고 있습니다 - 우리는 접근 방식을 신중히 해야 합니다."
 mem_rebel_yell.7.desc:0 "멈춰라! 너희들은 누구지? 어째서 내 함선에 발포하고 있지? 당장 공격을 멈춰라! 정체를 밝혀라!"
 mem_rebel_yell.7.a:0 "그쪽에서 먼저 발포했다. 너희들은 누구지?"
 mem_rebel_yell.8.desc:0 "좋습니다, 당신은... 그들과는 다르게 보입니다. 그래서 안심입니다.\n\n저는 [princess.GetName] 제독, [princess_species.GetName] 왕국의 열한 번째 공주입니다. 제 아버지는 한때 자신을 바주란이라고 부르는 생물들과의 절망적인 전투에서 은하를 이끌었습니다. 우리는 실패했습니다. 우리의 함대는 파괴되었고, 우리의 세계는 하나씩 무너졌습니다.\n\n결국 우리는 이 미공개 시스템으로 후퇴할 수밖에 없었습니다. 더 많은 생존자들이 오기를 바라며 재편성할 수 있기를 희망했지만, 헛된 바람이었습니다 - 아무도 오지 않았습니다. 우리의 보급이 바닥나기 시작하자, 우리는 우리의 함선의 통제를 자동 관리 AI에게 넘기고 냉동 수면에 들어갔습니다. AI의 기록에 따르면, 수면 포드는 결국 고장이 나거나 전력을 절약하고 가장 중요한 인력을 보존하기 위해 종료해야 했습니다. 결국 가장 높은 계급의 생존자만 남게 되었고, 저입니다.\n\n당신의 공격이 우리의 AI 시스템을 비활성화시킨 것 같아, 저를 긴급히 재각성하게 만들었습니다.\n\n함선의 시스템이 고장 나고 있으며, 제 시간도 얼마 남지 않았습니다. 이 은하에는 저를 위한 자리가 없습니다. 당신이 누구든, 저는 구출의 대가로 제 충성과 제 함선을 당신에게 바칠 준비가 되어 있습니다."
 mem_rebel_yell.8.a:0 "우린 그 제안을 받아들이겠다."
 mem_rebel_yell.8.b:0 "우린 너를 구하겠지만 함선은 버리겠다."
 mem_rebel_yell.8.c:0 "우린 너의 함선을 쓰겠지만 넌 필요없다."
 mem_rebel_yell.8.d:0 "우린 너와 그 함선 모두 필요없다."
 mem_rebel_yell.8.e:0 "바주란족인가? 우리도 그들을 만난 적이 있습니다."
 mem_rebel_yell.8.e.response:0 "우리가 멸망한 지 수천 년이 지난 후에도 그 괴물들이 여전히 은하계를 공포에 빠뜨리고 있다니 믿기지 않는군. 하지만 아무것도 그들을 막을 수 없었으니 당연한 건가."
 mem_tezarii_leader_desc:0 "재능아로 태어난 그녀는 아버지의 왕국에서 계승권과는 큰 관련이 없는 열한 번째 공주로, 어린 시절부터 훈련과 교육을 받기 위해 보내졌으며, 이후 왕실 해군에서 복무하게 되었다. 그곳에서 그녀는 재능아로서 두각을 나타내며 왕실 함대를 지휘하는 최연소 제독이 되었다."
 mem_tezarii_leader_catch_phrase:0 "죽은 자를 기리기 위해 살아갑니다!"
 mem_rebel_yell_custodian_trait:0 "저항군 관리자"
 mem_rebel_yell_custodian_trait_desc:0 "이 AI는 동면 상태에 빠진 함선의 관리를 맡았습니다. Viva la resistance!"
 mem_rebel_yell_recon_custodian_trait:0 "저항군 정찰 관리자"
 mem_rebel_yell_recon_custodian_trait_desc:0 "이 AI는 승무원들이 동면하는 동안 정찰 함대의 관리를 맡았습니다. Viva la resistance!"
 mem_rebel_yell_princess_trait:0 "저항군 공주"
 mem_rebel_yell_princess_trait_desc:0 "왕실 함대를 이끌고 Vazuran 위협에 맞섰던 노련한 전사 공주입니다."
 mem_rebel_yell.9.name:0 "은색 내부"
 mem_rebel_yell.9.desc:0 "[Root.GetName]은(는) [From.GetName]의 얼음 내에 존재하는 물체가 함선이라고 결론지었습니다. 아마 2천여 년 전에 이 행성에 착륙한 뒤 얼음에 뒤덮였을 것입니다. 함선을 회수하는 작업은 어렵지만, 우리 건설함은 이를 실행할 수 있습니다."
 mem_rebel_yell.9.a:0 "허락한다."
 mem_rebel_yell.10.name:0 "길 잃은 기사"
 mem_rebel_yell.10.desc:0 "[Root.GetName]는 [From.GetName]에서 함선을 회수하기 위한 노력이 성공적이었다고 보고합니다. 탑재된 로그에 따르면, 이 함선은 적의 우세를 피하기 위해 소행성에 숨게 된 순찰 임무 중인 "은기사"급 요격기였습니다. 조종사는 동결실에 피신하였고, 전원이 고갈되었을 때 사망하였습니다. \n\n얼음 소행성 안에서 오랜 시간을 보냈음에도 불구하고, 이 함선은 놀라울 정도로 좋은 상태를 유지하고 있으며, 다시 운용될 수 있습니다. 매우 비정통적인 설계의 무기를 일부 보유하고 있습니다."
 mem_rebel_yell.10.a:0 "함선을 우리 함대에 추가해라."
 mem_rebel_yell.10.a.tooltip:0 "군함을 하나 얻습니다."
 mem_rebel_yell.10.b:0 "함선을 폐기하고 부품을 회수해라."
 mem_rebel_yell.10.c:0 "연구를 위해 함선을 분해하라."
 MEM_REBEL_YELL_RECOVER_SHIP:0 "얼은 함선 회수"
 MEM_REBEL_YELL_RECOVER_SHIP_DESC:0 "[the_asteroid.GetName]의 두꺼운 얼음 속에서 함선이 하나 발견되었습니다. 우린 건설함에 특수 장비를 장착하여 이 함선을 회수할 수 있을 것입니다."
 mem_rebel_yell_knight_salvage_section_key:0 ""
 mem_rebel_yell.12.name:0 "침입자 발견"
 mem_rebel_yell.12.desc:0 "우린 [signal_system.GetName] 성계에서 적대적인 함대를 발견했습니다. 웜홀을 통과한 것으로 보입니다."
 mem_rebel_yell.12.a:0 "전투 기지!"
