 elven_avari_ring_MEGASTRUCTURE_DETAILS:0 "이 인공적인 고리는 기후 조건을 원하는대로 변환시킬 수 있습니다."
 elven_avari_ring_CONSTRUCTION_INFO_DELAYED:0 "§Y아바리 고리§!는 사이오닉 필드를 만들면서 행성에 거주하는 사람들이 요구를 충족시키도록 환경을 변화시킵니다."
 elven_avari_ring:0 "아바리 고리"
 elven_avari_ring_DESC:0 "아바리 고리는 거주민들의 선호에 맞춰서 환경을 변화시키는건 물론, 무엇이든 쉽게 궤도로 운송시켜 줄 수 있습니다."
 elven_avari_shield_MEGASTRUCTURE_DETAILS:0 "적의 폭격을 막고 민중들을 진정시키기 위한 방어적 구조물."
 elven_avari_shield_CONSTRUCTION_INFO_DELAYED:0 "§Y아바리 보호막§!은 행성 전체를 감싸면서 적의 폭격으로부터 행성을 보호하는건 물론이고 표면의 대중들의 불만까지 진정 시킬 수 있습니다."
 elven_avari_shield:0 "아바리 보호막"
 elven_avari_shield_DESC:0 "행성 전체를 감싸는 보호막이 적의 행성 폭격을 막고 지표면에 있는 대중들의 불만을 진정시킵니다."
 pc_elven_sanctuary:0 "아이네틀"
 pc_elven_sanctuary_adj:0 "만들어진"
 pc_elven_sanctuary_desc:0 "알려진 종족들을 수용할 수 있도록 설계된 거대한 인공 구조물입니다."
 mod_pc_elven_sanctuary_habitability:0 "아이네틀 적합도"
 trait_pc_elven_sanctuary_preference:0 "아이네틀 선호"
 trait_pc_elven_sanctuary_preference_desc:0 "§L기후 선호도는 유전적 수준에서 창조나 숙련된 유전자 조작에 의해 결정됩니다.§!"
 trait_elven_true:0 "엘프"
 trait_elven_true_desc:0 "§L이 문명은 엘다르의 후예로써 놀라울 정도로 긴 수명을 가집니다.§!\n"
 trait_elven_savage:0 "야만적인 엘프"
 trait_elven_savage_desc:0 "§L신비로운 엘다르의 분파 중 잔혹함을 받아드린 분파입니다.§!\n"
 trait_elven_lunari_immortality:0 "달빛"
 trait_elven_lunari_immortality_desc:0 "은빛 달의 차가운 빛을 받은 축복받은 이들은 불가능한 존재를 이어갑니다."
 trait_elven_ayleid_immortality:0 "승천자"
 trait_elven_ayleid_immortality_desc:0 "영원한 생명의 신성한 불꽃은 되찾아야 할 수많은 타고난 권리 중 첫 번째일 뿐입니다."
 trait_elven_sidh_immortality:0 "영원한 꽃"
 trait_elven_sidh_immortality_desc:0 "자연의 균형이 보존되는 한, 수호자들은 그 풍요를 누릴 것입니다."
 trait_elven_true_portrait_override_tt:0 "엘프 종족이 필요합니다."
 elven_triggered_opinion_elf_and_elf:0 "엘다르 친화성"
 elven_triggered_opinion_elf_and_drow:0 "엘다르 친화성"
 elven_triggered_opinion_drow_and_elf:0 "엘다르 친화성"
 civic_elven_arcane_minded:0 "마법적 사회"
 civic_elven_arcane_minded_desc:0 "초물리학적 현상을 연구하는건 국가적인 취미입니다. 예측 할 수 없는 마법은 거의 모든 사회에서 토론 대상이 됩니다. 이러한 환경은 연구자들의 상상력을 자극합니다."
 civic_tooltip_arcane_minded_effects:0 "§Y20%§!의 £unity£ 수입이 §Y50%§! 효율로 £physics£ £society£ £engineering£으로 전환됩니다.\n§Y고고학 유적§! 발견 확률이 약간 증가합니다."
 civic_elven_craft:0 "우아한 예술성"
 civic_elven_craft_desc:0 "완벽함과 아름다움을 이루기 위한 노력이 주요한 목표인 사회입니다. 건축물부터 우주선까지 모든 것들은 실용성에 못지 않게 아름다워야 하며, 이러한 사회적 목표의 결과로 더 단단한 배와 건축물뿐만이 아니라, 많은 시민들을 행복하게 합니다."
 civic_elven_tooltip_craft_effects:0 "시민 POP 행복도: §G+10%§!\n선체 내구도: §G+5%§!\n요새 방어 보너스: §G+10%§!"
 civic_elven_tooltip_not_materialistic:0 "§Y물질주의§!가 아닐 것"
 agenda_elven_isolationism:0 "내향적 집중"
 policy_elven_gender_policy:0 "성별 정책"
 policy_elven_gender_policy_desc:0 "이 정책들은 성별에 따라 지도자가 될 수 있는지를 결정합니다.\n\n§R주의: 정책은 현재 지도자나 그 후계자에게 영향을 주지 않습니다!§!\n"
 elven_gender_default_name:0 "평등"
 elven_gender_default:0 "평등"
 elven_gender_default_desc:0 "끔찍하게 지루하고 유행에도 맞지 않게, 남자건 여자건 모두 똑같이 지도자가 될 수 있습니다."
 elven_gender_matriarchy_full_name:0 "절대적 모권사회"
 elven_gender_matriarchy_full:0 "절대적 모권사회"
 elven_gender_matriarchy_full_desc:0 "이 정책은 남자를 사회적으로 존재하지 않다고 가정하며 외부의 시선 때문에 이를 숨기려고 합니다."
 elven_gender_matriarchy_governor_name:0 "모계중심"
 elven_gender_matriarchy_governor:0 "모계중심"
 elven_gender_matriarchy_governor_desc:0 "남자는 슈트에 잘 맞습니다만... 가운과는 별로 맞지 않습니다. 따라서 여자가 가운을 입을 수 있는 모든 자리에 임명되어야 합니다."
 elven_gender_patriarchy_military_name:0 "기사도"
 elven_gender_patriarchy_military:0 "기사도"
 elven_gender_patriarchy_military_desc:0 "무언가를 해치는 것은 여자가 하는 것 보단 남자가 하는게 더 보기 좋다는 사실은 모두가 알고 있습니다. 군사적 역할은 남자가 담당하는게 맞습니다."
 elven_gender_patriarchy_full_name:0 "절대적인 부권사회"
 elven_gender_patriarchy_full:0 "절대적인 부권사회"
 elven_gender_patriarchy_full_desc:0 "왜 여성들이 지루한 일을 수행하게 해야 할까요? 여성들이 할 일이 얼마나 많은데요. 패션을 관리하고...살인 음모를 꾸미고..."
 personality_ayleid_personality:0 "에일리드 제국주의자"
 personality_ayleid_personality_desc:0 "에일리드 제국주의자들은 자신들을 모든 엘프 종족들의 지배자라고 생각합니다. 그들은 매우 확장적이지만 다른 종족에게는 위협을 느끼지 않는 한 별 관심을 보이지 않습니다"
 personality_sidh_personality:0 "에델 평화주의자"
 personality_sidh_personality_desc:0 "에델 평화주의자들은 가능한 모든 곳에서 조화를 추구하며, 그를 위해 직접적으로든 이민을 통해서건 다른 문명에 평화를 촉진시키고자 합니다."
 personality_gaul_personality:0 "고독한 예술가"
 personality_gaul_personality_desc:0 "고독한 예술가는 자신들의 일을 계속 하는 경향이 있으며, 다른 위협으로부터 고립되는 것을 선호합니다. 그러나 외부 세력이 이들을 위협할 경우 모두가 하나의 목적, 위협을 파괴하기 위해 단결합니다."
 gov_elven_druid_circle:0 "드루이드 의회"
 gov_elven_druid_circle_desc:0 "주술사의 과두제이며, 현명한 드루이드 의회가 국가를 지배합니다. 사실 국가와 의회는 별로 다르지 않습니다."
 EMPIRE_DESIGN_elven_civ1:0 "고요한 왕국 세나라타"
 EMPIRE_DESIGN_elven_civ1_desc:0 "제노 역사가들은 에일레이가 그들의 세계에 항상 존재했던 것처럼 보인다는 것을 마지못해 인정합니다. 에일레이가 장려했는지 여부에 관계없이 널리 퍼진 가설은 선사 시대의 먼 시점에 거대한 성간 제국의 일부였다는 것입니다. 그것이 무엇이라고 불렸는지 또는 얼마나 멀리 확장되었는지는 잃어버린 지 오래입니다.\n\n출신에 관계없이 그들은 이제 자신들의 성계 밖에서 더 적극적인 역할을 하려고 합니다. 그들의 침착하고 무관심한 태도는 과소평가되지 않는 것이 가장 좋습니다. 폭력을 가하면 매우 치명적인 것으로 알려져 있기 때문입니다.§!\n"
 EMPIRE_DESIGN_elven_civ1_both_dlc_desc:0 "$EMPIRE_DESIGN_elven_civ1_desc$"
 EMPIRE_DESIGN_elven_civ1_utopia_astral_planes_desc:0 "$EMPIRE_DESIGN_elven_civ1_desc$"
 EMPIRE_DESIGN_elven_civ1_galactic_paragons_dlc_desc:0 "$EMPIRE_DESIGN_elven_civ1_desc$"
