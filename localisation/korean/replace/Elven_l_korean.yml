 job_elven_archaeologist:0 "고고학자"
 job_elven_archaeologist_plural:0 "고고학자"
 job_elven_archaeologist_desc:0 "이 세계의 가장 큰 수수께끼는 세계를 이해하는 것 그 자체입니다."
 job_elven_archaeologist_effect_desc:0 "£job_elven_archaeologist£ $job_elven_archaeologist_plural$는 £consumer_goods£ §Y$consumer_goods$§!를 £society£와 £engineering£ §Y연구 포인트§!로 변환하여 신기술을 개발합니다."
