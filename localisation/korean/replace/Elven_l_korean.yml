 origin_tooltip_elven_arcadian_symbiosis_effects:0 "- 맞춤형 항성 집합\n- $HOME_SYSTEM$$TABBED_NEW_LINE$- ['concept_eos_planetary_nebula'] 내부에 위치\n- $HOMEWORLD$$TABBED_NEW_LINE$- ['concept_eos_pc_continental']$TABBED_NEW_LINE$- $PLANETARY_MODIFIERS$ ['concept_elven_natural_beauty_mod']$TABBED_NEW_LINE$- $PLANETARY_FEATURES$$TABBED_NEW_LINE$$t$- ['concept_drow_planetary_glowing_forests']$TABBED_NEW_LINE$$t$- ['concept_drow_planetary_glowing_oceans']$TABBED_NEW_LINE$$t$- ['concept_elven_healing_spring']\n- ['concept_guaranteed_colonies']: §R당신이 선호하는 유형이 아닙니다!§!\n- §Y8§! £pop£ 팝은 ['concept_eos_treants']\n- ['concept_concept_phytovitalization_mod'] 수정자는 ['concept_eos_treants']가 거주하는 행성에 적용됩니다."
