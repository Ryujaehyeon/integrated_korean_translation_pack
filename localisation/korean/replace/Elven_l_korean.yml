 ELVEN_civ2_home_system_name:0 "아다레논"
 pc_elven_prismatic_star:0 "프리즘 별"
 pc_elven_prismatic_star_desc:0 "이 특이한 별은 분류 내릴 수 없습니다. 이 별은 뛰어나고 천재적인 과학자조차 파악할 수 없는 어떠한 메커니즘에 의해 다른 파장의 빛을 발산합니다. 이러한 방출로 대부분 지적 생명체의 호기심을 자극하는 화려한 색상을 보여줍니다. 대부분 생명체들은 이에 긍정적인 영향를 받기 때문에, 이는 그저 미스터리로 남아 있을 뿐입니다.."
 elven_building_army_primitive:0 "바라드 엘레나스"
 elven_building_army_primitive_desc:0 "고대, 모든 외부의 위협으로부터 세계를 수호하는 신령스러운 질서의 보호자"
 elven_primitive_army:0 "마테오렌 엘레나스"
 elven_avari_ring_modifier:0 "아바리 세계"
 elven_avari_ring_modifier_desc:0 "인공적인 궤도상 고리가 있는 이 세계는 거주하는 사람에 따라 환경이 바뀝니다."
 elven_avari_shield_modifier:0 "아바리 방어막"
 elven_avari_shield_modifier_desc:0 "이 세계는 적의 공격을 무력화하고 대중들을 진정 시키는 강력한 방어막에 감싸여 있습니다."
 elven_mineral_poor:0 "질좋은 광물의 부족"
 elven_mineral_poor_desc:0 "이 행성이 원래부터 이랬는지, 아니면 모르는 종족이 유용한 가치의 광물을 모두 채굴 한 것인지 알 수 없지만, 이 행성의 광물들의 질이 매우 낮은 것은 사실입니다."
 elven_natural_beauty:0 "자연의 아름다움"
 elven_natural_beauty_desc:0 "이 행성은 아름답다는 말 말고는 표현할 방법이 없습니다. 행성의 거주자들은 매일매일 새로운 경이로움을 느끼게 될 것입니다."
 elven_irradiated_planet:0 "피폭됨"
 elven_irradiated_planet_desc:0 "오래전 어떤 재앙이 이 행성을 휩쓴 후, 곳곳에서 높은 수치의 방사능이 감지됩니다."
 elven_storm_world_modifier:0 "초능력 폭풍"
 elven_storm_world_modifier_desc:0 "이 세계의 표면은 무정형의 금속과 이상한 땅과 산 그리고 계곡 및 다른 모든 지형들이 존재하며, 탐사선이 착륙하는 순간에 바다에 가라앉는거 처럼 사라집니다. 반복적인 스캔을 해보면 관찰 되었던 산이 사라지기까지 합니다. 심지어 빛조차도 이상해서 원래 낮이여야 할 곳은 어둡고, 밤이여야 할 것은 낮처럼 밝습니다. 이러한 현상이 자연스러운 현상이건 아니건, 이 세계가 만든건 우리는 도저히 이해 할 수 없을 겁니다."
 elven_great_firewall_modifier:0 "만리방화벽"
 elven_great_firewall_modifier_desc:0 "수천년동안의 공학의 정점으로써, 만리방화벽은 반체제인사들과 외계인으로부터 우리를 지켜줄 겁니다."
 elven_treant_harmony:0 "식물생체화"
 elven_treant_harmony_desc:0 "§Y트리언트§! 당 이 행성의 적합도와 편의를 §G1%§! 상승시킵니다."
 elven_leader_events.33.name:0 "약물 남용"
 elven_leader_events.33.desc:0 "§R[deceased_leader.GetName]§!'의 나쁜 생활 습관은 결국 치명적인 결과를 초래했습니다. 그가 수행해야할 보고를 제대로 못한지 꽤 시간이 흘렀고, 마침내 [deceased_leader.GetSheHe]가 죽은 것을 확인했습니다. 조사에 따르면 불법적인 약물에 대한 과다 복용이 그의 사망을 유발한 것으로 확인됩니다."
 decision_elven_remove_tir_aranad:0 "티르 아라나드 파괴"
 decision_elven_remove_tir_aranad_desc:0 "이상한 외계인 탑을 영원히 없앨 방법을 찾아라!"
 decision_elven_remove_sentient_dragons:0 "자각있는 용들 몰살"
 decision_elven_remove_sentient_dragons_desc:0 "드래곤을 우리 현실에서 영원히 쫓아낼 방법을 찾아라."
 decision_elven_remove_gardens_of_heaven:0 "천상의 정원 파괴"
 decision_elven_remove_gardens_of_heaven_desc:0 "쓸대없이 부르주아적인 천상의 정원을 파괴함으로써 더 많은 공간을 만들라."
 decision_elven_remove_malevolent_groves:0 "악의적인 숲을 불태우라"
 decision_elven_remove_malevolent_groves_desc:0 "악의적인 숲에 뜨거운 맛을 보여줘라."
 decision_elven_remove_ice_spires:0 "얼음 첨탑 철거"
 decision_elven_remove_ice_spires_desc:0 "첨탑이 있었단 흔적도 없이 터뜨려버려."
 decision_elven_remove_ice_blossoms:0 "얼음 꽃 제거"
 decision_elven_remove_ice_blossoms_desc:0 "이런 쓸모없는 꽃밭은 없에야지."
 decision_elven_remove_murrpau_sanguine:0 "넘쳐나는 무르파우 척살"
 decision_elven_remove_murrpau_sanguine_desc:0 "무르파우를 영원히 없에버릴 계획을 시행하라."
 decision_elven_remove_feral_fairies:0 "포식성 요정 척살"
 decision_elven_remove_feral_fairies_desc:0 "수단과 방법을 가리지 않아도 되니, 요정들을 제거하라."
 decision_elven_remove_klepto_fairies:0 "도벽성 요정 척살"
 decision_elven_remove_klepto_fairies_desc:0 "구석구석에 숨어있는 요정들을 박멸하라!"
 decision_elven_remove_glowing_forests:0 "빛나는 숲을 불태우라"
 decision_elven_remove_glowing_forests_desc:0 "숲, 싹 다 태워버려."
