 elven_01_shipset_desc:0 "특유의 매끈한 윤곽과 독특한 실루엣으로 알아볼 수 있는 엘프 함선은 자연스러운 우아함을 구현합니다. 기능적이고, 강력하며, 아름답습니다."
 elven_02_shipset_desc:0 "특유의 매끈한 윤곽과 독특한 실루엣으로 알아볼 수 있는 엘프 함선은 자연스러운 우아함을 구현합니다. 기능적이고, 강력하며, 아름답습니다."
