 elven_councilor_arcane_minded:0 "Archmagister"
 elven_councilor_arcane_minded_desc:0 "대마법사는 모든 신비로운 연구를 담당하며 과학과 종교 분야 간의 차이를 연결하는 역할을 합니다."
 elven_councilor_eilistraee:0 "사무총장"
 elven_councilor_eilistraee_desc:0 "사무총장은 평화유지 위원회의 회의를 주재하며 국가 대변인 역할을 수행합니다."
 elven_councilor_drow_warriors:0 "Spymaster"
 elven_councilor_drow_warriors_desc:0 "첩보관은 외국 및 국내 첩보 네트워크를 담당합니다."
