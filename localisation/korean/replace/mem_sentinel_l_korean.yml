l_korean:
 mem_sentinel_dig_site:0 "죽었고 매장된"
 mem_sentinel_dig_site_desc:0 "[From.Planet.GetPlanetMoon]에서 모래와 먼지에 묻혀있는 거대한 정체불명 함선이 발견되었습니다.\n\n생명이나 에너지 흐름은 감지되지 않지만, 함선 자체는 멀쩡한 상태로 보입니다."
 mem_sentinel.1.name:0 "진입 구역"
 mem_sentinel.1.desc:0 "우리는 마침내 배 안으로 들어가는 데 성공했습니다. 선체의 구멍을 통해 모래를 파고 들어갔습니다. §Y[Leader.GetName]§!에 위치한 구획은 [Leader.GetHerselfHimself]으로 보이며, 외부에서 소규모 군인 집단에 의해 침입당한 수송선 격납고입니다. \n\n격납고에 흩어져 있는 여러 시체는 몇 세기 전 인근 우주 지역에 존재했던 §YColgari Empire§!의 반군 세력에 속하는 것으로 보입니다. 반군은 자신들이 진짜 고인이 된 황제를 사칭하는 불법 복제인간이라고 믿었던 황제 조라스의 권위를 인정하기를 거부했습니다. 그들은 그의 개인 기함인 §SFirst Sentinel§!에 탑승하기 위한 임무를 수행했으며, 그를 붙잡거나 암살하기 위한 절박한 시도를 했습니다. \n\n이 방에서 그들은 충성파 해병대와 교전하였고, 승리하여 발판을 마련했습니다."
 mem_sentinel.2.name:0 "중앙 통제실"
 mem_sentinel.2.desc:0 "§Y[Leader.GetName]§!는 [Leader.GetSheHe]이 또 다른 관심 있는 방을 침입하는 데 성공했다고 보고합니다. \n\n이번 방은 AI 코어와 또 다른 제어 터미널이 있는 컴퓨터 허브로 보입니다. 터미널에서의 데이터는 이 배가 실제로 §S퍼스트 센티넬§!이며, 공격 당시 황제 조라스가 지원을 모으기 위해 제국을 가로질러 이동 중이었다는 것을 확인합니다. \n\n공격 이후, 승무원들은 자동 방어 시스템을 활성화하려고 시도했지만, 대부분은 탑재된 AI에 의해 직접 제어되고 있었습니다. 그러나 뭔가 잘못되었습니다: 어떤 이유에서인지 안드로이드 군인들이 승무원과 침입자를 구별하지 못하고 두 그룹 모두를 무차별적으로 공격했습니다. \n\n현재 방의 상태로 판단할 때, 승무원들은 허브를 되찾았고 극단적인 편견으로 AI를 무력화하기 위해 폭발물을 사용했습니다."
 mem_sentinel.3.name:0 "그랜드 홀"
 mem_sentinel.3.desc:0 "우리는 함선 중앙의 갑판 여럿을 차지하고 있는 거대한 공간을 발견했습니다. \n\n이곳은 황제가 연회를 주최하거나 다른 행사에 참여할 수 있도록 만들어진 일종의 응접실로 보입니다. \n\n바닥에 널브러진 시체들과 엉망이 된 가구로 보아 반군, 배의 보안 요원들, 그리고 보안 로봇들은 이곳에서 서로 대규모 총격전을 벌였던 것 같습니다. 세 세력 모두 이 교전에서 큰 피해를 보았기에 승자를 가려내기는 어려울 것 같습니다."
 mem_sentinel.4.name:0 "황제의 침소"
 mem_sentinel.4.desc:0 "우주선의 내부 구획 깊숙한 곳에서, 우리는 황제를 위해 예약된 강화된 숙소를 발견했습니다. \n\n호화 구획은 무기 화력, 방사선 및 기타 환경 요인으로부터 보호되었으며, 자체 생명 유지 시스템을 갖추고 있고 수년간 지속될 호화로운 아이템과 진미로 가득 차 있었습니다. \n\n§Y[Leader.GetName]§!는 방 안의 유해가 황제 조라스 자신과 그의 가장 신뢰받는 고문 및 궁정인 여섯 명의 것이라고 믿고 있습니다. 그들의 사망 원인은 - 모든 것 중에서 - 요오드 중독인 것으로 보입니다. \n\n요오드는 콜가리 생리학에 중독성 효과를 주어 소량에서는 행복감을 유도하지만, 대량에서는 전신 장기 부전을 초래합니다. 미라화된 조직의 농도는 치명적인 것보다 10배 더 높은 것으로 보입니다. 이것이 사고인지, 자살인지, 살인인지 여부는 불분명합니다."
 mem_sentinel.5.name:0 "무너진 감시자"
 mem_sentinel.5.desc:0 "§Y[Leader.GetName]§! [Leader.GetSheHe]이(가) 드디어 함선의 다리를 성공적으로 찾았다는 보고입니다. 다리 시스템의 손상은 최소한이며, 그 파괴로 이어진 사건들은 훨씬 더 명확해졌습니다. \n\n전투나 AI 반란이 함선을 파멸로 이끈 것이 아니라 엔진 고장이었다는 사실이 밝혀졌습니다. 한 개의 스러스터에서 플라스마 흐름 제어 시스템의 사소한 결함은 다른 경우라면 쉽게 수정될 수 있었지만, 승무원들이 내부에서 전투와 피해 통제에 바쁘고 AI 시스템이 오프라인 상태였기 때문에 이를 모니터링할 사람이 없었습니다. \n\n하나의 관이 터지면서 함선은 막대한 양의 방사능에 의해 침수되었고, 특별히 차폐된 황제의 구역을 제외한 모두가 사망했습니다. 이 사건은 콜가리 영토 외부에서 발생했으며, AI 코어를 비활성화함으로써 구조 신호가 전송되는 것을 방지했을 뿐만 아니라 나머지 해군의 원거리 추적도 비활성화되었습니다. 조종할 사람이 없었던 덕분에, 이 잠재된 함선은 매우 오랜 시간 동안 우주를 떠돌다가 [From.Planet.GetName]의 중력에 의해 포획되어 그 표면에 추락했습니다. \n\n그럼에도 불구하고, 이 함선은 여전히 우주에서 운항할 수 있으며, 소규모 수리를 통해 다시 작동할 수 있어 우리 해군에서 복무할 수 있습니다."
 mem_sentinel.5.a:0 "함선을 수리해라."
 mem_sentinel.5.a.tooltip:0 "전함 §Y첫 번째 감시자§!가 우리 함대에 합류합니다."
 mem_sentinel.5.b:0 "분해해 버려라. 이 배는 불운 덩어리일 뿐이다."
