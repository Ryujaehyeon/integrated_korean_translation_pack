l_korean:
 ResourceDiscovery1:0 "[This.GetName]의 지표 바로 아래에서, 세월 속에 숨겨져 있던 낡은 구조물을 발견했습니다. 골조는 어느 정도 남아 있지만, 건물 자체 내부에는 회수할 만한 것이 없습니다. 그러나 우리는 더 깊은 지하로 이어지는 통로를 발견했습니다."
 ResourceDiscovery2:0 "[This.GetName]에서 지정된 작업을 여전히 수행하려 애쓰는, 더 작고 혼란스러운 기계 무리를 발견했습니다. 기계들은 잔해와 해체된 장비로 막힌 중심 지점에 모여 있었습니다. 주 허브는 오프라인 상태이며 거의 쓸모가 없지만, 일정한 간격으로 발생해 더 깊은 지하로 이어지는 신호 덕분에 우리가 따라갈 명확한 방향을 얻었습니다."
 ResourceDiscovery3:0 "[This.GetName]에 대한 초기 분석 결과, 표면의 구멍 주변에 기본 연구 시설이 있었고 그 구멍은 거대한 지하 동굴로 이어진다는 사실이 드러났습니다. 연구 시설과 그 기계 장치가 모두 회수 불가능한 상태이므로, 우리는 동굴 조사에 집중하기로 했습니다."
 ResourceDiscovery4:0 "[This.GetName]의 표면을 철저히 조사한 끝에, 해당 지역을 집중적으로 스캔하던 탐사체를 발견했습니다. 우리가 무엇을 하든, 어떤 식으로 방해하든, 탐사체는 결국 그 한 지점으로 돌아가 작동을 계속합니다. 그 행동 패턴을 따라, 우리는 지하 조사를 시작했습니다."
 ResourceDiscovery5:0 "[This.GetName]에서 오래되고 폐허가 된 채굴 또는 연구 기지를 발견했습니다. 과거 어느 시점에 표면으로 추락했을 가능성이 높아 보입니다. 또한 공격을 받은 흔적도 보입니다. 심각한 손상에도 불구하고, 이 기지는 계속해서 지하로 신호를 보내고 있습니다. 이동하기 전에 이를 더 조사해야 할 것입니다."
