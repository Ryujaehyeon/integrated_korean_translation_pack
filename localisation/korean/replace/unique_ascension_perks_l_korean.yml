 domesticated_ameoba:0 "§B우주 아메바§!"
 domesticated_amoeba_tooltip_1:0 "$domesticated_ameoba$가 다른 우주 외계 종보다 더 빠르게 번식합니다. 특수 프로토콜을 시행하려면 £food£ 식량을 섭취해야 합니다.\n\n"
 domesticated_amoeba_tooltip_2:0 "그들의 §G$TRIGGER_HOME_PLANET$§!는 £energy£ $energy$, $society_research$ £society£ 및 £volatile_motes£ $volatile_motes$를 생성할 수 있습니다."
 domesticated_cloud:0 "§B공허 구름§!"
 domesticated_cloud_tooltip_1:0 "$domesticated_cloud$은 함선의 §B보호막§!과 §G장갑§!을 100% 관통할 수 있는 무기를 가지고 있습니다. 그것들은 파괴된 적 함대에서 복제될 수도 있습니다. 특수 프로토콜을 시행하려면 £energy£ $energy$를 섭취해야 합니다.\n\n"
 domesticated_cloud_tooltip_2:0 "그들의 §G$TRIGGER_HOME_PLANET$§!는 £energy£ $energy$를 생성할 수 있으며, $PHYSICS_RESEARCH$ £physics£와 어두운 물질 £sr_dark_matter£도 생성할 수 있습니다."
 domesticated_crystals_tooltip_1:0 "$domesticated_crystal$은 강인한 §G방어력§!을 가지고 있으며, 그들의 결정 조각은 다양한 적들과 대처할 수 있습니다. 그들은 특별 프로토콜을 실행하기 위해 £minerals£를 섭취합니다.\n\n"
 domesticated_crystals_tooltip_2:0 "그들의 §G$TRIGGER_HOME_PLANET$§!은 광물 £minerals£, 물리학 연구 $PHYSICS_RESEARCH$ £physics£ 및 희귀 결정 £rare_crystals£을 생성할 수 있습니다."
