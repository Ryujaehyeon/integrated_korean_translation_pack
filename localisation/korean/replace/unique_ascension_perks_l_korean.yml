 trade_policy_adv_conversion_alloys_name:0 "£alloys£ §Y군비§! "
 trade_policy_adv_conversion_alloys_name_desc:0 "무역으로 인한 돈이 군비에 사용되고 있습니다.\n\n§E수집된 £trade_value£ §Y무역 가치§! 하나당 £energy£ §Y0.15§!와 £alloys£ §Y0.5§!를 제공합니다.§! "
 trade_policy_adv_conversion_consumer_goods_name:0 "£consumer_goods£ §Y민간 경비§!"
 trade_policy_adv_conversion_consumer_goods_name_desc:0 "무역으로 인한 돈이 민간 경비에 사용되고 있습니다.\n\n§E수집된 £trade_value£ §Y무역 가치§! 하나당 £energy£ §Y0.15§!와 £consumer_goods£ §Y0.80§!를 제공합니다.§!"
 trade_policy_adv_conversion_energy_name:0 "£energy£ §Y귀족의 돈§!"
 trade_policy_adv_conversion_energy_name_desc:0 "무역으로 인한 돈이 국가의 부와 귀족 사회를 개선하기 위한 개인 프로젝트에 재투자되고 있습니다.\n\n§E수집된 £trade_value£ §Y무역 가치§! 하나당 £energy£ §Y2§!를 제공합니다.§!"
 trade_policy_adv_conversion_food_name:0 "£food£ §Y농업 재정§!"
 trade_policy_adv_conversion_food_name_desc:0 "무역으로 인한 돈이 국가의 농업 지구에 사용되고 있습니다.\n\n§E수집된 £trade_value£ §Y무역 가치§! 하나당 £energy£ §Y0.25§!와 £food£ §Y1.25§!를 제공합니다.§!"
 trade_policy_adv_conversion_minerals_name:0 "£minerals£ §Y채굴 투자§!"
 trade_policy_adv_conversion_minerals_name_desc:0 "무역으로 인한 돈이 채굴 지구의 품질 향상에 사용되고 있습니다.\n\n§E수집된 £trade_value£ §Y무역 가치§! 하나당 £energy£ §Y0.25§!와 £minerals£ §Y1§!을 제공합니다.§!"
 trade_policy_adv_conversion_research_name:0 "£physics£ £society£ £engineering£ §Y연구 개발§!"
 trade_policy_adv_conversion_research_name_desc:0 "무역으로 인한 돈이 연구 개발 가속에 사용되고 있습니다.\n\n§E수집된 £trade_value£ §Y무역 가치§! 하나당 £energy£ §Y0.10§!과 £physics£ £society£ £engineering£ §Y0.125§!을 제공합니다.§!"
 trade_policy_adv_conversion_trade_league_name:0 "£energy£ £consumer_goods£ £unity£ §Y우월한 무역 연맹§!"
 trade_policy_adv_conversion_trade_league_name_desc:0 "경제적 번영과 무역 연맹의 발전으로 인해 우리가 가진 무역의 가치는 그 어떤 지역에서보다 뛰어납니다.\n\n§E수집된 £trade_value£ §Y무역 가치§! 하나당 £energy£ §Y0.5§!과 £minerals£ §Y0.25§!, £food£ §Y0.25§!, £consumer_goods£ §Y0.25§!, £unity£ §Y0.25§!, £physics£ £society£ £engineering£ §Y0.05§!을 제공합니다.§!"
 trade_policy_adv_conversion_unity_name:0 "£unity£ §Y공공 보건 화폐 주조§!"
 trade_policy_adv_conversion_unity_name_desc:0 "무역으로 인한 돈이 국가의 공공 보건을 위한 화폐 주조에 사용되고 있습니다.\n\n§E수집된 £trade_value£ §Y무역 가치§! 하나당 £energy£ §Y0.25§!와 £unity£ §Y1§!을 제공합니다.§!"
