 trait_ruler_appreciated:0 "인정받은"
 trait_ruler_appreciated_desc:0 "이 지도자는 국민들로부터 인정을 받아 그들의 행복을 증가시킵니다."
 trait_ruler_colony_builder:0 "식민지 건설자"
 trait_ruler_colony_builder_desc:0 "이 지도자는 식민지의 건물 건설에 더 많은 에너지를 소비할 것 입니다."
 trait_ruler_influencer:0 "승천한 이상주의자"
 trait_ruler_influencer_desc:0 "이 지도자는 정신적 상승 과정에서 우리 정부의 윤리적 이상에 대한 계시를 받은 것으로 보이며, 도전받을 때마다 이를 열렬히 방어합니다. 놀랍게도, 그들은 여전히 비판을 크게 감사히 여기며 건설적인 토론에 참여할 의지가 extraordinarily 높습니다. 그들은 공적인 논의를 시작할 기회를 잡아 항상 자신의 주요 주장을 합리적으로 방어할 수 있었고, 이는 대중이 우리 정부의 윤리에 대한 믿음을 강화하는 데 기여합니다."
 trait_ruler_leader_of_leaders:0 "리더들의 리더"
 trait_ruler_leader_of_leaders_desc:0 "이 지도자는 정신적 상승 과정에서 어떤 계시를 받았으며, 이를 통해 폭넓은 인재 채용 기준을 고수하고 지도자 자격 범위를 대폭 확장하여 '상황에 맞는 지도자 선발 풀을 최적화'한다고 주장합니다."
 trait_ruler_negotiator:0 "협상가"
 trait_ruler_negotiator_desc:0 "이 지도자는 정신적 상승 과정에서 협상이나 토론과 같은 교환에서 당사자들의 요구, 이상, 선호를 항상 정신적으로 교차 참조할 수 있는 정신적 방법을 개발하였으며, 이를 통해 우리 제국의 파벌 및 정치가들과 보편적으로 높이 평가되는 방식으로 상호작용하고 협력할 수 있습니다."
 treasures:0 "보물"
 treasures_desc:0 "보물은 지정된 시장에서 많은 물건과 거래될 수 있는 매우 귀중한 자원입니다. 대부분의 경우 높은 무역 가치와 교환 되지만 게슈탈트 제국은 에너지 크레딧으로 교환 될 것 입니다."
