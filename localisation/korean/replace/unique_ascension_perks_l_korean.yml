 CortanaEvent.100.Desc:0 "바로 이겁니다. 우리는 제 4의 연구원 역할을 할 수 있을 만큼 충분한 자율성을 확보한 최초의 스마트 AI를 만들었습니다. 그녀에게 에너지를 투자함으로써 우리는 다른 제국들 보다 빨리 기술을 향상시킬 수 있을 것 입니다."
