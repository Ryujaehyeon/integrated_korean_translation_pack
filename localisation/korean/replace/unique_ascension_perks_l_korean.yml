 UniqueAscensionPerksMenuEvents.101.Desc:0 "이 상승 특성은 $SPECIAL_PROJECT_TOOLTIP$을 사용하여 특별 방어 항성 성채를 건설할 수 있게 해줍니다. 건설 함선 중 하나의 위치에서 우주 어디에나 건설할 수 있으며, 합금과 공학 연구를 대가로 합니다. 또한 일반적으로 항성 기지를 개선하는 데 드는 시간과 비용을 줄여줍니다."
 UniqueAscensionPerksMenuEvents.102.Desc:0 "이 상승 특성은 당신이 소행성, 행성 및 서식지와 같은 천체를 처음부터 생성할 수 있게 해줍니다. 당신은 에너지 크레딧과 공학 또는 $society_research$를 대가로 건설 함선의 위치에서 $SPECIAL_PROJECT_TOOLTIP$를 통해 이들을 건설할 수 있습니다. 더 고급 프로젝트 중 일부를 잠금 해제하기 위해 필요한 기술을 연구하거나 상승 특성을 취득해야 합니다."
 UniqueAscensionPerksMenuEvents.103.Desc:0 "우주 공간 깊숙한 곳에 당신만의 성단을 만들고 에너지 크레딧, 암흑 물질을 이용해 성단의 성계를 추가할 수 있게 됩니다. 새로운 이벤트, 레비아탄 등 현재 게임에서 놓칠 수 있는 컨텐츠들을 접하는데 매우 유용합니다. $ap_real_space_compatibility$"
 UniqueAscensionPerksMenuEvents.104.Desc:0 "지도자들을 위한 강력한 특성을 해제하고 더욱 높은 레벨의 지도자들을 처음부터 가질 수 있게 됩니다."
 UniqueAscensionPerksMenuEvents.105.Desc:0 "지도자들을 더욱 많은 특성과 높은 레벨로 향상시킵니다. 이 승격 특전 선택시 매우 강력한 제국 보정치 중 하나를 선택할 수 있는 권한을 가지게 됩니다."
 UniqueAscensionPerksMenuEvents.106.Desc:0 "코타나에게 에너지 크레딧을 지불하여 연구 기술 중 하나를 선택하여 완료할 수 있으며 반복 기술을 자동적으로 연구할 것 입니다. 시간이 지나면서 연구를 통해 점점 더 강력한 기능을 가지게 됩니다. 코타나와 관련된 모든 기술을 연구할 경우 18000의 에너지 크레딧으로 10개의 반복 기술을 연구할 수 있는 특별한 유물을 해제할 것 입니다."
 UniqueAscensionPerksMenuEvents.107.Desc:0 "이 상승 특성은 $automatic_drone$을 새로운 건물로 활용할 수 있게 해줍니다. 이 건물은 건설과 유지 관리를 위해 드론이 필요하지만, 대신 인구 직업 없이 자원을 생산할 수 있습니다. 또한, 모든 행성에서 이러한 유형의 건물을 개선할 수 있는 제국 칙령에 접근할 수 있게 됩니다."
 UniqueAscensionPerksMenuEvents.108.Desc:0 "이 상승 특성은 $automatic_drone$을 $nanites$로 변환할 수 있게 하여 대량 생산할 수 있게 합니다. 나노입자는 또한 거주 가능한 행성에서 자원을 대량으로 보유한 나노입자 세계로 전환하는 결정의 일환으로 사용될 수 있습니다. 이들은 $lgate_disabled$와 $NAME_Nanite_Factory$라는 새로운 메가구조와 같은 여러 특별 기능에도 사용될 수 있으며, 이 메가구조는 나노입자와 합금을 생산합니다. 또한 신기술에 접근할 수 있으며, $SPECIAL_PROJECT_TOOLTIP$를 통해 해군을 개선하기 위한 나노입자로 만들어진 새로운 강력한 함선 구획을 잠금 해제할 수 있습니다."
 UniqueAscensionPerksMenuEvents.109.Desc:0 "확률적으로 동시에 여러 팝이 생성될 수 있게 되어 인구 성장 속도가 크게 개선됩니다. 행성의 팝 성장 속도를 높이는 고유의 팝 성장 대기열을 만들 수 있는 새로운 건물을 이용할 수도 있습니다."
 UniqueAscensionPerksMenuEvents.110.Desc:0 "식민지 개척 단계에서 고급 건물과 많은 수의 인구를 정착시킬 수 있게 합니다."
 UniqueAscensionPerksMenuEvents.111.Desc:0 "이 상승 특성은 새로운 구역 슬롯을 잠금 해제하여 모든 행성의 최대 잠재력을 활용할 수 있게 하며, 건물/구역을 놀라운 속도로 건설할 수 있게 해줍니다. 또한 특별한 기능을 통해 전체 행성 자원 생산량을 향상시킬 수 있습니다. $perk_building_slots$"
 UniqueAscensionPerksMenuEvents.112.Desc:0 "파괴된 함선의 잔해를 광물로 재활용 할 수 있게 됩니다. 이 특성은 유기 함선에는 적용되지 않습니다. 파괴된 함선의 일부가 다음 해에 복원되는 기능 또한 추가됩니다."
 UniqueAscensionPerksMenuEvents.113.Desc:0 "전투에 패배했을때 이탈할 수 있는 확률을 크게 늘립니다. 또한 영토 내로 더 빠르게 이동할 수 있는 더 싸고, 건설이 빠른 게이트웨이를 건설할 수 있습니다."
 UniqueAscensionPerksMenuEvents.114.Desc:0 "무역가치의 이용 옵션을 늘립니다. 기존 전환 가능 자원의 경우 비율이 향상되며, 무역가치를 합금, 식량, 광물, 연구 포인트와 같은 다른 자원으로 전환하는 것 또한 가능하게 됩니다. $ap_no_trade_policy$"
 UniqueAscensionPerksMenuEvents.115.Desc:0 "이 상승 특성은 우리 제국의 새로운 정책에 접근할 수 있게 하여 귀하의 목표에 더 잘 적응할 수 있도록 합니다. 귀하의 통치자는 또한 빠르게 최대 수준에 도달할 것이며, 완료되면 자원과 교환하여 범죄, 안정성, 편의 시설, 주택 및 실업과 같은 귀하의 행성의 작은 문제를 처리할 수 있는 가능성을 가지게 됩니다."
 UniqueAscensionPerksMenuEvents.116.Desc:0 "해적과 약탈자들로부터 영토를 보호할 수 있으며 해군 함대가 다른 목표에 집중할 수 있게 해줍니다. 또한 과학선을 호위하여 은하 탐험을 덜 위험하게 만들 수 있습니다. $ap_subject_compatibility$"
 UniqueAscensionPerksMenuEvents.117.Desc:0 "번식, 전쟁, 영토 방어, 자원, 연구 목적으로 이용될 수 있는 우주 태생의 외계종들을 길들일 수 있습니다. 각 종은 고유의 장점을 가지고 있습니다. $ap_subject_compatibility$"
 UniqueAscensionPerksMenuEvents.118.Desc:0 "이 상승 특성은 우주 어딘가에 숨겨진 강력한 존재인 $ap_leviathan_master$와 소통할 수 있게 해줍니다. $ap_no_spoil$ $perk_more_content$ $ap_subject_compatibility$"
 UniqueAscensionPerksMenuEvents.119.Desc:0 "행성에서 적색, 황색 행성 보정치를 제거하고 새로운 녹색 보정치로 대체하는 행성 결정을 추가합니다.특별한 행성 보정치는 제거할 수 없습니다. 친화적인 자연을 수용할 수 있는 모든 행성에 새로운 희귀 특징을 생성하는 새로운 기능도 가능해졌습니다."
 UniqueAscensionPerksMenuEvents.120.Desc:0 "행성을 더욱 빠르게 발전시킬 수 있도록, 기계 팝을 대량으로 만들어내는 행성 결정을 추가합니다. 행성의 팝 조립 속도를 높는 고유의 팝 조립 대기열을 가진 새로운 건물을 이용할 수 있습니다."
 UniqueAscensionPerksMenuEvents.121.Desc:0 "행성의 모든 유기 팝을 기계 팝으로 전환하거나 그 반대의 경우를 가능하게 합니다."
 UniqueAscensionPerksMenuEvents.122.Desc:0 "이 상승 특성은 상업 조약 없이 모든 제국의 행성에 지사 사무소를 열 수 있게 해줍니다. 다른 메가코퍼스와 심지어 자신의 행성에서도 지사 사무소를 열 수 있습니다. 다만, 집단적 존재와 타락한 제국은 여전히 제외됩니다. $perk_no_branch_office$ $perk_branch_building_slots$"
 UniqueAscensionPerksMenuEvents.123.Desc:0 "이 상승 특성은 당신이 타락한 제국의 의견을 개선할 수 있게 하여, 그들이 당신에게 선물, 함선 및 기술을 줄 가능성을 높입니다. 또한 충분한 영향력으로 그들을 깨울 수 있는 능력을 얻으며, 이는 당신의 은하에서 '$mod_war_in_heaven$'의 가능성을 심각하게 증가시킵니다. 외계종 혐오 성향의 고립주의 타락한 제국은 이 특성의 영향을 받지 않는다는 점에 유의하십시오."
 UniqueAscensionPerksMenuEvents.124.Desc:0 "이 상승 특성은 필요한 조건이 충족될 경우, 당신의 행성에서 "안정성의 축하" 이벤트를 시작할 수 있게 해줍니다. 축하 행사에 대한 자세한 내용은 상승 특성 설명에서 확인할 수 있습니다."
 UniqueAscensionPerksMenuEvents.125.Desc:0 "이 상승 특성은 당신이 $pc_city$ 또는 모드에서의 다른 특별한 행성을 거대한 크기 150의 세계로 변형할 수 있게 해줍니다. 일단 완료되면 행성 결정 탭에서 메뉴를 열 수 있으며, 이를 통해 행성의 자원 생산을 개선할 수 있습니다. 이 특성은 단 하나의 행성만으로 플레이하려는 모든 플레이어에게 필수적일 가능성이 높습니다."
 UniqueAscensionPerksMenuEvents.126.Desc:0 "이 상승 특성은 소유한 모든 팝이 제국의 윤리를 따르도록 강제할 수 있게 하며, 해당 윤리를 따르는 팝의 수에 따라 행성에서 영향력을 수집하는 새로운 행성 결정을 사용할 수 있게 합니다."
 UniqueAscensionPerksMenuEvents.127.Desc:0 "이 상승 특성은 제국의 윤리에 따라 작업을 완료함으로써 대량의 통합을 생성할 수 있게 해줍니다. 또한 통합 생산에 중점을 둔 새로운 메가구조에 접근할 수 있습니다. $perk_more_content$"
 UniqueAscensionPerksMenuEvents.128.Desc:0 "자원을 일정한 가격으로 거래할 수 있는 민간 우주 상인들과 접촉 가능하게 됩니다. 특정 기술을 연구함으로써 노예와 기계, 지상군, 함선과 같은 것들을 구매할 수 있습니다."
 UniqueAscensionPerksMenuEvents.129.Desc:0 "이 상승 특성은 식량을 대가로 하여 당신의 지도자를 '복제'할 수 있게 해줍니다. 복제된 지도자는 원래 지도자와 동일한 나이와 특성을 가집니다. §YAI 제국§!은 또한 때때로 건조된 해군 함선을 무료로 복사할 수 있는 새로운 기능에 접근할 수 있어 해군을 더 빠르고 저렴하게 개선할 수 있습니다. 이 특성은 '공격적인 무리' 및/또는 '$ap_recycling_drones$'와 결합하면 매우 강력해질 수 있습니다."
 UniqueAscensionPerksMenuEvents.130.Desc:0 "이 상승 특성은 신비로운 $ap_mega_hive_mind$와 그들의 영역에 들어가 소통할 수 있게 해줍니다. $ap_no_spoil$ $perk_more_content$"
 UniqueAscensionPerksMenuEvents.131.Desc:0 "이 상승 특성은 파괴된 적 함선을 감염시켜 다음 해가 끝날 때까지 당신의 편으로 돌릴 수 있게 해줍니다. 적을 물리칠 때마다 당신의 해군이 점점 더 강력해지면서 빠르게 압도적인 힘을 가질 수 있습니다. 이 특성은 '$ap_super_hive_mind$' 및/또는 '$ap_recycling_drones$'와 결합하면 매우 강력해질 수 있습니다."
 UniqueAscensionPerksMenuEvents.132.Desc:0 "포획한 팝을 군체 의식의 드론으로 만들 수 있게 되며, 행성을 정복할 수록 개체 수를 폭발적으로 증가시킬 수 있게 됩니다."
 UniqueAscensionPerksMenuEvents.133.Desc:0 "15년 후 이 상승 특성은 행성에서 추가 자원을 생산하고 연구를 수행하며 일반적으로 매우 유용한 수치를 제공하는 맞춤형 자원을 생성할 수 있는 새로운 행성 결정을 사용할 수 있게 해줍니다. 이 결정은 무주택 행성에서도 활성화할 수 있어 그들의 거주 가능성을 높일 수 있으며, 행성에 더 많은 하이브마인드 비축이 있을수록 새로운 인구가 태어날 확률이 높아집니다."
 UniqueAscensionPerksMenuEvents.134.Desc:0 "플레이어 제국의 팝으로 구성된 원시 문명을 창조합니다. 현재로써는 게슈탈트 제국은 사용할 수 없는 특전이지만 추후 해결 방법을 찾아낼 것입니다. 원시인들과 상호 작용하는 방법이 늘어나며, 원시 문명 발전 도중 새로운 이벤트를 접할 수 있습니다."
 UniqueAscensionPerksMenuEvents.135.Desc:0 "이 상승 특성은 당신이 거주하는 항성계를 새로운 "$ap_powerful_vassals$"로 전환할 수 있는 새로운 행성 결정을 사용할 수 있게 해줍니다. 이들은 일반적인 종속체 유형보다 여러 가지 이점을 가지며, 현재의 기술을 보유하고 있으며 결코 당신을 배신하지 않을 것입니다. 또한 당신의 종속체를 위해 강력한 함대를 건조하기 위해 합금과 에너지를 제공할 수 있는 새로운 제국 칙령에 접근할 수 있게 됩니다. $ap_subject_compatibility$"
 UniqueAscensionPerksMenuEvents.136.Desc:0 "이 상승 특성은 맞춤형 탐사 함선을 이용하여 공허로 탐사를 수행할 수 있게 해줍니다. $ap_no_spoil$ $perk_more_content$"
 UniqueAscensionPerksMenuEvents.137.Desc:0 "이 상승 특성은 유기체 문명에서 기계 봉기를 촉발하여 내부에서 약화시키고 파괴할 수 있게 해줍니다. 기계 봉기를 촉발하기 위한 기준은 얻기 어려운 편이어서, 미래에 이를 수행하기 위해 그들을 침투할 가능성도 있습니다. 침투가 실패할 수 있으며, 이러한 실패한 작전의 결과는 상당히 심각할 수 있습니다. 또한, 당신의 주체를 위해 강력한 함대를 건조하기 위해 합금과 에너지를 제공할 수 있는 새로운 제국 칙령에 접근할 수 있습니다. $ap_subject_compatibility$"
 UniqueAscensionPerksMenuEvents.138.Desc:0 "이 상승 특성은 기계 제국을 위한 중앙 코어를 건설할 수 있게 해 주며, 이는 제국에 강력한 수치를 제공하고 때때로 연구나 자원 생산에 도움을 줄 것입니다."
 UniqueAscensionPerksMenuEvents.139.Desc:0 "이 상승 특성은 강력한 $ap_defense_sentinels$에 대한 접근을 허용하며, 이들은 국경 방어군으로 작용하여 귀하의 영토를 침범하려는 모든 위협으로부터 방어합니다. $ap_subject_compatibility$"
 UniqueAscensionPerksMenuEvents.140.Desc:0 "지도자의 경험과 특징을 기계 신체에 이식하여 복제할 수 있게 됩니다."
 UniqueAscensionPerksMenuEvents.141.Desc:0 "이 상승 특성은 전투, 건설 또는 탐사 대신 자원 생산에 중점을 둔 특별한 함선을 건설할 수 있게 해줍니다. 메가 엔지니어링 기술은 일부 킬로 또는 메가 구조물과 맞먹는 더욱 강력한 자원 생산 함선을 잠금 해제할 것입니다. 이 특성은 또한 $SPECIAL_PROJECT_TOOLTIP$을 시작하여 민간인 자금으로 운영되는 호송대가 완료되면 한 식민지에서 다른 식민지로 자원과 사람을 운송할 수 있게 해줍니다."
 UniqueAscensionPerksMenuEvents.142.Desc:0 "이 상승 특성은 귀하의 권한과 윤리에 따라 결정되는 새로운 맞춤형 구역 유형에 대한 접근을 허용합니다. 이러한 새로운 구역은 표준 구역에 의존하는 이들에 비해 경제적 우위를 제공할 수 있는 강력한 새로운 직업을 잠금 해제합니다. $perk_more_content$ $ap_district_ui_compatibility$"
 UniqueAscensionPerksMenuEvents.143.Desc:0 "궤도 폭격당하는 행성에 정밀 타격을 실시해 지구나 건물을 파괴하고 팝을 죽이거나 납치하며, 자원을 약탈할 수 있으며, 심지어는 라그나로크를 실시해 행성을 없애버릴 수 있습니다."
 UniqueAscensionPerksMenuEvents.144.Desc:0 "'보물'이라는 새로운 자원을 추가하며, 이는 무역가치나 에너지를 창출하거나, 골동품과 교환하고 타 제국에 기부하는데 사용될 수 있습니다. 다음 승격 특전을 잠금 해제하는데 필요한 자원이기도 합니다. 시간이 지나면 보물 생산을 늘려줄 특징이 발견될 것이며, 그 외에도 보물을 생산하는 직업을 제공하는 건물을 건설할 수도 있습니다."
 UniqueAscensionPerksMenuEvents.145.Desc:0 "암흑가에 접근할 수 있는 가능성을 열어줍니다. 접근에 성공하면 다양한 사람들에게 보물을 제공하고 서비스를 받을 수 있습니다. 밀수꾼에게서는 자원을 얻을 수 있으며, 범죄 두목과 해적, 약탈자들과 계약을 맺거나 적대 제국과 거래를 할 수도 있습니다. 몰락의 신봉자 승격 특전을 가지고 있다면, 몰락한 제국의 비밀을 얻기 위해 몰락한 제국의 잔존자들과 거래를 할 수도 있습니다."
 UniqueAscensionPerksMenuEvents.146.Desc:0 "이 상승 특성은 통합에 집중하고 전통 트리를 완성하는 것에 대한 걱정 없이 미래에 더 많은 상승 슬롯을 잠금 해제할 수 있게 해줍니다. 10년, 25년, 50년, 100년의 지연 후에 총 4개의 무료 상승을 받을 수 있으며, 그 외에 몇 가지 소소한 보너스도 포함됩니다. $perk_more_slots$"
 UniqueAscensionPerksMenuEvents.147.Desc:0 "이 상승 특성은 당신이 $SPECIAL_PROJECT_TOOLTIP$을 시작할 수 있게 해주며, 완료되면 12개의 서로 다른 종의 12개의 팝을 생성하고, 또한 당신의 수도를 가이아 행성으로 전환할 수 있는 선택권을 제공합니다."
 UniqueAscensionPerksMenuEvents.148.Desc:0 "반물질 채취를 위한 화이트 홀을 찾을 수 있게 됩니다. 에너지 크레딧, 물리학, 암흑 물질 생산량을 증가시키거나, 에너지 무기, 보호막, 추진기를 개선할 수 있습니다."
 UniqueAscensionPerksMenuEvents.149.Desc:0 "이 상승 특성은 귀하의 식민지에서 심우주 스캐너를 건설할 수 있게 하여, 귀하의 경계 내 자원이 없는 행성에서 "놓친" 이상 현상을 탐지할 수 있게 하여 더욱 유용하게 만듭니다. $perk_more_content$"
 UniqueAscensionPerksMenuEvents.150.Desc:0 "이 상승 특성은 심우주 스캐너와 동일한 규칙에 따라 새로운 고고학 유적지를 탐지할 수 있게 해줍니다. 필요한 것은 심우주 스캐너가 있는 식민지와 고고학 유적지를 지원할 수 있는 범위 내의 몇몇 행성입니다. $perk_more_content$"
 UniqueAscensionPerksMenuEvents.151.Desc:0 "이 선택받은 사회 특성은 특별한 자원이 건물처럼 작용하는 완전 자동 식민지를 설립할 수 있는 결정을 허용합니다. 행성은 플레이어가 선택한 방향에 따라 발전하며, 구역과 건물에 의해 부과된 제한과 관계없이 계속 발전하지만, 제대로 작동하기 위해서는 광물이 필요합니다."
 UniqueAscensionPerksMenuEvents.152.Desc:0 "이 상승 특성은 거의 모든 직업에서 연구를 추가로 생산할 수 있게 하여 귀하의 제국의 연구 생산량을 크게 증가시킬 것입니다. 또한 매 5년마다 "기술 관료 회의"를 시작하여 귀하의 제국이 세 가지 다른 연구 분야에 전문화할 수 있게 하여 이 분야에서 인상적인 연구 속도 보너스를 제공합니다."
 UniqueAscensionPerksMenuEvents.153.Desc:0 "녹아내린 행성을 아주 특별한 행성으로 바꾸어, 개척할 수 있도록 만들 것입니다. 합금, $sr_living_metal$, 무기의 피해량과 팝 조립을 위한 특별한 지구를 제공합니다. $sr_living_metal$을 이용하는 특별한 함선 부품도 잠금 해제됩니다. $ap_district_ui_compatibility$"
 UniqueAscensionPerksMenuEvents.154.Desc:0 "이 상승 특성은 $ap_library_wisedom$을 생성하여 단결을 대가로 새로운 법령, 캠페인, 추가 자원 및 기타를 이용할 수 있게 합니다."
 UniqueAscensionPerksMenuEvents.155.Desc:0 "과학선이 성계를 완전히 탐사한 뒤에 주인 없는 성계를 바로 소유하고, 건설선 없이 직접 전초 기지를 건설할 수 있습니다."
 UniqueAscensionPerksMenuEvents.2.Desc:0 "모드에 의해 추가된 각 승격 특전의 자세한 효과를 여기에서 볼 수 있습니다."
