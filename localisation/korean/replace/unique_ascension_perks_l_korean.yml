 decision_nature_pacification:0 "행성 자연 평정"
 decision_nature_pacification_desc:0 "'행성 자연 평화화'는 부정적인 행성 수정자를 제거하고, 식량 £food£과 $energy$ £energy£의 대가로 긍정적인 대체 수정자로 교체할 수 있는 과정입니다. 녹색 수정자가 없는 식민지는 새로운 긍정적인 수정자를 얻을 수도 있습니다. 이를 수행하면 다른 무작위 $DEPOSITS_TITLE$도 추가됩니다.\n\n§R이 결정은 대기가 없는 인공 세계나 자연이 완전히 파괴된 행성에서는 사용할 수 없습니다: §Y$pc_nuked$§! 또는 §Y$pc_habitat$§! 또는 §Y$pc_city$§! 또는 §Y$pc_machine$§!§!"
 decision_nature_pacification_tooltip:0 "몇가지 §G행성 특징§!을 행성에 추가할 것입니다. 기존에 존재하던 부정적인 효과를 가진 §Y노란색 행성 특징§!은 70%확률로 사라지며, 좋은 형태의 §G녹색 행성 특징§!이 존재한다면 80%확률로 추가될 것입니다. 기존에 존재하던 부정적인 효과를 가진 §R빨간색 행성 특징§!은 100%확률로 사라지며, 좋은 형태의 §G녹색 행성 특징§!이 존재한다면 66% 확률로 추가될 것입니다. §R이벤트에 의해 추가되거나, 이벤트 진행을 위해 필요시되는 행성 특징은 제거하지 않습니다.§!"
