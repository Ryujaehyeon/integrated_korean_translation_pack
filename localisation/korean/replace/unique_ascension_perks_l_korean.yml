 job_border_controller_desc:0 "화물 검사관과 운송 요원으로 구성된 팀이 철저한 문서화 없이 어떤 것도 들어오거나 나가지 않도록 보장합니다.\n($PS_JOB_DESC$)"
 job_border_controller_plural:0 "국경 관리자"
 job_botanist:0 "식물학자"
 job_botanist_desc:0 "이 식물학 전문가는 특정 행성의 생물군계에 정통하여, 자생 동물 여부에 관계없이 자신의 고향과 어떻게 가장 잘 공존하고 이익을 얻을 수 있는지 조언할 수 있습니다.\n($PS_JOB_DESC$)"
 job_botanist_plural:0 "식물학자"
 job_builder:0 "건축가"
 job_builder_desc:0 "어떤 아이들은 실제로 수학 수업에서 배운 것을 현실에 적용하기도 합니다.\n($PS_JOB_DESC$)"
 job_builder_drone:0 "건설 드론"
 job_builder_drone_desc:0 "$job_builder_desc$"
 job_builder_drone_plural:0 "건설 드론"
 job_builder_plural:0 "건축업자"
 job_constructor:0 "$CONSTRUCTOR$"
 job_constructor_desc:0 "두 가지 다른 지침을 단일 섀시에 이중 부팅함으로써, 우리는 물자를 대장간에서 조립 라인으로 직접 운반할 수 있는 유닛을 개발하였습니다.\n($PS_JOB_DESC$)"
 job_constructor_plural:0 "건설자"
 job_controller:0 "$TRIGGER_CONTROLLER$"
 job_controller_desc:0 "큰 형이 당신을 지켜보고 있습니다. 당신이 그렇게 할 때도, 특히 그렇게 할 때 더욱 그렇습니다.\n($PS_JOB_DESC$)"
 job_controller_drone:0 "$TRIGGER_CONTROLLER$ 드론"
 job_controller_drone_desc:0 "$job_controller_desc$"
 job_controller_drone_plural:0 "$TRIGGER_CONTROLLER$ 드론"
 job_controller_plural:0 "관리자"
 job_director:0 "$RT_DIRECTOR$"
 job_director_desc:0 "이 전문가들은 자신의 분야에서 뛰어난 전문 지식을 가진 인물로, 우리 국가의 시민들이 자신의 전문 분야에서 활동할 수 있도록 이끄는 역할을 맡고 있습니다.\n($PS_JOB_DESC$)"
 job_director_effect_desc:0 "£job_director£ $Directors$는 £alloys£ §Y$alloys$§!을 £unity£ §Y$unity$§!과 £mod_planet_amenities_add£ §Y$PLANET_AMENITIES_TITLE$§!, £mod_country_naval_cap_add£ §Y$MOD_COUNTRY_NAVAL_CAP_ADD$§!으로 바꿉니다"
 job_director_plural:0 "$Directors$"
 job_economist:0 "금융가"
 job_economist_desc:0 "수익에 대한 면밀한 관리가 없는 회사는 실패할 운명입니다. 경영자 회계사와 CFO는 세밀한 예산 관리를 전문으로 하여 모든 크레딧을 최대한 활용합니다.\n($PS_JOB_DESC$)"
 job_economist_plural:0 "금융가"
 job_governor_assitant:0 "공무원"
 job_governor_assitant_desc:0 "왕관을 쓴 자의 머리는 무겁습니다. 그리고 왕관은 추가 휘핑 크림이 들어간 소이 더블 라떼를 원합니다.\n($PS_JOB_DESC$)"
 job_governor_assitant_plural:0 "공무원"
 job_hive_district_rich_effect_desc:0 "$job_hive_queen_effect_desc$\n$job_royal_guard_effect_desc$\n$job_stabilizer_effect_desc$"
 job_hive_queen:0 "$queen_swarm$"
 job_hive_queen_desc:0 "모든 드론은 반자율적인 여왕들과 연결되어 있으며, 여왕들은 하이브의 모든 측면을 세밀하게 관리하여 오버마인드의 지시를 최적화하기 위해 끊임없이 노력합니다.\n($PS_JOB_DESC$)"
 job_hive_queen_effect_desc:0 "£job_hive_queen£ $queen_swarm_plural$은 £alloys£ §Y$alloys$§!을 £unity£ §Y$unity$§!과 £mod_planet_amenities_add£ §Y$PLANET_AMENITIES_TITLE$§!, £mod_country_naval_cap_add£ §Y$MOD_COUNTRY_NAVAL_CAP_ADD$§!으로 바꿉니다"
 job_hive_queen_plural:0 "$queen_swarm_plural$"
 job_improver:0 "개량가"
 job_improver_desc:0 "$PS_JOB_DESC$"
 job_improver_effect_desc:0 "£job_improver£ $job_improver_plural$은(는) £minerals£ §Y$minerals$§!을(를) £engineering_research£ §Y$engineering_research$§!, £mod_planet_jobs_produces_mult£ §Y$mod_planet_jobs_produces_mult$§! 및 £mod_planet_amenities_no_happiness_add£ §Y$mod_planet_amenities_no_happiness_add$§!로 전환합니다."
 job_improver_plural:0 "개량가"
 job_improver_and_stabilizer_effect_desc:0 "$job_improver_effect_desc$\n$job_stabilizer_effect_desc$"
 job_industrialist:0 "산업가"
 job_industrialist_desc:0 "우리의 광물 재고에 대한 잠재적 응용은 상상할 수 없을 만큼 방대합니다. 동일한 기본 재료로 반짝이는 장식품, 튼튼한 화합물, 그리고 수많은 희귀 자재를 만들 수 있습니다.\n($PS_JOB_DESC$)"
 job_industrialist_plural:0 "기업가"
 job_influencer:0 "인플루언서"
 job_influencer_desc:0 "좋아요, 구독하기, 알림 설정하는 것 잊지 마세요!\n($PS_JOB_DESC$)"
 job_influencer_plural:0 "인플루언서"
 job_journalist:0 "기자"
 job_journalist_desc:0 "아무도 진공 상태에서 사는 것을 좋아하지 않습니다. 기자들은 우리 인구가 정보를 얻고 만족할 수 있도록 노력합니다. 비록 그들이 믿으라고 지시받는 것이 현실과 맞지 않더라도 말입니다.\n($PS_JOB_DESC$)"
 job_journalist_plural:0 "기자"
 job_judge:0 "판사"
 job_judge_desc:0 "또한 파트타임 배심원으로 일하며, 사형 집행인으로도 활동합니다.\n($PS_JOB_DESC$)"
 job_judge_plural:0 "판사"
 job_living_metal_extractor:0 "생체 금속 추출기"
 job_living_metal_extractor_desc:0 "생체 금속의 난해한 특성은 대부분의 합금 처리 관행을 무시합니다. 추출, 가공 및 때때로 추적하는 임무를 맡은 이들은 특별한 훈련이 필요합니다.\n(§Y$ap_legendary_forge$§! 상승 특성에 의해 잠금 해제된 특별 직업 £job£.)"
 job_living_metal_extractor_drone:0 "생체 금속 추출기 드론"
 job_living_metal_extractor_drone_desc:0 "$job_living_metal_extractor_desc$"
 job_living_metal_extractor_drone_plural:0 "생체 금속 추출기 드론들"
 job_living_metal_extractor_plural:0 "생체 금속 추출기"
 job_military_expert:0 "군사 전문가"
 job_military_expert_desc:0 "병사들이 싸우고 장교들이 전략을 세우는 동안, 이 물류 전문가는 수많은 무기와 자산이 정확히 필요한 곳에 배치되도록 보장합니다.\n($PS_JOB_DESC$)"
 job_military_expert_plural:0 "군사 전문가"
 job_navy_pilot:0 "해군 조종사"
 job_navy_pilot_desc:0 "우리의 가장 뛰어난 인재들은 군 복무를 통해 제국에 대한 헌신을 입증하며, 어떤 외계인도 우리에게 도전할 생각을 하지 못하게 합니다.\n($PS_JOB_DESC$)"
 job_navy_pilot_drone:0 "해군 조종사 드론"
 job_navy_pilot_drone_desc:0 "$job_navy_pilot_desc$"
 job_navy_pilot_drone_plural:0 "해군 조종사 드론"
 job_navy_pilot_plural:0 "해군 조종사"
 job_nurse:0 "보모"
 job_nurse_desc:0 "인공 생식은 배아 수정부터 어린 생명체 양육에 이르기까지 모든 측면을 다루는 이 전문가들에 의해 관리되는 노동 집약적인 과정입니다.\n($PS_JOB_DESC$)"
 job_nurse_effect_desc:0 "£job_nurse£ $job_nurse_plural$는 £food£ §Y$food$§! £society_research£ §Y$society_research$§! 및 £mod_planet_pop_assembly_organic_mult£ §Y$MOD_PLANET_POP_ASSEMBLY_ORGANIC_MULT$§!를 증가시킵니다."
 job_nurse_plural:0 "보모"
 job_player:0 "플레이어"
 job_player_desc:0 "카지노 운영은 딜러, 자금 관리인, 공연자, 케이터링 업체 및 수많은 다른 직업적 재능을 활용하는 놀라울 정도로 복잡한 일입니다.\n($PS_JOB_DESC$)"
 job_player_effect_desc:0 "£job_player£ $FE_PLAYERS$는 £alloys£ §Y$alloys$§!을 £unity£ §Y$unity$§!과 £mod_planet_amenities_add£ §Y$PLANET_AMENITIES_TITLE$§!, £mod_country_naval_cap_add£ §Y$MOD_COUNTRY_NAVAL_CAP_ADD$§!으로 바꿉니다"
 job_player_plural:0 "카지노 직원"
 job_protector:0 "$RT_PROTECTOR$"
 job_protector_desc:0 "당신은 형법 1.13, 제9조를 직접 위반하고 있습니다. 무기를 내려놓으십시오. 준수할 수 있는 시간은 20초입니다.\n($PS_JOB_DESC$)"
 job_protector_plural:0 "$job_fe_protector_plural$"
 job_purifier:0 "$personality_type_purifier$"
 job_purifier_desc:0 "대부분의 사람들은 쓰레기로 여기지만, 정화자들은 잠재력을 봅니다. 그들은 일반 시민의 접시로 돌아가는 것이 출처와는 훨씬 다르게 보이도록 하기 위해 끊임없이 노력합니다.\n($PS_JOB_DESC$)"
 job_purifier_drone:0 "정화자 드론"
 job_purifier_drone_desc:0 "$job_purifier_desc$"
 job_purifier_drone_plural:0 "정화자 드론"
 job_purifier_effect_desc:0 "£job_purifier£ $Purifiers$는 £alloys£ §Y$alloys$§!을 £unity£ §Y$unity$§!과 £mod_planet_amenities_add£ §Y$PLANET_AMENITIES_TITLE$§!, £mod_country_naval_cap_add£ §Y$MOD_COUNTRY_NAVAL_CAP_ADD$§!으로 바꿉니다"
 job_purifier_plural:0 "$Purifiers$"
 job_recycler:0 "재활용 처리자"
 job_recycler_desc:0 "사용 가능한 배터리든 반쯤 소비된 생물 물질의 덩어리든, 이 트롤러 팀은 쓰레기 더미 속에서 여전히 유용한 물자를 발견하는 데 있어 비할 데 없는 능력을 가지고 있습니다."
 job_recycler_plural:0 "재활용 처리자"
 job_royal_guard:0 "근위대"
 job_royal_guard_desc:0 "유전적 특성 중 가장 강력한 것들이 왕실 경비대를 개발하는 데 사용됩니다. 이들은 외부 공격에 대한 거대한 방어선 역할을 하며, 내부 일탈을 방지하기 위한 사고파동 필터 역할도 수행합니다.\n($PS_JOB_DESC$)"
 job_royal_guard_plural:0 "근위대"
 job_royal_guard_effect_desc:0 "£job_royal_guard£ $job_royal_guard_plural$는 £unity£ §Y$unity$§!, £mod_planet_crime_add£ §Y$MOD_PLANET_CRIME_ADD$§! 및 £mod_pop_defense_armies_add£ §Y$MOD_POP_DEFENSE_ARMIES_ADD$§!를 £food£ §Y$food$§!를 위해 생성합니다."
 job_secret_alchimist:0 "비밀 연금술사"
 job_secret_alchimist_desc:0 "이 뛰어난 화학 공학자들은 가장 평범한 재료를 극도로 가치 있는 화합물로 엮어낼 수 있습니다. 단, 그들이 어떻게 하는지는 묻지 마십시오.\n(§Y$ap_legendary_forge$§! 상승 특성에 의해 잠금 해제된 특별 직업 £job£.)"
 job_secret_alchimist_drone:0 "비밀 연금술사 드론"
 job_secret_alchimist_drone_desc:0 "$job_secret_alchimist_desc$"
 job_secret_alchimist_drone_plural:0 "비밀 연금술사 드론들"
 job_secret_alchimist_plural:0 "비밀 연금술사들"
 job_smuggler:0 "$NECROID1_SHIP_Smuggler$"
 job_smuggler_plural:0 "밀수업자"
 job_smuggler_and_spy_effect_desc:0 "$job_smuggler_effect_desc$\n$job_spy_effect_desc$"
 job_smuggler_desc:0 "어떤 이들은 그들을 해적이자 천하의 불량배라고 부르지만, 이 방랑자들은 가장 유용한 자재를 손에 넣는 데 능숙합니다. 대가를 치르고서요.\n($PS_JOB_DESC$)"
 job_smuggler_drone:0 "밀수업자 드론"
 job_smuggler_drone_effect_desc:0 "$job_smuggler_effect_desc$"
 job_smuggler_drone_and_spy_drone_effect_desc:0 "$job_smuggler_effect_desc$\n$job_spy_effect_desc$"
 job_smuggler_drone_desc:0 "$job_smuggler_desc$"
 job_smuggler_drone_plural:0 "밀수업자 드론"
 job_smuggler_effect_desc:0 "£job_smuggler£ $job_smuggler_plural$는 £minerals£ §Y$minerals$§!을 £volatile_motes£ §Y$volatile_motes$§!, £mod_planexotic_gases£ §Y$exotic_gases$§!, £rare_crystals£ §Y$rare_crystals$§! 및 £consumer_goods£ §Y$consumer_goods$§!으로 전환합니다."
 job_sponsor:0 "스폰서"
 job_sponsor_desc:0 "외교관이 우리 정부와 은하 이웃 간의 관계를 개선하는 동안, 후원자는 그들의 문화를 대중에게 전파합니다. 상호 이해만큼 두 종족을 하나로 묶는 것은 없습니다.\n($PS_JOB_DESC$)"
 job_sponsor_plural:0 "스폰서"
 job_spy:0 "스파이"
 job_spy_desc:0 "흔들리긴 했지만, 섞이지는 않았습니다.\n($PS_JOB_DESC$)"
 job_spy_effect_desc:0 "£job_spy£ $job_spy_plural$은(는) £mod_country_all_tech_research_speed£ §Y$MOD_COUNTRY_ALL_TECH_RESEARCH_SPEED$§!을(를) £consumer_goods£ §Y$consumer_goods$§! 증가시킵니다."
 job_spy_drone:0 "스파이 드론"
 job_spy_drone_desc:0 "$job_spy_desc$"
 job_spy_drone_plural:0 "스파이 드론"
 job_spy_plural:0 "스파이"
 job_stabilizer:0 "스태빌라이저"
 job_stabilizer_desc:0 "자원과 지출의 균형을 면밀히 살펴봄으로써, 이 재능아 드론들은 시냅스 및 물자 작업량의 일부를 분담하여 제국 전체에 이익을 줄 수 있습니다.\n($PS_JOB_DESC$)"
 job_stabilizer_plural:0 "스태빌라이저"
 job_stabilizer_effect_desc:0 "£job_stabilizer£ $job_stabilizer_plural$는 £unity£ §Y$unity$§!와 £mod_country_resource_max_add£ §Y$MOD_COUNTRY_RESOURCE_MAX_ADD$§!를 £food£ §Y$food$§!에 대해 생성합니다."
 job_tax_controller:0 "세금 관리자"
 job_tax_controller_desc:0 "사회 서비스는 무료가 아닙니다. 정부는 기업처럼 수익으로 운영됩니다. 그리고 누군가는 그 수익을 수집해야 합니다.\n($PS_JOB_DESC$)"
 job_tax_controller_plural:0 "세금 관리자"
 job_teacher:0 "교사"
 job_teacher_desc:0 "우리 사회는 많이 발전했지만, 지식은 태내에서 전수되지 않습니다. 우리는 이 헌신적인 교육자 팀에 의존하여 우리의 시민들을 순진한 아이에서 소중한 시민으로 성장시킵니다.\n($PS_JOB_DESC$)"
 job_teacher_plural:0 "교사"
 job_trading_expert:0 "무역 전문가"
 job_trading_expert_desc:0 "세금과 무역에 관한 규정은 복잡합니다. 이를 잘 다루기 위해서는 숙련된 손길이 필요하거나, 혹은 이를 악용할 전문가가 필요합니다.\n($PS_JOB_DESC$)"
 job_trading_expert_plural:0 "무역 전문가"
 job_treasurer:0 "회계사"
 job_treasurer_desc:0 "우리 자산이 적절히 보험에 가입되고 안전하게 보호되도록 함으로써, 우리는 그것들이 건강하게 가치가 상승할 것이라는 사실에 안심할 수 있으며, 이를 잘못 사용할 사람들의 손에서 안전하게 지켜질 것입니다.\n($PS_JOB_DESC$)"
 job_treasurer_plural:0 "회계사"
 job_treasures_collector:0 "보물 수집가"
 job_treasures_collector_desc:0 "§Y$ap_wheel_fortune$§! 승천 특전에 의해 해금되는 특별한 £job£ 직업입니다."
 job_treasures_collector_drone:0 "보물 수집 드론"
 job_treasures_collector_drone_desc:0 "$job_treasures_collector_desc$"
 job_treasures_collector_drone_plural:0 "보물 수집 드론"
 job_treasures_collector_plural:0 "보물 수집가"
 job_u_biologist:0 "생물학자"
 job_u_biologist_desc:0 "우리 과학자들은 할 수 있는지에 대한 고민에 너무 몰두하여, 해야 하는지에 대한 생각을 멈추지 않습니다.\n(§Y$ap_legendary_forge$§! 상승 특성으로 잠금 해제된 특별 직업 £job£.)"
 job_u_biologist_drone:0 "생물학자 드론"
 job_u_biologist_drone_desc:0 "$job_u_biologist_desc$"
 job_u_biologist_drone_plural:0 "생물학자 드론들"
