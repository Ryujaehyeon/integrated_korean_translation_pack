 tech_stellar_manipulation_1_desc:0 "작은 소행성 파편들을 더 큰 소행성으로 융합시키고 미래의 광물 활용에 도움이 될 천체를 형성하기 위해 천체 구성 물질들을 하나의 지점에 끌어들이는 방법을 밝혀냅니다."
 tech_stellar_manipulation_2:0 "$UniqueAscensionPerksEvents.11.Name$ II: 무작위 세계"
 tech_stellar_manipulation_2_desc:0 "우리는 천체 조작의 길로 접어들었지만 현재로서는 아직 기후와 행성의 유형을 완벽하게 만들어내지 못합니다."
 tech_stellar_manipulation_3:0 "$UniqueAscensionPerksEvents.11.Name$ III: 완벽한 세계"
 tech_stellar_manipulation_3_desc:0 "우리는 기후에 대한 지식 덕분에 천체를 정복하고 조작할 수 있게 되었습니다. 우리는 이제 식민지로 활용될 수 있는 완벽한 행성을 창조할 수 있습니다."
 tech_stellar_manipulation_z:0 "$UniqueAscensionPerksEvents.11.Name$ 안정화"
 tech_stellar_manipulation_z_desc:0 "새로운 천체 생성에 사용된 에너지를 적절히 안정시킬 수 있는 방법을 이용하여 성공 가능성을 높입니다."
