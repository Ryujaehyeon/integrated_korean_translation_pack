 UniqueAscensionPerksEvents.101.Desc:0 "우리는 $SPECIAL_PROJECT_TOOLTIP$을 완료하여 우리의 지도자를 복제하고 신경 복사할 수 있게 되었습니다. 이를 통해 이미 검증된 지도자를 재사용할 수 있으며, 새로운 인재에 의존할 필요가 없습니다."
 UniqueAscensionPerksEvents.101.Name:0 "강함을 위해"
 UniqueAscensionPerksEvents.1010.Desc:0 "해당 프로토콜의 쿨다운이 완료되었습니다. 이제 다시 사용할 수 있습니다."
 UniqueAscensionPerksEvents.1010.Name:0 "§Y번식 프로토콜§! 준비"
 UniqueAscensionPerksEvents.1011.Name:0 "§Y자원 수집 프로토콜§! 준비"
 UniqueAscensionPerksEvents.1012.Name:0 "§Y군사 강습 프로토콜§! 준비"
 UniqueAscensionPerksEvents.1013.Name:0 "§Y보안 방어 프로토콜§! 준비"
 UniqueAscensionPerksEvents.1014.Name:0 "§Y연구 보조 프로토콜§! 준비"
 UniqueAscensionPerksEvents.103.Desc:0 "복제할 지도자를 선택하십시오."
 UniqueAscensionPerksEvents.103.Name:0 "지도자 복제"
 UniqueAscensionPerksEvents.104.Desc:0 "우리는 지도자 §G[Root.GetName]§!의 복제를 완료하였습니다. 이제 이 둘은 하이브 마인드를 위해 일할 것 입니다."
 UniqueAscensionPerksEvents.104.Name:0 "지도자 복제됨"
 UniqueAscensionPerksEvents.105.Desc:0 "우리는 지도자 §G[Root.GetName]§!의 복제를 완료하였습니다. 이제 이 둘은 군체 의식을 위해 일할 것 입니다."
 UniqueAscensionPerksEvents.105.Name:0 "지도자 복제됨"
 UniqueAscensionPerksEvents.1051.Desc:0 "우리가 §Y우주 가축화 $SPECIAL_PROJECT_TOOLTIP$§!를 완료했으니, 전설적인 §Y레비아탄 마스터§!를 찾으려 할 수 있습니다. 이 존재는 이전에 방문한 적 없는 성단의 공허 어딘가에 미공개되어 있습니다. 우리는 그것을 찾고 접촉하기 원한다면 $SPECIAL_PROJECT_TOOLTIP$을 시작해야 할 것입니다."
 UniqueAscensionPerksEvents.1052.Talk.1:0 "§R필멸자? 그대처럼 보잘 것 없는 존재를 마지막으로 본지 꽤나 오래되었군. 네가 무엇을 하고 있고 누구를 마주하고 있는지 그 의미를 이해하고 있어야 한다고 본다만.§!"
 UniqueAscensionPerksEvents.1052.Talk.2:0 "§R너는 너의 존재가 나의 지루함과 외로움을 조금이나마 덜어줬다는 사실을 영광으로 알거라. 보상으로 나의 부하 중 하나를 소환할 수 있도록 허락하겠다. 아주 쉬운 일이지.§!"
 UniqueAscensionPerksEvents.1055.Desc:0 "§R필멸자여, 나는 이곳에서 움직일 생각이 없다. 많은 자과 네가 신이라고 부를만한 존재들이 나의 영역을 정복하려고 노력해왔고 그들은 지금 모두 내 무한한 내면에서 사라져가고 있지...\n\n뭐 어쨌든 이번에 네가 온 이유는 뭐냐?§!"
 UniqueAscensionPerksEvents.1055.Req01:0 "$TRIGGER_FAIL$이미 소환된 레비아탄이 있습니다."
 UniqueAscensionPerksEvents.1055.Req02:0 "$TRIGGER_FAIL$ $ap_leviathan_master$가 우리와 더 많은 지식을 공유해야 합니다."
 UniqueAscensionPerksEvents.1055.Req03:0 "$TRIGGER_FAIL$희생시킬 POP이 적어도 20 이상 있는 식민지가 있어야 합니다."
 UniqueAscensionPerksEvents.1055.Req04:0 "$TRIGGER_FAIL$이전의 요청이 끝나야 합니다."
 UniqueAscensionPerksEvents.1055.Req05:0 "$TRIGGER_FAIL$적어도 하나의 라이벌이 있어야 합니다."
 UniqueAscensionPerksEvents.1055.Req06:0 "$TRIGGER_FAIL$당신은 $ap_leviathan_master$에게 우리의 라이벌을 다시 공격해 달라고 요청하기 전에 최소 5년을 기다려야 합니다."
 UniqueAscensionPerksEvents.1055.Req07:0 "$TRIGGER_FAIL$다시 $ap_leviathan_master$를 유도하려면 최소 1개월을 기다려야 합니다."
 UniqueAscensionPerksEvents.1056.Desc:0 "§R네 선택은 필멸자이지만 현명하군, 나는 네가 나의 레비아탄들 중 하나를 쓰러뜨렸다는 사실을 알고 있다. 날 재미있게 해준 보상으로 그들 중 하나를 소환할 수 있게 해주지. 그들은 주저없이 너의 명령을 따를 것이며 너는 나의 강대한 힘의 일부를 조금이나마 느낄 수 있을 것이다. 소환 주문이 끝나고 나면 나는 신경쓰지 않겠다.§!"
 UniqueAscensionPerksEvents.1056.Name:0 "레비아탄 선택"
 UniqueAscensionPerksEvents.1057.Desc:0 "§R나는 많은 것을 알고 지만 너는 너무 원시적이기에 내 지식이 유용하지 않을 수도 있겠군. 하지만 네가 얼마나 멀리 갈 수 있을지 궁금하도다. 네가 나에게 약간의 제물을 바치면 나는 너에게 맞는 수준의 지식을 제공하도록 하지.§!"
 UniqueAscensionPerksEvents.1058.Desc:0 "§R권력을 얻기 위해 자신의 종족까지 희생시키다니, 너처럼 정신 나간 필멸자는 마음에 든단 말이야. 그래서 너는 어떤 행성을 내개 바칠 것이냐?§!"
 UniqueAscensionPerksEvents.1058.Name:0 "희생할 행성 선택"
 UniqueAscensionPerksEvents.1058.Planet.1:0 "§Y[planet_target_1.GetName]§!"
 UniqueAscensionPerksEvents.1058.Planet.2:0 "§Y[planet_target_2.GetName]§!"
 UniqueAscensionPerksEvents.1058.Planet.3:0 "§Y[planet_target_3.GetName]§!"
 UniqueAscensionPerksEvents.1058.Planet.4:0 "§Y[planet_target_4.GetName]§!"
 UniqueAscensionPerksEvents.1058.Planet.5:0 "§Y[planet_target_5.GetName]§!"
 UniqueAscensionPerksEvents.1058.Planet.6:0 "§Y[planet_target_6.GetName]§!"
 UniqueAscensionPerksEvents.1059.Desc:0 "§R음..??? 너의 세계에서 더러운 일을 해주기를 바라는 것이냐? 글쎄 나와 교신이 가능할 정도의 필멸자를 죽이고 싶지는 않다만. 죽음의 문제에 간섭하는 것은 내가 별로 좋아하지 않는 일이라는 것을 이해하여라. 그러니 너는 대가를 치러야 할 것이다. 내 부하들이 어떤 목표물을 타격하길 바라나?§!"
 UniqueAscensionPerksEvents.1059.Name:0 "경쟁자 선택"
 UniqueAscensionPerksEvents.1059.Target.1:0 "§Y대상 [rival_target_1.GetName]입니다.§!"
 UniqueAscensionPerksEvents.1059.Target.2:0 "§Y대상 [rival_target_2.GetName].§!"
 UniqueAscensionPerksEvents.1059.Target.3:0 "§Y대상 [rival_target_3.GetName]입니다.§!"
 UniqueAscensionPerksEvents.1059.Target.4:0 "§Y대상 [rival_target_4.GetName]입니다.§!"
 UniqueAscensionPerksEvents.1060.Amused:0 "§R넌 가끔 농담을 잘하더군, 지루함이 좀 줄었으니 선물을 내리마.§!"
 UniqueAscensionPerksEvents.1060.Ignore:0 "§R진심인건가? 아마 실수겠지, 너 같은 필멸자들은 매 순간 실수를 저지르니 너의 모욕은 무시해주겠다. 내가 너를 무시했다는 사실을 선물로 받아들이고 목적 없는 너의 존재를 이어나가도록.§!"
 UniqueAscensionPerksEvents.1060.Occupied:0 "§R미안하지만 나는 지금 바쁘다. 나는 어러 세계에 재앙을 불러오느라 일이 많거든§!"
 UniqueAscensionPerksEvents.1060.Pissed:0 "§R네 지도자들 중 몇 명의 목숨을 빼앗는 짓을 하기전에 한번 더 생각해보거라. 가끔은 너희 같은 필멸자들이 왜 몇 천년도 못가는지 생각해보란 말이다.§!"
 UniqueAscensionPerksEvents.1060.VeryAmused:0 "§R.. \n\n솔직히 말해 나는 네가 내가 누구인지를 알고서도 날 모욕 할 용기를 발휘할 줄은 몰랐다. 아주 즐겁고 기분이 좋군. 선물로 내 레비아탄 중 하나를 공짜로 소환하게 해주지 간단한 일이야.§!"
 UniqueAscensionPerksEvents.1060.VeryPissed:0 "§R하하하 정말 우스운 농담이군, 나도 농담 하나 해볼까? 네 성계의 수비가 완벽하기를 바란다. 내가 실수로 몇몇 레비아탄들을 네 성계에 도달하도록 내버려두었거든! 이게 내가 농담이라 부르는 것이지, 너희에겐 현실이겠지만.§!"
 UniqueAscensionPerksEvents.1061.Desc:0 "§R네가 선택한 레비아탄은 움직일 수 없다. 묻겠다 필멸자여 어떤 성계에 소환하기를 바라나?§!"
 UniqueAscensionPerksEvents.1061.Starbase.1:0 "§Y[starbase_target_1.GetName].§!"
 UniqueAscensionPerksEvents.1061.Starbase.2:0 "§Y[starbase_target_2.GetName].§!"
 UniqueAscensionPerksEvents.1061.Starbase.3:0 "§Y[starbase_target_3.GetName].§!"
 UniqueAscensionPerksEvents.1061.Starbase.4:0 "§Y[starbase_target_4.GetName].§!"
 UniqueAscensionPerksEvents.1061.Starbase.5:0 "§Y[starbase_target_5.GetName].§!"
 UniqueAscensionPerksEvents.1061.Starbase.6:0 "§Y[starbase_target_6.GetName].§!"
 UniqueAscensionPerksEvents.1070.Desc:0 "레비아탄 마스터의 수하가 소환 완료되었습니다. 그 거대한 괴물이 이제 우리 대열에 낄 것 입니다."
 UniqueAscensionPerksEvents.1070.Name:0 "레비아탄 소환됨"
 UniqueAscensionPerksEvents.1071.Desc:0 "우리의 도발로 인해 $ap_leviathan_master$가 매우 화가 났습니다. 우리는 수도를 향해 이동하는 여러 개의 레비아탄급 선박을 은하 가장자리 시스템에서 탐지했습니다. 우리가 한 일이 그만한 가치가 있었던 것인지 확실합니까?"
 UniqueAscensionPerksEvents.1072.Desc:0 "§G[Root.GetName]§!와의 모든 연락이 끊겼습니다. 행성이 $ap_leviathan_master$에 의해 완전히 소멸되었음을 확인할 수 있습니다."
 UniqueAscensionPerksEvents.1072.Name:0 "행성 희생됨"
 UniqueAscensionPerksEvents.1073.Desc:0 "우리 은하계의 테두리에서 소환된 레비아탄으로 보이는 정체 불명의 존재는 그 길의 어떤 것이든 쓸어버리며 우리 행성으로 이동하고 있습니다."
 UniqueAscensionPerksEvents.11.Desc:0 "우리의 §Y건설선§!인 §G[Root.GetName]§!이 $edict_enable_planetary_project$ 칙령이 활성화되었을 때 이동을 시작했습니다. 이는 이제 $SPECIAL_PROJECT_TOOLTIP$을 시작할 준비가 되었음을 의미합니다."
 UniqueAscensionPerksEvents.11.Name:0 "행성 프로그램"
 UniqueAscensionPerksEvents.11.Program.10:0 "§G치트§! $PLANETARY_PROJECT_0$"
 UniqueAscensionPerksEvents.11.Program.100.a:0 "§GCheats§! $PLANETARY_PROJECT_100a$"
 UniqueAscensionPerksEvents.11.Program.100.a1:0 "$PLANETARY_PROJECT_100a$"
 UniqueAscensionPerksEvents.11.Program.100.b:0 "§GCheats§! $PLANETARY_PROJECT_100b$"
 UniqueAscensionPerksEvents.11.Program.100.b1:0 "$PLANETARY_PROJECT_100b$"
 UniqueAscensionPerksEvents.11.Program.100.c:0 "§GCheats§! $PLANETARY_PROJECT_100c$"
 UniqueAscensionPerksEvents.11.Program.100.c1:0 "$PLANETARY_PROJECT_100c$"
 UniqueAscensionPerksEvents.11.Program.100.d:0 "§GCheats§! $PLANETARY_PROJECT_100d$"
 UniqueAscensionPerksEvents.11.Program.100.d1:0 "$PLANETARY_PROJECT_100d$"
 UniqueAscensionPerksEvents.11.Program.100.e:0 "§GCheats§! $PLANETARY_PROJECT_100e$"
 UniqueAscensionPerksEvents.11.Program.100.e1:0 "$PLANETARY_PROJECT_100e$"
 UniqueAscensionPerksEvents.11.Program.100.f:0 "§G치트§! $PLANETARY_PROJECT_100f$"
 UniqueAscensionPerksEvents.11.Program.100.f1:0 "$PLANETARY_PROJECT_100f$"
 UniqueAscensionPerksEvents.11.Program.10a:0 "§G치트§! $PLANETARY_PROJECT_0a$"
 UniqueAscensionPerksEvents.11.Program.11:0 "§GCheats§! $PLANETARY_PROJECT_1$"
 UniqueAscensionPerksEvents.11.Program.12:0 "§G치트§! $PLANETARY_PROJECT_2$"
 UniqueAscensionPerksEvents.11.Program.13:0 "§G치트§! $PLANETARY_PROJECT_3$"
 UniqueAscensionPerksEvents.11.Program.Z:0 "§RCancel§! §B$UniqueAscensionPerksEvents.11.Name$§!를 취소합니다."
 UniqueAscensionPerksEvents.111.Desc:0 "우리는 $SPECIAL_PROJECT_TOOLTIP$를 완료하였으며, 이를 통해 $ap_mega_hive_mind$와 접촉할 수 있게 되었습니다. 이제 그들에게 첫 발을 내딛을 시점을 결정하는 것은 우리에게 달려 있습니다."
 UniqueAscensionPerksEvents.111.Name:0 "$ap_mega_hive_mind$ 발견됨"
 UniqueAscensionPerksEvents.112.Chest.Blue:0 "§B청색 상자 개봉§!"
 UniqueAscensionPerksEvents.112.Chest.Red:0 "§R적색 상자 개봉§!"
 UniqueAscensionPerksEvents.112.Chest.Yellow:0 "§Y황색 상자 개봉§!"
 UniqueAscensionPerksEvents.112.Desc:0 "§G안녕하세요, 젊은 하이브마인드! 누군가가 드디어 우리를 찾아 연락해 주었다는 사실에 감명받았습니다. 다른 제국과 대화한 지 수백만 년이 지났기 때문입니다. 따라서 우리의 외교가 다소 구식일 수 있다는 점에 놀라지 않으셔도 됩니다. 하지만 여러분이 여기 온 이유가 분명히 있을 것이고, 어떤 요청을 하실 것이라 확신합니다. 그런 요청을 하시기 전에 저희에게 음식을 주셨으면 합니다... 저희는 더 이상 먹을 필요가 없지만, 마인드는 다시 한 번 음식을 맛보고 싶어합니다. 특히 여러분과 같은 하이브마인드가 만든 음식을요. 저희에게 음식을 주시면, 여러분이 받을 자격이 있는 보상을 드릴 수 있습니다.§!"
 UniqueAscensionPerksEvents.113.Desc:0 "§G고맙다 군체 의식이여. 이제 우리 영역으로 진입할 수 있는 길을 알려주겠다. 경로가 항상 변화하니 주의하여라.§!"
 UniqueAscensionPerksEvents.114.Chest:0 "우리는 고립된 섬에 도착했습니다. 그리고 세 개의 색을 가진 이상한 상자를 발견하였습니다. 우리 주위에서 정체불명의 에너지 장벽이 형성되어 새 개의 상자 중 하나 만을 선택할 수 있을듯 합니다. 각각 청색, 황색, 적색입니다. 어떠한 상자를 선택해야 할까요?"
 UniqueAscensionPerksEvents.114.Chest.Bad:0 "우리가 하나의 상자를 열기 시작하자, 나머지 두 개가 어떤 종류의 미세 웜홀로 빨려 들어갑니다. 상자는 거의 비어 있으며, 겨우 보잘것없는 상품만 담고 있지만, 우리는 선택을 되돌릴 수 없습니다. 뒤에서 출구가 형성되고 있으며, 이상한 목소리들이 우리에게 떠나라고 말하고 있습니다. 현재로서는 우리의 모험이 끝난 것 같습니다."
 UniqueAscensionPerksEvents.114.Chest.Good:0 "좋은 내용물인듯 합니다. 우리는 갑자기 생성된 웜홀에 빨려들었습니다. 그리고 우리에게 떠나라고 말하는 이상한 목소리와 함께 출구가 형성되고 있습니다. 모험을 중단할 수 밖에 없겠습니다."
 UniqueAscensionPerksEvents.114.Chest.Medium:0 "중간 수준의 내용물인듯 합니다. 우리는 갑자기 생성된 웜홀에 빨려들었습니다. 그리고 우리에게 떠나라고 말하는 이상한 목소리와 함께 출구가 형성되고 있습니다. 모험을 중단할 수 밖에 없겠습니다."
 UniqueAscensionPerksEvents.114.Dropper:0 "어떤 집과 같은 건물이 우리 앞에 발견되었고, 우리는 $ap_mega_hive_mind$의 드론으로 추정되는 존재가 카지노 기계처럼 보이는 것 앞에 서 있는 것을 발견했습니다. 우리 뒤의 문은 잠겨버렸고, 다른 출구를 찾을 수 없었습니다.\n\n§G젊은 하이브마인드여, 당신이 '차원 드로퍼'라는 신비로운 구조물을 발견한 것 같습니다. 당신의 마음이 이해하기 어려운 것입니다. 이전 경로로 돌아갈 수는 없지만, 드로퍼를 활성화할지 아니면 그냥 떠날지 선택할 수 있도록 하겠습니다.§!"
 UniqueAscensionPerksEvents.114.Dropper.Activated:0 "§G차원 집속기가 활성화 되었군, 네가 흥미로운 것을 얻기를 바란다.§!"
 UniqueAscensionPerksEvents.114.Dropper.Deactivated:0 "§G차원 집속기는 다음번 방문까지 작동하지 않을 것이다. 이제 집으로 돌아 가거라 어린 하이브 마인드여.§!"
 UniqueAscensionPerksEvents.114.Elevator:0 "일종의 엘리베이터 처럼 보이는 것이 있는데 우리는 위로 올라가거나 아래로 내려가거나 앞으로 나아갈 수 있습니다."
 UniqueAscensionPerksEvents.114.Encounter:0 "우리는 $ap_mega_hive_mind$ 드론 중 하나로 추정되는 것을 한 층에서 발견했습니다. 그것과 소통해야 할까요, 아니면 그냥 이 영역을 떠나야 할까요?"
 UniqueAscensionPerksEvents.114.Encounter.Breeder:0 "§G다시 만났군요, 젊은 하이브마인드. 당신이 우리 영역의 예측할 수 없는 위험에 잘 대처하고 있는 것 같습니다.\n\n이 드론은 '알파나, 번식자'라고 불리며, 우리 $ap_mega_hive_mind$에서 다른 드론의 번식 능력을 자극할 수 있는 드론 중 하나입니다. 이 드론은 우리 영역에서 식민지를 발견할 때 매우 유용합니다. 그녀의 능력이 필요했던 지가 수세기가 지났으니, 당신이 그녀를 가질 수 있습니다. 하지만 조심하세요. 당신 제국의 모든 번식자와 함께 이 힘을 사용하는 것은 위험할 수 있습니다. 급격한 인구 증가를 지원하지 못할 수도 있으니 말입니다.§!"
 UniqueAscensionPerksEvents.114.Encounter.Failure:0 "§G오 이런... 완벽하게 실패했군 어찌 이런 쉬운 일을 망쳤는지 모르겠군. 너는 아직 여기 올 준비가 되지 않은듯 하구나.§!"
 UniqueAscensionPerksEvents.114.Encounter.Farmer:0 "§G여기서 다시 어린 군체 의식을 만나게 될 줄이야, 너는 우리 영역의 예측할 수 없는 위험을 그럭저럭 견뎌내고 있는듯 하구나. \n\n이 드론은 '식물학자 알리퀴오르'라고 불리우고 있으며 모든 식물 종의 생명 주기에 대한 비밀을 가지고 있다. 우린 더 이상 식물이 필요하지 않으니 식물들을 너희 영토에서 재배할 수 있는 기회를 주지 하지만 그게 잘 될거라고 보장할 수는 없다.§!"
 UniqueAscensionPerksEvents.114.Encounter.Hunter:0 "§G여기서 다시 어린 군체 의식을 만나게 될 줄이야, 너는 우리 영역의 예측할 수 없는 위험을 그럭저럭 견뎌내고 있는듯 하구나. \n\n이 드론은 '사냥꾼 사르즈'라고 불리우고 있으며 혐오스러운 외계종의 사육과 훈련에 모든 시간을 쏟고 있다. 외계종들은 그의 통제하에 있고 그것들 중 일부를 너에게 줄 수도 있을 것이다. 하지만 네가 외계종들을 쉽게 통제할 수 있을 것 같지는 않구나. 많은 외계종을 부릴 수록 너에게 등을 돌릴 가능성이 높아질 것이다.§!"
 UniqueAscensionPerksEvents.114.Encounter.Hunter.Failure:0 "§G이 무리는 이제 네 영토로 난입할 것이다 네가 그들을 저지할 충분한 전력이 준비되어 있기를 바란다.§!"
 UniqueAscensionPerksEvents.114.Encounter.Hunter.Success:0 "§G인상적이군! 넌 우리 무리의 동물들을 길들이는데 성공하였다.§!"
 UniqueAscensionPerksEvents.114.Encounter.Perfect:0 "놀랍습니다! 이 과정의 결과는 당신과 같은 젊은 하이브마인드가 기대했던 것보다 훨씬 더 좋습니다. 이러한 이점을 가지고 있다면, 당신의 은하에 있는 다른 제국들이 그들의 멸망을 맞이하기에는 너무 늦을 때까지 그 사실을 깨닫지 못할 것임을 확신할 수 있습니다."
 UniqueAscensionPerksEvents.114.Encounter.Researcher.Engineering:0 "§G다시 만났군요, 젊은 하이브마인드. 당신이 우리 영역의 예측할 수 없는 위험에 잘 대처하고 있는 것 같습니다.\n\n이 드론은 '공학자 알렉산더 III'라고 불리며, 우리 공학 지식의 대부분을 유지하고 다른 드론들이 해당 분야의 지식을 새롭게 할 필요가 있을 때 $ap_mega_hive_mind$의 데이터 뱅크 역할을 합니다. 당신의 하이브마인드와 그들 사이에 연결을 설정할 수 있지만, 완전히 실패할 가능성이 있으며 과학적 재앙으로 이어질 수 있습니다.§!"
 UniqueAscensionPerksEvents.114.Encounter.Researcher.Physics:0 "§G다시 만났군요, 젊은 집단정신이여. 당신이 우리 영역의 예측할 수 없는 위험에 잘 대처하고 있는 것 같습니다.\n\n이 드론은 '물리학자 알렉산더 I'라고 불리며, 우리 물리학 지식의 대부분을 유지하고 $ap_mega_hive_mind$의 다른 드론들이 해당 분야의 지식을 새롭게 할 필요가 있을 때 데이터 뱅크 역할을 합니다. 당신의 집단정신과 그들 사이에 연결을 설정할 수 있지만, 완전히 실패하여 과학적 재앙이 발생할 가능성이 있습니다.§!"
 UniqueAscensionPerksEvents.114.Encounter.Researcher.Society:0 "§G다시 만났군요, 젊은 집단정신이여. 당신이 우리 영역의 예측할 수 없는 위험에 잘 대처하고 있는 것 같습니다.\n\n이 드론은 '사회학자 알렉산더 II'라고 불리며, 우리 사회학 지식의 대부분을 관리하고 $ap_mega_hive_mind$를 위해 다른 드론들이 해당 분야의 지식을 새롭게 할 수 있도록 데이터 뱅크 역할을 합니다. 당신의 집단정신과 그들 사이에 연결을 설정할 수 있지만, 완전히 실패할 가능성이 있으며 과학적 재앙으로 이어질 수 있습니다.§!"
 UniqueAscensionPerksEvents.114.Encounter.Success:0 "§G흥미롭군요... 과정이 성공한 것 같습니다. 젊은 하이브마인드가 오늘 운이 좋은 것 같고, 이제 이 보상을 가지고 당신의 은하로 돌아갈 수 있습니다.§!"
 UniqueAscensionPerksEvents.114.Entrance:0 "우리는 $ap_mega_hive_mind$에 의해 창조된 영역의 입구에 도달하였으며, 우리의 언어로 설명하기에는 너무 복잡한 신비로운 구조물들에 둘러싸여 있습니다. 다음에는 어디로 가야 할까요?"
 UniqueAscensionPerksEvents.114.Intersection:0 "길이 여러 갈래로 갈라진듯 합니다. 어느 쪽으로 나아가야 할까요?"
 UniqueAscensionPerksEvents.114.Nothing:0 "우리는 아무 흥미도 일으키지 않는 곳에 도달했습니다. 우리가 이용할 수 있는 길은 우리가 밟은 길 뿐이기에 다시 걸어 나갈 시간입니다."
 UniqueAscensionPerksEvents.114.Technology:0 "우리는 매우 이상한 장소에 도달했습니다. 정체불명의 에너지로 형성된 이상한 벽이 우리를 둘러싸고 있어 되돌아갈 수 없습니다. 우리 앞에는 일종의 웜홀을 확인했으며, 그곳에서 무언가가 천천히 나타나고 있는 것 같습니다. 우리는 그것이 일어날 때까지 기다리거나, 잠재적인 위험을 피하기 위해 지금 바로 떠날 수 있습니다.\n\n§G당신은 차원 간 아카이브를 발견한 것 같습니다. 이 도구는 당신의 과학자들이 수천 년 동안 스스로 발견할 수 없는 잃어버린 기술을 찾는 데 도움을 줄 것입니다. 당신은 자신의 안전을 위해 떠날 수도 있고, 여기서 기다리며 혜택이나 저주가 나타나기를 기다릴 수도 있습니다.§!"
 UniqueAscensionPerksEvents.114.Technology.Failure:0 "§G유감스럽게도 기술 검색기는 너에게 도움이 될만한 것을 찾지 못한듯 하구나 아마 다음에 더 좋은 것을 얻을 수 있겠지.§!"
 UniqueAscensionPerksEvents.114.Technology.Success:0 "§G흥미롭군, 기술 검색기가 성공적으로 너희에게 도움이 될만한 것을 찾아 냈군 이제 떠나도 좋다. 어린 하이브 마인드여.§!"
 UniqueAscensionPerksEvents.115.Desc:0 "$ap_mega_hive_mind$ 영역이 다시 열렸으며, 원한다면 다시 그들과 접촉할 수 있습니다."
 UniqueAscensionPerksEvents.115.Name:0 "$ap_mega_hive_mind$ 다시 사용 가능"
 UniqueAscensionPerksEvents.121.Desc:0 "적들은 자신들의 함선을 우리 군단에서 다시 보게 될 것 입니다."
 UniqueAscensionPerksEvents.121.Name:0 "함선 침입 활성화"
 UniqueAscensionPerksEvents.124.Desc:0 "우리는 작년에 있었던 전투에서 파괴된 배들의 통제권을 얻었습니다."
 UniqueAscensionPerksEvents.124.Name:0 "선박 침입"
 UniqueAscensionPerksEvents.13.Name:0 "$PLANETARY_PROJECT_1$ §G성공§!"
 UniqueAscensionPerksEvents.130.Desc:0 "우리의 기술자들은 모든 보호되지 않은 성계에 방어 플랫폼을 배치할 것 입니다. 우리의 각 식민지들은 타이탄 기술이 연구 되어 있을시 거대한 이온 포로 보호 받게 될 것입니다. 만약 이 플랫폼이 파괴 된다면 15년 후에 자동 수리 될 것 입니다."
 UniqueAscensionPerksEvents.14.Name:0 "$PLANETARY_PROJECT_2$ §G성공§!"
 UniqueAscensionPerksEvents.141.Desc:0 "마침내 인공 원시 문명 프로젝트에 필요한 모든 자원을 동원하고 충분한 지원자를 모았으며, 이제 이들을 §G[Root.GetName]§!로 보내 실패하더라도 우리 종족의 유산을 보호할 수 있는 새로운 원시 세계를 건설할 것입니다."
 UniqueAscensionPerksEvents.141.Name:0 "원시 문명 창조"
 random_early_age:0 "§Y$RANDOM$ 초기 원시 시대§!"
 random_late_age:0 "§Y$RANDOM$ 후기 원시 시대§!"
 random_age:0 "§G$RANDOM$ 원시 시대§!"
 abandon_project:0 "§R$anomaly.6786.b$§!"
 UniqueAscensionPerksEvents.3140.name:0 "원시 문명 창조 프로젝트"
 UniqueAscensionPerksEvents.3140.desc:0 "$UniqueAscensionPerksEvents.141.Desc$\n§W페이지: §!§Y[Root.SdjVarPageOfMenu]/[Root.SdjVarMaxPageOfMenu]§! (§Y[Root.SdjVarSpeciesTotalNum]§! 종족)"
 UniqueAscensionPerksEvents.3161.name:0 "식민지 회귀 업데이트"
 UniqueAscensionPerksEvents.3161.desc:0 "§식민지 기억 조정 완료§!\n\n식민지 주민들이 원시 환경에 잘 적응하고 있습니다.\n\n우리 수석 과학자들은 이 새로운 문명의 발전을 더 이상 방해하지 않기 위해 대상 시스템의 스타 기지를 해체할 것을 제안합니다.\n\n동의하시겠습니까?"
 UniqueAscensionPerksEvents.3161.a:0 "스타베이스 해체"
 UniqueAscensionPerksEvents.3161.a.desc:0 "귀하는 더 이상 이 별 시스템을 소유하거나 통제할 수 없습니다."
 UniqueAscensionPerksEvents.3161.b:0 "절대 안 돼!"
 UniqueAscensionPerksEvents.144.Desc:0 "우리는 원정대의 편성을 마쳤습니다. 우리는 탐사할 수 있는 선박의 양을 보여주는 패널에 접근할 수 있고, 우리의 우주선이 탐사하고 있는 지점에 대한 위험도도 알 수 있습니다."
 UniqueAscensionPerksEvents.144.Name:0 "공허 탐험 준비"
 UniqueAscensionPerksEvents.145.Danger.High:0 "위험도: §H높음§!\n"
 UniqueAscensionPerksEvents.145.Danger.Insane:0 "위험도: §G정신 나감§!\n"
 UniqueAscensionPerksEvents.145.Danger.Low:0 "위험도: §G낮음§!\n"
 UniqueAscensionPerksEvents.145.Danger.Medium:0 "D위험도: §Y중간§!\n"
 UniqueAscensionPerksEvents.145.Danger.VeryHigh:0 "위험도: §R매우 높음§!\n"
 UniqueAscensionPerksEvents.145.Danger.VeryLow:0 "위험도: §B매우 낮음§!\n"
 UniqueAscensionPerksEvents.145.Desc:0 "§M공허 탐사 프로젝트§! 메뉴에 오신 것을 환영합니다. 여기에서 우주 깊은 공허로 보낼 함선을 선택할 수 있으며, 탐사할 우주 구역도 결정할 수 있습니다. 또한 이 구역의 현재 위험 수준과 잠재 자원을 모니터링할 수 있습니다."
