 UniqueAscensionPerksEvents.442.Name:0 "§H[deep_scanned_planet.GetName]§!에서 이상 현상 발견됨"
 UniqueAscensionPerksEvents.442.Tooltip:0 "§Y[deep_scanned_planet.GetName]§!에서 새로운 이상 현상이 발견됩니다."
 UniqueAscensionPerksEvents.451.Desc:0 "심우주 스캐너 덕분에 우리측 유물 사냥꾼들은 §H[planet_archaeological_site.GetName]§!에서 새로운 고고학 유적지를 찾아냈습니다. 발굴 현장 조사를 위해 과학팀을 보내야 합니다."
 UniqueAscensionPerksEvents.451.Name:0 "§H[planet_archaeological_site.GetName]§!에서 발견된 고고학 유적지"
 UniqueAscensionPerksEvents.451.Tooltip:0 "§Y[planet_archaeological_site.GetName]§!에서 새로운 고고학 유적지가 발견됩니다."
 UniqueAscensionPerksEvents.46.Desc:0 "§Y[Root.GetName]§!에서 팝 £pops£와 그들의 직업 £job£으로부터 축적된 모든 산업 폐기물이 수집되어 정화되었습니다. 이를 통해 우리 제국에 두 번째 목적이 부여되었습니다."
 UniqueAscensionPerksEvents.46.Name:0 "도시 폐기물 정화"
