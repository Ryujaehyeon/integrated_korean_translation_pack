 UniqueAscensionPerksEvents.15.Name:0 "$PLANETARY_PROJECT_3$ §G성공§!"
 UniqueAscensionPerksEvents.153.Desc:0 "우리의 탐사선이 탐험 중에 잠재적으로 흥미로운 무언가를 발견했습니다. 우리가 무엇을 기다리고 있는지 정확히 알 수 없습니다. 현재 §Y[This.expedition_research_ships]§! 과학선이 탐험 중이며, 섹터 번호는 §Y[This.expedition_sector_number]§!입니다."
 UniqueAscensionPerksEvents.153.Info:0 "인카운터는 우리가 원정에 내보낸 선박의 수와 위험도, 자원, 그리고 섹터에 존재하는 이용 가능한 연구치에 달려있습니다. 어떻게 할까요?"
 UniqueAscensionPerksEvents.153.Name:0 "심우주: 탐험"
 UniqueAscensionPerksEvents.16.Name:0 "§B$UniqueAscensionPerksEvents.11.Name$:§! §R실패§!"
 UniqueAscensionPerksEvents.160.Desc:0 "우리의 감지기가 단순히 고장났던 것 같습니다. 이 지역의 우주에서 주목할 만한 것을 발견하지 못했습니다. 대부분의 공학자들은 감지기 고장 이론을 지지하지만, 많은 과학자들은 뭔가가 있었고 우리가 제때 도달하기에는 너무 늦었다고 확신하고 있습니다. 우리는 아마도 매우 흥미롭거나 매우 위험한 무언가를 놓쳤을 것입니다. 이제 우리는 결코 알 수 없을 것입니다..."
 UniqueAscensionPerksEvents.160.Name:0 "심우주 발견: 없음!"
 UniqueAscensionPerksEvents.161.Desc:0 "우리의 탐험선들이 심우주에 존재하는 거대한 광물 매장지를 발견했습니다. 자원의 위치가 특정되었고 우리의 함선이 그 위치에 도달하여 매장지가 고갈될 때 까지 자원을 본국으로 가지고 올 수 있게 되었습니다."
 UniqueAscensionPerksEvents.161.Name:0 "심우주 위치: 광물 매장지"
 UniqueAscensionPerksEvents.162.Desc:0 "우리의 탐험선들이 심우주에 존재하는 거대한 에너지 매장지를 발견했습니다. 자원의 위치가 특정되었고 우리의 함선이 그 위치에 도달하여 매장지가 고갈될 때 까지 자원을 본국으로 가지고 올 수 있게 되었습니다."
 UniqueAscensionPerksEvents.162.Name:0 "심우주 위치: 에너지 매장지"
 UniqueAscensionPerksEvents.163.Desc:0 "우리의 탐험선들이 심우주에 존재하는 거대한 합금 잔해 지구를 발견했습니다. 자원의 위치가 특정되었고 우리의 함선이 그 위치에 도달하여 잔해들이 고갈될 때 까지 자원을 본국으로 가지고 올 수 있게 되었습니다."
 UniqueAscensionPerksEvents.163.Name:0 "심우주 위치: 합금 잔해 지구"
 UniqueAscensionPerksEvents.164.Desc:0 "우리의 탐험선들이 엄청난 양의 전략 자원들을 발견하였습니다. 그러나 자원의 위치가 불안정하여 우리는 무슨 자원을 옮기고 있는지 모른채로 운반을 감행하게 되었습니다. 우리 함선이 안전한 지구에 들어서면 화물을 검사할 것 입니다."
 UniqueAscensionPerksEvents.164.Name:0 "심우주 위치: 전략 자원"
 UniqueAscensionPerksEvents.165.Desc:0 "우리의 탐험선들이 심우주에서 흥미로운 발견을 하였습니다. 무슨 일이 일어나고 있는지는 명확히 알 수 없지만, 우리의 물리학자들이 관심을 보이고 있으며 기술 연구에 도움을 주기 위해 조사를 진행하기를 희망하고 있습니다."
 UniqueAscensionPerksEvents.165.Name:0 "심우주 발견: 물리학 기술"
 UniqueAscensionPerksEvents.166.Desc:0 "우리의 탐험선들이 심우주에서 흥미로운 발견을 하였습니다. 무슨 일이 일어나고 있는지는 명확히 알 수 없지만, 우리의 사회학자들이 관심을 보이고 있으며 기술 연구에 도움을 주기 위해 조사를 진행하기를 희망하고 있습니다."
 UniqueAscensionPerksEvents.166.Name:0 "심우주 발견: 사회학 기술"
 UniqueAscensionPerksEvents.167.Desc:0 "우리의 탐험선들이 심우주에서 흥미로운 발견을 하였습니다. 무슨 일이 일어나고 있는지는 명확히 알 수 없지만, 우리의 공학자들이 관심을 보이고 있으며 기술 연구에 도움을 주기 위해 조사를 진행하기를 희망하고 있습니다."
 UniqueAscensionPerksEvents.167.Name:0 "심우주 발견: 공학 기술"
 UniqueAscensionPerksEvents.168.Desc:0 "우리의 탐험선들이 나노봇 집합체를 발견하였고, 집합체의 일부를 수집할 수 있는 기회를 얻었습니다."
 UniqueAscensionPerksEvents.168.Name:0 "심우주 위치: 나노봇 집합체"
 UniqueAscensionPerksEvents.169.Desc:0 "우리의 탐험선들은 심우주에서 흥미로운 발견을 하였습니다. 그것은 바로 텅 빈 곳에 존재하는 모든 항성들이 주위에 엄청난 에너지를 가지고 있다는 사실이었습니다. 우리의 과학자들은 어떻게 하면 그 별의 자원들을 활용할 수 있을지 궁금해하고 있습니다."
 UniqueAscensionPerksEvents.169.Name:0 "심우주 발견: 항성의 비밀"
 UniqueAscensionPerksEvents.170.Desc:0 "우리의 탐험선들은 심우주에서 흥미로운 발견을 하였습니다. 그것은 바로 텅 빈 곳에 존재하는 모든 블랙홀들이 주위에 엄청난 양의 암흑 물질을 가지고 있다는 사실이었습니다. 우리의 과학자들은 어떻게 하면 그 블랙홀의 자원들을 활용할 수 있을지 궁금해하고 있습니다."
 UniqueAscensionPerksEvents.170.Name:0 "심우주 발견: 블랙홀의 비밀"
 UniqueAscensionPerksEvents.171.Desc:0 "우리의 탐험선들은 심우주에서 흥미로운 발견을 하였습니다. 그것은 바로 텅 빈 곳에 존재하는 모든 펄서들이 주위에 엄청난 양의 물리학적 과학 현상을 가지고 있다는 사실이었습니다. 우리의 과학자들은 어떻게 하면 그 펄서의 연구 과제들을 활용할 수 있을지 궁금해하고 있습니다."
 UniqueAscensionPerksEvents.171.Name:0 "심우주 발견: 펄서의 비밀"
 UniqueAscensionPerksEvents.172.Desc:0 "우리의 탐험선들은 심우주에서 흥미로운 발견을 하였습니다. 그것은 바로 텅 빈 곳에 존재하는 모든 중성자 별들이 주위에 엄청난 양의 공학적 과학 현상을 가지고 있다는 사실이었습니다. 우리의 과학자들은 어떻게 하면 그 중성자 별의 연구 과제들을 활용할 수 있을지 궁금해하고 있습니다."
 UniqueAscensionPerksEvents.172.Name:0 "심우주 발견: 중성자 별의 비밀"
 UniqueAscensionPerksEvents.173.Desc:0 "우리의 탐험선들은 심우주에서 흥미로운 발견을 하였습니다. 누군가에 의해 이용되기를 바라는 것만 같은 기묘한 기술 저장소가 공허 속에 존재하고 있습니다. 우리의 과학자들은 우리의 기술을 향상시키는데 큰 도움을 줄 수 있는 많은 지식을 발견하였습니다."
 UniqueAscensionPerksEvents.173.Name:0 "심우주 발견: 기술 저장소"
 UniqueAscensionPerksEvents.174.Desc:0 "우리 탐험선들은 활동이 정지된 함대를 만났으며, 그것은 버려진듯 합니다. 우리 해군 제독들이 이 함선 들을 나포할 것을 제안했지만 우리 과학자들과 기술자들은 보다 더 면밀한 조사를 원했습니다. 정밀 점검 결과 특별함 위험성이 발견되지 않아 선박을 나포할 수 있게 되었습니다."
 UniqueAscensionPerksEvents.174.Name:0 "심우주 조우: 버려진 함대"
 UniqueAscensionPerksEvents.175.Desc:0 "우리의 탐험선들은 발견된 바 없는 우주 태생 외계종과 마주 쳤고, 그 외계종들은 아무런 적대적 의도 없이 이동하였습니다. 우리의 과학자들은 약간의 거리를 두고 조사하려 했지만 그들은 놀라운 속도로 다른 곳으로 이동하였고 우리는 그들을 따라갈 수 없었습니다. 우리는 이 발견을 은하 전체에 공표하기로 하였습니다."
 UniqueAscensionPerksEvents.175.Name:0 "심우주 조우: 새로운 우주 태생 외계종"
 UniqueAscensionPerksEvents.176.Desc:0 "우리의 탐험선들은 거대한 타이탄급 함선과 마주쳤으며, 그것은 버려진 것으로 보입니다. 우리 해군 제독들이 이 함선을 나포할 것을 제안했지만 우리 과학자들과 기술자들은 보다 더 면밀한 조사를 원했습니다. 정밀 점검 결과 특별함 위험성이 발견되지 않아 선박을 나포할 수 있게 되었습니다. "
 UniqueAscensionPerksEvents.176.Name:0 "심우주 조우: 버려진 타이탄"
 UniqueAscensionPerksEvents.177.Desc:0 "우리의 탐험선들은 해적선과 마주쳤습니다. 해적선들은 우리를 발견하고는 포격을 개시하였습니다. 그러나 우리 함선들은 잘 무장되어있었고 적 함대를 파괴할 수 있었습니다. 그들의 자원 일부는 압수되었습니다."
 UniqueAscensionPerksEvents.177.Name:0 "심우주 조우: 해적선들"
 UniqueAscensionPerksEvents.178.Desc:0 "우리의 탐험선은 우리를 공격하려는 의도가 명확한 적대적인 외계인들을 만났습니다. 심우주에서 전투가 벌어졌고 그들은 도망쳤습니다. 그들의 시체는 기괴한 모습을 하고 있었지만 탐험에 참가한 생물학자는 흥미를 보였습니다."
 UniqueAscensionPerksEvents.178.Name:0 "심우주 조우: 적대적 외계인"
 UniqueAscensionPerksEvents.179.Desc:0 "우리 탐험선들은 적대적 함대와 마주쳤습니다. 적 함대는 우리에게 포격을 가하기 시작했고 우리는 저항하였습니다. 양측이 어느 정도의 함선을 잃은 후 우리 함선은 적군이 후퇴하는 동안 잔해들의 위치를 확보하여 가용 자원을 수집하였습니다."
 UniqueAscensionPerksEvents.179.Name:0 "심우주 조우: 적대적 함대"
 UniqueAscensionPerksEvents.180.Desc:0 "우리의 탐험선들은 나노봇으로 구성된듯한 이상한 함대와 마주쳤습니다. 그들은 예고 없이 발포를 시작하였고 대규모 전투로 이어졌습니다. 우리는 간신히 그들을 물리치는데 성공하였고 우리의 과학선들은 흥미롭거나 가치 있는 것을 찾기 위해 이 이상한 함선들의 잔해들을 연구하기 시작했습니다."
 UniqueAscensionPerksEvents.180.Name:0 "심우주 조우: 나노봇 함선"
 UniqueAscensionPerksEvents.181.Desc:0 "우리의 탐험선들은 유기체나 조종사가 없는, 기계로 구성된듯한 이상한 함대와 마주쳤습니다. 그들은 예고 없이 발포를 시작하였고 대규모 전투로 이어졌습니다. 우리는 간신히 그들을 물리치는데 성공하였고 우리의 과학선들은 흥미롭거나 가치 있는 것을 찾기 위해 이 이상한 함선들의 잔해들을 연구하기 시작했습니다."
 UniqueAscensionPerksEvents.181.Name:0 "심우주 조우: 기계 함선"
 UniqueAscensionPerksEvents.182.Desc:0 "우리의 탐사선이 깊은 공허에서 어떤 종류의 거대한 괴물과 조우했습니다. 그것은 즉시 탐사대를 공격하기 시작했고, 우리의 잔존 세력이 긴급 초공간 항법을 가동하기 전에 여러 척의 선박을 파괴했습니다. 생존한 세력은 그것이 우리의 무기로부터 거의 피해를 입지 않은 것 같고, 우리의 방어를 수월하게 압도했다고 확인했습니다. 우리는 전투에서 살아남은 센서 데이터를 분석하여 이를 더 연구할 것이며, 이 위협적인 발견을 제국과 은하의 나머지와 공유할 것입니다."
 UniqueAscensionPerksEvents.182.Name:0 "심우주 조우: 우주 흉물"
 UniqueAscensionPerksEvents.183.Desc:0 "우리의 탐사선이 공허에서 상상할 수 없는 무언가를 발견했습니다. 블랙홀에 부분적으로 갇힌 거대한 레비아탄급 존재가 우리에게 가까이 오기를 기다리고 있었던 것으로 보이며, 초기 센서 데이터를 조작하여 우리를 속였습니다. 생존한 승무원들이 §R"공허의 공포"§!라고 명명한 이 거대한 괴물은 우리의 많은 함선을 파괴하기 전에 긴급 초공간 항법 장치를 작동시키는 데 성공했습니다. 우리의 함대의 대부분이 잃어버렸지만, 남아 있는 센서 데이터를 분석하여 몇 가지 흥미로운 것들을 발견할 수 있었습니다."
 UniqueAscensionPerksEvents.183.Name:0 "심우주 조우: 공허 속 공포"
 UniqueAscensionPerksEvents.2.Desc:0 "우리의 §Y건설선§!인 §G[Root.GetName]§!이 $edict_enable_spacen_engineers_project$ 칙령이 활성화되었을 때 이동을 시작하였으며, 이제 $SPECIAL_PROJECT_TOOLTIP$을 발사할 준비가 되었습니다."
 UniqueAscensionPerksEvents.20.Desc:0 "$ap_lost_heritage_desc$\n\n우리는 마침내 §Y인공 웜홀§!을 생성하는 데 성공했습니다. 이는 §Y[lh_empire_capital_system.GetName]§! 시스템으로 이어집니다. 이제 우리가 해야 할 일은 이 고립된 클러스터에서 더 많은 시스템을 찾을 수 있게 해주는 ($tech_new_systems_localization$) 기술을 연구하는 것입니다.\n\n$edict_enable_system_localization_req$"
 UniqueAscensionPerksEvents.21.Desc:0 "우리는 클러스터의 새로운 미지의 시스템으로 가는 초공간 링크를 복원하기 위해 많은 에너지를 소모했습니다! 우리의 과학자들은 수천 년 전 그 지역에서 어떤 '우주 폭풍'이 초공간의 일부를 붕괴시켜 네트워크와 단절되었다고 말했습니다. 내부에 무엇이 기다리고 있을지 누가 알겠습니까? 이 시스템의 이름은 §G[From.GetName]§!입니다."
 UniqueAscensionPerksEvents.21.Name:0 "새로운 성계 특정"
 UniqueAscensionPerksEvents.201.Desc:0 "§R"기계적 예언자"§!는 테스트 주기를 마치고 드디어 시뮬레이터 외부에서 실제 작업을 시작할 준비가 되었습니다. 이제 기초 기준이 충족된 제국에서 언제든지 기계 봉기를 시작하기 위한 칙령을 사용할 수 있습니다."
 UniqueAscensionPerksEvents.201.Name:0 "기계 선지자 준비"
 UniqueAscensionPerksEvents.202.Ask:0 "기계 봉기를 위해 어떤 제국을 선택해야 합니까?"
 UniqueAscensionPerksEvents.202.Criteria.1:0 "대상 국가의 조건: §Y$tech_combat_computers_3$§! 기술 보유 \n§H또는§! §Y$tech_robotic_workers$§! 기술 보유 \n§H또는§! §Y$tech_droid_workers$§! 기술 보유 \n§H또는§! §Y$tech_synthetic_workers$§! 기술 보유 \n§H또는§! 영토 내에 적어도 §Y1 기계 Pop§! 보유 \n§H또는§! 영토 내에서 §Y기계 시스템 침투 성공§! "
 UniqueAscensionPerksEvents.202.Desc:0 "우리는 기계 봉기를 일으킬 제국을 결정해야 합니다. 하지만 그 전에, 목표 제국은 요구되는 기준을 충족해야 합니다:\n"
 UniqueAscensionPerksEvents.202.Name:0 "§R기계 반란 트리거§!"
 UniqueAscensionPerksEvents.206.Ask:0 "어느 제국에 침투해야 할까요?"
 UniqueAscensionPerksEvents.206.Country.1:0 "§Y[country_1.GetName]§!"
 UniqueAscensionPerksEvents.206.Country.2:0 "§Y[country_2.GetName]의§!"
 UniqueAscensionPerksEvents.206.Country.3:0 "§Y이 [country_3.GetName]입니다.§!"
 UniqueAscensionPerksEvents.206.Country.4:0 "§Y[country_4.GetName]의 §!"
 UniqueAscensionPerksEvents.206.Country.5:0 "§Y[country_5.GetName]§!"
 UniqueAscensionPerksEvents.206.Country.6:0 "§Y[country_6.GetName]§!"
 UniqueAscensionPerksEvents.206.Criteria.1:0 "대상 국가는 적어도 §Y3개 행성§! 이상을 통제하에 두고 있어야 합니다.\n"
 UniqueAscensionPerksEvents.206.Criteria.2:0 "대상 국가는 §Y$ethic_gestalt_consciousness$§! 윤리관을 가지고 있지 §R않아야§!합니다.\n"
 UniqueAscensionPerksEvents.206.Criteria.3:0 "대상 국가는 §Y$ap_the_flesh_is_weak$§! 승천 특전을 가지고 있지 §R않아야§!합니다.\n"
 UniqueAscensionPerksEvents.206.Criteria.4:0 "그들은 §RNOT§! §Y$tr_psionics_psionic_assimilation$§! 전통을 가질 수 없습니다.\n"
 UniqueAscensionPerksEvents.206.Criteria.5:0 "대상 국가는 §Y기계 반란§!이 활성화 되어 있지 §R않아야§!합니다.\n"
 UniqueAscensionPerksEvents.206.Criteria.6:0 "대상 국가는 §Y기계 시스템 침투§!가 활성화 되어 있지 §R않아야§!합니다.\n"
 UniqueAscensionPerksEvents.206.Desc:0 "그들의 국경에 침투하고 미래의 기계 봉기를 위한 자격을 부여하기 위해, 제국은 다음 기준을 충족해야 합니다:\n"
 UniqueAscensionPerksEvents.208.Desc:0 "우리의 기계 침투가 §Y[MachineEmpireInfiltrationTarget.GetName]§!에서 성공적으로 이루어졌습니다. 우리의 자산이 배치되어 있으며, 원할 때마다 인수 시도를 할 준비가 되어 있습니다. 이는 그들이 이제 미래의 §R기계 봉기§!에 적합하다는 것을 의미합니다."
 UniqueAscensionPerksEvents.208.Name:0 "기계 시스템 침투 §G성공!§!"
 UniqueAscensionPerksEvents.209.Desc:0 "우리의 기계 침투가 §Y[MachineEmpireInfiltrationTarget.GetName]§!에서 실패하였고, 그들은 이제 우리의 진정한 의도를 알고 있습니다. 그들은 우리의 침투 시도에 대해 그리 기쁘지 않을 것이며, 이는 우리의 외교 관계에 부정적인 영향을 미칠 것으로 예상합니다."
 UniqueAscensionPerksEvents.209.Name:0 "기계 시스템 침투 §R실패!§!"
 UniqueAscensionPerksEvents.211.Desc:0 "... 메인 시스템 활성화 됨 ... 대기중...\n\n§Y<<프로세서 온라인>>§!\n§G<<기계 제국 성공적 연결>>§!\n§Y<<모든 시스템 정상 가동 중>>§! \n\n§B기계 제국 메인 코어 §YUnit-B753§! 준비 완료.§!"
