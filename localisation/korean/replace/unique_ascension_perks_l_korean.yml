 private_assault_army:0 "민간 용병"
 private_assault_army_desc:0 "용병은 그들만의 이동수단으로 다른 행성을 침략할 수 있습니다."
 private_assault_army_plural:0 "민간 용병"
 private_gene_warrior_army:0 "민간 유전자 조작 병사"
 private_gene_warrior_army_desc:0 "유전자적으로 강화된 초군인으로, $ap_space_merchant$에서 고용됩니다. 신병은 일반적으로 용병 부대의 정예 중에서 선택받은 사회로 선발되며, 이후 광범위한 유전자 치료를 받습니다. 이를 통해 다른 생물학적 군인들을 쉽게 능가할 수 있습니다."
 private_gene_warrior_army_plural:0 "민간 유전자 조작 병사"
 private_robotic_army:0 "민간 로봇 강습병"
 private_robotic_army_desc:0 "전쟁을 위해 독점적으로 설계된 효율적인 살상 기계로, $ap_space_merchant$에서 구매한 것입니다. 그들은 목표를 끈질기게 추구하며, 유기체 전투 유닛을 자주 괴롭히는 낮은 사기의 파괴적인 영향에 무감각합니다."
 private_robotic_army_plural:0 "민간 로봇 강습병"
 private_slave_army:0 "민간 노예병"
 private_slave_army_desc:0 "전장에서 주인을 위해 싸우는 노예 군인들로, $ap_space_merchant$에게서 획득됩니다. 대부분은 강제로 징집되지만, 많은 노예들이 식량 배급을 늘리거나 다른 힘든 노동에서 탈출하기 위한 절박한 시도로 자원합니다."
 private_slave_army_plural:0 "민간 노예병"
 r_cortana:0 "코타나"
 r_cortana_desc:0 "코르타나는 잉여 연구 용량을 할당하는 데 최적의 효율에 도달하였으며, 이제 §H10 반복 가능한 기술§!을 동시에 연구할 수 있는 특별한 능력을 갖게 되었습니다."
 r_cortana_tooltip:0 "코타나가 즉시 반복 기술을 10회 완료합니다."
 r_orb_of_knowledge:0 "£unity£ §G지식의 보주§! £society£"
 r_orb_of_knowledge_desc:0 "이 유물의 힘을 완벽히 설명할 순 없습니다. 왜냐하면 우리는 이 유물을 기껏해야 엄청난 양의 £unity£ §B통합§!과 £society£ §G$society_research$§!를 만들어내는 용도로 밖에 사용할 수 없기 때문입니다."
 ragnarok_strike_tooltip:0 "행성을 완전히 파괴하기까지 30일이 걸리는 §R라그나로크 폭격§!을 시행합니다. 그러나, 30일 동안 함대는 어떠한 행동도 취할 수 없습니다. 행성이 파괴된 뒤에 다시 이동할 수 있습니다. 이를 시행하면 다른 제국들은 큰 위협을 느끼고 집단 학살 의견이 생길 것입니다.\n\n§R타이탄이 한 척 이상 존재하고 크기가 200 이상인 함대만이 이를 시행할 수 있습니다.§!"
