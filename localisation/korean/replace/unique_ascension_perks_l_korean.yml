 UniqueAscensionPerksEvents.145.Req01:0 "$TRIGGER_FAIL$심우주 탐사를 위한 과학선의 건조를 담당하는 조선소가 재사용 대기중입니다. (3개월)"
 UniqueAscensionPerksEvents.145.Req02:0 "$TRIGGER_FAIL$탐사 과학선이 한계에 달했습니다. 한계를 높이기 위해 필요 기술을 연구하십시오."
 UniqueAscensionPerksEvents.145.Req03:0 "$TRIGGER_FAIL$우리의 과학자들이 심우주 탐사에 적합한 구획을 다시 찾을 때까지 기다려야 합니다 (1년)."
