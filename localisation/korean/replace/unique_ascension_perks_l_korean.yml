 ap_stellar_manipulation_succeed:0 "§B$UniqueAscensionPerksEvents.11.Name$:§!가 성공적으로 완료되었으며, 우리는 활용할 준비가 된 새로운 §GCelestial Body§!를 생성하였습니다."
 ap_stellar_manipulation_tooltip:0 "§H기능 잠금 해제:§! $UniqueAscensionPerksEvents.11.Name$\n우리는 §Y소행성§!, §G거주 가능 행성§! 또는 §H거주지§!와 같은 새로운 천체를 생성할 수 있습니다. 이를 통해 미래의 식민지나 자원 저장소로 활용할 수 있습니다. 또한 하나의 항성계에서 더 많은 서식지를 생성할 수 있지만(새로 생성된 서식지의 구역을 조정하기 위해서는 기존 서식지를 파괴해야 합니다).\n$ap_stellar_manipulation_instruction$.\n\n§H법령 잠금 해제:§! $edict_enable_planetary_project$.\n\n§H결정 잠금 해제:§! $ap_stellar_manipulation$.\n$decision_stellar_manipulation_tooltip$\n"
 ap_subject_compatibility:0 "\n\n§R어떤 제국의 종속국이 되는 것은 아마도 이 기능을 무효화할 것입니다.§!"
 ap_super_hive_mind:0 "슈퍼 군체 의식"
 ap_super_hive_mind_desc:0 "우리의 단결은 날이 갈 수록 강해지고 있고 우리의 격정은 멈출 수 없을 것 입니다. 우리의 드론들 중 일부는 자기 증식을 통해 효율을 두배로 높일 수 있는 가능성을 열어 놓았습니다."
 ap_super_hive_mind_req_1:0 "$TRIGGER_FAIL$£society£ §Y$tech_colonial_centralization$§! 기술을 필요로 합니다."
 ap_super_hive_mind_tooltip_1:0 "\n§H기능 잠금 해제:§! 이중 조선소 \n해군 함선을 건조할 때 확률적으로 함선이 복제될 것 입니다.\n\n"
 ap_super_hive_mind_tooltip_2:0 "§H기능 잠금 해제:§! 지도자 복제\n우리 소속의 지도자를 복제할 수 있습니다."
 ap_super_hive_mind_tooltip_3:0 "§H시행령 잠금해제:§! $edict_leader_cloning$."
 ap_transcendent_learning_tooltip:0 "§H기능 잠금 해제:§! §Y확장 가능한 지식§! 승천의 길"
 ap_underworld:0 "암흑가 접근"
 ap_underworld_desc:0 "가장 위험한 위협에 대처하기 위해서는 수단 방법을 가리지 않아야 할 때도 있습니다. 군사, 정치, 경제 분야에서 막강한 힘을 가지려면 은하계 위기를 야기할 수 있는 문제를 비공식적으로 다루기 위해 암흑가의 속삭임이 필요할지도 모릅니다."
 ap_underworld_req_1:0 "$TRIGGER_FAIL$§Y$ap_wheel_fortune$§! 승천 특전을 필요로 합니다."
 ap_underworld_req_2:0 "$TRIGGER_FAIL$£society£ §Y$tech_underworld_smuggler$§! 기술을 필요로 합니다."
 ap_underworld_req_3:0 "$TRIGGER_FAIL$최소 §Y4000§! $treasures$ £treasures£ 또는 §Y$civic_criminal_heritage$§! 시민이 필요합니다."
 ap_underworld_tooltip:0 "\n§H기능 잠금 해제:§! 암흑가 \n암흑가에 접근하고, $UniqueAscensionPerksEvents.371.Smuggler$, $UniqueAscensionPerksEvents.371.Pirate$, $UniqueAscensionPerksEvents.383.Name$, $UniqueAscensionPerksEvents.371.Slaver$ 등과 같은 사람들과 통신을 수립합니다.\n\n§H시행령 잠금 해제:§! $edict_underworld_menu$."
 ap_utopian_realisation:0 "유토피아 실현"
 ap_utopian_realisation_desc:0 "우리는 수세기 동안 잠들어 있던 고대 친구들을 환영하며, 잊혀지고 사라진 종들에게 기사회생의 기회를 제공하고 창의적인 유전자 재구성 기술을 통해 다시 한 번 은하로 돌아올 수 있는 기회를 줍니다. 이를 위해 우리는 모두 함께 노력하여 우리의 수도를 영원한 낙원으로 만들어 모든 생물 종이 우리의 탐구에 동참할 수 있도록 할 것입니다. $tr_harmony_utopian_dream$은 이제 우리의 것입니다."
 ap_utopian_realisation_req_1:0 "$TRIGGER_FAIL$£society£ §Y$tech_genome_mapping$§! 기술을 필요로 합니다."
 ap_utopian_realisation_req_2:0 "$TRIGGER_FAIL$£engineering£ §Y$tech_epigenetic_triggers$§! 기술을 필요로 합니다."
 ap_utopian_realisation_tooltip:0 "\n§H기능 잠금 해제:§! $tr_harmony_utopian_dream$\n$SPECIAL_PROJECT_TOOLTIP$을 완료하면, 이미 그렇지 않다면 당신의 수도 행성을 §Y$pc_gaia$§!로 바꿀 수 있는 가능성이 생깁니다. 또한, 당신의 수도에서 12종의 서로 다른 종의 12개의 팝 £pops£가 생성되어 당신의 제국이 최소 13종의 서로 다른 종을 소유하게 됩니다."
 ap_void_expedition:0 "공허 탐험"
 ap_void_expedition_desc:0 "우리는 성계와 초공간 항로의 한계에서 벗어나 새로운 영역을 발견해야 할 때가 왔습니다. 우리는 과거 어느 문명에게도 발견되지 않았던 것들을 찾기 위해 우리의 과학선을 심우주 공간에 보낼 수 있는 가능성을 얻게될 것 입니다. 그러나 우리는 이 알 수 없는 공간에 존재하는 희망만큼 위험의 수준 또한 크다는 사실을 각오하고 받아들여야 합니다."
 ap_void_expedition_req_1:0 "$TRIGGER_FAIL$§Y$ap_lost_heritage$§! 승천퍽을 필요로 합니다."
 ap_void_expedition_req_2:0 "$TRIGGER_FAIL$§Y$tr_discovery_finish$§!이 필요합니다."
 ap_void_expedition_req_3:0 "$TRIGGER_FAIL$£physics£ §Y$tech_automated_exploration$§! 기술을 필요로 합니다."
 ap_void_expedition_req_4:0 "$TRIGGER_FAIL$£physics£ §Y$tech_cryostasis_2$§! 기술을 필요로 합니다."
 ap_void_expedition_req_5:0 "$TRIGGER_FAIL$ £physics£ §Y$tech_combat_computers_3$§! 기술이 필요합니다."
 ap_void_expedition_req_6:0 "$TRIGGER_FAIL$£physics£ §Y$tech_space_science_5$§! 기술을 필요로 합니다."
 ap_void_expedition_tooltip:0 "\n§H기능 잠금 해제:§! 심우주 탐험 \n우리의 과학선이 심우주를 탐사하고 흥미로운 것들을 찾을 수 있도록 허용합니다. 이 행동은 위험이 따를 것 입니다."
 ap_void_expedition_tooltip_2:0 "§H시행령 잠금해제:§! $edict_void_expedition_menu$."
 ap_wheel_fortune:0 "운명의 수레바퀴"
 ap_wheel_fortune_desc:0 "운이 우리 편이어야만 이익을 얻을 수 있다고 누가 말했습니까? 다른 제국들은 보통 발견한 귀중한 물건을 그냥 팔고, 빠른 크레딧을 얻기 위해 무작위 발견에 의존하지만, 우리는 그것들을 안전하게 보호하여 시간이 지남에 따라 가치를 높일 것입니다. 경쟁자와 복제품을 시장에서 천천히 제거하고 우리의 독특한 보물에 대한 전설과 이야기를 만들어냄으로써, 충분한 시간이 주어진다면 그들의 가치는 확실히 급등할 것입니다. 우리는 꿈이나 운에 의존하여 우리의 미래를 보장하지 않고, 대신 우리의 재정적 운명을 스스로 형성할 것입니다."
 ap_wheel_fortune_req_1:0 "$TRIGGER_FAIL$§Y$tr_prosperity_finish$§!가 필요합니다."
 ap_wheel_fortune_tooltip:0 "\n§H기능 잠금 해제:§! 보물 수집 \n$treasures_desc$. \n\n§H기능 잠금 해제:§! 보물 사냥꾼 \n탐험가들과 모험가들로 구성된 특별한 팀들이 우주에 존재하는 보물들의 매장지를 발견하기 위해 국경지역에 존재하는 빈 행성들을 탐사할 것 입니다. \n\n§H시행령 잠금 해제:§! $edict_treasures_menu$."
 automatic_drone:0 "나노 드론"
 automatic_drone_desc:0 "$tech_auto_drone$은 우리의 전문 자동 시설을 운영하는 데 사용되며, 팝 직업 없이 원자재를 생산할 수 있게 해줍니다."
