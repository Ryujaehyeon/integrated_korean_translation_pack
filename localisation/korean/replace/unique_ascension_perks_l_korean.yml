 EXPANDABLE_BRAIN_2:0 "미지에의 접근"
 EXPANDABLE_BRAIN_2_DESC:0 "우리는 우리 인구에서 새롭게 등장하는 \"승천 전문가\"를 모집하여 연구원들을 지원하고 전체 과정을 가속화할 수 있기를 희망합니다."
 EXPANDABLE_BRAIN_3:0 "두번째 선택"
 EXPANDABLE_BRAIN_3_DESC:0 "우리의 인식은 무한하기에 우리는 단 하나의 선택에만 집중할 필요가 없습니다. 더욱 강력한 힘을 위해 두번째 선택을 할 수 있는 시간이 올 것입니다."
 EXPANDABLE_BRAIN_4:0 "마지막 선택"
 EXPANDABLE_BRAIN_4_DESC:0 "우리는 여기서 멈추지 않을 것입니다. 마지막으로 시도해보죠. 그리고 마침내, 우린 우리가 가진 무한한 자각의 잠재력을 온전히 일깨울 수 있을 것입니다."
