 UniqueAscensionPerksEvents.473.Desc:0 "£society£ 사회학의 어떤 분야에 우리 연구진의 초점을 맞출까요?"
 UniqueAscensionPerksEvents.473.Name:0 "£society£ 기술 의회 : §G$society_research$§! £society£"
 UniqueAscensionPerksEvents.474.Desc:0 "£engineering£ 공학의 어떤 분야에 우리 연구진의 초점을 맞출까요?"
 UniqueAscensionPerksEvents.474.Name:0 "£engineering£ 기술 의회 : §H공학 연구§! £engineering£"
 UniqueAscensionPerksEvents.481.Desc:0 "이것이다, 우리는 §G[legendary_forge_planet.GetName]§!라고 불리는 §H$pc_molten$§!를 §Y$pc_legendary_forge$§!로 변형시켰다, 이제 행성은 다음 절차를 시작하기 위해 식민지화가 가능하다."
 UniqueAscensionPerksEvents.481.Name:0 "$pc_legendary_forge$ 생성됨"
 UniqueAscensionPerksEvents.49.Desc:0 "우리는 $SPECIAL_PROJECT_TOOLTIP$을 완료하여 재활용 탐사를 시작했습니다. 이는 파괴된 함선이 다음 해 초에 복구되어 우리의 수도로 돌아올 §Y35% 확률§!이 있음을 의미합니다."
 UniqueAscensionPerksEvents.491.Desc:0 "§G$ap_library_wisedom$§!에 오신 것을 환영합니다. 이 메뉴를 통해 우리는 £unity£ §YUnity§!와 교환하여 제국의 주요 역사 데이터베이스에 접근할 수 있습니다."
 UniqueAscensionPerksEvents.492.Desc:0 "바로 이겁니다. 이제 다시금 $edict_library_wisedom_menu$에 접근할 수 있습니다."
 UniqueAscensionPerksEvents.492.Name:0 "§G$ap_library_wisedom$§! 사용 가능"
 UniqueAscensionPerksEvents.493.Desc:0 "안녕하세요! 저는 $ap_library_wisedom$의 주요 아카이브 큐레이터 유닛, P.A.C.U입니다. 저는 이 도서관의 방대한 역사 데이터 수집을 활용하여 귀하의 제국을 위한 다양한 솔루션을 정리하도록 설계된 인공 지능입니다. 이번에는 저희 데이터 뱅크가 귀하를 위해 무엇을 할 수 있을까요?"
 UniqueAscensionPerksEvents.494.Desc:0 "알파에서 에타까지의 모든 데이터 뱅크는 기록된 역사 전반에 걸친 외교적 상호작용 및 통치 방법에 대한 데이터를 저장하는 데 사용되며, 도서관에 충분히 관련성이 있다고 판단된 모든 정치적 또는 행정적 데이터도 포함됩니다."
 UniqueAscensionPerksEvents.495.Desc:0 "세타에서 뮤까지의 모든 데이터뱅크는 기록된 역사 전반에 걸쳐 건축 업적, 생산 방법 및 무역 형태에 대한 데이터를 저장하는 데 사용되며, 도서관에 충분히 관련성이 있다고 판단된 모든 상업적, 건축적 또는 산업적 데이터도 포함됩니다."
 UniqueAscensionPerksEvents.496.Desc:0 "만나서 반가워요. 내 이름을 굳이 말 할 필요는 없을 것 같네요. 그런건 필요 없잖아요? 당신이 나에 대해 알아야 할 것은 오직 내가 군에 아주 오랜 시간 복무했다는 사실과, 내가 §H대제독§!의 자리에 오르는 동안 수많은 승리를 했다는 것, 그리고 병사들이 나를 §Y불패§!라고 불렀다는 것 정도면 될 것 같네요. 당신은 이유가 있어서 여기에 왔을 테고, 나는 당신에게 어떻게 이 위험한 우주에서 살아남을 수 있는지 조언해주기엔 충분하다고 생각해요."
 UniqueAscensionPerksEvents.497.Desc:0 "타우에서 오메가까지의 모든 데이터 뱅크는 기록된 역사 전반에 걸쳐 고고학적 발견 및 과학적 발전에 대한 데이터를 저장하는 데 사용되며, 도서관에 충분히 관련성이 있다고 판단된 모든 다른 과학적, 고고학적 또는 기술적 데이터도 포함됩니다."
 UniqueAscensionPerksEvents.5.Desc:0 "우리 우주 공학자들은 시간 부족과 기계 오작동으로 인하여 프로젝트를 실패하고 말았습니다. 우리의 기대와는 동떨어진 결과가 기다리고 있을 것입니다."
 UniqueAscensionPerksEvents.5.Name:0 "우주 공학 프로젝트: §R실패§!"
 UniqueAscensionPerksEvents.52.Desc:0 "우리의 정찰팀은 해군에 복무할 준비가 된 새로운 함대를 형성하기 위해 지난 해동안 잃어버린 함선 중의 일부를 복원 하였습니다."
 UniqueAscensionPerksEvents.52.Name:0 "복구된 함대"
 UniqueAscensionPerksEvents.520.Desc:0 "£society£ §G$ap_library_wisedom$§! £society£가 폐쇄되었으며, P.A.C.U가 또 다른 해결책을 컴파일할 준비가 되기까지 최소 730일을 기다려야 합니다."
 UniqueAscensionPerksEvents.520.Name:0 "§G$ap_library_wisedom$§! 폐쇄됨"
 UniqueAscensionPerksEvents.531.Alloys:0 "£alloys£ 직접 건설 £alloys£"
 UniqueAscensionPerksEvents.531.Desc:0 "우리는 §H[From.GetName]§! 성계의 탐사를 완료했습니다. 이제, 우리는 건설선의 도움 없이 성계를 소유할 수 있습니다. £influence£ §Y영향력§!을 사용해 이를 직접 소유하거나, 투자자를 불러 £energy£ §Y$energy$§!를 주어 일을 시키거나, 능숙한 공학자팀에게 £minerals£ §Y광물§!을 조금 주어 일을 진행하거나, 더 많은 £alloys£ §Y합금§!을 이용해 전초 기지를 직접 건설하거나, £unity£ §Y통합력§!을 이용해 국민들에게 일을 시키거나, 대량의 £food£ §Y식량§!으로 노예 상인을 고용해 일을 시킬 수 있으며, 그냥 성계를 내버려둘 수도 있습니다. 어떻게 할까요?"
 UniqueAscensionPerksEvents.531.Energy:0 "£energy£ 투자자를 부른다 £energy£"
 UniqueAscensionPerksEvents.531.Food:0 "£food£ 노예를 소집한다 £food£"
 UniqueAscensionPerksEvents.531.Influence:0 "£influence£ 강력한 지원을 얻다 £influence£"
 UniqueAscensionPerksEvents.531.Minerals:0 "£minerals£ 기술자에게 물어본다 £minerals£"
 UniqueAscensionPerksEvents.531.Name:0 "§H[From.GetName]§! 탐사됨"
 UniqueAscensionPerksEvents.531.NanoDrones:0 "£automatic_drone£ 우리의 $automatic_drone$ £automatic_drone£을 사용합니다."
 UniqueAscensionPerksEvents.531.Nope:0 "그 성계를 내버려둬라"
 UniqueAscensionPerksEvents.531.Treasures:0 "£treasures£ 해적들을 고용한다 £treasures£"
 UniqueAscensionPerksEvents.531.Unity:0 "£unity£ 대중에게 묻다 £unity£"
 UniqueAscensionPerksEvents.531.Disable:0 "$DISABLE$ $ap_expansionist_development$는 현재 비활성화됩니다."
 UniqueAscensionPerksEvents.531.Enable:0 "$ENABLE$ 자동 $ap_expansionist_development$ 가능성"
 UniqueAscensionPerksEvents.534.Desc:0 "어떻게 더 대응해야 할까요?"
 UniqueAscensionPerksEvents.534.a:0 "수동으로 계속 진행하십시오."
 UniqueAscensionPerksEvents.534.a.tooltip:0 "계속 진행하며 매번 자원을 개별적으로 선택합니다."
 UniqueAscensionPerksEvents.534.b:0 "자동으로 계속 진행합니다."
 UniqueAscensionPerksEvents.534.b.tooltip:0 "선택한 자원이 한도 이하가 될 때까지 계속합니다."
 UniqueAscensionPerksEvents.541.Desc:0 "우리의 보안 공학자들이 $ap_dark_galaxy_web$에 접근할 수 있는 적절한 방법을 설정하는 작업을 마쳤습니다. 이제 우리는 운영 보안을 보장하기 위해 보안 방화벽을 선택해야 합니다."
 UniqueAscensionPerksEvents.541.Name:0 "$ap_dark_galaxy_web$ 접근 §G부여됨!"
 UniqueAscensionPerksEvents.542.Desc:0 "§B$ap_dark_galaxy_web$§! 브라우저에 오신 것을 환영합니다! 시작하기 전에 다음 지침을 읽는 것이 좋습니다..."
 UniqueAscensionPerksEvents.56.Desc:0 "§Y[spawn_location_system.GetName]§!에서 상당한 양의 해적 활동을 탐지했습니다!. §B보안 타격대§!가 성계의 평화를 위하여 출동할 것 입니다."
 UniqueAscensionPerksEvents.56.Name:0 "타격 부대 배치 됨"
 UniqueAscensionPerksEvents.58.Desc:0 "우리의 보안 타격대는 §Y[preventive_strike_planet.GetName]§!에 존재하는 범죄 조직의 구성원들에 대한 예방 공격을 개시하였습니다. 많은 자원, 무기, 함선, 조직원 뿐 만 아니라 일부 지도자들 또한 체포 되었습니다. 이제 이 자원들은 국가에 귀속될 것 입니다."
 UniqueAscensionPerksEvents.58.Name:0 "예방 타격"
 UniqueAscensionPerksEvents.60.Desc:0 "§Y[Root.GetName]§! 행성 표면에 존재하는 가혹한 환경의 평정을 완료하였습니다. 식민지는 이제 우리 제국의 국민들이 더욱 더 잘 정착할 수 있게 친근하고 매력적으로 변화 하였습니다."
 UniqueAscensionPerksEvents.62.Desc:0 "우리는 §Y[Root.GetName]§!에 기계 £pops£ POP의 생성을 완료했습니다. 도시 건설자들은 쿨다운이 완료된 후 건물과 지구 건설에 다시 집중하거나 더 많은 로봇을 만들 수 있습니다."
 UniqueAscensionPerksEvents.64.Desc:0 "$ap_recomposer$의 건설이 완료되었습니다. 이제 제국 내의 어떤 행성에서든 이 과정을 시작하기 위한 행성 결정을 사용할 수 있습니다."
 UniqueAscensionPerksEvents.64.Name:0 "$ap_recomposer$ 구축됨"
 UniqueAscensionPerksEvents.65.Desc:0 "우리는 §Y[Root.GetName]§!에 존재하는 모든 유기체 POP을 기계 POP으로 재구성하는 작업을 성공적으로 끝마쳤습니다."
 UniqueAscensionPerksEvents.65.Name:0 "인구 재합성 됨: 유기체를 기계로"
 UniqueAscensionPerksEvents.66.Desc:0 "우리는 §Y[Root.GetName]§!에 존재하는 모든 유기계 POP을 유기체 POP으로 재구성하는 작업을 성공적으로 끝마쳤습니다."
 UniqueAscensionPerksEvents.66.Name:0 "인구 재합성 됨: 기계를 유기체로"
 UniqueAscensionPerksEvents.69.Desc:0 "우리의 신봉자는 서로 다른 몰락한 제국의 아카데미에서 연구를 마쳤습니다. 그들은 몰락 제국에서 좋은 소식을 가지고 우리의 고향으로 돌아왔습니다. 우리의 수도에 담당자를 보내고 싶어한다는 것이었습니다. 하지만 우리는 단 하나의 몰락한 제국을 위한 회의만 준비할 수 있는데 어떤 쪽을 택하시겠습니까?"
 UniqueAscensionPerksEvents.69.Name:0 "몰락 제국 아카데미"
 UniqueAscensionPerksEvents.71.Desc:0 "우리는 이제 몰락한 제국에 대한 정보를 수집하였습니다. 무엇이 그들을 움직이게 하는지를 정확히 알고 있으며 무엇이 그들을 각성하게 하는지에 대해서 말입니다. 하지만 이 계획에는 £influence£ §Y1000§! §M영향력§!이 필요할 것 입니다."
 UniqueAscensionPerksEvents.72.Desc:0 "우리는 그들을 깨우기 위해 우리의 영향력을 어느 몰락 제국에 쓸 것 인지를 결정해야 합니다. 이 계획이 성공하면 우리를 향한 그들의 의견이 긍정적으로 남아 있을 것이며 우리에게 전쟁을 선포할 확률은 극히 적을 것 입니다."
 UniqueAscensionPerksEvents.72.Fallen.1:0 "§Y[fallen_empire_1.GetName]§!"
 UniqueAscensionPerksEvents.72.Fallen.2:0 "§Y[fallen_empire_2.GetName]§!"
 UniqueAscensionPerksEvents.72.Fallen.3:0 "§Y[fallen_empire_3.GetName]§!"
 UniqueAscensionPerksEvents.72.Fallen.4:0 "§Y그 [fallen_empire_4.GetName].§!"
 UniqueAscensionPerksEvents.72.Fallen.5:0 "§Y[fallen_empire_5.GetName]§!"
 UniqueAscensionPerksEvents.72.Fallen.6:0 "§Y[fallen_empire_6.GetName]§!"
 UniqueAscensionPerksEvents.72.Name:0 "몰락 제국의 각성"
 UniqueAscensionPerksEvents.73.Desc:0 "어린 것, 너는 우리의 관심을 은하계의 미래에 집중시키는데 성공한 듯 하구나. 네 소원을 들어주겠다. 준비하라, §Y[FallenEmpireTaskOrigin.GetName].§!의 각성이 있을 것이다!"
 UniqueAscensionPerksEvents.8002.Desc:0 "우리는 이제 더 많은 무기와 모듈을 탑재할 수 있는 나노봇으로 구성된 선박 구획을 사용할 수 있습니다."
 UniqueAscensionPerksEvents.8003.Desc:0 "새로운 $lgate_disabled$의 건설이 §H[From.GetName]§! 시스템에서 완료되었습니다. 나머지 $lgate_disabled$ 네트워크와의 안정적인 초공간 연결이 설정되었으며, 이제 완전히 운영 중입니다."
 UniqueAscensionPerksEvents.8003.Name:0 "$lgate_disabled$ 건설됨"
 UniqueAscensionPerksEvents.8004.Desc:0 "§H[From.GetName]§! 항성계에 $nanite_factory_site$ 건설이 완료되었습니다."
 UniqueAscensionPerksEvents.8005.Desc:0 "우리는 §H[From.GetName]§! 시스템에 $NAME_Nanite_Factory$ 건설을 완료했습니다. 이제 나노입자의 대규모 생산이 최적화되었습니다."
 UniqueAscensionPerksEvents.8054.Desc:0 "새로운 $emergency_gateway$의 건설이 §H[From.GetName]§! 시스템에서 완료되었습니다. 나머지 $emergency_gateway$ 네트워크와의 안정적인 초공간 연결이 설정되었으며, 이제 완전히 운영 중입니다."
 UniqueAscensionPerksEvents.8054.Name:0 "$emergency_gateway$ 건설됨"
 UniqueAscensionPerksEvents.8059.Desc:0 "탐사 중 호위해야할 과학선을 선택하십시오."
 UniqueAscensionPerksEvents.8059.Name:0 "과학선 호위"
 UniqueAscensionPerksEvents.8059.Select:0 "다른 과학선을 선택하세요."
 UniqueAscensionPerksEvents.8059.Ship.1:0 "§Y[ship_1.GetName]§!"
 UniqueAscensionPerksEvents.8059.Ship.2:0 "§Y[ship_2.GetName]§!"
 UniqueAscensionPerksEvents.8059.Ship.3:0 "§Y[ship_3.GetName]§!"
 UniqueAscensionPerksEvents.8059.Ship.4:0 "§Y[ship_4.GetName]§!"
 UniqueAscensionPerksEvents.8059.Ship.5:0 "§Y[ship_5.GetName]§!"
 UniqueAscensionPerksEvents.8059.Ship.6:0 "§Y[ship_6.GetName]§!"
 UniqueAscensionPerksEvents.8059.Ship.7:0 "§Y[ship_7.GetName]§!"
 UniqueAscensionPerksEvents.8059.Ship.8:0 "§Y[ship_8.GetName]§!"
 UniqueAscensionPerksEvents.8060.Desc:0 "과학선 §G[Root.GetName]§!은 이제 탐사 중 호위를 받게 됩니다. 우리의 최선의 노력에도 불구하고 선박이 파괴될 경우 호위는 자동으로 해체됩니다."
 UniqueAscensionPerksEvents.8060.Name:0 "선박 호위됨"
 UniqueAscensionPerksEvents.81.Desc:0 "§Y[Root.GetName]§!의 번창하는 생활 조건을 기리는 축하 행사 준비가 시작되었습니다. §Y[Root.Owner.GetName]§!의 행성 주민들을 즐겁게 해주려는 노력에 주민들이 감사를 표하고 있습니다."
 UniqueAscensionPerksEvents.81.Name:0 "§Y[Root.GetName]§! §G안정§! 기념일"
 UniqueAscensionPerksEvents.8143.Desc:0 "우리는 §G종속국§!에 £alloys£ §Y합금§! 그리고 £energy£ §Y$energy$§!를 투자하여 그들의 £navy_size£ §B해군력§!을 향상시킬 수 있습니다."
 UniqueAscensionPerksEvents.8143.Name:0 "종속국 해군 투자"
 UniqueAscensionPerksEvents.8144.Desc:0 "우리는 §YAlloys§! £alloys£와 §Y$energy$§! £energy£의 어느 정도를 §G[VassalNavyInvestmentTarget.GetName]§!에 투자하여 그들의 §BNaval Power§! £navy_size£를 강화할지 선택해야 합니다."
 UniqueAscensionPerksEvents.8144.Investment.1:0 "§R2000§! £alloys£ §Y그리고§! §R1000§! £energy£"
 UniqueAscensionPerksEvents.8144.Investment.2:0 "§R5000§! £alloys£ §Y그리고§! §R2000§! £energy£"
 UniqueAscensionPerksEvents.8144.Investment.3:0 "§R10000§! £alloys£ §Y그리고§! §R4000§! £energy£"
 UniqueAscensionPerksEvents.8144.Investment.4:0 "§R20000§! £alloys£ §Y그리고§! §R8000§! £energy£"
