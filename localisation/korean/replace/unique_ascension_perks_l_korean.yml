 UniqueAscensionPerksEvents.434.Req02:0 "$TRIGGER_FAIL$새로운 성운을 찾기 위해선 적어도 3년을 기다려야 합니다."
 UniqueAscensionPerksEvents.434.Shields:0 "£trade_protection£ 보호막 향상 £trade_protection£"
