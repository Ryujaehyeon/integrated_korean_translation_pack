 building_breeding_facility:0 "번식 시설"
 building_breeding_facility_desc:0 "번식 시설은 특별한 자원을 생산하여 자체적으로 팝 성장 대기열을 생성할 수 있으며, 이 자원이 25에 도달하면 행성에서 새로운 팝이 생성됩니다. 번식 시설은 행성에 존재하는 팝만 사용할 수 있으며, 종 선택 확률은 여러 기준에 따라 달라지며, 제국의 주요 종일수록 확률이 높고, 예를 들어 노예와 같은 경우 확률이 낮아집니다."
 building_deep_space_scanner:0 "심우주 스캐너"
 building_deep_space_scanner_desc:0 "$tech_deep_scanner_desc$ \n\n§H결정 잠금 해제:§! $decision_deep_scanner$"
 building_infinity_city:0 "§Y무한한§! 도시"
 building_infinity_city_desc:0 "인간의 이해를 초월한 대도시로, 고급 기술과 무한한 야망이 완벽하게 융합되어 있습니다. 도시의 본질은 에너지로 맥동하며, 영원함을 향해 나아가는 문명을 지탱합니다."
 building_infinity_culture:0 "§Y무한한§! 문화 센터"
 building_infinity_culture_desc:0 "예술, 철학, 혁신의 중심지로서, 여기서는 사고가 제약에서 해방됩니다. 무한의 개념은 단순히 연구되는 것이 아니라, 모든 걸작과 아이디어에 스며들어 살아있습니다."
 building_infinity_factory:0 "§Y무한한§! 공장"
 building_infinity_factory_desc:0 "물자 한계를 초월하여 최대 효율로 운영되는 생산 허브입니다. 조립 라인은 거의 영구적인 움직임으로 작동하며, 끊임없는 산업의 리듬으로 미래를 만들어냅니다."
 building_infinity_foundry:0 "§Y무한한§! 주조소"
 building_infinity_foundry_desc:0 "이 홀 안에서 원자재는 거의 파괴 불가능한 합금으로 재형성되어 금속 공학의 경계를 확장합니다. 대장간은 별의 심장에 필적하는 강도로 타오릅니다."
 building_infinity_laboratory:0 "§Y무한한§! 연구소"
 building_infinity_laboratory_desc:0 "미공개와 알려진 것이 만나는 연구의 중심지입니다. 이곳의 과학자들은 현실의 한계를 넘어서 우주 속에 숨겨진 무한한 가능성을 추구합니다."
 building_infinity_radar:0 "§Y무한한§! 레이더"
 building_infinity_radar_desc:0 "비할 데 없는 정교함을 가진 센서 배열로, 시공간의 구조에서 발생하는 교란을 감지할 수 있습니다. 은하계의 어떤 것도 그 relentless gaze에서 숨을 수 없습니다."
 building_liquid_metal_extractor:0 "$job_living_metal_extractor$"
 building_liquid_metal_extractor_desc:0 "§Y$ap_legendary_forge$§! 승격 특전을 가진 이들만이 이해할 수 있는 복잡한 과정을 통해 $sr_living_metal$을 추출하는 시설입니다."
 building_nanite_facility_1:0 "나노봇 시설 Tier-1"
 building_nanite_facility_1_desc:0 "나노 워커를 나노봇으로 변환하는 전문 시설입니다."
