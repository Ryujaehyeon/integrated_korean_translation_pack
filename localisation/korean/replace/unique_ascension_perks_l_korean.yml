 job_u_physicist:0 "천체물리학자"
 job_u_physicist_desc:0 "§Y$ap_deep_scanner$§! 승천 특전에 의해 해금되는 특별한 £job£ 직업입니다"
 job_u_physicist_drone:0 "천체물리학 드론"
 job_u_physicist_drone_desc:0 "$job_u_physicist_desc$"
 job_u_physicist_drone_plural:0 "천체 물리학 드론"
 job_u_physicist_plural:0 "천체 물리학자"
 job_weapon_forger:0 "무기 제련가"
 job_weapon_forger_desc:0 "우리 제국의 최고의 무기 제작자들이 그들의 장인을 발휘할 수 있는 이상적인 집을 얻었습니다. 희귀한 원소와 자재가 접근 가능해짐에 따라, 그들은 한때 완벽하다고 여겼던 무기를 초월할 수 있습니다.\n(§Y$ap_legendary_forge$§! 상승 특성으로 잠금 해제된 특별 직업 £job£.)"
 job_weapon_forger_drone:0 "무기 제련가 드론"
 job_weapon_forger_drone_desc:0 "$job_weapon_forger_desc$"
 job_weapon_forger_drone_effect_desc:0 "$job_weapon_forger_drone_plural$은 £alloys£ §Y$alloys$§!을 £unity£ §Y$unity$§!과 £mod_planet_amenities_add£ §Y$PLANET_AMENITIES_TITLE$§!, £mod_country_naval_cap_add£ §Y$MOD_COUNTRY_NAVAL_CAP_ADD$§!으로 바꿉니다"
 job_weapon_forger_drone_plural:0 "무기 제련가 드론들"
 job_weapon_forger_plural:0 "무기 제련가"
 leader_trait_admonitory:0 "훈계하는"
 leader_trait_admonitory_desc:0 "이 지도자는 사람들이 맡은 일에 더 능률적으로 임하도록 장려하는 방법을 알고 있습니다."
 leader_trait_adventurer:0 "모험가"
 leader_trait_adventurer_desc:0 "이 지도자는 경험이 있고 위험을 다루는 법을 알고 있어 이상 현상을 더 빠른 속도로 조사할 것 입니다."
 leader_trait_armored:0 "무장된"
 leader_trait_armored_desc:0 "이 지도자는 거의 전술 공격에 더 많은 차량을 이용할 것 입니다."
 leader_trait_behemoth:0 "승천한 외피 조절기"
 leader_trait_behemoth_desc:0 "이 지도자는 함대의 선체를 개선합니다."
 leader_trait_builder:0 "승천한 건축가"
 leader_trait_builder_desc:0 "이 지도자는 최소한의 자원으로 건물을 짓는 방법을 알고 있습니다."
 leader_trait_building_engineer:0 "건축 공학자"
 leader_trait_building_engineer_desc:0 "이 지도자는 특별한 기술팀을 이용해 더 빠른 속도를 건물을 건설합니다."
 leader_trait_camper:0 "방어자"
 leader_trait_camper_desc:0 "이 지도자는 무슨 일이 있어도 침략자들로 부터 식민지를 방어할 것 입니다."
 leader_trait_destroyer:0 "승천한 제노사이드자"
 leader_trait_destroyer_desc:0 "이 지도자는 전쟁에서 승리하기 위해 대규모 무기를 사용할 가능성이 높으며 적과 민간인 모두에게 더 많은 피해를 입힐 것 입니다."
 leader_trait_diplomat:0 "외교관"
 leader_trait_diplomat_desc:0 "이 지도자는 적들이 살아 남을 수 있는 많은 제안을 함으로써 그들을 동요하게 할 것 입니다. 하지만 그들이 받아들일 수 없는 것 만을 제시하겠죠."
 leader_trait_fast_explorer:0 "신속한 탐험가"
 leader_trait_fast_explorer_desc:0 "이 지도자는 행서어을 효과적으로 조사하는 방법을 알고 있어 성계를 조사하는데 필요한 시간을 줄입니다."
 leader_trait_fast_scan:0 "고속 스캐너"
 leader_trait_fast_scan_desc:0 "이 지도자는 함선의 스캐너를 개선하여 함선의 경로상 장애물을 더 빨리 회피할 수 있게 합니다."
 leader_trait_fertilizer:0 "다산 장려"
 leader_trait_fertilizer_desc:0 "이 지도자는 사람들이 더 많은 자식들을 낳도록 장려합니다."
 leader_trait_fortified:0 "요새화"
 leader_trait_fortified_desc:0 "이 지도자는 저장된 에너지 중 일부를 보호막에 넣어 더 나은 생존성을 제공하는 것을 선호 합니다."
 leader_trait_genius_selector:0 "승천한 테라포머"
 leader_trait_genius_selector_desc:0 "이 지도자는 사람들에게 어려운 환경에서 사는 법을 가르칠 수 있습니다."
 leader_trait_hurried:0 "서두름"
 leader_trait_hurried_desc:0 "이 지도자는 함대가 더 빠르게 움직이며, 더 먼 거리로 점프할 수 있도록 함선의 FTL을 개선할 수 있는 적절한 방법을 알고 있습니다."
 leader_trait_keeper:0 "승천한 금욕"
 leader_trait_keeper_desc:0 "이 지도자는 소비재를 낭비하지 않고 재활용하는 방법을 알고 있어 유지비용을 절감합니다."
 leader_trait_merciless:0 "승천한 선체 전문가"
 leader_trait_merciless_desc:0 "이 지도자는 적 함선의 선체에 더 많은 피해를 입힙니다."
 leader_trait_natural_engineer:0 "타고난 공학자"
 leader_trait_natural_engineer_desc:0 "이 지도자는 공학에 많은 지식을 가지고 있습니다."
 leader_trait_natural_physicist:0 "타고난 물리학자"
 leader_trait_natural_physicist_desc:0 "이 지도자는 물리학에 많은 지식을 가지고 있습니다."
 leader_trait_natural_sociologist:0 "타고난 사회학자"
 leader_trait_natural_sociologist_desc:0 "이 지도자는 사회학에 많은 지식을 가지고 있습니다."
 leader_trait_observer:0 "승천한 센서 재조정기"
 leader_trait_observer_desc:0 "이 지도자는 적함의 다음 위치를 예측하여 함대의 무기 추적을 강화합니다."
 leader_trait_organized:0 "조직적인"
 leader_trait_organized_desc:0 "이 지도자는 도시에 사는 사람들이 더 많은 인구를 위해 더 많은 공간을 절약할 수 있게 하는 방안을 알고 있습니다."
 leader_trait_parthenogenetic:0 "무성 생식"
 leader_trait_parthenogenetic_desc:0 "이 지도자는 무성 생식에 관한 지식을 가지고 있습니다."
 leader_trait_perspicacity:0 "통찰력"
 leader_trait_perspicacity_desc:0 "이 지도자는 어떤 이상현상도 놓치지 않았다는 것을 확인하기 위해 조사된 행성을 몇 번이고 점검합니다."
 leader_trait_provident:0 "제공자"
 leader_trait_provident_desc:0 "이 지도자는 감지기에 관해 아주 뛰어난 기술을 가지고 있습니다."
 leader_trait_quick_reflexes:0 "빠른 반응"
 leader_trait_quick_reflexes_desc:0 "이 지도자는 적들의 포화를 피할 방법을 알고 있습니다."
 leader_trait_shield_expert:0 "보호막 전문가"
 leader_trait_shield_expert_desc:0 "이 지도자는 적의 보호막에 더 큰 피해를 주는 방법을 알고 있습니다."
 leader_trait_sneaky:0 "교활함"
 leader_trait_sneaky_desc:0 "이 지도자는 적군의 보호막과 장갑에 대한 우리 무기의 관통율을 높히는 방법을 알고 있습니다."
 leader_trait_sniper:0 "승천한 장거리 전략가"
 leader_trait_sniper_desc:0 "이 지도자는 매우 먼 거리에서도 제대로 조준을 할 수 있으며 탄약을 낭비하지 않고 장거리에서 싸우는 것을 가능하게 합니다."
 leader_trait_speaker:0 "동기부여자"
 leader_trait_speaker_desc:0 "이 지도자는 군대를 전투에 동원시키는 타고난 재능이 있습니다."
 leader_trait_spy_network:0 "승천한 첩보 전문가"
 leader_trait_spy_network_desc:0 "이 지도자는 대부분의 범죄에 간섭할 수 있는 개인 첩보망을 가지고 있습니다."
 leader_trait_subterranean:0 "승천한 설계자"
 leader_trait_subterranean_desc:0 "이 지도자는 식민지에서 활용 가능한 공간, 특히 지하에서 이용 가능한 지구의 양을 증가 시킵니다."
 leader_trait_supervisor:0 "감독관"
 leader_trait_supervisor_desc:0 "이 총독은 행성 편의 시설을 보다 효율적으로 분배하고 관리하는 방법을 발명하였으며, 이를 통해 중요한 자원을 다른 곳에 할당할 수 있게 되었습니다."
 leader_trait_survivor:0 "승천한 비상 전략가"
 leader_trait_survivor_admiral:0 "승천한 비상 전략가"
 leader_trait_survivor_admiral_desc:0 "이 지도자는 언제 포기해야 할지를 잘 알고 있으며, 전쟁에 패하더라도 살아남을 가능성이 높습니다."
 leader_trait_survivor_desc:0 "이 지도자는 대부분의 위협을 피하는 방법을 알고 있으며 매복에서 살아남을 가능성이 높습니다."
 leader_trait_tacticiana:0 "책략가"
 leader_trait_tacticiana_desc:0 "이 지도자는 자신의 군대가 더욱 빠르게 베테랑이 될 수 있도록 지식과 경험을 공유할 것 입니다."
 leader_trait_talented:0 "승천한 잠재력"
 leader_trait_talented_desc:0 "이 지도자는 재능이 있어 타인과 같은 제한에 구애받지 않습니다."
 leader_trait_transgenic:0 "유전자 변형"
 leader_trait_transgenic_desc:0 "이 지도자는 더 오래 살 수 있는 특별한 선천적 특징을 가지고 있습니다."
 leader_trait_volunteer:0 "충성심"
 leader_trait_volunteer_desc:0 "이 지도자는 국가를 돕기 위해 노력하며, 고용에는 많은 비용이 들지 않을 것 입니다."
 leader_trait_young_flame:0 "젊은 불꽃"
 leader_trait_young_flame_desc:0 "이 지도자는 공격밖에 모르며, 전략에 능해 적에게 더 많은 피해를 줍니다."
 leviathan_master_provocation:0 "우리가 그 존재를 자극한다면 어떤 일이 일어날지 예측하기 어렵습니다."
