 UniqueAscensionPerksEvents.214.Desc:0 "§B기계 제국 메인 코어 §YUnit-B753§! 대기...§! \n\n안녕하십니까... §Y<<개선된 수집 프로그램>>§!이 광물을 채취하여 당신에게 도움을 주었다는 사실을 알려드리게 되어 기쁩니다. 이제 이 자원은 당신의 소유이며 도움이 되길 바랍니다. \n\n§B기계 제국 메인 코어 §YUnit-B753§! 종료...§!"
 UniqueAscensionPerksEvents.215.Desc:0 "§B기계 제국 메인 코어 §YUnit-B753§! 대기...§! \n\n안녕하십니까... §Y<<개선된 수집 프로그램>>§!이 에너지를 수집하여 당신에게 도움을 주었다는 사실을 알려드리게 되어 기쁩니다. 이제 이 자원은 당신의 소유이며 도움이 되길 바랍니다. \n\n§B기계 제국 메인 코어 §YUnit-B753§! 종료...§!"
 UniqueAscensionPerksEvents.215.Name:0 "에너지 매장지"
 UniqueAscensionPerksEvents.216.Desc:0 "§B기계 제국 주요 코어 §Y유닛-B753§! 대기 중입니다...§!\n\n좋은 아침입니다... 제 §M<<영향력 투사 프로토콜>>§!이 오랫동안 작동해 왔음을 알려드리게 되어 기쁩니다. 이를 통해 충분한 영향력을 모으고 우리 제국을 위한 목적을 부여할 수 있었습니다...\n\n§B기계 제국 주요 코어 §Y유닛-B753§! 종료합니다...§!"
 UniqueAscensionPerksEvents.216.Name:0 "관리 전망"
 UniqueAscensionPerksEvents.217.Desc:0 "§B기계 제국 메인 코어 §YUnit-B753§! 대기...§! \n\n안녕하십니까... §P<<진보된 스캐너>>§!가 많은 양의 합금 파편들을 탐지하여 수집해 당신에게 도움을 주었다는 사실을 알려드리게 되어 기쁩니다. 이제 이 자원은 당신의 소유이며 도움이 되길 바랍니다. \n\n§B기계 제국 메인 코어 §YUnit-B753§! 종료...§!"
 UniqueAscensionPerksEvents.217.Name:0 "합금 잔해 지구"
 UniqueAscensionPerksEvents.218.Desc:0 "§B기계 제국 본부 §Y유닛-B753§! 대기 중...§!\n\n안녕하세요... 제 §Y<<물리학 연구 지원>>§!이 꽤 오랫동안 작업해왔음을 기쁜 마음으로 알려드립니다. 이를 통해 귀하의 과학자들을 위한 보조 $PHYSICS_RESEARCH$ 데이터뱅크를 만들기 위한 충분한 데이터를 수집할 수 있었습니다... 그들은 이를 그들의 연구에 사용할 수 있을 것입니다...\n\n§B기계 제국 본부 §Y유닛-B753§! 종료...§!"
 UniqueAscensionPerksEvents.218.Name:0 "물리학 발견"
 UniqueAscensionPerksEvents.219.Desc:0 "§B기계 제국 주요 코어 §Y유닛-B753§! 대기 중...§!\n\n좋은 아침입니다... 제 §Y<<$society_research$ ASSISTANCE>>§!가 꽤 오랫동안 작업해 왔음을 알려드리게 되어 기쁩니다. 이를 통해 귀하의 과학자들을 위한 보조 $SOCIETY_RESEARCH$ 데이터뱅크를 만들기 위한 충분한 데이터를 수집할 수 있었습니다... 그들은 이를 연구에 활용할 수 있을 것입니다...\n\n§B기계 제국 주요 코어 §Y유닛-B753§! 종료 중...§!"
 UniqueAscensionPerksEvents.219.Name:0 "사회학 발견"
 UniqueAscensionPerksEvents.22.Desc:0 "심우주에 새로운 성계를 특정할 수 있게하는 작업이 완료 되었습니다. 준비된다면 다시 시도할 수 있습니다."
 UniqueAscensionPerksEvents.22.Name:0 "성계 특정 사용 가능"
 UniqueAscensionPerksEvents.220.Desc:0 "§B기계 제국 메인 코어 §Y유닛-B753§! 대기 중...§!\n\n좋은 아침입니다... 제 §Y<<ENGINEERING RESEARCH ASSISTANCE>>§!가 꽤 오랫동안 작업해 왔음을 알려드리게 되어 기쁩니다. 이를 통해 귀하의 과학자들을 위한 보조 $ENGINEERING_RESEARCH$ 데이터뱅크를 만들기 위한 충분한 데이터를 수집할 수 있었습니다... 그들은 이를 연구에 사용할 수 있을 것입니다...\n\n§B기계 제국 메인 코어 §Y유닛-B753§! 종료...§!"
 UniqueAscensionPerksEvents.220.Name:0 "공학 발견"
 UniqueAscensionPerksEvents.221.Desc:0 "§B기계 제국 메인 코어 §YUnit-B753§! 대기...§! \n\n안녕하십니까... §Y<<연구 프로그램>>§!이 새로운 연구에 대한 진척을 보였다는 사실을 알려드리게 되어 기쁩니다. 이 신기술은 이제 당신의 것이 되었으며 도움이 되길 바랍니다. \n\n§B기계 제국 메인 코어 §YUnit-B753§! 종료...§!"
 UniqueAscensionPerksEvents.221.Name:0 "기술 탐색"
 UniqueAscensionPerksEvents.23.Desc:0 "감지기로 얼마나 많은 성계를 탐색합니까?"
 UniqueAscensionPerksEvents.23.Name:0 "성계 색인화"
 UniqueAscensionPerksEvents.236.Desc:0 "대규모 위협으로 부터 우리 영토를 방어하기 위한 수호 감시자 제작에 관한 특별 프로젝트가 완료 되었습니다."
 UniqueAscensionPerksEvents.236.Name:0 "수호 감시자 프로젝트 완료"
