 UniqueAscensionPerksEvents.1001.Desc:0 "우리가 어떤 우주 외계 종을 번식하고 가축화하거나 재프로그래밍할 것인지 결정했으므로, 이제 가축화 과정을 시작할 §Y우주 가축화 $SPECIAL_PROJECT_TOOLTIP$§!를 시작할 수 있습니다."
