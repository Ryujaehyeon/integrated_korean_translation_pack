 building_unit_assembler:0 "유닛 조립장"
 building_unit_assembler_desc:0 "유닛 조립기는 특별한 자원을 생성하여 기계적 또는 로봇 팝 대기열을 생성할 수 있으며, 이 자원이 25에 도달하면 행성에서 새로운 팝이 생성됩니다. 유닛 조립기는 행성에 직접 존재하는 팝만 사용할 수 있으며, 기계 또는 로봇의 종류 선택은 여러 기준에 따라 달라지며 제국의 주요 종족에 대해 더 높은 확률을 가집니다."
