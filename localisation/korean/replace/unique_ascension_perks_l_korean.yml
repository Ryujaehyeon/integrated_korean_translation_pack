 EMERGENCY_GATEWAY_GALACTIC_DESC:0 "이 성계에는 §Y비상 관문§!이 존재합니다."
 ETERNAL_VIGILANCE:0 "영원한 경계 프로젝트"
 ETERNAL_VIGILANCE_DESC:0 "우리는 '§Y$ETERNAL_VIGILANCE$§! 프로젝트'를 완성함으로써 우리 영토의 방어를 굳건히 할 것 입니다. 프로젝트가 완성 되면 우리의 기술자들은 모든 보호되지 않은 성계에 방어 플랫폼을 배치할 것 입니다. 우리의 각 식민지들은 타이탄 기술이 연구 되어 있을시 거대한 이온 포로 보호 받게 될 것입니다. 만약 이 플랫폼이 파괴 된다면 15년 후에 자동 수리 될 것 입니다."
 EXECUTIVE_VIGOR:0 "집행력 프로젝트"
 EXECUTIVE_VIGOR_DESC:0 "우리 정부는 매우 효율적이며 대부분의 다른 제국처럼 능력에 제한을 받지 않습니다. 우리는 적응과 능력을 최대한 향상시켜 그 어느 때보다 더 많은 사회적 원칙과 정부 관련 능력을 채택할 수 있게 될 것입니다!"
 EXPANDABLE_BRAIN_1:0 "배움에 대한 욕망"
