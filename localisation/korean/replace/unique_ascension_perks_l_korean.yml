 UniqueAscensionPerksEvents.98.Desc:0 "§G[PlanetTarget.GetName]§! 행성의 거래가 완료되었으며, 새로운 노예를 준비하기 위한 시간이 필요할 것 입니다. 이는 당신이 얼마나 많은 노예를 구매했느냐에 따라 달라집니다. 쿨다운이 완료되면 다시 노예를 구입할 수 있다는 사실을 알릴 것 입니다."
 UniqueAscensionPerksEvents.99.Desc:0 "§Y$ap_space_merchant$§! 노예 시장 지점에서 귀하의 구매에 감사드립니다! 노예들은 §G[PlanetTarget.GetName]§!로 보내졌습니다. 이제 그들의 삶에 대해 원하는 대로 할 수 있습니다. 그들은 더 이상 우리의 재산이 아닙니다."
