 UniqueAscensionPerksEvents.252.Desc:0 "우리는 §G[Root.GetName]§!라고 불리우는 지도자의 복사본을 새로운 기계 육체에 업로드 하였습니다."
 UniqueAscensionPerksEvents.252.Name:0 "지도자 업로드 됨"
 UniqueAscensionPerksEvents.253.Desc:0 "우리는 §G[Root.GetName]§!라고 불리우는 지도자의 복사본을 새로운 기계 육체에 업로드 하였습니다."
 UniqueAscensionPerksEvents.253.Name:0 "지도자 업로드 됨"
 UniqueAscensionPerksEvents.261.Desc:0 "이제 우리 민간인들은 자신들만의 우주 사업을 시작할 수 있습니다. 다만 각 활동은 §Y식민지 형태§!에 따라 달라진다는 것을 명심하십시오. 예를 들어 §Y수도§!에선 거의 모든 것을 할 수 있으나, §Y채굴 행성§!에서는 오직 £minerals£ 광물만을 수송해갈 수 있을 것입니다."
 UniqueAscensionPerksEvents.261.Name:0 "민간 우주 사업"
 UniqueAscensionPerksEvents.263.Desc:0 "민간 화물선이 §G[ROOT.GetName]§!에서 출발했습니다. 이제 그 함선은 우리 영토 내에서 가장 가까운 식민지로 향하여 화물을 나눌 것입니다.\n\n§G[ROOT.GetName]§! 식민지 유형: §Y[ROOT.GetColonyType]§!"
 UniqueAscensionPerksEvents.263.Name:0 "민간 화물선 출발"
 UniqueAscensionPerksEvents.264.Desc:0 "§Y[ROOT.GetColonyType]§!에서 출발한 민간 화물선이 §G[ROOT.GetName]§!에 도착했으며, 현재 행성에서 화물이 배분되고 있습니다."
 UniqueAscensionPerksEvents.264.Name:0 "민간 화물선 도착"
 UniqueAscensionPerksEvents.271.Desc:0 "$Sector_Z749$에 오신 것을 환영합니다, 여기서는 특히 §H우주전§!에 초점을 맞춘 많은 일들을 할 수 있는 기회를 갖게 될 것입니다. 이곳의 가장 중요한 특징은 §Y침공 관문§!입니다. $Sector_Z749$에 존재하는 §R흥미로운 보상들§!을 얻으려면 이것들 중 일부를 클리어해야만 합니다."
 UniqueAscensionPerksEvents.271.Gate:0 "§Y침공 관문§!"
 UniqueAscensionPerksEvents.271.Req01:0 "$TRIGGER_FAIL$침공 관문이 이미 선택되었습니다."
 UniqueAscensionPerksEvents.272.Desc:0 "$Sector_Z749$의 §Y침공 관문§! 메뉴에 오신 것을 환영합니다. 섹터 내부에는 각기 다른 §Y침공 관문§!들이 배치되어 있고 활성화 되기를 기다리고 있습니다. 관문을 활성화 하기 위해서는 일정량의 £energy£ §Y$energy$§!가 필요 하며 어느 관문을 활성화 하는가에 따라 그 비용이 달라집니다. 일단 §Y침공 관문§!이 활성화 되면 성계에 존재하는 당신의 함대와 우주 기지가 물리쳐야 할 §Y적들의 파도§!를 섹터로 보낼 것 입니다. 그리고 활성화 된 §Y침공 관문§!의 §Y적들의 파도§!를 물리치고 나면 §B보상§!을 받을 수 있을 것입니다.\n\n활성화 가능한 §Y침공 관문§! 중 가장 쉬운 §G알파 관문§!을 클리어 할시 다음 §Y침공 관문§!에 도전할 수 있는 가능성을 열어줍니다. §B보상§!으로는 £economy£ §G자원§!, §Y연구 포인트§!, §H몰락한 제국§!의 £upgrade£ §M잃어버린 기술§!, £navy_size£ §B강력한 선박§!, §H승격 특전 슬롯§!등이 있습니다.\n\n이제 당신이 도전할 §Y침공 관문§!을 선택하십시오."
 UniqueAscensionPerksEvents.272.Alpha:0 "§G알파 관문§!"
 UniqueAscensionPerksEvents.272.Beta:0 "§Y베타 관문§!"
 UniqueAscensionPerksEvents.272.Delta:0 "델타 관문"
