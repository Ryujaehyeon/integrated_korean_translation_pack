 security_defense_protocol_req:0 "$military_assault_protocol_req$"
 security_defense_protocol_tooltip:0 "§G가축화된 보안 외계종§! 함대를 생성해 우리 영토를 순찰하고 내부에 존재하는 적대적 목표를을 공격합니다."
 security_finance_big_policy_name:0 "대금융"
 security_finance_big_policy_name_desc:0 "우리와 같은 $ap_dark_galaxy_web$으로의 탐험을 위해 권장되는 보안 방화벽을 사용함으로써, 우리는 보안 침해의 가능성이 §B25%§! 미만이기 때문에 지속적으로 해킹당할 두려움 없이 대규모 작전을 시작할 수 있습니다."
 security_finance_huge_policy_name:0 "거대 금융"
 security_finance_huge_policy_name_desc:0 "매우 훌륭한 보안 방화벽 덕분에, 해킹에 대한 두려움 없이 큰 거래를 이루어낼 수 있게 되었습니다. 보안 침입의 확률은 거의 §B0%§!입니다."
 security_finance_medium_policy_name:0 "중간 금융"
 security_finance_medium_policy_name_desc:0 "괜찮은 보안 방화벽이 $ap_dark_galaxy_web$에서 대부분의 작업을 수행할 수 있게 해주지만, 해커들이 공격할 경우 §Y50%§!의 성공 확률이 있으므로 우리는 주의해야 합니다."
 security_finance_nothing_policy_name:0 "금융 없음"
 security_finance_nothing_policy_name_desc:0 "보안 방화벽이 전혀 없는 상태에서, 우리는 $ap_dark_galaxy_web$에서 행동할 때 매우 조심해야 합니다. 왜냐하면 어떤 해커도 우리를 성공적으로 공격할 확률이 §R100%§!이기 때문입니다."
 security_finance_small_policy_name:0 "소형 금융"
 security_finance_small_policy_name_desc:0 "보안 방화벽의 소형 금융 덕분에, 적어도 위험한 해커를 끌어들이지 않고 작은 거래 몇 가지를 진행할 수 있게 되었습니다. 하지만 우리의 방어가 뚫릴 확률은 §H75%§! 이상입니다."
 self_aware_alloys:0 "§Y$ap_self_aware_colony$§! : 합금"
