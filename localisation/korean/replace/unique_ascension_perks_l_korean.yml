 domesticated_tiyanki_tooltip_2:0 "그들의 §G$TRIGGER_HOME_PLANET$§!는 식량 £food£, 사회 연구 $society_research$ £society£ 및 이국적인 가스 £exotic_gases£ $exotic_gases$를 생성할 수 있습니다."
