 UniqueAscensionPerksEvents.273.Alpha:0 "§G알파 게이트§!를 선택하셨습니다. 이 게이트는 §Y1000 $energy$§! £energy£로 활성화할 수 있습니다.\n\n이 게이트에서 나오는 §Y적 함대§!는 주로 §HPirates§!와 §Y기본 제국 함선§!으로 구성되어 있습니다.\n\n추천 함대 전투력 £navy_size£ £military_power£: §Y20 000§!"
 UniqueAscensionPerksEvents.273.Beta:0 "§GBeta 게이트§!를 선택하셨습니다. 이 게이트는 §Y2000 $energy$§! £energy£로 활성화할 수 있습니다.\n\n이 게이트에서 나오는 §Y적 함대§!는 대부분 §HPirates§!와 §Y기본 제국 함선§!으로 구성되어 있습니다.\n\n추천 함대 전투력 £navy_size£ £military_power£: §Y30 000§!"
 UniqueAscensionPerksEvents.273.Delta:0 "§G델타 게이트§!를 선택하셨습니다. 이 게이트는 §Y5000 $energy$§! £energy£로 활성화할 수 있습니다.\n\n이 게이트에서 나오는 §Y적 함대§!는 대부분 §HPirates§!와 §Y기본 제국 함선§!으로 구성되어 있습니다.\n\n추천 함대 전력 £navy_size£ £military_power£: §Y65 000§!"
 UniqueAscensionPerksEvents.273.Epsilon:0 "§GEpsilon 게이트§!를 선택하셨습니다! 이 게이트는 §Y6600 $energy$§! £energy£로 활성화할 수 있습니다.\n\n이 게이트에서 나오는 §Y적 함대§!는 대부분 §HPirates§!와 §Y기본 제국 함선§!으로 구성되어 있습니다.\n\n추천 함대 전력 £navy_size£ £military_power£: §Y100 000§!"
 UniqueAscensionPerksEvents.273.Gamma:0 "§GGamma 게이트§!를 선택하셨습니다. 이 게이트는 §Y3400 $energy$§! £energy£로 활성화할 수 있습니다.\n\n이 게이트에서 나오는 §Y적 함대§!는 주로 §HPirates§!와 §Y기본 제국 함선§!으로 구성되어 있습니다.\n\n추천 함대 전력 £navy_size£ £military_power£: §Y45 000§!"
 UniqueAscensionPerksEvents.273.Kappa:0 "§GKappa 게이트§!를 선택하셨습니다. 이 게이트는 §Y12000 $energy$§! £energy£로 활성화할 수 있습니다.\n\n이 게이트에서 나오는 §Y적 함대§!는 주로 §HPirates§!와 §Y기본 제국 함선§!으로 구성되어 있습니다.\n\n추천 함대 전투력 £navy_size£ £military_power£: §Y160 000§!"
 UniqueAscensionPerksEvents.273.Omega:0 "§GOmega 게이트§!를 선택하셨습니다. 이 게이트는 §Y16000 $energy$§! £energy£으로 활성화할 수 있습니다.\n\n이 게이트에서 나오는 §Y적 함대§!는 대부분 §HPirates§!와 §Y기본 제국 함선§!으로 구성되어 있습니다.\n\n추천 함대 전력 £navy_size£ £military_power£: §Y200 000§!"
 UniqueAscensionPerksEvents.273.Zeta:0 "§G제타 게이트§!를 선택하셨습니다. 이 게이트는 §Y8800 $energy$§! £energy£로 활성화할 수 있습니다.\n\n이 게이트에서 오는 §Y적 함대§!는 주로 §HP해적§!과 §Y기본 제국 함선§!으로 구성되어 있습니다.\n\n추천 함대 전력 £navy_size£ £military_power£: §Y130 000§!"
 UniqueAscensionPerksEvents.3039.Desc:0 "우리가 두번째 선택을 할 수 있는 시간이 왔습니다. 어쩌면 미래에 또다른 선택을 할 수도 있을 것입니다."
 UniqueAscensionPerksEvents.3041.Desc:0 "마침내 마지막 선택을 할 수 있게 되었습니다. 우리는 마침내 정점에 올라설 준비가 되었습니다."
 UniqueAscensionPerksEvents.3050.Desc:0 "우리는 §Y[Root.GetName]§!에서 유기체 £pops£ POP의 번식 계획을 완료했습니다. 이 식민지는 이제 건물과 지구 개발에 집중할 수 있으며, 혹은 번식 시설이 준비된 후 필요하다면 다시금 번식 계획을 수행할 수 있습니다."
 UniqueAscensionPerksEvents.3050.a:0 "$EXCELLENT$, 다음 번에는 저에게 알리지 않으셔도 됩니다."
 UniqueAscensionPerksEvents.3050.b:0 "$EXCELLENT$, 지금은 스스로 식민지를 선택하세요."
 UniqueAscensionPerksEvents.3054.Desc:0 "회수한 함선을 즉시 업그레이드하기 위한 $SPECIAL_PROJECT_TOOLTIP$이 완료되었습니다. 이제부터 회수된 해군 함선은 제국 함선 설계를 기반으로 한 우리의 고급 부품과 무기로 업그레이드됩니다."
 UniqueAscensionPerksEvents.3055.Desc:0 "다음 복구된 함대가 나타날 성계를 설정합니다. 선택된 성계의 §Y우주항§!에 적어도 하나의 §Y조선소§!모듈이 필요합니다."
 UniqueAscensionPerksEvents.3055.Name:0 "복구된 함대 선택"
 UniqueAscensionPerksEvents.3055.System.1:0 "§Y[recycle_system_1.GetName].§!"
 UniqueAscensionPerksEvents.3055.System.2:0 "§Y[recycle_system_2.GetName].§!"
 UniqueAscensionPerksEvents.3055.System.3:0 "§Y[recycle_system_3.GetName].§!"
 UniqueAscensionPerksEvents.3055.System.4:0 "§Y[recycle_system_4.GetName].§!"
 UniqueAscensionPerksEvents.3055.System.5:0 "§Y[recycle_system_5.GetName].§!"
 UniqueAscensionPerksEvents.3055.System.6:0 "§Y[recycle_system_6.GetName].§!"
 UniqueAscensionPerksEvents.3061.Desc:0 "§Y[friendly_nature_discovery.GetName]§!에서 놀라운 일이 일어났습니다. 생태계 전체가 대대적인 변화를 겪으며 새로운 매장지들을 생성한 것 입니다. 우리 탐사팀은 새로운 장소들을 조사하고 있으며 많은 양의 희귀 매장지들이 발견되고 있습니다."
 UniqueAscensionPerksEvents.3061.Name:0 "자연의 선물"
 UniqueAscensionPerksEvents.3086.Desc:0 "차후에 추가적으로 업그레이드를 해야 할 기본형 함선을 즉시 생산할 수 있습니다. 약간의 £alloys£ 합금과, 생산하려는 함선의 기술만 있으면 됩니다."
 UniqueAscensionPerksEvents.3086.Name:0 "$ap_galaxy_center$: 거대 조선소"
 UniqueAscensionPerksEvents.3087.Desc:0 "§Y$d_energy_generator$§!을 얼마나 건설할까요?"
 UniqueAscensionPerksEvents.3087.Name:0 "$ap_galaxy_center$: 거대 조선소"
 UniqueAscensionPerksEvents.3090.Desc:0 "안녕하세요, §Y$ap_space_merchant$§!의 가장 유용한 특별 지점 중 하나인 로봇 시장에 오신 것을 환영합니다! 이 지점에서는 귀하의 행성에서 서비스할 준비가 된 전문 로봇 유닛을 제공합니다 - 원하신다면 자유도 가능합니다! /n새로운 로봇을 보낼 행성을 선택해 주십시오."
 UniqueAscensionPerksEvents.3091.Desc:0 "§G[PlanetTarget.GetName]§! 행성이 선택 되었습니다. 이제 구매하고자 하는 로봇의 종류를 선택하십시오."
 UniqueAscensionPerksEvents.3092.Desc:0 "§G[PlanetTarget.GetName]§! 행성의 거래가 완료되었으며, 새로운 로봇을 준비하기 위한 시간이 필요할 것 입니다. 이는 당신이 얼마나 많은 로봇을 구매했느냐에 따라 달라집니다. 쿨다운이 완료되면 다시 로봇을 구입할 수 있다는 사실을 알릴 것 입니다."
 UniqueAscensionPerksEvents.3093.Desc:0 "§Y$ap_space_merchant$§!의 구매에 감사드리며, 귀하의 로봇이 §G[PlanetTarget.GetName]§!로 발송되었습니다. 원하는 대로 사용하셔도 좋지만, 로봇 반란에 대한 책임은 지지 않음을 유의하시기 바랍니다."
 UniqueAscensionPerksEvents.3094.Desc:0 "친애하는 고객님, 안녕하세요! §Y$ap_space_merchant$§!가 귀하의 제국을 방문할 때 판매할 준비가 된 새로운 노예가 이제 저희 지점 시장에 준비되었다고 기쁜 마음으로 알려드립니다."
 UniqueAscensionPerksEvents.3095.Desc:0 "친애하는 고객님, 안녕하세요! §Y$ap_space_merchant$§!가 귀하의 제국을 방문할 때 판매할 준비가 된 새로운 로봇이 이제 저희 지점 시장에서 제공된다는 소식을 전하게 되어 기쁩니다."
 UniqueAscensionPerksEvents.3096.Available.Gene:0 "사용 가능한 유전자 조작 병사: §Y[This.private_galactic_market_gene_armies]§!\n"
 UniqueAscensionPerksEvents.3096.Available.Mercenaries:0 "사용 가능한 용병: §Y[This.private_galactic_market_mercenary_armies]§!\n"
 UniqueAscensionPerksEvents.3096.Available.Robotics:0 "사용 가능한 로봇 강습병: §Y[This.private_galactic_market_robotic_armies]§!\n"
 UniqueAscensionPerksEvents.3096.Available.Slaves:0 "사용 가능한 노예병: §Y[This.private_galactic_market_slave_armies]§!\n"
 UniqueAscensionPerksEvents.3096.Desc:0 "안녕하세요, §Y$ap_space_merchant$§!의 가장 인기 있는 특별 지점 중 하나인 군수 시장에 오신 것을 환영합니다! 여기에서 구매한 모든 군대는 귀하의 수도 행성으로 직접 전송되어 배치 준비가 완료됩니다."
 UniqueAscensionPerksEvents.3096.Purchase:0 "구매에 감사드립니다. 모시게 되어 영광입니다.\n\n$UniqueAscensionPerksEvents.3096.Available.Slaves$$UniqueAscensionPerksEvents.3096.Available.Mercenaries$$UniqueAscensionPerksEvents.3096.Available.Robotics$$UniqueAscensionPerksEvents.3096.Available.Gene$"
 UniqueAscensionPerksEvents.3096.Req01:0 "$TRIGGER_FAIL$우리는 당신이 필요로 하는 분류의 군대가 없습니다."
 UniqueAscensionPerksEvents.3097.Available.Battleship:0 "사용 가능한 전함: §Y[This.private_galactic_market_battleship]§!\n"
 UniqueAscensionPerksEvents.3097.Available.Corvette:0 "사용 가능한 초계함: §Y[This.private_galactic_market_corvette]§!\n"
 UniqueAscensionPerksEvents.3097.Available.Cruiser:0 "사용 가능한 순양함: §Y[This.private_galactic_market_cruiser]§!\n"
 UniqueAscensionPerksEvents.3097.Available.Destroyer:0 "사용 가능한 구축함: §Y[This.private_galactic_market_destroyer]§!\n"
 UniqueAscensionPerksEvents.3097.Available.Titan:0 "사용 가능한 타이탄: §Y[This.private_galactic_market_titan]§!\n"
 UniqueAscensionPerksEvents.3097.Available.Moons:0 "사용 가능한 공격 위성: §Y재고 없음§!\n"
 UniqueAscensionPerksEvents.3097.Desc:0 "안녕하세요, §Y$ap_space_merchant$§!의 가장 인기 있는 특별 지점인 해군 시장에 오신 것을 환영합니다! 여기서 구매한 모든 함선은 귀하의 수도 행성으로 전송되며 기초 디자인과 잠재적으로 구식 부품을 갖추고 있습니다."
 UniqueAscensionPerksEvents.3097.Purchase:0 "구매해 주셔서 감사합니다. 여러분을 위해 봉사하게 되어 기쁩니다.\n\n$UniqueAscensionPerksEvents.3097.Available.Corvette$$UniqueAscensionPerksEvents.3097.Available.Destroyer$$UniqueAscensionPerksEvents.3097.Available.Cruiser$$UniqueAscensionPerksEvents.3097.Available.Battleship$$UniqueAscensionPerksEvents.3097.Available.Titan$$UniqueAscensionPerksEvents.3097.Available.Moons$"
 UniqueAscensionPerksEvents.3097.Req01:0 "$TRIGGER_FAIL$우리는 당신이 필요로 하는 분류의 함선이 없습니다."
 UniqueAscensionPerksEvents.31.Desc:0 "우리의 지도자들은 §Y$ap_transcendent_learning$§! 영역과 그 너머에 대한 탐구의 일환으로 우주에 대한 이해를 심화할 방법을 연구하기 시작할 것입니다. 이를 위해 우리의 제국에서 가장 뛰어난 인재들을 이 사안에 배정하는 $SPECIAL_PROJECT_TOOLTIP$를 만들었습니다."
 UniqueAscensionPerksEvents.31.Name:0 "지식의 길"
 UniqueAscensionPerksEvents.312.Desc:0 "우리의 해군 함대 §G[surgical_strike_fleet.GetName]§!(은)는 §Y[surgical_strike_planet.GetName]§!에 대한 §H정밀 폭격§!의 기회가 함대의 크기에 따라 달라질 것이라는 사실을 알고 있습니다. 어떤 대상을 공격하시겠습니까?"
 UniqueAscensionPerksEvents.312.Name:0 "§Y[surgical_strike_planet.GetName]§! §H정밀 폭격§!"
 UniqueAscensionPerksEvents.3126.Desc:0 "이제 적으로부터 가져온 함선의 오염 과정이 완료되면 설계에 따른 최신형의 부품을 장비합니다."
 UniqueAscensionPerksEvents.3128.Desc:0 "§H[Root.GetName]§!라고 불리우는 행성은 새로운 $d_hivemind_reserve$을 다시 만들 준비가 되어있습니다."
 UniqueAscensionPerksEvents.3128.Name:0 "$ap_hivemind_reserve$이 §H[Root.GetName]§!에서 준비 되었습니다."
 UniqueAscensionPerksEvents.3129.Desc:0 "하이브 마인드 비축물이 §H[ROOT.GetName]§!에서 일할 준비가 된 새로운 POP을 생성하였습니다."
 UniqueAscensionPerksEvents.3129.Name:0 "하이브 마인드 비축물이 §H[ROOT.GetName]§!에서 생성되었습니다."
 UniqueAscensionPerksEvents.313.Desc:0 "우리의 해군 함대 §G[surgical_strike_fleet.GetName]§!(은)는 §Y[surgical_strike_planet.GetName]§!에 존재하는 자원에 대한 강탈을 완료하였습니다. 자원을 다시 강탈하기 위해서는 5년이 지나야 할 것 입니다."
 UniqueAscensionPerksEvents.313.Name:0 "§Y[surgical_strike_planet.GetName]§! §G자원 약탈§!"
 UniqueAscensionPerksEvents.314.Desc:0 "반복합니다... 당신은 §Y[surgical_strike_planet.GetName]§!에 대한 §R라그나로크 폭격§!을 명령하셨습니다. 이 폭격은 행성 지표면의 완전한 파괴로 귀결됩니다. 명령에 대한 확인이 필요합니다. 정말로 승인하시겠습니까?"
 UniqueAscensionPerksEvents.314.Name:0 "§Y[surgical_strike_planet.GetName]§! §R라그나로크 폭격§! 확인"
 UniqueAscensionPerksEvents.3143.Desc:0 "§H[primitive_creation_planet.GetName]§!의 §Y[Root.Owner.GetSpeciesNamePlural] 원시 문명§!이 행성에서 엄청난 양의 £alloys£ 합금을 발견했습니다. 그들은 합금을 사용하기엔 원시적인 상태라, 우리가 가져올 계획을 세울 것입니다."
 UniqueAscensionPerksEvents.3143.Name:0 "§H[primitive_creation_planet.GetName]§!에서 합금 발견됨"
 UniqueAscensionPerksEvents.3144.Desc:0 "§H[primitive_creation_planet.GetName]§!의 §Y[Root.Owner.GetSpeciesNamePlural] 원시 문명§!이 행성에서 엄청난 양의 £food£ 식량을 소출해냈습니다. 전문가들은 행성 전역에서 향후 수십년간의 요구를 충족시킬 수 있는 양이라 평가했으며, 우리가 평화적인 방법으로, 약간의 식량을 가져와도 큰 문제는 되지 않을 것이라 장담합니다."
 UniqueAscensionPerksEvents.3144.Name:0 "§H[primitive_creation_planet.GetName]§! 대풍작"
 UniqueAscensionPerksEvents.3145.Desc:0 "§H[primitive_creation_planet.GetName]§!의 §Y[Root.Owner.GetSpeciesNamePlural] 원시 문명§!이 다른 종류의 £society£ 사회를 구축해, 연구원들의 관심을 끌고 있습니다. 더 많은 관찰을 통해 과거에 우리에게 있었던 문제점을 파악할 수 있을지도 모릅니다."
 UniqueAscensionPerksEvents.3145.Name:0 "§H[primitive_creation_planet.GetName]§!의 사회"
 UniqueAscensionPerksEvents.3146.Desc:0 "대부분의 §Y[Root.Owner.GetSpeciesNamePlural] 원주율§! 제국들이 §H[primitive_creation_planet.GetName]§!에서 그들의 차이를 제쳐두고 문화 교류를 위한 단일 장소에서 만날 것이라고 결정한 것 같습니다. 이는 수십 년 만에 그들의 문화와 상호작용에 대해 더 많이 배울 수 있는 최고의 기회 중 하나일 것입니다. 우리는 이미 무역상으로 가장한 숙련된 침투 팀을 그들의 만남의 장소로 파견하여 1차 데이터를 수집할 준비를 마쳤습니다."
 UniqueAscensionPerksEvents.3146.Name:0 "§H[primitive_creation_planet.GetName]§!의 문화 변동"
 UniqueAscensionPerksEvents.3147.Desc:0 "§H[primitive_creation_planet.GetName]§!의 §Y[Root.Owner.GetSpeciesNamePlural] 원시 문명§!에서 사용되는 기계 단지는 우리가 숨겨둔 기술이 발견된 이후, 예상치보다 훨씬 더 과도하게 작동하고 있습니다. 생성되는 £minerals£ 광물량은 우리의 기대 이상이며, 초과생산된 광물 중 일부를 회수하기 위한 잠입팀을 파견할 수 있을 것입니다."
 UniqueAscensionPerksEvents.3147.Name:0 "산업 보고 : §H[primitive_creation_planet.GetName]§!의 풍부한 광물"
 UniqueAscensionPerksEvents.3148.Desc:0 "§H[primitive_creation_planet.GetName]§!의 §Y[Root.Owner.GetSpeciesNamePlural] 원시 문명§!에서 사용되는 기계 단지는 우리가 숨겨둔 기술이 발견된 이후, 예상치보다 훨씬 더 과도하게 작동하고 있습니다. 생성되는 £energy£ 에너지량은 우리의 기대 이상이며, 초과생산된 에너지 중 일부를 회수하기 위한 잠입팀을 파견할 수 있을 것입니다."
 UniqueAscensionPerksEvents.3148.Name:0 "산업 보고 : §H[primitive_creation_planet.GetName]§!의 풍부한 에너지"
 UniqueAscensionPerksEvents.3149.Desc:0 "§H[primitive_creation_planet.GetName]§!의 §Y[Root.Owner.GetSpeciesNamePlural] 원시 문명§! 사회가 기대했던 것 보다 훨씬 더 빠르게 진화하고 있습니다. 어쩌면 우리 종족은 과거에 우리의 진정한 잠재력을 모두 발휘하지 못했을 수도 있겠습니다. "
 UniqueAscensionPerksEvents.3149.Name:0 "§H[primitive_creation_planet.GetName]§!의 진화"
 UniqueAscensionPerksEvents.315.Desc:0 "§G[surgical_strike_fleet.GetName]§! 함대는 §R라그나로크 폭격§!에 의한 §Y[surgical_strike_planet.GetName]§!의 완전한 파괴를 보고하였습니다. 그 행성에는 이제 아무것도 남아있지 않습니다."
 UniqueAscensionPerksEvents.315.Name:0 "§Y[surgical_strike_planet.GetName]§! §R파괴됨§!"
 UniqueAscensionPerksEvents.3150.Desc:0 "§H[primitive_creation_planet.GetName]§!의 §Y[Root.Owner.GetSpeciesNamePlural] 원시 문명§!은 §B초기 우주 시대§!에 도달해, 우리의 존재를 알아차리고 우리에게 소통을 시도하고 있습니다."
 UniqueAscensionPerksEvents.3150.Name:0 "§H[primitive_creation_planet.GetName]§!으로부터의 통신"
 UniqueAscensionPerksEvents.3151.Desc:0 "만나서 반갑습니다, §H[ROOT.GetName]§! 여러분. 저는 §Y[primitive_creation_country.GetName]§!을 대표해 이야기하고 있으며, 여러분과 이야기를 나눌 수 있게 되어 영광입니다. ...잠시, 우리 서로 좀 많이 닮은 것 같은데....혹시 우린 같은 종족인가요?"
 UniqueAscensionPerksEvents.3151.NotSame.Species:0 "알겠습니다. 하지만...기대했던 바는 아니군요. 하긴, 이 은하계에 우리 종족만으로 가득 찼으리라는 기대는 말도 안되는 소리겠죠. 어쨌든, 언젠가 우리 스스로 우주로 나아가게 된다면 협력할 수 있기를 바랍니다."
 UniqueAscensionPerksEvents.3151.Same.Species:0 "놀랍습니다! 우리 과학자들이 이 어처구니없는 이론이 실제로 맞았다는 것을 믿기 힘든데, 당신이 이 사실에 대해 거짓말할 이유가 없으니 실제로 맞는 것 같습니다! 그러니 당신은 우리와 같은 종으로 구성된 고급 문명입니다. 이는 많은 질문을 불러일으키지만, 안타깝게도 지금은 친근한 인사 프로토콜을 시작할 수 있는 권한만 있으니 이 질문들은 잠시 기다려야 할 것 같습니다. 당신이 오래 살고 번영하길 바랍니다, §H[ROOT.GetName]§!!"
 UniqueAscensionPerksEvents.3152.Desc:0 "안녕하세요, §H[ROOT.GetName]§! 저는 §Y[primitive_creation_country.GetName]§!의 선택받은 사회 대표입니다. 저희 직공 중 일부가 다양한 £consumer_goods£ $CONSUMER_GOOD$의 특별 컬렉션을 귀하에게 전달하고 싶어 연락드렸습니다. 이 제품들은 저희 종족이 제공할 수 있는 것을 보여주기 위해 행성 전체에서 열린 경연 대회에서 생산되었으며, 최고의 직공들이 서로 경쟁하여 그들의 상품이 컬렉션에 선택되도록 하였습니다. 이제 그들은 귀하가 실제로 이 선택받은 상품을 받는 데 관심이 있는지 알고 싶어합니다."
 UniqueAscensionPerksEvents.3152.Name:0 "§H[primitive_creation_country.GetName]§!으로부터의 통신"
 UniqueAscensionPerksEvents.3153.Desc:0 "만나서 반갑습니다, §H[ROOT.GetName]§! 여러분. 저는 §Y[primitive_creation_country.GetName]§!을 대표해 이야기하고 있으며, 우리가 실제적으로 초계함 급 §B함선 설계§!를 완성했다고 알려드리고 싶군요. 그러나 이 함선들이 정말로 우주전에 효과가 있을지는 모르겠습니다. 괜찮으시다면, 여러분들에게 이 함선을 제공할테니 실전에 투입해주셨으면 합니다."
 UniqueAscensionPerksEvents.32.Desc:0 "우리는 무엇이 진짜 현실인지 이해하며 모험을 시작했습니다. 이 길은 매우 길고 험난하겠지만 마지막에 숨겨져 있는 보상은 분명히 그만한 가치가 있을 것 입니다. 우리는 이 여정을 진전시키기 위해 많은 시간과 자원을 희생해야 할 것이며, 그 사이 적들에 대해 취약해질 것 입니다."
 UniqueAscensionPerksEvents.322.Desc:0 "§H[Root.GetRulerName]§!는 행성 §Y[target_planet.GetName]§!에서 §RCrime§! £crime£의 증가를 감지하였으며, 이 문제가 심각한 위협으로 발전하기 전에 해결하는 것이 중요하다고 믿고 있습니다. 그들은 선택된 장소에서 예방적 반격을 수행하여 문제를 해결할 계획을 세웠습니다. 만약 그들이 §R200§! §Y$energy$§! £energy£를 사용하는 것을 허락한다면, 문제는 적어도 다음 몇 달 동안은 덜 심각해질 것입니다."
 UniqueAscensionPerksEvents.322.Name:0 "§H$ap_chosen_ruler$:§! §Y[target_planet.GetName]§! 범죄 증가"
 UniqueAscensionPerksEvents.323.Desc:0 "§H[Root.GetRulerName]§!는 행성 §Y[target_planet.GetName]§!에서 감소하고 있는 §Y안정성§! £stability£ 수준을 주목하였으며, 이 문제가 확대되어 미래에 심각한 위협이 될 가능성이 있기 때문에 우리가 해결하는 것이 중요하다고 생각합니다. 그들은 행성을 적절한 안정성 수준으로 되돌리기 위해 필요한 행정 개혁을 준비하였습니다. 만약 그들이 §R200§! §Y$Unity$§! £unity£를 사용하는 것을 허락한다면, 문제는 적어도 다음 몇 달 동안 덜 심각해질 것입니다."
 UniqueAscensionPerksEvents.323.Name:0 "§H$ap_chosen_ruler$:§! §Y[target_planet.GetName]§! 낮은 안정성"
 UniqueAscensionPerksEvents.324.Desc:0 "§H[Root.GetRulerName]§!는 행성 §Y[target_planet.GetName]§!의 §BHousing§! £housing£ 수준이 낮다는 것을 인지하였으며, 이 문제가 심각한 위협으로 발전하기 전에 해결하는 것이 중요하다고 믿고 있습니다. 그들은 이 문제를 해결하기 위해 이 팝들이 거주할 수 있는 임시 대피소를 건설하는 계획을 준비하였습니다. 만약 그들이 §R200§! §Y$Minerals$§! £minerals£를 사용하는 것을 허락한다면, 문제는 적어도 다음 몇 달 동안 덜 심각해질 것입니다."
 UniqueAscensionPerksEvents.324.Name:0 "§H$ap_chosen_ruler$:§! §Y[target_planet.GetName]§! 주거 공간 없음"
 UniqueAscensionPerksEvents.325.1.Desc:0 "§H[Root.GetRulerName]§!는 행성 §Y[target_planet.GetName]§!에서 §HAmenities§! £amenities£의 감소하는 수준을 주목하였으며, 이 문제가 확대되어 미래에 심각한 위협이 될 가능성이 있기 때문에 우리가 이 문제를 해결하는 것이 중요하다고 믿고 있습니다. 그들은 추가 편의 시설 배급을 위한 센터를 개설하여 이 문제를 해결할 계획을 준비하였습니다. 만약 그들이 §R200§! §Y$energy$§! £energy£를 사용하는 것을 허락한다면, 문제는 적어도 다음 몇 달 동안은 덜 심각해질 것입니다, 완전히 해결되지 않더라도."
 UniqueAscensionPerksEvents.325.2.Desc:0 "§H[Root.GetRulerName]§!는 행성 §Y[target_planet.GetName]§!에서 §H유지 보수§! £amenities_no_happiness£ 수준이 감소하고 있음을 인지하였으며, 이 문제가 확대되어 미래에 심각한 위협이 될 가능성이 있기 때문에 우리가 이 문제를 해결하는 것이 중요하다고 믿고 있습니다. 그들은 이 상황을 처리하기 위해 특수한 유지 보수 프로토콜을 준비하였습니다. 그들이 §R200§! §Y$energy$§! £energy£를 사용하는 것을 허용한다면, 문제는 적어도 다음 몇 달 동안 덜 심각해질 것이며, 완전히 해결되지 않더라도 상황이 개선될 것입니다."
 UniqueAscensionPerksEvents.325.Name:0 "§H$ap_chosen_ruler$:§! §Y[target_planet.GetName]§! 낮은 편의시설"
 UniqueAscensionPerksEvents.326.Desc:0 "§H[Root.GetRulerName]§!는 행성 §Y[target_planet.GetName]§!에서 증가하는 §R실업§! £unemployment£ 수준을 주목하였으며, 이 문제가 심각한 위협으로 발전하기 전에 해결하는 것이 중요하다고 믿고 있습니다. 그들은 이 상황을 해결하기 위해 최적화된 고용 분배 프로그램을 준비하였습니다. 만약 그들이 §R200§! §Y광물§! £minerals£을(를) 사용하도록 허락한다면, 문제는 적어도 다음 몇 달 동안은 덜 심각해질 것이며, 완전히 해결되지 않더라도 상황이 개선될 것입니다."
 UniqueAscensionPerksEvents.326.Name:0 "§H$ap_chosen_ruler$:§! §Y[target_planet.GetName]§! 높은 실업률"
 UniqueAscensionPerksEvents.34.Desc:0 "우리는 '정신적 상승'의 기간 동안 §Y일시적인 통제§!를 성공적으로 마스터했습니다. 우리의 연구원들은 가르치고 배우기 쉬운 신뢰할 수 있는 방법을 개발하였고, 모든 팝이 집단 상승에 참여할 수 있도록 기초적인 신경 수정 작업을 의무화했습니다. 우리의 지도자와 인구는 이전에 경험하지 못했던 의식 수준을 보고하고 있으며, 일부는 더욱 향상된 의식 경험을 동시에 안팎으로 방을 확장하는 것에 비유하고 있지만, 정신적으로는 설명하기 어려운 상태입니다. 많은 과학자들이 처음에는 이것이 단순히 우리의 신경망을 최적 효율로 개선하는 방법이라고 믿었지만, 의식 자체의 개선이 그 이상으로 나아가고 있다는 것이 분명해지고 있습니다. §B그리고 아직 그 잠재력에 도달하지도 않았습니다§!. 게다가, 여러 지도자 직책에 지원하는 인재들은 '정신적 상승' 동안 비범한 기술과 능력을 개발했다고 밝혔으며, 이는 우리가 예측한 바와 같습니다. 우리 인구에서 이러한 종종 매우 개인적인 "상승 기술"에 대한 보고서의 전체 수는 계속 증가하고 있으며, 초기 분석 결과 이들은 각자의 직업에서 성과 향상으로 이어지는 경향이 있지만, 아직 눈에 띄는 차이를 만들 만큼 충분하지는 않습니다. 우리는 여전히 '정신적 상승' 상태를 지속적으로 유지할 수 없지만, 그것을 달성하는 것은 §G시간 문제일 뿐이라고 확신합니다§!. 우리는 인구 사이에서 떠오르는 "상승 전문가"를 모집하고 그들을 제국의 연구 노력에 배정하기 위해 $SPECIAL_PROJECT_TOOLTIP$를 준비했습니다."
 UniqueAscensionPerksEvents.341.Desc:0 "좋은 소식입니다, 우리 탐험가들이 §H[spawn_location.GetName]§!의 숨겨진 사원을 찾아냈는데 이 사원은 몇 천년전에 지어진 건물이었고, 보안 시스템의 비밀을 풀어내었습니다. 그리고 많은 양의 귀중한 물건들을 발견하였습니다."
 UniqueAscensionPerksEvents.341.Name:0 "§H[spawn_location.GetName]§!에서 발견된 보물"
 UniqueAscensionPerksEvents.342.Desc:0 "$edict_treasures_menu$에 오신것을 환영합니다. 여기서 당신은 수집한 £treasures£ §Y보물§!을 유용하게 사용할 수 있습니다."
 UniqueAscensionPerksEvents.342.Req01:0 "$TRIGGER_FAIL$게슈탈트 제국은 오직 하나의 보물 거래만 가능합니다."
 UniqueAscensionPerksEvents.342.Req02:0 "$TRIGGER_FAIL$우리의 첩보망이 보물을 가지고 있는 해적들을 다시 찾으려면 시간이 필요합니다 (4년)."
 UniqueAscensionPerksEvents.342.Req03:0 "$TRIGGER_FAIL$다시 보물을 수집하려면 시간이 필요합니다."
 UniqueAscensionPerksEvents.343.Desc:0 "우리는 $UniqueAscensionPerksEvents.343.Name$와 접촉하였으며, 그들이 착륙할 행성을 선택해야 합니다. 선택된 행성에서 생성되는 추가 £trade_value£ §Y무역 가치§!의 양은 채굴가와 거래하는 £treasures£ §Y보물§!의 양에 따라 §H6개월§! 동안 달라질 것입니다. 행성은 한 번에 하나의 활성 보물 거래만 지원할 수 있습니다."
 UniqueAscensionPerksEvents.343.Name:0 "£treasures£ §Y보물 수집가§! £treasures£"
 UniqueAscensionPerksEvents.344.100:0 "§G100§! £treasures£ 보물"
 UniqueAscensionPerksEvents.344.1000:0 "§G1000§! £treasures£ 보물"
 UniqueAscensionPerksEvents.344.2000:0 "§G2000§! £treasures£ 보물"
 UniqueAscensionPerksEvents.344.250:0 "§G250§! £treasures£ 보물"
 UniqueAscensionPerksEvents.344.500:0 "§G500§! £treasures£ 보물"
 UniqueAscensionPerksEvents.344.Desc:0 "§G[PlanetTarget.GetName]§! 행성을 선택하였습니다. 이곳은 $UniqueAscensionPerksEvents.343.Name$에 의해 무역이 이루어지는 경유지 역할을 수행할 것이며 §H6개월§! 후 £trade_value£ §Y무역 가치§!를 향상시킬 것 입니다. 거래를 위해 우리가 투자할 £treasures£ §Y보물§!의 양을 선택하십시오."
 UniqueAscensionPerksEvents.345.Desc:0 "§G[PlanetTarget.GetName]§!에서의 £treasures£ §Y보물§!거래가 시작되었습니다. £trade_value£ §Y무역 가치§!가 §H6개월§! 후 증가할 것 입니다."
 UniqueAscensionPerksEvents.346.Desc:0 "우리는 집단 제국이기 때문에 $UniqueAscensionPerksEvents.343.Name$는 행성을 선택하는 대신 제국과 직접 거래를 하며, £trade_value£ §YTrade Value§! 대신 £energy£ §Y$energy$§!로 직접 지불할 것입니다. 불행히도 그들은 다음 §H7 Months§! 동안 막대한 금액을 지불해야 하며, 우리는 이러한 거래를 한 번에 하나만 활성화할 수 있습니다."
 UniqueAscensionPerksEvents.347.Desc:0 "우리는 제국을 위한 £treasures£ §YTreasures§!의 거래를 시작하였으며, 이 거래 덕분에 제국에서 생성되는 월간 £energy£ §Y$energy$§!의 양이 §H7 Months§! 동안 증가할 것입니다."
 UniqueAscensionPerksEvents.347.Name:0 "£treasures£ §Y보물 거래 시작§! £treasures£"
 UniqueAscensionPerksEvents.348.Desc:0 "우리 감시망은 £treasures£ §Y보물§!을 보유하고 있는 해적들을 탐색하는 임무를 수행할 것 입니다. 일단 임무가 시작되면 §H4년§!에 걸쳐 £treasures£ §Y보물§!을 보유하고 있는 해적들의 집단을 찾아낼 것 입니다. 이 해적들을 격추하기 위해서는 적어도 §Y10 000§!의 £navy_size£ £military_power£ 함대 전투력이 필요할 것 입니다."
 UniqueAscensionPerksEvents.348.Name:0 "£treasures£ §Y보물 해적§! £treasures£"
 UniqueAscensionPerksEvents.349.Desc:0 "우리측 스파이가 §H[special_project_target_system.GetName]§! 성계에서 £treasures£ §Y보물§!을 보유 하고 있는 해적 집단을 발견 했으며 그들의 모든 약탈물을 빼앗기 위해 함대를 보내야 합니다."
 UniqueAscensionPerksEvents.349.Name:0 "£treasures£ §Y보물 해적 특정됨§! £treasures£"
 UniqueAscensionPerksEvents.35.Desc:0 "우리는 이제 최종 목표의 절반에 도달했습니다. 우리의 지도자들은 그들이 생물학적이든 기계적이든 간에 형용할 수 없는 마음의 상태에 도달할 가능성을 허락 받기 전에는 결코 접할 수 없었던 의식의 수준을 묘사하고 있습니다. 이러한 관점으로 볼 때 우리의 지능은 우리 은하에 존재하는 대부분의 종에 비해 너무나 진보된 수준에 있다는 사실을 확인할 수 있습니다."
 UniqueAscensionPerksEvents.350.Desc:0 "우리는 해적들의 모든 화물을 확보하였으며 £treasures£ §Y보물§!은 이제 우리 것 입니다."
 UniqueAscensionPerksEvents.350.Name:0 "£treasures£ §Y보물 획득§! £treasures£"
 UniqueAscensionPerksEvents.351.Desc:0 "좋은 소식입니다. 우리는 식민지 §H[spawn_location.GetName]§!에서 비밀의 통로를 찾았고 오랜 조사 끝에 간신히 입구를 열었습니다. 그리고 예상대로 숨겨진 입구 안에는 많은 양의 보물들이 있었습니다."
 UniqueAscensionPerksEvents.351.Name:0 "§H[spawn_location.GetName]§!에서 발견된 보물"
 UniqueAscensionPerksEvents.352.100:0 "무역 §R100§! £treasures£ 보물과 £minor_artifacts£ 소형 유물 §Y5 §!"
 UniqueAscensionPerksEvents.352.200:0 "무역 §R200§! £treasures£ 보물과 £minor_artifacts£ 소형 유물 §Y10§!"
 UniqueAscensionPerksEvents.352.400:0 "무역 §R400§! £treasures£ 보물과 £minor_artifacts£ 소형 유물 §Y20§!"
 UniqueAscensionPerksEvents.352.800:0 "무역 §R800§! £treasures£ 보물과 £minor_artifacts£ 소형 유물 §Y40§!"
 UniqueAscensionPerksEvents.352.Desc:0 "우리는 역사가와 접촉했습니다, 이제 그와 무엇을 거래할 수 있을까요?"
 UniqueAscensionPerksEvents.352.Name:0 "£treasures£ §Y보물 역사가§! £treasures£"
 UniqueAscensionPerksEvents.353.Desc:0 "우리는 성공적으로 £treasures£ 보물을 $UniqueAscensionPerksEvents.343.Name$의 £minor_artifacts£ 골동품과 교환했습니다. 동품 발굴에는 몇 년이 걸릴 것이며 그 기간 동안에는 교환이 불가할 것 입니다."
 UniqueAscensionPerksEvents.353.Name:0 "£treasures£ §Y수집된 보물§! £treasures£"
 UniqueAscensionPerksEvents.354.Name:0 "$UniqueAscensionPerksEvents.343.Name$ 준비됨"
 UniqueAscensionPerksEvents.355.Name:0 "$UniqueAscensionPerksEvents.348.Name$ 준비됨"
 UniqueAscensionPerksEvents.356.Desc:0 "$edict_treasures_menu$의 해당 옵션이 준비되었습니다."
 UniqueAscensionPerksEvents.356.Name:0 "$UniqueAscensionPerksEvents.352.Name$ 준비됨"
 UniqueAscensionPerksEvents.357.Desc:0 "기부하고자 하는 제국을 선택해 주십시오. 타락한 제국과는 작동하지 않으며, 선택한 제국이 적대적일수록 £treasures£ §YTreasures§! 기부의 효과는 약해집니다."
 UniqueAscensionPerksEvents.357.Name:0 "£treasures£ §Y보물 기부§! £treasures£"
 UniqueAscensionPerksEvents.358.Desc:0 "§H[CountryTargetForPresent.GetName]§!은/는 §G[ROOT.GetName]§!으로부터의 £treasures£ §Y보물§!을 수령하였습니다. 이러한 선물은 기대하지 않았는데 말입니다. 어찌되었건 당신의 친절한 행동에 대해 감사를 표합니다."
 UniqueAscensionPerksEvents.359.Name:0 "£treasures£ §Y보물 분배§! £treasures£"
 UniqueAscensionPerksEvents.36.Desc:0 "우리는 마침내 정신적 상승 상태를 지속적으로 유지할 수 있는 순간에 접근하고 있으며, 제국 전체의 집중이 실제로 맞았다는 우리의 초기 추측이 명확해지고 있습니다. 우리의 연구 그룹은 계속해서 확장되고 있으며, 그들은 집단적 집중의 다양한 측면에 초점을 맞춘 여러 하위 부서를 형성했습니다. 그들은 오랫동안 목표에 직접적으로 작업하는 것을 §G중단했지만, 그들의 부서의 결합된 작업은 그럼에도 불구하고 동일한 결과를 가져옵니다§!. 사실, 연구 그룹은 §B한 번에 하나의 접근 방식만 작업하는 것이 아니라 다양한 접근 방식을 작업하고 있습니다§!, 그리고 우리는 충분한 시간이 주어진다면 우리 전체 제국도 그것을 달성할 수 있을 것이라고 추정합니다. 이해의 긴 여정의 끝이 다가오고 있으며, 단순히 우주를 조금 더 이해하려는 우리의 초기 겸손한 목표가 §Y$ap_expandable_brain_2$§! 상태를 찾는 것으로 변모했습니다."
 UniqueAscensionPerksEvents.371.Country:0 "Empires"
 UniqueAscensionPerksEvents.371.Crime:0 "£crime_lords£ 범죄 두목 £crime_lords£"
 UniqueAscensionPerksEvents.371.Desc:0 "$edict_underworld_menu$에 접속한 것을 환영합니다. 이곳에서 암흑가의 사람들과 연락할 수 있습니다. 누구를 찾고 있나요? 기억해둬야 할 것은, 이곳에선 대부분의 거래가 £energy£ §Y$energy$§!가 아닌 £treasures£ §Y보물§!을 통해 이루어진다는 것입니다."
 UniqueAscensionPerksEvents.371.Fallen:0 "£fallen£ 몰락 제국 잔당 £fallen£"
 UniqueAscensionPerksEvents.371.Pirate:0 "£pirates£ 해적 £pirates£"
 UniqueAscensionPerksEvents.371.Req01:0 "$TRIGGER_FAIL$이미 밀수업자가 작업중이다. 이런 작업에서는 손이 늘어봐야 뒤통수만 맞을 뿐이야. 이곳이 암흑가라는 걸 잊지 말도록."
 UniqueAscensionPerksEvents.371.Req02:0 "$TRIGGER_FAIL$우린 아직 새로운 노예를 준비하지 못했다."
 UniqueAscensionPerksEvents.371.Req03:0 "$TRIGGER_FAIL$몰락 제국 잔당과 거래하는건 매우 위험한 일이다. 흔적을 지우는 데 적어도 5년은 걸릴 것이다."
 UniqueAscensionPerksEvents.371.Slaver:0 "£slavers£ 노예상 £slavers£"
 UniqueAscensionPerksEvents.371.Smuggler:0 "£smugglers£ 밀수업자 £smugglers£"
 UniqueAscensionPerksEvents.372.Alloys:0 "£alloys£ §Y합금§!에 대한 계약 체결"
 UniqueAscensionPerksEvents.372.Consumers:0 "우리는 £consumer_goods£ §Y$CONSUMER_GOOD$§!에 대한 계약을 체결했습니다."
 UniqueAscensionPerksEvents.372.Desc:0 "§H[Root.GetName]§! 암흑가 밀수업자입니다. 무엇을 도와드릴까요?"
 UniqueAscensionPerksEvents.372.Food:0 "£food£ §Y식량§!에 대한 계약 체결"
 UniqueAscensionPerksEvents.372.Minerals:0 "£minerals£ §Y광물§!에 대한 계약 체결"
 UniqueAscensionPerksEvents.373.Desc:0 "좋습니다. 요청하신 유형의 도난품을 귀하의 영역으로 밀반입해 보겠습니다. 하지만 이것이 실제로 어떤 결과를 가져올지는 보장할 수 없습니다. 거래의 귀하 쪽은 이미 끝났고, 저는 어차피 위험을 감수해야 하니 환불은 기대하지 마십시오. 지역 당국에 붙잡힐 가능성이 항상 조금 있으며, "거래"할 상대를 찾지 못할 수도 있지만, 최선을 다하겠다고 약속드립니다."
 UniqueAscensionPerksEvents.373.Name:0 "£smugglers£ 밀수업자 £smugglers£"
 UniqueAscensionPerksEvents.374.Desc:0 "좋습니다, 요청하신 자원을 안전하게 귀하의 영토로 가져오는 데 성공했습니다. 하지만 제가 가져온 양이 귀하가 예상한 것인지 전혀 알 수 없으며, 제 계약 부분은 완료되었기 때문에 그에 대해 신경 쓰지 않습니다. 제가 가져온 것에 만족하신다면, 원하신다면 또 한 번 거래할 수 있습니다."
 UniqueAscensionPerksEvents.375.Contract:0 "좋아, 내 부하들에게 행성에 더 이상 문제를 일으키지 말라고 지시하도록 하지. 누군가 문제를 일으키려고 한다면 내가 직접 상대하겠어."
 UniqueAscensionPerksEvents.375.Desc:0 "아, 나를 많이 성가셔하는 §H[Root.GetName]§!이 오셨구만. 뭐, 그런건 중요하지 않지. 어쨌든 여기까지 왔다면 거래를 원한다는 소리일테고. 원하는게 뭐지?"
 UniqueAscensionPerksEvents.375.Name:0 "범죄 두목"
 UniqueAscensionPerksEvents.376.Desc:0 "흥미롭군요. 그러니 말해보세요, 당신이 원하는 목표는 누구인가요? 제가 이미 $underworld_crime_contract$를 체결한 제국은 공격하지 않을 것임을 유의하세요. 당신의 눈에 우리는 단지 기회주의적인 범죄자들일지 모르지만, 우리에게도 아직 남아 있는 약간의 명예는 있습니다."
 UniqueAscensionPerksEvents.377.Desc:0 "§R[From.GetName]§! 제국을 공격하기로 했군, 어느 행성을 공격할지 선택하게."
 UniqueAscensionPerksEvents.377.Name:0 "£crime_lords£ 범죄 두목 £crime_lords£"
 UniqueAscensionPerksEvents.378.Desc:0 "내 부하들이 활동을 개시하였네. §R[Root.GetName]§!의 통제 하에 있는 §H[From.GetName]§! 행성에 대해서 말이지. 아래에선 일이 꽤 바쁘게 돌아가고 있을거야."
 UniqueAscensionPerksEvents.379.Contract:0 "좋아 좋아, 내 모든 부하들에게 네 국경에서의 활동을 중지하라고 지시할게, 내 명령에 따르지 않는 자는 즉시 처형될테니 안심하라고."
 UniqueAscensionPerksEvents.379.Desc:0 "그걸 보세요! §H[Root.GetName]§!가 해적 쓰레기인 저와 같은 존재와 거래해야 할 정도로 떨어졌군요... 그럼, 저희가 당신을 위해 무엇을 할 수 있을까요?"
 UniqueAscensionPerksEvents.380.Desc:0 "이제 이야기가 시작됩니다! 그러니 목표가 누구인지 말해 주세요. 단, 저와 $underworld_pirates_contract$를 체결한 다른 제국은 공격하지 않을 것이라는 점을 기억해 주세요. 왜냐하면 이러한 계약은 우리가 돈을 벌 수 있는 가장 쉬운 방법일 것이고, 우리가 그들을 계속 배신한다면 아무도 우리를 고용하지 않을 것이기 때문입니다! 한 제국이 공격을 받으면, 그들은 아마도 우리의 미래 공격에 대비할 것이므로 최소한 §H4 Years§!가 지나기 전까지는 그들에게 제 사람을 보내지 않을 것입니다."
 UniqueAscensionPerksEvents.380.Name:0 "£pirates£ 해적 £pirates£"
 UniqueAscensionPerksEvents.381.Desc:0 "계약서에 서명했으니 안심하라고. 내 부하들이 §R[CountryPirateTarget.GetName]§!을 공격할거야. 우리 함대에 가까이 접근하지마. 실수로 얻어 맞을 수 있으니까."
 UniqueAscensionPerksEvents.383.Desc:0 "우리가 처리 해야 하는 대상을 골라보라구."
 UniqueAscensionPerksEvents.383.Name:0 "£marauders£ 약탈자 £marauders£"
 UniqueAscensionPerksEvents.384.Desc:0 "§Y[From.GetName]§!(을)를 대표해 말하고 있다. 어쩌다가 §H[Root.GetName]§!들이 암흑가에 오게 되었는지는 모르겠찌만, 그런걸 생각할 시간은 없으니 어서 용건이나 말하게."
 UniqueAscensionPerksEvents.384.Req01:0 "$TRIGGER_FAIL$이 약탈자로부터 공격받지 않아야 합니다."
 UniqueAscensionPerksEvents.385.Country.1:0 "§Y이 [countr_1.GetName]입니다.§!"
 UniqueAscensionPerksEvents.385.Country.2:0 "§Y[countr_2.GetName]의§!"
 UniqueAscensionPerksEvents.385.Country.3:0 "§Y[countr_3.GetName]§!"
 UniqueAscensionPerksEvents.385.Country.4:0 "§Y[countr_4.GetName]의 독특한 상승 특성입니다.§!"
 UniqueAscensionPerksEvents.385.Country.5:0 "§Y[countr_5.GetName]의§!"
 UniqueAscensionPerksEvents.385.Country.6:0 "§Y[countr_6.GetName]의§!"
 UniqueAscensionPerksEvents.385.Desc:0 "좋습니다. 이제 서둘러 어떤 제국을 습격할지 알려주십시오."
 UniqueAscensionPerksEvents.386.Desc:0 "우린 §R[FromFrom.GetName]§!의 약탈품이 풍성하기를 바라."
 UniqueAscensionPerksEvents.387.Desc:0 "안좋은 소식이군. §H[Root.GetName]§! 사람들에겐 안좋은 일이지만, 암흑가의 몇몇이 네가 죽기를 바라고 있는 것 같아."
 UniqueAscensionPerksEvents.388.Desc:0 "안녕하세요 §H[Root.GetName]§!! 저희의 영광스러운 노예 시장에 오신 것을 환영합니다. 저희 사냥꾼들은 은하의 다양한 제국에서 노예들을 모아왔으며, 기꺼이 그들 중 일부를 판매해 드릴 수 있습니다. 당신이 꽤 많은 노예가 필요할 것 같으니, 어떤 종의 노예를 받게 될지는 정확히 말씀드릴 수 없지만, 노예는 노예입니다. 어쩌면 당신의 제국 사람들도 그들 중에 있을지도 모릅니다. 그러니, 어떤 행성으로 노예를 배달해 드릴까요?"
 UniqueAscensionPerksEvents.388.Name:0 "£slavers£ 노예상 £slavers£"
 UniqueAscensionPerksEvents.388.Planet.1:0 "§Y[planet_1.GetName].§!"
 UniqueAscensionPerksEvents.388.Planet.2:0 "§Y[planet_2.GetName].§!"
 UniqueAscensionPerksEvents.388.Planet.3:0 "§Y[planet_3.GetName].§!"
 UniqueAscensionPerksEvents.388.Planet.4:0 "§Y[planet_4.GetName].§!"
 UniqueAscensionPerksEvents.388.Planet.5:0 "§Y[planet_5.GetName].§!"
 UniqueAscensionPerksEvents.388.Planet.6:0 "§Y[planet_6.GetName].§!"
 UniqueAscensionPerksEvents.389.Desc:0 "§Y[Root.GetName]§!에서 노예를 몇명이나 구입하시겠습니까? 대금이 지급되면 노예의 수에 비례에 사냥과 포획에 시간이 걸리게 될 것 입니다."
 UniqueAscensionPerksEvents.390.Desc:0 "구입 감사드립니다. 이 노예들은 이제 당신 것입니다."
 UniqueAscensionPerksEvents.391.Desc:0 "안녕하세요, §H[Root.GetName]§! 저는 여러분에게 드릴 말씀이 있습니다. 드디어 대량으로 판매할 수 있는 충분한 노예가 준비되었습니다. 더 필요하시면 언제든지 저희에게 연락해 주세요!"
 UniqueAscensionPerksEvents.392.Desc:0 "우리가 접촉하고 싶은 몰락 제국의 잔당을 선택하십시오."
 UniqueAscensionPerksEvents.393.Desc:0 "저는 §Y[From.GetName]§!의 변절자로, 그들의 지속적인 침체와 일편단심에 불만을 품고 있습니다. 제가 떠날 때 그들의 비밀 중 일부를 가지고 나왔고, 가격을 지불하신다면 여러분과 공유할 수 있습니다. 그들이 우리의 행동을 알아차리기 전에 시간이 많지 않으니 서둘러서 무엇을 원하는지 말씀해 주세요. 거래가 완료되면 최소한 §H5 Years§! 동안은 상호작용을 하지 말아야 위험을 최소화할 수 있습니다. 제가 다시 거래할 준비가 되었을 때 알려드리겠지만, 그들이 그동안 우리의 행동을 알아차리면 여러분의 제국에 발생할 수 있는 일에 대해서는 책임지지 않겠습니다."
 UniqueAscensionPerksEvents.393.Name:0 "£fallen£ 몰락 제국 잔당 £fallen£"
 UniqueAscensionPerksEvents.393.Req01:0 "$TRIGGER_FAIL$몰락 제국 잔당과 거래하는건 매우 위험한 일이다. 흔적을 지우는 데 적어도 5년은 걸릴 것이다."
 UniqueAscensionPerksEvents.393.Transaction:0 "거래해줘서 고맙군, 그럼 이제 빨리 사라져라."
 UniqueAscensionPerksEvents.394.Desc:0 "이봐, §H[Root.GetName]§!!. 이제 안전을 확보했다. 거래할 준비가 되었으니, 필요할 때 연락해라."
 UniqueAscensionPerksEvents.395.Desc:0 "§H[Root.GetName]§!의 국민 여러분, 우리는 여러분이 지하 세계에 숨어 있는 반역자와 접촉을 시도하고 그들이 도망칠 때 가지고 간 일부 데이터를 훔치려 했다는 소식을 방금 들었습니다. 이러한 행동은 더 이상 용납되지 않을 것이며, 다음 번에는 여러분의 입장과 관계없이 그러할 것입니다. 그러므로 이 어리석은 행동을 중단할 것을 권장합니다. 만약 여러분이 보상과 공물로 우리의 £treasures£ §YTreasures§! 중 일부를 선물해 주신다면, 우리는 우리의 분노를 잠시 미룰 의향이 있을지도 모릅니다."
 UniqueAscensionPerksEvents.395.Name:0 "§H[CountryTargetForPresent.GetName]§!으로 부터의 통신"
 UniqueAscensionPerksEvents.4.Desc:0 "우리 우주 공학자들은 우리의 적들로부터 성계를 지켜줄 §G항성 성채§! 건설을 성공적으로 마무리지었습니다."
 UniqueAscensionPerksEvents.4.Name:0 "우주 공학 프로젝트: §G성공§!"
 UniqueAscensionPerksEvents.401.Desc:0 "우리가 지난 번 동안 배운 지식을 어떻게 활용 할지 선택할 때가 왔습니다."
 UniqueAscensionPerksEvents.401.Name:0 "승천 특전 학습"
 UniqueAscensionPerksEvents.402.Desc:0 "$SLOW_LEARNER_ARMY$을 완료했으며, 느린 속도로 퇴역 군인을 모집할 수 있는 가능성이 생겼습니다."
 UniqueAscensionPerksEvents.4020.Name:0 "$PLANETARY_PROJECT_0$ §G성공§!"
 UniqueAscensionPerksEvents.4021.Name:0 "$PLANETARY_PROJECT_0a$ §G성공§!"
 UniqueAscensionPerksEvents.4025.Desc:0 "바로 이겁니다. 우리는 §G[This.GetName]§!(을)를 조작하여 행성의 매장지 및 행성 특성을 완전히 변경했습니다."
 UniqueAscensionPerksEvents.4025.Name:0 "§G[This.GetName]§! 조작 완료"
 UniqueAscensionPerksEvents.4030.Name:0 "$PLANETARY_PROJECT_100a$ §G성공§!"
 UniqueAscensionPerksEvents.4031.Name:0 "$PLANETARY_PROJECT_100b$ §G성공§!"
 UniqueAscensionPerksEvents.4032.Name:0 "$PLANETARY_PROJECT_100c$ §G성공§!"
 UniqueAscensionPerksEvents.4033.Name:0 "$PLANETARY_PROJECT_100d$ §G성공§!"
 UniqueAscensionPerksEvents.4034.Name:0 "$PLANETARY_PROJECT_100e$ §G성공§!"
 UniqueAscensionPerksEvents.4035.Name:0 "$PLANETARY_PROJECT_100f$ §G성공§!"
 UniqueAscensionPerksEvents.4089.Desc:0 "우리 행성인 §H[Root.GetName]§!에 거주하는 이들에게 영향력을 끼치는 작업이 완료되었습니다. 국민들은 이제 다음 과정을 위해 재정비할 시간이 필요할 것입니다."
 UniqueAscensionPerksEvents.4090.Desc:0 "우리는 §H[Root.GetName]§!가 또 다른 §Y$decision_ethic_shift$§!을(를) 준비하고 있다는 보고를 받았습니다."
 UniqueAscensionPerksEvents.4090.Name:0 "§H[Root.GetName]§!에서 §Y$decision_ethic_shift$§! 실행 준비"
 UniqueAscensionPerksEvents.411.Desc:0 "우리 과학자들이 마침내 §Y$tr_harmony_utopian_dream$§!을 달성할 수 있게 해줄 $SPECIAL_PROJECT_TOOLTIP$을 완료했습니다. 문제는 우리의 한 지도자가 준비가 되기 전에 논의하고 싶은 사항이 있다는 것입니다. \n그들은 §Y[capital_planet.GetName]§!이 §Y$pc_gaia$§!이 되어야 한다고 주장합니다. 이는 우리의 새로운 친구들이 최상의 조건에서 거주할 수 있도록 하기 위함입니다. 만약 이미 그렇게 되어 있다면, 처음으로 우려를 표명한 지도자를 찾아 그들이 기억 장애를 겪고 있지 않은지 확인해야 할 것입니다. 그렇지 않다면 우리는 아마도 테라포밍을 시작해야 할 것입니다. 그렇다면 우리는 무엇을 해야 할까요?"
 UniqueAscensionPerksEvents.411.Name:0 "$tr_harmony_utopian_dream$ 성취된"
 UniqueAscensionPerksEvents.431.Name:0 "§Y[From.GetName]§!: 전략 자원 발견됨"
 UniqueAscensionPerksEvents.431.anti_matter:0 "[From.GetName] 조사 중, [Root.GetName]은/는 이전에 알려지지 않은 §H반물질§!이라는 전략 자원을 발견했습니다. 고에너지 전환을 통해서만 사용할 수 있는 이 물질은 산업적으로 이용 될 수 있습니다."
 UniqueAscensionPerksEvents.431.anti_matter.tooltip:0 "§Y$anti_matter$§!\n§E$anti_matter_desc$§!"
 UniqueAscensionPerksEvents.431.has_tech:0 "\n우리는 기술을 보유하고 있습니다. - 만약 이 성계를 우리가 통제하고 있다면 자원 추출이 가능합니다."
 UniqueAscensionPerksEvents.431.no_tech:0 "\n우리는 아직 이 자원을 추출 할 수단이 없지만, 미래를 위해 이 성계의 통제권을 획득하는 것을 진지하게 고려해야 합니다."
 UniqueAscensionPerksEvents.433.Desc:0 "우리는 §H[Root.GetName]§!에서 새로운 §Y화이트 홀§!을 발견했습니다. 더 많은 £anti_matter£ §H반물질§!을 추출할 수 있을 것 입니다."
 UniqueAscensionPerksEvents.433.Name:0 "새로운 화이트 홀 발견됨"
 UniqueAscensionPerksEvents.434.Dark:0 "£sr_dark_matter£ 암흑 물질 생산 £sr_dark_matter£"
 UniqueAscensionPerksEvents.434.Desc:0 "£anti_matter£ §H반물질§!을 어떻게 이용하시겠습니까?"
