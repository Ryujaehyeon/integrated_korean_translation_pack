 domesticated_drones_tooltip_2:0 "그들의 §G$TRIGGER_HOME_PLANET$§!은 광물 £minerals£, 공학 연구 $ENGINEERING_RESEARCH$ £engineering£, 합금 £alloys£ 및 생명 금속 $sr_living_metal$ £sr_living_metal£을 생성할 수 있습니다."
