 tech_civilian_aux_district_1:0 "보조 공장 - 기본형"
 tech_civilian_aux_district_1_desc:0 "$civilian_factory$과 $civilian_industrial_ship$에 기본 자원인 에너지, 광물, 식량을 생산할 수 있는 장비를 추가합니다."
 tech_civilian_aux_district_2:0 "보조 공장 - 공업 특화"
 tech_civilian_aux_district_2_desc:0 "$civilian_factory$와 $civilian_industrial_ship$에서 고급 자원인 $CONSUMER_GOOD$, 합금 및 통합성을 생산하는 보조 부품을 잠금 해제합니다."
 tech_civilian_aux_district_3:0 "보조 공장 - 연구 특화"
 tech_civilian_aux_district_3_desc:0 "$civilian_factory$과 $civilian_industrial_ship$에 연구를 생산할 수 있는 장비를 추가합니다."
 tech_cortana_advanced:0 "코타나 - 진보된 결정"
 tech_cortana_advanced_desc:0 "코타나가 연구 기술에 대한 주도적 결정을 내릴 수 있는 빈도 수와 기술 연구 도움 빈도 수를 늘립니다."
 tech_cortana_help:0 "코타나 - 연구 보조"
 tech_cortana_help_desc:0 "코타나는 기술 연구를 더욱 빨리 끝내기 위한 도움을 줄 수 있습니다."
 tech_cortana_initiatives:0 "코타나 - 자율 계획 활성화"
 tech_cortana_initiatives_desc:0 "코타나는 에너지가 없어도 스스로 주도적으로 연구하며, 반복 기술 또한 연구할 것 입니다."
 tech_cortana_optimized:0 "코타나 - 에너지 사용 최적화"
 tech_cortana_optimized_desc:0 "코타나 활성화에 필요한 £energy£ $energy$를 §Y1000§! 감소시킵니다."
 tech_cortana_perfect:0 "코타나 - 완벽한 분별"
 tech_cortana_perfect_desc:0 "코타나의 주도적 연구 계획을 2배로 늘립니다. 이는 우리에게 훨씬 유용할 것 입니다."
 tech_dangerous_systems:0 "위험 성계 위치 탐색"
 tech_dangerous_systems_desc:0 "숨겨진 성계를 발견할 수 있는 가능성을 허용합니다."
 tech_deep_scanner:0 "$ap_deep_scanner$"
 tech_deep_scanner_desc:0 "일단 이 건물이 행성에 건설되면 근처의 천체에서 이상 현상을 발견할 수 있는 가능성이 생기며, 건물이 많을 수록 탐지 범위가 더 넓어집니다."
 tech_defense_sentinels_1:0 "더 많은 $ap_defense_sentinels$ I"
 tech_defense_sentinels_1_desc:0 "우리 영토에서 $ap_defense_sentinels$ 순찰의 최대 수를 증가시킵니다."
 tech_defense_sentinels_2:0 "더 많은 $ap_defense_sentinels$ II"
 tech_defense_sentinels_2_desc:0 "$tech_defense_sentinels_1_desc$"
 tech_defense_sentinels_3:0 "더 많은 $ap_defense_sentinels$ III"
 tech_defense_sentinels_3_desc:0 "$tech_defense_sentinels_1_desc$"
 tech_energy_producing:0 "비밀: 에너지 $PRODUCTION$"
 tech_energy_producing_desc:0 "$ap_mega_hive_mind$의 에너지 생산에 관한 비밀을 밝혀냅니다."
 tech_expandable_brain_1:0 "한계 깨기"
 tech_expandable_brain_1_desc:0 "우리는 '정신적 상승'의 기간을 연장할 방법을 찾으려고 노력할 것이며, 동시에 우리의 모든 인구가 우리의 발전으로부터 혜택을 받을 수 있도록 새로운 교육 및 수정 프로그램을 개발할 것입니다. 새로운 의식 수준을 활용하여 기술 세트를 급격히 향상시키고 심지어 환상적인 업적을 달성할 수 있는 정신 능력을 개발한 개인에 대한 믿기 힘든 보고가 몇 건 확인되었습니다. '정신적 상승'의 간격을 확장함에 따라 이러한 보고의 수가 증가할 것으로 예상할 수 있습니다. 만약 제대로 개발된다면, 이는 전체 인구에게 매우 유익할 수 있으며, 가까운 미래에 이러한 혜택을 가진 지도자를 지향하는 이들을 발견할 수도 있습니다."
 tech_expandable_brain_2:0 "의식 너머"
 tech_expandable_brain_2_desc:0 "우리는 상승된 기술을 함께 사용하는 그룹이 작업이나 목표에 집단적으로 '집중'할 수 있다는 것을 발견했습니다. 이를 통해 그들은 자신의 기술을 보완하고 집중하는 다양한 측면에 일시적으로 전문화할 수 있습니다. 우리는 정신적 상승 상태에서 보낼 수 있는 시간을 확장하는 데 집단적으로 집중할 여러 그룹을 만들었으며, 우리의 리더와 협력하여 그들의 성과를 향상시키는 데 전문화하려는 다른 그룹도 있습니다. 선택된 많은 연구 그룹은 곧 지속적인 상승 상태에 도달할 수 있을 것이라고 확신하고 있으며, 개인이 실패하더라도 항상 집단적인 집중을 유지하기 위해 전문화된 일정을 개발했습니다. 제국 전역의 여러 독립 그룹은 자신의 시도에서 얻은 데이터를 반주기적으로 우리에게 전송하여 우리의 연구를 더욱 가속화하고 있습니다."
