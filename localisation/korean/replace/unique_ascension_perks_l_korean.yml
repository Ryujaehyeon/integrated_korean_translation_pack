 decision_self_aware_colony_to_normal_tooltip:0 "행성을 일반 상태로 되돌려, §Y$ap_self_aware_colony$§! 기능을 삭제하고 플레이어가 다시 건물과 지구를 건설할 수 있도록 허용합니다. §R§Y$ap_self_aware_colony$§!에 의해 생성된 모든 인공 매장지는 사라질 것입니다.§!"
 decision_self_aware_colony_tooltip:0 "행성을 §Y$ap_self_aware_colony$§!로 변환합니다. 완료되면 행성은 인공 자원을 자동으로 건설하여 건물과 구역의 역할을 수행합니다. 이들에 대한 제한은 없으며, 플레이어는 식민지를 직접 관리할 필요가 없고 선택받은 사회에 따라 스스로 발전하도록 둘 수 있습니다. 작업을 수행하려면 재고에 최소 §Y1000§! £minerals£가 필요하며 §R프로세스가 완료되면 현재의 모든 건물과 구역이 파괴되며, 기능이 비활성화될 때까지 새로운 건물을 건설할 수 없습니다.§!"
