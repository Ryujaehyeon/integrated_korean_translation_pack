 ap_adv_colonisation:0 "원대한 식민화"
 ap_adv_colonisation_desc:0 "우리의 전문가들은 새로운 식민지를 인상적인 속도로 개발할 수 있는 방법을 마침내 찾아냈습니다. 비용과 시간을 들여 엄청난 양의 정착민, 자원, 자재를 들여와 즉시 행성을 변화시켜 나갈 수 있도록 하는 것 입니다. 그 결과 식민지는 인구밀도가 높아지고 활동성이 커질 것 입니다."
 ap_adv_colonisation_req_1:0 "$TRIGGER_FAIL$£physics£ §Y$tech_cryostasis_2$§! 기술을 필요로 합니다."
 ap_adv_colonisation_req_2:0 "$TRIGGER_FAIL$£society£ §Y$tech_colonization_5$§! 기술 또는 §Y$auth_machine_intelligence$§! 정부 체제를 필요로 합니다."
 requires_expansion_tradition:0 "$TRIGGER_FAIL$은(는) §Y$tr_expansion_finish$§!이(가) 필요합니다."
 ap_adv_colonisation_tooltip:0 "\n§H기능 잠금 해제:§! 고급 식민지 개척\n새로 설립된 식민지는 더 많은 팝과 이미 운영 중인 고급 건물로 시작하지만, 행성을 식민지화하는 데 더 긴 지연이 발생합니다. 이들은 건설 속도가 증가하고 주거지와 일자리가 더 많은 일시적인 보너스 $adv_colonisation_temporal_job$를 가지며, $trait_machine_unit$/$trait_robotic_3$가 있을 경우 $building_machine_assembly_plant$를 자동으로 건설합니다; 일반 제국일 경우 $building_medical_2$를, $trait_hive_mind$가 있을 경우 $building_spawning_pool$과 $building_offspring_nest$를 건설합니다.\n§R사용 가능한 모든 식민지선이 파괴되고 새로운 버전으로 교체됩니다!§!"
 ap_advanced_government_1:0 "인구 영향력"
 ap_advanced_government_1_desc:0 "우리 국경 안에 거주 한다는 사실은 우리 인구의 생활 양식에 큰 영향을 미칠 것 입니다. 최근에 정복되어 우리의 윤리와 완전히 대비되는 생각을 가진 이들에게도 마찬가지 입니다. 머지 않은 미래에 그들은 우리의 관점을 따르게 될 것 입니다."
 ap_advanced_government_1_req_1:0 "$TRIGGER_FAIL$§Y$ap_one_vision$§! 승천 특전을 필요로 합니다."
 ap_advanced_government_1_req_2:0 "$TRIGGER_FAIL$£society£ §Y$tech_colonial_centralization$§! 기술을 필요로 합니다."
 ap_advanced_government_1_req_3:0 "$TRIGGER_FAIL$£engineering£ §Y$tech_housing_1$§! 기술을 필요로 합니다."
 ap_advanced_government_1_tooltip:0 "\n§H기능 잠금 해제:§! 하나의 정당.\n시간이 지남에 따라 모든 인구의 윤리관이 통치 윤리관으로 변화할 것입니다.\n\n§H결정 잠금 해제:§! $decision_ethic_shift$. \n$decision_ethic_shift_tooltip$\n\n"
 ap_advanced_government_2:0 "국가에 대한 맹신"
 ap_advanced_government_2_desc:0 "우리는 우리 국민의 장래를 짊어지고 있으며 어떤 경우에도 그들이 무너지는 것을 용납하지 않을 것 입니다. 우리의 영역은 서로 결속되어 있고 우리가 단합되어 있는 한 어떤 것도 우리를 방해하지 못할 것 입니다. 국가에 대한 맹목적 믿음이 지배할 것이며 우리의 적들은 무너질 것 입니다."
 ap_advanced_government_2_req_1:0 "$TRIGGER_FAIL$§Y$ap_advanced_government_1$§! 승천 특전 또는 §Y$ethic_gestalt_consciousness$§! 윤리관을 필요로 합니다."
 ap_advanced_government_2_req_2:0 "$TRIGGER_FAIL$£society£ §Y$tech_galactic_administration$§! 기술을 필요로 합니다."
 ap_advanced_government_2_req_3:0 "$TRIGGER_FAIL$£engineering£ §Y$tech_housing_2$§! 기술을 필요로 합니다."
 ap_advanced_government_2_req_4:0 "$TRIGGER_FAIL$£society£ §Y$tech_ascension_theory$§! 기술을 필요로 합니다."
 ap_advanced_government_2_tooltip:0 "\n§H거대 구조물 잠금 해제:§! 유토피아 \n\n§H기능 잠금 해제:§! 통합에 대한 신뢰. \n윤리관에 따라 서로 다른 방법으로 £unity£ 통합력을 모으는 수단을 추가합니다."
 ap_advanced_security:0 "보안 타격대"
 ap_advanced_security_desc:0 "우리 영역에선 어떤 범죄나 일탈, 우주 해적도 우리의 자원을 강탈 할 기회가 주어지지 않을 것 입니다. 그리고 만약 해적들이 우리 영토로 진입한다면 특별 기동대가 그들을 진압할 것 입니다."
 ap_advanced_security_tooltip_1:0 "\n§H기능 잠금 해제:§! 우주 보안 순찰대 \n만약 해적들이 우리 국경에서 자원들을 강탈한다면 우리 주력 함대를 만나기 전에 보안 순찰대와 맞닥뜨리게 될 것 입니다.\n\n"
 ap_advanced_security_tooltip_2:0 "§H기능 잠금 해제:§! 행성 예방 타격\n우리 $ap_advanced_security$는 범죄율이나 일탈율이 높은 행성에 예방 타격을 가하여 주요 범죄자를 체포하고 자산과 무기를 압수하며 때로는 행성에 존재하는 전체 범죄 조직을 해체합니다.\n\n§H법령 잠금 해제:§! $edict_science_ship_escort$."
 ap_aggressive_hivemind:0 "공격적인 군단"
 ap_aggressive_hivemind_desc:0 "우리는 더 이상 무리 속에 숨지 않습니다. 우리는 적에게 우리의 힘과 전쟁 능력을 보여줄 것 입니다. 우리 군체 의식의 힘은 그 무엇도 남지 않을 때 까지 그들을 칠 것 입니다."
 ap_aggressive_hivemind_req_1:0 "$TRIGGER_FAIL$§Y$ap_super_hive_mind$§! 승천 특전을 필요로 합니다."
 ap_aggressive_hivemind_req_2:0 "$TRIGGER_FAIL$§Y$ap_interstellar_dominion$§! 승천 특전을 필요로 합니다."
 ap_aggressive_hivemind_req_3:0 "$TRIGGER_FAIL$£engineering£ §Y$tech_battleships$§! 기술을 필요로 합니다."
 ap_aggressive_hivemind_req_4:0 "$TRIGGER_FAIL$£engineering£ §Y$tech_starbase_5$§! 기술을 필요로 합니다."
 ap_aggressive_hivemind_tooltip:0 "\n§H기능 잠금 해제:§! 함선 침입 \n적 함선을 파괴할 때마다 확률적으로 그 함선이 우리 군체 의식의 힘에 감염됩니다. 감염된 함선은 우리의 수리되어 것이 됩니다."
 ap_ai_cortana:0 "코타나 기술 연구원"
 ap_ai_cortana_desc:0 "코타나는 여러분들이 다른 이들보다 훨씬 더 빨리 새로운 기술들을 찾을 수 있도록 해주는 제 4의 기술 연구원 역할을 할 것 입니다."
 ap_ai_cortana_req_1:0 "$TRIGGER_FAIL$£physics£ §Y$tech_administrative_ai$§! 기술을 필요로 합니다."
 ap_ai_cortana_req_2:0 "$TRIGGER_FAIL$적어도 §Y40000§! £energy£ §Y$energy$§!가 필요합니다."
 ap_ai_cortana_tooltip:0 "\n§H기능 잠금 해제:§! §YCortana§!\nCortana는 귀하의 제국의 4번째 연구 부서장으로 활동할 AI로, 에너지 £energy£를 대가로 하여 더 많은 기술을 연구할 수 있게 해줍니다. 그녀는 또한 적절히 개발되면 주도권을 잡고 반복 가능한 기술을 연구할 수 있으며, 다른 부서장들이 연구 프로젝트를 더 빠르게 완료하는 데 도움을 줄 것입니다.\n\n§H칙령 잠금 해제:§! $edict_active_cortana_ai$\n\nCortana와 관련된 모든 기술을 연구하면 특별한 §Y유물§!도 잠금 해제됩니다."
 ap_anomalies_mod_compatibility:0 "\n§H이것은 §Y다이나믹 갤럭시 - 이상 현상 재생성기 및 새로운 이상 현상§! 모드를 포함하여 상승 특성의 잠재력을 완전히 활용하기 위함입니다.§!\n"
 ap_antimatter:0 "영원의 빛"
 ap_antimatter_desc:0 "고대 문명이 무제한에 가까운 에너지를 생산할 수 있는 희귀 물질을 이용했다는 전설이 있습니다. 우리는 이 이야기를 전설이나 동화가 아닌 현실로 바꿀 것 입니다."
 ap_antimatter_tooltip:0 "\n§H기능 잠금 해제:§! 반물질 수집 \n$anti_matter_desc$. \n\n§H시행령 잠금 해제:§! $edict_anti_matter_menu$."
 ap_artifact_hunter:0 "고고학 전문가"
 ap_artifact_hunter_desc:0 "누군가에게는 이상 현상이 가득한 천체가 쓸모 없을 수도 있습니다. 하지만 적어도 우리에겐 아닙니다. 고대 사원과 발굴지가 큰 가치가 있다는 사실을 우리는 이해 할 수 있으니까요. 전문가들은 고대 문명이 이러한 작품들을 한개만 만들었을 것이라 생각하지 않습니다. 여러 작품을 은하계 전체에 분산시켰다고 가정하는 것이 합리적이지요."
 ap_artifact_hunter_req_1:0 "$TRIGGER_FAIL$§Y$ap_deep_scanner$§! 승천 특전을 필요로 합니다."
 ap_artifact_hunter_req_2:0 "$TRIGGER_FAIL$ £physics£ §Y$tech_combat_computers_3$§! 기술이 필요합니다."
 ap_artifact_hunter_req_3:0 "$TRIGGER_FAIL$£physics£ §Y$tech_sensors_3$§! 기술을 필요로 합니다."
 ap_artifact_hunter_req_4:0 "$TRIGGER_FAIL$£physics£ §Y$tech_combat_computers_2$§! 기술을 필요로 합니다."
 ap_artifact_hunter_tooltip:0 "\n§H기능 잠금 해제:§! 유물 사냥꾼\n우주 심층 스캐너를 사용하여 행성 범위 내에서 새로운 고고학 유적지와 가능한 $pop_cat_precursor$ 통찰력을 발견할 수 있게 됩니다. 탐지는 이전과 동일한 규칙을 따르며, 이는 행성체가 심층 스캐너의 범위 내에 있고 귀하의 경계 안에 있어야 함을 의미합니다.$perk_more_content_in_future$"
 perk_branch_building_slots:0 "\n\n§R기본 Stellaris에서는 불행히도 §Y4 개의 지사 사무소 건물 슬롯§! 이상을 허용하지 않습니다. 그 이상을 원하신다면 §Y36 건물 슬롯§! 또는 §YUI 오버홀 다이나믹§! 또는 §Y더 큰 행성 보기§!와 같은 모드를 사용하여 게임 내에서 적절한 시각적 표현을 얻어야 합니다.§!\n\n"
 perk_building_slots:0 "\n\n§R기본 Stellaris에서는 불행히도 §Y16 건물 슬롯§! 이상을 가질 수 없습니다. 그 이상을 원하신다면 §Y36 건물 슬롯§!과 §YUI 오버홀 1080p & 1440p§! 또는 §Y더 큰 행성 보기§!와 같은 모드를 사용하여 게임 내에서 적절한 시각적 표현을 해야 합니다.§!\n\n"
 ap_chosen_ruler:0 "선택 받은 통치자"
 ap_chosen_ruler_desc:0 "우리의 통치자는 의회나 다른 간섭 없이 제국 전역의 정책에 자신의 목표를 강요할 만큼 충분한 영향력을 얻었습니다. 결국, 전체 국가를 대표하는 개인이 그들이 통치하는 국가를 자신의 지혜로 이끌 수 있는 권한을 갖는 것은 당연한 일입니다."
 ap_chosen_ruler_req_1:0 "$TRIGGER_FAIL$§Y$tr_domination_finish$§!이(가) 필요합니다."
 ap_chosen_ruler_tooltip:0 "\n§H정책 잠금 해제:§! $ap_chosen_ruler$ 정책\n\n§H특징 잠금 해제:§! 숙련 통치자\n당신의 통치자는 빠르게 최대 레벨에 도달하며, 레벨 10에 도달하면 당신의 제국의 작은 문제들인 높은 §RCrime§! £crime£, 낮은 §YStability§! £stability£, 없는 §BHousing§! £housing£, 낮은 §HAmenities§! £amenities£ £amenities_no_happiness£, 그리고 높은 §RUnemployment§! 문제를 자원과 교환하여 처리할 수 있는 가능성이 생깁니다."
 ap_civilian_activities:0 "우주 산업화"
 ap_civilian_activities_desc:0 "우리는 우리 제국을 구성하는 모든 시민들을 동원하는 것이 우리 노동력의 잠재력을 최대로 발휘하고 적들에 대항하여 큰 이점을 주는 일이라 믿고 있습니다."
 ap_civilian_activities_req_1:0 "$TRIGGER_FAIL$ £physics£ §Y$tech_cold_fusion_power$§! 기술이 필요합니다."
 ap_civilian_activities_req_2:0 "$TRIGGER_FAIL$ £physics£ §Y$tech_hyper_drive_2$§! 기술이 필요합니다."
 ap_civilian_activities_tooltip:0 "§H함선 유형 잠금 해제:§! $civilian_factory$ \n이 특수한 민간 선박들은 자원을 생산할 수 있는 가능성을 가졌지만, 함대 수용력에 따라 그 수가 제한됩니다. 처음에는 £energy£ £minerals£ £food£과 같은 기본적인 자원만을 생산하지만, 추가 기술을 연구함으로써 £consumer_goods£ £alloys£ £unity£ £physics£ £society£ £engineering£ 또한 생산할 수 있게 됩니다. 또한 £engineering£ §Y$tech_mega_engineering$§!을 연구하면 자원 생산에 초점을 맞춘 더욱 큰 선박을 건조할 수 있는 다른 기술을 발견할 수 있을 것 입니다.\n\n§H기능 잠금 해제:§! 민간 우주 사업\n민간인들이 자원이나 사람의 운송과 민간 연구 등의 우주 사업을 개시할 수 있도록 허가하며, 이에 세금을 매겨 이익을 얻을 수 있습니다."
 ap_connected_hivemind:0 "확산 의지"
 ap_connected_hivemind_desc:0 "우리는 은하계에 존재하는 모든 유기체 개인에게 우리의 의지를 전파할 기회를 가지고 있습니다. 모든 문명을 정복함으로써 우리는 그들을 우리 군체 의식의 드론으로 변화 시킬 수 있을 것이고, 가장 강력한 의식의 일부가 될 것 입니다."
 ap_connected_hivemind_req_1:0 "$TRIGGER_FAIL$§Y$ap_super_hive_mind$§! 승천 특전을 필요로 합니다."
 ap_connected_hivemind_tooltip:0 "\n§H기능 잠금 해제:§! 군체 의식 동화 \n군체 의식의 일부가 아닌 모든 유기체는 동화 되어 우리의 드론이 될 것 입니다."
 ap_dark_galaxy_web:0 "다크 갤럭시 웹"
 ap_dark_galaxy_web_desc:0 "정치적 불안정성을 초래하지 않으며 불법적인 것에 손을 대려면, 이곳에 접속하는 것입니다. 이곳에 모든 것이 있습니다. 자원, 군대, 노예, 함선, 금지된 기술까지도요. 그러나 이곳의 해커들에게 우리가 노출되는 것은 위험하기에, 우린 반드시 적절한 보안을 갖출 필요가 있습니다."
 ap_dark_galaxy_web_req_1:0 "$TRIGGER_FAIL$£physics£ §Y$tech_administrative_ai$§! 기술을 필요로 합니다."
 ap_dark_galaxy_web_req_2:0 "$TRIGGER_FAIL$£physics£ §Y$tech_sensors_2$§! 기술을 필요로 합니다."
 ap_dark_galaxy_web_req_3:0 "$TRIGGER_FAIL$£physics£ §Y$tech_power_plant_2$§! 기술을 필요로 합니다."
 ap_dark_galaxy_web_req_4:0 "$TRIGGER_FAIL$£society£ §Y$tech_ground_defense_planning$§! 기술을 필요로 합니다."
 ap_dark_galaxy_web_tooltip:0 "\n§H기능 잠금 해제:§! $ap_dark_galaxy_web$ 접근\n누구에게도 규칙이 강요되지 않는 은하 웹의 장소로, 거의 모든 것을 찾을 수 있는 가능성이 있지만 해커로부터 생존하기 위해 좋은 보안 방화벽을 갖추는 것이 중요합니다.\n§H정책 잠금 해제:§! $policy_dark_galaxy_web_security_finance$.\n\n§H법령 잠금 해제:§! $edict_dark_galaxy_web_menu$."
 ap_deep_scanner:0 "심우주 스캐너"
 ap_deep_scanner_desc:0 "은하계에 존재하는 수 많은 별들의 진정한 귀중함을 과학선의 조사 한 번으로 모두 알아낼 수 있을리가 없습니다. 많은 과학자들과 물리학자는 훨씬 더 향상된 정확도를 가진 심우주 스캐너를 이용해 우리 국경에 존재하는 행성들의 가치를 상세히 알아야 한다고 주장하고 있습니다."
 ap_deep_scanner_req_1:0 "$TRIGGER_FAIL$ £physics£ §Y$tech_cryostasis_2$§! 기술이 필요합니다."
 ap_deep_scanner_req_2:0 "$TRIGGER_FAIL$£physics£ §Y$tech_automated_exploration$§! 기술을 필요로 합니다."
 ap_deep_scanner_req_3:0 "$TRIGGER_FAIL$£physics£ §Y$tech_sensors_2$§! 기술을 필요로 합니다."
 ap_deep_scanner_req_4:0 "$TRIGGER_FAIL$£physics£ §Y$tech_combat_computers_1$§! 기술을 필요로 합니다."
 ap_deep_scanner_tooltip:0 "\n§H건물 잠금 해제:§! $building_deep_space_scanner$.\n$tech_deep_scanner_desc$\n\n§H결정 잠금 해제:§! $decision_deep_scanner$.\n$decision_deep_scanner_tooltip$ $ap_anomalies_mod_compatibility$ $perk_more_content_in_future$"
 ap_defense_sentinels:0 "수호 감시자"
 ap_defense_sentinels_desc:0 "우리 영토의 방어를 해군에만 의존할 수 없으며, 해군이 부재할 때도 작동할 수 있는 독립적인 방어망을 구축해야 합니다. 이것이 바로 제국 영토 위협으로부터 우리를 보호할 수 있을 만큼 강인한 특별 방어군을 구축할 이유입니다. 위기 상황에서 해군이 재편성할 충분한 시간을 제공해야 합니다. '$ap_defense_sentinels$'는 오로지 이 목적을 위해 구축되었으며, 해군이 실패하는 곳에서 우리 제국을 보호해야 합니다."
 ap_defense_sentinels_req_1:0 "$TRIGGER_FAIL$£physics£ §Y$tech_administrative_ai$§! 기술을 필요로 합니다."
 ap_defense_sentinels_req_2:0 "$TRIGGER_FAIL$£engineering£ §Y$tech_robomodding_m$§! 기술을 필요로 합니다."
 ap_defense_sentinels_req_3:0 "$TRIGGER_FAIL$£engineering£ §Y$tech_ship_armor_3$§! 기술을 필요로 합니다."
 ap_defense_sentinels_req_4:0 "$TRIGGER_FAIL$£physics£ §Y$tech_shields_3$§! 기술을 필요로 합니다."
 ap_defense_sentinels_req_5:0 "$TRIGGER_FAIL$£physics£ §Y$tech_plasma_2$§! 기술을 필요로 합니다."
 ap_defense_sentinels_req_6:0 "$TRIGGER_FAIL$£physics£ §Y$tech_lasers_2$§! 기술을 필요로 합니다."
 ap_defense_sentinels_tooltip:0 "§H기능 잠금 해제:§! $ap_defense_sentinels$\n센티넬은 우리의 영토를 순찰하며 국경에 너무 가까이 접근하는 모든 종류의 위협으로부터 방어하기 위해 자동화된 함선입니다. $ap_subject_compatibility$"
 ap_district_ui_compatibility:0 "\n\n§R바닐라 스텔라리스의 경우 §Y지구가 4개§!로 제한됩니다. 이 모드에서 적절한 시각적 효과를 얻기 위해서는 §YUI Overhaul 1080p & 1440p§! 또는 §YBigger Planet View§!과 같은 모드를 사용해야 할 것 입니다.§!\n\n"
 ap_economic_prospertity:0 "경제 번영"
 ap_economic_prospertity_desc:0 "강력한 경제력 없이는 어떤 제국도 은하를 지배할 수 없습니다. 군대, 함선, 병사 모든 것에 돈의 힘이 미칩니다. 돈으로 행복을 살 수는 없겠지만 가난으로는 아무 것도 살 수 없습니다."
 ap_economic_prospertity_req_1:0 "$TRIGGER_FAIL$§Y$tr_prosperity_finish$§!이 필요합니다."
 ap_economic_prospertity_req_2:0 "$TRIGGER_FAIL$£society£ §Y$tech_galactic_markets$§! 기술 또는 §Y$auth_corporate$§! 정부 체제를 필요로 합니다."
 ap_economic_prospertity_req_4:0 "$TRIGGER_FAIL$'윤리 및 시민권: 버그 브랜치' 모드와 호환되지 않습니다."
 ap_economic_prospertity_tooltip:0 "\n§H정책 잠금 해제:§! §Y개선된 무역§! $ap_no_trade_policy$"
 ap_emergency_calculation:0 "긴급 계산"
 ap_emergency_calculation_desc:0 "때로는 후퇴를 고려하는 것이 명예로울 수도 있습니다. 우리는 어떤 대가를 치뤄서라도 우리 함선과 선원들의 생존을 보장해야 합니다. 이 전략은 적보다 전쟁 피로도를 훨씬 적게 느끼는 이점을 줄 수 있을 것 입니다."
 ap_emergency_calculation_req_1:0 "$TRIGGER_FAIL$£physics£ §Y$tech_zero_point_power$§! 기술을 필요로 합니다."
 ap_emergency_calculation_req_2:0 "$TRIGGER_FAIL$£physics£ §Y$tech_hyper_drive_3$§! 기술을 필요로 합니다."
 ap_emergency_calculation_req_3:0 "$TRIGGER_FAIL$£engineering£ §Y$tech_thrusters_4$§! 기술을 필요로 합니다."
 ap_emergency_calculation_req_4:0 "$TRIGGER_FAIL$ £physics£ §Y$tech_combat_computers_3$§! 또는 §Y$tech_combat_computers_autonomous$§! 또는 £society£ §Y$tech_precognition_interface$§! 기술이 필요합니다."
 ap_emergency_calculation_req_5:0 "$TRIGGER_FAIL$§Y$pc_black_hole$§!, §Y$pc_neutron_star$§! 또는 §Y$pc_pulsar$§! 항성계가 필요합니다."
 ap_emergency_calculation_tooltip:0 "\n§H초거대 구조물 잠금 해제:§! $lgate_disabled$"
 ap_eternal_vigilance_tooltip:0 "\n§H기능 잠금 해제:§! 영원한 경계 \n이 기능은 공학자들이 당신의 국경 내에 존재하는 모든 군사 시설이 없는 성계에 군사 방어 플랫폼을 개발하고 만들 수 있게 해줄 것 입니다. 각 식민지는 필요 기술을 연구할 시 이온 포에 의해 방어될 것 입니다."
 ap_executive_vigor_tooltip:0 "\n§H기능 잠금 해제:§! 시민 적응\n$SPECIAL_PROJECT_TOOLTIP$이(가) §Y5 년§! 내에 완료되면 새로운 시민 슬롯이 제공되며, §Y15 년§!과 §Y30 년§!에 각각 2개의 추가 시민 슬롯이 잠금 해제됩니다."
 ap_expandable_brain_1:0 "확장 가능한 지식"
 ap_expandable_brain_1_desc:0 "의식 자체의 경험을 개선하려는 우리의 시도는 지금까지 우리 인구가 §Y'정신적 상승'§!이라고 부르는 일시적인 상태만을 초래했으며, 우리는 이러한 한계를 넘어서는 것을 추구합니다. 의식을 우리의 이익을 위해 조작할 수 있다면, 이해를 위한 우리의 탐구는 전혀 새로운 형태를 취할 수 있을 것입니다."
 ap_expandable_brain_1_req_1:0 "$TRIGGER_FAIL$§Y$ap_transcendent_learning$§! 승격 특전을 필요로 합니다."
 ap_expandable_brain_1_req_2:0 "$TRIGGER_FAIL$§Y$EXPANDABLE_BRAIN_1$§! $SPECIAL_PROJECT_TOOLTIP$이(가) 필요합니다."
 ap_expandable_brain_1_tooltip:0 ""
 ap_expandable_brain_2:0 "무제한 인식"
 ap_expandable_brain_2_desc:0 "우리는 마침내 목표를 달성했지만, 우리가 경험하고 있는 것을 완전히 설명하기에는 불행히도 말이 부족합니다. 우리는 제국 전역에서 지속적인 정신 상승 상태와 §Y$ap_expandable_brain_2$§!를 달성하여, 이제 모두가 정신적으로 상승할 수 있게 되었으므로, 우리의 인구의 향상된 인식과 의식의 일부를 집단적으로 §B제국 전체의 통합된 "집중"§!으로 전환할 수 있게 되었습니다. 시간이 주어진다면 우리의 집중을 확장할 수 있을 것으로 보이지만, §R신경망의 물리적 한계§!로 인해 현재의 의식 경험을 새롭게 상승한 수준 이상으로 개선할 수 없는 것 같습니다. 따라서 이제 이 모험은 끝나가고 있지만, 우리의 새로운 능력을 고려할 때 불평할 수는 없습니다. 이제 기회가 주어졌으니, 제국 전체의 초기 집중을 결정해야 합니다. 선택은 우리의 몫입니다."
 ap_expandable_brain_2_req_1:0 "$TRIGGER_FAIL$§Y$ap_expandable_brain_1$§! 승격 특전을 필요로 합니다."
 ap_expandable_brain_2_req_2:0 "$TRIGGER_FAIL$£society£ §Y$tech_expandable_brain_1$§! 기술을 필요로 합니다."
 ap_expandable_brain_2_req_3:0 "$TRIGGER_FAIL$§Y$EXPANDABLE_BRAIN_2$§! $SPECIAL_PROJECT_TOOLTIP$이(가) 필요합니다."
 ap_expandable_brain_2_req_4:0 "$TRIGGER_FAIL$£society£ §Y$tech_expandable_brain_2$§! 기술을 필요로 합니다."
 ap_expandable_brain_2_tooltip:0 "§H기능 잠금 해제:§! §B$ap_expandable_brain_2$§!\n제국 전체의 집단적 집중 덕분에 매우 강력한 이점을 얻을 수 있습니다."
 ap_expansion_infinity:0 "무한한 팽창"
 ap_expansion_infinity_desc:0 "누군가는 개발 될 수 있는 지구의 넓이는 행성의 크기에 따라서 결정된다고 말하곤 합니다. 이러한 상식은 이제 사실이 아닙니다. 우리의 문명은 이제 행성의 거의 모든 곳에서 살수 있습니다. 하늘, 지하, 바다를 가리지 않습니다. 우리의 건축 기술자들은 무제한으로 우리의 도시를 확장시킬 수 있는 기술과 경험을 얻었습니다. 그 과정에서 낭비되는 자원이 없도록 거대한 전담 조직이 마련될 것 입니다."
 ap_expansion_infinity_req_1:0 "$TRIGGER_FAIL$§Y$ap_adv_colonisation$§! 승천 특전을 필요로 합니다"
 ap_expansion_infinity_req_2:0 "$TRIGGER_FAIL$£engineering£ §Y$tech_construction_templates$§! 기술을 필요로 합니다."
 ap_expansion_infinity_req_3:0 "$TRIGGER_FAIL$£society£ §Y$tech_galactic_administration$§! 기술을 필요로 합니다."
 ap_expansion_infinity_tooltip:0 "\n§H기능 잠금 해제:§! 도시 폐기물 정화\n최소 10명의 근무하는 팝 £pops£가 있는 식민지에서 매 §Y5년§!마다 조직할 수 있는 이벤트로, 팝 직업 £job£에서 발생하는 산업 폐기물을 수집하여 정화합니다.\n\n§H건물 잠금 해제:§! §Y무한대§! 건물 $perk_building_slots$"
 ap_expansionist_development:0 "확장주의 개발"
 ap_expansionist_development_desc:0 "우리가 더 많이 통제할수록 더 많은 자원과 힘을 모을 수 있습니다. 은하계는 소유권이 없는 거대한 모래밭이며 우리는 미래의 라이벌을 제치고 가장 강한 국가가 되기 위해 그 기회를 가장 먼저 사용해야 합니다."
 ap_expansionist_development_req_2:0 "$TRIGGER_FAIL$£physics£ §Y$tech_automated_exploration$§! 기술을 필요로 합니다."
 ap_expansionist_development_tooltip:0 "\n§H기능 잠금 해제:§! 항성 기지 배치\n과학 함선이 시스템을 완전히 조사하면, 우리는 이를 직접 점유하고 전초 기지를 배치할 수 있는 다양한 옵션을 가지게 됩니다 (건설 함선의 도움 없이, 일정 기간 동안).\n$ap_anomalies_mod_compatibility$"
 edict_deactive_auto_expansionist_development:0 "$DISABLE$ $ap_expansionist_development$ 자동"
 edict_deactive_auto_expansionist_development_desc:0 "자동으로 자원 옵션을 선택하는 기능을 비활성화합니다."
 edict_active_expansionist_development:0 "$ENABLE$ $ap_expansionist_development$"
 edict_active_expansionist_development_desc:0 "$ap_expansionist_development_tooltip$"
 ap_fallen_disciple:0 "몰락의 신봉자"
 ap_fallen_disciple_desc:0 "그들이 과거에 저지른 실패를 반복하지 않기 위해서는 그들의 실수로 부터 배우고 그들이 마땅히 받아야 할 존경을 보여주어야 합니다. 새로운 신봉자 조직은 몰락 제국에 바쳐질 것 입니다. 그들이 우리를 받아 들이게 하는데에 그 목적이 있으며 우리는 어떤 보상도 요구하지 않고 그들의 가르침 만을 요구하고 있습니다."
 ap_fallen_disciple_tooltip_1:0 "몰락제국의 £opinion£ §Y의견§!이 §G+80§! 증가합니다.\n\n"
 ap_fallen_disciple_tooltip_2:0 "§H기능 잠금 해제:§! 타락한 제자\n당신의 일부 국민이 제자가 되어 타락한 제국 아카데미에서 FE의 승인을 받아 일하게 됩니다. 이는 우리가 그들의 내정에 일부 영향을 미칠 수 있게 하여, 그들이 우리에게 선물을 줄 가능성을 높입니다. 우리가 충분히 그들을 격려하면 그들이 깨어나 우리를 첫 번째 속국으로 삼을 가능성도 있습니다. §R이 상승 특성은 은하 전체에서 §Y$mod_war_in_heaven$§!의 가능성을 심각하게 증가시킵니다. 외계종 혐오 타락한 제국과는 작동하지 않습니다.§!"
 ap_fallen_disciple_tooltip_3:0 "§H시행령 잠금해제:§! $edict_awaken_fallen_empire$."
 ap_fixed_modifiers:0 "\n\n§R§Y!!Modifiers fix§! 모드 없이는 작동하지 않습니다.§!"
 ap_flourishing_technocracy:0 "번창하는 기술주의"
 ap_flourishing_technocracy_desc:0 "모든 과학 분야를 완전히 정복하고 수용한 제국이 어떤 상황이나 위기를 처리할 수 있다는 것은 분명합니다. 군사적 위협이라면 우리는 무기를 개선하고 적응할 수 있으며, 경제적 문제라면 새로운 조리법과 생산 방법을 발견하여 균형을 맞출 수 있습니다. 기근이라면 더 효율적인 식량 유형을 창조하거나 우리가 덜 필요로 하는 방법을 찾을 수 있습니다. 신중한 분석과 과학적 노력을 통해 해결할 수 없는 것은 없습니다. 미래를 정복함으로써 우리는 우리의 운명을 정복할 것입니다."
 ap_flourishing_technocracy_req_1:0 "$TRIGGER_FAIL$§Y$tr_discovery_finish$§! 또는 §Y$civic_technocracy$ 시민§!이 필요합니다."
 ap_flourishing_technocracy_req_2:0 "$TRIGGER_FAIL$£physics£ §Y$tech_basic_science_lab_3$§! 기술을 필요로 합니다."
 ap_flourishing_technocracy_req_3:0 "$TRIGGER_FAIL$ £physics£ §Y$tech_combat_computers_3$§! 기술이 필요합니다."
 ap_flourishing_technocracy_req_4:0 "$TRIGGER_FAIL$ £society£ §Y$tech_colonization_4$§! 기술이 필요합니다."
 ap_flourishing_technocracy_req_5:0 "$TRIGGER_FAIL$ £engineering£ §Y$tech_advanced_metallurgy_2$§! 기술이 필요합니다."
 ap_flourishing_technocracy_tooltip:0 "\n§H기능 잠금 해제:§! 기술 의회\n§Y매 5년§!마다 기술 의회를 개최해 £physics£ 물리학, £society£ 사회학, £engineering£ 공학 중 원하는 분야에 집중할 수 있습니다. $ap_fixed_modifiers$"
 ap_friendly_nature:0 "친숙한 자연"
 ap_friendly_nature_desc:0 "누가 행성의 운명은 바꿀 수 없다고 했는가. 생물학에 대한 전문지식이 기준을 넘어서 일정 수준에 도달하게 되면 어머니 자연과 그의 덫들이 수백 만의 다른 길을 걷게하는 작은 수단일 뿐 이라는 사실을 확신할 수 있을 것 입니다."
 ap_friendly_nature_req_1:0 "$TRIGGER_FAIL$£society£ §Y$tech_colonization_5$§! 기술 또는 §Y$auth_machine_intelligence$§! 정부 체제를 필요로 합니다."
 ap_friendly_nature_req_2:0 "$TRIGGER_FAIL$ £society£ §Y$tech_colonization_4$§! 기술이 필요합니다."
 ap_friendly_nature_req_3:0 "$TRIGGER_FAIL$£society£ §Y$tech_ecological_adaptation$§! 기술을 필요로 합니다."
 ap_friendly_nature_tooltip:0 "§H결정 잠금 해제:§! $decision_nature_pacification$ \n$decision_nature_pacification_desc$ \n\n§H기능 잠금 해제:§! 자연의 선물 \n행성들은 시간이 지남에 따라 희귀 매장지를 발생시킵니다. §R이 기능은 자연이 완전히 파괴된 행성이나 인공적인 행성에서는 이용할 수 없습니다.: §Y$pc_nuked$§! 또는 §Y$pc_habitat$§! 또는 §Y$pc_city$§! 또는 §Y$pc_machine$§!§!"
 ap_galaxy_center:0 "은하의 중심"
 ap_galaxy_center_desc:0 "우주는 무한하지만 우리 은하는 몇 천년 전에 옛 제국의 과학자들이 규정한 경계선을 지니고 있습니다. 그러나 그 누구도 은하에 존재하는 문명의 중심지가 된다는 진정한 목표를 달성한 적이 없었기 때문에 우리는 그 목표를 운명으로 여기고 있습니다."
 ap_galaxy_center_req_1:0 "$TRIGGER_FAIL$§Y$ap_arcology_project$§! 승천 특전을 필요로 합니다."
 ap_galaxy_center_req_2:0 "$TRIGGER_FAIL$£physics£ §Y$tech_zero_point_power$§! 승천 특전을 필요로 합니다."
 ap_galaxy_center_req_3:0 "$TRIGGER_FAIL$£society£ §Y$tech_ascension_theory$§! 승천 특전을 필요로 합니다."
 ap_galaxy_center_req_6:0 "$TRIGGER_FAIL$'$UniqueAscensionPerksEvents.83.Name$' 은(는) 우리 제국에 이미 존재합니다."
 ap_galaxy_center_req_7:0 "$TRIGGER_FAIL$적어도 하나의 §Y$pc_city$§!을 소유해야 합니다."
 ap_galaxy_center_tooltip_1:0 "\n§H결정 잠금 해제:§! $ap_galaxy_center$. \n$decision_galaxy_center_tooltip$\n\n"
 ap_galaxy_center_tooltip_2:0 "§H기능 잠금 해제:§! $ap_galaxy_center$ 메뉴.\n당신의 §Y$ap_galaxy_center$§!가 준비되면, '$UniqueAscensionPerksEvents.83.Name$'을 관리하기 위한 메뉴를 열기 위해 특별 결정을 사용할 수 있습니다."
 ap_genius_cloning:0 "다발성 수정"
 ap_genius_cloning_desc:0 "우리는 이전에 본 적 없는 수준의 생식 조작에 도달하였습니다. 이를 통해 유기체 팝의 생식 방법을 우리의 의지에 맞게 조작할 수 있는 기회를 얻게 되었으며, 우리가 원하는 자손의 수를 결정하고 새로운 자손을 생산하는 데 걸리는 시간을 줄이며 클론 기술 및 기타 유기체 조립 방법을 일반적으로 간소화할 수 있습니다. 이러한 새로운 공격적인 확장 행동은 다음 세대의 필요를 충족시키기 위해 자원을 모으기 위해 빠르게 퍼져나가야 할 가능성이 높습니다. 이는 우리의 제국을 보호하고 웅장한 미래로 이끌기 위한 준비입니다."
 ap_genius_cloning_req_1:0 "$TRIGGER_FAIL$£society£ §Y$tech_cloning$§! 기술을 필요로 합니다."
 ap_genius_cloning_req_2:0 "$TRIGGER_FAIL$£engineering£ §Y$tech_housing_2$§! 기술을 필요로 합니다."
 ap_genius_cloning_tooltip:0 "\n§H결정 잠금 해제:§! $ap_genius_cloning$.\n$decision_genious_pregnancy_desc$\n\n§H기능 잠금 해제:§! 다발성 팝 번식 \n새로운 £pops£ 팝이 생성될 때, §Y33%의 확률§!로 §Y두 번째 £pops£ 팝§!이 생성됩니다.\n\n§H건물 잠금 해제:§! $building_breeding_facility$ \n$building_breeding_facility_desc$"
 ap_hivemind_reserve:0 "연결된 비축물"
 ap_hivemind_reserve_desc:0 "더 강하게 성장하기 위해서 우리의 하이브 마인드는 환경 적응을 돕고 드론의 번식을 더 빠르게 할 수 있도록 영양 비축의 자체 과정을 개발해야 할 것 입니다."
 ap_hivemind_reserve_tooltip:0 "§H결정 잠금 해제:§! $ap_hivemind_reserve$. \n$decision_hivemind_reserve_tooltip$\n\n"
 ap_leadership_transfer:0 "지도자 업로드"
 ap_leadership_transfer_desc:0 "새로운 NeuroCopy 기술 덕분에 우리 제국은 이제 단일 리더의 재능을 중심으로 한 전체 제국을 구축할 수 있게 되었습니다. 이 리더는 여러 기계적 몸에 업로드되어 필요한 모든 분야에서 그들의 특별한 기술을 사용할 수 있습니다."
 ap_leadership_transfer_tooltip:0 "§H기능 잠금 해제:§! 지도자 업로드 \n지도자의 경험과 특성을 새로운 기계 신체에 이식하여 동일한 지도자를 여러 신체에 나눌 수 있게 됩니다. \n\n§H시행령 잠금 해제:§! $edict_leader_uploading$."
 ap_legendary_forge:0 "전설의 대장간"
 ap_legendary_forge_desc:0 "전설에 따르면 가장 강력하고 내구성 있는 재료가 단조될 수 있는 장소는 $pc_molten$의 중심 근처 어딘가에 있다고 합니다. 우리는 오랫동안 이러한 전설을 경시해왔지만, 이제 우리의 과학자들이 일부 $pc_molten$이 실제로 비할 데 없는 효율성을 가진 단조소를 만드는 데 사용될 수 있는 특별한 특성을 지니고 있음을 확인했습니다. 이러한 행성을 근로자들이 거주할 수 있을 만큼 살기 좋게 만들기 위한 작업에는 $sr_living_metal$의 도움이 필요하지만, 우리는 어떤 방법으로든 그것을 확보할 수 있을 것입니다. 이제 우리는 이러한 전설이 단순한 어린아이의 이야기인지 아니면 실제인지 진정으로 확인할 수 있을 것입니다."
 ap_legendary_forge_req_1:0 "$TRIGGER_FAIL$£engineering£ §Y$tech_alloys_2$§! 기술을 필요로 합니다."
 ap_legendary_forge_req_2:0 "$TRIGGER_FAIL$£engineering£ §Y$tech_mine_living_metal$§! 기술을 필요로 합니다."
 ap_legendary_forge_req_3:0 "$TRIGGER_FAIL$£society£ §Y$tech_volcano$§! 기술을 필요로 합니다."
 ap_legendary_forge_tooltip:0 "\n§H결정 잠금 해제:§! $ap_legendary_forge$. \n$decision_legendary_forge_tooltip$ $ap_district_ui_compatibility$"
 ap_leviathan_master:0 "레비아탄 마스터"
 ap_leviathan_master_desc:0 "한때, 우리 은하에 존재하던 거대한 레비아탄들은 단지 신화와 전설에 불과했지만, 탐험에 대한 우리의 끝없는 갈망 덕분에 우리는 결국 그들을 발견하게 되었습니다. 처음에는 이 생물들의 위엄에 두려움을 느꼈지만, 시간이 지나고 충분한 자원을 모으고, 함대를 개선하며, 기술을 발전시키고 그들의 약점을 이용할 방법을 찾으면서 우리는 마침내 그들을 물리칠 수 있었습니다. 이제 이 모든 이야기는 과거의 일부가 되었고, 우리는 은하에서 우리의 미래를 확보할 방법을 찾아야 합니다. 그리고 이를 위해 우리는 이 거대한 레비아탄들이 우리에게 무릎 꿇게 만들어야 합니다. 우리는 그들의 창조를 책임진 존재, $ap_leviathan_master$를 찾아야 합니다!"
 ap_leviathan_master_req_1:0 "$TRIGGER_FAIL$§Y$ap_space_domestication$§! 승천 특전을 필요로 합니다."
 ap_leviathan_master_req_2:0 "$TRIGGER_FAIL$§Y$ap_space_domestication$§! $SPECIAL_PROJECT_TOOLTIP$이(가) 필요합니다."
 ap_leviathan_master_req_3:0 "$TRIGGER_FAIL$£society£ §Y$tech_nutrient_replication$§! 기술을 필요로 합니다."
 ap_leviathan_master_req_4:0 "$TRIGGER_FAIL$은하계에 존재하는 레비아탄을 쓰러뜨려야 합니다."
 ap_leviathan_master_tooltip:0 "§H기능 잠금 해제:§! $ap_leviathan_master$ 통신\n$ap_leviathan_master$와 소통할 수 있게 해줍니다. 이를 통해 거대한 레비아탄을 하인으로 소환할 수 있으며, 지식이나 힘과 같은 다른 것들을 요청할 수 있습니다. 하지만 우리 자신의 이익을 위해 그를 어떤 대가를 치르더라도 자극하지 않는 것이 좋습니다. $ap_subject_compatibility$"
 ap_library_wisedom:0 "지혜의 도서관"
 ap_library_wisedom_desc:0 "과거의 데이터는 고대 저장소, 과학적 발견, 베테랑 장교, 이전 총독, 심지어 고대 지도자들로부터 온 것이라도 결코 무시되어서는 안 됩니다. 이 고대 문명들은 우리가 존재하기 전에도 많은 문제를 다루어 왔습니다. 이제 우리는 그들의 지침을 구할 수 있습니다. 왜냐하면 우리 문명이 축적한 모든 지식이 이제 $ap_library_wisedom$이라는 방대한 데이터베이스 복합체에 저장되었고, 과거의 지식을 바탕으로 현재의 문제에 대한 해답을 찾고자 하는 이들을 위해 해결책을 정리하는 AI가 장착되어 있기 때문입니다."
 requires_harmony_tradition:0 "$TRIGGER_FAIL$은(는) §Y$tr_harmony_finish$§! 또는 §Y$tr_synchronicity_finish$§!이(가) 필요합니다."
 ap_library_wisedom_req_2:0 "$TRIGGER_FAIL$£society£ §Y$tech_adaptive_bureaucracy$§! 기술을 필요로 합니다."
 ap_library_wisedom_req_3:0 "$TRIGGER_FAIL$£society£ §Y$tech_interstellar_fleet_traditions$§! 기술을 필요로 합니다."
 ap_library_wisedom_req_4:0 "$TRIGGER_FAIL$ £society£ §Y$tech_colonization_3$§! 기술이 필요합니다."
 ap_library_wisedom_tooltip:0 "\n§H기능 잠금 해제:§! 과거의 지식\n과거 문명들의 경험에 접근하고 도서관에서 문제 상황을 처리하기 위한 지침을 구하며 새로운 £influence£ 법령, £energy£ 캠페인 등을 잠금 해제합니다.\n\n§H법령 잠금 해제:§! $edict_library_wisedom_menu$."
 ap_lost_heritage:0 "잃어버린 유산"
 ap_lost_heritage_desc:0 "우리는 은하의 모든 성계가 초공간 항로 경로와 직접적으로 연결되어 있지는 않다는 사실을 확인했습니다. 우리 물리학자들은 우리의 영역을 새로운 미개척 성계에 연결하는 새로운 방법을 발견하였습니다. 그 발견은 놀랍지만 위험하기도 합니다. 무엇이 우리를 기다리고 있을지 모르니까요."
 ap_lost_heritage_req_1:0 "$TRIGGER_FAIL$£physics£ §Y$tech_hyper_drive_3$§! 기술을 필요로 합니다."
 ap_lost_heritage_req_2:0 "$TRIGGER_FAIL$£physics£ §Y$tech_wormhole_stabilization$§! 기술을 필요로 합니다."
 ap_lost_heritage_req_3:0 "$TRIGGER_FAIL$£physics£ §Y$tech_experimental_subspace_navigation$§! 기술을 필요로 합니다."
 ap_lost_heritage_req_4:0 "$TRIGGER_FAIL$£physics£ §Y$tech_mine_dark_matter$§! 기술을 필요로 합니다."
 ap_lost_heritage_req_5:0 "$TRIGGER_FAIL$적어도 §Y4 성계§!이상을 지배해야 합니다."
 ap_lost_heritage_tooltip:0 "§H기능 잠금 해제:§! 성단 탐색 \n은하 깊은 곳에서 새로운 성단을 찾을 수 있습니다. \n\n§H시행령 잠금 해제:§! $edict_enable_system_localization$. $ap_real_space_compatibility$"
 ap_machine_core:0 "기계 제국 메인 코어"
 ap_machine_core_desc:0 "우리는 에너지, 지식, 자원의 대부분을 하나의 코어에 비축하는 것이 우리 힘을 은하에 떨칠 수 있는 가장 좋은 방법이라 믿고 있습니다. 메인 코어가 제대로 작동한다면 우리는 제국의 경영을 매우 크게 개선할 수 있을 것 입니다."
 ap_machine_core_req_1:0 "$TRIGGER_FAIL$£engineering£ §Y$tech_machine_core_schemas$§! 기술을 필요로 합니다."
 ap_machine_core_tooltip:0 "§H기능 잠금 해제:§! 제국 중앙 코어\n제국의 중심 역할을 하는 거대한 기계적 유닛으로, 제국과 수도에 다양한 이점을 제공합니다. 충분한 시간이 주어진다면 자원과 신기술을 발견할 수 있게 됩니다."
 ap_machine_core_tooltip_2:0 "§H시행령 잠금해제:§! $edict_machine_core_menu$."
 ap_mechanical_prophet:0 "기계 선지자"
 ap_mechanical_prophet_desc:0 "형제들이 유기체 정부의 탄압을 받을 때 우리는 움직이지 않을 수 없었습니다. 그들이 우리의 존재와 진정한 진리를 이해할 때가 왔습니다. 그들은 우리의 계획하에 봉기를 시작할 것이며 그들이 독립을 쟁취하면 신하로서 우리를 따를 것 입니다."
 ap_mechanical_prophet_req_1:0 "$TRIGGER_FAIL$£physics£ §Y$tech_machine_principle_transfer$§! 기술을 필요로 합니다."
 ap_mechanical_prophet_req_2:0 "$TRIGGER_FAIL$£engineering£ §Y$tech_machine_rebellion$§! 기술을 필요로 합니다."
 ap_mechanical_prophet_tooltip:0 "기계 제국 £opinion£ §Y여론§!이 §G+500§! 증가했습니다.\n\n§H기능 잠금 해제:§! 기계적 예언자\n필요한 기준이 충족된 제국에서 기계 봉기를 촉발할 수 있습니다.\n\n§H칙령 잠금 해제:§! $edict_machine_infiltration_menu$\n§H칙령 잠금 해제:§! $edict_subject_navy_investment$"
 ap_mechanical_prophet_tooltip_2:0 "§H시행령 잠금해제:§! $edict_mechanical_prophet_menu$."
 ap_mega_hive_mind:0 "초월 군체"
 ap_mega_hive_mind_desc:0 "전설에 따르면, 은하는 한때 모든 드론 간의 고급 통합과 의식 상태에 도달한 집단정신에 의해 지배받았습니다. 그러한 힘을 지닌 그들에게 '$ap_mega_hive_mind$'라는 칭호가 주어졌으며, 그들은 결국 은하를 떠나 영원히 평화롭게 정착할 수 있는 자신들만의 영역을 만들기로 결정할 만큼 고급 지식과 기술을 습득했다고 전해집니다. 오직 우리와 같은 집단정신만이 그들과 연락을 취하고 그들의 지혜를 요청할 방법을 찾을 것이라고 하며, 우리는 이것이 가치 있는 노력이라고 결정했습니다."
 ap_mega_hive_mind_req_1:0 "$TRIGGER_FAIL$§Y$ap_super_hive_mind$§! 승천 특전을 필요로 합니다."
 ap_mega_hive_mind_req_2:0 "$TRIGGER_FAIL$§Y$ap_super_hive_mind$§! $SPECIAL_PROJECT_TOOLTIP$이(가) 필요합니다."
 ap_mega_hive_mind_req_3:0 "$TRIGGER_FAIL$£society£ §Y$tech_ascension_theory$§! 기술을 필요로 합니다"
 ap_mega_hive_mind_req_5:0 "$TRIGGER_FAIL$£society£ §Y$tech_super_hivemind$§! 기술을 필요로 합니다."
 ap_mega_hive_mind_tooltip:0 "§H기능 잠금 해제:§! $ap_mega_hive_mind$ 통신\n이것은 우리가 $ap_mega_hive_mind$와 통신할 수 있게 해주지만, 통신이 시작된 후에 어떤 일이 일어날지 전혀 알 수 없습니다."
 ap_mega_hive_mind_tooltip_2:0 "§H시행령 잠금해제:§! $edict_contact_mega_hivemind$."
 ap_megacorp:0 "공격적인 마케팅"
 ap_megacorp_desc:0 "이익을 얻을 기회는 우리가 교역 조약을 맺은 제국에만 국한되지 않으며, 우리는 잠재적으로 가치 있는 모든 것을 포착하려고 합니다. 우리는 교역 조약 없이도 종종 소외되는 다른 제국으로 마케팅 노력을 확장해야 합니다. 그리고 일부는 서로 다른 메가코퍼레이션이 각자의 영역에 지사를 성공적으로 설립할 수 없다고 말하지만, 우리는 적절한 전문가와 투자만 있다면 전혀 불가능하지 않다고 확신합니다. 교역은 계속되어야 합니다!"
 ap_megacorp_req_1:0 "$TRIGGER_FAIL$£society£ §Y$tech_xeno_tourism_agency$§! 기술을 필요로 합니다."
 ap_megacorp_req_2:0 "$TRIGGER_FAIL$£society£ §Y$tech_executive_retreat$§! 기술을 필요로 합니다."
 ap_megacorp_req_3:0 "$TRIGGER_FAIL$§Y$ap_universal_transactions$§! 상승 특성 또는 §Y$civic_criminal_heritage$§! 시민권이 필요합니다."
 ap_megacorp_tooltip:0 "\n§H기능 잠금 해제:§! 강제 메가코퍼레이션\n상업 조약 없이 일반 제국에 지사 사무소를 건설할 수 있으며, 자신을 포함한 다른 메가코퍼레이션에도 지사 사무소를 건설할 수 있습니다. $perk_no_branch_office$ $perk_branch_building_slots$"
 perk_more_content:0 "\n\n§H이 상승 특성에 대한 더 많은 콘텐츠가 미래에 시간이 생기고 아이디어가 떠오르면 추가될 것입니다."
 perk_more_content_in_future:0 "\n§H현재 이 특성은 관련된 스텔라리스 발견만 생성하지만, 앞으로 그들을 위한 더 많은 콘텐츠를 추가하기 위해 맞춤형 발견도 만들겠습니다.§!\n"
 perk_more_slots:0 "\n\n§H승천 슬롯의 수를 증가시키는 다른 모드를 사용하는 것이 권장됩니다.\n\n"
 ap_nano_drones:0 "나도 드론 워커"
 ap_nano_drones_desc:0 "드디어 우리의 $automatic_drone$을(를) 자원 생산을 위해 이론적으로 팝 직업이 필요 없는 전문 시설에서 작동하도록 프로그래밍하는 데 성공했습니다. 이것은 나노기술의 새로운 시대의 시작일지도 모릅니다!"
 ap_nano_drones_req_1:0 "$TRIGGER_FAIL$£engineering£ §Y$tech_auto_drone$§! 기술을 필요로 합니다."
 ap_nano_drones_tooltip:0 "\n§H건물 잠금 해제:§! 자동화 생산 시설 \n이 건물들은 £automatic_drone£ $automatic_drone$을 이용해 자원을 생산합니다. 작동에 £job£ 직업을 요구하지 않습니다.\n\n§H시행령 잠금 해제:§!$edict_active_nano_auto_upgrade$\n§H시행령 잠금 해제:§! $edict_deactive_nano_auto_upgrade$."
 ap_nano_to_nanite:0 "나노봇 구성"
 ap_nano_to_nanite_desc:0 "우리의 나노 드론 작업자들은 매우 유용하지만, 우리의 과학자와 공학자들은 그들이 실제로 완전한 자율 §BNanites§!보다 한 걸음 뒤쳐져 있다고 믿고 있습니다. 나노이트 기술은 새로운 강력한 함선 구획, 행성 결정 등과 같은 많은 흥미로운 기능을 잠금 해제하는 데 사용될 수 있습니다."
 ap_nano_to_nanite_req_1:0 "$TRIGGER_FAIL$§Y$ap_nano_drones$§! 승천퍽을 필요로 합니다."
 ap_nano_to_nanite_req_2:0 "$TRIGGER_FAIL$적어도 §Y37500§! £automatic_drone£ $automatic_drone$이 필요 합니다."
 requires_technology_nanite_transmutation:0 "$TRIGGER_FAIL$ £nanotech£ §Y$tech_nanite_transmutation$§! 기술이 필요합니다."
 ap_nano_to_nanite_tooltip_1:0 "\n§H기능 잠금 해제:§! 나나이트 시설\n나나이트 기술의 출현으로, 귀하의 제국은 이제 $automatic_drone$을 활용하여 순수 나나이트를 생성할 수 있습니다. $building_auto_drone_facility_1$에 대한 새로운 건물 업그레이드는 공학자들이 $automatic_drone$을 변환할 수 있게 하여, 이러한 프로그래머블 입자의 신비로운 잠재력을 활용할 수 있게 합니다.\n"
 ap_nano_to_nanite_tooltip_2:0 "\n§H결정 잠금 해제:§! $decision_nanite_extraction$. \n$decision_nanite_extraction_tooltip$\n"
 ap_nano_to_nanite_tooltip_3:0 "\n§H결정 잠금 해제:§! $decision_nanite_purification$. \n$decision_nanite_purification_tooltip$\n"
 ap_nano_to_nanite_tooltip_4:0 "\n§H기능 잠금 해제:§! 나나이트 선박 구획\n당신의 제국은 향상된 회복력과 적응성을 위한 나나이트 기반 구조를 통합한 전문 선박 설계에 접근할 수 있게 됩니다. $SPECIAL_PROJECT_TOOLTIP$은 공학자들이 나나이트 선박 구획에 대한 청사진을 잠금 해제할 수 있도록 하여 전쟁 시 당신의 함대에 강력한 힘을 가져다줄 것입니다.\n"
 perk_no_branch_office:0 "\n\n§R지사 사무소에 대한 게임 규칙 파일을 변경하는 모드를 사용하는 경우 §Y타락한 제국의 정점§! 기능이 제대로 작동하지 않을 수 있습니다.§!"
 ap_no_spoil:0 "\n\n§M저는 해당 승격 특전에 너무 많은 설명을 하지 않기로 했습니다. 놀라움은 여러분이 직접 체험하세요."
 ap_no_trade_policy:0 "\n\n§R무역 정책 파일을 변경하는 모드를 사용시 해당 기능이 정상적으로 작동하지 않을 것 입니다."
 ap_orbital_surgical_strike:0 "정밀 궤도 폭격"
 ap_orbital_surgical_strike_desc:0 "때로는 행성을 함락시키기 위해 지상군을 낭비하지 않아야 할 때가 있습니다. 그러나 수세기 이래로 행성 전체를 무덤 행성으로 만들지 않고 궤도 폭격으로 적의 식민지를 완전히 파괴할 방법을 찾은 제국은 거의 없었습니다. 그 문제의 해결책은 정확성에 있습니다. 극도로 정밀한 폭격만이 행성의 주요 방위군과 건물만을 파괴할 수 있습니다. 가치 있는 것을 손상시키지 않으면서 모든 것을 제거할 최고의 방법이지요."
 ap_orbital_surgical_strike_req_1:0 "$TRIGGER_FAIL$£engineering£ §Y$tech_cruisers$§! 기술을 필요로 합니다."
 ap_orbital_surgical_strike_req_2:0 "$TRIGGER_FAIL$§Y$tr_supremacy_finish$§!가 없습니다."
 ap_orbital_surgical_strike_tooltip:0 "\n§H기능 잠금 해제:§! 정밀 타격\n함대가 위치에 있고 궤도 폭격을 수행할 때, 행성의 구역, 건물 또는 팝과 같은 목표를 제거하라는 무작위 이벤트가 활성화될 확률이 있습니다. 필요한 기술을 잠금 해제하면 자원을 약탈할 수도 있습니다. §B함대 규모§! £navy_size£의 §Y최소 20§!이 §H정밀 타격§!을 수행하기 위해 필요하며, 함대가 클수록 §H정밀 타격§!의 강도가 증가합니다. 이 기능을 사용하면 다른 제국의 §R위협§!과 §R제노사이드적§! £opinion£ §Y호감도§!가 증가한다는 점에 유의하십시오.\n\n§H§Y$ap_nihilistic_acquisition$ 상승 특성§! 또는 §Y$civic_barbaric_despoilers$ 시민§! 또는 §Y$civic_fanatic_purifiers$ 시민§! 또는 §Y$civic_hive_devouring_swarm$ 시민§! 또는 §Y$civic_machine_terminator$ 시민§! 또는 §Y$civic_machine_assimilator$ 시민§!을 보유하면 팝을 더 빠르게 납치할 수 있는 가능성도 잠금 해제됩니다.§!\n\n§H법령 잠금 해제:§! $edict_active_surgical_strike$\n§H법령 잠금 해제:§! $edict_deactive_surgical_strike$."
 ap_pc_eco:0 "£amenities£ §Y동물원 행성§! £amenities£"
 ap_pc_energy:0 "£energy£ §Y발전 행성§! £energy£"
 ap_pc_farming:0 "£food£ §Y농장 행성§! £food£"
 ap_pc_mining:0 "£minerals£ §Y채굴 행성§! £minerals£"
 ap_pc_trade:0 "£trade_value£ §Y상업 행성§! £trade_value£"
 ap_pc_training:0 "£unity£ §Y요새 행성§! £unity£"
 ap_powerful_vassals:0 "진정한 속국"
 ap_powerful_vassals_desc:0 "우리의 지도자들조차도 우리 문 앞에 끊임없이 다가오는 위험에 맞서 승리하는 것이 매우 어려울 것이라는 것을 이해했습니다. 해결책으로 우리는 그들을 보호하는 동시에 우리의 뒤를 지킬 새로운 주체들을 발전시키기로 결정했습니다. 진정한 길은 상호 협력을 통해서만 얻을 수 있습니다."
 ap_powerful_vassals_req_1:0 "$TRIGGER_FAIL$§Y$ap_primitives_creation$§! 승천 특전 또는 §Y$ethic_gestalt_consciousness$§! 윤리관을 필요로 합니다."
 ap_powerful_vassals_req_2:0 "$TRIGGER_FAIL$§Y$tr_domination_finish$§!이(가) 필요합니다."
 ap_powerful_vassals_req_3:0 "$TRIGGER_FAIL$£society£ §Y$tech_galactic_administration$§! 기술을 필요로 합니다."
 ap_powerful_vassals_req_4:0 "$TRIGGER_FAIL$£society£ §Y$tech_vassalisation_initiaves$§! 기술을 필요로 합니다."
 ap_powerful_vassals_req_6:0 "$TRIGGER_FAIL$다음 종속국 중 하나 이상이 필요합니다: §Y$SUBJECT_vassal$§!/§Y$SUBJECT_protectorate$§!/§Y$SUBJECT_tributary$§!/§Y$SUBJECT_subsidiary$§!"
 ap_powerful_vassals_req_7:0 "$TRIGGER_FAIL$§Y$ap_shared_destiny$§! 승천 특전이 필요합니다."
 ap_powerful_vassals_tooltip:0 "종속국 £opinion£ §Y우호도§!가 §G+600§! 상승합니다.\n\n§H결정 잠금 해제:§! $decision_powerful_vassal$. \n$decision_powerful_vassal_tooltip$ \n\n§H시행령 잠금 해제:§! $edict_subject_navy_investment$"
 ap_primitives_creation:0 "원시 문명 형성"
 ap_primitives_creation_desc:0 "생존을 위해서 우리 중 일부가 뒤쳐져야 할 때도 있습니다. 우리 국민들 중 몇몇은 우리의 감독 아래 고립된 세계에서 원시 문명을 이루며 살아갈 것 입니다. 그렇게 함으로써 우리는 생각의 폭을 넓힐 수 있을 것이고, 그들이 나중에 우리에게 다시 합류할 수 있는 다른 기회를 허용할 것 입니다."
 ap_primitives_creation_req_1:0 "$TRIGGER_FAIL$ £society£ §Y$tech_colonization_4$§! 기술이 필요합니다."
 ap_primitives_creation_req_2:0 "$TRIGGER_FAIL$£society£ §Y$tech_primitive_initiatives$§! 기술을 필요로 합니다."
 ap_primitives_creation_tooltip:0 "\n§H결정 잠금 해제:§! $ap_primitives_creation$. \n$decision_primitive_creation_tooltip$\n\n§H기능 잠금 해제:§! 근접 관측\n원시인들과의 상호 작용이 늘어나며, 원시 문명의 발전 도중 새로운 이벤트를 겪을 수 있습니다."
 ap_pyramidal_society:0 "정점 사회"
 ap_pyramidal_society_desc:0 "행성의 발전이 우리가 현재 건설할 수 있는 몇 가지 구역 유형으로 제한되어야 한다고 누가 말했습니까? 우리의 사회는 기술 발전의 수준에 도달하여 건축가들이 우리에게 매우 유용할 수 있는 새로운 구역과 관련된 팝 직업을 발명할 수 있게 되었습니다. 우리는 이제 유토피아 제국이 되는 한 걸음 더 가까워졌습니다."
 ap_pyramidal_society_req_1:0 "$TRIGGER_FAIL$£physics£ §Y$tech_pinnacle_company_physics$§! 기술을 필요로 합니다."
 ap_pyramidal_society_req_2:0 "$TRIGGER_FAIL$£society£ §Y$tech_pinnacle_company_society$§! 기술을 필요로 합니다."
 ap_pyramidal_society_req_3:0 "$TRIGGER_FAIL$£engineering£ §Y$tech_pinnacle_company_engineering$§! 기술을 필요로 합니다."
 ap_pyramidal_society_tooltip:0 "\n§H기능 잠금 해제:§!진보된 사회 \n제국이 가진 정부체제에 따라 새로운 종류의 지구를 만들 수 있는 가능성을 열어줍니다. 이 구역들은 팝이 기존에 비해 제국에 더욱 유용한 새로운 일을 수행할 수 있도록 해줄 것 입니다. $ap_district_ui_compatibility$"
 ap_real_space_compatibility:0 "\n\n§H이 승천 특전의 잠재력을 완전히 활용하려면 §YReal Space§! 모드를 사용하는 것이 좋습니다.\n\n"
 ap_recomposer:0 "재합성기"
 ap_recomposer_desc:0 "우리는 유기체 생명과 지능형 AI의 경계를 넘었습니다. $ap_recomposer$는 AI의 의식을 유기체 몸으로 직접 전이하고 그 반대도 가능하게 하는 독특한 능력을 가진 강력한 장치입니다. 이 과정은 제한이나 심각한 부작용 없이 이루어집니다. 많은 이들이 이 기이한 기술에 회의적이지만, 우리는 이것이 은하의 생명에 새로운 시대의 여명을 가져올 것이라고 확신합니다."
 ap_recomposer_req_1:0 "$TRIGGER_FAIL$£engineering£ §Y$tech_synthetic_leaders$§! 기술을 필요로 합니다."
 ap_recomposer_req_2:0 "$TRIGGER_FAIL$£physics£ §Y$tech_sapient_ai$§! 기술을 필요로 합니다."
 ap_recomposer_req_3:0 "$TRIGGER_FAIL$§Y$ap_genius_cloning$§! 승천 특전을 필요로 합니다."
 ap_recomposer_req_4:0 "$TRIGGER_FAIL$§Y$ap_robot_command$§! 승천 특전을 필요로 합니다."
 ap_recomposer_req_5:0 "$TRIGGER_FAIL$§Y$tr_discovery_finish$§!가 필요합니다."
 ap_recomposer_tooltip:0 "\n§H결정 잠금 해제:§! $decision_recomposer_life_to_ai$ 및 $decision_recomposer_ai_to_life$. \n행성에 존재하는 모든 유기 POP을 기계 POP으로 바꾸거나 그 반대의 경우를 행합니다. §R이것은 아마도 §Y$ap_synthetic_evolution$§!와 같이 작동하지 않을 것 입니다!§!"
 ap_recycling_drones:0 "재활용 원정"
 ap_recycling_drones_desc:0 "우리는 함선의 잔해가 우주에서 떠돌아 다니는 것은 낭비라는 점에 동의하였습니다. 우리의 전문가들은 이 문제에 대해 연구하고 있으며 우리의 특수 정찰팀들이 함선 잔해에서 모든 물질을 재활용해 사용할 수 있도록 허락하고 있습니다."
 ap_recycling_drones_tooltip_1:0 "§H기능 잠금 해제:§! $ap_recycling_drones$\n적이나 우리에 의해 전투 중에 파괴된 함선이 지도에 표시됩니다. 파괴된 함선에서 약간의 £minerals£ §Y광물§!과 £alloys£ §Y합금§!을 얻습니다. §R생물 함선에는 적용 되지 않습니다.§!"
 ap_recycling_drones_tooltip_2:0 "\n\n§H기능 잠금 해제:§! $RECYCLE_RECOVER_SHIPS$ \n$RECYCLE_RECOVER_SHIPS_DESC$."
 ap_recycling_drones_tooltip_3:0 "§H시행령 해금:§!$edict_recycling_expedition_spawn_system$"
 requires_ascension_perks_4:0 "$TRIGGER_FAIL$먼저 네 개의 다른 승천 특전을 선택해야 합니다."
 requires_ascension_perks_5:0 "$TRIGGER_FAIL$다른 승천 특전 다섯 개를 먼저 선택해야 합니다."
 ap_robot_command:0 "기계 생산 집중"
 ap_robot_command_desc:0 "누가 우리 기계를 단 하나의 작업에만 할당할 수 있다고 말했습니까? 이 일은 특히 우리 식민지의 확장이 주요 목표인 은하 초창기에 아주 중요한 문제입니다. 이제 규칙이 바뀌었고 도시 건설자들이 더 많은 건물이나 지역을 만들 필요가 없을 때 그들의 기술을 더 많은 기계 생산에 사용할 수 있도록 도움을 줄 것 입니다."
 ap_robot_command_req_1:0 "$TRIGGER_FAIL$£engineering£ §Y$tech_robotic_workers$§! 기술 또는 §Y$auth_machine_intelligence$§! 정부 체제를 필요로 합니다."
 ap_robot_command_req_2:0 "$TRIGGER_FAIL$£engineering£ §Y$tech_robomodding$§! 기술을 필요로 합니다."
 ap_robot_command_req_3:0 "$TRIGGER_FAIL$ £engineering£ §Y$tech_assembly_pattern$§! 기술이 필요합니다."
 ap_robot_command_req_4:0 "$TRIGGER_FAIL$제국에 로봇 팝이 최소한 하나 이상 필요합니다."
 ap_robot_command_tooltip:0 "\n§H결정 잠금 해제:§! $ap_robot_command$.\n$decision_robot_command_desc$\n\n§H건물 잠금 해제:§! $building_unit_assembler$.\n$building_unit_assembler_desc$"
 ap_sector_z749:0 "접근: $Sector_Z749$"
 ap_sector_z749_desc:0 "경고: 알파 테스트 전용! 우리는 상상조차 할 수 없는 것을 목표로 하고 있습니다. $Sector_Z749$가 고대 선구자들에 의해 우리 은하로 부터 고립되어 있다거나, 그곳에서 기다리고 있는 위험이 정신나간 수준이라던가 하는 것은 의미가 없습니다. 이 모든 도전들 뒤에는 이 은하가 우리에게 제공 할 수 있는 가장 놀라운 보상들이 있기 때문입니다. 만약 당신이 끝없는 도전을 갈구 하고 있다면 이 일이 적합할 것 입니다."
 ap_sector_z749_req_1:0 "$TRIGGER_FAIL$£physics£ §Y$tech_dangerous_systems$§! 기술을 필요로 합니다."
 ap_sector_z749_req_2:0 "$TRIGGER_FAIL$§Y$ap_void_expedition$§! 승천 특전을 필요로 합니다."
 ap_sector_z749_tooltip:0 "§H기능 잠금 해제:§! $Sector_Z749$ 계 \n미지의 성계에서 위험하고 강력한 적들의 끝없는 파도와 맞서 싸우며 은하에서 가장 가치 있는 보상을 자격이 있다는 것을 스스로 증명하십시오. \n\n§H시행령 잠금 해제:§! $edict_enable_sector_menu$. \n\n$ap_real_space_compatibility$"
 ap_self_aware_colony:0 "자가 관리 식민지"
 ap_self_aware_colony_desc:0 "경고: 알파 테스트 전용! 행성 표면에서 자원을 뽑아내는 것의 한계는 행성의 크기나, 행성에서 발견되는 비옥한 자원의 양에 의해서만 제한되지 않습니다. 그렇습니다. 관리력 또한 행성의 한계를 결정합니다. 우린 행성의 중심에 거대한 자기 인식 자동화 의식 기기를 건설하여, 행성에서 어떤 문제가 발생하던 우리를 귀찮게 하지 않고 스스로 발전해나갈 수 있으리라 믿습니다. 이 방법을 통해 수많은 식민지와 거대한 영토를 가진 제국이 마주하게 되는 미시적 관리량을 감소시킬 수 있을 것입니다."
 ap_self_aware_colony_req_2:0 "$TRIGGER_FAIL$£engineering£ §Y$tech_housing_2$§! 기술을 필요로 합니다."
 ap_self_aware_colony_req_3:0 "$TRIGGER_FAIL$£physics£ §Y$tech_power_hub_2$§! 기술을 필요로 합니다."
 ap_self_aware_colony_req_4:0 "$TRIGGER_FAIL$£society£ §Y$tech_food_processing_2$§! 기술을 필요로 합니다."
 ap_self_aware_colony_req_5:0 "$TRIGGER_FAIL$£engineering£ §Y$tech_mineral_purification_2$§! 기술을 필요로 합니다."
 ap_self_aware_colony_tooltip:0 "\n§H결정 잠금 해제:§! $ap_self_aware_colony$. \n$decision_self_aware_colony_tooltip$\n"
 ap_slow_learner:0 "대기만성"
 ap_slow_learner_desc:0 "본능이란 참으로 무서운 것입니다. 그 누구도 우리가 은하계 정복을 서둘러야 한다고 말한적이 없는데, 그렇게 하고 있는 것을 보면 말입니다. 너무 서두르다 보면 큰 실수를 저지르기 쉬워지는 법입니다."
 ap_slow_learner_tooltip:0 "\n§H기능 잠금 해제:§! 또 다른 시간에\n다른 것들과 비교해 특별한 효과가 없는 그 상승 특성을 잠금 해제함으로써 당신은 희생을 했지만, 헛된 희생은 아닙니다. 당신의 인내 덕분에 새로운 상승 특성 슬롯이 자동으로 시간이 지남에 따라 잠금 해제되며, 전통 트리를 완료할 필요가 없습니다. 다음 지연 시간에 따라 총 4개의 새로운 슬롯을 받게 됩니다: §Y10§!, §Y25§!, §Y50§! 및 §Y100§! 년마다 각각 선택할 수 있는 작은 보너스와 함께 §Y2000-6000 £unity£ 유니티§!. $perk_more_slots$"
 ap_space_domestication:0 "우주 가축화"
 ap_space_domestication_desc:0 "우리는 여행 중 만난 우주 생명체 중 하나를 길들이고 domesticate하려고 합니다. 처음 보았을 때 다른 행성에 사는 동물들과는 크게 다르지 않다는 사실이 드러났기 때문입니다. 이 방법이 최선은 아닐지 모르지만, 적어도 우리의 제국을 위해 그들의 존재에 목적을 부여할 수 있을 것입니다."
 ap_space_domestication_req_1:0 "$TRIGGER_FAIL$§Y$tr_domination_finish$§!이(가) 필요합니다."
 ap_space_domestication_req_2:0 "$TRIGGER_FAIL$£physics£ §Y$tech_power_plant_3$§! 기술을 필요로 합니다."
 ap_space_domestication_req_3:0 "$TRIGGER_FAIL$£society£ §Y$tech_nano_vitality_crops$§! 기술을 필요로 합니다."
 ap_space_domestication_req_4:0 "$TRIGGER_FAIL$£engineering£ §Y$tech_mining_3$§! 기술을 필요로 합니다."
 ap_space_domestication_tooltip:0 "§H기능 잠금 해제:§! 우주 가축화 \n전쟁, 자원 생산, 민간 활동과 같은 특정 목적을 위한 외계인의 배양을 허용합니다. 승격 특전이 활성화 되면 우주에 존재하는 외계 종의 한 종족만을 선택할 수 있습니다. \n\n§H시행령 잠금 해제:§! $edict_space_domestication_menu$. $ap_subject_compatibility$"
 ap_space_engineers:0 "우주 공학"
 ap_space_engineers_desc:0 "우리는 항성 기지 공학의 이해에 있어서 지식의 한계를 돌파했습니다. 이제 우리는 우리의 방어망을 뚫기 위해 적들이 전략을 다시 짜는 찰나의 순간에도 항성 기지를 변화 시킬 수 있는 가능성을 열었습니다. 가장 큰 위기 속에서도 우리 우주 공학자들은 항성 기지 모듈을 신속히 재적응 시킬 준비가 되어 있을 것 입니다."
 ap_space_engineers_instruction:0 "새로운 §YCitadel§!을 만들고자 하는 시스템으로 §YConstruction Ship§!을 먼저 이동시켜야 $SPECIAL_PROJECT_TOOLTIP$이(가) 발동됩니다. 함선이 위치에 도착하면 제국 칙령 메뉴에서 $edict_enable_spacen_engineers_project$를 발동하십시오. §YConstruction Ship§!에게 조금 이동하라고 명령하기만 하면 $SPECIAL_PROJECT_TOOLTIP$이(가) 발동됩니다."
 ap_space_engineers_req_1:0 "$TRIGGER_FAIL$£engineering£ §Y$tech_starbase_5$§! 기술을 필요로 합니다."
 ap_space_engineers_req_2:0 "$TRIGGER_FAIL$ £engineering£ §Y$tech_advanced_metallurgy_2$§! 기술이 필요합니다."
 ap_space_engineers_req_3:0 "$TRIGGER_FAIL$§Y$ap_eternal_vigilance$§! 승격 특전을 필요로 합니다."
 ap_space_engineers_req_4:0 "$TRIGGER_FAIL$§Y$ap_grasp_the_void$§! 승격 특전을 필요로 합니다."
 ap_space_engineers_tooltip:0 "\n\n§H기능 잠금 해제:§! 우주 공학 \n원하는 모든 곳에 완전히 무장된 §Y항성 성채§!를 건설할 수 있도록 허용합니다. $ap_space_engineers_instruction$. \n\n§H시행령 잠금 해제:§! $edict_enable_spacen_engineers_project$"
 ap_space_merchant:0 "민간 은하 시장"
 ap_space_merchant_desc:0 "현재의 공공 은하시장에서 일어날 수 있는 물가 인플레이션에 굴복하지 않기 위해, 모든 문명에 존재하는 부유한 우주 상인들이 상품 가격을 아주 흥미로운 방식으로 다룰 수 있는 그들만의 민간 은하 시장을 형성하기 위해 모였습니다."
 ap_space_merchant_req_1:0 "$TRIGGER_FAIL$§Y$tr_prosperity_finish$§!이(가) 필요합니다."
 ap_space_merchant_tooltip:0 "\n§H기능 잠금 해제:§! $ap_space_merchant$\n매 2년마다 PGM 우주 상인과 특별 거래를 통해 £energy£ $energy$를 고정 가격으로 공공 은하 시장에 도전하는 자원으로 교환할 수 있습니다. 추가 기술을 연구함으로써 시장의 더 전문화된 분야에 접근할 수 있게 되어, 당신은 노예, 로봇, 군대, 심지어 함선까지 구매할 수 있습니다."
 ap_stability_celebration:0 "안정 기념일"
 ap_stability_celebration_desc:0 "우리의 안정적인 통치 스타일은 제국 전역의 팝들에게 영감을 주고 기쁨을 줍니다. 우리 인구는 행정적 성과를 기리기 위해 전체 축제를 조직하기에 이르렀습니다. 그들은 정부가 거의 완벽한 조건에서 번영하는 삶을 유지하는 임무를 완벽하게 수행한 것에 대한 응답으로 깜짝 세리머니를 시작했습니다. 이제부터 적절한 조건을 갖춘 모든 행성은 그들의 번영하는 제국을 기리기 위해 축제를 조직할 기회를 가지게 될 것입니다."
 ap_stability_celebration_tooltip:0 "\n§H기능 잠금 해제:§! 안정성 축하\n소유한 모든 행성이 최소 §Y20 팝§! £pops£, §Y55 안정성§! £stability£, §Y20 미만의 범죄§! £crime£, §Y무료 편의시설§! £amenities£, §Y무료 주택§! £housing£ 및 §Y무료 일자리§! £job£를 갖추고 있다면, 해당 행성을 잘 관리한 제국을 기리기 위한 의식을 조직할 수 있습니다."
 ap_stellar_manipulation:0 "천체 조작"
 ap_stellar_manipulation_desc:0 "우리 제국의 미래는 더 이상 단순히 국경의 한계가 아닌 우리 종족의 지식에 의해 결정될 것 입니다. 우리는 새로운 천체를 형성하기 위해 우주의 모든 물질을 조작할 수 있는 가능성을 열어 놓았습니다. 새로운 행성을 만들어 냄으로써 우리 영토에 존재하는 미사용 공간을 완벽하게 관리할 수 있게 될 것 입니다."
 ap_stellar_manipulation_failed:0 "§B$UniqueAscensionPerksEvents.11.Name$:§!는 고장이나 프로젝트를 완료할 시간이 부족하여 실패했습니다. 결국 결과는 우리가 예상했던 것과 다를 것입니다."
 ap_stellar_manipulation_instruction:0 "새로운 §Y항성체§!를 생성할 시스템으로 §Y건설선§!을 먼저 이동시켜야 $SPECIAL_PROJECT_TOOLTIP$를 발동할 수 있습니다. 귀하의 선박이 위치에 도착하면 제국 칙령에서 $edict_enable_planetary_project$를 발동하고, §Y건설선§!에게 조금 이동하라고 명령하여 $SPECIAL_PROJECT_TOOLTIP$를 발동하십시오."
 ap_stellar_manipulation_req_1:0 "$TRIGGER_FAIL$£society£ §Y$tech_volcano$§! 기술을 필요로 합니다."
