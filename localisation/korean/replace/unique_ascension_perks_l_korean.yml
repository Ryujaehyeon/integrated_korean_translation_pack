 anti_matter_dark_physics_desc:0 " "
 anti_matter_desc:0 "이 희귀한 물질은 대량 생산할 수 없지만, 제국이 §H$anti_matter$§!의 비밀을 마스터하면 곧 이 귀중한 자원을 다루는 새로운 방법을 열 수 있다는 확신을 가질 수 있습니다. 반물질은 §HEnergy§! £energy£ 또는 §HDark Matter§! £sr_dark_matter£로 쉽게 변환될 수 있지만, 그 희귀성 때문에 보통 함선에만 사용됩니다."
 anti_matter_energy:0 "£anti_matter£ §B반물질§! - 에너지 발전"
