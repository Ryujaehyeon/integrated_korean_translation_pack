 UniqueAscensionPerksEvents.441.DESC_TITLE:0 "$decision_deep_scanner$이 §H$PLANET|Y$§!에서 준비 되었습니다."
 UniqueAscensionPerksEvents.441.Desc:0 "§H[Root.GetName]§! 행성에서 심우주 스캔을 다시 사용할 준비가 되었습니다."
 UniqueAscensionPerksEvents.441.Name:0 "§H[Root.GetName]§!에서 $decision_deep_scanner$ 준비됨"
