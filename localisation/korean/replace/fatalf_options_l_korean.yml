l_korean:
 dmm_mod_fatalf:0 "$edict_fatalf_manager$"
 fatalf.003.a:0 "맛있군!"
 fatalf.004.a:0 "어디서 온 거지?"
 fatalf.005.a:0 "광물로 채굴하라."
 fatalf.006.a:0 "안타까운 일이군."
 fatalf.008.a:0 "피해가 너무 크지 않았기를 바라자."
 fatalf.009.a:0 "꽤 이상하군."
 fatalf.010.a:0 "수학적 신호다."
 fatalf.010.b:0 "즐거운 노래의 연속이다."
 fatalf.010.c:0 "사랑스러운 이야기다."
 fatalf.010.d:0 "전쟁의 함성이다."
 fatalf.010.e:0 "우리 종족에 대한 묘사다."
 fatalf.010.f:0 "쓸모 있는 것은 없지만, 그래도 탐사정을 추적해 보라."
 fatalf.010.g:0 "아무것도 아니다. 시간 낭비다."
 fatalf.011.a:0 "아는 것이 힘이다"
 fatalf.020.a:0 "이 행성들을 찾아야 한다."
 fatalf.020.b:0 "그저 의미 없는 헛소리일 뿐이다."
 fatalf.022.a:0 "조사할 함선을 보내라."
 fatalf.0301.a:0 "좋은 징조는 아니군..."
 fatalf.0302.a:0 "저들을 막아야 한다!"
 fatalf.0303.a:0 "우리는 압도당하지 않을 것이다!"
 fatalf.0304.a:0 "마지막 하나까지 파괴해야 한다!"
 fatalf.054.a:0 "이 문제를 해결해야 한다."
 fatalf.057.a:0 "기계를 최대 출력으로 가동하라."
 fatalf.057.b:0 "기계를 그대로 두고 그 영향을 연구하라."
 fatalf.057.c:0 "기계를 해체하라. 계속 작동하게 둘 수 없다."
 fatalf.060.a:0 "기다리며 상황을 지켜보자."
 fatalf.060.b:0 "죽여라. 좋은 일일 리가 없다."
 fatalf.061.a:0 "무엇을 주든 받아들이겠다."
 fatalf.061.b:0 "현명하지 못한 일이다."
 fatalf.064.a:0 "우리는 올바른 선택을 했다."
 fatalf.071.a:0 "어떻게 여기까지 왔나?"
 fatalf.071.b:0 "우리 국민은 이곳에 자리를 얻을 것이다."
 fatalf.071.b.tip:0 "[lost_country.GetName]의 구성원이 우리의 수도에 정착합니다."
 fatalf.071.c:0 "우리 식민지에 보급품을 제공할 수 있다."
 fatalf.071.d:0 "너희는 우리의 관심사가 아니다. 원하는 대로 하라."
 fatalf.071.d.tip:0 "[lost_country.GetName]은 독자적인 길을 나설 것입니다."
 fatalf.071.e:0 "너희가 이 은하에 있을 자리는 없다."
 fatalf.071.e.tip:0 "그들의 함선에 발포하라!"
 fatalf.073.a:0 "올바른 결정이었다."
 fatalf.074.a:0 "꽤 이상하군."
 fatalf.075.a:0 "열 방법을 찾을 수 있을 것이다."
 fatalf.075.b:0 "그건 전부 환각에 불과했으니 잊어버려라."
 fatalf.076.a:0 "서둘러야 한다!"
 fatalf.078.a:0 "우리는 기회를 놓쳤다."
 fatalf.079.a:0 "그들을 기리겠다."
 fatalf.1001.a:0 "대체 무엇일까?"
 fatalf.151.b:0 "걱정되는군."
 fatalf.161.a:0 "꽤 걱정되는군."
 fatalf.162.a:0 "누가 이런 일을 하고 있는 거지?"
 fatalf.171.a:0 "대체 무엇일까?"
 fatalf.171.b:0 "방어를 준비하라!"
 fatalf.177.a:0 "끔찍하게 안타깝지만, 완전히 손해만은 아니었을지도 모른다."
 fatalf.259.a:0 "알아두면 좋겠군. 계속 보고하라."
 fatalf.259.b:0 "새 정보를 모두 기록으로 옮겨라."
 fatalf.259.b.tip:0 "새 임시 초공간로 경보가 표시되지 않습니다."
 fatalf.400.accept:0 "거래를 하지."
 fatalf.400.decline:0 "그러지 않는 편이 좋겠다."
 fatalf.411.accept:0 "뭐, 네가 그렇다면야."
 fatalf.900.a:0 "§R높은 불안정성§!"
 fatalf.900.b:0 "§Y보통 불안정성§!"
 fatalf.900.c:0 "§G낮은 불안정성§!"
 fatalf.900.d:0 "£mod_unknown£ §Y$RANDOM$§! 과성장 위기 - §Y$ACTIVE$§! £trigger_yes£"
 fatalf.900.e:0 "£trigger_no£ 과성장 위기 - §R$NOT_ACTIVE$§!"
 fatalf.900.f:0 "£mod_unknown£ §Y$RANDOM$§! $lgate$ 교란 - §Y$ACTIVE$§! £trigger_yes£"
 fatalf.900.g:0 "£trigger_no£ §Y$lgate$§! 교란 - §R$NOT_ACTIVE$§!"
 fatalf.900.i:0 "보장된 $lgate$ 교란 - §G$ACTIVE$§! £trigger_yes£"
 fatalf.900.i.tip:0 "샘, 이건 널 위한 거야."
 fatalf.900.j:0 "보장된 과성장 위기 - §G$ACTIVE$§! £trigger_yes£"
 fatalf.900.k:0 "£mod_unknown£ 역병 위기 £resource_menace_grey£ - §Y$RANDOM$§!"
 fatalf.900.k.tip:0 "£resource_menace£ 역병 위기 $DISABLE$ £trigger_no£"
 fatalf.900.l:0 "£trigger_no£ 역병 위기 £resource_menace_grey£ - §R$NOT_ACTIVE$§!"
 fatalf.900.l.tip:0 "£resource_menace_grey£ 역병 위기 $ENABLE$ £trigger_yes£ (§R베타§!)"
 fatalf.900.m:0 "보장된 역병 위기 £resource_menace_grey£ - §G$ACTIVE$§! £trigger_yes£"
 fatalf.900.n:0 "역병 위기 £resource_menace_grey£ - §G$ACTIVE$§! £trigger_yes£"
 fatalf.900.o:0 "£trigger_no£ 역병 위기 발생함 £resource_menace_grey£ - §R$NOT_ACTIVE$§!"
 fatalf.900.x:0 "§Y$CLOSE$§!"
 fatalf_anomaly.001.a:0 "이 기계들은 중요할지도 모른다. 해제를 시도하라."
 fatalf_anomaly.001.b:0 "너무 위험하다. 당장 빠져나와라!"
 fatalf_anomaly.002.a:0 "훌륭하군. 이 기계들을 연구하자."
 fatalf_anomaly.003.a:0 "그들은 최선을 다했다."
 fatalf_anomaly.004.a:0 "위험을 감수할 만한 가치는 없었다."
 fatalf_anomaly.005.a:0 "주의하되, 탐사하라."
 fatalf_anomaly.005.b:0 "여기서 빠져나가자. 거대한 외계 괴물은 농담거리가 아니다!"
 fatalf_anomaly.007.a:0 "비극적인 손실이다."
 fatalf_anomaly.008.a:0 "훌륭한 작업이다."
 fatalf_anomaly.009.a:0 "대체 무슨 의미가 있을까?"
 fatalf_anomaly.010.a:0 "무엇이 저런 일을 일으켰을까?"
 fatalf_anomaly.011.a:0 "켜 보라."
 fatalf_anomaly.011.b:0 "그대로 작동하게 두라."
 fatalf_anomaly.012.a:0 "은하 저편으로 이어지는 새로운 웜홀이다!"
 fatalf_anomaly.013.a:0 "참으로 안타깝군."
 fatalf_anomaly.014.a:0 "순전한 우연이겠지?"
 fatalf_anomaly.015.a:0 "어떻게 파괴되지 않고 남아 있었지?"
 fatalf_anomaly.101.a:0 "탐사할 인원을 들여보내야 한다."
 fatalf_anomaly.101.b:0 "별 쓸모는 없을 듯하다."
