l_korean:
 mem_plants_vs_zombies_site:0 "고대의 전장들"
 mem_plants_vs_zombies_site_desc:0 "[From.Planet.GetName]는 겉보기에는 생명체를 지지하지 않았던 것처럼 보이지만, 전투 장소로 가득 차 있습니다. 더 가까운 조사가 약 5천 년 전 이곳에서 발생한 전투의 원인에 대한 단서를 제공할 수 있을 것입니다."
 mem_plants_vs_zombies.1.name:0 "외로운 요새들"
 mem_plants_vs_zombies.1.desc:0 "모든 전투 지역은 중무장한 요새를 중심으로 형성되어 있으며, 모든 증거에 따르면 결국 공격자들에 의해 점령되었습니다. 놀라운 점은 조사된 요새들 중 어느 것도 전략적 중요성이 없어 보이며, 만약 있었다면 지금 우리에게는 명확하지 않다는 것입니다.\n\n각각의 지휘 구조가 파괴되고 부분적으로 잔해와 모래 아래에 묻혀 있는 상태에서, 다양한 지역에서 발굴 작업이 계속되고 있습니다."
 mem_plants_vs_zombies.1.a:0 "진행하도록."
 mem_plants_vs_zombies.2.name:0 "중간 보고"
 mem_plants_vs_zombies.2.desc:0 "발굴 현장 중 하나에서 주요 돌파구가 보고되었습니다. 이전 지휘관 벙커의 폐허에서 부분적으로 온전한 데이터 코어가 발견되었습니다. 그 내용의 대부분은 손상되었지만, 남아 있는 파일 중 하나인 요새의 지휘관이 작성한 마지막 보고서는 그곳에서 무슨 일이 있었는지에 대한 더 깊은 통찰을 제공합니다. 번역된 기록은 다음과 같습니다:\n\n§S23일 1번째 씨앗, 주기 5376\n가을의 지휘관 리프스, 2차 원정대, 요새 F27, 다루반 황무지 C5 구역 배치\n비료의 공격이 점점 더 강해지고 있습니다. 초기 파도는 쉽게 처리할 수 있었지만, 적의 수는 기하급수적으로 증가하고 있습니다. 그들이 계속 움직이는 이유는 알 수 없습니다. 이전에 많은 인간형 생물을 보았지만, 그들처럼 회복력이 뛰어나고 자기 보존이 결여된 것은 없었습니다. 한 마리가 포탄에 의해 반으로 찢어졌지만 여전히 우리 진영으로 기어오다 감각 기관에 타격을 받았습니다. 그 이후로 모든 인원에게 그 부위를 겨냥하라고 지시했습니다.\n공격 간격은 몇 분에서 몇 주까지 다양하며, 명확한 패턴은 없습니다.\n물자는 안정적이며 다음 예정된 보급까지 지속될 것으로 예상됩니다.\n고객의 명령에 따라 통신을 침묵하고 있습니다.\n>> 녹음이 중단되고 재시작됨 <<\n정찰병들이 또 다른 비료의 공격이 임박했다고 보고했습니다. 지금까지 본 것 중 가장 큽니다... 승리의 가능성은 희박해 보이지만, 제 명예를 걸고, 우리의 명령은 이 바위를 지키는 것이며, 필요하다면 마지막 식물까지 그렇게 할 것입니다.§!\n\n이 보고서에 따르면 요새를 방어하는 군사력은 계약된 식물형 용병이었습니다. 그들의 존재 이유는 여전히 우리를 피하고 있습니다."
 mem_plants_vs_zombies.2.a:0 "비료?"
 mem_plants_vs_zombies.3.name:0 "역설적 기록들"
 mem_plants_vs_zombies.3.desc:0 "다양한 주둔지에서의 추가 발굴 작업은 우리의 탐사대에 질문을 더 많이 남겼습니다. 여러 지휘 벙커에서 발견된 회수된 파일에 따르면, 이 모든 주둔지는 가을의 지휘관 리프스의 직접적인 지휘 아래 있었던 것으로 보이지만, 매번 다른 군사 지명 아래에서였습니다.\n\n[leader.GetName]는 이러한 모든 것에 대해 어떻게 생각해야 할지 확신이 없습니다. 모순이 쌓여가고 있기 때문입니다. 개인 기록이 수집된 기간은 50년 이상으로 보입니다. 그러나 일관된 그림은 형성되지 않는 것 같습니다. 동시에 여러 임무에 대한 보고가 있으며, 각 임무가 이 행성에서 첫 번째라는 반복적인 주장도 있습니다. 기록은 또한 각 임무가 결국 마지막 저항과 같은 적에 의해 각 주둔지가 파괴되는 것으로 끝났음을 시사합니다.\n\n조사가 막다른 골목에 다다르자, [leader.GetName]는 방어 구조물이 무엇을 보호했을지에 대한 초점을 전환할 것을 제안합니다. 또 다른 행성 스캔이 이 미스터리를 해결하는 새로운 접근 방식을 제공할 수 있을 것입니다."
 mem_plants_vs_zombies.3.a:0 "그리하도록"
 mem_plants_vs_zombies.4.name:0 "집에 아무도 없음"
 mem_plants_vs_zombies.4.desc:0 "행성 표면에 대한 보다 철저하고 시간 소모적인 스캔을 통해 잘 숨겨진 지하 벙커 복합체가 드러났습니다.\n\n봉인된 입구를 열자 탐사 팀은 대부분 비어 있는 방과 복도에 맞이하게 됩니다. 이곳을 사용했던 이들이 운영이 중단된 후 질서 관리 노예처럼 떠난 것으로 보입니다. 남아 있는 유일한 기술은 벙커 구조물에 통합되어 있어 제거가 불가능한 것으로 보입니다. 그 중에는 구조물의 주요 컴퓨터 시스템이 포함되어 있지만 모든 메모리 뱅크는 삭제되었습니다. 그럼에도 불구하고 충분한 시간과 노력을 들이면 원래 포함되어 있던 데이터의 일부 조각이 복원될 수 있을 것입니다.\n\n지금까지 우리가 배운 바에 따르면, 이 벙커는 일종의 감시소였던 것으로 추정됩니다. 이는 이 시설과 알려진 전투 현장 근처의 관측 지점을 연결하는 지하 케이블의 발견으로 뒷받침되는 이론입니다."
 mem_plants_vs_zombies.4.a:0 "계속 진행하라."
 mem_plants_vs_zombies.5.name:0 "복제들"
 mem_plants_vs_zombies.5.desc:0 "기억 은행을 복원하는 것은 처음 예상했던 것보다 덜 어려웠습니다. 이전 소유자들이 반쯤만 데이터를 삭제한 것으로 보이지만, 복원된 데이터가 대부분 암호화되어 있다는 점에서 정보 보안에 대해서는 별로 신경 쓰지 않았던 것 같습니다.\n\n어쨌든, 우리의 해독 전문가들은 이미 작업을 시작했습니다. 첫 번째 배치의 해독된 파일은 이 기지의 운용원들이 최소 두 개의 별도 세력과 빈번하게 소통했음을 밝혀냈습니다. 그 중 하나는 식물형 용병 본부로 드러났습니다. 우리의 과학자들에게 이전 발견과 관련하여 놀라운 사실은, 로그에 따르면 용병들은 클론 군대를 제공하는 전문 계약자였으며 행성 전역의 요새를 방어하기 위해 고용되었다는 것입니다.\n\n다른 연락처는 아직 확인되지 않았지만, 이들도 행성에서 활동했던 것으로 보입니다. 통신 로그는 그들과 용병들이 장기 작전에 참여하고 있었음을 시사합니다."
 mem_plants_vs_zombies.5.a:0 "진행하도록."
 mem_plants_vs_zombies.6.name:0 "식물류 VS 망령류"
 mem_plants_vs_zombies.6.desc:0 "우리의 해독 팀이 돌파구를 보고했습니다. 이전에 확인되지 않은 접촉은 자신들을 아라멘의 사령술사라고 부르는 군사 종교 단체였습니다. 이들 네크로이드와의 통신은 주로 언제 어디에 그들의 언데드 군대나 사망한 노예의 선적을 보내야 하는지에 관한 것이었습니다.\n\n[leader.GetName]는 두 진영이 같은 의뢰인의 요청에 따라 행동했기 때문에 이 조정된 "전쟁"에 대해 어떻게 생각해야 할지 확신하지 못하고 있습니다. 사실, 기지 직원 간의 내부 메모는 그들이 전쟁의 목적을 알지 못했다는 것을 보여줍니다. 결국 그들은 그들 스스로 중재자에 불과했으며, 그들의 의뢰인도 우리에게처럼 여전히 모호했습니다. 그들의 추측은 이 모든 작전이 귀족의 게임일 수도 있고 비밀 군사 연구일 수도 있다는 것까지 다양했습니다.\n\n진실이 무엇이든, 이 세계에서 벌어진 수많은 전투의 복구된 데이터는 분명히 우리의 군사 교리를 개선하는 데 도움이 될 것입니다."
 mem_plants_vs_zombies.6.a:0 "응? 게임?"
 mem_last_stand_doctrine:0 "최후의 저항 교리"
