l_korean:
 reliquary_system_initializer_NAME:0 "백 투 더 퓨처"
 reliquary_system_initializer_DESC:0 "크고 작은 두 개의 유물 위성(size 11 and 1)과 §Y유물 행성§L(size 26)이 있는 최대 크기의 삼중성계에서 시작합니다.\n\n$system_initializer_DESC$"
 origin_reliquary:0 "백 투 더 퓨처"
 origin_reliquary_desc:0 "이 문명은 한때 엄청난 기술적 발전을 이루어내 행성의 위성에 식민지를 세우는 데에 성공했습니다. 하지만 그들의 기술은 태양에서 발생한 태양풍이 행성을 덮쳤을 때 모든 전자기기들과 함께 역사 속으로 사라졌습니다. 그저 조상들의 위대한 업적에 대한 이야기만이 전해져 내려왔습니다. 많은 시간이 지난 뒤, 과학자들은 마법 따윈 설명 불가능한 기술에 불가하다는 것을 다시 깨달았습니다."
 origin_tooltip_reliquary_effects:0 "크고 작은 두 개의 유물 위성(size 11 and 1)과 §Y유물 행성§W(size 26)이 있는 최대 크기의 삼중성계에서 시작합니다."
 d_hydroponic_farms:0 "수경재배 농장"
 d_hydroponic_farms_desc:0 "이 비닐하우스들과 넓은 밭은 먼 옛날부터 이 행성의 주민들을 먹여 살려왔습니다. 이제 대부분 사용 불가능한 상태지만 여전히 음식을 조금 생산합니다."
 origin_egg:0 "달걀 껍데기의 위에서"
 origin_egg_desc:0 "설명 불가능한 지진들이 우리 행성을 수 세기 동안 뒤흔들었습니다. 우리 행성을 내부로부터 먹어 치우는 거대한 뱀에 대한 전설이 옛부터 내려왔습니다. 설마 전설이 사실일까요?"
 origin_tooltip_egg_effects:0 "§Y보이드스폰§W이 고향 행성 내에서 자라고 있는 상태로 시작합니다.§ 이를 성장하면 §W제국 수도§를 §R파괴§할 것입니다.\n\n당신은 게임 시작 시 보이드스폰이 깨어나는데 걸릴 시간을 정할 수 있습니다. 1년 후의 확실한 죽음부터 100년간의 고생길까지 선택할 수 있습니다."
 emo.2.title:0 "기원 추가: 달걀 껍데기의 위에서"
 emo.2.desc:0 "행성의 지각 아래에 위치한 알이 깨어나는데 필요할 시간을 고릅니다.\n\n이는 이벤트 체인의 시작을 의미하며 행성과 식민지는 약 1년 뒤에 파괴될 것입니다.\n\n각 선택지의 색은 당신의 생존 확률을 예상하는 것입니다. 첫 몇 개는 새 행성을 빠르게 찾아 정착하지 못한다면 거의 확실히 불가능합니다.  마지막은 그냥 먼 미래에 보이드스폰과 싸워서 이기고 싶을 경우를 위해 존재합니다. 정착하지 못한 식민지에는 이주할 수 없으므로 5년 이하의 기간은 모든 인구의 죽음이 확실합니다."
 emo.2.option.oneyear:0 "§R1년§"
 emo.2.option.oneandahalfyears:0 "§R1.5년§"
 emo.2.option.twoyears:0 "§P2년§"
 emo.2.option.threeyears:0 "§P3년§"
 emo.2.option.fouryears:0 "§S4년§"
 emo.2.option.fiveyears:0 "§S5년§"
 emo.2.option.sevenyears:0 "§H7년§"
 emo.2.option.tenyears:0 "§Y10년§"
 emo.2.option.fifteenyears:0 "15년"
 emo.2.option.twentyfiveyears:0 "25년"
 emo.2.option.hundredyears:0 "§G100년§"
 origin_hive:0 "생태계와의 융화"
 origin_hive_desc:0 "이 군집은 인식이 가능한 주변 환경을 이해하는 데에 성공했습니다. 현재 고향 행성과 하나가 되었습니다."
 origin_tooltip_hive_effects:0 "§Y군체 행성§W을 모성으로 §W시작합니다."
 origin_eldest_sibling:0 "맏형제"
 origin_tooltip_emo_eldest_sibling_effects:0 "모성계에서 최대 §Y2개의 다른 원시 문명§!과 함께 시작합니다. 그들이 당신의 종일지 무작위로 생성된 종일지 선택할 수 있습니다."
 origin_eldest_sibling_desc:0 "이 사회는 같은 성계 내에 존재하는 두 개의 행성에 많은 관심을 가져왔습니다. 망원경의 발명 후 과학자들은 그 둘 중 적어도 하나에는 생명이 존재한다는 것을 확인했습니다! \n옛 전설은 단순한 이야기가 아니었던 것으로 보이며, 우리 모두 중 처음으로 우주에 발을 딛습니다."
 START_SCREEN_ELDEST_SIBLING:0 "망원경이 발명 되기 전부터 우리는 형제 문명에 대한 이야기를 오래전부터 알고 있었습니다. 시간은 그들의 기원이 미스터리로 가려진 채 계속 흘렀습니다. 그리고 수세기 동안은 우리 모성의 안락한 곳에서 그들을 관찰하는 것이 정보를 수집할 수 있는 유일한 방법이었습니다.\n\n통신의 발달과 함께 야심 찬 과학자들이 그들에게 연락을 시도하기까지는 그리 오래 걸리지 않았습니다. 첫 번째 답변은 전 세계의 관심을 모았고, 마침내 - 답변이 우리에게 도착했습니다!\n\n그 후 곧 우리는 그들이 우리에 대한 그들만의 이야기와 다른 세계로 향하는 관문에 대한 전설을 갖고 있다는 것을 알게 되었습니다. 우리가 동일한 과거를 갖고 있다는 추측에 도달했지만, 그것은 동의할 수 없었습니다.\n\n지속 가능한 우주 비행의 발견은 우리에게 그곳을 방문할 수 있는, 비교 할 수 없을 만큼 멋진 기회를 주었습니다. 이전까지의 교류는 우리 시대의 과학자들이 항상 긍정적인 방향으로 향하게끔 이끌어 왔습니다. 하지만 동시에 지금 우리 사회에는 선제공격에 대한 지지를 모으는 목소리도 있습니다!"
 emo.1.title:0 "기원 추가 : 장남"
 emo.1.desc:0 "우리 과학자들이 어떤 종류의 원시 문명을 찾았는지 선택하십시오."
 emo.1.option.sametwo:0 "우리 종족과 닮은 2개의 원시 문명."
 emo.1.option.sameone:0 "우리 종족과 닮은 1개의 원시 문명"
 emo.1.option.oneandone:0 "우리 종족과 닮은 한 가지 원시 문명, 그리고 다른 하나."
 emo.1.option.onerandom:0 "하나의 무작위 종의 1개의 원시 문명"
 emo.1.option.tworandom:0 "서로 다른 무작위 종의 2개 원시 문명."
 emo.1.option.decideyourself:0 "행성 결정을 사용하여 1년 이내에 선택하십시오."
 emo.1.option.decideyourself_desc:0 "한 해 동안 귀하의 본국 시스템 내 행성에서 원하는 만큼의 전-FTL 제국을 '발견'할 수 있습니다."
 emo_decision_discover_preftl:0 "이 행성에서 후기 FTL 제국을 발견합니다."
 emo_decision_discover_preftl_desc:0 "이것은 이 행성에 무작위의 전-FTL 제국을 생성합니다. 주의해서 사용하세요."
 emo.15.title:0 "더 많은 기원: 장자"
 emo.15.desc:0 "이 행성에서 우리의 과학자들이 발견한 원시 문명의 종류를 선택하세요."
 emo.15.option.same:0 "우리 종의 원시 문명입니다."
 emo.15.option.diff:0 "원시적인 문명으로 구성된 다른 무작위 종입니다."
 origin_emperor:0 "선택받은 자"
 origin_emperor_desc:0 "''넌 선택받은 자다. 이 세계에 균형을 가져올 넌, 은하를 위해 그 길을 계속해서 걷게 될 거다. 하지만 그래도 너의 마음이 무너지지 않게 조심하거라...''\n- 아버지의 마지막 말씀"
 origin_tooltip_emperor_effects:0 "- 통치자 시작 레벨: §G10§!$NEW_LINE$- 통치자 특성: ['concept_leader_trait_chosen', $leader_trait_chosen$]$NEW_LINE$- $GUARANTEED_RESEARCH_OPTION_STRING$ ['concept_psionic_theory', £society_research£ $tech_psionic_theory$]"
 concept_leader_trait_chosen:0 "$leader_trait_chosen$"
 concept_leader_trait_chosen_desc:0 "$THIS_LEADER_TXT$:$TABBED_NEW_LINE$- $MOD_LEADER_LIFESPAN_ADD$: §G불멸의§!\n\n§L$leader_trait_chosen_desc$§!"
 fratricide_system_initializer_NAME:0 "형제 살해"
 fratricide_system_initializer_DESC:0 "이 성계에 존재하는 §Y죽은 행성§L 은 한때 당신의 문명과 이웃했던 문명을 조용히 떠올리게 만듭니다\n\n$system_initializer_DESC$"
 origin_fratricide:0 "형제 살해"
 origin_fratricide_desc:0 "이 성계에 존재하는 죽은 행성은 한때 당신의 문명과 이웃했던 문명을 조용히 떠올리게 만듭니다. 그 이유를 당신의 역사로부터 배우고, 받아들이길 반복하십시오."
 origin_tooltip_fratricide_effects:0 "§W모성계에서 §Y죽은 행성§W을 추가로 가지고 시작합니다."
 nine_suns_system_initializer_NAME:0 "아홉 태양의 유산"
 nine_suns_system_initializer_DESC:0 "자매 은하가 우리 은하와 충돌할 때, 초대질량 블랙홀은 은하의 틈새에서 여러 별들을 떼어냈습니다. 그 별들은 모두 새로운 천체의 중심과 함께 여기까지 왔습니다. 아홉 개의 태양이 내는 빛은 끊임없이 변화하여 일광과 복사의 새로운 주기를 만들었습니다. 성계의 블랙홀 주위를 도는 파편으로 형성된 거대한 행성에선,그 악조건 속에서도 불구하고 생명체가 여전히 진화하고 있습니다.\n\n$system_initializer_DESC$"
 origin_nine_suns:0 "아홉 태양의 유산"
 origin_nine_suns_desc:0 "자매 은하가 우리 은하와 충돌할 때, 초대질량 블랙홀은 은하의 틈새에서 여러 별들을 떼어냈습니다. 그 별들은 모두 새로운 천체의 중심과 함께 여기까지 왔습니다. 아홉 개의 태양이 내는 빛은 끊임없이 변화하여 일광과 복사의 새로운 주기를 만들었습니다. 성계의 블랙홀 주위를 도는 파편으로 형성된 거대한 행성에선,그 악조건 속에서도 불구하고 생명체가 여전히 진화하고 있습니다."
 origin_tooltip_nine_suns_effects:0 "§W모성계의 초대형 §Y블랙홀§W 주변을 돌고 있는 9개의 다른 별과 함께하는 행성 §Y(size 30)§W에서 시작합니다.§Y초강력 태양풍§W은 1년 후에 도달할 것입니다."
 emo.3.title:0 "기원 추가 : 아홉 태양의 유산"
 emo.3.desc:0 "먼 별들의 빛을 관측한 결과 우리는 우리와 같은 자들은 없다는 것을 깨달았습니다. 우리 행성이 공전하는 블랙홀의 주변에는 9개의 항성들이 있고 그 영향으로 우리 행성에 생명이 번영할 수 있었습니다. 이 거대 블랙홀의 그림자 아래에서 우리 조상들은 언제나 우주로 나서는 꿈을 꾸었습니다. 현재 우리는 이 블랙홀이 언제나 여기에 있지는 않았다는 것을 압니다. 약 140억년 전 인접한 은하가 우리 은하와 충돌했으며 이 블랙홀은 그 은하의 중심에 있었던 것입니다.\n\n초광속 비행 기술이 실현되기도 전에 우리 기술자들은 역사상 유래가 없는 규모의 프로젝트를 계획했습니다. 바로 §Y버치 월드§! 계획이었습니다. 이론 물리학에 따르면 이 블랙홀 주변에 거대한 구를 건설할 수 있을 것입니다.\n이 프로젝트는 현재의 우리에게는 불가능하지만 혁신가들과 망상가들은 모두 이것만큼은 확신합니다. 이는 은하의에서 가장 빛나는 업적일 것입니다!"
 emo.3.option.birch_world_conceptualized:0 "목표로 삼을만한 것이다."
 emo.5.title:0 "기원 추가: 아홉 태양의 유산"
 emo.5.desc:0 "먼 별들의 빛을 관측한 결과 우리는 우리와 같은 자들은 없다는 것을 깨달았습니다. 각 은하의 중심은 블랙홀이나 퀘이사만 존재할 수 있을 정도로 집중된 질량이어야 한다는 오랜 이론이 있었습니다.\n그러나 우린 그 이론의 존재에도 불구하고 우리 은하에 두 개의 서로 다른 무게 중심이 있는 것처럼 보이는 이유가 항상 궁금했습니다.\n\n그 궁금증은 길지 않았습니다. 약간 더 작은 두 번째 중심에 접근하면서 그 비밀은 밝혀졌습니다. 수십억 년 전에 자매 은하가 우리 은하와 충돌했습니다. 그러나 충돌 후 헤어지는 대신에 두 은하는 합쳐졌고, 두 은하의 중심은 이제 적어도 앞으로 수십억 년 동안 계속될 반 안정 궤도에 진입했습니다.\n이 두 번째 중심은 우리가 생각했던 것보다 더 가깝게 공전하던 9개의 별을 끌어들였습니다.\n\n떠들썩한 이야기를 나누던 과학자들은 초거대질량 블랙홀에 대하여 정신 나간 계획들을 제안했습니다. 그 계획 중 하나인 §Y버치 월드§!을 건설하는 데 필요한 자금은 우리나 이전에 온 사람들이 은하계에 이미 건설한 모든 것을 능가할 것입니다."
 emo.5.sister_galaxy_discovered:0 "이것은 우리의 물리학에 대한 이해로는 묘사가 불가능합니다!"
 origin_subterra:0 "등잔 밑이 어둡다"
 origin_subterra_desc:0 "지하 깊이 당신 문명조차 존재를 모르는 지하 문명이 번영하고 있습니다."
 origin_tooltip_subterra_effects:0 "§Y지하 문명§!§W을 가진 행성에서 시작합니다.§!"
 origin_enlightenment:0 "계몽운동"
 origin_enlightenment_desc:0 "새로운 지식을 얻기 위해, 호기심을 만족시키기 위해 이 문명은 교육을 멈추지 않습니다."
 origin_tooltip_enlightenment_effects:0 "§W지도자들이 레벨이 오를 때 새로운 특성을 얻을 확률이 증가하고 하나 이상을 얻을 수 있습니다.\n지도자들은 추가적인 무작위 특성을 가지고 시작합니다.\n지도자들은 레벨이 오를 때 부정적 특성을 얻지 않습니다.§!"
 MESSAGE_ENLIGHTENED_TITLE:0 "레벨 유지"
 MESSAGE_ENLIGHTENED:0 "§H[This.GetName]§!는 지도자 레벨을 유지했습니다."
