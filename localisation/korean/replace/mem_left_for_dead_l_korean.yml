l_korean:
 mem_left_for_dead_category:0 "잿더미 속에서"
 mem_left_for_dead_category_desc:0 "[From.GetName]은(는) 추락한 우주선의 잔해와 오랜 과거의 거대한 우주 전투의 상처로 가득 차 있습니다. 잔해에 대한 예비 스캔 결과. 이상한 것이 밝혀졌습니다. 자동 방어 장치로 둘러싸인 출처를 알 수 없는 추락한 호위함이 있습니다. 충돌 반경 내에는 하나의 생명 신호가 있는 것으로 보입니다."
 mem_left_for_dead.1.name:0 "외교적 마찰"
 mem_left_for_dead.1.desc:0 "외계 생명 신호와 원거리로 소통하려는 모든 시도가 침묵으로 돌아오자, [Root.leader.GetName]는 버려진 우주선을 조사하기 위해 지상 탐사를 시작합니다. 팀은 임시 보안 경계에 들어섭니다. 탐사가 경계를 넘자마자 포탑이 [Root.leader.GetName]을 겨냥하고 조명등이 그들을 비춥니다. 외계인의 목소리가 통신 시스템을 통해 울려 퍼집니다.\n\n"URGL'GR VAR NOM GARBLE'GAAR". 외계 포탑이 총신을 회전시키기 시작하고, [Root.leader.GetName]은 서둘러 외계어를 번역하려고 합니다. "HAAG'OM RAG NAA!" 승무원의 번역 장치가 언어를 인식하고 번역을 시작합니다. "신원을 밝히시오! 당신들은 마라케시 군단의 군인인가, 아니면 미네르바 콘코르드의 요원인가? 응답할 시간은 10초입니다!" 외계인은 분명 잊혀진 전쟁의 고립된 생존자로, 여전히 전쟁이 진행 중이라고 믿고 있으며, 충성을 요구하고 있습니다!"
 mem_left_for_dead.1.hive.desc:0 "모든 원거리에서 외계 생명 신호와 소통하려는 시도는 침묵으로 돌아오고, 우리는 [Root.leader.GetName]가 이끄는 지상 탐사를 통해 버려진 우주선을 조사하기로 합니다. 탐사 드론이 임시 보안 경계에 들어서자마자, 포탑이 드론을 겨냥하고 조명등이 그들을 비춥니다. 외계의 목소리가 통신 시스템을 통해 울려 퍼집니다.\n\n"URGL'GR VAR NOM GARBLE'GAAR". 외계 포탑이 총신을 회전시키기 시작하고, 우리의 존재들은 서둘러 외계 언어를 번역하려고 합니다. "HAAG'OM RAG NAA!" 우리의 의식은 마침내 언어를 파악하고 번역을 시작합니다. "신원을 밝히시오! 당신들은 마라케시 군단의 군인인가, 아니면 미네르바 콘코르드의 요원인가? 응답할 시간은 10초입니다!" 외계인은 분명 잊혀진 전쟁의 고립된 존재로, 여전히 전쟁이 진행 중이라고 믿고 있으며, 충성을 요구하고 있습니다!"
 mem_left_for_dead.1.a:0 "우리는 미네르바 연방의 요원이다!"
 mem_left_for_dead.1.b:0 "우리는 마라케시 군단의 병사다!"
 mem_left_for_dead.1.mil:0 "죽어라, 외계종!"
 mem_left_for_dead.1.hive_devouring:0 "우리는 [Root.Owner.GetName]다. 너는 우리 식량이고."
 mem_left_for_dead.1.c:0 "우리는 [Root.Owner.GetSpeciesNamePlural]다. 평화를 위해 왔다."
 mem_left_for_dead.1.hive:0 "우리는[Root.Owner.GetName]다. 군체는 평화를 원한다."
 mem_left_for_dead.1.phobemil:0 "우리는 어... \"평화\"를 사랑한다. (거짓말)"
 mem_left_for_dead.10.name:0 "평화로운 접촉"
 mem_left_for_dead.10.desc:0 "보안 경계가 해제되며 탐사 팀이 그들의 평화로운 임무를 설명합니다. 포탑이 멈추고 조명 등이 낮아지며, 멀리서 한 인물이 지휘 다리에서 지면으로 내려옵니다.\n\n"나는 만 년 육백 사십이 년 동안 내 민족을 방어하고, 우리의 가장 신성한 유물을 보호해왔습니다. 드디어 나의 구원이 옵니다. 나는 당신들을 알지 못하지만, 외계인 여러분의 평화로운 임무는 바로 내가 내 민족을 위해 그렇게 오랫동안 싸워온 목표입니다. 내가 살던 은하는 끊임없는 전쟁 상태에 있었습니다. 고통받지 않은 지각 있는 존재는 없었습니다. 그러나 우리 중 일부는 더 의미 있는 존재를 갈망했기에, 우리는 평화롭기를 감히 선택하고 적을 파괴하는 대신 스스로를 개선하는 데 노력을 기울였습니다. 당신이 보는 대가는 - 나는 내 불로장생한 민족의 유일한 생존자입니다. 당신들이 당신의 민족을 위한 지식을 얻기 위한 임무를 계속한다면, 우리의 유산은 잊히지 않을 것입니다. 나는 생물학적 노화의 거의 근절이라는 우리 문명의 가장 위대한 업적을 당신들에게 맡깁니다."\n\n이 놀라운 주장과 함께 외계인 군인이 반짝이는 듯 보이며, 그의 몸은 천천히 분해되고 바람에 날려갑니다. [Root.leader.GetName]은 우주선의 파괴된 다리 안을 조사하고, 이상한 빛나는 구체를 가지고 돌아옵니다."
 mem_left_for_dead.10.hive.desc:0 "보안 경계가 해제되며 탐사 팀이 우리의 평화로운 임무를 설명합니다. 포탑이 회전이 멈추고 조명이 낮아지며, 멀리서 한 인물이 지휘 다리에서 지면으로 내려옵니다.\n\n"나는 만 육천 사백 이십 년 동안 내 민족을 방어하고 가장 신성한 유물을 보호해왔습니다. 드디어 나의 구원이 옵니다. 나는 당신들을 인식하지 못합니다, 외계인들이여, 당신들의 본성은 나에게 낯설지만, 당신들의 평화로운 임무는 바로 내가 내 민족을 위해 그렇게 오랫동안 싸워온 목표입니다. 내가 살던 은하는 끊임없는 전쟁 상태에 있었습니다. 고통받지 않은 지각 있는 존재는 없었습니다. 그러나 우리 중 일부는 더 의미 있는 존재를 갈망했기에, 우리는 평화롭게 살기를 감히 원하고, 적을 파괴하는 대신 스스로를 개선하는 데 노력을 쏟았습니다. 당신이 보는 대가 - 나는 내 불로장생한 민족의 유일한 생존자입니다. 만약 당신들이 당신들의 민족을 위한 지식을 얻기 위한 임무를 계속한다면, 우리의 유산은 잊혀지지 않을 것입니다. 나는 생물학적 노화의 거의 근절이라는 우리 문명의 가장 위대한 업적을 당신에게 맡깁니다."\n\n이 놀라운 주장과 함께 외계인 군인이 반짝이는 듯 보이며, 그 몸이 천천히 분해되어 바람에 날려갑니다. 우리의 드론이 배의 파괴된 다리 안을 조사하고, 이상한 빛나는 구체를 가지고 돌아옵니다."
 mem_left_for_dead.10.a:0 "이 유물의 비밀를 풀어보자!"
 mem_left_for_dead.10.spi:0 "새로운 성물이다!"
 mem_left_for_dead.10.b:0 "팔아 버려!"
 mem_unnatural_lifespan:0 "부자연스러운 수명 연장"
 mem_new_holy_relic:0 "새로운 성물"
 mem_left_for_dead.50.name:0 "교섭 실패"
 mem_left_for_dead.50.desc:0 "잘못된 대답입니다. 포탑이 빠르게 백열 플라즈마의 흐름을 발사하여 탐사 팀을 소각합니다. 생존자는 없습니다. 기지는 빠르게 셧다운 모드로 전환되며, 포탑이 지면 아래로 미끄러지고 외계 생명 신호가 모든 스캔에서 사라집니다."
 mem_left_for_dead.50.a:0 "궤도에서 터트려버리고 잔해를 회수해라."
 mem_left_for_dead.50.b:0 "사용 가능한 기술이 있는 원격으로 잔해를 조사해라."
 mem_left_for_dead.20.name:0 "기만"
 mem_left_for_dead.20.desc:0 "포탑이 회전하며 사라지고, 조명도 낮아지면서 외계인이 파괴된 우주선의 다리에서 내려옵니다. 외계인은 외계어로 말하며 탐사대에 접근하지만, "과학자"들이 지닌 많은 무기를 보고 속도를 늦춥니다. 상황은 긴장된 대치 상태로 바뀌었고, 탐사대는 추가 명령을 기다리고 있습니다."
 mem_left_for_dead.20.a:0 "속임수는 끝났다. 공격해라!"
 mem_left_for_dead.20.b:0 "때를 기다리자."
 mem_left_for_dead.30.name:0 "상처뿐인 승리"
 mem_left_for_dead.30.desc:0 "원정대가 외계인을 향해 포문을 엽니다. [Root.leader.GetName]이 외계인의 몸통에 명중시키지만, 외계인이 보안 경계를 재가동하기 전에 이루어집니다. 포탑들이 땅속에 숨겨져 있던 곳에서 다시 나타나며, 백열의 플라즈마를 쏟아내기 시작합니다. [Root.leader.GetName]은 쓰러지지만, 나머지 부대는 포탑을 무력화하고 경계를 확보하는 데 성공합니다.\n\n[Root.leader.GetName]의 시신은 배로 옮겨지고, 해당 지역은 유용한 자재를 위해 수색됩니다. 군인 중 한 명이 버려진 배에서 이상한 빛나는 물체를 가지고 돌아옵니다."
 mem_left_for_dead.30.hive.desc:0 "원정대가 외계인을 향해 포문을 엽니다. [Root.leader.GetName]이 외계인의 몸통에 명중시키지만, 외계인이 보안 경계를 재가동하기 전에 이루어집니다. 포탑들이 땅속에 숨겨져 있던 곳에서 다시 나타나며, 백열의 플라스마를 쏟아내기 시작합니다. 우리의 부대는 포탑을 무력화하고 경계를 확보하지만, [Root.leader.GetName]을 포함한 여러 드론이 쓰러집니다.\n\n쓰러진 드론의 시신은 처리되고, 유용한 자재를 위해 지역이 수색됩니다. 우리의 드론 중 하나가 버려진 우주선에서 이상한 빛나는 물체를 가지고 돌아옵니다."
 mem_left_for_dead.30.a:0 "젠장 맞을 원정 같으니라고! 물체를 부품을 위해 분해해라!"
 mem_left_for_dead.30.mat:0 "이 물체는 보이는 것 이상일 수도 있어."
 mem_left_for_dead.40.name:0 "유물 강탈"
 mem_left_for_dead.40.desc:0 "기습을 통해 원정군은 반란 외계인과 그 미약한 방어를 신속하게 제압합니다. 함선을 수색하는 동안, 군인 중 한 명이 이상한 빛나는 구체를 발견합니다."
 mem_left_for_dead.40.hive.desc:0 "기습의 요소를 활용하여 원정군은 반란 외계인과 그 미약한 방어를 신속하게 제압합니다. 함선을 수색하는 동안, 우리의 드론 중 하나가 이상한 빛나는 구체를 회수합니다."
 mem_left_for_dead.40.a:0 "부품으로 분해해라!"
 mem_left_for_dead.40.mat:0 "이 물체는 보이는 것 이상일 수도 있어."
 mem_left_for_dead.60.name:0 "대치"
 mem_left_for_dead.60.desc:0 "원정대의 번역기는 드디어 외계인 언어를 찾아냅니다. 그는 고대 전쟁과 그의 백성의 유물에 대해 떠들고 있습니다. 돈이 되는 소리군요!"
 mem_left_for_dead.60.a:0 "충분히 들었다! 공격!"
 mem_left_for_dead.100.name:0 "실패"
 mem_left_for_dead.100.desc:0 "[Root.leader.GetName]이(가) 버려진 우주선 내부의 생명 신호를 탐색하기 시작하자, 기지는 셧다운 모드로 전환됩니다. 포탑은 지면 아래 숨겨진 위치로 무너지고, 스포트라이트는 꺼지며, 단 하나의 생명 신호는 빠르게 사라집니다. 이 외계인은 발견되기를 원하지 않는 것 같습니다."
 mem_left_for_dead.100.a:0 "어쩌면 그게 최선일지도 몰라."
