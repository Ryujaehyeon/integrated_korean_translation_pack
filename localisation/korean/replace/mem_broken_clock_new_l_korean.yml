l_korean:
 mem_broken_clock.1003.desc.lith:0 "시간은 흐르고 삶은 시들고 죽습니다. 그러나 돌은 영원합니다. 돌은 모든 것이 먼지와 재로 사라지는 동안 견딥니다.\n\n이제 아무것도 안 한다고 태어난 당신 자신의 형태를 보십시오. 썩고 부서지는 모습을 지켜보며 말입니다. 이렇게 비참한 상태로 존재하는 것이 창조 자체에 대한 신성모독이 아닙니까?\n\n당신의 비참한 존재를 바라보고 그것에 작별을 고하십시오. 돌의 우월성이 돌아와 당신의 불완전함으로 우주를 정화할 것입니다."
 MEM_NAME_broken_clock_habitat_name:0 "[PrevPrev.GetName] 거주지"
