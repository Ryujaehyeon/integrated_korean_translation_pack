l_korean:
 AnomaliesRespawnEvent.2001.Desc:0 "우리 영토의 일부 행성은 초기 조사에서 이상 징후가 전혀 나타나지 않았지만, 실제로는 우리의 과학자들이 놓친 흥미로운 이상 현상을 숨기고 있었던 것으로 보입니다."
 AnomaliesRespawnEvent.2001.Name:0 "§B새로운 이상 현상 발견§!"
 NewAnomalyEvents.100.Desc:0 "이 별의 은하 평면에 대한 회전 속도가 이전에 관측된 다른 A형 별들과 일치하지 않습니다. 긴 관측 기간 후, 승무원들은 그 전례 없는 행동을 설명하려고 했고, 과학 승무원들은 그 별의 모든 움직임이 우주에서 정지해 있는 잃어버린 세포와만 비교될 수 있다는 사실에 놀랐습니다. 이것이 우리의 우주가 무한히 클 수 있다는 증거일까요?"
 NewAnomalyEvents.100.Name:0 "세포처럼 움직이는 별"
 NewAnomalyEvents.110.Desc:0 "이 B급의 구성은 독특하며, 간단한 레이저 빔이 별 안에 이상한 열적 교란을 만들어 영구적인 흔적을 남길 수 있는 것으로 보입니다. 결국 우리의 과학자 팀은 미래의 천 년에 올 다음 세대에게 우리가 존재했으며 이러한 놀라운 과정을 발견할 만큼 고급이었다는 것을 증명하기 위해 우리 문명의 위대한 이름을 추가하기로 결정했습니다."
 NewAnomalyEvents.110.Name:0 "쓰기 가능한 항성"
 NewAnomalyEvents.111.Desc:0 "새로 발견된 항성의 사진을 우리 국민에게 보낸 후, 우리 사회의 많은 영향력 있는 인사들이 그 항성에 자신의 이름을 새기고 싶어하는 것으로 보입니다. 이 B급 항성이 만들어낸 화제는 그 과정에서 어느 정도의 영향력을 발휘할 만큼 강인했습니다."
 NewAnomalyEvents.111.Name:0 "별들의 별"
 NewAnomalyEvents.120.Desc:0 "처음에는 매우 비논리적으로 들리지만, 철저한 검토 후 우리는 이 별이 살아있는 유기체처럼 행동하고 있으며, 궤도에서 초공간 잔해를 제거하고 스스로 발생하는 엄청난 열을 견딜 수 있다는 것을 확인할 수 있습니다. 우리는 이 별이 일관된 모습을 유지하려고 시도하고 있다고 추측할 수 있지만, 그 이유는 무엇일까요?"
 NewAnomalyEvents.120.Name:0 "살아있는 항성"
 NewAnomalyEvents.130.Desc:0 "이 G형 항성 근처에서 전례 없는 강도의 미지의 물자로 구성된 버려진 에너지 수확 정거장이 발견되었으며, 이 정거장은 알 수 없는 시간 동안 비활성화된 것으로 보입니다. 우리의 과학 직원은 다시 활성화할 수 없었지만, 아마도 그 항성이 죽은 후에도 정거장을 활성 상태로 유지하기 위해 구축된 대량의 에너지원이 발견되었습니다. 이 일이 수십억 년 후에나 발생할 것이므로 우리는 그 에너지를 우리의 목적을 위해 사용하기로 결정했습니다."
 NewAnomalyEvents.130.Name:0 "에너지 정거장"
 NewAnomalyEvents.140.Desc:0 "이 K형 항성에서 매우 약한 신호가 감지되었으며, 항성 내부에 전초 기지가 발견된 것으로 보입니다. 하지만 가장 흥미로운 점은 정체불명의 종족이 내부에 있으며 우리가 오랫동안 그곳에 있는 것을 좋아하지 않는다는 사실입니다. 그들은 우리가 스타 이터, 니콜-다이슨 빔, 준항성 파괴자 및 블로캇에 대한 경고에도 불구하고 그들에게 도달하거나 해를 끼칠 수 없다고 생각하는 듯하며, 그들은 우리에게 떠나고 다시는 돌아오지 않는 대가로 흥미로운 공학 데이터를 공유하기로 결정했습니다."
 NewAnomalyEvents.140.Name:0 "공학자 내부"
 NewAnomalyEvents.150.Desc:0 "이 M형 항성 근처에서 보이지 않는 물질로 구성된 기이한 떠다니는 상자가 발견되었습니다. 놀랍게도, 이 항성에 대한 재조사 결과, 한때는 내열성이었으며 뜨겁지 않고 차갑게 타고 있었던 것으로 밝혀졌습니다! 그 외에도 이 상자는 매우 약한 보안 시스템을 갖추고 있어 쉽게 열 수 있었고, 내부에서 아름다운 보물과 기술적 경이로움, 그리고 아마도 항성이 내열성이었을 때의 세 개의 얼어붙은 인간형 시체를 발견했습니다."
 NewAnomalyEvents.150.Name:0 "얼어붙은 역사"
 NewAnomalyEvents.151.Desc:0 "이 M형 항성은 어떻게든 매력적인 자기장을 생성할 수 있으며, 이는 대부분의 광물 먼지를 포획할 수 있을 만큼 강인하여, 수확할 수 있을 정도로 큰 광물 구름을 형성합니다."
 NewAnomalyEvents.160.Desc:0 "블랙홀 근처의 매우 작은 통로에서 약한 신호가 수신되었습니다. 더 가까이 조사해본 결과, 말로 표현할 수 없을 정도로 끔찍하고 혐오스러운 무언가를 발견했습니다. 승무원들은 그 괴물이 우리 은하에 도달하려고 했다고 확신하고 있습니다. 다행히도, 우리의 과학 팀은 침착함을 유지하며 블랙홀의 에너지와 빠르게 연쇄 반응을 일으켜 그 공포의 영역과 연결된 작은 게이트를 닫는 고속 발사체를 발사하여 통로를 영원히 봉인하는 데 성공했습니다. 단 하나의 걱정스러운 왜곡된 메시지만이 통과했습니다: '음... 친구들?'"
 NewAnomalyEvents.160.Name:0 "잊혀진 재앙"
 NewAnomalyEvents.170.Desc:0 "이 펄서는 우리가 이전에 만난 대부분의 펄서보다 훨씬 크며, 그로부터 나오는 에너지는 예외적입니다. 엔지니어링 팀이 많은 에너지를 흡수할 수 있는 태양광 패널 같은 장치를 만드는 데 단 며칠밖에 걸리지 않았으며, 이제 우리는 이를 일반적인 간격으로 활용할 준비가 되었습니다."
 NewAnomalyEvents.170.Name:0 "슈퍼 펄서"
 NewAnomalyEvents.180.Desc:0 "이 항성계는 광물 먼지가 매우 풍부하지만 입자가 매우 작아 모든 것을 모으는 데 수세기가 걸릴 것입니다. 그러나 우리의 과학 팀은 흥미로운 아이디어를 떠올렸습니다: 그들은 중성자별의 자기 끌림을 이용해 광물 먼지를 끌어당길 수 있으며, 끌어당기는 필드를 자극하여 먼지를 사용 가능한 덩어리로 모을 수 있다는 것을 알고 있었습니다. 이 기술을 사용하여 우리는 방대한 양의 광물을 모을 수 있었고, 이제 수집할 준비가 되었습니다."
 NewAnomalyEvents.180.Name:0 "매력적인 이익"
 NewAnomalyEvents.190.Desc:0 "초기 조사에서 이 행성을 한때 거주했던 이전 문명의 과학적으로 가치 있는 흔적은 발견되지 않았으나, 재조사 팀에 의해 수집가들에게 높은 가격에 판매될 수 있는 아름답고 귀중한 예술 작품 몇 점이 발견되었습니다!"
 NewAnomalyEvents.190.Name:0 "재의 예술"
 NewAnomalyEvents.191.Desc:0 "우리는 여전히 활성 상태이지만 심각하게 손상된 거대한 데이터 뱅크를 발견했습니다. 불행히도 우리가 추출할 수 있었던 유일한 일관된 정보는 인구와 그들의 파벌에 영향을 미치는 특별한 방법에 대한 로그로, 이를 통해 그들을 정부의 이상에 끌어들이려는 내용이었습니다. 흥미로운 발견입니다."
 NewAnomalyEvents.191.Name:0 "조각난 정보"
 NewAnomalyEvents.192.Desc:0 "한때 번영하던 이 행성에서 대규모 재난이 발생한 것으로 보이며, 이제는 황폐해진 도시들만 남아 있습니다. 그러나 유일하게 의심스러운 것은 그들의 옷으로, 다양한 회색 음영만이 특징이며 행성의 정착지 곳곳에 흩어져 있습니다. 또한, 이 옷의 나노입자가 주입된 물자는 수천 년이 지난 지금도 영향을 받지 않는 것처럼 보이며, 주변의 물자를 이용해 손상에서 회복되는 것 같습니다. 이는 우리에게 유용할 수 있습니다. 우리가 발견한 주민들의 운명에 대한 유일한 단서는 한 시민의 봉인된 주머니에서 발견된 메모로, "태양에 의해 계몽된" "진정한 자들"이 "영혼을 먹는 나노 쓰레기"의 마지막 하나가 드러나고 파괴될 때까지 함께 단결하여 싸울 것이라고 주장하고 있습니다. 그들의 적이 누구였는지는 오늘날 알 수 없지만, 그들이 결국 멸망했음에도 불구하고 우리는 그들의 용기를 본받아야 한다는 사실은 확실합니다."
 NewAnomalyEvents.192.Name:0 "희미해진 회색"
 NewAnomalyEvents.192.a:0 "우리는 그들을 존중할 것입니다."
 NewAnomalyEvents.192.b:0 "옷을 가져가고 떠나십시오."
 NewAnomalyEvents.193.Desc:0 "이 사회의 주민들은 변동성이 큰 입자의 창의적인 활용을 기반으로 한 의료 복지 덕분에 불로장생한 유기체들보다 훨씬 긴 수명을 누리며 거의 유토피아적인 생활 수준에서 살았던 것으로 보입니다. 모든 건물을 주요 화학 공장과 연결하는 행성 전역의 파이프라인 네트워크가 있었습니다. 그러나 그들은 모든 재산을 챙길 시간도 없이 매우 빠르게 그들의 행성을 포기해야 했습니다. 우리가 그들이 남긴 모든 보물을 가져갈 수는 없으며, 밀수업자와 해적으로 보이는 여러 척선이 항로에서 목격되었습니다. 이는 그들이 여기 남아 있는 모든 것을 약탈할 것임을 의미합니다. 우리는 가능한 한 빨리 떠나야 하므로, 우리는 무엇을 할 것인가요?"
 NewAnomalyEvents.193.Name:0 "타락한 유토피아"
 NewAnomalyEvents.193.a:0 "크레딧을 가져가세요!"
 NewAnomalyEvents.193.b:0 "모든 귀중한 광물을 회수하라!"
 NewAnomalyEvents.193.c:0 "모티스를 회수하라!"
 NewAnomalyEvents.193.d:0 "밀수업자들에게 이걸 허락하지 않겠습니다. 파이프라인 네트워크를 점화하십시오."
 NewAnomalyEvents.200.Desc:0 "이 거대한 존재의 시체는 매혹적이었으며, 우리의 과학자 팀은 이 매우 이상한 생물이 어떻게 기능하는지조차 설명할 수 없었습니다. 우리가 할 수 있는 유일한 것은 생물의 골격을 분석하여 그 수명과 나이를 추정하는 것이었습니다. 그 결과, 이 생물은 10000년 이상 살아왔으며, 과학자들이 추정하기로는 꽤 큰 티얀키와의 전투에서 사망한 것으로 보입니다. 이러한 발견은 생물학에 대한 우리의 이해에 많은 도움이 될 것입니다."
 NewAnomalyEvents.200.Name:0 "고급 생물"
 NewAnomalyEvents.201.Desc:0 "우리는 생물체의 표면에서 매우 매혹적인 것을 발견했습니다: 피부는 보석에서 흔히 발견되는 것과 유사한 일종의 결정 구조로 완전히 구성되어 있는 것으로 보입니다. 이는 분해를 저항하며 나머지 몸체와 융합되어 있지만, 이러한 보석이 자연적인 것인지 아니면 우주 잔해와의 충돌 결과인지 판단하기는 어렵습니다. 결국, 발견된 내용은 결론을 내릴 수 없었고 실제 응용은 거의 불가능했으며, 우리의 과학 팀은 연구 자금을 위해 이를 채굴가에게 판매하기로 선택했습니다."
 NewAnomalyEvents.201.Name:0 "보석의 피부"
 NewAnomalyEvents.202.Desc:0 "우리는 죽은 공간 유기체 내부에서 일부 활동을 감지했습니다. 잠재적인 위험에 대한 긴 논의 끝에, 승무원들은 그것이 자유롭게 빠져나가지 않도록 내부를 확인할 수 있을 만큼 큰 구멍을 열기로 결정했습니다. 흥미로운 전개로, 내부에는 수동적인 티얀키 우주 고래 새끼들이 있다는 것이 밝혀졌습니다. 가장 흥미로운 점은 그들이 우리에게 고맙다고 인사하는 듯한 이상한 춤을 추며, 과학 선박을 따라다니기로 결정했다는 것입니다. 이는 우리가 그들의 종을 연구하는 데 도움을 줄 어미로 착각할 가능성이 있습니다."
 NewAnomalyEvents.203.Desc:0 "눈에 띄는 발견에서 우리 과학자 팀은 이 생물의 시체가 어떤 방식으로든 여전히 어느 정도 재생하고 있다는 결론을 내렸습니다! 중앙 신경계는 오래전에 기능을 멈췄지만, 몸 자체는 여전히 남아 있는 에너지 저장고를 사용하여 재생하고 있습니다. 초기 부검 시도 후, 우리 과학자들은 유사한 인공적으로 설계된 조직을 사용하여 우리의 선체를 강화할 수 있을 것으로 결론지었습니다. 이는 선체에 재생 능력을 부여할 것입니다."
 NewAnomalyEvents.202.Name:0 "티얀키스 내부"
 NewAnomalyEvents.203.Name:0 "재생하는 시체"
 NewAnomalyEvents.204.Desc:0 "어떤 버려진 초계함들이 생물체 내부에서 발견되었으며, 실제 전투는 그들이 생물체의 위장에 갇히기 전에 끝난 것으로 보입니다. 그들은 상황을 고려할 때 기적적으로 좋은 상태이며, 우리 해군에 의해 재사용될 수 있습니다."
 NewAnomalyEvents.204.Name:0 "버려진 우주선"
 NewAnomalyEvents.210.Desc:0 "천문지도에서 지정한 위치 근처에서 매우 내구성이 뛰어난 게이트가 발견되었습니다. 원시적인 보안 코드로 잠겨 있었지만, 이를 해제하는 데는 거의 노력이 필요하지 않았습니다. 천문지도는 어차피 그 코드로 안내할 것이라는 것을 쉽게 추론할 수 있었고, 그 과정에서 더 많은 연구 기회가 있을 것입니다. 우리는 원시적인 수도 건물의 유적처럼 보이는 곳에서 코드를 찾아냈고, 그 과정에서 귀중한 문명 데이터를 추출하여 무력으로 접근하지 않고도 금고에 접근할 수 있었습니다. 놀랍게도, 금고에는 은하 표준 에너지 크레딧이 저장되어 있었으며, 다소 혼란스러울 수 있지만 다른 크레딧처럼 쉽게 사용할 수 있습니다."
 NewAnomalyEvents.210.Name:0 "크레딧 금고"
 NewAnomalyEvents.211.Desc:0 "천문 지도에서 버려진 보물의 위치를 알려주었습니다. 산업적이나 과학적 응용 가능성은 없지만, 현대 시장에서는 여전히 가치가 있으며, 특히 보석과 유물 수집가들에게 인기가 있습니다."
 NewAnomalyEvents.211.Name:0 "버려진 보물"
 NewAnomalyEvents.212.Desc:0 "천문지도는 우리가 버려진 원시 구조물의 위치를 알려주었으며, 이는 일종의 로봇 공장으로 보였습니다. 그들의 문명이 최소한 한 세기 동안 이 기술 수준에 가까운 것을 개발하지 않았어야 함에도 불구하고 말입니다. 우리는 매우 조잡한 디자인의 고대 기계를 발견하였고, 이 기계는 우리 문명에서의 "체스"와 유사한 게임을 도전하였습니다. 최선을 다했음에도 불구하고 몇 차례 패배한 끝에, 우리는 마침내 이 기계를 물리쳤고, 그 보상으로 이 원시 공학자들이 어떻게 그렇게 빨리 인공 지능을 개발할 수 있었는지를 알려주는 청사진을 받았습니다."
 NewAnomalyEvents.212.Name:0 "불가능한 AI"
 NewAnomalyEvents.213.Desc:0 "우리가 발견한 천문지도는 거대한 비활성 발전소의 위치를 알려주었습니다. 이를 가동한 후 생성된 에너지는 상당하여 엔지니어 팀은 우리가 우주에서 채굴 기지를 통해 이를 활용해야 한다고 추천했습니다."
 NewAnomalyEvents.213.Name:0 "발전소"
 NewAnomalyEvents.220.Desc:0 "거대한 우주에 떠 있는 외계 생물체가 미세 초공간 웜홀에 갇혀 발견되었습니다. 알 수 없는 기원이지만 웜홀의 부정적인 영향을 분명히 받고 있었고, 생명 신호는 반연속적으로 감소하고 있었습니다. 아무 조치를 취하지 않았다면 이 생물체는 아마도 죽었고 연구 기회도 사라졌을 것입니다. 웜홀을 면밀히 조사한 결과, 승무원들은 거대한 우주에 떠 있는 외계 생물체가 적대적이지 않다고 판단하였고, 과학 선박의 그랩 훅과 스러스터를 이용해 탈출을 도와주기로 결정했습니다. 구조 작업은 승무원들에게 매우 만족스럽고 영감을 주는 일이었으며, 생물체는 이후 외계 생물학 부서의 감사의 표현으로 추정되는 화려하고 아름다운 소리로 그들에게 보답했습니다. 승무원들은 그 공연에 감동하여 움직이지 못했고, 작은 생물체가 다시 공허로 돌아갈 수 있도록 허락하며, 그들의 성취가 이 우주 지역에 미칠 잠재적 영향을 이해하려고 노력했습니다."
 NewAnomalyEvents.220.Name:0 "갇힌 외계인"
 NewAnomalyEvents.221.Desc:0 "미세 초공간 웜홀의 반대편에서 이상한 장치가 발견되었습니다. 이 물체의 주요 목적을 설명하는 것은 거의 불가능해 보이지만, 물리적 객체를 조립하기 위한 차원 에너지 및 물질 수확 장치의 일종인 것으로 보이며, 연결되어 있던 차원과의 활성 링크를 잃어버린 상태입니다. 또한, 이 장치의 부차적인 목적은 다양한 기능을 가진 다목적 도구 키트로 작동하는 것이었습니다."
 NewAnomalyEvents.221.Name:0 "이상한 장치"
 NewAnomalyEvents.222.Desc:0 "미세 웜홀의 반대편에서 아름답게 빛나는 사파이어가 발견되었습니다. 이 사파이어는 평균적인 블로그와 비슷한 크기입니다. 승무원들은 이 보석을 어떻게 또는 왜 그곳에 있게 되었는지에 대한 아이디어는 전혀 없지만, 수집할 수 있다고 판단했습니다. 분석 결과 산업적 또는 군사적 용도로는 부적합하다는 것이 밝혀진 후, 우리는 이를 채굴가에게 판매하기로 결정했습니다."
 NewAnomalyEvents.222.Name:0 "여행하는 사파이어"
 NewAnomalyEvents.223.Desc:0 "결국 미니 웜홀은 인공으로 밝혀졌고, 그 출처는 우리 공학자들이 그 사실을 깨달은 후 곧바로 발견했습니다. 먼지와 고장 난 기계로 가려진 이상한 노후 장치가 연결된 상호 연결된 융합 반응기 네트워크는 오래전에 고장났고, 남아 있는 것은 어떤 형태의 배터리 복합체뿐이어서 웜홀이 이렇게 작고 계속 줄어드는 이유를 설명할 수 있습니다. 주변 기계가 수리되거나 유용한 것으로 분석될 수 없을 정도로 손상되었기 때문에 승무원들은 나머지 에너지를 추출하기로 결정했습니다. 반쯤 고장 난 웜홀 생성기가 아무런 이유 없이 그것을 소비하는 것은 아무것도 남기지 않을 것이기 때문입니다."
 NewAnomalyEvents.223.Name:0 "미지의 생성기"
 NewAnomalyEvents.230.Desc:0 "승무원들은 마침내 외로운 컴퓨터를 해킹하는 데 성공했습니다. 수천 년이 지난 지금도 그 컴퓨터에 접속했던 사람의 세션이 여전히 열려 있는 것으로 보이며, 이는 광범위한 지하 지열 발전기 네트워크 덕분입니다. 그 중 일부는 여전히 작동하는 것 같습니다. 낡은 건설 현장이 내부의 복도를 어지럽히고 있으며, 일부는 전체 행성을 컴퓨터화하려는 시도가 있었음을 암시합니다. 이 발전기들로 전력을 공급받으려 했던 것입니다. 의도적이든 아니든, 여전히 활성화된 세션 덕분에 승무원들은 그 행성에서 사라진 종족에 대한 데이터뱅크와 이 복합체를 수년간 운영해온 지열 발전기의 작동 방식에 대한 정보를 추출할 수 있었습니다."
 NewAnomalyEvents.230.Name:0 "해킹 성공: 지열 발전기"
 NewAnomalyEvents.231.Desc:0 "승무원들은 마침내 외로운 컴퓨터를 해킹하는 데 성공했습니다. 갑자기 큰 삐걱거리는 소리가 방을 가득 채우고, 수천 년 된 먼지로 가려져 있던 거대한 격납고의 문이 천천히 그러나 확실하게 열리기 시작했습니다. 그 안에는 수없이 많은 전투 안드로이드들이 다양한 상태로 고장난 채로 누군가가 그들의 리더가 되기를 기다리고 있는 거대한 저장 공간이 있었습니다. 이 군대의 진정한 목적이 무엇인지는 아직 알려지지 않았지만, 지역의 공학 전문가들은 적어도 몇몇은 새로운 리더를 찾을 수 있을 것이라고 확신하고 있으며, 필요하다면 전투에서 우리를 도울 수 있을 것입니다."
 NewAnomalyEvents.231.Name:0 "해킹 성공: 안드로이드 군대"
 NewAnomalyEvents.231.a:0 "안드로이드 군대를 제어합니다."
 NewAnomalyEvents.231.b:0 "안드로이드 군대를 폐기합니다."
 NewAnomalyEvents.232.Desc:0 "승무원들은 마침내 고립된 컴퓨터를 해킹하는 데 성공했습니다. 언어학자와 컴퓨터 전문가로 구성된 팀은 이것이 대기 중 대기 상태로 대기 중인 여러 미공개 함선과 연결된 일종의 테라포밍 프로그램인 것 같다는 것을 확인할 수 있었습니다. 테라포밍 프로그램을 만든 종족에게 이상적인 행성이 무엇인지에 대한 단서는 없지만, 제어실에서 공기 잠금 장치나 밀폐된 "수트"의 흔적이 발견되지 않았으므로 최소한 유사한 대기 조성을 공유할 가능성이 높습니다. 승무원들은 명령을 기다리고 있습니다."
 NewAnomalyEvents.232.Name:0 "해킹 성공: 테라포밍 프로토콜"
 NewAnomalyEvents.232.a:0 "선박을 장악합니다."
 NewAnomalyEvents.232.b:0 "우주선을 폐기합니다."
 NewAnomalyEvents.233.Desc:0 "승무원들은 마침내 외로운 컴퓨터를 해킹하는 데 성공했습니다. 'Reshli Na'tak'이라는 레이블이 붙은 데이터베이스만 발견되었으며, 그 안에는 다양한 풍경과 그들의 종족 구성원이 수많은 상황에서 나타나는 놀라운 양의 홀로테이프가 담겨 있습니다. 이는 순수한 과학적 접근 방식으로 보이는 것부터 가정집으로 보이는 것까지 다양합니다. 언어 분석가들은 이 레이블이 "우리 문명"으로 가장 잘 번역될 것이라고 판단했으며, 데이터베이스는 일종의 포괄적인 문명 아카이브인 것으로 보입니다. 그들은 외계인을 사랑하는 사회였으며, 컴퓨터의 보안 시스템을 해킹할 만큼 지능적인 누구나 그들의 문명에 대해 전부 배울 수 있도록 이 시스템을 설정한 것으로 보입니다. 행성 근처의 연구 기지가 이 데이터베이스와 연결을 수립할 수 있어 팀이 궤도에서 연구를 계속할 수 있게 됩니다."
 NewAnomalyEvents.233.Name:0 "해킹 성공: 아카이브"
 NewAnomalyEvents.240.Desc:0 "용암 항성 성채 내부에서 거대한 공장이 발견되었으며, 다행히도 여전히 작동 중이며 활성화할 준비가 되어 있는 것으로 보입니다. 이 시설은 매우 잘 설계되어 있어 거의 모든 종류의 물자나 아이템을 놀라운 속도로 대량 생산할 수 있습니다. 연구팀은 이 공학자들이 어떻게 이렇게 효율적인 것을 구축했는지를 조사하기 위해 궤도에서 연구 기지를 통해 연구하는 것이 최선의 접근 방식이라고 결정했습니다."
 NewAnomalyEvents.240.Name:0 "거대한 오래된 공장"
 NewAnomalyEvents.250.Desc:0 "아름다운 결정체가 얼음 동굴의 내부를 둘러싸고 있으며, 수천 년 만에 처음으로 햇빛에 반짝이고 있습니다. 비록 산업용으로는 너무 연약하지만, 우리의 시장에서 높은 가격에 거래될 가능성이 큽니다."
 NewAnomalyEvents.250.Name:0 "크리스탈 전리품"
 NewAnomalyEvents.251.Desc:0 "거대한 반짝이는 얼음 동굴에 얼음 존재들의 문명이 발견되었습니다. 놀랍게도, 그들은 과학 팀의 존재에 전혀 신경 쓰지 않는 것처럼 보이며, 이는 우리가 그들의 복잡한 사회적 행동을 관찰하여 추가 연구를 할 수 있게 해줍니다."
 NewAnomalyEvents.251.Name:0 "얼음 존재들"
 NewAnomalyEvents.252.Desc:0 "얼음으로 이루어진 비정상적으로 투명하고 완벽한 정육면체 블록이 얼어붙은 동굴 한가운데 놓여 있습니다. 그러나 그 순진한 외관에도 불구하고 우리의 무기 중 어떤 것도 그것의 조각 하나를 쪼개낼 수 없었습니다. 다행히도, 그것은 비정상적으로 가벼워서 우리는 그것을 배에 실어 집으로 가져가 추가 연구를 위해 운반할 수 있었습니다."
 NewAnomalyEvents.252.Name:0 "완벽한 얼음"
 NewAnomalyEvents.260.Desc:0 "오랜 조사 끝에 고대 선조 건축물이 발견되었습니다. 내부에는 거대한 터미널이 있으며, 여전히 작동 중이며 행성에서 발생하는 신비로운 활동의 원인일 가능성이 높습니다. 탐사 중 초기 지연 후 과학 팀은 작동을 기다리고 있는 거대한 스위치를 찾았습니다. 오랜 시간 동안 점검, 토론 및 추측을 한 끝에 그들은 마침내 기계를 작동시키기로 결정했습니다. 전 행성에서 거대한 지진이 발생하였고, 시간이 지남에 따라 기적적으로 표면적이 확장되기 시작했습니다. 그러나 가장 놀라운 부분은 여러 지질 형상이 놀라운 속도로 상승하기 시작하여 비정상적인 화산 활동을 가진 수백 개의 산을 형성하며, 몇 시간 만에 행성을 고산 행성으로 변모시킨 것이었습니다."
 NewAnomalyEvents.260.Name:0 "산악 세계 발견"
 NewAnomalyEvents.261.Desc:0 "오랜 조사 끝에 고대 전조 건물이 발견되었습니다. 내부에는 거대한 터미널이 있으며, 여전히 작동 중이며 아마도 행성에서 발생하는 신비로운 활동의 원인일 것입니다. 탐사 중 초기 지연 후, 과학 팀은 활성화될 준비가 된 거대한 스위치를 찾았습니다. 오랜 시간 동안 검사, 토론 및 추측을 한 끝에 그들은 마침내 기계를 활성화하기로 결정했습니다. 거대한 지진이 행성 전체에서 발생하기 시작했고, 시간이 지남에 따라 표면적이 기적적으로 확장되기 시작했지만, 가장 놀라운 부분은 표면이 갈라져 풍부한 양의 광물이 드러났다는 점입니다. 불행히도, 이 과정에서 행성이 깨져서 산산조각이 나버렸습니다."
 NewAnomalyEvents.261.Name:0 "깨진 행성 발견"
 NewAnomalyEvents.262.Desc:0 "오랜 조사 끝에 고대 전조 건물이 발견되었습니다. 내부에는 거대한 터미널이 있으며, 여전히 작동 중이며 행성에서 발생하는 신비로운 활동의 원인일 가능성이 높습니다. 탐사 중 초기 지연 후, 과학 팀은 작동을 기다리고 있는 거대한 스위치를 찾았습니다. 오랜 검사, 토론 및 추측 끝에 그들은 마침내 기계를 작동시키기로 결정했습니다. 전 행성에서 거대한 지진이 발생하였고, 시간이 지남에 따라 기적적으로 표면적이 확장되기 시작했습니다. 그러나 가장 놀라운 부분은 확장된 표면에서 많은 정글, 늪지대 및 해조류가 드러났다는 점입니다. 또한 많은 야생 동물 종들이 지하에서 나타나기 시작했으며, 그 중 일부는 우리가 과거에 본 적이 없는 것들입니다. 이 행성은 신비로운 관찰자들의 버려진 지하 보호 세계인 것으로 보입니다."
 NewAnomalyEvents.262.Name:0 "발견된 세계 보존"
 NewAnomalyEvents.263.Desc:0 "오랜 조사 끝에 고대의 전조 건물이 발견되었습니다. 내부에는 거대한 터미널이 있으며, 여전히 작동 중이며 아마도 행성에서 발생하는 신비로운 활동의 원인일 것입니다. 탐사 중 초기 지연 후 과학 팀은 활성화될 준비가 된 거대한 스위치를 찾았습니다. 오랜 시간 동안 점검, 토론 및 추측을 한 끝에 그들은 마침내 기계를 활성화하기로 결정했습니다. 그러자 행성 전체에서 거대한 지진이 발생하였고, 시간이 지남에 따라 기적적으로 표면적이 확장되기 시작했습니다. 그러나 가장 놀라운 부분은 표면이 갈라지며 행성 내부 전체에 걸쳐 기계가 드러나기 시작한 것이었습니다. 많은 비밀 구역도 나타나기 시작했고, 팀은 우주에서 그것을 보기 위해 행성을 떠나기로 결정했습니다. 이 행성은 사실 거대한 지하 기계 행성임이 밝혀졌습니다."
 NewAnomalyEvents.263.Name:0 "기계 행성 발견"
