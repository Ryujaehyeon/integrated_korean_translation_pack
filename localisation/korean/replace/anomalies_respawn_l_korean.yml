 black_hole_anomaly_category:0 "블랙홀 이상 현상"
 black_hole_anomaly_category_desc:0 "이 블랙홀에 대해 의심스러운 무언가가 발견되었습니다."
 creature_corpse_category:0 "거대 생물 시체"
 creature_corpse_category_desc:0 "우리는 진공 상태 덕분에 거의 완벽한 상태의 고대 거대한 생물의 시체를 발견했습니다. 과학 팀은 이 생물을 조사하기 위해 부검을 하겠다고 고집하고 있습니다."
