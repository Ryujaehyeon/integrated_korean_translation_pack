 frozen_exploration_category:0 "얼어붙은 탐사"
 frozen_exploration_category_desc:0 "얼어붙은 산속에서 이상한 빛이 나는 작은 입구를 발견했습니다. 이 입구는 거대한 얼음 동굴로 이어집니다. 탐사가 가능할 수 있지만, 내부에 무엇이 있을지는 알 수 없습니다."
 g_star_anomaly_category:0 "G 클래스 이상현상"
 g_star_anomaly_category_desc:0 "$m_star_anomaly_category_desc$"
 holy_city_category:0 "버려진 수도"
 holy_city_category_desc:0 "최근 생명체나 활동의 흔적이 없는 버려진 도시 수도가 발견되었습니다. 이곳에서 무슨 일이 있었는지 알기 위해 조사가 필요합니다."
 huge_galaxy_category:0 "$TUTORIAL_GALAXY_MAP_TITLE$"
 huge_galaxy_category_desc:0 "이 행성에서 천문도 차트가 발견되었으며, 어떤 고가치 물체의 위치를 나타내는 것 같습니다. 이를 분석하여 해당 위치에서 무엇이 발견될지 확인해야 합니다."
 k_star_anomaly_category:0 "K형 이상현상"
 k_star_anomaly_category_desc:0 "$m_star_anomaly_category_desc$"
 lava_citadel_category:0 "용암 항성 성채"
 lava_citadel_category_desc:0 "이 용암 행성에서 놀랍도록 거대한 항성 성채를 발견했습니다. 이를 탐사하면 흥미로운 결과를 얻을 수 있을지도 모릅니다."
 lone_computer_category:0 "외로운 컴퓨터"
 lone_computer_category_desc:0 "행성 탐사를 마치기 전에 약한 신호가 감지되었습니다. 출처를 찾아 가까이 다가가 보니 오래된 버려진 전초 기지가 발견되었습니다. 수없이 많은 세월 동안 모든 것이 오프라인 상태였음에도 불구하고 단 하나의 컴퓨터가 여전히 작동 중이며 완벽하게 기능하고 있습니다. 누군가의 귀환을 기다리고 있는 것 같습니다. 이 컴퓨터는 해킹이 가능해 보이지만, 그 뒤에 어떤 종류의 보안이 있는지 모르기 때문에 조심해야 합니다."
 m_star_anomaly_category:0 "M 클래스 이상현상"
 m_star_anomaly_category_desc:0 "이 항성에서 의심스러운 무언가가 발견되었습니다."
 mini_natural_wormhole_category:0 "미니 자연 웜홀"
 mini_natural_wormhole_category_desc:0 "행성 근처에서 매우 작은 자연 웜홀이 발견되었으며, 곧 붕괴될 것으로 보입니다. 우리는 이 웜홀이 다음 몇 개월 내에 붕괴될 것이라고 추정할 수 있습니다. 이 기회를 이용해 반대편을 조사하고, 어쩌면 가치 있는 무언가를 발견할 수 있을 것입니다."
 neutron_anomaly_category:0 "중성자별 이상현상"
 neutron_anomaly_category_desc:0 "이 중성자별 안에서 의심스러운 무언가가 발견되었습니다."
 planet_mysterious_activity_category:0 "행성의 신비로운 활동"
 planet_mysterious_activity_category_desc:0 "이 거주 가능한 행성에는 현재나 고대 문명의 흔적이 없지만, 우리는 더 많은 조사가 필요한 심층 활동이 핵심에서 감지되었습니다."
 policy_custom_anomalies:0 "£anomaly£ §BCustom Anomalies§!"
