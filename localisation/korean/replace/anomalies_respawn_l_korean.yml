 pulsar_anomaly_category:0 "펄서 이상 현상"
 pulsar_anomaly_category_desc:0 "이 펄서에 대해 의심스러운 무언가가 발견되었습니다."
 tb_quarantine_zone:0 "£blocker£ 격리 구역"
 tb_quarantine_zone_desc:0 "이 구역은 특정 이유로 잠금 상태입니다. 내부에 무엇이 대기하고 있을지 아직 알 수 없습니다."
 uplift.6100.desc:0 "[Root.GetName]는 [From.GetName]에서 지배적인 종이 꽤 큰 뱀의 일종이며, 그들의 뛰어난, 비록 동물적인 지능 덕분에 먹이 사슬의 정점에 올랐다고 보고합니다.\n\n과학 장교 [Root.GetLeaderName]는 그들의 상태와 우리가 지능을 갖게 되기 전의 [Root.Owner.GetSpeciesName] 진화의 후반 단계 사이에 많은 유사점을 발견했다고 주장합니다.\n\n우리는 적절한 기술이 있다면 이 하위 존재들을 고양시킬 수 있을지도 모릅니다."
