l_korean:
 mem_music_tour.8.name:0 "우주 공연"
 mem_music_tour.8.desc:0 "최근 §Y[mem_rockstar_origin.GetName]§!에서 인기 있는 음악가가 차트를 석권하고 있으며, 해외에서도 적당한 성공을 거두었습니다. 그는 은하계 차원에서 돌파구를 마련하고자 §Y[mem_tour_location.GetName]§!에서의 투어를 계획하고 있습니다. 지역 주민들 중 일부는 일생에 한 번 있을 기회로 여기는 이 이벤트에 열광하고 있지만, 그의 음악이 청소년에게 미치는 영향에 대해 의문을 제기하는 이들도 있습니다."
 mem_music_tour.8.xenophile:0 "그의 음악을 직접 들을 수 있다니..!"
 mem_music_tour.8.xenophobe:0 "입국을 거절하고 그의 음악을 모두 금지하도록."
 mem_music_tour.8.individualist:0 "공연의 자유는 모두에게 주어지는 것이지."
 mem_music_tour.8.lodsofemone:0 "이미 알고 있었네. 공연 티켓을 파는게 바로 나거든."
 mem_music_tour.8.collectivist:0 "개인을 우상화하는 일은 있어서는 안된다."
 mem_music_tour.8.religiousdogma:0 "자신의 §Y[mem_rockstar_origin.GetSpeciesOrganName]§!을(를) 사용하는 방법이 정말 부적절하군. 금지해버려."
 mem_music_tour.8.freeforall:0 "전국에 이 행사를 방송하자!"
 mem_music_tour.8.freeforall.tooltip:0 "([Root.GetName]):\n   §Y외계종 선호주의§! POP이 §Y24§!달 동안 §G+15%§! 행복도를 얻습니다.\n§Y외계종 혐오주의§! POP이 §Y24§!달 동안 §R-15%§! 행복도를 얻습니다."
 mem_music_tour.8.woodstock:0 "3개월 동안의 평화, 그리고 음악."
 mem_music_tour.8.default:0 "행성 행정부의 결정에 따르지."
 mem_music_tour.9.name:0 "첫 콘서트 투어"
 mem_music_tour.9.rock:0 "\"좋은 아침입니다 §Y[mem_tour_location.GetName]§!! 록을 할 준비가 되셨나요? 다시 말씀드리지만, 록을 할 준비가 되셨나요?\"\n\n§Y[mem_rockstar_origin.GetAdj]§! 밴드는 \"Blasters N' Orchids\"라는 이름으로 자신을 꾸미며, 저녁의 첫 곡을 에너지 넘치게 시작했습니다. 무대의 보편 번역 시스템은 리드 싱어를 따라가는 데 어려움을 겪었고, 그의 공연의 특정 부분에서는 과열될 뻔했습니다. 그가 시스템을 끄자, 관객들은 §Y[mem_rockstar_origin.GetSpeciesAdj]§! 가사를 거의 외운 듯 보였습니다."
 mem_music_tour.9.dubstep:0 "§Y[mem_rockstar_origin.GetAdj]§! 음악가의 §Y[mem_tour_location.GetName]§! 첫 데뷔를 지켜보려 수많은 팬과 청중들이 공연장에 왔습니다. 그가 무대 위로 걸어오자 청중들이 열광적으로 환호하며 흘러나오는 신스 음악에 따라 고개를 강하게 흔들었습니다. 하지만 저렇게 버튼만 누르면서 공연을 할 거면 대체 왜 §Y[mem_tour_location.GetName]§!까지 그 먼 길을 달려온 건지 그 누구도 이해하지 못했습니다..."
 mem_music_tour.9.incomprehensible:0 "§Y[mem_rockstar_origin.GetAdj]§! 음악가가 어떤 종류의 악기를 무대 위로 들고 올라온 것 같습니다. 그게 아니라면 청중들의 반응이 설명되지 않습니다. 그리고 그가 연주를 시작하자 침묵이 흐르기 시작했습니다.\n\n대충 조사를 해보니 §Y[mem_rockstar_origin.GetSpeciesAdj]§! 음악은 보통 §Y[Root.GetSpeciesNamePlural]§!들이 들을 수 없는 주파수로 연주된다고 합니다."
 mem_music_tour.9.festival:0 "§Y[mem_rockstar_origin.GetAdj]§! 밴드는 빛나는 태양 아래 넓은 들판에서 공연을 시작했습니다. 행사장에서 잠도 안 자고 씻지도 않은 팬들이 모여서 몸에 해로운 음료를 계속 섭취하고 이상한 물질들을 흡입했다고 합니다. §Y[mem_tour_location.GetName]§!의 다른 장소에서도 이런 일들이 횡행했고, 장소마다 쓰레기와 흔적을 남겼습니다. 하지만 참여한 사람들은 재미있었다고 합니다."
 mem_music_tour.9.rapper:0 "§Y[mem_rockstar_origin.GetName]§! 음악가는 자신을 "50 크레딧"이라고 스타일링하며 노래하기보다는 §Y[mem_rockstar_origin.GetSpeciesAdj]§! 속어와 비방을 빠르게 쏟아냈습니다. 밤의 마지막 공연에서 그는 자신의 노동계급 가족의 삶을 찬양했으며, 그 가족은 종종 가슴 아프고 때때로 폭력적인 동네 출신이었습니다. 이후 그는 관객에게 감사의 인사를 전하고 "진실하게 지내라"고 요청한 뒤 호화로운 개인 셔틀을 타고 다음 투어 장소로 떠났습니다."
 mem_music_tour.9.metal:0 "스스로 §Y\"강력한 [mem_rockstar_origin.GetSpeciesNameCompliment]\"§!(이)라고 포장하는 이 음악가는 금속 사슬과 못이 박힌 검은 가죽을 입었습니다. 보컬이 원시적인 울음소리를 냈는데, 범용 번역기로 번역해보니 이상한 단어만이 쏟아져 나왔습니다. 곧 시끄러운 음악에 번역기에서 나오는 번역 음은 묻혀버렸고, 소음 세기는 200㏈이 넘어갔습니다. 이들이 \"춤\"이라고 하는 공연은... 맹렬하게 머리를 움직이는 것이 끝인 것 같습니다."
 mem_music_tour.9.dontunderstand:0 "난... 이게 왜 좋은지 모르겠어."
