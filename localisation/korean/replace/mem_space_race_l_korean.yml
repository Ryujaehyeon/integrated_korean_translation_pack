l_korean:
 mem_space_race.1.name:0 "스페이스 레이스"
 mem_space_race.1.desc:0 "은하적 평화와 문화교류를 위하여 새로운 스포츠 이벤트가 제안되었습니다.\n\n스페이스 레이스는 은하계에서 가장 뛰어난 기술자들과 조종사들을 가려내기 위해 수많은 이벤트로 구성될 것입니다. 현재 제안서에 의하면 소형 함선들이 우주에서 복잡한 트랙을 따라 경주하는 것으로 보입니다.\n\n이 대회를 개최하기로 자원할까요?"
 mem_space_race.1.desc.2:0 "한 번 더 "대우주 경주"가 은하 공동체 내에서 개최됩니다. 이 행사는 모든 회원 국가 간의 외교적 유대를 더욱 공고히 하고 문화 및 기술 교류를 장려하기 위한 것입니다. 중립 위원회가 우리의 제국을 이 중대한 행사의 다음 주최국으로 지명했습니다. 우리는 그들의 기대에 부응할 수 있을까요?"
 mem_space_race.1.a:0 "훌륭한 생각이군! 초대장들을 보내도록."
 mem_space_race.1.b:0 "아니, 이건 실패할 것이 뻔히 보인다."
 mem_space_race.2.name:0 "스페이스 레이스 초대장"
 mem_space_race.2.desc:0 "안녕하세요. [root.GetSpeciesName]여. 우린 은하적인 스포츠 이벤트, 스페이스 레이스를 개최하여 은하계에서 가장 뛰어난 조종사들과 기술자들을 찾고자 합니다. 우린 당신네를 포함한 모든 주요 국가에 참가할 기회를 드립니다. 오시겠습니까?"
 mem_space_race.2.desc.2:0 "안녕하세요, [root.GetSpeciesName]님. 다시 한 번 "대우주 경주"가 은하 공동체 내에서 개최될 예정입니다. 이 행사의 주최자로 지명된 저희는 귀하의 제국에 공식 초대장을 전달하며, 이 중대한 행사에 참여해 주시기를 희망합니다."
 mem_space_race.2.a:0 "훌륭한 아이디어군. 당연히 참가하지."
 mem_space_race.2.b:0 "거절하겠다."
 mem_space_race.2.b.psycho:0 "제정신인가?!"
 mem_space_race.2.b.inwards:0 "우린 너희들의 일에 관심이 없다."
 mem_space_race_must_be_diplomatic:0 "우린 더러운 외계종과의 교류에 관심이 없다."
 mem_space_race.4.name:0 "레이스 개최 확정"
 mem_space_race.4.desc:0 "우리의 스페이스 레이스에 참가를 희망한 국가들이 최소치를 넘었습니다. 이제 레이스 준비를 합시다."
 mem_space_race.4.a:0 "기다릴 수가 없군!"
 mem_space_race.5.name:0 "스페이스 레이스 취소"
 mem_space_race.5.desc:0 "스페이스 레이스에 참가를 희망한 국가들이 너무 적었습니다. 이벤트는 취소되어야 했습니다."
 mem_space_race.5.a:0 "실망스럽군."
 mem_space_race.6.name:0 "레이스 준비"
 mem_space_race.6.desc:0 "스페이스 레이스 개최일이 다가오고 있습니다. 모든 참가 국가는 함선과 조종사들을 준비시키기 위해 최선을 다하고 있습니다. 우리 기술진들은 조종사들이 최대한의 효율을 낼 수 있도록 작업하고 있습니다.\n\n이 레이스는 [Root.GetName]과 다른 제국들이 가진 가장 뛰어난 기술들을 선보이는 곳이 될 것입니다. 하지만 함선의 크기에 제한이 있기에 어느 업그레이드를 우선시해야 할지 정해야 합니다. 우리의 가장 발전된 기술들을 중심으로 함선을 제작하거나 우리의 취약한 부분들을 보완해야 할 것입니다. 또는 우리의 기술을 믿고 우선순위 없이 모든 부분을 같게 작업할 수 있습니다."
 mem_space_race.6.a:0 "모든 부분을 똑같이 검토하라."
 mem_space_race.6.b:0 "실드에 집중하라."
 mem_space_race.6.c:0 "추진력에 집중하라."
 mem_space_race.6.d:0 "장갑에 집중합니다."
 mem_space_race.7.name:0 "스페이스 레이스 포기"
 mem_space_race.7.desc:0 "전쟁에 소모되고 있는 자원 때문에 우리는 스페이스 레이스팀 구성에 자원을 할당할 수 없어 기권할 수밖에 없습니다."
 mem_space_race.8.name:0 "스페이스 레이스가 곧 개최"
 mem_space_race.8.desc:0 "우리 제국은 은하 전체에서 가장 신나는 이벤트의 준비를 끝 마치고 있습니다. 곧 은하 전체에서 가장 뛰어난 조종사들과 기술자들이 자신들의 실력을 과시하기 위해 모일 것입니다."
 mem_space_race.8.a:0 "신나는군."
 mem_space_race.10.name:0 "스페이스 레이스 패배"
 mem_space_race.10.desc.shield:0 "[mem_space_race_host.GetAdj]의 이번 라운드는 별의 근처에서 방어막만 믿고 열풍을 견뎌낼 수 있는지를 시험했습니다. 아쉽게도 우리 함선은 이를 견디지 못했고 결국 별로부터 거리를 둔 결과 시간을 버리고 말았습니다. 제 시간 내에 목적지에 도달하지 못했기에 다음 라운드로 진출하지 못했습니다."
 mem_space_race.10.desc.thrust:0 "가장 최근의 [mem_space_race_host.GetAdj] 우주 경주에서는 여러 다른 행성과 거대한 천체 주위를 도는 길고 복잡한 궤적이 포함되었습니다. \n\n우리의 우주선 엔진은 강인한 중력 우물 내에서 효과적으로 조종할 만큼 충분히 강력하지 않았던 것 같습니다. 이로 인해 소중한 시간을 잃게 되었습니다. 제시간에 결승선에 도달하지 못해 탈락하게 되었습니다."
 mem_space_race.10.desc.armor:0 "가장 최근의 [mem_space_race_host.GetAdj] 우주 경주에서는 참가자들이 두꺼운 우주 잔해 구름을 통과해야 했으며, 충돌로 인해 장애가 발생하지 않도록 자신의 우주선의 갑옷에 의존해야 했습니다. \n\n우리의 우주선은 한동안 장애물 코스를 헤쳐 나갔지만, 선체가 그 충격을 견디지 못해 결국 너무 심각하게 손상되어 철수해야 했습니다."
 mem_space_race.10.a:0 "실망스럽군"
 mem_space_race.11.name:0 "스페이스 레이스 3등"
 mem_space_race.11.desc.shield:0 "$mem_space_race.10.desc.shield$ \n\n우린 3등 자리를 차지했습니다. 1등은 아니지만 승자들 중 하나가 되었습니다."
 mem_space_race.11.desc.thrust:0 "$mem_space_race.10.desc.thrust$ \n\n우린 3등 자리를 차지했습니다. 1등은 아니지만 승자들 중 하나가 되었습니다."
 mem_space_race.11.desc.armor:0 "$mem_space_race.10.desc.armor$ \n\n우린 3등 자리를 차지했습니다. 1등은 아니지만 승자들 중 하나가 되었습니다."
 mem_space_race.11.a:0 "실망스럽군"
 mem_space_race.13.name:0 "스페이스 레이스 우승!"
 mem_space_race.13.desc:0 "오늘, 전설적인 [mem_space_race_host.GetAdj] 우주 경주가 최종 결전을 마쳤습니다. [mem_space_race_host.Capital_Scope.GetName]에서 성대한 폐막식이 열렸고, [mem_space_race_host.GetSpeciesAdj] [mem_space_race_host.GetRulerTitle] [mem_space_race_host.GetRulerName] [mem_space_race_host.Leader.GetHerHim]가 수상자들을 축하했습니다. 우리 팀은 1위를 차지하며 순수 오스뮴으로 만든 귀중한 메달을 받았습니다. 2위는 [second_place.GetName] 팀이 차지하며 로듐 메달을 수상했습니다. 3위는 [third_place.GetName]가 차지하며 이리듐 메달을 받았습니다.\n\n이번 경주는 모든 참가자들에게 공학 기술을 연마하고 외계 문화에 도전할 수 있는 독특한 기회였습니다."
 mem_space_race.13.a:0 "팀을 축하해라."
 mem_space_race.13.a.machine:0 "더 빠르고. 더 강하고. 더 우월했다."
 mem_space_race.13.a.hive:0 "우린 우리의 발전 정도에 만족했다."
 mem_space_race.13.a.auth:0 "우리의 방식이 최고라는 증거다!"
 mem_space_race.14.name:0 "스페이스 레이스 2등"
 mem_space_race.14.desc:0 "오늘 전설적인 [mem_space_race_host.GetAdj] 우주 경주가 최종 결전을 마쳤습니다. [mem_space_race_host.Capital_Scope.GetName]에서 성대한 폐막식이 열렸으며, [mem_space_race_host.GetSpeciesAdj] [mem_space_race_host.GetRulerTitle] [mem_space_race_host.GetRulerName] [mem_space_race_host.Leader.GetHerHim]가 수상자들을 축하했습니다.\n\n우리 팀은 2위를 차지하며 순수 로듐으로 만든 귀중한 메달을 받았습니다. 우리를 초월한 유일한 팀은 [first_place.GetName]의 팀으로, 오스뮴 메달을 수상했습니다. 3위와 이리듐 메달은 [third_place.GetName]에게 돌아갔습니다.\n\n이번 경주는 모든 참가자들이 공학 기술을 연마하고 외계 문화와 경쟁할 수 있는 독특한 기회였습니다."
 mem_space_race.14.a:0 "아깝군!"
 mem_space_race.14.a.machine:0 "임무 일부 완수."
 mem_space_race.14.a.auth:0 "2등은 꼴등이다."
 mem_space_race.15.name:0 "스페이스 레이스 3등"
 mem_space_race.15.desc:0 "오늘 전설적인 [mem_space_race_host.GetAdj] 우주 경주가 최종 결전을 마쳤습니다. [mem_space_race_host.Capital_Scope.GetName]에서 성대한 폐막식이 열렸고, [mem_space_race_host.GetSpeciesAdj] [mem_space_race_host.GetRulerTitle] [mem_space_race_host.GetRulerName] [mem_space_race_host.Leader.GetHerHim]가 수상자들을 축하했습니다.\n\n우리 팀은 전체 예선에서 3위를 차지하며 순수 이리듐 메달을 수상했습니다. 우리를 초월한 두 팀은 [first_place.GetName]와 [second_place.GetName]로, 각각 1위와 2위를 차지하며 오스뮴과 로듐 메달을 수상했습니다.\n\n이번 경주는 모든 참가자에게 공학 기술을 연마하고 외계 문화와 경쟁할 수 있는 독특한 기회를 제공했습니다."
 mem_space_race.15.a:0 "적어도 상은 탔군."
 mem_space_race.15.a.machine:0 "임무 상태: 잠재적인 성공"
 mem_space_race.15.a.auth:0 "[Root.GetSpeciesNamePlural]이(가) 이정도 밖에 안된다고?"
 mem_space_race.16.name:0 "스페이스 레이스 페막"
 mem_space_race.16.desc:0 "오늘 전설적인 [mem_space_race_host.GetAdj] 우주 경주가 최종 결전을 마쳤습니다. [mem_space_race_host.Capital_Scope.GetName]에서 성대한 폐막식이 열렸고, [mem_space_race_host.GetSpeciesAdj] [mem_space_race_host.GetRulerTitle] [mem_space_race_host.GetRulerName] [mem_space_race_host.Leader.GetHerHim]가 수상자들을 축하했습니다.\n\n1위는 [first_place.GetName] 팀이 차지하며 순수 오스뮴으로 만든 귀중한 메달을 수상했습니다. 2위는 [second_place.GetName] 팀이 차지하며 로듐 메달을 수상했습니다. 마지막으로 3위는 [third_place.GetName] 팀이 차지하며 이리듐 메달을 받았습니다. 우리는 수상자가 결정되기 훨씬 이전에 탈락하였고, 메달이나 명성을 얻지 못했습니다.\n\n이번 경주는 모든 참가자에게 공학 기술을 연마하고 외계 문화와 경쟁할 수 있는 독특한 기회였습니다."
 mem_space_race.16.a:0 "좋은 경주였다 모두들."
 mem_space_race.16.a.machine:0 "성능 재검토: 불만족스러움."
 mem_space_race.16.a.hive:0 "우리가 졌다고?"
 mem_space_race.16.a.auth:0 "누군가는 이 망신의 책임을 질 것이다!"
 mem_space_race.17.desc:0 " "
 mem_space_race.17.machine:0 " "
 mem_space_race.17.hive:0 "  "
 mem_space_race.18.desc:0 " "
 mem_space_race.18.machine:0 " "
 mem_space_race.18.hive:0 " "
 mem_space_race.20.name:0 "스페이스 레이스 취소됨"
 mem_space_race.20.desc:0 "참가를 희망한 제국의 수가 적었기 때문에 [mem_space_race_host.GetAdj] 스페이스 레이스는 취소되어야 했습니다."
 mem_space_race.20.a:0 "실망스럽군."
 mem_space_race.21.name:0 "스페이스 레이스 취소"
 mem_space_race.21.desc:0 "우리는 전쟁 중이기에 스페이스 레이스에 자원을 투자할 수 없고 참가자들의 안전을 보장할 수도 없습니다. 이벤트는 취소되어야 했습니다."
 mem_space_race.21.a:0 "안타깝군."
 mem_space_race.22.name:0 "스페이스 레이스가 취소되다"
 mem_space_race.22.desc:0 "[mem_space_race_host.GetAdj] 스페이스 레이스는 [mem_space_race_host.GetName]이(가) 전쟁 중이기 때문에 개최될 수 없습니다. 참가자들의 안전을 보장할 수 없었기에 취소할 수밖에 없었습니다."
 mem_space_race.22.a:0 "안타깝군."
 mem_space_race_host:0 "스페이스 레이스 개최하다"
 mem_space_race_participant:0 "스페이스 레이스에 참가하다"
 resolution_categories_mem_cultural_events:0 "은하적 문화 교류"
 resolution_mem_space_race:0 "스페이스 레이스 구상"
 resolution_mem_space_race_desc:0 "우리는 §SSpace Race§!를 조직해야 합니다. - 참여 제국의 가장 유명한 조종사와 공학자들 간의 은하 전역 대회로, 누가 위험한 초공간 환경을 신속하게 탐색하고 살아남아 이야기를 전할 수 있는지 알아보는 것입니다."
 mem_space_race_resolution_effect:0 "우주 경쟁을 위한 준비가 시작됩니다. 이 사건을 제안한 제국이 먼저 개최할 기회를 제공받습니다. 만약 이를 거부할 경우, 은하 공동체의 다른 비형상 구성원들에게 기회가 주어집니다."
 mem_space_race_gain_intel:0 "개최국 간 정보 수준이 증가했습니다."
