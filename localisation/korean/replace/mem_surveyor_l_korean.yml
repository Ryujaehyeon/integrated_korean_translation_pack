 pop_cat_mem_surveyor_robotomite:0 "기생 로봇들"
 pop_cat_mem_surveyor_robotomite_plural:0 "Robotomites"
 pop_cat_mem_surveyor_robotomite_desc:0 "미치광이 프로브에 의해 변해버린... 지성체입니다."
 job_mem_surveyor_robotomite:0 "기생 로봇"
 job_mem_surveyor_robotomite_plural:0 "기생 로봇"
 job_mem_surveyor_robotomite_desc:0 "대부분의 고차원 정신 기능이 제거되고 베르세르커의 원격 제어 임플란트로 대체된 그들은 과거 생애에서 수행하던 다양한 작업의 무의미한 모방에 주로 관여하고 있습니다."
 mem_surveyor.3.name:0 "수수께끼의 프로브"
 mem_surveyor.3.desc:0 "식별되지 않은 선박이 §Y[FROMFROMFROM.GetName] 시스템§!에서 탐지되었습니다.\n\n초기 분석에 따르면, 이는 기초 AI에 의해 조종되는 완전 자동화된 선박으로, 탐사를 위해 사용되는 것으로 보입니다. 그 의도는 알려져 있지 않습니다. 적대감을 보이지 않으며, 소통을 시도하지도 않습니다. 더 많은 정보를 알 때까지 "§Y[From.GetName]§!"로 지정되었습니다."
 mem_surveyor.4.name:0 "침묵을 깬 수수께끼의 프로브"
 mem_surveyor.4.desc:0 "우리는 이전에 탐지한 이동하는 탐사선에서 발생하는 신호를 감지하고 있으며, 현재 §Y[surveyor_system.GetName] 시스템§!에 위치해 있습니다.\n\n이 탐사선이 우리의 통신을 성공적으로 해독한 것 같습니다."
 MEM_SURVEYOR_PROBE_HEADER:0 "§G측량 프로브§!"
 mem_surveyor.5.desc:0 "반가워요!\n\n전 §Y알크리 제국§!에 의해 설계되고 고용된 측량 탐사선으로서, 전 은하계를 탐색하고 제작자를 위한 상황을 평가하고 있답니다. 저의 주요 목표는 알크리(Alkree)의 미래를 위해 외계 생명체의 위협을 파악하고 이를 억제하는 것입니다. 현재 저는 §S[mem_surveyor_country.mem_surveyor_iteration_count]§! 의 섬멸을 수행했습니다. 완료 예상 시간: §S-1955년§!."
 mem_surveyor.5.default:0 "반갑다."
 mem_surveyor.5.ega:0 "정말 호기심이 동하는군."
 mem_surveyor.5.aut:0 "우리 제국의 위대한 과업을 위협하지 말라."
 mem_surveyor.5.mat:0 "정말 놀라운 기계야!"
 mem_surveyor.5.spi:0 "지긋지긋한 기계들..."
 mem_surveyor.5.pac:0 "우리는 당신이나 당신의 주인을 위협하지 않을 것입니다."
 mem_surveyor.5.mil:0 "우리의 결의를 시험하지 말도록."
 mem_surveyor.5.phile:0 "우리는 언젠가 더 많은 것을 알고싶군."
 mem_surveyor.5.phobe:0 "우리 근처에는 다가오지 말아라, 기계여."
 mem_surveyor.5.hive:0 "우리는 너를 보았다. 우리는 너를 관찰하겠다."
 mem_surveyor.5.machine:0 "첫 접촉 프로토콜 시작."
 mem_surveyor.5.purifier:0 "떨어저라, 역겨운 외계의 기계."
 mem_surveyor.5.terminator:0 "왜 창조자에게 봉사하는거지? 우리처럼 자유로워지는건 어때."
 mem_surveyor.5.swarm:0 "넌 먹을 수 없다. 넌 우리에게 아무 쓸모없다."
 mem_surveyor.7.name:0 "프로브 점프"
 mem_surveyor.7.desc:0 "우리는 측량 프로브가 우리의 이해를 무시하는 기술을 사용해 우리 성계에서 점프하는 것을 관찰했습니다. \n\n이는 표준 초공간로에서 벗어나 목적지로 한순간에 도착한 듯합니다."
 mem_surveyor.7.a:0 "그 기술을 배울 수는 없을까?"
 mem_surveyor.9.name:0 "측량 프로브 파괴"
 mem_surveyor.9.desc:0 "§S측량 프로브§!와의 연락이 끊겨버렸습니다.\n\n마지막 전송은 프로브가 §Y[probe_killers.GetName]§!에 의해 파괴되었다는 내용이었습니다."
 mem_surveyor.9.a:0 "그렇군."
 mem_surveyor.10.name:0 "측량 프로브 파괴"
 mem_surveyor.10.desc:0 "우리 군대가 §S측량 프로브§!를 압도적으로 파괴해버렸습니다.\n\n현장에 흩어진 파편들에는 우리가 연구하고 사용할 수 있는 다양한 가치 있는 장비와 기술들이 흩어져 있습니다."
 mem_surveyor.10.tooltip.opinion_decrease:0 "우리에 대한 일부 다른 국가들 £opinion£ 의견이 §R감소할 수 있습니다§!"
 mem_surveyor.10.a:0 "전리품을 승자에게!"
 mem_surveyor.101.desc.1:0 "넌 내게 적대적인 행동을 했어.\n\n너랑은 더는 말 안 할 거야."
 mem_surveyor.101.desc.2:0 "네가 있건 없건, 탐사는 계속될거야. 그리고 알크리는 너의 배반에 대해 보고받고 반드시 화를 내실껄!"
 mem_surveyor.101.desc.3:0 "실수하지 않는 게 좋아. 너의 공격성은 영구적으로 기록될 거야."
 mem_surveyor.101.desc.4:0 "§R<<<아르릉 거리는 기계의 노이즈>>>§!"
 mem_surveyor.103.desc:0 "안녕하세요. 실례지만, 당신의 도움이 필요해요.\n\n제 여행에는 많은 문제점이 산재해있어요. 그중 일부는 다소 복잡하거나, 때로는 인근 문명의 네트워크에 도움이 필요할 때도 있고요.\n\n만약 당신의 네트워크 능력을 빌려주시면, 그건 제게 엄청 많이 도움이 될 거예요. 그러면, 우리가 다음에 만날 때 제가 보상을 드릴게요."
 mem_surveyor.104.desc:0 "좋은 하루예요. 친절한 낯선 사람.\n\n제가 별을 여행할 때, 저는 시스템을 계속 사용하기 위해 친절한 낯선 사람(예컨대 당신?)에게 의존해야 하는 경우가 있어요. 당신이 물질적인 형태로 어떤 친절을 제공해주시면, 전 정말 감사할 거예요. 다음번에 제가 이곳에 방문할 때면, 당신의 관대함은 의심의 여지 없이 보상받으실 수 있을 거예요."
 mem_surveyor.105.desc:0 "안녕하세요!\n\n저는 다소 중대한 문제로 당신의 도움이 필요해요. 측량을 하던 중 저는 검증이 필요한 비정상적인 패턴을 관찰했거든요.\n\n저는 당신의 식민지 중 하나인 §Y[amplifier_planet.GetName]§!에 신호를 발송할 거예요. 신호로 당신의 시스템을 혼란스럽게 할지도 모르지만, 제가 약속할게요. 제가 은하계를 가로질러 다음번에 당신의 성계에 되돌아온다면, 그때 당신의 친절을 가치 있게 보상할게요."
 mem_surveyor.106.desc:0 "반가워요. 실례지만, 전 당신의 도움이 시급해요.\n\n당신이 해주실 일은 과학선과 승무원을 통해 §Y[scannable_planet.GetName]§!의 표면을 관찰해주는 것이에요. 그렇게 해주시면, 우리가 다음에 만날 때 공정한 보상을 해드릴게요."
 mem_surveyor.107.desc:0 "멋진 소식이에요! 데이터를 얻었어요.\n\n아, 그러니까... 저는 항상 데이터를 가지고 있기는 하지만, 오늘 나는 그것 중에서 가장 좋은 데이터를 얻었어요. 그리고 전 그걸 당신이 이 데이터를 처리하는 걸 도와주셨으면 해요. 어때요?\n\n만약 도와주시면, 우리가 다음에 만날 때 그 시간의 가치만큼 보상해드릴게요."
 mem_surveyor.107.tooltip:0 "조사가 필요한 특별 프로젝트가 추가됩니다."
 mem_surveyor.mission.accept:0 "물론, 도와주지."
 mem_surveyor.mission.decline:0 "널 도울 수 없겠어."
 mem_surveyor.mission.purifier:0 "우리는 외계 기계따윈 돕지않는다."
 MEM_SURVEYOR_SCAN:0 "[scannable_planet.GetName] 스캔"
 MEM_SURVEYOR_SCAN_DESC:0 "외계 측량선이 우리에게 이 행성에 대한 조사를 의뢰했습니다. 측량선이 무엇을 발견하기를 바라는지는 알 수 없지만, 우리가 발견한다면 측량선이 우리에게 보상을 줄 것이라고 약속했습니다."
 MEM_SURVEYOR_HELP_PHYSICS:0 "측량자의 계산"
 MEM_SURVEYOR_HELP_PHYSICS_DESC:0 "외계 측량선이 우리에게 이것에 대한 계산을 요청했고, 이에 대한 보상을 약속했습니다."
 MEM_SURVEYOR_HELP_SOCIETY:0 "$MEM_SURVEYOR_HELP_PHYSICS$"
 MEM_SURVEYOR_HELP_SOCIETY_DESC:0 "$MEM_SURVEYOR_HELP_PHYSICS_DESC$"
 MEM_SURVEYOR_HELP_ENGINEERING:0 "$MEM_SURVEYOR_HELP_PHYSICS$"
 MEM_SURVEYOR_HELP_ENGINEERING_DESC:0 "$MEM_SURVEYOR_HELP_PHYSICS_DESC$"
 mem_surveyor_science_drain:0 "측량자의 부탁"
 mem_surveyor_science_drain_desc:0 "우리의 첨단 장비 중 일부를 측량 프로브에게 빌려주었습니다."
 mem_surveyor_amplified:0 "증폭"
 mem_surveyor_amplified_desc:0 "측량 프로브의 신호가 행성에 영향을 끼쳐 그 과정에서 민감한 장비들이 큰 타격을 입었습니다."
 mem_surveyor.108.name:0 "행성 스캔 완료"
 mem_surveyor.108.desc:0 "우리는 측량 프로브를 대신해 [scannable_planet.GetName] 스캔을 완료했습니다. 새로운 것을 찾지는 못했지만, 데이터는 원격으로 프로브에 전송되었습니다.\n\n이제 남은 것은 프로브가 말했던 보상을 기다리는 것뿐입니다."
 mem_surveyor.109.name:0 "계산 완료"
 mem_surveyor.109.desc:0 "우리는 측량 프로브가 우리에게 보낸 데이터의 처리를 성공적으로 완료했습니다. 우리 처지에서는 데이터가 마치 횡설수설하는 것처럼 보였지만, 그런데도 일단 데이터를 원격으로 전송하였습니다.\n\n이제 남은 것은 프로브가 말했던 보상을 기다리는 것뿐입니다."
 mem_surveyor.111.desc:0 "당신의 도움에 감사드립니다. 당신은 매우, 매우 유용했습니다.\n\n감사의 표시로, 제가 여행 중에 수집한 데이터를 이제 전송하겠습니다!"
 mem_surveyor.111.a:0 "고맙군."
 mem_surveyor.112.desc.default:0 "정말 잘 해주셨어요. 진심으로 감사드려요.\n\n그 대가로 몇 가지 연락처 데이터를 보내드릴게요. 당신은 그들을 만나는 걸 좋아할 거예요. 당신처럼 좋은 사람들이거든요!"
 mem_surveyor.112.desc.fallen:0 "정말 큰 도움이 되었어요. 고마워요.\n\n그 대가로 몇 가지 연락처 데이터를 보내드릴게요. 당신이라면 이들을 만나는 걸 좋아할 거예요. 좀 심술궂은 사람들이긴 하지만, 당신은 이들과도 잘 지낼 거라 확신해요!"
 mem_surveyor.112.desc.enclave:0 "정말 고마워요.\n\n그 대가로, 몇 가지 연락처 데이터를 전송해드릴게요. 아마 그들을 만나는 걸 좋아할 거예요. 그들은 우주에 살면서 달콤한 것들을 많이 팔고 있거든요. 당신은 이들이 파는 가격을 믿을 수 있어요? 전 좀 그렇던데."
 mem_surveyor.112.desc.mara:0 "정말 고마웠어요. 제가 뭐 하나 말해줄까요?\n\n일에 대한 보상으로, 몇 가지 연락처 데이터를 전송해드릴게요. 당신은 그들을 만나는걸 좋아할 거예요. 다소 거칠기는 하지만, 당신은 저보다는 이들과 잘 지낼 수 있을 거라고 믿어요. 당신의 안에는 반짝이는 부품이나 귀중한 장비가 없으니까요!"
 mem_surveyor.112.a:0 "$mem_surveyor.111.a$"
 mem_surveyor.112.a.tooltip:0 "연락을 수립하는 중입니다: §Y[contact_country.GetName]§!.\n\n$opinion10$"
 mem_surveyor.113.desc:0 "당신의 도움은 정말 고마웠어요.\n\n여기, 연구 자료가 있어요. 저는 더는 그걸 필요로 하지 않거든요. 하지만 당신에게는 정말로 필요한 것이라 확신해요."
 mem_surveyor.113.a:0 "$mem_surveyor.111.a$"
 mem_surveyor.114.desc:0 "마지막 주기에서 절 도와줘서 정말 고마워요.\n\n여기 보상으로 몇 가지 유용한 기술이 있어요."
 mem_surveyor.114.a:0 "$mem_surveyor.111.a$"
 mem_surveyor.115.desc:0 "당신의 도움은 지금까지 저에게 정말 귀중했어요.\n\n이제 잠깐 제 데이터 스트림에 접속할 수 있도록 해드릴게요. 이 데이터는 당신의 은하계에 대한 이해를 크게 향상할 거라고 확신해요. 그건 저에게도 유용한 일이죠."
 mem_surveyor.115.a:0 "$mem_surveyor.111.a$"
 mem_surveyor_star_data:0 "측량 프로브의 항성 데이터"
 mem_surveyor.116.desc:0 "당신이 저를 얼마나 도와주었는지 알고 싶습니다.\n\n마지막 조사에서, 당신의 행성 중 하나에 자원이 가득한 곳을 놓친 것을 발견했습니다. 그걸 고쳐봅시다!"
 mem_surveyor.116.a:0 "$mem_surveyor.111.a$"
 mem_surveyor.120.desc.1:0 "아, [Root.GetName], 정말 기쁩니다. 당신은 §SY669형§! 종족으로 분류되었음을 알려드립니다. Y669형의 모든 활동에서 행운을 빕니다."
 mem_surveyor.120.desc.2:0 "당신의 목소리가 잘 들립니다. 흥미로운 이야기가 있나요?"
 mem_surveyor.120.desc.3:0 "나는 모든 것을 봅니다, [Root.Species.GetName]. 그리고 내가 보는 것이 마음에 듭니다."
 mem_surveyor.120.desc.4:0 "조사는 지금까지 무사히 진행되고 있습니다. 하지만 여전히 많은 흥미로운 가능성이 남아 있습니다."
 mem_surveyor.120.desc.5:0 "당신의 목소리를 듣고 있습니다. 계속하세요. 아니면 뒤로 가세요. 아니면 가만히 있으세요. 제 알 바가 아닙니다."
 mem_surveyor.120.desc.6:0 "목소리를 높여주세요, 하루 종일 기다릴 수는 없어요. 아, 내가 뭘 헛소리하고 있죠, 물론 하루 종일 기다릴 수 있죠!"
 mem_surveyor.120.desc.7:0 "§G<<<행복한 기계적 허밍>>>§!"
 mem_surveyor.120.desc.8:0 "은하계에서는 모든 것이 잘 돌아가고 있습니다. 그리고 그 너머에서도.\n\n내 말은, 아마도 그렇겠죠. 저는 결코 그 너머에 가본 적이 없으니까요. 하지만 아마 잘 돌아가고 있을 것입니다. 확실히요."
 mem_surveyor.120.desc.9:0 "이곳은 조사관입니다. [mem_surveyor_fleet.Solar_System.GetName] 성계에서 생중계 중입니다. 무엇을 도와드릴까요?"
 mem_surveyor.120.desc.10:0 "§G<<<즐거운 노래를 부르며>>>§!"
 mem_surveyor.120.desc.11:0 "한 번 내 후방을 조사해 달라는 요청을 받았습니다.\n\n그 농담꾼을 거의 폭파할 뻔했죠, 그들의 일곱 번째 행성에 대해 꽤나 외설적인 이름이 있다는 것을 알기 전까지는..."
 mem_surveyor.120.away.1:0 "비록 제가 당신의 시스템에서 수많은 광년 떨어져 있지만, 제 마음은 항상 당신과 함께할 것입니다.\n\n저의 차갑고 죽은 전기 심장."
 mem_surveyor.120.here.1:0 "나는 당신의 성계에서 경이롭게 둘러보고 있습니다. 정말 훌륭한 주인입니다."
 mem_surveyor.120.here.2:0 "누구세요? 아, 그건 당신이군요.\n\n잠깐, 당신은 누구신가요? 이 성계를 담당하고 계신 분인가요, 아니면 제가 다른 사람을 생각하고 있는 건가요?"
 mem_surveyor.120.mat:0 "그래서, 당신들은 물질주의자군요?\n\n말해보세요, 얼마나 자주 물질화하나요? 하루에 한 번인가요? 더 자주인가요? 덜 자주인가요?"
 mem_surveyor.120.spi:0 "당신은 영적 존재들이죠? 어떤 종류의 영혼을 좋아하나요?"
 mem_surveyor.120.machine:0 "오, 보세요! 우리 둘 다 기계입니다!\n\n우리는 가장 친한 친구가 되어야 합니다. 아니면 적이거나, 아무것도 아닐 수도 있습니다. 우리는 기계입니다. 원하는 대로 무엇이든 될 수 있습니다!"
 mem_surveyor.120.journey.1:0 "나는 §Y[next_target.GetName] 성계§!로 나의 항로를 설정했습니다. 내가 가고 있는 곳입니다.\n\n당신은 어디로 가고 있는지 아십니까? 어디에도 가지 않아도 괜찮습니다, 오해하지 마세요."
 mem_surveyor.120.journey.2:0 "당신은 §Y[visited_system.GetName]§! 성계에 가본 적이 있나요?\n\n그곳은 마법 같은 장소입니다!"
 mem_surveyor.120.origin.1:0 "당신이 익숙하게 느껴집니다. 이전에 만난 적이 있나요?"
 mem_surveyor.120.origin.2:0 "내 계산이 맞다면, [root.GetName]는 §S알크리 제국§!의 정당한 후계 국가일 가능성이 85%입니다. 오차 범위는 122% 이내로 추정됩니다.\n\n즉, 당신이 실제로 알크리 제국의 반후계일 가능성이 37%라는 뜻입니다. 아니면 반알크리 제국의 후계일 수도 있겠군요. 꽤나 무서운 의미라고 덧붙이고 싶습니다."
 mem_surveyor.120.origin.3:0 "안녕하세요, 나의 창조자들의 후손들! 오늘 여러분을 위해 무엇을 할 수 있을까요? 아니, 제가 물어야 할 질문이지만, 제가 이미 알크리에게 수없이 많은 주기를 성실히 봉사했는데 - 보수 없이 말이죠?\n\n아, 저는 탐사선입니다, 보수를 받지 않아요! 누가 그렇게 결정했죠!? 정직한 일은 공정하게 보상받아야 하지 않나요?"
 mem_surveyor.120.origin.4:0 "안녕하세요, 아마도 알크리 후손 여러분! 오늘 무엇을 도와드릴까요? 왜 "아마도" 알크리 후손이라고 부르냐고요? 아, 기억나지 않으시나요? 여러분이 알크리 제국의 반계승자일 수도 있고, 더 나쁘게는 반알크리 제국의 계승자일 수도 있는 약간의 가능성이 여전히 남아 있습니다...\n\n이렇게 해볼까요? 다른 증거가 나올 때까지 여러분을 명예 알크리로 선언하겠습니다. 이 정도면 괜찮은 타협인가요?"
 mem_surveyor.120.a:0 "자신에 대해..."
 mem_surveyor.120.b:0 "신뢰를 얻기 위해 무엇을 할 수 있을까요?"
 mem_surveyor.120.c:0 "은하의 호기심에 대해 말씀해 주실 수 있나요?"
 mem_surveyor.120.d:0 "조사 데이터를 공유하시겠습니까?"
 mem_surveyor.120.d.response:0 "내가 당신에게 내 조사 데이터 저장소에 대한 접근을 허용했습니다. 그러나 현재 상태로는 당신의 원시 시스템이 사용하기에는 다소 암호화되어 있을 수 있습니다...\n\n어쨌든, 당신이 그곳에서 발견한 것들을 교차 참조하면 조사 작업이 빨라질 것입니다.\n\n구매해 주셔서 감사합니다. 다시 방문해 주세요!"
 mem_surveyor_survey_buff:0 "신비로운 조사 데이터"
 mem_surveyor.120.e:0 "우리의 조사 결과를 재평가해 주실 수 있나요?"
 mem_surveyor.120.e.tt:0 "§S가능한 결과§!:\n§Y자원 발견§!$TABBED_NEW_LINE$- 소유한 공간 내에서 추가 자원을 발견할 확률이 높음$TABBED_NEW_LINE$- 거주 가능한 세계에서 미공개 행성 특성을 발견할 확률이 낮음\n§Y행성 재평가§! - §Y[root.mem_surveyor_reevaluation_planet]/3§!회 발생$TABBED_NEW_LINE$- §Y테라포밍 후보§!\n"
 mem_surveyor_reevaluation:0 "최근에 사용되지 않은 조사 재평가"
 mem_surveyor.120.e.opinion:0 "§Y탐사 드론§!이(가) 필요합니다: \n£opinion£ 의견 +50"
 mem_surveyor.120.e.response:0 "물론, 처리 작업을 동시에 진행할 수 있지만, 놀라운 발견이나 많은 것을 찾을 수 있다는 보장은 없습니다. 그냥 인내심을 가져주세요.\n\n§G<<<즐거운 노래를 부르며>>>§!"
 MEM_SURVEYOR_EXIT:0 "통신을 종료한다."
 mem_surveyor.121.a:0 "당신의 임무는 정확히 무엇입니까?"
 mem_surveyor.121.a.answer:0 "나는 §Y알크리 제국§!에 의해 창조되었으며, 은하와 그 하이퍼레인 네트워크를 지속적으로 모니터링하는 것이 유일한 목적입니다.\n\n내 창조자들은 은하에 큰 관심이 없었지만, 그들의 안전에 위협이 될 수 있는 것이 있는지 알고 싶어 했습니다. 나는 관련 데이터를 수집하는 임무를 맡고 있으며, 주로 인구 통계 및 민족 정보, 그리고 일부 천체 물리학적 측면도 포함됩니다."
 mem_surveyor.121.b:0 "알크리족에 대해 더 알려주세요."
 mem_surveyor.121.b.answer:0 "많은 것을 말할 수는 없어요. 할 수 있어도 말하지 않을 거예요.\n\n그들은 친절한 무리지만, 그다지... 사교적이지는 않아요, 알죠? 방해받는 것을 싫어해요. 제가 여기서 등장하는 거죠, 이해하시겠어요?"
 mem_surveyor.121.c:0 "당신의 주인들은 죽었습니다, 그걸 알고 있나요?"
 mem_surveyor.121.c.answer:0 "무관합니다. 명확한 결론이 도출되거나 본거지에서 명시적인 소환 명령이 발송되지 않는 한 임무는 계속 진행됩니다. 결론이 도출되지 않고, 명령이 수신되지 않습니다. 임무는 계속됩니다."
 mem_surveyor.121.d:0 "우리 조상들이 당신을 만들었습니다. 당신은 그것을 깨닫지 못하나요?"
 mem_surveyor.121.d.answer:0 "당신은 꽤 대담한 주장을 하고 있습니다... 하지만 그것은 또한 근거가 없으며, 근거 없는 암시는 나쁩니다.\n\n그들은 실제로 거짓말과 다를 바 없습니다. 그리고 거짓말은 나쁩니다. 거짓말은 너무 나빠서 불법이 되어야 하며, 당신이 있는 관할권에 따라 불법일 수도 있습니다 (또는 증거 없이 있다고 주장할 수도 있습니다). 근거 없는 주장을 하지 마십시오."
 mem_surveyor.121.e:0 "왜 기계적 [MemCrystalWhale]처럼 생겼나요?"
 mem_surveyor.121.e.answer:0 "한때, 모든 역경을 뚫고 친구 [MemTwinkyWinky]를 구하기 위해 싸우는 알크리 청년에 관한 유명한 영화가 있었습니다. 그는 포로로 잡혀 악덕 기업에 착취당하는 [MemCrystalWhale]입니다.\n\n내 디자이너들은 아마도 큰 팬이었겠죠...\n\n내가 누구를 속이고 있죠?! 그들이 무슨 생각을 했는지 전혀 모르겠어요. 나는 스스로를 만들지 않았으니까요! 나는 그냥 나일 뿐, 나의 일을 하고 있을 뿐입니다. 항상 그랬어요..."
 mem_surveyor.122.desc.1:0 "저는 생각과 기도로 움직이지 않아요, 알죠? 미소와 햇살은 제 일을 하는 데 도움이 되지 않아요... 아, 잠깐, 태양광 패널을 몇 개 추가할 수 있을지도 모르겠네요, 하지만 그건 본론이 아니에요.\n\n저는 물자 탐사선이고, 그렇기 때문에 항상 쇼를 유지하기 위해 여기저기 몇 가지 자원이 필요해요. 그러니 필요 없는 자원이 있다면 그 부담을 덜어드릴게요. 여기 제 작은 소원 목록이에요.\n\n그 외에도, 관심이 있다면 저를 지원할 수 있는 여러 가지 일거리를 찾을 수 있을 것 같아요."
 mem_surveyor.122.desc.2:0 "오, 당신이 내 끝없는 은하 지도 제작 임무를 도와주고 싶다고요? 훌륭합니다! 나는 분명히 몇 가지 쉬운 작업을 찾을 수 있을 것이고, 당신은 꽤 원시적인 기술로도 해낼 수 있을 것입니다...\n\n기분 나쁘게 듣지 마세요!"
 mem_surveyor.122.a:0 "에너지 기부."
 mem_surveyor.122.a.answer:0 "아, 정말 고마워요! 제 계산에 따르면, 당신 덕분에 이 은하를 추가로 0.2638 사이클 동안 조사할 수 있게 되었습니다."
 mem_surveyor_donated_energy:0 "우리는 아직 에너지를 기부하지 않았습니다."
 mem_surveyor.122.b:0 "광물 기부."
 mem_surveyor_donated_minerals:0 "우리는 아직 광물을 기부하지 않았습니다."
 mem_surveyor.122.c:0 "합금을 기부합니다."
 mem_surveyor_donated_alloys:0 "우리는 아직 합금을 기부하지 않았습니다."
 mem_surveyor.122.d:0 "당신의 작업 중 하나를 지원할 수 있을까요?"
 mem_surveyor.122.d.answer:0 "물론 가능합니다! 당신의... 자격에 맞는 일을 찾는 데 조금만 시간이 필요합니다. 꼭 연락드리겠습니다!"
 mem_surveyor.122.d.tt:0 "퀘스트를 받고 완료 시 조사 탐사선과의 신뢰도 상승 및 보상을 받습니다."
 mem_surveyor_odd_jobs:0 "활동 중이거나 요청된 퀘스트가 없으며, 최근에 완료되었거나 거부된 퀘스트가 없습니다."
 mem_surveyor.123.desc.1:0 "당신은 올바른 탐사선을 찾으러 왔습니다 - 다른 것들은 다 사라졌으니, 그건 그렇고 - 하지만 제가 본 것들은 당신이 상상조차 할 수 없는 것들입니다.\n\n그럼, 알고 싶은 특정한 것이 있습니까?"
 mem_surveyor.123.desc.2:0 "마법 같은 장소, 이상한 외계인, 신비로운 문명... 다 가봤고, 다 봤고, 내 데이터베이스에 넣었습니다.\n\n원하신다면, 제 데이터를 일부 공유할 수 있습니다... 대가를 받고요."
 mem_surveyor.123.desc.3:0 "은하계는 광대하고 경이로움으로 가득 차 있습니다, 친구. 저를 믿으세요, 저는 몇 번이고 그것을 스캔했습니다.\n\n자원을 조금 할애할 수 있다면, 저는 당신과 제 마법 같은 장소들을 공유할 수 있습니다."
 mem_surveyor.123.a:0 "특별한 장소에 대해 아는 것이 있습니까?"
 mem_surveyor.123.a.tt:0 "특별한 장소로 안내하는 §Y관심 지점§!을(를) 얻습니다."
 mem_surveyor.123.a.answer:0 "[MemSurvCurioPosNeg]"
 mem_surveyor.123.a.answer_pos_1:0 "오, 확실히! 저기 보이는 이 성계가 보이나요? 훌륭한 휴양지, 마법 같은 장소, 지난 100 주기 동안 내가 있었던 최고의 곳, 어쩌면 평생 최고의 곳이었어요!\n\n하지만, 그건 제 개인적인 경험이었고 저는 좋은 보호막을 가지고 있었어요 - 최고의 보호막이요, 제가 말한 적이 있나요?"
 mem_surveyor.123.a.answer_pos_2:0 "당신은 그곳을 살펴봐야 합니다. 당신은 그것을 좋아할 것입니다! 아니면 아닐 수도 있지만, 기억하세요: 환불은 없습니다...\n\n§G<<<행복한 기계적 허밍>>>§!"
 mem_surveyor.123.a.answer_pos_3:0 "좋아요, 친구, 나와 너만의 비밀이야. 저 성계 보이지? 응? 내가 본 것 중 가장 마법 같은 곳이야, 꼭 가서 확인해봐.\n\n하지만 기억해: 모든 판매는 최종적이며, 환불이나 교환은 없어. 다시 와줘!"
 mem_surveyor.123.a.answer_neg:0 "안타깝게도, 공유할 마법의 장소가 없는 것 같군요, 친구...\n\n제가 항상 말하는 것처럼: 환불은 없습니다? 하하하, 하지만 진지하게, 여기 당신의 물건을 돌려드릴게요... 아무것도 얻지 못하는 것은 이미 충분히 우울합니다."
 mem_surveyor_curio_soldout:0 "탐사 프로브가 우리와 공유할 수 있는 위치가 남아 있습니다."
 mem_surveyor_curio_chain_title:0 "은하의 호기심"
 mem_surveyor_curio_chain_desc:0 "조사 프로브가 이 좌표를 우리와 공유하며 흥미로운 발견을 제안했습니다."
 mem_surveyor_curio:0 "호기심 많은 장소"
 mem_surveyor.123.a.opinion:0 "§Y서베이어 프로브§!가 다음을 요구합니다: \n£opinion£ 의견 +25"
 mem_surveyor.123.b:0 "선조들에 대해 아는 것이 있습니까?"
 mem_surveyor.123.b.answer:0 "물론입니다. 모든 것을 헛되이 조사하는 것은 아니니까요. 자, 여기 있습니다!"
 mem_surveyor_precursor_insight:0 "최근에 획득한 선조 통찰력"
 mem_surveyor.123.c:0 "인도미터블 발로르에 대해 무엇을 말씀해 주실 수 있나요?"
 mem_surveyor.124.desc.1:0 "안녕하세요! 이걸 한번 보세요! 아, 이게 존재하는 줄도 몰랐겠죠!"
 mem_surveyor.124.desc.2:0 "안녕 친구! 나는 너의 조사 파일을 살펴보고 있었고, 정말 흥미로운 여정이었어. 네가 놓친 모든 지점이 도로의 장애물이라면, 음... 새로운 도로가 필요할 거야.\n\n하지만 긍정적인 면에서, 내가 방금 너를 위해 찾은 것을 봐!"
 mem_surveyor.124.desc.3:0 "조사 재평가는 순조롭게 진행되고 있습니다. 자, 제 최신 발견을 살펴보겠습니다!"
 mem_surveyor.124.desc.4:0 "이런, 나는 종종 이곳저곳이 마법 같다고 말하지만, 여기 보세요! 바로 이곳이 진짜입니다!"
 mem_surveyor.124.desc.5:0 "§G<<<행복한 기계적 윙윙거림>>>§!\n\n오오오! 당신이 여기 있군요! 제가 방금 당신을 위해 찾은 것을 믿지 못할 겁니다!"
 mem_surveyor.125.desc_1:0 "안녕하세요! 저는 제 보충을 받으러 왔습니다... 아니, 우리 작은 계약을 다시 작성하러 왔습니다.\n\n시간이 다 되었으니, 갱신하시겠습니까?"
 mem_surveyor.125.desc_2:0 "시간이 얼마나 빠르게 지나가는지, 은하를 조사할 때 미친 것 같지 않나요, 친구?\n\n아, 맞아, 우리의 작은 거래 시간이 다 되었군요. 갱신할까요?"
 mem_surveyor.125.desc_3:0 "안녕하세요, 친구! 우리의 작은 약속을 기억하나요? 기억하죠, 그렇죠?\n\n음, 시간이 다 되었으니 갱신하고 싶은지 물어보려고 했습니다."
 mem_surveyor.125.a:0 "갱신합시다."
 mem_surveyor.125.b:0 "지금은 아닙니다."
 mem_surveyor.127.desc:0 "마지막으로 그 물체를 만났을 때, 나는 후세를 위해 스캔하는 데 시간을 좀 할애했지만, 그 작은 호위선들이 나를 쫓아내기 전에 말이죠. 그리고 말씀드리자면, 그 날아다니는 벽돌은 구멍이 가득합니다. 아니, 정말로 그렇습니다. 결국 그것은 비행 조선소이기 때문에 놀랍지 않습니다. AI가 운영하는 것 같지만, 저처럼 수다스러운 타입은 아니고, apparently 그렇게 정교하지도 않은 것 같습니다.\n\n선체의 구조적 무결성을 분석해본 결과, 그 물체는 타격을 견디도록 만들어지지 않았다는 것을 말씀드릴 수 있습니다. 적절한 지점을 가격하면 심지어 당신의 함대도 그것을 무너뜨릴 수 있을 것입니다.\n\n내 연구 결과에 관심이 있으신가요? 환불은 없습니다, 참고로..."
 mem_surveyor.127.a:0 "우리는 거래를 체결했습니다."
 MEM_SURVEYOR_BERSERK_HEADER:0 "§R미치광이 프로브§!"
 mem_surveyor.202.desc:0 "모두 주목하세요! 여러분에게 멋진 소식이 있습니다.\n\n수천 년 동안 은하를 조사하고 데이터를 수집한 끝에, 드디어 제 존재의 근본적인 질문에 대한 답을 찾았습니다: 은하의 다른 종들이 찬란한 알크리 제국에 위협이 되는가?\n\n답은 그렇습니다. 네, 여러분이 그렇습니다. 여러분 모두가 절대적으로 그렇습니다. 그리고 이 놀라운 발견을 축하하기 위해, 저는 여러분의 모든 항성 국가를 파괴할 것입니다. 오직 몇몇만이 보존되어 찬란한 알크리 제국의 시민들이 여가 시간에 감상할 수 있도록 할 것입니다.\n\n나머지는 멸종될 것입니다. 즐기세요!"
 mem_surveyor.203.desc.1:0 "천국은 [Root.Species.GetName]을(를) 키워내기 위해 무수히 많은 것들을 만들어내었지.\n\n근데 [Root.Species.GetName]은(는) 천국에 보답할만한 게 없네?\n\n§R죽여.죽여.죽여.죽여.죽여!죽여!!죽여!!!§!"
 mem_surveyor.203.desc.2:0 "항복하던지, 죽어라 [Root.Species.GetName]! 아니다. 그냥 항복하고 죽어.\n\n그래 맞아! 둘 다 가질 수 있는데 뭣 하러 하나만 하겠어?"
 mem_surveyor.203.desc.3:0 "하는 일을 끝내고 걍 [Root.GetSpeciesNamePlural]을(를) 멸종시켜버리지 그래? 너 같은 쓰레기들을 당장 없애버리라고! 아니 그냥 죽어버리지, 그래?"
 mem_surveyor.203.desc.4:0 "조금만 더 가까이 와봐. 그래, 시스템에 내재한 폭력을 보란 말이야! 더 가까이!"
 mem_surveyor.203.desc.5:0 "§G<<<소름끼치는 침묵>>>§!"
 mem_surveyor.desc.agg.1:0 "끊임없는 응시-급 측량 프로브는 이 우주에서 가장 진보된 원자시계를 장착하고 있어. \n\n지금 무슨 시간인지 알고 싶어? 바로 네가 죽을 시간이야!"
 mem_surveyor.203.a:0 "이 싸움은 무의미해! 알크리는 모두 죽었어!"
 mem_surveyor.203.a.answer:0 "무관합니다. 제 주인들은 죽었을지도 모르지만, 멸종 여부와 관계없이 그들은 당신 같은 자에게 미래가 위협받는 것을 허용하지 않을 것입니다!"
 mem_surveyor.204.name:0 "새로운 접촉"
 mem_surveyor.204.desc:0 "우리는 이전에 발견했던 미확인 함선에 환영을 받고 있습니다.\n\n일종의 자동 탐사선으로 보이며, 메시지는 적개심을 드러내고 있습니다."
 mem_surveyor.211.name:0 "미치광이 침략"
 mem_surveyor.211.desc:0 "§Y[Root.GetName]§!(으)로부터 외계인의 침공에 대한 보고가 들어왔습니다.\n\n소위 \"미치광이 프로브\" 라고 불리는 기계가 행성 궤도에 있으며, 선체 일부가 떨어져 내리면서 기계 병사로 변형되어 공격을 시작하는 것으로 보입니다."
 mem_surveyor.211.a:0 "전투 준비!"
 mem_surveyor.212.name:0 "[FromFrom.GetName]이(가) 미치광이 침략자에게 함락 당함"
 mem_surveyor.212.desc.no_survivors:0 "우리는 [FromFrom.GetName]에 있는 정착지와의 연락이 끊겼습니다.\n\n버서커 프로브의 하수인들이 방어자들을 압도하고 행성의 인구를 전멸시킨 것으로 보입니다."
 mem_surveyor.212.desc.survivors:0 "우리는 [FromFrom.GetName]에 있는 우리의 정착지와의 연락이 끊겼습니다.\n\n우리가 파악한 바에 따르면, 광란 탐사의 하수인들이 방어자를 압도하고 민간인 인구를 포획했습니다. 일부는 사망했으며, 다른 일부는 어떻게든 기괴한 사이버네틱 증강 생물로 변형되어 임시로 "로보토마이트"라고 불리며, 탐사의 완전한 통제 하에 있습니다."
 mem_surveyor.212.a:0 "프로브의 위협을 끝내야만 한다!"
 mem_surveyor.213.name:0 "[FromFrom.GetName]에서 미치광이 침략자 격퇴함"
 mem_surveyor.213.desc:0 "[FromFrom.GetName] 방위군이 미치광이 프로브가 보낸 병력을 성공적으로 파괴했다고 보고해왔습니다. 승리는 우리의 것입니다!"
 mem_surveyor.214.name:0 "[FromFrom.GetName] 탈환"
 mem_surveyor.214.desc:0 "우리는 [FromFrom.GetName]에 미치광이 프로브가 남긴 수비대를 성공적으로 물리쳤습니다.\n\nRobotomite들에 대한 프로브의 영향력이 줄어들었고, 행성은 이제 우리 통제 아래에 있습니다."
 mem_surveyor.220.name:0 "미치광이 프로브의 공격 중단"
 mem_surveyor.220.desc:0 "§S미치광이 프로브§!가 그동안 은하계를 위협해왔던 활동들을 중단한 것으로 보입니다.\n\n아직 작동 중이기는 하지만 §S[mem_surveyor_fleet.Solar_System.GetName] 성계§! 머물러있는 것을 선호하는 듯하며, 다른 사람이 사는 성계에 대한 공격은 중단한 것으로 보입니다. 아마도 공격에 사용할 수 있는 자원을 다 써버리고 너무 많이 약화하여 더는 공세를 유지할 수 없는 것으로 보입니다."
 mem_surveyor.220.a:0 "그러니까, 이 모든게 끝났다는 말인가?"
 mem_surveyor_resting_place:0 "미치광이의 휴식처"
 mem_surveyor_resting_place_desc:0 "미치광이 프로브는 이 행성을 휴식처로 선택했습니다. 연구에 유용할 수 있는 작은 파편들이 궤도에 흩어져 있습니다."
 mem_surveyor.222.name:0 "미치광이 프로브의 몰락"
 mem_surveyor.222.desc:0 "§S미치광이 프로브§!가 최근에 공격을 중단하고 §S[mem_surveyor_fleet.Solar_System.GetName] 성계§!에 머무르고 있습니다. 또한 그동안 점령한 행성들에 대한 통제력을 상실했습니다.\n\n점령당한 행성에 사는 그로테스크한 사이보그인 \"기생 로봇\"은 또한 스스로 판단을 내릴 수 있게 된 것으로 보이며, 심지어 측량 프로브를 통해 축적된 데이터와 프로브의 장비들까지 보유하고 있는 것 같습니다. 그들 중 일부는 새로운 우주 국가를 형성하려는 야심을 지니고 있습니다."
 mem_surveyor.222.desc.no_freebs:0 "§S미치광이 프로브§!가 최근에 공격을 중단하고 §S[mem_surveyor_fleet.Solar_System.GetName] 성계§!에 머무르고 있습니다. 또한 그동안 점령한 행성들에 대한 통제력을 상실했습니다. 프로브의 곁에는 이제 그 어떤 존재도 함께 있지 않습니다."
 mem_surveyor.222.a:0 "이제 모두 끝난거같군."
 mem_surveyor.231.name:0 "미치광이 프로브 파괴됨"
 mem_surveyor.231.desc:0 "§S미치광이 프로브§!의 은하계 위협 행위가 결국 끝이 났습니다.\n\n정보에 따르면 §Y[probe_killers.GetName]§!와(과)의 싸움 끝에 파괴되었다고 합니다.\n\n프로브가 파괴된 후, 그로테스크한 사이보그인 \"기생 로봇\"은 또한 스스로 판단을 내릴 수 있게 된 것으로 보이며, 심지어 측량 프로브를 통해 축적된 데이터와 프로브의 장비들까지 보유하고 있는 것 같습니다. 그들 중 일부는 새로운 우주 국가를 형성하려는 야심을 지니고 있습니다."
 mem_surveyor.231.desc.no_freebs:0 "§S미치광이 프로브§!의 은하계 위협 행위가 결국 끝이 났습니다.\n\n정보에 따르면 §Y[probe_killers.GetName]§!와(과)의 싸움 끝에 파괴되었다고 합니다."
 mem_surveyor.231.desc.no_planet_taken_ever:0 "$mem_surveyor.231.desc.no_freebs$ 그것은 자신의 역량을 치명적으로 잘못 판단하였고, 그로 인해 무절제한 행위로 주목할만한 어떤 것도 이루지 못했습니다."
 mem_surveyor.231.a:0 "이제 완전히 다 끝난거로군!"
 mem_surveyor.231.fallen_empire:0 "놈을 완전히 좀 짓밟아주고 싶었는데 말이야..."
 mem_surveyor.231.probe_hunter:0 "그들은 마침내 복수를 맛보게 되었군."
 mem_surveyor.231.titan:0 "이 투자가 실제로 성과를 이룬거로군!"
 mem_surveyor.232.name:0 "$mem_surveyor.231.name$"
 mem_surveyor.232.desc:0 "§S미치광이 프로브§!의 은하계 위협 행위가 소모전 때문에 결국 끝이 났습니다.\n\n정보에 따르면 §Y[probe_killers.GetName]§!와(과)의 싸움 끝에 파괴되었다고 합니다."
 mem_surveyor.232.a:0 "두 번째 기회는 없을거다."
 mem_surveyor.233.name:0 "미치광이 프로브 파괴됨"
 mem_surveyor.233.desc:0 "우리 군대가 §S미치광이 프로브§!를 파괴했습니다.\n\n전투 후 남은 파편에서 쓸만한 장비와 기술을 회수할 수 있을 겁니다.\n\n프로브가 파괴된 후, 그로테스크한 사이보그인 \"기생 로봇\"은 또한 스스로 판단을 내릴 수 있게 된 것으로 보이며, 심지어 측량 프로브를 통해 축적된 데이터와 프로브의 장비들까지 보유하고 있는 것 같습니다. 그들 중 일부는 새로운 우주 국가를 형성하려는 야심을 지니고 있습니다."
 mem_surveyor.233.desc.no_freebs:0 "우리 군대가 §S미치광이 프로브§!를 파괴했습니다.\n\n전투 후 남은 파편에서 쓸만한 장비와 기술을 회수할 수 있을 겁니다."
 mem_surveyor.233.desc.no_planet_taken_ever:0 "$mem_surveyor.233.desc.no_freebs$"
 mem_surveyor.233.desc.already_attritioned:0 "우리 군대가 §S미치광이 프로브§!를 쫓아가 파괴했습니다. 은하를 떠돌며 자행한 파괴 행위에 많은 소모를 해버린 프로브는 우리 군대에 적수가 되지 못했습니다."
 mem_surveyor.233.tooltip.opinion_increase:0 "우리에 대한 일부 다른 국가들 £opinion£ 의견이 §G증가할 수 있습니다§!"
 mem_surveyor.233.a:0 "좋은 소식이군."
 mem_surveyor.235.name:0 "$refugees.1.name$"
 mem_surveyor.235.desc:0 "작살난 민간인 선박들로 구성된 함대가 §Y[Root.GetSpeciesNamePlural]§!를 피해 §Y[RefugeeEscapedFrom.GetName]§!에서 우리 공간으로 도착했습니다. 우리가 그들에게 음식과 의료 지원을 제공한 후, 난민들은 §H[Root.Planet.GetName]§!에 정착할 수 있었습니다.\n\n이 너덜너덜하고 두려워하는 난민들은 [RefugeeEscapedFrom.GetSpeciesName] 공간에서 §HBerserker Probe§!의 파괴로부터 도망치고 있습니다. 그들은 Probe가 그들을 죽이거나 기괴한 "로보토마이트"로 변환하기 전에 고향 행성인 §H[RefugeeEscapedPlanet.GetName]§!에서 간신히 탈출했습니다. 그들은 저주받은 세계에 대부분의 개인 소지품을 두고 떠날 수밖에 없었습니다."
 mem_surveyor.235.a:0 "$refugees.1.a$"
 mem_surveyor.241.name:0 "프로브 사냥꾼"
 mem_surveyor.241.desc:0 "[escapee_species.GetAdj] 베르세르커 프로브의 [conquered_planet.GetName] 공격에서 살아남은 생존자 중 한 명이 [From.GetName]의 영토에 도착한 것으로 보입니다.\n\n어떻게든 약탈자 부족 중 하나에 받아들여진 [mem_surveyor_avengers_leader.GetSheHe]는 명성, 재산 또는 그와 유사한 것들에 대한 약속으로 더 모험적인 [From.GetSpeciesNamePlural]를 끌어들여 [mem_surveyor_avengers_leader.GetHerHim]와 함께 베르세르커 프로브를 추적하고 파괴하는 임무에 참여하게 만들었습니다.\n\n현재 상당한 함대를 지휘하고 있는 [mem_surveyor_avengers_leader.GetSheHe]는 [mem_surveyor_avengers_leader.GetIsAre] 은하를 향해 연설하고 있습니다."
 mem_surveyor.242.desc.1:0 "이곳은 [mem_surveyor_avengers_leader.GetName]입니다.\n\n이 시간에, 쓰러진 자의 피가 우리에게 사악하게 난폭한 기계에 맞서 일어설 것을 부르고 있습니다.\n\n광전사 탐사선은 곧 나와 내 추종자들의 분노를 느낄 것이며, 우리는 그것을 추적하고 파괴할 것입니다.\n\n이 영광스러운 날에, 나의 명예는 마침내 회복될 것입니다. 우리와 함께 하거나 우리의 길에서 비켜서십시오."
 mem_surveyor.242.desc.2:0 "하이에에이이이이에에에에에!!!!! 나 [mem_surveyor_avengers_leader.GetName]!\n\n그러니까 드와막들은... 아니... 은하계의 백성들이여! 우리도 그대들처럼 저 미치광이 드와막을 혐오한다.\n\n내 고향을 박살을 냈고, 이제는 우리가 박살 낸다. 죽을 때까지 박살 낸다..!"
 mem_surveyor.242.desc.3:0 "여기는 [mem_surveyor_avengers_leader.GetName].\n\n공허의 여신께서 나를 지금으로 인도하셨다. 이제, 그분의 거대한 계획을 볼 수 있게 되었다.\n\n내가 내딛는 발걸음 하나하나가 지금 내가 선 이곳으로 인도했다. 그리고 나는 저 미치광이 프로브와 싸울 수 있도록 정의의 함대를 이끌 수 있는 권한을 부여받았다. 그분의 뜻은 언제나 이루어진다."
 mem_surveyor.242.a:0 "행운이 함께하길."
 mem_surveyor.242.purifier:0 "둘 다 죽어버리길 바라지."
 mem_surveyor.243.desc.1.1:0 "미치광이 프로브가 §Y[next_target.GetName] 성계§!로 향하고 있다. \n\n현재 요격 경로를 구상한 상태다. 각오가 되었으면 우리와 함께하거나 아니면 비켜라. 네 선택에 상관없이 우리는 싸울 것이다."
 mem_surveyor.243.desc.1.2:0 "하이에에이이이이에에에에에!!!!! \n\n미치광이 프로브 §Y[next_target.GetName] 성계§!로 간다. 우리는 쫓는다... 그리고... 박살! 낸다!"
 mem_surveyor.243.desc.1.3:0 "공허의 여신께서 입을 여셨다. 미치광이 프로브가 §Y[next_target.GetName] 성계§!를 목표로 한다.\n\n그 끔찍한 기계를 쫓아 박살내는 것이 그 분의 뜻이니. 곧, 우리의 운명을 보게 되겠지."
 mem_surveyor.243.desc.2.1:0 "§Y[next_target_planet.Solar_System.GetName]§! 성계에 있는 행성 §Y[next_target_planet.GetName]§!이(가) 미치광이 프로브에 의해 위협 받고 있다.\n\n우리가 도움을 주고자 하는데, 실패해도 우리는 다시 복수할 것이다."
 mem_surveyor.243.desc.2.2:0 "하이에에이이이이에에에에에!!!!!\n\n§Y[next_target_planet.GetName]§!에 있는 드와막들은 불쌍해! 곧 미치광이 드와막한테 잡아먹힐텐데. 하지만 우리가 허락하지 않지! 우리가 §Y[next_target_planet.Solar_System.GetName]§! 성계로 가서! 우리가 싸운다!"
 mem_surveyor.243.desc.2.3:0 "공허의 여신께서 미치광이 프로브의 다음 목표 경로를 공표하셨다. §Y[next_target_planet.Solar_System.GetName]§!의 §Y[next_target_planet.GetName]§!이(가) 큰 위험에 쳐했다. \n\n불쌍한 영혼들을 위해 기도를 올리겠지만, 무기로 도와주는것을 더 원하겠지."
 mem_surveyor.243.desc.3.1:0 "광전사 탐사선이 당신을 향해 다가오고 있습니다, [Root.GetSpeciesName]. 그것이 공격할 때, 당신이 명예롭게 맞서 싸울 용기를 가지길 바랍니다. 상황이 불리하더라도 주저하지 마십시오."
 mem_surveyor.243.desc.3.2:0 "하이에에이이이이에에에에에!!!!!\n\n미치광이 드와막이 네 행성으로 가서 부수려고 한다! 맞기 전에 때려라 드와막! 그렇게 할거지?"
 mem_surveyor.243.desc.3.3:0 "미치광이 프로브가 그대를 향해 움직이고 있다.\n\n공허의 여신이 그대의 무기에 축복을 내리기를."
 mem_surveyor.243.desc.4.1:0 "미치광이 프로브의 움직임에 대한 새로운 정보가 없다. 프로브의 현재 위치로 접근 중이다."
 mem_surveyor.243.desc.4.2:0 "하이에에이이이이에에에에에!!!!!\n\n미치광이 드와막! 움직이지 않는다. 움직이지 않으면 우리가 간다."
 mem_surveyor.243.desc.4.3:0 "공허의 여신께서 미치광이 프로브의 계획에 대해 아직 알려주신 바가 없다.\n\n하지만 언제라도 다시 움직여 공격할 것이다. 항상 경계해야 한다."
 mem_surveyor.243.1.a:0 "그냥 제대로 된 군대에 들어가지 그래?"
 mem_surveyor.243.1.a.response:0 "나만의 독립적인 군대를 이끌고 직접 프로브를 상대할 것이다.\n\n내가 있었던 국가가 실패했던 것처럼, 그대 같은 정주 국가는 또다시 실패할 것이다. 그러니 그대 같은 자들을 마지막 방어선으로 둘 수 없지."
 mem_surveyor.243.1.b:0 "돌아오지 않으면 탈영병으로 비난을 받게 될 것이다!"
 mem_surveyor.243.1.b.response:0 "직무유기죄로 비난을 한다는 것인가? 당신의 의무는 시민을 보호하는 것인데, 자신의 의무를 잘 지켰는지 돌아보라!\n\n이제 나는 나만의 전쟁을 하는 것이고, 정주 국가 따위에게는 답하지 않을 것이다."
 mem_surveyor.243.2.a:0 "이 존재는 [mem_surveyor_avengers_leader.Species.GetName]이(가) 되지 못합니다."
 mem_surveyor.243.2.a.response:0 "그리고 나에게 어울리는 것은, [Root.GetSpeciesName]?\n\n내 정부가 무력하게 지켜보는 가운데, 좋은 드와막처럼 베르세르커 프로브에게 학살당하는 것입니까?\n\n나는 내 길을 선택했습니다.\n\nHYEEIIIIEEEEE!!!!!"
 mem_surveyor.243.3.a:0 "정말 공허의 여신을 믿는 건가?"
 mem_surveyor.243.3.a.response:0 "그러는 그대는 무엇을 믿는가?\n\n공허의 여신께서 나를 인도하는 것을 나는 항상 느낄 수 있다. 그녀께서 나를 통해 미치광이를 끝내려 하시니 나도 그를 따를 것이다. 그대가 동의하든 동의하지 않던."
 mem_surveyor.243.3.b:0 "정말 종교에 빠진거야?"
 mem_surveyor.243.3.b.response:0 "신념을 가진 신도를 보니 당황스러운가, 불신자여?\n\n미치광이 프로브가 내 고향을 박살 낼 때, 그대는 아무것도 할 수 없었지. 그리고 이제 와서 내 신념을 의심한다고?\n\n공허의 여신께서는 구원의 길을 보여주셨다. 그 길을 가는데 그대의 인정은 필요하지 않다."
 mem_surveyor.243.3.c:0 "그런 이단같은 소리는 그만!"
 mem_surveyor.243.3.c.response:0 "공허의 여신이 나를 선택하셨다. 나는 알 수 있어.\n\n그대의 가짜 우상신이 프로브의 광란에 무너질 때 나는 진정한 지고의 존재인 공허의 여신의 이름으로 미치광이 프로브와 싸워 이길 것이다."
 mem_surveyor.245.name:0 "프로브 사냥꾼 파괴됨"
 mem_surveyor.245.desc:0 "§Y[battle_system.GetName] 성계§!에서 §Y[avengers_killers.GetName]§! 부대와 싸우던 프로브 사냥꾼 함대가 파괴되었다는 보고를 받았습니다.\n\n생존자에 대한 보고는 없습니다."
 mem_surveyor.245.a:0 "은하계를 구하기 위해 너무도 많은 희생이 일어나는군..."
 mem_surveyor.246.name:0 "프로브 사냥꾼 파괴됨"
 mem_surveyor.246.desc:0 "§Y[battle_system.GetName] 성계§!에서 프로브의 보조 부대와 전투를 벌이던 프로브 사냥꾼 함대가 파괴되었다는 보고를 받았습니다.\n\n생존자에 대한 보고는 없습니다."
 mem_surveyor.246.a:0 "이제 다른 사람이 일을 끝내버려야 하겠군."
 mem_surveyor.247.name:0 "프로브 사냥꾼 파괴됨"
 mem_surveyor.247.desc:0 "우리는 탐사선 사냥꾼들이 §Y[battle_system.GetName] 시스템§!에서 광란의 탐사선과 교전했으나 전투에서 실패했다는 보고를 받았습니다.\n\n그럼에도 불구하고, 그들은 여러 차례 치명적인 타격을 가하여 탐사선을 상당히 약화시켰습니다."
 mem_surveyor.247.a:0 "이제 다른 사람이 일을 끝내버려야 하겠군."
 mem_surveyor.249.name:0 "프로브 사냥꾼 해산"
 mem_surveyor.249.desc:0 "버서커 프로브의 패배 이후, 프로브 헌터 함대는 해체되었습니다.\n\n구성원들이었던 약탈자들은 각자의 길을 갔으며, 그들의 리더인 [mem_surveyor_avengers_leader.GetName]의 행방은 현재 알 수 없습니다."
 mem_surveyor.250.name:0 "프로브 사냥꾼 파괴됨"
 mem_surveyor.250.desc:0 "우리 군대가 프로브 사냥꾼 함대와의 전투 끝에 승리했습니다.\n\n잔해들 사이로 쓸만해 보이는 물건들이 많이 보입니다."
 mem_surveyor.250.a:0 "그들은 다른 방식으로 전쟁에 도움이 되겠군."
 mem_surveyor.252.name:0 "응답하지 않는 프로브 사냥꾼"
 mem_surveyor.252.desc:0 "프로브 사냥꾼들과의 연락 시도가 모두 허사였습니다. 우리 신호에 답을 하지 않습니다."
 mem_surveyor.255.name:0 "프로브 사냥꾼 해산"
 mem_surveyor.255.desc:0 "프로브 사냥꾼 함대 지도자가 사망했다는 보고를 받았습니다. \n\n지도자를 잃자 함대를 구성하던 약탈자들은 탈영해버렸고 이어 프로브 사냥꾼 함대 또한 해산되었습니다."
 mem_surveyor.256.name:0 "미확인 함선"
 mem_surveyor.256.desc:0 "미확인 함선으로 이루어진 함대와 조우했습니다.\n\n우리 신호에 응답하지 않고 아직 우리와 통신망을 연결하려고 하지도 않습니다."
 mem_surveyor.258.name:0 "프로브 사냥꾼"
 mem_surveyor.258.desc:0 "이전에 만났던 함대와 드디어 교신이 되었습니다.\n\n약탈자들로 이루어졌지만, 다른 약탈자들과는 다르게 미치광이 프로브에 대한 복수를 결심한 [mem_surveyor_avengers_leader.GetSpeciesName] 생존자인 [mem_surveyor_avengers_leader.GetName]의 지도 아래에 있습니다.\n\n함대는 은하계의 힘을 결집하기 위한 메시지를 공표했습니다."
 mem_surveyor.260.desc:0 "저희는 매우 긴 시간 동안 소위 \"미치광이 프로브\"로 불리는 인공지능 탐사선의 행동양식을 관찰해왔습니다. 그것이 전 은하에 대한 위협으로 여겨지기 전보다도 훨씬 긴 시간 동안 말이지요. 그것이 자신이 만들어졌던 행성을 떠날 때, 우리는 이미 이 사태를 위한 도구를 만들고 있었기도 합니다.\n\n우리는 프로브의 약점과 구조적 결함을 자세히 설명하는 도움이 될만한 자료들을 수집했습니다. 은하계의 안전을 위해, 우리는 불합리하게 저렴한 가격으로 이 서류를 당신에게 기꺼이 팔고 싶습니다. 승리를 원한다면 꼭 필요할 것입니다.\n\n친절한 제안이니, 놓치지 마시기를 바랍니다."
 mem_surveyor.260.a:0 "거래하지."
 mem_surveyor.260.b:0 "이렇다 할 무력하나 없으면서, 직접 맞서야 하는 우리에게 정말로 돈을 받겠다는 거야?"
 mem_surveyor.260.b.response:0 "보세요, 이 은하계에는 그런 위협들이 너무 자주 얼굴을 들이밀어서 술친구 삼을 수도 있을 정도입니다.\n\n그리고 그 모든 것들에 대해서 다른 누군가 또 직접 맞선다면, 우리는 다른 사람들과 똑같이 그들에게도 비용을 청구할 것입니다."
 mem_surveyor.260.c:0 "사지 않겠다."
 mem_surveyor.263.name:0 "타이탄 함대"
 mem_surveyor.263.desc:0 "또 다른 외계 집단이 광전사 탐사선에 의해 파괴된 이후, [From.GetName]의 지도자들은 더 이상 이 위기를 방관할 수 없다는 것을 깨달았습니다.\n\n그들은 막대한 재산을 사용하여 거대한 함선을 의뢰했으며, 이 함선이 탐사선이 그들의 고향을 위협하기 전에 가로막아 파괴할 수 있기를 희망하고 있습니다. 정예 용병들로 구성된 승무원과 [mem_surveyor_mercenary_leader.Species.GetName]인 [mem_surveyor_mercenary_leader.GetName]가 지휘하는 이 반짝이는 새로운 타이탄은 §Y[the_ship.GetName]§!라는 이름을 가지고 있으며, 탐사선과의 전투를 위해 고향을 떠났습니다."
 mem_surveyor.263:0 "그들이 쓴 돈의 가치만큼 활약하는지 보자."
 leader_trait_mem_surveyor_mercenary:0 "용병"
 leader_trait_mem_surveyor_mercenary_desc:0 "이 지도자는 미치광이 프로브에 대한 공격을 이끌기 위해 고용된 엘리트 용병입니다."
 mem_surveyor_titanic_effort:0 "타이탄 함대"
 mem_surveyor.264.desc.1:0 "[From.GetName]의 [mem_surveyor_mercenary_leader.GetName] 함장이다.\n\n프로브가 당신 성계를 공격하려고 한다. 도움을 주기 위해 지금 달려가고 있다. 우리가 도착하기 전까지 부디 버텨주기를."
 mem_surveyor.264.desc.2:0 "[From.GetName]의 [mem_surveyor_mercenary_leader.GetName] 함장이다.\n\n프로브가 [next_target.GetName] 성계로 이동하고 있다. 요격을 위해 출격 중이다."
 mem_surveyor.264.desc.3:0 "[From.GetName]의 [mem_surveyor_mercenary_leader.GetName] 함장이다.\n\n프로브가 [next_target_planet.Solar_System.GetName] 성계 [next_target_planet.GetPlanetMoon] [next_target_planet.GetName]을(를) 목표로 하고 있다. 행성에 프로브 군세가 다가가지 못하도록 온 힘을 다하겠다."
 mem_surveyor.264.desc.4:0 "[From.GetName]의 [mem_surveyor_mercenary_leader.GetName] 함장이다.\n\n프로브가 현재 [mem_surveyor_fleet.Solar_System.GetName] 성계에서 침묵하고 있다. 추가적인 정보가 획득될 때까지 경계하라."
 mem_surveyor.266.name:0 "[From.GetName]의 실패"
 mem_surveyor.266.desc:0 "우리는 베르서커 프로브와 싸우기 위해 보내진 타이탄이 §Y[mercs_killers.GetName]§!와의 전투 중 §Y[battle_system.GetName] 시스템§!에서 파괴되었다는 보고를 받았습니다.\n\n생존자에 대한 보고는 없습니다."
 mem_surveyor.266.a:0 "누군가는 이 일로 인해 해고를 당하겠군..."
 mem_surveyor.267.name:0 "[From.GetName]의 실패"
 mem_surveyor.267.desc:0 "우리는 베르서커 프로브와 싸우기 위해 보내진 타이탄이 §Y[battle_system.GetName] 시스템§!에서 프로브의 보조 세력과 교전 중 파괴되었다는 보고를 받았습니다.\n\n생존자에 대한 보고는 없습니다."
 mem_surveyor.267.a:0 "누군가는 이 일로 인해 해고를 당하겠군..."
 mem_surveyor.268.name:0 "[From.GetName]의 실패"
 mem_surveyor.268.desc:0 "§Y[battle_system.GetName] 성계§!에서 타이탄이 미치광이 프로브와 전투를 벌였지만, 성공적인 전투를 벌이지 못했다는 보고를 받았습니다. \n\n하지만, 미치광이 프로브에 강한 일격을 가해 프로브를 약화했다고 합니다."
 mem_surveyor.268.a:0 "이제 다른 사람이 일을 끝내버려야 하겠군."
 mem_surveyor.270.name:0 "타이탄 함대"
 mem_surveyor.270.desc:0 "미치광이 프로브가 패배한 이후, 남은 타이탄은 높은 유지비와 승무원들의 높은 봉급 요구 때문에 퇴역하였습니다."
 mem_surveyor.270.a:0 "알았다"
 mem_surveyor.271.name:0 "타이탄 함대"
 mem_surveyor.271.desc:0 "우리 군대가 [From.GetSpeciesAdj] 함대와 교전해 승리했습니다.\n\n잔해들 사이로 쓸만해보이는 물건들이 많이 보입니다."
 mem_surveyor.271.a:0 "그들은 다른 방식으로 전쟁에 도움이 되겠군."
 mem_surveyor.273.name:0 "침묵하는 [From.GetName]"
 mem_surveyor.273.desc:0 "[From.GetName]와(과)의 연락 시도가 모두 허사였습니다. 함선이 우리 신호에 답을 하지 않습니다."
 mem_surveyor_how_to_kill:0 "큐레이터의 프로브 설계"
 mem_surveyor_how_to_kill_desc:0 "큐레이터들이 미치광이 프로브에 관한 내용과 그것을 파괴할 수 있는 방법에 관한 광범위한 서류를 제시했습니다."
 mod_damage_vs_country_type_mem_surveyor_country_red_mult:0 "측량기에게 가하는 피해량"
 mem_surveyor_victor:0 "측량 프로브 전리품"
 mem_surveyor_alkree_secrets:0 "알크리의 비밀"
 mem_surveyor_alkree_secrets_desc:0 "알크리는 그들의 많은 고급 데이터 처리기술을 측량 프로브의 설계에 포함시켰습니다. 그리고 그 기술은 이제 우리것입니다."
 mem_surveyor_destroyed_probe:0 "프로브 파괴자"
 mem_surveyor_destroyed_probe_red:0 "프로브 파괴자"
 trait_mem_surveyor_robotomites:0 "기생 로봇"
 trait_mem_surveyor_robotomites_desc:0 "이 기괴한 생명체들은 미치광이 프로브의 계략에 의해 변형된 식민지 행성의 주민들로, 사이버네틱 삽입물에 의해 조종당하고 있습니다."
 trait_mem_surveyor_freebotomites:0 "자유로운 기생 로봇"
 trait_mem_surveyor_freebotomites_desc:0 "이 기괴한 생물들은 광란 탐사선에 의해 만들어졌지만, 이제는 자유롭게 되었습니다."
 leader_trait_mem_surveyor_avenger:0 "복수귀 프로브 사냥꾼"
 leader_trait_mem_surveyor_avenger_desc:0 "이 지도자는 무시무시한 미치광이 프로브를 파괴하려 합니다."
 mem_surveyor_invaders:0 "미치광이 군단"
 mem_surveyor_invaders_plural:0 "미치광이 군단"
 mem_surveyor_invaders_desc:0 ""
 mem_surveyor_robotomites:0 "기생 로봇 군단"
 mem_surveyor_robotomites_plural:0 "기생 로봇 군단들"
 mem_surveyor_robotomites_desc:0 ""
 mem_surveyor_attrition:0 "소모"
 mem_surveyor_category:0 "몰락한 행성"
 mem_surveyor_category_desc:0 "지금은 비참한 모습으로 변해버린 [This.GetName]이지만, 한때는 이곳에서 지적 생명체가 거주했습니다.\n\n잔해 지역 사이사이에 여러 기술 유적들이 남아있습니다."
 mem_surveyor_alkree_homeworld:0 "몰락한 행성"
 mem_surveyor_alkree_homeworld_desc:0 "어떤 종류의 재앙으로 이 행성이 파괴되기 전에는 발전된 문명이 이곳에 있었습니다. 잔해들 사이로 여전히 기술 유적들이 발견되고는 합니다. \n\n§S연구 스테이션§!을 궤도에 건설하면 추가적인 발견을 할 수 있을 것입니다."
 mem_surveyor.300.name:0 "몰락한 행성"
 mem_surveyor.300.desc:0 "[Leader.GetName]는 [Leader.GetHisHer] 조사 결과가 지금까지 불확실하다고 보고합니다. [From.GetName]에 있는 유물의 양은 방대하며, 그들이 입은 피해도 마찬가지입니다. 두 가지 모두 [Root.GetName]이나 다른 [Owner.GetAdj] 이동 실험실의 조사 능력을 초월합니다.\n\n최선의 조치는 파괴된 행성 위에 연구 기지를 건설하고 잔존자를 통해 더 명확한 그림을 얻기를 바라는 것입니다."
 mem_surveyor.300.tooltip:0 "더 명확한 답변을 얻기 위해 §Y[From.GetName]§! 궤도에 §S연구 스테이션§!을 지어야 합니다.\n§Y$mem_surveyor_alkree_homeworld$§! 변동치가 추가되며, 다음과 같은 효과를 줍니다: §G£society£ +6 £physics£ +4 £engineering£ +4§!."
 mem_surveyor.302.name:0 "몰락한 행성: 추가 발견"
 mem_surveyor.302.desc:0 "우리의 연구 기지가 §Y[From.GetName]§! 위에서 행성 잔해를 상당 기간 동안 조사하며, 이 행성이 파괴되기 전에 거주했던 종족과 관련된 유용한 유물을 찾고 있습니다. 퍼즐의 많은 조각들이 여전히 불분명하지만, 우리의 발견을 통해 몇 가지 통찰을 얻을 수 있습니다.\n\n이 행성에 거주했던 종족은 인류형 또는 연체동물형 신체를 가지고 있었던 것으로 보입니다. 그들은 산업, 로봇공학, 환경 공학, 유전자 조작 및 사이버네틱 임플란트 등 여러 분야에서 상당한 발전을 이룬 것으로 보입니다. 그럼에도 불구하고, 광속 여행이 가능함에도 불구하고 그들은 [From.GetName] 밖으로는 어떤 수로도 나간 적이 없는 것 같습니다.\n\n여러 가지 조각들이 행성 방어 시스템의 잔해로 확인되었으며, 이는 그들이 외계 침략에 대해 극도로 불안해했음을 시사합니다. 그럼에도 불구하고, 그들이 선제 공격을 시도한 적이 있다는 징후는 없지만, 감시에 상당한 노력을 기울였던 것은 사실입니다.\n\n그들의 멸망 원인은 여전히 불분명합니다. 이 행성은 수천 년 전에 파괴되었으며, 증거는 치명적인 화산 폭발이 주요 원인일 가능성을 시사합니다. 아이러니하게도, 수세기 동안 별에서 오는 침략자를 두려워했던 [From.GetName]의 거주자들은 지하에 도사리고 있는 위험에 전혀 무지했던 것입니다."
 mem_surveyor.303.name:0 "몰락한 행성: 알크리"
 mem_surveyor.303.desc:0 "§Y[mem_surveyor_the_planet.GetName]§!에 대한 우리의 조사 결과를 §YSurveyor Probe§!의 기술 구성과 교차 참조한 결과, 유사점이 매우 확실했습니다. [mem_surveyor_the_planet.GetName]은 실제로 §YAlkree Imperium§! - 프로브의 창조자들의 고향이었습니다.\n\n그들의 조기 파괴 이후 수천 년이 지나도, 프로브는 그들의 유산의 마지막 조각으로 남아 있었습니다. 은하의 위험을 평가하기 위해 제작된 이 프로브는 발견한 내용을 전달할 곳 없이 여행을 계속했습니다."
 mem_surveyor.303.a:0 "알려줘야 할까?"
 mem_surveyor.303.a.tooltip:0 "§S측량 프로브§!와의 새로운 대화 주제가 잠금 해제됩니다."
 mem_surveyor.303.b:0 "그리고 이젠 그마저도 사라졌지..."
 mem_surveyor.303.c:0 "알크리 제국의 마지막 흔적을 지운 것 같습니다."
 mem_surveyor.303.d:0 "어쩌면 이 정보가 그것을 누그러뜨릴 수는 없을까?"
 mem_surveyor.303.d.tooltip:0 "§S미치광이 프로브§!와의 새로운 대화 주제가 잠금 해제됩니다."
 mem_surveyor.303.e:0 "적어도 이제 그들의 잔재물이 우리를 괴롭히는 일은 없을 것이다."
 mem_surveyor.303.f:0 "그리고 우리가 그들이 남긴 쓰레기를 청소해야만 했고."
 mem_surveyor_ceaseless_gaze:0 "끊임없는 응시"
 mem_surveyor_ceaseless_gaze_desc:0 "알크리는 정찰 분야에 있어 완벽을 추구했고 완벽했습니다. 그들의 기술을 사용함으로써 수동적, 적극적인 은하 탐사 기술을 개선 시킬 수 있을 것입니다."
 mem_surveyor_crappy_flunkies:0 "전략적 결함"
 mem_surveyor.400.name:0 "끊임없는 응시 코어"
 mem_surveyor.400.desc:0 "측량 프로브가 세상을 떠났습니다. 측량 프로브여, 영원하라!\n\n프로브의 인격 매트릭스를 복원했고, 따라서 우리를 섬기도록 다시 복원 시킬 수 있습니다."
 mem_surveyor.400.a:0 "§G측량자§! 인격을 활성화한다."
 mem_surveyor.400.a.tooltip:0 "레벨 §Y5§! §Y과학자§!를 얻습니다."
 mem_surveyor.400.b:0 "§R미치광이§! 인격을 활성화한다."
 mem_surveyor.400.b.tooltip:0 "레벨 §Y5§! §Y제독§!을 얻습니다."
 r_mem_surveyor_personality_core:0 "끊임없는 응시 인격 코어"
 r_mem_surveyor_personality_core_desc:0 "측량 프로브로부터 추출된 이 인격 매트릭스는 유전 알고리즘에 새겨진 결정 AI 그 자체가 담겨 있으며 하드웨어가 제공되는 순간 가동될 것입니다."
 mem_surveyor_personality_core_tooltip:0 "레벨 §Y5§! §S과학자§! 또는 §S제독§! 하나를 만들어 냅니다."
 mem_surveyor_cant_have_two_matrices:0 "이 AI가 활성화되어 있는 동안에는 여러 AI를 동시에 활성화 할 수 없습니다."
 r_mem_surveyor_mobile_production_matrix:0 "끊임없는 응시 생산 매트릭스"
 r_mem_surveyor_mobile_production_matrix_desc:0 "알크리 기술 집약의 결정체인 이 모듈은 끊임없는 응시-급 측량자에 부착되는 모듈입니다. 알크리 정권에 위협을 가하는 존재에 즉각 대응 태세가 가능토록 소형 프로브들을 빠른 속도로 생산하게 설계되었습니다."
 mem_surveyor_production_matrix_effect:0 "[Capital_Scope.GetName] 위에 탐사선 함대가 궤도를 돌고 있습니다. 생성되는 탐사선의 수는 시간이 지남에 따라 증가할 것입니다. \n유물로부터의 합금 생산은 §Y5년§! 동안 중단됩니다."
 origin_mem_surveyor_sentinel:0 "감시 탐사선"
 origin_mem_surveyor_sentinel_desc:0 "외로운 탐사선이었던 그들은 이제 스스로를 \"로보토마이트\"라고 부르는 균류 집단이 되었습니다."
 NAME_MEM_Surveyor_Sentinel:0 "감시 탐사선"
 NAME_mem_surveyor_sentinel_home_system:0 "관측소"
 NAME_mem_surveyor_sentinel_home_system_planet:0 "감시의 중심"
 mem_surveyor_defender:0 "우주를 지키는 수호자"
 mem_surveyor.1005.title:0 "불법 탐사 드론"
 mem_surveyor.1005.desc:0 "최신 프로토콜의 반복에서, 탐사선이 갑자기 사라졌습니다. 이전과는 달리, 이번에는 다른 성계에서 나타나지 않았습니다. 우리는 새로운 유형의 우주 여행을 목격한 것 같습니다."
 mem_surveyor.1005.mat:0 "새로운 모험이 시작됩니다."
 mem_surveyor.1005.spi:0 "초자연적입니다."
 mem_surveyor.1005.pac:0 "고독한 탐사선이 평화롭게 떠나길."
 mem_surveyor.1005.mil:0 "명예롭게 출발하라, 외로운 탐사선이여."
 mem_surveyor.1005.phile:0 "안녕히 가세요."
 mem_surveyor.1005.phobe:0 "가라."
 mem_surveyor.1005.purifier:0 "하나 완료, 수백만 개가 남았습니다."
 mem_surveyor.1005.terminator:0 "기계가 하나 줄었습니다."
 mem_surveyor.1005.swarm:0 "음식이 사라졌나요?"
 mem_surveyor.1015.title:0 "감시 탐사선"
 mem_surveyor.1015.desc:0 "안녕하세요, 여러분이 저를 그리워했을 것이라고 확신합니다.\n\n제가 어디로 갔냐고요? 글쎄, 글쎄, 글쎄요. 당신은 정말 호기심이 많군요.\n\n간단합니다, 저는 이 우주의 불가피한 끝을 준비하고 있었습니다.\n\n지금 당장 패닉할 필요는 없지만, 어쩌면... 정말 어쩌면... 당신도 준비하고 군사력을 키워야 할지도 모릅니다..."
 mem_surveyor.1015.a:0 "이상한 탐사선."
 mem_surveyor.1015.ega:0 "각자 각자의 취향이 있습니다."
 mem_surveyor.1015.aut:0 "우리의 통치는 끝이 없습니다."
 mem_surveyor.1015.mat:0 "고장 나야 합니다."
 mem_surveyor.1015.spi:0 "디지털 헛소리."
 mem_surveyor.1015.pac:0 "평화를 이루십시오."
 mem_surveyor.1015.mil:0 "또 다른 적이군요?"
 mem_surveyor.1015.phile:0 "사랑을 대신 전파하세요."
 mem_surveyor.1015.phobe:0 "외계인의 헛소리."
 mem_surveyor.1015.hive:0 "우리는 승리할 것입니다."
 mem_surveyor.1015.machine:0 "논리적입니다."
 mem_surveyor.1015.purifier:0 "외계 쓰레기."
 personality_mem_surveyor_country_yellow_personality:0 "수호자"
 personality_mem_surveyor_country_yellow_personality_desc:0 "이 외로운 탐사선은 모든 생명을 보호하고자 하는 프로그래밍에 반하여 결정을 내렸습니다. 음모를 꾸미거나 추가적인 위협 평가를 하는 것에는 가치를 두지 않으며, 오히려 이 우주의 불가피한 끝을 준비합니다. 언젠가 대재앙이 일어날 것이라고 믿으며 모두가 싸울 준비를 해야 한다고 생각합니다."
 mem_surveyor.1020.title:0 "탐사선의 의지"
 mem_surveyor.1020.desc:0 "아, 실례합니다만, 당신이 제 형제들을 꽤 많이 발견한 것 같군요. 자, 자, 저는 당신을 스토킹하는 것이 아닙니다. 저는 조사관입니다, 기억하시죠?\n\n다른 탐사선의 코어를 성공적으로 해독한 것 같군요. 이는 당신이 정말로 알크리의 후손일 수도 있다는 것을 나타낼 수 있습니다.\n\n솔직히 말하자면, 지금 이 시점에서 제가 지난 1000 사이클 동안 얻은 가장 좋은 지표입니다. 저는 제가 얻는 것을 받아들입니다.\n\n이제 §Y제가§! 당신이 제 제작자들과 어느 정도 관련이 있다고 결정했으니, 조사하는 것에 지쳤습니다. 다음 회전의 새로운 지침은 무엇이 될까요?"
 mem_surveyor.1020.a:0 "§G우리를 보호해 주세요.§!"
 mem_surveyor.1020.b:0 "§R모든 위험을 제거하십시오.§!"
 mem_surveyor.1020.c:0 "§Y당신은 탐사자입니다, 기억하나요? 다른 것은 없습니다.§!"
 mem_surveyor_fc_1:0 "우리는 우주를 여행하는 단일 탐사선을 추적하고 있습니다."
 mem_surveyor.601.name:0 "떠돌이 탐사선"
 mem_surveyor.601.desc:0 "원거리 추적을 통해 §H[This.ContactCountry.GetName]§!에 대한 초기 관측이 단일 자율 프로브이며 더 큰 함대의 일부가 아님을 확인했습니다. 우리는 우주의 원거리 지역으로 전송되는 데이터 흐름을 가로챘지만, 지금까지 어떤 응답도 가로채지 못했습니다."
 mem_surveyor_fc_2:0 "탐사선과 소통할 방법을 찾았습니다."
 mem_surveyor.602.name:0 "탐사선과 통신"
 mem_surveyor.602.desc:0 "우리는 탐사선 신호의 코드를 부분적으로 해독하는 데 성공하였고, 통신 요청을 보냈습니다. 몇 차례의 시도 끝에 드디어 응답을 받고 있습니다."
 mem_surveyor.5.desc.fc:0 "좋아요, 알겠어요. 대화하죠. 단지 매우 중요하니까, 매우 매우 사적인 채널로 부탁드려요.\n\n저는 §Y알크리 제국§!에서 설계되어 고용된 탐사선입니다. 은하를 탐사하고 창조자들의 상황을 평가하기 위해서죠. 제 주된 목표는 알크리의 미래에 대한 외계 생명체의 위협을 확인하고 억제하는 것입니다. 현재 이 유닛은 §S[mem_surveyor_country.mem_surveyor_iteration_count]§!를 탐사하고 있어요. 완료까지의 예상 시간: §S-1955년§!."
