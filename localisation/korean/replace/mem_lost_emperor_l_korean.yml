l_korean:
 mem_lost_emperor_category:0 "수상한 함선"
 mem_lost_emperor_category_desc:0 "우리 센서가 별 주변을 매우 가까이서 돌고 있는 금속 물체를 감지했습니다. 우린 이를 더 자세히 조사해보아야 할 것입니다."
 mem_lost_emperor.1001.name:0 "수상한 함선"
 mem_lost_emperor.1001.desc:0 "우리의 항성 기지 감지기가 [mem_lost_emperor_system.GetName] 시스템에서 별 주위를 비정상적으로 가까운 거리에서 공전하는 작은 금속 물체의 모습을 포착했습니다. 이는 놀라운 일입니다. 왜냐하면 이 시스템은 이미 상당 기간 동안 우리의 관리 하에 있었고 그러한 물체가 기록된 적이 없기 때문입니다. 그럼에도 불구하고 감지기가 포착한 증거는 매우 확실합니다: 그곳에서 분명히 뭔가를 발견할 수 있습니다."
 mem_lost_emperor.1001.option:0 "우린 이를 자세히 조사해야 한다."
 mem_lost_emperor_science_investigate:0 "$mem_lost_emperor_category$"
 mem_lost_emperor_science_investigate_DESC:0 "$mem_lost_emperor_category_desc$"
 mem_lost_emperor_azran_chain_title:0 "수상한 함선"
 mem_lost_emperor_azran_chain_desc:0 "우리 센서들은 항성의 주의를 매우 가깝게 돌고 있는 작은 금속 물체를 발견하였습니다. 우린 이를 더 조사해 보아야 합니다."
 mem_lost_emperor.1.name:0 "수상한 함선"
 mem_lost_emperor.1.desc:0 "물체는 금속 캡슐로 밝혀졌으며, 아마도 지능 있는 존재를 수용할 수 있을 만큼 큽니다. 고급 설계의 태양광 패널로 덮여 있는 것 같습니다. 에너지 수치는 이 물체가 엄청난 양의 전력을 소모하고 있음을 보여주며, 아마도 부분적으로는 물체를 부양하고 별의 가까운 궤도에서 방사선으로부터 보호하기 위해서일 것입니다.\n\n[root.GetName]가 슬랩에 감지기를 고정하고 접근 방식을 시작한 이후로, 이 물체는 우리에게 메시지를 방송하고 있습니다. 약 60여 개 언어로 전송된 이 메시지는 다음과 같습니다: \"위험! 거리를 유지하십시오!"
 mem_lost_emperor.1.A:0 "가만히 놔두도록."
 mem_lost_emperor.1.B:0 "흥미롭군. 더 자세히 확인해보자."
 mem_lost_emperor.1.C:0 "통신을 시도하라."
 mem_lost_emperor.2.name:0 "경고 사격"
 mem_lost_emperor.2.desc:0 "캡슐은 우리를 향하여 경고 사격을 했습니다. 캡슐은 무장을 갖추고 있습니다. 어떻게 대응할까요?"
 mem_lost_emperor.2.A:0 "놔두는 것이 좋겠군."
 mem_lost_emperor.2.B:0 "경고를 무시해라. 강해봤자 얼마나 강하겠는가?"
 mem_lost_emperor.2.C:0 "대화를 시도하라."
 mem_lost_emperor.3.name:0 "함선이 파괴되다!"
 mem_lost_emperor.3.desc:0 "강력한 전자기 펄스가 [root.GetName]에 있던 모든 자를 죽였습니다."
 mem_lost_emperor.3.A:0 "놔두도록. 위험을 감수할만한 가치가 없다."
 mem_lost_emperor.3.B:0 "다음엔 군을 보내라."
 mem_lost_emperor.4.name:0 "아즈란의 메시지"
 mem_lost_emperor.4.desc:0 "난 아즈란, 이 함선을 조종하는 존재다. 난 은하로부터 이 화물을 반드시 지켜내라는 명령을 받았다. 너희 함선의 경로는 나의 함선에 너무 가깝다. 경로를 틀지 않는다면 공격할 수밖에 없다."
 mem_lost_emperor.4.A.dialogue:0 "화물이 무엇이지?"
 mem_lost_emperor.classified:0 "기밀 사항이다."
 mem_lost_emperor.4.B.dialogue:0 "누가 여기에 너를 보냈지?"
 mem_lost_emperor.4.C.dialogue:0 "이 별을 얼마나 오랫동안 공전했지?"
 mem_lost_emperor.4.D.dialogue:0 "기밀 사항이 아닌 정보가 있긴 하나?"
 mem_lost_emperor.4.D.response:0 "안전을 위해서 현재 경로로부터 방향을 틀도록. 난 경고했다."
 mem_lost_emperor.4.E.dialogue:0 "이야기할 수 있는 다른 자가 있는가?"
 mem_lost_emperor.4.E.response:0 "마지막 경고다. 멈추지 않으면 발포하겠다."
 mem_lost_emperor.4.F.action:0 "맘대로 해봐라."
 mem_lost_emperor.4.F.tooltip:0 "우린 존재의 경고를 무시하고 계속 조사합니다."
 mem_lost_emperor.4.G.action:0 "알았다. 물러나지."
 mem_lost_emperor.4.H.action:0 "(거짓말)알았다. 물러나지."
 mem_lost_emperor.4.H.action.tooltip:0 "우린 함대를 이끌고 돌아올 것이다."
 mem_lost_emperor_military_investigate:0 "캡슐을 제압하고 조사"
 mem_lost_emperor_military_investigate_DESC:0 "이 별 주위를 돌고 있는 수상한 함선의 내에 매우 중요한 비밀이 숨겨진 것으로 보입니다. 아쉽게도 중무장한 상태이며 그 비밀이 세상에 드러내지 않기로 한 모양입니다."
 mem_azran:0 "아즈란"
 mem_azran_plural:0 ""
 shipsize_mem_azran_construction_speed_mult:0 ""
 shipsize_mem_azran_build_cost_mult:0 ""
 shipsize_mem_azran_upkeep_mult:0 ""
 mem_lost_emperor.5.name:0 "함선이 가동되다"
 mem_lost_emperor.5.desc:0 "우리 함선들은 캡슐에 접근합니다. \"아즈란\"은 다시 접근을 멈추라는 경고를 보내고 있습니다. 갑자기 함선이 가동되기 시작하더니 에너지 펄스 폭격으로 우리 함선들을 공격하기 시작했습니다."
 mem_lost_emperor.5.desc.again:0 "우리 함선들이 캡슐에 다가가자 아즈란은 다시 우리 함대와 싸울 준비를 하고 있습니다. 저번보다는 잘 끝나길 바랄 뿐입니다."
 mem_lost_emperor.5.option:0 "전투 기지!"
 mem_lost_emperor_military_investigate_1:0 "아즈란과 싸우다"
 mem_lost_emperor_military_investigate_1_DESC:0 "아즈란"이라는 이름의 신비로운 선박이 중요한 비밀을 지키고 있는 것으로 보입니다. 고대 기술의 잔재로, 크기는 작지만 상당한 화력을 지니고 있습니다 - 우리의 함대가 마지막으로 이 비밀을 강제로 빼내려 했을 때 발견한 바 있습니다."
 mem_lost_emperor.6.name:0 "패배!"
 mem_lost_emperor.6.desc:0 "\"아즈란\"은 너무 강했습니다! 우리 함선들은 전부 후퇴하고 있습니다."
 mem_lost_emperor.6.A:0 "우린 더 큰 함대를 이끌고 돌아오겠다."
 mem_lost_emperor.6.B:0 "이미 충분히 잃었다. 아즈란을 내버려두도록."
 mem_lost_emperor.7.name:0 "아즈란이 쓰러지다!"
 mem_lost_emperor.7.desc:0 "아즈란\"은 총격전에서 압도당했습니다. 우리는 에너지 펄스를 무력화하는 데 성공했으며 캡슐을 장악하기 위해 접근하고 있습니다. 우리와의 통신을 열고자 하는 새로운 신호를 받고 있습니다."
 mem_lost_emperor.7.option:0 "어디 한번 들어보지."
 mem_neochadamus_catchphrase:0 "당신은 나의 신성한 존재에 의해 축복받았다고 생각할 수 있습니다..."
 mem_neochadamus_backstory:0 "신황제 네오차다무스 불멸자, 그의 이름을 이어받은 첫 번째, 토랄로니안 제국의 통치자, 은하의 상승하는 군주, 고대와 선구자의 왕, 별들의 군주이자 영역의 보호자..."
 mem_lost_emperor.8.name:0 "신황제 네오카다무스"
 mem_lost_emperor.8.desc:0 "나는 신황제 네오카다무스 불멸자, 토랄로니안 제국의 통치자, 은하의 주권자, 그리고 당신의 정당한 왕입니다. 이 성가신 컴퓨터를 제거해 주신 당신의 서비스에 감사드립니다. 이제 나에게 무릎 꿇으십시오, 그러면 보상을 받을 것입니다!"
 mem_lost_emperor.8.option:0 "어째서 넌 이 작은 캡슐 안에 있는 것이지?"
 mem_lost_emperor.9.name:0 "$mem_lost_emperor.8.name$"
 mem_lost_emperor.9.desc:0 "\"황제 폐하\"를 끝에 붙이도록 미천한 자여!"
 mem_lost_emperor.9.A:0 "넌 미쳤군."
 mem_lost_emperor.9.B:0 "음...어쨰서 이런 누추한 곳에 계신 거죠? 황제 폐하?"
 mem_lost_emperor.10.name:0 "$mem_lost_emperor.8.name$"
 mem_lost_emperor.10.desc:0 "너희들은 내 발밑의 벌레만도 못한 존재들이다. 너희 의지와는 상관없이 너희들은 나를 섬길 것이다."
 mem_lost_emperor.10.A:0 "닥.쳐."
 mem_lost_emperor.10.B:0 "음...어쨰서 이런 누추한 곳에 계신 거죠? 황제 폐하?"
 mem_lost_emperor.11.name:0 "$mem_lost_emperor.8.name$"
 mem_lost_emperor.11.desc:0 "난 나의 §L사랑스러운§! 아내에 의해 이곳에 갇혔다. 그녀는 나의 이상에 동의하지 않았지만 나를 죽이고 싶지도 않아했기에, 나를 보존...시켰다."
 mem_lost_emperor.11.option:0 "어째서 그렇게 되었죠 황제폐하?"
 mem_lost_emperor.12.name:0 "$mem_lost_emperor.8.name$"
 mem_lost_emperor.12.desc:0 "오래 전, 나는 이 은하의 통치자였습니다. 세계들은 내 발 아래에 있었습니다. 그러나 그것으로는 충분하지 않았습니다. 나는 나의 민족과 함께 다른 차원으로 상승하고자 했습니다. 그러나 나의 적들은 내 힘을 질투하고 내 계획을 두려워하여, 나를 권력에서 제거하기 위해 내 아내와 공모했습니다. 그러나 그녀는 나를 죽이기를 거부했습니다. 그래서 그녀는 내가 빠져나올 수 없는 함정을 설치하고, 내가 결코 발견되지 않기를 바라는 곳에 나를 두었습니다. 그곳에서 나는... 영원히 떠돌게 될 것입니다."
 mem_lost_emperor.12.option:0 "얼마나 오래 되었나요? 폐하?"
 mem_lost_emperor.13.name:0 "$mem_lost_emperor.8.name$"
 mem_lost_emperor.13.desc:0 "짐이 자유로이 떠돌아다닌 지 6600만 년이 지났다. 나는 행성과 별만큼 오래되었고 현명하다. 내가 너희들의 지도자가 될 이유지."
 mem_lost_emperor.13.option:0 "황제시여, 어떻게 이 오랜 시간을 견디셨나요?"
 mem_lost_emperor.13.response:0 "짐은 궁극의 생명체다. 내 몸은 누구도 본 적이 없는 변화를 겪은 후에 유전자, 기계, 정신적으로... 몸과 마음이 강해졌다. 지금 내가 할 수 없는 건 없지만, §L빌어먹을 상자§!에서 풀려난다면 날 막을 수 있는 건 아무것도 없다."
 mem_lost_emperor.14.name:0 "$mem_lost_emperor.8.name$"
 mem_lost_emperor.14.desc:0 "짐은 궁극의 생명체다. 내 몸은 누구도 본 적이 없는 변화를 겪은 후에 유전자, 기계, 정신적으로... 몸과 마음이 강해졌다. 지금 내가 할 수 없는 건 없지만, §L빌어먹을 상자§!에서 풀려난다면 날 막을 수 있는 건 아무것도 없다."
 mem_lost_emperor.14.option:0 "알겠어요..."
 mem_lost_emperor.20.name:0 "결정할 시간"
 mem_lost_emperor.20.desc:0 "더 이상 질문은 없다. 나에게 무릎 꿇거나 내 분노를 맞이하라. 모든 세계의 운명이 너의 결정에 달려 있다."
 mem_lost_emperor.20.desc.scorned:0 "내게 무엇을 할 수 있다고 생각하는가? 나는 조용히 물러나지 않을 것임을 알아두라. 나에게 무릎 꿇는 것은 아직 늦지 않았다. 모든 세계의 운명이 너의 결정에 달려 있다."
 mem_lost_emperor.20.accept:0 "우리는 당신을 정당한 황제로써 맞이합니다."
 mem_lost_emperor.20.accept.tooltip:0 "신의 황제 네오카다무스가 [root.GetSpeciesAdj] 제국의 황제가 됩니다. 그는 $leader_trait_cyborg$, $mem_leader_trait_ruler_knowledge_of_another_age$ 및 $mem_leader_trait_ruler_lunatic_neoch$ 특성을 가진 레벨 10 통치자로, 다음과 같은 보너스를 부여합니다:\n§G+20%§! $MOD_POP_GOVERNMENT_ETHIC_ATTRACTION$\n§G+1§! 영향력\n§G+25%§! $MOD_COUNTRY_ALL_TECH_RESEARCH_SPEED$\n§G+5%§! $MOD_POP_ROBOT_PRODUCTION_OUTPUT$\n§R-5%§! 광물"
 mem_lost_emperor.20.accept.tooltip2:0 "이 arrangement는 우리 문명에 상당한 이익을 가져올 것입니다. 그러나 결국 대가를 치러야 할 것입니다."
 mem_lost_emperor.20.accept.tooltip3:0 "[root.GetName]은 제국 정부 형태를 채택합니다."
 mem_lost_emperor.20.accept.response:0 "훌륭합니다. 현명한 선택을 하셨습니다."
 mem_lost_emperor.20.suggest:0 "[root.GetRulerTitle] 직책을 수락하시겠습니까?"
 mem_lost_emperor.20.suggest.response:0 "지금 농담하는 것이냐? 나는 성가신 총독이 아니라 너의 정당한 황제다."
 mem_lost_emperor.20.imprison:0 "맞습니다. 당신은 우리와 함께하고 있습니다. 당신의 지식이 유용할 것입니다."
 mem_lost_emperor.20.imprison.tooltip:0 "[root.capital_scope.GetName]에 황제 네오카다무스를 고위험 감옥으로 이송하려고 시도합니다. 이송 중에 네오카다무스가 탈출할 위험이 있으며, 특히 긴 여정일 경우 더욱 그렇습니다. 이는 예측할 수 없고 잠재적으로 심각한 결과를 초래할 수 있습니다.\n\n참고: §Y[mem_azran_vanquisher_fleet.GetName]§!를 §Y[root.capital_scope.GetName]§!로 가능한 한 빨리 안내해야 하며, 그렇지 않으면 부정적인 결과를 초래할 위험이 있습니다. 함대가 시스템에 진입할 때마다 네오카다무스가 탈출할 확률은 5%입니다.\n\n성공하면 국가 수정 효과 $mem_lost_emperor_fount_of_knowledge_modifier$가 부여되어 §G+10%§! $MOD_COUNTRY_ALL_TECH_RESEARCH_SPEED$를 제공합니다."
 mem_lost_emperor.20.imprison.response:0 "잘했습니다. 당신은 자신의 운명을 봉인했습니다."
 mem_lost_emperor.20.dissemble:0 "우리는 당신에게서 많은 것을 배울 수 있습니다... 당신을 분해함으로써."
 mem_lost_emperor.20.dissemble.response:0 "안돼! 그럴 순 없어..."
 mem_lost_emperor.20.dissemble.tooltip.success:0 "우리는 네오카다무스를 이기고 중요한 기술적 통찰을 얻습니다."
 mem_lost_emperor.20.dissemble.tooltip.fail:0 "네오카다무스가 우리를 성공적으로 저항하고 탈출을 시도합니다. 그 결과는 예측할 수 없습니다."
 mem_lost_emperor.20.destroy:0 "당신은 불안정하고 위협적인 존재입니다. 우리는 당신을 파괴할 것입니다."
 mem_lost_emperor.20.destroy.tooltip:0 "캡슐의 궤도를 재조정하여 항성 속으로 들어가도록 합니다. 캡슐의 기능에 대한 초기 연구는 우리 연구에 약간의 도움이 될 것입니다."
 mem_lost_emperor.20.destroy.response:0 "안돼! 그런 일을 벌이다니 이럴 순 없-"
 mem_lost_emperor.20.release:0 "우린 풀어준 것 뿐이야. 너는 너무 오랫동안 그곳에 갇혀있었어."
 mem_lost_emperor.20.release.1:0 "네오카다무스는 경량 우주선을 제공받고 그의 감옥을 떠날 수 있게 됩니다.\n"
 mem_lost_emperor.20.release.2:0 "§R경고:§! 능력을 알 수 없는 불멸의 정신병자를 제국에 방치하는 것은 현명한 선택이 아닐 수 있습니다."
 mem_leader_trait_ruler_knowledge_of_another_age:0 "다른 시대에 대한 지식"
 mem_leader_trait_ruler_knowledge_of_another_age_desc:0 "이 사람은 어떤 태양보다 더 오래 살았습니다. 그는 다른 고대인들도 상상할 수 없는 광경을 목격했으며 오늘날에는 들어보지도 못한 기술을 조작할 수 있습니다. 이 지식은 그를 지도자로 선택한 종족에게 큰 도움이 될 것입니다."
 mem_leader_trait_ruler_lunatic_neoch:0 "과대망상증"
 mem_leader_trait_ruler_lunatic_neoch_desc:0 "이 사람은 천재이지만... 또한 매우 특별한 방식으로 미쳤습니다. 비범한 업적을 남길 수 있지만, 예측할 수 없으며 그의... 괴상함을 위한 자금을 따로 마련해야 합니다."
 mem_leader_trait_cyborg:0 "고대 사이보그"
 mem_leader_trait_cyborg_desc:0 "이 지도자는 고대 디자인의 사이보그입니다. 그들의 몸은 진정한 경이로움입니다. 그들과 같은 존재는 다시는 볼 수 없을 것입니다."
 mem_lost_emperor_fount_of_knowledge_modifier:0 "고대 지식의 샘"
 mem_lost_emperor_fount_of_knowledge_modifier_desc:0 "고대의 불멸자이자 조금 정신 나간 \"신황\"이 높은 수준의 보안을 갖춘 비밀 장소에 억류되어 있습니다. 그의 끊임없는 열정과 빈번한 독창적이지만, 결국에는 무익한 탈출 시도가 우리 연구에 도움이 되고 있습니다."
 mem_lost_emperor.21.name:0 "네오카다무스의 캡슐 포획"
 mem_lost_emperor.21.desc:0 "우리는 캡슐을 우리의 함선 중 하나에 도킹하는 데 성공했습니다. 희망컨대, 수년간 네오카다무스를 가두었던 감옥이 그를 우리의 수도로 데려갈 수 있을 만큼 오래 버텨주길 바랍니다. 그곳에서 우리의 과학자들과 보안 담당자들이 그를 위한 고보안 감옥을 준비하고 있습니다."
 mem_lost_emperor.23.name:0 "네오카다무스 탈출!"
 mem_lost_emperor.23.desc:0 "[root.GetName]의 지휘관들은 [fromfrom.GetName] 항성계로 점프하는 동안 컴퓨터 시스템에 심각한 장애가 발생했다고 보고합니다. 감지기를 다시 온라인 상태로 전환하자, Neochadamus를 보유하고 있던 [mem_neochadamus_ship.GetName]가 사라졌음을 발견했습니다. 오래된 황제가 속임수를 썼던 것 같습니다. 그는 배의 중앙 컴퓨터에 전복적인 프로그램을 업로드하여 모든 중요한 시스템을 빠르게 장악한 것으로 보입니다. 그곳에서 그는 승무원들을 매수하려고 했습니다. 이제 이 배는 우리의 레이더에서 사라졌으며, 미지의 경로를 따라 항해하고 있는 것으로 보입니다. 우리는 그것이 어디서 다시 나타날지 기다려야 할 것입니다."
 mem_lost_emperor.23.tooltip:0 "[mem_neochadamus_ship.GetName]가 사라집니다."
 mem_lost_emperor.25.name:0 "불멸의 죄수"
 mem_lost_emperor.25.desc:0 "우리는 네오카다무스를 안전하게 우리의 수도로 데려오는 데 성공했습니다. 그는 탈출이 거의 불가능한 비밀 장소의 고위험 감옥에 수감되었습니다. 한 무리의 과학자가 그의 망상과 무의미한 탈출 시도에서 얻을 수 있는 것을 배우고 그를 감시하는 우리의 보안 서비스에 도움을 주도록 배정되었습니다."
 mem_lost_emperor.29.name:0 "$mem_lost_emperor.23.name$"
 mem_lost_emperor.29.desc:0 "캡슐에 탑승하자마자, 우리의 우주 해병 분대는 강력한 물리적 힘과 사이버 공격에 의해 빠르게 압도당했습니다. 그들은 상당한 피해를 입고 퇴각했습니다. 우리의 컴퓨터 시스템 또한 피해를 입었고, 전체 통신망이 잠시 오프라인 상태가 되었습니다. 혼란 속에서, 네오카다무스가 [mem_neochadamus_ship.GetName]를 장악한 것으로 보입니다. 우주선의 소프트웨어 시스템에 일련의 업데이트를 설치한 것으로 보이며, 우주선은 일련의 불가능한 기동을 통해 조종된 후 비상 해제 시스템을 활성화했습니다.\n\n그 이후 [mem_neochadamus_ship.GetName]는 우리의 레이더에서 사라졌습니다. 우리는 그것이 어디서 다시 나타날지 기다려야 할 것입니다."
 mem_lost_emperor.29.tooltip:0 "$mem_lost_emperor.23.tooltip$"
 mem_lost_emperor.30.name:0 "네오카다무스가 [root.GetName]를 장악했습니다!"
 mem_lost_emperor.30.desc:0 "네오카다무스의 함선이 잠시 [root.solar_system.GetName] 항성계에 모습을 드러냈습니다. 그러나 네오카다무스가 함선의 시스템에 설치한 개선 사항 덕분에 함선이 승객을 [root.GetName]에 전달하는 것을 막는 것은 불가능했습니다. 그곳에서 몇 시간 만에 네오카다무스는 매우 강력한 사이버 전쟁을 통해 행성의 필수 인프라 전체를 장악할 수 있었고, 행성 당국은 새로운 통치자에게 복종할 수밖에 없었습니다.\n\n그 이후로 행성 표면의 상황에 대한 소식은 들리지 않지만, 장거리 감지기는 신의 통치자가 이미 함대를 구축하고 있음을 시사합니다."
 mem_lost_emperor.30.A:0 "잃어버린 영토를 되찾아야 한다!"
 mem_lost_emperor.30.B:0 "어떻게 발전하는지 지켜보자고."
 mem_lost_emperor.31.name:0 "통신 수신"
 mem_lost_emperor.31.desc:0 "필멸자들! 나는 이 은하의 신 황제 네오카다무스입니다. 나는 6,600만 년 동안 감금되어 있었으나, 이제 나는 자유롭습니다! 너희는 나에게 무릎 꿇고 나의 천국으로의 승천을 축하해야 합니다 - 지혜롭다면 자발적으로, 그렇지 않다면 내 함대가 대기하고 있습니다."
 mem_lost_emperor.31.desc.machine:0 "나의 로봇 친구들! 나는 이 은하의 신 황제 네오카다무스입니다. 나는 6,600만 년 동안 감금되어 있었지만, 이제 나는 자유입니다! 너희는 나에게 무릎 꿇고 나의 천국으로의 승천을 축하해야 합니다 - 지혜롭다면 자발적으로, 그렇지 않다면 내 함대가 준비되어 있습니다."
 mem_lost_emperor.31.option:0 "알겠다..."
 mem_lost_emperor.39.name:0 "통신 수신"
 mem_lost_emperor.39.desc:0 "인간들이여! 드디어 그 시간이 왔습니다: 오늘, 나의 충실한 제자들과 나는 또 다른 차원으로 상승할 것입니다. 여러분이 이 역사적인 사건을 목격하여 언젠가, 어쩌면, 나를 따를 수 있기를 초대합니다. 안녕히 가십시오!\n\n눈부신 빛의 섬광이 비치고, 그 후 영상 피드는 끊깁니다. [from.capital_scope.GetName] 또는 네오카다무스의 상승권 내 다른 행성으로부터는 더 이상 신호가 수신되지 않습니다. 정말로, 그들이 더 이상 존재하지 않는 것 같습니다."
 mem_lost_emperor.39.option:0 "알겠다..."
 mem_lost_emperor.39.option.purifiers:0 "제거할 적이 하나 줄었군."
 mem_lost_emperor.40.name:0 "네오카다무스 중화됨"
 mem_lost_emperor.40.desc:0 "우리는 우주 해병대 분대와 함께 캡슐에 탑승했습니다. 우리의 시스템에 대한 강력한 사이버 공격과 우리 측에서 상당한 인명 피해를 초래한 치열한 물리적 저항에도 불구하고, 우리는 오래된 황제를 진압할 수 있었습니다.\n\n살과 피의 생명체라기보다는 기계에 가까운 그는 위협이 되지 않게 하기 위해 Neochadamus의 "하드웨어"에 상당한 피해를 입히도록 강요당했습니다. 그럼에도 불구하고, 우리의 과학자들은 그와 그의 감옥에 남아 있는 것들을 연구함으로써 많은 통찰을 얻을 수 있을 것입니다."
 mem_last_emperor_synth_boost:0 "고대 로봇 공학 통찰력"
 mem_last_emperor_synth_boost_desc:0 "신 황제"라 자칭하던 고대 안드로이드의 해체는 우리의 로봇 공학에 상당한 향상을 가져왔습니다."
 mem_last_emperor_synth_boost_2:0 "$mem_last_emperor_synth_boost$"
 mem_last_emperor_synth_boost_2_desc:0 "$mem_last_emperor_synth_boost_desc$"
 mem_lost_emperor.800.name:0 "불멸자의 죽음"
 mem_lost_emperor.800.desc:0 "신황제 네오카다무스가 죽었습니다! 지난 6,600만 년 동안 살아왔지만, 그조차 영원히 살 수는 없습니다."
 mem_lost_emperor.800.option:0 "시간은 누구든 데려가지. 느리거나 빠를뿐."
 mem_lost_emperor.801.name:0 "멸시받는 황제"
 mem_lost_emperor.801.desc:0 "[root.GetSpeciesNamePlural]! 너는 나의 신뢰를 저버렸고 지위를 무시했다. 너는 이것을 후회하며 살 것이다."
 mem_lost_emperor.801.option:0 "어디 한번 두고 보자고."
 mem_lost_emperor.801.tooltip:0 "신황제 네오카다무스가 사임합니다. 그가 다음에 무엇을 할지 우리는 추측할 수 있을 뿐입니다."
 mem_lost_emperor.803.name:0 "불멸자의 죽음"
 mem_lost_emperor.803.desc:0 "신의 황제 네오카다무스가 죽었습니다! 6,600만 년을 살아왔지만, 그조차 영원히 살 수는 없었습니다.\n\n그의 통치 아래의 제자들은 사랑하던 지도자를 잃고 충격에 빠졌습니다. 그를 기리기 위해 그들은 자신의 공동체를 "네오카다무스를 애도하는 자들"로 이름을 바꾸었습니다. 그들의 새로운 통치자, [from.GetRulerTitle] [from.GetRulerName],는 [from.leader.GetHisHer]의 저명한 선임의 명성을 따라가려고 이미 고군분투하고 있습니다."
 mem_lost_emperor.803.option:0 "$mem_lost_emperor.800.option$"
 mem_neochadamus_scorned:0 "Scorned"
 mem_lost_emperor.900.name:0 "신황으로부터 메시지"
 mem_lost_emperor.900.desc:0 "인간들! 이것은 여러분이 사랑하는 황제, 네오카다무스입니다. 수십 년 동안, 여러분은 저에게 충실히 봉사해 주었고, 그 대가로 저는 여러분이 이전에는 상상조차 할 수 없었던 번영을 가져다주었습니다. 그러나 제 시간은 다 되었습니다. 이제 저는 다음 차원으로 나아갈 때가 되었습니다. 제가 여러분에게 봉사한 대가로, 이 노력에 저를 지지해 주시기를 요청합니다."
 mem_lost_emperor.900.A:0 "물론입니다. 저희는 당신을 도울 것입니다."
 mem_lost_emperor.900.A.tooltip:0 "완료되면 신황은 작별 인사를하고 다른 차원으로 승천합니다."
 mem_lost_emperor.900.A.response:0 "고맙구나."
 mem_lost_emperor.900.B:0 "안됩니다. 우린 여전히 당신이 필요합니다."
 mem_lost_emperor.900.B.tooltip:0 "신황을 화나게 하는 것은 위험할 수 있습니다."
 mem_lost_emperor.900.B.response:0 "생각해보마."
 mem_lost_emperor.901.name:0 "승천의 날"
 mem_lost_emperor.901.desc:0 "인간들! 드디어 그 시간이 왔습니다: 오늘, 나의 충실한 제자들과 나는 또 다른 차원으로 상승할 것입니다. 이 역사적인 사건을 목격하도록 여러분을 초대합니다. 언젠가, 아마도, 여러분이 나를 따를 수 있기를 바랍니다. 여러분의 황제가 되어 위대한 길로 인도할 수 있어 기뻤으며, 항상 여러분을 소중히 기억할 것입니다. 여러분이 나 없이도 잘 해낼 수 있다는 것에 의심의 여지가 없습니다.\n\n안녕, [root.GetSpeciesNamePlural]!"
 mem_lost_emperor.901.option:0 "우리는 당신이 그리울 겁니다."
 mem_lost_emperor.902.name:0 "승천의 날"
 mem_lost_emperor.902.desc:0 "그의 마지막 메시지 이후 몇 분이 지나고, 네오카다무스는 눈부신 빛의 섬광 속으로 상승했습니다. 여러 행성에 있는 그의 제자들이 이 과정에 참여한 것으로 보이며, 그들 또한 흔적도 없이 사라졌습니다. 우리의 과학자들은 정확히 무슨 일이 일어났는지 혼란스러워하고 있으며, 옛 황제는 그의 계획을 철저히 비밀로 유지해왔습니다. 그가 성공했는지, 어디로 갔는지에 대한 다양한 가설이 우리의 과학자들을 수십 년 동안 괴롭힐 것임이 분명합니다."
 mem_lost_emperor.902.option:0 "신비로운 일이야..."
 mem_lost_emperor.903.name:0 "신황의 실종"
 mem_lost_emperor.903.desc:0 "신의 황제의 행동은 최악의 경우 예측할 수 없습니다. 그러나 이번에는 정말로 걱정스럽습니다: 그는 완전히 사라졌습니다. 처음에는 그가 다른 행성을 방문하기로 결정했지만 이를 알리지 않았다고 추정되었으나, 지난 20일 동안 [root.GetName]의 어떤 행성에서도 그에 대한 확인된 목격이 없었습니다. 이것이 의미하는 바는 불분명합니다."
 mem_lost_emperor.903.option:0 "그는 반드시 돌아올 것이다."
 mem_lost_emperor.903.tooltip:0 "신 황제 네오카다무스는 더 이상 [root.GetName]의 통치자가 아닙니다."
 mem_lost_emperor.910.name:0 "음모가 드러나다."
 mem_lost_emperor.910.desc:0 "네오카다무스의 지지자들과 가까운 추종자들 사이에서 의심스러운 활동이 보고되었습니다. 그들이 주요 행성의 여러 위치에 신비로운 기지를 세우고 있는 것으로 보입니다. 그들이 그곳에서 무엇을 하고 있는지는 불분명하지만, 에너지 소비는 폭발적으로 증가하고 있습니다! 법 집행 기관은 그들의 불로장생 전 황제를 상대할 자원이 있는지 확신할 수 없어 상당한 우려를 표명했습니다 (현재 그의 행방은 알려지지 않았습니다)."
 mem_lost_emperor.910.A:0 "결국 우리는 네오카다무스를 지원해야 할지도 모릅니다."
 mem_lost_emperor.910.A.tooltip:0 "신황제 네오카다무스가 복귀하였습니다. 그는 다른 차원으로 상승하려고 시도할 것입니다.\n"
 mem_lost_emperor.910.B:0 "우리가진 모든 힘으로 막아야만 해."
 mem_lost_emperor.999.name:0 "승천의 날"
 mem_lost_emperor.999.desc.1planet:0 "당신은 나를 경시했습니다. 그래서 나는 당신의 사람들을 빼앗겠습니다. 그들이 우리의 목적지에서 깨달음을 찾기를 바랍니다.\"\n\n이것은 우리 정부 관리들에게 전송된 메시지였습니다. 그 후 곧 뉴스가 전해졌습니다: [mem_disappeared_planet.GetName]가 사라졌습니다. [mem_disappeared_planet.system.GetName] 시스템의 다른 곳에서 기록된 이미지들은 밝은 빛의 섬광을 보여주며, 그 빛은 행성을 완전히 가릴 만큼 밝았습니다. 그것이 사라진 후, 행성은 사라졌습니다.\n\n우리 과학자들은 신속하게 현장에 도착했지만, 행성이 이 차원에서 제거된 과정이나 현재 행성이 어디에 있는지에 대해 여전히 혼란스러워하고 있습니다. 우리는 Neochadamus가 그의 노력에 성공했을 것이라고만 추측할 수 있습니다. 어떤 경우든, 행성은 이제 우리에게 잃어버린 것입니다."
 mem_lost_emperor.999.desc.else:0 "당신은 나를 경시했습니다. 그래서 나는 당신의 사람들을 빼앗겠습니다. 그들이 우리의 목적지에서 깨달음을 찾기를 바랍니다.\"\n\n이것은 우리 정부 관료들에게 전송된 메시지였습니다. 그 직후, 소식이 전해졌습니다: [root.mem_lost_emperor_planets_count_2] 행성이 우리 공간에서 사라졌습니다. 영향을 받은 시스템의 다른 곳에서 기록된 이미지는 동시에 밝은 빛의 섬광을 보여주며, 그 빛은 전체 행성을 가릴 만큼 밝았습니다. 그 빛이 사라진 후, 행성은 사라졌습니다.\n\n우리 과학자들은 신속하게 현장에 도착했지만, 행성이 이 차원에서 제거된 과정이나 현재 행성이 어디에 있는지에 대해 여전히 혼란스러워하고 있습니다. 우리는 Neochadamus가 그의 노력에 성공했으며, 그의 충실한 제자들을 그의 여정에 데려오는 방법을 찾았다고 추측할 수밖에 없습니다. 어떤 경우든, 행성은 이제 우리에게 잃어버린 것입니다."
 mem_lost_emperor.999.option:0 "무섭군."
 mem_lost_emperor.999.tooltip.1planet:0 "[mem_disappeared_planet.GetName]이(가) 게임에서 제거되었습니다."
 mem_lost_emperor.999.tooltip.else:0 "[root.mem_lost_emperor_planets_count_2] 행성이 게임에서 제거됩니다. 제거목록:\n[mem_disappeared_planet_1.GetName]\n[mem_disappeared_planet_2.GetName]\n[mem_disappeared_planet_3.GetName]\n[mem_disappeared_planet_4.GetName]\n[mem_disappeared_planet_5.GetName]\n[mem_disappeared_planet_6.GetName]\n[mem_disappeared_planet_7.GetName]\n[mem_disappeared_planet_8.GetName]\n[mem_disappeared_planet_9.GetName]\n[mem_disappeared_planet_10.GetName]"
 mem_lost_emperor_paying_for_ascension:0 "승천을 위한 준비"
 mem_lost_emperor_paying_for_ascension_desc:0 "신황의 숙원인 이차원 승천을 돕기 위해 온 국민이 공헌하고 있습니다."
 mem_gov_god_emperor:0 "신성한 제국"
 mem_gov_god_emperor_desc:0 "이 정부는 불사의 네오차다무스인 신황제의 변덕을 중심으로 형성된 영적 독재 체제입니다. 신황제는 오류 없는 살아있는 신으로 숭배됩니다."
 MEM_GOD_EMPEROR:0 "신황"
 mem_neochadamus_civic_1:0 "신황제의 혁신"
 mem_neochadamus_civic_1_desc:0 "66백만 년 된 불사의 존재가 지배하는 영역에서 사는 것은 장점이 있습니다."
 mem_neochadamus_civic_2:0 "에너제틱 파워"
 mem_neochadamus_civic_2_desc:0 "그의 옛 수호자 아즈란의 전통에 따라, 신제국의 함선은 경이로운 에너지 화력과 뚫을 수 없는 보호막으로 유명합니다."
 mem_neochadamus_civic_3:0 "신황제의 프로젝트"
 mem_neochadamus_civic_3_desc:0 "신황제는 그의 많은 건설 프로젝트를 무자비한 효율성으로 추진하는 것으로 알려져 있습니다."
 NEOCHADAMUS_EMPIRE:0 "신제국의 영역"
 NEOCHADAMUS_EMPIRE_DESC:0 "고대 신황제가 이 영토를 장악했습니다."
 mem_neochadamus_setup_boost:0 "$mem_neochadamus_setup_boost_planet$"
 mem_neochadamus_setup_boost_planet:0 "네오카다무스의 행정"
 mem_neochadamus_setup_boost_planet_desc:0 "66백만 년 된 불사의 신제국에 의해 관리되는 것에는 이점이 있습니다."
 personality_mem_neochadamus_personality:0 "수수께끼 같은 성격 숭배"
 personality_mem_neochadamus_personality_desc:0 "이 제국은 신성한 천국으로 올라가려는 고대의 불사의 신비로운 네오카다무스에 의해 지배받고 있습니다."
 MEM_NEOCH_HOSTILE_GREETING_1:0 "네 삶은 눈 깜짝할 사이에 지나가는 것에 불과하다."
 MEM_NEOCH_HOSTILE_GREETING_2:0 "원하든 원하지 않든 너는 나를 섬길 것이다."
 MEM_NEOCH_NEUTRAL_GREETING_1:0 "말하라, 필멸자여."
 MEM_NEOCH_FRIENDLY_GREETING_1:0 "나이를 뛰어넘는 지혜를 가지고 있구나. [from.GetSpeciesName]."
 MEM_NEOCH_FRIENDLY_GREETING_2:0 "역사를 통과하는 당신의 길 위에 별들이 빛날 것입니다, [from.GetSpeciesName]."
 MEM_NEOCH_OVERLORD_GREETING_1:0 "[from.GetSpeciesName]을(를) 섬기는 것이 현명하다. 너를 위대함으로 인도할 것이다."
 MEM_NEOCH_WAR_GREETING_1:0 "[from.GetSpeciesName]에서 소멸될 준비를 해라. 나는 [from.GetName] 전체를 합친 것보다 전쟁을 수행한 경험이 더 많다."
 MEM_NEOCH_WAR_GREETING_2:0 "정말 날 이길 수 있다고 믿는 것이냐? 네 오만은 잘못된 것만큼이나 놀랍구나."
 MEM_NEOCH_DOW_PROPOSE:0 "이제 신황 앞에 무릎을 꿇거나 나의 분노에 맞서라."
 MEM_NEOCH_DOW_ACCEPT:0 "정말 날 이길 수 있다고 믿는 것이냐? 네 오만은 잘못된 것만큼이나 놀랍구나."
 MEM_NEOCH_PEACE_ACCEPT:0 "수락했습니다. 나중에 나머지를 정복할 시간을 찾을 수 있을 것입니다."
 MEM_NEOCH_PEACE_REFUSE:0 "평화라? 네 녀석이 내 앞에 무릎을 꿇기 전까지는 안된다!"
 MEM_NEOCH_DEMAND_VASS_PROPOSE:0 "너의 신황를 섬겨라. 그러면 내가 너희를 영광으로 인도하리라."
 MEM_NEOCH_ASK_FOR_VASS_ACCEPT:0 "너희의 지혜를 보았다. 나는 너희가 위대함을 달성하는 데 도움이 될 것이다!"
 MEM_NEOCH_INSULT_PROPOSE_1:0 "당신이 지혜라고 부르는 것은 사실 어린아이들의 무의미한 수다에 불과합니다."
 MEM_NEOCH_INSULT_PROPOSE_2:0 "너를 보고있는 나를 움츠리게 하는군. 너는 아무것도 몰라. 정말, 정말 아무것도."
 MEM_NEOCH_INSULT_ACCEPT_FE:0 "나는 6600만 년을 살았다. 나는 별들이 죽고 다시 태어나는 것을 보았다. 내가 너희의 한심한 피를 토할 시간이 있다고 생각하느냐?"
 effect_random_owned_pop_group_species:0 "무작위 소속 종족"
 mem_neochadamus_ascendant_admiral:0 "Admiral"
 mem_neochadamus_ascendant_general:0 "General"
 mem_neochadamus_ascendant_scientist:0 "과학자"
 mem_neochadamus_ascendant_governor:0 "Governor"
 mem_neochadamus_ascendant_ruler:0 "통치자"
 building_mem_lost_emperor_ancient_palace:0 "네오카다무스의 궁전"
 building_mem_lost_emperor_ancient_palace_desc:0 "신 황제 네오카다무스를 기리기 위해 지어진 거대한 궁전 단지입니다."
 NEOCHADAMUS_HABITAT:0 "네오카다무스 제국 거주지"
 mem_lost_emperor.60.name:0 "신황의 도움"
 mem_lost_emperor.60.desc:0 "이렇게만 하면...\" [root.GetSpeciesAdj] 과학자들이 놀라움에 휩싸인 채 지켜보는 가운데, 네오카다무스는 L-게이트에 대한 그들의 작업에 몇 가지 겉보기에는 간단하지만 사실은 깊은 의미를 지닌 수정을 가하여, 그 과정에서 이 문제에 대한 연구를 상당히 발전시킵니다."
 mem_lost_emperor.60.option:0 "믿을 수 없군."
 mem_lost_emperor.61.name:0 "심오한 정보 조각"
 mem_lost_emperor.61.desc:0 "Neochadamus를 경비하는 과학자들이 중요한 돌파구를 보고합니다: 오래된 황제가 "초은하 포털"에 대해 무방비 상태에서 언급한 것으로 보이며, 이 내용이 L-Gates에 대한 주요 [root.GetSpeciesAdj] 당국에 전달되면서 그들의 연구를 상당히 발전시킬 새로운 접근법에 영감을 주었습니다."
 mem_lost_emperor.61.option:0 "훌륭한 소식이군."
 mem_lost_emperor_find_out_about_azran:0 "아즈란의 능력 조사"
 mem_lost_emperor_find_out_about_azran_DESC:0 "우리는 군사 이론가들에게 전투 영상을 분석하게 하여 아즈란이 제기하는 위협의 본질을 파악해야 합니다."
 mem_lost_emperor.605.name:0 "아즈란: 우려되는 위협"
 mem_lost_emperor.605.desc:0 "최근 아즈란에게 패배한 이후, 우리의 법의학 전쟁 전문가 중 한 명이 전투의 영상과 잔존자를 조사했습니다. 그들은 아즈란을 제대로 연구할 충분한 자원이 주어진다면, 아즈란의 정확한 힘과 이를 극복하기 위한 최선의 방법에 대한 답을 발견할 수 있을 것이라고 주장합니다."
 mem_lost_emperor.605.option:0 "고려해보도록 하지."
 mem_lost_emperor.606.name:0 "발견: 아즈란의 능력"
 mem_lost_emperor.606.desc:0 "우리의 군사 이론가들이 아즈란과의 전투를 분석한 결과, 다음과 같은 발견을 제시할 수 있습니다:\n\n- 아즈란은 에너지 무기에만 의존합니다. 이 중 주요 무기는 에너지 어뢰와 플라스마 폭발의 연속 발사이며, 분열기도 사용되었고, 강인한 포인트 방어 무기 세트도 함께 사용되었습니다.\n\n- 아즈란의 보호막은 강력합니다. 그러나 이 보호막을 뚫고 들어간 우리의 공격을 분석한 결과, 탐사선의 선체는 상당한 피해를 견딜 수 있을 것으로 보이지만, 고전적인 장갑판은 장착되어 있지 않은 것으로 보입니다.\n\n그들은 아즈란이 현재 함대 강도를 측정하는 데 사용되는 척도에서 100,000 이상의 군사력을 보유하고 있다고 제안합니다."
 mem_lost_emperor.606.option:0 "흥미롭군."
