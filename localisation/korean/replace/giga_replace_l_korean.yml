l_korean:
 dyson_sphere_0:0 "$gc_mega$다이슨 스피어 건설 현장"
 dyson_sphere_0_MEGASTRUCTURE_DETAILS:0 "£gigastructural£ $giga_list_category_megastructure$ - $giga_list_category_basic_resource_production$\n§Y별§!의 모든 £energy£ §Y에너지§!를 이용합니다 - $giga_list_scales_with_star_size$\n$giga_list_freezes_system$\n§L$dyson_sphere_5$는 지정된 항성을 완전히 감싸고, 모든 태양광 출력을 에너지로 바로 전환합니다.§!"
 ring_world_1:0 "$gc_mega$링 월드 건설 현장"
 ring_world_1_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_megastructure$ - $giga_list_category_habitable_mega$\n§Y4§!개의 §Y가이아§! 수준의 거대한 §Y구획§!을 생성하며 §Y도시 행성§!과 §Y기계§!, §Y군체§! 버전으로 바꿀 수 있습니다 - $giga_list_removes_system_planets$\n§L$pc_ringworld_habitable$는 성계 내 다른 행성을 소재로 사용해, 행성과 유사한 여러 구역을 구축할 수 있습니다."
 add_research_options_galactic_wonders_utopia:0 "연구 옵션 획득:§Y[GigaGalwonTooltipGetRingworld]§!\n£physics_research£§Y$tech_dyson_sphere$§!\n\n이 연구를 요구하는 옵션:\n£physics_research£§Y$giga_tech_fusion_suppressor$§!\n£physics_research£§Y$giga_tech_penrose_sphere_2$§!\n£physics_research£§Y$giga_tech_ringworld_titanic_1$§!\n£society_research£§Y$giga_tech_planetary_computer$§!\n£engineering_research£§Y$giga_tech_star_lifter$§!\n£engineering_research£§Y$giga_tech_neutronium_gigaforge$§!\n£engineering_research£§Y$giga_tech_penrose_sphere_3$§!\n£engineering_research£§Y$giga_tech_ringworld_upgrade$§!\n£engineering_research£§Y$giga_tech_ringworld_titanic_2$§!\n£engineering_research£§Y$giga_tech_interstellar_ringworld$§!\n£engineering_research£§Y$giga_tech_war_moon_2$§!\n£engineering_research£§Y$tech_sm_megastructure$§!\n\n이 연구를 요구하는 상승 특성:\n§Y$ap_gigastructural_constructs$§!"
 add_research_options_galactic_wonders_utopia_megacorp:0 "연구 옵션이 추가되었습니다:§Y[GigaGalwonTooltipGetRingworld]§!\n£physics_research£§Y$tech_matter_decompressor$§!\n£physics_research£§Y$tech_dyson_sphere$§!\n\n이것이 필요한 연구 옵션:\n£physics_research£§Y$giga_tech_fusion_suppressor$§!\n£physics_research£§Y$giga_tech_penrose_sphere_2$§!\n£physics_research£§Y$giga_tech_ringworld_titanic_1$§!\n£society_research£§Y$giga_tech_planetary_computer$§!\n£engineering_research£§Y$giga_tech_star_lifter$§!\n£engineering_research£§Y$giga_tech_neutronium_gigaforge$§!\n£engineering_research£§Y$giga_tech_penrose_sphere_3$§!\n£engineering_research£§Y$giga_tech_ringworld_upgrade$§!\n£engineering_research£§Y$giga_tech_ringworld_titanic_2$§!\n£engineering_research£§Y$giga_tech_interstellar_ringworld$§!\n£engineering_research£§Y$giga_tech_war_moon_2$§!\n£engineering_research£§Y$tech_sm_megastructure$§!\n\n이것이 필요한 상승 특성:\n§Y$ap_gigastructural_constructs$§!"
 giga_galactic_wonders_tooltip_ring_world_construction:0 "\n£engineering_research£§Y$giga_tech_ring_world_swap$§!" # 사용법은 [GigaGalwonTooltipGetRingworld]를 참조하세요"
 giga_galactic_wonders_tooltip_ring_world_no_habitables:0 "\n£engineering_research£§Y$giga_tech_ring_world_swap_no_habitables$§!" # 사용법은 [GigaGalwonTooltipGetRingworld]를 참조하세요."
 giga_galactic_wonders_tooltip_ring_world_no_habitables_bio:0 "\n£society_research£§Y$giga_tech_ring_world_swap_no_habitables_bio$§!" # 사용법은 [GigaGalwonTooltipGetRingworld]를 참조하세요"
 ap_master_builders_desc:0 "거대 구조물을 건설하려면 전례 없는 양의 자원과 계획이 필요합니다. 우리는 거대 공학 분야에서 새로운 지평을 열고 있습니다.\n\n이를 요구하는 상승 특성:\n§Y$ap_vast_expanses$§!"
 transcendence_tooltip:0 "이를 선행으로 요구하는 기술:\n£society_research£§Y$giga_tech_psychic_hypersiphon_1$§!\n\n모든 구성원이 우리 종족이 가진 사이오닉 잠재력을 최대한 각성합니다."
 ap_voidborn_desc:0 "공허는 한때 차갑고 극복할 수 없는 장벽으로 여겨졌으나, 이제는 우리의 두 번째 고향이 되었습니다. 우리는 우주의 깊은 곳에서 영구적으로 거주하는 데 적응하였으며, 인프라 요구 사항을 줄이고 우리의 서식지에서 다른 기능을 위한 더 많은 공간을 확보하였습니다.\n\n이 연구 옵션이 필요합니다:\n£engineering_research£§Y$giga_tech_interstellar_habitat$§!"
 enable_colossus_project:0 "특별 프로젝트 활성화: 콜로서스 계획\n\n이를 선행으로 요구하는 승격 특전:\n§Y$ap_vast_expanses$§!\n\n"
 tr_unyielding_finish_desc:0 "\n§E고유 거대 구조물 잠금 해제:§! §R$name_maginot$§!\n이를 필요로 하는 연구 선택지:\n£society_research£ §Y$giga_tech_maginot_world$§!\n\n$MOD_STARBASE_DEFENSE_PLATFORM_CAPACITY_MULT$ §G+50%§!\n$mod_starbases_upkeep_mult$ §G-20%§!\n§Y$military_federation$§! 연방 유형을 사용할 수 있습니다.\n잠금 해제된 승격 특전: §G+1§!"
 tr_unyielding_federations_finish_desc:0 "\n§E고유 거대 구조물 잠금 해제:§! §R$name_maginot$§!\n이를 필요로 하는 연구 선택지:\n£society_research£ §Y$giga_tech_maginot_world$§!\n\n$MOD_STARBASE_DEFENSE_PLATFORM_CAPACITY_MULT$ §G+50%§!\n$mod_starbases_upkeep_mult$ §G-20%§!\n§Y$military_federation$§! 연방 유형을 사용할 수 있습니다.\n잠금 해제된 승격 특전: §G+1§!"
 gateway_0:0 "$gc_kilo$게이트 웨이"
 gateway_0_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_kilostructure$ - $giga_list_category_transportation$\n다른 모든 §Y게이트웨이§!로의 §Y즉각 이동§!을 가능하게 합니다\n§L게이트웨이는 모든 성간 제국의 은하적 운송망에서 중요한 역할을 하며, 올바른 곳에 설치한다면 이동 시간을 극적으로 감소시킬 수 있습니다.§!"
 gateway_final:0 "$gc_kilo$게이트웨이"
 gateway_final_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_kilostructure$ - $giga_list_category_transportation$\n다른 모든 §Y게이트웨이§!로의 §Y즉각 이동§!을 가능하게 합니다\n§L게이트웨이는 모든 성간 제국의 은하적 운송망에서 중요한 역할을 하며, 올바른 곳에 설치한다면 이동 시간을 극적으로 감소시킬 수 있습니다.§!"
 habitat_central_complex:0 "$gc_kilo$거주지 중앙 복합 단지"
 habitat_central_complex_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_kilostructure$ - $giga_list_category_habitable_mega$\n추가적인 §Y궤도 시설§!을 건설하여 확장할 수 있는 인공 §Y거주지§!를 만듭니다.\n§L$habitat_complex$은 영구적인 거주를 위해 설계된 자체 지속 가능한 스테이션의 집합체입니다. 추가 위성 스테이션은 전체 태양계의 활용을 허용합니다.§!\" #gigalistentry HABITAT"
 major_orbital:0 "$gc_kilo$거주지 대형 궤도 시설"
 major_orbital_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_kilostructure$ - $giga_list_category_habitable_upgrade$\n§Y$MOD_PLANET_MAX_DISTRICTS_ADD$§! £district£와 §Y자원 구역§! 및 §Y$MOD_PLANET_MAX_BUILDINGS_ADD$§! £building£을 §Y$habitat_complex$§!에 제공합니다.\n§L지역 거주지 복합체의 인구를 위한 추가 생활 및 작업 공간을 제공하도록 설계된 대형 기초 궤도 구조물입니다.§!"
 minor_orbital:0 "$gc_kilo$거주지 소형 궤도 시설"
 minor_orbital_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_kilostructure$ - $giga_list_category_habitable_upgrade$\n§Y자원 지구§!와 £building£ §Y$MOD_PLANET_MAX_BUILDINGS_ADD$§!를 §Y$habitat_complex$§!에 제공합니다.\n§L지역 거주지 복합체의 인구를 위한 추가 거주 및 작업 공간을 제공하도록 설계된 소형 기초 궤도 구조물입니다.§!"
 interstellar_assembly_0:0 "$gc_mega$성간 의회 건설 현장"
 interstellar_assembly_0_MEGASTRUCTURE_DETAILS:0 "£galwonders£ $giga_list_category_megastructure$ - $giga_list_category_miscellaneous$\n§Y외교 가중치§!와 §Y이용 가능한 사절§!을 늘립니다\n§L은하의 열강들을 위한 모임 장소로, 우리의 이주 선호도와 세계적인 우호도를 증가시킵니다.§!"
 mega_art_installation_0:0 "$gc_mega$거대 설치 예술 건설 현장"
 mega_art_installation_0_MEGASTRUCTURE_DETAILS:0 "£galwonders£ $giga_list_category_megastructure$ - $giga_list_category_miscellaneous$\n£unity£ §Y통합력§!과 §Y편의§!를 제공합니다\n§L항성 규모의 이 설치 예술 작품은 창작자의 정신을 대변하며 보는 이에게 영감을 줍니다.§!"
 mega_shipyard_0:0 "$gc_mega$거대조선소 건설 현장"
 mega_shipyard_0_MEGASTRUCTURE_DETAILS:0 "£galwonders£ $giga_list_category_megastructure$ - $giga_list_category_ship_production$ §H(조선소 20)§!\n§Y함선§!을 건조하고 §Y함선 건조 속도§!를 증가시킵니다\n§L함선 건조 전용의 거대한 항성 기지인 $mega_shipyard_3$에는 함선을 건조하거나 업그레이드할 수 있는 20개의 생산 정박지가 있습니다.§!"
 matter_decompressor_0:0 "$gc_mega$물질 감압기 건설 현장"
 matter_decompressor_0_MEGASTRUCTURE_DETAILS:0 "£gigastructural£ $giga_list_category_megastructure$ - $giga_list_category_basic_resource_production$\n§Y블랙홀§!을 이용해 £minerals£ §Y광물§!을 얻습니다\n§L$matter_decompressor_4$는 블랙홀의 중력을 집중해 중력 드릴을 만듦으로써, 특이점에서 광물을 회수합니다.§!"
 think_tank_0:0 "$gc_mega$사이언스 넥서스 건설 현장"
 think_tank_0_MEGASTRUCTURE_DETAILS:0 "£galwonders£ $giga_list_category_megastructure$ - $giga_list_category_science_production$\n£physics_research£ £society_research£ £engineering_research£ §Y연구§!를 생산하며 §Y연구 속도§!를 §Y15%§! 증가시킵니다\n§L$think_tank_3$의 연구소와 데이터 뱅크는 순수하고 희석되지 않은 막대한 과학의 흐름을 생성합니다.§!"
 spy_orb_0:0 "$gc_mega$센트리 어레이 건설 현장"
 spy_orb_0_MEGASTRUCTURE_DETAILS:0 "£galwonders£ $giga_list_category_megastructure$ - $giga_list_category_miscellaneous$\n§Y은하계 전체§!의 §Y감지 범위§!를 제공합니다\n§L$spy_orb_4$는 단계적으로 감지 범위를 확장해, 마지막 단계에서는 은하계 전체를 감시합니다.§!"
 strategic_coordination_center_0:0 "$gc_mega$전략 조정 센터 건설 현장"
 strategic_coordination_center_0_MEGASTRUCTURE_DETAILS:0 "£galwonders£ $giga_list_category_megastructure$ - $giga_list_category_military$\n§Y함대 수용력§!과 §Y함선 속도§!, §Y항성 기지 수용력§!, §Y방어 플랫폼 한도§!를 증가시킵니다\n§L제국의 항성 기지 네트워크를 동기화하고, 방어 및 공격 능력을 강화하는 시설입니다."
 orbital_ring:0 "$gc_kilo$오비탈 링"
 orbital_ring_tier_1_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_kilostructure$ - $giga_list_category_miscellaneous$\n§Y행성§!에 추가적인 §Y특성화§!와 §Y방어§! 능력을 제공합니다\n§L§Y$orbital_ring_tier_1$§!은 행성을 감싸는 고리 형태의 항성 기지입니다.§!"
 orbital_ring_tier_1_CONSTRUCTION_INFO_DELAYED:0 "$giga_list_additional_data$ - 오비탈 링은 행성에 방어상의 이점을 제공하며, 거주 모듈과 궤도 생산 시설은 물론 다수의 항성 기지 모듈과 건물을 수용하는 플랫폼을 제공합니다."
 quantum_catapult_0:0 "$gc_mega$양자 발사 장치 건설 현장"
 quantum_catapult_0_MEGASTRUCTURE_DETAILS:0 "£galwonders£ $giga_list_category_megastructure$ - $giga_list_category_transportation$\n§Y제한된 정확도§!를 가지고 §Y함대§!를 발사합니다\n§L중성자별이나 펄서의 힘을 집중시켜 공간을 왜곡해, 함대가 먼 거리를 건너뛰어 이동할 수 있게 하는 장치입니다§!"
 quantum_catapult_0_CONSTRUCTION_INFO_DELAYED:0 "$giga_list_additional_data$ - 양자 발사 장치의 초기 버전은 함대를 목적지 §H밖에 있는§! 성계에 보내게 될 수도 있습니다. 이 '§Y오차 반경§!'은 향후 업그레이드를 통해 줄일 수 있습니다."
 hyper_relay:0 "$gc_kilo$초공간 중계기"
 hyper_relay_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_kilostructure$ - $giga_list_category_transportation$\n§Y다수의 성계§!에 §Y연속적§!으로 건설될 경우, §Y이동 시간§!이 크게 감소합니다\n§L초공간 중계기는 하나로는 쓸 데가 없지만, 여러 중계기를 연결하면 인근 성계 사이를 빠른 속도로 이동할 수 있습니다.§!"
 orbital_arc_furnace_1:0 "$gc_kilo$$orbital_arc_furnace_4$: 적도 대역"
 orbital_arc_furnace_1_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_kilostructure$ - $giga_list_category_advanced_resource_production$\n용융 행성의 원초적인 힘을 활용하여, §Y$orbital_arc_furnace_4$§!는 접근할 수 없는 광물을 열어주고 성계 전역의 채굴 작업을 개선합니다.\n§L대규모 시스템을 생산적인 발전소로 전환할 수 있는 장치입니다.§!"
 dyson_swarm_1:0 "$gc_kilo$$dyson_swarm_3$: 배열"
 dyson_swarm_1_MEGASTRUCTURE_DETAILS:0 "£gigastructural£ £megaupgrade£ $giga_list_category_kilostructure$ - $giga_list_category_basic_resource_production$\n상호 연결된 위성의 배열인 §Y$dyson_swarm_3$§!는 별 자원의 출력을 향상시키기 위해 설계되었습니다.\n§L한 §Y$dyson_swarm_3$§!는 §Y$dyson_sphere_5$§!의 원초적 힘으로 나아가는 디딤돌입니다."
 dyson_swarm_1_DESC:0 "별의 자원을 효율적으로 활용하기 위해 설계된 §Y$dyson_swarm_3$§!는 서로 연결된 위성 배열입니다."
 dyson_swarm_2_DESC:0 "별빛 자원 출처의 출력을 향상시키기 위해 설계된 §Y$dyson_swarm_3$§!는 서로 연결된 위성 배열입니다."
 dyson_swarm_3_DESC:0 "상호 연결된 위성 배열인 §Y$dyson_swarm_3$§!는 성계 자원의 출력을 향상시키도록 설계되었습니다."
 cosmogenesis_world_0:0 "$gc_crisis$$pc_cosmogenesis_world$"
 cosmogenesis_world_0_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_crisis$ - $giga_list_category_science_production$\n거대한 저장소 컴퓨터로, 팝을 효과적으로 소비하여 §Y연구§!와 §Y고급 논리§!를 생성합니다. 인구가 증가할수록 효율성과 소모율이 상승합니다.\n§L현실의 내면에서 의미를 추출하기 위해서는 새로운 종류의 과학이 필요합니다...§!"
 cosmogenesis_needle:0 "$gc_crisis$$NAME_Cosmogenesis_Sphere$"
 cosmogenesis_needle_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_crisis$ - $giga_list_category_special$\n우리의 손으로 만든 현실로 승격하기 위해, 우리는 이 우주를 영원히 떠나기 전에 우리의 전체 문명을 호라이즌 니들에 탑승시켜야 합니다.\n§L우주의 법칙을 명백히 위반하는 행위입니다.§!"
 crisis_sphere_0:0 "$gc_crisis$에테로파식 엔진 프레임"
 crisis_sphere_0_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_crisis$ - $giga_list_category_special$\n$crisis_sphere_0_DESC$\n§L우리의 정신은 더 이상 연약한 육체의 물리적 제약에 얽매이지 않을 것이며, 현실 자체는 우리의 뜻대로 될 것입니다. 정말로, 더 높은 존재의 차원은 존재할 수 없습니다.§!"
 galactic_crucible_0:0 "$gc_crisis$은하의 제련소 프레임"
 galactic_crucible_0_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_crisis$ - $giga_list_category_special$\n이 거대한 기지는 모항성으로부터 에너지를 흡수하여 §Y$entropy_conduit_plural$§!; 별의 운명을 재편할 수 있는 함선을 생산하는 자동화된 조선소에 전력을 공급합니다.\n§L$galactic_crucible_0_DESC$§!"
 grand_archive_0:0 "$gc_kilo$$grand_archive$"
 grand_archive_0_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_kilostructure$ - $giga_list_category_miscellaneous$\n우리가 은하 전역에서 수집한 가장 귀중한 유물을 보존하고 전시합니다.\n§L우리가 은하 전역에서 수집한 주목할 만한 표본, 생생한 우주 생물체를 포함하여 수용하고 전시하기 위해 설계된 전용 궤도 구조물입니다.§!"
 deep_space_citadel_0:0 "$gc_kilo$$tech_deep_space_citadel$"
 deep_space_citadel_0_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_kilostructure$ - $giga_list_category_defensive$\n중력장 내에서 최대 방어를 위해 설계된 장갑 함대 기지인 §Y$deep_space_citadel_0$§!입니다.\n§L$deep_space_citadel_0_DESC$§!"
 shroud_seal:0 "$SHROUD_SEAL$"
 shroud_seal_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_kilostructure$ - $giga_list_category_psionics$\n이 §Y$SHROUD_SEAL$§!는 인근 §Y$PSIONIC_AURA_PLURAL$§!의 세기를 약화시킵니다. 이 시스템에서 §Y$PSIONIC_AURA$§!의 감소량은 $@shroud_seal_decrease|0$ 강도이며, 인접한 시스템에서는 -1입니다.\n§L$shroud_seal_DESC$§!"
 behemoth_egg:0 "$gc_crisis$거대 괴물 알"
 behemoth_egg_DESC:0 "A giant 유기체 vessel bearing a gestating §YBehemoth§!."
 behemoth_egg_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_crisis$ - $giga_list_category_special$\n이 구조물은 §Y거대 생명체 알§!의 개발을 지원합니다.\n§L$behemoth_egg_DESC$§!"
 concept_automodding_hab_preference_desc:0 "일반:\n- ['trait:trait_auto_dry_preference']\n- ['trait:trait_auto_wet_preference']\n- ['trait:trait_auto_cold_preference']\n\n특수:\n- ['trait:trait_auto_pc_nuked_preference']\n- ['trait:trait_auto_pc_gaia_preference']\n- ['trait:trait_auto_pc_hive_preference']\n\n인공:\n- ['trait:trait_auto_pc_city_preference']\n- ['trait:trait_auto_pc_relic_preference']\n- ['trait:trait_auto_pc_habitat_preference']\n- ['trait:trait_auto_pc_ringworld_habitable_preference']\n- ['trait:trait_auto_pc_cosmogenesis_world_preference']\n- ['trait:trait_auto_pc_alderson_slice_preference']"
 giga_ring_upgrade_tt_TEXT:0 "§Y업그레이드§! - §Y링월드 기술 세그먼트§!를 §G거주 가능한 세그먼트§!로 업그레이드할 수 있습니다."
