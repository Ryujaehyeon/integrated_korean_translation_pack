 dyson_gun_0_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_kilostructure$ - $giga_list_category_weaponry$\n§Y포§!를 생성하여 §Y적 구조물, 함선 및 행성§!에 원거리에서 피해를 줄 수 있습니다.\n§L우리가 에너지 비축량을 목표 시스템에 발사하여 잠재적으로 파괴적인 효과를 낼 수 있게 해줍니다.§!"
 concept_trait_photoadaptive_stars_desc:0 "일부 종은 항성 ['concept_star_luminosity']에서 $worker_and_simple_drone_cat_bonus_workforce_mult$를 얻습니다. \n\n- $pc_pulsar_plural$, $pc_neutron_star_plural$, 또는 $pc_giga_o_star_plural$: §G+15%§! \n- $pc_b_star_short$, $pc_a_star_short$, 또는 $pc_f_star_short$ 항성: §G+10%§! \n- $pc_g_star_short$ 또는 $pc_k_star_short$ 항성: §G+5%§! \n- $pc_m_star_short$ 또는 $pc_gigaignited_star_plural$: §R-5%§! \n- $pc_t_star_short_plural$, $pc_protostar_plural$, 또는 $pc_black_hole_plural$: §R-15%§!"
 concept_star_luminosity_desc:0 "광도는 별이 방출하는 방사선과 빛의 양을 측정하는 지표로, 별의 분류, 항성계의 온도 및 거주 가능성에 영향을 미칩니다. \n\n§E$luminosity_0$§! \n- $pc_black_hole$ \n- $pc_t_star$ \n- $pc_protostar$ \n\n§E$luminosity_1$§! \n- $pc_m_star$ \n- $pc_m_giant_star$ \n- $pc_gigaignited_star$\n\n§E$luminosity_2$§! \n- $pc_g_star$ \n- $pc_k_star$ \n\n§E$luminosity_3$§! \n- $pc_b_star$ \n- $pc_a_star$ \n- $pc_f_star$ \n\n§E$luminosity_4$§! \n- $pc_neutron_star$ \n- $pc_pulsar$ \n- $pc_giga_o_star$ \n- $pc_core_quasar$"
