l_korean:
 pd_continental:0 "대륙 행성"
 pd_continental_desc:0 "거대한 대륙은 바다에 의해 분리되어 있으며, 위도와 강수량에 따라 큰 기후 변화를 겪습니다."
 pd_retinal:0 "망막 세계"
 pd_retinal_desc:0 "이 세계의 식물 생명체는 엽록소 대신 레티날데하이드 기반으로, 행성에 독특한 보라색 색조를 부여합니다."
 pd_lake:0 "호수 세계"
 pd_lake_desc:0 "행성의 지형은 작고 큰 수많은 호수로 이루어진 모자이크입니다."
 pd_forest:0 "숲 세계"
 pd_forest_desc:0 "이 행성의 표면은 울창한 숲으로 덮여 있으며, 전체 육지를 아우르는 끊임없는 숲 환경을 형성하고 있습니다."
 pd_tepid:0 "미지근한 세계"
 pd_tepid_desc:0 "이 행성은 축 기울기가 최소화되어 있어 이상적인 조건이 다양한 광합성 과정을 촉진시켰으며, 그 결과 식물의 화려한 색상이 나타났습니다."
 pd_mushroom:0 "버섯 세계"
 pd_mushroom_desc:0 "균류 생명이 행성의 생태계를 지배하며, 광활한 지역을 펼쳐진 버섯 숲과 들판으로 감싸고 있습니다."
 pd_temperate:0 "온화한 세계"
 pd_temperate_desc:0 "이 세계는 온화한 기후를 자랑하며 거의 모든 대륙에서 풍부한 생물 다양성을 지원합니다."
 pd_sakura:0 "사쿠라 세계"
 pd_sakura_desc:0 "광활한 육지가 아름다운 꽃나무로 가득한 울창한 숲과 바다로 나뉘어 있습니다."
 pd_moss:0 "$pc_pd_moss$"
 pd_moss_desc:0 "$pc_pd_moss_desc$"
 pd_marsh:0 "$pc_pd_marsh$"
 pd_marsh_desc:0 "$pc_pd_marsh_desc$"
 pd_carotene:0 "$pc_pd_carotene$"
 pd_carotene_desc:0 "$pc_pd_carotene_desc$"
 pd_megaflora:0 "거대 식물 세계"
 pd_megaflora_desc:0 "이 세계의 거대한 나무 같은 식물들이 표면을 덮고 있으며, 광범위한 뿌리가 수 마일 아래로 뻗어 있습니다. 이 희귀한 식물 주변의 건설 환경을 탐색하는 것은 상당한 도전 과제가 됩니다."
 pd_petrified:0 "석화된 나무 세계"
 pd_petrified_desc:0 "이 행성은 한때 광활한 거대 식물로 덮여 있었으나, 이제는 이전의 푸르름을 보여주는 방대한 석화된 잔존자들로 가득 차 있습니다. 독특한 나무 같은 물자는 건설 가능성을 지니고 있으나, 이를 채취하는 데는 상당한 노력이 필요합니다."
 pd_ocean:0 "해양 행성"
 pd_ocean_desc:0 "바다가 표면의 §Y90%§! 이상을 덮고 있으며, 흩어져 있는 섬들이 나머지 비율을 차지하고 있습니다."
 pd_cascadian:0 "카스케이디안 세계"
 pd_cascadian_desc:0 "온화한 해안 숲과 우뚝 솟은 산맥이 이 풍경을 정의합니다. 행성의 활발하고 폭풍우가 몰아치는 수소권은 온화한 겨울과 짧고 따뜻한 여름 사이의 뚜렷한 대조를 보여줍니다."
 pd_swamp:0 "늪 세계"
 pd_swamp_desc:0 "대부분의 행성을 차지하는 울창한 숲이 우거진 습지로, 얕은 바다, 늪, 그리고 습기가 많은 지역이 있는 튼튼하고 안정적인 수권을 특징으로 합니다. 이 습기 있는 환경은 풍부한 식물과 동물 생명을 유지합니다."
 pd_crag:0 "바위 행성"
 pd_crag_desc:0 "이 행성은 광활한 바다와 대부분의 표면을 덮고 있는 극지 얼음 모자를 자랑합니다. 지진 활동이 활발한 섬들이 이 지역의 역동적이고 독특한 환경적 특징을 흩어놓고 있습니다."
 pd_fog:0 "안개 세계"
 pd_fog_desc:0 "바다의 지배 아래, 만연한 습기가 거의 지속적으로 안개와 안개를 생성하여 육지를 가로지르며 해안 너머의 무성한 숲과 광활한 초원을 유지합니다."
 pd_kelp:0 "켈프 세계"
 pd_kelp_desc:0 "이 행성의 표면은 주로 해양으로 이루어져 있으며, 영양분이 풍부한 얕은 수역이 광범위한 해조 숲을 조성하고 있습니다. 이 번성하는 수중 생태계는 행성 전체에 걸쳐 놀라운 생물 다양성을 지원합니다."
 pd_algae:0 "핑크 조류 세계"
 pd_algae_desc:0 "이 행성의 풍부한 얕은 바다와 호수는 눈부신 분홍색 조류의 대발생을 지원하여 우주에서 볼 수 있는 놀라운 시각적 장관을 만들어냅니다."
 pd_columnar:0 "$pc_pd_columnar$"
 pd_columnar_desc:0 "$pc_pd_columnar_desc$"
 pd_tidepool:0 "$pc_pd_tidepool$"
 pd_tidepool_desc:0 "$pc_pd_tidepool_desc$"
 pd_barnacle:0 "$pc_pd_barnacle$"
 pd_barnacle_desc:0 "$pc_pd_barnacle_desc$"
 pd_reef:0 "산호초 세계"
 pd_reef_desc:0 "광범위한 얕은 바다가 행성 전체를 감싸고 있으며, 궤도에서 관찰할 때 수면 바로 아래에 있는 중요한 산호초 시스템이 드러납니다. 산호로 이루어진 섬 사슬이 산호초가 수면을 뚫고 나오는 곳에서 나타납니다."
 pd_archipelago:0 "군도 세계"
 pd_archipelago_desc:0 "하나의 행성 전체에 해양이 흩어져 있는 섬들이 점재합니다. 강렬한 화산 활동으로 인해 빠른 출현과 소멸이 일어나며, 끊임없이 변화하는 경관을 만들어냅니다."
 pd_tropical:0 "열대 행성"
 pd_tropical_desc:0 "이 행성은 교대하는 계절을 겪으며, 상당한 강수량과 건조한 시기가 있으며, 울창한 식생이 육지를 덮고 있습니다."
 pd_atoll:0 "환초 세계"
 pd_atoll_desc:0 "이 행성은 얕은 석호, 복잡한 산호초, 그리고 무성한 열대 섬들로 가득 차 있습니다. 이상적인 기온과 함께 이 세계는 번성하는 생물권을 키워냅니다."
 pd_tepui:0 "테푸이 세계"
 pd_tepui_desc:0 "상당한 수계와 밀집한 식생을 가진 이 행성은 시원한 비가 내리는 테푸이와 따뜻하고 습한 지상 정글을 구분합니다."
 pd_mangrove:0 "망그로브 세계"
 pd_mangrove_desc:0 "이 행성의 표면 대부분은 얕은 바다로 덮여 있어 해수면 위의 육지가 거의 없습니다. 맹그로브 정글은 몇 개의 존재하는 섬의 해안선을 넘어 수백 마일까지 뻗어 있습니다."
 pd_cenote:0 "세노테 세계"
 pd_cenote_desc:0 "희귀한 열대 숲이 표면 육지를 덮고 있으며, 대부분의 수계는 복잡한 지하 시스템으로 흘러 들어가 서로 연결된 생태계와 풍부한 생물 다양성을 지원합니다."
 pd_fungal:0 "곰팡이 정글 세계"
 pd_fungal_desc:0 "이 행성의 균류 기반 식생은 미세한 포자에서 거대한 거대균 버섯에 이르는 다양한 생물권의 기초를 형성합니다."
 pd_aerial:0 "공중 씨앗 세계"
 pd_aerial_desc:0 "무성한 식물로 뒤덮인 대지 위 높이, 행성의 독특한 식물에서 태어난 거대한 씨앗 포드가 구름처럼 하늘을 떠다닙니다."
 pd_lilypad:0 "연꽃 세계"
 pd_lilypad_desc:0 "이 행성의 따뜻하고 얕은 바다는 다양한 생물 다양성을 지원합니다. 수면에서는 수생류 식물의 튼튼한 잎이 2차 표면 기반 생태계를 형성합니다."
 pd_obsidian:0 "$pc_pd_obsidian$"
 pd_obsidian_desc:0 "$pc_pd_obsidian_desc$"
 pd_thunder:0 "$pc_pd_thunder$"
 pd_thunder_desc:0 "$pc_pd_thunder_desc$"
 pd_geothermal:0 "Geothermal"
 pd_geothermal_desc:0 "이 행성에서는 우뚝 솟은 얼음 절벽 사이로 생기 넘치는 열대 균열이 나타납니다. 표면 아래에서는 강력한 지열 활동이 수백만 개의 따뜻한 풀을 유지하며, 번성하는 생물 다양성을 키우고 있습니다."
 pd_biolumen:0 "생물 발광 세계"
 pd_biolumen_desc:0 "대기 입자가 이 행성을 감싸고 있지만, 거의 모든 생명체가 생물 발광에 적응하여 궤도에서 볼 수 있는 숨막히는 광경을 만들어냅니다."
 pd_desert:0 "사막 행성"
 pd_desert_desc:0 "이 행성은 드문 강수와 낮과 밤의 온도 변화가 특징입니다. 사막에서는 드물게 비가 내리며 희박한 식물이 피어납니다."
 pd_dune:0 "모래 행성"
 pd_dune_desc:0 "끝없는 모래 언덕이 이 사막 행성을 지배하고 있습니다. 희귀한 수권은 주로 지하 수원에 존재하며, 간헐적으로 오아시스와 산의 샘으로 나타납니다."
 pd_oasis:0 "오아시스 세계"
 pd_oasis_desc:0 "수계는 밀집한 식생대가 있는 광대한 수역 하나를 지탱합니다. 강수량은 행성의 대부분을 덮고 있는 내륙 사막에 거의 도달하지 않습니다."
 pd_outback:0 "오지 세계"
 pd_outback_desc:0 "행성 표면은 건조하고 반건조한 관목지대와 사막이 지배하고 있으며, 수원 근처에는 식생이 증가합니다. 수권은 특정 내륙 바다와 지하 샘으로 제한되어 있습니다."
 pd_coastal:0 "해안 세계"
 pd_coastal_desc:0 "깊은 바다는 높은 대기 안정성을 유도하여 표면 강수량을 제한합니다. 만연한 안개와 연무는 다양한 다육식물과 관목을 유지합니다."
 pd_fungi:0 "사막 균류 세계"
 pd_fungi_desc:0 "화산재로 덮인 건조한 이 세계는 높은 온도, 건조함, 낮은 영양에 저항하는 사막 균류를 자생하고 있습니다."
 pd_ironsand:0 "$pc_pd_ironsand$"
 pd_ironsand_desc:0 "$pc_pd_ironsand_desc$"
 pd_cactus:0 "$pc_pd_cactus$"
 pd_cactus_desc:0 "$pc_pd_cactus_desc$"
 pd_dust:0 "$pc_pd_dust$"
 pd_dust_desc:0 "$pc_pd_dust_desc$"
 pd_sodalite:0 "$pc_pd_sodalite$"
 pd_sodalite_desc:0 "$pc_pd_sodalite_desc$"
 pd_salt:0 "소금 세계"
 pd_salt_desc:0 "이 행성에는 풍부한 광물 자원이 분포해 있지만, 대부분의 표면에 높은 염분 함량이 많은 식물과 동물 생명체에게는 불모의 환경을 제공합니다."
 pd_aquifer:0 "수층 세계"
 pd_aquifer_desc:0 "모래가 많은 지형은 강렬한 열기에서 거의 안식을 제공하지 않지만, 끊임없이 움직이는 석호와 수중 강 시스템은 다양한 독특한 생태계와 생물 다양성을 품고 있습니다."
 pd_arid:0 "건조 행성"
 pd_arid_desc:0 "먼지로 덮인 지형은 주로 메사와 협곡으로 구성되어 있습니다. 식생은 드물지만, 극지방에서는 숲이 무성하게 자생합니다."
 pd_mesa:0 "메사 세계"
 pd_mesa_desc:0 "적도 고원과 극지 숲이 지형을 정의합니다. 수권은 식생으로 덮인 강바닥이 있는 협곡의 큰 강들로 구성되어, 다양한 경관을 형성합니다."
 pd_fog_desert:0 "사막 행성 안개"
 pd_fog_desert_desc:0 "극단적인 고도의 봉우리들이 대부분의 표면에 비를 가리는 그림자를 만듭니다. 염전과 건조한 계곡이 고원 지역을 지배하며, 몇 개의 호수와 산의 샘이 수권을 나타냅니다."
 pd_mediterranean:0 "지중해 세계"
 pd_mediterranean_desc:0 "이 행성의 수권은 드문 식생으로 둘러싸인 광활한 내륙 바다를 유지합니다. 내륙 지역은 강수량이 부족한 건조한 풍경을 특징으로 합니다."
 pd_badlands:0 "황무지 세계"
 pd_badlands_desc:0 "건조 지형은 바람과 물의 침식에 의해 형성된 퇴적암과 점토가 풍부한 토양을 특징으로 합니다. 주로 관목과 강한 풀들이 언덕의 그늘에서 잘 자랍니다."
 pd_succulent:0 "다육식물 세계"
 pd_succulent_desc:0 "높은 온도와 드물지만 간헐적인 강수량은 이 행성의 어려운 환경에서 생존하기 위해 식물이 수분을 유지하는 기술로 진화하도록 촉진했습니다."
 pd_striped:0 "줄무늬 세계"
 pd_striped_desc:0 "이 행성은 매혹적인 광물학적 구성을 보여줍니다. 경관은 깊고 다채로운 줄무늬를 자랑하며, 이는 먼지로 덮인 건조 지형에 매혹적인 층을 더합니다."
 pd_amethyst:0 "자수정 세계"
 pd_amethyst_desc:0 "이 건조 행성은 매우 활발한 지질학적 과거를 가지고 있어 행성의 지각 곳곳에 광범위한 자수정 석영 매장물이 형성되었습니다."
 pd_opal:0 "$pc_pd_opal$"
 pd_opal_desc:0 "$pc_pd_opal_desc$"
 pd_superbloom:0 "$pc_pd_superbloom$"
 pd_superbloom_desc:0 "$pc_pd_superbloom_desc$"
 pd_coral:0 "산호 세계"
 pd_coral_desc:0 "한때 해양으로 덮여 있었던 이 행성의 감소한 수권은 생태적 변화로 인해 건조한 환경에 산호가 적응하게 만들었습니다."
 pd_primal:0 "원시 세계"
 pd_primal_desc:0 "이 젊은 행성에서 화산 활동이 잦아들면서 복잡한 식물과 동물이 나타나고, 이는 호흡 가능한 대기와 안정된 수계의 발전에 기여합니다."
 pd_savannah:0 "초원 행성"
 pd_savannah_desc:0 "제한된 수문은 짧은 우기 시즌을 초래합니다. 주로 어디에나 있는 풀로 구성된 식생은 얕은 오아시스 주변에 집중되어 있습니다."
 pd_steppe:0 "초원 세계"
 pd_steppe_desc:0 "이 반건조 초원은 광활한 구릉과 평원이 특징입니다. 나무가 없는 것이 두드러지지만, 간헐적인 강우가 관목과 풀의 성장을 유지합니다."
 pd_prairie:0 "초원 세계"
 pd_prairie_desc:0 "계절적인 수문으로 특징지어지는 이 행성은 하나의 광대한 대륙, 넓은 내륙 바다, 짧은 건조한 여름, 그리고 춥고 혹독한 겨울을 자랑합니다."
 pd_veld:0 "벨드 세계"
 pd_veld_desc:0 "질소-산소가 포함된 건조한 대기를 가진 이 아열대 행성은 온화한 겨울과 길고 더운 여름을 가진 관목 숲과 사바나가 특징입니다."
 pd_semi_arid:0 "반건조 행성"
 pd_semi_arid_desc:0 "수계는 짧지만 중요한 우기(雨期)를 허용하며, 식생은 보호된 계곡과 큰 수역 근처에 집중되어 있습니다."
 pd_aspen:0 "아스펜 세계"
 pd_aspen_desc:0 "건조하고 바위가 많은 질소-산소 대기를 가진 이 세계는 초원 사이에 나무 숲이 있습니다. 작은 규모지만 안정적인 수계가 흐르며 숲과 울창한 관목을 지탱합니다."
 pd_sandstone:0 "$pc_pd_sandstone$"
 pd_sandstone_desc:0 "이 행성은 광활한 초원과 바람에 깎인 사암 지형을 자랑합니다. 이 수권은 이 환경에서 잘 자랄 수 있도록 적응한 회복력 있는 풀을 지원합니다."
 pd_turquoise:0 "$pc_pd_turquoise$"
 pd_turquoise_desc:0 "이 아열대 초원 행성은 표면 곳곳에 거의 모든 곳에서 발견되는 방대한 양의 터키석 보석으로 점철되어 있습니다."
 pd_calcite:0 "$pc_pd_calcite$"
 pd_calcite_desc:0 "$pc_pd_calcite_desc$"
 pd_monsoon:0 "$pc_pd_monsoon$"
 pd_monsoon_desc:0 "$pc_pd_monsoon_desc$"
 pd_silvergrass:0 "$pc_pd_silvergrass$"
 pd_silvergrass_desc:0 "$pc_pd_silvergrass_desc$"
 pd_supercontinent:0 "초대륙 세계"
 pd_supercontinent_desc:0 "이 행성은 현재 판구조론으로 인해 초대륙을 형성하고 있습니다. 해안 지역은 무성한 식생으로 가득 차 있으며, 내륙 지형은 초원에서 넓은 건조 사막으로 변화합니다."
 pd_sinkhole:0 "싱크홀 세계"
 pd_sinkhole_desc:0 "표면에는 작고 안정적인 수권이 있지만, 행성을 가로지르는 지하 해양이 그 아래에 숨겨져 있어 세계의 표면에 거대한 싱크홀을 형성합니다."
 pd_arctic:0 "극지 행성"
 pd_arctic_desc:0 "극지는 광활하며, 상당한 양의 얼음으로 된 얼음층이 존재합니다. 계절 변화에도 불구하고 적도 지역은 풍부한 식생을 자랑합니다."
 pd_cold_desert:0 "차가운 사막 행성"
 pd_cold_desert_desc:0 "이 행성은 낮은 강수량과 드문 수면 수역이 특징입니다. 낮 평균 기온은 자주 영하로 유지됩니다."
 pd_glacial:0 "빙하기 세계"
 pd_glacial_desc:0 "수년 중 대부분의 기간 동안 수권은 빙하 얼음에 갇혀 있지만, 여름철에는 상당한 융해가 발생하며 눈이 꽤 흔하게 내립니다."
 pd_antarctic:0 "남극 세계"
 pd_antarctic_desc:0 "겨울철 바람이 시속 25km를 넘을 수 있지만, 생명체는 해빙 아래의 고립된 주머니, 동굴, 보호된 계곡에 의존하여 살아갑니다."
 pd_aeolian:0 "아이올리안 세계"
 pd_aeolian_desc:0 "이 행성의 바람은 정기적으로 시속 300킬로미터를 초과하는 속도에 도달합니다. 이러한 바람은 비어 있는 싱크홀, 슬롯 협곡, 그리고 움푹 패인 지역을 만들어내어, 생명체가 날씨로부터 안전하게 살아갈 수 있는 환경을 제공합니다."
 pd_ice_spike:0 "얼음 첨탑 세계"
 pd_ice_spike_desc:0 "표면 아래의 강렬한 지각 활동이 깊은 얼음층에 부딪혀, 풍경을 지배하는 우뚝 솟은 얼음 첨탑을 만들어냅니다."
 pd_crevasse:0 "균열 세계"
 pd_crevasse_desc:0 "이 얼어붙은 행성의 표면은 살기 어려운 환경이지만, 행성의 중심에서 나오는 지열 에너지가 이 행성의 많은 균열 바닥을 거주 가능하게 유지합니다."
 pd_supraglacial_lakes:0 "$pc_pd_supraglacial_lakes$"
 pd_supraglacial_lakes_desc:0 "$pc_pd_supraglacial_lakes_desc$"
 pd_ice_dunes:0 "얼음 모래언덕 세계"
 pd_ice_dunes_desc:0 "대부분의 연중 기온이 영하로 유지되며, 모래와 같은 얼음 입자가 이 행성의 사구를 형성합니다."
 pd_ferrospring:0 "$pc_pd_ferrospring$"
 pd_ferrospring_desc:0 "$pc_pd_ferrospring_desc$"
 pd_storm:0 "Storm"
 pd_storm_desc:0 "행성의 육지는 양 극에 위치하고 있으며, 거대한 해양이 이를 가로막고 있어 연중 강력한 폭풍을 발생시킵니다. 극한의 환경으로 인해 행성의 대부분 생명체는 해양의 표면 아래에 존재합니다."
 pd_iceberg:0 "빙산 세계"
 pd_iceberg_desc:0 "아래 영하의 기온에도 불구하고, 행성을 덮고 있는 매우 염분이 높은 해양은 여전히 액체 상태를 유지합니다. 소금에서 분리된 물은 반영구적인 얼음산을 형성하며, 이러한 차가운 환경에서는 염수 해조류가 번성합니다."
 pd_alpine:0 "고산 행성"
 pd_alpine_desc:0 "이 행성은 눈 덮인 산꼭대기를 가지고 있으며, 얼어붙은 호수가 계곡에 점재해 있습니다. 이 행성은 계절 변화가 거의 없지만, 얼어붙은 호수 아래의 여전히 액체 상태인 물은 일부 강인한 식물을 유지하기에 충분합니다."
 pd_boreal:0 "북극 세계"
 pd_boreal_desc:0 "이 극지방 행성은 넓은 온도 범위를 경험하며, 따뜻한 지역에는 북부 숲이 있고, 극지방 근처에는 동토와 얼음이 있습니다."
 pd_snow:0 "눈의 세계"
 pd_snow_desc:0 "이 행성은 현재 빙하기를 겪고 있습니다. 빙하가 대부분의 극지방과 중위도를 덮고 있는 반면, 온화한 숲이 적도 지역을 덮고 있습니다."
 pd_highland:0 "고산 세계"
 pd_highland_desc:0 "끈질긴 강수와 잦은 안개가 이 행성을 감싸고 있습니다. 얼어붙은 산맥과 광활한 내륙 바다 사이에 자리 잡은 안정적인 수권은 강인한 풀과 지의류를 지탱합니다."
 pd_dune_forest:0 "모래언덕 숲 세계"
 pd_dune_forest_desc:0 "이 행성은 잦은 안개가 끼지만 강수량은 적습니다. 저지대는 주로 건조한 모래언덕으로 이루어져 있으며, 수권은 눈 덮인 숲이 우거진 산들을 유지하고 있습니다."
 pd_fjord:0 "피오르드 세계"
 pd_fjord_desc:0 "이 행성의 광활한 바다는 깊은 만을 형성하여, 해안가에는 아한대 우림이 자생하고 고산 초원이 높은 고도에 펼쳐집니다."
 pd_blossom:0 "꽃피는 세계"
 pd_blossom_desc:0 "이 행성의 풍부한 초원은 생동감 넘치는 꽃이 만발한 식물들로 장식되어 있으며, 궤도에서 볼 수 있는 장관을 연출합니다."
 pd_taiga:0 "$pc_pd_taiga$"
 pd_taiga_desc:0 "$pc_pd_taiga_desc$"
 pd_craton:0 "$pc_pd_craton$"
 pd_craton_desc:0 "$pc_pd_craton_desc$"
 pd_ravine:0 "$pc_pd_ravine$"
 pd_ravine_desc:0 "$pc_pd_ravine_desc$"
 pd_glaciovolcanic:0 "빙하화산 세계"
 pd_glaciovolcanic_desc:0 "이 행성은 강렬한 화산 활동을 겪고 있으며, 그 결과로 드문 광물과 에너지를 가져오는 수많은 지열로 따뜻해진 호수가 얼어붙은 풍경에 존재합니다."
 pd_lanthanide:0 "란타나이드 세계"
 pd_lanthanide_desc:0 "이 행성의 희토류 금속과 자기 활동은 멋진 고리 모양의 산꼭대기를 형성합니다. 계절 변화가 거의 없기 때문에 수권은 강한 생명력의 식물 군락만을 유지할 수 있습니다."
 pd_tundra:0 "동토 행성"
 pd_tundra_desc:0 "이 세계는 안정적인 수권과 예측 가능한 낮은 온도를 유지하여, 험준한 산과 빙하 사이에 광대한 이끼 숲을 조성합니다."
 pd_bog:0 "늪 세계"
 pd_bog_desc:0 "이 행성은 짧은 습한 여름과 긴 추운 겨울, 그리고 상당한 연간 강수량을 경험합니다. 튼튼한 수권이 육지를 울창한 늪과 습기로 덮고 있습니다."
 pd_mycelium:0 "균사체 세계"
 pd_mycelium_desc:0 "이 행성은 짧고 시원한 여름과 건조하고 얼어붙은 겨울을 가지고 있습니다. 광활한 평원에는 우뚝 솟은 버섯 숲과 밀집한 지하 균사 네트워크가 특징입니다."
 pd_mud:0 "진흙 세계"
 pd_mud_desc:0 "이 행성은 드문 계절과 상당한 강수량을 가지고 있으며, 표면의 저수준 지열 활동이 얼어붙은 풍경 곳곳에 수많은 진흙 호수와 화산을 형성합니다."
 pd_basalt:0 "현무암 세계"
 pd_basalt_desc:0 "이 행성에서는 안정적인 계절이 지배하며, 간헐적인 화산 활동이 광범위한 용암 평원을 형성합니다. 식은 화산암 위에서 자생하는 이끼와 지의류가 생태계를 유지합니다."
 pd_tuya:0 "투야 세계"
 pd_tuya_desc:0 "제한된 계절과 혹독한 겨울 속에서, 이 세계의 안정적인 생물권은 화산 토양의 영양분으로 번성하며, 표면에는 빙하 아래 화산들이 점재해 있습니다."
 pd_cryovolcano:0 "냉각화산 세계"
 pd_cryovolcano_desc:0 "이 세계에서는 얼어붙은 표면 아래에서 물, 암모니아, 메탄을 분출하는 냉각 화산이 방출하는 영양소 덕분에 생명이 지속됩니다."
 pd_treeline:0 "$pc_pd_treeline$"
 pd_treeline_desc:0 "$pc_pd_treeline_desc$"
 pd_peatland:0 "$pc_pd_peatland$"
 pd_peatland_desc:0 "$pc_pd_peatland_desc$"
 pd_travertine:0 "$pc_pd_travertine$"
 pd_travertine_desc:0 "$pc_pd_travertine_desc$"
 pd_cryoflora:0 "크라이오플로라 세계"
 pd_cryoflora_desc:0 "행성의 수소권은 대부분 얼어 있으며, 온도가 거의 영하로 올라가지 않습니다. 그럼에도 불구하고 식물과 동물은 항온 단백질에 적응하여 아름답고 빛나는 생태계를 형성하였습니다."
 pd_lichen:0 "이끼 세계"
 pd_lichen_desc:0 "이 세계는 안정적인 수권과 예측 가능한 낮은 온도에서 광범위한 이끼 숲을 지탱합니다. 이끼 숲은 바위가 많은 산과 빙하 사이에 자리 잡고 있으며, 광물에서 영양분을 흡수합니다."
 pd_wet_superhabitable:0 "습기 있는 초거주 가능 세계"
 pd_wet_superhabitable_desc:0 "이 해양 슈퍼거주 가능한 세계는 튼튼한 수권과 따뜻한 평균 기온, 얕은 해양 분지로 최적의 농업 조건을 자랑합니다. 높은 중력은 익숙하지 않은 이들에게 도전이 됩니다."
 pd_dry_superhabitable:0 "건조 초거주 가능 세계"
 pd_dry_superhabitable_desc:0 "이 건조한 초거주 가능한 세계는 튼튼한 수권과 따뜻한 평균 기온, 얕은 해양 분지를 갖춘 최적의 농업 조건을 자랑합니다. 강한 중력은 익숙하지 않은 이들에게 도전이 됩니다."
 pd_cold_superhabitable:0 "차가운 초거주 가능 세계"
 pd_cold_superhabitable_desc:0 "이 차가운 초거주 가능한 세계는 튼튼한 수권과 따뜻한 평균 기온, 얕은 해양 분지를 갖춘 최적의 농업 조건을 자랑합니다. 강한 중력은 익숙하지 않은 이들에게 도전이 됩니다."
 pd_gaia_superhabitable:0 "가이아 초거주 가능 세계"
 pd_gaia_superhabitable_desc:0 "이 훌륭하게 설계된 초거주 가능 세계는 질소-산소 대기와 회복력 있는 생태계를 갖추고 있어 다양한 생명체에 최적의 조건을 제공합니다. 따뜻한 기온과 얕은 해양 분지가 이 세계의 풍경을 특징짓지만, 강한 중력은 익숙하지 않은 이들에게 도전이 됩니다."
 pd_arcology_superhabitable:0 "초거주 가능 아르콜로지"
 pd_arcology_superhabitable_desc:0 "도시-산업 확장으로 완전히 뒤덮인 초거주 가능한 세계입니다. 이 행성은 평균 기온이 더 따뜻하지만, 강한 중력이 익숙하지 않은 이들에게 도전 과제가 됩니다."
 pd_nuked_superhabitable:0 "핵폭발로 파괴된 초거주 가능 세계"
 pd_nuked_superhabitable_desc:0 "이 초거주 가능한 세계는 핵 겨울을 겪고 있으며, 대기 중에는 두꺼운 그을음 에어로졸 층과 높은 방사선 수치가 표식을 새긴 자로 나타납니다. 최소한의 생명체의 흔적이 남아 있으며, 강한 중력은 익숙하지 않은 자들에게 도전이 됩니다."
 pd_wet_tidally_locked:0 "태양면 세계"
 pd_wet_tidally_locked_desc:0 "이 습한, 조석 고정된 세계는 지속적인 햇빛과 강인한 바람으로 풍부한 에너지 기회를 제공합니다. 행성의 온도와 안정적인 수계는 낮과 황혼 지역에서 풍부한 생물 다양성을 허용합니다."
 pd_dry_tidally_locked:0 "황혼의 세계"
 pd_dry_tidally_locked_desc:0 "이 건조하고 조석 고정된 세계는 지속적인 햇빛과 강인한 바람으로 풍부한 에너지 기회를 제공합니다. 거주 가능한 지역은 황혼 지역으로 제한됩니다."
 pd_cold_tidally_locked:0 "눈알 세계"
 pd_cold_tidally_locked_desc:0 "이 차가운 조석 고정 세계는 지속적인 햇빛과 강인한 바람으로 풍부한 에너지 기회를 제공합니다. 거주 가능한 영역은 낮 쪽 지역으로 제한됩니다."
 pd_gaia_tidally_locked:0 "가이아 조석 고정 세계"
 pd_gaia_tidally_locked_desc:0 "조화롭게 생성된 조석 고정 세계는 질소-산소 대기와 회복력 있는 생태계를 가지고 있습니다. 알려진 모든 고등 생명체에게 최적의 조건은 제한된 거주 가능한 황혼 지역에 존재합니다."
 pd_arcology_tidally_locked:0 "조석 고정 아르콜로지"
 pd_arcology_tidally_locked_desc:0 "조수 고정된 세계로, 도시-산업 확장이 완전히 뒤덮인 상태입니다. 거주 가능한 지역은 황혼 지역으로 제한됩니다."
 pd_nuked_tidally_locked:0 "핵폭발로 조석 고정된 세계"
 pd_nuked_tidally_locked_desc:0 "이 조석 고정된 세계는 핵 겨울을 겪고 있으며, 이는 밀집한 그을음 에어로졸 층과 높은 대기 방사선 수준으로 특징지어집니다. 생명의 징후는 최소화되어 있으며, 거주 가능한 지역은 황혼 지역으로 제한됩니다."
 pd_wet_cave:0 "석회암 동굴 세계"
 pd_wet_cave_desc:0 "이 행성은 습한 기후를 가진 행성 전체에 걸친 지하 동굴 네트워크를 자랑합니다. 지하 시설을 건설하는 데 비용이 많이 들지만, 방어 가능한 식민지를 제공합니다."
 pd_dry_cave:0 "사암 동굴 세계"
 pd_dry_cave_desc:0 "이 행성은 건조한 기후를 가진 행성 전역의 지하 동굴 네트워크를 자랑합니다. 지하 시설을 건설하는 데 비용이 많이 들지만, 방어 가능한 식민지를 제공합니다."
 pd_cold_cave:0 "얼음 동굴 세계"
 pd_cold_cave_desc:0 "이 행성은 차가운 기후를 가진 행성 전체에 걸친 지하 동굴 네트워크를 자랑합니다. 지하 시설을 건설하는 데 비용이 많이 들지만, 방어 가능한 식민지를 제공합니다."
 pd_gaia_cave:0 "가이아 동굴 세계"
 pd_gaia_cave_desc:0 "질소-산소 대기와 회복력 있는 생태계를 갖춘 이상적으로 조성된 동굴 세계입니다. 다양한 위도에서 알려진 모든 고등 생명체에 최적의 조건을 제공합니다. 지하 시설 건설은 비용이 많이 들지만 방어 가능한 식민지를 제공합니다."
 pd_arcology_cave:0 "동굴 아르콜로지"
 pd_arcology_cave_desc:0 "도시-산업 확장이 완전히 뒤덮인 동굴 세계입니다. 지하 시설을 건설하는 것은 비용이 많이 들지만, 방어 가능한 식민지를 제공합니다."
 pd_nuked_cave:0 "핵폭발 동굴 세계"
 pd_nuked_cave_desc:0 "이 동굴 세계는 핵 겨울을 겪고 있으며, 대기 중에는 두꺼운 그을음 에어로졸 층이 형성되어 있습니다. 높은 방사선 수치. 생명의 징후는 거의 없습니다."
 pd_gaia_world:0 "가이아 행성"
 pd_gaia_world_desc:0 "질소-산소 대기를 가진 이상적으로 조성된 습기 있는 세계로, 회복력 있는 생태계를 갖추고 있습니다. 다양한 위도에서 알려진 모든 고등 생명체에 최적의 조건을 제공합니다."
 pd_dry_gaia_world:0 "건조 가이아 행성"
 pd_dry_gaia_world_desc:0 "질소-산소 대기를 가진 이상적으로 생성된 건조 세계와 회복력 있는 생태계입니다. 다양한 위도에서 알려진 모든 고등 생명체에 최적의 조건을 제공합니다."
 pd_cold_gaia_world:0 "얼어붙은 가이아 행성"
 pd_cold_gaia_world_desc:0 "질소-산소 대기와 회복력 있는 생태계를 갖춘 이상적으로 조성된 얼음 행성입니다. 다양한 위도에서 알려진 모든 고등 생명체에 최적의 조건을 제공합니다."
 pd_uncommon_gaia_world:0 "가이아 행성"
 pd_uncommon_gaia_world_desc:0 "질소-산소 대기와 탄력적인 생태계를 갖춘 이상적으로 만들어진 습윤 세계입니다. 다양한 위도에서 모든 알려진 고등 생명체에 최적의 조건을 제공합니다."
 pc_pd_nuked_arcology:0 "핵폭탄 맞은 유물 행성"
 pc_pd_nuked_arcology_desc:0 "한때 이 세계 전역에 걸쳐 도시가 펼쳐져 있었습니다. 현재는 핵 겨울을 겪고 있으며, 대기 중에는 두꺼운 그을음 에어로졸 층이 형성되어 있습니다. 표면 방사선 수치가 높고, 생명체의 흔적은 거의 없습니다."
 pc_pd_nuked_arcology_tooltip:0 "거주 가능성: §R-100%§!\n거주 가능성: §G+100%§! §Y$trait_pc_nuked_preference$§! 또는 §Y$trait_survivor$§! 특성을 가진 경우"
 pd_diamond:0 "다이아몬드 세계"
 pd_diamond_desc:0 "높은 온도와 행성 압력으로 인해 이 세계의 대부분이 다이아몬드로 변형되었습니다."
 pd_carbon:0 "탄소 세계"
 pd_carbon_desc:0 "대부분의 실리콘-산소 화합물 기반 세계와 달리, 이 세계는 탄소와 산소의 비율이 상당히 높습니다."
 pd_chthonian:0 "지하 세계"
 pd_chthonian_desc:0 "이 행성은 한때 거대 가스 행성이었으나, 항성 바람에 의해 수소와 헬륨 대기가 제거되어 황량한 금속 핵만 남아 있습니다."
 pd_iron:0 "철의 세계"
 pd_iron_desc:0 "이 행성은 주로 철이 풍부한 핵으로 구성되어 있으며, 맨틀이 거의 없거나 전혀 없습니다."
 pd_volcano:0 "화산 세계"
 pd_volcano_desc:0 "이 행성은 높은 지질 활동으로 인해 지속적인 화산 폭발을 경험하며, 황 기둥이 표면 위 500km 높이까지 달합니다."
 pd_hydrocarbon:0 "탄화수소 세계"
 pd_hydrocarbon_desc:0 "이 행성은 질소와 메탄으로 구성된 조밀하고 불투명한 대기를 가지고 있으며, 에탄 구름과 안정적인 액체 탄화수소 덩어리가 특징입니다."
 pd_hot_gas_giant:0 "뜨거운 거대 가스 행성"
 pd_hot_gas_giant_desc:0 "이 거대 가스 행성은 평균보다 상당히 높은 온도를 경험하며, 에너지 및 희귀 가스 수집을 위한 활용 가능한 기상 패턴을 제공합니다."
 pd_cloudless_gas_giant:0 "구름 없는 거대 가스 행성"
 pd_cloudless_gas_giant_desc:0 "이 가스 행성은 대기 중에 전 지구적인 구름 덮개를 형성하는 데 필요한 화학 물질이 부족하여 궤도에서 볼 때 특징 없는 모습을 보여줍니다."
 pd_cold_gas_giant:0 "차가운 거대 가스 행성"
 pd_cold_gas_giant_desc:0 "거대 가스 행성의 낮은 온도와 안정적인 바람은 탐사를 위한 연구 기회를 제공합니다."
 pd_ethane_ocean:0 "에탄 해양 행성"
 pd_ethane_ocean_desc:0 "이 세계는 액체 탄화수소 에탄 바다로 덮여 있습니다."
 pd_dwarf_gas:0 "가스 난쟁이 세계"
 pd_dwarf_gas_desc:0 "이 행성은 밀집한 수소-헬륨 대기를 특징으로 하며, 깊은 얼음, 암석 층과 액체 상태의 물 및 암모니아 바다를 가지고 있습니다."
 pd_subglacial:0 "빙하 아래 세계"
 pd_subglacial_desc:0 "행성의 두꺼운 영구 얼음층, 낮은 온도, 그리고 얇은 대기는 표면 생명체의 존재를 불가능하게 만듭니다. 그러나 조수 열과 지열 활동이 고체 얼음 아래에 해양을 형성합니다."
 pd_hothouse:0 "온실 세계"
 pd_hothouse_desc:0 "현재 runaway 온실 효과를 겪고 있는 암석 행성입니다. 모든 생명체에 치명적입니다."
 decision_engineered_environment_gaia:0 "행성 조형가 프로젝트"
 decision_engineered_environment_gaia_desc:0 "우리는 고급 테라포밍 기술을 사용하여 이 세계를 천국으로 만들고, 모든 알려진 고등 생명체에 최적의 조건을 제공할 것입니다."
 engineered_environment_gaia:0 "완벽하게 조형된 세계"
 engineered_environment_gaia_desc:0 "고급 테라포밍 기술이 이 세계를 형성하였으며, 이제 그 생태계는 알려진 모든 고등 생명체에 최적의 조건을 갖추고 있습니다."
