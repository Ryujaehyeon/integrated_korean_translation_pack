l_korean:
 leader_trait_supporting_voter_tt:0 "$t$- 통과된 결의안을 지지하면 제안국과의 §Y호의§! 1 및 §Y신뢰§! 5를 얻습니다"
 observation.4.a.tt:0 "$regress_to_age_tt$"
 observation.1004.desc:0 "[pre_ftl_planet.GetName]에서 처음 확인했던 과학자는 뛰어난 인재로 성장했습니다. [abducted_scientist.GetHisHerCap] 독창적인 연구와 예리한 분석적 사고는 [pre_ftl_country.GetName]의 기술 발전을 빠르게 가속했습니다."
 observation.1205.desc:0 "[pre_ftl_planet.GetName]의 [pre_ftl_country.GetSpeciesName]은 우리가 남겨둔 신경 삽입물에 대해 자체 연구를 수행했습니다. 놀랍게도 [GetPreFTLLower] 연구자들은 우리가 가능했던 것보다 [pre_ftl_country.GetSpeciesName] 생물학에 훨씬 더 적합한 사이버네틱스를 설계해냈습니다."
 observation.3131.desc:0 "[prelude_to_war_planet.GetName]의 핵심 인물을 우리 측 대역으로 교체하려던 시도는 참담하게 실패했습니다. 우리 요원들은 발각되었고, 이어진 총격전에서 사망하지 않은 이들은 지시에 따라 포획을 피하기 위해 자결했습니다.\n\n그들이 대체하려 했던 지도자는 이 사건을 경쟁 국가의 소행으로 돌렸습니다. [prelude_to_war_planet.GetPlanetMoon]의 국제 긴장이 고조되고 있으며, 여러 국가는 군사 대비 태세를 높였습니다. 우리의 침투 조직은 상황을 완화하기 위한 전 세계적 선전전을 준비했지만, 그 노력을 조율하려면 궤도상의 과학선이 필요합니다."
 fircon.1291.desc:0 "안타깝게도 §Y[FromFromFrom.Owner.Capital.GetName]§!의 주민들은 자신들의 새 성도가 누구 덕분인지 알지 못했기 때문에, 우리의 노력을 단순한 훼손 행위로 치부했습니다. 동굴 주변의 보안은 강화되었고, 지배 엘리트는 새로운 자기표현 방식에 적대적으로 변했습니다...\n\n긍정적인 면을 보자면, 우리의 개입이 완전히 시간 낭비였던 것은 아닙니다. 이 사건에 대한 그들의 반응은 문화 연구 측면에서 매우 흥미로운 자료가 되었습니다."
 preftl.2049.desc:0 "[Target.GetName]의 상황이 급변하면서 진행 중인 역병을 계속 감시하는 것이 불가능해졌습니다. 당분간 이 행성의 모든 연구 프로젝트는 보류되어야 합니다."
 fircon.1330.desc:0 "§Y[From.Owner.Capital.GetName]§!의 사회는 풍부한 문화와 예술에 대한 깊은 이해 속에서 꽃피고 있습니다. 주민들은 무기를 내려놓고 필기구를 들고 있습니다. 갈등을 넘어 배우고 탐구하려는 이 새로운 의지를 보며, 우리는 [pre_ftl_planet.GetPlanetHabitat]에서 황금기의 여명을 목격하고 있는지도 모릅니다"
 fircon.1390.desc:0 "§Y[FromFrom.Owner.Capital.GetName]§!의 세계 지도자들을 그들 자신의 판단에 맡기기로 한 이상, 이제 그들은 자신들의 운명에 전적으로 책임을 져야 합니다. 안타깝게도 그들은 전쟁으로 향하고 있는 듯합니다.\n\n화해할 수 없다고 여겨지는 차이로 인해 [pre_ftl_planet.GetPlanetHabitat]의 문화 집단들은 서로를 향해 무기를 들었습니다. 다가오는 분쟁은 그들의 발전에서 어두운 시기를 의미합니다."
 fircon.1395.desc:0 "§Y[FromFromFrom.Owner.Capital.GetName]§!의 지도자들은 우리의 조언을 받아들여 무기를 내려놓았습니다. 평화가 지속될지는 알 수 없지만, 적어도 지금 당장은 그들이 자신들의 [pre_ftl_planet.GetPlanetHabitat] 표면에서 스스로를 지워버릴 가능성은 낮아 보입니다."
 fircon.1400.desc:0 "우리의 개입은 §Y[FromFromFrom.Owner.Capital.GetName]§!에서 속담 속 불에 기름을 부은 셈이 되었을지도 모릅니다. 그들의 세계는 이제 전쟁 중입니다. 하지만 그들이 서로를 완전히 말살하지 않는다면, 이 상황에도 긍정적인 면이 있을 수 있습니다. [pre_ftl_planet.GetPlanetHabitat]에서 이루어지는 기술 발전은 놀라울 정도입니다.\n\n전투의 연기가 걷힌 뒤, 어쩌면 그들은 이 기술의 일부를 유용하게 활용할지도 모릅니다."
 fircon.1445.desc:0 "§Y[From.Owner.Capital.GetName]§!에서 전쟁이 발발했습니다. 최근 몇 년 동안 [pre_ftl_planet.GetPlanetHabitat]의 특정 파벌들은 생산 수단을 독점할 만큼 충분한 부를 축적했습니다. 이에 맞서 다른 이들이 커져 가는 불평등에 반란을 일으켰습니다. 이제 전면적인 계급 전쟁이 벌어졌습니다. §Y[From.Owner.Capital.GetName]§!에는 어두운 시기가 닥쳤으며, 그 결과는 오래 지속될 것입니다."
 fircon.1455.desc:0 "§Y[FromFromFrom.Owner.Capital.GetName]§!에서는 반대의 목소리가 강력한 엘리트에 의해 침묵당했습니다. 하지만 지금 우리가 개입한다면 분명 흐름을 바꿀 수 있습니다. [pre_ftl_planet.GetPlanetHabitat]에서의 우리의 존재는 남아 있는 저항 세력을 북돋울 수 있습니다."
 fircon.2011.avian.desc:0 "$fircon.2011.base.desc$\n\n우리가 수집하려던 날개 달린 표본들은 이 사고를 몹시 재미있어했습니다. 더 대담한 표본들은 단지 그 짜릿함을 맛보기 위해 우리 [GetIndividualNamePlural]을 쫓아다니며 자신들도 들어 올려 달라고 하기까지 했습니다."
 fires_of_industry_desc:0 "이 세계는 현지 산업 혁명 동안 심각하게 오염되었습니다."
 fircon.2545.desc:0 "[pre_ftl_planet.GetName]에서 우리가 관찰해 온 원시 군체가 진화에서 중대한 진전을 이루었습니다. [pre_ftl_planet.GetPlanetHabitat] 대부분의 지역에서는 소규모 개체 집단들이 작은 군체를 조직하기 시작했지만, 완전히 자율적이지는 않더라도 이 드론들은 지금까지 완성된 집단체에 필요한 응집력과 조율 능력이 부족했습니다.\n\n이 상황은 [pre_ftl_planet.GetPlanetHabitat]의 북부 지역에서 달라졌습니다. 한 개체가 주변 드론들을 예속하는 특이점의 중추로 보입니다. 이 '드론-프라임'은 현재 [pre_ftl_planet.GetPlanetHabitat]을 이동하고 있으며, 예속된 드론들을 이 세계의 낮은 기술 수준을 감안하면 거대한 규모의 정착지로 모이게 하고 있습니다. 그곳에서 드론들은 주택과 저장고를 짓고, 새로 도착한 이들을 수용하기 위해 식량 생산을 최대한 확장하는 데 집중하는 듯합니다. 그들에게 자율성은 사라졌고, 이제 남은 것은 오직 집단뿐입니다."
