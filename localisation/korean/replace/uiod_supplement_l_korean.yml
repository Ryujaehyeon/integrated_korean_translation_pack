l_korean:
 # UI Overhaul Dynamic(1623423360) 자체 키 한국어 보충
 UI_OVERHAUL_INFO: "모드 정보 창을 엽니다"
 UI_OVERHAUL_DONATE: "모드가 마음에 드셨다면 후원을 고려해 주세요! £energy£"
 UI_OVERHAUL_STEAM: "스팀 창작마당"
 UI_OVERHAUL_STEAM_TOOLTIP: "모드의 스팀 창작마당 페이지를 엽니다"
 UI_OVERHAUL_DISCORD: "디스코드 서버"
 UI_OVERHAUL_DISCORD_TOOLTIP: "모드의 디스코드 서버를 엽니다"
 UI_OVERHAUL_TEXT_TOP: "이 모드는 현재 스텔라리스 §H$UI_OVERHAUL_VERSION$§! 버전에 맞춰 갱신되어 있습니다. 별도 공지가 없는 한 이후 버그 수정 패치와도 호환됩니다."
 UI_OVERHAUL_TEXT_CENTER: "버그 제보, 비평, 질문은 디스코드 서버에서 받습니다. UI 변경에 대한 제안도 환영합니다."
 UI_OVERHAUL_TEXT_BOTTOM: "§H기가구조물 공학§!을 사용 중이라면 반드시 호환 패치를 함께 사용하세요. 없으면 EHOF를 쓸 수 없습니다.\n패치는 스팀 창작마당 페이지에서 찾을 수 있습니다."
 UI_OVERHAUL_TECHTREE: "기술 트리"
 UI_OVERHAUL_TECHTREE_TOOLTIP: "§H$UI_OVERHAUL_TECHTREE$§!\n§G클릭하면 외부 기술 트리를 엽니다.§!"
 UI_OVERHAUL_TECHTREE_TOOLTIP_DELAYED: "이 기술 트리는 §H패러독스 인터랙티브§!와 제휴·연관·공인된 것이 아닙니다.\nGitHub에서 §HBloodStainedCrow§!가 관리하는 팬 프로젝트입니다."
 UIO_ETHICS_ATTRACTION: "윤리관 성향"
 UIO_MOVE_TO_TOP: "§H맨 위§!\n목록의 맨 위로 이동합니다"
 UIO_MOVE_TO_BOTTOM: "§H맨 아래§!\n목록의 맨 아래로 이동합니다"
 UIO_MOVEABLE_WINDOW: "§H이 창은 옮길 수 있습니다§!\n마우스 왼쪽 버튼 £mouse1£ 을 누른 채 끌어서 이동하세요."
