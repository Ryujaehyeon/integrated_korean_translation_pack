l_korean:
 mem_kay_site_a:0 "비어 있는 성소"
 mem_kay_site_a_desc:0 "그리 멀지 않은 과거, 한 문명이 이 세계를 고향으로 삼았지만, 지금은 표면에 그들의 흔적이 거의 남아 있지 않습니다. 스캔 결과 유기체 물자와 융합된 거대한 터널 시리즈가 [planet.GetName]의 지각 깊숙이 뻗어 있는 것이 드러났습니다.\n\n우리는 터널 바닥에서 발생하는 리드미컬한 방사선의 맥동을 감지했습니다 - 마치 심장 박동을 연상시키는 것처럼요."
 r_mem_kay_site_a_thalamor_corpse:0 "탈라마르의 시체"
 r_mem_kay_site_a_thalamor_corpse_desc:0 "죽은 생명선의 거대한 회색 기관이 우리 위로 우뚝 솟아 있습니다. 우리가 이해하지 못하는 이유로, 탈라모르 근처에 있을 때 우리의 시민들은 이상하게도 진정되고 흥분된 기분을 느낍니다."
 r_mem_kay_site_a_thalamor_corpse_active_tt:0 "하나의 £decision£ §Y 행성 결정이 해제됩니다: §! ['concept_decision_mem_kay_site_a']"
 concept_decision_mem_kay_site_a:0 "$decision_mem_kay_site_a$"
 concept_decision_mem_kay_site_a_desc:0 "$decision_mem_kay_site_a_desc$\n§Y['modifier:mem_kay_site_a_planet_buff']§! 보정치가 추가되었습니다."
 MEM_KAY_SITE_A_PROJECT_1:0 "호박막을 뚫다"
 MEM_KAY_SITE_A_PROJECT_1_DESC:0 "막을 유지하는 것은 내구성이 매우 뛰어나며 모든 초기 천공 시도를 저항했습니다. 우리의 약속을 지키는 것은 간단한 일이 아닌 것 같습니다."
 decision_mem_kay_site_a:0 "시체 분쇄"
 decision_mem_kay_site_a_desc:0 "우리는 이 세계에 탈라모르의 작은 조각을 두어 그 효과가 우리의 식민지에 이롭게 하도록 할 것입니다."
 mem_kay_site_a_desecrated_sanctum:0 "더럽혀진 성소"
 mem_kay_site_a_desecrated_sanctum_desc:0 "고대 존재가 분노하였고, 그 결과 대기 중에 높은 양의 방사능을 방출하였습니다."
 mem_kay_site_a_planet_buff:0 "편안한 존재"
 mem_kay_site_a_planet_buff_desc:0 "이 세계의 모든 생물학적 거주자에게 진정시키는 존재가 영향을 미칩니다."
 mem_kay_site_a_thalamor_buff:0 "탈라마르의 진정하는 존재"
 leader_trait_mem_kay_thalamor_ward:0 "탈라마르의 수호자"
 leader_trait_mem_kay_thalamor_ward_desc:0 "이 지도자의 마음에는 잔존자의 지식과 개성이 남아 있습니다."
 mem_kay_elkivai_catchphrase:0 "이곳을 떠날 날이 기다려집니다!"
 mem_kay_elkivai_backstory:0 "그는 고대 생명선에 탑승하여 별들 사이를 여행하던 탐험가 그룹의 유일한 생존자입니다. 그들이 왜 그런지 알 수 없는 이유로, 그는 원주율에 의해 노예로 붙잡힌 채로 혼자 생존하며 원주율 사이에 고립되어 있었습니다."
 mem_kay_site_a_ward_leader_catchphrase:0 "나는 평생 이 날을 기다려왔습니다..."
 mem_kay_site_a_ward_leader_backstory:0 "어릴 적부터 탈라모르의 영향을 받아 [root.GetSheHe] [root.GetHasHave] 모든 [root.GetHerHis] 노력에서 성공의 축복을 받았습니다. [root.GetSheHeCap] 제국의 경계를 넘어 일상적인 삶을 초월한 모험과 경이를 추구합니다."
 mem_kay_site_a.1.name:0 "세상의 피부"
 mem_kay_site_a.1.desc:0 "터널의 벽은 살아있는 합금으로 구성되어 있으며, 이는 살과 금속 사이의 무언가로, 절단할 때 생화학적 잔여물을 분비합니다. 만져보면 따뜻한 느낌이 들고, 어떤 곳에서는 희미한 맥박을 느낄 수 있습니다. 일부 지역에서는 벽의 표면에 끔찍한 흉터가 있습니다. 탐사 팀장은 벽에 너무 가까이 다가가면 청각 환각을 경험하게 되며, 누군가의 속삭임 같은 목소리가 들리지만 단어를 알아듣기에는 너무 불분명하다고 언급합니다.\n\n우리의 고고학 팀은 벽의 흉터가 어떤 원시적이고 아마도 실패한 외과적 절차에서 비롯된 것이라고 결론지었습니다. 원래 벽 구조와 명백히 외부의 유기체 물자가 작은 패치로 추가되었습니다. 이러한 절차의 이유는 여전히 불분명합니다."
 mem_kay_site_a.1.a:0 "조사를 위해 조직 샘플을 수집합니다."
 mem_kay_site_a.1.b:0 "속삭임을 해독해 보세요."
 mem_kay_site_a.2.name:0 "두뇌 성당"
 mem_kay_site_a.2.desc:0 "우리 팀이 도달한 첫 번째 내부 공간은 숭배의 흔적으로 가득 차 있습니다. 뼈와 힘줄로 만들어진 벤치와 제단이 있으며, 한쪽에는 인간형 형체가 들어 있는 여러 개의 손상된 의료 동결 포드가 있습니다. 제단을 자세히 살펴보면 외계 문자가 보이고, 동결 포드를 조사해보면 거주자들이 잠자는 중에 살해당했음을 알 수 있습니다. 동결 포드는 찢겨져 있었고, 내부의 인간형들은 모두 목이 베어 있었습니다.\n\n손상된 포드에서 채취한 조직 샘플과 인간형 유해는 범인이 암석류 기원일 가능성이 높음을 나타내지만, 이 사건 외에는 지금까지 이 터널이나 이 세계에서 암석류 생명체의 흔적을 발견하지 못했습니다. 이상하게도, 인간형의 살점의 큰 조각들이 그들의 죽음보다 훨씬 이전에 외과적으로 제거된 것으로 보입니다. 이전에 채취한 샘플과의 교차 참조 결과, 이들이 이상한 벽 패치의 원인임을 밝혀냈습니다."
 mem_kay_site_a.2.a:0 "외계 문서를 연구합니다."
 mem_kay_site_a.2.b:0 "휴머노이드 표본을 해부합니다."
 mem_kay_site_a.3.name:0 "파괴된 건축가들"
 mem_kay_site_a.3.desc:0 "더 깊은 터널 네트워크 안에서 우리 팀은 더 많은 인간형 유해가 있는 또 다른 방에 도달했습니다. 아니, 적어도 그들의 남은 부분이죠. 그들이 한때 생물체였다는 것은 알 수 있지만, 그들의 주요 장기는 모두 외과적으로 제거되고 기계로 대체되었습니다. 이 사이버네틱 인간형들은 그 상태로 보아 강한 힘에 의해 조각조각 찢겨졌습니다.\n\n이 학살이 꽤 오래전에 일어난 일임에도 불구하고, 우리 팀은 주변 대기에서 희귀 기체의 농도가 높아졌다고 보고하며, 이는 의심되는 암석류 공격자와 연관이 있습니다. 그들은 분명히 가까워지고 있습니다.\n\n또한, 이 방의 벽을 따라 있는 흉터는 상당히 더 자주 발견되지만, 탐사 리더는 일부 살이 벽에서 제거되었고 이식되지 않았다고 언급합니다."
 mem_kay_site_a.3.a:0 "주변을 물러나서 조사합니다."
 mem_kay_site_a.3.b:0 "더 진행합니다."
 mem_kay_site_a.4.name:0 "심장의 동굴"
 mem_kay_site_a.4.desc:0 "동굴은 맥박치는 붉은 빛의 cavern에서 끝납니다. 동굴의 중앙에는 호박색 막에 매달린 거대한 심장이 있습니다. 빈 속이 있는 촉수들이 막에서 사방으로 뻗어 나가며, 표면 쪽으로 더 작은 터널을 파고 있습니다.\n\n우리 팀이 심장에 접근하자, 갑작스러운 분위기의 변화가 느껴졌고, 거대한 전자기 펄스가 동굴을 휩쓸었습니다. 우리의 과학자들로부터의 비디오 피드는 어두워졌고, 모든 통신이 끊겼습니다."
 mem_kay_site_a.5.name:0 "탈라모르가 말하다"
 mem_kay_site_a.5.desc:0 "우리는 고고학 팀과의 통신을 복원했지만, 그들은 설명할 수 없이 다르게 보이고 들립니다. 그들은 자신들이 “탈라모르”라고 부르는 거대한 지능형 기관과 소통했다고 주장합니다. 그것은 심장과 뇌의 역할을 동시에 하는 기관입니다.\n\n우리 과학자들에 따르면, 탈라모르는 한때 우주를 항해하던 거대 생물의 일부로, 탐험가를 위한 생체선으로 기능했으며 [event_target:mem_kay_site_a_planet.GetName]의 사람들에 의해 숭배되었습니다. 생체선이 우주 잔해로부터 피해를 입은 후 그들의 세계에 불시착했을 때, 그들은 거대 생물의 주요 기관을 수확하고 이상한 막 속에 깊이 묻었습니다.\n\n그들은 알지 못했습니다. 그 기관, 즉 탈라모르는 여전히 살아 있었고, 주요 몸체와 연결이 끊긴 후에도 몇 년에 한 번씩만 뛰었습니다. 탈라모르는 무력하고 갇혀 있으며 두려움을 느꼈고, 그래서 [event_target:mem_kay_site_a_planet.GetName]의 지각을 뚫고 표면에 도달하기 위해 점차 속이 비어가는 팔다리를 키웠습니다. 안타깝게도 원주민들은 이를 탈라모르를 숭배하라는 신호로 받아들였고, 그들은 터널 안에 거대한 방을 만들기 위해 자신의 신체 일부를 희생하기 시작했습니다. 이 지하 거대 구조물의 이름은 "비어 있는 성소"로 지어졌습니다.\n\n탈라모르는 각 맥박마다 방사선을 서서히 방출합니다. 수세기 동안, 그것은 [event_target:mem_kay_site_a_planet.GetName]의 사람들이 방사선 중독으로 점점 더 아프게 되면서 행성의 표면에 점점 더 가까워졌습니다. 그들은 사이버네틱 임플란트를 통해 이 발전에 맞서려 했지만 실패했고, 결국 성소를 돌보는 남은 존재는 몇 명 안 되었습니다. 그들은 결국 약 3천 년 전 우리의 도착 이전에 우리가 만난 암석류에 의해 죽임을 당했습니다.\n\n우리의 고고학 팀이 이전에 결론지은 바와 같이, 비어 있는 성소의 벽을 따라 있는 흉터는 탈라모르를 숭배했던 이 인간형 존재들로부터 유래합니다. 그들은 자신의 종족의 구성원을 해부하여 살을 얻기 시작했고, 그 살을 성소의 벽에 이식하려고 시도했지만, 종교적 목적을 위해서였던 것으로 보입니다. 조직 샘플에 따르면, 이는 끔찍하게 실패했습니다."
 mem_kay_site_a.5.a:0 "타라모르와 소통을 시도합니다."
 mem_kay_site_a.5.b:0 "무언가 이상합니다. 저들은 우리의 과학자가 아닙니다. 군대를 보내십시오!"
 mem_kay_site_a.6.name:0 "광기의 시작"
 mem_kay_site_a.6.desc:0 "[leader.GetName]는 [leader.GetSheHe] [leader.GetIsAre]가 보이지 않는 힘에 의해 공격받는 끔찍하고 폭력적인 악몽을 보고합니다. 이러한 보고서와 다른 증상, 그리고 승무원들이 보고한 이상 행동으로 미루어 보아, [leader.GetName]이 점차 광기의 심연으로 빠져들고 있는 것 같습니다. 우리의 고고학 팀은 지난 한 시간 동안 [leader.GetSheHe] [leader.GetWasWere]가 바닥에 공처럼 웅크리고, 벽 옆에서 “탈라모르”라는 구절을 반복해서 중얼거리고 있다고 보고했습니다. 끌려 나올 때, [leader.getSheHe]은 [leader.getSheHe]이 벽의 소리를 들어야 한다고 계속 주장했습니다."
 mem_kay_site_a.6.a:0 "[leader.getSheHeCap]은 시간이 지나면 회복될 것입니다."
 mem_kay_site_a.6.b:0 "약물은 [leader.GetHerHim]이(가) 대처하는 데 도움이 될 것입니다."
 mem_kay_site_a.6.c:0 "[leader.GetName] 의무 치료를 지정하되 [leader.GetHerHim]은 현장에 유지합니다."
 mem_kay_site_a.7.name:0 "정상으로의 복귀"
 mem_kay_site_a.7.desc:0 "[root.GetName]가 [root.GetSheHe] [root.GetIsAre] 더 이상 악몽을 꾸거나 속삭임을 듣지 않고 있으며, [root.GetSheHe] [root.GetHasHave] [root.GetHerHis] 치료사에 의해 복귀가 허가되었습니다."
 mem_kay_site_a.7.a:0 "편안한 안도감입니다."
 mem_kay_site_a.8.name:0 "야생 과학자"
 mem_kay_site_a.8.desc:0 "가장 나쁜 상황이 발생했습니다. [root.GetName]는 모든 이성을 잃었고, 우리의 고고학 팀도 빠르게 뒤따랐습니다. 우리는 홀로우 성전이 우리의 과학자들을 미치게 하는 이유를 완전히 이해하지 못하지만, 그것이 분명한 근본 원인임은 확실합니다."
 mem_kay_site_a.8.a:0 "여기서 일어난 일은 다시는, 그리고 결코 일어나지 않을 것입니다."
 mem_kay_site_a.8.b:0 "비극이지만, 우리는 인내해야 합니다."
 mem_kay_site_a.9.name:0 "벽에서 들려오는 속삭임"
 mem_kay_site_a.9.desc:0 "우리가 [event_target:mem_kay_site_a_planet.GetName]에서 헐로우 생츄럼 고고학 유적을 발굴하는 동안, 우리의 과학자 [leader.GetName]이 갑자기 공중에 떠올랐습니다.\n\n§W"K-죽여… 줘…"§!\n\n[leader.GetSheHeCap] 신음 소리. §W"제발!"§!\n\n[leader.GetSheHeCap]는 사건에 대한 기억 없이 생츄럼 바닥에 가볍게 다시 내려앉습니다."
 mem_kay_site_a.9.a:0 "그것은... 불안했습니다."
 mem_kay_site_a.10.name:0 "암석류 야수"
 mem_kay_site_a.10.desc:0 "경계를 수색하는 동안, 우리의 정찰 팀이 암석류 짐승을 발견했습니다! 아직 우리를 알아차리지 못했습니다. 꽤 크고, 분명히 강인하며, 날카로운 발톱을 가지고 있습니다. 우리의 관찰에 따르면, 이 짐승은 아마도 지능이 있을 것입니다."
 mem_kay_site_a.10.a:0 "소통을 시도합니다."
 mem_kay_site_a.10.b:0 "아마 우리가 그것을 이해하고, 친구가 될 수 있을까요?"
 mem_kay_site_a.10.c:0 "짐승을 처치하십시오."
 mem_kay_site_a.11.name:0 "야수의 공격!"
 mem_kay_site_a.11.desc:0 "우리 팀은 그것을 전혀 예상하지 못했습니다.\n\n어둠 속에서, 암석류 괴수가 [leader.GetName]에 덮쳐 [leader.GetHerHim]을 즉시 죽였습니다. 그러나 갑작스러운 공격 이후 우리의 보안 요원들은 신속하게 대응하여 괴수를 포획하는 데 성공했습니다. 이제 그것에 대한 우리의 결정이 필요합니다."
 mem_kay_site_a.11.a:0 "짐승을 처치하십시오."
 mem_kay_site_a.11.b:0 "이 짐승은 죽음보다 더 끔찍한 운명을 겪게 될 것입니다."
 mem_kay_site_a.11.c:0 "통신을 시작합니다."
 mem_kay_site_a.11.d:0 "배신자를 처치하라!"
 mem_kay_site_a.11.e:0 "우리 탐사의 시작에서 예언된 대로..."
 mem_kay_site_a.11.f:0 "그것은 꽤 강인해 보입니다. 어쩌면 유용할 수 있을지도 모릅니다…"
 mem_kay_site_a.11.g:0 "그저 사고일 뿐입니다... 이제 그 짐승에게로 가야 합니다..."
 NAME_Elkivai:0 "엘키바이"
 NAME_Kelvar:0 "켈바르"
 mod_job_ship_weapons_officer_add:0 "무기 장교\" # 나는 할 수 없어, 이게 왜 존재하는 거지"
 mem_kay_site_a.12.desc:0 "§H우리가 통통한 암석류 짐승에 접근 방식할 때, 그것은 우리의 존재에 으르렁거립니다. 이제 가까이에서 보니, 그것이 매우 두려워하고 있다는 것을 알 수 있습니다.§!\n\n물러서! 나는 물어버릴 거야!"
 mem_kay_site_a.12.a:0 "당신은 우리의 과학자를 죽였습니다!"
 mem_kay_site_a.12.a.response:0 "오… 죄송합니다… 저는 그것이 악한 금속-살덩이 생물 중 하나인 줄 알았습니다. 그들이 저를 다치게 했습니다. 다시 다치고 싶지 않았습니다."
 mem_kay_site_a.12.b:0 "어디서 오셨나요?"
 mem_kay_site_a.12.b.response:0 "내 부모님은 위대한 임무를 수행하는 탐험가였습니다; 그 당시 저는 아직 아이였고, 제가 기억하는 것은 그들이 어떤 신의 조각을 찾고 있었다는 것입니다. 우리는 타라모르라는 거대한 생체 우주선에 탑승하여 여행했습니다. 그것은 사이오닉적으로 우리와 연결되어 있었습니다. 그것은 우리와 대화하고, 우리와 유대감을 형성했습니다; 사실상 제 선생님이자, 유모이자, 관리인이었습니다; 그러나 어느 날, 우리는 갑자기 이 끔찍한 세계에 불시착하게 되었습니다. 저를 제외하고는 아무도 살아남지 못했고, 제가 살아남은 이유는 우리 배가 사이오닉 능력으로 저를 보호했기 때문입니다. 그 이후의 모든 것은 흐릿합니다. 원주율들이 나타났습니다. 그들은 잔해를 수색하고 저를 노예로 데려갔습니다."
 mem_kay_site_a.12.c:0 "어떻게 그렇게 오랫동안 살아남으셨나요?"
 mem_kay_site_a.12.c.response:0 "나는 내 속박에서 탈출하여 내 포로들을 죽였지만, 그것은 수천 년 전의 일입니다. 대부분은 흐릿하게 기억납니다. 생존하기 위해 부끄러운 짓을 했습니다… 심지어 벽을 먹기도 했습니다. 하지만 대부분의 시간 동안 나는 겨울잠을 잤습니다..."
 mem_kay_site_a.12.d:0 "당신은 4천 년이 넘었나요?"
 mem_kay_site_a.12.d.response:0 "저는 그렇습니다. 저희 종족은 발전 속도가 상당히 느리지만 대략 5천 년을 삽니다. 우리는 거의 500년을 유아기로 보냅니다."
 mem_kay_site_a.12.e:0 "우리는 당신에게 무엇을 할 수 있습니까?"
 mem_kay_site_a.12.e.response:0 "나는 강력한 전사입니다! §H...그가 자랑스럽게 포효합니다.§!\n\n나는 항상 전투에 군대를 이끌고 싶었습니다. 당신이 허락한다면, 나는 당신을 위해 명예롭게 싸울 것입니다. 나는 당신의 적을 파괴할 것입니다!"
 mem_kay_site_a.12.f:0 "우리와 함께 하시겠습니까?"
 mem_kay_site_a.12.f.response:0 "나는… §H그가 눈물을 흘리기 시작하자,§! 나는 너무 외롭습니다. 다른 생명체를 본 지 수천 년이 지났습니다. 다시 친구들과 함께하는 것, 나를 해치고 싶지 않은 친구들과 함께하는 것… 그것이 내가 원하는 전부입니다..."
 mem_kay_site_a.12.g:0 "이 장소에 대해 무엇을 말씀해 주실 수 있습니까?"
 mem_kay_site_a.12.g.response:0 "§H엘키바이가 고개를 기울입니다.§! 정확히 설명할 수는 없지만… 이 터널들은 마음을 편안하게 해줍니다. 수십 년마다 한 번씩 저에게 이야기합니다; 모든 것이 괜찮을 것이라고, 그리고 제가 사랑받고 있다고 말해줍니다. 아마도 저를 여기로 데려온 생체 우주선이 이 성소의 일부인 것 같습니다."
 mem_kay_site_a.13.desc:0 "§H탈라마르는 우리의 과학자를 통해 말하며, 그들의 눈은 붉게 빛나고 성소의 땅에서 떠오릅니다.\n\n조용하고 패배한 어조로 우리에게 이야기합니다.§!\n\n제발. 제 고통을 끝내 주세요."
 mem_kay_site_a.13.a:0 "당신은 왜 우리가 당신의 생명을 끝내기를 원합니까?"
 mem_kay_site_a.13.a.response:0 "§H우리 과학자의 뺨에 눈물이 흐르며 탈라모르가 [event_target:mem_kay_site_a_leader.GetHerHim]을 통해 이야기합니다.§!\n\n당신은 수천 년을 살아야 하지만 움직일 수 없고, 거의 행동할 수 없으며, 당신이 통제할 수 없는 미친 자들에 의해 숭배받는 것이 어떤 것인지 아십니까? 그리고 그 후의 침묵과 고립... 저는 당신에게 제 요청을 이해하라고 요구하지 않습니다. 단지 이행해 주시길 바랍니다."
 mem_kay_site_a.13.b:0 "당신은 어떻게 살아있고, 우리는 어떻게 소통하고 있습니까?"
 mem_kay_site_a.13.b.response:0 "나는 이 세계에 떨어지기 전부터 이미 사라져가는 종족의 마지막이었습니다. 그 종족은 너무 오래된 문명에 의해 길러졌고, 그 이름조차 잊어버렸습니다. 나는 수세기 동안 별들을 떠돌며 다양한 여행자들과 공존했습니다. 내 종족은 많은 독특한 특성을 지니고 있었습니다. 우리는 마음속으로 손을 뻗어 그들을 통해 말할 수 있었습니다. 당신은 이를 어떤 종류의 사이오닉 연결이라고 부를 것입니다, 아마도. 이것이 내 종족이 그들의 여행 동료와 유대감을 형성한 방식입니다..."
 mem_kay_site_a.13.c:0 "우리가 참고할 만한 지혜가 있으신가요?"
 mem_kay_site_a.13.c.response:0 "나는 수천 년 동안 평화롭게 하늘을 떠돌며 탐험가들을 행성에서 행성으로 옮겼고, 많은 문명이 일어나고 사라지는 것을 보았지만, 결국… 어떤 무기나 힘도 희망이나 사랑만큼 강인하지는 않았다."
 mem_kay_site_a.13.d:0 "우리는 그렇게 하지 않을 것입니다."
 mem_kay_site_a.13.d.response:0 "§H우리 과학자가 섬뜩한 비명을 지릅니다...§!"
 mem_kay_site_a.13.e:0 "우리는 그렇지 않을 것입니다. 당신은 연구 대상으로서 매우 귀중합니다."
 mem_kay_site_a.13.e.response:0 "§H우리 과학자가 분노하며 으르렁거립니다.§!\n\n그렇다면 그렇게 하겠습니다."
 mem_kay_site_a.13.f:0 "아주 좋습니다. 우리는 귀하의 요청을 충족할 것입니다. 하지만 어떻게요?"
 mem_kay_site_a.13.f.response:0 "감사합니다.\n\n§H우리의 과학자 탈라모르를 통해 고통에서 벗어날 수 있다는 희망에 눈물을 흘립니다...§!\n\n나를 둘러싼 호박색 막이 나를 살리고 있습니다. 그것을 찌르면 나는 죽을 것입니다."
 mem_kay_site_a.14.name:0 "완료되었습니다."
 mem_kay_site_a.14.desc:0 "마침내 호박색 막을 뚫었습니다! 우리의 공학자들은 그것이 얼마나 내구성이 강한지에 꽤 놀랐지만, 안타깝게도 막이 만들어진 물질과의 장기 접촉은 [Root.Owner.GetSpeciesNamePlural]에게 전신 발진을 초래합니다. 그래서 앞으로의 프로젝트에서 이 물질을 활용하는 것은 그다지 가치가 없습니다.\n\n막이 파괴되자, 우리의 고고학 팀에 압도적인 평온함이 감돌았습니다. [Root.Leader.GetName]이 떠오르기 시작했고, 우리가 이해할 수 없는 언어로 자장가의 한 구절처럼 들리는 노래를 불렀습니다.\n\n§W"Kom kangon, to mik neshpa hish ngaosh."§!\n\n우리의 과학자는 탈라모르가 병든 회색으로 변하기 시작하자 천천히 땅으로 내려졌습니다."
 mem_kay_site_a.14.a:0 "평화를 찾을 수 있을까요."
 mem_kay_site_a.15.name:0 "화난 탈라모르"
 mem_kay_site_a.15.desc:0 "우리는 성급한 서두름으로 탈라모르를 화나게 했습니다. 갑자기 탈라모르의 터널과 내부 방들이 격렬하게 수축하기 시작하여 [Root.GetSpeciesNamePlural] 안에 있는 모든 것을 죽였습니다. 탈라모르가 방출한 방사능은 열 배로 증가하여 [event_target:mem_kay_site_a_planet.GetName]을 죽은 행성으로 빠르게 변형시켰습니다.\n\n탈라모르에게 무슨 일이 있었는지는 결코 알 수 없을 것입니다. 우리가 잘못 선택했나요? 더 나쁜 상황을 피했나요? 결코 답이 없는 질문들..."
 mem_kay_site_a.15.a:0 "하지만 기다려 주세요! 우리는 단지 친구가 되고 싶었을 뿐입니다!"
 mem_kay_site_a.15.b:0 "외계 쓰레기."
 mem_kay_site_a.15.c:0 "무슨 낭비인가."
 mem_kay_site_a.15.d:0 "우리가 마지막 웃음을 지을 것입니다!"
 mem_kay_site_a.15.e:0 "그것은 자신의 죄값을 치를 것입니다."
 mem_kay_site_a.16.name:0 "수호자 꿈"
 mem_kay_site_a.16.desc:0 "[Root.GetName]는 잦은 악몽에 시달리며, [Root.GetHerHis]의 꿈에 위안이 되는 존재가 나타났다고 보고합니다. [Root.GetSheHeCap]는 [Root.GetHerHis]가 어떻게든 탈라모르의 의식의 조각이 [Root.GetHerHim] 내에서 계속 살아있으며, [Root.GetHerHim]를 [Root.GetHerHis]의 꿈에서 지키고 있다고 믿고 있다고 전합니다."
 mem_kay_site_a.16.a:0 "탈라마르의 친절함이군요."
 mem_kay_site_a.16.b:0 "우리는 외계인의 침입이 우리의 정신에 들어오는 것을 용납하지 않을 것입니다!"
 mem_kay_site_a.16.c:0 "이것은 훌륭한 사례 연구가 될 것입니다!"
 mem_kay_site_a.16.e:0 "신명에 의해 탈라모르가 우리에게 보내졌음이 분명합니다."
 mem_kay_site_a.16.f:0 "이것은 주를 위한 [Root.GetName]의 생산성을 증가시킵니다."
 mem_kay_site_a.17.name:0 "네슈파 히시 나오시"
 mem_kay_site_a.17.desc:0 "[Root.GetName]는 [Root.GetHerHis]의 네 살짜리 아이에게 발생하는 호기심 많은 현상을 보고합니다. 가끔 잠을 잘 때, 아이는 "Kom kangon, to mik neshpa hish ngaosh"라는 구절을 속삭입니다; 이는 탈라모르의 마지막 말입니다. 이에 대해 질문을 받자, 아이는 탈라모르가 그 의미를 알려주었다고 주장합니다; 그것은 아이의 꿈을 지키고 해로움으로부터 안전하게 지켜줄 것이라고 합니다.\n\n탈라모르는 [Root.GetName]의 마음에만 머물지 않고, [Root.GetHerHis] 아이에게도 전해졌던 것 같습니다."
 mem_kay_site_a.17.a:0 "타라모르는 진정으로 자비로운 영혼입니다."
 mem_kay_site_a.17.b:0 "이 아이는 언젠가 우리 제국에 훌륭한 추가가 될 것입니다."
 mem_kay_site_a.17.c:0 "이것은 매혹적입니다!"
 mem_kay_site_a.17.d:0 "신의 작업에 대한 추가 증거입니다."
 mem_kay_site_a.18.name:0 "임무를 수행할 준비가 된 워드 보고서"
 mem_kay_site_a.18.desc:0 "[event_target:event_target:mem_kay_site_a_ward_leader.GetName]의 자녀인 [event_target:mem_kay_site_a_ward_leader.GetName]은 이제 성장하여 겨우 열여덟 살에 고대기술학 학위를 취득했습니다. [event_target:mem_kay_site_a_ward_leader.GetSheHe] [event_target:mem_kay_site_a_ward_leader.GetIsAre] 신동이며, [event_target:mem_kay_site_a_ward_leader.GetHerHis] 우리 위대한 국가의 과학자로서 [event_target:mem_kay_site_a_ward_leader.GetHerHis] 부모의 길을 따르고 싶다는 의사를 밝혔습니다."
 mem_kay_site_a.18.a.tt:0 "[event_target:mem_kay_site_a_ward_leader.GetName]이(가) 우리의 서비스에 들어옵니다."
