l_korean:
 extreme_frontiers.250.desc:0 "§Y[from.GetName]§!의 형광 강을 분석한 결과, 이곳이 독특한 미생물 종의 서식지라는 사실이 밝혀졌습니다.\n\n이 생물들은 화학 합성을 이용해 유해 화합물을 대사하고, 그 과정에서 강의 화학 조성을 바꾸는 반응성 높은 부산물을 생성하여 극적인 색 변화가 일어납니다.\n\n이들이 만들어내는 선명한 네온빛은 의사소통 수단을 겸하며, 행성의 독성 하천을 따라 이동하면서 번식 가능 상태를 알리고 짝을 끌어들이는 데 사용됩니다.\n\n이 생물과 그 생활사를 계속 연구하면 우리의 [Root.controller.GetResearcherPlural_lower]에게 흥미로운 연구 기회가 될 것입니다."
