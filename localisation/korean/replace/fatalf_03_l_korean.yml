l_korean:
 fatalf_site.001.title:0 "육체의 시험 완료"
 fatalf_site.001.desc:0 "입구 바로 안쪽의 방을 조사한 결과, 길이 나선형으로 몇 마일이나 아래로 이어진다는 사실이 밝혀졌습니다. 벽의 구멍에는 선로 위의 누구에게든 고출력 탄환을 발사하는 작은 기계들이 드러나 있습니다.\n선로는 여섯 개의 레버가 달린 거대한 금속문에서 끝나며, 통과하는 유일한 방법은 엄청난 힘으로 모든 레버를 동시에 당기는 것입니다.\n다음 방에는 또 하나의 석판이 있습니다. §M정신 시험§!."
 fatalf_site.002.title:0 "정신의 시험 완료"
 fatalf_site.002.desc:0 "추가 탐사 결과, 시야에서 벗어나면 벽이 끊임없이 움직이는 뒤틀린 미궁이 드러났습니다. 내부의 복도는 두 사람이 함께 서 있기에도 간신히 충분할 정도입니다.\n이 벽들은 때때로 빠르고 무작위처럼 보이는 패턴으로 빛납니다. 결국 우리 과학자는 그 패턴이 미궁의 4차원 표현과 관련되어 있음을 알아내고, 컴퓨터를 사용해 통과 경로를 찾았습니다.\n또한 미궁의 온도를 빠르게 견딜 수 없는 수준까지 높이도록 설계된 듯한 여러 가열 장치도 발견했습니다.\n출구와 함께 남은 것은 §M모브럽 시험§!이라고 적힌 석판뿐입니다.\n그게 무슨 뜻일까요?"
 fatalf_site.003.title:0 "모브럽의 시험 완료"
 fatalf_site.003.desc:0 "'모브럽'의 시험이 무엇을 의미하든, 아무 일도 하지 않는 것처럼 보입니다. 우리 과학자들은 더 이상의 방해 없이 전진합니다. 이제 지하 수백 마일 아래에서, 그들은 거대한 컴퓨터 네트워크를 발견했습니다. 대부분의 데이터는 오랜 시간의 흐름 속에 이미 절망적으로 손상되었지만, 엄청난 힘과 속도, 지능을 지닌 매우 특이한 종족이 마지막 시험을 위해 이곳을 찾았다는 정보가 일부 남아 있습니다. 그들 나머지에게 무슨 일이 일어났는지는 영영 알 수 없을지도 모릅니다.\n또한 마지막 석판 하나가 놓여 있으며, 그것을 보는 모든 이가 읽는 내용은 오직 §M아니오§!뿐입니다."
 fatalf_site_competition:0 "고대의 시련"
 fatalf_site_competition_desc:0 "우리 스캐너에 따르면 지하 수백 마일까지 뻗어 있는 거대한 건물이 [From.Planet.GetName]에서 발견되었습니다. 목적을 알 수 있는 유일한 단서는 바깥에 있는 석판입니다.\n우리가 아는 어떤 언어도 아니지만, 이상하게도 그것을 보는 모든 이는 그 의미를 이해할 수 있습니다. §M육체 시험§!."
