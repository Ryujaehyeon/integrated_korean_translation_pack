 tech_KSE_start_tech_desc:0 "KSE 콘텐츠에 접근하기 위한 기본 기술입니다. 플레이어만 접근할 수 있도록 제한합니다."
 KSE_QUANTUM_LR_ASG_1:0 "KSE 리퍼 Q.E.P.P. MK 1"
