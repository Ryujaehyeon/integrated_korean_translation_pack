 KSE_QUANTUM_LR_ASG_1_DESC:0 "막대한 전력을 소모해 소형 폭발성 투사체를 적 함선의 선체 내부로 순간이동시켜 안쪽에서부터 파괴하는 소형 양자 얽힘 투사체 투사기입니다."
 KSE_QUANTUM_LR_ASG_2:0 "KSE 리퍼 Q.E.P.P. MK 2"
 KSE_QUANTUM_LR_ASG_2_PLURAL:0 "KSE 리퍼 Q.E.P.P. MK 2"
 KSE_QUANTUM_LR_ASG_2_DESC:0 "엄청난 전력을 소모해 중형 폭발성 투사체를 적 함선의 선체 내부로 순간이동시켜 안쪽에서부터 파괴하는 중형 양자 얽힘 투사체 투사기입니다."
 KSE_QUANTUM_LR_ASG_3:0 "KSE 리퍼 Q.E.P.P. MK 3"
 KSE_QUANTUM_LR_ASG_3_PLURAL:0 "KSE 리퍼 Q.E.P.P. MK 3"
 KSE_QUANTUM_LR_ASG_3_DESC:0 "거대한 전력을 소모해 대형 폭발성 투사체를 적 함선의 선체 내부로 순간이동시켜 안쪽에서부터 파괴하는 대형 양자 얽힘 투사체 투사기입니다."
 KSE_TITANIC_PROTOTYPE_BEAM:0 "실험용 타이탄 빔 프로토타입"
 KSE_TITANIC_PROTOTYPE_BEAM_PLURAL:0 "실험용 타이탄 빔 프로토타입"
 KSE_TITANIC_PROTOTYPE_BEAM_DESC:0 "실험용 타이탄 빔 프로토타입 무기입니다. IRONCLAD에만 장착할 수 있습니다. 막대한 전력과 공간이 필요하며, 철갑함급보다 낮은 함급은 이를 제공할 수 없습니다."
 KSE_TITANIC_MJOELNIR_BEAM:0 "KSE 철갑함 타이탄 묠니르 빔"
 KSE_TITANIC_MJOELNIR_BEAM_PLURAL:0 "KSE 철갑함 타이탄 묠니르 빔"
 KSE_TITANIC_MJOELNIR_BEAM_DESC:0 "KSE 철갑함 타이탄 묠니르 빔은 철갑함급이 장착할 수 있는 궁극의 무기입니다. 토르의 망치에서 이름을 따왔으며, 사격 경로상의 모든 목표에 파괴적인 타격을 가합니다."
 KSE_BOMBARDMENT_1:0 "KSE 궤도 폭격 I"
