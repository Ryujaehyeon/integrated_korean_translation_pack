 KSE_ARTEMIS_TORPEDO_1_DESC:0 "아르테미스 어뢰는 아르테미스 사격 통제 레이더(FCR)를 보완하도록 특별히 설계되었습니다. 일반 함재기보다 큰 견고한 장갑 선체를 갖추고 있으며, 장거리 추진 드라이브로 확장된 사거리와 우수한 속도를 제공합니다. 또한 아르테미스 어뢰에는 통합 ECM 체계와 초중량 탄두가 장착되어 있습니다."
