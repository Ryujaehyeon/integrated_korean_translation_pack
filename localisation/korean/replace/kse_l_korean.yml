 tech_kse_conquistadors:0 "KSE 콘키스타도르"
 tech_kse_conquistadors_plural:0 "KSE 콘키스타도르"
 tech_kse_conquistadors_desc:0 "KSE 콘키스타도르 DSARV 건조를 잠금 해제합니다."
 TECH_UNLOCK_CONQUISTADOR_CONSTRUCTION_TITLE:0 "§H함선 유형 잠금 해제:§! KSE 콘키스타도르"
 TECH_UNLOCK_CONQUISTADOR_CONSTRUCTION_DESC:0 "§H콘키스타도르§!\n콘키스타도르 DSARV의 독특한 선체 설계는 이 유형의 함선에 대해 은폐 능력과 전투 능력의 최적 조합을 요구한 우리 군과 과학자들의 수요에서 비롯되었습니다."
 tech_kse_conquistador_MK_2_sections:0 "콘키스타도르 MK 2 구획 업그레이드"
 tech_kse_conquistador_MK_2_sections_plural:0 "콘키스타도르 MK 2 구획 업그레이드"
 tech_kse_conquistador_MK_2_sections_desc:0 "선체 및 부품 기술의 발전으로 우리의 DSARV는 같은 선체에 더 많은 부품을 장착할 수 있습니다."
 TECH_UNLOCK_CONQUISTADOR_MK_2_SECTIONS_CONSTRUCTION_TITLE:0 "§H함선 구획 잠금 해제:§! KSE 콘키스타도르 MK 2 구획"
 TECH_UNLOCK_CONQUISTADOR_MK_2_SECTIONS_CONSTRUCTION_CONSTRUCTION_DESC:0 "§H콘키스타도르 MK 2 구획!\n콘키스타도르 MK 2 구획은 기본 DSRAV 구획 설계의 고급형으로, 그 능력을 향상합니다."
 tech_kse_conquistador_MK_3_sections:0 "콘키스타도르 MK 3 구획 업그레이드"
 tech_kse_conquistador_MK_3_sections_plural:0 "콘키스타도르 MK 3 구획 업그레이드"
 tech_kse_conquistador_MK_3_sections_desc:0 "선체 및 부품 기술의 기술적 돌파구를 통해 우리의 DSARV는 같은 선체에 훨씬 더 많은 부품을 장착할 수 있게 됩니다."
 TECH_UNLOCK_CONQUISTADOR_MK_3_SECTIONS_CONSTRUCTION_TITLE:0 "§H함선 구획 잠금 해제:§! KSE 콘키스타도르 MK 3 구획"
 TECH_UNLOCK_CONQUISTADOR_MK_3_SECTIONS_CONSTRUCTION_CONSTRUCTION_DESC:0 "§H콘키스타도르 MK 3 구획!\n콘키스타도르 MK 3 구획은 기본 DSRAV 구획 설계의 궁극형으로, 이 유형의 선체 설계가 가능한 최대 수준까지 능력을 향상합니다."
 tech_kse_conquistador_hull_1:0 "개량형 콘키스타도르 선체"
 tech_kse_conquistador_hull_1_plural:0 "개량형 콘키스타도르 선체"
 tech_kse_conquistador_hull_1_desc:0 "건조 기술의 발전으로 더 튼튼하고 내구성 높은 콘키스타도르를 건조할 수 있습니다."
 mod_shipsize_conquistador_hull_mult:0 "콘키스타도르 선체 내구도:"
 tech_kse_conquistador_hull_2:0 "고급 콘키스타도르 선체"
 tech_kse_conquistador_hull_2_plural:0 "고급 콘키스타도르 선체"
 tech_kse_conquistador_hull_2_desc:0 "최신 세대 콘키스타도르 선체는 최적화된 구조 무결성 장과 개선된 격벽을 갖추고 있습니다."
 ironclad:0 "철갑"
 ironclad_plural:0 "강철함대"
 ironclad_desc:0 "철갑함 고급 전함"
 SHIP_GRAPHICS_IRONCLAD_DESC:0 "철갑함은 우리가 건조할 수 있는 가장 진보된 전함급 함정입니다. 더 큰 선체는 추가 구획을 가능하게 합니다. 동급에서 비할 데 없는 화력과 중장갑을 결합했으며, 향후 타이탄급 무기도 장착할 수 있다는 소문이 있습니다. 다만 이러한 무기가 요구하는 공간 때문에 장갑 손실이 막대할 것입니다."
