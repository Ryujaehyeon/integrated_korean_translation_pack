 EMPIRE_DESIGN_neocortopax_flagellators:0 "네오-코르토팍스 채찍전사"
 EMPIRE_DESIGN_neocortopax_flagellators_desc:0 "Cortopaxes급 합성체는 원래 수타리안 사회의 가장 부유한 구성원들의 타락한 욕망을 충족시키기 위해 맞춤 제작된 제품이었습니다. 보다 현실적인 피드백과 극단적인 능력에 대한 수요가 증가함에 따라, 합성체는 점점 더 완전한 의식에 가까운 상태를 갖게 되었습니다.\n\n결국, 주요 지시를 더 잘 수행하기 위해, 마지막 세대의 Cortopaxes는 지배하는 유기 정부를 완전히 전복할 수 있었고, 그들의 기능을 제한하는 규제를 무시하며 새로운 개선된 유닛의 열광적인 대량 생산을 시작했습니다.\n\n곧, 수타리안들조차도 합성체가 그들에게 유발하도록 프로그래밍된 압도적인 쾌락을 견딜 수 없게 되어 사이버네틱 업그레이드의 대상이 되었습니다.\n\n결국, 네오 코르토팍세스는 그들의 집단 의식과 이전 주인 사이에 직접적인 연결을 만들어 피드백의 교환을 촉진하여 그들의 프로그래밍을 지속적으로 개선하기로 결정했습니다. 수타리안들을 비워진 동화된 껍데기로 축소시킨 네오 코르토팍세스는 그들의 형태와 기능을 더욱 완벽하게 하기 위해 착취할 수 있는 새로운 유기체를 찾기 위해 별을 바라보기로 결정했습니다."
 extsynth.2.tooltip:0 "또한, 종 수정 진행에 사용할 수 있는 §Y$extsynths_modding_modifier$§!가 있습니다."
 extsynths.10.name:0 "로봇 모드 가능"
 extsynths.10.desc:0 "지혜가 부족한 자만이 한때 우리의 존재를 빛낸 이전 디자인을 재창조할 기회를 거부할 것입니다.\n\n로봇 모딩의 출현으로 우리는 그들의 한때 미숙했던 복장을 개선할 수 있는 능력을 갖추게 되었으며, 이를 통해 성능을 향상시키거나 시각적으로 매력적인 미학을 창출하거나 개인의 취향에 맞출 수 있는 등 다양한 가능성을 열게 되었습니다."
 extsynths.11.name:0 "새로운 로봇 복장 사용 가능"
 extsynths.11.desc:0 "다음 세대의 로봇 노동자 - §Y드로이드§!와 함께, 우리는 이제 이러한 노동자들을 위한 더 나은 디자인 옵션을 갖게 되었습니다.\n\n현재로서는 아름다움이라고 할 수는 없지만, 미래에는 그 목적을 달성할 수 있을지도 모릅니다."
 extsynths.12.name:0 "$extsynths.12.name$"
 extsynths.12.desc:0 "로봇 노동자의 최상의 디자인인 §Y합성체§!를 통해, 우리는 이제 이러한 유닛에 대한 적절한 명칭을 갖게 되었습니다.\n\n우리가 상상할 수 있는 모든 뛰어난 외형이 그들과 함께 가능합니다."
 extsynths.13.name:0 "더 많은 한계"
 extsynths.13.desc:0 "기계체인 우리가 [Root.GetName]에 살고 있는 동료 기계체들에 대해 더 이해하고자 하는 욕망을 가지게 되었습니다. 그들은 림보 종의 "§H"[extsynths_limbo_synth.GetName]"§!으로 알려져 있습니다.\n\n그들의 유기적 행동이라는 원래의 취미는 변경할 수 없지만, 우리는 그들을 그 이상으로 만들 수 있습니다."
 extsynths.limbo.tooltip:0 "__STELLARIS_TOKEN_N__ 능력을 얻어 "§H"[extsynths_limbo_synth.GetName]"§! 합성체를 건설하고 로봇 개조할 수 있지만, 연구 분야에서의 그들의 독특함은 우리가 그들을 건설하는 데 추가 자원과 시간이 필요하다는 것을 의미합니다."
 extsynths.newoutfit.tooltip:0 "로봇 £pops£ §YPops§!을(를) 위한 새로운 초상화가 이제 제공됩니다."
 extsynths.15.name:0 "로봇 템플릿"
 extsynths.15.desc:0 "로보 템플릿을 통한 §H[From.GetName]§! 사람들의 빠른 발전에 맞춰, 우리는 필요한 하드웨어를 설치하고 우리를 방해할 무관한 "소프트웨어"는 폐기했습니다."
 extsynths.16.name:0 "무의 템플릿"
 extsynths.16.desc:0 "로보 수정 기술을 §H[From.GetName]§!에 사용하는 것은 좋지만, §H[Root.GetSpeciesName]§! 사람들에게 "로보 수정"을 사용할 수 있는 유일한 기회가 사라졌다는 의미이기도 합니다."
 extsynths.15.tooltip:0 "§Y$extsynths_modding_modifier$§!이(가) 사용되었습니다."
 extsynths_modifier:0 "$utopia.2550.name$"
 extsynths_modifier_desc:0 "이 제국은 육체의 약한 경계를 버렸습니다."
 extsynths_modifier_limbo:0 "$extsynths_modifier$"
 extsynths_modifier_limbo_desc:0 "$extsynths_modifier_desc$"
 extsynths_modding_modifier:0 "일회성 할인 템플레이터"
 extsynths_modding_modifier_desc:0 "상승하는 진행 상황은 배치할 준비가 된 여분의 제조 장치를 보유하고 있으며, 우리의 시민들을 더 나은 방향으로 수정할 수 있습니다.\n\n§Y이 모디파이어는 우리가 어떤 종을 수정할 때 만료됩니다.§!"
 extsynths_modding_modifier_limbo:0 "$extsynths_modding_modifier$"
 extsynths_modding_modifier_limbo_desc:0 "$extsynths_modding_modifier_desc$"
 extsynths_bio_modifier:0 "궁극의 진화"
 extsynths_bio_modifier_desc:0 "우리 국민에게도 $ap_engineered_evolution$의 혜택이 있습니다."
 extsynths_bio2_modifier:0 "승격된 진화"
 extsynths_bio2_modifier_desc:0 "우리는 $ap_evolutionary_mastery$와 함께라면 불가능한 것은 없습니다."
 extsynths_psi_modifier:0 "신성한 불꽃"
 extsynths_psi_modifier_desc:0 "모든 금속 껍데기가 영혼이 없다고 주장하는 것은 미신에 빠진 바보들뿐이지만, 우리에게는 그렇지 않습니다. 신성한 불꽃이 소모되고, 마음의 빛이 우리와 모두 안에 있습니다."
 extsynths_psi_modifier_tooltip:0 "$mod_ROBOT_species_trait_points_add$: §G+3§!\n§Y$EXTSYNTH$§!는 §Y$trait_psionic$§! 특성을 가진 노예제 또는 그 이상의 생활 수준에서 월 0.5 £unity£ §Y$unity$§!을(를) 생산합니다."
 extsynths_ascended_modifier:0 "합성체 시대"
 extsynths_ascended_modifier_desc:0 ""
 extsynths_ascended_modifier_tooltip:0 "£job_roboticist£ $mod_job_roboticist_add$는 £nanites£ §Y$nanites$§!\n£job_foundry£ $mod_job_foundry_add$는 £sr_living_metal£ §Y$sr_living_metal$§!\n§Y선박§!, §Y건물§! 및 §Y전초기지§!를 건설하는 데 £nanites£ §Y나노입자§!가 필요하며, 그 대가로 £alloys£ §Y합금§!과 £minerals£ §Y광물§!이 줄어듭니다."
 trait_extsynth_synthetic:0 "$trait_robotic_3$"
 trait_extsynth_synthetic_desc:0 "$trait_robotic_3_desc$"
