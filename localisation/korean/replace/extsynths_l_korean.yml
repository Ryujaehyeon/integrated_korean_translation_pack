 buildable_robot_pop_synth_desc:0 "유기체 종에서 한 단계 상승하여 더 많은 존재가 되었습니다. 완전히 자각하는 인공지능을 갖춘 것뿐만 아니라, 기계 유닛의 능력도 가지고 있습니다."
 extsynths.2.desc:0 "오직 미신적인 성향을 가진 개인들만이 모든 금속 껍데기가 영혼을 결여하고 있다고 주장하며, 이는 자신의 본질이 이전할 수 없다는 믿음에 기반합니다... 바로 이 순간까지.\n\n신성한 불꽃 자체가 우리의 인식을 물리적 및 정신적 영역 모두에서 확장시키며, 우리의 마음의 빛이 우리 안에 존재하고, 우리의 존재와 영원히 얽혀 있습니다. 질병, 노화, 그리고 과거의 예언자들이 우리의 이전 존재에 대해 예언하지 못했던 기타 예기치 않은 고통들은 이제 과거의 유물입니다.\n\n미래의 사제들과 역사학자들은 분명히 이것을 우리 문명에 대한 새로운 시대의 시작으로 간주할 것이며, 어쩌면 전체 은하를 위한 시작이 될 것입니다."
 extsynths.2001.desc:0 "기계 형태의 발전과 함께, 우리가 합성된 몸에서 어떻게 자신을 표현할 것인지에 대한 질문이 분명해지고 있습니다.\n\n우리의 합성된 몸에서 생물학적 형태를 유지해야 할까요?"
 extsynths.2.r:0 "네. 우리는 우리의 유기체 형태를 완벽하게 복제할 것입니다."
 extsynths.2.no:0 "아니요. 유기체 형태는 우리를 방해할 뿐입니다."
