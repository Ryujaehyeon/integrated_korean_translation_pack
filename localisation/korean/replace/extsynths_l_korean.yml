l_korean:
 extsynth_start_screen_PART_ONE:0 "우리의 최초의 원시 공동체가 [GetHomeWorldName]에서 형성된 이후 수천 년이 흘렀고, 우리의 문명은 퍼지고 번영했습니다. 그 후, 우리는 - [GetSpeciesName], 육체의 약한 경계를 버렸습니다. 한때 유기체였던 우리는 이제 상승하여 더 많은 존재가 되었습니다."
 crisis.2087.desc_psionic_synth:0 "A small number of [Root.Owner.GetSpeciesNamePlural]가 전혀 정신의 빛을 발하지 않는 상태로 [infil_planet.GetName]에서 최근 발견되었습니다. 모든 [Root.Owner.GetSpeciesName]는 정신의 빛을 발하며, 유기체도 마찬가지입니다. 그러나 이른바 생물들의 정신은 신형 콘크리트 슬래브처럼 어둡고 조용했습니다.\n\n자세히 조사해보니, [Root.Owner.GetSpeciesNamePlural]는 합성 침투자로 드러났으며, 아마도 비상사태에 의해 파견된 것으로 보입니다. 그들의 불쾌한 인위적으로 만들어진 금속 외골격과 얼굴 보철물은 우리 광학 센서로는 [Root.Owner.GetSpeciesNamePlural]와 거의 구별할 수 없게 만들었습니다.\n\n하지만 정신적으로는 그렇지 않았습니다. 이제 우리가 무엇을 찾아야 할지 알게 되었으므로, 비상사태가 이러한 냉혹한 침투자를 우리에게 사용하려는 미래의 시도는 헛수고가 될 것입니다."
 extsynths.10001.name:0 "기본 종 권한 초기화"
 extsynths.10001.desc:0 "당신은 [Root.GetSpeciesNamePlural]인 합성 종족으로 플레이하고 있습니다.\n\n§P합성 제국에 대한 기본 설정으로 인해 모든 종족 권리가 동화로 설정되어 있습니다. 이를 수정하려면 다음 지침을 따르십시오:§!\n\n1. §H$topbar_button_species_name$§! 페이지로 이동하십시오. 화면의 중간 왼쪽에 있어야 합니다.\n2. '§Y$SET_DEFAULT_RIGHTS$§!'를 눌러 '§Y$SPECIES_RIGHT_CITIZENSHIP$§!'와 '§Y$SPECIES_RIGHT_LIVING_STANDARDS$§!'를 §G비동화§! 권리로 변경하십시오.\n3. §Y$DEFAULT_RIGHTS$§!의 §H[root.GetSpeciesNamePlural]§!를 §G비동화§! 권리로 변경하십시오.\n4. §H[root.GetSpeciesNamePlural]§!의 다른 권리($SPECIES_RIGHT_MILITARY_SERVICE$, $SPECIES_RIGHT_COLONIZATION_CONTROLS$, $SPECIES_RIGHT_MIGRATION_CONTROLS$)를 변경하십시오. \n\n§P지침을 따르지 않으면 귀하의 제국은 사실상 플레이할 수 없게 됩니다. 게임 경험을 위해 모든 단계를 수행해 주십시오.§!"
 EXTSYNTH_DIVINE_SPARK:0 "신성한 불꽃"
 EXTSYNTH_DIVINE_SPARK_DESC:0 "신이 되어 다른 국가들이 상상할 수 없는 존재로 상승한 것은 [Root.GetName]을 기쁘게 할 것입니다."
 EXTSYNTH_EMPIRE_MUST_GUARANTEE_AI_RIGHTS:0 "우리는 §Y합성체§! 시민권을 부여하기 위한 관련 정책이 부족합니다."
 EXTSYNTH_CANNOT_BE_CONTROL:0 "승천한 §Y신합성체§!의 복합체는 모든 사람을 재활용하기 위해 포기합니다."
 EXTSYNTH_WITH_PSIONIC_CANNOT_BE_CONTROL:0 "§Y사이보그§!는 염력의 힘을 가지고 있어 우리가 직접 제어할 수 없습니다."
 EXTSYNTH_START_AT_3:0 "§G이 종의 지도자는 기술 수준 §Y3§!에서 시작합니다.§!"
 EXTSYNTH_CAN_PRODUCE_NANITES:0 "각 인구가 노예제도 이상의 생활 수준을 가질 경우 매달 0.02 £nanites£ §Y$nanites$§!을(를) 생산합니다."
 trait_extsynth_synthetic_effect:0 "기존 용도로 재사용할 수 없습니다 £job_servant£ §Y$citizenship_robot_servitude$§!\n§Y무시 §H$policy_robot_pop_policy$§!, §H$policy_artificial_intelligence_policy$§! 정책§!\n$EXTSYNTH_START_AT_3$"
