 psionic_army_extsynth_desc:0 "정신 능력을 가진 전쟁 기계입니다. 그들의 정신 전투원은 일반 안드로이드 군대보다 더 공격적이고 파괴적이며, 전장에서 극적으로 다른 전술과 전략을 이끌어낼 수 있습니다."
