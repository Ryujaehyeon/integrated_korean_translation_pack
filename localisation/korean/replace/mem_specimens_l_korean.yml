l_korean:
 mem_laser_rifle:0 "마모된 레이저 소총"
 mem_laser_rifle_desc_short:0 "이 고대의 대량 생산된 소총은 여러 고급 기술을 통합하고 있습니다."
 mem_laser_rifle_desc_details:0 "[From.From.GetName]에서 발견된 이 물체는 생명 없는 행성체로, 수많은 다른 외계 군인의 무명 묘지를 표시하고 있습니다. 이 특정 물체는 같은 종류 중 가장 잘 보존된 예시이며, 매우 탐나는 연구 대상입니다."
 mem_mecha:0 "메카 잔해"
 mem_mecha_desc_short:0 "[From.From.GetName]에서 발견된 파손된 이족 보행 전투 기계의 잔해"
 mem_mecha_desc_details:0 "이 기계는 현재와 과거의 많은 공학자들의 꿈을 상징합니다. 이러한 설계가 가져오는 모든 단점에 대한 일반적인 이해에도 불구하고, 이 세계의 주민들은 이 개념을 전폭적으로 지지하였으며, 이는 이 차량들로 가득한 광활한 전장에 잘 나타나 있습니다."
 mem_psionic_debris:0 "사이오닉 잔해"
 mem_psionic_debris_desc_short:0 "[From.From.GetName]에서 발견된 무작위 잔해 조각"
 mem_psionic_debris_desc_details:0 "육안으로는 특별히 눈에 띄지 않는 이 잔해 조각은, 그것이 온 행성의 나머지 표면과 함께, 한 문명의 마지막 순간들이 정신적으로 각인되어 있습니다. 이 물체와 가까운 곳에 지속적으로 존재하면 해당 사건의 환상을 경험하게 됩니다."
 mem_datacore:0 "시간 캡슐 데이터 코어"
 mem_datacore_desc_short:0 "[From.From.From.GetName] 주위를 도는 위성에서 발견된 방대한 아카이브"
 mem_datacore_desc_details:0 "그들의 역사, 문화 및 그들을 형성한 모든 것을 보존하기 위한 비상 수단으로, 운명이 다한 세계의 주민들은 이 데이터 코어를 여러 개의 정확한 복사본과 함께 만들어, 그들의 세계를 찾아올 이들에게 그들이 누구였는지를 알리고 잊히지 않도록 하였습니다."
 mem_crystal_core:0 "바주란 데이터코어"
 mem_crystal_core_desc_short:0 "별 왕좌 거주지의 습격 중에 획득한 데이터 저장 장치입니다."
 mem_crystal_core_desc_details:0 "전투 중 손상되었지만, 이 장치는 바주란 함선의 구조 설계에 대한 방대한 정보를 여전히 보유하고 있습니다. 이 지식은 우리 함선의 구조적 무결성을 높이는 데 도움이 될 것입니다."
 mem_crawler_statue:0 "크롤러 조각상"
 mem_crawler_statue_desc_short:0 "우리의 반려 크롤러의 이른바 '악마적' 본성에 관한 증거로서 절대 돌려보내지 말라는 강력한 요청과 함께 우리에게 넘겨진 것"
 mem_crawler_statue_desc_details:0 "이 명백히 고대의 석상은 우리의 작은 손님과 놀라운 유사성을 보입니다. 전체적인 형태부터 부속지의 수, 그리고 큰턱의 구조까지 이 조각상은 거의 오싹할 정도로 가까운 묘사입니다. 사실 일부는 실제 표본을 칠하고 받침대에 붙인 것이 아닌가 생각했지만, 스캔 결과 단일 고체 돌로 만들어졌음이 확인되었습니다. 이것을 만든 이른바 숭배자가 누구이든, 그들은 자신의 예술 분야의 대가였음에 틀림없습니다. 그럼에도 불구하고, 과거에 다른 문명들이 크롤러 종의 표본들과 조우했을 가능성이 있습니다. 왜 그렇게 부정적으로 묘사되었는지는 논란의 여지가 있는데, 실제로는 매우 순한 우리 손님으로부터 어떠한 공격적인 성향도 관찰된 바 없기 때문입니다."
 mem_lichen_sample:0 "천체 자낭균"
 mem_lichen_sample_desc_short:0 "[From.From.GetName]에서 발견된 이전에 알려지지 않은 특별한 지의류"
 mem_lichen_sample_desc_details:0 "현재 '우주 버섯'이라 일반적으로 불리는 이 곰팡이와 시아노박테리아의 공생 조합은 지구의 유사 생물과 비교해도 극도로 강인한 생명체입니다."
 mem_holo_projector:0 "홀로제너레이터 유닛"
 mem_holo_projector_desc_short:0 "[From.From.GetName] 궤도에서 동종 중 하나로 발견된 홀로그래픽 투영 유닛"
 mem_holo_projector_desc_details:0 "이 기계에서 주목할 만한 것은 기술 자체가 아닙니다 — 우리 자체 기술로도 유사한 효과를 낼 수 있으니까요. 그러나 이 투영 장치들이 고장 없이 수천 년 동안 지속적으로 작동해 왔다는 사실이 인상적입니다."
 mem_military_reports:0 "방어 개요서"
 mem_military_reports_desc_short:0 "[event_target:mem_plants_vs_zombies_planet.GetName]에서 벌어진 전투의 편집 보고서 및 분석"
 mem_military_reports_desc_details:0 "흥미롭게도 모든 보고서가 잎사귀-가을이라는 이름을 사용하는 같은 식물형 개체에 의해 작성된 것으로 보입니다. 이 문서들은 압도적인 상황에서 방어하는 동안 적 피해를 최대화하고 아군 사상자를 최소화하는 다양한 전술들을 상세히 설명합니다."
 mem_aevum_beard:0 "아에붐의 영원한 수염"
 mem_aevum_beard_desc_short:0 "$NAME_mem_aevum_time_lord$이(가) 우리 곁을 떠나 생을 마감할 때, 우리는 마지막으로 그의 수염을 밀었습니다. 이상하게도 수염은 노화되지 않는 것 같습니다"
 mem_aevum_beard_desc_details:0 "우리가 만난 어떤 연체형 종에서도 전례 없는 진정으로 장엄한 수염입니다. 아에붐의 종을 포함해서도요. 이것의 존재 자체가 이상 현상이라고 해도 과언이 아닙니다."
