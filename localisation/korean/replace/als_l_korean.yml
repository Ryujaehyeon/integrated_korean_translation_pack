 als_trait_strategic_gestalt_council_desc:0 "§E우리는 총체로서 특정 상황에 맞춰 전략을 활성화할 수 있습니다. 그 효과는 £als_lv_icon_16x16£ §H기술 수준§!에 따라 달라집니다. 우리의 §H£legion_node£$councilor_gestalt_legion$§!에 대한 정보는 \n\n§H$edict_als_gestalt_strategy_title$§!에서 확인할 수 있습니다.§H칙령§! 보기.§!"
