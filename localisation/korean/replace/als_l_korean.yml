 MOD_ALS_MENU_DESC:0 "§E전략 또는 전술 특성을 선택한 다음 확인 버튼을 클릭하십시오.\n변경 내용을 확인하면 §Y75§!의 £influence£ §H$influence$§!가 소모됩니다.§!"
