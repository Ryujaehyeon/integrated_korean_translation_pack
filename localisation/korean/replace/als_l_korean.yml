 edict_als_gestalt_strategy_title:0 "전략 목록"
 edict_als_gestalt_strategy_title_desc:0 "§E전략은 함대를 지휘할 때 지속적인 보너스를 제공합니다.\n\n우리는 총체로서 특정 상황에 맞춰 전략을 활성화할 수 있습니다. 그 효과는 £als_lv_icon_16x16£ §H기술 수준§!에 따라 달라집니다.§H£legion_node£ $councilor_gestalt_legion$§!.\n\n한 번에 활성화할 수 있는 전략은 §H3§!개로 제한되며, §H£legion_node£$councilor_gestalt_legion$§!에 대한 유지비가 증가합니다.§!"
