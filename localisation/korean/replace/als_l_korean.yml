 als_trait_ability_bar_desc:0 "£als_accuracy_icon_16x16£ 정확도: §H[root.als_accuracy_lvl]|15§!\n£als_movement_icon_16x16£ 유연성: §H[root.als_movement_lvl]|15§!\n£als_siege_icon_16x16£ 포위: §H[root.als_siege_lvl]|15§!\n£als_shock_icon_16x16£ 충격: §H[root.als_shock_lvl]|15§!\n\n§E이곳은 함대를 이끌 때 이 사령관의 능력을 보여줍니다.\n\n4가지 상태를 레벨업하는 방법은 우리의 식민지 중 하나를 궤도에 올려놓으면 §H전략/전술 메뉴§!에서 확인할 수 있습니다.§!"
