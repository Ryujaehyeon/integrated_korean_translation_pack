l_korean:
 r_ziaskehorn_fire:0 "지아스케혼 불꽃"
 r_ziaskehorn_fire_desc:0 "발췌, 지아의 예언 (페히지디 기원 석판, 1판, 미발행):\n\n지아스케혼의 불꽃 (제12절)\n불꽃에 불씨를 제공하고 지아스케혼의 불이 통제되지 않게 타오르게 하면 행성의 모든 생명이 사라지고 용암이 바다에서 쏟아져 나오고 하늘에서 불이 비처럼 쏟아지며 지각적으로 불안정한 죽음에 빠지게 됩니다. 그러나 불꽃은 개인에 의해 통제되고 숙련될 수 있으며, 그 개인이 (조각 파괴됨) 아닐 경우 상상할 수 없는 힘을 부여합니다. 그러나 그 후, (조각 파괴됨)."
 ziaskehorn_relic_active:0 "지아스케혼의 타오르는 불꽃"
 ziaskehorn.01.name:0 "불꽃을 점화하다"
 ziaskehorn.01.desc:0 "불꽃이 새로 발견한 불씨에 달라붙자, 그것은 빠르게 지아스케혼의 불길로 퍼져나갔습니다. 거의 즉시, 우리의 장군들은 새로 살아난 불길이 그들의 몸을 통해 퍼져나가는 열기를 느꼈습니다. 그 결과는 지아스케혼의 불길로 강화된 상상할 수 없을 만큼 강력한 군대의 배열로, 전투에서 그 힘을 사용할 수 있게 되었습니다."
 ziaskehorn.02.name:0 "감당하기 힘든"
 ziaskehorn.02.desc:0 "지아스케혼의 불꽃이 우리의 군대에서 힘을 잃어가면서, 그것은 주어진 것보다 더 많은 것을 가져가고 떠났습니다. 이제 우리의 지휘관들의 마음속에는 꺼지지 않는 불꽃이 타오르고 있으며, 그들의 정신은 지아스케혼의 불길에 휩싸여 있습니다. 절제에 대한 모든 개념은 불타버렸고, 한때 휘두르던 힘의 열정에 의해 바람에 흩어졌습니다."
 ziaskehorn.02.tooltip:0 "모든 우리의 지휘관들은 ['leader_trait:leader_trait_victory_or_death']와 ['leader_trait:leader_trait_reckless'] 특성을 얻고 모든 제약을 잃습니다."
 ziaskehorn_digsite:0 "지아스케혼의 불길"
 ziaskehorn_digsite_desc:0 "§Y[From.Planet.GetName]§!의 표면은 한때 거주지가 있었지만, 오늘날에는 더 이상 살기 힘든 화산 암석에 불과합니다. 한때 이 행성에 살았던 FTL 이전 문명은 자국 주위를 몇 개의 위성을 만들고 발사할 만큼 고급이었습니다.\n\n하지만 그들의 흔적은 없습니다. 남아 있는 것은 서서히 녹아내리는 대도시들뿐입니다. 아마도 이 과거 거주자들로부터 배울 것이 있을지도 모릅니다?"
 ziaskehorn.99.name:0 "용암 아래의 삶"
 ziaskehorn.99.desc:0 "예비 조사에서 §Y[FROMFROM.Planet.GetName]§!는 이 행성이 한때 거주되었음을 나타내는 중요한 증거를 발견했습니다. 대규모 도시 중심지가 흐르는 용암에 의해 파괴되고 점점 녹아내리며 심각한 피해를 입었습니다. 원자 수준의 기술에 대한 증거도 발견되어, 상당히 고급의 FTL 이전 문명이 존재했음을 나타냅니다. 우리의 과학 공동체는 기초 표면 스캔이 거의 드러내지 않는 만큼 이 고대 종의 역사를 파헤칠 것을 촉구하고 있습니다."
 ziaskehorn.11.name:0 "불타는 결말"
 ziaskehorn.11.desc:0 "§Y[From.Planet.GetName]§!의 초기 조사 결과에 따르면, 행성의 현재 화산 상태는 약 311,000년 전 발생한 대재앙 사건 때문입니다. 고고학 팀은 주민들이 사용한 언어와 통신 기술을 해독할 수 있었습니다.\n\n행성 전역에서의 마지막 통신은 단어 하나에 집중되어 있습니다: Ziaskehorn.\n\n현재로서는 이 사건이 왜 발생했는지 여전히 불확실합니다. 또한 과학 담당관 §G[Root.Leader.GetName]§!'의 팀이 해독한 일부 통신에서 Ziaskehorn 사건 이전에 대한 언급이 있다는 점은 더욱 흥미롭습니다. 이는 이 사건이 오랜 시간 동안 준비되어 있었을 것이라는 이론으로 이어집니다."
 ziaskehorn.11.a:0 "다른 것을 찾아보세요."
 ziaskehorn.12.name:0 "전쟁은 결코 변하지 않는다"
 ziaskehorn.12.desc:0 "§Y[From.Planet.GetName]§!의 타버린 잔해를 더 깊이 파고들면서, 발굴 팀은 현재 Phezidii로 알려진 행성 거주자들의 최근 역사 조각을 회수했습니다. 100년 가까이 네 개의 Phezidiian 국가가 서로 간의 무차별적인 총력전 상태에 갇혀 있었습니다.\n\n한 국가인 Aztiel 연합의 원자력 시대 기술 발전에 대응하여, 그들의 주요 경쟁자인 Nipa는 세기-long 갈등에서 싸울 기회를 유지하기 위해 동등한 힘을 찾고자 했습니다. Nipa는 고대 Phezidiian 종교 문서에서 그들의 새로운 무기를 발견한 것으로 보입니다. Ziaskehorn의 불꽃.\n\n과학 장교 §G[Root.Leader.GetName]§!는 Nippa가 §Y[From.Planet.GetName]§!의 뿌리 속에 숨겨진 고대 무기를 풀어놓았을 가능성을 이론화하고 있습니다."
 ziaskehorn.12.a:0 "계속 파헤치세요!"
 ziaskehorn.13.name:0 "고대 신들"
 ziaskehorn.13.desc:0 "§Y[From.Planet.GetName]§!의 잔존자에 숨겨져 있던 고대 문서 중 일부를 발견할 수 있었던 덕분에, 우리는 전체 시나리오에 대한 새로운 정보를 찾았습니다.\n\nZiaskehorn의 불은 세상의 종말을 묘사한 2천 년 된 예언으로, 초기 Phezidiian 문서와 종교에서 처음으로 등장했습니다. 이 불은 개인이 고대 Phezidiian 불의 여신인 Zia로부터 Ziaskehorn의 불꽃(또는 불씨, 그 당시에는 많은 논란이 있었습니다)을 받으면 점화됩니다. Zia는 큰 갈등을 종식시키기를 바라며 개인에게 불꽃을 주었을 것이라고 합니다. 그러나 초기 Phezidiian 수도사들은 이를 알지 못했습니다.\n\n예언에 따라, 그 개인은 태어나는 순간부터 항상 Zia로부터 불꽃을 받고 Ziaskehorn을 해방할 운명이었습니다."
 ziaskehorn.13.a:0 "불안한."
 ziaskehorn.14.name:0 "지아스케혼 불꽃"
 ziaskehorn.14.desc:0 "과학 장교 §G[Root.Leader.GetName]§!가 의심했던 대로, 니파는 아지티엘 연합과의 영원한 전투에서 승리하기를 바라며 지아스케혼의 불을 찾았고, 전쟁을 끝내기 위해 여신 지아가 지아스케혼의 불꽃을 나누어 준 예언된 사건을 마주하게 되었습니다.\n\n지아스케혼의 불이 점화되면서 방출된 힘을 제어할 수 없었던 불은 순식간에 행성을 완전히 집어삼켜 모든 주민을 죽이고 표면을 완전히 화산으로 만들었습니다. 예언은 끝났습니다. 지아스케혼은 행성 전역에 펼쳐졌습니다.\n\n§Y[From.Planet.GetName]§!의 표면에 언젠가 생명이 존재할 수 있을지, 혹은 자칭 신들이 누구였는지(페지디 사회의 마지막 흔적이 끊임없는 갈등 동안 종교를 완전히 포기했기 때문에)와 같은 많은 질문들이 여전히 남아 있지만, 지아스케혼의 불꽃이 남아 있었는지에 대한 질문은 답을 얻었습니다.\n\n우리 [Root.Owner.GetArchaeologistPlural]가 §Y[From.Planet.GetName]§!의 표면에 있는 큰 분화구 근처의 발굴 현장에서 일하고 있는 그들은 초자연적인 구체로 보이는 것을 회수할 수 있었다고 말합니다. 지아스케혼의 불꽃."
 ziaskehorn.14.a:0 "매혹적입니다."
 ziaskehorn.21.name:0 "지아스케혼의 불꽃 저주"
 ziaskehorn.21.desc:0 "§Y[From.Planet.GetName]§!의 유적을 발굴하는 동안, 과학 장교 §G[Root.Leader.GetName]§!는 온몸에 오싹한 감각을 느꼈습니다. 태양처럼 타오르는 행성에서 이상하긴 하지만, [Root.Leader.GetHeShe]는 그들이 괜찮다고 보장합니다. 그러나 발굴 팀의 나머지 멤버들은 동의하지 않습니다. 우리의 과학 장교는 한때 위대한 지도자의 그림자에 불과하며, 서서히 시들어가고 있습니다."
 ziaskehorn.22.name:0 "화산 폭발"
 ziaskehorn.22.desc:0 "최근 [Root.Owner.GetArchaeologistPlural]가 화산이 §Y[From.Planet.GetName]§! 근처의 발굴 현장에서 폭발하면서 많이 사망했습니다. §G[Root.Leader.GetName]§!는 그 여파에서 무사히 살아남았지만, 탐사 팀들이 질서를 재정립하고 남은 잔해를 청소하려고 시도하는 동안 현장에서의 작업은 잠시 중단되었습니다."
 ziaskehorn.23.name:0 "뜨거운 방"
 ziaskehorn.23.desc:0 "우리 [Root.Owner.GetArchaeologistPlural]가 §Y[From.Planet.GetName]§!에서 작업 중에 두꺼운 뜨거운 안개가 가득한 건물에 우연히 들어갔습니다. 이것이 행성의 화산 표면 때문인지 과거 사건 때문인지는 불확실합니다. 그럼에도 불구하고 과학 담당관 §G[Root.Leader.GetName]§!는 이것이 팀이 §Y[From.Planet.GetName]§!의 과거 비밀을 밝혀내는 데 도움이 될 것이라고 확신합니다."
 ziaskehorn.24.name:0 "마그마 넘침"
 ziaskehorn.24.desc:0 "우리의 고고학 탐사대가 §Y[From.Planet.GetName]§!에서 도시 지역의 일부를 뚫으려 시도하는 동안 상당한 어려움에 직면했습니다. 과학 담당자 §Y[Root.Leader.GetName]§!는 심각한 지하 마그마의 넘침을 제거하고 탐사를 계속하기 위해 일부 자원과 장비가 필요하다고 보고했습니다. 그렇지 않으면 발굴 현장에서 모든 작업이 잠시 중단될 위험이 있습니다."
 mem_scfe_embers_of_ziaskehorn:0 "지아스케혼의 잔재"
 mem_scfe_embers_of_ziaskehorn_desc:0 "지아스케혼의 불꽃이 우리를 떠났습니다. 우리의 군대는 지치고 괴로워하고 있습니다. 그들이 회복하는 데는 시간이 필요할 것입니다."
