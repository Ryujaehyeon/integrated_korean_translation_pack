l_korean:
 d_mem_woorskyr_hub:0 "우르스키르 허브"
 d_mem_woorskyr_hub_desc:0 "거대한 나무, 산보다 더 높고 도시보다 더 큰 이 나무의 뿌리는 행성의 모든 다른 나무와 연결되어 있습니다. 이것이 어떻게 이루어졌는지를 발견하는 것은 모든 식물학자의 꿈입니다."
 d_mem_beetle_swarm:0 "조로게이트 비틀"
 d_mem_beetle_swarm_desc:0 "에너지가 넘치는 반지능적 유순한 딱정벌레의 집단입니다. 정신 능력을 활용하여 센서 능력을 향상시키도록 쉽게 훈련할 수 있습니다."
 d_mem_koeleothan:0 "코엘레오탄"
 d_mem_koeleothan_desc:0 "코엘레탄의 야생 무리로, 서로 간에 약한 의식의 연결을 보여줍니다. 훈련과 조건화가 주어진다면, 그들의 잠재력은 크게 증가할 수 있습니다."
 d_mem_quantumpearl:0 "양자 진주"
 d_mem_quantumpearl_desc:0 "아름답고 크며, 이 진주는 모든 다른 진주와 양자 연결을 나타냅니다."
 d_mem_xenograss:0 "외계 풀"
 d_mem_xenograss_desc:0 "매우 강인한 외계 풀로, 아마도 초은하 기원일 가능성이 있으며, 가장 적대적인 환경에서도 파괴되지 않는 듯한 특성과 빠른 성장 덕분에 유용합니다."
 requirement_has_mem_woorskyr:0 "§R우르스키르 허브가 있는 행성에서만 건설할 수 있습니다.§!"
 requirement_has_mem_xenograss:0 "§R행성에 외계 풀(Xenograss)이 필요합니다.§!"
 requirement_has_mem_koeleothan:0 "§R행성에 코엘레오탄이 필요합니다.§!"
 requirement_has_quantumpearl:0 "§R행성에 양자 진주가 필요합니다.§!"
 requirement_has_mem_beetle:0 "§R행성에 Zrogate Beetle이 필요합니다.§!"
 requirement_empire_mem_woorskyr:0 "§R제국에 Woorskyr 허브가 필요합니다.§!"
 requirement_empire_mem_xenograss:0 "§R제국에 Xenograss Processor가 필요합니다.§!"
 requirement_empire_mem_koeleothan:0 "§R제국에 코엘로탄이 필요합니다.§!"
 requirement_empire_quantumpearl:0 "§R제국 내에 양자 진주 굴착장이 필요합니다.§!"
 requirement_empire_mem_beetle:0 "§R제국에 Zrogate Beetles가 필요합니다.§!"
 mod_shipclass_constructor_build_cost_mult:0 "건설선 건설 비용"
 mod_shipclass_science_ship_build_cost_mult:0 "과학선 건설 비용"
 mod_shipclass_research_station_build_cost_mult:0 "연구소 건설 비용"
 mod_shipclass_observation_station_build_cost_mult:0 "관측소 건설 비용"
 mod_shipsize_constructor_build_speed_mult:0 "건설선 건조 속도"
 mod_shipclass_colonizer_build_speed_mult:0 "식민지선 건조 속도"
 mod_shipsize_science_build_speed_mult:0 "과학선 건조 속도"
 mod_shipclass_research_station_build_speed_mult:0 "연구 기지 건설 속도"
 mod_shipclass_observation_station_build_speed_mult:0 "관측소 건설 속도"
 building_mem_woorskyr_biofuel_refinery:0 "우르스크리 바이오연료 정제소"
 building_mem_woorskyr_biofuel_refinery_desc:0 "우르스크리 나무는 물과 생물량을 유용한 광물과 천연 연료로 변환하는 정제소로 사용될 수 있습니다."
 building_mem_woorskyr_bioenergy_plant:0 "우르스키르 바이오에너지 발전소"
 building_mem_woorskyr_bioenergy_plant_desc:0 "우르스키르 나무는 물과 광물을 두꺼운 수액 물질로 변환할 수 있으며, 이는 쉽게 에너지로 전환될 수 있습니다."
 building_mem_woorskyr_growth_monitoring_center:0 "우르스크리 성장 모니터"
 building_mem_woorskyr_growth_monitoring_center_desc:0 "나무의 건강과 성장을 모니터링하며, 거주자에게 위협이 될 수 있는 요소를 식별하고 이를 위험해지기 전에 처리하는 시설입니다."
 building_mem_woorskyr_barkfarm:0 "우르스크리 나무껍질 농장"
 building_mem_woorskyr_barkfarm_desc:0 "우르스크리 나무의 부드러운 껍질 위에서 펼쳐지는 농장 생활의 풍경."
 building_mem_woorskyr_ship_foundry:0 "우르스키르 조선소"
 building_mem_woorskyr_ship_foundry_desc:0 "우르스키르 나무의 목재가 바이오시멘트에 노출되면, 목재가 바이오시멘트를 흡수하여 강인하고 유연한 합금으로 경화됩니다. 이 물자는 민간인 선박과 기지의 많은 선체 부품을 보강할 수 있으며, 건설 시간과 비용을 상당히 줄일 수 있습니다."
 building_mem_xenograss_processor:0 "외계풀 가공기"
 building_mem_xenograss_processor_desc:0 "제노그래스는 재배된 후 바이오 시멘트로 가공됩니다. 바이오 시멘트는 프로그래밍이 가능하며, 식물처럼 광합성을 통해 성장하는 시멘트의 일종입니다. 이는 고립된 행성에서 저렴한 건설에 유용하지만, 시멘트가 성장하는 데 필요한 시간이 과정을 지연시킵니다."
 building_mem_koeleothan_effect_platform:0 "코엘로탄 효과 플랫폼"
 building_mem_koeleothan_effect_platform_desc:0 "부유하는 연구 센터입니다. 여기에서 우리의 외계 생물학자들은 코엘레오탄을 관찰하고 사회학 연구를 위해 훈련합니다. 코엘레오탄은 식량을 위해 추가로 사육되며, 하루에 수백만 마리가 번식하므로 남획 문제는 발생하지 않을 것입니다."
 building_consciousness_amplifier:0 "의식 통합 증폭기"
 building_consciousness_amplifier_desc:0 "이 시설의 가능성은 퀀텀 펄을 연구하기 위해 초빙된 전문가가 자신의 소지품 중에 코엘레오탄이 가득 담긴 탱크를 가지고 있었을 때 우연히 발견되었습니다. 코엘레오탄의 의식은 퀀텀 펄에 의해 흡수되고 반사되며 증폭되어 그들의 영향력의 범위와 힘을 크게 증가시킵니다. 적절한 미끼 세트와 충분한 퀀텀 펄 및 코엘레오탄이 있다면, 우리는 이 시설을 통해 우리 제국 전체의 행동에 영향을 미칠 수 있을 것입니다."
 building_mem_pearl_borehole_site:0 "진주 굴착 시설"
 building_mem_pearl_borehole_site_desc:0 "양자 진주 원천에 더 가까워지기 위한 깊은 보어홀입니다. 이는 우리가 이전에 경험하지 못한 행성 깊이에 도달함에 따라 엄청난 공학 전문 지식이 필요합니다. 이 발전의 비용은 행성의 거주 가능성을 감소시키는 일부 지각 및 대기 교란을 초래합니다.\n\n§R양자 진주 매장지가 있어야만 건설할 수 있습니다.§!"
 building_mem_pearl_borehole_site_2:0 "진주 굴착지 II"
 building_mem_pearl_borehole_site_2_desc:0 "양자 진주 원천에 더 가까워지기 위한 깊은 보어홀입니다. 이는 우리가 이전에 들어본 적 없는 행성 깊이에 도달함에 따라 엄청난 공학 전문 지식을 요구합니다. 이 발전의 비용은 행성의 거주 가능성을 감소시키는 일부 지각 및 대기 교란을 초래합니다.\n\n§R양자 진주 매장지가 있어야만 건설할 수 있습니다.§!"
 building_mem_pearl_borehole_site_3:0 "진주 굴착지 III"
 building_mem_pearl_borehole_site_3_desc:0 "양자 진주 원천에 더 가까이 다가가기 위한 깊은 보어홀입니다. 이는 우리가 이전에 들어본 적 없는 행성 깊이에 도달함에 따라 엄청난 공학 전문 지식을 요구합니다. 이 발전의 비용은 행성의 거주 가능성을 감소시키는 일부 지각 및 대기 교란을 초래합니다.\n\n§R양자 진주 매장지가 있어야만 건설할 수 있습니다.§!"
 building_mem_beetle_sensor:0 "조르가이트 비틀 센서 훈련"
 building_mem_beetle_sensor_desc:0 "Zrogate 딱정벌레를 우리의 센서 시스템에 도입하는 모니터링 및 훈련 센터로, Zrogate에게 간식 형태의 적절한 유인을 제공함으로써 그들이 특정 방식으로 행동하도록 가르칠 수 있습니다."
 building_mem_beetle_sensor_2:0 "조그레이트 신전 신의 선물"
 building_mem_beetle_sensor_2_desc:0 "우리의 영적 지도자들은 여기에서 교감하며, 신성한 조로게이트가 우리 사회에 통합되는 과정을 감독합니다. 그들이 우주에 존재하는 것은 우연이 아닙니다. 그들은 저 너머에서 온 선물입니다!"
 tech_mem_koeleothan_utilization:0 "코엘레오탄 활용"
 tech_mem_koeleothan_utilization_desc:0 "코엘레오탄 물고기의 생애 주기와 활용에 대한 연구가 여러 저명한 외계 생물학자들에 의해 제안되었습니다. 이들이 서식하는 행성에 거점을 마련하면, 우리는 바다를 탐험하기 시작할 수 있습니다."
 tech_quantumpearls_exploitation:0 "양자 진주 착취"
 tech_quantumpearls_exploitation_desc:0 "양자 진주들은 독특한 지질적 이상 현상으로, 서로 간에 어떤 형태의 양자 연결을 가지고 있습니다. 우리는 이들을 활용하는 방법을 배울 수 있지만, 이들이 행성의 중심 근처에 위치해 있어 도달해야 하는 만큼, 그에 대한 완전한 진실을 알지는 못할 것입니다."
 tech_mem_xenograss_harvesting:0 "외계 풀 수확"
 tech_mem_xenograss_harvesting_desc:0 "현재까지 단 하나의 행성에서만 발견된 광물 밀도가 높고 강인한 mem_xenograss는 독특한 생물학적 건설 능력을 제공할 수 있습니다."
 tech_mem_woorskyr_habitation:0 "우르스크리 거주지"
 tech_mem_woorskyr_habitation_desc:0 "우주를 위한 계획과 독특한 우르스키르 나무의 활용. 우리의 과학 공동체는 각자의 분야에 대한 활용 아이디어를 가지고 있습니다."
 tech_mem_woorskyr_bark_farm:0 "$building_mem_woorskyr_barkfarm$"
 tech_mem_woorskyr_bark_farm_desc:0 "우우르스키르 나무의 부드러운 껍질 위에서 펼쳐지는 농장 생활의 풍경."
 tech_mem_woorskyr_biofuel_refinery:0 "$building_mem_woorskyr_biofuel_refinery$"
 tech_mem_woorskyr_biofuel_refinery_desc:0 "$building_mem_woorskyr_biofuel_refinery_desc$"
 tech_mem_woorskyr_bioenergy_plant:0 "$building_mem_woorskyr_bioenergy_plant$"
 tech_mem_woorskyr_bioenergy_plant_desc:0 "$building_mem_woorskyr_bioenergy_plant_desc$"
 tech_mem_woorskyr_growth_monitoring_center:0 "$building_mem_woorskyr_growth_monitoring_center$"
 tech_mem_woorskyr_growth_monitoring_center_desc:0 "$building_mem_woorskyr_growth_monitoring_center_desc$"
 tech_mem_woorskyr_ship_foundry:0 "$building_mem_woorskyr_ship_foundry$"
 tech_mem_woorskyr_ship_foundry_desc:0 "$building_mem_woorskyr_ship_foundry_desc$"
 tech_mem_beetle_exploitation:0 "조르갯 비틀 훈련"
 tech_mem_beetle_exploitation_desc:0 "실험실 연구와 현장 테스트를 거쳐 우리는 조로게이트 비틀의 활용 계획을 완료했습니다."
 tech_mem_beetle_exploitation_2:0 "조그레이트 비틀 숭배"
 tech_mem_beetle_exploitation_2_desc:0 "이제 우리는 조로게이트 비틀이 숭배받아야 할 선물임을 분명히 알게 되었으며, 그들을 위해 위대한 신전이 세워질 것입니다."
 mem_scfe_mem_woorskyr_world.1.name:0 "산들 위에 우뚝 솟은"
 mem_scfe_mem_woorskyr_world.1.desc:0 "우리의 최고의 식물학자 팀이 §Y[From.GetName]§!에 파견되어 현재 Woorskyr 나무라고 불리는 것에 대한 흥미로운 정보를 발견했습니다. 그들의 첫 번째 발견은 이 나무가 단일 개체가 아니라는 것입니다. 오히려 행성의 모든 나무는 광범위한 뿌리 네트워크를 통해 상호 연결되어 있으며, 다른 주요 식물 생명체는 존재하지 않습니다. 둘째로, 우리의 조사에서 처음 탐지된 중앙 나무는 가장 크며, 그 구조 안에 전체 도시를 수용할 수 있을 만큼 방대합니다. 이러한 잠재력은 우리의 식물학자들이 혁신적인 아이디어를 제안하도록 이끌었습니다: 나무의 줄기와 튼튼한 밀집 구조를 거주 및 연구의 중심지로 변형하는 것입니다. 그들은 이 나무가 이 목적을 위해 상당한 수정에도 회복력 있게 견딜 수 있다고 언급합니다. 또한, 나무의 껍질 위에서 공생하며 번성하는 수많은 작은 식물 종들이 있어 추가 연구의 기회를 제공합니다."
 mem_scfe_mem_woorskyr_world.1.a:0 "그것은 매우 큰 나무입니다."
 mem_scfe_mem_woorskyr_tree_network:0 "우르스키르 네트워크"
 mem_scfe_mem_woorskyr_tree_network_desc:0 "거대한 나무 네트워크로, 주요 허브는 산보다 높고 도시보다 크며, 모든 나무와 연결된 뿌리가 하나의 식물을 형성하여 대기를 필터링하고 정화하는 능력을 크게 향상시키며, 지각 불안정을 안정화합니다."
 mem_scfe_mem_koeleothan.1.name:0 "파도 아래의 이동하는 대량"
 mem_scfe_mem_koeleothan.1.desc:0 "§Y[From.GetName]§!에 대한 장기간의 관찰을 통해 이들이 물고기로 확인되었으며, 떼를 지어 모일 때 기초적인 형태의 집단 의식을 나타냅니다. 탐사 팀은 이 물고기들이 풍부한 개체 수와 상대적으로 도전적이지 않은 해양 거주지로 인해 기본적인 본능을 넘어서는 지능을 발전시킬 가능성이 낮다고 주장합니다. 그럼에도 불구하고 단순한 동물에 불과하지만, 그들의 독특한 능력은 추가 연구가 진행되는 동안 다양한 응용 분야에서 매우 유용할 것으로 예상됩니다."
 mem_scfe_mem_koeleothan.1.a:0 "우주는 무한히 이상합니다."
 mem_scfe_mem_xenograss.1.name:0 "외계 작물 밭"
 mem_scfe_mem_xenograss.1.desc:0 "광범위한 현장 연구를 마친 조사팀은 이제 그들이 연구한 풀이 §Y[From.GetName]§!에 외계적임을 확신하고 있습니다. 이 풀의 독특함은 우리가 접한 다른 식물들과는 다른 생물학적 특성에 있습니다. 이러한 특성은 식물 과학과 건설 방법론 모두에 잠재적인 이점을 제공합니다. 이러한 이점이 어떻게 실현될 수 있는지를 밝혀내기 위한 추가 연구가 기대됩니다."
 mem_scfe_mem_xenograss.1.a:0 "보라색 풀. 다음은 무엇인가요?"
 mem_scfe_quantumpearl.1.name:0 "천 개의 세계가 있는 세계"
 mem_scfe_quantumpearl.1.desc:0 "더 자세히 조사해본 결과, §Y[From.GetName]§!의 미스터리가 풀렸습니다 - 그 원인은 바위, 보석, 혹은 더 정확히 말하자면 진주와 유사한 물체입니다. 이 발견은 우리 지질학자들과 생물학자들 사이에서 그 진정한 본질에 대한 활발한 논쟁을 촉발했습니다. 한편, 독특한 특성에 매료된 우리 물리학자들은 이를 §H양자 진주§!라고 명명했습니다. 놀랍게도, 이 진주는 모든 유사한 진주와 양자적으로 연결되어 있는 것 같습니다. 우리의 스캔이 하나를 감지했을 때, 그들은 모든 진주를 동시에 발견하였고, 이는 여러 판독값의 급증을 설명합니다. 이제 우리 연구 커뮤니티 내에서는 이 양자 진주의 수수께끼를 더 깊이 파헤치고 그 비밀을 밝혀내고자 하는 palpable한 흥분이 있습니다."
 mem_scfe_quantumpearl.1.a:0 "양자라면, 분명 좋은 것이겠죠?"
 mem_scfe_mem_beetleswarm.1.name:0 "대기 중인 딱정벌레"
 mem_scfe_mem_beetleswarm.1.desc:0 "딱정벌레에 대한 현장 연구를 마친 우리 연구원들은 매혹적인 발견을 하였습니다: 이제 Zrogate Beetle로 명명된 이 곤충은 정신적 능력을 가지고 있습니다. 이 곤충은 물리적 영역을 훨씬 넘어 감각 인식을 확장할 수 있습니다. 게다가 독특한 생물학적 구성 덕분에 Zrogate Beetle은 적절한 훈련을 통해 우리의 기존 센서 시스템에 매끄럽게 통합될 수 있습니다."
 mem_scfe_mem_beetleswarm.1.a:0 "그들이 지켜보게 하십시오, 그리고 우리도 배웁시다."
 mem_scfe_mem_beetleswarm.1.b:0 "확실히 신성한 존재의 선물입니다."
 mem_scfe_strange_events.1.name:0 "재앙적 연쇄 반응"
 mem_scfe_strange_events.1.desc:0 "콜로서스가 행성과 무기를 정렬시키자, 긴장감이 감도는 침묵이 승무원들 사이에 퍼집니다. 양자 진주가 풍부한 행성이 무기가 완전히 충전되기 전에 이미 반응하기 시작합니다. 막대한 에너지에 민감한 진주들이 공명하기 시작하며, 그 빛이 강렬해집니다.\n콜로서스가 마침내 분노를 발산할 때, 에너지 빔이 행성을 강타하여 이전에 관찰된 적 없는 연쇄 반응을 일으킵니다. 양자 진주가 무기의 힘을 기하급수적으로 증폭시켜, 눈부신 에너지의 파동을 만들어냅니다. 거대한 폭발이 일어나며, 행성과 콜로서스를 모두 휘감는 빛나는 지옥이 펼쳐집니다.\n빛이 사라지자, 한때 독특한 세계와 제국의 힘의 상징이 있었던 곳에는 아무것도 남지 않습니다. 양자 진주들은 마지막 행동으로 행성과 콜로서스를 모두 파괴하며, 탐욕과 공격성의 파괴적인 힘을 상기시키는 음산한 공허만을 남깁니다."
 mem_scfe_strange_events.2.desc:0 "거대 로봇의 무기를 활성화하라는 명령은 엄숙한 감정과 함께 내려집니다. 그것은 양자 진주로 가득한 행성을 불침투성 장벽으로 둘러싸기 시작하며, 나머지 은하와 차단합니다. 그러나 방패가 형성되기 시작하자 예상치 못한 반응이 일어납니다.\n방패의 독특한 에너지 서명이 양자 진주와 예측할 수 없이 상호작용하며, 양자 진주가 방패의 주파수와 공명하기 시작합니다. 이 공명은 통제할 수 없이 커져가며, 상승하는 힘의 피드백 루프를 생성합니다.\n방패가 행성을 감싸면서 에너지는 임계점에 도달합니다. 재앙적인 순간에, 행성은 양자 진주에 의해 증폭된 거대한 폭발로 터져 나옵니다. 폭발은 태동하는 방패를 산산조각내고, 거대 로봇을 파괴적인 에너지의 파도로 휩쓸어버립니다.\n그 결과로 한때 무한한 가치를 지닌 행성이 있던 자리는 이제 영원히 사라진 공허만 남게 됩니다."
 mem_scfe_strange_events.10.name:0 "가장 위대한 나무의 몰락"
 mem_scfe_strange_events.10.desc:0 "콜로서스가 행성 위에 위치를 잡자, 승무원들은 다가오는 상실을 인식하고 침묵을 지킵니다. 목표는 다른 어떤 세계와도 다른, 우르스키르 나무가 자생하는 세계입니다 - 거대한 유기체로, 산보다 더 높고 도시보다 더 넓게 뻗어 있습니다. 그 뿌리는 생명의 네트워크로, 행성의 모든 나무를 연결하며, 통합의 상징이자 자연의 경이로움입니다.\n행성 파괴기가 작동하고, 그 광선이 대기를 뚫고 들어갑니다. 순간, 장엄한 나무와 그것이 지탱하는 행성이 눈부신 빛에 휩싸입니다. 폭발은 신속하게 일어나, 나무와 그 세계를 존재에서 지워버립니다.\n우르스키르 나무의 파괴는 은하의 경이로움이자 생명의 경이로움에 대한 증거로, 별들 사이에 슬픔의 물결을 보냅니다. 그 상실은 단순한 유기체의 끝이 아니라, 상호 연결성과 자연 세계의 미지의 신비를 상징하는 존재의 소멸입니다. 그 부재 속에서 은하는 경이로움과 위엄의 한 조각을 잃게 되며, 결코 채워질 수 없는 공허가 남습니다."
 mem_scfe_strange_events.11.desc:0 "중성자 스윕 콜로서스가 발사 준비를 합니다. 그 목표는 단순한 세계가 아니라 자연적 연결의 거대한 상징인 우르스키르 나무가 있는 세계입니다. 무기가 발사되면서 치명적인 중성자 파동이 행성을 감싸고, 그 취약한 생태계의 모든 층을 관통합니다.\n방사선에 직접 노출된 우르스키르 나무는 엄청난 고통을 겪습니다. 한때 하늘을 향해 뻗어 있던 거대한 형태는 놀라운 속도로 시들고 부패하기 시작합니다. 중성자는 그 세포 구조를 파괴하여 단 몇 순간 만에 생명 없는 상태로 만듭니다.\n하지만 파괴는 나무에서 끝나지 않습니다. 중성자 스윕은 무차별적이고 철저하게 우르스키르가 의존하던 전체 생태계를 황폐화시킵니다. 한때 생기 넘치고 번성했던 생명의 상호 연결된 망은 황량한 황무지로 변해버립니다. 우르스키르와 수많은 다른 종들을 지탱하던 섬세한 균형은 돌이킬 수 없이 깨져버립니다.\n우르스키르 나무와 그 세계의 멸망은 생명의 복잡한 태피스트리에 대한 배려 없이 휘두르는 파괴적인 힘의 슬픈 증거입니다."
 mem_scfe_strange_events.12.desc:0 "콜로서스의 대홍수 아래 물이 차오르면서, 거대한 크기와 행성의 생명망과 깊은 연결로 은하계의 경이로움인 우르스키르 나무가 전례 없는 위협에 직면합니다. 범람은 행성을 잠기게 하여 뿌리를 압도하고 그것이 지탱하는 복잡한 숲 네트워크를 익사시킵니다.\n급격하고 극심한 환경 변화는 우르스키르 나무와 그 생태계에 너무나 심각한 영향을 미칩니다. 나무는 새로운 수생류 환경에 적응하지 못하고 대홍수에 굴복합니다. 한때 위풍당당했던 유기체와 그것이 지탱하던 상호 연결된 숲은 파도 아래 사라져 그들의 이전 영광의 흔적을 남기지 않습니다.\n행성을 적시는 것은 수생류를 위한 거주지를 만들지만, 그 대가는 매우 큽니다. 우르스키르 나무와 그 독특한 생태계의 상실은 자연의 섬세한 균형과 극단적인 환경 변화의 결과를 상기시키는 가슴 아픈 기억으로, 별들 사이에서 경고의 이야기로 울려 퍼집니다."
 mem_scfe_strange_events.13.name:0 "독이 든 뿌리"
 mem_scfe_strange_events.13.desc:0 "콜로서스는 생태적 파멸의 전조로서, 세계의 식물군을 공생의 포옹으로 묶고 있는 거대한 생명체인 우르스키르 나무의 행성을 겨냥합니다. 이 무기는 생동감 넘치는 생태계를 부패시키고 파괴하도록 설계된 유독성 물질의 흐름을 방출하기 시작합니다.\n유독한 미세먼지가 행성을 감싸면서, 한때 무성하고 번영하던 세계는 끔찍한 대전환을 겪습니다. 독소는 토양, 공기, 물에 침투하여 대부분의 생명체에 적대적인 환경을 만듭니다. 자연의 통합과 힘의 상징인 우르스키르 나무는 독성의 맹공을 견디지 못합니다.\n한때 산보다 높고 도시보다 넓었던 나무는 시들고 부패하기 시작합니다. 한때 생기 넘치던 잎은 취약해져 떨어지고, 힘찬 줄기는 썩어가며, 행성의 모든 생명과 연결되어 있던 광범위한 뿌리는 시들고 죽어갑니다. 독소의 독은 너무 강력하여, 우르스키르 나무와 그가 지탱하던 조화로운 생태계는 멸망합니다.\n토크시파이어 콜로서스에 의해 행성이 유독성 황무지로 변모하는 것은 자연의 취약한 균형과 그러한 파괴적인 힘을 풀어놓았을 때의 재앙적인 결과를 상기시키는 음산한 경고입니다. 한때 생명의 상호연결성을 상징했던 우르스키르 나무의 멸망은 생태계 조작의 파괴적인 영향을 증명하며, 오직 가장 강인하고 유독성인 생명체만이 견딜 수 있는 세상을 남깁니다."
 mem_scfe_strange_events.20.name:0 "코엘로탄의 멸망"
 mem_scfe_strange_events.20.desc:0 "콜로서스의 행성 파괴기가 충전됨에 따라, 임박한 파멸을 아는 이들에게 불길한 감정이 엄습합니다. 코엘레오탄 물고기의 고향인 해양 행성은 자신의 운명을 알지 못합니다.\n무기가 발사되자, 격변의 힘이 행성을 부수고, 순식간에 바다가 끓어오르며 해양 행성의 고요한 아름다움은 지옥 같은 화염으로 변합니다. 한때 정신적 현상의 경이로움이었던 코엘레오탄은 순식간에 멸종합니다."
 mem_scfe_strange_events.21.desc:0 "콜로서스의 승무원들은 중성자 스윕 무기가 가동되며, 그 치명적인 광선이 아래의 해양 세계에서 생명을 정화할 준비가 되어 있는 모습을 지켜봅니다.\n광선이 행성을 휩쓸자, 해양은 어떤 피난처도 제공하지 않습니다. 중성자는 깊숙이 침투하여 물속의 모든 구석에 도달합니다. 순간적으로, 코엘레오탄 물고기의 생생한 정신적 신호는 아무것도 남기지 않고 사라지며, 끊임없는 공격에 의해 소멸됩니다.\n멸종은 조용하고 철저합니다. 코엘레오탄의 독특한 존재의 흔적은 남아 있지 않으며, 그들의 잠재력과 신비는 한때 생동감 넘쳤던 세계의 차가운 심연 속에 영원히 잃어버립니다. 이 파괴 행위는 은하를 가로질러 오싹한 메시지를 전달합니다: 가장 미공개되고 보호된 생명조차도 이러한 압도적인 힘의 손길을 벗어날 수 없습니다."
 mem_scfe_strange_events.22.name:0 "독성 조류"
 mem_scfe_strange_events.22.desc:0 "행성의 한때 순수하고 생기 넘치던 해양이 끊임없는 독소의 흐름에 의해 변화하기 시작합니다. 맑고 푸른 물은 흐릿하고 유독성인 웅덩이로 변해, 한때 생명을 키워주던 섬세한 균형에 적대적입니다. 환경에 민감하고 수생류의 순수성에 의존하는 코엘레오탄 물고기는 전례 없는 재앙에 직면합니다.\n독소가 깊숙이 스며들면서 코엘레오탄의 정신적 외침이 물속에 메아리치고, 절망과 고통의 합창이 울려 퍼집니다. 하나둘씩 그들은 독이 든 물에 굴복하고, 정신적으로 연결할 수 있는 능력이 침묵 속으로 사라집니다. 한때 정신적 경이로움의 요람이었던 해양은 코엘레오탄의 무덤이 됩니다.\n콜로서스에 의해 그들의 세계가 독성 황무지로 변모한 것은 예측 없이 휘두른 파괴적인 힘에 대한 음산한 증거로, 한때 번영하던 행성을 상실과 황폐의 경고적인 상징으로 남깁니다."
 mem_scfe_strange_events.30.name:0 "조그레이트 딱정벌레의 종말"
 mem_scfe_strange_events.30.desc:0 "행성 파괴기가 작동하면서, 파괴적인 광선이 행성을 겨냥하여 대기를 뚫고 들어갑니다. 표면이 갈라지고, 순간적으로 세계는 조각으로 부서집니다. 폭발은 절대적이며, 한때 번성했던 행성과 그 독특한 주민들의 흔적을 남기지 않습니다.\n비범한 감각 능력과 미개발된 정신적 잠재력을 지닌 조로게이트 딱정벌레들은 순식간에 사라집니다. 그들의 우주에 대한 독특한 인식과 정신 영역에 대한 잠재적 통찰력은 그들과 함께 사라집니다. 은하는 조로게이트 딱정벌레와 함께 멸망한 지식과 경이로움의 상징인 음산한 공허만을 남깁니다."
 mem_scfe_strange_events.31.name:0 "조르가트의 회복력"
 mem_scfe_strange_events.31.desc:0 "콜로서스가 행성을 공격할 준비를 하던 중, 예상치 못한 현상이 발생합니다. 이 세계에 서식하는 조로게이트 딱정벌레는 반지능과 정신 능력을 지니고 있으며, 다가오는 치명적인 방사선 방출을 감지하는 것 같습니다.\n중성자 빔이 행성을 감싸자, 딱정벌레는 서식지에서 나와 높은 곳으로 올라갑니다. 놀랍게도, 그들은 방사선의 치명적인 영향에 굴복하는 대신, 마치 여름 태양의 따뜻함을 즐기듯 방사선 속에서 햇볕을 쬐고 있습니다. 딱정벌레의 독특한 생물학은 중성자 스윕을 견디는 것뿐만 아니라, 그로부터 어떤 형태의 영양이나 쾌감을 끌어내는 것처럼 보입니다.\n콜로서스의 포격이 멈추자, 조로게이트 딱정벌레는 정상적인 활동으로 돌아가며, 사건에 의해 다치거나 영향을 받지 않은 것처럼 보입니다. 이 생물들이 대재앙이 되어야 할 사건의 여파 속에서 번성하는 모습은 관찰자들을 혼란스럽게 합니다.\n이 예상치 못한 전개는 은하에서 생명의 신비롭고 다양한 적응을 강조합니다. 중성자 스윕에 대한 그들의 신비로운 회복력으로 인해 조로게이트 딱정벌레는 흥미와 연구의 주제가 되며, 겉보기에는 극복할 수 없는 도전 앞에서도 생명의 장수하는 힘을 상징합니다."
 mem_scfe_strange_events.32.desc:0 "콜로서스가 활성화되면서 물의 대홍수가 발생하여 행성을 휩쓸고 있습니다. 경관이 잠기고, 바다가 확장되어 환경이 극적으로 변화합니다. 육상 거주지에 적응하고 특정 생태적 조건에 의존하는 조로게이트 딱정벌레는 즉각적인 존재적 위협에 직면합니다.\n정신적 능력이 뛰어난 그들이지만, 수생류 세계에서 생존하기에는 적합하지 않습니다. 그들의 거주지가 침수되면서 정신 신호가 약해지고, 이는 그들의 고군분투와 궁극적인 멸망을 알립니다. 한때 비범한 감각 지각 능력을 지닌 딱정벌레는 끊임없는 조류에 압도당하고, 급변하는 세계에 적응하지 못하고 있습니다."
 mem_scfe_strange_events.33.name:0 "조그레이트의 독성 종말"
 mem_scfe_strange_events.33.desc:0 "독소가 행성의 생물권으로 스며들면서 환경은 급격하고 치명적인 대전환을 겪습니다. 한때 다양한 생명체를 지탱하던 서식지는, Zrogate 딱정벌레를 포함하여, 불모의 땅이 됩니다. 공기는 신맛이 나고, 토양은 황폐해지며, 수원은 유독성 슬러지로 변합니다.\nZrogate 딱정벌레는 그들의 회복력과 독특한 능력에도 불구하고 퍼져가는 독으로부터 피할 곳을 찾지 못합니다. 한때 행성에서 생생한 존재였던 그들의 정신 신호는 점차 희미해지며 결국 사라집니다. 딱정벌레들은 급격히 악화되는 환경에 적응하지 못하고, 그들의 세계가 유독성 황무지가 되면서 멸망하게 됩니다."
 mem_scfe_strange_events.40.name:0 "외계풀의 확산"
 mem_scfe_strange_events.40.desc:0 "콜로서스는 소행성 충돌로 인한 가혹한 환경에서도 잘 자라는 회복력 있는 보라색 풀인 제노그래스가 독특하게 존재하는 세계를 목표로 삼습니다. 무기가 파괴적인 힘을 발휘하면서 행성은 산산조각이 나고, 이는 제노그래스의 종말을 알리는 대재앙처럼 보입니다.\n그러나 황폐함 속에서 놀라운 현상이 발생합니다. 산산조각 난 행성의 조각들이 회복력 있는 제노그래스의 씨앗과 줄기를 지니고 우주 깊숙이 던져집니다. 이 잔존자들은 천체 유목민이 되어 우주를 떠돌 운명을 지닙니다.\n수백만 년이 흐르고, 결국 이 조각들 중 일부는 먼 행성에 충돌하여 새로운 집을 찾게 됩니다. 이러한 새로운 외계 환경에서 제노그래스의 씨앗은 발아하기 시작할 것입니다. 모든 역경을 뚫고 보라색 풀은 다시 일어설 것이며, 새로운 세계를 그 생동감 넘치는 색으로 물들일 것입니다."
 mem_scfe_strange_events.41.name:0 "불굴의 외계풀"
 mem_scfe_strange_events.41.desc:0 "콜로서스의 목표는 외계 풀로 덮인 세계입니다. 이 독특한 회복력 있는 보라색 식물은 가장 가혹한 환경에서도, 심지어 우주에서도 수억 년을 살아남는 것으로 알려져 있습니다.\n중성자 빔이 행성을 휩쓸면서 생태계는 재앙적인 변화를 겪습니다. 많은 생명체가 방사선에 굴복하고, 그들의 섬세한 균형은 회복 불가능할 정도로 파괴됩니다. 그러나 이 파괴의 물결 속에서도 외계 풀은 놀랍게도 영향을 받지 않습니다.\n대부분의 생명체에 치명적인 중성자의 강한 흐름은 외계 풀에게는 무의미한 것처럼 보입니다. 외계 풀은 흔들림 없이 서 있으며, 그 생생한 보라색 색조는 줄어들지 않습니다. 이 식물은 이미 우주선과 우주의 공허함에 적응해 있으며, 중성자 세례를 마치 가벼운 바람처럼 견뎌냅니다."
 mem_scfe_strange_events.41.a:0 "그들은 확실히 회복력 있습니다."
 mem_scfe_strange_events.42.name:0 "대전환의 외계풀"
 mem_scfe_strange_events.42.desc:0 "거대 로봇은 광활한 외계풀밭으로 정의된 행성을 목표로 삼습니다. 이 회복력 있는 보라색 풀은 거대 로봇이 힘을 발휘하자 물줄기가 쏟아져 내리며, 육상의 풍경을 해양 세계로 빠르게 대전환시킵니다.\n이 극심한 환경의 격변 속에서 외계풀은 놀라운 적응 능력을 보여줍니다. 새로 형성된 해양 아래 잠긴 외계풀은 빠른 생물학적 대전환을 겪습니다. 한때 풀과 같은 식물은 구조와 조성을 재편성하여 조류의 형태로 변모합니다.\n이 새로운 수생류 변종 외계풀은 침수 속에서도 살아남을 뿐만 아니라 수중 환경에서 번성하기 시작합니다. 해저를 가로질러 퍼져 나가며, 파도 아래에 광활하고 생기 넘치는 보라색 초원을 만들어내고, 생명의 놀라운 적응력을 증명합니다."
 mem_scfe_strange_events.43.desc:0 "콜로서스는 극한의 조건에서도 잘 자라는 회복력 있는 보라색 풀, 제노그래스를 덮고 있는 세계를 목표로 삼습니다. 유독성 화물을 방출하자, 행성 전역에서 극적인 대전환이 시작됩니다.\n독성 물질의 영향으로 환경이 급속히 악화되어, 행성이 대부분의 생명체에 적대적인 상태가 됩니다. 그러나 이러한 생태적 격변 속에서 제노그래스는 놀라운 적응력을 보여줍니다. 유독한 공격에 직면하자, 빠른 변이 과정을 시작합니다.\n이제 가혹하고 유독성 있는 조건에 노출된 제노그래스는 독성을 견디는 것뿐만 아니라 이를 활용하기 위해 생물학적 구조를 변화시킵니다. 풀은 변이하여 독성 요소를 흡수하고 대사할 수 있는 새로운 특성을 채택하며, 한때 치명적이었던 환경을 영양 공급원으로 바꿉니다.\n제노그래스의 이 특별한 적응은 행성을 유독성 속에서 변이된 풀이 번성하는 독특한 생태계로 변화시킵니다."
 TECH_UNLOCK_WOORSKYR_TECHS_TITLE:0 "§H기능 해제:§! 우르스키르 건물 기술"
 TECH_UNLOCK_WOORSKYR_TECHS_DESC:0 "우르스키르 나무를 활용하기 위한 기술을 개발할 수 있습니다."
 mem_scfe_strange_worlds_chain_title:0 "이상한 세계"
 mem_scfe_strange_worlds_chain_desc:0 "일부 행성은 특별한 관심을 끄는 자원을 보유하고 있습니다."
 mem_scfe_swpoi_mem_woorskyr:0 "우르스크의 세계"
 mem_scfe_swpoi_mem_woorskyr_desc:0 "거대한 나무의 고향, 산보다 높고 도시보다 큰 이 나무는 행성의 모든 다른 나무와 뿌리로 연결되어 있습니다."
 mem_scfe_swpoi_mem_koeleothan:0 "코엘레오탄의 세계"
 mem_scfe_swpoi_mem_koeleothan_desc:0 "코엘레타한의 야생 무리들이 서식하는 곳으로, 서로 간에 약한 의식의 연결을 나타냅니다."
 mem_scfe_swpoi_mem_xenograss:0 "외계풀의 세계"
 mem_scfe_swpoi_mem_xenograss_desc:0 "아주 강인한 외계 풀의 고향으로, 아마도 초은하적 기원을 가지고 있습니다."
 mem_scfe_swpoi_quantumpearls:0 "양자 진주 세계"
 mem_scfe_swpoi_quantumpearls_desc:0 "양자 수준에서 연결된 이상한 진주들의 고향."
 mem_scfe_swpoi_mem_beetleswarm:0 "조라게 비틀의 세계"
 mem_scfe_swpoi_mem_beetleswarm_desc:0 "활발하고 반지능적인 유순한 딱정벌레의 식민지입니다."
