 mod_job_giga_shroud_conduit_priest_per_pop_short:0 "\n$VALUE$ £pop£마다 £mod_job_giga_shroud_conduit_priest_add£ §G+1§!"
 job_giga_shroud_conduit_priest_icon:0 "£job_giga_shroud_conduit_priest£"
 job_giga_shroud_conduit_drone:0 "장막 도관 드론"
 job_giga_shroud_conduit_drone_plural:0 "장막 도관 드론"
 job_giga_shroud_conduit_drone_desc:0 "$building_giga_shroud_conduit$에 의해 생성된 섬세한 연결을 관리하는 데 특화된 사이오닉 드론."
 job_giga_shroud_conduit_drone_effect_desc:0 "$job_giga_shroud_conduit_drone_swap_plural_with_icon$는 £energy£ §Y$energy$§!를 채널링하여 £unity£ §Y$unity$§!를 생성하고 행성의 생산성을 향상시킵니다."
