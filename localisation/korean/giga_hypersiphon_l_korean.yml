 giga_situation_hypersiphon_tracker:0 "[target.planet.GetName] $name_psy_siphon$ 추적기"
 giga_situation_hypersiphon_tracker_desc:0 "$name_psy_siphon$의 이벤트를 관리합니다."
 giga_situation_hypersiphon_tracker_monthly_change_tooltip:0 ""
 giga_situation_hypersiphon_instability:0 "장막 도관 불안정"
 giga_situation_hypersiphon_instability_type:0 "$giga_situation_hypersiphon_instability$"
 giga_situation_hypersiphon_instability_desc:0 "$name_psy_siphon$에 의해 생성된 거시적인 사이오닉 터널은 장막의 내부 구조 내에서 변동을 일으키고 있습니다.\n측정 결과 초기 예측을 훨씬 초과하는 활동 급증이 나타났으며, 에너지 수준이 너무 높이 올라가면 부정적인 영향이 나타날 수 있습니다."
 giga_situation_hypersiphon_instability_monthly_change_tooltip:0 "£mod_black_hole£ §Y장막 도관 불안정§!은 §Y$name_psy_siphon$§! 거대구조물에 영향을 받은 £building£ §Y$building_giga_shroud_conduit$§! 건물들로 인해 발생합니다."
 giga_situation_hypersiphon_instability_progress_instability:0 "$building_giga_shroud_conduit$ 건물"
 giga_situation_hypersiphon_instability_progress_decay:0 "자연적인 붕괴"
 giga_situation_hypersiphon_instability_progress_mitigate:0 "$giga_situation_hypersiphon_instability_approach_mitigate$"
 giga_situation_hypersiphon_instability_progress_encourage:0 "$giga_situation_hypersiphon_instability_approach_encourage$"
 giga_situation_hypersiphon_instability_stage_1:0 "§E최소한의§! 장막 불안정"
 giga_situation_hypersiphon_instability_stage_1_effect:0 "장막 붕괴 이벤트가 §E아주 드물게§! 발생할 수 있음."
 giga_situation_hypersiphon_instability_stage_2:0 "§G낮은§! 장막 불안정"
 giga_situation_hypersiphon_instability_stage_2_effect:0 "장막 붕괴 이벤트가 §G드물게§! 발생할 수 있음."
 giga_situation_hypersiphon_instability_stage_3:0 "§Y중간 정도의§! 장막 불안정"
 giga_situation_hypersiphon_instability_stage_3_effect:0 "장막 붕괴 이벤트가 §Y간헐적으로§! 발생할 수 있음."
 giga_situation_hypersiphon_instability_stage_4:0 "§H높은§! 장막 불안정"
 giga_situation_hypersiphon_instability_stage_4_effect:0 "장막 붕괴 이벤트가 §H자주§! 발생할 수 있음."
 giga_situation_hypersiphon_instability_stage_5:0 "§R극한의§! 장막 불안정"
 giga_situation_hypersiphon_instability_stage_5_effect:0 "장막 붕괴 이벤트가 §R매우 자주§! 발생할 수 있음."
 giga_situation_hypersiphon_instability_approach_neutral:0 "관찰"
 giga_situation_hypersiphon_instability_approach_neutral_desc:0 "슈라우드는 신비롭고 제대로 이해되지 않은 세계입니다. 우리는 무언가가 다가오고 있다는 것을 알고 있지만, 그것은 형태도 없고 덧없이 없어져 버립니다. 우리는 계속 관찰할 것입니다."
 giga_situation_hypersiphon_instability_approach_neutral_effect:0 "우리는 장막 내에서의 변동을 계속 관찰할 것입니다."
 giga_situation_hypersiphon_instability_approach_encourage:0 "촉진"
 giga_situation_hypersiphon_instability_approach_encourage_desc:0 "우리의 위대함을 방해하는 자들을 분노케 할 지라도, 우리는 이 힘을 최대한으로 사용해야만 합니다."
 giga_situation_hypersiphon_instability_approach_encourage_effect:0 "[GetGigaShroudConduitJobIcon]§Y[GetGigaShroudConduitJob]§! 직업이 생산성을 §G더욱 효과적§!으로 향상시키지만, 상황 진행이 §R25%§! 빨라지며, 부정적인 이벤트가 더욱 자주 발생합니다.\n "
 giga_situation_hypersiphon_instability_approach_mitigate:0 "완화"
 giga_situation_hypersiphon_instability_approach_mitigate_desc:0 "그들의 분노를 사지 않도록 장막과 그 주민들에게 미치는 영향을 최소화해야합니다."
 giga_situation_hypersiphon_instability_approach_mitigate_effect:0 "상황 진행이 §G50%§! 느려지며 부정적인 이벤트가 덜 발생하지만, [GetGigaShroudConduitJobIcon]§Y[GetGigaShroudConduitJob]§! 직업의 생산성 향상이 §R덜 효과적§!이 됩니다.\n "
 giga_situation_hypersiphon_instability_complete_effect:0 "또 다른 중대한 장막 침입이 우리 우주 어딘가에서 일어날 것입니다."
 giga_situation_hypersiphon_instability_complete_effect_unknown:0 "이러한 에너지가 성장한 결과는 현재 알려져 있지 않습니다."
 giga_situation_hypersiphon_instability_fail_effect:0 "장막은 조금 더 고요해집니다."
 giga_hypersiphon.002.name:0 "보이지 않는 흐름"
 giga_hypersiphon.002.desc:0 "사이오닉 능력자들에게 그것은 점잖은 잔소리였지만, 빠르게 더 큰 현상이 되었습니다. 이제 장막의 물질에서 직접 이만한 양의 에너지를 모으는 것이 초기 예상보다 흐름 내에서 더 많은 난류를 일으키고 있음이 분명합니다.\n\n현 상태로는 이러한 교란이 미래에 우리에게 정확히 무엇을 의미할지는 불확실하지만, 이러한 교란의 강도가 계속 증가하면 우리는 그곳에 머무는 힘의 관심을 끌기 시작할 수 있습니다.\n\n현재로서는 관찰을 지속할 것입니다."
 giga_hypersiphon.002.a:0 "고려해보겠습니다."
 giga_hypersiphon.010.name:0 "장막 추출기 오작동"
 giga_hypersiphon.010.desc:0 "[hypersiphon_target.GetName]의 $building_giga_shroud_conduit$ 직원들은 [hypersiphon_target.GetPlanetMoon]의 표면에 명백히 물리적인 장애를 일으키는 사이오닉 에너지로 이루어진 거대한 스파이크에 대해 보고했습니다.\n\n영향을 받은 지역은 사용할 수 없게 되었고, 청소에 온 집중을 쏟을 것입니다."
 giga_hypersiphon.010.a:0 "불편하군."
 giga_hypersiphon.010.result.1:0 "[hypersiphon_target.GetName]의 좁은 지역이 엑토플라즈마 폐기물로 오염되었습니다."
 giga_hypersiphon.010.result.2:0 "[hypersiphon_target.GetName]의 넓은 지역이 엑토플라즈마 폐기물로 오염되었습니다."
 giga_hypersiphon.010.result.3:0 "[hypersiphon_target.GetName]의 표면에 이례적인 지역이 형성되었으며, [hypersiphon_target.owner.GetScientistPlural]을 꽤나 헷갈리게 합니다."
 giga_hypersiphon.010.result.4:0 "$giga_hypersiphon.010.result.3$"
 giga_hypersiphon.010.result.5:0 "A huge region of [hypersiphon_target.GetName]의 방대한 지역이 맹렬한 사이오닉 폭풍에 삼켜져 지표가 황폐화되었지만 장막과의 연결이 생성되었습니다."
 giga_hypersiphon.020.name:0 "[hypersiphon_target.GetName]에 있는 장막 소"
 giga_hypersiphon.020.desc.first:0 "[hypersiphon_target.GetName] 성계에 거대한 사이오닉 폭풍이 형태를 갖추었고, 우리의 우주 작업들에 혼란을 초래합니다.\n\n불가사의하게도, 겉보기에는 생기가 없어 보이는 장막의 개체들도 이 성계에 나타났습니다. 사이오닉 능력자들은 그것을 \"장막 소\"라고 이름붙였는데 이는 그것이 티얀키와 물리적인 외형이나 정신적인 노래 모두 꽤나 유사했기 때문입니다."
 giga_hypersiphon.020.desc.normal:0 "[hypersiphon_target.GetName] 성계에 장막의 개체들이 등장하여 파괴적인 사이오닉 폭풍과 함께합니다."
 giga_hypersiphon.020.desc.damage:0 "[hypersiphon_target.GetName] 성계에 또 다른 사이오닉 폭풍이 형성되었습니다. 더 많은 장막 소들이 나타났으며, 근처의 함선과 기지들을 공격하기 시작했습니다."
 giga_hypersiphon.020.a:0 "꽤나 기묘하군..."
 giga_hypersiphon.020.b:0 "더 나타났다고?"
 giga_hypersiphon.020.c:0 "전투 위치로!"
 giga_hypersiphon.020.effect:0 "[hypersiphon_target.GetName] 성계에 사이오닉 폭풍이 장막 개체들과 함께 등장합니다!"
 giga_hypersiphon.022.name:0 "[hypersiphon_target.GetName] 성계의 장막 소란이 가라앉다"
 giga_hypersiphon.022.desc:0 "[hypersiphon_target.GetName] 성계의 사이오닉 폭풍이 제거되어, 정상으로 돌아왔습니다.\n\n함께 온 신비한 환영들도 흔적도 없이 사라졌습니다"
 giga_hypersiphon.022.a:0 "현재로는 이상 없음"
 giga_hypersiphon.030.name:0 "[hypersiphon_target.GetName]이 멸망하는 환상"
 giga_hypersiphon.030.desc:0 "[hypersiphon_target.GetName]의 거주민들은 최근 다가올 재앙에 대한 끔찍한 꿈과 환상에 시달렸습니다. [hypersiphon_target.GetPlanetMoon]의 몇몇 산업 섹터에서 사이오닉 피드백으로 인한 사망률의 증가와 기계적 결함이 발생하는 이상한 일들이 보고되었습니다.\n\n사이오닉 능력자들에 따르면 강력한 장막의 존재가 정착했으며, 영향이 사라지기까지는 시간이 걸릴 것이라고 합니다."
 giga_hypersiphon.030.a:0 "성가시군."
 giga_hypersiphon.030.result.1.1:0 "죽음과 파괴가 이 세계를 방문했습니다."
 giga_hypersiphon.030.result.1.2:0 "전 세계적으로 상당한 파괴가 발생했습니다."
 giga_hypersiphon.030.result.1.3:0 "광범위한 파괴가 찾아왔습니다."
 giga_hypersiphon.040.name:0 "[hypersiphon_target.GetName]으로의 장막 침입!"
 giga_hypersiphon.040.desc:0 "적대적인 장막 개체가 [hypersiphon_target.GetName] 성계에 나타났습니다!\n\n초기 보고서에 따르면 이들은 명확한 목적 없이 불규칙하게 움직이며 보이는 모든 것을 공격하고 있습니다. 사이오닉 능력자들은 이러한 망령들이 그들의 영역으로의 연결이 부족하고 형체를 유지할 에너지 공급원이 없으면 우주 공간으로 사라질 수 있다고 추측합니다."
 giga_hypersiphon.040.a:0 "불행하게도 말이야."
 giga_hypersiphon.040.result:0 "§L불순한 의도와 혼란스러운 목적을 가진 방문객들...§!"
 giga_hypersiphon.100.name:0 "[hypersiphon_target.GetName]으로의 대규모 장막 침입!"
 giga_hypersiphon.100.desc:0 "대규모의 적대적인 장막 실체가 [hypersiphon_target.GetName] 성계에 나타났으며, 일종의 균열 주위에 모여 있습니다.\n\n그들은 성계 내에 존재하는 우리 시설에 직접적인 공격을 시작한 것으로 보이며, 조직된 모습을 보입니다. 우리의 사이오닉 능력자들은 이러한 실체들이 그들의 영역과의 지속적인 연결만 있다면, 현실에서 무기한으로 활동할 수 있으며, 심지어는 성계의 경계를 넘어 돌아다닐 수 있을 것으로 추측합니다."
 giga_hypersiphon.100.a:0 "즉시 반격을 준비하라!"
 giga_hypersiphon.100.restart:0 "§Y$giga_situation_hypersiphon_instability$§! 상황을 다시 시작합니다.\n\n§M장막을 통해, 악의와 분노와 함께...§!"
 giga_hypersiphon.101.name:0 "사이오닉 에너지 스파이크"
 giga_hypersiphon.101.desc:0 "[hypersiphon_target.GetName] 성계 내의 [hypersiphon_target.owner.GetName]에서 거대한 에너지 신호가 감지되었습니다. 초기 보고서에 따르면 일종의 적대적인 환영이 균열에서 나타나 시스템 내의 모든 것을 공격하고 있는 것으로 나타났습니다."
 giga_hypersiphon.101.a:0 "성가시군."
 giga_hypersiphon.103.name:0 "식민지가 장막에 흡수됨"
 giga_hypersiphon.103.desc:0 "장막 실체들의 지속적인 공격으로 [This.GetName]의 식민지가 파괴되었으며, 행성을 두꺼운 사이오닉 폭풍 구름으로 덮었습니다. 표면에서는 어떠한 생명도 감지되지 않으며, 행성의 측정치는 주변에 기이하고 물리학적으로 정의할 수 없는 상태가 발생한 것을 시사합니다."
 giga_hypersiphon.103.a:0 "비극이군."
 giga_hypersiphon.105.name:0 "장막 침입 중단"
 giga_hypersiphon.105.desc.first:0 "우리의 군대가 [fromfrom.solar_system.GetName] 성계에 있는 장막 균열을 성공적으로 무너뜨렸습니다. 장막과의 연결이 끊어지면서, 장막에서 나타난 적대적인 실체들은 빠르게 사라지고 무해해졌습니다.\n\n한 가지 의문이 남아있습니다: 이 문제에 대한 우리의 장기적인 해결책은 무엇일까요? 불안정성은 여전히 남아있고, 만약 상황이 변하지 않는다면 이런 일은 다시 일어날 것입니다. 닫힌 구멍 주위에는 여전히 침략자들의 희미한 표식이 남아있고, 우리 배에 남겨진 잔해들을 연구할 수 있습니다.\n\n아마도 그것은 우리가 찾는 답을 내놓을 것입니다."
 giga_hypersiphon.105.desc.other:0 "우리의 군대가 [fromfrom.solar_system.GetName] 성계에 있는 장막 균열을 성공적으로 무너뜨렸습니다. 장막과의 연결이 끊어지면서, 장막에서 나타난 적대적인 실체들은 빠르게 사라지고 무해해졌습니다.\n\n장막은 여전히 요동치고 있습니다 - 우리의 일은 결코 끝나지 않을 것만 같습니다."
 giga_hypersiphon.105.a:0 "흥미로운 기회로군..."
 giga_hypersiphon.105.b:0 "더욱 경계해야겠어."
 giga_hypersiphon.106.name:0 "장막 포탈 닫힘"
 giga_hypersiphon.106.desc:0 "우리의 군대가 [fromfrom.solar_system.GetName] 성계에 있는 에너지 균열을 성공적으로 무너뜨렸습니다. 근원과의 연결이 끊어지면서, 그곳에서 나타난 적대적인 실체들은 빠르게 사라지고 무해해졌습니다.\n\n판독 결과는 이 지역이 에너지가 전혀 남지 않은 안전한 지역임을 시사합니다."
 giga_hypersiphon.106.a:0 "바라건대 그대로 유지됐으면."
 giga_hypersiphon.107.name:0 "장막 침입 중단"
 giga_hypersiphon.107.desc.first:0 "[from.GetName]의 군대가 [fromfrom.solar_system.GetName] 성계에 있는 장막 균열을 성공적으로 무너뜨렸습니다. 장막과의 연결이 끊어지면서, 장막에서 나타난 적대적인 실체들은 빠르게 사라지고 무해해졌습니다.\n\n한 가지 의문이 남아있습니다: 이 문제에 대한 우리의 장기적인 해결책은 무엇일까요? 불안정성은 여전히 남아있고, 만약 상황이 변하지 않는다면 이런 일은 다시 일어날 것입니다. 닫힌 구멍 주위에는 여전히 침략자들의 희미한 표식이 남아있고, 우리 배에 남겨진 잔해들을 연구할 수 있습니다.\n\n아마도 그것은 우리가 찾는 답을 내놓을 것입니다."
 giga_hypersiphon.107.desc.other:0 "[from.GetName]의 군대가 [fromfrom.solar_system.GetName] 성계에 있는 장막 균열을 성공적으로 무너뜨렸습니다. 장막과의 연결이 끊어지면서, 장막에서 나타난 적대적인 실체들은 빠르게 사라지고 무해해졌습니다.\n\n장막은 여전히 요동치고 있습니다 - 근 시일 내에 또 다른 침입이 발생할 것입니다."
 giga_hypersiphon.107.a:0 "흥미로운 기회로군..."
 giga_hypersiphon.107.b:0 "아마 이번에는 닫혀있겠지..."
 giga_hypersiphon.108.name:0 "장막 포탈 닫힘"
 giga_hypersiphon.108.desc:0 "[from.GetName]의 군대가 [fromfrom.solar_system.GetName] 성계에 있는 에너지 균열을 성공적으로 무너뜨렸습니다. 근원과의 연결이 끊어지면서, 그곳에서 나타난 적대적인 실체들은 빠르게 사라지고 무해해졌습니다.\n\n판독 결과는 이 지역이 에너지가 전혀 남지 않은 안전한 지역임을 시사합니다."
 giga_hypersiphon.108.a:0 "이해했다."
 giga_hypersiphon.109.name:0 "장막 포탈 분석 완료"
 giga_hypersiphon.109.desc:0 "장막 침입자들이 남긴 잔여물에 대한 예비 분석을 통해 장막 도관과 추출기가 장막의 감퇴와 흐름에 어떤 영향을 미치고 있는지에 대한 통찰력을 얻을 수 있었습니다.\n\n안전 조치와 정확하게 실행된 의식을 신중하게 적용하면 연결의 부정적인 영향을 완화할 수 있지만 이러한 추가적인 조치들은 도관 시설의 경제적 이익을 감소시킬 수 있습니다.\n\n또는 발생하는 손상을 무시하고 수확 가능한 에너지를 끌어들여 도관의 강화에 집중할 수 있습니다. 이렇게 하면 도관의 이익이 개선되지만 부정적인 반응이 더 자주 발생할 수 있습니다."
 giga_hypersiphon.109.a:0 "흥미롭군."
 giga_hypersiphon.109.effect:0 "§Y$giga_situation_hypersiphon_instability$§! 상황에 §Y$giga_situation_hypersiphon_instability_approach_mitigate$§!와  §Y$giga_situation_hypersiphon_instability_approach_encourage$§! 접근이 가능해집니다."
 d_giga_hypersiphon_goop:0 "£blocker£ 장막 방전"
 d_giga_hypersiphon_goop_desc:0 "존재론적 차원에서 맹독을 띄는 응축된 사이오닉 정수와 엑토플라스마 잔여물입니다."
 d_giga_hypersiphon_psionic_anomaly:0 "£blocker£ 이상 지역"
 d_giga_hypersiphon_psionic_anomaly_desc:0 "자연의 법칙이 마치 바람을 맞는 나뭇가지처럼 휘어지는 지역."
 d_giga_hypersiphon_psionic_supercell_planet:0 "£blocker£ 사이오닉 슈퍼셀"
 d_giga_hypersiphon_psionic_supercell_planet_desc:0 "맹렬한 폭풍은 행성 표면 상의 거대한 지역을 증발시켜버리고, 거주할 수 없는 지역으로 만들며, 전 국민의 뇌리에 사이오닉 충격파를 보냅니다."
 d_giga_hypersiphon_psionic_supercell_artificial:0 "£blocker£ 사이오닉 시스템 간섭"
 d_giga_hypersiphon_psionic_supercell_artificial_desc:0 "거대한 사이오닉 이상 현상은 지역 시스템에 심각한 간섭을 일으킵니다. 충격파는 종종 전 국민의 집단 의식에 파급됩니다."
 NAME_Giga_Hypersiphon_Cows:0 "순회하는 망령"
 NAME_Giga_Hypersiphon_Cows_Fleet:0 "장막 소"
 giga_hypersiphon_shroud_cow_cow:0 "장막 암소"
 NAME_Giga_Hypersiphon_Tiyanki_Cow:0 "$giga_hypersiphon_shroud_cow_cow$"
 giga_hypersiphon_shroud_cow_bull:0 "장막 숫소"
 NAME_Giga_Hypersiphon_Tiyanki_Bull:0 "$giga_hypersiphon_shroud_cow_bull$"
