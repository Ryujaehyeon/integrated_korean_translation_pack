l_korean:
 giga_hypersiphon_power_estimate:0 "§H계산된 전력 추정치:§!\n- 최대 함대 수용량 한계: §Y[this.GigaGetNavalCap]§!\n- 현재 함대 규모: §Y[this.GigaGetUsedNavalCap]§!\n- 현재 함대 전력: §Y[this.GigaGetFleetPower]§!\n\n- 예상 전력: §Y[This.giga_hypersiphon_incursion_power]§!"
 giga_project_hypersiphon_portal:0 "장막의 습격 조사"
 giga_project_hypersiphon_portal_DESC:0 "우리를 공격한 적대적인 사이오닉 실체들이 사용한 신비한 장막 포털의 잔해는 우리의 $name_psy_siphon$ 네트워크를 더 잘 조정할 수 있게 해줄 수 있습니다."
 giga_tech_shroud_conduit:0 "장막 직접 연결"
 giga_tech_shroud_conduit_desc:0 "많은 명상과 연구 끝에, 사이오닉 능력자들은 장막이라 알려진 영역으로의 안정된 통로를 열 수 있다는 결론에 도달했습니다. 비록 아원자 규모이긴 하지만, 이 통로를 통제하며 사용한다면 우리의 사이오닉 능력자들은 위험하고 값비싼 의식을 통해서만 얻을 수 있는 에너지를 유용히 사용할 수 있게 될 겁니다."
 giga_tech_psychic_hypersiphon:0 "문을 열다"
 giga_tech_psychic_hypersiphon_desc:0 "장막은 이상한 세계입니다. 새로운 봉쇄 기술과 엄청난 텔레파시 능력을 결합함으로써 거시적인 규모에서 우리의 세계와 장막의 세계를 직접 연결하는 것이 가능해질 수 있습니다. 이를 통해 장막 도관이 크게 개선되어 우리의 번영을 새로운 차원으로 끌어올릴 수 있습니다. 원치 않는 에너지가 유출될 가능성은 피할 수 없지만 최악의 경우에도 최소한일 것입니다."
 giga_dialog.1401.name:0 "$name_psy_siphon$ 건설 현장"
 giga_dialog.1401.desc:0 "우리 공학자들이 미래의 $name_psy_siphon$ 건설 현장을 조성하였습니다. 이 시설은 그림자 자체에서 에너지를 흡수할 것입니다!\n\n완공되면, 우리의 행성 $building_giga_shroud_conduit$ 설치물의 힘이 크게 강화되어 번영의 새로운 정점에 도달할 것입니다."
 giga_dialog.1401.a:0 "좋아!"
 giga_dialog.1402.name:0 "$name_psy_siphon$ 뼈대 건설"
 giga_dialog.1402.desc:0 "$name_psy_siphon$의 격리 프레임이 완공되었습니다. 그것은 별의 형태를 취하는 순수한 사이오닉 에너지의 구체가 들어가도록 설계되었으며, 많은 실험실이 편입되어 장막을 더욱 연구할 수 있게 되었습니다. 우리는 이제 포탈 자체를 여는데 사용되는 실제 장비 건설을 시작해야 합니다."
 giga_dialog.1402.a:0 "환상적이야."
 giga_dialog.1404.name:0 "$name_psy_siphon$ 포탈 활성화"
 giga_dialog.1404.desc:0 "[giga_system.GetName] 성계에 장막과 우리 현실을 연결하는 휼륭한 포탈이 완전히 활성화되었습니다! 이제 이 인공적인 포탈에서 순수한 사이오닉 에너지가 쏟아져 나오고 있고, 이미 우리의 정신감응 능력자들은 장막과의 직접 연결을 통해 강화된 능력을 몸소 느끼고 있습니다! 우리 사회의 일부 회의적인 자들은 이 포탈이 '원치 않는 관심'을 끌 수 있다고 우려하지만, 과학자들은 차원간 여행이 절대 불가능하다는 것을 증명했고, 포탈은 너무 에너지가 넘쳐서 어떠한 형체도 통과할 수 없다고 확신하고 있습니다.\n\n\n...확실 하겠죠?\n\n\n§R...먹이...§!"
 giga_dialog.1404.a:0 "놀랍군!"
 psychic_hypersiphon_0:0 "$gc_mega$$name_psy_siphon$ 건설 현장"
 psychic_hypersiphon_0_DESC:0 "이 건설 현장은 미래에 $name_psy_siphon$ 건설의 기초로 사용될 것입니다."
 psychic_hypersiphon_0_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_megastructure$ - $giga_list_category_psionics$ - $giga_list_category_advanced_resource_production$\n§Y안개§! 포털을 열어 §Y$building_giga_shroud_conduit$§! 건물의 효과를 증가시킵니다. - $giga_list_potentially_hazardous$\n추가적인 하이퍼사이폰은 각 건물에 대한 효과를 증가시킵니다.\n§L우리 우주와 안개를 연결하는 거대한 포털로, 우리의 사이오닉 능력을 강화합니다.\" #megalistentry PSYCHIC HYPERSIPHON"
 psychic_hypersiphon_1:0 "$name_psy_siphon$ 코어"
 psychic_hypersiphon_1_DESC:0 "이 커다란 구조물은 장막에서 추출한 에너지를 억제하고 정제하는 주요 역할을 할 것입니다. 중앙의 원형 틀은 놀라운 양의 크레딧을 생성하기 위해 순수한 사이오닉 에너지로 만든 '별'을 고정하고 안정화합니다. 또한 실험실이 통합되어 사이오닉 에너지의 미묘한 특성을 면밀히 연구할 것입니다."
 psychic_hypersiphon_2:0 "$name_psy_siphon$ 첨탑"
 psychic_hypersiphon_2_DESC:0 "완전히 작동 중이며 안정화된 $name_psy_siphon$입니다. 우리의 현실과 장막을 연결하는 포탈이 완전히 활성화되었으며, 순수한 장막 정수를 방출하고 있습니다."
 giga_psy_siphon_interaction_title:0 "§H기능 잠금해제:§! 강화된 $building_giga_shroud_conduit$"
 giga_psy_siphon_interaction_desc:0 "§H강화된 $building_giga_shroud_conduit$§!\n각각의 $name_psy_siphon$이 건설될 때마다, £building£ §Y$building_giga_shroud_conduit$§! 건물은 추가 일자리를 제공하고, 행성의 사이오닉 팝마다 £giga_sr_psionic_sublimate£ §Y$giga_sr_psionic_sublimate$§!을 생산합니다.\n\n이로 인해 관로에서 약간의 §R불안정성§!이 발생할 수 있지만, 이는 큰 영향을 미칠 가능성은 낮습니다..."
 psychic_hypersiphon_3_aeternum:0 "에테르나이트 $name_psy_siphon$"
 psychic_hypersiphon_3_aeternum_DESC:0 "에테르눔이 아주 오래 전에 건설한 완전히 작동하는 $name_psy_siphon$입니다. 우리의 현실과 장막을 연결하는 포탈이 완전히 활성화되었으며, 이 장막에 대한 연결은 순수한 장막 에센스를 방출하여 우리의 사이오닉 잠재력을 크게 향상시킵니다."
 building_giga_shroud_conduit:0 "장막 도관"
 building_giga_shroud_conduit_desc:0 "거대한 사이오닉 시설이 장막의 힘을 강제로 추출하여 행성 표면에 재도포하여 텔레파시 능력을 크게 향상시킵니다."
 building_giga_shroud_conduit_hypersiphon_hint:0 "\n§Y$psychic_hypersiphon_2$§! 메가구조물을 건설하면 추가 일자리를 제공하고 행성의 각 £pop£ §YPsionic Pop§!에 대해 £giga_sr_psionic_sublimate£ §Y$giga_sr_psionic_sublimate$§!를 생성합니다."
 building_giga_shroud_conduit_hypersiphon_safe_effect:0 "\n이 건물을 강화하는 사이킥 하이퍼사이폰: §Y[owner.GetHypersiphonNetworkSize]§!\n\n§Y[this.GetHypersiphonPopCount]§! 사이오닉 팝으로부터 £giga_sr_psionic_sublimate£ §Y$giga_sr_psionic_sublimate$§! 생성"
 building_giga_shroud_conduit_hypersiphon_effect:0 "\n이 건물을 강화하는 사이킥 하이퍼사이폰: §Y[owner.GetHypersiphonNetworkSize]§!\n\n§Y$giga_sr_psionic_sublimate$£giga_sr_psionic_sublimate£§! 및 §R불안정성§!을 §Y[this.GetHypersiphonPopCount]§! 사이오닉 팝으로부터 생성합니다."
 decision_hypersiphon_mass_summon:0 "$shroud_summoned_army_plural$ 대규모 소환"
 decision_hypersiphon_mass_summon_effect:0 "행성에 존재하는 [owner.GetGigaShroudConduitJobIcon] §Y[owner.GetGigaShroudConduitJob]§! 직업과 £pop£ §Y사이오닉 팝§!의 수에 비례해 §G[owner.GetHypersiphonSummonCount]§! §Y$shroud_summoned_army_plural$§!을 소환합니다."
 decision_hypersiphon_mass_summon_desc:0 "복잡한 의식 준비와 대량의 농축된 $giga_sr_psionic_sublimate$를 통해, 장막 존재를 대규모로 소환할 수 있습니다."
 job_giga_shroud_conduit_worker:0 "장막 도관 기술자"
 job_giga_shroud_conduit_worker_plural:0 "장막 도관 기술자"
 job_giga_shroud_conduit_worker_desc:0 "$building_giga_shroud_conduit$으로 열린 극소 장막 터널을 관리하는 직책의 전문가들."
 job_giga_shroud_conduit_worker_effect_desc:0 "$job_giga_shroud_conduit_worker_swap_plural_with_icon$는 £energy£ §Y$energy$§!를 채널링하여 £unity£ §Y$unity$§!를 생산하고 행성의 생산성을 향상시킵니다."
