 mod_job_giga_shroud_conduit_worker_per_pop:0 "§G+1§! [giga_shroud_conduit_worker.GetName] 직업 per $VALUE$ 팝"
 mod_job_giga_shroud_conduit_worker_per_pop_short:0 "\n$VALUE$ £pop£마다 £mod_job_giga_shroud_conduit_worker_add£ §G+1§!"
 job_giga_shroud_conduit_worker_icon:0 "£job_giga_shroud_conduit_worker£"
 job_giga_shroud_conduit_priest:0 "장막 전도사"
 job_giga_shroud_conduit_priest_plural:0 "장막 전도사"
 job_giga_shroud_conduit_priest_desc:0 "사이오닉 성직자는 $building_giga_shroud_conduit$에 의해 생성된 섬세한 연결을 관리하는 임무를 맡았습니다."
 job_giga_shroud_conduit_priest_effect_desc:0 "$job_giga_shroud_conduit_priest_swap_plural_with_icon$는 £energy£ §Y$energy$§!를 사용하여 £unity£ §Y$unity$§!를 생산하고, £amenities£ $MOD_PLANET_AMENITIES_ADD$를 제공하며, 행성의 생산성을 향상시킵니다."
 job_giga_shroud_conduit_priest_swap_plural_with_icon:0 "[giga_shroud_conduit_priest.GetIcon] [giga_shroud_conduit_priest.GetNamePlural]"
