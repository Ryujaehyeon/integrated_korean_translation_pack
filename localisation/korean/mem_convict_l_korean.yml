 MEM_CONVICT_STUDY_POD:0 "강하정 연구"
 MEM_CONVICT_STUDY_POD_DESC:0 "[mem_convict_the_planet.GetName]에서 발견된 포드는 우리의 수도 행성으로 가져와 연구되고 있습니다. 시간이 지나면 우리는 새겨진 글자를 이해하고 어쩌면 내부의 외계인을 되살릴 수 있을 것입니다."
 mem_convict_category:0 "불시착"
 mem_convict_category_desc:0 "우리는 지표면에서 긴 협곡을 분명히 볼 수 있으며, 그 끝에 배가 반쯤 땅에 묻힌 것으로 보입니다. 오래 전에 누군가 이 [This.GetPlanetMoon]에 불시착했습니다."
 mem_convict.1.name:0 "불시착"
 mem_convict.1.desc:0 "[Root.GetName]은(는) [From.GetName] 표면의 계곡이 실제로 불시착의 결과임을 확인할 수 있었습니다. 이 사건은 약 천 년 전에 발생한 것으로 추정됩니다.\n\n승무원은 사고로 사망한 것으로 보이지만 [Leader.GetName]은(는) 우주선 내부에서 여전히 작동하는 정지장을 발견했습니다. 정지장은 우리가 아직 해독할 수 없는 외계 비문으로 덮여 있지만 안전하게 분리하여 행성에서 연구할 수 있습니다."
 mem_convict.1.a:0 "연구를 위해 [Owner.Capital_Scope.GetName]에 장치를 가져와라."
 mem_convict.1.b:0 "신경 쓸 필요 없다."
 mem_convict.1.c:0 "장치를 끄고 외계인 놈을 죽여라."
 mem_convict.2.name:0 "감옥"
 mem_convict.2.desc:0 "우리 연구원들이 [mem_convict_the_planet.GetName]의 표면에서 회수한 정지 포드의 비문을 번역하는 데 성공했습니다. \n\n이 포드는 여러 범죄로 추방 중이던 위험한 범죄자 레테리 라이힌이 포함되어 있다고 경고합니다. 정확한 혐의는 명시되어 있지 않지만, 맥락상 라이힌은 대규모 음모에 연루된 어떤 공공 하인으로 보입니다."
 mem_convict.2.a:0 "죄수를 석방해라."
 mem_convict.2.b:0 "열지 않는 게 좋을 거 같군."
 mem_convict.3.name:0 "레테리 린"
 mem_convict.3.desc:0 "외계 포드의 죄수가 이제 깨어났습니다. 간단한 심문 후, 그는 자신의 포드에 새겨진 내용과 상충하는 이야기를 제공했습니다. 그는 렌단 연합 내의 진정한 음모자들에 의해 개인적인 이익을 위해 렌단 사람들이 소중히 여기는 모든 것을 파괴하려고 했던 부당한 투옥을 당했다고 주장합니다. \n\n이제 그의 문명이 더 이상 존재하지 않으므로, 그는 자신의 형을 존중할 이유가 없다고 간청합니다. 그는 사면과 맞바꾸기 위해 행정관으로서의 서비스를 제안합니다."
 mem_convict.3.a:0 "합류를 환영한다."
 mem_convict.3.a.tooltip:0 "랜덤한 제독에게 §H스텔스 전략가§! 특성을 부여합니다."
 mem_convict.3.a.auth:0 "봉사를 통해 구원을 얻을 것이다."
 mem_convict.3.a.ega:0 "누구나 두 번째 기회를 받을 자격이 있다."
 mem_convict.3.a.mat:0 "죽은 나라의 판결 따위 의미 없다."
 mem_convict.3.a.phile:0 "자네는 우리에게 자네의 잃어버린 문화에 대해 많은 것을 말해 줄 수 있네."
 mem_convict.3.b:0 "위험을 감수할 필요는 없지."
 mem_convict.3.b.tooltip:0 "총독 린은 추방될 것입니다."
 mem_convict.3.b.auth:0 "이렇게 쉽게 용서받을 순 없어."
 mem_convict.3.b.ega:0 "법과 질서를 존중해야 합니다."
 mem_convict.4.name:0 "죄지은 총독"
 mem_convict.4.desc.corrupt:0 "감옥에서 석방된 [retheri_rhin.GetName] 총독이 횡령, 협박, 암살, 테러 등 다양한 범죄에 연루되었다는 보고를 받고 있습니다.\n\n직접적인 증거는 없지만 그의 의심스러운 활동은 어마어마합니다."
 mem_convict.4.desc.honest:0 "우리가 감옥 포드에서 석방한 주지사 [retheri_rhin.GetName]는 정의롭고 올바른 시민이자 유능한 공직자임을 입증했습니다. 그에 대한 혐의가 사실이라면 - 그를 아는 사람들은 이를 믿기 어려워합니다 - 그는 우리가 그에게 부여한 구원의 기회를 양손으로 움켜잡고 있습니다."
 mem_convict.4.a:0 "그 자를 믿는건 실수였다."
 mem_convict.4.b:0 "우리는 그 자를 믿네."
 mem_convict.61.name:0 "침입"
 mem_convict.61.desc:0 "미확인 함선이 [FROM.Solar_System.GetName]에 도착했습니다. 장거리 추적은 [origin_system.GetName] 성계에서 시작된 경로를 제안합니다.\n\n그들은 우리를 환영합니다."
 mem_convict.7.desc:0 "주의! 이것은 완전 자동화된 최고 렌단 사법선 그리므 포텐트입니다. \n\n당신은 정의를 피하기 위해 당신의 도움을 받고 있는 위험한 개인 레테리 라인(Retheri Rhin)을 숨기고 있습니다. 그를 놓치지 마십시오. \n\n그를 저에게 넘겨주시면 정의가 실현될 것입니다. 렌단 민족은 죽었지만, 그들의 정의는 저 안에 살아 있습니다."
 mem_convict.7.a:0 "좋다. 그를 데려가라."
 mem_convict.7.b:0 "안된다."
 mem_convict.7.c:0 "우리가 거절한다면?"
 mem_convict.7.c.responce:0 "그것은 매우..... 고통스러울 것입니다.저는 그걸 추천하지 않습니다."
 mem_convict.7.d:0 "린은 더 이상 우리와 함께하지 않네."
 mem_convict.7.d.response:0 "제 내장 거짓말 탐지기는 이것이 사실이라고 제안합니다. 그럼 즐거운 하루 보내세요.\n\n그리고 다음번에는, 아무나 해동하지 마세요."
 mem_convict.7.e:0 "네가 무슨 말을 하는지 모르겠군."
 mem_convict.7.e.response:0 "제 내장 거짓말 탐지기는 이것이 사실이라고 제안합니다. 그럼 즐거운 하루 보내세요."
 mem_convict.8.desc:0 "음, 당신이 교훈을 배웠기를 바랍니다. [This.GetName] 행성의 황폐화는 마땅한 일입니다.\n\n저는 지금 떠나야 합니다. 당신이 한 일에 대해 생각하기를 바랍니다."
 mem_convict.8.a:0 "썩 꺼져!"
 mem_convict.10.name:0 "정지된 함선"
 mem_convict.10.desc:0 "[Root.GetName]은(는) [From.GetName] 표면의 계곡이 실제로 불시착의 결과임을 확인할 수 있었습니다. 이 사건은 약 천 년 전에 발생한 것으로 추정됩니다. 함선의 특이한 특징 중 하나는 화물창에 있는 정지장이지만 오래전에 고장이 났고 탑승자의 먼지만 남았습니다.\n\n[Leader.GetName]은(는) 우리 연구에 유용할 수 있는 우주선의 특이한 설계에 대한 통찰을 얻을 수 있었습니다."
 bombardment_mem_armageddon:0 "$bombardment_armageddon$"
 bombardment_mem_armageddon_desc:0 "$bombardment_armageddon_desc$"
