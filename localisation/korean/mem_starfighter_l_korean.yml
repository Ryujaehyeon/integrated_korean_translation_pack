l_korean:
 mem_starfighter_admiral_trait:0 "은하 전투의 챔피언"
 mem_starfighter_admiral_trait_desc:0 "이 지도자는 비디오 게임을 하는 엄격한 과정을 통해 원시 행성에서 모집되었습니다."
 mem_starfighter_general_trait:0 "$mem_starfighter_admiral_trait$"
 mem_starfighter_general_trait_desc:0 "$mem_starfighter_admiral_trait_desc$"
 MEM_STARFIGHTER_PROJECT:0 "은하 전투의 챔피언 고용"
 MEM_STARFIGHTER_PROJECT_DESC:0 "[primitive_civ.Capital_Scope.GetName]에 존재하는 한 [primitive_civ.GetAdj] 생명체가 E 스포츠로 위장된 전투 시뮬레이션에서 많은 잠재 능력을 보였습니다. 우리 요원들은 이 개체를 방문해야 할 것입니다."
 mem_starfighter_admiral_modifier:0 "은하 전투 분석 데이터"
 mem_starfighter_general_modifier:0 "$mem_starfighter_admiral_modifier$"
 mem_starfighter.2.name:0 "은하 전투"
 mem_starfighter.2.desc:0 "§Y[From.Capital_Scope.GetName]§!의 주민들, 특히 젊은이들은 많은 자유 시간을 원시적인 전자 오락에 소비합니다. 이는 우리 관측소의 연구원들에게 아이디어를 주었습니다. \n\n자체 브랜드의 오락을 제작하고 이를 인구 사이에 은밀히 배포함으로써, 우리는 그들의 문명과의 호환성을 측정하고 향후 행동 방침을 평가할 수 있으며, 심지어 우리에게 유용한 지역 인재를 식별할 수도 있습니다. 제안된 프로그램은 §SGalaxy Warfare§!로, 우리의 군사 교리에 기반한 일련의 게임으로, 우주와 행성을 모두 포함하며, 현지 하드웨어에 맞게 조정되었습니다."
 mem_starfighter.2.a:0 "흥미로운 아이디어군. 진행하도록."
 mem_starfighter.4.name:0 "은하 전투의 챔피언"
 mem_starfighter.4.desc:0 "얼마 전, 우리는 우리의 군사 교리에 기반한 여러 형태의 전자 오락을 원시 세계인 §Y[From.Capital_Scope.GetName]§!에 은밀히 삽입했습니다. 그러나 그로부터 얻은 데이터 중 대부분은 흥미로운 결과를 가져오지 않았습니다. 그럼에도 불구하고 한 특정 플레이어가 우리의 주목을 끌었습니다."
 mem_starfighter.4.desc.admiral:0 "$mem_starfighter.4.desc$ \n\n우주 기반 시험 동안, [gamer.GetSheHe]는 [gamer.GetHerHis] 동료들뿐만 아니라 우리 군 사령부를 크게 초월했습니다. [gamer.GetHerHisCap] 점수는 우리가 이전에 가능하다고 믿었던 것보다 약 11% 더 높습니다."
 mem_starfighter.4.desc.general:0 "$mem_starfighter.4.desc$ \n\n지상 기반 시험 동안, [gamer.GetSheHe]는 [gamer.GetHerHis] 동료들뿐만 아니라 우리 군 지휘부를 크게 초월하며 인상적인 전술 능력을 보여주었고, 거의 피해 없이 가장 어려운 임무를 성공적으로 완수했습니다."
 mem_starfighter.4.a:0 "[gamer.GetSheHeCap]는 우리에게 귀중한 자산이 될 수 있습니다."
 mem_starfighter.4.b:0 "[gamer.GetHerHis]의 플레이를 우리의 교리에 통합합니다."
 mem_starfighter.5.name:0 "챔피언 고용됨"
 mem_starfighter.5.desc:0 "우리의 납치 셔틀이 [gamer.GetName]를 [primitive_civ.Capital_Scope.GetName]에서 성공적으로 회수했습니다. 초기 혼란 후, 관찰 연구원들이 [gamer.GetHerHim]에게 상황을 설명하는 데 성공했습니다. \n\n[gamer.GetHerHis]의 은하 전쟁 기술 덕분에 우리의 군사 지휘에 합류하라는 제안을 받은 [gamer.GetSheHe]는 이해할 수 없는 청소년 속어로 흥분한 발언을 하였으며, 이는 합리적으로 \"예\"로 해석될 수 있습니다."
 mem_starfighter.5.tooltip.admiral:0 "새로운 §Y제독§!을 얻는다."
 mem_starfighter.5.tooltip.general:0 "새로운 §Y장군§!을 얻는다."
