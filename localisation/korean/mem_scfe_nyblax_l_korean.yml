 mem_scfe_syke:0 "사이크"
 mem_scfe_decision_planet_illusion_rune:0 "환상 룬 테라포밍"
 mem_scfe_decision_planet_illusion_rune_desc:0 "행성에 두 개의 행성 특성을 추가합니다."
 mem_scfe_decision_two_prospect_effects_short:0 "행성에 무작위로 두 개의 §Y행성 특성§!을 추가합니다."
 mem_scfe_decision_planet_haste_rune:0 "신속 룬 가속"
 mem_scfe_decision_planet_haste_rune_desc:0 "얼음파괴의 늑대처럼 빠릅니다."
 r_mem_scfe_damage_rune:0 "강력한 룬"
 r_mem_scfe_damage_rune_desc:0 "강력한 룬은 §HNyblax§!의 요청으로 기계 제국에 의해 만들어졌습니다. 처음 테스트했을 때, 룬은 너무 많은 에너지를 방출하여 전체 항성계를 파괴했습니다. 룬은 그것을 소유한 자에게 큰 힘을 제공합니다."
 r_mem_scfe_haste_rune:0 "신속의 룬"
 r_mem_scfe_haste_rune_desc:0 "신속 룬은 정신주의 문명에 의해 만들어졌습니다. 그들은 §HNyblax§!를 마치 그들의 신처럼 숭배했습니다. Nyblax는 그들의 신념을 이용하여 신속 룬을 만들도록 속였고, 그 과정에서 그들이 죽게 만들었습니다."
 haste_rune_activated:0 "§H결정 잠금 해제:§! §G$mem_scfe_decision_planet_haste_rune$§!, 하나의 행성에서 시간을 가속화할 수 있는 능력을 부여하며, §Y건물 건설 속도와 장애물 제거 속도§!를 증가시킵니다."
 r_mem_scfe_illusion_rune:0 "환상 룬"
 r_mem_scfe_illusion_rune_desc:0 "위장 룬은 위장할 수 있는 인류형 생명체의 한 종이 만들어낸 것으로, §HNyblax§!로부터 숨기 위해 룬을 사용하려 했으나 사라졌습니다. 위장 룬은 사용자가 현실 자체를 절대적으로 제어할 수 있게 하며, 반물질을 물질로 변환합니다."
 mem_scfe_illusion_rune_activated:0 "§H결정 잠금 해제:§! §G$mem_scfe_decision_planet_illusion_rune$§!, 행성에 두 개의 행성 특성을 추가할 수 있는 능력을 부여합니다."
 r_mem_scfe_arcane_rune:0 "신비로운 룬"
 r_mem_scfe_arcane_rune_desc:0 "첫 번째 룬, 즉 신비로운 룬은 샥젬 과학자 보르타에 의해 만들어졌습니다. 그는 룬을 제작하는 데 필요한 힘을 얻기 위해 자신의 민족으로부터 생명 에너지를 빼앗았습니다."
 mem_scfe_arcane_rune_activated:0 "수확한 샤크젬 사람들의 영혼으로 §Y총독§!, §Y과학자§!, §Y제독§! 또는 §Y장군§!을 생성합니다."
 r_mem_scfe_invisibility_rune:0 "투명성 룬"
 r_mem_scfe_invisibility_rune_desc:0 "투명성 룬에 대한 정보는 거의 알려져 있지 않습니다. 이 룬은 §HNyblax§!를 위해 제작되었으나, 제작자들의 태만으로 인해 잃어버렸습니다."
 r_mem_scfe_regeneration_rune:0 "재생 룬"
 r_mem_scfe_regeneration_rune_desc:0 "재생 룬은 처음 사용될 때 하나의 행성 같은 존재로 합쳐진 하이브 마인드 존재에 의해 만들어졌습니다. 이 룬은 손상된 부분을 매우 빠르게 치유하고 복구할 수 있는 힘을 가지고 있습니다."
 mem_scfe_planet_haste_rune_boost:0 "신속 룬 가속"
 mem_scfe_planet_haste_rune_boost_desc:0 "이 행성은 현재 신속 룬에 의해 가속화되고 있습니다."
 mem_scfe_planet_illusion_rune_boost:0 "환상 룬 테라포밍"
 mem_scfe_planet_illusion_rune_boost_desc:0 "이 행성의 환경은 §Y환상 룬§!에 의해 정화되었습니다."
 mem_scfe_invisibility_rune:0 "$r_mem_scfe_invisibility_rune$"
 mem_scfe_invisibility_rune_desc:0 "우리 제국은 투명 룬의 힘으로 은폐되어 적의 감지기를 차단하고 우수한 전투 능력을 부여받습니다."
 mem_scfe_invisibility_rune_fc:0 "$r_mem_scfe_invisibility_rune$"
 mem_scfe_invisibility_rune_fc_desc:0 "$mem_scfe_invisibility_rune_desc$"
 mem_scfe_regeneration_rune:0 "$r_mem_scfe_regeneration_rune$"
 mem_scfe_regeneration_rune_desc:0 "재생 룬은 우리의 함선이 장갑과 선체를 치유할 수 있게 해줍니다."
 mem_scfe_power_rune_boost:0 "파괴 룬의 힘"
 mem_scfe_power_rune_boost_desc:0 "파괴 룬은 우리의 함선이 파괴적인 궤도 폭격을 할 수 있게 해줍니다."
 mem_scfe_arcane_rune.1.name:0 "합성체 조립"
 mem_scfe_arcane_rune.1.desc:0 "이제 우리는 샥젬 조상의 영혼으로부터 인공 생명체를 하나 만들어 우리를 도울 수 있습니다. 남은 질문은 이 §YArcane Synthetic§!이 어떤 목적을 가져야 할까요?"
 mem_scfe_arcane_rune.1.a:0 "공식 건설 요청드립니다."
 mem_scfe_arcane_rune.1.b:0 "과학자를 만들어 주십시오."
 mem_scfe_arcane_rune.1.c:0 "사령관을 임명하십시오"
 mem_scfe_ghastly_eyrie_init.1.name:0 "이상한 방사선"
 mem_scfe_ghastly_eyrie_init.1.desc:0 "§HHyrokkin§! 항성계에 진입하자, 우리의 과학선이 행성 §HMoxxu§!에서 이상한 방사선 신호를 감지했습니다."
 mem_scfe_ghastly_eyrie_init.1.a:0 "팀을 보내 조사합니다."
 mem_scfe_ghastly_eyrie_site:0 "목스 유적지"
 mem_scfe_ghastly_eyrie_relic_world_site_desc:0 "우리의 과학선이 §HMoxxu§!에서 이상한 방사선 신호를 감지했습니다."
 mem_scfe_ghastly_eyrie.1.name:0 "긴 여정"
 mem_scfe_ghastly_eyrie.1.desc:0 "행성 표면을 스캔한 결과, 우리 팀은 가장 깊은 심연 속에서 부패한 도시를 발견했습니다. 도시에서 방출되는 방사선이 너무 강렬하여 우리의 함선 기기를 방해하고, 협곡 내 항해를 불가능하게 만듭니다. 우리의 고고학자들은 조사를 계속하기 위해 도보로 진행할 것입니다."
 mem_scfe_ghastly_eyrie.1.a:0 "계속하세요."
 mem_scfe_ghastly_eyrie.2.name:0 "샥젬스"
 mem_scfe_ghastly_eyrie.2.desc:0 "심연의 바닥에 가까워지면 도시가 있습니다. 우리 팀의 조사에 따르면, 이 도시는 한때 심연 위에 떠 있었으나, 아직 밝혀지지 않은 이유로 그 떠 있는 기계 장치가 고장났습니다.\n\n팀이 유적에 접근하자 희미한 소리가 공기를 가득 채웁니다 - 대화하는 목소리, 아기들의 웃음, 그리고 먼 곳에서 들리는 울음소리. 일부 승무원은 이 도시가 환청에 시달리고 있다고 믿고 앞으로 나아가는 것을 주저하지만, 더 회의적이고 모험심이 강한 이들은 계속 나아갑니다. 그때 영혼 같은 존재들이 그들 앞에 나타납니다."
 mem_scfe_ghastly_eyrie.3.desc:0 "§BFear not, travelers. We are the Shakzems, and we come in peace.§!\n\n그들 중 한 존재가 대표로 나서며 평화로운 의도를 재확인합니다. 그들은 오래전에 멸망한 문명의 마지막 잔존자라고 설명합니다. 호기심이 생긴 우리의 고고학자들은 그들의 민족이 어떻게 되었는지 묻고, 그래서 샤크젬은 보르타와 드니키의 이야기를 들려주기 시작합니다."
 mem_scfe_ghastly_eyrie.4.name:0 "연인 간의 다툼"
 mem_scfe_ghastly_eyrie.4.desc:0 "그들의 이야기에 따르면, 보르타는 샥젬이 알고 있는 가장 위대한 과학자 중 한 명이었습니다 - 그들의 신 고'달이 나타나기 전까지 말입니다.\n\n§B다른 샥젬들은 그 존재를 신으로 숭배했지만, 보르타와 드니키는 진실을 보았습니다... 그것은 신이 전혀 아니었습니다! 그 생물은 단순히 은하에서 독특한 우주 생명체인: 나이블락스였습니다!§!\n\n그들은 보르타가 나이블락스의 비밀 프로젝트를 돕는 데 깊이 관여하게 되었다고 계속 설명했습니다. 그러나 어느 날, 드니키는 끔찍한 발견을 하게 되었습니다 - 보르타와 나이블락스는 샥젬 시민들을 그들의 사악한 실험을 위한 희생으로 사용하고 있었습니다. 그렇게 연인들의 비극적인 다툼이 시작되었습니다..."
 mem_scfe_ghastly_eyrie.4.a:0 "비극적입니다."
 mem_scfe_ghastly_eyrie.5.name:0 "첫 번째 룬"
 mem_scfe_ghastly_eyrie.5.desc:0 "논쟁은 재앙으로 끝났습니다. Vorta의 범죄가 공개되면서 내전이 촉발되었습니다. 그의 실험은 그가 §Y힘의 룬§!이라고 부르는 것을 만드는 데 집중되었습니다. 이는 생명체의 생명 에너지를 흡수하여 만들어진 신비로운 룬이었습니다. 충분한 룬이 있다면 Vorta는 또 다른 Nyblax를 만들 수 있다고 믿었습니다. 그의 의도가 귀족적일 수 있었지만, 그의 방법은 괴물과 다름없었습니다.\n\n결국 Vorta는 그가 §Y신비로운 룬§!이라고 이름 붙인 첫 번째 룬을 만드는 데 성공했습니다.\n\n하지만 룬이 완성되자 Nyblax 자체가 갈등에 개입하여 도시를 초토화했습니다. 그것은 모든 것을 찢어놓았고, 남아 있던 모든 Shakzem을 죽였습니다."
 mem_scfe_ghastly_eyrie.6.desc:0 "니블락스가 깨닫지 못한 것은 단 하나의 룬으로는 그들의 욕망을 충족하기에 충분하지 않다는 것이었습니다.\n\n전쟁 중, 드니키는 룬을 차지하는 데 성공했지만, 에크보르 전투에서 손상되었습니다. 이제 샤크젬 문명의 잔존자들이 이 유물을 소유하고 있으며, 대가를 지불하면 우리에게 제공할 의사가 있는 것 같습니다.\n\n룬이 손상되었기 때문에 더 이상 기능하지 않으며, 이는 수많은 샤크젬의 생명이 헛되이 희생되었음을 의미합니다. 그 힘을 회복하기 위해서는 또 다른 희생이 필요합니다.\n\n그때에야 샤크젬들은 §Y신비로운 룬§!을 넘겨줄 것입니다."
 mem_scfe_ghastly_eyrie.6.a:0 "이렇게 복잡한 상황이라니..."
 mem_scfe_ghastly_eyrie.11.name:0 "희생"
 mem_scfe_ghastly_eyrie.11.desc:0 "샥젬스가 답변을 기다리고 있습니다. 누구를 희생해야 할까요?"
 mem_scfe_ghastly_eyrie.11.a:0 "함장이 희생하지 않는다면 옳지 않을 것입니다."
 mem_scfe_ghastly_eyrie.11.b:0 "§Y[Root.Leader.GetName]§!는 너무 중요하니, 다른 사람을 희생하세요."
 mem_scfe_ghastly_eyrie.12.name:0 "신비로운 룬"
 mem_scfe_ghastly_eyrie.12.desc:0 "우리의 장교는 고대 장치 안에 배치되어, 의식을 완수하기 위해 생명력이 소모되었습니다. 희생이 이루어지자마자 기계는 무너졌고, 잔존자들은 사라지며 룬만 남겼습니다.\n\n잔존자들이 진정한 영혼이었는지, 아니면 장치에 의해 생성된 고급 홀로그램 투영에 불과했는지는 불확실합니다. 그러나 결국, 우리의 장교의 대가로 우리는 §Y신비한 룬§!을 얻었습니다."
 mem_scfe_ghastly_eyrie.12.a:0 "가치 있는 희생."
 mem_scfe_ghastly_eyrie.13.name:0 "신비로운 룬"
 mem_scfe_ghastly_eyrie.13.desc:0 "희생이 성공하기 위해, 우리는 일탈 드론 그룹을 모아 우리의 약속을 이행했습니다. 의식이 완료되자마자, 기계는 무너졌고, 잔존자들은 사라지며 룬만 남겼습니다.\n\n샤크젬이 진정한 영혼인지 아니면 장치에 의해 생성된 고급 홀로그램 투영인지 여부는 불확실합니다. 하지만 결국, 우리는 이제 §YThe Arcane Rune§!을 소유하게 되었습니다."
 mem_scfe_ghastly_eyrie.13.mach:0 "오류: 영혼을 찾을 수 없습니다."
 mem_scfe_ghastly_eyrie.13.hive:0 "벌레집을 위해 무엇이든."
 mem_scfe_techis_init.1.name:0 "파괴된 항성계"
 mem_scfe_techis_init.1.desc:0 "§Y[Root.GetName]§!는 §HKhnum§! 항성계가 한동안 황폐화되었다고 보고합니다. 그 파괴의 원인은 별 자체가 아니라, 행성 중 하나에서 발생한 대규모 에너지 급증이었습니다."
 mem_scfe_techis_init.1.a:0 "무슨 일이 있었는지 알아보세요!"
 mem_scfe_techis_site:0 "타르쿤 발굴지"
 mem_scfe_techis_relic_world_site_desc:0 "장거리 스캔 결과, 이 항성계는 비장 행성에서 발생한 전력 급증으로 파괴된 것으로 나타났습니다."
 mem_scfe_techis.1.name:0 "초기 보고서"
 mem_scfe_techis.1.desc:0 "우리의 초기 스캔 결과는 정확했습니다. 수천 년 전, 이 시스템 전체는 거대한 에너지 파동에 의해 황폐화되어 모든 행성이 파괴되고 태양은 블랙홀로 붕괴되었습니다. 행성들은 완전히 파괴되었지만, 일부 파편이 남아 있으며, 그 중 일부는 고대 문명의 유적처럼 보이는 흔적을 여전히 지니고 있습니다."
 mem_scfe_techis.1.a:0 "그들을 확인해 보세요."
 mem_scfe_techis.2.name:0 "기계 행성"
 mem_scfe_techis.2.desc:0 "우리 과학자들은 잔여 에너지 수치가 가장 높은 유적을 조사하였고, 이 행성의 표면이 한때 금속과 전선으로 덮여 있었으며 거대한 슈퍼컴퓨터를 닮았다는 사실을 발견했습니다. 이 행성은 전체 표면에서 데이터 허브를 호스팅하고 상호 연결할 수 있는 능력을 가지고 있었습니다. 놀랍게도, 일부 데이터 노드는 여전히 작동 중이며, 우리는 우리의 시스템을 연결하고 이 행성의 메인프레임에 해킹할 수 있을지도 모릅니다."
 mem_scfe_techis.2.a:0 "연결을 시작합니다."
 mem_scfe_techis.3.name:0 "실패한 기록 보관소"
 mem_scfe_techis.3.desc:0 "행성의 데이터 스트림과 인터페이스를 만드는 것은 예상보다 더 어려운 일이었습니다. 어려움에도 불구하고, 우리의 해커들은 파괴된 아카이브 구조물에 저장된 데이터에 접근하는 데 성공했습니다.\n\n§B'위치 불명 중복 데이터, 로컬 백업 생성 중...\nnyblax.log 로딩 중...\n로그: 식별되지 않은 생물체 감지됨.\n로그: 코드 베타 외계인 할당 중.\n로그: 방어 프로토콜 작동 중.\n로그: 베타 외계인이 적대적이지 않음.\n로그: 사회적 상호작용 시작...'§!\n\n시스템이 'Nyblax.log'라는 파일을 반복 재생하는 루프에 갇혔습니다. 이 문명은 외계 존재와 조우하였고, 그들과 상호작용을 시작한 것으로 보입니다."
 mem_scfe_techis.3.a:0 "계속 읽어보세요!"
 mem_scfe_techis.4.name:0 "니블락스"
 mem_scfe_techis.4.desc:0 "시스템 로그는 조각나고 해석하기 어려워 해커들이 예상하지 못한 도전 과제가 되었습니다. 그러나 그들의 보고서는 Nyblax로 확인된 존재의 도착을 확인합니다.\n\n수년 동안 Nyblax와 기계들은 거래를 해왔습니다. 이 생물은 만난 다른 문명에서 고급 기술을 공유하였고, 그 대가로 기계들은 그들이 The Rune이라고 부르는 무언가를 만들기 위해 작업했습니다."
 mem_scfe_techis.5.desc: "According to their logs, the machines successfully created the rune, but unfortunately, no details were recorded on how it was done.\n\nBefore handing it over to the Nyblax, they decided to test the rune. Our team has concluded that this test is what triggered the catastrophic collapse of the entire system since their last log entry reads as follows:\n\n§BLog: Rune - Planetary Matrix connection established.\nLog: Initiating Rune debug.§!\n§RSystem Failing\nSaving nyblax.log\nSystem Failure\nCorrupt data\nCorrupt data\nCorrupt data\nCorrupt data\nCorrupt data\nCorrupt data\nCorrupt data\nCorrupt data\nCorrupt data\nCorrupt data\nCorrupt data§!"
 mem_scfe_techis.5.a:0 "그런 힘. 룬은 지금 어디에 있습니까?"
 mem_scfe_techis.6.name:0 "강력한 룬"
 mem_scfe_techis.6.desc:0 "우리 팀은 잔해 속에서 룬을 찾기 위해 §Y[Root.GetName]§!로 돌아갔습니다. 함선의 스캐너를 사용하여 남아 있는 에너지 신호의 출처를 정확히 파악했습니다. 경로가 설정되자, 승무원은 행성의 잔해를 통과하여 우주 진공 속에 떠 있는 룬을 발견했습니다."
 mem_scfe_techis.6.a:0 "강력한 룬과 함께라면 우리는 어떻게 패배할 수 있겠습니까?"
 mem_scfe_narrow_maze_init.1.name:0 "신호 탐지"
 mem_scfe_narrow_maze_init.1.desc:0 "§Y[Root.GetName]§!는 행성 §HNinsun§!에서 발생하는 드래곤 모양의 먼지 구름이라는 특이한 광경을 목격했습니다. 장거리 스캐너는 이 행성이 버려진 식민지로 가득 차 있음을 보여주며, 이는 조사할 가치가 있을 수 있습니다."
 mem_scfe_narrow_maze_init.1.a:0 "매우 흥미롭습니다."
 mem_scfe_narrow_maze_site:0 "폐허가 된 행성"
 mem_scfe_narrow_maze_relic_world_site_desc:0 "§HNinsun§!의 유령 도시 중 하나에서 드래곤 모양의 먼지 구름이 다가오고 있습니다."
 mem_scfe_narrow_maze.1.name:0 "닌순 미로"
 mem_scfe_narrow_maze.1.desc:0 "팀이 구름의 출처를 찾기 위해 유적을 탐색하는 동안, 그들은 미로 같은 도시에서 길을 잃게 됩니다. 그들은 거대한 동상과 Nyblax라는 존재에게 바쳐진 헌신적인 벽화의 목격을 보고하며, 이 모든 것이 흥미로운 장소를 가리키고 있는 듯 보입니다."
 mem_scfe_narrow_maze.1.a:0 "단서를 따라가세요!"
 mem_scfe_narrow_maze.2.name:0 "퀘리 교회"
 mem_scfe_narrow_maze.2.desc:0 "전문가들은 동상과 그림이 그들을 안내하던 장소를 정확히 찾아내어 신호의 원천으로 이끌었습니다. 길 끝에는 신전이 서 있었습니다. 그 건축 양식은 문명의 르네상스 시대에 해당하는 것으로 보입니다. 니블락 형태의 괴물들이 구조물을 장식하고 있었으며, 고고학자들이 들어서자 악취와 부패한 시체들이 쌓여 있는 광경이 그들을 맞이했습니다."
 mem_scfe_narrow_maze.2.a:0 "무슨 일이 일어났습니까?"
 mem_scfe_narrow_maze.3.name:0 "죽은 자의 책"
 mem_scfe_narrow_maze.3.desc:0 "신전에서는 투쟁, 질병, 전투의 흔적이 없었습니다. 마치 이 사람들이 단순히... 죽은 것처럼 보였습니다.\n\n우리의 과학자 중 한 명이 제단에서 한 책을 발견했습니다. 그 책은 열려 있었고, 그 페이지 중 하나에는 다음과 같은 구절이 적혀 있었습니다:\n\n§B'그리고 그렇게 함으로써, 너는 Nyblax를 소환할 것이다. 그의 필요는 우리의 필요보다 위에 있으며, 우리의 영혼은 영원할 것이다.'§!"
 mem_scfe_narrow_maze.3.a:0 "계속 읽기."
 mem_scfe_narrow_maze.4.name:0 "어둠의 의식"
 mem_scfe_narrow_maze.4.desc:0 "그들의 신앙의 기초를 형성한 이 책은 Nyblax와 룬에 대한 이야기를 담고 있습니다. 전설에 따르면, Nyblax는 수천 년 전 Ninsun 항성계에 방문하여 Quarri 문명에 신속한 상승의 길을 제안했습니다.\n\n이 의식은 제단 주위에서 대규모 희생을 요구하며, 이 행위를 통해 Quarri 민족이 더 높은 존재의 차원으로 상승할 것이라고 약속했습니다.\n\n책은 의식이 완료되면 무영혼의 몸에서 룬이 생성되고, Nyblax가 그들의 상승이 이루어졌는지 확인하기 위해 돌아올 것이라고 주장합니다."
 mem_scfe_narrow_maze.4.a:0 "룬은 어디에 있습니까?"
 mem_scfe_narrow_maze.5.name:0 "신속 룬"
 mem_scfe_narrow_maze.5.desc:0 "쓰러진 자들의 시체 사이에서, 희미한 에너지 파동을 발산하는 이상한 목걸이가 발견되었습니다.\n\n이 목걸이는 대사제의 것이었던 것으로 보입니다.\n\n해체해본 결과, 우리 팀은 이 목걸이가 죽은 자들로부터 에너지를 끌어내어 룬을 만들기 위해 Nyblax에 의해 제작되었음을 밝혀냈습니다. 룬이 완성되면, 목걸이는 Nyblax에게 돌아와서 그것을 차지하라는 신호를 보낼 것입니다.\n\n놀랍게도, 룬은 여전히 목걸이 안에 있었습니다!"
 mem_scfe_narrow_maze.5.a:0 "우리가 먼저 도착한 것 같습니다!"
 mem_scfe_quad_init.1.name:0 "불규칙한 심장박동"
 mem_scfe_quad_init.1.desc:0 "§HKikimora§! 항성계에 진입하자, 우리의 과학선이 §HM'Cholou§!에서 발산되는 강력한 심장 박동 신호를 감지했습니다. §Y[Root.Leader.GetName]§!는 이 행성을 조사하고자 합니다."
 mem_scfe_quad_init.1.a:0 "진행합니다."
 mem_scfe_quad_site:0 "M'Cholou 발굴지"
 mem_scfe_quad_relic_world_site_desc:0 "행성은 불규칙한 심장박동을 가지고 있는 것처럼 보입니다."
 mem_scfe_quad.1.name:0 "끈적한 지면"
 mem_scfe_quad.1.desc:0 "행성 표면에 착륙한 후, 우리는 전체 풍경이 하나의 유기체라는 것을 발견했습니다. 유기체 조직의 나이를 판단하기는 어렵지만, 일부 죽은 샘플의 탄소 연대 측정을 기반으로 할 때, 우리는 그것이 천 년 이상 되었다고 추정합니다.\n\n불규칙한 심장 박동이 행성 전역에 울려 퍼지며, 각 맥박마다 땅이 떨립니다. 심장 박동의 원천은 고대 유적 근처의 한 산 깊숙한 곳에 있는 것 같습니다. 우리 팀은 산으로 향하는 길에 유적을 조사할 것을 제안합니다."
 mem_scfe_quad.1.a:0 "계속하세요."
 mem_scfe_quad.2.name:0 "뼈 건축물"
 mem_scfe_quad.2.desc:0 "우리 팀이 유적에 접근하자, 행성의 심장이 빠르게 뛰는 것을 느꼈습니다. 마치 행성 자체가 그들의 존재를 인식하고 있는 것처럼 보였습니다. 팀은 구조물이 근육, 조직, 뼈로 만들어진 것을 보고했으며, 이는 유기체 건축의 놀라운 예시입니다. 이 건물들은 여전히 살아 숨 쉬고 있었지만, 감각 있는 생명체는 남아 있지 않았습니다. 구조물의 규모는 한때 수천 개의 생명체가 거주했음을 시사하지만, 다른 종은 발견되지 않았습니다.\n우리 고고학자들은 심장이 시작되는 산으로의 대규모 이주가 있었던 것으로 추측하고 있습니다. 팀은 계속 나아갔습니다.\n\n정상 근처에서 그들은 산의 심장 깊숙이 이어지는 살의 터널을 발견했습니다."
 mem_scfe_quad.2.a:0 "계속 나아가십시오."
 mem_scfe_quad.5.name:0 "M'Cholou"
 mem_scfe_quad.5.desc:0 "탐사 팀을 에워싸기 시작한 촉수들이 거대한 얼굴 없는 생물이 다가오는 모습을 보였습니다. 그 끔찍한 외모에도 불구하고, 그 생물은 적대적인 기색을 전혀 보이지 않았습니다. 사실, 그 생물은 우리와 소통하기 시작했습니다.\n\n§HAre you the Nyblax?§!"
 mem_scfe_quad.5.a:0 "음, 아니요."
 mem_scfe_quad.6.desc:0 "§B그 생물은 당신의 팀이 기대했던 존재가 아니라는 것을 깨닫고 실망한 듯 보입니다.§!\n\n네, 저는 실망했습니다...\n그리고 네, 저는 제 생각을 당신의 생각과 연결하여 우리가 소통할 수 있는 다리를 형성했습니다. 이 연결은 여러분과 같은 열등하거나 기계적 종족과는 더 약하지만, 그럼에도 불구하고 우리는 여기 있습니다.\n이게 어떻게 가능할까요? 글쎄요... 이는 Nyblax 덕분입니다. 우리는 한때 Morthra라는 자랑스럽고 자비로운 집단이었지만, 이제 우리는 하나의 우월한 존재로 합쳐졌습니다."
 mem_scfe_quad.6.a:0 "니블락스란 무엇입니까?"
 mem_scfe_quad.7.desc:0 "§B그 생명체는 당신의 생각에 짜증과 좌절을 느끼는 것 같습니다.§!\n\n니블락스... 그것은 수천 년 전 우리 고향에 도착했습니다. 그 생명체는 우리가 그것과 같다고 믿었습니다 - 독특하고, 유일무이한 존재. 그리고 어떤 면에서 우리는 그랬습니다... 그것은 우리의 우정과 도움을 원했습니다.\n니블락스가 정직했는지, 자비로웠는지, 악의적이었는지, 아니면 단순히 절망 속에서 길을 잃었는지는 불분명합니다.\n그것은 우리가 그것을 위해 룬을 만들기를 원했고, 우리가 만들었을 때 그것은 그것을 수집하러 돌아올 것이라고 했습니다.\n네, 물론 우리는 룬을 만들었습니다! 우리가 어떻게 우리의 모든 집단을 이 단일 선체로 융합할 수 있었겠습니까?\n룬? 여기 어딘가에 있습니다. 나는 그것을 오랫동안 없애려고 노력해왔지만, 내 자신의 중력을 이겨내는 것은... 꽤 어렵다는 것이 입증되었습니다."
 mem_scfe_quad.7.a:0 "가질 수 있을까요?"
 mem_scfe_quad.8.desc:0 "§B그 생물의 촉수 중 하나가 당신의 팀을 향해 뻗어, 룬을 쥐고 있습니다.§!\n\n부디, 그것을 가지고 가 주세요... 룬이 이 행성을 떠나면, 나는 마침내 죽을 수 있을 것입니다.\n\n§B그 생물은 잠시 멈추고, 그 움직임에는 깊은 우울이 깃들어 있습니다.§!\n\n나는 수천 년 동안 자아를 가지고 있었고, 니블락스가 돌아와 룬을 가져가기를 기다렸지만, 그들은 결코 오지 않았습니다. 목적이 있는 한만 살아갈 수 있으며, 나의 목적은 오래전에 사라졌습니다. 당신이 나를 위해 이 일을 해 주시겠습니까?"
 mem_scfe_quad.8.dev:0 "오늘 우리는 연회를 열 것입니다."
 mem_scfe_quad.8.phil:0 "삶은 선택입니다. 우리가 도와드리겠습니다."
 mem_scfe_quad.8.phob:0 "끔찍한 삶을 끝내도록 도와줄까요? 룬을 우리에게 주세요!"
 mem_scfe_quad.8.spir:0 "운명이 우리를 이곳으로 이끈 이유가 있으며, 이는 우리의 군주의 뜻입니다."
 mem_scfe_quad.8.mate:0 "물론입니다. 삶은 과대평가되어 있습니다."
 mem_scfe_quad.8.egal:0 "당신이 살 것인지 말 것인지를 선택하는 것은 공정합니다."
 mem_scfe_quad.8.auth:0 "당신의 소원은 무의미합니다. 당신은 우리에게 복종하거나 죽어야 합니다."
 mem_scfe_quad.8.mili:0 "룬을 가져와 전술 핵무기를 지표로 발사하겠습니다."
 mem_scfe_quad.8.paci:0 "당신의 고통을 끝내는 데 도움을 드리겠습니다. 평안히 쉬시길 바랍니다."
 mem_scfe_quad.8.mach:0 "긍정적"
 mem_scfe_quad.8.hive:0 "우리는 룬을 가져갈 것입니다, 여인. 다시 만날 수 있기를 바랍니다."
 mem_scfe_quad.8.default:0 "물론입니다."
 mem_scfe_quad.9.name:0 "재생 룬"
 mem_scfe_quad.9.desc:0 "§Y재생 룬§!을 확보하고 행성 표면에서 상승을 시작한 후, 수많은 촉수가 산의 터널에서 나와 우리의 함선을 향해 뻗어 나왔습니다.\n우리 함장은 회피 기동을 수행하여 성공적으로 궤도로 진입했습니다. 우리는 그 촉수를 피하고 성층권에 도달하면서, 촉수가 무기력하게 무너지는 모습을 지켜보았습니다."
 mem_scfe_quad.9.a:0 "결국, 아무도 죽고 싶지 않다고 생각합니다."
 mem_scfe_jex_init.1.name:0 "어두운 태양"
 mem_scfe_jex_init.1.desc:0 "§HMireska§! 항성계에 블랙홀을 공전하는 행성이 있는 것으로 보입니다. 이례적이긴 하지만, 더욱 주목할 만한 점은 그 행성에 문명과 식물의 흔적이 있다는 것입니다. 별의 에너지가 없이는 생명이 그곳에서 번성했을 가능성이 낮아 보입니다."
 mem_scfe_jex_init.1.a:0 "한번 살펴보겠습니다."
 mem_scfe_jex_site:0 "제크 발굴지"
 mem_scfe_jex_relic_world_site_desc:0 "§HJex§!의 표면에서 문명의 흔적이 발견되었지만, 별의 에너지가 없이는 그곳에서 생명이 번성했을 가능성은 낮아 보입니다."
 mem_scfe_jex.1.name:0 "속이는 감각"
 mem_scfe_jex.1.desc:0 "착륙하자 우리 팀은 놀랍도록 따뜻한 분위기에 맞닥뜨렸습니다. 공기는 습기로 가득 차 있었고, 전체 풍경은 블랙홀 방향에서 오는 이상한 빛으로 밝혀져 있었습니다. 현지 식물들은 만개하여 꽃들이 생생했습니다.\n태양이 없는 상황에 우리 과학자들은 당황했습니다. 이 이상현상을 설명할 수 없었던 그들은 답을 찾기 위해 인근 도시로 향했습니다."
 mem_scfe_jex.1.a:0 "그냥 가세요!"
 mem_scfe_jex.2.name:0 "위장된 연구소"
 mem_scfe_jex.2.desc:0 "그들이 도착했을 때, 도시는 사라져 있었습니다! 그 자리에 연구 물자로 가득 찬 버려진 실험실이 서 있었습니다.\n외계어를 해독한 후, 우리 팀은 문서들을 조사하기 시작했습니다. 그들은 곧 이 실험실이 자연 위장 능력을 가진 인류형 종족에 의해 설립되었음을 확인했습니다. 연구는 그들의 DNA를 사용하여 장치를 만드는 데 초점을 맞추었습니다."
 mem_scfe_jex.2.a:0 "계속 읽어보세요!"
 mem_scfe_jex.3.name:0 "방문자"
 mem_scfe_jex.3.desc:0 "연구 노트에 따르면, 인류와 유사한 생물들은 Nyblax라는 최고 존재를 만났습니다. 노트에는 이 생물이 그들에게 자연 능력을 활용하여 그들이 §YRune of Power§!라고 부르는 것을 만드는 방법을 가르쳤다는 내용이 담겨 있습니다. 그들은 성공했다고 주장하며, White Spire라는 장소에서 이를 시험할 준비를 하고 있었습니다.\n불행히도, 창조 과정에 대한 기록의 대부분이 너무 손상되어 있어 유용하지 않으며, 재현이 불가능합니다. 우리의 최선의 선택은 White Spire를 조사하여 그들, 그들의 태양, 그리고 그들의 문명에 무슨 일이 있었는지에 대한 더 많은 단서를 발견하는 것입니다."
 mem_scfe_jex.3.a:0 "사이트로 가세요!"
 mem_scfe_jex.4.name:0 "백색 첨탑"
 mem_scfe_jex.4.desc:0 "행성을 탐사한 후, 우리는 화이트 스파이어를 발견했습니다. 연구소와 마찬가지로, 이 장소는 인류에 의해 오랫동안 버려져 있었습니다.\n화이트 스파이어의 활동을 제어하고 기록하는 디지털 콘솔은 여전히 작동하고 있었습니다. 우리는 로그에 접근하여 룬이 작동했음을 발견했습니다. 그들은 이를 §Y환상의 룬§!이라고 불렀으며, 기록에 따르면 태양을 숨기기 위해 사용되어 블랙홀로 변형시켰습니다.\n룬의 힘은 그들의 연구소, 도시, 그리고 행성 자체에 걸쳐 활용되어, 우리가 지금 보는 천국을 숨기거나 강화하거나 심지어 창조했습니다. 그들은 니블락의 귀환과 어떤 미공개 동기를 두려워하여 룬을 옐로우 스파이어로 알려진 장소로 이전했습니다."
 mem_scfe_jex.4.a:0 "룬만 가져오세요!"
 mem_scfe_jex.5.name:0 "환상의 룬"
 mem_scfe_jex.5.desc:0 "노란 첨탑은 흰 첨탑과 거의 동일했지만, 한 가지 주목할 만한 차이점이 있었습니다: §H환영 룬§!이 주 입력 시스템에 단순히 놓여 있었습니다.\n흥미를 느낀 우리의 고고학자들은 시스템의 로그를 조사하였고, 그들의 감지기가 나이블락스가 행성에 접근하는 것을 감지했을 때, 인류형 생물들이 전체 인구에 §H환영 룬§!을 사용했다는 사실을 발견했습니다.\n우리의 유일한 결론은, 그들이 자신을 보이지 않게 하려는 시도에서 문자 그대로 사라졌다는 것입니다. 로그에는 더 이상의 항목이 발견되지 않았습니다.\n팀은 룬을 가지고 돌아왔고, 잃어버린 종과 그들이 본 것 중 가장 아름다운 행성에 대한 이야기를 전했습니다."
 mem_scfe_jex.5.a:0 "재능 있는 룬의 과거를 바라보지 마십시오..."
 mem_scfe_riki_init.1.name:0 "확산광"
 mem_scfe_riki_init.1.desc:0 "§Y[Root.GetName]§!는 특정 위치와 시간에 항성의 빛이 확산되는 것을 감지했습니다. 우리가 정확히 적절한 순간에 이 항성계를 들어오지 않았다면 이 이상현상은 눈치채지 못했을 것입니다. 빛의 확산은 행성 §HDeani§! 주위를 공전하는 미확인 물체에 의해 발생하는 것으로 보입니다."
 mem_scfe_riki_init.1.a:0 "고대 문명일 수 있을까요?"
 mem_scfe_riki_site:0 "확산광"
 mem_scfe_riki_relic_world_site_desc:0 "별에서 나오는 빛이 행성 §HDeani§! 주위를 도는 정체불명의 물체에 의해 확산됩니다."
 mem_scfe_riki.1.name:0 "보이지 않는 기지"
 mem_scfe_riki.1.desc:0 "§H디아니§!의 궤도로 진입하자, 승무원 중 한 명이 정거장 모양의 우주 먼지 구름을 발견했습니다. 우리가 이상 현상에 가까워지자, 우리는 은폐된 궤도 정거장을 다루고 있다는 것이 분명해졌습니다."
 mem_scfe_riki.1.a:0 "기지를 침입하여 그 목적을 조사합니다."
 mem_scfe_riki.2.name:0 "균열"
 mem_scfe_riki.2.desc:0 "도킹 베이를 성공적으로 침입한 후, 우리 팀은 기지를 정찰했습니다. 아무도 없었습니다.\n기지는 버려진 것처럼 보였지만, 공동체 구역 근처에서 목소리가 울려 퍼졌습니다. 팀이 다가가자 그들은 그 소스의 정체를 발견했습니다: 반복 재생되는 홀로그램이 투사되고 있었습니다."
 mem_scfe_riki.2.a:0 "무슨 말이었나요?"
 mem_scfe_riki.3.name:0 "우주에서 잃어버린"
 mem_scfe_riki.3.desc:0 "녹음은 길었고 외계어로 되어 있어 우리의 전문가들이 해독하고 번역해야 했습니다. 화자에 따르면, 전체 승무원은 Nyblax를 찾기 위해 기지를 떠났지만 기지가 은폐되어 있다는 것을 잊어버려 돌아갈 길을 찾지 못했다고 합니다.\n\n§B우리가 Arkanin 기지를 떠난 지 §RSTATIC§! 개월이 지났습니다. 연료가 바닥나 Deani의 표면에 §RSTATIC§! 해야 했습니다. 행성의 중력을 벗어날 방법이 없으므로 우리가 §RLONG STATIC§! 할 가능성은 낮아 보입니다. 이 메시지를 보신다면, 제발 저희를 찾아주세요 - 우리는 §RLONG STATIC§! 균열 계곡에 있습니다. 우리는 기지를 보이지 않게 만든 §RLONG STATIC§!을 성공적으로 생성했습니다.§!"
 mem_scfe_riki.3.a:0 "우리는 그 기술이 필요합니다!"
 mem_scfe_riki.4.name:0 "니블락스 회화"
 mem_scfe_riki.4.desc:0 "디아니의 표면은 불모지입니다. 아르카닌 승무원들의 전망이 그렇게 암울했던 것은 놀라운 일이 아닙니다. 우리의 스캐너는 어떤 구조물이나 잔해도 찾지 못했기에, 고고학자들은 그들이 찾을 수 있는 모든 계곡을 통해 격자 검색을 실시했습니다.\n다행히도, 탐사는 성공적이었습니다: 우리는 승무원들이 마지막 날을 보낸 동굴을 발견했습니다. 동굴 벽에는 고대의 그림들이 장식되어 있었고, 이는 니블락스의 이야기를 전하고 있었습니다.\n\n첫 번째 그림 세트에서는 승무원들이 생물과 처음 만나는 장면이 그려져 있으며, 선물을 받습니다. 우리의 언어학자들은 이를 지식의 선물로 해석합니다. 이야기는 승무원들이 이 선물을 고향 행성에서 사용하면서, 대부분의 사람들의 죽음을 초래하는 방향으로 이어집니다.\n마지막 그림 세트에서는 승무원들이 빛나는 룬을 들어 올리는 모습이 그려져 있으며, 마치 어떤 상이나 성취처럼 보입니다. 재앙이 발생했을 때, 그들의 사람들의 생명력은 이 룬으로 결정화되었습니다. 그림에 따르면, 이 룬은 물체를 보이지 않게 만드는 힘을 가지고 있습니다."
 mem_scfe_riki.4.a:0 "아마도 지금까지 가장 멍청한 승무원입니다. 자, 룬은 어디에 있죠?"
 mem_scfe_riki.5.name:0 "투명성 룬"
 mem_scfe_riki.5.desc:0 "작업은 예상보다 더 어려웠습니다. 우리는 룬이 아르카닌 승무원의 시체와 함께 있을 것이라고 예상했지만, 한 명이 실종되었습니다. 우리의 감지기가 결국 그의 시신을 독이 든 호숫가에서 발견했습니다. 다행히도 그는 여전히 룬을 가지고 있었습니다."
 mem_scfe_riki.5.a:0 "볼 수 있을까요?"
 mem_scfe_abandoned_invisible_observation_outpost:0 "아르카닌 연구 기지"
 mem_scfe_riki_observation_tooltip:0 "은폐된 궤도 기지"
 mem_scfe_riki_observation_desc:0 "은폐된 궤도 기지"
 mem_scfe_rune_lost:0 "힘의 룬 손실"
 mem_scfe_rune_lost_desc:0 "우리의 부주의로 은하에서 가장 강력한 무기 중 하나를 잃게 되었습니다."
 mem_scfe_nyblax_country.11.name:0 "잘못된 유물"
 mem_scfe_nyblax_country.11.base:0 "종속화로 인한 행정적 혼란 이후, 우리의"
 mem_scfe_nyblax_country.11.desc1:0 "$mem_scfe_nyblax_country.11.base$ §YRune of Power§!가 사라졌습니다. 우리는 이를 찾기 위해 모든 곳에서 사람들을 보내고 있지만, 대부분은 이미 찾을 희망을 포기했습니다."
 mem_scfe_nyblax_country.11.desc2:0 "$mem_scfe_nyblax_country.11.base$ §Y힘의 룬§!이 사라졌습니다. 우리는 이를 찾기 위해 모든 곳에서 사람들을 보내고 있지만, 대부분은 이미 이를 찾을 희망을 포기했습니다."
 mem_scfe_nyblax_country.11.a:0 "가장 비극적인 상실"
 mem_scfe_nyblax_country.20.name:0 "신비로운 수집가"
 mem_scfe_nyblax_country.20.desc:0 "어두운 인물이 우리의 지도자들에게 흥미로운 소식을 전했습니다: 그는 §YMighty Rune§!으로 알려진 강력한 유물을 소유하고 있으며, 이를 희귀 향신료의 공급과 교환할 의향이 있습니다."
 mem_scfe_nyblax_country.20.a:0 "흥미로운 발전입니다."
 mem_scfe_nyblax_country.21.name:0 "외눈의 골렘"
 mem_scfe_nyblax_country.21.desc:0 "이상한 암석류가 우리에게 접근하여 제안을 했습니다: 만약 우리가 그들의 희귀한 질병을 치료할 수 있다면, 그들은 §YHaste Rune§!으로 알려진 강력한 유물을 보상으로 줄 것입니다."
 mem_scfe_nyblax_country.21.a:0 "거래하자!"
 mem_scfe_nyblax_country.22.name:0 "예상치 못한 보물"
 mem_scfe_nyblax_country.22.desc:0 "긴급 초공간 점프 후, 생명체의 징후 없이 우리 영토에 도착한 손상된 외계 화물선이 발견되었습니다. 조사 결과, 강력한 유물인 §Y환영 룬§!을 포함한 다양한 귀중한 유물이 들어 있는 것으로 확인되었습니다."
 mem_scfe_nyblax_country.23.name:0 "복수의 영혼들"
 mem_scfe_nyblax_country.23.desc1:0 "§Y[Root.GetRulerTitle] [Root.GetRulerName]§!의 꿈에 유령 같은 존재들이 나타나 §YArcane Rune§!이라는 강력한 유물을 제시했습니다. 이 유물은 §HNyblax§!에 맞서 사용될 조건이었습니다. 깨어난 §Y[Root.GetRulerName]§!는 여전히 그 유물이 자신의 [GetSpeciesHandNamePlural]에 있음을 발견했습니다."
 mem_scfe_nyblax_country.23.desc2:0 "강력한 비전이 §Y[Root.GetRulerTitle] [Root.GetRulerName]§!의 과정을 방해했으며, 유령 같은 형체들이 §YArcane Rune§!으로 알려진 강력한 유물을 제시하며 §HNyblax§!에 맞서 사용할 것을 조건으로 하였습니다. 비전이 사라지자, §Y[Root.GetRulerName]§!는 그 유물을 자신의 [GetSpeciesHandNamePlural] 안에서 안전하게 발견했습니다."
 mem_scfe_nyblax_country.23.a:0 "유령 같은"
 mem_scfe_nyblax_country.24.name:0 "속임수꾼"
 mem_scfe_nyblax_country.24.desc:0 "최근 몇 달간의 대담한 절도 사건들 이후, 오늘 강렬한 추격 끝에 한 도둑이 붙잡혔습니다. 그의 비밀은 그가 소지하고 있던 강력한 유물인 §Y투명 룬§!이 발견되면서 드러났습니다. 불길하게도, 유물이 그에게서 빼앗기는 순간 도둑은 완전히 사라졌습니다."
 mem_scfe_nyblax_country.25.name:0 "과잉 성장"
 mem_scfe_nyblax_country.25.desc:0 "우리의 화물선 중 하나가 화물의 갑작스러운 과잉 성장으로 내부에서 파괴되었습니다. 잔해 속에서 우리는 §Y재생 룬§!이라고 알려진 강력한 유물을 발견했으며, 이 유물은 일부 씨앗이 즉시 울창한 나무 숲으로 성장하게 만들어 선박을 찢어놓았습니다."
