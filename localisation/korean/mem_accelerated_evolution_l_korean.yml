l_korean:
 mem_accelerated_evolution_modifier:0 "가속된 진화"
 mem_accelerated_evolution_modifier_desc:0 "이 행성의 생명체는 매우 빠른 속도로 진화합니다."
 mem_accelerated_evolution.1.name:0 "가속된 진화"
 mem_accelerated_evolution.1.desc:0 "몇 달 동안 §Y[Root.GetName]§!에서 생활한 개척민들은 주변 환경에 대해 이상한 점을 발견했습니다. 생물 종들이 한 달에서 다음 달로 급격히 변화하는 것처럼 보입니다. 식민지 행정의 명령에 따라 신속한 연구가 수행되었습니다. 원주율의 식물과 동물들이 믿을 수 없을 만큼 빠른 진화 과정을 가지고 있다는 것이 밝혀졌습니다. 이 세계의 모든 생물 종들은 평균보다 짧은 생애 주기와 빠른 성적 및 무성 생식을 공유하고 있어, 그들의 진화 주기가 정상보다 상당히 빠릅니다. 그 결과, 이 행성의 자연 환경은 끊임없이 변화하는 상태에 있습니다.\n\n한편으로, 반복적으로 적응하는 지역 생태계는 개척민들이 진정으로 적응하는 것을 방해합니다 - 일반적인 진화 주기를 가진 생물은 그럴 수 없습니다. 다른 한편으로, 지역 동물들의 지속적인 진화와 빠른 번식을 연구하는 것은 농업 및 진화 과학의 발전으로 이어질 수 있습니다. 어쨌든, 행성의 생태계는 이러한 규모로 변화하기에는 너무 복잡합니다. 개척민들은 좋든 나쁘든 이 상황을 떠안고 있습니다."
 mem_accelerated_evolution.1.a:0 "글쎄, 우리가 할 수 있는게 없다면..."
