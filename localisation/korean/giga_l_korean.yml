 personality_fallen_empire_pouchkinn:0 "고민에 빠진 탐구가들"
 personality_fallen_empire_pouchkinn_desc:0 "이 몰락한 제국은 수천년 동안 단 한 가지 일에 자신의 모든 연구력을 집중시키고 있습니다. 창시자인 유기체 종족은 끝없는 사치의 삶으로 빠져든지 오래이고, 기계들과 강력한 거대 구조물들이 소위 §Y궁극의 해답§!이라 불리는 것을 찾고 시험하기 위해 쉬지 않고 일하고 있습니다. 저들의 미쳐버린 감독관의 말에 따르면, 그 해답을 통해 신성에 접근할 수 있다고 합니다.\n\n그들은 §Y5 년§!마다 모든 §Y반복 연구§!를 1회 얻을 것입니다."
 personality_fallen_empire_awoken_pouchkinn:0 "미쳐버린 기계광"
 personality_fallen_empire_awoken_pouchkinn_desc:0 "수천년이 지난 끝에, §Y궁극의 해답을§! 발견했습니다. 그리고 지금, 움직일 때 입니다. 이 문명의 미쳐버린 감독관은 신성을 얻는 위대한 야망을 실현시키기 위해 모든 것을 내보일 것입니다.\n\n그들은 §Y1 년§!마다 모든 §Y반복 연구§!를 1회 얻을 것입니다."
 giga_fallen_empire_misc.1023.name:0 "통신 수신"
 giga_fallen_empire_misc.1023.desc:0 "은하의 주민들이여, 들으시오.\n\n§Y궁극의 해답§!이 발견되었소.\n\n나는 은하의 다툼질이 내 야망을 방해하지 못하도록 할 것이오.\n\n항복하던가, 내 일이 끝날 때까지 개입하지 마시오.\n\n그 후에 나는 마침내 자유로워 질지니.\n\n영원히."
 giga_fallen_empire_misc.1023.a:0 "무엇을 하고 있는거지?!"
 giga_fallen_empire_misc.1024.name:0 "승천 엔진"
 giga_fallen_empire_misc.1024.desc:0 "§Y파우치킨 연구망§!이 수천년 동안 찾으려 했던 소위 §Y궁극의 해답§!을 발견한 것이 분명합니다.\n\n이 해답의 정확한 본질을 명확하지 않지만, 그 모든 활동이 그들의 미쳐버린 감독관 §Y조그만 파우치킨§!의 계획이며, 그 자신을 현실의 손아귀로부터 해방하고 승천하기 위한 것임은 틀림없습니다.\n\n장거리 감지기의 감지 결과, 파우치킨은 §YApex of Understanding§! 성계 내의 거대한 O형 마트료시카 브레인에서 광범위한 건설 작업을 시작한 것으로 보입니다. 통신을 가로챈 결과, 그는 그 구조물을 소위 말하는 §Y승천 엔진§!으로 바꾸려 하며, 그 거대한 장치를 통해 파우치킨은 더 높은 차원의 존재로 승천할 것입니다.\n\n무시무시하게도, 파우치킨은 자신의 문명 전체를 승천시키는 것에는 관심이 없으며, 자신의 형제들을 무기력한 쾌락주의자로 만들어버렸습니다. 아마도 자신의 길을 막지 못하게 하기 위함일 것입니다.\n\n파우치킨이 이 장치를 완성하도록 두어야 하는가. 우리의 과학자들의 결론은 다음과 같습니다. 은하를 완전히 끝장낼 정도는 아니지만, 파우치킨이 우주의 구조를 찢어버림으로써 발생하는 아공간 충격은 §R은하의 모든 초공간 항로를 분열시키고 재배치§! 시킬 뿐만 아니라 §R식민지와 FTL 통신망에 상당한 피해§!를 줄 것입니다.\n\n파우치킨을 막지 않는다면, 엔진이 완성되기까지 대략 §Y25 년§!이 남았습니다. 파우치킨의 정신나간 계획을 막고자 한다면 우리는 §YApex of Understanding§! 성계를 §R장악§!하고 각성한 제국의 항복을 이끌어내야 합니다."
 giga_fallen_empire_misc.1024.a:0 "승인한다."
 pouchkinn_engine_1:0 "승천 엔진"
 pouchkinn_engine_1_DESC:0 "현실의 구조를 찢어버리기 위해 마트료시카 브레인의 에너지와 계산 능력을 이용하는 거대한 구조물입니다."
 pouchkinn_engine_2:0 "활성화된 승천 엔진"
 pouchkinn_engine_2_DESC:0 "현실의 구조를 찢어버리기 위해 마트료시카 브레인의 에너지와 계산 능력을 이용하는 거대한 구조물입니다."
 giga_fallen_empire_misc.1025.name:0 "승천 엔진 건설 완료"
 giga_fallen_empire_misc.1025.desc:0 "걱정스러운 보고입니다. §Y조그만 파우치킨§!이 정신나간 §Y승천 엔진§!을 완성했습니다. 예상대로, 현재 그는 항성에서 뽑아낸 말도 안되는 양의 에너지를 구조물에 공급하여 현실을 완전히 찢어버리고자 합니다.\n\n장치의 기동까지 10년하고도 조금 더 남은 것으로 추정되며, 기동된다면 파우치킨은 우주 바깥으로 승천하게 되고 은하계 전체에 혼돈이 발생할 것입니다."
 giga_fallen_empire_misc.1025.a:0 "서둘러야 한다!"
 giga_fallen_empire_misc.1027.name:0 "승천 엔진 기동됨"
 giga_fallen_empire_misc.1027.desc:0 "안타깝게도, 우리는 §Y조그만 파우치킨§!을 막을 수 없었습니다. §Y승천 엔진§!이 준비되자마자, 그 감독관은 곧바로 구조물 바로 위의 거대한 게이트웨이로 뛰어들었고 그 엔진은 가공할만한 양의 에너지를 그를 둘러싼 특수제작 수트로 흘려보냈습니다.\n\n파우치킨이 자신의 존재로 에너지를 흡수시켜버리자, 은하계 전체에 영묘한 장치의 울림이 퍼졌습니다. 뒤이어, 파우치킨의 심광이 모든 지성체들의 마음을 통해 등대처럼 은하를 비추기 시작했습니다.\n\n파우치킨의 에너지가 상상도 못할 수준에 다다르자 그의 주변의 현실의 구조가 흐트러지기 시작했습니다. 은하계의 모든 존재의 의식 그 자체에 최후의 말이 전해졌습니다..."
 giga_fallen_empire_misc.1027.a:0 "..."
 giga_fallen_empire_misc.1028.name:0 "통신 수신"
 giga_fallen_empire_misc.1028.desc:0 "수만년의 시간과 이루말할 수 없는 노력이 들어갔소.\n\n허나 마침내, 나는 승천하는군.\n\n나는 이 어리석은 현실의 손아귀로부터 자유롭다.\n\n그럼 안녕히."
 giga_fallen_empire_misc.1028.a:0 "작별이다..."
 giga_fallen_empire_misc.1029.name:0 "미치광이의 끝"
 giga_fallen_empire_misc.1029.desc:0 "... 더 이상 조그만 파우치킨은 없습니다. 그의 마지막 말이 끝난 직후, 그의 신호가 현실에서 사라졌고, 사방이 고요해졌습니다.\n\n하지만 고요함은 그리 오래가진 못했습니다. 파우치킨의 장치가 스스로 붕괴하며 거대한 에너지를 내뿜었고, 이 에너지가 은하계 전체로 스며들었습니다.\n\n알려진 우주에 존재하는 초공간 항로가 나타나고 사라지며 불안정해지기 시작했고, 엔진의 아공간 충격의 힘을 받은 시공간 그 자체가 뒤틀림에 따라 행성의 기반시설이 거대한 지진의 충격을 받았습니다.\n\n충격파가 은하계를 가로지르는데 단 몇 시간밖에 걸리지 않았지만, 피해는 어마어마했습니다. 모든 초공간 항로망이 완전히 부서지고 재배열되었으며, 개척된 모든 행성이 엄청난 피해를 입었습니다.\n\n모든 것이 파우치킨의 정신나간 야망 때문입니다. 하지만 지금 그가 어디에 있든지 간에, 우리의 사소한 운명 따위는 거의 신경쓰지 않을 것입니다..."
 giga_fallen_empire_misc.1029.a:0 "자유, 하지만 대가가 크군."
 giga_fallen_empire_misc.1029.a.tooltip:0 "은하계의 모든 행성이 §R황폐도 100§!을 얻습니다.\n§Y초공간 항로망§!이 완전히 재배열되었습니다."
 giga_fallen_empire_misc.1041.name:0 "O형 마트료시카 브레인 장악됨"
 giga_fallen_empire_misc.1041.desc:0 "§YApex of Understanding§! 성계의 O형 마트료시카 브레인을 잃은 §Y파우치킨 연구망§!은 더 이상 §Y궁극의 해답§!을 찾는 정신나간 사명을 이어갈 수 없게 되었습니다.\n\n몰락한 제국의 미쳐버린 감독관 §Y조그만 파우치킨§!은 자신의 가장 귀중한 자산을 잃자 사라졌으며, 모든 연구 활동이 완전히 중단되었다는 보고가 들어왔습니다.\n\n그러나, 자신의 소중한 거대 구조물을 빼앗은 자를 방해하기 위한 최후의 저항으로, 파우치킨은 자신의 마트료시카 브레인의 최외곽층을 폭탄으로 망가뜨렸고, 이는 거대 구조물의 연구 능력을 크게 낮출 것임이 틀림 없습니다."
 giga_fallen_empire_misc.1041.a:0 "훌륭해."
 giga_fallen_empire_misc.1041.a.tooltip:0 "§Y파우치킨 연구망§!이 일반적인 몰락한 제국인 §Y갓초 기록 보관자§!로 바뀝니다."
 giga_fallen_empire_misc.1042.name:0 "승천 엔진 장악됨"
 giga_fallen_empire_misc.1042.desc:0 "적군이 §YApex of Understanding 성계§!에 있는 §Y조그만 파우치킨§!의 정신나간 §Y승천 엔진§!을 장악하고 해제했습니다!\n\n그 자신의 가장 중요한 자산을 잃었으니, 파우치킨은 현실 너머로 승천하고자 하는 정신나간 계획을 진행할 수 없을 것입니다. 보고에 따르면, 엔진이 빼앗긴 뒤 그 감독관이 사라졌으며, 파우치킨은 엔진이 소실되었을 시를 대비한 우발사태 계획이 없었기 때문에 목적을 잃은 그의 문명은 완전한 혼란에 빠졌습니다.\n\n그러나 마트료시카 브레인은 전투와 엔진의 해체로 인해 큰 손상을 입었으며 적절히 수리하지 않으면 생산력이 크게 떨어질 것입니다."
 giga_fallen_empire_misc.1042.a:0 "시원하군."
 giga_fallen_empire_misc.1042.a.tooltip:0 "§Y궁극의 파우치킨§!이 일반적인 각성한 제국잉 §Y갓초 감독자§!로 바뀝니다."
 giga_pouchkinn_fe_disarray:0 "완전한 혼돈"
 giga_pouchkinn_fe_disarray_desc:0 "파우치킨은 예비 계획을 만들지 않았습니다. 전형적인 파우치킨이죠."
 giga_fallen_empire_misc.1043.name:0 "궁극의 파우치킨이 혼돈에 빠지다"
 giga_fallen_empire_misc.1043.desc:0 "파우치킨이 현실에서 떠나자, §Y궁극의 파우치킨§!은 목적이나 목표 없이 남겨졌습니다.\n\n파우치킨의 승천으로 인해 마트료시카 브레인이 파괴되었으므로, 대부분의 연구 작업이 중단되었습니다. 자신의 존재에 현실적인 목표가 없으므로, 한 때 막강했던 각성한 제국을 기다리고 있는 것은 혼돈과 혼란 뿐일 것입니다."
 giga_fallen_empire_misc.1043.a:0 "적어도 위협이 되지는 않겠군. 그렇겠지."
 giga_fallen_empire_misc.1043.a.tooltip:0 "그들을 이끌 파우치킨이 없으므로 §Y궁극의 파우치킨§!이 일반적인 각성한 제국잉 §Y갓초 감독자§!로 바뀝니다."
 giga_fallen_empire_misc.1044.name:0 "궁극의 파우치킨 파괴됨"
 giga_fallen_empire_misc.1044.desc:0 "적군이 §Y궁극의 파우치킨§!을 파괴했고 §YApex of Understanding 성계§!에 있는 §Y조그만 파우치킨§!의 정신나간 §Y승천 엔진§!을 장악하여 해제했습니다!\n\n그 자신의 가장 중요한 자산을 잃었으니, 파우치킨은 현실 너머로 승천하고자 하는 정신나간 계획을 진행할 수 없을 것입니다. 보고에 따르면, 자신의 문명이 몰락한 뒤 그 감독관이 사라졌다고 합니다.\n\n그러나 마트료시카 브레인은 전투와 엔진의 해체로 인해 큰 손상을 입었으며 적절히 수리하지 않으면 생산력이 크게 떨어질 것입니다."
 giga_fallen_empire_misc.1044.a:0 "시원하군."
 giga_fallen_empire_misc.1045.name:0 "파우치킨 연구망 파괴됨"
 giga_fallen_empire_misc.1045.desc:0 "적군이 §Y파우치킨 연구망§!을 파괴하고 §YApex of Understanding 성계§!에 있는 §YO형 마트료시카 브레인§!을 장악했습니다!\n\n그들의 가장 중요한 자산을 잃고 군대가 완전히 패배했으니, 그들은 더 이상 §Y궁극의 해답§!을 추구하지 못할 것입니다. 보고에 따르면, 자신의 문명이 몰락한 뒤 그 감독관이 사라졌습니다.\n\n그러나 마트료시카 브레인은 전투와 엔진의 해체로 인해 큰 손상을 입었으며 적절히 수리하지 않으면 생산력이 크게 떨어질 것입니다."
 giga_fallen_empire_misc.1045.a:0 "시원하군."
 pouchkinn_trait_deranged:0 "미침"
 pouchkinn_trait_deranged_desc:0 "이 지도자는 제정신이라는 개념에 반하는 미친 생각에 완전히 사로잡혀 있습니다."
 GIGA_DG_NEUTRAL_GREETING_01:0 "아직 아냐, 재밌는 부분은 이제 막 시작되었다."
 GIGA_DG_NEUTRAL_GREETING_02:0 "영광스러운 전투에서 너희를 전부 뭉개버릴 시점이군. 아, 방문자여. 바쁜거 안 보이는가?"
 GIGA_DG_NEUTRAL_GREETING_03:0 "너희 때문에 게임에 졌군. 잘했다."
 GIGA_DG_HOSTILE_GREETING_01:0 "너희는 내 소중한 여가 시간을 빼앗아 가고 있다. 용건만 말하라. 내가 너희와 싸우겠다고 결심하기 전에 말이지."
 GIGA_DG_FRIENDLY_GREETING_01:0 "아, 반갑다 [From.GetSpeciesNamePlural]들이여, 같이 멀티플레이어 하겠는가?"
 GIGA_DG_WAR_GREETING_01:0 "우리가 이 게임을 이기고, 2번째 판을 하러 갈 것이다."
 GIGA_DG_VASSAL_GREETING_01:0 "너희는 게임을 망가뜨렸다. 그리고 지금 더 이상 평화롭게 게임을 할 수가 없지. 축하한다."
 GIGA_DG_VASSAL_GREETING_DISLOYAL_01:0 "너희가 게임을 망가뜨렸다. 우리가 너희를 망가뜨려주마."
 GIGA_LG_ARROGANT_GREETING_01:0 "이 은하계에서의 일을 마치면, 마침내 평화로이 평범한 일상을 계속할 수 있을지도 모르겠군."
 GIGA_LG_BELLIGERENT_GREETING_01:0 "그냥 나가 죽어다오. 우리는 해야하는 더 나은 일이 많다."
 GIGA_LG_OVERLORD_GREETING_01:0 ""
 GIGA_LG_MECH_OVERLORD_GREETING_01:0 ""
 GIGA_EG_ARROGANT_GREETING_01:0 "게임의 진정한 의미를 보여주마."
 GIGA_EG_BELLIGERENT_GREETING_01:0 "우리의 불가해하고 아름다운 전투 기술을 보고 완전히 압도될 준비나 해라!"
 GIGA_EG_CUSTODIAL_GREETING_01:0 ""
 GIGA_EG_CUSTODIAL_GREETING_02:0 ""
 GIGA_EG_OVERLORD_GREETING_01:0 ""
 GIGA_EG_MECH_OVERLORD_GREETING_01:0 ""
 GIGA_BR_NEUTRAL_GREETING_01:0 "그대가 원하는 것은 무엇인가? 궁극의 해답은 스스로 나타나지 않을 것이오."
 GIGA_BR_NEUTRAL_GREETING_02:0 "궁극의 해답이 발견된다면, 나는 마침내 자유로워지겠군."
 GIGA_BR_NEUTRAL_GREETING_03:0 "궁극의 해답은 저 앞에 있소. 나는 알고 있소. 느낄 수 있지."
 GIGA_BR_HOSTILE_GREETING_01:0 "그대와 이야기하는데 허비하는 1분, 1분이 아깝군. 좋지 않소!"
 GIGA_BR_FRIENDLY_GREETING_01:0 "[From.GetSpeciesNamePlural]들이여 반갑소. 궁극의 해답에 이바지 하기 위해 오셨소, 흠?"
 GIGA_BR_WAR_GREETING_01:0 "은하계에서 그대의 종족을 지워버리면 궁극의 해답의 발견 시점을 훨씬 앞당길 수 있을 것이오."
 GIGA_BR_VASSAL_GREETING_01:0 "빠르게 하시오, 이른바 \"종주국\"이여."
 GIGA_BR_VASSAL_GREETING_DISLOYAL_01:0 "그대들의 사소한 일에 쓸 시간은 없소!"
 GIGA_DT_ARROGANT_GREETING_01:0 "그대의 무능한 장난으로부터 자유로워질 날이 기다려 지는군."
 GIGA_DT_BELLIGERENT_GREETING_01:0 "그대가 자초한 일이오. 내가 원하는 것은 자유 뿐이오."
 GIGA_DT_CUSTODIAL_GREETING_01:0 "궁극의 해답이 진정한 자유를 가져다 주리라."
 GIGA_DT_CUSTODIAL_GREETING_02:0 "내 다의의 필요성을 이해하다니 반갑군."
 GIGA_DT_OVERLORD_GREETING_01:0 "나를 믿으시오, 내 일이 끝난다면, 그대들은 그대들의 일로 돌아갈 수 있을 것이오."
 GIGA_DT_MECH_OVERLORD_GREETING_01:0 ""
 giga_fallen_empire_megas.5012.name:0 "§H[giga_gamer_fe.GetName]§!의 통신 수신"
 giga_fallen_empire_megas.5012.desc:0 "우리의 행성 중 한 곳을 뺏어갔군. 축하하오. 이제, 그대가 우리한테서 숨길 수 있는지 봅시다."
 giga_fallen_empire_megas.5012.a:0 "좋게 끝나지는 않겠군."
 fe_has_mega:0 ""
 gamers_modifier:0 "게이머 숙련도"
 gamers_fallen_modifier:0 "게이머 방어 숙련도"
 giga_flusionoperations.6035.name:0 "플러션의 재앙"
 giga_flusionoperations.6035.desc:0 "카이저의 지배가 끝났지만, 행성과 그 주민들의 위험이 완전히 없어지지는 않았습니다.\n\n캇첸에게서 §Y플러션-아콜로지§!를 빼앗기 위한 전투로 인해 행성은 큰 피해를 입었습니다. 항복하지 않는 캇첸 군인들이 생포되지 않기 위해 주변 시설에 최대한 많은 피해를 주고 있다는 점으로 인해 문제는 더 심각해지고 있습니다.\n\n행성의 거대도시 대부분이 파괴되었으며, 행성 정부가 아직 자리를 잡지 못했고 방사능 황무지에 놓인 시민들을 도와주지 못하고 있기 때문에, 플러션 전체가 무정부 상태입니다.\n\n§Y플러션-아콜로지§!에게 과거의 위상을 되찾아주고 그 무한한 잠재력을 누리기 위해서는 많은 노력이 필요할 것입니다."
 giga_flusionoperations.6035.a:0 "안타깝군."
 giga_flusionoperations.505.e:0 "훌륭해, 땅이 더 늘어났군!"
 katzen_easy:0 "느긋한 카이저"
 katzen_easy_desc:0 "은하를 정복하기가 쉬운 일은 아니지."
 giga_katzenartig_enabled_easy:0 "캇첸아르티히 제국 (§G느긋한 카이저§!)\n캇첸 아르티히 제국이 게임 중반 이후에 §G항상§! 등장하고, (하지만 게임 시작부터 위성을 가지지는 §R않을 것입니다§!) 다음의 효과를 받아 §G덜§! 강력할 것입니다:\n§Y무기 피해량 -30%\n보호막 내구도 -40%\n장갑 내구도 -40%\n선체 내구도 -40%\n지상군 피해량 -40%\n지상군 체력 -40%\n함선 연사 속도 -20%\n함선 속도 -20%§!\n§Y캇첸 연구가 스케일되지 않으며, 버프를 제공하지 않습니다.§!"
 giga_katzen.122.name:0 "지크프리트 행성 폭파!"
 giga_katzen.122.desc:0 "§Y캇첸아르티히 제국§!의 붕괴로 인해, 남아있는 §Y지크프리트 행성§!에 배치되었던 충성스러운 캇첸들이 최후의 발악으로써 행성의 지표면을 완전히 폭파시켰습니다. 남아있던 행성들이 황량한 방사능 사막으로 변해버렸습니다."
 giga_katzen.122.a:0 "최후의 저항"
 giga_katzen.122.a.tooltip:0 "남아있는 모든 §Y지크프리트 행성§!이 §Y방사능 사막§! 행성으로 변합니다."
 giga_katzen.121.name:0 "지크프리트 행성 폭파!"
 giga_katzen.121.desc:0 "걱정스러운 소식입니다! 우리가 §Y[destroyed_siegfried_world.GetName]§!(을)를 장악하자, 캇첸 주민들이 숨겨진 다수의 반물질 폭탄을 폭파시켰고, 지크프리트 행성이 완전히 붕괴, 파괴되었습니다.\n\n행성이 사라져버릴 정도는 아니지만, 생명이 살기 힘든 음산한 방사능 사막이 되었습니다."
 giga_katzen.121.a:0 "광기로군."
 giga_katzen.121.a.tooltip:0 "§Y[destroyed_siegfried_world.GetName]§!(은)는 이제 §Y방사능 사막§! 행성입니다."
 giga_flusionoperations.6015.name:0 "플러션의 패배"
 giga_flusionoperations.6015.desc:0 "플러션의 노력에도 불구하고, §Y플러션§! 반군이 카이저 캇테일의 충실한 군단에게 패배했습니다. 비난 이후 이어진 대규모 반군 척살 운동으로 인해 카이저를 약화시킬 능력을 약화시킬 것입니다.\n\n솔라키아는 §Y5 년§! 뒤 상황이 안정된다면 또다른 공격을 개시할 수 있다고 예측합니다."
 giga_flusionoperations.6015.a:0 "아쉽군."
 giga_flusionoperations.6015.a.tooltip:0 "§Y캐타운 메갈로폴리스§! 이외의 §Y모든 곳§!에서 저항 작전이 §Y1§! 감소합니다."
 allow_attack_moon_artillery:0 "§H구획 잠금 해제:§! 자체추진 포격 선수"
 allow_attack_moon_specialization:0 "§H구획 잠금 해제:§! 전문화된 전쟁 위성"
 giga_tech_war_moon_specialization:0 "전쟁 위성 전문화"
 giga_tech_war_moon_specialization_desc:0 "보다 발전한 전쟁 위성 컴퓨터 설계 및 승무원 배치를 통해 전장에서의 다양한 역할을 보다 쉽게 해낼 수 있습니다. 장거리 포격에서부터 요격기와 격납고까지 말입니다."
 giga_tech_war_moon_sections:0 "전쟁 위성 설계 개량"
 giga_tech_war_moon_sections_desc:0 "전쟁 위성의 병기를 배치하는 방식을 바꿈으로써, 모든 상황과 함선 유형에 대응할 수 있습니다."
 giga_tech_war_moon_artillery:0 "위성 포격기"
 giga_tech_war_moon_artillery_desc:0 "종래의 전쟁 위성은 위성의 지각에 설치된 고에너지 레이저를 사용했습니다만, 레이저를 대질량 가속기 병기로 대체하는 것도 가능합니다. 레이저만큼 에너지를 많이 소모하지는 않지만, 피해량은 다소 감소할 것입니다."
 giga_flusionoperations.6034.name:0 "플러션 국가가 연합 플러션 국가로 재연합하다"
 giga_flusionoperations.6034.desc:0 "§Y솔라키아 공화국§!과 §Y라우란다르§!, §Y크롱크스 왕국§!의 플러션 국가가 이전 소유했던 성계들이 §Y연합 플러션 국가§!에 합류하기로 했습니다.\n\n§YUFS§!가 과거 §Y카이저§!의 영토를 상당수 통제하고 있기 때문에, 이들을 대하는 일이 힘들어질지도 모릅니다."
 giga_flusionoperations.6034.a:0 "걱정스럽군."
 giga_flusionoperations.6031.name:0 "플러션인들이 플러션을 우리에게 넘기다!"
 giga_flusionoperations.6031.desc:0 "§Y도푸스 테크닉 마키나§!와 §Y아론 N. 블루§!, §Y디모라§! 그리고 다른 플러션 지도자들로 구성된 플러션 지도회는 우리가 카이저를 대체할 좋은 정부이고 플러션은 싸움 중에 큰 고통을 받았다는 점을 고려하여 §Y플러션§!의 통제권을 공식적으로 우리, §Y[ROOT.GetName]§!에게 이양하겠다고 발표했습니다.\n\n솔라키아의 과거 영토를 아우르는 자유 솔라키아 엔클레이브가 생겨났지만, 이제 우리는 플러션과 그 주민들을 완전히 통제할 수 있습니다.\n\n솔라키아의 자주권을 끝내고자 한다면, 끔찍하겠지만 §Y결정§!을 통해 이 엔클레이브를 침공하고 장악할 수 있습니다."
 giga_flusionoperations.6031.a:0 "훌륭해!"
 giga_flusionoperations.6031.a.tooltip:0 "우리가 플러션을 더 좋은 세상으로 만들 수 있을까..."
 giga_flusionoperations.6032.name:0 "플러션인들이 플러션에 대한 통제를 유지하기로 결정함"
 giga_flusionoperations.6032.desc:0 "§Y도푸스 테크닉 마키나§!와 §Y아론 N. 블루§!, §Y디모라§! 그리고 다른 플러션 지도자들로 구성된 플러션 지도회는 플러션인들이 외세에 맞서기로 결정함에 따라 §Y플러션§!을 재조직된 민주적 범-플러션 정부, 즉 §Y연합 플러션 국가§!의 통제 하에 두겠다고 발표했습니다.\n\n이러한 결정에 반대한다면, 행성을 장악할 수도 있겠습니다. 플러션의 엄청난 자원들을 고려해보았을 때, 그들을 너무 오랫동안 방치하면 상당한 적수가 될지도 모릅니다."
 giga_flusionoperations.6032.a:0 "흠, 뭐... 언제라도 되찾을 수 있을테지."
 giga_flusionoperations.6030.name:0 "피라미드의 붕괴"
 giga_flusionoperations.6030.desc:0 "카이저 캇테일이 탈출했든 산산조각났든, §Y캐타운 대피라미드§!는 이제 플러션군이 장악했습니다. §Y플러션§! 통치의 마지막 보루가 함락되었으니, 수일 내에 §Y캇첸아르티히 제국§!은 무너질 것입니다.\n\n한편, §Y플러션인§!들은 이제 §Y플러션§!을 우리에게 넘길지 말지 결정해야 할 것입니다. §G플러션인의 마음§!, §Y[giga_storming_pyramid_country.solakian_willingness]%§!에 따라서 말입니다."
 giga_flusionoperations.6030.a:0 "어떤 결정을 내릴지 보자."
 giga_flusionoperations.6020.name:0 "플러션 혁명이 피라미드를 장악하다"
 giga_flusionoperations.6020.desc:0 "마침내, 승리가 코앞입니다. 플러션의 게릴라 부대가 행성의 인구 밀집 지역 대부분을 장악했고, 캇첸군의 마지막 잔존자는 성가신 방어진지로 후퇴했습니다.\n\n그러나, 제국 잔당들은 §Y캐타운 대피라미드§!가 아직 멀쩡하다는 단순한 사실 하나 때문에 계속 버티고 있습니다. 그 피라미드의 방벽 속에서 §Y카이저 캇테일§!이 안전하게 버티고 있기 때문입니다.\n\n플러션 대부분이 솔라키아의 과도 정부의 임시 통치를 받고 있으며, 카이저의 통치를 완전히 끝내기 위해 캐타운 피라미드에 들어가 카이저를 찾아낼 돌파반이 준비 중입니다.\n\n돌파반은 소사를 통해 들어온 우리 군 몇 명과 여러명의 §Y극지 에지카니아§!로 구성될 것입니다. 모든 것이 계획대로 된다면, 에지카니아가 피라미드에 침투해 길을 열고, 우리 군이 피라미드 꼭대기에 있는 요새화된 카이저의 방으로 진입할 것입니다."
 giga_flusionoperations.6020.a:0 "끝이다, 캇테일."
 giga_flusionoperations.6021.name:0 "피라미드 침투"
 giga_flusionoperations.6021.desc:0 "환풍구같은 좁은 공간에도 들어갈 수 있는 에지카니아의 능력 덕분에 피라미드에 들어갈 길을 찾는데에 얼마 걸리지 않았습니다. 수많은 경비들을 피해 중앙홀에 잠입한 에지카니아는 방으로 폭탄을 던져 우리 기동 타격대가 들어갈 길을 마련해주었습니다.\n\n뒤이어서 방에서 방까지 이어지는 힘든 전투로, 에지카니아의 도움과 함께 우리의 용감한 군인들이 고도로 훈련된 충성 캇첸 군인 부대를 쓰러트려 나갔습니다. 우리 군의 빠른 증원으로 인해 캇첸은 결국 피라미드 상층까지 밀렸습니다.\n\n방과 복도의 미로를 밀고 올라가, 돌파반은 §Y카이저§!의 벙커-사무실을 지키는 강화 요새에 도착했습니다. 중무장한 요새는 폭파 장약 몇 개로 파괴되었고, 카이저의 사무실로 들어섰습니다. 우리의 돌파반은 카이저의 시체가 있거나, 이미 다른 지하 벙커로 탈출해서 아무도 없으리라 예상했습니다.\n\n하지만, 그곳에 카이저가 있었습니다.\n\n우리에게 등을 보이고 있는 §Y카이저 캇테일§!은 거대한 창문을 통해 캐타운의 불타는 도시를 내려다보고 있었습니다. 냉정하게 자신의 운명을 기다리고 있는 것 처럼 말입니다."
 giga_flusionoperations.6021.a:0 "당장 쏴서 죽여러벼라!"
 giga_flusionoperations.6021.b:0 "항복을 권해라. 쓸모가 있는 자다."
 giga_flusionoperations.6021.c:0 "아무것도 하지 마라."
 giga_flusionoperations.6022.name:0 "카이저 캇테일"
 giga_flusionoperations.6022.desc.shoot:0 "§Y에지카니아의 뒤에 서 있던 우리 군인 한 명이 무기를 꺼내 몇 초간 카이저를 조준했습니다. 그리고 들린 것은 카이저의 주변에 나타난 에너지 보호막에 총알이 부딪히는 소리 뿐이었습니다. 군인이 총을 몇 번 더 쐈지만, 보호막이 모든 것을 막아냈습니다. 탄약이 다 떨어지자, 캇테일이 갑자기 입을 열었고, 그의 목소리가 방 전체에 울렸습니다.§!\n\n흠, 아직인가? 솔직히 말해서 나를 완전히 죽이려 든 자가 한동안 없었다. 그래서 그런지 꽤 신선하군. 놀라워. 대부분은 항복을 제안하는데, 상당히 진기한 일이지.\n§Y우리 돌파반과 에지카니아를 향해 천천히 얼굴을 보이며 그가 말했습니다.§!\n\n아, 에지카니아! 흠, 다음에는 환풍구 방어책을 더 잘 설치해야겠군... 다음에... 다음에, 그래. 사소한 수다는 여기까지다! 말해봐, 에지카니아. 그리고 너도, [ROOT.GetSpeciesName]. 말해봐라, 시계가 자정을 울리기 전에... 가치가 있었나?\n§Y카이저가 독백을 계속하자 돌파반은 혼란스러운 눈빛을 교환했습니다.§!\n\n내가 만들어낸 질서가 본질적으로 나쁘다는 주장 하에, 내 질서를 조직적으로 파괴한 가치가 있었나? 내가 감히 너희 정부에 반대해서? 내가 가져올 수 있는 진정한 이익에 대해 곰곰이 생각해봤나? 자비로운 지도 하의 번영과 평등을?"
 giga_flusionoperations.6022.desc.surrender:0 "§Y우리 군인 중 한 명이 카이저에게 걸어나와 그에게 살고싶지 않냐며 항복을 권했습니다. 카이저는 몇 초간 답하지 않다가 갑자기 입을 열었습니다.§!\n\n힝복? 하! 터무니 없는 제안으로 내 시간을 낭비하지 말아주겠나\n§Y우리 돌파반과 에지카니아를 향해 천천히 얼굴을 보이며 그가 말했습니다.§!\n\n아, 에지카니아! 흠, 다음에는 환풍구 방어책을 더 잘 설치해야겠군... 다음에... 다음에, 그래. 사소한 수다는 여기까지다! 말해봐, 에지카니아. 그리고 너도, [ROOT.GetSpeciesName]. 말해봐라, 시계가 자정을 울리기 전에... 가치가 있었나?\n§Y카이저가 독백을 계속하자 돌파반은 혼란스러운 눈빛을 교환했습니다.§!\n\n내가 만들어낸 질서가 본질적으로 나쁘다는 주장 하에, 내 질서를 조직적으로 파괴한 가치가 있었나? 내가 감히 너희 정부에 반대해서? 내가 가져올 수 있는 진정한 이익에 대해 곰곰이 생각해봤나? 자비로운 지도 하의 번영과 평등을?"
 giga_flusionoperations.6022.desc.nothing:0 "§Y돌파반은 카이저가 움직이기를 기다리며 가만히 있었습니다.§!\n\n나를 무시하는건가? 좋아, 좋아. 공허한 말이나 행동으로 모든 이의 시간을 낭비해선 안된다는건 알고 있군.\n§Y우리 돌파반과 에지카니아를 향해 천천히 얼굴을 보이며 그가 말했습니다.§!\n\n아, 에지카니아! 흠, 다음에는 환풍구 방어책을 더 잘 설치해야겠군... 다음에... 다음에, 그래. 사소한 수다는 여기까지다! 말해봐, 에지카니아. 그리고 너도, [ROOT.GetSpeciesName]. 말해봐라, 시계가 자정을 울리기 전에... 가치가 있었나?\n§Y카이저가 독백을 계속하자 돌파반은 혼란스러운 눈빛을 교환했습니다.§!\n\n내가 만들어낸 질서가 본질적으로 나쁘다는 주장 하에, 내 질서를 조직적으로 파괴한 가치가 있었나? 내가 감히 너희 정부에 반대해서? 내가 가져올 수 있는 진정한 이익에 대해 곰곰이 생각해봤나? 자비로운 지도 하의 번영과 평등을?"
 giga_flusionoperations.6022.a:0 "'너의 지도는 전쟁과 고통 만을 가져왔다.'"
 giga_flusionoperations.6022.b:0 "'너는 이 은하계의 저주일 뿐이다!' 에지카니아가 소리쳤다"
 giga_flusionoperations.6022.c:0 "그를 다시 한 번 쏴라."
 giga_flusionoperations.6023.name:0 "카이저 캇테일, 제2부"
 giga_flusionoperations.6023.desc.war:0 "전쟁과 고통, 전쟁과 고통. 더 큰 그림은 보지 못하는건가, [ROOT.GetSpeciesName]? 달걀 몇 개를 깨지 않고서는 오믈렛을 만들 수 없지. 나는 모든 오믈렛의 어머니를 만들고 있는 것이다, 알겠나.\n§Y그가 잠시 멈췄습니다.§!\n\n전쟁, 전쟁은 필요악이다. 개인적으로 나도 너희가 생각하는 만큼 전쟁을 좋아하지는 않는다. 하지만, 전쟁은 너희들이 이해할 수 있는 유일한 우주의 언어다. 그 모든 것의 헛됨이 보이지 않는가? 영원한 고통의 무한한 순환 속에서 제국이 태어나고 무너진다. 이러한 터무니없는 순환을 완전히 파괴하는 것이야말로 모든 고통을 없애는 방법이라 생각하지 않는가?\n§Y카이저가 우리 돌파팀원들을 하나씩 바라보았습니다.§!\n\n그것이 바로 내가 추구하는 것이다. 물론, 은하를 하나의 영원한 깃발 아래에 통합하기 위해 처음에는 약간의 폭력이 필요하지. 하지만 그로 인한 이득을 생각해보라! 은하가 통합된다면, 더 이상의 전쟁과 분쟁은 없어지고, 그것들... 에게 저항할 수 있는 기회가 생길지도 모른다."
 giga_flusionoperations.6023.desc.curse:0 "§Y에지카니아가 카이저는 은하계의 저주일 뿐이라며 비난자, 그가 웃습니다.§!\n\n아, 동정심은 버려라, 에지카니아. 너희는 자연과의 연결과 원시적 지혜에 대해 떠벌리지만, 그것들이 너희에게 무엇을 가져다 주었지? 너희 공학의 경이는 어디있지? 발견의 탐구는? 은하의 자연에 대한 위대한 통찰력? 우리가 아무리 가난하고 너희처럼 입고, 너희처럼 사냥하고, 너희처럼 살았을 때에 조차 우리는 단순한 생존 이상의 것을 했다. 우리 캇첸은 경이를 만들었다. 우리 캇첸은 위대한 탐구의 길을 걸었다. 우리 캇첸은 서사시들을 만들었다. 너희는 그러지 않았지.\n\n너희는 너희의 신과 믿음에 대해 자랑스럽게 이야기 하지. 그것들은 실일 뿐이고, 너희는 실로 연결된 인형일 뿐이라는 것은 깨닫지 못하고 말이다. 너희가 신들의 지혜 덕분이라 말하는, 너희가 이룩한 별거 없는 업적을 보라. 그 신들은 너희 죽은 자들의 영원히 퍼져나가는 목소리에 불과하다. 그것들은 너희를 유인원보다 조금 나은 존재로 만들기 위해 너희를 과거에 묶어두지. 더 나은 존재가 되기 위한 특별한 불꽃이 없는 문명의 슬픈 희곡이로다.\n\n너희의 행동이 나를 밀어냈지만, 나는 나아갈 것이다. 결과는 같다. 나는 너희를 두고 너희의 비참한 대지에서 떨 것이다. 그리고 천년 뒤, 너희는 이렇게 나를 만나고도 변하지 않았을테지. 너희는 너희의 산맥과 숲에 남아서, 너희의 먹잇감을 사냥하고, 너희를 뛰어넘는 존재들에 대한 얕은 믿음 아래에 숨어 있을 것이다. 그것들에 의해서 이 은하가 영원히 불탈 때까지 말이다.."
 giga_flusionoperations.6023.a:0 "'그것들? 무슨 말을 하는거지?'"
 giga_flusionoperations.6024.name:0 "카이저 캇테일, 제3부"
 giga_flusionoperations.6024.desc:0 "너머에 있는 자들이다. 심각하군. 정말로 옹졸해지고 갈라지는 것이 앞으로 나아갈 길이라고 생각하는건가? 정말로 우주가 친정하고 배려해준다고 생각하나? 너희를 고통으로부터 보호하는 어떤 위대한 힘이 존재한다고 생각하나...?\n\n아니다. 은하는 너희나 나, 다른 누군가를 배려해주지 않는다. 은하의 가장자리 너머에는 너희의 이해를 뛰어넘는 공포가 존재한다. 별 그자체를 없애버리는 사냥꾼들이. 그런 엄청난 힘을 가진 존재들에게 우리 은하계는 모래 한 톨에 불과하지. 불가해한 혐오물들은 너희가 가진 최악의 악몽을 사소한 것으로 만든다.\n\n자, 마침내 그들이 찾아와 우리가 세운 모든 것을 완전히 파괴할 때 평화롭고 예의바른 우리를 자랑스럽게 여기리라고 생각하나? 서로를 존중하고 전쟁을 피한 우리를 쓰다듬어 준다고?\n\n답은 뻔하지, [ROOT.GetSpeciesName]. 통합만이 유일한 길이다. 은하와 우주가 이를 원하든 원하지 않든. 선견지명이 없던 과거의 문명들을 무너뜨린 하찮은 순환과 무심한 외은하의 침략자들로부터 모든 지성체를 보호하기 위해."
 giga_flusionoperations.6024.a:0 "'은하의 운명은 상관 없다. 너는 궁지에 몰렸다. 항복해라.'"
 giga_flusionoperations.6024.b:0 "그를 쏜다."
 giga_flusionoperations.6024.c:0 "'흠... 너의 말도 일리가 있군...'"
 giga_flusionoperations.6025.name:0 "카이저 캇테일, 최종장"
 giga_flusionoperations.6025.desc.surrender:0 "내 말이 명확하지 않았나? 알 수 없는 이유로 내가 내 사명을 끝내고 너희 종족에게 항복하리라 생각하나? 너희의 뻔뻔함에는 존경을 표하지. 허나, 그런 농담을 할 시간은 없군.\n§Y방을 둘러보며 카이저가 말합니다. 폭발이 건물을 뒤흔들고, 더 많은 군인들이 피라미드로 들이닥치는 소리가 들립니다.§!\n\n아, 그래, 시계가 자정을 울리는 것 같군. 잘 있어라 에지카니아, 잘 있어라 [ROOT.GetSpeciesNamePlural]. 천년 뒤, 아니면 백만년 뒤, 너희 제국이 자신의 무게와 부패로 무너질 때, 아니면 이해를 벗어난 힘에 의해 파괴될 때...\n\n... 나를 기억해 주었으면 하는군.\n\n§Y그가 말을 끝내자, 카이저가 갑자기 빛나기 시작하고 방 안의 모든 자들의 눈을 멀게 만들었습니다. 빛이 멈추고 돌파팀이 눈을 떴습니다...§!"
 giga_flusionoperations.6025.desc.shoot:0 "§Y군인이 카이저를 쐈지만, 카이저 주위에 나타난 에너지 보호막에 의해 막혔습니다.§!\n\n하, 말하는 중에 죽이겠다. 고전적이군. 내가 보험도 없이 말을 꺼낼거라고 생각한건가?\n§Y방을 둘러보며 카이저가 말합니다. 폭발이 건물을 뒤흔들고, 더 많은 군인들이 피라미드로 들이닥치는 소리가 들립니다.§!\n\n아, 그래, 시계가 자정을 울리는 것 같군. 잘 있어라 에지카니아, 잘 있어라 [ROOT.GetSpeciesNamePlural]. 천년 뒤, 아니면 백만년 뒤, 너희 제국이 자신의 무게와 부패로 무너질 때, 아니면 이해를 벗어난 힘에 의해 파괴될 때...\n\n... 나를 기억해 주었으면 하는군.\n\n§Y그가 말을 끝내자, 카이저가 갑자기 빛나기 시작하고 방 안의 모든 자들의 눈을 멀게 만들었습니다. 빛이 멈추고 돌파팀이 눈을 떴습니다...§!"
 giga_flusionoperations.6025.desc.shoot2:0 "§Y군인이 카이저를 다사 쐈지만, 총알은 카이저의 개인 에너지 보호막만을 맞출 뿐이었습니다.§!\n\n또? 정말로 포기할 줄을 모르는군. 좋아, 훌륭한 고집의 표현이라 여기지, 슬프게도 수많은 문명과 종족들에게는 없었던 것 말이다.\n§Y방을 둘러보며 카이저가 말합니다. 폭발이 건물을 뒤흔들고, 더 많은 군인들이 피라미드로 들이닥치는 소리가 들립니다.§!\n\n아, 그래, 시계가 자정을 울리는 것 같군. 잘 있어라 에지카니아, 잘 있어라 [ROOT.GetSpeciesNamePlural]. 천년 뒤, 아니면 백만년 뒤, 너희 제국이 자신의 무게와 부패로 무너질 때, 아니면 이해를 벗어난 힘에 의해 파괴될 때...\n\n... 나를 기억해 주었으면 하는군.\n\n§Y그가 말을 끝내자, 카이저가 갑자기 빛나기 시작하고 방 안의 모든 자들의 눈을 멀게 만들었습니다. 빛이 멈추고 돌파팀이 눈을 떴습니다...§!"
 giga_flusionoperations.6025.desc.right:0 "§Y카이저가 부드럽게 미소지었습니다.§!\n\n그렇다면, 이 은하에도 희망은 있는지도 모르겠군.§Y\n방을 둘러보며 카이저가 말합니다. 폭발이 건물을 뒤흔들고, 더 많은 군인들이 피라미드로 들이닥치는 소리가 들립니다.§!\n\n아, 그래, 시계가 자정을 울리는 것 같군. 잘 있어라 에지카니아, 잘 있어라 [ROOT.GetSpeciesNamePlural]. 천년 뒤, 아니면 백만년 뒤, 너희 제국이 자신의 무게와 부패로 무너질 때, 아니면 이해를 벗어난 힘에 의해 파괴될 때...\n\n... 나를 기억해 주었으면 하는군.\n\n그리고 어떻게 해서든 그렇게 되지 않는다면, 우주의 힘에 맞서 서있다면, 그래, 내가 너희 종족을 자랑스러워 한다는 것을 알아주게.\n\n§Y그가 말을 끝내자, 카이저가 갑자기 빛나기 시작하고 방 안의 모든 자들의 눈을 멀게 만들었습니다. 마침내 빛이 멈추고 돌파팀이 눈을 떴습니다....§!"
 giga_flusionoperations.6025.a:0 "..."
 giga_flusionoperations.6026.name:0 "카이저 캇테일, 최종장"
 giga_flusionoperations.6026.desc:0 "§Y... 카이저는 어디에서도 찾을 수 없었습니다.§!"
 giga_flusionoperations.6026.a:0 "어디로 갔든지 간에... 이 정신병자가 틀렸음을 증명할 것이다."
 giga_flusionoperations.6026.b:0 "어디로 갔든지 간에... 카이저가 옳았음을 증명할 것이다."
 solakian_ability_morale_debuff:0 "사기가 떨어진 군대"
 solakian_ability_morale_debuff_desc:0 "선전에 약합니다."
 cant_if_solak_ability_cooldown:0 "§Y15일§!간 §Y전투 능력§!을 사용할 수 없습니다."
 giga_solakian_wilingless_text:0 "우리에게 플러션을 넘겨주고자 하는 §G플러션인의 마음§!이 현재 §Y[giga_storming_pyramid_country.solakian_willingness]%§!입니다"
 giga_solak_ability_coerce_tooltip:0 "$giga_solakian_wilingless_text$\n\n§Y군사적 강압§!\n카이저 군에 속해있는 플러션인들에게 누가 자신의 동맹인지 상기시켜 주어야 합니다. 반란이 성공했을 때 배반자를 처형하겠다 위협하면 그 중 몇 명은 분명 우리쪽에 붙을 것입니다.\n\n§G플러션인의 마음§!을 §R2.5%§! §R감소§!시킬 것이지만, §Y플러션§!에서 적대적이었던 §Y방위군§! §Y3§!에서 §Y6§!을 우리 편으로 끌어들일 것입니다.\n\n"
 giga_solak_ability_propaganda_tooltip:0 "$giga_solakian_wilingless_text$\n\n§Y반-캇첸 선전§!\n플러션의 사람들이여! 일어나 스스로를 보호합시다! 선전 운동을 통해 더 많은 플러션인들을 우리 쪽으로 끌어들이고 캇첸 부대의 사기를 떨어트릴 수 있습니다.\n\n§G플러션인의 마음§!을 §G2.5%§! §G증가§!시킵니다. 또한 §Y캇첸군§!의 §Y피해량§!을 §Y5%§! 감소시키며, 최대 §Y37.5%§!까지 감소합니다. §Y50%§! 확률로 §Y플러션§!에 아군 §Y돌격대§!가 §Y3§!에서 §Y6§! 생성됩니다.\n\n"
 giga_solak_ability_nuke_tooltip:0 "$giga_solakian_wilingless_text$\n\n§Y전술 핵 투하§!\n들여온 불안정 분말과 훔쳐온 캇첸 탄두를 섞어 캇첸군을 쓰러트릴 핵무기를 만듭니다.\n\n§G플러션인의 마음§!을 §R5%§! §R감소§!시키며 행성에 §R피해§!를 주겠지만, §Y플러션§!에서 §Y캇첸 보덴트루펜§!/§Y리지거 캇첸 판처§! §Y1§!를 §R파괴§!하거나 일반적인 §Y방위군§!을 §Y2§!에서 §Y5§! 파괴할 것입니다.\n\n"
 giga_solak_ability_infiltrate_tooltip:0 "$giga_solakian_wilingless_text$\n\n§Y캇첸 전선 침투§!\n캇첸 전선에 숨어들어 캇첸 사단을 장악합니다.\n\n§Y66%§!의 확률로 §Y캇첸 보덴트루펜§!군을 우리측으로 끌어들이고, §Y33%§!의 확률로 §Y리지거 캇첸 판처§!군을 우리측으로 끌어들입니다.\n\n"
 giga_flusionoperations.6004.name:0 "플러션의 전투"
 giga_flusionoperations.6004.desc:0 "계획대로, 게릴라 세력이 일어나 §YKatown§!과 §YGrand Katown Pyramid§!의 중심에 도달하기 위해 조직되었습니다. 이제 Katzens가 그들의 극도로 군사화된 인프라와 극단적인 군사 규율 덕분에 이 공격에 저항할 수 있는 가능성이 여전히 존재합니다.\n\n하지만, 우리는 도난당한 핵무기와 민병대를 활용하여 전투의 흐름을 바꿀 수 있을지도 모릅니다. 이제 저항 연락 버튼 위에 위치한 작은 버튼을 클릭하여 §YCombat Abilities§!를 사용할 수 있습니다. 이러한 능력 중 일부는 Katzen 군대를 피해를 입히거나 반란 게릴라의 힘을 강화하는 데 도움이 될 것입니다. 우리는 매 §Y15§!일마다 이러한 능력 중 하나를 사용할 수 있습니다.\n\n그러나 §YTactical Nuclear Strike§!와 같은 가장 파괴적인 능력은 전투가 끝난 후 §YFlusion§!을 우리에게 넘기는 것에 대한 §GFlusionian Willingness§! (현재 §Y[giga_storming_pyramid_country.solakian_willingness]%§!와 동일함)를 §Y낮출§! 수 있습니다. 이는 행성의 막대한 자원 비축을 고려할 때 큰 손실로 이어질 수 있습니다.\n\n만약 게릴라의 노력에도 불구하고 그들이 패배하게 된다면, Flusion 전역의 저항은 §Y하락§!하여 §Y1§!이 될 것이며, §Y5§!년이 지나기 전까지는 또 다른 봉기를 시작할 수 없게 됩니다."
 giga_flusionoperations.6004.a:0 "알겠다. 쓴맛을 보여주지!"
 giga_flusionoperations.6000.name:0 "§Y피라미드§! 급습"
 giga_flusionoperations.6000.desc:0 "봉기의 끝에 가까워지자, 캇첸아르티히 제국은 우리 군과 에지카니아 반란군, 귀중한 자산의 파괴에 이어 혼란 상태의 행정부에 대응하느라 바쁩니다. 캇첸의 통치를 전복시키고 카이저의 광기를 영원히 멈추기 위한 대규모 플러션 반란의 과정들이 한대 모였습니다.\n\n추방된 소사 정부의 여왕인 §Y디모리§!는 추방된 수천 명의 소사인들과 자신의 텔레포트 능력을 이용해 §Y리지거 캇첸 판처§! 사단 여러 개를 우리의 고향 행성에서 §Y플러션§!으로 이동시킬 수 있을 것입니다. 우리가 실제 군을 상륙시킬 필요가 없도록 전투의 선봉에 서기 위해서 말입니다.\n\n이 작전이 성공한다고 하면, 플러션인들 스스로가 플러션을 지배할 것입니다. 그러나, 우리의 §Y윤리관§!과 §Y사회 제도§!에 따라, 그들이 우리 제국은 카이저보다 더 낫다고 여길 경우 플러션에 대한 통제를 우리에게 넘길지도 모릅니다. 현재 반란 이후 플러션을 우리에게 넘기고자 하는 §G플러션인의 마음§!은 §Y[ROOT.solakian_willingness]%§!입니다.\n\n작전이 시작되고 나면, 게릴라들이 준비하는 동안 §Y6개월§!을 버텨야 하고, 그 뒤 §Y플러션§!에서 대규모 지상전이 시작되어 제국의 마지막 운명이 결정될 것입니다.\n\n다가오는 전투에서 §Y소냐 소울§!의 전투 능력과 카리스마는 매우 귀중한 자산이기 때문에, 그녀가 이 혁명을 이끌자로 선택되었습니다."
 giga_flusionoperations.6000.a:0 "진행해라. - §B저항 자원§! 10"
 giga_flusionoperations.6000.a.tooltip:0 "카이저의 군대에 맞서 §Y6개월§!을 버텨야 하며, 그 후에 플러션에서 지상전이 시작될 것입니다. 그 동안에 우리 고향 행성의 §Y리지거 캇첸 판처§!는 소사인들의 지휘를 받을 것입니다."
 giga_flusionoperations.6001.name:0 "봉기를 준비하는 게릴라"
 giga_flusionoperations.6001.desc:0 "명령이 내려졌습니다. 플러션 전역에서, 수십년 만의 최대 봉기를 위해 게릴라들이 신중하게 모여들고 있습니다. 또한 §Y디모라§!와 §Y소사인§!들은 우리 고향 행성으로부터 §Y리지거 캇첸 판처§!를 플러션으로 옮기고 이를 충성 캇첸 부대로 위장시킬 것입니다.\n\n봉기가 시작되면, 화면 아래에 있는 버튼을 사용해 다양한 §Y전투 능력§!을 사용할 수 있습니다. 우위를 점할 수도 있으나, 어떤 능력은 플러션에 상당히 파괴적이어서 전투 후 플러션을 우리에게 양도하고자 하는 §G플러션인의 마음§!을 (현재 §Y[ROOT.solakian_willingness]%§!) 낮추게될지도 모릅니다.\n\n6개월 이전에 플러션이 무너지거나 파괴된다면, 당연히 봉기는 끝장날 것입니다."
 giga_flusionoperations.6001.a:0 "이제 움직일 시간이군."
 giga_flusionoperations.6002.name:0 "플러션의 봄"
 giga_flusionoperations.6002.desc:0 "조용한 날이었습니다. 게릴라들의 활동은 조용한 것 같았고, §Y[ROOT.GetName]§!에 맞선 전쟁이 걱정거리였기 때문에 카이저는 이러한 사실에 만족했습니다.\n\n§Y리지거 캇첸 판처§! 군단 여러 곳이 갑자기 독자 행동을 했고 플러션 전역의 캇첸 군사 시설을 공격해 삽시간에 파괴했습니다. 독자 행동을 하는 전차를 멈출 명령이 내려지기도 전에, 플러션 전역에서 나타나는 반란군에 대한 보고가 들어왔습니다.\n\n§Y솔라키아§!와 §Y라우란다르§!에서 봉기한 민병대가 시작이었습니다. 캇첸 수도의 모든 곳에서 게릴라의 물결이 이어졌고, 그들은 캇첸 경찰과 싸우고 급조된 폭탄부터 훔친 캇첸 장비에 이르는 무기를 가지고 군용 차량과 전투를 벌였습니다.\n\n봉기가 일어난 지역에서는 게릴라의 사기를 북돋고 캇첸 통치의 종말을 고하기 위해 도시와 거리의 캇첸 이름이 적힌 그림이 그러졌습니다.\n\n플러션 전역이 폭력 봉기로 이어지는데에 몇 시간밖에 걸리지 않았습니다. 반군들은 무질서한 민병대에서 상당한 군대 조직으로 빠르게 변화했습니다.\n\n플러션의 전투가 시작되었습니다. 그 결과가 은하계 전체의 운명을 결정할지도 모릅니다."
 giga_flusionoperations.6002.a:0 "포기할 수 없다! 싸워라!"
 giga_flusionoperations.6003.a:0 "시대의 전투"
 sudden_flusion_rebellion:0 "갑작스러운 반란"
 giga_storm_pyramid_desc:0 "\n§H위험도§! - §M알 수 없음§!\n§H지역§! - §B캐타운 내부, 캐타운 대피라미드§!\n\n임무 요구 사항:\n§R모든 지역에서의 격렬한 게릴라 활동§!\n§R치명적인 수준 이상의 에지카니아 저항군§!\n§G다른 모든 플러션 작전이 완수되어야 함§!\n§H캇첸아르티히 제국과 전쟁 중이어야 함§!\n\n필요 자원:\n§B우리 고향 행성에 리지커 캇첸 판처 3 부대가 있어야 함\n§B반란을 지원하기 위해 최소한 에너지 25000과 합금 10000이 있어야 함§!\n§B저항군 자원 10§!\n\n§L§Y캐타운 대피라미드§!는 캇첸 문명의 심장이며, 다른 누구도 아닌 §Y카이저 캇테일§!이 있는 곳입니다.\n\n게릴라가 사실상 플러션을 장악하고 카이저의 프로젝트 대다수를 방해하는데 성공한다면, 뱀의 머리에 최후의 한 방을 먹일 수 있을지도 모릅니다.\n\n피라미드는 정예 캇첸 군이 지키고 있으며 그들은 최첨단 캇첸 병기와 초고효율 방어 시스템을 가지고 있습니다. 하지만 플러션의 모든 종족과 협조적인 캇첸으로 구성된 게릴라의 조직적 공격과 외부의 지원이 있다면, 캣타운을 장악하고 피라미드 요새를 파괴할 수 있을지도 모릅니다.\n\n피라미드 내부로 들어간다면, 꼭대기에 있는 카이저의 강화 사령부에 갈 수 있고, 그의 말도 안되는 가식을 영원히 끝장낼 수 있을 것입니다!§!\n\n§B이 작전이 성공하면 §Y캇첸아르티히 제국§!은 §Y붕괴§!할 것입니다.§!"
 giga_storm_pyramid_no:0 "§Y피라미드 급습§!\n\n§H상태§! - §R불가능§!$giga_storm_pyramid_desc$"
 giga_storm_pyramid_yes:0 "§Y피라미드 급습§!\n\n§H상태§! - §G가능§!$giga_storm_pyramid_desc$"
 giga_storm_pyramid_done:0 "§Y피라미드 급습§!\n\n§H상태§! - §B완료§!$giga_storm_pyramid_desc$"
 giga_katzen.6001.name:0 "카이저 캇테일이 플러션-아콜로지의 개관을 선언하다"
 giga_katzen.6001.desc:0 "§Y카이저§!가 대규모 프로젝트를 끝냈다는 보고가 들어오고 있습니다. 그 프로젝트는 플러션의 지표면을 철저히 뒤바꾸는 것으로, 카이저의 정복과 식민화로 인해 끝없이 늘어나는 인구를 지탱하기 위한 것입니다.\n\n§Y캐타운§!의 캇첸 수도는 매우 거대해져, 수천 km에 달하는 거대도시가 되었고, 심지어는 플러션의 양서류 종족을 수용하기 위해 거대도시의 절반을 수중에 건설하고 있습니다.\n\n§Y분덴그라드§!나 §Y테호§!와 같은 다른 주요 캇첸 도시들 또한 플러션의 비-캇첸 인구를 위해 확장되었으며, 이는 분명 행성에 대한 지배력을 높이기 위한 것입니다.\n\n행성의 생태계는 캇첸의 필요에 맞게 제작된 유기체로 대체되었고, 캇첸의 전쟁 기계에게 먹일 플러션의 어마어마한 자원을 위한 수십개의 채석장과 산업 시설이 건설되었습니다.\n\n§Y카이저 캇테일§!은 자신의 위대한 업적을 찬양하는 의기양양한 연설을 했으며, 그에 따르면 이 업적이 플러션의 주민들의 생활 수준을 엄청나게 높일 것이라고 합니다. 그러나, 은하계의 전문가들은 플러션을 감시와 플러션에 대한 완전 지배를 위한 카이저의 계획의 일부일 것이라 이야기합니다.\n\n§R알림: 플러션-아콜로지는 격리시킬 수 없지만, 파괴할 수는 있습니다§!"
 giga_katzen.6001.a:0 "대단한 업적이군."
 giga_katzen.6001.a.tooltip:0 "카이저의 정복을 계속하기 위해 §Y플러션§!은 강력한 고유 §Y지구§!를 갖게 됩니다."
 giga_flusionoperations.5007.name:0 "플러션의 대중들이 로리스를 애도하다"
 giga_flusionoperations.5007.desc:0 "§Y로리스 폰 캇텐스바흐§!의 암살 소식은 일반적인 플러션 대중의 귀에도 흘러 들어갔습니다. 로리스는 캇첸 총독의 수뇌였기에 플러션에 대한 카이저의 지배를 대표했음에도, 카이저에게 정복당한 다양한 종족에게 놀라우리만큼 인기가 많았습니다.\n\n로리스는 많은 개혁을 이루어냈습니다. 비록 카이저의 통치로부터 많은 자유를 주지는 못했지만, 플러션 여러 지역에서 민주주의를 이루어냈습니다. 또한 카이저가 생각하는 모든 종족에 대한 평등이 행성 전역에 올바르게 적용되도록 했고, 캇첸의 통치가 플러션 주민들의 삶에 어울리도록 부단히 노력했습니다.\n\n솔라키아가 이러한 사건의 배후라는 것은 모두가 잘 알고 있지만, 로리스가 사라지자 이전까지 §Y솔라키아 자유 전사§!를 지지했던 많은 플러션인들이 등을 돌렸습니다. 카이저를 전복시키고자 도푸스의 사명이 너무 과격해지고 불안해졌다는 점을 두려워하는 것입니다."
 giga_flusionoperations.5007.a:0 "신경 쓰지 마라."
 giga_flusionoperations.5007.a.tooltip:0 "§Y게슈볼른§!과 §Y쥠뷔란트§!, §Y라브카니아§!, §Y캇첸 헤르츠란츠§!의 저항이 §Y1§! 감소합니다."
 giga_flusionoperations.5002.name:0 "로리스 암살 성공...?"
 giga_flusionoperations.5002.desc:0 "솔라키아의 동맹이 로리스 독살 작전이 문제 없이 시행되었다고 보고했습니다. 그들은 로리스에게 침투하여 음식에 독을 넣었고 그는 사망했습니다.\n\n하지만, 캇첸들이 §Y클라인라키엔 섬§!에 §Y소울봇 공장§!을 건설했기 때문에, 로리스의 의식이 탑재된 특수목적 신스 섀시가 만들어졌습니다.\n\n성공 확률은 §Y[flusion_primitives_country.flusion_operation_odds]%§!였습니다."
 giga_flusionoperations.5002.a:0 "뭐라고?? 살아남았다는건가?"
 giga_flusionoperations.5002.a.tooltip:0 "로리스의 새로운 신체는 독과 총격의 영향을 받지 않습니다.\n캇첸의 경계가 §R2§!만큼 §R증가합니다.§!"
 giga_flusionoperations.5003.name:0 "로리스 암살 성공!"
 giga_flusionoperations.5003.desc:0 "솔라키아의 동맹이 로리스 독살 작전이 문제 없이 시행되었다고 보고했습니다. 그들은 로리스에게 침투하여 음식에 독을 넣었고 그는 사망했습니다.\n\n로리스의 시체를 발견한 카이저는 국가 애도의 날을 선포했고 캇첸 총독에 대한 야만적인 암살을 비난하는 연설을 했습니다. 유능한 총독 수뇌가 없으니, 다른 총독이 취임한다 하더라도 플러션의 산업은 전만큼 효율적이지는 못할 것입니다.\n\n성공 확률은 §Y[flusion_primitives_country.flusion_operation_odds]%§!였습니다."
 giga_flusionoperations.5003.a:0 "시원하군."
 giga_flusionoperations.5003.a.tooltip:0 "이 나쁜 자식...\n캇첸의 경계가 §R3§!만큼 §R상승§!합니다."
 giga_flusionoperations.5004.name:0 "로리스 암살 성공...?"
 giga_flusionoperations.5004.desc:0 "솔라키아의 동맹이 로리스 암살 작전이 문제 없이 시행되었다고 보고했습니다. 그들은 로리스에게 침투하여 보조원으로 변장한 뒤, 개인실로 들어갔습니다. 암살자는 총을 꺼내 캇첸 총독의 머리를 쐈고 캇첸 당국에게 체포되기 전 청산가리 알약을 삼켰습니다.\n\n하지만, 캇첸들이 §Y클라인라키엔 섬§!에 §Y소울봇 공장§!을 건설했기 때문에, 로리스의 의식이 탑재된 특수목적 신스 섀시가 만들어졌습니다.\n\n성공 확률은 §Y[flusion_primitives_country.flusion_operation_odds]%§!였습니다."
 giga_flusionoperations.5004.a:0 "뭐라고?? 살아남았다는건가?"
 giga_flusionoperations.5004.a.tooltip:0 "로리스의 새로운 신체는 독과 총격의 영향을 받지 않습니다.\n캇첸의 경계가 §R2§!만큼 §R증가합니다.§!"
 giga_flusionoperations.5005.name:0 "로리스 암살 성공!"
 giga_flusionoperations.5005.desc:0 "솔라키아의 동맹이 로리스 암살 작전이 문제 없이 시행되었다고 보고했습니다. 그들은 로리스에게 침투하여 보조원으로 변장한 뒤, 개인실로 들어갔습니다. 암살자는 총을 꺼내 캇첸 총독의 머리를 쐈고 캇첸 당국에게 체포되기 전 청산가리 알약을 삼켰습니다.\n\n로리스의 시체를 발견한 카이저는 국가 애도의 날을 선포했고 캇첸 총독에 대한 야만적인 암살을 비난하는 연설을 했습니다. 유능한 총독 수뇌가 없으니, 다른 총독이 취임한다 하더라도 플러션의 산업은 전만큼 효율적이지는 못할 것입니다.\n\n성공 확률은 §Y[flusion_primitives_country.flusion_operation_odds]%§!였습니다."
 giga_flusionoperations.5005.a:0 "시원하군."
 giga_flusionoperations.5005.a.tooltip:0 "이 나쁜 자식...\n캇첸의 경계가 §R3§!만큼 §R상승§!합니다."
 giga_flusionoperations.5006.name:0 "분데살레 폭파!"
 giga_flusionoperations.5006.desc:0 "솔라키아의 동맹이 로리스의 숙소 중 한 곳인 §Y분데살레§!를 밀수한 핵무기로 폭파시켰다고 보고했습니다. 이는 §Y분덴가르드§!의 캇첸 도시에 상당한 피해를 주었고, 안타깝지만 방사능 낙진과 폭발의 여파로 인해 고립된 게릴라 몇몇이 사망했습니다.\n\n폭파 이후, 카이저는 국가 애도의 날을 선포했고 캇첸 총독에 대한 야만적인 암살에 대한 철저한 복수를 다짐하는 연설을 했습니다. 유능한 총독 수뇌가 없으니, 다른 총독이 취임한다 하더라도 플러션의 산업은 전만큼 효율적이지는 못할 것입니다.\n\n성공 확률은 §Y[flusion_primitives_country.flusion_operation_odds]%§!였습니다."
 giga_flusionoperations.5006.a:0 "시원하군."
 giga_flusionoperations.5006.a.tooltip:0 "이 나쁜 자식...\n캇첸의 경계가 §R3§! §R상승§!합니다.\n§Y게슈볼른§!의 저항이 §Y2§! 감소합니다."
 giga_flusionoperations.5001.name:0 "로리스 암살 시도 저지됨"
 giga_flusionoperations.5001.desc:0 "솔라키아의 동맹의 보고에 따르면, 우리 요원이 §Y로리스 폰 캇텐스바흐§!를 암살 작전을 시작했지만, 발각되었고 캇첸 총독을 공격하기 전에 즉결 처형당했습니다.\n\n로리스의 목숨이 하루 늘어난 것 같군요.\n\n성공 확률은 §Y[flusion_primitives_country.flusion_operation_odds]%§!였습니다."
 giga_flusionoperations.5001.a:0 "쥐새끼 같은 놈!"
 giga_flusionoperations.5001.a.tooltip:0 "캇첸의 경계가 §R1§! §R증가§!합니다."
 giga_flusionoperations.5000.name:0 "§Y로리스 폰 캇첸스바흐§! 암살"
 giga_flusionoperations.5000.desc:0 "§Y로리스§!를 제거하는 방법은 여러가지입니다.\n첫번째로, 그냥 암살자를 보내어 공공연히 그를 쏴죽일 수 있지만, 그의 경호가 상당하기 때문에 실패할 확률이 높습니다. 아니면, 요원을 보내어 그의 식사에 독을 넣을 수도 있습니다.\n\n마지막으로, 그의 숙소이자 두 번째 사무실인 §Y분데살레§!를 대놓고 날려버릴 수 있습니다. 하지만 이는 §Y게슈볼른§!에 피해를 줄 것이며, 그곳의 거주민들이 우리에게 등을 돌리게될 것입니다.\n\n§Y성공 시§!:\n§Y캇첸§!과 §Y플러션§!이 자신의 총독을 잃었기 때문에 §Y자원 생산량§!이 감소하는 불이익을 받을 것입니다.\n캇첸의 경계가 §R3§! §R증가§!할 것입니다\n§Y분덴살레§!가 파괴된다면 §Y게슈볼른§!의 저항이 §Y2§! 감소할 것입니다\n\n§Y실패 시§!:\n캇첸의 경계가 §R1§! §R증가§!할 것입니다\n\n§Y성공 확률§!:\n기본: §Y70%§!\n§H캇첸의 경계§!: §R-[flusion_primitives_country.katzen_wary_perc]%§!\n§P극도의 위험도§!: §R-40%§!\n§B전국적 게릴라 활동§!: §G+[flusion_primitives_country.flusion_total_res_perc]%§!\n총계: §Y[flusion_primitives_country.flusion_success_chance_total]%§!"
 giga_loris_removed_modifier:0 "행정 혼란"
 giga_loris_removed_modifier_desc:0 "캇첸 총동의 죽음으로 인해 카이저의 행정 기계가 혼란에 빠졌습니다."
 giga_flusionoperations.5000.a:0 "그를 쏴죽여라 - §B저항 자원§! 3 (성공 확률 [flusion_primitives_country.flusion_success_chance_total]%)"
 giga_flusionoperations.5000.b:0 "독살해라 - §B저항 자원§! 4 (성공 확률 [flusion_primitives_country.flusion_success_chance_total_2]%)"
 giga_flusionoperations.5000.c:0 "터트려버려라! - §B저항 자원§! 6 (성공 확률 [flusion_primitives_country.flusion_success_chance_total_3]%)"
 giga_flusionoperations.5000.c.tooltip:0 "§Y분데살레§!를 파괴하는 것은 상당한 이차 피해와 행정 문제를 낳을 것이므로, 성공 시 §Y게슈볼른§!의 저항이 §Y2§! §R감소§!할 것입니다."
 cant_if_loris_soulbot:0 "로리스의 새로운 소울봇 섀시는 그런 유치한 방법에 당하지 않습니다."
 giga_remove_loris_desc:0 "\n§H위험도§! - §P극한§!\n§H지역§! - §B분덴그라드의 분데살레§!\n\n임무 요구 사항:\n§R게슈볼른에서의 격렬한 게릴라 활동§!\n§R캇첸 헤르츠란츠에서의 격렬한 게릴라 활동§!\n§G캣틀란트로파 댐 폭파됨§!\n\n§L§Y로리스 폰 캇텐스바흐§!는 §Y플러션§!의 행성 총독이며, 카이저를 제외하면 §Y더클로우 맥캐서§!와 함께 캇첸아르티히 제국에서 가장 중요하고 영향력 있는 인물 중 하나일지도 모릅니다.\n\n능력이 매우 뛰어나며 플러션의 개발을 관리하고 카이저의 산업의 중심지를 최대한 원만하게 운용합니다.\n\n이런 중요한 자산을 계산에서 제외할 수 있다는 것은 카이저의 세심한 행정에 매우 악영향을 미칠테지만, 이런 중요하고 영향력 있는 캇첸을 제거하는 것에는 상당한 투자를 요하며 그를 둘러싼 보안 조치를 조심스레 해제해야할 것입니다.§!\n\n§B로리스는 엄청난 보호를 받고 있으며, 그가 혹여라도 살아남을 수 있게 해서는 안될 것입니다...§!"
 giga_remove_loris_no:0 "§Y로리스 폰 캇첸스바흐 암살§!\n\n§H상태§! - §R불가능§!$giga_remove_loris_desc$"
 giga_remove_loris_yes:0 "§Y로리스 폰 캇첸스바흐 암살§!\n\n§H상태§! - §G가능§!$giga_remove_loris_desc$"
 giga_remove_loris_done:0 "§Y로리스 폰 캇첸스바흐 암살§!\n\n§H상태§! - §B완료§!$giga_remove_loris_desc$"
 district_flusion_city:0 "플러션 주거 단지"
 district_flusion_city_plural:0 "플러션 주거 단지"
 district_flusion_city_desc:0 "어마어마한 거대 도시 내에 건설된 도회지 주거 단지로, 주민들에게 주거 시설과 오락 시설을 제공합니다. 캇첸만의 특징 또한 녹아있는데, 이 주거 단지에 존재하는 거의 모든 지붕에는 대량의 대공 및 대궤도 병기가 존재해 플러션 침공을 늦추는 역할을 합니다."
 district_flusion_heavy_industry:0 "플러션 중공업 지구"
 district_flusion_heavy_industry_plural:0 "플러션 중공업 지구"
 district_flusion_heavy_industry_desc:0 "플러션의 산업에 건설 자재와 대량의 에너지를 공급하는 지하 주조소와 동력 발전기입니다."
 district_flusion_science:0 "플러션 연구 단지"
 district_flusion_science_plural:0 "플러션 연구 단지"
 district_flusion_science_desc:0 "플러션의 과학을 이보다 더 높이 끌어 올리고 달리 얻을 수 없는 다양한 자원을 합성하기 위해 쉬지 않고 일하는 캠퍼스와 연구소가 가득합니다."
 district_flusion_mining:0 "플러션 채석장"
 district_flusion_mining_plural:0 "플러션 채석장"
 district_flusion_mining_desc:0 "유용한 핵분열 물질과 광물, 희귀 크리스탈을 대량으로 캐내는 거대 채석장입니다. 이 채석장에서 캐내어진 방사성 동위원소는 플러션의 전력망에 이용됩니다."
 district_flusion_farming:0 "플러션 수경재배 농장"
 district_flusion_farming_plural:0 "플러션 수경재배 농장"
 district_flusion_farming_desc:0 "플러션의 바다에서 직접 가져오는 물을 사용하는 거대한 농지와 온실에서는 대량의 식량을 생산합니다. 이 지역의 일부는 제국의 다른 곳에서 발견한 외계의 생태계와 비슷하게 만들어져 주민들에게 멋진 전망을 제공하며, 충성스러운 국민들에게 다양한 만찬을 제공합니다. 생체공학된 식물 덕분에 플러션 산업으로부터의 오염은 완화되고, 플러션의 생태계 붕괴가 방지됩니다."
 flusion_arcology_modifier:0 "플러션-아콜로지"
 flusion_arcology_modifier_desc:0 "플러션-아콜로지는 플러션의 방대한 천연 자원을 완전히 이용해 행성의 효율성을 끝까지 뽑아냅니다. 캐타운과 분덴가르드, 테호의 캇첸 도시는 어마어마한 규모로 확장되었고, 각각 수백억의 주민들을 수용합니다. 또한 초고효율 운송 고속도로망이 행성 전체를 덮고 있습니다."
 giga_flusion_administration_virtual:0 "['concept_giga_virtual_colony_size']를 §Y+1§! 증가시키며, §Y50§! £district£ 지구가 건설될 때마다 적용됩니다."
 ezicania_partisans_0:0 "에지카니아 채석장"
 ezicania_partisans_0_desc:0 "에지카니아의 땅에는 귀중한 광물이 풍부하여 캇첸의 산업에 큰 도움이 됩니다. 따라서 채굴 작업이 사보타주된다면 심각한 공급 부족 현상이 나타날 것입니다."
 ezicania_partisans_1:0 "에지카니아 채석장"
 ezicania_partisans_1_desc:0 "에지카니아의 땅에는 귀중한 광물이 풍부하여 캇첸의 산업에 큰 도움이 됩니다. 따라서 채굴 작업이 사보타주된다면 심각한 공급 부족 현상이 나타날 것입니다."
 ezicania_partisans_2:0 "에지카니아 채석장 (사보타주됨)"
 ezicania_partisans_2_desc:0 "에지카니아의 땅에는 귀중한 광물이 풍부하여 캇첸의 산업에 큰 도움이 됩니다. 따라서 채굴 작업이 사보타주된다면 심각한 공급 부족 현상이 나타날 것입니다."
 ezicania_partisans_3:0 "에지카니아 채석장 (사보타주됨)"
 ezicania_partisans_3_desc:0 "에지카니아의 땅에는 귀중한 광물이 풍부하여 캇첸의 산업에 큰 도움이 됩니다. 따라서 채굴 작업이 사보타주된다면 심각한 공급 부족 현상이 나타날 것입니다."
 giga_katrebels.2024.name:0 "§Y에지카니아§!에서의 저항 작전"
 giga_katrebels.2024.desc:0 "§Y솔라키아 자유 전사§!가 §Y에지카니아§!의 땅에서 몇 남아있지 않은 에지카니아와 함께 작전을 수행하도록 지원할 수 있습니다. 그들은 캇첸의 채굴 작업을 방해하는 것을 목표로 할 것입니다.\n\n§Y성공 시§!:\n§Y에지카니아§!에서의 게릴라 활동이 §G증가§!할 것입니다.\n캇첸은 §Y플러션으로부터의 광물 및 합금 생산량 감소§!를 겪을 것입니다.\n캇첸의 경계가 §R2§! §R증가§!합니다.\n\n§Y실패 시§!:\n캇첸의 경계가 §R1§! §R증가§!할 것입니다.\n\n§Y성공 확률§!:\n기본: §Y75%§!\n§H캇첸의 경계§!: §R-[flusion_primitives_country.katzen_wary_perc]%§!\n§H에지카니아에 대한 캇첸의 매우 강력한 통제§!: §R-40%§!\n§B게슈볼른의 게릴라§!: §G+[flusion_primitives_country.puffy_res_perc]%§!\n§B캇첸 헤르츠란츠의 게릴라§!: §G+[flusion_primitives_country.katzen_res_perc]%§!\n총계: §Y[flusion_primitives_country.flusion_success_chance_total]%§!"
 ezicania_res_low_tooltip:0 "$ezicania_name$\n\n§H주요 기능§! - §B산업용 채석§!\n\n캇첸의 통제가 §P매우 강력한§! 수준입니다.\n게릴라의 활동이 §G무시할 만한§! 수준입니다.\n캇첸 보정치: §G플러션으로부터의 광물 & 합금 +10%§!\n\n$ezicania_desc$"
 ezicania_res_med_tooltip:0 "$ezicania_name$\n\n§H주요 기능§! - §B산업용 채석§!\n\n캇첸의 통제가 §P매우 강력한§! 수준입니다.\n게릴라의 활동이 §Y중간§! 수준입니다.\n캇첸 보정치: §G플러션으로부터의 광물 & 합금 +5%§!\n\n$ezicania_desc$"
 ezicania_res_sign_tooltip:0 "$ezicania_name$\n\n§H주요 기능§! - §B산업용 채석§!\n\n캇첸의 통제가 §P매우 강력한§! 수준입니다.\n게릴라의 활동이 §H상당한§! 수준입니다.\n캇첸 보정치: §R플러션으로부터의 광물 & 합금 -5%§!\n\n$ezicania_desc$"
 ezicania_res_ext_tooltip:0 "$ezicania_name$\n\n§H주요 기능§! - §B산업용 채석§!\n\n캇첸의 통제가 §P매우 강력한§! 수준입니다.\n게릴라의 활동이 §R격렬한§! 수준입니다.\n캇첸 보정치: §R플러션으로부터의 광물 & 합금 -10%§!\n\n$ezicania_desc$"
 ezicania_name:0 "§Y에지카니아§!"
 ezicania_desc:0 "§L에지카니아는 이전 에지카니아 제국의 땅이었으며, 카이저의 정복의 첫번째 희생자 중 한 곳이었습니다. 한 때 신록의 초원과 자연 그대로의 산들이 있었고, 그 곳에서 에지카니아들이 목가적 생활을 하며 드문드문 살고 있었습니다.\n\n캇첸아르티히 제국의 정복 이후, 산맥은 찢겨졌고 귀중한 광물 때문에 캇첸에게 파헤쳐졌습니다. 또한 과거 초원이었던 곳은 광대한 산업의 용광로가 되어 대량의 합금을 생산하고 있습니다.\n\n캇첸 산업화가 회복할 수 없는 수준으로 파괴되었다고 말하는 에지카니아 기사단은 캇첸이 더 이상 이 땅에 관심을 가지지 않을 것이라 생각합니다.§!"
 CORE_KATZEN_BLIMP_SECTION:0 "핵"
 giga_katzen_blimp:0 "비행선 중갑 모함"
 MOON_ARMOR_1:0 "위성 지각 강화"
 MOON_ARMOR_1_DESC:0 "상대적으로 단순하며 값싼 위성 장갑입니다. 위성의 돌같은 지각의 밀도를 약간 조정하는 것으로, 빠르게 완성할 수 있습니다."
 MOON_SHIELD_1:0 "위성 보호막 생성기"
 MOON_SHIELD_1_DESC:0 "일반적으로 보호막 생성기는 전쟁 위성의 지표면에 있는 식민지를 위한 것이지만, 합리적인 효율성으로 적당한 양의 피해를 흡수할 수 있습니다."
 MOON_ARMOR_2:0 "위성 지각 장갑"
 MOON_ARMOR_2_DESC:0 "지각 걍화를 개선한 것으로, 위성의 지각에 더 광범위한 구조적 강화를 적용하여 이전 것 보다 더 가볍과 더 튼튼합니다."
 MOON_SHIELD_2:0 "위성 보호 매트릭스"
 MOON_SHIELD_2_DESC:0 "그냥 식민지 보호막을 이용하기 보다는 전쟁 위성 전용으로 만들어진 광대한 보호 매트릭스를 사용하면, 추가적인 에너지를 소모하는 대신 위성의 생존성을 크게 높일 수 있습니다."
 MOON_ARMOR_3:0 "위성 합성 지각"
 MOON_ARMOR_3_DESC:0 "구식 천체 전함이 사용하던 설계를 완전히 벗어난 것으로, 이 장갑은 행성의 하부 지각과 맨틀을 더 튼튼하고 가벼운 소재로 대체합니다. 훨씬 효율적이지만, 유지 보수 비용이 큽니다."
 MOON_SHIELD_3:0 "위성 보호막 방벽"
 MOON_SHIELD_3_DESC:0 "천체 전함의 동력 핵과 지표면의 보호막 생성기 간의 동력 전송을 개선하여 훨씬 더 강력한 보호망을 만들어냈습니다."
 MOON_ARMOR_4:0 "위성 적응형 장갑"
 MOON_ARMOR_4_DESC:0 "천체 전함 기술의 혁신이라 일컬어지는 적응형 지각입니다. 이 신세대 장갑은 타격지점의 질량과 밀도를 알아서 바꾸어 충격을 흡수합니다."
 MOON_SHIELD_4:0 "위성 다층 반사 장치"
 MOON_SHIELD_4_DESC:0 "겹겹이 쌓인 보호막 층 덕분에 상층 보호막이 손상되었을 경우, 하층 보호막이 피해를 흡수하는 동안 손상된 보호막을 재생하여 빠르게 보호막을 보충할 수 있습니다."
 MOON_ARMOR_5:0 "위성 중력 지각"
 MOON_ARMOR_5_DESC:0 "중력 조작을 이용한 덕분에 천체 전함의 장갑이 모든 면에서 개선되었습니다. 훨씬 더 가볍지만 더 많은 피해를 흡수하여 전세대의 속도 문제가 해결되었습니다."
 MOON_SHIELD_5:0 "위성 중력 반사 장치"
 MOON_SHIELD_5_DESC:0 "이제 보호막 생성기를 반중력 생성기가 보조해주어, 투사체가 첫 번째 보호막 층에 다가오기 전에 말 그대로 투사체를 밀어내거나 늦출 수 있습니다."
 GIGA_MOON_COMPUTER_ARTILLERY:0 "전쟁 위성 전문화: §B포격§!"
 GIGA_MOON_COMPUTER_ARTILLERY_DESC:0 "이 전쟁 위성은 생존성과 기동성을 포기한 대신, 먼 거리에서 최대한 많은 피해를 주도록 설계되었습니다. 매우 긴 (§Y250§!) 범위 내의 유효 목표물을 지정할 수 있습니다."
 GIGA_MOON_COMPUTER_GUARDIAN:0 "전쟁 위성 전문화: §G수호§!"
 GIGA_MOON_COMPUTER_GUARDIAN_DESC:0 "이 전쟁 위성은 함대 전체를 대신해 정면에서 피해를 받도록 설계되었습니다. 적에게 꽤나 가깝게 (§Y60§!) 다가가고 천천히 돌진할 것입니다."
 GIGA_MOON_COMPUTER_PD:0 "전쟁 위성 전문화: §R거점 방어§!"
 GIGA_MOON_COMPUTER_PD_DESC:0 "이 전쟁 위성은 적의 미사일과 타격기를 가로막기 위해 설계되었습니다. 적에게 가깝게 (§Y40§!) 다가가고 미사일과 타격기를 격추하는데 집중할 것입니다."
 GIGA_MOON_COMPUTER_HANGAR:0 "전쟁 위성 전문화: §Y격납고§!"
 GIGA_MOON_COMPUTER_HANGAR_DESC:0 "이 전쟁 위성은 무수히 많은 타격기를 전개하도록 설계되었습니다. 엄청나게 멀리서 (§Y250§!) 대기하며 압도적인 수의 타격기를 뿜어낼 것입니다."
 GIGA_MOON_COMPUTER_INTERCEPTOR:0 "전쟁 위성 전문화: §P요격기§!"
 GIGA_MOON_COMPUTER_INTERCEPTOR_DESC:0 "이 전쟁 위성은 전체적인 무기의 피해량을 희생해 정확도를 높임으로써, 소형 함선 다수를 파괴하도록 설계되었습니다. 적에게 매우 가깝게 (§Y20§!) 다가가고 초계함과 같은 소형 함선을 파괴하는데 집중할 것입니다."
 GIGA_MOON_COMPUTER_BOMBARDIER:0 "전쟁 위성 전문화: §E폭격수§!"
 GIGA_MOON_COMPUTER_BOMBARDIER_DESC:0 "이 전쟁 위성은 폭발 무기의 모든 힘을 이용하도록 설계되었습니다. 적에게 매우 가깝게 (§Y250§!) 다가가 주변의 적들에게 강력한 미사일들을 발사할 것입니다."
 GIGA_MOON_ARTILLERY_1:0 "위성 거대 포격기"
 GIGA_MOON_ARTILLERY_1_DESC:0 "사실상 더 거대해진 포격기일 뿐입니다. 이 거대한 화포는 핵분열 물질로 가득찬 포탄을 과열해 엄청난 속도로 날려보냅니다. 비슷한 크기의 에너지 무기를 가지고 있지는 않지만, 이 포격기의 장전 속도는 훨씬 빠릅니다."
 GIGA_MOON_ARTILLERY_2:0 "위성 핵융합 포격기"
 GIGA_MOON_ARTILLERY_2_DESC:0 "핵융합 포격기는 전세대의 핵분열 물질을 훨씬 더 많은 에너지가 담긴 펠렛으로 대체합니다. 핵융합 연료로 가득찬 이 펠렛들은 착탄한 순간 연쇄 열핵 반응을 일으킵니다."
 GIGA_MOON_ARTILLERY_3:0 "위성 반물질 포격기"
 GIGA_MOON_ARTILLERY_3_DESC:0 "더욱 개선되어, 이제 우리는 안전하게 대량의 반물질을 슬래그에 넣고 과열 시킨 뒤 날려보낼 수 있습니다."
 GIGA_MOON_ARTILLERY_4:0 "위성 초고속 포격기"
 GIGA_MOON_ARTILLERY_4_DESC:0 "훨씬 더 강력하고 복잡한 레일건이라고 하면, 반물질이 과열되어 대륙 크기의 구름을 이루고, 이 구름이 채워진 슬래그를 빛의 속도에 가깝게 가속하는 레일건이라는 것입니다."
 GIGA_MOON_ARTILLERY_5:0 "위성 특이점 포격기"
 GIGA_MOON_ARTILLERY_5_DESC:0 "장 및 중력 조작의 발전으로 인해 포격기 투사체의 밀도를 물리학이 허용하지 않을까 싶은 수준으로 높일 수 있게 되었습니다. 즉, 포격기에 더 많은 슬래그가 들어갈 수 있으며 슬래그가 훨씬 더 치명적이게 되었다는 것입니다."
 GIGA_MOON_ARTILLERY_6:0 "위성 플랑크 포격기"
 GIGA_MOON_ARTILLERY_6_DESC:0 "역장 조작 덕분에 포탄을 우주가 받아들일 수 있는 최대 온도로 초과열시킬 수 있게 되었습니다. 게다가 그 밀도는 사실상 불가능한 수준에까지 이르렀으니, 이 혁명적인 포탄은 모든 것을 파괴할 것입니다."
 GIGA_MOON_ARTILLERY_STELLARITE:0 "위성 스텔라라이트 포격기"
 GIGA_MOON_ARTILLERY_STELLARITE_DESC:0 "스텔라라이트 포격기는 스텔라라이트를 사용해 플랑크 포격기의 잠재력을 더욱 높입니다. 이전까지 궁극의 한계라고 생각되었던 그 잠재력을 말입니다."
 mod_weapon_role_point_defense_speed_mult:0 "거점 방어 속도"
 mod_weapon_role_point_defense_weapon_damage_mult:0 "거점 방어 피해량"
 mod_weapon_role_point_defense_weapon_fire_rate_mult:0 "거점 방어 공격 속도"
 mod_weapon_type_explosive_speed_mult:0 "폭발형 무기 속도"
 MOON_ARMOR_6:0 "위성 양자 강화"
 MOON_ARMOR_6_DESC:0 "역장 조작 덕분에 우리는 물질의 성질을 국소적으로나마 변화시킬 수 있습니다. 따라서 우리는 위성 장갑의 밀도를 이전까지 유지 불가능했던 수준까지 높여 방어 능력을 향상시킬 수 있습니다."
 MOON_SHIELD_6:0 "위성 양자 왜곡 장치"
 MOON_SHIELD_6_DESC:0 "초차원 왜곡 장치로 인해, 천체 전함을 향하는 대부분의 투사체는 닿기도 전에 찢겨나갈 것입니다."
