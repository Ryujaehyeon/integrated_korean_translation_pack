 matrioshka_brain_7_o_star_DESC:0 "이 $name_matrioshka_brain$은 많은 정자기 포드가 장착되어있어 유기체들이 그들의 방대한 정신을 이상화하여 시뮬레이션 세계로 업로드할 수 있습니다. 유일한 한계는 그들의 상상력 뿐입니다."
