 sm_giga_aiondia_listening_post_desc:0 "두 사이킥 하이퍼사이펀이 내뿜는 장막 에너지의 소용돌이로 작동하는 거대한 비콘입니다. 그것은 유기체든 합성체든 어떤 형태의 의식도 감지할 수 있어 은폐를 뚫어봅니다.\n"
