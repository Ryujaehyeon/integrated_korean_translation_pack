 giga_blokkat.3000.scrapdamagetemp.tooltip:0 "대량의 $blokkat_scrap$을 사용해 블록캣에 대한 우리의 전투 능력을 일시적으로 증대시킬 수 있습니다. 1년에 한 번만 가능합니다."
 giga_blokkat.3000.scrapresearchtemp.tooltip:0 "대량의 $blokkat_scrap$을 사용해 우리의 블록캣 관련 연구 속도를 일시적으로 증대시킬 수 있습니다. 1년에 한 번만 가능합니다."
 blokkat_scrap:0 "£blokkat_scrap_icon£ §M블록캣 고철§!"
 giga_blokkat.3000.mega1:0 "§Y초차원 불안정제§! 구체화| $blokkat_knowledge$ §Y10§!"
 giga_blokkat.3000.mega1.tooltip:0 "§Y초차원 불안정제§!는 이론적인 거대 구조물로, §Y블록캣 초차원 방벽§!을 불안정하여 §Y블록캣-베스터§!가 공격에 노출되게 하기 위해 고차원을 통해 집중된 에너지 광선을 발사할 수 있습니다.\n\n§Y이를 통해 거대 구조물의 건설 현장을 연구할 수 있습니다. 거대 구조물의 추가적인 단계는 더 많은 $blokkat_knowledge$을 필요로할 것입니다.§!"
 giga_blokkat.3000.mega2:0 "§Y불안정제§!의 동력원 설계 | $blokkat_knowledge$ §Y20§!"
 giga_blokkat.3000.mega2.tooltip:0 "§Y초차원 불안정제§!는 고차원을 뚫어 §Y블록캣-베스터§!의 보호막을 가능한 모든 공격개시점을 동시에 타격할 수 있을 것입니다. 거대 구조물이 주위에 건설된 항성은 뭔가... 더 유용한 것으로 바뀔 것입니다.\n\n§Y이를 통해 거대 구조물의 제대로된 첫번째 단계를 연구할 수 있습니다. 거대 구조물의 추가적인 단계는 더 많은 $blokkat_knowledge$을 필요로할 것입니다.§!"
 giga_blokkat.3000.mega3:0 "§Y불안정제§!의 차원막 파성추 개발 | $blokkat_knowledge$ §Y30§!"
 giga_blokkat.3000.mega3.tooltip:0 "차원막이라 하면, 우리의 3차원 현실세계가 담겨 있는 차원 평면을 의미합니다. 블록캣의 보호막을 직접 타격하고자 한다면, 우리는 앞서 말한 차원막을 벗어날 방법을 찾아야만 합니다. 가장 가능성 높은 선택지는, 불안정제에 동력을 공급하는 §Y5차원 특이점§!을 \"초충전\"하는 것과 관련이 있습니다. 이를 통해 특이점을 보호막에 대량의 에너지를 직접 보낼 수 있는 일종의 \"게이트웨이\"로 사용하게 될 것입니다.\n\n거대 구조물의 추가적인 단계는 더 많은 $blokkat_knowledge$을 필요로할 것입니다.§!"
 giga_blokkat.3000.mega4:0 "§Y불안정제§!의 거대 주입기 완성 | $blokkat_knowledge$ §Y40§!"
 giga_blokkat.3000.mega4.tooltip:0 "§Y초차원 불안정제§!의 마지막 부분은 다름아닌 구조물이 작동하는데 필요한 막대한 양의 에너지를 이동시킬 수 있고 구조물을 난해한 고차원 공간을 통해 유도할 수 있는 장치입니다.\n\n차원막 파성추 프로토콜과 이에 따른 5차원 특이점을 이용한 공격 둘 모두 완벽한 정밀도로 사용하려면 말도 안 되는 엄청난 양의 에너지를 요구할 것입니다. 왜냐하면 완전한 시공간 붕괴로 이어질 파멸적인 연쇄 반응이 일어나기까지 우리 우주의 차원 벽을 밀어낼 수 있는 에너지에는 한계가 있기 때문입니다."
 giga_blokkat.3000.mega5:0 "§Y불안정제§!의 시간교란기 제작 | $blokkat_knowledge$  §Y50§!"
 giga_blokkat.3000.mega5.tooltip:0 "§Y기록 대보관소§!에서 블록캣 시간 여행에 대해 발견한 덕분에, 우리는 우리의 §Y초차원 불안정제§!의 구조를 더욱 강화하여, §Y블록캣 초차원 방벽§!이 더 빠른 회복을 위해 시간 이전을 하는 능력을 고장낼 수 있습니다."
 giga_blokkat.3000.blokkscrap:0 "회수된 §P블록캣 고철§! 분석"
 giga_blokkat.3000.blokkscrap.tooltip:0 "블록캣 함선을 파괴함으로써 얻은 $blokkat_scrap$은 부정할 수 없는 과학적 가치를 지니고 있습니다. 블록캣에 대한 우위를 점령하기 위해 가능한 한 빠르게 구체적인 사용법을 알아내는 것이 현명할 것입니다.\n\n§Y이를 통해 $blokkat_scrap$을 사용하여 블록캣에 대한 §H연구§! 및 §H피해량§! 이익 뿐만 아니라, 충분한 고철이 있다면 그들의 부품을 §H역설계§!할 수도 있을 것입니다.§!"
 giga_blokkat.3000.blokkphysics:0 "블록캣 §B차원 조작§! 조사"
 giga_blokkat.3000.blokkphysics.tooltip:0 "블록캣 기술의 많은 부분은 부품의 성능과 효율성을 크게 증가시키기 위해 고차원 공간의 조작을 중심으로 합니다.\n\n이 방식에 대해 연구를 하는 것은 $blokkat_knowledge$을 획득할 우리 능력을 분명히 강화시켜줄 것입니다.\n\n§Y완전히 연구된다면 기술이 잠금 해제되고, 추가적인 $blokkat_knowledge$을 주는 물리학 분야의 반복 기술을 잠금 해제할 것입니다 .§!"
 giga_blokkat.3000.blokksociety:0 "블록캣 §G사회학§! 조사"
 giga_blokkat.3000.blokksociety.tooltip:0 "누군가는 침략 종족의 사회학을 연구하는 것이 특이하고 아마 무의미한 작업이라 생각하겠지만, 그들에 대해 더 배우고자 한다면 종족이 어떻게 생각하고 행동하는지에 대해 아는 것은 귀중한 자산입니다.\n\n사실, 블록캣 사고방식을 연구하고 이해함으로써, 어떤 데이터가 없을 때, 블록캣이 문제나 공학적 무언가를 해결하고자 할 때 어떤 결정을 했을지 알아내어, 이를 사실상 \"보완\"할 방법을 배울 수 있습니다.\n\n당연하게도, 이는 매우 중요한 $blokkat_knowledge$의 수집 속도를 증가시킬 것입니다.\n\n§Y완전히 연구된다면 기술이 잠금 해제되고, 추가적인 $blokkat_knowledge$을 주는 사회학 분야의 반복 기술을 잠금 해제할 것입니다 .§!"
 giga_blokkat.3000.blokkengineering:0 "블록캣 §H물질 공학§! 조사"
 giga_blokkat.3000.blokkengineering.tooltip:0 "블록캣이 사용하는 물질은 엄청나게 진보되어, 사실상 자신의 의지로 우주의 기본힘을 왜곡할 수 있습니다.\n\n우리의 물리학에 대한 현재 이해 수준을 별로 신경쓰지 않는 듯한, 이 거의 파괴 불가능한 물질을 연구하는 것은 우리의 현재 $blokkat_knowledge$ 데이터뱅크에 엄청난 이득을 가져다 줄 것입니다.\n\n§Y완전히 연구된다면 기술이 잠금 해제되고, 추가적인 $blokkat_knowledge$을 주는 공학 분야의 반복 기술을 잠금 해제할 것입니다 .§!"
 giga_blokkat.3020.name:0 "블록캣 사회학"
 giga_blokkat.3020.desc:0 "지금으로서 우리는 블록캣의 문명에 대해 거의 알지 못합니다. 그들은 일종의 신스 군체 의식으로 보이지만 당연히도 외부인들에게 그들의 실제 사회를 거의 보이지 않습니다.\n\n그들의 통신 일부를 해독하고 멀리서 그들의 모선 내부 활동의 징후를 탐지한다면, 우리는 그들의 문명이 실제로 어떻게 기능하고 그들의 동기가 무엇일지에 대해 조금 더 알 수 있을지도 모릅니다.\n\n이를 통해 우리는 다른 곳에서의 데이터가 없을 때, 블록캣의 사고방식과 동기에 대한 우리의 이해도에 기반해 추정하여 \"보완\"할 수 있습니다."
 cant_do_another_blokkat_project_tech_tooltip:0 "또다른 §B블록캣 연구 프로젝트§!를 수행하려면 관련 §Y기술§! 또는 §Y특별 프로젝트§!를 연구해야 합니다."
 giga_blokkat.3020.a:0 "그럼 진행하자."
 giga_blokkat.3020.b:0 "지금은 안된다."
 blokkat_project_already_underway:0 "이미 §B블록캣 연구 프로젝트§!를 수행하고 있습니다."
 can_do_another_blokkat_project_tooltip:0 "이제 또다른 §B블록캣 연구 프로젝트§!를 수행할 수 있습니다."
 giga_tech_blokkat_sociology_study:0 "블록캣 사회학 및 구조 연구"
 giga_tech_blokkat_sociology_study_desc:0 "블록캣 문명이 어떻게 기능하는지에 대한 연구는 그들의 무시무시한 첨단 기술에 대응할 최선의 방법을 아는데 매우 중요한 단계입니다."
 blokkat_sociology_title:0 "$blokkat_knowledge$을 주는 사회학 반복 기술 잠금 해제\n블록캣 지식: §G+1§!"
 blokkat_knowledge_repeatable_title:0 "블록캣 지식: §G+1§!"
 blokkats:0 "블록캣"
 blokkats_desc:0 "블록캣은 우리 기술을 훌쩍 뛰어넘는 기술을 사용하는 극히 진보된 초은하적 문명입니다. 당연하게도 그들은 좋은 연구 자료입니다."
 giga_tech_blokkat_society_repeatable:0 "블록워크 해독 조사"
 giga_tech_blokkat_society_repeatable_desc:0 "블록워크는 모든 블록캣을 함께 연결하며 고차원 내에 존재하는 거대한 정보 및 에너지 네트워크입니다. 이를 해독하고 연구하면 귀중한 블록캣 관련 데이터를 얻을 수 있을 것입니다. 심지어는 블록워크의 방식을 우리 제국에 적용할 수 있을지도 모릅니다."
 giga_blokkat.3021.name:0 "블록캣 조사 보고서: 문명"
 giga_blokkat.3021.desc:0 "§Y블록캣-베스터§!가 방출하는 다양한 아공간 주파수에 대한 면밀한 분석과 그들의 우주선에 대한 원거리 관측을 통해 블록캣과 그들의 문명에 대한 귀중한 데이터를 얻었습니다.\n\n우리가 처음 생각했던것과는 다르게, 블록캣은 사실 군체 의식이라기보다는 개별적인 신스 존재였습니다. 이 존재들은 각각 완전한 자유 의지를 가지고 있지만, 그럼에도 그들은 모든 블록캣을 연결하며 고차원 내에 존재하는 거대한 정보망에 서로 연결되어있습니다. 이는 사실상 거리에 상관 없이 블록캣이 서로 정보의 즉각적인 전송을 가능하게 합니다.\n\n블록캣 스스로가 §Y블록워크§!라 부르는, 이 정보망에 대한 추가적인 연구를 통해 걱정스럽게도, §R우리 은하에 있는 블록캣은 사실 전체 블록캣 분명에서 극히 작은 일부이며, 그들은 우주의 다양한 곳에서 그러한 모선을 적어도 §Y2천§!대 사용하고 있다는 것§!이 밝혀졌습니다.\n\n블록캣의 실제 목표는 아직 명확하지 않지만, 그들의 통신은 모든 모선이 수확한 물질이 알 수 없는 중심 위치로 돌려보내진다는 것을 암시합니다.\n\n우리 은하가 저들의 첫번째 수확 목표가 아님은 자명하며, 블록캣의 손에 얼마나 많은 문명들이 몰락했는지는 알 수 없습니다. 광범위한 블록워크 기록 보관소에 뚜렷하게 언급된 일이 있는데, 블록캣 함대가 은하간 생체 군체 의식을 파괴하고 군체 의식의 잔존 생명체가 우주로 도망가게 두었다고 합니다.\n\n우리의 과학자들은 강력한 암호화 상태인 §Y블록워크§!를 더욱 \"해킹\"할 수 있고 충분한 연구력을 투자한다면 더 많은 $blokkat_knowledge$을 얻을 수 있으리라고 생각합니다."
 giga_blokkat.3021.a:0 "승인한다."
 giga_blokkat.3021.a.tooltip:0 "더 많은 $blokkat_knowledge$을 얻기 위해 블록캣 관련 §Y사회학 반복 기술§!을 연구할 수 있습니다.\n$can_do_another_blokkat_project_tooltip$"
 giga_blokkat.3030.name:0 "블록캣 물리학"
 giga_blokkat.3030.desc:0 "블록캣의 우주선에 대한 초기 조사는 그들의 기술 대부분이 고차원 조작을 중심으로 한다는 것을 보여주었습니다.\n\n현대의 초거대 구조물 공학 방식에서는 꽤나 흔하지만, 블록캣은 이를 전례없는 규모와 본 적 없던 효율로 사용하고있는 듯 합니다. 그리하여 §Y블록캣-베스터§!에게 약점이 존재하는지 알아내려면 그들의 초차원 공학 방식을 조사하는 것은 매우 중요합니다."
 giga_blokkat.3030.a:0 "알았다."
 giga_tech_blokkat_dimension_study:0 "블록캣 초차원 연구"
 giga_tech_blokkat_dimension_study_desc:0 "블록캣의 초처원 공학 방식을 연구하는 것은 이 초은하적 침략자에 대한 완전한 이해로의 중요한 한 걸음입니다."
 giga_tech_blokkat_physics_repeatable:0 "6차원 공학 방식"
 giga_tech_blokkat_physics_repeatable_desc:0 "블록캣의 초차원 공학 방식은 우리가 현재 할 수 있는 것보다 훨씬 더 진보되어있습니다. 이를 연구하고 이해한다면, 응용법은 무한할 것입니다."
 blokkat_dimension_title:0 "$blokkat_knowledge$을 주는 물리학 반복 기술 잠금 해제\n블록캣 지식: §G+1§!"
 giga_blokkat.3031.name:0 "블록캣 조사 보고서: 초차원 공학"
 giga_blokkat.3031.desc:0 "예상한대로, 고차원 공학은 블록캣 문명 내에서는 굉장히 흔하며, 블록캣 기술 하나하나가 이를 어떻게든 사용하고 있습니다.\n\n개별 블록캣은 각각이 그리고 그들 모두가 막대한 양의 물질을 들고다니게끔 해주는 차원 저장 장치를 가지고 있습니다. 또한 이는 모든 블록캣 함선에서 더 거대한 규모로 사용되며 우리 과학자들은 가장 작은 블록캣 함선 조차도 그 차원 화물칸 내에 일반적인 §YG형 항성§! 만큼의 질량을 수용할 수 있다고 추측했습니다.\n\n흥미롭게도, 우리의 초차원 장치 대부분이 우리의 일반적인 3차원 공간을 둘러싸는 4차원에 닿는데에 그치지만, 블록캣은 어떻게 효율적으로 §Y5차원§! 혹은 어쩌면 §Y6차원§!, 심지어는 §Y7차 공간 차원§!까지도 사용하는 법을 알고 있는 것이 확실하며, 이는 그들에게 우리 우주의 물리학에 대한 완전한 장악력을 제공합니다.\n\n분리된 듯한 블록캣 구조물들은 이 거대한 차원 내에서 꽤나 자주 서로와 연결되며, §Y블록캣-베스터§!의 보호막이다 다른 다양한 블록캣 기계와 같이 불가능할 정도로 많은 양의 에너지를 사용하는 장치들은 이 고차원 공간을 통해 먼 곳에서부터 에너지를 전송받아 원격으로 충전될 수 있습니다.\n\n블록캣의 초차원 공학 방식에 대한 추가적인 연구를 계속한다면 아마도 상당한 양의 $blokkat_knowledge$을 축적할 수 있을 것입니다."
 giga_blokkat.3031.a:0 "승인한다."
 giga_blokkat.3031.a.tooltip:0 "더 많은 $blokkat_knowledge$을 얻기 위해 블록캣 관련 §Y물리학 반복 기술§!을 연구할 수 있습니다.\n$can_do_another_blokkat_project_tooltip$"
 giga_blokkat.3050.name:0 "블록캣 공학"
 giga_blokkat.3050.desc:0 "블록캣의 기술 발달 상태에 대해 이야기 하자면, 그들은 기초적인 장갑조차도 가장 진보한 몰락한 제국 구조물을 뛰어넘을 정보로 말도 안되게 복잡한 기술들을 사용하고 있을 수 있다는 것입니다. 당연하게도, 그들의 함선에 맞설 최선의 방법을 알고자 한다면, 블록캣이 사용하는 소재와 공학에 대한 연구를 해야합니다.\n\n원거리 연구가 진행될 것이므로, 블록캣이 어떻게 그 소재를 설계 및 제작하는지 완벽하게 이해할 수는 없을테지만, 이는 앞으로의 블록캣 소재 과학에 대한 이해의 기초로써 중요한 정보를 제공할 것입니다."
 giga_blokkat.3050.a:0 "이해했다."
 giga_blokkat.3051.name:0 "블록캣 조사 보고서: 초지능 공학"
 giga_blokkat.3051.desc:0 "우리의 원거리 조사를 통해 알아내었기를, 블록캣이 사용하는 물질은 그 자체로 기술적 경의라는 것입니다.\n\n무엇보다도, 그들의 건설용 물질이, 고체 전체가 플랑크 길이가 되는 수준으로, 매우 단단하게 짜여있는 듯 하며, 인공적이고 엄청나게 작은 인공 입자의 사용으로 기존의 \"원자\"를 대체하고 그에 따라 일반적인 크기의 원자와 기본 입자에 얽매여있지 않기 때문에 그들의 공학에서 훨씬 더 대단한 수준의 정밀성을 이루어낼 수 있었습니다.\n\n게다가, 블록캣 함선이 손상에 반응하는 것에 대한 현재 관측에 따르면, 그들의 물질에 심어진 인공적인 아원자 신경망으로 인해 물질이 어떤 형태의 \"지능\"을 가지게되어, 변화와 손상에 지능적으로 반응하는 것 같습니다. 이는 블록캣 물질이 가능한 가장 최적화된 방식으로 스스로를 즉시, 그리고 효율적으로 수리할 수 있다는 것을 의미합니다.\n\n이 모든 것이 일종의 고차원 에너지 전송망, 진정한 \"초차원 전력망\"에 의해 떠받쳐지고 있음이 분명하며, 이 전력망은 이 말도안되게 진보한 물질을 지탱하고 유지하는데 필요한 에너지를 원거리에서 공급할 수 있습니다.\n\n블록캣 물질과 관련된 이론에 대한 추가적인 연구를 진행하는 것은 분명 상당한 양의 $blokkat_knowledge$을 줄 것입니다."
 giga_blokkat.3051.a:0 "승인한다."
 giga_blokkat.3051.a.tooltip:0 "더 많은 $blokkat_knowledge$을 얻기 위해 블록캣 관련 §Y공학 반복 기술§!을 연구할 수 있습니다.\n$can_do_another_blokkat_project_tooltip$"
 giga_tech_blokkat_armor_study:0 "블록캣 공학 연구"
 giga_tech_blokkat_armor_study_desc:0 "블록캣의 공학 방식과 물질 과학을 연구하는 것은 그들의 함선과 기술이 어떻게 기능하는지 이해하는데에 중요한 한 걸음입니다."
 blokkat_armor_title:0 "$blokkat_knowledge$을 주는 공학 반복 기술 잠금 해제\n블록캣 지식: §G+1§!"
 giga_tech_blokkat_engineering_repeatable:0 "블록캣 건설 기법"
 giga_tech_blokkat_engineering_repeatable_desc:0 "블록캣이 그들의 함선과 물질을 어떻게 제작하는지 연구하는 것은 원거리에서 수행하기 어려운 작업이지만, 그들의 함선에 대한 귀중한 정보를 줄 것이며 우리 과학 팀이 새로운 그리고 혁신적인 물질을 설계하는데 도움을 줄 것입니다."
 giga_blokkat.3060.name:0 "초차원 불안정제: 건설 현장"
 giga_blokkat.3060.desc:0 "우리가 이제까지 모은 $blokkat_knowledge$으로, 이제 §Y블록캣 초차원 방벽§!을 찢어버릴 수 있는 초거대 구조물을 설계하는 진짜 작업을 시작할 때입니다.\n\n아직 보호막의 내부 작동 우너리를 완전히 이해할 정도로 충분한 지식을 가지고 있지는 않지만, 그럼에도 대략적인 계산을 통해 거대 구조물의 건설에 얼마나 많은 비용이 들고 그것이 얼마나 거대할지 알 수는 있었습니다. 따라서, §Y블록캣 연구 기관§!은 §Y초차원 불안정제§!의 총 비용이 여러번의 단계에 걸쳐 대략 £alloys£ §Y100만§!이라 추정했으며, 거대 구조물은 항성계 대부분을 완전히 에워쌀 것 입니다.\n\n건설 현장은 일반적인 항성 주위에 건설되어야 하며, 성계의 중앙 항성은 일종의 매우 실험적인 천체로 변환되어 우리의 현실을 \"뚫고\" §Y고차원 방벽§!이 뿌리내린 고차원을 더 쉽게 관통하는데 사용될 것입니다. 하지만 이 과정에 대한 정확한 상세 정보는 여전히 전혀 알지 못합니다.\n\n여하튼, 우리의 현재 지식으로, 우리는 거대 구조물의 §Y건설 현장§!을 연구할 수 있고 건설을 시작할 수 있습니다. 말할 필요도 없이, 이는 블록캣의 범위에서 멀리 떨어진 극히 안전한 곳에서 조립되어야만 합니다."
 giga_blokkat.3060.a:0 "승인한다."
 giga_tech_blokkat_mega_stage_0:0 "초기 초차원 불안정제 설계도"
 giga_tech_blokkat_mega_stage_0_desc:0 "초차원 불안정제는 이제껏 상상해왔던 가장 큰 거대 구조물 중 하나가 될 것이며, 블록캣-베스터의 보호막을 차단하려는 유일한 목적으로 지어질 것입니다. 건설 현장을 설계하는 것은 이 거대한 구조물의 조립에 중대한 단계입니다."
 giga_tech_blokkat_mega_stage_0_title:0 "§H거대 구조물 잠금 해제§!: 초차원 불안정제 건설 현장"
 giga_blokkat.3062.name:0 "초차원 불안정제 : 동력원"
 giga_blokkat.3062.desc:0 "§Y초차원 불안정제§!의 건설 현장이 이제 현실 세상에 단단히 뿌리내렸기 때문에, 우리는 이 거대한 보호막-파괴 초거대 구조물에 동력을 공급할 동력원의 설계를 시작해야합니다.\n\n거대 구조물이 다른 차원을 파내고 거대한 초차원 보호막을 공격할 것이기 때문에, 이 구조물이 소비할 동력의 양은 어마무시할 것입니다.\n\n따라서, 우리의 가장 똑똑한 과학자들은, 가장 말이 되는 것은 거대 구조물의 항성을 §Y5차원 특이점§!, 즉 여러개의 고차원을 침식하는 일종의 조작된 블랙홀로 바꾸는 것이라 생각합니다. 특이점에서 대량의 에너지를 끌어낼 수 있고, 특이점은 §Y블록캣 초차원 방벽§!이 뿌리내린 상위 차원의 \"액세스 포인트\"의 역할을 할 수 있습니다.\n\n이는 엄청나게 항성을 둘러싸는 거대한 고리 형태의 장치를 사용해 해낼 수 있으며, 이는 항성을 앞서 말한 특이점으로 변화시키는 작업을 할 것입니다. 우리의 추측에 따르면, 이 특이점은 최대 §Y5차원§!에 닿을 수 있으며, 더 위로 가면 차원적 압력만으로도 전체 시공간이 찢겨나갈 것이기 때문입니다."
 giga_blokkat.3062.a:0 "착수해라."
 giga_tech_blokkat_mega_stage_1:0 "5차원 동력원"
 giga_tech_blokkat_mega_stage_1_desc:0 "블록캣의 방식과 매우 유사한 방식을 사용하는 특별한 블랙홀로, 이는 강력한 §Y초차원 불안정제§!에 동력을 공급하는데 사용될 수 있으며, 사실상 블록캣의 부서지지 않을 것만 같은 보호막을 공격할 수 있게 해줍니다."
 giga_tech_blokkat_mega_stage_1_title:0 "§H거대 구조물 잠금 해제§!: 초차원 불안정제 5차원 변환기"
 needs_physics_blokkat_project:0 "§Y블록캣 §B차원 조작§! 조사§! §B블록캣 연구 프로젝트§!를 완료했어야 합니다."
 needs_society_blokkat_project:0 "§Y블록캣 §G사회학§! 조사§! §B블록캣 연구 프로젝트§!를 완료했어야 합니다."
 giga_blokkat.3064.name:0 "초차원 불안정제 : 차원막 파성추"
 giga_blokkat.3064.desc:0 "블록캣에 대한 연구가 계속됨에 따라, §Y블록캣 초차원 방벽§!에 대한 우리의 이해도 또한 높아졌습니다. 현재 우리의 데이터에 따르면, 보호막의 막강한 반발력은 이것이 실제로 자그마치 §Y2§! 곳의 고차원 내에서 \"회전\"한다는 점에서 생겨나며, 이는 어떤 순간이라도 완전한 보호막의 무한소 부분만이 현실 세계 내에 존재하게끔 합니다.\n\n사실상 이는 보호막이 §Y블록캣-베스터§! 주위를 회전하는 §Y6차원§! 구를 형성함을 의미합니다. 따라서, 장시간 보호막을 비활성화하고자 한다면, 우리는 §Y5차원 특이점§!을 고차원으로 대량의 에너지를 날려 보내는 게이트웨이로써 사용하여, 보호막 전체에 동시 전면 공격을 가해야합니다.\n\n불행히도, 특이점은 보호막이 존재하는 6차원 이상에는 닿을 수는 없습니다. 즉, 보호막의 회전이 실제로 불리하게 작용하지 않는다면... 이 모든 노력이 무의미해질 수도 있습니만, 사실 우리의 과학자들은 특이점이 §Y차원막 파성추§!의 역할을 할 수 있다고 생각하며, 이 이론적인 구조물은 §Y블록캣-베스터§!를 직접 둘러싸고 있는 공간에서 이 고차원들이 서로 관계되는 방식을 매우 조금 \"왜곡\"할 수 있습니다.\n\n이는 결과적으로 현재 6차원 내에서 회전하고 있는 §Y블록캣 초차원 방벽§!의 일부를 다른 부분에 비해 부분적으로 뒤틀리게 하며, 작동하는 보호막 부분을 강제로 한 차원 아래로 내립니다. 따라서 §Y5차원 특이점§!을 사용해 §Y초차원 불안정제§!로 전면적인 공격이 가능해집니다."
 giga_blokkat.3064.a:0 "말하기는 쉬우나 행하기는 어렵다."
 giga_tech_blokkat_mega_stage_2:0 "초차원 차원막 파성"
 giga_tech_blokkat_mega_stage_2_desc:0 "블록캣 초차원 방벽이 사용하는 고차원을 \"왜곡\"함으로써, 우리는 이를 강제로 한 차원 아래로 내려 5차원 특이점의 범위 내로 가져옵니다."
 giga_tech_blokkat_mega_stage_2_title:0 "§H거대 구조물 잠금 해제§!: 초차원 불안정제 차원막 파성추"
 giga_blokkat.3066.name:0 "초차원 불안정제 : 거대 주입기"
 giga_blokkat.3066.desc:0 "이제 최종적으로 §Y초차원 불안정제§!를 완성하기 전에 단 하나의 문제만을 해결하면 됩니다. 차원막 파성과 제대로 작동 못하는 §Y블록캣 초차원 방벽§!에 이어지는 5차원 공격 둘 모두를 진행하는데 필요한 막대한 양의 에너지를 조작할 수 있는 기계 장치를 설계해야합니다.\n\n이 기계 장치는 구조물에서 가장 많은 비용을 차지하는 부분일 수도 있습니다. 고차원으로 흐르는 세심하게 조정된 에너지의 흐름이 정확한 순간에 블록캣의 보호막에 영향을 미치게 하기 위해, 여러 개의 고차원 내에 고정할 필요가 있고 매우 복잡한 5차원 공학 방식을 필요로하기 때문입니다.\n\n추정치에 따르면, 차원막 파성 이후 블록캣이 보호막을 즉각적으로 재조정하고 문제를 해결하기까지 고작 수 초밖에 없습니다. 따라서 §Y초차원 방벽§!을 손상시킬 공격을 할 때에는 매우 높은 정밀도가 필요합니다.\n\n방벽을 중지시켰다 하더라도, 블록캣이 수 년 내로 이를 복구할 것이기 때문에 우리는 서둘러야하며, 따라서 최종적으로 §Y블록캣-베스터§!를 파괴하고자 한다면 우리 타격대의 재빠른 공격이 필요합니다.\n\n모든 것이 계획대로 된다면, 이것이 거대한 구조물 개발의 마지막 단계일 것입니다."
 giga_blokkat.3066.a:0 "거의 다 왔어."
 mod_megastructure_energy_upkeep_mult:0 "거대 구조물 에너지 유지비"
 giga_tech_blokkat_mega_stage_3:0 "요타스케일 에너지 조작"
 giga_tech_blokkat_mega_stage_3_desc:0 "초차원 방벽을 차단하기 위해 에너지의 막대한 흐름을 조작하는 것은, 완전한 시퀀스를 실행할 때 실로 엄청난 수의 고차원 구조물의 펨토초-정밀성이 필요합니다."
 giga_tech_blokkat_mega_stage_3_title:0 "§H거대 구조물 잠금 해제§!: 초차원 불안정제 : 완성"
 giga_tech_blokkat_mega_stage_4:0 "응용 초시간 시간교란"
 giga_tech_blokkat_mega_stage_4_desc:0 "과거, 미래 그리고 고차원 모두로부터 목표를 공격하는 능력이 있다면, 우리는 전보다 훨씬 쉽게 §Y초차원 방벽§!을 무너뜨릴 수 있을 것입니다. 게다가, 우리의 병기 체계에 대한 이 기술의 광범위한 응용으로 병기의 잠재적인 파괴력을 눈에 띄게 증가시킬 수 있을 것입니다."
 giga_tech_blokkat_mega_stage_4_title:0 "§H거대 구조물 잠금 해제§!: 초차원 불안정제 : 시간교란기"
 giga_blokkat.3067.name:0 "넘쳐흐르는 지식"
 giga_blokkat.3067.desc:0 "마침내 §Y초차원 불안정제§! 전체를 완전히 설계할 정도로 충분한 $blokkat_knowledge$을 모았습니다.\n\n이제 남은 것은 항성 주변에 강력한 초거대 구조물을 실제로 건설하는 것이며, 우리는 마침내 §Y블록캣 초차원 방벽§!을 무너뜨려, 그들의 소중한 §Y블록캣-베스터§!에 피해를 줄 수 있을 것입니다.\n\n마침내, 승리가 손 안에 들어왔습니다."
 giga_blokkat.3067.a:0 "쓴맛을 보여주지!"
 blokkat_shield_megastructure_ready:0 "이제 §Y초차원 불안정제§!를 완전히 건설하고 활성화할 수 있습니다."
 giga_blokkat.3000.megano:0 "§Y초차원 불안정제§!를 충분히 연구해야 합니다."
 blokkat_cant_click_this:0 "이제 거대 구조물을 건설하기만 하면 됩니다."
 giga_blokkat.3070.name:0 "황량함"
 giga_blokkat.3070.desc:0 "블록캣이 수확한 성계에 도착한 우리의 과학선은, 순수하며 압도적인 허무로서만 표현될 수 있는 것과 마주했습니다.\n\n블록캣은 성계의 모든 것, 모든 형태의 물질부터 심지어는 시공간을 함께 지탱하던 배경 에너지 그 자체조차 완전히 흡수해버렸습니다.\n\n아 구역애 끔찍한 붕괴를 일으키지 않을 정도로, 시공간 그 자체에서 수확할 수 있는 에너지를 최대한 흡수한 것 같습니다. 이에 이 구역은 그냥 간신히 존재만 할 정도입니다.\n\n이 부작용으로, 우리의 현실과 다른 차원, 즉 초공간, 아공간 같은 것과의 경계가 확연하게 약해져서, 이 지역으로부터 혹은 지역으로의 FTL 매우 쉬워졌습니다."
 giga_blokkat.3070.a:0 "으스스하구만..."
 giga_blokkat.3070.a.tooltip:0 "$blokkat_knowledge$을 §Y1§! 얻습니다."
 blokkats_say_no:0 "블록캣이 에테르 변환 엔진의 작동을 막기 위해 장막을 조작하고 있습니다!\n\n"
 giga_blokkat.5001.name:0 "약해지는 엔진"
 giga_blokkat.5001.desc:0 "우리의 강력한 §Y에테르 변환 엔진§!의 보고서에 따르면, 걱정스럽게도 그 힘이... 빠르게 감소하고 있다고 합니다.\n\n한때 순수한 에너지를 장막 깊은 곳으로 끌어들였지만, 현재 엔진은 우리 세계와 사이오닉 차원을 가르는 장벽에 간신히 구멍을 낼 정도입니다. 장벽에 마치 일종의 고차원 보호막이 드리워진 것 같습니다.\n\n우리 과학자들이 미친듯이 이유를 찾아내려 하고 있는데, 갑자기 다름 아닌 §Y블록캣§!으로부터 고에너지 통신을 수신했습니다..."
 giga_blokkat.5001.a:0 "무슨 일이지?! 연결하라!"
 giga_blokkat.5002.name:0 "블록캣 채굴자"
 giga_blokkat.5002.desc:0 "은하를 파괴하려는 §Y[ROOT.GetName]§! 여러분의 헛된 시도는 우리 문명에게는 참신하지는 않군요.\n\n사실, 우리의 기록 보관소에는 수천 종의 지성체들이 어떤 이해할 수 없는 이유로 정말 똑같은 일을 시도한 기록이 있습니다. §Y[ROOT.GetSpeciesNamePlural]§! 여러분, 이 모든 것은 그저 큰 망상일 뿐입니다!\n\n여러분의 안전과 우리 수확 활동의 지속성을 위해서, §Y블록캣-베스터§!가 여러분의 \"엔진\" 주위에 5차원 보호막을 설치하였습니다. 더 이상 그것은 어떠한 불필요한 피해도 주지 못할 것입니다.\n\n이것이 여러분 스스로를 위한 것임을 이해해주시고 만일 우리의 활동이 불편하시다면 언제든지 떠나셔도 좋다는 것을 기억해주세요."
 giga_blokkat.5002.a:0 "감히 우리의 위대한 계획을 방해해?!?"
 giga_blokkat.5002.a.response:0 "이런걸 \"계획\"이라고 부르기까지 얼마나 많은 뇌내 활동이 있었을지 당황스럽기까지 하네요, §Y[ROOT.GetSpeciesNamePlural]§! 여러분."
 giga_blokkat.6000.name:0 "블록캣 수확 활동 종료"
 giga_blokkat.6000.desc:0 "이제 §Y블록캣§!은 우리 은하에서 거의 모든 성계를 수확했고, 고작 몇 개만이 살아있습니다.\n\n§Y블록캣 연구 기관§!의 걱정스러운 관측에 따르면, 물질이 거의 남아있지 않다는 점은 §Y블록캣-베스터§!가 시공간의 끔찍한 붕괴를 일으키지 않고 우리 은하에 남은 모든 것을 모두 동시에 수확할 수 있음을 의미합니다.\n\n이에 따라, 수확 덕분에 §Y블록캣-베스터§!의 에너지 비축량이 가득 찬 가운데, 블록캣 모선은 현재 이 마지막 수확을 진행하기 위해 \"충전 중\"입니다. 이는 §R은하에 남은 성계를 위치와 그 안에 무엇이 있는지와 무관하게 완전히 파괴해버릴 것입니다.§!\n\n관측 결과에 따르면, §Y블록캣-베스터§!가 완전히 충전되고 우리 은하에 남은 모든 것을 파괴하기 까지 고작 §Y2년§! 남았습니다."
 giga_blokkat.6000.a:0 "서둘러야 한다!"
 giga_blokkat.6000.a.tooltip:0 "§Y2년§! 내로 §Y블록캣-베스터§!를 파괴하지 않으면, §R우리와 은하는 모두 파괴될 것입니다.§!"
 giga_blokkat.6001.name:0 "최종장"
 giga_blokkat.6001.desc:0 "너무 늦었습니다.\n\n우리의 최선의 노력에도 불구하고 §Y블록캣-베스터§!는 은하 전체에 최후의 수확 소용돌이를 내뿜었고 간신히 남아있는 우리 은하를 집어 삼켰습니다.\n\n우리는 실패했습니다. §Y[ROOT.GetName]§!(은)는 이제 끝입니다. 블록캣의 가차없는 파괴의 물결이 우리를 역사의 쓰레기통으로 치워버렸습니다."
 giga_blokkat.6001.a:0 "작별이다."
 giga_blokkat.6001.a.tooltip:0 "§R은하 전체가 파괴되었습니다.§!\n\n블록캣은 한 때 우리 은하였던 광활한 은하간 공허에서 떠날 것입니다."
 war_moon_scrap:0 "분해하여 £alloys£ §Y15000§! 및 £minerals£ §Y7500§! 얻기"
 war_moon_scrap_DESC:0 "이 천체 전함의 외부 시설을 해체하여 합금, 연구 그리고 귀중한 광물로 바꿉니다."
 giga_wrecked_ships.1043.name:0 "폐허가 된 전쟁 위성 해체됨"
 giga_wrecked_ships.1043.desc:0 "현재 우리의 쓰레기 청소 팀이 §Y[from.GetName]§! 성계 내에서 발견된 폐허가 된 전쟁 위성을 해체했습니다. 천체 전함의 거대한 무기 포대와 기동 시스템을 해체하여 대량의 합금과 공학 연구를 얻었습니다. 또한, 파괴된 겉부분을 청소하여 귀중한 성분과 남은 광물을 얻었습니다."
 giga_wrecked_ships.1043.a:0 "좋아."
 war_planet_scrap:0 "분해하여 £alloys£ §Y80000§! 및 £minerals£ §Y40000§! 얻기"
 war_planet_scrap_DESC:0 "이 천체 전함의 외부 시설을 해체하여 합금, 연구 그리고 귀중한 광물로 바꿉니다."
 giga_wrecked_ships.1044.name:0 "폐허가 된 베히모스 요새 행성 해체됨"
 giga_wrecked_ships.1044.desc:0 "현재 우리의 쓰레기 청소 팀이 §Y[from.GetName]§! 성계 내에서 발견된 폐허가 된 베히모스 요새 행성을 해체했습니다. 천체 전함의 거대한 무기 포대와 기동 시스템을 해체하여 대량의 합금과 공학 연구를 얻었습니다. 또한, 파괴된 겉부분을 청소하여 귀중한 성분과 남은 광물을 얻었습니다."
 giga_wrecked_ships.1044.a:0 "좋아."
 giga_titan_ruined:0 "파괴된 타이탄"
 giga_titan_ruined_DESC:0 "지나간 시절의 유물인 거대한 우주선의 잔해입니다. 함선의 주요 선체는 여전히 매우 온전하며 현실적으로 충분한 자원이 있다면 완전 작동 상태로 복구할 수 있습니다."
 giga_titan_restored:0 "수리된 타이탄"
 giga_titan_restored_DESC:0 "고대의 타이탄급 전함이 수리되어 과거의 영광을 되찾았습니다."
 giga_titan_scrap:0 "분해하여 £alloys£ §Y2000§! 얻기"
 giga_titan_scrap_DESC:0 "이 함선을 부품과 합금으로 분해합니다."
 giga_wrecked_ships.1010.name:0 "파괴된 타이탄"
 giga_wrecked_ships.1010.desc:0 "파괴된 거대한 우주선의 잔해가 §Y[from.GetName]§! 성계 내에서 발견되었습니다. 행성의 중력 우물 가장자리 근처를 조용히 떠다니는 이 인상적인 §Y타이탄§!급 함선은 수만년 정도 된 것으로 추정되는 은하의 지나간 시대의 고요한 유물입니다.\n\n상당한 피해를 받았지만, 우리가 스스로 타이탄을 만들 기술이 있다면 복구하는 것은 꽤나 가능성이 있습니다. 게다가, 이는 당연하게도 직접 건조하는 것보다 훨씬 비용이 덜 들것입니다.\n\n아니면, 잔해를 £alloys£ §Y합금§!으로 분해하면서 이를 연구하여 §Y공학 연구§!를 얻을 수 있습니다."
 giga_wrecked_ships.1010.a:0 "흥미롭군."
 giga_wrecked_ships.1011.name:0 "파괴된 타이탄 수리됨!"
 giga_wrecked_ships.1011.desc:0 "§Y[from.GetName]§! 성계에서 발견된 파괴된 타이탄의 잔해가 복구되었고 사실상 완전 작동 상태가 되었습니다. 대부분의 무기가 처음부터 만들어졌어야 했지만, 함선의 바깥 선체는 소규모의 수리로 인해 그리 극단적으로 바뀌지는 않았습니다.\n\n이제 이 강력한 함선은 어쩌면 수천년 만에 처음으로, 다시 한 번 준비가 되었습니다."
 giga_wrecked_ships.1011.a:0 "훌륭해."
 giga_wrecked_ships.1011.b:0 "승리를 위하여!"
 giga_wrecked_ships.1012.name:0 "파괴된 타이탄 해체됨"
 giga_wrecked_ships.1012.desc:0 "현재 우리의 쓰레기 청소 팀이 §Y[from.GetName]§! 성계 내에서 발견된 파괴된 타이탄을 해체하여 상당한 양의 합금과 공학 연구를 얻었습니다."
 giga_wrecked_ships.1012.a:0 "좋아."
 giga_juggernaut_ruined:0 "파괴된 저거너트"
 giga_juggernaut_ruined_DESC:0 "지나간 시절의 유물인 거대한 우주선의 잔해입니다. 함선의 주요 선체는 여전히 매우 온전하며 현실적으로 충분한 자원이 있다면 완전 작동 상태로 복구할 수 있습니다."
 giga_juggernaut_restored:0 "수리된 저거너트"
 giga_juggernaut_restored_DESC:0 "고대의 저거너트급 전함이 수리되어 과거의 영광을 되찾았습니다."
 giga_juggernaut_scrap:0 "분해하여 £alloys£ §Y4000§! 얻기"
 giga_juggernaut_scrap_DESC:0 "이 함선을 부품과 합금으로 분해합니다."
 giga_wrecked_ships.1020.name:0 "파괴된 저거너트"
 giga_wrecked_ships.1020.desc:0 "파괴된 거대한 우주선의 잔해가 §Y[from.GetName]§! 성계 내에서 발견되었습니다. 거대한 크기로 보아, 이 인상적인 함선은 먼 과거에 §Y저거너트§!급 함선으로 활약했고, 아마도 장대한 고대의 전쟁에서 파괴가 되었을 것입니다.\n\n상당한 피해를 받았지만, 우리가 스스로 저거너트를 만들 기술이 있다면 복구하는 것은 꽤나 가능성이 있습니다. 게다가, 이는 당연하게도 직접 건조하는 것보다 훨씬 비용이 덜 들것이며 거대 조립장이 필요하지 않을 것입니다.\n\n아니면, 잔해를 £alloys£ §Y합금§!으로 분해하면서 이를 연구하여 §Y공학 연구§!를 얻을 수 있습니다."
 giga_wrecked_ships.1020.a:0 "과연 거대한 함선이군."
 giga_wrecked_ships.1021.name:0 "파괴된 저거너트 수리됨!"
 giga_wrecked_ships.1021.desc:0 "§Y[from.GetName]§! 성계에서 발견된 파괴된 저거너트의 잔해가 복구되었고 사실상 완전 작동 상태가 되었습니다. 대부분의 무기가 처음부터 만들어졌어야 했지만, 함선의 바깥 선체는 소규모의 수리로 인해 그리 극단적으로 바뀌지는 않았습니다.\n\n함선은 거대한 타격기 격납고와 함선 건조 시설로 개장되었으며 이제 우리가 원할 때 언제든지 배치될 준비가 되어 있습니다."
 giga_wrecked_ships.1021.a:0 "훌륭해."
 giga_wrecked_ships.1021.b:0 "웅장하군!"
 giga_wrecked_ships.1022.name:0 "파괴된 저거너트 해체됨"
 giga_wrecked_ships.1022.desc:0 "현재 우리의 쓰레기 청소 팀이 §Y[from.GetName]§! 성계 내에서 발견된 파괴된 저거너트를 해체하여 상당한 양의 합금과 공학 연구를 얻었습니다."
 giga_wrecked_ships.1022.a:0 "좋아."
 giga_battleship_ruined:0 "파괴된 전함"
 giga_battleship_ruined_DESC:0 "지나간 시절의 유물인 여러 척의 전함들의 잔해입니다. 함선의 선체는 여전히 매우 온전하며 현실적으로 충분한 자원이 있다면 완전 작동 상태로 복구할 수 있습니다."
 giga_battleship_restored:0 "수리된 전함"
 giga_battleship_restored_DESC:0 "여러 척의 고대 전함이 수리되어 과거의 영광을 되찾았습니다."
 giga_battleship_scrap:0 "분해하여 £alloys£ §Y1800§! 얻기"
 giga_battleship_scrap_DESC:0 "이 함선을 부품과 합금으로 분해합니다."
 giga_wrecked_ships.1030.name:0 "파괴된 전함"
 giga_wrecked_ships.1030.desc:0 "파괴된 §Y전함§!의 소함대가 §Y[from.GetName]§! 성계 내에서 발견되었습니다. 이 함선들은 고대의 전쟁에서 손상을 입고 현재까지 수천년 간 공허를 조용히 떠다녔을 것입니다.\n\n상당한 피해를 받았지만, 우리가 스스로 전함을 만들 기술이 있다면 복구하는 것은 꽤나 가능성이 있습니다. 게다가, 이는 당연하게도 직접 전함을 건조하는 것보다 훨씬 비용이 덜 들것입니다.\n\n아니면, 잔해를 £alloys£ §Y합금§!으로 분해하면서 이를 연구하여 §Y공학 연구§!를 얻을 수 있습니다."
 giga_wrecked_ships.1030.a:0 "유용할지도 모르겠군..."
 giga_wrecked_ships.1031.name:0 "파괴된 전함 수리됨!"
 giga_wrecked_ships.1031.desc:0 "§Y[from.GetName]§! 성계에서 발견된 파괴된 전함들의 잔해가 복구되었고 사실상 완전 작동 상태가 되었습니다. 대부분의 무기가 처음부터 만들어졌어야 했지만, 함선의 바깥 선체는 소규모의 수리로 인해 그리 극단적으로 바뀌지는 않았습니다.\n\n이 함선은 언제든지 배치될 준비가 되어 있습니다."
 giga_wrecked_ships.1031.a:0 "아주 좋아."
 giga_wrecked_ships.1031.b:0 "환상적이야."
 giga_wrecked_ships.1032.name:0 "파괴된 전함 해체됨"
 giga_wrecked_ships.1032.desc:0 "현재 우리의 쓰레기 청소 팀이 §Y[from.GetName]§! 성계 내에서 발견된 파괴된 전함들을 해체하여 상당한 양의 합금과 공학 연구를 얻었습니다."
 giga_colossus_ruined:0 "파괴된 콜로서스"
 giga_colossus_ruined_DESC:0 "행성을 없애고 파괴된 듯한 콜로서스의 잔해입니다. 함선의 거대한 선체는 여전히 매우 온전하며 현실적으로 충분한 자원이 있다면 완전 작동 상태로 복구할 수 있습니다."
 giga_colossus_restored:0 "수리된 콜로서스"
 giga_colossus_restored_DESC:0 "고대의 콜로서스가 수리되어 과거의 영광을 되찾았습니다."
 giga_colossus_scrap:0 "분해하여 £alloys£ §Y6000§! 얻기"
 giga_colossus_scrap_DESC:0 "이 함선을 부품과 합금으로 분해합니다."
 giga_wrecked_ships.1040.name:0 "파괴된 콜로서스"
 giga_wrecked_ships.1040.desc:0 "고대 §Y콜로서스§!의 거대한 잔해가 §Y[from.GetName]§! 성계 내에서 발견되었습니다. 조각난 행성 위를 고요하게 떠다니는 것으로 보아, 이 콜로서스가 한 때 행성 전체를 초토화할 힘이 있었음은 분명하지만, 더 이상 그렇지 않습니다.\n\n아마도 목표물의 거주자들에 의해 상당한 피해를 입었지만, 우리가 스스로 콜로서스를 만들 기술이 있다면 복구하는 것은 꽤나 가능성이 있으며 거대 조립장을 필요로하지 않습니다. 게다가, 이는 당연하게도 직접 콜로서스를 건조하는 것보다 훨씬 비용이 덜 들것입니다.\n\n아니면, 잔해를 £alloys£ §Y합금§!으로 분해하면서 이를 연구하여 §Y공학 연구§!를 얻을 수 있습니다."
 giga_wrecked_ships.1040.a:0 "위험하지만 멋진 기계로군."
 giga_wrecked_ships.1041.name:0 "파괴된 콜로서스 수리됨!"
 giga_wrecked_ships.1041.desc:0 "§Y[from.GetName]§! 성계에서 발견된 파괴된 콜로서스의 잔해가 복구되었고 사실상 완전 작동 상태가 되었습니다. 대부분의 무기가 처음부터 만들어졌어야 했지만, 함선의 바깥 선체는 소규모의 수리로 인해 그리 극단적으로 바뀌지는 않았습니다.\n\n그것은 이제 다시 한번 행성 전체를 파괴할 수 있을 정도의 무기를 갖추고 있습니다. 이 강력한 함선은 언제든지 배치될 준비가 되어 있습니다."
 giga_wrecked_ships.1041.a:0 "멋지군."
 giga_wrecked_ships.1041.b:0 "훌륭해, 정말 훌륭하군!"
 giga_wrecked_ships.1042.name:0 "파괴된 콜로서스 해체됨"
 giga_wrecked_ships.1042.desc:0 "현재 우리의 쓰레기 청소 팀이 §Y[from.GetName]§! 성계 내에서 발견된 파괴된 콜로서스를 해체하여 상당한 양의 합금과 공학 연구를 얻었습니다."
 giga_ruined_ships_disabled:0 "£menu_disabled£파괴된 전함\n충분한 기술이 연구되면 수리 가능한 전함, 타이탄, 저거너트 그리고 콜로서스가 (올바른 DLC가 있다면) 파괴된 거대 구조물로 스폰되어야 할까요?\n\n파괴된 함선들의 빈도는 왼쪽의 버튼을 눌러 조정될 수 있습니다."
