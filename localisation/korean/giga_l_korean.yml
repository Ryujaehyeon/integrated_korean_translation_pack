 giga_penrose_system_NAME:0 "영원한 방주"
 giga_penrose_system_DESC:0 "펜로즈 스피어 링 월드로 시작합니다."
 origin_penrose_ring:0 "펜로즈 링 월드"
 origin_penrose_ring_desc:0 "이 고대의 펜로즈 스피어는 헤아릴 수 없는 과거에 은하계의 첫 번째 블랙홀들 중 하나를 중심으로 지어졌습니다. 이 신비한 선구자들은 흔적도없이 사라졌고, 이제 그들의 유산에 새로운 문명이 나타났습니다."
 origin_tooltip_penrose_ring_effects:0 "펜로즈 스피어 링 월드로 시작합니다.\n- 종족 거주 적합도는 §L펜로즈 링 월드§!로 설정됩니다.\n- §R근처에 거주 가능한 행성이 보장된 성계는 없습니다.§!.\n\n§RAI는 이 기원을 사용할 수 없습니다. 이 기원을 가지고 만들어진 커스텀 AI제국은 대신 $origin_default$으로 생성됩니다.§!"
 relic_penrose_sphere_1:0 "불안정한 펜로즈 스피어"
 relic_penrose_sphere_1_DESC:0 "이 고대의 펜로즈 스피어는 임계에 달했으며, 수리하지 않으면 수천 년 내에 무너질 것입니다. 그러나 일부 구성 요소는 여전히 작동하여 극소량의 에너지를 생성합니다."
 relic_penrose_sphere_2:0 "복원된 펜로즈 스피어"
 relic_penrose_sphere_2_DESC:0 "$penrose_sphere_b3_DESC$"
 giga_ring_origins.101.name:0 "복원된 펜로즈 스피어"
 giga_ring_origins.101.desc:0 "수년간의 노력 끝에, §L[relic_penrose_sphere.GetName]§! 성계에 있는 펜로즈 스피어은 이전의 영광을 되찾았으며, 다시 한번 블랙홀의 초방사성 산란을 이용하여 많은 양의 에너지를 생산하게 되었습니다. 이것이 우리 문명을 영원히 보호하고 보살피기를!"
 origin_pangalactic:0 "범은하적 연합"
 origin_pangalactic_desc:0 "이 제국은 한 제국이 궁극의 파괴무기를 사용하는 것을 막기 위해 만들어진 범은하적 결속의 놀라운 결과물입니다."
 civic_against_hyperweapon:0 "영원의 요새"
 civic_against_hyperweapon_desc:0 "범은하 방위 연합을 이끄는 원로 제국은 놀라운 기술의 비밀을 은하 전체에 공유하는 데 동의했으며, 이는 은하를 위협하는 초거대 병기에 대항하는 투쟁에 큰 도움이 될 것입니다."
 civic_giga_common_cause:0 "범은하적 단결"
 civic_giga_common_cause_desc:0 "제국이 모든 것을 파괴할 초거대 병기를 휘두르고 있습니다. 원로 제국의 지도와 젊은 종족들의 독창성 덕분에 은하계의 주민들은 차이를 제쳐두고 모든 문명에 대한 위협에 맞서 단결했습니다."
 war_goal_wg_hyperweapon:0 "총력전"
 war_goal_wg_hyperweapon_desc:0 "굉장히 강력한 초거대 병기는, 적에게 우리의 의지를 강요할 수 있게 해줍니다."
 war_goal_wg_end_threat_hyperweapon:0 "은하 위협 종식"
 war_goal_wg_end_threat_hyperweapon_desc:0 "은하에 겨눠진 초거대 병기 및 그 제국의 위협을 저지하기 위한 대전쟁입니다."
