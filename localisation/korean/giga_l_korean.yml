 giga_tech_war_planet:0 "초-행성 동체 조작"
 giga_tech_war_planet_desc:0 "$name_war_moon$은 터무니 없이 거대한 우주선의 정점으로 여겨졌습니다. 그러나 우리는 더 나아갈 수 있습니다. 강력한 물리력 조작에서 중력 안정화에 이르기까지 엄청나게 진보된 여러 기술을 결합하면 $name_war_moon$ (~3000km)을 훨씬 더 큰 동체(~15000km)로 확장할 수 있습니다. 이처럼 엄청나게 거대한 우주선은 거의 파괴되지 않을 것이며, 몰락한 제국 전체를 혼자서 쓸어 버릴 수 있을 것입니다."
 giga_dialog.2701.name:0 "$name_war_planet$ 건설 현장 건설"
 giga_dialog.2701.desc:0 "미래의 $name_war_planet$ 건설 현장이 완성되었습니다. 이 궤도 행성 형태는 행성 자체를 만들기 시작하기 위한 준비 기지 역할을 할 것입니다. 이제 아래의 행성을 거대한 우주선 핵으로 변환해야합니다. \n\n주의: 함선 설계에서 $name_war_planet$을 설계하는 것을 잊지 마세요!"
 giga_dialog.2701.a:0 "놀랍군."
 giga_dialog.2702.name:0 "$name_war_planet$ 표면 작업  완료"
 giga_dialog.2702.desc:0 "$name_war_planet$의 일부가 이제 작동합니다! 행성의 표면은 기계와 무기로 채워졌고 핵은 거대한 행성 원자로로 대체되어 미래의 추진기와 주요 무기의 동력이 되었습니다."
 giga_dialog.2702.a:0 "한 걸음 더 가까이."
 giga_dialog.2703.name:0 "$name_war_planet$ 이동 시스템 완료"
 giga_dialog.2703.desc:0 "우리의 요새 행성 기동 시스템이 완성되었습니다. 행성의 한쪽에 만들어진 거대한 추진기는 이 행성을 추진할 만큼 강력하며 행성 크기의 FTL 드라이브가 장착되어 있습니다. 이제 우리는 행성의 주요 무기 배치 작업을 시작해야합니다."
 giga_dialog.2703.a:0 "거의 다 됐어."
 giga_dialog.2704.name:0 "행성의 비상"
 giga_dialog.2704.desc:0 "해냈습니다. 요새 행성의 주요 무기 배열을 완료한 후 이 거대한 우주선을 작동시켰습니다. 1만 km가 넘는 이 진정으로 거대한 함선을 보니 $name_war_moon$조차도 왜소해 보입니다. 이제 행성은 궤도에서 벗어났으며, 우리 함대에 합류할 준비를 마쳤습니다."
 giga_dialog.2704.a:0 "진실로 놀라운 업적이다."
 war_planet_0:0 "$gc_giga$$name_war_planet$ 건설 현장"
 war_planet_0_DESC:0 "미래의 $name_war_planet$ 건설 현장으로서, 말 그대로 행성 주위에 건설될 미친 우주선입니다. 수 많은 작업이 앞에 놓여 있습니다."
 war_planet_0_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_gigastructure$ - $giga_list_category_celestial_warship$ - $giga_list_category_ship_production$\n§Y크기 24§! 이상의 §Y용암형§! 또는 §Y불모형§!, §Y유독형§!, §Y얼음 행성§!을 §Y천체 전함§!으로 바꿉니다\n§L베히모스 요새 행성은 위성형 병기보다 훨씬 더 강력한 무기로 무장하였으며, 대부분의 위협은 스스로 막아낼 수 있을 것입니다."
 war_planet_1:0 "요새 행성 지각"
 war_planet_1_DESC:0 "요새 행성의 외부 및 내부 시스템은 행성의 지각 내에 설치되었습니다. 가장 강력한 무기에 동력을 공급할 수 있는 엄청나게 거대한 원자로가 이 세계의 핵 안에 설치되어 있습니다."
 war_planet_2:0 "요새 행성 이동 시스템"
 war_planet_2_DESC:0 "행성 전체를 추진할 수 있는 거대한 추진기가 이 행성에 설치되었습니다. 이것은 많은 에너지를 소모하지만, 행성의 핵 원자로는 충분한 에너지를 제공합니다."
 war_planet_3:0 "요새 행성 병기"
 war_planet_3_DESC:0 "행성의 지각에 수십만개의 무기 격납고가 설치되어 있고, 무엇이든 찢어버릴 수 있는 거대한 포가 존재합니다."
 war_planet_ship_name:0 "[event_target:giga_planet.GetName]"
 war_planet_restored_ship_name:0 "복구된 행성"
 war_planet_printed_ship_name:0 "행성 결집"
 war_planet_debris:0 "폐허가 된 $name_war_planet$"
 war_planet_debris_DESC:0 "어떤 진보된 문명이 만든 거대한 행성 우주선입니다. 모종의 방법을 통해 자기 자신의 중력에 붕괴되어 일반적인 행성이 되지는 않았습니다. 한 때 은하계에서 가장 거대한 병기들을 가지고 있었고, 상당한 피해를 입은 듯 하지만, 충분한 자원과 능력이 있다면 이 두려운 함선에게 과거의 영광을 되찾아 주는 것이 가능할지도 모릅니다."
 war_planet_debris_MEGASTRUCTURE_DETAILS:0 "$war_planet_0_MEGASTRUCTURE_DETAILS$"
 war_planet_restored:0 "거대 행성 제작기"
 war_planet_restored_DESC:0 "$war_planet_3_DESC$"
 war_planet_restored_MEGASTRUCTURE_DETAILS:0 "$war_planet_0_MEGASTRUCTURE_DETAILS$"
 giga_tech_war_system_1:0 "항성급 추진기 이론화"
 giga_tech_war_system_1_desc:0 "만일 우리가 성계를 무기화하고 싶다면, 우선 항성과 행성이 함께 움직이게 할 방법부터 찾아야 합니다. 터무니없이 거대한 추진기에 대한 연구는 이 문제를 해결할 수 있는 수단이 될 수 있습니다."
 giga_tech_war_system_2:0 "항성 압축기 안정화"
 giga_tech_war_system_2_desc:0 "시스템 제작의 핵심인 항성 자체는 그 동반 행성과 함께 실용적으로 사용하기에는 너무 거대합니다. 따라서 항성을 다소 압축하여 더 작은 반지름으로 만드는 것이 필요하며, 이는 $name_fusion_suppressor$에서 사용되는 것과 유사한 거대한 중력 펌프를 통해 가능할 수 있습니다. 그럼에도 불구하고 결과적으로 생성된 항성은 훨씬 더 안정적이며, 에너지와 무기를 위해 더 효율적으로 활용될 수 있습니다."
 giga_tech_war_system_3:0 "초차원적 에너지 연결"
 giga_tech_war_system_3_desc:0 "스텔라 시스템크래프트의 중심에 있는 항성은 엄청난 양의 에너지를 생성합니다. 이 에너지를 각 행성에 위치한 다차원 축전기로 보내기 위해서는 엄청나게 튼튼하고 진보된 축전기가 필요할 것입니다. 이 축전기는 말도 안 되게 거대한 함선을 이동시킬 수 있는 충분한 추력을 발생시킬 것 입니다."
 giga_tech_war_system_4:0 "인장 메타 합금"
 giga_tech_war_system_4_desc:0 "스텔라 시스템크래프트는 거대한 크기와 독특한 구조로 인해 구조에 엄청난 부하를 받을 것입니다. 사차원 공학과 강력한 물리력 조작을 사용하는 새로운 합금은 우리가 그것을 유지하는데 도움을 줄 것입니다."
 giga_tech_war_system_5:0 "초은하적 멸절 무기"
 giga_tech_war_system_5_desc:0 "최고의 함선에는 최고의 무기가 필요합니다. 몇 개의 시공간 파괴 기술을 결합하면 말 그대로 모든 시공간에서 존재를 지울 수 있을 정도로 엄청난 힘을 전달하는 에너지 광선을 만들 수 있을 것입니다."
 giga_tech_war_system_6:0 "$name_war_system$"
 giga_tech_war_system_6_desc:0 "마침내 우리는 휼륭한 걸작 인 $name_war_system$를 조립하는 데 필요한 기술을 습득했습니다. 이제 남은 것은 거대한 함선과 제작에 따른 소모를 지원하는 데 필요한 자원을 관리하는 방법을 찾는 것입니다. 이 거대 구조물은 마침내 별들을 향해 항해 할 것입니다!"
 war_system_ship_name:0 "[event_target:giga_planet.GetName] 승천"
 giga_tech_war_system_hull_booster:0 "초차원 선체 안정화"
 giga_tech_war_system_hull_booster_desc:0 "$name_war_system$는 강대한 함선이므로 고차원에 전용 구조물을 추가해 고정시키면 그 거대한 선체가 자기 자신의 중력에 의해 무너져내리지 않게할 수 있습니다."
 giga_dialog.2801.name:0 "$name_war_system$ 조립"
 giga_dialog.2801.desc:0 "$name_war_system$.\n\n성계 전체를 무기화 하는 것은 결코 쉬운 일이 아닙니다. 이 거대 함선을 건조하려면 먼저 $name_war_planet$과 $name_war_moon$를 만들어야합니다. 만들어진 함선들은 스텔라 시스템크래프트의 거대한 선체에 통합될 것입니다. 실제 거대 구조는 몇 가지 선진 기술을 연구해야 하지만, 스텔라 시스템크래프트의 건조를 완성하기 위해서 필요한 구성들이 있기 때문에 미리 만드는게 좋을 것입니다.\n\n필요한 천체:\n$name_war_planet$ 4척\n$name_war_moon$ 5개\n승무원 역할을 하게 될 최소 100 Pop이 있는 행성\n\n콜로서스처럼 행성을 파괴할 수 있는 능력이 있습니다.\n\n§R스텔라 시스템크래프트이 함선 설계에 제대로 표시 되려면 UI Overhaul 모드를 사용해야 합니다!§!"
 giga_dialog.2801.a:0 "이해했다."
 giga_dialog.2802.name:0 "스텔라 시스템크래프트 건설 현장"
 giga_dialog.2802.desc:0 "미래의 $name_war_system$ 건설 현장이 완성되었습니다! 이 골격 위에 우리는 이 은하가 이제까지 본것 중 가장 위대한 전함을 건조할 것입니다. 여러 개의 요새 행성과 $name_war_moon$이 연결 되어 있는 이 무시무시한 함선은 무엇이든 이길 수 있습니다.\n\n스텔라 시스템크래프트을 조립하려면 $name_war_planet$과 $name_war_moon$을 이 성계에 가져와야 한다는 점을 기억하십시오!"
 giga_dialog.2802.a:0 "시작됐군."
 giga_dialog.2803.name:0 "스텔라 시스템크래프트 항성 압축기 건설"
 giga_dialog.2803.desc:0 "$name_war_system$의 항성 압축기가 완성되었습니다. 이 두 개의 거대한 중력판은 항성에 엄청난 압력을 가해 항성을 더 작은 크기로 축소하여 쉽게 조작하고 에너지를 추출할 수 있게 합니다. 이제 우리는 스텔라 시스템크래프트의 다양한 구성 행성을 연결하는 놀라운 작업을 시작해야합니다..."
 giga_dialog.2803.a:0 "아주 좋아."
 giga_dialog.2804.name:0 "스텔라 시스템크래프트 동시통합화된 행성 추진기 건설"
 giga_dialog.2804.desc:0 "스텔라 시스템크래프트의 거대한 행성 추진기가 이제 완성되었습니다! 하나의 큰 행성과 두 개의 작은 위성으로 구성된 이 거대한 추진기는 별에서 나오는 에너지를 엄청난 양의 추력으로 변환하여 공허를 통해 스텔라 시스템크래프트을 이동시킵니다. 다음 단계는 구조를 안정화하기 위해 거대한 지지 광선을 선박 측면에 포함시키는 것입니다."
 giga_dialog.2804.a:0 "다음 단계로."
 giga_dialog.2805.name:0 "스텔라 시스템크래프트 지원 위성 건설"
 giga_dialog.2805.desc:0 "스텔라 시스템크래프트에 대한 위성 지원이 방금 완료되었습니다! 거대한 지지 광선에 내장된 두 작은 위성은 스텔라 시스템크래프트의 구조적 무결성을 보장할 뿐만 아니라 무기 및 기타 시설을 위한 공간을 더 많이 제공할 것입니다. 이제 우리는 스텔라 시스템크래프트의 주무장 작업을 시작할 수 있으며, 이는 함선의 전면에 장착할 두 거대한 '총'으로 이루어져 있습니다."
 giga_dialog.2805.a:0 "점점 더 가까이."
 giga_dialog.2806.name:0 "스텔라 시스템크래프트 천체 말소기 제작"
 giga_dialog.2806.desc:0 "이제 스텔라 시스템크래프트의 주요 무기가 완성되었습니다! 함선에 부착 된 이 두 개의 행성은 경로에 있는 불운한 목표에 엄청난 양의 화력을 발산할 수 있습니다. 이제 한 걸음만 남았고, 우리 행성에서 결정을 통해 승무원으로 근무하기 위한 100 Pop을 모아야합니다.\n\n§Y함선 설계에서 $name_war_system$를 설계하는 것을 잊지 마세요§!"
 giga_dialog.2806.a:0 "한 걸음 더."
 giga_dialog.2807.name:0 "$name_war_system$ 완성!"
 giga_dialog.2807.desc:0 "마침내, 끝났습니다. 함선에 수십억 명의 거주자들이 입주했고, 마지막 몇 개의 구조 틀이 설치되면서 $name_war_system$가 완성되었습니다.\n\n이 엄청난 크기의 거대한 함선은 그 앞에 세워진 모든 것을 왜소하게 만들고, 가공할 규모의 화력을 갖추고 있어서 적들은 자신들이 무엇에 당하는지조차 깨닫지 못 할 것입니다. 추진기의 전원이 켜졌으며, 거대한 함선은 이제 전투 준비를 마쳤습니다.\n\n이제 그 무엇도 우리의 힘에 저항하지 못 할 것입니다."
 giga_dialog.2807.a:0 "우리를 피할 수는 없다."
 giga_dialog.2808.name:0 "스텔라 시스템크래프트 승무원 차출"
 giga_dialog.2808.desc:0 "이제 우리는 $name_war_system$의 승무원으로 봉사 할 수십억 명의 사람을 지정했습니다. 이제 스텔라 시스템크래프트을 완성된 형태로 업그레이드하고 승무원을 함선으로 재배치하는 막대한 작업을 시작할 수 있습니다."
 giga_dialog.2808.a:0 "승인한다."
 giga_dialog.2809.desc:0 "잠깐... 뭐라고? 성계 자체를 함선으로 만들었다고...?\n좋습니다. 저희는 항복합니다. 당신이 이겼어요. 우리는 당신이 만든 괴물같은 함선에 대항할 수 없습니다.\n제발... 자비를 베푸시길."
 giga_dialog.2809.a:0 "너희 제국에서 이성이 엿보이는군. 너희 제국은 휼륭한 종속국이 될것이다."
 giga_dialog.2809.b:0 "집어치워! 너희는 스텔라 시스템크래프트의 첫 목표가 될것이다."
 war_system_0:0 "$gc_giga$$name_war_system$ 건설 현장"
 war_system_0_DESC:0 "아마도 이 은하계에서 가장 크고 가장 강력한 선박이 될 미래의 $name_war_system$를 위한 건설 현장입니다."
 war_system_0_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_gigastructure$ - $giga_list_category_celestial_warship$\n§Y별§!과 §Y전쟁 위성 5척§!, §Y베히모스 요새 행성 4척§!을 §Y시스템크래프트§!로 바꿉니다\n$giga_list_removes_system_planets$\n§L거대한 병기화된 성계로, 어마어마한 수의 무기가 장착되어있습니다."
 war_system_0_CONSTRUCTION_INFO_DELAYED:0 "$giga_list_additional_data$ - §Y시스템 크래프트§!가 파괴되면, 그 구성 천체인 §Y전쟁 위성 5척§!과 §Y베히모스 요새 행성 4척§!으로 나뉩니다.\n§R경고! 시스템 크래프트에 선체 재생 부품을 적용하지 마세요. 오버플로우가 발생하고 함선이 삭제될 수 있습니다!§!"
 war_system_1:0 "스텔라 시스템크래프트 항성 압축기"
 war_system_1_DESC:0 "두 개의 거대한 중력 압축기가 미래의 스텔라 시스템크래프트의 강력한 무기에 동력을 공급하기 위해 성계의 중앙 항성을 축소하고 에너지를 수확하고 있습니다."
 war_system_2:0 "스텔라 시스템크래프트 동시통합화된 행성 추진기"
 war_system_2_DESC:0 "중앙 항성에 의해 구동되는 이 거대한 추진기 세트는 큰 행성과 두개의 작은 위성에 내장되어 스텔라 시스템크래프트의 추진 수단으로 사용됩니다."
 war_system_3:0 "스텔라 시스템크래프트 지원 위성"
 war_system_3_DESC:0 "구조적 무결성을 더욱 강화하기 위해 스텔라 시스템크래프트 측면의 거대한 구조틀을 지지하는 두 개의 작은 천체입니다."
 war_system_4:0 "스텔라 시스템크래프트 천체 말소기"
 war_system_4_DESC:0 "스텔라 시스템크래프트의 천체 말소기는 주 구조물에 연결된 두 개의 $name_war_planet$으로 구성됩니다. 항성의 엄청난 에너지 출력을 통해 일반적인 요새 행성보다 훨씬 더 강력한 무기를 사용할 수 있습니다. 이 무기는 기본적으로 스텔라 시스템크래프트을 막아서는 모든 것을 제거할 수 있습니다."
 war_system_5:0 "$name_war_system$"
 war_system_5_DESC:0 "완성된 $name_war_system$. 도시 행성과 여러 행성들로 구성되어 대부분의 인구를 수용할 수 있습니다."
 giga_tech_particle_accelerator:0 "초-에너지 입자 충돌기"
 giga_tech_particle_accelerator_desc:0 "입자를 서로 대항하게 가속시키는 것은 입자의 상호작용을 배우는 효율적인 방법입니다. 별을 감싸는 거대한 가속기를 만드는 능력은 분명히 유용할 것입니다."
 giga_dialog.1801.name:0 "$name_particle_accel$ 건설"
 giga_dialog.1801.desc:0 "이제 [giga_system.GetName] 성계 근처에 위치한 건설 현장이 완성되었습니다. 이제 우리는 별 주위를 감싸는 실제 입자 가속기 건설 작업을 시작하여 입자를 엄청난 속도로 가속할 수 있습니다."
 giga_dialog.1801.a:0 "훌륭해."
 giga_dialog.1802.name:0 "$name_particle_accel$ 완공"
 giga_dialog.1802.desc:0 "수 개월 하고도 수 개월의 작업 끝에 [giga_system.GetName] 성계 주변의 입자 가속기가 이제 완공되었고 작동합니다. 이것은 가능할 것이라고는 생각치도 못한 속도로 입자를 가속시키는 능력을 가지고 있기에, 입자가 어떻게 상호작용하는지에 대해 상당히 배울 수 있게 해줄 것입니다. 또한 우리 함선의 보호막이 25% 증가합니다."
 giga_dialog.1802.a:0 "잘했다."
 giga_dialog.1803.name:0 "폐허가 된 $name_particle_accel$"
 giga_dialog.1803.desc:0 "우리의 과학선이 놀라운 발견을 했습니다! [from.GetName] 성계의 가운데 엄청난 $name_particle_accel$가 있습니다. 이론적으로는 빛의 속도에 가깝게 입자를 가속할 수 있습니다.\n\n슬프게도, 엄청난 손상을 입은 것으로 보이며 현재 심각하게 파괴되어 있습니다. 하지만, 우리 과학자들은 올바른 기술이 있다면 그것을 다시 작동시킬 수 있다고 확신합니다."
 giga_dialog.1803.a:0 "놀라워."
 giga_dialog.1804.name:0 "$name_particle_accel$ 수리됨!"
 giga_dialog.1804.desc:0 "좋은 소식입니다! 우리의 공학자들이 파괴된 $name_particle_accel$을 작동 상태로 복구하는 데 성공했습니다! 이제 운영 중이며, 물리학 연구의 꾸준한 흐름과 많은 이국적인 입자를 생산하고 있습니다."
 giga_dialog.1804.a:0 "믿을 수 없군."
 particle_accelerator_0:0 "$gc_kilo$$name_particle_accel$ 건설 현장"
 particle_accelerator_0_DESC:0 "항성 주위에 입자 가속기를 건설하는 데 필요한 인력과 자재를 수용하는 대규모 건설 현장입니다."
 particle_accelerator_0_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_kilostructure$ - $giga_list_category_science_production$\n£physics_research£ §Y물리학 연구§!를 생산하며 §Y보호막 내구도§!를 §Y2.5%§! 증가시킵니다\n§L별을 둘러싼 이 거대한 연구용 입자 가속기는 이제껏 보지 못한 속도로 입자를 가속시킵니다."
 particle_accelerator_1:0 "$name_particle_accel$"
 particle_accelerator_1_DESC:0 "항성 주위에 만들어진 매우 큰 입자 가속기입니다. 다양한 입자를 빛의 속도에 가깝게 가속할 수 있으므로, 입자의 구성과 어떻게 상호작용하는지에 대한 우리의 이해를 크게 넓힐 수 있게 해줍니다.\n\n보호막이 +25% 증가합니다."
 particle_accelerator_ruined:0 "폐허가 된 $name_particle_accel$"
 particle_accelerator_ruined_DESC:0 "수 만년 전에 미지의 문명에 의해 건설되었던, 파괴된 $name_particle_accel$입니다. 비록 엄청난 손상을 입었지만, 주 뼈대는 여전히 대부분 손상되지 않았습니다. 올바른 기술이 있다면 잠재적으로 복원할 수 있을지도 모릅니다."
 particle_accelerator_ruined_MEGASTRUCTURE_DETAILS:0 "$particle_accelerator_ruined_DESC$"
 particle_accelerator_restored:0 "$name_particle_accel$"
 particle_accelerator_restored_DESC:0 "항성 주위에 만들어진 매우 큰 입자 가속기입니다. 다양한 입자를 빛의 속도에 가깝게 가속할 수 있으므로, 입자의 구성과 어떻게 상호작용하는지에 대한 우리의 이해를 크게 넓힐 수 있게 해줍니다.\n\n보호막이 +25% 증가합니다."
 giga_tech_neutronium_gigaforge:0 "질량 뉴트로늄 추출"
 giga_tech_neutronium_gigaforge_desc:0 "우리 군에 적용하기 위해 뉴트로늄을 대량으로 추출할 수 있는 기지를 건설하는 것은 상당히 기술적인 도전이지만, 매우 유용할 것입니다."
 giga_dialog.701.name:0 "$name_neut_gigaforge$ 건설 현장"
 giga_dialog.701.desc:0 "우리의 공학자들이 [giga_system.GetName]의 궤도에서 $name_neut_gigaforge$를 위한 건설 현장을 완공했습니다. 완성된다면, 첨단 기술 광물 추출기와 정제소 덕분에 중성자별에서 직접 대량의 중성자를 추출하여 우리 군함의 장갑에 사용할 수 있을 것입니다."
 giga_dialog.701.a:0 "좋아."
 giga_dialog.702.name:0 "$name_neut_gigaforge$ 허브 건설"
 giga_dialog.702.desc:0 "우리의 공학자들은 [giga_system.GetName]위에 지어진 $name_neut_gigaforge$의 중앙 허브 구축을 완료했습니다. 이 거대한 단지는 방대한 양의 정제소와 다양한 광물 처리장을 갖추고 있어 중성자별에서 물질을 채취하는데 도움을 줄 것입니다. 지금은 통합 실험실 덕분에 물리학 연구 및 일부 합금을 생산하고 있지만, 아직 뉴트로늄은 생산할 수 없습니다. 이제 우리는 별에서 추출한 뉴트로늄을 정제하기 위해 훨씬 더 전문화된 시설을 갖춘 가공 고리를 건설하기 시작할 것입니다."
 giga_dialog.702.a:0 "좋아."
 giga_dialog.703.name:0 "$name_neut_gigaforge$ 가공 고리 건설"
 giga_dialog.703.desc:0 "$name_neut_gigaforge$ 주변의 대형 가공 고리가 건설되었습니다. 이것은 거의 모든 중성자별에서 뉴트로늄이라 알려진 매우 위험하고 극도로 밀도가 높은 물질을 추출하는 것을 돕는 대규모 전문 처리 센터를 포함하고 있습니다. 그러나, 뉴트로늄 추출이 실제로 시작되려면 허브의 중앙 드릴을 건설해야 합니다."
 giga_dialog.703.a:0 "훌륭해."
 giga_dialog.704.name:0 "$name_neut_gigaforge$ 완공"
 giga_dialog.704.desc:0 "[giga_system.GetName]에 구축된 우리의 $name_neut_gigaforge$가 방금 완공되었습니다! 이제 완전히 작동하며 아래의 극도로 밀도가 높은 별에서 대량의 뉴트로늄을 추출하고 있습니다. 가공 고리의 특화된 설비 덕분에 뉴트로늄을 우리 함선의 장갑에 쉽게 적용할 수 있어 장갑을 크게 강화시킬 수 있습니다. 또한 많은 연구소가 중성자별의 독특한 성질을 연구함으로써 꾸준한 연구 성과를 만들어 내고 있으며, 뉴트로늄은 방대한 양의 합금으로 정제되고 있습니다."
 giga_dialog.704.a:0 "환상적이야."
 giga_dialog.705.name:0 "폐허가 된 $name_neut_gigaforge$"
 giga_dialog.705.desc:0 "폐허가 된 $name_neut_gigaforge$가 [from.GetName] 성계에서 발견되었습니다. 많은 피해를 입은 것으로 보이지만, 외부 골격은 대부분 손상되지 않았습니다. 우리 과학자들은 적절한 기술이 있다면 수리가 가능할 것이라고 믿습니다."
 giga_dialog.705.a:0 "흥미롭군."
 giga_dialog.706.name:0 "$name_neut_gigaforge$ 수리됨!"
 giga_dialog.706.desc:0 "폐허였던 $name_neut_gigaforge$가 매우 조심스럽게 수리되었습니다! 뉴트로늄 드릴과 가공 고리가 다시 작동하기 시작했고, 이제 우리가 사용할 수 있도록 방대한 양의 뉴트로늄을 추출하고 있습니다. 이것은 의심 할 여지없이 우리 군대에 큰 도움이 될 것입니다."
 giga_dialog.706.a:0 "환상적이야."
 neutronium_gigaforge_0:0 "$gc_mega$$name_neut_gigaforge$ 건설 현장"
 neutronium_gigaforge_0_DESC:0 "이 건설 현장은 중성자별에서 직접 뉴트로늄을 추출하는 데 전념하는 거대한 채굴 및 가공 기지 인 $name_neut_gigaforge$를 건설하는 데 필요한 자원과 인력을 저장하는 주요 기지 역할을 합니다."
 neutronium_gigaforge_0_MEGASTRUCTURE_DETAILS:0 "£gigastructural£ $giga_list_category_megastructure$ - $giga_list_category_advanced_resource_production$ \n§Y중성자별§!이나 §Y펄사§!에서 £alloys£ §Y합금§!을 얻으며 §Y장갑 내구도§!를 §Y7.5%§! 증가시킵니다\n§L중성자별에서 대량의 뉴트로늄을 캐낼 수 있는 거대한 정제소로, 뉴트로늄을 고품질 합금으로 \"분해\"합니다.§!"
 neutronium_gigaforge_0_CONSTRUCTION_INFO_DELAYED:0 "$giga_list_additional_data$ - §Y니다벨리르 제련소§!와 겹쳐질 수 있습니다"
 neutronium_gigaforge_1:0 "$name_neut_gigaforge$ 메인 허브"
 neutronium_gigaforge_1_DESC:0 "미완성 된 중성자 제련소의 거대한 허브입니다. 현재 중성자별 표면에서 밀도 높은 광물을 채취할 수 있을 뿐만 아니라, 중성자별의 극한성질과 관련된 다양한 공학적 실험을 수행할 수 있습니다."
 neutronium_gigaforge_2:0 "$name_neut_gigaforge$ 가공 고리"
 neutronium_gigaforge_2_DESC:0 "메인 허브 주변의 거대한 고리는 중성자별에서 추출한 물질을 변환하고 정제하는데 사용됩니다. 과학 실험실과 통합되어 더 많은 실험을 할 수 있습니다."
 neutronium_gigaforge_3:0 "$name_neut_gigaforge$"
 neutronium_gigaforge_3_DESC:0 "완성된 $name_neut_gigaforge$입니다. 중성자별에서 뉴트로늄을 추출하여 대량 장갑 생산에 사용하기 위해 만들어진 거대 구조물입니다. 뉴트로늄을 효율적으로 추출할 수 있는 드릴이 특징이며, 함선 장갑을 60% 증가시킵니다."
 neutronium_gigaforge_ruined:0 "폐허가 된 $name_neut_gigaforge$"
 neutronium_gigaforge_ruined_DESC:0 "중성자별 인근을 떠도는 폐허가 된 $name_neut_gigaforge$입니다. 과거에는 뉴트로늄을 추출하고 저장할 수 있었지만, 대부분의 내부 시설이 손상되었습니다. 극도의 주의를 기울인다면 수리가 가능할지도 모릅니다."
 neutronium_gigaforge_ruined_MEGASTRUCTURE_DETAILS:0 "$neutronium_gigaforge_ruined_DESC$"
 neutronium_gigaforge_restored:0 "$name_neut_gigaforge$"
 neutronium_gigaforge_restored_DESC:0 "$neutronium_gigaforge_3_DESC$"
 giga_tech_yggdrasil_orchid:0 "대규모 생물권 변형"
 giga_tech_yggdrasil_orchid_desc:0 "가스 행성의 상층 대기에 거대한 식물 유기체를 수용하는 것은 우리의 식량 생산에 귀중한 자산이 될 수 있습니다. 진보된 유전자 변형과 기후 조작 기술을 통해 이러한 프로젝트를 수행할 수 있습니다."
 giga_dialog.2001.name:0 "$name_yggdrasil$ 건설 현장"
 giga_dialog.2001.desc:0 "$name_yggdrasil$의 건설 현장이 완공되었습니다. 이는 많은 사람들에게 식량을 제공할 수있는 다량의 생명 공학 유기체로, 가스 행성 상층 대기에 씨앗을 뿌리는데 필요한 구조물을 건설하는 기반 역할을 할 것입니다."
 giga_dialog.2001.a:0 "좋아."
 giga_dialog.2002.name:0 "$name_yggdrasil$ 실험실 건설"
 giga_dialog.2002.desc:0 "$name_yggdrasil$의 방대한 실험실이 완공되었습니다. 그곳에서는 가스 행성의 상층 대기에 씨를 뿌릴 맞춤형 식물을 설계하고, 가스 행성 자체를 연구할 것입니다."
 giga_dialog.2002.a:0 "훌륭해."
 giga_dialog.2003.name:0 "$name_yggdrasil$ 기후 조작기 건설"
 giga_dialog.2003.desc:0 "$name_yggdrasil$ 건설의 또 다른 과정이 끝났습니다. 기후 조작기는 가스 행성의 상층 대기에 존재하는 기후를 조작할 수 있을 것이며, 우리가 그곳에 심은 생명체가 생존할 수 있도록 보장할 것입니다.\n이제, 우리는 이 가스 행성을 우리 제국을 위한 거대한 농장으로 바꾸어야합니다."
 giga_dialog.2003.a:0 "좋아."
 giga_dialog.2004.name:0 "위그드라실 난초 복합 단지 완공"
 giga_dialog.2004.desc:0 "$name_yggdrasil$의 직원들은 [giga_system.GetName] 성계의 가스 행성을 상층 대기에서 번성하는 식물 유기체가 있는 위그드라실 난초 단지로 변형했습니다. 이 획기적인 경이는 엄청난 양의 식량을 생산하고 전 행성을 먹일 것입니다."
 giga_dialog.2004.a:0 "놀랍군!"
 giga_dialog.2005.name:0 "폐허가 된 $name_yggdrasil$"
 giga_dialog.2005.desc:0 "폐허가 된 $name_yggdrasil$입니다. 이는 방대한 실험실과 기후 조작기를 수용했으며, 가스 행성의 상층 대기에 행성 전체를 먹여 살릴 수 있는 다량의 유기 물질을 지탱하고 있었습니다. 애석하게도 이미 황폐해졌고, 기후 조작기가 작동을 중지하자마자 가스 행성의 무자비한 바람에 의해 파괴되었습니다."
 giga_dialog.2005.a:0 "흥미롭군."
 giga_dialog.2006.name:0 "$name_yggdrasil$ 수리 됨!"
 giga_dialog.2006.desc:0 "우리의 놀라운 기술로 $name_yggdrasil$를 다시 정상적으로 복원했습니다! 기후 조작기가 다시 작동을 시작했고, 가스 행성의 상층 대기는 다시 한번 방대한 유기 물질로 가득 채워졌습니다. 이는 곧 엄청난 사람들의 식량 문제를 해결할 수 있음을 의미합니다."
 giga_dialog.2006.a:0 "굉장하군."
 yggdrasil_orchid_0:0 "$gc_mega$$name_yggdrasil$ 건설 현장"
 yggdrasil_orchid_0_DESC:0 "미래의 $name_yggdrasil$의 건설 현장에는 공학자와 생물학자가 행성을 거대한 농장으로 바꾸는데 필요한 모든 지원을 수용하고 있습니다."
 yggdrasil_orchid_0_MEGASTRUCTURE_DETAILS:0 "£galwonders£ $giga_list_category_megastructure$ - $giga_list_category_basic_resource_production$\n§Y거대 가스 행성§!을 이용해 £food£ §Y식량§!과 £physics_research£ £society_research£ §Y연구§!를 생산합니다\n§L가스 행성 근처에 지어진 거대 복합 단지로, 특별한 식물 유기체를 대기에 뿌리고 수확합니다.§!"
 yggdrasil_orchid_1:0 "$name_yggdrasil$ 실험실"
 yggdrasil_orchid_1_DESC:0 "행성 주위에 둘러진 이 거대한 고리는 완벽한 유기체를 개발하고 유전적으로 설계하는 실험실이 될 것이며, 이를 가스 행성의 상층 대기에 이식하여 증식시킬 것입니다."
 yggdrasil_orchid_2:0 "$name_yggdrasil$ 기후 조작기"
 yggdrasil_orchid_2_DESC:0 "이 믿을 수 없을 정도로 복잡한 구조물은 그곳에 이식된 생명체가 살아남을 수 있도록 가스 행성의 혼란스러운 대기를 조십스럽게 조절합니다. 이제, 우리는 유기체를 이식하는 과정을 시작해야 합니다."
 yggdrasil_orchid_3:0 "$name_yggdrasil$"
 yggdrasil_orchid_3_DESC:0 "완전히 활성화된 $name_yggdrasil$입니다. 상층 대기에 떠다니는 유전자 조작 식물로 가득 찬 가스 행성을 둘러싸고 있으며, 이를 수확해 우리 인구를 위한 식용 식품으로 변형하고 있습니다."
 yggdrasil_orchid_ruined:0 "폐허가 된 $name_yggdrasil$"
 yggdrasil_orchid_ruined_DESC:0 "폐허가 된 $name_yggdrasil$입니다. 이는 방대한 실험실과 기후 조작기를 수용했으며, 가스 행성의 상층 대기에 행성 전체를 먹여 살릴 수 있는 다량의 유기 물질을 지탱하고 있었습니다. 애석하게도 이미 황폐해졌고, 기후 조작기가 작동을 중지하자마자 가스 행성의 무자비한 바람에 의해 파괴되었습니다."
 yggdrasil_orchid_ruined_MEGASTRUCTURE_DETAILS:0 "$yggdrasil_orchid_ruined_DESC$"
 yggdrasil_orchid_restored:0 "$name_yggdrasil$"
 yggdrasil_orchid_restored_DESC:0 "$yggdrasil_orchid_3_DESC$"
 giga_tech_matrioshka_brain_1:0 "항성 규모 컴퓨팅"
 giga_tech_matrioshka_brain_1_desc:0 "컴퓨팅 성능에 대한 우리의 끝없는 요구를 충족시키기 위해서, 우리는 더 크게 생각해야 합니다. 다이슨 스피어와 같은 설계를 더 큰 컴퓨터 구조에 포함시킴으로써, 우리는 서로의 연산을 공유하는 여러 중첩 레이어로 구성된 대규모 시스템 확장 컴퓨터를 구성할 수 있었습니다."
 giga_tech_matrioshka_brain_2:0 "의식 업로딩"
 giga_tech_matrioshka_brain_2_desc:0 "의식을 스캔하여 수십억 개의 다른 의식과 함께 완전히 시뮬레이션된 인공 환경으로 옮기기 위한 기술적 요건은 매우 큽니다. 그러나 $name_matrioshka_brain$과 같은 충분히 강력한 컴퓨터가 있다면 이 꿈은 현실이 될 수 있습니다."
 giga_dialog.501.name:0 "$name_matrioshka_brain$ 건설"
 giga_dialog.501.desc:0 "우리는 이제 $name_matrioshka_brain$을(를) 구축하는 거대한 작업을 시작할 준비가 되었습니다. 첫 번째 단계는 별 주위에 두 개의 태양 축전기를 건설하여 별의 원치 않는 외부 활동을 억제하는 것입니다. 각 층이 추가될 때마다 더 많은 연구가 생성될 것입니다. 마지막 층을 완성하면 $name_matrioshka_brain$의 효율성이 급증할 것이라는 점을 명심하십시오. 이 시스템의 행성체들은 거대 구조물을 위한 공간을 만들기 위해 해체될 것입니다."
 giga_dialog.501.a:0 "멋진 일이야."
 giga_dialog.502.name:0 "항성 축전기 건설"
 giga_dialog.502.desc:0 "항성 축전기는 현재 항성 주위에 설치되어 있는 상태이며 막대한 양의 에너지를 모으고 항성의 폭풍을 막아주고 있습니다. 이제 우리는 첫번째 컴퓨팅 영역인 메인 데이터 뱅크를 구축해야합니다. 데이터 뱅크는 은하계의 구석구석까지 새로운 데이터를 끊임 없이 수집하고 분석하는 거대한 저장 장치의 역할을 수행할 것 입니다."
 giga_dialog.502.a:0 "휼륭하군."
 giga_dialog.503.name:0 "메인 데이터 뱅크 건설"
 giga_dialog.503.desc:0 "메인 데이터 뱅크가 구축되었으며 방대한 양의 과학적 정보 자료를 처리하고 있습니다. 하지만 여전히 이 계획의 전체에 비해서는 매우 제한적이고 최고 효율에 도달하기 위해서는 더욱 많은 축조물이 필요합니다. 우리는 이제 중앙 처리 장치의 건설을 시작해야 합니다. 중앙 처리 장치는 은하계에서 가장 강력한 컴퓨터들을 수용하고 메인 데이터 뱅크에 의해 방출 되는 열로 작동될 것 입니다."
 giga_dialog.503.a:0 "좋아, 여기까지 도달했군."
 giga_dialog.504.name:0 "중앙 처리 장치 건설"
 giga_dialog.504.desc:0 "중앙 처리 장치 건설이 완료되었습니다. 이 장치는 메인 데이터 뱅크의 열로 구동되며 거대한 신경망처럼 서로 연결된 지각 있는 컴퓨터들의 거대한 네트워크로 엄청난 정보 처리 능력을 가지고 있습니다. 다음 단계는 양자 계산기를 장치하는 일입니다."
 giga_dialog.504.a:0 "영광스러운 미래에 한 걸음 더 나아가고 있다."
 giga_dialog.505.name:0 "양자 계산기 건설"
 giga_dialog.505.desc:0 "양자 계산기가 가동 중입니다. 이 두 개의 거대한 링은 중앙 프로세서에서 생성된 열 에너지를 사용하며, 모든 과학 분야에서 가장 복잡한 질문에 대한 답을 찾기 위해 적극적으로 작업하고 있습니다. $name_matrioshka_brain$을 구축하는 마지막 단계는 교차 참조 아카이브를 만드는 것으로, 이는 $name_matrioshka_brain$의 모든 컴퓨터를 체계적으로 연결하는 거대한 컴퓨터 네트워크가 되어 그 효율성을 10배 향상시킬 것입니다."
 giga_dialog.505.a:0 "이제 우주의 비밀에 더욱 가까워졌군."
 giga_dialog.506.name:0 "$name_matrioshka_brain$ 완성"
 giga_dialog.506.desc:0 "오늘은 우리 종족에게 영광스러운 날입니다. 우리 가장 숙련된 공학자들과 노동자들이 오직 가장 위대한 제국만이 건설할 수 있다고 꿈꿔온 기술적 경이로움을 조립했습니다. 이 $name_matrioshka_brain$은 이 은하에서 설계된 가장 강력한 컴퓨터 중 일부를 장착하고 있어, 우주의 마지막 신비를 밝혀내는 데 도움을 줄 것입니다.\n\n이 컴퓨터의 놀라운 힘은 또한 우리의 경제의 일부를 최적화하여, 우리의 함선 건조 속도와 해군 용량을 향상시킬 것입니다."
 giga_dialog.506.a:0 "드디어 우주의 비밀을 꿰뚫었다!"
 giga_dialog.507.name:0 "마트료시카 현실 시뮬레이터 건설"
 giga_dialog.507.desc:0 "이제 때가 되었습니다. 어느 정도의 효율성 감소를 대가로 우리의 마트료시카 브레인는 엄청난 양의 생명체를 수용할 수 있는 수십억개의 정지장 포드를 갖출 수 있게 되었습니다. 정지장 안의 생명체는 완벽한 가상 세계에서 살 수 있을 것 입니다."
 giga_dialog.507.a:0 "멋진 일이야."
 giga_dialog.508.name:0 "마트료시카 현실 시뮬레이터 완성"
 giga_dialog.508.desc:0 "현실 시뮬레이터의 한 섹션이 완성되어 이제 완전히 기능합니다.\n\n가상 세계 안에서 인구는 매우 느리게 증가하며, 모든 팝은 다른 행성에서 옮길 필요가 있습니다. 결정 탭에서 가상 세계를 특화시킬 수 있습니다."
 giga_dialog.508.a:0 "한 걸음 더."
 matrioshka_brain_0:0 "$gc_giga$$name_matrioshka_brain$ 건설 현장"
 matrioshka_brain_0_DESC:0 "이 건설 현장은 $name_matrioshka_brain$을 건설하는데 필요한 대량의 자원과 인력을 유지하는 거점 역할을 할 것입니다."
 matrioshka_brain_0_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_gigastructure$ - $giga_list_category_science_production$\n§Y별§!의 에너지를 사용해 거대하고 강력한 컴퓨터를 작동시켜 £physics_research£ £society_research£ £engineering_research£ §Y연구§!를 생산합니다\n$giga_list_removes_system_planets$ - $giga_list_scales_with_star_size$\n§L별 전체에 뻗어있는 여러 겹의 거대한 컴퓨터입니다.§!"
 matrioshka_brain_0_CONSTRUCTION_INFO_DELAYED:0 "$giga_list_additional_data$ - 후에 §Y가상 현실 구획§!으로 업그레이드할 수 있으며, 업그레이드할 시 거대 구조물의 §Y연구 생산량§!은 감소하지만 §Y팝§! 수용 능력이 증가합니다\n\n§Y가상 현실 구획§!은 §Y독특한 지구§!를 가지고 있으며, 건설된 지구가 많을 수록 더 강력해지고 또는 제국구급 영향을 줍니다. 제국의 유형과 윤리관, 사회 제도에 따라 하나의 지구 유형이 달라집니다."
 matrioshka_brain_0_g_star_CONSTRUCTION_INFO_DELAYED:0 "$giga_list_additional_data$: ['building:building_giga_matrioshka_brain_uplink'] 건물 제공"
 matrioshka_brain_1:0 "$name_matrioshka_brain$ 항성 축전기"
 matrioshka_brain_1_DESC:0 "항성 주위를 도는 이 첨단 축전기들은 미래의 $name_matrioshka_brain$에 에너지를 공급하며, 항성을 안정시키고 섬세한 회로를 보호하기 위해 항성 표면의 폭발와 바람을 억제할 수 있습니다."
 matrioshka_brain_2:0 "$name_matrioshka_brain$ 메인 대이터 뱅크"
 matrioshka_brain_2_DESC:0 "메인 데이터 뱅크는 이제 항성 주위에 자리 잡고 있으며, 과학 연구에 의해 생성되는 데이터를 관리하기 위해 최고급 컴퓨터를 설치했습니다. 지금까지 수집한 대부분의 데이터가 저장돼 연구를 진행하고 있습니다."
 matrioshka_brain_3:0 "$name_matrioshka_brain$ 중앙 처리 장치"
 matrioshka_brain_3_DESC:0 "중앙 처리 장치는 항성 전체를 둘러싸고 있는 거대한 컴퓨터입니다. 메인 데이터 뱅크에서 발생하는 열은 중앙 처리 장치에 전원을 공급하는데 사용되어 장치의 효율성을 크게 향상시켰습니다. 이 컴퓨터들은 굉장히 강력합니다."
 matrioshka_brain_4:0 "$name_matrioshka_brain$ 양자 계산기"
 matrioshka_brain_4_DESC:0 "많은 복잡한 계산들, 특히 우주의 본질과 관련된 계산들이 이러한 양자 계산기에서 처리되고 있습니다. 중앙 처리 장치에서 나오는 열을 사용하여 작동하기 때문에 굉장히 효율적입니다."
 matrioshka_brain_5:0 "$name_matrioshka_brain$"
 matrioshka_brain_5_DESC:0 "완전히 작동하는 $name_matrioshka_brain$입니다. 여러 구성 요소를 조정하는 상호 참조 아카이브로 구성된 가장 바깥 쪽 레이어를 포함하여 효율성을 최대치로 끌어올렸습니다. 연구 속도, 통합력, 로봇 생산량 및 함대 수용력이 25% 증가합니다."
 matrioshka_brain_6:0 "마트료시카 현실 시뮬레이터"
 matrioshka_brain_6_DESC:0 "이 $name_matrioshka_brain$은 많은 정자기 포드가 장착되어있어 유기체들이 그들의 방대한 정신을 이상화하여 시뮬레이션 세계로 업로드할 수 있습니다. 유일한 한계는 그들의 상상력 뿐입니다."
 matrioshka_brain_7:0 "마트료시카 현실 시뮬레이터"
 matrioshka_brain_7_DESC:0 "이 $name_matrioshka_brain$은 많은 정자기 포드가 장착되어있어 유기체들이 그들의 방대한 정신을 이상화하여 시뮬레이션 세계로 업로드할 수 있습니다. 유일한 한계는 그들의 상상력 뿐입니다."
 matrioshka_brain_8:0 "마트료시카 현실 시뮬레이터"
 matrioshka_brain_8_DESC:0 "이 $name_matrioshka_brain$은 많은 정자기 포드가 장착되어있어 유기체들이 그들의 방대한 정신을 이상화하여 시뮬레이션 세계로 업로드할 수 있습니다. 유일한 한계는 그들의 상상력 뿐입니다."
 matrioshka_brain_9:0 "마트료시카 현실 시뮬레이터"
 matrioshka_brain_9_DESC:0 "이 $name_matrioshka_brain$은 많은 정자기 포드가 장착되어있어 유기체들이 그들의 방대한 정신을 이상화하여 시뮬레이션 세계로 업로드할 수 있습니다. 유일한 한계는 그들의 상상력 뿐입니다."
 giga_tech_fusion_suppressor:0 "항성 융합 조작"
 giga_tech_fusion_suppressor_desc:0 "특수한 질량 주입기와 함께 실험적인 중력 조절 장치를 이용하면 항성의 격변 에너지를 변경할 수 있습니다. 이러한 기술은 우리가 전략적으로 핵융합 반응을 방해함으로써 항성 전체를 압축하고 파괴할 수 있게 합니다."
 building_giga_iodizium_mines:0 "아이오디지움 수정 광산"
 building_giga_iodizium_mines_plural:0 "아이오디지움 수정 광산"
 building_giga_iodizium_mines_desc:0 "이 성계의 항성이 초신성 폭발을 일으켰을 때 행성 물질이 외계 방사선을 받아 생성된 아이오디지움을 채굴에는 섬세한 작업이 필요합니다."
 mod_building_giga_iodizium_mines_max:0 "최대 $building_giga_iodizium_mines$"
 job_giga_iodizium_miner:0 "아이오디지움 광부"
 job_giga_iodizium_miner_plural:0 "아이오디지움 광부"
 job_giga_iodizium_miner_desc:0 "물리학을 거부하는 아이오디지움 수정 채굴 장비를 사용하는 숙련가 광부들입니다."
 job_giga_iodizium_miner_effect_desc:0 "$job_giga_iodizium_miner_swap_plural_with_icon$은 £consumer_goods£ §Y$consumer_goods$§!를 사용하여 £giga_sr_iodizium£ §Y$giga_sr_iodizium$§!을 안전하게 추출합니다."
 job_giga_iodizium_miner_swap_plural_with_icon:0 "[giga_iodizium_miner.GetIcon] [giga_iodizium_miner.GetNamePlural]"
 mod_job_giga_iodizium_miner_add:0 "[giga_iodizium_miner.GetName] 직업"
 mod_job_giga_iodizium_miner_per_pop:0 "§G+1§! [giga_iodizium_miner.GetName] 직업 per $VALUE$ 팝"
 mod_job_giga_iodizium_miner_per_pop_short:0 "\n$VALUE$ £pop£마다 £mod_job_giga_iodizium_miner_add£ §G+1§!"
 job_giga_iodizium_mining_drone:0 "아이오디지움 채굴 드론"
 job_giga_iodizium_mining_drone_plural:0 "아이오디지움 채굴 드론"
 job_giga_iodizium_mining_drone_desc:0 "물리학을 거부하는 아이오디지움 수정 채굴 장비를 사용하는 숙련가 광부들입니다."
 job_giga_iodizium_mining_drone_effect_desc:0 "$job_giga_iodizium_mining_drone_swap_plural_with_icon$은 £energy£ §Y$energy$§!를 사용하여 £giga_sr_iodizium£ §Y$giga_sr_iodizium$§!을 안전하게 추출합니다."
 job_giga_iodizium_mining_drone_swap_plural_with_icon:0 "[giga_iodizium_mining_drone.GetIcon] [giga_iodizium_mining_drone.GetNamePlural]"
 mod_job_giga_iodizium_mining_drone_add:0 "[giga_iodizium_mining_drone.GetName] 직업"
 mod_job_giga_iodizium_mining_drone_per_pop:0 "§G+1§! [giga_iodizium_mining_drone.GetName] 직업당 $VALUE$ 팝"
 mod_job_giga_iodizium_mining_drone_per_pop_short:0 "\n§G+1§! £mod_job_giga_iodizium_miner_add£ 당 $VALUE$ £pop£"
 giga_tech_ndb_1:0 "위상 에너지 전력 축전기"
 giga_tech_ndb_1_desc:0 "막대한 양의 에너지는 항성 크기 거대 구조물에 저장하는것은 굉장히 유용한 응용일지도 모릅니다."
 giga_tech_ndb_2:0 "응집 극대화 렌즈"
 giga_tech_ndb_2_desc:0 "수정 기술의 진보로 막대한 양의 에너지를 집중할 수 있는 다양한 새롭고 놀라우리만큼 효율적인 렌즈들이 사용 가능해졌습니다."
 giga_tech_ndb_3:0 "인공적 성간 웜홀 생성"
 giga_tech_ndb_3_desc:0 "엄청난 거리를 넘어 웜홀을 생성하는 능력으로 우리는 별을 넘어 대량의 에너지를 보내는 능력이 대단히 향상되었습니다."
 giga_tech_ndb_4:0 "대규모 에너지 재지정"
 giga_tech_ndb_4_desc:0 "믿기 힘들정도로 진보된 기술들이 사용됨에 따라, 항성 전체의 출력을 완전히 집중하여 순수히 파괴적인 광선을 만드는게 가능해졌습니다."
 giga_dialog.3201.name:0 "$name_ndb$ 건설 현장 완성"
 giga_dialog.3201.desc:0 "미래의 $name_ndb$을 위한 건설 현장이 완공되었습니다. 이 플랫폼은 성계 전체를 파괴할 수 있는 $name_ndb$ 건설을 시작할 토대의 역할을 할 것입니다."
 giga_dialog.3201.a:0 "환상적이야."
 giga_dialog.3202.name:0 "$name_ndb$ 자기 수집기"
 giga_dialog.3202.desc:0 "$name_ndb$의 자기 수집기는 항성 주위에 세워진 거대한 구조물로, 첨단 자기장과 중력 변조를 이용해 에너지를 모으고 조작할 수 있다."
 giga_dialog.3202.a:0 "믿을 수 없군."
 giga_dialog.3203.name:0 "$name_ndb$ 항성 재지정기 완성"
 giga_dialog.3203.desc:0 "$name_ndb$의 항성 재지정기가 완성되었습니다! 정말로 거대한 이 구조물은 은하의 모든 것을 작아보이게 만들고 재지정이 가능하고 항성의 무시무시한 에너지를 쉽게 조작할 수 있습니다. $name_ndb$을 발사하기 위해서는 여전히 집중 배열망을 건설해야 합니다."
 giga_dialog.3203.a:0 "휼륭해!"
 giga_dialog.3204.name:0 "$name_ndb$ 초거대 안정기 완성"
 giga_dialog.3204.desc:0 "우리의 은하적 초월무기의 완성에 한 발자국 더 가까워졌습니다. $name_ndb$의 초거대 안정기는 항성 재지정기 안쪽에 건설된 거대한 원형 고리 구조물입니다. 이는 막대한 에너지의 흐름이 거대 구조물 자신을 파괴하는 것을 막아줍니다. 이제 남은것은 집중 배열망을 완성하는 것입니다..."
 giga_dialog.3204.a:0 "거의 다 됐어."
 giga_dialog.3205.name:0 "$name_ndb$ 완성!"
 giga_dialog.3205.desc:0 "오늘은 우리 종족과 제국의 위대한 날입니다. $name_ndb$이 완성되었습니다. 이 엄청나게 거대한 초거대 병기는 멀리 떨어진 행성들을 '소독'하고 잠재적으로 볼 때 성계 전체를 파괴할 수도 있습니다. 이것은 은하 역사상 가장 강력한 구조물 중 하나일 것이며, 이것의 절대적인 힘은 우리의 은하적 지배를 보장할 것입니다."
 giga_dialog.3205.a:0 "우리의 적들은 두려움에 떨 것이다."
 giga_ndb.002.name:0 "$name_ndb$"
 giga_ndb.002.desc:0 "$name_ndb$이 발사 준비를 마쳤습니다. 어느 목표를 조준해야 할까요?"
 giga_ndb.002.a:0 "적대적인"
 giga_ndb.002.b:0 "중립적인"
 giga_ndb.002.c:0 "우호적인"
 giga_ndb.002.e:0 "취소"
 giga_ndb.003.desc:0 "어떤 국가를 목표로 설정 하시겠습니까?"
 giga_ndb.003.a:0 "선택 국가 없음 (빈 공간)"
 giga_ndb.004.desc:0 "해당 국가의 어떤 유형의 항성을 목표로 설정 하시겠습니까?"
 giga_ndb.005.desc:0 "특정 성계를 목표로 설정 하시겠습니까?"
 giga_ndb.006.desc:0 "성계 전체 또는 성계의 특정 행성을 목표로 설정 하시겠습니까?"
 giga_ndb.006.a:0 "성계를 목표"
 giga_ndb.006.cantnukeowncaptialsystem:0 "우리의 수도 성계를 목표로 할 수 없습니다."
 giga_ndb.system:0 "$name_ndb$은 워프 게이트를 통해 발사됩니다. 항성계 전체가 곧 대격변적인 에너지에 휩싸이고 항성의 중력 우물 내의 모든 것을 끝장낼 것입니다."
 giga_ndb.006.b:0 "행성을 목표"
 giga.ndb.novalidtargets:0 "해당 성계에는 유효한 목표가 없습니다."
 giga_ndb.007.desc:0 "이 시스템 내에서 어떤 행성을 목표로 하시겠습니까?"
 giga_ndb.008.desc:0 "이제 $name_ndb$을 우리가 지정한 목표에 발사할 준비가 되었습니다. 어느정도의 출력으로 발사할까요?\n\n§H$giga_ndb.008.a$§!\n$giga_ndb.008.a.tooltip$\n\n§H$giga_ndb.008.b$§!\n$giga_ndb.008.b.tooltip$\n\n§H$giga_ndb.008.c$§!\n$giga_ndb.008.c.tooltip$\n\n§H$giga_ndb.008.d$§!\n$giga_ndb.008.d.tooltip$"
 giga_ndb.008.a:0 "행성 파괴"
 giga_ndb.008.a.tooltip:0 "목표 행성을 산산조각 냅니다.\n거주지를 제거합니다.\n링 월드 구획을 폐허로 만듭니다.\n거대 가스 행성의 대기에 균열을 만듭니다.\n작업이 끝난 후 이곳은 10 £minerals£을 추가로 생산합니다."
 giga_ndb.008.b:0 "행성 표면 용해"
 giga_ndb.008.b.tooltip:0 "대상 행성의 표면이 녹아내려 용암 황무지가 됩니다.\n거주지는 파괴됩니다.\n링월드 구역이 파손됩니다.\n거주 가능한 가스 거대행성이 다시 적대적으로 변합니다."
 giga_ndb.008.c:0 "행성 소독"
 giga_ndb.008.c.tooltip:0 "목표 행성을 살균시켜 불모지로 만듭니다.\n거주지를 제거합니다.\n링 월드 구획을 폐허로 만듭니다.\n거대 가스 행성을 생명체가 살기 어려운 환경으로 변화시킵니다.\n테라포밍으로 과거의 환경으로 되돌릴 수 있습니다."
 giga_ndb.008.d:0 "기반시설 파괴"
 giga_ndb.008.d.tooltip:0 "목표 행성에 피해를 입혀 생명체가 살 수 없는 기후로 바꾸고, 황폐도를 100%로 만듭니다."
 nicoll_beam_0:0 "$gc_giga$$name_ndb$ 건설 현장"
 nicoll_beam_0_DESC:0 "$name_ndb$의 걸설 구역입니다. 이 거대 초강력 무기를 건설하는데 필요한 인프라를 수용하고 있습니다."
 nicoll_beam_0_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_gigastructure$ - $giga_list_category_weaponry$\n§YA형 항성§! 또는 §YB형 항성§!의 에너지를 사용해 §Y성계를 파괴하는§! 레이저에 동력을 공급합니다\n$giga_list_removes_system_planets$\n§L성계 전체를 날려버릴 수 있는 전대미문의 초강력 무기입니다.§!"
 nicoll_beam_0_CONSTRUCTION_INFO_DELAYED:0 "$giga_list_additional_data$ - §Y핵융합 억제기§!로 만든 §Y중성자별§!은 §Y니다벨리르 제련소§!에 적합하지만, §Y니콜-다이슨 광선§!으로 생성된 것은 그렇지 않습니다. §Y개별 행성§! 또는 §Y성계 전체§! 중 하나를 파괴하도록 설정할 수 있지만, 은하 전체가 §R분노§!할 것입니다."
 nicoll_beam_1:0 "$name_ndb$ 자기 수집기"
 nicoll_beam_1_DESC:0 "항성을 감싸고 있는 이 거대한 건축물은 특수 자기장을 이용해 항성의 에너지를 원하는 방향, 출력으로 제어합니다."
 nicoll_beam_2:0 "$name_ndb$ 항성 재지정기"
 nicoll_beam_2_DESC:0 "지금껏 은하계에 세워진 어떠한 건축물이라도 이 거대한 건축물 앞에서는 한없이 작아보일 것입니다. 이 건축물은 항성의 격변적인 에너지 출력을 저장하고 조작할 수 있습니다."
 nicoll_beam_3:0 "$name_ndb$ 초대규모 안정기"
 nicoll_beam_3_DESC:0 "항성 재지정기에서 건설된 링은 재지정기를 통해 흐르는 에너지를 안정화하여 사고로 거대 구조물이 폭발하는 것을 방지해줍니다."
 nicoll_beam_4:0 "$name_ndb$"
 nicoll_beam_4_DESC:0 "완성되어 운영되고 있는 $name_ndb$입니다. 항성의 에너지를 집중하여 초-에너지 빔을 통해 항성계 전체를 파괴할 수 있습니다."
 nicoll_beam_ready:0 "$nicoll_beam_4$"
 nicoll_beam_ready_DESC:0 "$nicoll_beam_4_DESC$"
 nicoll_beam_ready_MEGASTRUCTURE_DETAILS:0 "$nicoll_beam_4_DESC$"
 nicoll_beam_side_gate_closed:0 "웜홀 생성기"
 nicoll_beam_side_gate_open:0 "웜홀 생성기"
 nicoll_beam_targetting:0 "목표 선택"
 nicoll_beam_targetting_DESC:0 "$nicoll_beam_4_DESC$"
 nicoll_beam_cooldown:0 "$nicoll_beam_4$ (§R쿨다운§!)"
