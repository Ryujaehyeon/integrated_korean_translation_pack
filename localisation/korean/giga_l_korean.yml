 blokkat_inquietude_modifier:0 "블록캣 불안도"
 blokkat_inquietude_modifier_desc:0 "블록캣의 실존적인 위협 그 자체가 우리 문명에 엄청난 영향을 주고 있습니다."
 already_dealt_with_blokkat_inquietude:0 "우리는 §Y6 개월§!에 한 번씩만 §R블록캣 불안도§!에 영향을 줄 수 있습니다."
 blokkat_inquietude_tracker:0 "안정도: §R-[ROOT.blokkat_inquietude_stability_value]§! | 범죄: §R+[ROOT.blokkat_inquietude_happiness_value]%§!"
 blokkat_inquietude_tracker_2:0 "연구 생산량: §G+[ROOT.blokkat_inquietude_research_value]%§!"
 blokkat_research_projects_title:0 "§B블록캣 연구 프로젝트§!"
 blokkat_research_projects_desc:0 "§B연구 프로젝트§!는 비용이 크며, §Y블록캣§! 관련 §Y특별 프로젝트§!나 §Y기술§!를 완료하는 것입니다. 한 번에 §Y하나§!씩 할 수 있으며 앞으로 더 많이 나타날 것입니다."
 blokkat_tasks_desc:0 "§G블록캣 작업§!은 블록캣에 대한 다양한 연구 방식입니다. \"시작\"될 필요가 없는 일이며, $blokkat_knowledge$을 얻는 다양한 방법일 뿐입니다. 언제 어떤 것이든 순서 무관하게 할 수 있으며 완료 즉시 지식을 얻습니다."
 blokkat_inquietude_desc:0 "§R불안도§!는 §Y블록캣 위협§!에 대한 우리 문명의 공황 수준을 나타내며 우리 행성의 §Y안정도§!와 §Y범죄§!에 손해를 보는 대신 §Y연구 생산량§!이 증가합니다. 블록캣이 은하의 §Y1%§!를 흡수하거나 우리의 §Y행성§!이나 §Y팝§!이 §R수확§!될 때마다 §Y2%§!씩 상승합니다."
 blokkat_inquietude_counters:0 "§R블록캣 불안도§!"
 giga_blokkat.3000.upinquietude.tooltip:0 "우리 문명은 블록캣의 위협을 심각하게 모르고 있습니다. 우리는 우리 집단의 모든 계층이 블록캣의 파괴 능력을 완전히 알도록 해야합니다.\n\n이는 §R불안도§!를 §Y2%§! 상승시키지만 §Y연구§!는 더욱 효율적이게 될 것입니다.\n\n"
 giga_blokkat.3000.downinquietude.tooltip:0 "블록캣 위협은 극도로 과대평가되어 있습니다. 집단 공포로 완전히 붕괴되기 전에 우리 문명을 안심시키는 것은 매우 중요합니다.\n\n이는 §R불안도§!를 §Y2%§! 감소시키지만 §Y연구§!는 덜 효율적이게 될 것입니다.\n\n"
 mod_category_blokkats_research_speed_mult:0 "블록캣 연구 속도"
 suppressed_blokkat_inquietude:0 "억제된 블록캣 불안"
 suppressed_blokkat_inquietude_desc:0 "아 그래, 블록캣. 그 주장은 묵살해라."
 bolstered_blokkat_inquietude:0 "부추겨진 블록캣 불안"
 bolstered_blokkat_inquietude_desc:0 "블록캣은 웃음거리가 아니며 은하는 이를 알아야한다."
 blokkat_inquietude_too_high:0 "§R불안도§!가 더 이상 높아질 수 없습니다."
 blokkat_inquietude_too_low:0 "§R불안도§!가 더 이상 낮아질 수 없습니다."
 blokkat_requires_10_knowledge:0 "10 이상의 $blokkat_knowledge$을 가지고 있어야만 합니다."
 blokkat_requires_20_knowledge:0 "20 이상의 $blokkat_knowledge$을 가지고 있어야만 합니다."
 blokkat_requires_30_knowledge:0 "30 이상의 $blokkat_knowledge$을 가지고 있어야만 합니다."
 blokkat_requires_35_knowledge:0 "35 이상의 $blokkat_knowledge$을 가지고 있어야만 합니다."
 blokkat_requires_40_knowledge:0 "40 이상의 $blokkat_knowledge$을 가지고 있어야만 합니다."
 blokkat_requires_50_knowledge:0 "50 이상의 $blokkat_knowledge$을 가지고 있어야만 합니다."
 blokkat_knowledge_name:0 "§G블록캣 지식§!"
 blokkat_knowledge_desc:0 "§G블록캣 지식§!은 블록캣과 그들의 기술에 대한 우리의 복합적 지식의 총합입니다. 어떻게 해서든 블록캣에 대항할 방법을 찾고자 한다면, 가능한 한 많은 지식을 모을 필요가 있습니다."
 blokkat_scrap_name:0 "§M블록캣 고철§!"
 blokkat_scrap_desc:0 "§M블록캣 고철§!은 블록캣 기술의 파편입니다. §H일시적이고 강력하거나§! §H평범하지만 영구적인§! §Y연구§!와 블록캣 §Y피해량§! 버프를 얻는데 사용됩니다. 블록캣 부품의 §Y역설계§!에 고철을 사용하는 §B블록캣 연구 프로젝트§!도 있습니다."
 giga_blokkat.3000.scrapresearch:0 "§G연구 속도§! 상승 | £blokkat_scrap_icon£ §Y50§!"
 giga_blokkat.3000.scrapdamage:0 "§H블록캣에 대한 피해량§! 상승 | £blokkat_scrap_icon£ §Y50§!"
 giga_blokkat.3000.scrapresearchtemp:0 "§Y일시적§! §G연구 가속§! | £blokkat_scrap_icon£ §Y40§!"
 giga_blokkat.3000.scrapdamagetemp:0 "§Y일시적§! §H피해량 증대§! | £blokkat_scrap_icon£ §Y40§!"
