 requires_standard_planet_class_o_star:0 "$TRIGGER_FAIL$기본 유형의 항성 주위에 건설해야 합니다. O형 항성 주위에 건설하려면 이 거대 구조물에 적합한 §Y초단열§! 기술이 필요합니다."
 requires_dyson_swarm:0 "$TRIGGER_FAIL$§Y$dyson_swarm_3$§! 하나를 §Y$dyson_sphere_5$§!(으)로 업그레이드해야 합니다. 이 거대구조물은 O등급 항성 주위에만 건설할 수 있으며, §Y초단열§! 기술이 필요합니다."
 giga_tech_dyson_o_star:0 "다이슨 스피어 초단열"
 giga_tech_dyson_o_star_desc:0 "O형 항성은 은하에서 가장 밝고 가장 빛나는 별입니다. 이 괴물 주위에 다이슨 스피어를 조립하고자 한다면, 우리는 일반적인 다이슨 스피어보다 더 거대하고 더 잘 견디고, 이 유형의 항성이 발산하는 매우 굉장히 열을 버틸 수 있는 거대 구조물을 설계해야합니다."
 allow_o_class_dyson:0 "§H결정 잠금 해제:§! O형 다이슨 스피어"
 allow_o_class_dyson_desc:0 "O형 항성 주위에 다이슨 스피어를 건설할 수 있게 해줍니다. 이 항성 주위에 건설된 다이슨 스피어는 생산량 +500%, 유지비 +500%, 건설 비용 +450% 그리고 건설 시간 +350%를 가질 것입니다."
 giga_tech_lifter_o_star:0 "항성 제련소 초단열"
 giga_tech_lifter_o_star_desc:0 "O형 항성은 은하에서 가장 밝고 가장 빛나는 별입니다. 이 괴물 주위에 다이슨 스피어를 조립하고자 한다면, 우리는 일반적인 항성 제련소보다 더 거대하고 더 잘 견디고, 이 유형의 항성이 발산하는 매우 굉장히 열을 버틸 수 있는 거대 구조물을 설계해야합니다."
 allow_o_class_lifter:0 "§H결정 잠금 해제:§! O형 항성 제련소"
 allow_o_class_lifter_desc:0 "O형 항성 주위에 항성 제련소를 건설할 수 있게 해줍니다. 이 항성 주위에 건설된 항성 제련소는 생산량 +500%, 유지비 +500%, 건설 비용 +450% 그리고 건설 시간 +350%를 가질 것입니다."
 giga_tech_brain_o_star:0 "마트료시카 브레인 초단열"
 giga_tech_brain_o_star_desc:0 "O형 항성은 은하에서 가장 밝고 가장 빛나는 별입니다. 이 괴물 주위에 마트료시카 브레인을 조립하고자 한다면, 우리는 일반적인 마트료시카 브레인보다 더 거대하고 더 잘 견디고, 이 유형의 항성이 발산하는 매우 굉장히 열을 버틸 수 있는 거대 구조물을 설계해야합니다."
 allow_o_class_brain:0 "§H결정 잠금 해제:§! O형 마트료시카 브레인"
 allow_o_class_brain_desc:0 "O형 항성 주위에 마트료시카 브레인을 건설할 수 있게 해줍니다. 이 항성 주위에 건설된 마트료시카 브레인은 생산량 +500%, 유지비 +500%, 건설 비용 +450% 그리고 건설 시간 +350%를 가질 것입니다."
 giga_o_stars_disabled:0 "£menu_disabled£§YO형 항성§!\n밝게 빛나고 희귀한 O형 항성이 나타나지 않습니다.\n\n§B§YReal Space§!가 활성화되어있다면 항성 유형 중복을 방지하기 위해 기본으로 비활성화되어있습니다..§!"
 giga_o_stars_enabled:0 "£menu_enabled£§YO형 항성§!\n\n밝게 빛나고 희귀한 O형 항성이 나타나며, 갯수는 은하의 별 갯수를 대략 70으로 나눈것에 의해 결정됩니다.\n\n이 항성 주위에 건설된 거대 구조물은 다른 스케일링 옵션과 무관하게, 생산량 +500%, 유지비 +500%, 건설 비용 +450% 그리고 건설 시간 +350%를 가질 것입니다.\n\n이러한 항성 주위에 거대 구조물을 건설하려면 특별한 기술이 필요합니다.\n\n§B§YReal Space§!가 활성화되어있다면 항성 유형 중복을 방지하기 위해 기본으로 비활성화되어있습니다..§!"
 must_not_have_real_space:0 "§Y리얼 스페이스§!가 활성화된 경우 항성의 종류가 불필요하게 늘어나는 것을 막기 위해 꺼주시기 바랍니다."
 giga_o_star.2000.name:0 "엄청나게 거대한 O형 행성"
 giga_o_star.2000.desc:0 "현재 은하를 도표화 중인 탐사선이 놀라운 것을 발견했습니다. 함선은 §Y[from.GetName]§! 성계의 중심 항성이 다름아닌 거대한 §YO형 항성§!임을 보고했습니다!\n\n이 극히 밝고, 휘귀하며 청자색 빛깔의 별은 진정 거대하며, 주변 행성계를 말려버린지 오래입니다. 게다가, 항성의 굉장한 활동 때문에, 태양풍은 전체 성계에서 놀라울 정도로 눈에 띄는데, 즉 이 지역을 지나는 모든 함선에게 유해하다는 것입니다.\n\n그러나 이러한 종류의 별이 위험하면서 단명하지만, 그 주위에 건설된 모든 거대 구조물은 당연하게도 일반적인 B형 항성 주위에 건설된 것들보다 §Y극히 강력한§! 잠재력을 가지고 있습니다.\n\n우리 은하에 그러한 별은 몇 되지 않아서 굉장히 귀중하다는 것을 염두해 두어야합니다."
 giga_o_star.2000.a:0 "놀랍군!"
 giga_menu.200.name:0 "일시적으로 비활성화 된 기능"
 giga_menu.200.desc:0 "대충 사이오닉 비콘이 3.0에서 고장났고,\n\n플루션 저항 값 난수 생성은 고쳤다는 뜻.\n\n최선을 다했으나, 슬프게도 고치는 것이 극도로 어렵다는게 입증되었습니다.\n\n불편을 끼쳐드려 죄송합니다. 앞서 말씀드린 문제와는 상관 없이 모드를 즐겨주시기를 바랍니다!"
 giga_menu.200.a:0 "세상에 마상에!"
