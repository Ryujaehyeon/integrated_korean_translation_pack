 KATZEN_COUNTRY:0 "초군국주의 제국"
 KATZEN_COUNTRY_DESC:0 "캇첸아르티히 제국은 절대적인 통치자, 카이저 캇테일이 이끄는 군국주의와 확장주의를 기조로 하는 국가입니다. 이 국가는 매우 중앙집권적이며, 카이저는 국가 전체에 걸쳐 막강한 힘을 가지고 있습니다."
 trait_kaiser_cattail:0 "카이저"
 trait_kaiser_cattail_desc:0 "카타일은 뛰어난 전략가이자 카리스마 있는 리더로, 신비로운 과거를 지니고 있습니다."
