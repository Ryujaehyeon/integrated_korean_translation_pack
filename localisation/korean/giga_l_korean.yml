 giga_aeternum.3032.name:0 "에테르나이트 정보 심기 성공!"
 giga_aeternum.3032.desc:0 "에테르나이트가 우리는 위협이 되지 않는다고 확신하게 하기 위한 일련의 작전을 통해 우리는 그들의 재정비 작업을 성공적으로 막았습니다. 장거리 탐사를 통해 그들 제국의 중심부 내에서 약간 느려진 활동을 확인했습니다.\n\n이것은 그들의 각성을 대략 §Y[birch_aeternum.aeternum_intel_scramble_awake_delay_value]§! 년 지연할 것이라고 추정합니다."
 aeternum_chain_title:0 "에테르나이트"
 aeternum_chain_desc:0 "에테르눔은 우리를 아득히 넘어서는 기술과 무기를 가지고 있습니다. 우리는 이 선구자를 면밀히 감시해야합니다."
 aeternum_ship_count:0 "§Y에테르나이트 함선 숫자§!"
 aeternum_shroud_count:0 "§M에테르눔에 의해 싸여진 세계들§!"
 aeternum_system_count:0 "§Y에테르나이트 성계 숫자§!"
 aeternum_warforge_count:0 "§Y에테르나이트 사이코 물질생성기 숫자§!"
 ships_lost_to_aeternum:0 "§R에테르눔에게 파괴된 함선§!"
 aeternum_ships_lost:0 "§G파괴된 에테르나이트 함선§!"
 aeternum_chain_1:0 "에테르나이트 확장"
 aeternum_chain_1_desc:0 "§Y에테르눔§!이 일단 각성하면, 그들은 §M장막 행성§! 주위에 주기적으로 더 많은 함대를 생산하는 §Y에테르나이트 사이코 물질생성기§!를 건설할 것입니다.\n또한 그들은 §R거대 병기§!를 사용할 것이며 거주 가능 행성을 장막 행성으로 바꾸기 위해 폭격할 것입니다.\n그들은 완전히 끝장내려면, 우리는 그들의 수도인 §Y아이온디아§! 버치 월드를 지상군으로 함락해야하며, 이는 제국의 완전한 붕괴로 이어질 것입니다.\n우리는  $aeternum_tech_intel$를 모아 그들의 함선에 가하는 피해량을 증가시키킬 수 있습니다."
 giga_aeternum.3002.name:0 "필연 지연"
 giga_aeternum.3002.desc:0 "에테르눔에 대한 추가적인 연구에 따라, 우리 과학자들 중 몇몇은 에테르눔의 선구자 기반 시설과 통신망에 심한 결함이 있을것이라 생각합니다. 에테르나이트는 이러한 결함을 못보고 있거나,  젊은 종족들이 이를 이용하기에는 스스로가 너무 진보되었다 생각하고있는게 분명합니다.\n\n그러나 대부분의 몰락한 제국처럼, 그들의 오만은 그들의 몰락으로 이어질 것이며, 충분한 자원이 있으면 우리는 이러한 결함을 정확히 찾아내어 이를 이용할 수 있을 것입니다. 이는 에테르나이트의 각성을 지연시키고 결국 그들이 궁극적으로 은하계에 복귀하기까지의 귀중한 시간을 벌어줄 것입니다.\n\n우리는 §Y에테르나이트 감시 화면§!에서 이러한 결함에 대해 과학자들이 가지고 있는 다양한 단서들을 볼 수 있습니다."
 giga_aeternum.3002.a:0 "알겠다. 그럼 진행하지."
 giga_aeternum.4002.name:0 "각성"
 giga_aeternum.4002.desc:0 "이 은하의 존재들이여.\n\n에테르나이트가 은하계의 유일한 지배자라는 자리를 되찾을 때가 왔다.\n\n우리가 받아들일 유일한 평화는 너희들의 완전하고 무조건적인 파괴이다.\n\n우리를 늦추거나 우리와 협상하려는 헛된 시도는 하지 말며, 너희에게 붙잡힌 대중은 우리와 함께 아이온디아에서 정착할 수도 있다."
 giga_aeternum.4002.a:0 "늙어빠진 멍청이들! 조만간 끝장내주마..."
 giga_aeternum.4002.purifier:0 "자만하는 외계인 놈이군."
 giga_aeternum.4002.swarm:0 "나대는 먹잇감이군."
 giga_aeternum.4002.terminator:0 "너희는 말살될 것이다."
 giga_aeternum.4004.name:0 "에테르나이트의 수복 전쟁"
 giga_aeternum.4004.desc:0 "그리하여, 우리가 얼마나 준비되었든 간에, 에테르눔과 그들의 함대가 우리에게 나타났습니다. 이제 우리의 방어선과 함대가 다가오는 폭풍에 버틸 준비가 되었기를 바랄 뿐입니다.\n\n다행히도, 우리의 §Y에테르나이트 정보국§!은 우리가 충분한 $aeternum_tech_intel$를 가지고 있다면, 에테르나이트 함선과 기술을 역설계해 사용할 수 있으리라 생각합니다.\n\n이는 말도 안되는 비용이 들고 꽤나 위험하겠지만, 이를 통해 얻는 이익은 명백합니다. 그 동안에, 우리는 에테르나이트 함대에 대한 우리의 전투 능력을 개선하기 위해, 가능한 한 많은 정보를 모으기 위해 노력해야하며 전세를 뒤집을 수 있기를 바래야합니다.\n\n§R(주의사항: 아이온디아에 콜로서스를 사용하지 마세요. 이는 위기를 망가트릴 것입니다! 호환성 문제 때문에, 해결하기 어렵습니다.)§!"
 giga_aeternum.4004.a:0 "알겠다. 쓴맛을 보여주지!"
 giga_aeternum.4000.a.tooltip:0 "§B에테르나이트 정보국에서 새로운 작전이 가능합니다.§!"
 aet_intel_1:0 "에테르나이트 기술 정보"
 aet_intel_1_desc:0 "에테르나이트 기술에 대한 우리의 지식은 그들에 대한 전투 능력을 강화시킵니다."
