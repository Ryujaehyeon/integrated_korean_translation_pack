 giga_blokkats_canon:0 "블록캣 생김새: §G평범한 플록캣§!\n블록캣이 이름에 맞게 가장 \"캐논\"적인 모습을 가집니다. 초상화는 3D이고 움직이며 TTFTCUTS가 만들었습니다. 이를 기본으로 할지에 대해 디스코드에서 투표를 했습니다.\n이런 모습이 싫다면 §E스텔라리스 블록캣§!으로 바꾸거나 §YGigastructural Engineering - Stellaris Blokkats§! 서브모드를 받아 그 모습을 기본으로 설정할 수 있습니다.\n\n\n\n\n£blokkat_canon£\n\n\n\n\n\n\n§Y눌러서 §E스텔라리스 블록캣§!으로 바꾸기§!"
