 kaiser_moon_sternthrusters_01_key:0 "카이저 추진기"
 building_giga_siegfried_global_bunker:0 "지크프리트 중앙 사령부"
 building_giga_siegfried_global_bunker_desc:0 "광대한 강화 벙커 지역으로 캇첸 지크프리트 행성의 행정 중심이 이곳에 존재합니다."
 pc_giga_siegfried_world:0 "지크프리트 행성"
 pc_giga_siegfried_world_desc:0 "캇첸이 설계한 요새 행성인 지크프리트 행성은 캇첸아르티히 제국의 심장을 향하는 적들의 발목을 잡기 위한 곳입니다. 이 강력한 요새가 적군에게 장악당하면 완전히 폭파되도록 설계되었고, 이에 따라 이곳에서는 가장 애국심 넘치고 헌신적인 캇첸들만이 일하고 있습니다."
 building_katzen_foundry:0 "캇첸 거대 주조소"
 building_katzen_foundry_desc:0 "캇첸 거대 주조소는 대량의 합금을 생산하지만, 행성의 기후에 안좋은 영향을 미친다는 부작용이 있습니다."
 building_katzen_theater:0 "캇첸 오락 단지"
 building_katzen_theater_desc:0 "시민들에게 캇첸의 승인을 받은 전쟁 및 군국주의 대중 매체를 제공하는 거대 단지입니다."
 building_katzen_science:0 "캇첸 연구 센터"
 building_katzen_science_desc:0 "(\"은하계에서 최고\"라 보고된) 캇첸 과학을 한계 너머의 것으로 밀어붙이기 위한 연구원들이 쉬지않고 일하는 거대 시설입니다. 그러나 내부에서 진행되는 실험의 본질은 다소... 보수적입니다, 가끔씩은요."
 katzenartig_chain_3:0 "캇첸 경제 상태"
 katzenartig_chain_3_desc:0 "§PKatzen Resources§!는 Katzens가 사용하는 §YAlloys§!, §YMinerals§!, §YEnergy§!, 및 §YConsumer Goods§!의 혼합체를 나타냅니다. 이들은 새로운 함선을 건조하고 그들의 §YWarforges§!에 연료를 공급하는 데 필요합니다.\n\n월간 일반 자원과 월간 §PKatzen Resources§! 간의 전환 비율은 다음과 같습니다:\n§Y50§! £energy£ = §Y1§! §PKatzen Resource§!\n§Y20§! £minerals£ = §Y1§! §PKatzen Resource§!\n§Y1§! £alloys£ = §Y1§! §PKatzen Resource§! \n§Y5§! £consumer_goods£ = §Y1§! §PKatzen Resource§! \n§Y5§! £rare_crystals£/£volatile_motes£/£exotic_gases£ = §Y1§! §PKatzen Resource§!\n\n현재 §GIncome§!: §Y[flusion_primitives_country.kaiser_resource_income]§! §PKatzen Resources§!\n현재 §RSpending§!: §Y[flusion_primitives_country.kaiser_resource_spending]§! §PKatzen Resources§!\n\n현재 §HBalance§!: §Y[flusion_primitives_country.kaiser_resource_balance]§! §PKatzen Resources§!\n현재 §BStockpile§!: §Y[flusion_primitives_country.kaiser_resource_stockpile]§! §PKatzen Resources§!"
 katzenartig_chain_4:0 "캇첸 연구력"
 katzenartig_chain_4_desc:0 "§B캇첸 연구 생산량§!은 캇첸들이 매달 만들어내고 있는 기술적 진보의 양을 나타냅니다.\n\n§G캇첸 기술 수준§!은 캇첸이 얼마나 진보했는지를 나타내며, 각 수준마다 §Y선체§!와 §Y장갑§!, §Y보호막§! §Y내구도§!는 §Y[flusion_primitives_country.cdk_kaiser_other_buff_desc]%§!, §Y함선 발사 속도§!와 §Y무기 피해량§!은 §Y[flusion_primitives_country.cdk_kaiser_weapon_buff_desc]%§!, §Y지상군 피해량§!과 §Y지상군 체력§!은 §Y[flusion_primitives_country.cdk_kaiser_other_buff_desc]%§!, §Y거대 구조물 건설 속도§!는 §Y[flusion_primitives_country.cdk_kaiser_other_buff_desc]%§! 상승합니다.\n\n현재 월간 §B캇첸 연구§!: §Y[flusion_primitives_country.kaiser_tech_income]§!\n다음 §G캇첸 기술 수준§!으로의 진척도: §Y[flusion_primitives_country.kaiser_tech_stockpile]§!/§Y[flusion_primitives_country.kaiser_tech_to_next_level]§!\n\n현재 §G캇첸 기술 수준§!: §Y[flusion_primitives_country.kaiser_tech_level]§!\n§H함선 선체§!/§H장갑§!/§H보호막§! 상승량: §Y[flusion_primitives_country.kaiser_tech_ship_hp_buff]%§!\n§H무기 피해량§! & §H함선 연사 속도§! 상승량: §Y[flusion_primitives_country.kaiser_tech_damage_buff]%§!\n§H지상군 피해량§! & §H지상군 체력§! 상승량: §Y[flusion_primitives_country.kaiser_tech_army_buff]%§!\n§H거대 구조물 건설 속도§! 상승량: §Y[flusion_primitives_country.kaiser_tech_mega_speed_buff]%§!"
 katzen_economy_modifier:0 "캇첸 경제 구조"
 katzen_economy_modifier_desc:0 "중요한 것은 연구와 합금이다."
 col_katzen_capital:0 "캇첸 제국 수도"
 col_katzen_capital_desc:0 "플러션은 캇첸아르티히 제국의 살아있는 심장이며, 주민들과 카이저는 이곳을 실제로 신성한 행성이라 여깁니다."
 col_katzen_foundry:0 "캇첸 주조 행성"
 col_katzen_foundry_desc:0 "캇첸은 이 행성을 합금 생산에 집중하도록 했습니다."
 col_katzen_research:0 "캇첸 연구 행성"
 col_katzen_research_desc:0 "캇첸은 이 행성을 과학적 기반의 발전에 집중하도록 했습니다."
 col_katzen_fortress:0 "캇첸 요새 행성"
 col_katzen_fortress_desc:0 "캇첸은 이 행성을 뚫을 수 없는 요새가 되도록 했습니다."
 pc_flusion_gaia_ecu:0 "플러션-아콜로지"
 pc_flusion_gaia_ecu_desc:0 "플러션-아콜로지는 플러션의 방대한 천연 자원을 완전히 이용해 행성의 효율성을 끝까지 뽑아냅니다. 캐타운과 분덴가르드, 테호의 도시는 어마어마한 규모로 확장되었고, 각각 수백억의 주민들을 수용합니다. 도시 바깥 부분은 완벽한 생태계로 바뀌었고, 현재는 플러션에 원래 살고있던 모든 종족들에 맞는 다양한 기후를 구현합니다."
 katzen_rebel_got_support:0 "외국의 지원"
 katzen_rebel_got_support_desc:0 "이 반란 국가는 카이저와의 투쟁에서 외계 제국의 지원을 받고 있습니다."
 katzen_agri_crisis_starvation:0 "캇첸 농업공황"
 katzen_agri_crisis_starvation_desc:0 "카이저가 캇첸아르티히 제국의 다른 행성들로부터 식량을 끌어와 플러션에게 먹이고 있습니다. 변두리 행성에 피해가 갈 정도입니다."
 giga_flusionoperations.506.name:0 "캇첸아르티히 제국의 농업공황!"
 giga_flusionoperations.506.desc:0 "§Y솔라크트로파§!와 §Y캣틀란트로파§! 프로젝트를 방해한 결과 §Y플러션§!의 농업이 혼란에 빠졌습니다.\n\n두 개의 지반공학이 급작스럽게 중지됨으로 인해 기후가 큰 영향을 받았고, 캇첸 수도는 더 이상 자급자족할 수가 없습니다. 이곳의 기근을 막기 위해, §Y카이저§!는 식량 생산에 관한 플러션의 역할을 뒤바꾸었고, 현재 플러션은 곡창지대로서 제국 전체에 식량을 보급하는 대신 대량의 식량을 수입해오고 있습니다. 이는 다른 캇첸 식민지에 피해를 줄 수도 있는 수준입니다.\n\n이는 제국 내에서 큰 §Y농업공황§!을 일으켰습니다. 플러션이 국가의 식량을 거의 다 독차지하고 있기에 변두리의 전초 기지가 더 이상 먹고 살 수가 없기 때문입니다.\n\n그리하여, §Y캇첸아르티히 제국§!내의 다른 지역에서 독립주의자들이 힘을 키우기 시작했고, 정치 분석가들은 카이저가 도외시된 지역의 문제를 해결하지 못한다면 독립 선언에 이르게 될지로 모른다고 예상합니다.\n\n이 혼돈의 시기는 §Y1 년§! 이상 이어질 것으로 예상되는데, 이 동안 카이저 제국의 일부가 그의 통치에 대항해 반기를 들게 될지도 모릅니다."
 giga_flusionoperations.506.a:0 "플러션 중심주의란게 좀 그렇지?"
 giga_flusionoperations.506.a.tooltip:0 "다음 8 달 동안 §Y캇첸아르티히 제국§!의 지역 몇 곳이 도망칠지도 모릅니다."
 giga_flusionoperations.505.name:0 "캇첸 식민지의 반란!"
 giga_flusionoperations.505.desc:0 "현재 §Y캇첸아르티히 제국§!을 괴롭히는 §Y농업공황§! 때문에 §Y[giga_katzen_agri_crisis_planet.GetName]§!의 캇첸 식민지가 카이저의 통치에 대항해 반란을 일으켰으며 플러션으로부터 완전한 독립을 선언하며 주권국가인 §Y[giga_katzen_agri_crisis_country.GetName]§!(을)를 건국했다는 소식이 들려왔습니다.\n\n카이저는 이 새로운 국가에 대해 공개적인 적대감을 선언했으며, 몇 달 내에 그 행성을 탈환하려는 듯 합니다."
 giga_flusionoperations.505.a:0 "생존을 위한 투쟁"
 giga_flusionoperations.505.b:0 "약간의 지원을 보내라. | £energy£ §Y750§! & £alloys£ §Y200§!"
 giga_flusionoperations.505.c:0 "지원을 보내라. | £energy£ §Y1500§! & £alloys£ §Y400§!"
 giga_flusionoperations.505.d:0 "많은 지원을 보내라! | £energy£ §Y2500§! & £alloys£ §Y800§!"
 giga_flusionoperations.4000.name:0 "§Y캣틀란트로파 댐§! 폭파시키기"
 giga_flusionoperations.4000.desc:0 "§Y캣틀란트로파 댐§!은 §Y캣술라§!와 §Y폴가§! 강에 지어진 한 쌍의 댐입니다. 방향이 바뀐 물은 새로운 인공 호수를 만드는데 사용되었고, 과거 사막이었던 지역에 물을 대 농업이 가능하게 만들었습니다.\n\n우리의 요원이 양쪽 댐의 내부에 작은 탄두를 폭파시켜, 프로젝트 전체를 방해하고 플러션의 농업 생산에 큰 영향을 줄 것입니다.\n\n§Y성공 시§!:\n§Y플러션§!과 §Y캇첸§!의 농업과 공급망에 영향을 받아 §Y함선 내구도§!와 §Y함선 연사 속도§!가 감소합니다.\n캇첸의 경계가 §R3§! §R상승§!합니다.\n§Y뤼우인슈타트§!와 §Y게슈볼른§!의 저항이 §Y1§! 감소합니다\n\n§Y실패 시§!:\n캇첸의 경계가 §R1§! §R상승§!합니다.\n\n§Y성공 확률§!:\n기본: §Y70%§!\n§H캇첸의 경계§!: §R-[flusion_primitives_country.katzen_wary_perc]%§!\n§R높은 위험성§!: §R-30%§!\n§B전국적 게릴라 활동§!: §G+[flusion_primitives_country.flusion_total_res_perc]%§!\n§B메르쿠르의 게릴라§!: §G+[flusion_primitives_country.mercuria_res_perc]%§!\n총계: §Y[flusion_primitives_country.flusion_success_chance_total]%§!"
 giga_flusionoperations.4001.name:0 "§Y캣틀란트로파 댐§! 폭파됨"
 giga_flusionoperations.4001.desc:0 "§Y캣술라§!와 §Y폴가§! 강의 쌍둥이 댐을 노린 일련의 사보타주에 이어, 우리의 솔라키아 동맹은 우호적인 크롱크와 인자이트 게릴라가 그 댐을 파괴했다고 보고했습니다.\n\n이제 두 개의 강이 흘러 캣스피안 바다를 다시 천천히 채울 것입니다. 이는 분명 국지적 테라포밍 작업을 역행시킬 것이며, 인접 지역에서의 캇첸 농업이 붕괴될 것입니다.\n\n그러나 이 작전으로 인해 해안 지역은 범람하고, 캇첸 농업의 붕괴로 플러션의 가난한 지역은 기근에 시달리게 될 것이기 때문에, 캣스피안 바다 근처에 살고있던 주민들은 이러한 행동에 반감을 품었습니다.\n\n플러션의 총독이자 프로젝트의 지지자인 §Y로리스 폰 캇텐스바흐§!은 큰 실망과 분노를 보였다고 보고되었으며, 이러한 행동에 책임이 있는 게릴라를 모욕하고 그들에 대한 복수를 맹세하는 열띤 연설을 내뱉었습니다.\n\n성공 확률은 §Y[flusion_primitives_country.flusion_operation_odds]%§!이었습니다."
 giga_flusionoperations.4001.a:0 "결국에는 가치있는 일이 될 것이다."
 giga_flusionoperations.4001.a.tooltip:0 "캇첸의 경계가 §R3§! §R증가§!합니다.\n§Y게슈볼른§!과 §Y뤼우인슈타트§!의 저항이 §Y1§! 감소합니다."
 giga_flusionoperations.4002.name:0 "댐 폭파 작전 실패"
 giga_flusionoperations.4002.desc:0 "우리의 솔라키아 동맹의 보고에 따르면, 캇첸이 §Y캣틀란트로파§! 댐에 내부와 주변에 설치된 작은 탄두를 발견해 제거했다고 합니다. 댐에 침투했던 요원은 체포되었고 캇첸 국가에 대한 반역죄로 처형되었습니다.\n\n이로 인해, 캇첸은 몇 주 내로 댐 주변의 보안을 강화할 것이며, §Y캇첸의 경계§!가 상승할 것입니다.\n\n§Y로리스 폰 캇텐스바흐§!는 \"위대한 캇첸 공학을 사보타주\"하려던 이 게릴라들은 \"겁쟁이\"이자 \"얼간이\"라고 맹렬히 비난했습니다.\n\n성공 확률은 §Y[flusion_primitives_country.flusion_operation_odds]%§!였습니다."
 giga_flusionoperations.4002.a:0 "안타깝군."
 giga_flusionoperations.4002.a.tooltip:0 "캇첸의 경계가 §R1§! §R증가§!합니다."
 katlantropa_economic_crisis:0 "캣틀란트로파 경제 혼란"
 katlantropa_economic_crisis_desc:0 "캣틀란트로파로 인한 농업 손실이 캇첸의 공급망에 큰 영향을 끼치고 있습니다."
 giga_blow_loris_dam_desc:0 "\n§H위험도§! - §R높음§!\n§H위치§! - §B쥐트크롱크 행정 지역의 캣술라 & 폴가 강§!\n\n임무 요구사항:\n§R게슈볼른에서의 격렬한 게릴라 활동§!\n§H뤼우인슈타트에서의 상당한 게릴라 활동§!\n\n§L총독이자 환경 공학자인 §Y로리스 폰 캇텐스바흐§!의 아이디어인 §Y캣틀란트로파§!는 여러개의 강의 (특히 §Y캣술라§!와 §Y폴가§!의) 방향을 바꾸고자하는 대규모 관개 프로젝트입니다. 플러션의 사막 지역에 관개하고 이 지역을 농지로 바꾸기 위한 거대한 댐을 통해서 말입니다.\n\n또한 §Y캣스피안 바다§!의 해수면을 낮추는 결과 또한 기대됩니다. 이는 결국 캇첸에게 플러션 산업을 확장시킬 공간을 주는 것이고, 증발된 물은 기상 조작을 통해 강수가 필요한 플러션 지역에 내려질 것입니다.\n\n이는 솔라크트로파 이전의 첫 번째 캇첸 배수 프로젝트로, 로리스가 지시하고 제안했습니다. 또한 이 프로젝트는 이 프로젝트로 만들어지는 광대한 소금 평야를 이용해 과거 크롱크와 인자이트 국가의 산업을 발전시키는데 도움이 될 것입니다.§!\n\n§B필수는 아니지만, §Y메르쿠르§!의 저항이 높다면 게릴라들이 추가 탄두를 밀수할 수 있을 테니 성공확률이 높아질 것입니다.§!\n\n§B§Y솔라크트로파§!와 §Y캣틀란트로파§! 댐 모두를 파괴하는 것은 제국에 §G농업 공황§!을 일으킬 것이며, 이로 인해 변두리 행성이 카이저의 통치에 대항해 반란을 일으킬지도 모릅니다!§!\n\n§H댐을 파괴하면 §Y캣스피안 바다§!의 수면이 천천이 높아질 것이며, §Y게슈볼른§!과 §Y뤼우인슈타트§!의 기후와 해안에 악영향을 미칠 것입니다. 그 지역의 주민들은 이를 원하지 않을 것이므로, 그 지역의 저항이 §R1§! §R감소§!할 것입니다.§!"
 giga_blow_loris_dam_no:0 "§Y캣틀란트로파 댐 폭파§!\n\n§H상태§! - §R불가능§!$giga_blow_loris_dam_desc$"
 giga_blow_loris_dam_yes:0 "§Y캣틀란트로파 댐 폭파§!\n\n§H상태§! - §G가능§!$giga_blow_loris_dam_desc$"
 giga_blow_loris_dam_done:0 "§Y캣틀란트로파 댐 폭파§!\n\n§H상태§! - §B완료§!$giga_blow_loris_dam_desc$"
 giga_flusionoperations.503.name:0 "소냐 소울이 변절하다"
 giga_flusionoperations.503.desc:0 "최근 §Y솔라키아§!에 대한 적대행위로 인해, §Y소냐 소울§!이 우리 제국에서 변절했습니다. 아마 그녀의 아버지와 함께하기로 결정한 듯 합니다."
 giga_flusionoperations.503.a:0 "놀랍지는 않군."
 giga_flusionoperations.503.a.tooltip:0 "§Y솔라키아§!가 독립국가로서 존재한다면, §Y소냐 소울§!은 그들의 장군이 될 것입니다."
 giga_flusionoperations.500.name:0 "도푸스 테크닉 마키나"
 giga_flusionoperations.500.desc:0 "이... 이 미친놈들!\n\n너희가 날려버렸어!!\n\n그건... 카이저를 그렇게 끝내서는 안됐다고!! 적어고 카이저가 행성을 날려버리지는 않았을거나, 이 정신병자들아!!\n\n너희를 믿었는데! 너희를 도왔는데! 되갚아주겠다!!!"
 giga_flusionoperations.500.a:0 "그냥 행성일 뿐이야, 잊어버려."
 giga_flusionoperations.500.a.response:0 "..."
 giga_flusionoperations.501.name:0 "분노한 캇첸 분열 국가"
 giga_flusionoperations.501.desc:0 "우리 손으로 파괴된 플러션에 대한 소식은 캇첸아르티히 제국의 붕괴 이후 나타난 수많은 분열 국가들에게 알려졌습니다.\n\n놀랍지는 않지만, 자신의 소중한 고향이 파괴되었다는 점은 그들의 지도자와 국민들에게 잘 받아들여지지는 않았습니다. 그리고 우리가 그들의 정부로부터 받은 적대적 언사를 생각해보면, 이 승계국들과 유익한 외교적 관계를 맺기는 힘들 것 같습니다."
 giga_flusionoperations.501.a:0 "그래서 어쩔텐가?"
 opinion_splinter_state_destroyed_flusion:0 "파괴된 플러션"
 opinion_major_splinter_state_destroyed_flusion:0 "파괴된 플러션"
 opinion_solakia_splinter_state_destroyed_flusion:0 "파괴된 플러션"
 giga_flusionoperations.502.name:0 "연합 플러션 전선"
 giga_flusionoperations.502.desc:0 "§Y플러션§!의 파괴에 이어, §Y캇첸아르티히 제국§!으로부터 나타난 주요한 분열 국가들이 우리가 카이저보다 더한 위협일지도 모른다고 걱정하고 있습니다.\n\n이에 따라, 이전 플러션에 영토가 있었던 §Y솔라키아 공화국§!과 §Y라우란다르§!, §Y크롱크 왕국§!의 국가들이 §Y연합 플러션 전선§!을 선포했습니다. 모든 플러션의 난민들과 종족의 안전을 위한 초국가적 동맹입니다.\n\n동맹의 대륙 국가의 지도자들인 §Y도푸스 테크닉 마키나§!와 §Y아론 N. 블루§!, §Y볼프강§!은 연방의 형성에 뒤이어 공동 선언을 했습니다.\n\n§L\"우리는 과거 카이저의 통치가 끝나면 플러션의 고통도 끝나리라 믿었습니다. 하지만, [player_country_cracked_flusion.GetName]의 공격과 배신은 이러한 믿음이 실수였음을 보여주었습니다. 우리 조상의 고향 행성을 파괴한 그들을 그냥 지나칠 수 없으며, 따라서 UFF는 그들이 플러션 국가의 중대사를 더는 방해하지 않고, 카이저보다 더 거대한 위협이 되지 않도록할 것입니다.\"§!"
 giga_flusionoperations.502.a:0 "멍청이들!"
 giga_flusionoperations.502.a.tooltip:0 "§Y솔라키아 공화국§!과 §Y라우란다르§!, §Y크롱크 왕국§!이 §Y연합 플러션 전선§!에 가입했습니다."
 trait_sonya:0 "도푸스의 작은 기적"
 trait_sonya_desc:0 "소냐는 도푸스가 자신의 딸을 되살리고자 만든 주문제작형 소울봇입니다. 그녀의 셰시는 놀랄만큼 많은 무기로 채워져 있으며, 그녀 자체만으로도 유능하고 카리스마있는 리더입니다. 특히 캇첸과 맞서 싸울 때 말입니다.\n\n§R우리가 솔라키아에 적대적 행성을 한다면 소냐는 변절할 것입니다!§!"
 needs_5_solak_res:0 "§B저항 자원§!이 최소 5만큼 필요합니다."
 needs_6_solak_res:0 "§B저항 자원§!이 최소 6만큼 필요합니다."
 needs_10_solak_res:0 "필요 자원 뿐만 아니라, §B저항 자원§! 10이 필요하고 우리의 고향 행성에 §B리지거 캇첸 판처§!가 3부대 있어야 합니다."
 giga_flusionoperations.3001.name:0 "§Y솔라크트로파 댐§! 폭파됨"
 giga_flusionoperations.3001.desc:0 "마지막 탄두가 설치되자, 이 대규모 작전에 자신들을 희생하고자 받아들인 게릴라들이 마지막 숨을 마시고 버튼을 눌렀습니다.\n\n여러 개의 핵폭탄이 수km 크기의 댐을 집어 삼키는데 몇 초 걸리지 않았습니다. 댐은 완전히 붕괴했고, 폭발 이후 플러션 사상 최악의 해일이 이어졌습니다.\n\n논 앞에 있는 모든 것을 집어삼키고 댐 주위에 건설된 시설과 반경 100km 내의 배가 파괴되었습니다. 수 시간 뒤, 파도가 솔라카레아 바다의 바싹 마른 해안을 강타했습니다. 댐의 완성과 함께 건설된 수많은 공장과 거주지가 파괴되었고, 해일은 바다가 원래 있던 곳보다 더 깊게 들어와 솔라키아와 라브카니아의 도시를 덮쳤습니다.\n\n앞으로 수 년간 캇첸의 산업은 댐의 전력을 사용할 수 없을 것이고, 그들의 농업은 더 이상 솔라카레아 바다에서 증발한 물을 이용해 카이저가 만든 광대한 농지에 물을 댈 수 없을 것입니다.\n\n그러나 솔라키아와 라브카이아의 원주민들은 자신의 고향이 입은 피해에 만족하지는 않을 것입니다. 도푸스는 후회를 표했지만, 시간이 지나면 은하계 전체가 우리에게 고마워할 것이라고 했습니다.\n\n송공 확률은 §Y[flusion_primitives_country.flusion_operation_odds]%§!였습니다."
 giga_flusionoperations.3001.nuked.desc:0 "마지막 탄두가 설치되자, 이 대규모 작전에 자신들을 희생하고자 받아들인 게릴라들이 마지막 숨을 마시고 버튼을 눌렀습니다.\n\n여러 개의 핵폭탄이 수km 크기의 댐을 집어 삼키는데 몇 초 걸리지 않았습니다. 댐은 완전히 붕괴했고, 폭발 이후 플러션 사상 최악의 해일이 이어졌습니다.\n\n논 앞에 있는 모든 것을 집어삼키고 댐 주위에 건설된 시설과 반경 100km 내의 배가 파괴되었습니다. 수 시간 뒤, 파도가 솔라카레아 바다의 바싹 마른 해안을 강타했습니다. 댐의 완성과 함께 건설된 수많은 공장과 거주지가 파괴되었고, 해일은 바다가 원래 있던 곳보다 더 깊게 들어와 솔라키아와 라브카니아의 도시를 덮쳤습니다.\n\n앞으로 수 년간 캇첸의 산업은 댐의 전력을 사용할 수 없을 것이고, 그들의 농업은 더 이상 솔라카레아 바다에서 증발한 물을 이용해 카이저가 만든 광대한 농지에 물을 댈 수 없을 것입니다.\n\n그러나 솔라키아와 라브카이아의 원주민들은 자신의 고향이 입은 피해에 만족하지는 않을 것입니다. 특히나 핵탄두의 광범위한 사용이 바다와 주변을 오염시킬 것임을 고려했을 때 말입니다. 도푸스는 후회를 표했지만, 시간이 지나면 은하계 전체가 우리에게 고마워할 것이라고 했습니다.\n\n송공 확률은 §Y[flusion_primitives_country.flusion_operation_odds]%§!였습니다."
 giga_flusionoperations.3001.a:0 "대의를 위한 것이다..."
 giga_flusionoperations.3001.a.tooltip:0 "캇첸의 경계가 §R3§! §R증가§!합니다.\n§Y솔라키아§!와 §Y라브카이아§!의 저항이 §Y2§! 감소합니다."
 giga_flusionoperations.3001.b:0 "대의를 위한 것이다..."
 giga_flusionoperations.3001.b.tooltip:0 "캇첸의 경계가 §R3§! §R증가§!합니다.\n§Y솔라키아§!와 §Y라브카니아§!의 저항이 §Y3§! 감소합니다."
 solaktropa_economic_crisis:0 "솔라크트로파 경제 혼란"
 solaktropa_economic_crisis_desc:0 "솔라크트로파 댐의 파괴는 캇첸에게 치명적입니다."
 giga_flusionoperations.3002.name:0 "댐 폭파 작전 실패"
 giga_flusionoperations.3002.desc:0 "우리의 솔라키아 동맹의 보고에 따르면, 캇첸이 §Y솔라크트로파 댐§!에 내부와 주변에 설치된 작은 탄두를 발견해 제거했다고 합니다. 댐에 침투했던 요원은 체포되었고 캇첸 국가에 대한 반역죄로 처형되었습니다.\n\n이로 인해, 캇첸은 몇 주 내로 보안을 강화할 것이며, §Y캇첸의 경계§!가 상승할 것입니다."
 giga_flusionoperations.3002.a:0 "안타깝군."
 giga_flusionoperations.3002.a.tooltip:0 "캇첸의 경계가 §R1§! §R증가§!합니다."
 giga_flusionoperations.3000.name:0 "§Y솔라크트로파 댐§! 폭파시키기"
 giga_flusionoperations.3000.desc:0 "§Y솔라크트로파 댐§!은 솔라카레아 바다의 해수면을 낮추고자하는 야심찬 프로젝트입니다. 이는 농업을 위한 대량의 물과 산업에 필요한 공간을 제공할 것이고, 가장 중요한 플러션의 에너지를 공급할 것입니다.\n\n댐을 파괴하는 것은 분명 플러션의 경제에 큰 영향을 주겠지만, 행성에 기후학적 문제가 생길지도 모릅니다.\n\n§Y성공 시§!:\n§Y플러션§!과 §Y캇첸§!의 댐의 에너지를 잃고, 농업에 영향을 받아 §Y함선 속도도§!와 §Y함선 무기 사정거리§!가 감소합니다.\n캇첸의 경계가 §R3§! §R상승§!합니다.\n§Y솔라키아§!와 §Y라브카니아§!의 저항이 §Y2§! 감소합니다 (§Y추가 탄두§!가 사용된다면 §Y3§! 감소합니다)\n\n§Y실패 시§!:\n캇첸의 경계가 §R1§! §R상승§!합니다.\n\n§Y성공 확률§!:\n기본: §Y70%§!\n§H캇첸의 경계§!: §R-[flusion_primitives_country.katzen_wary_perc]%§!\n§P극히 높은 위험성§!: §R-40%§!\n§B전국적 게릴라 활동§!: §G+[flusion_primitives_country.flusion_total_res_perc]%§!\n§B메르쿠르의 게릴라§!: §G+[flusion_primitives_country.mercuria_res_perc]%§!\n총계: §Y[flusion_primitives_country.flusion_success_chance_total]%§!"
 giga_blow_solak_dam_desc:0 "\n§H위험도§! - §P극한§!\n§H위치§! - §B솔라카레아 바다의 라브코솔라크 해협§!\n\n임무 요구사항:\n§R라브카니아에서의 격렬한 게릴라 활동§!\n§H솔라키아에서의 상당한 게릴라 활동§!\n\n§L§Y솔라크트로파§!는 대규모 지구공학 프로젝트로, 플러션의 주요 바다 중 한 곳인 §Y솔라카레아 바다§! 의 해수면을 낮추고자 하는 것이 목표입니다. 바다와 대양 사이를 가로막아, 바다의 물은 채워지는 것보다 더 빠르게 증발할 것이며, 이에 따라 해수면은 낮아질 것입니다.\n\n증발한 물은 첨단 기후 조작을 통해 솔라키아 북소쪽의 거대한 알타리아 섬의 농지로 향하며, 말라버린 대지는 플러션의 산업을 조금 더 쥐어짜내기 위해 사용됩니다.\n\n또한, 댐은 막대한 양의 에너지를 생산해 플러션 전체에 에너지를 공급할 수 있습니다. 이 댐을 폭파하고 이 작은 프로젝트를 박살내면, 플러션의 경제에 엄청난 타격을 줄 수 있을 것입니다.§!\n\n§B필수는 아니지만, §Y메르쿠르§!의 저항이 높다면 게릴라들이 추가 탄두를 밀수할 수 있을 테니 성공확률이 높아질 것입니다.§!\n\n§B§Y솔라크트로파§!와 §Y캣틀란트로파§! 댐 모두를 파괴하는 것은 제국에 §G농업 공황§!을 일으킬 것이며, 이로 인해 변두리 행성이 카이저의 통치에 대항해 반란을 일으킬지도 모릅니다!§!\n\n§H댐을 파괴하면 §Y솔라키아§!와 §Y라브카니아§!의 해안에 이루말할 수 없는 피해를 줄 것이며. 그 지역의 주민들은 이를 원하지 않을 것이므로, 그 지역의 저항이 §R2§! §R감소§!할 것입니다.§!"
 giga_blow_solak_dam_no:0 "§Y솔라크트로파 댐 폭파§!\n\n§H상태§! - §R불가능§!$giga_blow_solak_dam_desc$"
 giga_blow_solak_dam_yes:0 "§Y솔라크트로파 댐 폭파§!\n\n§H상태§! - §G가능§!$giga_blow_solak_dam_desc$"
 giga_blow_solak_dam_done:0 "§Y솔라크트로파 댐 폭파§!\n\n§H상태§! - §B완료§!$giga_blow_solak_dam_desc$"
 giga_capture_panzer_desc:0 "\n§H위험도§! - §Y중간§!\n§H위치§! - §B캇첸 헤르츠란츠 남쪽, 라이온스버그 조립 시설§!\n\n임무 요구사항:\n§R캇첸 헤르츠란츠에서의 격렬한 게릴라 활동§!\n§Y상당한 에지카니아 저항§!\n\n§L§Y리지거 캇첸 판처§!는 캇첸 지상군의 자랑입니다. 이 어마어마한 거수는 그냥 엄청난 피해를 줄 수 있는 중장갑 차량일 뿐입니다. 이 무기의 설계도를 얻는다면, 이를 역공학하여 우리만의 리지거 캇첸 판처를 만들 수 있을 것입니다.§!\n\n§B그러한 데이터 탈취는 복잡하기 때문에, 리지거 캇첸 판처 조립도가 저장된 데이터 서버의 복잡한 레이아웃에 익숙한 우호적인 에지카니아 경비의 도움이 필요합니다. 즉, 이 작전을 수행하기 위해서는 §Y에지카니아§! 저항이 충분히 높아야 한다는 것입니다.§!"
 giga_capture_panzer_no:0 "§Y리지거 캇첸 판처 설계도 탈취§!\n\n§H상태§! - §R불가능§!$giga_capture_panzer_desc$"
 giga_capture_panzer_yes:0 "§Y리지거 캇첸 판처 설계도 탈취§!\n\n§H상태§! - §G가능§!$giga_capture_panzer_desc$"
 giga_capture_panzer_done:0 "§Y리지거 캇첸 판처 설계도 탈취§!\n\n§H상태§! - §B완료§!$giga_capture_panzer_desc$"
 giga_sonya_desc:0 "\n§H위험도§! - §R높음§!\n§H위치§! - §B손 바다의 클라인라키엔 섬§!\n\n임무 요구사항:\n§R솔라키아의 격렬한 게릴라 활동§!\n§H소사의 상당한 게릴라 활동§!\n\n§L§Y소냐 소울§!은 다른 누구도 아닌 도푸스 테크닉 마키나의 소중한 딸입니다. 과거 끔찍한 사고로 죽었지만, §Y소울봇§!으로 되살아났습니다. 소울봇은 솔라키아인의 최대 발명품이라 해도 될지도 모릅니다. 이는 유기체의 진짜 영혼을 담을 수 있는 인공 로봇 동체로, 솔라키아인들은 죽은 자들에게 두 번째 기회를 주는 용도로 이를 사용합니다.\n\n놀랍지는 않지만, 캇첸은 이미 그 설계도를 훔쳤고, 거의 불멸에 가까운 초인 군단을 만들어내고 있습니다. 또한 소냐 자신도 캇첸에게 잡혔다가 현재는 솔라키아 해안 멀리에 있는 섬에 홀로 떨어져 연구되고 있습니다.§!\n\n§B요새를 뚫고 빠르게 소냐를 대피시키는 데에는 소사인들의 웜홀 생성 능력이 필요합니다. 따라서 이를 진행하려면 §Y소사§!의 저항이 충분히 높아야 합니다.§!\n\n§B클라인라키엔 섬은 캇첸의 §Y소울봇§! 생산 및 보관 시설로도 사용됩니다. 이러한 §Y캇첸 소울봇§!은 보통 전사한 사령부 인원을 \"부활\"시키는데 사용되며, 소냐를 구출하면서 이를 파괴하면 더 이상 캇첸은 이들을 부활시킬 수 없을 것입니다.§!"
 giga_rescue_sonya_no:0 "§Y소냐 소울 구출§!\n\n§H상태§! - §R불가능§!$giga_sonya_desc$"
 giga_rescue_sonya_yes:0 "§Y소냐 소울 구출§!\n\n§H상태§! - §G가능§!$giga_sonya_desc$"
 giga_rescue_sonya_done:0 "§Y소냐 소울 구출§!\n\n§H상태§! - §B완료§!$giga_sonya_desc$"
