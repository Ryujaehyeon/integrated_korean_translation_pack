 giga_aeternum.3030.name:0 "에테르나이트 정보 보고서: 엄청난 부정확성"
 giga_aeternum.3030.desc:0 "에테르나이트 정보국이 은하계에 대한 에테르나이트 정보가 얼마나 능률적이고 정확한지 알아내기 위한 원경 조사를 성공했다고 보고했습니다.\n\n그들의 공간 가장자리 근처를 비행하는 탐사선에 대한 반응을 테스트하는 것뿐만 아니라 실제로 그들의 제국이 남기는 소규모 데이터들을 종합함으로써, 정보국은 에테르나이트 정보가 기술적으로 우수함에도 불구하고 상대적으로 빈약하다는 결론을 내렸습니다.\n\n아마도 그들 자신의 우월감에 대한 믿음의 결과로, 에테르눔은 은하계의 나머지를 후진적인 야만인의 소굴에 지나지 않는다고 생각하는 것 같습니다. 그들은 앞으로의 승리에 대해 너무 자신만만하여 은하계의 힘을 올바르게 평가하는 것을 의미없는 노력이라 생각하며 자원을 거의 투자하고 있지 않습니다. 외부 활동을 감시하는 체계는 어떤 것이든 간에 노후하고 구식일 가능성이 높습니다.\n\n그리하여 우리 기관은 가짜 전파를 방출하고 우리 함선의 실제 능력을 숨기는 거대한 작전을 펼침으로써, 에테르나이트가 우리 제국과 은하를 실제보다 훨씬 약하다고 믿게끔 속일 수 있으리라 생각하고 있습니다. 에테르눔이 여전히 정체된 제국이기 때문에, 우리가 위협이 되지 않으리라 확신하고 각성을 늦출 것이며, 이는 다시 그들의 국가를 재무장 시키려는 작업을 늦출 것입니다.\n\n이것이 직관에 어긋나는 것처럼 보일지도 모르지만, 우리 사회학자들은 에테르나이트가 빠르게 재무장 하게끔 자극할만큼 외부 은하가 위협적이지 않다면, 이런 류의 고대 문명은 그들의 인구와 산업의 정체에서 벗어나는데 필요한 원동력을 찾기 훨씬 어려울 것이라는 결론을 내렸습니다.\n\n§B에테르나이트 정보국을 통해 이 과정을 시작할 수 있습니다.§!"
 giga_aeternum.3030.a:0 "이해했다."
 giga_aeternum.3041.name:0 "기반 시설 폭격"
 giga_aeternum.3041.desc:0 "작은 발사체 구름이 빛에 가까운 속도로 가속하였고 은하 중심에 퍼부어졌습니다. 이는 에테르나이트 시설에 피해를 좀 줄것이고, 그들은 이를 쉽게 수리할 수 있을테지만, 이는 그들이 수리를 진행하는 동안 각성을 늦추게끔 할 것이 틀림 없습니다. 또한 발사체가 여러 개의 웜홀을 통과하게 함으로써, 추적이 거의 불가능하게 만들었습니다.\n\n우리는 웜홀망을 구축하기 위해 우선 £energy£ §Y100000§!을 사용해야하며, §Y3년§! 간 매월 £minerals£ §Y[birch_aeternum.aeternum_bombard_mineral_cost]§! 및 £alloys£§Y[birch_aeternum.aeternum_bombard_alloy_cost]§!을 소비해야 합니다.\n\n완료되면, 에테르나이트 각성이 §Y2 년§!에서 §Y6 년§! 사이의 시간만큼 지연될 것입니다.\n\n작업이 완료되면 취소될 수 없으며, 다시 시도하면 점차적으로 비용이 더 많이 들 것입니다.\n\n에테르눔이 이에 대응하기 위해 빠르게 보호막과 국지 대응책을 강화할 것이므로, 이는 §Y4§! 번 까지만 시행할 수 있습니다."
 giga_aeternum.3041.a:0 "작전을 진행해라."
 giga_aeternum.3041.a.tooltip:0 "우리는 선비용을 지불해야 하며, 2년 반 간 매월 £minerals£ §Y[birch_aeternum.aeternum_bombard_mineral_cost]§! 및 £alloys£§Y[birch_aeternum.aeternum_bombard_alloy_cost]§!을 소비해야 합니다."
 giga_aeternum.3042.name:0 "에테르나이트 기반 시설 폭격됨!"
 giga_aeternum.3042.desc:0 "우리의 기관이 폭격 작전이 성공했다고 보고했습니다! 빛의 속도에 가까운 다수의 발사체 덕분에, 에테르나이트의 각성 완료를 향한 과정에 큰 방해를 주었습니다.\n\n각성의 지연은 대략 §Y[birch_aeternum.aeternum_infra_bombing_awake_delay_value]§! 년 이라고 추정됩니다."
 giga_aeternum.3042.a:0 "멋지군!"
 giga_aeternum.3010.infrabombing:0 "§H에테르나이트 기반 시간§! 폭격 | [birch_aeternum.aeternum_infra_operation_done] "
 aeternum_infra_bomb_1:0 "에테르나이트 기반 시설 폭격"
 aeternum_infra_bomb_1_desc:0 "에테르나이트 기반 시설을 향해 빛의 속도에 가까운 발사체 폭풍을 날려보내기 위해 자원을 소비하고 있습니다."
