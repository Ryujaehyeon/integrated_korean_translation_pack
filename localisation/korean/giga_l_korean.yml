 decision_ringworld_arcology_project_desc:0 "끊임없는 뻗어있는 생태도시는 이 링 월드 구획을 하나의 거대한 도시로 통합시킬 것이며, 이 도시는 은하에서 지금까지 만들어진 것들 중 가장 큰 도시일 겁니다."
 decision_ringworld_arcology_project_effects:0 "이 링 월드 구획을 §Y$pc_ringworld_city$§!로 변환하고, £housing£ §Y$PLANET_HOUSING_TITLE$§!, §Y자원 생산량§! 과 §Y팝 성장§!을 증가시키고 링 월드의 전체 표면이 변형되는 대신 특별한 £district£ §Y아콜로지 지구§!를 해제하여 £district£ §Y발전 지구§!와 §Y농업 지구§!의 추가 구성을 방지합니다."
 decision_ringworld_arcology_project_requirements:0 "$TRIGGER_FAIL$ §R행성의 모든 구역 슬롯은§! §Y$district_city_plural$§! 또는 §Y$district_industrial_plural$§!로 채워져야 합니다."
 decision_repaired_shattered_alderson:0 "초거대구획 수리"
 decision_repaired_shattered_alderson_desc:0 ""
 decision_shattered_alderson_project_effects:0 "초거대구획을 §G$pc_alderson_slice_gaia$§!으로 수리합니다"
 decision_giga_flood_habitat:0 "$decision_flood_habitat$"
 decision_giga_flood_habitat_desc:0 "$decision_flood_habitat_desc$"
 decision_giga_flood_habitat_elysium:0 "\n나중에 이 $name_orb_elysium$이 해체된다면, 이곳에 사용된 얼음은 §R사라질 것입니다§!."
 ap_vast_expanses:0 "광대한 확장"
 ap_vast_expanses_desc:0 "주거와 생산에 대한 끝없이 커지는 요구에 따라, 우리는 궁극의 거주 공간을 만들어야하는 시점에 도달했습니다. 이를 위해 은하계에서 가장 거대한 물체를 최대한 활용할 때가 왔습니다.\n\n우리의 은하 중심이 §B비활성 초대질량 블랙홀§!이 아니라면 $ehof_ehofp4$를 사용해 찾으십시오."
 add_research_options_birch_world:0 "연구 선택지 획득:\n£engineering_research£§Y$name_birch$§!\n$name_birch$는 종족의 영구적이고 영원한 거주를 위해 가장 큰 블랙홀 주변에 지어진 거대한 거주지입니다. 하나의 구역이있는 불모의 금속 구체로 시작하지만 인구가 늘어나고 껍질의 표면이 확장됨에 따라 더 많은 구역 슬롯을 확보하여 무한한 수의 팝을 수용 할 수 있습니다."
 ap_gigastructural_constructs:0 "초거대 구조물 축조"
 ap_gigastructural_constructs_desc:0 "크고 아름다운 것은 항상 옳습니다. 상상도 할 수 없는 크기와 규모의 거대 구조물을 건설 함으로서, 우리는 은하계의 초강대국으로 자리매김 할 수 있을 것입니다."
 ap_gigastructural_constructs_add_research:0 "연구 옵션이 추가되었습니다:\n£physics_research£§Y$giga_tech_matrioshka_brain_1$§!\n£physics_research£§Y$giga_tech_hrae_mc$§!\n£engineering_research£§Y$giga_tech_ringworld_behemoth$§!\n\n이 연구를 요구하는 옵션:\n£physics_research£ §Y$giga_tech_tetradimensional_engineering$§!\n£physics_research£ §Y$giga_tech_ndb_1$§!\n£engineering_research£ §Y$giga_tech_hyperstructural_ass$§!\n£engineering_research£ §Y$giga_tech_nidavellir$§!\n£engineering_research£ §Y$giga_tech_war_planet$§!\n\n이 연구를 요구하는 상승 특성:\n§Y$ap_qso$§!\n§Y$ap_celestial_printing$§!\n§Y$ap_vast_expanses$§!"
 ap_qso:0 "천국을 꿰뚫는 창"
 ap_qso_desc:0 "은하 중심에서 발견된 초고에너지 퀘이사($name_ndb$)는 시스템 크래프트(Systemcraft)조차 압도할 무기를 제작할 수 있는 놀라운 기회를 나타냅니다. 이처럼 거대하고 규모가 큰 무기는 이전에 제작된 어떤 것보다도 몇 배나 높은 파괴력을 지닐 것입니다. 하늘 자체를 산산조각낼 무기입니다.\n\n우리 은하 중심이 그렇지 않다면 $ehof_ehofp4$가 §B활성 초대질량 퀘이사§!를 찾을 수 있습니다."
 add_research_options_quasistellar_base:0 "연구 선택지 획득:\n£physics_research£ §Y체계: 초차원 차폐§!\n우리는 그 누구도 그 순수한 분노에 저항할 수 없을 정도로 압도적인 힘을 가진 은하계 핵 주위에 건설된 거대한 포인 §R$name_quasistellar$§!를 조립하는 임무에 착수 할 것입니다.\n\n§R이러한 치명적인 무기의 건설에 착수하는 것은 의심할 여지없이 은하계 전체를 분노하게 할 것입니다.§!"
 grandbunny_psionics:0 "팔루쉬의 사이오닉 특이점"
 grandbunny_psionics_desc:0 "그랜드버니의 쓰러진 영혼이 방출한 엄청난 양의 사이오닉 에너지가 우리의 함선에게 현실의 구조를 비틀어 전 은하를 순식간에 건널 수 있는 능력을 주었습니다."
 pangalactic_federation:0 "범은하적 연합"
 pangalactic_federation_desc:0 "함께라면, 결코 패배하지 않을 것입니다!"
 hke_buffs:0 "신성 캇첸 제국"
 hke_buffs_desc:0 "카이저를 위해!"
 garyxphysics:0 "스퀘어월드 자료 저장소: 물리학 연구"
 garyxphysics_desc:0 "게릭스는 우리의 물리학 연구에 도움을 주기 위해 스퀘어월드의 기록보관소에서 데이터를 검색하고 있습니다."
 garyxengineering:0 "스퀘어월드 자료 저장소: 공학 연구"
 garyxengineering_desc:0 "게릭스는 우리의 공학 연구에 도움을 주기 위해 스퀘어월드의 기록보관소에서 데이터를 검색하고 있습니다."
 garyxsociety:0 "스퀘어월드 자료 저장소: 사회학 연구"
 garyxsociety_desc:0 "게릭스는 우리의 사회학 연구에 도움을 주기 위해 스퀘어월드의 기록보관소에서 데이터를 검색하고 있습니다."
 paluush_shield:0 "사이오닉 역장"
 paluush_shield_desc:0 "이 행성의 주민들은 놀랍도록 강력한 사이오닉 능력을 가지고 있습니다. 이들은 자신에게 던져진 어떠한 궤도 폭격도 가로채 빗나가게 할 수 있습니다. 우리의 과학자들은 이 행성의 무언가가 이들이 사이오닉 잠재력을 10배 이상 증가시키고 있다고 생각합니다."
 feeble_ai_mega_buff:0 "미약한 AI"
 feeble_ai_mega_buff_desc:0 "바른 방향으로 조금만 밀어주면?"
 giga_no_build_cap:0 "거대 구조물 건축가"
 giga_no_build_cap_desc:0 "우리는 동시에 여러 거대 구조물을 만드는 기술에 통달했습니다."
 giga_plus_1_build_cap:0 "거대 구조물 건축가"
 giga_plus_1_build_cap_desc:0 "우리는 여러 개의 대형 프로젝트를 동시에 관리하는 방법을 배웠습니다."
 giga_plus_2_build_cap:0 "거대 구조물 건축가"
 giga_plus_2_build_cap_desc:0 "우리는 여러 개의 대형 프로젝트를 동시에 관리하는 것에 통달했습니다."
 temporary_debug:0 "debug"
 space_storm:0 "debug"
 giga_brown_dwarf:0 "L형 갈색 왜성"
 giga_brown_dwarf_desc:0 "이것은 L형 갈색 왜성으로, 비교적 점화되어 별이 되기에 알맞습니다."
 attack_moon_candidate:0 "$name_war_moon$ 후보지"
 attack_moon_candidate_desc:0 "이 작은 천체는 $name_war_moon$이 되기에 딱 맞는 크기입니다."
 attack_planet_candidate:0 "$name_war_planet$ 후보지"
 attack_planet_candidate_desc:0 "이 커다란 천체는 $name_war_planet$이 되기에 딱 맞는 크기입니다."
 helioforming_candidate:0 "헬리오포밍 후보지"
 helioforming_candidate_desc:0 "비록 이 거대한 가스 행성은 갈색 왜성이 아니지만, 독특한 구성과 높은 밀도로 인해 적절한 기술이 있다면 점화시켜 별을 만들 수 있을 것입니다."
 orbital_elysium_catastrophe:0 "$name_giga_orbital$ 참사"
 strange_pouchkinn_lab:0 "고대의 연구소"
 strange_pouchkinn_lab_desc:0 "이 $name_giga_orbital$의 표면에는 고대의 실험실이 존재합니다. 누가 이것을 지었는지는 아무도 알 수 없습니다."
 strange_pouchkinn_lab_activated:0 "파우치킨의 연구소"
 strange_pouchkinn_lab_activated_desc:0 "이 $name_giga_orbital$에는 시간 여행의 비밀을 연구하는 위니 파우치킨의 실험실이 존재합니다."
 iodizium_deficit:0 "아이오디지움 수정 부족"
 iodizium_deficit_desc:0 "우리의 아이오디지움 시설은 부족한 아이오디지늄의 효과를 재현하기 위해 엄청난 양의 외부 에너지를 소비하고 있습니다."
 magical_neutronium_deficit:0 "우리 시설은 부족한 뉴트로늄의 효과를 재현하기 위해 많은 양의 에너지를 사용하고 있습니다."
 irradiated_desert_planet:0 "방사능 사막 행성"
 irradiated_desert_planet_desc:0 "이 행성은 엄청난 양의 핵 무기를 얻어맞았습니다. 행성의 표면은 이제 생명체가 살아가기엔 너무 가혹한 환경이며, 지표면의 온도는 종종 섭씨 100도 이상으로 치솟습니다. 지표와 대기는 고농도의 방사성 물질로 오염되었고, 고방사성 폐기물로 이루어진 물 웅덩이도 있습니다. 이 행성에서 일어난 엄청난 양의 핵 폭발은 행성의 지표면에 무거운 원소들을 쌓이게 했고, 결국 일부 광물들을 거의 합금과 같은 형태로 녹였습니다.\n\n§Y테라포밍을 통해 이 보정치를 제거할 수 있습니다.§!"
 katzenland_planet:0 "몰락한 네크로폴리스"
 katzenland_planet_desc:0 "이 세계는 거주 가능한 행성으로 보기조차 어렵습니다. 표면 환경은 극도로 가혹하며 낮에는 때때로 기온이 100도 이상 상승합니다. 독성 가스와 방사능 화합물로 가득찬 대기와 산업 폐기물로 이루어진 얕은 바다가 존재합니다.\n그러나, 이곳에는 한 때 번성한 문명이 있었다는 폐허들이 널려있습니다. 이곳에 정착하는 것은 매우 어렵겠지만, 이 폐허는 오래전에 사라진 문명을 연구할 기회와 표면에 남아있는 방대한 양의 자원을 폐기할 수 있는 놀라운 기회를 제공하며, 방대한 양의 방사성 물질과 기반 시설은 에너지 발전에 큰 도움이 될 것입니다.\n\n§Y이 행성을 테라포밍하면 패널티가 제거되겠지만, 보너스 또한 감소합니다!§!"
 katzenland_planet_terraformed:0 "네크로폴리스"
 katzenland_planet_terraformed_desc:0 "한때 대규모 분쟁으로 황폐화 되었던 행성은 전보다 거주에 적합하게 복원되었습니다. 한 때 번성한 문명의 폐허들이 널려있고 이 폐허들을 연구하고 많은 자원을 얻을 수 있는 놀라운 기회를 제공하며, 남은 많은 방사성 물질과 기반 시설은 에너지 발전을 위해 사용한다면 굉장히 유용할 것입니다."
 ringworld_upgrade_timer:0 "링 월드 거주 업그레이드"
 ringworld_upgrade_timer_desc:0 "우리는 계속 늘어나는 인구를 수용하고 지원하기 위해 시설 외의 구역을 업그레이드하고 있습니다."
 gigablackhole_radiations:0 "아공간 폭탄에 의해 방사선 피폭됨"
 gigablackhole_radiations_desc:0 "근처에서 폭발한 아공간 왜곡 폭탄이 초공간 항로를 통해 다량의 이질적인 입자를 보내서 유해한 방사선으로 이 행성을 쓸어버렸습니다."
 flat_world:0 "플랫 월드"
 flat_world_desc:0 "이 행성은 평평합니다. 이곳에선 지구 평면설이 힘을 얻을 수 있겠군요."
 square_ringworld:0 "$name_ringworld_square$"
 square_ringworld_desc:0 "이 구획은 $name_ringworld_square$에 있으며, 잘 이해되지 않은 기술 구성 요소로 가득 차 있습니다. 이곳을 연구하는 것은 가치있는 투자가 될 것입니다."
 virtual_world:0 "가상 세계"
 virtual_world_desc:0 "이 세상은 $name_matrioshka_brain$'의 놀라운 프로세서로 완벽히 시뮬레이션 됩니다. 따라서 이곳에서는 광물 생산이 불가능하며, 동면 포드로 인구를 유지하는 것은 상당히 비쌉니다."
 orbital_elysium:0 "$name_orb_elysium$"
 orbital_elysium_desc:0 "이 거주지는 궤도 엘리시움 우주 정거장으로 아래 행성의 거주자들에게 군림하는 주민들에게 행성과 같은 조건 및 매우 멋진 광경을 제공합니다."
 interstellar_habitat:0 "$name_interstellar_hab$"
 interstellar_habitat_desc:0 "이 광대한 우주 정거장의 자연광 부족은 주민들에게 다소 부담이 될 수 있고, 발전소는 태양광이 부족하기 때문에 효율성이 떨어집니다. 그러나 이 관측소는 성간 공간의 본질에 대한 훌륭한 연구 기회를 제공합니다."
 ruined_city_world:0 "고대의 도시 행성"
 ruined_city_world_desc:0 "고고학적 스캔을 통해 이 행성은 과거에 도시 행성이었음을 알 수 있습니다. 문명은 파괴되었지만 그 흔적은 행성의 지하, 폐허가 된 고층 건물의 형태로 남아있습니다. 그러나, 이곳의 기후는 극도로 불안정하고 토양에선 상당한 수준의 독성이 검출되었습니다."
 megastructure_collision:0 "거대 구조물 충돌 흔적"
 megastructure_collision_desc:0 "이 행성의 표면에는 금속 파편이 흩어진 거대한 충돌 크레이터가 있습니다. 한때 이 행성을 공전하던 거대한 우주 정거장 또는 거대 구조물이 충돌한 것으로 보입니다. 이 영향으로 행성이 가진 기후가 극적으로 불안정해진 것 같습니다."
 lifeless_foggy:0 "안개 낀 행성"
 lifeless_foggy_desc:0 "이 행성의 대기는 매우 두껍습니다. 큰 폭풍이 자주 발생하며, 생명이 부족해 식량을 키우기는 어렵지만 생물권의 방해 없이 채굴 작업을 진행할 수 있습니다."
 lifeless_foggy_gases:0 "독성의 흔적"
 lifeless_foggy_gases_desc:0 "이 행성은 한때 유독성 행성이었으나 거주 가능한 행성으로 테라포밍 되었습니다. 그러나 독성이 있었던 대기의 흔적은 여전히 남아 있습니다."
 lifeless_temperate:0 "생명이 없는 행성"
 lifeless_temperate_desc:0 "거주 가능한 행성이지만 생명의 흔적은 보이지 않습니다. 따라서 식량을 재배하기는 어렵겠지만 자원을 걱정할 일은 없을 것입니다. 또한 순수한 행성 지질학을 연구할 수 있는 좋은 기회를 제공합니다."
 lifeless_torrid:0 "뜨거운 행성"
 lifeless_torrid_desc:0 "거주 가능한 행성이지만 굉장히 덥습니다. 지질학적 활동은 행성의 지각판을 변경하여 안정되었지만 잿가루와 화산의 부산물은 여전히 대기권에 상당히 존재합니다."
 lifeless_torrid_tectonics:0 "남아있는 화산 활동"
 lifeless_torrid_tectonics_desc:0 "성공적인 테라포밍에도 불구하고 이 행성의 지각판은 다소 불안정합니다. 남아있는 화산 활동이 완전히 사라질 때 까지 시간이 걸릴 것입니다."
 giga_planetary_computer:0 "$name_planetary_computer$"
 giga_planetary_computer_desc:0 "이 행성은 하나의 거대한 컴퓨터로서, 연구에 막대한 이점을 제공합니다."
 ringyard_alloys:0 "주조 링 월드"
 ringyard_alloys_desc:0 "용암 행성의 강력한 열은 광물을 합금으로 변환시키는 작업을 촉진합니다."
 disco_moon_modifier:0 "위성 조명 쇼"
 disco_moon_modifier_desc:0 "근처에 있는 $name_discomoon$이 이 행성의 하늘에 아름다운 빛을 투사하여 무수한 오로라를 만듭니다. 우리 제국의 깃발을 닮은 이 신비로운 오로라는 경외심과 자부심으로 우리 국민에게 영감을 줍니다."
 orbital_arcology_modifier:0 "$name_orbital_arcology$"
 orbital_arcology_modifier_desc:0 "$name_orbital_arcology$에서 제공하는 공간은 일부 에너지 생성과 식량 생산을 허용합니다."
 orbital_arcology_modifier_1:0 "$name_orbital_arcology$"
 orbital_arcology_modifier_1_desc:0 "$name_orbital_arcology$이(가) 제공하는 공간은 식량 생산뿐만 아니라 일부 에너지 생성을 가능하게 합니다."
 orbital_arcology_modifier_2:0 "$name_orbital_arcology$"
 orbital_arcology_modifier_2_desc:0 "$name_orbital_arcology$에서 제공하는 공간은 일부 에너지 생성과 식량 생산을 허용합니다."
 orbital_arcology_modifier_3:0 "큰 $name_orbital_arcology$"
 orbital_arcology_modifier_3_desc:0 "$name_orbital_arcology$에서 제공하는 공간은 일부 에너지 생성과 식량 생산을 허용합니다."
 new_orbital_arcology_modifier:0 "$name_orbital_arcology$"
 new_orbital_arcology_modifier_desc:0 "$new_orbital_arcology_modifier$가 제공하는 공간 덕분에 추가적인 지구를 건설할 수 있습니다."
 new_orbital_arcology_double_modifier:0 "강화된 $name_orbital_arcology$"
 new_orbital_arcology_double_modifier_desc:0 "강화된 $new_orbital_arcology_modifier$가 제공하는 공간 덕분에 추가적인 지구를 건설할 수 있씁니다."
 new_orbital_arcology_triple_modifier:0 "최대화된 $name_orbital_arcology$"
 new_orbital_arcology_triple_modifier_desc:0 "최대화된 $new_orbital_arcology_modifier$가 제공하는 공간 덕분에 추가적인 지구를 건설할 수 있습니다."
 giga_titanic_housing:0 "타이타닉 건축"
 giga_titanic_housing_desc:0 "표준 링 월드의 두 배 크기인 이 거대한 링 월드는 엄청난 양의 인구를 수용합니다."
 giga_behemoth_housing:0 "베히모스 건축"
 giga_behemoth_housing_desc:0 "표준 링 월드의 세 배 크기인 이 거대한 링 월드는 엄청난 양의 인구를 수용합니다."
 giga_gargantuan_housing:0 "가겐츄언 건축"
 giga_gargantuan_housing_desc:0 "표준 링 월드의 네 배 크기인 이 거대한 링 월드는 엄청난 양의 인구를 수용합니다."
 pc_ringworld_city:0 "$name_ringworld_city$"
 pc_ringworld_city_desc:0 "링 월드가 도시와 산업의 확산으로 인해 행성을 완전히 삼켰습니다. 원래 암석권은 더 이상 궤도에서 식별할 수 없습니다."
 pc_ringworld_machine:0 "$name_ringworld_machine$"
 pc_ringworld_machine_desc:0 "인공 구조물로 덮인 링 월드 구역입니다. 얇은 대기는 대부분 산업 오염 물질로 구성되어 있으며 생명체가 살아갈 수 없습니다.\n\n농업 구획이 없지만, 대신 물질 합성 구획이 존재합니다."
 pc_ringworld_hive:0 "$name_ringworld_hive$"
 pc_ringworld_hive_desc:0 "이 링 월드 구획 전체가 거대한 생명체로서, 이것을 형성한 군체 의식과 사이오닉으로 연결되어 있습니다. 이곳에 발을 디딘 군체의 일부가 아닌 존재는 지형 그 자체에 의해 공격받을 것입니다.\n\n연구 구획이 없지만, 대신 물질 합성 구획이 존재합니다."
 pc_virtual_reality:0 "$name_matrioshka_brain$ 현실 시뮬레이터"
 pc_virtual_industry:0 "$name_matrioshka_brain$ 산업구간"
 pc_virtual_stellar_industry:0 "$name_matrioshka_brain$ 처리구간"
 pc_virtual_reality_desc:0 "가상 현실의 거주를 위해 가상 세계 연산에만 전념하는 $name_matrioshka_brain$ 구획입니다."
 pc_virtual_industry_desc:0 "항성의 에너지와 플라스마를 사용하여 기본 자원을 생산하는 데 전념하는 $name_matrioshka_brain$ 구획입니다."
 pc_virtual_stellar_industry_desc:0 "우리의 산업을 위한 고급 자원을 생산하는 데 전념하는 $name_matrioshka_brain$ 구획입니다."
 pc_squareworld_habitable:0 "스퀘어월드 구획"
 pc_squareworld_habitable_desc:0 "스퀘어월드에 위치한 독특한 거주지입니다. 이 장소의 이색적인 광경과 자연은 많은 사람들을 매료시킵니다."
 pc_equatorial_shipyard:0 "주조 링 월드"
 pc_equatorial_shipyard_desc:0 "$name_eq_shipyard$의 내부 부분으로, 이 링월드는 용암 행성의 지각에서 희귀 광물을 추출하고 이를 직접 합금으로 정제하는 데 특화되어 있습니다. 그러나 생활 조건은 상당히 열악합니다."
 pc_interstellar_habitat:0 "$name_interstellar_hab$"
 pc_interstellar_habitat_desc:0 "성간 우주에 지어진 광대한 우주 정거장. 필요한 에너지를 별에 의존하지 않는 대신 거대한 특이점 원자로를 이용해 자급자족 할 수 있습니다. 수십억의 인구를 수용하지만, 그 광경은 왠지 우울해 보입니다."
 pc_interstellar_ringworld_habitable:0 "$name_interstellar_ring$"
 pc_interstellar_ringworld_habitable_desc:0 "중앙의 특이점 원자로를 두르고 지어진 링 월드 거주지. 표면은 극도로 인위적이며, 엄청난 양의 인공광으로 빛납니다."
 pc_gigaorbital_ring:0 "행성 고리 거주지"
 pc_gigaorbital_ring_desc:0 "행성 근처를 도는 커다란 고리 모양의 거주지입니다. 인공 생물권과 대기를 가지고 있으며, 편안하고 행성과 같은 환경에서 수십억 명의 주민들을 수용할 수 있습니다."
 pc_gigaorbital_ring_ruined:0 "폐허가 된 $pc_gigaorbital_ring$"
 pc_gigaorbital_ring_ruined_desc:0 "이 $pc_gigaorbital_ring$는 어떤 재앙으로 인해 완전히 망가졌습니다. 적합한 기술이 있다면 수리가 가능할지도 모릅니다."
 pc_giga_elysium:0 "$name_orb_elysium$"
 pc_giga_elysium_desc:0 "아래의 행성에 영향력을 행사하기 위해 설계된 목가적인 궤도 거주지입니다."
 pc_giga_elysium_adj:0 "엘리시안"
 pc_giga_orbital:0 "$name_giga_orbital$"
 pc_giga_orbital_desc:0 "별 근처를 도는 커다란 고리 모양의 거주지입니다. 인공 생물권과 대기를 가지고 있으며, 편안하고 행성과 같은 환경에서 수십억 명의 주민들을 수용할 수 있습니다."
 pc_giga_orbital_adj:0 "궤도"
 pc_giga_orbital_site:0 "$name_giga_orbital$ 건설 현장"
 pc_giga_orbital_site_desc:0 "$name_giga_orbital$의 건설에만 사용되는 비어있는 현장입니다."
 pc_giga_orbital_site_adj:0 "비어있음"
 pc_katzenland:0 "방사능 사막 행성"
 pc_katzenland_desc:0 "수 천년 전에 핵전쟁을 겪은 매우 덥고 건조하며 황량한 행성. 미생물과 극소성 식물 외에는 생명이 존재하지 않으며, 한때 광대한 바다가 있었다고 짐작되는 작은 호수만이 남아있습니다. 대기는 여전히 많은 양의 산업 오염물질과 방사성 화합물을 포함하고 있습니다."
 pc_giga_empty_space:0 "빈 공간"
 pc_giga_empty_space_desc:0 "어떠한 물질도 존재하지 않는 완전히 빈 공간입니다."
 pc_ll_foggy:0 "안개 낀 행성"
 pc_ll_foggy_desc:0 "밀도가 높고 온화한 대기의 거주 가능한 행성. 두꺼운 구름층이 항상 표면을 덮고 있고 공기는 수프처럼 느껴집니다. 안개는 행성 표면의 대부분을 덮고 있어, 어떠한 진보된 생명체도 존재하지 않습니다."
 pc_ll_torrid:0 "뜨거운 행성"
 pc_ll_torrid_desc:0 "거주 가능한 행성이지만, 생명의 흔적은 없습니다. 상당히 덥고 건조하며, 대기권 내에 잔류 입자가 비교적 흔합니다. 토양은 대부분 어두운 화산암으로 이루어져 있으며, 지질 활동이 상당해 평균 이상의 화산 개수와 여러 지질학적 특징들을 볼 수 있습니다."
 pc_ll_temperate:0 "생명이 없는 행성"
 pc_ll_temperate_desc:0 "거주 가능한 행성이지만, 황무지였거나 강제로 생명체가 제거되었기 때문에 어떠한 형태의 생명도 찾아볼 수 없습니다."
 pc_food_giant:0 "위그드라실 난초"
 pc_food_giant_desc:0 "거대한 유기 물질판이 행성 상층 대기의 많은 부분을 가로 질러 뻗어 있습니다. 바람과 폭풍은 행성을 둘러싼 구조물에 의해 제어되어 엄청난 양의 유전자 조작 식물이 행성의 대기에서 자라고 수확할 준비가 되어 있습니다."
 pc_strip_mined:0 "채굴중인 행성"
 pc_strip_mined_desc:0 "광산과 공장으로 뒤덮인 뜨거운 암석 행성입니다. 표면은 자동 드릴 장치에 의해 층별로 추출되고 있습니다."
 pc_core_mined:0 "고갈된 행성"
 pc_core_mined_desc:0 "완전히 벗겨진 행성의 녹아버린 내핵이 우주의 공허 속에서 조용히 떠다니고 있습니다. 일부 광물은 남아 있지만, 귀중한 자원은 거의 모두 추출되었습니다."
 pc_melted_frozen:0 "대양 행성"
 pc_melted_frozen_desc:0 "수 km 깊이의 바다로 덮인 행성입니다. 전 지구적 폭풍이 표면을 가로질러 격렬하고 믿을 수 없을 정도로 높은 파도를 흔히 볼 수 있습니다. 이 행성의 환경은 너무 혼란스러워 식민지화가 불가능합니다."
 pc_flat_world:0 "플랫 월드"
 pc_flat_world_desc:0 "특이한 인공 평면 행성입니다. 중력은 중력 생성기에 의해 제공되며, 수평선이 행성의 경계까지 뻗어 있어 믿을 수 없는 광경을 만들어 냅니다."
 pc_disco_moon:0 "$name_discomoon$"
 pc_disco_moon_desc:0 "이 위성 전체는 빛을 굴절시키고 인근 행성의 하늘에 놀라운 오로라를 생성하는 전문적으로 연마된 수정으로 덮여 있습니다."
 pc_metallic_hydrogen:0 "금속 수소 행성"
 pc_metallic_hydrogen_desc:0 "거대한 금속 수소 덩어리입니다. 상층 대기는 인공적으로 벗겨져 행성의 특이한 수소 맨틀을 노출시켰습니다."
 pc_giga_planetary_computer:0 "$name_planetary_computer$"
 pc_giga_planetary_computer_desc:0 "행성 크기의 컴퓨터입니다. 표면과 맨틀 전체가 거대한 프로세서의 층으로 대체되었으며, 표면의 연구원들은 엄청난 효율성과 속도로 연구에 집중할 수 있습니다. 지뢰찾기 풀옵은 돌릴 수 없습니다."
 pc_habitable_gas_giant:0 "거주 가능한 가스 행성"
 pc_habitable_gas_giant_desc:0 "대기가 다소 안정된 가스 행성입니다. 혹독한 바람은 여전히 매우 빈번하고 기후는 매우 위험합니다. 그러나 상층 대기에 떠다니는 도시들을 수용할 수 있습니다."
 pc_ringworld_habitable_shrouded:0 "장막에 덮힌 링 섹션"
 pc_ringworld_habitable_shrouded_desc:0 "거대한 띠가 성계의 항성을 둘러싸고 있습니다.\n내부 범위를 따라 수많은 인공 거주 구역을 허용하도록 설계되었으며, 행성에 속한 존재로서의 제약과 현세에서 벗어났습니다. 비록 지금은 장막의 거친 에너지에 휩싸여 사람들이 살기 힘든 곳으로 만들고 있지만요."
 pc_squareworld_shrouded_habitable:0 "장막에 덮힌 스퀘어 월드"
 pc_squareworld_shrouded_habitable_desc:0 "스퀘어 월드에 위치한 특이한 서식지입니다. 이곳의 자연과 이상한 풍경은 장막의 혼란스러운 에너지에 의해 뒤틀리고 위험한 곳이 되어버렸습니다."
 pc_giga_penrose_shrouded_habitable:0 "장막에 덮힌 $name_penrose_ring$"
 pc_giga_penrose_shrouded_habitable_desc:0 "포획된 블랙홀을 둘러싼 거대한 구조물입니다. $name_penrose$는 이 링 월드에 동력을 공급하고 행성으로부터 자유로운 표면에서의 생명을 가능하게 하는 데 필요한 에너지를 제공합니다. 비록 고리의 거주할 수 있었던 부분들이 장막의 길들여지지 않은 에너지에 휩싸여 있어, 지금은 사람이 살 수 없습니다."
 pc_shrouded_equatorial_shipyard:0 "장막에 덮힌 주조 링월드"
 pc_shrouded_equatorial_shipyard_desc:0 "$name_eq_shipyard$의 내부 부분인 이 링 월드는 용암형 행성의 지각에서 희귀한 광물을 추출하여 합금으로 직접 정제하는 것을 전문으로 합니다. 이 고리에서 발견될 수 있는 생명체는 장막 에너지의 소용돌이로 대체되어 더는 찾아볼 수 없습니다."
 pc_interstellar_shrouded_ringworld_habitable:0 "장막에 덮힌 $name_interstellar_ring$"
 pc_interstellar_shrouded_ringworld_habitable_desc:0 "중심 특이점 원자로 주변의 성간 공간에 지어진 링 월드입니다. 한때 널찍한 도시의 풍경을 가졌지만 장막의 힘에 의해 끝없는 광기의 바다가 되어버렸습니다."
 pc_bulk_matter_cache:0 "대량 물질 캐시"
 pc_bulk_matter_cache_desc:0 "행성 물질과 가스의 대규모 저장소로, 성계 외곽의 비교적 얇은 용기에 보관되어 있습니다."
 giga_bulk_matter_cache:0 "대량 물질 캐시"
 giga_bulk_matter_cache_desc:0 "이곳은 성계 외곽에 비교적 얇은 용기에 저장된 행성 물질과 가스의 대규모 저장소입니다."
 giga_bulk_matter_cache_tooltip:0 "이 캐시 내의 £giga_sr_bulk_matter£ §H$giga_sr_bulk_matter$§!는 §Y결정§!을 통해 회수할 수 있습니다."
