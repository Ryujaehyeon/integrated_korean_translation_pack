 blokkat_spawn_warning:0 "\n§Y블록캣이 이 연도에 스폰되도록 하고 싶다면 §G확정§!으로 설정하세요§!\n\n§G눌러서 블록캣 스폰 연도 변경§!"
 giga_blokkats_regular:0 "블록캣 생김새: §E스텔라리스 블록캣§!\n기본 스텔라리스 초상화를 바탕으로, 블록캣이 보다 \"심각한\" 모습을 합니다.\n\n\n\n\n\n£blokkat_normal£\n\n\n\n\n\n§Y눌러서 §H옛날 빈티지 블록캣§!으로 바꾸기§!"
 giga_blokkats_vintage:0 "블록캣 생김새: §H옛날 빈티지 블록캣§!\n블록캣이 이름에 어울리는 모습을 가집니다. 옆에 Kreitani가 있다면 하지 마세요, 그 포트레잇을 별로 안 좋아해요.\n\n\n\n\n£blokkat_vintage£\n\n\n\n\n\n\n§Y눌러서 §B애니 블록캣§!으로 바꾸기§!"
 giga_blokkats_guaranteed:0 "블록캣이 설정한 연도쯤에 §G확정§!으로 스폰됩니다."
 giga_blokkats_not_guaranteed:0 "블록캣이 §Y50%§!의 확률로 스폰됩니다."
 giga_blokkats_enabled:0 "전 은하를 수확하려하는 굶주린 초은하적 (사냥꾼이자) 채굴꾼인 블록캣이 스폰될 §G수도 있습니다§!.\n\n항상 수도 성계에서 떨어진 곳에 스폰될 것입니다."
 giga_blokkats_disabled:0 "블록캣이 스폰되지 §R않습니다.§!\n\n§R주의: 블록캣은 싱글플레이어 위기로 디자인됐고, 따라서 멀리플레이어에서는 기본적으로 해제되어있습니다. 블록캣이 플레이어의 수도에서 스폰될 수 있고, 꽤나 어렵기 때문입니다. 다시 활성화할 수 있지만, 모든 플레이어가 리스크를 알도록 하세요.§!"
 blokkat_very_easy_research_penalty:0 "새끼 블록캣 연구 속도"
 blokkat_very_easy_research_penalty_desc:0 "블록캣이 채굴 작업에 투자하는 에너지의 양은, 블록캣에 대한 연구를 수행하는 데 드는 비용을 변화시킵니다."
