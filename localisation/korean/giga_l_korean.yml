 building_giga_mega_storage:0 "심층 저장 시설"
 building_giga_mega_storage_desc:0 "이 거대 구조물의 프레임 내에 구축된 거대한 볼트 및 기타 저장 공간."
 building_giga_mega_housing:0 "주거 메트로플렉스"
