 JUMP_DRIVE_PSI_AETERNUM:0 "에테르나이트 루프-양자 도약 드라이브"
 JUMP_DRIVE_PSI_AETERNUM_DESC:0 "도약 드라이브는 에테르나이트제 점프 드라이브로, 양자장 변위와 대량의 사이오닉 에너지를 결합하여 은하를 통해 함선을 즉시 치환합니다."
 THRUSTER_AETERNUM:0 "에테르나이트 루프-양자 치환기"
 THRUSTER_AETERNUM_DESC:0 "이 에테르나이트제 추진기는 사이오닉 퍼텐셜을 사용해 함선 주위의 국소적 양자장을 빠르게 바꾸어, 함선을 치환하는 추진기의 형태를 만들어냅니다."
 REACTOR_AETERNUM:0 "에테르나이트 루프-양자 반응로"
 REACTOR_AETERNUM_DESC:0 "에테르나이트 구조의 반응로로, 사이오닉 에너지가 주입된 초가변 양자장으로부터 에너지를 추출합니다."
 SHIELD_ARMOR_AETERNUM:0 "에테르나이트 루프-양자 보호망"
 SHIELD_ARMOR_AETERNUM_DESC:0 "초압축 양자장으로 짜인 장갑 내에 얽혀있는 다수의 사이오닉 보호막 생성기로, 이 보호망은 보호막과 장갑을 둘 다 제공하여, 에테르나이트 함선을 모든 위협으로부터 확실히 보호합니다."
 SHIELD_ARMOR_AETERNUM_ACOT_OE:0 "영원한 루프-양자 보호자 매트릭스"
 SHIELD_ARMOR_AETERNUM_ACOT_OE_DESC:0 "사이오닉 방패 생성기와 초압축 양자 장이 얽힌 갑옷의 배열로 구성된 이 매트릭스는 방패와 갑옷을 모두 제공하여 Aeternite 함선이 모든 위협으로부터 보호받을 수 있도록 합니다."
 LARGE_SHIELD_ARMOR_AETERNUM:0 "$SHIELD_ARMOR_AETERNUM$"
 LARGE_SHIELD_ARMOR_AETERNUM_DESC:0 "$SHIELD_ARMOR_AETERNUM_DESC$"
 MEDIUM_SHIELD_ARMOR_AETERNUM:0 "$SHIELD_ARMOR_AETERNUM$"
 MEDIUM_SHIELD_ARMOR_AETERNUM_DESC:0 "$SHIELD_ARMOR_AETERNUM_DESC$"
