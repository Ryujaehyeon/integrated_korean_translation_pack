 giga_menu_blokkat_section_desc:0 "블로캇은 탐욕스러운 외계의 스트립 마이너입니다. 이 섹션에서는 생성 날짜, 생성 확률 및 난이도를 포함한 설정을 제어합니다.\n아래에는 각 난이도 설정의 효과가 나열되어 있습니다.\n - ['concept_giga_blokkat_diff_very_easy']\n - ['concept_giga_blokkat_diff_easy']\n - ['concept_giga_blokkat_diff_normal']\n - ['concept_giga_blokkat_diff_bismuth']\n - ['concept_giga_blokkat_diff_endtech']\n - ['concept_giga_blokkat_diff_deathmode']"
 gigas_max_blokkat_difficulty:0 "최대 블로캇 난이도에 도달했습니다."
 gigas_min_blokkat_difficulty:0 "최소 블로캇 난이도에 도달했습니다."
 gigas_menu_blokkat_disabled:0 "블로캇 비활성화"
 giga_blokkat_join.1000.c.deathmode:0 "블록캣은 우리를 위협이라 여깁니다. 협상에 응하지 않을 것입니다."
 giga_blokkat.3236.name:0 "블록캣 억제 연결체 완성!"
 giga_blokkat.3236.desc:0 "§Y[giga_system.GetName]§! 성계에서 §Y블록캣 억제 연결체§!가 완성되었습니다. 성계의 천체 중 한 곳의 위에 건설되어, 이제 블록캣을 무력화할 기회가 있다면, 블록캣 단일 개체를 억제할 수 있습니다.\n\n블록캣을 억제하는 것의 기본 유지비는 대량 £energy£ §Y1000§!이지만, 일단 블록캣을 억제하는데 성공하면 구조물은 각 연구 분야마다 §Y750§!을 생산할 것이며, 우리의 §Y블록캣 연구 속도§!도 §Y20%§! 상승시킬 것입니다.\n\n블록캣은 무력화되고 억제되었다 하더라도 무시무시하게 발달된 존재들이므로 §R반드시§! 그들을 항상 지켜봐야합니다."
 giga_blokkat.3236.a:0 "좋아."
 giga_blokkat.3234.name:0 "§Y[reprogrammed_blokkat.GetName]§! 재프로그래밍됨!"
 giga_blokkat.3234.desc:0 "§Y[blokkat_nexus_sytem.GetName]§! 성계의 §Y블록캣 억제 연결체§!가 성공적으로 §Y[reprogrammed_blokkat.GetName]§!(을)를 재프로그래밍 했으며, 우리의 것이 되었다고 보고했습니다.\n\n재프로그래밍을 하기 전에 블록캣이 어떻게든 무력화되어야하기 때문에, 그 과정은 매우 복잡하고 다소 위험하지만, 섬세한 의식 변환 작전이 끝났을 때 §Y[reprogrammed_blokkat.GetName]§!(은)는 우리의 국기 아래에서 지도자로 활동할 §Y[ROOT.GetName]§!의 자발적이며 충성스러운 시민이 되었습니다.\n\n비록 §Y[reprogrammed_blokkat.GetName]§!(은)는 §Y블록워크§! 연결이 없고, 안전을 위해서 억제가 능력 저하를 가져온다는 점 때문에 일반적인 블록캣과 같은 능력을 가지지는 않지만, 그럼에도 불구하고 곧 매우 유능하며 능력 있는 지도자가될 것입니다.\n\n여하튼, 이 기술적 위업은 블록캣 문명 전체에 대한 우리의 투쟁을 도와줄 위대한 승리로 남을 것입니다. §Y[reprogrammed_blokkat.GetName]§!의 이전 §Y블록캣 억제 연결체§!가 이제 비었으며 필요하다면 또다른 블록캣을 맞이할 준비가 되었습니다."
 giga_blokkat.3234.a:0 "[ROOT.GetName]에 온 것을 환영한다!"
 giga_blokkat.3234.a.tooltip:0 "§Y[reprogrammed_blokkat.GetName]§!(은)는 이제 지도자이며 특성은 블록캣의 §Y주 관심사§!와 §Y성격§!에 의해 정해집니다."
 giga_blokkat.3000.blokkreprogram:0 "포획한 §Y블록캣§!의 §G재프로그래밍§! 방법 제시 | $blokkat_knowledge$ §Y35§!"
 giga_blokkat.3000.blokkreprogram.tooltip:0 "블록캣에 대한 우리의 이해와 관련된 최근의 진보를 활용한다면, 어떻게든 포획한 블록캣을 우리의 것으로 바꿀 방법을 찾을 수 있을지도 모릅니다. 물론, 그다지 윤리적이지 않은 것 같지만, 그들은 우리 은하계를 집어 삼켜온 존재들입니다."
 giga_blokkat.3231.name:0 "블록캣 재프로그래밍"
 giga_blokkat.3231.desc:0 "어떻게든 블록캣을 우리의 것으로 바꾸는 것은 쉽지 않습니다. 우리는 이 존재의 중앙 처리 장치를 \"해킹\"하여 블록캣의 의식을 만드는 복잡한 다차원 에너지 기반 신경망을 어떻게든 재배열해야 합니다. 다행히도, 이 전에 말했듯이, 우리의 §Y블록캣 연구 기관§!에 따르면 그들을 보호하는 경이로운 §Y블록워크§!의 부재가 이 과정을 가능성의 영역으로 가져왔다고 합니다.\n\n일반적으로, 블록캣이 본래 더 고분고분할수록, 블록캣이 그들의 내면 잠재의식의 상태에 더욱 의존하므로 이 과정은 더 쉬워집니다. 그러므로 더 §G협조적인§! 블록캣이 §R불만인§! 블록캣보다 더 쉽게 재프로그래밍될 것입니다.\n\n힘든 작업이지만, 그 끝에 주어질 것은 §Y포획한 블록캣§!을 우리 제국을 위한 매우 강력한 §Y지도자§!로 바꿀 능력입니다.\n\n이 기술의 예상 비용은 §Y3M§!입니다."
 giga_blokkat.3231.a:0 "당장 착수해라."
 giga_blokkat.3231.b:0 "지금은 안된다."
 giga_blokkat.3232.name:0 "의식 개조 프로토콜"
 giga_blokkat.3232.desc:0 "블록캣 재프로그래밍에 대한 우리의 노력 끝에, 우리 연구팀이 이제 충분한 연구력이 있다면, 반항적인 §Y포획한 블록캣§!을 우리 제국의 매우 자발적이며 강력한 §Y지도자§!로 바꿀 수 있다고 장담합니다. 이러한 행위의 윤리적인지에 대해서는 의문이 생기지만, 그들은 어쨌든 블록캣이 우리의 존재에 대한 어떠한 고려도 없이 우리의 은하계 전체를 집어삼킴으로써 이를 시작했다고 주장합니다. 그래서 윤리적인 논쟁을 혼란스럽게 만들었습니다.\n\n하여튼, 우리는 이제 억제 연결체를 통해 포획한 블록캣 모두를 §Y재프로그래밍§!할 수 있게 되었습니다. §G협조적인§! 블록캣을 재프로그래밍하는데에는 $blokkat_knowledge$ §Y35§!가, §L무관심한§! 블록캣은 §Y40§! 그리고 §R불만인§! 블록캣은 §Y45§!가 필요합니다. 우리의 과학자들에 따르면, 블록캣의 §Y주 관심사§!가 지도자 유형을 결정하고고 §Y성격§!은 추가적인 특성을 줄 것이라고 합니다.\n\n블록캣을 재프로그래밍하는 것은 §B블록캣 연구 프로젝트§!에 포함되지 않으며 과정은 준비가 되면 언제든지 시작할 수 있습니다."
 giga_blokkat.3232.a:0 "정말 좋군."
 giga_blokkat.3232.a.tooltip:0 "현재 억제기에 들어있는 모든 §Y붙잡힌 블록캣§!을 §Y재프로그래밍§!할 수 있습니다."
 only_1_reprogram:0 "한 번에 한 블록캣만 재프로그래밍할 수 있습니다."
 cant_reprogram_if_experiment:0 "실험의 결과가 먼저 나올때까지 기다려야합니다."
 blokkat_reprogram_title:0 "§H결정 잠금해체§!: 블록캣 재프로그래밍\n블록캣 지식: §G+1§!"
 giga_tech_blokkat_reprogram:0 "블록캣 의식 개조"
 giga_tech_blokkat_reprogram_desc:0 "터무니없이 정교하고 비싼 방법을 사용하여 블록캣의 마음을 조심스럽게 개조합니다. 우리는 그들의 충성을 원래 그들의 문명에서 우리에게로 \"전환\"할 수 있을지도 모릅니다."
 giga_blokkat.3233.name:0 "§Y[blokkat_prisoner_being_viewed.GetName]§! 재프로그래밍"
 giga_blokkat.3233.desc:0 "우리의 기술적 기초가 충분히 진전되었고, 이제 §Y[blokkat_prisoner_being_viewed.GetName]§!의 의식을 재프로그래밍할 수 있습니다. 이는, 성공한다면, 그들을 우리 제국내에서 이용될 강력한 지도자로 바꿀 것입니다.\n\n우리는 재프로그래밍을 하기 위해서는 관련 §Y특별 프로젝트§!를 완료해야하고 한 번에 붙잡힌 블록캣 §Y하나§!를 재프로그래밍할 수 있습니다. 당연하게도, 블록캣이 §R불만§!스러워하면 프로젝트의 비용이 더 높아질 것이고, §G협조적§!이라면 더 낮아질 것입니다.\n\n§Y[blokkat_prisoner_being_viewed.GetName]§!의 §Y주 관심사§!가 지도자 유형을 결정하며 §Y성격§!은 추가적인 특성을 부여할 것입니다. 이 과정은 §B블록캣 연구 프로젝트§!에 포함되지 않습니다."
 giga_blokkat.3233.a:0 "계속 진행하지!"
 giga_blokkat.3233.b:0 "다시 생각해보니, 나중에 하는게 낫겠군."
 REPROGRAM_COOPERATIVE_BLOKKAT:0 "§G협조적인§! 블록캣 재프로그래밍"
 REPROGRAM_COOPERATIVE_BLOKKAT_DESC:0 "포획한 블록캣의 의식을 초차원 \"수술\"을 통해 매우 섬세하게 개조하면 이 존재를 우리 제국에 충성스러운 지도자로 바꿀 수 있습니다."
 REPROGRAM_INDIFFERENT_BLOKKAT:0 "§L무관심한§! 블록캣 재프로그래밍"
 REPROGRAM_INDIFFERENT_BLOKKAT_DESC:0 "포획한 블록캣의 의식을 초차원 \"수술\"을 통해 매우 섬세하게 개조하면 이 존재를 우리 제국에 충성스러운 지도자로 바꿀 수 있습니다."
 REPROGRAM_DISPLEASED_BLOKKAT:0 "§R불만인§! 블록캣 재프로그래밍"
 REPROGRAM_DISPLEASED_BLOKKAT_DESC:0 "포획한 블록캣의 의식을 초차원 \"수술\"을 통해 매우 섬세하게 개조하면 이 존재를 우리 제국에 충성스러운 지도자로 바꿀 수 있습니다."
 REPROGRAM_CATASTROPHIC_BLOKKAT:0 "§P재앙과도 같은§! 블록캣 재프로그래밍"
 REPROGRAM_CATASTROPHIC_BLOKKAT_DESC:0 "붙잡은 블록캣의 의식을 초차원 \"수술\"을 통해 매우 섬세하게 개조하면 이 존재를 우리 제국에 충성스러운 지도자로 바꿀 수 있습니다. 아마도요."
 must_have_conducted_3_experiments_on_blokkat:0 "§Y블록캣 억제 연결체§!에서 포획한 블록캣에 대해 실험을 수행하여 §Y3§! 이상의 $blokkat_knowledge$을 모아야 합니다."
 giga_blokkat.3230.name:0 "블록캣의 마음"
 giga_blokkat.3230.desc:0 "지난 몇 년간 축적할 수 있었던 많은 양의 $blokkat_knowledge$으로, §Y블록캣§!에 대한 억제와 실험에 대한 책임을 진 과학자들이 이 포획한 블록캣의 장기적인 사용법에 대한 잠재적으로 획기적인 생각을 낳았습니다.\n\n사실, 그들은 우리가 블록캣 구조에 대해 얻은 지식들로, 블록캣의 마음에 \"해킹\"하여 어떻게든 그것을 \"재프로그래밍\"할 수 있다고 말했습니다. 이는 우리가 사실상 이 포획한 블록캣을 §Y모집§!하여 그들을 우리 제국의 여느 종족들과 같이 고용할 수 있다는 것입니다.\n\n아니나다를까, 그 제안은 꽤나 터무니없는 것이라고 여겨졌습니다. 블록캣의 내면은 다른 지성체의 것보다 훨씬 더 복잡하기 때문입니다. 더욱이, 우리가 실수로 블록캣의 마음을 파괴하거나 더럽히지 않고 충성심을 그들의 문명에게서 우리에게로 전환하기 위해서는, 사실상 대상 블록캣의 잠재의식 그 자체를 개조해야한다는 것입니다.\n\n그러나, 일반적으로 §Y블록워크§!가 그러한 행동을 즉시 감지하고 수정함으로써, 이를 완전히 불가능하게 만들지만, 포획된 블록캣은 그들의 종족으로부터 완전히 고립되었으며 따라서 그들의 마음을 개조하는 것이 완전히 불가능의 영역은 아닐 지도 모릅니다. 이 프로젝트에 충분한 연구력을 투자한다면 말입니다.\n\n§B블록캣 연구 프로젝트§!가 생성되었으며 충분한 $blokkat_knowledge$이 있다면 그 제안을 구체화할 수 있을지도 모릅니다."
 giga_blokkat.3230.a:0 "과하다고 생각하지만, 이미 이 시점에 과하지 않은 것이 있을까?"
 giga_blokkat.3230.a.tooltip:0 "새로운 §B블록캣 연구 프로젝트§!를 §Y블록캣 연구 기관§!에서 연구 가능합니다."
 giga_blokkat.3200.name:0 "블록캣 목격정보"
 giga_blokkat.3200.desc:0 "블록캣들은 우리와 우리 문명에 대해 매우 관심이 적은 것으로 알려져 있지만, 그들의 이러한 태도에 반하는 현상이 최근 몇달 간 우리의 행성 여러 곳에서 발생했습니다.\n\n이러한 이야기들은 블록캣에 대한 경계심이 만들어낸 허위 사실이라 여겨졌지만, 최근 §Y블록캣 단일 개체§!들의 목격담이 사실로 확인되었습니다. 그들이 등장한 여러 행성들로부터의 보고에 따르면 이 개체들은 공격적이지 않으며 대면하려고 하거나 위협하면 사라진다고 합니다.\n\n이런 수수께끼 등장들의 목적은 아직 밝혀지지 않았지만 그들의 얌전하고 때로는 무관심한 태도를 보면 아마 이 개체들은 그저 블록캣들이 주장하는 그들의 종말이 오기 전에 은하의 문명들을 방문하고 그 데이터를 기록하는 것이라고 생각합니다. 블록캣들이 §Y블록워크§!를 통해 동료들에게 보내는 데이터는 이 가설을 지지합니다.\n\n하지만 이번 방문들은 우리 §Y블록캣 연구 기관§! 내에서 제정신이라면 고려하지도 않을 아이디어로 이어졌습니다: 우리가 만약 이들을 §R포획§! 할 수 있다면 어떻게 될까? 연구진들에 의하면 살아있는 블록캣을 가까이서 관찰하고 연구할 수 있다면 우리의 $blokkat_knowledge$의 발전에 기여할 것이며 이 침략자들에 대한 이해도 또한 높아질 것입니다.\n\n이 작전의 타당성을 평가하기 위해 §B블록캣 연구 프로젝트§!가 새로 고안되었습니다."
 giga_blokkat.3200.a:0 "대담한 제안이군."
 giga_blokkat.3200.a.tooltip:0 "새로운 §B블록캣 연구 프로젝트§!가 §Y블록캣 연구 기관§!에서 연구가 가능합니다."
 giga_blokkat.3201.name:0 "블록캣 올가미"
 giga_blokkat.3201.desc:0 "살아있는 블록캣의 포획은 상당히 매력적인 계획이지만 매우 어려울 것으로 보입니다.\n\n우리의 사회학 연구에 의하면 모든 블록캣들은 §Y블록워크§!를 통해 서로와 연결되어 있으며 순식간에 에너지와 데이터를 전송할 수 있습니다.\n\n따라서 우리가 블록캣을 포획하려면 최소한 완전히 격리될 때까지 §Y블록워크§!와의 연결을 §R단절§!시킬 수 있는 방법을 찾아냐 할 것입니다.\n\n또한 블록캣이 차원 터널링을 통해 탈출하지 못하도록 구속할 수 있는 거대 구조물을 건설해야 할 것입니다. 이 두가지를 모두 실현시킨다면 블록캣을 무력화한 뒤 연구가 가능한 억제장에 가두는 것이 가능할지도 모릅니다.\n\n마지막으로 이 블록캣들은 필요시 위협에 대응할 수 있는 능력을 가지고 있으므로 §Y블록워크§!와 연결이 단절된 그들을 무력화하는 과정에서 격렬한 지상 전투가 벌어질 것으로 보입니다."
 giga_blokkat.3201.a:0 "이를 진행하자..."
 giga_blokkat.3201.a.tooltip:0 "이 기술의 비용은 약 §Y1.25M§! 입니다\n$cant_do_another_blokkat_project_tech_tooltip$"
 giga_blokkat.3201.b:0 "아직 너무 위험하다."
 giga_tech_blokkat_snare:0 "블록워크 절단 프로토콜"
 giga_tech_blokkat_snare_desc:0 "블록캣들 개개인의 블록워크 연결을 절단하고 그들을 무력화함으로써, 그들의 탈출을 막을 충분한 시설이 있다면 궁극적으로 그들을 억제할 수 있을지도 모릅니다. 이는 초차원 공간 내에 블록캣을 가둘 특수한 억제장의 건설을 필요로할 것입니다."
 blokkat_snare_mega_title:0 "§H결정 잠금해체§!: 블록캣 포획\n§H거대 구조물 잠금해체§!: 블록캣 억제 연결체"
 blokkat_snare_mega_desc:0 "블록캣 단일 개체를 억제하기 위해 고안된 거대한 궤도 시설입니다."
 giga_blokkat.3202.name:0 "블록캣 포획 프로토콜"
 giga_blokkat.3202.desc:0 "대규모의 연구에 따라, 우리의 §Y블록캣 연구 기관§!은 이 구경 온 블록캣을 포획하는데 사용할 수 있는 방안을 구체화했습니다.\n\n우선 우리는 우리 영토의 아무 행성 위에 §Y블록캣 억제 연결체§!를 건설해야합니다. 각각의 §Y블록캣 억제 연결체§!은 §Y1§! 개의 블록캣을 수용할 수 있습니다. 비어있는 억제 연결체가 있고, 블록캣이 우리 행성 중 한 곳에서 발견된다면, 우리는 이에 대한 정보를 듣고  £energy£를 사용해 초차원 파동을 방출하여 블록캣과 §Y블록워크§!를 끊어 탈출하거나 증원을 부르지 못하게할 수 있습니다.\n\n그리고나서 우리는 직접 §Y지상군§!을 보내 교전해야하므로, 그 행성 주위에 강력한 군대를 두는 것이 현명할 것입니다.\n\n전투에서 블록캣의 무기를 이기는데 성공한다면, 블록캣을 §Y블록캣 억제 연결체§!로 이송하여 대량의 연구 이익을 얻고 그들의 난해한 구조에 대한 직접적인 연구를 할 수 있을 것입니다.\n\n§B우리 행성에 나타난 블록캣에 대한 알림을 받으려면, 영토 내에 최소한 한 곳 이상의 비어있는 블록캣 억제 연결체가 있어야 합니다.§!"
 giga_blokkat.3202.a:0 "알겠다. 잘 되었으면 좋겠군..."
 giga_blokkat.3202.a.tooltip:0 "§Y블록캣 포획§! 작전을 따라가기 위한 새로운 §G블록캣 연구 작업§!이 가능합니다."
 giga_blokkat.3000.paluushia:0 "§Y팔루시아§! §G조사§!"
 giga_blokkat.3000.paluushia.tooltip:0 "분명히 팔루시아와 블록캣은 중요한 관계가 있습니다. 팔루쉬가 가지고있을 지도 모를 모든 $blokkat_knowledge$을 얻기 위해서, 우리는 행성과 팔루쉬를 철저하게 조사해야합니다.\n\n§G얻을 수 있는 최대 지식: §Y?§!\n§G지식 습득: §Y[ROOT.blokkat_knowledge_earned_by_paluush]§!§!"
 giga_blokkat.3000.capture:0 "§Y블록캣§! 개체 §G포획§! | 포획한 블록캣: §Y[ROOT.captured_blokkat_count]§!"
 giga_blokkat.3000.capture.tooltip:0 "호기심 많은 블록캣은 가끔씩 우리 행성을 방문하여 우리에 대한 정보를 얻고 다가가면 바로 사라집니다. 최소한 한 곳 이상 비어있는 §Y블록캣 억제 연결체§!가 있다면, §Y블록캣§!이 우리 행성 중 한 곳에서 §Y발견§!되면 알림을 받을 것이며, 우리는 £energy£를 사용하고 §Y지상군§!을 활용해 무력화할 수 있습니다.\n\n무력화된 블록캣은 비어있는 아무 §Y블록캣 억제 연결체§!로 이송될 것이며, 각각은 블록캣 단일 개체만을 수용할 수 있습니다. 우리는 억제 연결체 내에 수용된 블록캣으로부터 대량의 연구를 얻을 것이며 추가 테스트를 수행할 수 있습니다.\n\n각각의 포획한 블록캣은 우리의 §Y블록캣 연구 속도§!를 §G15%§! 가속시킵니다.\n\n§B우리 행성에서 발견된 블록캣에 대한 알림을 받으려면 최소 한 곳 이상의 블록캣 억제 연결체가 비어있어야만 합니다.§!\n\n§G얻을 수 있는 최대 지식: §Y?§!\n§G지식 습득: §Y[ROOT.blokkat_knowledge_earned_by_capture]§!§!"
 giga_blokkat.3204.name:0 "블록캣 발견됨!"
 giga_blokkat.3204.desc:0 "§Y[ROOT.GetName]§!의 우리 행성을 탐사하던 §Y블록캣§!이 발견되었습니다!\n\n우리의 의도를 알아차리지 못했고 현재 장비로 보아, £energy£ §Y[owner.blokkat_containment_ec_cost]§! 정도가 있다면 §Y블록워크§!와의 연결을 끊을 수 있을 것입니다.\n\n단 하나의 블록캣임에도 불구하고, 이 \"구경 온\" 블록캣은 일반적으로 도망칠 수 없는 위협과 마주쳤을 때 사용될 매우 강력한 무기를 가지고 있습니다. 그들의 기술을 고려할 때, 우리가 그것을 무력화시키려 한다면, 강력한 지상군이 전장에 신속하게 뛰어들 수 있도록 해야함은 당연합니다."
 giga_blokkat.3204.a:0 "전진하라! | £energy£ §Y[owner.blokkat_containment_ec_cost]§!"
 giga_blokkat.3204.a.tooltip:0 "-£energy£ §Y[owner.blokkat_containment_ec_cost]§!\n§Y[ROOT.GetName]§!의 §Y블록캣§!이 §R적대적§!으로 변함"
 giga_blokkat.3204.b:0 "아직 준비가되지 않았다."
 giga_blokkat.3205.name:0 "블록워크 끊김!"
 giga_blokkat.3205.desc:0 "대량의 에너지를 초차원 공간으로 퍼부음으로써, 우리는 §Y[ROOT.GetName]§!에 홀로 있는 §Y블록캣§!을 §Y블록워크§!로부터 절단시켰습니다.\n\n그 존재는 맹렬하게 탈출하려고 하지만, 이내 전 처럼 텔레포트할 수 없다는 것을 깨달았습니다. 우리 군대와 마주하고 구석에 몰려서, 혼란스러운 블록캣은 무기를 가동하여 도망치기 위해 즉시 우리의 군대와 교전했습니다.\n\n빠르고 단호해야합니다. 블록캣이 우리 군대를 압도한다면, 블록캣은 재빨리 성간 우주로 도망쳐 다시는 볼 수 없을 것입니다."
 giga_blokkat.3205.a:0 "숨쉴 틈을 주지 마라!"
 giga_blokkat.3206.name:0 "블록캣이 우리 군대를 압도하다!"
 giga_blokkat.3206.desc:0 "우리 군대가 §Y[FromFrom.GetName]§!에서 강력한 §Y블록캣§! 단일 개체를 무력화하는데 실패했습니다. 우리의 지상군을 무찌른 뒤, 그 존재는 우리 시설 몇 곳을 지독하게 파괴하고 혼란에 빠진 우리 군대가 반응하기 전에 빠르게 우주로 도망쳤습니다.\n\n§Y[FromFrom.GetName]§!(이)가 받은 피해는 적지만, 이는 우리의 블록캣 관련 작전에 심각한 타격을 주었습니다."
 giga_blokkat.3206.a:0 "제기랄! 빌어먹을!"
 giga_blokkat.3206.a.tooltip:0 "§Y[FromFrom.GetName]§!(이)가 §Y10§!의 §R황폐도§!를 얻습니다.\n§R블록캣 불안도§!를 §Y0.25§! 얻습니다."
 giga_blokkat.3220.name:0 "§Y[blokkat_prison_with_breach.solar_system.GetName]§!에서 블록캣 억제장 돌파됨!"
 giga_blokkat.3220.desc.cooperative:0 "우리의 §Y블록캣 억제 연결체§!가 §Y[blokkat_prison_with_breach.solar_system.GetName]§! 성계 내에 억제되었던 블록캣, §Y[blokkat_prison_breacher.GetName]§!(이)가 현재 §R억제장을 탈출§!하려는 위험한 시도를 하고 있다고 보고했습니다.\n\n그 존재가 아직 완전히 탈출하지는 못했지만, 주요 억제장을 탈출했고 탈출하기 위해 구조물 전체를 물어뜯고 있습니다. 연결체의 직원들이 §Y[blokkat_prison_breacher.GetName]§!(을)를 막고 그들의 지정 억제장으로 돌려보내는데 £energy£ §Y[ROOT.blokkat_breach_ec_cost]§! 및 £alloys£ §Y[ROOT.blokkat_breach_alloy_cost]§! 정도면 충분하리라고 추정했습니다.\n\n§Y[blokkat_prison_breacher.GetName]§!(이)가 §G협조적인§! 태도를 보이므로, 탈출한다면 그들은 그냥 성간 우주로 도망가 다시는 돌아오지 않을 것입니다."
 giga_blokkat.3220.desc.indifferent:0 "우리의 §Y블록캣 억제 연결체§!가 §Y[blokkat_prison_with_breach.solar_system.GetName]§! 성계 내에 억제되었던 블록캣, §Y[blokkat_prison_breacher.GetName]§!(이)가 현재 §R억제장을 탈출§!하려는 위험한 시도를 하고 있다고 보고했습니다.\n\n그 존재가 아직 완전히 탈출하지는 못했지만, 주요 억제장을 탈출했고 탈출하기 위해 구조물 전체를 물어뜯고 있습니다. 연결체의 직원들이 §Y[blokkat_prison_breacher.GetName]§!(을)를 막고 그들의 지정 억제장으로 돌려보내는데 £energy£ §Y[ROOT.blokkat_breach_ec_cost]§! 및 £alloys£ §Y[ROOT.blokkat_breach_alloy_cost]§! 정도면 충분하리라고 추정했습니다.\n\n§Y[blokkat_prison_breacher.GetName]§!(이)가 §L무관심한§! 태도를 보이므로, 우주로 도망가거나 우리를 공격하려할 수도 있습니다."
 giga_blokkat.3220.desc.displeased:0 "우리의 §Y블록캣 억제 연결체§!가 §Y[blokkat_prison_with_breach.solar_system.GetName]§! 성계 내에 억제되었던 블록캣, §Y[blokkat_prison_breacher.GetName]§!(이)가 현재 §R억제장을 탈출§!하려는 위험한 시도를 하고 있다고 보고했습니다.\n\n그 존재가 아직 완전히 탈출하지는 못했지만, 주요 억제장을 탈출했고 탈출하기 위해 구조물 전체를 물어뜯고 있습니다. 연결체의 직원들이 §Y[blokkat_prison_breacher.GetName]§!(을)를 막고 그들의 지정 억제장으로 돌려보내는데 £energy£ §Y[ROOT.blokkat_breach_ec_cost]§! 및 £alloys£ §Y[ROOT.blokkat_breach_alloy_cost]§! 정도면 충분하리라고 추정했습니다.\n\n§Y[blokkat_prison_breacher.GetName]§!(이)가 §R불만스러운§! 태도를 보이므로, 탈출한다면 그들은 매우 적대적으로 변할 것입니다."
 giga_blokkat.3220.a:0 "무슨 수를 쓰더라도 다시 억제해라! | £energy£ §Y[ROOT.blokkat_breach_ec_cost]§! & £alloys£ §Y[ROOT.blokkat_breach_alloy_cost]§!"
 giga_blokkat.3220.a.tooltip:0 "§Y[blokkat_prison_breacher.GetName]§!(이)가 §Y안전하게 다시 억제§!될 것입니다."
 giga_blokkat.3220.b:0 "감당할 수 없군."
 giga_blokkat.3220.b.tooltip:0 "§Y[blokkat_prison_breacher.GetName]§!(이)가 보이는 §G협조적인§! 태도 때문에 그 블록캣은 §Y성간 우주로 사라질 것입니다.§!"
 giga_blokkat.3220.c:0 "감당할 수 없군."
 giga_blokkat.3220.c.tooltip:0 "§Y[blokkat_prison_breacher.GetName]§!(이)가 보이는 §L무관심한§! 태도 때문에 그 블록캣은 §Y성간 우주로 사라지거나§! §H적대적으로 변할 것입니다.§!"
 giga_blokkat.3220.d:0 "감당할 수 없군."
 giga_blokkat.3220.d.tooltip:0 "§Y[blokkat_prison_breacher.GetName]§!(이)가 보이는 §R불만스러운§! 태도 때문에 그 블록캣은 §H적대적으로 변하거나§!, §R더 나쁜 일이 일어날 수 있습니다...§!"
 giga_blokkat.3221.name:0 "§Y[blokkat_prison_breacher.GetName]§! 탈출함!"
 giga_blokkat.3221.desc:0 "§Y[blokkat_prison_with_breach.solar_system.GetName]§!의 §Y블록캣 억제 연결체§!가 §Y[blokkat_prison_breacher.GetName]§!(을)를 재억제하는데 실패했습니다.\n\n다행히도, 블록캣의 태도 때문에, §Y[blokkat_prison_breacher.GetName]§!(은)는 우리 시설에 추가적인 피해를 입히지 않고, 그냥 성간 우주로 날아가기로 했습니다.\n\n연결체는 다시 한 번 비었으며 우리가 포획할 새로운 블록캣을 환영할 준비가 되었습니다."
 giga_blokkat.3221.a:0 "유감스럽지만, 그러한 위험한 개체를 억제하는 데에는 위험이 따릅니다..."
 giga_blokkat.3221.a.tooltip:0 "§Y[blokkat_prison_breacher.GetName]§!(이)가 §Y성간 우주로 사라졌습니다.§!\n\n§Y[blokkat_prison_with_breach.solar_system.GetName]§!의 §Y블록캣 억제 연결체§!가 다시 한 번 비었습니다.\n\n§R블록캣 불안도§!를 §Y0.25§! 얻습니다."
 giga_blokkat.3225.name:0 "§Y[blokkat_prison_breacher.GetName]§!(이)가 억제장 돌파!"
 giga_blokkat.3225.desc:0 "§Y[blokkat_prison_with_breach.solar_system.GetName]§!의 §Y블록캣 억제 연결체§!가 §Y[blokkat_prison_breacher.GetName]§!(을)를 재억제하는데 실패했습니다.\n\n현재 블록캣이 §R적대화§! 상태이며 우리 함선을 향해 공격을 시작했습니다. 다행히도, 연결체가 예상하길, 우리 함대가 이를 제압할 수 있다면, 탈출을 막고 다시 재억제할 수 있으리라 예상합니다.\n\n그러나 그들은 블록캣이 다시 스스로를 §Y블록워크§!에 재연결하고 완전히 우리 손을 떠날 때까지 단 §Y2 개월§! 밖에 남지 않았다고 경고했습니다."
 giga_blokkat.3225.a:0 "당장 저 블록캣을 막아라!"
 giga_blokkat.3225.a.tooltip:0 "§Y[blokkat_prison_breacher.GetName]§!(이)가 §Y성간 우주로 떠나버리기§! 전에 §R무력화§!할 시간이 §Y2 개월§! 있습니다."
 giga_blokkat.3226.name:0 "§Y[blokkat_prison_breacher.GetName]§! 탈출함!"
 giga_blokkat.3226.desc:0 "§Y[blokkat_prison_breacher.GetName]§!(을)를 무력화하고 재억제하는데 실패하였습니다.\n\n그 주위의 모든 함선에 대해 공격을 한 뒤, 블록캣은 §Y블록워크§!에 재연결 하였고 즉시 성계에서 탈출하여, 영원히 우리 손을 빠져나갔습니다.\n\n연결체는 다시 한 번 비었으며 우리가 포획할 새로운 블록캣을 환영할 준비가 되었습니다."
 giga_blokkat.3226.a:0 "제기랄!"
 giga_blokkat.3226.a.tooltip:0 "§Y[blokkat_prison_breacher.GetName]§!(이)가 §Y성간 우주로 사라졌습니다.§!\n\n§Y[blokkat_prison_with_breach.solar_system.GetName]§!의 §Y블록캣 억제 연결체§!는 다시 한 번 비었습니다.\n\n§R블록캣 불안도§!를 §Y0.5§! 얻습니다."
 giga_blokkat.3227.name:0 "§Y[blokkat_prison_breacher.GetName]§! 재억제됨!"
 giga_blokkat.3227.desc:0 "§Y[blokkat_prison_breacher.GetName]§!(을)를 무력화하고 재억제하는데 성공했습니다.\n\n이어서 블록캣은 억제장에 다시 수감되었고 현재 다시 실험을 당할 준비가 되었습니다."
 giga_blokkat.3227.a:0 "잘했다!"
 giga_blokkat.3227.a.tooltip:0 "§Y[blokkat_prison_breacher.GetName]§!(이)가 억제장으로 돌아갔습니다."
 giga_blokkat.3223.name:0 "§R최악의 블록캣 탈출 상황§!"
 giga_blokkat.3223.desc:0 "걱정스러운 소식입니다! §Y[blokkat_prison_with_breach.solar_system.GetName]§! 성계의 §Y블록캣 억제 연결체§!가 §Y[blokkat_prison_breacher.GetName]§!(이)가 완전히 §R억제장을 탈출했고§! 이어서 우주로 도망쳤다고 보고했습니다.\n\n그러나, §R불만인§! 블록캣이 현재 복수에 광분하여 재활성화된 무기를 사용하여 우리의 §Y블록캣 억제 연결체§!를 끔찍하고 완전히 §R파괴§!했고 연결체 내의 물질을 활용해 §R더 많은 블록캣§!을 만들어냈습니다. §Y[blokkat_prison_breacher.GetName]§!(은)는 즉시 거대한 §Y블록워크§!에 재연결했으며 현재 이 새로이 만들어진 블록캣에 의식을 자동 다운로드하기 위해 이를 사용하고 있습니다.\n\n그것과 새로운 블록캣이 이제 훨씬 더 많은 블록캣을 만들어내기 위해 근처의 천체를 해체하려 움직이고 있습니다. 결과적으로 훨씬 더 많은 블록캣을 만들어내려 할 것입니다.\n\n더이상 탈출한 블록캣을 재억제할 희망은 없습니다. 이제 우리는 빠르게 행동하여 §Y[blokkat_prison_breacher.GetName]§! 때문에 폭포처럼 블록캣 종말로 이어지기 전에 이를 제거해야합니다."
 giga_blokkat.3223.a:0 "전투 준비!"
 giga_blokkat.3223.a.tooltip:0 "§Y[blokkat_prison_breacher.GetName]§!(이)가 §R탈출했고§! 현재 §R더 많은 블록캣을 만들어내기§! 위해 §R행성을 수확하고 있습니다.§!\n\n§Y[blokkat_prison_with_breach.solar_system.GetName]§!의 §Y블록캣 억제 연결체§!가 §R파괴되었습니다!§!\n\n§R블록캣 불안도§!를 §Y2§! 얻습니다."
 giga_blokkat_individual:0 "블록캣 개체"
 giga_blokkat_individual_plural:0 "블록캣 개체"
 BLOKKAT_INDIVIDUAL:0 "핵"
 megastructures_produces_mult:0 "거대 구조물 자원 생산량"
 giga_blokkat.3207.name:0 "블록캣 포획!"
 giga_blokkat.3207.desc:0 "치열한 싸움 끝에, 우리 군대가 §Y[FromFrom.GetName]§!에서 홀로 있는 블록캣을 무력화하는데 성공했습니다. 비록 그 존재의 완전한 파괴는 우리가 반응하기엔 너무도 빠르게 그들의 문명에 경고를 보낼 것이 틀림 없으므로 불가능하지만, 그럼에도 불구하고 우리의 공격은 그 무기 대부분을 무력화하고 일시적으로 그 존재를 무의식 상태로 만들었습니다.\n\n블록캣이 주변에 반응하지 못할 중요한 몇 분 동안, 그 존재의 놀라우리만큼 효율적인 자가 수리 시스템이 시작되고 다시 움직이기 전에 우리는 이를 §Y[newest_blokkat_prison.solar_system.GetName]§! 성계의 §Y블록캣 억제 연결체§!로 빠르게 이송했습니다.\n\n다행히도, 그때 쯤 §Y[newest_blokkat_prisoner.GetName]§!이라 알려진듯한 블록캣은 §Y블록워크§!와 단절되도록 초차원 억제장에 안전하게 수용되었고, 고차원을 통해 탈출할 수 없습니다. 게다가, 그 장이 블록캣을 가능한 한 순종적이게 하기 위해 적극적으로 블록캣의 사고력을 진정시키고 있습니다.\n\n나머지 블록캣이 갑작스러운 실종을 알아차리지 못하게 하기 위해, 억제 연결체가 블록워크를 \"해킹\"하여 현재 블록워크 내에서 §Y[newest_blokkat_prisoner.GetName]§!의 에너지 표시를 복제해서 네트워크가 §Y[newest_blokkat_prisoner.GetName]§!(이)가 여전히 은하를 돌아다니고 있다고 생각하도록 속이고 있습니다.\n\n거대 구조물 메뉴의 §Y억제 연결체 관리§!를 눌러 §Y[newest_blokkat_prisoner.GetName]§!의 억제 연결체를 관리할 수 있습니다."
 giga_blokkat.3207.a:0 "정말 좋군! 위험하지만 매우 가치가 높았다."
 giga_blokkat.3207.a.tooltip:0 "§Y[newest_blokkat_prisoner.GetName]§!(이)가 현재 우리 제국 내에 억제되어있습니다. 우리는 억제 연결체의 관리 메뉴를 사용해 연구를 수행하고 $blokkat_knowledge$을 얻을 수 있습니다.\n\n§R블록캣이 얼마나 협조적인지와 무관하게, 그들은 매우 지능적이며 위험한 존재입니다. 비록 우리가 어떻게든 그들의 지적 처리 능력을 \"제한\"하려고 하지만, 이 억제된 블록캣은 우리의 의도를 의식하고 있으며 그들을 면밀히 감시해야할 것입니다.§!\n\n"
 blokkat_prison_1_empty:0 "$gc_blokkat$블록캣 억제 연결체"
 blokkat_prison_1_empty_DESC:0 "이 블록캣 억제 연결체는 연구를 수행할 포획한 블록캣 단일 개체를 수용할 준비가 되었습니다."
 blokkat_prison_1_empty_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_blokkat$ - $giga_list_category_science_production$\n실험 대상인 §Y붙잡힌 블록캣§!을 수용하고 있으며, 기본 유지비는 £energy£ §Y1000§!입니다\n$giga_list_potentially_hazardous$\n§L블록캣 단일 개체를 억제할 수 있는 매우 값비싼 거대 구조물입니다."
 blokkat_prison_1_filled:0 "블록캣 억제 연결체"
 blokkat_prison_1_filled_DESC:0 "이 블록캣 억제 연결체는 블록캣 단일 개체를 수용하고 있으며, 블록캣은 블록워크로부터 단절되고 매우 진보된 초차원 억제장에 갇혀있습니다."
 blokkat_prison_1_manage:0 "억제 연결체 관리"
 blokkat_prison_1_manage_DESC:0 "포획한 블록캣에 수행되는 연구를 관리합니다."
 blokkat_prison_already_doing_this:0 "현재 이 연구를 수행하고 있습니다."
 giga_blokkat.3211.name:0 "§Y[blokkat_prisoner_being_viewed.GetName]§!에 대한 실험"
 giga_blokkat.3211.desc:0 "§Y[blokkat_prisoner_being_viewed.GetName]§!(이)가 우리의 §Y블록캣 억제 연결체§! 내에 견고하게 억제되고 있으므로, 우리는 이제 그 존재에게 일련의 실험과 연구의 수행을 고려하고 있습니다. 블록캣이 어떻게 작동하고 그들의 \"구조\"가 정확히 어떻게 작동하는지를 말입니다.\n\n블록캣의 엄청난 회복력 덕분에, 이 실험들은 비-살상적이고 우리에게 가치있는 $blokkat_knowledge$을 생산할 것입니다. 실험을 시작하려고 결정했다면, 이 §Y블록캣 억제 본부§!가 $blokkat_knowledge$을 §Y1§! 생산하기까지 §Y[ROOT.blokkat_prison_research_time]§! 개월이 걸릴 것입니다. 그 후에 우리는 또다른 일련의 실험을 시작할 수 있을 것입니다.\n\n$blokkat_knowledge$ §Y1§!을 생산하는데 걸리는 시간은 매 번 §Y50%§!씩 증가할 것이지만, 우리는 다른 억제 본부에 붙잡힌 다수의 블록캣이 있다면, 동시에 여러 개의 실험을 시작할 수 있습니다."
 giga_blokkat.3211.a:0 "진행해라."
 giga_blokkat.3211.a.tooltip:0 "§Y[ROOT.blokkat_prison_research_time]§! 개월 후에 $blokkat_knowledge$을 §Y1§! 얻을 것입니다.\n§Y억제 본부§!의 관리 화면에서 실험의 진척도를 확인할 수 있습니다."
 giga_blokkat.3211.b:0 "아무것도 아니다."
 giga_blokkat.3210.experiment:0 "실험이 진행중입니다! §Y[blokkat_prison_being_managed.blokkat_experiment_duration]§! 개월 후에 완료될 것입니다."
 blokkat_experiment_ongoing:0 "실험 진행 중"
 giga_blokkat.3212.name:0 "실험 끝남"
 giga_blokkat.3212.desc:0 "§Y[blokkat_prison_experiment_complete.solar_system.GetName]§! 내에 위치한 §Y블록캣 억제 본부§!가 포획한 §Y블록캣§!에 대한 일련의 실험을 끝마쳤습니다.\n\n이어서 우리는 $blokkat_knowledge$을 §Y1§! 획득하였고 준비가 됐다면 또다른 일련의 실험을 시작할 수 있습니다."
 giga_blokkat.3212.a:0 "마음에 드는데!"
 giga_blokkat.3212.a.tooltip:0 "$blokkat_knowledge$을 §Y1§! 얻습니다."
 giga_blokkat.3210.reprogram:0 "§Y[blokkat_prisoner_being_viewed.GetName]§! 재프로그래밍 시도 | $blokkat_knowledge$ §Y40§!"
 blokkat_requires_40_knowledge_and_project:0 "§Y[blokkat_prisoner_being_viewed.GetName]§!의 §L무관심한§! 태도 때문에 $blokkat_knowledge$이 최소 §Y40§! 필요하며 적합한 §B블록캣 연구 프로젝트§!를 완료해야 합니다."
 giga_blokkat.3210.reprogram.angry:0 "§Y[blokkat_prisoner_being_viewed.GetName]§! 재프로그래밍 시도 | $blokkat_knowledge$ §Y45§!"
 blokkat_requires_45_knowledge_and_project:0 "§Y[blokkat_prisoner_being_viewed.GetName]§!의 §R불만인§! 태도 때문에 $blokkat_knowledge$이 최소 §Y45§! 필요하며 적합한 §B블록캣 연구 프로젝트§!를 완료해야 합니다."
 giga_blokkat.3210.reprogram.catastrophic:0 "§Y[blokkat_prisoner_being_viewed.GetName]§! 재프로그래밍 시도 | $blokkat_knowledge$ §Y55§!"
 blokkat_requires_55_knowledge_and_project:0 "§Y[blokkat_prisoner_being_viewed.GetName]§!의 §P재앙과도 같은§! 태도 때문에 $blokkat_knowledge$이 최소 §Y55§! 필요하며 적합한 §B블록캣 연구 프로젝트§!를 완료해야 합니다."
 giga_blokkat.3210.reprogram.cooperative:0 "§Y[blokkat_prisoner_being_viewed.GetName]§! 재프로그래밍 시도 | $blokkat_knowledge$ §Y35§!"
 blokkat_requires_35_knowledge_and_project:0 "§Y[blokkat_prisoner_being_viewed.GetName]§!의 §G협조적인§! 태도 때문에 $blokkat_knowledge$이 최소 §Y35§! 필요하며 적합한 §B블록캣 연구 프로젝트§!를 완료해야 합니다."
 giga_blokkat.3210.release:0 "§Y[blokkat_prisoner_being_viewed.GetName]§! 해방"
 giga_blokkat.3210.release.tooltip:0 "§Y[blokkat_prisoner_being_viewed.GetName]§!(을)를 억제하는 것이 비실용적이 되었다면, 우리는 그들을 §P해방§!할 수 있습니다. 이는 그들의 §Y억제 연결체§!를 개방하고 거대 구조물의 유지비를 급격히 감소시키지만, 또다른 블록캣을 포획하기까지 어떠한 연구도 수행할 수 없습니다."
 giga_blokkat.3210.knowledge:0 "$blokkat_knowledge$ 생산 | £energy£ §Y75000§! & £influence£ §Y25§!"
 giga_blokkat.3210.physics:0 "§B블록캣 동력원§! 연구 집중"
 giga_blokkat.3210.physics.tooltip:0 "§Y블록워크§!에서 끊겼음에도, 블록캣 개체는 여전히 능력이 뛰어난 기계입니다. 이 존재에 동력을 공급하는 근본 원리를 이해하는 것은 매우 중요합니다.\n\n§Y억제 연결체의 물리학 연구 생산량을 §Y500§! 증가시키지만, 나머지 두개는 §Y250§! 감소합니다.§!"
 giga_blokkat.3210.society:0 "§G블록캣 심리학§! 연구 집중"
 giga_blokkat.3210.society.tooltip:0 "일반적으로 §Y블록워크§!에 의해 서로 연결된 반면, 블록캣은 그들 자신의 정신과 심리가 있는 개별 존재입니다. 우리는 블록캣을 더 잘 이해하기 위해 그들이 정확히 어떻게 생각하고 느끼는지 연구해야합니다.\n\n§Y억제 연결체의 사회학 연구 생산량을 §Y500§! 증가시키지만, 나머지 두개는 §Y250§! 감소합니다.§!"
 giga_blokkat.3210.engineering:0 "§H블록캣 구조§! 연구 집중"
 giga_blokkat.3210.engineering.tooltip:0 "단일 블록캣 개체가 최고 정예군을 제외한 모든 군대를 능가하는 것은 그저 놀라울 따름입니다. 이 블록캣의 구조는 기회가 있을 때마다 반드시 연구되어야 합니다.\n\n§Y억제 연결체의 공학 연구 생산량을 §Y500§! 증가시키지만, 나머지 두개는 §Y250§! 감소합니다.§!"
 giga_blokkat.3210.nofocus:0 "§L모든 것§!을 균등히 연구"
 giga_blokkat.3210.nofocus.tooltip:0 "우리는 블록캣 구조를 이루는 모든 측면을 균등하게 연구해야 합니다.\n\n§Y억제 연결체는 균등한 양의 물리학, 사회학 그리고 공학 연구를 생산합니다.§!"
 giga_blokkat.3210.name:0 "블록캣 억제 연결체"
 giga_blokkat.3210.desc:0 "§Y이름§!: [blokkat_prisoner_being_viewed.GetName]\n\n§Y나이§!: [blokkat_prisoner_being_viewed.blokkat_age_value]\n\n§Y주 관심사§!: [blokkat_prisoner_being_viewed.blokkat_prisoner_leader_type]\n\n§Y성격§!: [blokkat_prisoner_being_viewed.blokkat_prisoner_personality]\n\n§Y태도§!: [blokkat_prisoner_being_viewed.blokkat_prisoner_behavior]"
 giga_blokkat.3210.bye:0 "§B블록캣 억제 연결체 나가기§!"
 prison_blokkat_is_catastrophic:0 "§P재앙과도 같은§! - §P이 블록캣의 움직임과 잦은 공격으로 인해 억제 연결체가 막대한 피해를 입고 있습니다.§!\n§R억제 연결체 유지비 증가§! £alloys£§Y150§!"
 prison_blokkat_is_angry:0 "§R불만임§! - [blokkat_prisoner_being_viewed.GetName](이)가 억제된 것을 좋아하지 않다. 그들은 억제장에서 탈출하기 위해 자주 그리고 폭력적인 시도를 할 것이며 이는 그들에 대한 연구를 어렵게 만들 것입니다.\n§R억제 연결체 유지비 증가§! £energy£ §Y500§!"
 prison_blokkat_is_indifferent:0 "§L무관심함§! - [blokkat_prisoner_being_viewed.GetName](은)는 그들의 현재 상황에 거의 신경쓰지 않습니다. 블록캣의 엄청난 수명은 그들에게 남은 날에 비하면 억제되어있는 시간은 별 의미가 없어보입니다."
 prison_blokkat_is_cooperative:0 "§G협조적임§! - [blokkat_prisoner_being_viewed.GetName](은)는 놀라울 정도로 협조적이며 탈출은 거의 시도하지 않습니다. 심지어는 자신과 블록캣 종족에 대한 정보도 제공합니다.\n§G모든 연구 생산량 §Y250§! 증가"
 prison_blokkat_is_psionic:0 "§M사이오닉광§! - [blokkat_prisoner_being_viewed.GetName](은)는 그들의 몸에 부착된 엄청나게 강력한 인공 사이오닉 방출기 덕분에 엄청난 사이오닉 잠재력을 가지고 있습니다."
 prison_blokkat_is_keen:0 "§R대담하고 자신만만함§! - 붙잡힌 이 블록캣은 엄청나게 대담하며 행동에 뛰어드는 것에 열정적입니다. 그들의 태도는 매우 불규칙적이며 가끔씩 억제장을 탈출하거나 억제 시설을 시험해보려고 합니다.\n§R억제 연결체 유지비 증가§! £energy£ §Y200§!"
 prison_blokkat_is_ambitious:0 "§E야심찬§! - 붙잡힌 이 블록캣은 야심차며 거대한 규모의 공학 프로젝트에 매료된 것으로 소문이 났습니다."
 prison_blokkat_is_mineralizer:0 "§L조광자§! - 붙잡힌 이 블록캣은 산업 체계의 효율성을 높이는 방식 뿐만 아니라, 수확 활동 중에 최대한의 자원을 얻는 방법에 관심이 있습니다."
 prison_blokkat_is_combative:0 "§H전투적인§! - 붙잡힌 이 블록캣은 전투 기술과 다른 전투 관련 주제에 특히나 관심을 보이지만, 그들은 대부분 실제로 싸우기를 원하기 보다는 이론에 집중합니다."
 prison_blokkat_is_speed_freak:0 "§G속도광§! - 이 블록캣은 속도의 개념과 최대한 빠르게 움직이는 것에 이상하리만큼 집착합니다. 그들은 억제 연결체에 가만히 있어야 한다는 것을 좋아하지 않습니다.\n§R억제 연결체 유지비 증가§! £energy£ §Y400§!"
 prison_blokkat_is_primitive_enthusiast:0 "§Y원시인 애호가§! - [blokkat_prisoner_being_viewed.GetName](은)는 소위 '원시' 문명이라는 것에 이상한 흥미를 가지고 있습니다. '실험'을 해서 원시인들에 대해 더 알고자 하는 것 이상으로, 때로는 심각하게 비틀린 욕망을 가지고 있습니다.\n§G억제 연결체 생산량 증가§! £society_research£ §Y400§!"
 prison_blokkat_is_catgirl:0 "§M쾌활한§! - [blokkat_prisoner_being_viewed.GetName](은)는 우리와 같은 존재가 보았을 때 유쾌하다 여겨지는 모습을 보입니다. '귀엽다'고 느껴지는 행동을 함으로써 관찰자로부터 관심과 애정을 이끌어냅니다.\n§G억제 연결체 생산량 증가§! £unity£ §Y200§!"
 prison_blokkat_is_omnitae:0 "§G미의 추구자§! - [blokkat_prisoner_being_viewed.GetName](은)는 다양한 종족의 생물학과 미학을 연구합니다. 특히나 '수컷'의 것을 말입니다. 개개인의 미를 가꾸고 매력적이라고 느껴지는 개념을 무척 좋아합니다.\n§G억제 연결체 생산량 증가§! £unity£ §Y200§!"
 prison_blokkat_is_blokkazoi_personality:0 "§R오류§! - §P이 블록캣은 쉬지 않고 움직이며 모든 소통을 무시합니다. 감지기에는 쓰레기 데이터만 들어오고 있습니다.§!\n§R억제 연결체 유지비 증가§! £unity£ §Y100§!"
 prison_blokkat_is_blokkeff:0 "§G무역 전문가§! - [blokkat_prisoner_being_viewed.GetName](은)는 원시인들의 경제적 사건과 상호작용 하는 것을 즐기는 것 처럼 보입니다. 우리가 행성에서 더 많은 가치를 얻을 수 있도록 도와주는 것에 이상하리만치 관심을 보입니다.\n§G억제 연결체 유지비 감소§! £energy£ §Y200§!"
 trait_blokkat_blokkeff:0 "무역 전문가"
 trait_blokkat_blokkeff_desc:0 "이 블록캣은 '원시' 문명의 경제적 사건과 상호작용 하는 것을 즐기는 것 처럼 보입니다. 또한 모든 수단을 사용해 부를 축적하는데에 비정상적인 집착을 가지고 있는 듯 합니다."
 prison_blokkat_is_breadkat:0 "§G원형 애호가§! - [blokkat_prisoner_being_viewed.GetName](은)는 온갖 종류의 동그란 것, 특히 행성 궤도에 큰 관심을 가지고 있습니다. 또한 '원시' 링월드에 특이한 관심을 가지고 있는 듯 한데, 링월드를 분해하고 다시 조립하기를 영원히 반복해도 좋다고 생각하는 듯 합니다.\n§G억제 연결체 생산량 증가§! £engineering_research£ §Y400§!"
 prison_blokkat_is_blokkloris:0 "§G광적인 수문학자§! - 블록컨스트럭트 보호소에 있는 원시 바리온 생명체를 관리하고 돌보는 것에 열심인 [blokkat_prisoner_being_viewed.GetName](은)는 댐을 건설하고 유기 환경을 조작하는데에 집착을 가지고 있습니다. 또한 관리에만 능숙한 것이 아니라, 반항을 깔아 뭉개는 데에도 극히 능숙합니다.\n§G억제 연결체 생산량 증가§! £engineering_research£ §Y400§!"
 prison_blokkat_is_governor:0 "§S국가건설§! - 이 특이한 블록캣은 우리의 문명과 흡사한 행성에 묶인 문명을 발전시키는 복잡함에 큰 흥미를 가지고 있는 듯 합니다."
 prison_blokkat_is_scientist:0 "§B과학 연구§! - [blokkat_prisoner_being_viewed.GetName](은)는 블록캣의 과학적 기초를 발전시키는데에 관련된 모든 것에 꽤나 흥미를 보이는 것이 확실합니다."
 prison_blokkat_is_admiral:0 "§P은하간 전쟁§! - 이 블록캣은 그들의 길을 막아선 강력한 문명과 맞선 한 번 혹은 여러 번의 은하간 전쟁에 참여한 듯 합니다."
 prison_blokkat_is_general:0 "§G행성 병참§! - 일반적으로 블록캣 스스로가 하는 것은 아니지만, [blokkat_prisoner_being_viewed.GetName](은)는 '원시' 문명이 서로 지상전을 할 때 사용하는 전략과 전술에 매료되었습니다."
 prison_blokkat_is_blokkazoi_interests:0 "§R위험§! - §P이 블록캣은 완전히 예측 불가능합니다. 또한 일종의 비전 '찌르기' 장치인 그것의 무기를 분리할 수 없는 듯 합니다.§! "
 individual_blokkat:0 "홀로 있는 블록캣"
 individual_blokkat_desc:0 "블록캣 한 개체가 외계 행성을 탐사 중입니다."
 NAME_blokkat_army:0 "홀로 있는 블록캣"
 blokkat_not_enough_energy:0 "에너지가 부족합니다."
 giga_blokkat.3000.blokkcapture:0 "§Y블록캣 포획 장치§!를 생각해보라 | $blokkat_knowledge$ §Y10§!"
 giga_blokkat.3000.blokkcapture.tooltip:0 "우리 행성에서 최근 발견된 블록캣은 어떻게든 살아있는 블록캣을 포획하고 연구하는데에 대한 가능성을 열어주었습니다. 상당한 비용이 들 지도 모르지만 지나치기엔 연구 잠재성이 너무 좋습니다."
 giga_blokkat.3000.blokkatsgone:0 "블록캣을 물리쳤습니다! 연구할 것이 별로 없습니다."
 blokkat_shield_killer_energy:0 "초차원 발전기"
 blokkat_shield_killer_energy_DESC:0 "이 거대 구조물은 고차원에 공간에 구멍을 내어 가치있는 연구를 수행할 수 있습니다. 이는 고차원 공간에서 에너지를 끌어내는 거대한 발전기로도 사용됩니다."
 blokkat_shield_killer_influence:0 "초차원 발전기"
 blokkat_shield_killer_influence_DESC:0 "이 거대 구조물은 고차원에 공간에 구멍을 내어 가치있는 연구를 수행할 수 있습니다. 이는 무시무시한 블록캣에 대한 한 문명의 승리 기념비로 사용됩니다."
 giga_blokkat.1032.name:0 "불안정제의 목적"
 giga_blokkat.1032.desc:0 "§Y블록캣-베스터§!가 파괴되었으므로, §Y초차원 불안정제§!는 더 이상 원래 목적을 수행할 수 없습니다. 따라서, 우리는 무시무시한 블록캣의 위협 없이도 구조물을 유용하게 사용할 방안을 찾아야 합니다. 그리하여, 거대 구조물을 사용하기 위한 두 가지 제안이 나왔습니다.\n\n양쪽의 경우 모두, 거대 구조물은 초차원 공간을 연구할 거대한 연구 실험실의 역할을 하지만, 실질적인 전문화는 아직 결정되지 않았습니다. 첫 번째 제안은 거대 구조물을 이용해 우리 우주의 고차원 공간으로부터 에너지를 \"수확\"하는 것으로, 거의 확실하게 상당한 이익을 가져다 줄 것이며 블록캣의 수확 과정과 유사합니다.\n\n아니면, 우리는 구조물을 모든 존재에게 개방하여 승리의 기념비로 사용할 수도 있습니다. 이는 대량의 §Y영향력§!, §Y통합력§!, 그리고 §Y외교 가중치§!와 더불어 엄청난 연구 또한 생산할 것입니다.\n\n양쪽 제안 모두, 초차원 공간에 대한 데이터를 출력할 것입니다. 이 데이터가 어떤 결과로 이어질까요?"
 giga_blokkat.1032.a:0 "에너지 수확에 사용하지."
 giga_blokkat.1032.a.tooltip:0 "§Y초차원 불안정제§!가 이제 §Y초차원 발전기§!로 알려질 것입니다. 이는 적은 유지비로 §R매우 막대한§! 양의 §Y에너지§!와 §Y물리학 연구§!를 생산할 것입니다."
 giga_blokkat.1032.b:0 "이는 우리의 영광스러운 기념비가 될 것이다!"
 giga_blokkat.1032.b.tooltip:0 "§Y초차원 불안정제§!는 이제 §Y초차원 발전기§!로 알려질 것입니다. 이는 높은 §Y에너지§! 유지비로 대량의 §Y물리학 연구§!, §Y영향력§!, §Y통합력§! 그리고 §Y외교 가중치§!를 생산할 것입니다."
 giga_blokkat.1033.name:0 "불안정제 해체됨"
 giga_blokkat.1033.desc:0 "§Y블록캣-베스터§!의 파괴와 함께, 우리의 불완전한 §Y초차원 불안정제§!는 더 이상 쓸모가 없어졌습니다.\n\n그리하여, 건설에 들어간 자원을 회수하기 위해 이 거대 구조물을 이제 해체할 것입니다."
 giga_blokkat.1033.a:0 "알겠다."
 giga_blokkat.1033.a.tooltip:0 "우리의 §Y초차원 불안정기§!는 §R해체§!되었습니다."
 giga_blokkat.1043.name:0 "과학선 수확됨"
 giga_blokkat.1043.desc:0 "과정이라는 이름 하에, 우리 과학선 중 하나가 최후의 희생을 했으며 §Y블록-해체자§!에게 수확당했습니다. 측정 장비와 다양한 실험을 가득 채운 그 함선은 블록캣의 방식을 직접 경험했습니다.\n\n함선이 완전히 소멸하고 초에너지적 기본 입자 슬러리로 바뀌는데 단 수 초 밖에 걸리지 않았고, 이는 그 후 에너지로 변환되었습니다. 하지만 우리가 얻은 데이터는 매구 귀중합니다. §Y블록-해체자§!는 고차원 내에서부터 정말 말 그대로 시공간을 \"당기는\" 듯 하며, 이와 함께 모든 것을 끌어 모아 모든 물질을 그들의 구성 입자로 갈아버리고 결국 순수한 에너지로 바꿉니다. 그리고 나서 함선이 에너지를 수집하고 보고된 바에 따르면 §Y블록캣-베스터§!에게로 보내어진다고 합니다.\n\n에너지가 정확히 어디로 가는지는 알려지지 않았지만 측정 결과 10억 광년 이상 떨어진 중심 위치로 보내지고 있는 것으로 나타났습니다. 여하튼, 이 실험은 우리에게 귀중한 $blokkat_knowledge$을 주었고 이는 분명 우리의 블록캣 관련 연구 작업에 도움이 될 것입니다."
 giga_blokkat.1043.a:0 "필요한 희생이였다."
 giga_blokkat.1043.a.tooltip:0 "$blokkat_knowledge$을 §Y3§! 얻습니다."
 giga_blokkat.1040.name:0 "블록-해체자 파괴됨!"
 giga_blokkat.1040.desc.a:0 "우리 함대가 §Y[FromFromFrom.solar_system.GetName]§! 성계에서 작동하고 있던 블록캣의 거대한 §Y블록-해체자§! 중 하나를 성공적으로 파괴했습니다.\n\n거대한 함선은 방어 시스템의 완전한 고장과 함께 끔찍하게 폭발했으며, 현재 성계 내에서 수확 중이던 블록캣을 끝내버렸습니다.\n\n이는 우리에게 적합한 §G블록캣 연구 작업§!의 일부로써 $blokkat_knowledge$을 §Y3§! 주었고 우리의 연구 활동에 사용될 상당한 양의 $blokkat_scrap$ 또한 주었습니다. 이 매우 파괴적인 함선을 평정하는 것을 통해 블록캣의 도래를 현저하게 늦춤으로 우리의 §R블록캣 불안도§!를 §Y3§!만큼 줄여주었습니다.\n\n그러나 블록캣이 또다른 §Y블록-해체자§!와 그 호위 함대를 다가오는 몇 년 내에 재건할 가능성이 있으므로 조심해야합니다."
 giga_blokkat.1040.desc.b:0 "우리 함대가 §Y[FromFromFrom.solar_system.GetName]§! 성계에서 작동하고 있던 블록캣의 거대한 §Y블록-해체자§! 중 하나를 성공적으로 파괴했습니다.\n\n거대한 함선은 방어 시스템의 완전한 고장과 함께 끔찍하게 폭발했으며, 현재 성계 내에서 수확 중이던 블록캣을 끝내버렸습니다.\n\n우리는 연구 활동에 사용될 상당한 양의 $blokkat_scrap$도 획득했습니다. 이 매우 파괴적인 함선을 평정하는 것을 통해 블록캣의 도래를 현저하게 늦춤으로 우리의 §R블록캣 불안도§!를 §Y3§!만큼 줄여주었습니다.\n\n그러나 블록캣이 또다른 §Y블록-해체자§!와 그 호위 함대를 다가오는 몇 년 내에 재건할 가능성이 있으므로 조심해야합니다."
 giga_blokkat.1040.a:0 "마음에 드는데!"
 giga_blokkat.1040.a.tooltip:0 "$blokkat_knowledge$을 §Y3§! 얻습니다.\n§R블록캣 불안도§!가 §Y3§! 감소합니다.\n£blokkat_scrap_icon£ §Y40§!"
 giga_blokkat.1040.b:0 "아주 좋아."
 giga_blokkat.1040.b.tooltip:0 "£blokkat_scrap_icon£ §Y40§!\n§R블록캣 불안도§!가 §Y3§! 감소합니다."
 giga_blokkat.1041.name:0 "블록-해체자 파괴됨!"
 giga_blokkat.1041.desc:0 "§Y[destroyed_blokkat_dismantler_destroyer.GetName]§!의 군대가 §Y[destroyed_blokkat_dismantler_location.GetName]§! 성계 내의 §Y블록-해체자§!를 성공적으로 파괴했습니다.\n\n이는 블록캣의 수확 작업을 늦출 것이며 은하에게 초은하적 위협에 반응할 귀중한 시간을 벌어줄 것입니다. 이 매우 파괴적인 함선을 평정하는 것을 통해 블록캣의 도래를 현저하게 늦춤으로 우리의 §R블록캣 불안도§!를 §Y3§!만큼 줄여주었습니다."
 giga_blokkat.1041.a:0 "좋은 소식이군."
 giga_blokkat.1041.a.tooltip:0 "§R블록캣 불안도§!가 §Y1.5§! 감소합니다."
 giga_blokkat.3091.name:0 "플랑크-붕괴 광선"
 giga_blokkat.3091.desc:0 "우리의 §Y블록캣 연구 기관§!이 거의 모든 블록캣 함선이 사용하는 L 슬롯 레이저 함선 무기인 블록캣의 §Y플랑크-붕괴 광선§!의 설계도를 그려내는데 성공했습니다. 이 레이저 장치의 잠재적 파괴력 그 자체만으로도 최근의 은하 역사상 비슷한 크기의 어떤 것과도 비교가 안됩니다.\n\n이제 이 새로운 부품에 대해 적당한 연구를 수행하는 것은 우리의 몫입니다."
 giga_blokkat.3091.a:0 "즉시 시작하자!"
 giga_blokkat.3092.name:0 "4차원 특이점 화포"
 giga_blokkat.3092.desc:0 "우리의 §Y블록캣 연구 기관§!이 거의 모든 블록캣 함선이 사용하는 G 슬롯 미사일 함선 무기인 블록캣의 §Y4차원 특이점 화포§!의 설계도를 그려내는데 성공했습니다. 초기 설계 작업에 따르면 이 난해한 부품은 그 불쌍한 적에게 4차원 특이점을 내던지는것 같습니다.\n\n이제 이 새로운 부품에 대해 적당한 연구를 수행하는 것은 우리의 몫입니다."
 giga_blokkat.3092.a:0 "이 4차원 물건들은 다 뭐지?"
 giga_blokkat.3093.name:0 "블록-군집 개체"
 giga_blokkat.3093.desc:0 "우리의 §Y블록캣 연구 기관§!이 거의 모든 블록캣 함선이 사용하는 H 슬롯 무기인 블록캣의 §Y블록-군집 개체§!의 설계도를 그려내는데 성공했습니다. 보아하니 수십 개의 블록캣 같은 존재를 우주로 배치해 적 함선과 교전하는 것 같습니다.\n\n이를 위해 새로운 블록캣을 만들어낼 수는 없지만, 이를 대신하기에 충분한 유사한 무언가를 만들 수 있을 것입니다.\n\n이제 이 새로운 부품에 대해 적당한 연구를 수행하는 것은 우리의 몫입니다."
 giga_blokkat.3093.a:0 "훌륭해!"
 giga_blokkat.3103.name:0 "블록캣 위상변화 FTL"
 giga_blokkat.3103.desc:0 "우리의 §Y블록캣 연구 기관§!이 블록캣이 사용하는 주요 FTL 이동 방식인 블록캣의 §Y위상변화 FTL§!의 설계도를 그려내는데 성공했습니다.\n\n상당히 흥미롭게도, 블록캣 추진기와 블록캣 FTL 드라이브간의 효율 차이는 없습니다. 둘 다 이 위상변화 부품에 의존하며, 이는 초차원 공간 내에서부터 함선은 정말 말 그대로 \"끌어 당기며\" 거의 즉시 가속하고 감속할 수 있습니다.\n\n이제 이 새로운 부품에 대해 적당한 연구를 수행하는 것은 우리의 몫입니다."
 giga_blokkat.3103.a:0 "초차원 물건이 또 있군!"
 giga_blokkat.3104.name:0 "블록캣 반응로"
 giga_blokkat.3104.desc:0 "우리의 §Y블록캣 연구 기관§!이 블록캣의 주 동력 장치인 블록캣의 §Y반응로§!의 설계도를 그려내는데 성공했습니다.\n\n예상대로, 그 장치는 블록캣의 초차원 전력망으로부터 에너지를 빨아들입니다. 충분한 자원이 있다면 좀 더 작은 규모로 이를 복제할 수 있을 것입니다.\n\n이제 이 새로운 부품에 대해 적당한 연구를 수행하는 것은 우리의 몫입니다."
 giga_blokkat.3104.a:0 "흥미로워."
 giga_blokkat.3105.name:0 "블록캣 컴퓨터"
 giga_blokkat.3105.desc:0 "우리의 §Y블록캣 연구 기관§!이 블록캣의 함선을 관리하는 중앙 지능인 블록캣의 §Y함선 컴퓨터§!의 설계도를 그려내는데 성공했습니다.\n\n일반적으로 블록캣 선원과 긴밀하게 협력하지만, 우리는 이를 실제 블록캣을 이용하지 않고 우리 함선에 사용할 수 있도록 개조해야합니다. 두 종류의 컴퓨터가 개념화되었는데, 하나는 전함과 같은 함선을 위한 §Y포격§! 컴퓨터와 천체 전함과 같은 훨씬 거대한 함선 용도인 §Y모함§! 컴퓨터가 있습니다.\n\n이제 이 새로운 부품에 대해 적당한 연구를 수행하는 것은 우리의 몫입니다."
 giga_blokkat.3105.a:0 "훌륭해."
 giga_blokkat.3106.name:0 "초차원막 감지기"
 giga_blokkat.3106.desc:0 "우리의 §Y블록캣 연구 기관§!이 블록캣 함선이 주변 공간을 감지하고 분석하는 주요 방식인 §Y초차원막 감지기§!의 설계도를 그려내는데 성공했습니다.\n\n초기 분석에 따르면, 이 장치는 우리 우주의 초차원 구조 내에서 3차원 물질이 만들어내는 무한소의 진동을 이용한다고 합니다.\n\n이제 이 새로운 부품에 대해 적당한 연구를 수행하는 것은 우리의 몫입니다."
 giga_blokkat.3106.a:0 "아주 좋아."
 giga_blokkat.3101.name:0 "다면체 추진기"
 giga_blokkat.3101.desc:0 "우리의 §Y블록캣 연구 기관§!이 보조 속도 조정 부품인 블록캣의 §Y다면체 추진기§!의 설계도를 그려내는데 성공했습니다.\n\n블록캣은 기존의 추진기를 사용하지 않습니다. 하지만 그들은 이 특수하고 더 \"일반적인\" 추진기를 사용하며, 우리 우주의 구조 그 자체를 밀어내어 함선의 속도와 기동성을 훨씬 더 향상시킵니다.\n\n이제 이 새로운 부품에 대해 적당한 연구를 수행하는 것은 우리의 몫입니다."
 giga_blokkat.3101.a:0 "흥미롭군."
 giga_blokkat.3100.name:0 "초차원 축전기"
 giga_blokkat.3100.desc:0 "우리의 §Y블록캣 연구 기관§!이 주요 반응로가 충분하지 않을 때 현행의 함선에 더 많은 동력을 공급하는 보조 부품인, 블록캣의 §Y초차원 축전기§!의 설계도를 그려내는데 성공했습니다.\n\n또한 함선의 실질적인 화력을 높이기 위해 초차원으로부터의 에너지를 함선의 무기 시스템에 할당하는 것을 조정합니다.\n\n이제 이 새로운 부품에 대해 적당한 연구를 수행하는 것은 우리의 몫입니다."
 giga_blokkat.3100.a:0 "유용하겠어."
 giga_blokkat.3102.name:0 "서브플랑크 동기화기"
 giga_blokkat.3102.desc:0 "우리의 §Y블록캣 연구 기관§!이 함선 선체의 회복력을 향상시키는데 집중한 보조 부품인 블록캣의 §Y서브플랑크 동기화기§!의 설계도를 그려내는데 성공했습니다.\n\n이는 매우 작은 펨토 크기 로봇 무리로 이루어져 있으며, 블록캣 장갑 내에서 찾을 수 있는 아원자 신경망을 조정하여, 장갑이 항상 최고 효율로 작동하게 하고 함선이 받은 모든 피해를 빠르게 수리할 수 있습니다.\n\n이제 이 새로운 부품에 대해 적당한 연구를 수행하는 것은 우리의 몫입니다."
 giga_blokkat.3102.a:0 "기묘하군."
 giga_blokkat.3097.name:0 "완전 소각 블라스터"
 giga_blokkat.3097.desc:0 "우리의 §Y블록캣 연구 기관§!이 블록캣의 §Y완전 소각 블라스터§!의 설계도를 그려내는데 성공했습니다.\n\n이 무기는 플라스마 덩어리를 발사하며, 초차원 에너지 전송망으로부터 끌어낸 에너지가 끊임없이 공급되어 일반적인 물리학 법칙을 넘어선 온도를 달성합니다. 이를 복제하는 것은 엄청난 비용이 들겠지만, 우리 과학자들은 해낼 수 있다고 장담합니다.\n\n이제 이 새로운 부품에 대해 적당한 연구를 수행하는 것은 우리의 몫입니다."
 giga_blokkat.3097.a:0 "상당히 뜨겁군."
 giga_blokkat.3098.name:0 "5차원 집중 방출기"
 giga_blokkat.3098.desc:0 "우리의 §Y블록캣 연구 기관§!이 블록캣의 중추 무기인 §Y5차원 집중 방출기§!의 설계도를 그려내는데 성공했습니다.\n\n대부분의 블록캣 기술 파편이 그러하듯, 이 장치는 적의 방어를 \"뛰어\" 넘고 적 함선의 중심부를 직접 공격하기 위해 고차원 공간을 이용하여 모든 형태의 보호막과 장갑을 무시합니다.\n\n이제 이 새로운 부품에 대해 적당한 연구를 수행하는 것은 우리의 몫입니다."
 giga_blokkat.3098.a:0 "흥미롭군."
 giga_blokkat.3099.name:0 "축출 광선"
 giga_blokkat.3099.desc:0 "우리의 §Y블록캣 연구 기관§!이 현재 우리 은하에서 활동 중인 모든 함선에 사용되는 알려진 가장 큰 블록캣 무기, §Y축출 광선§!의 설계도를 그려내는데 성공했습니다.\n\n이는 무시무시한 블록캣 연구력의 정점으로써, 시공간을 찢어버리고 부분-붕괴된 초차원 공간에서 끌어낸 에너지 흐름을 방출하여 대상을 0차원 특이점으로 짖눌러 곧장 소멸시켜버립니다.\n\n엄청난 규모와 에너지 필요량 때문에, 이는 §Y베히모스 요새 행성§!과 §Y스텔라 시스템크래프트§!와 같은 §Y천체 전함§!에만 장착될 수 있습니다.\n\n이제 이 새로운 부품에 대해 적당한 연구를 수행하는 것은 우리의 몫입니다."
 giga_blokkat.3099.a:0 "끔직하군."
 giga_blokkat.3094.name:0 "플랑크 합금 단조판"
 giga_blokkat.3094.desc:0 "§Y블록캣 연구 사무실§!이, 플랑크 길이 규모의 입자에 기반을 둔 유형의 장갑인 블록캣의 §Y플랑크 합금 단조판§!에 대한 설계도를 작성하는데 성공했습니다.\n\n극도로 단단하게 압축되어, 극한 수준의 방어를 제공하며 아원자 신경망을 형성해 물질이 피해를 받으면 스스로 개조하게합니다. 신경망이 효율을 증가시키기 위해 §Y블록워크§!에 연결되었음이 밝혀졌기에, 이러한 연결에 대해 충분히 좋은 대체제를 만들어야 합니다.\n\n이제 이 새로운 부품에 대해 적당한 연구를 수행하는 것은 우리의 몫입니다."
 giga_blokkat.3094.a:0 "훌륭해."
 giga_blokkat.3095.name:0 "초차원 이전 방벽"
 giga_blokkat.3095.desc:0 "우리의 §Y블록캣 연구 기관§!이 훨씬 더 작지만 §Y블록캣 초차원 방벽§!과 상당히 유사한 보호막인 블록캣의  §Y초차원 이전 방벅§!의 설계도를 그려내는데 성공했습니다.\n\n거대한 형제와 비슷하게, 이 초고효율 보호막은 고차원 내에서 회전하며, 손상된 보호막 부분을 위험 상태에서 빼내어, 다시 회복할 수 있게 초차원 공간으로 빠르게 뒤섞어 놓습니다.\n\n이제 이 새로운 부품에 대해 적당한 연구를 수행하는 것은 우리의 몫입니다."
 giga_blokkat.3095.a:0 "4차원 물건이 더 있군, 좋아."
 giga_blokkat.3096.name:0 "블록-수호자 국지 대응책"
 giga_blokkat.3096.desc:0 "우리의 §Y블록캣 연구 기관§!이 블록캣의 §Y블록-수호자§! 국지 대응책의 설계도를 그려내는데 성공했습니다. 이는 목표 대상 주변의 현실 그 자체를 분열시킬 수 있는 네트워크화된 화포로 이루어져 있으며, 전에 본 적 없던 효율과 용이성으로 다가오는 투사체를 소멸시킵니다. 우리 함선을 위협하는 거의 모든 것을 격추할 수 있을 것입니다.\n\n이제 이 새로운 부품에 대해 적당한 연구를 수행하는 것은 우리의 몫입니다."
 giga_blokkat.3096.a:0 "정말 좋군."
 giga_blokkat.1027.name:0 "제국 파괴됨"
 giga_blokkat.1027.desc:0 "§Y블록캣§!이 §Y[country_killed_by_blokkats.GetName]§!(을)를 없애버렸습니다.\n\n이 초은하적 침략자의 손에 항성 문명 전체가 소멸하여 §R블록캣 불안도§!가 §Y1§! 생성되지만, £influence£ §Y50§!을 사용하여 불안도 상승량을 §Y절반§!으로 줄일 수 있습니다."
 giga_blokkat.1027.a:0 "비극이군. | §R블록캣 불안도§! §Y1§!"
 giga_blokkat.1027.b:0 "중요치 않다, £influence£ §Y50§!을 사용해라. | §R블록캣 불안도§! §Y0.5§!"
 giga_blokkat.1030.name:0 "블록캣-베스터 소멸됨"
 giga_blokkat.1030.desc:0 "그 난해한 보호막을 상실하여 엄청난 양의 고출력 화력에 노출된 §Y블록캣-베스터§!가 불안정해지기 시작했습니다.\n\n처음엔 알아차리지 못했지만, 계층화된 대응책의 연속적인 고장이 우리 무기의 화력에 의해 가속화되어 마침내 돌이킬 수 없는 지경에 빠졌습니다. 그 순간, 고차원 공간 안에서 함선을 둘러싼 초차원 구조물이 격렬하게 흔들렸고, 곧 우리의 현실로 추락했습니다.\n\n그러한 끔찍한 수준의 피해에 대처할 장비가 없는 §Y블록캣-베스터§!는, 함선의 파손된 뼈대에 쏟아지는 대량의 에너지에 의해 물리학 법칙이 찌그러지며 스스로 붕괴했습니다.\n\n결과로 초래된 차원적 충격파가 은하 내의 모든 블록캣 함선의 복잡한 초차원 부품을 붕괴시켰고, 거의 즉시 함선들이 파괴됐습니다. 급속도로 이어진 함선의 분해는 외은하 우주로 향한 수많은 FTL의 흔적만을 남겼습니다. 짐작건대 블록캣 개체들은 스스로 무적이라 생각했던 함대에 예상치 못한 재앙이 닥치자 급하게 도망친 것 같습니다.\n\n분해되고 있는 블록캣 함선이 방출하는 에너지의 쇄도가 우리의 감지기에 밀려들지 않을 때까지 시간이 좀 걸리겠지만, 결국 그것이 가라앉았을 때의 결과는 명백합니다.\n\n끝났습니다. 더 이상 블록캣은 없습니다."
 giga_blokkat.1030.a:0 "우리가 이겼다."
 giga_blokkat.1031.name:0 "블록캣이 완패하다"
 giga_blokkat.1031.desc:0 "§Y[blokkat_vanquisher.GetName]§!의 손에 파괴된 §Y블록캣-베스터§!는 우리 은하 내의 모든 블록캣 함선을 파괴시켰고, 살아남은 것들은, 당연하게도, 은하간 우주로 도망쳤습니다.\n\n고된 연구와 위험한 건설의 시기였지만 결국, §Y블록캣§!은 §Y[blokkat_vanquisher.GetSpeciesName]§!의 과학과 군사적 기량의 힘으로 우리 은하에서 쫓겨났습니다.\n\n먼 미래에 또다른 §Y블록캣-베스터§!가 우리 은하를 공격할 가능성은 여전히 존재하지만, 우리는 준비 되었습니다. 다행히도, 그들의 소중한 보호막을 뚫을 능력은 그들로 하여금 우리 은하 물질을 다시 수확하려는 시도를 단념하게 할 것입니다.\n\n하지만 이 승리에는 희생이 따랐습니다. 한 때 생기가 넘쳤던 항성계들이 은하간 우주처럼 텅 비게되었듯이, 현재의 은하는 블록캣의 수확 활동의 흉터를 입었습니다.\n\n어쩌면 이윽고, 우리의 은하가 겪고 있는 상처를 치료할 방법을 배우게될지도 모릅니다. 어쨌든 이제, 우리 은하의 지성체는 무시무시한 블록캣의 위협으로부터 마침내 자유로워졌습니다."
 giga_blokkat.1031.a:0 "마침내, 승리했다."
 giga_blokkat.1031.tooltip:0 "§R블록캣 불안§!과 그 효과가 진정되었습니다.\n\n하지만 어떤 프로젝트는 영원히 불가능해졌지만, 우리가 블록캣 부품을 역설계하길 원한다면 §Y블록캣 연구 기관§!을 여전히 사용할 수 있습니다.\n\n"
 giga_blokkat.50031.name:0 "블록캣 패배!"
 giga_blokkat.50031.desc:0 "우리의 우월한 전술과 지혜를 통해,§Y블록캣-베스터§!를 둘러싼 보호 대부분을 무시하는데 성공했으며, 한 번의 급습으로 파괴되었습니다!\n\n적어도 블록캣 위협은 더 이상 없으며 은하는 마침내 생각보다 강하지도 않았던 이 초은하적 수확자들로부터 자유로워짐에 기뻐할 수 있습니다."
 giga_blokkat.50031.a:0 "쉽군!"
 giga_blokkat.50031.a.tooltip:0 "이렇게 쉽게 얻은 승리를 자랑스러워해도됩니다!"
 giga_blokkat.5003.name:0 "블록캣-베스터 이상 없음"
 giga_blokkat.5003.desc:0 "§Y블록캣-베스터§!을 파괴하고자 사용했던 방법이 완전히 무의미해진 것 같습니다.\n\n사실, 파괴된 듯 했던 거대한 블록캣 모선이 갑자기 §Y[future_blokkat_mothership_system.GetName]§! 성계 안에서 완전히 멀쩡한 상태로 다시 나타났습니다. 더 조사를 해보니, 함선이 회피를 위해 일시적으로 고차원으로 점멸했고 어딘가 다른 곳에서 다시 나타났음이 밝혀졌습니다.\n\n§Y블록캣-베스터§!를 제대로 파괴하길 원한다면, 우리는 더 재래식 전술로, 그냥 우리의 손에서 탈출할 수 없도록 전쟁 전함으로 그 함선을 완전히 압도해버려야할 것 같습니다."
 giga_blokkat.5003.a:0 "이런."
 giga_blokkat.5004.name:0 "블록캣"
 giga_blokkat.5004.desc:0 "유감스럽게도 이 묘책은 전에 시도된 적이 있습니다.\n\n시간을 아끼기 위해, 나중에 이를 다시 시도하지 말아 주십시오.\n\n이해해주셔서 감사합니다."
 giga_blokkat.5004.a:0 "음... 어..."
 giga_blokkat.5004.a.tooltip:0 "이제 그 파티는 모두 취소해야겠군요.\n\n§R블록캣 불안도§!를 §Y10§! 얻습니다."
 giga_blokkat.5004.b:0 "음... 어..."
 giga_blokkat.5004.b.tooltip:0 "이제 그 파티는 모두 취소해야겠군요."
 needs_10_inquietude:0 "최소 §Y10§! §R블록캣 불안도§!가 있다면 시행할 수 있습니다."
 needs_15_inquietude:0 "최소 §Y15§! §R블록캣 불안도§!가 있다면 시행할 수 있습니다."
 needs_20_inquietude:0 "최소 §Y20§! §R블록캣 불안도§!가 있다면 시행할 수 있습니다."
 needs_40_inquietude:0 "최소 §Y40§! §R블록캣 불안도§!가 있다면 시행할 수 있습니다."
 edict_blokkat_elise_mega:0 "§R불안도 시행령:§! 엘리시안 공학 방식"
 edict_blokkat_elise_mega_desc:0 "블록캣을 막아내는 것을 도와줄 우리의 엄청난 거대 구조물을 건설함에는 낭비할 시간이 없습니다. 지체 없이 완성하기 위해서 건설에 가능한 한 많은 자원을 투자해야합니다. 이러한 방식은 비용이 더 클지도 모르지만, 우리 거대 구조물이 훨씬 더 일찍 준비될 것입니다.\n\n이 시행령을 사용하면 §R블록캣 불안도§!를 §Y2.5§!만큼 더 증가시킬 것입니다.\n\n§R블록캣 불안도§!가 최소 §Y15§! 이상 있을 때 시행할 수 있습니다."
 edict_blokkat_oriana_strikecrafts:0 "§R불안도 시행령:§! 오리아나급 타격기"
 edict_blokkat_oriana_strikecrafts_desc:0 "블록캣을 엄청난 숫자의 작은 타격기로 뒤덮는 것은 그들의 강력하지만 몇 없는 전함을 압도할 방법 중 하나일지도 모릅니다. 우리는 당장 이 기술에 투자해야합니다.\n\n이 시행령을 사용하면 §R블록캣 불안도§!를 §Y2.5§!만큼 더 증가시킬 것입니다.\n\n§R블록캣 불안도§!가 최소 §Y15§! 이상 있을 때 시행할 수 있습니다."
 edict_blokkat_buff_shield_mega:0 "§R불안도 시행령:§! 초. 불안정제 투자"
 edict_blokkat_buff_shield_mega_desc:0 "초차원 불안정제는 최종적으로 블록캣을 무찌를 유일한 희망이며, 따라서 우리는 이것의 건설에 가능한 모든 것을 쏟아 부어야만 합니다.\n\n§Y초차원 불안정제§!의 건설 속도를 대략 §Y80%§! 증가시킬 것입니다.\n\n이 시행령을 사용하면 §R블록캣 불안도§!를 §Y7.5§!만큼 더 증가시킬 것입니다.\n\n§R블록캣불안도§!가 최소 §Y15§! 이상 있을 때 시행할 수 있습니다."
 edict_blokkat_research_grants:0 "§R불안도 시행령:§! 블록캣 연구 승인"
 edict_blokkat_research_grants_desc:0 "§Y블록캣-베스터§!의 보호막에 대응할 방법을 알아내기 위해 우리의 블록캣-관련 연구에 모든 것을 투자해야합니다.\n\n이 시행령을 사용하면 §R블록캣 불안도§!를 §Y2.5§!만큼 더 증가시킬 것입니다.\n\n§R블록캣 불안도§!가 최소 §Y15§! 이상 있을 때 시행할 수 있습니다."
 edict_blokkat_research_grants_big:0 "§R불안도 시행령:§! 긴급 연구 승인"
 edict_blokkat_research_grants_big_desc:0 "시간이 얼마 없습니다, 우리는 블록캣을 파괴할 방법을 찾아야 합니다. 당장!\n\n이 시행령을 사용하면 §R블록캣 불안도§!를 §Y5§!만큼 더 증가시킬 것입니다.\n\n§R블록캣 불안도§!가 최소 §Y40§! 이상 있을 때 시행할 수 있습니다."
 edict_blokkat_walls:0 "§R불안도 시행령:§! 최대 증원"
 edict_blokkat_walls_desc:0 "우리가 더 긴급한 연구 문제에 집중하는 동안 우리의 영토 내부에 블록캣이 없도록 하는 것은 필수적입니다.\n\n이 시행령을 사용하면 §R블록캣 불안도§!를 §Y2.5§!만큼 더 증가시킬 것입니다.\n\n§R블록캣 불안도§!가 최소 §Y10§! 이상 있을 때 시행할 수 있습니다."
 edict_blokkat_emergency_evacuation:0 "§R불안도 시행령:§! 긴급 대피"
 edict_blokkat_emergency_evacuation_desc:0 "블록캣이 우리의 행성에 다가오고 있으며 따라서 우리의 사람들은 초은하적 채굴꾼이 도착하기 전에 안전하게 이송되어야만 합니다.\n\n이 §R불안도 시행령§!이 활성화된 동안, 재정착은 §Y무료§!가 되며 §Y행성 대피§! 결정을 사용해 행성의 사람들을 제국 전체로 완전히 대피시킵니다. 팝이 재정착되어서는 안되는 행성은 §Y행성 블랙리스트§! 결정을 사용해 표시될 수 있습니다.\n\n이 시행령을 사용하면 §R블록캣 불안도§!를 §Y5§!만큼 더 증가시킬 것입니다.\n\n§R블록캣 불안도§!가 최소 §Y20§! 이상 있을 때 시행할 수 있습니다."
 edict_blokkat_boom:0 "§R불안도 시행령:§! 블록캣 사냥 프로토콜"
 edict_blokkat_boom_desc:0 "연구는 잊어버리세요, 우리는 블록캣이 우리를 없애기 전에 가능한 한 많은 블록캣을 파괴하는데 집중해야만 합니다.\n\n이 시행령을 사용하면 §R블록캣 불안도§!를 §Y2.5§!만큼 더 증가시킬 것입니다.\n\n§R블록캣 불안도§!가 최소 §Y20§! 이상 있을 때 시행할 수 있습니다."
 edict_blokkat_combat_inquietude:0 "§R불안도 시행령:§! 공포증 방지"
 edict_blokkat_combat_inquietude_desc:0 "우리 문명의 대중이 블록캣에 의해 공포증에 빠지지 않도록 해야합니다. 엄중한 선전과 재교육은 우리의 대중이 침착하고 차분하게 만들 것입니다.\n\n이 시행령이 활성화된 동안, §R블록캣 불안도§!가 매년 §Y1§!씩 §Y10§!까지 감소할 것입니다.\n\n§R블록캣 불안도§!가 최소 §Y10§! 이상 있을 때 시행할 수 있습니다."
 decision_blokkat_blacklist_planet:0 "§R불안도 행성 결정:§! 대피 목적지 블랙리스트"
 decision_blokkat_blacklist_planet_desc:0 "이 세상은 우리 사람들에게 안전하지 못하며 이곳으로 대피해서는 안됩니다."
 decision_blokkat_blacklist_planet_effect:0 "블랙리스트로 설정하여 §Y블록캣 행성 대피§! 결정으로 팝이 이 행성으로 대피하지 §R못하게§! 하십시오."
 decision_blokkat_unblacklist_planet:0 "§R불안도 행성 결정:§! 블랙리스트 취소"
 decision_blokkat_unblacklist_planet_desc:0 "이 행성은 우리 사람들에게 다시 안전해졌으며 이곳으로 대피할 수 있습니다."
 decision_blokkat_unblacklist_planet_effect:0 "블랙리스트로 설정하여 §Y블록캣 행성 대피§! 결정으로 팝이 이 행성으로 §Y대피할 수 있게§! 하십시오."
 decision_blokkat_emergency_evacuation:0 "§R불안도 행성 결정:§! 행성 대피"
 decision_blokkat_emergency_evacuation_desc:0 "행성의 사람들이 끔찍한 운명을 맞이하지 않도록, 블록캣이 오기 전에 이들을 대피시켜야합니다."
 decision_blokkat_emergency_evacuation_effect:0 "이 행성의 사람들을 제국의 다른 곳으로 즉시 재정착할 수 있게 합니다. 블랙리스트 행성은 제외됩니다."
 giga_blokkat.1024.name:0 "행성 대피"
 giga_blokkat.1024.desc:0 "§Y[ROOT.GetName]§!의 상황이 심각해졌고 그 거주민들의 안전을 챙겨야합니다.\n\n우리는 이 행성을 §Y대피§!시킬 수 있고, 이는 이곳의 §Y모든 주민§!을 §Y블랙리스트§! 행성을 제외한 제국의 무작위 행성으로 옮길 것입니다.\n\n진행할까요?"
 giga_blokkat.1024.a:0 "진행해라."
 giga_blokkat.1024.b:0 "다시 생각해 보니, 지금은 아니다."
 giga_blokkat.1022.name:0 "끝없는 불안"
 giga_blokkat.1022.desc.normal:0 "블록캣은 기록된 은하 역사상 그 어떤 것보다도 엄청난 규모의 파괴를 저지르고 있습니다.\n\n대부분의 은하적 위기는 대개 일종의 잔해, 폐어 혹은 흉터를 남기고, 충분한 시간과 자원이 있다면 결국 복구 가능합니다. 이는 블록캣에는 해당이 되지 않는 듯 합니다. 그들의 수확 활동은 §Y블록-해체자§!의 손아귀에 있는 모든 것을 그냥 지워버리고, 한 때 빛나는 별과 생기 넘치는 행성이 있던 곳에 칠흑같은 공허만을 남깁니다.\n\n아니나 다를까, 블록캣의 냉혹한 잔인함은 그 존재만으로도 압박을 주었고, 이는 우리 사회의 모든 계층, 제일 하위 카스트부터 우리의 최고위 통치자들에게까지 빠르게 스며들었습니다. 현재 블록캣이 먼 곳에 있기에 §R블록캣 불안도§!라 불리는 이 압박감은 우리 문명에 적은 영향만을 미치고 있지만, 블록캣이 우리의 은하를 먹어 치울수록 이 불안도는 꾸준히 증가할 것으로 예상됩니다.\n\n§R블록캣 불안도§!는 §Y0§!에서 시작해 블록캣이 우리 은하의 §Y1%§!를 삼킬 때마다 §Y2§!씩 올라 최대 §Y100§!까지 상승합니다. 블록캣에 의한 절멸의 무시무시한 위협이 우리 은하에 가깝기 때문에 이 불안도는 우리 행성의 §Y안정도§!를 낮추고 §Y범죄§!를 늘릴 것이지만, 블록캣에 맞서 싸울 방법을 갈망하기 때문에 우리 연구자들의 생산량이 눈에 띄게 상승할 것입니다. 블록캣에게 흡수된 모든 §Y팝§! 또한 §R불안도§!를 상승시킬 것입니다.\n\n§R블록캣 불안도§!는 §Y블록캣 정보 기관§!을 통해 관리될 수 있습니다. 일정 수준의 §R불안도§!는 특별한 긴급 §R불안도 시행령§! 및 §R불안도 행성결정§!을 잠금 해제할 것이며 이는 우리 행성과 제국에 시행될 수 있습니다."
 giga_blokkat.1022.desc.gestalt:0 "블록캣은 기록된 은하 역사상 그 어떤 것보다도 엄청난 규모의 파괴를 저지르고 있습니다.\n\n대부분의 은하적 위기는 대개 일종의 잔해, 폐어 혹은 흉터를 남기고, 충분한 시간과 자원이 있다면 결국 복구 가능합니다. 이는 블록캣에는 해당이 되지 않는 듯 합니다. 그들의 수확 활동은 §Y블록-해체자§!의 손아귀에 있는 모든 것을 그냥 지워버리고, 한 때 빛나는 별과 생기 넘치는 행성이 있던 곳에 칠흑같은 공허만을 남깁니다.\n\n아니나 다를까, 블록캣의 냉혹한 잔인함은 그 존재만으로도 압박을 주었고, 이는 우리 군집의 모든 계층, 가장 낮은 두뇌 드론부터 가장 높은 자동의식에게 까지 빠르게 스며들었습니다. 현재 블록캣이 먼 곳에 있기에 §R블록캣 불안도§!라 불리는 이 압박감은 우리 문명에 적은 영향만을 미치고 있지만, 블록캣이 우리의 은하를 먹어 치울수록 이 불안도는 꾸준히 증가할 것으로 예상됩니다.\n\n§R블록캣 불안도§!는 §Y0§!에서 시작해 블록캣이 우리 은하의 §Y1%§!를 삼킬 때마다 §Y1§!/식 올라 최대 §Y100§!까지 상승합니다. 블록캣에 의한 절멸의 무시무시한 위협이 우리 은하에 가깝기 때문에 이 불안도는 우리 행성의 §Y안정도§!를 낮추고 §Y일탈§!을 늘릴 것이지만, 블록캣에 맞서 싸울 방법을 갈망하기 때문에 우리 계산기들의 생산량이 눈에 띄게 상승할 것입니다. 블록캣에게 흡수된 모든 §Y팝§! 또한 §R불안도§!를 상승시킬 것입니다.\n\n§R블록캣 불안도§!는 §Y블록캣 정보 기관§!을 통해 관리될 수 있습니다. 일정 수준의 §R불안도§!는 특별한 긴급 §R불안도 시행령§! 및 §R불안도 행성결정§!을 잠금 해제할 것이며 이는 우리 행성과 제국에 시행될 수 있습니다."
 giga_blokkat.1022.a:0 "승인한다."
 giga_blokkat.1022.a.tooltip:0 "우리는 §Y블록캣 정보 기관§!에서 §R블록캣 불안도§!를 확인할 수 있습니다.\n§R블록캣 불안도§!가 충분히 높아지면 §R블록캣 시행령§!과 §R블록캣 행성 결정§!을 시행할 수 있습니다. 이는 강력한 이익을 주고 불안도를 해결하는데 도움을 줄 수 있습니다."
 giga_blokkat.1023.name:0 "해체된 행성"
 giga_blokkat.1023.desc:0 "§Y블록캣§!이 §Y[ROOT.GetName]§!의 식민지에 도달했고 이러서 파괴하고 있습니다. 안타깝게도 이는 순식간에 §Y[ROOT.blokkat_planet_pop_count]§! 팝을 없애버렸습니다.\n\n우리 문명에 대한 이 영향을 억누르지 않는다면, 이 파멸의 행위는 우리 제국 내의 §R블록캣 불안도§!를 §Y[ROOT.blokkat_pop_inquietude]§!만큼 생성할 것입니다. 아니면, 우리는 불안도를 반으로 줄이기 위해 행성의 파괴에 대한 것을 누그러뜨리고 선전을 할 수 있습니다. 하지만 이는 £influence£ §Y[ROOT.blokkat_pop_influence_cost]§!만큼의 비용이 들 것입니다."
 giga_blokkat.1023.a:0 "빌어먹을! | §R블록캣 불안도§! §Y[ROOT.blokkat_pop_inquietude]§!"
 giga_blokkat.1023.b:0 "£influence£ §Y[ROOT.blokkat_pop_influence_cost]§!을 소비해 영향을 완화하라. | §R블록캣 불안도§! §Y[ROOT.blokkat_pop_inquietude_halved]§!"
 blokkat_not_enough_influence:0 "영향력이 부족합니다."
 giga_blokkat.1023.willingness.desc:0 "§Y블록캣§!이 도착했고, 이내 §Y[ROOT.GetName]§!의 식민지를 파괴하여 §Y[ROOT.blokkat_planet_pop_count]§! 팝을 순식간에 죽여버렸습니다.\n\n이 사건의 충격을 억제하지 않으면 §R블록캣 불안도§!가 §Y[ROOT.blokkat_pop_inquietude]§! 생성되고 제국의 §H정부 동조§!와 §M국민 동조§!가 §R[ROOT.blokkat_pop_inquietude]%§! 감소할 것입니다. 아니면, 행성의 파괴에 대한 보조금과 선전을 통해 불안을 절반으로 낮출 수 있지만, 그 비용은 대략 £influence£ §Y[ROOT.blokkat_pop_influence_cost]§!입니다."
 giga_blokkat.5010.name:0 "블록캣"
 giga_blokkat.5010.desc.a:0 "우리의 수확 작업은 순조롭게 진행되고 있습니다. 뭐 도와드릴 일이라도 있나요, §Y[ROOT.GetSpeciesNamePlural]§!?"
 giga_blokkat.5010.desc.b:0 "얼마나 많은 블록캣이 블록캣 블록을 할 수 있을까요? 당신은 알고 싶지 않겠지요."
 giga_blokkat.5010.desc.c:0 "우리의 작업이 불편하다면 이 은하계를 자유롭게 비워도 된다는 것을 기억하세요."
 giga_blokkat.5010.desc.d:0 "우리는 블록캣입니다. 비-입체주의는 헛된 것입니다."
 giga_blokkat.5010.desc.e:0 "기하학! 기하학!"
 giga_blokkat.5010.desc.f:0 "토끼는 출입 금지입니다. 이유는 묻지 마세요."
 giga_blokkat.5010.desc.g:0 "저희는 당신의 은하계가 블록캣 엔지니어링의 새로운 위업을 위한 재료를 제공하기 위해 분해될 것임을 알려드리게 되어 기쁩니다. 이전을 위한 공식 영수증을 받으려면 은하계 해체 사무소에 문의 바랍니다. 대기 시간은 겨우 200만 년으로 추정됩니다."
 giga_blokkat.5010.desc.h:0 "우리에게 보다 총체적이고 효율적인 우주 노천광 작업을 위해 모든 준-천체 말소기를 폐기해주시기 바랍니다."
 giga_blokkat.5010.desc.edgy:0 "멋진 에테르 변환 엔진이군요. 당신네 종족은 그걸 정당화하기 위해 어떤 난해한 계획을 세웠을까요? 선택받은 종족이라고 생각하나요? 아니면 어떤 필멸자도 이해할 수 없는 탐구를 추구하는 건가요?"
 giga_blokkat.5010.desc.acot1:0 "좋은 팁이 있습니다. 다수의 스텔라라이트 발전소를 수도 행성에 지어 더 많은 에너지를 생산하세요. 이 팁을 따르면 은하로부터의 탈출을 서두를 수 있습니다."
 giga_blokkat.5010.desc.acot2:0 "전설적인 블록캣을 들어본 적 있나요?"
 giga_blokkat.5010.desc.acot3:0 "인정하세요, 그것이 어떻게 작동하는지 모르기 때문에 암흑 에너지라고 부르고 그냥 일이 끝날 때까지 물건을 던져 넣는 것 뿐이죠. 부끄러울 것은 없어요."
 giga_blokkat.5010.desc.acot4:0 "정말 열등한 룬 기술 몇 개 때문에 같은 장소를 열 번을 공격한건가요? 알겠지만, 도둑맞았을 수도 있어요."
 giga_blokkat.5010.desc.sbtg1:0 "아뇨, 우리는 토너먼트에 참가하지 않아요. 그리고 도와주지도 않을겁니다. \"적의 적\" 같은 협상은 없어요."
 giga_blokkat.5010.desc.mods1:0 "아 그래요, 또다른 수준으로 \"승천\" 했군요. 이는 우리의 작전을 중단시킬 확률을 -7.567% 만큼 높일 겁니다."
 giga_blokkat.5010.desc.mods2:0 "제국에 대한 확신이 벌써 사라지나요? 과거의 은하 해체 지역을 생각해봐도 이건 신기록이에요."
 giga_blokkat.5010.desc.mods3:0 "소위 \"초월 제국\" 감지됨, 진단 시작: 에러! 권한 없음."
 giga_blokkat.5010.desc.mods4:0 "흥미로운 무기네요, 움직이는 오락 프로그램에서 얻은건가요?"
 giga_blokkat.5010.desc.mods5:0 "절정을 찍은 문명은 이제 내려갈 일만 남았죠, §Y[ROOT.GetName]§!."
 giga_blokkat.5010.desc.mega1:0 "버치 월드를 위한 충분한 자원은 어떻게- 상관없죠, 이 또한 광물화될 겁니다."
 giga_blokkat.5010.desc.mega2:0 "멋진 $name_alderson$님, 한 조각 가져가도 괜찮으신가요? 사실, 전부 가져가도 될까요?\n\n괜찮으시다면 전부 가져가겠습니다. 만약 괜찮지 않으시다면, 언제든지 불만을 제기하실 수 있습니다. 저희가 귀하의 은하를 다 끝낸 후에 검토하겠습니다."
 giga_blokkat.5010.desc.mega3:0 "피자 준비해줘서 고마워요. 앨더슨 맛을 좋아하거든요."
 giga_blokkat.5010.desc.mega4:0 "이 은하는 AI 통제 하에 무기를 두지 않을 정도로 합리적이란 것을 알았어요, 그럼 시도하고 날짜를 매겨보죠. 어쨌든 우주가 이치에 맞는다는 것에 만족합니다."
 giga_blokkat.5010.desc.mega5:0 "그러니까 이걸 소행성 포대라고 부른다고요? 우리가 비슷한 것을 만들었을 때, 우리는 소행성 초강력 파수병이라 불렀는데요, 객관적으로도 더 나은 이름이죠."
 giga_blokkat.5010.desc.crisis1:0 "에테르눔은, 이제까지, 우리가 본 것중에 가장 낮은 시간 대 발전 효율을 보여주는군요. 뭘 하고 있었을까요?"
 giga_blokkat.5010.desc.crisis2:0 "저 벌레들이 계속 도망가서 모두에게 우리가 무슨 사냥꾼이라 말하고 다니는군요."
 giga_blokkat.5010.desc.crisis3:0 "저 빨간 로봇들은 은하를 청소하는데 별로 효율적이지 않군요. 어떻게 해야하는지 가르쳐줘야 할지도 모르겠네요."
 giga_blokkat.5010.desc.crisis4:0 "이 파란 유령들은 \"먹는 척\" 하더니 이 모든 물질을 그냥 두고 가네요, 아까워라."
 giga_blokkat.5010.desc.crisis5:0 "이 카이저와 그의 칸'첸은 전에 본 적도 없는데도 우리를 엄청나게 두려워하는 것 같군요. 웃기네요."
 giga_blokkat.5010.desc.crisis6:0 "세타나의 위업은 흥미롭다. 우리도 우리의 정신을 버리고 방해나 사고 없이 임무에 집중하는 것을 고려했었지만, 우리의 정신은 여전히 목표에 필수적인 충분한 전략적 이점과 적응성을 제공한다고 생각한다. 하지만 세타나는 에너지 수확을 추구하는 것 같지 않아, 그녀가 미래에 무엇을 성취할지는 불확실하다. 만약 그녀가 막대한 연산 능력을 헛된 프로젝트에 낭비한다면, 그것은 매우 실망스러울 것이다."
 giga_blokkat.5010.desc.crisis7:0 "갈등과 증오에서 에너지를 수집하는 것은 매혹적인 사이오닉 조작 기술이다. 하지만 궁극적으로 올바른 수확 방법에 비하면 너무 비효율적이다."
 giga_blokkat.5010.desc.crisis8:0 "§R뭔가 잘못됐다.§!"
 giga_blokkat.5010.a:0 "화면을 꺼라."
 blokkat_mothership_shield:0 "블록캣 초차원 방벽"
 blokkat_mothership_shield_desc:0 "블록캣 초차원 방벽은 모든 형태의 피해로부터 블록캣 모선을 보호합니다."
 BLOKKAT_COUNTRY:0 "초은하적 수확자"
 BLOKKAT_COUNTRY_DESC:0 "블록캣은 우주와 더 나아가 우리 은하에서 마지막 한 방울의 에너지까지도 모두 수확하는데 열중인 은하간 문명입니다."
 blokkat_shield_killer_0:0 "$gc_blokkat$초차원 불안정제 건설 현장"
 blokkat_shield_killer_0_DESC:0 "초차원 불안정제를 위한 건설 현장은, 어쩌면 은하 역사상 가장 진보된 거대 구조물을 조립하기 위해 필요한 기반 시설과 인력을 수용합니다."
 blokkat_shield_killer_0_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_blokkat$ - $giga_list_category_weaponry$\n파괴할 수 없는 듯한 §Y블록캣-베스터§!의 §Y보호막§!을 붕괴시킵니다\n§L블록캣 초차원 방벽을 파괴하기 위해 고차원 막을 뚫을 수 있는 거대한 구조물입니다.§!"
 blokkat_shield_killer_0_CONSTRUCTION_INFO_DELAYED:0 "$giga_list_additional_data$ - §Y블록캣§!을 무찌른 뒤, 이 거대 구조물을 더 유용한 것으로 바꿀 수 있을 것입니다."
 blokkat_shield_killer_1:0 "초차원 불안정제 5차원 특이점"
 blokkat_shield_killer_1_DESC:0 "고도로 발전된 이 고리는 별 주위의 공간을 접어서 더 높은 차원으로 만들어, 우주의 구조를 통해 붕괴시키고 5차원 특이점으로 \"펼칩니다.\"
 blokkat_shield_killer_2:0 "초차원 불안정제 차원막 파성추"
 blokkat_shield_killer_2_DESC:0 "차원막 파성추는 5차원 특이점을 이용해 서로에 관계된 고차원 배열을 바꾸어 블록캣의 초차원 방벽을 \"왜곡\"할 수 있습니다."
 blokkat_shield_killer_3:0 "초차원 불안정제"
 blokkat_shield_killer_3_DESC:0 "블록캣에 대한 끝없는 연구의 결실로, 이 경이로운 장치는 초차원 방벽의 모든 부분을 동시에 공격하기 위해 고차원을 통해 파괴적인 타격을 날릴 수 있습니다."
 blokkat_shield_killer_4:0 "초차원 불안정제 시간교란기"
 blokkat_shield_killer_4_DESC:0 "블록캣에 대한 끝없는 연구의 결실로, 이 경이로운 장치는 초차원 방벽의 모든 부분을 동시에 공격하기 위해 고차원을 통해 파괴적인 타격을 날릴 수 있습니다. 시간분열기로 강화되어, 시간 그 자체를 통해서도 추가적인 공격을 할 수 있습니다."
 blokkat_shield_killer_activate:0 "초차원 불안정제 활성화"
 blokkat_shield_killer_activate_DESC:0 "초차원 불안정제가 활성화되어 5차원 공간에 구멍을 내고 있습니다."
 blokkat_shield_killer_activate_chrono:0 "초차원 불안정제 활성화"
 blokkat_shield_killer_activate_chrono_DESC:0 "초차원 불안정제가 활성화되어 5차원 공간에 구멍을 내고 있습니다."
 cant_activate_blokkat_shieldkiller_now:0 "지금 초차원 불안정제를 활성화하는 것은 시공간을 찢어버리고 거대 구조물을 파괴할 것입니다."
 admiral_trait_blokkat:0 "블록캣 정보망"
 admiral_trait_blokkat_desc:0 "블록캣은 매우 지능적이며 서로와 항상 연결되어있어, 주어진 함대 전투에서 최선의 움직임을 협력하여 계산합니다."
 giga_blokkat.30681.name:0 "초차원 불안정제 건설 현장 걸설됨!"
 giga_blokkat.30681.desc:0 "우리의 강력한 §Y초차원 불안정제§! 건설 현장이 §Y[giga_system.GetName]§! 성계 내에서 완성되었습니다.\n\n이 수수한 궤도 플랫폼은 은하 역사상 가장 진보되었을지도 모를 구조물을 건설할 기지로 사용될 것입니다. 건설할 구조물은 고차원 조작을 통해 §Y블록캣 초차원 방벽§!을 공격하고 정지시킬 수 있습니다.\n\n우리가 알고 있는 모든 방법으로 가려지고 숨겨져있기 때문에, 블록캣의 들여다보는 눈으로부터 안전할 것입니다. 하지만 이 거대한 구조물의 활성화가 가능해지기 전에 여전히 많은 작업과 연구를 진행해야합니다."
 giga_blokkat.30681.a:0 "이것은 시작일 뿐이다."
 giga_blokkat.30682.name:0 "초차원 불안정제 5차원 특이점 건설됨!"
 giga_blokkat.30682.desc:0 "§Y[giga_planet.GetName]§!(을)를 진보된 조작 고리로 완전히 둘러싸서 §Y초차원 불안정제§!의 완성에 한 발자국 더 가까워졌습니다.\n\n계획했던대로, 고리는 별 그 자체를 접어 고차원 공간으로 만들어, 5차원 공간까지 닿아 §Y5차원 특이점§!의 형태로 우리의 3차원 우주에 다시 펼쳐놓습니다.\n\n이 특이점은 5차원 공간으로 가는 진정한 게이트웨이의 역할을 할 것이며, 우리는 §Y블록캣 초차원 방벽§!에 조정된 공격을 실시할 수 있을 것입니다."
 giga_blokkat.30682.a:0 "멋지군."
 giga_blokkat.30683.name:0 "초차원 불안정제 차원막 파성추 건설됨!"
 giga_blokkat.30683.desc:0 "§Y차원막 파성추§! 장치로 확장되어, §Y초차원 불안정제§!는 다시 한 번 완성에 가까워졌습니다.\n\n그 구조물은 5차원 공간으로 스며드는 에너지 파동을 발사할 것이며, 이는 블록캣이 사용하는 차원이 서로 배열된 방식을 매우 조금 \"왜곡\"할 것입니다.\n\n모든 것이 우리의 계산대로 흘러간다면, 이는 §Y블록캣 초차원 방벽§!을 효과적으로 \"어긋나게\" 할 것이며, 6차원 내에서 회전하고 있는 보호막 부분을 붕괴시키고 따라서 전체를 5차원 공간으로 돌아오게 만듭니다.\n\n잘된다면, 이는 5차원 특이점을 통해 조정된 공격을 가능하게 할 것입니다."
 giga_blokkat.30683.a:0 "이건... 복잡해지는군."
 giga_blokkat.30684.name:0 "초차원 불안정제 완성!"
 giga_blokkat.30684.desc:0 "마침내, 수 년간의 고통스러운 연구와 건설 작업이 결실을 맺었습니다. 우리의 §Y초차원 불안정제§!는, 어떻게 보아도, 완전히 작동해야 합니다.\n\n이 은하에서 가장 거대한 에너지 조작기에 걸맞게, 이는 우선 5차원 공간 사방에서 공격하기 전에 §Y블록캣 초차원 방벽§!을 분열시킬 수 있고, 중지시켜 §Y블록캣-베스터§!를 직접적인 무기 공격에 노출시킬 수 있을 것입니다.\n\n활성화의 기본 비용은 £energy£ §Y[blokkat_country.blokkat_shieldkiller_activation_cost]§!으로 추정되며 일단 활성화되면, 전 은하적인 보호막 분열파를 발사하는 것의 부작용으로 모든 초공간 항로망에 걸쳐 보호막을 약하게 할 것입니다. 활성화 뒤에, 우리는 다시 활성화시키기 위해 §Y3년§!간 시공간을 냉각해야하며, 블록캣이 보호막을 더욱 증강할 것이기 때문에 비용은 §Y10%§!가 높아질 것입니다.\n\n안타깝게도 블록캣은 다시 보호막을 작동할 수 있으리라 생각되지만, 현재 보호막 재가동에 걸리는 시간의 추정치는 없습니다."
 giga_blokkat.30684.a:0 "최소한, 반격할 수 있겠군."
 giga_blokkat.30684.a.tooltip:0 "이제 §Y초차원 불안정제§!를 §Y업그레이드§!하여 §G활성화§!할 수 있습니다."
 giga_blokkat.30685.name:0 "초차원 불안정제 시간교란기 건설됨!"
 giga_blokkat.30685.desc:0 "이제 강력한 §Y시간교란기 §!의 추가로 §Y초차원 불안정제§!는 강력해졌습니다.\n\n이 경이로운 장치는 거대 구조물의 공격을 과거와 미래 모두로 효과적으로 \"분리\"시킬 것이며, 시간과 공간을 통해 §Y블록캣 초차원 방벽§!의 모든 부분을 동시에 공격할 수 있을 것입니다. 모든 것이 계획대로 진행된다면, 그것은 이제 §Y3 배§! 더 오래 비활성화될 것이며, 최종적으로 §Y블록캣-베스터§!를 영원히 파괴하기에 충분 그 이상의 시간을 우리에게 줄 것입니다."
 giga_blokkat.30685.a:0 "저들은 더이상 숨을 수 없다."
 giga_blokkat.30691.name:0 "초차원 불안정제 활성화"
 giga_blokkat.30691.desc:0 "이제 우리 노력의 과실인 §Y[giga_blokkat_shieldkiller_system.GetName]§! 성계의 강력한 §Y초차원 불안정제§!를 마침내 활성화할 수 있습니다.\n\n활성화되면, §Y블록캣 초차원 방벽§!에 파괴적인 공격을 가할 것이며, §Y블록캣-베스터§!의 무적으로 보이는 소중한 보호막을 없애버릴 것입니다. 추정 §Y2년§! 내에 블록캣이 보호막을 재가동할 가능성이 높고 불안정제 그 자체가 §Y2년§!간 냉각되어야하기 때문에 재빠르게 행동해야 합니다.\n\n시공간을 찢어버리는 활성화 프로토콜은 은하 전체에 다양한 부작용을 낳을 가능성이 높으며, 일례로 보호막의 효율은 감소하지만 FTL은 훨씬 쉬워질 것입니다.\n\n장치를 활성화하는 비용은 £energy£ §Y[blokkat_country.blokkat_shieldkiller_activation_cost]§!입니다."
 giga_blokkat.30691.desc.chrono:0 "이제 우리 노력의 과실인 §Y[giga_blokkat_shieldkiller_system.GetName]§! 성계의 강력한 §Y초차원 불안정제§!를 마침내 활성화할 수 있습니다.\n\n활성화되면, §Y블록캣 초차원 방벽§!에 파괴적인 일격을 가할 것이며, §Y블록캣-베스터§!의 무적으로 보이는 소중한 보호막을 없애버릴 것입니다. 추정 §Y6년§! 내에 블록캣이 보호막을 재가동할 가능성이 높고 불안정제 그 자체가 §Y년§!간 냉각되어야하기 때문에 재빠르게 행동해야 합니다.\n\n시공간을 찢어버리는 활성화 프로토콜은 은하 전체에 다양한 부작용을 낳을 가능성이 높으며, 일례로 보호막의 효율은 감소하지만 FTL은 훨씬 쉬워질 것입니다.\n\n장치를 활성화하는 비용은 £energy£ §Y[blokkat_country.blokkat_shieldkiller_activation_cost]§!입니다."
 giga_blokkat.30691.a:0 "때가 왔다. 진행해라."
 giga_blokkat.30691.a.tooltip:0 "초차원 불안정제가 활성화될 것입니다. 돌이킬 수 없습니다."
 giga_blokkat.30691.b:0 "성급하게 굴지 말아야 한다."
 giga_blokkat.30691.b.tooltip:0 "나중에 언제라도 활성화할 수 있다."
 blokkat_shieldkiller_broke_reality:0 "찢어진 현실"
 blokkat_shieldkiller_broke_reality_desc:0 "초차원 불안정제가 우리 현실의 안정성에 급격한 영향을 주었습니다."
 giga_blokkat.30692.name:0 "방벽이 무너지다"
 giga_blokkat.30692.desc:0 "정확히 우리의 예상대로, §Y초차원 불안정제§!의 끊임없는 공격이 결정적이었습니다.\n\n우선 차원막 파성추가 §Y블록캣 초차원 방벽§!을 왜곡하여 방벽이 원래 있던 5차원 공간으로 붕괴시켜 돌려놓았고, 그 뒤 우리의 불안정제가 사방에서 공격을 퍼부었습니다. 완전히 압도된 (그리고 이 정도의 적은 예상하지 못했을) 방벽이 흐트러졌습니다. 원격 감지기에 따르면 §Y블록캣-베스터§!를 감싸고 있던 §Y블록캣 초차원 방벽§!은 사실상 사라졌고, 마침내 무지막지한 이 함선에 피해를 줄 수 있게 되었습니다.\n\n그것을 지탱하던 시공 구조의 불안정성으로 인해 시공간이 흔들리면서 불안정제의 영향이 은하 전체에 미쳤습니다. 이로 인해 모든 보호막이 힘을 잃었으며, 동시에 FTL 엔진이 매우 강력해졌습니다. 현실 그 자체가 분열되었으므로 공간의 구조에 구멍을 뚫는 FTL 과정은 그저 사소한 수준이 되었기 때문입니다.\n\n효과가 사라지고 방벽이 재가동되기까지 고작 §Y2년§! 밖에 걸리지 않습니다. 불안정제가 자신의 역할을 마쳤으니, 이제 §Y블록캣-베스터§!에 최후의 일격을 날려 우리 은하의 모든 존재에게 다가오는 위협을 끝내는 것은 우리의 몫입니다."
 giga_blokkat.30692.a:0 "이제야 균형이 맞는군."
 giga_blokkat.30692.a.tooltip:0 "너무 늦기 전에, 우리는 빠르게 행동하여 §Y블록캣-베스터§!를 공격해야합니다."
 giga_blokkat.30692.desc.chrono:0 "정확히 우리의 예상대로, §Y초차원 불안정제§!의 끊임없는 공격이 결정적이었습니다.\n\n우선 차원막 파성추가 §Y블록캣 초차원 방벽§!을 왜곡하여 방벽이 원래 있던 5차원 공간으로 붕괴시켜 돌려놓았고, 그 뒤 우리의 불안정제가 사방에서 공격을 퍼부었습니다. 완전히 압도된 (그리고 이 정도의 적은 예상하지 못했을) 방벽이 흐트러졌습니다. 원격 감지기에 따르면 §Y블록캣-베스터§!를 감싸고 있던 §Y블록캣 초차원 방벽§!은 사실상 사라졌고, 마침내 무지막지한 이 함선에 피해를 줄 수 있게 되었습니다.\n\n그것을 지탱하던 시공 구조의 불안정성으로 인해 시공간이 흔들리면서 불안정제의 영향이 은하 전체에 미쳤습니다. 이로 인해 모든 보호막이 힘을 잃었으며, 동시에 FTL 엔진이 매우 강력해졌습니다. 현실 그 자체가 분열되었으므로 공간의 구조에 구멍을 뚫는 FTL 과정은 그저 사소한 수준이 되었기 때문입니다.\n\n펨토초의 시간 여행으로 더욱 강력해진 우리의 공격으로 인해, 보호막이 시간을 통해 복구될 수 없게 되었습니다. 이제 효과가 사라지고 방벽이 재활성화 되기까지 §Y6년§!이 남아있습니다. 불안정제가 자신의 역할을 마쳤으니, 이제 §Y블록캣-베스터§!에 최후의 일격을 날려 우리 은하의 모든 존재에게 다가오는 위협을 끝내는 것은 우리의 몫입니다."
 giga_blokkat.30694.name:0 "성채 수리됨"
 giga_blokkat.30694.desc:0 "예상대로, 블록캣이 §Y초차원 방벽§!을 작동 상태로 복구하고 우리 §Y불안정제§!의 효과가 사라져버리는데 그리 오래 걸리지 않았습니다.\n\n이는 §Y블록캣-베스터§!가 다시 한 번 모든 피해에 무적이 되었고 현재 함선과 싸우는 모든 함대는 불필요한 손실을 피하기 위해 당장 대피해야합니다.\n\n다시 §Y초차원 불안정제§!를 활성화하기까지 §Y2년§!을 기다려야하며, 이보다 이르게 활성화하는 것은 의짐의 여지 없이 시공간의 끔찍한 붕괴를 유발할 것이며 장치는 파괴될 것입니다.\n\n블록캣이 보호막을 증강하려 활발히 움직이고 있기 때문에, 장치를 활성화하는 비용은 매번 §Y10%§!씩 상승할 것입니다."
 giga_blokkat.30694.a:0 "우리의 때를 기다릴 것이다."
 giga_blokkat.30694.a.tooltip:0 "§Y초차원 불안정제§!의 모든 효과가 사라졌습니다."
 giga_blokkat.30696.name:0 "초차원 불안정제 준비됨"
 giga_blokkat.30696.desc:0 "우리의 과학자들이 이제 끔찍한 시공간 붕괴의 위험 없이 다시 한 번 불안정제를 활성화시킬 수 있다고 평가했습니다.\n\n비용은 £energy£ §Y[blokkat_country.blokkat_shieldkiller_activation_cost]§!이며 다시 §Y블록캣-베스터§!를 공격에 취약하게 만들 것입니다."
 giga_blokkat.30696.a:0 "시간을 낭비하지 말자!"
 giga_blokkat.30696.a.tooltip:0 "다시 한 번 §Y초차원 불안정제§!를 활성화할 수 있습니다."
 giga_blokkat.3081.name:0 "블록캣 고철"
 giga_blokkat.3081.desc:0 "최근의 §Y블록캣§! 함대와의 교전 후에, 우리 전함이 블록캣의 알 수 없는 함선 몇 척을 성공적으로 파괴했습니다.\n\n저돌적인 움직임으로, 그들은 파괴된 함선에서 남은 잔해를 $blokkat_scrap$의 형태로 획득했습니다.\n\n당연하게도, 이 $blokkat_scrap$은 대단한 과학적 가치를 지니며, 우리에게 블록캣의 공학을 가까이서 올바르게 연구하고 심지어 그들의 무시무시하게 강력한 무기가 실제로 어떻게 작동하는지 이해할 수 있게 해줄 것입니다.\n\n우리의 과학 보좌관은 전투에서 추가적인 블록캣 함대를 파괴해 이 고철을 더 모을 수 있다고 생각합니다. 우리가 현재 쌓아올린 고철의 양은 §Y블록캣 연구 기관§!의 우측 하단에서 확인할 수 있으며 이 고철의 올바른 사용법을 찾기 위해 새로운§B블록캣 연구 프로젝트§!가 생겼습니다."
 giga_blokkat.3081.a:0 "알겠다."
 giga_blokkat.3081.a.tooltip:0 "이제 §Y블록캣 연구 기관§!에서 $blokkat_scrap$을 조사하기 위해 §B블록캣 연구 프로젝트§!를 진행할 수 있습니다."
 must_finish_blokkat_scrap_research_first:0 "§Y인양된 §M블록캣 고철§! 조사§! §B블록캣 연구 프로젝트§!를 완료했어야 합니다."
 giga_blokkat.3082.name:0 "블록캣 고철 조사"
 giga_blokkat.3082.desc:0 "우리가 회수한 $blokkat_scrap$은 우리의 블록캣 관련 연구에 매우 중요합니다. 이는 블록캣 함선과 장치의 잡동사니들로 이루어져있으며, 블록캣이 추적할 수 없을 정도의 손상을 받았지만 여전히 반-작동 상태입니다.\n\n따라서 우리 과학자들은 고철의 즉각적인 사용처를 알아내기 위해 이 귀중한 고철에 대한 광범위한 연구를 수행하고 싶어하며, 이는 의심의 여지 없이 우리의 §Y블록캣 연구 기관§! 전체에 이익이 될 것입니다.\n\n심지어는 가장 강력한 몰락한 제국의 기술보다도 이 고철이 극도로 발달되어있다는 것은 놀라운 일이 아닙니다. 따라서 우리가 이를 사용하기 위해서 광법위한 연구가 필요합니다."
 giga_blokkat.3082.a:0 "진행해라."
 giga_blokkat_inquietude_locked:0 "§Y블록캣 연구 기관§!의 이 부문은 §G블록캣§!이 성계를 흡수하면 잠금 해제될 것입니다."
 giga_blokkat_scrap_locked:0 "§Y블록캣 연구 기관§!의 이 부문은 §G블록캣§! 함선 몇 척을 파괴하면 잠금 해제될 것입니다."
 giga_tech_blokkat_scrap_uses:0 "블록캣 고철 조사"
 giga_tech_blokkat_scrap_uses_desc:0 "파괴한 블록캣 함선에서 회수한 $blokkat_scrap$을 연구하는 것은 분명 우리의 블록캣 연구에 멋진 이익이 될 것입니다."
 blokkat_scrap_uses_title:0 "$blokkat_scrap$ 사용처 잠금 해제\n블록캣 지식: §G+1§!"
 needs_all_3_blokkat_project:0 "올바르게 $blokkat_scrap$을 조사하기 위해서는 §Y물리학§!, §Y사회학§! 그리고 §Y공학§! 관련 §B블록캣 연구 프로젝트§! 3개를 모두 완료했어야 합니다."
 giga_blokkat.3083.name:0 "블록캣 조사 보고서: 고철"
 giga_blokkat.3083.desc:0 "우리의 과학자들이 파괴된 블록캣 함선에서 회수한 $blokkat_scrap$의 광범위한 조사의 결론을 내렸습니다. 예상대로, 이 부분 파손된 블록캣 기술 쪼가리조차도 알려진 역사 속에서 우리 은하가 만들어낸 그 어떤 것 보다도 월등히 뛰어납니다.\n\n이는 우리에게 블록캣 문명 나이의 대략적인 추정치를 주었고, 현재 대략 §Y12만 년§! 정도로 생각되며 그들의 채굴 활동의 대략적인 시작에 대응합니다.\n\n여하튼, 우리의 §Y블록캣 연구 기관§!은 우리가 단기간 안에 위험하고 불안정한 실험을 통해 우리의 §Y연구 속도§!와 §Y블록캣§!에 대한 §Y피해량§!을 급격하게 상승시키는 단기적인 방법으로 $blokkat_scrap$을 소비할 수 있고, 아니면, 장기간의 고철 연구로 덜 강력하지만 영구적인 이익을 볼 수 있을 것이라 추정합니다.\n\n흥미롭게도, 그들은 우리가 $blokkat_scrap$을 최소 §Y100§! 이상 모은다면, 우리 함선에 사용할 극도로 강력한 블록캣의 부품을 §Y역공학§!할 수 있을 것이라고 예상합니다.\n\n우리는 §Y블록캣 연구 기관§!을 통해 $blokkat_scrap$의 사용처를 관리할 수 있고, 우리는 $blokkat_knowledge$도 §Y1§! 얻었습니다. 더 많은 고철을 얻으려면 당연히 더 많은 블록캣 함선을 파괴해야합니다."
 giga_blokkat.3083.a:0 "승인한다."
 giga_blokkat.3083.a.tooltip:0 "이제 §Y블록캣 연구 기관§!에서 $blokkat_scrap$을 관리할 수 있습니다.\n$blokkat_knowledge$을 §Y1§! 얻습니다.\n$can_do_another_blokkat_project_tooltip$"
 mod_damage_vs_country_type_blokkat_stripminers_mult:0 "블록캣에 대한 피해량"
 blokkat_scrap_research_buff:0 "단기 블록캣 고철 실험"
 blokkat_scrap_research_buff_desc:0 "블록캣 고철을 위험한 실험에 적극적으로 사용하는 것은 대량의 연구를 생산할 것입니다."
 blokkat_scrap_damage_buff:0 "단기 블록캣 고철 병기화"
 blokkat_scrap_damage_buff_desc:0 "우리는 블록캣 고철을 사용해 블록캣의 함선에 더욱 효율적으로 맞설 수 있습니다."
 giga_tech_blokkat_scrap_research:0 "장기 블록캣 고철 조사"
 giga_tech_blokkat_scrap_research_desc:0 "블록캣 고철에 대한 더 느리지만 조심스러운 조사 방침은 더욱 영구적인 결과를 낳을 것입니다."
 blokkat_scrap_research_title:0 "블록캣 지식: §G+0.5§!"
 blokkat_scrap_damage_title:0 "블록캣 지식: §G+0.5§!"
 giga_tech_blokkat_scrap_damage:0 "장기 블록캣 고철 병기화"
 giga_tech_blokkat_scrap_damage_desc:0 "우리 함선에 사용될 블록캣 고철에 대한 더 느리지만 조심스러운 활용 방침은 더욱 영구적인 결과를 낳을 것입니다. 고철은 특히나 다차원으로부터 블록캣 함선과 구조물을 동시에 공격할 방법을 알아내는데 다수 사용될 수 있습니다."
 already_researching_blokkat_scrap:0 "이미 이를 연구하고 있습니다."
 giga_blokkat.3000.scrapdamage.tooltip:0 "우리는 §Y반복 기술§!을 잠금 해제하는데 $blokkat_scrap$을 사용할 수 있으며, 이는 블록캣에 대한 피해량을 영구적으로 증가시켜줄 것입니다. 이는 §B블록캣 연구 프로젝트§!에 포함되지 않습니다.\n\n§B반복 기술은 다음 §H공학§! 기술 목록에 나타날 것입니다.§!\n\n"
 giga_blokkat.3000.scrapresearch.tooltip:0 "우리는 §Y반복 기술§!을를 잠금 해제하는데 $blokkat_scrap$을 사용할 수 있으며, 이는 블록캣 연구 속도를 영구적으로 증가시켜줄 것입니다. 이는 §B블록캣 연구 프로젝트§!에 포함되지 않습니다.\n\n§B반복 기술은 다음 §G사회학§! 기술 목록에 나타날 것입니다.§!\n\n"
 giga_blokkat.3000.blokkreversengineer:0 "§R부품§! 역설계 | £blokkat_scrap_icon£ §Y50§! 이상 & $blokkat_knowledge$ §Y20§!"
 giga_blokkat.3000.blokkreversengineer.tooltip:0 "충분한 $blokkat_scrap$이 있다면, 우리는 블록캣 무기가 어떻게 작동하고 어떻게 우리를 위해 효율적으로 복제할 수 있는지 알아낼 수 있을지도 모릅니다.\n\n역설계 비용은 £blokkat_scrap_icon£ §Y50§!에서 §Y150§! 사이입니다."
 mod_ships_energy_upkeep_mult:0 "기지 에너지 유지비"
 giga_blokkat.3090.name:0 "블록캣 무기 역설계"
 giga_blokkat.3090.desc:0 "우리가 모은 $blokkat_scrap$과 우리의 현재 $blokkat_knowledge$을 결합하여, 우리의 §Y블록캣 연구 기관§!은 우리가 블록캣이 그들의 난해한 함선에 사용하는 부품 그 자체를 어떻게든 정확하게 역설계할 수 있다고 장담합니다.\n\n제대로 §Y블록워크§!의 초차원 전력망을 복제할 수 없기에, 이 부품이 진짜 \"올바른\" 블록캣 공학의 성능과 비길 수는 없겠지만, 그럼에도 불구하고 우리는 우리 함선에 장비할 무기무기하게 강력한 무기와 지원 시스템을 만들어낼 수 있습니다.\n\n블록캣 부품은 극히 강력하지만, 기능이 의존하는 고차원 조작의 엄청난 횟수 때문에 대량의 £energy£ §Y에너지§! 유지비가 필요합니다. 우리의 함선에 이를 장착하는데에 $blokkat_scrap$을 사용하지는 않을 것입니다.\n\n올바른 선택지를 골라 어떤 종류의 부품에 집중할지 선택할 수 있습니다. 이러한 부품을 획득하는데 필요한 기술의 비용은 연구 §Y500k§!에서 §Y5M§! 사이일 것이며, 평균적으로 §Y1M§!일 것입니다."
 giga_blokkat.3090.a:0 "화력이 필요하다! 그들의 §H소화기§!에 집중하라 | £blokkat_scrap_icon£ §Y100§!"
 giga_blokkat.3090.a.tooltip:0 "£blokkat_scrap_icon£ §Y-100§!\n\n블록캣의 소형 함선 무기를 획득하려 할 것입니다 (L, G & H 슬롯)\n\n$cant_do_another_blokkat_project_tech_tooltip$"
 giga_blokkat.3090.b:0 "모든 것이 필요하다! 그들의 §R강력한 무기§!에 집중하라 | £blokkat_scrap_icon£ §Y150§!"
 giga_blokkat.3090.b.tooltip:0 "£blokkat_scrap_icon£ §Y-150§!\n\n블록캣의 강력한 함선 무기 중 하나를 획득하려 할 것입니다 (X, T & 행성 슬롯)\n\n§R이 강력한 부품을 잠금 해제하는데 필요한 기술의 비용은 엄청나게 높을 것입니다§!\n\n$cant_do_another_blokkat_project_tech_tooltip$"
 giga_blokkat.3090.c:0 "우리 함선은 취약하다. 그들의 §Y방어 부품§!에 집중하라 | £blokkat_scrap_icon£ §Y80§!"
 giga_blokkat.3090.c.tooltip:0 "£blokkat_scrap_icon£ §Y-80§!\n\n장갑이나 국지 방어와 같은 블록캣의 방어 부품을 획득하려 할 것입니다.\n\n$cant_do_another_blokkat_project_tech_tooltip$"
 giga_blokkat.3090.d:0 "지원 장비가 필요하다. 그들의 §G보조 장비§!에 집중하라 | £blokkat_scrap_icon£ §Y70§!"
 giga_blokkat.3090.d.tooltip:0 "£blokkat_scrap_icon£ §Y-70§!\n\n재연소 장치나 반응로 부스터와 같은 블록캣의 보조 부품을 획득하려 할 것입니다.\n\n$cant_do_another_blokkat_project_tech_tooltip$"
 giga_blokkat.3090.e:0 "우리의 엔진이 너무 약하다. 그들의 §M핵심 부품§!에 집중하라 | £blokkat_scrap_icon£ §Y50§!"
 giga_blokkat.3090.e.tooltip:0 "£blokkat_scrap_icon£ §Y-50§!\n\n반응로나 FTL 드라이브와 같은 블록캣의 핵심 부품을 획득하려 할 것입니다.\n\n$cant_do_another_blokkat_project_tech_tooltip$"
 giga_tech_blokkat_knowledge_50_chance:0 "블록캣 지식: §G+0.5§!"
 giga_tech_blokkat_laser:0 "플랑크-붕괴 광선"
 giga_tech_blokkat_laser_desc:0 "플랑크-붕괴 광선은 블록캣의 노천 채굴 장치에 기반을 둔 기계입니다. 이 기계는 적 함선의 모든 구조를 플랑크 수준 아래까지 체계적으로 해체할 뿐만 아니라, 이를 초응축 양자 거품 슬러리로 만들어버립니다. 게다가 앞서 말한 거품을 모아 블록캣 함선에 저장하여, 후에 사용 가능한 물질로 재처리할 수 있습니다."
 giga_tech_blokkat_missile:0 "4차원 특이점 화포"
 giga_tech_blokkat_missile_desc:0 "이 첨단 발사대는 추격 4차원 특이점을 적 함선으로 날려보냅니다. 이 특이점들은 블록캣 함선에서 분리된것으로 보이지만, 이는 사실 \"올가미\"에 더 가까운 것으로, 이것은 더 고차원을 통해 블록캣 함선에 연결되어있고 후에 적 함선을 헤집어 뚫어버린 뒤 앞서말한 함선으로 이 고차원을 통해 \"되감아져\" 돌아옵니다. 이로써 블록캣은 특이점이 파괴한 모든 것을 모아 나중에 활용하기 위해 처리할 수 있습니다."
 giga_tech_blokkat_strikecraft:0 "블록-군집 개체"
 giga_tech_blokkat_strikecraft_desc:0 "우주를 돌아다니는 이 개체들은 실제 블록캣을 매우 닮았으며 우주선 전투를 위해 설계되었습니다. 그들은 대부분의 경우 모선 안에 있는 블록캣에 의해 원격 조종되며 심지어는 블록캣 그 자체일 때도 있습니다."
 giga_blokkat.1001.name:0 "은하간 중력 이상현상"
 giga_blokkat.1001.desc:0 "우리 은하의 바로 옆 은하에 대한 평범한 조사가 흥미로운 사건을 포착했습니다.\n\n§Y비이상적인 물질 고농도§!가 우리 은하의 끝에서 대략 백만 광년 떨어진 곳에서 발견되었습니다. 우리의 타키온 장비에 따르면, 그 물체에 가까운 빛과 공간이 상당히 휘어있다는 점은, 확실한 성질은 현재 알 수 없지만  매우 고에너지 상태인 것으로 보이며, 국부 은하군을 나가는 한 개의 초소형 퀘이사일 가능성이 높습니다.\n\n흥미롭게도, 그것은 거대하고 활동적인 천체의 빠른 회전에 결함해 반복적인 패턴의 전자기 복사를 방출하고 있습니다. 아마도 가장 흥미로운 부분은 물체가 빛보다 더 빠르게 움직이는 것처럼 보이지만, 그것을 둘러싼 시공간에서의 강한 왜곡이 정확한 속도 측정을 방해한다는 것입니다.\n\n추가적인 관측이 이루어질 것이지만, 큰 괌심을 줄만한 것은 아닌 것 같습니다."
 giga_blokkat.1001.a:0 "흥미롭군."
 giga_blokkat.1002.name:0 "변경된 경로"
 giga_blokkat.1002.desc:0 "몇달 전 발견된 중력 이상현상에 대한 장기간의 연구를 수행하는 동안, 우리의 은하간 측정 장비를 통해, 그 물체가 일직선으로 움직이지 않고 우리 은하와 연관된 완만한 곡선을 따라 움직이고 있음이 밝혀졌고, 우리 국부 은하단 밖으로의 확실한 탈출 궤도에 있습니다.\n\n곧, 물체가 은하간 공간 내에서 완전히 정지할 때까지, 1초도 되지 않는 순간 내에 속도가 완전히 사라집니다. 몇 시간 동안 가만히 있다가, 그것은 물리학을 거스르는 또다른 움직임으로 곧바로 원해 속도로 되돌아왔습니다.\n\n언뜻보기에 불가능한 사건에 대한 처음의 충격과 더불어, 변경된 궤도 계산에 따르면, 다시 갑자기 궤도를 바꾸지 않는다는 가정 하에, 이 은하간 화구가 현재 §R우리 은하와 직접적인 충돌 경로§!에 있습니다.\n\n어떻게 그리고 어째서 궤도가 이렇게 급격히 바뀌었는지 설명하기 위해, 서로 먹고 먹히는 블랙홀-화이트홀 쌍이 만든 \"자연발생 FTL 드라이브\"나 퀘이사 하나가 일종의 \"은하간 초공간 항로\"를 통해 움직이고 있다는 등의 수많은 이론이 생겨났고, 가끔 은하간 여행의 타당성과 관련된 연구에서 이론화되었습니다.\n\n물체의 실제 성질에 무관하게, 이는 현재 우리에게서 약 §Y백만 광년§! 떨어져있으며, 갱신된 속도 측정치에 따르면 이것이 대략 광속의 십만 배 빠른 속도로 움직이고 있고, 십 년 내에 이 은하간 존재를 만날 예정입니다.\n\n이를 추적하기 위해 §Y특별 프로젝트§!가 생성되었습니다."
 giga_blokkat.1002.a:0 "걱정되는군. 계속 면밀하게 감시해라!"
 blokkat_pre_arrival_chain_title:0 "은하간 물체"
 blokkat_pre_arrival_chain_desc:0 "알 수 없는 빛보다 빠른 물체가 우리 은하를 향해 가속하고 있습니다. 이는 꼬인 시공간의 소용돌이에 둘러 싸여 자세한 조사가 불가능하게 합니다.\n\n현재 우리와의 거리 §Y[global_event_country.blokkat_distance_from_galaxy]§! 광년"
 giga_blokkat.1004.name:0 "소멸하는 은하계"
 giga_blokkat.1004.desc:0 "이 알 수 없는 물체에 대한 발견은 은하간 우주에 대해 수행된 이전 연구들을 떠올리게 했습니다.\n\n그들 중 하나는 악명 높은 \"공허 속의 구멍\" 사건으로, 과거 프레쏘린이 있었던 은하 중 하나가 완전히 사라진 채로 발견된 것입니다. 이 수수께끼에 발견된 결정적인 해답은 없지만, 더 많은 데이터 분석으로 인해 과학자들은 이 물체의 경로가 갑자기 변화하기 전에 우주를 통해 궤도를 추적하려고 시도하게 되었습니다.\n\n그들은, 우주 전체의 은하의 움직임을 고려할 때, 물체의 과거 궤도가 사라진 은하의 위치와 정확히 일치한다는 것을 발견했습니다."
 giga_blokkat.1004.a:0 "오 안돼."
 giga_blokkat.1005.name:0 "은하간 충돌 현장"
 giga_blokkat.1005.desc:0 "은하간 물체가 이제 우리로부터 30만 광년보다 더 가깝습니다. 그리하여 우리는 그것의 미래 궤도와 우리 은하의 어디에 충돌하게될지 보다 정확하게 알아낼 수 있게 되었습니다.\n\n현재 궤도에 근거를 두고 모든 갑작스런 변화를 제외하면, 물체는 우리 은하와 §Y[blokkat_spawn_system.GetName]§! 성계에서 만날 것입니다.\n\n그러나, 그것이 은하간 공간 내에서 했던 것처럼 감속해 버린다면, 이 갑작스런 FTL 감속으로 인한 아공간 반동은 §Y[blokkat_spawn_system.GetName]§! 그리고 그 행성계 전체를 §R완전히 파괴§! 해버릴 것입니다.\n\n성계가 우리의 통제 하에 있다면, 물체의 끔찍한 도착으로 불가피하게 파괴되기 전에 그곳의 중요한 자산을 모두 대피시켜야합니다."
 giga_blokkat.1005.a:0 "승인한다."
 blokkat_pre_arrival_chain_1:0 "은하간 충돌 현장"
 blokkat_pre_arrival_chain_1_desc:0 "은하간 물체가 §Y[blokkat_spawn_system.GetName]§!에 도착할 것입니다.\n만약 그것이 감속한다면, 결과로 따르는 아공간 반동은 전체 성계와 그 내부를 §R소멸§!시켜버릴 것입니다."
 giga_blokkat.1006.name:0 "도착지"
 giga_blokkat.1006.desc:0 "수년간의 불안한 기다림 끝에, 은하간 물체가 마침내 우리 은하계에 들어왔습니다. 예상했던 대로, §Y[blokkat_spawn_system.GetName]§!의 중력 우물에 진입하자마자, 순간적으로 감속했고, 아공간 반동을 일으켜 성계 전체를 완전히 없애버렸습니다.\n\n아공간 왜곡이 드디어 사라졌을 때, 물체의 성질이 마침내 드러났습니다. 몇몇은 예상하고 많은 이들이 두려워했던 것처럼, 이는 과연 거대한 우주선입니다. 또는 어쩌면, 꽤나 걱정스럽게도, 일종의 거대한 은하간 함대일지도 모릅니다.\n\n그것은 인공 블랙홀과 같은 특이점 주위에 배치된 3중 링 월드를 닮은 거대한 중앙 함선으로 구성되어 있으며, 더 작은 함선들이 거대한 함선 여러대를 호위하고 있습니다.\n\n이 함선의 목적은 아직 알려지지 않았고 그들의 난해한 구조로 인해 그들의 목적을 제대로 이해하기 어렵습니다.\n\n어쨌든, 함선을 관리하는 자가 누구든 아마도 스스로를 우리에게 \"소개\"하는 방식으로, 전 은하에 강력한 아공간 신호를 보낸 것 같습니다."
 giga_blokkat.1006.a:0 "화면에 띄워라."
 giga_blokkat.1007.name:0 "블록캣 수확자"
 giga_blokkat.1007.desc:0 "§G(주변 환경 조사중)\n(은하 문명의 힘 분석중)\n(은하의 에너지 밀도 분석중)\n(평가: 수확 가능 대상)§!\n\n이 통신을 받는 존재들, 반갑습니다. 블록캣-베스터와 그 함대가 은하와 접촉했네요.\n\n근사와 수수께끼는 비효율적이니까 확실히 하죠. 우리는 순수하고 가공되지 않은 에너지를 찾아 이 은하에 왔습니다. 그리고 우리 함대는 물질, 진공 요동 그리고 배경 복사 하나하나를 전부 수확할 겁니다.\n\n애로사항이 있으시다면, 이 은하를 떠나셔도 좋고 쫓아가지 않을 것입니다. 우리를 방해하려는 모든 시도는 그저 여러분의 소멸을 재촉할 뿐입니다.\n\n§G(통신 종료)§!"
 giga_blokkat.1007.a:0 "그건... 좋지 않은데."
 giga_blokkat.1007.desc.deathmode:0 "§G<<주변 환경 조사중>>\n<<은하 문명의 힘 분석중>>\n<<은하의 에너지 밀도 분석중>>\n§R<<평가: 위험한 토착 문명 확인>>\n<<군대 준비 중>>§!\n\n이 통신을 받는 존재들, 반갑습니다. 블록캣-베스터와 그 함대가 은하와 접촉했네요.\n\n근사와 수수께끼는 비효율적이니까 확실히 하죠. 우리는 순수하고 가공되지 않은 에너지를 찾아 이 은하에 왔습니다. 그리고 우리 함대는 물질, 진공 요동 그리고 배경 복사 하나하나를 전부 수확할 겁니다.\n\n§R알림!§! 한 개 이상의 토착 문명이 §R<<블록캣 문명에 위험>>§!으로 판명되어, 은하 대피는 §R미허용§!됩니다. 이 은하와 거주민들은 §R<<말살>>§!될 것입니다.\n\n§G<<통신 종료>>§!"
 giga_blokkat.1007.b:0 "덤벼라, 블록 대가리들!"
 giga_blokkat.1008.name:0 "블록캣"
 giga_blokkat.1008.desc:0 "블록캣의 아공간 방송은 저들의 목적에 대한 창의적인 해석의 여지를 남기지 않았습니다. 이 존재들은 분명히 우리의 당연한 우려와는 상관없이 우리 은하계를 공격적으로 해체하여 그들 자신의 산업적 욕구를 채울 것입니다.\n\n그들이 이용할 정확한 방법은 아직 알려지지 않았지만, 현재 §Y[blokkat_spawn_system.GetName]§! 성계에 있는 저들의 거대한 모선을 이미 장거리 예비 조사하여 저들의 현재 능력을 평가하고 있습니다.\n\n우리와 나머지 은하계에게는 불행하게도, 이 조사 결과가 확실히 암울한 미래를 그리고 있습니다. 사실, 이 모선은 거대한 에너지 폭풍으로 둘러싸여 있는 듯 하며, 알려진 모든 항성 크기의 보호막 장치보다 약 §Y2천조§! 배 더 강력한 보호막을 형성하고 있습니다.\n\n현재 상태로는, 저들의 모선과 주변 성계 내의 모든 것이, 무엇이 공격했고 그 강도가 어느 정도냐에 무관하게, §R모든§! 형태의 피해에 완전히 §Y무적§! 상태입니다. 그러나 모선의 성계에만 보호막이 닿는다는 점으로 보아, 인근 성계에 나타나는 블록캣 함선은 충분한 화력으로 파괴할 수 있습니다.\n\n하지만 지금으로서는, 모선의 거대한 보호막에 대한 조사가 시급히 이루어져야 합니다. 우리가 그 보호막을 부수고 블록캣이 우리 은하를 흡수하는 것을 막기 위해서 말입니다."
 giga_blokkat.1008.a.tooltip:0 "\n§B플레이어에 대한 알림: 블록캣 포트레잇이 투명하다면, 모드 충돌이 원인일지도 모릅니다! §Y\"SHADERS MERGE\"§! 모드를 설치하여 모드 순서 마지막에 두세요.§!"
 giga_blokkat.1008.a:0 "승인한다."
 blokkat_chain_title:0 "블록캣"
 blokkat_chain_desc:0 "우리 은하 너머에서 온 굶주린 신스 존재가 은하계와 충돌하여 이제 그들의 길에 있는 모든 것을 먹어치우려 합니다. 우리 은하가 주변의 은하간 공허와 구별될 수 없게 되기 전에, 반드시 막아야 합니다.\n\n블록캣이 은하의 §Y[blokkat_country.blokkat_stripmined_system_perc]%§!를 먹어치웠습니다."
 blokkat_stripminer_count:0 "§Y블록-해체자 개수§!"
 blokkat_systems_stripmined:0 "§M블록캣이 해체한 성계§!"
 blokkat_planets_stripmined:0 "§M블록캣이 해체한 행성§!"
 blokkat_ships_destroyed:0 "§G파괴된 블록캣 함선§!"
 ships_lost_to_blokkats:0 "§R블록캣에게 해체된 함선§!"
 blokkat_chain_1_title:0 "현재 블록캣-베스터 위치"
 blokkat_chain_1_desc:0 "블록캣-베스터는 브롥캣의 수확 작업을 위한 거대한 허브이자 모선 역할을 하는 것이 분명합니다. 무슨 대가를 치르더라도 반드시 추적해서 파괴해야 합니다!"
 giga_blokkat.1020.name:0 "존재적 수확"
 giga_blokkat.1020.desc:0 "블록캣은 즉시 우리 은하에 대한 수확 활동을 시작했습니다. 현재 그 첫 번째 목표는 다름아닌 §Y[blokkat_first_stripmined_system.GetName]§!입니다.\n\n행성을 꾸준히 해체하는데 일종의 자가 복제 로봇이나 어쩌면 천체를 \"뜯어내고\" 유용한 물질을 수확하는데 중력 광선을 사용할 것이라고 당연히 그렇게 예상했습니다. 하지만 진실은 이전에 생각했던 것보다 훨씬 더 암울한 것으로 드러났습니다.\n\n모선 주변의 성계를 해체하는데 사용되는 그들의 수확 함선 중 하나임이 틀림 없는 블록캣 §Y블록-해체자§!는 성계에 들어가자마자 막대한 양의 에너지를 충전하기 시작했습니다.\n\n함선이 수확 장치를 다 충전하자, 성계가 곧바로 엄청나게 밝은 빛의 섬광에 휩싸이고, 가라앉고 나면, 아무것도... 남지 않습니다.\n\n성계는, 모든 의미로, 완전히 사라졌습니다. 별과 행성만이 사라진 것이 아니라 아니라, 성계를 둘러싸고 있었던 가스 구름과 복사 또한 완전히 제거되었습니다. 아마 §Y블록-해체자§!에 의해 수확되고 에너지로 변환된 것 같습니다.\n\n사실, 이 사태 직후 성계에 대한 즉각적인 조사로 밝혀진 것은, 성계의 온도가 사실상 절대 영도로 내려간 것으로 보아, 그곳의 모든 에너지 하나하나가 다 빨렸다는 것입니다.\n\n성계는 사실상 완전히 죽었습니다. 한 때 그곳에 있었던 정말 모든 것이 완전히 흡수되었습니다."
 giga_blokkat.1020.a:0 "으스스하구만..."
 sc_blokkat_stripmined:0 "완전히 빈 공간"
 sc_blokkat_stripmined_desc:0 "이 성계의 모든 에너지가 체계적으로 흡수되었습니다."
 giga_blokkat.1021.name:0 "블록캣 연구 기관"
 giga_blokkat.1021.desc:0 "여러 성계가 완전히 파괴된 뒤 심각한 블록캣 상황으로 인해 우리 문명의 모든 계층에서 수많은 걱정이 생겨났습니다. 이 존재들은 평균적인 자원 소모 문명이 절대 아니며, 언젠가 저들의 무적으로 보이는 모선을 쓰러트리고자 한다면, 블록캣과 저들의 공학에 대한 광범위한 연구를 수행해야할 것입니다.\n\n이에 따라, 우리의 과학 및 군사 분야가 합심하여, 현재 블록캣에 대한 우리의 지식 뿐만 아니라 그 지식을 어떻게 알아내고 최종적으로 반격할 방법을 알아내기 위한 중앙 기관인 §Y블록캣 정보 기관§!을 설립했습니다.\n\n가장 긴급한 사안은 다름아닌 §Y블록캣-베스터§!의 무지막지하게 강력한 보호막 장치로, 이것 때문에 우리나 다른 누구도 블록캣의 위협을 지금 당장 끝낼 수가 없습니다.\n\n블록캣에 대해 얻은 데이터는 §G블록캣 지식§!으로 수집될 것이며, 저 굶주린 존재의 은하 해체를 영원히 끝내고자 한다면 이 지식을 더 많이 획득하는 것은 매우 중요합니다.\n\n§Y블록캣 연구 기관§!은 하단 바 근처의 해당 항목을 클릭하여 접근할 수 있습니다.\n\n§B기관의 버튼이 어떠한 이유로 나타나지 않는다면, 시행령을 통해 접근할 수도 있습니다.§!"
 giga_blokkat.1021.a:0 "알겠다."
 giga_blokkat.1021.a.tooltip:0 "이제 우리는 스크린 밑의 \"블록캣 지식 확인\" 버튼을 사용해 §Y블록캣 연구 기관§!과 연결할 수 있습니다."
 giga_contact_blokkats_tooltip:0 "§H§Y블록캣 지식§! 확인...§!"
 giga_blokkat.3000.name:0 "§G블록캣 연구 작업§!"
 giga_blokkat.3000.desc.a:0 "[ROOT.blokkat_bureau_text]"
 blokkat_knowledge:0 "§G블록캣 지식§!"
 giga_blokkat.3000.shield:0 "§Y블록캣-베스터§!의 §B보호막§! 분석"
 giga_blokkat.3000.shield.tooltip:0 "§Y블록캣-베스터§!는 블록캣의 모선입니다. 이는 파괴할 수 없는 듯한 보호막으로 둘러 싸여 있으며, 블록캣의 맹공걱을 끝내려면 반드시 파괴가능 상태로 만들어야 합니다. 추가적인 분석은 우리의 생존에 중요합니다.\n\n§Y$blokkat_knowledge$을 얻으려면 이 작업을 선택하여 특별 프로젝트를 진행하세요.§!"
 blokkat_project_already_being_done:0 "이미 이 §B블록캣 연구 프로젝트§!를 수행하고 있습니다."
 blokkat_project_already_done:0 "이 §B블록캣 연구 프로젝트§!는 이미 완료되었습니다."
 blokkat_task_already_done:0 "이 §G블록캣 연구 작업§!은 가능한 모든 $blokkat_knowledge$을 생산해냈습니다."
 giga_blokkat.3000.sacrifice:0 "§Y블록-해체자§!에게 §Y과학선§! §R수확§! 당하게 하기"
 giga_blokkat.3000.sacrifice.tooltip:0 "§Y블록-해체자§!는 §Y블록캣-베스터§!에 의해 주변 성계로 배치되는 거대한 함선입니다. 그들은 무서우리만큼 엄청난 방식을 사용해 독립적으로 성계를 수확할 수 있습니다.\n\n우리의 블록캣 연구 기관의 좀 더 별난 인원들은 §Y과학선이 그러한 수확에 의해 소멸되는 것§!이 비뚤어졌지만 $blokkat_knowledge$을 얻을 수 있는 방법이라고 제안했습니다.\n\n§Y$blokkat_knowledge$을 얻기 위해 블록-해체자가 수확하려 하는 성계로 과학선을 보내십시오.\n과학선에 과학자가 타고 있을 필요는 없으며 수확 이전에 블록캣 함대에게 파괴되서는 안되므로 호위가 필요할 것입니다.\n함선이 수확 전에 성꼐에 존재해야하며, 수확되고 있는 성계에 뛰어들면 지식을 얻을 수 없을 것입니다.\n\n§G얻을 수 있는 최대 지식: §Y3§!§!\n§G지식 습득: §Y[ROOT.blokkat_knowledge_earned_by_sacrifice]§!§!"
 giga_blokkat.3000.system:0 "§R수확된 성계§!로 §Y과학선§! 보내기"
 giga_blokkat.3000.system.tooltip:0 "블록캣이 수확한 성계는 깨끗히 사라졌고 에너지는 마를 때까지 완전히 흡수되었습니다. 블록캣이 수확한 시공간 지역에 정확히 어떤 것이 있는지 알기 위해서, 그 성계에 함선을 보내는 것은 과학적으로 큰 관심사입니다. 당연하게도, 그러한 성계는 초공간 항로가 없지만 점프 드라이브가 해결하지 못하는 것은 없습니다.\n\n§Y블록캣이 수확한 성계로 과학선을 보내서 $blokkat_knowledge$을 얻으십시오.\n\n§G얻을 수 있는 최대 지식: §Y1§!§!\n§G지식 습득: §Y[ROOT.blokkat_knowledge_earned_by_system]§!§!"
 giga_blokkat.3000.destroy:0 "§Y블록-해체자§! §R파괴하기§!"
 giga_blokkat.3000.destroy.tooltip:0 "블록캣에 대해 배우기 위해서, 가끔씩 우리는 좀 더... 직접적으로 나서야 합니다. 그들의 거대한 §Y블록-해체자§! 중 하나를 완전히 파괴하는 것은 대단한 과학점 잠재력이 있을 것입니다. 함선이 상당한 능력을 가지고 있고 보호 함대에게 호위도 받고 있기 때문에 쉬운 작업은 아닐 것입니다.\n\n우리가 전투 하는 동안 블록-해체자가 수확을 완료하면, 우리 함대는 소멸하고 성계와 함께 수확될 것이기 때문에 충분한 화력을 챙겨야만 합니다.\n\n§Y블록-해체자를 파괴하여 $blokkat_knowledge$을 3 얻으십시오.\n우리가 파괴한 블록-해체자 한 대당 $blokkat_knowledge$을 3 얻으며, 최대 9까지 얻을 수 있습니다.\n\n§G얻을 수 있는 최대 지식: §Y9§!§!\n§G지식 습득: §Y[ROOT.blokkat_knowledge_earned_by_destroy]§!§!"
 giga_blokkat.3000.generalstudy:0 "§Y블록캣§! §B연구§!"
 giga_blokkat.3000.generalstudy.tooltip:0 "특정한 §B블록캣 연구 프로젝트§!를 수행하면 추가적인 $blokkat_knowledge$을 얻을 가능성이 있으며, 그들과 맞서 싸울 수 있는 병기를 고안하고자 한다면 이러한 작업은 대단히 중요합니다.\n\n§G얻을 수 있는 최대 지식: §Y?§!§!\n§G지식 습득: §Y[ROOT.blokkat_knowledge_earned_by_general_study]§!§!"
 giga_blokkat.3000.repeatables:0 "특정 §Y반복 기술§! §B연구§!"
 giga_blokkat.3000.repeatables.tooltip:0 "블록캣과 직접 교전하지 않고도, 그들과 우리가 모을 수 있었던 데이터에 대해 아직 많은 연구를 수행할 수 있습니다. 각 과학 분야에서 특정한 반복 기술을 연구하는 것으로, 최소한의 실질 위험도로 꽤 상당한 $blokkat_knowledge$을 얻을 수 있습니다.\n\n§Y이 반복 기술은 각각의 \"조사\" §B블록캣 연구 프로젝트§!를 수행하면 잠금 해제됩니다.§!\n\n§G얻을 수 있는 최대 지식: §Y?§!§!\n§G지식 습득: §Y[ROOT.blokkat_knowledge_earned_by_repeatables]§!§!"
 giga_blokkat.3000.bye:0 "§G블록캣 연구 기관§! 나가기"
 giga_blokkat.3010.name:0 "블록캣-베스터의 보호막"
 giga_blokkat.3010.desc:0 "예비 조사에 따르면, 블록캣 모선을 둘러싼 보호막은 블록캣-베스터 정도의 크기의 함선이 만들어낼 수 있는 것보다 수천조 배 더 강력합니다.\n\n이 보호막 장치를 유지하는데 난해한 기술들이 사용되고 있음은 틀림 없고, 그리하여 이 보호막 괴물을 원격으로 분석 및 조사하고 그 동력의 출처를 알아내기 위한 §Y특별 프로젝트§!가 생성되었습니다.\n\n특별 프로젝트를 완료하면 $blokkat_knowledge$ §Y1§!을 얻고 보호막에 대한 더 추가적인 연구를 할 수 있을 것입니다."
 giga_blokkat.3010.a:0 "확인."
 RESEARCH_BLOKKAT_SHIELD:0 "블록캣-베스터의 보호막 조사"
 RESEARCH_BLOKKAT_SHIELD_DESC:0 "블록캣 모선을 둘러싼 거대한 보호막의 작동 원리를 이해하고 그 구조에 있을 수도 있는 약점을 찾아내기 위해 이는 반드시 분석되어야만 합니다."
 giga_blokkat.3011.name:0 "블록캣 조사 보고서: 블록캣 초차원 방벽"
 giga_blokkat.3011.desc:0 "우리의 과학 분야가 §Y블록캣-베스터§!의 보호막에 대한 초기 분석을 완료했으며, 명확성을 위해 이는 §Y블록캣 초차원 방벽§!이라 이름 붙여졌습니다.\n\n보호막이 아공간과 초공간 내에서 발산하는 왜곡 패턴을 분석하여 보호막으로부터 멀리 떨어져 수집한 데이터는 한 가기 결론으로 수렴됩니다. 많은 현대 거대공학 프로젝트처럼, 그 보호막은 부분적으로 고차원 내에서 관리되고 있습니다.\n\n사실상, 이는 보호막이 우리의 3차원 공간과 우리의 현실을 \"둘러싼\" 일종의 \"4차원\" 내에서 끊임없이 순환하고 있음을 의미합니다. 예상대로, 이는 보호막이 §Y블록캣-베스터§!를 보호하기 위해 얼마나 많은 양의 에너지를 보관하고 조작할 수 있는지를 설명해줍니다.\n\n불행히도, 그 보호막의 내부 작동 원리 대다수가 여전히 수수께끼입니다. 하지만 이 무적으로 보이는 보호막을 차단시키기 위해 이미 다양한 이론이 생겨났고, 가장 눈에 띄는 것은 특수한 §Y초거대 구조물§!을 건설하는 것인데, 이 구조물은 §Y초차원 방벽§!의 메커니즘을 방해하고 아마도 일시적으로 중지시켜, §Y블록캣-베스터§!를 공격에 노출시킬 것입니다.\n\n여하튼, 이제 블록캣이 은하 전체를 먹어치우기 전에 초차원 방벽을 차단시키는 방법을 알아내고자 한다면, 대량의 $blokkat_knowledge$을 축적하는 것은 우리의 몫입니다.\n\n그리하여, 우리 과학팀은 이 초은하적 침략자에 대한 귀중한 지식을 더 얻기 위해 추가적인 §G블록캣 연구 작업§!을 고안했으며, 이는 우리의 §Y블록캣 정보 기관§!을 통해 진행될 수 있습니다."
 giga_blokkat.3011.a:0 "승인한다."
 giga_blokkat.3011.a.tooltip:0 "새로운 §G블록캣 연구 작업§!을 §Y블록캣 정보 기관§!에서 진행 가능합니다."
 giga_blokkat.3000.knowledge:0 "§G블록캣 지식 총량§!: §Y[ROOT.blokkat_knowledge_value]§!"
 giga_blokkat.3000.inquietude:0 "§R불안도 값§!: §Y[ROOT.blokkat_inquietude_value]%§!"
 giga_blokkat.3000.scrap:0 "£blokkat_scrap_icon_big£§M고철 비축량§!: §Y[ROOT.blokkat_scrap_value]§!"
 giga_blokkat.3000.upinquietude:0 "불안 §R부추김§! | £influence£ §Y100§!"
