 dyson_sphere_1_o_star:0 "O형 항성 다이슨 스피어 뼈대"
 dyson_sphere_1_o_star_DESC:0 "뼈대는 미래의 다이슨 스피어를 위한 기반이며, 어떠한 에너지도 생산하지 않습니다."
