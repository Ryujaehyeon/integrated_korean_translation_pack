 giga_achievement_blokkats2_tooltip:0 "$giga_achievement_blokkats2$\n$giga_achievement_blokkats2_requirement$"
 giga_achievement_blokkats3:0 "§R지질학자§!"
 giga_achievement_blokkats3_requirement:0 "§R비스무트 블록캣§! 난이도로 §Y블록캣-베스터§!를 파괴해 §G블록캣§!을 무찌르세요."
 giga_achievement_blokkats3_tooltip:0 "$giga_achievement_blokkats3$\n$giga_achievement_blokkats3_requirement$"
 giga_achievement_blokkats4:0 "§R변절자§!"
 giga_achievement_blokkats4_requirement:0 "§M엔드테크 블록캣§! 혹은 §P파괴자 블록캣§! 난이도로 §Y블록캣-베스터§!를 파괴해 §G블록캣§!을 무찌르세요."
 giga_achievement_blokkats4_tooltip:0 "$giga_achievement_blokkats4$\n$giga_achievement_blokkats4_requirement$"
 giga_achievement_blokkats5:0 "§R블록캣의 서§!"
 giga_achievement_blokkats5_requirement:0 "$blokkat_knowledge$을 §Y60§! 모으세요."
 giga_achievement_blokkats5_tooltip:0 "$giga_achievement_blokkats5$\n$giga_achievement_blokkats5_requirement$"
 giga_achievement_blokkats6:0 "§R블록캣 동물원§!"
