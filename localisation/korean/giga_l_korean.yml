 giga_eaw_enabled:0 "£menu_enabled£파우스트 원시인 - §G활성화됨§!\n점화 가능한 §Y갈색왜성§!을 공전하는 행성 §Y파우스트§!에 거주하고 있는 준-마법적 §Y파우스트 왕국§!의 생성 확률이 §Y50%§!로 설정됩니다."
