 INVESTIGATE_GALACTIC_CORE:0 "은하의 중심을 찾아서"
 INVESTIGATE_GALACTIC_CORE_DESC:0 "현재로써 우리는 은하의 중심에 접근할 수 없습니다. 하지만 은하의 중심으로 향하는 초공간 항로를 찾아낼수 있을지도 모릅니다. 자원이 풍부한 은하의 중심에 접근하는 것은 전략적으로도, 과학적으로도 상당한 이점을 얻는 일입니다. \n이 프로젝트는 우리가 준비되면 언제든지 시작될 수 있습니다."
 INVESTIGATE_GALACTIC_CORE_LINK:0 "은하의 중심을 찾아서"
 INVESTIGATE_GALACTIC_CORE_LINK_DESC:0 "우리의 프로젝트는 은하의 중심과 나머지 은하를 잇는 초공간 항로가 존재한다는 것을 밝혀냈습니다. 충분한 연구와 노력을 통해 초공간 항로들의 위치를 특정하고, 활성화시킬 수 있을 것입니다."
