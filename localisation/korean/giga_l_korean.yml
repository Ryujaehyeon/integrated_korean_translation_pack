 district_virtual_religious_desc:0 "우리의 예배 장소를 가상 공간으로 이동시킴으로써, 우리는 우리의 헌신을 더욱 증명하기 위해 시간을 단축할 수 있습니다. 우리의 가장 현명한 사상가들은 바깥세상에서 단지 몇 시간이 지나가는 동안 수 세기동안의 명상을 할지도 모릅니다."
