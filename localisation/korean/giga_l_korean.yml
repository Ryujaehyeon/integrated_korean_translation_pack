 giga_katzen.020loris.desc:0 "\"§L더러운 쓰레기들아아아아! 영강스러운 카이서가 너희 멍청한 외개인들을 박살낼 것이다!! 우주 천차가 곧-\"\n\n\"로리스, 그거 이리 줘!\"\n\n\"안돼 나는 외개인 더클로우랑 말하고 싶어!!\"\n\n\"카이저 맙소사, 로리스-\"§!\n\n§Y*잠시 소란이 있었습니다*§!\n\n에헴, 그래! 미안하네. 무슨 말을 하길 원하지, 외계인들이여?"
