 civic_eaw_crystals_desc:0 "이 문명은 자신의 기술 대부분에 에너지가 충전된 특이한 수정을 광범위하게 사용하여, 신뢰성은 더 떨어지지만 극적으로 더 높은 성능을 이끌어냅니다."
