 giga_vanilla_plus_preset_text:0 "바닐라 게임의 디자인 및 밸런스와 유사한 경험에 맞춰져 있습니다.\n\n§L초심자에게 권장됩니다.§!"
 giga_vanilla_plus_preset_tooltip:0 "- 거대구조물 1개로 제한됨\n- 바닐라 건설 한도 메커니즘\n- 천체 군함은 공격 위성으로 제한됨\n- 모든 모드 위기 비활성화됨\n- 고유 성계 생성될 수 있음\n- 은하 핵 생성됨\n- 몰락 제국 강화되지 않음\n- 거대구조물 생산량은 항성 유형에 따라 변하지 않음\n- E.H.O.F. 활성화됨\n- 모드 고유 도전과제 활성화되지만 완료 시 보너스 없음"
 giga_gigas_experience_preset_title:0 "기가-익스피리언스"
 giga_gigas_experience_preset_text:0 "도전적인 위기와 독특한 메커니즘을 갖춘 대체로 균형 잡힌 경험입니다."
 giga_gigas_experience_preset_tooltip:0 "- 반복 기술로 거대구조물 제한됨\n- 직업 기반 건설 한도 메커니즘\n- 천체 군함은 베헤모스 행성병기로 제한됨\n- 에테르눔 및 블록캣이 위기로 생성될 수 있음\n- 고유 성계 생성될 수 있음\n- 은하 핵 생성됨\n- 몰락 제국이 약간의 천체 군함을 받음\n- 거대구조물 생산량이 항성 유형에 따라 변함\n- E.H.O.F. 활성화됨\n- 모드 고유 도전과제 활성화되지만 보너스 없음"
 giga_arcade_preset_title:0 "아케이드"
 giga_arcade_preset_text:0 "제한 없음, 제약 없음!\n가장 거대한 거대구조물로 가장 거대한 악당들과 싸우세요.\n\n§L플레이 세트에 강력한 모드가 포함된 경우 권장됩니다.§!"
 giga_arcade_preset_tooltip:0 "- 거대구조물 제한 없음\n- 건설 한도 제한 없음\n- 시스템크래프트 활성화됨\n- 모든 모드 위기 활성화됨\n- 고유 성계 생성됨\n- 은하 핵 생성됨\n- 몰락 제국이 천체 군함을 받음\n- 거대구조물 생산량이 항성 유형에 따라 변함\n- E.H.O.F. 활성화됨\n- 모드 고유 도전과제 활성화되며 완료 시 보너스 제공"
