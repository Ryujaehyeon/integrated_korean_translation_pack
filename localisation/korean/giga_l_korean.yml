 SMALL_SHIELD_ARMOR_AETERNUM_DESC:0 "$SHIELD_ARMOR_AETERNUM_DESC$"
 ARC_EMITTER_AETERNUM:0 "에테르나이트 루프-양자 아크에미터"
 ARC_EMITTER_AETERNUM_DESC:0 "대부분의 장갑과 보호막을 뚫고 선체를 직접 타격하는 무기로, 사이오닉 에너지 폭풍으로 둘러싸인 초응축된 루프양자 벼락을 발사합니다."
 PLANET_LANCE_AETERNUM:0 "에테르나이트 루프-양자 절대권위"
 PLANET_LANCE_AETERNUM_DESC:0 "절대권위는 에테르나이트 병기의 정점입니다. 행성 크기의 함선에 장착된 거대한 에너지 광선으로, 말도 안되는 크기의 반응로로부터 동력이 공급됩니다. 이 괴물은 그와 맞선 모든 것을 파괴할 수 있고, 파괴할 것입니다. 엄청난 양의 사이오닉 에너지로 물든 응축된 양자장의 흐름은 가장 튼튼한 함선 조차도 파괴할 수 있습니다."
 TITAN_LANCE_AETERNUM:0 "에테르나이트 루프-양자 소멸 광선"
 TITAN_LANCE_AETERNUM_DESC:0 "집중된 양자장의 거대한 에너지 광선으로, 장에 내제된 사이오닉 에너지를 더하는 것으로, 더 강화되어 지나가는 모든 목표를 그냥 지워버리는 가공할만한 무기를 만들어냅니다."
 LASER_AETERNUM:0 "에테르나이트 루프-양자 투사분쇄기"
 LASER_AETERNUM_DESC:0 "에테르나이트-설계의 양자 투사기로, 약간의 사이오닉 퍼텐설로 강화된 얽힘 루프-양자 에너지장을 사용해 적 함선 다수의 장갑을 파괴하는데 초점이 맞춰져있습니다."
 KINETIC_AETERNUM:0 "에테르나이트 중력-양자 박격포대"
 KINETIC_AETERNUM_DESC:0 "루프-양자 기술에 기반을 둔 이 무기는, 한개의 강력한 발사체를 일반적으로 고전 물리학에서는 불가능하다고 여겨졌던 속도로 가속합니다. 약간의 사이오닉 퍼텐셜로 강화될 수 있으며, 이를 통해 발사체가 자동 유도하고 목표에 충돌하기 전에 스스로를 조정합니다."
 AUTOCANNON_AETERNUM:0 "에테르나이트 루프-양자 광선분사기"
 AUTOCANNON_AETERNUM_DESC:0 "에테르나이트 광선분사기는 사이오닉 에너지 폭풍으로 둘러싸인 일정하고 응축된 양자장 광선을 집중합니다. 이는 가볍고 재빠른 적 함선을 노리기 위한 것이며, 광선 내에 포함된 사이오닉 퍼텐셜을 통해 광선이 목표에 확실히 맞도록 스스로를 조정하게끔 합니다."
 col_aeternum_capital:0 "에테르나이트 수도"
 col_aeternum_capital_desc:0 "고대의 에테르나이트 문명의 심장인 거대한 버치 월드입니다."
 building_giga_aeternum_birch_capital:0 "에테르나이트 수도"
 building_giga_aeternum_birch_capital_desc:0 "버치 월드와 제국 전체를 통치하는 에테르나이트의 중앙집권 정부가 있는 건물입니다. 정부 과제를 능률적으로 돕기 위한 다양한 종류의 컴퓨터와 기계로 가득합니다."
 building_giga_aeternum_ruler_computer:0 "에테르나이트 왕의 컴퓨팅 단지"
 building_giga_aeternum_ruler_computer_desc:0 "이 거대한 네트워크화된 단지는 에테르나이트 통치자의 개인 컴퓨터이며, 필요할 때마다 제국을 조정하고 관리하는데 사용됩니다. 이것의 거대한 데이터뱅크에는 에테르나이트의 과학 및 문화적 지식 대부분과 값을 매길 수 없는 다양한 비밀들도 담겨있습니다."
 building_giga_aeternum_housing:0 "에테르나이트 거주 메가플렉스"
 building_giga_aeternum_housing_desc:0 "루프-양자 에테르나이트 기술로 건설된 광대한 거주 단지입니다. 스스로 시공간을 구부릴 수 있어, 이 기묘한 거주지는 겉으로 보이는 부피보다 더 넓은 내부 공간이 존재하며, 거주자의 필요에 맞춰 스스로를 자동적으로 조정할 수 있습니다."
 building_giga_aeternum_leisure_center:0 "에테르나이트 오락 메가플렉스"
 building_giga_aeternum_leisure_center_desc:0 "에테르나이트 사람들을 완전히 만족시키고 즐겁게 하는것에 전념하는 시설입니다. 모든 에테르나이트 문화와 오락뿐만 아니라, 거의 무한에 가까운 잠재력의 시뮬레이션 세상에 접근할 수 있습니다."
 building_giga_aeternum_quantum_reactor:0 "에테르나이트 루프-양자 반응로"
 building_giga_aeternum_quantum_reactor_desc:0 "난해한 루프 양자 현상으로부터 에너지를 끌어내는 거대한 구조물이며, 에테르나이트 에너지망을 관리하는 복잡한 과정을 활성화하고 능률화하는 일을 합니다."
 building_giga_aeternum_psi_halls:0 "에테르나이트 사이오닉 축전기"
 building_giga_aeternum_psi_halls_desc:0 "이 세상의 하늘에 사이오닉 에너지장을 펼치는 발전기로, 에테르나이트의 사이오닉 능력을 강화하며, 지역민들을 온순하고 순종적이게 합니다."
 building_giga_aeternum_ultrafarm:0 "에테르나이트 영양 시설"
 building_giga_aeternum_ultrafarm_desc:0 "에테르나이트 인공지능이 운영하는 난해한 자동화 농장으로, 지역민의 섭취를 위해 맞추어진 영양분이 가득한 음식을 거의 즉시 대량 합성합니다."
 building_giga_aeternum_synthetizer:0 "난해한 에테르나이트 합성기"
 building_giga_aeternum_synthetizer_desc:0 "루프-양자-기반의 기술을 사용해 에테르나이트의 산업을 유지하기 위해 자동적으로 다양하고 진보된 자원을 합성하고 조립하는 복잡한 건물 네트워크입니다."
 building_giga_aeternum_megacity_energy:0 "Energiankaupunki"
 building_giga_aeternum_megacity_energy_desc:0 "하나의 위대한 에테르나이트 메가시티 중 하나인 §H$building_giga_aeternum_megacity_energy$§!는 아이온디아 전역의 에너지 흐름을 조정하는 데 전적으로 헌신하고 있습니다. 인접한 루프 양자 반응기 시설 옆에서, 아이온디아우코와 아이온디아의 쌍둥이 사이오닉 하이퍼사이폰에서 수집된 에너지도 여기에서 관리됩니다."
 building_giga_aeternum_megacity_psionic:0 "Psioniikankaupunki"
 building_giga_aeternum_megacity_psionic_desc:0 "하나의 여덟 개의 위대한 아에테르나이트 메가시티 중 하나인 §H$building_giga_aeternum_megacity_psionic$§!는 아이온디아를 흐르는 사이오닉 에너지의 흐름을 관리하고 응용 사이오닉과 관련된 모든 것을 감독합니다. 또한 아에테르넘 우주에서 은폐된 함선의 사이오닉 탐지를 담당하는 장치인 §H커르카스마작카§!의 주요 부분을 포함하고 있습니다."
 building_giga_aeternum_megacity_research:0 "Tutkimuskaupunki"
 building_giga_aeternum_megacity_research_desc:0 "하나의 여덟 개의 위대한 에테르나이트 메가시티인 §H$building_giga_aeternum_megacity_research$§!는 한때 모든 에테르나움 기술 발전을 조정하는 역할을 했지만, 현재는 여전히 자신의 실험을 수행하고자 하는 몇몇 호기심 많은 주민들만이 남아 있을 뿐입니다. 주변 시골 지역은 에테르나이트 황금 시대의 미완성 및 버려진 프로젝트들로 가득 차 있습니다."
 building_giga_aeternum_megacity_unity:0 "Arkistonkaupunki"
 building_giga_aeternum_megacity_unity_desc:0 "하나의 여덟 개의 위대한 아에테르나이트 메가시티 중 하나인 §H$building_giga_aeternum_megacity_unity$§!는 기술 및 문화 지식의 웅장한 아카이브입니다. 처음에는 은하 간 확장의 찬란한 역사를 기록하기 위해 설계되었으나, 현재는 쾌락주의적인 아에테르나이트 인구가 제작한 수백만 년 분량의 오락 매체로 가득 차 있습니다. 진취적인 탐험가들은 여기서 아에테르눔의 문화 유산의 광대함을 탐구하며 평생을 보낼 수 있습니다."
 building_giga_aeternum_megacity_military:0 "Sodankaupunki"
 building_giga_aeternum_megacity_military_desc:0 "하나의 여덟 개의 위대한 아에테르나이트 메가시티 중 하나인 §H$building_giga_aeternum_megacity_military$§!는 아이온디아의 방대한 조선소 시설과 표면을 감시하는 사이코합성 경비대의 군단을 조정하는 역할을 담당하고 있습니다. 현재는 자동화된 유지 보수 작업 외에는 거의 수행하지 않으며, 드물게 침입자를 막기 위해 함대를 몇 척 보내기도 합니다."
 building_giga_aeternum_megacity_megaconstruction:0 "Seostenkaupunki"
 building_giga_aeternum_megacity_megaconstruction_desc:0 "고급 건설 및 기타 고급 건축 프로젝트에 사용되는 기질의 제조 중심지인 §H$building_giga_aeternum_megacity_megaconstruction$§!는 여덟 개의 위대한 에테르나이트 메가도시 중 하나입니다. 한때는 전체 행성체를 사용 가능한 자재로 정제하는 데 관여했지만, 현재는 가끔 구조물 유지보수 외에는 거의 사용되지 않습니다."
 building_giga_aeternum_megacity_factory:0 "Tuotantokaupunki"
 building_giga_aeternum_megacity_factory_desc:0 "하나의 여덟 개의 위대한 에테르나이트 메가시티 중 하나인 §H$building_giga_aeternum_megacity_factory$§!는 현대 에테르나이트 사회에서 사용되는 고급 상품과 기술의 대부분이 제조되는 곳입니다. 한때 에테르눔의 황금기 동안 위대한 기술적 경이로움의 장소였던 이곳은 이제는 끝없이 반복되는 평범한 소비재를 생산하는 곳으로 전락했습니다."
 aeternum_birch_world:0 "선구자 버치 월드"
 aeternum_birch_world_desc:0 "이 버치 월드는 엄청나게 오래되었으며, 적어도 백만 년 전에 선구자 문명이 건설한 것입니다. 환상적인 첨단 기술로 건설되었으며 거주자에게 초현실적인 생활 조건을 제공합니다."
 birch_world_decaying:0 "부식된 극초거대 구조물"
 birch_world_decaying_desc:0 "이 버치 월드의 일부분은 여전히 거주 가능하지만, 이 건축물 상부 구조물의 큰 부분이 수십만 년 간 무관심한 거주자들에 의해 방치되어 붕괴되고 파괴되었습니다. 현 상태로는, 이 버치 월드의 거주할만한 공간을 확장하는 것은 대규모 보수 작업 없이는 불가능합니다.\n\n§Y버치 월드의 모든 \"부식된 극초거대 구조물\"을 청소하여 없앨 수 있습니다.§!"
 birch_world_grand_shield:0 "수우리킬피안"
 birch_world_grand_shield_desc:0 "에테르나이트어로 \"위대한 방패\"인 수우리킬피안은 이 버치 월드를 감싸는 기념비적인 에너지 방벽입니다. 구조물의 적도 주위의 특수한 고리가 생성하여, 버치 월드의 표면을 궤도 폭격으로부터 보호하고, 외부로부터의 피해 또는 돌아다니는 천체로부터 거주자들을 안전하게 유지합니다.\n\n§Y궤도로부터의 모든 행성 황폐도가 무력화됩니다.§!"
 AETERNUM_COUNTRY:0 "고대의 우월"
 AETERNUM_COUNTRY_DESC:0 "이 문명은 말도 안되게 오래되었습니다. 그들은 수백만 년 전 은하를 지배하기도 했었지만, 결국 은하 중심의 거대한 버치 월드로 후퇴하였습니다. 그들은 은하적 사안에 별 관심이 없습니다."
 origin_katzen_civil_war:0 "캇첸 사칭국"
 origin_katzen_civil_war_desc:0 "이 국가는 중앙집권화된 캇첸아르티히 제국의 붕괴 이후 등장했습니다. 그들은 캇첸 국가의 정당한 후계국이라 주장하며, 그들의 통치 하에 과거 캇첸 영토를 재통합하고자 합니다."
 giga_katcivilwar.1001.name:0 "캇첸 내전"
 giga_katcivilwar.1001.desc:0 "§Y플러션§!의 몰락 이후, §Y캇첸아르티히 제국§!의 나머지 부분은 4개의 주요 국가와 무수히 많은 작은 국가로 붕괴되었으며, 중대한 분리는 과거 제국이었던 곳의 저명한 인물이 주도했습니다.\n\n이 국가들은 §Y[katzen_civil_war_realm.GetName]§!, §Y[katzen_civil_war_republic.GetName]§!, §Y[katzen_civil_war_socialist.GetName]§!, 그리고 §Y[katzen_civil_war_junta.GetName]§!이며, 모두가 스스로를 캇첸아르티히 제국의 적법한 후계국이라 주장했고 그들이 생긴 지 몇 달 후, 네 국가 간에는 이미 높은 긴장 상태가 유지되고 있었습니다.\n\n그러나, §Y[katzen_civil_war_socialist.GetName]§!의 지도자인 §Y먀오카일 카틀리닌§!이 다른 세 캇첸 도전자에 대한 전면적인 공격을 시작함으로써 이러한 긴장은 임계점에 달한것으로 보입니다! 이 갑작스러운 침략 행위는 이후 다른 국가에서도 서로에게 선전포고를 하도록 촉발하여 현재 §Y캇첸 내전§!으로 알려진 사태를 촉발했습니다.\n\n캇첸 종족을 공동의 명분 아래에 묶을 §Y카이저§!가 없기에, 한 때 은하에서 가장 통합되고 안정적이었던 제국 중 하나로 우뚝 섰던 강력한 캇첸아르티히 제국은, 다시 한 번 제국을 통합하기 위해 경쟁하는 하찮은 군벌들 사이의 전면적인 내전으로 무너졌습니다."
 giga_katcivilwar.1001.a:0 "카이저가 없다면 다 똑같은 것 아닌가?"
 giga_katcivilwar.1012.name:0 "먀오카일 카틀리닌이 캇첸아르티히 제국을 재통합하다!"
 giga_katcivilwar.1012.desc:0 "캇첸 내전의 모든 교전국의 파괴와 함께, §Y먀오카일 카틀리닌§!의 §Y사회주의 캇첸 국가§!가 끔찍한 고양이네 내전의 궁극의 승자가 되었습니다.\n\n다른 주요한 캇첸 분열 국가가 남아있지 않기 때문에, 카틀리닌은 공식적으로 그의 사회주의적 통치 아래 제국으로 재통합되었음을 주장했습니다.\n\n의기양양한 승리 선언문에서, 그는 캇첸 혁명을 널리 퍼트리고 은하 전체의 노동자들이 캇첸 사회주의 아래에서 자유로워질 것을 약속했으며, 국가의 이름을 공식적으로 §Y사회주의 캇츠 제국§!으로 바꾸었습니다.\n\n놀랍게도, 카틀리닌은 이 기회를 이용해 캇첸 재통일을 완수하기 위해, 모든 잔존 독립 §Y캇첸 분열 국가§!에 대해 §R전쟁 선포§!를 했습니다.\n\n이제 그가 제국이었던 것의 대부분을 통제하기 때문에, 카틀리닌의 국가의 국력은 상당히 성장하였고, 그는 가까운 시일 내에 조심해야 할 강력한 적이 될 지도 모릅니다..."
 giga_katcivilwar.1012.a:0 "사회주의 캇첸 국가? 흥미롭군..."
 giga_katcivilwar.1013.name:0 "키블스 수상이 캇첸아르티히 제국을 재통합하다!"
 giga_katcivilwar.1013.desc:0 "캇첸 내전의 모든 교전국의 파괴와 함께, §Y키블스 수상§!의 §Y하이터 캇첸아르티히 공화국§!이 끔찍한 고양이네 내전의 궁극의 승자가 되었습니다.\n\n키블스의 민주적이고 자유적인 체제가 그들의 적에게서 승리를 거두었고, 이후 그는 캇첸아르티히 제국의 §Y[katzen_civil_war_republic.GetName]§!(으)로의 재통합과 개혁을 선포했습니다.\n\n과거의 제국과 §Y플러션§!의 과거 §Y솔라키아 공화국§! 비교해서 더욱 평화적이고 우호적인 정책으로 키블스의 공화국은 은하계와 더욱 협력할 듯 하며, \"두 번째 캇첸 제국\"의 위협은 이제 영원히 걱정할 이유가 없어진 듯 합니다."
 giga_katcivilwar.1013.a:0 "카이저보단 친절한 것 같군, 확실해."
 giga_katcivilwar.1014.name:0 "캇첸마샬 엘윈이 캇첸아르티히 제국을 재통합하다!"
 giga_katcivilwar.1014.desc:0 "캇첸 내전의 모든 교전국의 파괴와 함께, §Y엘윈§!의 §Y캇첸 군사독재정§!이 끔찍한 고양이네 내전의 궁극의 승자가 되었습니다.\n\n그녀의 군국주의적 정책으로, 엘윈은 효과적으로 §Y카이저§!의 §Y캇첸아르티히 제국§! 재건을 추구했으나, 그녀의 새로이 선포된 §Y[katzen_civil_war_junta.GetName]§!(은)는 카이저의 공격적이지만 우호적이고 평등주의적 사회보다 명백히 훨씬 더 권위주의적이고 억압적입니다.\n\n엘윈은 그녀 스스로를 캇첸 종족과 국가의 우월성에 자부심을 가지고 있고, 그래서 모든 캇첸을 다시 옛 보금자리로 데려오기 위해, 잔존 독립 캇첸 분열국에 §R전쟁을 선포§!했습니다.\n\n다행히도, 엘윈의 정권은 다소 외계인 혐오주의적이고 고립주의적인듯 합니다. 그래서 그녀는 그녀의 통제력을 외부보다는 내부로 발휘하는데 집중할 가능성이 있습니다. 그럼에도 불구하고, 우리는 경계해야합니다. 엘윈은 그닥 정신적으로 안정된 인물은 아니며, 그녀가 §Y캇첸 민중§!이 있는 식민지를 포함하는 모든 성계를 추가적으로 §Y요구§!했기 때문입니다."
 giga_katcivilwar.1014.a:0 "더 심하다는 것을 빼면 거의 똑같군. 빌어먹을 고양이들."
 giga_katcivilwar.1015.name:0 "하사관 T-T가 캇첸아르티히 제국을 재통합하다!"
 giga_katcivilwar.1015.desc:0 "캇첸 내전의 모든 교전국의 파괴와 함께, §Y하사관 T-T§!의 §Y캇체니슈에스 보호위원회§!가 끔찍한 고양이네 내전의 궁극의 승자가 되었습니다.\n\n이 승리는 많은 외부 관측자들에게 놀라움으로 다가왔는데, 이는 하사관 그녀 자신이 캇첸 군국주의를 없애버리고 싶다는 바램을 공식적으로 발표하면서, 하사관과 그녀의 국가가 그들의 평화적인 방식을 널리 알렸기 때문입니다.\n\n하사관은 이제 §Y[katzen_civil_war_realm.GetName]§!의 수립을 선언했으며, 평화적이고 평등주의적이며, 환경 친화적인 이 캇첸 국가는 내적 평화뿐만 아니라 외교와 이해를 통한 국제적 은하의 평화를 지키기려 노력합니다.\n\n일반적인 캇첸의 방식과는 꽤나 동떨어져있지만, 그럼에도 불구하고 하사관이 그녀의 이상을 지키기로 결심한 것처럼 보이기에, 캇첸에 의한 또다른 전쟁을 걱정할 필요가 없어졌음을 의미합니다."
 giga_katcivilwar.1015.a:0 "노선이 급격하게 바뀌었군. 적어도 우리를 귀찮게 하지는 않을 것이다."
 civic_reunited_imperium_socialist:0 "재통합된 제국 - 은하 혁명"
 civic_reunited_imperium_socialist_desc:0 "카틀리닌이 사회주의와 평등주의의 깃발 아래 캇첸을 통합했고 이제 전 은하에 위대한 고양이 혁명을 일으키기 위해 노력합니다."
 civic_reunited_imperium_republic:0 "재통합된 제국 - 위대한 공화국"
 civic_reunited_imperium_republic_desc:0 "키블스가 제국의 폐허를 다시 합쳤고 이를 안정적이고 민주적인 공화국으로 재건하였습니다."
 civic_reunited_imperium_junta:0 "재통합된 제국 - 새로운 질서"
 civic_reunited_imperium_junta_desc:0 "엘윈이 다시 한 번 캇첸 종족을 통합하였고, 이제 고양이들에 대한 권위주의적이고 군국주의적인 정권을 수립하고 있습니다."
 civic_reunited_imperium_realm:0 "재통합된 제국 - 평화의 길"
 civic_reunited_imperium_realm_desc:0 "하사관의 재통합된 제국은 평화롭고 환경 친화적인 삶의 방식에 기반을 두고 있으며, 이는 군국주의의 불꽃을 끄고 가능할 때마다 자연뿐만 아니라 은하와의 조화 및 평화를 만들려 노력하고 있습니다."
 giga_katcivilwar.1003.name:0 "키블스 수상이 지원을 요청하다!"
 giga_katcivilwar.1003.desc:0 "현재 다른 주요 카첸 분리 국가들과 내전에 휘말려 있는 캇첸 분열 국가인 §Y[katzen_civil_war_republic.GetName]§!의 외교관들이 우리에게 접촉해 왔습니다.\n\n자도자인 §Y키블스 수상§!이 은하 공동체의 구성원들에게 그의 국가를 위한 지원을 요청했으며, 그에 따르면, 이는 이전 캇첸 영토와 그 너머의 민주주의를 보호하기 위해서라고 합니다.\n\n§Y[katzen_civil_war_republic.GetName]§!(이)가 무시무시한 §Y캇첸아르티히 제국§!의 일부였지만, 그들이 카이저의 과거 제국에 비해 확실히 훨씬 덜 공격적이고 덜 군국주의적임을 알아둬야합니다. 그리고 다른 캇첸 국가들에 대한 키블스 수상의 승리를 돕는 것으로 미래에 \"두 번째 캇첸 제국\"은 절대 나타나지 않게될 것입니다."
 giga_katcivilwar.1003.a:0 "물론이지! 그는 우리의 전폭적인 지지를 받을 것이다. | £energy£ §Y15000§! £alloys£ §Y5000§!"
 giga_katcivilwar.1003.b:0 "보낼 수 있는 것을 보내라. | £energy£ §Y7500§! £alloys£ §Y2500§!"
 giga_katcivilwar.1003.c:0 "자신이 뭐라고 생각하는건가?"
 helped_kibbles_low:0 "보통의 국제 지원"
 helped_kibbles_low_desc:0 "은하 공동체가 이 국가를 돕고 있습니다."
 helped_kibbles_high:0 "높은 국제 지원"
 helped_kibbles_high_desc:0 "은하 공동체가 이 국가를 돕고 있습니다."
 giga_katcivilwar.1005.name:0 "먀오카일 카틀리닌이 동맹을 제안하다!"
 giga_katcivilwar.1005.desc:0 "우리는 다름아닌 §Y[katzen_civil_war_socialist.GetName]§!의 지도자 §Y먀오카일 카틀리닌§!으로부터 연락을 받았습니다.\n\n사실, 카틀리닌은 우리의 평등주의적 정책이 \"캇첸 사회주의\"에 대한 그의 견해와 일치한다고 생각하고 우리를 §Y동맹§!으로 초대했습니다.\n\n그의 제안을 받아들이는 것은 §Y캇첸 내전§!에 참전하는 것을 의미하지만, 우리의 도움으로 §Y[katzen_civil_war_socialist.GetName]§!(이)가 다른 캇첸 세력을 이긴다면, 의심할 여지 없이 매우 강력한 동맹이 될 것이며, 은하계 전체에 평등주의를 전파하는 데 도움이 될 귀중한 자산이 될 것입니다."
 giga_katcivilwar.1005.a:0 "멋진 제안이군!"
 giga_katcivilwar.1005.b:0 "저리 가라고 전해라."
 opinion_communist_ally:0 "사회주의자 동맹"
 opinion_helped_kibbles:0 "우리를 지지함"
 giga_disco.120.name:0 "§Y[giga_pronight_protests_planet.GetName]§!의 친-야간 시위"
 giga_disco.120.desc:0 "최근 §Y[giga_pronight_protests_planet.GetName]§!에서 거대한 시위가 일어났으며, \"밤을 돌려달라\"며 외치고 있습니다.\n\n우리의 §Y위성 반사경§!의 백야 프로토콜이 지역민들에게 잘 먹히지 않은 것 같으며, 행선 거주민 다수가 즉시 프로토콜을 되돌려놓고 행성의 일반적인 밤낮 주기를 되돌려놓으라고 요구하고있습니다.\n\n현재는 상대적으로 평화롭지만, 어떠한 조치도 취해지지 않으면 시위가 고조될 수 있습니다."
 giga_disco.120.a:0 "자신들이 뭐라고 생각하는건가?"
 giga_disco.120.b:0 "그들이 옳다, 즉시 프로토콜을 종료하지."
 giga_disco.120.b.tooltip:0 "§Y[giga_pronight_protests_planet.GetName]§!을 비추는 §Y위성 반사경§!이  §Y위성 조명 쇼§!로 설정될 것입니다.\n\n앞으로 §Y10 년§!간 §Y백야 프로토콜§!을 다시 시행할 수 없을 것입니다."
 pronight_protests:0 "친-야간 시위자"
 pronight_protests_desc:0 "이 행성의 사람들은 백야 프로토콜의 제거를 요구하고 있습니다."
 giga_disco_nonight_guide:0 "§H거대 구조물이 받는 영향:§!\n§R유지비 +100%\n고장 확률 +15%§!\n\n§H행성계가 받는 영향:§!\n§G자원 생산량 +40%\n범죄 -30%§!\n§R안정도 -20 \n생물 행복도 -15%\n거주적합성 -20%\n불안을 유발할 수 있습니다!§!\n\n\n오늘과 같은 시대에, 밤은 단순히 생산성을 떨어뜨리는 요소일 뿐입니다. 기본 행성 시간표가 있어야합니다.\n더 강한 반사경 조명과 행성 궤도에 교묘하게 배열된 거울들을 조합하면, 지역 행성계의 모든 천체가 무한한 낮을 즐길 수 있을 것입니다."
 giga_disco_repro_guide:0 "§H거대 구조물이 받는 영향:§!\n§R유지비 +50%\n고장 확률 +5%§!\n\n§H행성계가 받는 영향:§!\n§G팝 성장 속도 +30%\n생물 행복도 +20%§!\n§R안정도 -5\n소비재 유지비 +10%\n자원 생산량 -10%§!\n\n\n재생산에 있어서 조명은 놀라울 정도로 중요한 역할을 할 수 있습니다. 반사경을 지역적 번식기와 습성에 맞춤으로써, 우리는 지역 행성계릐 인구 성장률을 최대치로 유지할 수 있습니다."
 giga_disco_indoc_guide:0 "§H거대 구조물이 받는 영향:§!\n§R유지비 +50%\n고장 확률 +10%§!\n\n§H행성계가 받는 영향:§!\n§G통치 윤리관 선호도 +200%\n안정도 +15\n범죄 -50%§!\n§R팝 성장률 -10%§!\n\n\n많은 종들의 신경망은 다양한 유형의 빛에 다르게 반응하도록 되어있습니다. 따라서 우리의 반사경이 빠르지만 개별적인 섬광을 일정 주기와 특정 파장으로 방출하게 함으로써, 지역민의 온순함이 급격하게 상승할 것입니다."
 giga_disco_lightshow_guide:0 "§H행성계가 받는 영향:§!\n§G편의 +35%\n통합력 생산량 +25%\n행복도 +10%\n무역 가치 +25%\n통치 윤리관 선호도 +25%§!\n\n\n\n\n\n밤하늘에 우리 제국의 국기와 색깔을 상징하도록 조정된 눈부신 조명 쇼와 오로라를 방출하여, 행성의 자연광 수준을 약간 불안정하게하는 대신, 우리는 지역민의 만족도를 향상시키고 애국심을 복돋을 수 있습니다."
 disco_moon_repro_modifier:0 "번식 촉진"
 disco_moon_repro_modifier_desc:0 "이 행성계의 위성 반사경은 지역적 생체 주민의 번식을 촉진합니다."
 disco_moon_indoc_modifier:0 "무의식적 세뇌"
 disco_moon_indoc_modifier_desc:0 "이 행성계의 위성 반사경은 온순성과 순종을 극대화하기 위해 행성 조명을 개별적으로 조작하고 있습니다."
 disco_moon_nonight_modifier:0 "백야 프로토콜"
 disco_moon_nonight_modifier_desc:0 "이 행성계의 위성 반사경이 행성 궤도에 있는 일련의 거울을 사용해 행성계의 모든 장소가 언제든 환하게 만들어줍니다."
 giga_disco_repro:0 "클릭해서 이 §Y위성 반사경§!을 §Y번식 촉진§!으로 설정.\n\n§T재생산에 있어서 조명은 놀라울 정도로 중요한 역할을 할 수 있습니다. 반사경을 지역적 번식기와 습성에 맞춤으로써, 우리는 지역 행성계릐 인구 성장률을 최대치로 유지할 수 있습니다.§!"
 giga_disco_indoc:0 "클릭해서 이 §Y위성 반사경§!을 §Y무의식적 세뇌§!로 설정.\n\n§T많은 종들의 신경망은 다양한 유형의 빛에 다르게 반응하도록 되어있습니다. 따라서 우리의 반사경이 빠르지만 개별적인 섬광을 일정 주기와 특정 파장으로 방출하게 함으로써, 지역민의 온순함이 급격하게 상승할 것입니다. §!"
 giga_disco_nonight:0 "클릭해서 이 §Y위성 반사경§!을 §Y백야 프로토콜§!로 설정.\n\n§T오늘과 같은 시대에, 밤은 단순히 생산성을 떨어뜨리는 요소일 뿐입니다. 기본 행성 시간표가 있어야합니다.\n더 강한 반사경 조명과 행성 궤도에 교묘하게 배열된 거울들을 조합하면, 지역 행성계의 모든 천체가 무한한 낮을 즐길 수 있을 것입니다.§!"
 giga_disco_lightshow:0 "클릭해서 이 §Y위성 반사경§!을 §Y위성 조명 쇼§!로 설정.\n\n§T밤하늘에 우리 제국의 국기와 색깔을 상징하도록 조정된 눈부신 조명 쇼와 오로라를 방출하여, 행성의 자연광 수준을 약간 불안정하게하는 대신, 우리는 지역민의 만족도를 향상시키고 애국심을 복돋을 수 있습니다.§!"
 giga_disco_turnoff:0 "클릭해서 이 §Y위성 반사경§!을 §R끕니다.§! 어떠한 보정치도 적용되지 않지만, 유지비가 매우 감소합니다.\n기능을 선택하여 다시 켜십시오."
 giga_dismantle_disco_tooltip:0 "$giga_dismantle_mega$\n\n이 §Y위성 반사경§!을 해체하는 것은 £alloys£ §Y2000§! 및 £rare_crystals£ §Y500§!을 돌려줄 것이며, 이것이 건설되었던 행성은 §Y불모 행성§!으로 바뀔것입니다."
 giga_disco.2000.name:0 "§Y위성 반사경§! 해체"
 giga_disco.2000.desc:0 "이 §Y위성 반사경§!을 정말 해체하시겠습니까?\n\n우리는 £alloys£ §Y2000§! 및 £rare_crystals£ §Y500§!을 되돌려 받고, 이것이 건설되었던 행성은 §Y불모 행성§!으로 바뀔것입니다."
 giga_disco.2000.yes:0 "그래, 해체해라."
 giga_disco.2000.tooltip:0 "이 §Y위성 반사경§!은 §R해체§!될 것입니다."
 giga_flavor.2000.forgetit:0 "아무것도 아니다."
 giga_failure_chance_0_tooltip:0 "이는 이 거대 구조물이 §Y매년§! §H고장§!을 겪을 확률을 나타내며, 이로 인해 수리가 필요할 것입니다. 수리를 하지 않으면 §R치명적인 고장§!으로 이어질 수 있습니다."
 giga_disco_ball_guide:0 "§Y위성 반사경§!은 §Y지역 행성계§!에 다양한 영향을 주는데 사용됩니다.\n\n이것이 위성에 지어졌다면, 위성의 행성에 영향을 줄 것이며, 행성이 가진 다른 위성에도 적용됩니다."
 lunar_disco_ball_2_manage:0 "거대 구조물 관리..."
 lunar_disco_ball_2_manage_DESC:0 "이 §Y위성 반사경§!의 설정 메뉴가 열립니다."
 giga_disco.110.name:0 "위성 반사경 과열!"
 giga_disco.110.desc:0 "§Y[giga_mega_event_system.GetName]§! 성계의 위성 반사경 유지보수 팀이 위성 장치가 과열 상태라고 보고했습니다. 이는 구조물의 높은 에너지 필요와 그 수정판을 통한 열류량 때문일 가능성이 있습니다.\n\n거대 구조물이 여전히 기능하고 있지만, 그들은 이 문제를 해결하고 손상을 복구하기 위해 즉각적인 조치를 취할 것을 권고합니다. 왜냐하면 이 문제를 점검하지 않고 방치한 상태로 너무 무리하게 작동시킬 경우 구조물의 상태에 심각한 결과를 초래할 수 있기 때문입니다."
 giga_disco.110.a:0 "이를 중지하고 즉시 수리하기 위해 £alloys£ §Y1500§! & £rare_crystals£§Y1000§!을 보내라."
 giga_disco.110.a.tooltip:0 "§Y위성 반사경§!이 §Y1 년§! 동안 §B중지§!로 설정될 것입니다.\n그 후 다시 §B위성 조명 쇼§! 상태로 복구될 것입니다."
 giga_disco.110.b:0 "상관 없다!"
 giga_disco.110.b.tooltip:0 "$giga_high_failure_risk$"
 giga_disco.111.name:0 "위성 반사경 수리 성공!"
 giga_disco.111.desc:0 "§Y[giga_mega_event_system_name.GetName]§! 성계의 우리의 §Y위성 반사경§! 유지보수 팀이 거대 구조물의 수리가 성공적이었다고 보고했습니다!\n\n거대 구조물은 완전히 정상 작동 상태로 복구되었고, 필요한 것을 수행할 준비가 되었습니다."
 giga_disco.111.a:0 "훌륭하군."
 giga_disco.112.name:0 "위성 반사경: §R치명적인 고장§!"
 giga_disco.112.desc:0 "§Y[giga_mega_event_system_name.GetName]§! 성계의 §Y위성 반사경§!에서의 긴급한 보고입니다. 반사경이 과열 상태를 견뎌내지 못했다고 합니다.\n\n위성의 반응로가 생산하던 대량의 에너지가 위성 수정판의 대부분을 녹여버렸고, 반사경을 파괴하여 위성을 §Y용암 행성§!으로 바꾸어버렸습니다."
 giga_disco.112.a:0 "제기랄!"
 giga_disco.112.a.tooltip:0 "§Y[giga_mega_event_system_name.GetName]§! 성계의 §Y위성 반사경§!이 §Y파괴§!되었으며, 그 위성은 §Y용암 행성§!이 되었습니다."
 giga_dismantle_mega:0 "이 거대 구조물은 §R해체§!되어 완전히 사라질 것입니다.\n원래 비용의 일부를 되돌려 받을 것입니다."
 giga_dismantle_accelerator_tooltip:0 "$giga_dismantle_mega$\n\n이 §Y항성 입자 가속기§!를 해체하면 £alloys£ §Y3500§!을 돌려받습니다."
 giga_accelerator_ui_guide:0 "§Y항성 입자 가속기§!는 기술의 경이이며, 요동치는 입자들을 빛에 가까운 속도로 가속할 수 있고 그 엄청난 길이 덕분에 유례없는 수준의 엄청난 입자 충돌을 유발합니다.\n\n올바른 기술을 통해, 이 충돌은 §Y엄청난 과학적 결과§!만이 아니라, 구조물에서 일어나는 물리학을 거스르는 반응으로 형성되는 다양한 §Y신종 자원§!도 소량 생산합니다.\n\n우리는 충돌의 §Y강도§!를 §B증가§!시킬 수 있으며, 이는 거대 구조물의 §Y생산량§!과 §Y유지비§!를 증가시킵니다.\n\n그러나 §Y신종 자원§!을 생산하는 것과 §Y충돌 강도§!를 증가시키는 것은 상대적으로 §R위험한§! 과정입니다. 그러나 이는 구조물 내에서 발생할 §R고장§!의 위험을 증가시키고, §R최악의 파괴§!를 피하기 위해 즉각적으로 개입해야할지도 모릅니다."
 giga_med_failure_risk:0 "다음 몇 달 내에 §R치명적인 고장§!이 발생할 확률은 §Y20%§!입니다."
 giga_high_failure_risk:0 "다음 몇 달 내에 §R치명적인 고장§!이 발생할 확률은 §Y50%§!입니다."
 giga_accelerator.2000.name:0 "§Y항성 입자 가속기§! 해체"
 giga_accelerator.2000.desc:0 "이 §Y항성 입자 가속기§!를 정말 해체하시겠습니까?\n\n우리는 £alloys£ §Y3500§!을 돌려받을 것입니다."
 giga_flavor.2000.yes:0 "그래, 해체해라."
 giga_accelerator.2000.tooltip:0 "이 §Y항성 입자 가속기§!는 §R해체§!될 것입니다."
 particle_accelerator_1_manage:0 "거대 구조물 관리..."
 particle_accelerator_1_manage_DESC:0 "이 §Y항성 입자 가속기§!의 설정 메뉴가 열립니다."
 giga_accelerator.110.name:0 "항성 입자 가속기 구조 손상"
 giga_accelerator.110.desc:0 "§Y[giga_mega_event_system.GetName] 항성 입자 가속기§!에 배치된 팀이 가속기의 일부가 심각한 구조 손상을 입었으며, 이는 구조물 내에서 수행된 실험의 높은 에너지 요구량 때문일 것이라 보고했습니다.\n\n거대 구조물이 여전히 기능하고 있지만, 그들은 이 문제를 해결하고 손상을 복구하기 위해 즉각적인 조치를 취할 것을 권고합니다. 왜냐하면 이 문제를 점검하지 않고 방치한 상태로 너무 무리하게 작동시킬 경우 구조물의 상태에 심각한 결과를 초래할 수 있기 때문입니다."
 giga_accelerator.110.a:0 "이를 중지하고 즉시 수리하기 위해 £alloys£ §Y3000§!을 보내라."
 giga_accelerator.110.a.tooltip:0 "§Y항성 입자 가속기§!의 강도가 §Y6개월§! 동안 §B중지§!로 설정될 것입니다.\n그 후 다시 §B일반§! 상태 복구될 것입니다."
 giga_accelerator.110.b:0 "1년 간 동력을 낮추고 최소한의 수리만 해라."
 giga_accelerator.110.b.tooltip:0 "§Y항성 입자 가속기§!의 강도가 §Y1 년§! 동안 §B낮음§!으로 설정될 것입니다.\n그 후 다시 §B일반§! 상태 복구될 것입니다.\n\n$giga_med_failure_risk$"
 giga_accelerator.110.c:0 "상관 없다!"
 giga_accelerator.110.c.tooltip:0 "$giga_high_failure_risk$"
 giga_accelerator.111.name:0 "항성 입자 가속기 수리 성공!"
 giga_accelerator.111.desc:0 "§Y[giga_mega_event_system_name.GetName]§! 성계의 우리의 §Y항성 입자 가속기§! 팀이 거대 구조물의 수리가 성공적이었다고 보고했습니다!\n\n거대 구조물은 완전히 정상 작동 상태로 복구되었고, 필요한 것을 수행할 준비가 되었습니다."
 giga_accelerator.111.a:0 "멋지군!"
 giga_accelerator.112.name:0 "항성 입자 가속기: §R치명적인 고장§!"
 giga_accelerator.112.desc:0 "§Y[giga_mega_event_system_name.GetName]§! 성계의 §Y항성 입자 가속기§!가 안타깝게도 그 구조 손상을 버티지 못했다는 끔찍한 보고가 들어왔습니다.\n\n최근의 입자 충돌 실험 동안, 구조물은 충돌의 무시무시한 에너지를 제대로 억제하는데 실패했고, 이후 가속기의 정교한 뼈대 전체가 과부화를 받아 연쇄반응을 일으켜 §R완전히 구조가 붕괴§!했습니다.\n\n거대 구조물은 항성 궤도의 우주 쓰레기 더미가 되었고, 충분한 자원이 있다면 수리할 수 있을지도 모릅니다."
 giga_accelerator.112.a:0 "제기랄!"
 giga_accelerator.112.a.tooltip:0 "§Y[giga_mega_event_system_name.GetName]§! 성계의 §Y항성 입자 가속기§!가 §R폐허§!가 되었습니다."
 giga_accelerator.120.name:0 "붕괴 우려"
 giga_accelerator.120.desc:0 "우리 제국 전역에서 보고가 들어오고 있습니다. §Y항성 입자 가속기§!의 건설과 그에 따른 활성화 이후, 일부 주민들은 이 구조물이 §Y가짜 진공 붕괴§!를 일으킬 가능성에 대해 점점 더 큰 걱정을 하기 시작했습니다.\n\n사실, 몇몇 이론에 따르면, 가속기 안에서 극도로 강력한 충돌이 일어나면 §Y진공 붕괴§!로 알려진 사태로 이어질 수 있는데, 이는 국부적 공간에서 급작스러운 에너지 폭발이 우주의 주요 양자장 중 하나를 불안정하게 하여 물리학 법칙을 바꿀 때를 의미합니다.\n\n이는 연쇄 반응으로 이어져, 물리학 법칙이 다른 공간 내에서 팡창하는 구를 만들고 결국 모든 것을 파괴하며 우주 전체를 집어 삼킬 것입니다.\n\n물론, 우리의 수석 과학자는 이 이론이 거짓이라 말하며, 이를 \"억지\"이며 \"어리석다\"고 주장했습니다. 하지만 그럼에도 불구하고 우리 대중 사이에서 공포는 커지고 있으며, 몇몇 저명한 과학자들이 이 주장을 지지하기로 결정함에 따라 이 문제는 더욱 악화되었습니다.\n\n많은 이들이 이 거대 구조물이 \"우주의 종말\"을 가져오리라 주장하면서, 이제는 §Y항성 입자 가속기§!의 해체를 요구하고 있습니다..."
 giga_accelerator.120.a:0 "이를 반박할 훌륭한 연구 수행에 자원을 투자하라!"
 giga_accelerator.120.b:0 "언론을 검열하고 이 주장을 퍼트리는 자들을 체포해라."
 giga_accelerator.120.c:0 "이 사안은 무시해라. 별 일 없을것이다."
 giga_accelerator.120.d:0 "요구에 따르고 가속기를 파괴해라."
 giga_accelerator.120.d.tooltip:0 "우리 제국의 모든 §Y항성 입자 가속기§!가 §R해체§!될 것입니다.\n우리는 해체된 가속기 하나 당 £alloys£ §Y3500§!을 받습니다."
 giga_accelerator.120.b.tooltip:0 "대중은 처음엔 화를 내겠지만, 결국 조용해질 것이다.\n\n"
 giga_accelerator.120.a.tooltip:0 "이 이론이 처음부터 끝까지 확실히 반박할 훌륭한 연구를 수행할 것입니다.\n\n"
 censored_vacuum_fears:0 "검열된 가짜 진공 우려"
 censored_vacuum_fears_desc:0 "가짜 진공 이론은 본질적으로 무식한 것이다. 누구도 다시는 그에 대해 말하지 못하게 하겠다."
 false_vacuum_fears:0 "가짜 진공 우려"
 false_vacuum_fears_desc:0 "우리의 대중이 항성 입자 가속기가 초래할 지도 모르는 이론적인 가짜 진공 붕괴를 두려워합니다."
 conducting_false_vacuum_study:0 "가짜 진공 연구 수행"
 conducting_false_vacuum_study_desc:0 "우리는 가짜 진공 이론을 반박할 연구에 모든 것을 쏟아 붓고 있습니다."
 giga_accelerator.121.name:0 "공허한 공포"
 giga_accelerator.121.desc:0 "상당히 많은 노력을 했고, 마침내 우리 과학자들이 가짜 진공 이론을 처음부터 끝까지 반박했습니다!\n\n일련의 테제와 이론, 실험 그리고 그들의 발견을 소개할 공식 발표를 사용해, 그들은 가짜 진공에 대한 대중의 공포를 거의 완전히 제거할 수 있었고, 비록 어떤 무리들은 여전히 모든 것이 은폐 공작이라 믿고 있지만, 우리는 방해받지 않고 §Y항성 입자 가속기§!를 계속 사용할 수 있을 것입니다.\n\n또한 이 연구는 우주 전체에 대한 우리의 이해를 향상시키는데 도움을 주었고, 이는 의심할 여지 없이 물리학 연구에 도움이 될 것입니다."
 giga_accelerator.121.a:0 "만세!"
 giga_accelerator.122.name:0 "진짜 진공"
 giga_accelerator.122.desc:0 "수 년 간의 고된 노력 끝에, 가짜 진공 이론의 연구를 맡았던 과학자들이 드디어 결론에 닿았습니다.\n\n§R사실입니다.§!\n\n전부 사실입니다! 이러한 일이 일어날 확률이 무한하게 작지만, 충분히 거대한 입자 가속기가 가짜 진공을 만들어 은하 전체를 파괴하는 것이 사실 가능하다는 결론이 나왔습니다\n\n가짜 진공이 형성되기 전에 은하가 스스로 죽게 될 가능성은 매우 희박하지만, 우리의 과학계는 빠르게 이러한 발견을 걱정하게 되었고 가속기를 해체할 것을 요구하게 되었습니다.\n\n좀 더 긍정적인 관점에서, 그리고 어쩌면 이것으로부터 얻을 수 있는 유일한 좋은 점은, 이 연구는 우주 전체에 대한 이해의 향상에 도움을 주었지만, 우리가 우주를 파괴하게 되느냐에 대해서는 논의의 여지가 있습니다."
 giga_accelerator.122.a:0 "결과를 검열하고 대중에게 거짓말을 해라."
 giga_accelerator.122.a.tooltip:0 "역풍이 불 가능성이 있습니다.\n우리가 §Y평등주의적§!이면 그 결과가 유출될 가능성이 더 높고, §Y권위주의적§!이라면 그 반대입니다.\n\n"
 giga_accelerator.122.b:0 "그냥 발표 해라. 그들은 결국 그것에 대해 생각하지 않을 것이다."
 giga_accelerator.122.c:0 "가속기 해체"
 false_vacuum_study:0 "가짜 진공 연구"
 false_vacuum_study_desc:0 "가짜 진공의 가능성에 대한 연구는 우주에 대한 우리의 이해를 확장했습니다."
 giga_accelerator.123.name:0 "가짜 진공 결과 유출됨!"
 giga_accelerator.123.desc:0 "걱정스러운 소식입니다! 가짜 진공에 대한 결과가 아무래도 대중에게 유촐된 것 같습니다.\n\n이 폭로로 우리 인구의 대부분이 패닉에 빠지는 비참한 결과를 가져왔습니다..."
 giga_accelerator.123.a:0 "빌어먹을..."
 giga_accelerator.123.b:0 "그만! 그냥 가속기를 해체하고 끝내라!"
 giga_accelerator.130.name:0 "항성 입자 가속기 결과"
 giga_accelerator.130.desc:0 "§Y항성 입자 가속기§!의 직원은 최근 흥미로운 발견을 많이 했으며, 이는 분명 진행중인 물리학 연구에 도움이 될 것이라고 보고했습니다."
 giga_accelerator.130.a:0 "좋아."
 giga_accelerator.130.b:0 "과학자에게 급료를 더 줘라!"
 gave_accelerator_scientists_raise:0 "과학자 임금 상승"
 gave_accelerator_scientists_raise_desc:0 "우리는 항성 입자 가속기의 과학자에게 더 높은 임금을 줄 것입니다."
 giga_accelerator.131.name:0 "추가적인 항성 입자 가속기 발견"
 giga_accelerator.131.desc:0 "임금 인상 이후, §Y항성 입자 가속기§! 직원들은 진행 중인 물리학 연구에 확실히 도움이 될 추가적인 발견을 했습니다."
 giga_accelerator.131.a:0 "좋아."
 giga_accelerator.140.name:0 "잔여 암흑 물질"
 giga_accelerator.140.desc:0 "§Y항성 입자 가속기§!의 직원이 최근 충돌 실험으로 인해 색다른 잔여 §Y암흑 물질§!이 생성되었다고 보고했습니다!\n\n그들은 이를 특수 전자기 그물을 사용해 수집하는데 성공했고, 이어서 우리의 저장고에 바로 자원을 보냈습니다."
 giga_accelerator.140.a:0 "놀랍군!"
 giga_accelerator.140.b:0 "과학자에게 급료를 더 줘라!"
 giga_accelerator.141.name:0 "추가적인 잔여 암흑 물질"
 giga_accelerator.141.desc:0 "임금 인상 이후, §Y항성 입자 가속기§! 직원들은 더욱 열심히 노력하여 지난번의 성공을 다시금 재현해내어 더 많은 §Y암흑 물질§!을 만들어내었습니다!\n\n자원은 우리의 저장고로 바로 보내졌습니다."
 giga_accelerator.141.a:0 "놀랍군!"
 giga_acc_intensity_up:0 "이 거대 구조물의 강도를 §Y증가§!시켜라."
 giga_acc_intensity_down:0 "이 거대 구조물의 강도를 §Y감소§!시켜라."
 mega_intensity_meaning:0 "강도를 높이면 매년 §R고장 확률§!이 증가하며, 대형 구조물에 §R치명적인 고장§!이 발생하지 않도록 수리해야 합니다."
 giga_acc_physics:0 "§Y항성 입자 가속기§!가 다양한 입자를 충돌시키고 그 결과를 관측하게 하여 §Y물리학 연구§! 생산에 특수화 시킬 수 있습니다.\n\n기본 생산: £physics_research£ §Y150§!"
 giga_acc_dm:0 "§Y항성 입자 가속기§!가 미량의 암흑 물질을 생성하는 특수한 입자 충돌 덕분에 §Y암흑 물질§! 생산에 특수화될 수 있습니다.\n\n기본 생산: £physics_research£ §Y100§! 및 £sr_dark_matter£ §Y1§!\n기본 고장 확률: §R+5%§!"
 giga_acc_qnm:0 "§Y항성 입자 가속기§!는 특이하고 매우 특정한 입자 충돌을 통해 음의 물질을 생성하는 데 전문화될 수 있습니다.\n\n기본 생산량: §Y80§! £physics_research£ §Y0.7§! £giga_sr_negative_mass£\n기본 실패 확률: §R+10%§!"
 giga_acc_intensity_5:0 "현재 강도:\n§B극한§!\n\n효과:\n§G거대 구조물 생산량 +50%§!\n§R거대 구조물 유지비 +100%§!\n\n$mega_intensity_meaning$"
 giga_acc_intensity_4:0 "현재 강도:\n§B높음§!\n\n효과:\n§G거대 구조물 생산량 +25%§!\n§R거대 구조물 유지비 +40%§!\n\n$mega_intensity_meaning$"
 giga_acc_intensity_3:0 "현재 강도:\n§B일반§!\n\n$mega_intensity_meaning$"
 giga_acc_intensity_2:0 "현재 강도:\n§B낮음§!\n\n효과:\n§G거대 구조물 생산량 -40%§!\n§R거대 구조물 유지비 -60%§!\n\n$mega_intensity_meaning$"
 giga_acc_intensity_1:0 "현재 강도:\n§B중지§!\n\n효과:\n§G거대 구조물 생산량 -100%§!\n§R거대 구조물 유지비 -100%§!\n\n$mega_intensity_meaning$"
 giga_accelerator.150.name:0 "도망가는 블랙홀"
 giga_accelerator.150.desc:0 "§Y[accelerator_quasistar.GetName]§! 주위의 §Y항성 입자 가속기§!에서 가속기 내에서 최근 불가능한 결과가 발생했다고 보고했습니다.\n\n몇 시간 전, 비정상적으로 강력한 입자 충돌 실험이 §Y미시 블랙홀§!을 생성해버렸습니다. 이러한 블랙홀은 대개 나타나고 고작 몇 나노초만에 증발해버리기 때문에, 보통같으면 이는 주목받지 못했겠지만, 이 특수한 특이점은 너무 거대해서 별을 향해 떨어지기 시작해 가속기의 뼈대에 충돌했고, 이에 질량을 흡수해 증발하지 않았습니다.\n\n가속기에 몇 마이크로미터 너비의 작은 구멍을 팠을 뿐이라서, 블랙홀에 의한 손상은 거의 없습니다. 하지만, 그 후 블랙홀이 거대 구조물을 빠르게 빠져나갔고, 현재 별의 표면을 향해 떨어지기 시작했습니다.\n\n우리는 블랙홀이 별에 닿을 때까지 며칠 정도 걸리고, 항성의 핵에 도달하기 전에 외부 층을 갉아서 뚫어버릴 가능성이 높다고 추측합니다. 우리 과학자들은 다음에 실제로 무엇이 일어날지 불확실하다 하지만, 그들은 유심히 지켜봐야한다고 조언합니다... 그 과학적 잠재력이 명백하기 때문입니다."
 giga_accelerator.150.a:0 "걱정되는군. 이 블랙홀을 추적할 것이다."
 giga_accelerator.150.b:0 "멋지군! 과학적 잠재력은 명백하다."
 giga_accelerator.151.name:0 "내부에서 먹히다"
 giga_accelerator.151.desc:0 "§Y[accelerator_quasistar.GetName]§!(을)를 향해 떨어졌던 미시 블랙홀이 현재 별의 핵에 도달했습니다. 그리고 §Y항성 입자 가속기§!의 직원에 따르면, 별의 핵에 있는 항성 플라즈마가 특이점으로 빨려 들어가기 시작했으며, 블랙홀이 점점 더 많은 질량을 흡수해 그 크기를 키우고 있습니다.\n\n이는 사실상 §Y[accelerator_quasistar.GetName]§!(이)가 줄어들고 있다는 것을 의미합니다! 비록 현재는 눈에 띄지 않지만, 핵 내부의 블랙홀이 점점 커지면서 질량을 흡수하는 속도는 빨라지기만 할 것입니다.\n\n다행히도, 가속기의 직원들은 가까운 미래에는 걱정할게 없다는 것을 확신시켜 주었고, 그들은 이 놀라운 사태를 연구할 기대에 꽤나 흥분한듯 합니다."
 giga_accelerator.151.a:0 "그래도 조금 걱정되는군."
 studying_accelerator_black_hole_star:0 "항성 내 블랙홀 연구"
 studying_accelerator_black_hole_star_desc:0 "우리 과학자들이 인공 블랙홀에 의해 내부로부터 천천히 먹히는 별을 보고있습니다."
 studying_accelerator_black_hole_star_1:0 "항성 내 블랙홀 연구"
 studying_accelerator_black_hole_star_1_desc:0 "우리 과학자들이 인공 블랙홀에 의해 내부로부터 천천히 먹히는 별을 보고있습니다."
 giga_quasi_star:0 "항성 내 블랙홀"
 giga_quasi_star_desc:0 "인공 블랙홀이 이 별을 내부로부터 먹어치우고 있습니다."
 giga_accelerator.152.name:0 "가속화되는 소멸"
 giga_accelerator.152.desc:0 "§Y[accelerator_quasistar.GetName]§! 항성 입자 가속기 직원이 항성 내부의 블랙홀이 예상보다 더 빠르게 커지고 있다고 보고했습니다.\n\n사실, 겉으로 보기에 행성의 지름은 지난 몇 달 간 눈에 띌만큼 줄어들었고, 이는 특이점의 성장이 기하급수적으로 가속되기 시작했음을 보여줍니다.\n\n결과적으로 별이 발산하는 빛이 천천히 줄어들고 있으며, 성계의 행성을 조금 식히고 있습니다.\n\n그래도 이는 계속해서 우리의 물리학 연구에 도움을 주는 엄청난 과학적 기회입니다."
 giga_accelerator.152.a:0 "이런."
 giga_accelerator.152.a.tooltip:0 "§Y[accelerator_quasistar.GetName]§! 성계의 모든 행성이 더 차가워졌습니다.\n성계의 모든 식민지는 §Y높은 이주 압력§!을 겪을 것입니다.\n\n"
 giga_quasi_star_cooling_planet:0 "꺼져가는 별"
 giga_quasi_star_cooling_planet_desc:0 "이 행성의 별이 그 질량을 먹어치우는 블랙홀 때문에 천천히 꺼져가고 있습니다. 결과적으로, 이 행성은 점차 차가워지고 있습니다."
 giga_quasi_star_cooling_planet_1:0 "꺼져가는 별"
 giga_quasi_star_cooling_planet_1_desc:0 "이 행성의 별이 그 질량을 먹어치우는 블랙홀 때문에 천천히 꺼져가고 있습니다. 결과적으로, 이 행성은 점차 차가워지고 있습니다."
 giga_accelerator.153.name:0 "빨라지는 흡수"
 giga_accelerator.153.desc:0 "끔찍한 소식입니다! §Y[accelerator_quasistar.GetName]§! 내부의 블랙홀이 이제 별을 빠르게 흡수하고 있으며, 별은 지난 몇 년간 상당히 줄어들었습니다.\n\n성계의 행성은 눈에 띄게 차가워졌으며, 블랙홀은 항성 핵에서 엄청난 양을 흡수하며, 별 내부에서 점점 커지고 있습니다.\n\n이는 여전히 대량의 과학적 데이터를 제공하지만, 이것이 성계에 가져올 결과는 날이 갈수록 점점 더 걱정이 됩니다."
 giga_accelerator.153.a:0 "매우 문제가 많군!"
 giga_accelerator.153.a.tooltip:0 "§Y[accelerator_quasistar.GetName]§! 성계의 모든 행성이 훨씬 더 차가워졌습니다.\n성계의 모든 식민지는 §Y높은 이주 압력§!을 겪을 것입니다.\n\n"
 giga_accelerator.155.name:0 "균형"
 giga_accelerator.155.desc:0 "§Y[accelerator_quasistar.GetName]§!에서 놀라운 보고서가 도착했습니다. 줄어들던 별이 더 이상 줄어들지 않는다고 합니다!\n\n비록 처음에는 이 현상에 당황했지만, 우리 과학자들은 블랙홀로 떨어지는 어떤 항성 물질이 만들어내는 복사 에너지가 일종의 외부 압력을 형성해, 중력에 반대로 작용하고 이어서 남은 별이 더욱 붕괴하는 것을 막고있다는 것을 빠르게 알아냈습니다.\n\n이는 이제 별의 바깥 층 전체가 블랙홀의 복사 에너지에 의해 지탱되기 때문에, 정말 느리지만 별이 계속 줄어드리라는 것을 의미하고, 비록 성계의 행성이 전보다 훨씬 더 차가워졌지만, 더 이상 성계가 완전히 얼어붙어 멸망하지는 않을 것입니다."
 giga_accelerator.155.a:0 "흥미롭군."
 giga_accelerator.156.name:0 "반동"
 giga_accelerator.156.desc:0 "§Y[accelerator_quasistar.GetName]§!(은)는 우리를 실망시키지 않습니다. 오히려, 놀라운 반전으로, 별이 줄어드는 것은 완전히 멈췄고, 심지어는 더 커지기 시작했습니다!\n\n더 많은 연구로 블랙홀로 떨어지고 있는 물질에서 나온 복사 압력이 실제로 별의 바깥 부분을 \"밀어\"내어 별이 부풀고 바깥으로 팽창하고 있음이 밝혀졌습니다.\n\n또한, 이는 별의 밝기가 다시 올라가고 있고, 성계의 행성들의 온도가 원래대로 돌아가기 시작했음을 의미합니다."
 giga_accelerator.156.a:0 "문제가 스스로 해결됐군! 얼마나 기쁜 일인가!"
 giga_accelerator.156.a.tooltip:0 "§Y[accelerator_quasistar.GetName]§! 성계의 모든 행성이 다시 따뜻해졌습니다.\n\n"
 giga_accelerator.158.name:0 "바깥으로 팽창하다"
 giga_accelerator.158.desc:0 "우리 과학자가 §Y[accelerator_quasistar.GetName]§!(이)가 이제 완전히 원래 크기를 넘어섰고, 블랙홀의 복사 압력 때문에 더 큰 크기로 계속 부풀어오르고 있다고 보고했습니다.\n\n성계 내 행성의 온도가 원래 수치로 돌아왔지만, 이제 별이 팽창함에 따라 온도가 천천히 올라가도 있습니다.\n\n이는 계속해서 엄청난 과학적 잠재력을 나타낼 것이지만, 별의 팽창하는 표면이 성계의 §Y항성 입자 가속기§!에 걱정스러울 정도로 가까워지기 시작했습니다..."
 giga_accelerator.158.a:0 "걱정스럽군..."
 giga_accelerator.158.a.tooltip:0 "§Y[accelerator_quasistar.GetName]§! 성계의 모든 행성이 더 뜨거워졌습니다."
 giga_quasi_star_heating_planet:0 "자라나는 별"
 giga_quasi_star_heating_planet_desc:0 "항성 내부의 블랙홀이 별의 바깥 층을 밀어낸 결과로, 이 행성의 별이 더 밝아졌습니다. 표면 상태가 덜 쾌적해졌지만, 이는 블랙홀의 결과로 별과 성계의 내부에서 일어나는 색다른 과정을 연구할 훌륭한 기회임이 틀림 없습니다. 또한 별이 훨씬 더 밝아졌고, 이는 태양광 발전단지의 에너지 생산량을 급격히 증가시킬 것입니다."
 giga_accelerator.160.name:0 "항성 입자 가속기 파괴됨!"
 giga_accelerator.160.desc.a:0 "§Y[accelerator_quasistar.GetName]§!의 팽창이 결국 성계 내의 §Y항성 입자 가속기§!를 파괴했다는 나쁜 소식을 받았습니다.\n\n이 거대구조물은 계속 팽창하는 항성 표면으로 떨어져 순식간에 증발했습니다.\n\n다행히도, 그것이 너무 빨리 사라지기 전에 일부를 회수했으며, 항성의 팽창 속도는 크게 둔화된 것으로 보입니다. 실제로 과학자들은 이 “블랙홀”, 또는 §Y준항성§!이 이미 특이점과 외층 사이에 다른 종류의 균형을 이루었으며, 비록 극히 느리지만 계속 성장할 것으로 추정합니다.\n\n이 전체 현상은 과학적 가치가 매우 높습니다. 비록 성계 내 행성들이 일련의 사건으로 인해 상당히 뜨거워졌지만, 전체 항성계는 현재 이 기묘한 준항성에 대한 연구를 수행하기에 적합합니다.\n\n그러나 이 항성의 수명은 크게 단축되었으며, 외층은 수백만 년 후에 소멸하여 노출된 블랙홀을 남길 것으로 추정되지만, 적어도 현재로서는 걱정할 필요가 없습니다."
 giga_accelerator.160.desc.b:0 "§Y[accelerator_quasistar.GetName]§!의 팽창이 급격히 둔화된 것으로 보입니다. 사실, 과학자들은 이 \"블랙홀 별\", 또는 §Y준-항성§!이 이제 특이점과 그 바깥 층 간의 또다른 평형 상태에 도달했고 이제 엄청나게 느린 속도로 계속 성장할 것이라고 추측했습니다.\n\n이 모든 현상은 매우 과학적 가치가 높았고, 성계의 행성이 이 사건으로 인해 상당히 가열되었지만, 이제 성계 전체가 이 특이한 준-항성에 대한 연구 기회로 무르익었습니다.\n\n그러나 별의 수명이 상당히 감소하였고, 별의 바깥 층이 수백만 년 뒤에 분해되어 드러난 블랙홀만을 남길 것이라고 추측됩니다. 그러나 적어도 지금은, 문제가 되지 않습니다."
 giga_accelerator.160.a:0 "다음에는 가속기를 다룰 때 조심하도록!"
 giga_flavor.999.name:0 "기가스트럭쳐 업데이트: 새로운 기능"
 giga_flavor.999.desc:0 "안녕! 기가스트럭쳐가 최근 업데이트됐고, §Y항성 입자 가속기§!와 §Y위성 반사경§!에 새로운 커스텀 기능을 넣었습니다. 업데이트는 세이브를 망가뜨리지는 않지만, 메가를 선택하고 \"관리\" 버튼을 눌러 새로운 기능을 제대로 적용할 수 있습니다.\n\n읽어주셔서 감사하고, 재밌게 플레이하세요!"
 giga_flavor.999.a:0 "알았다."
 giga_accelerator.160.a.tooltip:0 "§Y[accelerator_quasistar.GetName]§! 성계의 모든 행성이 더 뜨거워졌습니다.\n\n§Y항성 입자 가속기§!가 §R파괴§!되었습니다.\n\n"
 giga_bulk_matter_cost_disabled:0 "£menu_disabled£거대 구조물 대량 물질 비용\n\n대형 거대 구조물의 비용이 £giga_sr_bulk_matter£ §H$giga_sr_bulk_matter$§!이 되어 여러 행성을 자원 확보를 위해 해체해야 할까요?\n\n이는 §Y링 월드§!, §Y마트리오시카 두뇌§!, §Y$name_alderson$§!, §Y자작나무 세계§!, §Y준별 파괴자§!, §Y초거대 E.H.O.F.§! 및 §Y니콜-다이슨 빔§!에 적용됩니다.\n\n비활성화되면 £giga_sr_bulk_matter£ §H$giga_sr_bulk_matter$§!는 천체 인쇄에만 필요합니다."
 giga_bulk_matter_cost_enabled:0 "£menu_enabled£거대 구조물 벌크 물질 비용\n\n대형 거대 구조물의 비용이 £giga_sr_bulk_matter£ §H$giga_sr_bulk_matter$§!가 되어 여러 행성을 해체하여 자재를 확보해야 할까요?\n\n이는 §Y링 월드§!, §Y마트리오시카 두뇌§!, §Y$name_alderson$§!, §Y자작나무 세계§!, §Y준별 파괴자§!, §Y초거대 E.H.O.F.§!와 §Y니콜-다이슨 빔§!.\n\n비활성화되면 £giga_sr_bulk_matter£ §H$giga_sr_bulk_matter$§!는 천체 인쇄에만 필요합니다."
 giga_planet_bulking_disabled:0 "£menu_disabled£행성 대형화\n은 \n다음과 같은 조건을 충족해야 합니다: £giga_sr_bulk_matter£ §H $giga_sr_bulk_matter$는 §!사용 가능해야 하며, §Y거주 불가능한 암석 행성§!을 최대 §Y크기 50§!으로 확대하고 §Y가스 거대행성§!을 헬리포머블로 만들어야 합니다."
 giga_planet_bulking_enabled:0 "£menu_enabled£행성 대형화\n\n다음이 가능해야 합니다: £giga_sr_bulk_matter£ §H$giga_sr_bulk_matter$§!를 사용하여 §Y거주 불가능한 암석 행성§!을 최대 §Y크기 50§!으로 확대하고 §Y가스 거대 행성§!을 헬리포머블하게 만드는 것입니다."
 giga_celestial_printing_disabled:0 "£menu_disabled£전쟁 위성 제조기\n위성 대형-제조기 및 그 관련 장치로 전쟁 위성을 \"찍어\"낼 수 있을지 없을지의 여부입니다. 이것과 요새 행성 복사를 비활성화하면 §Y천체 전함 건조§! 승격 특전이 제거됩니다."
 giga_celestial_printing_enabled:0 "£menu_enabled£전쟁 위성 제조기\n위성 대형-제조기 및 그 관련 장치로 전쟁 위성을 \"찍어\"낼 수 있을지 없을지의 여부입니다. 이것과 요새 행성 복사를 비활성화하면 §Y천체 전함 건조§! 승격 특전이 제거됩니다."
 attack_moon_bow_01_key:0 "거대 무기 선체"
 attack_moon_mid_01_key:0 "미행성 포대"
 attack_moon_stern_01_key:0 "격납고 지각"
 attack_moon_sternthrusters_01_key:0 "다목적 추진기"
 REACTOR_MOON:0 "위성 원자로"
 REACTOR_MOON_DESC:0 "작은 병기화된 소행성의 핵에 내장된 강력한 발전기로, 대량의 무기에 많은 에너지를 공급합니다."
 requires_war_planets:0 "$TRIGGER_FAIL$£engineering_research£ §Y$giga_tech_war_planet$§! 기술이 필요합니다."
 ap_celestial_printing:0 "천체 전함 건조"
 ap_celestial_printing_desc:0 "$giga_massive_planet_plural$와 $giga_planet_behemoth_plural$는 크기, 화력, 방어 능력 면에서 모든 다른 선박을 압도합니다. 심지어 강력한 타이탄, 콜로서스, 스타 이터조차도 단 하나의 $giga_massive_planet$과 비교하면 아무것도 아닙니다. 불행히도, 그들의 구조 특성 때문에 우리는 이들을 생산할 수 있는 능력이 극히 제한적입니다.\n\n하지만 현재의 기술 기반으로는 행성의 질량을 특수 메가구조물로 이동시키는 것은 사소한 일입니다. 그렇게 함으로써 우리는 다양한 천체에서 수확한 원시 £giga_sr_bulk_matter£ §H$giga_sr_bulk_matter$§!를 공급받아 '인쇄'할 수 있는 거대한 메가구조물을 만들 수 있습니다.\n\n이 가능성을 완전히 수용하고 무기화된 행성체의 대량 생산을 시작할 때입니다. 그리고 마침내 오래된 선박들을 없애버립시다!\n\n이렇게 방대한 양의 물질을 쉽게 조작할 수 있는 능력은 §R정말 미친§! 선박의 조립을 위한 길을 열어줄 수도 있습니다."
 ap_celestial_printing_effects:0 "\n우리는 §Y$giga_systemcraft$§! 조립을 위한 진전을 이룰 수 있습니다.\n\n행성에서 수확한 £giga_sr_bulk_matter£ §H$giga_sr_bulk_matter$§!를 활용하여 적합한 후보를 찾지 않고도 전문화된 메가구조를 사용하여 §Y공격 달§!을 조립할 수 있습니다.\n\n제작된 천체 전투함은 약간 더 §R비쌉니다§! 그리고 §R시간이 더 걸립니다§!, 하지만 §G15%§! 추가적인 §Y선체 HP§!, §Y장갑 HP§! 및 §Y방패 HP§!와 함께 §G10%§! 추가적인 §Y함선 발사 속도§!를 가집니다.\n\n획득한 연구 옵션:\n£physics_research£§Y$giga_tech_lunar_assembly$§!\n£physics_research£§Y$giga_tech_war_system_1$§!"
 giga_tech_planetary_matter_dumping:0 "초효율 지구 물질 투기"
 giga_tech_planetary_matter_dumping_desc:0 "행성 표면에 막대한 양의 물질을 쏟아붓는 것은 해당 표면에서 물질을 제거하는 것보다 훨씬 쉽지만, 여전히 전체 행성의 질량을 이동시키기 위한 매우 잘 정비된 물류와 조정이 필요한 거대한 작업입니다."
 giga_tech_lunar_assembly:0 "위성 규모 조립 프로토콜"
 giga_tech_lunar_assembly_desc:0 "4차원 공학과 나노봇과 같은 엄청나게 다양한 방식을 이용해, 대량의 행성 물질을 우리가 원하는 것으로 빠르고 효율적으로 바꿀 수 있게 되었습니다. 이로써 사전에 충분한 행성 물질을 모은다면, 전쟁 위성을 건설할 자연발생한 소행성의 필요가 없어져 사실상 스스로 전쟁 위성을 만들 수 있게 되었습니다."
 allow_lunar_assembly:0 "§H거대 구조물 잠금 해제:§! 위성 자동 조립기"
 allow_lunar_assembly_desc:0 "야심찬 궤도 메가구조물로, 행성 물질과 합금을 가공하여 공격 달을 제작합니다. 이 구조물은 작동하기 위해 £giga_sr_bulk_matter£ §H$giga_sr_bulk_matter$§!가 필요하며, 이는 §Y$giga_tech_planetary_matter_harvesting$§! 기술에 의해 부여된 결정을 사용하여 획득할 수 있습니다."
 decision_harvest_matter_for_planetary_printing_system:0 "태양계를 해체하여 £giga_sr_bulk_matter£ §H$giga_sr_bulk_matter$§!"
 decision_harvest_matter_for_planetary_printing_system_desc:0 "이 시스템의 행성들은 단순히 아무런 용도가 없으며, 자재를 위해 완전히 해체하면 더 유용할 것입니다."
 cant_have_moon:0 "행성은 위성을 가질 수 없습니다. 남아 있는 위성을 먼저 해체하십시오."
 decision_harvest_matter_for_planetary_printing:0 "행성을 해체하여 £giga_sr_bulk_matter£ §H$giga_sr_bulk_matter$§! 얻기"
 decision_harvest_matter_for_planetary_printing_desc:0 "몇몇 행성에는 아무런 목적도 없지, 그러한 행성을 자원으로 완전히 해체한다면 더 쓸모가 있을 것이다."
 decision_recover_bm_in_cache:0 "캐시에서 £giga_sr_bulk_matter£ §H$giga_sr_bulk_matter$§!을(를) 복구합니다."
 decision_recover_bm_in_cache_tooltip:0 "이 캐시는 §Y[PREV.solar_system.giga_system_bm_cache]§! £giga_sr_bulk_matter£ §H$giga_sr_bulk_matter$§!을(를) 포함합니다."
 decision_recover_bm_in_cache_desc:0 "이 캐시 안에 저장된 모든 것을 수확합니다."
 decision_build_planetary_matter_harvester:0 "이것은 이 천체의 궤도에서 §Y행성 물질 수확기§! 건설을 시작합니다.\n\n완공되면 이 강력한 메가구조물은 매 §Y6개월§!마다 $giga_sr_bulk_matter$ §H£giga_sr_bulk_matter£§!를 꾸준히 수확하여 행성의 크기를 매번 하나씩 줄입니다. 행성의 크기가 1 이하로 떨어지면 §R사라집니다§!. 이 수확 메가구조물은 매월 50 £energy£의 §Y유지비§!가 필요합니다.\n\n§R행성 물질 수확기§!는 시작되면 중단할 수 없습니다!§!"
 decision_dump_matter_on_planet:0 "£giga_sr_bulk_matter£ §H$giga_sr_bulk_matter$§! §Y1§!을 행성에 버립니다."
 decision_dump_matter_on_planet_desc:0 "우리는 잉여 질량을 이 행성에 버림으로써 이 세계를 비교적 쉽게 확장할 수 있습니다. 이는 지질학적 불안정을 초래할 수 있습니다."
 decision_dump_matter_on_planet_5:0 "£giga_sr_bulk_matter£ §H$giga_sr_bulk_matter$§! §Y5§!을 행성에 버립니다."
 decision_dump_matter_on_planet_5_desc:0 "우리는 잉여 질량을 이 행성에 버림으로써 이 세계를 비교적 쉽게 확장할 수 있습니다. 이는 지질학적 불안정을 초래할 수 있습니다."
 decision_dump_matter_on_gas_giant:0 "£giga_sr_bulk_matter£ §H$giga_sr_bulk_matter$§! §Y25§!를 주입하여 헬리오포밍을 진행합니다."
 decision_dump_matter_on_gas_giant_desc:0 "거대 가스 행성에 막대한 양의 물질을 주입함으로써, 우리는 그것을 충분히 거대하게 만들어 적절한 별로 점화할 수 있습니다."
 decision_dump_matter_on_gas_giant_tooltip:0 "우리는 §Y서브스텔라 압축기§!를 사용하여 이 §Y가스 거인§!을 §Y별§!로 점화할 수 있으며, 에너지를 생성하고 잠재적으로 그 위성들을 거주 가능하게 만들 수 있습니다."
 decision_dump_matter_on_planet_tooltip:0 "이 방법으로 최대 §Y50§! 크기까지 진행할 수 있으며, 그 이상은 너무 불안정하고 거대해져서 더 이상 활용할 수 없습니다."
 giga_printer.1001.name:0 "[planet_being_harvested_for_printing.GetName] 해체"
 giga_printer.1001.desc:0 "§Y행성 물질 수확기§!가 §Y[planet_being_harvested_for_printing.GetName]§! 주위에 완공되었습니다. 저렴하면서도 대형 중력 빔이 사용되어 행성을 빠르게 찢고 해체하고 있으며, 이는 매 §Y6개월§!마다 하나의 £giga_sr_bulk_matter£ §H$giga_sr_bulk_matter$§!를 생산하고 행성의 크기를 하나 줄입니다.\n\n행성의 크기가 0에 도달하면 사라지고 §Y행성 물질 수확기§!는 해체됩니다."
 giga_printer.1001.a:0 "정말 좋군!"
 giga_printer.1001.a.tooltip:0 "이제 우리는 매 §Y6개월§!마다 하나의 £giga_sr_bulk_matter£ §H$giga_sr_bulk_matter$§!를 받게 됩니다."
 moon_printer_orbital_mass_harvester_0:0 "행성 물질 수확기"
 moon_printer_orbital_mass_harvester_0_DESC:0 "행성 물질 수확기가 지구형 행성 주위에 건설되고 있습니다."
 moon_printer_orbital_mass_harvester_1:0 "활성화 된 행성 물질 수확기"
 moon_printer_orbital_mass_harvester_1_DESC:0 "이 궤도 장치는 아래에 위치한 불행한 천체를 꾸준히 해체하고 있으며, 매 §Y6개월§!마다 하나의 £giga_sr_bulk_matter£ §H$giga_sr_bulk_matter$§!를 생산합니다."
 MESSAGE_GIGA_PLANET_DISMANTLE_TITLE:0 "행성 해체 업데이트"
 giga_planet_dismantle_start:0 "§H[planet_being_harvested_for_printing.GetName]§!가 이제 해체되고 있으며, 매 6개월마다 £giga_sr_bulk_matter£ §H$giga_sr_bulk_matter$§!를 생성합니다."
 giga_planet_dismantle_end:0 "§H[planet_being_harvested_depleted.GetName]§!가 완전히 해체되었습니다. §Y500§! £alloys£가 해체 작업자에게서 회수되었습니다."
 giga_printer.1005.name:0 "[From.solar_system.GetName] 해체하기"
 giga_printer.1005.desc:0 "§Y[ROOT.giga_system_dismantle_cost_alloys]§! £alloys£와 §Y[ROOT.giga_system_dismantle_cost_energy]§! £energy£를 소모하여 §Y행성 물질 수확기§!를 건설하여 [From.solar_system.GetName]을 해체할까요?"
 giga_printer.1005.a:0 "Absolutely."
 giga_printer.1005.a.tooltip:0 "모든 유효한 해체 대상 주변에 §Y행성 물질 수확기§!가 건설되기 시작합니다. §Y[From.solar_system.GetName]§!에서."
 giga_printer.1005.b:0 "다시 생각해보니, 잊어버리세요."
 lunar_macroreplicator_0:0 "$gc_giga$위성 대형-제조기 건설 현장"
 lunar_macroreplicator_0_DESC:0 "미가공된 행성 물질과 합금으로 전쟁 위성을 통채로 제작할 수 있는 거대한 조립소의 건설 현장입니다."
 lunar_macroreplicator_0_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_gigastructure$ - $giga_list_category_celestial_warship$\n§H$giga_sr_bulk_matter$£giga_sr_bulk_matter£§!와 £alloys£ §Y합금§!를 사용하여 §Y공격 달§!을 처음부터 제작합니다.\n§L원자재로부터 전체 공격 달을 '프린트'하는 대형 궤도 조립 야드입니다.§!" #megalistentry LUNAR MACROFABRICATOR
 lunar_macroreplicator_0_real:0 "$lunar_macroreplicator_0$"
 lunar_macroreplicator_0_real_DESC:0 "$lunar_macroreplicator_0_DESC$"
 lunar_macroreplicator_1:0 "위성 대형-제조기 물질 조합기"
 lunar_macroreplicator_1_DESC:0 "이 거대한 장치는 대량의 행성 물질을 받고 처리하는 것으로 준비된 물질을 전쟁 위성을 조립하는 조립소로 전달할 수 있습니다."
 lunar_macroreplicator_1_fake:0 "$lunar_macroreplicator_1$"
 lunar_macroreplicator_1_fake_DESC:0 "$lunar_macroreplicator_1_DESC$"
 lunar_macroreplicator_2:0 "위성 대형-제조기"
 lunar_macroreplicator_2_DESC:0 "이 거대한 궤도 기구는 지름만 수백 km인 어마어마한 조립 공장 단지를 자랑합니다. 이 기구는 대량의 미가공 행성 물질을 재구축해 작동하는 전쟁 위성을 만듭니다."
 lunar_macroreplicator_2_fake:0 "$lunar_macroreplicator_2$"
 lunar_macroreplicator_2_fake_DESC:0 "$lunar_macroreplicator_2_DESC$"
 lunar_macroreplicator_ready:0 "$lunar_macroreplicator_2$"
 lunar_macroreplicator_ready_DESC:0 "$lunar_macroreplicator_2_DESC$"
 lunar_macroreplicator_make_moon:0 "전쟁 위성 조립"
 lunar_macroreplicator_make_moon_desc:0 "§H$giga_sr_bulk_matter$§!와 §Y합금§!을 사용하여 기존의 달 없이 완전 기능을 갖춘 §Y공격 달§!을 생성합니다."
 lunar_macroreplicator_make_moon_DESC:0 "작동하는 제작형 전쟁 위성은 일반적인 전쟁 위성과 비교했을 때, §G15%§!의 추가 §Y선체 내구도§!와 §Y장갑 내구도§!, §Y보호막 내구도§! 뿐만 아니라 §G10%§!의 추가적인 §Y함선 발사 속도§!를 가지고 있습니다."
 lunar_macroreplicator_make_moon_fake:0 "$lunar_macroreplicator_make_moon$"
 lunar_macroreplicator_make_moon_fake_DESC:0 "$lunar_macroreplicator_make_moon_DESC$"
 giga_printer.1000.name:0 "전쟁 위성 제작 완료!"
 giga_printer.1000.desc:0 "§Y[from.GetName]§! 위의 달 거대 제조기가 원자재 §H$giga_sr_bulk_matter$§!와 대량의 합금을 사용하여 완전 기능을 갖춘 §Y공격 달§!을 성공적으로 조립했다고 보고합니다!\n\n우리의 설계에 따라 제작된 이 천체 전함은 길이가 수백 킬로미터에 달하며, 이후 거대 구조물에서 분리되어 이제 우리의 초공간 함대의 전력을 강화할 준비가 되어 있습니다.\n\n충분한 행성 물질과 합금이 있다면 즉시 또 다른 하나의 건설을 시작할 수 있습니다."
 giga_printer.1000.a:0 "거창하군!"
 giga_printer.1000.a.tooltip:0 "§Y전쟁 위성§!이 우리 함대에 추가되었습니다.\n제작되었기에, §G15%§!의 추가 §Y선체 내구도§!와 §Y장갑 내구도§!, §Y보호막 내구도§! 뿐만 아니라 §G10%§!의 추가적인 §Y함선 발사 속도§!를 가지고 있습니다."
 printed_celestial_warship:0 "천체 전함 건조"
 printed_celestial_warship_desc:0 "이 천체 전함은 인공적으로 만들어졌습니다."
 printed_celestial_warship_ap:0 "최고의 행성 공학"
 printed_celestial_warship_ap_desc:0 "오직 행성만."
 mod_shipsize_giga_massive_planet_hull_mult:0 "전쟁 위성 선체 내구도"
 mod_shipsize_giga_planet_behemoth_hull_mult:0 "베히모스 요새 행성 선체 내구도"
 giga_printer.1002.name:0 "[planet_being_harvested_depleted.GetName] 해체됨"
 giga_printer.1002.desc:0 "§Y행성 물질 수확기§!가 [planet_being_harvested_depleted.GetName]을(를) 완전히 해체했습니다.\n\n행성이 완전히 $giga_sr_bulk_matter$ §H£giga_sr_bulk_matter£§!로 변환되었고, 거대 구조물이 해체되었습니다.\n\n우리는 구조물에서 §Y500§! £alloys£를 회수했습니다."
 giga_printer.1002.a:0 "훌륭하군."
 giga_printer.1002.a.tooltip:0 "[planet_being_harvested_depleted.GetName](은)는 이제 없음."
 giga_printer.1010.name:0 "위성 대형-제조기 건설 현장 건설됨!"
 giga_printer.1010.desc:0 "§Y[giga_system.GetName]§! 성계에서 §Y위성 대형-제작기§!의 건설 현장이 완성되었습니다. 이 궤도 플랫폼은 전쟁 위성을 제작할 수 있는 거대한 조립소를 조립할 발판이자 창고의 기능을 할 것입니다.\n\n비록 누군가는 이것이 정신 나간 짓이라고 생각하지만, 현재 우리의 기술적 기반으로 대량의 행성 물질을 빠르게 운반해 상기한 제작형 천체 전암을 만들 수 있습니다. 이는 초차원 보관소나 지능있는 나노봇과 같은 야심찬 공학 기술의 조합 덕분입니다.\n\n제작형 전쟁 위성은 일반적인 전쟁 위성에 비해 건설은 더 오래 걸릴 것이고 비용은 약간 더 나가지만, 향상된 방어 및 공격 능력의 이점을 얻을 것입니다."
 giga_printer.1010.a:0 "좋아."
 giga_printer.1011.name:0 "위성 대형-제조기 물질 조합기 건설됨!"
 giga_printer.1011.desc:0 "§Y[giga_system.GetName]§! 성계의 우리의 §Y위성 대형-제작기§!에 대한 건설의 또다른 단계가 완료되었습니다.\n\n현재 거대한 물질 조립기는 행성 궤도에 있으며, 이는 전쟁 위성 조립에 필요한 대량의 행성 물질을 받아 처리하고 바꾸는데 사용될 것입니다.\n\n이제 마지막 단계는 물질 조립기 앞에 실제 조립소를 건설하는 것으로, 이는 앞서 말한대로 물질 조립기에서 전달된 행성 물질과 합금을 사용해 전쟁 위성을 제작할 것입니다."
 giga_printer.1011.a:0 "멋지군."
 giga_printer.1012.name:0 "위성 대형-제조기 건설됨!"
 giga_printer.1012.desc:0 "§YLunar Macro-Fabricator§!가 §Y[giga_system.GetName]§! 시스템에서 완공되었습니다! 이 기술의 경이로움은 방대한 양의 원시 행성 물질과 합금을 신속하게 재배치하여 완전 기능을 갖춘 공격 달을 만드는 능력을 가지고 있습니다.\n\n이 달들은 더 강력할 뿐만 아니라, 이 메가구조물 덕분에 적절한 후보를 찾는 걱정 없이 조립할 수 있게 될 것입니다.\n\n공격 달의 건설은 필요한 자원이 준비되는 대로 메가구조물을 업그레이드하여 시작할 수 있습니다. 그러나 우리는 결정에 따라 지구형 행성에서 $giga_sr_bulk_matter$ §H£giga_sr_bulk_matter£§!를 수확해야 할 것입니다."
 giga_printer.1012.a:0 "좋아."
 giga_printer.1015.name:0 "천체 전함 건조"
 giga_printer.1015.desc:0 "완전한 천체 전투함을 처음부터 조립하는 것은 쉬운 일이 아니며, 이 함선을 건조하기 위해서는 우리 우주에 있는 어떤 무인 암석 행성에서 수확해야 할 막대한 양의 행성 질량이 필요합니다.\n\n이를 위해 우리는 먼저 §Y$giga_tech_planetary_matter_harvesting$§! 기술을 연구해야 하며, 이 기술은 모든 암석 행성에서 시행할 수 있는 §Y결정§!에 접근할 수 있게 해줍니다. 이 결정은 나중에 실제 조립 메가구조물에 공급할 수 있는 £giga_sr_bulk_matter£ §H$giga_sr_bulk_matter$§!를 제공합니다. 이 조립 메가구조물은 §Y$giga_tech_lunar_assembly$§! 기술에 의해 잠금 해제됩니다.\n\n전체 과정은 자연적인 후보에서 공격 달을 건설하는 것보다 더 비쌀 것이지만, 제작된 천체 전투함은 §G15%§! 추가 §Y선체 HP§!, §Y장갑 HP§! 및 §Y방패 HP§!와 §G10%§! 추가 §Y함선 발사 속도§!의 혜택을 누릴 수 있습니다.\n\n이로 인해 우리 우주에 후보가 몇 개 있든 관계없이 천체 전투함을 건설할 수 있게 되지만, 상당한 수량을 건설하고자 한다면 여전히 많은 쓸모없는 암석 물체를 해체해야 할 것입니다."
 giga_printer.1015.a:0 "알겠다."
 ap_planetcraft_primacy:0 "최고의 행성 공학"
 ap_planetcraft_primacy_desc:0 "천체 전함의 인공 조립에 대한 우리의 숙달을 고려할 때, 어째서 우리는 은하계의 나머지가 사용하는 엄청나게 작고 약한 전함들을 계속해서 괴롭혀야 합니까? 대신, 이제 우리는 은하 자체가 우리를 위해 싸울 수 있도록 무기화 된 거대한 천체 함대를 조립하는 것에 전적으로 초점을 맞출 것입니다! 어떤 이들을 그것이 미친 짓이나 광기라고 말할지 모르지만, 우리는 그것을 야망이라고 부릅니다."
 ap_planetcraft_primacy_effects:0 "\n앞으로 제작되는 모든 §Y천체 전함§!은 §Y장갑 내구도§!와 §Y보호막 내구도§!에 §G50%§! 보너스가 추가될 뿐만 아니라, §Y함선 연사 속도§!와 §Y함대 전투력§!에도 §G25%§! 보너스가 주어질 것입니다.\n\n§Y천체 전함 건조§!는 £alloys£ §Y합금§! 비용이 §Y33%§! 저렴합니다.\n\n§R일반 함선 건조에 막대한 디버프를 받을 것입니다!\n보상을 위해 민간 함선의 가격이 인하되었습니다.§!"
 mod_shipsize_giga_systemcraft_hull_mult:0 "스텔라 시스템크래프트 선치 내구도"
 mod_shipclass_science_ship_build_speed_mult:0 "과학선 건조 속도"
 mod_shipclass_science_ship_build_cost_mult:0 "과학선 건조 비용"
 mod_shipclass_constructor_build_speed_mult:0 "건설선 건조 속도"
 mod_shipclass_constructor_build_cost_mult:0 "건설선 건조 비용"
 mod_shipclass_colonizer_build_speed_mult:0 "개척선 건설 속도"
 mod_shipclass_colonizer_build_cost_mult:0 "개척선 건설 비용"
 requires_ap_celestial_printing:0 "$TRIGGER_FAIL$§Y천체 전함 건조§! 승격 특전이 필요합니다."
 pc_giga_o_star:0 "O형 항성"
 pc_giga_o_star_desc:0 "O형 항성은 눈부시게 밝고 엄청나게 희귀합니다. 이 괴물같은 항성은 주계열성에서 가장 무겁고 가장 뜨거운 종류로, 무시무시한 초신성으로 사그라들기 전에 고작 몇 백만년 동안 삽니다. 그 엄청난 광도 때문에, 이 유형의 항성을 둘러싼 성계는 항상 메말랐습니다. 게다가, 이러한 항성의 굉장히 강렬한 태양풍은 생명체와 로봇, 우주선 모두에게 똑같이 엄청나게 해롭습니다."
 giga_o_star_modifier:0 "O형 항성"
 giga_o_star_modifier_desc:0 "가장 강력한 기계조차도 가동시킬 수 있는 엄청난 양을 품고 있는 말도 안되게 밝은 항성입니다.\n\n§Y이 유형의 항성 주위에 다이슨 스피어, 항성 제련소와 마트료시카 브레인를 건설하려면 거대 구조물 자체의 기술 외에도 특수한 기술을 필요로합니다.\n\n이 항성 주위에 건설된 이 거대 구조물들은 생산량 +500%, 유지비 +500%, 건설 비용 +450% 그리고 건설 시간 +350%를 가질 것입니다."
