 laurn_name:0 "§Y라우렌다르§!"
 laurn_desc:0 "§L라우란다르 혹은 라우렌다르는 다양한 식물류 생물이 거주하고 있는 지역입니다. 캇첸은 거대한 섬을 프로파간다 센터로 고쳤고, 목가적인 열대 지형을 이용해 대중을 현혹하고 군대의 사기를 돋우는 영상을 찍습니다.§!"
