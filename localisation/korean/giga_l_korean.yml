 katzen_desc:0 "§L캇첸 헤르츠란츠는 대다수의 캇첸이 거주하고 있고, 그들의 고향이기도 한 캇첸 문명의 중심지입니다. 수백억 인구가 살고 있기 때문에 캇첸의 군수산업 대부분이 이곳에 집중되어 있습니다.§!"
