 giga_blokkat.1044.name:0 "블록-해체자 복구됨"
 giga_blokkat.1044.desc:0 "블록캣이 또다른 해체자의 파괴에 따라 호위 함대와 함께 §Y블록-해체자§!를 복구하였습니다.\n\n다행히도, 우리의 은하를 수확하기 시작했을 때보다 더 많은 해체자를 복구할 수는 없을 것입니다."
 giga_blokkat.1044.a:0 "걱정되는군."
 giga_achievement_blokkats_group_header:0 "블록캣"
 giga_achievement_blokkats1:0 "§M블록-놀이는 끝§!"
