 giga_tyaur_enabled:0 "£menu_enabled£버려진 항성 고리 - §G활성화됨§!\n강력한 함대의 보호를 받고 놀라운 비밀을 담고있는 버려진 $name_giga_orbital$의 생성 확률이 §Y50%§!로 설정됩니다."
 giga_tyaur_guaranteed:0 "£menu_enabled£버려진 항성 고리 - §B확정§!\n강력한 함대의 보호를 받고 놀라운 비밀을 담고있는 버려진 $name_giga_orbital$가 §G생성될 것입니다.§!"
