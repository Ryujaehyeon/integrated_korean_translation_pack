 building_giga_iodizium_plant:0 "아이오디지움 발전소"
 building_giga_iodizium_plant_desc:0 "이색적이며 물리학을 거부하는 아이오디지움 수정으로 구동되는 발전소입니다. 수정의 이상한 성질은 믿을 수 없을 정도로 강력한 에너지 발전기를 만듭니다."
 building_giga_iodizium_research:0 "아이오디지움 연구시설"
 building_giga_iodizium_research_desc:0 "이 건물은 아이오디지움 수정을 연구하고 믿을 수 없을 정도로 이상한 특성을 이해하기 위해 다양한 실험을 수행합니다."
 building_giga_paluush_homes:0 "팔루쉬 메가폴리스"
 building_giga_paluush_homes_desc:0 "팔루쉬가 건설한 거대 도시. 원시적인 기술임에도 불구하고 상당히 효율적이고 조직적이며, 거의 우주 문명의 도시 건축물에 필적합니다."
 building_giga_paluush_capital:0 "웅장한 팔루쉬 궁전"
 building_giga_paluush_capital_desc:0 "팔루쉬의 수도로 보이는 거대한 건물. 엄청난 사이오닉 에너지가 이곳에서 뿜어져 나오는 것 같습니다."
 building_giga_habitat_zro_harvester:0 "즈로 정제 복합 단지"
 building_giga_habitat_zro_harvester_desc:0 "이 시설은 접근 가능한 매장지에서 수확한 즈로를 처리합니다."
 mod_building_giga_habitat_zro_harvester_max:0 "최대 즈로 수확 단지"
 building_giga_elysium_dust_sifter:0 "우주 먼지 처리 시설"
 building_giga_elysium_dust_sifter_desc:0 "우주 먼지는 종종 $name_orb_elysium$을 통과합니다. 이 거대한 시설은 먼지의 일부를 사용 가능한 물질로 정제할 수 있습니다."
 building_giga_gas_fusion_plant:0 "대기 융합 시설"
 building_giga_gas_fusion_plant_desc:0 "이 건물은 행성의 대기에서 채취한 수소와 헬륨과 같은 가벼운 원소를 우리 산업에 응용할 더 무거운 원소로 융합합니다."
 mod_building_giga_gas_fusion_plant_max:0 "최대 대기 융합 시설"
 building_giga_gas_mote_harvester:0 "대기 분말 추출기"
 building_giga_gas_mote_harvester_desc:0 "이 가스 행성의 대기를 떠도는 거대한 분말 구름을 활용하는 시설입니다."
