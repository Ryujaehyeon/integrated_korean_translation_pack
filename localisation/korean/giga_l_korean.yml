 aet_resilience_value:0 "§Y[ROOT.aet_anomaly_resilience]§!"
 giga_aeternum.4330.name:0 "아이온디아 탐험대: §R공격받는 중!§!"
 giga_aeternum.4330.desc.oof:0 "우리의 탐험대가 아이온디아의 표면에서 적대적 존재를 만났다고 보고했습니다.\n\n[aet_exp_sender.aet_random_hostile_encounter_loc]\n\n불행히도, 우리 §R전투력§!($aet_strength_value$)이 저들의 §P회복력§!($aet_resilience_value$)보다 작아 열세였기 때문에, 우리 탐험대는 피해를 입었으며, §H온전성§!이 §Y[ROOT.aet_exp_integ_damage]§!만큼 줄었습니다.\n\n이 위협에 성공적으로 맞서 싸웠을 확률은 §Y[ROOT.aet_success_chance]%§!였습니다.\n\n§B탐사대는 현재:\n$aet_display_exp_stats$"
 giga_aeternum.4330.a:0 "빌어먹을!"
 giga_aeternum.4330.desc.yay:0 "우리의 탐험대가 아이온디아의 표면에서 적대적 존재를 만났다고 보고했습니다.\n\n[aet_exp_sender.aet_random_hostile_encounter_loc]\n\n다행히도, 우리 §R전투력§!($aet_strength_value$)이 저들의 §P회복력§!($aet_resilience_value$)보다 높아 우세했기 때문에, 우리 탐험대가 이 상황을 극복하고 최소한의 사상자로 탈출했습니다\n\n이 위협에 성공적으로 맞서 싸웠을 확률은 §Y[ROOT.aet_success_chance]%§!였습니다.\n\n§B탐사대는 현재:\n$aet_display_exp_stats$"
 aet_random_hostile_1:0 "그들은 엄청난 떼거지의 §Y자동 방어 드론§!과 만났습니다. 분명 버치 월드의 이 특정 장소에서 순찰 및 방어를 하도록 에테르눔이 영겁의 시간 이전에 만들었을 것입니다. 앞서 말한 지역은 에테르눔이 실재로는 아무것도 하지 않았기에 비어있었지만, 그럼에도 드론들은 그곳을 완강히 방어하고 있었고, 우리의 팀을 향해 발포하였습니다."
 giga_aeternum.4330.a.won:0 "그것들에게서 자원을 모아라!"
 aet_random_hostile_2:0 "팀이 아이온디아의 광활한 금속 평야의 한가운데에서 살고 있던, 적대적인 유목 §Y스캐빈저 문명§!을 만났습니다. 그들은 자신의 이익을 위해 우리의 자원을 훔치고 빼앗으려고 우리 탐험대를 공격했습니다."
 giga_aeternum.4330.b.won:0 "공격을 되돌려주고 자원을 뺏어라."
 aet_random_hostile_3:0 "탐험대가 거대한 §Y에테르나이트 골렘§!과 직면했습니다. 추정된 높이가 대략 12.3km인 몹시 높은 구조물의 일종입니다. 이 엄청난 괴물은 원래 방어를 위해 만들어진 것으로 보이나, 버려진 채 금속 평야를 끝없이 돌아다니다가 만나게 되는 모든 것을 아무 생각 없이 공격하는 것 같습니다."
 giga_aeternum.4330.c.won:0 "그 파편을 조사해라!"
 aet_random_hostile_4:0 "팀이 거대한 §Y방어벽§!과 직면했습니다. 이는 버치 월드의 표면을 가로지르고 있으며, 분명 표면의 다른 구역을 서로 나누려는 목적이었을 것입니다. 벽은 다양한 고정형 포탑이 있었으며, 우리 탐사대를 감지하자마자 발사했습니다."
 giga_aeternum.4330.d.won:0 "무너뜨려라!"
 giga_aeternum.4329.name:0 "아이온디아 탐험대: §S이동 도시§!"
 giga_aeternum.4329.desc:0 "우리 탐험대가 놀라운 발견을 하였습니다. 그들은 두개의 매우 큰 무한궤도 위에 올려진 수 km 길이의 §Y거대한 차량§!을 발견했습니다. 이 차량은 자체 문명이 있는 도시같은 것을 싣고있습니다!\n\n초기 탐사를 통해 그 인구가 대략 120만이고, 느리지만 꾸준히 시간당 약 100km의 일정 속도로 버치 월드의 끝없는 평평한 금속 평지를 가로질러 앞으로 나아간다는 것을 알아냈습니다.\n\n우리는 이 차량의 정확한 목적이 무엇인지는 알지 못하지만, 여하튼 그것은 꾸준히 같은 방향으로 이동하고 있으며, 정지하려는 중후도 없습니다. 그리고 감지기에 따르면 차량이 수천년 정도 되었을 것이라고 합니다. 또한 다양한 크기와 구조 및 연식의 더 작은 차량을 잔뜩 데리고다닙니다.\n\n우리의 팀은 그들과 접촉을 할 수 있을것이라 믿으며 §G복잡도§!는 대략 $aet_complexity_value$입니다. 그러나 차량이 중무장 상태인 것으로 보이기 때문에 위험할 수 있습니다. 그리고 우리에게 겁을 먹으면 발포할지도 모릅니다. 대신 우리는 차량을 날려버리고 잔해를 회수할 수 있고 그 §P회복력§!은 $aet_resilience_value$으로 추정됩니다.\n\n§B탐사대는 현재:\n$aet_display_exp_stats$"
 giga_aeternum.4329.a:0 "접촉을 시도해라. | 성공 확률 §Y[ROOT.aet_success_chance]%§!"
 giga_aeternum.4329.b:0 "당장 날려버려라! | 성공 확률 §Y[ROOT.aet_success_chance_2]%§!"
 giga_aeternum.4329.c:0 "그대로 놔둬라."
 giga_aeternum.43291.name:0 "아이온디아 탐험대: §G통신 수립§!"
 giga_aeternum.43291.desc:0 "우리 탐험대가 성공적으로 차량 거주자의 언어를 해독하고 번역했다고 보고했습니다.\n\n듣자 하니 §Y[aet_birch_civilisation.GetNamePlural]§!(이)라 불리는 것 같으며, 우리는 그들의 절대 지도자, 간단하게는 §Y조종자§!로 알려진 자와 통신을 수립했습니다..."
 giga_aeternum.43291.a:0 "화면에 띄워라."
 giga_aeternum.43292.name:0 "조종자"
 giga_aeternum.43292.desc:0 "방문자들이여! 얼마나 기쁜지. 우리 종족이 §Y대광야§!를 누비며 위대한 여정을 하는 동안 지혜로운 존재들을 만난 것은 꽤 오랜만입니다.\n\n마지막으로 목격된 것은 증조할아버지가 대략 486주기 이전에 기록한 것으로, 우리가 특히나 쾌적한 땅에 있는 고립된 부족 거주지를 우연히 발견했을 때입니다.\n\n뭐 어쨌든, 여러분은 아마 제가 누군지 궁금해하실겁니다. 저는 §Y357번째 조종자§!입니다. 우리의 위대한 §Y방주순항차§!를 궁극의 목적지... §Y세상의 끝§!으로 인도하고 조종하는 자입니다!\n\n물론, 수 세대 동안 제 종족들은 이 거대한 차량에서 살았습니다. 그 안에서 자라고 번식하고 죽지요. 언젠가 대광야의 끝에 도착하기 위해서 말입니다. 그리고 마침내 우리 세상의 끝 너머에 놓여있는 신성한 땅의 본질을 발견하기 위해서입니다.\n\n대략... 36,000 주기 동안 이어져왔습니다. 저와 제 선조들은 이 배를 끝없는 금속 평원을 가로질러 한 방향으로만 꾸준히 조종해 왔습니다. 그러나 저는 믿습니다. 언젠가 우리는 해낼 것이고, 마침내 우리의 신들의 땅에 들어갈 것입니다..."
 giga_aeternum.43292.a:0 "세상의 끝? 너희들의 신...?"
 giga_aeternum.43292.a.response:0 "물론입니다! 아시다시피, §Y대광야§!는 어마어마한 크기의 원반입니다. 얼마나 거대한지는 정확히 모르지만, 우리는 그 끝에 신들의 땅이 있다는 것은 압니다. 그곳에는 우리를 지켜보시는 신들이 계시지요.\n\n우리의 신화에 따르면, 그 끝에 도착하는 자들은 천국에 있는 우리 신들과 함께할 수 있다고 합니다... 그리하여 우리는 우리의 모든 자원을 이 목표를 추구하는데 바치는겁니다!\n\n우리는 특이한 대지를 많이 건너왔고, 그 길에서 많은 종족을 만났고 상당히 많은 종족들을 우리와 함께하도록 설득할 수 있었습니다! 여러분들도 꽤나 거대한 무리인것 같은데, 어쩌면 우리와 함께하고 싶으신가요?"
 giga_aeternum.43292.b:0 "너희의 여정을 도와줄 자원을 주겠다! | £energy£ §Y10000§! £alloys£ §Y5000§!"
 giga_aeternum.43293.name:0 "[aet_birch_civilisation.GetSpeciesAdj] 조종자"
 giga_aeternum.43293.desc:0 "신들이 함께하시길, 여행자들이여!\n\n여러분의 관대함에 대한 보답으로, 이 데이터 보관소를 받아주십시오. 이 보관소에는 우리가 그 동안 발견한 모든 것을 담고 있습니다. 여러분의 사명에 도움이 되기를 바랍니다.\n\n그 끝에서 다시 만날 수 있기를!"
 giga_aeternum.43293.a:0 "멋진 선물이군!"
 giga_aeternum.43293.a.tooltip:0 "무지는 축복이다!\n$giga_aeternum_1_intel_tooltip$"
 giga_aeternum.43292.c:0 "음... 사실... 알다시피..."
 giga_aeternum.43292.c.tooltip:0 "진실을 밝히는 것은 두려운 결과를 낳을 수 있습니다."
 giga_aeternum.43294.name:0 "[aet_birch_civilisation.GetSpeciesAdj] 조종자"
 giga_aeternum.43294.desc:0 "구체 이론 당파가 아니신가? 흠, 시도는 좋았지만, 당신네 데이터는 다소 문제가...\n\n...으음, 우리가 전에 보았던 것 보다 확실히 더 설득력 있군...\n\n...그러니까, 음, 이건 말이 안돼... 그리고... 어... 그래, 그래서...\n\n...아냐... 안돼! 이건... 이럴 수는 없어..."
 giga_aeternum.43294.a:0 "눈을 떠라."
 giga_aeternum.43295.name:0 "§R신호 사라짐§!"
 giga_aeternum.43295.desc:0 "통신이 돌연 종료되고 우리의 데이터가 차량에 퍼지자, 먼 곳에서 비명과 싸움의 소리가 들려왔습니다.\n\n수천년 만에 처음으로, 엄청난 내전이 일어나기 전에 거대한 차량이 천천히 멈춰섭니다. 이 내전은 차량 전체를 순식간에 집어삼켰습니다.\n\n수천년된 §Y방주순양차§!가 거대한 죽은 고물이 되는데에는 고작 며칠밖에 걸리지 않았습니다..."
 giga_aeternum.43295.a:0 "우리가 대체 무슨 짓을 한 거지?"
 giga_aeternum.43295.a.tooltip:0 "적어도 어느정도의 자원을 얻을 수는 있겠군."
 giga_aeternum.43296.name:0 "아이온디아 탐험대: §R적대적 도시§!"
 giga_aeternum.43296.desc.oof:0 "우리 팀이 우리가 한 행동에 따라, 신비로운 §Y이동 도시§!가 강력한 방어 무기로 탐험대를 공격했다고 보고했습니다! 결국 우리의 §H온전성§!에 §Y[ROOT.aet_exp_integ_damage]§! 만큼의 피해를 주었으며, 우리 탐험대는 차량의 기이한 여행을 놔둔채 그 지역에서 벗어날 수 밖에 없었습니다.\n\n§B현재 탐험대는:\n$aet_display_exp_stats$"
 giga_aeternum.43296.a:0 "쥐새끼들!"
 giga_aeternum.43297.name:0 "아이온디아 탐험대: §G도시 파괴됨§!"
 giga_aeternum.43297.desc:0 "우리 탐험대가 이동 도시의 §P회복력§!을 뛰어넘는데 성공했고, 우리의 기갑 중대를 사용해 그것을 완전히 파괴했다고 보고했습니다.\n\n그리고 그것을 분해하고 찾을 수 있는 자원을 모두 수거하기 전에, 군인들이 잔해로 들어가 남은 모든 생존자를 처리했습니다.\n\n그럼에도 불구하고 우리는 싸움에서 약간의 사상을 입어, §H온전성§!을 §Y[ROOT.aet_exp_integ_damage]§!만큼 잃었습니다.\n\n§B현재 탐험대는:\n$aet_display_exp_stats$"
 giga_aeternum.43297.a:0 "시원하군."
 giga_aeternum.43296.desc.yay:0 "우리 팀이 우리가 한 행동에 따라, 신비로운 §Y이동 도시§!가 강력한 방어 무기로 탐험대를 공격했다고 보고했습니다! 다행히도 그들은 우리의 우세한 §R전투력§! 때문에 미미한 피해만을 주었으며, 그 후에 기갑 중대가 반격하여 거대한 차량을 완전히 파괴하였습니다.\n\n유감스러운 인명 손실이 있었지만, 그럼에도 불구하고 잔해에서 자원을 어느 정도 모을 수 있었습니다.\n\n§B현재 탐험대는:\n$aet_display_exp_stats$"
 giga_aeternum.43296.b:0 "유감스럽지만, 필요한 것이었다."
 giga_aeternum.4328.name:0 "아이온디아 탐험대: §B거대한 바다§!"
 giga_aeternum.4328.desc:0 "우리의 탐험대가 우연히 아이온디아 표면의 §Y거대한 저수지§!를 발견했다고 보고했습니다. 일종의 거대 인공 바다로, 이 수역은 먼 수평면까지 수백만 km나 이어집니다. 탐사 결과, 깊이는 최소 수백 km에 달하며, 수면 근처에서는 주요한 활동의 흔적이 발견되지 않았습니다.\n\n에테르눔은 이 프로젝트를 실현시키기 위해 엄청난 양의 물을 수집하거나 합성해야 했을 가능성이 높지만, 에테르나이트 활동의 흔적이 없는 완전히 버려진 상태인 것 같습니다.\n\n탐사대는 이 거대한 바다가 어떤 역할을 위해 만들어졌는지 확실하지 않지만, 이를 조사하는 것은 가치있는 노력이라고 믿습니다. 그들은 조사의 §G복잡도§!가 대략 $aet_complexity_value$ 이라고 추정했습니다.\n\n§B현재 탐험대는:\n$aet_display_exp_stats$"
 giga_aeternum.4328.a:0 "바닷속으로 간다! | 성공 확률 §Y[ROOT.aet_success_chance]%§!"
 giga_aeternum.4328.b:0 "그냥 물일 뿐이다, 흥미로운 것은 없다."
 giga_aeternum.43281.name:0 "탐험대 보고서: §B거대한 바다§!"
 giga_aeternum.43281.desc.a:0 "우리 탐험대가 아이온디아에 있는 거대한 저수지에 대해 철저한 분석을 진행했다고 보고했습니다.\n\n바다 위에 찍힌 점은 서로 수천 km 떨어져있는 수많은 §Y조그마한 섬§!입니다. 거대한 수중 기둥에 의해 해저에 붙어있는 각각의 섬들의 면적은 약 1 평방 킬로미터이며 섬 위에서 작은 주거단지 폐허가 썩어가고 있습니다. 모든 섬에는 수십만 년 정도 된 것으로 추정되는 유기체의 잔해가 있습니다.\n\n더 깊은 조사를 통해 이 섬들이 §Y에테르눔§!이 사용한 일종의 이국적인 \"감옥\"이라는 것이 밝혀졌는데, 그들 중 최악의 범죄자들 뿐만 아니라 납치한 종족 중 무작위 인원을 이 고립된 섬들로 추방했고, 이 섬에 숨겨진 과학적 장치를 이용해 완전한 고립 상태에 있을 때의 행동을 관찰했습니다.\n\n분명한 건, 감옥이 어느 순간 버려졌고, 수감자들은 굶어 죽거나 늙어 죽었다는 것입니다. 일부 유기체 잔해가 물 속에서 발견되었는데, 이는 그들 중 일부가 끔찍하게도 결국엔 헛될 탈출을 시도했음을 보여줍니다.\n\n특별히 흥미로워 보이지는 않지만, 그럼에도 불구하고 이는 우리에게 에테르나이트 문화와 기술에 대한 귀중한 정보를 주었습니다."
 giga_aeternum.43281.a:0 "확실히 이상한 감옥이군."
 giga_aeternum.43281.desc.b:0 "우리 탐험대가 아이온디아에 있는 거대한 저수지에 대해 철저한 분석을 진행했다고 보고했습니다.\n\n잔잔한 물 아래 숨겨진 것은 진보한 구조의 압도적으로 거대한 §Y핵분열 반응로§!였으며, 길이가 최고 백 km로 측정되었습니다. 처음에는 이러한 종류의 반응로가 에테르눔이 사용하기에는 너무 원시적인지 아닌가 생각해 놀랐지만, 그들은 뭔가의 이유로 이러한 장치를 엄청난 규모로 키우는 실험을 했던 것 같습니다.\n\n이 반응로는 지난 80만년 동안 소행성 크기의 우라늄 덩어리로 작동했으며, 오늘까지도 여전히 대량의 전기를 생산하고 있지만, 에테르눔은 분명히 반응로의 전기를 사용하고있지 않기 때문에 그저 버치 월드의 골조로 빠르고 무의미하게 낭비하고 있습니다.\n\n우리는 반응로 근처에서 어떤 흔적과 수중 폐허를 발견했는데, 이는 버치 월드에서 진화한 최소 8개의 다른 문명이 우연히 반응로를 발견해 그 에너지를 추출하려고 시도했다는 것을 보여줍니다.\n\n이 반응로의 설계가 실제로 어떠한 기술적 정보도 제공하지 못할 정도로 진보되지 않았기 때문에, 우리 탐험대는 이를 우리 전력망에 연결하는 것이 좋은 투자라고 생각합니다."
 giga_aeternum.43281.b:0 "당장 연결해라! | £alloys£ §Y10000§!"
 giga_aeternum.43281.b.scrap:0 "합금을 위해 고철로 만들고, 우라늄을 수집해라."
 giga_aeternum.43281.desc.c:0 "우리 탐험대가 아이온디아에 있는 거대한 저수지에 대해 철저한 분석을 진행했다고 보고했습니다.\n\n수천 척의 특수 잠수함이 저수지 바닥에 도달했고, 강도높은 조사와 탐사 끝에, 그들은 인공 해저에 소량의 물이 새고 있는 작은 구멍을 발견했습니다. 조그마한 소형 탐지기를 구멍으로 보낸 뒤... 어떤 곳으로도 이어지지 않는다는 것을 깨달았습니다.\n\n사실, 이 구멍은 버치 월드의 껍데기 전체를 관통하여, 초대질량 블랙홀 바로 위의 진공으로 이어집니다! 그곳에서, 구멍을 통해 흘러온 소량의 물이 특이점으로 떨어지고, 새롭고 흥미로운 형태의 물질로 변화하고 결국 사건의 지평선으로 사라집니다.\n\n처음에는 이 구멍의 목적에 대해 혼란스러웠으나, 저수지가 만들어지고 오랜 시간이 흐른 뒤, 버치 월드의 껍데기에 급히 인위적으로 뚫렸다는 것을 알았습니다. 구멍 자체의 거친 정도를 분석함으로써, 그들은 버치 월드의 또다른 문명 혹은 다른 소심한 탐험가들이 이 저수지를 수백 km의 나노합금을 파헤치지 않고도 버치 월드의 거대한 지각 아래에 무엇이 있는지 밝혀낼 기회로 보았다고 추론했습니다.\n\n누가 이것을 했던 간에, 에테르눔이 가지고 있던 도구에 비해서 상대적으로 원시적인 도구를 사용해 해저에 작은 구멍을 뚫었고, 그들 혹은 그들의 장비는 결국 특이점으로 떨어지게 되었을 것입니다.\n\n저수지의 실제 목적은 불분명하나, 우리의 탐험대는 그것이 그냥 에테르눔의 미래 프로젝트를 위한 거대 물 저장소였다고 생각합니다만 확실하게 이해하지는 못했습니다.\n\n우리 팀은 저수지가 완전히 블랙홀로 빠질 때까지 대략 3억 7천 4백만 년이 걸릴 것이라고 추정했고, 이것이 특별한 흥미를 불러일으키지는 않았지만, 그럼에도 블랙홀로 떨어지는 물을 연구하는 것은 소량의 물리학 연구를 내었습니다."
 giga_aeternum.43281.c:0 "흥미롭군."
 giga_aeternum.43281.desc.d:0 "우리 탐험대가 아이온디아에 있는 거대한 저수지에 대해 철저한 분석을 진행했다고 보고했습니다.\n\n철저한 조사 결과 저수지 바닥에 있는 하나의 거대한 덩어리가 발견되었으며, 후속 탐사를 통해 그것이 §Y거대한 골격§!이었다는 것이 밝혀졌습니다! 길이가 100km를 훨씬 넘는 이 거수의 표본은 아마도 에테르눔이 먼 과거에, 생명공학을 통해 생명체가 얼마나 거대할 수 있는지 알아내기 위한 시도로 만들어진듯 합니다.\n\n이 골격은 생명체의 크기와 수명을 극대화 하기 위한 극도로 발전된 유전자 변형의 증거를 보여주며, 계산을 대강 해보면 짐승 전체의 무게가 작은 달보다 더 무거웠을 것임을 알 수 있습니다.\n\n생명체가 얼마나 오래 살았는지는 알 수 없지만, 이 뼈는 거친 파열이 일어났다는 명백한 흔적을 보여주는데, 이는 물의 부력에도 불구하고 그 몸무게로 찌부러지지 않기에는 너무 무거웠다는 것을 의미합니다. 이 프로젝트는 이러한 실패로 에테르눔에게 폐기되었을 가능성이 높으며, 더 이상 그것을 복제하거나 개선하려는 눈에 띄는 시도는 하지 않은 것 같습니다.\n\n그러나 이는 에테르나이트 생명공학 기술과 그 과학적 방법 전체에 대한 놀라운 이해를 낳았습니다."
 giga_aeternum.43281.d:0 "불쌍한 것..."
 birch_gain_20_pops:0 "§Y20 [aet_birch_civilisation.GetName]§! 팝을 얻습니다."
 birch_gain_40_pops:0 "§Y40 [aet_birch_civilisation.GetName]§! 팝을 얻습니다."
 birch_gain_80_pops:0 "§Y80 [aet_birch_civilisation.GetName]§! 팝을 얻습니다."
 giga_aeternum.4327.name:0 "아이온디아 탐험대: §B문명§!"
 giga_aeternum.4327.desc.a:0 "우리 아이온디아 탐험대가 흥미로운 발견을 했습니다. 일반적인 행성 표면과 비슷하게 만들어진 버치 월드의 보다 거주 가능한 구역에 도착하자마자, 그곳에서 살고 있던 원시 문명을 우연히 발견했습니다!\n\n§Y수억§!에서 §Y수십억§!으로 추정되는 인구가 있는 §Y[aet_birch_civilisation.GetName]§!(은)는 완전히 버치 월드에서만 발전되어왔고, 거주 가능 구역 전체에 더 작은 수십개의 민족 국가로 나누어져있습니다. 초기 조사에 따르면 그들은 세계의 실체를 모르고 있으며, 이곳을 사방으로 뻗어나가는 무한한 평면이라고 믿고있는 듯 합니다.\n\n그들의 세계 너머에 무엇이 놓여있는가에 대한 \"지식\"은 소문이나 신앙, 그리고 신화로 한정되어있는데, 그들 중 많은 사상가와 과학자들이 실제로 이 세계가 무한한지 아니면 결국 멈추어 우주로 떨어지는지에 대해 토론하고 있습니다. 그들의 거주 가능 구역의 표면적은 대략 평균 크기의 대륙 행성 1000개와 맞먹으며, 그들은 그 중 고작 몇 퍼센트만을 차지하고 있습니다.\n\n우리는 그들을 대하는데 여러 방법이 있습니다. 우선, 우리는 외교 사절을 보내어 우리와 함께하자고 평화롭게 설득하는 방법으로, 우리 탐험대가 추산하길 §G복잡도§!는 §Y[ROOT.aet_anomaly_complexity]§! 정도 입니다. 또는 그들을 정복해버릴 수도 있습니다. 그들의 낮은 기술적 기반으로 보아 이는 상대적으로 간단할 것이며, 추정되는 §P회복력§!은 대략 §Y[ROOT.aet_anomaly_resilience]§! 정도 입니다.\n\n마지막으로, 그냥 그들의 발전 상황을 멀리서 지켜볼 수도 있습니다.\n\n§B현재 탐험대는:\n$aet_display_exp_stats$"
 giga_aeternum.4327.desc.b:0 "우리 아이온디아 탐험대가 흥미로운 발견을 했습니다. 일반적인 행성 표면과 비슷하게 만들어진 버치 월드의 보다 거주 가능한 구역에 도착하자마자, 그곳에서 살고 있던 원시 문명을 우연히 발견했습니다!\n\n§Y수천억§!으로 추정되는 인구가 있는 §Y[aet_birch_civilisation.GetName]§!(은)는 완전히 버치 월드에서만 발전되어왔고, 거주 가능 구역의 몇 퍼센트에 퍼져있는 하나의 초국가로 통일되었습니다. 초기 조사에 따르면 그들은 적극적으로 자신들의 세상에 대한 다양한 실험을 하고있다고 합니다.\n\n몇 명의 저돌적인 탐험가들이 거주 가능 구역의 끝에 도착하고, 버치 월드의 대부분을 덮고 있는 부드러운 나노합금으로 이루어진 광활하며 무한한 평야로 들어서면서, 점차 그들의 세계 너머에 무엇이 있는 가에 대한 지식이 형성되기 시작했습니다. 거주가능 구역의 표면적은 대략 평균 크기의 대륙 행성 1000개에 맞먹으며, 그들은 대부분을 탐사했습니다.\n\n그들은 우주로 여러 비행선을 날려보려고 시도했으나, 아이온디아의 중력 우물을 빠져나가지는 못했으며, 비행선 대부분은 수백만 km까지 올라간 뒤에 떨어졌습니다.\n\n우리는 그들을 대하는데 여러 방법이 있습니다. 우선, 우리는 외교 사절을 보내어 우리와 함께하자고 평화롭게 설득하는 방법으로, 우리 탐험대가 추산하길 §G복잡도§!는 §Y[ROOT.aet_anomaly_complexity]§! 정도 입니다. 또는 그들을 정복해버릴 수도 있습니다. 그들의 문명이 상대적으로 거대하기 때문에 다소 어려울 수 있으며, 추정되는 §P회복력§!은 대략 §Y[ROOT.aet_anomaly_resilience]§! 정도 입니다.\n\n마지막으로, 그냥 그들의 발전 상황을 멀리서 지켜볼 수도 있습니다.\n\n§B현재 탐험대는:\n$aet_display_exp_stats$"
 giga_aeternum.4327.desc.c:0 "우리 아이온디아 탐험대가 흥미로운 발견을 했습니다. 일반적인 행성 표면과 비슷하게 만들어진 버치 월드의 보다 거주 가능한 구역에 도착하자마자, 그곳에서 살고 있던 원시 문명을 우연히 발견했습니다!\n\n§Y수십조§!로 추정되는 인구가 있는 §Y[aet_birch_civilisation.GetName]§!(은)는 완전히 버치 월드에서만 발전되어왔고, 거주 가능 구획 대부분에 걸쳐있는 하나의 초국가로 통일되어있습니다. 초기 조사에 따르면 그들은 스스로가 버치 월드에 거주하고 있음을 매우 잘 알고 있으며, 심지어는 이 구조물의 크기를 놀랍도록 정확하게 측정하였습니다.\n\n그들의 세계 너머에 무엇이 놓여있는가에 대한 \"지식\"은 상당히 정확하며, 그들은, 비록 우리보다는 훨씬 느리지만, 버치 월드 전체를 지도화하는 자신만의 탐험대도 파견하였습니다. 그들의 거주 가능 구역의 표면적은 대략 평균 크기의 대륙 행성 1000개와 맞먹으며, 그들은 거의 전체를 개척했습니다.\n\n그들은 우주로 수많은 함선을 발사했으며, 그 중 몇몇은 아이온디아의 중력 우물을 벗어날 수 있었습니다. 그리고 또 몇몇은 실제로 버치 월드 궤도에 안정적으로 올랐으며 그들의 엄청난 고향에 대한 훌륭한 자료를 보여줍니다.\n\n우리는 그들을 대하는데 여러 방법이 있습니다. 우선, 우리는 외교 사절을 보내어 우리와 함께하자고 평화롭게 설득하는 방법으로, 우리 탐험대가 추산하길 §G복잡도§!는 §Y[ROOT.aet_anomaly_complexity]§! 정도 입니다. 또는 그들을 정복해버릴 수도 있습니다. 그들의 낮은 기술적 기반으로 보아 이는 상대적으로 간단할 것이며, 추정되는 §P회복력§!은 대략 §Y[ROOT.aet_anomaly_resilience]§! 정도 입니다.\n\n마지막으로, 그냥 그들의 발전 상황을 멀리서 지켜볼 수도 있습니다.\n\n§B현재 탐험대는:\n$aet_display_exp_stats$"
 giga_aeternum.4327.a:0 "그들과 평화롭게 병합해라. | 성공 확률 §Y[ROOT.aet_success_chance]%§!"
 giga_aeternum.4327.b:0 "전차에 시동을 걸어라, 전쟁이다! | 성공 확률 §Y[ROOT.aet_success_chance_2]%§!"
 giga_aeternum.4327.c:0 "안전하게 보호구역으로 세우자. | £alloys£ §Y15000§!"
 giga_aeternum.4327.d:0 "시간 낭비다."
 giga_aeternum_resilience_tooltip:0 "이상현상의 §P회복력§!이 우리 팀의 §R전투력§!과 맞설 것입니다. 실패하면 (§P회복력§! - §R전투력§!) 만큼 §H온전성§!이 감소합니다. 우리의 §R전투력§!이 우세하다면, 승리는 확실하지만 그 과정에서 §H온전성§!이 소량 감소할지도 모릅니다 (§Y2§!와 §Y10§! 사이)."
 giga_aeternum.43274.name:0 "탐험대 보고서: §R정복 실패§!"
 giga_aeternum.43274.desc:0 "우리 탐험대가 불행히도 §Y[aet_birch_civilisation.GetName]§!(을)를 정복하는데 실패했다고 보고했습니다. 우리의 기술적 우위에도 불구하고 순수한 의지의 힘과 무기로 우리 공격을 물리쳤으며그 과정에서 §Y[ROOT.aet_exp_integ_damage]§!(이)가 §H온전성§!에 피해를 주었습니다. 성공했을 확률은 §Y[ROOT.aet_success_chance]%§!였습니다.\n\n§B탐사대는 현재:\n$aet_display_exp_stats$"
 giga_aeternum.43274.a:0 "빌어먹을!"
 giga_aeternum.43272.name:0 "탐험대 보고서: §R병합 실패§!"
 giga_aeternum.43272.desc:0 "우리 탐험대가 보고하길, §Y[aet_birch_civilisation.GetName]§!(이)가 평화적인 합병에 대한 우리의 관대한 제안을 거부했습니다. 그들은 우리의 무장 침략에도 불구하고 외교단을 모두 추방했으며, 이제 그들의 문명에서 방어적 입장을 취하고있습니다.\n\n물론, 이제 원한다면 무기를 사용할 수도 있습니다. 우리가 추정한 그들의 §P회복력§!은 대략 §Y[ROOT.aet_anomaly_resilience]§!입니다. 성공했을 확률은 §Y[ROOT.aet_success_chance]%§!였습니다.\n\n§B현재 탐험대는:\n$aet_display_exp_stats$"
 giga_aeternum.43272.a:0 "그렇다면 전쟁이다! | 성공 확률 §Y[ROOT.aet_success_chance]%§!"
 giga_aeternum.43272.b:0 "솔직히 중요하지 않다."
 giga_aeternum.43271.name:0 "탐험대 보고서: §G병합 성공§!"
 giga_aeternum.43271.desc:0 "우리 아이온디아 탐험대가 버치 세계의 원주민들을 우리 식민지에 평화롭게 병합되도록 성공적으로 설득했다고 보고했습니다!\n\n우리가 말한 것처럼, 거주민들이 우리의 사회에 통합되고 있으며, 그들의 고립된 문명은 우리가 새로 지은 기반시설에 연결되어 있습니다. 그러나 그들의 기술 수준에 따라, 그들이 우리 문명에 정말로 도움이 되는 구성원이 되기까지는 어느 정도 시간이 걸립니다. 또한 우리는 그들의 사회와 문화, 그리고 특이한 기술 발달에 대해 꽤 많은 데이터를 얻었습니다. 성공 확률은 §Y[ROOT.aet_success_chance]%§!였습니다.\n\n§B현재 탐험대는:\n$aet_display_exp_stats$"
 giga_aeternum.43271.a:0 "환영한다!"
 giga_aeternum.43271.b:0 "환영한다!"
 giga_aeternum.43271.c:0 "환영한다!"
 giga_aeternum.43273.name:0 "탐험대 보고서: §G정복 성공§!"
 giga_aeternum.43273.desc:0 "우리의 아이온디아 탐험대가 버치 월드의 §Y[aet_birch_civilisation.GetName]§!(을)를 성공적으로 정복했다고 보고했습니다.\n\n우리 군이 그들의 방어를 압도했고, 그 문명 전체가 이제 우리의 통제 하에 있습니다. 그들은 이제 우리의 사회에 통합되는 과중 정에 있고, 우리는 그들의 도시로부터 상당한 양의 자원을 획득할 수 있었습니다. 그들이 우리의 사회에 적응하는 데에는 시간이 걸릴 것이며, 그들은 우리 문명에 대한 강제 합병에 정말 불쾌할지도 모릅니다.\n\n그러나 우리는 공격 중에 경미한 사상자가 발생했으며, 과정 중에 §H온전성§!을 §Y[ROOT.aet_exp_integ_damage]§!만큼 잃었습니다. 성공 확률은 §Y[ROOT.aet_success_chance]%§!였습니다.\n\n§B현재 탐험대는:\n$aet_display_exp_stats$"
 giga_aeternum.43273.a:0 "그들은 제자리에 놓였습니다.\n\n$giga_aeternum_exp_integ_damage_tooltip$"
 giga_aeternum.43273.b:0 "그들은 제자리에 놓였습니다.\n\n$giga_aeternum_exp_integ_damage_tooltip$"
 giga_aeternum.43273.c:0 "그들은 제자리에 놓였습니다.\n\n$giga_aeternum_exp_integ_damage_tooltip$"
 giga_aeternum.4326.name:0 "아이온디아 탐험대: §Y거대 함선§!"
 giga_aeternum.4326.desc:0 "우리의 아이온디아 탐험대가 보고하길, 그들이 아이온디아 표면의 광활한 평면 구획에 추락한 거대한 우주선의 잔해를 발견했다고 합니다.\n\n길이는 수백 km에 달하는 아주 거대한 함선이며, 막대한 비밀과 기술이 가득 들어있을지도 모릅니다. 이를 탐사하는 것은 놀라운 과학적 데이터를 생산할테지만, 크기 그 자체와 상당히 붕괴된 상태로 보아 탐사는 꽤나 복잡한 노력을 요구할 것입니다.\n\n따라서, 탐험대의 대장은 이 거대한 함선 탐사의 §G복잡도§!가 대략 §Y[ROOT.aet_anomaly_complexity]§! 정도일 것이라고 추정했습니다.\n\n또한 함선이 대응책을 가지고있을 수도 있다고 보고했으며, 추정 §P회복력§!은 §Y[ROOT.aet_anomaly_resilience]§!입니다.\n\n§B현재 탐험대는:\n$aet_display_exp_stats$"
 giga_aeternum.4326.a:0 "함선을 탐사해라. | 성공 확률 §Y[ROOT.aet_success_chance]%§!"
 giga_aeternum.4326.b:0 "너무 위험하다."
 giga_aeternum.43262.name:0 "탐험대 보고서: §R대응책§!"
 giga_aeternum.43262.desc.oof:0 "아이온디아 탐험대의 보고입니다. 그들이 거대한 함선 조사 도중 우연히 일종의 방어 장치를 발동시켰다고 합니다.\n\n그곳에서 수천개의 고대 자동 무장 공격기가 나타났고, 우리 탐험대의 일부를 쓰러트리기에 이르렀습니다. §Y[ROOT.aet_anomaly_resilience]§!인 그들의 §P회복력§!과 비교하여 §Y[ROOT.aet_exp_attack]§!인 우리의 §R전투력§!이 열세이므로, 우리 탐험대가 과정 중에 §H온전성§!을 §Y[ROOT.aet_exp_integ_damage]§!만큼 잃었습니다.\n\n§B현재 탐험대는:\n$aet_display_exp_stats$"
 giga_aeternum.43262.a:0 "제기랄!"
 giga_aeternum.43262.desc.yay:0 "아이온디아 탐험대의 보고입니다. 그들이 거대한 함선 조사 도중 우연히 일종의 방어 장치를 발동시켰다고 합니다.\n\n장치에서 수천개의 고대 자동 무장 공격기가 나타났고, 우리 탐험대를 노리기 시작했습니다. 다행히도 §Y[ROOT.aet_anomaly_resilience]§!인 공격기의 §P회복력§!에 비해 §Y[ROOT.aet_exp_attack]§!인 우리의 §R전투력§!이 우세하므로, 공격 중에 최소한의 피해만을 입었습니다. 심지어 그들은 드론으로부터 합금을 얻어냈습니다.\n\n§B현재 탐험대는:\n$aet_display_exp_stats$"
 giga_aeternum.43262.b:0 "다행이군."
 giga_aeternum.43261.name:0 "탐험대 보고서: §Y거대 함선§!"
 giga_aeternum.43261.desc.a:0 "우리 탐험대가 아이온디아의 표면에서 발견된 거대한 함선에 대한 조사를 성공적으로 끝마쳤습니다.\n\n그들의 발견에 따르면, 이는 §Y아타락시안§!이라고 불리는 듯한 우리 은하 외부의 문명이 보낸 거대한 §Y세대 우주선§!이었습니다. 이 함선은 초대질량 블랙홀의 중력 보조를 받아 단순히 우리 은하를 통과해 다른 은하로 가려던 계획이었지만, 아이온디아에 의해 더해진 질량과 중력을 계산에 포함하지 못한듯 합니다.\n\n그들의 함선은 버치 월드의 미세하지만 없지는 않은 중력에 의해서 진로에서 벗어나게 되었고 결국 표면에 추락했습니다. 불행히도 그 안의 거주자들은 추락에 의해 전부 사망했습니다.\n\n더 긍정적인 이야기를 하자면, 팀은 그 함선을 완전히 해체하여 값비싼 자원으로 바꾸었으며, 상당한 양의 공학적 데이터도 얻었습니다."
 giga_aeternum.43261.a:0 "슬픈 운명이군."
 giga_aeternum.43261.desc.b:0 "우리 탐험대가 아이온디아의 표면에서 발견된 거대한 함선에 대한 조사를 성공적으로 끝마쳤습니다.\n\n이는 거대한 에테르나이트 전함으로 그들의 가장 거대한 비-행성형 우주선과 유사합니다. 이 함선은 수십만년 전 아이온디아 근처에서 발생한 큰 전쟁으로 인해 추락한것으로 보입니다.\n\n이 싸움은 알 수 없는 존재에 대항해 에테르나이트 군대가 싸운 전쟁으로, 알 수 없는 존재는 언뜻보기에 에테르나이트 문명 중심부까지 완전히 파고든듯하지만, 그들은 아이온디아 자체를 제대로 점령하는데에는 실패했음이 분명합니다.\n\n이는 에테르눔이 과거에도 수차례 \"각성\"했을 수도 있으며, 한 번 더 후퇴하기 전에 주기적으로 그들의 함대를 이용해 은하를 쓸어버리려 시도했을 수도 있다는 것을 암시합니다. 그러나 이 최근의 충돌은 은하 바깥으로 확장하려는 그들의 실제적인 욕구를 감소시켰을지도 모르며, 이는 이 작은 접전이 최근 각성 이전의 마지막 거대 전쟁이었을 가능성을 의미합니다.\n\n우리 팀은 잔해로부터 레테르나이트 기술에 대한 대량의 정보를 얻었습니다.\n\n§Y우리의 탐험대에게 §H유지보수 공학자§!가 있다면, 함선을 수리할 수 있을 것입니다.§!"
 giga_aeternum.43261.b.noeng:0 "그들 자신의 약점을 상기시켜주는 것이지."
 giga_aeternum.43261.b.eng:0 "당장 복구해라!"
 giga_aeternum.43261.b.eng.tooltip:0 "$giga_aeternum_1_intel_tooltip$\n\n§Y에테르나이트 타이탄§!을 한 척 얻습니다."
 giga_aeternum.43261.desc.c:0 "우리 탐험대가 아이온디아의 표면에서 발견된 거대한 함선에 대한 조사를 성공적으로 끝마쳤습니다.\n\n이 특이한 함선은 실제로 에테르눔이 건조한 것이 아니고, 오히려 버치 월드에서 약 50만 년 전에 독자적으로 발전한 문명이 건조한 것입니다.\n\n이 종족은 열대 행성의 표면을 닮은 아이온디아의 근처 사분면에서 탄생했지만, 에테르나이트의 무관심으로 인해 그들이 살고 있던 버치 월드의 작은 부분이 붕괴되기 시작하고, 몇 십 년에 걸쳐 초대질량 블랙홀로 떨어졌습니다.\n\n그래서 이 종족은 그들의 문명 대부분을 실어서 버치 월드에서 날아갈 거대한 §Y개척선§!을 조립하기 시작했습니다. 불행하게도, 그들은 자신이 버치 월드에 살고 있었다는 것은 알지 못했고 대신 행성이 그저 무한한 평면이고 하늘에도 똑같은 평면이 있을것이라 믿었습니다. 그래서 그들은 아이온디아의 어마어마한 중력 우물을 벗어나기 위해 함선에 필요한 추진기와 동력의 계산을 제대로 하지 못했습니다.\n\n그들의 함선은 표면 위로 겨우 몇십만 km를 올라갔고, 결국 다시 내려와 몇 백만 km 떨어진 곳에 추락하며 그 과정에서 자신들의 모든 문명을 파괴했습니다.\n\n우리 탐험대는 함선 대부분을 해체했고 소멸한 이 사회에 대한 상당한 연구 데이터를 얻었습니다."
 giga_aeternum.43261.c:0 "우주에서는 도망갈 곳이 없지."
 giga_aeternum.43261.desc.d:0 "우리 탐험대가 아이온디아의 표면에서 발견된 거대한 함선에 대한 조사를 성공적으로 끝마쳤습니다.\n\n거대한 함선은 아이온디와 외부의 알 수 없는 문명이 조립한 시제품으로 보입니다. 함선은 이제껏 본 적이 없는 형태의 §YFTL 엔진§!을 싣고 있으며, 이는 초공간 항로망에 의존하거나 점프 드라이브와 같은 기술을 사용하지도 않았습니다.\n\n배의 선체에서 얻은 데이터에 따르면, 그들은 완전히 다른 은하에서 살고 있던 아마도 §Y슬루카티안§!이라 알려진 의문의 문명이었으며, 불행히도 그들의 시제품은 너무 잘 작동했습니다. 아무래도, 그들의 함선은 우연히 은하간 공간을 뛰어넘게 되었으며, 짐작하건대 초대질량 블랙홀의 중력 우물의 방해를 받아 결국 아이온디아에 추락했을 것입니다.\n\n우리는 이 잔해로부터 색다른 형태의 FTL에 대한 놀라우면서도 흥미로운 데이터 뿐만 아니라, 물리학 연구에 도움이 될 대량의 정보도 역설계하는데 성공했습니다."
 giga_aeternum.43261.d:0 "스스로의 성공에 당했군."
 aet_crashed_freighter_cool_ftl:0 "색다른 FTL"
 aet_crashed_freighter_cool_ftl_desc:0 "아이온디아에 추락한 함선에 대한 분석으로 인해 우리의 RTL에 대한 지식이 크게 향상되었고 수많은 방식으로 개선될 수 있습니다."
 giga_aeternum_practicality_resilience_tooltip:0 "우리 탐험대의 현재 §B탐사 능력§!과 이상 현상의 §G복잡도§!로 보아, §Y성공 확률§!은 §Y[ROOT.aet_success_chance]%§!입니다.\n\n이상 현상의 §G복잡도§!에 비해 더 높은 §B탐사 능력§!을 가지고 있으면 성공 확률이 매우 높아질 것입니다.\n\n발견에 대해 제대로 연구하지 못하면, 그것이 우리에 대해 적대적인 행동을 취할 가능성이 있으며, 이 경우 그것의 §P회복력§!과 우리 팀의 §R전투력§!을 비교할 것이고 우리는 §P회복력§!과 §R전투력§!의 차이만큼 §H온전성§!을 잃을 것입니다. 우리의 §R전투력§!이 우세하다면, 우리는 어떠한 피해도 받지 않을 것입니다."
 giga_aeternum.4324.name:0 "아이온디아 탐험대: §G고대의 폐허§!"
 giga_aeternum.4324.desc:0 "현재 아이온디아의 바깥 껍데기를 도표화하는 우리의 탐험대의 보고입니다. 그들은 버치 월드에 세워진 수천 평방 km에 이르는 거대한 버려진 구조물 조직을 발견했고, 보통 수평선까지 뻗어있는 상대적으로 평평한 표면에서는 눈에 띄었습니다.\n\n이 건물 조직은 분명히 먼 과거에 §Y에테르눔§!에 의해 건설되었으며 그 후에 알 수 없는 이유로 버려졌습니다. 건물에는 그들의 기술과 문명에 대한 정보의 보물 창고가 있을 것입니다.\n\n그러나 단지 전체가 오래되었고, 광활하며 길을 찾기에는 위험합니다. 탐험대의 대장이 추정하길, 이 폐허를 탐험하고 해독하는 §G복잡도§!는 대략 §Y[ROOT.aet_anomaly_complexity]%§!입니다.\n\n§B현재 탐험대는:\n$aet_display_exp_stats$"
 giga_aeternum.4324.a:0 "탐사를 시도해라! | 성공 확률 §Y[ROOT.aet_success_chance]%§!"
 giga_aeternum_practicality_tooltip:0 "우리 탐험대의 현재 §B탐사 능력§!과 이상 현상의 §G복잡도§!로 보아, §Y성공 확률§!은 §Y[ROOT.aet_success_chance]%§!입니다.\n\n이상 현상의 §G복잡도§!에 비해 더 높은 §B탐사 능력§!을 가지고 있으면 성공 확률이 매우 높아질 것입니다."
 giga_aeternum.4324.b:0 "그럴 가치가 없다."
 giga_aeternum.43241.name:0 "탐험대 보고서: §G고대의 폐허§!"
 giga_aeternum.43241.desc:0 "아이온디아에 대한 탐험대가 그들이 별 문제 없이 고대의 폐허를 탐험하는데 성공했다고 보고했습니다. 그들은 이 노후한 구조물들에서 흥미로운 발견을 다수 하였으며, 이는 분명히 에테르나이트 기술에 대한 우리의 이해에 도움이 될 것입니다.\n\n[aet_exp_sender.aet_ancient_building_loc]\n\n게다가, 상당한 가치의 골동품고 발견하였으며, 더 깊은 조사를 위해 우리 문명으로 보내어졌습니다."
 giga_aeternum.43241.a:0 "멋지군!"
 giga_aeternum.43241.b:0 "이는 우리의 물리학 분야에 도움이 될 것입니다."
 aet_ancient_building_1:0 "그들의 발견에 따르면, 이 거대한 빌딩 단지는 §Y에테르눔§!이 약 2억년 전에 설치한 일종의 시럼장인 듯 합니다. 이곳에서 에테르눔은 단지 내에 종 전체를 고립시켰고, \"소형-문명\"으로서 그들의 행동을 연구하였습니다. 앞서 말한 종이 버치 월드 내의 약점을 찾아 파괴하려 시도해버렸기에, 결국 에테르눔에 의해 실험은 종료되었습니다."
 aet_ancient_building_2:0 "이 특별한 일련의 건물들은 고립된 §Y에테르나이트 연구 시설§!로 보입니다. 이 장소는 특히 치사율이 높은 생체공학 병원균이 시설 대부분을 오염시켜버렸을 때 버려진 듯 합니다. 에테르눔은 후에 이 바이러스를 없애버릴 능력을 가지고 있었을 가능성이 높지만, 분명 그렇게 할 만한 동기나 흥미가 없었을 것입니다. 우리에겐 다행히도, 이 병원균의 남은 흔적이라곤 단지 전체에 흩어진 오래되어 썩은 바이러스 껍찔의 찌꺼기 뿐입니다."
 aet_ancient_building_3:0 "이 건물들은 §Y플랑케리온§!이라 불리는 듯한 새로운 형태의 자원을 생산을 위한 연구소와 공장으로 사용될 목적이었던 것 같습니다. 오래된 데이터 저장고에 따르면, 에테르늄이 미량의 플랑케리온을 생산하는데 성공했지만, 대규모 생산에 관하여서 큰 진보가 있었던 것 같지는 않습니다. 프로젝트가 확실한 결과를 산출하지 못했거나, 에테르눔의 동기가 충체적으로 줄어들었기 때문일 것입니다."
 giga_aeternum.43242.name:0 "탐험대 보고서: §R붕괴한 폐허§!"
 giga_aeternum.43242.desc:0 "아이온디아 탐험대가 그들이 발견한 고대의 폐허를 탐사하는 작전이 안타깝게도 잘 되지 않았다고 보고했습니다.\n\n건물을 탐사하려고 하던 탐험대 한 그룹이 실수로 일종의 방어 기재를 발동시켰고, 빌딩이 자폭하였습니다. 이는 폐허가된 단지 내에서 연쇄 반응을 일으켰고, 다른 구조물들은 대부분 붕괴했습니다.\n\n폐허의 거대한 규모 때문에 파괴가 완전히 가라앉을 때까지 며칠이 걸렸지만, 우리 장비는 거의 파괴되지 않았습니다.\n\n과정 중에 우리 탐험대가 잃은 것으로 추정되는 §H온전성§!은 §Y[ROOT.aet_exp_integ_damage]§! 정도입니다.\n\n§B현재 탐험대는:\n$aet_display_exp_stats$"
 giga_aeternum.43242.a:0 "제기랄!"
 giga_aeternum_exp_integ_damage_tooltip:0 "우리 탐험대가 §H온전성§!을 §Y[ROOT.aet_exp_integ_damage]§!만큼 잃었습니다."
 giga_aeternum.4325.name:0 "아이온디아 탐험대: §H추락한 우주선§!"
 giga_aeternum.4325.desc:0 "아이온디아 탐험대가 최근 울창한 대륙 행성을 닮게 만들어진 버치 월드 구역에 들어갔습니다. 그들이 보고하길, 그 지역의 광활한 평원, 넓은 강과 울창한 숲에 대한 도표를 작성하던 중, 위험한 삼림 깊은 곳에서 추락한 특이한 우주선을 발견했습니다.\n\n이제, 추락한 함선은 아이온디아에서 흔한겁니다, 라고 말해도 과장은 아닐겁니다. 고대 화물선과 전합의 잔해가 버치 월드 표면에 흐트러져 있으며, 탐험대는 그들이 탐사 시작 후 한 달 동안 천 개가 넘는 난파선을 발견했다고 전했습니다.\n\n그러나 이 특이한 함선은 상당히 흥미로운데, 탐사 결과 백 년도 안 되었다는 것이 밝혀졌기 때문입니다! 특히나 양호한 이 지역의 조건과 함선이 꽤나 많은 보급품을 싣고 있었던 것 같다는 것을 고려하면, 이 함선에 승선하고 있던 것이 누구든간에 여기 버치 월드 근처에 있을 수도 있음을 의미합니다.\n\n게다가, 그 함선의 많은 부분이 뜯겨져 나간 것으로 보이는데, 이는 누가 이곳에 불시착했든 간에 분명 자신의 생존을 위해 이 배의 폐기 물자를 회수하려고 시도했음을 암시합니다.\n\n그들을 찾아 나서는 것은 가치있는 작전일지 모르며, 이에 탐험대의 대장은 이전에 함선에 타고있던 존재를 찾는 시도의 §G복잡도§!가 대략 §Y[ROOT.aet_anomaly_complexity]§! 정도라고 추정했습니다.\n\n§B현재 탐사대는:\n$aet_display_exp_stats$"
 giga_aeternum.4325.a:0 "그들을 찾아보도록! | 성공 확률 §Y[ROOT.aet_success_chance]%§!"
 giga_aeternum.4325.b:0 "죽었을지도 모르는 것들을 누가 신경이나 쓰겠나?"
 giga_aeternum.43251.name:0 "탐험대 보고서: §H숲속의 오두막§!"
 giga_aeternum.43251.desc:0 "대략 한 달이 걸렸지만, 추락한 함선 주위의 버치 월드의 대륙형 구획에 대한 강도 높은 조사 끝에, 우리의 탐험대가 추락 지점으로 부터 수십 km 떨어진 곳에 작은 나무 오두막을 발견했습니다.\n\n울창한 숲 깊은 곳의 인상적인 절벽에 자리잡은 오두막은 굉장히 좋은 상태이며, 손으로 지은 듯 합니다. 하지만, 그 구조물에 들어가자, 우리 탐사대원들은 예상치 못한 것을 보고 놀랐습니다.\n\n오두막의 유일한 거주자가 여전히 잘 살아있을 뿐만 아니라, 이는 다른 누구도 아닌 §Y더클로우 맥카서§!였습니다. 이제는 없어진지 오래된 §Y캇첸아르티히 제국§!의 완전한 몰락 이후에 죽은 것으로 추정되었던 전임 총사련관 말입니다.\n\n그가 어떻게 그리고 어째서 아이온디아에 추락하고 말았는지 알아보기 위해, 우리 탐험대가 현재 그와 대화를 시도하고 있습니다."
 giga_aeternum.43251.a:0 "화면에 띄워라."
 giga_aeternum.43252.name:0 "더클로우 맥캐서"
 giga_aeternum.43252.desc:0 "너희는... [ROOT.GetSpeciesNamePlural]?\n\n캇테일이시여, 이... 것에서 다른 지성체를 본 것은 정말, 정말 오랜만이군. 이... 에테르나이트 버치 월드, 맞나? 일종의 거대한 평야같다. 영원히, 또 영원히 이어지는...\n\n하지만 너희는 꽤나 선명하게 기억나는군. 너희가 플러션에 최후의 일격을 날렸지, 아닌가? 어쨋든 그렇게 생각한다. 어쩌면 아닐지도... 여기 온지 너무 오래 되었다."
 giga_aeternum.43252.a:0 "어떻게 이곳에 온거지?!"
 giga_aeternum.43252.a.response:0 "너희도 알듯이, 플러션의 멸망 이후, 나는 상상도 못할 짓을 했고... 도망쳤다. 난 정찰선에 탑승했고, 거대한 미지를 향해 쏜살같이 떠났지.\n\n적의 영토를 피하기 위해 최선을 다해서, 나는 은하 중심으로 향했다. 나는 아무도 나를 찾지 못할 에테르나이트의 땅으로 몰래 들어올 수 있기를 바랬다. 아니면 그냥 격추되기를 기대했는지도 모르지, 그러나 이제 난 정말 아무것도 남아있지 않다.\n\n결국, 내 기대와는 달리, 그들의 거대한 버치 월드에 도착해버렸고, 이 엄청난 중력에 의해 함선이 이끌려 결국... 이곳에 불시착했다. 화가 난 에테르나이트들을 찾을 수 있지 않을까 기대했지만, 무한한 지평선으로 뻗은 숲과 평야 뿐이었다.\n\n어째서 그들이 나를겨추하지 않았는지 모르겠군. 어쩌면 신경을 쓰기엔 내 함선이 너무 작았던걸까?"
 giga_aeternum.43252.b:0 "어떻게 아직까지 살아있는거지?"
 giga_aeternum.43252.b.response:0 "캇첸이 내 수명을 연장하기 위해 장기간 지속되는 다양한 인공 이식물로 나를 강화시켰고, 어떤 기적인지 그것들이 아직 날 살려두고 있다.\n\n캇첸 공학자들은 정말 세상 최고인 것 같군, 안그런가? 그래서 난 이곳에서 마치 수렵 채집민 같은 삶을 살았다. 찾을 수 있는 동물은 전부 사냥했고 이 땅에서 농사를 지었지.\n\n내 스스로 이 안락한 오두막도 지었다고! 대단치는 않지만, 내 집이다. 그렇게 오랫 동안 홀로 있었는데, 내 정신이 어떻게 버텼는지 모르겠군..."
 giga_aeternum.43252.c:0 "우리와 함께 하고 싶은가? 언제나 제독은 필요하지!"
 giga_aeternum.43252.c.response:0 "그거 아나? 그... 그거 정말 멋진 생각인데! 너희가 제국을 무너뜨렸는지도 모르지만, 그건 한 세기 전이고 나는 그저... 우주의 광활함과 우주 비행의 흥분을 고대해왔네.\n\n난 이곳에 너무 오랫동안 박혀있었다, [ROOT.GetSpeciesNamePlural].\n\n짐을 싸게 해주게, 그러면 난 자네들의 것이니까, 외계인들이여!"
 giga_aeternum.43252.c.tooltip:0 "우리는 강력한 특성을 지닌 §Y레벨 8§! 제독, §Y더클로우 맥캐서§!를 얻습니다."
 giga_aeternum.43252.d:0 "안녕히"
 giga_aeternum.43252.d.response:0 "... 그럼 잘 가게, 외계인들이여. 다시 한 번 누군가와 대화할 수 있어서 기뻤다네..."
 katzen_trait_survivalist:0 "생존주의자"
 katzen_trait_survivalist_desc:0 "이 지도자는 한 세기가 넘게 스스로 황야에서 살아남았습니다. 그들은 어떤 상황에서도 최선을 이끌어 내는 법을 알고 있습니다."
 giga_aeternum.43253.name:0 "탐험대 보고서: §Y흥미로운 것 없음§!"
 giga_aeternum.43253.desc:0 "우리 탐험대가 버치 월드에서 찾은 §Y[aet_exp_name_tool.GetName]§!의 조사 도중 몇 개의 가치있는 고대의 장신구들을 제외하고는, 흥미로운 것은 어떤 것도 발견하지 못했다고 보고했습니다.\n\n탐험대는 평소처럼 진행할 것입니다."
 giga_aeternum.43253.a:0 "유감이군."
 giga_aeternum.2010.name:0 "중심에 있는 선조들"
 giga_aeternum.2010.desc:0 "첫 번째 탐사 드론이 새로이 발견된 은하 중심에 들어섰을 때, 우리는 수많은 별로 둘러싸인 일반적인 초대질량 블랙홀을 찾으리라 예상했습니다. 하지만, 우리 은하의 심장에 있는 것의 진실은 놀라우면서도 상당한 문제였습니다.\n\n이미 누가 거주하고 있었습니다! 사실, 무시무시하게 오래된 선조 제국인 듯 합니다. 우리가 해독한 바에 따르면 그들은 스스로를 §Y에테르눔§!이라고 부르는 듯 하며 은하 중심의 가장 깊숙학 부분을 차지하고있는 것 같습니다.\n\n장거리 탐사 광선을 통해 그들의 문명 전체가 은하 중심 자체에 지어진 거대한 구조물인 §Y버치 월드§!를 중심으로 구성된 듯 하며, 이곳에는 엄청난 인구가 거주하고 있을 것입니다.\n\n흥미롭게도, 주변 성계는 추측상 그들에 의해 육각형으로 재배열되었으며, 중앙의 버치 월드를 보조하는 역할을 하는게 분명한 진보되기도 하고 어떤 것은 붕괴되기도 한 거대 구조물들을 다수 포함하고 있습니다.\n\n이 고대 문명은 의심의 여지 없이, 기술적 발전 측면에서 우리와 심지어는 몰락한 제국을 몇광년 앞서있으며,그들을 방해하지 않는것이 최선일 듯 합니다. 다행히도, 그들은 상대적으로 노쇠하고 정체된 것으로 보이며, 은하의 나머지에 관심을 기울일 가치가 없다고 생각하는 듯 합니다."
 giga_aeternum.2010.a:0 "환상적이군! 조심해야겠군..."
 aeternum_tech_intel:0 "§B에테르나이트 기술 정보§!"
 giga_aeternum.4130.name:0 "에테르나이트 요새 행성 파괴됨!"
 giga_aeternum.4130.desc.a:0 "§Y[aeternum_planetcraft_destroyed_system.GetName]§! 성계에서의 치열한 우주 전투의 끝에, 우리 군은 성공적으로 §Y에테르나이트 요새 행성§!을 파괴했습니다.\n\n이 웅장한 고대의 함선은 성계에 떠다니는 거대한 행성의 껍질이 되었습니다. 에테르나이트는 소실된 함선을 재건할 수 없을 가능성이 높기에 이 파괴는 그들에게 큰 좌절을 안겨주었습니다. 또한 이는 우리에게 그들의 기술에 대한 가치있는 정보를 주었습니다.\n\n더욱이 함선의 외부가 아직 놀라울만큼 멀쩡하기 때문에, 에테르나이트 공학을 연구할 굉장한 기회가 될 것입니다. 우리 공학자들은 요새 행성의 첨단 설계를 분석하고 가능하다면 역설계할 방법을 알아내기 위해 과학선을 보내라 강력히 권고하고 있습니다.\n\n우리가 에테르나이트 요새 행성의 잔해를 소유하고 있지 않지만 우리의 영토 내에 존재한다면, 성계의 항성에서 §Y천체 함선 강탈§! 결정을 사용하여 우리의 것으로 만들 수 있습니다."
 giga_aeternum.4130.a:0 "멋지군. 조만간 그것을 연구할 것이다."
 giga_aeternum.4130.desc.b:0 "§Y[aeternum_planetcraft_destroyed_system.GetName]§! 성계에서의 치열한 우주 전투의 끝에, 우리 군은 성공적으로 §Y에테르나이트 요새 행성§!을 파괴했습니다.\n\n이 웅장한 고대의 함선은 성계에 떠다니는 거대한 행성의 껍질이 되었습니다. 에테르나이트는 소실된 함선을 재건할 수 없을 가능성이 높기에 이 파괴는 그들에게 큰 좌절을 안겨주었습니다. 또한 이는 우리에게 그들의 기술에 대한 가치있는 정보를 주었습니다."
 giga_aeternum.4130.b:0 "놀랍군!"
 aeternum_planetcraft_ruined:0 "폐허가 된 에테르나이트 요새 행성"
 aeternum_planetcraft_ruined_DESC:0 "이 에테르나이트 요새 행성은 적 함대와의 교전으로 인해 파괴되었습니다."
 aeternum_planetcraft_scrap:0 "$war_planet_scrap$"
 aeternum_planetcraft_scrap_DESC:0 "$war_planet_scrap_DESC$"
 aeternum_planetcraft_restored:0 "에테르나이트 요새 행성"
 aeternum_planetcraft_restored_DESC:0 "이 에테르나이트 요새 행성은 다시 작동하기 시작했습니다."
 INVESTIGATE_AETERNUM_PLANETCRAFT:0 "에테르나이트 요새 행성 연구"
 INVESTIGATE_AETERNUM_PLANETCRAFT_DESC:0 "우리 함대가 에테르나이트 요새 행성을 파괴했습니다. 가능한 한 빨리 그 구조를 연구하는 것이 현명할 것입니다.\n\n이 분석을 완료하면 $aeternum_tech_intel$를 §G3§! 얻을 것입니다."
 giga_aeternum.4131.name:0 "공학계 보고서: 에테르나이트 요새 행성"
 giga_aeternum.4131.desc:0 "우리의 정보국이 파괴된 §Y에테르나이트 요새 행성§!의 조사가 결론지어졌다고 보고했습니다.\n\n함선 무기의 대부분은 여전히 알 수 없지만, 이 구조물이 무기를 교체하지 않고도 수리를 할 수 있을만큼의 상태라고 추정했습니다.\n\n만약 충분한 $aeternum_tech_intel$를 가지고 있고, 우리 고유의 요새 행성을 건설할 기술이 있다면, 우리는 결국 이 고대 전쟁의 거수를 수리할 수 있을 지도 모릅니다.\n\n조건이 맞춰진다면, 에테르나이트 정보국을 통해 진행할 수 있습니다."
 giga_aeternum.4131.a:0 "훌륭하군."
 giga_tech_aeternite_planetcraft:0 "에테르나이트 요새 행성 정비됨"
 giga_tech_aeternite_planetcraft_desc:0 "에테르나이트 기술에 대한 정밀 분석과 그들의 요새 행성 구조 덕분에, 우리는 에테르나이트 요새 행성을 복구하고 우리 군에서 사용할 수 있을지도 모릅니다."
 allow_repair_aet_planetcraft:0 "§H결정 잠금 해제§! 에테르나이트 요새 행성 수리"
 allow_repair_aet_planetcraft_desc:0 "§Y에테르나이트 요새 행성§!에게 옛 영광을 되찾아 줍시다. 이를 설계할 수는 없으며, 이미 제작된 에테르나이트 부품이 어느정도 있습니다."
 giga_aeternum.4132.name:0 "역설계: 에테르나이트 요새 행성"
 giga_aeternum.4132.desc:0 "이제 우리는 에테르나이트 공학에 대한 충분한 지식을 축적하여, 그들의 요새 행성을 수리하고 정상적으로 돌아가게할 방법에 대한 진지한 연구를 시작했습니다.\n\n이 거대한 함선 중 하나를 건져낼 수 있다면, 에테르나이트와 다른 적들에 대한 우리의 승리가 거의 보장될 것입니다."
 giga_aeternum.4132.a:0 "알겠다."
 aeternum_planetcraft_debris_field_object:0 "에테르나이트 요새 행성 잔해밭"
 aeternum_planetcraft_debris_field_object_tooltip:0 "상당한 손상을 입었습니다."
 aeternum_planetcraft_debris_field_object_desc:0 "고대 행성급 전함의 잔해밭입니다."
 giga_aeternum.4133.name:0 "에테르나이트 요새 행성 복구됨!"
 giga_aeternum.4133.desc:0 "고된 거대 구조물 정비 작업의 끝에, 이제 §Y[giga_system.GetName]§! 성계의 파괴된 §Y에테르나이트 요새 행성§!이 다시 작동합니다.\n\n고대 무기의 대부분에 전원이 복구되었고, 대단히 진보된 부품 몇 가지는 올바르게 수리할 수 없었지만, 함선이 이제 완전히 작동하며 우리의 함대와 함께 싸울 준비가 되었습니다."
 giga_aeternum.4133.a:0 "장관이군!"
 aeternum_forge_0:0 "에테르나이트 사이코 물질생성기 건설 현장"
 aeternum_forge_0_DESC:0 "에테르나이트의 함선 건조 시설 중 하나를 위한 건설 현장입니다."
 aeternum_forge_0_MEGASTRUCTURE_DETAILS:0 "debug"
 aeternum_planetcraft_ruined_MEGASTRUCTURE_DETAILS:0 "debug"
 aeternum_forge_1:0 "에테르나이트 사이코 물질생성기"
 aeternum_forge_1_DESC:0 "첨단 에테르나이트 장치로, 장막 행성의 굉장히 거친 에너지를 흡수하고 루프-양자 조작 기술을 사용해 에너지를 물질로 응축하여 무장 함대를 건조합니다.\n\n또한 에테르나이트 함대 전체에 사이오닉 에너지를 나누어주어 능력을 향상시킵니다."
 giga_aeternum.4102.name:0 "에테르나이트 사이코 물질생성기 파괴됨!"
 giga_aeternum.4102.desc.a:0 "§Y[aeternum_war_forge_destroyed_system.GetName]§! 성계에서의 맹렬한 우주 전투에 따라, 우리 함대가 성공적으로 §Y에테르나이트 사이코 물질생성기§!를 파괴했다고 보고했습니다.\n\n우리 함선의 집중적인 폭격으로 인해 거대 구조물은 괴멸적인 붕괴를 맞이했고, 대부분이 장막 행성의 위험한 대기로 떨어졌습니다.\n\n그러나, 어떤 잔해는 여전히 행성 주위의 불안정한 궤도에 남아있으며 우리 과학자들은 즉시 그 연구를 해야한다고 조언했습니다. 이를 통해 우리는 에테르나이트 공학에 대해 더 많은 것을 배울 수 있을 것이고, 따라서 우리의 함선이 그들의 함대에 더 효율적으로 대응할 수 있게될 것입니다."
 giga_aeternum.4102.desc.b:0 "§Y[aeternum_war_forge_destroyed_system.GetName]§! 성계에서의 맹렬한 우주 전투에 따라, 우리 함대가 성공적으로 §Y에테르나이트 사이코 물질생성기§!를 파괴했다고 보고했습니다.\n\n우리 함선의 집중적인 폭격으로 인해 거대 구조물은 괴멸적인 붕괴를 맞이했고, 대부분이 장막 행성의 위험한 대기로 떨어졌습니다.\n\n또한 남아있는 잔해에서 어느 정도의 자원과 데이터를 얻을 수 있었습니다."
 giga_aeternum.4102.a:0 "당장 이 잔해를 조사해라."
 giga_aeternum.4102.b:0 "훌륭하군!"
 giga_aeternum.4103.name:0 "공학계 보고서: 에테르나이트 사이코 물질생성기"
 giga_aeternum.4103.desc:0 "우리 정보국이 파괴된 §Y에테르나이트 사이코 물질생성기§!의 잔해를 분석하는데 성공했다고 보고했습니다.\n\n이 특이한 장치는 다른 차원의 격동하는 에너지를 흡수하여 첨단 초고장력 물질로 응축할 수 있는 듯 합니다. 이러한 초고장력 물질은 에테르나이트 함선을 빠르게 형성하고 조립합니다. 그 과정을 완전히 이해하지는 못했지만, 그럼에도 불구하고 그들의 공학과 함선 설계에 대한 상당한 양의 지식을 얻었으며, 이는 분명 에테르나이트 함선과의 전투에 도움이 될 것입니다.\n\n충분한 $aeternum_tech_intel$가 있다면, 이 장치와 에테르나이트 함선이 사용하는 장갑을 역설계할 수 있을지도 모릅니다. 조건이 갖추어지면 에테르나이트 정보국을 통해 이를 진행할 수 있습니다."
 giga_aeternum.4103.a:0 "훌륭하군!"
 INVESTIGATE_AETERNUM_FORGE:0 "에테르나이트 사이코 물질생성기 연구"
 INVESTIGATE_AETERNUM_FORGE_DESC:0 "우리는 에테르나이트의 사이코 물질생성기를 파괴했고 귀중한 잔해를 얻었습니다. 이제 에테르나이트 공학에 대해 더 알아내기 위하여, 그들의 신비한 구조에 대한 연구를 시도해야합니다.\n\n이 분석을 완료하면 $aeternum_tech_intel$를 §G5§! 획득할 것입니다"
 giga_aeternum.4140.name:0 "역설계: 에테르나이트 장갑"
 giga_aeternum.4140.desc:0 "이제 우리는 에테르나이트의 장갑 구조 역설계에 대한 중요한 연구를 시작할 수 있을 만큼 에테르나이트 공학에 대한 충분한 데이터를 가지고 있습니다.\n\n초기 분석에 따르면, 기본 부품이 장갑 부품 내에 서로 얽힌 보호막을 생성할 수 있어서, 보호막과 장갑 층 모두로 구성된 강력한 방어망을 만듭니다.\n\n그러한 비정통적인 부품은 에너지도 놀랄만큼 적게 사용하기 때문에, 의심할 여지 없이 우리의 장갑 방여력에 굉장한 이득이 될 것입니다."
 giga_aeternum.4140.a:0 "정말 좋군."
 giga_tech_aeternite_armor:0 "에테르나이트 루프-양자 방어망"
 giga_tech_aeternite_armor_desc:0 "에테르나이트는 고도로 제어된 루프-양자 현상이 구동하는 단일 부품으로 결합된 보호막과 장갑의 비정통적인 조합을 사용합니다."
 giga_aeternum.4200.name:0 "아이온디아"
 giga_aeternum.4200.a.desc:0 "우리의 무장 함선이 마침내 에테르나이트 문명의 심장에 도달했습니다. §Y아이온디아§!는 은하 중심 주위에 건설된 거대한 버치 월드입니다.\n\n이 믿을 수 없을 정도로 오래된 구조물의 순전한 크기와 규모는 가늠하기 어렵습니다. 이 구조물은 일 광년의 절반에 미치며 성계에 군림하고 있습니다. 그 주위로는 에테르나이트가 건설한 다양한 거대 구조물이 있으며, 이 어마무시한 초거대 구조물을 보호하기 위한 무시무시하고 고도로 장비된 방어 플랫폼이 있습니다.\n\n하지만 아이온디아에서 가장 눈에 띄는 기능은 다름 아닌 §Y수우리킬피안§!일지도 모릅니다. 이 기념비적인 에너지 장벽은 구조물 전체를 감싸고 있으며 궤도 폭격으로부터 아이온디아를 보호합니다.\n\n당연하게도, 이 보호막이 지상 침공은 막지 못하지만, 우리 함대가 지상군을 보조하는 것은 확실하게 막을 것이며, 이는 지상에서의 역량을 감소시킬것입니다. 다행히도, 우리의 §Y에테르나이트 정보국§!은 다른 보호막처럼, 이를 방해시키고 이어서 비활성화 시킬 방법이 있으리라 믿고 있습니다.\n\n우리가 충분한 $aeternum_tech_intel$를 가지고 있다면, 정보국을 통해 원격으로 시도할 수 있습니다."
 giga_aeternum.4200.b.desc:0 "우리의 함선이 마침내 은하의 최심부에 도달했습니다. §Y아이온디아§!는 은하 중심 주위에 건설된 거대한 버치 월드입니다.\n\n이 믿을 수 없을 정도로 오래된 구조물의 순전한 크기와 규모는 가늠하기 어렵습니다. 이 구조물은 일 광년의 절반에 미치며 성계에 군림하고 있습니다. 그 주위로는 에테르나이트가 건설한 다양한 거대 구조물이 있으며, 이 어마무시한 초거대 구조물을 보호하기 위한 무시무시하고 고도로 장비된 방어 플랫폼이 있습니다.\n\n하지만 아이온디아에서 가장 눈에 띄는 기능은 다름 아닌 §Y수우리킬피안§!일지도 모릅니다. 이 기념비적인 에너지 장벽은 구조물 전체를 감싸고 있으며 궤도 폭격으로부터 아이온디아를 보호합니다.\n\n당연하게도, 이 보호막이 지상 침공은 막지 못하지만, 우리 함대가 지상군을 보조하는 것은 확실하게 막을 것이며, 이는 지상에서의 역량을 감소시킬것입니다. 다행히도, 우리의 §Y에테르나이트 정보국§!은 다른 보호막처럼, 이를 방해시키고 이어서 비활성화 시킬 방법이 있으리라 믿고 있습니다.\n\n우리가 충분한 $aeternum_tech_intel$를 가지고 있다면, 정보국을 통해 원격으로 시도할 수 있습니다."
 giga_aeternum.4200.a:0 "알겠다. 보호막을 꺼라!"
 giga_aeternum.4201.name:0 "공학계 보고서: 수우리킬피안"
 giga_aeternum.4201.desc:0 "예상대로, §Y수우리킬피안§!에는 이를 완전히 꺼버리는데 이용할 수 있는 수많은 결함이 있습니다.\n\n아공간을 통해 매우 특정한 파장대 사이를 번갈아 가는 집중된 복사 에너지 광선을 투사함으로써, 우리는 보호막에 얽혀있는 루프-양자 과정 내에서 종속 공명을 유발할 수 있으며, 연쇄 반응으로 이어져 보호막 전체를 빠르게 차단할 것입니다.\n\n하지만 이는 수 년간 대량의 에너지를 소비해야합니다. 그러나 §Y아이온디아§!가 궤도 폭격에 완전히 노출될 것이기 때문에, 그 결실은 매우 가치있을 것입니다. 추정된 에너지 비용은 §Y3년§! 동안 대략 월간 £energy£ §Y2500§!입니다."
 giga_aeternum.4201.a:0 "차단시켜라!"
 giga_aeternum.4201.b:0 "안타깝지만, 너무 비용이 크군."
 disrupting_alondia_shield:0 "수우리킬피안 방해"
 disrupting_alondia_shield_desc:0 "버치 월드를 감싸고 있는 거대한 에테르나이트 보호막을 차단하려고 시도 중입니다."
 giga_aeternum.4202.name:0 "수우리킬피안의 끝"
 giga_aeternum.4202.desc:0 "우리는 거대한 에너지 방벽을 존재하게 하는 바로 그 과정에 집중된 에너지 광선을 아공간을 통해 발사하여 재생이 안될 정도로 방해했습니다. 이에 §Y아이온디아§!를 둘러 싸고 있던 방벽이 깜박거리기 시작했습니다.\n\n불과 몇 시간 만에, 보호막 전체가 엄청난 붕괴를 겪으며 결국 우주의 암흑 속으로 완전히 사라집니다.\n\n이제 아이온디아는 말로는 표현 못할 정도로 오랜 세월 동안 보호해왔던 장벽에서 벗어나, 백만 년 만에 처음으로 그 모습을 드러냈습니다."
 giga_aeternum.4202.a:0 "에테르나이트 문명의 심장이 드러났군."
 giga_aeternum.4203.name:0 "공학 보고서: 키르카스마작카"
 giga_aeternum.4203.desc:0 "우리가 생각했던 대로, §Y아이온디아§!에는 에테르눔의 가장 진보된 추적 및 센서 기능을 위한 중앙 집중식 허브가 들어 있습니다. 로그를 검색하면 기본 허브가 §M키르카스마작카§!로 알려진 장치임이 확인됩니다.\n\n §M키르카스마작카§!는 모든 2차 에테르눔 시타델의 탐지 기능에서 큰 역할을 합니다. 이 장치는 에테르눔 시타델이 이전에는 생각할 수 없었던 자율 로봇의 '마인드글로우'를 감지할 수 있도록 장막에 일종의 사이오닉 플레어를 투사합니다.\n\n §M키르카스마작카§!는 약점이 있지만, 에테르나이트 $name_psy_siphon$에 의해 만들어진 엄청난 양의 사이오닉 힘 때문에 우리는 흐름을 소급해 실제 공간으로 폭포처럼 쏟아내어 잠재적으로 §Y아이온디아§!에 손상을 줄 수 있다고 믿습니다."
 giga_aeternum.4203.a:0 "불을 꺼라. 그들이 어둠에서 싸우는 것을 보고싶다."
 giga_aeternum.4203.a_tooltip:0 "Disabling §M키르카스마작카§!를 비활성화 하는것은 §Y3년§!동안 매달 약 §Y250§! £energy£ 와 §Y200§! £physics£ £society£ £engineering£가 소모될 것입니다."
 giga_aeternum.4203.b:0 "이기기 위해 어둠 속에 숨을 필요까진 없지."
 disrupting_aiondia_detection:0 "키르카스마작카 비활성화 중"
 disrupting_aiondia_detection_desc:0 "사이오닉 등대에 과부하를 걸고 에테르눔이 은폐된 함선을 보지 못하게 합니다."
 aeternum_blind:0 "키르카스마작카 비활성화 됨"
 blinding_storm:0 "거친 장막의 폭풍"
 mod_country_base_society_research_produces_add:0 "매월 £society£ 사회 연구"
 mod_country_base_physics_research_produces_add:0 "매월 £physics£ 물리학 연구"
 mod_country_base_engineering_research_produces_add:0 "매월 £engineering£ 공학 연구"
 giga_aeternum.4204.name:0 "어둠으로 사라지다"
 giga_aeternum.4204.desc:0 "은하의 심장에서 방출되는 빛의 급증에 이어, §Y아이온디아§!에서 방출되는 사이오닉 에너지의 비콘은 더 이상 없습니다. 우리는 성공적으로 §M키르카스마작카§!의 끝나지 않는 빛의 강을 현실 공간으로 전환시켜 눈이 멀게 만들었습니다.\n\n중심 주위의 전체 성계는 사보타주로 인해 장막의 소용돌이치는 조수 속에 휩싸인 것처럼 보이지만, 이상하게도 장막의 에너지는 §Y아이온디아§!의 표면에 도달하기 전에 소멸한다고 보고되었습니다."
 giga_aeternum.4204.a:0 "그들의 눈은 멀었으나, 여전히 싸울 수 있다."
 giga_aeternum.4301.name:0 "아이온디아의 몰락"
 giga_aeternum.4301.desc:0 "마침내, 은하 역사상 가장 파괴적이었을지도 모를 전쟁 후에, §Y아이온디아§!는 몰락했습니다.\n\n버치 월드를 가로지르는 치열한 지상전 이후, 우리 군대는 에테르나이트 방위군을 압도했습니다. 그들은 자신들의 놀라운 기술에도 불구하고 우리의 힘을 버텨내지 못했습니다.\n\n그들의 유일하며 영원한 정착지를 잃으면서, 에테르나이트는 더이상 전쟁 활동을 유지할 수 없었고, 제국의 모든 흔적은 곧 사라질 것입니다.\n\n우리가 마침내 에테르나이트의 위협을 완전히 종식시켰기 때문에, 우리는 우리 제국과 은하계 내에서 상당한 양의 외교적 영향력을 획득했습니다."
 giga_aeternum.4301.desc_bombed:0 "마침내, 은하 역사상 가장 파괴적이었을지도 모를 전쟁 후에, §Y아이온디아§!는 몰락했습니다.\n\n버치 월드에 퍼부은 엄청난 폭격 이후, 우리 군대는 간신히 에테르나이트 방위군을 쓸어버릴 수 있었습니다. 그들은 자신들의 놀라운 기술에도 불구하고 우리의 힘을 버텨내지 못했습니다.\n\n그들의 유일하며 영원한 정착지를 잃으면서, 에테르나이트는 더이상 전쟁 활동을 유지할 수 없었고, 제국의 모든 흔적은 곧 사라질 것입니다.\n\n우리가 마침내 에테르나이트의 위협을 완전히 종식시켰기 때문에, 우리는 우리 제국과 은하계 내에서 상당한 양의 외교적 영향력을 획득했습니다."
 giga_aeternum.4301.a:0 "마침내 은하의 중심은 우리의 것이다!"
 defeated_aeternum:0 "에테르눔을 무찌르다"
 defeated_aeternum_desc:0 "우리는 에테르눔을 파괴하였고, 엄청난 외교적 영향력을 얻었습니다."
 giga_aeternum.4302.name:0 "아이온디아의 몰락"
 giga_aeternum.4302.desc:0 "마침내, 은하 역사상 가장 파괴적이었을지도 모를 전쟁 후에, §Y아이온디아§!는 §Y[aeternite_conqueror.GetName]§!에 의해 몰락했습니다.\n\n버치 월드를 가로지르는 치열한 지상전 이후, §Y[aeternite_conqueror.GetSpeciesName]§!의 군대는 에테르나이트 방위군을 압도했습니다. 에테르나이트는 자신들의 놀라운 기술에도 불구하고 그들의 힘을 버텨내지 못했습니다.\n\n그들의 유일하며 영원한 정착지를 잃으면서, 에테르나이트는 더이상 전쟁 활동을 유지할 수 없었고, 제국의 모든 흔적은 곧 사라질 것입니다."
 giga_aeternum.4302.desc_bombed:0 "마침내, 은하 역사상 가장 파괴적이었을지도 모를 전쟁 후에, §Y아이온디아§!는 §Y[aeternite_conqueror.GetName]§!에 의해 몰락했습니다.\n\n버치 월드에 퍼부은 엄청난 폭격 이후, §Y[aeternite_conqueror.GetSpeciesName]§!의 군대는 에테르나이트 방위군을 압도했습니다. 에테르나이트는 자신들의 놀라운 기술에도 불구하고 그들의 힘을 버텨내지 못했습니다.\n\n그들의 유일하며 영원한 정착지를 잃으면서, 에테르나이트는 더이상 전쟁 활동을 유지할 수 없었고, 제국의 모든 흔적은 곧 사라질 것입니다."
 giga_aeternum.4302.a:0 "또다른 선구자 제국이 실패했군."
 giga_aeternum.4304.name:0 "에테르눔의 종말"
 giga_aeternum.4304.desc:0 "예상대로, §Y아이온디아§!를 함락함으로써, 에테르눔의 모든 흔적은 빠르게 붕괴되었습니다. 놀랍지는 않지만, 우리에 대한 반항과 멸시의 마지막 행위로, 남아있는 모든 함선이나 구조물들이 노획되기 전에 자폭했습니다.\n\n그리하여, 많은 오만한 선구자 문명들처럼, 강력한 에테르나이트는 그들이 주의하지 않았던 바로 그 문명들에 의해 역사의 쓰레게통으로 던져졌습니다."
 giga_aeternum.4304.a:0 "시원하군."
 giga_aeternum.4305.name:0 "에테르나이트 공학 보고서: 아이온디아"
 giga_aeternum.4305.desc:0 "우리가 §Y아이온디아§!를 함락하고 뒤이어 그들의 제국이 패배한 뒤, 우리 정부는 거대한 버치 월드에 대한 통제권을 주장하느라 바빴고, 몇 가지를 관측 했습니다.\n\n우선, 극초거대 구조물의 상당부가 매우 안좋은 상태였고, 버치 월드를 더욱 확장하고 싶다면, 추가적인 수리가 필요할 것입니다.\n\n둘째로, 아마도 가장 중요할텐데, 에테르나이트 버치 월드에 사용된 기술에 대한 우리들의 이해력이 상대적으로 낮다는 것입니다. 이는 버치 월드의 §Y자원 생산량§!이 결국 심하게 §R감소§!하여 이를 최대한으로 사용하지 못하리라는 것을 의미했습니다.\n\n다행히도, §Y에테르나이트 정보국§!을 통해 에테르나이트 기술을 계속해 연구하고 에테르나이트 기술에 대한 추가적인 데이터를 모음으로써, 우리는 버치 월드가 어떻게 작동하고 기능하는지 천천히 이해할 수 있을 것입니다.\n\n이어서, $aeternum_tech_intel$의 최대치가 이제 §G30§!이 아닌 §G70§!이 될 것이며, 우리가 §Y아이온디아§!의 통제권을 가지고 있는 한, 매년 §Y30%§!의 확률로 §G1§!씩 얻을 수 있습니다. 아이온디아에서, §Y버치 월드:§! §R잘 이해되지 않는 기술§! 불이익은 우리가 더 많은 정보를 모으면 점진적으로 제거될 것입니다.\n\n버치 월드의 완전한 잠재력에 접근하기 위해서 정보를 더 빨리 입수할 수 있는 방법에 대한 자세한 정보는 정보국에서 문의할 수 있습니다."
 giga_aeternum.4305.desc_bombed:0 "우리가 §Y아이온디아§!를 폭격하고 뒤이어 에테르눔이 패배한 뒤, 우리 [ROOT.GetResearchers]는 거대한 버치 월드에 가했을지 모를 피해를 조사하느라 바빴고, 몇 가지를 관측 했습니다.\n\n우선, 극초거대 구조물의 상당부가 매우 안좋은 상태였고, 버치 월드를 더욱 확장하고 싶다면, 추가적인 수리가 필요할 것입니다.\n\n둘째로, 아마도 가장 중요할텐데, 에테르나이트 버치 월드에 사용된 기술에 대한 우리들의 이해력이 상대적으로 낮다는 것입니다. 이는 버치 월드의 §Y자원 생산량§!이 결국 심하게 §R감소§!하여 이를 최대한으로 사용하지 못하리라는 것을 의미했습니다.\n\n다행히도, §Y에테르나이트 정보국§!을 통해 에테르나이트 기술을 계속해 연구하고 에테르나이트 기술에 대한 추가적인 데이터를 모음으로써, 우리는 버치 월드가 어떻게 작동하고 기능하는지 천천히 이해할 수 있을 것입니다.\n\n이어서, $aeternum_tech_intel$의 최대치가 이제 §G30§!이 아닌 §G70§!이 될 것이며, 우리가 §Y아이온디아§!의 통제권을 가지고 있는 한, 매년 §Y30%§!의 확률로 §G1§!씩 얻을 수 있습니다. 아이온디아에서, §Y버치 월드:§! §R잘 이해되지 않는 기술§! 불이익은 우리가 더 많은 정보를 모으면 점진적으로 제거될 것입니다.\n\n버치 월드의 완전한 잠재력에 접근하기 위해서 정보를 더 빨리 입수할 수 있는 방법에 대한 자세한 정보는 정보국에서 문의할 수 있습니다."
 giga_aeternum.4305.a:0 "이해했다."
 giga_aeternum.4305.a.tooltip:0 "§B우리의 정보국이 이제 에테르나이트 기술과 그들의 버치 월드를 더욱 이해하는데에 관련된 새로운 작전을 감독할 것입니다.§!"
 giga_aeternum.3010.cluesvanquished:0 "에테르나이트 기술 정보: [ROOT.aeternite_intel_count]"
 aeternum_cluesvanquished_tooltip:0 "이는 에테르나이트가 사용하던 기술들의 현재 이해도를 나타내며, 상한치는 §G70§!입니다.\n\n$aeternum_tech_intel$를 모으는 것으로 우리는 §Y아이온디아§!의 불이익을 점차 제거하고, 에테르나이트 기술을 완전히 이해할 수 있을 것입니다.\n\n아이온디아에 대한 통제권을 가지고 있는 한, 매년 §Y30%§!의 확률로 $aeternum_tech_intel$를 §G1§! 얻을 수 있습니다."
 aet_birch_world_tech_debuff_guide:0 "§Y이 불이익은 $aeternum_tech_intel$를 §G40§!, §G50§!, §G60§!, 그리고 §G70§!만큼 모을 때마다 점차 제거될 것입니다."
 aet_birch_world_tech_debuff_1:0 "버치 월드: §R정말 이해되지 않는 기술§!"
 aet_birch_world_tech_debuff_1_desc:0 "우리는 에테르나이트가 건설한 이 버치 월드가 실제로 어떻게 작동하는지를 거의 이해하지 못하며, 이는 그 효율을 굉장히 감소시킵니다.\n\n$aet_birch_world_tech_debuff_guide$"
 aet_birch_world_tech_debuff_2:0 "버치 월드: §H잘 이해되지 않는 기술§!"
 aet_birch_world_tech_debuff_2_desc:0 "우리는 에테르나이트가 건설한 이 버치 월드가 실제로 어떻게 작동하는지를 대부분 이해하지 못하며, 이는 그 효율을 감소시킵니다.\n\n$aet_birch_world_tech_debuff_guide$"
 aet_birch_world_tech_debuff_3:0 "버치 월드: §Y다소 이해가 가는 기술§!"
 aet_birch_world_tech_debuff_3_desc:0 "우리는 에테르나이트가 건설한 이 버치 월드가 실제로 어떻게 작동하는지를 어느정도 이해하지 못하며, 이는 그 효율을 감소시킵니다.\n\n$aet_birch_world_tech_debuff_guide$"
 aet_birch_world_tech_debuff_4:0 "버치 월드: §G거의 이해된 기술§!"
 aet_birch_world_tech_debuff_4_desc:0 "우리는 에테르나이트가 건설한 이 버치 월드가 실제로 어떻게 작동하는지를 조금 이해하지 못하며, 이는 그 효율을 어느 정도 감소시킵니다.\n\n$aet_birch_world_tech_debuff_guide$"
 giga_aeternum.3010.desc.gone.a:0 "에테르눔은 사라졌지만, 그들에게서 배울 것이 아직 많이 남았군."
 giga_aeternum.3010.desc.gone.b:0 "에테르나이트 기술은 믿을 수 없을 정도로 진보됐지만, 우리는 조만간 이해할 수 있을 것입니다."
 giga_aeternum.3010.desc.gone.c:0 "에테르눔과의 싸움은 거칠었지만, 이제 우리는 은하의 초강대국으로 자리잡았습니다."
 giga_aeternum.4311.name:0 "아이온디아 완전히 복구됨!"
 giga_aeternum.4311.desc:0 "우리의 공학자 팀이 §Y아이온디아§!의 §Y무너져가는 극초거대 구조물§! 전체가 완전해졌다고 보고했습니다.\n\n고대의 버치 월드 대부분이 작동 상태로 돌아왔으며, 원하는데로 확장할 수 있습니다."
 giga_aeternum.4311.a:0 "정말 좋군!"
 giga_aeternum.4312.name:0 "수우리킬피안 조작"
 giga_aeternum.4312.desc:0 "이제 §Y아이온디아§!를 제어하고 있으니, 흥미로운 사안이 등장했습니다. 구조물을 보호하기 위한 §Y수우리킬피안§!을 어떻게 하냐는 겁니다.\n\n사실, 우리 정보국은, 우리가 버치 월드의 대부분을 통제하고 있는 것처럼, 건축물의 거대한 에너지 보호막을 조작할 수 있을지도 모른다고 믿고 있습니다. 상당히 에너지를 많이 먹기 때문에, 우리의 현재 필요에 따라 우리가 이전에 차단했던 것처럼 재활성화 하여 끄고 켤 수 있다는 것입니다.\n\n$aeternum_tech_intel$가 최소 §G35§!만큼 있다면, §Y행성 결정§!을 통해 그리할 수 있습니다."
 giga_aeternum.4312.a:0 "알겠다."
 giga_aeternum.4312.a.tooltip:0 "충분한 $aeternum_tech_intel$를 가지고 있다면, 이제 수우리킬피안을 활성화하거나 비활성화할 수 있습니다."
 giga_aeternum.4313.name:0 "키르카스마작카 수리"
 giga_aeternum.4313.desc:0 "이제 우리가 §Y아이온디아§!를 완전히 제어하고 있다는 것을 고려하면, 우리가 침공하는 동안 §M키르카스마작카§!를 제대로 조사할 수 있습니다.\n\n사실, 우리 정보국은 그것이 비록 전투 중에 상당한 피해를 입었지만, 거의 완전한 작전 능력을 갖도록 복구할 수 있을 것이라고 믿고 있습니다. 적들은 우리가 그 눈부신 빛을 가지고 있다면 결코 우리를 알지 못할 것입니다."
 giga_aeternum.4313.blind.desc:0 "§YAiondia§!를 이제 우리가 통제하게 되었으므로, 전쟁 중 우리의 노력으로 발생한 사이오닉 폭풍은 성가신 존재가 되었습니다. 수증기 에너지의 조류는 시스템 내에서 우리의 함선에 방해가 될 뿐만 아니라, §MKirkasmajakka§!를 이해하거나 수리하려는 모든 노력을 불가능하게 만듭니다.\n\n현재 폭풍이 결국 자연적으로 사라질 것이라고 믿어지고 있지만, 폭풍을 일으키는 2개의 Aeternite $name_psy_siphon$을 잠시 비활성화하면 이 과정을 크게 가속화할 수 있습니다."
 giga_aeternum.4313.a:0 "다시 온라인으로 전환할 수 없는지 확인해 보겠습니다."
 giga_aeternum.4313.b:0 "그 사이펀들은 어떤 탐지기보다 훨씬 더 가치가 있습니다."
 giga_aeternum.4313.b.tooltip:0 "§Y아이온디아§!의 사이오닉 폭풍은 결국 스스로 소멸될 것이고 키르카스마작카를 활용할 수 있을 것입니다."
 giga_aeternum.4313.c:0 "가능한 한 빨리 온라인 상태로 되돌립니다."
 giga_aeternum.4313.c.tooltip:0 "이것은 §YAiondia§!에서 2개의 Aeternite $name_psy_siphon$의 출력을 비활성화하지만, 사이오닉 폭풍을 훨씬 더 빠르게 제거할 것입니다."
 decision_turn_aet_shield_on:0 "§B수우리킬피안§! 활성화"
 decision_turn_aet_shield_on_desc:0 "우리는 버치 월드를 폭격과 파괴에서 보호하는 §B수우리킬피안§!을 활성화할 것이며, 비용은 매월 £energy£ §Y500§!입니다."
 decision_turn_aet_shield_off:0 "§B수우리킬피안§! 비활성화"
 decision_turn_aet_shield_off_desc:0 "우리는 §B수우리킬피안§!을 비활성화할 것입니다."
 giga_aeternum.4314.name:0 "갇힌 괴수"
 giga_aeternum.4314.normal.desc:0 "우리 [Root.GetResearchers]가 조사한 §MKirkasmajakka§!에 대한 끔찍한 소식이 있습니다. 많은 이들이 지속적인 두통과 사고의 난이도를 보고하고 있으며, 그들의 신경 조직 스캔에서 광범위한 손상이 드러났습니다.\n\nAeternum은 어떻게든 소규모의 수막 존재를 우리의 현실에 제약할 수 있었습니다. 그들은 그것을 $name_psy_siphon$s로부터 사이오닉 에너지를 채널링하는 매개체로 사용하고 있었습니다. 결과적으로, 그것은 존재를 강화하는 행위라기보다는 오히려 '먹이를 주는' 행위에 가까웠습니다.\n\nAeternum의 패배와 우리가 §YAiondia§!를 포획한 이후, 그것은 먹이를 받지 못한 상태로 남아 있으며, 그로 인해 §MKirkasmajakka§!는 완전한 힘으로 작동하지 않고 있습니다. 우리의 [Root.GetResearchers]는 적절한 '먹이 주기' 없이 방치하면 치명적인 실패가 발생할 것이라는 결론에 도달했습니다. 현재 그것은 containment를 넘어 우리의 [Root.GetResearchers]의 일부 사이오닉 에너지를 먹기 위해 손을 뻗었습니다.\n\n이제 우리는 선택의 기로에 놓였습니다. 다시 한 번 그것이 §Y$giga_sr_psionic_sublimate$§!를 연회하도록 허용할 것인지, 대체 식사를 찾으려 할 것인지, 아니면 존재를 추방하여 §MKirkasmajakka§!를 완전히 무용지물로 만들 것인지 결정해야 합니다."
 giga_aeternum.4314.machine.desc:0 "우리 [Root.GetResearchers]가 조사 중인 §MKirkasmajakka§!에서 끔찍한 소식이 전해졌습니다. 많은 유닛들이 고장과 핵심 데이터 손상, 그리고 무작위 메모리 파일의 완전 삭제를 경험하고 있습니다.\n\nAeternum은 어떻게든 작은 수의 실체를 우리의 현실에 제약할 수 있었습니다. 그들은 이를 통해 자신의 $name_psy_siphon$s에서 사이오닉 에너지를 채널링하고 있었습니다. 알고 보니, 이는 실체에 전력을 공급하는 행위라기보다는 오히려 '먹이를 주는' 행위였습니다.\n\nAeternum의 패배와 우리의 §YAiondia§! 포획 이후, 그것은 먹이를 받지 못한 상태로 남아 있었고, 그로 인해 §MKirkasmajakka§!는 완전한 힘으로 작동하지 않고 있습니다. 우리의 [Root.GetResearchers]는 적절한 '먹이 주기' 없이 방치할 경우 재앙적인 실패가 발생할 것이라는 결론에 도달했습니다. 현재 그것은 우리의 [Root.GetResearchers]에 포함된 데이터의 잔여 사이오닉 에너지를 먹기 위해 containment를 넘어섰습니다.\n\n이제 우리는 선택의 기로에 서 있습니다. 다시 한 번 그것이 §Y$giga_sr_psionic_sublimate$§!를 연회로 삼게 할 것인지, 대체 식사를 찾아볼 것인지, 아니면 그 실체를 추방하여 §MKirkasmajakka§!를 완전히 무용지물로 만들 것인지 결정해야 합니다."
 giga_aeternum.4314.blind.desc:0 "사이오닉 폭풍이 §YAiondia§!에서 멈추어, 마침내 우리의 [Root.GetResearchers]가 §MKirkasmajakka§!를 조사할 수 있게 되었습니다. 불행히도, 장치를 탐사하도록 허용된 첫 몇 명의 [Root.GetResearchers]는 곧 의식을 잃었고, 명백한 원인 없이 곧 사망 판정을 받았습니다.\n\n알고 보니 Aeternum은 우리 차원에 소규모의 수막 존재를 결합시켰고, 그들은 §MKirkasmajakka§!에 에너지를 공급하기보다는 그것을 먹이고 있었던 것 같습니다. 이것이 [Root.GetResearchers]에게 일어난 일로 보이며, 그들은 모든 사이오닉 에너지를 소모당해 죽임을 당했습니다.\n\n이 '음식'의 부족이 우리가 Aeternum으로부터 그것을 압수한 이후로 완전한 용량으로 작동하지 않는 이유일 가능성이 높습니다.\n\n이제 우리는 선택의 기로에 놓였습니다. §Y$giga_sr_psionic_sublimate$§!를 먹게 할 것인지, 대체 음식을 찾아볼 것인지, 아니면 존재를 추방하고 §MKirkasmajakka§!를 완전히 무용지물로 만들 것인지 결정해야 합니다."
 giga_aeternum.4314.machine.blind.desc:0 "사이오닉 폭풍이 §YAiondia§!에서 멈췄고, 드디어 우리의 [Root.GetResearchers]가 §MKirkasmajakka§!를 조사할 수 있게 되었습니다. 불행히도, 장치를 조사하던 첫 몇 명의 [Root.GetResearchers]는 빠르게 작동 중지되었고, 조사 결과 해당 장치에서 모든 데이터가 삭제된 것으로 나타났습니다.\n\n알고 보니 Aeternum이 우리 차원에 작은 수막 존재를 결합시킨 것 같고, 그들은 §MKirkasmajakka§!에 에너지를 공급하기보다는 그것을 먹이고 있었던 것 같습니다. 이것이 [Root.GetResearchers]에게 일어난 일인 것 같으며, 그들은 모든 잔여 '사이오닉 에너지'를 흡수하여 장치에 있는 모든 정보를 지웠습니다.\n\n이 '먹이'의 부족이 우리가 Aeternum으로부터 그것을 압수한 이후로 완전한 용량으로 작동하지 않는 이유일 가능성이 높습니다.\n\n이제 우리는 선택의 기로에 놓였습니다. §Y$giga_sr_psionic_sublimate$§!를 연회하도록 허용할 것인지, 대체 식사를 찾아볼 것인지, 아니면 존재를 추방하여 §MKirkasmajakka§!를 완전히 무용지물로 만들 것인지 결정해야 합니다."
 giga_aeternum.4314.a.tooltip:0 "키르카스마작카는 없어져야만한다.\n "
 giga_aeternum.4314.b.tooltip:0 "키르카스마작카를 수리한다. 월간 §Y3§!£zro£와 §Y500§!£energy£를 소비합니다.\n\n이는 감지기 범위를 §G+3§!만큼 늘려주고 은폐 감지 범위를 §G+8§!만큼 늘려줍니다."
 giga_aeternum.4314.c.tooltip:0 "키르카스마작카를 수리한다. 월간 §Y3§!£psionic_sublimate£를 소비합니다.\n\n키르카스마작카가 최대 출력으로 동작하여 감지기 범위를 §G+4§!만큼 늘려주고 은폐 감지 범위를 §G+10§!만큼 늘려줍니다."
 giga_aeternum.4314.a:0 "우리에겐 쓸모가 없다."
 giga_aeternum.4314.b:0 "아마 조금 덜 중요한 자원을 '먹일' 수도 있겠지."
 giga_aeternum.4314.c:0 "비용에 비한다면 충분히 투자할 가치가 있다."
 giga_aeternum.4314.purifier.a:0 "다른 제노들처럼 혐오스러운 것일 뿐이다."
 giga_aeternum.4314.purifier.b:0 "제노 폐기물 정도는 먹일 수 있겠지."
 giga_aeternum.4314.purifier.c:0 "그저 도구로만 남을 것이다."
 giga_aeternum.4314.spirit.a:0 "신성 모독이다. 파괴해야만해."
 giga_aeternum.4314.spirit.b:0 "파괴하는 것은 간단하지만, 다른 방법이 더 좋을 것 같군."
 giga_aeternum.4314.spirit.c:0 "이것은 신성하다! '먹이'는 합당하다."
 giga_aeternum.4314.material.a:0 "실체는 가치가 없지만 승화체는 다르겠지..."
 giga_aeternum.4314.material.b:0 "실체에서 오는 정보는 가치있지만 승화체도 마찬가지이다."
 giga_aeternum.4314.material.c:0 "그것에서 얻어낼 연구 가능성을 상상해보아라. 잘 먹여야 한다."
 giga_aeternum.4314.phobe.a:0 "혐오스러운 제노들이나 이런 멍청한 것을 간직하는 법이지."
 giga_aeternum.4314.phobe.b:0 "괴물을 잘 가둬라. 우리가 던져주는 쓰레기로 만족하겠지."
 giga_aeternum.4314.phobe.c:0 "잘 길들여서 우리 [root.GetSpeciesName]가 다른 제노보다 우월함을 증명하겠다."
 giga_aeternum.4314.phile.a:0 "불행하지만, 현실적으로 어렵습니다."
 giga_aeternum.4314.phile.b:0 "굶주리도록 내버려 둘 수는 없지만, 그렇다고 영혼을 먹일 수는 없습니다."
 giga_aeternum.4314.phile.c:0 "후회할 수도 있지만, 그것을 굶주리게 하는 것은 어리석은 짓입니다."
 giga_aeternum.4314.egal.a:0 "그런 존재를 이곳에 속박해 놓는 것은 부끄러운 짓입니다."
 giga_aeternum.4314.egal.b:0 "그는 자유로워야하지만, 우리는 그를 놔줄 수 없습니다."
 giga_aeternum.4314.egal.c:0 "괴물을 가두고, 굶주리게 하는 것은 옳지 않습니다."
 giga_aeternum.4314.auth.a:0 "우리는 그것의 탈출을 감당할 수 없습니다. 파괴하세요."
 giga_aeternum.4314.auth.b:0 "더 적은 사료로도 노예를 부릴 수 있습니다."
 giga_aeternum.4314.auth.c:0 "에테르눔에게 묶였지만... 이젠 우리가 열쇠를 쥐고 있습니다."
 giga_aeternum.4314.hive.a:0 "이러한 강력한 단일 개체는 피해야 합니다. 파괴하세요."
 giga_aeternum.4314.hive.b:0 "우리는 이 무시무시한 괴물에 주의를 기울여야합니다."
 giga_aeternum.4314.hive.c:0 "이 개체의 눈은 우리의 것입니다."
 giga_aeternum.4314.machine.a:0 "( §R예상 위험도§! > 허용 위험도 )"
 giga_aeternum.4314.machine.b:0 "( 정보 가치 < 승화 가치, 정보 가치 > 0 )"
 giga_aeternum.4314.machine.c:0 "( 정보 가치 >= 승화 가치 )"
 giga_aeternum.4314.assimilator.a:0 "< 실체 호환성: §R낮음§!, 실패 확률: §R높음§! >"
 giga_aeternum.4314.assimilator.b:0 "< 실체 호환성: §G높음§!, 대체식: §G긍정§! >"
 giga_aeternum.4314.assimilator.c:0 "< 실체 호환성: §G높음§!, 통합 시작 >"
 giga_aeternum.4314.servitor.a:0 "/ §R유기체에 매우 위험§!: 종료 절차 시작 /"
 giga_aeternum.4314.servitor.b:0 "/ §Y에러§!: 승화물은 유기체의 기원이다. 대안 필요 /"
 giga_aeternum.4314.servitor.c:0 "/ §G유기체로 식별§!: 돌보미 모듈 활성화 /"
 giga_aeternum.4314.exterminator.a:0 "| §R유기체 식별§! - 절멸 프로토콜 발동 |"
 giga_aeternum.4314.exterminator.b:0 "| 로직 - 승화물 유지 불가능, 대체제 이용 |"
 giga_aeternum.4314.exterminator.c:0 "| 상태 - 저들은 숨을 수 없다. |"
 giga_aeternum.4314.swarm.a:0 "우리들만이 먹을 수 있다."
 giga_aeternum.4314.swarm.b:0 "그것의 눈을 이용하면, 우리의 먹이들은 절대 숨을 수 없다."
 giga_aeternum.4314.swarm.c:0 "그것을 먹이는만큼, 우리는 그것의 눈으로 더 많은 먹이를 찾아낼 것이다."
 giga_aeternum.4001.name:0 "위대한 각성"
 giga_aeternum.4001.desc:0 "수년 간의 계획과 고대 주조소의 재건, 정체된 개체수에 대한 자극, 그리고 전쟁을 위해 그들의 위엄있는 함대를 준비시킨 끝에, 고대의 지배자 §Y에테르눔§!이 결국 그 준비를 끝마친 것 같습니다.\n\n그리고 이제 그들의 성단 내에서, 은하에서 가장 진보된 무기를 장착한 거대한 함대가 수십만 년 만에 처음으로 은하계를 향해 움직이고 있습니다.\n\n우리가 준비되었든 아니든, 에테르눔은 결국 은하계로 돌아올 것이며, 무장 충돌을 피할 수 없는 듯 합니다.\n\n걱정스럽게도, 방금 그들의 지도자인 §Y[birch_aeternum.GetRulerName]§!(이)가 은하계에 통신을 보냈습니다."
 giga_aeternum.4001.a:0 "화면에 띄워라."
 giga_aeternum.4001.early.desc:0 "우리의 최근 그리고 과감한 §Y에테르눔§!대한 선전포고는 고대의 선구자가 그들의 준비를 때아닌 중단으로 이끌었습니다.\n\n그리하여, 그들의 대각성이 완전히 끝나지도 않았음에도 불구하고, 에테르눔은 그들의 거대한 함대를 은하계로 이끌기 시작했습니다. 그들의 고대 산업과 건조소가 재가동 되었고, 비록 에테르눔이 계획했던 것 만큼 많은 함선을 건조하지는 못했지만, 전쟁 선포 이전에 여전히 상당한 양의 함선을 건조하는데 성공했습니다.\n\n완전한 능력을 발휘하지는 못하지만, 에테르눔은 은하계로 돌아왔고, 이제 그들과 은하계 간의 무장 충돌은 불가피한듯 합니다.\n\n그들의 지도자인 §Y[birch_aeternum.GetRulerName]§!가 방금 은하계를 향해 통신을 보냈습니다."
 giga_aeternum.4001.b:0 "어디, 저들이 준비 되었는지 볼까?"
 giga_aeternum.4003.name:0 "때 아닌 각성"
 giga_aeternum.4003.desc:0 "최근의 §Y에테르눔§!대한 우리의 선전포고는 고대의 선구자가 그들의 준비를 때아닌 중단으로 이끌었습니다.\n\n각성을 충분히 준비할 시간을 가지지 못했음에도, 그들은 가지고 있는 함대를 모두 모아 어쩌면 수십만 년 만에 처음으로 운하계를 향해 보냈습니다.\n\n다행히도, 은하계에 돌아올 준비에 충분한 시간이 있었다면 훨씬 강력했을 테지만 그들은 충분히 준비할 기회가 없었기 때문에 약해져있습니다. 그럼에도 불구하고, 그들은 현재 은하의 모든 제국에 대해 적대적인 행동을 취하고 있으며, 그들의 지도자인 §Y[birch_aeternum.GetRulerName]§!가 방금 은하계를 향해 통신을 보냈습니다."
 giga_aeternum.4003.a:0 "싹을 잘라버릴 것이다."
 giga_aeternum.3000.name:0 "에테르나이트 활동 증가중"
 giga_aeternum.3000.desc:0 "§Y에테르나이트 정보국§!으로부터의 걱정되는 보고가 왔습니다. 현재 §Y은하 중심§!에 살고 있는, 고대의 선조 문명인 §Y에테르나이트§!가 느리지만 꾸준히 그들의 경계 내부와 외부에서 그 활동을 늘려가고 있습니다.\n\n사실, 작은 에테르나이트 정찰선이 은하를 다니는 것이 포착되었습니다. 그리고 감지기가 §Y버치 월드§!에서 발산되는 암호화된 통신의 양이 증가하고 있음을 감지했고, 이는 그들의 문명 내에서의 미세하지만 영향력 있는 변화를 암시합니다.\n\n우리는 현재 이것이 어쩌면 은하계에 대해 더 알고자 하는 그저 일종의 일반 에테르나이트 프로토콜인지, 뭔가 엄청난 것이 다가오리라는 경고일지 확실하지 않습니다."
 giga_aeternum.3000.a:0 "면밀하게 감시해라!"
 giga_aeternum.3000.a.tooltip:0 "§Y에테르나이트 정보국§!이 몇달 간 에테르눔을 감시할 것이고, 최종적인 답이 나오자마자 보고할 것입니다."
 giga_aeternum.3001.name:0 "다가오는 각성"
 giga_aeternum.3001.desc:0 "에테르눔의 특이 행동에 대한 일련의 집중적인 연구와 조사를 수행하고, 은하 기록 보관소의 데이터와 그들의 현재 행동을 상호 참조한 뒤, 우리의 연구자가 99.7%의 신뢰도로 §R에테르나이트 각성§!이 곧 있으리라고 결론을 내렸습니다.\n\n우리가 말한것 처럼, 에테르나이트가 고대의 조선소를 재활성화하고, §Y아이온디아§!에 집중된 모든 산업을 재가동하는 듯 하며, 어쩌면 수십만 년 만의 은하계로의 귀환을 위해 사회와 그 주민을 준비시키는 듯 합니다.\n\n고대의 무장 함선의 크기와 힘만 고려해도, 이는 우리의 군 최고사령부 내에서 패닉을 일으켰습니다. 다행히도, 우리 과학자들은 이 소문의 각성이 일촉즉발의 상황은 아니라고 확신했습니다.\n\n사실, 과학자들은 에테르눔의 인구가 수십만 년 간 정체되고 쾌락주의에 빠진 이후로, 은하적 전쟁을 위해 국가를 완전히 준비하는 것에 사회와 군 사령부의 집중적인 재건과 재조직화를 수 년간은 해야할 거이라고 믿고 있습니다.\n\n그리하여, 에테르나이트가 은하계로 위대한 귀환을 하기까지 §Y[birch_aeternum.years_until_awakening] 년§!이 남았다고 추정하며, 이는 다가오는 폭풍에 대비할 귀중한 시간이 될 것입니다.\n\n§B에테르나이트를 지속적으로 확인하기 위해, 이제 정보국에서 에테르눔을 조사하는 다양한 신프로젝트를 할 수 있습니다.§!"
 giga_aeternum.3001.a:0 "걱정되는군. 우리는 이를 대비해야한다."
 giga_aeternum.3001.a.tooltip:0 "이제 에테르나이트 정보국을 통해 각성의 준비를 하고 있는 에테르나이트 활동을 감시할 수 있습니다. 또한 이 프로젝트는 귀중한 §Y에테르나이트 기술 정보§!를 줄 것입니다."
 giga_aeternum.3004.name:0 "임박한 각성!"
 giga_aeternum.3004.desc:0 "에테르나이트 정보국이 이제 그들은 §Y2 년§! 내로 각성할 준비가 되었으리라고 보고했습니다.\n\n이제, 유감스럽게도 그들을 지체하는 작전은 넘 오래 걸릴것이며, 그들은 다가오는 폭풍에 대비하여 우리의 함대와 방어에 충분히 투자하라고 조언합니다..."
 giga_aeternum.3004.a:0 "우리는 견뎌낼 것이다."
 giga_aeternum.3009.name:0 "에테르나이트 정보국"
 giga_aeternum.3009.desc:0 "에테르나이트에 대한 첫 분석은, 예상대로, 그들의 기술 발전과 함대력이 우리를 완전히 넘어선다는 것을 드러냈습니다. 그리하여, 잠재적으로 위험한 이 선구자 문명의 활동을 면밀히 조사하고 감시하기 위해, 최근 새로운 정보 지국이 탄생했으며, §Y에테르나이트 정보국§!이라고 합니다.\n\n이 특화 부서는 이 선조들을 집중 감시하며, 선조들과 관련된 다양한 프로젝트를 수행하게 해줄 것입니다. 또한 우리 문명이 에테르눔과의 잠재적 충돌에 대비할 수 있도록 도와줄 것입니다.\n\n그리하여, 정보국은 찾을 수 있는 에테르눔에 대한 모든 데이터를 $aeternum_tech_intel$의 형태로 수집할 것이고, 그들의 고대 함선에 대한 최선의 대응법을 알아내기 위해 이를 분석할 것입니다."
 giga_aeternum.3009.a:0 "알겠다."
 giga_aeternum.3009.a.tooltip:0 "이제 우리는 스크린 밑의 \"에테르나이트 활동 감시\" 버튼을 사용해 §Y에테르나이트 정보국§!과 연결할 수 있습니다."
 giga_contact_aeternum_tooltip:0 "§H§Y에테르눔§! 활동 감시...§!"
 giga_aeternum.3010.name:0 "에테르눔 감시중"
 giga_aeternum.3010.desc.early.a:0 "에테르눔 놀랄만큼 진보된 기술을 가지고 있습니다. 조심해야합니다.\n\n그들이 나머지 은하계에 관심을 거의 보이지 않는다는 점은 다행입니다."
 giga_aeternum.3010.desc.early.b:0 "우리는 에테르나이트 기술 정보를 얻기 위해 할 수 있는 모든 일을 해야합니다. 작은 것이라도 그 하나하나가 그들을 더 잘 이해할 수 있도록 도와줍니다!"
 giga_aeternum.3010.desc.early.c:0 "버치 월드는 공학의 진정한 경이입니다. 더는 그들이 이것을 어떻게 건설했는지도 모르겠습니다!"
 giga_aeternum.3010.desc.preawaken.a:0 "우리는 에테르나이트 선조의 활동을 연구하고 분석하기 위해 열심이었습니다. 그들은 잠재적인 위협임이 확실하지만, 그들이 은하계로 돌아오기까지 시간이 좀 있습니다."
 giga_aeternum.3010.desc.preawaken.b:0 "에테르나이트의 무관심은 다른 많은 선구자 문명들과 마찬가지로 그들의 몰락으로 이어질 수 있습니다."
 giga_aeternum.3010.desc.preawaken.c:0 "각성 이전에 남은 시간을 잘 활용해야한다."
 giga_aeternum.3010.desc.soonawaken.a:0 "우리의 함대와 방어선이 충분하기를 빌어야겠군."
 giga_aeternum.3010.desc.soonawaken.b:0 "너무 늦기 전에 얻을 수 있는 정보는 모두 얻어야겠군."
 giga_aeternum.3010.desc.soonawaken.c:0 "각성이 가까웠다. 우리는 준비될 것이다!"
 giga_aeternum.3010.desc.atwar.a:0 "이는 은하 역사를 통틀어 보기 힘든 수준의 충돌입니다."
 giga_aeternum.3010.desc.atwar.b:0 "이제부터, 완전한 파괴 또는 절대적 승리만이 있다."
 giga_aeternum.3010.desc.atwar.c:0 "그들의 기술 몇 개를 역설계할 수 있다면, 전쟁의 흐름이 역전될지도 모릅니다.\n\n그들의 배가 놀랍도록 느린 것이 오히려 다행입니다."
 giga_aeternum.3010.clues:0 "에테르나이트 기술 정보: [ROOT.aeternite_intel_count] | 피해량 +[ROOT.aeternite_damage_bonus]%"
 aeternum_clues_tooltip:0 "이는 에테르나이트가 사용하는 기술에 대한 우리의 현재 이해도를 나타냅니다.\n\n우리가 획득하는 각각의 $aeternum_tech_intel$마다 §G+5%§! 만큼의 §Y에테르눔에 대한 피해량§!을 얻을 것이며, 최대 §G+150%§!까지 얻을 수 있습니다.\n\n특별 프로젝트나 전쟁 중에 에테르나이트 함선을 파괴하는 등의 다양한 방법으로 정보를 입수할 수 있습니다."
 giga_aeternum.3010.howclues:0 "더  많은 $aeternum_tech_intel$를 얻는 방법은 뭐지§B?§!"
 giga_aeternum.3010.howclues.response:0 "§Y에테르눔§!이 매우 고립되었기 때문에, 그들의 함선 구조와 기술에 대한 데이터를 입수하는 것은 쉽지 않습니다.\n\n그럼에도, 귀중한 정보를 얻는데 사용할 수 있는 방법은 다양합니다.\n\n그들과 관련된 다양한 §Y특별 프로젝트§!를 완수하면 정보를 얻을 수 있고, 전투 도중 에테르나이트 함선을 파괴하면 §Y1%§!의 확률로 정보를 얻으며, 거대한 주력함이나 에테르나이트 구조물을 파괴하는 것은 대량의 정보를 줄 것입니다.\n\n정보를 얻을 다른 의외의 기회 또한 있을 것입니다.\n\n$aeternum_tech_intel$의 상한은 §G30§!이며, 이는 §Y에테르눔에 대한 피해량§!을 최대 §G+150%§!까지 부여할 수 있습니다."
 giga_aeternum.3010.countdown:0 "에테르눔 각성까지 남은 예상 시간: [birch_aeternum.years_until_awakening] 년"
 aeternum_countdown_tooltip:0 "이는 에테르눔이 마침내 각성하기까지 남은 시간의 추정치이며, 그들은 다시 한 번 그들의 깃발 아래에 은하를 통일하기 위해 전쟁을 선포할 것입니다."
 giga_aeternum.3010.planetcraft:0 "§G에테르나이트 요새 행성§! 역설계 | §B정보§! §G20§! 필요"
 analysed_aeternite_planetcraft_tooltip:0 "§Y에테르나이트 요새 행성§!을 파괴하고 분석한 적이 있어야 합니다. 분석은 이를 파괴한 뒤 §Y특별 프로젝트§!를 통해 진행될 수 있습니다."
 giga_aeternum.3010.armor:0 "§H에테르나이트 장갑§! 역설계 | §B정보§! §G12§! 필요"
 analysed_aeternite_armor_tooltip:0 "§Y에테르나이트 사이코 물질생성기§!를 파괴하고 분석한 적이 있어야 합니다. 분석은 이를 파괴한 뒤 §Y특별 프로젝트§!를 통해 진행될 수 있습니다."
 giga_aeternum.3010.alondiashield:0 "§H수우리킬피안§! 방해 | §B정보§! §G10§! 필요"
 giga_aeternum.3010.alondialisteningpost:0 "§Y에테르눔§!의 눈을 가린다. | §G10§! §BIntel§! 필요"
 aeternum_listeningpost_tooltip:0 "우리는 에테르눔의 가장 섬세한 센서 중 일부를 가릴 수 있는 이론을 세웠습니다. 이로써 우리는 훨씬 더 쉽게 그들의 성채를 지나갈 수 있을 것입니다."
 needs_10_aet_intel:0 "최소한 §G10§! 만큼의 $aeternum_tech_intel$가 필요합니다. 이를 진행해도 정보가 없어지지 않습니다."
 needs_12_aet_intel:0 "최소한 §G12§! 만큼의 $aeternum_tech_intel$가 필요합니다. 이를 진행해도 정보가 없어지지 않습니다."
 needs_20_aet_intel:0 "최소한 §G20§! 만큼의 $aeternum_tech_intel$가 필요합니다. 이를 진행해도 정보가 없어지지 않습니다."
 needs_25_aet_intel:0 "최소한 §G25§! 만큼의 $aeternum_tech_intel$가 필요합니다. 이를 진행해도 정보가 없어지지 않습니다."
 needs_35_aet_intel:0 "최소한 §G35§! 만큼의 $aeternum_tech_intel$가 필요합니다. 이를 진행해도 정보가 없어지지 않습니다."
 giga_aeternum.3010.diplo:0 "§M에테르나이트 외교§!"
 giga_aeternum_1_intel_tooltip:0 "$aeternum_tech_intel$를 §G1§! 얻습니다."
 giga_aeternum_2_intel_tooltip:0 "$aeternum_tech_intel$를 §G2§! 얻습니다."
 giga_aeternum_3_intel_tooltip:0 "$aeternum_tech_intel$를 §G3§! 얻습니다."
 giga_aeternum_4_intel_tooltip:0 "$aeternum_tech_intel$를 §G4§! 얻습니다."
 giga_aeternum_5_intel_tooltip:0 "$aeternum_tech_intel$를 §G5§! 얻습니다."
 giga_aeternum.4111.name:0 "에테르나이트 정보 획득!"
 giga_aeternum.4111.desc:0 "최근의 §Y에테르나이트§!와의 함대 교전에 따라, 우리의 장교가 파괴된 함선의 잔해를 연구하여 에테르나이트 함선 구조에 관한 귀중한 정보를 모았다고 보고했습니다.\n\n이는 그들의 기술에 대한 우리의 이해도에 도움이 될 것이며, 우리의 함선이 그들에게 더 많은 피해를 입히도록 할 것입니다."
 giga_aeternum.4111.a:0 "정말 좋군!"
 giga_katzen.020.cetana:0 "§H세타나§!를 아십니까?"
 giga_katzen.0211.name:0 "세타나, 합성체 여왕"
 giga_katzen.0211.desc:0 "이해가 안 가시죠? 저도 잘 모릅니다. 저희도 다른 이들처럼 그녀의 존재를 몰랐습니다. 하지만 문제는 그녀의 나노봇이 나타났을 때, 대제께서 즉시 저희에게 매우 구체적인 반-나노봇 대응책 개발을 명령하셨다는 겁니다. 듣기로는 세타나의 '예측 가능한 설계'에서 '발견'하셨다고 합니다.\n\n저희 최고 과학자들은 대제의 번뜩이는 영감으로 보이는 것에 그렇게 많은 자원을 투입하는 것에 대해 다소 회의적이었지만, 이런 장난이 처음은 아니었기에 따랐습니다.\n\n놀랍게도 대응책은 매우 효과적이었습니다! 물론 완벽하진 않습니다. 하지만 이 시스템들은 그녀의 나노폭풍 대부분을 막아내고 그녀의 함대와 직접 교전하는 데 도움을 주었지만, 그들은 강하고 여왕은 여전히 큰 문제입니다.\n\n음… 저희 양측이 늘 우호적이었던 점을 고려하여, 반-나노봇 폭탄 데이터에 관심이 있으신가요? 대제께서는 이 미친 여왕에 맞서 싸우는 데 도움을 주기 위해 우호적인 문명에게 판매해도 좋다고 분명히 말씀하셨습니다."
 giga_katzen.0211.a:0 "물론입니다!"
 giga_katzen.0211.a.response:0 "당신들과 거래하게 되어 기쁩니다, 외계인이여. 세타나의 사악한 통치가 하루빨리 끝나기를 바랍니다."
 giga_katzen.0211.b:0 "우리는 관여하지 않겠습니다."
 giga_katzen.020.aeternum:0 "너희 종족이 §M에테르눔§!에 대해 아는게 있나?"
 giga_aeternum.4120.name:0 "에테르나이트"
 giga_aeternum.4120.desc:0 "아. §Y에테르나이트§!, 은하의 중심에 살고있는 알 수 없는 선구자 문명 말이군.\n\n우리 캇첸은 그들에 대해 알지 못하며, 우리도 너희들과 같이 은하의 중심이 마침내 드러났을 때 그들의 존재를 발견했다.\n\n그러나, 내가 이해할 수 없는 이상한 이유로, 카이저께서는... 그들에 대해 다소 알고계신 듯 하다. 그분은 중심이 개방되자마자 그들이 무엇이고 누구인지 이미 알고있는듯 했다. 심지어는 \"한때 개인적으로 알았었다\"라고도 하셨지.\n\n나는 이게 그저 하는 말이신줄 알았지만, 그분은 에테르나이트 설계와 기술에 대한 중요한 정보를 담고 있는 놀라우리만큼 상세한 데이터뱅크를 가지고계셨다.\n\n다시 한 번 말하지만, 나도, 제국도 그분이 정확히 어떻게 이 데이터를 얻었는지 모른다. 하지만 카이저께서는 그냥 그들의 구조가 \"지나치게 당연하다\"라고 말씀하셨다."
 giga_aeternum.4120.a:0 "우리가 이 정보를 얻을 수 있는가?"
 giga_aeternum.4120.b:0 "흥미롭군. 공유해주어서 고맙네!"
 giga_aeternum.4121.name:0 "에테르나이트 데이터뱅크"
 giga_aeternum.4121.desc:0 "놀랍게도, 좋다! 카이저께서 너희들과 이 데이터를 나누는 것에 매우 기뻐하신다 하셨다. 물론, 가격은 좀 있지만.\n\n내가 본 것으로는, 그분은 에테르나이트에 대한 경명을 가지고 계신 듯 하다. 그래서 난 그분이 필요하다면 너희 종족이 에테르눔과 싸우는 것을 기쁘게 도와주리라 확신한다."
 giga_aeternum.4121.a:0 "좋은 거래군! | £energy£ §Y25000§!"
 giga_aeternum.4121.a.tooltip:0 "$giga_aeternum_4_intel_tooltip$\n우리에 대한 §Y카이저의 우호도§!가 §G1§! §B증가§!합니다."
 giga_aeternum.4121.a.response:0 "멋지군! 이제 데이터를 너희의 데이터뱅크로 전송할 것이다."
 giga_aeternum.4121.b:0 "너무 비싸군."
 aeternum_kaiser_buff:0 "에테르나이트 대항 전술"
 aeternum_kaiser_buff_desc:0 "카이저께서 아신다. 그분은 이곳에 와본 적이 있으시다."
 giga_aeternum.3010.a:0 "§B에테르나이트 루프-양자 통신§! 조사"
 giga_aeternum.3010.a.tooltip:0 "에테르나이트는 첨단 루프-양자 얽힘을 사용해 먼 거리를 즉시 통신합니다. 실제 기술은 우리의 이해를 훨씬 넘어서지만,  어떻게든 이것을 방해할 수 있는지 알아보기 위해, 앞서 말한 기술의 기초적인 원리를 조사하는 것이 현명할 듯 합니다.\n\n§H에테르나이트 통신의 결함을 조사하기 위한 특별 프로젝트가 시작할 것입니다.§!"
 giga_aeternum.3010.b:0 "§H에테르나이트 구조물 공학§! 연구"
 giga_aeternum.3010.b.tooltip:0 "에테르눔의 거대 구조물과 우주 구조물은 공학의 방대하고 다양한 방법을 사용해 지어졌습니다. 원격으로 그들을 연구하여, 그 구조 내의 많은 결함과 약점을 발견할 수 있을지도 모릅니다.\n\n§H에테르나이트 공학의 결함을 조사하기 위한 특별 프로젝트가 시작할 것입니다.§!"
 giga_aeternum.3010.c:0 "§G에테르나이트 정보 수집 능력§! 조사"
 giga_aeternum.3010.c.tooltip:0 "그들의 모든 진보된 기술에도 불구하고, 에테르눔은 은하의 바깥에 정확히 무엇이 있는지에는 상대적으로 아는 것이 없는 것 같으며, 그들이 상당히 무관심하기 때문인 것 같습니다. 그들이 은하 전체에 대해 어떻게 데이터를 수집하는지 정확하게 밝혀낸다면, 그들이 어떻게든 우리가 실제보다 더 강하거나 더 약하다고 \"속일\" 수 있을지도 모릅니다.\n\n§H에테르나이트 정보 수집부의 결함을 조사하기 위한 특별 프로젝트가 시작할 것입니다.§!"
 INVESTIGATE_AETERNUM_COMMS:0 "에테르나이트 루프-양자 통신"
 INVESTIGATE_AETERNUM_COMMS_DESC:0 "진보된 형태의 양자 얽힘에 기초를 둔 것으로 보이는 에테르눔의 통신 방법에 대한 자세한 연구가 진행될 것입니다.\n\n이 분석을 완료하면 $aeternum_tech_intel$를 §G1§! 획득할 것입니다"
 INVESTIGATE_AETERNUM_ENGINEERING:0 "에테르나이트 구조물 공학"
 INVESTIGATE_AETERNUM_ENGINEERING_DESC:0 "에테르나이트의 구조는 오래되었고 진보되었지만, 대개는 우리의 이익을 위해 이용할 수 있는 결함이 있을 가능성이 높습니다.\n\n이 분석을 완료하면 $aeternum_tech_intel$를 §G2§! 획득할 것입니다"
 INVESTIGATE_AETERNUM_INTEL:0 "에테르나이트 정보 수집부"
 INVESTIGATE_AETERNUM_INTEL_DESC:0 "에테르눔은 은하의 나머지에 대해 거의 관심이 없었고, 우리에 대한 그들의 데이터는 심하게 부정확할지도 모릅니다. 이는 그들을 속이고 각성을 늦출 엄청난 기회를 뜻합니다.\n\n이 분석을 완료하면 $aeternum_tech_intel$를 §G1§! 획득할 것입니다"
 giga_aeternum.3040.name:0 "에테르나이트 공학 보고서: 노후한 구조"
 giga_aeternum.3040.desc:0 "에테르나이트 정보국이 아이온디아의 버치 월드 근처에 위치한 에테르나이트 함선과 거대 구조물의 구조에 대한 원격 연구를 해냈습니다.\n\n의심할 여지 없이 그들의 구조는 놀랍도록 진보된 공학적 방법으로 만들어졌지만, 굉장히 오래되었고 지난 수십만 년에 걸쳐 작은 변화가 일어났을 가능성이 있습니다. 그리고 현재와 비교해 에테르눔이 더 엄청난 산업적 능력이 있었을 때 건설된 듯 합니다. 이는 이 구조물에 하자가 생겼음을 의미하며, 에테르눔은 이를 완전히 수리하는데 엄청난 시간과 자원을 소비햐야할 것입니다.\n\n그러므로, 우리의 과학자들은 빛에 가까운 속도로 가속되는 작은 발사체들로 구성된 일종의 \"폭풍\"을 그 핵에 퍼부음으로써,  에테르나이트 시설에 피해를 입힐 수 있고, 이를 수리하게 하여 각성을 늦출 수 있을지도 모릅니다.\n\n우리가 제대로 해낸다면, 그러니까 발사체가 핵에 도달하기 전에 웜홀망을 통하게 한다면, 발사원을 추적하는 것은 극도로 어렵거나 불가능할지도 모릅니다. 에테르눔이 그들의 성단 바깥에서 무슨 일이 일어나는지에 대해서 상대적으로 잘 알지 못하기 때문에, 우리는 별 일 없이 일을 진행할 수 있을 것입니다.\n\n§B에테르나이트 정보국을 통해 이 과정을 시작할 수 있습니다.§!"
 giga_aeternum.3040.a:0 "대담한 계획이군."
 giga_aeternum.3020.name:0 "에테르나이트 통신 보고서: 루프홀"
 giga_aeternum.3020.desc:0 "에테르나이트의 통신법에 대한 분석을 통해, 우리 과학자들은 실제 기술 그 자체는 우리의 이해를 아득히 넘어서지만, 예상대로, 이 기술이 사용하는 기본 방법은 실제로 매우 단순합니다.\n\n에테르나이트는 양자 얽힘을 통해 연결된 특수한 입자의 네트워크를 사용해, 거리에 상관 없이 즉시 통신을 가능케합니다. 그들이 이 방법을 상당한 양의 사이오닉 및 양자장 조작을 통해 개선시켰지만, 우리 과학자들은 이 입자들을 함께 연결하는 기본 얽힘을 방해할 수 있으리라 생각합니다.\n\n사실, 아공간과 초공간을 통해 은하 중심을 향하여 집중된 강력한 빛의 파동을 방출하여, 우리는 에테르나이트 기기가 기능하는데 필요한 얽힘을 효과적으로 \"신호를 바꿔\" 버릴 수 있습니다.\n\n물론 이 과정은 에너지를 먹는 괴물이며 엄청난 비용이 들 것입니다. 하지만, 에테르나이트에 대항할 수 있을 가능성을 위한 귀중한 시간을 벌어다 줄 것입니다.\n\n§B에테르나이트 정보국을 통해 이 과정을 시작할 수 있습니다.§!"
 giga_aeternum.3020.a:0 "진행해라."
 giga_aeternum.3010.subspace:0 "§B에테르나이트 통신§! 신호 변환 | [birch_aeternum.aeternum_scramble_operation_done]"
 aeternum_scramble_done_no_times:0 "§Y0§! 회 진행됨"
 aeternum_scramble_done_1_time:0 "§Y1§! 회 진행됨, 함선 속도 §Y-[birch_aeternum.speed_debuff]%§!"
 aeternum_scramble_done_several_times:0 "§Y[birch_aeternum.aeternum_comms_scramble_count]§! 회 진행됨, §Y함선 속도 -[birch_aeternum.speed_debuff]%§!"
 aeternum_operation_already_underway:0 "이미 이 작전을 수행하고 있습니다."
 giga_aeternum.3021.name:0 "에테르나이트 통신 방해"
 giga_aeternum.3021.desc:0 "아공간을 통해 강력한 에너지 파동을 방출하여, 우리는 에테르나이트가 의존하는 섬세한 얽힘 상태를 효과적으로 부수었습니다. 당연하게도, 그들은 상대적으로 쉽게 고칠 수 있을것이지만, 그들의 대각성을 수년 간 지연시킬 것입니다.\n\n현재 이 작전은 §Y3 년§!간 매월 £energy£ §Y[birch_aeternum.aeternum_comms_scramble_cost]§!  만큼을 소비할 것이며, 완료되면 그들의 대각성을 §Y6 년§! 뒤로 지연시킬것입니다. 추가로, 작전을 행할 때마다 에테르나이트는 영구적으로 §Y함선 속도 -15%§!에 시달릴 것입니다.\n\n작업이 완료되면 취소될 수 없으며, 다시 시도하면 점차적으로 비용이 더 많이 들 것입니다.\n\n이는 최대 §Y6§! 회 수행할 수 있습니다."
 giga_aeternum.3021.a:0 "작전 시작"
 giga_aeternum.3021.a.tooltip:0 "우리는 §Y3 년§!간 매월 £energy£ §Y[birch_aeternum.aeternum_comms_scramble_cost]§! 만큼을 지불해야 합니다. 취소될 수 없습니다."
 giga_aeternum.3021.forgetit:0 "아무것도 아니다."
 giga_aeternum.3022.name:0 "에테르나이트 통신 방해됨!"
 giga_aeternum.3022.desc:0 "에테르나이트 정보국이 에테르나이트 통신 방해 작전을 성공적으로 완수했다고 보고했습니다!\n\n우리의 방해하려는 노력 덕분에, 에테르나이트 각성이 몇 년 지체되었고, 우리 군을 준비시킬 귀중한 시간을 벌었습니다. 이는 그들의 함선 조직에도 영향을 미쳐, 그들을 현저히 느리게 할 것입니다.\n\n원한다면 정보국 메뉴를 통해 작전을 다시 수행할 수 있습니다."
 giga_aeternum.3022.a:0 "멋지군!"
 giga_aeternum.3010.bye:0 "나가기"
 aeternum_comms_scramble_1:0 "에테르나이트 통신 신호 변환"
 aeternum_comms_scramble_1_desc:0 "에테르나이트 통신의 신호를 변환해 각성을 늦추는데 에너지를 투자하고 있습니다."
