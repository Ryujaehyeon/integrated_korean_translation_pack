 giga_katrebels.2010.name:0 "§Y솔라키아§!에서의 저항 작전"
 giga_katrebels.2010.desc:0 "§Y솔라키아 자유 전사§!가 그들의 고향 §Y솔라키아§!에서 작전을 수행하도록 지원할 수 있습니다. 그들은 캇첸의 중요한 데이터 저장소를 목표로 할 것이며, 캇첸 군의 데이터를 은하계에 유출할 것입니다. 이를 통해 우리 함선이 캇첸의 함선에 더 많은 피해를 줄 수 있을 것입니다.\n\n§Y성공 시§!:\n§Y솔라키아§!에서의 게릴라 활동이 §G증가§!할 것입니다.\n캇첸에 대한 §Y피해량이 증가§!할 것입니다.\n캇첸의 경계가 §R2§! §R증가§!합니다.\n\n§Y실패 시§!:\n캇첸의 경계가 §R1§! §R증가§!할 것입니다.\n\n§Y성공 확률§!:\n기본: §Y75%§!\n§H캇첸의 경계§!: §R-[flusion_primitives_country.katzen_wary_perc]%§!\n§H솔라키아에 대한 캇첸의 강력한 통제§!: §R-30%§!\n§B뤼우인슈타트의 게릴라 §!: §G+[flusion_primitives_country.lyuin_res_perc]%§!\n§B캇첸 헤르츠란츠의 게릴라 §!: §G+[flusion_primitives_country.katzen_res_perc]%§!\n§B라브카니아의 게릴라 §!: §G+[flusion_primitives_country.ravka_res_perc]%§!\n총계: §Y[flusion_primitives_country.flusion_success_chance_total]%§!"
