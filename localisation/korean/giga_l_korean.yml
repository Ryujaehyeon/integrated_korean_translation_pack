 katown_name:0 "§Y캐타운 메갈로폴리스§!"
 katown_desc:0 "§L디트리히 퓌데아퍼가 고안한 캐타운 메갈로폴리스는 캇첸 문명에게 있어 빛나는 보석입니다.\n\n거대하고 완벽하게 건설된 거대 도시로써, 캇첸 헤르츠란츠의 북쪽 전체에 걸쳐 있습니다. 자연의 공간과 강에 화려하지만 효율적인 캇첸의 건축물을 섞은 이 곳에는 수십억의 주민들이 살고 있습니다.\n\n캐타운 메갈로폴리스의 중심에는 하늘로 수 km 뻗어있고 §Y카이저§!를 중심으로 한 캇첸 정부가 모여 있는 §Y그랜드 캐타운 피라미드§!가 있습니다.\n\n피라미드는 플러션을 궤도 폭격과 사이킥 공격으로부터 막아내는 거대한 §Y실드 생성기§!로 만들어지는 실드와 §Y반사이킥장§!의 원천입니다.\n\n또한 이 피라미드는 §Y반웜홀장§!도 생성하며, 이것이 작동 중일 때에는 초강력 무기를 사용할 수 없습니다.§!\n\n§B파르티잔의 활동이 충분히 높아진다면 실드와 역장의 작동이 중지될 것입니다!§!"
 katown_res_low_tooltip:0 "$katown_name$\n\n§H주요 기능§! - §B최고 사령부 & 차폐부§!\n\n캇첸의 통제가 §M불가해한§! 수준입니다.!\n파르티잔의 활동이 §G무시할 만한§! 수준입니다.\n캇첸 보정치:\n§G지상군 체력 +50%\n(플러션) 궤도 폭격 피해량 -75% \n반웜홀장 작동중\n반사이킥장 작동중§!\n\n$katown_desc$"
 katown_res_med_tooltip:0 "$katown_name$\n\n§H주요 기능§! - §B최고 사령부 & 차폐부§!\n\n캇첸의 통제가 §M불가해한§! 수준입니다.!\n파르티잔의 활동이 §Y중간§! 수준입니다.\n캇첸 보정치:\n§G지상군 체력 +25%\n(플러션) 궤도 폭격 피해량 -30%\n반웜홀장 작동중\n반사이킥장 작동중§!\n\n$katown_desc$"
 katown_res_sign_tooltip:0 "$katown_name$\n\n§H주요 기능§! - §B최고 사령부 & 차폐부§!\n\n캇첸의 통제가 §M불가해한§! 수준입니다.!\n파르티잔의 활동이 §H상당한§! 수준입니다.\n캇첸 보정치:\n§R지상군 체력 -10%§!\n§G(플러션) 궤도 폭격 피해량 -5%§!\n§R반웜홀장 정지§!\n§G반사이키장 가동중§!\n\n$katown_desc$"
 katown_res_ext_tooltip:0 "$katown_name$\n\n§H주요 기능§! - §B최고 사령부 & 차폐부§!\n\n캇첸의 통제가 §M불가해한§! 수준입니다.!\n파르티잔의 활동이 §R격렬한§! 수준입니다.\n캇첸 보정치:\n§R지상군 체력 -40%\n(플러션) 궤도폭격 피해량 +30%\n반웜홀장 정지\n반사이킥장 정지§!\n\n$katown_desc$"
 giga_res_no_tooltip:0 "§B저항 자원§!\n§Y현재 값§! 0/10\n\n이 카운터는 §Y솔라키아 자유 전사§!와 다른 저항 그룹들이 플러션에서 소유하고 있는 자원, 자료, 장비, 인원의 양을 의미합니다.\n\n저항 자원을 소모하여 플러션에서의 §Y저항 작전§!을 지원할 수 있고, 저항에 대한 §Y경제적 지원§!을 통해 보충할 수 있습니다."
 giga_wary_no_tooltip:0 "§H캇첸의 경계§!\n§Y현재 값§! 0/10\n\n이 카운터는 플러션에서 일어나고 있는 저항 활동에 대해서 캇첸이 얼마나 경계하고 있는지, 그리고 이에 대응하기 위해 얼마나 많은 자원을 투자하고 있는지를 의미합니다.\n\n경계가 높아지면 작전의 성공 확률이 낮아집니다. §Y플레이어의 제국§!에 대한 §Y카이저의 우호도§!는 캇첸의 경계에 영향을 끼치며, 카이저가 우리와 우호적일 때에는 우리가 저항 작전을 지원하고 있다고 의심하지 않을 것입니다."
 giga_res_0_tooltip:0 "§B저항 자원§!\n§Y현재 값§! [flusion_primitives_country.solak_resources]/10\n\n이 카운터는 §Y솔라키아 자유 전사§!와 다른 저항 그룹들이 플러션에서 소유하고 있는 자원, 자료, 장비, 인원의 양을 의미합니다.\n\n저항 자원을 소모하여 플러션에서의 §Y저항 작전§!을 지원할 수 있고, 저항에 대한 §Y경제적 지원§!을 통해 보충할 수 있습니다."
 giga_wary_0_tooltip:0 "§H캇첸의 경계§!\n§Y현재 값§! [flusion_primitives_country.katzen_wary]/10\n\n이 카운터는 플러션에서 일어나고 있는 저항 활동에 대해서 캇첸이 얼마나 경계하고 있는지, 그리고 이에 대응하기 위해 얼마나 많은 자원을 투자하고 있는지를 의미합니다.\n\n경계가 높아지면 작전의 성공 확률이 낮아집니다. §Y플레이어의 제국§!에 대한 §Y카이저의 우호도§!는 캇첸의 경계에 영향을 끼치며, 카이저가 우리와 우호적일 때에는 우리가 저항 작전을 지원하고 있다고 의심하지 않을 것입니다."
 giga_katrebels.dofus.low.a:0 "카이저를 방해합니다."
 giga_katrebels.dofus.low.b:0 "어떤 방법을 쓰더라도 카이저를 끌어 내려야 합니다!\n...니콜 다이슨 빔은 치웁시다."
 giga_katrebels.dofus.low.c:0 "어쩌면 당신들 종족이 우리를 동화 플러션과 은하를 구원할 수도 있습니다."
 giga_katrebels.dofus.low.d:0 "카이저는 오래된 적을 동맹으로 만드는데 탁월한 능력이 있습니다."
 giga_katrebels.dofus.mid.a:0 "카이저를 방해합니다!"
 giga_katrebels.dofus.mid.b:0 "우리는 이길 수 있습니다!"
 giga_katrebels.dofus.mid.c:0 "우리의 노력이 열매를 맺기 시작했습니다. 마침내 미래가 약속되었습니다."
 giga_katrebels.dofus.mid.d:0 "에지칸들이 어떤지 궁금합니다."
 giga_katrebels.dofus.high.a:0 "승리는 곧 우리의 것이 될 것입니다, [Root.GetSpeciesName]여!"
 giga_katrebels.dofus.high.b:0 "역사는 우리를 영웅으로 기억할 것입니다."
 giga_katrebels.dofus.high.c:0 "플러션의 시민이여, 연합하라!"
 giga_katrebels.dofus.high.d:0 "곧 플러션은 카이저에게서 100% 자유로워질 것입니다."
 katown_shield_0:0 "캐타운 실드"
 katown_shield_0_desc:0 "거대한 캐타운 피라미드에서는 플러션 전역을 두르고 있는 궤도 폭격 방어 실드를 생성합니다."
 katown_shield_1:0 "캐타운 실드"
 katown_shield_1_desc:0 "거대한 캐타운 피라미드에서는 플러션 전역을 두르고 있는 궤도 폭격 방어 실드를 생성합니다."
 katown_shield_2:0 "캐타운 실드"
 katown_shield_2_desc:0 "거대한 캐타운 피라미드에서는 플러션 전역을 두르고 있는 궤도 폭격 방어 실드를 생성합니다."
 katown_shield_3:0 "파괴된 캐타운 실드"
 katown_shield_3_desc:0 "거대한 캐타운 피라미드의 실드가 파괴되었고, 그 표면에는 강력한 궤도 폭격이 가능해졌습니다."
 solak_partisans_1:0 "캇첸 기밀 누설"
 solak_partisans_1_desc:0 "솔리키아인들은 캇첸의 기밀과 전쟁계획을 은하예 활발히 유출하였고, 캇첸에게 더욱 쉽게 대응할 수 있게 되었습니다."
 solak_partisans_2:0 "캇첸 기밀 누설"
 solak_partisans_2_desc:0 "솔리키아인들은 캇첸의 기밀과 전쟁계획을 은하예 활발히 유출하였고, 캇첸에게 더욱 쉽게 대응할 수 있게 되었습니다."
 solak_partisans_3:0 "캇첸 기밀 누설"
 solak_partisans_3_desc:0 "솔리키아인들은 캇첸의 기밀과 전쟁계획을 은하예 활발히 유출하였고, 캇첸에게 더욱 쉽게 대응할 수 있게 되었습니다."
 giga_katrebels.01234.name:0 "건강한 물고기"
 giga_katrebels.01234.desc:0 "크게 놀랄만한 것은 아니지만, 몇몇의 §Y주입된 에지카니아§!가 새롭게 강화된 신체적 능력을 이용하여, §Y에지카니아 기사단§!에 가입함으로써 캇첸의 통치에 저항하기 시작했습니다.\n\n이것은 결과적으로 §Y에지카니아의 저항§!을 1만큼 높였습니다."
 giga_katrebels.01234.a:0 "마침내 좋은 뉴스군!"
 giga_katrebels.2000.name:0 "§Y솔라키아 자유 전사§!와의 통신 연결"
 giga_katrebels.2000.desc:0 "몇 번의 물밑 협상과 비밀 회의, 수많은 암호 메시지 이후에, §Y도푸스 테크닉 마키나§!라고 알려진 용감한 §Y솔라키아 자유 전사§!의 지도자와 연락하는데 성공하였습니다.\n\n§Y솔라키아 공화국§!의 지도자였던 도푸스는 §Y카이저§! 플러션 정복 전쟁 동안 §Y캇첸아르티히 제국§!의 힘에 무조건 항복해야만 했습니다.\n\n캇첸에게 상대적으로 협조적이었고, 캇첸령의 솔라키아에서 지역 총독으로 복무했음에돌 불구하고, 도푸스는 플러션에서 캇첸의 통치를 약화시키려고 하는 파르티잔과 자유 전사들과 네트워크를 비밀리에 유지하고 있었고, 언젠가 §Y솔라키아 공화국§!을 되찾기를 희망하고 있었습니다.\n\n솔라키아인들은 그들의 사회가 가상 환경과 지능 로봇공학을 많이 사용하였던 만큼, 컴퓨터 공학과 인공지능에 관련된 모든 방면에 있어서 매우 능숙합니다.\n\n그렇기 때문에, 캇첸의 군대에 직접적으로 싸우는 것은 가능하지 않더라도, 자유 전사는 플러션 전역의 파르티잔들과 상대적으로 거대한 네트워크를 비밀리에 유지하여, 서로 다른 몇 개의 저항 그룹을 다시 모을 수 있었습니다.\n\n불행하게도, 외부의 지원 없이는 그들의 노력이 계속될 수 없을 것이지만, 우리가 도푸스와 직접 연락하는데 성공하였고 그들이 플러션의 캇첸 수도에 직접적인 타격을 하도록 지원할 것이기 때문에 상황이 달라질 것입니다..."
 giga_katrebels.2000.a:0 "화면에 띄워라."
 giga_katrebels.2001.name:0 "§Y솔라키아 자유 전사§!"
 giga_katrebels.2001.desc:0 "아! 마침내 좋은 소식입니다. 외계의 세력이 우리를 도아주기로 결정한 것에 대해서 얼마나 안도했는지 말로 표현할 수 없습니다.\n\n저는 §Y도푸스 데크닉 마키나§!입니다만, §Y도푸스§!라고 불러주시면 됩니다. 수십년 동안 솔라키아의 시민들이나 다른 종족들을 조직화하여 플러션에서 캇첸의 지배를 와해시키려고 했지만, 안타깝게도 진전이 없습니다. 우리는 컴퓨터에 관련된 것들에 대해 매우 능숙하지만, 캇첸들도 그렇습니다.\n\n우리의 사랑하는 §Y솔라키아 공화국§!은 자유와 자유의지, 축제와 가상 환경의 장소였지만, 캇첸들이 그것들을 파괴하고 그들의 군국주의적 질서와 §Y카이저§!에 대한 추종으로 대체해버렸습니다. 빌어먹을 카이저! 우리는 §Y프로젝트 몬트카노네§!를 멈출 수 있는 기회가 있었지만, \"모든 플러션의 이익을 위해\"라고 말하던 그의 사탕 발린 연설에 눈이 멀었었습니다.\n\n거짓말 뿐입니다! 카이저는 자유의 환상을 심었고, 이를 통해서 은밀하지만 확실하게 수십억 명의 플러션인들이 그를 맹목적으로 따르게 만들었습니다.\n\n더 이상은 안됩니다! 외부의 지원을 받음으로써, 우리는 그의 터무니 없는 질서를 가장 약한 곳에서부터 짜낼 수 있을 것이고, 물을 초과해서 넣은 물풍선 마냥 전체가 터지게 할 것입니다."
 giga_katrebels.2001.a:0 "대의를 위해 함께 해야 한다."
 giga_katrebels.2001.a.tooltip:0 "이제 §Y캇첸아르티히 제국 메뉴§!를 통해서 §Y솔라키아 자유 전사§!, §Y플러션 저항 그룹§!과 §Y비밀 연락§!을 할 수 있습니다."
 giga_katzen.020.solak:0 "§H§Y솔라키아 자유 전사§!와 비밀리에 연락하라...§!"
 giga_katzen.020dally.desc:0 "[Root.GetSpeciesNamePlural] 종족이 우리 편이기 때문에, 플러션 협정 기구가 은하를 지배할 것이다!"
 giga_katzen.020eally.desc:0 "플러션 협정 기구는 FTL 이전에는 본래 우리와 플러션의 다른 나라들 사이의 군사 동맹이었다.\n\n이전 국가들에게 무슨 일이 있었는지는 묻지 마라."
 giga_katzen.020dneutral.desc:0 "뭐지? 더클로우 맥캐서다. 카이저 캇태일을 대신하고 있다."
 giga_katzen.020eneutral.desc:0 "좋은 하루 되십시오, 외계인들이여. 우리 군은 이 채널을 관찰하고 있으니 너무 소란스럽게 하지는 마십시오."
 giga_katzen.020dhappy.desc:0 "안녕하신가, [Root.GetName]여. 카이저께서는 너희 종족과 의사소통하는 것에 언제나 기뻐하신다."
 giga_katzen.020ehappy.desc:0 "카이저께서는 우리 두 문명이 함께 성장하고 함께 번영하기를 바라신다네, [Root.GetSpeciesNamePlural]이여."
 giga_katzen.020dangry.desc:0 "카이저께서는 \"지도에서 지워야할 제국 목록\"을 가지고 계시지.\n\n그리고 [Root.GetName](이)가 최상단에 있다."
 giga_katzen.020eangry.desc:0 "우리 캇첸은 너희 종족이 어떻게 우주에 진출했는지 궁금하군."
 giga_katzen.020dwar.desc:0 "카이저께서는 [Root.GetName]를 원래 있어야 할 곳으로 보내실 것이다: 역사의 쓰레기통으로 말이지."
 giga_katzen.020ewar.desc:0 "[Root.GetName](은)는 플러션의 무수히 많은 국가 중 하나로 들어가게 될 것입니다."
 riesigerkatzenpanzer_defence:0 "리지거 캇첸 판처 사단"
 riesigerkatzenpanzer_defence_desc:0 "족히 500m는 되는 길이의 거대한 장갑차량인 리지거 캇첸 판처 수십대로 구성된 사단입니다. 수백개의 터렛과 방공 포대, 다수의 핵탄두를 무한한 거리까지 발사할 수 있는 거대한 핵 레일건을 탑재하고 있습니다."
 riesigerkatzenpanzer_assault:0 "리지거 캇첸 판처 사단"
 riesigerkatzenpanzer_assault_desc:0 "족히 500m는 되는 길이의 거대한 장갑차량인 리지거 캇첸 판처 십수대로 구성된 사단입니다. 수백개의 터렛과 방공 포대, 다수의 핵탄두를 무한한 거리까지 발사할 수 있는 거대한 핵 레일건을 탑재하고 있습니다."
 cant_kaiser_opinion_too_low_talk:0 "캇첸들은 우리와 이야기하지 않으려고 합니다. 우리에 대한 그들의 우호도가 -1 이상이어야 합니다."
 giga_katzen.02020.cool:0 "흥미롭군. 공유해줘서 고맙네."
 giga_katzen.020.talk:0 "당신들 종족에 대해서 더 알고 싶습니다..."
 giga_katzen.02020.name:0 "캇첸아르티히 제국"
 giga_katzen.02020.desc:0 "카이저께서는 너희 종족에게 캇첸과 플러션에 대한 이야기를 기꺼이 하실 것이다, 외계인들이여. 무엇이 알고 싶은건가?"
 giga_katzen.02020.whatareyou:0 "당신들 종족은 어떤가?"
 giga_katzen.02020.whatareyou.response:0 "우리 캇첸은 순종적이며 야심이 있는 종족이다. 강력한 지도자, 카이저의 도움으로 우리 종족은 군국주의 사고를 발전시킬 수 있었고, 그것은 더 이상 개념이 아니라 우리의 삶이 되었다.\n\n우리 문화, 전통 그리고 로맨스 마저도 전쟁을 중심으로 돌아가며, 우리 문명에서 군대는 강력한 힘이 있어 우리 국가 전체가 거대한 하나의 군대라고 할 수 있지.\n\n아주 어릴 때부터, 우리 시민들은 우주와 땅 위에서의 모든 장갑전을 훈련하기 때문에, 모든 시민들이 복잡한 현대전에 대해서 아주 잘 이해하고 있지.\n\n정복은 우리 문명에게 있어서 필수불가결한 부분인데, 이는 우리 문명이 그 시작부터 국경을 더 넓게 확장하고 문화와 사상을 알려진 지역에 알리는 것에 수많은 자원을 투자했기 때문이다."
 giga_katzen.02020.treataliens:0 "정복한 종족들은 어떻게 다루는가?"
 giga_katzen.02020.treataliens.response:0 "당신은 우리가 어떤 종족이라도 무심하게 탄압하는 잔인한 종족이라고 생각하겠지.\n\n하지만 실제로는 전혀 그렇지 않다네! 우리는 모든 종족들이 그 규모와 행동양식과 상관 없이 우리 제국 안에서 동등한 권리를 가지는 우리의 동화 정책에 대해서 자랑스럽게 생각하고 있지.\n\n카이저께서는 그들의 원래 종족이 무엇이든 간에 누구나 \"캇첸\"이 될 수 있다고 믿으시고, 그렇기 때문에 새로운 시민들을 우리 문명에 최대한 통합하려고 노력하지.\n\n법적인 불평등함을 제한하기 위해서, 차별을 철폐하기 위해서, 교육을 표준화하기 위해서 많은 노력을 하고 있고, 이를 통해 각 종족의 강접과 그 자원들이 카이저를 섬기는 데 도움이 될 것이고, 우리의 문명을 온 우주에 퍼뜨릴 자랑스러운 이유가 되겠지."
 giga_katzen.02020.whokaiser:0 "카이저는 누구인가?"
 giga_katzen.02020.whokaiser.response:0 "카이저께서는 우리의 위대한 지도자이시며, 신념이 있는 보호자이시다. 그분께서는 우리 문명을 살펴보시고, 모든 수단과 방법을 동원하여 우리 문명의 발전과 번영을 보장하시지.\n\n그분의 확장주의 정책이 처음에는 당황스러울 수 있겠지만, 그분께서 하시는 모든 일은 우리 제국 내의 모든 지성체의 대의를 위한 것이며, 은하계 모두를 위한 대의인 것이다.\n\n카이저께서는 절대적인 힘을 가지고 계시지만, 그분의 성공의 열쇠는 언제든지 적응할 수 있게 하며 최대한 다양한 관점으로 문제에 접근하는 것이지.\n\n그분께서는 우리 문명에 부와 성공을 가져다주셨고, 모든 종족들이 우리와 같은 수준의 발전을 이루도록 해주셨으며, 우주의 모든 지성체가 캇첸의 위대한 문명에 동화되는 목적에 아무도 뒤쳐지지 않게 해주신다네."
 giga_katzen.02020.otherraces:0 "플러션과 다른 종족들은 어떤가?"
 giga_katzen.02020.otherraces.response:0 "아, 플러션 말이지. 플러션은 매우 아름다운 행성이고, 우리가 더 아름답게 만들었지. 대규모 건축 프로젝트를 통해 몇 개의 바다에서 물을 빼내어 한때는 버려진 사막에 물을 댔고, 그 건조한 땅을 거대한 초원과 평야로 만들었지.\n\n우리는 혹독한 환경을 개척했고, 완벽한 문명과 지속 가능한 핵 산업으로 대체하였다네.\n\n다른 종족에 대해서는, 음... 그들이 우리 문화에 통합될 수 있도록 보장했고, 그들의 삶을 최대한 증진시키는 것을 확언했지.\n\n§Y에지카니아§!를 예로 들어보지. 이 가련한 종족은 우리가 그들을 진흙탕에서 꺼내주기 전에는 원시적이고 조잡한 수렵채집의 삶을 살고 있었지.\n그들의 수명은 길었지만, 수많은 어린 개체들은 질병과 포식자에게 희생되었고, 그렇기 때문에 우리는 치료제를 개발하고 포식자를 없애 그들이 우리처럼 번영할 수 있게 해주었다네.\n\n§Y크롱크스§! 종족, 이 파충류 생물은 불결하고 위험한 손으로 파낸 둥시 도시에서 살고 있었지.\n그래서 우리는 그들의 해부학적 구조에 맞는 거대한 도시를 만들어 주었고, 그들은 문명과 현대적인 삶의 열매를 즐길 수 있게 되었지!\n\n우리가 정복했던 모든 종족들, 특히 플러션의 모든 종족들은 우리 제국과 카이저의 빛나는 왕관을 장식할 진주로 다듬어질 돌과 같다."
 SUBJECT_katzprotektorat:0 "캇첸보호령"
 SUBJECT_DESC_katzprotektorat:0 "캇첸보호령은 캇첸아르티히 제국이 설립한 괴뢰정부의 한 형태입니다. 그들은 사실상 제국의 지역 총독이며 제한된 자치권을 누립니다."
 giga_katzen.020.submit:0 "항복하겠다. 제국에 복종하겠다."
 giga_katzen.020.submit.tooltip:0 "§Y캇첸아르티히 제국§!에게 §Y복종§!을 청할 수 있습니다. 우리의 전쟁은 중지될 것이며 우리는 제한된 자치권을 가지는 특수한 종속국인 §Y캇첸보호령§!이 될 것입니다."
 cant_submit_fto:0 "우리가 플러션 협정기구에 속하지 않는다면 복종할 수 없습니다."
 giga_katzen.0030.name:0 "캇첸아르티히 제국: 복종"
 giga_katzen.0030.desc:0 "그래, 너희의 자치권을 포기하고 우리에게 복종하겠다고?\n물론이지! 카이저께서는 우리의 위대한 문명에 너희 동족을 환영할 것이다.\n\n§Y캇첸보호령이 되어 다음과 같은 효과를 받습니다:§!\n-캇첸과 우리 간의 모든 분쟁이 좋료됩니다.\n-우리 제국은 §Y캇첸보호령 [Root.Capital.GetStarName]§!(이)가 되어 우리의 깃발이 바뀔 것입니다.\n우리가 §Y군체 의식§!이 아니라면, 우리의 지도자는 §Y캇첸 총독§!으로 바뀌어 선거를 하여도 사라지지 않습니다.\n-우리가 가진 모든 영토는 우리의 것으로 유지될 것입니다.\n-우리는 모든 캇첸의 전쟁에 자동적으로 참전할 것입니다.\n카이저를 우리에게 영토를 요구하지 않을 것입니다.\n-§Y군국주의 선호도§!가 +100% 증가합니다.\n-우리는 여전히 전초 기지를 건설할 수 있지만, 전쟁을 선포할 수는 없을 것입니다.\n-우리의 §Y카이저 우호도§!는 만약 §G3 | 우호적임§! 상태보다 낮았을 경우 그 상태로 돌아갑니다.\n-캇첸이 우리의 영토 내에 §Y캇첸 전쟁 주조소§!를 건설할 수 있습니다.\n-캇첸이 우리의 경제를 통제하여, §Y합금 생산량§! -25%, §Y함대 수용력§! -50%, 그리고§Y함선 건조 속도§! -20% 상태가 될 것입니다.\n-그러나 그들의 군사 전문가가 우리를 보조하여, §Y함선 발사 속도§! +25%, §Y함선 속도§! +25%, §Y함선 무기 피해량§! +25%, §Y공학 프로젝트 속도§! +25%를 얻습니다.\n-우리는 캇첸이 현재 소유한 모든 기술의 비용에이-40% 감소합니다.\n-우리의 모든 종속국 또한 캇첸보호령이 됩니다.\n-제국의 모든 대사관이 소환됩니다.\n-캇첸은 우리를 병합하지 §Y않을 것입니다§!\n\n§R우리 국가에 대한 캇첸의 통제력이 크기 때문에, 우리는 카이저 위성이 파괴될 때에만 자유로워질 수 있습니다!\n\n우리는 더 이상 파르티잔과 연락하거나 카이저 위성에 대해 연구할 수 없습니다!\n\n기술적인 한계로, 우리가 자유로워진다 하더라도 우리 과거의 깃발을 되찾을 수는 없습니다.§!"
 giga_katzen.0030.yes:0 "아주 좋다. 받아들이지."
 giga_katzen.0030.no:0 "다시 생각해보지... 안 돼!"
 giga_katzen.0031.name:0 "§Y캇첸보호령 [Root.Capital.GetStarName]§!의 탄생"
 giga_katzen.0031.desc:0 "오늘은 누군가에게는 환상적인 날이며, 또 누군가에게는 두려운 항복으로 여겨질 것입니다.\n\n사실상 우리의 제국은 §Y캇첸아르티히 제국§!에 굴복하였고, 공식적으로 §Y캇첸보호령§!이 되었습니다. 캇첸은 이제 우리 경제를 통제하고 우리의 기반 시설을 사용해 그들의 확장주의적 정책을 부채질 할 것입니다.\n\n§Y캇첸 총독§!이 우리 국가의 지도자가 되었고, 그는 우리 종족과 캇첸들의 협력을 이끌 것입니다. 이것은 우리를 그들의 의지에 묶어놓은 것은 사실이지만, 우리는 이제 더 좋든 더 나쁘든 그들의 절대적인 보호 아래에서 안심할 수 있습니다.\n\n§Y카이저§!는 의기양양한 연설을 했고, 이 \"종족간 협력의 놀라운 위업\"이라 찬사했습니다. 그리고 그는 우리 종족이 \"시간이 끝날 때까지 함께하기를\"이라며 그의 소망을 밝혔습니다."
 giga_katzen.0031.a:0 "좋은 선택이었기를 바라지."
 katzprotektorat_modifier:0 "캇첸보호령"
 katzprotektorat_modifier_desc:0 "우리는 캇첸보호령으로 제한된 자치권을 지닌 괴뢰 국가입니다."
 giga_katzen.0033.name:0 "기회"
 giga_katzen.0033.desc:0 "§Y카이저 위성§!이 파괴되자, §Y캇첸아르티히 제국§!은 혼란에 빠졌습니다.\n\n우리는 이를 이용해 §Y캇첸보호령§! 상태에서 빠져나와서 사실상 캇첸 치하로부터 자유로워질 수 있습니다."
 giga_katzen.0033.a:0 "작별이다, 고양이들아!"
 giga_katzen.0033.a.tooltip:0 "우리는 §Y자유§!가 되고 §Y캇첸아르티히 제국§!에게 §R전쟁을 선포§!할 것입니다."
 giga_katzen.0033.b:0 "우리의 충성은 제국과 황제에게 있다!"
 giga_katzen.0033.b.tooltip:0 "당분간 우리는 캇첸의 충신으로 남을 것입니다..."
 giga_katzen.0034.name:0 "캇첸 총독"
 giga_katzen.0034.desc:0 "우리의 새로운 독립과 함께, 우리의 지도자인 [Root.GetRulerName]의 적법성은 우리가 더 이상 캇첸의 지배를 받지 않기 때문에... 이상해졌습니다.\n\n우리가 [Root.leader.GetHerHim](을)를 해임시키고 본래대로 우리 제국의 지도자로 [Root.GetSpeciesName](을)를 임명해야 할까요?"
 giga_katzen.0034.a:0 "저리 가라, [Root.leader.GetSheHe]!"
 giga_katzen.0034.b:0 "[Root.GetRulerName](은)는 우리를 위해 잘 일해주었다. 그들은 우리의 지도자로 남을 것이다."
 giga_katzen.0035.name:0 "국기에 뭐가 있지?"
 giga_katzen.0035.desc:0 "캇첸은 §Y캇첸보호령§!으로서의 우리 지위를 잘 반영하기위해 우리의 국기를 바꾸었습니다. 이제 우리가 다시 한 번 독립했으니, 과거의 국기를 되돌려놓아야할까요?"
 giga_katzen.0035.a:0 "당연하지!"
 giga_katzen.0035.b:0 "아니다, 요즘은 캇첸 블루가 유행이지!"
 giga_katzen.020.attache:0 "우리의 외교 사절을 보내려 합니다."
 giga_katzen.020.attache.tooltip:0 "§Y캇첸아르티히 제국§!에게 사절을 보내는 것은 우리의 §Y외교 가중치§!와 §Y사회학 연구§!, 그리고 §Y통합력 생산량§!을 감소시킬 것이지만, 우리에 대한 §Y카이저의 우호도§!를 높이기에 더 쉬워질 것입니다."
 giga_katzen.5000.name:0 "외교 사절"
 giga_katzen.5000.desc:0 "카이저는 너희 종족이 우리 제국에 외교 사절을 보낸다면 아주 고마워할 것이다! 사절은 우리 둘 모두에게 분명한 이익이 될 것이다.\n\n§Y우리에 대한 카이저의 우호도를 개선하는데 자원을 투자할 것이기 때문에, 사절을 보내면 다음과 같은 효과를 얻습니다: §!\n-§Y사회학 연구 생산량§! 30%\n-§Y통합력 생산량§! 30%\n-§Y외교 가중치§! 30%\n매년 20%의 확률로 §Y카이자의 우호도§!가 §B상승§!합니다.\n거래 협정, 토지 요구, 그리고 함선 구매는 §Y카이저의 우호도§!를 §B상승§!시킬 확률이 25% 더 높습니다."
 giga_katzen.5000.a:0 "사절을 보내라."
 giga_katzen.5000.a.tooltip:0 "우리는 §Y캇첸아르티히 제국§!에 사절을 보내고 앞서 말한 효과가 적용될 것입니다. 우리는 언제든지 사절을 소환할 수 있으며, 카이저와의 §R전쟁§!을 하게 된다면 자동적으로 소환될 것입니다."
 giga_katzen.5000.b:0 "아무것도 아니다."
 giga_katzen.020.noattache:0 "우리의 사절을 소환하고 싶다"
 giga_katzen.020.noattache.response:0 "그런가? 안타깝군. 그리울 것이다."
 giga_katzen.020.noattache.tooltip:0 "우리는 우리의 사절을 소환할 것이며 모든 이익과 불이익이 제거될 것입니다."
 giga_katzen.5001.name:0 "사절 소환됨"
 giga_katzen.5001.desc:0 "§Y캇첸아르티히 제국§!과 우리 사이의 전쟁이 발발함에 따라, 우리의 외교 사절이 우리 제국으로 소환되었습니다."
 giga_katzen.5001.a:0 "예상하던 대로였다."
 giga_katzen.5002.name:0 "카이저의 우호도 상승!"
 giga_katzen.5002.desc:0 "멋진 소식입니다! §Y캇첸아르티히 제국§!에 있는 우리 사절이 그들의 노력이 성공적이였고, 우리에 대한 §Y카이저의 우호도§!가 상승했다고 보고했습니다.\n\n이로 인해 캇첸과의 분쟁을 피하고 싶어하는 자들이 크게 만족하였습니다..."
 giga_katzen.5002.a:0 "좋았어!"
 giga_katzen.5002.a.tooltip:0 "우리에 대한 §Y카이저의 우호도§!가 §G1§! §B증가§!했습니다."
 attache_boost_chance:0 "\n\n§Y캇첸아르티히 제국§!에 우리의 §Y사절§!이 있다면, §Y카이저의 우호도§!가 증가할 확률이 §Y20%§! 증가합니다.\n"
 katzen_attache:0 "캇첸 사절"
 katzen_attache_desc:0 "우리는 캇첸아르티히 제국 내의 대규모 외교 임무에 상당한 양의 자원을 투자하고 있습니다."
 corrona_defence_buff:0 "신비로운 에너지장"
 corrona_defence_buff_desc:0 "알 수 없는 에너지 폭풍이 행성 전체에 퍼져있습니다. 기존의 모든 기술의 사용을 완전히 막는 것으로 보이며, 실질적으로 행성 침공을 불가능하게 만듭니다. 놀랍게도, 원주민의 문명은 그들이 우리와 근본적으로 다른 기술을 사용하기 때문에, 그 영향을 받지 않는 듯 합니다.\n\n§Y행성의 방위군은 극도로 강력합니다. 행성에 착륙하면 우리의 기술 대부분의 사용이 막힐 것이기 때문입니다."
 corrona:0 "코로니안"
 corrona_army:0 "신비로운 원시 군대"
 corrona_army_plural:0 "신비로운 원시 군대"
 corrona_army_desc:0 "원시 군대는 마법과 유사한 특별한 능력과 함께 중세의 무기를 사용합니다."
 giga_corrona_age:0 "신비로운 중세 시대"
 giga_corrona_age_desc:0 "이 문명은 전기나 연소 기관을 가지고 있지 않지만, 그럼에도 불구하고 우리가 묘사하는 마법과 굉장히 흡사한 다양하고도 신비로운 도구와 무기를 사용하고 있습니다. 이 행성의 거주자들은 사실상 완전히 다르고 특이한 기술의 발전을 겪고 있는 것 같습니다."
 col_giga_pre_ftl_corrona:0 "$giga_corrona_age$"
 col_giga_pre_ftl_corrona_desc:0 "$col_primitive_desc$"
 katzenartig_major_splinter:0 "주요 분열 국가 자원"
 katzenartig_major_splinter_desc:0 "재앙과 같은 몰락을 방지하기 위해서입니다."
 building_giga_corrona_capital:0 "신비로운 궁전"
 building_giga_corrona_capital_desc:0 "코로나의 지배 권력 집단의 자리 역할을 하는 거대한 궁전입니다. 마법으로 보이는 능력을 다수 가진 다양한 환상적인 생명체들로 가득합니다."
 building_giga_corrona_homes:0 "신비로운 도심지"
 building_giga_corrona_homes_desc:0 "처음 보았을 때, 단순한 중세 시대의 거주지로 보였으나, 이 도시를 가득 채운 다양한 생명체는 일종의 \"마법\"을 사용하여 자신들의 생활을 매일같이 개선합니다."
 giga_corrona.001.name:0 "중력적인 얽매임"
 giga_corrona.001.desc:0 "§Y유피투 성계§!에 들어가자마자, 우리의 과학선이 흥미로운 것을 발견하였습니다. 이 성계는 사실 제대로된 항성계가 아닙니다!\n\n독립적인 성계로 보이지만, 유피투 갈색 왜성은 사실 근처의 §Y유블리오 성계§!에 중력적으로 얽매여있으며, 비록 공전 주기가 수억 년을 넘기는 하지만 천천히 그 주위를 돌고 있습니다. \n\n이는 유블리오와 유피투가 극도로 먼 쌍성으로 분류될 수 있음을 의미합니다. 비록 이것이 획기적인 발견은 아니지만, 가까스로 두 곳 사이의 초공간 항로를 형성했다는 사실은 우리 과학자들의 특별한 관심사와는 무관합니다."
 giga_corrona.001.a:0 "좋군. 물론 이 두 성계는 전혀 중요하지 않을 것이다."
 giga_corrona.002.name:0 "신비로운 원시인들"
 giga_corrona.002.desc:0 "§Y유피투 성계§!는 우리를 끊임없이 놀래킵니다. 우리의 과학팀이 갈색 왜성의 위성 중 한 곳에 번영한 문명을 발견했다고 보고했습니다.\n\n이는 과학자들을 상당히 어이없게 했는데, 유피투는 그 대기에 이상하게 농도가 높은 방사능 물질이 있어 특히나 따뜻하지만, 행성을 거주 가능한 수준까지 따뜻하게 만들 수는 없기 때문입니다.\n\n더욱이, 행성의 다양한 원시 국가는 우리의 물리학에 대한 현재의 이해를 거스르는, 극히 신비로운 능력을 지니고 사용하는 듯 합니다. 사실상 마법입니다! 심지어 그들은 현대 기술의 전부는 아닐지라도 대부분을 무력화 시키고 태워버리는 불가해한 에너지 폭풍을 만들어냈습니다. 이 에너지 장이 어떻게든 이 행성을 따뜻하게 유지하는 역할을 한다고 추측됩니다.\n\n이는, 원시인들의 근본적으로는 마법인 것의 사용에 더하여서 탐험과 정복 둘 모두를 극도로 어렵게 만들 것이지만, 이 세계의 과학적 잠재력은 부정할 수 없습니다. 다른 한편, 이 원시인들이 뭉쳐서 별을 향한다면 의심할 여지 없이 강력한 적이 될 지도 모릅니다..."
 giga_corrona.002.a:0 "멋지군!"
 giga_corrona_planetcraft:0 "신비로운 요새 행성"
 giga_corrona_planetcraft_plural:0 "신비로운 요새 행성"
 CORRONA_MOON:0 "핵"
 GIGA_CORRONA_FIRE_MAGES:0 "코로니아 주문술사"
 GIGA_CORRONA_FIRE_MAGES_DESC:0 "우주의 적에게 치명적인 주문을 사용하는 위협적인 마법사입니다."
 GIGA_CORRONA_LIGHTNING:0 "초결정 번개"
 GIGA_CORRONA_LIGHTNING_DESC:0 "엄청난 양의 마법 번개를 내뿜은 거대한 수정입니다."
 GIGA_CORRONA_HYPER_LIGHTNING:0 "행성급 번개"
 GIGA_CORRONA_HYPER_LIGHTNING_DESC:0 "정말 정말 거대한 번개를 발사하는 정말 정말 거대한 수정입니다."
 GIGA_CORRONA_FREEZERAYS:0 "빙결광선"
 GIGA_CORRONA_FREEZERAYS_DESC:0 "보호막의 에너지를 흡수하고 녹여서 통과하는 음의 에너지 광선입니다."
 GIGA_CORRONA_DRAGON_BREATH:0 "용의 숨결"
 GIGA_CORRONA_DRAGON_BREATH_DESC:0 "마법이 깃든 용의 불줄기입니다."
 giga_corrona_dragon:0 "코로니아의 용"
 giga_corrona_dragon_plural:0 "코로니아의 용"
 giga_corrona.005.name:0 "신비로운 에너지 급증"
 giga_corrona.005.desc:0 "우리 제국에 걸쳐 설치된 감지기가 강력한 에너지의 급증을 감지했습니다. 이는 §Y캇첸아르티히 제국§!의 수도 성계에서 일 광년도 안되는 거리의 §Y유피투§! 갈색 왜성을 공전하는 §Y코로나§!의 원시 세계에서 발생했습니다.\n\n이 행성은 놀랍고 아직 설명할 수 없는 신비로운 능력, 사실상 마법으로 간주되는 능력을 지닌 종족이 거주하고 있다고 알려져있습니다.\n\n이 갑작스러운 급증의 원인은 확실하지 않으나, 이에 대한 가장 가능성 있는 해석은 코로니아가 그들의 행성 전체에 거대한 \"주문\"의 일종을 사용하기 위해 다 함께 \"마법 능력\"을 모은 것이 아닌가 하는 것입니다.\n\n이 \"주문\"이 정확히 무엇인지는 보지 못했으나, 곧 알 수 있을 듯 합니다..."
 giga_corrona.005.a:0 "특이하군."
 giga_corrona.007.name:0 "코로니아의 요새 세계"
 giga_corrona.007.desc:0 "코로니아의 에너지 급증의 원인을 찾는데 그리 오래 걸리지 않았습니다. 기록 직후, 우리의 장거리 감지기가 §Y유피투§! 성계에서 §Y천체적 움직임§!을 감지했습니다.\n\n성계에 대한 더 자세한 조사로, §Y코로나§!의 다수 종족 중 하나인 §Y해골 종족§!이 일련의 야만적인 전쟁의 결과로, 행성 전체를 그들의 지배 하에 통일하는데 성공했음이 밝혀졌습니다. 현재의 승리에 만족하지 못한 그들은 행성 전체에 거대하고 극도로 복잡한 \"주문\"을 사용하기 위해 행성의 자원을 모으기 시작했습니다.\n\n이 \"주문\"은 코로나 전체에 마법을 걸었고, 결과적으로 행성을 거대한 §Y난해한 요새 행성§!, 즉 §Y월드크래프트§!로 바꾸었습니다. 난해한 통달의 엄청난 위업으로, 해골 종족 지도자의 의지에 따라, 행성 자체가 공허를 향해 움직이기 시작했습니다.\n\n또한 에테르 드래곤 같은 생명체 무리를 뿌려 세계를 호위하도록 하였습니다. 이 난해한 문명이 이제 천상계에서의 완전히 새로운 정복을 하려는 듯 하며, 그들의 첫 목표는 다름 아닌 §Y캇첸아르티히 제국§!입니다.\n\n더구나, 그 해골 종족이 전 은하를 향해 말을 전했습니다..."
 giga_corrona.007.a:0 "말도 안 돼!"
 giga_corrona.008.name:0 "코로니아 마법 주의 국가"
 giga_corrona.008.desc:0 "천상계의 주민들아!\n\n우리 §Y해골 종족§!이 마침내 우리의 세계를 통합하였고, 이제 우리는 별을 향할 것이다. 우리는 위대한 §Y요새 세계§!를 승리로 이끌것이며, 우리는 천국에서 제국을 건설할 것이다.\n\n우리의 첫 번째 목표는 다름아닌 우리의 야망을 가로막는 비열한 고양이 §Y캇첸아르티히 제국§!일 것이며,  카이저와 그들의 조잡한 \"기술\" 아래에 숨어있는 겁쟁이 캇첸들을 지옥의 불길로 쓰러트릴 것이다.\n\n우리에게 저항하려 하지마라. 우리의 요새 세계가 너희의 열등한 \"기술\"을 사용한 모든 저항을 쓸어버릴 것이다."
 giga_corrona.008.a:0 "그래, 또다른 과대 망상 제국이군..."
 giga_corrona.008.a.tooltip:0 "§Y코로니아 마법 주의 국가§!가 §Y유피투§! 성계에 나타났으며, §Y캇첸아르티히 제국§!과 교전 상태에 들어갈 것입니다. 카이저가 쓰러지면 다음은 우리에게 올 것입니다..."
 giga_corrona.020.name:0 "코로니아의 요새 세계 파괴"
 giga_corrona.020.desc:0 "매우 격렬한 우주 전투 이후, 우리의 군대가 우주를 정복하려는 시도로 사용된 신비로운 행성 요새인 §Y코로니아 요새 세계§!를 성공적으로 파괴했습니다.\n\n코로니아의 주문은 엄청난 양의 무기에 당한 함선을 보호하고 수리하기엔 모자랐습니다. 그 함선은 내부의 에너지를 제대로 억제하지 못하였고, 에너지가 행성의 표면에 넘쳤습니다.\n\n결과적으로 요새 세계가 완전히 붕괴하기 시작했고, 자신의 난해하고도 치명적인 에너지로 인해 산산히 부서졌습니다.\n\n희미한 에너지 폭풍만은 조금 남긴채 함선은 사라졌으며, 남아있던 모든 코로니아 함선은 우주의 진공으로부터 그들을 보호해주던 코로니아 마법이 끊어져 소멸하였습니다."
 giga_corrona.020.a:0 "시원하군."
 giga_corrona.021.name:0 "코로니아의 요새 세계 파괴"
 giga_corrona.021.desc:0 "매우 격렬한 우주 전투 이후, §Y[corrona_moon_slayer.GetName]§!의 군대가 우주를 정복하려는 시도로 사용된 신비로운 행성 요새인 §Y코로니아 요새 세계§!를 성공적으로 파괴했습니다.\n\n코로니아의 주문은 엄청난 양의 무기에 당한 함선을 보호하고 수리하기엔 모자랐습니다. 그 함선은 내부의 에너지를 제대로 억제하지 못하였고, 에너지가 행성의 표면에 넘쳤습니다.\n\n결과적으로 요새 세계가 완전히 붕괴하기 시작했고, 자신의 난해하고도 치명적인 에너지로 인해 산산히 부서졌습니다.\n\n희미한 에너지 폭풍만은 조금 남긴채 함선은 사라졌으며, 남아있던 모든 코로니아 함선은 우주의 진공으로부터 그들을 보호해주던 코로니아 마법이 끊어져 소멸하였습니다."
 giga_corrona.021.a:0 "끝이 났군."
 giga_corrona.022.name:0 "캇첸이 코로니아의 요새 세계를 파괴하다"
 giga_corrona.022.desc:0 "매우 격렬한 우주 전투 이후, §Y[corrona_moon_slayer.GetName]§!의 군대가 우주를 정복하려는 시도로 사용된 난해한 행성 요새인 §Y코로니아 요새 세계§!를 성공적으로 파괴했습니다.\n\n코로니아의 주문은 엄청난 양의 무기에 당한 함선을 보호하고 수리하기엔 모자랐습니다. 그 함선은 내부의 에너지를 제대로 억제하지 못하였고, 에너지가 행성의 표면에 넘쳤습니다.\n\n결과적으로 요새 세계가 완전히 붕괴하기 시작했고, 자신의 난해하고도 치명적인 에너지로 인해 산산히 부서졌습니다.\n\n희미한 에너지 폭풍만은 조금 남긴채 함선은 사라졌으며, 남아있던 모든 코로니아 함선은 우주의 진공으로부터 그들을 보호해주던 코로니아 마법이 끊어져 소멸하였습니다.\n\n심지어 신비로운 코로니아의 마법조차도 캇첸 군사 기계를 막기엔 충분하지 못했던 듯 하며, 카이저가 수십억의 국민들 앞에서 외치며 기념했습니다. \"이 야만적이고 원시 존재들에 대한 캇첸 기술과 연구심의 승리다."
 giga_corrona.022.a:0 "캇첸이 또 다른 적을 무찔렀군..."
 giga_katrebels.0001.name:0 "분열된 고양이들"
 giga_katrebels.0001.desc:0 "§Y캇첸아르티히 제국이§! 은하적 수준에 도달한지 수 년이 지났고, 의심의 여지 없이 엄청난 적으로 보입니다. 적어도 외부에서는 말입니다.\n\n흥미롭게도, 최근의 외교 및 첩보 임무에 따르면, 대부분의 제국민이 §Y카이저§!의 통치를 마음에 들어한다고 합니다. 대부분이긴 하지만, 전부는 아니죠. 사실, §Y플러션§!은 가지각색의 행성으로, 카이저의 통치하에 통일되기 전에는 각각 특유한 지역 문화와 삶의 방식이 있던 적어도 12개의 다른 나라의 고향이었습니다.\n\n그들 중 대부분은 지배적인 캇첸 문화로 사라지거나 동화되었지만, 플러션과 그 후손의 종족으로 구성된 고립되고 반항적인 집단이 여전히 존재합니다. 이러한 반항 세력은 그들 조상의 생활방식과 문화를 강하게 옹호하며, 그들을 캇첸 사회로 통합하려는 카이저의 시도에 단호히 반대합니다.\n\n우리는 제국 내에서 다소 중대한 두 개의 저항 세력을 확인하는데 성공했습니다: 과거 §Y솔라키아§!로 알려진 국가의 시민들로 구성된 §Y솔라키아 자유 전사§!와 과거 플러션의 §Y에지크 제국§!의 §Y에지카니아§!로 이루어진 §Y에지카니아 기사단§!입니다.\n\n비록 그 구성원들은 극소수이고 서로 멀리 떨어져있으며 현재 카이저에게는 거의 문제가 되지 않지만, 우리는 그들 중 하나와 비밀리에 접촉하는 것이 캇첸의 위협을 끝내고자하는 우리의 싸움에 도움이 될 수도 있다고 판단했습니다.\n\n§B저항군은 캇첸 제국을 약화시킬 매우 귀중한 자산일 것입니다!"
 giga_katrebels.0001.a:0 "그들과 접촉을 수립해보자."
 giga_katrebels.0001.a.tooltip:0 "우리는 §Y솔라키아 자유 전사§!와 §Y에지카니아 기사단§!이 §Y캇첸아르티히 제국§!을 방해할 수 있도록 돕기 위해, 그들과 접촉하기 위한 §Y특별 프로젝트§!를 시작할 것입니다.\n\n우리는 그들의 투쟁을 지원할 수 있고 제국을 약하게 만들 것이지만, 카이저가 우리의 작전에 대해 알아낸다면, 우리에 대한 §Y카이저의 우호도§!가 §R감소§!할 수 있습니다.\n\n"
 giga_katrebels.0001.b:0 "귀찮은 일을 할 가치가 없다."
 CONTACT_EZIC_REBELS_PROJECT:0 "§Y에지카니아 기사단§!과 접촉하라"
 CONTACT_EZIC_REBELS_PROJECT_DESC:0 "§Y에지카니아§!는 굉장한 종족으로, 그들의 적은 인구수에도 불구하고 캇첸 정예군에서 상당히 많은 비율을 차지합니다.\n\n비록 그들 대부분이 카이저의 지배에 순종적이지만, 그들 중 많은 수는 카이저의 정책에 동의하지 않고, 그들의 놀라운 전투 능력은 소수의 헌신적인 게릴라 대원으로도 §Y캇첸아르티히 제국§!에서 대혼란을 야기할 수 있다는 것을 의미합니다."
 CONTACT_SOLAK_REBELS_PROJECT:0 "§Y솔라키아 자유 전사§!와 접촉하라"
 CONTACT_SOLAK_REBELS_PROJECT_DESC:0 "§Y솔라키아인§!은 §Y카이저§!의 지구적인 정복 이전, §Y플러션§!에서 가장 독자적이며 민주적이고 자유로운 사람들 중 하나였습니다.\n\n그들은 대부분 캇첸의 사회 안에 잘 녹아들었습니다만, 과거의 §Y솔라키아 공화국§!의 영혼이 여전히 몇몇에게 살아 숨쉬고 있습니다. 그것을 밀어준다면 분명히 카이저가 수립한 권력을 혼란스럽게 만드는데 일조할 것입니다."
 giga_katrebels.0010.name:0 "§Y에지카니아 기사단§!과의 통신 연결"
 giga_katrebels.0010.desc:0 "비밀 작전과 비밀 회의, 그리고 부정 거래의 수 개월이 지나고, 우리는 §Y에지카니아 기사단§!의 우두머리이자 과거 §Y에지카니아 제국§!의 지도자였던 §Y로우프§!와의 접촉을 공식적으로 수립했습니다.\n\n더 깊은 연구를 통해, 이 기사단이 카이저의 군대에 굴복하기 전, 제국에서 평화 유지군이었음이 밝혀졌습니다. 그 후 그들은 일종의 \"망명 정부\"로 활동하면서 캇첸 통치에 저항하는 잔존 에지카니아 레지스탕스를 조직하였습니다.\n\n비록 그들이 현재는 강력한 힘을 가지고 있지 않지만, 실제로 카이저를 위협하는 존재가 되기 위해서는 약간의 지원만 있으면 됩니다. 그렇기에 그들은 우리와의 연락을 상당히 열망하고 있습니다..."
 giga_katrebels.0010.a:0 "화면에 띄워라."
 giga_katrebels.0011.name:0 "§Y에지카니아 기사단§!"
 giga_katrebels.0011.desc:0 "마침내, 신이 우리를 축복하시는 것 같군.\n\n반갑습니다, 우주 여행자분들이여. 제 이름은 §Y로우프 케레리스 혼스펠트§!입니다. 에지카니아 제국의 지도자... 였습니다. 그 비열한 카이저가 우리에게서 모든 것을 앗아가기 전까지는 말입니다. 우리의 문화, 삶의 방식, 비옥한 땅을 말입니다...\n\n우리가 한때 소중히 여겼던 모든 것이 그의 사나운 군국주의와 산업화의 어리석은 물결에 휩쓸렸습니다. 카이저가 그에 대한 숭배를 수십억 명의 사람들에게 강요함에 따라, 우리에게 충성을 바치는 에지카니아인들의 수는 매일 서서히 줄어들고 있습니다.\n\n더 이상은 참을 수 없습니다! 우리 에지카니아인들은 여러분의 도움으로, 이 과대망상증에 걸린 고양이들을 타도하고 마침내 플러션과 은하에 평화를 되찾을 수 있기를 바랍니다..."
 giga_katrebels.0011.a:0 "우리도 그러길 바란다. 우리가 무엇을 할 수 있는지 보지..."
 giga_katrebels.0011.a.tooltip:0 "이제 §Y캇첸아르티히 제국 메뉴§!를 통해서 §Y에지카니아 기사단§!과 §Y비밀 연락§!을 할 수 있습니다."
 giga_katrebels.0012.bye:0 "안녕히."
 giga_katrebels.0013.back:0 "다른 것에 대해 이야기하고 싶다..."
 giga_katzen.020.ezics:0 "§H§Y에지카니아 기사단§!과 비밀 연락을 하라...§!"
 cant_ezic_revolt_ongoing:0 "에지카니아인들이 반란을 일으켰습니다!"
 opinion_helped_us_revolt_from_katzen:0 "우리의 반란을 지원함"
 opinion_anti_katzen_partisans:0 "반-카이저 반란"
 giga_katrebels.0012.name:0 "§Y에지카니아 기사단§!"
 giga_katrebels.0012.low.a:0 "카이저를 멈춰야만 합니다. 하지만 슬프게도 그의 영향력을 멀리 퍼트리고 있기 때문에, 우리만으로는 불가능합니다."
 giga_katrebels.0012.low.b:0 "캇첸에게 신성한 것은 없습니다. 그들은 무자비하게 땅을 확장하고 산업화하여 그곳에 사는 모든 이를 해칩니다. 만약 우리가 그들을 막지 못한다면, 은하계 전체가 곧 캇첸의 발 앞에 무너질 지도 모릅니다."
 giga_katrebels.0012.low.c:0 "어제는 우리였고, 내일은 여러분일지도 모릅니다."
 giga_katrebels.0012.mid.a:0 "우리는 더 많은 노력을 기울이고 있습니다. 제국 전역에서, 에지카니아 군집이 캇첸을 상대로 작전을 펼치고 있습니다. 그러나, 이것으로 카이저의 통치를 영원히 끝낼 수 있을지는 아직 확신하지 못하겠습니다..."
 giga_katrebels.0012.mid.b:0 "우리의 노력이 언젠가 보답받아 이 은하가 카이저로부터 자유로워질 날을 고대하고 있습니다."
 giga_katrebels.0012.mid.c:0 "함께라면, 우리들은 미래를 평화와 번영으로 만들수 있을지도 모릅니다."
 giga_katrebels.0012.high.a:0 "에지카이아인들이 사방에서 반란을 일으키기 시작했습니다! 제 종족이 마침내 카이저의 사악한 권력에 대항해 충격을 줄 수 있습니다. 곧 우리 모두가 자유로워질 것입니다. 그러나 아직은 해야할 일이 너무 많습니다."
 giga_katrebels.0012.high.b:0 "카이저의 목숨은 얼마 남지 않았습니다."
 giga_katrebels.0012.high.c:0 "비록 우리가 유리한 상황이지만, 결코 방심해서는 안됩니다. 우리 종족이 용감하고 강력할지는 모르지만, 카이저는 다양한... 어... 수단을 가지고 있을지도 모릅니다. 어쨌거나, 우리는 해낼 수 있습니다!"
 giga_katrebels.ezic.none:0 "§Y에지카니아 저항군 병력§!: 0|미미함"
 giga_katrebels.ezic.low:0 "§Y에지카니아 저항군 병력§!: 1|낮음"
 giga_katrebels.ezic.moderate:0 "§Y에지카니아 저항군 병력§!: 2|보통"
 giga_katrebels.ezic.significant:0 "§Y에지카니아 저항군 병력§!: 3|상당함"
 giga_katrebels.ezic.high:0 "§YY에지카니아 저항군 병력§!: 4|높음"
 giga_katrebels.ezic.critical:0 "§Y에지카니아 저항군 병력§!: 5|치명적!"
 giga_katrebels.ezic.revolt:0 "§YY에지카니아 저항군 병력§!: 6|반란 중!"
 giga_katrebels.ezic.none.tooltip:0 "대다수의 에지카니아인들은 카이저에게 순종적입니다.\n\n§R캇첸 불이익:§!\n§Y없음.§!"
 giga_katrebels.ezic.low.tooltip:0 "일부 고립된 에지카니아 단체가 캇첸 군사 기구에 혼란을 주기 위해 소규모 작전을 진행 중입니다.\n\n§R캇첸 불이익:§!\n§Y발사 속도 -5%§!"
 giga_katrebels.ezic.moderate.tooltip:0 "제국 전역에서 많은 에지카니아 단체가 협동해 캇첸을 방해하기 위해 협력하자 레지스탕스가 생기기 시작했지만, 여전히 카이저가 유리한 상황입니다.\n\n§R캇첸 불이익:§!\n§Y발사 속도-7.5%\n지상군 피해량 -5%§!"
 giga_katrebels.ezic.significant.tooltip:0 "몇몇 행성의 캇첸 당국이 점점 더 많은 수의 에지카니아 게릴라를 보고하고 있습니다. 반-카이저 에지카니아인들이 몇개의 캇첸 군사 함선에 침입하였고 내부로부터 적극적으로 방해하고 있습니다.\n\n§R캇첸 불이익:§!\n§Y발사 속도 -10%\n함선 속도 -10%\n지상군 피해량 -10%\n안정도 -5§!"
 giga_katrebels.ezic.high.tooltip:0 "대부분의 에지카니아인들이 어떤 식으로든 반-카이저 작전에 연루되어 있습니다. 캇첸의 공급망이 모든 단계에서 방해받고 있으며, 그들의 군사적 활동을 방해하고 있습니다.\n\n§R캇첸 불이익:§!\n§Y발사 속도 -20%\n함선 속도 -20%\n지상군 피해량 -15%\n안정도 -10§!"
 giga_katrebels.ezic.critical.tooltip:0 "에지카니아인들이 날뛰고 있습니다! 그들 하나하나가 공공연히 캇첸의 통치에 맞서고 있으며, 다른 종족들도 카이저를 끌어내리기 위해 그들의 대의에 동참하고 있습니다. 제국의 일부에서는 혁명이 일어나기 직전입니다!\n\n§R캇첸 불이익:§!\n§Y발사 속도 -30%\n함선 속도 -40%\n지상군 피해량 -25%\n안정도 -15§!"
 giga_katrebels.ezic.revolt.tooltip:0 "에지카니아인들이 캇첸아르티히 제국에 대항하여 전면적인 반란을 시작했습니다!"
 giga_katrebels.0012.fund:0 "너희의 대의에 기여하길 원한다."
 giga_katrebels.0013.name:0 "§Y에지카니아 기사단§!에게 자금을 제공합니다"
 giga_katrebels.0013.desc:0 "전투 능력에 있어 우리 종족이 모자라는 점은 없지만, 여전히 대부분의 캇첸 군용 차량에 비해 뒤쳐져있습니다. 그리고 카이저는 사방에 눈이 있습니다.\n\n우리에게 약간의 무기와 자금을 준다면 제국 전체에 걸친 우리의 활동에 훌륭한 이익이 될 것입니다.\n\n§Y우리의 행동으로 레지스탕스가 증가할 때마다, §R25%§!의 확률로 카이저가 알아내고 우리에 대한 그의 우호도가 §R감소§!합니다.\n\n기여하는 제국이 많아도 레지스탕스가 증가할 확률이 축적되지는 않습니다!§!"
 giga_katrebels.0013.a:0 "약간 지원할 수 있습니다. | 매월 £energy£ §Y50§!  &  £alloys£ §Y25§!"
 giga_katrebels.0013.a.tooltip:0 "이 만큼 지원한다면, 매년 §Y10%§!의 확률로 §Y에지카니아 레지스탕스§!가 §G증가§!합니다."
 giga_katrebels.0013.b:0 "무기와 자금을 줄 수 있습니다. | 매월 £energy£ §Y150§!  &  £alloys£ §Y50§!"
 giga_katrebels.0013.b.tooltip:0 "이 만큼 지원한다면, 매년 §Y20%§!의 확률로 §Y에지카니아 레지스탕스§!가 §G증가§!합니다."
 giga_katrebels.0013.c:0 "줄 수 있는 전부를 줄 것입니다! | 매월 £energy£ §Y300§!  &  £alloys£ §Y150§!"
 giga_katrebels.0013.c.tooltip:0 "이 만큼 지원한다면, 매년 §Y50%§!의 확률로 §Y에지카니아 레지스탕스§!가 §G증가§!합니다."
 giga_katrebels.0013.d:0 "우리의 지원을 취소해라."
 giga_katrebels.0013.a.response:0 "이는 카이저로부터 은하를 해방하기 위한 우리의 투쟁에 큰 도움이 될 것입니다! 신의 가호가 있기를."
 giga_katrebels.0013.d.response:0 "안타깝습니다. 이제 스스로 헤쳐나가야 할 것 같군요..."
 contributing_ezic_1:0 "에지카니아 기사단을 조금 지원 중"
 contributing_ezic_1_desc:0 "우리는 에지카니아 기사단을 지원 중이며 카이저에 맞서 싸우기 위한 무기를 제공하고 있습니다."
 contributing_ezic_2:0 "에지카니아 기사단을 지원 중"
 contributing_ezic_2_desc:0 "우리는 에지카니아 기사단을 지원 중이며 카이저에 맞서 싸우기 위한 무기를 제공하고 있습니다."
 contributing_ezic_3:0 "에지카니아 기사단을 대폭 지원 중"
 contributing_ezic_3_desc:0 "우리는 에지카니아 기사단을 지원 중이며 카이저에 맞서 싸우기 위한 무기를 제공하고 있습니다."
 giga_katrebels.0101.name:0 "에지카니아 레지스탕스 증가!"
 giga_katrebels.0101.desc:0 "다른 제국의 지원으로 §Y캇첸아르티히 제국§!의 §Y에지카니아 레지스탕스§!가 증가하였습니다!\n\n캇첸은 더 큰 불이익을 받을 것이며 그들의 전쟁 작업이 지체될 것입니다."
 giga_katrebels.0101.a:0 "멋지군!"
 giga_katrebels.ezic.increase:0 "§Y에지카니아 레지스탕스§!가 §Y1§! §G증가§!했습니다."
 giga_katrebels.0102.name:0 "에지카니아 레지스탕스 감소"
 giga_katrebels.0102.desc:0 "지원을 받지 못하여,§Y캇첸아르티히 제국§!의 §Y에지카니아 레지스탕스§!가 자연적으로 감소했습니다.\n\n캇첸이 카이저에 대항하는 §Y에지카니아 기사단§!의 활동 능력을 줄이는 수많은 작전을 수행했습니다. 그들의 군사 작업에 대한 불이익이 줄어듭니다."
 giga_katrebels.0102.a:0 "안타깝군."
 giga_katrebels.ezic.decreases:0 "§Y에지카니아 레지스탕스§!가 §Y1§! 만큼 §R감소§!했습니다."
 giga_katrebels.0103.name:0 "카이자가 우리의 작전을 알아차리다!"
 giga_katrebels.0103.desc:0 "걱정스러운 소식입니다! §Y카이저§!가 최근 게릴라와의 결탁과, 반-캇첸 레지스탕스의 급증에 대한 개입에 대해 알아차렸습니다!\n\n그는 최근의 연설에서 우리 제국을 공개적으로 비판하였고 뒤이어 그의 §Y우리에 대한 우호도§!가 §R감소§!했습니다."
 giga_katrebels.0103.a:0 "비열한 쥐새끼!"
 cant_recent_ezic_operation:0 "에지카니아인들이 이미 최근에 작전을 진행하였습니다. 그들은 6 개월에 한 번씩만 할 수 있습니다."
 ezic_revolution_already_ongoing:0 "이미 혁명이 진행 중입니다."
 giga_katrebels.0012.ezicrevolt:0 "§H에지카니아 반란 촉발§!"
 giga_katrebels.0012.ezicrevolt.tooltip:0 "때가 됐습니다. 에지카니아 레지스탕스가 사상 최대치인 지금, 우리는 그들을 지원하여 캇첸아르티히 제국 내부에서 전면적인 반란을 시작해야합니다.\n\n이는 §Y캇첸아르티히 제국§! 내에서 §Y반란국§!을 만들 것이며, 이들은 즉시 캇첸에게 §R전쟁을 선포§!할 것입니다."
 need_ezic_resistance_5:0 "§Y에지카니아 레지스탕스 병력§!이 §G5§! 필요합니다."
 giga_katrebels.0017.name:0 "에지카니아의 반란"
 giga_katrebels.0017.desc:0 "좋습니다! 에지카니아 레지스탕스가 카이저의 제국을 내부로부터 망가뜨리고 있으므로, 이제 무기를 들고 마침내 이 하찮은 왕국에서 벗어날 때가 왔습니다. 우리 동족의 수가 많지 않으므로 상당히 많은 외부 지원을 필요로 할 것이고, 작전이 성공할 만큼 충분한 캇첸 우주선을 장악하는 것은 어려운 일일 것입니다.\n그러나 우리가 해낸다면, 마침내 우리는 이 은하계에서 카이저라는 오점을 지울 수 있을 것입니다.\n\n§Y이는 무슨 일이 일어나든 카이저를 §R분노§!케 할 것입니다.\n\n쿠데타를 지원하기 위해서는 카이저에 대한 선전포고도 필요할 것 같습니다."
 giga_katrebels.0017.yes:0 "지금이 아니면 안된다. |  £energy£ §Y2500§! & £alloys£ §Y500§!"
 giga_katrebels.0017.yes.tooltip:0 "§Y에지카니아 기사단§!이 §Y반란§!을 일으키고 §Y캇첸아르티히 제국§!에서 §Y탈퇴§!하여 §Y반란국§!을 만들 것입니다!\n우리는 반란이 실제로 일어나기 전에 반역의 §Y세력§!을 §G증가§!시키기 위해 기사단에게 더 많은 §Y자원§!을 §Y지원§!할 기회를 얻을 것입니다.\n우리는 반란을 가속하기 위해 £influence£, £energy£ 그리고 £alloys£을 소비해야할 것입니다.\n그들은 반란의 §Y세력§!에 따라 §Y캇첸 행성§!의 §Y10%§!에서 §Y40%§! 사이의 땅을 함락시킬 것입니다."
 giga_katrebels.0017.reponse:0 "끝이 다가왔다... 카이저. 기사단이 그의 빌어먹을 군단에 빠르고 정확한 타격을 날릴 것이다!"
 giga_katrebels.00171.name:0 "에지카니안 반란: 영향력"
 giga_katrebels.00171.desc:0 "반란의 첫 단계로, §Y에지카니아 기사단§!이 반-카이저 선동, 카이저에 대한 공개 비난 그리고 에지카니아의 생활 방식 홍보 등을 통해 제국민들을 그들에게 유리하게 흔드는데 외부 영향력을 사용해 달라 요청했습니다.\n\n당연하게도 이는 카이저를 §R분노§!케 하겠지만, 에지카니아의 대의를 공개적으로 지지하는 외부 제국의 영향은 분명히 제국에서 느껴질 것이고 더 많은 사람들이 그 대의에 참여하도록 설득할 수 있을 것입니다."
 giga_katrebels.00171.no:0 "감당할 수 없군."
 giga_katrebels.00171.a:0 "반-카이저 연설을 조금 해라.| £influence£ §Y50§!"
 giga_katrebels.00171.b:0 "선동을 하여 제국에 퍼뜨려라. | £influence£ §Y150§!"
 giga_katrebels.00171.c:0 "에지카니아에 대한 지지를 공개적으로 선언해라! | £influence£ §Y300§!"
 giga_katrebels.00171.coup.1:0 "§Y에지카니아 반란 세력§!이 조금 증가할 것입니다.\n우리에 대한 §Y카이저의 우호도§!가 §R감소§!합니다."
 giga_katrebels.00171.coup.2:0 "§Y에지카니아 반란 세력§!이 증가할 것입니다.\n우리에 대한 §Y카이저의 우호도§!가 §R감소§!합니다."
 giga_katrebels.00171.coup.3:0 "§Y에지카니아 반란 세력§!이 상당히 증가할 것입니다.\n우리에 대한 §Y카이저의 우호도§!가 §R감소§!합니다."
 giga_katrebels.00172.name:0 "에지카니안 반란: 지원"
 giga_katrebels.00172.desc:0 "§Y에지카니아 기사단§!은 이제 우리에게 더 많은 자금을 지원해 달라고 요청하고 있습니다. 더 발전된 무기를 획득하고 우주선을 구입하고, 가장 중요하게, 계획을 방해하는 모든 관리들에게 뇌물을 주어야하기 때문이라고 합니다.\n\n이것은 일반적인 에지카니아의 방식에 반하는 일이지만, 로우프는 반란이 성공하려면 필요한 일이라고 여깁니다."
 giga_katrebels.00172.no:0 "감당할 수 없군."
 giga_katrebels.00172.a:0 "어느 정도 빌려줄 수 있다. | £energy£ §Y5000§!"
 giga_katrebels.00172.b:0 "우리 금 보유고에서 상당량을 주어라. | £energy£ §Y10000§!"
 giga_katrebels.00172.c:0 "모든 에지카니아인에게 금으로된 우주선을! | £energy£ §Y25000§!"
 giga_katrebels.00171.coup.0:0 "§Y에지카니아 반란 세력§!은 증가하지 않을 것입니다."
 giga_katrebels.00172.coup.1:0 "§Y에지카니아 반란 세력§!이 조금 증가할 것입니다."
 giga_katrebels.00172.coup.2:0 "§Y에지카니아 반란 세력§!이 증가할 것입니다."
 giga_katrebels.00172.coup.3:0 "§Y에지카니아 반란 세력§!이 상당히 증가할 것입니다."
 giga_katrebels.00173.name:0 "에지카니아 반란: 장비"
 giga_katrebels.00173.desc:0 "마지막이지만, 중요한 것입니다. §Y에지카니아 기사단§!이 다가오는 반란을 지원하기 위한 대량의 군사 및 민간 장비를 요청했습니다.\n\n이는 반란에서 가장 비용이 많이 드는 부분일 테지만, 로우프는 이 위대한 투쟁을 위해 기사단을 제대로 갖춰 입히는 것이 절대적으로 중요하다고 단언했습니다."
 giga_katrebels.00173.no:0 "감당할 수 없군."
 giga_katrebels.00173.a:0 "여분의 소총을 주어라. | £alloys£ §Y3500§!"
 giga_katrebels.00173.b:0 "군용 장갑차를 주어도 좋다. | £alloys£ §Y7500§!"
 giga_katrebels.00173.c:0 "최신 군사 장비를 보내라! | £alloys£ §Y12500§!"
 giga_katrebels.00174.name:0 "에지카니아 반란: 준비됨"
 giga_katrebels.00174.desc:0 "이제 §Y에지카니아 반란§!이 일어나기 위한 모든 것이 적소에 있습니다. 머지않아 캇첸아르티히 제국에서 §Y에지카니아 기사단§!의 구성원들이 다른 종족들과 함께 카이저에 대항하여 무기를 들고 일어날 것입니다.\n\n대다수의 캇첸 행성에 있는 에지카니아인들이 행성과 그 성계에 대한 통제권을 장악하기 위해, 지역 행성 수비대를 타도하고 캇첸 함선을 빼앗을 것입니다.\n\n그럼에도 불구하고 이 자료는 에지카니아인들 혼자서는 해내지 못할 것이라는 것을 암시하고 있습니다. 그리고 우리 수뇌부의 몇 인원들은 반란이 일어나자마자 카이저를 공격해 캇첸을 치명적인 양면 전쟁에 가두어야 한다고 조언합니다."
 giga_katrebels.00174.a:0 "이제, 비는 수 밖에 없겠군."
 giga_katrebels.00174.a.tooltip:0 "§Y에지카니아 기사단§!이 반란을 일으켜 캇첸 행성과 그 이웃 성계의 §Y10%§!에서 §Y40%§! 사이를 임의로 장악할 것입니다.\n\n그들은 장악한 영역 내의 모든 §Y캇첸 함선§!과 §Y행성§!(§Y카이저 위성§!과 그 함대는 제외됩니다)에 대한 §Y통제권을 얻어§! 즉시 카이저에 대한 §Y공격§!을 진행할 것입니다."
 giga_katrebels.00176.name:0 "더 이상의 질서는 없다"
 giga_katrebels.00176.desc:0 "같은 삶의 희망을 공유하는 다른 종족들과 함께 결집한 §Y에지카니아 시가단§!이 캇첸 정부에게 전쟁을 선포하였습니다.\n\n적대감이 더 독자적인 정부에서 수 년간 압박을 키워왔고, 마침내 터졌습니다.\n\n군부대의 에지카니아가 기지를 버리고 캇첸 군 물품을 사보타주했다고 하며 몇 시간 뒤, 잘 무장된 에지카니아 반란군이 함선을 탈취하고 지역 행성 방위군을 기습 공격으로 압도하며  §Y캇첸아르티히 제국§!의 영토를 상당히 많이 장악했습니다. 대다수의 캇첸 행성에서 공격이 제지되었지만, 그럼에도 불구하고 에지카니아인들은 다수의 캇첸 성계를 장악하는데 성공했습니다.\n\n그들은 가능한 한 빨리 캇첸에 대항하는데 사용하기 위해 수많은 임시 함선도 훔치고 털었습니다.\n\n결단력 있는 북극의 대장 §Y로우프 케레리스 혼스펠트§!가 변혁을 이끌고 있기 때문에, 이제 되돌이킬 수 없습니다.\n\n이후에 우리가 에지카니아에게 주고 있었던 모든 물질적 지원이 취소되었습니다."
 giga_katrebels.00176.a:0 "카이저는 분명 곤란한 상황에 빠져있을 것이다."
 origin_katzen_splinter:0 "캇첸 분열 국가"
 origin_katzen_splinter_desc:0 "이 국가는 원래 더 큰 §Y캇첸아르티히 제국§!의 일부였으며, §Y플러션§!의 몰락 우히 제국의 괴멸적인 붕괴에 따라 탈퇴하였습니다."
 origin_katzen_rebels:0 "캇첸 반란군"
 origin_katzen_rebels_desc:0 "이 국가는 §Y카이저§!의 그들의 국민에 대한 통치를 종식시키려는 시도로 §Y캇첸아르티히 제국§!으로부터 반란을 일으켰습니다."
 giga_katrebels.00178.name:0 "에지카니아 반란 진압"
 giga_katrebels.00178.desc:0 "§Y에지카니아 기사단§!은 용감하게 싸웠지만 충분하지 않았습니다. 반란은 §Y캇첸아르티히 제국§!에 의해 진압되었고, 장악했던 행성은 모두 캇첸의 통제 하에 떨어졌습니다.\n\n그러나 §Y로우프§!는 그것이 일시적인 실패일 뿐이라는 희망을 가지고 있으며, 소문으로는 이미 두 번째 반란을 계획중이라고 합니다. 그러나 많은 전문가들은 에지카니아인들이 그러한 반란을 다시 일으킬 가능성은 거의 없다고 봅니다."
 giga_katrebels.00178.a:0 "미래는 암울해 보이는군..."
 giga_katrebels.00178.a.tooltip:0 "에지카니아 레지스탕스가 3만큼 §R감소§!할 것입니다."
 ezic_assault_army:0 "에지카니아 사냥꾼"
 ezic_assault_army_desc:0 "탐욕스럽고 잘 장비된 에지카니아인으로 대부분의 물질과 군인을 손쉽게 찢어버릴 수 있습니다."
 giga_katrebels.0012.talk:0 "당신 종족과 생활양식에 대해 알려주시오."
 giga_katrebels.0018.name:0 "에지카니아"
 giga_katrebels.0018.desc:0 "우리 동족은 매력적인 종족입니다. 제가 다 자랑스럽군요. 우리 종족의 이야기를 들려드릴 수 있다면 기쁘겠지만..."
 giga_katrebels.0018.ezicanias:0 "당신들 종족은 어떤가?"
 giga_katrebels.0018.ezicanias.response:0 "우리 에지카니아는 호전적인 종족이 아닙니다. 우리는 §Y플러션§!의 §Y에지카니아 제국§!에서 거주했으며, 그곳에서 우리들 대부분은 목가적인 수렵 채집민의 생활을 했습니다.\n\n우리는 대개 우리 땅에 퍼져있는 다양한 크기의 \"군집\"으로 구성됩니다. 에지카니아의 특수 종인, §Y대장 개체§!가 여러 군집의 개인들에게 통제권을 행사합니다. 그리고 저는, 음, 일종의 \"최고 대장\"의 역할을 하여 우리 국가의 모든 군집과 대장에게 어느 정도의 권한을 행사했습니다. 우리도 물론 도시와 정착지가 있었지만, 수십만 명 이상의 거주자들은 없었습니다.\n\n저는 대부분의 대장들이 옳다고 생각하는 것은 무엇이든 하도록 내버려 두었습니다. 대장들은 원하는 대로 살도록 허용되어야 한다는 믿음 때문입니다. 그리고 그들은 자신의 군집에게 무엇이 옳은지 결정하는데에 있어서는 최고입니다.\n\n이러한 분권화된 방식의 지도로 우리는 플러션에서 천 년을 살아왔습니다. 주어진 땅에서 생활하는 것이 많은 인구에게 충분했기 때문에, 우리는 국경을 넘어 확장하려는 야망은 전혀 가지지 않았습니다. 좋은 생활이었습니다.\n\n카이저가 오기 전까지는 말입니다."
 giga_katrebels.0018.empire:0 "에지카니아 제국에 대해서 말해주시오."
 giga_katrebels.0018.empire.response:0 "에지카니아 제국은 전 플러션에서 가장 아름다운 장소 중 하나였습니다!\n\n비록 그렇게 크지는 않았지만, 행성에서 가장 장엄한 풍경들을 품고 있었습니다. 우리의 위대한 대지는 거대한 숲과 광대한 슾지, 그리고 위풍당당한 산맥으로 가득했고, 우리의 동족들을 그곳을 집이라 불렀습니다.\n\n언뜻 보기에 원시적인 삶의 방식이지만, 그럼에도 불구하고 우리는 전 제국에 걸쳐있고 주요한 정착지와 연결된 광대한 열차망을 설치하였습니다. 그것은 우리의 자랑이었습니다. 얼마간은 말입니다.\n\n제국이 이백만에 달하는 에지카니아인들을 지배하던 십여 명의 대장 개체와 함께 분열되었습니다. 그리고 우리는 그냥... 우리의 삶을 즐기며 우리 국가가 무엇을 제공해야 하는지 탐구하며 살았습니다.\n\n항상 완벽한 것은 아니었지만, 적어도 우리는 누군가를 억압하거나 아무데서나 전쟁을 시작하지는 않았습니다."
 giga_katrebels.0018.kaiserbad:0 "카이저가 어떻게 침략했지?"
 giga_katrebels.0018.kaiserbad.response:0 "카이저... §Y슬픔이 눈에 보이는 듯 하다§! ...비열한 녀석!\n\n그가 처음 §Y몬트카노너 프로젝트§!를 추진했을 때, 우리는 별로 관심이 없었습니다. 똑똑한 에지카니아 몇 명은 프로젝트에 작업을 하러 갔지만, 제 동족은 그리 신경 쓰지 않았습니다.\n\n그리고 §Y캇첸아르티히 제국§!이 공격했을 때 모든 것이 바뀌었습니다.\n\n카이저가 몬트카노너를 사용해 궤도로부터 우리의 땅을 폭격했고 우리가 캇첸 장갑을 뚫기 위해 건설한 §Y허리케인 포탑§!을 파괴했습니다. 캇첸 함선이 어뢰를 떼지어 발사했고 우리의 해안 방위 군집을 파괴했습니다.\n\n그러나 우리는 항복하지 않았습니다! 그들은 아직 우리의 땅에 기갑 부대를 보내지 않았고, 우리는 우리의 사냥꾼이 그 금속의 괴수를 손쉽게 찢어버리리라 확신했습니다. 게다가, 산과 숲 그리고 슾지로 이루어진 가혹한 지형이 실제 군사 작전을 극도로 복잡하게 했습니다.\n\n그때 카이저가 상상도 못할 짓을 했습니다... 제 동족을 우리에 대항해 사용한 것입니다. 캇첸은 우리의 DNA를 기반으로 하여 생체 공학으로 작고 탐욕스러운 특수 종인 비행 에지카니아를 만들었습니다. 저 비열한 고양이들은 우리의 땅에 수백만 마리를 계속해서 풀어놓았고 우리는 아무것도 할 수 없었습니다.\n\n이 생명체는 작고 빠르고 민첩하며 죽을 때마다 사방에 뿌리는 매우 부식성이 강한 산을 지니고 있었습니다. 이... 악마 같은 존재들은 우리의 방어를 망가뜨렸고 캇첸 보병대가 우리 국가 전체를 총 한발 쏘지 않고 차지하게했습니다.\n\n우리의 제국은 무너졌고, 저는 캇첸 제국주의에 복종하길 거부하고 도망갔습니다. 전 그때 이후로 에지카니아 레지스탕스를 조직하려고 시도했고, 그것은 여전히 이곳에 있습니다... 지금까지 말입니다."
 giga_katrebels.0018.kaiserverybad:0 "카이저가 당신의 땅에 무슨 짓을 했지?"
 giga_katrebels.0018.kaiserverybad.response:0 "끔찍한 일이죠...\n\n그는 우리의 비옥한 땅을 과하게 산업화하였습니다. 호수와 습지에서 물을 빼내고 심지어는 광물을 채굴하기 위해 우리의 산 몇개를 평탄화했습니다.\n\n우리 동족은 강제로 캇첸 군용 기계에 투입됐습니다. 캇첸이 우리를 공개적으로 억압하거나 쏘지는 않았지만 그들은 우리 인구의 상당수를 징집했고, 느리지만 꾸준히 우리의 문화와 신앙을 그들 자신의 카이저 숭배와 군국주의로 대체하고 제거해갔습니다.\n\n하지만 우리 에지카니아는 쉽게 쓰러지지 않습니다! 비록 우리가 복종해야했지만, 우리는 여전히 카이저를 결국 제거할 날을 기다리고 있습니다. 마음속으로는, 우리 모두가 과거의 목가적인 생활로 돌아가길 바라고 있습니다.\n\n우리에겐 그것이 자연스럽고 옳다고 느껴집니다. 이 모든 캇첸 군국주의, 성간 식민지화, 그리고 확장은 우리 대부분과는 그냥 어울리지 않습니다.\n\n우리 동족은 긴 수명 또한 가지고 있어서, 카이저의 제국 정복 시절의 에지카니아 대부분이 여전히 살아있으며 반격할 기회를 기다리고 있습니다. 전 그들을 실망시키고 싶지 않습니다."
 giga_katrebels.0018.whatkaiser:0 "정확히, 카이저가 누구지?"
 giga_katrebels.0018.whatkaiser.response:0 "현존하는 가장 과대망상증적 존재, 그게 바로 카이저입니다!\n\n그는 오직 확장, 정복, 확장, 그리고 더 많은 정복만을 추구합니다. 그의 동기를 확실히 알지는 못하지만, 그는 그저... 모든 것을 다스리고 싶어하는 것 같습니다. 처음에는 플러션이었고, 우리가 아무것도 하지 않는다면 다음은 은하일 것입니다!\n\n그에게 신성한 것은 없으며, 그는 더 많은 군수 공장을 건설하기 위해 우리 조상의 대지를 행복하게 포장할 것입니다. 흠, 그는 때때로 어떤 종족에게 제한된 자치권을 주는 둥, 양보를 하려고도 하지만, 이 양보는 당연히 반대자를 침묵시키고 그들을 세뇌할 시간을 더 갖기 위한 것입니다.\n\n그리고 캇첸은 그를 일종의 신인것 마냥 추종하며 그의 모든 말을 따르고, 그저 그가 원했기 때문에 시작한 전쟁에 죽으러 갈 것입니다. 그는 그가 정복한 모든 종족을 세뇌하며 그들을 그의 개인 숭배와 사나운 군국주의로 몰아넣습니다.\n\n심지어 그가 어디 출신인지도 확실하지 않고, 그냥 갑자기 플러션에 나타나서 혼란의 시기에 캇첸아르티히 제국의 전권을 잡은 것 같습니다. 상당히 불가사의하며... 귀찮은 존재입니다."
 giga_katrebels.0018.cool:0 "흥미롭군. 공유해줘서 고맙네."
 giga_katrebels.0018.cool.response:0 "우리의 이야기가 잊혀지지 않았다는 것이 중요합니다... 카이저가 승리하지 못하도록 말입니다."
 giga_katrebels.0012.sabotplants:0 "§Y캇첸 발전소 공격§!"
 giga_katrebels.0012.sabotplants.tooltip:0 "우리는 발전소를 사보타주해 캇첸 전력망을 불안정하게 하는 작전을 통해 §Y에지카니아 기사단§!을 지원할 수 있으며, 이는 캇첸의 해군을 방해할 것입니다."
 need_ezic_resistance_2:0 "§Y에지카니아 레지스탕스 병력§!이 §G2§! 이상 필요합니다."
 giga_katrebels.0016.name:0 "발전소 공격"
 giga_katrebels.0016.desc:0 "캇첸은 비싸고 부서지기 쉬운 함선 탑재 발전기 사용을 피하기 위해, 행성에서 함선으로 전력을 보내는 경향이 있습니다.\n그리고 우리 에지카니아는 대부분의 전기 충격에 안전한 구조를 지니고 있습니다. 사보타주 팀은 캇첸 발전소 이곳 저곳의 전선을 쉽사리 끊어버릴 수 있고, 이는 그들의 함선에 눈에 띄는 충격을 줄 것이 틀림 업습니다.\n더이상 함선에 공급할 전력이 없어지면 함선이 원래보다 훨씬 느려질 것입니다! 조금만 도와주시면 됩니다...\n\n§Y카이저가 이를 알아챌 확률은 25%이며, 발각되면 우리에 대한 그의 우호도가 §R감소§!합니다.\n\n§Y작전이 성공하면, 모든 캇첸 함선은 2년간 다음과 같은 디버프를 받습니다: §!\n§R 함선 속도 -40%\n점프 충전 시간 +25%\n\n§Y작전이 실패하면, 에지카니아 저항군이 1만큼 §R감소§!합니다.§!\n\n§Y10% 확률로 §H대성공§!을 하며, 이는 캇첸에게 불이익을 안겨줌과 동시에 에지카니아 저항군이 §G증가§!할 것입니다.§!"
 giga_katrebels.0016.reponse:0 "그렇다면, 저들의 발전소를 공격할 수 있는 일을 하겠다."
 giga_katrebels.0016.low:0 "£energy£ §Y3000§! & £alloys£ §Y500§! 제공 | 성공 확률 60%"
 giga_katrebels.0016.med:0 "£energy£ §Y5000§! & £alloys£ §Y1500§! 제공 | 성공 확률 80%"
 giga_katrebels.00162.name:0 "발전소 사보타주 실패"
 giga_katrebels.00162.desc:0 "§Y에지카니아 기사단§!에 속한 반-카이저 레지스탕스 단체의 §Y에지카니아§!가, 최근 §Y캇첸아르티히 제국§! 전역의 발전소를 파괴하려다 체포되었습니다.\n\n사보타주 팀은 건물에 들어가기도 전에 캇첸 당국에 의해 빠르게 중단되었으며, 비참하게도 캇첸을 매수하려던 시도는 실패했습니다.\n\n카이저는 국민들에게 이 성공적인 대응 작전에 대해 의기양양하게 연설했고, 이는 제국에서의 에지카니아 레지스탕스에게 심각한 실패를 의미합니다."
 giga_katrebels.00162.a:0 "쥐새끼들!"
 giga_katrebels.00164.name:0 "발전소 사보타주 성공!"
 giga_katrebels.00164.desc:0 "§Y에지카니아 기사단§!에 속한 반-카이저 레지스탕스 단체의 §Y에지카니아§!가, §Y캇첸아르티히 제국§!의 몇 곳의 중요한 군용 발전소에 타격을 주는데 성공했습니다.\n\n에지카니아가 건물에 잠입하였고 그들의 강력한 턱을 이용해 발전소의 정교한 전선을 쉽게 씹어 먹었습니다. 이는 캇첸 군수 시설에 광범위한 정전으로 이어졌습니다.\n\n이는 일반적으로 행성측 발전소에서 함선의 배터리에 직접 동력을 공급하던 캇첸이 전력을 아끼기 위해 결국 함선의 속도를 극도로 낮추게끔 했습니다."
 giga_katrebels.00164.a:0 "전기 없이 \"전격전\" 잘 해보라고!"
 giga_katrebels.00164.a.tooltip:0 "§Y캇첸 함선§!이 §Y2년§! 동안 다음과 같은 불이익을 받습니다:§R\n함선 속도 -40%\n점프 충전 시간 +25%"
 giga_katrebels.00166.name:0 "발전소 사보타주: §H대성공§!"
 giga_katrebels.00166.desc:0 "§Y에지카니아 기사단§!에 속한 반-카이저 레지스탕스 단체의 §Y에지카니아§!가, §Y캇첸아르티히 제국§!의 몇 곳의 중요한 군용 발전소에 타격을 주는데 성공했습니다.\n\n에지카니아가 건물에 빠르게 잠입하였고 그들의 강력한 턱을 이용해 발전소의 정교한 전선을 쉽게 씹어 먹었습니다. 이는 캇첸 군수 시설에 광범위한 정전으로 이어졌습니다. 캇첸은 반응할 시간도 없었습니다.\n\n이는 일반적으로 행성측 발전소에서 함선의 배터리에 직접 동력을 공급하던 캇첸이 전력을 아끼기 위해 결국 함선의 속도를 극도로 낮추게끔 했습니다.\n\n작전이 매우 빠르고 효과적으로 진행되었기 때문에, 제국 전역의 에지카니아인들의 저항을 강화하고 그들에게 언젠가 카이저를 쓰러트릴 수 있다는 희망을 주었습니다."
 giga_katrebels.00166.a:0 "전기 없이 \"전격전\" 잘 해보라고!"
 giga_katrebels.00166.a.tooltip:0 "§Y캇첸 함선§!이 §Y2년§! 동안 다음과 같은 불이익을 받습니다:§R\n함선 속도 -40%\n점프 충전 시간 +25%§!\n\n§Y에지카니아 레지스탕스§!가 §Y1§! 만큼 §G증가§!합니다."
 katzen_armies_already_sabotaged:0 "캇첸군의 보급선은 이미 사보타주되었습니다."
 need_ezic_resistance_3:0 "§Y에지카니아 레지스탕스 병력§!이 §G3§! 이상 필요합니다."
 giga_katrebels.0012.sabotarmy:0 "§Y캇첸군 보급소를 파괴하라§!"
 giga_katrebels.0012.sabotarmy.tooltip:0 "우리는 여러 곳의 캇첸군 보급소를 공격하는 일련의 작전을 통해 통해 §Y에지카니아 기사단§!을 지원할 수 있으며, 이는 §Y캇첸 지상군§!의 능률을 감소시킬 것입니다."
 giga_katrebels.0015.name:0 "보급소 파괴"
 giga_katrebels.0015.desc:0 "에지카니아 기사단은 다양한 캇첸 행성에 중요한 캇첸군 보급소의 위치를 알고 있습니다. 조용히 움직이는 소규모 에지카니아 기동 부대가 손쉽게 이 보급소 내부를 파괴할 수 있습니다. 이는 결국 행석측 캇첸군을 약화시킬 것입니다. 상대적으로 실행 가능해 보입니다. 지원이 조금 필요할 뿐입니다...\n\n§Y카이저가 이를 알아챌 확률은 25%이며, 발각되면 우리에 대한 그의 우호도가 §R감소§!합니다.\n\n§Y작전이 성공하면, 모든 캇첸 함선은 2년간 다음과 같은 디버프를 받습니다: §!\n§R 지상군 체력 -30%\n지상군 피해량 +25%\n지상군 사기 -30%\n\n§Y작전이 실패하면, 에지카니아 저항군이 1만큼 §R감소§!합니다.§!\n\n§Y10% 확률로 §H대성공§!을 하며, 이는 캇첸에게 불이익을 안겨줌과 동시에 에지카니아 저항군이 §G증가§!할 것입니다.§!"
 giga_katrebels.0015.low:0 "£energy£ §Y3000§! & £alloys£ §Y500§! 제공 | 성공 확률 50%"
 giga_katrebels.0015.med:0 "£energy£ §Y6000§! & £alloys£ §Y1500§! 제공 | 성공 확률 70%"
 giga_katrebels.0015.reponse:0 "그렇다면, 할 수 있는것을 하겠습니다. 캇첸 보급선은 내부에서부터 파괴될 것입니다."
 giga_katrebels.00152.name:0 "캇첸군 보급선 사보타주 실패"
 giga_katrebels.00152.desc:0 "오늘 §Y에지카니아§! 게릴라가 제국 전역의 군 보급소를 사보타주하려는 시도 도중 §Y캇첸군§!이 그들을 다수 붙잡아 체포했습니다.\n\n게릴라는 신속하게 구금되었고 카이저는 이 반-카이저 활동이 더 이상 계속되어서는 안된다며 §Y에지카니아 기사단§!의 활동에 대한 추가적인 단속으로 이어질 것이라고 말했습니다."
 giga_katrebels.00152.a:0 "빌어먹을 카이저!"
 giga_katrebels.00154.name:0 "에지카니아가 캇첸군 보급소를 사보타주하다!"
 giga_katrebels.00154.desc:0 "§Y에지카니아§! 게릴라 단체 수십여 곳이 최근 제국 전역의 §Y캇첸군 보급소§!에 대규모 공격 작전을 수행했습니다.\n\n그들은 중요한 캇첸 군용 시설과 기지를 다수 파괴했습니다. 이는 캇첸 지상군의 전투 능력에 상당한 감소를 유발할 것이고 그들의 행성을 이전보다 더 취약하게 만들 것입니다."
 giga_katrebels.00154.a:0 "기쁜 소식이로군!"
 giga_katrebels.00154.a.tooltip:0 "§Y캇첸 지상군§!이 §Y2년§! 동안 다음과 같은 불이익을 받습니다:§R\n지상군 피해량 -30%\n지상군 체력 -30%\n지상군 사기 -30%"
 giga_katrebels.00156.name:0 "에지카니아가 캇첸군 보급소를 사보타주하다: §H대성공§!"
 giga_katrebels.00156.desc:0 "§Y에지카니아§! 게릴라 단체 수십여 곳이 최근 제국 전역의 §Y캇첸군 보급소§!에 대규모 공격 작전을 수행했습니다.\n\n그들은 빠르게 중요한 캇첸 군용 시설과 기지를 다수 파괴했습니다. 이는 캇첸 지상군의 전투 능력에 상당한 감소를 유발할 것이고 그들의 행성을 이전보다 더 취약하게 만들 것입니다.\n\n반-캇첸 에지카니아 협동의 엄청난 위업이 제국 내의 에지카니아 저항을 강화했고 §Y에지카니아 기사단§!의 정통성을 증대시켜주었습니다."
 giga_katrebels.00156.a:0 "멋진 소식이군!"
 giga_katrebels.00156.a.tooltip:0 "§Y캇첸 지상군§!이 §Y2년§! 동안 다음과 같은 불이익을 받습니다:§R\n지상군 피해량 -30%\n지상군 체력 -30%\n지상군 사기 -30%\n\n§Y에지카니아 레지스탕스§!가 §Y1§! 만큼 §G증가§!합니다.§!"
 kaiser_moon_already_sabotaged:0 "카이저 위성은 이미 사보타주되었습니다."
 katzen_plants_already_sabotaged:0 "카이저 발전소는 이미 사보타주되었습니다."
 giga_katrebels.0012.sabotmoon:0 "§Y카이저 위성을 사보타주하라§!"
 giga_katrebels.0012.sabotmoon.tooltip:0 "§Y카이저 위성§!을 사보타주 하는 작전을 위해 §Y에지카니아 기사단§!을 지원할 수 있습니다."
 need_ezic_resistance_4:0 "§Y에지카니아 레지스탕스 병력§!이 §G4§! 이상 필요합니다."
 giga_katrebels.0014.name:0 "카이저 위성 사보타주"
 giga_katrebels.0014.desc:0 "§Y카이저 위성§!을 사보타주하길 바라는 겁니까? 상당한 작업이 될겁니다. 이 위성은 캇첸들만이 배치되어 있으며 잠입하는 것은 극도로 어려울것이 분명합니다.\n그러나 에지카니아가 금속을 씹을 만큼 강력하기 때문에, 저는 우리의 레지스탕스 조직이 적어도 뭔가를 시도해볼 만큼 충분히 강하다고 믿고 있습니다. 무언가를 파괴하는 일은 우리에게 꽤 쉬우니까 말입니다.\n하지만 이는 여러분 제국으로부터 어느 정도의 재정적 지원이 필요할 것입니다. 성공하려면 상당수의 캇첸에게 뇌물을 주어야 하기 때문입니다.\n\n§Y카이저가 이를 알아챌 확률은 50%이며, 발각되면 우리에 대한 그의 우호도가 §R감소§!합니다.\n\n§Y작전이 성공하면, 카이저 위성은 1년간 다음과 같은 디버프를 받습니다: §!\n§R 발사 속도 -25%\n속도 -40%\n무기 피해량 -30%\n선체 및 장갑 내구도 -30%§!\n\n§Y작전이 실패하면, 에지카니아 저항군이 1만큼 §R감소§!합니다.§!\n\n§Y10% 확률로 §H대성공§!을 하며, 이는 캇첸에게 불이익을 안겨줌과 동시에 에지카니아 저항군이 §G증가§!할 것입니다.§!"
 giga_katrebels.0014.low:0 "£energy£ §Y5000§! & £alloys£ §Y500§! 제공 | 성공 확률 40%"
 giga_katrebels.0014.med:0 "£energy£ §Y7500§! & £alloys£ §Y1000§! 제공 | 성공 확률 60%"
 giga_katrebels.0014.high:0 "£energy£ §Y10000§! & £alloys£ §Y3000§! 제공 | 성공 확률 80%"
 giga_katrebels.0014.reponse:0 "아주 좋습니다. 우리 에지카니아는 카이저의 기함에 잠입하여 가능한한 많은 피해를 입힐 것입니다."
 giga_katrebels.00142.name:0 "카이저 위성 사보타주 실패!"
 giga_katrebels.00142.desc:0 "§Y에지카니아 기사단§!에 속한 반-카이저 레지스탕스 단체의 §Y에지카니아§! 무리가, 최근 §Y카이저 위성§!에 잡입하려는 시도 중에 잡혔습니다. 내부로부터 사보타주하고 파괴하려고 했음이 분명합니다.\n\n사보타주 팀은 거대한 함선에 승선조차 하지 못하고 중단되었으며, §Y캇첸아르티히 제국§! 전역에서 대량의 체포가 이루어졌습니다. 이는 에지카니아 레지스탕스 활동을 굉장히 방해할 것입니다.\n\n카이저는 이 \"야만인\"들에 대한 그의 승리를 표현하는 의기양양한 연설을 했으며 그의 앞길에 있는 모든 것을 파괴하리라고 천명했습니다."
 giga_katrebels.00142.a:0 "쥐새끼들!"
 giga_katrebels.00144.name:0 "카이저 위성 사보타주 성공!"
 giga_katrebels.00144.desc:0 "§Y에지카니아 기사단§!에 속한 반-카이저 레지스탕스 단체의 §Y에지카니아§! 무리가 최근 카이저의 기함에 잠입하여 함선의 필수 부품을 씹어먹었습니다. 이에 §Y캇첸아르티히 제국§!은 패닉에 빠졌습니다.\n\n그리고 그들은 무기화된 위성 곳곳에 대량의 폭발물을 폭파시켰고 구조물에 엄청난 피해를 주었습니다. 비록 위성의 크기 자체를 보았을 때, 전체가 파괴되었음을 의미하지는 않지만 이는 의심할 여지 없이 조만간 위성의 전투 능률을 감소시킬 것입니다."
 giga_katrebels.00144.a:0 "우리의 에지카니아 동지에게 건배!"
 giga_katrebels.00144.a.tooltip:0 "§Y카이저 위성§!이 §Y1년§! 동안 다음과 같은 불이익을 받습니다:§R\n발사 속도 -25%\n속도 -40%\n무기 피해량 -30%\n선체 및 장갑 내구도 -30%§!"
 giga_katrebels.00146.name:0 "카이저 위성 사보타주:§H대성공§!"
 giga_katrebels.00146.desc:0 "§Y에지카니아 기사단§!에 속한 반-카이저 레지스탕스 단체의 §Y에지카니아§! 무리가 최근 카이저의 기함에 잠입하여 함선의 필수 부품을 씹어먹었습니다. 이에 §Y캇첸아르티히 제국§!은 패닉에 빠졌습니다.\n\n그리고 그들은 무기화된 위성 곳곳에 대량의 폭발물을 폭파시켰고 구조물에 엄청난 피해를 주었습니다. 비록 위성의 크기 자체를 보았을 때, 전체가 파괴되었음을 의미하지는 않지만 이는 의심할 여지 없이 조만간 위성의 전투 능률을 감소시킬 것입니다.\n\n작전이 너무나 빠르고 효율적으로 진행되어 캇첸 제국 전역의 많은 에지카니아인들에게 캇첸에 대항해 무기를 들고 일어날 동기를 주었을 뿐만 아니라, 그들은 에지카니아 기사단을 더욱 지지하게 되었습니다."
 giga_katrebels.00146.a:0 "우리의 에지카니아 동지에게 건배!"
 giga_katrebels.00146.a.tooltip:0 "§Y카이저 위성§!이 §Y1년§! 동안 다음과 같은 불이익을 받습니다:§R\n발사 속도 -25%\n속도 -40%\n무기 피해량 -30%\n선체 및 장갑 내구도 -30%§!\n\n§Y에지카니아 레지스탕스§!가 §Y1§! §G증가§!합니다."
 giga_katrebels.1001.name:0 "에지카니아의 대이동"
 giga_katrebels.1001.desc:0 "§Y캇첸아르티히 제국§!의 붕괴에 따라, 과거 제국 전역에 있던 §Y에지카니아인§!들은 그들 조상의 그리고 평화로운 삶의 방식으로 돌아가려고 노력하고 있습니다. §Y카이저§!가 억압하고자 노력했던 것 말입니다.\n\n그러나 진보된 기술을 거부하고 더욱 원시적인 \"자연의\" 생활양식을 받아들이는 이러한 삶의 방식은 종종 현대 문명과 기반 시설과 양립할 수 없습니다. 이는 에지카니아와 같은 행성에서 살아가는 다른 종족들간의 갈등을 일으켰습니다.\n\n그리하여, 은하 전체의 에지카니아종의 \"지도자\"인 §Y로우프 케레리스 혼스펠트§!의 지도 아래에서... 떠나기 위한 거대한 시도를 하고 있습니다.\n\n실제로, 지금 수십억의 에지카니아인이 화물선과 옛 캇첸 함선, 그리고 찾을 수 있는 모든 것에 탑승해 있으며, 알 수 없는 곳을 향해 우주로 날아가려고 합니다.\n\n로우프는 이 알 수 없는 목적지가 마침내 그들을 \"항상 원해왔던 대로 살 수 있게 해줄 것이다\"라고 말했습니다."
 giga_katrebels.1001.rebels.desc:0 "§Y캇첸아르티히 제국§!의 붕괴에 따라, 과거 제국 전역에 있던 §Y에지카니아인§!들은 그들 조상의 그리고 평화로운 삶의 방식으로 돌아가려고 노력하고 있습니다. §Y카이저§!가 억압하고자 노력했던 것 말입니다.\n\n그러나 진보된 기술을 거부하고 더욱 원시적인 \"자연의\" 생활양식을 받아들이는 이러한 삶의 방식은 종종 현대 문명과 기반 시설과 양립할 수 없습니다. 이는 에지카니아와 같은 행성에서 살아가는 다른 종족들간의 갈등을 일으켰습니다.\n\n그리하여, 은하 전체의 에지카니아종의 \"지도자\"인 §Y로우프 케레리스 혼스펠트§!의 지도 아래에서... 떠나기 위한 거대한 시도를 하고 있습니다. 실제로, 지금 수십억의 에지카니아인이 화물선과 옛 캇첸 함선, 그리고 찾을 수 있는 모든 것에 탑승해 있으며, 알 수 없는 곳을 향해 우주로 날아가려고 합니다. 로우프는 이 알 수 없는 목적지가 마침내 그들을 \"항상 원해왔던 대로 살 수 있게 해줄 것이다\"라고 말했습니다.\n\n이후 §Y에지카니아 기사단§!이 세울 제국은 무너졌고, 제국을 구성하고 있던 다른 종족은 스스로 삶을 꾸려가며 그들 자신의 정부를 개혁할 수 있게 되었습니다."
 giga_katrebels.1001.a:0 "그들은 어디로 가는걸까?"
 giga_katrebels.1001.a.tooltip:0 "우리 제국에 있는 §Y에지카니아§!를 제외하고, 은하 전체에서 대략 §Y75%§!가 그들의 세상을 §Y떠납니다§!"
 giga_katrebels.1002.name:0 "에지카니아가 떠나기를 요청하다"
 giga_katrebels.1002.desc:0 "§Y에지카니아 대이동§!의 진행과 함께 우리 제국 내의 §Y에지카니아§!가 자신들도 가서 동료 에지카니아들과 함께 그 위대한 여행에 동참할 수 있게 해달라고 요청했습니다.\n\n당연하게도, 이는 우리 행성의 몇 곳에서 그들 상다수가 떠나는 것을 의미하지만 이를 거부하면 에지카니아인들을 §R분노§!케 할 것입니다..."
 giga_katrebels.1002.a:0 "물론이지. 그들은 가도 좋다."
 giga_katrebels.1002.a.tooltip:0 "우리 제국 내의 §Y에지카니아§!의 대략 §Y75%§!가 행성을 §Y떠납니다§!"
 giga_katrebels.1002.b:0 "그들은 우리 제국에 속해있다. 다른 어느 곳도 아니다."
 giga_katrebels.1002.b.tooltip:0 "우리 제국 내의 §Y에지카니아§!의 대략 §Y75%§!가 §Y5 년§! 동안 §R분노§!할 것입니다, 이는 그들의 §Y행복도§!와 §Y행성 안정도§!를 급격히 낮출 것입니다."
 ezic_refused_depart:0 "거부된 이동"
 ezic_refused_depart_desc:0 "이 에지카니아 팝은 에지카니아 대이동에 참여함이 허락되지 않았기에 분노했습니다."
 giga_katrebels.1004.name:0 "트로피아나"
 giga_katrebels.1004.desc:0 "몇 달간의 여행 끝에, §Y에지카니아 대이동§!에 함께한 §Y에지카니아§!가 마침내 목적지에 도달한것 같습니다. §Y트로피아나§!라 알려진 울창한 열대 행성으로, 에지카니아가 §Y여섯 태양§!이라 부르는 블랙홀을 주위로 먼 궤도를 돌고 있으며, 행성은 블랙홀의 강착원반 덕분에 따뜻합니다.\n\n에지카니아의 문화에 대한 연구는 그 행성이 고대의 에지카니아 신화에 기록된 일종의 \"약속된 땅\"일 수도 있음이 밝혀졌지만, 이 주장의 정확성에는 논쟁이 있습니다.\n\n어쨌든, 비록 그들 모두가 해내지는 못하였지만, 수십억의 에지카니아는 이제 트로피아나에 발을 들였고 그들은 자신들의 과거 카이저의 정복 이전 §Y플러션§!에서 그랬듯이, 특별하고 상당히 \"목가적인\" 사회를 재건하기 시작했습니다.\n\n이에 따라, 에지카니아인들은 사실상 은하계의 무대에서 물러났습니다. 비록 진보된 기술이 없지만, 그들의 놀라운 전투 능력으로 인해 트로피아나를 목표로 한 지상 침공은 상당히 끔찍할 것이 분명합니다."
 giga_katrebels.1004.a:0 "흥미롭군. 상당히 특이한 종족이야."
 giga_ezic_age:0 "목가적 시대"
 giga_ezic_age_desc:0 "비록 이들은 증기 기관과 같은 기술을 가지고 있지만, 이 문명은 그들의 기술을 더 발전시키거나 고향을 더욱 확장하기를 원하지 않습니다. 이 구성원들은 상대적으로 단순하고 자연적인 생활을 즐기며, 주로 사냥을 중심으로 하고 작은 부족들로 조직됩니다.\n일종의 초국가적 \"정부\"가 있지만, 일반적으로 평화유지군의 역할을 하며 내부적인 사건에 그다지 개입하지 않습니다."
 col_giga_pre_ftl_ezic:0 "$giga_ezic_age$"
 col_giga_pre_ftl_ezic_desc:0 "$col_primitive_desc$"
 job_giga_ezic_hunter:0 "에지카니아 부족민"
 job_giga_ezic_hunter_plural:0 "에지카니아 부족민"
 job_giga_ezic_hunter_desc:0 "에지카니아의 지역 부족, 즉 \"군집\"의 다양한 의무를 충족시키는 에지카니아입니다."
 building_giga_ezic_capital:0 "에지카니아 수도"
 building_giga_ezic_capital_desc:0 "거대하면서 다소 촌스러운 도시는 에지카니아 문명의 \"수도\" 역할을 합니다. 이곳에는 행성내 최고 서열의 에지카니아 대장이 살고있고, 이곳에서 부족간 활동뿐만 아니라 행성의 놀랍도록 발전된 철도망을 조정합니다."
 mod_job_giga_ezic_hunter_add:0 "에지카니아 부족민 직업"
 giga_katrebels.1005.name:0 "로우프의 이별 선물"
 giga_katrebels.1005.desc:0 "[ezic_liberator.GetName] 여러분! 다시 한 번 뵙는군요, §Y로우프 세레리스 혼스펠트§!입니다.\n\n§Y캇첸아르티히 제국§!에 대항한 우리의 반란을 도와준 것에 대한 감사로 우리 동족이 여러분에게 선물을 주기로 결정했습니다. 우리가 §Y트로피아나§!에서 파올린 희귀 자원 덩어리입니다. 저희에겐 쓸모가 없습니다.\n\n이 자원이 여러분의 미래를 향한 노력에 도움이 되었으면 합니다.\n\n그리고 이제 우리는 낙원을 찾았으니, 에지카니아와 제가 우주 여행사분들에게 작별을 고합니다."
 giga_katrebels.1005.a:0 "좋은 선물이군. 잘 가게, 에지카니아."
 giga_flusionunion.002.name:0 "캇첸아르티히 제국 패배함!"
 giga_flusionunion.002.desc:0 "§Y유블리오§! 성계의 §Y플러션§! 원시 행성에서 도착한 놀라운 소식입니다.\n\n몇 년 전 세계 정복에 나섰던 §Y캇첸아르티히 제국§!이 §Y솔라키아 공화국§!이 이끄는 플러션 국가 연합에 의해 패배했습니다! §Y연합 플러션 국가§!로 알려진 이 연합은 세계를 장악하려는 캇첸의 시도에 대항하여 일어났고 상황의 위급함 때문에, 행성의 나머지 정부를 포함할 정도로 빠르게 성장하였습니다.\n\n제국의 패배로 인해, §YUFS§!는 이제 플러션 전체에 걸친 초국가를 의미합니다. 캇첸아르티히 제국에 비해 훨씬 평화적이며 자유롭고 민주적인 정책으로, 어떤 사람들은 이를 플러션인의 위대한 승리로 보았고, 많은 사람들은 이 모든 것이 핵 종말로 이어지지 않았다는 것에 어리둥절해 했습니다.\n\n§Y몬트카노너 프로젝트§!는 유지되지만 비-캇첸인들로 완전히 교체 및 배치되어 캇첸이 다시는 악의적인 의도로 사용할 수 없게 만들었습니다. 그러나 §Y카이저 캇테일§!의 행방은 알려지지 않았는데, 패배 이후 그냥 플러션의 표면에서 사라진 것으로 보이기 때문입니다."
 giga_flusionunion.002.a:0 "민주주의의 승리로군."
 giga_flusionunion.004.name:0 "플러션이 FTL을 얻다!"
 giga_flusionunion.004.desc:0 "약 10년 동안 힘을 공고히 한 §Y플러션§!의 §Y연합 플러션 국가§!가 마침내 FTL 엔진을 개발했습니다. 이에 따라 그들이 선출한 지도자인 §Y도푸스 테크닉 마키나§!가 우리에게 외교 서진을 보내어, §Y유블리오§! 성계를 양도해줄 것을 요청했습니다.\n\n비록 그들이 최근에 FTL을 개발했지만, 그들의 무기와 다른 기술은 놀라우리만큼 진보했고, 은하계 무대에 나타난 이 새로운 경쟁자를 주의하는 것이 현명한 처사일 것입니다."
 giga_flusionunion.004.a:0 "화면에 띄워라."
 giga_flusionunion.005.name:0 "통신 수신!"
 giga_flusionunion.005.desc:0 "반갑습니다, 우주 여행자분들!\n\n제 이름은 §Y도푸스 테크닉 마키나§!로 §Y연합 플러션 국가§!의 지도자입니다. 캇첸아르티히 제국의 패배에 따라, 우리는 플러션의 유일한 통치 기구이며 우리의 사랑스러운 행성에 살고 있는 모든 종족의 생활 조건을 개선하려고 노력하고 있습니다.\n\n하지만 그게 요점이 아닙니다! 우리는 힘을 합쳐 마침내 FTL 여행을 얻게 되었습니다. 이에 우리는 여러분들께 §Y유블리오§! 성계를 우리에게 양도해 달라고 요청합니다. 우리는 £energy£ §Y10000§! 및 £alloys£§Y1000§!의 형태로 성계에 대한 재정적 대가를 치를 수 있습니다.\n\n필요하다면 우리는 무기를 들고 일어나는 것을 두려워하지 않을 것임을 주의하십시오..."
 giga_flusionunion.005.a:0 "좋은 거래군."
 giga_flusionunion.005.a.tooltip:0 "우리는 §Y연합 플러션 국가§!에게 §Y유블리오§! 성계를 §Y양도§!할 것입니다."
 giga_flusionunion.005.a.response:0 "좋습니다! 여러분과의 더 깊은 협력을 고대하겠습니다."
 giga_flusionunion.005.b:0 "이 성계는 우리의 것이다. 사라져라."
 giga_flusionunion.005.b.tooltip:0 "§Y연합 플러션 국가§!가 우리에게 §R전쟁을 선포§!할지도 모릅니다!"
 giga_flusionunion.005.b.response:0 "옛 캇첸 무기를 전부 꺼내야 할지도 모르겠군..."
 giga_flusionunion.006.name:0 "플러션이 전쟁을 선포하다!"
 giga_flusionunion.006.desc:0 "걱정스러운 소식입니다! §Y유블리오§! 성계 양도 거부에 따라, 플러션 정부가 무력으로 성계를 장악했고 이러서 우리에게 전쟁을 선포했습니다.\n\n또한 그들은 유블리오 주위로 상당한 영역을 요구하였습니다. 이 요구에 대해 꾸물거리지는 않을 것 같습니다..."
 giga_flusionunion.006.a:0 "전투 배치!"
 giga_flusionunion.007.name:0 "연합 플러션 국가"
 giga_flusionunion.007.desc:0 "§Y플러션§! 원시 세계가 FTL 기술을 얻게 되었다는 소식이 우리에게 닿았습니다. 본디 원시인들이 우주 시대에 도달했다는 것은 거의 신경쓸 필요가 없지만, 실은 이 문명은 상당히 진보하였고, 하이퍼드라이브 개발 이전에 꽤나 발전된듯 합니다.\n\n이에 따라, 그들은 이제 우리의 것과 필적할 만한 무기와 장비를 가지고 은하 단계에 돌입하고 있습니다. 이 새로운 은하의 경쟁자를 상대할 때에는 조심하는 것이 현명할 것입니다."
 giga_flusionunion.007.a:0 "흥미롭군."
 giga_hke.002.name:0 "신성 캇첸 제국"
 giga_hke.002.desc:0 "§Y캇첸아르티히 제국§!의 붕괴 이후, §Y카이저§!가 사라짐에 따라, 어떤 이는 그를 동족이 가장 자신을 필요로할 때 그들을 버린 겁쟁이나 배신자로 기억할지도 모릅니다. 하지만 놀랍게도, 완전히 정반대의 일이 일어나고 있는 것 같습니다.\n\n사실, 카이저가 거대한 개인 숭배을 성장시켰기 때문인지도 모릅니다. 무수한 §Y캇첸 분열 국가§!에서 일종의 \"카이저 숭배\"가 나타나기 시작했습니다. 이 국가의 인구와 지도층은 사실상 그를 \"경배\"하기 시작했고, 누군가는 그가 \"캇첸 종족이 당한 부당한 대우를 바로잡기 위해 돌아올 것이다\"라고 주장하기도 합니다.\n\n더욱 놀라운 것은, 이 분리 국가들이 거대하지만 느슨하게 결속된 연방인 §Y신성 캇첸 제국§!으로 뭉쳤다는 것입니다. 이 \"신성 캇첸 제국\"는 카이저가 시작한 일을 끝내고 은하에 캇첸의 힘을 유지시키는 것에 초점을 맞추고 있는 듯 합니다.\n\n현재 신성 캇첸 제국 \"카이저 국가\"의 §Y[giga_hke_leader.GetName]§!(이)가 이끌고 있는 이 초국가적 연합은 카이저의 패배 이후 은하계가 가질 수 있었던 긴 평화에 대한 희망을 무너뜨릴 것 같습니다."
 giga_hke.002.a:0 "흥미로워. 다시 한 번 돌아온 것 같군."
 giga_hke.002.a.tooltip:0 "대부분의 §Y캇첸 분열 국가§!로 이루어진 §Y신성 캇첸 제국§!이 형성되었습니다.\n§Y접촉 목록§!에서 접촉할 수 있지만, 우리가 한 때 §Y카이저§!를 몰아냈기 때문에 우리에게 상대적으로 §R적대적§!일 것입니다."
 hke_federation:0 "신성 캇첸 제국"
 hke_federation_desc:0 "이 연방의 회원들은 은하계에서 과거 캇첸아르티히 제국의 힘을 재확인하고, 카이저의 비전을 실현하는데 성공하기를 바라고 있습니다."
 hke_country:0 "신성 캇첸 제국"
 hke_country_desc:0 "붕괴된 캇첸아르티히 제국의 잔존자들이 세운 초국가적 조직입니다."
 giga_hke.0010.name:0 "신성 캇첸 제국"
 giga_hke.centra.0:0 "§Y신성 캇첸 제국 중앙집권화:§! 1 | 낮음"
 giga_hke.centra.0.tooltip:0 "§R신성 캇첸 제국 회원국 이익:§!\n§Y없음.§!"
 giga_hke.centra.1:0 "§Y신성 캇첸 제국 중앙집권화:§! 2 | 중간"
 giga_hke.centra.1.tooltip:0 "§R신성 캇첸 제국 회원국 이득:§!\n§Y함선 발사 속도 +10%\n선체 내구도 +10%\n장갑 내구도 +10%\n지상군 체력 +10%§!"
 giga_hke.centra.2:0 "§Y신성 캇첸 제국 중앙집권화:§! 3 | 높음"
 giga_hke.centra.2.tooltip:0 "§R신성 캇첸 제국 회원국 이득:§!\n§Y함선 발사 속도 +25%\n선체 내구도 +25%\n장갑 내구도 +25%\n지상군 체력 +25%§!"
 giga_hke.centra.3:0 "§Y신성 캇첸 제국 중앙집권화:§! 4 | 과도함"
 giga_hke.centra.3.tooltip:0 "§§R신성 캇첸 제국 회원국 이득:§!\n§Y함선 발사 속도 +50%\n선체 내구도 +50%\n장갑 내구도 +50%\n지상군 체력 +50%§!"
 giga_hke.0021.name:0 "신성 캇첸 제국 중앙집권화 정도 상승!"
 giga_hke.0021.desc:0 "최근의 많은 개혁에 따라, 아직 상대적으로 역사가 짧은 §Y신성 캇첸 제국§!이 중앙집권적 관리 능력을 향상하는데 성공했습니다.\n\n이로써 캇첸 분열 국가 내에서 관료주의적 효율성이 증가할 것이며, 국가들이 자원을 배분하는 것이 더 쉬워짐에 따라 그들의 함대와 지상군이 강해질 것입니다."
 giga_hke.0021.a:0 "흥미롭군."
 giga_hke.0021.a.tooltip:0 "§Y신성 캇첸 제국 중앙집권화§! 정도가 §Y중간§!으로 §G상승함§!."
 giga_hke.0023.name:0 "신성 캇첸 제국 중앙집권화 정도 상승!"
 giga_hke.0023.desc:0 "놀라운 국가간 협력 덕분에 §Y신성 캇첸 제국§!은 다시 한 번 중앙집권적 관리 능력을 향상시키는데 성공하였습니다.\n\n이로써 지난번처럼, 캇첸 분열 국가 내에서 관료주의적 효율성이 증가할 것이며, 국가가 더욱더 많은 자원을 공유함에 따라 그들의 함대와 지상군이 강해질 것입니다."
 giga_hke.0023.a:0 "흥미롭군."
 giga_hke.0023.a.tooltip:0 "§Y신성 캇첸 제국 중앙집권화§! 정도가 §Y높음§!으로 §G상승함§!."
 giga_hke.0025.name:0 "신성 캇첸 제국 중앙집권화 정도 상승!"
 giga_hke.0025.desc:0 "관료주의적 기적에 의해 §Y신성 캇첸 제국§!은 또다시 한 번 중앙집권적 관리 능력을 향상시키는데 성공하였습니다.\n\n다시 캇첸 분열 국가 내에서 관료주의적 효율성이 증가할 것이며, 행정력과 군사력이 신성 캇첸 제국의 §Y카이저 국가§!을 중심으로 돌기 시작하면서 그들의 함대와 지상군이 강해질 것입니다."
 giga_hke.0025.a:0 "걱정되기 시작하는군."
 giga_hke.0025.a.tooltip:0 "§Y신성 캇첸 제국 중앙집권화§! 정도가 §Y과도함§!으로 §G상승함§!."
 giga_hke.0010.desc.a:0 "플러션은 우리의 정당한 영역이다. 카이저께서 우리에게 그의 이름으로 되찾기를 요구하셨다."
 giga_hke.0010.desc.b:0 "카이저께서는 돌아오실 것이다.\n\n시간을 확인해라. 그분의 도착이 점점 가까워지고 있다.\n\n우리는 인내할 것이다."
 giga_hke.0010.desc.c:0 "카이저께서는 우리와 함께 계신다. 너희와도 함께 계시느냐?"
 giga_hke.0010.desc.d:0 "언젠가, 은하는 다시 한 번 통일될 것이다."
 giga_hke.0010.desc.e:0 "카이저께서 우리에게 그분의 위대한 프로젝트를 계속하라 명하셨다.\n\n우리는 그분을 실망시키지 않을 것이다."
 giga_hke.0010.desc.f:0 "카이저의 의지에 반대한 것이 너희의 가장 큰 실수였다, [root.GetName]."
 giga_hke.president:0 "§Y신성 캇첸 제국의 카이저 국가§!: [giga_hke_leader.GetName]"
 giga_hke.membercount:0 "§Y신성 캇첸 제국 회원국 수§!: [global_event_country.hke_member_count]"
 giga_hke.1001.name:0 "신성 캇첸 제국: 새로운 카이저 국가"
 giga_hke.1001.desc:0 "과거 카이저 국가의 유감스러운 사건에 따라, §Y[giga_hke_leader.GetName]§!(이)가 신성 캇첸 제국 §Y카이저 국가§!의 권위를 받아들였으며 이제 §Y신성 캇첸 제국§!을 이끌고 캇첸의 영광을 되찾을 사명을 수행할 것입니다."
 giga_hke.1001.a:0 "흥미롭군."
 giga_hke.1002.name:0 "신성 캇첸 제국"
 giga_hke.1002.desc:0 "이전 §Y카이저 국가§!의 때아닌 멸망에 의해, §Y신성 캇첸 제국§!은 현재 새로운 것을 선정하는 과정에 있어 통신을 받지 않을 것입니다. 이 과정은 한 달 이상 걸릴 수도 있습니다."
 giga_hke.1002.a:0 "거 참, 안됐군."
 giga_hke.0027.name:0 "신성 캇첸 제국 재연합!"
 giga_hke.0027.desc:0 "유례없는 협력과 행정적 노력, 그리고 카이저에 대한 헌신의 위업으로, §Y신성 캇첸 제국§!을 형성한 수많은 캇첸 분열 국가가 마침내 스스로의 차이점은 제쳐놓기로 했고, 은하적 초국가로 연합하기로 했습니다!\n\n사실상 이제 신성 캇첸 제국 전체가 하나의 초국가적 존재로 융합하였고, 그 중심에는 신성 캇첸 제국의 전신인 §Y카이저 국가§!가 있습니다.\n\n그 지도자인 §Y[hkekaiser.GetName]§!(은)는  스스로를 \"카이저의 후계자\"라고 선포하였고, 카이저의 비전을 이루기 위해 드디어 통일된 신성 캇첸 제국의 모든 힘을 사용해 캇첸과 모든 신성 캇첸 제국의 구성 종족의 힘을 은하에게 재확인 시키겠다고 맹세했습니다.\n\n놀랍게도 이 초대국이 합동해서 모은 자원을 사용해 두 개의 거대한 함대를 조립했다는 보고가 들어왔습니다. §Y하일리거카츠 함대§!로 알려져 있으며, 각기 굉장한 천체 무기인 §Y카이저 위성§!이 특징입니다.\n\n또한 그들은 그들의 땅 주위의 대부분의 빈 공간을 차지했고, 일부 분열 국가가 연합하기를 §R거부§!했음에도 불구하고, 결국 어딜 보아도 §Y캇첸아르티히 제국§!인 것이 되살아났습니다..."
 giga_hke.0027.a:0 "그건... 좋지 않군. 정말로 포기할 줄 모르는군."
 giga_hke.0027.a.tooltip:0 "§Y신성 캇첸 제국§!의 대부분이 연합하여 거대한 단일 국가가 되었습니다.\n§R그들은 제국의 잃어버린 영토를 되찾으려할 것입니다.§!"
 civic_spirit_of_the_kaiser:0 "카이저의 망령"
 civic_spirit_of_the_kaiser_desc:0 "신성 캇첸 제국이 연합되었고, 결과적으로 캇첸아르티히 제국을 재건했습니다. 그들은 그들의 힘을 최대한으로 높이기 위해, 첨단 캇첸 무기를 가장 최신 기술로 강화했습니다.\n§B그들은 카이저가 시작한 것을 끝내려합니다.§!"
 origin_hke:0 "신성 캇첸 제국"
 origin_hke_desc:0 "이 문명은 수많은 분열 국가의 캇첸아르티히 제국 재건 시도의 결과입니다."
 giga_hke.0029.name:0 "수복 전쟁"
 giga_hke.0029.desc:0 "걱정스러운 소식입니다! 연합한지 얼마 되지 않아서, §Y신성 캇첸 제국§!은 제국을 다시 한 번 통일하기 위하여, 모든 잔존 §Y독립§! 캇첸 분열 국가에 대해 무기를 들고 일어설 것임을 밝혔습니다.\n\n비록 우리는 이 \"수복 전쟁\"의 직접적인 영향을 받지는 않겠지만, 그럼에도 불구하고 이 제국적 보복주의자들이 우리를 향할 수도 있기에, 그들을 신중하게 바라보아야 합니다."
 giga_hke.0029.a:0 "이런."
 giga_hke.0029.a.tooltip:0 "§Y신성 캇첸 제국§!이 모든 잔존 독립 캇첸 분열 국가에 §R전쟁을 선포§!했습니다."
 giga_hke.0011.name:0 "신성 캇첸 제국"
 giga_hke.0011.desc:0 "[root.GetName]! 카이저께서 위대한 정복을 처음 시작한 신성한 땅인 §Y유블리오 성계§!를 너희가 소유하고있다.\n\n그러므로 우리는 우리의 제국이 다시 한 번 완전해지도록 당장 이 성계를 내놓을 것을 요구한다.\n\n보상으로 £energy£ §Y25000§!을 줄 수 있지만, 비협조적으로 나온다면 우리는 주저하지 않고 공격할 것이다."
 giga_hke.0011.a:0 "좋다. 내어주겠다."
 giga_hke.0011.a.tooltip:0 "우리는 §Y유블리오§! 성계를 §Y신성 캇첸 제국§!에게 §Y양도§!할 것입니다."
 giga_hke.0011.b:0 "제국은 수십년 전에 붕괴됐다, 어서 사라져라!"
 giga_hke.0011.b.tooltip:0 "§Y신성 캇첸 제국§!이 우리에게 §R전쟁을 선포§!할 것입니다!"
 opinion_ended_kaiser:0 "카이저를 패배시킴"
 KATZEN_WORMHOLE_GALACTIC:0 "캇첸 웜홀"
 KATZEN_WORMHOLE_GALACTIC_DESC:0 "이 성계는 §Y캇첸 웜홀§!이 있습니다."
 starbase_aet:0 "$starbase_citadel$"
 starbase_aet_plural:0 "$starbase_citadel_plural$"
 mod_planet_jobs_energy_upkeep_mult:0 "일자리 에너지 유지비"
 giga_galactic_core_inactive_empty:0 "£menu_i£은하중심 (비어있는 초대질량 블랙홀)\n은하의 중심에는 항상 미탐사 §Y초대질량 블랙홀§!이 생성됩니다."
 giga_galactic_core_inactive_aeternum:0 "£menu_i£은하중심 (에테르눔)\n은하의 중심에는 항상 §Y에테르눔§!이 생성되며, 고대의 강력한 선대 문명이 존재하는 §Y버치 월드§!가 있습니다."
 giga_galactic_core_inactive:0 "£menu_i£은하중심 (무작위 초대질량 블랙홀)\n은하의 중심부에 50/50의 확률로 탐험되지 않은 §Y초대질량 블랙홀§!이나 §Y에테르눔§!이 생성됩니다."
 aeternum_spawn_mechanics:0 "§Y이 옵션은 에테르눔이 생성된 경우에만 영향을 주며, 항상 생성을 보장하지 않습니다. 에테르눔이 생성되지 않았을 경우 무효화됩니다.§!"
 giga_galactic_core_aeternum_1:0 "£menu_aet_1£Aeternum (§M기본§!)\n에테르눔은 특정 버프를 받지 않습니다.\n\n에테르눔은 거의 §Y20 million§!에 이르는 함대력을 가지고 시작합니다.\n\n$aeternum_spawn_mechanics$"
 giga_galactic_core_aeternum_2:0 "£menu_aet_2£에테르눔 (§B애져 에테르눔§!)\n에테르눔이 §H더욱 강력§!해지는 다음과 같은 버프를 받습니다:\n§Y+100% 무기 데미지\n+100% 연사 속도\n+100% 보호막 내구도 \n+100% 장갑 내구도 \n+100% 선체 내구도 \n+20% 함선 속도\n+100% 지상군 데미지\n+100% 지상군 체력\n+100% 지상군 사기\n+20% 회피\n+50% 거대 구조물 건설 속도§!\n\n§B약 50% 더 상위 등급 함선을 보유합니다.\n더욱 빨리 각성합니다.\n각성 지연 효과가 떨어집니다.\n사이코 물질생성기는 더 자주 제작되고 상한치는 10에서 20으로 증가합니다.§!\n\n거의 §Y100 백만§!에 이르는 함대력을 가지고 시작합니다.\n\n§H강력한 모드와 함께 사용하십시오!\n\n$aeternum_spawn_mechanics$"
 aeternum_nerf_1:0 "알파 에테르나이트 너프"
 aeternum_nerf_1_desc:0 "aeternum_nerf_1_desc,"Aeternum은 상당한 타격을 입은 것 같습니다..."
 aeternum_buff_3:0 "오메가 에테르나이트 버프"
 aeternum_buff_3_desc:0 "\"이거 안 좋은데요\"\n-캘러미티타임즈"
 aeternum_buff_4:0 "룩스 에테르나이트 버프"
 aeternum_buff_4_desc:0 "\"오우, 빛이 당신과 함께하길\"
 aeternum_buff_5:0 "룩스 에테르나이트 상향 조정"
 aeternum_buff_5_desc:0 "\"오호라, 빛이 그대에게 있으라\"
 aeternum_balance:0 "에테르나이트 밸런스"
 aeternum_balance_desc:0 "육각형이 최고인가?"
 giga_galactic_core_aeternum_3:0 "£menu_aet_3£Aeternum (§R오메가 에테르눔§!)\n에테르눔이 §R초강력§!해지는 다음과 같은 버프를 받습니다:\n§Y+500% 무기 데미지\n+500% 연사 속도\n+500% 보호막 내구도 \n+500% 장갑 내구도 \n+500% 선체 내구도 \n+80% 함선 속도\n+500% 지상군 데미지\n+500% 지상군 체력\n+500% 지상군 사기\n+100% 회피\n+200% 거대 구조물 건설 속도§!\n\n§B약 두 배 더 상위 등급 함선을 보유합니다.\n더욱 빨리 각성합니다.\n각성 지연 효과가 떨어집니다.\n사이코 물질생성기는 더 자주 제작되고 상한치는 10에서 30으로 증가합니다.§!\n거의 §Y30억§!에 이르는 함대력을 가지고 시작합니다. (바닐라에서는 함대력이 오버플로우 되므로 §YACOT Defines§!같은 모드 사용을 전제로 합니다.)\n\n§R초강력 모드와 함게 사용하십시오!!\n\n$aeternum_spawn_mechanics$"
 giga_galactic_core_aeternum_4:0 "£menu_aet_4£에테르눔 (§Y룩스 에테르눔§!)\n에테르눔이 §Y무한히 강력§!해지며 §R오메가 에테르눔§!과 같은 효과를 받습니다.\n\n승자가 되었지만 더 높은 곳을 향하고 싶다면, 에테르눔이 §YSecrets Beyond the Gates§! 모드의 §Y오메가 부품§!을 사용해 사실상 무한한 힘을 가지게 될 것입니다.\n\n§B즉시 각성할 것입니다\n각성을 늦출 수 없을 것입니다\n아이온디아는 강력한 버치 공허 구체입니다\n사이코 물질생성기가 더욱 자주 건설되며 갯수에 제한이 없을 것입니다.§!\n\n§R엄청나게 강력한 모드와 사용하십시오!\n\n$aeternum_spawn_mechanics$\n\n§H\"ANCIENT CACHES OF TECHNOLOGIES\"와 \"SECRETS BEYOND THE GATES\" 모드가 활성화되어야지만 선택 가능합니다!§!"
 PLANET_KILLER_AETERNUM_SHROUD_ACTION:0 "삼키다"
 PLANET_KILLER_AETERNUM_SHROUD_ACTION_DESC:0 "사이오닉 에너지의 흐름이 행성에 내뿜어졌고, 그것을 완전히 집어삼켰습니다."
 PLANET_KILLER_AETERNUM_SHROUD:0 "에테르나이트 장막 화포"
 PLANET_KILLER_AETERNUM_SHROUD_DESC:0 "에테르나이트 행성-파괴 무기로, 행성에 사이오닉 에너지를 넘치게 하여 파괴합니다."
 MESSAGE_DESC_FOR_PLANET_KILLER_AETERNUM_SHROUD:0 "(이)가 다음에 의해 삼켜짐:"
 FLEETORDER_DESTROY_PLANET_WITH_PLANET_KILLER_AETERNUM_SHROUD:0 "$PLANET|Y$ 삼켜버릴 준비 중"
 flusion_rich_modifier:0 "유별나게 풍요로운 행성"
 flusion_rich_modifier_desc:0 "이 행성은 정말로 자원이 풍부하며 환상적인 양의 경작지와 사용 가능한 토지를 제공합니다. 핵처리에 사용되는 값진 무겁고 가벼운 원소가 지각에 유난히 풍부합니다. 더욱이, 은하 다른 곳에서는 찾아보기 힘든 귀중한 자원의 거대한 광맥 또한 존재합니다. 이곳을 개척하는 운 좋은 문명은 분명히 행성과 은하계 모두에서 엄청난 이점을 가질 것입니다.\n\n§Y행성이 방사능 사막, 무덤 또는 조각난 행성으로 바뀌면, 이 보정치는 사라질 것입니다.§!"
