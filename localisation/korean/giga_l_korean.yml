 giga_katzen_submarine:0 "잠공함"
 giga_katzen_submarine_plural:0 "잠공함"
 KATZEN_SPACE_SUBMARINE:0 "선체"
 giga_katzen_submarine_submerged:0 "아공간 분열"
 giga_katzen_submarine_submerged_plural:0 "아공간 분열"
 GIGA_SUBMARINE_COMPUTER:0 "잠공함 목표 추적 컴퓨터"
 GIGA_SUBMARINE_COMPUTER_DESC:0 "잠공함은 매우 긴 (§Y500§!) 범위 내의 유효 목표물을 지정할 수 있습니다."
 GIGA_KATZEN_SUBMARINE_MISSILE:0 "잠공 어뢰"
 GIGA_KATZEN_SUBMARINE_MISSILE_DESC:0 "이 미사일의 사정거리는 굉장히 깁니다. 캇첸 아공간 잠수함이 사용하도록 설계되어 굉장히 멀리있는 목표를 맞출 수 있습니다."
 giga_katzen.8510.name:0 "캇첸의 잠공함 우주선 배치 개시"
 giga_katzen.8510.desc:0 "§Y캇첸아르티히 제국§!으로부터의 빈약한 보고에 따르면, 캇첸이 포착하기 어려운 §Y잠공함§! 함선의 대규모 배치를 개시했다고 합니다.\n\n정보원이 모을 수 있었던 정보에 따르면, 제대로 이해하기 힘든 이 함선들은 아공간에 \"잠수\"하여 방어와 적대 함선을 지나치고, 다시 현실 우주로 나와 장거리 어뢰로 무방비 대상을 공격하는 듯 합니다.\n\n캇첸이 이미 실험적인 소규모 함대를 이용하고 있지만, 이 \"우주 잠수함\"에 대한 실험 단계는 완료됐고 이제 캇첸 우주군 내에서 대량 배치될 준비가 된 것 같습니다.\n\n제대로 사용된다면 이 함선은 의심의 여지 없이 대부분의 전쟁을 캇첸에게 유리하게 끌고갈 것이며, 불행히도 저 함선의 내부 작동 원리에 대한 세부 사항이 흔치 않아서 원거리에서 분석하는 것이 불가능합니다.\n\n그러나 우리 연구자들은 우리가 이러한 함선 몇 척을 §R파괴§!한다면, 고철을 회수하여 내부 메커니즘에 대한 상세한 연구를 수행할 수 있다고 장담했습니다.\n\n그렇다면 우리는 이 함선들에 대한 대항 조치를 개발할 수 있고 그 함선들이 단순히 아공간을 통하는 것으로 우리의 방어를 무시하지 못할 것입니다."
 giga_katzen.8510.a:0 "걱정되는군."
 giga_katzen.8510.a.tooltip:0 "§Y유블리오§! 성계에 여러 척의 §Y잠공함§!이 나타납니다.\n\n이제 §Y캇첸 워포지§!에서 §Y잠공함§!을 생산할 수 있습니다.\n\n§Y잠공함 §! §Y15§!척을 파괴한다면 대항 조치를 개발할 §Y특별 프로젝트§!를 잠금 해제할 것입니다.\n\n"
 katzen_chain_1_title:0 "캇첸 잠공함 파괴"
 katzen_chain_1_desc:0 "캇첸 잠공함은 단순히 아공간에 숨는 것으로 대부분의 방어를 쉽게 무시할 수 있습니다. 이 함선을 충분히 파괴하여 유효한 대책을 개발해야 합니다.\n\n잠공함 §Y15§!척 중 §Y[ROOT.katzen_subs_destroyed]§! 만큼을 파괴했습니다."
 ANALYSE_KATZEN_SUB_PROJECT:0 "캇첸 잠공함 분석"
 ANALYSE_KATZEN_SUB_PROJECT_DESC:0 "캇첸은 혁신적인 \"우주 잠수함\"을 고안했습니다. 아공간에 잠수할 수 있는 함선으로 방어 시설을 무시하고 적 제국의 중심을 공격할 수 있습니다.\n\n이 함선으로 인한 피해를 막기 위해서 이 함선을 연구하고 이해하는 것이 매우 중요합니다.\n\n이 프로젝트를 완수하면 이 잠수함에 대한 대책을 마련할 수 있을테지만, 우리에 대한 §Y카이저의 우호도§!는 §R2§!만큼 §R감소§!할 것입니다.\n\n§B수수께끼 공학§! 승격 특전이 있다면 카이저는 우리의 계획을 알아차리지 못할 것이며 우호도는 감소하지 않을 것입니다."
 giga_katzen.8511.name:0 "잠공함 고철 회수"
 giga_katzen.8511.desc:0 "상당한 수의 캇첸 §Y잠공함§!을 파괴하고 회수했습니다. 이제 효과적인 대항 조치를 마련할 만만찮은 작업을 시작할 수 있습니다.\n\n이를 위한 §Y특별 프로젝트§!가 생겨났지만, 이를 완수하면 §Y카이저의 우호도§!가 §R감소§!할 수도 있음을 명심하십시오."
 giga_katzen.8511.a:0 "그렇군."
 giga_katzen.8512.name:0 "잠공함 분석 결과"
 giga_katzen.8512.a.desc:0 "우리 과학자들이 캇첸의 특이한 §Y잠공함§!으로부터 회수한 고철의 분석을 끝마쳤습니다.\n\n예상대로, 잠수함은 놀라우리만큼 진보된 차원 조작기를 사용해 빠르고 효율적으로 아공간을 통과할 수 있습니다. 처음에는 캇첸이 이런 진보적인 장치를 개발했다는 점에 놀랐지만, 추가적인 조사를 통해 플러션의 다양한 종족 중 하나인 §Y소사§!가 선천적으로 초소형 웜홀을 열어 아공간을 통해 순간이동할 수 있는 능력을 지녔음이 드러났습니다. 소사는 카이저의 정복 이전부터 그 능력을 대부분의 기술에 적용하고 있었습니다.\n\n카이저가 이 이례적으로 진보된 잠수함을 구상하기 위해 소사 기술을 광범위하게 역설계한 것이 틀림 없습니다. 회수한 잠공함 고철로 부터 얻은 지식과 소사 기술에 대한 데이터를 조합하여, 우리 과학자들은 이러한 잠수함을 아공간으로부터 강제로 끄집어낼 수 있는 §Y항성 기지 건물§!을 고안했습니다.\n\n또한, 연구를 통해 이 잠수함이 전투에서 파괴되었을 때 몇달 뒤 플러션으로 돌아갈 확률이 §Y60%§!라는 것을 알아냈지만, §Y캇첸 잠수함 함정§!을 건설하면 잠수함이 파괴되기 직전에 탈출할 수는 없을 것입니다.\n\n안타깝게도, 카이저가 이를 알아냈다는 소식이 들려왔으며, 이에 따라 §Y우리에 대한 그의 우호도§!가 §R2§!만큼 §R감소§!했습니다."
 giga_katzen.8512.b.desc:0 "우리 과학자들이 캇첸의 특이한 §Y잠공함§!으로부터 회수한 고철의 분석을 끝마쳤습니다.\n\n예상대로, 잠수함은 놀라우리만큼 진보된 차원 조작기를 사용해 빠르고 효율적으로 아공간을 통과할 수 있습니다. 처음에는 캇첸이 이런 진보적인 장치를 개발했다는 점에 놀랐지만, 추가적인 조사를 통해 플러션의 다양한 종족 중 하나인 §Y소사§!가 선천적으로 초소형 웜홀을 열어 아공간을 통해 순간이동할 수 있는 능력을 지녔음이 드러났습니다. 소사는 카이저의 정복 이전부터 그 능력을 대부분의 기술에 적용하고 있었습니다.\n\n카이저가 이 이례적으로 진보된 잠수함을 구상하기 위해 소사 기술을 광범위하게 역설계한 것이 틀림 없습니다. 회수한 잠공함 고철로 부터 얻은 지식과 소사 기술에 대한 데이터를 조합하여, 우리 과학자들은 이러한 잠수함을 아공간으로부터 강제로 끄집어낼 수 있는 §Y항성 기지 건물§!을 고안했습니다.\n\n또한, 연구를 통해 이 잠수함이 전투에서 파괴되었을 때 몇달 뒤 플러션으로 돌아갈 확률이 §Y60%§!라는 것을 알아냈지만, §Y캇첸 잠수함 함정§!을 건설하면 잠수함이 파괴되기 직전에 탈출할 수는 없을 것입니다.\n\n추가적으로, 우리의 복잡하고 불가사의한 과학적 방식 때문에, 캇첸은 여전히 우리의 계획에 대해 전혀 모르고 있습니다."
 giga_katzen.8512.a:0 "훌륭해!"
 giga_katzen.8512.b:0 "훌륭해!"
 giga_katzen.8512.a.tooltip:0 "이제 §Y항성 기지§!에 §Y캇첸 아공간 함정§!을 건설하여 캇첸의 §Y잠공함§!이 성계에 진입했을 때 강제로 아공간에서 끄집어낼 수 있습니다."
 sm_katzen_submarine_snare:0 "캇첸 잠수함 함정"
 sm_katzen_submarine_snare_desc:0 "이 건물은 이 성계에 들어온 캇첸의 모든 §Y잠공함§!을 강제로 아공간에서 끄집어냅니다. 또한, 그들은 더 이상 내구도가 낮아질 때 회피할 수 없을 것입니다."
 katzen_submarine_subspace_blockade:0 "아공간 봉쇄"
 katzen_submarine_subspace_blockade_desc:0 "캇첸 잠공함이 이 행성 주위의 FTL 통신과 수송을 봉쇄하고 있어, 행성의 생산 능력에 큰 방해를 받습니다."
 giga_blokkat.6607.name:0 "공포에 빠진 무리"
 giga_blokkat.6607.desc:0 "지난 몇 달간, §Y프레소린 스컬지§!가 계속해서 더 불규칙한 행동을 보이고 있습니다. 함대는 기이한 방식으로 움직이며, 감염된 행성은 평소보다 더 많은 생체함선을 만들어내고 수많은 다른 세부 사항들도 그 무리가 §R극심한 공포§!에 빠져있다는 결론으로 이어지게 합니다.\n\n우리의 감지기가 오늘 확인한 바로, 이러한 두려움에 빠진 행동의 최고조는 무리의 함대가 §Y[scourge_escape_system.GetName]§! 성계로 모이고있다는 점입니다. 감염된 행성은 동시에 \"해체\"되었으며, 행성의 생체 물질이 재배열되어 거대한 생체 함대로 재구축되고 그 함대가 모두 앞서 말한 성계로 향하고 있습니다.\n\n성계에 도달한 함대는 마치 종 전체가 어떤 거대한 위협으로부터 도망치고있는 것처럼 즉각적으로 은하간 우주로 탈출하였습니다. 이 특이한 행동의 이유에 무관하게, 프레소린 스컬지는 몇 달 내에 우리 은하에서 완전히 떠나려는 것 같습니다."
 giga_blokkat.6607.a:0 "이상하군..."
 giga_blokkat.6608.desc.notpsi:0 "§R자스카아악! 자스카아악! 자스카아악! 니칼라 니블리르! 니칼라 니블리르! 주수가막 바수! 데루타 칼리!§!"
 giga_blokkat.6608.a:0 "통신 꺼버려라."
 giga_blokkat.6608.desc.psi:0 "§B<사이오닉 연결 생성됨>§!\n\n§R사냥꾼! 사냥꾼! 사냥꾼이 도착했다! 망해버린 은하는 버리고 공허로 후퇴하라, 그것만이 살 길이다!§!"
 giga_blokkat.6608.desc.hive:0 "§B<의식 연결 생성됨>§!\n\n§R사냥꾼! 사냥꾼! 사냥꾼이 도착했다! 망해버린 은하는 버리고 공허로 후퇴하라, 그것만이 살 길이다!§!"
 giga_blokkat.6608.b:0 "블록캣이..."
 giga_blokkat.6608.b.response:0 "§R사냥꾼. 당장 떠나지 않으면 우리 남은 종족마저 절멸시킬 것이다.\n\n너희도 그래야 한다. 사냥꾼이 이 은하도 예외 없이 쓸어버릴 것이다.§!"
 giga_blokkat.6608.c:0 "그들이 너희 종족에 무슨 짓을 했지?!"
 giga_blokkat.6608.c.response:0 "§R우리는 대단했다. 번영했다. 우리 종족은 공허로 뻗어나갔고, 위대한 은하 필라멘트로 뻗어나갔다.\n\n사냥꾼이 은하의 포식자와 함께 처음 왔을 때, 우리는 싸웠고 압도했다. 이겼다고 생각했다.\n\n그러나 그들은 돌아왔다. 처음 보는 크기의 함선을 가지고왔다. 다시 싸왔다. 하지만 그들은 우리를 대량학살했다. 우리의 행성을 불태웠다. 한때 그들을 막았던 함대를 파괴했다.\n\n최선을 다했지만, 결국 우리 의식을 쓸어버렸다.\n\n이내 우리 종족은 산산조각났다. 조각났다. 별들 사이로 흩어졌다. 영원히 그들의 손아귀에서 벗어나기 위해 떠났다.\n\n이제 우리는 도망쳐야하고 사냥꾼이 다시 한 번 우리를 잡기 전에 먹어치울 다른 은하를 찾아야 한다.\n\n시간이 얼마 없다.\n\n곧, 어떤 것도 남지 않을 것이다.§!"
 tradition_gigabulwark:0 "방벽"
 tradition_gigabulwark_desc:0 "공학의 경이를 통해, 우리 행성은 모든 위험으로부터 안전할 것입니다."
 tr_gigabulwark_adopt:0 "방벽 전통"
 tr_gigabulwark_finish:0 "방벽 전통 완료"
 tr_gigabulwark_happy_defenses:0 "숭고한 요새"
 tr_gigabulwark_happy_defenses_delayed:0 "우리의 참으로 아름다운 방어 시설 덕분에 우히의 행성은 모든 위험으로부터 안전하며 우리 대중은 감사해할 것입니다."
 tr_gigabulwark_happy_defenses_desc:0 "§Y행성 방위 연결체§!가 행성에 안정도 §G10§!을 주며 §Y마지노 행성§!은 §G20§!을 줍니다."
 tr_gigabulwark_asteroid_fortresses:0 "소행성 요새"
 tr_gigabulwark_asteroid_fortresses_delayed:0 "일반적으로 쓸모가 업는 소행성이 이 은하에서 가장 거대한 방위 시설로 바뀔 것입니다."
 tr_gigabulwark_asteroid_fortresses_desc:0 "소행성 포대 업그레이드 포인트: §G+4§!"
 tr_gigabulwark_enhanced_dockyards:0 "함선 행성 건조"
 tr_gigabulwark_enhanced_dockyards_delayed:0 "행성 방위 연결체는 언제나 행성을 보호할 준비가 되어있습니다. 새로운 모델의 행성 조선소가 비사용 시간을 줄이기 위해 바로 설계될 것입니다."
 tr_gigabulwark_enhanced_dockyards_desc:0 "매월 타격 초계함: §G+50%§!"
 tr_gigabulwark_grand_fortifications:0 "은하적 참호"
 tr_gigabulwark_grand_fortifications_delayed:0 "우리의 방어를 구축하는데 낭비할 시간은 없습니다. 적들은 다가올 것이며 우리의 방어 시설은 준비 상태여야 합니다."
 tr_gigabulwark_grand_fortifications_desc:0 "§Y소행성 포대§!, §Y행성 방위 연결체§! 그리고 §Y마지노 행성§!이 §G50%§! 더 빠르게 건설됩니다."
 tr_gigabulwark_maginot_protocols:0 "마지노 프로토콜"
 tr_gigabulwark_maginot_protocols_delayed:0 "우리의 적들이 우리의 강력한 마지노 행성을 그냥 \"돌아서 가\"서 우회할 수 있다는 소문이 있습니다. 이것은 불가능할 것입니다!"
 tr_gigabulwark_maginot_protocols_desc:0 "§Y마지노 행성§!의 아공간 분열장이 §G1§! 점프 거리 늘어납니다."
 giga_bulwark_trad_stability_nexus:0 "숭고한 요새"
 giga_bulwark_trad_stability_nexus_desc:0 "우리의 위대한 요새가 우리의 사람들을 안전하게 지켜줄 것입니다."
 giga_bulwark_trad_stability_maginot:0 "$giga_bulwark_trad_stability_nexus$"
 giga_bulwark_trad_stability_maginot_desc:0 "$giga_bulwark_trad_stability_nexus_desc$"
 giga_blokkats_anime:0 "블록캣 생김새: §B애니 블록캣§!\n어떠한 이유로, 블록캣이 애니 캐릭터 (디스코드 유저 Derega가 그림) 모습을 할 것입니다. 불만을 얘기하기 전에, 저는 디스코드 서버에 이 모습을 추가할지 말지 투표를 했고 \"Yes\"가 이겼습니다. 민주주의를 좋아해야할지 싫어햐야할지 모르게 됐습니다.\n\n\n\n\n\n£blokkat_anime£\n\n\n\n\n\n§Y눌러서 §G일반 블록캣§!으로 바꾸기§!"
 mod_armies_energy_upkeep_mult:0 "지상군 에너지 유지비"
 giga_jublio_enabled:0 "£menu_enabled£유블리오 성계 - §G활성화됨§!\n§Y캇첸§!과 §Y캇첸아르티히 제국§! 혹은 §Y연합 플러션 국가§!의 고향인 §Y유블리오 성계§!가 §G생성될 것입니다.§! 캇첸아르티히 제국 설정에 따라 플러션 관련 컨텐츠가 발생할 것입니다."
 giga_jublio_disabled:0 "£menu_disabled£유블리오 성계 - §R비활성화됨§!\n§Y캇첸§!과 §Y캇첸아르티히 제국§!의 고향인 §Y유블리오 성계§!가 §R생성되지 않을 것이며§!, 따라서 모든 플러션 관련 컨텐츠가 사라집니다.\n§R모드의 완전한 이야기를 경험하고 싶으시다면 추천하지 않습니다.§!\n§R유피투 성계는 별개로 비활성화되어야합니다.§!"
 must_not_have_started_game_or_disabled_jublio:0 "게임이 시작됐거나 유블리오가 생성되지 않음으로 설정된 후라면 이를 할 수 없습니다."
 giga_jupitwo_enabled:0 "£menu_enabled£유피투 성계 - §G활성화됨§!\n§Y코로니아 마법 주의 국가§!의 고향인 §Y유피투 성계§!와, 이에 대한 위기인 §Y캇첸아르티히 제국§!이 §G생성될 것입니다.§!"
