 giga_news_title:0 "모드 소식 & 최신 변경점"
 giga_news_log:0 "§B----------------------------- 2026년 5월 11일 --------------------------------§!\n§H모드 버전, 3.37.0 by Tempest, Caramel & Xahkarias§!\n§G전체/상세 패치 노트는 Discord를 참조하세요.§!\n\n엄청난 패치 노트. 방대한 양의 수정 사항과 함께 §Y블로캇§! 및 §Y천체§!에 대한 전반적인 재조정이 이루어졌습니다. 또한 §Y알더슨 스타트§! 및 §Y복합체§! 개선 사항도 포함되어 있습니다!\n\n§B----------------------------- 2026년 4월 12일 --------------------------------§!\n§H모드 버전, 3.36.4 by Caramel & Xahkarias§!\n§G전체/상세 패치 노트는 Discord를 참조하세요.§!\n\n4월의 바보 특성이 제거되었습니다... 내년까지 모두 안녕히 계세요! 수많은 수정 사항과 다양한 개선이 있었습니다.\n\n§B----------------------------- 2026년 4월 1일 ---------------------------------§!\n§H모드 버전, 3.36.3 by Caramel, Tempest, Xahkarias & PIECAT§!\n§G전체/상세 패치 노트는 Discord를 참조하세요.§!\n\n위기 §Y시레날리아§!가 드디어 수정되었습니다! 기본적으로 §Y아케이드§! 프리셋과 §Y기가 경험§! 프리셋에서 활성화되어 있으며, §Y다음 주§!에도 적용됩니다. 물론 수많은 수정 사항도 포함되어 있습니다.\n\n§B--------------------------- 2026년 3월 18일 -------------------------------§!\n§H모드 버전, 3.36.2 by Tempest, Xahkarias, PIECAT & TTFTCUTS§!\n§G전체/상세 패치 노트는 Discord를 참조하세요.§!\n\n모드가 §Y4.3§!에 맞게 업데이트되었으며, 수많은 밸런스 변경과 함께 §Y준별자리 파괴자§! 및 §Y궤도 요새§! (현재 §Y궤도 해군 물류 사무소§!)에 대한 재작업이 이루어졌습니다.\n\n§B--------------------------- 2026년 1월 18일 -------------------------------§!\n§H모드 버전, 3.36.1 by TTFTCUTS, Xahkarias & Dodosman§!\n§G전체/상세 패치 노트는 Discord를 참조하세요.§!\n\n§Y마트리오시카 두뇌 업링크§! 및 §Y정사각형 세계§!가 4.0으로 업데이트되었습니다! 수많은 다른 수정 사항과 함께, 특히 용기 결속에 대한 수정이 있었습니다.\n\n§B--------------------------- 2026년 1월 1일 -------------------------------§!\n§H모드 버전, 3.36.0 - '구체를 생각하며', by TTFTCUTS, dodomans & Xahkarias§!\n§G전체/상세 패치 노트는 Discord를 참조하세요.§!\n\n§RH§!§HA§!§YP§!§GP§!§BY§! §MN§!§RE§!§HW§! §YY§!§GE§!§BA§!§MR§!\n§Y개편된 자작나무 세계§!\n자작나무 세계가 4.0+ 기준으로 업데이트되었습니다! 인슐라 및 구역이 개선된 UI와 함께 돌아왔으며, 구역 전문화에 접근할 수 있습니다. 아이온디아도 이 디자인을 활용하도록 업데이트되어, 아이테르넘이 최근 자작나무 시스템과 더 가까워졌습니다. 물론, 많은 다양한 수정 사항도 포함되어 있습니다.\n§B-------------------------- 2025년 11월 9일 ------------------------------§!\n\n§H모드 버전, 3.35.2, by Tempest, Xahkarias 및 dodosman§!\n§G전체/상세 패치 노트는 Discord를 참조하세요.§!\n\n§Y재활성화된 마지노 세계§!\n마지노 세계가 돌아왔으며, 수많은 버그 수정이 이루어졌습니다.\n\n§B------------------------ 2025년 9월 25일 ----------------------------§!\n§H모드 버전, 3.35.0 - '스파블레로니 피자' by Elowiny§!\n§G전체/상세 패치 노트는 Discord를 참조하세요.§!\n\n§Y재작업된 알더슨 디스크.§!\n알더슨 디스크가 돌아왔으며, 거대한 4구역 구역이 추가되었습니다!\n\n§Y대량 물질 재작업§!\n대형 거대 구조물은 이제 행성에서 수확한 대량 물질을 필요로 합니다. 분해를 시작하세요!\n\n§Y행성 시더 넥서스§!\n거대 가스 행성을 중심으로 구축되어 전체 시스템에 걸쳐 식량 자원을 생성합니다! Reddit 사용자 markjsno1의 제안으로 제작되었습니다.\n\n§B------------------------ 2025년 9월 22일 ----------------------------§!\n§H모드 버전, 3.34.3 by Elowiny§!\n§G전체/상세 패치 노트는 Discord를 참조하세요.§!\n버전 3.34.3은 행성 뷰 및 용기 결속과의 호환성을 제공합니다. 놓친 문제는 Discord에 보고하세요!\n\n§B--------------------------- 2025년 6월 16일 ---------------------------------§!\n§H모드 버전, 3.34 by TTFTCUTS, PIECAT & Elowiny§!\n§G전체/상세 패치 노트는 Discord를 참조하세요.§!\n버전 3.34.1은 드디어 §Y카첸아르틱 제국§!을 재활성화하였으며, 수많은 다른 버그 수정이 이루어졌습니다!\n\n§B---------------------------- 2025년 5월 6일 ----------------------------------§!\n§H모드 버전, 3.34 by Elowiny & TTFTCUTS§!\n§G전체/상세 패치 노트는 Discord를 참조하세요.§!\n\n버전 3.34는 §Y부분 호환성§!을 제공합니다 §Y4.0§!! 그러나 현재 수정 중인 일부 모드 부분은 비활성화되어 있으며, 여기에는 §Y프레임월드§!, §Y궤도 엘리시움§!, §Y알더슨 디스크§!, §Y소행성 산업§!, §Y마트리오시카 두뇌 VR§! (M.B. 출력이 두 배로 증가하여 보완됨), §Y링월드 변형§!, §Y인터스텔라 거주지§!, §Y카첸아르틱 제국§!, §Y시레날리아§! 및 §Y자작나무 세계§!의 전체 범위 (여전히 사용 가능하지만 단순화됨)가 포함됩니다. 다음 며칠과 몇 주 동안 점진적으로 복원할 §Y핫픽스§!가 있을 예정입니다!\n\n§B---------------------------- 2025년 4월 3일 ----------------------------------§!\n§H모드 버전, 3.33 by PIECAT, Tempest, Elowiny & TTFTCUTS§!\n§G전체/상세 패치 노트는 Discord를 참조하세요.§!\n\n버전 3.33은 §YB.I.G. 배양기§!에 대한 재작업, 새로운 쉬운 §Y알파 아이테르넘§! 난이도, 메뉴에 대한 §Y재작업§!, 수많은 QoL 수정 및 메뉴 이전에 새로운 §Y구성§! 선택 화면을 추가합니다!\n\n§Y새로운 구성 선택 메뉴에 대한 피드백이 있다면 Discord에 남겨주세요!§!\n\n§B--------------------------- 2025년 1월 2일 -------------------------------§!\n§H모드 버전, 3.32.3 by PIECAT & Tempest§!\n§G전체/상세 패치 노트는 Discord를 참조하세요.§!\n\n§RH§!§HA§!§YP§!§GP§!§BY§! §MN§!§RE§!§HW§! §YY§!§GE§!§BA§!§MR§!\n버전 3.32.3은 수많은 필요한 수정 사항과 함께 프리셋을 위한 두 번째 페이지를 추가합니다. 공간이 부족해졌습니다.\n\n§B-------------------------- 2024년 11월 16일 -----------------------------§!\n드디어 §Y블로캇 초상화§!, §Y팔루시 포트레이트§! 및 §Y카첸 포트레이트§! 서브/독립 모드를 3.14로 업데이트했습니다! 모든 모드는 §YElowiny의 모드§! 컬렉션을 통해 워크숍에서 확인할 수 있습니다.\n\n§B-------------------------- 2024년 11월 20일 -----------------------------§!\n§H모드 버전, 3.32 by PIECAT§!\n§G전체/상세 패치 노트는 Discord를 참조하세요.§!\n\n§Y매크로 대기 안정기§!\n가스 구역을 재작업하여 행성의 기술자에게 이국적 기체 출력을 제공하는 강력한 통치자 직업을 제공합니다.\n\n§B-------------------------- 2024년 11월 16일 -----------------------------§!\n§H모드 버전 3.32 - '영광의 귀환을 알리다'§!\n§G전체/상세 패치 노트는 Discord를 참조하세요.§!\n\n§Y초거대 E.H.O.F.§!\n비활성 코어를 중심으로 구축되어 함대의 기동성을 크게 향상시킵니다.\n\n§Y재작업된 테라포밍 거대 구조물§!\n이제 단일 사이트에서 구축되며, 스스로 테라포밍하는 대신 전통적인 테라포밍을 통해 행성의 테라포밍을 가능하게 합니다.\n\n§Y재작업된 스트립마인/S.U.C.C./메가보어§!\n더 이상 고갈되지 않으며, 대신 행성에서 먼지/가스/결정 자원을 생성하고 강화합니다.\n\n§Y14개의 새로운 표본§!\n주로 사건 및 위기와 관련되어 있습니다. 모두 찾을 수 있나요?\n\n§Y승격 특전 통합§!\n알더슨 디스크는 더 이상 특전이 필요하지 않으며, 시스템 제작 특전이 천체 조립 특전과 통합되었습니다.\n\n§Y카첸아르틱 제국은 기본적으로 비활성화되어 있습니다.§!\n준비되지 않은 플레이어에게 카이저가 얼마나 파괴적일 수 있는지에 따라, 기본적으로 비활성화하기로 결정했습니다."
