 giga_blokkats_very_easy:0 "블록캣 (§E새끼 블록캣§!)\n블록캣이 §E굉장히 디버프§!될 것입니다.\n\n다음과 같은 효과를 받습니다:\n§Y무기 피해량 -70%\n함선 선체/장갑/보호막 내구도 -70%\n함선 속도 -50%\n지상군 피해량/체력/사기 -70%§!\n\n§Y블록캣-베스터§!가 부활하지 않을 것이며 총 §Y400M§! 내구도를 가집니다.\n§Y블록-해체자§! 개수가 §Y0.60x§! 입니다.\n§Y초차원 불안정제§! 활성화의 기본 비용은 £energy£ §Y200k§!일 것입니다.\n블록캣 연구속도 §Y50%§! 더 빠름\n\n§Y블록-프로토콜§!의 완료 비용은 §Y1천만 에너지§!이며, §G블록캣 동조§!가 §Y40%§!에서 시작할 것입니다\n\n§H§Y기가스트럭쳐§!만 사용하고, §Y아포칼립스§! DLC가 없어서 §Y천체 전함§!이 없다면 밸런스가 맞습니다.\n정말 정말 쉽습니다. 블록냥이를 못 깨겠거나 그냥 위기를 테스트해보고 싶을 때 사용하세요!"
 giga_blokkats_easy:0 "블록캣(§B블록냥이§!)\n블록캣이 §B다소 디버프§!될 것입니다.\n\n다음과 같은 효과를 받습니다:\n§Y무기 피해량 -33%\n함선 선체/장갑/보호막 내구도 -33%\n함선 속도 -33%\n지상군 피해량/체력/사기 -33%§!\n\n§Y블록캣-베스터§!가 부활하지 않을 것이며 총 §Y400M§! 내구도를 가집니다.\n§Y블록-해체자§! 개수가 §Y0.70x§! 입니다.\n§Y초차원 불안정제§! 활성화의 기본 비용은 £energy£ §Y400k§!일 것입니다.\n블록캣 연구속도 §Y25%§! 더 빠름\n\n§Y블록-프로토콜§!의 완료 비용은 §Y2천5백만 에너지§!이며, §G블록캣 동조§!가 §Y20%§!에서 시작할 것입니다\n\n§H§Y기가스트럭쳐§!만 사용한다면 밸런스가 맞습니다."
 giga_blokkats_normal:0 "블록캣(§G일반 블록캣§!)\n블록캣이 기본값입니다.\n\n§Y블록캣-베스터§!가 §Y1 회§! 부확할 것이며, 총 §Y800M§! 내구도를 가집니다\n§Y초차원 불안정제§! 활성화의 기본 비용은 £energy£ §Y600k§!일 것입니다.\n\n§Y블록-프로토콜§!의 완료 비용은 §Y5천만 에너지§!이며, §G블록캣 동조§!가 §Y0%§!에서 시작할 것입니다\n\n§H§YNSC§!나 §YESC§!같은 강력한 모드가 있다면 밸런스가 맞습니다.§!"
 giga_blokkats_bismuth:0 "블록캣(§R비스무트 블록캣§!)\n블록캣이 §R확연히 더 강합니다.§!\n\n다음과 같은 효과를 받습니다:\n§Y무기 피해량 +200%\n함선 발사 속도 +200%\n함선 선체/장갑/보호막 내구도 +200%\n함선 속도 +50%\n거대 구조물 건설 속도 +50%\n지상군 피해량/체력/사기 +200%§!\n\n§Y블록캣-베스터§!가 §Y4 회§! 부활할 것이며 총 §Y2B§! 내구도를 가집니다.\n§Y블록-해체자§! 개수가 §Y2x§! 입니다.\n§Y초차원 불안정제§! 활성화의 기본 비용은 £energy£ §Y1.5M§!일 것입니다.\n\n호위 및 정찰 함대가 2.5배 더 거대해집니다\n블록캣 연구속도 §Y75%§! 더 느림\n\n§Y블록캣-베스터§!는 거대한 블록캣 함선인 §R블록-종결자§! §Y2 대§!에게 호위받습니다. 이 함선들은 각각 §Y한 번§! 부활하므로, 대략 1B의 내구도를 가집니다.\n\n§Y블록-프로토콜§!의 완료 비용은 §Y2억5천만 에너지§!이며, §G블록캣 동조§!가 §Y-50%§!에서 시작할 것입니다\n\n§H§YAncient Caches of Technologies§!와 같은 매우 강한 모드가 있다면 밸런스가 맞습니다.§!"
 giga_blokkats_endtech:0 "블록캣(§M엔드테크 블록캣§!)\n블록캣이 §M말도 안되게 더 강합니다.§! 그리고 그들의 채굴 작업을 보호할 적절한 전함을 보낼 것입니다.\n\n다음과 같은 효과를 받습니다:\n§Y무기 피해량 +1000%\n함선 발사 속도 +1000%\n함선 선체/장갑/보호막 내구도 +2000%\n함선 속도 +90%\n거대 구조물 건설 속도 +250%\n지상군 피해량/체력/사기 +1000%§!\n\n§Y블록캣-베스터§!가 §Y20 회§! 부활할 것이며 총 §Y8B§! 내구도를 가집니다.\n§Y블록-해체자§! 개수가 §Y3x§! 입니다.\n§Y초차원 불안정제§! 활성화의 기본 비용은 £energy£ §Y4M§!일 것입니다.\n호위 및 정찰 함대가 6배 더 거대해집니다\n블록캣 연구 속도 §Y250%§! 더 느림\n\n§Y블록캣-베스터§!가 §R블록-종결자§! §Y5§!개의 호위를 받습니다.\n§Y블록-해체자§!가 §R블록-종결자§! §Y2§!개의 호위를 받습니다.\n§Y정찰 함대§! 또한 각각 §R블록-종결자§! §Y한 개§!를 갖습니다.\n§R블록-종결자§!가 §Y4 회§! 부활하므로 총 §Y2.5B 내구도§!를 갖습니다.\n\n§R블록-종결자§!는 성계의 모든 식민지를 성계에 들어가는 즉시 §R파괴§!할 것입니다. 여러분의 행성에 가지 못하게 하세요!\n\n§Y블록-프로토콜§!의 완료 비용은 §Y10억 에너지§!이며, §G블록캣 동조§!가 §Y-100%§!에서 시작할 것입니다\n\n§H강력한 모드가 너무 많을 때 밸런스가 맞습니다!"
 giga_blokkats_deathmode:0 "블록캣 (§P파괴자 블록캣§!)\n블록캣이 플레이어 제국을 실제 위협이라 여기고 당신을 파괴하기 위해 상당한 군사력을 동원할 것입니다. §P무지막지하게 강하며§! 자신들의 채굴 활동을 지키기 위해 전함을 보낼 것입니다.\n\n다음과 같은 효과를 받습니다:\n§Y무기 피해량 +1000%\n함선 발사 속도 +1000%\n함선 선체/장갑/보호막 내구도 +2000%\n함선 속도 +150%\n거대 구조물 건설 속도 +250%\n지상군 피해량/체력/사기 +1000%§!\n\n§Y블록캣-베스터§!가 §Y100 회§! 부활할 것이며 총 §Y40B§! 내구도를 가집니다.\n§Y블록-해체자§! 개수가 §Y20대§! 입니다.\n§Y초차원 불안정제§! 활성화의 기본 비용은 £energy£ §Y20M§!일 것입니다.\n호위 및 정찰 함대가 §R블록-종결자§!로만 구성됩니다.\n블록캣 연구 속도 §Y600%§! 더 느림\n\n§Y블록캣-베스터§!가 §R블록-종결자§! §Y50§!개와 §P블록-말살자§! 1개의 호위를 받습니다.\n§Y블록-해체자§!가 §R블록-종결자§! §Y10§!개의 호위를 받습니다.\n§Y정찰 함대§! 또한 각각 §R블록-종결자§! §Y5 개§!를 갖습니다.\n§R블록-종결자§!가 §Y10 회§! 부활하므로 총 §Y5B 내구도§!를 갖습니다.\n§P블록-말살자§!가 §Y200 회§! 부활하므로 총 §Y100B 내구도§!를 갖습니다.\n\n§R블록-종결자§!는 성계의 모든 식민지를 성계에 들어가는 즉시 §R파괴§!할 것입니다. 여러분의 행성에 가지 못하게 하세요!\n\n§Y블록-프로토콜§!은 §R불가능§!합니다.\n\n§HOP 모드만 사용하셔야 합니다."
