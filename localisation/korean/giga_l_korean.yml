 edict_print_giga_preset_edict:0 "프리셋 프린터"
 edict_print_giga_preset_edict_desc:0 "현재 기가스트럭쳐 메뉴를 설정하는 데 필요한 코드를 game.log 파일로 인쇄합니다! 이 버튼을 클릭하면 시각적으로는 아무 일도 일어나지 않지만, §RDocuments > Paradox Interactive > Stellaris > logs§!로 이동하면 §Mgame§!라는 파일을 볼 수 있습니다! \n\n만약 당신이 패트리온이라면, 당신은 'bread:tm:#7255'로 파일을 보낼 수 있습니다. 또는 이 파일을 열고 ''현재 프리셋 설정 인쇄''를 검색한 다음 동일한 줄에 있는 ''현재 사전 설정 인쇄'' 앞의 모든 텍스트에서 텍스트 편집기를 사용하여 찾고 교체할 수 있습니다(타임스탬프 및 ''효과로 트리거된 로그 명령'' blah blah blah blah line: 1.). 남은 것은 ''현재 프리셋 설정 인쇄'' 다음에 디바이더, 필요한 모든 코드, 마지막에 다른 디바이더입니다(솔직히 뭔 소린지 모르겠는데 그냥 프리셋을 파일로 추출하는 방식 얘기인듯)!"
