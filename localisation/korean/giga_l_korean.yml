 zousa_name:0 "§Y소사§!"
 zousa_desc:0 "§L소사는 포탈을 열어 아공간을 통해 공간이동할 수 있는 능력을 가진 조류 생명체가 거주하는 곳입니다. 캇첸은 그들의 하이퍼 드라이브 구조를 간략화 하기 위해서 이들 생명체의 능력을 연구하는 중입니다.\n\n이 지역에는 소사의 기술을 기반으로 한 거대한 §Y점프 드라이브 스크램블러§!가 설치되어 있기 때문에, 유블리오 성계로 함선들이 점프해 들어올 수 없습니다.§!\n\n§B게릴라의 활동이 충분히 높아지면 점프 드라이브 스크램블러가 정지할 것입니다!§!"
