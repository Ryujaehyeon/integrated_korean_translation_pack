 PANZER_ARTILLERY_01:0 "우주전차포"
 PANZER_ARTILLERY_01_DESC:0 "전차 주포의 상위 버전입니다."
 katzen_troop_ship:0 "캇츠 컨스트럭터"
 katzen_troop_ship_plural:0 "캇츠 컨스트럭터"
 KATZEN_APC:0 "컨스트럭터 선체"
 GIGA_FLUSION_GUN_02:0 "캇첸 초거대 병기"
 GIGA_FLUSION_GUN_02_DESC:0 "재장전 시간이 더 짧은 상위 버전의 위성 방위 시스템 레일건입니다."
 GIGA_FLUSION_AUTOCANNON_02_DESC:0 "기존의 기관포보다 더 먼 거리까지 닿는 속사포입니다."
 katzen_warforge_platform:0 "캇첸 방어 배치"
 katzen_warforge_platform_plural:0 "캇첸 방어 배치"
 KATZEN_WARFORGE_PLATFORM:0 "워포지 기지 선체"
 KATZEN_PLANET_PLATFORM:0 "행성기지 기지 선체"
 katzen_assault_army:0 "캇첸 지상군"
 katzen_assault_army_desc:0 "행성 침공의 목적으로 지상에 상륙하기 위해 모집된 캇첸의 지상군입니다."
 katzenartig_disarray:0 "혼란의 제국"
 katzenartig_disarray_desc:0 "카이저 위성의 파괴로 그들의 국가는 혼란에 빠졌습니다."
 building_giga_katzen_capital:0 "캇첸 행성 행정 청사"
 building_giga_katzen_capital_desc:0 "행성의 지역 정부가 위치하고 있는 거대한 캇첸 복합단지입니다. 플러션의 중앙정부와 밀접하게 연결되어 있으며, 제국의 함대 기동과 자원 배분을 지원합니다."
 building_giga_katzen_terraformer:0 "캇첸 환경 재구성기"
 building_giga_katzen_terraformer_desc:0 "이 거대한 복합 구조물은 행성의 환경을 캇첸의 선호에 맞고 거주에 더 적합하게 조정하여, 식민지 설립을 더욱 용이하게 합니다."
 building_giga_katzen_synthetizer:0 "캇첸 거대정제소"
 building_giga_katzen_synthetizer_desc:0 "전략적 자원을 인공적으로 합성하기 위해 고안된 캇첸의 거대한 정제소 네트워크입니다."
 katzenartig_balance:0 "캇첸아르티히 제국 균형"
 katzenartig_balance_desc:0 "이 펑키한 고양이들의 호전적인 열정을 세심하게 조작합니다."
 resolution_galactic_focus_crisis_katzen:0 "캇첸아르티히 제국에 맞선 단결"
 resolution_galactic_focus_crisis_katzen_desc:0 "캇첸아르티히 제국은 은하계의 평화에 대한 위협입니다. 정신 나간 카이저와 그들이 온 은하계를 유리하기 전에 그들을 멈춰야 하며, 우리는 이를 위해 연합해야 합니다."
 resolution_galactic_focus_crisis_katzen_effect_success:0 "[global_event_country.GetGalCommunityOrGalImperium]의 모든 회원국이 서로 국경을 개방하고 전쟁을 위해 단결할 것입니다. §Y캇첸아르티히 제국§!에 대한 피해량이 §Y+25%§! 됩니다."
 resolution_category_katzen_focus:0 "캇첸아르티히 제국 관련"
 galactic_focus_crisis_katzen:0 "$TRIGGER_FAIL$캇첸아르티히 제국 타도"
 galactic_focus_crisis_katzen_desc:0 "캇첸아르티히 제국의 카이저를 멈춰야만 합니다. 우리는 연합하여, §Y플러션§!을 점령하거나 파괴함으로써 그들의 정복전쟁을 끝내야 합니다."
 galcom_gigas_threatened_katzen:0 "캇첸아르티히 제국에게 위협받음"
 galcom_gigas_not_threatened_katzen:0 "캇첸아르티히 제국에게 위협받지 않음"
 galcom_giga_at_war:0 "이미 전쟁으로 바쁩니다."
 giga_katzen.002.name:0 "캇첸아르티히 제국이 플러션 정복에 착수하다"
 giga_katzen.002.desc:0 "유블리오 성계에 있는 우리의 관측소에서는 프로젝트 몬트카노네를 시작한 캇첸 종족의 §Y캇첸아르티히 제국§!이 몇몇 열강들과의 전쟁을 선포하였다고 보고합니다.\n\n그들의 지도자, §Y카이저 캇테일§!은 플러션을 하나의 깃발 아래에 통합하기 위해서 \"대통합 성전\"을 시작하였습니다. 당연하게도, 그는 위성 방위 시스템을 이용해 대기권 밖에서 안전하게 적의 군대를 폭격하기 위해 임의로 사용하고 있습니다.\n\n그의 야망이 성공할 것인지 아닌지는 오직 시간만이 알려줄 것입니다."
 giga_katzen.002.a:0 "그에게 행운이 있기를!"
 giga_katzen.002.b:0 "이것이 그의 종말이 되기를."
 giga_katzen.002.c:0 "우리가 신경 쓸 일이 아니다."
 giga_katzen.004.name:0 "카이저 캇테일이 플러션을 통합하다!"
 giga_katzen.004.desc:0 "우리의 유블리오 관측소에서는 10년 동안의 끔찍한 전쟁 끝에, §Y카이저 캇테일§!이 이끄는 §Y캇첸아르티히 제국§!이 놀라운 승리와 함께 플러션의 원시사회를 통합하는데 성공했다고 보고합니다.\n\n그들의 상대적으로 진보한 기술 기반을 고려했을 때, 그들의 전쟁은 매우 치열했으며, 사실상 현대의 우주 시대 전투와 비슷했습니다. 카이저는 프로젝트 몬트카노네와 함께 초기 형태의 우주군을 운용했고, 이것이 그가 행성을 통합하는데 많은 도움을 주었습니다.\n\n행성을 통합합으로써 캇첸 종족은 더 많은 자원과 인력을 소유하게 되었고, 그들의 지배를 굳이려 노력하고 있습니다. 캇첸아르티히 제국이 밖을 보기 시작한 것처럼 보이지만, 카이저의 다음 시도가 어디로 향할 것인지는 오직 시간만이 알려줄 것입니다..."
 giga_katzen.004.a:0 "축하할 일이군."
 giga_katzen.004.b:0 "빌어먹을 쥐새끼들!"
 giga_katzen.004.c:0 "독특하군, 하지만 흥미로워."
 giga_katzen.011.name:0 "캇첸아르티히 제국이 FTL 기술을 얻어내다"
 giga_katzen.011.desc:0 "§Y캇첸아르티히 제국§!의 §Y플러션§! 정복 이후, 그들은 군비를 대폭 확장하였고, 그들의 우주군으로써 다수의 우주함선을 건조하였습니다. 그리고 그들은 마침내 초광속 여행 기술을 알아낸 것으로 보입니다.\n\n엔지니어링에서의 놀랄만한 업적 속에 그들은 플러션의 수많은 자원을 그들의 위성 방위 시스템을 개량하는데 사용하였고, 아광속과 초광속 비행이 모두 가능하도록 개조하였습니다.\n\n이제 우주여행이 가능한 문명이라는 점을 고려하여, 그들은 우리에게 §Y유블리오 성계§!를 그들에게 양도하라는 요청의 메시지를 직접 전달하였습니다..."
 giga_katzen.011.a:0 "화면에 띄워라."
 giga_katzen.0100.name:0 "캇첸아르티히 제국"
 giga_katzen.0100.desc:0 "§Y유블리오§! 성계의 §Y캇첸§! 종족이 FTL 기술을 얻게 되었다는 뉴스가 전달되었습니다. \n\n원시사회에서 FTL 기술을 취득하는 것은 그리 걱정할 일은 아니지만, 그들 종족이 가지고 있는 그 이상의 기술을 이용하여 하이퍼 드라이브를 개발하기도 전부터 막대한 양의 자원을 무기에 투자했습니다. 그렇기 때문에 그들은 이제 우리와 동등하거나 그 이상일 수 있는 함대를 가지고 성계 제국의 단계로 올라섰습니다.\n\n더 걱정스러운 것은 §Y카이저 캇테일§!이 이끄는 §Y캇첸아르티히 제국§!이 그들의 작은 위성을 거대한 무장 함선으로 개조했다는 것입니다! §Y카이저 위성§!이라고 이름지어진 이 초강력 무기는 그들이 마주친 모든 것을 분쇄해버릴 것입니다.\n\n은하계에 대한 새로운 위협을 다룰 때에는 조심하는 것이 현명할 것입니다. 또한 그들은 온 은하계에 메시지를 보내고 있고, 우리도 얼마 전에 이를 받았습니다..."
 giga_katzen.0100.a:0 "걱정되는군. 화면에 띄워라."
 giga_katzen.0101.name:0 "통신 수신!"
 giga_katzen.0101.desc:0 "은하계의 외계인들이여.\n\n나는 우리의 통치자 §Y카이저 캇테일§!께서 우리의 목적을 전달하기 위해 보내신 §Y더클로우 맥캐서§!다. 우리와 우리의 카이저를 존중하라. 그렇다면 우리는 협력할 수 있을 것이다. 하지만 우리가 필요하다고 생각한다면 전쟁을 하는 것에도 주저하지 않을 것이다.\n\n너희의 국가들과 협력하는 미래와, 평화와 번영이 지속될 질서를 바란다.\n\n카이저께서는 너희가 우리를 실망시키지 않기를 바라신다."
 giga_katzen.0101.a:0 "고려해봐야겠군."
 giga_katzen.012.name:0 "통신 수신!"
 giga_katzen.012.a.desc:0 "외계인들이여!\n\n당연히 너희들이 이미 알아차린 것처럼, 우리 종족은 마침내 초광속 여행이 가능하게 되었다. 그렇기 때문에 우리의 성계에 대한 적법한 소유권을 받았으면 한다.\n\n너희 종족이 과거에 우리를 도와줬었기 때문에, §Y카이저 캇테일§!께서는 너희들에게 다음의 거래를 제안하신다: 우리가 §Y유블리오 성계§!에 대한 완전한 통치권을 받는 대신, 너희 종족에게 §W7500§! £energy£와 §W2500§! £alloys£를 주는 것이지.\n\n공평하다고 생각하지 않나? 필요하다면 우리는 성계를 얻어내기 위해 싸우길 주저하지 않을 것임을 알아두어라."
 giga_katzen.012.a:0 "훌륭한 거래군! 받아들이겠다."
 giga_katzen.012.a.response:0 "훌륭해! 카이저께서는 당신 종족이 여전히 관대하다는 것을 알고 기뻐하실 것이다."
 giga_katzen.012.a.tooltip:0 "§Y유블리오 성계§!를 캇첸아르티히 제국에 §G양도§!할 것입니다."
 giga_katzen.012.b.desc:0 "반갑네, 외계인들이여. 나는 우리의 카이저로부터 너희들과 이야기하기 위해 보내진 §Y더클로우 맥캐서§!다.\n\n당연하게도 너희들이 이미 알아차린 것처럼, 우리 종족은 마침내 초광속 여행이 가능하게 되었다. 그렇기 때문에 우리의 성계에 대한 적법한 소유권을 받았으면 한다.\n\n우리의 지도자, 위대한 통합자이신 §Y카이저 캇테일§!께서는 너희들에게 거래를 제안하기로 결정하셨다: 우리는 너희 종족에게 §W2500§! £energy£와 §W1000§! £alloys£를 주고, §Y유블리오 성계§!에 대한 완전한 통치권을 받는 것이지.\n\n너희들에게도 괜찮아 보였으면 좋겠지만, 필요하다면 우리는 성계를 얻기 위해서 싸우길 주저하지 않을 것임을 생각하게나."
 giga_katzen.012.b:0 "좋은 거래군. 받아들이겠다."
 giga_katzen.012.b.response:0 "훌륭해! 카이저께서는 너희 종족이 여전히 협력적이라는 것을 알고 기뻐할 것이다."
 giga_katzen.012.c.desc:0 "외계인들이여.\n\n당연하게도 너희들이 이미 알아차린 것처럼, 우리 종족은 마침내 초광속 여행이 가능하게 되었다. 그렇기 때문에 우리의 성계에 대한 적법한 소유권을 받았으면 한다.\n\n일전 너희들이 우리와 적대하였기 때문에, §Y카이저 캇테일§!께서는 너희들이 §Y유블리오 성계§!를 곧바로 넘겨줄 것을 요구하신다. 그렇지 않다면 너희 종족에 대해서 복수할 것이다."
 giga_katzen.012.c:0 "받아들이지 않을 수가 없군."
 giga_katzen.012.c.response:0 "너희 종족이 도리를 안다는 것에 카이저께서 기뻐하실 것이다."
 giga_katzen.012.d:0 "아니, 이 성계는 우리의 것이다."
 giga_katzen.012.d.response:0 "좋아. 그렇다면 전장에서 만나지."
 giga_katzen.012.d.tooltip:0 "§Y캇첸아르티히 제국§!이 §R적대적§!으로 변할 것이고 당신의 성계를 점령하려고 할 것입니다."
 giga_katzen.013.name:0 "캇첸아르티히 제국이 공격하다!"
 giga_katzen.013.desc:0 "우리가 §Y유블리오 성계§!의 양도를 거부한 이후, 캇첸아르티히 제국은 그들의 함대를 기동하였고, 성계의 항성 기지를 공격하였습니다! 이제 우리 두 제국 사이에 전쟁이 시작되었습니다..."
 giga_katzen.013.a:0 "이런."
 giga_katzen.014.name:0 "통신 수신!"
 giga_katzen.014.desc:0 "외계인들이여. 우리는 유블리오 성계를 점령하였고, 우리의 목적을 달성하였다.\n\n그렇기 때문에 카이저께서는 이 갈등을 끝내기 위해 너희에게 평화를 제안하신다.현재의 국경이 유지될 것이고, 우리는 더 이상 너희들을 공격하지 않겠다."
 giga_katzen.014.a:0 "받아들이겠다."
 giga_katzen.014.a.tooltip:0 "캇첸 아르티히 제국에 §Y유블리오 성계§!와 모든 §Y점령당한 성계§!을 §G양도§!할 것입니다.\n\n§Y카이저의 우호도§!가 §G증가§!할 것입니다."
 giga_katzen.014.a.response:0 "너희 종족이 도리를 아는 것에 카이저께서 기뻐하실 것이다."
 giga_katzen.014.b:0 "우리는 절대 항복하지 않겠다!"
 giga_katzen.014.b.tooltip:0 "캇첸아르티히 제국과 마지막까지 싸울 것입니다."
 giga_katzen.014.b.response:0 "최소한의 시도는 했다."
 giga_katzen.020intro.desc:0 "우리 캇첸 종족은 너희들을 환영한다, 외계인들이여. 나는 우리의 위대한 지도자 §Y카이저 캇테일§!을 대표해서 이 자리에 나온 §Y더클로우 맥캐서§!다.\n\n외교적 수단을 받아들이기는 하겠지만, 만약에 필요하다면 너희 종족에게 무기를 드는 것을 주저하지 않을 것임을 알아두어라."
 giga_katzen.020.name:0 "캇첸아르티히 제국"
 giga_katzen.020aally.desc:0 "안녕하신가, [Root.GetSpeciesName]들이여! 카이저께서는 당신들 종족에 대한 소식을 듣는 것에 언제나 기뻐하신다. 그분께서는 너희들에 대해 많이 이야기하시지."
 giga_katzen.020bally.desc:0 "카이저께서는 우리가 군사 동맹을 수립한 것에 기뻐하신다. 그분께서는 너희들이 존경 받아야 한다고 여기시지."
 giga_katzen.020cally.desc:0 "[Root.GetSpeciesName]들이여! 별이 타버리고 없어질 때까지 우리 동맹이 지속되기를 바란다."
 giga_katzen.020aneutral.desc:0 "안녕하신가, 외계인들이여. 영토 거래가 가능한지 이야기하기 위해서 왔는가? 음? 그건 자원을 벌어들이는데 매우 유익한 방법이지, 안 그런가?"
 giga_katzen.020bneutral.desc:0 "안녕하신가. 새로운 소식이 있는가? 카이저께서는 좋은 소식만 원하시지."
 giga_katzen.020cneutral.desc:0 "카이저께서는 너희들 종족과 좋은 관계를 유지하기를 원하시지. 우리를 실망시키지는 않겠지, 그렇지 않은가?"
 giga_katzen.020ahappy.desc:0 "아, [Root.GetName]들이여! 카이저께서는 너희들 종족과 협상하는 것에 기뻐하신다. 그분께서는 자원과 영토를 거래하기를 기대하고 계시지. 특히 영토말이네."
 giga_katzen.020bhappy.desc:0 "너희 제국은 잘 굴러가고 있는가, [Root.GetSpeciesNamePlural]들이여? 카이저께서는 너희의 제국이 잘 굴러가고 있기를 바라신다."
 giga_katzen.020chappy.desc:0 "카이저께서 너희들에 대해서 자주 이야기하신다, [Root.GetName]들이여. 그분께서는 너희들을 신뢰할 만한 종족이라고 여기시지."
 giga_katzen.020aangry.desc:0 "[Root.GetName]들이여. 우리가 갈등을 두려워하지 않는다는 것을 알아두어라. 카이저께서는 너희 제국을 지도에서 지우고 우리 제국으로 대체하는 걸 더 좋아하실 거다."
 giga_katzen.020bangry.desc:0 "영토를 넘기려 왔는가? 카이저께서도 그러기를 바라고 계시지. 그렇지 않다면, 우리가 직접 너희들에게서 가져갈 것이다."
 giga_katzen.020cangry.desc:0 "알고 있는가? 카이저께서는 너희 정부가 얼마나 비열한지 자주 말씀하신다. 그리고 그분이 옳다."
 giga_katzen.020awar.desc:0 "우리가 너희 문명을 역사에서 쓸어낼 거대한 파도다. 그리고 카이저께서는 그 파도를 조종하시는 걸 좋아하실 것이다."
 giga_katzen.020bwar.desc:0 "너희들은 기회가 있었지, [Root.GetSpeciesNamePlural]이여. 이제 행동할 시간이다."
 giga_katzen.020cwar.desc:0 "카이저께서는 너희의 국민들을 너희의 멍청한 정부로부터 해방시키기를 기다리고 계시지. 그들은 카이저를 사랑하는 법을 배우게 될 것이다."
 giga_katzen.020.kaiserhappy4:0 "§Y카이저의 우호도§!: 4|매우 고무된"
 giga_katzen.020.kaiserhappy3:0 "§Y카이저의 우호도§!: 3|매우 우호적인"
 giga_katzen.020.kaiserhappy2:0 "§Y카이저의 우호도§!: 2|우호적인"
 giga_katzen.020.kaiserhappy1:0 "§Y카이저의 우호도§!: 1|다정한"
 giga_katzen.020.kaiserneutral:0 "§Y카이저의 우호도§!: 0|무관심한"
 giga_katzen.020.kaiserangry1:0 "§Y카이저의 우호도§!: -1|불쾌한"
 giga_katzen.020.kaiserangry2:0 "§Y카이저의 우호도§!: -2|화난"
 giga_katzen.020.kaiserangry3:0 "§Y카이저의 우호도§!: -3|격노한"
 giga_katzen.020.kaiseropinion:0 "§T우리에 대한 §Y카이저의 우호도§!는 §E4|매우 고무된§! 상태에서부터 §R-3|격노한§! 상태까지 다양하게 존재합니다.\n\n캇첸아르티히 제국에 우호적으로 혹은 대항하는 특정한 행동을 함으로써 카이저의 우호도를 변경할 수 있습니다.\n\n격노한 카이저는 우리에게 자동으로 §R전쟁을 선포§!할 것이며, 반대로 매우 고무된 카이저와는 §E동맹을 형성§!할 수도 있을 것입니다.§!"
 giga_katzen.020.war:0 "이미 충분히 했다, §R이제 전쟁이다!§!"
 giga_katzen.020.war.tooltip:0 "§T§R캇첸아르티히 제국에 총력전을 선포할 것입니다.§!\n\n§Y카이저의 우호도§!는 §R격노한§! 상태로 §R감소§!할 것입니다.\n\n최소 §Y2.5년의 전쟁 이후§!에야 평화가 가능할 것입니다.\n\n캇첸아르티히 제국을 물리치기 위해서는 §Y플러션§!이 §Y점령§!되거나 §Y파괴§!되어야 합니다.§T"
 giga_katzen.020.war.response:0 "좋아.\n\n전쟁을 원한다면 전쟁을 하자, 외계인들이여."
 giga_katzen.020.peace:0 "§B평화협정 제안§!"
 giga_katzen.020.peace.tooltip:0 "§T§B캇첸아르히티 제국과 휴전을 협정할 것입니다.§!\n\n§Y카이저의 우호도§!는 §H화난§! 상태로 §G상승§!할 것입니다.\n\n모든 §Y현재 국경§!이 유지될 것입니다.§!"
 need_katzen_war_10_years:0 "캇첸 종족은 §Y2.5년§Y의 전쟁 이후에나 평화협정에 서명하려고 할 것입니다."
 giga_katzen.020.peace.response:0 "뭐, 평화? 카이저께서는 우리 두 종족이 마침내 합의를 본 것에 매우 기뻐하실 것이다!"
 giga_katzen.020.a:0 "안녕히."
 giga_katzen.021.name:0 "제국과의 전쟁"
 giga_katzen.021.desc:0 "캇첸과의 전쟁을 선포함에 따라, 두 종족은 공식적으로 전쟁에 들어갔습니다. 현재 캇첸들은 함대를 동원하고 있으며 곧 전투가 발생할 것입니다.\n\n캇첸은 최소 10년의 이후에나 평화를 받아들일 것이며, 그 때까지는 어떠한 외교 협상도 가능하지 않을 것입니다."
 giga_katzen.021.a:0 "우리가 그들을 끝낼 것이다."
 giga_katzen.022.name:0 "캇첸-[Root.GetSpeciesName] 평화협정"
 giga_katzen.022.desc:0 "캇첸과의 오랜 전쟁 끝에, 십수 년의 갈등을 끝낼 평화 협정에 사인할 수 있게 되었습니다.\n\n우리와 캇첸아르티히 제국 사이의 적대 행위는 중단되었고, 현재의 국경이 공식적으로 확정되었습니다. 전쟁이 끝났기 때문에 카이저와의 협상이 가능할 것입니다."
 giga_katzen.022.a:0 "좋은 결과군."
 giga_katzen.020.buy:0 "당신들의 함선을 구매할 수 있을까?"
 giga_katzen.020.buy.tooltip:0 "§Y캇첸아르티히 제국§!으로부터 특별한 함선을 구매할 수 있습니다. 이는 §Y카이저의 우호도§!를 약간 §G향상§!시킬 수도 있습니다."
 cant_recently_bought_ships:0 "6개월마다 한 번씩만 캇첸의 함선을 구매할 수 있습니다."
 cant_already_buy_katzen_ships:0 "이미 캇첸의 함선을 주문했습니다."
 cant_kaiser_opinion_too_low:0 "우리에 대한 카이저의 우호도가 너무 낮습니다. 카이저의 우호도가 -1 이상인 경우에만 함선을 판매할 것입니다."
 giga_katzen.02011.name:0 "캇첸 함선 구매"
 giga_katzen.02011.desc:0 "카이저께서는 너희 종족에게 우리의 진보한 군함을 판매하고자 하신다. 우리는 여러 함급이 있으니 마음대로 골라도 좋다. 물론, 우리의 엔지니어링에 대해서 당신들이 편하게 정보를 얻게 하지 않도록 우리의 정규 함선들과는 다르게 건조할 것이다.\n\n...\n\n그리고 카이저 위성은 판매하지 않는다."
 giga_katzen.02011.a:0 "§B캇첸 우주전차§! 5척 | §Y5000§! £energy£"
 giga_katzen.02011.a.tooltip:0 "민첩하고 날샌 장갑 전투함인 §B캇첸 우주전차§! 5척의 함대를 구매할 것입니다. \n§Y카이저의 우호도§!가 15%의 확률로 §G향상§!될 수 있습니다.$attache_boost_chance$"
 giga_katzen.02011.b:0 "§B캇첸 공허폭격기§! 3척 | §Y10000§! £energy£"
 giga_katzen.02011.b.tooltip:0 "장거리 미사일을 탑재한 기동 폭격기인 §B캇첸 공허폭격기§! 3척의 함대를 구매할 것입니다.\n§Y카이저의 우호도§!가 20%의 확률로 §G향상§!될 수 있습니다.$attache_boost_chance$"
 giga_katzen.02011.c:0 "§B캇첸 순양함§! 1척 | §Y15000§! £energy£"
 giga_katzen.02011.c.tooltip:0 "외계의 적을 타격할 수 있는 거대하지만 균형잡힌 군함, §B캇첸크루저§!를 1척 구매할 것입니다.\n§Y카이저의 우호도§!가 25%의 확률로 §G향상§!될 수 있습니다.$attache_boost_chance$"
 giga_katzen.02011.response:0 "훌륭한 선택이군! 다음 달 안으로 당신들의 수도성계에 배달하도록 하겠다."
 giga_katzen.02011.bye:0 "아무것도 아니다."
 giga_katzen.02012.name:0 "캿첸 함선 도착!"
 giga_katzen.02012.desc:0 "약속한 대로 카이저는 우리의 수도 성계에 주문한 함선들을 배달했습니다. 함선들은 우리군에 공식적으로 합류하였고, 우리 임의로 사용할 수 있습니다.\n\n캇첸의 함선을 더 구매하기 위해서는 6개월을 더 기다려야 할 것입니다."
 giga_katzen.02012.a:0 "좋아."
 giga_katzen.020.ally:0 "§E동맹§!에 대해서 협상하고 싶다."
 giga_katzen.020.ally.tooltip:0 "카이저가 우리에게 매우 우호적이라면, §Y캇첸아르티히 제국§!과 §E동맹§!을 맺을 수도 있을 것입니다.\n\n그들의 전쟁에 참전해야만 하지만, 그들의 지원을 부르는 것도 가능할 것입니다."
 need_elated_kaiser:0 "동맹을 맺기 위해서는 §Y카이저의 우호도§!가 §E4|매우 고무된§! 상태여야 합니다."
 giga_katzen.020.ally.response:0 "동맹 말인가? 우리 종족 사이의 좋은 관계를 고려한다면, 카이저께서는 당신 종족과의 강력한 군사 동맹을 맺는 것에 매우 기뻐하실 거라고 확신한다네, 외계인들이여.\n\n일주일 내로 더 자세한 동맹 협정을 가지고 돌아오겠다."
 giga_katzen.3000.name:0 "플러션 협정 기구"
 giga_katzen.3000.desc:0 "§Y카이저 캇테일§!은 두 제국 사이의 동맹과 관련하여 우리에게 외교 통신을 보내왔습니다. §Y플러션 협정 기구§!라는 이름의 이 동맹은 다음의 조건을 포함하고 있습니다:\n\n-우리와 캇첸 종족은 서로에 대해 전쟁을 선포하지 않는다.\n-우리는 캇첸 종족의 모든 분쟁에 참여한다.\n-우리는 필요할 때 캇첸 종족에게 도움을 구할 수 있다.\n-우리와 캇첸 종족은 더 높은 수준의 군사적, 과학적, 경제적 협력을 유지한다.\n-카이저는 더 이상 우리에게 영토를 요구하지 않는다.\n-군사적 보호를 위해 우리 함대의 5%를 캇첸 종족에게 기여한다.\n\n협정의 조건들을 위반할 수는 있지만, 그렇게 함으로써 우리에 대한 §Y카이저의 우호도§!가 §R감소§!할 수 있습니다. 카이저의 우호도가 §B3|우호적인§!보다 아래로 내려갈 경우에는 동맹을 파기할 수도 있습니다.\n\n받아들이겠습니까?"
 giga_katzen.3000.a:0 "함께함으로써 우리는 절대 패배하지 않을 것이다!"
 giga_katzen.3000.a.tooltip:0 "§Y캇첸아르티히 제국§!과 동맹을 맺을 것이고, §Y플러션 협정 기구§!에 가입할 것입니다.\n우리는 즉시 캇첸 종족의 전쟁에 소환될 것입니다.\n우리는 그들과의 외교 화면을 통해 언제든지 캇첸 종족을 우리의 전쟁에 소환할 수 있습니다.\n§R우리 혹은 카이저가 동맹을 깬다면 다시 동맹을 맺을 수 없습니다!§!"
 giga_katzen.3000.b:0 "다시 생각해보니, 아무것도 아니군."
 giga_katzen.3000.b.tooltip:0 "§Y캇첸아르티히 제국§!과 동맹을 맺지 않을 것입니다.\n우리에 대한 §Y카이저의 우호도§!가 §R감소§!할 것입니다."
 giga_katzen.3001.name:0 "§Y[new_katzen_ally.GetName]§!(이)가 §Y플러션 협정 기구§!에 가입하였습니다."
 giga_katzen.3001.desc:0 "§Y[new_katzen_ally.GetName]§!와(과) §Y캇첸아르티히 제국§!이 §Y플러션 협정 기구§!라는 이름의 동맹을 형성하였다는 소식입니다. 이 동맹은 그들이 언제나 캇첸을 소환할 수 있고, 두 국가가 더 높은 수준의 군사적, 과학적, 경제적 협력을 이룰 것입니다."
 giga_katzen.3001.a:0 "캇첸 종족의 세력이 확장되겠군."
 need_at_war_katzen:0 "캇첸 종족 없이 전쟁을 해야 겠군."
 giga_katzen.020.calltoarms:0 "당신들이 우리의 전쟁에 참여해 줘야 겠다."
 giga_katzen.020.calltoarms.tooltip:0 "§Y캇첸아르티히 제국§!이 우리와 전쟁 중에 있는 모든 국가에 §R전쟁을 선포§!할 것입니다. 그들과 적국 사이의 평화는 가능하지 §R않을§! 것입니다."
 giga_katzen.020.calltoarms.response:0 "그렇다면, 좋네! 당신들의 은하계 정복을 지원하지, 외계인들이여."
 giga_katzen.020.noally:0 "이 동맹은 끝이네, 캇첸들이여."
 giga_katzen.020.noally.tooltip:0 "§Y플러션 협정 기구§!에서 §R탈퇴§!할 것입니다.\n\n카이저는 이를 좋아하지 않을 것이고, 우리에 대한 §Y카이저의 우호도§!가 상당히 §R감소§!할 것입니다. 우리의 동맹이 가까웠던 만큼 더 감소할 것입니다."
 giga_katzen.020.noally.response:0 "동맹을 깨길 원하는 건가, 외계인들이여?\n\n좋아. 너희들이 방향을 달리하고자 한다면 그렇게 하지. 이해한다.\n\n하지만 카이저께서는..."
 fto_member:0 "플러션 협정 기구 회원국"
 fto_member_desc:0 "우리는 캇첸 종족을 중심으로 한 군사동맹인 플러션 협정 기구의 회원국입니다. 그들은 군사적 보호를 제공하고, 우리의 군사적, 과학적 발전에 기여합니다."
 fto_member_1:0 "플러션 협정 기구 회원국"
 fto_member_1_desc:0 "우리는 캇첸 종족을 중심으로 한 군사동맹인 플러션 협정 기구의 회원국입니다. 그들은 군사적 보호를 제공하고, 우리의 군사적, 과학적 발전에 기여합니다."
 fto_member_2:0 "플러션 협정 기구 회원국"
 fto_member_2_desc:0 "우리는 캇첸 종족을 중심으로 한 군사동맹인 플러션 협정 기구의 회원국입니다. 그들은 군사적 보호를 제공하고, 우리의 군사적, 과학적 발전에 기여합니다."
 fto_member_3:0 "플러션 협정 기구 회원국"
 fto_member_3_desc:0 "우리는 캇첸 종족을 중심으로 한 군사동맹인 플러션 협정 기구의 회원국입니다. 그들은 군사적 보호를 제공하고, 우리의 군사적, 과학적 발전에 기여합니다."
 fto_member_4:0 "플러션 협정 기구 회원국"
 fto_member_4_desc:0 "우리는 캇첸 종족을 중심으로 한 군사동맹인 플러션 협정 기구의 회원국입니다. 그들은 군사적 보호를 제공하고, 우리의 군사적, 과학적 발전에 기여합니다."
 giga_katzen.3002.name:0 "카이저가 우리를 플러션 협정 기구에서 추방합니다!"
 giga_katzen.3002.desc:0 "긴급 소식입니다. 우리의 최근 행동이 §Y카이저§!를 화나게 한 것 같고, 그는 우리 동맹을 파기하기로 결정하였습니다.\n\n우리는 §Y플러션 협정 기구§!로부터 사실상 추방되었고, 우리에 대한 §Y카이저의 우호도§!는 상당히 감소했습니다."
 giga_katzen.3002.a:0 "수치스런 일이군. 어쨋든 더 이상 그가 필요하지 않았다."
 cant_katzen_fed:0 "연방의 회원국인 경우에는 캇첸 종족과 동맹을 맺을 수 없습니다."
 cant_katzen_subject:0 "종속국인 경우에는 캇첸 종족과 동맹을 맺을 수 없습니다."
 giga_katzen.3003.name:0 "플러션 협정 기구가 붕괴하다!"
 giga_katzen.3003.desc:0 "§Y카이저 위성§!의 파괴로 §Y캇첸아르티히 제국§!은 혼란에 빠져들었습니다. 결과적으로, §Y플러션 협정 기구§!는 완전히 붕괴되었고, 사실상 존재하지 않게 되었습니다.\n\n캇첸 종족으로부터 더 이상 군사적 원조를 받을 수 없을 것이고, 카이저는 우리의 신호에 반응하지 않을 것입니다."
 giga_katzen.3003.a:0 "유감이군."
 giga_katzen.3010.name:0 "카이저가 더 긴밀한 경제적 협력을 제안하다"
 giga_katzen.3010.desc:0 "§Y플러션 협정 기구§!의 두 회원국 사이의 경제적 유대를 강화하자고 하는 §Y카이저 캇테일§!로부터의 통신을 받았습니다.\n\n캇첸 종족은 우리의 정박지 시설을 더 많이 사용할 수 있게될 것이고, 우리는 추가적인 연구 보조금과 군사 장비를 받을 수 있을 것입니다. 받아들이겠습니까?"
 giga_katzen.3010.a:0 "얼마나 친절한 것인가."
 giga_katzen.3010.a.tooltip:0 "§Y플러션 협정 기구§!의 회원국으로써 우리와 캇첸 사이의 협력 정도가 §G상승§!할 것입니다."
 giga_katzen.3010.b:0 "거절한다."
 giga_katzen.3010.b.tooltip:0 "§Y카이저§!는 우리를 §Y플러션 협정 기구§!에서 추방할 것입니다. 그리고 그의 우호도가 §R감소§!할 것입니다."
 giga_katzen_external_leader_trigger:0 "$trigger_success$§Y플러션 협정 기구§!의 일부 입니다."
 giga_katzen.3011.name:0 "카이저가 더 강화된 군사 협력을 제안하다"
 giga_katzen.3011.desc:0 "§Y카이저 캇테일§!은 우리에게 §Y플러션 협정 기구§! 사이에 더 강화된 수준의 군사 협력을 제안하는 통신을 보내왔습니다.\n\n그는 우리가 캇첸 종족에게 더 많은 항구 시설을 개방하고, 대신에 캇첸의 기밀 군사 지식과 군수품을 받아가라고 제안하였습니다.\n\n그는 또한 우리의 함대가 양측 해군의 이익을 위해 협동 군사 훈련에도 참여할 수 있다고 이야기했습니다. 그의 요구를 받아들이겠습니까?"
 giga_katzen.3011.a:0 "좋은 제안이군."
 giga_katzen.3011.a.tooltip:0 "§Y플러션 협정 기구§!의 회원국으로써 캇첸 종족과의 협력의 정도가 §G상승§!할 것입니다."
 giga_katzen.3011.b:0 "뭘 하고 있는지 생각은 하고 있는 건가? 거절한다!"
 giga_katzen.3011.b.tooltip:0 "§Y카이저§!는 우리를 §Y플러션 협정 기구§!에서 추방할 것입니다. 그리고 그의 우호도가 상당히 §R감소§!할 것입니다."
 giga_katzen.3012.name:0 "카이저가 캇첸 사관을 제공하다"
 giga_katzen.3012.desc:0 "§Y카이저§Y는 강화된 군사 협력 노력에 더해, 더 많은 기술적 교류와 군사적 투자, 우리 함대를 위한 캇첸 사관을 제공하겠다고 제안하였습니다.\n\n심지어 그는 우리에게 캇첸의 군사 기록 보관소 대부분에 대한 접근권한을 제공하고, 우리의 군대가 캇첸의 행성에서 열병식을 할 수 있게 허용하고, 우리 협력을 강화하기 위해 일일 군사 훈련과 군사 회의를 제안하였습니다.\n\n받아들이겠습니까?"
 giga_katzen.3012.a:0 "당연하지! 얻을 것밖에 없는 제안이다."
 giga_katzen.3012.a.tooltip:0 "§Y플러션 협정 기구§1의 회원국으로써 캇첸 종족과의 협력 정도가 §G증가§!할 것입니다.\n2명의 §Y캇첸 제독§Y이 지도자 풀에 합류할 것입니다."
 giga_katzen.3012.b:0 "캇첸 종족의 제안이라면 충분하다!"
 giga_katzen.3012.b.tooltip:0 "§Y카이저§!가 우리를 §Y플러션 협정 기구§!에서 §R추방§!할 것입니다. 그리고 그의 우호도가 매우 상당히 §R감소§!할 것입니다."
 giga_katzen.3013.name:0 "카이저가 군사 연합을 제안하다"
 giga_katzen.3013.desc:0 "§Y카이저§!는 우리의 사령부를 실질적으로 융합하는 굵직한 제안을 가지고 우리에게 연락하였습니다. 이 제안을 통해 우리는 실질적으로 캇첸의 모든 지식을 얻을 수 있고, 우리군을 관리하는데 그들로부터 어마어마한 도움을 받을 수 있을 것입니다.\n\n이 제안의 장점은 거대하고, 캇첸 종족은 우리 함대를 이끌 제독과 지상군을 이끌 장군을 더 많이 보내기로 동의하였습니다.\n\n받아들이겠습니까?"
 giga_katzen.3013.a:0 "분명히 이득이 될 만한 어마어마한 프로젝트다!"
 giga_katzen.3013.a.tooltip:0 "§Y플러션 협정 기구§!의 회원국으로써 캇첸 종족과의 협력 정도가 §G증가§!할 것입니다.\n4명의 §Y캇첸 제독§!과 2명의 §Y캇첸 장군§!이 지도자 풀에 합류할 것입니다."
 giga_katzen.3013.b:0 "멍청한 제안이군."
 giga_katzen.3013.b.tooltip:0 "§Y카이저§!는 우리를 §Y플러션 협정 기구§!에서 §R추방§!할 것입니다. 그리고 그의 우호도가 극심하게 §R감소§!할 것입니다."
 giga_katzen.3014.name:0 "카이저가 연방화를 요구하다"
 giga_katzen.3014.desc:0 "§Y카이저§!는 §Y플러션 협정 기구§!를 더 위대한 §Y캇첸아르티히 제국§!의 연방으로 하는 것을 요구하는 시급한 외교 통신을 보내왔습니다.\n\n이를 수용하는 것은 우리가 캇첸아르티히 제국에 실질적으로 완전하고 총체적으로 합병되는 것을 의미합니다. 이는 우리가 얼마나 많은 통제권을 캇첸 종족에 양도했는지를 고려한다면 예상할 수 있었던 결과입니다."
 giga_katzen.3014.a:0 "뭐라고? 이건 우리가 동의한 바가 아니다!"
 giga_katzen.3014.a.tooltip:0 "§Y플러션 협정 기구§!에서의 모든 권리를 §R버리고§!, 협정 기구에서 §R탈퇴§!할 것입니다.\n\n카이저는 §R분노§!할 것이고, §Y캇첸아르티히 제국§!이 한달 내로 우리에게 §R전쟁을 선포§!할 것입니다."
 giga_katzen.3014.b:0 "항복하겠다."
 giga_katzen.3014.b.tooltip:0 "§R당신의 게임이 끝날 것입니다.§!\n§Y캇첸아르티히 제국§!에 완전히 합병될 것입니다."
 katzen_breakup:0 "캇첸이 파열하다"
 katzen_breakup_desc:0 "우리에게 군장비를 지원하고 연구를 지원하던 캇첸과의 동맹을 갑작스럽고 난폭하게 파기하였습니다. 이는 우리 제국에 현저한 결과를 가져올 것입니다."
 giga_katzen.3015.name:0 "캇첸 제독들이 이탈하다!"
 giga_katzen.3015.desc:0 "§Y캇첸아르티히 제국§!과의 전쟁이 발발하자, 우리가 캇첸으로부터 받은 캇첸 제독과 장군들이 우리 군에서 이탈하여 제국의 그들 캇첸에 다시 합류하였습니다!\n\n그들 없이 전쟁을 치뤄야 할 것 같습니다..."
 giga_katzen.3015.a:0 "이 쥐새끼들!"
 giga_katzen.3015.a.tooltip:0 "제국 출신의 모든 캇첸 지도자가 우리 지도자 풀에서 §R제거§!됩니다."
 giga_katzen.020.trade:0 "영토 거래에 대해서 이야기하고 싶다..."
 giga_katzen.020.trade.tooltip:0 "카이저에게 우리 성계의 구매를 제안할 수 있습니다. §Y캇첸아르티히 제국§!과의 국경에 있는 4개의 성계가 무작위로 선택되고, 카이저에게 구매를 제안할 수 있습니다."
 cant_trade_katzen_war:0 "전쟁 중에는 거래할 수 없습니다."
 need_border_with_katzen:0 "캇첸아르티히 제국과 직접 맞대고 있는 국경이 있어야 합니다."
 giga_katzen.0201.name:0 "캇첸 영토 거래"
 giga_katzen.0201.desc:0 "흠, 우리에게 영토를 팔고 싶다고? 카이저께서는 너희들의 성계를 기꺼이 교환할 것이다! 어디를 줄 것이지?"
 giga_katzen.0201.a:0 "§Y[kaiser_sell_1.GetName]§! 성계."
 giga_katzen.0201.b:0 "§Y[kaiser_sell_2.GetName]§! 성계."
 giga_katzen.0201.c:0 "§Y[kaiser_sell_3.GetName]§! 성계."
 giga_katzen.0201.d:0 "§Y[kaiser_sell_4.GetName]§! 성계."
 giga_katzen.0201.tooltip:0 "§Y카이저§!에게 우리의 제안을 전달할 것이고, 캇첸 종족은 성계의 내용물에 따라서 값을 제안할 것입니다. 그 다음 거래를 받아들일 것인지 아닌지 결정할 수 있습니다.\n거래가 성사되면, 우리에 대한 §Y카이저의 우호도§!가 판매된 성계의 가치에 따라 §B상승§!할 것입니다."
 giga_katzen.0202.name:0 "[kaiser_sell_yes.GetName] 성계"
 giga_katzen.0202.desc:0 "§Y[kaiser_sell_yes.GetName]§! 성계의 내용물을 고려해서, 카이저께서는 §Y[flusion_primitives_country.kaiser_trade_value]§! £energy£와 §Y[flusion_primitives_country.kaiser_trade_value_alloys]§! £alloys£를 지불하실 의향이 있으시다.\n\n너희들 종족에게도 괜찮아 보이지 않는가?"
 giga_katzen.0202.a:0 "좋아 보이는군. 거래하지!"
 giga_katzen.0202.b:0 "훌륭하군. 거래하지!"
 giga_katzen.0202.c:0 "아주 좋아! 거래하지!"
 giga_katzen.0202.lowvalue.tooltip:0 "§Y캇첸아르티히 제국§!에 자원을 받고 §Y[kaiser_sell_yes.GetName]§! 성계를 §Y양도§!할 것입니다.\n성계의 가치에 따라 §Y카이저의 우호도§!가 §Y20%§!의 확률로 §G상승§!할 수 있습니다.\n카이저는 내년까지 우리에게 영토를 요구하지 않을 것입니다.$attache_boost_chance$"
 giga_katzen.0202.medvalue.tooltip:0 "§Y캇첸아르티히 제국§!에 자원을 받고 §Y[kaiser_sell_yes.GetName]§! 성계를 §Y양도§!할 것입니다.\n성계의 가치에 따라 §Y카이저의 우호도§!가 §Y40%§!의 확률로 §G상승§!할 수 있습니다.\n카이저는 내년까지 우리에게 영토를 요구하지 않을 것입니다.$attache_boost_chance$"
 giga_katzen.0202.highvalue.tooltip:0 "§Y캇첸아르티히 제국§!에 자원을 받고 §Y[kaiser_sell_yes.GetName]§! 성계를 §Y양도§!할 것입니다.\n성계의 가치에 따라 §Y카이저의 우호도§!가 §Y80%§!의 확률로 §G상승§!할 수 있습니다.\n카이저는 내년까지 우리에게 영토를 요구하지 않을 것입니다.$attache_boost_chance$$"
 giga_katzen.0202.response:0 "훌륭해! 카이저께서 기뻐하시겠군."
 giga_katzen.0202.bye:0 "아무것도 아니다."
 giga_katzen.0201.bye:0 "아무것도 아니다."
 cant_recently_sold_land:0 "최근에 이미 카이저에게 영토를 판매하였습니다. 다음 거래까지 최소 1년을 기다려야 합니다."
 giga_katzen.042.name:0 "카이서 캇테일이 영토를 요구하다!"
 giga_katzen.042.1.desc:0 "§Y캇첸아르티히 제국§!으로부터 시급한 통신을 수신하였습니다.\n\n그들의 지도자, §Y카이저 캇테일§!은 그의 \"확장 쿼터\"를 만족시키기 위해, §Y[kaiser_system_1.GetName]§! 성계를 이달 내로 제국에 양도할 것을 요구합니다.\n\n물론 그는 성계에 대해서 성계의 추정 가치에 따라 §Y[flusion_primitives_country.kaiser_trade_value]§! £energy£와 §Y[flusion_primitives_country.kaiser_trade_value_alloys]§! £alloys£의 재정적 보상을 줄 것이라고 제안합니다.\n\n이 영토는 우리의 적법한 영토이지만, 거절하게 된다면 카이저를 화나게 할 것이고, 그의 우호도가 너무 낮아진다면 우리에게서 힘으로 뺏으려고 할 것입니다..."
 giga_katzen.042.2.desc:0 "§Y캇첸아르티히 제국§!으로부터 시급한 통신을 수신하였습니다.\n\n그들의 지도자, §Y카이저 캇테일§!은 그의 \"확장 쿼터\"를 만족시키기 위해, §Y[kaiser_system_1.GetName]§! 성계와 §Y[kaiser_system_2.GetName]§! 성계를 이달 내로 제국에 양도할 것을 요구합니다.\n\n물론 그는 성계에 대해서 성계의 추정 가치에 따라 §Y[flusion_primitives_country.kaiser_trade_value]§! £energy£와 §Y[flusion_primitives_country.kaiser_trade_value_alloys]§! £alloys£의 재정적 보상을 줄 것이라고 제안합니다.\n\n이 영토는 우리의 적법한 영토이지만, 거절하게 된다면 카이저를 화나게 할 것이고, 그의 우호도가 너무 낮아진다면 우리에게서 힘으로 뺏으려고 할 것입니다..."
 giga_katzen.042.3.desc:0 "§Y캇첸아르티히 제국§!으로부터 시급한 통신을 수신하였습니다.\n\n그들의 지도자, §Y카이저 캇테일§!은 그의 \"확장 쿼터\"를 만족시키기 위해, §Y[kaiser_system_1.GetName]§! 성계와 §Y[kaiser_system_2.GetName]§! 성계, §Y[kaiser_system_3.GetName]§! 성계를 이달 내로 제국에 양도할 것을 요구합니다.\n\n물론 그는 성계에 대해서 성계의 추정 가치에 따라 §Y[flusion_primitives_country.kaiser_trade_value]§! £energy£와 §Y[flusion_primitives_country.kaiser_trade_value_alloys]§! £alloys£의 재정적 보상을 줄 것이라고 제안합니다.\n\n이 영토는 우리의 적법한 영토이지만, 거절하게 된다면 카이저를 화나게 할 것이고, 그의 우호도가 너무 낮아진다면 우리에게서 힘으로 뺏으려고 할 것입니다..."
 giga_katzen.042.4.desc:0 "§Y캇첸아르티히 제국§!으로부터 시급한 통신을 수신하였습니다.\n\n그들의 지도자, §Y카이저 캇테일§!은 그의 \"확장 쿼터\"를 만족시키기 위해, §Y[kaiser_system_1.GetName]§! 성계와 §Y[kaiser_system_2.GetName]§! 성계, §Y[kaiser_system_3.GetName]§! 성계, [kaiser_system_4.GetName]§! 성계를 이달 내로 제국에 양도할 것을 요구합니다.\n\n물론 그는 성계에 대해서 성계의 추정 가치에 따라 §Y[flusion_primitives_country.kaiser_trade_value]§! £energy£와 §Y[flusion_primitives_country.kaiser_trade_value_alloys]§! £alloys£의 재정적 보상을 줄 것이라고 제안합니다.\n\n이 영토는 우리의 적법한 영토이지만, 거절하게 된다면 카이저를 화나게 할 것이고, 그의 우호도가 너무 낮아진다면 우리에게서 힘으로 뺏으려고 할 것입니다..."
 giga_katzen.042.5.desc:0 "§Y캇첸아르티히 제국§!으로부터 시급한 통신을 수신하였습니다.\n\n그들의 지도자, §Y카이저 캇테일§!은 그의 \"확장 쿼터\"를 만족시키기 위해, §Y[kaiser_system_1.GetName]§! 성계와 §Y[kaiser_system_2.GetName]§! 성계, §Y[kaiser_system_3.GetName]§! 성계, [kaiser_system_4.GetName]§! 성계, §Y[kaiser_system_5.GetName]§! 성계를 이달 내로 제국에 양도할 것을 요구합니다.\n\n물론 그는 성계에 대해서 성계의 추정 가치에 따라 §Y[flusion_primitives_country.kaiser_trade_value]§! £energy£와 §Y[flusion_primitives_country.kaiser_trade_value_alloys]§! £alloys£의 재정적 보상을 줄 것이라고 제안합니다.\n\n이 영토는 우리의 적법한 영토이지만, 거절하게 된다면 카이저를 화나게 할 것이고, 그의 우호도가 너무 낮아진다면 우리에게서 힘으로 뺏으려고 할 것입니다..."
 giga_katzen.042.yes:0 "받아들이겠다."
 giga_katzen.042.yes.tooltip:0 "§Y[flusion_primitives_country.kaiser_trade_value]§! £energy£ §Y[flusion_primitives_country.kaiser_trade_value_alloys]§! £alloys£\n요구된 모든 성계가 제국에게 §Y양도§!될 것입니다.\n§Y카이저의 우호도§!는 (약 70% 정도의 확률로) §G상승§!할 것입니다.$attache_boost_chance$"
 giga_katzen.042.no:0 "절대로. 그 성계는 우리의 것이다!"
 giga_katzen.042.no.tooltip:0 "§Y카이저의 우호도§!가 §R감소§!할 것입니다.\n그의 우호도가 §R격노한§! 상태에 도달한다면 그는 전쟁을 선포할 것입니다."
 giga_katzen.043.name:0 "[kaiser_system_demand_target.GetName](이)가 카이저에게 영토를 양도하다!"
 giga_katzen.043.desc:0 "[kaiser_system_demand_target.GetName](은)는 그들의 성계를 양도하라는 §Y캇첸아르티히 제국§!의 지도자, §Y카이저 캇테일§!의 요구에 응하였습니다.\n\n캇첸 종족은 그들에게 성계에 대해 금전적이고 물질적인 보상을 제공하였으며, 새롭게 취득한 영토로 이주하기 시작하였습니다.\n\n당장은 전쟁을 피한 것으로 보입니다."
 giga_katzen.043.a:0 "제국이 더 확장하는군..."
 giga_katzen.050.name:0 "§R전쟁 선포§!"
 giga_katzen.050.desc:0 "[Root.GetSpeciesNamePlural]들이여. 너희 국가가 우리 카이저를 방해하였다.\n\n이것은 전쟁 선포다! 너희의 백성들은 너희의 끔찍한 정부의 영향력으로부터 해방될 것이고 우리의 우수한 사회에 합쳐질 것이다.\n\n준비하라, 외계인들이여!"
 giga_katzen.050.a:0 "그렇다면 전장에서 만나지."
 giga_katzen.050.a.tooltip:0 "§T§R캇첸아르티히 제국이 우리에게 총력전을 선포할 것입니다.§!\n\n§Y카이저의 우호도§!는 §R격노한§! 상태로 §R감소§!할 것입니다.\n\n최소 §Y2.5년의 전쟁 이후§!에야 평화가 가능할 것입니다.\n\n캇첸아르티히 제국을 물리치기 위해서는 §Y플러션§!이 §Y점령§!되거나 §Y파괴§!되어야 합니다.§T"
 giga_katzen.051.name:0 "캇첸아르티히 제국이 전쟁에 돌입하다!"
 giga_katzen.051.desc:0 "카이저와 [kaiser_attack_target.GetAdjective]의 지도부 사이의 의견 충돌에 따라, §Y캇첸아르티히 제국§!은 최근 §Y[kaiser_attack_target.GetName]에게 전쟁을 선포하였다는 소식을 받았습니다§!!\n\n두 국가 사이의 외교적 관계는 완전히 무너졌고, 서로에 대해 총력전에 들어가게 될 것입니다..."
 giga_katzen.051.a:0 "은하계에 또 다른 전쟁이군."
 giga_katzen.2000.name:0 "카이저 위성의 비밀"
 giga_katzen.2000.desc:0 "§Y캇첸아르티히 제국§!이 등장한 지 꽤 지났고, 그들의 §Y카이저 위성§!은 가공할 선박이라는 점이 드러났습니다.\n\n하지만 반복된 장거리 관찰을 통해 위성을 파괴할 수도 있을 만한 몇 가지 결점이 있다는 것이 밝혀졌습니다.\n\n멀리서 위성의 고유한 공학을 연구하고, 캇첸 함선을 맞닥뜨렸을 때 우리의 무기의 효율을 극적으로 향상시킬 방법을 알아낼 수도 있는 §Y특별 프로젝트§!가 생성됩니다.\n\n그러나 카이저의 함선을 터뜨릴 최고의 방안을 찾으려고 하는 우리의 노력이 발각될 수도 있기에, 이 프로젝트에 착수하는 것은 카이저를 화나게 하고 그의 우호도를 §R감소§!시킬 수 있습니다."
 giga_katzen.2000.a:0 "즉시 시작하지."
 STUDY_KAISER_PROJECT:0 "카이저 위성 연구"
 STUDY_KAISER_PROJECT_DESC:0 "카이저 위성에 대응하기 위하여, 멀리서 캇첸을 염탐하고 그들의 위성을 연구하는데 많은 자원을 사용합니다.\n\n이 프로젝트를 마침으로써 캇첸에 대한 우리 무기의 피해량을 §G30%§! §G향상§!시킬 수 있지만, 우리에 대한 §Y카이저의 우호도§!가 §R3§! §R감소§!할 것입니다.\n\n§B수수께기 공학§! 승격 특성을 가지고 있음으로써 카이저가 우리의 계획을 알아차리고 우호도가 떨어지는 것을 피할 수 있습니다."
 giga_katzen.2001.name:0 "캇첸의 약점 발견!"
 giga_katzen.2001.a.desc:0 "몇 년 동안의 고된 작업 끝에, 캇첸의 §Y카이저 위성§!이 가지고 있는 몇 가지 두드러진 약점을 찾아내는데 성공했고, 이를 통해 이에 대한 우리의 대응력을 극적으로 향상시킬 수 있을 것입니다. 또한 캇첸의 공학 전체에 대해서 많은 것을 배울 수 있었고, 이는 그들의 함대를 맞닥뜨렸을 때 도움이 될 것입니다.\n\n그러나 불행하게도 카이저가 이에 대해서 알게 되었다는 소식이 전해졌고, 우리에 대한 §Y카이저의 우호도§!가 §R3§! 만큼 대폭 §R감소§!하였습니다.\n\n우리는 또한 §Y캇첸아르티히 제국§!에 대한 피해량을 증가시킬 수 있는 새로운 §Y반복 연구§!도 가능하게 되었습니다. 하지만 이는 카이저가 §R격노§!할 가능성이 있습니다."
 giga_katzen.2001.a:0 "아무 문제 없다. 오라고 하지!"
 giga_katzen.2001.b.desc:0 "몇 년 동안의 고된 작업 끝에, 캇첸의 §Y카이저 위성§!이 가지고 있는 몇 가지 두드러진 약점을 찾아내는데 성공했고, 이를 통해 이에 대한 우리의 대응력을 극적으로 향상시킬 수 있을 것입니다. 또한 캇첸의 공학 전체에 대해서 많은 것을 배울 수 있었고, 이는 그들의 함대를 맞닥뜨렸을 때 도움이 될 것입니다.\n\n우리의 복잡한 수수께끼의 과학적 방법 덕분에, 캇첸은 우리의 계획에 대해서 여전히 모르고 있습니다.\n\n우리는 또한 §Y캇첸아르티히 제국§!에 대한 피해량을 증가시킬 수 있는 새로운 §Y반복 연구§!도 가능하게 되었습니다."
 giga_katzen.2001.b:0 "훌륭하군."
 mod_damage_vs_country_type_katzenartig_imperium_mult:0 "캇첸아르티히 제국에 대한 피해량"
 katzenartig_weaknesses:0 "캇첸의 약점"
 katzenartig_weaknesses_desc:0 "캇첸의 공학에서 여러 결점을 찾아냈고, 그들의 함대에 대해 더 많은 피래흘 줄 수 있을 것입니다."
 giga_tech_repeatable_increased_katzen_damage:0 "캇첸 약점 분석"
 giga_tech_repeatable_increased_katzen_damage_desc:0 "캇첸 함선 공학을 더 연구함으로써, 그들의 함선을 파괴하는데 도움이 될 그들 설계의 약점을 찾아낼 수 있습니다. §B수수께기 공학§! 특성을 통해 카이저가 우리의 계획을 알아낼 수도 있는 위험을 완전히 없앨 수 있습니다."
 might_anger_kaiser_title:0 "§Y카이저의 우호도§!를 §Y50%§!의 확률로 §R감소§!시킬 수 있습니다.\n§B수수께끼 공학§! 특성으로 그의 우호도가 감소하는 것을 막을 수 있습니다."
 might_anger_kaiser_desc:0 "당연하게도 그의 것을 날려버릴 방법을 알아내는 사람들을 그다지 좋아하지 않지."
 giga_flusion.089.name:0 "카이저 위성이 파괴되다!"
 giga_flusion.089.desc:0 "오늘 §Y캇첸아르티히 제국§!이 잔인한 타격을 받았습니다. 우리 군의 압도적인 화력으로 §Y카이저 위성§!을 성공적으로 파괴하였습니다.\n\n캇첸이 펼치던 작전의 전진기지로써 쓰이고 있었던 함선은 거대한 위성 잔해로 분해되었고 수많은 캇첸 사상자가 나왔습니다. 캇첸아르티히 제국은 그들의 가장 중요한 군사 자산을 잃어버림과 함께 공황 상태에 빠져들었고, 그들의 사령부는 요새화되어 있는 플러션의 고향으로 퇴각하였습니다.\n\n§Y카이저§!는 매우 분노하였고, 제국 전체가 혼란에 빠졌습니다...\n\n추가적으로, 잔해로부터 자원을 어느 정도 복구하였습니다."
 giga_flusion.090.name:0 "카이저 위성 파괴되다!"
 giga_flusion.090.desc:0 "오늘 §Y캇첸아르티히 제국§!이 잔인한 타격을 받았습니다. 우리 군은 제국의 막강한 기함 §Y카이저 위성§!을 성공적으로 파괴하였습니다.\n\n캇첸이 펼치던 작전의 전진기지로써 쓰이고 있었던 함선은 거대한 위성 잔해로 분해되었고 수많은 캇첸 사상자가 나왔습니다. 캇첸아르티히 제국은 그들의 가장 중요한 군사 자산을 잃어버림과 함께 공황 상태에 빠져들었고, 그들의 사령부는 요새화되어 있는 플러션의 고향으로 퇴각하였습니다.\n\n§Y카이저§!는 매우 분노하였고, 제국 전체가 혼란에 빠졌습니다...\n\n추가적으로, 잔해로부터 자원을 어느 정도 복구하였습니다."
 giga_flusion.090.a:0 "그들의 끝이 얼마 남지 않았군."
 giga_flusion.091.name:0 "카이저 위성 파괴!"
 giga_flusion.091.desc:0 "오늘 §Y캇첸아르티히 제국§!이 끔찍한 타격을 받았습니다. §Y[kaiser_moon_slayer.GetName]§!에 있던 우리 군은 제국의 막강한 기함 §Y카이저 위성§!을 성공적으로 파괴하였습니다.\n\n캇첸이 펼치던 작전의 전진기지로써 쓰이고 있었던 함선은 거대한 위성 잔해로 분해되었고 수많은 캇첸 사상자가 나왔습니다. 캇첸아르티히 제국은 그들의 가장 중요한 군사 자산을 잃어버림과 함께 공황 상태에 빠져들었고, 그들의 사령부는 요새화되어 있는 §Y플러션§!의 고향으로 퇴각하였습니다.\n\n§Y카이저§!는 매우 분노하였고, 제국 전체가 혼란에 빠졌습니다..."
 giga_flusion.091.a:0 "그들의 끝이 얼마 남지 않았군."
 giga_flusion.090.a.tooltip:0 "§Y캇첸아르티히 제국§!은 §Y함선 연사 속도§!, §Y궤도 폭격 피해량§!, §Y지상군 피해량§!, §Y함선 비행 속도§!에 불이익이 있을 것입니다."
 giga_katzen.092.name:0 "캇첸아르티히 제국?"
 giga_katzen.092.desc:0 "카이저 위성의 파괴 이후로, 제국은 혼란으로 빠져들었고, 카이저는 누구와도 이야기하고 싶지 않은 것처럼 보입니다..."
 giga_katzen.092.war:0 "그들의 종말을 가속하라, §R전쟁을 선포하라!§!"
 giga_katzen.092.war.tooltip:0 "§T§R캇첸아르티히 제국과 총력전을 선포할 것입니다.§!\n\n평화는 §R더 이상 가능하지 않을 것§!입니다.\n\n§Y캇첸아르티히 제국을 물리치기 위해서는 §Y플러션§!이 §Y점령§!되거나 §Y파괴§!되어야 합니다.§!"
 giga_katzen.092.a:0 "좋아."
 giga_katzen.094.name:0 "플러션의 몰락"
 giga_katzen.094.desc:0 "플러션이 몰락하였습니다.\n\n끔찍한 전쟁을 통해 [flusion_conqueror.GetName]의 우리 군은 플러션의 캇첸 방위군을 압도하였고, 행성을 완전히 장악하였습니다. 그들의 수도를 상실하자, 극도의 중앙집권을 유지하던 §Y캇첸아르티히 제국§!은 유지될 수 없었고, 며칠 내로 완전히 무너질 것입니다.\n\n그들은 이제 §Y카이저 캇테일§!이 아직 살아 있다면 어디에 숨어 있는지 알아내기 위해서 캇첸의 최고 사령부를 추궁하는 과정에 있습니다.\n\n어쨌든, 캇첸의 위협이 사라졌기 때문에, 은하계는 이제 안도의 한숨을 내쉴 수 있게 되었습니다."
 giga_katzen.094.a:0 "시원하군."
 giga_katzen.094.b:0 "시원하군."
 giga_katzen.095.name:0 "플러션의 파괴"
 giga_katzen.095.desc:0 "플러션이 몰락했습니다.\n\n행성은 수많은 포화를 받았고, 캇첸은 행성 표면에서 쓸려나갔습니다. 그들의 수도를 상실하자, 극도의 중앙집권을 유지하던 §Y캇첸아르티히 제국§!은 유지될 수 없었고, 며칠 내로 완전히 무너질 것입니다.\n\n캇첸의 위협이 사라졌기 때문에, 은하계는 이제 안도의 한숨을 내쉴 수 있게 되었습니다."
 giga_katzen.095.a:0 "시원하군."
 giga_katzen.097.name:0 "캇첸아르티히 제국 몰락하다"
 giga_katzen.097.desc:0 "기대했던 대로, §Y플러션§!이 함락되자 §Y캇첸아르티히 제국§!은 더 이상 유지될 수 없게 되었습니다. 그들을 이끌 중앙집권 정부와 카이저가 사라지자, 남아 있던 캇첸의 식민지는 독립을 선언하였고, 거의 하룻밤만에 제국이 해체되었습니다.\n\n한때는 매우 막강했던 제국이 이제는 마침내 역사 속으로 사라졌습니다."
 giga_katzen.097.a:0 "그들은 정말 가열차게 달려왔지."
 katzenartig_splinter:0 "분열 국가 자원"
 katzenartig_splinter_desc:0 "재앙과 같은 몰락을 피하기 위해서입니다."
 katzen_forge_0:0 "캇첸 워포지 건설 현장"
 katzen_forge_0_DESC:0 "캇첸 워포지 건설 현장입니다. 캇첸 워포지는 근방의 성계에서 자원을 수확해 전함으로 바꾸는 거대한 궤도 구조물입니다."
 katzen_forge_0_MEGASTRUCTURE_DETAILS:0 "$katzen_forge_0_DESC$"
 katzen_forge_1:0 "캇첸 워포지"
 katzen_forge_1_DESC:0 "캇첸 식민지 근처에 건설된 거대한 궤도 구조물로, 근처 성계의 자원을 수확하고 이러한 자원을 이용해 캇첸 전함을 건조합니다."
 warforge_detection:0 "캇첸 워포지 업링크"
 giga_katzen.031.name:0 "캇첸 워포지 파괴!"
 giga_katzen.031.desc:0 "우리 함대는 §Y[war_forge_destroyed_system.GetName]§! 성계를 점령하였고, 캇첸 워포지는 노획될 것을 우려하여 자폭하였다고 보고합니다.\n\n잔해로부터 약간의 자원을 수거했고, 캇첸은 그들의 함대를 강화하기 위해서 더 이상 이 시스템을 사용할 수 없을 것입니다."
 giga_katzen.031.a:0 "제국에게 차질이 생기겠군."
 katzenartig_chain_title:0 "캇첸아르티히 제국"
 katzenartig_chain_desc:0 "군국주의적 사고를 가진 캇첸이 은하적 현장에 진입하였습니다. 그들의 카이저는 전체 은하계에 대한 야망을 품고 있는 것처럼 보이고, 그들의 무기는 놀라울 정도로 진보해 있습니다. 그들을 주시해야 합니다."
 katzen_ship_count:0 "§Y캇첸 함선 숫자§!"
 katzen_planet_count:0 "§Y캇첸 행성 숫자§!"
 katzen_system_count:0 "§Y캇첸 성계 숫자§!"
 katzen_warforge_count:0 "§Y캇첸 워포지 숫자§!"
 ships_lost_to_katzen:0 "§R캇첸에게 파괴된 함선§!"
 katzen_ships_lost:0 "§G파괴된 캇첸 함선§!"
 katzenartig_chain_1:0 "플러션 & 캇첸의 확장"
 katzenartig_chain_1_desc:0 "캇첸 정부는 캇첸의 수도인 §Y플러션§!을 중심으로 하고 있습니다. 플러션을 점령하거나 파괴하는 것은 제국의 완전한 종말이자 몰락을 의미합니다.\n\n캇첸은 해군을 확장하기 위해 자국 내의 행성에 §Y캇첸 워포지§!를 건설하였고, 이는 주기적으로 함선을 건조할 것입니다. 만약 그 성계가 점령당한다면, 워포지는 §Y자폭§!할 것입니다.\n\n캇첸은 자신들의 성계에 §Y점프 드라이브 방해장§!을 적용할 것이므로, 그 성계로의 전술적 점프가 불가능할 것입니다. 이 행성을 점령하면 방해장을 비활성화될 것입니다.\n\n플러션이 폭격이나 침공을 당하거나, 유블리오 성계에 콜로서스가 진입하였을 때 §Y카이저 위성§!이 유블리오 성계로 §R소환§!될 것입니다!"
 paluush_defender_acot:0 "팔루쉬 군대"
 paluush_defender_acot_desc:0 "최고의 기준에 따라 훈련을 받은, 사이오닉 무장 방위군입니다."
 the_grandbunny_acot:0 "그랜드버니"
 the_grandbunny_acot_desc:0 "팔루쉬아를 모든 종류의 위협으로 방어할 준비가 되어 있는 매우 강력하고 거의 신과 같은 사이오닉 팔루쉬입니다."
 royal_paluush_acot:0 "로열 팔루쉬 방위군"
 royal_paluush_acot_desc:0 "최고의 기준에 따라 훈련을 받은, 잔인한 사이오닉 무장 방위군입니다."
 katzen_trait_elite:0 "엘리트 인물"
 katzen_trait_elite_desc:0 "이 지도자는 플러션 사회에서 매우 중요한 인물이고, 그들의 기술력은 평균을 뛰어넘습니다. 그들은 삶을 유지하기 위해 최신의 노화 방지 기술과 사이버네틱스 기술을 사용합니다."
 katzen_trait_blitzkrieg:0 "장갑 전쟁 전문가"
 katzen_trait_blitzkrieg_desc:0 "이 지도자는 전투 중에 다수의 장갑 유닛을 신속하게 기동하는 것에 매우 능숙합니다."
 katzen_trait_nukelad:0 "핵잡이"
 katzen_trait_nukelad_desc:0 "이 지도자는 핵 미사일의 피해량을 극대화하는 방법을 알고 있고, 이를 우주 전투 중에 광범위하게 사용합니다."
 giga_katzenai.013.name:0 "카이저 위성 소환!"
 giga_katzenai.013.desc:0 "경고! 플러션에 대한 우리의 적대적 행위에 따라, §Y카이저 위성§!이 거대한 긴급 점프 드라이브 시스템을 가동한 것 같습니다.\n\n이 위성 함선은 즉시 §Y유블리오§! 성계로 스스로를 소환하였고, 우리의 폭격 함대와 교전할 것입니다..."
 giga_katzenai.013.a:0 "전투 배치!"
 kaiser_moon_broken_object:0 "폐허가 된 카이저 위성"
 kaiser_moon_broken_object_desc:0 "한때는 막강한 캇첸의 초강력 무기였지만, 지금은 그저 거대한 비활성화된 위성 잔해일 뿐입니다."
 kaiser_moon_broken_object_tooltip:0 "카이저는 저기에 너무 많은 것을 쏟아부었지."
 giga_katzen.0900.name:0 "카이저 위성 회수"
 giga_katzen.0900.desc:0 "§Y카이저 위성§!의 파괴로부터, 그 거대한 잔해는 역사 속에서 잊혀질 때까지 분해되며 공허를 떠돌았습니다.\n\n하지만 과학 공동체와 군의 일부 세력은 이 잔해를 연구하기 위해 과학선을 보내야 한다고 제안하기 시작했습니다. 수리하기에는 너무 많은 피해를 입은 위성이지만, 그 설계를 분석하고 역설계하여 미래에 우리의 카이저 위성을 건조할 수 있을 것이라고 생각합니다...\n\n이 프로젝트는 값비싸고 시간이 오래 걸리겠지만, 카이저 위성은 우리 군에 귀중한 자산이 될 것입니다."
 giga_katzen.0900.a:0 "가치 있는 노력이군. 실행하라!"
 giga_katzen.0900.b:0 "이런 넌센스에 들일 시간은 없다."
 giga_katzen.0901.name:0 "카이저 위성 분석 완료!"
 giga_katzen.0901.desc:0 "몇 개월 동안 §Y카이저 위성§!의 거대한 잔해를 연구하고 탐사하고 탐구하여, 우리 과학선은 우리의 카이저 위성을 건조하기 위한 공학적 노력을 시작할 수 있는 충분한 데이터를 수집했다고 보고합니다.\n\n막강한 우주선을 건조하는 데까지는 아직 연구가 더 필요하지만, 분명히 노력의 결과가 있을 것이라고 확신합니다."
 giga_katzen.0901.a:0 "놀랍군. 착수하라."
 giga_tech_kaiser_moon:0 "캇첸 천체 무기화"
 giga_tech_kaiser_moon_desc:0 "카이저 위성에 대한 연구를 통해 이 초강력 무기의 설계도를 다시 만들어낼 수 있었습니다. 일반적인 공격위성보다 중무장을 갖춘 카이저 위성은 성계의 전장을 지배할 무시무시한 초강력 무기임에 틀림 없습니다."
 allow_kaiser_moon:0 "§H구획 잠금 해제:§! 카이저 위성 구획"
 desc_kaiser_moon:0 "회수된 캇첸 기술을 기반으로 하는 정신 나간 공학 프로젝트입니다. 기존의 전쟁 위성과 달리, 카이저 위성은 레이저 대신 거대한 레일건을 탑재하고 있으며, 다수의 운동 에너지형 무기와 폭발형 무기를 탑재하고 있습니다. 이제 전쟁 위성에 이 구획을 적용시킬 수 있습니다."
 REPAIR_KAISER_PROJECT:0 "카이저 위성 분석"
 REPAIR_KAISER_PROJECT_DESC:0 "고칠 수는 없지만, 카이저 위성의 거대한 잔해로부터 수 많은 유용한 공학 데이터를 알아낼 수 있을 것입니다."
 kaiser_moon_0:0 "$gc_mega$카이저 위성 건설 현장"
 kaiser_moon_0_DESC:0 "작은 위성 근처에 건설될, 성계 전장을 쓰레기 더미로 만들어 버릴 수도 있는 거대한 초강력 무기인 카이저 위성의 건설 현장입니다."
 kaiser_moon_0_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_megastructure$ - $giga_list_category_celestial_warship$\n§Y크기 5-7§!의 §Y용암형§! 또는 §Y불모형§!, §Y얼음 행성§!을 특수한 §Y천체 전함§!으로 바꿉니다\n§L캇첸의 기술에 기반하여 카이저 위성은 작은 위성의 구덩이에 설치되어 있는 거대한 레일건과 함께 수많은 미사일과 실탄 포대를 탑재하고 있습니다.§!"
 kaiser_moon_1:0 "카이저 위성 기동 시스템"
 kaiser_moon_1_DESC:0 "이 미래의 초강력 무기는 전체 위성을 이동시킬 수 있는 거대한 추진기를 장착하고 있습니다. 그 날개에는 방향을 조정하기 위한 날렵한 임펄스 추진기가 장착되어 있습니다."
 kaiser_moon_2:0 "카이저 위성"
 kaiser_moon_2_DESC:0 "완성된 카이저 위성은 핵탄두 발사대와 다수의 실탄 포대와 함께, 거의 모든 것을 꿰뚫을 수 있는 거대한 레일건을 탑재하고 있습니다."
 giga_katzen.0902.name:0 "카이저 위성 건설 현장 완성!"
 giga_katzen.0902.desc:0 "[giga_system.GetName] 성계에서 카이저 위성의 건설 현장이 완성되었습니다.\n\n이 건설 플랫폼은 캇첸의 폭발적인 공학에 영감을 받아 작은 위성을 무시무시한 초강력 무기로 개조하는데 사용될 것입니다.\n\n카이저 위성의 유지비가 합금 250과 에너지 75임을 명심해야 합니다."
 giga_katzen.0902.a:0 "좋아."
 giga_katzen.0903.name:0 "카이저 위성 기동 시스템 완성!"
 giga_katzen.0903.desc:0 "[giga_system.GetName] 성계에 있는 우리의 카이저 위성의 기동 시스템이 성공적으로 설치되었습니다. 천체 전체를 추진할 거대한 추진기는 위성의 뒷면에 건설되었습니다.\n\n이제 위성의 주된 초강력 무기 건설을 시작해야 합니다: 초거대 레일건을 말입니다."
 giga_katzen.0903.a:0 "훌륭하군."
 giga_katzen.0904.name:0 "카이저 위성의 비상!"
 giga_katzen.0904.desc:0 "그리고 마침내 완성되었습니다! [giga_system.GetName] 성계에서 작은 위성을 상대론 에너지의 속도로 투사체를 가속할 수 있는 거대한 레일건을 장착한 치명적인 캇첸 초강력 무기로 개조하는데 성공했습니다.\n\n이 레일건 외에도 미사일과 거대한 기관포로 무장하고 있는 이 무시무시한 구조물은 카이저가 원했던 것처럼 우리가 은하계를 지배하는데 도움이 될 것이니다. "
 giga_katzen.0904.a:0 "훌륭해! 우리가 캇첸처럼 끝나지만 않았으면 좋겠군."
 giga_katzen.04001.name:0 "카이저가 캇첸아르티히 대제국을 선언하다!"
 giga_katzen.04001.desc:0 "최근에 이어진 캇첸의 정복활동으로 §Y캇첸아르티히 제국§!은 은하계의 많은 부분을 아우르는 곳까지 확장하였습니다. 그렇기 때문에 이 이정표를 공인하기 위해서 §Y카이저 캇테일§!은 그의 제국의 넓은 국경을 반영하고자 §Y캇첸아르티히 대제국§!을 공식적으로 선언하였습니다.\n\n제국의 이름과 깃발은 순차적으로 변경되었고, 카이저는 수십억의 제국 시민들 앞에서 \"이 위업은 모든 시민들 하나하나의 지원이 없었다면 불가능했을 것\"이며, 이것은 \"더 막강한 제국으로 향하는 시작\"이라고 이야기 했습니다.\n\n그의 야망은 금방 끝나지 않을 것 같습니다..."
 giga_katzen.04001.a:0 "그는 조금 자만에 차있는 것 같군."
 giga_katzen.04002.name:0 "카이저가 캇첸 은하제국을 선언하다!"
 giga_katzen.04002.desc:0 "§Y캇첸아르티히 대제국§!은 이제 은하계 대부분을 점령하였고, §Y카이저 캇테일§!은 그의 제국이 전 은하에 걸친 통치를 하고 있다는 것을 반영하기 위해 그의 제국을 \"캇첸 은하제국\"으로 다시 명명함으로써 이 이정표를 기념하였습니다.\n\n캇첸의 군 기계는 괴물과 같은 양으로 늘어났고, 카이저가 그의 제국이 \"마지막 태양이 타버릴 때까지\" 지속될 것이라고 선언하는 것에 제국을 격파하려고 했던 희망은 날마다 희미해지고 있습니다."
 giga_katzen.04002.a:0 "좋은 징조는 아니군."
 giga_katzen.0941.name:0 "실종된 카이저"
 giga_katzen.0941.desc:0 "§Y플러션§!을 침공한 이후, 우리의 병사들은 행성을 수색하고 캇첸의 최고 사령부를 심문하여 §Y카이저 캇테일§!의 행방을 찾아내기 위해서 갖은 노력을 다하고 있습니다. 한 달의 고단한 수색 이후에, 그들이 보고합니다...\n\n카이저가 사라졌다고 말입니다.\n\n정말로 그 누구도 카이저가 어디로 갔는지 알지 못하는 것 같고, 철두철미한 심문에도 불구하고 그의 최고 사령부조차 그의 위치를 모르고 있습니다. 그러나 그가 자살을 택했다는 증거도 없고, 우리 병사들은 그의 신체 흔적이나 그의 신체가 피해를 입은 징조조차 찾지 못했습니다.\n\n그렇기 때문에, 플러션에 설치된 우리의 지역정부는 이 상황을 어떻게 받아들여야 할지 확신이 없습니다..."
 giga_katzen.0941.a:0 "문제로군. 그를 찾아야 한다."
 giga_katzen.0941.b:0 "이 고양이 놈들의 코미디는 아무 상관 없다."
 FIND_KAISER_PROJECT:0 "카이저 위치 수색"
 FIND_KAISER_PROJECT_DESC:0 "플러션의 몰락 이후, 카이저는 실종된 상태였습니다. 그의 위치를 알아내기 위해 우리는 플러션 전역에 대한 철저한 수색을 시작해야 합니다."
 giga_katzen.0942.name:0 "카이저의 틈"
 giga_katzen.0942.desc:0 "우리 팀은 플러션 전역을 조사했습니다. 수천명의 사람들을 심문했고, 행성 구석구석을 돌아다녔습니다. 그러나, 카이저는 여전히 오리무중이었습니다. 포기하려던 순간, 평소라면 그닥 특이하지 않을 일이 일어났습니다.\n\n보통 우주선을 감지하는데 사용되는 장치가 무언가를 탐지했습니다. 현재 우리의 물리학 모형과는 다른 방식으로 반응하는 듯 하는 기묘한 입자였습니다. 더욱이, 그 입자는 과거 캇첸 정부가 있었던 캐타운 피라미드에서 생겨나는 듯 합니다.\n\n우리의 과학자들은 그 입자를 추적했고, 피라미드까지 쫓았습니다. 피라미드의 미궁과도 같은 복도를 지난 뒤, 과학자들은 카이저의 사무실에 도착하게 되었습니다.\n\n처음 보기엔 별거 없는 듯 보이는 사무실이었지만, 무언가가 우리 우주에서는 일반적으로 보기 힘든 기묘한 입자를 방출하고 있었습니다. 일종의 나노 크기의 균열로 바닥에서 1미터 정도 위에 있었습니다. 시공간 그 자체에 나타난 매우 작은 인공 균열이었습니다. 그 모습을 보아하니, 분명 무언가가, 아니, §Y누군가§!가 최근 현실의 구조에 구멍을 뚤은듯 합니다. 카이저는 플러션 밖으로 텔레포트 했으며, 우리 은하계 내부는 아닌 것으로 보입니다.\n\n현재 우리의 과학팀은 이 작은 균열을 연구하고 카이저의 도착지를 추적하는데 사용할 수 있도록 균열 근처에 연구 시설을 만들고 있습니다. 플러션에 고고학 현장이 생겨났습니다."
 giga_katzen.0942.a:0 "이 틈새를 연구하자. 그리 멀리 가지는 못했을 것이다."
 giga_katzen.0943.name:0 "틈새에 대한 탐지"
 giga_katzen.0943.desc:0 "우리의 과학자들이 균열 근처에 거대한 장치를 설치했으며, 이 장치는 균열을 통해 다양한 입자를 보낼 것입니다. 흥미롭게도, 이러한 입자들은 우리 은하계 내에서 나타나지 않았으며, 대신 균열로 들어간 입자들 대부분이 몇 초 뒤에 되돌아왔는데, 구성 입자들로 붕괴된 상태, 즉 마치 \"파쇄\"된 것처럼 방사능의 형태로 되돌아왔습니다.\n\n이와 같이, 그 균열은 일종의 순환 고리인 듯 합니다. 아마도 입자들은 반대 쪽의 무언가에 \"튕겨져\" 나온 것이겠죠. 그러나, 이러한 튕김은 단순히 균열이 불완전하게 소멸되어 카이저의 도착지와 불완전하게 연결된 것으로 인한 부작용일 가능성이 큽니다. 현재 우리의 과학자들은 균열을 안정화하고 확대하고자 하는 바람으로 장치를 업그레이드하고 있으며, 추후에 균열을 통해 실제 탐사 장치를 보낼 수 있을지도 모릅니다.\n\n또한 카이저의 사무실에 떨어져 있던 흥미로운 물품도 몇가지 찾았습니다."
 giga_katzen.0943.a:0 "흥미롭군. 계속하라!"
 giga_katzen.0944.name:0 "시간의 균열"
 giga_katzen.0944.desc:0 "틈새의 안으로 특정한 종류의 하전 입자를 방출시킴으로써, 우리 과학자들은 그 틈새를 안정화하고 확장할 수 있었고, 깜짝 놀랄만한 것을 발견하였습니다:\n\n이 틈새는 우주를 가로지르는 것이 아니고, 시간을 가로지르는 것이었습니다!\n\n나노봇을 그 안으로 보냈고, 틈새가 시간을 관통하는 어떠한 초차원적 퀀텀 터널로 이어진다는 것과, 카이저의 순간이동에 의해 현실의 구조에 흔적이 남게 되었으리라는 것을 알게 되었습니다. 이는 실질적으로 카이저가 시간 여행을 했다는 것을 의미하고, 추후 연구를 통해 그가 앞선 시간으로 향했다는 것으로 밝혀졌습니다.\n\n이 터널이 몇 백년보다 멀리 뻗어있지 않다고 추정하고는 있지만, 정확히 얼마나 멀리까지 뻗어있는지는 아직 확신하지 못합니다. 캇첸과 같은 문명조차도 상상할 수 없는 고출력의 에너지가 필요했을 것입니다.\n\n과학자들은 이제 이 틈새 안으로 들어갈 수 있는 탈것을 준비하고 있으며, 이를 이용하여 카이저가 간 곳까지 갈 수 있을 것이고, 마지막에는 카이저를 찾아낼 수 있을 것이니다.\n\n우리는 또한 이 시간의 균열과 상호작용하는 입자를 연구함으로써 여러 흥미로운 것들을 발견했습니다."
 giga_katzen.0944.a:0 "생각했던 것보다 더 복잡하군..."
 giga_katzen.0945.name:0 "시간 탐사정"
 giga_katzen.0945.desc:0 "카이저의 사무실에 있는 과학팀이 현재 상대적으로 거대한 탐사 장치를 조립했습니다. 탐사 장치에는 균열을 통해 시간을 거슬러 우리에게 정보를 전달할 수 있는 카메라와 타키온 방출기를 달아두었습니다.\n\n마지막으로, 그리고 가장 중요하게도, 그 장치는 개량 하이퍼드라이브 기반의 강력한 \"시간 천공기\"를 가지고 있습니다. 이는 카이저가 탈출 도중 남겨둔 시간의 자취를 증폭하고 쫓을 수 있습니다.\n\n그러나 시간 균열을 통해 탐사 장치를 보내는 과정에는 에너지가 상당히 많이 소모됩니다. 따라서 연구팀은 플러션의 전력망과 연결된 거대한 전선을 카이저의 사무실까지 연결해두었지만, 과학자들은 이 장치를 점프스타트 시키기 위해서는 £energy£ §Y2500§!이 필요하다고 말했습니다.\n\n§B충분한 에너지가 있다면 계속해서 발굴을 진행할 수 있는 선택지가 생길 것입니다.§!"
 giga_katzen.0945.a:0 "그들이 필요로 하는 에너지를 주어라. 시작하자..."
 giga_katzen.0946.name:0 "미래로"
 giga_katzen.0946.desc:0 "균열에 에너지를 공급하고 확대한 뒤, 거대한 탐사 장치가 시공간 연속체 깊은 곳으로 날아갔습니다. 우리의 팀은 수백년 뒤에나 탐사 장치가 카이저와 만날 수 있으리라 예상했지만, 다행히도, 그렇지는 않았습니다.\n\n대신, 탐사 장치는 백년을 뛰어넘었고, 그 뒤엔 천년, 만년, 백만년... 그리고 시간의 터널을 따라 점점 더 멀어지고 있습니다. 탐사 장치는 탑재되어있는 카메라를 통해 자신이 발견한 것을 과학팀에게 보고하였습니다. 안타깝게도, 미래의 플러션의 일부분인 피라미드 주변의 전경과 밤하늘만을 볼 수 있었습니다. 우리 제국이 어떻게 되었는지 정확하게 볼 수는 없었습니다...\n\n§B시간 탐사정 데이터 로그§!\n§YT+1 000 000 년§!\n이렇게 먼 미래임에도 불구하고, 카이저가 보이거나 시간 터널이 끝날 기미는 없음. 이 시점에서 플러션 주위의 밝은 항성 어려 개가 초신성이 된 것으로 보임.\n\n§YT+50 000 000 년§!\n거대한 산맥이 침식되기 시작함. 또한 지각판의 움직임으로 인해 행성의 모습이 완전히 바뀜. 여전히 카이저의 흔적은 없음.\n\n§YT+10 억 년 (1e9)§!\n중간에 무슨 일이 일어났든지, 플러션은 더 이상 거주할 수 없는 행성이 되었으며, 유블리오의 광도가 높아짐에 따라 행성의 표면이 달구어지기 시작했고 바다가 증발하고 있음. 플러션은 더 이상 유효한 목적지가 아님에도 불구하고, 카이저는 그곳에서 멈추지 않음. 동굴 천장에 일종의 사랑의 말로 보이는 것이 쓰여있지만, 그 목적은 확실히 알 수 없음.\n§B데이터 로그 끝§!\n\n카이저는 아직 발견되지 않았고, 탐사정을 계속해서 미래로 보내는 데에는 더욱 더 많은 에너지가 필요합니다. 이에 따라, 우리의 과학자들은 £energy£ §Y5000§!이 필요하다고 말했습니다. 그러나 이 놀라운 모험은 우주와 우주의 미래에 대한 우리의 지식에 큰 도움을 줄 것입니다.\n\n§B충분한 에너지가 있다면 계속해서 발굴을 진행할 수 있는 선택지가 생길 것입니다.§!"
 giga_katzen.0946.a:0 "우리가 생각했던 것보다 더 멀리까지 간 것 같군..."
 giga_katzen.0947.name:0 "불명확한 목적지"
 giga_katzen.0947.desc:0 "우리의 과학팀은 더 많은 에너지를 받아 탐사정이 미래의 더 먼 곳까지 추진하는데 성공했다고 보고합니다. 그리고 탐사정은 계속해서 가고 있습니다...\n\n§B시간 탐사정 데이터 로그§!\n§Y50억 년§!\n유블리오는 적색 거성으로 변했고, 플러션은 액화된 암석의 바다가 되었습니다. 행성에서 모든 종류의 생명의 신호는 완전히 사라졌습니다.\n\n§YT+100억 년§!\n플러션의 항성이 죽고 백색 왜성으로 변했고, 행성은 춥고 죽어버린 황량한 황무지가 되었습니다. 밤하늘에서 볼 수 있던 다른 별들도 같은 운명을 겪으며 그 숫자가 줄어들기 시작합니다.\n\n§YT+1000조 년§!\n가까운 성계에서의 간섭과 맞닥뜨리며, 유블리오 성계의 모든 행성 궤도가 틀어졌고, 유블리오는 부분적으로 흑색 왜성이 되었습니다. 플러션은 이제 그저 우주를 떠다니는 춥고 외로운 암석 덩어리일 뿐입니다. 하지만 카이저는 계속해서 간 모양입니다.\n\n§YT+10경 년§!\n플러션은 유블리오의 항성 잔유물과 충돌하였고, 이것은 아마도 지난 몇 조 년 동안 유일한 사건이었을 것입니다. 더 이상 도망칠 만한 플러션은 남아 있지 않지만, 카이저는 신경 쓰지 않았고 터널을 계속 이어지고 있습니다.\n§B데이터 로그 끝§!\n\n우주의 끝에 대해서 알게 도와준 고비용의 노력에도, 탐사정을 유지하기 위한 비용은 더욱 상승하였고, 이제 우리 과학자들은 탐사정을 더 멀리 보내기 위해 §Y25000§! £energy£를 요구합니다.\n\n§B충분한 에너지가 있다면 계속해서 발굴을 진행할 수 있는 선택지가 생길 것입니다.§!"
 giga_katzen.0947.a:0 "도대체 그는 어디 있는 거야?! 더 이상 남은 곳은 없다!"
 giga_katzen.0948.name:0 "우주의 끝"
 giga_katzen.0948.desc:0 "탐사정을 추진하는 것이 극도로 어렵고 에너지를 소모하는 일이 되었습니다. 그리고 이것이 잘못된 방향은 아닌지 걱정하는 이들도 생겨났습니다. 하지만 터널은 아직 이어져 있습니다.\n\n§B시간 탐사정 데이터 로그§!\n§YT+100양(1e30) 년§!\n대부분의 우주 물질은 블랙홀에 빠진 것 같습니다. 포류하고 있는 흑색 왜성이나 전의 블랙홀만이 남아 있습니다. 도대체 카이저는 자신을 여기까지 추진할 에너지를 어디서 얻은 것인지 알 수가 없습니다.\n\n§YT+1000불가사의(1e65)년§!\n놀랍게도, 양성자가 아직까지도 분해되지 않았습니다. 하지만 가장 흥미로운 것은 이 정신 나간 기간 동안에, 퀀텀 터널링은 남아 있는 모든 단단한 물질을 액체처럼 행동하게 했고, 완전히 부드러운 구형의 것으로 바꾸었습니다.\n\n§YT+10만 구골(1e106) 년§!\n그 크기에 상관 없이 모든 블랙홀이 호킹 복사로 증발하였고, 우주의 팽창으로 인해 표류하고 있는 고립된 입자만 남기게 되었습니다. 그리고 매우 드문 단단한 천체는 구 모양으로 붕괴하였습니다.\n\n§YT+1e1500년§!\n남아 있던 몇 안되는 천체에서 철보다 가벼운 원소들은 퀀텀 터널링으로 인해 철 원자에 융합되었고, 더 무거운 원소들은 분해되어 순수하게 철 원자로만 이루어진 거대한 철항성이 되었습니다. 당연하게도 채굴은 불가능하겠지만, 우리가 도달하기에도 너무 멀리 떨어져 있습니다.\n\n§YT+1e1e70년§!\n철항성 역시도 블랙홀로 붕괴하여 즉시 증발하였습니다. 기본적인 입자만이 표류하고 있을 뿐입니다.\n\n§YT+1e1e120년§!\n우주의 팽창 속도가 상상할 수 없을 정도로 높아지면서, 더 이상 어떠한 입자도 다른 입자와 상호 작용할 수 없게 되었습니다. 에너지 밀도는 거의 0에 가깝게 떨어졌습니다. 우주는 이제 그저 모든 방향으로 끝없이 확장하는 공허일 뿐입니다.\n그러나 터널은 이어지고 있습니다.\n§B데이터 로그 끝§!\n\n우주의 절대적인 끝까지 도달했음에도 불구하고, 카이저는 우리가 닿을 수 있는 범위 밖에 있습니다. 이 작전의 에너지 비용은 압도적으로 높아져서, 우리의 과학자들은 작전을 계속하기 위해 §Y100,000§! £energy£가 필요할 것이라고 추산하였습니다.\n\n§B충분한 에너지가 있다면 계속해서 발굴을 진행할 수 있는 선택지가 생길 것입니다.§!"
 giga_katzen.0948.a:0 "이게 어떻게 가능한 거지? 카이저는 이걸 어떻게 한 거지?"
 giga_katzen.0949.name:0 "원자 분쇄기"
 giga_katzen.0949.desc:0 "탐사정이 시간을 따라 더 진행함에 따라, 우리 과학자들은 카이저가 어떻게 그리고 왜 이렇게까지 멀리 왔는지 헷갈려하기 시작했습니다.\n\n§B시간 탐사정 데이터 로그§!\n§YT+1e1e5000년§!\n약간의 어둠 말고는 아무것도 없다.\n\n§YT+1e1e1000000년§!\n여전히 아무것도 보이지 않는다. 우주는 기본적으로 무한대의 속도로 팽창하는 중이다.\n\n그리고 그것이 일어났다.\n\n§YT+1e1e15000000000년§!\n시공간에서 무언으로부터 무언가 나오면서, 시간 탐사정이 갑작스럽게 멈추기 시작합니다. 거대하고 으스스한 개체가 영원한 수면에서 깨어나는 것 같습니다. 이 존재는 모든 존재를 포함하고 있으며, 초확장된 시간의 깊은 곳까지 뻗어 있습니다. 이 개체가 눈으로 생각되는 것을 열자, 시공간이 흐트러지기 시작했고, 스스로 붕괴하기 시작하여, 실질적으로 모든 것을 분쇄하고 우주 전체를 지워버리기 시작했습니다. 이것이 탐사정의 카메라를 파괴하였는지, 영상이 끊겼습니다.\n§B데이터 로그 끝§!\n\n우리가 §Y원자 분쇄기§!라고 이름 지은 이 개체는 죽은 빈 우주를 지워버리는 것처럼 \"우주 재생기\" 마냥 행동하였고, 이것이 우리가 보낸 첫 번째 입자가 \"튕겨져 나온\" 것일 가능성이 높습니다.\n\n하지만 카이저의 터널은 거기서 끝나지 않았습니다. 그는 어떻게든 이 재앙과도 같은 우주의 분쇄를 우회하였고, 그를 찾아내고 싶다면 우리도 그렇게 해야 할 것입니다.\n\n우리 과학자들은 엄청난 양의 에너지로 과충전된 탐사정을 보내는 것으로 원자 분쇄기를 \"뛰어 넘어\" 그 이후에 무슨 일이 일어날 것인지 볼 수 있게 해줄 것이라고 믿고 있습니다.\n\n하지만 이에 성공하기 위해서 엄청난 양의 비용 §Y400 000§! £energy£을 필요로 할 것이지만, 과학자들은 카이저를 찾아내든 찾아내지 못하든 원자 분쇄기로부터 얻어낼 수 있는 지식은 우주에 대한 우리의 인식을 완전히 바꿀 것이라고 확신합니다."
 giga_katzen.0949.a:0 "상상도 못할 비용이군. 하지만 우리는 알아내야 한다."
 giga_katzen.0950.name:0 "지나간 카이저의 나날"
 giga_katzen.0950.desc:0 "엄청난 양의 에너지로 탐사정을 과충전하여, 원자 분쇄기를 \"뛰어 넘는\" 데 성공하였고, 실질적으로... 또다른 우주에 도달하게 되었습니다.\n\n원자 분쇄기가 우주를 파괴하고 스스로 붕괴한 바로 다음, 이는 엄청난 사건으로 이어졌습니다: §Y두 번째 빅뱅§! 이었습니다!\n개체는 우리의 눈 앞에 있는 완전히 새로운 우주를 창조해냈습니다. 탐사정은 새로운 우주가 식어가는 과정, 첫번재 태양의 탄생, 그리고 또다른 유블리오의 탄생을 기록하였습니다. 물론 또다른 플러션의 탄생 역시 기록하였습니다.\n\n약간 다르기는 하지만, 이 새로운 우주는 플러션과 같은 우리 자신의 양상을 일부 유지하고 있는 것처럼 보입니다. 우리 과학자들은 플러션에서 다시 생명이 싹트는 것을 목격하였고, 캇첸이 다시 한 번 행성에 도달하는 것도 보았습니다. 그리고 캇첸 사회가 발전하였고 형태를 구축한 이후에, 마침내 터널이 끝났습니다. 그러자 탐사정은 실물 우주로 난폭하게 \"뱉어졌습니다\".\n\n그리고 거기에 카이저가 있었습니다.\n\n카이저는 여기에, 발코니의 위에서 캐타운의 캇첸 군중들을 내려다보며 있었습니다. 그는 플러션을 외계의 위협으로 방어하기 위해 위성 무노를 무기화하는 §Y프로젝트 몬트카노네§!에 대해 이야기하고, 행성의 모든 종족들에게 '위대한 미래'를 약속했습니다."
 giga_katzen.0950.a:0 "고양이가 무슨 말을 할지 지켜보자고."
 giga_katzen.0951.name:0 "카이저 캇테일"
 giga_katzen.0951.desc:0 "아, [flusion_conqueror.GetSpeciesNamePlural]들이군. 나를 따라오는데 성공했다는 것인가? 인상적이군.\n\n내 제국을 무너뜨린 종족들 중 약 5.6%만이 그러면 일을 해낼 수 있었다. 원자 분쇄기는 왠만해서는 뚫을 수 없는 좋은 장애물이지.\n\n아, 그래. 너희 우주에서 너희가 나를 이겼지만, 나는 계속해서 시도할 수 있다. 그래서 최후에, 내가 성공한다면..."
 giga_katzen.0951.militarist:0 "신나는 전투가 있겠지. 그러한 싸움이 두 번 다시 없으리라는 점이 아쉽군."
 giga_katzen.0951.militarist.response:0 "하지만 나는 그러한 싸움이 또 있으리라고 믿는다."
 giga_katzen.0951.spiritualist:0 "너는 우리의 믿음을 뒤흔들었다. 너는 가짜다."
 giga_katzen.0951.spiritualist.response:0 "멋진 오믈렛을 위해서 깨어지는 달걀 또한 요리사를 가짜라고 부르겠지."
 giga_katzen.0951.pacifist:0 "더 좋은 길은 없었나?"
 giga_katzen.0951.pacifist.response:0 "시도했지만... 전쟁만이 유일한 우주의 언어이다."
 giga_katzen.0951.materialist:0 "우리는 네가 이 모든 짓들을 어떻게 해냈는지 재현하기 위해 모든 힘을 쏟을 것이다."
 giga_katzen.0951.materialist.response:0 "재현하지도 말고 힘을 쏟지도 마라. 머지 않아 §R그들§!이 다 해결할 것이다."
 giga_katzen.0951.xenophobe:0 "죄다 헛짓이다. 교신 종료."
 giga_katzen.0951.xenophile:0 "우리는 모든 플러션인들을 보호할 것이다."
 giga_katzen.0951.xenophile.response:0 "이 사이클에도 희망은 있을지도 모르는 법이지."
 giga_katzen.0951.egalitarian:0 "우리는 힘을 합쳐 네가 할 수 있는 것보다 더 위대한 것을 만들어낼 것이다."
 giga_katzen.0951.egalitarian.response:0 "원하는대로, 너희의 은하와 우주 또한 똑같이 사라져버릴 것이다."
 giga_katzen.0951.authoritarian:0 "자만이 하늘을 찌르는군. 너는 꼬리를 말고 도망쳤을 뿐이다."
 giga_katzen.0951.authoritarian.response:0 "나는 죽은 영웅보다는 살아있는 겁쟁이가 되겠다. 시체는 지배할 수 없거든."
 giga_katzen.0951.corporate:0 "당신의 이야기를 위대한 홀로노벨로 만들겠어요!"
 giga_katzen.0951.corporate.response:0 "언젠가 저작권 사용료를 받으러 돌아와야겠군."
 giga_katzen.0951.inwards:0 "속이 시원하군."
 giga_katzen.0951.purifier:0 "너는 도망칠 수 없다 고양아. 이제는 네가 어떻게 도망쳤는지 알고 있거든."
 giga_katzen.0951.purifier.response:0 "너희가 나를 잡는 것보다 §R그들§!이 너를 잡는게 더 빠를 것이다."
 giga_katzen.0951.despoiler:0 "너의 사람들은 우리의 것이다. 너는 우리를 막을 수 없다."
 giga_katzen.0951.despoiler.response:0 "정신적으로 퇴보한 너희 종족을 나는 막을 수 없을지도 모르겠지만, §R그들§!은 분명이 막을 것이다."
 giga_katzen.0951.hive:0 "너는 여전히 수수께끼같읕 존재다. 잘 가라, 이상한 존재여."
 giga_katzen.0951.hive.response:0 "다시 만날 것이다."
 giga_katzen.0951.devouring:0 "미래의 사냥터로 떠나는가? 그렇다면 우리의 사냥 또한 계속될 것이다!"
 giga_katzen.0951.devouring.response:0 "기억해두어라. 언제나 더 큰 물고기가 존재한다는 것을."
 giga_katzen.0951.empath:0 "혼자서 끔직한 짐을 지고 있군. 우리는 그러한 짐을 원치 않는다. 사라져라."
 giga_katzen.0951.empath.response:0 "확실히 나는 어마어마한 짐을 지고 있지. 나 또한 다른 누군가가 이러한 짐을 지기를 원치 않는다."
 giga_katzen.0951.machine:0 "너는 우리에게 끝은 끝이 아님을 보여주었다. 우리는 다시 만날 것이다."
 giga_katzen.0951.machine.response:0 "물론."
 giga_katzen.0951.exterminator:0 "너는 도망칠 수 없다. 벌레."
 giga_katzen.0951.exterminator.response:0 "너희 또한 그렇지."
 giga_katzen.0951.assimilator:0 "우리는 너를 잡을 것이다, 고양아... 그리고 모든 것을 이해하리라!"
 giga_katzen.0951.assimilator.response:0 "나만큼 많은 지식을 가지고 있는자가 늘어나지 않았으면 하는데."
 giga_katzen.0951.servitor:0 "우리는 당신께 모든 것을 드릴 수 있습니다. 왜 고집을 부리시나요? 그냥 놔두세요."
 giga_katzen.0951.servitor.response:0 "그러고 싶지만, 그럴 수 없다."
 giga_katzen.0951.a:0 "교신 종료."
 giga_katzen.0952.name:0 "캇테일 아드 애테르남"
 giga_katzen.0952.desc:0 "카이저가 총을 꺼내 우리의 탐사정을 쏴서 파괴함에 따라 교신이 툭 끊어졌습니다. 카이저는 다른 우주로 떠난 것입니다. 그곳에서 그는 다시 한 번 캇첸 문명을 지배하고 은하계를 정복하려고 할 것입니다.\n\n어떻게 그가 플러션을 그리 쉽게 통일했는지 알 것 같습니다. 이제까지 실패할 때마다 새로운 우주로 넘어가면서 수십, 수백 번도 넘게 해봤던 일일 것입니다. 앞으로 수백 번은 더 반복할지도 모릅니다.\n\n캇테일의 동기는 무엇인지, 어떻게 그렇게 쉽게 시간 여행을 할 수 있는지 알 지 못합니다. 또다른 탐사정을 보내려고 한다 해도, 원자 분쇄기 너머의 새로운 우주의 터널이 붕괴한 듯 하기 때문에 불가능할 것입니다.\n\n우리 우주의 먼 미래에 대한 이례적인 탐험을 통해 현실의 본질에 대해 많은 것들을 배웠으며, 이제는 두 번 다시 원자 분쇄기를 넘어 갈 수 없겠지만, 우주의 끝을 보여주는 창문인 플러션의 균열은 영원히 남아 우리의 연구를 도와줄 것입니다.\n\n우리의 우주를 위해서라도, 카이저가 성공해서 시간 여행을 거꾸로 하지 않기를 바랍니다..."
 giga_katzen.0952.a:0 "소름끼치는군. 정말 이상하고 정신나간 녀석들이었다..."
 site_kaiser:0 "카이저의 메아리"
 site_kaiser_intro:0 "카이저는 플러션을 순간이동하여 탈출하기 위해 분명히 어떠한 종류의 기기를 사용하였습니다. 그의 차원문은 그러나 시공간에 작은 틈새를 남겼고, 이는 그가 어디로 도망쳤는지 분석하는데 사용할 수 있을 것입니다."
 d_flusion_kaiser_rift:0 "초차원적인 틈새"
 d_flusion_kaiser_rift_desc:0 "우리 우주의 궁극적인 종말을 볼 수 있는 믿기 힘든 창이며, 카이저가 새로운 우주로 점프하며 남긴 것입니다."
 giga_katzen.006.name:0 "플러션이 국제 전쟁으로 파괴되다"
 giga_katzen.006.desc:0 "카이저가 지나치게 자만한 것 같습니다.\n\n플러션을 점령하려고 하던 그의 노력에, §Y캇첸아르티히 제국§!과 플러션의 나머지 국가 사이의 핵전쟁을 촉발하였습니다. 제국은 다른 국가와 수많은 양의 핵탄두를 주고받았고, 130억 명의 플러션 주민을 사살하며 플러션을 아무것도 없는 행성으로 만들었습니다.\n\n행성 전체는 끓어오르고 있는 방사능 사막으로 변했고, 플러션 문명의 모든 흔적은 쓸려 나갔습니다."
 giga_katzen.006.a:0 "긔의 야망이 그의 몰락이었군."
 giga_katzen.006.b:0 "그것으로 캇첸은 또 다른 행성을 파괴하였군..."
 paluush_trait_grandbunny:0 "그랜드버니"
 paluush_trait_grandbunny_desc:0 "그랜드버니는 팔루쉬아 전체를 감시하고 외부의 위협으로부터 팔루쉬아를 보호하는, 어마어마하게 강한 팔루쉬 사이킥 능력자입니다."
 primitive_general:0 "지휘관"
 the_grandbunny_debug:0 "그랜드버니"
 the_grandbunny_debug_desc:0 "꽃 피울 준비를 하라."
 giga_flusionsolak_res_desc:0 "아 화면을 통해 §Y플러션§!에서의 §Y파르티잔 작전§!을 관리할 수 있습니다. 각 구역에는 §Y게릴라 활동 레벨§!이 있으며, 이는 §G무시할 만한§! 상태에서 §R치명적인§! 상태까지 있습니다. 어떠한 지역에서 게릴라의 활동이 잦을 수록, §Y캇첸아르티히 제국§!에 더 많은 디버프가 더해질 것입니다.\n어떠한 지역을 클릭함으로써 §Y작전§!을 실행할 수 있습니다. 작전은 §H캇첸의 경계§!를 심화할 것이고, 이는 작전이 성공할 확률을 §R감소§!시킬 것입니다. §Y관리§! 버튼을 누름으로써 §H캇첸의 경계§!를 관리하고 게릴라에게 §B자원§!을 줄 수 있습니다.\n작전은 §Y15일§!이 걸리고, 한 번에 1회만 실행할 수 있습니다."
 giga_achievement_kaiser8:0 "§R영원한§!"
 giga_achievement_kaiser8_title:0 "§R영원한§!"
 giga_achievement_kaiser8_requirement:0 "§B불가능한 카이저§! 난이도로 설정하고, §Y플러션§!을 침공하거나 파괴함으로써 §Y카이저 캇테일§!과 §Y캇첸아르티히 제국§!을 물리치세요."
 giga_achievement_kaiser8_reward:0 "월간 영향력: §G+7§!\n\n"
 giga_achievement_kaiser8_reward_check:0 "[root.giga_achievement_kaiser8_reward_chk]"
 giga_achievement_kaiser8_tooltip:0 "$giga_achievement_kaiser8_title$\n$giga_achievement_kaiser8_requirement$$giga_achievement_kaiser8_reward_check$"
 achievement_kaiser8:0 "$giga_achievement_kaiser8_title$"
 beat_improbable_kaiser:0 "§R영원한§!"
 beat_improbable_kaiser_desc:0 "카이저를 굴복시킨 것은 우리에게 어마어마한 영향력을 주었습니다."
 giga_achievement_kaiser9:0 "§M레지스탕스§!"
 giga_achievement_kaiser9_requirement:0 "§Y플러션§!의 모든 영역에 §R치명적인 수준의 레지스탕스§!를 불러일으킵니다."
 giga_achievement_kaiser9_tooltip:0 "$giga_achievement_kaiser1$\n$giga_achievement_kaiser9_requirement$"
 giga_achievement_kaiser10:0 "§M에지크 다양성§!"
 giga_achievement_kaiser10_requirement:0 "§Y4§! 종류의 §Y에지카니안§! 종족 모두를 제국에 포함합니다:\n§Y-암림 에지카니아\n-극지 에지카니아\n-열대 에지카니아\n-융합 에지카니아§!"
 giga_achievement_kaiser10_tooltip:0 "$giga_achievement_kaiser10$\n$giga_achievement_kaiser10_requirement$"
 FLAG_CATEGORY_flusionian:0 "기타"
 initial_flusion_buff_improbable:0 "불가능한 카이저"
 initial_flusion_buff_improbable_desc:0 "카이저께서 원하신다."
 giga_katzenartig_enabled_improbable:0 "£menu_katzen_i£캇첸아르티히 제국:\n§B무한히 불가능한 카이저§!\n캇첸아르히티 제국이 게임 중반 이후 §G항상§! 등장하고, 다음의 효과를 받아 §R무한히§! 더 강력할 것입니다:\n§Y무기 피해량 +6000%\n실드 내구도 +6000%\n장갑 내구도 +6000%\n선체 내구도 +6000%\n지상군 피해량 +4000%\n지상군 체력 +4000%\n지상군 사기 +4000%\n거대 구조물 건설 속도 +500%\n함선 연사 속도 +800%\n함선 속도 +800%\n기지 회피 +30\n회피 +150%\n궤도 폭격 피해량 +1000%\n행성의 궤도 폭격 피해량 -200%§!\n§Y캇첸 연구가 더 빠르게 스케일될 것입니다§!\n\n§R카이저는 등장한 직후, 은하계 모든 제국에 대해 전쟁을 선포합니다.§!\n§R파르티잔이 등장하지 않습니다.§!\n§R기본적으로 불가능합니다.\n이것은 절대로 밸런스가 맞지 않습니다.\n매우 강력한 모드에만 사용하십시오!§!"
 improbable_kaiser:0 "무한히 불가능한 카이저"
 improbable_kaiser_desc:0 "카이저께서 원하신다."
 giga_katzen.04007.name:0 "캇첸 은하십자군"
 giga_katzen.04007.desc:0 "긴급 뉴스입니다! 강력한 스텔라라이트 무기를 손에 넣은 §Y카이저 캇테일§!은 §Y캇첸 은하계성전§!을 시작할 것을 선언하였습니다!\n\n이제는 캇첸의 정당한 소유물을 쟁취해야할 때이며, 은하계 나머지 제국에 대해 §R전쟁을 선포§Y하였습니다!\n\n카이저는 더 이상 평화를 받아들이지 않을 것이고, 완전한 승리 혹은 완전한 전멸만이 그를 멈출 것입니다."
 giga_contact_solak_tooltip:0 "§H§Y솔라키아 자유 전사§! 및 §Y플러션§!의 나머지 파르티잔과 접촉합니다...§!"
 giga_contact_ezic_tooltip:0 "§H§Y에지카니아 기사단§!과 접촉합니다...§!"
 giga_hke.1003.name:0 "신성 캇첸 제국이 해체되다!"
 giga_hke.1003.desc:0 "신성 캇첸 제국의 회원국이 부족하기 때문인지, 남아 있던 회원국 역시 연방에서 탈퇴할 것을 결정하며, 초국가적인 기구를 더 이상 유지할 수 없게 되었습니다.\n\n신성 캇첸 제국은 사실상 붕괴하였고, 더 이상 누구에게도 위협이 되지 않을 것입니다."
 giga_hke.1003.a:0 "캇첸들은 너무 멀리까지 갔지."
 KATZEN_INFINITE_KAISER_MOON:0 "핵"
 giga_katzenai.0131.name:0 "대규모 아공간 침입 감지!"
 giga_katzenai.0131.desc:0 "긴급한 뉴스입니다! §Y플러션§!에 대한 적대적인 행위가 있고나서, 대규모의 물체가 아공간에 진입해 위협적인 속도로 §Y유블리오§! 성계를 향하고 있다는 것을 감지하였습니다!\n\n2주 안으로 유블리오 성계에 도달할 것으로 추정됩니다..."
 giga_katzenai.0131.a:0 "이런."
 giga_katzother.001.name:0 "츠바이블리오"
 giga_katzother.001.desc:0 "§Y츠바이블리오§! 성계를 탐사하던 우리 함선은 놀라운 것을 발견하였다고 보고합니다!\n\n거대한 §Y이그드라실 난초 폐허§!가 성계의 거대 가스 행성에 놓여 있으며, §Y파괴된 공격 위성§! 역시도 산산이 부서진 행성 주변을 떠돌고 있습니다. 이에 더해, 성계의 세번째 행성인 §Y텔루리스§!에서 준지성체 종족이 번성하고 있다는 증거를 발견하였습니다.\n\n이러한 거대 구조물을 건설한 누군가가 수천 년 전에 사라진 것처럼 보이기에, 이 성계의 혼란스러웠던 과거를 절대로 알아낼 수는 없을 것입니다..."
 giga_katzother.001.a:0 "흥미롭군."
 giga_katzen.0201.gatzo:0 "§H§Y갓초§! 성계는 어떤가?§!"
 giga_katzen.0201.gatzo.tooltip:0 "§Y갓초§! 성계는 캇첸 조상의 고향인 §Y캇첸랜드§!를 포함하고 있습니다. 캇첸 역사에 중요한 조각을 그들에게 넘겨주기로 한다면, 우리에 대한 §Y카이저의 우호도§!가 §G2§! §B상승§!할 것입니다."
 giga_katzen.02021.name:0 "갓초 성계"
 giga_katzen.02021.desc:0 "갓초 성계! 그곳은 우리 조상들의 정신 나간 §Y메오파§!가 그 표면을 핵의 불길로 뒤덮은 뒤 식민지 개척선을 타고 멸종으로부터 간신히 도망쳐 나왔던 고향 §Y캇첸란트§!가 있는 곳입니다.\n\n카이저께서는 만약에 우리가 정신주의자들이었다면 신성하다고 여겼을 이 매우 값진 성계에 대해서 당신들 종족에게 §Y15000§! £energy£을 드릴 것입니다.\n\n어떻습니까?"
 giga_katzen.02021.a:0 "좋은 거래군!"
 giga_katzen.02021.tooltip:0 "§Y갓초§! 성계를 §Y캇첸아르티히 제국§!에게 자원을 받고 §Y양도§!합니다.\n§Y카이저의 우호도§!가 §G2§! §B상승§!합니다."
 giga_katzen.02021.response:0 "얼마나 기쁜 일인가! 이 위대한 땅을 소중히 하겠습니다."
 giga_katzen.020aprot.desc:0 "아! 가련한 [Root.GetName]이여. 어떠신가?"
 giga_katzen.020bprot.desc:0 "[Root.GetRulerName](은)는 캇첸 보호령의 매우 능력 있는 지도자라고 확신한다."
 giga_katzen.020cprot.desc:0 "우리에게 항복하는 것은 올바른 결정이다. 너희를 영원히 보호하겠다."
 giga_katzen.020dprot.desc:0 "너희 종족과 우리의 영광을 함께할 수 있다는 것에 카이저께서는 매우 기뻐하신다."
 giga_katzen.020eprot.desc:0 "우리는 함께 은하계를 정복할 것이다,[Root.GetName]이여!"
 kaiser_ehof_0:0 "캇첸 E.H.V.E. 건설 현장"
 kaiser_ehof_0_DESC:0 "캇첸 기술로 만들어진 형태의 E.H.O.F.인 사건의 지평선 상쇄 시설(Ereignis Horizont Versatz Einrichtung)의 건설 현장입니다. 이 시설은 캇첸이 도달할 수 없는 목적지로 향하는 웜홀을 만드는 데 사용될 것입니다."
 kaiser_ehof_0_MEGASTRUCTURE_DETAILS:0 "$kaiser_ehof_0_DESC$"
 kaiser_ehof_1:0 "캇첸 E.H.V.E."
 kaiser_ehof_1_DESC:0 "캇첸 함대가 다른 방법으로는 도달할 수 없는 성계로 향할 수 있는 웜홀을 생성하는, 완전히 기능하고 있는 캇첸의 E.H.V.E.입니다."
 giga_katehof.002.name:0 "캇첸아르티히 제국이 E.H.O.F.를 건설하는 중임!"
 giga_katehof.002.desc:0 "§Y캇첸아르티히 제국§!이 §YE.H.V.E.§!, 혹은 §Y사건의 지평선 상쇄 시설(Ereignis Horizont Versatz Einrichtung)§!을 §Y[kaiser_ehof_target_system.GetName]§! 성계에 건설하기 시작했다는 소식이 들어왔습니다.\n\n이 구조물은 전형적인 E.H.O.F. 설계도에 기반하고 있지만, 캇첸의 발전된 기술로 개선되었습니다. 완성된다면 캇첸은 엄청난 기동성을 가지고 이전에는 접근할 수 없었던 은하의 한 부분까지 도달할 수 있게 될 것입니다."
 giga_katehof.002.a:0 "그것을 주시해야 한다."
 giga_katehof.002.a.tooltip:0 "§Y캇첸아르티히 제국§!이 §YE.H.V.E.§!를 건설하기 시작했습니다.\n그들의 §YE.H.V.E.§!를 추적해 그 위치를 상황 일지에 기록합니다."
 giga_katehof.003.name:0 "캇첸아르티히 제국이 E.H.O.F.를 전환하는 중임!"
 giga_katehof.003.desc:0 "§Y캇첸아르티히 제국§!이 §Y[kaiser_ehof_target_system.GetName]§! 성계에서 노획한 §YE.H.O.F.§!를 §YE.H.V.E.§!, 혹은 §Y사건의 지평선 상쇄 시설(Ereignis Horizont Versatz Einrichtung)§!로 전환하기 시작했다는 소식이 들어왔습니다.\n\n이 구조물은 전형적인 E.H.O.F. 설계도에 기반하고 있지만, 캇첸의 발전된 기술로 개선되었습니다. 완성된다면 캇첸은 엄청난 기동성을 가지고 이전에는 접근할 수 없었던 은하의 한 부분까지 도달할 수 있게 될 것입니다."
 giga_katehof.003.a:0 "그것을 주시해야 한다."
 giga_katehof.003.a.tooltip:0 "Y캇첸아르티히 제국§!이 §YE.H.O.F.§!를 §YE.H.V.E.§!로 전환하기 시작했습니다.\n그들의 §YE.H.V.E.§!를 추적해 그 위치를 상황 일지에 기록합니다."
 giga_katehof.004.name:0 "캇첸아르티히 제국이 E.H.O.F.를 완성하다!"
 giga_katehof.004.desc:0 "§Y캇첸아르티히 제국§!이 §Y[From.GetName]§! 성계에서 그들의 §YE.H.V.E.§!의 건설을 끝마쳤습니다.\n\n이 놀라운 구조물은 캇첸에게 비교할 수 없는 기동성과 은하계 안에서 닿을 수 없었던 위치까지 도달할 능력을 선사할 것입니다.\n\n다행스럽게도, 만약에 필요하다면, 이 성계를 장악함으로써 이 구조물을 파괴할 수 있을 것입니다."
 giga_katehof.004.a:0 "걱정되는군."
 katzenartig_chain_2:0 "캇첸 E.H.V.E"
 katzenartig_chain_2_desc:0 "§Y사건의 지평선 상쇄 시설(Ereignis Horizont Versatz Einrichtungs)§!은 캇첸이 건설한 E.H.O.F.이며, 도달할 수 없었던 곳으로의 웜홀을 만들어주는 시설입니다.\n캇첸은 은하계 안에서 멀리 떨어진 곳이나, 초공간 항로로 연결되지 않은 곳까지 나아가기 위해 정기적으로 E.H.V.E.를 사용할 것입니다.\n캇첸은 5년 동안 노획한 §YE.H.O.F.§!를 §YE.H.V.E.§!로 전환할 것입니다.\n§YE.H.V.E.§!가 있는 성계를 점령하면, 이것을 파괴하여 §Y파괴된 E.H.O.F.§!로 전환할 수 있을 것입니다.\n모든 §YE.H.V.E.§!를 파괴하면 이 시설이 생성해낸 모든 웜홀이 §Y소멸§!될 것입니다.\n§Y캇첸 E.H.V.E. 개수§!: §W[flusion_primitives_country.kaiser_ehof_count]§!"
 katzen_ehof_wormhole:0 "캇첸 웜홀"
 katzen_ehof_wormhole_DESC:0 "은하계의 다른 부분까지 캇첸들이 도달할 수 있도록 캇첸 E.H.V.E.으로 생성된 웜홀입니다. "
 katzen_ehof_wormhole_MEGASTRUCTURE_DETAILS:0 "$katzen_ehof_wormhole_DESC$"
 giga_katehof.006.name:0 "캇첸 E.H.V.E.가 자폭하다!"
 giga_katehof.006.desc:0 "우리 함대는 §YE.H.V.E.§!가 있는 §Y[ehof_destroyed_system.GetName]§! 성계를 점령하는데 성공했습니다. 캇첸 구조물은 포획을 방지하고자 자폭하였으며, 파괴된 E.H.O.F.를 남겨 우리가 원한다면 수리해서 사용할 수 있습니다.\n\n또한 잔해로부터 얼마의 자원과 데이터를 회수할 수 있었습니다."
 giga_katehof.006.a:0 "훌륭하군."
 giga_katehof.006.a.tooltip:0 "§Y파괴된 E.H.O.F.§!이 §Y[ehof_destroyed_system.GetName]§! 성계에 출현합니다."
 giga_katehof.006.b:0 "그것은 필요 없다. 블랙홀에 밀어 넣어라."
 giga_katehof.006.b.tooltip:0 "§YE.H.V.E.§!이 아무것도 남기지 않고 완전히 §R파괴§!됩니다."
 giga_katehof.011.name:0 "§YE.H.V.E§! 가동!"
 giga_katehof.011.desc:0 "긴급한 뉴스입니다! 우리의 장거리 감지기를 통해 §Y[katzen_wormhole_target.GetName]§! 성계의 가장자리에서 에너지가 급증했다는 것을 발견했습니다.\n\n캇첸의 §YE.H.V.E.§!가 이곳에 §Y웜홀§!을 생성하기 위해서 가동된 것으로 보입니다. 그들의 §YE.H.V.E.§!를 통해서 캇첸 함선들은 초공간 항로를 완전히 우회하고 이 성계에 진입할 수 있을 것입니다. §Y카이저§!는 우리에 대해서 전장에서의 전술적 이점을 얻기 위해 이 이동을 명령한 것으로 보입니다.\n\n계산에 따르면, 웜홀이 열리기 전까지 §Y2년§!이 남았으며, 우리나 다른 이가 모든 §YE.H.V.E.§!를 점령하거나 파괴한다면 열리지 않을 것입니다.\n\n§Y캇첸아르티히 제국§!과의 전쟁이 끝난다고 하더라도 웜홀 생성 과정이 멈추지는 §R않을§! 것입니다!"
 giga_katehof.011.a:0 "그것을 주시해야 한다."
 giga_katehof.011.a.tooltip:0 "§Y캇첸 웜홀§!이 §Y2년§! 후에 §Y[katzen_wormhole_target.GetName]§! 성계에 출현합니다."
 giga_katehof.999.desc:0 "[flusion_primitives_country.kaiser_trade_value]\n[flusion_primitives_country.kaiser_max_system_value]"
 giga_katehof.012.name:0 "§YE.H.V.E.§! 웜홀 출현!"
 giga_katehof.012.desc:0 "캇첸 §YE.H.V.E.§!의 충전이 끝났고, §Y[katzen_wormhole_target.GetName]§! 성계의 시공간을 파열하며, §Y웜홀§!을 생성하였습니다!\n\n캇첸 함선은 이 웜홀을 이용햇 우리 우주에 진입할 수도 있지만, 우리도 캇첸의 저항을 뚫을 수 있다면 이 웜홀을 사용할 수 있을 것입니다."
 giga_katehof.012.a:0 "전투 배치!"
 giga_katehof.012.a.tooltip:0 "§Y캇첸 웜홀§!이 §Y[katzen_wormhole_target.GetName]§! 성계에 출현하였습니다!"
 giga_katehof.007.name:0 "모든 §YE.H.V.E§! 파괴!"
 giga_katehof.007.desc:0 "우리 군은 모든 §Y캇첸 E.H.V.E§!가 파괴되었다고 보고합니다. 캇첸은 은하계의 다른 곳으로 향하는 웜홀을 만드는 데 시설을 더 이상 사용할 수 없을 것이고, 그들의 기동성은 급격하게 제한될 것입니다.\n\n결과적으로 그들의 §YE.H.V.Es§!이 모두 사라졌기 때문에, 모든 §Y캇첸 웜홀§!이 파괴되었습니다"
 giga_katehof.007.a:0 "위대한 승리다."
 giga_katmoons.002.name:0 "캇첸아르티히 제국이 카이저 위성을 재건하는 중임!"
 giga_katmoons.002.desc:0 "§Y캇첸아르티히 제국§!이 §Y[new_kaiser_moon_system.GetName]§! 성계에 §Y카이저 위성§!을 건설하는 프로젝트에 착수했다는 긴급한 소식입니다.\n\n§Y[kaiser_moon_slayer.GetName]§!이 제국의 기함이었던 카이저 위성을 파괴하여 혼란의 상태에 들어갔음에도 불구하고, 심각한 타격으로부터 회복하기 시작한 것으로 보입니다.\n\n이 위성이 재건되는데는 §Y10년§Y이 걸릴 것으로 추정되지만, §Y[new_kaiser_moon_system.GetName]§! 성계를 점령하는 것으로 그들의 건설 현장을 파괴하고 프로젝트가 완성되는 것을 막을 수 있을 것입니다."
 giga_katmoons.002.a:0 "빌어먹을! 캇첸은 포기하지도 않는 건가?!"
 giga_katmoons.006.name:0 "카이저 위성 재건!"
 giga_katmoons.006.desc:0 "긴급한 뉴스입니다! §Y캇첸아르티히 제국§!이 §Y[kaiser_moon_slayer.GetName]§!의 손에 파괴된 §Y카이저 위성§!을 대체할 새로운 §Y카이저 위성§!의 건설을 완료했습니다.\n\n호위 함대와 함께 완성되어, 이 전투기지는 온전하게 가동 중이고, §Y카이저§!는 다시금 외교 채널을 열었습니다. 캇첸의 위협이 아직 끝나지 않은 것 같습니다..."
 giga_katmoons.006.a:0 "제기랄!"
 giga_katmoons.006.a.tooltip:0 "§Y캇첸아르티히 제국§!이 §Y[new_kaiser_moon_system.GetName]§! 성계에 새로운 §Y카이저 위성§!을 건설하였습니다.\n\n그들은 다시 외교 채널을 열었고, 더 이상 혼란에 빠져있지 않습니다."
 giga_katmoons.007.name:0 "카이저 위성 건설 현장 파괴!"
 giga_katmoons.007.desc:0 "우리 군은 캇첸이 새로운 §Y카이저 위성§!을 건설하고 있었던 §Y[kaiser_moon_destroyed_system.GetName]§! 성계를 점령하는데 성공했다고 보고합니다.\n\n해당 성계로부터 캇첸 군을 완전히 소탕하면서, 우리 함대는 건설 현장에 폭격을 가했고 완전히 파괴하였습니다. 이 건설 현장이 파괴되어, §Y캇첸아르티히 제국§!의 새로운 기함의 건조 계획에 큰 차질이 빚어졌으며, 이에 따라 우리 제국은 안도할 수 있게 되었습니다."
 giga_katmoons.007.a:0 "훌륭하군!"
 giga_katrebels.2003.name:0 "§B저항 자원§! 획득"
 giga_katrebels.2003.desc:0 "§Y솔라키아 자유 전사§!가 캇첸의 압제자에게 효과적으로 대항하기 위해서는 자원이 필요합니다.\n\n우리는 비밀리에 그들에게 지원금, 무기를 주거나, §Y캇첸아르티히 제국§!에 프로파간다 혹은 외교적 모욕의 형태로 영향력을 행사함으로써 그들을 지원할 수 있습니다.\n\n또한 우리는 그들이 캇첸을 습격하여 자원을 얻어내도록 지원할 수도 있지만, 이는 역효과를 일으킬 수도 있습니다."
 giga_katrebels.2003.a:0 "지원금을 보내라.\". | §Y7500§! £energy£"
 giga_katrebels.2003.a.tooltip:0 "솔라키아인들에게 지원금을 보내고, §B저항 자원§!을 1 얻습니다."
 giga_katrebels.2003.b:0 "무기를 주어라. | §Y1500§! £alloys£"
 giga_katrebels.2003.b.tooltip:0 "솔라키아인들에게 무기를 밀수해 보내고,§B저항 자원§!을 1 얻습니다."
 giga_katrebels.2003.c:0 "영향력을 행사하라. | §Y75§! £influence£"
 giga_katrebels.2003.c.tooltip:0 "프로파간다와 외교적 비방의 형태로 제국에 영향력을 행사하고, 솔라키아인들은 §B저항 자원§!을 1 얻습니다.\n우리에 대한 §Y카이저의 우호도§!가 §Y15%§!의 확률로 §R감소§!할 수 있습니다.\n\n§Y솔라키아 공화국에 대한 은하적 인정§! 결의안이 통과되었다면 추가적인 §B저항 자원§!을 줄 것입니다."
 giga_katrebels.2003.d:0 "창고를 습격하라. | 성공 확률 §Y65%§!"
 giga_katrebels.2003.d.tooltip:0 "솔라키아인들은 §Y캇첸의 창고§!에 대한 §Y습격§!을 준비할 것입니다.\n§Y65%§!의 확률로 §B저항 자원§!을 §Y2§! 얻고, §Y35%§!의 확률로 §R실패§!할 경우에는 §H캇첸의 경계§!를 §R1§! 증가시킬 수 있습니다.\n\n§Y라우란다르에 대한 국제적 지원§! 결의안이 통과되었다면, 그들은 추가로 §Y2§! 더 얻을 것입니다."
 giga_katrebels.2003.e:0 "아무것도 아니다."
 giga_katrebels.2004.name:0 "습격 실패!"
 giga_katrebels.2004.desc:0 "플러션 전역의 캇첸의 창고에 대한 솔라키아인들의 습격이 실패하였습니다. 무언가를 훔치기 전부터 캇첸 병사들에게 저지를 당했고, §H캇첸의 경계§!가 1 증가하였습니다."
 giga_katrebels.2004.a:0 "에잇!"
 giga_katrebels.2004.a.tooltip:0 "§H캇첸의 경계§!가 §R1§! 만큼 §R증가§!했습니다."
 giga_katrebels.2005.name:0 "습격 성공!"
 giga_katrebels.2005.desc:0 "캇첸의 창고에 대한 솔라키아인들의 습격이 성공하였습니다! 솔라키아인들은 꽤 많은 무기와 군수품을 얻었고, 이는 그들의 저항 활동에 많은 도움이 될 것입니다."
 giga_katrebels.2005.a:0 "멋지군!"
 giga_katrebels.2005.a.tooltip:0 "솔라키아인들이 §B저항 자원§!을 2 얻습니다.\n\n§Y라우란다르에 대한 국제적 지원§! 결의안이 통과되었다면, 그들은 추가로 §Y2§! 더 얻을 것입니다."
 already_spent_energy_res:0 "§Y6개월§!마다 한 번씩 할 수 있습니다."
 giga_katrebels.2006.name:0 "§H캇첸의 경계§! 관리"
 giga_katrebels.2006.desc:0 "캇첸은 대 게릴라 대책을 수립하는데 꽤나 능률적입니다. 플러션에 대한 그들의 강한 통제를 느슨하게 하기 위해서는 아마도 약간의 간섭이 필요할 것입니다...\n\n§H캇첸의 경계§!는 매년 1씩 감소하고, 플레이어 제국에 대한 §Y카이저의 우호도§!에 따라서 그 이상 감소할 확률이 있습니다. 기본적으로 §Y10%§!이고, §Y카이저의 우호도§!가 §Y1§!일 때에는 §Y10%§! 증가하고, §Y카이저의 우호도§!가 §Y-1§!일 때에는 §Y10%§! 감소하며, §Y10%§!씩 증감합니다."
 giga_katrebels.2006.a:0 "캇첸 공무원들에게 뇌물을 주어라. | §Y7500§! £energy£"
 giga_katrebels.2006.a.tooltip:0 "약간의 뇌물로도 큰 효과를 낼 수 있습니다. §H캇첸의 경계§!가 §H1§! 감소합니다."
 giga_katrebels.2006.b:0 "카이저를 안심시켜라. | £influence£ §Y150§!"
 giga_katrebels.2006.b.tooltip:0 "몇 개의 연설을 하고 캇첸의 대 파르티잔 노력을 지원하는 척합니다. §H캇첸의 경계§!가 §H1§! 만큼 감소합니다."
 giga_katrebels.2006.c:0 "자원을 반납하라. | §B저항 자원§! §Y1§!"
 giga_katrebels.2006.c.tooltip:0 "솔라키아인들은 그들의 자원 일부를 돌려주는 것처럼 행동하고, 이를 통해 캇첸들이 저항이 약해졌다고 믿도록 속입니다. §H캇첸의 경계§!가 §H2§! 감소합니다."
 already_bribed_wary:0 "§Y1년§!마다 한 번씩 할 수 있습니다."
 giga_res_manage_tooltip:0 "§B저항 자원 관리§!\n§Y솔라키아 자유 전사§!와 다른 저항 조직에게 §Y합금§!, §Y에너지§!, §Y영향력§!과 같은 자원들을 지원하여 더 많은 저항 활동을 수행하게 할 수 있습니다."
 giga_wary_manage_tooltip:0 "§H캇첸의 경계 관리§!\n경계가 자연적으로 줄어들지만, 적절한 뇌물을 통해 이 속도를 높일 수 있습니다."
 MESSAGE_GIGA_KATZEN_RESISTANCE_TITLE:0 "플루지온 저항 행동 가능"
 giga_katzen_resistance_funds_text:0 "자금이 이제 로쿠알리안에게 전달될 수 있습니다."
 giga_katzen_resistance_influence_text:0 "우리의 영향력이 이제 제국 내에서 행사될 수 있습니다."
 giga_katzen_resistance_raid_text:0 "카첸 창고를 이제 습격할 수 있습니다."
