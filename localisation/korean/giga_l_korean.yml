 giga_achievement_blokkats7_tooltip:0 "$giga_achievement_blokkats7$\n$giga_achievement_blokkats7_requirement$"
 giga_achievement_blokkats8:0 "§R블록캣-카피캣§!"
 giga_achievement_blokkats8_requirement:0 "모든 §Y블록캣 부품§!을 역설계하세요."
 giga_achievement_blokkats8_tooltip:0 "$giga_achievement_blokkats8$\n$giga_achievement_blokkats8_requirement$"
 giga_mega.711.name:0 "시스템크래프트 파괴됨!"
 giga_mega.711.desc:0 "§Y스텔라 시스템크래프트§!가 최종 방어 시스템에 과부하가 걸릴 정도로 §Y[giga_debris_system.GetName]§!성계 내에서 극도로 강력한 공격을 받았습니다.\n\n시스템크래프트가 완전히 붕괴되기 전에, 이를 구성하던 §Y4개의 요새 행성§!과 §Y5개의 전쟁 위성§!이 긴급 프로토콜을 발동하여 함선의 선체에서 분리되었습니다.\n\n시스템크래프트의 항성 핵이 폭발하여 상당한 피해를 입었지만, 이 §Y요새 행성§!과 §Y전쟁 위성§!이 이제 함대로 새로이 편성되었습니다."
 giga_mega.711.a:0 "제기랄!"
 decision_claim_system_megas:0 "천체 전함 차지하기"
 decision_claim_system_megas_desc:0 "이 성계에 우리 소유가 아닌 손상된 요새 행성, 전쟁 위성 또는 소행성 포대가 있다면, 이 행성 결정을 통해 이에 대한 적법한 권리를 요구할 수 있습니다."
 decision_claim_system_megas_effect:0 "이는 이 성계 내의 모든 §Y폐허가 된 소행성 포대§!, §Y폐허가 된 전쟁 위성§!, §Y폐허가 된 요새 행성§! 그리고 §Y폐허가 된 에테르나이트 요새 행성§!이 우리의 직할로 이전될 것입니다."
 giga_blokkat.1034.name:0 "고철 낚시"
 giga_blokkat.1034.desc:0 "§Y블록캣-베스터§!의 소멸은 모든 블록캣 함선의 자폭으로 이어졌습니다. 하지만, 관측을 통해 한 때 이 모선을 지탱하던 복잡한 초차원 구조물의 잔해가 초채원 공간 내에 여전히 남아있다는 것이 밝혀졌습니다.\n\n그리하여, 그 내용물을 얻기 위해 초차원 공간에 닿을 수 있다면, 우리의 §Y초차원 발전기§!가 주기적으로 이 잔해를 빼낼 수 있을 것입니다.\n\n사실상, 이는 우리가 그것을 통제하는 한, 발전기가 £blokkat_scrap_icon£ §M블록캣 고철§!을 꾸준히 수집하여 블록캣 부품을 역설계하고자 하는 우리의 노력을 완성시킬 수 있다는 것입니다."
 giga_blokkat.1034.a:0 "좋은 소식이군!"
 giga_blokkat.1034.a.tooltip:0 "§Y초차원 발전기§!가 우리 영토 내에 있는 한, 매월 £blokkat_scrap_icon£ §M블록캣 고철§! §Y10§!을 생산할 것입니다."
 giga_blokkat.3000.fixblokkatstars:0 "수확된 성계를 §G복구§!하는 방법을 고안."
 giga_blokkat.3000.fixblokkatstars.tooltip:0 "블록캣은 우리 은하를 말로 표현할 수 없을 만큼 황폐하게 만들었지만, 블록캣 시간-여행 방법에 대한 최근의 조사는 그들의 재앙을 취소할 수 있는 방법을 보여줄 것입니다."
 giga_tech_blokkat_fix_systems:0 "시간을 통한 복원"
 giga_tech_blokkat_fix_systems_desc:0 "미래의 또 우주의 또다른 시대로부터 별을 되찾을 수 있는 거대한 구조물이야말로 바로 우리가 필요로 하는 것일지도 모릅니다. 빌어먹을 블로캣으로 인한 피해를 되돌리기 위해서말입니다."
 tech_blokkat_fix_systems_title:0 "§H거대 구조물 잠금 해제§!: 상호시간 복원기"
 giga_blokkat.3352.name:0 "상호시간 복원기"
 giga_blokkat.3352.desc:0 "시간 여행에 대한 매우 고된 연구의 결실인 §Y상호시간 복원기§!의 설계도가 이제 완성되었습니다.\n\n이제, 우리는 블록캣에 의해 파괴된 모든 성계 내에 이 무지막지한 거대 구조물을 건설할 것이며, 건설해야만 합니다. 모든 것이 계획대로 된다면, 미래 시대의 우주에서 별을 되찾아서 파괴된 성계에 다시 한 번 밝은 빛과 생명을 줄 것입니다. 아울러 앞서 말한 성계에 새로운 초공간 항로도 생성할 것입니다.\n\n이 텅 빈 성계를 차지하는 데 엄청난 비용이 들기 때문에, §Y상호시간 복원기§!의 건설을 시작하기 위해 성계를 §Y소유§! 할 필요가 §R없습니다.§!\n\n시간 조작은 어려운 작업이기 때문에, 블록캣에 의해 시공간의 구조가 헐렁해진 수확된 성계 내에서만 거대 구조물을 건설할 수 있습니다. 안타깝게도 다른 장소에 완전히 새로운 성계를 생성하는데 사용할 수는 없습니다."
 giga_blokkat.3352.a:0 "피해가 취소될 것이다."
 giga_blokkat.3351.name:0 "항성 낚시"
 giga_blokkat.3351.desc:0 "시간 여행은 위험한 사안이고 우리는 여전히 상당한 시간을 넘어서 미래로 무언가를 보내기엔 한참 남았습니다.\n\n그러나 §Y블록캣 연구 기관§!에 따르면, 충분한 에너지와 자원이 있더라도, 시간을 거슬러 살아있는 별을 찾고 그 별을 \"되돌려 받는\" 행위는, 실제로 몇 초 이상 앞선 시점으로 전송되는 것은 없기 때문에 완벽하게 수행할 수 있습니다.\n\n성계 전체를 현재로 가져오려 성계 전체의 시간적 위치를 바꾸기 위해 정말 말 그대로 \"시공간을 뒤집어야\" 하기 때문에, 이 과정은 당연하게도 대량의 에너지가 수반됩니다.\n\n물론, 선택된 별은 패러독스를 피하기 위해 인과의 범위를 벗어나야 합니다. 따라서 연구 기관은 이 작업을 해내기 위해선 미래에 구멍을 뚫는 것이 가장 안전한 절차라고 생각합니다."
 giga_blokkat.3351.a:0 "착수해라!"
 requires_destroyed_system:0 "텅 빈 성계에 건설되어야 합니다."
 blokkat_can_repair_system:0 "텅 빈 공허"
 blokkat_can_repair_system_desc:0 "이 성계는 완전히 공허이며 어떠한 물질도 없습니다."
 blokkat_star_fix_0:0 "$gc_blokkat$상호시간 복원기 건설 현장"
 blokkat_star_fix_0_DESC:0 "이전 파괴된 성계를 대체하기 위해 먼 미래로부터 항성을 받아올 수 있는 거대 구조물의 건설 현장입니다."
 blokkat_star_fix_0_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_blokkat$ - $giga_list_category_miscellaneous$\n§Y블록캣 수확 활동§!으로 파괴된 성계를 §Y완전히 새로운 성계§!로 재생성합니다\n§L시간 조작 기술 덕분에 상호시간 복원기는 블록캣에 의해 파괴된 성계를 복구할 수 있습니다."
 blokkat_star_fix_1:0 "상호시간 복원기"
 blokkat_star_fix_1_DESC:0 "상호시간 복원기는 우리 은하의 먼 미래에 구멍을 뚫고 항성과 그 행성들을 받아와, 이전에 블록캣에서 파괴되었던 성계를 대체할 수 있습니다."
 blokkat_star_fix_active:0 "복원기 활성화"
 blokkat_star_fix_active_DESC:0 "상호시간 복원기를 활성화하고 먼 미래로부터 항성을 받아옵니다."
 giga_blokkat.3353.name:0 "상호시간 복원기 건설 현장 완성"
 giga_blokkat.3353.desc:0 "§Y[giga_system.GetName]§! 성계 내에서 §Y상호시간 복원기§! 건설 현장이 건설되었습니다.\n\n이 플랫폼은 몹시 진보된 거대 구조물을 건설할 발판의 역할을 할 것이며, 그 거대 구조물은 충분한 시간 조작 능력을 발휘하여 먼 미래로부터 항성을 \"가져올\" 수 있으며, 잘된다면 블록캣에 의해 파괴된 성계를 대체할 것입니다."
 giga_blokkat.3353.a:0 "좋아."
 giga_blokkat.3354.name:0 "상호시간 복원기 완성"
 giga_blokkat.3354.desc:0 "§Y[giga_system.GetName]§! 성계의 §Y상호시간 복원기§!가 건설되었습니다.\n\n이 첨단 거대 구조물은 먼 미래에 구멍을 뚫을 수 있고, 통제되고 극도로 강력한 시간 파동 덕분에, 항성과 그 중력 우물을 시간을 통해 우리의 현재로 끌어올 수 있습니다.\n\n이는 결과적으로 블록캣에 의한 피해를 취소시킬 것이지만, 파괴 이전에 있던 것과는 극명히 다를 것입니다."
 giga_blokkat.3354.a:0 "좋아."
 giga_blokkat.3355.name:0 "상호시간 복원기 활성화됨"
 giga_blokkat.3355.desc:0 "상호시간 복원기가 작동하고 그 바로 옆의 모든 것이 눈부시게 밝은 빛의 펄스에 집어 삼켜지기까지 그리 오래 걸리지 않았습니다.\n\n은하계 전체에 걸쳐 엄청난 압력이 일시적으로 느껴지자 사방의 기계가 미쳐 날뛰지만, 단 몇 초 후에 진동이 빠르게 사라집니다.\n\n방금 복원기의 뼈대로 흘러든 엄청난 시간 에너지에 의해 파괴되어, 상호시간 복원기는 사라졌습니다. 하지만, 그곳에는 재양같았던 블록캣이 지나간 이후 처음으로, 별이 밝게 빛났습니다."
 giga_blokkat.3355.a:0 "훌륭하군!"
 giga_blokkat.3334.name:0 "팔루시아 파괴됨"
 giga_blokkat.3334.desc:0 "안타깝게도, 팔루시아가 은하에서 지워졌습니다. 결과적으로, 우리는 더이상 §Y그랜드버니§!와 연락할 수 없으며, 행성에서 연구했을지도 모를 모든 가능성이 무산되었습니다."
 giga_blokkat.3334.a:0 "안타깝군."
 giga_blokkat.3335.name:0 "팔루시아 소집 해제"
 giga_blokkat.3335.desc:0 "§Y블록캣§! 모선의 파괴와 함께, §Y그랜드버니§!가 팔루시아를 감싸던 거대한 사이오닉 보호막을 내렸습니다.\n\n이제 그들은 블록캣의 존재적 위협으로부터 마침내 자유로워졌고, 이에 §Y팔루쉬§!는 그들의 원래 목가적 삶으로 돌아갔으며 그랜드버니는 팔루쉬의 대모로서의 역할로 다시 한 번 돌아가기 전, 우리에게 안녕의 말을 보냈습니다.\n\n그러나 그녀가 이 사태 동안 축적한 에너지의 양으로 인해, 팔루쉬 지상군이 전보다 §R확실히§! 더 강력해졌고, 이제 팔루시아를 침공하려는 모든 시도는 분명이 끔찍하게 끝날 것입니다."
 giga_blokkat.3335.a:0 "그들의 역할을 다 했다."
 giga_blokkat.3335.a.tooltip:0 "§Y팔루시아§!가 원시 행성으로 돌아갔습니다.\n우리는 더 이상 §M그랜드버니와 접촉§!할 수 없을 것입니다."
 giga_blokkat.3350.name:0 "잃어버린 것의 복원"
 giga_blokkat.3350.desc:0 "§Y블록캣§!의 수확 함대가 패배했음에도 불구하고, 그들은 수십개의 성계를 완전히 황폐화 시키고 이전에 있던 모든 것을 완전히 비워버리며, 우리 은하에 지울 수 없는 상처를 남겼습니다.\n\n그러나, 우리의 §Y블록캣 시간 여행§!에 대한 약탈로, 우리의 §Y블록캣 연구 기관§!은 어쩌면 블록캣에 의해 황폐화된 성계의 복구를 가능케할지도 모를 야심찬 계획을 가져왔습니다.\n\n이론적으로, 누군가가 거대한 시간 여행 장치를 사용하면, 과거 또는 미래로 가서 §Y항성§!과 그 성계 전체를 되찾아올 수 있습니다. 물론 패러독스를 피하기 위해 우리 은하와 인과 관계가 없는 항성이어야만 합니다.\n\n그 제안은 대담하며 당연히 엄청난 비용이 들 것이지만, 이것이야말로 굶주린 블록캣이 우리 은하게 입힌 상처를 치료하기 위해 필요한 것일지도 모릅니다. §B블록캣 연구 프로젝트§!를 통해 이 프로젝트의 실행 가능성을 평가하고 시간 그 자체로부터 새로운 별을 \"낚을\" 수 있는 거대 구조물의 설계도를 그려낼 수 있습니다."
 giga_blokkat.3350.a:0 "승인한다."
 giga_blokkat.3350.a.tooltip:0 "새로운 §B블록캣 연구 프로젝트§!를 §Y블록캣 연구 기관§!에서 연구 가능합니다."
 grandbunny_shielding_system:0 "블록캣 반발장"
 grandbunny_shielding_system_desc:0 "§Y그랜드버니§!가 이 성계에 §Y블록-해체자§!와 §Y블록캣-베스터§!가 들어오지 못하도록 사이오닉 오라를 펼치고 있습니다."
 giga_blokkat.3332.name:0 "블록캣 반발장 사라짐"
 giga_blokkat.3332.desc:0 "§Y그랜드버니§!가 §Y[grandbunny_shielded_system.GetName]§! 성계 내에 만든 사이오닉 반발장이 사라졌습니다.\n\n다시 또다른 성계를 보호하기까지 §Y6개월§!을 기다려야합니다."
 giga_blokkat.3332.a:0 "알겠다."
 giga_blokkat.3333.name:0 "블록캣 반발장 준비됨"
 giga_blokkat.3333.desc:0 "§Y그랜드버니§!가 다시 한번 §Y블록캣§!으로부터 한 성계를 보호할 준비가 되었습니다.\n\n보호하기를 원하는 항성에서 §Y행성 결정§!을 시행할 수 있습니다."
 giga_blokkat.3333.a:0 "이해했다."
 decision_grandbunny_shield_system:0 "블록캣 퇴치"
 decision_grandbunny_shield_system_desc:0 "§Y그랜드버니§!에게 그녀의 사이오닉 힘을 사용해 블록캣이 이 성계를 파괴하지 못하도록 막으라 말하십시오."
 decision_grandbunny_shield_system_effect:0 "이는 §Y2 년§!간 이 성계에 §Y블록-해체자§!와 §Y블록캣-베스터§!가 들어오지 못하게 할 것이며, 보호를 다시 시작하려면 §Y6 개월§!을 기다려야 합니다."
 giga_blokkat.3331.power:0 "§Y블록캣§!에 대항해 어떻게 우리를 도울 수 있지?"
 giga_blokkat.3331.power.response:0 "블록캣과 직접 싸우고 싶지는 아니하다만, 내가 너희 스스로의 생존을 돕기 위해 저들의 공포를 이용할 수 있을 것이다.\n\n사실, 충분한 에너지만 있다면, 나는 멀리서 또다른 항성계 내에 나의 사이오닉 오라를 펼칠 수 있을 것이다. 잘된다면, §Y블록-해체자§!가 그 성계를 파괴하려는 시도를 단념시킬 수 있겠지.\n\n그렇게 하기 위해서는, 내가 보호하길 원하는 성계의 항성에 §Y결정§!을 시행해라. 이 보호막은 §Y2년§! 간 지속될 것이고, 같은 성계 혹은 다른 성계에 다시 시행하기까지 §Y6개월§!의 간격이 있을 것이다.\n\n안타깝게도, 난 §Y갓초§!와 더불어 하나의 성계만을 보호할 수 있다. 허나 바라건대, 너희가 너희 문명의 가장 중요한 자산을 보호할 수 있으면 좋겠구나."
 giga_blokkat.3331.desc:0 "반갑다, §Y[ROOT.GetName]§!들이여. 우리 §Y기록 대보관소§!의 정보가 불신스런 블록캣을 무찌르고자 하는 너희의 질문에 도움이 되었으리라 믿는다.\n\n팔루쉬와 내가 너희를 도울 수 있는 일이 있느냐?"
 giga_blokkat.3329.name:0 "시간교란기 설계"
 giga_blokkat.3329.desc:0 "블록캣 시간 여행의 우리 지식을 §Y초차원 불안정제§!의 설계에 통함함으로써, 더 높은 차원 뿐만 아니라, 과거와 미래 모두를 통해서 §Y블록캣 초차원 방벽§!을 동시에 공격하는 것이 가능해질 것입니다.\n\n사실상 이는 그것을 완전히 정지시키고, 블록캣이 그것을 수리하느라 수 년을 소비하게 만듭니다. 즉, 그 동안 그들의 귀중한 §Y블록캣-베스터§!를 공격할 수 있다는 것입니다."
 giga_blokkat.3329.a:0 "이 일을 완전히 끝내자."
 giga_blokkat.3329.a.tooltip:0 "이 기술의 비용은 대략 §Y100M§!입니다.\n$cant_do_another_blokkat_project_tech_tooltip$"
 giga_blokkat.3328.name:0 "시간 분열기"
 giga_blokkat.3328.desc:0 "§Y블록캣 시간 여행§!에 대한 우리 지식 덕분에, 우리는 더 정확하게 §Y블록캣 초차원 방벽§!을 연구할 수 있게 되었고, 이는 잠재적으로는 획기적이지만, 다소 놀랍지는 않은 발견으로 이끌었습니다.\n\n§Y방벽§!은 6차 공간 차원에서 회전할 뿐만 아니라, 끊임없이 가까운 과거와 미래를 옮겨다니고 있음이 밝혀졌고, 이는 사실 그것이 §Y7§! 차원, 시간 내에서도 회전하고 있음을 의미합니다.\n\n이는 기존의 방식으로 방벽을 불안정화 하려는 모든 시도는 효과가 있을 수 있지만, 시간 이전으로 발생하는 추가적인 안정성이 보호막을 상당히 빠르게 복구할 것입니다.\n\n그러나, 블록캣이 소규모 시간여행을 하기 위해 사용하는 방식에 대한 방대한 연구 때문에, 우리의 §Y블록캣 연구 기관§!이 §Y초차원 불안정제§!에게 방벽의 시간 이전 능력을 완전히 중단시킬 능력을 부여하기 위해, 이를 훨씬 더 \"업그레이드\"할 수 있다고 장담합니다.\n\n이는 훨씬 더 강하게 그것을 무너뜨릴 것이고, 블록캣이 다시 고장난 보호막을 작동시키기 위해 안간힘을 쓰는 동안 우리는 훨씬 더 오랫동안 §Y블록캣-베스터§!를 공격할 수 있을 것입니다.\n\n이 새로이 습득한 지식에 기초해, 우리의 §Y초차원 불안정제§!를 더욱 강화할 §B블록캣 연구 프로젝트§!가 생성되었습니다."
 giga_blokkat.3328.a:0 "알겠다."
 giga_blokkat.3328.a.tooltip:0 "새로운 §B블록캣 연구 프로젝트§!를 §Y블록캣 연구 기관§!에서 연구 가능합니다."
 giga_blokkat.3326.name:0 "때가 되었군."
 giga_blokkat.3326.desc:0 "현대 및 고대의 블록캣 유물에 대한 깊은 연구가 마침내 블록캣의 외관상 연대에서의 특이한 괴리에 대한 만족스러운 답을 제시했습니다. 처음에는 두 연대 측정값이 완전히 일치해보여 곤혹스러웠음에도 불구하고, 시간의 흐름의 변동을 감지하기 위해 고안된  (보통 블랙홀을 연구할 때 사용되는) 장치가 현대 블록캣 장치에 매우 가까워졌을 때 극히 작은 시간적 이상을 기록했습니다. 처음에는 블록캣 에너지의 극도로 높은 에너지 밀도의 부차적 결과라 여겼지만, 더 자세히 살펴보니, 모든 현대 블록캣 기구가 약간의 시간 조작, 즉 시간 여행을 사용하는 것으로 밝혀졌습니다.\n\n이 시간여행은 고작 펨토초 규모이며 따라서 보통 알아차릴 수 없지만, 그럼에도 불구하고 전부는 아닐지라도 대부분의 블록캣 장치가 이를 사용하고 있습니다(그리고 §Y기록 대보관소§!에서 검색된 고대 유물에는 전혀 없습니다.) 이는 장치로 하여금 가까운 과거, 현재 그리고 극도로 가까운 미래 모두에서 작동하도록 하여, 장치의 작업을 과거 혹은 미래로 맡기면서 사실상 기기의 컴퓨팅 능력과 성능을 상승시킵니다.\n\n가장 흥미로운 부분은 연대 괴리를 설명하는 부분일지도 모릅니다. 실제로, 대부분의 기기가 소규모에서만 시간 여행을 사용하지만, 더 커질수록, 시간 여행 능력은 더욱 커집니다. 우리의 §Y블록캣 연구 기관§!은 블록캣이 은하계에서 떠난 후 한 시점에서, 대규모 \"시간 도약\"을 하여 그들의 문명 전체를 10만 년 과거로 보냈다고 생각합니다.\n\n이 시간 이전에 대한 정확한 이유는 불분명하지만, 그럴듯 한 설명은 그들이 아마도 팔루쉬가 은하간 우주로 그들을 따라올까 두려워했다는 것입니다. 따라서 그들의 시간 역행 도약으로 팔루쉬에서 최대한 멀리 떨어져 보복의 위험으로부터 자유로워졌습니다."
 giga_blokkat.3326.a:0 "그들의 기술에 얼마나 더 많은 비밀이 있는 것이지...?"
 giga_blokkat.3326.a.tooltip:0 "§Y블록캣 시간 이동§! 기술을 연구하는 것은 §B블록캣 연구 프로젝트§!에 포함되지 않을 것이며, 미래에 블록캣에 대항해 반격할 큰 기회를 열어줄 수 있습니다."
 blokkat_timetravel_title:0 "블록캣 지식: §G+4§!"
 giga_tech_blokkat_timetravel:0 "블록캣 시간 이동"
 giga_tech_blokkat_timetravel_desc:0 "단일 항목이 과거와 미래 동시에 여러 번 작업이 수행되도록 하기 위한 블록캣 펨토초 시간여행 방법의 이해와 후속적인 적용은 우리 자신의 산업과 블록캣 관련 연구 모두에 대단한 이익이 될 것입니다."
 not_enough_scrap_knowledge:0 "§M블록캣 고철§! 혹은 §Y블록캣 지식§!이 모자랍니다."
 INVESTIGATE_BLOKKAT_DISCREPANCY:0 "시간 괴리 조사"
 INVESTIGATE_BLOKKAT_DISCREPANCY_DESC:0 "블록캣 문명의 나이에 대한 추정 두 가지 간에는 명백한 괴리가 있습니다. 당장 이 특이한 비밀을 풀어야합니다."
 giga_blokkat.3325.name:0 "괴리 조사"
 giga_blokkat.3325.desc:0 "§Y기록 대보관소§!에서의 발견이 블록캣 문명의 실제 나이에 대한 우리의 현재 추정치와 맞지 않습니다.\n\n블록캣 함선에서 얻은 £blokkat_scrap_icon£ §M블록캣 고철§!과 §Y그랜드버니§!가 기록 대보관소에서 우리에게 준 유물에 대한 올바른 조사를 하여 이 수수께끼같은 괴리를 밝히는데 도움이 될 수도 있습니다.\n\n어쩌면 블록캣의 나이에 대한 우리의 첫 가설이 부정확하거나, 아니면 팔루쉬가 블록캣과의 전쟁으로부터 얼마나 많은 시간이 흘렀는지 잊었는지도 모릅니다.\n\n아니면, 그냥 완전히 다른 무언가 때문일지도 모릅니다..."
 giga_blokkat.3325.a:0 "당장 착수해라."
 giga_blokkat.3325.a.tooltip:0 "이 특별 프로젝트의 비용은 약 §Y2M§!입니다.\n$cant_do_another_blokkat_project_tech_tooltip$\n£blokkat_scrap_icon£ §Y-150§!"
 giga_blokkat.3000.paluushtime:0 "§R시간 괴리§! 조사 | $blokkat_knowledge$ §Y30§! & £blokkat_scrap_icon£ §Y150§!"
 giga_blokkat.3000.paluushtime.tooltip:0 "블록캣의 외견상 나이와 기록 대보관소에서의 발견이 보여주는 나이 간의 특이한 차이를 조사해야합니다."
 giga_blokkat.3324.name:0 "시간 괴리"
 giga_blokkat.3324.desc:0 "블록캣 역사에 대한 우리의 철저한 연구는 현재까지 성공적이었으며, §Y기록 대보관소§!에서 발견한 사실상 모든 것들이 현대 블록캣 문명을 만들어내기 위해 줄을 섰습니다.\n\n한 가지 중요하고 매우 혼란스러운 항목을 제외하고는 말입니다. 기록 보관소에서 받은 유물의 나이는 팔루쉬-블록캣 전쟁이 대략 §Y1만 1천§! 년 전에 시작되었음을 보여주지만, 현재 우리 은하를 수확하고 있는 블록캣의 실제 나이는 대략 §Y12만§! 년으로 추정되는데, 이는 말이 안됩니다.\n\n블록캣이 팔루시아를 미친 듯이 피하기 때문에, §Y그랜드버니§!의 주장처럼 그들이 일어날 수 있는 (허나 불가능한) 팔루쉬의 보복을 두려워 한다는 것과 관련된 것으로 보아 , 팔루쉬와 교전한 블록캣이 \"현대\"의 블록캣과 같은 문명이라는 것에는 이견이 없습니다.\n\n이 수수께끼같은 괴리를 해결하기 위해, 새로운 §B블록캣 연구 프로젝트§!가 생겼습니다. 이는 우리의 연대 측정이 가능한 한 정확하다는 것을 보장하기 위해 고대와 현대의 블록캣 기술에 대한 직접적인 연구와 기술적 비교를 포함해야 합니다."
 giga_blokkat.3324.a:0 "정말 이상하군..."
 giga_blokkat.3324.a.tooltip:0 "새로운 §B블록캣 연구 프로젝트§!를 §Y블록캣 연구 기관§!에서 연구 가능합니다."
 giga_blokkat.3323.name:0 "블록캣 역사 문헌"
 giga_blokkat.3323.desc:0 "§Y기록 대보관소§! 덕분에 초기 블록캣 역사 전체를 완전히 나타냈기에, 이제 §Y블록캣 연구 기관§!이 데이터를 자세한 연대표로 정리하고, 블록캣의 과거를 표현하는 사건을 그들의 현재와 연관시킬 때입니다.\n\n이 새로운 데이터를 우리의 현재 모델에 완전히 통합시키는 것으로 우리는 블록캣의 사고방식을 올바르게 이해할 수 있을 것입니다. 이렇게 하면 그들의 기술 진화에 대한 종합적인 \"연대표\"가 확보되어 그들의 난해한 기술을 올바르게 역설계하고 활용하는 능력을 효과적으로 향상시킬 수 있습니다.\n\n연관된 기술을 연구하는 것은 §B블록캣 연구 프로젝트§!에 포함되지 않습니다."
 giga_blokkat.3323.a:0 "좋았어!"
 giga_tech_blokkat_history:0 "블록캣-팔루쉬 역사 문헌 조사"
 giga_tech_blokkat_history_desc:0 "팔루쉬가 걸어온 길과 뒤얽힌 블록캣이 걸어온 복잡한 길에 대한 조사는 우리가 그들의 사고방식과 기술 발전을 더 잘 이해할 수 있도록 도와줄 것입니다."
 blokkat_history_title:0 "블록캣 지식: §G+4§!"
 giga_blokkat.3322.name:0 "그랜드버니"
 giga_blokkat.3322.desc:0 "너희 고고학자들이 우리의 §Y기록 대보관소§!에서의 조사를 끝냈구나. 그 안의 정보가 너희 문명이 블록캣을 물리치고 우리 은하의 미래를 보호하는데 도움이 되었으면 한다.\n\n너희의 관대한 에너지 전송 덕분에, 내 자신의 능력을 보강하여 이제 약속한대로 블록캣과 너희의 싸움에서 너희를 도와줄 능력을 사용할 수 있게 되었다.\n\n비록 내가 실제 전투에서 그들을 무찌를 수는 없지만, 팔루쉬와 나는 저들의 팔루시아 공포증을 이용해 저들의 파괴적인 전진을 막거나 방해할 수 있을 것이다.\n\n이 능력을 내가 어떻게 사용하는지 알고 싶다면 다시 한 번 나와 접촉해도 좋다."
 giga_blokkat.3322.a:0 "자료에 감사한다, 이를 잘 활용할 것이다."
 giga_blokkat.3322.b:0 "§R이는 도움이 되었지만 우리의 윤리관에 반합니다. 이러한 예외 사항은 있어선 안됩니다.§!"
 giga_blokkat.3322.b.tooltip:0 "우리는 §R학살주의적§!이므로, 우리는 정보를 빼내고 다시는 팔루쉬와 접촉하지 않을 것입니다. 다시 그랜드버니와 접촉할 수 없을 것입니다."
 giga_blokkat.3315.a.tooltip:0 "$blokkat_knowledge$을 §Y1§! 얻습니다."
 giga_blokkat.3320.a.tooltip:0 "$blokkat_knowledge$ §Y1§! 및 £blokkat_scrap_icon£ §Y50§!을 얻습니다."
 giga_blokkat.3321.name:0 "시작의 끝"
 giga_blokkat.3321.desc:0 "마침내, 우리 과학자들은 이 격동의 이야기의 끝에 도달했다고 생각합니다! 팔루쉬인들이 팔루시아로 돌아온 뒤, 그들은 중공업은 등한시하고, 그랜드버니의 보호 안에서 목가적인 인생을 살아가려고 한 것 같습니다.\n\n팔루시아 행성을 개척하는 대신, 블록캣은 공장 부분을 들어내어 네오블로캣티나로 돌아갔고, 링 월드를 확장하고 부속 건물을 짓고, 더 많은 고리를 만들어 나날이 커져가는 제조업을 충족시켰습니다. 팔루시아를 떠나고 처음으로 드디어 행운의 여신이 블록캣을 돌아봤으며, 만약 블록캣이 이 선물들만을 가져갔더라면, 모든 것이 잘 되었을지도 모릅니다.\n\n팔루쉬들이 그들의 거대한 전쟁 함대의 무장을 해체하자, 블록캣에게는 너무 쉬운 먹잇감으로 보였을 것입니다. 그들이 어떤 생각을 하고 있었는지 확실하게는 알 수 없습니다. 어쩌면 블록캣은 팔루쉬가 엄청난 재앙을 겪었으리라 생각했을지도 모릅니다. 어쨌거나, 그들은 회수한 주조소를 사용해 전쟁 함대를 만들고 팔루시아를 향해 진군했습니다.\n\n관측에 따르면, 블록캣 함대의 일부가 오늘날 블록캣이 가지고 있는 수확 기술의 원조와 관련되어있는 듯 합니다. 팔루시아 문명을 파괴하고, 되찾을 목적이었습니다. 하지만 슬프게도, 이 순간까지, 블록캣은 진짜 그랜드버니를 만나지 못했었습니다. 블록캣의 오래된 방송에서, 그녀는 항상 팔루쉬가 밑는 뒤떨어지고 터무니없는 신으로 표현됐습니다. 그런 광대같은 존재는 없었지만 말입니다.\n\n블록캣 함대가 팔루시아에 도착했을때, 그들은 잘못 생각하고 있었다는 것을 깨달았습니다. 그랜드버니의 움직임은 그야말로 치명적이었지만, 우리 연구자들이 이를 묘사하기가 쉽지 않습니다. 이는 사이오닉 기록 보관소가 연구자들이 실제로 그곳에 있었다는 감각을 각인시키고 있어서 더 악화되었습니다. 고고학자 대장의 말에 따르면 다음과 같습니다:\n\n\"음, 그녀가 손을 위로 올리자 블록캣 함대가 뒤로 날아가기 시작했다, 그쵸? 그래서 내 생각엔... 그들이 안팎이 뒤집어져서, 그래서 다시 제대로 날아간 것 같습니다. 그래서 스크럽 벌레가 있는데. 스크럼 벌레가 뭔지 아십니까? 저도 모릅니다. 근데 그건, 그야말로 스크럼 벌레입니다. 그냥 알아요. 분명히 스크럼 벌레입니다. 그리고 이건. 음, 설명하기 힘들지만, 그러니까... 스크럼을 하죠, 알겠습니까?\"\n\n그리고 이것은 정말 공포스러운 방법으로 함대를 파괴했습니다. 이에 이 \"스크럼\" 사태를 보고있던 블록캣들은 긴급 탈출을 할 수 밖에 없었습니다. 그 후 곧, 블록캣은 네오블로캣티나에 아주 거대한 엔진을 건설하는 놀라운 공학적 위업을 세웠고, 그들은 최대 속도로 팔루시아에서 벗어났습니다. 은하의 가장자리까지 말입니다. 우리 과학자들은 그들의 네오블로캣티나까지 \"스크럼\" 당할까봐 두려워했으리라고 생각합니다.\n\n이 시점 이후로, 우리는 블록캣에 관련된 자료를 찾을 수 없었습니다. 현재 그들이 이곳에 있기 때문에, 블록캣은 은하에서 탈출하고 기술을 엄청나게 발전시킨 뒤 이제서야 돌아온 것이 분명합니다. 이 모든 일의 처음에, 블록캣이 우리 은하에서 시작되었다는 것이 믿기지 않습니다! 하물며 팔루시아가 그들의 문화 및 기술적 발전에 상당히 복잡한 역할을 했으리라고 추측할 수도 있습니다. 이 귀중한 정보 수집은 분명 우리의 §Y블록캣 연구 기관§!에 도움이 될 것입니다."
 giga_blokkat.3321.a:0 "그렇게 많은 시간이 지나도, 팔루시아를 전혀 이길 수 없었군."
 giga_blokkat.3320.name:0 "네오블로캣티나"
 giga_blokkat.3320.desc:0 "스파크번이 돌아왔을 때, 그는 포흐틴이 이끄는 훨씬 작은 파견 전함의 인사를 받았습니다. 포흐틴은 스파크번이 내려와 지도자로서 퇴임해야 한다고 요구했습니다. 그는 선견자로서의 의무를 저버렸고 트레버의 사람들과 교감하지 못했으며 존엄성도 영광도 없는 일방적인 대량학살 전쟁을 벌였습니다. 이 요구는 허세였습니다. 스파크번이 거부하면, 이는 내전으로 이어지고 포흐틴이 질 것은 뻔했습니다만, 팔루쉬인들은 자신들은 정치적 분열이 불가능 하다고 오랫동안 믿어왔습니다.\n\n그러나 이러한 정치적 분열은 현실입니다. 그리고 다행히도 관습과 전통에서의 완전한 탈선은 협상을 불러일으키기에 충분했습니다. 스파크번은 거부했고 이는 그의 옆에 있는 전함 내의 의회 상당수가 그를 지지한다는 것을 의미했습니다. 포흐틴은 스파크번이 의원들을 억류할 것이기에, 그들은 어쩔 수 없었을 것이라고 지적했습니다.\n\n선견자들이 문제에 대해 서로 다투면서 교착상태가 이어졌습니다. 트레버의 사람들은 약속대로 보상 받았지만, 스파크번의 행동이 완전히 허락된 행동이었다고 느끼지 않도록, 선례가될 수 있기 때문에 그 행동을 허용하지 않았습니다. 말다툼은 길게 이어졌고, 스파크번의 의회가 실제로 동족을 공격할 가능성에 대해 토론하기 시작하기에 이르렀습니다.\n\n그러자, 팔루쉬들 사이에 그녀의 존재가 퍼지는, 극적인 우연이 일어났습니다. 그랜드버니가 깨어났고, 그녀의 사이오닉 하품이 갓초 전체에 울려퍼졌습니다. 그녀는 과거의 일들에 대해 매우 적은 형식적인 설명만을 들었고, 즉시 제국의 모든 팔루쉬들과 연결한 듯 합니다. 그녀는 다시 한 번 팔루쉬들이 서로 다른 자들의 마음과 마음, 시련과 고통을 이해하도록 했습니다. 더 이상 팔루쉬는 멀리 있다는 점으로 편하게 서로와의 소통을 피할 수 없었습니다. 그랜드버니가 모든 틈새를 매웠습니다.\n\n아주 쉽게, 팔루쉬는 한 번에 그들의 제국을 해체하고 항상 살아왔던 그리고 살아갈 생활로 돌아갔습니다.\n\n한편, 블록캣의 최후를 확인하기 위해 정찰대가 파견되었습니다. 그러나 더 이상 유기체 블록캣은 없는 듯 했고, 그들의 신스 시민들이 블로캣티나의 성계에 인공 링 월드를 재건하기 시작했습니다. 폐허는 살 수 있는 집으로 바뀌었고 더 이상 자연 항성의 기능에 의존하지 않습니다. 그들은 새로운 집을 §Y네오블록캣티나§!라고 불렀습니다.\n\n블록캣은 이 시점에서 거의 속수무책이었습니다. 그들의 배들 중 일부가 연구를 위해 포획되었고, 그들을 조종하는 신스체는 오늘날 우리가 알고 있는 블록캣과 매우 흡사합니다. 이 시기의 몸체는 블록캣이 손에 넣을 수 있는 모든 것으로 만들어진 것으로 보입니다. 블록캣은 성계의 잔해과 고철을 필요한 것으로 바로 그냥 고쳐 사용했습니다.\n\n이 오래된 설계를 연구함으로써, 우리는 $blokkat_knowledge$ §Y1§!을 얻었습니다."
 giga_blokkat.3320.a:0 "뭔가 잘못된 것 같군."
 giga_blokkat.3319.name:0 "항성 복수"
 giga_blokkat.3319.desc:0 "스파크번이 아무런 문제 없이 그의 군대를 동원한 것은 아닌 듯 합니다. 전함 중 가장 거대한 것이 건조되는 중, §Y트레버§!라는 이름의 선견자가 전쟁 물자보다는 국내적 프로젝트에 자원을 더 써야한다고 불평하기 시작했습니다. 트레버는 이 시점까지 외부 식민지를 담당하고 있었고, 이 곳에는 현대적인 기반 시설이 그닥 많지 않았습니다. 그의 부족민은 얼마 있지도 않은 것들을 전쟁 기계로 보내야하고 이 거대한 함선에 승무원을 뽑아가서 마을에 교육받은 전문가가 전무하다는 점을 달가워하지 않았습니다.\n\n스파크번은 의회의 사람들이 정신을 차린다면 그 때는 이러한 조치가 필요하지 않을 것이라 주장했지만, 그러한 비난하는 핑계는 트레버의 사람들이 마주한 문제를 해결하는데 아무 도움도 되지 않았습니다. 트레버는 최대한 오래 버텼지만, 그에 대한 부족민의 신뢰가 무너지기 시작하자, 그는 전쟁에서 물러날 수 밖에 없었습니다. 트레버는 그의 승무원들에게 후퇴하라 지시했지만, 스파크번이 분개하며 그들을 막아 세웠습니다.\n\n이 문제에 선택의 여지가 없음을 분명히 하기 위해, 스파크번은 트레버를 트레버의 전함인 \"끈질기게 버티고 있는 멋지고 사랑스러운 고양이\"에 가택 연금 시켰습니다. 스파크번은 트레버의 부족이 함대 건조가 끝나고 충분한 보상을 받을 것이라고 했지만, 그래도 역시 그 말은 포흐틴을 지지했던 엔클레이브의 귀에까지 닿았습니다. 포흐틴은 동료 지도자를 억류 시키는 것이 범죄적 모욕이라 여겼지만, 행동은 구체화되지 않았고 준비가 끝나자, 함선이 출발했습니다.\n\n스파크번은 경고나 형식적인 선포 없이 블로캣티나 성계에 나타났습니다. 그의 함대의 무기에 동력이 들어왔고 블록캣은 반격하기도 전에 공격받았습니다. 팔루시아의 좀 더 재래식 전함 분견 함대가 발사한 첫 번째 공세는, 향성을 역겨운 사이오닉 힘의 무지개로 뒤흔들었고, 아래의 유기체 블록캣의 본질 그 자체를 찢어버렸습니다. 그들의 몸이 식물처럼 되었고, 이 소행으로 인해 블록캣 모두가 무기력해지고 뇌사상태가 되었습니다.\n\n뒤이어 발사된 것은 스파크번이 그 때를 위해 특별히 준비한 무기였습니다. 충전을 끝내자, 블로캣티나의 항성을 초기 크기의 10분의 1에 가깝게 압축시키기 시작했고, 함대 전체가 워프 드라이브와 유사한 방법으로 성계에서 탈출하였습니다. 항성이 빠르게 팽창했고, 초신성이 되었습니다. 이 항성의 죽음이 블로캣티나에 닿기까지 며칠이 걸릴 테였지만, 파괴는 끝났습니다.\n\n그 희생자들에게 스파크번은 다음과 같은 메시지만을 전했습니다.\n\n§Y\"팔루쉬는 부서지지 않는다. 우리는 구부러질 뿐이다. 뒤따라 오는 것은 강력한 반동이다.\"§!\n\n고향으로 돌아오는 것은 우울했습니다. 팔루쉬는 싸움을 예상했고, 그들의 기록에 그 당시 블록캣이 무슨 생각을 하고 있었을지 혹은 이를 예상했을지에 대해 거의 아는 바가 적혀있지 않았습니다. 행성이 죽기 전에 블로캣티나에서 많은 왕복선이 탈출한 듯 하지만, 팔루쉬의 기록은 성계 내의 모든 유기체가 박멸되었다고 확신합니다. 팔루시아에 처음 내렸을 때의 블록캣은 그냥 없어졌습니다.\n\n우리가 배운 모든 것으로부터 또다른 $blokkat_knowledge$을 §Y1§! 얻었습니다."
 giga_blokkat.3319.a:0 "놀라우리만큼 끔찍하군."
 giga_blokkat.3317.name:0 "긴급 망명"
 giga_blokkat.3317.desc:0 "마침내 이 단조로운 맞대응의 틈을 타, §Y캇첸랜드§!와 §Y니에네§!의 사람들이 우주 전쟁에 돌입했고, 팔루쉬와 블록캣은 이 덜 발달된 제국을 잠재적인 도움이 되리라 판단했습니다. 팔루쉬와 블록캣의 예측 모델이 모두 상대방이 개입할 것이고 전쟁에 돌입함에 따라 비극적인 변화가 있으리라고 말했습니다.\n\n블록캣은 주로 진보된 기계 거래원으로 사용했고, 반면 팔루쉬는 자신의 훌륭한 영웅의 경험을 빌려주며 돈을 받았습니다. 대부분의 팔루쉬가 이러한 작업을 해야하는 일로 여겼지만, §Y스파크번§!이라는 이름의 팔루쉬는 이를 일종의 자아를 찾는 휴가라고 여겼습니다. 그는 정말 수년간의 교착 상태에서 팔루쉬의 진보를 명확하게 이해하기 어려웠지만, 이 전쟁에서 그의 힘에 반대할 자는 없다는 것에 주목했습니다. 그에게는 놀랄만한 순간이었습니다. 그가 고향으로 돌아오자 그는 팔루시아의 미래 잠재력에 대한 수많은 열정적인 연설을 했습니다.\n\n캇첸랜드와 니에네간의 전쟁은 늘어졌습니다. 행성은 고통받고, 양 측이 휴전의 가능성을 두고 토론하기 위해 만났습니다. 블록캣과 팔루쉬 제국의 고위 관리들이 그들의 전설적인 미래시 능력을 이용해 조언을 제공해달라는 의미로 초청받았습니다. 블록캣은 휴전을 조언했지만, §Y포흐틴§!이라는 이름의 선견자인 팔루쉬 고위 관리는 이것이 경제적 고난으로 이어지며, 더욱 중요하게도 자신의 제국 또한 경제적 고난을 겪고 블록캣에게 이익이 되는 착취적 거래의 시대로 이어질 것이라 예견했습니다.\n\n포흐틴은 갈등을 해결할 수 있는 유일한 만족스러운 방법은 한 쪽에 대한 완전한 승리라고 말했습니다. 포흐틴은 이것이 팔루쉬 영웅에 의해 이끌러진 성공적인 전쟁이고 이를 통해 패권국으로 나아가리라 구상했습니다. 슬프게도, 위기에 처한 두 제국은 이를 더 음울하게 이끌어갔습니다. 아슬아슬한 평화가 이루어진지 얼마 되지 않아, 캇첸랜드와 니에네는 모두 핵으로 소멸했으며, 행성들의 팔루쉬가 죽었습니다.\n\n스파크번이 전쟁에 감명을 받은 것처럼, 포흐틴은 그의 역할에 의문을 품으로 이 재앙에서 떠났습니다. 스파크번이 위대함을 부르짖는 와중에, 포흐틴은 팔루쉬의 예견 시스템에 대한 기본적인 현실성에 대해 의문을 가지기 시작했습니다. 그는 예지 능력이 이제 그들의 제국이 결코 깨닫지 못할 미래를 예측하는데 너무 열중하고 있다고 주장했습니다. 팔루쉬가 기본적인 상식과 단순한 연역적 추론을 간과하고 있을 수도 있다는 것입니다.\n\n선견자들이 불길한 군사적 위협을 예언했을 때, 팔루쉬는 그의 의심을 시험해볼 기회를 얻을 것입니다. 포흐틴은 이 적들이 이성을 가지고 있을 것이고, 만약 팔루쉬가 외교와 공존을 준비한다면 평화의 가능성이 있으리라 주장했습니다. 분개한 팔루쉬들 사이에서 그의 말은 무시당했고, 스파크번의 무력 투쟁에 동조하는 팔루쉬들에게 포흐틴은 버려졌습니다.\n\n침략군은 \"§Y라봇츠§!\"라 알려진 대량학살 기계들의 제국으로, 가능했다 하더라도, 공존에는 관심이 없었습니다. 그들은 블록캣 통신망을 공격했고 그들의 전력망을 파괴했습니다. 반면 팔루쉬의 사이오닉 시설은 라봇츠의 이해를 넘어선 것이었습니다. 블록캣은 비틀거리며 행성에서의 엄청난 피의 대탈출을 할 수 밖에 없었습니다. 팔루쉬는 전진했고, 그들의 사기는 하늘 높은 줄 모르고 치솟았습니다. 라봇츠가 파괴될 때까지, 스파크번은 옹호받았고 포흐틴의 신뢰도는 엉망진창이 되었습니다.\n\n그러나, 비록 블록캣이 행성에서 도망쳤지만, 블록캣의 끝에 대한 기록은 아닙니다."
 giga_blokkat.3317.a:0 "그들은 그랜드버니의 도움조차 필요하지 않았군."
 giga_blokkat.3318.name:0 "새로운 시작"
 giga_blokkat.3318.desc:0 "그들의 대탈출에도 불구하고, 팔루쉬는 블록캣을 결코 놓치지 않았습니다. 그들은 블록캣을 추적하여 \"§Y블로캣티나§!\"라 불리는 새로운 행성으로 갔습니다. 엄청난 인명 피해를 입은 블록캣은, 탈출하기 전 챙길 수 있는 만큼만 챙겼던 식민지 탐험대를 고통스럽게 하는 물류상의 악몽과 마주했습니다. 문제를 해결하기 위해서, 그들은 광범위하게 신스 로봇으로 바뀌었고 스스로를 처음부터 완전히 재구축했습니다.\n\n노동력 부족을 채우기 위해 완전히 새로운 존재로 거듭난 것 외에도, 너무 병들었거나 부상당한 자들도 오래된 신체에서 새로운 기계 장치로 그들의 마음을 옮겼습니다. 수십년 안에, 블로캣티나의 표면 전체가 도시 행성로 바뀌었습니다. 그들은 성간 수확 활동을 재시작했고, 이제 오래 동안 이어진 전쟁이 아닌 그들이 원하는 곳에 노력을 집중할 수 있게 되었습니다. 블록캣의 회복 속도는 팔루쉬들에게는 우려가 되었습니다.\n\n팔루쉬도 마찬가지로 숨쉴 공간을 확장하여, 갓초 성계 그 너머로 나아갔습니다. 하지만, 그들 종족이 퍼져나가자, 서로간의 사이오닉 연결은 약해졌습니다. 불가사의한 기술이 정신 감응 능력을 보조했지만, 이 기계는 키고 끌 수 있었습니다. 팔루쉬는 언제나 서로 긴밀한 부족 관계를 유지했지만, 이제 부족은 매우 배타적이고 정치적이게 되었습니다.\n\n확장 초기 시기에는 내분이 거의 없었지만, 팔루쉬가 그 당시 물류 능력의 한계에 달하자, 스파크번은 살아남은 블록캣에 대한 문제를 제기하기 시작했습니다. 예측 장치가 아득한 곳에서 블록캣과 관련된 어떤 재앙응 예측하고 있지만, 그 징후가 너무 멀리 있어, 어떠한 선견자도 위험이 확실히 무엇인지 말할 수 없었습니다.\n\n스파크번은 팔루시아의 새로운 광대한 국경에 찬사를 표했고, 이런 시기적절한 국경은 블록캣이 그들의 고향으로 쫓겨났기 때문에 진정 이루어질 수 있었다고 모두에게 상기시켜주었습니다. 그가 주장하길, 이러한 행운이 블록캣의 재건으로 인해 위협받고 있으며, 곧 블록캣이 다시 한 번 팔루쉬의 경쟁자로 나타날 것이라고 했습니다. 다가오는 위협은 그것 뿐입니다.\n\n이러한 공포는 수많은 의원들과 집에 있는 시민들에게 퍼져나갔지만, 또 다시 영원한 전쟁에 들어서는 것을 두려워한 자들도 있었습니다. 포흐틴은 다시 한 번 예언의 오류에 대한 가설을 제기했고, 이번에는 적어도 정치적인 편의를 위해 포흐틴의 동료 여럿이 그의 주장을 받아들이고 그에게 동조했습니다. 선견자 의회는 결론을 내리지 못했지만, 대표단 다수가 스파크번의 편에 섰습니다.\n\n정치적 반대자들의 항의에 맞서, 스파크번의 엔클레이브는 거대한 전함을 건조하기 시작했습니다. 스파크번은 블록캣의 패배는 섭리이지만, 블로캣티나에 대한 공격은 모든 팔루쉬인들의 권리라고 선언했습니다. 블록캣의 악에 인해 가장 크게 다친 자들이 만들어낸 심판으로, 그들만이 블록캣의 죄의 진정한 그 크기를 알 수 있었습니다. 그리고 그들만이 블록캣의 파괴에서 태어난 진정한 평화의 달콤함을 알 것입니다."
 giga_blokkat.3318.a:0 "확실히 대단한 복수로군."
 site_paluushia:0 "기록 대보관소"
 site_paluushia_intro:0 "그랜드버니가 우리에게 팔루쉬의 거대한 §Y기록 대보관소§!에 대한 접근을 허락했습니다. 우리는 이를 세심히 분석하여 그 광대한 역사 기록을 사용해 수천년 전에 일어난 §Y팔루쉬-블록캣§! 전쟁의 그 복잡한 내용을 이해해야합니다. 잘된다면 이는 결국에는 우리에게 귀중한 $blokkat_knowledge$을 줄 것입니다."
 giga_blokkat.3314.name:0 "최초의 등장"
 giga_blokkat.3314.desc:0 "우리 과학팀이 거대한 §Y기록 대보관소§!를 상세히 연구하고자하는 고된 과정에 들어섰습니다. 처음에 우리 과학자들은 평범한 홀로그램 도서관이 있으리라 예상했지만, 대신 엄청나게 넓은 지하 동굴망과 마주했는데, 이는 카타콤과 물리적 박물관의 두 배였으며, 사이오닉 힘으로 조각되고 팔루쉬의 진보를 나타내기 위해 설계되었습니다.\n\n팔루쉬는 역사에 관해서는 매우 경건한 족족입니다. 팔루쉬는 놀라우리만큼 오래 살고, 누군가는 수천 년을 살 수도 있어서, 이 생명체의 아주 첫 존재는 제대로된 기록 보관 기술이 발명되기까지 살 수도 있었을 것입니다. 블록캣에 대한 최초의 언급은 구전으로 전승되고 신화 시대인 약 11,000년 전으로 거슬러 올라가는 그러한 기록에서 나타납니다. 고대의 팔루쉬는 하늘에서 내던져진 불꽃에 둘러싸인 은색 궁전으로 묘사하고 있습니다. 그곳에서 노란 몸의 생물체가 나타났습니다.\n\n이 블록캣을 묘사한 벽화가 있으며, 그들은 오늘날 은하 전체를 주확하는 자동 오토마톤과는 전혀 다릅니다. 대신 그들은 생체 종족입니다. 팔루쉬의 그림에 나타나듯이, 작고 사악한 악마입니다. 궁전이 떨어졌을때, 그 끔찍한 충격으로 팔루쉬 마을이 통째로 사라졌고 검은 구름이 솟아 해를 가렸다고 합니다. 일종의 팔루쉬 성전에서는 블록캣을 죄의 근원이라 비난하고, 몸에서 마음을 말할 수 없는 병든 자들이라 묘사하고 있습니다.\n\n이를 이해하기 위해, 우리는 사회학들을 불렀고, 그들은 팔루쉬 사회 전체가 강력한 사이오닉 능력과 함께 진화했음을 알아냈습니다. 이를 통해 팔루쉬는 정신 감응을 통해 얘기하고 서로의 감정을 느낄 수 있었으며, 이는 그들의 협력, 목가적 생활 방식에 도움이 되고 서로에게 거짓말을 하기 어렵도록 했을 것입니다. 사이오닉이 아니던 블록캣은 팔루쉬를 여러번 속이려했던 것 같습니다.\n\n그럼에도 불구하고, 일련의 절도, 토지 침입, 그리고 작고 폭력적인 언쟁에 이러, 팔루쉬는 §Y버터자기§!로 알려진 매우 존경받는 주술사의 살해에 따라 격노하게 됩니다. 그들은 전쟁 동원령을 내렸고, 블록캣을 완전히 몰아내고자 했습니다. 팔루쉬는 이를 블록캣의 병든 몸을 파괴하고 그들을 해방시키는, 일종의 정화로 보았습니다.\n\n블록캣은 우리가 대충 핵융합 시기에 사용하는 병기로 무장되어있었습니다. 팔루쉬 시체 몇 구에는 불에 그을린 자국과 에너지 무기가 뼈를 깨끗이 통과한 흔적이 있습니다. 반면 팔루쉬는 처음에는 원시적 창으로만 무장해 있었습니다. 이 창은 완전히 성장한 §Y[ROOT.owner.GetSpeciesName]§! 보다 몇 층은 더 컸으며 벽화에서는 거대한 공성 병기마냥 블록캣 요새를 향해 던져지고 있습니다. 하지만 여전히, 척 봐도 팔루쉬에겐 상당히 불리한 점이었습니다.\n\n팔루쉬 하나의 죽음은 그들에게는 비극이었습니다. 수백 혹은 수천 년의 경험과 지식이 한 번에 사라지는 것이었습니다. 여럿의 죽음은 살육이었습니다. 팔루쉬는 끔찍한 살육으로 묘사했고, 극심한 공포에 빠지기 시작했습니다. 한편, 가장 강력한 존재인 그랜드버니는 §Y대휴면§! 기간 중에 있었고 도울 수 없었습니다."
 giga_blokkat.3314.a:0 "흥미롭군."
 giga_blokkat.3315.name:0 "전쟁의 불씨"
 giga_blokkat.3315.desc:0 "이 시점으로부터, 팔루쉬 기술을 매우 빠르게 발전했음을 알 수 있습니다. 처음에 팔루쉬는 블록캣 전사의 맹공에 도망칠 수 밖에 없었고, 엄청난 영토를 빼았겼습니다. 블록캣은 악랄한 사냥개마냥 그들을 쫓았고, 결국 과확장 상태에 이르러, 팔루쉬 마을에 대한 가혹한 공습에 기대었습니다. 그러나, 이는 팔루쉬의 귀중한 통찰력으로 이어졌습니다.\n\n팔루쉬의 사이오닉 능력은 그들에게 모호한 일종의 예지 능력을 주었습니다. 보통 이 능력은 팔루쉬에게 흉작의 예감을 주었지만, 이 예측 능력 반응은 이 고난의 시기에 급격하게 약해졌습니다. 팔루쉬는 이 능력에 집중하기 시작했고, 처음에는 블록캣 공격을 예측해 팔루쉬들이 안전하게 빠져나갈 수 있게 하는데 사용했습니다. 그리고 나중에는, 그들의 군사 활동의 결과를 예측하는데 사용했습니다. 이러한 제한된 미래시는, 팔루쉬의 블록캣 보급선에 대한 일련의 매복 공격으로 이어졌습니다. 그들은 블록캣 공학자를 포획했고 사이오닉으로 그들을 심문하여 블록캣 병기를 더욱 잘 이해하게 되었습니다.\n\n팔루쉬 전사의 수는 적었지만, 거대했습니다. 거대한 주조소에서의 많은 작업이 손으로 이루어졌기 때문에, 제조 능력에 한계가 있었음에도 그들은 새로운 장갑과 표준 보병 소총용인 조야한 블록캣 탱크 화포를 만들 수 있었습니다. 이러한 무기와 갑옷이 개별적으로 만들어졌기 때문에, 많은 수가 기록 보관소에 명시되어 있으며, 설명이 덧붙여져 있고 그들의 노고를 기념하기 위한 높은 이름과 칭호가 주어졌습니다. 우리 공학자들은 이러한 것에 대해 지금의 우리에게조차도 가치있으며, 초기 블록캣 무기 발전에 대한 기초적인 이해력을 주리라고 말했습니다.\n\n팔루쉬가 맹렬한 반격에 나섰습니다. 각각의 전투에 대한 막연한 결과를 예측할 수 있었기에, 팔루쉬는 블록캣과의 장기간의 공성전을 통해 무찔렀고 블록캣 보급선을 공격했습니다. 블록캣은 중요한 채굴 활동을 여러 차례 빼았겼으며, 팔루쉬는 다가올 전투에서 버틸 원자재를 차지하였고, 시설을 되찾으려는 모든 시도가 좌절되었습니다. 블록캣 지도층은 이 시기에 팔루쉬의 갑작스럽고 설명할 수 없는 능력의 상승에 대해 갈팡질팡했던 것으로 보입니다. \n\n이 시기에 마침내 블록캣이 군대를 통합함에 따라 교착 상태에 빠지게 됩니다. 블록캣의 다음 공격 목표를 언제나 알 수 있었던 팔루쉬는 여전히 행성의 절반 이상을 완전히 방어할 정도의 인력이 부족했습니다. 어느 쪽도 진전을 이루어내지 못했습니다. 그래서 양 쪽은 위험하고 일촉즉발의 난투로 점철된 불안한 휴전의 시기에 머물렀고, 그 시기 동안 팔루쉬는 블록캣 포로를 이용해 정밀 기술을 더 잘 이해하고 그들의 산업 생산 방식을 개선했습니다.\n\n비록 현대의 블록캣 기술과는 거리가 멀지만, 블록캣은 이 시점에 이미 개인 정보 네트워크를 실험하고 있었습니다. 우리 공학자들이 말하길, 기본 소프트웨어 구조 일부가 여전히 현대 블록캣 시스템 내에서 사용되고 있다고 합니다. 믿을 수 없다고 여길지도 모르겠지만, 우리 과학자들은 인공지능으로 구성된 사회가 계속된 생존을 위해 과거에 대한 호환성에 의존한다는 점을 상기시켜주었습니다. 벽돌이된 OS 업데이트로 죽고 싶어하는 사람은 없을 것입니다. 우리의 연구 노력으로부터 $blokkat_knowledge$을 §Y1§! 얻었습니다."
 giga_blokkat.3315.a:0 "안타까운 충돌이군."
 giga_blokkat.3316.name:0 "대전쟁"
 giga_blokkat.3316.desc:0 "정말 오랜 시간 동안, 블록캣과 팔루쉬는 일종의 냉전 같은 것에 돌입한 듯 합니다. 팔루쉬는 스스스로의 계속해서 미래시를 갈고 닦을 뿐 아니라 사이오닉 능력을 무기화 하는데 새로운 기술을 계속 적용했습니다. 팔루쉬는 기존의 공급과 유지에 덜 의존하게 되었고 단지 생각만으로도 엄청난 수의 블록캣을 압도할 수 있는 자급자족 전쟁 기계가 되어갔습니다.\n\n사이오닉 능력의 물리적 현현은 블록캣에게 유레카적인 순간으로, 이제 팔루쉬가 그들의 인식 밖의 경기장에서 싸운다는 구체적인 증거를 가지게 되었습니다. 이를 보완하기 위해, 블록캣은 팔루쉬 전쟁에 들어갈 노력을 분석하고 예상하는 매우 복잡한 예측 알고리즘에 대한 작업을 시작했습니다. 소프트웨어는 꽤나 만족할 만한 수준이 되었고, 불행하게도 블록캣이 주조 능력을 확장하지 않는 한, 팔루쉬의 사이오닉 발전 능력이 곧 블록캣의 자원을 뛰어넘으리라 예측했습니다.\n\n이러한 사실에 두려워하여, 블록캣은 팔루쉬에 대항해 우위를 점하기 위해 시도했고, 이에 수 차례의 끔찍한 대규모 전투가 일어났습니다. 팔루쉬의 예측능력은 점점 더 좋아졌고, 아무것도 보여주지 못한 블록캣의 죽음은 블록캣 사람들 사이의 정치적 문제로 이어졌습니다. 그들의 정부는 더 권위주의적으로 바뀌었고, 반대 의견은 잔인하게 탄압했습니다. 블록캣의 오랜 적이었던 팔루쉬는 당시 블록캣 지도층이 마주한 모든 문제의 희생양이 되었습니다. 블록캣이 미끄러져 넘어질 때, 블록캣 정부는 이것이 팔루쉬의 사이오닉 공격이라 말했습니다.\n\n블록캣은 시선을 우주로 돌렸습니다. 이쪽 방면의 발전은 빨랐던 것으로 보이며, 우리 과학자들은 이 분야가 블록캣의 학습 기술에 크게 도움 받았으리라고 생각합니다. 머지 않아, 그들의 능력이 초기 우주 문명에 비견될 정도가 되었지만, 팔루시아를 버린다는 선택은 하지 못했습니다. 그들의 전쟁 예측 시스템이 전면적인 행성 이탈은 팔루쉬에 대한 무방비로 이어져, 받아들일 수 없는 인명 손실로 이어질 것이라 말했음이 틀림 없습니다. 그래서 그들은 대신 행성 방어를 증강하기 위해 우주 채굴 작업으로 손을 향했습니다. 한편 팔루쉬는 궤도 위성을 파괴하고 궤도 공격을 비껴내는데 매우 능숙해졌습니다.\n\n우주 여행이 팔루쉬의 위협을 물리칠 묘책이 되기를 희망하면서, 블록캣은 팔루쉬 방어를 넘어설 궤도 병기 배치에 엄청난 노력을 쏟았습니다. 주목할 만 한 것은, 이 병기 중 여러 대가 팔루쉬의 예측능력을 예측하려했고, 결과적으로 팔루쉬의 예측이 그들의 무방비 영토를 공격하도록 속였다는 것입니다. 이 프로그램은 가끔씩 잘 작동했지만, 세부 사항은 극히 기술적이고 팔루쉬는 그 방법에 대한 설명을 제시할 수 없었습니다. 이러한 발전에 맞서 싸우기 위해, 팔루쉬는 행성 위의 모든 궤도 기지를 파괴하자는 방침을 채택했고, 그것이 공격하기 전에 위협을 먼저 제거했습니다.\n\n이 다양한 파괴된 실험적인 궤도 병기가 기록 보관소에 있으며, 우리의 공학자들은 우리의 에너지 병기에 새로운 유효 탑재량 운송 방식을 적용할 수 있다고 보고했습니다!"
 giga_blokkat.3316.a:0 "그렇게 고조될 줄 알았지."
 giga_blokkat.33161.name:0 "범블 오페라"
 giga_blokkat.33161.desc:0 "기록 보관소에서 수 세기가 지났고, 우리 연구자들은 그냥 단순한 기록의 압도적인 양으로부터 유용한 정보를 찾아내는 것이 어렵다고 불평합니다. 양 측은 계속해서 말과 무기로 싸웠습니다. 블록캣은 효율성에 미친 독재국가가 되었고, 그 문화는 사실상 팔루쉬를 극복하는 것에 중심이 맞추어져있습니다. 수많은 책, TV 방송, 그리고 심지어는 아이들의 만화도 전부 팔루쉬는 원시적인 적으로 묘사합니다.\n\n십 년 동안 이어진 블록캣 연속극이 있는데, 중심 내용은 악한 팔루쉬가 블록캣을 친구로부터 꾀어내어 국가 기밀을 훔치려한다는 것입니다. 이러한 유행은 그 당시 현직 관리가 국가 자원을 유용해 팔루쉬를 도와서 해고되었다는 실제적인 정치 스캔들과 관련이 있는 것으로 보입니다. 그 사건을 일으킨 오타 때문에 \"원조\"라기보다는 적과의 \"놀음\"이라는 의미의 블록캣 말로 보고되었고, 이는 블록캣의 집단 상상력에 불을 지핀 것 같습니다. 팔루쉬는 이 연속극 뿐만 아니라 이에 대한 팔루쉬 정치인의 신랄한 논평 또한 기록하고 있습니다.\n\n그러나 §Y범블§!이라는 이름의 팔루쉬 선견자는 이 방송을 우습게 여기며, \"전쟁\"을 \"문화 전쟁\"으로 이끌어나가야 한다고 주장했습니다. 그는 한동안 대중과의 접촉을 제한하다가, 음파에 자신의 힘을 담는 일련의 사이오닉 무기를 가지고 나타났습니다. 그의 굉장한 볼륨감의 머리에 경의를 표하는 \"빅 범블 탑\"이라는 이름의 무대에 올라, 그는 음악을 방송했고 자신도 모르는 새에 블록캣 비평가를 방해했습니다. 이 비평가들은 그의 가사에 빠졌고, 친구들에게 그 내용을 퍼뜨리면서 블록캣 정부를 비난했습니다.\n\n블록캣은 음악에 완전히 눈이 멀었고 뜬금없이 문화적 혁명과 마주하게 되었습니다. 관리들은 빠르게 팔루쉬 음악을 문제와 연관시켰지만, 그들은 피해자의 마음에 두 번째인 \"더 매력적인\" 곡을 각인시키면 그 영향을 무력화시킬 수 있다는 것을 알아냈습니다. 그 다음에는 음악이 정말 엄청나게 쏟아져 나왔는데, 블록캣은 범블보다 더 매력적인 노래를 만드는 자에게 엄청난 재정적 장려책을 제공했기 때문입니다. 그리고 범블은 그 자신을 뛰어넘기 위해 새로운 히트곡을 끊임없이 공개하고 있었습니다.\n\n그들의 방송 네트워크의 제재와 격리 그리고 블록캣이 이제껏 만들었을 법한 가장 혼이 담긴 노래를 통해, 그들은 결국 문화 산업에 대한 통제권을 되찾고 새로운 규제를 마련했습니다. 그 시점으로부터, 블록캣 엔터테인먼트는 실용적이고 잠재적으로 위험한 것으로 취급되었습니다. 모든 유형의 비-인가된 엔터테인먼트를 듣거나 소유하는 것은 중범죄가 되었습니다.\n\n우리의 고고학자 대장은 범블의 많은 작업물을 들어봤고, 사인을 받을 수 없는지 궁금해했습니다. 하지만 그 선견자는 심드렁한 것 같습니다."
 giga_blokkat.33161.a:0 "흥미롭군."
 old_blokkat_plasma_gun:0 "원시-블록캣 에너지 무기 설계"
 old_blokkat_plasma_gun_desc:0 "고대의 블록캣이 설계한 궤도 플라스마 병기에는 매우 똑똑한 개선이 많이 적용되어 있으며, 이는 우리의 현대 설계에 통합되었습니다."
 paluush_grandarchives_payment:0 "기록 대보관소 에너지 전송"
 paluush_grandarchives_payment_desc:0 "그랜드버니는 블록캣을 막기 위한 그녀의 사이오닉 보호막을 충전할 에너지가 절실합니다."
 giga_blokkat.3312.name:0 "그랜드버니"
 giga_blokkat.3312.desc:0 "반갑다, §Y[ROOT.GetName]§!들이여. 우리 §Y기록 대보관소§!에 대한 너희의 조사가 계획대로 진행되고 있기를 바란다.\n\n§Y블록캣§!에 대해서는 걱정 말아라, 내가 있는 한 그들의 §Y블록-해체자§!는 감히 §Y갓초§! 성계에 들어오지 못할 것이다."
 giga_blokkat.3312.a:0 "이야기하고 싶다..."
 giga_blokkat.3313.name:0 "그랜드버니"
 giga_blokkat.3313.desc:0 "무엇이 알고 싶으냐?"
 giga_blokkat.3312.b:0 "화면을 꺼라."
 giga_blokkat.3311.name:0 "기록 대보관소"
 giga_blokkat.3311.desc:0 "동의가 끝나자, 그랜드버니는 팔루쉬 대표를 데리고 우리의 원정팀을 그녀에게는 일종의 궁전과도 같은 거대한 나탑으로 인도합니다. 그들이 더 깊이 들어갈수록 사이오닉 안개의 영향이 점점 더 약하게 느껴지자 공기는 확연히 더 신선하고 깨끗하게 느껴집니다.\n\n마침내 우리가 갈망하던 §Y기록 대보관소§!에 도달할 때까지 미로 같은 계단을 계속해서 4시간 이상 걸었습니다. 그리고 이곳은 상당히 거대합니다! 팔루시아의 지각 깊은 곳에 뻗어있는 거대한 동굴 내에 건설된 이곳에는 팔루쉬 역사 전체, 어쩌면 거대한 §Y팔루쉬-블록캣§! 전쟁까지도 포함한 역사를 이루는 수천 개의 기록, 책, 유물 그리고 유적이 있습니다.\n\n기록 보관자인 것 같은 몇 안되는 팔루쉬가 동굴을 거니는 것을 볼 수 있습니다. 보기엔 행성 표면에서 일어나는 거대한 사이오닉 활동에 동요하지 않는 듯 합니다. 기록 보관소는 그냥 거대하며, 이 모든 것을 조사하고 분류하는 데에만 수 년이 걸릴 것만 같습니다. 그러나 블록캣과 격동의 팔루쉬 역사에 대한 중요한 지식이야말로 이 기하학적 침략자를 이해하는데 진정으로 필요한 것일지도 모릅니다.\n\n이제 단 하나만 남았습니다. 즉, 실제로 기록 보관소를 조사하는 고된 작업을 시작하고 수천년 전 두 문명 간에 실제로 무슨 일이 일어났는지 이해하기 위해 이를 끼워 맞추는 것 말입니다."
 giga_blokkat.3311.a:0 "낭비할 시간이 없다."
 giga_blokkat.3306.name:0 "그랜드버니"
 giga_blokkat.3306.desc:0 "팔루시아를 감싸는 두꺼운 사이오닉 안개를 조심스레 걷기를 수 개월, 우리 연구팀이 마침내 구름의 제일 아래 층을 뚫었고 팔루시아의 예배식에 도달했습니다.\n\n그들은 일종의 집단 승천에 참여하고 있는 천만개의 눈에게 환영받았습니다. 그들 중 몇몇은 대량의 사이오닉 에너지를 행성의 대기에 흘린 채로 그 자리에 얼어붙은 것 같습니다. 또 다른 이들은 이 활동 전체를 감독하는 듯이 계속해서 행성을 순찰하고 있습니다.\n\n팔루쉬는 우리 탐사대를 알아차리거나 신경쓰지 않는 듯 합니다. 그들은 넑을 잃은 군중을 지나쳐 행성의 북반구 근처에 있는 거대한 나탑같은 건물로 향했습니다. 흥미롭게도, 행성의 표면은 급격하게 변화된 것 같지는 않고, 현재 행성에 몰아치고 있는 엄청난 양의 사이오닉 에너지가 없었다면 이 푸르른 평야는 꽤나 쾌적한 장소가 되었을 것입니다.\n\n거대한 나탐에 가까워지자, 함선의 팀원은 일종의 신비로운 영체가 그들의 의식 깊은 곳에서 나타났다고 보고했습니다. 그리고 이가 다름 아닌 §Y그랜드버니§! 그녀 자신, 팔루쉬 종족의 대족장이자 보호자가 우리와 소통하려고 함을 빠르게 알아차렸습니다.\n\n탐험대의 대장이 현재 §Y그랜드버니§!의 말을 우리에게 직접 전달하고 있습니다."
 giga_blokkat.3306.a:0 "화면에 띄워라."
 giga_blokkat.3307.name:0 "그랜드버니"
 giga_blokkat.3307.desc:0 "내가 너희에게 인사를 전하노라, 외계의 여행자여. 그래, 너희가 우리의 사이오닉 보호막을 뚫는데 성공했구나? 인상적이라 말하지 않을 수가 없군.\n\n그러나, 너희의 모습은 불경한 §Y블록캣§!과 전혀 닮지 않았거니와, 우리 §Y팔루쉬§!에게 적대적이지도 않은 듯 하구나. 너희 종족이 어찌한 이유로 그리 열정적으로 내 동족을 만나러 왔느냐?"
 giga_blokkat.3307.a:0 "우리는 §Y블록캣§!에 대한 정보를 찾는다."
 giga_blokkat.3308.name:0 "그랜드버니"
 giga_blokkat.3308.desc:0 "그리 예상했다. §Y블록캣§!은 사악한 존재이지. 도덕에는 관심이 없으며 자신의 이익에만 집중하지.\n\n그들은 수천년 전의 우리의 대전쟁의 시작부터 항상 그래왔다. 팔루쉬와 나는 현재 우리 행성을 향할 수도 있는 모든 침입을 막아내기 위해 우리의 사이오닉 잠재력을 쏟아 붓고 있지."
 giga_blokkat.3308.a:0 "전쟁? 너희 종족이 블록캣과 맞설 수 있을 것같지는 않은데."
 giga_blokkat.3308.a.response:0 "물론 할 수 없다. 하지만 수천 년 전에는 가능했다. 우리는우리의 땅, 팔루시아에서 블록캣과 싸웠다. 물론 그 때, 그들은 확연히 덜 발전했었지.\n\n이 생명체들은 언제가 기술적 우위에 있었지만, 우리의 막강한 사이오닉 능력 덕분에 맞설 수 있었지. 결국 그들은 우리를 결코 파괴할 수 없었다."
 giga_blokkat.3308.b:0 "분쟁이 어떻게 일어났지?"
 giga_blokkat.3308.b.response:0 "안타깝게도, 내가 §Y대휴면§! 중에 있었기에, 상세한 사실은 알지 못한다. 팔루쉬 문명의 대족장으로써, 내 힘은 일반적인 팔루쉬를 훨씬 능가하지만 내 자신의 에너지가 나를 파괴할 수 없게 하기 위해, 주기적으로 천 년간의 긴 잠에 빠져야한다.\n\n이 천 년간의 긴 휴면은 몇 십만 년 마다 일어나지만, 블록캣은 우리가 가장 취약할 때, 내가 그 휴면으로 팔루쉬를 보호할 수 없을 때 공격했다.\n\n나의 팔루쉬들은 천 년 넘게 이어진 이 너무도 긴 전쟁에서 기하학적인 침입자를 물리치기 위해 용감하게 싸워야만 했다."
 giga_blokkat.3308.c:0 "사이오닉 보호막의 목적은 무엇이지?"
 giga_blokkat.3308.c.response:0 "너희들이 짐작하듯, 이는 블록캣을 물리치기 위함이다. 저들이 우리의 마지막 전쟁때보다 훨씬 성장하였으니, 우리는 그들을 무찌를 수는 없겠지만, 우리의 과거 \"모든 역경에 맞선\" 승리는 블록캣이 우리를 경계하게 되었다는 것이지.\n\n팔루쉬와 내가 집중하고 있는 이 사이오닉 역장은 우리의 현재 능력을 과장하고 블록캣이 갓초 성계와 우리를 파괴하지 못하도록 단념시키지.\n\n저들의 끊임없는 파괴의 물결을 피하기 위해 우리가 열렬히 이용하고 있는 것은, 그들이 가진 순수한 공포증이다."
 giga_blokkat.3308.e:0 "너는 도대체 누구지?"
 giga_blokkat.3308.e.response:0 "나는 팔루쉬 종족의 수호자이자 보호자이다. 수백만 년 동안 나는 팔루쉬를 보호해왔고 팔루시아를 외부의 위험으로부터 지켜왔다.\n\n우주 제국의 시대가 오고 갔지만, 난 팔루쉬의 고향을 확고히 지키고 있다.\n\n만약 내가 쓰러진다면, 난 내 영혼 뿐만 아니라 팔루시아 전체를 농축된 사이오닉 수정으로 붕괴시키는 것이고, 우리를 복종시키려하는 자들의 필연적인 소멸을 기다릴 수 밖에 없다.\n\n그러나 내가 대휴면 중에 쓰러진다면, 팔루시아의 끝은 영원할 것이다. 이는 블록캣이 거의 해낼뻔한 것이지. 난 이러한 전술이 현대의 블록캣에게 소용없을까 두렵다. 저들은 거의 힘들이지 않고 사이오닉 수정을 완전히 없애는데 필요한 지식을 가지고 있음이 분명하기 때문이다.\n\n어떤 대가를 치르더라도, 저들을 다가오지 못하게 하는것이 중요하다."
 giga_blokkat.3308.d:0 "우리를, 어떻게든 도와줄 수 있나?"
 giga_blokkat.3308.d.response:0 "내가 비록 블록캣과의 대전쟁 동안 깨어있지 않았다만, 우리 팔루쉬는 그럼에도 불구하고 §Y기록 대보관소§!를 세웠다.\n\n팔루시아의 땅 아래 깊숙한 곳에 있는 이 미로같은 곳은 우리가 블록캣과 싸웠던 때로부터 블록캣에 대해 우리가 알고 있는 모든 것을 가지고 있지.\n\n내가 너희에게 접근을 허락할 수 있지만, 기록 보관소는 거대하며 그곳에는 우리의 가장 중요한 정보가 있으니, 너희와 같은 외부인을 들이는 것은 팔루쉬 보안 규약을 위반하는 것이다. 그러므로, 치러야할 대가가 있을 것이다."
 giga_blokkat.3309.name:0 "협상"
 giga_blokkat.3309.desc:0 "§Y그랜드버니§!가 §Y기록 대보관소§!에 대한 우리의 접근을 허가하려고 하지만, 그녀에 따르면, 우리가 별 준비 없이 사이오닉 보호막을 돌파한 것이 팔루쉬 사람들의 안전을 위태롭게 했다고 합니다.\n\n그리하여, 그녀는 그녀와 팔루쉬의 사이오닉 능력을 강화하여 블록캣이 팔루시아에 다가오지 못하게 하는 것을 돕기 위해, 우리가 매월 £energy£ §Y2500§!을 그녀와 팔루쉬에게 제공하라고 요구했습니다. 이 에너지 전송은 우리가 §Y기록 대보관소§!에서 필요한 정보를 모두 얻을 때까지 이어지며, §Y그랜드버니§!가 우리에게, 에너지를 지불한다면, 우리가 팔루쉬 기록 보관소를 다 읽고 나면 우리에게 보답할 방법을 찾아보겠다 장담했습니다.\n\n우리가 기록 보관소에서 일을 마칠 때까지 에너지 전송은 취소할 수 없으며 이는 최소 수 년이 걸릴 것입니다. 우리가 전송할 준비가 되면, 우리는 왼쪽 하단의 §M그랜드버니 접촉§!을 사용해 §Y블록캣 연구 기관§!을 통해 §Y그랜드버니§!에게 우리의 결정을 알려줄 수 있습니다."
 giga_blokkat.3309.descgeno:0 "§Y그랜드버니§!가 §Y기록 대보관소§!에 대한 우리의 접근을 허가하려고 하지만, 그녀에 따르면, 우리가 별 준비 없이 사이오닉 보호막을 돌파한 것이 팔루쉬 사람들의 안전을 위태롭게 했다고 합니다.\n\n그리하여, 그녀는 그녀와 팔루쉬의 사이오닉 능력을 강화하여 블록캣이 팔루시아에 다가오지 못하게 하는 것을 돕기 위해, 우리가 매월 £energy£ §Y2500§!을 그녀와 팔루쉬에게 제공하라고 요구했습니다. 이 에너지 전송은 우리가 §Y기록 대보관소§!에서 필요한 정보를 모두 얻을 때까지 이어지며, §Y그랜드버니§!가 우리에게, 에너지를 지불한다면, 우리가 팔루쉬 기록 보관소를 다 읽고 나면 우리에게 보답할 방법을 찾아보겠다 장담했습니다.\n\n우리가 기록 보관소에서 일을 마칠 때까지 에너지 전송은 취소할 수 없으며 이는 최소 수 년이 걸릴 것입니다. 우리가 전송할 준비가 되면, 우리는 왼쪽 하단의 §M그랜드버니 접촉§!을 사용해 §Y블록캣 연구 기관§!을 통해 §Y그랜드버니§!에게 우리의 결정을 알려줄 수 있습니다.\n\n§R우리가 학살주의적 제국이므로, 그랜드버니와 협력하는 것은 우리의 통상적인 정책에서 외계 생명체 친화적으로의 큰 변화를 의미합니다. 그러나, 블록캣 상황이 의심할 여지 없이 심각하기 때문에, 우리는 §M팔루시아 예외§!를 성립시켜, 적어도 일시적으로, 블록캣 상황이 해결될 때까지 그랜드버니와 함께하는 것을 받아들이기로 결정할 수 있습니다.§!"
 giga_blokkat.3309.a:0 "이해했다."
 giga_blokkat.3000.talkgrandbunny:0 "§M그랜드버니 접촉§!"
 giga_blokkat.3000.talkgrandbunny.tooltip:0 "이는 팔루쉬의 대족장인 §M그랜드버니§!와의 통신을 열 것입니다."
 already_talking_to_grandbunny:0 "우리는 §M그랜드버니§!와 이미 통신 중입니다."
 blokkats_are_already_gone:0 "블록캣이 패배하였습니다."
 giga_blokkat.3310.name:0 "그랜드버니"
 giga_blokkat.3310.desc:0 "반갑다, §Y[ROOT.GetName]§!들이여. 선택을 하였는가? 에너지 비용이 조금 높을 수 있다는 것을 이해한다, 하지만 사악한 블록캣을 상대할 때, 우리는 어떤 것도 양보할 수 없다.\n\n매월 £energy£ §Y2500§!을 주는 것을 받아들인다면, 너희가 §Y기록 대보관소§!를 다 읽고 나면 너희에게 보답할 것이다.\n\n또한 내가, 너희가 우리의 사이오닉 역장을 쉽게 들어오고 나갈 수 있게 하겠다. 하지만 §R의심스러운 짓§!은 시도하지 말라.\n\n§Y블록캣§!에 대해서는 걱정하지 않아도 좋다, 내가 있는 한, 저들의 §Y블록-해체자§!는 감히 §Y갓초§! 성계에 들어오지 못할 것이다."
 giga_blokkat.3310.a:0 "우리가 §Y기록 대보관소§!에 들어가게 해준다면 에너지를 줄 것이다."
 giga_blokkat.3310.ageno:0 "너희 종족은 예외로 두지. 우리를 들여 보내라."
 giga_blokkat.3310.ageno.tooltip:0 "이것이 우리의 윤리관과는 반대되지만, 블록캣 상황의 급박함 때문에, 팔루쉬에 대해서는 예외를 두어야 하고 그들과 협력해야 합니다."
 giga_blokkat.3310.b:0 "고민할 시간이 필요하다."
 giga_blokkat.3310.c:0 "§R다시 생각해보니, 의미가 없군. 그럼 이만.§!"
 giga_blokkat.3310.c.tooltip:0 "이는 팔루쉬 이벤트를 완전히 §R종료§!합니다. 우리는 그랜드버니와 다시 접촉할 수 없습니다."
 giga_blokkat.3310.c.response:0 "그럼 그렇게 하지. 잘 가라, §Y[ROOT.GetSpeciesNamePlural]§!들이여."
 the_paluushian_exception:0 "팔루쉬 예외"
 the_paluushian_exception_desc:0 "이것은 우리의 윤리관에 반할지도 모르지만, 우리는 그랜드버니와 협력해야합니다."
 giga_blokkat.3300.name:0 "반복되는 신호"
 giga_blokkat.3300.desc:0 "실제 우주와 §Y블록워크§! 모두에서 §Y블록캣-베스터§! 발신하는 상당히 암호화된 신호 다수를 관찰하면서, 우리의 §Y블로캣 연구 기관§!이 흥미로운 발견을 했습니다.\n\n실제로, 매우 특정한 패턴의 데이터가 블록캣 모선에 의해 지속적으로 반복되고 전달되고 있습니다. 블록캣이 우리 은하에 도착한 이후 빈도가 증가했을 뿐입니다.\n\n우리 연구자들은 이 신호를 통해 §Y블록워크§!에서 무엇이 계속 전달되고 있든, 이는 블록캣에서 매우 중요할 것이라 장담하며, 이를 해독할 §B블록캣 연구 프로젝트§!를 만들었습니다."
 giga_blokkat.3300.a:0 "승인한다."
 giga_blokkat.3300.a.tooltip:0 "새로운 §B블록캣 연구 프로젝트§!를 §Y블록캣 연구 기관§!에서 연구 가능합니다."
 giga_blokkat.3000.blokkpaluush:0 "§L반복되는 신호§! 조사"
 giga_blokkat.3000.blokkpaluush.tooltip:0 "§Y블록캣-베스터§!가 특이한 반복 신호를 발산하고 있습니다. 우리는 당장 이를 조사하고 해독해야합니다."
 giga_blokkat.3301.name:0 "신호 해독"
 giga_blokkat.3301.desc:0 "신호가 무엇이든, 이를 해독하고 이해하려 하는 것은 매우 중요합니다.\n\n현재 상태로는, 그 메세지가 주로 블록캣 문명 전체를 위해 만들어진 것이라 추정되는, §Y블록워크§!를 통해 전달되고 있지만, 그 빈도와 강도 그 자체로 보아, 그 통신이 실제 우주로 어떻게든 \"유출\"되고 있음을 의미하며, 잘된다면 우리의 연구자들이 이를 조사할 수 있을 것입니다.\n\n경고부터 어쩌면 그냥 평범한 수확 통계까지 어떤 것일지 모르지만, 이 명백히 중요한 통신을 노골적으로 무시하는 것은 현명하지 않을 것입니다.\n\n이를 해독하기 위해 §Y특별 프로젝트§!가 수행될 것입니다."
 giga_blokkat.3301.descmp:0 "신호가 무엇이든, 이를 해독하고 이해하려 하는 것은 매우 중요합니다.\n\n현재 상태로는, 그 메세지가 주로 블록캣 문명 전체를 위해 만들어진 것이라 추정되는, §Y블록워크§!를 통해 전달되고 있지만, 그 빈도와 강도 그 자체로 보아, 그 통신이 실제 우주로 어떻게든 \"유출\"되고 있음을 의미하며, 잘된다면 우리의 연구자들이 이를 조사할 수 있을 것입니다.\n\n경고부터 어쩌면 그냥 평범한 수확 통계까지 어떤 것일지 모르지만, 이 명백히 중요한 통신을 노골적으로 무시하는 것은 현명하지 않을 것입니다.\n\n이를 해독하기 위해 §Y특별 프로젝트§!가 수행될 것입니다.\n\n§R기술적인 한계 때문에, 멀티플레이어에서는 단 한 명의 플레이어만 특별 프로젝트를 완수할 수 있고 연관 이벤트 체인을 시작할 수 있을 것입니다.§!"
 giga_blokkat.3301.a:0 "당장 착수해라."
 giga_blokkat.3301.a.tooltip:0 "이 특별 프로젝트의 비용은 약 §Y30M§!입니다.\n$cant_do_another_blokkat_project_tech_tooltip$"
 giga_blokkat.3301.b:0 "나중에 하지."
 ANALYZE_PALUUSH_SIGNAL:0 "되풀이되는 신호 해독"
 ANALYZE_PALUUSH_SIGNAL_DESC:0 "알 수 없는 신호가 §Y블록캣-베스터§!에 의해 꾸준히 §Y블록워크§!로 방출되고 있습니다. 그 의미를 당장 알아내는 것은 매우 중요합니다."
 giga_blokkat.3302.name:0 "이해하기 어려운 좌표"
 giga_blokkat.3302.desc:0 "§Y블록워크§!에 대한 철저한 조사를 통해, 우리의 §Y블록캣 연구 기관§!은 알 수 없는 블록캣 반복 통신을 부분적으로 해독하는데 성공했습니다.\n\n그들의 결론은, 통신이 일련의 §Y좌표§!를 중심으로 하며, 통신이 여전히 우리가 완전히 모든 것을 이해하기에는 암호화 수준이 너무 높지만, 메시지의 나머지는 걱정 심지어는 두려움을 담고 있는 것으로 보인다는 것입니다.\n\n우리 문명의 보다 지상주의적인 인원들 몇몇은 블록캣이 §Y[ROOT.capital_scope.GetName]§!에 대해 말하는 것이라고 믿지만, 좌표를 추적하고자 블록캣이 사용하는 숫자 체계를 더욱 해독한 결과 이러한 헛소문은 빠르게 사라졌으며, 이 조사를 통해 좌표가 나타내는 곳이 다름아닌 원시 행성인 §Y팔루시아§!임이 밝혀졌습니다.\n\n행성의 거주자 §Y팔루쉬§!가 상당한 사이오닉 능력을 보인다는 것은 알려져 있지만, 이런 걱정스러운 통신은, 팔루시아에 대해 우리가 이전에 생각하던 것보다 더 많은 것이 있을 수도 있다는 증거가 되었습니다.\n\n우리는 가능하다면 §Y갓초§! 성계에 §Y과학선§!을 보내어야 하며, 무엇으로 인해 평화로워 보이는 팔루쉬를 블록캣조차 두려워하는지 조사해야합니다."
 giga_blokkat.3302.a:0 "이해했다."
 giga_blokkat.3302.a.tooltip:0 "§Y팔루시아§!에 대해 더 알아내기 위하여 §Y갓초§! 성계에 §Y과학선§!을 보내십시오.\n우리의 §Y팔루시아§! 관련 작전을 기록하는 새로운 §G블록캣 연구 작업§!이 가능합니다."
 giga_blokkat.3303.name:0 "팔루시아 역장"
 giga_blokkat.3303.desc:0 "§Y갓초§!에 배치된 우리의 과학선이 §Y팔루시아§!가... 다르다고 보고했습니다. 사이오닉 토끼류의 푸르른 행성은 사라지고, 대신 치명적인 에너지 폭풍으로 둘러싸인 끓어오르는 사이오닉 소용돌이가 되었습니다.\n\n어떠한 함선도 팔루시아의 표면에 너무 가까이 접근하지 못하게 하기 위해 행성 전체가 격변하는 에너지로 둘러싸였으며, 다가간 함선은 끔찍하게 붕괴될 것입니다.\n\n이 갑작스러운 변화는 블로캣이 우리 은하 내에 도착함으로써 촉발된 것이 분명합니다. 우리의 §Y블록캣 연구 기관§!은 이것이 팔루쉬가 블록캣에 대한 지식을 가지고 있다는 것을 나타내며, 따라서, 우리는 짙은 사이오닉 안개를 뚫고 안개 밑에 있는 팔루쉬 문명과 접촉을 시도해야 한다고 장담합니다.\n\n이를 수행하기 위해 §B블록캣 연구 프로젝트§!가 설립되었지만, 우리 연구자들은 이것을 진행하면 예상치 못한 결과를 직면할 준비가 되어 있어야 한다고 경고합니다."
 giga_blokkat.3303.a:0 "알겠다."
 giga_blokkat.3303.a.tooltip:0 "새로운 §B블록캣 연구 프로젝트§!를 §Y블록캣 연구 기관§!에서 연구 가능합니다."
 giga_blokkat.3000.paluushshield:0 "§P팔루시아§! 돌파 시도 | £energy£ §Y800000§!"
 giga_blokkat.3000.paluushshield.tooltip:0 "§Y팔루시아§!를 둘러싼 거의 뚫을 수 없는 사이오닉 에너지 폭풍입니다. 우리가 행성의 격동하는 사이오닉 대기에 어떻게든 진짜 엄청난 양의 에너지를 집중하면 돌파할 수 있을지도 모릅니다.\n§R이 프로젝트를 수행하는 것은 결과가 어떻게 되든 즉시 규약을 위반할 것입니다.§!"
 giga_blokkat.3304.name:0 "팔루시아 돌파!"
 giga_blokkat.3304.desc:0 "우리의 함선이 팔루시아의 격동하는 대기에 막대한 양의 에너지를 쏟아 붓자, 사이오닉 폭풍의 최외층이 흐트러지기 시작했고, 또다른 사이오닉 폭풍이 드러났습니다.\n\n그러나, 이 폭풍 중 몇몇은 팔루시아의 사이오닉 보호막 틈을 통해 난폭하고 괴상하게 \"새어 나오기\" 시작했으며, 팔루시아 궤도의 거대한 §R팔루시아 화신§!으로 합쳐졌습니다.\n\n돌파하려던 우리의 시도는 성공적이었고 심지어... 너무 성공적이었습니다. 이제 그 존재가, 안타깝게도 그 시선에 잡힌 모든 함선에 난폭하게 대량의 사이오닉 번개를 내뿜었습니다.\n\n팔루시아에 대한 조사를 계속하려면 이 존재를 제거해야합니다."
 giga_blokkat.3304.a:0 "전투 배치!"
 giga_blokkat.3304.a.tooltip:0 "거대한 §R팔루시아 화신§!이 §Y팔루시아§! 상공에 나타났습니다. 이는 §R적대적§!이며 당장 제거해야합니다."
 giga_blokkat.3305.name:0 "팔루시아 화신 제거됨"
 giga_blokkat.3305.desc:0 "§Y팔루시아§!를 보호하던 공포스러운 §R팔루시아 화신§!이 붕괴되었습니다.\n\n그 존재의 소멸과 함께, 우리는 이제 팔루시아의 사이오닉 폭풍 안쪽 층에 접근할 수 있습니다. 비록 매우 강력하고 위험하지만, 우리의 §Y블록캣 연구 기관§!은 함선이 충분히 보호된다면 탐사팀을 행성 깊은 곳으로 보낼 수 있다고 장담합니다.\n\n그리하여, 팔루쉬와 블록캣 간의 연결 고리를 이해하리라는 희망을 갖고 더 깊이 들어가기 위해 §Y팔루시아§!에 §Y특별 프로젝트§!가 생겼습니다."
 giga_blokkat.3305.a:0 "이해했다."
 giga_blokkat.3305.a.tooltip:0 "§Y팔루시아§!에 §Y특별 프로젝트§!가 생성되었습니다. 이는 §B블록캣 연구 프로젝트§!에 포함되지 않습니다."
 GO_INTO_PALUUSHIA:0 "팔루시아로 뛰어들다"
 GO_INTO_PALUUSHIA_DESC:0 "블록캣 침공에 대한 반응으로, 팔루쉬는 거의 뚫을 수 없는 에너지의 안개 밑에 스스로를 숨겼습니다. 팔루쉬와 블록캣의 관계를 찾고자 한다면, 우리는 폭풍우가 몰아치는 행성 깊은 곳까지 탐사대를 보내야만 합니다.\n\n이 특별 프로젝트가 진행되는 동안, 우리는 매월 £energy£ §Y1000§!과 모든 §Y연구§! §Y1000§!을 사용해 팔루시아의 격동하는 에너지의 힘으로부터 탐사대를 보호할 것입니다.\n\n이는 §B블록캣 연구 프로젝트§!에 포함되지 않습니다."
 paluushia_expedition_energy_cost:0 "팔루시아 탐사대 보호"
 paluushia_expedition_energy_cost_desc:0 "우리의 과학선을 팔루시아의 격동하는 에너지에서 보호하는 것은 많은 양의 에너지와 계속 변화하는 사이오닉 흐름을 밀어낼 끊임없는 과학적 혁신을 필요로합니다."
 country_base_physics_research_produces_add:0 "월간 물리학 연구"
 country_base_society_research_produces_add:0 "월간 사회 연구"
 country_base_engineering_research_produces_add:0 "월간 공학 연구"
 giga_blokkats_spawnlater:0 "블록캣이 §G나중에§! 나타나게 합니다.\n블록캣이 선택된 스폰 일자에서 §Y5년§! 내에 나타나기 시작합니다. §Y확정§!으로 설정되어있다면, 정확히 그 시기에 나타날 것입니다."
 giga_blokkats_spawnearlier:0 "블록캣이 §R더 일찍§! 나타나게 합니다.\n블록캣이 선택된 스폰 일자에서 §Y5년§! 내에 나타나기 시작합니다. §Y확정§!으로 설정되어있다면, 정확히 그 시기에 나타날 것입니다."
 giga_blokkats_randomgame:0 "블록캣 스폰 연도: §L무작위§!\n블록캣이 §Y2250§!에서 §Y종반 게임 시작 연도§!에서 §Y100년§! 후 사이에 아무때나 스폰됩니다. 확실히 알 수는 없습니다!\n\n§Y블록캣이 스폰되게 하고싶다면, §G확정§! 상태로 설정하세요. 확정 상태가 아니라면, 아예 스폰되지 않을 수도 있습니다.§!\n\n§G눌러서 §Y블록캣 스폰 일자§! 변경§!"
 giga_blokkats_lateendgame:0 "블록캣 스폰 연도: §E종반 게임 후반§! (기본)\n블록캣이 §Y종반 게임 연도§!에서 §Y100년§! 뒤에 스폰되거나 §Y에테르눔§! 혹은 §Y위기§!가 끝나고 §Y후반 위기 연도§!가 지났을 때 스폰됩니다. 먼저 만족된 조건을 따라갑니다.\n$blokkat_spawn_warning$"
 giga_blokkats_regularendgame:0 "블록캣 스폰 연도: §G종반 게임 중반§!\n블록캣이 §Y종반 게임 연도§!에서 대략 §Y50년§! 이후에 스폰됩니다.\n$blokkat_spawn_warning$"
 giga_blokkats_endgame:0 "블록캣 스폰 연도: §Y종반 게임§!\n블록캣에 §Y종반 게임 연도§! 이후에 스폰됩니다.\n$blokkat_spawn_warning$"
 giga_blokkats_latemidgame:0 "블록캣 스폰 연도: §H중반 게임 후반§!\n블록캣이 §Y중반 게임 연도§!에서 대략 §Y50년§! 이후에 스폰됩니다.\n$blokkat_spawn_warning$"
 giga_blokkats_midgame:0 "블록캣 스폰 연도: §S중반 게임§!\n블록캣이 §Y중반 게임 연도§! 이후에 스폰됩니다.\n$blokkat_spawn_warning$"
