 solak_name:0 "§Y솔라키아§!"
 solak_desc:0 "§L솔라키엔 혹은 솔라키아는 자유와 정당 정치, 가상 엔터테인먼트를 자랑스럽게 여기는 솔라키아 공화국의 땅이었습니다. 캇첸은 현재 그들의 암호화 센터와 중요 데이터뱅크를 솔라키아의 땅 전역에 걸쳐 설치하였습니다.§!"
