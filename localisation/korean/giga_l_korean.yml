 giga_aeternum.2000.name:0 "에테르나이트 선조"
 giga_aeternum.2000.desc.a:0 "§B<<인사 프로토콜 초기화중>>§!\n\n반갑습니다, §Y[ROOT.GetName]§!여. 저는 자동화 §Y에테르나이트 사이코 신스 외교 장치§!로, §Y에테르눔§!과 은하계간의 인터페이스 역할을 하기 위해 배치되었습니다. 외교 프로토콜에 따라, 여러분의 문명에 대한 스캔이 시작될 것입니다.\n\n§B<<대상의 사회적 및 지적 발전 분석중>>§!\n\n여러분의 현재 기술 발전 수준으로 인해, §Y에테르나이트 선조§!와 직접 소통하고자 하는 요청이 §R<<거부>>§!되었습니다.\n\n여러분 종족의 지적 욕구를 해소하고 에테르나이트의 일에 대한 비간섭을 확실히 하기 위해, 우리는 우리 문명에 대한 기본적 정보를 §B데이터뱅크§! 내에 자료화해 두었습니다. 원하신다면 열람하실 수 있습니다.\n\n§B<<인사 프로토콜 종료중>>§!"
 giga_aeternum.2000.who:0 "에테르나이트가 누구지? | §B데이터뱅크§!"
 giga_aeternum.2000.who.response:0 "§B<<데이터뱅크 정보 검색 중>>§!\n\n§Y에테르눔§!은 §Y은하 중심§!에 건설된 §Y버치 월드§!인 §Y아이온디아§!의 문명으로 구성되어있습니다. 최초의 에테르나이트 고향인 §Y코우이마탈라§!에는 더 이상 아무도 살고 있지 않으며, 현재 전부 버치 월드에서 거주 중입니다. 프로토콜에 따라, 그들은 방해받길 원치 않으며, 어떠한 경우에도 외부 은하는 에테르나이트의 일에 간섭해선 안됩니다.\n\n현재 아이온디아의 인구는 총 §Y1경 600조§!이며 구조물의 거주 가능 구역의 약 §Y0.014%§!를 차지하고 있습니다. 나머지 §Y99.986%§!은 §R<<데이터 없음>>§!입니다.\n\n에테르나이트의 안전을 위협하면 §R즉각적인 종료§!로 이어질 것입니다.\n\n§B<<데이터 기록 끝>>§!"
 giga_aeternum.2000.howold:0 "너희 문명은 얼마나 오래되었지? | §B데이터뱅크§!"
 giga_aeternum.2000.howold.response:0 "§B<<데이터뱅크 정보 검색중>>§!\n\n§Y에테르눔§!의 추정 나이는 §Y120만 표준 주기§!로, 그 중 §Y93만 1천 주기§!는 §Y아이온디아§!에서 지냈습니다.\n\n이번 은하 주기는 §Y은하 중심 초공간 항로§!를 복구하기 위한 §Y9 번째§! 주기로, 이는 자동화 타키온 붕괴기로 인해 다음 수 세기 안에 자동적으로 붕괴될 것입니다.\n\n초공간 항로가 열려있는 동안 에테르나이트 문명에 간섭하려고 하지 말아주십시오.\n\n§B<<데이터 기록 끝>>§!"
 giga_aeternum.2000.war:0 "이곳에 너희 늙어빠진 문명의 자리는 없다. | §R전쟁 선포§!"
 giga_aeternum.2000.war.tooltip:0 "우리는 고대 국가인 §Y에테르눔§!에게 §R전쟁을 선포§!할 것입니다.\n\n그들은 평화를 받아들이지 §R않습니다§!.\n\n유일한 결과는 완전한 승리이거나 완전한 파괴입니다."
 giga_aeternum.2000.war.response:0 "§R<<경고: 비순종적 원시인이 적대적 행동을 보이는 중>>§!\n\n§R<<방어 프로토콜 초기화중>>§!"
 giga_aeternum.2000.warawake:0 "각성을 끝내게 두지 않겠다! | §R전쟁 선포§!"
 giga_aeternum.2000.warawake.tooltip:0 "우리는 고대 국가인 §Y에테르눔§!에게 §R전쟁을 선포§!할 것입니다.\n\n그들은 평화를 받아들이지 §R않습니다§!.\n\n유일한 결과는 완전한 승리이거나 완전한 파괴입니다.\n\n그들이 현재 §Y각성§!을 준비하고 있기 때문에, 각성에 더 가까웠을 수록 더욱 강력해질 것입니다."
 giga_aeternum.2000.warawake.response:0 "§R<<경고: 비순종적 원시인이 재건 프로토콜 중 적대적 행동을 보이는 중>>§!\n\n§R<<방어 프로토콜 초기화중>>§!"
 giga_aeternum.2002.name:0 "에테르나이트 선조"
 giga_aeternum.2002.desc.a:0 "엄청난 실수를 저질렀구나, [ROOT.GetName]들이여. 너희 [ROOT.GetSpeciesNamePlural]들도 조만간 수천의 다른 종족들과 함께 은하 역사의 끝없는 심연으로 들어갈 것이다."
 giga_aeternum.2002.desc.b:0 "어리석은 게임을 하면, 어리석은 보상을 받지."
 giga_aeternum.2002.desc.c:0 "너희 종족은 오만함도 없다. 단순한 어리석음만 있군."
 giga_aeternum.2002.desc.d:0 "에테르나이트를 방해하는 것이 너희의 마지막 실수가 될 것이다, [Root.GetSpeciesName]들이여. 마지막 시련으로 너희는 몰락할 것이다."
 giga_aeternum.2002.a:0 "그렇게 하라지, 늙어빠진 멍청이. 전장에서 보자."
 giga_aeternum.2003.name:0 "에테르나이트 선조"
 giga_aeternum.2003.desc.a:0 "에테르나이트가 이 은하의 절대 지배자라는 자리를 되찾으려 합니다."
 giga_aeternum.2003.desc.b:0 "평화는 너희의 완전한 파괴로 이루어질 것이다."
 giga_aeternum.2003.desc.c:0 "너희들에게 진정한 의미의 전쟁을 보여주마, [Root.GetSpeciesName]들이여."
 giga_aeternum.2003.desc.d:0 "평화를 협상하려고 하지 마라. 우리가 스스로 성취하리니."
 giga_aeternum.2003.a:0 "전장에서 볼 것이다."
 giga_aeternum.2000.a:0 "그럼 이만."
 giga_aeternum.2001.name:0 "에테르나이트 선조"
 giga_aeternum.2001.desc:0 "§Y[ROOT.GetName]§!들이여, 나는 §Y[birch_aeternum.GetRulerName]§!로, §Y에테르눔§!의 여제이다. 너희의 별난 전쟁 선포에 대해서는 잘 들었다. 그리고 내가 너희 종족에게 마지막 경고를 하기 위해 여기 왔다.\n\n과거에 대담하게도 우리에게 맞선 수천 개의 문명을 지워버린 것처럼 우리가 방어 프로토콜을 전개하여 너희 문명을 은하 지도에서 지워버리기 전에, 너희에게 기회를 주겠다. 물러서서 스스로의 실수의 심각성과 어리석음을 깨달을 기회를 말이다.\n\n스스로를 위해, 올바른 선택을 하면 좋겠군."
 giga_aeternum.2001.a:0 "우리는 정말로 진지하다, 에테르나이트. 이것은 전쟁이다."
 giga_aeternum.2001.a.response:0 "대청소라는 것이 무엇인지 생각해본 적 있느냐? 너희 종족이 곧 알아내겠구나, §Y[ROOT.GetName]§!들이여."
 giga_aeternum.2001.b:0 "우리가 잘못 생각한것 같군. 분쟁은 피하자고."
 giga_aeternum.2001.b.response:0 "올바른 선택을 한 것이다."
