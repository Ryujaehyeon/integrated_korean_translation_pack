 district_giga_gas_giant_habitat_wind:0 "풍력 터빈 집합체"
 district_giga_gas_giant_habitat_wind_plural:0 "풍력 터빈 집합체"
 district_giga_gas_giant_habitat_wind_desc:0 "가스 행성의 대기 중에 떠다니며 엄청난 양의 에너지를 발생시키는 풍력 터빈의 집합체입니다."
 district_giga_gas_giant_habitat_science:0 "연구 시설"
 district_giga_gas_giant_habitat_science_plural:0 "연구 시설"
 district_giga_gas_giant_habitat_science_desc:0 "이 고급 연구시설에는 최신 과학 장비가 갖추어져 있으며, 직원 규모는 극히 거대합니다."
 district_giga_gas_giant_habitat_exotic:0 "가스 펌프 설비"
 district_giga_gas_giant_habitat_exotic_plural:0 "가스 펌프 설비"
 district_giga_gas_giant_habitat_exotic_desc:0 "이 행성 대기의 고립된 지대에서 가스를 추출할 수 있는 기계입니다."
