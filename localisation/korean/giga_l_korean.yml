 giga_aeternum.3031.name:0 "거짓 정보 심기"
 giga_aeternum.3031.desc:0 "우리의 실제 힘을 감추고 에테르나이트에게 우리가 정말 관심을 줄 가치가 없다는 것을 믿게 하기 위한 대규모 작전은 궁극적으로 그들의 제국을 재정비하려는 대중의 추진력과 동기를 감소시키기 때문에 결국 그들의 대각성을 지연시킬 것입니다. \n\n이 작전은 우선 £influence£ §Y300§! 및 £energy£ §Y75000§!을 소비할 것이며, 추가적으로 §Y3 년§! 간 우리의 사회학 연구의 §Y[birch_aeternum.aeternum_intel_society_cost]%§! 만큼의 비용이 들 것입니다.\n\n성공의 수준은 다양할 것이며, §Y2 년§!에서 §Y6 년§! 사이의 시간동안 각성을 지연시킬 것입니다.\n\n작업이 완료되면 취소될 수 없으며, 다시 시도하면 점차적으로 비용이 더 많이 들 것입니다.\n\n이는 최대 §Y7§! 회 수행할 수 있습니다."
 giga_aeternum.3031.a:0 "작전을 시작해라."
 giga_aeternum.3031.a.tooltip:0 "우리는 선비용을 지불해야 하며, 우리의 사회학 연구 속도에 §Y[birch_aeternum.aeternum_intel_society_cost]%§!의 불이익을 받을 것입니다."
 aeternum_intel_scramble_1:0 "거짓 정보 심기"
 aeternum_intel_scramble_1_desc:0 "우리는 에테르나이트에게 우리는 위협이 되지 않는다고 빋게끔 속이고 있습니다."
