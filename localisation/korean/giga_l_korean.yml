 GIGA_MOON_COMPUTER:0 "전쟁 위성 전문화: §H기본§!"
 GIGA_MOON_COMPUTER_DESC:0 "특별한 목적이 없는 전쟁 위성입니다. 매우 먼 (§Y150§!) 범위 내의 유효 목표물을 공격할 수 있습니다."
 GIGA_PLANET_COMPUTER:0 "$name_war_planet$ 인공지능"
 GIGA_PLANET_COMPUTER_DESC:0 "$name_war_planet$은 매우 긴 (§Y300§!) 범위 내의 유효 목표물을 지정할 수 있습니다."
 GIGA_SYSTEM_COMPUTER:0 "항성 전투 컴퓨터"
 GIGA_SYSTEM_COMPUTER_DESC:0 "매우 큰, 행성 크기의 거대한 컴퓨터 배열은 $name_war_system$에 대한 최상의 전략을 계산합니다. 스텔라 시스템크래프트는 장거리에서 무기를 발사할 것입니다."
 QSO_COMPUTER:0 "준-천체 보정기 컴퓨터"
 QSO_COMPUTER_DESC:0 "준-천체 보정기가 적에게서 가능한 한 멀리 떨어져있을 것입니다."
 SHIP_AURA_PLANET:0 "행성의 존재"
 SHIP_AURA_PLANET_DESC:0 "행성 자체가 전장에서 싸우는 것은 확실히 볼만하군요. 행성의 중력은 적 함선에 부정적인 영향을 미칩니다."
 SHIP_MOBILE_SYSTEM:0 "행성 초거대조선소"
 SHIP_MOBILE_SYSTEM_DESC:0 "$name_war_system$은 우리의 대규모 함대가 자유롭게 수리하고 연료를 보충할 수 있는 거대한 기지 역할을 합니다."
 aura_ship_gravity_well:0 "$aura_category_offensive$"
 aura_systemcraft:0 "$aura_category_defensive$ - $aura_type_support$"
 ARMOR_QUBERINE:0 "큐베린 첨가 뉴트로늄 장갑"
 ARMOR_QUBERINE_DESC:0 "스퀘어월드에서 소량의 큐베린으로 강화된 뉴트로늄 합금으로 도금의 견고성을 높였습니다."
 SMALL_ARMOR_QUBERINE:0 "소형 큐베린 첨가 뉴트로늄 장갑"
 MEDIUM_ARMOR_QUBERINE:0 "중형 큐베린 첨가 뉴트로늄 장갑"
 LARGE_ARMOR_QUBERINE:0 "대형 큐베린 첨가 뉴트로늄 장갑"
 REACTOR_PLANET:0 "행성 코어 원자로"
 REACTOR_PLANET_DESC:0 "행성의 중심에 지어진 정말 거대한 원자로입니다. 오메가 소멸 광선과 수십 개의 소형 무기로 구성된 함선의 주포 배열에 전력을 공급하는데 필요한 엄청난 양의 에너지를 제공합니다."
 REACTOR_SYSTEM:0 "포획된 별"
 REACTOR_SYSTEM_DESC:0 "별 전체가 포획된 상태로 유지되고 이 거대한 선박에 동력을 공급하는 데 사용됩니다."
 GIGA_MOON_DRIVE:0 "행성 하이퍼드라이브"
 GIGA_MOON_DRIVE_DESC:0 "아공간을 통해 위성 전체를 뒤틀 수 있는 거대한 하이퍼 드라이브입니다."
 QSO_JUMP_DRIVE:0 "준-천체 보정기 점프 드라이브"
 QSO_JUMP_DRIVE_DESC:0 "엄청난 거리를 점프할 수 있는 특수 제작 된 점프 드라이브입니다."
 SYSTEMCRAFT_ALLOY_FOUNDRIES:0 "행성 주조소"
 SYSTEMCRAFT_ALLOY_FOUNDRIES_DESC:0 "§G생산n:\n합금 20§!\n§Y유지비:\n광물 40\n불안정 분말 2§!\n시스템크래프트의 행성 중 하나에 건설 된 주조소는 우리에게 합금을 공급합니다."
 SYSTEMCRAFT_DYSON_CAPACITOR:0 "다이슨 축전지"
 SYSTEMCRAFT_DYSON_CAPACITOR_DESC:0 "§G생산:\n에너지 20§!\n중앙 별의 에너지 일부를 우리 경제로 직접 공급하는 대형 축전지입니다."
 SYSTEMCRAFT_FARMS:0 "대륙 농장"
 SYSTEMCRAFT_FARMS_DESC:0 "§G생산:\n식량 30§!\n스텔라 시스템크래프트 행성에 지어진 거대한 대륙 크기의 농장입니다."
 SYSTEMCRAFT_SHIPYARD:0 "보조 조선소 설비"
 SYSTEMCRAFT_SHIPYARD_DESC:0 "§Y유지비:\n합금 15§!\n스텔라 시스템크래프트에서 선박을 생산하기위한 추가 조선소 시설입니다."
 SYSTEMCRAFT_WEAPONS_PLANT:0 "휘발성 군수 시설"
 SYSTEMCRAFT_WEAPONS_PLANT_DESC:0 "§Y유지비:\n합금 15\n불안정 분말 1§!\n이 대형 공장들은 근처의 불운한 행성에 던질 수 있는 고품질의 폭발성 탄약을 제조합니다."
 SYSTEMCRAFT_STABILITY:0 "초차원 안정기"
 SYSTEMCRAFT_STABILITY_DESC:0 "§Y유지비:\n합금 50\n에너지 50\n나노봇 5\n암흑 물질 2.5§!\n이 건물은 스텔라 시스템크래프트의 구조적 무결성을 개선하기 위해 난해한 고차원 거시안정화 분야를 채택하고 있습니다."
 SYSTEMCRAFT_SHIELD:0 "행성 보호막"
 SYSTEMCRAFT_SHIELD_DESC:0 "§Y유지비:\n에너지 150\n암흑 물질 3§!\n행성 전체를 보호할 수 있는 거대한 보호막 영사기입니다."
 GIGA_MOON_FIGHTER_1:0 "달 격납고"
 GIGA_MOON_FIGHTER_1_DESC:0 "엄청난 양의 타격기를 배치할 수 있는 대규모 격납고."
 GIGA_MOON_MISSILE_1:0 "달 미사일 포대"
 GIGA_MOON_MISSILE_1_DESC:0 "달 표면에 배치된 거대한 미사일 포대로 엄청난 파괴력을 자랑합니다."
 GIGA_OMEGA_LANCE_1:0 "오메가 절멸 광선"
 GIGA_OMEGA_LANCE_1_DESC:0 "말 그대로 달 크기의 무기입니다. 행성의 핵 내에 설치된 거대한 원자로에 의해 구동되고 지각 아래에있는 수많은 시스템에 의해 조절되는 이 에너지 광선은 모든 것을 파쇄할 수 있습니다. 마치 콜로서스와 비슷하지만, 이건 함선에 장착되어 있습니다."
 GIGA_PLANET_MISSILE_1:0 "행성 미사일 포대"
 GIGA_PLANET_MISSILE_1_DESC:0 "행성 표면에 배치된 거대한 미사일 포대로 엄청난 파괴력을 자랑합니다."
 GIGA_SUPER_OMEGA_LANCE_1:0 "오메가 소멸 광선"
 GIGA_SUPER_OMEGA_LANCE_1_DESC:0 "오메가 절멸 랜스의 훨씬 더 강력한 버전입니다. 거대한 원자로가이 괴물의 무기에 힘을 실어 주며, $name_war_moon$조차도 왜소하게 만듭니다. 방해가되는 모든 것을 완전히 지울 것입니다."
 SYSTEMCRAFT_KATZENLAND_LANCE_1:0 "파멸의 빛"
 SYSTEMCRAFT_KATZENLAND_LANCE_1_DESC:0 "스텔라 시스템크래프트의 주포를 보완하기 위해 고안된 강력한 무기입니다."
 SYSTEMCRAFT_RAY_OF_DOOM_1:0 "실존적 소거 광선"
 SYSTEMCRAFT_RAY_OF_DOOM_1_DESC:0 "초대형 무기의 정점. 상상할 수 없는 규모의 광선은 시공간 그 자체를 찢고 현실에서 목표를 삭제합니다. 목표는 몇 개의 고차원적 평면으로부터 영향을 받을 뿐 아니라, 대격변 에너지도 시간의 흐름을 통해 앞뒤로 모두 누출되어 모든 시간에서 대상을 지워버립니다."
 QUASISTELLAR_GUN_ENTITY:0 "준-천체 말소 랜스"
 QUASISTELLAR_GUN_ENTITY_DESC:0 "$name_quasistellar$에서 바로 발사 된 레이저에는 은하의 총 에너지 출력만큼의 에너지를 포함되어 있습니다."
 GIGA_FLUSION_AUTOCANNON_02:0 "캇첸 개량속사포"
 giga_sr_quasaric_energy:0 "퀘이사 에너지"
 giga_sr_quasaric_energy_desc:0 "은하 중심부의 초대질량 퀘이사에서 직접 추출한, 이해하기 어려울 정도로 강력한 에너지 덩어리입니다. $name_quasistellar$에 사용됩니다."
 mod_country_base_giga_sr_quasaric_energy_produces_add:0 "제국 월간 퀘이사 에너지 생산"
 giga_sr_iodizium:0 "이오디지움 결정체"
 giga_sr_iodizium_desc:0 "인공 초신성이 방출한 대량의 이질 입자가 행성에 상대론적 속도로 충돌할 때 생성되는 기이한 결정체입니다. 여러 흥미로운 방식으로 물리 법칙을 무시하는 것처럼 보입니다."
 giga_sr_bulk_matter:0 "벌크 물질"
 giga_sr_bulk_matter_desc:0 "벌크 물질은 천체에서 채취한 대량의 저가치 미정제 물질로, 대형 거대구조 건설의 충전재로 사용됩니다."
 mod_station_gatherers_food_produces_mult:0 "$mod_station_researchers_produces_mult$에서 얻는 £food£ 식량"
 mod_station_gatherers_alloys_produces_mult:0 "$mining_station$ $alloys$ 생산량"
 sm_virtual_shipyard_uplink_building:0 "항성 조선소 업링크"
 sm_virtual_shipyard_uplink_building_desc:0 "단순한 조선소가 아닌 고유한 보너스를 제공하기 위해 항성 조선소와 연결되는 중요한 시설입니다."
 sm_virtual_shipyard_uplink:0 "항성 조선소 업링크"
 sm_virtual_shipyard_uplink_desc:0 "항성 기지 시스템을 항성 조선소의 시스템과 연결하면 엄청난 처리 능력을 얻을 수 있습니다."
 sm_equatorial_shipyard_uplink:0 "적도 조선소 업링크"
 sm_equatorial_shipyard_uplink_desc:0 "항성 기지 시스템을 성계의 적도 조선소에 연결하는 업링크. 적도 조선소 하나 당 8개의 조선소 슬롯을 제공합니다."
 sm_hyperstructural_shipyard_uplink:0 "초구조 조선소 업링크"
