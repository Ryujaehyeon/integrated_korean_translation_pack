 sc_dyson_star:0 "다이슨 스피어"
 sc_binary_dyson_star:0 "이중성 다이슨 스피어"
 sc_trinary_dyson_star:0 "삼중성 다이슨 스피어"
 pc_core_quasar:0 "초대질량 퀘이사"
 pc_core_quasar_desc:0 "초대질량 퀘이사는 은하중심에서 발견되며 몇몇은 태양 질량의 수억배가 넘습니다. 믿을 수 없을 정도로 활발하고 매우 빠르게 회전하며 거대한 강착원반에 둘러싸여 있습니다. 이것을 어떻게든 억제할 수 있다면 엄청난 양의 에너지를 생산할 것입니다."
 pc_core_black_hole:0 "초대질량 블랙홀"
 pc_core_black_hole_desc:0 "초대질량 블랙홀은 일반적으로 은하중심에서 발견되며, 그 질량은 항성 질량의 수백만배에서 10억배 이상에 이릅니다. 이 블랙홀은 현재 비활성 상태이기 때문에 강착원반이 존재하지 않으며, 이에 주변에서 훌륭한 공학 프로젝트를 수행할 수 있습니다."
 pc_t_star_big:0 "T형 갈색 왜성"
 pc_t_star_big_desc:0 "갈색 왜성은 수소 융합을 유지할 수 있는 질량이 부족한 준별체입니다. 대형 가스 거성과 비슷한 크기를 가지지만, 훨씬 더 높은 밀도를 가지고 있습니다. 낮은 광도와 상대적으로 적은 열 발생으로 인해 이들을 공전하는 행성은 생명체를 지탱할 가능성이 낮습니다. 이 특정 갈색 왜성은 평균보다 더 크고 밀도가 높은 것으로 보이며, 상대적으로 쉽게 점화될 수 있을 것으로 보입니다."
 pc_gigabrown_dwarf:0 "L형 갈색 왜성"
 pc_gigabrown_dwarf_desc:0 "가스 행성과 별의 중간 쯤에서 핵융합을 이루지 못한 천체입니다. 매우 강력한 자기장과 광범위한 위성계를 가지고 있습니다. 이 유형의 갈색 왜성은 T형 갈색 왜성보다 점화하기 쉽습니다."
 pc_giga_penrose_habitable:0 "$name_penrose_ring$"
 pc_giga_penrose_habitable_desc:0 "블랙홀을 둘러싼 거대 구조물입니다. $name_penrose$는 링 월드를 유지하고 행성에서 벗어나 생명을 영위하는데 필요한 에너지를 제공합니다. 또한 우주에서 가장 멋진 경치를 볼 수 있습니다."
 pc_black_hole_giga:0 "$pc_black_hole$"
 pc_black_hole_giga_desc:0 "$pc_black_hole_desc$"
 pc_gigaignited_star:0 "점화된 별"
 pc_gigaignited_star_desc:0 "이 별은 이전에는 갈색 왜성이었지만, 매우 진보된 기술이 행성의 핵융합을 촉발시켜 점화시켰습니다."
 pc_pouchkinn_black_hole:0 "시간-특이점"
 pc_pouchkinn_black_hole_desc:0 "어떤 실험의 실패로 생성된 특이점. 이 시공간의 구멍은 끝없이 끓어오르는 진공 에너지의 흐름입니다."
 giga_tech_repeatable_dimensional_storage:0 "초차원 저장 응용"
 giga_tech_repeatable_dimensional_storage_desc:0 "저장소 설계에 4차원 공학을 사용하여 동일한 공간에 더 많은 자원을 효과적으로 저장할 수 있습니다."
 giga_tech_repeatable_reduced_mega_building_time:0 "모듈화 거대 구조물 설계"
 giga_tech_repeatable_reduced_mega_building_time_desc:0 "우리의 거대 구조물 설계도에 더 높은 수준의 모듈화 공학을 구현한다면 구조를 간소화하는 데 도움이 될 것입니다.."
 giga_tech_repeatable_increase_mega_cap:0 "향상된 거대조립 프로토콜"
 giga_tech_repeatable_increase_mega_cap_desc:0 "거대 구조물 계획을 위한 자원 할당 및 인력 할당 절차를 간소화함으로써, 더 많은 거대 구조물의 건설을 동시에 조정하는 우리의 능력을 효과적으로 개선할 수 있습니다."
