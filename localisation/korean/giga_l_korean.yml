 job_giga_fe_overseer:0 "감독관"
 job_giga_fe_overseer_plural:0 "감독관"
 job_giga_fe_overseer_desc:0 "공익 사업을 위해 사치스러운 삶을 거부한 충실한 일꾼들입니다. 자신의 고대 문명의 잔존자들을 이끌고 감독하는 것은 그들의 몫입니다."
 mod_job_giga_fe_overseer_add:0 "$job_fe_overseer$ 직업"
 job_giga_fe_protector:0 "보호자"
 job_giga_fe_protector_plural:0 "보호자"
 job_giga_fe_protector_desc:0 "다수가 안전하게 잠을 청하고 사치스러운 삶을 즐길 수 있도록, 보호자들은 시민들에게 해를 끼칠 수 있는 자들에게 본때를 보여줄 준비가 되어있습니다."
