 giga_tech_event_pouchkinn_lifespan_desc:0 "고독한 과학자의 몸에서 회수된 생체 이식물을 분석하는 것은 우리의 수명 연장에 대한 연구에 큰 도움이 될 것입니다."
 r_soul_of_grandbunny:0 "그랜드버니의 영혼"
 r_soul_of_grandbunny_desc:0 "팔루쉬 그랜드버니뿐만 아니라 팔루시아의 모든 이의 붕괴된 사이오닉 에너지를 품고있는 터무니없는 고밀도의 크리스탈입니다. 본적 없는 사이오닉 힘으로 맥동하고 있습니다."
 name_psychic_beacon:0 "사이오닉 비콘"
 name_plural_psychic_beacon:0 "사이오닉 비콘"
 psychic_beacon_0:0 "$gc_giga$ $name_psychic_beacon$ 건설 현장"
 psychic_beacon_0_DESC:0 "£galwonders£ £gigastructural£ $giga_list_category_megastructure$ - $giga_list_category_psionics$\n§Y강력한 은혜§!를 주는 §Y장막체§!가 있습니다\n§L이 거대한 시설에서는 수백만의 숙련된 공학자들과 특히나 강력한 정신감응 능력자들이 함께 정밀하게 일치되어 작업합니다.§!"
 psychic_beacon_0_MEGASTRUCTURE_DETAILS:0 "$psychic_beacon_0_DESC$"
 psychic_beacon_0_CONSTRUCTION_INFO_DELAYED:0 "$giga_list_additional_data$ - §Y제독§!에게 강력한 §Y특성§!을 §Y각인§!하고, §Y적의 행성§!과 §Y적대 성계§!를 §Y장막 에너지§!로 에워싸며, §Y적대 행성§!에 §Y장막체§!를 소환하여 우리의 §Y점프 드라이브§! 능력을 극적으로 §Y향상§!시키는데 사용할 수 있습니다"
 psychic_beacon_1:0 "$name_psychic_beacon$: 첨탑"
 psychic_beacon_1_DESC:0 "강력한 은하 등대의 첫 부분인, $name_psychic_beacon$의 첨탑입니다. 벌써 선체에 희미한 장막 에너지가 나타납니다."
 psychic_beacon_2:0 "$name_psychic_beacon$: 도관"
 psychic_beacon_2_DESC:0 "사이오닉 도관은 장막 에너지의 흐름을 증폭하고 흡수합니다."
 psychic_beacon_3:0 "$name_psychic_beacon$"
 psychic_beacon_3_DESC:0 "네비게이터로 알려진 강력한 장막체의 보금자리인 은하 등대 $name_psychic_beacon$이 완성되었습니다."
 psychic_beacon_4:0 "비콘 활성화"
 psychic_beacon_4_DESC:0 "$psychic_beacon_3_DESC$"
 giga_tech_psychic_beacon:0 "에테리얼 경로파악"
 giga_tech_psychic_beacon_desc:0 "우리의 아스트로패스의 노력으로, 이론적으로는 특성화된 네비게이션 거대 구조물을 가용함으로써 몇 배 정도 증폭될 수 있습니다."
 giga_dialog.11001.name:0 "건설 현장 완공"
 giga_dialog.11001.desc:0 "이제 $name_psychic_beacon$의 첫 단계가 완성되었습니다. 이 거대한 시설에는 $name_psychic_beacon$ 건설의 긴 프로젝트를 위한 공학자들과 아스트로패스, 룬 세공사가 거주합니다."
 giga_dialog.11001.a:0 "장막에 한 걸음 가까이."
 giga_dialog.11002.name:0 "첨탑 설치됨"
 giga_dialog.11002.desc:0 "이제 $name_psychic_beacon$의 등뼈이자 주요 지지대의 역할을 할 거대한 첨탑이 완성되었습니다. 이렇게 초기 수준인데도 미세한 양의 §M사이오닉 승화물§!을 채집할 수 있습니다."
 giga_dialog.11002.a:0 "우리의 눈이 뜨이고."
 giga_dialog.11003.name:0 "도관 작동"
 giga_dialog.11003.desc:0 "이 거대한 사이오닉 도관에 의해 포획되고 흡수된 휘몰아치는 장막 에너지로, 이 에너지는 $name_psychic_beacon$의 아스트로패스 투영을 위한 중계기의 역할을 할 것입니다."
 giga_dialog.11003.a:0 "치러야 할 대가가 있으나."
 giga_dialog.11004.name:0 "$name_psychic_beacon$ 활성화"
 giga_dialog.11004.desc:0 "네이게이터 개체를 수용하는 온전한 $name_psychic_beacon$은 우리 함선 실제 공간을 비추는데 뿐만 아니라 다른 방법으로도 활용할 수 있습니다. 우리의 정신감응 능력자들은 이미 강력한 힘에 헤어나오지 못할만큼 깊게 빠져있으며, 이 장치의 잠재성을 최대한 활용하길 열망합니다.\n\n비콘은 §Y업그레이드§!나 §Y시행령§!을 통해 아무때나 활성화할 수 있습니다. §M사이오닉 승화물§!은 특수한 정화를 통해 팝을 §Y승화§!시키거나 §Y결정§!의 사이오닉 승화를 통해 강화할 수 있습니다."
 giga_dialog.11004.a:0 "우리는 감내할 것이다."
 desc_psychic_beacon:0 "$psychic_beacon_2_DESC$"
 allow_psychic_beacon:0 "§M장막 기술§!\n§H거대 구조물 잠금 해제:§! $name_psychic_beacon$"
 giga_psychic_beacon_1:0 "£menu_1£§H$name_psychic_beacon$§!"
 giga_psychic_beacon_2:0 "£menu_2£§Y$name_psychic_beacon$§!"
 giga_psychic_beacon_3:0 "£menu_3£§G$name_psychic_beacon$§!"
 giga_psychic_beacon_r:0 "£menu_r£§B$name_psychic_beacon$§!"
 giga_psychic_beacon_u:0 "£menu_u£§M$name_psychic_beacon$§!"
 giga_psychic_beacon_disabled:0 "£menu_disabled£§R$name_psychic_beacon$§!"
 must_have_shrouded_world:0 "국경 안에 장막 행성이 있어야 합니다."
 can_already_illuminate:0 "아직 장막 행성을 밝힐 능력을 가지고 있지 않아야 합니다."
 giga_sr_psionic_sublimate:0 "사이오닉 승화물"
 giga_sr_psionic_sublimate_desc:0 "승화된 영혼으로 이루어진 비전 자원입니다. $psychic_beacon_3$에서 사용됩니다."
 mod_country_base_giga_sr_psionic_sublimate_produces_add:0 "월간 $giga_sr_psionic_sublimate$"
 purge_psionic_sublimation:0 "Sublimating"
 purge_psionic_sublimation_tooltip:0 "팝은 §G+2§! £giga_sr_psionic_sublimate£ §M정신적 승화§! 및 §G+10§!으로 승화됩니다. 이들은 ['trait:trait_psionic'] 특성을 가지고 있을 경우에 해당합니다."
 purge_psionic_sublimation_tooltip_delayed:0 "§L장막은 희생을 요구합니다§!"
 pop_cat_purge_psionic_sublimation:0 "승화"
 pop_cat_purge_psionic_sublimation_plural:0 "승화"
 pop_cat_purge_psionic_sublimation_desc:0 "장막이 희생을 요구합니다."
 decision_psionic_sublimation:0 "사이오닉 승화"
 decision_psionic_sublimation_effect:0 "모든 §Y£job_telepath£ [telepath.GetNamePlural]§!에서 [root.GetName]는 텔레파시 능력자당 §G0.1§! §Y£giga_sr_psionic_sublimate£ $giga_sr_psionic_sublimate$§!가 파괴됩니다."
 decision_psionic_sublimation_desc:0 "[root.GetName]의 모든 정신감응 능력자가 한 명당 §H£sr_psionic_sublimate£ $sr_psionic_sublimate$§! 10을 위해 파괴됩니다."
 decision_psychic_illuminate:0 "비추기"
 giga_psychic_illuminate_effect:0 "이 장막에 덮인 행성을 밝혀 식민지화할 수 있게 합니다."
 decision_psychic_illuminate_desc:0 "이 장막 행성을 밝혀 개척을 가능하게 합니다."
 giga_psychic_traverse:0 "횡단"
 giga_psychic_traverse_desc:0 "장막이 우리에게 일시적으로 먼 거리를 이동할 수 있는 능력을 주었습니다."
 trait_enthralled:0 "매혹"
 trait_enthralled_desc:0 "§L이 종의 구성원들은 혼수상태에 빠져 사회에 전혀 기여할 수 없습니다.§!\n"
 giga_psychic_beacon.001.name:0 "사이오닉 비콘: 네이게이터 활성화"
 giga_psychic_beacon.001.desc:0 "비콘이 활성화되어 사이오닉의 빛이 우리 제국 전체에서 느껴집니다.\n\n네이게이터는 기다리고 있습니다. 여기서 우리가 무엇을 하던 그것을 즐길 것 같습니다.\n\n목소리가 우리 정신감응 능력자의 정신에 울려 퍼지기 시작합니다.\n\n§B\"무엇을 원하는가?\"§!"
 giga_psychic_beacon.001.a:0 "§E등불§!"
 giga_psychic_beacon.001.a.tooltip:0 "장막 행성을 비춰 개척할 수 있습니다.\n영토 내의 모든 §Y장막 행성§! 중 하나에 §Y결정§!을 통해 등불을 비출 수 있습니다."
 giga_psychic_beacon.001.b:0 "§M횡단§!"
 giga_psychic_beacon.001.b.tooltip:0 "장막이 우리에게 일시적으로 먼 거리를 이동할 수 있는 능력을 줄 것입니다."
 giga_psychic_beacon.001.c:0 "§H지배§!"
 giga_psychic_beacon.001.c.tooltip:0 "성계 전체를 사이오닉 에너지로 가득 채워 모두의 정신을 조종합니다. 성계에 §Y하나§! 이상의 행성을 §Y조종§!하거나 §Y소유§!해야 합니다..\n성계는 §Y총력전§!의 여부에 관계 없이 우리에게 §Y양도§!될 것입니다..\n주민(우리가 소유하거나 통제하는 행성의 주민 포함)들은 §M사이오닉§! 특성을 얻고 §R혼수상태§!로 바뀌어 자원을 생산할 수 없게 만듭니다. 이들에게서 만들어진 모든 군대는 사실상 무력해질 것입니다."
 giga_psychic_beacon.001.d:0 "§R투옥§!"
 giga_psychic_beacon.001.d.tooltip:0 "장막과 적대적인 행성 간의 실제 공간 사이에 베일을 뚫고, §M장막에 덮인 행성§!으로 변모시킵니다."
 giga_psychic_beacon.001.e:0 "§G소환§!"
 giga_psychic_beacon.001.e.tooltip:0 "적대적인 행성에 우리를 대신해 싸울 §M사이오닉 아바타§들을 소환합니다.\n행성이 점령되면 아바타들은 §Y사라집니다.§!"
 giga_psychic_beacon.001.f:0 "§Y각인§!"
 giga_psychic_beacon.001.f.tooltip:0 "§Y제독§!에게 장막의 표식을 각인합니다. §Y강력한 특성§!을 얻을 수 있지만, 그 과정에서 지도자가 죽을 수도 있습니다.\n실패 확률은 §Y63%§!이며, 지도자의 레벨에 따라 §Y5%§!씩 줄어들고 레벨 10에 도달하면 §Y0%§!가 됩니다.\n사이오닉 승화물은 각인 실패 시 일부 반환됩니다."
 giga_psychic_beacon.001.g:0 "돌아간다."
 giga_psychic_beacon.002.name:0 "[giga_planet_illuminated.GetName](이)가 밝혀지다"
 giga_psychic_beacon.002.desc:0 "스스로의 사이오닉 빛을 압도한 $name_psychic_beacon$은 마치 사이오닉 초신성인것처럼 장막을 통해 짧게 맥동했습니다.\n\n강렬한 빛이 [giga_planet_illuminated.GetName]의 에테리얼 구름을 씻어 없애고, 장막을 그것이 원래 있던 곳으로 쫓아내며, [giga_planet_illuminated.GetName](을)를 현실 세계로 끄집어냅니다. 그 행성에 원래 살고있던 자들이 누구든 간에 그들 또한 장막으로 쓸려 나갔지만, [giga_planet_illuminated.GetName](은)는 이제 거주 가능한 행성이 되었으며, 개척할 수 있습니다."
 giga_psychic_beacon.002.a:0 "광기에 뒤엉킨 세계를 풀었다."
 giga_psychic_beacon.003.name:0 "사이오닉 비컨: §H지배§!"
 giga_psychic_beacon.003.desc:0 "§B\"지배할 성계를 선택하십시오.\"§!"
 giga_dominate_t:0 "§B\"좋다. 이 성계는 영원히 꿈조차 꿀 수 없는 잠 속으로 떨어질 것이다.\"§!"
 giga_psychic_beacon.004.name:0 "[giga_planet_illuminated.GetName] 지배되다"
 giga_psychic_beacon.004.desc:0 "사이오닉 비콘이 방출한 엄청난 양의 에너지가 [giga_planet_illuminated.GetName] 성계를 침식하자, 공포에 울부짖던 성계가 갑자기 조용해졌습니다.\n\n압도당한 기계 장치는 영향권 전체에서 즉시 자폭하였고, 사람들은 코마 상태에 빠졌습니다. 우리의 정신감응 능력자가 [giga_planet_illuminated.GetName] 성계의 장막 속에서 조용하지만 훨씬 강대한 존재를 눈치챘습니다. 이제 생물학적 인구는 우리의 것이 되었으며, 그들에게 의식을 되찾아주거나, 우리가 원하는 대로 사용할 수 있습니다."
 giga_psychic_beacon.004.a:0 "이제, 그들은 장막과 하나가 되었다."
 giga_psychic_beacon.005.name:0 "사이오닉 비컨: §R투옥§!"
 giga_psychic_beacon.005.desc:0 "§B\"가두길 원하는 세계를 선택하십시오.\"§!"
 giga_imprison_t:0 "§B\"좋다, 곧 깊은 장막이 이 세계를 덮을 것이다.\"§!"
 giga_psychic_beacon.006.name:0 "[giga_planet_illuminated.GetName] 투옥되다"
 giga_psychic_beacon.006.desc:0 "사이오닉에 익숙하지 않은 자들이라면 거의 의식조차 못할 만큼 $name_psychic_beacon$의 맥동이 미약했음에도 불구하고 [giga_planet_illuminated.GetName]에 엄청난 충격을 주었습니다.\n\n눈 깜빡할 새도 없이, 무형의 존재가 현실 우주로 피를 쏟아내어, 행성의 생명체들과 함께 행성 전체를 장막의 에테리얼 에너지에 빠트려버렸습니다. 행성 전체가 장막의 상상도 못할 공포로 떨어졌고, [giga_planet_illuminated.GetName](은)는 작은 지옥으로 시간의 끝까지 존재할 것입니다."
 giga_psychic_beacon.006.a:0 "분명, 죽음보다 더 나쁜 운명이지."
 giga_psychic_beacon.010.name:0 "사이오닉 비컨: §G소환§!"
 giga_psychic_beacon.010.desc:0 "§B\"사이오닉 아바타를 소환할 행성을 선택하십시오..\"§!"
 giga_conjure_t:0 "§B\"그리 되리라. 한 무리의 사이오닉 악마들이 이 세계에 쏟아질 것이다.\"§!"
 giga_psychic_beacon.011.name:0 "사이오닉 아바타가 [giga_planet_illuminated.GetName]에 소환되다"
 giga_psychic_beacon.011.desc:0 "$name_psychic_beacon$에 의해 형체와 생명이 부여된 홍수같은 장막 에너지는 [giga_planet_illuminated.GetName] 행성의 표면에서 순종적인 사이오닉 아바타 군단으로 재구성되었습니다. \n \n이 거대한 형체화된 사이오닉 공포가 이제[root.GetName]를 대신하여 전쟁을 수행합니다."
 giga_psychic_beacon.011.a:0 "전진하라!"
 giga_psychic_beacon.0111.name:0 "소멸한 사이오닉 아바타"
 giga_psychic_beacon.0111.desc:0 "적의 행성을 성공적으로 침공한 후, 우리의 비컨이 만들어 낸 사이오닉 아바타는 장막으로 되돌아가 육체의 본질만을 남겼습니다."
 giga_psychic_beacon.0111.a:0 "그들의 역할을 다 했다."
 giga_psychic_beacon.0111.a.tooltip:0 "살아있는 아바타 당 10 §MPsionic Sublimate§!을 회복합니다."
 giga_psychic_beacon.015.name:0 "사이오닉 비컨: §Y각인§!"
 giga_psychic_beacon.015.desc:0 "§B\"장막 자체의 표식을 각인할 제독을 선택하세요. 이것은 위험한 작전입니다.\"§!"
 giga_imprint_t:0 "§B\"좋다. 장막의 에너지가 이 존재에게 전달될 것이다.\"§!"
 giga_psychic_beacon.0151.name:0 "각인 실패!"
 giga_psychic_beacon.0151.desc:0 "놀라운 소식입니다! 전체 능력의 일부로 작동되리라 생각했던 사이오닉 비콘의 충격적인 함이 불행히도 [giga_leader_imprinted.GetName](을)를 압도하기엔 충분했습니다.\n\n한때 [giga_leader_imprinted.GetHerHis] 스스로도 강력한 사이오닉 능력자였던 제독이지만 이제 [giga_leader_imprinted.GetHerHis]의 육체의 본질의 조각뿐입니다."
 giga_psychic_beacon.0151.a:0 "[giga_leader_imprinted.GetName](은)는 기억될 것이다."
 giga_psychic_beacon.0152.name:0 "각인 성공!"
 giga_psychic_beacon.0152.desc:0 "됐습니다. 비록 사이오닉 비콘은 전체 능력의 일부로 작동하고 있었지만, [giga_leader_imprinted.GetName](이)가 흡수할 에너지를 방출했습니다.\n\n이미 [giga_leader_imprinted.GetHerHis] 스스로도 강력한 사이오닉 능력자이지만 [giga_leader_imprinted.GetName](은)는 더욱 위대한 능력자로 각인되었습니다."
 giga_psychic_beacon.0152.a:0 "이 새로운 능력이 제국에 도움이 되기를."
 giga_psychic_beacon.0152.a.tooltip:0 "[giga_leader_imprinted.GetName](이)가 강력한 §M사이오닉 특성§!을 얻습니다."
 must_have_valid_beacon_admiral:0 "제독이 더 필요합니다."
 leader_trait_admiral_astute:0 "기민한"
 leader_trait_admiral_astute_desc:0 "사이오닉 비콘의 압도적인 힘으로 각인된 이 제독은 전투력을 유지하고 보존하는 데 있어 타의 추종을 불허하는 달인입니다."
 leader_trait_admiral_farsighted:0 "선견지명"
 leader_trait_admiral_farsighted_desc:0 "사이오닉 비컨의 압도적인 힘으로 각인된 이 제독은 전례 없는 기술로 적을 탐지하고 교전하며 적을 압도할 수 있습니다."
 leader_trait_admiral_fortifier:0 "강화"
 leader_trait_admiral_fortifier_desc:0 "사이오닉 비콘의 압도적인 힘으로 각인된 이 제독은 자신의 모든 함선을 추적할 수 있고, 장막 에너지를 이용해 그 능력을 증대시킬 수 있습니다."
 purge_sublimate:0 "승화"
 beacon_shrouded_habitable_structure:0 "장막 구조"
 beacon_shrouded_habitable_structure_desc:0 "이 인공 세상은 장막의 사나운 에너지의 포로가 되었습니다. 더 이상 거주할 수 없습니다."
 giga_psychic_beacon.008.desc:0 "일상적이고 눈에 띄지 않는 정신감응을 하는 동안, 충격적인 무언가가 자신을 드러냅니다. 에테르 안개 속에 묻혀있는 구멍은 멀리있는 듯한 광원에 의해 잘 보이기는 하지만, 의심스러운 실제 우주의 파편처럼 보입니다. 그것이 단순한 환영인지, 아니면 장막의 내부에 있는 진정한 정신의 안식처일지 확인하려는 시도는 우리 정신능력 감응자가 형태없는 실체의 존재를 느끼고 중단됩니다.\n\n\"나는 한낱 항해사일 뿐이다.\" 그것이 말합니다. \"여럿 중 하나일 뿐.\"\n\n그것으로 이해에 도달합니다. 그 실체는 아이같은 흥분과 호기심을 감추지 못한 채 참을성 있는 침묵에 물러납니다."
 giga_psychic_beacon.008.a:0 "존재와 계약을 맺는다."
 giga_psychic_beacon.009.desc:0 "비콘이 켜졌습니다! 강력한 사이오닉 승화로 삼켜진 네비게이터들은 그 막대한 아스트로패스 능력을 서로 연결하고 집중하여 비콘의 심광을 급격하게 증대했습니다. 이제 우리의 모든 아스트로패스들은 우리 은하내 모든 곳의 항해도를 작성할 수 있게 되었고 일반적으로는 몇년이나 걸릴 거리를 며칠만에 주파 가능하게 되었습니다."
 giga_psychic_beacon.009.a:0 "길이 열렸다."
 giga_psychic_beacon.0061.name:0 "플러션 투옥 저지됨!"
 giga_psychic_beacon.0061.desc:0 "긴급 소식입니다. 우리의 $name_psychic_beacon$이 §Y플러션§!의 무형세계와 현실세계 사이의 베일을 찢으려했지만, 행성에 어떠한 종류의 충격도 가하지 못했습니다.\n\n사실, 플러션을 가두기 위한 우리의 시도는 그저 행성 전체를 둘러싼 보이지 않는일종의 §Y사이킥 반발장§!에 의해 저지된것 같습니다. 그리고 보고에 따르면 §Y캇첸아르티히 제국§!의 수도인 §Y캐타운§! 밑에 있는 거대한 장치가 그것을 생성한다고 합니다.\n\n전에 생각했던 것보다 카이저가 더 많은 기술을 알고있는듯 합니다..."
 giga_psychic_beacon.0061.a:0 "비참한 쥐새끼로군!"
 giga_psychic_beacon.00611.name:0 "플러션 에지카니아가 변이하다!"
 giga_psychic_beacon.00611.desc:0 "결국 어느 정도의 사이오닉 에너지가 플러션의 §Y사이킥 반발장§!을 뚫은 것 같습니다.\n\n오히려 장거리 관측에 따르면 행성의 주요 종족 중 하나인 §Y극지 에지카니아§!가 그럭저럭 사이오닉 에너지의 급작스런 쇄도에 반응했다고 나타냅니다. 그 이후에 극지 에지카니아 하나씩 §Y융합 에지카니아§!로 변했습니다.\n\n이 에지카니아는 확실히 더 강하고 강력하며 지능적이고 우리의 것과 다른 사이오닉 능력을 가지고 있습니다. 우리가 무심코 그들은 은하에서 가장 무서운 종족으로 바꿔버린것 같습니다. 그리고 그들이 이미 플러션 방어군을 조직하고 있습니다..."
 giga_psychic_beacon.00611.a:0 "뭔가 더 강력해졌군."
 giga_psychic_beacon.0041.name:0 "플러션 지배 저지됨!"
 giga_psychic_beacon.0041.desc:0 "긴급 소식입니다. 우리의 $name_psychic_beacon$이 §Y유블리오§! 성계를 사이오닉 에너지의 파도로 덮쳐버리려고했지만, 성계의 행성에 어떠한 충격도 가하지 못했습니다.\n\n사실, 플러션을 가두기 위한 우리의 시도는 그저 행성과 성계 전체에 퍼지는 보이지 않는일종의 §Y사이킥 반발장§!에 의해 저지된것 같습니다. 그리고 보고에 따르면 §Y캇첸아르티히 제국§!의 수도인 §Y캐타운§! 밑에 있는 거대한 장치가 그것을 생성한다고 합니다.\n\n전에 생각했던 것보다 카이저가 더 많은 기술을 알고있는듯 합니다..."
 giga_psychic_beacon.0041.a:0 "비열한 쥐새끼로군!"
 giga_psychic_beacon.012.name:0 "플러션이 소환된 아바타를 포획하다!"
 giga_psychic_beacon.012.desc:0 "걱정스러운 소식입니다! $name_psychic_beacon$이 사이오닉 아바타 군대를 §Y플러션§!에 불러낸 직후, 갑자기 네비게이터가 장막의 존재들에 대한 제어를 잃었습니다.\n\n조사 결과, 이는 캇젠의 §Y사이킥 반발장§!에 의한 것이었습니다. 이 반발장은 플러션 전체를 감싸고 있으며, §Y캣타운§! 지하의 거대 기계가 반발장에 동력을 공급하고 있습니다.\n\n이 반발장으로 인해 우리는 아바타에 대한 통제를 잃었습니다. §Y캇첸아르티히 제국§!은 아바타를 자신의 것으로 만들기 위해 반발장을 사용한 것입니다."
 giga_psychic_beacon.012.a:0 "진절머리 나는 카이저 녀석, 감히 이마테리움을 가지고 놀아?"
 giga_psychic_beacon.012.a.tooltip:0 "네 자신을 소개해봐."
 giga_psychic_beacon.0062.name:0 "팔루시아 투옥 흡수됨?!"
 giga_psychic_beacon.0062.desc:0 "암담한 소식입니다. 우리 $name_psychic_beacon$는 §Y팔루시아§!에서 비물질계와 물질계 사이 장막을 뚫으려 하였지만 이 행성에 강한 충격을 주는데에는 실패하였습니다. \n\n그리고, 무슨 악마같은 전개인지, §Y팔루쉬§!들은 소멸하기는 커녕 갑작스레 흘러들어온 사이오닉 에너지에 강화되며 그들의 방어군들이 더욱 강력해지고 말았습니다.\n\n놀랍게도, 우리 정신감응 능력자 집단은 팔루시아로 부터 메세지를 받았습니다...\n\n§R\"너희들의 바보같은 짓거리는 우리들에게 그 어떠한 영향도 없었다. 너희들의 이마테리움을 우리 위에 들이부어 보겠다는 우습기까지한 시도는 오히려 우릴보다 강력하게 만들어주었다. 사라져라.\"§!"
 giga_psychic_beacon.0062.a:0 "걱정스럽군..."
 giga_psychic_beacon.0042.name:0 "갓초 정복되다, 팔루시아 지배 흡수됨!"
 giga_psychic_beacon.0042.desc:0 "우리의 사이오닉 비콘에서 방출한 거대한 에너지가 갓초 성계를 휩쓸자 성계내 모든 행성들은 공포로 울부짖었고 이내 잠잠해졌습니다.\n\n영향권내에서 휩싸인 기계장치들은 거의 즉시 모두 자폭하였고 사람들은 코마 상태에 빠졌습니다. 우리의 사이오닉 능력자들은 갓초 성계 장막 안에서 조용하지만 훨씬 강력한 존재를 발견하였습니다. 그리고 생물학적 개체는 이제 우리 것이 되었으며, 그들에게 건강을 되찾아 주거나 우리가 원하는 용도로 사용할 수 있습니다.\n\n하자만 우리 $name_psychic_beacon$는 §Y팔루시아§!에 강한 충격을 주는데에는 실패하였습니다. \n\n그리고, 무슨 악마같은 전개인지, §Y팔루쉬§!들은 소멸하기는 커녕 갑작스레 흘러들어온 사이오닉 에너지에 강화되며 그들의 방어군들이 더욱 강력해지고 말았습니다.\n\n놀랍게도, 우리 정신감응 능력자 집단은 팔루시아로 부터 메세지를 받았습니다...\n\n§R\"너희들의 바보같은 짓거리는 우리들에게 그 어떠한 영향도 없었다. 너희들의 이마테리움을 우리 위에 들이부어 보겠다는 우습기까지한 시도는 오히려 우릴보다 강력하게 만들어주었다. 사라져라.\"§!"
 giga_psychic_beacon.0042.a:0 "걱정스럽군..."
 giga_psychic_beacon.013.name:0 "팔루시아가 소환된 아바타를 튕겨내다!"
 giga_psychic_beacon.013.desc:0 "긴급 뉴스입니다! $name_psychic_beacon$에 의해 §Y팔루시아§!에 소화된 사이오닉 아바타들은 지표에도 도달하지 못하였습니다.\n\n오히려 그들은 팔루시 §Y거대토끼§!에 의해 곧바로 붙잡혔으며 그 즉시 장막으로 되날려져 버렸습니다.\n\n얼마 있지 않아, 어떤 전 행성으로 저주가 우리 고향에 떨어져 대부분의 주민들을 우울한 상태로 급락시켰습니다. 이것은 분명히 팔루시 §Y거대토끼§!가 저지른 짓일 겁니다."
 giga_psychic_beacon.013.a:0 "제기랄!"
 paluush_psionic_beacon_buff:0 "권능"
 paluush_psionic_beacon_buff_desc:0 "잘했네, 저 녀석들을 더 강하게 만들었을 뿐이군."
 paluushia_curses_beacon:0 "팔루쉬 저주"
 paluushia_curses_beacon_desc:0 "그랜드버니가 이 행성에 사이오닉 저주를 드리웠습니다. 이 저주는 거주자의 기분을 굉장히 나쁘게 할 것입니다."
 edict_giga_psionic_beacon_menu:0 "활성화된 §M사이오닉 비콘§!"
 edict_giga_psionic_beacon_menu_desc:0 "§M사이오닉 승화물§!을 사용하여 사이오닉 비콘을 충전합니다.\n\n§M사이오닉 승화물§!은 §Y결정§!을 통해 §Y사이오닉 능력자§!를 희생하거나 팝을 §Y승화§!(절멸 정책이 필요합니다)시켜 얻을 수 있습니다."
 cant_sublimate_soulless_machines:0 "기계는 영혼이 없으므로 승화될 수 없습니다."
 must_be_at_war_and_own_systems:0 "다른 제국과 전쟁 중이고 그 제국의 성계의 행성을 소유하거나 통제하고 있어야합니다."
 must_be_at_war:0 "가능한 적대적 목표 없음."
