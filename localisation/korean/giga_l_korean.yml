 giga_buildcap_1:0 "£menu_1£동시 건설 한도 (§H1§!)\n\n동시에 건설할 수 있는 거대 구조물의 개수를 변경합니다.\n\n§Y1§!로 설정되었으며, 이는 §Y바닐라§!와 같습니다. 축조의 달인 승격 특전과 같은 보정치에 의해 증가될 수 있습니다."
 giga_buildcap_2:0 "£menu_2£동시 건설 한도 (§Y2§!)\n\n동시에 건설할 수 있는 거대 구조물의 개수를 변경합니다.\n\n§Y2§!로 설정되었으며, 축조의 달인 승격 특전과 같은 보정치에 의해 더 증가될 수 있습니다."
 giga_buildcap_3:0 "£menu_3£동시 건설 한도 (§G3§!)\n\n동시에 건설할 수 있는 거대 구조물의 개수를 변경합니다.\n\n§Y3§!으로 설정되었으며, 축조의 달인 승격 특전과 같은 보정치에 의해 더 증가될 수 있습니다."
 giga_buildcap_j:0 "£menu_buildcap_j£동시 건설 한도 (§B직업-기반§!)\n\n동시에 건설할 수 있는 거대 구조물의 개수를 변경합니다.\n\n이 옵션은 동시 건설 한도를 별도의 건설 시스템으로 §Y대체§!하며, 이 시스템 상에서 거대 구조물 건설 속도는 월간 £giga_sr_amb_megaconstruction£ §Y$giga_sr_amb_megaconstruction$§! 생산량에 기반하며, 건설 진행 중인 모든 거대 구조물에게 나누어집니다.\n\n특수한 £building£ §Y건물§!과 £job£ §Y직업§!을 사용할 수 있으며, £giga_sr_amb_megaconstruction£ §Y$giga_sr_amb_megaconstruction$§!를 발견할 수도 있습니다. §Y$origin_void_dwellers$§!와 같이 거대 구조물에게 크게 의존하는 기원을 플레이할 경우, 게임 초반을 수월하게 진행하기 위한 §Y추가 수입§!을 얻을 것입니다."
 giga_buildcap_u:0 "£menu_u£동시 건설 한도 (§M무제한§!)\n동시에 건설할 수 있는 거대 구조물의 개수를 변경합니다.\n\n§Y사실상 무제한§!으로 설정되었습니다."
 giga_menu.buildcap.u:0 "£menu_u£동시 건설 한도\n동시에 건설할 수 있는 거대 구조물의 개수를 변경합니다. (모든 거대 구조물에 영향)"
