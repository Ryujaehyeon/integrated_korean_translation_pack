 giga_tech_alderson_disk:0 "$name_alderson$"
 giga_tech_alderson_disk_desc:0 "$name_alderson$는 표면에 거주하는 거대한 성계 단위 구조물입니다. 그런 구조는 천문학적인 자원이 소모될 것이고, 붕괴를 막기 위해서 굉장히 진보된 여러 기술들이 필요 하겠지만, 엄청난 산업 수용량과 건축 공간을 제공할 수 있을 것입니다."
 giga_tech_event_squareworld:0 "독특한 거대공학 기법"
 giga_tech_event_squareworld_desc:0 "독특한 스퀘어월드의 자료를 분석함으로써 편심 건축 기법과 외부 엔지니어링에 대한 많은 지식을 얻을 수 있었습니다."
 r_square_world_ruined:0 "폐허가 된 스퀘어월드"
 r_square_world_ruined_DESC:0 "이 거대 구조물은 한때 내부의 생물권을 지탱할 수 있었지만 더 이상은 아닙니다. 이것의 독특한 모양은 우리가 아는 물리학을 무시하는 것처럼 보입니다."
 r_square_world_ruined_MEGASTRUCTURE_DETAILS:0 "$r_square_world_ruined_DESC$"
 r_square_world_restored:0 "복원된 스퀘어월드 구획"
 r_square_world_restored_DESC:0 "이 독특한 모양의 링 월드 구획은 첨단 기술로 복원되었습니다. 내부의 조립 라인들은 이 스퀘어월드의 뼈대와 동일한 재료인 큐베린을 대량으로 생산하고 있습니다."
 r_square_world_hub_MEGASTRUCTURE_DETAILS:0 "$r_square_world_restored_DESC$"
 r_square_world_hub:0 "외딴 기지"
 r_square_world_hub_DESC:0 "신비한 버려진 기지가 이 성계의 항성 위에 떠있습니다. 예비 전원으로 인해 발생하는 매우 희미한 활동 징후를 보여줍니다."
 r_square_world_hub_powered:0 "스퀘어월드 시스템 중추"
 r_square_world_hub_powered_DESC:0 "이 기지는 스퀘어월드 내부 시스템에 대한 원격 액세스 포인트 역할을하며 일종의 중앙 인공 지능을 수용하는 것으로 보입니다."
 r_square_world_hub_garyx:0 "게릭스와 접촉"
 r_square_world_hub_garyx_DESC:0 "우리는 중앙 인공 지능인 게릭스와 통신할 수 있습니다."
 giga_tech_terraform_molten:0 "행성 지열 안정화"
 giga_tech_terraform_molten_desc:0 "용암 행성은 가장 가혹한 암석 행성 중 하나입니다. 행성의 표면은 조력과 지질 활동에 의해 산산조각이 났습니다. 그러나 거대한 궤도 냉각 광선과 거대구조 레이저 드릴을 사용하여 구조적 구성을 변경하면 이 행성의 표면을 식히고 안정화하여 잠재적으로 거주가 가능하게 만들 수 있습니다."
 giga_dialog.4001.name:0 "$name_terraform_molten$ 건설 현장 완성!"
 giga_dialog.4001.desc:0 "이제 [giga_system.GetName] 성계의 $name_terraform_molten$ 건설 현장이 완성되었습니다. 이 궤도 플랫폼은 이 용암 행성 주변에 큰 구조물을 건설하기위한 기반 시설 역할을 할 것이며, 냉각 광선과 레이저 드릴을 사용하여 용암 행성의 표면을 원격으로 변경하여 생명이 없더라도 대부분의 생명체가 거주 할 수 있도록 할 것입니다."
 giga_dialog.4001.a:0 "좋아."
 giga_dialog.4002.name:0 "$name_terraform_molten$ 궤도 시설 완성!"
 giga_dialog.4002.desc:0 "우리 $name_terraform_molten$이(가) 이제 운영 준비가 완료되었습니다. 이 대형 구조물은 행성의 적도를 따라 펼쳐져 있으며, 행성의 표면을 생명에 더 적합한 형태로 조각하는 데 사용될 대형 장비를 작동시키기 위한 필수 기계와 반응기를 수용하고 있습니다. 세 개의 대형 초대형 냉각 빔과 레이저 드릴이 추가됨으로써, 우리는 이 세계의 지질 활동을 냉각하고 안정화할 수 있게 될 것입니다. 이제 실제 테라포밍 과정을 시작해야 합니다. \n\n이제 $name_terraform_molten$이(가) 완료되었으므로, 우리는 테라포밍 과정을 실제로 시작해야 합니다."
 giga_dialog.4002.a:0 "좋아."
 giga_dialog.4004.name:0 "$name_terraform_molten$ 테라포밍 성공!"
 giga_dialog.4004.desc:0 "훌륭한 소식입니다! 우리의 §Y$name_terraform_molten$§!이 §Y[giga_system.GetName]§! 항성계에서 한때 용암으로 뒤덮였던 §Y[giga_planet.GetName]§! 행성을 뜨겁지만 거주 가능한 세계로 성공적으로 변형시켰습니다. 행성의 표면은 식었고, 대부분의 지질 활동은 억제됨에 따라 행성의 혼란스러운 판 구조가 광범위하게 재형성되었습니다. 이제 이 행성은 식민지 개척을 위한 준비가 완료되었으며, 실제 생명을 추가하기 위해 더 많은 테라포밍이 가능할 수 있습니다."
 giga_dialog.4004.a:0 "놀라워!"
 giga_dialog.4004.a.tooltip:0 "대기 중에 떠 다니는 잔류 잿가루로 인해 '화산에서 발견되는 아주 미세한 규소 먼지를 흡입하여 허파에 쌓여 생기는 만성 폐질환(영어로는 Pneumonoultramicroscopicsilicovolcanoconiosis라고 합니다.)'이 생기지 않도록 주의하십시오."
 terraform_molten_0:0 "$gc_kilo$$name_terraform_molten$ 건설 현장"
 terraform_molten_0_DESC:0 "미래의 $name_terraform_molten$를 위한 건설 현장은 행성 주변에 건설될 것이며, 이 행성의 거친 표면을 식히고 안정시켜 거주가 가능하게 만들 것입니다."
 terraform_molten_0_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_kilostructure$ - $giga_list_category_terraforming$\n§Y용암 행성§!을 §YE뜨거운 행성§!으로 바꿉니다\n§L지열 안정 장치가 용암 행성의 불안정한 구조를 고칠 수 있을 뿐만 아니라, 숨쉴 수 있는 대기 또한 뿜어내어 용암 행성을 다소 거주 가능하지만 생명체는 없는 행성으로 바꿀 수 있습니다.§!"
 terraform_molten_1:0 "$name_terraform_molten$ 궤도 시설"
 terraform_molten_1_DESC:0 "완전한 $name_terraform_molten$이(가) 대형 궤도 냉각기와 레이저 드릴 세트로 장착되어 행성의 표면을 냉각하고 안정화합니다. 이제 실제 테라포밍 과정을 시작하기만 하면 됩니다."
 giga_tech_terraform_shattered:0 "행성 복원"
 giga_tech_terraform_shattered_desc:0 "조각나고 부서진 행성은 암석형 행성 중 가장 가혹한 행성입니다. 표면은 초강력 무기, 생물체 또는 알 수 없는 힘에 의해서 찢겨버렸습니다. 그러나 거대한 중력 엔진을 활용하면 그러한 행성의 파편들을 수집하고 통합하여 잠재적으로 테라포밍 가능하게 만들 수 있습니다."
 giga_dialog.11201.name:0 "$name_terraform_shattered$ 건설 현장 완공!"
 giga_dialog.11201.desc:0 "[giga_system.GetName] 성계에서 $name_terraform_shattered_full$의 건설 현장이 완공되었습니다. 이 궤도 플랫폼은 중력 엔진을 사용하여 암석들이 지질 활동을 다시 시작할 수 있을만큼 거대한 덩어리로 결합시킬 구조물을 건설하는 기지 역할을 할 것입니다."
 giga_dialog.11201.a:0 "좋아."
 giga_dialog.11202.name:0 "$name_terraform_shattered$ 내부 고리"
 giga_dialog.11202.desc:0 "$name_terraform_shattered$의 내부 고리가 완성되었습니다. 이 커다란 고리는 행성의 적도가 될 곳 주위에 펼쳐져 있고, 행성의 표면을 생명이 거주하기에 적합하게 조각하는데 사용될 대형 장치를 장착하는데 필요한 설비들을 갖추고 있습니다."
 giga_dialog.11202.a:0 "좋아."
 giga_dialog.11203.name:0 "$name_terraform_shattered$ 외부 고리"
 giga_dialog.11203.desc:0 "$name_terraform_shattered$의 외부 고리가 완성되었습니다. 이 고리는 내부 고리에 부착되어 있으며, 내부 고리가 지구 주위를 회전할 수 있도록하는 대형 모터뿐만 아니라 전체 구조에 동력을 공급하는 원자로를 포함하고 있습니다."
 giga_dialog.11203.a:0 "휼륭하군."
 giga_dialog.11204.name:0 "$name_terraform_shattered$ 완성"
 giga_dialog.11204.desc:0 "$name_terraform_shattered$이 완성되었습니다. 내부 고리에 장착된 두 개의 대형 중력 엔진이 추가됨으로써, 행성 물질을 빠르고 안전하게 수집하여 새로운 행성으로 결합할 수 있을 것입니다. 이제 실질적인 결합 과정을 시작해야합니다."
 giga_dialog.11204.a:0 "당장 그렇게 하지."
 giga_dialog.11205.name:0 "$name_terraform_shattered$ 테라포밍 성공!"
 giga_dialog.11205.desc:0 "좋은 소식입니다! [giga_system.GetName] 성계에 있는 우리의 $name_terraform_shattered_full$이 파괴된 행성을 아직 사람이 살 수는 없지만, 응집력 있고 미래에 테라포밍할 수 있는 행성으로 바꾸어 놓았습니다."
 giga_dialog.11205.a:0 "믿을 수 없군!"
 terraform_shattered_0:0 "$gc_mega$$name_terraform_shattered$ 건설 현장"
 terraform_shattered_0_DESC:0 "이 행성에 건설될 $name_terraform_shattered$을 위한 건설 현장입니다. 행성의 잔재를 수집하고 지질학적으로 활동적인 행성을 만들 것입니다."
 terraform_shattered_0_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_megastructure$ - $giga_list_category_terraforming$\n§Y파괴된 세계§! 또는 §Y부서진 세계§!를 §Y용융 세계§!로 변환합니다.\n§L이 경이로운 장치는 부서진 세계와 파괴된 세계를 통합할 수 있으며, 이들에게 가해진 피해를 복구하고 추가적인 테라포밍이 가능할 만큼 응집력 있게 만듭니다.§!\" #gigalistentry GLUE"
 terraform_shattered_1:0 "$name_terraform_shattered$ 내부 고리"
 terraform_shattered_1_DESC:0 "이 거대한 고리에는 행성의 잔재를 원격으로 수집하기 위해 사용될 중력 엔진을 장착하는데 필요한 설비가 들어 있습니다."
 terraform_shattered_2:0 "$name_terraform_shattered$ 외부 고리"
 terraform_shattered_2_DESC:0 "외부 고리에는 미래의 중력 엔진이 이 행성을 복원할 수 있게 해주는 원자로와 운동 하드웨어가 포함되어 있습니다."
 terraform_shattered_3:0 "$name_terraform_shattered$"
 terraform_shattered_3_DESC:0 "대형 중력 엔진이 장착된 완전한 $name_terraform_shattered$입니다. 이전 행성의 물질을 수집하고 결합할 수 있으며, 이제 실제 테라포밍 과정을 시작하는 일만 남았습니다."
 terraform_shattered_4:0 "태라포밍 시작"
 terraform_shattered_4_DESC:0 "$name_terraform_shattered$의 승무원에게 행성의 녹은 표면과 지각을 결합하여 이후 생명에 적합하게 만들 수 있는 행성으로 만들도록 명령합니다."
 name_terraform_site:0 "테라포밍 플랫폼"
 terraform_site_0:0 "$gc_mega$$name_terraform_site$ 건설 현장"
 terraform_site_0_DESC:0 "미래의 $name_terraform_barren$을(를) 위한 건설 현장입니다. 황량한 세계에 생명을 불어넣을 수 있는 장치를 건설하는 데 필요한 많은 인력과 기계가 포함되어 있습니다."
 terraform_site_0_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_megastructure$ - $giga_list_category_terraforming$\n이 §Y행성 변형§!을 가능하게 합니다: §Y황량한§!, §Y얼어붙은§!, §Y독성§! 및 §Y용융된§! 행성. 어떤 기술을 해제했는지에 따라 달라집니다. 완료되면 자동으로 적절한 거대 구조물로 전문화됩니다."
 terraform_site_0_CONSTRUCTION_INFO_DELAYED:0 "$giga_list_additional_data$ - 완료되면 이 건설지는 건설된 행성 유형에 따라 §Y동적 핵 점화기§!, §Y대기 정화기§! 또는 §Y지열 안정기§! 건설지로 변경됩니다. 특정 행성 유형 주위에 건설하려면 해당 기술이 있어야 합니다. 건설되면 해당 행성의 재래식 §Y테라포밍§!을 허용하며, 완료 시 거대구조물은 스스로 해체됩니다."
 giga_terraform_site_barren_loc:0 "§Y$name_terraform_barren$§!을(를) 통한 §Y$pc_barren$ 행성들§!"
 giga_terraform_site_toxic_loc:0 "§Y$name_terraform_toxic$§!을(를) 통한 §Y$pc_toxic$ 행성들§!"
 must_build_around_world_we_can_terraform:0 "$TRIGGER_FAIL$우리가 테라포밍할 기술을 가진 행성 유형 주위에 건설해야 합니다."
 planet_is_already_terraformable:0 "$TRIGGER_FAIL$이 행성은 이미 재래식 방법으로 테라포밍할 수 있습니다."
 giga_terraform_site_mechanics:0 "이제 테라포밍 메뉴를 사용하여 대상 행성을 §Y테라포밍§!할 수 있습니다. 이 과정 동안 거대구조물의 £energy£ §Y$energy$§! 유지비가 4배가 됩니다. 테라포밍이 완료되면 거대구조물은 스스로 해체됩니다."
 megastructure_terraforming_candidate:0 "거대구조물 테라포밍 후보지"
 megastructure_terraforming_candidate_desc:0 "생명체가 살기에 전혀 적합하지 않음에도 불구하고, 이 행성 주위의 거대구조물은 더 거주 가능한 형태로의 테라포밍을 가능하게 합니다."
 megastructure_terraforming_candidate_tooltip:0 "이 행성은 생명체가 없지만 거주 가능한 행성으로 테라포밍될 수 있습니다. 테라포밍이 완료되면 거대구조물은 해체될 것입니다."
 giga_tech_terraform_barren:0 "동적 핵 활성화"
 giga_tech_terraform_barren_desc:0 "행성의 자기장을 재 활성화하고 숨쉴 수 있는 대기가 뿌리내리는 것은 매우 어려운 두 가지 작업입니다. 그러나 발전된 테라포밍 기술은 이러한 위업을 현실에 더 가깝게 만들 수 있습니다."
 giga_dialog.3801.name:0 "$name_terraform_barren$ 구역 건설"
 giga_dialog.3801.desc:0 "$name_terraform_barren$ 건설 현장이 완공되었습니다. 이곳은 [giga_system.GetName] 성계에 $name_terraform_barren$을 구축하기 위한 기반 시설 역할을 할 것입니다. 이 기술의 경이로움은 불모 행성에 대기권과 수권을 구현하여 더 거주에 적합하게 만든다는 것입니다."
 giga_dialog.3801.a:0 "아주 좋아."
 giga_dialog.3802.name:0 "$name_terraform_barren$ 초대형 코일 건설"
 giga_dialog.3802.desc:0 "$name_terraform_barren$이(가) [giga_system.GetName]에서 완료되었습니다. 이곳에는 두 개의 거대한 지자기 코일이 있어 막대한 전자기장을 생성하며, 이는 이 행성의 핵을 녹일 만큼 강인하고, 생명체가 생존하는 데 필수적인 자기장을 형성할 수 있기를 바랍니다. 그 옆에는 불모 행성을 둘러싼 대형 그리드가 있어 다양한 화학 과정을 통해 대량의 대기를 생성하여 이 행성의 기후를 마음대로 조정할 수 있습니다.\n\n이제 남은 것은 실제로 테라포밍 과정을 시작하는 것입니다."
 giga_dialog.3802.a:0 "훌륭해."
 giga_dialog.3804.name:0 "$name_terraform_barren$ 테라포밍 성공!"
 giga_dialog.3804.desc:0 "§Y$name_terraform_barren$§!이(가) §Y[giga_system.GetName]§! 시스템에 건설되어 §Y[giga_planet.GetName]§!을(를) 거주 가능한 세계로 성공적으로 변형하였습니다! 대부분의 생명체에게는 견딜 수 있는 기후를 가지고 있지만, 완전히 생명이 결여되어 있으며, 적절한 식민지가 가능할 만큼 거주 가능성이 여전히 낮다면 추가적인 테라포밍이 필요할 것입니다. 그렇지 않다면, 이는 우리가 방금 이룬 훌륭한 기술적 성과로, 테라포밍에 대한 우리의 숙련도를 입증하는 것입니다."
 giga_dialog.3804.a:0 "놀랍군!"
 terraform_barren_0:0 "$gc_kilo$$name_terraform_barren$ 건설 현장"
 terraform_barren_0_DESC:0 "미래의 $name_terraform_barren$ 건설 현장. 불모 행성에 생명을 불어 넣을 수있는 장치를 만드는 데 필요한 많은 인력과 기계가 들어 있습니다."
 terraform_barren_0_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_kilostructure$ - $giga_list_category_terraforming$\n§Y불모 행성§! 또는 §Y얼음 행성§!을 §Y온난한 죽은 행성§!으로 바꿉니다\n§L행성을 감싸는 이 구조물은 죽은 행성의 자기장을 부활시키고 행성에 수권을 생성하여 황량한 행성을 보다 살 만하게 바꿉니다.§!"
 terraform_barren_1:0 "$name_terraform_barren$ 초대형 코일"
 terraform_barren_1_DESC:0 "$name_terraform_barren$은 이제 대기 조작 장치의 대규모 배열로 장착되어, 이 세계의 표면에 호흡 가능한 대기와 물을 퍼뜨릴 수 있습니다. 이제 남은 것은 과정을 시작하는 것입니다."
 terraform_barren_2_disabled:0 "고대의 $name_terraform_barren$"
 terraform_barren_2_disabled_DESC:0 "이 고대의 $name_terraform_barren$는 매우 오래전에 미지의 문명에 의해 지어졌습니다. 고대의 전원이 부족하지만 작동하는 것 같습니다."
 terraform_barren_2_disabled_MEGASTRUCTURE_DETAILS:0 "$terraform_barren_2_disabled_DESC$"
 terraform_barren_3_restored:0 "테라포밍 시작"
 terraform_barren_3_restored_DESC:0 "이 고대 거대 구조물에 명령하여 아래 행성에서 테라포밍 작업을 다시 시작합니다."
 giga_tech_terraform_toxic:0 "초대규모 대기 세척"
 giga_tech_terraform_toxic_desc:0 "거대한 궤도 화학 전환 공장은 이론적으로 독성 행성의 독성 성분이있는 대기를 완전히 제거하여 대부분의 종이 서식할 수 있도록 만듭니다."
 giga_dialog.3901.name:0 "$name_terraform_toxic$ 건설 현장 건설"
 giga_dialog.3901.desc:0 "미래의 $name_terraform_toxic$ 건설 현장이 이제 [giga_system.GetName] 성계에서 완료되었습니다! 이 다소 큰 궤도 플랫폼에는 독성 행성 주변에 $name_terraform_toxic$의 건설을 시작하여 결국 거주 가능하게 만드는 데 필요한 장비가 들어 있습니다."
 giga_dialog.3901.a:0 "좋아."
 giga_dialog.3902.name:0 "$name_terraform_toxic$ 공정 고리 제작"
 giga_dialog.3902.desc:0 "유독성 행성을 중심으로 $name_terraform_toxic$가 조립되었습니다. 믿을 수 없을 만큼 거대한 화학 재처리 시설을 갖춘 이 고리 모양의 구조물은 행성 대기 내의 유독성 요소를 신속하고 효율적으로 호흡 가능한 요소로 변환할 수 있는 능력을 가지고 있습니다. 이들은 행성 대기 내에서 가스를 대량으로 추출하고 주입할 수 있는 두 개의 거대한 펌프에 의해 보조됩니다.\n\n이제 $name_terraform_toxic$가 완성되었으므로, 우리는 이제 테라포밍 과정을 시작해야 합니다."
 giga_dialog.3902.a:0 "잘했다."
 giga_dialog.3904.name:0 "$name_terraform_toxic$ 테라포밍 완료!"
 giga_dialog.3904.desc:0 "환상적인 소식입니다! 우리의 §Y$name_terraform_toxic$§!이(가) §Y[giga_system.GetName]§! 항성계에서 한때 유독성 행성이었던 §Y[giga_planet.GetName]§!을(를) 거주 가능한, 비록 생명체가 없는 세계로 성공적으로 테라포밍했습니다. 테라포밍된 행성은 다소 두꺼운 대기를 가지고 있지만, 이제 식민지 개척을 위한 준비가 완료되었습니다. 원한다면 추가로 테라포밍을 진행할 수도 있습니다."
 giga_dialog.3904.a:0 "놀라운 업적이다."
 terraform_toxic_0:0 "$gc_kilo$$name_terraform_toxic$ 건설 현장"
 terraform_toxic_0_DESC:0 "거대 구조물 건설을 시작하는 데 필요한 장비를 갖춘 미래의 $name_terraform_toxic$ 건설 현장입니다. 결국엔 독성 행성을 생명이 없는 세상으로 바꿀 수 있을 것입니다."
 terraform_toxic_0_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_kilostructure$ - $giga_list_category_terraforming$\n§Y유독성 행성§!을 §Y안개 낀 행성§!으로 바꿉니다\n§L대기 정화기는 대기의 유독성 화합물을 없애거나 변화시켜, 유독성 대기를 숨 쉴 수 있는 대기로 바꾸는 힘든 작업을 합니다.§!"
 terraform_toxic_1:0 "$name_terraform_toxic$ 공정 고리"
 terraform_toxic_1_DESC:0 "이 $name_terraform_toxic$는 행성의 대기를 조작할 수 있는 두 개의 대형 펌프로 장착되어 있어, 대기를 더 밀집시키거나 덜 밀집시킬 수 있으며, 구성 가스를 재분배할 수 있습니다."
 giga_tech_war_moon_1:0 "거대 이동 시스템"
 giga_tech_war_moon_1_desc:0 "함선은 클수록 이동하기 어려워집니다. 새롭고 흥미로운 유형의 기동 시스템을 개발하는 것은 몇몇 믿을 수 없는 프로젝트에 대한 문을 열 수 있을 것 입니다."
 giga_tech_war_moon_2:0 "천체 무기화"
 giga_tech_war_moon_2_desc:0 "기동 무장 측면에서 타이탄은 가장 큰 것으로 생각되었습니다. 위성 전체를 움직여 무기로 사용한다는 생각은 말도 안되게 들립니다. 그러나 거대공학 기술과 에너지 구성의 발전은 그 무서운 위성을 현실로 만들 수 있습니다."
 giga_dialog.2601.name:0 "$name_war_moon$ 건설 현장 건설"
 giga_dialog.2601.desc:0 "미래의 $name_war_moon$ 건설 현장이 이제 [giga_system.GetName] 성계에서 완공되었습니다. 거의 무해한 이 천체를 완전히 작동하는 전투행...위성으로 변환하기 위한 기반 시설 역할을 합니다."
 giga_dialog.2601.a:0 "이것은 역사에 쓰여질 것이다."
 giga_dialog.2602.name:0 "$name_war_moon$ 설치된 이동 시스템"
 giga_dialog.2602.desc:0 "[giga_system.GetName] 성계의 $name_war_moon$에 기동 시스템이 설치되었습니다. 거대한 추진기가 막대한 추진력을 발생시켜, 위성 전체를 옮길 수 있을 것입니다. 추진기는 행성의 핵 내부에 설치된 거대한 발전기로 작동합니다. 이제 위성에 무시무시한 초강력 병기를 설치해 위성을 무장시켜야 합니다.\n\n$name_war_moon$의 거대한 크기 때문에 유지비는 £alloys£ 100과 £energy£ 250일 것입니다.\n\n§Y함선 설계에서 전쟁 위성을 설계하세요!§!"
 giga_dialog.2602.a:0 "훌륭해."
 giga_dialog.2603.name:0 "위성 비행 작업"
 giga_dialog.2603.desc:0 "완료되었습니다. 우리가 $name_war_moon$을 건설한 천체는 더 이상 단순한 위성이나 작은 행성이 아닙니다. 거의 모든 것을 뚫을 수있는 매우 큰 오메가 파멸 랜스가 장착되어 있습니다.\n\n추진기가 달을 궤도에서 밀어 내고 하이퍼 드라이브가 활성화되어 이제 우리 함대에 추가되었습니다. 이제 적들을 파멸시킬 준비가 되었습니다."
 giga_dialog.2603.a:0 "환상적이군. 우리의 적들은 전장을 두려워하여 두려움에 떨 것이다."
 war_moon_0:0 "$gc_mega$$name_war_moon$ 건설 현장"
 war_moon_0_DESC:0 "미래의 $name_war_moon$ 건설 현장입니다. 이 수송 창고에는 이 위성을 무시무시한 무기로 바꾸는 데 필요한 장비가 있습니다."
 war_moon_0_MEGASTRUCTURE_DETAILS:0 "£galwonders£ $giga_list_category_megastructure$ - $giga_list_category_celestial_warship$\n§Y크기 5~7§!의 §Y용암형§! 또는 §Y불모형§!, §Y얼음 행성§!을 §Y천체 전함§!으로 바꿉니다\n§L작은 행성을 파괴적인 기동 병기 플랫폼으로 바꾸는 정신나간 공학 프로젝트입니다. 노천 채굴된 핵에도 건설될 수 있습니다.§!"
 war_moon_1:0 "$name_war_moon$ 이동 체계"
 war_moon_1_DESC:0 "위성의 핵에있는 거대한 원자로에 의해 구동되는 전쟁 위성의 거대한 추진기는 비록 아주 느리지만 행성 전체를 추진시킬 수 있습니다."
 war_moon_2:0 "$name_war_moon$"
 war_moon_2_DESC:0 "완전하게 작동하는 $name_war_moon$로써, 거대하며 파괴적인 입자포가 장착되어 있습니다."
 war_moon_ship_name:0 "[event_target:celestial_name.GetName]"
 war_moon_restored_ship_name:0 "복구된 위성"
 war_moon_printed_ship_name:0 "위성 결집"
 war_moon_debris:0 "폐허가 된 $name_war_moon$"
 war_moon_debris_DESC:0 "어떤 진보한 문명이 만든 거대한 위성 크기의 함선의 잔해입니다. 놀랍게도 자기 자신의 중력으로인해 완전히 파괴되지는 않았습니다. 위성에 나열된 대량의 무기와 위성의 큰 추진기는 어떤 폭력적인 분쟁 도중 상당한 피해를 받았지만, 이론적으로는 우리가 기술이 있다면 다시 작동 가능 상태로 돌려놓을 수 있습니다."
 war_moon_debris_MEGASTRUCTURE_DETAILS:0 "$war_moon_0_MEGASTRUCTURE_DETAILS$"
 war_moon_restored:0 "$war_moon_2$"
 war_moon_restored_DESC:0 "$war_moon_2_DESC$"
 war_moon_restored_MEGASTRUCTURE_DETAILS:0 "$war_moon_0_MEGASTRUCTURE_DETAILS$"
 war_moon_debris_cold_barren:0 "$war_moon_debris$"
 war_moon_debris_cold_barren_DESC:0 "$war_moon_debris_DESC$"
 war_moon_debris_cold_barren_MEGASTRUCTURE_DETAILS:0 "$war_moon_debris_MEGASTRUCTURE_DETAILS$"
 war_moon_restored_cold_barren:0 "$war_moon_2$"
 war_moon_restored_cold_barren_DESC:0 "$war_moon_2_DESC$"
 war_moon_restored_cold_barren_MEGASTRUCTURE_DETAILS:0 "$war_moon_debris_MEGASTRUCTURE_DETAILS$"
