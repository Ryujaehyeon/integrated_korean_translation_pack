 giga_gamer_vr_d:0 "가상 엔터테인먼트 델타 복합단지"
 civic_lethargic_gamers:0 "게으른 수호자"
 civic_lethargic_gamers_desc:0 "$AWAKENED_EMPIRE_LETHARGIC_GAMERS$"
 AWAKENED_EMPIRE_LETHARGIC_GAMERS:0 "이 각성한 제국은 자신들의 가장 오락에서 강제로 끌려나왔으며, 현재의 은하적 사태에 큰 관심이 없습니다."
 civic_experienced_gamers:0 "악의적인 공격자"
 civic_experienced_gamers_desc:0 "$AWAKENED_EMPIRE_EXPERIENCED_GAMERS$"
 AWAKENED_EMPIRE_EXPERIENCED_GAMERS:0 "수천년의 가상 전투를 통해 강해진 이 각성한 제국은 자신의 완전한 힘을 내보일 것입니다."
