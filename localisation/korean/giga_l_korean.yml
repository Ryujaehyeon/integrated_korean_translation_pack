 giga_katrebels.2011.name:0 "§Y라브카니아§!에서의 저항 작전"
 giga_katrebels.2011.desc:0 "§Y솔라키아 자유 전사§!가 §Y라브카§!의 땅에서 다양한 라브카 종족 집단과 함께 작전을 수행하도록 지원할 수 있습니다. 그들은 라브카인을 징집해 캇첸 군으로 훈련시키는 캇첸군 훈련소를 목표로 할 것입니다.\n\n§Y성공 시§!:\n§Y라브카니아§!에서의 게릴라 활동이 §G증가§!할 것입니다.\n캇첸의 §Y지상군 피해량이 감소§!할 것입니다.\n캇첸의 경계가 §R2§! §R증가§!합니다.\n\n§Y실패 시§!:\n캇첸의 경계가 §R1§! §R증가§!할 것입니다.\n\n§Y성공 확률§!:\n기본: §Y75%§!\n§H캇첸의 경계§!: §R-[flusion_primitives_country.katzen_wary_perc]%§!\n§H라브카니아에 대한 캇첸의 중간 정도의 통제§!: §R-20%§!\n§B뤼우인슈타트의 게릴라 §!: §G+[flusion_primitives_country.lyuin_res_perc]%§!\n§B소사에서의 게릴라 §!: §G+[flusion_primitives_country.zousa_res_perc]%§!\n§B솔라키아에서의 게릴라 §!: §G+[flusion_primitives_country.solak_res_perc]%§!\n총계: §Y[flusion_primitives_country.flusion_success_chance_total]%§!"
 giga_katrebels.2012.name:0 "§Y소사§!에서의 저항 작전"
 giga_katrebels.2012.desc:0 "§Y솔라키아 자유 전사§!가 §Y소사§!의 땅에서 다양한 소사 종족 집단과 소사의 망명정부와 함께 작전을 수행하도록 지원할 수 있습니다. 그들은 캇첸의 FTL 능력을 감소시키기 위해 캇첸의 하이퍼드라이브 연구 생산 센터를 목표로 할 것입니다.\n\n§Y성공 시§!:\n§Y소사§!에서의 게릴라 활동이 §G증가§!할 것입니다.\n캇첸의 §Y점프 충전 시간이 증가§!할 것입니다.\n게릴라의 활동이 §R격렬한§! 정도로 증가하면, 캇첸의  §Y점프 드라이브 스크램블러§!가 정지할 것이고, §Y점프 드라이브§!가 있는 함선들이 유블리오로 순간이동할 것입니다.\n캇첸의 경계가 §R2§! §R증가§!합니다.\n\n§Y실패 시§!:\n캇첸의 경계가 §R1§! §R증가§!할 것입니다.\n\n§Y성공 확률§!:\n기본: §Y75%§!\n§H캇첸의 경계§!: §R-[flusion_primitives_country.katzen_wary_perc]%§!\n§H소사에 대한 캇첸의 중간 정도의 통제§!: §R-20%§!\n§B라브카니아의 게릴라§!: §G+[flusion_primitives_country.ravka_res_perc]%§!\n§B게슈볼른에서의 게릴라§!: §G+[flusion_primitives_country.puffy_res_perc]%§!\n총계: §Y[flusion_primitives_country.flusion_success_chance_total]%§!"
 giga_katrebels.2013.name:0 "§Y뤼우인슈타트§!에서의 저항 작전"
 giga_katrebels.2013.desc:0 "§Y솔라키아 자유 전사§!가 §Y뤼우이니타§!의 땅에서 다양한 뤼우이니타 종족의 집단과 함께 작전을 수행하도록 지원할 수 있습니다. 그들은 캇첸의 함선에 적용될 실드 설계를 실험하는 캇첸군의 연구기관을 목표로 할 것입니다.\n\n§Y성공 시§!:\n§Y뤼우인슈타트§!에서의 게릴라 활동이 §G증가§!할 것입니다.\n캇첸의 §Y실드 내구도가 감소§!할 것입니다.\n캇첸의 경계가 §R2§! §R증가§!합니다.\n\n§Y실패 시§!:\n캇첸의 경계가 §R1§! §R증가§!할 것입니다.\n\n§Y성공 확률§!:\n기본: §Y75%§!\n§H캇첸의 경계§!: §R-[flusion_primitives_country.katzen_wary_perc]%§!\n§H뤼우인슈타트에 대한 캇첸의 강력한 통제§!: §R-30%§!\n§B라브카니아의 게릴라§!: §G+[flusion_primitives_country.ravka_res_perc]%§!\n§B캇첸 헤르츠란츠의 게릴라§!: §G+[flusion_primitives_country.katzen_res_perc]%§!\n§B솔라키아에서의 게릴라§!: §G+[flusion_primitives_country.solak_res_perc]%§!\n§B게슈볼른에서의 게릴라§!: §G+[flusion_primitives_country.puffy_res_perc]%§!\n총계: §Y[flusion_primitives_country.flusion_success_chance_total]%§!"
 giga_katrebels.2014.name:0 "§Y게슈볼른§!에서의 저항 작전"
 giga_katrebels.2014.desc:0 "§Y솔라키아 자유 전사§!가 §Y게슈볼른§!의 땅에서 다수의 다종족 집단과 함께 작전을 수행하도록 지원할 수 있습니다. 그들은 캇첸이 운동 에너지형 무기에 사용하는 군수품을 생산하고 저장하는 캇첸군 군수품 생산공장과, 운동 에너지형 무기에 사용되는 값진 우라늄을 채굴하는 우라늄 광산을 목표로 할 것입니다.\n\n§Y성공 시§!:\n§Y게슈볼른§!에서의 게릴라 활동이 §G증가§!할 것입니다.\n캇첸의 §Y운동 에너지형 무기의 피해량이 감소§!할 것입니다.\n캇첸의 경계가 §R2§! §R증가§!합니다.\n\n§Y실패 시§!:\n캇첸의 경계가 §R1§! §R증가§!할 것입니다.\n\n§Y성공 확률§!:\n기본: §Y75%§!\n§H캇첸의 경계§!: §R-[flusion_primitives_country.katzen_wary_perc]%§!\n§H게슈볼른에 대한 캇첸의 강력한 통제§!: §R-30%§!\n§B소사에서의 게릴라§!: §G+[flusion_primitives_country.zousa_res_perc]%§!\n§B에지카니아의 게릴라§!: §G+[flusion_primitives_country.ezicania_res_perc]%§!\n§B뤼우인슈타트의 게릴라§!: §G+[flusion_primitives_country.lyuin_res_perc]%§!\n§B쥠뷔란트의 게릴라§!: §G+[flusion_primitives_country.symby_res_perc]%§!\n§B라우렌다르의 게릴라§!: §G+[flusion_primitives_country.laurn_res_perc]%§!\n총계: §Y[flusion_primitives_country.flusion_success_chance_total]%§!"
 giga_katrebels.2015.name:0 "§Y라루렌다르§!에서의 저항 작전"
 giga_katrebels.2015.desc:0 "§Y솔라키아 자유 전사§!가 §Y라우렌다르§!의 땅에서 라우나이스 원주민들과 작전을 수행하도록 지원할 수 있습니다. 그들은 캇첸이 그들 제국에 대한 선전 영상과 영화를 만드는 캇첸 프로파간다 스튜디로을 목표로 할 것입니다.\n\n§Y성공 시§!:\n§Y라우렌다르§!에서의 게릴라 활동이 §G증가§!할 것입니다.\n캇첸의 §Y지상군 사기가 감소§!할 것입니다.\n캇첸의 경계가 §R2§! §R증가§!합니다.\n\n§Y실패 시§!:\n캇첸의 경계가 §R1§! §R증가§!할 것입니다.\n\n§Y성공 확률§!:\n기본: §Y75%§!\n§H캇첸의 경계§!: §R-[flusion_primitives_country.katzen_wary_perc]%§!\n§H라우렌다르에 대한 캇첸의 중간 정도의 통제§!: §R-20%§!\n§B게슈볼른의 게릴라§!: §G+[flusion_primitives_country.puffy_res_perc]%§!\n총계: §Y[flusion_primitives_country.flusion_success_chance_total]%§!"
 giga_katrebels.2016.name:0 "§Y메르쿠르§!에서의 저항 작전"
 giga_katrebels.2016.desc:0 "§Y솔라키아 자유 전사§!가 §Y메르쿠리아§!의 땅에서 메르쿠리아 원주민들과 작전을 수행하도록 지원할 수 있습니다. 그들은 캇첸이 새로운 폭발형 무기를 고안하는 실험실과 시험장을 목표로 할 것입니다.\n\n§Y성공 시§!:\n§Y메르쿠르§!에서의 게릴라 활동이 §G증가§!할 것입니다.\n캇첸의 §Y미사일 피해량이 감소§!할 것입니다.\n캇첸의 경계가 §R2§! §R증가§!합니다.\n\n§Y실패 시§!:\n캇첸의 경계가 §R1§! §R증가§!할 것입니다.\n\n§Y성공 확률§!:\n기본: §Y75%§!\n§H캇첸의 경계§!: §R-[flusion_primitives_country.katzen_wary_perc]%§!\n§H메르쿠르에 대한 캇첸의 약한 통제§!: §R-10%§!\n총계: §Y[flusion_primitives_country.flusion_success_chance_total]%§!"
 giga_katrebels.2017.name:0 "§Y쥠뷔란트§!에서의 저항 작전"
 giga_katrebels.2017.desc:0 "§Y솔라키아 자유 전사§!가 §Y쥠뷔란트§!에 여전히 살고 있는 소수의 쥠비 종족과 캇첸의 연료 생산 시설과 추진기 시험장을 목표로 작전을 수행하도록 지원할 수 있습니다.\n\n§Y성공 시§!:\n§Y쥠뷔란트§!에서의 게릴라 활동이 §G증가§!할 것입니다.\n캇첸 §Y함선의 속도가 감소§!할 것입니다.\n캇첸의 경계가 §R2§! §R증가§!합니다.\n\n§Y실패 시§!:\n캇첸의 경계가 §R1§! §R증가§!할 것입니다.\n\n§Y성공 확률§!:\n기본: §Y75%§!\n§H캇첸의 경계§!: §R-[flusion_primitives_country.katzen_wary_perc]%§!\n§H쥠뷔란트에 대한 캇첸의 중간 정도의 통제§!: §R-20%§!\n§B게슈볼른의 게릴라§!: §G+[flusion_primitives_country.puffy_res_perc]%§!\n총계: §Y[flusion_primitives_country.flusion_success_chance_total]%§!"
 giga_katrebels.2018.name:0 "§Y캇첸 헤르츠란츠§!에서의 저항 작전"
 giga_katrebels.2018.desc:0 "§Y솔라키아 자유 전사§!와 §Y캇첸 헤르츠란츠§!에서 캇첸의 통치에 반대하는 소수의 개인들을 지원할 수 있습니다. 그들은 캇첸의 무기 성능에 극적인 영향을 줄 것이라고 확신할 수 있는 지역의 캇첸 군수 공장과 산업을 파괴하려고 시도할 것입니다.\n\n§Y성공 시§!:\n§Y캇첸 헤르츠란츠§!의 게릴라 활동이 §G증가§!할 것입니다..\n캇첸의 §Y무기 피해량이 감소§!할 것입니다.\n캇첸의 경계가 §R2§! §R증가§!합니다.\n\n§Y실패 시§!:\n캇첸의 경계가 §R1§! §R증가§!할 것입니다.\n\n§Y성공 확률§!:\n기본: §Y75%§!\n§H캇첸의 경계§!: §R-[flusion_primitives_country.katzen_wary_perc]%§!\n§H캇첸 헤르츠란츠에 대한 캇첸의 매우 강력한 통제§!: §R-40%§!\n§B솔라키아에서의 게릴라§!: §G+[flusion_primitives_country.solak_res_perc]%§!\n§B뤼우인슈타트의 게릴라§!: §G+[flusion_primitives_country.lyuin_res_perc]%§!\n§B에지카니아의 게릴라§!: §G+[flusion_primitives_country.ezicania_res_perc]%§!\n총계: §Y[flusion_primitives_country.flusion_success_chance_total]%§!"
 giga_katrebels.2019.name:0 "§Y캐타운 메갈로폴리스§!에서의 저항 작전"
 giga_katrebels.2019.desc:0 "§Y솔라키아 자유 전사§!가 캇첸 문명의 심장인 캐타운을 습격하는 무모해 보이는 작전을 수행하도록 지원할 수 있습니다. 그들은 캇첸의 최고 사령부와 도시 아래에 위치하고 있는 다양한 종류의 실드 생성기를 파괴하기 위해 노력할 것이지만, 이 지역에 대한 캇첸의 매우 강력한 통제는 작전의 성공을 매우 어렵게 할 것입니다.\n\n§Y성공 시§!:\n§Y캐타운 메갈로폴리스§!에서의 게릴라 활동이 §G증가§!할 것입니다.\n캇첸의 §Y지상군 체력이 감소§!할 것이고, 플러션에 대한 §Y궤도 폭격 피해량이 증가§!할 것입니다.\n게릴라의 활동이 §R상당한§! 수준에 도달하면, 캇첸의 §Y반웜홀장§!이 정지할 것이고 플러션에 대해 초강력 무기를 사용할 수 있게 될 것입니다.\n게릴라의 활동이 §R극심한§! 수준에 도달하면, 캇첸의 §Y반사이킥장§!이 정지되어 행성에 대한 사이킥 공격이 가능해질 것입니다.\n캇첸의 경계가 §R2§! §R증가§!합니다.\n\n§Y실패 시§!:\n캇첸의 경계가 §R1§! §R증가§!할 것입니다.\n\n§Y성공 확률§!:\n기본: §Y75%§!\n§H캇첸의 경계§!: §R-[flusion_primitives_country.katzen_wary_perc]%§!\n§H캐타운 메갈로폴리스에 대한 캇첸의 불가해한 정도의 통제§!: §R-60%§!\n§B캇첸 헤르츠란츠의 게릴라§!: §G+[flusion_primitives_country.katzen_res_perc]%§!\n총계: §Y[flusion_primitives_country.flusion_success_chance_total]%§!"
