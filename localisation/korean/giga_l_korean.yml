 personality_pangalactic_defense_league:0 "은하의 수호자"
 personality_pangalactic_defense_league_desc:0 "이 제국은 모든 지성체에 대한 위협으로부터 은하계를 수호하려고 합니다."
 gov_pangalactic_defense_league:0 "은하 방위 위원회"
 gov_pangalactic_defense_league_desc:0 "이 정부는 은하계의 모든 생명체에 대한 위협을 없앤다는 하나의 목적 아래 모인 몇몇 주 세력들로 이루어져 있습니다. 각 구성원들은 어느 정도의 자치권을 가지고 있지만, 통합된 군사력을 가지고 있습니다."
 origin_orbital_arcology:0 "궤도 아콜로지"
 origin_orbital_arcology_desc:0 "이 종족은 진화하면서 항상 하늘에 떠있는 커다란 고리를 보았습니다. 그들이 첫 우주 비행에 성공했을 때, 이 고리가 완전히 거주할 수 있고 경작할 수 있는 땅으로 덮여있다는 것을 발견했습니다."
 origin_orbital_arcology_effects:0 "시작 행성 주위의 궤도 아콜로지와 함께 게임을 시작합니다."
 origin_elysium:0 "엘리시안 감독관"
 origin_elysium_desc:0 "이 문명은 최고의 대중의 통제 방법은 안전한 관측 지대에서 이루어지는 것이라고 생각합니다."
 origin_elysium_effects:0 "- 수도가 고향 행성의 궤도를 도는 §H$name_orb_elysium$§!이며, 이를 더 많이 건설할 수 있는 기술을 가지고 시작합니다- 새로 개척한 식민지는 가능할 경우 즉시 $name_orb_elysium$의 건설을 시작합니다- $name_orb_elysium$을 유지할 수 있지만 없는 식민지는 §R불이익을 겪습니다§!- $name_orb_elysium$ 기지를 해체할 수 없습니다- £job_giga_elysium_controller£ $job_giga_elysium_controller$ 직업은 자원 생산량도 향상시킵니다- $name_orb_elysium$ 수도 건물의 £alloys£ $alloys$ 유지비가 대폭 감소합니다- $name_orb_elysium$이 있는 행성에서 수도 건물 업그레이드에 필요한 팝 수가 감소합니다§P주의: $name_orb_elysium$이 있는 행성은 일반적인 행성과 매우 다른 방식으로 돌아가며, 행성 직업 대부분이 행성 특화에서 옵니다. 이 기원은 일반적인 플레이를 크게 바꿉니다.§!"
 origin_equatorial_shipyard:0 "적도 조선소"
 origin_equatorial_shipyard_desc:0 "용암형 생성의 타는 듯한 열기를 둘러 싼 고리 위에서 진화한 이 종은 물과 식량 부족으로 인해 고향을 떠나야만 했습니다."
 origin_equatorial_shipyard_effects:0 "용암 행성 주위의 주조 링 월드에서 시작합니다.\n기계 종족이 아닐 경우 £society_research£ §L$tech_hydroponics$§! 기술을 가지고 시작합니다."
 giga_equatorial_shipyard_start_NAME:0 "적도 조선소"
 giga_equatorial_shipyard_start_DESC:0 "적도 조선소에서 시작합니다."
 building_giga_matter_synthesizer:0 "물질 합성 기지"
 building_giga_matter_synthesizer_desc:0 "FTL 이전 문명을 유지하는 데 필요한 원자재를 만드는 방대햔 양의 불가사의한 에너지-질량 변환기 복합체입니다."
 origin_squareworld:0 "스퀘어월드"
 origin_squareworld_desc:0 "이 종은 물리학을 거스르는 스퀘어 링 월드에서 진화했습니다. 다른 구획들은 완전히 거주할 수 없게 되어버렸습니다. 그리하여 마지막 생명을 지탱하는 구획의 주민들은 그들 자신의 집에 남아 있는 것들을 고치기 위해 스스로 나가기로 결정했습니다."
 origin_squareworld_effects:0 "스퀘어월드에서 시작합니다."
 giga_squareworld_start_NAME:0 "스퀘어월드"
 giga_squareworld_start_DESC:0 "스퀘어월드에서 시작합니다."
 origin_flat_world_effects:0 "§Y$pc_flat_world$§!로 시작합니다.\n종족 거주 선호는 §Y$trait_pc_continental_preference$§!로 설정됩니다."
 origin_flat_world:0 "플랫 월드"
 origin_flat_world_desc:0 "수백 년 동안, 우리들은 모성의 기하학적 특성에 대해 논쟁했습니다. 모성이 구형이라 생각하고 증거가 조작되었다고 믿는 사람들에게 모성이 평평하다는 사실은 사진 자료만으로 납득시킬 수는 없었습니다. 진실은 당신의 문명에서 민간 우주 비행을 성공하고 나서 분명해졌습니다."
 flat_world_mod:0 "평평한 집"
 flat_world_mod_desc:0 "우리의 모성은 평평합니다. 믿을 수 없군요! 이 사실이 망할 농담인지 잊혀진 프로젝트일지는 모르겠지만... 아무튼 우리의 모성은 평평합니다. 진실은 저 밖에 있겠죠."
 giga_planetary_computer_start_NAME:0 "행성 컴퓨팅 단지"
 giga_planetary_computer_start_DESC:0 "행성 컴퓨팅 단지에서 시작합니다."
 origin_planetary_computer:0 "중앙 처리"
 origin_planetary_computer_desc:0 "대부분의 데이터가 손실됨에 따라, 원래는 이 행성 규모의 컴퓨터를 관리하기 위해 만들어진 로봇들은 이제 독자적으로 존재하게 되었습니다."
 origin_planetary_computer_effects:0 "행성 컴퓨팅 단지에서 시작합니다."
 building_solar_farm:0 "솔라 팜"
 building_solar_farm_desc:0 "행성의 시스템에 전력을 공급할 수 있는 충분한 에너지를 생성하는 거대한 태양광 수집 배열입니다."
 giga_behemoth_ring_system_NAME:0 "거대한 고리 (초거대 구조물)"
 giga_behemoth_ring_system_DESC:0 "죽은 별 주변의 거대한 링 월드에서 시작합니다."
 origin_great_ring:0 "거대한 고리"
 origin_great_ring_desc:0 "이 별이 블랙홀로 붕괴되었을때, 내부의 링 월드와 그걸 만든 선구자 문명을 파괴했습니다. 그러나 바깥쪽 고리는 큰 손상없이 살아 남았고, 블랙홀의 강착 원반의 약한 빛에 의해 따뜻해져 마침내 새로운 생명체가 그 위에 나타났습니다."
 origin_tooltip_great_ring_effects:0 "죽은 별 주변의 베히모스 링 월드에서 시작합니다.\n- 종족 거주 적합도는 §L링 월드§!로 설정됩니다.\n- §R근처에 거주 가능한 행성이 보장된 성계는 없습니다.§!\n\n§RAI는 이 기원을 사용할 수 없습니다. 이 기원을 가지고 만들어진 커스텀 AI제국은 대신 $origin_default$으로 생성됩니다.§!"
 interstellar_habitat_completed_core_MEGASTRUCTURE_DETAILS:0 "debug"
 giga_interstellar_system_NAME:0 "성간 링 월드"
 giga_interstellar_system_DESC:0 "성간 링 월드로 시작합니다."
 origin_interstellar_ring:0 "성간 거주자"
 origin_interstellar_ring_desc:0 "별들 사이의 어두운 공허에서 천천히 표류하는 이 링 월드를 누가 만들었는지는 아무도 모르지만, 젊은 문명은 이 곳을 고향이라고 부르고 있습니다. 이제 그들은 거대한 은하로 진출할 준비가 되었습니다."
 origin_tooltip_interstellar_ring_effects:0 "성간 링 월드로 시작합니다.\n- 종족 거주 적합도는 §L성간 링 월드§!로 설정됩니다.\n- §R근처에 거주 가능한 행성이 보장된 성계는 없습니다.§!\n\n§RAI는 이 기원을 사용할 수 없습니다. 이 기원을 가지고 만들어진 커스텀 AI제국은 대신 $origin_default$으로 생성됩니다.§!"
 interstellar_habitat_completed_core:0 "$interstellar_habitat_3$"
 interstellar_habitat_completed_core_DESC:0 "$interstellar_habitat_3_DESC$"
 building_giga_interstellar_hydroponic_farm:0 "수경 농업 단지"
 building_giga_interstellar_hydroponic_farm_desc:0 "링 월드에 거주하는 인구들을 지탱할 수 있는 거대한 수경 농업 단지입니다. 그러나 이 시설에는 한계가 있으며, 계속 증가하는 인구를 영원히 유지할 수는 없습니다."
