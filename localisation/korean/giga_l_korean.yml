 giga_ruined_ships_display_battle:0 "§V[global_event_country.giga_ruined_warships_perc_battle]§!"
 wrecked_warship_perc_desc:0 "이는 얼마나 많은 파괴된 전함이 스폰될지 설정합니다. 이는 거대 구조물처럼 수리되어 적은 비용으로 몇 척의 함선을 줍니다. 파괴된 전함이 비활성화 되어 있다면 이 설정은 의미가 없습니다.\n\n§R값이 높으면 게임 시작 시 랙이 발생할 수 있습니다!§!"
 wrecked_warship_perc_desc_2:0 "이것은 특정 유형의 난파된 군함이 얼마나 많이 스폰될지를 설정합니다. 이것들은 거대구조물처럼 수리할 수 있으며, 저렴한 비용으로 약간의 함선을 제공합니다. 난파된 군함이 전체적으로 또는 특정 유형으로 비활성화된 경우 아무 효과가 없습니다.\n\n§R높은 값은 게임 시작 시 렉 스파이크를 유발할 수 있습니다!§!"
 giga_ruined_ship_perc_high_enough:0 "$TRIGGER_FAIL$ §R더 이상 높이면 더 이상 신뢰할 수 있게 더 많은 함선을 생성할 수 없습니다.§!"
 matrioshka_brain_ruined_m_star:0 "폐허가 된 마트료시카 브레인"
 matrioshka_brain_ruined_m_star_DESC:0 "M형 항성을 둘러싼 거대한 컴퓨터의 잔해입니다. 이 강력한 기계는 한때 문명 전체의 과학적 노력에 힘을 실어줄 수 있었지만, 수천 년에 걸친 방치로 인해 폐허가 되었습니다."
 giga_flavor_systems.1100.name:0 "독자적 행성 규모 AI"
 giga_flavor_systems.1100.desc:0 "초기 개척 단계의 끝에 이어진, §Y[ROOT.GetName]§!의 거대한 데이터 뱅크와 네트워크 시스템에 대한 피상적은 분석은 행성 컴퓨팅 단지 전체에 대한 문제점을 밝혀냈습니다.\n\n사실, 상당수의 고대 컴퓨터에 알 수 없는 출처의 §R독자적 AI§!가 존재하는 듯 하며, 과거 수천년 동안 행성 전체를 처리 코어로 사용해온 것 같습니다. 또한 이전 행성 궤도를 돌던 적대적 방어 기지를 보조해주고 있었을 가능성이 높으며, 아마도 침입자를 막기 위한 수단이었을 것입니다.\n\n불행히도 우리는 이 행성급 AI의 목적을 전혀 모르고, AI가 사용하는 기반 시설에 대한 재빠른 조사는 그 프로그램이 이제껏 만났던 것과는 근본적으로 다르다는 것을 보여줍니다. 게다가 시시각각 변하는 수십겹의 암호화 방식으로 보호되고 있습니다.\n\n그 목적과 무관하게, 이 초지능 AI는 우리가 이 처리 장치를 차지하는 것을 별로 원하지 않으며 현재 행성 컴퓨팅 단지의 시설 일부를 §Y종료§!하고, 우리의 행성 개척을 좌절시키려는 목적으로 나머지를 악성 블로트웨어로 채움으로써 우리의 개척자들과 능동적으로 싸우고 있습니다. \n\n컴퓨팅 단지의 처리 능력을 완전히 사용하려면, AI가 행성 전체에 뻗어있게끔 하는 분산 릴레이와 서버를 종료하여 행성에서 AI를 제거하는 대규모 작전을 수행해야합니다. 또한, AI가 외부적으로 더욱 적대적이게 될 가능성이 있으니 행성에 수비대를 주둔시키는 것이 현명할 것입니다."
 giga_flavor_systems.1100.a:0 "제때에 처리될 것이다."
 giga_flavor_systems.1100.b:0 "독자적 지능 발견. 종료는 필수적."
 giga_rogue_ai_computer:0 "행성급 독자적 AI"
 giga_rogue_ai_computer_desc:0 "행성을 뒤덮는 이 행성 컴퓨터 단지의 미로같은 데이터 뱅크에는 수천 년 된 적대적 AI가 존재합니다."
 giga_rogue_ai_computer_build_speed:0 "적대적 건축물"
 giga_rogue_ai_computer_build_speed_desc:0 "§W각각의 £blocker£ §Y$d_giga_rogue_ai_relay_servers$§! 차단물은 건설 속도를 §R25%§!씩 감소시켜 최대 §R-90%§!까지 감소시킵니다.§!\n\n위험한 기반 시설의 활동이 우리의 건설 작업을 지연시키고 있습니다."
 giga_flavor_systems.1101.name:0 "버려진 행성 컴퓨팅 단지"
 giga_flavor_systems.1101.desc:0 "§Y[from.GetName]§! 성계를 탐사하다가, 우리의 탐사 팀이 일반적인 컴퓨팅 장치보다 훨씬 강력한 행성 규모의 거대한 컴퓨터인 §Y행성 컴퓨팅 단지§!가 버려져 있음을 발견했습니다.\n\n불행히도, 행성 그 자체에는 누구도 거주하고 있지 않은 것이 명백하지만, 그 궤도에는 행성에 너무 가까이 다가온 모든 것을 공격하는 강력하고 적대적인 §R방어 플랫폼§! 몇 개가 있습니다.\n\n누가 혹은 무엇이 이 플랫폼을 설치했는지는 모릅니다만, 아마도 그 제작자보다 오래되었고 이제 무의미하게 빈 행성을 보호하는 고대 장치일 것입니다. 어느 쪽이든, 이를 쳐부수고 컴퓨팅 단지를 장악하는 것은 분명 우리의 과학계에 대단한 이익이 될 것입니다."
 giga_flavor_systems.1101.a:0 "흥미롭군."
 giga_flavor_systems.1102.name:0 "독자적 AI 제거됨"
 giga_flavor_systems.1102.desc:0 "마침내, 체계적으로 모든 손상된 데이터 뱅크를 제거하고 우리의 연구 시설을 망가뜨리려던 엑사바이트 만큼의 악성 블로트웨어에 대응한 끝에, 우리 개척자들이 §Y[ROOT.GetName]§!의 §R독자적 AI§!를 행성에서 완전히 제거했습니다.\n\n행성 컴퓨팅 단지가 마침내 우리의 §G완전 통제§! 하에 있기 때문에, 그것은 더이상 우리의 개척자를 위협하고 우리의 모든 행동을 방해하지 못합니다.\n\n누군가는 이 AI가 그저 생존을 위해 필사적으로 싸웠을지도 모른다 말하기도 하지만, 슬프게도, 우리는 결코 알 수 없을 것입니다..."
 giga_flavor_systems.1102.a:0 "훌륭해!"
 giga_flavor_systems.1104.name:0 "독자적 AI가 공격하다!"
 giga_flavor_systems.1104.desc:0 "걱정스러운 소식입니다! §Y[ROOT.GetName]§!의 독자적 AI가 봉인된 지하 공장 내에서 위험한 살인로봇 군단을 만들어냈습니다. 현재 AI는 우리 식민지 상당 부분을 파괴하고 행성을 되찾기 위해  로봇들을 사용하고 있습니다!\n\n저들을 막아야 합니다. 그렇지 않으면, 우리는 행성에서 AI를 제거하는 과정에 큰 손실을 입을지도 모릅니다."
 giga_flavor_systems.1104.a:0 "벙커로 들어가라!"
 pcc_rogue_ai_army:0 "독자적 AI 살인로봇"
 pcc_rogue_ai_army_desc:0 "행성 컴퓨팅 단지에서 모든 비승인된 개체를 제거하기 위해 만들어진 굶주린 살인로봇입니다."
 giga_flavor_systems.1105.name:0 "독자적 AI가 우리의 식민지를 침략하다"
 giga_flavor_systems.1105.desc:0 "§Y[FROMFROM.GetName]§!의 독자적 AI가 성공적으로 행성의 지상군을 격퇴했으며 행성의 거대한 테이터 뱅크 내의 수많은 곳에 스스로를 복구하는 과정에 있습니다.\n\n개척자들이 남아있는 살인로봇을 쫓아버리긴 했지만, 우리의 기반 시설 상당수가 파괴되었고 대부분의 사람이 싸우는 도중 쓰러졌습니다."
 giga_flavor_systems.1105.a:0 "빌어먹을 AI!"
 gpm_core_is_dead:0 "이 행성의 핵은 완전히 죽었습니다. 다시 불타오르게 하기 위해 할 수 있는 것은 없습니다."
 pc_m_star_nebula:0 "비전의 별"
 pc_m_star_nebula_desc:0 "어떻게든 주변 성계를 밝힐 만큼 충분한 열을 발생시킬 수 있는 작은 항성입니다. 내부에서 에너지를 생성하는 과정은 알려져 있지 않습니다."
 giga_blokkat.5010.butwhy:0 "너희들의 수확 활동의 목적이 무엇이지?"
 giga_blokkat.5010.butwhy.response:0 "우주의 에너지 밀도에 대한 연구를 반복한 결과, 99.9997% 확실하게 모든 물질과 에너지는 궁극적으로 무한을 향해 점점 더 빠르게 멀어진다는 것이 밝혀졌습니다. 여러분의 은하에서는 §Y열죽음§!이라고 하는 것 같군요.\n\n우리는 이러한 결과가 우리의 장기 생존 전략에 부적절하며 부적합하다고 여깁니다.\n\n따라서 블록의회는 §Y열죽음§!을 멈추고 역행시킬 뿐만 아니라, 귀중한 에너지가 우주적 사건의 지평선 너머로 빠져나가지 못하게 하기 위해 현존하는 모든 고립 에너지를 단일 구조물로 합치기로 결정했습니다.\n\n대다수의 문명은 이 목표가 달성되기 훨씬 전에 자연 소멸될 것으로 예측되므로, 여러분들이 은하를 떠나 멸종하기까지 일상 활동을 하는데에 문제는 없다고 생각합니다."
 giga_blokkat.5010.coexist:0 "공존할 수는 없나? 너희에게 에너지를 줄 수 있다!"
 giga_blokkat.5010.coexist.response:0 "여러분 종족이 무슨 거래를 하려고 하든, 결국 그냥 에너지를 수확하는 것 만 못할 거에요.\n\n우리의 활동이 불편하다면, 은하를 떠나셔도 좋습니다."
 giga_blokkat.5010.nogalaxytravel:0 "우리는 은하간 여행 기술이 없다. 떠날 수 없다."
 giga_blokkat.5010.nogalaxytravel.response:0 "유감이군요."
 giga_blokkat.5010.xenophile:0 "정말... 매력적인 생명체로군요!"
 giga_blokkat.5010.xenophile.response:0 "여러분도 그러합니다. 여러분의 문명과 종족에 대한 데이터가 기록되고 보관되어, 여러분의 멸종 이후 영원히 보존될 것입니다."
 giga_blokkat.5010.spiritualist:0 "당신들은 영혼 없는 껍데기일 뿐입니다!"
 giga_blokkat.5010.spiritualist.response:0 "사실상 틀렸습니다. 추정을 하는 것은 여러분의 생존에 불리하게 작용합니다."
 giga_blokkat.5010.authoritarian:0 "우리의 은하에서 떠나세요."
 giga_blokkat.5010.authoritarian.response:0 "여러분 종족은 이 은하의 가시적 물질 일부만을 사용하고 있으며, 이는 다시 은하의 전체 질량-에너지의 일부일 뿐입니다. 따라서 이 은하에 대한 여러분의 소유권 주장은 수학적으로 말이 안됩니다, §Y[ROOT.GetSpeciesNamePlural]§!분들."
 giga_blokkat.5010.egalitarian:0 "당신들의 행동은 지성체 그 자체에 대한 범죄입니다!"
 giga_blokkat.5010.egalitarian.response:0 "확인했습니다."
 giga_blokkat.5010.materialist:0 "여러분이 가진 우주의 지식은 실로 방대할 것입니다."
 giga_blokkat.5010.materialist.response:0 "지식은 생존의 열쇠입니다. 따라서 은하 해체 구역의 거주자들과 특성에 관한 모든 데이터를 세심하게 분류하기 위한 철저한 노력이 이어지고 있습니다. 여기도 마찬가지입니다."
 giga_blokkat.5010.xenophobe:0 "너희 블록캣들은 역겨운 쓰레기들이다!"
 giga_blokkat.5010.xenophobe.response:0 "그런 말을 한 존재는 처음인 것 같군요, §Y[ROOT.GetSpeciesNamePlural]§!."
 giga_blokkat.5010.militarist:0 "우리는 끝까지 싸울 것입니다."
 giga_blokkat.5010.militarist.response:0 "이상한 행동이군요. 그냥 은하에서 떠나는 것이 장기적으로 보았을 때 훨씬 더 효율적일 것입니다."
 giga_blokkat.5010.pacifist:0 "평화롭게 있을 수는 없습니까?"
 giga_blokkat.5010.pacifist.response:0 "이전에도 말씀드렸듯이, 원한다면 은하에서 떠나도 됩니다. 우리의 함선들에게는 은하 해체 구역에서 떠나는 비무장 개척선을 공격하지 말라고 지시했습니다."
 giga_blokkat.5010.fanaticpurifier:0 "우주에서 너희들을 없애버리겠다!"
 giga_blokkat.5010.fanaticpurifier.response:0 "여러분의 위협은 기록 번호 #945305입니다."
 giga_blokkat.5010.determinedexterminator:0 "평가: 절멸"
 giga_blokkat.5010.determinedexterminator.response:0 "은하를 정복한 문명 중 에너지의 수집보다 다른 개체의 절멸을 더 중요하게 생각한 문명은 결국에 멸망합니다. 우선 순위의 문제이지요."
 giga_blokkat.5010.devouringswarm:0 "음식이군. 다른 것들과 똑같다."
 giga_blokkat.5010.devouringswarm.response:0 "경고! 바리온 개체인 블록캣을 집어 삼키면 엄청난 질량차이로 인해 즉시 흡수될 것입니다."
 giga_blokkat.5010.psionics:0 "여러분의 심광은... 압도적이군요. 어떻게 이럴 수가."
 giga_blokkat.5010.psionics.response:0 "다른 존재들과 마찬가지로, 장막은 그저 또다른 에너지원일 뿐입니다. 우리는 계산력과 전반적인 능력을 강화하기 위해 가공된 사이오닉 힘의 패턴을 우리의 의식에 끼워넣었습니다."
 giga_blokkat.5010.grandbunny:0 "이제 우리에게는 그랜드버니가 있습니다. 어떠신지?"
 giga_blokkat.5010.grandbunny.response:0 "§R완전한 얼간이군.§!\n\n§R그들은 우리를 속였다.§!\n\n§R너희 또한 속을거야.§!"
 already_monitoring_blokkats:0 "블록캣 연구 기관이 이미 열려있습니다."
 edict_giga_blokkat_bureau_edict:0 "§G블록캣 연구 기관§! 열기"
 edict_giga_blokkat_bureau_edict_desc:0 "§G블록캣 연구 기관§!을 통해 §G블록캣 지식§!을 확인하고 블록캣 관련 작전을 관리하십시오."
 giga_tech_defense_nexus_capacity_1:0 "거대해진 격납고 시설"
 giga_tech_defense_nexus_capacity_1_desc:0 "우리의 행성 방위 연결체의 시설을 개선하는 것은 거대 구조물의 뼈대 안에 더 많은 초계함을 수용할 수 있게 해줍니다."
 allow_defense_nexus_capacity_1:0 "타격 초계함 수용량: §G+30%§!"
 giga_tech_defense_nexus_production_1:0 "간결한 행성 함선 조립"
 giga_tech_defense_nexus_production_1_desc:0 "타격 초계함 조립 공정에서의 세밀한 개선을 통해, 최종 조립 속도에서 상당한 결과를 얻어 생산 속도를 높일 수 있습니다."
 allow_defense_nexus_production_1:0 "매월 타격 초계함: §G+30%§!"
 giga_tech_defense_nexus_damage_1:0 "향상된 타격 초계함 탑재량"
 giga_tech_defense_nexus_damage_1_desc:0 "FTL 드라이브가 없기 때문에, 타격 초계함은 일반적인 형제 함선에 비해 더 무겁고 강력한 무기를 실을 수 있습니다. 이 장점을 이용하면 끊임 없이 강력해지는 우주 함대에 맞설 수 있을 것입니다."
 allow_defense_nexus_damage_1:0 "타격 초계함 피해량: §G+40%§!\n타격 초계함 내구도: §G+25%§!"
 giga_tech_defense_nexus_capacity_2:0 "다층 격납고 체계"
 giga_tech_defense_nexus_capacity_2_desc:0 "격납고 구조에 대한 계속된 발전으로 우리는 같은 부피 내에 훨씬 더 많은 타격 초계함을 수용할 수 있습니다."
 allow_defense_nexus_capacity_2:0 "타격 초계함 수용량: §G+40%§!"
 giga_tech_defense_nexus_damage_2:0 "타격 초계함 상향"
 giga_tech_defense_nexus_damage_2_desc:0 "격납고 최적화에 대한 엄청난 개선으로, 우리는 우리의 타격 초계함을 전보다 훨씬 더 크게 만들 수 있습니다."
 allow_defense_nexus_damage_2:0 "타격 초계함 피해량: §G+60%§!\n타격 초계함 내구도: §G+60%§!"
 giga_tech_defense_nexus_production_2:0 "타격 초계함 자가조립"
 giga_tech_defense_nexus_production_2_desc:0 "우리는 해당 함선들이 사실상 스스로 건조되게끔 하여 우리의 행성 방위 연결체가 함선을 조립하는 속도를 더욱 높일 수 있습니다."
 allow_defense_nexus_production_2:0 "매월 타격 초계함: §G+50%§!"
 giga_tech_repeatable_defense_nexus_capacity_upgrade:0 "다차원 격납고"
 giga_tech_repeatable_defense_nexus_capacity_upgrade_desc:0 "다차원 공학에 대한 새로운 통찰력을 통해, 우리는 훨씬 더 작은 부피 안에 훨씬 더 많은 타격 초계함을 수용할 수 있습니다."
 increases_defense_nexus_capacity:0 "타격 초계함 수용량: §G+15%§!"
 giga_megaview_defense_nexus_dismantle_button:0 "§R거대 구조물 해체§!"
 giga_megaview_defense_nexus_dismantle_no:0 "이미 §Y행성 방위 연결체§!를 해체하고 있습니다."
 giga_megaview_defense_nexus_dismantle_tooltip:0 "더이상 이 §Y행성 방위 연결체§!가 쓸모가 없다면, 이를 해체하거나 §Y행성 기지창§!으로 다운그레이드할 수 있습니다."
 giga_mega.7008.name:0 "[root.GetName] 행성 방위 연결체 해체 중"
 giga_mega.7008.desc:0 "더이상 이 §Y행성 방위 연결체§!가 쓸모가 없다면, 이를 해체하거나 §Y행성 기지창§!으로 다운그레이드할 수 있습니다.\n\n이는 건설에 사용된 합금 일부를 되돌려 줄 것입니다."
 giga_mega.7008.a:0 "§Y행성 기지창§!으로 다운그레이드."
 giga_mega.7008.b:0 "완전히 해체해라."
 giga_mega.7008.c:0 "아무것도 아니다."
 giga_megaview_defense_nexus_cant_deploy:0 "방위 소함대를 전개할 수 없습니다. 쿨다운 중이 아니어야 하며 행성이 공격당하거나 점령되어선 안됩니다."
 giga_megaview_defense_nexus_deploy_tooltip:0 "지금 눌러서 §Y타격 초계함§! §G전개§!"
 giga_megaview_defense_nexus_deploy_now_button:0 "§G초계함 전개§!"
 building_defense_nexus_capacity:0 "보조 격납고"
 building_defense_nexus_capacity_desc:0 "적대 함선에세 행성이 위협받을 때 배치되는 §Y타격 초계함§!을 수용하는 거대한 격납고입니다."
 building_defense_nexus_capacity_effect_desc:0 "§Y타격 초계함 수용량§! §Y15§! 증가."
 building_defense_nexus_construction:0 "행성 조선소"
 building_defense_nexus_construction_desc:0 "이 거대한 조선소는 §Y행성 방위 연결체§!의 건조 활동을 보조하며, 매월 더 많은 §Y타격 초계함§!을 건조할 수 있게 해줍니다."
 building_defense_nexus_construction_effect_desc:0 "매월 생산되는 §Y타격 초계함§!의 수 §Y3§! 증가."
 name_planetshipyard:0 "행성 기지창"
 requires_nothing_in_orbit:0 "궤도에 이미 §Y궤도 아콜로지§! 혹은 §Y행성 기지창§!이 있습니다."
 planetary_drive_yard_0:0 "$gc_mega$행성 기지창 건설 현장"
 planetary_drive_yard_0_DESC:0 "행성의 적도를 도는 건조 시설을 위한 건설 현장입니다. 구조물의 거대한 정박지는 성계의 항성 기지의 효율성을 증가시키고 함대 수용력과 군인 직업을 제공합니다."
 planetary_drive_yard_0_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_megastructure$ - $giga_list_category_ship_production$ §H(조선소 3)§! - $giga_list_category_military$\n§Y조선소 슬롯§! 및 §Y함대 수용력§!을 주며, 그 항성 기지에게 §Y건조 속도 +15%§!를 줍니다.\n$giga_list_category_requires_starbase_uplink$\n§L행성에 군사 보너스를 주는 궤도 건조 시설입니다."
 planetary_drive_yard_0_CONSTRUCTION_INFO_DELAYED:0 "$giga_list_additional_data$ - 행성의 §Y궤도 슬롯§!을 차지하기 때문에, §Y궤도 아콜로지§!와 겹쳐질 수 없습니다. 후에 §Y함선 건조§!에 초점이 맞추어진 §Y행성 드라이브 조선소§!나 행성을 보호하기 위해 자동적으로 §Y타격 초계함§!을 건조하고 배치하는 §Y행성 방위 연결체§!로 업그레이드할 수 있습니다.\n\n이러한 거대 구조물들은 최대 §Y20§!개 까지 §Y항성 기지§!에 영향을 줄 수 있습니다"
 planetary_drive_yard_1:0 "행성 기지창"
 planetary_drive_yard_1_DESC:0 "완전히 기능하는 건조 시설들이 설치된 작동 상태의 행성 기지창으로, 함대 수용력, 군인 직업 그리고 행성을 궤도 폭격으로부터 약간 보호해줍니다.\n\n성계의 항성 기지에 3개의 조선소와 건조 속도 +15%를 제공합니다."
 planetary_drive_yard_modifier_gestalt:0 "행성 기지창"
 planetary_drive_yard_modifier_gestalt_desc:0 "이 행성 위의 행성 기지창은 그 거주민들에게 군사 직업과 궤도 폭격으로부터의 보호를 제공합니다."
 planetary_drive_yard_fortress_modifier_gestalt:0 "행성 방위 연결체"
 planetary_drive_yard_fortress_modifier_gestalt_desc:0 "이 행성 위의 행성 방위 연결체는 그 거주민들에게 충분한 군사 직업과 궤도 폭격으로부터 광범위한 보호를 제공합니다."
 planetary_drive_yard_modifier:0 "행성 기지창"
 planetary_drive_yard_modifier_desc:0 "이 행성 위의 행성 기지창은 그 거주민들에게 군사 직업과 궤도 폭격으로부터의 보호를 제공합니다."
 planetary_drive_yard_fortress_modifier:0 "행성 방위 연결체"
 planetary_drive_yard_fortress_modifier_desc:0 "이 행성 위의 행성 방위 연결체는 그 거주민들에게 충분한 군사 직업과 궤도 폭격으로부터 광범위한 보호를 제공합니다."
 corvette_defense_squadron:0 "[event_target:planet_deploying_ships.GetName] 방어 편대"
 mauler_defense_squadron:0 "[event_target:planet_deploying_ships.GetName] 방어 함대"
 sm_planetary_drive_yard_uplink:0 "행성 기지창 업링크"
 sm_planetary_drive_yard_uplink_desc:0 "이 항성 기지를 성계 내의 모든 §Y행성 기지창§!과 연결합니다. 최대 §Y20§!개의 행성 기지창 효과가 중복됩니다.\n건조 비용 감소의 최대치는 §Y-30%§!입니다."
 already_have_pd_uplink:0 "이미 행성 기지창 업링크가 있습니다."
 giga_tech_planetary_drive_yard:0 "행성 건조 시설"
 giga_tech_planetary_drive_yard_desc:0 "함선을 조립하는데 성계의 항성 기지에 완전히 집중하기 보다는, 우리 행성 주위에 거대한 궤도-건설 조선소를 건설하여 우리의 건조 시설을 분산시키는 것은 우리의 군수 건조 단지의 효율을 급격하게 증가시킬 수 있습니다."
 allow_planetary_drive_yard:0 "§H거대 구조물 잠금 해제§!: 행성 조선소"
 desc_planetary_drive_yard:0 "행성 기지창은 행성의 적도를 감싸는 거대한 고리입니다. 항성 기지에 §Y함대 수용력§!과 §Y조선소§!를 제공하며 그 행성에 §Y군인 직업§! 과 §Y궤도 폭격§!으로부터의 보호를 제공합니다.§Y궤도 아콜로지§!와 함께 건설할 수 없습니다."
 giga_tech_planetary_drive_yard_defense:0 "행성 타격대"
 giga_tech_planetary_drive_yard_defense_desc:0 "우리의 주력 전투함대가 제국의 다른 구석에 있더라도 우리의 행성은 방어되어야 합니다. 행성 기지창을 진정한 궤도 요새로 개조하고 자체 방어 함대를 배치하는 것으로 우리 행성을 적대 침공으로부터 항상 보호할 수 있을 것입니다."
 giga_tech_planetary_drive_yard_shipyard:0 "향상된 행성 조선소"
 giga_tech_planetary_drive_yard_shipyard_desc:0 "우리의 분산 행성 기지창에 확장된 시설과 같은 추가적인 업그레이드를 하는 것은 장기적으로 우리의 건조 능력을 더욱 향상시켜줄 것입니다."
 allow_planetary_drive_yard_shipyard:0 "§H거대 구조물 잠금 해제§!: 행성 드라이브 조선소"
 desc_planetary_drive_yard_shipyard:0 "§Y행성 기지창§!에서 업그레이드 된 §Y행성 드라이브 조선소§!는 거대 구조물이 제공하는 조선소 및 건조 속도 보너스가 두 배가 되며, 성계의 항성 기지에서 건조되는 함선의 비용을 줄여줍니다. 또한 무역 가치 수집 범위가 향상됩니다."
 allow_planetary_drive_yard_defense:0 "§H거대 구조물 잠금 해제§!: 행성 방위 연결체"
 desc_planetary_drive_yard_defense:0 "§Y행성 기지창§!에서 업그레이드 된 §Y행성 방위 연결체§!는 거대 구조물을 건조 특화에서 행성 방위 특화로 바꿉니다. 가장 중요한 것은 고유 군대인 §Y타격 초계함§!의 자동 생산과 유지 능력입니다. 적대 함대가 너무 가까이 다가오면 자동으로 함선이 전개될 것입니다."
 giga_dialog.13400.name:0 "행성 기지창 건설 현장 완공!"
 giga_dialog.13400.desc:0 "행성 기지창의 건설 현장이 §Y[giga_planet.GetName]§!의 궤도에서 완성되었습니다.\n\n이 궤도 플랫폼은 §Y[giga_planet.GetName]§!(을)를 둘러싼 건조 시설 및 정박지를 가지는 고리를 조립할 기지로 사용될 것입니다.\n\n건설되면, 항성 기지에 조선소 §Y3§!개와 함선 건조 속도 §Y+20%§!를 제공하며, 함대 수용력 §Y40§! 및 전체 함대 수용력 §Y+2.5%§! 또한 제공합니다. 게다가, §Y[giga_planet.GetName]§!(은)는 팝 §Y20§! 당 §Y1 군인 직업§!을 얻으며 궤도 폭격 피해량이 §Y-33%§!가 됩니다.\n\n그 이득을 보기 위해서는 항성 기지에 §Y업링크 건물§!을 건설해야 하며, 한 성계 내에서 최대 §Y20§!개의 행성 기지창이 연결될 수 있습니다."
 giga_dialog.13400.a:0 "좋아."
 giga_dialog.13401.name:0 "행성 기지창 완성!"
 giga_dialog.13401.desc:0 "§Y[giga_planet.GetName]§! 주위에 행성 기지창이 완성되었습니다.\n\n광대한 조선소와 수많은 정박지 그리고 도킹 기지들이 있으며, 이는 성계의 항성 기지가 그 조선소 내에서 여러 대의 전함을 동시에 건설할 수 있게 해주어 항성 기지의 성능을 매우 향상시킬 것입니다.\n\n이 구조물의 완성으로 §Y[giga_planet.GetName]§!의 거주자들에게 수많은 군인 직업과 궤도 폭격으로부터의 보호를 제공할 것이므로, 이곳은 우리 제국에서 가장 중요한 군사 행성 중 한 곳으로 여겨질 것입니다.\n\n그 이득을 보기 위해서는 항성 기지에 §Y업링크 건물§!을 건설해야 하며, 한 성계 내에서 최대 §Y20§!개의 행성 기지창이 연결될 수 있습니다"
 giga_dialog.13401.a:0 "좋았어!"
 giga_dialog.13402.name:0 "행성 방위 연결체 작동중"
 giga_dialog.13402.desc:0 "§Y[giga_system.GetName]§! 행성 기지창이 가동되는 §Y행성 방위 연결체§!로 업그레이드 되었습니다.\n\n광대한 격납고와 전함 도크가 갖추어진 방위 연결체는 §Y[giga_planet.GetName]§!의 인구수에 따라 일정한 수의 §Y타격 초계함§!을 자동적으로 생산할 수 있습니다.\n\n이 §Y타격 초계함§!은 적 함대가 §Y[giga_planet.GetName]§!에 접근하면 전개될 것이며 자동적으로 성계 내의 모든 적대 함대와 교전한 뒤, 더 이상의 위협이 없으면 §Y[giga_planet.GetName]§!에 복귀합니다.\n\n§Y타격 초계함§!은 §Y함선 설계§!의 §Y초계함§! 설계를(따라서 새로운 함선 급을 설계할 필요가 없습니다.) 사용할 것이지만, 더 많은 화력을 지니고 FTL 드라이브가 없을 것입니다.\n\n우리는 §Y행성 방위 연결체§!를 선택하여, 현재 구조물이 얼마나 많은 §Y타격 초계함§!을 수용 중인지 볼 수 있고 언제 전개될지 설정할 수 있습니다.\n\n또한, 그 행성에 팝 §Y10§! 마다 강력한 §Y행성 수호자§!를 하나 생성하며, 지상 침공 시에 행성의 안전을 보장합니다."
 giga_dialog.13402.a:0 "환상적이야."
 giga_dialog.13404.name:0 "행성 드라이브 조선소 작동중"
 giga_dialog.13404.desc:0 "행성 기지창이 §Y행성 드라이브 조선소§!로 업그레이드 되었습니다.\n\n함선 생산에 더욱 집중하여, §Y[giga_system.GetName]§! 성계 항성 기지에 §Y두 배§!의 조선소와 건조 속도 보너스를 제공합니다.\n\n또한, 항성 기지에서 건조되는 함선의 비용을 §Y7.5%§! 줄여주며, 최대 §Y30%§!까지 가능합니다. 드라이브 조선소는 성계 내로 흘러 들어오는 무역 가치 수집을 도와줄 것이며, 항성 기지의 §Y무역 가치 수집 범위§!를 §Y2%§! 증가시켜 줍니다.\n\n이미 업링크가 존재한다면 새로운 업링크 건물을 건설할 필요는 없습니다."
 giga_dialog.13404.a:0 "아주 좋아."
 planetary_drive_yard_1_shipyard:0 "행성 드라이브 조선소"
 planetary_drive_yard_1_shipyard_DESC:0 "업그레이드된 버전의 행성 기지창으로, 건조 시설에 더욱 초점을 맞추었습니다. 거대 구조물에 의한 조선소, 함대 수용력 그리고 함선 건조 속도가 두배가 되며, 성계의 항성 기지에서 건조되는 함선의 비용을 7.5% (최대 30%) 줄여주며 무역 가치 수집 범위를 2 늘려줍니다."
 planetary_drive_yard_1_fortress:0 "행성 방위 연결체"
 planetary_drive_yard_1_fortress_DESC:0 "행성 방위에 초점을 맞춘 업그레이드된 버전의 행성 기지창입니다. 지휘 한계치를 늘려주고, 행성을 궤도 폭격으로부터 보호하며 적대 함대를 향해 수많은 §Y타격 초계함§!을 자동 전개하는 능력이 있습니다."
 giga_defense_nexus_text_no:0 ""
 defense_nexus_title:0 "타격 초계함 개수: §Y[planet.giga_nexus_ship_count]§!/§Y[planet.giga_nexus_ship_count_max]§!"
 defense_nexus_title_deployed:0 "§G타격 초계함 전개됨§!"
 defense_nexus_max_count:0 "최대: §Y[planet.giga_nexus_ship_count_max]§!"
 defense_nexus_monthly_count:0 "월간 생산량: §Y[planet.giga_nexus_ship_count_monthly]§!"
 giga_megaview_defense_nexus_deploy_system_yes:0 "초계함 배치: §G시스템§!\n\n§Y행성 방어 넥서스§!는 적 함대가 시스템에 진입할 때마다 §Y초계함§!을 발사합니다.\n\n$giga_megaview_defense_nexus_cycle$"
 giga_megaview_defense_nexus_deploy_bombard_yes:0 "초계함 배치: §Y폭격§!\n\n§Y행성 방어 넥서스§!는 적 함대가 §Y[planet.GetName]§!를 폭격할 때마다 §Y초계함§!을 발사합니다.\n\n$giga_megaview_defense_nexus_cycle$"
 giga_megaview_defense_nexus_deploy_never_yes:0 "초계함 배치: §R절대§!\n\n§Y행성 방어 넥서스§!는 §R초계함§!을 배치하지 §Y않습니다§!.\n\n$giga_megaview_defense_nexus_cycle$"
 defense_nexus_cant_deploy:0 "§R행성이 공격당하고 있거나 점령되었습니다. 타격 초계함을 전개할 수 없습니다.§!"
 giga_megaview_defense_nexus_cycle:0 "§G클릭하여 행동을 전환합니다.§!"
 giga_strike_corvette:0 "타격 초계함"
 giga_strike_corvette_plural:0 "타격 초계함"
 GIGA_STRIKE_CORVETTE_MISSILE:0 "어뢰 기체"
 GIGA_STRIKE_CORVETTE_SMALL:0 "무리 기체"
 GIGA_STRIKE_CORVETTE_MEDIUM:0 "라인 기체"
 GIGA_STRIKE_CORVETTE_LARGE:0 "포격 기체"
 REACTOR_STRIKE_CORVETTE:0 "타격 초계함 반응로"
 REACTOR_STRIKE_CORVETTE_DESC:0 "FTL 체계가 없기 때문에 타격 초계함은 동력을 최대화할 수 있습니다."
 COMBAT_COMPUTER_STRIKE_CORVETTE:0 "타격 초계함 행동 패턴"
 COMBAT_COMPUTER_STRIKE_CORVETTE_DESC:0 "타격 초계함은 멀리서부터 적을 포착하여, 다가오는 적 함대를 혼란에 빠뜨리기 위해 빠르고 강력한 공격으로 교전합니다."
 THRUSTER_STRIKE_CORVETTE:0 "타격 초계함 추진기"
 THRUSTER_STRIKE_CORVETTE_DESC:0 "타격 초계함은 접근 중인 적대 군대를 가로막기 위해서 엄청난 속도와 기동성이 필요합니다."
 giga_dialog.13403.name:0 "행성 방위 연결체 메커니즘"
 giga_megaview_defense_nexus_explain_tooltip:0 "눌러서 §Y행성 방위 연결체§!의 메커니즘을 표시하세요."
 defense_nexus_explanation_text:0 "방위 연결체는 행성을 지키기 위해 §Y타격 초계함§! 자동화 함대를 이용합니다.\n\n매월 자신만의 §Y타격 초계함§!을 건조하고 수용할 것입니다.\n기본 최대 수용량은 행성의 인구의 §Y3분의 1§!이며 다양한 방법으로 늘릴 수 있습니다.\n\n매월 §Y2척§!씩 건조되며, 팝 §Y20§!마다 추가적인 초계함 §Y1척§!을 매월 생산합니다. 최대 수용량과 마찬가지로, 건조 속도 또한 다양한 방법으로 높일 수 있습니다.\n\n그러나 행성이 적대 군대에 의해 §R침공 상태§!이거나 §R점령§! 당했다면, 타격 초계함을 전개할 수 없습니다.\n\n§Y타격 초계함§!은 §YFTL§!이 없지만 향상된 §Y기동성§!과 §Y화력§!을 가진 일반적인 §Y초계함§!입니다. 따라서 우리는 새로운 함선 급을 설계할 필요가 §R없습니다.§! 방위 소함대는 §Y함선 설계§!에서 존재하는 모든 §Y초계함§! 설계로부터 무작위로 선택될 것입니다.\n\n이 함선들은 적대 함선이 거대 구조물에 접근하면 자동적으로 전개되며, 우리는 거대 구조물의 UI에 있는 설정 버튼으로 언제 §Y타격 초계함§!이 전개될 지 설정할 수 있습니다.\n\n위협이 제거되면, 방위 소함대는 자동적으로 §Y방위 연결체§!로 복귀합니다. 함대가 다시 전개 가능하기까지 §Y3개월§!의 쿨타임이 있습니다.\n\n또한 거대 구조물은 행성에 거주하는 팝 §Y10§! 마다 행성에 §Y행성 수호자§! 군대를 하나 생성할 것입니다."
 giga_dialog.13403.a:0 "승인한다."
 giga_megaview_defense_nexus_explain_tooltip_no:0 "이 창은 이미 열려있습니다."
 giga_megaview_defense_nexus_explain_button:0 "§H메커니즘 보기§!"
 giga_defense_nexus_army:0 "행성 수호자"
 giga_defense_nexus_army_desc:0 "방위 연결체 내에 주둔하는 군대는 행성의 안전을 보장하는 일을 합니다."
 NAME_nexus_army:0 "행성 수호자"
 giga_celestial_printing_planet_disabled:0 "£menu_disabled£베히모스 요새 행성 제조기\n베히모스 조립 시설 및 그 관련 장치로 베히모스 요새 행성을 \"찍어\"낼 수 있을지 없을지의 여부입니다. 이것과 전쟁 위성 복사를 비활성화하면 §Y천체 전함 건조§! 승격 특전이 제거됩니다."
 giga_celestial_printing_planet_enabled:0 "£menu_enabled£베히모스 요새 행성 제조기\n베히모스 조립 시설 및 그 관련 장치로 베히모스 요새 행성을 \"찍어\"낼 수 있을지 없을지의 여부입니다. 이것과 전쟁 위성 복사를 비활성화하면 §Y천체 전함 건조§! 승격 특전이 제거됩니다."
 giga_tech_planet_assembly:0 "행성-규모 조립 프로토콜"
 giga_tech_planet_assembly_desc:0 "위성 대형-제작의 거대한 확장 방식으로 고작 전쟁 위성이 아니라 베히모스 요새 행성 전체를 제작할 수 있게 되었습니다. 터무니없게 들릴지도 모르지만, 사전에 충분한 행성 물질을 얻었다면 가능할지도 모릅니다."
 allow_planet_assembly:0 "§H거대 구조물 잠금해체:§! 베히모스 조립 시설"
 allow_planet_assembly_desc:0 "행성 물질과 합금을 제작된 거대 행성선으로 변환하는 업그레이드된 형태의 달 거대 제조기입니다. 이 구조물은 작동하기 위해 £giga_sr_bulk_matter£ §H$giga_sr_bulk_matter$§!가 필요하며, 이는 §Y$giga_tech_planetary_matter_harvesting$§! 기술에 의해 부여된 결정을 사용하여 획득할 수 있습니다."
 planetcraft_printer_0:0 "$gc_giga$베히모스 조립 시설 건설 현장"
 planetcraft_printer_0_DESC:0 "미가공된 행성 물질과 합금을 이용해 베히모스 요새 행성을 제작할 수 있는 거대한 건조소의 건설 현장입니다."
 planetcraft_printer_0_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_gigastructure$ - $giga_list_category_celestial_warship$\n£giga_sr_bulk_matter£ §H$giga_sr_bulk_matter$§! 및 £alloys£ §YAlloys§!를 사용하여 §Y거대 행성 제작기§!를 처음부터 제작합니다.\n§L문자 그대로 달의 매크로 제조기의 업그레이드 버전인 이 강력한 기계는 완전한 거대 행성 제작기를 조립할 수 있습니다.§!\" #gigalistentry BEHEMOTH ASSEMBLY PLANT"
 planetcraft_printer_0_real:0 "$planetcraft_printer_0$"
 planetcraft_printer_0_real_DESC:0 "$planetcraft_printer_0_DESC$"
 planetcraft_printer_1:0 "베히모스 조립 시설 지원 시설"
 planetcraft_printer_1_DESC:0 "초기 지원 시설 구조물로, 베히모스 조립 시설이 작동하는데 필요한 매우 중요한 기반 시설이 있습니다."
 planetcraft_printer_1_fake:0 "$planetcraft_printer_1$"
 planetcraft_printer_1_fake_DESC:0 "$planetcraft_printer_1_DESC$"
 planetcraft_printer_2:0 "베히모스 조립 시설 안정 장치"
 planetcraft_printer_2_DESC:0 "이 거대한 두 개의 고리는 미완 상태의 베히모스 요새 행성을 안정화하고 행성 물질이 바로바로 공급될 수 있게끔 합니다."
 planetcraft_printer_2_fake:0 "$planetcraft_printer_2$"
 planetcraft_printer_2_fake_DESC:0 "$planetcraft_printer_2_DESC$"
 planetcraft_printer_3:0 "베히모스 조립 시설"
 planetcraft_printer_3_DESC:0 "완성된 베히모스 조립 시설입니다. 두 개의 거대한 물질 조립기 덕분에, 이 경이로운 장치는 막대한 양의 미가공 행성 물질을 재구축하여 작동하는 베히모스 요새 행성을 만듭니다."
 planetcraft_printer_3_fake:0 "$planetcraft_printer_3$"
 planetcraft_printer_3_fake_DESC:0 "$planetcraft_printer_3_DESC$"
 planetcraft_printer_ready:0 "$planetcraft_printer_3$"
 planetcraft_printer_ready_DESC:0 "$planetcraft_printer_3_DESC$"
 planetcraft_printer_make_planet:0 "제작형 베히모스 요새 행성"
 planetcraft_printer_make_planet_DESC:0 "작동하는 제작형 베히모스 요새 행성은 일반적인 요새 행성과 비교했을 때, §G15%§!의 추가 §Y선체 내구도§!와 §Y장갑 내구도§!, §Y보호막 내구도§! 뿐만 아니라 §G10%§!의 추가적인 §Y함선 발사 속도§!를 가지고 있습니다."
 planetcraft_printer_make_planet_fake:0 "$planetcraft_printer_make_planet$"
 planetcraft_printer_make_planet_fake_DESC:0 "$planetcraft_printer_make_planet_DESC$"
 giga_printer.2010.name:0 "베히모스 조립 시설 건설 현장 완성!"
 giga_printer.2010.desc:0 "§Y[giga_system.GetName]§! 성계에서 §Y베히모스 대형-제작기§!의 건설 현장이 완성되었습니다. 이 궤도 플랫폼은 베히모스 요새 행성을 제작할 수 있는 거대한 조립소를 조립할 발판이자 창고의 기능을 할 것입니다.\n\n작은 버전과 비슷하게, 이 경이로운 구조물은 대량의 행성 물질을 빠르게 받아 재구축해 천체 전함을 제작할 것입니다. 초차원 보관소나 지능있는 나노봇과 같은 야심찬 공학 기술의 조합 덕분입니다.\n\n제작형 베히모스 요새 행성은 일반적인 요새 행성에 비해 건설은 더 오래 걸릴 것이고 비용은 약간 더 나가지만, 향상된 방어 및 공격 능력의 이점을 얻을 것입니다."
 giga_printer.2010.a:0 "멋지군."
 giga_printer.2011.name:0 "베히모스 조립 시설 지지대 완성!"
 giga_printer.2011.desc:0 "§Y[giga_system.GetName]§! 성계의 §Y베히모스 조립 시설§!의 완성에 한 걸음 더 가까워졌습니다.\n\n구조물의 첫번째 초기 지원 장치가 조립되었고 그렇게 크지 않습니다. 그럼에도 이곳에는 이 엄청난 거대 구조물을 관리하는데 필요한 중요 통제 시설의 대부분이 있습니다.\n\n실제 조립기에 대한 작업을 시작해야 합니다."
 giga_printer.2011.a:0 "훌륭해."
 giga_printer.2012.name:0 "베히모스 조립 시설 안정 장치 완성!"
 giga_printer.2012.desc:0 "§Y[giga_system.GetName]§! 성계의 §Y베히모스 조립 시설§! 완공에 꾸준히 다가가고 있습니다.\n\n구조물 양쪽에 있는 두 개의 거대한 고리형 구조물로, 이는 미완상태의 베히모스 요새 행성을 안정화하고 공급되는 모든 행성 물질을 필요한 곳에 정확히 배분할 것입니다. 또한 이곳에는 구조물의 인력 대부분과 구조물의 전체적인 성능 향상을 위한 다양한 장치들이 있습니다."
 giga_printer.2012.a:0 "정말 좋군!"
 giga_printer.2013.name:0 "베히모스 조립 시설 완성!"
 giga_printer.2013.desc:0 "마침내 §Y거대 조립 공장§!이 §Y[giga_system.GetName]§! 시스템에서 완공되었습니다! 이 인상적인 기술의 경이로움은 달 거대 제조기와 마찬가지로 방대한 양의 원시 행성 물질과 합금을 신속하게 재배치하여 완전 기능을 갖춘 거대 행성선으로 변환할 수 있습니다.\n\n이 행성선들은 물론 "자연"적인 것들보다 더 강력하지만, 거대 조립 공장은 적절한 후보를 찾는 것에 대한 걱정 없이 조립할 수 있게 해줄 것입니다. 다만, 시간이 더 걸리고 전반적으로 더 비쌀 가능성이 있습니다.\n\n거대 행성선의 건설은 필요한 자원이 준비되는 대로 메가구조물을 업그레이드하여 시작할 수 있습니다. 그러나 우리는 결정 사용을 통해 지구형 행성에서 $giga_sr_bulk_matter$ §H£giga_sr_bulk_matter£§!를 수확해야 할 것입니다."
 giga_printer.2013.a:0 "멋지군!"
 giga_printer.2000.name:0 "베히모스 요새 행성 제작 완료!"
 giga_printer.2000.desc:0 "§Y[planet_printer_location.GetName]§! 위의 거대 조립 공장에서 완전 기능을 갖춘 §YBehemoth Planetcraft§!를 원자재 §H$giga_sr_bulk_matter$§!와 대량의 합금으로 성공적으로 조립했다고 보고합니다!\n\n우리의 설계에 따라 건설된 이 거대한 천체 전투함은 길이가 만 킬로미터를 넘으며, 이후 메가구조물에서 분리되어 이제 우리의 초공간 함대의 선두를 이끌 준비가 되어 있습니다.\n\n충분한 행성 물질과 합금이 있다면 즉시 또 다른 하나의 건설을 시작할 수 있습니다."
 giga_printer.2000.a:0 "웅장하군!"
 giga_printer.2000.a.tooltip:0 "§Y베히모스 요새 행성§!이 우리 함대에 추가되었습니다.\n제작되었기에, §G15%§!의 추가 §Y선체 내구도§!와 §Y장갑 내구도§!, §Y보호막 내구도§! 뿐만 아니라 §G10%§!의 추가적인 §Y함선 발사 속도§!를 가지고 있습니다."
 giga_katzen.8021.name:0 "[ROOT.GetName](이)가 플러션을 솔라키아 공화국에게 반환하다!"
 giga_katzen.8021.desc:0 "오늘 §Y[ROOT.GetName]§!(은)는 플러션에 대한 모든 통제권을 §Y솔라키아 공화국§!에게 반환하였습니다.\n\n솔라키아 대통령인 §Y도푸스 테크닉 마키나§!는 §Y카이저§!에 대한 §Y[ROOT.GetName]§!의 도움에 감사하고 플러션의 외세 점령의 진정한 끝을 축하하는 진심어린 연설을 했습니다.\n\n도푸스는 플러션의 모든 종족을 포함하고 캇첸아르티히 제국의 반복을 피하기 위해, 그리고 행성에 대한 신망을 더 잘 나타내기 위해 §Y솔라키아 공화국§!을 §Y연합 플러션 국가§!로 쇄신하겠다고 선언했습니다.\n\n카이저의 격동의 정복 시기와 [flusion_conqueror.GetName]에 의한 최종적인 함락까지, 플러션은 힘든 시절을 보냈지만, 수십년 만에 처음으로 마침내 플러션은 자유가 되었습니다."
 giga_katzen.8021.a:0 "도푸스에게 건배!"
 resolution_category_aeternum_focus:0 "에테르눔 관련"
 giga_aaa_requires_friends:0 "$TRIGGER_FAIL$적어도 2 이상의 은하 공동체 멤버가 필요합니다."
 resolution_cooperative_intel_gathering:0 "협력적인 정보 수집"
 resolution_cooperative_intel_gathering_desc:0 "만약 [global_event_country.GetGalCommunityOrGalImperium](이)가 그들의 과학적 노력을 모으고자 한다면, 우리는 $aeternum_tech_intel$를 얻어 은하계 전체에 걸쳐 공유할 수 있을 것입니다."
 resolution_cooperative_intel_gathering_success:0 "이 결의안을 통과시키면 §Y5년§!간 은하의 모든 이들에게 $aeternum_tech_intel$를 §G3§! 제공합니다.\n\n5년 동안, 우리는 프로그램을 유지하기 위해 매월 £energy£ §Y150§!을 소비해야 합니다."
 aeternum_research_cooperative:0 "에테르나이트 연구 협력"
 aeternum_research_cooperative_desc:0 "[global_event_country.GetGalCommunityOrGalImperium](이)가 $aeternum_tech_intel$를 얻기 위해 공동협력에 나섰습니다."
 galcom_gigas_threatened_aeternum:0 "에테르눔에게 위협당함"
 galcom_gigas_not_threatened_aeternum:0 "에테르눔에게 위협당하지 않음"
 galcom_gigas_already_fighting_aeternum:0 "이미 에테르눔과 전쟁중임"
 galcom_gigas_running_out_of_time:0 "유명한 속담처럼, 기회가 왔을 때 공격하고 싶어합니다."
 giga_aeternum.8000.name:0 "협력적인 정보 수집"
 giga_aeternum.8000.desc:0 "[global_event_country.GetGalCommunityOrGalImperium](은)는 §Y에테르나이트§!에 초점을 맞춘 협력 연구 프로그램을 수립하기로 결정했습니다.\n\n회원국은 그들의 과학적 노력을 모아 에테르눔에 대해 연구하여 고대의 선구자 문명에 대한 귀중한 데이터를 얻을 것입니다.\n\n연구 프로그램은 §Y5년§!간 지속되리가 예쌍되며 잘된다면 $aeternum_tech_intel$를 §G3§! 얻을 것이고 추가적인 §Y에테르눔에 대한 피해량§! §Y15%§!를 얻을 것입니다.\n\n프로그램을 유지하기 위해 우리는 매월 £energy£ §Y150§!을 소비해야하며 다른 연구 프로그램에서 자원을 전용할 것입니다."
 giga_aeternum.8000.a:0 "낭비할 시간이 없다."
 giga_aeternum.8001.name:0 "에테르나이트 연구 협력 결과"
 giga_aeternum.8001.desc:0 "[global_event_country.GetGalCommunityOrGalImperium](이)가 그들의 에테르나이트 연구 협력을 완료했습니다.\n\n에테르나이트를 연구하고자 하는 거대한 국제적 노력이 모든 회원국에게 $aeternum_tech_intel$를 §G3§! 주었고, 회원국의 §Y에테르나이트에 대한 피해량§!이 §Y15%§! 증가되었습니다."
 giga_aeternum.8001.a:0 "좋아."
 giga_aeternum.8001.a.tooltip:0 "$aeternum_tech_intel$를 §G3§! 얻었습니다.\n\n[global_event_country.GetGalCommunityOrGalImperium]의 모든 다른 회원국은 추가적인 §Y에테르나이트에 대한 피해량§! §Y15%§!를 얻습니다.\n\n"
 resolution_anti_aeternite_league:0 "반-에테르나이트 동맹 수립"
 resolution_anti_aeternite_league_desc:0 "에테르눔의 위협은 최근 역사상 은하가 마주했던 그 어떠한 것과도 다릅니다. [global_event_country.GetGalCommunityOrGalImperium]의 국가들은 그들의 차이점은 던져버리고 에테르나이트 위협에 맞설 동맹을 수립해야합니다."
 resolution_anti_aeternite_league_success:0 "이는 [global_event_country.GetGalCommunityOrGalImperium]의 모든 회원국으로 구성된 범은하적 연합인 §Y반-에테르나이트 동맹§!으로 이어질 것입니다.\n\n회워국들은 최소 §Y25§!년간 동맹 상태에 있을 것을 맹새할 것이며 에테르나이트가 패배하면 끝날 것입니다.\n\n존재하는 모든 연합은 §R해체§!될 것입니다. 만약 신성 캇첸 제국이 있다면 신성 캇첸 제국은 해체되지 않습니다."
 galactic_focus_crisis_aeternum:0 "$TRIGGER_FAIL$에테르눔 격파"
 galactic_focus_crisis_aeternum_desc:0 "에테르눔은 은하에게 엄청난 위협입니다. 이 선구자들이 무시무시하게 진보된 전쟁 함선으로 우리를 압도하기 전에 무찔러야 합니다."
 giga_aeternum.8011.name:0 "[global_event_country.GetGalCommunityOrGalImperium]의 반-에테르나이트 동맹 수립"
 giga_aeternum.8011.desc:0 "§L\"은하 원로원의 결의에 따라, [global_event_country.anti_aeternite_alliance_formed_date] 현재로, [global_event_country.GetGalCommunityOrGalImperium]의 국가는, 적어도 일시적으로는, 그들의 차이점을 버리고 [giga_aeternite_league_leader.GetName]의 지도 하에 공식적인 반-에테르나이트 동맹을 수립할 것을 맹세합니다. 따라서 이 범은하적 동맹의 유일한 목적은 잠재적인 에테르나이트 팽창주의를 억제하는 것이며, 에테르나이트와의 전쟁이 현실이 되었을 때 모든 회원국은 무기를 들고 에테르나이트의 맹공격으로부터 우리의 은하를 지킬 것입니다.\"§!\n\n국가간 협력의 비상한 위업으로, [global_event_country.GetGalCommunityOrGalImperium](은)는 오늘 에테르나이트의 위협에 맞서 은하를 수호하기 위해, §Y[giga_aeternite_league_leader.GetName]§!의 지도 하에 초국가적 연합인, §Y반-에테르나이트 동맹§!의 탄생을 선언했습니다.\n\n에테르눔에게 승리한다면, 동맹을 해체되고 그 구성국들은 일반적인 활동으로 돌아갈 것입니다.\n\n[global_event_country.GetGalCommunityOrGalImperium]의 외교관들은 에테르눔의 무반응에 두려워하고 기대하고 있습니다. 에테르눔의 외교적 무반응에 대해, 우리는 그들의 지도층이 동맹의 탄생을 알고나 있는지조차 확실하지 않습니다."
 giga_aeternum.8011.a:0 "우리는 연합하여 맞서리라!"
 giga_aeternum.8011.a.tooltip:0 "§Y반-에테르나이트 동맹§!이 형성되었습니다.\n\n[global_event_country.GetGalCommunityOrGalImperium](을)를 떠나는 국가는 자동적으로 동맹을 떠날 것이며, 함께하는 국가는 자동적으로 동맹에 가입될 것입니다.\n\n§Y아이온디아§!가 함락된다면 끝날 것입니다.\n\n그러나 너무 많은 제국을 동맹 하나로 강요하는 것은 우리의 내부 및 외부적 정책에 부정적인 결과를 가져올 수 있습니다.\n\n"
 opinion_put_differences_aside_aeternum:0 "에테르눔에 맞서 단결하다"
 must_have_formed_anti_aeternum_league:0 "$TRIGGER_FAIL$반영영원 동맹이 결성되어야 합니다."
 giga_must_have_formed_empire:0 "$TRIGGER_FAIL$은하 제국이 선포되었어야 합니다."
 neighbors_aeternum:0 "교체"
 not_neighbors_aeternum:0 "교체하지 않음"
 resolution_invite_fe_to_anti_aeternite_league:0 "반-에테르나이트 동맹에 선구자 제국 초대하기"
 resolution_invite_fe_to_anti_aeternite_league_desc:0 "은하의 선구자 문명들은 더 어린 종족들에게 그리 협력적이지는 않았습니다. 하지만 에테르눔의 위협은 전에 없던 것입니다. 에테르눔은 사실상 \"몰락한 몰락한 제국\"이며 강력한 선구자들조차도 에테르나이트의 위협을 느끼리라 짐작할 수 있습니다. 논리적으로 생각해보면, 최소한 이 고대 문명들을 초대하고 그들을 우리의 동맹에 가입시키는 것이 옳습니다."
 resolution_invite_fe_to_anti_aeternite_league_success:0 "우리는 은하의 모든 §Y몰락한 제국§!과 §Y각성한 제국§!을 §Y반-에테르나이트 연맹§!에 초대할 것입니다.\n\n그들의 윤리관과 현재 상황에 따라, 받아들일 수도 있고 거절할 수도 있습니다."
 giga_aeternum.8021.name:0 "[global_event_country.GetGalCommunityOrGalImperium](이)가 반-에테르나이트 동맹에 선구자를 초대하다"
 giga_aeternum.8021.desc:0 "은하 원로원이 오늘 우리 은하 내의 모든 §Y몰락한 제국§!과 §Y각성한 제국§!을 대상으로 한 초대의 기안에 동의했습니다.\n\n[global_event_country.GetGalCommunityOrGalImperium]의 가장 유능한 외교관이 작성한 이 초대장은 §Y에테르눔§! 위협의 규모와 능력에 대한 광범위한 정보를 포함하며, 이를 통해 은하의 선구자가 우리와 협력하고 §Y반-에테르나이트 동맹§!에 가입하도록 설득할 것입니다.\n\n그들이 이를 받아들일 실제 확률은 알 수 없지만, 원로원은 에테르눔이 얼마나 위험한지에 대한 철저한 설명이 광범위한 자료에 의해 뒷받침되고 선구자들에 대한 건전한 존경심이 덧붙여진다면, 그들을 우리 편으로 끌어들이기에 충분할 것이라고 확신합니다."
 giga_aeternum.8021.a:0 "이제 어떻게 될지 보지..."
 giga_aeternum.8021.a.tooltip:0 "§Y반-에테르나이트 동맹§!으로의 §Y초대장§!이 수 개월에 걸쳐 §Y몰락한 제국§!과 §Y각성한 제국§!에게 보내질 것입니다."
 giga_aeternum.8022.name:0 "§Y[precursor_invited_to_aaa.GetName]§!(이)가 초대를 수락하다!"
 giga_aeternum.8022.desc:0 "이례적일 정도의 겸손과 실익주의를 통해, 고대 국가인 §Y[precursor_invited_to_aaa.GetName]§!(이)가 정식으로 [global_event_country.GetGalCommunityOrGalImperium] 전체와 동맹을 맺겠다 동의했습니다. 따라서 §Y[precursor_invited_to_aaa.GetSpeciesNamePlural]§!의 §Y반-에테르나이트 동맹§!에 공식적으로 가입되었습니다.\n\n그러나 이 건은 에테르눔의 엄청난 위협에 대한 예외적인 긴급 승인임을 명확히 했습니다.\n\n그들의 협력적인 태도가 일시적일지도 모르지만, 이는 분명 에테르눔에 대한 우리의 투쟁에 큰 도움이 될 것입니다."
 giga_aeternum.8022.a:0 "멋지군! 점점 더 균형이 맞아 가는군."
 giga_aeternum.8022.a.tooltip:0 "§Y[precursor_invited_to_aaa.GetName]§!(이)가 §Y반-에테르나이트 동맹§!에 가입했습니다!"
 giga_aeternum.8023.name:0 "§Y[precursor_invited_to_aaa.GetName]§!(이)가 초대를 거절하다"
 giga_aeternum.8023.desc:0 "안타깝게도, 고대의 국가 §Y[precursor_invited_to_aaa.GetName]§!(은)는 §Y반-에테르나이트 동맹§!에 대한 초대를 거절했고, \"[precursor_invited_to_aaa.GetSpeciesNamePlural](은)는 스스로를 보호하는데 옥신각신하는 종족들의 도움은 필요하지 않다\"라고 주장했으며 에테르눔의 능력에 대한 측정이 상당히 부정확하다는 이유를 댔습니다.\n\n우리는 [precursor_invited_to_aaa.GetAdjective]의 도움 없이 싸워야하겠지만, 그들 또한 에테르눔이 그들의 국경을 돌파했을 때 우리의 도움을 기대할 수 없을 것입니다."
 giga_aeternum.8023.a:0 "안타깝군. 그 늙어빠진 멍청이들이 스스로의 몰락을 부르는군."
 giga_aeternum.8023.a.tooltip:0 "§Y[precursor_invited_to_aaa.GetName]§!(이)가 §Y반-에테르나이트 동맹§!의 초대를 거절했습니다."
 anti_aeternite_league_emergency:0 "에테르나이트 비상사태"
 anti_aeternite_league_emergency_desc:0 "에테르눔에 맞서 우리의 땅을 지키려면 은하가 힘을 합쳐야합니다. 하지만 너무 많은 국가를 하나의 동맹에 강요하는 것에는 그 결과가 따를 것입니다."
 resolution_pre_emptive_aeternum_war:0 "에테르눔에 대한 선제 공격 개시"
 resolution_pre_emptive_aeternum_war_desc:0 "에테르눔이 각성을 끝마치게둘 수 없습니다. 에테르눔이 준비가 되기 전에 공세를 펼치면, 은하 백만 년 이래 최대의 전쟁에서 우위를 거둘 수 있습니다."
 resolution_pre_emptive_aeternum_war_success:0 "§Y반-에테르나이트 동맹§!이 에테르눔에게 §R전쟁 선포§!를 합니다.\n\n에테르눔에게 직접 전쟁을 선포하는 대신 선제 공격을 개시하면, 전쟁 선포 직후 §Y2년§!간 §Y반-에테르나이트 동맹§!의 모든 회원국이 §Y에테르눔에 대한 피해량§! §Y+30%§! 및 §Y함선 속도§! §Y+60%§!를 얻습니다.\n\n또한, 모든 비-플레이어 회원국은 자동적으로 그들의 연합 함대를 아이온디아를 향해 움직일 것입니다."
 resolution_pre_emptive_aeternum_war_empire:0 "에테르눔에 대한 선제 공격 개시"
 resolution_pre_emptive_aeternum_war_empire_desc:0 "에테르눔이 각성을 끝마치게둘 수 없습니다. 에테르눔이 준비가 되기 전에 공세를 펼치면, 은하 백만 년 이래 최대의 전쟁에서 우위를 거둘 수 있습니다."
 resolution_pre_emptive_aeternum_war_empire_success:0 "§Y[Root.GetGalEmpireName]§!(이)가 에테르눔에게 §R전쟁 선포§!를 합니다.\n\n에테르눔에게 직접 전쟁을 선포하는 대신 선제 공격을 개시하면, 전쟁 선포 직후 §Y2년§!간 §Y[Root.GetGalEmpireName]§!의 모든 회원국이 §Y에테르눔에 대한 피해량§! §Y+30%§! 및 §Y함선 속도§! §Y+60%§!를 얻습니다.\n\n또한, §Y[Root.GetGalEmpireName]§!의 모든 비-플레이어 회원국은 자동적으로 그들의 연합 함대를 아이온디아를 향해 움직일 것입니다."
 pre_emptive_aeternite_strike:0 "에테르눔에 대한 선제 공격"
 pre_emptive_aeternite_strike_desc:0 "은하 공동체가 에테르눔에 대한 전면적인 기습 공격을 개시했습니다. 기습 공격이라는 점을 활용해야합니다."
 giga_aeternum.8030.name:0 "은하 공동체가 에테르나이트 선제 공격을 개시하다!"
 giga_aeternum.8030.desc:0 "은하 원로원의 승인에 따라, §Y반-에테르나이트 동맹§!이 용기를 과시하며 §Y에테르눔§!에 대한 대공세를 선포했습니다.\n\n에테르눔의 각성이 완료되기 전에 공격한다는 목표에 따라, 기습 공격의 이점을 이용면서 현재 은하의 연합 함대가 선구자를 공격하기 위해 이동 중입니다.\n\n이 전쟁의 유이한 결과는 우리의 승리거나, 에테르눔에 의한 모든 은하 문명의 멸망입니다. 양 측이 거대한 함대와 무서우리만큼 강력한 무기를 집결시키고 있으며, 이는 분명 지난 백만 년 간 본 적 없던 수준의 싸움이 될 것입니다.\n\n동맹이 기술적 불리를 극복할까요, 아니면 에테르눔이 건반진 녀석들을 다 쓸어버릴까요? 어찌되었든, 이제 은하의 운명을 결정지을 전투가 시작되었습니다."
 giga_aeternum.8030.desc_empire:0 "[global_event_country.GetGalCouncilOrImpCouncil]의 승인에 따라, 은하 제국 황제는 자신의 용기를 과시하며 §Y에테르눔§!에 대한 대공세를 선포했습니다.\n\n에테르눔의 각성이 완료되기 전에 공격한다는 목표에 따라, 기습 공격의 이점을 이용면서 현재 은하의 연합 함대가 선구자를 공격하기 위해 이동 중입니다.\n\n이 전쟁의 유이한 결과는 우리의 승리거나, 에테르눔에 의한 모든 은하 문명의 멸망입니다. 양 측이 거대한 함대와 무서우리만큼 강력한 무기를 집결시키고 있으며, 이는 분명 지난 백만 년 간 본 적 없던 수준의 싸움이 될 것입니다.\n\n§Y[Root.GetGalEmpireName]§!(이)가 기술적 불리를 극복할까요, 아니면 에테르눔이 건방진 녀석들을 다 쓸어버릴까요? 어찌되었든, 이제 은하의 운명을 결정지을 전투가 시작되었습니다."
 giga_aeternum.8030.a:0 "당장 공격하라! 빠르게!"
 giga_aeternum.8030.a.tooltip:0 "§Y반-에테르나이트 동맹§!의 모든 회원국이 일시적인 보너스를 얻습니다. 비플레이어 회원국은 그들의 함대를 §Y아이온디아§!로 집중시킬 것입니다.\n\n"
 giga_aeternum.8030.b:0 "당장 공격하라! 빠르게!"
 giga_aeternum.8030.b.tooltip:0 "§Y[Root.GetGalEmpireName]§!의 모든 회원국이 일시적인 보너스를 얻습니다. 비플레이어 회원국은 그들의 함대를 §Y아이온디아§!로 집중시킬 것입니다.\n\n"
 giga_aeternum.4002.desc.preemptive:0 "이 은하의 존재들이여.\n\n에테르나이트가 은하계의 유일한 지배자라는 자리를 되찾을 때가 왔다.\n\n우리가 받아들일 유일한 평화는 너희들의 완전하고 무조건적인 파괴이다.\n\n너희의 \"동맹\"은 그저 너희의 몰락일 뿐이며, 이 터무니없는 전쟁 선포로 보아 너희가 스스로의 힘을 과대평가했음은 명확하다.\n\n우리의 무적함대가 한심한 너희의 자칭 연합을 은하에서 지워버릴 것이다."
 giga_aeternum.4002.a.preemptive:0 "너희 늙어빠진 멍청이들에게 우리의 힘을 보여주지."
 opinion_gave_flusion_back:0 "플러션을 반환함"
 giga_aeternum.8040.name:0 "반-에테르나이트 연맹 해체됨"
 giga_aeternum.8040.desc:0 "비록 엄청난 시련이었지만, 에테르눔은 결국 패배했습니다.\n\n그리하여, §Y반-에테르나이트 연맹§!으로 이어졌던 비상사태는 끝났습니다. 계획했던대로, 은하 원로원은 비상사태의 끝을, 그리고 이에 따라 초국가적 동맹의 해체를 선포했습니다.\n\n우리들을 하나로 묶었던 공동의 위협이 없어진 지금, 은하의 미래는 알 수 없습니다. 그러나 이 위대한 동맹은 우리들이 서로간의 차이를 무시하면 무엇을 할 수 있는지에 대한 명백한 증거입니다."
 giga_aeternum.8040.a:0 "그것의 목적을 달성했다."
 giga_aeternum.8040.a.tooltip:0 "§Y반-에테르나이트 연맹§!이 해체되었습니다."
 giga_aeternum.8041.name:0 "반-에테르나이트 연맹이 패배하다"
 giga_aeternum.8041.desc:0 "전투 때문인지 분열 때문인지 몰라도, §Y반-에테르나이트 연맹§!은 몰락했습니다.\n\n은하 공동체와 동맹의 생존 멤버들은 홀로 그들의 싸움을 계속합니다."
 giga_aeternum.8041.a:0 "연맹은 무너져버렸으나 싸움은 계속되리."
 giga_aeternum.8041.a.tooltip:0 "§Y반-에테르나이트 연맹§!은 더 이상 존재하지 않습니다."
 giga_aeternum.8042.name:0 "반-에테르나이트 연맹이 해산하다"
 giga_aeternum.8042.desc:0 "한때 분열되었던 은하 공동체가 §Y[Root.GetGalEmpireName]§!의 탄생을 위해 모였습니다.\n\n따라서 §Y반-에테르나이트 연맹§!은 과거의 유물이며 더 이상 필요하지 않습니다. 은하 황제는 자신의 감시 아래 동맹의 공식적인 종식과 오래된 군사적 노력의 중앙 집중화를 선언했습니다.\n\n비록 §YThe [Root.GetGalEmpireName]§!(이)가 §Y반-에테르나이트 연맹§!를 완전히 대체할 수 있을지는 두고 봐야 합니다. 하지만, 이 거대한 동맹은 거주자들이 그들의 차이를 제쳐두고 은하가 무엇을 성취할 수 있는지에 대한 증거로 영원히 설 수 있습니다."
 giga_aeternum.8042.a:0 "연맹은 끝낫다. 하지만 제국이 이 싸움을 이어갈 것이다."
 giga_aeternum.8042.a.tooltip:0 "$giga_aeternum.8040.a.tooltip$"
 giga_flusion_serious:0 "플러션 초상화: §Y스텔라리스§!\n플러션 캐릭터의 모든 초상화로 일반 스텔라리스 초상화가 사용됩니다."
 giga_flusion_silly:0 "플러션 초상화: §G로어에 맞게§!\n§Y도푸스 테크닉 마키나§!, §Y더클로우 맥캐서§! 그리고 §Y아론 N. 블루§!가 \"로어에 맞는\" 초상화를 사용하며 이는 스텔라리스 스타일과 맞지 §R않을§! 것입니다. 그림 PNG나 Heroforge 초상화일 것이며, 100% 몰입되는 게임을 하고 싶으면 사용하지 §R마세요.§!"
 giga_flusion_silly_cattail:0 "플러션 초상화: §B로어에 맞게 + 캇테일 카이저§!\n§Y도푸스 테크닉 마키나§!, §Y더클로우 맥캐서§! 그리고 §Y아론 N. 블루§!가 \"로어에 맞는\" 초상화를 사용하며 이는 스텔라리스 스타일과 맞지 §R않을§! 것입니다. 또한, §Y카이저 캇테일§!이 위대한 식물 VS 좀비 캇테일의 옛 모습을 가지게 될 것입니다. 그림 PNG나 Heroforge 초상화일 것이며, 100% 몰입되는 게임을 하고 싶으면 사용하지 §R마세요.§!"
 giga_yggdrasil.110.name:0 "위그드라실 환각제"
 giga_yggdrasil.110.desc:0 "§Y[giga_event_planet.GetName] 위그드라실 난초§!에서 재배되는 대기 식물성 플랑크톤에 대한 최근의 생분석에서, 기이한 현상이 드러났습니다.\n\n한 돌연변이가 상당한 수의 생물 공학으로 만들어진 부유 식물로 퍼져나가, 그 식물을 §Y[ROOT.GetSpeciesNamePlural]§!에 의해 섭취되었을 시에 강력하고 일반적으로 기분 좋은 부작용을 나타내는 잠재적인 환각제로 만들었습니다.\n\n당연하게도, 난초의 직원이 이 특이한 작물로 무엇을 할 수 있는지에 대한 의문을 제기했습니다. 우리는 돌연변이가 퍼지게 놔두고 우리 사람들이 즐길 수 있도록 제국 전체로 실어 나르거나, 아니면 난초 전체에 퍼지기 전에 이를 억제하고 변이했을지도 모르는 모든 작물을 파괴할 수 있습니다."
 giga_yggdrasil.110.a:0 "사용을 엄격하게 제한하여 유통해라."
 giga_yggdrasil.110.a.tooltip:0 "에너지를 소모해 환각제의 부정적인 영향을 제거합니다.\n\n우리가 §Y평등주의§!적이라면 이는 불안정을 유발할 것입니다.\n\n"
 giga_yggdrasil.110.b:0 "원한다면 누구라도 사용할 수 있도록 해라."
 giga_yggdrasil.110.b.tooltip:0 "많은 부정적인 효과가 있지만 환각제의 영향을 향상시킵니다.\n\n우리가 §Y권위주의§!적이라면 이는 불안정을 유발할 것입니다.\n\n"
 giga_yggdrasil.110.c:0 "팔아라!"
 giga_yggdrasil.110.c.tooltip:0 "환각제의 영향과 난초의 식량 생산량을 줄이지만 §Y무역 가치§!를 생산할 것입니다.\n\n"
 giga_yggdrasil.110.e:0 "팔아라!"
 giga_yggdrasil.110.e.tooltip:0 "환각제의 영향과 난초의 식량 생산량을 줄이지만 상당한 양의 §Y무역 가치§!를 생산할 것입니다.\n\n"
 giga_yggdrasil.110.d:0 "돌연변이와 이전에 심었던 작물을 파괴해라."
 giga_yggdrasil.110.d.tooltip:0 "다시는 이것에 대해 듣지 않도록 자원을 사용합니다."
 yggdrasil_drugs_restricted:0 "위그드라실 환각제 제한됨"
 yggdrasil_drugs_restricted_desc:0 "환각제를 통제하는 것은 높은 비용이 들지만 부정적인 효과가 나타나지 않을 것입니다."
 yggdrasil_drugs_free:0 "위그드라실 환각제 자유 유통"
 yggdrasil_drugs_free_desc:0 "모든 사람들이 환각제를 사용하면 약간의 부작용은 있지만 사람들은 더 행복해집니다."
 yggdrasil_drugs_sold:0 "위그드라실 환각제 판매"
 yggdrasil_drugs_sold_desc:0 "위그드라실 난초의 환각제를 국영 판매하여 상당한 이익을 얻고 있습니다."
 yggdrasil_drugs_sold_megacorp:0 "위그드라실 환각제 판매"
 yggdrasil_drugs_sold_megacorp_desc:0 "위그드라실 난초의 환각제를 국영 판매하여 상당한 이익을 얻고 있습니다."
 yggdrasil_drugs_displeased:0 "위그드라실 환각제 불안증세"
 yggdrasil_drugs_displeased_desc:0 "위그드라실 환각제에 대한 우리의 운용이 불안정도를 유발하고 있습니다."
 giga_yggdrasil.120.name:0 "[yggdrasil_food_beggar_country.GetName]"
 giga_yggdrasil.120.desc:0 "반갑습니다, [ROOT.GetName]. 여러분의 §Y위그드라실 난초§!는 진정 공학의 기적이며, 그것의 식량 생산량은 우리가 생산했던 모든 것을 작아보이게 하는군요.\n\n그리하여, [yggdrasil_food_beggar_country.GetName]의 국민, 저희의 국민을 먹이는데 여러분의 위그드라실 난초의 식량 생산의 도움을 얻고자 하여 부탁드립니다. 관대하게 허락해주신다면, 나중에 반드시 보답드리겠습니다."
 giga_yggdrasil.120.a:0 "물론이지! 몇 년간 식량 일부를 보내 줄 것이다."
 giga_yggdrasil.120.a.tooltip:0 "[yggdrasil_food_beggar_country.GetName](은)는 앞으로 우리의 외교적 노력을 더욱 지지할 것입니다.\n\n"
 giga_yggdrasil.120.b:0 "어쩌면, 하지만 대가를 지불해야한다."
 giga_yggdrasil.120.c:0 "말도 안되는 요구로군. 논외다."
 yggdrasil_food_share_donator:0 "위그드라실 생산량  제공 중"
 yggdrasil_food_share_donator_desc:0 "우리는 다른 제국에게 우리의 식량 생산량 일부를 제공 중입니다."
 yggdrasil_food_share_recipient:0 "위그드라실 생산량 받는 중"
 yggdrasil_food_share_recipient_desc:0 "다른 제국이 관대하게도 우리에게 어느 정도의 식량을 주고 있습니다."
 opinion_yggdrasil_gave_food:0 "위그드라실 식량 공유에 동의함"
 opinion_yggdrasil_gave_food_paid:0 "위그드라실 식량에 대가를 요구함"
 opinion_yggdrasil_denied_food:0 "위그드라실 식량 공유를 거부함"
 giga_yggdrasil.130.name:0 "위그드라실 난초 폭풍"
 giga_yggdrasil.130.desc:0 "우리의 발전된 날씨 조작 체계에도 불구하고, §Y[giga_event_planet.GetName] 위그드라실 난초§! 내에서 거대한 폭풍이 생겨나 구조물의 공중 식물 상당수와 대기 시설의 상당부를 파괴했습니다.\n\n불행하게도, 난초의 날씨 조작기가 소멸시켜버리기 전에, 폭풍이 거대 가스 행성에 상당한 피해를 주었습니다.\n\n이는 거대 구조물의 식량 생산량에 큰 영향을 줄 것이며, 현재 난초의 직원이 난초의 생산량을 최대한 빠르게 정상 수준으로 되돌려놓기 위해 재정 및 물자 지원을 요청하고 있습니다."
 giga_yggdrasil.130.a:0 "필요한 것을 모두 제공해라. | £energy£ §Y10000§! & £alloys£ §Y5000§! & £food£ §Y2500§!"
 giga_yggdrasil.130.a.tooltip:0 "§Y[giga_event_planet.GetName] 위그드라실 난초§!가 §Y2년§!간 §Y50%§! 적은 §Y식량§!을 생산할 것입니다.\n\n"
 giga_yggdrasil.130.b:0 "감당할 수 없군, 그들이 알아서 해나가야 한다."
 giga_yggdrasil.130.b.tooltip:0 "§Y[giga_event_planet.GetName] 위그드라실 난초§!가 §Y7.5년§!간 §Y50%§! 적은 §Y식량§!을 생산할 것입니다."
 giga_yggdrasil.140.name:0 "굶주린 위그드라실 부유 미생물"
 giga_yggdrasil.140.desc:0 "§Y[giga_event_planet.GetName] 위그드라실 난초§!가 경작중인 거대 가스 행성의 구름에서 뜻밖의 생명체가 진화했다고 보고했습니다.\n\n거의 현미경으로만 보이는 크기의 메뚜기같은 생명체가 거대 가스 행성의 부유 미생물 사육장에서 발달했습니다. 불행한 점은, 이 생명체의 유일한 식량은 그 부유 미생물이며, 보통 우리는 대량의 식량을 생산하기 위해 부유 미생물을 가공한다는 것입니다.\n\n이는 당연하게도 난초의 직원에게 매우 큰 걱정이 되었습니다. 아무런 조치도 취해지지 않는다면, 이 생명체들은 심지어 생명체를 제거하기 위해 직접적으로 사람을 동원하더라도, 거대 구조물의 생산량이 수년 간 현저하게 감소될 것입니다."
 giga_yggdrasil.140.a:0 "생산량을 희생하더라도 싹 다 없애버려라."
 giga_yggdrasil.140.a.tooltip:0 "§Y[giga_event_planet.GetName] 위그드라실 난초§!가 §Y2년§!간 §Y80%§! 적은 §Y식량§!을 생산하고 에너지 유지비가 §Y2배§!가 될 것입니다. 하지만 메뚜기들은 완전히 제거될 것입니다."
 giga_yggdrasil.140.b:0 "직접 골라내어 개체 수를 줄이는 것을 도와라."
 giga_yggdrasil.140.b.tooltip:0 "§Y[giga_event_planet.GetName] 위그드라실 난초§!가 §Y5년§!간 §Y35%§! 적은 §Y식량§!을 생산할 것입니다."
 giga_yggdrasil.140.c:0 "이 놀라운 생명체와 그것이 어떻게 진화했는지에 대해 연구해라!"
 giga_yggdrasil.140.c.tooltip:0 "§Y[giga_event_planet.GetName] 위그드라실 난초§!가 영구적으로 §Y50%§! 적은 §Y식량§!을 생산하지만 연구 생산량은 §Y50%§! §Y증가§!할 것입니다."
 giga_yggdrasil.141.name:0 "위그드라실 메뚜기 제거됨"
 giga_yggdrasil.141.desc:0 "광범위한 구제 작업 덕분에, §Y위그드라실 난초 단지§!를 괴롭히던 부유 매뚜기가 제거되었습니다.\n\n생산량과 유지비가 정상 수준으로 돌아왔습니다."
 giga_yggdrasil.141.a:0 "아주 좋아."
 giga_yggdrasil.142.name:0 "위그드라실 메뚜기 멸종"
 giga_yggdrasil.142.desc:0 "오랫동안 골라내기 작업을 한 결과, §Y위그드라실 난초 단지§!를 괴롭히던 부유 매뚜기가 제거되었습니다.\n\n생산량과 유지비가 정상 수준으로 돌아왔습니다."
 giga_yggdrasil.142.a:0 "좋아."
 resolution_denounce_ezic_warcrimes:0 "에지카니아 제국에 대한 캇첸의 침략 비난"
 resolution_denounce_ezic_warcrimes_desc:0 "캇첸이 에지카니아의 고향을 침략한 것은 용서받을 수 없는 냉혈한 침략입니다. 우리는 반드시 카이저의 잔인한 군국주의를 은하에 널리 알려야합니다."
 resolution_denounce_ezic_warcrimes_success:0 "이는 §Y에지카니아 레지스탕스§!를 2만큼 증가시킬 것입니다.\n\n앞으로의 §Y에지카니아 기사단§! 혁명이 §Y10%§!더 강력해집니다.\n\n[global_event_country.GetGalCommunityOrGalImperium]의 모든 이에 대한 §Y카이저의 우호도§!가 §Y1§!만큼 §R감소§!할 것입니다."
 resolution_public_recognition_of_solakia:0 "솔라키아 공화국에 대한 은하적 인정"
 resolution_public_recognition_of_solakia_desc:0 "솔라키아 공화국은 많은 플러션 국가 중 하나로, 카이저의 겉잡을 수 없는 군국주의의 물결에 휩쓸린 피해자입니다. 솔라키아 공화국을 그들의 과거 영토에 대한 정당한 정부로 인정하고 캇첸의 점령을 인정할 수 없다고 선언하면, 솔라키아의 게릴라 활동울 도울 수 있을 것입니다."
 resolution_public_recognition_of_solakia_success:0 "이는 §Y캣타운§!과 §Y캇첸 헤르츠란츠§!를 제외한 모든 곳의 §Y게릴라 활동§!이 §Y1§!만큼, 그리고 §Y솔라키아§!에서는 §Y2§!만큼 높아질 것입니다.\n\n§Y영향력 행사§! 결정을 사용하면 저항 자원을 §Y1§!만큼이 아닌 §Y2§!만큼을 제공할 것입니다.\n\n[global_event_country.GetGalCommunityOrGalImperium]의 모든 이에 대한 §Y카이저의 우호도§!가 §Y1§!만큼 §R감소§!할 것입니다."
 resolution_public_recognition_of_laurandar:0 "라우란다르에 대한 국제적 지원"
 resolution_public_recognition_of_laurandar_desc:0 "라우란다르는 플러션의 초대륙 앞바다의 섬나라였습니다. 사람이 상당히 많았으며, 많은 이들이 생각하는 것과 달리 평평하지 않습니다. 라우나이스는 카이저의 무기와 맞먹거나 심지어는 이를 뛰어넘는, 위험할만큼 강력한 무기를 가지고 있었습니다. 하지만 안타깝게도 라우나이스 정부가 불안정하여 캇첸군에 저항하지 못했습니다.\n\n카이저는 라우란다르를 선동의 주요 거점으로 사용했습니다. 따라사 라우나이스 반군을 공식적으로 지지하고 그들의 독립을 인정하고 지원하는 것으로, 라우나이스가 솔라키아 자유 전사와 연대해 캇첸의 선동 기계를 파괴하는 것을 도울 수 있습니다. 캇첸군은 우리의 지원 덕분에 보강된 라우나이스 레지스탕스 또한 해결해야했기 때문에, 이는 캇첸 무장군 조직에 상당한 영향을 줄 것입니다."
 resolution_public_recognition_of_laurandar_success:0 "§Y라우란다르§!와 §Y게슈볼른§!에서의 §Y게릴라 활동§!이 §Y1§!만큼 높아질 것입니다.\n\n[global_event_country.GetGalCommunityOrGalImperium]의 모든 이에 대한 §Y카이저의 우호도§!가 §Y2§!만큼 §R감소§!할 것입니다.\n\n캇첸의 창고를 습격하면 두 배의 §B저항 자원§!을 줄 것입니다.\n\n캇첸 지상군의 능력치를 §R감소§!시킬 것입니다."
 giga_katzen.8004.name:0 "[global_event_country.GetGalCommunityOrGalImperium](이)가 §Y라우란다르§!를 지지하다"
 giga_katzen.8004.desc:0 "§L\"은하 원로원의 결의에 따라, [global_event_country.laurandar_recognised_date] 현재로,  [global_event_country.GetGalCommunityOrGalImperium](은)는 만장일치로 캇첸 점령에 맞서서 투항하는 라우란다르와 그 거주민들에 대한 지지를 선언합니다. 따라서 라우란다르의 국가는 자유로운 플러션 국가로 인정되어야 하며 관료주의적 장애물을 건너뛰기 위해 라우나이스에 대한 모든 지원은 임시적인 예외 대상입니다.\"§!\n\n[global_event_country.GetGalCommunityOrGalImperium]의 모든 자유 회원국은 공동 선언을 통해, §Y라우란다르§!에 대한 은하의 지원이 공식적으로 선언했으며, 그들의 독립을 인정하고 반군에 대한 광범위한 지원을 약속했습니다.\n\n이전 라우나이스 지도자인 §Y아론 N. 블루§!는 우리의 결정에 대해 찬성의 의사를 표했으며, 이내 자신의 대의를 지지해준 모든 국가의 정부 기관에게 라우나이스 장신구를 포함한 큰 선물을 보냈습니다.\n\n보고에 따르면, §Y카이저§!는 이 \"어이없는 결정\"에 대해 매우 화가났으며 \"명백히 잘못된 의도를 가진 터무니없는 [global_event_country.GetGalCommunityOrGalImperium](을)를 박살내고야 말겠다\" 라고 했습니다. 어떻게 됐든 그가 실제로 실행에 옮길지는 두고 봐야합니다."
 giga_katzen.8004.a:0 "아주 좋군."
 giga_katzen.8004.a.tooltip:0 "우리에 대한 §Y카이저의 우호도§!가 §Y2§!만큼 §R감소§!했습니다.\n\n§Y라우란다르§!와 §Y게슈볼른§!에서 §Y게릴라 활동§!이 §Y2§!만큼 증가합니다.\n\n캇첸의 창고를 습격하면 두 배의 §B저항 자원§!을 줄 것입니다.\n\n캇첸군의 능력치가 §R감소§!됩니다.\n\n"
 giga_katzen.8002.name:0 "[global_event_country.GetGalCommunityOrGalImperium](이)가 §Y솔라키아 공화국§!을 인정하다"
 giga_katzen.8002.desc:0 "§L\"은하 원로원의 결의에 따라, [global_event_country.solakia_recognised_date] 현재로, 솔라키아 공화국은 플러션의 솔라키아 땅과 솔라키아의 땅이라 선언된 모든 영토의 정당한 정부 기관이다. 그러므로 행성과 그 부속, 솔라키아에 대한 캇첸아르티히 제국의 점령은 야만적인 전쟁광의 불법적 행동이다.\"§!\n\n[global_event_country.GetGalCommunityOrGalImperium]의 모든 자유 회원국은 공동 선언을 통해, §Y솔라키아 공화국§!은 공식적으로 그들의 땅에 대한 합법적인 정부가 되었으며, 따라서 §Y캇첸아르티히 제국§!은 불법적 점령자입니다.\n\n보고에 따르면, §Y카이저§!는 이 \"너무도 뻔한 정치 공작\"에 대해 \"분노\"했지만, 그의 제국의 안정도에는 영향이 없으리라 장담했습니다."
 giga_katzen.8002.a:0 "훌륭해."
 giga_katzen.8002.a.tooltip:0 "우리에 대한 §Y카이저의 우호도§!가 §Y1§!만큼 §R감소§!했습니다.\n\n이는 §Y캣타운§!과 §Y캇첸 헤르츠란츠§!를 제외한 모든 곳의 §Y게릴라 활동§!이 §Y1§!만큼, 그리고 §Y솔라키아§!에서는 §Y2§!만큼 높아질 것입니다.\n\n§Y영향력 행사§! 결정을 사용하면 저항 자원을 §Y1§!만큼이 아닌 §Y2§!만큼을 제공할 것입니다."
 solakia_already_recognised:0 "솔라키아는 이미 인정되었습니다."
 ezics_already_denounced:0 "이미 에지카니아 제국에 대한 캇첸의 침략을 비난했습니다."
 laurandar_already_recognised:0 "라우란다르는 이미 지원받고 있습니다."
 resolution_anti_kaiser_crusade:0 "반-카이저 성전"
 resolution_anti_kaiser_crusade_desc:0 "우리의 준비가 끝났으므로, [global_event_country.GetGalCommunityOrGalImperium](이)가 카이저를 공격해 영원히 그의 광기를 끝낼 것입니다."
 resolution_anti_kaiser_crusade_effect_success:0 "§Y캇첸 종속국§!이나 §Y캇첸 동맹§!을 제외한 [global_event_country.GetGalCommunityOrGalImperium]의 모든 제국은 서로간의 정전에 조인하고 §Y캇첸아르티히 제국§!에 §R전쟁을 선포할 것입니다.§!\n\n§Y캇첸 종속국§!이나 §Y캇첸 동맹§!은 [global_event_country.GetGalCommunityOrGalImperium]에서 §R추방§!될 것입니다.\n\n§R전쟁이 시작되고 나면 카이저와의 평화협상은 불가능합니다.§!"
 galcom_mobilizes_against_kaiser:0 "반-캇첸 동원령"
 galcom_mobilizes_against_kaiser_desc:0 "[global_event_country.GetGalCommunityOrGalImperium](이)가 캇첸아르티히 제국과 싸우기 위해 동원령을 내렸습니다."
 giga_katzen.8001.name:0 "[global_event_country.GetGalCommunityOrGalImperium](이)가 카이저 캇테일에 전쟁을 선포하다"
 giga_katzen.8001.desc:0 "전례없는 은하적 협력과 함께, [global_event_country.GetGalCommunityOrGalImperium](은)는 군국주의 §Y캇첸아르티히 제국§!에 대해 전쟁을 선포했습니다.\n\n카이저에 동조하는 국가들은 공동체에서 추방되었고, 남아있는 모든 회원국은 이제 완전 동원령을 내렸고 캇첸의 군사 기계의 힘에 정면으로 맞붙을 준비가 되었습니다.\n\n카이저가 동시에 전 은하와의 싸움을 해낼 수 있을지는 시간만이 알 수 있을 것입니다. 하지만 [global_event_country.GetGalCommunityOrGalImperium](은)는 승리하리라고 자신합니다."
 giga_katzen.8001.a:0 "얼마나 버틸지 보자고..."
 giga_katzen.8001.a.tooltip:0 "카이저와의 평화협상은 §R불가능§!합니다."
 katzenartig_imperium_governor:0 "캇첸 총독"
 giga_katzen.8003.name:0 "[global_event_country.GetGalCommunityOrGalImperium](이)가 §Y에지카니아 제국§!에 대한 침략을 비난하다"
 giga_katzen.8003.desc:0 "§L\"은하 원로원의 결의에 따라, [global_event_country.ezics_denounced_date] 현재로, 캇첸의 침략과 뒤따른 에지카니아 땅의 약탈은 지성체에 대한 범죄로 여겨지며 에지카니아의 자결권에 대한 노골적인 침해이다.§!\n\n[global_event_country.GetGalCommunityOrGalImperium]의 모든 자유 회원국은 공동 선언을 통해, §Y에지카니아 제국§!에 대한 점령과 에지카니아 거주지의 파괴를 전쟁 범죄라 공식적으로 선언했고, 이에 플러션에 대한 카이저의 지배를 비난했습니다.\n\n§Y카이저§!는 이러한 비난이 \"완전히 무의미한\"이라 선언했고, 이를 \"플러션 정부의 합법성을 침해하려는 목적의 노골적인 거짓말\"이라 부르짖었습니다. 반면 §Y로우프 케레리스 혼스펠트§!는 자신의 대의에 대한 [global_event_country.GetGalCommunityOrGalImperium]의 지원에 찬성의 의사를 표했습니다."
 giga_katzen.8003.a:0 "훌륭해."
 giga_katzen.8003.a.tooltip:0 "우리에 대한 §Y카이저의 우호도§!가 §Y1§!만큼 §R감소§!했습니다.\n\n§Y에지카니아 레지스탕스§!가 §Y2§!만큼 증가합니다.\n\n§Y에지카니아 기사단§!의 미래의 혁명은 §Y캇첸아르티히 제국§!으로부터 §Y10%§! 더 많은 행성을 장악할 수 있을 것입니다."
 laurandar_lowers_armies:0 "혼란에 빠진 무장군"
 laurandar_lowers_armies_desc:0 "혼란에 빠진 무장군"
 must_have_mobilized_and_supported_flusion:0 "우리는 카이저에 맞서 동원령을 시행했어야 하며, 최소한 한 곳의 플러션 국가를 지지했어야합니다."
 giga_katzen.8010.name:0 "도푸스가 솔라키아 영토를 요청하다"
 giga_katzen.8010.descrec:0 "§Y캇첸아르티히 제국§!의 붕괴에 따라, §Y솔라키아 공화국§!의 지도자인 §Y도푸스 테크닉 마키나§!는 §Y[global_event_country.GetGalCommunityOrGalImperium]§!의 선언에 따라, 우리가 솔라키아 영토를 그와 솔라키아 공화국에게 통제권을 넘겨주기를 요청하고 있습니다.\n\n이는 사실상 플러션 내에 솔라키아 엔클레이브를 생성할 것이며 이를 받아들이는 것은 플러션의 땅 일부를 잃는다는 의미입니다. 하지만 이를 거절하면 §Y솔라키아 공화국§!이 스스로 독립적인 은하 국가가 되었을 때 극단적인 결과를 가져올 수 있습니다.\n\n§R우리가 공식적으로 솔라키아의 독립을 인정했다는 점을 고려해볼 때, 이를 거부하는 것은 [global_event_country.GetGalCommunityOrGalImperium] 내에서의 끔찍한 결과를 낳을 수 있습니다.§!"
 giga_katzen.8010.desc:0 "§Y캇첸아르티히 제국§!의 붕괴에 따라, §Y솔라키아 공화국§!의 지도자인 §Y도푸스 테크닉 마키나§!는 우리가 솔라키아 영토를 그와 솔라키아 공화국에게 통제권을 넘겨주기를 요청하고 있습니다.\n\n이는 사실상 플러션 내에 솔라키아 엔클레이브를 생성할 것이며 이를 받아들이는 것은 플러션의 땅 일부를 잃는다는 의미입니다. 하지만 이를 거절하면 §Y솔라키아 공화국§!이 스스로 독립적인 은하 국가가 되었을 때 극단적인 결과를 가져올 수 있습니다."
 giga_katzen.8010.a:0 "물론이지!"
 giga_katzen.8010.a.tooltip:0 "\n\n우리는 플러션의 일부에 접근할 수 없지만, §Y결정§!을 사용해 나중에 언제든지 §R강제§!로 되찾을 수 있습니다.\n\n"
 opinion_flusion_betrayed_us:0 "은하계의 배신"
 opinion_flusion_violated_galcom:0 "은하적 선언을 저버렸습니다."
 solakia_free_state:0 "솔라키아 자유국"
 solakia_free_state_desc:0 "플러션의 솔라키아 땅은 공식적으로 솔라키아 공화국의 일부가 되었고, 사실상 행성을 통제하는 자에게서 자유로워졌습니다. 그러나 솔라키아와의 무역은 수익성이 좋은 기회이며, 그들의 생각은 분명히 행성의 모든 존재들에게 영향을 줄 것입니다."
 giga_katzen.8010.b:0 "아니, 그 땅은 이제 우리의 것이다."
 giga_katzen.8010.b.tooltip:0 "§Y솔라키아§!는 §R매우 분노§!할 것입니다."
 solak_angry:0 "솔라키아의 불만"
 solak_angry_desc:0 "솔라키아인들은 우리에게 배신당한 것을 별로 달가워하지 않습니다."
 opinion_flusion_gave_land_back:0 "플러션 땅을 반환함"
 decision_take_solakia_back:0 "솔라키아 장악"
 decision_take_solakia_back_desc:0 "가식은 이정도면 충분합니다. 플러션은 당연히 우리의 것입니다. 전부 다."
 decision_take_solakia_back_effect:0 "우리는 플러션의 솔라키아 엔클레이브를 강제적으로 장악할 것입니다. 이는 행성에 적대적인 솔라키아군을 형성할 것입니다. 만약 그들이 존재하고 우리가 아직 전쟁 중이 아니라면, 이는 §Y솔라키아 공화국§!에 대한 §R전쟁 선포§!입니다."
 decision_give_flusion_to_solakia:0 "솔라키아에게 플러션 반환"
 decision_give_flusion_to_solakia_desc:0 "더이상 플러션을 직접 통제할 필요가 없다면, 행성 전체를 솔라키아 공화국에게 반환할 수 있습니다."
 decision_give_flusion_to_solakia_effect:0 "§Y솔라키아 공화국§!에게 §Y플러션§! 전체를 줄 것입니다. 그들은 당연히 고마워할 것입니다."
 giga_katzen.8012.name:0 "플러션 점령 실패!"
 giga_katzen.8012.desc:0 "솔라키아를 장악하려던 시도가 안타깝게도 역효과를 낳았으며 현재 솔라키아인들은 플러션뿐만이 아니라 유블리오 성계의 통제권을 얻었습니다.\n\n돌려받으려면 재침공해야 할 것입니다."
 giga_katzen.8012.a:0 "제기랄!"
 giga_katzen.8012.a.tooltip:0 "우리는 §Y플러션§!에 대한 통제권을 §Y솔라키아 공화국§!에게 빼앗겼습니다."
 giga_katzen.8013.name:0 "솔라키아 장악"
 giga_katzen.8013.desc:0 "우리는 플러션의 솔라키아 엔클레이브를 장악했습니다. 행성 전체가 이제 다시 한 번 우리의 통제 하에 있지만, 솔라키아는 달가워하지 않을 것입니다."
 giga_katzen.8013.a:0 "좋았어!"
 giga_highlight_object:0 "강조 표시"
 giga_highlight_object_desc:0 "이 천체는 강조 표시되어 이름을 클릭할 수 있습니다."
