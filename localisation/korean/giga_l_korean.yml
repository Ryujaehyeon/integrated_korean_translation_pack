l_korean:
 header_01_gigac:0 "§G초거대 구조물 건설§!"
 header_01_gigac_desc:0 "$header_01_gigac$\n이 기술은 거대 공학의 새로운 지평을 열어 초거대 구조물의 건설을 가능하게 합니다."
 header_02_tetra:0 "§B4차원 공학§!"
 header_02_tetra_desc:0 "$header_02_tetra$\n이 기술 덕분에 고차원 공학을 이용해야 할 정도의 엄청난 거대 구조물을 건설할 수 있게 됩니다."
 header_03_insane:0 "§R정신나간 기술§!"
 header_03_insane_desc:0 "$header_03_insane$\n이게 될거라고 믿는 것은 미친 소리지만, 이 기술은 우리 문명을 훨씬 앞서가게 할 것입니다."
 header_04_lud_insane:0 "§P말도 안 되게 정신나간 기술§!"
 header_04_lud_insane_desc:0 "$header_04_lud_insane$\n이 기술을 연구하여 우리 문명이 이루어낼 진보는 그 누구라도 이해할 수 없을 것입니다."
 header_05_shroud:0 "§M장막 기술§!"
 header_05_shroud_desc:0 "$header_05_shroud$\n장막 관련 기술은 이 연구를 통해 잠금 해제됩니다.§!"
 name_ndb:0 "니콜-다이슨 광선"
 allow_ndb:0 "§H거대 구조물 잠금 해제:§! $name_ndb$"
 desc_ndb:0 "궁극의 파괴 무기입니다. 항성의 에너지 출력을 레이저에 집중할 수 있는 거대한 구조물로, 먼 곳에서 행성과 심지어는 성계 전체를 파괴할 수 있습니다. 적들은 우리를 두려워 할 것입니다."
 allow_ndb_p1:0 "$allow_ndb$ 1 단계: 자기력-집합기"
 desc_ndb_p1:0 "니콜-다이슨 광선은 항성계 전체를 파괴할 수 있는 도구입니다."
 allow_ndb_p2:0 "$allow_ndb$ 2 단계: 항성 재지정기"
 desc_ndb_p2:0 "니콜-다이슨 광선의 다음 단계를 잠금 해제합니다."
 allow_ndb_p3:0 "$allow_ndb$ 3 단계: 초대규모 안정기"
 desc_ndb_p3:0 "니콜-다이슨 광선의 다음 단계를 잠금 해제합니다."
 allow_ndb_p4:0 "$allow_ndb$"
 desc_ndb_p4:0 "니콜-다이슨 광선의 다음 단계를 잠금 해제합니다."
 giga_tech_dummy_loc:0 "로컬라이제이션 소프트웨어 테스트, 무시"
 name_eq_shipyard:0 "적도 조선소"
 allow_eq_shipyard:0 "§H거대 구조물 잠금 해제:§! $name_eq_shipyard$"
 desc_eq_shipyard:0 "용암 행성을 둘러 싼 두 고리 중, 내부 고리는 행성에서 합금과 에너지를 추출하고 외부 고리는 엄청난 속도로 함선을 조립합니다. 행성의 모든 위성은 없어질 것 입니다."
 name_discomoon:0 "위성 반사경"
 allow_disco_moon:0 "§H거대 구조물 잠금 해제:§! $name_discomoon$"
 desc_disco_moon:0 "수정판으로 덮인 위성으로, 주위의 행성에 경외심을 불러일으키는 아름다운 빛의 연극을 만들어 냅니다. 근처 행성계의 모든 천체에 영향을 미칩니다."
 name_crystal_megabore:0 "수정 굴착기"
 allow_crystal_megabore:0 "§H거대 구조물 잠금 해제:§! $name_crystal_megabore$"
 desc_crystal_megabore:0 "용암 행성의 핵에 직접 구멍을 뚫어 다량의 희귀 크리스탈을 추출하는 거대한 궤도 시설입니다."
 name_interstellar_hab:0 "성간 거주지"
 allow_interstellar_hab:0 "§H거대 구조물 잠금 해제:§! $name_interstellar_hab$"
 desc_interstellar_hab:0 "별들 사이의 공허에 건설된 거주지입니다.\n\n$name_interstellar_hab$는 고유한 §Y채굴§!과 §Y연구§! 지구를 가지고 있습니다. 15개의 지구를 가집니다."
 name_interstellar_ring:0 "성간 링 월드"
 allow_interstellar_ring:0 "§H거대 구조물 잠금 해제:§! $name_interstellar_ring$"
 desc_interstellar_ring:0 "$name_interstellar_hab$로 업그레이드 된 이 거대한 링 월드는 8개의 거주 가능한 구역을 가집니다.\n\n성간 링 월드는 고유한 §Y발전§!과 §Y주조§! 지구를 가지고 있습니다. 25개의 지구를 가집니다."
 name_upgrade_ringworld:0 "링 월드 구획 업그레이드"
 allow_upgrade_ringworld:0 "§H거대 구조물 잠금 해제:§! 링 월드 구획 업그레이드"
 desc_upgrade_ringworld:0 "지원 구역을 거주 가능한 구역으로 변환하여 링 월드에 더 많은 거주지를 추가합니다.\n\n§H업그레이드를 원하는 링 월드 구획에서 결정을 선택해야 합니다.§!"
 name_ringworld_titanic:0 "타이타닉 링 월드"
 allow_ringworld_titanic:0 "§H거대 구조물 잠금 해제:§! $name_ringworld_titanic$"
 desc_ringworld_titanic:0 "$name_ringworld_titanic$은 기존 링 월드 시스템에 구축되어 더 많은 거주 공간을 제공합니다."
 name_ringworld_behemoth:0 "베히모스 링 월드"
 allow_ringworld_behemoth:0 "§H거대 구조물 잠금 해제:§! $name_ringworld_behemoth$"
 desc_ringworld_behemoth:0 "$name_ringworld_behemoth$은 기존의 이중 링 월드 시스템을 기반으로 구축되어 더 많은 거주 공간을 제공합니다."
 name_ringworld_gargan:0 "가겐츄언 링 월드"
 allow_ringworld_gargan:0 "§H거대 구조물 잠금 해제:§! $name_ringworld_gargan$"
 desc_ringworld_gargan:0 "$name_ringworld_gargan$은 기존의 3중 링 월드 시스템을 기반으로 구축되어 더 많은 거주 공간을 제공합니다."
 name_ringworld_square:0 "스퀘어 링 월드"
 allow_ringworld_square:0 "§H거대 구조물 잠금 해제:§! $name_ringworld_square$"
 allow_squareworld:0 "§H결정 잠금 해제:§! 스퀘어월드 복구"
 desc_squareworld:0 "아직도 수수께끼에 싸여 있지만, 더 많은 정보를 얻는다면 스퀘어월드를 복원할 수 있을지도 모릅니다."
 name_ringworld_city:0 "도시 행성 링 월드"
 allow_ringworld_city:0 "§H거대 구조물 잠금 해제:§! $name_ringworld_city$"
 name_ringworld_hive:0 "군체 링 월드"
 allow_ringworld_hive:0 "§H거대 구조물 잠금 해제:§! $name_ringworld_hive$"
 name_ringworld_machine:0 "기계 링 월드"
 allow_ringworld_machine:0 "§H거대 구조물 잠금 해제:§! $name_ringworld_machine$"
 name_penrose_ring:0 "펜로즈 링 월드"
 allow_penrose_ring:0 "§H거대 구조물 잠금 해제:§! $name_penrose_ring$"
 allow_penrose_stabilize:0 "§H기능 잠금 해제:§! $name_penrose$ 안정화"
 desc_penrose_stabilize:0 "$name_penrose$를 안정화하여 에너지 생산을 크게 늘립니다."
 allow_penrose_ringworld:0 "§H기능 잠금 해제:§! $name_penrose$ 링 월드"
 desc_penrose_ringworld:0 "$name_penrose$를 중심으로 구축 된 링 월드입니다. 링 월드의 일부 기반시설이 펜로즈 스피어 자체에 통합되어 더 많은 거주 구획을 형성할 수 있습니다.\n\n$name_penrose_ring$는 고유한 §Y발전§!, §Y농업§! 및 §Y연구§! 지구를 가지고 있습니다. 총 35개의 지구를 가질 수 있습니다."
 name_penrose:0 "펜로즈 스피어"
 allow_penrose:0 "§H거대 구조물 잠금 해제:§! $name_penrose$"
 desc_penrose_sphere:0 "블랙홀 주위에 건설된 대형 반사체로, 블랙홀에서 에너지를 얻기 위해 초방사성 산란 현상을 이용합니다. 매우 강력한 폭탄으로 사용할 수도 있고, 에너지를 생산하는데 사용할 수도 있지만, 발전기로 사용할 때의 안정성을 높이기 위해 구조물을 안정화하려면 추가적인 연구가 필요할 것입니다."
 name_succ:0 "S.U.C.C."
 allow_succ:0 "§H거대 구조물 잠금 해제:§! $name_succ$"
 desc_succ:0 "$name_succ_full$. 줄여서 $name_succ$는 거대 가스 행성을 감싸고 있는 거대한 시설입니다. 거대한 견인 광선을 이용해 대기를 채취하며, 이를 에너지와 가스, 불안정 분말로 정제합니다."
 name_succ_full:0 "초대기 가스 수집-축전기"
 allow_succ_full:0 "§H거대 구조물 잠금 해제:§! $name_succ_full$"
 name_matrioshka_brain:0 "마트료시카 브레인"
 allow_matrioshka_brain:0 "§H거대 구조물 잠금 해제:§! $name_matrioshka_brain$"
 desc_matrioshka_brain:0 "터무니 없는 규모의 슈퍼 컴퓨터입니다."
 name_virtual_reality:0 "가상 현실"
 allow_virtual_reality:0 "§H결정 잠금 해제:§! $name_virtual_reality$"
 desc_virtual_reality:0 "$name_matrioshka_brain$을 마트료시카 현실 시뮬레이터로 업그레이드하여, 수 십억 개의 정신을 수용할 수 있습니다."
 name_kugelblitz:0 "쿠겔블리츠 격납 저장고"
 allow_kugelblitz:0 "§H거대 구조물 잠금 해제:§! $name_kugelblitz$"
 desc_kugelblitz:0 "특수 장치 내부에서 유지되는 대형 쿠겔블리츠입니다. 에너지와 물질을 복사 에너지 형태로 보관하다 첨단 에너지-물질 변환기를 이용해 필요에 따라 전이하여 사용할 수 있습니다."
 name_psy_siphon:0 "사이오닉 추출기"
 allow_psy_siphon:0 "§H거대 구조물 잠금 해제:§! $name_psy_siphon$"
 desc_psy_siphon:0 "우리의 우주를 장막과 연결하는 거대한 포탈 입니다. 포탈은 막대한 양의 에너지와 연구를 생산하며 우리의 사이오닉 잠재력을 크게 향상 시킬 수 있습니다."
 name_eng_test_site:0 "거대공학 실험 기지"
 allow_eng_test_site:0 "§H거대 구조물 잠금 해제:§! $name_eng_test_site$"
 desc_eng_test_site:0 "행성을 공전하는 거대한 항성 기지로, 자유로운 공학 실험이 이루어집니다."
 name_atmosphere_shredder:0 "대기 폭풍 관측소"
 allow_atmosphere_shredder:0 "§H거대구조물 잠금 해제:§!$name_atmosphere_shredder$"
 desc_atmosphere_shredder:0 "가스 거성 대기 중에 거대한 폭풍을 일으킬 수 있는 인공 시설군입니다."
 name_sub_compressor:0 "아항성 압축기"
 allow_sub_compressor:0 "§H거대 구조물 잠금 해제:§! $name_sub_compressor$"
 desc_sub_compressor:0 "갈색 왜성 주위에 건설 가능한 거대 구조물로, 갈색 왜성 내부에서 핵융합 반응을 일으켜 별을 점화할 수 있습니다."
 name_auto_stripmine:0 "자동화 노천광 드릴"
 allow_auto_stripmine:0 "§H거대 구조물 잠금 해제:§! $name_auto_stripmine$"
 desc_auto_stripmine:0 "행성을 덮고 있는 거대한 산업 단지입니다. 행성의 표면을 한 겹씩 벗겨내어 아무것도 남지 않을 때까지 광물을 채굴 합니다."
 name_yggdrasil:0 "위그드라실 난초 복합 단지"
 allow_yggdrasil:0 "§H거대 구조물 잠금 해제:§! $name_yggdrasil$"
 desc_yggdrasil:0 "거대 가스 행성의 대기에 특수한 식물을 심기 위해 행성 주위에 건설된 대규모 복합 단지입니다."
 name_the_vat:0 "B.I.G. 인큐베이터"
 name_the_vat_long:0 "유기체 급성장 인큐베이터"
 allow_the_vat:0 "§H거대 구조물 잠금 해제:§! $name_the_vat$"
 desc_the_vat:0 "매우 거대한 클론들을 수용하기 위해 만들어진 거대한 인큐베이터입니다."
 name_orbital_artificial_eco:0 "궤도 인공 생태계"
 allow_orbital_artificial_eco:0 "§H거대 구조물 잠금 해제:§! $name_orbital_artificial_eco$"
 desc_orbital_artificial_eco:0 "자연을 연구하기 위한 완전히 인공적인 생태계를 갖춘 매우 거대한 항성 기지 입니다."
 name_neut_gigaforge:0 "중성자 제련소"
 allow_neut_gigaforge:0 "§H거대 구조물 잠금 해제:§! $name_neut_gigaforge$"
 desc_neut_gigaforge:0 "중성자별에서 다량의 뉴트로늄을 채취할 수 있는 정제소입니다."
 name_orb_elysium:0 "궤도 엘리시움"
 allow_orb_elysium:0 "§H거대 구조물 잠금 해제:§! $name_orb_elysium$"
 desc_orb_elysium:0 "행성 시민들을 통제하기 위해 고안된 작은 고리 형태의 우주 기지입니다. §Y연구§!와 §Y통합력§!, 행성의 §Y안정도§! 유지를 위한 지구가 있습니다.\n\n행성의 §Y건물을 비활성화하고 지구 갯수를 크게 감소시키는§! 대신 §Y팝마다 작업§!의 수가 늘어납니다. 이는 행성 특화의 영향을 받으며, 주로 §Y원자재§!에 초점이 맞추어 집니다."
 name_habitats:0 "서식지"
 name_giga_orbital:0 "항성 고리 거주지"
 allow_giga_orbital:0 "§H거대 구조물 잠금 해제:§! $name_giga_orbital$"
 desc_giga_orbital:0 "행성과 유사한 생활 조건을 제공하기 위해 설계된 거대한 고리 모양의 우주 기지입니다. §Y식량§!과 §Y통합력§!, §Y편의§!, 행성 물류를 위한 지구가 있습니다.\n\n성계의 §Y$habitat_0$§! 기지와 시너지 효과를 일으키고 §Y$civic_machine_servitor$§! 제국에게는 추가 효과가 있으며, §Y$trait_void_dweller_1$§! 팝에게는 $habitat_0$로 여겨집니다."
 name_particle_accel:0 "항성 입자 가속기"
 allow_particle_accel:0 "§H거대 구조물 잠금 해제:§! $name_particle_accel$"
 desc_particle_accel:0 "입자를 빛의 속도에 가깝게 가속 시킬 수 있는 거대한 입자 가속기입니다."
 name_starlifter:0 "항성 제련소"
 allow_starlifter:0 "§H거대 구조물 잠금 해제:§! $name_starlifter$"
 desc_starlifter:0 "항성 주위에 건설하는 구조물입니다. 항성의 정수를 직접 채굴 하여 광물로 변환 시킵니다."
 name_fusion_suppressor:0 "핵융합 억제기"
 allow_fusion_suppressor:0 "§H거대 구조물 잠금 해제:§! $name_fusion_suppressor$"
 desc_fusion_suppressor:0 "항성 주위에 축조된 거대 구조물로, 내부 핵융합 과정을 방해하며 대량의 과학 데이터를 생산합니다. 최후에는 항성을 폭발시켜 주변 행성에 아이오디지움 수정 매장지를 만들 수도 있고, 블랙홀로 만들 수도 있습니다."
 name_hraemc:0 "HRAE-MC"
 allow_hraemc:0 "§H거대 구조물 잠금 해제:§! $name_hraemc$"
 desc_hraemc:0 "이 놀라운 기술의 집약체는 엄청난 양의 에너지를 제공할 뿐만 아니라, 블랙홀의 본질에 대한 많은 데이터를 제공합니다."
 name_war_moon:0 "전쟁 위성"
 allow_war_moon:0 "§H거대 구조물 잠금 해제:§! $name_war_moon$"
