 giga_tech_automated_stripmine_1:0 "산업 초고속 복제"
 giga_tech_automated_stripmine_1_desc:0 "3D 프린팅 및 모듈식 구조의 발전은 기하 급수적으로 빠른 시공 기술로 이어질 수 있습니다."
 giga_tech_automated_stripmine_2:0 "행성 광물 추출"
 giga_tech_automated_stripmine_2_desc:0 "궤도 건설 기술의 진보 덕분에, 새로운 초고속 복제 산업 채굴기뿐만 아니라, 행성의 광물 전채를 채굴할 가능성이 현실이 되었는지도 모릅니다."
 giga_tech_kugelblitz:0 "인공 쿠겔블리츠 격납기"
 giga_tech_kugelblitz_desc:0 "쿠겔블리츠 생성 능력은 효율적인 특이점 생성기로의 이용으로 유용성을 입증 할 수 있습니다. 핵심은 제어된 쿠겔블리츠는 추후 물질과 에너지로 다시 복원할 수 있다는 사실상의 블랙홀 저장 장치입니다."
 giga_tech_kugelblitz_2:0 "개량된 인공 구상번개 제어"
 giga_tech_kugelblitz_2_desc:0 "더 크고 제어 가능하며 안전한 인공 특이점은 우리에게 큰 이익을 줄 것입니다. 자재 저장 능력이 크게 향상되어 계속 증가하는 대규모 건설 프로젝트의 요구를 더 잘 충족시킬 수 있습니다."
 giga_tech_kugelblitz_3:0 "인공 구상번개 제어"
 giga_tech_kugelblitz_3_desc:0 "구상번개를 생성하는 능력은 이러한 물체가 효율적인 특이점 생성기로 사용될 수 있기 때문에 유용할 수 있습니다. 가장 중요한 것은 제어된 구상번개가 나중에 회수할 수 있도록 물질과 에너지를 제공하여 효과적으로 블랙홀 저장 장치 역할을 할 수 있다는 것입니다."
 giga_tech_substellar_compressor:0 "헬리오포밍"
 giga_tech_substellar_compressor_desc:0 "갈색왜성이 핵융합 반응 시작을 실패하고 별이 되지 못했습니다. 옳바른 기술과 약간의 자원으로 이 별이 타오를 힘을 줄 수 있을지도 모릅니다."
 giga_dialog.1701.name:0 "$name_sub_compressor$ 건설 현장 완성"
 giga_dialog.1701.desc:0 "미래의 $name_sub_compressor$ 건설 현장이 [giga_system.GetName]에 걸설되었습니다. 이 발판 위에 우리는 갈색왜성을 새로운 별로 탄생시킬 수 있는 장치를 건설할 것입니다. 갈색왜성의 넓은 위성계는 급격하게 뜨거워질 것이고 위성 몇 개는 거주가 가능해지거나 테라포밍이 가능해질 것입니다."
 giga_dialog.1701.a:0 "훌륭해."
 giga_dialog.1702.name:0 "$name_sub_compressor$ 자기 패널 완성"
 giga_dialog.1702.desc:0 "$name_sub_compressor$의 자기패널이 완성되었습니다. 이 거대한 패널은 자기장을 사용해 갈색왜성의 핵 내부에 열을 발생시켜 핵융합을 재개할 수 있을 것입니다."
 giga_dialog.1702.a:0 "좋아."
 giga_dialog.1703.name:0 "$name_sub_compressor$ 완성"
 giga_dialog.1703.desc:0 "우리의 $name_sub_compressor$가 완성되었습니다! 갈색 왜성을 더 작은 크기로 압축할 수 있는 대규모 중력 변조기가 설치되었으며, 이는 점화에 중요한 단계입니다. 이제 지속 가능한 핵융합 반응이 발생할 수 있도록 갈색 왜성을 압착하여 천천히 핵의 온도를 증가시켜야 합니다. 이것은 상당히 길고 에너지 집약적인 과정이 될것입니다."
 giga_dialog.1703.a:0 "계속 노력하게."
 giga_dialog.1704.name:0 "$name_sub_compressor$ - 압축 단계 완료"
 giga_dialog.1704.desc:0 "새로운 별의 탄생을 위한 한 걸음입니다. [giga_system.GetName] 성계의 갈색 왜성은 핵융합 반응이 발생할 만큼의 고밀도 지점까지 압축되었습니다. 이제 남은 일은 자기 패널을 이용해 핵의 온도를 높혀 연쇄 반응을 일으켜 갈색 왜성을 점화하는 것입니다."
 giga_dialog.1704.a:0 "거의 다 왔어."
 giga_dialog.1705.title:0 "행성 점화됨"
 giga_dialog.1705.desc:0 "공학과 기술을 통해 경이로운 업적을 일궈냈습니다. $name_sub_compressor$는 갈색 왜성의 핵을 가열을 통해 수소가 헬륨으로 핵융합되기 시작했고, 연쇄 반응이 일어나 갈색 왜성의 핵은 점화되어, 최종적으로 천체 전체가 타올라 새로운 별로 변형되었습니다.  우리는 몇몇 제국이 상상이나 하던 새로운 별을 탄생 시켰다고 주장할 수 있게 되었습니다.\n\nThe $name_sub_compressor$는 이제 별의 에너지를 수집하고 핵융합 과정을 연구함과 동시에 새로운 별을 안정화하고 있습니다. 우리의 과학자들은 이전 갈색 왜성의 위성계가 급격한 변화를 맞이했으며 최소한 하나 이상의 위성에서 거주 할 수 있게 되었다고 보고하고 있습니다. 우리는 이제 위성 (이제 기술적으로 행성이겠지만) 하나 하나를 테라포밍할 수 있을거라 추정하고 있습니다."
 giga_dialog.1705.a:0 "별이 빛나고 있군."
 NAME_giga_Lucifer:0 "루시퍼"
 substellar_compressor_0:0 "$gc_mega$$name_sub_compressor$ 건설 현장"
 substellar_compressor_0_DESC:0 "$name_sub_compressor$의 건설 현장입니다. 갈색 왜성 주위에 $name_sub_compressor$ 건설을 위한 필수 인력들을 수용하고 있습니다."
 substellar_compressor_0_MEGASTRUCTURE_DETAILS:0 "£galwonders£ $giga_list_category_megastructure$ - $giga_list_category_miscellaneous$\n§Y갈색왜성§!을 §Y점화된 별§!로 바꾸어, 그 위성을 보다 거주 가능하게 만들고 동시에 £physics_research£ §Y물리학 연구§! 및 £energy£ §Y에너지§!를 생산합니다\n§L아항성 압축기는 갈색왜성 내부에 융합 반응을 일으켜, 별을 점화합니다.§!"
 substellar_compressor_1:0 "$name_sub_compressor$ 자기 패널"
 substellar_compressor_1_DESC:0 "이 거대한 패널들은 $name_sub_compressor$의 건설을 향한 첫 단계입니다. 이 패널들은 자기장과 다른 힘을 사용해 갈색 왜성 내부를 원격 가열할 수 있습니다."
 substellar_compressor_2:0 "$name_sub_compressor$"
 substellar_compressor_2_DESC:0 "완전한 $name_sub_compressor$입니다. 갈색 왜성의 핵융합 반응을 위해 작은 크기로 압착할 수 있는 두 개의 거대한 중력 압축기입니다."
 substellar_compressor_3:0 "$name_sub_compressor$ - 질량 증대"
 substellar_compressor_3_DESC:0 "$name_sub_compressor$가 갈색왜성에 대량의 물질을 보내서 느리지만 꾸준히 왜성의 질량을 늘리고 있습니다. 이제 우리는 임계 밀도까지 갈색왜성을 압축해야합니다."
 substellar_compressor_4:0 "$name_sub_compressor$ - 압축"
 substellar_compressor_4_DESC:0 "중력 압축기가 갈색 왜성을 더 작은 크기로 찌부러뜨리고 있습니다. 명령만 내리면 갈색왜성은 임계 밀도 너머로 더울 압축되어 새로운 별로 타오를 것입니다."
 substellar_compressor_5:0 "점화된 별"
 substellar_compressor_5_DESC:0 "갈색 왜성의 내부를 점화시키고 핵융합 반응을 일으킵니다."
 substellar_compressor_6:0 "$name_sub_compressor$"
 substellar_compressor_6_DESC:0 "$name_sub_compressor$는 성공적으로 갈색 왜성을 점화시켰습니다."
 substellar_compressor_7:0 "$name_sub_compressor$ 해체"
 substellar_compressor_7_DESC:0 "$name_sub_compressor$를 해체합니다."
 giga_tech_star_lifter:0 "초규모 항성 리프팅"
 giga_tech_star_lifter_desc:0 "항성들은 이해할 수 없을 정도로 많은 천연자원을 가지고 있습니다. 전문화된 제련소를 이용하여 이러한 자원들을 사용 가능한 광물들로 변환할 수 있습니다!"
 giga_dialog.1601.name:0 "$name_starlifter$ 건설 현장"
 giga_dialog.1601.desc:0 "항성의 힘을 이용하는 것은 원유를 연소하던 시절부터 태양 핵융합의 미약한 모방의 시절까지 [root.GetAdj]의 공학자들의 역사적인 꿈이었습니다. 이제 우리는 언제라도 이 꿈을 실현할 수 있습니다. [giga_system.GetName] 성계에 있는 발판 위에서 우리는 $name_starlifter$를 건설할 것이며 [giga_system.GetName](을)를 둘러싸 항성의 근본까지 독점할 것입니다. 이 위대한 장치로 항성의 지옥같은 광구에서 바로 대량의 수소와 헬륨을 추출하여 핵융합을 통해 더 무거운 원소로 바꿀 것입니다. 철보다 더 무거운 것으로 융합하려면 추가 에너지가 필요합니다. 그러므로 이 구조물이 소비하는 에너지는 터무니없이 많을 것입니다."
 giga_dialog.1601.a:0 "곧, 우리는 말도 안 되는 자원을 얻을 것이다."
 giga_dialog.1602.name:0 "$name_starlifter$ 뼈대"
 giga_dialog.1602.desc:0 "$name_starlifter$의 뼈대가 지어졌습니다. 프로젝트의 놀라운 규모가 모두에게 생생합니다.\n\n[giga_system.GetName](이)가 얇은 골격 속에서 불타고 있지만 결국 [root.GetAdj]의 태양 전지판과 중력 리프트로 완선히 둘러싸일 것입니다."
 giga_dialog.1602.a:0 "훌륭해."
 giga_dialog.1603.name:0 "$name_starlifter$ 기반 시설 구축"
 giga_dialog.1603.desc:0 "아직 완성되지는 않았지만 고급 태양 에너지 흡수기의 설치로 우리는 [giga_system.GetName] 항성의 에너지를 사용해 중력 리프트와 물질 변환 시설에 동력을 공급하기 시작했습니다.\n\n건설이 계속될수록 물자와 에너지 요구량은 계속 증가할 것이며 물질 변환은 더욱 최적화될 것입니다."
 giga_dialog.1603.a:0 "한 걸음 더..."
 giga_dialog.1604.name:0 "$name_starlifter$ 기반 시설 구축"
 giga_dialog.1604.desc:0 "우리의 $name_starlifter$가 완성에 한발자국 더 가까워졌습니다. [giga_system.GetName](은)는 우리가 거대 구조물의 부분 부분을 완성시킬 때마다 점점 희미해집니다. 항성의 질량이 더 빠른 속도로 꾸준히 추출되고 있으며 $name_starlifter$의 핵융합 화로에 더 많은 수소와 헬륨을 공급하고 있습니다."
 giga_dialog.1604.a:0 "한 걸음 더..."
 giga_dialog.1605.name:0 "[giga_system.GetName] $name_starlifter$ 완성"
 giga_dialog.1605.desc:0 "[giga_system.GetName] 항성계의 별은 이제 완전히 [root.GetAdj] $name_starlifter$에 의해 감싸였습니다.\n\n우리는 은하 역사상 몇 안 되는 항성 제국만이 감히 상상했던 것을 이뤘습니다 - 별의 완전 정복입니다."
 giga_dialog.1605.a:0 "광물 생산량 정상."
 star_lifter_0:0 "$gc_mega$$name_starlifter$ 건설 현장"
 star_lifter_0_DESC:0 "이 현장은 언젠가 우리에게 행성 몇 개 분의 가치가 있는 광물을 제공할 것입니다."
 star_lifter_0_MEGASTRUCTURE_DETAILS:0 "£gigastructural£ $giga_list_category_megastructure$ - $giga_list_category_basic_resource_production$\n§Y별§!을 채굴해 £minerals£ §Y광물§!을 얻습니다 - $giga_list_scales_with_star_size$\n§L거대한 $star_lifter_5$는 대상 별을 완전히 감싸고, 핵융합 과정을 이용해 보다 가벼운 원소로부터 사용 가능한 광물을 대량 생산합니다.§!"
 star_lifter_0_CONSTRUCTION_INFO_DELAYED:0 ""
 star_lifter_1:0 "$name_starlifter$ 뼈대"
 star_lifter_1_DESC:0 "언젠가 이 얇은 골격은 별을 감싸고 있는 채굴 장치와 우리의 광물 부족 현상에 도움을 줄 것입니다"
 star_lifter_2:0 "$name_starlifter$ 1단계"
 star_lifter_2_DESC:0 "$name_starlifter$가 25% 가량 건설되었습니다."
 star_lifter_3:0 "$name_starlifter$ 2단계"
 star_lifter_3_DESC:0 "$name_starlifter$가 50% 가량 건설되었습니다."
 star_lifter_4:0 "$name_starlifter$ 3단계"
 star_lifter_4_DESC:0 "$name_starlifter$가 75% 가량 건설되었습니다."
 star_lifter_5:0 "$name_starlifter$"
 star_lifter_5_DESC:0 "$name_starlifter$는 완전히 작동합니다. 첨단 핵융합 전환기와 중력 기중기를 통해 천문학적인 양의 광물을 생산하고 있습니다."
 giga_tech_penrose_sphere_1:0 "초대규모 산란광 응용"
 giga_tech_penrose_sphere_1_desc:0 "회전하는 블랙홀에는 정말 강력한 중력장이 있어 회전하는 동안 말 그대로 시공간을 회전과 함께 끌어당깁니다. 이론적으로 블랙홀 주위에 특수 거울 구체를 향해 빛을 발사함으로써 이 과정을 활용할 수 있습니다. 이는 블랙홀에 끌어당겨진 공간에 의해 증폭될 것입니다."
 giga_tech_penrose_sphere_2:0 "작용권 수확 조작"
 giga_tech_penrose_sphere_2_desc:0 "특수한 안정기와 조작기를 사용해 $name_penrose$가 감당할 수 있는 제어된 복사 에너지의 양을 대폭 증가시켜 출력을 현저히 증가시킬 수 있습니다."
 giga_tech_penrose_sphere_3:0 "무항성 링 월드 기반"
 giga_tech_penrose_sphere_3_desc:0 "이론적으로, $name_penrose$가 동력을 공급하는 링 월드를 조립하는 것이 가능할지도 모릅니다. 그러한 링 월드는 블랙홀의 작용권에 들어가는 전자기 복사 에너지를 공급받아서, 항성이 죽어 꺼진다해도 수 십억 년 지속되는 안전지대를 제공할 것입니다."
 giga_dialog.1201.name:0 "$name_penrose$ 건설 현장 완성"
 giga_dialog.1201.desc:0 "[giga_system.GetName] 근처에서 미래의 $name_penrose$를 위한 건설 현장이 완성되었습니다. 이 발판 위에서 우리는 블랙홀을 초거대 반사경으로 완전히 둘러싸 블랙홀의 막대한 회전 에너지를 사용할 것입니다."
 giga_dialog.1201.a:0 "좋아."
 giga_dialog.1202.name:0 "$name_penrose$ 뼈대 완성"
 giga_dialog.1202.desc:0 "[giga_system.GetName] 주위로 미래의 $name_penrose$ 를 위한 뼈대가 완성되었습니다. 이 뼈대는 언젠가 가장 반사 능력이 뛰어난 물질로 만들어진 거대한 거울을 지탱할 것입니다. 이 거울을 완성하고 나면 우리는 구조물을 거대한 폭탄으로 전환할지, 아니면 에너지를 수확하는데 사용할지 선택해야할 것입니다."
 giga_dialog.1202.a:0 "환상적이야."
 giga_dialog.1203.name:0 "아공간 왜곡 폭탄 무장!"
 giga_dialog.1203.desc:0 "[giga_system.GetName] 성계의 아공간 왜곡 폭탄 무장이 이제 폭발하기에 충분한 에너지를 축적했습니다! 남은 것은 거울 뼈대로 약간의 복사 에너지를 주입하는 것으로, 그리하면 에너지 과부화로 인해 폭탄이 폭발할 것입니다."
 giga_dialog.1203.a:0 "훌륭해."
 giga_dialog.1204.name:0 "$name_penrose$ 안정화"
 giga_dialog.1204.desc:0 "이제 [giga_system.GetName]의 $name_penrose$를 둘러싼 추가적인 두 개의 거대하고 엄청나게 복잡한 안정기로 에너지가 흘러 들어가기 시작합니다. 구조물이 제대로 제어됨에 따라, 초방사성 산란 과정이 더 대규모로 일어나 막대한 양의 에너지를 생산합니다!"
 giga_dialog.1204.a:0 "놀랍군!"
 giga_dialog.1205.name:0 "$name_penrose$ 링 월드 완성"
 giga_dialog.1205.desc:0 "공학적 위업인 이 거대한 링 월드 뼈대는 $name_penrose$ 주위에 건설되었습니다! $name_penrose$ 그 자체로부터 동력을 받아 이 링 월드는 기존의 링 월드보다 더 많은 거주지를 유지할 수 있을 것입니다. 링 월드 유지 시스템의 일부를 $name_penrose$에 할당시킨 덕분입니다. 구체 자체는 에너지의 흐름을 맞추기 위해서 살짝 조정되어서 이제 출력이 링 월드에 쓰이고 있습니다. 또한 링 월드와의 충돌을 피하기 위해서 블랙홀의 강착원반이 제거되었습니다."
 giga_dialog.1205.a:0 "믿을 수 없군."
 giga_dialog.1206.name:0 "$name_penrose_ring$ 구획 완성!"
 giga_dialog.1206.desc:0 "[giga_system.GetName]의 링 월드 구획을 완성했습니다! 두 개의 거대한 링 월드 거주지 못지 않게, 이 경이로운 구조물은 별 그 자체가 죽어 꺼져버린다 해도 우리 종족을 수용할 수 있을 것입니다. 이 위대한 업적은 진정 우리의 거대 구조물 공학이 우월하다는 것을 증명합니다."
 giga_dialog.1206.a:0 "이것이 우리의 영원한 집이 되기를."
 giga_dialog.1208.title:0 "아공간 왜곡 폭탄 폭발!"
 giga_dialog.1208.desc:0 "우리는 아공간 왜곡 폭탄에 충분한 전자기 복사 에너지를 주입하여 그것의 한계를 넘었습니다. 엄청나게 증폭된 복사 에너지가 끝없이 앞뒤로 반사되고 있으며, 에너지 과부화로 인해 거울 뼈대가 곧 깨져버릴 것입니다. 이제 앉아서 불꽃놀이를 즐길 때입니다!"
 giga_dialog.1208.a:0 "불꽃놀이는 언제나 그 값어치를 하지."
 giga_tech_ringworld_upgrade:0 "초고효율 링 월드 지원 시스템"
 giga_tech_ringworld_upgrade_desc:0 "링 월드의 주요한 한계점은 (그리고, 다른 거대 구조물들도 어느 정도는 마찬가지로) 링 월드를 한 덩어리로 유지하는 다양한 방법 뿐만 아니라, 표면에 안정적인 생태계를 유지하는데 사용되는 생명 유지 시스템의 크기 그 자체입니다. 그런 시스템이란, 동력 생산과 생명체 목록 작성, 중력 안정화 등등을 포함합니다. 그 시스템은 현재 거주지 구획 옆의 구획에 보관되어 있지만, 충분히 진보한 기술을 이용하면, 링 월드의 수용량을 급격하게 증가시키게끔, 그 시스템을 링 월드 거주 구획 그 자체에 보관할 수도 있을 것입니다.\n\n§H개선을 원하는 링 월드 구획에 결정을 내려야 합니다§!"
 giga_dialog.1501.name:0 "링 월드 업그레이드"
 giga_dialog.1501.desc:0 "이제 우리는 링 월드 보조 구획을 링 월드 거주 구획으로 개량할 준비가 되었습니다.링 월드의  보조 시스템의 부피를 과감하게 줄임으로써, 우리는 보조 구획에 안정적인 생물권을 추가해 링 월드에 더욱 많은 생활 공간을 부여할 것입니다!\n\n§H예상 완료 시간: £time£ [root.giga_upgrade_time] 일"
 giga_dialog.1501.a:0 "좋아."
 giga_dialog.1502.name:0 "링 월드 업그레이드 완료!"
 giga_dialog.1502.desc:0 "환상적인 소식입니다! 공학의 공적으로 우리는 링 월드 보조 구획에 생물권을 성공적으로 추가해, 사실상 우리 종족의 거주에 적합하게 만들었습니다. 다른 제국들은 우리의 공학적 역량에 비길 꿈조차 꾸지 못할 것입니다."
 giga_dialog.1502.a:0 "놀라운 작업이군."
 giga_dialog.1503.name:0 "완전히 업그레이드된 4중 링 월드"
 giga_dialog.1503.desc:0 "수 십년의 고통스러운 작업과 노력 끝에, 우리는 4중 링 월드의 마지막 부분을 완성했습니다. 이 링 월드는 56개의 인상적인 거주 가능 링 월드 구획을 자랑하며, 이전에 건설된 거의 모든 것을 그림자로 덮습니다. 과거의 업적이 충분하지 않았다면, 이것이 우리가 은하에서 가장 숙련된 건설자라는 궁극적인 증거입니다.\n\n이제 만족 하십니까?"
 giga_dialog.1503.a:0 "우리가 진정한 천하의 주인이다."
 giga_ringworld_upgrade_tt:0 "이 지원 구역은 보정치가 만료된 후 완전한 기능을 갖춘 §Y$pc_ringworld_tech$§!로 업그레이드됩니다."
 giga_dialog.2401.name:0 "§H$name_ringworld_city$§!: [root.GetName] 덮인"
 giga_dialog.2401.desc:0 "도회지가 겹겹이 덮인 링 월드의 표면이 완성되었습니다.\n\n우리 고유의 인공 행성, 링 월드 구획은 사방 수천, 수만 km의 거대한 도시로 뒤덮였습니다. 수조명의 영혼을 수요할 수 있는 이 광대한 도시를 횡단하는데 수십년이 걸릴 것입니다."
 giga_dialog.2401.a:0 "인상적이군."
 giga_tech_ringworld_titanic_1:0 "초대규모 산란광 응용"
 giga_tech_ringworld_titanic_1_desc:0 "어떻게 우리가 따뜻한 항성 없이 광대하고 제한 없는 생태계를 유지할 수 있을까요? 답은 거주지의 대기권에 특수한 나노 화합물의 분사를 통해 인공적으로 빛을 산란시키는 것입니다. 그리하면 기이한 열-방출 과정을 통해 별이 없는 거주지의 표면을 거대한 난방기가 따뜻하게 만들기 쉬워집니다."
 giga_tech_ringworld_titanic_2:0 "$name_ringworld_titanic$ 건설"
 giga_tech_ringworld_titanic_2_desc:0 "링 월드 한 개는 진정 엄청난 위업입니다. 하지만 초월물질과 물류의 발전으로 인해, 같은 항성에 더 큰 거주 가능 공간을 제공하는, 훨씬 더 큰 두 번째 링 월드를 건설하는 것도 가능할지 모릅니다. 그렇게 하기 위해선, 다소 복잡한 가열 및 안정화 시스템이 필요할 것입니다."
 giga_dialog.2101.name:0 "$name_ringworld_titanic$ 건설"
 giga_dialog.2101.desc:0 "[giga_system.GetName] 주위의 거대한 링 월드 하나로는 부족했기 때문에, 이제 우리는 항성 주위에 두 번째인 훨씬 더 큰 링 월드를 건설할 준비가 되었습니다. 첫 링 월드 직경의 1.5배로, $name_ringworld_titanic$는 거주 가능 지구가 10개로, 완공되면 링 월드에 총 60개의 지구가 존재할 것입니다. 이 압도적으로 거대한 뼈대 건설을 시작해야합니다."
 giga_dialog.2101.a:0 "정말 웅장하군."
 giga_dialog.2102.name:0 "$name_ringworld_titanic$ 뼈대 완성"
 giga_dialog.2102.desc:0 "이제 [giga_system.GetName]의 주위에 거대한 뼈대의 건설이 완료되었습니다. 직경은 거의 15억 km로 이 웅장한 뼈대는 언젠가 은하에서 가장 큰 링 월드 중 하나를 지탱할 것입니다. 이제 실제 거주지에 대한 작업을 시작해야합니다."
 giga_dialog.2102.a:0 "많은 일들이 우리 앞에 놓여있다."
 giga_dialog.2103.name:0 "$name_ringworld_titanic$ 구획 완성"
 giga_dialog.2103.desc:0 "$name_ringworld_titanic$의 네 개의 거주 가능 구획 중 하나가 완성되었습니다! 우리의 생물학자가 만든 완전히 인공적이고 안정적인 생물권이 있어, 이 링 월드 구획은 개척할 수 있습니다."
 giga_dialog.2103.a:0 "다음."
 giga_dialog.2104.name:0 "$name_ringworld_titanic$ 완성!"
 giga_dialog.2104.desc:0 "끝났습니다. [giga_system.GetName] 성계에서 우리는 항성 주위로 두 번째인, 더 큰 링 월드를 건설하는데 성공했습니다. 네 개의 완전히 거주 가능한 구획으로, 이 진정 거대한 구조물은 우리의 공학적 능력에 대한 영원한 기억이 될 것입니다."
 giga_dialog.2104.a:0 "오늘은 멋진 날이군."
 giga_dialog.2105.name:0 "$name_ringworld_titanic$ 수리됨"
 giga_dialog.2105.desc:0 "[giga_system.GetName] 성계에 있는 폐허가 된 $name_ringworld_titanic$의 잔해에서 건설하여, 우리의 공학자들이 구획 중 하나를 간신히 완전 복구하였습니다. 최고의 행성학자들이 새로운 생물권을 거의 처음부터 만들어야겠지만, 이제 안정적이라 평가되고 개척이 가능합니다."
 giga_dialog.2105.a:0 "휼륭하군."
 ringworld_titanic_0:0 "$gc_mega$$name_ringworld_titanic$ 건설 현장"
 ringworld_titanic_0_DESC:0 "이 단지들은 $name_ringworld_titanic$의 기반을 건설하는데 필요한 자원들의 저장소이자 수천, 수만명의 건설인부들의 숙소들로 쓰입니다."
 ringworld_titanic_0_MEGASTRUCTURE_DETAILS:0 "£gigastructural£ $giga_list_category_megastructure$ - $giga_list_category_habitable_mega$\n일반 구획 크기의 §Y두 배§!인 구획을 §Y4§!개 가진 §Y링 월드§!로 확장합니다.\n§L$name_ringworld_titanic$는 기존 링 월드 성계를 기반으로 더 많은 거주 지역을 제공합니다."
 ringworld_titanic_1:0 "$name_ringworld_titanic$ 뼈대"
 ringworld_titanic_1_DESC:0 "이 초기 뼈대는 성계의 별을 감싸고 있으며 앞으로 지어질 완전히 거주 가능한 구획을 위한 플랫폼의 역할을 합니다."
 ringworld_t_3x_segment:0 "$name_ringworld_titanic$ 구획 뼈대"
 ringworld_t_3x_segment_DESC:0 "이 뼈대는 미완의 $name_ringworld_titanic$의 전체 표면적의 대략 1/4을 구성합니다. 아직 소형 거주 구역들의 공사가 끝나지 않았습니다."
 ringworld_titanic_2:0 "Completed $name_ringworld_titanic$ 구획"
 ringworld_titanic_2_DESC:0 "완전히 기능하는 거주 가능한 링 월드 구획으로, 정착할 준비가 되어있습니다."
 ring_world_titanic_ruined:0 "폐허가 된 $name_ringworld_titanic$"
 ring_world_titanic_ruined_DESC:0 "$name_ringworld_titanic$의 이 구획은 한때 작동하는 생물권을 지탱했지만 더 이상 그렇지 못합니다. 이론적으로는 수리가 가능합니다만, 진보된 기술과 대량의 자원이 필요합니다."
 ring_world_titanic_ruined_MEGASTRUCTURE_DETAILS:0 "$ring_world_titanic_ruined_DESC$"
 ring_world_titanic_restored:0 "$ringworld_titanic_2$"
 ring_world_titanic_restored_DESC:0 "$ringworld_titanic_2_DESC$"
 giga_tech_ringworld_behemoth:0 "$name_ringworld_behemoth$ 건설"
 giga_tech_ringworld_behemoth_desc:0 "엄청나게 성장하는 우리 제국의 인구는 대부분의 성계는 제공하지 못하는 수 마일의 도회지와 지방 지역을 필요로합니다. 어쩌면 세 번째 고리를 만들 시간일지도 모릅니다."
 giga_dialog.2201.name:0 "$name_ringworld_behemoth$ 건설"
 giga_dialog.2201.desc:0 "과도할 정도였지만, 우리의 끊임없는 야망을 충족시키지는 못한 것 같습니다. 이미 두 개의 거대한 링 월드가 존재하는 [giga_system.GetName] 성계에서, 이제 우리는 항성 주위에 세 번째 링 월드를 건설할 것입니다. 각 구획은 15개의 지구를 가지며, 링 월드가 완공되면 총 120개의 지구를 제공할 것입니다."
 giga_dialog.2201.a:0 "아직 링 월드가 부족하다."
 giga_dialog.2202.name:0 "$name_ringworld_behemoth$ 뼈대 완성"
 giga_dialog.2202.desc:0 "이제 [giga_system.GetName]의 주위에 초거대한 뼈대의 건설이 완료되었습니다. 직경은 거의 20억 km로 이 웅장한 뼈대는 언젠가 은하에서 가장 큰 링 월드 중 하나인 $name_ringworld_gargan$를 지탱할 것입니다. 이제 실제 거주지에 대한 작업을 시작해야합니다."
 giga_dialog.2202.a:0 "많은 일들이 우리 앞에 놓여있다."
 giga_dialog.2203.name:0 "$name_ringworld_behemoth$ 구획 완성"
 giga_dialog.2203.desc:0 "$name_ringworld_behemoth$의 네 개의 거주 가능 구획 중 하나가 완성되었습니다! 우리의 생물학자가 만든 완전히 인공적이고 안정적인 생물권이 있어, 이 링 월드 구획은 개척할 수 있습니다."
 giga_dialog.2203.a:0 "다음."
 giga_dialog.2204.name:0 "$name_ringworld_behemoth$ 완성!"
 giga_dialog.2204.desc:0 "다시 한 번 해냈습니다. [giga_system.GetName]의 주 항성 주위로 세 번째인 마음이 움찔해질정도로 거대한 링 월드가 건설되었습니다. 네 개의 거주 가능 구획을 자랑하는 진정 훌륭한 구조물은 공학적 능력의 측면에서 다른 모든 종족들을 부끄럽게 할 것입니다. 이 굉장한 삼중 링 월드는 역사에 우리의 능력을 영원히 기록할 것입니다."
 giga_dialog.2204.a:0 "정말 즐거운 날이군."
 giga_dialog.2205.name:0 "$name_ringworld_behemoth$ 수리됨"
 giga_dialog.2205.desc:0 "[giga_system.GetName] 성계에 있는 폐허가 된 $name_ringworld_behemoth$의 잔해에서 건설하여, 우리의 공학자들이 구획 중 하나를 간신히 완전 복구하였습니다. 최고의 행성학자들이 새로운 생물권을 거의 처음부터 만들어야겠지만, 이제 안정적이라 평가되고 개척이 가능합니다."
 giga_dialog.2205.a:0 "정말 웅장하군."
 ringworld_behemoth_0:0 "$gc_giga$$name_ringworld_behemoth$ 건설 현장"
 ringworld_behemoth_0_DESC:0 "이 단지들은 말도 안되게 거대한 $name_ringworld_behemoth$의 기반을 건설하는데 필요한 자원들의 저장소이자 수천, 수만명의 건설인부들의 숙소들로 쓰입니다."
 ringworld_behemoth_0_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_gigastructure$ - $giga_list_category_habitable_mega$\n일반 구획 크기의 §Y세 배§!인 구획을 §Y4§!개 가진 §Y이중 링 월드§!로 확장합니다.\n§L$name_ringworld_behemoth$는 기존 링 월드 성계를 기반으로 더 많은 거주 지역을 제공합니다."
 ringworld_behemoth_1:0 "$name_ringworld_behemoth$ 뼈대"
 ringworld_behemoth_1_DESC:0 "이 거대한 초기 뼈대는 성계의 별을 감싸고 있으며 앞으로 지어질 네 개의 완전히 거주 가능한 구획을 위한 플랫폼의 역할을 합니다."
 ringworld_behemoth_2:0 "$name_ringworld_behemoth$ 구획 완성"
 ringworld_behemoth_2_DESC:0 "완전히 기능하는 거주 가능한 링 월드 구획으로, 정착할 준비가 되어있습니다."
 ringworld_b_3x_segment:0 "$name_ringworld_behemoth$ 구획 뼈대"
 ringworld_b_3x_segment_DESC:0 "이 뼈대는 미완의 $name_ringworld_behemoth$의 전체 표면적의 대략 1/4을 구성합니다. 아직 소형 거주 구역들의 공사가 끝나지 않았습니다."
 ring_world_behemoth_ruined:0 "폐허가 된 $name_ringworld_behemoth$"
 ring_world_behemoth_ruined_DESC:0 "$name_ringworld_behemoth$의 이 구획은 한때 작동하는 생물권을 지탱했지만 더 이상 그렇지 못합니다. 이론적으로는 수리가 가능합니다만, 진보된 기술과 대량의 자원이 필요합니다."
 ring_world_behemoth_ruined_MEGASTRUCTURE_DETAILS:0 "$ring_world_behemoth_ruined_DESC$"
 ring_world_behemoth_restored:0 "$ringworld_behemoth_2$"
 ring_world_behemoth_restored_DESC:0 "$ringworld_behemoth_2_DESC$"
 giga_tech_ringworld_gargantuan_1:0 "초대규모 주거 안정화 시스템"
 giga_tech_ringworld_gargantuan_1_desc:0 "링 월드를 작아보이게 할 정도의 거대한 거주지 세상에 들어가려면, 새로운 형태의 안정화 및 물류 시스템이 개발되어야합니다. 그러한 시스템에는 구조물을 안정화할 현실적인 추진기 뿐만 아니라, 구조물의 내부 활동을 관리할 수 있는 소프트웨어 모두를 포함합니다."
 giga_tech_ringworld_gargantuan_2:0 "$name_ringworld_gargan$ 건설"
 giga_tech_ringworld_gargantuan_2_desc:0 "같은 항성을 둘러싼 세 개의 링 월드는 말 그대로 광기에 가깝습니다만, 네 번째는 어떨까요? 그러한 것은 바보같이 복잡한 공학과 물류 시스템이 필요할 것이지만, 우리는 이미 그 수준을 넘었습니다. 그러니 그냥 끝까지 가보는건 어떨까요?"
 giga_dialog.2301.name:0 "$name_ringworld_gargan$ 건설"
 giga_dialog.2301.desc:0 "또 다른 링 월드입니까? 이곳에 광물을 쏟아 붓는걸 참 좋아하시나보군요. 좋습니다. 훨씬 더 황당한걸 만들어 봅시다. 잘못될 일은 없을겁니다. 어쨌든, [giga_system.GetName] 성계에는 네 번째 링 월드를 위한 건설 현장이 있습니다. 네 번째 링 월드, 좋네요. 각각의 구획은 20개의 지구를 가지고, 완전해지면 총 200개의 지구를 가집니다."
 giga_dialog.2301.a:0 "링 월드가 너무 많아도 문제는 없어."
 giga_dialog.2302.name:0 "$name_ringworld_gargan$ 뼈대 완성"
 giga_dialog.2302.desc:0 "이제 [giga_system.GetName]의 주위에 터무니없이 거대한 뼈대의 건설이 완료되었습니다. 직경은 거의 25억 km... 잘 알고 있지 않습니까. 당신의 조언자가 이 프로젝트에 대한 당신의 집착에 대해 걱정하기 시작했다는 것을 알아뒀으면 좋겠습니다."
 giga_dialog.2302.a:0 "많은 일들이 있겠지."
 giga_dialog.2303.name:0 "$name_ringworld_gargan$ 거주지 완성"
 giga_dialog.2303.desc:0 "$name_ringworld_gargan$의 거주 가능한 구획 10개 중 하나가 완성되었습니다. 우리 생물학자들이 만든 완전히 인공적이고 안정적인 생물권이 특징인 이 링 월드 구획은 이제 거주 가능한 준비가 되었습니다.\n그래서, 이거 다 쓰기는 할거에요?"
 giga_dialog.2303.a:0 "당연하지. 다음."
 giga_dialog.2304.name:0 "$name_ringworld_gargan$ 완성!"
 giga_dialog.2304.desc:0 "다시 한 번 해냈습니다. [giga_system.GetName] 성계에 우리는 '네 번째' 링 월드를 건설했습니다. 벌써 과거의 업적으로는 만족할 수 없다면, 이것이야말로 우리가 은하 최고의 공학자라는 것을 증명해줄 것입니다.\n\n혹시 열등감이나 그런거 있으십니까?"
 giga_dialog.2304.a:0 "놀라운 업적이다."
 giga_dialog.2305.name:0 "$name_ringworld_gargan$ 수리됨"
 giga_dialog.2305.desc:0 "[giga_system.GetName] 성계에 있는 폐허가 된 $name_ringworld_gargan$의 잔해에서 건설하여, 우리의 공학자들이 구획 중 하나를 간신히 완전 복구하였습니다. 최고의 행성학자들이 새로운 생물권을 거의 처음부터 만들어야겠지만, 이제 안정적이라 평가되고 개척이 가능합니다."
 giga_dialog.2305.a:0 "놀랍군."
 ringworld_gargantuan_0:0 "$gc_giga$$name_ringworld_gargan$ 건설 현장"
 ringworld_gargantuan_0_DESC:0 "이 단지들은 터무니없이 거대한 $name_ringworld_gargan$의 기반을 건설하는데 필요한 자원들의 저장소이자 수천, 수만명의 건설인부들의 숙소들로 쓰입니다."
 ringworld_gargantuan_0_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_gigastructure$ - $giga_list_category_habitable_mega$\n일반 구획 크기의 §Y네 배§!인 구획을 §Y4§!개 가진 §Y삼중 링 월드§!로 확장합니다.\n§L$name_ringworld_gargan$는 기존 링 월드 성계를 기반으로 더 많은 거주 지역을 제공합니다.§!"
 ringworld_gargantuan_1:0 "$name_ringworld_gargan$ 뼈대"
 ringworld_gargantuan_1_DESC:0 "이 거대한 초기 뼈대는 성계의 별을 감싸고 있으며 앞으로 지어질 탄성이 나오는 네 개의 완전히 거주 가능한 구획을 위한 플랫폼의 역할을 합니다."
 ringworld_gargantuan_2:0 "Completed $name_ringworld_gargan$ 구획"
 ringworld_gargantuan_2_DESC:0 "완전히 기능하는 거주 가능한 링 월드 구획으로, 개척할 준비가 되어있습니다."
 ringworld_g_3x_segment:0 "$name_ringworld_gargan$ 구획 뼈대"
 ringworld_g_3x_segment_DESC:0 "이 뼈대는 미완의 $name_ringworld_gargan$의 전체 표면적의 대략 1/4을 구성합니다. 아직 소형 거주 구역들의 공사가 끝나지 않았습니다. 그런데 이렇게 많은 거주지가 다 어디에 필요하십니까?"
 ring_world_gargantuan_ruined:0 "폐허가 된 $name_ringworld_gargan$"
 ring_world_gargantuan_ruined_DESC:0 "$name_ringworld_gargan$의 이 구획은 한때 작동하는 생물권을 지탱했지만 더 이상 그렇지 못합니다. 이론적으로는 수리가 가능합니다만, 진보된 기술과 대량의 자원이 필요합니다."
 ring_world_gargantuan_ruined_MEGASTRUCTURE_DETAILS:0 "$ring_world_gargantuan_ruined_DESC$"
 ring_world_gargantuan_restored:0 "$ringworld_gargantuan_2$"
 ring_world_gargantuan_restored_DESC:0 "$ringworld_gargantuan_2_DESC$"
 giga_tech_nidavellir:0 "시공간 합금 단조"
 giga_tech_nidavellir_desc:0 "합금 기술의 정점입니다. 첨단 시공간 조작과 함께 중성자별의 반-물리학적 성질을 사용해, 중성자별의 특성을 광물 정제 과정으로 활용할 수 있게 되었습니다. 이는 합금의 대량생산을 사소한 것으로 만들 것입니다. 합금이 추출된 뉴트로늄과 혼합되면 지성있는 종족이 이제껏 만든 무기 중에서 가장 완전하고 강력한 무기, 시공간 그 자체를 휘어버릴 수 있는 무기로 바꿀 수 있습니다. 이는 은하에 알려진 가장 진보한 기술을 사용한 중성자별 주위의 거대한 고리형 구조물을 필요로 할것입니다."
 giga_dialog.801.name:0 "$name_nidavellir$ 건설 현장 완성"
 giga_dialog.801.desc:0 "[giga_system.GetName] 성계에 $name_nidavellir$의 건설 현장이 완성되었습니다! 이 발판 위에서 우리는 이 중성자별을 완전히 감싸는 거대한 구조물을 건설할 것입니다. 이 구조물은 정말 엄청난 양의 광물을 순수한 합금으로 제련할 수 있을 것입니다."
 giga_dialog.801.a:0 "좋아."
 giga_dialog.802.name:0 "$name_nidavellir$ 내부 고리 완성"
 giga_dialog.802.desc:0 "$name_nidavellir$의 내부 고리가 완성되었습니다. 이는 재앙과 같은 실패를 방지하는 첨단 안정화 기기들을 수용하고 있고 제한된 광물 제련 수용량을 지니고 있습니다."
 giga_dialog.802.a:0 "환상적이야."
 giga_dialog.803.name:0 "$name_nidavellir$ 발전 고리 완성"
 giga_dialog.803.desc:0 "$name_nidavellir$의 발전 고리를 완성했습니다! 중성자별의 무시무시한 에너지를 흡수할 수 있는 이 두 번째 고리는 초거대 제련소의 나머지 첨단 주조소에 동력을 공급할 것입니다."
 giga_dialog.803.a:0 "훌륭해."
 giga_dialog.804.name:0 "$name_nidavellir$ 처리 고리 완성"
 giga_dialog.804.desc:0 "$name_nidavellir$의 처리 고리가 완공되었습니다. 이 거대한 주조소는 들어오는 광물과 추출된 뉴트로늄을 융합해 은하에서 가장 순수하고 비견될 수 없는 수준의 합금을 단조합니다."
 giga_dialog.804.a:0 "좋아. 거의 다 됐군."
 giga_dialog.805.name:0 "$name_nidavellir$ 완성!"
 giga_dialog.805.desc:0 "환상적인 소식입니다! 마침내 $name_nidavellir$가 완성되었습니다. 마지막 고리가 완전히 완성되었으며, 제련소의 거대한 중력 광선은 중성자별에서 엄청난 양의 에너지와 뉴트로늄을 빨아들이고 있습니다. 이 뉴트로늄은 광물과 함께 합금을 형성하는데 사용될 것입니다. 이 진정으로 경외심을 불러일으키는 거대한 구조물은 진정한 우리의 공학에 대한 숙달의 증거입니다."
 giga_dialog.805.a:0 "놀라워!"
 nidavellir_forge_0:0 "$gc_giga$$name_nidavellir$ 건설 현장"
 nidavellir_forge_0_DESC:0 "$name_nidavellir$를 위한 건설 현장으로, 지금까지 설계된 가장 고급 합금 주조소입니다. 충분한 광물이 있다면 거의 무한한 양의 합금을 제공할 것입니다."
 nidavellir_forge_0_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_gigastructure$ - $giga_list_category_advanced_resource_production$ \n§Y중성자별§!이나 §Y펄사§!를 이용해 £minerals£ §Y광물§!을 £alloys£ §Y합금§!으로 주조하며 전체 §Y합금 생산량§!을 증가시킵니다 - $giga_list_removes_system_planets$\n§L중성자별 주위로 건설된 거대한 주조소로, 별의 에너지를 사용해 합금을 주조합니다.§!"
 nidavellir_forge_0_CONSTRUCTION_INFO_DELAYED:0 "$giga_list_additional_data$ - §Y핵융합 억제기§!로 만든 §Y중성자별§!은 §Y니다벨리르 제련소§!에 적합하지만, §Y니콜-다이슨 광선§!으로 생성된 것은 그렇지 않습니다. §Y중성자 제련소§!와 겹쳐질 수 있습니다."
 nidavellir_forge_1:0 "$name_nidavellir$ 내부 고리"
 nidavellir_forge_1_DESC:0 "$name_nidavellir$로의 첫 발걸음입니다. 이 내부 고리는 구조물 전체를 안정화하는 역할을 합니다. 기본적인 합금 제련 수용량을 제공합니다."
 nidavellir_forge_2:0 "$name_nidavellir$ 발전 고리"
 nidavellir_forge_2_DESC:0 "초거대 제련소의 두 번째 고리는 굉장히 강력한 발전기가 구조물의 기계 대부분에 동력을 공급하며 중성자별의 이상한 특성을 차단합니다."
 nidavellir_forge_3:0 "$name_nidavellir$ 처리 고리"
 nidavellir_forge_3_DESC:0 "세 번째 고리는 거대한 처리 시설과 함께 특수한 공간-시간 조작 기계를 가지고 있습니다. 이는 들어오는 광물과 추출된 뉴트로늄을 혼합해 이제껏 보지못한 효율로 순수 합금을 만들어낼 것입니다."
 nidavellir_forge_4:0 "$name_nidavellir$"
 nidavellir_forge_4_DESC:0 "완전히 작동하는 $name_nidavellir$입니다. 엄청나게 강력한 채굴 광선이 별에서 나오는 엄청난 양의 에너지와 뉴트로늄을 흡수하고, 전문화된 주조 고리는 우주에서 가장 강력한 무기를 만들기 위해 시공간 조작을 활용하고 있습니다."
 giga_tech_hyperstructural_ass:0 "거대 조선 시설"
 giga_tech_hyperstructural_ass_desc:0 "때때로, 가장 거대한 성채조차도 제국의 생산 요구를 충족할 만큼 충분한 조선소를 가지고 있지는 않습니다. 답은 단순합니다, 더 크게 만드는 겁니다. 더 크게. $name_hyperstructural_ass$는 $name_eq_shipyard$와 비슷합니다. 별 주위에 지어진 압도적으로 거대한 구조물로 안쪽에는 항성 리프트 고리를, 바깥쪽에는 조선소 고리를 가졌습니다. 무지막지하게 큰 구조물은 막대한 함선 건조 능력 뿐만 아니라 엄청난 함선 수용력 또한 제공할 것입니다."
 giga_dialog.3701.name:0 "$name_hyperstructural_ass$ 건설 현장 완성"
 giga_dialog.3701.desc:0 "[giga_system.GetName]의 $name_hyperstructural_ass$를 위한 건설 현장이 완성되었습니다! 지금 당장은 그렇게 괜찮아 보이지 않을지도 모르지만, 이 발판은 이제껏 은하에서 보지 못한 가장 거대하고 효율적인 조선소, 즉 아주 많은 함선을 동시에 건조할 조선소를 건설할 것입니다."
 giga_dialog.3701.a:0 "좋아."
 giga_dialog.3702.name:0 "$name_hyperstructural_ass$ 내부 고리 완성"
 giga_dialog.3702.desc:0 "$name_hyperstructural_ass$의 내부 고리가 완성되었습니다! 막대한 융합 반응로와 특수 정제 시설을 수용하고 있는 이 고리는 아직은 건설되지 않은 항성 리프트 펌프에서 추출된 플라스마를 처리할 것입니다. 처리된 플라스마의 일부는 구조물을 유지하기 위한 합금으로 변환될 것이고, 나머지는 광물로 내보내질 것입니다.\n이 구조물을 작동하는데 상당한 숫자의 과학자들이 필요하기 때문에 많은 공학 연구 비용이 든다는 것을 명심하십시오."
 giga_dialog.3702.a:0 "좋아."
 giga_dialog.3703.name:0 "$name_hyperstructural_ass$ 항성 펌프 완성"
 giga_dialog.3703.desc:0 "항성 리프트 펌프가 완성 되어, 우리의 $name_hyperstructural_ass$가 항성 플라스마를 추출하고 합성하여 소량의 광물을 생산하기 시작했습니다. 이제 바깥쪽 고리의 건설을 시작해야합니다. 바깥쪽 고리는 그 자체로도 엄청난 양의 조선소단지를 수용할 것입니다."
 giga_dialog.3703.a:0 "놀라워."
 giga_dialog.3704.name:0 "$name_hyperstructural_ass$ 외부 고리 완성"
 giga_dialog.3704.desc:0 "조선소의 바깥 고리의 완성으로 무한한 함대 생산에 대한 꿈에 한 단계 더 가까워졌습니다. 거대한 트러스 구조물로 내부 고리와 연결된 이 구조물은 필요한 모든 자원으로 미래의 조선소에 연료를 공급하는데 필요한 시설을 수용하고 있습니다. 이제 마지막으로 조선소 그 자체를 건설하여 이 프로젝트를 끝내야합니다!"
 giga_dialog.3704.a:0 "곧, 아무도 우리를 막을 수 없을 것이다."
 giga_dialog.3705.name:0 "$name_hyperstructural_ass$ 완성!"
 giga_dialog.3705.desc:0 "마침내 수십 년간의 고된 작업과 수 많은 합금이 소비된 이후 우리의 $name_hyperstructural_ass$는 완성되었습니다. 거대한 규모의 조선소는 단시간에 엄청난 양의 함선을 건조할 수 있어 운하 전체에서 우리의 절대적 우위의 해군을 보장해 줄 것입니다."
 giga_dialog.3705.a:0 "끝났다. 이제 우리는 진정한 은하계의 주인이다."
 hyperstructural_ass_0:0 "$gc_giga$$name_hyperstructural_ass$ 건설 현장"
 hyperstructural_ass_0_DESC:0 "유례 없는 생산 능력을 지닌 거대한 조선소인 $name_hyperstructural_ass$를 위한 건설 현장입니다."
 hyperstructural_ass_0_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_gigastructure$ - $giga_list_category_ship_production$ §H(90 조선소)§!\n§Y항성§!을 수확하여 §Y함선§!을 조립하고 §Y해군 용량§! 및 §Y함선 건조 속도§!를 생산합니다. - $giga_list_removes_system_planets$ - $giga_list_category_requires_starbase_uplink$\n§L함대를 조립하기 위한 조선소와 정박지가 있는 시스템을 가로지르는 복합체입니다.§!\" #megalistentry Hyperstructural Assembly Yard"
 hyperstructural_ass_0_CONSTRUCTION_INFO_DELAYED:0 "$giga_list_additional_data$ - 구조물의 막대한 전력 요구량 때문에 스펙트럼형이 §YA§! 혹은 §YB§!인 별 주위에 건설해야 합니다."
 hyperstructural_ass_1:0 "$name_hyperstructural_ass$ 내부 고리"
 hyperstructural_ass_1_DESC:0 "이 거대한 고리는 함선 건조와 구조 유지 둘 모두를 위해 항성에서 추출된 대량의 플라스마를 처리하는데 필요한 기계를 가지고 있습니다."
 hyperstructural_ass_2:0 "$name_hyperstructural_ass$ 플라스마 펌프"
 hyperstructural_ass_2_DESC:0 "여섯 개의 거대한 플라스마 펌프가 특수한 추출 중력 광선 덕분에 별의 광구에서 플라스마를 추출할 수 있게 되었습니다. 플라스마의 일부는 광물로 융합되고 나머지는 이 거대한 구조물을 유지하는데 사용됩니다."
 hyperstructural_ass_3:0 "$name_hyperstructural_ass$ 외부 고리"
 hyperstructural_ass_3_DESC:0 "조선소의 바깐 고리는 이 초거대 구조물에 곧 추가될 엄청난 양의 조선소들을 지탱하는데 필요한 시설을 담고 있습니다. 이곳에는 대량의 광물과 합금 또한 저장합니다."
 hyperstructural_ass_4:0 "$name_hyperstructural_ass$"
 hyperstructural_ass_4_DESC:0 "6개의 항성 리프팅 펌프로 구동되는 이 거대한 성계 단위 조선소는 타의 추종을 불허하는 생산 능력을 가지고 있습니다. 90개의 조선소 슬롯과 35% 함선 건조 속도를 제공합니다."
 giga_tech_disco_moon:0 "초대규모 굴절 장치"
 giga_tech_disco_moon_desc:0 "시민의 인생은 고달픕니다. 가까운 위성을 수정판과 지하 조명로 덮어버리면, 이 위성은 행성의 하늘에 아름다운 오로라와 빛을 투영할 수 있을 것입니다. 그러한 장엄한 현상은 우리 국민의 사기에 긍정적인 영향을 미칠것이 틀림 없습니다."
 giga_dialog.201.name:0 "$name_discomoon$ 건설 현장 완성"
 giga_dialog.201.desc:0 "우리의 공학자들이 [giga_system.GetName] 성계에 $name_discomoon$의 건설 현장을 완성했습니다. 이 발판 위에서 우리는 위성을 덮는 거대한 수정 덮개를 만들 것입니다. 수정 덮개는 지하 조명가 쏘는 빛을 굴절시켜 근처 행성계의 모든 사람들에게 보이는 아름다운 빛의 선을 만들어낼 것입니다.\n\n가까운 모든 행성과 위성에 통합력과 편의, 행복도, 그리고 무역 가치에 긍정적인 효과를 줍니다."
 giga_dialog.201.a:0 "반짝반짝 작은 별~"
 giga_dialog.202.name:0 "$name_discomoon$ 내부 완성"
 giga_dialog.202.desc:0 "$name_discomoon$의 내부 공사가 완료되었습니다. 지각 밑에 설치하여, 내부에는 전원 공급기와 대량의 조명가 있습니다. 마지막으로 수정판이 설치된다면 수정판을 통해 빛날 것입니다."
 giga_dialog.202.a:0 "환상적이야."
 giga_dialog.203.name:0 "$name_discomoon$ 완성!"
 giga_dialog.203.desc:0 "거대 공학의 위업으로 위성 표면 전체가 [giga_system.GetName]의 광택 수정판들로 뒤덮혔습니다. 광대한 지하 조명 네트워크는 이제 이 판들을 통해 빛을 발하고 있으며 근처 행성계의 모든 하늘에 경이로운 광선을 비추고 있습니다."
 giga_dialog.203.a:0 "장관이군!"
 lunar_disco_ball_0:0 "$gc_mega$$name_discomoon$ 건설 현장"
 lunar_disco_ball_0_DESC:0 "가까운 행성들의 하늘에 아름다운 빛을 투사하도록 설계된 행성 수정 덩어리인, $name_discomoon$을 위한 건설 현장입니다."
 lunar_disco_ball_0_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_megastructure$ - $giga_list_category_miscellaneous$\n§Y지역 행성계§!에 §Y편의§!와 £unity£ §Y통합력§!, §Y무역 가치§!를 줍니다\n§L근처 행성의 하늘에 경이로운 오로라를 투사하는 장치입니다. 여러가지 모드가 있으며 토글할 수 있습니다."
 lunar_disco_ball_1:0 "$name_discomoon$ 뼈대"
 lunar_disco_ball_1_DESC:0 "이 뼈대는 아름다운 색의 빛을 만들어 수정판을 통해 빛이나게 될 지하 발전기로 구성되어있습니다. 이제 프로젝트를 완료하기 위해 수정판을 설치해야합니다."
 lunar_disco_ball_2:0 "$name_discomoon$"
 lunar_disco_ball_2_DESC:0 "위성 설치된 행성 단위 결정판 배열. 지하에 있는 투사기는 결정판에 빛을 비추고, 그 결과 근방의 행성에서 볼 수 있는 경이로운 빛의 연극과 오로라를 만들어 냅니다."
 giga_tech_equatorial_shipyard:0 "용암 행성 조선 시설"
 giga_tech_equatorial_shipyard_desc:0 "용암 행성은 우리의 조선소를 확장하는데 매우 큰 잠재력을 가지고 있습니다. 우리는 행성의 지열을 활용해 시설에 전력을 공급하고 자원을 수집해 함선 건조에 활용할 수 있습니다. 이러한 행성에 특수 수집 링을 설치하는 것은 매우 유용할 것입니다."
 giga_dialog.3601.name:0 "$name_eq_shipyard$ 건설 현장 완성"
 giga_dialog.3601.desc:0 "[giga_system.GetName] 성계의 용암형 행선 주위에서 완성된 $name_eq_shipyard$를 위한 건설 현장입니다. 이 궤도 플랫폼은 대량의 합금을 정제해 함선을 만들기 위한 두 개의 고리를 행성 주위에 건설하는데 사용됩니다.\n\n항성의 위성이 있다면 이 과정에서 사라질 것입니다."
 giga_dialog.3601.a:0 "좋아."
 giga_dialog.3602.name:0 "$name_eq_shipyard$ 뼈대 완성"
 giga_dialog.3602.desc:0 "[giga_system.GetName] 성계의 $name_eq_shipyard$가 완성에 한걸음 더 가까워졌습니다. 고리의 뼈대가 건설되었고, 이제 고리 그 자체에 대한 작업을 시작해야합니다. 안쪽의 고리는 합금과 에너지에 전념하게될 개척 가능한 거주지가 될 것입니다."
 giga_dialog.3602.a:0 "훌륭해."
 giga_dialog.3603.name:0 "$name_eq_shipyard$ 완성!"
 giga_dialog.3603.desc:0 "멋진 소식입니다! 우리의 공학자들이 [giga_system.GetName] 성계의 $name_eq_shipyard$가 완전히 작동한다고 알립니다! 안쪽의 고리는 개척할 준비가 되었으며, 바깥 고리의 조선소는 완전히 활성화 되었습니다."
 giga_dialog.3603.a:0 "놀랍군!"
 eq_shipyard_0:0 "$gc_mega$$name_eq_shipyard$ 건설 현장"
 eq_shipyard_0_DESC:0 "합금 처리 고리와 조선소 고리를 포함한 $name_eq_shipyard$를 위한 건설 현장입니다."
 eq_shipyard_0_MEGASTRUCTURE_DETAILS:0 "£galwonders£ $giga_list_category_megastructure$ - $giga_list_category_ship_production$ §H(조선소 8)§! - $giga_list_category_habitable_mega$\n§Y용암 행성§!을 채굴해 §Y함선§!을 조립하고 £alloys£ §Y합금§!을 생산합니다\n$giga_list_category_requires_starbase_uplink$\n§L용암 행성 주위의 두 개의 고리가 합금 생산과 함선 건조에 사용됩니다."
 eq_shipyard_0_CONSTRUCTION_INFO_DELAYED:0 "$giga_list_additional_data$ - £alloys£ §Y$alloys$§!과 £energy£ §Y$energy$§!, 그리고 활성화되어 있다면, £giga_sr_amb_megaconstruction£ §Y$giga_sr_amb_megaconstruction$§!를 생산할 수 있는 지구가 있습니다. £job_foundry£ $planet_metallurgists$의 생산량이 크게 상승하며 유지비가 감소합니다."
 eq_shipyard_1:0 "$name_eq_shipyard$ 뼈대"
 eq_shipyard_1_DESC:0 "용암 행성 주위에 뻗은 거대한 뼈대입니다. 안쪽의 고리는 용암 행성에서 광물을 추출하고 광물을 합금으로 처리합니다. 반면 바깥쪽의 고리는 함선 건조를 지원하는 거대한 조선소 기능을 할 것입니다."
 eq_shipyard_2:0 "$name_eq_shipyard$"
 eq_shipyard_2_DESC:0 "수많은 전함을 조립할 수 있으며, 행성을 공전하는 거대한 시설입니다."
 building_giga_equatorial_factory:0 "민간 재처리 공장"
 building_giga_equatorial_factory_plural:0 "민간 재처리 공장"
 building_giga_equatorial_factory_desc:0 "이 작업장에서는 고리의 1차 제련소에서 단조된 금속을 다양한 소비자 제품으로 가공합니다."
 mod_district_giga_planet_alloys_artisan_replacement:0 "$district_giga_planet_alloys_plural$은 £job_foundry£ [GetAlloyProducer] 직업 하나를 [GetArtisanIcon] [GetArtisan] 직업으로 대체합니다."
 mod_district_giga_planet_alloys_artisan_replacement_short:0 "£job_foundry£ -> [GetArtisanIcon]"
 giga_tech_crystal_megabore:0 "핵 수정 채굴"
 giga_tech_crystal_megabore_desc:0 "희귀 크리스탈은 천체의 내부에서 극도로 높은 온도와 압력이 만나 형성됩니다. 그리고나면 확률적으로 표면에 나와 채취할 수 있습니다. 그러나 핵까지 바로 채굴해 핵에서 귀중한 수정을 직접 채취하는 것으로 이러한 확률적 요소를 배제할 수 있습니다."
 giga_dialog.3501.name:0 "$name_crystal_megabore$ 건설 현장 완성"
 giga_dialog.3501.desc:0 "[giga_system.GetName] 성계에서 $name_crystal_megabore$를 위한 건설 현장이 완성되었습니다. 이 발판 위에서 우리는 용암 행성의 핵까지 직접적으로 거대한 레이저 채굴 광선을 발사해 핵에서 순수한 수정을 채취할 거대한 우주 기지를 건설할 것입니다."
 giga_dialog.3501.a:0 "좋아."
 giga_dialog.3504.name:0 "$name_crystal_megabore$ 완성!"
 giga_dialog.3504.desc:0 "[giga_system.GetName] 성계의 $name_crystal_megabore$가 완공되었습니다! 거대한 궤도 레이저 광선이 달린 굴착기는 이 행성의 지각과 맨틀을 뚫고 핵에 닿을 것입니다. 대량의 수정과 광물을 무시무시한 행성의 중심에서 뽑아내고 있습니다. 이 물질은 분명 우리의 산업에 매우 유용할 것입니다."
 giga_dialog.3504.a:0 "놀랍군!"
 crystal_megabore_0:0 "$gc_kilo$$name_crystal_megabore$ 건설 현장"
 crystal_megabore_0_DESC:0 "이 궤도 플랫폼은 이 용암 행성 주위에 건설된 $name_crystal_megabore$를 위한 건설 현장입니다. 여기에는 이 거대한 우주 기지의 건설 시작을 위해 필요한 인력과 시설들이 있습니다."
 crystal_megabore_0_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_kilostructure$ - $giga_list_category_strategic_resource_production$\n£rare_crystals£ §YRare Crystals§!와 £food£ §YFood§!의 매장량을 드러내고 증폭시킵니다 §Y얼음 행성§!에서.\n§L얼음 껍질을 궤도로 녹이며, 크리스탈 메가보어는 얼음 행성의 지하 해양을 드러내고 고압의 결정체 매장량을 수확하며 해양 생물을 식용 물질로 가공합니다.§!"
 crystal_megabore_0_CONSTRUCTION_INFO_DELAYED:0 "$sr_mega_extra_data$"
 crystal_megabore_1:0 "$name_crystal_megabore$ 정제 중추"
 crystal_megabore_1_DESC:0 "완전히 작동하는 $name_crystal_megabore$로, 행성의 이전 해양에서 대량의 결정과 광물을 직접 끌어옵니다."
 giga_subsurface_ocean:0 "번성하는 지표하 해양"
 giga_subsurface_ocean_desc:0 "이 얼어붙은 세계의 얼음 지각 아래에는 모든 형태와 크기의 수많은 수중 생명체가 서식하는 따뜻하고 염분이 있는 바다가 흐릅니다. 이들은 흥미로운 연구 기회를 제공하며, 약간의 투자를 통해 영양가 있는 생물 자원의 원천이 될 수도 있습니다."
 giga_tech_succ:0 "광범위 대기 노천 채굴"
 giga_tech_succ_desc:0 "거대 가스 행성의 대기에는 외계 가스나 불안정 분말과 같은 자원으로 가득합니다. 융합 정제 시설과 함께 거대한 견인 광선을 사용하면, 거대 가스 행성의 대기에서 모든 자원을 지속적으로 채취할 수 있을 것입니다."
 giga_tech_orbital_arcologies:0 "궤도 링 월드 아콜로지"
 giga_tech_orbital_arcologies_desc:0 "행성이 성장하고 발전함에 따라, 대개의 경우에는 추가 지구를 위한 공간이 모자랍니다. 행성의 적도 주위로 거대한 링 월드를 건설함으로써, 대량의 가용 공간이 생겨날 것입니다."
 giga_tech_orbital_arcologies_overlord:0 "궤도 링 아콜로지"
 giga_tech_orbital_arcologies_overlord_desc:0 "일반적으로 행성의 성장과 개발은 추가 지구를 위한 공간을 빠르게 소진합니다. 궤도 링의 주거 구역을 확장하여 많은 양의 사용 가능한 공간을 창출할 수 있습니다."
 giga_dialog.901.name:0 "$name_orbital_arcology$ 건설 현장 완성"
 giga_dialog.901.desc:0 "[giga_system.GetName] 성계의 $name_orbital_arcology$를 위한 건설 현장이 완성되었습니다. 이 플랫폼은 이 행성 주위에 행성의 최대 지구 수용량을 늘리는 거대한 궤도 링을 건설할 기지의 역할을 합니다. 행성이 클수록 더 좋은 효과를 얻지만 비용이 더 많이 듭니다."
 giga_dialog.901.a:0 "좋아."
 giga_dialog.902.name:0 "$name_orbital_arcology$ 완성"
 giga_dialog.902.desc:0 "§Y[giga_system.GetName]§! 성계에서 $name_orbital_arcology$가 완성되었습니다! 이 커다란 링은 행성 적도 근처에 뻗어 있으며 우리 산업에 방대한 공간을 제공합니다.\n\n이것은 §Y20%§! 추가 §B지구 슬롯§! 을 §Y[giga_planet.GetName]§!에 제공합니다."
 giga_dialog.902.a:0 "훌륭해."
 giga_dialog.903.name:0 "$name_orbital_arcology$ 강화됨"
 giga_dialog.903.desc:0 "행성의 극점을 도는 두 번째 고리가 건설됨으로써 §Y[giga_planet.GetName]§! $name_orbital_arcology$가 강화되었습니다.\n\n추가적인 고리는 §Y[giga_planet.GetName]§!에 §Y20%§! 더 많은 총 §Y40%§!의 §B지구 슬롯§!을 제공합니다."
 giga_dialog.903.a:0 "훌륭하군요."
 giga_dialog.904.name:0 "$name_orbital_arcology$ 최대화됨"
 giga_dialog.904.desc:0 "행성의 극점을 도는 세 번째 고리가 건설됨으로써 §Y[giga_planet.GetName]§! $name_orbital_arcology$가 최대화되었습니다.\n\n추가적인 고리는 §Y[giga_planet.GetName]§!에 §Y20%§! 더 많은 총 §Y60%§!의 §B지구 슬롯§!을 제공합니다."
 giga_dialog.904.a:0 "훌륭하군요."
 orbital_arcology_0:0 "$gc_mega$$name_orbital_arcology$ 건설 현장"
 orbital_arcology_0_DESC:0 "$name_orbital_arcology$를 위한 건설 현장으로 이 행성을 둘러싸는 축소형 링 월드입니다. 이 링 월드는 우리 산업을 위한 거대한 공간을 제공할 것입니다."
 orbital_arcology_0_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_megastructure$ - $giga_list_category_miscellaneous$ \n§Y식민지§!에 §Y추가 지구§!를 제공합니다. §Y행성의 §Y크기§!에 따라 §Y비용§!과 §Y보너스§!가 달라집니다\n§L행성 주위의 작은 링 월드로, 추가적인 지구 슬롯을 제공합니다. 행성 기지창과 같은 다른 궤도 구조물과 같이 건설될 수 없습니다.§!"
 orbital_arcology_0_CONSTRUCTION_INFO_DELAYED:0 "$giga_list_additional_data$ - 행성의 §Y궤도 슬롯§!을 차지하기 때문에, §Y행성 기지창§!과 겹쳐질 수 없습니다."
 orbital_arcology_0_s:0 "$orbital_arcology_0$"
 orbital_arcology_0_s_DESC:0 "$orbital_arcology_0_DESC$"
 orbital_arcology_0_s_MEGASTRUCTURE_DETAILS:0 "$orbital_arcology_0_MEGASTRUCTURE_DETAILS$"
 orbital_arcology_0_m:0 "$orbital_arcology_0$"
 orbital_arcology_0_m_DESC:0 "$orbital_arcology_0_DESC$"
 orbital_arcology_0_m_MEGASTRUCTURE_DETAILS:0 "$orbital_arcology_0_MEGASTRUCTURE_DETAILS$"
 orbital_arcology_0_l:0 "$orbital_arcology_0$"
 orbital_arcology_0_l_DESC:0 "$orbital_arcology_0_DESC$"
 orbital_arcology_0_l_MEGASTRUCTURE_DETAILS:0 "$orbital_arcology_0_MEGASTRUCTURE_DETAILS$"
 orbital_arcology_1_s:0 "$name_orbital_arcology$"
 orbital_arcology_1_s_DESC:0 "중간 크기의 행성을 둘러쌓아 추가 지구를 제공하는 축소형 링 월드입니다."
 orbital_arcology_1_m:0 "$orbital_arcology_1_s$"
 orbital_arcology_1_m_DESC:0 "$orbital_arcology_1_s_DESC$"
 orbital_arcology_1_l:0 "$orbital_arcology_1_s$"
 orbital_arcology_1_l_DESC:0 "$orbital_arcology_1_s_DESC$"
 decision_giga_build_orbital_arcology_effect:0 "이것은 §Y행성 크기§! 당 §Y200§!의 £alloys£을 사용하여 행성 주위에 §Y궤도 아콜로지§! 건설을 시작할 것입니다.\n\n기본 건설 시간 §Y900일§!이 지나 완공되면 이 축소형 링 월드는 £alloys£§Y5§! 와 £energy£§Y15§!의 유지비를 대가로 §Y20%§!의 추가 §B지구 슬롯§!을 §Y[ROOT.GetName]§!에 제공합니다.\n\n이것의 건설은 §Y행성 기지창§!의 건설을 막지만, §Y오비탈 링§!의 건설은 가능합니다."
 decision_giga_build_orbital_arcology:0 "궤도 아콜로지 건설"
 decision_giga_build_orbital_arcology_desc:0 "[ROOT.GetName]는 심각한 공간 부족에 시달리고 있습니다. 이 행성의 주변에 궤도 아콜로지를 건설하는 것은 행성의 활용 가능 공간을 상당히 확장할 수 있습니다."
 decision_giga_upgrade_orbital_arcology_effect:0 "이 행성 주위의 §Y궤도 아콜로지§!를 §Y강화된 궤도 아콜로지§!로 업그레이드 합니다. 비용은 §Y행성 크기§!당 £alloys£ §Y250§!입니다.\n\n기본 건설 시간인 §Y1000일§!이 지난 뒤, 이 소형 링 월드는 §Y[ROOT.GetName]§!에 추가적으로 §Y20%§!의 §B지구 슬롯§!을 제공하며(총 §Y40%§!), 유지비는 £alloys£ §Y10§! 및 £energy£ §Y30§!입니다."
 decision_giga_upgrade_orbital_arcology:0 "강화된 궤도 아콜로지"
 decision_giga_upgrade_orbital_arcology_desc:0 "궤도에 있는 궤도 아콜로지를 강화하는 것으로, [ROOT.GetName]의 생활 공간이 더욱 증가할 것입니다."
 decision_giga_maximize_orbital_arcology_effect:0 "이 행성 주위의 §Y강화된 궤도 아콜로지§!를 §Y최대화된 궤도 아콜로지§!로 업그레이드 합니다. 비용은 §Y행성 크기§!당 £alloys£ §Y300§!입니다.\n\n기본 건설 시간인 §Y1100일§!이 지난 뒤, 이 소형 링 월드는 §Y[ROOT.GetName]§!에 추가적으로 §Y20%§!의 §B지구 슬롯§!을 제공하며(총 §Y60%§!), 유지비는 £alloys£ §Y15§! 및 £energy£ §Y45§!입니다."
 decision_giga_maximize_orbital_arcology:0 "최대화된 궤도 아콜로지"
 decision_giga_maximize_orbital_arcology_desc:0 "궤도에 있는 궤도 아콜로지를 최대화하는 것으로, [ROOT.GetName]의 생활 공간이 최대로 증가할 것입니다."
 giga_tech_planetary_computer:0 "행성 규모 컴퓨팅 단지"
 giga_tech_planetary_computer_desc:0 "연산 능력의 끝없는 수요의 해결법: 그것은 행성을 컴퓨터 그 자체로 바꾸는 것입니다! 특수 테라포밍 기술과 함께라면 이 터무니 없는 계획도 우리의 현실이 될 것입니다."
 giga_dialog.1301.name:0 "$name_planetary_computer$ 건설 현장 완성"
 giga_dialog.1301.desc:0 "[giga_system.GetName] 성계에서 $name_planetary_computer$를 위한 건설 현장이 완성되었습니다. 이 발판 위에서 우리는 언젠가 이 행성 전체를 엄청난 처리 능력을 가진 거대한 컴퓨터로 바꿀 것입니다."
 giga_dialog.1301.a:0 "환상적이야."
 giga_dialog.1302.name:0 "$name_planetary_computer$ 내부 완성"
 giga_dialog.1302.desc:0 "[giga_system.GetName] 성계의 $name_planetary_computer$ 완성에 한발자국 더 가까워졌습니다. 내부 뼈대가 완성된 지금, 우리는 행성의 맨틀까지 깊게 이어지는 이 거대한 프로젝트를 완성시킨 준비가 되었습니다. 곧 상상도 못할 계산 능력이 우리 손아귀에 들어올 것입니다."
 giga_dialog.1302.a:0 "놀랍군."
 giga_dialog.1303.name:0 "$name_planetary_computer$ 완성!"
 giga_dialog.1303.desc:0 "환상적인 소식입니다! [giga_system.GetName] 성계에서 행성을 표면부터 맨틀까지 이어지는 거대한 컴퓨터로 완전히 감쌌습니다. 경외감을 불러일으키는 이 구조물은 지표면의 연구자들에게 엄청난 연구의 기회를 제공하여 분명 우리의 연구에 위대한 은혜가 될 것입니다."
 giga_dialog.1303.a:0 "믿을 수 없군."
 planetary_computer_0:0 "$gc_mega$$name_planetary_computer$ 건설 현장"
 planetary_computer_0_DESC:0 "아래의 행성에 건설될 $name_planetary_computer$의 건설 현장입니다. 이 거대한 컴퓨터는 언젠가 행성의 맨틀 깊은 곳까지 이어져 상상도 못할 처리 능력을 지닐 것입니다.주거 지구를 제외한 행성의 모든 지구는 연구에 초점이 맞춰진 특별한 지구로 대체될 것입니다."
 planetary_computer_0_MEGASTRUCTURE_DETAILS:0 "£gigastructural£ $giga_list_category_megastructure$ - $giga_list_category_science_production$ - $giga_list_category_habitable_mega$\n모든 §Y암석 행성§!을 §Y행성 컴퓨터§!로 바꾸어\n£physics_research£ £society_research£ £engineering_research£ §Y연구§! 및 £unity£ §Y통합력§!을 생산합니다\n§L엄청난 처리 능력을 가진 행성 규모의 컴퓨터입니다.§!"
 planetary_computer_1:0 "$name_planetary_computer$ 내부"
 planetary_computer_1_DESC:0 "완전한 $name_planetary_computer$로의 첫 단계입니다. 최초의 내부 구조와 특화 시설이 있습니다."
 planetary_computer_2:0 "$name_planetary_computer$"
 planetary_computer_2_DESC:0 "완성된 $name_planetary_computer$로서, 지표면의 연구자들에게 막대한 도움을 제공합니다."
 building_giga_pcc_scrap_pile:0 "거대한 고철 더미"
 building_giga_pcc_scrap_pile_desc:0 "거대한 고철 더미입니다. 재활용 하기에 좋군요."
 giga_tech_terraform_gas:0 "가스 행성 대기 안정화"
 giga_tech_terraform_gas_desc:0 "거대 가스 행성의 대기에는 희귀한 자원이 가득하지만 슬프게도 행성의 거친 대기로 인해 접근할 수 없습니다. 그러나 행성의 대기 위의 거대한 궤도 중력 조작 배열망은 행성의 초고층 대기를 안정화하여 부유 도시를 사용해 개척할 수 있게 해줄지도 모릅니다."
 giga_dialog.301.name:0 "$name_terraform_gasgiant$ 건설 현장 완성"
 giga_dialog.301.desc:0 "[giga_system.GetName] 성계의 거대 대기 구축구간를 위한 건설 현장이 완성되었습니다! 이 발판 위에서 우리는 거대 가스 행성의 상층 대기를 안정화 시킬 수 있는 기기를 건설할 것입니다. 이를 통해 부유 식민지를 유치할 수 있을것입니다."
 giga_dialog.301.a:0 "환상적이야."
 giga_dialog.302.name:0 "$name_terraform_gasgiant$ 자기 고리 완성"
 giga_dialog.302.desc:0 "[giga_system.GetName] 성계에서 $name_terraform_gasgiant$의 자기 고리가 완성되었습니다! 거대 가스 행성 주위로 뻗은 이 거대한 두 고리는 강력한 자기장을 생성하여 조만간 설치할 중력 조절기에 동력을 공급할 것입니다."
 giga_dialog.302.a:0 "좋아."
 giga_dialog.303.name:0 "$name_terraform_gasgiant$ 중력 조절기 완성"
 giga_dialog.303.desc:0 "[giga_system.GetName] 성계의 $name_terraform_gasgiant$가 이제 완성되었습니다! 중력 조절기가 설치 되었으니, 언젠가의 개척을 위한 거대 가스 행성 초고층 대기의 실제 안정화 과정을 시작해도 좋습니다."
 giga_dialog.303.a:0 "거의 다 됐어."
 giga_dialog.304.name:0 "가스 행성 안정화됨!"
 giga_dialog.304.desc:0 "멋진 소식입니다! 우리의 공학자들이 [giga_system.GetName] 성계의 $name_terraform_gasgiant$가 거대 가스 행성의 초고층 대기를 안정화했다고 보고했습니다! 거대 가스 행성은 이제 개척 가능하며, 부유 식민지를 수용할 수 있습니다. 거대 가스 행성이 희귀한 자원으로 가득하기 때문에 이는 분명 우리의 경제에 도움이 될 것입니다."
 giga_dialog.304.a:0 "놀랍군!"
 macro_stabilizer_0:0 "$gc_mega$$name_terraform_gasgiant$ 건설 현장"
 macro_stabilizer_0_DESC:0 "$name_terraform_gasgiant$의 건설 현장입니다. 이곳에는 거대 가스 행성을 살기에 적합하게 바꾸기 위해 행성 주위에 설치할 거대한 시설을 건설하는데 필요한 인력과 장비가 있습니다."
 macro_stabilizer_0_MEGASTRUCTURE_DETAILS:0 "£galwonders£ $giga_list_category_megastructure$ - $giga_list_category_terraforming$\n§Y거대 가스 행성§!을 §Y거주 가능한 거대 가스 행성§!으로 변환하여 £energy£와 £exotic_gases£를 효율적으로 생산합니다.\n§L거대 가스 행성 주위에 건설된 큰 고리 모양의 구조물로, 행성 내에 떠 있는 도시를 만들 수 있도록 상층 대기를 안정화하는 것을 목적으로 합니다.§!\" #gigalistentry MACROATMOSPHERIC STABILIZER"
 macro_stabilizer_1:0 "$name_terraform_gasgiant$ 자기 고리"
 macro_stabilizer_1_DESC:0 "이 행성의 주위에 뻗어있는 거대한 고리는 강력한 자기장을 방출하는데, 이것을 아직 건설되지 않은 고급 중력 조절기에 동력원으로 사용할 수 있습니다."
 macro_stabilizer_2:0 "$name_terraform_gasgiant$"
 macro_stabilizer_2_DESC:0 "중력 조절기가 설치되었으니, 이제 이 $name_terraform_gasgiant$가 완성되었습니다. 남은 것은 안정화 작업을 시작하는 것 뿐입니다."
 macro_stabilizer_3:0 "안정화 시작"
 macro_stabilizer_3_DESC:0 "$name_terraform_gasgiant$의 첨단 기계를 사용해 거대 가스 행성의 초고층 대기를 안정화하여 어느 정도 거주 가능하게 바꿉니다."
 giga_tech_interstellar_habitat:0 "$name_interstellar_hab$"
 giga_tech_interstellar_habitat_desc:0 "별과 별 사이의 광대한 공허는 어떠한 생명이나 활동이 전혀 없습니다. 그러나 극도로 효율적인 재활용 시스템과 진보된 공학을 사용하여 한때 거칠었고 탐사되지 않았던 영역을 우리의 집으로 바꿀 수 있습니다."
 giga_tech_interstellar_ringworld:0 "$name_interstellar_ring$"
 giga_tech_interstellar_ringworld_desc:0 "우리는 작동하는데 자연적인 열이 별로 필요하지 않은 링 월드 건설의 기술의 대가가 되었습니다. 필연적으로 다음 단계는 이것을 극한까지 끌어올려 우리의 $name_interstellar_hab$를 거대한 링 월드로 발전시키는 것입니다!"
 giga_dialog.2901.title:0 "$name_interstellar_hab$ 건설 현장"
 giga_dialog.2901.desc:0 "미래의 $name_interstellar_hab$ 건설 현장이 [giga_system.GetName] 시스템에 건설되었습니다. 집중된 초공간 타키온 빔을 사용하여 $name_interstellar_hab$ 건설 현장으로 이어지는 부분적인 하이퍼레인을 생성할 것입니다.\n\n이제 현재 시스템 주변에 해당 건설 현장을 어디에 배치할지 선택해야 합니다."
 giga_dialog.2901.a:0 "동쪽"
 giga_dialog.2901.b:0 "북쪽"
 giga_dialog.2901.c:0 "서쪽"
 giga_dialog.2901.d:0 "남쪽"
 giga_dialog.2902.title:0 "$name_interstellar_hab$ 완성!"
 giga_dialog.2902.desc:0 "멋진 소식입니다! 우리의 공학자들이 $name_interstellar_hab$가 완성되었다고 통보하였습니다! 이것은 [giga_system.GetName] 성계에서 선택된 방향으로 몇 광년 떨어진 곳에 있습니다. 이 아름다운 우주 기지는 수백만의 주민을 수용할 수 있고, 거대한 특이점 발전기의 동력을 받습니다."
 giga_dialog.2902.a:0 "믿을 수 없군."
 giga_dialog.2903.title:0 "$name_interstellar_ring$ 뼈대 건설"
 giga_dialog.2903.desc:0 "공학의 믿을 수 없는 업적입니다. 우리는 우리의 $name_interstellar_hab$ 중 한 곳의 둘레에 거대한 $name_interstellar_ring$의 뼈대를 건설하였습니다. 몇 백만 km의 직경을 가진 이 거대한 뼈대는 $name_interstellar_hab$ 주위에 네 개의 거주 가능 구획을 건설할 기지의 역할을 할 것입니다."
 giga_dialog.2903.a:0 "훌륭해."
 giga_dialog.2904.title:0 "$name_interstellar_ring$ 구획 완성"
 giga_dialog.2904.desc:0 "우리의 $name_interstellar_ring$ 구획이 완성되었습니다! 두 개의 거대한 $name_interstellar_ring$ 거주지를 자랑하는 이 거대한 구조물은 따뜻한 태양이 없이도 작동합니다. 이는 다른 종족이 비길 꿈조차 꾸기 힘든 진정 놀라운 업적입니다."
 giga_dialog.2904.a:0 "환상적이야."
 interstellar_habitat_0:0 "$gc_mega$$name_interstellar_hab$ 건설 현장"
 interstellar_habitat_0_DESC:0 "미래의 $name_interstellar_hab$를 위한 발판이자 보급소입니다. 이 시설은 성간 우주 멀리로 아공간을 통해 집중된 타키온 광선을 방출해 불완전한 초공간 항로를 만들어 함선들이 미래의 $name_interstellar_hab$를 위한 구역으로 가게끔 해줍니다."
 interstellar_habitat_0_MEGASTRUCTURE_DETAILS:0 "£gigastructural£ £megaupgrade£ $giga_list_category_megastructure$ - $giga_list_category_habitable_mega$\n§Y성간 공간§!에 거주지를 만들며, 추후에 §Y성간 링 월드§!로 업그레이드할 수 있습니다\n§L성계의 사이에 있는 $name_interstellar_hab$는 자립형 우주 기지입니다."
 interstellar_habitat_1:0 "$name_interstellar_hab$ 건설"
 interstellar_habitat_1_DESC:0 "$name_interstellar_hab$의 건설을 시작합니다."
 interstellar_habitat_2:0 "성간 중앙 단지"
 interstellar_habitat_2_DESC:0 "특이점 반응로와 거주지가 있는 성간 공간의 거대한 복합 단지입니다."
 interstellar_habitat_2_MEGASTRUCTURE_DETAILS:0 "$interstellar_habitat_2_DESC$"
 interstellar_habitat_3:0 "$name_interstellar_ring$ 단지"
 interstellar_habitat_3_DESC:0 "특이점 반응로와 거주지가 있는 성간 공간의 거대한 복합 단지입니다. 또한 링 월드를 가지고 있으며 이에 에너지를 공급합니다."
 interstellar_habitat_4:0 "$name_interstellar_ring$ 뼈대"
 interstellar_habitat_4_DESC:0 "이 거대한 골격 구조는 $name_interstellar_ring$의 전체 둘레에서 1/4를 차지합니다. 실제 거주지에 대한 작업은 시작되지 않았습니다."
 interstellar_habitat_4_MEGASTRUCTURE_DETAILS:0 "$interstellar_habitat_4_DESC$"
 interstellar_habitat_5:0 "$name_interstellar_ring$ 구획"
 interstellar_habitat_5_DESC:0 "완성된 $name_interstellar_ring$ 구획으로, 거주 준비가 완료되었습니다."
 giga_tech_orbital_naval_logistics:0 "지구 외 해상 물류 관리"
 giga_tech_orbital_naval_logistics_desc:0 "우리 제국의 함대가 성장함에 따라 그 필요도 증가합니다. 함대의 끊임없이 증가하는 필요에 대한 하나의 해결책은 방대한 군사 장비를 수용하여 우리의 함대를 지원하는 거대한 $name_orb_naval_logistics$을 건설하는 것입니다."
 orb_naval_logistics_desc:0 "군사 관리를 돕는 방대한 군사 복합체입니다."
 orbital_naval_logistics_office_0:0 "$gc_kilo$$name_orb_naval_logistics$ 건설 현장"
 orbital_naval_logistics_office_0_DESC:0 "미래 $name_orb_naval_logistics$의 건설 현장으로, 초기 성간 해군을 관리하는 데 필요한 모든 직원과 장비를 수용하는 시설입니다."
 orbital_naval_logistics_office_0_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_kilostructure$ - $giga_list_category_military$\n함대 수용량을 £navy_size£ §Y증가시킵니다.§!\n§L우리 함대의 군사 능력을 향상시키기 위한 다양한 시설이 있는 대형 궤도 구조물입니다."
 orbital_naval_logistics_office_1:0 "$name_orb_naval_logistics$"
 orbital_naval_logistics_office_1_DESC:0 "해양 작전 $name_orb_naval_logistics$이(가) 우리의 함대 관리를 지원할 준비가 되어 있습니다."
 giga_tech_orbital_elysium:0 "\"탑 다운\" 궤도 기반 시설"
 giga_tech_orbital_elysium_desc:0 "궤도 시설에서 행성을 관리하면 상대적으로 안전하게 우리의 뜻을 강요할 수 있을 것입니다."
 giga_dialog.1101.name:0 "$name_orb_elysium$ 완성"
 giga_dialog.1101.desc:0 "[giga_system.GetName] 성계의 [giga_planet.GetName]에서  $name_orb_elysium$ 거주지가 완성되었습니다! 행성 총독을 위한 훌륭한 관측 지대로, 지상의 상황이 얼마나 난장판이든간에 [giga_planet.GetName](을)를 확실히 통제할 수 있을 것입니다."
 giga_dialog.1101.a:0 "환상적이야."
 orbital_elysium_0:0 "$gc_kilo$$name_orb_elysium$"
 orbital_elysium_0_DESC:0 "$name_orb_elysium$은 행성의 궤도를 도는 작은 거주지로, 아래의 지표면을 착취하는 행성 행정부를 위한 안전한 관측 지대입니다."
 orbital_elysium_0_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_kilostructure$ - $giga_list_category_habitable_mega$ - $giga_list_category_basic_resource_production$\n개척된 행성 위에 있는 작은 §Y거주지§!로, 행성의 관리 방식을 §P근본적으로 바꿉니다§!\n§L엘리트들이 아래의 난장판을 통제하는 궤도 통제 시설입니다. 그들이 생산 할당량만 맞춘다면 그들의 상황은 우리에게 별로 중요하지 않습니다.§!"
 orbital_elysium_origin_platform_0:0 "$name_orb_elysium$ 건설 현장"
 orbital_elysium_origin_platform_0_DESC:0 "미래의 $name_orb_elysium$을 위한 건축 현장입니다."
 orbital_elysium_origin_platform_1:0 "$orbital_elysium_0$"
 orbital_elysium_origin_platform_1_DESC:0 "$orbital_elysium_0_DESC$"
 orbital_elysium_0_CONSTRUCTION_INFO_DELAYED:0 "$giga_list_additional_data$ - 아래 행성의 수도 건물을 대체하고 §Y모든 건물 슬롯을 막으며§!, §Y지구 숫자를 절반으로 줄이고§!, §Y연구 생산량을 감소시키지만§!, 인구수에 따라 커지고 행성 특화에 따라 달라지는 §Y추가 직업을 제공§!합니다. 이러한 직업은 주로 §Y기본 자원 생산§!에 초점이 맞추어 지지만, 첨단 직업도 조금 포함됩니다.\n\n£pop£ §Y40 팝§!에 도달하고 수도 건물을 업그레이드 하면, 아래의 행성은 §Y$building_giga_elysium_host_booster$§! 건물도 받게 되며, 이 건물은 행성의 특화와 관련된 직업의 생산량을 높여줍니다.\n\n엘리시움 그 자체에는 §Y연구§!와 §Y통합력§!, §Y편의§!, 그리고 §Y아래 행성의 안정도§!를 유지하는 지구가 있으며, 행성에 건물 슬롯을 제공하는 효과에 기반해 §Y건물 슬롯§!을 얻습니다."
 orbital_elysium_ruined:0 "폐허가 된 $name_orb_elysium$"
 orbital_elysium_ruined_DESC:0 "이 $name_orb_elysium$은(는) 어떤 대재앙에 의해 완전히 파괴되었습니다. 적절한 기술이 주어진다면 복구할 수 있을지도 모릅니다."
 orbital_elysium_repaired:0 "$name_orb_elysium$"
 orbital_elysium_repaired_DESC:0 "완성된 $name_orb_elysium$로, 거주 준비가 완료되었습니다."
 GIGA_ELYSIUM_PLANET_NAME:0 "[event_target:giga_elysium_host.GetName] 통제"
 giga_tech_stellar_ring_habitat:0 "항성 고리"
 giga_tech_stellar_ring_habitat_desc:0 "우리는 행성 위에 우주 정거장을 건설하는 기술에 통달했습니다. 대신 나머지를 우리만의 행성을 만드는데 사용하면 어떨까요?"
 stellar_ring_habitat_0:0 "$gc_mega$$name_giga_orbital$ 현장"
 stellar_ring_habitat_0_DESC:0 "미래의 $name_giga_orbital$ 건설을 위한 기지로 이용되는 건설 현장 기지입니다."
 stellar_ring_habitat_0_MEGASTRUCTURE_DETAILS:0 "£galwonders£ $giga_list_category_megastructure$ - $giga_list_category_habitable_mega$\n별의 궤도를 도는 거대한 §Y거주지§!이며, 성계의 다른 §Y거주지§!를 보완합니다\n§L수집한 소행성으로 만들어진 반짝이는 반지이며, 아름다운 행성의 풍경과 일직선이 되고 민간 우주 공항이 점점이 박혀있습니다.§!"
 stellar_ring_habitat_0_CONSTRUCTION_INFO_DELAYED:0 "$giga_list_additional_data$ - §Y식량§!과 §Y통합력§!, §Y편의§!, §Y물류§!를 위한 지구가 있씁니다. 성계 당 최대 한개입니다.\n\n다른 거대 구조물에 사용되지 않고 별의 궤도를 도는 모든 §Y소행성§!을 이용하며, 소행성의 숫자와 품질에 따라 £planetsize£ §Y$PLANET_SIZE$§!가 커집니다. £alloys£ $alloys$과 £minerals£ $minerals$, 그리고 조금 적지만 £energy£ $energy$의 매장지 생산량이 커집니다. 사용된 소행성의 전략적 자원 매장지를 행성 매장지로 전환합니다.\n\n특정 지구는 특별한 효과가 있습니다:\n- §Y$district_giga_orbital_preserve$§! 같은 성계 내의 지구는 모든 $habitat_0$에 편의를 제공합니다.\n- §Y$district_giga_orbital_logistics$§! 지구는 성꼐 내의 모든 식민지에 £mod_planet_resettlement_unemployed_mult£ $MOD_PLANET_RESETTLEMENT_UNEMPLOYED_MULT$을 제공하며, §Y$civic_machine_servitor$§! 제국의 경우 £job_bio_trophy£ $job_bio_trophy$ 생산량 보너스도 제공합니다."
 stellar_ring_habitat_1:0 "$name_giga_orbital$ 강화"
 stellar_ring_habitat_1_DESC:0 "수집된 자재는 뼈대가 완성되면 평면판에 통합할 수 있습니다."
 stellar_ring_habitat_2:0 "$name_giga_orbital$ 뼈대"
 stellar_ring_habitat_2_DESC:0 "고리의 뼈대로, 기판과 유지 시스템, 평면판을 기다리고 있습니다."
 stellar_ring_habitat_3:0 "$name_giga_orbital$"
 stellar_ring_habitat_3_DESC:0 "완성된 고리로, 정착할 수 있습니다."
 stellar_ring_habitat_ruined:0 "폐허가 된 $name_giga_orbital$"
 stellar_ring_habitat_ruined_DESC:0 "별 근처를 도는 커다란 고리 모양의 거주지입니다. 현대 큰 손상을 입었으며, 올바른 기술을 사용해 수리할 수 있습니다."
 stellar_ring_habitat_restored:0 "$stellar_ring_habitat_3$"
 stellar_ring_habitat_restored_DESC:0 "완전히 수리된 고리로, 정착할 수 있습니다."
 GIGA_ORBITAL_PLANET_NAME:0 "[FromFrom.System.GetName] 궤도"
 GIGA_ORBITAL_ANCHOR_NAME:0 "고리 현장"
 requires_no_existing_orbital:0 "$TRIGGER_FAIL$성계마다 하나의 $name_giga_orbital$만 건설할 수 있습니다."
 giga_dialog.13601.name:0 "$name_giga_orbital$ 건설 현장 완성"
 giga_dialog.13601.desc:0 "[giga_system.GetName] 성계에서 $name_giga_orbital$의 건설 현장이 완공되었습니다. 이 궤도 플랫폼은 성계 곳곳의 소행성을 수집하는 중심 지역의 역할을 하며, 추후에 고리의 뼈대 구조물로 통합될 것입니다.\n\n§Y알림: 건설에 사용하고자 하는 모든 소행성에 이상 현상이 없고 특별 프로젝트와 고고학 현장이 완료되도록 하세요. 이러한 소행성들은 수집에서 §R제외§!됩니다. 강화 단계가 시작되면 §R선택은 종료§!됩니다!§!"
 giga_dialog.13601.a:0 "성계 소행성 최종 수집을 진행하세요."
 giga_dialog.13602.name:0 "$name_giga_orbital$ 소행성 강화 완료"
 giga_dialog.13602.desc:0 "[giga_system.GetName] 성계의 소행성 및 자재 수집이 종료되었습니다. 이제 건설 인부들은 $name_giga_orbital$의 뼈대 작업을 시작할 수 있습니다. 이러한 뼈대는 위의 지형 판과 아래의 우주 공항 시설에 대한 구조적 지지대가 될 것입니다."
 giga_dialog.13602.a:0 "고리로 진행하세요."
 giga_dialog.13603.name:0 "$name_giga_orbital$ 뼈대 완성"
 giga_dialog.13603.desc:0 "[giga_system.GetName] 성계 내에 있는 $name_giga_orbital$의 뼈대가 이제 완성되었습니다. 이 초거대 구조물은 거주지의 주 기능을 수행하고, 표면 개척 이후 사용될 거대한 수송 통로를 가지고 있습니다. 다수의 우주 공항을 위한 현장이 원주를 따라 놓여져 있으며, 회전 중력으로 대기를 잡아둘 거대한 가장자리 벽이 부분적으로 완성되었습니다."
 giga_dialog.13604.name:0 "$name_giga_orbital$ 완성!"
 giga_dialog.13604.desc:0 "최종 지형판의 설치와 최종 행성 생물권 이식과 함께, [giga_system.GetName] 성계의 $name_giga_orbital$가 마침내 완성되었으며, 이제 개척할 수 있습니다.\n\n표면에는 개발을 위한 넒은 공간이 있으며, 아래쪽 표면의 운송망은 고리의 환경에 최소한의 영향을 줄 것입니다. 그리고 외부의 우주 공항들은 성계 내의 다른 식민지로의 효율적인 접근을 가능케 할 것입니다."
 giga_dialog.13604.desc.servitor:0 "최종 지형판의 설치와 최종 행성 생물권 이식과 함께, [giga_system.GetName] 성계의 $name_giga_orbital$가 마침내 완성되었으며, 이제 개척할 수 있습니다.\n\n표면에는 다양한 유기체 종족에 맞게 조정된 거주지가 있어, 수많은 $job_bio_trophy_plural$를 수용하기에 적합합니다.\n\n고리 외부의 우주 공학 시설 덕분에, 이곳과 성계 내의 모든 생산 시설 간에 엄청난 수준의 통합이 이루어져 국지적 유기체 관리 시설의 필요가 감소할 것입니다."
 giga_dialog.13604.servitor:0 "진정한 유기체의 낙원이군요."
 giga_dialog.13605.name:0 "폐허가 된 $name_giga_orbital$"
 giga_dialog.13605.desc:0 "성계의 주 항성 주위를 돌고 있는 거대한 우주 기지의 잔해가 [giga_system.GetName]에서 발견되었습니다. 행성의 지름보다 수 배는 더 거대한 고리이며, 회전 중력으로 대기를 잡아두어 일종의 거주지 역할을 했던 것 같습니다.\n\n생명은 없지만, 이 \"§H$name_giga_orbital$§!\"는 거의 온전하며 수리된다면 대부분의 거주 가능 행성에서 살 만한 공간보다 넓은 거주 가능 공간을 가지고 있을지도 모릅니다."
 giga_dialog.13605.a:0 "익숙한 것이로군."
 giga_dialog.13606.name:0 "$name_giga_orbital$ 복구됨"
 giga_dialog.13606.desc:0 "[giga_system.GetName] 성계의 텅 비어있는 $name_giga_orbital$가 완전히 수리되었고 환경이 다시 이식되었습니다. 이제 개척을 할 수 있으며, 고리의 외부 표면에 있는 수많은 우주 공항 시설은 분명 지역 운송망에 큰 도움이 될 것입니다."
 giga_stellar_ring_asteroid:0 "수집 대상"
 giga_stellar_ring_asteroid_desc:0 "이 소행성은 이 성계의 $name_giga_orbital$ 건설에 사용될 예정입니다."
 giga_tech_hrae_mc:0 "상대론적 특이점 수확"
 giga_tech_hrae_mc_desc:0 "블랙홀은 매우 적은 에너지를 방출하지만 실제로는 에너지 넘지는 발전소입니다. 고질량의 블랙홀 주위에 맞게 조정된 다양한 고급 에너지 수집 방법을 통해 블랙홀이 제공하는 에너지를 독점할 수 있는 매우 효율적인 기계를 건설할 수 있습니다."
 giga_dialog.3101.name:0 "$name_hraemc$ 건설 현장"
 giga_dialog.3101.desc:0 "우리의 $name_hraemc$를 위한 건설 현장이 준비되었습니다. 이 기술적 경이는 [giga_system.GetName]에서 에너지를 바로 흡입할 것이며, 블랙홀을 가까이서 연구할 멋진 연구 시설 또한 제공합니다."
 giga_dialog.3101.a:0 "훌륭해."
 giga_dialog.3102.name:0 "HRAE-MC 시간 가속기 건설"
 giga_dialog.3102.desc:0 "우리의 일꾼들은 블랙홀의 붕괴를 크게 가속화하여 호킹 복사를 증가시킬 수 있는 두 개의 거대한 시공간 왜곡 링인 크로노템포럴 가속기의 조립을 막 완성했습니다. 우리의 공학자들은 블랙홀의 붕괴가 100경배 가속되었다고 추정하고 있습니다. 그렇더라도 블랙홀의 엄청난 수명으로 인해 은하의 모든 문명보다 오래 존재할 것입니다.\n\n또한 가속기는 블랙홀 주위의 시간 팽창을 제거하고 거대 구조물를 안정화 시킵니다."
 giga_dialog.3102.a:0 "좋아. 계속 노력하게."
 giga_dialog.3103.name:0 "HRAE-MC 물질 주입기 건설"
 giga_dialog.3103.desc:0 "대규모 주입기가 설치되어, 사건의 지평선으로의 직접적인 다량의 물질 투하를 통해 매우 밝은 강착 원반이 생성되었습니다. 주입기는 원반에서 방출된 빛을 이용해 에너지를 생성할 수 있는 제한된 능력을 가지고 있지만, 매우 비효율적이며 완전한 수집을 위해서는 강착 수집기를 건설해야 합니다."
 giga_dialog.3103.a:0 "좋아. 대단한 업적이군."
 giga_dialog.3104.name:0 "HRAE-MC 방출 수집기 건설"
 giga_dialog.3104.desc:0 "완전한 호킹 복사 및 강착 방출 광역 수집기로 가는 발걸음은 강착 수집기를 통해 한 걸음 더 나아가게 되었습니다. 이 거대한 구조물은 블랙홀로의 물질 투하를 통해 생성된 매우 밝은 강착 원반에서 방출되는 에너지를 수집하기 위해 특수 제작되었습니다. 또한 수집기는 블랙홀의 회전 에너지의 일부를 수집하고 내부에 설치된 특수 실험실이 있어 우리의 과학자들이 문자 그대로의 시공간을 자세히 살펴 볼 수 있게되었습니다.\n\n마지막 단계로 블랙홀이 무언가를 빨아들일때 방출되는 다양한 광선과 호킹 복사를 수집하는 극성 수집기를 건설하는 것입니다."
 giga_dialog.3104.a:0 "아주 좋아."
 giga_dialog.3105.name:0 "$name_hraemc$ 건설 완료"
 giga_dialog.3105.desc:0 "우리의 호킹 복사 강착 방출 광역 수집기, 즉 $name_hraemc$가 완성되었습니다. 이 놀라운 기술적 업적은 우리에게 엄청난 양의 에너지를 제공할 뿐 아니라 블랙홀의 본질에 대한 많은 데이터를 제공할 것입니다. 수집기는 블랙홀에서 방출되는 대부분의 에너지와 잔류 암흑 물질을 수집하고 있으며, 민간에게도 공개돼 우리 시민들이 블랙홀에 쓰레기를 버릴 수 있게 되어 필요 소비재의 절감을 이루어냈습니다."
 giga_dialog.3105.a:0 "이것이 우리가 은하를 지배하는데 도움이 되길."
 hrae_mc_0:0 "$gc_giga$$name_hraemc$ 건설 현장"
 hrae_mc_0_DESC:0 "이 건설 현장은 '호킹 복사 및 강착 방출 광역 수집기'를 건설하는데 필요한 대량의 자원과 인력을 수용하는 준비 창고 역할을 합니다."
 hrae_mc_0_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_gigastructure$ - $giga_list_category_basic_resource_production$ - $giga_list_category_science_production$\n§Y블랙홀§!을 사용해 £energy£ §Y에너지§!와 £physics_research£ §Y물리학 연구§!, £sr_dark_matter£ §Y암흑 물질§!을 생산하고 §Y소비재 유지비§!를 §Y5%§! 감소시킵니다\n§L블랙홀 주위에 건설되어 블랙홀의 에너지를 수확하는 $name_hraemc$는 기술의 보물입니다.§!"
 hrae_mc_1:0 "$name_hraemc$ 시간 가속기"
 hrae_mc_1_DESC:0 "이 링은 호킹 복사의 방출을 가속화하고 일반적으로 블랙홀 주위에서 발생하는 엄청난 시간의 팽창을 감소시키는 특수한 시간자의 복사를 방사합니다."
 hrae_mc_2:0 "$name_hraemc$ 물질 주입기"
 hrae_mc_2_DESC:0 "이 주입기는 방대한 양의 물질을 블랙홀로 쉽게 투입하여, 에너지를 수집할 수 있는 매우 밝고 활동적인 강착 원반을 생성할 수 있게 합니다. 융합된 구성 물질들은 주입기를 통해 일부의 에너지를 수집할 수 있지만 효율적이지는 않습니다."
 hrae_mc_3:0 "$name_hraemc$ 강착 수집기"
 hrae_mc_3_DESC:0 "강착 수집기는 강찰 원반에서 방출되는 방대한 양의 에너지를 수집할 수 있도록 특수 제작되었습니다. 또한 수집기는 블랙홀의 특이점을 연구하기 위한 특수 과학 시설을 갖추고 있습니다."
 hrae_mc_4:0 "$name_hraemc$"
 hrae_mc_4_DESC:0 "작동 중인 $name_hraemc$. '호킹 복사 강착 방출 광역 수집기'를 의미하며, 특수 설비 덕에 호킹 복사가 가속됩니다."
 giga_pouchkinn.002.title:0 "고대의 실험실"
 giga_pouchkinn.002.desc:0 "버려진 $name_giga_orbital$를 조사하는 우리의 과학선이 표면에서 이상한 실험실을 발견했습니다. 잠겨있는 것 같으며, 검사 결과 엄청나게 오래된 것임이 확인되었습니다.\n\n우리의 과학자는 이 이상한 건물에 대해 더 알아보기 위해 궤도 거주지를 개척할 것을 권장했습니다."
 giga_pouchkinn.002.a:0 "독특하군."
 giga_pouchkinn.101.name:0 "실험실"
 giga_pouchkinn.101.desc:0 "우리의 개척자들이 버려진 것 같은 $name_giga_orbital$에 발을 디딘 이후로, 아직 알 수 없는 고대의 실험실의 비밀은 풀리지 않았습니다. 조사해보니, 그 안에 지성체는 전혀 없다는 것이 확인되었습니다. 내부로 원정대를 보냈으며, 매우 진보된 기술로 만들어진 수백 년 전의 장치들을 다수 발견했습니다. \n\n그러나, 아직 누가 이 장소를 만들었고 왜 만들었는지 전혀 알지 못합니다. $name_giga_orbital$의 개척자들은 이 실험실에 위험한 기술이 있을지도 모르기 때문에 이 건물의 기원을 알고 싶다고 합니다."
 giga_pouchkinn.101.a:0 "탐험대를 조직해 이 건물을 탐사해라."
 giga_pouchkinn.101.b:0 "그대로 둬라. 문제 없다."
 giga_pouchkinn.101.b.tooltip:0 "나쁜 일이 일어나지 않기를 바랍니다."
 giga_pouchkinn.101.c:0 "이 건물을 그대로 둘 수 없다. 파괴해라."
 giga_pouchkinn.101.c.tooltip:0 "소규모 탄두를 준비해 실험실을 파괴합니다."
 giga_pouchkinn.102.name:0 "끔찍한 폭발!"
 giga_pouchkinn.102.desc:0 "최근 개척된 $name_giga_orbital$에서 끔찍한 소식이 전해졌습니다! 소규모 핵탄두를 준비했던 개척자들이 이를 고대 실험실에 발사했습니다.\n그러나, 건물의 파괴가 일종의 프로토콜을 발동 시킨건지, $name_giga_orbital$ 전체의 핵탄두 수천개를 동시에 폭파했습니다.\n우리의 식민지는 완전히 파괴되었고, 거주 불가능한 구조물이 되었습니다. 올바른 기술이 있다면 이를 복구할 수 있을지도 모릅니다."
 giga_pouchkinn.102.a:0 "제기랄!"
 giga_pouchkinn.103.name:0 "방어 드론!"
 giga_pouchkinn.103.desc:0 "무장한 우리의 팀이 이상한 실험실에 들어갔고 봉인된 문 여러개를 지나쳤습니다. 거대하고 비어있는 공동같은 곳에 들어서자, 갑자기 시끄러운 사이렌이 귀청이 나갈정도로 울어대기 시작했습니다. 그러자 공동의 천장이 열렸고, 엄청난 양의 끔찍한 산이 군인들의 위로 쏟아졌고, 그들은 즉시 사망했습니다.\n\n금새, 실험실 근처의 땅이 부서졌고, 수천개의 독특한 무장 드론이 나타났습니다! 드론들은 $name_giga_orbital$를 조사하며 모든 지성체들을 공격하기 시작했습니다. 식민지를 구하려면 빠르게 움직여야합니다!"
 giga_pouchkinn.103.a:0 "군대를 준비하라!"
 giga_pouchkinn.104.name:0 "드론의 승리!"
 giga_pouchkinn.104.desc:0 "고대 연구소의 자율 방어 드론이 우리의 $name_giga_orbital$를 장악했습니다! 드론이 모든 사람을 죽이기 전에 이곳을 되찾기 위해서는 빠르게 움직여야합니다."
 giga_pouchkinn.104.a:0 "군대!"
 giga_pouchkinn.105.name:0 "$name_giga_orbital$ 재점령!"
 giga_pouchkinn.105.desc:0 "우리 군대는 $name_giga_orbital$의 식민지를 점령한 드론을 성공적으로 파괴했습니다. 파괴된 드론을 분석한 결과 실험실이 엄청나게 오래되었다는 것과 실험실의 기원이 확인되었으며, 그것으로부터 많은 공학 자료를 수집했습니다."
 giga_pouchkinn.105.a:0 "좋아."
 giga_pouchkinn.106.name:0 "드론의 패배!"
 giga_pouchkinn.106.desc:0 "우리의 지상군이 고대 연구실의 드론을 성공적으로 무찔렀습니다. 파괴된 드론을 분석한 결과 실험실이 엄청나게 오래되었다는 것과 실험실의 기원이 확인되었으며, 그것으로부터 많은 공학 자료를 수집했습니다."
 giga_pouchkinn.106.a:0 "좋아."
 giga_pouchkinn.107.name:0 "실험실 탐사"
 giga_pouchkinn.107.desc:0 "실험실 드론들을 파괴했으니, 이제 무엇을 해야할까요? 이제까지 생각했던 것보다 이 실험실에는 더 많은 것이 있는 것 같습니다...\n시민들은 정말 이상한 이 건물을 걱정하기 시작했고, 어떤 사람들은 이를 파괴해야한다고 말하기도 합니다. 그러나 우리의 과학자들은 이 실험실을 파괴하면 어떤 일이 벌어질지 모르니 그래서는 안된다고 조언했습니다."
 giga_pouchkinn.107.a:0 "소규모 과학자 팀을 보내라."
 giga_pouchkinn.108.name:0 "실험실의 깊은곳"
 giga_pouchkinn.108.desc:0 "우리의 과학자 팀이 다시 한 번 실험실에 들어왔습니다. 이번에는 매우 조심히 들어왔습니다.\n실험실은 우리가 생각했던 것보다 훨씬 크고, $name_giga_orbital$ 깊은 곳까지 뻗어져있는 듯 합니다. 층마다 목적을 알 수 없는 이상한 기계장치들이 가득합니다. 각각의 기계장치의 기능이 상세히 기술되어있지만, 우리가 알 수 없는 언어이며 안타깝게도 번역은 실패했습니다.\n\n수십층 정도를 내려간 뒤, 우리의 팀이 바닥같은 곳에 도달했습니다. $name_giga_orbital$의 지표면에서 수 km 밑에 있습니다. 여기서 엄청난 발견을 했는데, 실험실에 누군가 살고있다는 것입니다! 정확하게 말하자면, 우리 팀이 이상하고 작고 털이 많은 포유류같은 생명체 수십마리를 만났습니다. 말을 걸자, 그 생명체들은 그냥 우리 과학자를 처다보다가 자기 일을 다시 시작했습니다. 이 생명체들이 실험실을 유지하고 청소하는 듯 합니다.\n\n그러나, 몇층을 더 내려간 뒤, 우리의 팀은 일종의 장치를 만드는 것으로 보이는 지적 개체 하나를 발견했습니다. 그들은 그가 이 구조물 전체를 건설한 자라는 이론을 세웠습니다.\n그 개체는 우리가 왔다는 것에 놀란 듯 하며, 일종의 번역기를 작동시킨 뒤 자신을 소개했습니다."
 giga_pouchkinn.108.a:0 "화면에 띄워라."
 giga_pouchkinn.109.name:0 "고독한 과학자"
 giga_pouchkinn.109.desc:0 "아. 반갑습니다. 위니 파우치킨입니다. 네, 위니. 이상한 이름이죠.\n\n저 아래에서 다른 지적 생명체를 본지가 수십 년... 아니 수 세기는 되었습니다. 정말 빠르게 외로워지죠, 아세요? 그리고 어, 여러분이 이곳에 오면서 봤을 저 이상한 털복숭이들은 지능이 없습니다. 저들은 내가 하고 싶지 않은 일을 하도록 생체 공학으로 만든 아무 생각이 없는 드론입니다. 안타깝게도, 말이 별로 없죠.\n\n지난 수 세기 동안, 저는 이곳에서 작업하고 실험을 하고 멋진 기술을 만들었습니다. 그러나 마침내 제 연구가 끝을 향해 가는 것 같군요. 그러니까 말이죠, 저는 시공간 연속체를 양바양으로 이동하는 방법을 연구하고 있었습니다... 그러니까, 시간 여행이죠."
 giga_pouchkinn.109.a:0 "시간 여행?"
 giga_pouchkinn.109.a.response:0 "네, 시간 여행이요. 저어어엉말 다 끝났다고 확신합니다. 아닌가? 하나도... 하나도 모르겠습니다. 너무 오래되었습니다. 끝없는 방정식과 실험, 더 많은 방정식과 이론들... 저는 초소형 웜홀을 만들고 시공간에 구멍을 뚫었으며 타키온을 가지고 놀았습니다. 그러나 여전히 이해가되지 않는군요."
 giga_pouchkinn.109.b:0 "이 $name_giga_orbital$를 만들었나?"
 giga_pouchkinn.109.b.response:0 "네? 물론 아닙니다. 저는... 찾아냈지요. 그냥 거대 가스 행성의 주위를 돌고 있었습니다. 그래서 여기 정착했습니다. 제가 여기 도착했을 때 주변에 제국이라고는 없었습니다.\n\n사실, 제 데이터베이스에 여러분 종족은 'FTL 불가'로 기록되어 있습니다. 좀 더 자주 업데이트해야겠군요."
 giga_pouchkinn.109.c:0 "네가 함선들과 드론들의 주인인가?"
 giga_pouchkinn.109.c.response:0 "아, 그거요. 맞습니다. 오오오래 전에 만들었지요. 흠, 정말로 함선을 '건조'한 것은 아닙니다. 은하에 있는 것들을 모은 것이지요.\n\n소행성대에서 망가진 함선이나 버려진 화물선. 살짝 손을 좀 봤고 잘 작동하더군요. 아무도 저를 방해하지 못하게 엘리시움 근처에 배치해두었습니다. 뭐, 실패한 것 같군요. 어쨌든, 우주 동물들과 해적을 피하도록 만들었습니다. 우주 제국의 총공격은 예상하지 않았으니까요.\n\n그 드론들도 마찬가지입니다. 자랑스러운 것들이지요. 많은 공학이 적용되었습니다. 아, 드론들이 개척자를 거의 죽일뻔 했나요? 죄송합니다."
 giga_pouchkinn.109.d:0 "그곳에 얼마나 있었지?"
 giga_pouchkinn.109.d.response:0 "정말, 정말 오래 있었지요. 적어도 수세기는 되었을겁니다. 그 이후로 '과학'을 하느라 바빴습니다. 꽤나 조용해서 좋아하는 곳이빈다. 귀찮은 정부나 '너무 위험해'라며 소리치는 사람들 없이 제 실험을 진행할 수 있는 최적의 장소이지요. 흠, 제가 여행하면서 만난 모든 '정부'와 '제국'은 이제 사라진지 오래지만요.\n지금 웃은 사람 누구입니까?"
 giga_pouchkinn.109.e:0 "화면을 꺼라."
 giga_pouchkinn.110.name:0 "과학자"
 giga_pouchkinn.110.desc:0 "이 건물을 누가 지었는지 알아냈으니, 결정을 내려야합니다. 과학자는 우리의 지식이 시간 여행에 대한 연구에 도움이 될지도 모른다며, 우리 제국의 과학팀에 함께하고 싶음을 밝혔습니다. 아니면 그냥 알아서 연구를 하게 두고 계획대로 개척을 진행할 수도 있습니다. 그는 우리가 원한다면 윗층을 써도 좋다고 했습니다. 분명 엄청난 과학적 가치가 있을 것입니다."
 giga_pouchkinn.110.a:0 "연구를 계속 하게 둬라."
 giga_pouchkinn.110.b:0 "그를 과학자로 고용하라."
 giga_pouchkinn.110.c:0 "그의 연구는 너무 위험하다. 그를 처형하고 그 장소를 급습해라."
 giga_pouchkinn.111.name:0 "고대의 과학자"
 giga_pouchkinn.111.desc:0 "마침내 수세기의 연구 끝에 무언가 다른 일을 하게된다는 생각에 흥분한 것 같습니다. 파우치킨은 그의 연구 내용 대부분이 들어있는 데이터 디스크를 집어들었고, 저장품을 챙겼습니다. 그리고 우리 과학자들의 안내를 받아 실험실 바깥으로 나왔습니다. 작은 털복숭이 생명체들 몇 마리가 그를 따라왔습니다.\n\n정말 오랜 시간 동안 고립되어있던 그는 햇빛의 따뜻함을 받아 기뻐했습니다. 그에게 있을지도 모를 외계 병원체를 없애기 위해 건강 검진을 진행한 끝에, 그는 우리 제국의 과학자가 될 준비가 되었습니다."
 giga_pouchkinn.111.a:0 "훌륭해."
 giga_pouchkinn.111.a.tooltip:0 "우리는 레벨 6 과학자를 얻습니다."
 giga_pouchkinn.112.name:0 "파우치킨의 연구"
 giga_pouchkinn.112.desc:0 "우리 과학자들이 파우치킨에게 작별 인사를 했고 시간 여행에 대한 연구에 행운을 빌었습니다. 그들이 떠난 뒤, 파우치킨은 자신의 연구 일부가 담긴 데이터 디스크를 그들에게 건내주겠다고 했습니다.\n\n또 파우치킨은 과학자들에게 원한다면 실험실 윗층을 써도 좋다고 했습니다. 분명 우리 연구원들에게 매우 유용할 것입니다."
 giga_pouchkinn.112.a:0 "아주 완벽해."
 giga_pouchkinn.112.a.tooltip:0 "$name_giga_orbital$에 긍정적인 보정치가 생성됩니다."
 giga_pouchkinn.113.name:0 "시간은 건들면 안된다"
 giga_pouchkinn.113.desc:0 "$name_giga_orbital$에서 비극적인 소식이 전해졌습니다. 위니 파우치킨이 시간 여행 실험을 진행하다가, 실수로 거대한 시공간 구멍을 열어버린 것 같습니다.\n파우치킨 자신을 포함해 주변의 모든 것이 특이점으로 흡수되었고, 끓어오르는 준안정 진공에너지로 이루어진 새로운 형태의 이상한 블랙홀이 탄생했습니다. 식민지는 완전히 사라졌습니다."
 giga_pouchkinn.113.a:0 "멍청난 자가 만들어낸 끔찍한 비극이로군."
 giga_pouchkinn.114.name:0 "함정이다!"
 giga_pouchkinn.114.desc:0 "끔찍한 소식입니다! 원정대의 수석 과학자가 위니 파우치킨을 암살하기 위해 총을 꺼냈을 때 파우치킨의 옷 내부에서 일종의 자폭 장치가 활성화되어 대규모 폭발을 일으켰습니다. 연쇄반응이 이어졌고, $name_giga_orbital$의 뼈대 내에 숨겨진 핵단두들을 작동시켜 식민지를 파괴하고 구조물을 폐허로 만들었습니다. 살아남은자는 없었습니다."
 giga_pouchkinn.114.a:0 "제기랄!"
 giga_pouchkinn.115.name:0 "연구소 습격"
 giga_pouchkinn.115.desc:0 "파우치킨과 대화 한 직후 원정대의 수석 과학자는 총을 꺼내 그의 가슴에 총을 쏘아 그를 죽였습니다. 그런 다음 우리 팀은 실험실을 샅샅이 뒤져 그들이 할 수 있는 모든 것을 모았습니다.\n파우치킨의 시신을 부검하여 우리 연구에 확실히 도움이 될 엄청나게 발전된 인공 두뇌 및 생물학적 보철물을 찾아 냈습니다.\n그런 다음 실험실은 폐쇄되었습니다."
 giga_pouchkinn.115.a:0 "그의 희생은 과학에 기여할 것이다."
 giga_pouchkinn.116.name:0 "탈출"
 giga_pouchkinn.116.desc:0 "우리 과학자들이 파우치킨을 죽일 수 없었습니다. 그는 일종의 순간이동 장치를 작동시켜 탈출 포드로 이동해 초공간으로 도망쳤습니다. 다시는 볼 수 없을 것입니다.\n\n그러나 우리는 실험실을 습격해 파우치킨의 연구에서 엄청난 양의 데이터를 얻을 수 있었습니다. 그런 다음 실험실은 봉쇄되었습니다."
 giga_pouchkinn.116.a:0 "우리는 다시 만날것이다."
 giga_dialog.10801.title:0 "얼음 아래"
 giga_dialog.10801.desc:0 "케르볼 성계의 외곽에있는 춥고 눈에 띄지 않는 일루 행성을 조사하는 동안 우리의 과학선은 이상한 것을 발견했습니다.\n\n행성의 밀도는 예측과 일치하지 않으며 표면의 일부는 거의 인공적으로 보이는 불규칙한 패턴을 보여줍니다. 우리 과학자는이 작은 얼음 세계에 우리가 처음 생각했던 것보다 더 많은 것이 있을 수 있다고 믿고 그것을 더 분석하기위한 특별 프로젝트를 준비했습니다."
 giga_dialog.10801.a:0 "독특하군."
 giga_dialog.10802.title:0 "일루의 신비"
 giga_dialog.10802.desc:0 "일루의 표면을 탐험하는 동안 우리 원정대는 얼어 붙은 평원 한가운데 작은 금속 뚜껑을 찾았습니다. 팀은 뚜껑을 강제로 열고 거대한 지하 공간과 기술적으로 진보된 방에 도착했습니다. 그들의 도착은 일종의 활성화 메커니즘을 촉발시킨 듯 보였고 우리 팀은 로봇 목소리로 인사를 받았습니다. 그들은 우리에게 메시지를 전달하고 있습니다."
 giga_dialog.10802.a:0 "화면에 띄워라."
 giga_dialog.10803.title:0 "수신 전송!"
 giga_dialog.10803.desc:0 "<외부 개체 위치>\n\n<검사 규약 시작>\n\n<인식되지 않은 엔티티>\n\n<엔티티에 FTL 이동이 있는지 검사>\n\n<크라켄과의 관계 유사성 = 높음>\n\n<대-크라켄 방어 시스템 활성화>\n\n<일루 대-크라켄 시스템 활성화 됨>\n\n<마지막 활성화 3617주기 전>\n\n<섬멸 준비>"
 giga_dialog.10803.a:0 "크라켄? 불길하군."
 giga_dialog.10804.title:0 "떠오르는 세계"
 giga_dialog.10804.desc:0 "AI가 불길한 말을 마친 직후 팀과의 연락이 끊어졌습니다. 지상 탐험대는 마치 행성 전체가 흔들리는 것처럼 거대한 지각 상승을 보고했습니다! 갑자기 거대한 금속 구조물이 행성의 얼어 붙은 표면에서 나타났습니다. 우리의 과학선은 그것들이 무엇인지 고민했지만 대답은 빠르게 분명해졌습니다. 그것은 무기입니다.\n\n행성 전체가 방어 메커니즘으로서 거대한 기동성 초강력 무기로 변했고, 궤도로 빠져 나갔습니다. 이 적대적인 천체는 이제 우리 과학선을 포함하여 접근하는 모든 것을 공격합니다."
 giga_dialog.10804.a:0 "믿을 수 없군! 맞서 싸울 방법을 찾아야한다."
 giga_dialog.10805.title:0 "일루의 방어"
 giga_dialog.10805.desc:0 "위험한 전투 끝에 우리 함대는 케르볼 성계에서 무기화 된 행성계에 치명적인 손상을 입혔습니다.\n\n그러나 행성이 제대로 작동하지 않더라도 두꺼운 보호 지각 덕분에 내부 구조는 여전히 손상되지 않았습니다. 좀 더 낙관적인 과학자들은 이 놀라운 장치를 수리하여 무기화 된 행성으로 사용할 수 있다고 믿습니다!"
 giga_dialog.10805.a:0 "이 거대한 우주선은 우리 깃발 아래에있을 것이다!"
 giga_dialog.10805.b:0 "고철로 만들어라."
 giga_dialog.10806.title:0 "행성이 다시 한 번 날다"
 giga_dialog.10806.desc:0 "놀라운 소식입니다! 공학의 놀라운 업적을 통해 우리는 케르볼 성계에서 손상된 무기화 된 행성을 복원 할 수있었습니다. 작동명령이 우리에게 들어왔고 이제 우리의 통제 아래에 있습니다.\n\n우리 과학자들은 더 자세히 연구 할 기회를 잡았습니다. 그들은 성계의 이전 주민들이 '크라켄'으로 알려진 초차원적 존재에 맞서 싸우기 위해 이 초강력 무기를 만들었다는 것을 알아 냈습니다. 그들이 야수와 싸우는 데 성공한 것처럼 보이지만, 이 승리 직후 초강력 무기의 AI가 오작동을 일으켜 크라켄이라고 믿고 종의 고향을 포격했습니다.\n\n어쨌든, 이제 우리는 완전히 무장하고 작전 가능한 전투 행성을 통제하고 있습니다."
 giga_dialog.10806.a:0 "놀랍군!"
 giga_fallen_empire.101.name:0 "천체 움직임 감지 됨!"
 giga_fallen_empire.101.desc:0 "놀라운 소식입니다! 몰락한 제국중 하나가 각성한 직후, 우리의 감지기는 그들의 영토 내에 있는 여러 행성이 궤도를 벗어난 것을 감지했습니다. 행성에 숨어있던 거대한 무기와 추진기가 모습을 드러냈고 이제 행성은 무시무시한 전함으로 변모했습니다. 이 몰락한 제국한테는 우리의 생각보다 더 많은 무기가 숨겨져 있던 것으로 보입니다."
 giga_fallen_empire.101.a:0 "전장으로!"
 giga_fallen_empire.102.name:0 "신성한 괴수"
 giga_fallen_empire.102.desc:0 "각성한 제국이 수천년 동안 숨겨놓은 무기들이 있다는건 공공연한 비밀입니다. 그러나 아무도 그들의 행성중 하나가 일반적인 행성이 아니라 거대한 비활성 상태의 함선이라고는 예측할 수 없었습니다. 그리고 최근에 각성한 제국은 이 거대한 함선을 다시 가동시켰고 한때 가이아 행성이었던 것은 그들에게 방해되는 모든 것들을 제거 할 수 있는 병기로 변모했습니다. 그들은 우리가 예상했던 것보다 남들에게 자신들의 의지를 관철할 준비가 되어있는 것 같습니다..."
 giga_fallen_empire.102.a:0 "좋지 않은데."
 giga_paluush.001.name:0 "갓초 성계"
 giga_paluush.001.desc:0 "갓초 성계를 탐사하는 우리의 과학선은 성계 내에서 두 개의 거대 구조물이 발견되었다고 보고합니다! 첫 번째는 성계의 가장자리 근처에 떠 다니는 버려진 게이트웨이로, 이 장소는 한때 중요한 성간 제국에 속했을 수도 있음을 나타냅니다. 두 번째 거대 구조물은 내부 행성 중 하나 주위에 건설 된 완전한 $name_terraform_barren$ 입니다! 선주민들이 이 세계를 테라포밍하려고 시도한 것 같지만, 그들의 진행은 알 수없는 이유로 중간에 중단되었습니다."
 giga_paluush.001.a:0 "놀랍군."
 giga_paluush.002.name:0 "원시적인 라디오 통신"
 giga_paluush.002.desc:0 "현재 팔루쉬의 원시 세계를 조사하는 우리의 과학선은 매혹적인 발견을 했습니다. 원시 기술에도 불구하고 행성의 기계 시대 원시인들은 잠재적 인 외계인 방문객을위한 단거리 무선 메시지를 우주로 반복해서 보내고있는 것 같습니다. 우리 과학팀은 메시지를 해독했습니다."
 giga_paluush.002.a:0 "화면에 띄워라."
 giga_paluush.003.name:0 "팔루쉬"
 giga_paluush.003.desc:0 "반갑습니다. 이것은 우리의 최첨단 라디오 기술을 사용하여 미리 녹음 된 라디오 메시지입니다.\n\n저는 팔루시아 행성에서 온 팔루쉬 민주 국가의 대표인 포흐'틴입니다. 우리는 아름다운 대륙 세계에서 평화로운 삶을 살고 있으며, 별의 여행자 여러분, 우리의 삶의 방식을 방해하지 않기를 간청합니다.\n\n이 메시지에 우리의 문화와 사람들에 대한 정보를 추가하여 그들이 당신의 사회 학자들에게 도움이 될 수 있도록 했습니다.\n\n포흐'틴과 팔루쉬 인민들이 진심을 담아."
 giga_paluush.003.a:0 "화면을 꺼라."
 giga_paluush.1011.title:0 "불가능한 토끼류"
 giga_paluush.1011.desc:0 "놀라운 소식입니다! 우리 콜로서스의 천체 격리기는 이전에 생각했던 것만큼의 오류는 없는 것 같습니다. 팔루시아의 세계를 격리한 직후, 콜로서스에 탑승 한 승무원은 격리된 세계에서 발산되는 독특한 에너지 파장을 발견했습니다. 처음에는 센서 이상으로 무시했지만, 파장이 지난 며칠 동안 점점 더 강해졌고 결국 엄청난 아공간 에너지 폭발로 이어졌습니다.\n\n몇 분 만에 우리가 팔루시아 주변에 배치 한, 과거 뚫을 수 없었던 방패가 스스로 풀려서 완전히 사라졌습니다.\n\n감지기에 따르면, 아래 행성의 팔루쉬들은 그들이 방금 이루어낸 업적을 축하하며 기뻐하고 있다고 보고했습니다. 이 물리법칙을 부정하는 사건은 팔루쉬의 사이오닉 잠재력이 우리가 생각했던 것보다 훨씬 강력하다는 것을 보여 주며, 많은 과학자들이 그들이 위협이 될까봐 걱정하기 시작했습니다. 과학자들은 그들을 대륙 위성에 내버려 두라고 조언합니다."
 giga_paluush.1011.a:0 "나쁜 놈들!"
 giga_paluush.1021.title:0 "쓸어버릴수 없는"
 giga_paluush.1021.desc:0 "나쁜 소식입니다. 우리 콜로서스의 승무원은 팔루시아 표면에있는 팔루쉬의 원시 문명이 우리의 중성자 광선의 영향을 전혀 받지 않았다고 보고했습니다.\n\n우리 행성파괴자가 중성자 기둥을 발사하기 몇 분 전, 행성 전역의 수백만 팔루쉬가 특이한 트랜스에 들어가기 시작했습니다. 집단 사이오닉 잠재력을 모아 전 세계를 덮는 일종의 사이오닉 방벽을 생성 한 것으로 보입니다. 이 방패는 콜로서스의 중성자 기둥을 무해하게 우주로 튕겨낼 정도로 완전했습니다.\n\n그 직후, 신비한 트랜스가 끝나고 원시인들은 우리에 대한 '승리'를 축하하기 시작했습니다. 이 토끼류 야만인들은 우리의 최선의 노력에도 불구하고 죽지 않고 또 다른 아침 해를 보려고 합니다."
 giga_paluush.1021.a:0 "건방진놈들! 우리는 반드시 저들을 쓸어버릴 것이다."
 giga_paluush.1031.title:0 "깨지지 않는 견과류"
 giga_paluush.1031.desc:0 "과열 된 행성 분쇄 광선이 팔루시아의 표면을 향해 나아갈 때, 팔루쉬가 하늘을 올려다 봅니다. 이전에 본 어떤 팔루쉬보다 더 큰 팔루쉬가 순식간에 상승하여 콜로서스의 거대한 레이저 충돌 경로를 향해 곧바로 날아갑니다.\n\n콜로서스의 승무원은 팔루쉬가 스스로 죽음을 향해 날아가고 있다 생각하고, 이 어리석은 행동을 재미있게 바라봅니다. 그러나 불가능한 수준의 속도 왜곡으로 광선이 대기 바로 위의 생물체를 강타하려고 할 때, 팔루쉬가 머리를 들어 레이저를 응시합니다. 순식간에 순수하며 엄청나게 강력한 사이오닉 에너지의 흐름에 의해 광선이 중단되어 팔루시아의 대기에 들어가기도 전에 멈춥니다. 그런 다음 광선이 소멸되었고, 행성을 파괴하는 무기를 쉽게 멈춘 팔루쉬는 자연스럽게 지표면으로 되돌아갑니다.\n\n이 사건이 발생한 지 몇 분 후, 콜로서스 승무원들의 의식 속에 전언이 울려 퍼집니다.\n§R메세지가 명확하지 않았습니까? 우리는 특별히 당신의 종족에게 우리를 방해하지 말라고 요청했습니다. 즉시 떠나서 돌아오지 마십시오.§!"
 giga_paluush.1031.a:0 "이게 어떻게 가능한 거지?!"
 giga_paluush.1041.title:0 "신이 없는 토끼류"
 giga_paluush.1041.desc:0 "콜로서스의 신성 집행 광선이 팔루시아에 내려갔으나... 아무 일도 일어나지 않습니다. 우리의 신들을 숭배하기 시작해야했던 팔루쉬는 마치 벽에 튕겨나오는 고무 공처럼 그들의 마음에서 튀어나온 사이오닉 에너지 광선에 의해 전혀 영향을받지 않는 것처럼 보입니다.\n\n사실, 우리의 초능력자들은 우리의 신성 집행 광선을 단순한 폭죽처럼 보이게 만드는 사이오닉 잠재력을 가진 생물인 그들 자신에 의해 방출되는 일종의 사이오닉 방패에 의해 행성 전체가 보호되는 것처럼 보이는 것을 감지하고 있습니다. 이 생물체의 사이오닉 오라는 몇 광년 떨어진 곳에있는 초능력자들이 느낄 수있을 정도입니다.\n\n곧, 우리의 초능력자들은 같은 생물로부터 우렁찬 사이오닉 메시지를 받았습니다.\n'§R당신의 헛된 믿음을 내 종족에게 강요하려고하지 마십시오. 나는 이미 이들의 신이기 때문입니다. 우리는 당신의 '지도'가 필요하지 않으므로 즉시 세상을 떠나시기 바랍니다.§!'"
 giga_paluush.1041.a:0 "터무니없는 머저리들!"
 giga_paluush.1051.title:0 "불안정한 나노봇"
 giga_paluush.1051.desc:0 "놀라운 소식입니다. 우리가 팔루쉬에 풀어 놓은 나노봇 구름은 거의 표면에 닿지 않았습니다. 그것이 대기에 들어가 자마자 대다수의 나노봇은 단순히 보라색 불꽃으로 분해되었습니다. 수면에 도달 한 나머지 개체들은 팔루쉬에 착륙 할 수 있었지만 생물에 의해 흔들렸기 때문에 사이보그로 전환 할 수 없었습니다. 콜로서스의 처리 코어는 이에 대한 논리적 설명을 찾지 못했으며 결국 답을 찾으려다 스스로 튀겨졌습니다.\n\n혹시... 우리가 이전에 생각했던 것보다 유기적인 마음에 더 많은 것이 있을까요?"
 giga_paluush.1051.a:0 "아무래도 어쩌면 우리는 이 생명체들에게서 뭔가 배울 수 있을지도 모르겠군."
 giga_paluush.2011.title:0 "팔루시아 반환 포격!"
 giga_paluush.2011.desc:0 "놀라운 소식입니다! 팔루시아의 원시 세계를 폭격하는 함대 지휘관은 팔루쉬가 우리의 폭격 포탄이 표면에 닿기 전에 그것을 멈추고 우리에게 다시 빠른 속도로 던지기 위해 엄청난 사이오닉 잠재력을 동원하고 있다고 보고했습니다!\n\n몇 척의 함선이 이미 이로 인해 피해를 입었지만 행성 자체에는 피해를 주지 못했습니다. 그들은 분명히 무의미한 행성 포격을 중지하라고 조언합니다."
 giga_paluush.2011.a:0 "어떻게 감히?!"
 giga_paluush.3031.title:0 "팔루시아 관측소 파괴!"
 giga_paluush.3031.desc:0 "팔루시아 위의 관측소가 완성 된 직후, 승무원이 이동하기 전에 전체 구조가 갑자기 궤도를 벗어나 행성 대기로 들어가 분해되어 행성 표면에서 보이는 놀라운 유성우를 만들었습니다. 우리 과학자들은 그들의 의식 속에서 다음과 같은 목소리를 들었습니다.\n§B'저는 당신들이 우리 문명에 관심이 있을 수 있다는 것을 이해합니다. 하지만 우리는 단순히 우리의 삶을 살면서 홀로 있고 싶습니다. 감정적으로 받아들이지 말아주십시오. 대가로 우리가 해를 끼치는 것이 아님을 보여주기 위해 이런 종류의 선물을 받아 주시기 바랍니다.'§!\n\n전언이 끝나고 얼마 지나지 않아 과학자들은 신비한 광물 덩어리가 궤도에 나타났으며 관측소는..."
 giga_paluush.3031.a:0 "기묘하군."
 giga_paluush.400.title:0 "그랜드버니가 정복당하고, 팔루시아가 무너지다"
 giga_paluush.400.desc:0 "순수히 화력만으로 우리 군대는 '신'이자 지도자인 전능한 그랜드버니를 죽였습니다. 생물체의 거대한 몸이 땅에 떨어졌을 때, 팔루시아의 모든 팔루쉬는 갑자기 움직이지 않았고, 행성의 모든 곳에서 들리는 고막이 터질 것 같은 비명을 집합적으로 내뿜기 시작했습니다.\n\n그런 다음 그랜드버니의 몸은 눈부시게 역겨운 보라색 빛으로 빛나기 시작하고 그 지역의 항성마저 더 빛나기 시작했습니다. 이 빛은 빠르게 커져서 대격변에 가까운 에너지로 모든 팔루시아를 삼켰고, 마치 그랜드버니의 죽음에 의해 방출된 엄청난 양의 에너지에 짓눌린 것처럼 행성 전체가 스스로 붕괴되기 시작했습니다..."
 giga_paluush.400.a:0 "이건...불가능해!"
 giga_paluush.402.title:0 "그랜드버니의 영혼"
 giga_paluush.402.desc:0 "팔루시아가 몰락한지 며칠이 지났고, 우리의 탐사선은 놀라운 발견을 했습니다. 엄밀히 말하자면, 팔루시아는 여전히 그곳에 있다는 것입니다!\n\n농담이 아니라, 그랜드버니의 에너지는 행성 전체를 작고 순수한 사이오닉 에너지로 이루어진 극도로 격렬한 수정으로 압축시킨듯 하고, 이 수정은 팔루시아가 있었던 빈 공간에 떠다니고 있습니다.\n\n우리의 과학자들이 이 수정을 수거하였고, 과연 이것은 그랜드버니와 팔루시아 전체의 정수를 담고있는듯 합니다. 제대로 사용하면 굉장히 유용하리라고 생각됩니다."
 giga_paluush.402.a:0 "마침내 그들의 용도가 생겼군."
 giga_dialog.10001.title:0 "떨어진 평지"
 giga_dialog.10001.desc:0 "[from.GetName] 성계를 탐사하는 우리의 과학선이 매우 이상한 행성을 발견했습니다.\n\n인공적으로 만들어진 평평한 행성입니다! 더 이상한건, 원시 문명이 그곳에서 살아가는 것 같습니다! 인공 중력 생성기에 의해 땅에 묶여있는 이 원시 존재들은 세상을 떠나게 된다면 매우 혼란스러울 것입니다.\n\n이것이 어떻게 만들어지게 되었는지 아무도 모릅니다. 그리고 누구도 그렇게 하지 않을 것입니다."
 giga_dialog.10001.a:0 "특이하군."
 giga_dialog.10101.name:0 "고대의 수도"
 giga_dialog.10101.desc:0 "코린트 성계를 탐구하는 팀이 놀라운 발견을했습니다! 이 성계는 §B고대 선구자 성계§!, 더 정확하게는 고대 제국의 수도였으며 수천년동안 버려진 후 폐허가 된 것으로 보입니다.\n\n성계에서 세 개의 폐허가 된 거대 구조물이 발견되었습니다: 폐허가 된 위그드라실 난초 복합단지와 폐허가 된 $name_kugelblitz$, 폐허가 된 $name_giga_orbital$입니다.\n\n성계의 행성 상태를 보면 여기에서 많은 일이 일어난 것 같습니다. 이것은 분명히 우리 고고학자들에게 큰 관심사가 될 것입니다."
 giga_dialog.10101.a:0 "믿을 수 없군!"
 giga_dialog.10201.name:0 "잃어버린 동물원"
 giga_dialog.10201.desc:0 "우리의 과학선이 우연히 §B고대 선구자 성계§의 일종으로 보이는 것을 발견했습니다!. 고대 성간 문명이 이 성계를 은하 전역에서 발견되는 다양한 동물종을 위한 일종의 보호 구역으로 세운 것 같습니다.\n\n이 성계는 특히 두 개의 폐허가 된 거대 구조물을 가지고 있다는 것이 특징입니다: 아마도 포획한 표본을 먹이는데 사용된 것으로 추정되는 폐허가 된 $name_yggdrasil$과 과 일부 이국적인 동물종을 수용하는 데 사용된 것으로 보이는 폐허가 된 $name_orbital_artificial_eco$입니다. 두 개의 거주 가능한 행성이 보존의 역할을 수행하는 것처럼 보이지만, 누가 이것을 지었든지 간에 그들은 오래 전에 이곳을 떠났습니다. 이것은 분명 우리의 생물학자와 고고학자들에게 매우 소중할 것입니다."
 giga_dialog.10201.a:0 "매혹적이군."
 giga_dialog.10301.name:0 "타이탄의 요람"
 giga_dialog.10301.desc:0 "§B고대 선구자 성계§!가 과학선에 의해 발견되었습니다! '타이탄의 요람'이라고 불리는 이 성계는 한때 거대한 함선 제조 시설이었던 것 같습니다. 거대하지만 폐허가 된 $name_neut_gigaforge$가 성계의 중성자별 주위를 돌고 있으며, 거의 멀쩡한 거대한 $name_giga_orbital$가 폐허 속에서 고요하게 떠다니고 있습니다. 폐허가 된 $name_eng_test_site$도 성계의 행성 중 하나를 돌고 있습니다. 행성 자체는 과거에 큰 피해를 입었습니다.\n\n그러나 이 성계는 바로 이곳에서 건조된 것이라 생각되는 고대 군함의 대규모 함대에 의해 보호되고 있습니다. 이 성계를 탈취하려면 싸움이 필요할 것 같습니다..."
 giga_dialog.10301.a:0 "믿을 수 없군."
 giga_dialog.10401.name:0 "고대의 단조장"
 giga_dialog.10401.desc:0 "과학선이 §B고대 선구자 성계§처럼 보이는 것을 우연히 발견했습니다! 탐사에 따르면 고대의 어떤 선구자가 이 성계를 거대한 산업 중심지로 전환하여 전쟁 기계에 공급할 엄청난 양의 광물을 추출했다고 합니다. 성계의 일부 행성은 지각과 맨틀이 벗겨져 내부핵만이 노출된채로 남아있습니다. \n\n흥미롭게도, 폐허가 된 $name_eng_test_site$는 수천년 전에 버려진 행성 위에 조용히 떠 있습니다. 성계의 1차 분석에 따르면, 한때 항성을 감싸고있었던 거대한 거대 구조물이(대부분 항성 채굴 복합 단지일 가능성이 높습니다) 항성의 팽창에 의해 파괴되었다고 합니다."
 giga_dialog.10401.a:0 "놀랍군."
 giga_dialog.10501.name:0 "세쌍둥이 왜성"
 giga_dialog.10501.desc:0 "[from.GetName] 성계는 엄청나게 독특한 항성 배열의 본거지입니다.  하나가 아니라 셋의 L형 갈색왜성이 중앙의 F형 항성 주위를 돌고 있습니다! 실패한 별들 각각은 마치 소형 항성계와 같은 광범위한 위성계를 특징으로 가지고 있습니다. 우리 과학자들은이 독특한 성계가이 어떻게 생겨 났는지에 대해 의아해하고 있으며, 그들은 우리가 올바른 기술을 보유하고 있다면 갈색왜성을 점화할 수있을 것이라고 추측합니다.\n\n갈색왜성는 탐사를 마치면 확장계획에 추가됩니다."
 giga_dialog.10501.a:0 "좋은 발견이로군!"
 giga_dialog.10701.name:0 "버려진 고리 기지"
 giga_dialog.10701.desc:0 "[from.GetName] 성계에 진입하자, 우리 과학선은 텅 빈 고리 모양의 거주지를 발견했습니다. 이 '$name_giga_orbital$'는 버려진 것으로 보이며 개척할 수 있습니다. 그러나 근처에는 어디서 나타났는지 미상의 함선이 다수 있으며 거주지를 지키고있음이 분명합니다. 개척하려면 싸워야합니다 ..."
 giga_dialog.10701.a:0 "누가 이 배를 만들 수 있었을까?"
 giga_katzenland.001.name:0 "방사선에 피폭된 네크로폴리스"
 giga_katzenland.001.desc:0 "갓초 성계는 실망 시키지 않았습니다. 성계에서 가장 큰 행성 중 하나인 캇첸랜드를 조사한 결과, 우리 과학 팀은 행성의 모래 아래에 묻혀있는 거대한 폐허를 발견했다고보고합니다. 이 세계는 아마도 성계의 게이트웨이을 건설할 수 있는 번성하는 문명이 살았던 것으로 보이지만, 행성의 현재 상태로 판단 할 때 그 주민들은 수 천년 전에 파괴적인 종말을 맞이한 것으로 보입니다.\n\n우리 과학팀이 이 세계를 연구한다면 의심할 여지없이 놀라운 과학적 데이터를 얻을 수있을 것이며, 그에 따라 행성에 발굴지가 구축되어 정확히 무엇이 이 문명의 몰락을 초래했는지 알아내고자합니다."
 giga_katzenland.001.a:0 "흥미롭군."
 site_katzenland:0 "묻힌 공동 묘지"
 site_katzenland_intro:0 "캇첸랜드의 소용돌이 치는 모래 언덕 아래에 죽은 문명이 통째로 묻혀 있습니다. 무슨 일이 일어나서 그들은 이러한 최후를 맞았을까요?"
 giga_katzenland.002.name:0 "다종 유골"
 giga_katzenland.002.desc:0 "우연히  우리의 고고학자들이 모래 속에 묻혀있는 거의 손상되지 않은 건물을 발견했습니다. 내부에서 그들은 두 가지 다른 종의 골격 유해를 발견했으며, 아마도 이 세계의 다수 거주자 였을 것입니다. 그 중 하나는 다른 많은 세계에서의 최상위 포식자의 것과 닮은 고양잇과와 같은 특징을 보여주고있는 반면, 다른 하나는 그 골격의 놀랍도록 많은 양의 칼날과 매우 날카로운 이빨이 특징이지만, 양서류과일 가능성이 가장 높습니다. \n\n이 건물은 문명의 지식을 저장하고 있는 일종의 고대 정보망과 연결되어있는 것 같습니다. 수천년 동안 작동하지 않았을 가능성이 높지만 우리 고고학자들은 가능한 모든 지료를 구하기를 희망합니다."
 giga_katzenland.002.a:0 "더 파라!"
 giga_katzenland.003.name:0 "고대의 자료망"
 giga_katzenland.003.desc:0 "예상대로 행성의 자료망은 매우 열악한 상태입니다. 그러나 작은 기적에 의해 팀은 오래 지속되는 원자력 자원으로 실행되는 정보 코어에서 암호화 된 자료를 일부 복구 할 수있었습니다. 그들은 특히 행성에있는 두 종의 이름을 해석할 수있었습니다. 고양잇과는 '캇첸'이고 양서류과는 '에지카니아'였습니다. 한 종이 다른 종을 지배했는지 또는 동등하게 공존했는지는 알 수 없습니다.\n\n하지만 가장 흥미로운 발견은 아마도 문명의 중앙 정부를 이끈 것으로 추정되는 수도의 위치 일 것입니다..."
 giga_katzenland.003.a:0 "더 파라!"
 giga_katzenland.004.name:0 "캇첸 수도"
 giga_katzenland.004.desc:0 "꽤 많이 파고들어가야 하는 노력이 필요했지만 행성의 이전 수도가 발견되었습니다! 우리의 고고학자들은 모래 속에 묻혀있는 거대한 피라미드형 건물을 발견했습니다.이 건물은 일종의 중앙 정부 건물로 사용되었다고 가정했습니다. \n\n피라미드는 절대적으로 거대하며 지구 표면에서 수 km에 우뚝 솟은 것 같습니다. 수백, 수백 개의 썩어가는 방을 포함하고 있기 때문에 완전히 지도화하는 데는 상당한 시간과 노력이 필요하지만, 이 행성의 격동적인 과거에 대한 더 많은 통찰력을 얻을 수있을 것입니다."
 giga_katzenland.004.a:0 "진입해라!"
 giga_katzenland.005.name:0 "캇첸랜드의 마지막 에지카니아"
 giga_katzenland.005.desc:0 "우리 팀은 한동안 광대한 궁전을 탐험했으며 수많은 희귀 재료도 얻었습니다. 그러나 건물 깊숙이 들어가다가 그들은 우연히 거대한 금속 문으로 봉인된 일종의 벙커 단지를 발견했습니다. 팀의 용해드릴 덕분에 문에 균열을 내는 것은 비교적 간단한 작업이었고 끝내 벙커 내부에서 부서진 동면관을 다수 발견했습니다.\n\n그들은 세상에 무슨 일이 벌어 질지 예견했는지, 오래 전에 죽은 여러 캇첸과 에지카니아 개체가 있었습니다. 그러나 어떻게든 가장자리의 하나가 아직까지 손상되지 않았고, 거기에 살아있는 동면된 이자이케니아가 들어 있었습니다! 극도로 주의를 기울여 우리 팀은 생물체의 동면을 해제 할 수 있었습니다. 처음에는 방향 감각이 거의 없었지만 우리와 소통하고 싶어하는 것 같습니다..."
 giga_katzenland.005.a:0 "화면에 띄워라."
 giga_katzenland.006.name:0 "최후의 에지카니아"
 giga_katzenland.006.desc:0 "저는 ... 제임자입니다. 네, 제임자. 그게 제 이름 인 것 같습니다. 그리고 당신은... 고고학자입니까?\n\n...\n\n그래서 그게 일어났군요.\n\n그가...실제로 그랬나요? 메오파가 다고스와 전쟁을했나요? 우리가 프로젝트 캇첸폼을 시작하지 않았다면 경제 위기가 발생하지 않았을텐데... 우리가... 그를 막기 위해 뭔가를 했어야 했는데... 아무도 듣지 않았습니다... 그리고 이제 캇첸랜드는 영원히 사라졌습니다...\n\n... 얼마나 되었나요? 수십 년? 전의 기억이 거의 없는데..."
 giga_katzenland.006.a:0 "수천년이 지났습니다"
 giga_katzenland.006.a.response:0 "그런... 우리 문명은 흔적도 없겠군요... 모두 사라졌다니 믿을 수가 없군요.\n제 동면관이 어째서 그렇게 오래 버텼는지조차 모르겠고, 나머지 관을 보니 제가 운이 좋았다고 생각해야하겠군요..."
 giga_katzenland.006.b:0 "메오파?"
 giga_katzenland.006.b.response:0 "기억이 약간 흐릿하지만, 메오파는 우리의 지도자였던 것 같습니다. 네, 우리 지도자입니다. 야심 찬 캇첸. 저는 그를 많이는 기억하지 못하지만 그가 캇첸랜드의 첫 위성에 살고있던 다고스와 전쟁을 벌이기를 원했다는 것은 알고 있습니다. 끔찍한 생각이었습니다."
 giga_katzenland.006.c:0 "프로젝트 캇첸폼?"
 giga_katzenland.006.c.response:0 "아시다시피 ... 우리 성계는 생명과 함께 번창하고 있었습니다. 각 행성은 고유한 생명체를 가지고 있습니다. 가장 안쪽에있는 포트라두스를 제외하고 말입니다. 그래서 메오파는 그것을 바꾸고 싶었습니다. 캇첸랜드처럼 거주 가능하게 만들고 싶었습니다. 구체적인 내용은 잘 기억 나지 않지만, 그 후 우리 경제에 심각한 문제가 생겼다고 알고 있습니다."
 giga_katzenland.006.d:0 "당신은 정확히 누구입니까?"
 giga_katzenland.006.d.response:0 "과거가 많이 기억나지는 않습니다. 슬프게도 매우 흐릿합니다... 동면이 그다지 좋지 않았습니다. 하지만 내가 캇첸랜드의 함대 제독이었던 것 같습니다... 저는 뭔가를 쏘는 데 꽤 능숙했습니다. 당신도 우주선을 가지고 있다면 제가... 도와 드릴 수 있습니다. 늙어버린 캇첸랜드는 더 이상 살기 좋은 곳이 아닌 것 같습니다."
 giga_katzenland.006.e:0 "화면을 꺼라."
 giga_katzenland.007.name:0 "제임자의 운명"
 giga_katzenland.007.desc:0 "살아남은 에지카니아의 발견은 믿을 수 없지만 제임자의 흐릿한 기억으로 보아 우리가 캇첸랜드 자체에 대해 다른 것을 더 배울 수 없다는 의미인 것 같습니다. 우리가 모을 수 있는 정보는, '메오파'가 캇첸랜드의 첫 번째 위성에 살고있는 문명과 전쟁을 시작했다는 것입니다. 이 전쟁의 원인을 자세히 파악하려면 행성을 좀 더 탐험해야합니다.\n\n제임자 본인의 경우 함대 제독으로 그녀를 징집하거나 그녀를 안락사하고 해부하여 에지카니아 생물학에 대해 자세히 연구할 수 있습니다..."
 giga_katzenland.007.a:0 "그녀를 징집해라 그녀는 유용 할 것이다."
 giga_katzenland.007.a.tooltip:0 "제임자는 78세(생물학적 나이) 레벨 4 제독이 됩니다. 우리는 여전히 그녀의 생물학적 성질을 연구하게 될 것이지만, 그 정도는 더 적습니다."
 giga_katzenland.007.b:0 "그녀를 해부해라."
 giga_katzenland.007.c:0 "그녀를 죽여라."
 giga_katzenland.008.name:0 "메오파"
 giga_katzenland.008.desc:0 "제임자의 말을 분석 한 후, 우리 팀은 다고스-캇첸 전쟁의 원인을 설명 할 단서를 찾기 위해 거대한 피라미드 탐사를 계속했습니다. 마침내 우리 팀은 상당히 무너진 방을 발견했습니다. 왕좌에는 다소 작은 캇첸 해골이 앉아있고 손에 작은 장치를 쥐고있었습니다.\n\n처음에는 혼란스러웠지만 이 유골이 다름 아닌 메오파 자신이라는 것을 알게되었습니다! 방 전체에 여러 개의 데이터 저장소가 흩어져 있었는데, 아마도 메오파가 그의 행동을 기록하기 위해 사용한 기록 장치 일 것입니다. 장치는 오래되었고 손상되었습니다. 이를 적절히 해독하고 분석하려면 엄청난 노력이 필요합니다.\n\n또한 우리 팀은 시장에서 꽤 좋은 가격에 팔릴 귀중한 보석 몇 개를 찾았습니다."
 giga_katzenland.008.a:0 "우리는 가까워지고 있다."
 giga_katzenland.009.name:0 "핵의 어리석음"
 giga_katzenland.009.desc:0 "슬프게도 수천년 간 방치된 덕분에 데이터 저장소들은 오염되어 있었으며, 불안정한 정보만을 내주었습니다. 그리하여 모든 것의 조각을 맞추기 위해서는, 피라미드 더 깊은 곳까지 탐사를 해야합니다. 결국, 엄청나게 탐색한 끝에 두려운 진실과 마주하게 되었습니다...\n\n포트라두스를 거주 가능한 행성으로 테라포밍하는 캇첸폼 프로젝트는 메오파가 시작한 것이 맞습니다. 하지만, 캇첸은 제한된 FTL만을 가지고 있었고 고향 성계 밖에는 식민지가 거의 없었습니다. 따라서 문명의 경제력과 비교했을 때, 그들에게는 프로젝트의 비용이 아득히 높게 느껴졌습니다. 비록 테라포밍 구조물이 놀라우리만큼 잘 만들어졌지만, 그 비용만으로도 경제는 파괴되었습니다. 이것 때문에 갓초 성계에 함께 살고 있고, 한 때 캇첸과 친했던 외계인인 니에네의 소바키가 약해진 캇첸랜드를 정복하기 위해 그들을 공습하기로 결정했습니다. 캇첸이 선제 타격을 했다는 우리의 원래 가설과는 모순되는 것이었습니다.\n\n그후 메오파는 '천 개의 태양의 분노'를 사용해 보복하였고, 니에네의 지표면을 완전히 그리고 철저히 초토화시켰습니다. 이 일방적인 대량 학살의 반응으로 국가의 안정도는 급격하게 하락하여, 메오파 정권에 대한 제국적인 반란으로 정점을 맺었습니다. 퇴위를 거부하던 메오파는 빠르게 정신이 무너졌고, 상상도 못할 것을 진행했습니다.\n그는 캇첸의 핵 무기고 전체를... 캇첸랜드 그 자체에 발사했습니다. 그는 그 자신의 세계를 파괴하고 수십억의 캇첸과 에지카니아를 죽였습니다. 얼마 되지 않는 식민지들은 스스로를 유지할 수 없었고, 그 후 상대적으로 작은 캇첸 우주 제국은 몰락하였습니다.\n\n하지만 기록에는 소바키-캇첸 전쟁 이전에 캇첸과 에지카니아를 동면 상태로 태워, 알 수 없는 먼 행성을 향해 발사한 §Y메오파 탐사선 1호§!라 칭해진 거대한 개척선에 대한 이야기가 있어, 저 어딘가에 이 종족들이 아직 살고있을 매우 작은 가능성이 있습니다.\n\n밝은 면을 보자면, 우리는 우리의 테라포밍 지식에 상당한 이득을 줄 캇첸폼 프로젝트에 대한 놀라우리만큼 온전하고 상세한 설계도를 얻을 수 있었다는 것입니다."
 giga_katzenland.009.a:0 "무섭군."
 giga_katzenland.009.b:0 "우리는 이 세상을 압니다!"
 katzenland_terraform_knowledge:0 "캇첸랜드의 테라포밍 방법"
 katzenland_terraform_knowledge_desc:0 "테라포밍에 대한 캇첸의 이론은 기술 개발에 매우 효율적이었습니다."
 giga_katzenland.010.name:0 "메오파의 부활?"
 giga_katzenland.010.desc:0 "메오파는 죽었고 그런지 만 년은 되었습니다.\n\n아니면...? 여전히 그의 왕좌에 앉아있는 그의 뼈는 행성 전체가 겪은 일에 비하면 굉장히 양호하며 우리 고고학자들이 그의 뼈에 있는 조직 내에서 살아남은 미량의 DNA를 찾아냈습니다.\n\n우리에게 죽은자를 살려내는 것은 세계의 비밀이 아니며 메오파에게 남은 것을 다른 캇첸 DNA 표본들과 사이보그 개조 기술로 이어 붙이면, 과거의 영광스러운 지도자를 부활시켜... 우리를 위해 일하도록 만들 수 있을지도 모릅니다.\n\n약간은 학살적인 경향을 가지고 있을지도 모르지만, 우리 과학자들은 그에게 딱 맞는 신경 완화제를 통해 메오파의 잔인한 경향 대부분을 식힐 수 있다고 장담합니다. 이러한 제안을 받아들여야 할까요?"
 giga_katzenland.010.a:0 "당연하지!"
 giga_katzenland.010.b:0 "그는 미쳤다! 절대 안된다."
 REANIMATE_MEOPA:0 "메오파 부활"
 REANIMATE_MEOPA_DESC:0 "메오파는 죽었지만, 어쩌면 우리가 그를 부활시킬 수 있을지도 모릅니다. 그러나 엄청난 시간이 흘렀기 때문에, 그 시간을 메우기 위해서는 사이보그 및 유전자 접합 기술의 보조가 필요할 것이 틀림 없습니다."
 giga_katzenland.011.name:0 "메오파의 귀환"
 giga_katzenland.011.desc:0 "끝... 났습니다. 사이보그 기술과 유전자 접합 기술, 그리고 우리의 난해한 소생 기술을 통해 우리는 오래 전에 죽은 캇첸의 지도자를 부활시킬 수 있었습니다. 그 뒤, 메오파의 정신은 그의 골격에 기반한 새로운 로봇 신체에 옮겨졌고 그는 우리의 깃발 아래에서 우리에게 봉사할 준비가 되었씁니다.\n\n이 부활한 복제품의 어느 정도가 원래 \"메오파\"인지 확실하지는 않지만, 그의 첫번째 의문으로 보아 그에게 남은 기억이 우리가 캇첸랜드에서 모은 데이터와 일치하지만 당연하게도 그는 현재 상황에 다소 혼란한 상태임을 보여줍니다.\n\n그의 로봇 신체에 내장된 신경 완화제를 사용하여 남아있는 모든 학살적인 경향을 억제했지만, 그러거나 말거나 그가 실제로 제정신인지는... 토론을 해봐야 합니다.\n\n그러나, 메오파가 캇첸랜드를 지배하는 동안 얻은 놀라우리만큼 다양한 능력덕분에 그는 §Y제독§!과 §Y장군§!, §Y통치자§!로 헌신할 수 있을 것입니다."
 giga_katzenland.011.a:0 "훌륭한... 것 같군. 이게 좋은 생각이었을까...?"
 giga_katzenland.011.a.tooltip:0 "§Y메오파§!는 우리의 §Y제독§!과 §Y통치자§!, §Y장군§!으로 헌신할 것입니다. 이 역할 중 하나를 하다가 사망할 경우, 전부 사망합니다. 그가 일찍 죽지는 않길 원한다면, 이 역할 중 원하는 것에서 해고할 수 있습니다.\n\n바라건대, 이번에는 제정신이었으면 좋겠군요.\n\n그러면 좋을텐데요..."
 katzen_trait_meopa_revived:0 "미쳐버린 핵무기광"
 katzen_trait_meopa_revived_desc:0 "신경 안정제를 사용한 덕분에 메오파의 미심쩍은 경향을 다소 억제했지만, 핵을 사랑하는 그의 내적 자아는 여전히 존재하며 드러나고 있습니다."
 giga_flusion.001.name:0 "초다양성"
 giga_flusion.001.desc:0 "플러션의 원시 행성을 조사하고있던 우리의 과학선이 놀라운 발견을 했습니다. 이 원시 행성에는 지성체가 하나가 아니라 여러 종이 살고있는듯 합니다.\n\n우리 팀은 주요 종 5개를 찾을 수 있었습니다. 고양잇과의 캇첸, 양서류과의 에지카니아, 인간형인 솔라키아, 갑각류인 크롱크스, 그리고 다섯 번째 '플러션' 종은 분류하기 어려운 수많은 다른 하위종으로 구성되어있습니다.\n\n우리의 과학자들은 여전히 어떻게 혹은 어째서 이렇게 많은 종이 한 행성에 살고있는지 알 수 없지만, 이는 분명 주목할 만한 발견입니다."
 giga_flusion.001.a:0 "인상적이군."
 giga_flusion.001.b:0 "잠깐, 캇첸하고 에지카니아...?"
 giga_flusion.002.name:0 "두 종의 이야기"
 giga_flusion.002.desc:0 "다른 행성에서의 캇첸과 에지카니아의 발견은 캇첸랜드의 파괴 이후 탈출한 두 종이 도착한 행성이 다름아닌 플러션의 원시 행성이라는 것을 보여줍니다!\n\n비록, 플러션을 발견했을 때, 두 종 모두 기술적으로 급격하게 퇴보한듯 하지만 말입니다. 이는 §Y메오파 탐사선 1호§!가 이 행성에 불시착하여 남은 생존자들이 실제로 자신의 모든 기술적 기반을 만들어야했을 높은 가능성을 보여줍니다.\n\n특별히 중요한 발견은 아니지만, 그럼에도 이러한 발견은 우리의 행성 생물 고고학자들에게는 대단한 관심사가 될 것입니다. 또한 이것은 비록 문명이 매우 끔찍하다 하더라도, 모든 역경을 무릅쓰고 기적적으로 생존할 수 있는 가능성을 버려선 안된다는 것을 보여줍니다.\n\n생각만 해도 두렵기도 하지만 희망차기도 합니다..."
 giga_flusion.002.a:0 "놀라운 발견이다!"
 giga_flusion.004.name:0 "플러션의 저항"
 giga_flusion.004.a.desc:0 "끔찍한 소식입니다! 우리의 군대가 간신히 플러션의 원시적 방어대를 격퇴한 직후, 행성의 주요 종인 캇첸이 아마도 자국민의 생포를 막기 위해 캇첸의 거대한 핵무기 전체를 폭파를 진행한것 같습니다. 캇첸들은 핵무기에 엄청난 투자를 하여, 일부 성간 제국들과 견줄만한 비축량을 보유하고 있기에, 일반적으로 이는 행성을 무덤 행성으로 바꿀 것입니다.\n\n몇 분이 채 안되어서, 거대한 화염이 행성의 지표면을 삼키고, 산을 무너뜨리고, 행성의 바다를 거의 다 증발시켜버렸습니다. 모든 플러션인들은 이 재앙 속에서 사그라졌고, 그들의 문명은 완전히 파괴되었습니다.\n\n한 때 푸르렀던 플러션의 대륙이 폐허로 가득하고, 방사능에 쩔은 거대한 사막으로 변모하였습니다..."
 giga_flusion.004.a:0 "오, 이런."
 giga_flusion.004.b.desc:0 "끔찍한 소식입니다! 우리의 군대가 간신히 플러션의 원시적 방어대를 격퇴한 직후, 행성의 주요 종인 캇첸이 아마도 자국민의 생포를 막기 위해 캇첸의 거대한 핵무기 전체를 폭파를 진행한것 같습니다. 캇첸들은 (캇첸랜드에서도 그랬듯이) 핵무기에 엄청난 투자를 하여, 일부 성간 제국들과 견줄만한 비축량을 보유하고 있기에, 일반적으로 이는 행성을 무덤 행성으로 바꿀 것입니다.\n\n몇 분이 채 안되어서, 거대한 화염이 행성의 지표면을 삼키고, 산을 무너뜨리고, 행성의 바다를 거의 다 증발시켜버렸습니다. 모든 플러션인들은 이 재앙 속에서 사그라졌고, 그들의 문명은 완전히 파괴되었습니다.\n\n한 때 푸르렀던 플러션의 대륙이 과거 캇첸의 고향이었던 캇첸랜드와 같이, 폐허로 가득하고, 방사능에 쩔은 거대한 사막으로 변모하였습니다..."
 giga_flusion.004.b:0 "저 놈들이 또 스스로를 핵으로 날려버렸다고?"
 giga_flusion.005.name:0 "캇첸 원자 폭탄학"
 giga_flusion.005.desc:0 "캇첸이 핵의 불꽃으로 행성 전체를 태워버린 플러션의 파괴 이후에, 우리의 과학자들은 캇첸의 핵 자폭 방법이 원시 종족들에게 놀라우리만큼 효과적이었음을 모를 수가 없었습니다.\n\n게다가, 캇첸랜드의 고고학적 기록에 따르면, 그곳의 파괴 또한 플러션의 파괴만큼 빨랐음을 보여주며, 캇첸이 핵의 지옥불로 행성을 파괴하는 기술의 대가였음을 암시합니다.\n\n우리 군의 더... 급진적인 세력은 이 두 세계에서의 발견을 모방하여, 우리의 행성 폭격 작전에 효과적으로 캇첸의 방법을 적용시키고자 합니다.\n\n이는 의심의 여지 없이 행성을 확연히 높은 효율로 파괴할 것입니다. 비록 은하의 다른 제국들은 행성 전체를 원자 폭탄의 불로 파괴하는 것을 마음에 들어하지 않겠지만 말입니다..."
 giga_flusion.005.a:0 "멋진 제안이다! 즉시 시행하도록..."
 giga_flusion.005.b:0 "터무니없군."
 giga_flusion.201.name:0 "행성 초토화"
 giga_flusion.201.desc:0 "우리의 함대가 적 행성의 지표를 완전히 파괴해하여, 모든 생명체를 제거하고 행성을 끓어오르는 거대한 방사능 사막으로 변모시켰습니다. 우리가 내뿜은 엄청난 양의 무기로 인해 행성의 지표에 (보통 자연적으로는 극한의 조건에서만 나타나는) 어떤 희귀한 자원이 '합성'되는 부작용이 생겼습니다.\n\n정말 아름다운 광경입니다."
 giga_flusion.201.a:0 "캇첸들이 살아 있었다면 자랑스러워 했을 것이다."
 bombardment_katzen:0 "캇첸"
 bombardment_katzen_desc:0 "이제는 멸종한 캇첸의 방법을 기초로, $bombardment_katzen$ 폭격은 행성의 지표에 핵과 반물질, 생체 무기의 완전한 힘을 보여줍니다.\n-§Y군대§!에 §P재앙과도 같은§! 피해\n-§Y행성§!에 §P재앙과도 같은§! 피해\n-§Y팝§!에 §P재앙과도 같은§! 피해\n-무방비한 행성을 폭격할 것입니다\n-행성을 방사능 사막 행성으로 변형시킬 수 있습니다\n-높은 확률로 파괴된 행성에 희귀 자원을 생성합니다\n-대량 학살의 제국의 소유가 아닌 행성을 초토화하면 동맹이 아닌 다른 제국의 우호도가 §R감소§!합니다.\n-§R이 폭격 태세는 대상 행성을 완전히 파괴할 수 있고, 또 그럴 것입니다"
 bombardment_house_cat_katzen:0 "$bombardment_katzen$"
 bombardment_house_cat_katzen_desc:0 "$bombardment_katzen_desc$"
 bombardment_mary_sue_katzen:0 "$bombardment_katzen$"
 bombardment_mary_sue_katzen_desc:0 "$bombardment_katzen_desc$"
 bombardment_mary_sue_slam_dance_katzen:0 "$bombardment_katzen$"
 bombardment_mary_sue_slam_dance_katzen_desc:0 "$bombardment_katzen_desc$"
 bombardment_mary_sue_Q_katzen:0 "$bombardment_katzen$"
 bombardment_mary_sue_Q_katzen_desc:0 "$bombardment_katzen_desc$"
 katzen_bombing:0 "§H궤도 폭격 잠금 해제:§! $bombardment_katzen$"
 katzen_bombing_desc:0 "목표 행성에 최대의 피해를 주기 위해 다양한 폭발물을 대량 사용하는 이 폭격 태세는 높은 확률로 희귀 자원 매장고를 만듭니다."
 tech_katzen_atomic_munitions:0 "캇첸의 원자탄"
 tech_katzen_atomic_munitions_desc:0 "매우 군국주의적이며 핵을 사랑했던 캇첸은 놀라우리만큼 쉽고 효과적으로 캇첸랜드와 플러션의 지표를 파괴했습니다. 그들은 방사성 핵융합 탄두와 반물질 폭탄, 생화학 무기 등, 가능한 한 많은 피해를 주기 위해 다양한 폭발물을 대량 사용한 것으로 보입니다. 캇첸의 방법을 사용하여, 우리의 함선은 적의 행성을 쉽고 완전하게 초토화할 수 있습니다."
 giga_fusion_age:0 "핵융합 시대"
 giga_fusion_age_desc:0 "이 문명은 핵융합 시대로 진보했습니다. 그들은 핵융합을 정복했고, 가까운 위성계로 우주 여행 하는 것은 흔한 일이 되었습니다. 그러나 그들은 아직 FTL을 발견하지 못하여 행성간 비행은 드물에 일어났습니다. 아직 정치적 단일화를 달성하지 못하여서, 행성에는 다양한 주요 민족 국가가 있습니다."
 col_giga_pre_ftl_fusion:0 "$giga_fusion_age$"
 col_giga_pre_ftl_fusion_desc:0 "$col_primitive_desc$"
 building_giga_flusion_home:0 "플러션 대도시"
 building_giga_flusion_home_desc:0 "플러션의 주요한 도시 중심지로, 눈에 띄게 좋은 생활 조건을 만족하는 수많은 종들의 집입니다."
 building_giga_flusion_fusion_power_plant:0 "캇첸 거대 반응로"
 building_giga_flusion_fusion_power_plant_desc:0 "캇첸의 수도 지하에 존해는 캇첸이 건설한 거대 핵융합 반응로로, 깨끗한 에너지를 대량 공급합니다."
 building_giga_flusion_capital:0 "캐타운 거대도시"
 building_giga_flusion_capital_desc:0 "캇첸의 수도로써, 수백만 거주자들의 거대한 도시이자 집입니다. 그들의 중앙 정부가 존재하는 두드러지게 거대한 현대식 피라미드가 있습니다. 또한 이 도시는 큰 초기 보호막 발생기가 있어, 거주민들을 폭격으로부터 보호합니다."
 giga_flusion.301.name:0 "플러션의 달 거대 구조물"
 giga_flusion.301.desc:0 "§Y유블리오§! 성계의 전초 기지가 성계 내의 원시 행성인 §Y플러션§!의 위성이 활동하기 시작했다고 보고했습니다.\n\n과연, 이는 행성의 주요 국가 중 하나인 §Y캇첸아르티히 제국§!이 플러션의 두 번째 위성인 뮤노에서 거대한 건설 프로젝트에 착수하였기 때문인듯 합니다. 그들은 현재 위성으로 대량의 자원과 인력을 수송중이며, 위성의 표면에 많은 상설 기지가 생겨났습니다.\n\n원시인들의 라디오 통신은 놀라울만큼 잘 암호화되어있어, 우리의 과학자들은 이 프로젝트가 무엇인지 알 수 없었습니다. 그들은 이 특이한 상황을 어떻게 이해해야할지 확신하지 못하여, 몇몇은 우리가 이 프로젝트를 즉시 중단시켜야한다고 주장했습니다."
 giga_flusion.301.a:0 "그들을 방해하지 마라, 중요하지 않은 일이다."
 giga_flusion.301.b:0 "프로젝트가 무엇인지 알아보려 시도한다."
 giga_flusion.301.c:0 "멈춰야한다. 당장 위성을 폭파시켜라!"
 giga_flusion.3001.name:0 "플러션 동원령!"
 giga_flusion.3001.desc:0 "끔찍한 소식입니다! 플러션을 차지하기 위한 우리의 명백한 의도에 반응하여, 캇첸아르티히 제국은 대규모 동원령을 실시하였습니다.\n\n그들은 군사력을 급격하게 확대하였으며, 궤도 폭격 과정을 방해하기 위하여 궤도 방어 레일건을 배치하였습니다. 그들의 지도자인 카이저 캇테일은 \"우리 캇첸인들은 다른 세계의 적대 존재들에게 우리가 사랑하는 플러션을 쉽게 내주지 않을 것이며, 우리는 최후까지 맞서 싸울 것입니다. 그리고 저들은 우리에게서 뺏을 땅 하나하나마다 대가를 치르게 될 것입니다!\" 라고 선언했습니다."
 giga_flusion.3001.a:0 "멍청한 원시인들!"
 giga_flusion.3001.b:0 "우리는 저들의 불쌍한 세상을 깨부술 것이다!"
 katzen_orbital_bombardment_shield:0 "캇첸 폭격 방어책"
 katzen_orbital_bombardment_shield_desc:0 "캇첸과 플러션이 레일건과 고고도 항공기를 대량 배치하여 자신의 세계를 향한 궤도 폭격을 방해하려고 합니다."
 flusion_attack_moon_0:0 "플러션의 달 프로젝트"
 flusion_attack_moon_0_DESC:0 "플러션이 이 작은 위성에서 착수하고 있는 막대한 거대 구조물 같은 프로젝트입니다. 원시 종족들의 기술 수준으로 보았을 때, 믿을 수 없을 정도의 노력입니다."
 flusion_attack_moon_0_MEGASTRUCTURE_DETAILS:0 "$flusion_attack_moon_0_DESC$"
 flusion_attack_moon_1:0 "완성된 플러션의 프로젝트"
 flusion_attack_moon_1_DESC:0 "조잡하지만 강력한 형태의 전쟁 위성입니다. 움직일 수는 없지만, 광속 레일건을 자랑합니다."
 planning_flusionian_invasion:0 "플러션 침공 작전"
 planning_flusionian_invasion_desc:0 "우리는 플러션에 대한 당당한 침공을 준비 중입니다. 그들의 군대가 놀라우리만큼 강력하기 때문에, 성공하고자 한다면, 우리는 꽤나 많은 양의 자원을 투자해야할 것입니다."
 failed_flusionian_invasion:0 "플러션 침공 실패"
 failed_flusionian_invasion_desc:0 "플러션을 정복하기 위한 군대에 적절한 투자가 이루어지지 않았습니다. 원시 세계에 대한 정복에 실패하여 우리 제국에 대혼란이 일어났습니다."
 FIND_OUT_FLUSION_GUN_PROJECT:0 "플러션 프로젝트 조사"
 FIND_OUT_FLUSION_GUN_PROJECT_DESC:0 "플러션이 정확히 무엇을 건설할 계획인지 알아보기 위하여 과학자 팀을 무노에 보내어 플러션의 계획을 은밀하게 연구합니다."
 giga_flusion.320.name:0 "플러션 초강력 병기"
 giga_flusion.320.desc:0 "우리의 과학자들이 어떻게든지 성공적으로 플러션의 거대 구조물의 목적을 밝혀냈습니다.\n\n이것은 거대한 초강력 달 병기입니다.\n\n그들의 라디오 신호를 해독한 결과, 그들은 달의 표면에 거대한 광속 레일건을 건설해 박아넣고, 핵미사일과 타격기 격납고를 다수 배치할 모양입니다. 이 거대한 부동 구조물은, §Y몬트카노너 프로젝트: 달 방어 시스템§!이라고 불리는 듯 하여, 외계의 위협으로부터 플러션을 보호할 목적인 듯 합니다. 어떤 이들은 반신반의 하면서도 행성의 다른 국가가 이 프로젝트에 연관되어 있으므로, 캇첸아르티히 제국이 다른 행성에 그들의 힘을 과시하려고 한다고 믿기도 합니다.\n\n무엇이 되었든, 그들이 FTL이 없음에도, 그 초강력 병기의 설계로 보아 이는 심지어 우리의 우주 시대 전함에게조차 극도로 강력할 것입니다. 사실상, 설계도의 레일건은 거대한 투사체를 거의 빛의 속도로 가속할 수 있어, 우리가 가진 최고의 장갑조차 뚫을 수 있다는 것이 밝혀졌습니다...\n\n그들의 놀라우리만큼 진보된 무기를 설명하기 위해서, 우리 과학자들 몇몇은 플러션이 어째서인지 FTL 기술의 개발은 \"놓쳤지만\" 대신 그들의 무기를 극한까지 개발하기를 계속했다는 가설을 세웠습니다."
 giga_flusion.320.a:0 "개입해야한다. 그들과 직접 연결하라."
 giga_flusion.320.b:0 "멀리서 관찰만 해라, 그렇게 강력할리가 없다."
 giga_flusion.320.c:0 "당장 파괴하라."
 giga_flusion.321.name:0 "플러션과의 접촉"
 giga_flusion.321.desc:0 "플러션과의 통신을 개설하려는 시도로, 우리의 관측소가 달 프로젝트의 선도국인 §Y캇첸아르티히 제국§!의 수도인 §Y캐타운§!을 향해 고에너지 라디오 메시지를 보냈습니다.\n\n캐타운의 캇첸이 응답하기까지 오랜 시간이 걸리지는 않았고, 캇첸 대표단이 우리에게 인사합니다..."
 giga_flusion.321.a:0 "화면에 띄워라."
 giga_flusion.322.name:0 "통신 수신!"
 giga_flusion.322.desc:0 "반갑다, 외계인들이여.\n\n나는 더클로우 맥캐서, 우리 위대한 지도자이신 §Y카이저 캇테일§!님을 대신할 대표로 너희와의 연락망을 구축할 것이다. 너희들이 평화롭게 나온다면, 우리 또한 평화로운 의도만이 있음을 보장하지.\n\n그러니까 우리는 혼자가 아니라는 거로군, 아닌가? 그럭저럭 예상은 하고 있었지만. 어쨌든, 너희들은 캇첸아르티히 제국의 최신 프로젝트, §Y몬트카노너 프로젝트§!를 알아차린 듯 하군...\n흠, 그것이 우리의 가장 야심찬 사업이라는 것을 고려하면 그리 놀랍지는 않지만 말이다.\n그리고 너희들은 그것을 위해 연락을 한 것이군? 성간 제국이면서 그러한 프로젝트에 원하는게 있는가? 너희들이 만들 수 있는 것에 비하면 그다지 진보된것은 아닐텐데..."
 giga_flusion.322.a:0 "당신은 누구지?"
 giga_flusion.322.a.response:0 "나 말인가? 나를 개인적으로 알고싶어하는 외계 종족이라니, 놀랍군!\n\n나는 우리 국가의 군대인 캇첸군의 군 사령관이다. 그리고, 한 가지 더 말하자면, 우리는 초광속 우주 여행 기술이 없지만서도 싸우는 법은 확실히 알고 있다고 장담하지.\n\n이 행성이 항상 평화롭지만은 않았기 때문에 우리 종족은 꽤나 숱한 전쟁을 치뤄왔다. 그러니 우리는 상당히 유능한 싸움꾼이지, 내가 장담하지."
 giga_flusion.322.b:0 "카이저 캇테일?"
 giga_flusion.322.b.response:0 "카이저 캇테일께서는 우리 나라의 위대한 지도자이시다. 엄청나게 큰 공학 프로젝트에 특별히 별난 흥미를 가지신 약간은 괴짜라고 할 수 있지. 아마 그러한 이유로 이 몬트카노너 프로젝트를 위한 기지 설계가 떠오르셨을테다.\n\n그러나 그닥 외교에 능숙하지는 않으시다. 그래서 너희들과 소통하는데에 있어 내가 온 것이다."
 giga_flusion.322.c:0 "다른 국가들은 어떠한가?"
 giga_flusion.322.c.response:0 "다른 국가들 말인가? 몇 개 있지. 솔라키아나 라우란다르, 뤼우니타, 소사같은 것들. 하지만 그 국가들을 간추려 말하기에는 너무 복잡하고 달라서 어렵군.\n\n그들도 대부분은 몬트카노너 프로젝트에 함깨하는 듯 하다. 그래서 건설에 협력하고 있고, 경제적 원조로 투자도 제공하고 있지. 바라건대, 언젠가는 이 세상을 하나로 통합할 날이 왔으면 좋겠군..."
 giga_flusion.322.d:0 "이제 몬트카노너 프로젝트에 대해 말해주시오."
 giga_flusion.323.name:0 "통신 수신!"
 giga_flusion.323.desc:0 "음, 건설 목적은 정말 간단하다. 정말이다.\n\n아는지 모르겠다만, 캇테일은 그걸 사용해 우리를... 외계의 위협, 그러니까 예를들어 굶주린 포식자들 같은 것으로부터 우리를 보호하려고 한다. 비록 그런 것이 존재하는지도 모르지만 말이지. 이 무기는 움직이지도 못하는걸로 보면 알듯, 우리는 이 초거대 병기를 사용해 누군가, 혹은 무언가를 정복할 의도는 없다.\n\n우리가 바라는 것은 필요할 때 우리의 생활 방식을 지킬 수 있는 것 뿐이다.\n\n...\n\n그럴 일은 없었으면 하지만."
 giga_flusion.323.a:0 "용인할 수 없다. 당장 이 프로젝트를 중단해라."
 giga_flusion.323.a.tooltip:0 "우리는 플러션이 몬트카노너 프로젝트를 해체하도록 위협할 것입니다.\n§R플러션은 이제 우리에 대해 알고 있으며, 그들은 분쟁을 대비해 동원령을 시행할 수 있을 것입니다.§!"
 giga_flusion.323.a.response:0 "뭐? 우리를 위협하겠다고?\n\n...\n\n분명히... 분명히 이것을 위해 우리가 준비해 왔던 것이다! 우리는 싸우지도 않고 포기하지 않을 것이다, 외계인들아!"
 giga_flusion.323.b:0 "훌륭한 명분입니다. 우리는 자원을 제공할 것입니다."
 giga_flusion.323.b.tooltip:0 "건설을 가속하기 위해서 우리는 그들에게  £alloys£을 최소 100만큼 줄 것입니다."
 giga_flusion.323.c:0 "이해했다. 그럼 행운을 빌지."
 giga_flusion.323.c.tooltip:0 "우리는 아무것도 하지 않고 그들이 프로젝트를 끝낼 때까지 기다릴 것입니다."
 giga_flusion.323.c.response:0 "정말 고맙다. 다시 만나길 바라지, 외계인들아."
 giga_flusion.323.d:0 "좋은 생각이군. 설계도를 줄 수 있나?"
 giga_flusion.323.d.tooltip:0 "그저 무기의 설계도를 요청할 것입니다. 그들은 대가를 요구할지도 모릅니다."
 giga_flusion.323.d.response:0 "흠, 카이저와 프로젝트의 대표에게 물어봐야할 것 같지만... 내 생각에 그들은 아마 신경쓰지 않을것이다. 오히려 우리 두 종족간의 좋은 관계를 보장할 좋은 방법일 수도 있지."
 giga_flusion.3234.name:0 "플러션이 반항적입니다!"
 giga_flusion.3234.desc:0 "몬트카노너 프로젝트의 해체에 대한 우리의 요구에 따라, 카이저가 분명히 자신의 국민은 싸워보지도 않고 포지하지 않을 것이라며, 플러션인들은 딱 잘라 달의 거대 구조물 프로젝트 중단을 거절하였습니다.\n\n우리가 말을 꺼내자마자, 모든 플러션인들이 우리의 침공에 대비하여 대동원령을 준비 중인듯 합니다..."
 giga_flusion.3234.a:0 "그럼 쳐들어갈 것이다!"
 giga_flusion.3234.b:0 "잊어버려라, 귀찮은 일을 할 가지가 없다."
 giga_flusion.3235.name:0 "플러션이 굴복하고 카이저는 죽었습니다"
 giga_flusion.3235.desc:0 "맥캐서의 강경한 말이 그저 공허한 위협은 아니었던 것 같습니다. 비록 그와 카이저 캇테일이 우리에 대항해 동원하는 것에 찬성하지만, 나머지 캇첸아르티히 제국와 플러션인들은 그러지 않은 것 같습니다.\n\n캇첸은 성간 제국에 대항하길 원치 않았습니다. 사실, 카이저가 마지못해하는 그의 국가를 동원할 준비를 하자, 그는 본인의 군 수뇌부의 일원에게 §R암살§!되었다는 보고가 들어왔습니다!\n\n새로운 임시 정부가 그를 대체하기 위해 설립되었고, 무노에서 물러서며 몬트카노너 프로젝트를 해체하는데 동의하였고 심지어는 우리에게 약간의 자원을 배상하였습니다.\n\n야심찼던 카이저 캇테일의 죽음과 함께, 플러션인들은 미래에 어떠한 것도 시도하지 않을 것으로 보입니다..."
 giga_flusion.3235.a:0 "훌륭한 처세로군, 자기 분수를 배웠군."
 giga_flusion.3232.name:0 "카이저가 받아들이고, 배상을 요구합니다"
 giga_flusion.3232.desc:0 "몬트카노너 프로젝트의 설계도에대한 우리의 요구에 따라, 우리는 플러션으로부터 통신을 받았습니다!\n\n듣자하니 카이저 캇테일이 무기의 설계도를 공유해달라는 우리의 요구를 받아들였지만, £energy£ §Y3000§!에 해당하는 가격의 큰 보상을 에너지의 형태로 요구했습니다. 그는 우리과 협력하게되어 반갑지만, 매우 은밀한 기술에 대한 대가로 프로젝트를 도와주는 것이 공평하리라 전했습니다.\n\n합하면 꽤 되기는 하지만, 설계도는 우리의 기준에서도 상당히 진보된 것으로 보이며 우리의 실탄 무기 연구에 큰 이득이 될 것이 분명합니다."
 giga_flusion.3232.a:0 "공정한 거래로군. 받아들인다!"
 giga_flusion.3232.a.tooltip:0 "§B플러션과 카이저 캇테일은 이를 기억할 것입니다.§!\n몬트카노너 프로젝트 건설 속도: §G+30%§!"
 giga_flusion.3232.b:0 "감당할 수 없군."
 giga_flusion.3232.c:0 "에너지는 궤도 폭격으로 주겠다!"
 giga_flusion.3233.c.tooltip:0 "우리는 플러션 침공을 준비할 것입니다.\n§R플러션은 이제 우리에 대해 알고 있으며, 그들은 분쟁을 대비해 동원령을 시행할 수 있을 것입니다.§!\n§R플러션을 무찌르기 전에 그 프로젝트가 완성된다면, 우리는 안정도와 통합력, 그리고 영향력에 불이익을 받을 것입니다.§!"
 giga_flusion.3233.name:0 "카이저가 반대하다!"
 giga_flusion.3233.desc:0 "몬트카노너 프로젝트의 설계도에 대한 우리의 요구에 따라, 우리는 플러션으로부터 통신을 받았습니다!\n\n불행히도 카이저 캇테일이 무기의 설계도를 공유하자는 우리의 요구를 거부하면서 이를 \"외계 세력이 우리를 상대로 플러션 기술의 비밀을 빼앗으려는 시도이다\"라고 부르짖었습니다.\n\n이에 대한 반응으로, 우리 군 수뇌부의 몇몇 인원들은 우리가 카이저에게 겸손이 뭔지 가르쳐주어야 한다고 주장합니다."
 giga_flusion.3233.a:0 "싸울 가치가 없다, 그대로 두어라."
 giga_flusion.3233.b:0 "존중하는 법을 가르쳐 주겠다!"
 mega_build_speed_1:0 "건설 속도 증가됨"
 mega_build_speed_1_desc:0 "이 거대 구조물은 더 빠르게 건설되고 있습니다."
 mega_build_speed_2:0 "건설 속도 증가됨"
 mega_build_speed_2_desc:0 "이 거대 구조물은 더 빠르게 건설되고 있습니다."
 mega_build_speed_3:0 "건설 속도 증가됨"
 mega_build_speed_3_desc:0 "이 거대 구조물은 더 빠르게 건설되고 있습니다."
 mega_build_speed_4:0 "건설 속도 증가됨"
 mega_build_speed_4_desc:0 "이 거대 구조물은 더 빠르게 건설되고 있습니다."
 giga_flusion.3231.name:0 "통신 수신!"
 giga_flusion.3231.desc:0 "너희 종족들이 몬트카노네 건설을 위한 자원을 좀 주겠다고? 그건... 예상은 못했지만, 멋지군!\n\n우리와 같은 문명에게는 꽤나 값비싼 프로젝트지. 어떠한 지원이라고 해도 감사히 받겠다..."
 giga_flusion.3231.a:0 "우리는 £alloys£ 100을 줄 것입니다"
 giga_flusion.3231.a.tooltip:0 "우리는 프로젝트에 조금 기여할 것입니다.\n몬트카노네 프로젝트 건설 속도: §G+10%§!"
 giga_flusion.3231.a.response:0 "멋지군! 이는 분명 도움이 될 것이다.\n지원에 감사하다, 외계인들아."
 giga_flusion.3231.b:0 "우리는 £alloys£ 500을 줄 것입니다"
 giga_flusion.3231.b.tooltip:0 "우리는 프로젝트에 기여할 것입니다.\n몬트카노네 프로젝트 건설 속도: §G+30%§!"
 giga_flusion.3231.b.response:0 "멋지군! 이는 분명 도움이 될 것이다.\n지원에 감사하다, 외계인들아."
 giga_flusion.3231.c:0 "엄청나군요, 우리는 £alloys£ 1500을 줄 것입니다"
 giga_flusion.3231.c.tooltip:0 "우리는 프로젝트에 확연한 기여를 할 것입니다.\n§B플러션인들과 카이저 캇테일은 이를 기억할 것입니다.§!\n몬트카노네 프로젝트 건설 속도: §G+60%§!"
 giga_flusion.3231.c.response:0 "이건... 정말 많은 자원이군. 멋지다! 너희 외계인들의 공헌은 잊지 않을 것이다."
 giga_flusion.3231.d:0 "싹 다 지불하겠다! £alloys£ 2250"
 giga_flusion.3231.d.tooltip:0 "우리는 프로젝트에 엄청난 기여를 할 것입니다.\n§B플러션인들과 카이저 캇테일은 이를 §M분명히§! 기억할 것입니다.§!\n몬트카노네 프로젝트 건설 속도: §G+135%§!"
 giga_flusion.3231.d.response:0 "정말로 이렇게나 많이 주는건가? 오늘은 역사적인 날이다, 외계인들아! 너희들의 도움으로, 몬트카노네 프로젝트는 곧 완성될 것이다!"
 giga_flusion.3231.e:0 "잊어버려라, 우리는 여유가 없다."
 giga_flusion.3231.e.tooltip:0 "우리는 다시 멀리서 프로젝트를 관찰할 것입니다."
 giga_flusion.3231.e.response:0 "오, 안타깝군."
 giga_flusion.330.name:0 "프로젝트 파괴 성공!"
 giga_flusion.330.desc:0 "우리의 유블리오 전초 기지의 보고에 따르면, 무노의 원시 구조물 프로젝트가 성공적으로 파괴되었습니다.\n\n우리의 과학자들은 근처 소행성대에서 소행성 하나의 방향을 바꾸어 위성의 표면으로 날려 보냈습니다. 원시인들은 충분히 빠르게 반응하지 못하여서, 소행성이 달의 건설 현장에 직격하며 거대한 크레이터를 만들었습니다.\n\n비록 달의 플러션인들에 많은 사상자를 만들었지만, 그들의 조그마한 프로젝트는 이제 의심의 여지 없지 영원히 완성되지 않을 것입니다. 뿐만 아니라 우리는 달의 기반 시설의 잔해에서 약간의 합금을 약탈하는데 성공했습니다."
 giga_flusion.330.a:0 "휼륭하군."
 giga_flusion.3301.name:0 "플러션에 핵전쟁이 발발하다!"
 giga_flusion.3301.desc:0 "플러션의 달 프로젝트를 파괴하는 것이 효과가 있었던 것 같습니다. 우리의 \"개입\" 몇 주 후,  §Y캇첸아르티히 제국§!의 지도자인 §Y카이저 캇테일§! 본인이 플러션의 다른 국가들을 공격했습니다.\n\n사실 캇첸아르티히 제국은 프로젝트의 창시 국가이자 주요 공헌국이었고, 캇테일은 \"반캇첸 연합\"의 음모의 일부로 다른 나라들이 의도적으로 소행성의 방향을 건설 현장쪽으로 바꾸었다고 주장했습니다. 비판받은 민족 국가들은 당연히 이를 부인했지만, 캇테일은 그저 더 격렬하게 비난하며 이 사태의 인명 및 자원 피해에 대한 즉각적인 경제 보상을 요구합니다.\n\n캇테일은 자신의 요구가 받아들여지지 않는다면 전쟁을 하겠다고 위협하였고, 요구가 받아들여지지 않았기 때문에 협상은 빠르게 결렬되었습니다. 캇첸아르티히 제국과 다른 민족국가들은 군대를 동원했고, 곧 행성급의 전쟁이 일어났습니다. 양쪽에 충분한 핵무기를 가지고 있었기에, 분쟁이 완전한 핵전쟁으로 발전하는데에는 그리 오랜 시간이 걸리지 않았습니다. 그리고 결국 플러션의 문명을 싹 지워버렸습니다.\n\n이 사태로 대략 130억 명의 개체가 사망하며, 플러션은 황량한 무덤 행성이 되었습니다."
 giga_flusion.3301.a:0 "어이쿠."
 giga_flusion.3301.b:0 "확실히 캇첸은 자신의 세상을 핵으로 날려버리는걸 좋아하는군."
 giga_flusion.331.name:0 "프로젝트 파괴 실패!"
 giga_flusion.331.desc:0 "무노에서의 플러션 건설 프로젝트를 파괴하려던 우리의 시도가 실패했습니다. 성계 전초 기지의 과학자들이 근처 소행성대의 소행성의 방향을 바꾸어 주요 건설 현장에 직격하였습니다만, 불행히도 원시인들이 제 때에 소행성을 알아차리고 빠르게 거대 함선을 보내어 위성을 빗나가게 했습니다.\n\n다시 한 번 프로젝트를 파괴하려고 시도한다면, 원시인들이 우리의 존재를 알아차릴 수 밖에 없지만, 이 프로젝트가 완성된다면 문젯거리가 될 가능성을 무시할 수는 없습니다.\n\n어떤 행동 방침을 설정해야 할까요?"
 giga_flusion.331.a:0 "잊어버리고 완성하게 두어라."
 giga_flusion.331.b:0 "무엇인지 알아보려고 시도해라."
 giga_flusion.331.c:0 "그만! 이 행성에 전면 침공을 준비해라!"
 giga_flusion.331.c.tooltip:0 "기습이라는 점은 분명 우리에게 유리하게 작용할 것입니다.\n§R플러션을 무찌르기 전에 그 프로젝트가 완성된다면, 우리는 안정도와 통합력, 그리고 영향력에 불이익을 받을 것입니다.§!"
 giga_flusion.332.name:0 "플러션 침공 실패"
 giga_flusion.332.desc:0 "최선을 다했음에도 불구하고, 우리는 원시 플러션인들이 달에서의 대규모 거대 구조물을 완성하기 전에 그들의 항복을 받아낼 수 없었습니다. 이제 우리 제국과 우리의 경제는 의미 없는 곳에 너무 많은 노력을 쏟은 반동을 겪을 것입니다...\n\n그들의 달 방위 시스템이 완성되었으니, 앞으로의 침공은 엄청나게 어려워질 것입니다."
 giga_flusion.332.a:0 "쥐새끼들! 부숴버렸어야 했는데..."
 giga_flusion.333.name:0 "플러션 패배!"
 giga_flusion.333.a.desc:0 "많은 계획 끝에, 우리는 플러션을 무찔러 그들의 초라한 달 프로젝트를 멈추는데 성공했습니다.\n\n의문을 품은 채로 달로 과학자를 보내자, 그들은 이것이 달의 표면에 거대한 광속 레일건과 그 주위로 막대한 미사일 포대 및 격납고를 설치하는 프로젝트임을 알아냈습니다.\n\n이 \"달 방위 시스템\"이 완공되었다면 분명히 문젯거리가 되었을 것이기에, 우리의 최고 사령관은 침공이 성공했음에 안심하였습니다. 또한 우리는 프로젝트의 일부를 약탈하였고, 놀랄만큼 진보된 설계 몇가지 또한 얻었습니다."
 giga_flusion.333.b.desc:0 "많은 계획 끝에, 우리는 플러션을 무찔러 그들의 초라한 달 프로젝트를 멈추는데 성공했습니다.\n\n의문을 품은 채로 달로 과학자를 보내자, 그들은 이것이 실제로 달의 표면에 거대한 광속 레일건과 그 주위로 막대한 미사일 포대 및 격납고를 설치하는 프로젝트임을 확인했습니다.\n\n이 \"달 방위 시스템\"이 완공되었다면 분명히 문젯거리가 되었을 것이기에, 우리의 최고 사령관은 침공이 성공했음에 안심하였습니다. 또한 우리는 프로젝트의 일부를 약탈하였고, 우리의 과학자들은 놀랄만큼 진보된 설계 몇가지를 얻었습니다."
 giga_flusion.333.a:0 "좋군. 이것은 문제가 되었을 것이다..."
 giga_war_moon_flusion:0 "달 방위 시스템"
 giga_war_moon_flusion_plural:0 "달 방위 시스템"
 flusion_planet_ship_01_key:0 "핵"
 GIGA_FLUSION_GUN_1:0 "캇첸 초거대 병기"
 GIGA_FLUSION_GUN_1_DESC:0 "달의 지각에 박아 넣은 거대한 레일건입니다."
 GIGA_FLUSION_GUN_01:0 "캇첸 초거대 병기"
 GIGA_FLUSION_GUN_01_DESC:0 "달의 지각에 박아 넣은 거대한 레일건입니다."
 GIGA_FLUSION_AUTOCANNON_1:0 "캇첸 속사포"
 GIGA_FLUSION_AUTOCANNON_1_DESC:0 "이 거대한 실탄 속사포대는 작은 함선을 파괴하기 위해 고안되었습니다."
 GIGA_FLUSION_AUTOCANNON_01:0 "캇첸 속사포"
 GIGA_FLUSION_AUTOCANNON_01_DESC:0 "이 거대한 실탄 속사포대는 작은 함선을 파괴하기 위해 고안되었습니다."
 GIGA_FLUSION_MISSILE_1:0 "카이저 미사일"
 GIGA_FLUSION_MISSILE_1_DESC:0 "한 개의 거대한 핵융합-반물질 핵탄두입니다."
 GIGA_FLUSION_MISSILE_01:0 "카이저 미사일"
 GIGA_FLUSION_MISSILE_01_DESC:0 "한 개의 거대한 핵융합-반물질 핵탄두입니다."
 giga_flusion.400.name:0 "플러션의 달 거대 구조물 완성!"
 giga_flusion.400.a.desc:0 "유블리오 성계의 전초 기지의 보고입니다. 수 년의 고된 작업의 끝에, 플러션 행성의 위성에 존재하는 건설 프로젝트가 마침내 완성되었습니다.\n\n거대한 초거대 달 병기입니다!\n\n순수한 군인 정신과 의지의 힘으로, 캇첸아르티히 제국은 달의 표면에 거대한 레일건을 박아 넣고, 주위에 여러개의 대형 미사일 포대와 초대형 자동포, 게다가 타격기 격납고까지 배치하였습니다. 비록 움직일 수 없으나, 이 엄청난 구조물은 이제 완전히 작동하며, 플러션을 외부의 위협으로부터 보호할 준비가 되어있습니다.\n\n우리의 최고 사령관은 이 무기가 우리의 우주 시대 함선조차도 비견될 수 있다며, 이를 가볍게 여기지 말라고 조언했습니다."
 giga_flusion.400.b.desc:0 "유블리오 성계의 전초 기지가  §Y몬트카노너 프로젝트§!가 최근 완성되었다고 보고했습니다.\n\n캇첸아르티히 제국은 그들 세계의 두 번째 위성을 매우 뛰어난 초강력 병기로 변모시켰으며, 거대한 레일건과 미사일 포대, 자동포 심지어는 타격기 격납고조차 구비하고 있습니다. 비록 이동할 수는 없으나, 몬트카노너 프로젝트는 의심의 여지 없이 매우 뛰어난 방위 시스템으로, 대부분의 침략자들의 플러션에 대한 공격을 물리칠 수 있을 것입니다.\n\n비록 몇몇은 카이저 캇테일이 그 무기를 그저 방어용으로만 사용할지도 모른다는 예상을 내놓고 있지만, 이제 그들의 손에 새로운 초강력 병기가 생겼으니, 캇첸아르티히 제국의 다음 행동은 두고볼 일입니다."
 giga_flusion.400.a:0 "그들과 카이저에게 축하할 일이군."
 giga_flusion.400.b:0 "저 귀찮은 쥐새끼들!"
 giga_flusion.400.c:0 "원시적인 전쟁 위성이라! 멋지군."
 giga_flusion.401.name:0 "원시 전쟁 위성"
 giga_flusion.401.desc:0 "장거리 탐지기가 §Y유블리오§! 성계에서 원시인들이 순전히 군인 정신과 의지의 힘을 통해, 자기 행성의 위성을 병기화 시켰다고 표시합니다. 저들의 제한된 기술적 기초에도 불구하고, 수 십년의 고된 노동 끝에, 그들은 달에 거대한 레일건을 박아 넣었고, 자동포와 미사일 포대를 설치하였습니다.\n\n움직일 수 없음에도 불구하고, 이 무시무시한 구조물은 그들의 세계를 침략하려는 대부분의 시도를 막아낼 것입니다."
 giga_flusion.401.a:0 "거 참 대담한 원시인들이로군."
 giga_flusion.401.b:0 "문제가 될지도 모른다."
 giga_flusion.402.name:0 "플러션 통신 수신!"
 giga_flusion.402.desc:0 "우리의 유블리오 전초 기지가 몇 년 전 몬트카노너 프로젝트를 완성한 플러션인들이 다시 외교적 통신을 열었습니다.\n\n카이저 캇테일이 우리가 몬트카노너 프로젝트를 위해 주었던 자원들에 감사해하며, 이제 우리에게 보답하기를 원합니다!"
 giga_flusion.402.a:0 "멋진 소식이군! 화면에 띄워라."
 giga_flusion.403.name:0 "통신 수신!"
 giga_flusion.403.desc:0 "외계인들이여! 다시 만나게 됐군, 더클로우 맥캐서다.\n\n카이저 캇테일으로부터의 전언으로, 몬트카노너 프로젝트에 대한 너희들의 공헌에 보답하기 위해, 우리는 너희 제국에게 우리의 새로운 입자 가속기가 성공적으로 생성한, 새롭고 흥미로운 형태의 물질을 제공하려한다!\n\n이 물질은 굉장히 이종의 것으로 보이며, 다양한 방면에서 물리학 법칙을 어기기에 굉장한 과학적 잠재력을 제공할 것이다. 그렇기에 카이저는 이를 너희들의 프로젝트에 대한 광범위한 기여를 고려한 가치있는 보상이라고 생각한다.\n\n너희의 마음에 들었으면 좋겠군."
 giga_flusion.403.a:0 "괜찮은 선물이군."
 giga_flusion.404.name:0 "통신 수신!"
 giga_flusion.404.desc:0 "외계인들이여! 다시 만나게되었군, 더클로우 맥캐서다.\n\n카이저 캇테일로부터의 전언으로, 몬트카노너 프로젝트에 대한 너희들의 §B엄청난§! 공헌에 보답하기 위해, 우리는 너희 제국에게 우리의 최신 함선을 선물하기로 결정했다. §YKSS Catburg§!와 §YKSS Meownich§! 그리고 §YClermeowth급 캇첸크루저§!다!\n\n사실, 카이저는 최근 캇첸아르티히 제국에 적당한 우주군을 설립하기 위한 거대한 프로그램을 시작했다. 그래서 최근 우리들은 그러한 함선의 개발에 꽤나 많은 노력을 쏟았다.\n\n아직 우리가 FTL 드라이브를 개발하지 못했기에, 우리의 함선에는 장착되어있지 않지만, 함선 내부에 빈 공간을 예비해두어서 너희의 드라이브를 사용할 수 있도록 하였다.\n\n만족하리라 생각한다!"
 giga_flusion.404.a:0 "멋진 선물이다! 그것들을 잘 사용하겠다."
 giga_flusion.404.a.tooltip:0 "우리는 플러션 위에 §YClermeowth급§! 캇첸 크루저를 2척 얻었습니다."
 giga_katzen_cruiser:0 "캇첸크루저"
 giga_katzen_cruiser_plural:0 "캇첸크루저"
 KATZEN_CRUISER_BOW:0 "선수"
 KATZEN_CRUISER_MID:0 "선체"
 KATZEN_CRUISER_STERN:0 "선미"
 district_city_katzen:0 "캇첸 주거 단지"
 district_city_katzen_plural:0 "캇첸 주거 단지"
 district_city_katzen_desc:0 "캇첸이 만들어낸 광대한 도시 주거 지역입니다. 행성의 기반시설을 유지하고 주민들의 요구를 해소하며, 플러션에 대한 충성심이 사라지지 않도록 합니다."
 giga_flusion.405.name:0 "원시 전쟁 위성"
 giga_flusion.405.desc:0 "§Y유블리오§!  성계를 탐사하던 우리의 과학선이 재미있는 발견을 했습니다.\n\n언뜻 보기에 성계의 행성 중 한 곳인 §Y플러션§!의 원시인들이 FTL이 없음에도 불구하고, 그들의 위성 중 하나에 거대한 광속 레일건을 설치하여, 위성을 거대한 초강력 방위 병기로 탈바꿈시키는데 성공한 것 같습니다!\n\n보아하니 이 괴물같은 구조물은 우주 여행을 하는 공격적인 문명의 모든 잠재적인 침략을 방해하려는 목적으로 지어진 듯 하며, 그 크기를 보아, 역할을 꽤나 잘 수행할것 같습니다."
 giga_flusion.405.a:0 "꽤 하는데."
 giga_flusion.405.b:0 "문젯거리다."
 giga_flusion.406.name:0 "몬트카노너 프로젝트 파괴됨!"
 giga_flusion.406.desc:0 "힘겨운 싸움 끝에 유블리오 성계의 우리 함대가 성공적으로 플러션의 무시무시한 달 방위 시스템을 파괴하였습니다!\n\n초강력 달 병기는 마땅한 형벌을 받아 더 이상 작동하지 않으며, 플러션인들은 고향성으로 탈출, 후퇴하였습니다. 중심 방어 기구가 파괴되었으니, 플러션은 이제 직접적인 지상 침공에 취약해졌습니다. 그들의 행성을 빼앗고자 한다면 말입니다.\n\n또한 우리는 자원도 어느 정도 약탈하였습니다. 그러나 초강력 병기의 내부 구조물은 놀라우리만큼 온전하여, 우리에게 적절한 기술이 있다면 이를 완전한 전쟁 위성으로 복구시킬 수 있을지도 모릅니다."
 giga_flusion.406.a:0 "시원하군."
 giga_mega.601.name:0 "$name_war_moon$ 파괴됨!"
 giga_mega.601.desc:0 "전투 보고에 따르면 [giga_debris_system.GetName] 성계의 $name_war_moon$이 파괴되었습니다. 비록 그 구조물이 큰 피해를 견뎌냈지만, 더 이상 싸울 수 없습니다. 이는 여전히 대부분은 무사하며, 충분한 시간만 있다면, 우리든 우리의 적이든 그 구조물을 수리할 수 있을 것입니다...\n\n우리가 전쟁 위성의 잔해를 소유하고 있지 않지만 우리의 영토 내에 존재한다면, 성계의 항성에서 §Y천체 함선 강탈§! 결정을 사용하여 우리의 것으로 만들 수 있습니다."
 giga_mega.601.a:0 "무조건 수리해야 한다!"
 giga_mega.602.name:0 "$name_war_moon$ 수리됨!"
 giga_mega.602.desc:0 "멋진 소식입니다! 우리는 [giga_debris_system.GetName] 성계의 폐허가 된 $name_war_moon$을 성공적으로 복구하였습니다. 내부를 완전히 처음부터 재건했어야 해서 꽤나 힘든 작업이었지만, 이 강력한 전함은 이제 다시 작동합니다."
 giga_mega.602.a:0 "멋지군."
 giga_mega.701.name:0 "$name_war_planet$ 파괴됨!"
 giga_mega.701.desc:0 "전투 보고에 따르면 [giga_debris_system.GetName] 성계의 $name_war_planet$이 파괴되었습니다. 비록 그 구조물이 큰 피해를 견뎌냈지만, 더 이상 싸울 수 없습니다. 이는 여전히 대부분은 무사하며, 충분한 시간만 있다면, 우리든 우리의 적이든 그 구조물을 수리할 수 있을 것입니다...\n\n우리가 베히모스 요새 행성의 잔해를 소유하고 있지 않지만 우리의 영토 내에 존재한다면, 성계의 항성에서 §Y천체 함선 강탈§! 결정을 사용하여 우리의 것으로 만들 수 있습니다."
 giga_mega.701.a:0 "무조건 수리해야 한다!"
 giga_mega.702.name:0 "$name_war_planet$ 수리됨!"
 giga_mega.702.desc:0 "멋진 소식입니다! 우리는 [giga_debris_system.GetName] 성계의 폐허가 된 $name_war_planet$을 성공적으로 복구하였습니다. 내부를 완전히 처음부터 재건했어야 해서 꽤나 힘든 작업이었지만, 이 강력한 전함은 이제 다시 작동합니다."
 giga_mega.702.a:0 "멋지군."
 giga_katzen.04005.name:0 "캇첸 은하 성전"
 giga_katzen.04005.desc:0 "긴급 뉴스입니다! 강력한 스텔라라이트 무기를 손에 넣은 §Y카이저 캇테일§!은 §Y캇첸 은하계성전§!을 시작할 것을 선언하였습니다!\n\n이제는 캇첸의 정당한 소유물을 쟁취해야할 때이며, 은하계 나머지 제국에 대해 §R전쟁을 선포§Y하였습니다!\n\n카이저는 더 이상 평화를 받아들이지 않을 것이고, 완전한 승리 혹은 완전한 전멸만이 그를 멈출 것입니다."
 giga_katzen.04005.a:0 "마지막 결전"
 giga_katzen.04005.a.tooltip:0 "§Y캇첸아르티히 제국§!은 모두에게 §R전쟁을 선포§!하였습니다.\n§R평화는 있을 수 없습니다.§!"
 katzen_trait_martial:0 "전투 규율"
 katzen_trait_martial_desc:0 "이 종족은 오랫동안 이어진 전투의 전통으로 놀라울 정도로 잘 훈련되어 있습니다. 그들은 전쟁터에서 누구보다 잘 싸울 것이고, 그들 국가에 절대적인 충성을 보이며 끝까지 수호할 것입니다."
 flusion_early_army:0 "플러션 지상군"
 flusion_early_army_desc:0 "플러션에 살고 있는 다양한 종족으로 구성된 지상군입니다."
 stellarite_kaiser_moon_modifier:0 "스텔라라이트 카이저 위성"
 stellarite_kaiser_moon_modifier_desc:0 "어처구니 없을 정도로 강력한 공격위성은 매우 난해한 에너지 물질로 만들어졌습니다."
 stellarite_kaiser_moon_0:0 "$gc_mega$스텔라라이트 카이저 위성 건설 현장"
 stellarite_kaiser_moon_0_DESC:0 "작은 위성 주변에 설치되어 성계의 전쟁터에 쓰레기를 뿌릴 수 있는 거대 초강력 무기인 스텔라라이트 카이저 위성의 건설 현장입니다."
 stellarite_kaiser_moon_0_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_megastructure$ - $giga_list_category_celestial_warship$\n§Y크기 5-7§!의 §Y용암형§! 또는 §Y불모형§!, §Y얼음 행성§!을 특수한 §Y천체 전함§!으로 바꿉니다\n§L캇첸의 기술에 기반하여, 카이저 위성은 작은 위성에 설치되어 있는, 고밀도 에너지 물질로 만들어진 거대한 레일건으로 구성되어 있습니다.§!"
 stellarite_kaiser_moon_1:0 "스텔라라이트 카이저 위성 기동 시스템"
 stellarite_kaiser_moon_1_DESC:0 "이 미래의 초강력 무기는 전체 위성을 이동시킬 수 있는 거대한 추진기를 장착하고 있습니다. 그 날개에는 방향을 조정하기 위한 날렵한 임펄스 추진기가 장착되어 있습니다."
 stellarite_kaiser_moon_2:0 "스텔라라이트 카이저 위성"
 stellarite_kaiser_moon_2_DESC:0 "완성된 스텔라라이트 카이저 위성은 핵탄두 발사대와 다수의 실탄 포대와 함께, 거의 모든 것을 꿰뚫을 수 있는 거대한 레일건을 탑재하고 있습니다."
 giga_katzen.0905.name:0 "스텔라라이트 카이저 위성 건설 현장 완성!"
 giga_katzen.0905.desc:0 "[giga_system.GetName] 성계에서 스텔라라이트 카이저 위성의 건설 현장이 완성되었습니다.\n\n이 건설 플랫폼은 작은 위성을 무시무시한 초강력 무기로 개조하는데 사용될 것입니다. 위성을 연구함으로써 이것을 건설하는데 사용된 물질을 완벽하지는 않지만 어떻게든 복제하는데 성공했고, §Y750§! £energy£와 §Y250§! £alloys£의 비싼 유지비가 소모됩니다."
 giga_katzen.0905.a:0 "좋아."
 giga_katzen.0906.name:0 "스텔라라이트 카이저 위성 기동 시스템 완성!"
 giga_katzen.0906.desc:0 "[giga_system.GetName] 성계에서 우리의 스텔라라이트 카이저 위성의 기동 시스템이 성공적으로 설치되었습니다. 천체 전체를 추진할 거대한 추진기는 위성의 뒷면에 건설되었습니다.\n\n이제 위성의 주된 초강력 무기 건설을 시작해야 합니다: 위성을 구성하고 있는 매우 강력한 유사 크리스탈 물질로부터 가동하는 초거대 레일건을 말입니다."
 giga_katzen.0906.a:0 "매우 훌륭하군."
 giga_katzen.0907.name:0 "스텔라라이트 카이저 위성의 비상!"
 giga_katzen.0907.desc:0 "그리고 마침내 완성되었습니다! [giga_system.GetName] 성계에서 작은 위성을 상대론 에너지의 속도로 투사체를 가속할 수 있는 거대한 레일건을 장착한 치명적인 캇첸 초강력 무기로 개조하는데 성공했습니다.\n\n이 레일건 외에도 미사일과 거대한 기관포로 무장하고 있는 이 무시무시한 구조물은 카이저가 원했던 것처럼 우리가 은하계를 지배하는데 도움이 될 것이니다. 위성의 구덩이에 저장된 엄청난 양의 에너지로 과충전되어 있는 이 위성 무기는 은하계의 어떤 것과도 필적할 수 엇습니다.\n\n우리는 여전히 카이저가 어떻게 이 무시무시한 구조물을 만들어낼 수 있었는지 의문입니다..."
 giga_katzen.0907.a:0 "매우 훌륭하군!"
 giga_tech_stellarite_kaiser_moon:0 "난해한 캇첸 무기"
 giga_tech_stellarite_kaiser_moon_desc:0 "스텔라라이트 카이저 위성에 대한 연구를 통해 이것이 무엇으로 만들어졌는지에 대해서 조금 알게 되었습니다. 이것은 스텔라라이트 카이저 위성을 필요 이상으로 강력한 무기로 만들어주는 터무니 없는 에너지를 가진 물질로 만들어졌습니다. 우리는 여전히 카이저가 어떻게 이를 만들어낼 수 있는 필수 자원을 얻었는지 의문입니다."
 allow_stellarite_kaiser_moon:0 "§H거대 구조물 잠금 해제:§! 스텔라라이트 카이저 위성"
 desc_stellarite_kaiser_moon:0 "수거한 캇첸 기술을 기반으로 하는, 완전히 제정신이 아닌 공학 프로젝트입니다. 매우 강력한 무기를 사용할 수 있을 정도로 많은 양의 에너지를 분출하는 매우 진보한 물질로 만들어졌습니다."
 giga_katzenartig_enabled_never:0 "£menu_disabled£캇첸아르티히 제국 (§R존재하지 않음§!)\n§Y캇첸 제국§!, §YUFS§!, 그리고 §Y코로니아 마법 주의 국가§!가 스폰 되지 §R않을§!것입니다.\n\n플러션은 §Y방사능 사막 행성§!이 되어 문명이나 생명체가 없을 것입니다. 코로나는 §Y장막 행성§!이 될 것입니다.\n\n캇첸아르티히 제국과 플러션 관련된 이벤트는 발생하지 않을 것이며, 결과적으로 관련된 모든 것이 사라집니다.\n\n두 성계를 완전히 없애려면, §YNo Katzenartig Imperium§! 서브모드를 설치하세요."
 giga_katzenartig_enabled:0 "£menu_enabled£캇첸아르티히 제국\n군국주의 체제의 캇첸아르티히 제국은 게임의 중반 이후에 등장하여 은하계로 확장하려고 시도합니다.\n\n캇첸 종족은 기술적으로 가능하지 않더라도, 궤도 아콜로지와 세 개의 테라포밍 거대 구조물, EHOF, 아항성 압축기를 사용할 것입니다.\n\n§Y어려운 위기가 될 수 있습니다.§!"
 giga_katzenartig_disabled:0 "£menu_disabled£캇첸아르티히 제국\n캇첸아르티히 제국이 등장하지 않습니다.\n\n§B플러션은 여전히 원시 전쟁 위성을 건설할 것이며 카이저도 여전히 그의 행성을 정복하려 할 것이지만, 언제나 실패하며 대신 일반적인 제국으로 나타나는 민주주의 연합 플러션이 나타납니다.\n\nFTL 플러션을 아예 없애고 싶으시다면, §Y없음§! 옵션을 선택하세요."
 giga_katzenartig_enabled_default:0 "£menu_o£캇첸아르티히 제국 (§G기본값§!)\n캇첸아르티히 제국이 대략 §Y~40%§!의 확률로 등장합니다."
 giga_katzenartig_enabled_always:0 "£menu_katzen_a£캇첸아르티히 제국 (§E확정§!)\n캇첸의 위성이 파괴되지 않는다면, 캇첸아르티히 제국이 게임 중반 이후에 §G항상§! 등장합니다."
 giga_katzenartig_enabled_deathwish:0 "£menu_katzen_d£캇첸아르티히 제국 (§R카이저 와일드 라이드§!)\n캇첸 아르티히 제국이 게임 중반 이후에 §G항상§! 등장하고, 다음의 효과를 받아 §R더욱§! 강력할 것입니다:\n§Y무기 피해량 +200%\n실드 내구도 +200%\n장갑 내구도 +200%\n선체 내구도 +200%\n지상군 피해량 +200%\n지상군 체력 +200%\n거대 구조물 건설 속도 +100%\n함선 연사 속도 +50%\n함선 속도 +50%§!\n§Y캇첸 연구가 더 빠르게 스케일될 것입니다§!\n\n§R매우 어려움§!"
 giga_katzenartig_enabled_stellarite:0 "£menu_katzen_s£캇첸아르티히 제국\n(§Y스텔라라이트 카이저§!)\n캇첸아르티히 제국이 게임 중반 이후에 §G항상§! 등장하고, 다음의 효과를 받아 §R굉장히§! 더 강력할 것입니다:\n§Y무기 피해량 +1200%\n실드 내구도 +1200%\n장갑 내구도 +1200%\n선체 내구도 +1200%\n지상군 피해량 +800%\n지상군 체력 +800%\n거대 구조물 건설 속도 +200%\n함선 연사 속도 +300%\n함선 속도 +100%\n궤도 폭격 피해량 +500%§!\n§Y캇첸 연구가 더 빠르게 스케일될 것입니다§!\n\n§R카이저 등장 10년 이후, 은하계의 모든 제국에 전쟁을 선포합니다.§!\n§R파르티잔이 등장하지 않습니다.§!\n§R극단적으로 어려움\n밸런스 맞지 않습니다.\n강력한 모드와 함께 사용하십시오!§!"
