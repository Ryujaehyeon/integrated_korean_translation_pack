 giga_galactic_core_aeternum_5:0 "£menu_aet_5£Aeternum (§YLux Aeternum§!)\nAeternum은 §Y무한히 더 강력해질 것입니다§!, §ROmega Aeternum§!와 동일한 보너스를 받습니다.\n\n이와 더불어 챔피언이 되었지만 더 나아가기를 원하지 않는 그들은 §Y오메가 구성품§!을 사용하여 §Y고대의 기술의 비밀§! 모드에서 거의 무한한 힘을 부여받습니다.\n\n§B그들은 즉시 깨어날 것입니다\n그들의 각성을 지연시키는 것은 불가능할 것입니다\n아이온디아는 강력한 자작나무 공허 구체가 될 것입니다\n사이코패브리케이터는 훨씬 더 자주 건설되며 10의 한도가 없습니다§!\n\n§R극도로 강력한 모드와 함께 사용하기 위해!\n\n$aeternum_spawn_mechanics$\n\n§H"고대 기술의 저장소"와 "고대의 비밀" 모드가 활성화되어 있어야만 사용할 수 있습니다!§!"
 aeternum_birch_world_acot:0 "선구자 버치 월드"
 aeternum_birch_world_acot_desc:0 "이 버치 월드는 엄청나게 오래되었으며, 적어도 백만 년 전에 선구자 문명이 건설한 것입니다. 환상적인 첨단 기술로 건설되었으며 거주자에게 초현실적인 생활 조건을 제공합니다."
