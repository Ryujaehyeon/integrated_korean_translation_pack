 giga_square_guaranteed:0 "£menu_enabled£말도 안 되는 사각형 - §B확정§!\n§Y게릭스§!의 집인 물리학을 거스르는 말도 안되는 사각형이 §G생성될 것입니다.§!"
 giga_square_disabled:0 "£menu_disabled£말도 안 되는 사각형 - §R비활성화됨§!\n§Y게릭스§!의 집인 물리학을 거스르는 말도 안되는 사각형이 §R생성되지 않을 것입니다.§!"
 giga_kerbol_enabled:0 "£menu_enabled£케르볼 - §G활성화됨§!\n케르볼이 §Y60%§!의 확률로 생성됩니다. 커벌들이 일루에서 무엇을 하는걸까요?"
