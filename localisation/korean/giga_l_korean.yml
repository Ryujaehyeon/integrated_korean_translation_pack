 MESSAGE_GIGA_KATZEN_SHIPS_TITLE:0 "카첸 함선 이용 가능"
 giga_katzen_ships_message_text:0 "함선은 이제 카첸아르틱 제국에서 구매할 수 있습니다."
 kaiser_moon_barrel_tooltip:0 "§Y거대 캇첸 병기§!\n\n§G가동중 | 피해량 불이익 없음§!\n\n사보타주 필요조건:\n§H메르쿠르에서의 상당한 게릴라 활동§!\n§H게슈볼른에서의 상당한 게릴라 활동§!\n\n§L카이저 위성의 주된 무기는 거대한 레일건입니다. 행성무기에 대한 캇첸의 오래된 설계에 기반하여, 이 레일건은 고밀도의 투사체를 광속에 가깝게 가속합니다. 투사체는 몇 십억 개의 핵탄두가 한 곳에 집중된 것과 같은 에너지를 가지며, 믿을 수 없을 정도로 치명적입니다.§!"
 kaiser_moon_moon_tooltip:0 "§Y몬트쿠르스트§!\n\n§G가동중 | 장갑 불이익 없음§!\n\n사보타주 필요조건:\n§H캇첸 헤르츠란츠에서의 상당한 게릴라 활동\n§H뤼우인슈타트에서의 상당한 게릴라 활동\n\n§L수 km의 바위와 엮여 있는 구조상의 기반으로 위성 내부의 정교한 장치를 보호합니다. 이 두꺼운 표면은 적의 함대와 맞닥뜨렸을 때, 함선에 대단한 생존력을 부여합니다."
 kaiser_moon_thrusters_tooltip:0 "§Y기동 시스템§!\n\n§G가동중 | 점프 충전 시간 불이익 없음§!\n\n사보타주 필요조건:\n§R소사에서의 격렬한 게릴라 활동§!\n§Y쥠뷔란트에서의 중간 수준의 게릴라 활동§!\n\n§L카이저 위성이 공간과 초공간 사이를 날아다닐 수 있도록 하는 매우 거대한 하이퍼드라이브와 함께 설치되어 있는 초거대규모의 추친기입니다. 캇첸 설계의 진보한 반물질 반응로로부터 에너지를 얻어, 캇첸 군의 다른 모든 것들을 왜소해 보이게 합니다.\n\n§B기동 시스템에 대한 사보타주가 행해진다면, 플러션이 위협을 받았을 때에도 카이저 위성이 소환되지 않을 것입니다!§!"
 kaiser_moon_wings_tooltip:0 "§Y공허익§!\n\n§G가동중 | 속도 불이익 없음§!\n\n사보타주 필요조건:\n§Y소사에서의 중간 수준의 게릴라 활동§!\n§R쥠뷔란트에서의 격렬한 게릴라 활동§!\n\n§L처음에는 이 날개가 전혀 쓸모 없는 것처럼 보였지만, 실제로는 그 끝까지 여러 개의 추진기가 나열해 있는 것이었습니다. 이 추진기는 우주 공간 안에서의 위성 조작을 더욱 용이하게 합니다."
 kaiser_moon_barrel_sabo_tooltip:0 "§Y거대 캇첸 병기§!\n\n§R사보타주됨 | 무기 피해량 -30%§!\n\n§L카이저 위성의 주된 무기는 거대한 레일건입니다. 행성무기에 대한 캇첸의 오래된 설계에 기반하여, 이 레일건은 고밀도의 투사체를 광속에 가깝게 가속합니다. 투사체는 몇 십억 개의 핵탄두가 한 곳에 집중된 것과 같은 에너지를 가지며, 믿을 수 없을 정도로 치명적입니다.§!"
 kaiser_moon_moon_sabo_tooltip:0 "§Y몬트크루스트§!\n\n§R사보타주됨 | 장갑 내구도 -40%§!\n\n§L수 km의 바위와 엮여 있는 구조상의 기반으로 위성 내부의 정교한 장치를 보호합니다. 이 두꺼운 표면은 적의 함대와 맞닥뜨렸을 때, 함선에 대단한 생존력을 부여합니다.§!"
 kaiser_moon_thrusters_sabo_tooltip:0 "§Y기동 시스템§!\n\n§R사보타주됨 | 점프 충전 시간 +500%§!\n\n§L카이저 위성이 공간과 초공간 사이를 날아다닐 수 있도록 하는 매우 거대한 하이퍼드라이브와 함께 설치되어 있는 초거대규모의 추친기입니다. 캇첸 설계의 진보한 반물질 반응로로부터 에너지를 얻어, 캇첸 군의 다른 모든 것들을 왜소해 보이게 합니다.§!\n\n§B플러션이 위협을 받더라도 더 이상 카이저 위성이 소환되지 않습니다.§!"
 kaiser_moon_wings_sabo_tooltip:0 "§Y공허익§!\n\n§R사보타주됨 | 아광속 속도 -40%§!\n\n§L처음에는 이 날개가 전혀 쓸모 없는 것처럼 보였지만, 실제로는 그 끝까지 여러 개의 추진기가 나열해 있는 것이었습니다. 이 추진기는 우주 공간 안에서의 위성 조작을 더욱 용이하게 합니다.§!"
 kaiser_moon_destroyed_tooltip:0 "카이저 위성이 파괴되었습니다! 이제 캇첸은 §Y지상군 피해량§! -50%, §Y함선 속도§! -50%, §Y함선 연사 속도§! -50%, §Y궤도 폭격 피해량§! -50%의 불이익를 받게 됩니다."
 giga_katrebels.2120.name:0 "카이저 위성 사보타주 성공!"
 giga_katrebels.2120.desc:0 "플러션의 게릴라가 §Y[katzen_name_tool.GetName]§!(을)를 파괴하는 작전이 계획한 그대로 진행되었다고 보고합니다! 게릴라 요원들은 사보타주를 실행하였고, 캇첸들이 §Y[katzen_name_tool.GetName]§!(을)를 수리하게 함으로써 캇첸들에게 §Y불이익§!를 가할 것입니다.\n\n그러나 캇첸은 사보타주를 인지했고, 더 강력한 대 게릴라 대책을 입안해 그들의 §H경계§!를 §R2§! 증가시켰습니다.\n\n성공 확률은 §Y[flusion_primitives_country.flusion_operation_odds]%이었습니다.§!"
 giga_katrebels.2120.a:0 "훌륭하군!"
 giga_katrebels.2120.a.tooltip:0 "캇첸의 경계가 §R2§! §R상승§!합니다!"
 giga_katrebels.2121.name:0 "카이저 위성 사보타주 실패!"
 giga_katrebels.2121.desc:0 "플러션의 게릴라가 §Y[katzen_name_tool.GetName]§!(을)를 파괴하는 작전이 실패했다고 보고합니다. 그들이 위성으로 은밀히 올려 보내려고 했던 요원들과 모든 자원이 사보타주를 실행하기도 전부터 캇첸 병사들에게 가로막혔습니다. 이에 따라서 전체 작전이 좌절되었습니다.\n\n성공 확률은 §Y[flusion_primitives_country.flusion_operation_odds]%였습니다.§!"
 giga_katrebels.2121.a:0 "제기랄!"
 giga_katrebels.2101.a.tooltip:0 "캇첸의 경계가 §R1§! §R증가§!합니다."
 giga_katrebels.2020.name:0 "카이저 위성의 §Y거대 캇첸 병기§! 사보타주"
 giga_katrebels.2020.desc:0 "카이저 위성의 주무기에 피해를 주는 임무에 있는 §Y솔라키아 자유 전사§!를 지원할 수 있습니다.\n\n그들이 §Y게슈볼른§!과 §Y메르쿠르§!를 통제할 수 있게 되었고, 적당한 양의 뇌물을 넘김으로써, 그들은 §Y거대 캇첸 병기§!의 탄환을 위성에 도착하였을 때 기폭될 폭발물을 담은 모조품으로 대체할 수 있을 것입니다.\n\n§Y성공 시§!:\n카이저 위성은 §Y3년§! 동안 §Y무기 피해량 -35%§!와 §Y함선 연사 속도 -50%§!의 불이익를 받을 것입니다.\n캇첸의 경계가 §R2§! §R상승§!할 것입니다.\n\n§Y실패 시§!:\n캇첸의 경계가 §R1§! §R상승§!할 것입니다.\n\n§Y성공 확률§!:\n기본: §Y85%§!\n§H캇첸의 경계§!: §R-[flusion_primitives_country.katzen_wary_perc]%§!\n총계: §Y[flusion_primitives_country.flusion_success_chance_total]%§!"
 giga_katrebels.2020.a:0 "§B저항 자원§! 4 소모 (성공 확률 [flusion_primitives_country.flusion_success_chance_total]%)"
 giga_katrebels.2020.b:0 "아무것도 아니다."
 giga_katrebels.2021.name:0 "카이저 위성의 §Y몬트크루스트§! 사보타주"
 giga_katrebels.2021.desc:0 "카이저 위성의 위성 표면에 피해를 주는 임무에 있는 §Y솔라키아 자유 전사§!를 지원할 수 있습니다.\n\n그들이 §Y캇첸 헤르츠란츠§!와 §Y뤼우인슈타트§!를 통제할 수 있게 되었고, 적당한 양의 뇌물을 넘김으로써, 표면 아래의 구조적 요점에 폭발물을 설치할 요원들을 정비업자로 위장하여 침투시킬 수 있을 것입니다.\n\n§Y성공 시§!:\n카이저 위성은 §Y3년§! 동안 §Y장갑 내구도 -40%§!의 불이익를 받을 것입니다.\n캇첸의 경계가 §R2§! §R상승§!합니다.\n\n§Y실패 시§!:\n캇첸의 경계가 §R1§! §R상승§!합니다.\n\n§Y성공 확률§!:\n기본: §Y85%§!\n§H캇첸의 경계§!: §R-[flusion_primitives_country.katzen_wary_perc]%§!\n총계: §Y[flusion_primitives_country.flusion_success_chance_total]%§!"
 giga_katrebels.2022.name:0 "카이저 위성의 §Y기동 시스템§! 사보타주"
 giga_katrebels.2022.desc:0 "카이저 위성의 기동 시스템에 피해를 주는 임무에 있는 §Y솔라키아 자유 전사§!를 지원할 수 있습니다.\n\n그들이 §Y소사§!와 §Y쥠뷔란트§!를 통제할 수 있게 되었고, 적절한 양의 뇌물을 넘김으로써, 위성의 점프 드라이브를 유지하는데 필수적인 부품을 생산하는 중요 장치를 파괴할 수 있을 것입니다.\n\n§Y성공 시§!:\n카이저 위성은 §Y3년§! 동안 §Y점프 충전 시간 +500%§! 증가하며, 플러션이 폭격 당하거나 침공 당해도 §Y소환§!되지 않을 것입니다.\n캇첸의 경계는 §R2§! §R상승§!합니다.\n\n§Y실패 시§!:\n캇첸의 경계가 §R1§! §R상승§!합니다.\n\n§Y성공 확률§!:\n기본: §Y85%§!\n§H캇첸의 경계§!: §R-[flusion_primitives_country.katzen_wary_perc]%§!\n총계: §Y[flusion_primitives_country.flusion_success_chance_total]%§!"
 giga_katrebels.2023.name:0 "카이저 위성의 §Y공허익§! 사보타주"
 giga_katrebels.2023.desc:0 "카이저 위성의... 날개에 피해를 주는 임무에 있는 §Y솔라키아 자유 전사§!를 지원할 수 있습니다.\n\n그들이 §Y소사§!와 §Y쥠뷔란트§!를 통제할 수 있게 되었고, 적절한 양의 뇌물을 넘김으로써, 날개의 추진기를 가동하는데 사용하는 연료와 에너지를 생산하는 시설을 사보타주할 수 있을 것입니다.\n\n§Y성공 시§!:\n카이저 위성은 §Y3년§! 동안 §Y아광속 속도 -40%§! 감소합니다.\n캇첸의 경계는 §R2§! §R상승§!합니다.\n\n§Y실패 시§!:\n캇첸의 경계가 §R1§! §R상승§!합니다.\n\n§Y성공 확률§!:\n기본: §Y85%§!\n§H캇첸의 경계§!: §R-[flusion_primitives_country.katzen_wary_perc]%§!\n총계: §Y[flusion_primitives_country.flusion_success_chance_total]%§!"
