 giga_katrebels.2100.name:0 "작전 성공!"
 giga_katrebels.2100.desc:0 "플러션의 게릴라가 §Y[katzen_name_tool.GetName]§!에서의 작전이 계획한 대로 정확히 이루어졌다고 보고합니다! 요원들은 캇첸의 기반시설에 대한 사보타주를 실행했고, 이는 캇첸에게 §Y불이익§!을 부여하였고, 해당 지역에서 §Y게릴라 활동§!을 증가시켰습니다.\n\n캇첸은 사보타주 활동을 알아냈고, 즉각적으로 더 강력한 게릴라 대책을 입안하였기에 그들의 §H경계§!가 §R2§! 높아졌습니다.\n\n성공확률은 §Y[flusion_primitives_country.flusion_operation_odds]%§!이었습니다."
 giga_katrebels.2100.a:0 "멋지군!"
 giga_katrebels.2100.a.tooltip:0 "§Y[katzen_name_tool.GetName]§!에서의 게릴라 활동이 §G증가§!합니다.\n캇첸의 경계는 §R2§! §R증가§!합니다."
 giga_katrebels.2102.name:0 "작전 대성공!"
 giga_katrebels.2102.desc:0 "플러션의 파르티잔들은 §Y[katzen_name_tool.GetName]§!에서의 작전이 계획한 대로 정확히 이루어졌다고 보고합니다! 그들의 요원들은 캇첸의 기반시설에 대한 사보타주를 실행했고, 이는 캇첸에게 §Y불이익§!를 부여하고, 해당 지역에서의 §Y파르티잔 활동§!을 증가시켰습니다.\n\n추가로, 파르티잔은 작전 중에 캇첸의 창고 몇 개를 습격하였고, 솔라키아인들은 장비와 자원을 획득할 수 있었고, 그들의 §B저항 자원§!이 2 증가하였습니다.\n\n그러나 캇첸은 사보타주 활동을 알아냈고, 즉각적으로 더 강력한 파르티잔 대책을 입안하였기에 그들의 §H경계§!가 §R2§! 높아졌습니다.\n\n성공확률은 §Y[flusion_primitives_country.flusion_operation_odds]%§!이었습니다."
 giga_katrebels.2102.a:0 "정말 좋군!"
 giga_katrebels.2102.a.tooltip:0 "§Y[katzen_name_tool.GetName]§!에서의 게릴라 활동이 §G증가§!합니다.\n솔라키아인들이 §B저항 자원§!을 2 얻습니다.\n캇첸의 경계가 §R2§! §R증가§! 합니다."
 giga_katrebels.2101.name:0 "작전 실패!"
 giga_katrebels.2101.desc:0 "플러션의 게릴라 §Y[katzen_name_tool.GetName]§!에서의 작전이 실패하였다고 보고합니다. 그들의 요원들이 사보타주를 실행하기도 전에 캇첸의 병사들에게 저지되었고, 전체 작전이 실패하였습니다.\n\n성공확률은 §Y[flusion_primitives_country.flusion_operation_odds]%§!이었습니다."
