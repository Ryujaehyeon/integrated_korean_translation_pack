 giga_blokkat.5500.name:0 "우리를 시험에 들게 할 때"
 giga_blokkat.5500.desc:0 "반갑습니다, 형제 자매들이여.\n\n우리는 여러분 은하계에 오고 있는 블록캣들이 그림자를 억제하는 것을 도와줄 훌륭한 후보자라고 판단했습니다.\n\n그리고 여러분이 새로운 얻은 그 힘 때문에 우리는 여러분이 그들의 패기를 시험하고 그들이 신 그 자체에 맞설 수 있는지 확인하며, 이를 통해 그들이 그림자에 떨어지지 않으리라는 것을 증명하는 것이 여러분의 의무라고 판단했습니다. \n\n따라서, 보다 대등하고 의미 있는 전투를 확실시하고 여러분의 새로운 능력을 사용하는 능력도 시험하기 위해, 우리는 블록캣이 이 은하계를 돌아다니는 동안 빛이나 기존 스텔라본 함대를 사용하지 말 것을 요청합니다.\n\n여러분이 전투에서 블록캣을 이긴다면, 블록캣이 약하다고 은하계를 물려받기에 적합하지 않다는 것이 증명되는 것입니다. 하지만 블록캣이 이긴다면, 그들은 자신의 가치를 증명한 것이고 당신은 은하계에서 떠나야 할 것입니다.\n\n싸움을 시작합시다!"
 giga_blokkat.5500.a:0 "마침내 훌륭한 적이 나타났군! 우리의 전투는 전설이 되리라!"
 giga_blokkat.5500.a.tooltip:0 "우리가 §Y블록캣§!을 무찌를 때까지 우리는 §Y파멸의 빛§!과 §Y창조의 빛§!, §Y조작의 빛§!을 이용할 수 없습니다. §Y창조의 빛§!으로 생성된 기존의 §Y스텔라본 함대§!는 사라질 것입니다."
 giga_blokkat.5501.name:0 "시험 통과"
 giga_blokkat.5501.desc:0 "반갑습니다, 형제 자매들이여.\n\n블록캣은 시험에 성공적으로 통과해고 여러분의 방어를 이겨냈습니다. 따라서, 그들은 이제 이 은하계의 새로운 주인이 되어도 좋으며, 당신은 블록캣이 자신의 일을 추구하도록 내버려 둔 채로 은하계에서 떠나야 할 것입니다."
 giga_blokkat.5501.a:0 "훌륭한 상대였다."
 giga_blokkat.5501.a.tooltip:0 "우리 함대가 은하계에서 후퇴합니다."
 mod_country_sr_dark_matter_produces_mult:0 "매월 암흑 물질"
 giga_fallen_empire_misc.1011.name:0 "이상한 친구"
 giga_fallen_empire_misc.1011.desc:0 "§Y플러션§!의 관측소에 따르면, 정기적인 표면 탐사 중 궤도 망원경이 어디선가 갑자기 튀어나온 미확인 개체를 포착했다고 합니다. 그것은 행성의 패권국인 §Y솔라키아 공화국§!의 거대하고 공허한 평야 한 가운데에 나타났습니다.\n\n황금 투구와 거대한 왕관을 입은 그것은 플러션에 살고 있다고 알려진 종족들과는 전혀 달랐습니다. 그 뒤, 그 생명체는 몇 시간 동안 평야를 돌아다니면서 솔라키아 정착지 몇 곳 만을 만났습니다.\n\n이는 그 생명체를 눈에 띄게 화나게 했고, 그것은 한숨이라고 추측되는 것을 내뱉은 뒤 갑자기 밝은 섬광으로 사라졌습니다.\n\n안타깝게도 관측소는 이 존재에 대한 정보를 더 얻을 수 없었습니다. 이 특이한 방문객에 대해서는 우리나 플러션인들이나 혼란스러운 것은 마찬가지인 것 같습니다..."
 giga_fallen_empire_misc.1011.a:0 "별거 아닐 것이다."
 giga_fallen_empire_misc.1011.b:0 "불길하군."
 giga_fe_pouchkinn_enabled:0 "고민에 빠진 탐구가들: §G활성화§!\n§Y몰락한 제국 거대 구조물§!과 §Y마트료시카 브레인§!, §Y행성 컴퓨팅 단지§!, §Y소행성 포대§!가 활성화되어 있으며, §Y티아우르§!와 §Y캇첸아르티히 제국§!이 확정 등장하지 않고 §Y갓초§!가 비활성화 되어 있다면, §Y궁극의 해답§!을 찾고 이용하기 위해 §YO형 마트료시카 브레인§!을 사용하는 특별한 물질주의 몰락한 제국이 생성될 수도 있습니다."
 giga_fe_pouchkinn_disabled:0 "고민에 빠진 탐구가들: §R비활성화§!\n고민에 빠진 탐구가들이 생성되지 않습니다."
 giga_fe_megas_enabled:0 "몰락한 제국 거대 구조물: §G활성화§!\n§YFallen Empire Megastructures§! 모드의 기능이 통합된 것으로, 몰락한 제국이 §Y다이슨 스피어§!와 §Y물질 감압기§!, §Y소행성 포대§! 등의 다양한 거대 구조물을 가지고 시작합니다. 거대 구조물이 파괴된 상태일 수도 있으며, 비활성화된 거대 구조물을 가지지는 못할 것입니다."
 giga_fe_megas_disabled:0 "몰락한 제국 거대 구조물: §R비활성화§!\n몰락한 제국이 추가적인 거대 구조물을 가지지 §R않습니다§!."
 giga_fe_gamers_enabled:0 "무관심한 게이머들: §G활성화§!\n§Y몰락한 제국 거대 구조물§!과 §Y마트료시카 브레인§!, §Y위그드라실 난초§!가 활성화되어 있으면, §Y마트료시카 브레인§!에 살고 있는 무관심한 물질주의자 몰락한 제국이 생성될 수도 있습니다."
 giga_fe_gamers_disabled:0 "무관심한 게이머들: §R비활성화§!\n무관심한 게이머들이 생성되지 않을 것입니다."
 giga_fe_planetcrafts_0:0 "몰락한 제국 천체 전함: §B없음§!\n몰락한 제국이 §Y천체 전함§!이나 추가적인 §Y반복 기술§! 보너스를 얻지 못할 것입니다."
 giga_fe_planetcrafts_1:0 "몰락한 제국 천체 전함: §G일반§!\n게임 시작시, 몰락한 제국이 §G0§!에서 §G3§!개의 §Y전쟁 위성§!을 얻을 것입니다.\n각성 후에는, §G1§!에서 §G5§!개의 §Y전쟁 위성§!과 §G0§!에서 §G1§!개의 §Y베히모스 요새 행성§!을 얻을 것입니다.\n또한, §G10§! 번의 §Y반복 기술§!과 동등한 보너스를 얻을 것입니다."
 giga_fe_planetcrafts_2:0 "몰락한 제국 천체 전함: §Y높음§!\n게임 시작시, 몰락한 제국이 §G2§!에서 §G5§!개의 §Y전쟁 위성§!과 §G0§!에서 §G1§!개의 §Y베히모스 요새 행성§!을 얻을 것입니다.\n각성 후에는, §G2§!에서 §G8§!개의 §Y전쟁 위성§!과 §G1§!에서 §G2§!개의 §Y베히모스 요새 행성§!을 얻을 것입니다.\n또한, §G30§! 번의 §Y반복 기술§!과 동등한 보너스를 얻을 것입니다."
 giga_fe_planetcrafts_3:0 "몰락한 제국 천체 전함: §H극한§!\n게임 시작시, 몰락한 제국이 §G5§!에서 §G10§!개의 §Y전쟁 위성§!과 §G1§!에서 §G3§!개의 §Y베히모스 요새 행성§!을 얻을 것입니다.\n각성 후에는, §G6§!에서 §G12§!개의 §Y전쟁 위성§!과 §G2§!에서 §G3§!개의 §Y베히모스 요새 행성§!을 얻을 것입니다.\n또한, §G60§! 번의 §Y반복 기술§!과 동등한 보너스를 얻을 것입니다."
 giga_fe_planetcrafts_4:0 "몰락한 제국 천체 전함: §R지옥§!\n게임 시작시, 몰락한 제국이 §G10§!에서 §G20§!개의 §Y전쟁 위성§!과 §G3§!에서 §G6§!개의 §Y베히모스 요새 행성§!을 얻을 것입니다.\n각성 후에는, §G15§!에서 §G30§!개의 §Y전쟁 위성§!과 §G4§!에서 §G8§!개의 §Y베히모스 요새 행성§!을 얻을 것입니다.\n또한, §G100§! 번의 §Y반복 기술§!과 동등한 보너스를 얻을 것입니다."
 giga_blokkat.3317.nokatzens.desc:0 "마침내 이 단조로운 맞대응의 틈을 타, §Y캇첸랜드§!와 §Y니에네§!의 사람들이 우주 전쟁에 돌입했고, 팔루쉬와 블록캣은 이 덜 발달된 제국을 잠재적인 도움이 되리라 판단했습니다. 팔루쉬와 블록캣의 예측 모델이 모두 상대방이 개입할 것이고 전쟁에 돌입함에 따라 비극적인 변화가 있으리라고 말했습니다.\n\n블록캣은 주로 진보된 기계 거래원으로 사용했고, 반면 팔루쉬는 자신의 훌륭한 영웅의 경험을 빌려주며 돈을 받았습니다. 대부분의 팔루쉬가 이러한 작업을 해야하는 일로 여겼지만, §Y스파크번§!이라는 이름의 팔루쉬는 이를 일종의 자아를 찾는 휴가라고 여겼습니다. 그는 정말 수년간의 교착 상태에서 팔루쉬의 진보를 명확하게 이해하기 어려웠지만, 이 전쟁에서 그의 힘에 반대할 자는 없다는 것에 주목했습니다. 그에게는 놀랄만한 순간이었습니다. 그가 고향으로 돌아오자 그는 팔루시아의 미래 잠재력에 대한 수많은 열정적인 연설을 했습니다.\n\n캇첸랜드와 니에네간의 전쟁은 늘어졌습니다. 행성은 고통받고, 양 측이 휴전의 가능성을 두고 토론하기 위해 만났습니다. 블록캣과 팔루쉬 제국의 고위 관리들이 그들의 전설적인 미래시 능력을 이용해 조언을 제공해달라는 의미로 초청받았습니다. 블록캣은 휴전을 조언했지만, §Y포흐틴§!이라는 이름의 선견자인 팔루쉬 고위 관리는 이것이 경제적 고난으로 이어지며, 더욱 중요하게도 자신의 제국 또한 경제적 고난을 겪고 블록캣에게 이익이 되는 착취적 거래의 시대로 이어질 것이라 예견했습니다.\n\n포흐틴은 갈등을 해결할 수 있는 유일한 만족스러운 방법은 한 쪽에 대한 완전한 승리라고 말했습니다. 포흐틴은 이것이 팔루쉬 영웅에 의해 이끌어진 성공적인 전쟁이고 이를 통해 패권국으로 나아가리라 구상했습니다. 그러나 팔루쉬에게는 실망스럽겠으나, 캇첸랜드와 니에네의 지도부는 결국 전쟁의 헛됨과 위험을 깨달았고, 블록캣이 조언했던 휴전을 선택했습니다. 그리고 두 세계 간의 관계를 천천히 하지만 꾸준히 고쳐나갔습니다.\n\n스파크번이 전쟁에 감명을 받은 것처럼, 포흐틴은 그의 역할에 의문을 품으로 이 재앙에서 떠났습니다. 스파크번이 위대함을 부르짖는 와중에, 포흐틴은 팔루쉬의 예견 시스템에 대한 기본적인 현실성에 대해 의문을 가지기 시작했습니다. 그는 예지 능력이 이제 그들의 제국이 결코 깨닫지 못할 미래를 예측하는데 너무 열중하고 있다고 주장했습니다. 팔루쉬가 기본적인 상식과 단순한 연역적 추론을 간과하고 있을 수도 있다는 것입니다.\n\n선견자들이 불길한 군사적 위협을 예언했을 때, 팔루쉬는 그의 의심을 시험해볼 기회를 얻을 것입니다. 포흐틴은 이 적들이 이성을 가지고 있을 것이고, 만약 팔루쉬가 외교와 공존을 준비한다면 평화의 가능성이 있으리라 주장했습니다. 분개한 팔루쉬들 사이에서 그의 말은 무시당했고, 스파크번의 무력 투쟁에 동조하는 팔루쉬들에게 포흐틴은 버려졌습니다.\n\n침략군은 \"§Y라봇츠§!\"라 알려진 대량학살 기계들의 제국으로, 가능했다 하더라도, 공존에는 관심이 없었습니다. 그들은 블록캣 통신망을 공격했고 그들의 전력망을 파괴했습니다. 반면 팔루쉬의 사이오닉 시설은 라봇츠의 이해를 넘어선 것이었습니다. 블록캣은 비틀거리며 행성에서의 엄청난 피의 대탈출을 할 수 밖에 없었습니다. 팔루쉬는 전진했고, 그들의 사기는 하늘 높은 줄 모르고 치솟았습니다. 라봇츠가 파괴될 때까지, 스파크번은 옹호받았고 포흐틴의 신뢰도는 엉망진창이 되었습니다.\n\n그러나, 비록 블록캣이 행성에서 도망쳤지만, 블록캣의 끝에 대한 기록은 아닙니다."
