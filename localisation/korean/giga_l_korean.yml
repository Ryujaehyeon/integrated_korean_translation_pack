 gigadocs_title:0 "£giga_docs£ 모드 문서"
 gigadocs_desc:0 "인게임 브라우저에서 모드의 §YGoogle Docs 문서§!가 열립니다.\n\n스텔라리스 브라우저에서 Google Docs가 제대로 작동하지 않으면 모드의 §Y스팀 페이지§!에서 해당 링크를 찾을 수 있습니다."
 gigalore_title:0 "£giga_lore£ 로어 위키"
 gigalore_desc:0 "인게임 브라우저에서 모드의 §Y로어 위키§!가 열립니다. 오로지 설정에 대한 지식에만 초점을 맞추고 있으며 게임플레이 데이터는 포함되어 있지 않습니다.\n\n스텔라리스 브라우저에서 제대로 작동하지 않으면 모드의 §Y스팀 페이지§!에서 해당 링크를 찾을 수 있습니다."
 gigadiscord_title:0 "£giga_discord£ 디스코드"
 gigadiscord_desc:0 "§Y기가스트럭쳐 기술지원 디스코드§! 링크를 엽니다. 인게임 브라우저가 디스코드를 지원하지 않기 때문에 §Y디스코드 앱§!이 설치되어야 초대가 작동합니다.\n\n스팀 주석이 비활성화되었기 때문에 §Y버그 제보§!나 모드에 대한 §Y질문§!이 있는 경우 디스코드를 사용하는 것이 좋습니다.\n\n디스코드 링크는 초대가 작동하지 않는 경우 §Y스팀 페이지§!에서 찾을 수 있습니다."
