 giga_kerbol_disabled:0 "£menu_disabled£케르볼 - §R비활성화됨§!\n케르볼이 §R생성되지 않을 것입니다.§!"
 giga_gatzo_enabled:0 "£menu_enabled£갓초 - §G활성화됨§!\n§Y팔루시아§!와 §Y캇첸랜드§!의 성계인 §Y갓초§!가 §G생성될 것입니다.§!\n§Y이름이 암시하는 것과 다르게, 캇첸아르티히 제국은 캇첸랜드에서 생성되지 않습니다!§!\n§G팔루시아는 블록캣 위기에서 중요한 역할을 합니다.§!"
 giga_gatzo_nopaluushia:0 "£menu_enabled£갓초 - §Y팔루시아 없§!\n§Y팔루시아§!와 §Y캇첸랜드§!의 성계인 §Y갓초§!가 §G생성될 것입니다.§!\n그러나, §Y팔루시아§!는 게임에서 제거되고 장막에 덮인 행성이 될 것입니다.\n§Y이름이 암시하는 것과 다르게, 캇첸아르티히 제국은 캇첸랜드에서 생성되지 않습니다!§!\n§R모드의 완전한 이야기를 경험하고 싶으시다면 추천하지 않습니다.§!\n§R이는 블록캣 위기를 보다 어렵게 만들 것입니다.§!"
 giga_gatzo_feonly:0 "£menu_enabled£Gatzo - §YFE ONLY§!§Y팔루시아§!와 §Y캇첸랜드§!의 성계인 §Y갓초§!가 §H아마도 생성될 것입니다.§!\n§갓초§!는 캇첸 몰락 제국의 수도로 지정된 경우에만 등장합니다.\n§Y이름이 암시하는 것과 다르게, 캇첸아르티히 제국은 캇첸랜드에서 생성되지 않습니다!§!\n§R모드의 완전한 이야기를 경험하고 싶으시다면 추천하지 않습니다.§!\n§R이는 블록캣 위기를 보다 어렵게 만들 수도 있습니다.§!"
 giga_gatzo_disabled:0 "£menu_disabled£갓초 - §R비활성화됨§!\n§Y팔루시아§!와 §Y캇첸랜드§!의 성계인 §Y갓초§!가 §R생성되지 않을 것입니다.§!\n§R모드의 완전한 이야기를 경험하고 싶으시다면 추천하지 않습니다.§!\n§R이는 블록캣 위기를 보다 어렵게 만들 것입니다.§!"
 giga_galactic_core_always_empty:0 "£menu_i£은하중심 (무작위이며 아무도 살지 않음)\n50/50 확률로 미탐사된 §Y초대질량 블랙홀§!이나 미탐사된 §Y초대질량 퀘이사§!가 생성됩니다. 아무도 살고있지 않을 것입니다."
