 giga_flusionoperations.3000.b:0 "작전에 §B전항 자원§! 4 사용 (성공 확률 [flusion_primitives_country.flusion_success_chance_total_2]%)"
 giga_flusionoperations.3000.c:0 "작전에 §B전항 자원§! 5 & §Y추가 탄두§! 사용 (성공 확률 [flusion_primitives_country.flusion_success_chance_total_3]%)"
 giga_flusionoperations.3000.c.tooltip:0 "게릴라들이 §Y메르쿠르§!로부터 상당한 양의 추가 핵탄두를 밀수할 것입니다. 이로써 우리가 준비되기 전에 탄두가 해체된다 하더라고 작전은 성공할 것입니다.\n\n그러나 추가 탄두는 플러션에 대량의 방사능 낙진을 퍼트릴 것이기 때문에 §Y솔라키아§!와 §Y라브카니아§!의 §Y저항§!이 §Y2§!가 아닌 §Y3§! 감소할것입니다."
 needs_5_solak_res_and_mercurreich_resistance:0 "§B저항 자원§!이 최소 5만큼 필요하며, §Y메르쿠르§!의 게릴라 활동이 §H상당§!해야합니다."
 giga_flusionoperations.2000.name:0 "§Y클라인라키엔 섬§!, §Y소냐 소울§! 구출"
 giga_flusionoperations.2000.desc:0 "캇첸의 §Y솔라키아§! 정복 §Y솔라크리그§! 이후, 도푸스의 딸은 캇첸군에게 생포되어 현재 §Y클라인라키엔§!의 작은 섬에 있는 중무장 군사 단지에 있습니다.\n\n한 때 아름다운 열대의 어촌사회였지만, 현재 거대한 군사 연구 시설로 변모되었으며, 그곳에서 소냐의 첨단 설계가 연구되고 분석되고 있습니다. 캇첸은 이를 이용해 자신의 소울봇 설계를 개선하고자 합니다. 소냐를 탈출시키면 캇첸의 군사 로봇 공학 연구에 큰 영향을 줄 것입니다.\n\n§Y성공 시§!:\n§Y소냐 소울§!이 강력한 §Y장군§!으로서 우리와 함께할 것이며, 캇첸의 경계가 §R3§! §R증가§!할 것입니다. 캇첸의 지상군은 §R불이익§!을 받고 §Y카이저의 우호도§!가 §Y2§! §R감소§!할 것입니다.\n\n§Y실패 시§!:\n별일 없을 것입니다.\n\n§Y성공 확률§!:\n기본: §Y70%§!\n§H캇첸의 경계§!: §R-[flusion_primitives_country.katzen_wary_perc]%§!\n§H높은 위험도§!: §R-30%§!\n§B전국적인 게릴라 활동§!: §G+[flusion_primitives_country.flusion_total_res_perc]%§!\n총계: §Y[flusion_primitives_country.flusion_success_chance_total]%§!"
 giga_flusionoperations.2001.name:0 "§Y클라인라키엔 섬§!에서 소냐를 구출하다"
 giga_flusionoperations.2001.desc:0 "솔라키아 정보부의 보고에 따르면, §Y소냐 소울§! 구출 작전이 문제 없이 진행되었다고 합니다. 침투반이 섬의 요새에 들어갔고, 구조물 전체에 폭발물을 설치했습니다.\n\n캇첸이 반응하기도 전에 끔찍한 폭발이 요새의 외곽 방어 대부분을 집어삼켰고, 탈취한 캇첸 함선을 탄 게릴라 전사들이 섬에 들이닥쳐 소냐가 갇혀 있는 억제관을 찾아냈습니다.\n\n이후 소사 게릴라들이 플러션의 안전 지역으로 이어지는 웜홀을 통해 소냐를 대피시켰고, 그곳에서 소냐는 왕복선을 타고 행성을 떠나 §Y도푸스 테크닉 마키나§!와 다시 만났습니다.\n\n그러나, 중요한 자산을 잃은 캇첸은 플러션의 게릴라 활동에 대한 전투에서 극단적인 조치를 취할 것이며, §Y카이저§!는 수 개월 내에 우리가 이 작전 전체의 배후임을 알아차릴 것입니다.\n\n캇첸의 추적이 없음을 확인한 뒤, 소냐는 우리와의 통신을 열었습니다.\n\n성공확률은 §Y[flusion_primitives_country.flusion_operation_odds]%§!였습니다."
 giga_flusionoperations.2001.a:0 "훌륭해! 화면에 띄워라."
 giga_flusionoperations.2001.a.tooltip:0 "캇첸의 경계가 §R3§! §R증가§!합니다."
 giga_flusionoperations.2003.name:0 "소냐 소울"
 giga_flusionoperations.2003.desc:0 "감사합니다 미를리엔! 마침내 이 끔찍한 억제장에서 나오게 되어서 어찌나 감사한지 말로 표현할 수가 없군요. 캇첸은... 저를 실험하고 있었습니다. 마치 실험실 동물처럼 말이죠. 이 잔인한 짐승들은 존중이라고는 없네요.\n\n후! 더 이상 생각하지 않겠어요. 이제 자유로워졌고, 또 내 아버지랑 만났군요. 이 더러운 고양이들을 어떻게 해줘야할 때가 왔군요. 싸움은 정말 오랜만이에요!\n\n억제장에서 수 년을 보내는건 기분이... 복수심에 불타게 되죠, 무슨 말인지 알겠나요."
 giga_flusionoperations.2003.whoareyou:0 "너는 도대체 누구지?"
 giga_flusionoperations.2003.whoareyou.response:0 "물론 도푸스의 딸이지요! 예전에, 플러션이 자유로웠을 적, 저는 아버지가 위대한 국가를 이끄는 것을 도왔고, 우리와 빌어먹을 카이저 사이에 솔라크리크가 발생했을 때, 솔라키아 무장군을 직접 지도하기도 했습니다.\n\n그리고 아, 저는 모험도 했습니다! 바다 깊은 곳까지 다이빙 하고, 높은 산을 오르기도 하고... 예전에 플러션은 야생의 땅이었습니다. 비밀과 위험, 놀라움으로 가득했었지요...\n\n이젠 너무 많은 것이 사라졌어요..."
 giga_flusionoperations.2003.lakia:0 "클라인라키엔 섬은 뭐지?"
 giga_flusionoperations.2003.lakia.response:0 "아시다시피, 캇첸이 결국 우리의 방어선을 뚫었을 때, 그 더러운 짐승들이 저를 납치해 아버지가 저를 어떻게 만들었는지 연구하기 위해 이곳으로 데리고 왔습니다. 물론, 솔라키아와 우리의 기술이 부러워서 그런 것이겠지요.\n\n예전에는 §Y작은 라키아§!라 불렸고, 기뻐하는 마을 사람들과 맛있는 해산물로 가득찬 아름다운 어촌마을이었어요. 그러나, 캇첸이 나타나자 섬의 절반은 고위 간부를 위한 리조트로 바뀌었고, 나머지 절반은 저와 같은 잠재적으로 \"위험한\" 기술을 바다 한가운데에서 연구하기 위한 거대한 요새로 변모했습니다.\n\n정말 끔찍하네요..."
 giga_flusionoperations.2003.soulbot:0 "소울봇은 도대체 뭐지?"
 giga_flusionoperations.2003.soulbot.response:0 "소울봇은 저의 아버지 도푸스가 개발한 것이랍니다! 솔라키아의 가장 위대한 발명품이죠. 인공 로봇 섀시는 저처럼 영혼 그 자체를 담을 수 있습니다!\n\n정말입니다! 누군가가 죽으면 그 몸을 녹여 독특한 §Y영혼 보석§!에 담고, 이를 다시 주문 제작 섀시에 집어 넣어 부확시키는 것입니다!\n\n실제 작동 과정은 아직 완벽하게 알려지지 않았지만, 아직까지 알려진 부작용은 없습니다.\n\n물론, 캇첸들이 빠르게 우리를 복제해서 일당백의 초인 군인을 만드는데 사용하고 있습니다.\n\n끔찍하지않나요? 솔라키아는 이 기술을 생명을 퍼트리는데 사용했지만, 캇첸들은 죽음을 퍼트리기 위해 사용하고 있습니다.\n\n여러분 종족에게는 안타까운 일이지만, 캇첸과의 일 때문에, 제 아버지는 이 기술의 비밀을 누구와도 나누고 싶어하지는 않을 것 같네요. 여러분 같은 가까운 동맹이라 하더라도 말이죠. 유감입니다..."
 giga_flusionoperations.2003.joinus:0 "흠, 캇첸을 날려버리는 일에 함께 하지 않겠나?"
 giga_flusionoperations.2003.joinus.tooltip:0 "§Y소냐 소울§!이 강력한 §Y장군§!으로서 함께합니다. 그러나, 우리가 솔라키아에 대해 §R적대적인 행동§!을 보인다면, 그녀는 변절할 것입니다!"
 giga_flusionoperations.2003.joinus.response:0 "물론이죠! 물론, 여러분이 솔라키아의 뒤통수를 때리지 않는다면 말이죠..."
 giga_flusionoperations.2003.bye:0 "안녕히, 몸조리 잘하시오."
 giga_flusionoperations.2003.bye.response:0 "당신이 카이저의 통치를 끝낼 마지막 일격이 되기를."
 katzen_soulbot_research_busted:0 "캇첸 소울봇 연구 방해됨"
 katzen_soulbot_research_busted_desc:0 "소냐의 구출로 인해, 완벽한 소울봇을 만들고자했던 카이저의 계획이 무너졌습니다."
 giga_katzen.2004.name:0 "캇첸아르티히 제국"
 giga_katzen.2004.desc:0 "철저한 조사를 마친 끝에, 너희들이 이 소냐 탈취 작전을 조직한 것 같군.\n\n정말로 우리가 이 일을 모르리라 생각한 건가?\n\n우리의 군사 시설이 입은 피해를 당장 보상하길 바란다."
 giga_katzen.2004.a:0 "그래, 그래, 지불하지. | £energy£ §Y10000§!"
 giga_katzen.2004.a.tooltip:0 "§Y카이저의 우호도§!가 §Y1§!만 §R감소§!할 것입니다."
 giga_katzen.2004.a.response:0 "아직 용서받았다고 생각마라, 외계인들아."
 giga_katzen.2004.b:0 "꺼져."
 giga_katzen.2004.b.tooltip:0 "§Y카이저의 우호도§!가 §Y2§! §R감소§!할 것입니다."
 giga_katzen.2004.b.response:0 "카이저께서는 이 일을 기억하실 것이다, 외계인들아."
 giga_flusionoperations.2002.name:0 "소냐 구출 실패"
 giga_flusionoperations.2002.desc:0 "§Y소냐 소울§!을 구출하고자 했던 시도가 끔찍하게 끝나버렸습니다. 솔라키아와 에지카니아 요원이 §Y클라인라키엔 섬§!에 가까이 다가가기도 전에, 위장한 착륙선이 섬의 요새망에 의해 발각되어 파괴되었습니다.\n\n도푸스는 크게 실망했습니다. 작전은 완전한 실패로 끝났습니다. 하지만 적어도 캇첸은 이 일이 경계를 높일 정도로 중대한 사건은 아니라고 여겼습니다."
 giga_flusionoperations.2002.a:0 "제기랄!"
 giga_flusionoperations.1000.name:0 "§Y라이온스버그 조립 시설§!에서 §Y리지거 캇첸 판처 설계도§! 획득"
 giga_flusionoperations.1000.desc:0 "§Y리지거 캇첸 판처§!는 캇첸 지상군이 사용한 지상 차량 중 가장 끔찍한 것입니다. 이 어마어마한 거수는 캇첸이 별에 닿기도 전에 설계되었으며, 무시무시하게 강력한 핵탄두를 행성의 지표면 어느 곳에든, 심지어는 저궤도에도 발사할 수 있습니다.\n\n설계도는 완전 비밀이지만, 다행스럽게도, 솔라키아 요원들이 설계도가 저장된 취약 서버를 발견했습니다. 이는 §Y라이온스버그§!의 캇첸 도시에 있는 조립 시설 내부에 있습니다.\n\n우호적인 에지카니아 이중간첩 덕분에, 우리는 시설에 잠입해 설계도가 든 귀중한 데이터 디스크를 복구할 수 있을지도 모릅니다.\n\n§Y성공 시§!:\n§Y리지거 캇첸 판처§!을 직접 생산할 수 있는 §Y기술§!을 얻을 것입니다.\n\n§Y실패 시§!:\n캇첸의 경계가 §R1§! §R상승§!할 것입니다.\n\n§Y성공확률§!:\n기본: §Y70%§!\n§H캇첸의 경계§!: §R-[flusion_primitives_country.katzen_wary_perc]%§!\n§H중간 정도의 위험도§!: §R-20%§!\n§B전국적인 게릴라 활동§!: §G+[flusion_primitives_country.flusion_total_res_perc]%§!\n총계: §Y[flusion_primitives_country.flusion_success_chance_total]%§!"
 giga_flusionoperations.1001.name:0 "§Y리지거 캇첸 판처 설계도§! 획득!"
 giga_flusionoperations.1001.desc:0 "솔라키아가 모든 것이 계획대로 진행되었다고 보고했습니다.\n\n다른 게릴라 단체가 일으킨 정전에 이어, 에지카니아 이중간첩이 어두워진 라이온스버그 조립 시설에 잠입해 캇첸의 군사 차양에 대한 설계도가 담겨있을 고도로 암호화된 디스크를 찾아냈습니다.\n\n그리고, 우리가 바라던 대로, 이 데이터에는 강력한 §Y리지거 캇첸 판처§!의 설계도가 들어있었습니다. 차량의 엄청난 복잡도로 인해 여러 부분으로 나누어져 있었찌만, 에지카니아는 곧바로 데이터를 자신의 디스크로 옮겨담았고, 시설을 탈출해 솔라키아 게릴라에게 데이터를 넘겼습니다.\n\n과학자들이 이를 분석하고 역공학 하는데 시간이 걸릴 테지만, 솔라키아는 우리가 이 거창한 전쟁의 괴수를 만들 수 있다면 카이저의 운명을 결정 짓는데 도움이 되리라고 확신시켜 주었습니다.\n\n성공 확률은 §Y[flusion_primitives_country.flusion_operation_odds]%§!였습니다."
 giga_flusionoperations.1001.a:0 "멋지군!"
 giga_flusionoperations.1001.a.tooltip:0 "캇첸은 사실상 아무것도 알아차리지 못했고, §R경계 상승§!은 일어나지 않았습니다."
 giga_tech_katzen_panzers:0 "리지거 캇첸 판처 배치"
 giga_tech_katzen_panzers_desc:0 "캇첸아르티히 제국의 심장에서 얻은 설계도에 기초하여 만들어진 이 강력한 기계는 언제 어디로든 핵을 날려보낼 수 있습니다."
 giga_flusionoperations.1002.name:0 "작전 실패"
 giga_flusionoperations.1002.desc:0 "솔라키아 동맹의 보고에 따르면, 안타깝게도 §Y리지거 캇첸 판처 설계도§!를 훔쳐올 에지카니아 이중간첩과의 연락이 끊겼다고 합니다.\n\n중무장된 §Y라이온스버그 조립 시설§!을 지키고 잇는 수많은 캇첸 군인이 계획을 알아차리고 우리 요원을 즉시 사살했습니다.\n\n캇첸은 수 주 내로 보안을 더욱 강화할 것 같으며, §Y캇첸의 경계§!가 상승했습니다."
 giga_flusionoperations.1002.a:0 "빌어먹을..."
 giga_flusionoperations.1002.a.tooltip:0 "캇첸의 경계가 §R1§! §R증가§!합니다."
 giga_disabled_for_overlord:0 "3.4의 새로운 속국 메커니즘 때문에 일시적으로 비활성화 되었습니다."
 giga_cant_remove_orbital_ring_part:0 "행성이 일반 지구를 사용하지 않을 때만 이 모듈을 제거할 수 있습니다."
 sm_orbital_ring_giga_mining_district:0 "외기권 광물 측량기"
 sm_orbital_ring_giga_mining_district_desc:0 "고감도 감지 장치를 이용해 발견하지 못했던 광맥을 찾아내어 지상에서의 채굴 활동을 증가시킬 수 있습니다.\n\n§Y생명 없는 행성에서의 효율이 더 높습니다.§!\n"
 sm_orbital_ring_giga_generator_district:0 "궤도 태양광 리디렉터"
 sm_orbital_ring_giga_generator_district_desc:0 "튼튼한 거울들이 지상으로 추가적인 태양광을 보내어, 전력 생산에 도움을 줍니다.\n\n§Y성계에서 가장 밝은 항성에 따라 효율이 달라집니다.§!\n"
 sm_orbital_ring_giga_farming_district:0 "행성 토양 비료"
 sm_orbital_ring_giga_farming_district_desc:0 "대량의 비료를 생산하고 살기에 부적합한 땅에서 농업을 진행할 수 있도록 비료를 뿌리는 자동화 공장입니다.\n\n§Y무덤 행성에서의 효율이 더 낮고 가이아 행성에서의 효율이 더 높습니다. 방사능 사막 행성에서는 작동하지 않습니다.§!\n"
 sm_ring_giga_crystals_hub:0 "레이저 크리스탈 시추"
 sm_ring_giga_crystals_hub_desc:0 "거대한 레이저 드릴이 행성의 지각을 절단하여 행성에서의 희귀 크리스탈 채굴을 돕습니다. 다른 채굴된 자원은 크리스탈 정제 과정에 보탭니다.\n\n§T§G+25§! £job_crystal_miner£ §Y크리스탈 채굴§! 직업을 £district£ §Y$district_mining$§!당 제공합니다."
 ring_giga_crystals_hub_condition:0 "§R행성은 £rare_crystals£ §Y$zone_rare_crystals$§! 구역을 가져야 합니다."
 sm_ring_giga_motes_hub:0 "극초음파 분말 분류기"
 sm_ring_giga_motes_hub_desc:0 "강력한 음향 방출기가 초음파 파동을 대기로 발사하여 모트 수확지로 향하게 하여, 적절한 주파수로 먼지 사막을 휘저어 많은 휘발성 모트를 표면으로 끌어올립니다. 전자기 망은 모트 정제 과정에 귀중한 자재를 포획할 수도 있습니다.\n\n§T§G+25§! £job_mote_harvester£ §YMote Harvesting§! 직업을 £district£ §Y$district_generator$§!당 제공합니다."
 ring_giga_motes_hub_condition:0 "§R행성은 £volatile_motes£ §Y$zone_volatile_motes$§! 구역을 가져야 합니다."
 sm_ring_giga_gas_hub:0 "대기 가스 안정화 장치"
 sm_ring_giga_gas_hub_desc:0 "자연적으로 발생하는 가스 매장지 근처의 대기 중에 안정제를 주입하는 화학 공장으로, 추출을 더 안전하고 쉽게 만듭니다. 부작용으로, 지역 미생물을 더 효과적으로 활용하여 바이오매스에서 가스를 정제할 수 있습니다.\n\n§T§G+25§! £job_gas_extractor£ §Y가스 추출§! 작업을 £district£ §Y$district_farming$§!당 제공합니다."
 ring_giga_gas_hub_condition:0 "§R행성은 £exotic_gases£ §Y$zone_exotic_gases$§! 구역을 가져야 합니다."
 sm_ring_giga_iodizium_hub:0 "현장 격리 그리드"
 sm_ring_giga_iodizium_hub_desc:0 "아이오디지움 채굴 시설에 집중된 쉴드 프로젝터는 폭발적인 연쇄 반응이 최소화되도록 보장하며, 행성에서의 크리스털 처리 효율을 크게 향상시킵니다.\n\n§T활성화된 £building£ §Y$building_giga_iodizium_mines$§! 건물 하나당 £job_giga_iodizium_miner£ §YIodizium Mining§! 직업 §G+1§!을 제공합니다.§!\n"
 ring_giga_iodizium_hub_condition:0 "§R행성에 적어도 1개 이상의 £building£ §Y$building_giga_iodizium_mines$§!을 건설할 수 있어야 합니다."
 sm_ring_giga_orbital_arcology:0 "궤도 아콜로지"
 sm_ring_giga_orbital_arcology_desc:0 "고밀도 주택 개발과 충분한 교통 기반 시설은 행성의 공간을 최대한 활용할 수 있게 합니다.\n\n$sm_ring_giga_orbital_arcology_effect$\n"
 sm_ring_giga_orbital_arcology_effect:0 "['starbase_module:orbital_ring_habitation', $sm_orbital_ring_habitation$] 당 §G+5%§! §Y$MOD_PLANET_MAX_DISTRICTS_MULT$§! 제공, 최대 §G+20%§!, ['concept_giga_rural_district_booster_modules'] 당 §G+1§! §Y$MOD_PLANET_MAX_DISTRICTS_ADD$§! 제공, 최대 §G+4§!"
 ring_giga_orbital_arcology_requires_module:0 "§R최소 하나의 $sm_orbital_ring_habitation$ 또는 $concept_giga_rural_district_booster_modules$이(가) 필요합니다§!"
 ring_giga_orbital_arcology_no_existing:0 "§R[planet.GetName]에는 이미 궤도 아콜로지가 있습니다§!"
 ring_giga_orbital_arcology_capped:0 "§R$sm_ring_giga_orbital_arcology$이(가) 상한에 도달했습니다§!"
 giga_dialog.13500.name:0 "오비탈 링 건설됨"
 giga_dialog.13500.desc:0 "§Y[orbital_ring_planet.GetName]§!의 오비탈 링 건설이 완료되었씁니다. 이제 행성의 필요에 따라 오비탈 링을 특성화시킬 수 있습니다."
 giga_dialog.13500.a:0 "확인했습니다."
 giga_tech_enhance_orbital_arcologies:0 "궤도 아콜로지 강화"
 giga_tech_enhance_orbital_arcologies_desc:0 "우주 공학 분야의 발전으로 인해 궤도 아콜로지에 두 번째 고리를 안전하게 건설할 수 있게 되었습니다. 구조적 안정성을 해치지 않으면서도 생활 공간을 늘릴 수 있습니다."
 giga_tech_maximize_orbital_arcologies:0 "궤도 아콜로지 최대화"
 giga_tech_maximize_orbital_arcologies_desc:0 "궤도 건설 기술을 더욱 갈고 닦아 궤도 아콜로지에 또 하나의 고리를 추가할 수 있게 되었습니다. 즉, 생활 공간을 최대화할 수 있게 되었다는 것입니다."
 giga_tech_orbital_ring_strategic_resources:0 "궤도 자원 추출 최대화"
 giga_tech_orbital_ring_strategic_resources_desc:0 "오비탈 링을 희귀 자원 추출 시설의 생산량을 높일 수 있는 다양한 장치를 건설할 플랫폼으로 사용할 수 있습니다. 상당히 효율적이지만, 너무 무모하게 사용한다면 부작용이 발생할 수 있습니다."
 giga_tech_orbital_ring_iodizium_hub:0 "궤도 억제 필드 투사"
 giga_tech_orbital_ring_iodizium_hub_desc:0 "$giga_sr_iodizium$ 채굴은 위험한 과정이며, 우리의 오비탈 링에 특수 보호막 생성기를 배치함으로써 안전성을 높일 수 있습니다.\n\n이 보호막을 통해 결정의 가장 변동성이 큰 경향을 억제하고 가공 시설을 구획화함으로써 채굴 장비의 재앙적인 비계획적 분해로 인한 손실을 줄일 수 있습니다."
 giga_blokkat_admiral_name:0 "블록제독 [THIS.GetName]"
 MESSAGE_WAR_MOON_DESTROYED:0 "전쟁 위성 파괴됨"
 MESSAGE_WAR_MOON_DESTROYED_DESC:0 "$SYSTEM_NAME|Y$ 성계 에서 $ENEMY_NAME|Y$에 의해 $CELESTIAL_WARSHIP_NAME|Y$ 전쟁 위성이 파괴되었습니다.\n\n자원과 성계에 대한 통제권이 있다면 수리할 수 있을 것입니다."
 MESSAGE_WAR_PLANET_DESTROYED:0 "베히모스 요새 행성 파괴됨"
 MESSAGE_WAR_PLANET_DESTROYED_DESC:0 "$SYSTEM_NAME|Y$ 성계 에서 $ENEMY_NAME|Y$에 의해 $CELESTIAL_WARSHIP_NAME|Y$ 베히모스 요새 행성이 파괴되었습니다.\n\n자원과 성계에 대한 통제권이 있다면 수리할 수 있을 것입니다."
 MESSAGE_WAR_SYSTEM_DESTROYED:0 "스텔라 시스템크래프트 파괴됨"
 MESSAGE_WAR_SYSTEM_DESTROYED_DESC:0 "$SYSTEM_NAME|Y$ 성계 에서 $ENEMY_NAME|Y$에 의해 $CELESTIAL_WARSHIP_NAME|Y$ 스텔라리스 시스템크래프트가 파괴되었습니다.\n\n4개의 손상된 베히모스 요새 행성과 5개의 손상된 전쟁 위성으로 분해되었습니다."
 giga_tech_ringworld_buildings:0 "초규모 도시 개발"
 giga_tech_ringworld_buildings_desc:0 "정말이지 거대한 거주 공간을 지었으니, 만약 우리가... 그 위에 더 큰 건물을 지으면 어떨까요?\n\n물론 그렇게 간단하지는 않지만 분명 달성할 수 있습니다."
 garyx_collection:0 "파충류 번식 데이터뱅크"
 garyx_collection_desc_short:0 "은하 전역의 여러 파충류 종의 번식 의식에 전념하는 데이터 뱅크입니다."
 garyx_collection_desc_details:0 "2백만 시간 이상의 헌신적인 파충류 콘텐츠로 구성된 이 데이터뱅크는 Garyx를 매료시켜 Squareworld를 파멸로 이끌었습니다. 그러나 그가 왜 이렇게 매료되었는지는 우리가 결코 풀 수 없는 미스터리입니다."
 meopa_detonator:0 "메오파의 폭발장치"
 meopa_detonator_desc_short:0 "작은 금속 장치로, Katzenland의 군사 무기를 전부 발사하기 위한 큰 빨간 버튼이 있습니다."
 meopa_detonator_desc_details:0 "최고의 카첸란디안 장인정신으로 제작된 이 작은 장치는 메오파가 잠재적 위협에 신속하게 대응할 수 있도록 카첸란디안 핵무기를 즉시 발사할 수 있게 설계되었습니다. 그러나 대부분은 메오파가 이 장치를 수정하여 이중 클릭 시 핵무기가 카첸란 쪽으로 향하도록 했다는 사실을 알지 못했습니다. 이는 아마도 카첸란의 잠재적 침략자를 막기 위한 것이었을 것입니다. 카첸란디안들이 그들의 무기고에 대한 완전한 통제를 단일 지도자에게 맡겼다는 사실은 그들이 그에게 가졌던 과도한 헌신을 나타내며, 이는 물론 그들의 몰락으로 이어질 것입니다."
 aeternite_golem:0 "에테르나이트 골렘 머리"
 aeternite_golem_desc_short:0 "아이온디아를 수호하기 위해 만들어졌던 쓰러진 에테르나이트 골렘의 거대한 머리"
 aeternite_golem_desc_details:0 "이 거대한 수정 구조물은 에테르눔의 황금기까지 거슬러 올라가며, 아마도 에테르나이트 전선 유닛의 프로토타입이었을 것입니다. 물론 에테르눔이 쇠퇴하고 침체하면서, 백만 년의 대부분 동안 아이온디아 표면을 배회하도록 남겨졌습니다. 이것은 놀라운 재생 능력을 자랑하며, 그것이 다시 자라나는 것을 막기 위해 전담 팀 전체가 필요했지만, 이는 우연히 좋은 수정 공급원을 나타내기도 합니다."
 planckeryons:0 "플랑케리온 샘플"
 planckeryons_desc_short:0 "다양하고 흥미로운 특성, 특히 스스로를 '재코딩'하는 능력을 가진 난해한 아원자 입자"
 planckeryons_desc_details:0 "에테르눔은 황금기 동안 이러한 강력한 입자 생산을 실험했지만, 쇠퇴 이후 본질적으로 프로젝트를 보류했습니다. 우리가 수집한 정보에 따르면, 이 입자들은 자신의 속성을 재코딩하는 능력을 가지고 있어 적절히 활용하면 비범하게 강력해집니다. 그러나 에테르눔은 플랑케리온의 대규모 생산으로 나아가지 못한 것 같으며, 우리는 아마도 이에 감사해야 할 것입니다."
 riesiger_blueprints:0 "리지거카첸판처 설계도"
 riesiger_blueprints_desc_short:0 "카첸 군대가 운용하는 무시무시한 리지거카첸판처의 설계도"
 riesiger_blueprints_desc_details:0 "라이언스부르크 생산 센터 깊숙한 곳에서 회수된 이 설계도들은 강력한 리지거카첸판처를 제작하는 방법을 상세히 설명합니다. 이 거대한 차량들은 군사적 필요에 따라 이동식 포병 플랫폼과 전선 유닛 역할을 모두 수행하며, 카첸 우주 함대가 운용하는 '벨트라움판처'와 매우 유사합니다. 최근 모델들은 실제로 두 차량을 하나로 통합하여 우주에서는 군함으로, 행성 표면에서는 전선 부대로 운용할 수 있게 되었습니다."
 slukatian_drive:0 "슬루카티안 FTL 드라이브"
 slukatian_drive_desc_short:0 "은하 간 공간을 도약하기 위해 이전에는 볼 수 없었던 원리에 의존하는 실험적인 FTL 드라이브"
 slukatian_drive_desc_details:0 "이 장치는 완전히 다른 은하계에서 온 것으로, '슬루카티안'들이 기존 기술을 결합하여 완전히 새로운 '궁극의' FTL 드라이브를 만들려는 시도에서 조립되었습니다. 탐사선이 이동한 거리와 그것을 완전히 회수할 수 없었던 것을 고려하면 그들의 시도는 약간 지나치게 성공적이었던 것 같습니다. 흥미롭게도 슬루카티안 제국 외에도 이 장치에는 '위대한 (판독 불가) 연방'이라고 불리는 조직에 대한 희미한 언급이 있습니다. 그들이 슬루카티안과 어떤 관계를 가졌는지는 알려지지 않았습니다."
 loris_katana:0 "카텐스바흐 카타나"
 loris_katana_desc_short:0 "분데스할레의 잔해에서 회수된, 이전에 로리스 폰 카텐스바흐에게 속했던 고대 카첸 카타나"
 loris_katana_desc_details:0 "화약 시대 이전에 최고의 카첸 전쟁 대장장이에 의해 단조된 이 카타나는 폰 카텐스바흐 가문 내에서 여러 세대에 걸쳐 전해 내려왔습니다. 여기에는 2천 년 이상 거슬러 올라가 로리스 자신으로 끝나는, 이 검을 물려받은 모든 카첸의 이름이 새겨져 있습니다. 실제 전투에 사용되었을 가능성은 낮지만, 그럼에도 불구하고 카첸 군사 전통의 영원한 상징으로 남아 있습니다."
 meopian_expedition_chunk:0 "메오파 원정대 파편"
 meopian_expedition_chunk_desc_short:0 "플루시온 표면에서 회수된, 카첸들을 성간 공간 너머로 실어 날랐던 '메오파 원정대 I' 식민선의 파편"
 meopian_expedition_chunk_desc_details:0 "메오파 원정대는 만 년 이상 전에 전 카첸란트 왕 메오파가 카첸과 주스프리스로 수많은 행성을 식민화하기 위해 보낸 일련의 함선이었습니다. 이 함선 중 첫 번째는 플루시온에 도착했지만, 고고학 데이터에 따르면 12척의 함선이 발사되었습니다. 그들의 궁극적인 운명은 알려지지 않았습니다."
 soulbot_fragment:0 "로퀄리안 소울젬"
 soulbot_fragment_desc_short:0 "로퀄리안 디자인의 '소울젬'으로, 명백히 진정한 유기체 영혼을 기계 몸체에 묶을 수 있습니다. 내부 작동 방식은 알려지지 않았습니다."
 soulbot_fragment_desc_details:0 "이 놀라운 기술적 경이로움은 로퀄리안들이 '소울봇'을 제작할 수 있게 합니다 - 영혼에 연결된 기계 섀시로, 복잡한 AI 시스템 없이 진정한 지성을 부여하고 가장 불운한 이들에게 '두 번째 기회'를 제공합니다. 그들의 디자인은 로퀄리안들이 제조할 수 있었던 수준을 훨씬 뛰어넘으며, 이전에 플루시온을 방문했던 선구자 문명에 의해 역설계되었을 가능성을 시사합니다."
 dead_chablokk:0 "고대 차블록 슈트"
 dead_chablokk_desc_short:0 "차블록의 신체를 감싸 능력을 향상시키기 위한 로봇 외골격"
 dead_chablokk_desc_details:0 "차블록들이 거대한 사이오닉 팔루쉬들과 벌인 잔혹한 싸움은 그들을 빠른 기술 혁신과 군사적 반복의 순환으로 몰아넣었습니다. 이 진보된 로봇 슈트들은 그들의 부족한 신체 능력을 향상시키고 기술과 더 쉽게 상호작용할 수 있도록 개발되었습니다. 이 기술 통합 과정은 오늘날의 블록캣으로 최종 변형될 때까지 계속되었습니다."
 meopium:0 "핵 단조 토양"
 meopium_desc_short:0 "핵 지옥불 속에서 단조된 특이한 합금을 함유한 카첸란트 토양 덩어리"
 meopium_desc_details:0 "카첸란트 표면을 훼손한 맹렬한 핵무기 폭격은 행성 상부 지각의 일부에 새로운 고방사성 합금을 생성했습니다. 이것들만으로도 행성을 앞으로 수천 년 동안 거주 불가능하게 만드는 상당한 열과 방사선 원천을 나타냅니다."
 kaiser_plans:0 "불완전한 카첸 설계도"
 kaiser_plans_desc_short:0 "카이저 카테일에게 속한 미완성 설계도로, 때로는 카첸들이 건설할 수 있다고 알려진 것보다 더 진보된 구조물을 묘사합니다."
 kaiser_plans_desc_details:0 "카이저 집무실 아래 중무장된 저장실에서 회수된 이 설계도들은 방대한 행성 프로젝트와 거대구조물에 대한 부분적인 정보와 초기 설계도를 포함합니다. 이것들은 명백히 다수의 유명한 카첸 과학자들과 엔지니어들에 의해 비밀리에 작성되었으며, 아마도 승인을 위해 카이저에게 보냈을 것입니다. 흥미롭게도, 앞서 언급한 뛰어난 카첸 인재들 중 일부는 공식 민사 기록에 완전히 위조된 신분이 삽입된 것으로 보여, 그들이 부분적으로 허구일 수 있음을 나타냅니다. 이는 따라서 실제로 이 계획을 누가 만들었는지에 대한 질문을 제기합니다."
 pouchkinn_device:0 "푸쉬킨 시간 장치"
 pouchkinn_device_desc_short:0 "이상한 보라색 가스를 이용하여 사용자에게 부분적인 예지 능력을 부여하지만, 약간의 정신적 온전함을 대가로 하는 장치"
 pouchkinn_device_desc_details:0 "푸쉬킨의 실험실에서 발견된 많은 실험 중, 이것은 확실히 가장 흥미로운 것 중 하나입니다. 이것은 일종의 사이오닉 가스를 '충전'하여 사용자의 운명에 대한 초자연적인 환상을 유도하고, 따라서 예방 조치를 취할 수 있게 하는 것 같습니다. 푸쉬킨이 자신의 연구를 최적화하기 위해 이것을 활용했을 가능성이 있지만, 환상은 너무 암호 같아서 훈련받지 않은 인원은 본질적으로 사용할 수 없습니다."
 kaiser_moon_core:0 "카이저 문 거대 반응로 파편"
 kaiser_moon_core_desc_short:0 "이 거대한 반응로 파편은 한때 카이저 문에 막대한 동력을 제공했습니다."
 kaiser_moon_core_desc_details:0 "전체 천체를 하늘을 통해 이동시키는 데 필요한 힘은 경이로움 그 자체입니다. 따라서 카이저 문은 광대한 중력 추진기와 상대론적 레일건 배열에 에너지를 공급하기 위해 수많은 거대 반응로를 사용했습니다. 그들은 주로 반물질 촉매 핵융합을 사용했는데, 이는 가장 진보된 방법은 아니지만 전체 달을 운영하는 데 필요한 크기로 확장하기가 비교적 쉽고 반물질 발전소보다 치명적인 고장이 훨씬 덜 발생합니다."
 blokkat_core:0 "블록워크 수신기"
 blokkat_core_desc_short:0 "블록프레임의 거의 온전하고 기적적으로 안정적인 블록워크 수신기"
