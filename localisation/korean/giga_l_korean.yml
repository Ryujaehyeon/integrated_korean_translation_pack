 giga_flusionunion.011.name:0 "라우나이스 쿠데타"
 giga_flusionunion.011.desc:0 "최근 플러션 사회의 급진파들이 정부를 무너뜨리기 위한 급진적인 정치적 음모를 행하여서 §Y연합 플러션 국가§!가 격변하고 있다는 소식을 들었습니다!\n\n반란은 §Y라우란다르§!의 국가에서 시작되었습니다. 이 국가는 플러션의 과거 국가로, 그들이 FTL을 개발하기 전, 행성을 장악하려는 §Y카이저 캇테일§!의 시도에 대항하기 위해 초국가적 UFS로 합쳐진 국가 중 하나입니다. 상황이 급박했기 때문에 라우나이스는 따를 수밖에 없었으나, 이제 카이저가 없어진지 십 년이 지났고 이전 라우나이스 사회의 급진파들은 독립 국가로서의 자신의 국가로 돌아가길 원해왔습니다.\n\n행성 전체가 UFS로 연합되었고, 그 대통령인 §Y도푸스§!는 그의 초국가가 조각나는 것을 내버려두지는 않을 것이기 때문에, 이는 사실상 불가능했습니다. 따라서, 라우란다르의 정치 지도자들은 그들의 과거 사람들에게서 서서히 지지를 모아왔고, 노련한 통솔력으로 심지어는 미래의 \"은하 정복\"을 약속하면서 카이저의 과거 시민들에게 또한 규합했습니다.\n\n그리하여 수백 수천만의 라우나이스와 캇첸 당파가 도푸스를 교체할 긴급 선거를 탄원했고, 그는 수년간의 갈등 고조 끝에 이를 인정했습니다. 결국 당연하게도, 라우란다르의 과거 통치자인 §Y아론 N. 블루§!가 큰 표차로 선거에서 승리했다고 합니다.\n\n그리고 그는 즉시 UFS의 이전 헌법을 폐지하고 그의 충성스러운 지지자들과 군부에게 그의 통치에 반대하는 모든 것들을 장악하라고 명령했습니다. 라우나이스가 UFS를 완전히 장악하는데 몇 주밖에 걸리지 않았고, 아론은 이제 은하 정복에 덤벼들 권위주의적이고 군국주의적 국가인 §Y라우나이즈 제국§!의 탄생을 선언했습니다.\n\n따라서 카이저의 패배 이후 빠르게 탄생한 플러션의 민주주의는 다시 한 번, 그리고 어쩌면 영원히 사라져버렸습니다."
 giga_flusionunion.011.a:0 "걱정되는군. 저들은 정말 쉬지를 않는군."
 civic_laurandar_aaron:0 "라우나이스 체계"
 civic_laurandar_aaron_desc:0 "모든 이는 아론의 뜩을 받들기 위해 싸워야한다. 이 사회는 아론 N. 블루가 개발한 특별한 체계 아래에서 기능하는데, 이 시스템은 국가에 대한 극도의 군국화와 복종에 의존합니다. 라우나이스 패권을 확장하기 위해서는 모든 자원을 수집하고 이용해야하며, 그들은 은하계에 대한 그들의 우위를 보장하기 위해 은하에서 가장 거대한 전함을 모으기를 바랍니다.\n\n플러션에 있는 수많은 난해한 자원과 종족이 강제로 전쟁 기계의 연료로 사용되고 있으며, 그들의 산업 및 군사 능력을 어마어마하게 증가시키고 있습니다.\n\n§R플러션이 패배하면 이 사회 제도가 없어질 것입니다.§!"
 giga_aeternum.43101.name:0 "아이온디아에 대한 지식이 상승함!"
 giga_aeternum.43101.desc:0 "$aeternum_tech_intel$에 대한 최근의 분석에 이어서, 우리 버치 월드의 당국이 구조물의 고대 시설 및 난해한 공학에 대한 우리의 지식이 개선되었다고 알립니다.\n\n이로써 우리는 거대 구조물의 엄청난 잠재력을 더 많이 사용할 수 있을 것이며, 이는 거주자들과 산업에 큰 이익이 될 것입니다."
 giga_aeternum.43101.a:0 "멋지군!"
 giga_aeternum.43101.a.tooltip:0 "§Y아이온디아§!의 기술에 대한 우리의 지식에 대한 §R불이익§!이 §G감소§!하였습니다."
 giga_aeternum.43102.name:0 "아이온디아에 대해 완전히 이해함!"
 giga_aeternum.43102.desc:0 "$aeternum_tech_intel$에 대한 최근의 분석에 이어서, 우리 버치 월드의 지역 당국이 버치 월드의 고대 첨단 기술 및 공학을 완전히 이해했고, 마침내 모든 잠재력을 사용할 수 있다고 보고했습니다.\n\n이는 우리 문명에게 엄청난 성취입니다. §Y아이온디아§!를 완전히 이해하기 위해 충분한 정보를 모으는 것은 길고 피곤한 작업이었지만, 마침내 우리는 버치 월드를 완전한 수준으로 올바르게 사용할 수 있게 되었습니다."
 giga_aeternum.43102.a:0 "드디어! 은하의 중심이 완전히 우리의 통제하에 있다!"
 giga_aeternum.43102.a.tooltip:0 "§Y아이온디아§!의 기술에 대한 우리의 지식에 대한 §R불이익§!이 §G제거§!되었습니다."
 giga_aeternum.4402.name:0 "아이온디아 완전히 밝혀짐!"
 giga_aeternum.4402.desc:0 "드디어, 수십년의 강도 높은 탐사와 탐험의 끝에, 우리의 정보국이 마침내 §Y아이온디아§!의 모든 것이 세밀하게 나타내졌다고 보고했습니다.\n\n에테르눔도 이를 성취했는지는 모르지만, 이 위대한 업적으로 인해 우리는 버치 월드를 올바르게 확장하고 관리할 수 있게 할 것이며, 분명히 그 궁극적이고 영원한 기술을 줄 것입니다."
 giga_aeternum.4402.a:0 "정말 좋군!"
 aet_birch_world_exp_debuff_guide:0 "§Y우리가 아이온디아의 표면을 §Y25%§!, §Y50%§!, §Y75%§!, 그리고 §Y100%§! 탐사할 때마다 이 불이익이 점차 사라질 것입니다.§!"
 aet_birch_world_poorly_mapped_1:0 "버치 월드: §R거의 미탐사됨§!"
 aet_birch_world_poorly_mapped_1_desc:0 "이 버치 월드 표면은 거의 알려지지 않았습니다.\n\n$aet_birch_world_exp_debuff_guide$"
 aet_birch_world_poorly_mapped_2:0 "버치 월드: §H대부분 미탐사됨§!"
 aet_birch_world_poorly_mapped_2_desc:0 "이 버치 월드 표면의 대부분이 알려지지 않았습니다.\n\n$aet_birch_world_exp_debuff_guide$"
 aet_birch_world_poorly_mapped_3:0 "버치 월드: §Y일부 미탐사됨§!"
 aet_birch_world_poorly_mapped_3_desc:0 "이 버치 월드 표면의 일부가 알려지지 않았습니다.\n\n$aet_birch_world_exp_debuff_guide$"
 aet_birch_world_poorly_mapped_4:0 "버치 월드: §G다소 미탐사됨§!"
 aet_birch_world_poorly_mapped_4_desc:0 "이 버치 월드 표면의 대부분 알려졌습니다.\n\n$aet_birch_world_exp_debuff_guide$"
 giga_aeternum.4320.name:0 "아이온디아의 광대함"
 giga_aeternum.4320.desc:0 "과거 에테르나이트의 수도였던 §Y아이온디아§!에 대한 통제권을 주장하면서, 우리의 지역 정착민들은 버치 월드가... 광활하다는 것을 서서히 깨달았습니다.\n\n굉장히 광활하다는 것을 말입니다.\n\n사실, 에테르눔의 문명 전체와 산업이 거대 구조물의 광대한 거주 가능 지역의 단 §Y1 퍼센트§!도 안되는 부분을 차지한것으로 보입니다. 따라서, 이처럼 거대한 버치 월드 표면의 조각들은, 상당히, 말 그대로 완전히 미지의 영역입니다.\n\n이 공간은 적어도 수백, 수천년 동안 어떠한 관리도 없이 남겨져있었던 듯 합니다. 이 알 수 없는 땅에 대한 첫 조사를 통해, 꽤 과거에 에테르눔이 건설한 듯한 버려진 시설들과 고대 기술의 보물 창고라는 것을 밝혀냈습니다.\n\n이어서 우리 과학계의 많은 저명 인사들이 우리에게 버치 월드 표면 전체를 제대로 도표화하기 위해 이 미지의 땅으로 §Y탐험대§!를 파견할 것을 촉구하고 있습니다. 이는 우리가 찾는 모든 것을 회수하여 추가적인 $aeternum_tech_intel$의 획득으로 이어질 것입니다.\n\n준비가 되면 우리는 에테르나이트 정보국을 통해 탐험대를 파견해야합니다."
 giga_aeternum.4320.a:0 "이 괴물의 겉만 들춰보고 있었군..."
 giga_aeternum.4320.a.tooltip:0 "이제 정보국을 통해 §Y탐험대§!를 파견하여 아이온디아를 도표화할 수 있습니다. 이 탐험대는 가치있는 $aeternum_tech_intel$의 생산으로 이어질 것입니다."
 giga_aeternum.3010.mapping:0 "아이온디아의 [ROOT.aiondia_explored_perc]%를 도표화했습니다"
 aeternum_mapping_tooltip:0 "아이온디아의 표면은 광활합니다. 그러므로, 우리는 §Y탐험대§!를 보내 버치 월드의 거대한 바깥 껍질을 세밀히 나타낼 수 있습니다. 이는 $aeternum_tech_intel$의 생산으로 이어지며, 예기치 못한 발견이 있을 수도 있습니다."
 giga_aeternum.4321.name:0 "아이온디아 탐사"
 giga_aeternum.4321.desc:0 "우리는 §Y아이온디아§!의 표면을 도표화하기 위해 §Y탐사대§!를 보낼 수 있습니다. 탐사대를 유지하는데에는 매월 £alloys£과 £energy£ 비용이 들며 종료될 때까지 취소할 수 없습니다.\n\n탐험대는 탐험을 완수할 때마다 일정량의 $aeternum_tech_intel$ 및 £minor_artifacts£을 가지고 돌아올 것이며 탐험 동안의 추가적인 발견을 보고할 것입니다.\n\n탐험대가 이러한 발견을 하는 동안 어떻게 탐사를 수행하는지는 탐사대의 §R전투력§!, §H온전성§!, 그리고 §B탐사 능력§!에 달려있습니다.\n\n이 탐험대는 그냥 거대한 작업이며, 각각의 탐험은 가능한 한 많은 땅을 다루기 위해서 수백만의 인력과 차량을 사용합니다. 그렇기 때문에, 유지비는 상당히 높을 수밖에 없습니다.\n\n§Y현재 다음을 가지고 왔습니다:\n§G[ROOT.aeternum_intel_exp_found]§! $aeternum_tech_intel$\n§G[ROOT.aeternum_art_exp_found]§! £minor_artifacts£\n§G[ROOT.aeternum_unique_exp_found]§! §R특이한 발견§!"
 aeternum_intel_exp_found_some:0 "[ROOT.aet_expedition_total_intel_count]"
 aeternum_intel_art_found_some:0 "[ROOT.aet_expedition_total_artifact_count]"
 aeternum_intel_unique_found_some:0 "[ROOT.aet_expedition_total_discovery_count]"
 giga_aeternum.4321.big:0 "§Y거대한§! 탐험대를 보내라 | 표면의 §Y15%§!를 탐사할 것입니다"
 giga_aeternum.4321.big.tooltip:0 "§Y거대한§! 탐험대의 비용은 £energy£ §Y100000§! 및 £alloys£ §Y40000§!이며 매월 유지비는 £energy£ §Y1500§! 및 £alloys£ §Y700§!입니다\n\n§Y5 년§!간 이어집니다\n\n§G4§!와 §G6§! 사이의 $aeternum_tech_intel$ 및 §Y100§!과 §Y200§! 사이의 £minor_artifacts£을 가지고 돌아올 것입니다.\n\n"
 giga_aeternum.4321.med:0 "§Y보통의§! 탐험대를 보내라 | 표면의 §Y10%§!를 탐사할 것입니다"
 giga_aeternum.4321.med.tooltip:0 "§Y보통의§! 탐험대의 비용은 £energy£ §Y75000§! 및 £alloys£ §Y30000§!이며 매월 유지비는 £energy£ §Y1000§! 및 £alloys£ §Y600§!입니다\n\n§Y4 년§!간 이어집니다\n\n§G3§!와 §G5§! 사이의 $aeternum_tech_intel$ 및 §Y50§!과 §Y150§! 사이의 £minor_artifacts£을 가지고 돌아올 것입니다.\n\n"
 giga_aeternum.4321.small:0 "§Y작은§! 탐험대를 보내라 | 표면의 §Y5%§!를 탐사할 것입니다"
 giga_aeternum.4321.small.tooltip:0 "§Y작은§! 탐험대의 비용은 £energy£ §Y60000§! 및 £alloys£ §Y20000§!이며 매월 유지비는 £energy£ §Y750§! 및 £alloys£ §Y500§!입니다\n\n§Y3 년§!간 이어집니다\n\n§G2§!와 §G3§! 사이의 $aeternum_tech_intel$ 및 §Y25§!과 §Y50§! 사이의 £minor_artifacts£을 가지고 돌아올 것입니다.\n\n"
 giga_aeternum.3010.expedition:0 "§Y탐험대§! 관리"
 giga_contact_aeternum_exp_tooltip:0 "§H§Y아이온디아 탐험대§!를 관리하십시오...§!"
 giga_aeternum.4321.tracktime:0 "현재 탐사가 진행중입니다! [ROOT.aet_exp_return_time] 개월 후에 완료될 것입니다."
 giga_aeternum.4321.bye:0 "나가기."
 giga_aeternum.4322.name:0 "§Y탐험대§! 파견"
 giga_aeternum.4322.desc:0 "우리는 아이온디아의 광활한 표면을 조사하기 위해 §Y[aet_exp_name_tool.GetName] 탐험대§!를 보내려 합니다.\n\n그러나, 그러한 탐험대는 위험한 작업입니다. 우리는 탐험대 팀에게 §Y[ROOT.aet_init_attach_capacity]§! §B부여§!를 할 수 있고, 이는 다양한 보너스를 주며 특정 상활에서 도움이 될 수도 있습니다. 탐험대는 여러 상황에서 그 효과를 미칠 몇 가지 능력치이 있습니다.\n\n§H온전성§!은 팀의 전반적인 상태를 나타냅니다. 이는 매월 §Y§!씩 떨어질 것이며, §Y0§!이 되면 탐험대가 조기 중지될 것입니다.\n\n§R전투력§!은 아이온디아를 탐험하는 도중 마주칠 수 있는 위험한 구조물이나 개체들과 전투하는 능력을 나타냅니다.\n\n§B탐사 능력§!은 불가사의한 기기를 해독하거나 고대 기술을 역설계할 때 팀의 능률을 측정합니다.\n\n옵션 메뉴를 사용해 이러한 능력치를 개선할 수 있습니다. 탐사 도중, 팀은 흥미로운 발견에 대해 보고할 것이고 앞서 말한 발견의 결과물은 탐험대의 능력치에 따라 달라집니다. 신중하게 선택하세요, 나중에는 제거될 수 없습니다!\n\n§B우리 탐험대는 현재:§!\n§Y[ROOT.aet_exp_hp]§! §H온전성§!\n§Y[ROOT.aet_exp_attack]§! §R전투력§!\n§Y[ROOT.aet_exp_smarts]§! §B탐사 능력§!\n§Y[ROOT.aet_exp_decay_monthly]%§! §L월간 온전성 감소 확률§!"
 giga_aeternum.4322.panzer:0 "§R기갑 전투 중대§! 추가 - £alloys£ §Y10000§! | 현재 §Y[aet_exp_sender.aeternum_panzer_count]§!"
 giga_aeternum.4322.panzer.tooltip:0 "수백만 대의 장갑차가 먼 길을 떠납니다. 이 전쟁 기계는 우리의 팀이 버치 월드를 탐험하는 동안 직면하게 될 어떤 일이든 처리할 수 있게 해줄 것입니다.\n\n§H온전성§! §Y+10§!\n§R전투력§! §Y+30§!\n§B탐사 능력§! §Y-20§!\n\n"
 giga_aeternum.4322.smart:0 "§B과학자 단체§! 추가 - £alloys£ §Y7500§! | 현재 §Y[aet_exp_sender.aeternum_smarties_count]§!"
 giga_aeternum.4322.smart.tooltip:0 "열심인 엘리트 고고학자와 연구자 팀과 함께 탐험을 떠납니다. 그들은 아이온디아 탐험 도중 발견할 모든 것의 분석과 역설계를 담당합니다.\n\n§H온전성§! §Y-10§!\n§R전투력§! §Y-10§!\n§B탐사 능력§! §Y+30§!\n\n"
 giga_aeternum.4322.engineer:0 "§H유지보수 공학자§! 추가 - £alloys£ §Y6000§! | 현재 §Y[aet_exp_sender.aeternum_engineer_count]§!"
 giga_aeternum.4322.engineer.tooltip:0 "이 공학자들은 탐험대 팀이 미지의 공간으로 더 깊숙히 들어갈 때 사용되는 장비를 보수하고 수리하는 임무를 맡을 것입니다.\n\n§H온전성§! §Y+10§!\n§R전투력§! §Y-20§!\n§B탐사 능력§! §Y+10§!\n§L월간 온전성 감소 확률§! §Y-20%§!\n\n"
 giga_aeternum.4322.a:0 "§Y탐험§! 진행"
 giga_aeternum.4400.name:0 "§G아이온디아 탐험대 복귀!§!"
 giga_aeternum.4400.desc:0 "현재 §Y아이온디아§!를 탐사하기 위한 탐험대가 복귀했습니다.\n\n그들이 발견한것들 뿐만 아니라, $aeternum_tech_intel$ §G[ROOT.aet_exp_intel_acquired]§! 뿐만 아니라 £minor_artifacts£도 조금 가지고 돌아왔습니다. 이 탐사대는 버치 월드의 §Y[ROOT.aet_explored_perc]%§!를 탐사했으며, 총 탐사율은 §Y[ROOT.aiondia_explored_perc]%§!입니다.\n\n원한다면 또다른 탐험대를 파견할 수 있습니다.\n\n§B탐사대가 가지고 돌아온 것:\n$aet_display_exp_stats$"
 giga_aeternum.4400.a:0 "정말 잘했다!"
 giga_aeternum.4400.a.tooltip:0 "우리는 $aeternum_tech_intel$를 §G[ROOT.aet_exp_intel_acquired]§! 만큼 얻습니다.\n§Y아이온디아§!는 이제 §Y[ROOT.aiondia_explored_perc]%§! 탐험됐습니다."
 giga_aeternum.4401.name:0 "§R아이온디아 탐험대 중지§!"
 giga_aeternum.4401.desc:0 "아이온디아 탐험대가 너무 많은 피해를 입었으며, 그들의 §H온전성§!이 불행히도 §Y0§! 이하로 감소했기 때문에 계획보다 이르게 긴급 귀환을 해야 했습니다.\n\n그들은 $aeternum_tech_intel$ §G[ROOT.aet_exp_intel_acquired]§!만을 가지고 돌아왔으며 귀환하기 전에 버치 월드의 §Y[ROOT.aet_explored_perc]%§!를 탐사하였습니다.\n\n그래도, 이 탐험으로 인해 총 탐사율은 §Y[ROOT.aiondia_explored_perc]%§!가 됐습니다\n\n원한다면 또다른 탐험대를 파견할 수 있습니다."
 giga_aeternum.4401.a:0 "유감이군."
 giga_aeternum.4401.a.tooltip:0 "우리는 $aeternum_tech_intel$를 §G[ROOT.aet_exp_intel_acquired]§! 만큼 얻습니다.\n§Y아이온디아§!는 이제 §Y[ROOT.aiondia_explored_perc]%§! 탐험됐습니다."
 giga_aeternum.3010.stats:0 "온전성: [ROOT.aet_exp_hp] | 전투력: [ROOT.aet_exp_attack] | 탐사 능력: [ROOT.aet_exp_smarts] | MDC: [ROOT.aet_exp_decay_monthly]%"
 aeternum_stats_tooltip:0 "§H온전성§!은 팀의 전반적인 상태를 나타냅니다. 이는 매월 §Y§!씩 떨어질 것이며, §Y0§!이 되면 탐험대가 조기 중지될 것입니다.\n\n§R전투력§!은 아이온디아를 탐험하는 도중 마주칠 수 있는 위험한 구조물이나 개체들과 전투하는 능력을 나타냅니다.\n\n§B탐사 능력§!은 불가사의한 기기를 해독하거나 고대 기술을 역설계할 때 팀의 능률을 측정합니다.\n\n§LMDC§!는 §L월간 쇠퇴 확률§!을 의미하며, 매월 탐험대의 §H온전성§!이 §Y1§!씩 줄어들 확률을 의미합니다."
 giga_aeternum.4323.name:0 "§Y[aet_exp_name_tool.GetName] 탐험대§! 출발!"
 giga_aeternum.4323.desc:0 "우리의 탐험대가 §Y아이온디아§!의 거주 가능 구역을 벗어났고 이제 버치 월드 표면의 광대한 미탐자 조각으로 이동하고 있습니다. 그들은 §Y[ROOT.aet_exp_return_time] 개월§! 뒤 $aeternum_tech_intel$ 및 £minor_artifacts£을 가지고 돌아올 것입니다.\n\n탐험대는 탐사 도중 특이한 발견을 하면 보고할 것이며 그 결과는 팀의 능력치에 의해 결정될 것입니다.\n\n§B현재 탐험대는:\n$aet_display_exp_stats$"
 giga_aeternum.4323.a:0 "그들에게 행운이 있기를!"
 giga_aeternum.4323.a.tooltip:0 "정보국을 통해 탐험대를 감독할 수 있습니다."
 aet_display_exp_stats:0 "§H온전성§! §Y[ROOT.aet_exp_hp]§!\n§R전투력§! §Y[ROOT.aet_exp_attack]§!\n§B탐사 능력§! §Y[ROOT.aet_exp_smarts]§!\n§L월간 온전성 쇠퇴 확률§! §Y[ROOT.aet_exp_decay_monthly]%§!"
