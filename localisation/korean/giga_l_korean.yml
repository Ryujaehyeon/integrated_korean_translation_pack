 REACTOR_ASTEROID_DESC:0 "소행성의 지각 깊숙이 자리 잡은 진보된 구조의 거대한 반응로는 구조물의 수많은 무기에 충분한 에너지를 제공합니다."
 asteroid_artillery_0:0 "$gc_kilo$소행성 포대 뼈대"
 asteroid_artillery_0_DESC:0 "소행성을 둘러싸고 있는 이 뼈대는 소행성 포대 건설의 다음 단계를 위한 준비입니다."
 asteroid_artillery_0_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_kilostructure$ - $giga_list_category_defensive$\n§Y소행성§!을 §Y고정형 방어 플랫폼§!으로 바꿉니다\n§L소행성에 박혀있는 강력한 고정형 방어 구조물로, 적의 급습을 막아내는 용도입니다. 커져만가는 적의 함대력을 따라가기 위해 업그레이드할 수 있습니다.§!"
 asteroid_artillery_1:0 "소행성 포대"
 asteroid_artillery_1_DESC:0 "소행성 포대는 거대한 무기 플랫폼으로, 플랫폼을 유지하기 위해 채굴되는 작은 돌덩이에 장착되어 있습니다. 이는 작은 추가 포탑으로 보조되는 중추 무기로 구성되어 있으며, 중형 크기의 적을 물리치도록 만들어졌습니다."
 asteroid_artillery_1_fake:0 "$asteroid_artillery_1$"
 asteroid_artillery_1_fake_DESC:0 "$asteroid_artillery_1_DESC$"
 asteroid_artillery_ruined:0 "폐허가 된 소행성 포대"
 asteroid_artillery_ruined_DESC:0 "상당한 손상을 입었지만, 이 소행성 포대는 이론적으로 충분한 자원이 있다면 수리가 가능합니다."
 asteroid_artillery_repaired:0 "소행성 포대"
 asteroid_artillery_repaired_DESC:0 "소행성 포대는 거대한 무기 플랫폼으로, 플랫폼을 유지하기 위해 채굴되는 작은 돌덩이에 장착되어 있습니다. 이는 작은 추가 포탑으로 보조되는 중추 무기로 구성되어 있으며, 중형 크기의 적을 물리치도록 만들어졌습니다."
 giga_tech_asteroid_artillery:0 "미행성 방어 작전"
 giga_tech_asteroid_artillery_desc:0 "끊임없이 커지는 현대 전함의 크기는 항성 기지가 우리 영토를 방어하는 데 있어서 단순히 더 이상 좋지 않다는 의미이지만, 병참의 문제로 기존의 방어 플랫폼을 너무 크게 할 수는 없습니다. 그러나 거대한 소행성에 방어 시설을 장착함으로써, 우리는 구조물의 내부를 소행성 그 자체에 통합하고 필요할 때마다 자원을 소행성으로부터 채굴함으로써, 반동에 의한 문제 뿐만 아니라 유지보수 문제도 동시에 해결할 수 있습니다. 이는 결국 훨씬 더 거대하고 훨씬 더 강력한 방어 요새의 건설을 가능케 할 것입니다."
 allow_asteroid_artillery:0 "§H거대 구조물 잠금 해제:§! 소행성 포대\n§B이 분야에 대한 추가적인 연구는 대형 전함의 폭을 더욱 늘려줄 것입니다.§!"
 desc_asteroid_artillery:0 "소행성 포대는 소행성에 장착된 고정 방어 구조물로, 스스로 적의 침입을 무찌르도록 설계되었습니다."
 giga_mobile_planet_quest_chain:0 "§B이 분야에 대한 추가적인 연구는 대형 전함의 폭을 더욱 늘려줄 것입니다.§!"
 giga_artillery.1000.name:0 "소행성 포대 관리"
 giga_artillery.1000.desc:0 "§Y[asteroid_artillery_location.GetName]§! 주위에 건설된 소행성 포대는 끝없이 강력해지는 우주 함대를 막아내기 위해 업그레이드될 수 있습니다.\n\n§B선체 강화:§! 선체 및 장갑 내구도 레벨 당 30% 증가\n§Y현재 레벨:§! [asteroid_artillery_location.asteroid_artillery_hp] | +[asteroid_artillery_location.asteroid_artillery_hp_perc]%\n\n§R폭발력 강화:§! 무기 피해량 레벨 당 20% 증가\n§Y현재 레벨:§! [asteroid_artillery_location.asteroid_artillery_dmg] | +[asteroid_artillery_location.asteroid_artillery_dmg_perc]%\n\n§G순간 냉각제:§! 공격 속도 레벨 당 20% 증가\n§Y현재 레벨:§! [asteroid_artillery_location.asteroid_artillery_atkspeed] | +[asteroid_artillery_location.asteroid_artillery_atkspeed_perc]%\n\n§H센서 보정:§! 무기 사거리 레벨 당 25% 증가\n§Y현재 레벨:§! [asteroid_artillery_location.asteroid_artillery_range] | +[asteroid_artillery_location.asteroid_artillery_range_perc]%\n\n§E정밀 타격:§! 추적 능력 레벨 당 30% 증가\n§Y현재 레벨:§! [asteroid_artillery_location.asteroid_artillery_tracking] | +[asteroid_artillery_location.asteroid_artillery_tracking_perc]%\n\n§M재생성 선체:§! 매일 선체/장갑 재생량 레벨 당 1.5% 증가\n§Y현재 레벨:§! [asteroid_artillery_location.asteroid_artillery_pen] | +[asteroid_artillery_location.asteroid_artillery_pen_perc]%\n\n§P남은 업그레이드 포인트:§! [asteroid_artillery_location.asteroid_artillery_points_current]"
 giga_artillery.1000.b:0 "§Y1§! §P업그레이드 포인트§! 지불 §B선체 보강§! | §Y[asteroid_artillery_location.asteroid_artillery_hp_cost]§! £alloys£"
 giga_artillery.1000.c:0 "§Y1§! §P업그레이드 포인트§! 지불 §R개선된 부담금§! | §Y[asteroid_artillery_location.asteroid_artillery_dmg_cost]§! £alloys£"
 giga_artillery.1000.d:0 "§Y1§! §P업그레이드 포인트§! 지불 §G순간 냉각수§! | §Y[asteroid_artillery_location.asteroid_artillery_atkspeed_cost]§! £alloys£"
 giga_artillery.1000.e:0 "§Y1§! §P업그레이드 포인트§! 지불 §H보정된 감지기§! | §Y[asteroid_artillery_location.asteroid_artillery_range_cost]§! £alloys£"
 giga_artillery.1000.f:0 "§Y1§! §P업그레이드 포인트§! 지불 §M재생 선체§! | §Y[asteroid_artillery_location.asteroid_artillery_pen_cost]§! £alloys£"
 giga_artillery.1000.g:0 "§Y1§! §P업그레이드 포인트§! 지불 §E정밀 표적§! | §Y[asteroid_artillery_location.asteroid_artillery_tracking_cost]§! £alloys£"
 giga_artillery.1000.a:0 "나가기."
 giga_tech_asteroid_artillery_pen_shots:0 "소행성 포대 재생 장갑"
 giga_tech_asteroid_artillery_pen_shots_desc:0 "소행성 포대 내에 나노봇과 자가 수리 구조물의 개선된 대규모 통합은 이전보다 더 빠르고 더 효율적으로 스스로를 수리할 수 있음을 의미합니다."
 allow_asteroid_artillery_pen:0 "§H소행성 포대 업그레이드 잠금 해제:§! 선체 보강"
 allow_asteroid_artillery_pen_desc:0 "The 선체 보강 upgrade enables Asteroid Artilleries to passively repair themselves faster."
 not_enough_artillery_points:0 "이 소행성 포대는 충분한 업그레이드 포인트가 남아있지 않습니다."
 giga_tech_asteroid_artillery_damage_upgrade:0 "재창조된 소행성 무기"
 giga_tech_asteroid_artillery_damage_upgrade_desc:0 "전쟁 위성과 더 강력한 미행성 병기의 도래로, 소행성 포대가 끝없이 증가하는 전함의 발전에 따라갈 수 있게 하는 것이 중요해졌습니다. 고차원 공학이나 특이점 반응로와 같은 새로이 싹트는 여러 기술들을 통합하면 소행성 포대가 은하적 전쟁에서 경쟁력이 있는 자산으로 남게 될 것입니다."
 allow_asteroid_artillery_dmg_upgrade:0 "소행성 포대 무기 피해량: §G+35%§!\n소행성 포대 무기 범위: §G+20%§!\n소행성 포대 업그레이드 포인트: §G+3§!"
 giga_not_enough_alloys:0 "충분한 합금이 없다."
 giga_tech_asteroid_artillery_health_upgrade:0 "향상된 소행성 보호막 생성기"
 giga_tech_asteroid_artillery_health_upgrade_desc:0 "소행성 포대의 생존성을 강화하는 것은 중요하며, 따라서 보호막 생성기를 향상시키는 것은 더 많은 손상을 버틸 수 있게 해줄 것입니다."
 allow_asteroid_artillery_hp_upgrade:0 "소행성 포대 보호막 내구도: §G+25%§!\n소행성 포대 보호막 회복: §G+2%§!\n소행성 포대 업그레이드 포인트: §G+2§!"
 giga_artillery.1004.name:0 "소행성 포대 뼈대 건설 현장"
 giga_artillery.1004.desc:0 "§Y[giga_system.GetName]§! 성계에서 미래의 소행성 포대를 위한 뼈대가 완성되었습니다. 이 작은 구조물은 소행성를 감싸고 있으며, 소행성의 물질을 채굴하고 그 내부에 거대한 반응로를 설치할 채굴 시설이 있습니다.\n\n또한 곧 설치될 병기의 주포를 보조할 다양한 추가 무기 포대를 지탱할 것입니다. 소행성 포대의 유지비는 £energy£ §Y100§! 및 £alloys£ §Y25§!입니다.\n\n§Y꼭 함선 설계에서 $name_asteroid_artillery$를 설계하세요!§!"
 giga_artillery.1004.a:0 "좋아."
 giga_artillery.1005.name:0 "소행성 포대 완공!"
 giga_artillery.1005.desc:0 "소행성 포대가 §Y[giga_system.GetName]§! 성계에서 완전히 건설되었습니다. 특히나 거대한 소행성에 박혀있는 이 고정 요새에는 그 뼈대에 설치된 무기로 보조되는 거대한 중추 화포가 있습니다.\n\n§Y소행성 포대는 거대 구조물의 UI에 있는 \"업그레이드 관리\" 버튼을 눌러 업그레이드될 수 있습니다. 파괴된다면, 후에 재건될 수 있고 이전에 진행된 모든 업그레이드는 유지됩니다.§!"
 giga_artillery.1005.a:0 "좋았어!"
 asteroid_artillery_config:0 "업그레이드 관리"
 asteroid_artillery_config_DESC:0 "이 소행성 포대를 업그레이드합니다."
 giga_artillery.1002.name:0 "소행성 포대 파괴됨!"
 giga_artillery.1002.desc:0 "우리의 소행성 포대 중 §Y[ast_artillery_destroyed_system.GetName]§! 성계의 포대가 §Y[From.GetName]§!의 극심한 공격에 의해 파괴되었습니다.\n\n방위 구조물이 소행성 주위의 거대한 잔해가 되었으며, 이를 다시 차지할 수 있다면 추후 다시 복구할 수 있을 것입니다. 수리하면 모든 업그레이드 또한 복구됩니다.\n\n우리가 소행성 포대의 잔해를 소유하고 있지 않지만 우리의 영토 내에 존재한다면, 성계의 항성에서 §Y천체 함선 강탈§! 결정을 사용하여 우리의 것으로 만들 수 있습니다."
 giga_artillery.1002.a:0 "제기랄!"
 giga_tech_asteroid_artillery_planetcraft_upgrade:0 "현대화된 소행성 무기"
 giga_tech_asteroid_artillery_planetcraft_upgrade_desc:0 "베히모스 요새 행성은 그 어느 때보다 함선 설계와 정신력의 한계를 뛰어넘었습니다. 우리의 소행성 포대가 행성 전쟁의 시대에 강력한 방어 자산으로 남아 있으려면 적응해야 합니다."
 allow_asteroid_artillery_planetcraft_upgrade:0 "소행성 포대 선체/장갑 내구도: §G+40%§!\n소행성 포대 발사 속도: §G+40%§!\n소행성 포대 업그레이드 포인트: §G+3§!"
 giga_tech_repeatable_asteroid_artillery_upgrade:0 "최신식 포대 설계"
 giga_tech_repeatable_asteroid_artillery_upgrade_desc:0 "우리의 소행성 포대 설계를 더욱 향상해서 업그레이드 가능 횟수를 늘릴 수 있습니다."
 adds_one_ast_art_point:0 "소행성 포대 업그레이드 포인트 §G+1§!"
 name_asteroid_artillery:0 "소행성 포대"
 giga_tech_repeatable_asteroid_artillery_cap:0 "소행성 포대 관리 프로토콜"
 giga_tech_repeatable_asteroid_artillery_cap_desc:0 "우리 제국에 추가적인 §Y소행성 포대§!를 건설하고 관리할 수 있게 해주는 고급 건설 기술 및 유지관리 프로토콜."
 giga_asteroid_artillery_capacity_increase_title:0 "§Y소행성 포대§! 수용량: §G+1§!"
 giga_asteroid_artillery_capacity_increase_desc:0 "제국의 §Y소행성 포대§! 수용량이 §G+1§! 증가합니다."
 giga_artillery.1003.name:0 "소행성 포대 수리됨!"
 giga_artillery.1003.desc:0 "우리는 성공적으로 §Y[giga_system.GetName]§! 성계의 소행성 포대를 수리하였습니다. 구조물은 정상 작동 상태로 복구되었고, 이제 우리의 영토를 보호할 준비가 되었습니다.\n\n이전에 적용되었던 모든 업그레이드도 유지될 것입니다."
 giga_artillery.1003.a:0 "놀랍군!"
 dormant_aeternum_governor:0 "감독관"
 pc_giga_asteroid_artillery:0 "소행성 포병"
 pc_giga_asteroid_artillery_desc:0 "이 소행성은 방어 무기로 개조되었습니다."
 adds_4_asteroid_artillery_points:0 "소행성 포대 업그레이드 포인트: §G+4§!\n타격 초계함 내구도: §G+80%§!\n타격 초계함 무기 피해량: §G+80%§!\n타격 초계함 수용량: §G+100%§!"
 PERDITION_BEAM_ARTILLERY:0 "$PERDITION_BEAM_TITAN$"
 PERDITION_BEAM_ARTILLERY_DESC:0 "$PERDITION_BEAM_TITAN_DESC$"
 ARCHAEO_ARTILLERY:0 "$ARCHAEO_TITAN$"
 ARCHAEO_ARTILLERY_DESC:0 "$ARCHAEO_DESC$"
 giga_mega.600.name:0 "궤도 아콜로시 건설"
 giga_mega.600.desc:0 "충분한 합금이 있다면 §Y[orbital_arcology_planet.GetName]§! 주위에 궤도 아콜로지를 완성할 수 있습니다. §Y[orbital_arcology_planet.GetName]§!의 크기로 보아, 프로젝트의 비용은 £alloys£ §Y[ROOT.orbital_arcology_alloy_cost]§!일 것으로 추정됩니다.\n\n아콜로지가 주는 혜택은 행성의 크기에 따라 커집니다.\n\n완공된다면, 이 아콜로지는 §Y[orbital_arcology_planet.GetName]§!에 유지할 수 있다면, 추가적인 §Y[orbital_arcology_planet.orbital_arcology_modifier]§! §H발전 지구§!와 §G농업 지구§!를 제공하며, §Y[orbital_arcology_planet.orbital_arcology_modifier_districts]§! §B지구 개수§!도 제공합니다.\n\n거대 구조물의 건설 시간은 행성의 크기와 상관 없이 §Y900§!일로 계산되며, 유지비는 £energy£ §Y15§! 및 £alloys£ §Y5§!입니다."
 giga_mega.600.a:0 "진행하지. | £alloys£ §Y[ROOT.orbital_arcology_alloy_cost]§!"
 giga_mega.600.b:0 "다시 생각해 보니, 지금은 아니다."
 orbital_arcology_0_site:0 "$name_orbital_arcology$ 건설 현장"
 orbital_arcology_0_site_DESC:0 "$name_orbital_arcology$를 위한 건설 현장으로 이 행성을 둘러싸는 축소형 링 월드입니다. 이 링 월드는 우리 산업을 위한 거대한 공간을 제공할 것입니다."
 orbital_arcology_0_upgrade:0 "궤도 아콜로지 건설"
 orbital_arcology_0_upgrade_DESC:0 "이 건설 플랫폼이 완전한 궤도 아콜로지로 업그레이드되고 있습니다."
 orbital_arcology_1:0 "$name_orbital_arcology$"
 orbital_arcology_1_DESC:0 "행성의 적도를 돌고 있는 축소형 링 월드같은 구조물이며, 거주자들에게 추가적인 지구 개수를 제공합니다."
 orbital_arcology_2:0 "강화된 $name_orbital_arcology$"
 orbital_arcology_2_DESC:0 "행성의 적도를 돌고 있는 두 개의 축소형 링 월드형 구조물이며, 거주자들에게 추가적인 지구 개수를 제공합니다."
 orbital_arcology_3:0 "최대화된 $name_orbital_arcology$"
 orbital_arcology_3_DESC:0 "행성의 적도를 돌고 있는 세 개의 축소형 링 월드형 구조물이며, 거주자들에게 추가적인 지구 개수를 제공합니다."
 giga_tech_tetradimensional_engineering:0 "4차원 공학"
 giga_tech_tetradimensional_engineering_desc:0 "구조물이 너무 커지고 또 너무 복잡해지면, 아무리 많은 지지대를 설치해도 스스로 붕괴하는 것을 막을 수 없습니다. 그러므로 이 무지막지한 거대 구조물을 안정화시키려면 고차원에 기반을 박는 건설법을 사용할 필요가 있습니다. 이는, 예를 들어 한정된 부피에 블랙홀로 붕괴시키지 않으면서 더 많은 물질을 넣을 능력과 상상도 못한 규모로 중력을 억제하는 것과 같은, 많은 혁신적인 기술로의 길을 열어줍니다. 또한 이는 압도적으로 강한 압력을 버틸 수 있는 물질의 제작을 가능케 합니다"
 giga_mega.500.name:0 "초거대건축 전통"
 giga_mega.500.desc:0 "최근 §Y4차원 공학§!에 대한 연구로 초거대 공학의 미래 은하계의 거장으로서의 우리의 위치가 확고해졌습니다.\n\n이리하여, 우리가 우주에 대한 완벽한 숙달로의 길로 더 깊게 가길 원한다면, 이를 위한 새로운 §Y초거대건축 전통§!이 해금되었습니다."
 giga_mega.500.a:0 "알겠다."
 giga_mega.500.a.tooltip:0 "새로운 §Y전통 트리§!가 가능합니다."
 mod_damage_vs_country_type_hke_country_mult:0 "신성 캇첸 제국에 대한 피해량"
 mod_shipsize_giga_planet_behemoth_tracking_mult:0 "베히모스 요새 행성 추적"
 mod_shipsize_giga_massive_planet_tracking_mult:0 "전쟁 위성 추적"
 tradition_gigaengineering:0 "초거대건축"
 tradition_gigaengineering_desc:0 "우리의 운명은 우리의 가장 거대한 야망을 실현하는 데 있습니다. 다른 방법은 있을 수 없습니다."
 tr_gigaengineering_adopt:0 "초거대건축 전통"
 tr_gigaengineering_finish:0 "초거대건축 전통 완료"
 tr_gigaengineering_grand_ambitions:0 "행정 간소화"
 tr_gigaengineering_grand_ambitions_delayed:0 "우리는 행정상의 부담이 우리의 정당한 야망을 방해하도록 내버려둘 수는 없습니다. 우리의 프로젝트가 불필요한 지연을 겪지 않도록 관료체제를 간소화해야 합니다."
 tr_gigaengineering_mega_monuments:0 "웅장한 건축물"
 tr_gigaengineering_mega_monuments_delayed:0 "거대 구조물은 우주 자체에 대한 우리의 절대적인 지배의 표시이며, 앞으로도 영겁의 시간 동안 그렇게 여겨질 것입니다."
 tr_gigaengineering_power_cores:0 "초거대구조 동력 코어"
 tr_gigaengineering_power_cores_delayed:0 "대규모 건설에는엄청난 동력원이 필요 합니다. 대규모 발전 및 전송 분야에 대한 추가적인 투자를 통해 귀중한 에너지를 최대한 효율적으로 다룰 수 있습니다."
 tr_gigaengineering_super_planets:0 "우월한 천체"
 tr_gigaengineering_super_planets_delayed:0 "천체 전함은 전쟁의 미래이며 은하 전장에서 계속해서 우위를 점할 수 있도록 가능한 모든 면에서 지속적으로 향상되어야 합니다."
 tr_gigaengineering_anticrisis:0 "궁극의 성채"
 tr_gigaengineering_anticrisis_delayed:0 "우리의 적은 많지만, 대등한 적수는 없습니다. 위대한 공학적 업적 덕분에 우리는 주권에 대한 어떠한 위협도 물리칠 수 있을 것입니다."
 mod_megastructures_influence_cost_mult:0 "메가구조물 영향 비용"
 mod_megastructures_influence_upkeep_mult:0 "거대 구조물 영향력 유지비"
 mod_megastructures_unity_cost_mult:0 "메가구조물 통합 비용"
 mod_megastructures_unity_upkeep_mult:0 "메가구조물 통합 유지비"
 mod_megastructure_unity_produces_mult:0 "거대 구조물 통합력 생산량"
 mod_megastructure_unity_produce_mult:0 "거대 구조물 통합력 생산량"
 mod_megastructures_unity_produces_mult:0 "메가구조물 통합 출력"
 mod_megastructures_unity_produce_mult:0 "거대 구조물 통합력 생산량"
 mod_megastructures_energy_upkeep_mult:0 "초거대 구조물 에너지 유지비"
 mod_shipsize_mining_station_build_speed_mult:0 "채굴 기지 건설 속도"
 mod_stations_minerals_produces_mult:0 "채굴 기지 광물 생산량"
 mod_megastructures_minor_artifacts_cost_mult:0 "거대 구조물 $minor_artifacts$ 비용"
 tradition_macroengineering:0 "거대공학"
 tradition_macroengineering_desc:0 "감히 크게 생각하는 자는 스스로 하늘의 주인이 될 운명입니다."
 tr_macroengineering_adopt:0 "거대공학 전통"
 tr_macroengineering_finish:0 "거대공학 전통 완료"
 giga_macroengineering_alloy:0 "$tr_macroengineering_space_rails$ 전통"
 giga_macroengineering_alloy_tt:0 "£alloys£ $alloys$당 $pop_group_unit$ $job_foundry_plural_with_icon$당 ['concept_mining_station']의 지역 태양계에서: §G+0.025§!"
 tr_macroengineering_skyhooks:0 "스카이 훅"
 tr_macroengineering_skyhooks_delayed:0 "훨씬 더 간단한 해결책이 존재하는데 어째서 복잡한 해결책을 사용합니까? 스카이 훅은 전적으로 운동에너지의 전달을 기반으로 하는, 첨단 기술의 필요 없이 서로 다른 천체 간에 탑재물을 운반하는 비교적 저렴한 구형 기술입니다. 이는 더 영구적인 기반시설이 구축되기 전에 새로 만들어진 식민지의 개발을 지속시키는데 사용될 수 있습니다."
 tr_macroengineering_space_rails:0 "전자기 레일"
 tr_macroengineering_space_rails_delayed:0 "전자기 레일, 또는 매스 드라이버는 작동하는 데 에너지만 소모하면서 작은 행성 표면에서 물질을 안정적으로 운반하는 데 사용될 수 있습니다. 이 장치들은 값비싼 지상 대 우주 운송수단에 의존하지 않고도 행성간 운송을 용이하게 할 수 있는 잠재력을 가지고 있습니다."
 tr_macroengineering_planetary_reshaping:0 "지질 물류"
 tr_macroengineering_planetary_reshaping_delayed:0 "전자기 레일과 스카이 훅의 조합은 자원이 짧은 시간 내에 목표 행성으로 행성 물질을 신속하게 수송할 수 있게 함으로써 테라포밍의 초기 단계를 획기적으로 앞당길 수 있습니다."
 tr_macroengineering_zero_g_construction:0 "적응형 궤도 건설 체계"
 tr_macroengineering_zero_g_construction_delayed:0 "무중력 공학의 복잡함에 익숙해지는 것은 큰 성과를 내는 지루한 과정입니다. 우리의 궤도 공학 체계는 가능한 한 효율적이어야 합니다. 모든 행성과 모든 중력은 다르며 그것들 하나하나를 설명해야 합니다."
 tr_macroengineering_waste_protocols:0 "폐기물 관리 규약"
 tr_macroengineering_waste_protocols_delayed:0 "무언가가 \"폐기물\"로 지정되었다고 해서, 특히 대형 궤도 구조물의 경우 그것이 버려져야 한다는 의미는 아닙니다. 비록 모든 것이 명백하지는 않더라도 폐열에서부터 생물학적 부산물에 이르기까지 모든 것이 재활용되고 유용한 것으로 정제될 수 있습니다. 폐기물을 처리할 수 있는 자급자족 시스템을 설계하는 것은 우주에 대한 우리의 지배력을 확립하는 중요한 단계입니다."
 LASER_BLOKKAT:0 "플랑크-붕괴 광선"
 LASER_BLOKKAT_DESC:0 "플랑크-붕괴 광선은 블록캣의 노천 채굴 장치에 기반을 둔 기계입니다. 이 기계는 적 함선의 모든 구조를 플랑크 수준 아래까지 체계적으로 해체할 뿐만 아니라, 이를 초응축 양자 거품 슬러리로 만들어버립니다. 게다가 앞서 말한 거품을 모아 블록캣 함선에 저장하여, 후에 사용 가능한 물질로 재처리할 수 있습니다."
 BLACKHOLE_BLOKKAT:0 "4차원 특이점 화포"
 BLACKHOLE_BLOKKAT_DESC:0 "이 첨단 발사대는 추격 4차원 특이점을 적 함선으로 날려보냅니다. 이 특이점들은 블록캣 함선에서 분리된것으로 보이지만, 이는 사실 \"올가미\"에 더 가까운 것으로, 이것은 더 고차원을 통해 블록캣 함선에 연결되어있고 후에 적 함선을 헤집어 뚫어버린 뒤 앞서말한 함선으로 이 고차원을 통해 \"되감아져\" 돌아옵니다. 이로써 블록캣은 특이점이 파괴한 모든 것을 모아 나중에 활용하기 위해 처리할 수 있습니다."
 PLASMA_BLOKKAT:0 "완전 소각 블라스터"
 PLASMA_BLOKKAT_DESC:0 "완전 소각 블라스터는 플랑크 온도까지 가열된 플라스마 덩어리를 발사하며, 그 온도는 알려진 물리학 모델 내에서 가능한 거의 최고온도입니다. 플라스마는  고차원을 통한 끝없는 에너지 유입에 의해 이러한 극한 온도를 유지하며, 플라스마가 접촉하는 물질은 알서 말한 차원으로 \"흡수\"되어 블록캣이 성계를 수확하는 방식과 유사한 방법을 통해 에너지로 변환합니다. 그리고 이 에너지가 다시 플라스마로 흘러 들어가 발사체의 온도를 계속 유지합니다."
 ARC_EMITTER_BLOKKAT:0 "5차원 집중 방출기"
 ARC_EMITTER_BLOKKAT_DESC:0 "5차원 집중 방출기는 블록캣이 설계한 거대한 관통형 무기이며, 고차원을 통해 \"도약\"함으로써 적 함선의 보호막과 장갑을 무시할 수 있습니다."
 STRIKE_CRAFT_HANGAR_BLOKKAT:0 "블록-군집 개체"
 STRIKE_CRAFT_HANGAR_BLOKKAT_DESC:0 "우주를 돌아다니는 이 개체들은 실제 블록캣을 매우 닮았으며 우주선 전투를 위해 설계되었습니다. 그들은 대부분의 경우 모선 안에 있는 블록캣에 의해 원격 조종되며 심지어는 블록캣 그 자체일 때도 있습니다."
 POINT_DEFENCE_BLOKKAT:0 "블록-수호자"
 POINT_DEFENCE_BLOKKAT_DESC:0 "이 초고효율 국지 방어 시스템은 적 발사체 주위의 현실 구조 그 자체를 분쇄하여, 발사체가 블록캣 함선에 다가오기도 전에 폭파시켜버립니다."
 REACTOR_BLOKKAT:0 "블록캣 반응로"
 REACTOR_BLOKKAT_DESC:0 "블록캣 함선은 고차원으로부터 전송되는 막대한 에너지를 끌어내는 이 신비로운 장치로부터 동력을 공급받습니다."
 JUMP_DRIVE_BLOKKAT:0 "블록캣 위상변화 FTL 드라이브"
 JUMP_DRIVE_BLOKKAT_DESC:0 "블록캣 추진기와 블록캣 FTL 드라이브간의 효율 차이는 없습니다. 둘 다 고차원을 통해 고정된 기기를 사용하며, 이는 함선 주위 공간을 정말 문자 그대로 \"끌어 당기며\" 즉각적인 가속으로 함선을 이동시킵니다."
 THRUSTER_BLOKKAT:0 "블록캣 위상변화 추진기"
 THRUSTER_BLOKKAT_DESC:0 "블록캣 추진기와 블록캣 FTL 드라이브간의 효율 차이는 없습니다. 둘 다 고차원을 통해 고정된 기기를 사용하며, 이는 함선 주위 공간을 정말 문자 그대로 \"끌어 당기며\" 즉각적인 가속으로 함선을 이동시킵니다."
 SENSOR_BLOKKAT:0 "초차원막 감지기"
 SENSOR_BLOKKAT_DESC:0 "이 블록캣 설계의 감지기는 우주의 고차원 다면체 내에서 3차원 물질이 만들어내는 파동을 찾습니다."
 ARMOR_BLOKKAT:0 "플랑크 합금 단조판"
 ARMOR_BLOKKAT_DESC:0 "극도로 튼튼한 이 장갑 단조판은 촘촘하게 배열된 플랑크 길이 규모의 입자들로 만들어졌습니다. 입자들은 복잡한 아원자 신경 구조를 형성하여, 그 물질이 거의 즉시 자동적으로 반응하여 변화하고 적응하도록 합니다."
 LARGE_ARMOR_BLOKKAT:0 "$ARMOR_BLOKKAT$"
 LARGE_ARMOR_BLOKKAT_DESC:0 "$ARMOR_BLOKKAT_DESC$"
 MEDIUM_ARMOR_BLOKKAT:0 "$ARMOR_BLOKKAT$"
 MEDIUM_ARMOR_BLOKKAT_DESC:0 "$ARMOR_BLOKKAT_DESC$"
 SMALL_ARMOR_BLOKKAT:0 "$ARMOR_BLOKKAT$"
 SMALL_ARMOR_BLOKKAT_DESC:0 "$ARMOR_BLOKKAT_DESC$"
 HULL_REPAIR_BLOKKAT:0 "서브플랑크 동기화기"
 HULL_REPAIR_BLOKKAT_DESC:0 "아주 작은 로봇 무리가 블록캣 장갑 내부에 포함된 신경망의 중계기 역할을 하여, 효율을 높이고 더 빠르게 수리되도록 합니다. 또한 블록캣은 향상된 동기화를 위해 블록워크와 쌍방향 데이터 전송을 합니다."
 AFTERBURNER_BLOKKAT:0 "다면체 추진기"
 AFTERBURNER_BLOKKAT_DESC:0 "그들의 난해한 FTL 추진기 이외에도, 블록캣 함선은 우주의 구조 그 자체를 밀어내는 이 추진기를 사용하며, 함선의 속도를 훨씬 더 빠르게 해줍니다."
 SHIELD_BLOKKAT:0 "초차원 이전 방벽"
 SHIELD_BLOKKAT_DESC:0 "블록캣-베스터의 거대한 보호막과 유사하게, 조금 더 작은 이 보호 방벽은 고차원 내에서 회전하며, 이는 완전한 보호막의 무한소 부분만이 적의 공격에 노출됨을 의미합니다. 손상을 받으면, 손상받은 부분이 즉시 초차원 공간으로 이전되어 회복됩니다."
 LARGE_SHIELD_BLOKKAT:0 "$SHIELD_BLOKKAT$"
 LARGE_SHIELD_BLOKKAT_DESC:0 "$SHIELD_BLOKKAT_DESC$"
 MEDIUM_SHIELD_BLOKKAT:0 "$SHIELD_BLOKKAT$"
 MEDIUM_SHIELD_BLOKKAT_DESC:0 "$SHIELD_BLOKKAT_DESC$"
 SMALL_SHIELD_BLOKKAT:0 "$SHIELD_BLOKKAT$"
 SMALL_SHIELD_BLOKKAT_DESC:0 "$SHIELD_BLOKKAT_DESC$"
 REACTOR_BOOSTER_BLOKKAT:0 "초차원 축전기"
 REACTOR_BOOSTER_BLOKKAT_DESC:0 "고차원 에너지원에서 추가적인 에너지를 끌어내는 반응로 부스터입니다. 전체적인 함선의 능률 또한 향상시킵니다."
 COMBAT_COMPUTER_ARTILLERY_BLOKKAT:0 "블록캣 근거리 컴퓨터"
 COMBAT_COMPUTER_ARTILLERY_BLOKKAT_DESC:0 "초차원 정보망을 통해 함선 전체에 연결되는 이 난해한 컴퓨터는 함선을 막는 것과 근접 교전에 초점이 맞추어져있습니다."
 COMBAT_COMPUTER_CARRIER_BLOKKAT:0 "블록캣 장거리 컴퓨터"
 COMBAT_COMPUTER_CARRIER_BLOKKAT_DESC:0 "초차원 정보망을 통해 함선 전체에 연결되는 이 난해한 컴퓨터는 장거리 교전에 초점이 맞추어져있습니다."
 PLANET_LANCE_BLOKKAT:0 "축출 광선"
 PLANET_LANCE_BLOKKAT_DESC:0 "축출 광선은 이제껏 교전했던 것 중 가장 거대한 블록캣 무기입니다. 이 광선의 막대한 힘은 현실을 산산이 찢어버리며, 몇 단계 더 높은 차원의 에너지를 시공 연속체의 국소적 공간에 집중하여 그 목표를 강제로 0차원 물체로 강제 압축시킴으로써 대상을 즉시 파괴합니다."
 OBLITERATOR_LANCE_BLOKKAT:0 "말살 광선"
 OBLITERATOR_LANCE_BLOKKAT_DESC:0 "본질적으로는 거대한 축출 광선인 말살 광선은 현실을 산산이 찢어버리며, 여러 고차원의 에너지를 시공간 연속체의 특정 지점에 집중시킴으로써 대상을 강제로 0차원 물체로 압축시켜 파괴합니다."
 PLANET_KILLER_BLOKKAT_GENERATOR:0 "초물질 해체기"
 PLANET_KILLER_BLOKKAT_GENERATOR_DESC:0 "이 장치는 모든 형태의 물질을 추가적인 블록캣처럼, 그들이 원하는 모든 것으로 빠르게 해체하고 재배열할 수 있습니다."
 PLANET_KILLER_BLOKKAT_GENERATOR_ACTION:0 "해체"
 FLEETORDER_DESTROY_PLANET_WITH_PLANET_KILLER_BLOKKAT_GENERATOR:0 "$PLANET|Y$ 해체 준비"
 MESSAGE_DESC_FOR_PLANET_KILLER_BLOKKAT_GENERATOR:0 "해체됨:"
 COMBAT_COMPUTER_TERMINATOR_BLOKKAT:0 "블록-종결자 중앙 지휘장치"
 COMBAT_COMPUTER_TERMINATOR_BLOKKAT_DESC:0 "블록캣이 사용하는 대부분의 추출 작전 용의 함선들과 달리, 블록-종결자는 순수히 함선 전투를 위해 설계된 제대로된 전쟁 함선입니다."
 SHIP_AURA_BLOKKAT_TERMINATOR:0 "블록-종결자 초차원 방벽"
 SHIP_AURA_BLOKKAT_TERMINATOR_DESC:0 "블록-종결자는 자신만의 초차원 보호막이 있으며, 이는 스스로와 주변의 다른 블록캣 함선이 받는 피해를 급격하게 감소시킵니다."
 COMBAT_COMPUTER_OBLITERATOR_BLOKKAT:0 "블록-말살자 중앙 지휘장치"
 COMBAT_COMPUTER_OBLITERATOR_BLOKKAT_DESC:0 "블록캣이 사용하는 대부분의 추출 작전 용의 함선들과 달리, 블록-말살자는 순수히 함선 전투를 위해 설계된 제대로된 전쟁 함선입니다."
 SHIP_AURA_BLOKKAT_OBLITERATOR:0 "블록-말살자 초차원 방벽"
 SHIP_AURA_BLOKKAT_OBLITERATOR_DESC:0 "블록-말살자는 자신만의 초차원 보호막이 있으며, 이는 스스로와 주변의 다른 블록캣 함선이 받는 피해를 급격하게 감소시킵니다."
 trait_blokkat_leader:0 "블록캣"
 trait_blokkat_leader_desc:0 "블록워크와의 연결을 통해, 이 블록캣은 많은 분야와 관련된 방대한 양의 정보를 제공합니다"
 trait_blokkat_admiral:0 "블록캣 제독"
 trait_blokkat_admiral_desc:0 "이 특이한 블록캣은 많은 은하간 전쟁에 참여한 결과, 우주 전쟁의 기술에 대한 폭넓은 지식을 가지고 있습니다. 그들의 실력으로 난해한 블록캣 기술과 병기의 효율을 극대화합니다."
 trait_blokkat_governor:0 "블록캣 총독"
 trait_blokkat_governor_desc:0 "이 특이한 블록캣은 행성 정착지를 어떻게 관리하고 행성을 어떻게 가장 효율적으로 개조하는지에 대한 폭넓은 지식을 가지고 있습니다."
 trait_blokkat_scientist:0 "블록캣 과학자"
 trait_blokkat_scientist_desc:0 "이 특이한 블록캣은 과학적 연구 및 방법에 대한 폭넓은 지식을 가지고 있습니다."
 trait_blokkat_general:0 "블록캣 장군"
 trait_blokkat_general_desc:0 "이 특이한 블록캣은 지상전의 기술에 대한 폭넓은 지식을 가지고 있습니다."
 trait_blokkat_keen:0 "대담한 블록캣"
 trait_blokkat_keen_desc:0 "이 블록캣은 새로운 것을 시도하는 것과 바로 행동에 뛰어드는 것에 특히나 열심입니다."
 trait_blokkat_mineralizer:0 "조광자 블록캣"
 trait_blokkat_mineralizer_desc:0 "이 블록캣은 자원을 아끼고 건설 재료의 생산을 극대화하는데 전념합니다."
 trait_blokkat_ambitious:0 "야심찬 블록캣"
 trait_blokkat_ambitious_desc:0 "이 블록캣은 매우 야심차며 많은 위대한 것들을 세우고자합니다."
 trait_blokkat_combative:0 "전투적인 블록캣"
 trait_blokkat_combative_desc:0 "이 블록캣은 유별나게 공격적이고 전투 중심적입니다."
 trait_blokkat_speed_freak:0 "속도광"
 trait_blokkat_speed_freak_desc:0 "이 블록캣은 속도의 개념과 최대한 빠르게 움직이는 것에 이상하리만큼 집착합니다. 무엇보다도 속도와 기동성을 우선시 합니다."
 trait_blokkat_primitive_enthusiast:0 "원시인 애호가"
 trait_blokkat_primitive_enthusiast_desc:0 "이 블롯캣은 소위 '원시' 문명이라는 것에 이상한 흥미를 가지고 있습니다. '실험'을 해서 원시인들에 대해 더 알고자 하는 것 이상으로, 때로는 심각하게 비틀린 욕망을 가지고 있습니다."
