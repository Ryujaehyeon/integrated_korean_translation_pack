 district_virtual_administrative_desc:0 "우리의 행정 시설을 가상 공간에 배치함으로써, 비록 가상 공간에서의 일 처리가 느리지만 우리는 가상 현실의 시간을 빠르게 돌릴 수 있기 때문에 결과적으로 더 빠른 속도로 일을 처리할 수 있습니다."
 district_virtual_religious:0 "가상 사원 단지"
