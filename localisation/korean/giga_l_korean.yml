 dyson_sphere_5_o_star_DESC:0 "완전히 작동하는 다이슨 스피어입니다. 에너지 생산 효율 §G100%§!\nO형 항성의 환경적 위험을 무력화합니다."
 matrioshka_brain_0_o_star:0 "O형 항성 $name_matrioshka_brain$ 건설 현장"
 matrioshka_brain_0_o_star_DESC:0 "이 건설 현장은 $name_matrioshka_brain$을 건설하는데 필요한 대량의 자원과 인력을 유지하는 거점 역할을 할 것입니다."
 matrioshka_brain_1_o_star:0 "O형 항성 $name_matrioshka_brain$ 항성 축전기"
 matrioshka_brain_1_o_star_DESC:0 "항성 주위를 도는 이 첨단 축전기들은 미래의 $name_matrioshka_brain$에 에너지를 공급하며, 항성을 안정시키고 섬세한 회로를 보호하기 위해 항성 표면의 폭발와 바람을 억제할 수 있습니다."
 matrioshka_brain_2_o_star:0 "O형 항성 $name_matrioshka_brain$ 메인 대이터 뱅크"
 matrioshka_brain_2_o_star_DESC:0 "메인 데이터 뱅크는 이제 항성 주위에 자리 잡고 있으며, 과학 연구에 의해 생성되는 데이터를 관리하기 위해 최고급 컴퓨터를 설치했습니다. 지금까지 수집한 대부분의 데이터가 저장돼 연구를 진행하고 있습니다."
 matrioshka_brain_3_o_star:0 "O형 항성 $name_matrioshka_brain$ 중앙 처리 장치"
 matrioshka_brain_3_o_star_DESC:0 "중앙 처리 장치는 항성 전체를 둘러싸고 있는 거대한 컴퓨터입니다. 메인 데이터 뱅크에서 발생하는 열은 중앙 처리 장치에 전원을 공급하는데 사용되어 장치의 효율성을 크게 향상시켰습니다. 이 컴퓨터들은 굉장히 강력합니다."
 matrioshka_brain_4_o_star:0 "O형 항성 $name_matrioshka_brain$ 양자 계산기"
 matrioshka_brain_4_o_star_DESC:0 "많은 복잡한 계산들, 특히 우주의 본질과 관련된 계산들이 이러한 양자 계산기에서 처리되고 있습니다. 중앙 처리 장치에서 나오는 열을 사용하여 작동하기 때문에 굉장히 효율적입니다."
 matrioshka_brain_5_o_star:0 "O형 항성 $name_matrioshka_brain$"
 matrioshka_brain_5_o_star_DESC:0 "완전히 작동하는 $name_matrioshka_brain$입니다. 여러 구성 요소를 조정하는 상호 참조 아카이브로 구성된 가장 바깥 쪽 레이어를 포함하여 효율성을 최대치로 끌어올렸습니다. 연구 속도, 통합력, 로봇 생산량 및 함대 수용력이 25% 증가합니다."
 matrioshka_brain_6_o_star:0 "O형 항성 마트료시카 현실 시뮬레이터"
 matrioshka_brain_6_o_star_DESC:0 "이 $name_matrioshka_brain$은 많은 정자기 포드가 장착되어있어 유기체들이 그들의 방대한 정신을 이상화하여 시뮬레이션 세계로 업로드할 수 있습니다. 유일한 한계는 그들의 상상력 뿐입니다."
