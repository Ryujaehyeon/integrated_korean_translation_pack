 giga_blokkat.1044.name:0 "블로크-해체 작업자 재건"
 giga_blokkat.1044.desc:0 "블로캇은 또 다른 해체 작업자의 파괴 이후 호위 함대와 함께 §Y블로캇 해체 작업자§!를 재건했습니다.\n\n다행히도 그들은 우리 은하에서 수확을 시작할 때보다 더 많은 해체 작업자를 재건하지 않을 것입니다."
