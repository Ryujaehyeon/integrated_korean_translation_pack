 giga_blokkat.1023.name:0 "해체된 행성"
 giga_blokkat.1023.desc:0 "§Y블록캣§!이 §Y[ROOT.GetName]§!의 식민지에 도달했고 이러서 파괴하고 있습니다. 안타깝게도 이는 순식간에 §Y[ROOT.blokkat_planet_pop_count]§! 팝을 없애버렸습니다.\n\n우리 문명에 대한 이 영향을 억누르지 않는다면, 이 파멸의 행위는 우리 제국 내의 §R블록캣 불안도§!를 §Y[ROOT.blokkat_pop_inquietude]§!만큼 생성할 것입니다. 아니면, 우리는 불안도를 반으로 줄이기 위해 행성의 파괴에 대한 것을 누그러뜨리고 선전을 할 수 있습니다. 하지만 이는 £influence£ §Y[ROOT.blokkat_pop_influence_cost]§!만큼의 비용이 들 것입니다."
 giga_blokkat.1023.a:0 "빌어먹을! | §R블록캣 불안도§! §Y[ROOT.blokkat_pop_inquietude]§!"
 giga_blokkat.1023.b:0 "£influence£ §Y[ROOT.blokkat_pop_influence_cost]§!을 소비해 영향을 완화하라. | §R블록캣 불안도§! §Y[ROOT.blokkat_pop_inquietude_halved]§!"
 blokkat_not_enough_influence:0 "영향력이 부족합니다."
 giga_blokkat.1023.desc.willingness:0 "§Y블록캣§!이 도착했고, 이내 §Y[ROOT.GetName]§!의 식민지를 파괴하여 §Y[ROOT.blokkat_planet_pop_count]§! 팝을 순식간에 죽여버렸습니다.\n\n이 사건의 충격을 억제하지 않으면 §R블록캣 불안도§!가 §Y[ROOT.blokkat_pop_inquietude]§! 생성되고 제국의 §H정부 동조§!와 §M국민 동조§!가 §R[ROOT.blokkat_pop_inquietude]%§! 감소할 것입니다. 아니면, 행성의 파괴에 대한 보조금과 선전을 통해 불안을 절반으로 낮출 수 있지만, 그 비용은 대략 £influence£ §Y[ROOT.blokkat_pop_influence_cost]§!입니다."
 giga_blokkat_join.5500.b:0 "§R투쟁§! 중인 지도자들을 우리 편으로 다시 모아 보세요."
 giga_blokkat_join.5601.name:0 "투쟁 중인 지도자 재결속"
 giga_blokkat_join.5601.desc:0 "지도부 몇 인원이 블록캣과 협상하겠다는 계획에 그다지 열정을 보이지 않는 것은 당연한 일입니다. 다라서, §M영향력§!이나 §B통합력§!, §Y에너지§!를 사용해 그들을 다시 우리 편으로 만들고, 그들로 하여금 자신들의 철지난 사상에 빠져 숨기보다는 우리의 관점을 올바르게 이해할 수 있도록 하는 것이 좋을 것입니다."
