 giga_blokkat_join.5602.name:0 "투쟁자와의 교섭"
 giga_blokkat_join.5602.desc:0 "누구와 교섭할까요?"
 giga_blokkat_join.5602.1:0 "설득해 보세요 §Y[blokkat_strike_leader_1.GetName]§!."
