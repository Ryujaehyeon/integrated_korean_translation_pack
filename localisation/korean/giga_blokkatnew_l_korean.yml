 giga_blokkat_join.5500.willingness_military_count.tooltip:0 "§Y홀로 있는 블록캣§! 포획: §G+3.5%§!\n§Y블록-축출자§! 파괴: §G+0.02%§!\n§Y블록-관리자§! 파괴: §G+0.06%§!\n§Y블록-해체자§! 파괴: §G+10%§!\n§Y블록-종결자§! 파괴: §G+20%§!\n§Y블록캣 부품§! 연구: §G+2.5%§!\n§Y전쟁 위성§! 손실: §R-0.1%§!\n§Y베히모스 요새 행성§! 손실: §R-0.5%§!\n§Y스텔라 시스템크래프트§! 손실: §R-2.5%§!\n§Y헤라클레스§! 손실: §R-5%§!"
