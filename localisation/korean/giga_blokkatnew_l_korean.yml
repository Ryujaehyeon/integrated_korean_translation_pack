 war_planet_reactor_blokkat_desc:0 "$REACTOR_BLOKKAT$"
 JUMP_DRIVE_BLOKKAT:0 "블로캇 위상 이동 초공간 드라이브"
 JUMP_DRIVE_BLOKKAT_DESC:0 "블로캇 추진기와 블로캇 초공간 드라이브 사이에는 실질적인 차이가 없습니다. 두 장치 모두 고차원에 고정된 일종의 장치를 사용하여 우주선 주변의 공간을 문자 그대로 \"끌어당기고\" 즉각적인 가속으로 이동시킵니다."
 THRUSTER_BLOKKAT:0 "블로캇 위상 이동 추진기"
 THRUSTER_BLOKKAT_DESC:0 "블로캇 스러스터와 블로캇 초공간 드라이브 사이에는 실질적인 차이가 없습니다. 두 장치 모두 고차원에 고정된 일종의 장치를 사용하여 우주선 주변의 공간을 문자 그대로 \"끌어당기고\" 즉각적인 가속으로 이동시킵니다."
 SENSOR_BLOKKAT:0 "하이퍼브레인 감지기"
 SENSOR_BLOKKAT_DESC:0 "이 블로캇 디자인의 감지기는 3차원 물질이 우주의 고차원 매니폴드 내에서 생성하는 진동을 탐지합니다."
 ARMOR_BLOKKAT:0 "플랑크합금 장갑"
 ARMOR_BLOKKAT_DESC:0 "이 굳센 갑옷 판은 촘촘히 포장된 플랑크 길이 크기의 입자로 구성되어 있습니다. 이들은 복잡한 아원자 신경 구조를 형성하여 물자가 자율적으로 변화에 반응하고 그에 맞게 거의 즉각적으로 적응할 수 있게 합니다."
 LARGE_ARMOR_BLOKKAT:0 "$ARMOR_BLOKKAT$"
 LARGE_ARMOR_BLOKKAT_DESC:0 "$ARMOR_BLOKKAT_DESC$"
 MEDIUM_ARMOR_BLOKKAT:0 "$ARMOR_BLOKKAT$"
 MEDIUM_ARMOR_BLOKKAT_DESC:0 "$ARMOR_BLOKKAT_DESC$"
 SMALL_ARMOR_BLOKKAT:0 "$ARMOR_BLOKKAT$"
 SMALL_ARMOR_BLOKKAT_DESC:0 "$ARMOR_BLOKKAT_DESC$"
 HULL_REPAIR_BLOKKAT:0 "서브플랑크 동기화기"
 HULL_REPAIR_BLOKKAT_DESC:0 "블로캇 갑옷에 포함된 신경망의 중계 역할을 하는 미세한 로봇 떼로, 효율성을 높이고 더 빠른 수리를 가능하게 합니다. 블로캇 모델은 블로크워크와의 동기화를 높이기 위해 데이터를 송수신합니다."
 AFTERBURNER_BLOKKAT:0 "다중 추력기"
 AFTERBURNER_BLOKKAT_DESC:0 "블로캇 선박은 그들의 신비로운 초공간 추진기 외에도, 우주의 구조에 반작용하여 선박의 속도를 더욱 증가시키는 이 추진기를 사용합니다."
 SHIELD_BLOKKAT:0 "초차원 이동 장벽"
 SHIELD_BLOKKAT_DESC:0 "블로캇-베스터의 거대한 방패와 마찬가지로, 이 작은 보호 장벽들은 더 높은 차원에서 회전하여 전체 방패의 극히 작은 부분만이 적의 공격에 노출됩니다. 만약 손상된다면, 손상된 부분은 즉시 초차원 공간으로 이동하여 재생됩니다."
 LARGE_SHIELD_BLOKKAT:0 "$SHIELD_BLOKKAT$"
 LARGE_SHIELD_BLOKKAT_DESC:0 "$SHIELD_BLOKKAT_DESC$"
 MEDIUM_SHIELD_BLOKKAT:0 "$SHIELD_BLOKKAT$"
 MEDIUM_SHIELD_BLOKKAT_DESC:0 "$SHIELD_BLOKKAT_DESC$"
 SMALL_SHIELD_BLOKKAT:0 "$SHIELD_BLOKKAT$"
 SMALL_SHIELD_BLOKKAT_DESC:0 "$SHIELD_BLOKKAT_DESC$"
 REACTOR_BOOSTER_BLOKKAT:0 "초차원 축전기"
 REACTOR_BOOSTER_BLOKKAT_DESC:0 "반응로 부스터는 고차원 소스에서 추가 에너지를 끌어옵니다. 또한 선박 전체의 효율성을 향상시키는 역할을 합니다."
 COMBAT_COMPUTER_ARTILLERY_BLOKKAT:0 "블로캇 근거리 컴퓨터"
 COMBAT_COMPUTER_ARTILLERY_BLOKKAT_DESC:0 "초차원 정보 네트워크를 통해 선박의 나머지 부분과 연결된 이 신비로운 컴퓨터는 근접 전투와 스크린 함선에 집중합니다."
 COMBAT_COMPUTER_CARRIER_BLOKKAT:0 "블로캇 장거리 컴퓨터"
 COMBAT_COMPUTER_CARRIER_BLOKKAT_DESC:0 "초차원 정보 네트워크를 통해 선박의 나머지 부분과 연결된 이 신비로운 컴퓨터는 장거리 전투에 중점을 둡니다."
 PLANET_LANCE_BLOKKAT:0 "추방자 광선"
 PLANET_LANCE_BLOKKAT_DESC:0 "퇴거 광선은 지금까지 발견된 가장 강력한 블로캇 무기입니다. 이 상상할 수 없는 힘의 광선은 현실을 찢어버리고 여러 고차원 에너지를 시공간 연속체의 국소 영역에 집중시켜 목표를 0차원 물체로 강제로 압축하여 즉시 파괴합니다."
 OBLITERATOR_LANCE_BLOKKAT:0 "파괴자 광선"
 OBLITERATOR_LANCE_BLOKKAT_DESC:0 "본질적으로 퇴거자 광선의 업그레이드 버전인 파괴자 광선은 현실을 찢어버리고 여러 고차원 에너지를 시공간 연속체의 국소 영역에 집중시켜 목표를 0차원 물체로 강제로 압축하여 즉시 파괴합니다."
 PLANET_KILLER_BLOKKAT_GENERATOR:0 "초물질 해체 작업자"
 PLANET_KILLER_BLOKKAT_GENERATOR_DESC:0 "이 장치는 블로캇이 원하는 형태로 모든 물질을 신속하게 분해하고 재배치할 수 있는 능력을 가지고 있으며, 추가적인 블로캇도 포함됩니다."
 PLANET_KILLER_BLOKKAT_GENERATOR_ACTION:0 "해체"
 FLEETORDER_DESTROY_PLANET_WITH_PLANET_KILLER_BLOKKAT_GENERATOR:0 "$PLANET|Y$를 해체할 준비 중입니다."
 MESSAGE_DESC_FOR_PLANET_KILLER_BLOKKAT_GENERATOR:0 "해체되었습니다."
 COMBAT_COMPUTER_TERMINATOR_BLOKKAT:0 "블로크-터미네이터 중앙 사령부"
 COMBAT_COMPUTER_TERMINATOR_BLOKKAT_DESC:0 "블로카트가 수확 작업에 사용하는 대부분의 함선과는 달리, 블로크-터미네이터는 순수하게 함선 전투를 위해 설계된 전투용 함선입니다."
 SHIP_AURA_BLOKKAT_TERMINATOR:0 "블로크-터미네이터 초차원 방벽"
 SHIP_AURA_BLOKKAT_TERMINATOR_DESC:0 "블로크-터미네이터는 자체 초차원 방패를 보유하고 있어, 자신과 주변의 다른 블로크선이 받는 피해를 크게 줄여줍니다."
 COMBAT_COMPUTER_OBLITERATOR_BLOKKAT:0 "블로크-전멸자 중앙 사령부"
 COMBAT_COMPUTER_OBLITERATOR_BLOKKAT_DESC:0 "블로카트가 수확 작업에 사용하는 대부분의 함선과는 달리, 블로크-오블리터레이터는 전투를 위해 순수하게 설계된 전투 함선입니다."
 SHIP_AURA_BLOKKAT_OBLITERATOR:0 "블로크-오블리터레이터 초차원 방벽"
 SHIP_AURA_BLOKKAT_OBLITERATOR_DESC:0 "블로크-오블리터레이터는 자체 초차원 방패를 보유하고 있어, 자신과 주변의 다른 블로크선이 받는 피해를 크게 줄여줍니다."
 trait_blokkat_leader:0 "블로캇"
 trait_blokkat_leader_desc:0 "블로캇은 블로크워크와의 연결을 통해 다양한 분야에 대한 방대한 정보를 보유하고 있습니다."
 trait_blokkat_admiral:0 "블로캇 제독"
 trait_blokkat_admiral_desc:0 "이 블로캇 제독은 여러 차원 간 갈등에 참여한 경험을 바탕으로 우주 전쟁의 기술에 대한 폭넓은 지식을 보유하고 있습니다. 그들의 능력은 신비로운 블로캇 기술과 무기의 효율성을 극대화하는 데 기여합니다."
 trait_blokkat_governor:0 "블로캇 총독"
 trait_blokkat_governor_desc:0 "이 블로캇은 행성 정착지를 관리하는 방법과 세계를 가장 효율적으로 재구성하는 방법에 대한 폭넓은 지식을 보유하고 있습니다."
 trait_blokkat_scientist:0 "블로캇 과학자"
 trait_blokkat_scientist_desc:0 "이 블로캇은 과학 연구 및 방법에 대한 폭넓은 지식을 가지고 있습니다."
 trait_blokkat_general:0 "블로캇 장군"
 trait_blokkat_general_desc:0 "이 블로캇은 지상 전쟁의 기술에 대한 폭넓은 지식을 가지고 있습니다."
 trait_blokkat_keen:0 "대담한 블로캇"
 trait_blokkat_keen_desc:0 "이 블로캇은 새로운 것에 도전하고 즉시 행동에 나서는 것을 특히 좋아합니다."
 trait_blokkat_mineralizer:0 "광물화 블로캇"
 trait_blokkat_mineralizer_desc:0 "이 블로캇은 자원 절약과 건설 자재 생산 극대화에 중점을 둡니다."
 trait_blokkat_ambitious:0 "야망 있는 블로캇"
 trait_blokkat_ambitious_desc:0 "이 블로캇은 매우 야망이 크며 많은 웅장한 것들을 건설하는 것을 목표로 합니다."
 trait_blokkat_combative:0 "전투적인 블로캇"
 trait_blokkat_combative_desc:0 "이 블로캇은 매우 공격적이며 전투 지향적입니다."
 trait_blokkat_speed_freak:0 "속도 광신자"
 trait_blokkat_speed_freak_desc:0 "이 블로캇은 속도와 가능한 한 빠르게 움직이는 개념에 대한 독특한 집착을 보입니다. 그들은 모든 것보다 속도와 기동성을 우선시합니다."
 trait_blokkat_primitive_enthusiast:0 "원시 열광자"
 trait_blokkat_primitive_enthusiast_desc:0 "이 블로캇은 이른바 '원시' 문명에 대한 이상한 흥미를 가지고 있으며, 더 많은 것을 배우기 위해 그들에 대해 '실험'하는 데 주저하지 않으며, 때로는 끔찍하게 왜곡된 방식으로 진행합니다."
