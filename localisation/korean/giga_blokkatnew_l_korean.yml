 giga_blokkat_join.5500.a:0 "나가기."
 giga_blokkat_join.5500.name:0 "블록캣 동조"
 giga_blokkat_join.5500.desc:0 "§G블록캣 동조§!란 블록캣과 협상하고 협력할지도 모를 계획에 우리 국민들이 얼마나 동조하는지를 나타냅니다. 이는 §P군부§!와 §B과학부§!, §H정부§!, §M국민§!으로 나누어지며, 4개의 평균은 §G전국적 블록캣 동조§!입니다. §Y0%§!에서 시작하며, 심각한 §R불이익§!을 불러올테지만, §Y100%§!에 달하면 그 영향이 없어질 것입니다. §Y100%§!를 넘으면 §G보너스§!를 얻으며, 음수가 되면 불이익이 심해집니다. 아래의 방법과 함께 다양한 §Y시행령§!과 §Y결정§!을 사용함으로써 동조를 높일 수 있습니다.\n§B동조값에 마우스를 올리면 동조 획득에대한 정확한 값을 확인할 수 있습니다. 클릭하면 새로고침됩니다."
 giga_blokkat_blokkat_willingness_global:0 "전국적 블록캣 동조"
