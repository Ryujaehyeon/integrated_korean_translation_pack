 giga_blokkat_join.5500.willingness_science_count.tooltip:0 "§Y블록캣 기술§! 연구: §G+1.5%§!\n§Y붙잡은 블록캣§! 1회 연구: §G+2%§!"
 blokkat_population_willingness_desc:0 "§G증가 원인:§!\n§Y블록워크 전력 연결점§! 건설.\n§R감소 원인:§!\n블록캣에 의한 §Y행성§! 손실"
 giga_blokkat_join.5500.willingness_population_count.tooltip:0 "§Y블록워크 전력 연결점§! 건설: §G+1%§!\n블록캣에 의한 §Y1팝§! 손실:§R-0.05%§!"
