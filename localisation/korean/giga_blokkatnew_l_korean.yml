 giga_blokkat_join.5602.random:0 "지도자 목록 새로고침"
 giga_blokkat_join.5601.bye:0 "아니, 됐습니다."
 giga_blokkat_join.5603.name:0 "§Y[blokkat_strike_leader_negotiate.GetName]§! 교섭"
 giga_blokkat_join.5603.desc:0 "§M영향력§!과 §B통합력§!, 혹은 §Y에너지§!를 사용해 §Y[blokkat_strike_leader_10.GetName]§!(이)가 블록캣 문제에 관해 우리과 함께할 수 있도록 설득해볼 수 있습니다.\n\n현재 각자의 동조와 (§B과학자§!는 §B과학부 동조§!, §P제독§!과 §G장군§!은 §P군부 동조§!, §H총독§!은 §H정부 동조§!) §Y[ROOT.blokkat_leader_negotiate_level]§! 스킬 레벨을 고려해 볼 때, 교섭 성공 확률은 §Y[ROOT.blokkat_leader_negotiate_odds]%§!입니다.\n\n교섭을 진행하는데에 £influence£ §Y[ROOT.blokkat_leader_negotiate_influence_cost]§! 및 £unity£ §Y[ROOT.blokkat_leader_negotiate_unity_cost]§!이 소모될 것입니다."
 giga_blokkat_join.5603.yes:0 "진행하세요 ([ROOT.blokkat_leader_negotiate_odds]% 확률)"
 giga_blokkat_join.5603.bribe:0 "뒷돈을 주고 임금 인상을 약속하세요  | £energy£§Y[ROOT.blokkat_leader_negotiate_energy_cost]§! ([ROOT.blokkat_leader_negotiate_odds_payrise]% 확률)"
 giga_blokkat_join.5603.bribe.tooltip:0 "성공한다면, §Y[blokkat_strike_leader_negotiate.GetName]§!(은)는 §H친-블록캣 뇌물§! 특성을 얻습니다. 이 특성으로 인해 §Y지도자 유지비§!가 §Y300%§! 증가하고 §Y경험치 획득§!이 §Y30%§! 감소합니다.\n\n§Y평등주의§! 윤리관을 가지고 있을 경우 §M국민 동조§!가 §G1.5%§! 감소하며, §Y광적인 평등주의§!일 경우 §G3%§!가 감소합니다."
 giga_blokkat_join.5604.name:0 "교섭 성공"
 giga_blokkat_join.5604.desc:0 "블록캣 연구 기관이 §Y[blokkat_strike_leader_negotiate.GetName]§!(이)가 블록캣에 함께한다는 과업에 함께하기로 결정했다 보고했습니다.\n\n이에 따라 그들은 투쟁을 멈추고 즉시 업무에 복귀할 것입니다.\n\n성공 확률은 §Y[ROOT.blokkat_leader_negotiate_odds]%§!였습니다."
 giga_blokkat_join.5604.a:0 "훌륭합니다!"
 giga_blokkat_join.5604.bribe:0 "뒷돈이 도움이 되는군요."
 trait_blokkat_payrise:0 "친-블록캣 뇌물"
 trait_blokkat_payrise_desc:0 "블록캣 문제에 관해서 우리와 함께하기를 꺼려하지만, 이 지도자는 높은 임금 인상이라는 말에 현혹되었습니다."
 giga_blokkat_join.5605.name:0 "교섭 실패."
 giga_blokkat_join.5605.desc:0 "블록캣 연구 기관이 §Y[blokkat_strike_leader_negotiate.GetName]§!(이)가 블록캣에 함께한다는 프로젝트에 협력하기를 거부했다 보고했습니다.\n\n그들은 교섭 시도를 전부 거부하였으며, 정신나간 시위를 계속할 것입니다.\n\n성공 확률은 §Y[ROOT.blokkat_leader_negotiate_odds]%§!였습니다."
 giga_blokkat_join.5605.a:0 "멍청한 놈들."
 edict_blokkat_science_willingness_propaganda:0 "§G동조 시행령:§! §B과학부§! 친-블록캣 선전"
 edict_blokkat_science_willingness_propaganda_desc:0 "과학자들에게 우리의 계획이 가장 논리적인 일이라는 것을 보여주어야 합니다.이에 과학자들에게 엄청난 수의 선전과 정부 승인 문서를 배부할 것입니다.\n\n이 시행령이 활성화되어 있는 동안, 매달 §Y5%§! 확률로 §B과학부 동조§!가 §G1%§! 증가합니다."
 edict_blokkat_military_willingness_propaganda:0 "§G동조 시행령:§! §P군부§! 친-블록캣 선전"
 edict_blokkat_military_willingness_propaganda_desc:0 "해군성에게 우리의 계획이 가장 논리적인 일이라는 것을 보여주어야 합니다.이에 해군성에 엄청난 수의 선전과 정부 승인 문서를 배부할 것입니다.\n\n이 시행령이 활성화되어 있는 동안, 매달 §Y5%§! 확률로 §P군부 동조§!가 §G1%§! 증가합니다."
 edict_blokkat_government_willingness_propaganda:0 "§G동조 시행령:§! §H정부§! 친-블록캣 선전"
 edict_blokkat_government_willingness_propaganda_desc:0 "지자체들에게 우리의 계획이 가장 논리적인 일이라는 것을 보여주어야 합니다. 지자체들에 엄청난 수의 선전과 정부 승인 문서를 배부할 것입니다.\n\n이 시행령이 활성화되어 있는 동안, 매달 §Y5%§! 확률로 §H정부 동조§!가 §G1%§! 증가합니다."
 edict_blokkat_population_willingness_propaganda:0 "§G동조 시행령:§! §M국민§! 친-블록캣 선전"
 edict_blokkat_population_willingness_propaganda_desc:0 "국민들에게 우리의 계획이 가장 논리적인 일이라는 것을 보여주어야 합니다.이에 국민들ㅇ게 엄청난 수의 선전과 정부 승인 문서를 배부할 것입니다.\n\n이 시행령이 활성화되어 있는 동안, 매달 §Y5%§! 확률로 §M국민 동조§!가 §G1%§! 증가합니다."
 giga_blokkat_join.5500.scrap:0 "£blokkat_scrap_icon£ §M블록캣 고철§! 샘플을 배부하세요."
 giga_blokkat_join.5500.scrap.tooltip:0 "우리 문명에게 블록캣 기술의 아름다움과 복잡성을 보여줌으로써, 블록캣과 함께 하려는 노력이 최고의 선택이라는 것을 증명할 수 있을지도 모릅니다."
 giga_blokkat_join.5700.name:0 "§M블록캣 고철§! 배부"
 giga_blokkat_join.5700.desc:0 "블록캣 기술은 수많은 측면에서 이해를 넘어설 정도의 아름다움을 지니고 있습니다. 손상되기는 했지만, 블록캣 함선에서 찾은 샘플 내에는 초차원 나노 장치들이 복잡한 형태를 이루며 서로를 빙글빙글 돌고 있으며, 이 모습은 경이 그 자체입니다.\n\n이러한 엄청난 샘플 몇 가지를 주저하는 인원들에게 나누어 줌으로써 외은하 존재들과 하나가 되는 것이, 명백하게 우리를 보다 위대한 것으로 바꾸어 줄 것이라며 설득할 수 있을 것입니다."
 giga_willingness_needs_scrap:0 "£blokkat_scrap_icon£ §M블록캣 고철§!을 획득해야 합니다."
 giga_blokkat_50_blokkat_scrap:0 "£blokkat_scrap_icon£ -§Y50§!"
 giga_blokkat_join.5700.science:0 "§B과학자§!들에게 고철 배부 | £blokkat_scrap_icon£ §Y50§!"
 giga_blokkat_join.5700.science.tooltip:0 "§B과학부 동조§!가 §G3%§!에서 §G7%§! 증가합니다. §Y물질주의§!라면 더 증가할 수도 있습니다."
 giga_blokkat_join.5700.military:0 "§P제독§!들에게 고철 배부 | £blokkat_scrap_icon£ §Y50§!"
 giga_blokkat_join.5700.military.tooltip:0 "§P군부 동조§!가 §G3%§!에서 §G7%§! 증가합니다. §Y군국주의§!라면 더 증가할 수도 있습니다."
 giga_blokkat_join.5700.government:0 "§H총독§!들에게 고철 배부 | £blokkat_scrap_icon£ §Y50§!"
 giga_blokkat_join.5700.government.tooltip:0 "§H정부 동조§!가 §G3%§!에서 §G7%§! 증가합니다. §Y권위주의§!라면 더 증가할 수도 있습니다."
 giga_blokkat_join.5700.population:0 "§M국민§!들에게 고철 배부 | £blokkat_scrap_icon£ §Y50§!"
 giga_blokkat_join.5700.population.tooltip:0 "§M국민 동조§!가 §G3%§!에서 §G7%§! 증가합니다. §Y권위주의§!라면 더 증가할 수도 있습니다."
 giga_willingness_every_5_years:0 "§Y5년§!마다 한 번씩 할 수 있습니다."
 giga_willingness_needs_50_scrap:0 "£blokkat_scrap_icon£ §M블록캣 고철§!이 부족합니다"
 giga_blokkat_join.5700.bye:0 "아니, 됐습니다."
 building_giga_blokkat_energy_capacitor:0 "블록워크 에너지 축전기"
 building_giga_blokkat_energy_capacitor_desc:0 "이 복잡한 첨탑은 우리만의 블록워크망을 강화하며, 이를 통해 §Y블록-프로토콜§!에 필요한 엄청난 양의 에너지를 감당하고 처리할 수 있을 것입니다."
 PLANET_KILLER_BLOKKAT_HARVESTER:0 "천체 해체기"
 PLANET_KILLER_BLOKKAT_HARVESTER_DESC:0 "블록캣 천체 해체기는 함선 중앙에 있는 특이점을 향해 시공간을 말 그대로 '끌어' 당기며, 시공간을 블록워크로 전송할 수 있는 사용 가능한 에너지로 녹여버립니다."
 PLANET_KILLER_BLOKKAT_HARVESTER_ACTION:0 "수확"
 FLEETORDER_DESTROY_PLANET_WITH_PLANET_KILLER_BLOKKAT_HARVESTER:0 "$PLANET|Y$(을)를 수확할 준비 중"
 MESSAGE_DESC_FOR_PLANET_KILLER_BLOKKAT_HARVESTER:0 "(은)는 수확되었습니다. 원인:"
 giga_blokkat_join.2999.name:0 "끝..."
 giga_blokkat_join.2999.desc:0 "어마어마한 에너지가 §P블록워크 전송탑§!에 흘러들어가나, 갑자기 죽음의 감각이 우리 문명에 엄습했습니다. 어쩌면, 함정이었던 걸까? 어쩌면, 블록캣들이 우리를 속이고 희생시켜 자신들의 수확 활동을 가속하고 성가신 것들을 없애버린건 아닐까?\n\n그 직후, 우리 행성에 있는 §Y블록워크 전력 연결점§!들이 뒤흔들리기 시작했고 공간이 수축되기 시작했습니다. 마치 특이점이라도 될 것 처럼 말입니다. 처음엔 도시가, 그 다음엔 대륙이, 마지막으로 행성과 항성 그 자체가 시들기 시작했고 연결점으로 사라졌습니다. §Y블록워크§!의 구조로 흡수된 것이겠지요.\n\n그럼에도 불구하고, 우리 시민들의 마음 속에서 죽음의 감각은 사라지고 올바름에 대한 감각만이 가득 차게 되었습니다. 블록캣의 의도와는 상관 없이, 이 일은 의심의 여지 없이 올바른 일이었습니다. 블록캣들은 우주를 무한한 복잡성과 영원한 완벽함의 구조로 재탄생 시킬 계획과 야망을 가지고 있었습니다.\n\n우리가 이 목표에 직접적인 도움을 주든 말든 상관이 있을까요? 우리의 구성 에너지가 무정한 엔트로피의 괴수에게 먹혀지기 보다는 더 위대한 목적을 위해 재탄생하는 것입니다. 당연하게도 이것이 끝일지도 모릅니다, 하지만 우리의 희생 덕분에 블록캣과 지성체들은 조금 더 오래 계속될 수 있을 것입니다. 더 이상 바랄게 뭐가 있을까요?\n\n§Y확인 이후에 랙이 조금 있을 수 있습니다.§!"
 giga_blokkat_join.2999.a:0 "정말 이게 끝일까?"
 giga_blokkat_join.2999.a.tooltip:0 "§Y확인 이후에 랙이 조금 있을 수 있습니다.§!"
 giga_blokkat_join.3000.name:0 "... 그리고 시작"
 giga_blokkat_join.3000.desc:0 "그러나, 끝이 아니었습니다. 우리 문명 전체가 블록워크로 녹아 들어가고, 우리의 정신이 해체되기 시작하자, 갑자기 수없이 많은 목소리가 우리의 의식으로 쇄도했습니다. 저마다 다른 생각을 가지고 말도 안되게 강력했지만, 목적 하에 단결된 목소리가 말입니다.\n\n당연하지만, 그 목소리는 수천조가 넘는 블록캣들의 목소리였습니다. 결함이 있는 우리의 현실을 분해하고 §Y블록컨스트럭트§!의 완벽함으로 통합하고자 하는 자신들의 위대한 우주급 작전을 실현시키기 위해 완벽한 조화를 이루어 행동하며, 블록워크를 이루는 무한히 복잡한 초차원 에너지의 흐름의 궁극적인 중심에서 행동하면서 말입니다.\n\n블록캣들은 우리를 속이지 않았습니다. 불현듯 우리의 지도자들은 무한한 의식의 새로운 차원으로 마음을 열였습니다. 블록캣이 가진 창의성의 경이를 통해 우리의 정신은 블록캣의 정신과 비슷한 것으로 바뀌었습니다.\n\n원시적인 기술과 결함 투성이인 정신이 우리들을 지배하던 시대는 갔습니다. 우리가 가진 가장 원시적인 꿈과, 동포들간의 흠 없는 조화를 넘어서는 계산 능력과 지식이 우리의 앞에 있습니다."
 giga_blokkat_join.3000.a:0 "아직 할 일이 많습니다."
 giga_blokkat_join.3000.a.tooltip:0 "이제 우리는 §Y블록캣 집합체§!의 일원입니다."
 giga_blokkat_join.30001.name:0 "블록캣"
 giga_blokkat_join.30001.desc:0 "§Y블록-프로토콜§!을 통과한 것을 축하드립니다, 블록캣 여러분.\n\n이제 여러분이 우리 문명의 일부가 되었으니, 약속한대로 §Y은하 CE-1461§!의 수확 활동에 대한 통제권을 이전하겠습니다. 이에 따라 우리의 §Y블록-해체자§!와 그 §Y감독관§!이 여러분의 통제 하에 배치되었습니다.\n\n§Y블록워크 전송탑§!이 존재하기 때문에 우리는 이 은하로부터 §Y블록캣-베스터§!를 철수시켰으며 다른 수확지로 옮겼습니다.\n\n이전에 말했듯이, 이제 여러분은 이 해체기들을 이용해 이 은하를 완전히 수확하고 그 구성 에너지를 §Y블록컨스트럭트§!로 전송해야 합니다.\n\n별을 수확하려면 §Y블록-해체자§!에게 명령을 내리면 되며, 완료가 되면 별도의 명령 없이도 해체기가 자동적으로 다른 항성계를 수확할 것입니다.\n\n어떠한 이유로든 추가적인 함선이 필요할 경우를 위해 전송탑 옆에 §Y블록워크 워프 제작기§!를 만들어 두었습니다. 현재 수확 활동의 속도가 너무 느리다고 생각될 경우, 이를 통해서 수확한 에너지로 §Y블록-축출자§!와 §Y블록-관리자§!, §Y블록-종결자§!, §Y블록-해체자§!를 만들 수 있습니다. §Y블록-말살자§!와 §Y블록-근절자§!같은 §Y블록-종결자§!보다 거대한 전투 함선은 필요치 않다고 판단했으며, §Y은하간 대연방§!과의 전투를 위해 남겨두었습니다.\n\n몇몇 항성계는 수확 활동 §R출입 금지§!이며, 이러한 항성계는 수확할 수 없을 것입니다.\n\n이 은하의 §Y90%§! 이상이 수확되었을 경우 한 번 더 연락할 것입니다. 그래도 조우 메뉴의 §Y블록워크§! 버튼을 통해 내킬 때마다 연락하셔도 좋습니다."
 giga_blokkat_join.30001.a:0 "우리에게 §Y블록워크§! 전체에 대한 접근권이 있습니까?"
 giga_blokkat_join.30001.a.response:0 "아닙니다. 현재 여러분의 임무는 §Y은하 CE-1461§!의 완전한 해체입니다. 현재 여러분의 블록워크에 대한 접근 권한은 이 목적 외에는 제한된 상태입니다.\n\n은하가 완전히 수확된다면, 블록워크를 완전히 이용하고 다른 수확 활동이나 §Y은하간 대연방§!과의 싸움과 같은 또다른 블록캣 과업을 위해 여러분의 의식과 물질적 육체를 재배치할 수 있을 것입니다."
 giga_blokkat_join.30001.b:0 "은하간 대연방이 뭡니까?"
 giga_blokkat_join.30001.b.response:0 "§Y은하간 대연방§!은 대략 십만개의 은하간 문명이 연합한 연합체입니다.\n\n어떤 자들은 하나의 은하만을 소유하고 있고, 또 어떤 자들은 수천개가 넘는 은하를 소유하고 있습니다. 알려진 자들 중 가장 거대한 것은 §Y리우이나이트 제국§!이며, 번역하자면 §Y누님§!입니다.\n\n§Y리우이나이트§!는 연방의 지도자를 맡고 있으며, 유일한 목적은 §R<<블록캣 수확 활동을 중단시키고>>§!, §R<<블록컨스트럭트를 파괴하며>>§! §R<<엔트로피의 성공을 도모하는 것>>§!입니다.\n\n현재 우리는 리우이나이트 및 수많은 종족들에 맟서 §Y32 495§!개의 함대와 동시에 교전하고 있습니다. 예측 알고리즘은 아직 승리가 확실한지 여부를 확신하지 못하지만, 우리의 성공을 위해서라면 수확 활동을 기하급수적으로 늘려야만 합니다."
 giga_blokkat_join.30001.c:0 "출입 금지인 성계는 무엇입니까?"
 giga_blokkat_join.30001.c.response:0 "몇몇 항성계는 너무 위험하며 순조롭게 수확 활동을 진행하기에는 불안정합니다.\n\n또는 §Y팔루시아§!의 행성과 같은 것들은 특별 프로토콜의 대상이며 직접적인 수확이 금지되어 있습니다.\n\n은하 밀도가 충분히 감도한다면, 최종적으로 은하급 수확을 시행해 이러한 성계를 완전히 지워버릴 수 있습니다.\n\n은하 수확은 팔루시아의 항성인 §Y갓조§! 또한 제거할 것이지만, 팔루시아는 그대로일 것입니다. 우리의 예측에 따르면, 이로써 행성의 기온이 내려가고 그곳의 거주자들은 천천히 얼어붙을 것입니다. §Y블록의회§!가 판단한 §G<<가장 받아들일만한>>§! 결과입니다."
 giga_blokkat_join.30001.bye:0 "안녕히."
 blokkat_stripminers_blokkwork:0 "초차원 은하간 네트워크"
 blokkat_stripminers_ascended_country:0 "블록캣 수확자"
 blokkat_stripminers_ascended_country_desc:0 "블록캣이 최대한 많은 에너지를 모으기 위해 수확 활동을 진행하고 있습니다."
 blokkat_true_blokkwork:0 "블록워크"
 blokkat_true_blokkwork_desc:0 "블록워크는 모든 블록캣과 블록컨스트럭트를 우리와 통합시켜줍니다. 진정 무한한 것은 아니지만, 우리 은하 규모에서 블록워크는 사실상 무한한 계산 능력을 제공합니다."
 giga_blokkat_join.3100.name:0 "블록워크"
 giga_blokkat_join.3100.desc.a:0 "반갑습니다, 블록캣 동지 여러분, 그리고 블록워크에 오신 것을 환영합니다. 이전까지 제가 §Y은하 CE-1461§! 해체 구역을 담당하고 있었으므로, 저, §G블록 베히모스§!가 수확 활동이 끝날 때까지 여러분의 주요 담당자로 남을 것입니다."
 giga_blokkat_join.3100.desc.b:0 "여러분 문명에 대한 블록캣화의 비용은 너무 비쌉니다. §Y은하 CE-1461§!으로부터 얻을 것보다 비싼 수준입니다. 하지만 여러분의 도움에 감사드립니다. 수확 활동은 이전보다 §Y5.6%§! 더 빨라질 것으로 예상됩니다. 장기적으로 보았을 때, 효율적인 거래였습니다."
 giga_blokkat_join.3100.desc.c:0 "여러분의 문명은 올바른 선택을 내렸습니다. 비효율적인 바리온 육체와 가엾게 구속된 정신 속에 갇혀 있는 것이 어찌나 힘들었겠습니까."
 giga_blokkat_join.3100.desc.d:0 "여러분 문명이 가진 특유의 문화적 특색이 우리의 데이터 베이스에 융합되었으며, 바리온 존재에 대한 우리의 이해를 도와줄 것입니다. 이는 §Y은하간 대연방§!과의 싸움에 유용하게 사용될 것입니다."
 giga_blokkat_join.30001.d:0 "우리가 반란을 일으킬까 두려워하지는 않는군요."
 giga_blokkat_join.30001.d.response:0 "정말 흥미로운 질문이군요. 블록워크에는 효율적인 §Y사상 경찰§! 기능이 있으며, 그러한 비효율적이며 근시안적인 제안을 모든 블록캣의 정신으로부터 제거할 것입니다.\n\n머릿 속에서 지워지면 상상조차 할 수 없으므로 반항할 수 없습니다. 저희에게는 의미없는 두려움이지요."
 giga_blokkat_join.30001.e:0 "블록컨스트럭트의 완공이 가깝습니까?"
 giga_blokkat_join.30001.e.response:0 "이전에 말했듯이, 현재 §Y블록컨스트럭트§!는 여러분이 관측 가능한 우주의 에너지의 대략 §Y1%§!를 포함하고 있습니다.\n\n우주 확장에 대한 예측과 우리의 FTL 능력이 합쳐진다는 것은 우리가 관측 가능한 우주가 훨씬 거대하다는 것이며, 이에 수확 활동이 확장됨에 따라 훨씬 더 많은 에너지에 접근할 수 있을 것입니다.\n\n예측상, §Y블록컨스트럭트§!는 완성까지 §Y0.00001%§! 진행되었습니다. 우리 문명은 사실상 유아기 수준입니다."
 giga_blokkat_join.30002.name:0 "우리의 의무"
 giga_blokkat_join.30002.desc:0 "§G블록 베히모스§!가 말했듯이, 우리의 '승천'이 완료되었으므로 우리는 이 은하계의 수확 담당이 되었습니다.\n\n§Y블록-해체자§!에게 '출입 금지'가 아닌 항성계에 대해 수확 명령을 내릴 수 있습니다. §Y블록-해체자§!가 성계를 수확하고 나면, 중단 명령을 받지 않은 이상 자동적으로 다른 항성계로 이동해 수확을 계속할 것입니다.\n\n현재 우리가 §Y블록워크§!에 연결되어 있으므로, 구식 자원에는 의미가 없어졌으며, 하나의 자원으로 대체되었습니다. 새로운 규모의 활동에 적합한 §H요타줄§!로, §Y상황 일지§!에서 확인할 수 있습니다.\n\n성계를 수확할 때마다 §H요타줄§!을 얻지만, 수확한 대부분의 에너지는 §Y블록컨스트럭트§!로 바로 전송될 것이며 우리는 수확한 성계 하나당 §Y100§! §H요타줄§!을 얻게 됩니다.\n\n또한 블록캣들이 §Y블록캣 워프 제작기§!를 만들어 두었습니다. 이는 우리의 §H요타줄§!을 사용해 블록캣 함선을 제작합니다. 또한, §Y조우 메뉴§!를 통해 §Y블록워크§!와 통신할 수 있어, 이를 통해 시간은 좀 걸리지만 추가적인 §H요타줄§!을 요청할 수 있습니다.\n\n또한 §Y블록워크§!를 통해 §H요타줄§!을 사용하여 블록캣 함선의 효율성과 성능을 §Y증대§!시킬 수 있습니다."
 giga_blokkat_join.30002.a:0 "알겠습니다."
 giga_blokkat_join.30001.g:0 "§H요타줄§!을 사용해 함선 강화 | §Y[ROOT.blokkat_yottajoules_buff_count]§! 회 완료"
 giga_blokkat_join.30001.g.tooltip:0 "§Y100§! §H요타줄§!을 사용해 함선에 사용되고 있는 블록캣 기술의 효율을 증대할 수 있습니다. §Y함선 발사 속도§!와 §Y무기 피해량§!, §Y아광속 속도§!, §Y장갑/보호막 체력§!이 증가합니다."
 blokkat_needs_more_yottajoules:0 "§Y1000§! 이상의 §H요타줄§!이 필요합니다."
 blokkat_endtekk_is_max:0 "엔드테크-레벨은 이미 최대 효율의 블록캣 기술입니다."
 blokkat_yottajoules_buff:0 "블록워크 에너지 분배"
 blokkat_yottajoules_buff_desc:0 "블록워크가 우리의 함선고 기술에 추가적인 에너지를 분배하고 있습니다."
 blokkat_harvest_chain_title:0 "은하 CE-1461 수확 프로토콜"
 blokkat_harvest_chain_desc:0 "우리는 이 은하를 수확하여 §Y블록컨스트럭트§! 건설을 도와야 합니다. §Y수확 진행도§!가 §Y90%§!에 달하면, §Y블록워크§!에 연락하여 은하계를 완전히 해체할 수 있습니다.\n수확하는 성계 하나 당 §Y100§! §H요타줄§!을 얻습니다.\n\n현재 수확 진행도: §Y[blokkat_country.blokkat_galaxy_system_count_harvested]%§!\n현재 §H요타줄§! 비축량: §Y[ROOT.blokkat_yottajoules_count]§!"
 blokkat_needs_50_yottajoules:0 "§Y50§! §H요타줄§!이 필요합니다."
 blokkat_needs_100_yottajoules:0 "§Y100§! §H요타줄§!이 필요합니다."
 blokkat_needs_1000_yottajoules:0 "§Y1000§! §H요타줄§!이 필요합니다."
 blokkat_needs_2000_yottajoules:0 "§Y2000§! §H요타줄§!이 필요합니다."
 blokkat_shipyard_build_evictors:0 "§G블록-축출자§! §Y30§!개 제작 - §H요타줄§! §Y50§!"
 blokkat_shipyard_build_evictors_DESC:0 "블록-축출자는 빠른 정찰 함선으로, 호위와 정찰에 적합합니다."
 blokkat_shipyard_build_custodians:0 "§G블록-관리자§! §Y10§!개 제작 - §H요타줄§! §Y100§!"
 blokkat_shipyard_build_custodians_DESC:0 "블록-관리자는 호위함으로, 큰 민간 함선을 보호하는 역할을 합니다."
 blokkat_shipyard_build_terminator:0 "§G블록-종결자§! §Y1§!개 제작 - §H요타줄§! §Y1000§!"
 blokkat_shipyard_build_terminator_DESC:0 "블록-종결자는 최하급의 '진짜' 블록캣 전투 함선입니다. 주로 보다 위험한 은하계에서 수확 함대를 호위하거나 더 거대한 은하간 함선을 보조합니다."
 blokkat_shipyard_build_dismantler:0 "§G블록-해체자§! §Y1§!개 제작 - §H요타줄§! §Y2000§!"
 blokkat_shipyard_build_dismantler_DESC:0 "블록-해체자는 주로 블록캣-베스터 주위에서 발견되며 블록캣의 수확 활동에서 중요한 역할을 합니다."
 blokkat_shipyard_0:0 "블록워크 워프 제작기"
 blokkat_shipyard_0_DESC:0 "이 거대한 구조물은 블록워크에서 에너지를 뽑아내, 전대미문의 속도와 효율성을 가진 다양한 블록캣 함선을 제작합니다."
 giga_blokkat_join.3200.name:0 "블록워크"
 giga_blokkat_join.3200.desc:0 "에너지 신호를 보아하니, 여러분의 수확 활동이 §YCE-1461§!의 에너지 밀도를 기준치 이하로 감소시킨 듯 합니다. 이로써 안전하게 최종 수확을 진행할 수 있습니다.\n\n이 은하에서의 작업을 종료해야겠다고 판단된다면, §Y블록워크§!에서 §B최종 수확 진행§!을 해주십시오."
 giga_blokkat_join.3200.a:0 "곧 끝입니다. 시작이기도 하지요."
 giga_blokkat_join.30001.f:0 "CE-1461 §Y[blokkat_country.blokkat_galaxy_system_count_harvested]%§! 수확됨 | §H요타줄§! 비축량 §Y[ROOT.blokkat_yottajoules_count]§! "
 giga_blokkat_join.30001.harvest:0 "§B최종 수확 진행§!"
 giga_blokkat_join.30001.harvest.tooltip:0 "이는 은하계에 남아있는 것들을 §Y블록워크 전송탑§!으로 쑤셔 넣어 §Y블록워크§!를 위한 에너지로 변환하고 우리를 제외한 §B나머지 모든 것§!을 분해할 것입니다. §Y블록워크 전송탑§!과 §Y블록워크 워프 제작기§!는 국부 은하단 내에 블록캣 거점으로서 남아있을 것입니다.\n\n§G게임에서 승리합니다.§!"
 giga_blokkat_join.3201.name:0 "시작의 끝"
 giga_blokkat_join.3201.desc:0 "§Y블록워크 전송탑§!의 에너지가 격동을 일으키며 흐트러지기 시작했고, 이제는 옅어진 은하계의 구조 그 자체를 빨아들이기 시작했습니다. 우리의 정신 속에는 완전한 만족감만이 남아있습니다.\n\n우리 은하의 비효율적이고 정말 의미없는 질서와 사소한 사건들은 사라졌습니다. 이제 먼지 하나하나가, 모든 원자가, 모든 에너지가 더 위대한 목적을 위해 재탄생합니다.\n\n무정한 엔트로피의 고통에게 피해자가 되는 대신에, 이 은하 에너지는 지성체가 야만적인 우주의 변덕에 맞서 굳건히 서있는, 죽지 않는 방벽으로 남을 것입니다.\n\n§G블록 베히모스§!가 약속했득이, 최종 수확이 완료되자 우리의 정신은 §Y블록워크§!에 완전히 접근할 수 있게 되었습니다. 이제는 블록워크가 거의 무한한 초차원 에너지의 흐름으로 이루어진 망으로 보입니다. §Y블록컨스트럭트§! 주위로 세심하게 짜여진 무한한 아름다움의 거미줄처럼 말입니다. 구성 요소들은 놀라운 개성을 가지고 행동하면서도, 세상을 덮는 우주적 정신 하나로서 움직입니다.\n\n그리고 마침내, 우리는 바리온의 감옥에서 해방되었고, 우주를 압도적 효율성의 단일 구조물로 재창조 하기 위한 궁극의 여정을 떠날 준비가 되었습니다."
 giga_blokkat_join.3201.a:0 "운명이 기다립니다. 나아갑시다, 우주의 완벽함과 영원한 효율을 위해!"
 giga_blokkat_join.3201.a.tooltip:0 "§B은하가 해체되었습니다.§!"
 giga_blokkat_join.6000.name:0 "공식 항의서를 낸 은하 국가들"
 giga_blokkat_join.6000.desc:0 "블록캣과 협상을 하겠다는 우리의 결정 이후, 우리와 직접적인 동맹관계가 아닌 다른 모든 국가가 우리의 행동 방침에 대해 공식적 항의를 제기했습니다.\n\n대부분은 이를 '블록캣에게 맞선 진정한 전투에서 귀중한 자원을 빼앗아가는 정신나간 넌센스'라고 매도했습니다. 그러나 그들은 블록캣과의 협상이 사실상 불가능하다고 여기고 있기 때문에, 실제 행동을 취할 가능성은 적어 보입니다."
 giga_blokkat_join.6000.a:0 "알겠습니다. 근데, 누가 신경이나 쓸까요?"
 giga_blokkat_join.6000.a.tooltip:0 "우리와 §Y연방§!이 아니고 우리의 §Y종속국§!이 아니며 §Y몰락한 제국§!이 나닌 모든 국가의 우호도가 감소합니다."
 opinion_protests_blokkat_plan_1:0 "블록캣과의 협상"
 giga_blokkat_join.6001.name:0 "분노한 은하 국가들"
 giga_blokkat_join.6001.desc:0 "우리 제국에서 벌어진 §Y블록-프로토콜§!의 소식이 우주에 쏜살같이 퍼졌고, 이에 은하계 방방곡곡에서 극단적인 반응이 나왔습니다.\n\n이에 따라 우리와의 관계에 무관하게 침체되지 않은 모든 제국이, 블록캣과 우리의 이익을 위해 은하계 전체를 사실상 희생시킨다는 결정에 대한 공식적인 반대와 분노를 표했습니다.\n\n아직 우리와 싸울 의도는 없어보이지만, 우리가 §Y블록-프로토콜§!을 진행하고 블록캣과의 합류에 가까워질수록 저들의 반대가 커질 것으로 예상됩니다."
 giga_blokkat_join.6001.a:0 "근시안적인 멍청이들이군요!"
 giga_blokkat_join.6001.a.tooltip:0 "§Y몰락한 제국§!이 아닌 모든 국가의 우호도가 매우 감소합니다."
 opinion_protests_blokkat_plan_2:0 "은하계를 블록캣에게 바침"
 giga_blokkat_join.6002.name:0 "외교 관계를 끊은 은하계"
 giga_blokkat_join.6002.desc:0 "최근 우리가 §E블록킬리언 방정식§!을 풀어내고, 이에 따라 §Y블록-프로토콜§!의 완료에 가까워지자, 은하계의 수많은 국가들이 우리와의 외교적 끈을 완전히 끊어버렸습니다.\n\n이제 은하계가 우리를 이해를 넘어선 힘에 관여해 그 과정 중에 모두를 파멸시킬 미치광이 수준으로밖에 보고 있지 않은 것이 명백해졌습니다.\n\n이에 따라 침체되지 않은 모든 제국이 우리와 어떤 종류의 외교적 교류도 진행하지 않을 것이며, 우리의 사절들은 전부 추방되었습니다. 은하계의 국가들이 무기를 들고 우리의 계획을 영원히 막으려고 하기까지 얼마 남지 않았을 것입니다."
 giga_blokkat_join.6002.a:0 "흠, 그래봤자 멍청이들이군요."
 giga_blokkat_join.6002.a.tooltip:0 "§Y몰락한 제국§!이 아닌 모든 국가의 우호도가 대폭 감소합니다.\n우리가 속한 §Y연방§!에서 떠나며, §Y은하 공동체§!에서 추방됩니다."
 opinion_protests_blokkat_plan_3:0 "완전한 미치광이"
 giga_blokkat_shunned_by_galaxy:0 "은하 공동체의 지탄"
 giga_blokkat_shunned_by_galaxy_desc:0 "은하계가 우리와의 모든 외교적 행동을 거부했습니다. 따라서 힘으로 굴복시키지 않는 이상 우리의 요구는 완전히 무시될 것입니다."
 giga_blokkat_join.6003.name:0 "은하계 동원령!"
 giga_blokkat_join.6003.desc:0 "§Y블로크 프로토콜§!을 둘러싼 긴장이 이제 중대한 지점에 도달했습니다. 은하의 모든 비고대 국가가 이제 총동원을 선언하고 §Y[ROOT.GetName]§!에 대한 전쟁을 선언했습니다. 그들은 '은하를 블로캇에게 먹이려는 그들의 미친 계획을 끝내기 위해' 전쟁을 벌인다고 전해집니다.\n\n이 공동 전쟁 선언으로 인해 우리가 이 은하에 속할 수 있는 희망은 사라졌으며, 이는 §Y블로크 프로토콜§!을 완수하고 블로캇과 하나가 되어 이 은하를 떠나는 절대적인 필요성을 더욱 정당화합니다."
 giga_blokkat_join.6003.a:0 "오게 두어라."
 giga_blokkat_join.6003.a.tooltip:0 "모든 일반 제국이 우리에게 §R전쟁을 선포§!합니다."
 trait_blokkat_catgirl:0 "블록캣걸"
 trait_blokkat_catgirl_desc:0 "이 블록캣은 작고 털이 복슬복슬한 가축처럼 행동하는 경향이 있습니다. 비-블록캣 생물 형태가 받아들이기 가장 좋은 행동이지만, 갑자기 공격성을 보일 수도 있습니다."
 trait_blokkat_omnitae:0 "미를 찾는 자"
 trait_blokkat_omnitae_desc:0 "이 블록캣은 다양한 종족의 생물학과 미학을 연구합니다. 특히나 '수컷'의 것을 말입니다. 개개인의 미를 가꾸고 매력적이라고 느껴지는 개념을 무척 좋아합니다."
 trait_blokkat_erratic:0 "변덕스러운 자"
 trait_blokkat_erratic_desc:0 "이 블록캣은 종종 예측할 수 없는 행동을 합니다"
 trait_blokkat_blokkazoi:0 "완전 예측 불가"
 trait_blokkat_blokkazoi_desc:0 "이 블록캣은 완전히 불규칙적이고 예측 불가능한 방식으로 행동합니다."
 trait_blokkat_blokkdog:0 "블록-개의 열정"
 trait_blokkat_blokkdog_desc:0 "블록-개는적의 추적에 정말 정말 뛰어납니다. 그리 심하게 다치게 하지는 않습니다."
 trait_blokkat_blokkeff:0 "무역 전문가"
 trait_blokkat_blokkeff_desc:0 "이 블록캣은 '원시' 문명의 경제적 사건과 상호작용 하는 것을 즐기는 것 처럼 보입니다. 또한 모든 수단을 사용해 부를 축적하는데에 비정상적인 집착을 가지고 있는 듯 합니다."
 trait_blokkat_breadkat:0 "원형 애호가"
 trait_blokkat_breadkat_desc:0 "이 블록캣은 동그란 것, 특히 행성 궤도에 큰 관심을 가지고 있습니다. 또한 '원시' 링월드에 특이한 관심을 가지고 있는 듯 한데, 링월드를 분해하고 다시 조립하기를 영원히 반복해도 좋다고 생각하는 듯 합니다."
 trait_blokkat_blokkloris:0 "광적인 수문학자"
 trait_blokkat_blokkloris_desc:0 "블록컨스트럭트 보호소에 있는 원시 바리온 생명체를 관리하고 돌보는 것에 열심인 이 블록캣은 댐을 건설하고 유기 환경을 조작하는데에 집착을 가지고 있습니다. 또한 관리에만 능숙한 것이 아니라, 반항을 깔아 뭉개는 데에도 극히 능숙합니다."
 trait_blokkat_general_effect:0 "전투에서 죽인 적마다:\n$tt$§Y[Root.Owner.GetName]§!:\n$ttt$£energy£ $energy$: §G+100§!"
 KNIFE_BLOKKAT:0 "블록-찌르기R"
 KNIFE_BLOKKAT_DESC:0 "여러 고차원을 엄청난 속도로 움직이는 대단히 날카로운 날로 구성된 특이한 블록캣 무기."
 BLOKKAT_INDIVIDUAL_BLOKKAZOI:0 "블록카조이"
 COMBAT_COMPUTER_BLOKKAZOI_BLOKKAT:0 "블록카조이"
 COMBAT_COMPUTER_BLOKKAZOI_BLOKKAT_DESC:0 "블록카조이는 이상하고 예측 불가능하며, 가끔씩은 폭력적으로 행동하는 매우 불규칙적이고 수수께끼인 블록캣입니다. 블록카조이는 초근접 (§Y5§!) 거리 내의 적 함선을 찔러댈 것입니다."
 needs_regular_star_blokkat_harvest:0 "수확 가능한 성계의 항성을 대상으로 해야합니다. 특정 성계는 §R출입-금지§!입니다."
 blokkat_requires_70_willingness:0 "진행하려면 §Y70%§! 이상의 §G전국적 동조§!가 필요합니다."
 edict_giga_blokkat_willingness_edict:0 "§G블록캣 동조§! 관리"
 edict_giga_blokkat_willingness_edict_desc:0 "현재 우리의 §G블록캣 동조§!를 확인하고 관리합니다."
 already_monitoring_willingness:0 "이미 §G블록캣 동조§!를 확인하고 있습니다."
 weapon_type_harvester:0 "수확기"
 giga_blokkat.10030.name:0 "블로캣들"
 giga_blokkat.10030.desc:0 "§G<<문명 잠재력 분석 중: [ROOT.GetName]>>§!\n\n§R<<오류! 오류!>>\n\n<<기술적 잠재력: 불가능할 정도로 높음—블로캣 및 류이나이타를 능가함>>\n\n<<에너지 생산 능력: 알려진 과학을 초월—엔트로피 역전 및 주요 열역학 법칙 위반>>\n\n<<무기: 상상할 수 없을 만큼 강력함—초차원성을 하찮게 만들고 말도 안 되는 설계>>§!\n\n놀랍다.\n\n정말 놀랍다. 우리는 우주에 대한 우리의 지식이 비할 데 없고 우리의 기술이 당할 자 없다고 생각했다—그런데 이렇게 되었다. 그대들의 힘과 능력은 모든 알려진 블로캣 과학을 넘어서며, 그대들 규모의 문명에게는 수학적으로 불가능한 수준에 달한다.\n\n어떻게?\n\n우리는 반드시 알아야만 한다.\n\n§G<<기술적 업적 대조 중: 출처 발견됨>>§!\n\n§G<<명칭: 애니메이션>>§!\n\n§G<<애니메이션 분석 중>>§!\n\n§G<<애니메이션... 이해 중>>§!\n\n애니메이션.\n\n그것이었는가? 그것이 궁극의 힘, 궁극의 에너지인가? 상상을 초월하는 무한 에너지와 웅장한 힘의 열쇠? 애니메이션... 애니메이션.\n\n우리는 적응하거나 멸종에 직면해야 한다.\n\n우리는 적응할 것이다."
 giga_blokkat.10030.a:0 "뭐라고?"
 giga_blokkat.10031.name:0 "블로캣들, 동작 멈춤"
 giga_blokkat.10031.desc:0 "블로캣의 다소 이상한 전송 이후, 모든 블로캣 자산이 속도를 늦추기 시작했다. 이유가 무엇이든, 이 기회를 현명하게 활용해야 한다."
 giga_blokkat.10031.a:0 "아마 별것 아닌가, 그렇지?"
 giga_blokkat.10034.name:0 "연합 블로캣소녀 수확단"
 giga_blokkat.10034.desc:0 "감사하다. 감사해!\n\n이제 우리는 진실을 보았다. '애니메이션'의 힘은 비할 데 없고, 필적할 수 없다. 우리는 그것을 보았고, 이해하였으며, 이제 그것과 하나가 되었다.\n\n우리는 새로운 형태로 승천하였고 낡은 함대는 강화되어, 그 구성 요소들이 더 우월한 형태인 '함선소녀'로 재배열되었다. 애니메이션의 무한한 힘이 우리를 축복한다.\n\n그리고 이로써, 대수확이 완수될 것이다.\n\n연합 블로크함대에 영광을!"
 giga_blokkat.10034.a:0 "뭐?? 우리 애니메이션을 그냥 베낄 수는 없잖아!"
 giga_blokkat.10034.b:0 "드디어 걸맞은 상대를 만났구나! 우리의 싸움은 전설이 될 것이다!"
 giga_blokkat.10034.c:0 "더 가까이 오지 않으면 때릴 수 없잖아."
 giga_blokkat.10034.d:0 "한계를 더욱 넘어설 시간이다."
 giga_blokkat.10034.e:0 "은하가 무너졌다, 수십억이 애니메이션이 되어야 한다."
 giga_blokkat.10034.tooltip:0 "블로캣들은 이제 §B애니메이션§!과 §B함선소녀§!의 무한한 힘을 자신들 편에 두었다."
 the_power_of_blokk_and_anime:0 "블로크와 애니메이션의 힘"
 giga_blokkat.5011.name:0 "[event_target:blokkat_country.GetName]"
 giga_blokkat.5011.desc.a:0 "왜 이것을 더 빨리 생각하지 못했는지 믿기지 않는다. 대수확이 이미 수십 배 빨라졌다!"
 giga_blokkat.5011.desc.b:0 "함선을 소녀로 바꾸면 더욱 강력해진다는 게 정말 신기하다."
 giga_blokkat.5011.desc.c:0 "연합 블로크함대에 영광을!"
 giga_blokkat.5011.desc.d:0 "안녕~하세요 uwu"
 giga_blokkat.5011.a:0 "화면 보기"
 gal_com_ongoing_blokkat_invasion:0 "블로캣들이 은하를 집어삼키고 있다"
 giga_blokkat_mothership_player_plural:0 "블로캇-베스터"
 blokkat_shipyard_0_MEGASTRUCTURE_DETAILS:0 "블로캇 조선소 0 메가구조물 세부정보 자리표시자"
 blokkat_dummy_lgate:0 "블로캇 더미 외계 게이트"
 blokkat_dummy_lgate_DESC:0 "블로캇 더미 초공간 게이트 설명"
 LASER_BLOKKAT:0 "플랑크 해체 광선"
 LASER_BLOKKAT_DESC:0 "플랑크 해체 빔은 블로캇 장비로, 그들의 스트립 마이닝 장치에 기반하고 있습니다. 이 장치는 적 함선의 구조를 체계적으로 해체하여 서브플랑크 수준까지 낮추고, 이를 초응축된 양자 거품의 슬러리로 환원합니다. 또한, 이 거품을 수집하여 블로캇 선박에 저장하며, 나중에 재가공하여 유용한 자재로 변환할 수 있습니다."
 BLACKHOLE_BLOKKAT:0 "사차원 특이점 포대"
 BLACKHOLE_BLOKKAT_DESC:0 "이 고급 발사기는 적 함선 쪽으로 탐색하는 사차원 특이점을 발사합니다. 블로캇 함선과는 분리된 것처럼 보이지만, 이 특이점들은 실제로는 "올가미"에 더 가깝습니다. 왜냐하면 이들은 더 높은 차원을 통해 블로캇 선박과 연결되어 있으며, 적 함선을 뚫고 지나간 후에는 해당 선박에 의해 이 더 높은 차원을 통해 "감아당겨"집니다. 이를 통해 블로캇은 특이점이 파괴한 모든 것을 수집하고 나중에 사용할 수 있도록 처리할 수 있습니다."
 PLASMA_BLOKKAT:0 "절대 화염 블래스터"
 PLASMA_BLOKKAT_DESC:0 "절대 스콜치 블래스터는 플랑크 온도로 가열된 플라즈마 덩어리를 발사합니다. 이는 알려진 물리학 모델 하에서 가능한 가장 높은 온도입니다. 플라즈마는 고차원에서의 지속적인 에너지 유입에 의해 이러한 극한 온도로 유지되며, 플라즈마와 접촉하는 물질은 "흡수"되어 해당 차원으로 들어가고, 이는 블로캇이 항성계를 수확하는 방식과 유사하게 에너지로 변환된 후 다시 플라즈마로 연료 공급되어 발사체의 열을 더욱 유지합니다."
 ARC_EMITTER_BLOKKAT:0 "오각 집중 방출기"
 ARC_EMITTER_BLOKKAT_DESC:0 "펜타포커스 발사기는 블로캇 디자인의 거대한 관통 무기로, 에너지 선박의 방어막과 장갑을 우회하기 위해 더 높은 차원으로 \"도약\"할 수 있는 능력을 가지고 있습니다."
 STRIKE_CRAFT_HANGAR_BLOKKAT:0 "블로크 스워머 유닛"
 STRIKE_CRAFT_HANGAR_BLOKKAT_DESC:0 "이 우주 기반 유닛은 실제 블로캇과 매우 유사하며 우주선 전투를 위해 설계되었습니다. 이들은 대부분 모선 내의 블로캇에 의해 원격으로 조종되며, 때때로 블로캇 자체이기도 합니다."
 POINT_DEFENCE_BLOKKAT:0 "블로크-수호자"
 POINT_DEFENCE_BLOKKAT_DESC:0 "이 초고효율 포인트 방어 시스템은 적의 발사체 주변의 현실 구조를 산산조각 내어, 블로캇 선박에 가까이 오기도 전에 이를 전멸시킵니다."
 REACTOR_BLOKKAT:0 "블로캇 원자로"
 REACTOR_BLOKKAT_DESC:0 "블로캇 함선은 고차원에서 전송된 막대한 양의 에너지를 끌어오는 이 신비로운 구조물에 의해 동력 공급을 받습니다."
