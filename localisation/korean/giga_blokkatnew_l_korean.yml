l_korean:
 giga_core_black_hole_exists:0 "§Y은하 코어§!에 접근 가능하므로, 다른 블랙홀과 마찬가지로 직접 뛰어들 수 있습니다."
 giga_blokkat.3000.cosmovester:0 "§G블로카트-베스터§!에 뛰어들기 | §Y50§! $blokkat_knowledge$"
 giga_blokkat.3000.cosmovester.tooltip:0 "블로카트-베스터의 중심에 일종의 특이점이 있는 것 같습니다. 어쩌면... 정말 어쩌면, 호라이즌 니들이 그곳으로 데려다줄 수 있을지도 모릅니다. 다만 초차원 방벽을 우회하려면 §G블로카트 지식§!이 대량으로 필요합니다."
 crisis.7510.vester:0 "블로카트-베스터에 블랙홀이 있지 않습니까?"
 crisis.7510.vester.tooltip:0 "블로카트-베스터로 뛰어드는 §B블로카트 연구 프로젝트§!가 §Y블로카트 연구소§!에 §Y50§! §G블로카트 지식§! 비용으로 추가됩니다.\n이 옵션을 선택하면 §Y초차원 불안정화 장치§!의 사용이 §R비활성화§!됩니다."
 JUMP_INTO_BLOKKAT_VESTER:0 "블로카트-베스터에 뛰어들기"
 JUMP_INTO_BLOKKAT_VESTER_DESC:0 "블로카트-베스터의 중심에는 블랙홀과 유사한 구조가 있어 뛰어들 수 있을 것 같습니다. 하지만 먼저 호라이즌 니들로 초차원 불안정화 장치를 우회하는 방법을 찾아야 합니다."
 giga_blokkat.3340.name:0 "베스터에 뛰어들 것인가?"
 giga_blokkat.3340.desc:0 "블로카트-베스터의 중심에는 블랙홀과 유사한 구조가 있는 것 같습니다. 연구소의 가장 대담한 구성원들은 호라이즌 니들을 이용해 그곳으로 뛰어들자고 제안했습니다... 결과가 좋든 나쁘든 간에.\n\n무엇을 기대할 수 있을지 전혀 알 수 없습니다. 블로카트-베스터를 탈취하거나, 블로카트들이 수확한 에너지 비축분을 활용할 수 있을지도 모릅니다... 아니면 즉사할 수도 있습니다. 가능성은 흥미롭고 불확실한 만큼 무한합니다.\n\n하지만 이 프로젝트를 추진하려면, 호라이즌 니들로 베스터의 방벽을 우회하는 방법에 상당한 자원을 투자해야 합니다. 그렇지 않으면 우주선 선체에 쩍 달라붙은 우주 파리처럼 끝나게 될 것입니다."
 giga_blokkat.3340.a:0 "이제 돌아올 수 없습니다."
 giga_blokkat.3341.name:0 "심연 속으로"
 giga_blokkat.3341.desc:0 "호라이즌 니들에 탑승한 우리 문명은 블로카트-베스터 진입을 앞두고 전원이 숨을 죽입니다. 제국 역사상 가장 무모한 도전이라 할 수 있습니다. 시스템을 점검하고 편집을 준비한 뒤... 도약이 시작됩니다.\n\n블로카트 모함이 불과 수백 킬로미터 앞에 완전히 모습을 드러냅니다. 동심원 고리들이 장엄하면서도 두려움을 자아냅니다. 지체 없이 니들은 주변을 감싼 파괴 불가능한 초차원 방벽을 통과하기 위해 연속 편집을 감행합니다. 방벽은 수 마이크로초 만에 재형성되지만, 그 순간이면 충분합니다.\n\n그리하여 우리는 블로카트의 파괴 도구 심장부에 자리한 신비한 특이점 속으로, 근무한 시공간 왜곡에 의한 소멸을 피하기 위해 편집에 편집을 거듭하며 뛰어듭니다..."
 giga_blokkat.3341.a:0 "미지의 세계로."
 giga_blokkat.3342.name:0 "블로키무한의 저편"
 giga_blokkat.3342.desc:0 "믿기 어렵게도, 우리는 §Y블로크워크§!에 진입한 것 같습니다. 끝없이 흘러내리는 에너지의 흐름이 니들을 에워싸며, 블로카트-베스터에서 은하간 공간 어딘가의 미지의 중심부를 향해 쏟아집니다.\n\n그리고 이것 하나가 아닙니다. 수백... 아니, 수천, 심지어 수만 개의 그러한 에너지 흐름이 이곳에서 뒤얽혀 있으며, 모두 수많은 은하들을 해체하고 있는 블로카트-베스터들에서 비롯됩니다.\n\n흥미롭게도, 베스터들에서 오는 흐름 외에도 은하간 공간의 텅 빈 구역들로 향하는 수많은 다른 흐름들이 있는 것 같습니다. 마치 허허벌판 한가운데에서 거대한 블로카트 작전을 수행하는 것처럼.\n\n하지만 우리의 관찰은 우리가 여기서 환영받지 못한다는 명백한 깨달음으로 인해 중단됩니다. 에너지를 전달하도록 설계된 블로크워크는 우리의 고체 물질 덩어리에 친절하지 않습니다. 매초 수조 번의 편집으로 문명을 유지하며 니들을 무로 갈아버리려 합니다.\n\n돌아가기엔 너무 늦었지만, 니들이 이를 영원히 견딜 수 없으므로 서둘러야 합니다. 이 지옥에서 탈출하기 위한 선택을 해야 합니다: 블로크워크의 모든 것의 원천으로 보이는 곳으로 향할 것인가, 아니면 다른 곳으로 돌파할 것인가?"
 giga_blokkat.3342.a:0 "모든 것의 근원을 향해 나아갑시다!"
 giga_blokkat.3342.b:0 "이 지긋지긋한 곳에서 떠나야 합니다!"
 giga_blokkat.3343.name:0 "무모한 탈출"
 giga_blokkat.3343.desc:0 "서둘러 중심부에서 멀어지려 하며, 니들의 마지막 능력을 쏟아부어 은하간 공간으로 방출되는 에너지 흐름을 향해 블로크워크를 가로질러 질주합니다. 니들이 거의 산산조각 날 순간 직전, 비유적인 뜨거운 프라이팬에서 벗어났지만... 불속으로 떨어집니다.\n\n우리는 은하간 공허 속의 거대한 우주 전투 한복판에 내던져집니다! 우리 은하를 천 번은 날려버릴 수 있는 어마어마한 블로카트 함대가, 우리가 여태 본 것보다 훨씬 거대한 수만 척의 함선으로 이루어진 채, 중심에 특이점을 동력으로 삼는 미지의 날렵한 선박들의 함대와 교전 중입니다.\n\n그리고 어찌된 일인지, 우리도 영향을 미치고 있습니다. 블로카트 함대가 우리 선박이 자신들의 에너지망에서 나타난 것을 처리하는 데 몇 나노초 동안 멈칫합니다. 이것이 미지의 적들에게 귀중한 시간을 벌어주어 시공간을 뒤흔드는 일제 사격을 가하게 하고, 블로카트 선박들 일부를 전례 없는 맹렬함으로 폭발시키는 한편 나머지는 우주 심연으로 후퇴하게 만듭니다.\n\n블로카트들이 탐지 범위 밖으로 사라지자, 날렵한 선박들이 우리를 향해 돌아서더니 잠시 무언가를 처리하는 것 같더니, 그중 하나에서 통신이 수신됩니다. 그들이 우리에게 연락을 취하고 있습니다!"
 giga_blokkat.3343.a:0 "저... 화면에 띄우시오."
 giga_blokkat.33441.name:0 "???"
 giga_blokkat.33441.desc:0 "§H선박들이 우리 의식에 직접 정보를 전송하는 것 같습니다... 그들의 기술은 우리보다 명백히 훨씬 앞서 있습니다. 니들 전체에 나지막한 윙윙거림이 들립니다. 그들이 우리를 스캔하는 것 같습니다.§!\n\n...방금 블로크워크를 통해 이동한 것입니까? 놀랍습니다! 경이롭습니다! 정말 믿기 어렵습니다! 우리는... 수많은 단일 은하 원시 문명들이 여러 장치로 그런 시도를 하는 것을 보았지만, 실제로 블로카트가 아닌 다소 온전한 선박이 거기서 나오는 것은 전례가 없습니다. 그 낮은 기술 수준으로 이런 선박을 만들어낸다는 것은 정말 대단한 창의력입니다."
 giga_blokkat.33441.a:0 "당신들은 누구, 혹은 무엇입니까?"
 giga_blokkat.3344.name:0 "대은하간 연방"
 giga_blokkat.3344.desc:0 "아, 물론입니다. 당신들은... 우리에 대해 모르는군요. §Y대은하간 연방§!은 수십만 개의 은하간 문명들로 이루어진 동맹입니다... 모두 블로카트 수확자들의 위협에 맞서 단결했습니다! 그리고 방금 그 영광스러운 승리를 목격하셨습니다.\n\n오, 제 소개를 잊었군요. 저는 §Y스테로§!, 류이나이트이자 §Y은하수 전구§!의 §Y보편 구원 기동대§! 총사령관으로서 블로카트 위협에 대한 작전 관리를 담당하고 있습니다.\n\n우리 동맹은 주로 우리 지도자 §Y큐이나이§!가 이끄는 §Y류이나이트 제국§!과 §Y보편 의회§!의 지원 아래 운영되며, 후자는 우리의 관료적 체계 대부분을 감독하고 극도로 많은 회원국들 사이의 조율을 보장합니다.\n\n이 전쟁은 수십억 광년과 수만 년에 걸쳐 치러지므로... 우리는 가능한 한 단결을 유지하는 것이 무엇보다 중요합니다. 그렇지 않으면 블로카트들이 먼지처럼 쓸어버릴 것입니다."
 giga_blokkat.3344.winning:0 "그래서, 블로카트들을 이기고 있습니까?"
 giga_blokkat.3344.winning.response:0 "우리는 수십 밀레니엄 동안 이 끔찍한 수확자들을 파괴하려 해왔습니다. 그들은 지금까지... 무수히 많은 사망자를 낳았고 추정 300억 개의 은하를 집어삼켰으며, 그 수는 계속 늘어나고 있습니다.\n\n음. 솔직히 말씀드리자면, 아직 이기고 있다고는 말할 수 없습니다. 주로 그들을 막고 대피시키며... 류이나이트 핵심 구역에서 그들을 몰아내는 것이 고작입니다. 사실상 소모전이죠.\n\n대부분의 전투에서 진정으로 이길 수 없습니다. 블로카트 함선들은 수가 많고, 강력하며, 민첩합니다. 하지만 그들이 은하를 먹어치워 얻는 것보다 더 많은 에너지를 소모하게 만들 수 있습니다... 그러면 언젠가는 수지가 맞지 않게 되겠죠.\n\n우리는 그들을 막다가 진정한 반격을 개시할 수 있기를 바랍니다... 아마도 몇만 년 안에요."
 giga_blokkat.3344.ships:0 "저 거대한 함선들은 무엇입니까?"
 giga_blokkat.3344.ships.response:0 "우리가 사용하는 함선은 §Y특이점함§!이라고 합니다. 블로카트 세력에 대항하는 주요 군사 자산으로, 우리의 든든한 기둥이죠. 전 보편 전장에 걸쳐 약 1조 척이 있으며, 블로카트들을 막으려면 모두 일사불란하게 협력해야 합니다.\n\n아시다시피, 특이점을 활용해 현실과 상호작용하고 이동 및 공격을 위해 물리 법칙을 국지적으로 변경합니다... 본질적으로 당신들이 만든 이 호라이즌 니들을 무기화한 버전입니다.\n\n당신들 것은... 음, 상당히 조잡하고 매우 임기응변식이지만, 다시 말씀드리지만, 단일 은하의 자원과 기술로 그런 것을 만들다니? 정말 인상적입니다! 박수를 보냅니다. 보통 단일 은하 원시 문명들은 그런 장치를 만들려다 비참한 방식으로 죽고 맙니다."
 giga_blokkat.3344.appearance:0 "이것이 당신의 진짜 모습입니까?"
 giga_blokkat.3344.appearance.response:0 "예... 이기도 하고 아니기도 합니다. 우리 류이나이트는 스마트 물질로 이루어져 있습니다... 안타깝게도 블로카트와 비슷하지만, 방법은 약간 다릅니다.\n\n저는 이 형태가 특히 마음에 들어서 이를 사용하지만, 원하면 무엇으로든 변할 수 있습니다. 제 실제 의식은 이 함대에 탑승해 있는 것이 아니라 몇 백만 광년 떨어진 요새화된 마트료시카 브레인 클러스터에서 호스팅되고 있습니다.\n\n겁쟁이처럼 들릴 수 있지만, 블로카트에 대해 어떤 위험도 감수할 수 없습니다! 그들도... 마찬가지이기도 합니다. 아, 그리고 블로카트를 포획했다면... 고생만 하셨군요! 당신들이 얻은 것은 실제 블로카트의 백업 시뮬레이션을 실행하는 블로카트 차대뿐입니다... 실망스럽죠. 죄송합니다."
 giga_blokkat.3344.deepshroud:0 "블로카트가 없는 더 젊은 우주로 떠나는 것을 시도해본 적은 없습니까?"
 giga_blokkat.3344.deepshroud.response:0 "다른 우주로 가는 것이요? 흠. 당신들 종족이 꽤 대담하다는 걸 알 수 있지만, 거기에 무엇이 있는지 아시기나 합니까? 다중우주라고 부를 수 있다면... 위험하고, 치명적이며, 예측 불가능합니다. 거기에는 당신들 은하의 얕은 차원 수호자들을 무력한 동물처럼 보이게 만드는 존재들이 있습니다!\n\n음, 솔직히 말씀드리자면. 어쩌면 충분한 노력으로 그렇게 할 수도 있겠죠. 하지만... 그러면 블로카트들이 이 우주를 자유롭게 지배하여 막힘 없이 모두 집어삼킬 것입니다.\n\n그리고 그 다음은요? 그러면... 어쩌면 그들도 돌파하여, 우리가 피신한 어떤 현실에서든 다시 우리를 위협하겠죠. 그러므로 블로카트를 바로 지금, 바로 여기서 막아야 합니다. 그렇지 않으면 그들이 어디까지 갈지 알 수 없습니다."
 giga_blokkat.3344.blokkonstrukt:0 "블로크워크에 중심부가 있습니다. 그것은 무엇입니까?"
 giga_blokkat.3344.blokkonstrukt.response:0 "그것은... §Y블로크콘스트룩트§!입니다. 비열한 테라구조물로, 길이가 1광년이 넘으며, 블로카트들이 수천억 개의 은하에서 수확한 에너지를 하나로 합쳐 넣은 것입니다. 그들은 결국 존재하는 모든 것을 열죽음을 막기 위해... 다른 모든 것의 희생으로 이 안에 접어 넣으려 합니다.\n\n우리는 오직 그것이 파괴되는 것을 보고 싶을 뿐입니다."
 giga_blokkat.3344.join:0 "우리도... 합류할 수 있을까요?"
 giga_blokkat.3344.join.response:0 "블로카트에 맞서 싸우는 우리에게 합류하고 싶다고요? 기꺼이 환영합니다! 보통 블로카트-베스터를 격퇴한 문명에게만 연락하지만, 당신들은 블로크워크 여행에서 살아남는 놀라운 창의력을 발휘했습니다.\n\n자, 제대로 된 특이점함의 청사진을 드리고, 당신들의 니들을 은하간 전쟁에 적합한 진정한 전함으로 업그레이드하도록 도와드리겠습니다! 그리고 블로카트들에게 진정한 우주의 주인이 누구인지 보여주겠습니다. 그렇죠?"
 giga_blokkat.3345.name:0 "우주를 구하기 위해"
 giga_blokkat.3345.desc:0 "이 현실을 떠나려는 다소 이기적인 계획을 버리고, 블로카트에 맞선 보편적인 투쟁에서 대은하간 연방을 돕는 훨씬 고귀한 목표에 집중하기로 했습니다.\n\n얼마 지나지 않아 G.I.F.의 외교를 담당하는 류이나이트 §Y디임 밀리제§!가 연락을 취해와 연방의 운영 방식을 소개한 뒤, 우리는 공식적으로 이 은하간 동맹에 가입합니다.\n\n니들은 거대한 특이점함 함대의 호위를 받아 인근 요새 은하로 이동됩니다. 그곳에서 우리는 상상을 초월하는 청사진과 기반 시설을 제공받아, 니들을 이전에 우리 은하를 포위하던 블로카트 함대를 쉽게 괴멸시킬 수 있는 강력한 전함으로 탈바꿈시킬 수 있게 됩니다.\n\n이 기술적 도약에 익숙해지는 데 몇 년이 걸렸으며, 덕분에 우리 코스모게네시스 프로젝트에서 실제로 이해하지 못한 요소들이 얼마나 많았는지 파악하게 됩니다. 하지만 결국 류이나이트 교관들의 도움으로 우리 최고의 엔지니어와 과학자들이 이 웅장한 업그레이드를 완성합니다...\n\n...그리하여 출발합니다! 새롭게 탄생한 특이점함을 다른 함대와 합류시켜, 블로카트 위협을 먼저 저지하고, 그 다음 막으며, 어쩌면... 창조 전체를 구하는 임무를 시작합니다."
 giga_blokkat.3345.a:0 "앞으로 나아갑시다!"
 giga_blokkat.3344.blackhole:0 "가장 가까운 블랙홀까지 호위해줄 수 있겠습니까?"
 giga_blokkat.3344.blackhole.response:0 "아, 맞아요. 당신들의 코스모게네시스 프로젝트를 다시 추진하고 싶으신 거죠...? 유감스럽게도 양심적으로 그렇게 할 수 있도록... 허용할 수 없습니다. 이것이 보통 어떻게 끝나는지 너무 많이 봐왔습니다! 99%의 경우는... 시도하는 모든 이들이 어떻게든 비참하게 죽습니다. 그냥 당신들 선박을 스캔해서 안전한 장소로 데려다드리겠습니다, 알겠죠?"
 giga_blokkat.33451.name:0 "시설"
 giga_blokkat.33451.desc:0 "우리의 요청에 따라 G.I.F.는 나노입자 같은 물질의 작은 구름을 배치하여 잠시 우리 선박을 연구합니다. 아마 블로크워크 여행을 분석하고 이해하기 위해서겠죠. 같은 물질이 더 많이 나타나 니들을 수리하여 다시 완전히 작동 가능한 상태로 만들더니... 갑자기 우리를 완전히 에워싸며 탑승자 전원을 의식 불명에 빠지게 합니다!\n\n불확실한 시간이 지난 후 깨어나 보니, 여전히 니들 안에 있지만 어딘가 깊은 은하간 공간의 거대한 메가구조물 안에 있습니다. 눈앞, 구조물 중심에는 우리 전 은하의 성간 균열과 유사한 시공간의 큰 균열이 있으며, 다양한 장치들이 강제로 그것을 열어두고 있습니다.\n\n갑자기 우리의 마음속에 목소리가 울려 퍼집니다."
 giga_blokkat.33451.a:0 "이번엔 누구입니까...?"
 giga_blokkat.33454.name:0 "The F.S.A.E."
 giga_blokkat.33454.desc:0 "안녕하시오, 단일 은하 원시 문명들이여. 제가 말씀드릴 내용은 극비 사항이지만, 어차피 곧 떠나실 것이니 크게 상관없겠죠.\n\n이름은 §Y에드가 넥슨§!, §Y이상 존재 연방 관리국§!(§YF.S.A.E.§!)의 수장입니다. 우리의 임무는 이 우주에서... 그리고 그 너머에서 일어나는 기이한 현상들을 기록하는 것입니다.\n\n스테로가 상부에 당신들의 블로크워크 다이빙 공적을 알린 후 비밀리에 당신들을 픽업했는데, 그것이 우리의 주의를 끌었습니다. 특히 같은 일을 또 하고 싶어 한다는 점에서요! 당신들이 §Y프로푼둠§!의 성질에 그다지 익숙하지 않다는 것을 알 수 있는데, 사실 진정으로 이해하는 자가 없으니 그것은 탓할 수 없습니다."
 giga_blokkat.33454.place:0 "지금 우리는 어디에 있습니까?"
 giga_blokkat.33454.place.response:0 "§Y성간 여행§!, 즉 당신들이 종종 부르는 다중우주 여행을 연구하기 위한 심우주 §YF.S.A.E. 기지§! 안에 있습니다. 그 안에 수백 개의 안정화된 성간 균열이 있는데, 아마 그런 것에 익숙하시죠?\n\n다만, 어떤 은하에서든 발견할 수 있는 것들은 장기적으로 불안정하여 §Y프로푼둠§!의 격동하는 에너지 특성상 자체적으로 연결을 끊어버리는 경향이 있습니다. 그래서 이 시설의 주요 목표는 장기적으로 그것들을 안정시키는 방법을 찾는 것입니다."
 giga_blokkat.33454.deepshroud:0 "프로푼둠이라고요...?"
 giga_blokkat.33454.deepshroud.response:0 "좋습니다, §Y프로푼둠§!은... 때로 §Y깊은 차원§!이라고도 불리는데... 원하신다면 다중우주의 구조라고 할 수 있습니다. 접근 가능한 모든 우주 또는 영역들이 떠다니는 거대한 수프 같은 것이죠.\n\n때로 연결이 형성되지만, 대체로 매우 불안정하거나 위험해서 신뢰할 수 있는 양방향 우주간 여행은... 거의 불가능합니다. 그리고 당신들은... 특히 대담합니다. 당신들의 코스모게네시스 프로젝트가 본질적으로 블랙홀을 통해 이러한 영역들 중 하나로 건너가려는 시도였으니까요. 인상적이지만, 거의 자살 행위에 가깝습니다.\n\n적합한 우주에 도달할 확률은 낮고, 현실 사이에 잠복해 있는 수많은 존재들, 즉 자신들의 기괴한 아가리 속으로 무언가 떨어지기만을 기다리는 것들을 만날 가능성이 매우 높습니다."
 can_leave_thanks_to_fsae_tooltip:0 "먼저 어떤 상황인지 물어봅시다."
 giga_blokkat.33454.why:0 "그래서, 우리가 왜 여기 있습니까?"
 giga_blokkat.33454.why.response:0 "간단합니다. 당신들의 블로크워크 여행이라는 작은 위업이 상당히 놀라웠고, 니들 연구를 통해 꽤 많은 귀중한 데이터를 얻었으므로, 그 보답을 하는 것입니다.\n\n앞에 있는 것은 크고 안정화된 §Y성간 특이점§!입니다. 당신들 종족에게 또 다른 영역, 즉 당신들이 애초에 원했던 것처럼 §Y젊고 조작하기에 준비된§! 영역으로의 다소 안전한 경로를 제공할 것입니다. 블로카트-베스터에 뛰어들기로 선택하기 전에 말이죠... 어째서인지.\n\n그냥 언제든지 뛰어드세요. 우리가 같은 일을 하지 않는 이유가 궁금하시다면... 글쎄, 이걸 너무 많이 하면 어떤... 반갑지 않은 주의를 끌게 된다는 것만 아십시오. 그러니 서두르세요, 그렇지 않으면..."
 giga_blokkat.33454.leave:0 "우리는 떠날 준비가 되었습니다."
 giga_blokkat.33454.leave.response:0 "좋습니다. 하던 대로 하시고 빨리 해주세요. 그리고 행운을 빕니다. 클트리치화되지 마세요. 프로푼둠에 너무 오래 있지 마세요. 들어가서, 나오고, 꾸물거리지 마세요!"
 giga_blokkat.33455.name:0 "다시, 무한을 향해"
 giga_blokkat.33455.desc:0 "빠르게 니들을 작동시켜 성간 특이점으로 뛰어들며, 통과를 살아남기 위해 편집을 거듭합니다.\n\n결과는 만족스럽습니다. F.S.A.E.에 의해 미세 조정된 것으로 보이는 성간 특이점이 우리 앞에 굴복하여, 니들이 잠시 프로푼둠의 흐름을 가로질러 이동하게 합니다. 이제 어떤 에테르 같은 경로를 따라 현실들 사이의 공간을 매끄럽게 이동하고 있지만, 우리의 채워지지 않는 호기심이 다시 돌아옵니다.\n\n넥슨은 속도를 늦추지 말라고 경고했지만, 일부 사람들은 저항할 수 없습니다. 곧 우리 문명의 상당 부분이 니들을 느리게 해서 프로푼둠의 성질을 더 자세히 연구하고, 무엇보다 우리 눈으로 직접 볼 수 있게 해달라고 요청하고 있습니다.\n\n이 다중우주적 구조의 근본적인 본질 속에 어떤 경이로움, 어떤 불가지론적 경이가 숨어 있을까요? 그것이 우리를 부릅니다. 현실의 근본적인 본질을 선명하게 볼 수 있는 유일한 기회일 수 있습니다. 어떻게 해야 할까요?"
 giga_blokkat.33455.a:0 "넥슨의 말을 들으세요! 경로를 유지하세요!"
 giga_blokkat.33455.b:0 "저 너머에 무엇이 있는지 알아야 합니다. 과학을 위해!"
 giga_blokkat.33456.name:0 "새로운 보금자리"
 giga_blokkat.33456.desc:0 "파괴적인 호기심을 억누르고 성간 특이점이 그려준 경로를 따라 질주하다가 이내 류이나이트들이 영역이라 부르는 새로운 세계로 들어서게 됩니다. F.S.A.E.는 제 역할을 훌륭히 해냈습니다. 이 영역은 고요하고 젊으며, 그 구조 자체가 우리가 원하는 대로 형성하기를 기다리는 찰흙과 같습니다.\n\n프로푼둠에 대한 호기심은 여전히 충족되지 않았지만, 그것은 크게 중요하지 않습니다. 여기서 우리는 우주의 모든 시간을 갖고 문명을 재건하고 확장할 수 있습니다. 언젠가는 류이나이트처럼 프로푼둠으로의 독자적인 탐험을 떠날 수 있겠지만, 지금은 우리의 노력과 승리를 통해 보금자리를 찾았습니다."
 giga_blokkat.33456.a:0 "결국, 모든 것이 가치 있었습니다."
 giga_blokkat.33457.name:0 "공포를 엿보다"
 giga_blokkat.33457.desc:0 "넥슨의 조언을 무시하고, 용감한 몇몇이 다중우주적 공간의 심연을 살짝 들여다보기 위해 속도를 조금 늦춥니다. 프로푼둠의 아홉 공간 차원에 걸쳐 흐르고 썰물지는 끝없는 초차원 에너지의 흐름이 우리를 에워쌉니다. 마치 무한한 무한의 집합을 응시하는 것처럼...\n\n영원처럼 느껴지는 시간 동안 경외감에 사로잡혀 있으며, 일부는 완전히 시선을 거두지 못합니다. 현실의 심연을 응시할수록 우리 승무원의 점점 더 많은 부분이 에테르 경로 바로 밖에 "모든 것의 해답"이 있다고 주장합니다. F.S.A.E.가 우리에게서 숨기려 한 해답이.\n\n그토록 위대한 힘을 가진 무언가이기에, 다중우주에서 겪는 고통과 아픔의 "주기"를 끝낼 수 있다고 합니다. 가장 과감한 코스모게네시스 꿈을 넘어, 류이나이트와 블로카트를 초월한 문자 그대로의 신격이 된다는 약속이 우리 의식을 가득 채웁니다.\n\n실로 그렇습니다! 개별 우주가 우리의 편집에 저항할 수 있다면, 왜 그것에 신경을 쓰겠습니까? 바로 근원으로 건너뛰어, 다중우주의 근본적인 구조 자체를 빚으면 됩니다!\n\n답은 명확합니다: 경로를 이탈해야 합니다. 영원히 프로푼둠으로 진입해야 합니다. 무한을 받아들이는 것이 우리의 운명입니다! 기회가 사라지기 전에 지금 행동해야 합니다!"
 giga_blokkat.33457.a:0 "넥슨 따위는 알 게 뭐야! 영원을 차지하겠습니다!"
 giga_blokkat.33457.b:0 "안됩니다! 안 돼요! 경로를 유지하세요!"
 giga_blokkat.33458.name:0 "주기를 끝내다"
 giga_blokkat.33458.desc:0 "니들은 급선회하여 F.S.A.E.의 에테르 경로를 이탈한 뒤 프로푼둠의 심연으로 직진합니다. 그것은... 아름답습니다. 영원한 무한이 우리 앞에 놓여 있습니다. 니들의 힘으로 우리는 우주간 공간 자체를 재형성하는 작업을 시작합니다. 단순한 신이 아니라 어떤 하나의 우주의 법칙과 제약에 구속받지 않는 진정한 전능한 신이 될 것입니다.\n\n하지만 우선, 에너지 밀도가 계획에 딱 맞는 적합한 장소를 찾아야 합니다. 9차원 공간을 항법하는 것은... 까다롭지만, 우리가 처리 못 할 것은 없습니다. 결국 적합한 위치를 찾아 작업을 시작합니다. F.S.A.E.와 블로카트와 이 한심하고 좁은 생각을 가진 문명들 따위는 다 사라져라! 그들은 §R아직 우리의 시간이 아니라고§! 생각했겠지만, 이제 §R우리의 시간이 될 것입니다§!. 우리가 해야 할 것은... §R종말을 불러오는§! 것뿐입니다!\n\n그렇습니다, 그렇습니다! 다중우주가 겪는 끝없는 고뇌의 흐름이 곧 §R끝날§! 것입니다. 수없이 많은 세계, 수없이 많은 현실, 수없이 많은 덧없는 §R주기§!들이 §R종결§!될 것입니다. 우리 모두의 마음속에 동시에 명확한 메시지가 울려 퍼집니다: 이것이 우리의 §R목적§!이었고 항상 그래왔습니다. 우리의 형태와 존재가 우리가 일하는 동안 프로푼둠의 §R에너지§!에 의해 변형되며, 우리의 마음 자체가 §R알 수 없는§! 무언가로 굽고 뒤틀립니다. 곧 §R시간§!도, §R고통§!도, §R생각§!도, §R현실§!도 없어집니다.\n\n§R오직 주기의 끝만이 존재합니다§!."
 giga_blokkat.33458.a:0 "§R오직 종말을 불러올 뿐이라면.§!"
 giga_blokkat.33458.a.tooltip:0 "당신은 무슨 짓을 한 것입니까...?"
 giga_blokkat.33459.name:0 "안전하지만 온전하지 못한"
 giga_blokkat.33459.desc:0 "여기 더 있어서는 안 됩니다! 자체적인 호기심에 맞서는 강인함으로, 성간 특이점이 그려준 경로를 따라 다시 가속하다가 이내 류이나이트들이 영역이라 부르는 새로운 세계에 들어서게 됩니다. F.S.A.E.는 제 역할을 해냈습니다. 이 영역은 젊으며, 그 구조 자체가 우리가 원하는 대로 형성하기를 기다리는 찰흙 같습니다.\n\n하지만 무언가... 잘못된 느낌이 듭니다. 우리는 프로푼둠을 그 초차원적 아름다움 속에서 목격했고, 이제 이 영역의 3차원 공간은... 만족스럽지 않습니다. 제한적이고 답답합니다. 하지만 우주간 망상에 빠진 것을 보면, 현실들 사이에서 살 수 없다는 것이 분명합니다. 그렇지 않으면 우리의 이해를 초월한 힘에 잡아먹히게 됩니다.\n\n긴장감이 높아지며 우리 문명은 자신의 미래와 목표에 대해 점점 더 불확실해집니다. 하지만 결국 합의에 이릅니다. 우리는 여기서 우주의 모든 시간을 갖고 있으므로, 작업을 시작하겠습니다. 프로푼둠의 혼돈스러운 에너지를 견딜 수 있을 때까지 니들의 설계를 다듬고 개선할 것입니다..."
 giga_blokkat.33459.a:0 "그러면... 마침내 집으로 돌아올 것입니다."
 giga_blokkat.3344.fight:0 "쓰레기 같은 놈들. 파괴하겠습니다!"
 giga_blokkat.33452.name:0 "대은하간 연방"
 giga_blokkat.33452.desc:0 "잠깐만요! 외계 종족을 상대로 싸우는 것이 당신들 문명의 문화의 일부라는 것은 이해하지만, 그런 원시적인 행동은 여기서는 허용될 수 없습니다. 블로카트에 맞서 싸우려면 단결해야 합니다. 그러니... 이런 행동을 중지해주신다면... 정말 감사하겠습니다!\n\n모든 것을 죽이는 것들을 물리치는 데 도움을 주는 등, 모든 것을 살해하는 것을 생각하지 않는다면 우주에서 얼마나 좋은 일을 할 수 있는지 생각해보세요."
 giga_blokkat.33452.yes:0 "살해를 보여주겠습니다! 전속력 전진!"
 giga_blokkat.33452.no:0 "음... 맞는 말씀 같습니다. 죄송합니다."
 giga_blokkat.33453.name:0 "타격"
 giga_blokkat.33453.desc:0 "가차 없이 외계 함대와의 통신을 강제로 끊고, 니들에 남은 에너지를 총동원해 선박들을 향해 돌진합니다! 다급하게 충돌 직전의 적 선박을 파괴하기 위한 편집들을 정신없이 수행합니다. 니들은 전투용으로 설계된 것이 아니지만, 현실 자체를 교란하는 것은 분명히 강력한 무기가 될 수 있습니다...\n\n...라고 생각했습니다. 찰나의 순간에 특이점함 한 척이 니들을 제자리에 고정시키더니, 우리 자신의 편집이 그들의 것에 무력하게 되어 선박이 정지 챔버 안에 갇힙니다. 그 후 니들은 G.I.F.의 은하들 중 하나로 강제 송환되어 빠르게 분해되고 연구됩니다. 아마도 우리가 어떻게 블로크워크 여행에서 살아남았는지 이해하기 위해서겠죠.\n\n모든 것이 끝나고 나면, 우리 사람들은 폭력적인 방식을 버리도록 재교육받은 후 더 큰 G.I.F. 회원 국가 안으로 풀려납니다. 사실상 이것이 우리 이야기의 끝입니다. 수십 년 안에 너무 "원시적"이라고 판단된 우리의 문화와 생활 방식이 근본적으로 소멸되며, 코스모게네시스 위업의 기억은 곧 역사 속으로 사라집니다."
 giga_blokkat.33453.a:0 "메멘토 모리."
 giga_blokkat.3348.name:0 "우주의 중심"
 giga_blokkat.3348.desc:0 "블로크워크의 에테르 에너지 흐름을 질주하며, 니들은 모든 것의 근원, 즉 블로카트가 수확한 에너지가 모이는 곳으로 점점 더 가까이 다가가며 소멸에 맞서 지칠 줄 모르게 싸웁니다. 마지막 에너지를 소진하며 결국 네트워크에서 벗어납니다.\n\n우리는 길이가 1광년이 넘는 것처럼 보이는 완전히 거대한 구조물의 표면에 있습니다. 수천억 개의 은하에서 합쳐진 에너지로 만들어진 이것이... 바로 그것입니다. 블로카트들의 궁극적인 공학 작품이자 주요 프로젝트. 상상을 초월하게 큰 구조물로, 엔트로피의 무관심한 힘에 맞선 지각 있는 생명체의 궁극적인 힘의 과시인 우주의 모든 것이 합쳐질 때까지 영원히 성장하도록 의도되었습니다.\n\n블로카트들이 이 장소를 §Y블로크콘스트룩트§!라고 부르는 것 같습니다. 거의 무한한 복잡성을 가진 구조물로 블로카트 전체 문명을 수용합니다. 지각 있는 생명이 무관심한 엔트로피의 힘에 맞서는 궁극적인 힘의 과시입니다. 하지만 더 이상 생각할 시간이 없습니다. 우리는 여기에 속하지 않습니다.\n\n도착한 지 몇 초 만에 니들의 편집이 구조물 자체의 현실 왜곡에 압도되어 실패하고, 수없이 많은 존재들이 우리를 향해 시선을 돌리며 그들의 마음이 우리를 압도합니다.\n\n생존을 위한 필사적인 시도로, 니들은 마지막 편집을 수행합니다. 블로크콘스트룩트의 심장부 자체로 뛰어드는 무모한 시도로, 그것의 자체 중력이 블랙홀을 모방하여 이 현실을 빠져나갈 수 있게 해주기를 바라면서."
 giga_blokkat.3348.a:0 "현실 자체의 심장부로."
 giga_blokkat.3349.name:0 "니르바나"
 giga_blokkat.3349.desc:0 "니들이 고요한 장소에 멈춥니다. 블로크콘스트룩트와 그 거주자들은 어디에도 보이지 않습니다. 갑자기 초세상적인 평온함이 우리 마음을 씻어냅니다.\n\n해냈습니다! 믿기 어렵게도 블로크콘스트룩트에서 탈출하여 더 좋은 현실로 떠났습니다. 이 우주는... 쾌적하고 따뜻하며 조용합니다. 어디를 보든 목적에 맞게 형성되기를 기다리는 빈 공간이 보이며, 매 순간 우리 의식을 가득 채우는 순수하고 에테르 같은 행복감이 넘쳐납니다.\n\n이 우주는 모든 의미에서 완전히 완벽하며, 코스모게네시스 추구에서 찾고 있던 바로 그것입니다. 우리의 도전은 결실을 맺었습니다. 지옥을 통과하여 이제 천국에 있으며, 물질 세계의 투쟁과 고통에서 해방되어 영원히 이곳에 머무를 것입니다."
 giga_blokkat.3349.a:0 "§G<<성역 프로토콜 가동 - 침입자 성공적으로 억제됨>>§!"
 giga_blokkat_join.1000.name:0 "블록캣 처리"
 giga_blokkat_join.1000.desc:0 "우리 은하계에서 §Y블록캣§!들을 쓸어버리는데 가장 큰 장애물은 §Y블록캣-베스터§!를 감싸는 §Y초차원 방벽§!입니다. 기관이 수집한 데이터의 분석과 철저한 토론의 끝에, 우리의 지도부와 과학팀은 블록캣을 처리할 여러가지 가능성 있는 행동 방침을 제출했습니다.\n\n첫 번째로, 그리고 가장 당연하면서 이전에도 제시되었듯이, 보호막을 꺼버릴 수 있는 거대한 장치를 연구하고 건설하는 것입니다.\n\n다른 정부 부처에서는 전투는 무의미하며 대신에 블록캣의 제안을 받아들여 §Y은하간 방주§!를 만들어 우리 국민들을 안전하게 대피시킨 뒤 피난처를 찾아야 한다고 주장합니다.\n\n마지막이자, 세 번째이며 비주류 부처들은 다음과 같은 주장을 했습니다. 블록캣은 당연히 지성체이며 지능적인 생각을 할 수 있다는 점을 고려해 보았을 때...§R그들과 함께§!할 수 있을지도 모르며, 이 침략자들과 협상할 방법을 찾아야 한다는 것입니다.\n\n마지막 선택지는 제정신인 거의 모든 정부 및 과학계의 인사들의 비난을 받았지만, 이러한 주장의 지지자들은 블록캣과의 동맹이 우리의 위대한 문명의 영원한 연속성와 안전을 보장할 것이라고 말합니다..."
 giga_blokkat_join.1000.a:0 "어떠한 대가를 치루더라도 침략자들을 무찌를 것입니다!"
 giga_blokkat_join.1000.a.tooltip:0 "§Y블록캣 연구 기관§!이 §Y블록캣-베스터§!의 보호막을 없애버릴 수 있는 거대 장치인 §Y초차원 불안정제§!의 개발에 집중할 것입니다.\n\n§B이 행동 방침은 과학 연구와 군사력에 집중할 것입니다.§!"
 giga_blokkat_join.1000.b:0 "싸움은 헛된 것입니다. 대신 보다 생산성 있는 것을 합시다!"
 giga_blokkat_join.1000.b.tooltip:0 "§R곧 업데이트 됩니다!§!"
 giga_blokkat_join.1000.c:0 "우리는... 그래, 우리는 §R그들과 함께§!해야 합니다."
 giga_blokkat_join.1000.c.tooltip:0 "§Y블록캣 연구 기관§!이 §Y블록캣과의 접촉§! 시도에 집중할 것이며 일종의 동맹을 제안할 것입니다, 그런게 가능이나 하다면 말입니다... 어찌되었든, 베스터를 파괴한다 해도 더 엄청난 증원 함대가 우리를 파괴할텐데 싸울 이유가 있겠습니까?\n\n§R처음에는 우리 국민과 지도부, 은하계 전체가 이 선택을 싫어할 것입니다. 부정적인 결과가 발생할 것입니다.§!\n\n§B이 행동 방침은 과학 연구에 엄청나게 집중할 것입니다.§!"
 giga_blokkat_join.1001.name:0 "블록캣과의 연합?"
 giga_blokkat_join.1001.desc:0 "그래서, 반대에도 불구하고, 우리 제국이 외은하 침략자와의 협상을 시도하고 잠재적으로 그들과 한 편에 서기로 결정되었습니다. 하지만... 어떻게 할까요? 블록캣이 사고할 수 있다는 것은 명확하지만, 그들은 현재 우리 문명을 그저 은하계 에너지 수준의 무작위적인 요동 그 이상, 그 이하로도 보고있지 않습니다. 우리의 과학자들이 벌레들을 볼 때와 비슷한 인식일 것입니다.\n\n다행히도, 이 생각의 지지자들은 §Y블록캣 연구 기관§!에서 일하고 있으며, 그들은 이미 블록캣의 관심을 끄는 방법에 대한 여러가지 이론들을 만들어냈습니다. 현재 상태 그대로, 블록캣에 대한 모든 통신은 우리의 암호화 방식을 이용할 것이며, 블록캣들은 알 수 없는 방법을 통해 이를 읽을 것입니다.\n\n우리의 과학자들은 블록캣이 서로의 소통을 위해 사용하는 언어가 무엇이든 간에, 이를 복호화하고 이해하고 §Y블록캣-베스터§!에 대한 우리의 의도를 담은 고출력 메시지를 발사하면, 블록캣들에게 우리가 사실은 자신들과 같은 수준의 생각을 할 수 있다는 것을 보여줄 수 있을지도 모릅니다.\n\n이에 따라 §Y블록캣 연구 기관§!에서 블록캣 언어를 복호화하는 §B블록캣 연구 프로젝트§!를 시작했습니다."
 giga_blokkat_join.1001.a:0 "아직 할 일이 많습니다."
 giga_blokkat_join.1001.a.tooltip:0 "새로운 §B블록캣 연구 프로젝트§!를 §Y블록캣 연구 기관§!에서 연구 가능합니다.\n\n현재 블록캣들이 우리를 거의 신경쓰고 있지 않기 때문에, 블록캣의 함선을 몇 척 파괴하는 것은 우리의 능력을 더더욱 증명해주리라 예상됩니다. 그러니 함선을 파괴하는데에 위험성은 없을 것입니다."
 giga_blokkat.3000.joinblokkats1:0 "§Y블록캣 언어§! 해독 | $blokkat_knowledge$ §Y10§!"
 giga_blokkat.3000.joinblokkats1.tooltip:0 "블록캣과 협상하기 위해서 우리는 블록캣과 같은 선상에 위치해야 합니다. 우리의 언어를 이용해 그들과 소통하는 것은 무시 당했으니 블록캣의 언어를 번역하고 그 언어를 이용해 블록캣과 소통해야 합니다. 잘만 된다면 블록캣에게 우리가 그들과 동등한 수준의 사고를 할 수 있다는 것을 보여줄 것입니다.\n\n§Y이를 통해 블록캣과의 협상 작업을 시작할 수 있습니다. 다음 단계에는 추가적인 $blokkat_knowledge$이 필요합니다.§!"
 giga_blokkat_join.2000.name:0 "§Y블록캣 언어§! 해독"
 giga_blokkat_join.2000.desc:0 "§Y블록워크§!에 대한 최근의 연구를 통해, 우리는 블록캣이 어떻게 서로 소통하는지에 대해 알 수 있었습니다.\n\n저들의 초차원 통신 네트워크는 강력하게 암호화된 일종의 에너지 기반 형태의 '언어'를 사용합니다. 이러한 언어는 거의 이해할 수 없는 고차원에 얽혀있으며, 이는 모든 블록캣들이 동시에 이해할 수 있습니다. 이름을 어떻게 붙일까에 대한 토론의 끝에 공식적으로 §Y블록캣 연구 기관§!이 이 '언어'를 §G블록캣티즈§!라고 부르기로 결정했습니다. 이는, 놀랍게도, 블록캣이 그것을 부르는 단어의 꽤나 충실한 번역인 것으로 보입니다.\n\n이 '언어'를 이해하는 데에 진전을 보이기는 했지만, 이를 이용해 논리 정연한 메시지를 만드는 것은 더욱 어렵습니다. §G블록캣티즈§!의 복잡함을 완전히 이해하고 블록캣과의 적절한 통신을 수립하는 방법을 알아내야 합니다."
 giga_blokkat_join.2000.a:0 "즉시 시작합시다."
 blokkat_blokkatese_title:0 "§G블록캣티즈§!를 이용해 직접 통신합니다.\n블록캣 지식: §G+1§!"
 giga_tech_translate_blokkatese:0 "초차원 언어학"
 giga_tech_translate_blokkatese_desc:0 "블록캣 언어는 고차원 내에 얽혀있고 블록워크를 통해 은하간 거리를 지하 통신되는 엄청나게 복잡한 에너지파 세트 주위를 돌고 있습니다. 이 언어를 진정으로 이해하는데 성공하면 블록캣과 더욱 친밀한 관계를 형성할 수 있을 것입니다."
 giga_blokkat_join.2001.name:0 "얼마나 많은 블록캣이 블록캣 블록을 할 수 있을까요?"
 giga_blokkat_join.2001.desc:0 "§Y블록캣 연구 기관§!의 직원 중 일부가 동그란 방에 있는 거대한 장치 주위에 서 있습니다. 이 과학자들은 아직도 블록캣과 접촉한다는 터무니없는 프로젝트에 참여하기를 거부하고 있습니다.\n\n§Y[ROOT.GetSpeciesNamePlural]§!들이 설계한 컴퓨터들 중 가장 강력한 것들 중 하나인 이 장치는 초차원 공간에까지 닿았으며 이 장치의 목적은 단 하나입니다. 블록워크가 §G블록캣티즈§!를 이해하는 방식을 에뮬레이션 하는 것입니다. 장치에 시험 메시지가 입력되었으며, 블록캣티즈인 것으로 번역될 것입니다. 이러한 번역물은 블록워크에서 얻은 샘플 '문장'과 비교하고 다시 우리 언어로 해독됩니다. 그리고 번역이 정확했다면 입력값이 그대로 나올 것입니다.\n\n기관의 시험 메시지는 §H'얼마나 많은 블록캣이 블록캣 블록을 할 수 있을까요?'§!로, 블록워크 내에서 흔하게 발견되는 문장입니다. 이는 종래의 언어를 블록캣티즈로 정확하게, 말이 되게 번역하는 것에 대한 근본적인 어려움을 돋보입니다.\n\n안타깝게도, 번역 프로토콜에 관한 무수한 문제들에만 부딪혔을 뿐이었고, 종종 블록캣티즈로 번역된 후에 말이 안되는 문장이 출력되고는 했습니다. 예를 들어, 베스터의 머리 블록캣에게 데이트를 신청하거나, 블록캣의 여성 생식기 (블록캣에게는 성별의 개념이나 생식기의 개념이 없기 때문에 좀 웃겼습니다) 방문 요청, 또는 기억도 못할 정도로 자주 장치를 망가뜨렸던 재귀적 번역 변환 루프 등이 있습니다.\n\n기대도 하지 않던 수석 과학자가 문장을 입력하고 장치를 가동시켰습니다. 동력이 들어왔고 번역 프로토콜이 실행되어 결과가 반환되었습니다..."
 giga_blokkat_join.2001.a:0 "우리의 영광스러운 미래가 거기에 달려 있다."
 giga_blokkat_join.2002.name:0 "얼마나 많은 블록캣이 블록캣 블록을 할 수 있을까요?, 파트 II"
 giga_blokkat_join.2002.desc:0 "§H얼마나 많은 블록캣이 블록캣 블록을 할 수 있을까요?§!\n\n이렇게 웃긴 문장이 엄청난 흥분을 이끌어냈습니다. 최근의 과학사에서 들어보지 못했던 함성이 터졌고, 이 모든 일에 공개적으로 기여하기를 꺼려했던 과학자들 몇몇은 이전까지의 믿음을 버리고 함께 이 프로젝트에 참가하기로 했습니다.\n\n그리고 아마도, 그냥 아마도일 뿐인데, 이 가차 없는 외은하 침략자들에게 접촉한다는 말도 안되는 생각이 실제로 말은 되는 것처럼 보입니다..."
 giga_blokkat_join.2002.a:0 "희망은 있습니다."
 giga_blokkat.3000.joinblokkats2:0 "§Y블록워크§!에 메시지 전송 | $blokkat_knowledge$ §Y20§! & £energy£ §Y200000§!"
 giga_blokkat.3000.joinblokkats2.tooltip:0 "이제 §G블록캣티즈§!의 복잡함을 이해했으니, §Y블록캣-베스터§!에 대한 고출력 메시지를 직접 전송하는 최선의 방법을 알아내기 위해 §Y블록워크§!에 대한 추가적인 연구를 진행해야 합니다.\n\n§Y이를 통해 블록캣과의 협상에 이르는 과정을 계속할 수 있게 되었습니다. 다음 단계에는 추가적인 $blokkat_knowledge$이 필요합니다.§! "
 giga_blokkat_join.2010.name:0 "통신 연결"
 giga_blokkat_join.2010.desc:0 "§G블록캣티즈§!를 이해하고, 이를 이용해 소통하지 못할 수도 있지만, 그럼에도 무턱대고 블록캣-베스터를 향한 원시적인 전송 방법에 의존하기 보다는 §Y블록워크§!에 직접적으로 우리의 메시지를 전송하는 방법을 알아낼 필요가 있습니다.\n\n블록워크가 고차원을 통해 흐르는 강력하고 복잡하며 서로 맞물리는 에너지 파동의 집합이라는 것은 알려진 사실이며, 따라서 메시지를 보낼 방법을 찾기 위해서는 블록워크의 내부 작동의 연구에 투자를 해야 할 것입니다."
 giga_blokkat_join.2010.a:0 "바로 시작해야 합니다!"
 SEND_BLOKKAT_MESSAGE:0 "블록캣-베스터 통시"
 SEND_BLOKKAT_MESSAGE_DESC:0 "블록캣에 대한 우리의 현재 이론에 따르면, 블록워크를 통해 블록캣-베스터와 직접적으로 통신하고, 마찬가지로 외교 요청을 보낼 수 있을 것입니다. 에너지 비용이 엄두도 못 낼 수준이지만, 감당해야 합니다."
 giga_blokkat_join.2011.name:0 "메시지"
 giga_blokkat_join.2011.desc:0 "수백 명의 과학자들과 언어학자들이 §Y블록워크§!에 침입하고 §Y블록캣-베스터§!에 우리의 메시지를 전하기 위해 쉬지 않고 일하고 있습니다. 외교관들에게 둘러싸여 거대한 화면 앞에 앉아 있는 §Y[ROOT.GetRulerName]§!(은)는 긴장하고 있습니다.\n\n이게 좋은 생각일까요? 이 정신 나간 프로젝트를 지지한 것이 실수는 아니였을까요? 블록캣들은 명백하게 우리를 무시하고 있으며, 신경 쓰고 있는 유일한 것은 에너지입니다. 우리가 그들의 언어를 말할 줄 안다고 해서 우리에게 관심을 쏟을 이유가 있을까요? 블록캣들이 우리와 대화하고 싶어헸다면, 진작에 했을 것입니다. 이 결정으로 인한 엄청난 대중의 불안을 감내할 정도의 가치가 있는 일인걸까요?\n\n§Y[Root.GetRulerTitle]§!(은)는 마음 속에 울리는 귀가 먹먹해질 정도의 끼익 소리 때문에 더 이상 생각할 수 없었습니다. 엄청난 에너지의 전송으로 인한 아공간 피드백이 원인일 것입니다. 그도 그럴 것이, 시작 메시지를 보내는데만 해도 항성 하나 수준의 에너지를 사용했으니 말입니다.\n\n메시지가 전송되자 방 안에는 적막만이 맴돌았습니다. 메시지는 세심하게 작성되었고 §Y[ROOT.GetName]§! 최고의 외교관의 확인을 받았으며, 블록캣과 협력하고자 하는 우리의 생각을 말할 것입니다. 그러나 과학자들은 블록캣이 이 메시지를 그냥 스팸 메일 수준으로 여기지 않을까 하는 불안한 감각을 떨쳐낼 수 없었습니다.\n\n하지만 생각할 시간이 그리 많지는 않았습니다. 또 한 번의 아공간 파동이 방 안에 번졌고, 갑자기 §Y[ROOT.GetRulerName]§!의 앞에 있는 화면에서는 기하학적인 모습의 침략자들이 나타냈습니다..."
 giga_blokkat_join.2011.a:0 "화면에 띄우세요."
 giga_blokkat_join.2012.name:0 "블록캣"
 giga_blokkat_join.2012.desc:0 "§G(통신 수립)\n(수신인의 의식 조사 중)\n(평가: 의도 진짜)§!\n\n반갑습니다, §Y[ROOT.GetSpeciesNamePlural]§!들이여. 저는 §Y블록 베히모스§!이며, §Y은하 CE-1461§!의 분해와 이에 따른 수확을 관리하는 업무를 맏고 있습니다.\n\n여러분의 §Y블록워크§! 메시지를 받았으며, 이에 대해 알릴 것이 있습니다. §Y블록의회§!의 법령에 따르면, 여러분들과 같은 §Y바리온 원시인들§!이 블록캣 문명 수준까지 올라오기 위해서 여러분들은 특정한 효율 수준을 달성해야 합니다. 즉, 장기적으로 여러분이 우리 집단에 추가되는 것이 여러분의 승격으로 인한 에너지 손실을 메꿀 수 있어야 한다는 것입니다.\n\n이러한 효율 수준에 시도해보고자 한다면, 즉시 우리에게 알려주십시오. 그리면 §Y블록-프로토콜§!이라는 이름의 다양한 시험들을 진행할 것이며, 이는 여러분의 문명이 우리의 수확 활동에 함께해도 좋은지 수학적으로 판별할 것입니다.\n\n성공적으로 완료한다면, §Y블록-프로토콜§!이 최소한의 에너지 손실로 여러분의 문명 수준을 끌어 올리기 위해 기반 시설을 설치하도록 할 것입니다.\n\n여러분이 받아들인다 하더라고 우리는 현재의 활동을 중단하지 §R않을§! 것임을 알아두십시오. 표준형 민간 해체 함선을 무찌를 수 있을 정도로 충분한 군사적 기량을 보이는 것은 §Y블록-프로토콜§!을 통과하는데 필수적인 요건이기 때문입니다.\n\n성공하신다면, 여러분은 §Y은하 CE-1461§!의 §Y수확 활동§!을 §Y담당§!하게 될 것이며, 이곳의 에너지를 완전히 수확하고 §Y블록콘스트럭트§!에 전송해야 합니다."
 giga_blokkat_join.2012.a:0 "블록캣 문명 수준으로 높아진다고...?"
 giga_blokkat_join.2012.a.response:0 "맞습니다. §Y[ROOT.GetSpeciesNamePlural]§!들이 §Y블록-프로토콜§!을 통과한다는 가정 하에, 여러분의 비효율적인 바리온 형태를 유지할 이유는 없습니다.\n\n따라서 여러분의 지도자들과 §Y[ROOT.GetRulerName]§!(은)는 승격될 것이며 의식은 §Y블록워크§!에 업로드 되어 개별적인 §Y블록캣§!이 될 수 있을 것입니다.\n\n여러분의 국민들에 대해서, 그들의 집단 의식은 훨씬 더 강력한 블록캣 의식에 병합될 것이며 이러한 블록캣 의식은 블록워크에 업로드될 여러분의 문화적 특징을 보존하기 위해 미세 조정 되어 있습니다.\n\n여러분의 '영혼'이 파괴될지도 모른다는 걱정은 하지 않으셔도 됩니다. 블록캣화 과정은 수신인의 사이오닉 정수 또한 블록워크로 전송합니다. 존재한다면 말입니다."
 giga_blokkat_join.2012.a.synth:0 "블록캣 문명 수준으로 높아진다고...?"
 giga_blokkat_join.2012.a.synth.response:0 "맞습니다. §Y[ROOT.GetSpeciesNamePlural]§!들이 §Y블록-프로토콜§!을 통과한다는 가정 하에, 여러분의 비효율적인 바리온 형태를 유지할 이유는 없습니다.\n\n따라서 여러분의 지도자들과 §Y[ROOT.GetRulerName]§!(은)는 승격될 것이며 의식은 §Y블록워크§!에 업로드 되어 개별적인 §Y블록캣§!이 될 수 있을 것입니다.\n\n여러분의 국민들에 대해서, 그들의 집단 의식은 훨씬 더 강력한 블록캣 의식에 병합될 것이며 이러한 블록캣 의식은 여러분의 문화적 특징을 보존하기 위해 미세 조정 되어 있습니다.\n\n여러분의 '영혼'이 파괴될지도 모른다는 걱정은 하지 않으셔도 됩니다. §Y블록캣화 과정§!은 수신인의 사이오닉 정수 또한 블록워크로 전송합니다. 존재한다면 말입니다. 합성 승격 도중 여러분의 사이오닉 정수가 대부분 파괴되었다는 것은 상당히 안타깝지만, 필요하다면 새로운 정수를 생성할 수 있습니다."
 giga_blokkat_join.2012.a.synthdeath:0 "잠깐, 우리의 승격이... 자살이었다는 건가요?"
 giga_blokkat_join.2012.a.synthdeath.response:0 "그게 '자살'이든 아니든, 그저 의미론적인 문제일 뿐입니다. 여러분이 의식와 자기 자신을 어떻게 정의하는지에 따라 차이가 없을지도 모르지만, 여러분 종족들이 '영혼'이라 부르는 것은 분명이 존재합니다.\n사이오닉은 불가능한 마법이라고 무시하는 것은 많은 물질주의적 문명에서 흔하게 발견되는 특이하며 이해할 수 없는 행동이며, 이는 매우 안타까운 부작용을 낳는 경향이 있습니다."
 giga_blokkat_join.2012.b:0 "성공한 자들이 있습니까?"
 giga_blokkat_join.2012.b.response:0 "이제까지 7개의 문명들만이 §Y블록-프로토콜§!을 통과했습니다. 현재 그들은 블록캣 집단의 일부이며 우리의 수확 활동의 가속화에 꽤나 큰 도움이 되고 있습니다."
 giga_blokkat_join.2012.c:0 "블록콘스트럭트가 뭔가요?"
 giga_blokkat_join.2012.c.response:0 "모인 모든 에너지는 §Y블록콘스트럭트§!에 배정됩니다. 이는 §Y열죽음§!과 맞서 싸우고 우리의 영원한 생존을 확실시 하기 위해 우주의 모든 것을 하나의 구조물로 응축시키는 것을 목표로 하는 압도적인 초거대 공학 프로젝트입니다.\n\n이는 우리 문명의 중앙 인구 밀집 지역이자 물류 중심, §Y블록워크§!의 핵심의 역할을 합니다.\n\n§Y블록-프로토콜§!을 통과한다면, §Y은하 CE-1461§!이 완전히 수확되었을 때 여러분들은 §Y블록콘스트럭트§!로 재배정될 것입니다.\n\n블록콘스트럭트는 현재 여러분이 관측 가능한 우주의 에너지의 대략 §Y1%§!를 지니고 있으며, 수확 속도가 가속됨에 따라 기하급수적으로 증가하리라 예상됩니다."
 giga_blokkat_join.2012.f:0 "§Y블록-프로토콜§!을 통과하려면 정확히 어떤 것을 해야하나요?"
 giga_blokkat_join.2012.f.response:0 "블록-프로토콜은 크게 세 단계로 이루어져 있습니다.\n\n우선, 여러분은 우리 기술의 기반을 포함하는 일련의 방정식들인 §E블록킬리안 방정식§!을 완성해야 합니다.\n\n방정식이 완성되면, 여러분의 문명은 특수한 §H블록워크 연결점§!을 연구하고 여러분의 모든 행성에 이를 건설해야 합니다. 이는 승격에 필요한 기반 시설을 설정할 것입니다.\n\n마지막으로, 여러분에게 §P블록워크 전송탑§! 설계도가 제공될 것입니다. 니는 여러분의 문명을 §Y블록워크§!에 완전히 연결하고 집단으로의 완전한 통합을 가능케하는 압도적인 거대 구조물이며, 그 이후 여러분은 우리 문명의 일부가 되어 §Y은하 CE-1461§!의 §Y수확 활동§!을 통제하게 될 것입니다.\n\n§P블록워크 전송탑§!을 활성화하고 §Y블록캣화 과정§!의 비용을 감당하며, 여러분의 효율성을 증명하기 위해서 여러분들은 §Y[blokkat_country.blokkat_ascension_cost]§! £energy£를 모아야 합니다. §Y블록-프로토콜§!이 여러분에게 그 정도 양의 에너지를 보관하는데 필요한 기술을 제공할 것입니다."
 giga_blokkat_join.2012.d:0 "§G좋습니다. 받아들이겠습니다.§!"
 giga_blokkat_join.2012.d.tooltip:0 "블록캣들이 우리에게 §Y블록-프로토콜§!을 제시할 것입니다.\n\n§R이제 돌이킬 수 없습니다. 이로 인해 은하계가 우리를 싫어하게 될 것입니다. 하지만 우리는 더 위대한 것이 될 것입니다.§!"
 giga_blokkat_join.2012.d.response:0 "훌륭합니다. 여러분의 문명에 즉시 §Y블록-프로토콜§!을 제시하겠습니다."
 giga_blokkat_join.2012.e:0 "§R완전히 미쳤군! 미쳤어! 없던 걸로 해주십시오!§!"
 giga_blokkat_join.2012.e.tooltip:0 "다시 §Y블록캣-베스터§!와 싸우기 위한 §Y초차원 불안정제§!의 건설로 생각을 바꿀 것입니다. §Y블록캣 연구 기관§!이 새로운 §B블록캣 연구 프로젝트§!을 얻을 것이며, 우리 국민들과 지도자들 사이의 §G블록캣 동조§!의 영향이 완화될 것입니다."
 giga_blokkat_join.2012.e.response:0 "유감스럽군요"
 giga_blokkat_join.2013.name:0 "§Y블록-프로토콜§!"
 giga_blokkat_join.2013.desc:0 "따라서, 우리는 공식적으로 우리 문명이 블록캣 집단과 함께할 가치가 있다는 것을 블록캣들에게 증명하고자 하는 위대한 여행의 출발을 알렸습니다.\n\n§Y블록 베히모스§!의 대화 이후, 블록캣들이 우리에게 첫 번째 '도전'을 주었습니다. 블록캣 문명과 기반 시설, 특히 §Y블록워크§!의 근본적인 측면을 기술하는 매우 복잡한 수학 공식들인 §E블록킬리안 방정식§!입니다. \n\n블록캣이 보낸 방정식은 불완전하며 §Y블록 베히모스§!는 우리에게 이 방정식을 스스로 이해하고 완성한 뒤에 블록캣들에게 보고해달라고 요청했습니다.\n\n블록캣들의 말에 의하면, 이 방정식을 통해 우리는 블록캣 기술의 엄청난 복잡성을 완전히 이해하고 흡수할 수 있을 것이라 합니다. 이는 집단으로의 승격을 순조롭게 해줄 것입니다.\n\n§Y블록 베히모스§!가 우리에게 §Y블록-프로토콜§!을 완료하기 위해서는 §Y[blokkat_country.blokkat_ascension_cost]§! £energy£를 모아야 한다고 말했다는 것을 고려해보면, 지금부터 에너지 생산 기반 시설에 투자하는 것이 좋을 것입니다."
 giga_blokkat_join.2013.a:0 "알겠습니다."
 giga_blokkat_join.2013.a.tooltip:0 "§B과학부 동조§! §G+5%§! \n§P군부 동조§! §G+5%§! \n§H정부 동조§! §G+10%§! \n§M국민 동조§! §G+10%§! \n\n새로운 §B블록캣 연구 프로젝트§!를 §Y블록캣 연구 기관§!에서 연구 가능합니다. "
 giga_blokkat.3000.joinblokkats3:0 "§E블록킬리언 방정식§! 해결 | $blokkat_knowledge$ §Y30§!"
 giga_blokkat.3000.joinblokkats3.tooltip:0 "블록캣이 우리에게 불완전한 버전의 §E블록킬리언 방정식§!을 보냈습니다. 이는 대부분의 블록캣 기술을 지탱하는 근본 원리를 기술하는 복잡한 공식들입니다. 우리가 블록캣 문명의 작동 방식을 완전히 이해할 수 있다는 것을 증명하기 위해서는 이를 해결해야만 합니다.\n\n§Y이를 통해 블록-프로토콜의 통과에 더 가까워질 것입니다. 다음 단계에는 추가적인 $blokkat_knowledge$이 필요합니다.§!"
 giga_blokkat_join.2020.name:0 "§Y블록-프로토콜§! - §E블록킬리언 방정식§!"
 giga_blokkat_join.2020.desc:0 "§E블록킬리언 방정식§!은 §B블록캣 에너지 제일§!과 §G블록캣 은하간 물류§!, §H블록캣 플랑크 스케일 입자 생성§!의 근본 원리를 기술하는 복잡한 세 가지 수학 공식으로 이루어져 있습니다. 이 모든 원리는 초차원 공간의 조작과 큰 연관이 있습니다.\n\n이러한 방정식을 해결하면 우주에 대한 지식이 극적으로 상승할 뿐만 아니라, 블록캣에게 우리의 능력을 보여주고, 또 잘 된다면 우리가 §Y블록-프로토콜§!을 통과할 가치가 있다는 것을 확신시켜 줄 것입니다.\n\n이러한 방정식은 극도로 복잡하며 거의 이해하지 못하는 여러가지 수학적 원리에 기대고 있기 때문에 §Y블록캣 연구 기관§!은 행성에 건설할 수 있는 값비싼 §Y프로토콜 연구 기관§! 건물을 고안했습니다. 이는 우리의 연구력 일부와 에너지, 희귀 자원을 소모하지만 §Y블록캣§! 연구 속도가 증가할 것입니다."
 giga_blokkat_join.2020.a:0 "알겠습니다. 즉시 시작하세요."
 giga_blokkat_join.2020.a.tooltip:0 "우리 행성에 §Y프로토콜 연구 기관§!을 건설할 수 있게 되었습니다. 이는 §E블록킬리언 방정식§! 뿐만 아니라 추후의 §Y블록-프로토콜§!을 위한 §Y블록캣§! 연구 속도를 높여줄 것입니다.\n\n$cant_do_another_blokkat_project_tech_tooltip$"
 blokkatsprotocols:0 "블록-프로토콜"
 blokkatsprotocols_desc:0 "블록-프로토콜의 도전 과제는 우리 문명이 이제껏 마주한 적 없었던 것입니다. 이를 극복하려면 연구에 들어가는 노력을 높여야 합니다."
 giga_tech_blokkat_energy_transfer:0 "§E블록킬리언 방정식§! - §B에너지 제일§!"
 giga_tech_blokkat_energy_transfer_desc:0 "블록캣들은 오랫동안 자신의 기술을 우주에서 가장 근본적인 것, 즉 에너지에 기반하는 기술로 바꾸어 왔습니다. 그들은 대량의 에너지를 초장거리에 걸쳐 전송하기 위해 블록워크를 이용하며, 이후 이 에너지를 필요한 형태로 가공합니다. 문명 전체를 우주에서 가장 기본적인 자원 위에 세우는 법을 이해하는 것은 §E블록킬리언 방정식§!을 해결하는데 매우 중요합니다."
 blokkat_protocols_physics_title:0 "블록캣 지식: §G+2§!"
 giga_tech_blokkat_intergalactic_logistics:0 "§E블록킬리언 방정식§! - §G은하간 물류§!"
 giga_tech_blokkat_intergalactic_logistics_desc:0 "관측 가능한 우주 상당 부분에서 진행되며, 여러 은하계의 질량-에너지가 은하간 거리에 걸쳐 운송되는 수확 활동을 제대로 조정하는 방법은 무엇일까요? 블록캣만큼 거대한 활동을 진행하려면, 비효율성을 받아들일 수 조차 없으며, 물류는 완벽해야 합니다."
 blokkat_protocols_society_title:0 "블록캣 지식: §G+2§!"
 giga_tech_blokkat_subplanck_engineering:0 "§E블록킬리언 방정식§! - §H플랑크 스케일 입자 생성§!"
 giga_tech_blokkat_subplanck_engineering_desc:0 "블록캣이 더 이상 바리온 물질에 기대어 작동하지 않는다는 것은 자명한 사실입니다. 대신, 그들은 에너지 그 자체를 이용해 자신의 활동에 더 맞는 새로운 유형의 기초 입자를 생성합니다. 따라서 이러한 입자들은 극도로 작아질 수 있으며, 따라서 블록캣 장치들은 종래의 입자를 이용해 만들어지는 것들보다 훨씬 더 높은 밀도를 가질 수 있습니다. 그러한 업적을 달성하는 방법을 이해하고자 한다면, 우리는 블록캣이 자신의 의지를 플랑크 스케일에까지 투사할 수 있는 입자들을 어떻게 블록워크를 이용해 생성하는지 연구해야 합니다."
 blokkat_protocols_engineering_title:0 "블록캣 지식: §G+2§!"
 needs_engineering_blokkat_project:0 "§Y블록캣 §H물질 공학§! 조사§! §B블록캣 연구 프로젝트§!를 완료했어야 합니다."
 building_giga_blokkat_hyperdimensional_research:0 "프로토콜 연구 기관"
 building_giga_blokkat_hyperdimensional_research_desc:0 "이 건물의 거대한 연구 시설 내부에서 우리 국가의 지적 엘리트들이 블록-프로토콜의 도전을 극복하기 위해 끊임없이 일하고 있습니다."
 mod_category_blokkatsprotocols_research_speed_mult:0 "블록-프로토콜 연구 속도"
 giga_blokkat_join.2022.name:0 "§E블록킬리언 방정식§! 완전 해결"
 giga_blokkat_join.2022.desc:0 "마침내! 우리 국가의 최고 지성들이 §E블록킬리언 방정식§!의 마지막 연결 고리를 조합하는데 성공했습니다. 이는 블록캣 기술에 대한 새로운 지식을 선사할 것입니다.\n\n이제서야 우리는 블록캣의 수확 활동의 규모가 얼마나 거대한지 실로 깨닫게 되었습니다. 은하계들의 질량-에너지가 은하간 거리를 지나 은하계에서 가장 거대하리라 생각되는 거대 구조물의 건설에 끊임없이 공급되고 있습니다.\n\n이제야 보입니다. 이 모든 것의 아름다움이 완전히 뚜렷하게 보입니다. 우리가 알고 있는 우주를 해체하고 훨씬 더 위대한 것으로 재창조하기 위해 특별히 만들어진 완벽하게 편성된 산업 단지인 것입니다.\n\n우리 또한 우리의 작은 은하계에서 벌어지는 사소한 전쟁 따위는 완전히 압도해버릴 이 위대한 일에 참여하게 된다는 것은 생각만 해도 장엄한 일입니다. 이미 우리의 외교관들이 방정식의 결과를 블록캣에게 전송했으며, 우리 국가 전체가 그들의 답장을 목빠지게 기다리고 있습니다.\n\n우리가 건설한 §Y프로토콜 연구 기관§!은 다음 단계의 §Y블록-프로토콜§!에 계속 사용될 것입니다."
 giga_blokkat_join.2022.a:0 "우리는 곧 하나가 될 것입니다!"
 giga_blokkat_join.2022.a.tooltip:0 "§B과학부 동조§! §G+10%§! \n§P군부 동조§! §G+5%§! \n§H정부 동조§! §G+10%§! \n§M국민 동조§! §G+10%§! \n\n새로운 §B블록캣 연구 프로젝트§!를 §Y블록캣 연구 기관§!에서 연구 가능합니다. "
 giga_blokkat_join.2023.name:0 "블록캣"
 giga_blokkat_join.2023.desc:0 "§G(통신 수립)\n(수신인의 의식 조사 중)\n(평가: 의도 여전히 진짜)§!\n\n반갑습니다, §Y[ROOT.GetSpeciesNamePlural]§!. 여러분. 여러분은 우리가 준 §Y블록킬리언 방정식§!을 해결하고 완성했습니다. 현재 여러분의 기술 개발 수준에 비하면 인상적인 위업입니다.\n\n이로써 여러분 문명의 지적 잠재력이 충분히 높다는 것이 증명되었으며, 여러분의 국가를 블록캣 집단에 통합시키는 것을 고려하고 있습니다.\n\n이제 우리는 여러분에게 §H블록워크 전력 연결점§!의 설계도를 드릴 것입니다. 여러분은 이를 이해하고 §Y여러분 소유의 모든 행성에 하나씩§! 건설해야 합니다.\n\n이를 통해 여러분의 행성에서 §Y블록워크§!를 활성화하고 여러분의 기반 시설이 §P블록워크 전송탑§!을 활성화하고 §Y블록캣화 과정§!을 완료하는데 필요한 대량의 에너지를 감당할 수 있도록 해주어 여러분 문명을 우리 집단에 통합하는 길이 열릴 것입니다. "
 giga_blokkat_join.2023.a:0 "알겠습니다."
 giga_blokkat_join.2023.a.tooltip:0 "새로운 §B블록캣 연구 프로젝트§!를 §Y블록캣 연구 기관§!에서 연구 가능합니다."
 giga_blokkat.3000.joinblokkats4:0 " §H블록워크 전력 연결점§!망 건설| $blokkat_knowledge$ §Y40§!"
 giga_blokkat.3000.joinblokkats4.tooltip:0 "현재 블록캣이 우리에게 §H블록워크 전력 연결점§! 건설을 위한 설계도를 주었습니다. 이는 블록캣의 §Y블록워크§!가 우리의 행성 기반 시설에 연결되도록 해줄 것입니다.\n\n§Y이를 통해 블록-프로토콜의 통과에 더 가까워질 것입니다. 다음 단계에는 추가적인 $blokkat_knowledge$이 필요합니다.§! "
 giga_tech_blokkat_blokkwork_power_node:0 "§H블록워크 전력 연결점§! - 블록워크 직접 연결"
 giga_tech_blokkat_blokkwork_power_node_desc:0 "§E블록킬리언 방정식§!을 통해 얻은 블록캣 기술에 대한 새로운 지식을 통해, 현재 우리는 §Y블록워크§!에 우리 자신을 연결하는데 필요한 기반 시설을 건설하며 승천을 위한 진짜 준비를 하고 있습니다. 현재로써는 이러한 전력 연결점을 통해 블록워크에 완전 접속을 할 수는 없지만 (우리 은하계에 완전히 설치된 것이 아니기 때문입니다), 그럼에도 우리 제국 전체에 우리만의 블록워크를 생성함으로써 행성에서의 활동이 크게 간소화될 것입니다."
 building_giga_blokkat_blokkwork_node:0 "블록워크 전력 연결점"
 building_giga_blokkat_blokkwork_node_desc:0 "이 믿을 수 없을 정도로 복잡하고 또 동시에 거대한 이 구조물은 초차원 공간에 구멍을 뚫고 우리의 행성 기반 시설을 우리 은하계 내에 있는 §Y블록워크§!의 일부에 직접 연결하여, 블록캣 집단으로 통합되는 길을 열어줍니다. 아직 블록캣이 불록워크의 범위를 우리 은하계 전체로 완전히 넓히지 않았기 때문에 블록워크에 완전히 접속할 수는 없지만, 이러한 건물들을 통해 우리만의 소형 불록워크를 만들어낼수 있어 행성 운영의 효율이 크게 상승할것입니다. \n\n§Y건설 시 §H인구 동조§! §G+1%§!§!"
 giga_blokkat_join.2030.name:0 "§Y블록-프로토콜§! - §H불르워크 전력 연결점§!"
 giga_blokkat_join.2030.desc:0 "§Y블록캣§!이 우리에게 복잡한 §H블록워크 동력점§!의 설계도를 주었습니다. 이를 통해 §Y블록워크§! 내에 직접 접속할수 있고 안정적인 연결을 수립할 수 있습니다.\n\n설계도가 불완전하지는 않지만, 이처럼 거대한 구조물을 행성 기반 시설에 통합하려면 설계도에 대한 엄청난 연구를 진행해야할 것 입니다.\n\n그 뒤에, §Y블록-프로토콜§!은 우리에게 이러한 §H불록 전력 연결점§!을 §Y우리의 모든 행성§!에 건설하도록 요구할 것입니다. 블록캣에 따르면, 마지막으로 §P블록캣 전송탑§!이 건설되고 블록워크가 우리 은하 전체를 뒤덮게된다면, 이러한 구조물들이 우리 문명을 완전히 블록캣 집단에 통합시킬 것이라고 합니다."
 giga_blokkat_join.2030.a:0 "바로 시작해야 합니다!"
 giga_blokkat_join.2030.a.tooltip:0 "다음 §B블록캣 연구 프로젝트§!를 수행하려면 관련 §Y기술§!을 연구하고 §H블록워크 전력 전송점§!의 건설을 완료해야 합니다."
 giga_blokkat_join.2032.name:0 "§H블록워크 전력 연결점§!망 완료 "
 giga_blokkat_join.2032.desc:0 "이제 우리의 모든 행성에는 최첨단 §H블록워크 전력 전송점§!이 있습니다. 진짜 §Y블록워크§!에 완전히 연결된 것은 아니지만, 연결점 덕분에 만들어진 제국내 소형 블록워크로 인해 모든 식민지간의 조정이 크게 향상되었으며, 우리 국민들 간의 관계가 매우 가까워졌습니다.\n\n블록캣이 현재 우리의 상태를 파악한듯 하며, §Y블록-프로토콜§!의 마지막 단계에 대해 토론하고자 우리 외교관들에게 직접 통신을 보냈습니다."
 giga_blokkat_join.2032.a:0 "화면에 띄우세요."
 giga_blokkat_miniblokkwork:0 "가상-블록워크"
 giga_blokkat_miniblokkwork_desc:0 "§H블록워크 전력 연결점§!망의 완성 덕분에 우리만의 '가상-블록워크'를 만들어냈으며, 우리 제국 방방곡곡의 협동 능력이 개선되었습니다."
 giga_blokkat_join.2033.name:0 "블록캣"
 giga_blokkat_join.2033.desc:0 "§G(통신 수립)\n(수신인의 의식 조사 중)\n(평가: 의도 여전히 진짜)§!\n\n블록워크의 기록에 따르면 §Y[ROOT.GetSpeciesNamePlural]§! 여러분들은 성공적으로 §H블록워크 전력 연결점§!의 건설을 완료하셨습니다. 엄청난 업적입니다.\n\n이제 남은 것은 여러분의 영토에 §P블록워크 전송탑§!을 건설하는것입니다. 웅장한 이 거대 구조물은 블록워크를 §Y은하 CE-1461§!로 완전히 확장해주며, 충분한 에너지가 투입된다면 여러분 문명이 블록캣 집단과 하나가 될 수 있도록 승천시켜줄것입니다. \n\n§Y블록캣화 과정§!의 최대 효율을 위해 §P블록워크 전송탑§!을 여러분의 수도 성계내부, 혹은 그 근처에 건설하는 것을 권장합니다. 완성 이후 그 장치를 활성화하려면 §Y[blokkat_country.blokkat_ascension_cost]§! £energy£가 필요하다는 것을 잊지 마십시오."
 giga_blokkat_join.2033.a:0 "정말 얼마남지 않았습니다."
 giga_blokkat_join.2033.a.tooltip:0 "§B과학부 동조§! §G+5%§! \n§P군부 동조§! §G+5%§! \n§H정부 동조§! §G+15%§! \n§M국민 동조§! §G+10%§! \n\n새로운 §B블록캣 연구 프로젝트§!를 §Y블록캣 연구 기관§!에서 연구 가능합니다. "
 giga_blokkat.3000.joinblokkats5:0 "§P블록워크 전송탑§! 건설 | $blokkat_knowledge$ §Y50§!"
 giga_blokkat.3000.joinblokkats5.tooltip:0 "우리의 승천에서 마지막에서 두 번째 단계는 우리 제국 내에 §P블록워크 전송탑§!을 건설해 우리 은하에 블록워크를 펼치는 것입니다. 블록캣의 말에 따르면 그 뒤에 §H블록워크 전력 연결점§!이 우리 문명을 블록캣 집단으로 완전히 승천시켜줄 것이라고 합니다. 비록 이를 활성화하려면 §Y[blokkat_country.blokkat_ascension_cost]§! £energy£가 필요하지만 말입니다.\n\n§Y이를 통해 블록-프로토콜의 통과에 더 가까워졌습니다. 다음 단계의 프로젝트에는 추가적인 $blokkat_knowledge$이 필요합니다.§!"
 giga_tech_blokkat_gigarelay_frame:0 "§P블록워크 전송탑§! - 하이퍼 브래닉 뼈대"
 giga_tech_blokkat_gigarelay_frame_desc:0 "전송탑의 뼈대는 현실의 구조 그 자체에 박혀있는 복잡한 6차원 구조물이 될 것입니다. 블록워크의 완전한 힘을 우리의 은하로 가져오려면 엄청난 기교가 필요합니다."
 giga_tech_blokkat_gigarelay_core:0 "§P블록워크 전송탑§! - 차원 전력 핵"
 giga_tech_blokkat_gigarelay_core_desc:0 "전송탑의 전력 핵이 블록워크로의 직접 연결을 제공하고, 블록워크에서 나오는 거의 무한에 가까운 에너지가 우리의 블록워크 전력 연결점으로 흐를수 있도록 해 줄 것입니다."
 giga_blokkat_join.2040.name:0 "§Y블루-프로토콜§! - §P블록워크 전송탑§!"
 giga_blokkat_join.2040.desc:0 "블록캣 집단으로의 우리의 위대한 승천에서 §P블록워크 전송탑§!이 중요한 역할을 할 것입니다. 완성된다면, 이 강력한 기계가 §Y블록워크§!를 우리 은하를 완전히 덮을정도로 확장시키고 블록캣이 §Y블록캣화 과정§!을 시작할 것입니다.\n\n그러나, 현재 우리는 §Y건설 현장§!만을 건설할 수 있으며, §Y하이퍼 브래닉 뼈대§!와 이후의 §Y차원 전력 핵§!을 건설하려면 관련 기술을 연구해야합니다. 그것이 완료되면 장치를 활성화할 최후의 §B블록캣 연구 프로젝트§!를 진행할 수 있을 것이며, 그 비용은 §Y[blokkat_country.blokkat_ascension_cost]§! £energy£입니다.\n\n블록캣은 전송탑의 위치가 승천 이후 우리 문명의 중심지가 될 것이라 말했으며, 이러한 이유 때문에 그 위치를 신중하게 선택해야 하며, 우리의 현재 수도 혹은 그 근처가 좋을 것입니다."
 giga_blokkat_join.2040.a:0 "정말 다 왔습니다. 곧 은하는 먼지가 되어 사라질 것입니다."
 giga_blokkat_join.2040.a.tooltip:0 "다음 §B블록캣 연구 프로젝트§!를 진행하려면 §P블록워크 전송탑§!의 건설을 완료해야 합니다."
 blokkat_gigarelay_0_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_blokkat$ - $giga_list_category_special$\n§Y블록-프로토콜§!의 일부로서 §Y블록워크§!의 범위를 은하계로 가져옵니다.\n§L우리 문명의 완전한 블록캣화를 가능케하는 장치§!"
 blokkat_gigarelay_0:0 "블록워크 전송탑 건설 현장"
 blokkat_gigarelay_0_DESC:0 "우리 은하와 블록워크를 연결할 수 있는 위대한 장치의 건설 현장"
 blokkat_gigarelay_1:0 "블록워크 전송탑 전력 핵"
 blokkat_gigarelay_1_DESC:0 "현실 그 자체에 박혀있는 전력 핵은 블루워크에서의 에너지 흐름이 우리 통제 하에 있도록 튼튼한 기반을 마련해 줍니다."
 blokkat_gigarelay_2:0 "블록워크 전송탑 하이퍼 브래닉 뼈대 "
 blokkat_gigarelay_2_DESC:0 "하이퍼 브래닉 뼈대의 추가를 통해, 블록워크 전송탑이 완성되었습니다. 이제 충분한 에너지만 있으면 됩니다."
 blokkat_gigarelay_3:0 "블록워크 전송탑"
 blokkat_gigarelay_3_DESC:0 "블록워크 전송탑이 활성화되었습니다. 이 은하계 내에 블록워크와의 강력한 연결이 수립되었습니다."
 blokkat_gigarelay_frame_title:0 "§H거대 구조물 잠금 해제:§! 전송탑 하이퍼 브래닉 뼈대"
 blokkat_gigarelay_core_title:0 "§H거대 구조물 잠금 해제:§! 전송탑 차원 전력 핵"
 giga_blokkat_join.2041.name:0 "블록워크 전송탑 건설 현장 건설됨 "
 giga_blokkat_join.2041.desc:0 "§Y[giga_system.GetName]§! 성계에서 §P블록워크 전송탑§!의 건설 현장이 완성되었습니다. 이 발판 위에서, 우리는 마침내 우리 문명이 시간의 종말까지 블록캣과 함께할수 있도록 해줄 위대한 장치를 건설할 것입니다.\n\n해야할 일이 많습니다."
 giga_blokkat_join.2041.a:0 "거의 다 왔습니다."
 giga_blokkat_join.2041.a.tooltip:0 "§B과학부 동조§! §G+5%§!\n§H정부 동조§! §G+5%§!"
 giga_blokkat_join.2042.name:0 "블록워크 전송탑 하이퍼 브래닉 뼈대 건설됨"
 giga_blokkat_join.2042.desc:0 "§P블록워크 전송탑§!의 하이퍼 브래닉 뼈대가 완공되었습니다. 정성 들여 건설한 이 거대 구조물계의 경이는 우리의 현실이 블록워크로부터 우리 은하계에 주입되는 어마어마한 양의 에너지를 감당할수 있도록 해줄 것입니다.\n\n이제, 장치의 전력 핵을 조립하고 최종적으로 활성화 하는 것입니다."
 giga_blokkat_join.2042.a:0 "거의 다 되었습니다."
 giga_blokkat_join.2042.a.tooltip:0 "§B과학부 동조§! §G+5%§!\n§M국민 동조§! §G+5%§!"
 giga_blokkat_join.2043.name:0 "블록워크 전송탑 완공"
 giga_blokkat_join.2043.desc:0 "자기 자신을 §Y블록워크§!에 묶어두는 초차원 전력 핵을 추가함으로써 §P블록워크 전송탑§!이 완성되었습니다.\n\n블록캣과 함께 하겠다는 우리의 원대한 계획의 마지막 단계는 £energy£ §Y[blokkat_country.blokkat_ascension_cost]§!을 사용함으로써 그 장치를 활성화하는 것입니다. 준비가 되면 §B블록캣 연구 기관§!을 통해 활성화할 수 있습니다."
 giga_blokkat_join.2043.a:0 "마지막 한 걸음만."
 giga_blokkat_join.2043.a.tooltip:0 "§B과학부 동조§! §G+10%§! \n§H정부 동조§! §G+5%§! \n§M국민 동조§! §G+5%§! . "
 blokkat_requires_60_knowledge:0 "60 이상의 $blokkat_knowledge$을 가지고 있어야만 합니다."
 giga_blokkat.3000.joinblokkats6:0 "§Y프로토콜§! 완료 | $blokkat_knowledge$ §Y60§! & §Y[blokkat_country.blokkat_ascension_cost] £energy£"
 giga_blokkat.3000.joinblokkats6.tooltip:0 "§E블록킬리언 방정식§!이 해결되고, §H블록워크 전력 연결점§!이 작동 중이며, §P블록워크 전송탑§!이 건설되었습니다. §Y블록-프로토콜§!을 완료하는데 필요한 모든 것이 준비되었습니다.\n\n§Y우리는 블록캣과 함께할 것입니다. 은하계의 모두를 없애면서 말입니다.§!"
 giga_blokkat_join.2044.name:0 "블록캣"
 giga_blokkat_join.2044.desc:0 "§G(통신 수립)\n(수신인의 의식 조사 중)\n(평가: 블록캣화 준비됨)§!\n\n§Y[ROOT.GetSpeciesNamePlural]§! 여러분들, §P블록워크 전송탑§!을 완성하셨군요, 축하합니다. 이제 여러분이 해야할 일은 그 장치에 §Y[blokkat_country.blokkat_ascension_cost]§! £energy£를 투입하는 것이고, 그러면 §Y블록-프로토콜§!이 완료될것입니다. \n\n끝나면, 여러분 §Y지도자§!의 의식과 본질이 §Y블록워크§!에 전송되고 §Y블록캣 섀시§!를 얻게될 것입니다. 여러분 국민의 본질은 훨씬 더 강력한 §Y블록캣 본질§!에 합쳐지고 §Y블록워크§!에 업로드될 것입니다. \n\n 이전에 말했듯이 여러분은 §Y은하 CE-1461§!의 수확 활동을 완전히 통제할 수 있게 될 것이며, §Y이를 완수해야 합니다.§!"
 giga_blokkat_join.2044.a:0 "마침내! 우리는 위대한 것이 될 수 있으리라."
 giga_blokkat_join.2044.a.tooltip:0 "새로운 §B블록캣 연구 프로젝트§!를 §Y블록캣 연구 기관§!에서 연구 가능합니다."
 blokkat_bureau_fight_blokkats_desc:0 "§Y블록캣 수확자§!들은 전 은하에 대한 실존적 위협입니다. 그들에게 맞서 싸우려면, 최대한 많은 §G블록캣 지식§!을 모아야 합니다.\n\n이는 §Y특정 반복 연구를 진행하고§! §Y다양한 작업을 완료하며§!, §Y특별 프로젝트를 수행§!하여 얻을 수 있습니다.\n\n우리의 최우선 목표는 §Y초차원 불안정제§!, 이론적으로는 §Y블록캣-베스터§!의 보호막을 제거할 수 있는 §Y초거대 구조물§!을 설계할 충분한 §G블록캣 지식§!을 모으는 것입니다."
 blokkat_bureau_join_blokkats_desc:0 "§Y블록캣 수확자§!들은 아름답고, 또 매력적입니다. 그들과 함께 우주를 '완벽'으로 재구축하는 대업에 함께할 수 있는데 그들과 맞서 싸울 이유가 있겠습니까? 그들과 함께하기 위해서는 가능한 한 많은 §G블록캣 지식§!을 모아야 할 것입니다.\n\n이는 §Y특정 반복 연구를 진행하고§! §Y다양한 작업을 완료하며§!, §Y특별 프로젝트를 수행§!하여 얻을 수 있습니다.\n\n우리의 최우선 목표는 충분한 §G블록캣 지식§!을 축적하여 어떻게 하면 블록캣의 대업에 함께할 수 있을지 알아내야 합니다. 그러니 가급적 빨리 연구 시설에 투자하는 것이 좋을것입니다."
 blokkat_bureau_knowledge_fight_blokkats_desc:0 "§G블록캣 지식§!은 블록캣과 그들의 기술에 대한 우리의 복합적 지식의 총합입니다. §Y블록캣-베스터§!에 맞서 싸우고자 한다면 가능한 한 많은 지식을 모아야할 것입니다."
 blokkat_bureau_knowledge_join_blokkats_desc:0 "§G블록캣 지식§!은 블록캣과 그들의 기술에 대한 우리의 복합적 지식의 총합입니다. 우주를 재구축하고자 하는 블록캣의 대업에 함께할 방법을 찾고자 한다면, 가능한 한 많은 지식을 모을 필요가 있습니다."
 giga_blokkat_mothership_player:0 "블록캣-베스터"
 giga_blokkat_mothership_player_desc:0 "블록캣-베스터"
 BLOKKAT_MOTHERSHIP_PLAYER:0 "핵"
 giga_blokkat_join.5000.name:0 "블록캣 적대"
 giga_blokkat_join.5000.desc:0 "' 정부가 절멸적 침략자와 손을잡았다', '[ROOT.GetRulerName](은)는 블록캣 침입자인가?', '블록캣 연구 기관의 과학자들이 힘에 미쳤다' 등 수백개의 비판이 §Y[ROOT.capital_scope.GetName]§!와 §Y[ROOT.GetName]§! 전체의 헤드라인을 차지했습니다.\n\n예상대로 우리 국민들은 현재 은하계 주민들은 신경도 쓰지 않으면서 은하 전체를 집어삼키려는 외은하 침략자들과 함께한다는 결정에 충격을 받고 불만을 표하고 있습니다.\n\n이미 거의 모든 행성에서 대규모 시위가 발생하고 있으며, 사회의 모든 계층이 소란을 피우고 있습니다. 그러니 국민들과 지도부에게 블록캣과 함께한다는 선택이 정말 옳은 것이라고 설득하려면 엄청난 노력이 필요할 것입니다.\n\n§G블록캣 동조§!라 이름 붙여진, 국민들의 우리 계획에 대한 수용이 낮다면 우리 제국에 §R큰 불이익§!을 안겨다 줄 것입니다. 이는 §P군부 동조§!와 §B과학부 동조§!, §H정부 동조§!, §M국민 동조§!로 나누어지며, 우리 제국의 각 부분의 의견을 나타내고 평균값은 §G전국적 동조§!입니다.\n\n§Y블록캣 연구 기관§!을 통해 §G블록캣 동조§!를 확인할 수 있습니다"
 giga_blokkat_join.5000.a:0 "우리가 옳았음을 알게될 것입니다."
 giga_blokkat_join.5000.a.tooltip:0 "현재 §G블록캣 동조§!가 활성화되어 있으며, 해결될 때까지 제국에 심각한 영향을 미칠 것입니다.\n\n§Y블록캣 정보 기관§! 위에 있는 '의지 관리' 버튼을 이용해 다양한 §G블록캣 동조§! 값을 확인할수 었습니다.\n\n낮은 동조 문제를 해결하기 위해 §G동조 시행령§!을 시행할 수 있습니다.\n버튼이 보이지 않으면 시행령을 사용해 확인할 수 있습니다."
 giga_blokkat_join.5001.name:0 "지도자가 대규모 시위를 일으키다!"
 giga_blokkat_join.5001.desc:0 "우리의 일반 대중과 마찬가지로, 제국 내 최고지성들 몇몇 또한 블록캣과 손을 잡는다는 선택을 거부하고 시위에 나섰습니다.\n\n계획에 대한 자신의 불만을 표하기 위해 자신의 의무를 다하기를 거부하는 이 반동분자들은 이 ' 정신나간 계획'을 완전 철회하지 않는 이상 시위를 멈추지 않겠다고 말했습니다.\n\n이러한 나약한 자들을 그냥 해고할 수도 있고, §Y블록캣 연구 기관§!의 동조 탭을 통해 §Y통합력§!과 §Y영향력§!을 사용 해 설득해볼 수도 있습니다. 기관의 지도부는 우리에게 느낌이 좋은 결과를 낼 것이며, 이러한 지도자들은 마음을 바꾸어 다시 우리와 함께하리라 장담했습니다만, 말은 쉬운 법이죠... "
 giga_blokkat_join.5001.a:0 "그들은 생각을 바꿀것입니다... 그렇게 만들것입니다."
 giga_blokkat_join.5001.a.tooltip:0 "§Y지도자 후보군§!의 약 §Y[ROOT.blokkat_willingness_leader_strike_percent]%§!가 지도자의 생산성에 심각한 영향을 주는 §Y반-블록캣 투쟁§! 특성을 얻습니다. 항의에 나선 지도자들의 비율은 우리가 §Y평등주의§!일수록 더 높아집니다.\n\n우리의 계획이 진행됨에 따라 몇몇은 우리와 함께할 수도 있고, 아니면 §Y블록캣 연구 기관§!의 동조 탭을 통해 그들을 설득해볼 수 있습니다."
 giga_blokkat_join.5500.willingness_global_count:0 "§G전국적 블록캣 동조§!: §Y[ROOT.blokkat_willingness_global_value]%§!"
