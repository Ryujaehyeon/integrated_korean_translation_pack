 requires_tech_lgate_construction:0 "$TRIGGER_FAIL$기술 £physics£ §Y$lgate_construction$§!이(가) 필요합니다."
 tech_lgate_construction:0 "$lgate_construction$"
 tech_lgate_construction_desc:0 "나노 기술의 발전 덕분에 우리는 기존의 게이트에 의존하는 대신, 우리만의 §E$lgates$§!를 건설하기 시작할 수 있습니다."
 war_goal_wg_claim_lgates:0 "L-게이트 확보"
 war_goal_wg_claim_lgates_desc:0 "L-게이트의 봉쇄는 우리가 L-게이트 뒤에 스스로를 봉인하기 전에 우리의 신, 데사누의 최종 명령이었습니다. 우리는 이 이단자들이 소유한 모든 L-게이트를 확보하고 이 어리석은 자들이 그것을 열지 못하도록 싸울 것입니다."
