l_korean:
 TECH_UNLOCK_L_GATE_DESC:0 "이 기술은 우리가 소유한 공간 내에서 §E$lgates$§!를 건설하고 활성화하는 기능을 잠금 해제합니다."
 TECH_UNLOCK_L_GATE_TITLE:0 "§H특징 잠금 해제:§! $lgate_construction$"
 casus_belli_cb_lgate_containment:0 "L-게이트 억제"
 civic_gateway_worshiper:0 "수호자 경배자"
 civic_gateway_worshiper_desc:0 "오래 전, 고대의 선조 종족인 데사누가 이 사회와 접촉하였습니다. 데사누는 의심할 여지 없이 이 원시 사회에 기술을 제공하고 발전시킴으로써 그들에게 흔적을 남겼습니다. 데사누를 신으로 숭배하는 이 사회는 L-게이트를 신성한 유물로 모십니다. 그들의 사회는 데사누와의 계약을 유지하도록 구조화되어 있습니다. 이 계약은 L-게이트를 휴면 상태로 유지하겠다는 맹세였습니다."
 civic_gateway_worshiper_effects:0 "고향 세계는 §Y가이아 세계§! (크기: £planetsize£ §Y25§!)\n§Y가이아 세계§!에만 정착할 수 있습니다.\n§Y칙령 잠금 해제:§! L-게이트 성화\n고향 항성계에 §YL-게이트§!를 보장합니다.\n§YL-게이트 통찰§! 연구는 §R비활성화됨§!\n종족 기원의 신비와 L-게이트가 그 모든 것에 어떻게 관련되는지를 풀어내기 위한 §Y독특한 퀘스트라인§!이 있습니다."
 edict_consecrate_lgate:0 "L-게이트 성화"
 edict_lgate_guardian:0 "L-게이트의 수호자"
 feature_lgate_construction:0 "$lgate_construction$"
 feature_lgate_construction_desc:0 "우리가 §E$lgates$§!를 재건하고 건설할 수 있게 해줍니다."
 lgate_construction:0 "L-게이트 건설"
 lgate_construction_desc:0 "이 제국이 §E$lgates$§!를 재건하고 건설할 수 있게 합니다."
 requires_1_lgate:0 "§R1개 필요§! §YL-Gate§!"
