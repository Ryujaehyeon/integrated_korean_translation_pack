l_korean:
 mem_caretakers_trait:0 "관리 드론"
 mem_caretakers_trait_desc:0 "이 작고 유순한 종족은 복잡한 기계에 대한 선천적인 이해를 갖도록 설계되었습니다."
 mem_caretaker.1.name:0 "정비 대원"
 mem_caretaker.1.desc:0 "§Y[Root.GetName]§!는 §Y[From.Solar_System.GetName] 시스템§!에 있는 버려진 거주지 기지에 대한 조사를 완료했습니다. 고급 나이에도 불구하고 여전히 작동하는 것처럼 보이며, 용량의 절반으로 운영되고 있습니다. \n\n내부에서 감지된 생명 신호는 수많은 작은 생물의 존재를 나타냅니다. 이들은 진정한 지능을 갖추고 있지는 않지만, 복잡한 기계에 대한 본능적인 이해를 갖도록 번식되었거나 유전자 조작된 것으로 보입니다. 몇 개의 구획이 무너진 것을 제외하면, 이들은 오랜 기간 동안 기지를 거주 가능하게 유지해왔으며, 아마도 정당한 소유자가 도착하여 거주지를 차지하기를 기다리고 있었던 것으로 추정됩니다. \n\n적절한 기술이 있다면 이 하위 존재들을 발전시킬 수 있을지도 모릅니다."
 d_mem_caretakers_ruined_section:0 "황폐화된 구역"
 d_mem_caretakers_ruined_section_desc:0 "이 거주지 구역은 노후화와 소행성 충돌 때문에 결국 붕괴했습니다. 다시 거주할 수 있게 만들기 위해선 많은 수리와 정비가 필요합니다."
