l_korean:
 mem_llayids_category:0 "신비한 행성 고리"
 mem_llayids_category_desc:0 "인공적인 것으로 보이는 미확인 물체들이 거대 가스 행성의 고리에서 발견되었습니다. 이 물체들이 어떻게 여기에 도달했는지를 알기 위해 연구 스테이션을 건설하는 것을 추천합니다."
 mem_llayids_dig_site:0 "문명의 흔적"
 mem_llayids_chain_title:0 "문명의 흔적"
 mem_llayids_chain_desc:0 "$mem_llayids_category_desc$"
 mem_llayids_poi_title:0 "거대 가스 행성의 고리"
 mem_llayids_poi_desc:0 "$mem_llayids_category_desc$"
 mem_llayid_planet:0 "폐허가 된 거주지"
 mem_llayid_planet_desc:0 "이 거대 가스 행성의 고리는 일련의 서식지의 잔존자와 그 안에 살았던 문명의 잔재로 이루어져 있습니다."
 mem_llayids.1.name:0 "문명의 흔적"
 mem_llayids.1.desc:0 "이 거대 가스 행성의 고리는 한때 행성을 공전하던 일련의 서식지의 잔해로 구성된 것으로 보이며, 먼 과거의 어떤 대재앙으로 파괴되었습니다. 그러나 이 사건의 원인은 명확하지 않으며, 물자 잔해는 우리가 알고 있는 것과 일치하지 않습니다. [root.leader.GetName]는 그들의 멸망 원인을 알아내기 위해 이전 거주자들을 더 연구할 것을 권장했습니다. 그것이 우리가 상상하기 어려운 초무기였을까요?"
 mem_llayids.1.desc.hive:0 "이 거대 가스 행성의 고리는 한때 행성을 공전하던 일련의 서식지의 잔해로 구성된 것으로 보이며, 먼 과거의 어떤 대재앙에 의해 파괴되었습니다. 그러나 이 사건의 원인은 명확하지 않으며, 물자 잔해는 이전에 접촉했던 어떤 벌집과도 일치하지 않습니다. 아마도 우리는 일부 드론을 배치하여 이전 거주자들을 연구하고 그들의 멸망 원인을 규명해야 할 것입니다. 그것이 작동 중인 초강력 무기였던 것일까요?"
 mem_llayids.1.desc.machine:0 "이 거대 가스 행성의 고리는 한때 행성을 공전하던 일련의 서식지의 잔해로 구성된 것으로 보이며, 먼 과거의 어떤 대재앙에 의해 파괴되었습니다. 그러나 이 사건의 원인은 명확하지 않으며, 물자 잔해는 우리의 데이터 뱅크와 일치하지 않습니다. 아마도 우리는 이전 거주자들을 연구하고 그들의 멸망 원인을 규명하기 위해 몇 가지 서브루틴을 설정해야 할 것입니다. 그것이 작동 중인 초특급 무기였을까요?"
 mem_llayids.1.A:0 "끔찍하군!"
 mem_llayids.1.B:0 "더 자세히 알아보자."
 mem_llayids.1.C:0 "초강력 무기라고?"
 mem_llayids.1.purifier:0 "훌륭해. 더러운 외계종들이 서로 죽고 죽이는군. 우린 무기만 회수하자..."
 mem_llayids.1.swarm:0 "훌륭해. 우리가 안해도 유기체들이 알아서 멸종하는군. 우린 무기만 회수하자..."
 mem_llayids.1.terminator:0 "이 식량은 이미 부패한 지 오래다. 하지만 요리된 과정을 연구해보자."
 mem_llayids.2.title:0 "[from.GetName]의 고리 연구 개시"
 mem_llayids.2.desc:0 "[from.GetName] 위의 연구 스테이션은 한때 여기에 살던 문명의 번성과 파괴를 조사할 것입니다."
 mem_llayids.2.desc.weapon:0 "[from.GetName] 위의 연구 기지가 한때 이곳에서 번영했던 문명을 파괴한 무기의 흔적을 찾기 위해 준비되었습니다."
 mem_llayids.4.title:0 "초강력 무기 탐색 실패"
 mem_llayids.4.desc:0 "[mem_llayid_planet.GetName] 주위에 한때 존재했던 외계 문명의 다양한 유적 중에서, 우리의 연구원들은 모든 종류의 불쾌한 외계 유물을 발견했지만, 무기나 초무기의 흔적은 발견하지 못했습니다. 외계 유적이 더 이상 우리에게 도움이 되지 않으므로, 이에 대한 연구는 중단되었습니다."
 mem_llayids.4.desc.hive:0 "[mem_llayid_planet.GetName] 주위에서 한때 살았던 외계 문명의 다양한 유적들 중에서, 우리의 탐색 드론은 온갖 종류의 외계 유물을 발견했지만, 무기나 초강력 무기의 흔적은 전혀 찾지 못했습니다. 부패한 음식의 잔여물은 더 이상 우리에게 쓸모가 없으므로, 이에 대한 연구는 중단되었습니다."
 mem_llayids.4.desc.machine:0 "[mem_llayid_planet.GetName] 주위를 한때 살아갔던 유기체 문명의 다양한 잔존물 중에서, 우리의 탐색 드론은 온갖 종류의 잔존자를 발견했지만, 무기나 초급 무기의 흔적은 전혀 찾지 못했습니다. 우리는 파괴된 것들보다는 구축함에만 관심이 있었기에 (결국 우리가 그들을 발견했다면 그들도 같은 운명을 맞이했을 것입니다), 그들에 대한 연구는 중단되었습니다."
 mem_llayids.4.A:0 "아쉽군."
 mem_llayids.6.name:0 "리아이드에 대한 연구 결과"
 mem_llayids.6.desc:0 "[From.Planet.GetName] 주위를 도는 이전 서식지의 잔해를 조사하는 동안, 한 연구원이 주민들의 묘사를 발견했습니다. 우리 연구원들은 이들을 "Llayids"라고 부르기로 했습니다. 이들은 특이한 삼중체 구조를 가지고 있습니다: 삼각대처럼 세 개의 다리로 곧게 서 있으며, 세 개의 팔이 두 세트로 나뉘어 있습니다 - 각 팔에는 세 개의 손가락이 있습니다 - 그리고 세 개의 머리를 가지고 있습니다! 각 머리에는 하나의 눈, 하나의 귀, 두 개의 입이 있으며, 아마도 하나는 말하기 위해, 다른 하나는 먹기 위해 존재하는 것 같습니다. Llayids의 유기체 잔해를 찾지 못한 것은 안타까운 일입니다 - 그들의 생물학은 진정한 경이로움이었을 것입니다!\n\n이 묘사 근처에서, 우리 연구원은 Llayid 문자로 여겨지는 예시도 발견했습니다. 그러나 이를 번역하려는 우리의 시도는 지금까지 헛수고에 그쳤습니다."
 mem_llayids.6.desc.hive:0 "[From.Planet.GetName] 주위를 돌던 이전 서식지의 잔해를 조사하던 중, 한 탐색 드론이 "Llayids"라는 이름을 부여받은 주민들의 모습을 발견했습니다. 그들은 삼각형의 몸 구조를 가지고 있습니다: 삼각대처럼 세 개의 다리로 똑바로 서 있으며, 세 개의 팔이 두 세트로 나뉘어 있습니다 - 각 팔에는 세 개의 손가락이 있습니다 - 그리고 세 개의 머리를 가지고 있습니다! 각 머리에는 하나의 눈, 하나의 귀, 그리고 두 개의 입이 있으며, 하나는 말하기 위해, 다른 하나는 먹기 위해 사용되는 것으로 보입니다. Llayids의 유기체 잔해를 찾지 못한 것은 안타까운 일입니다 - 그들은 정말로 놀라운 생물학적 구조를 가지고 있었던 것 같습니다!\n\n이 모습 근처에서, 우리의 탐색 드론은 Llayid 문자로 여겨지는 예시도 발견했습니다. 그러나 이를 번역하려는 시도는 지금까지 헛수고에 그쳤습니다."
 mem_llayids.6.desc.machine:0 "[From.Planet.GetName] 주위를 도는 이전 서식지의 잔해를 조사하는 동안, 한 탐색 드론이 "Llayids"라는 코드명으로 분류된 거주자의 모습을 발견했습니다. 그들은 삼각형의 몸 구조를 가진 독특한 생명체로, 삼각대처럼 세 개의 다리로 똑바로 서 있으며, 세 쌍의 팔을 가지고 있습니다 - 각 팔에는 세 개의 손가락이 있습니다 - 그리고 세 개의 머리를 가지고 있습니다! 각 머리에는 하나의 눈, 하나의 귀, 그리고 두 개의 입이 있으며, 아마도 하나는 말하기 위해, 다른 하나는 먹기 위해 존재하는 것 같습니다. Llayids의 유기체 잔해를 찾지 못한 것은 안타까운 일입니다 - 이렇게 비효율적인 몸 구조가 어떻게 작동했는지 보는 것은 흥미로울 것입니다.\n\n이 모습 근처에서, 우리의 탐색 드론은 Llayid 문자로 여겨지는 예시도 발견했습니다. 그러나 이를 번역하려는 시도는 지금까지 헛수고에 그쳤습니다."
 mem_llayids.8.name:0 "추가적인 리아이드 자료 발견"
 mem_llayids.8.desc:0 "Llayids의 멸망을 둘러싼 미스터리가 깊어지고 있습니다. 우리의 팀은 그들의 서식지를 파괴한 원인에 대한 어떤 증거도 찾지 못했지만, 작은 우주선의 파편부터 전체 건물, 일상적인 물건에 이르기까지 많은 항목을 목록화했습니다. 불행히도, 그들의 전자 시스템은 매우 견고한 설계가 아니었던 것 같아, 지난 몇 천 년 동안 살아남은 것은 극히 적습니다.\n\n하지만 우리의 연구원들을 놀라게 한 것은 단 하나의 물체도 무기로 확인되지 않았다는 점입니다. 이는 우리의 과학자들이 Llayids가 완전히 평화적인 종이었다고 이론화하게 만들었습니다. 누가 또는 무엇이 그들의 파괴를 원했을까요?"
 mem_llayids.8.desc.hive:0 "Llayids의 멸망을 둘러싼 미스터리가 깊어지고 있습니다. 우리의 탐색 드론은 그들의 서식지가 파괴된 원인에 대한 어떤 증거도 찾지 못했지만, 작은 우주선의 파편부터 전체 건물, 일상적인 물건에 이르기까지 많은 항목을 목록화했습니다. 불행히도, 그들의 전자 시스템은 매우 견고한 설계가 아니었던 것 같아, 지난 몇 천 년 동안 살아남은 것은 거의 없습니다.\n\n예상과는 달리, 우리의 탐색 드론은 무기로 식별될 수 있는 단 하나의 물체도 찾지 못했습니다. 따라서 우리의 연구 서브루틴은 Llayids가 완전히 평화적인 종이었다는 새로운 가설을 제안합니다. 누가 또는 무엇이 그들의 파괴를 원했을까요?"
 mem_llayids.8.desc.machine:0 "$mem_llayids.8.desc.hive$"
 mem_llayids.8.option:0 "흥미롭군."
 mem_llayids.10.name:0 "리아이드 연구에 진전"
 mem_llayids.10.desc:0 "우리 연구팀은 Llayids에 대한 잠재적인 돌파구를 마련했습니다: 수천 개의 시각 데이터 항목이 포함되어 있을 것으로 생각되는 온전한 데이터 코어가 발견되었습니다. 그러나 이를 [root.owner.GetSpeciesAdj] 시각 감각 시스템과 호환되는 형식으로 보기 위해서는 상당한 노력이 필요할 것입니다 - Llayid 언어를 번역해야 한다는 점은 말할 것도 없습니다.\n\n연구팀은 해당 데이터 코어에서 어떤 데이터를 추출할 수 있을지 알아보기 위한 프로젝트를 설정했습니다."
 mem_llayids.10.desc.hive:0 "우리의 연구 서브루틴이 Llayids에 대한 잠재적인 돌파구를 마련했습니다: 수천 개의 시각 데이터 항목이 포함되어 있을 것으로 생각되는 온전한 데이터 코어가 발견되었습니다. 그러나 이를 [root.owner.GetSpeciesAdj] 시각 감각 시스템과 호환되는 형식으로 보기 위해서는 상당한 노력이 필요할 것이며, Llayid 언어를 번역해야 한다는 점도 간과할 수 없습니다.\n\n우리는 그 데이터 코어에서 어떤 데이터를 추출할 수 있을지 알아보기 위해 프로젝트를 설정했습니다."
 mem_llayids.10.desc.machine:0 "우리의 연구 서브루틴이 Llayids에 대한 잠재적인 돌파구를 마련했습니다: 수천 개의 시각 데이터 항목이 포함되어 있을 것으로 생각되는 온전한 데이터 코어가 발견되었습니다. 그러나 이 데이터를 우리의 시스템과 호환되는 형식으로 변환하는 데 상당한 노력이 필요할 것입니다 - Llayid 언어를 번역해야 한다는 점은 말할 것도 없습니다.\n\n우리는 이 데이터 코어에서 어떤 데이터를 얻을 수 있는지 알아보기 위한 프로젝트를 설정했습니다."
 mem_llayids.15.name:0 "리아이드 멸망의 진실"
 mem_llayids.15.desc:0 "우리 [root.owner.GetScientistResearchSubroutinePlural]는 데이터 코어에서 중요한 항목을 해독하는 데 성공했습니다. 그 안에는 Llayid 거주지가 여전히 온전하게 남아 있습니다. 다양한 크기의 수백 개가 사진 속에 고리 없는 거대 가스 행성을 공전하고 있는 모습이 보입니다.\n\n사진 속 Llayid들은 공개 의식에 참석하는 것처럼 보입니다: 많은 Llayid들이 공개 경기장에서 화면을 바라보며 두 Llayid가 이야기하는 모습을 지켜보고 있습니다. Llayid의 감정을 읽는 것은 어렵지만, 그들은 차분하고 심지어 기분이 좋은 것처럼 보입니다.\n\n"이것이 바로 그것입니다," 한 Llayid가 말합니다. "우리는 여기서 찾으러 온 것을 발견했습니다. 우리는 삶과 죽음의 의미를 알아냈습니다. 우리는 이제 우리가 누구인지, 어디서 왔는지, 어디로 가고 있는지를 알고 있습니다."\n\n다른 Llayid가 팔을 벌립니다. "이제 우리는 평화롭게 떠날 수 있습니다,"라고 말합니다. "저 너머는 더 이상 우리를 붙잡지 않습니다."\n\n경기장에서 Llayid들은 환호하며 거주지가 갑자기 폭발하는 것을 축하하는 것처럼 보입니다. 녹화가 중단되기 전에는 공포의 징후가 보이지 않으며, 오히려 Llayid들은 평온함과 황홀함이 뒤섞인 이상한 모습을 보입니다.\n\n우리는 Llayid들이 - 옳든 그르든 - 그들의 삶과 사후 세계의 비밀을 밝혀냈다고 믿었다고 추측할 수밖에 없습니다. 이는 그들의 사회의 기초를 충분히 흔들어 놓았고, 그들은 더 이상 살 이유가 없다고 집단적으로 결론을 내렸습니다. 그들은 생애 주기의 결론을 서둘러야 한다고 생각한 것입니다.\n\n코어에는 훨씬 더 많은 데이터가 포함되어 있으며, 잔해 필드에 있는 많은 잔존자들이 아직 목록화되지 않았습니다. 이는 이 장소가 Llayid의 호기심 많은 문명과 그 성취에 대한 더 많은 통찰력을 제공할 것임을 의미합니다."
 mem_llayid_investigation:0 "리아이드 데이터 핵"
 mem_llayid_investigation_DESC:0 "우리는 오랫동안 사라진 문명의 비밀을 밝혀줄 수많은 시각 데이터 항목이 포함된 데이터 코어를 발견했습니다. 그러나 데이터를 읽고 번역하는 데 상당한 노력이 필요할 것입니다."
 mem_llayid_weapon_investigation:0 "초강력 무기 탐색"
 mem_llayid_weapon_investigation_DESC:0 "한때 [mem_llayid_planet.GetName] 주위를 돌던 서식지를 파괴한 무언가가 있었습니다. 아마도 그것을 초래한 슈퍼무기의 흔적과 우리가 우리만의 슈퍼무기를 만드는 방법을 여전히 찾을 수 있을 것입니다..."
 mem_llayids_site:0 "문명의 흔적"
