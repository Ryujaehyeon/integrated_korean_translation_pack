 mem_options.5.name:0 "위기 옵션"
 mem_options.5.desc:0 "여기에서 다양한 옵션 중에서 선택할 수 있습니다."
 mem_options.5.a:0 "바주란 위협 §R비활성화§!"
 mem_options.5.a.tooltip:0 "바주란 위협 위기는 현재 §G활성화§! 중입니다."
 mem_options.5.b:0 "바주란 위협 §G활성화§!"
 mem_options.5.b2:0 "§G시작§! 바주란 위협을 30년 안에!"
 mem_options.5.b.tooltip:0 "바주란 위협 위기는 현재 §R비활성화§! 중입니다."
 mem_options.5.c:0 "바주란 성계에 버그가 있는 우주기지 수정"
 mem_options.5.c.tooltip:0 "바주란이 여전히 성계를 소유하고 있는 게임을 로드한 경우 게임은 점령할 수 없는 항성기지를 생성합니다. 이것을 사용하여 소유권을 우리 제국으로 전환하십시오."
 mem_options.5.d:0 "AI에 적대적인 바주란 설정"
 mem_options.5.d.tooltip:0 "현재 AI 제국에 대해 중립으로 설정되어 있습니다. 모든 피해는 이벤트 효과를 통해 발생합니다. 이는 그들이 함대를 자살하는 것을 방지하기 위한 것입니다.\n\n이 옵션을 선택하면 그들이 적대적으로 변하여 만나는 모든 AI 제국 함대를 공격하고 플레이어 제국을 공격할 때처럼 행동하게 됩니다."
 mem_options.5.e:0 "Vazurans를 AI에 대해 중립으로 설정합니다."
 mem_options.5.e.tooltip:0 "현재 AI 제국에 적대적으로 설정되어 있습니다. 플레이어 제국을 공격할 때처럼 행동합니다. 이로 인해 AI가 자살하는 함대를 만들 수 있습니다.\n\n이 옵션을 선택하면 중립으로 설정되어 만나는 모든 AI 제국의 함대를 무시합니다. 모든 피해는 여전히 이벤트 효과를 통해 발생합니다."
 mem_options.6.name:0 "보호막 행성 메뉴"
 mem_options.6.desc:0 "여기에서 보호막에 덮인 행성에 대한 다양한 설정을 활성화하거나 비활성화할 수 있습니다."
 mem_options.6.a:0 "행성 보호막 효과 §G활성화§!"
 mem_options.6.b:0 "행성 보호막 효과 §R비활성화§!"
 mem_options.6.c:0 "보호막 행성 효과 §G활성화§!"
 mem_options.6.d:0 "보호막 행성 효과 §R비활성화§!"
 mem_options.7.name:0 "강제 스폰 메뉴"
 mem_options.7.desc:0 "여기에서 다양한 이상 현상과 이벤트를 생성할 수 있습니다."
 mem_options.7.a:0 "이상현상 선택"
 mem_options.7.b:0 "이벤트 선택"
 mem_options.8.name:0 "이상현상 강제 스폰 하위 메뉴"
 mem_options.8.desc:0 "여기에서 다양한 이상현상을 생성할 수 있습니다. 옵션 중 하나를 클릭한 후 이틀 동안 기다리면 알림이 표시됩니다."
 mem_options.8.a:0 "Abandoned Mecha Tomb World 이상현상"
 mem_options.8.b:0 "Starship of the Fallen Tomb World 이상현상"
 mem_options.8.c:0 "Matrix Tomb World 이상현상"
 mem_options.8.d:0 "Giant Tanks Tomb World 이상현상"
 mem_options.8.e:0 "Lava Fortress 이상현상"
 mem_options.8.f:0 "Extinct Abductors 이상현상"
 mem_options.9.name:0 "이벤트 강제 스폰 하위메뉴"
 mem_options.9.desc:0 "여기에서 다양한 이벤트를 생성할 수 있습니다. 옵션 중 하나를 클릭한 후 이틀 동안 기다리면 알림이 표시됩니다."
 mem_options.9.a:0 "우주 수정 공격"
 mem_options.10.name:0 "이상현상 스폰"
 mem_options.10.desc:0 "카메라를 클릭하면 스폰 위치를 볼 수 있습니다."
 mem_options.11.name:0 "오릴라 함선 미리보기"
 mem_options.11.desc:0 "여기에서 테스트 목적으로 다가오는 오릴라 세력의 다양한 함선 클래스를 생성할 수 있습니다. 이들은 귀하의 수도에 나타날 것입니다."
 mem_options.11.a:0 "표준 드론 하나를 생성합니다."
 mem_options.11.b:0 "지휘 드론 하나를 생성합니다."
 mem_options.11.c:0 "호위함 하나를 생성합니다."
 mem_options.11.d:0 "타격 순양함 하나를 생성합니다."
 mem_options.11.e:0 "레비아탄 하나를 생성합니다."
 mem_options.11.f:0 "AI 레비아탄 하나 소환."
 mem_options.12.name:0 "고장난 시계 이벤트 하위메뉴"
 mem_options.12.desc:0 "Broken Clock는 중반 게임에서 위기와 유사한 결과를 초래하는 새로운 이벤트 체인입니다. \n\n일부 플레이어는 이것이 게임 밸런스에 바람직하지 않은 방식으로 영향을 미치거나, 밸런스를 변경하는 모드와 잘 어울리지 않거나, 선호하는 플레이 스타일에 맞지 않는다고 느낄 수 있습니다. 중반 게임이 시작되기 전에 위기를 비활성화할 수 있으며, 시작된 후에는 조기에 종료할 수 있습니다. \n\n이 메뉴에 접근할 수 있다고 해서 이 게임에서 반드시 이 위기가 발생하는 것은 아닙니다."
 mem_options.12.a:0 "이벤트 §R비활성화§!"
 mem_options.12.b:0 "이벤트 §G활성화§!"
 mem_options.12.c:0 "환영받지 못한 손님을 즉시 파괴"
 mem_options.13.name:0 "측량 프로브 이벤트 하위메뉴"
 mem_surveyor.13.desc:0 "조사 탐사선은 모드에 추가된 새로운 중립 세력으로, 가끔 등장할 수 있으며 중반 게임 위기로 발전할 수 있습니다. 이는 다른 모드나 선호하는 플레이 스타일의 균형에 간섭할 수 있으므로, 중반 게임이 시작되지 않았다면 이 게임에서 제거할 수 있습니다. \n\n이 메뉴는 반드시 탐사선이 이 게임에 존재한다는 것을 의미하지는 않습니다."
 mem_surveyor.13.a:0 "미치광이 프로브 제거."
 mem_surveyor.13.a.tooltip:0 "게임 중반 전에만 할 수 있습니다."
 mem_surveyor.13.b:0 "지금 위기를 촉발."
 mem_surveyor.13.b.tooltip:0 "멀티플레이어 게임에서는 위기를 수동으로 촉발할 수 없습니다."
 mem_surveyor.13.c:0 "측량 프로브 강제 스폰"
 mem_surveyor.13.c.tooltip:0 "프로브가 이전에 생성되지 않은 경우 임의의 위치에서 생성됩니다."
 mem_options.14.name:0 "고아 게이트 하위 메뉴"
 mem_options.14.desc:0 "고아의 관문은 게임 중에 외계 은하 군집에서 고급 제국이 생성될 가능성이 있습니다."
 mem_options.14.a:0 "사드렐 출현을 영구적으로 방지합니다."
 mem_options.14.b:0 "지금 게이트 열기 - 일반 사드렐"
 mem_options.14.c:0 "지금 게이트 열기 - 동화된 사드렐"
 mem_options.15.name:0 "통치자 초상화 전환"
 mem_options.15.desc:0 "이 이벤트를 통해 현재 통치자의 외모를 우리의 독특한 초상화 중 하나로 변경하고, 이 리더가 여전히 당신의 통치자일 경우 원래 상태로 되돌릴 수 있습니다. 이 변화는 순전히 외형적인 것입니다."
