l_korean:
 edict_mem_options_menu:0 "More Events Mod 옵션"
 edict_mem_options_menu_desc:0 "이 시행령으로 옵션 메뉴를 열 수 있습니다."
 mem_dmm_name:0 "이벤트 추가 모드"
 mem_options_chain_title:0 "MEM 옵션"
 mem_options_chain_desc:0 "이 메뉴는 현재 게임을 사용자가 정의한 환경 설정을 기반으로 다양한 옵션을 제공합니다. 이 옵션은 전적으로 선택 사항입니다. 조작하지 않을 시 MEM 표준 설정으로 모든 것이 설정됩니다. 메뉴를 열려면 프로젝트를 완료하세요."
 MEM_OPTIONS_PROJECT:0 "메뉴 활성화"
 MEM_OPTIONS_PROJECT_DESC:0 "이 프로젝트로 옵션 메뉴를 열 수 있습니다."
 MEM_OPTIONS_REMOVAL_PROJECT:0 "메뉴 제거"
 MEM_OPTIONS_REMOVAL_PROJECT_DESC:0 "이 프로젝트는 이 게임에서 메뉴를 영구적으로 비활성화합니다. 더 이상 사용하지 않는 경우에만 이 작업을 수행하십시오."
 mem_options.back:0 "뒤로"
 mem_options.exit:0 "나가기"
 mem_options.4.name:0 "메인 메뉴"
 mem_options.4.desc:0 "여기서 다양한 옵션을 선택할 수 있습니다."
 mem_options.4.a:0 "위기 옵션"
 mem_options.4.b:0 "보호막 행성 옵션"
 mem_options.4.c:0 "아름다운 행성 변동치 §G활성화§!"
 mem_options.4.c.tooltip:0 "모든 가이아 행성과 링월드에 \"아름다운 행성\" 변동치를 추가합니다. (행복과 성장 속도에 10%, 모든 자원 및 과학 생산에 5%, 해당 행성에 있는 식민지의 이주 선호도 25%를 추가합니다.)"
 mem_options.4.d:0 "아름다운 행성 변동치 §R비활성화§!"
 mem_options.4.d.tooltip:0 "모든 가이아 행성과 링월드에 \"아름다운 행성\" 변동치를 제거합니다. (행복과 성장 속도에 10%, 모든 자원 및 과학 생산에 5%, 해당 행성에 있는 식민지의 이주 선호도 25%를 추가합니다.)"
 mem_options.4.e:0 "강제 스폰 메뉴"
 mem_options.4.f:0 "오릴라 함선 미리보기"
