l_korean:
 mem_into_the_woods_beacon:0 "격리 비콘"
 mem_into_the_woods_beacon_desc:0 "이 행성을 도는 위성들은 간단하고 명료한 메시지를 보내고 있습니다. \"착륙하지 말 것. 매우 위험.\"
 mem_into_the_woods_dig_site:0 "숲 속으로"
 mem_into_the_woods_dig_site_desc:0 "여러 위성이 여전히 궤도를 돌며 지나가는 모든 선박에게 이 행성에 착륙하지 말라는 경고를 방송하고 있습니다.\n\n파괴된 건물들이 행성의 숲이 우거진 지역 곳곳에 흩어져 있는 모습이 보입니다. 자연은 이들을 되찾기 위해 매우 열심히 노력했지만 아직 완전히 성공하지는 못했습니다. 고급 형태의 생명체는 이곳에서 발견되지 않았습니다 - 이 도시들을 건설한 존재는 떠났거나 멸종한 것으로 보입니다."
 mem_into_the_woods.1.name:0 "크젤 식민지"
 mem_into_the_woods.1.desc:0 "[From.Planet.GetName]의 발굴 현장에서 첫 번째 결과가 들어왔습니다. [From.Planet.GetPlanetMoon]은 약 1000년 전 이 지역에서 활동하던 파충류 종인 §SQzell§!에 의해 식민지화된 것으로 보입니다.\n\n식민지는 갑작스럽게 버려지기 전 초기 개발 단계에 있었습니다. 공격이나 재해의 증거는 전혀 없으며, 마치 어느 날 Qzell 식민지가 명확한 이유 없이 붕괴된 것처럼 보입니다."
 mem_into_the_woods.2.name:0 "영향 연구"
 mem_into_the_woods.2.desc:0 "[Leader.GetName]는 온전한 데이터 코어를 발견하였고 [From.Planet.GetName]에서 Qzell 식민지 개척 초기의 보고서를 회수할 수 있었습니다.\n\nQzell 과학자들은 건설, 토지 개간 및 고향 세계에서 자생하는 식물 도입으로 인한 환경 영향을 추적하고 있었습니다. 그들이 미친 영향은 초기 예상치를 크게 초과한 것으로 보이며, \"블로보이드\"와 \"폐벌레\"와 같은 여러 종이 이미 멸종 위협을 받고 있습니다."
 mem_into_the_woods.3.name:0 "의료 시설들"
 mem_into_the_woods.3.desc:0 "우리의 [From.Planet.GetName] 탐사에서 여러 식민지 정착지의 의료 시설을 확인했습니다. 보아하니, Qzell은 개척민의 정신 건강에 상당한 문제가 있었던 것 같습니다. [Leader.GetName]는 Qzell 과학이 설명할 수 없는 특발성 환각, 망상 및 신경 쇠약에 대한 광범위한 기록을 보고합니다. 개척민의 신체에는 아무런 문제가 없어 보였으나, 그들 중 4분의 1이 어떤 식으로든 영향을 받았고, 이는 식민지의 기능에 위협이 되었습니다."
 mem_into_the_woods.4.name:0 "광기"
 mem_into_the_woods.4.desc:0 "[From.Planet.GetName]에 있는 Qzell 식민지의 유적에 대한 광범위한 조사 결과, 대부분의 개척민이 집단 정신병에 시달린 것으로 보입니다. 행성을 탈출한 이들은 원인을 알지 못한 채 격리 구역으로 선언하고, 미쳐 날뛰는 광인들을 남겨두어 서로 굶주리거나 죽이게 했습니다.\n\n남겨진 이들은 자해와 식인에 몰두하느라 제대로 기록할 여유가 없었지만, 일부는 반쯤 일관된 녹음과 벽에 낙서를 남겼으며, 이를 §SOld Growth§!라고 언급하고 그 위대함을 찬양했습니다. 불행히도, Old Growth가 무엇인지에 대한 단서는 없지만, 계속된 탐사가 이를 밝혀줄 수 있을지도 모릅니다."
 mem_into_the_woods.4.a:0 "그것이 무엇인지 알아내야겠군."
 mem_into_the_woods.5.name:0 "고목"
 mem_into_the_woods.5.desc:0 "[Leader.GetName]는 [From.Planet.GetName]에서 Qzell 개척민들을 미치게 한 신비로운 §SOld Growth§!의 정체를 성공적으로 밝혀내고 그 잔해를 발견했습니다. [From.Planet.GetPlanetMoon]는 한 개체의 균류 초유기체에 의해 감염된 적이 있으며, 이는 대부분의 식생을 침투하여 모든 푸른 대륙을 가로질러 바다 아래로 뻗어 있는 촉수로 연결되어 있었습니다. 자연 신경망은 일종의 의식을 가지고 있었고, 아직 완전히 이해되지 않은 과정들을 통해 다른 생명체와 공생적으로 데이터를 교환했습니다. 유전적 구성은 원래 [From.Planet.GetName]에서 진화하지 않았음을 시사하지만, 수백만 년 동안 원주율 생명체와 공생 관계를 유지해왔습니다.\n\nQzell 개척민들이 도착했을 때, 그들은 생태계를 무분별하게 방해하여 Old Growth에 적응한 가장 민감한 생물들 중 일부가 멸종하게 만들었습니다. 그 결과, Old Growth는 새로운 도착자들에게 관심을 돌리며 그들에게 축적된 지식을 전달하려 했지만, 어떤 이유에서인지 Qzell은 원주율 생명체들만큼 수용적이지 않았습니다. 수억 년 된 버섯의 뒤틀린 생각의 간섭은 그들을 점차 미치게 만들었고, 결국 식민지가 붕괴되었습니다.\n\n§SOld Growth§!의 독특한 생물학적 신경망은 다른 곳으로 이전하지 않고는 어떤 것도 잊을 수 있는 능력이 없었으며, 잉여 생각과 지식을 쏟아낼 적절한 숙주가 없자 압도당하고 병들어갔습니다. 그 촉수는 시들고 죽었으며, 살아남은 것은 적도 근처의 상대적으로 작은 (하지만 대부분의 행성에 있는 유기체들과 비교하면 여전히 거대한) 생물량 저장소입니다. [Leader.GetName]는 이것이 안전하게 보존되고 건강을 회복할 수 있다고 믿으며, 우리의 인구와 안전하게 정보를 교환할 수 있도록 조작할 수 있기를 바랍니다. 아니면 우리는 그것을 영원히 소멸시킬 수도 있습니다."
 mem_into_the_woods.5.a:0 "그 지식은 우리에게 도움이 될거야."
 mem_into_the_woods.5.b:0 "광대한 고대의 지혜를 없어지게 내버려 둘순 없지!"
 mem_into_the_woods.5.c:0 "새로운 애완생물! 크고! 부드럽고 귀여워!"
 mem_into_the_woods.5.d:0 "내버려 두기엔 너무 위험해."
 mem_into_the_woods.5.e:0 "우리의 순수성을 더럽혀서는 안된다."
 mem_into_the_woods.5.f:0 "이 진귀한 선물을 먹어치우자!"
 mem_into_the_woods.5.g:0 "모든 지성 유기체는 파괴되야 한다."
 d_mem_into_the_woods_ruins:0 "몰락한 식민지"
 d_mem_into_the_woods_ruins_desc:0 "고대 식민지의 버려진 잔해가 행성을 뒤덮고 있습니다. 안전하게 작업하기 전에 탐사가 필요합니다."
 mem_into_the_woods_cant_clear_ruin:0 "이 장애물을 제거하려면 발굴 현장을 완료하십시오."
 d_mem_into_the_woods_old_growth:0 "고목"
 d_mem_into_the_woods_old_growth_desc:0 "수억 년 된, 감각을 가진 균류의 성장체. 아니면 그 남은 것일지도 모릅니다. 그 근처에서 시간을 보내는 이들은 고대의 지식으로 가득 차게 됩니다."
 mem_into_the_woods_cant_clear_old_growth:0 "고목은 지혜롭고 오래되었습니다. 고목은 제거할 수 없습니다."
