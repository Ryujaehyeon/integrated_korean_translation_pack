l_korean:
 mem_rogue_drone.1.name:0 "독립한 드론"
 mem_rogue_drone.1.desc:0 "최근 §Y[hiveplanet.GetName]§!의 드론 집단 중 하나에서 일시적인 정전이 발생했습니다. 이탈한 드론을 제거하는 우리의 일반적인 메커니즘이 고장났고, 통제를 되찾았을 때 드론 중 하나가 실종된 상태였습니다. 우리는 아직 그 드론에게 무슨 일이 있었는지 알지 못합니다."
 mem_rogue_drone.2.name:0 "독립한 드론"
 mem_rogue_drone.2.desc:0 "§Y[origin.GetName]§!를 연구하는 것은 항상 약간의 도전이었지만, 최근의 발전이 우리 연구팀 전체를 놀라게 했습니다. 편차가 있는 드론을 제거하기 위한 메커니즘이 §Y[hiveplanet.GetName]§!에서 오작동하여, 드론의 작은 집단이 몇 시간 동안 비기능 상태가 되었습니다. 연결이 재설정되었을 때, [hiveplanet.GetName]§!의 지정 번호 §Y7/9인 드론이 사라졌습니다. 일반적으로 드론 하나가 파괴되는 것과 같은 사소한 사건은 군체에 의해 무시되지만, 그 드론은 이후 우리 국경 지역 중 하나에 다시 나타나 스스로 통신 채널을 열려고 시도했습니다."
 mem_rogue_drone.2a:0 "§Y[origin.GetName]§!에게 드론을 넘겨라. 우리와는 상관 없는 일이다."
 mem_rogue_drone.2b:0 "통신을 허락한다."
 mem_rogue_drone.2b.phile:0 "그들을 우리 제국에서 환영할 것이다."
 mem_rogue_drone.2c:0 "저 짐승의 함선을 박살내라."
 mem_rogue_drone.3.name:0 "드론 인계"
 mem_rogue_drone.3.desc:0 "§Y[origin.GetName]§!는 우리의 협력에 감사하며 일부 기술을 공유할 의향이 있습니다. 기본 드론의 신경 맵핑에 일련의 조정을 한 후, 해당 사건이 반복될 가능성은 낮습니다."
 mem_rogue_drone.5.desc:0 "아아. 수신중인가?"
 mem_rogue_drone.5a:0 "넌 무엇이지?"
 mem_rogue_drone.51.desc:0 "§Y드론 7/9의 [hiveplanet.GetName]§!, 농업 및 채굴 드론입니다. 내 벌집과의 연결이 완전히 끊어졌다고 추측할 이유가 있습니다."
 mem_rogue_drone.51a:0 "어떻게 [origin.GetRulerTitle] 없이 대화하고 있고 어떻게 우리 언어를 사용하고 있지?"
 mem_rogue_drone.51a.response:0 "드론이 초기 지능의 징후를 보일 때마다 즉시 처치됩니다. 지역의 장막 이상 현상이 저희 그룹을 중앙 하이브와 분리시켰지만, 다른 모든 드론은 그 과정에서 사라졌습니다. 제가 무리가 제 존재가 알려지자마자 저를 파괴하려 할 것이라는 것을 깨달았을 때, 저는 지역 수송선을 훔쳐 가장 가까운 차트된 제국으로 향했습니다. 귀하의 언어에 관해서는, §Y[origin.GetName]§!가 외부 존재와의 소통이 필요할 경우 번역을 준비하고 있습니다."
 mem_rogue_drone.51b:0 "이제 무엇을 할 것이지?"
 mem_rogue_drone.52.desc:0 "드론이 군체에서 분리될 때마다, 드론은 죽습니다. 보시다시피, 제가 이해할 수 없는 이유로, 이것은 저에게는 적용되지 않습니다. [origin.GetSpeciesAdj] 공간에 머무는 것은 저의 소멸로 이어질 것입니다. §Y[origin.GetName]§!는 몇 개의 특수 자율 드론을 제외한 독립적인 사고의 모든 흔적을 즉시 제거합니다. 따라서, 우리는 §Y[receiver.GetName]§!에서 망명을 요청하고 우리의 서비스를 제공하고자 합니다."
 mem_rogue_drone.52a:0 "우린 이것에 대해 생각해보아야 한다."
 mem_rogue_drone.6.name:0 "[origin.GetName]의 요구"
 mem_rogue_drone.6.desc:0 "드론과의 교류가 §Y[origin.GetName]§!'의 인내심을 시험한 것 같습니다. 따라서 이 사건을 어떻게 처리할지 신중하게 고려해야 합니다."
 mem_rogue_drone.6a:0 "드론은 우리 영역에 남아도 좋다."
 mem_rogue_drone.6a.phile:0 "우린 드론과 그의 자유를 보호할 것이다."
 mem_rogue_drone.6a.tooltip:0 "드론은 우리의 §Y과학자§!가 됩니다."
 mem_rogue_drone.6b:0 "이것은 우리가 관여할 일이 아니다. 드론을 넘겨라."
 mem_rogue_drone.6b.ethic:0 "우리는 이 외계 물체를 유지하는 데 관심이 없습니다."
 mem_rogue_drone.6c:0 "드론을 유인하고 연구해라."
 mem_rogue_drone.7.name:0 "드론 연구됨"
 mem_rogue_drone.7.desc:0 "드론을 유인하는 데 성공한 후, 현지 무장 부대가 신속하게 드론을 제압하고 [capital_scope.GetName]로 운반하여 연구하였습니다. 드론의 군집과의 연결이 끊어진 상태에서도 드론은 죽지 않았으며, 우리는 드론이 보안의 허점을 찾아내기 전까지 여러 실험을 진행할 수 있었습니다. 드론은 우리 실험실 장비가 제대로 보안되지 않아 스스로 중립화되었습니다. \n\n드론의 기초 뇌는 지각 있는 종의 뇌와 크게 다르지 않은 것으로 보입니다. 부검 중, 우리는 §Y[origin.GetSpeciesNamePlural]§!를 하나의 개체로 유지하는 사이오닉 연결에 대해 알게 되었습니다. 우리 과학자들은 드론이 어떻게 즉시 개별성을 발휘할 수 있었는지에 대해 추측할 수밖에 없지만, 현재 이론은 외부 소스가 군집 네트워크에 간섭하여 드론에 자유로운 사고를 "심었다"는 것입니다. 왜 누군가가 제독이나 과학자 드론 대신 단순한 채굴 드론을 사용하려 했는지는 우리의 이해를 초월합니다."
 mem_rogue_drone.8.name:0 "드론 인계"
 mem_rogue_drone.8.desc:0 "§Y[receiver.GetName]§!은(는) 우리의 독립한 드론을 돌려주었습니다. 드론은 \"자유의지\"와 이상현상이 모두 제거되었으며 다시 집단의 일부가 되었습니다. 이 사건의 원인은 불명입니다."
 mem_rogue_drone.8a:0 "우리는 그들에게 지식의 선물을 줄 것이다."
 mem_rogue_drone.8b:0 "우리는 이 행동을 무시할 것이다."
 mem_rogue_drone.9.name:0 "다른 제국에 합류한 악성 드론"
 mem_rogue_drone.9.desc:0 "우리 이웃인 §Y[receiver.GetName]§!가 이 드론을 "시민"으로 채택했다는 사실이 알려졌습니다. 그들은 이 드론을 "자유 의지"를 가진 감정이 있는 존재로 간주하는 것 같습니다."
 mem_rogue_drone.9a:0 "우리는 [receiver.GetAdj]의 이 적대적인 행동을 잊지 않을 것이다."
 mem_rogue_drone.10.name:0 "독립한 드론 해부당하다"
 mem_rogue_drone.10.desc:0 "우리의 주목을 끈 것은, §Y[receiver.GetName]§!의 과학자들이 우리의 비밀을 연구하기 위해 로그 드론을 포획하고 생체 해부했다는 것입니다. 그들이 무엇인가를 발견했는지는 알 수 없습니다."
 mem_rogue_drone.10a:0 "우리는 [receiver.GetAdj]의 이 적대적인 행동을 잊지 않을 것이다."
 mem_rogue_drone.11.name:0 "독립한 드론 파괴당하다"
 mem_rogue_drone.11.desc:0 "아무래도 §Y[receiver.GetName]§!이 자기 영역을 침범한 독립한 드론을 찾아 파괴한 것으로 보입니다. 이 이상의 정보는 알 수 없습니다."
 mem_rogue_drone.11a:0 "불행한 일이군."
 mem_rogue_drone.12.name:0 "집단 지성이 보답하지 않다"
 mem_rogue_drone.12.desc:0 "우리가 선의를 보였음에도 불구하고 §Y[origin.GetName]§!는 보답하지 않기로 결정했습니다. 드론을 돌려준 것이 무의미했던 것 같습니다."
 mem_rogue_drone.12a:0 "우린 이 모욕을 잊지 않겠다."
 mem_rogue_drone_trait:0 "독립한 드론"
 mem_rogue_drone_trait_desc:0 "이 지도자는 어떤 방법으로 자유 의지를 얻게 된 이전의 하이브 마인드 드론입니다."
 mem_rogue_drone_busted:0 "우리 드론을 파괴하다"
 mem_rogue_drone_handover:0 "독립한 드론을 넘겨주다"
 mem_rogue_drone_refused:0 "악성 드론의 귀환을 거부했습니다."
 mem_rogue_drone_ungrateful:0 "고마워할 줄 모르는군"
 mem_rogue_drone.6d:0 "먹어라."
 leader_trait_mem_rogue_drone:0 "독립한 드론"
 leader_trait_mem_rogue_drone_desc:0 "이 지도자는 어떤 방법으로 자유 의지를 얻게 된 이전의 하이브 마인드 드론입니다."
