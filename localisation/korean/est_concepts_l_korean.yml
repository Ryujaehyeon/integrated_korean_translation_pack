 concept_est_chivalry_virtues:0 "기사도 미덕"
 concept_est_chivalry_virtues_desc:0 "이들은 §G보너스§!로, §Y$tradition_est_chivalry$§! 전통 트리를 완료할 때 부여됩니다. 한 번에 활성화될 수 있는 §Y미덕§!은 하나뿐이며, 통치자가 임명될 때마다 다른 §Y미덕§!을 선택할 수 있습니다. 사용 가능한 모든 명예로운 선택은 다음과 같습니다:\n* ['modifier:mod_est_chivalry_finish_courage']\n* ['modifier:mod_est_chivalry_finish_charity']\n* ['modifier:mod_est_chivalry_finish_diligence']\n* ['modifier:mod_est_chivalry_finish_duty']\n* ['modifier:mod_est_chivalry_finish_humility']"
