 concept_archivist_document_civilization:0 "$mission_est_archivist_1_document_civilization_1$"
 concept_archivist_document_civilization_desc:0 "이것은 §G우수한§! 버전의 §Y$mission_passive_observation$§!입니다. 마찬가지로, 이 임무는 ['concept_galactic_community']의 눈에 비추어 볼 때 수동적인 접근 방식으로 간주됩니다. §Y$mission_est_archivist_1_document_civilization_1$§!이 부여하는 보너스는 ['technology:tech_epigenetic_triggers'] 및 ['technology:tech_morphogenetic_field_mastery'] 기술을 잠금 해제할 때 §G증가합니다§!"
 concept_building_est_archivist_finish_archive:0 "$building_est_archivist_finish_archive$"
 concept_building_est_archivist_finish_archive_desc:0 "£job_researcher£ §Y연구원§! 및 §Y[bureaucrat.GetIcon] [bureaucrat.GetName]§! 직업을 제공합니다 (또는 £job_calculator£ §Y계산기§! 및 §Y[coordinator.GetIcon] [coordinator.GetName]§! 직위를 제공합니다, 만약 제스탈트라면), 그리고 행성에서 £unity£ §Y통합§! 및 £research£ §Y연구원 생산량§!을 증가시킵니다. 행성당 §G1§!로 제한됩니다."
 concept_est_symbiosis_approach_policy:0 "$policy_est_symbiosis_approach$"
 concept_est_symbiosis_approach_policy_desc:0 "우리의 유전자 숙련도에 따라, 이 정책은 우리 함선의 §G적응§!을 허용합니다 §Y$MOD_SHIP_HULL_REGEN_ADD_PERC$§! 또는 §Y$MOD_BIOSHIP_GROWTH_PROGRESS_ADD$§!을 허용합니다."
 concept_est_symbiosis_approach_policy_finisher:0 "$est_symbiosis_approach_2$"
 concept_est_symbiosis_approach_policy_finisher_desc:0 "이것은 ['concept_est_symbiosis_approach_policy'] 내에서 마지막 정책을 해제하며, 우리 함선을 §G적응§!시킬 수 있게 해줍니다 §Y$MOD_BIOSHIP_GROWTH_PROGRESS_ADD$§! §G+2§!만큼."
 concept_est_chivalry_virtue:0 "기사도 미덕"
