 UniqueAscensionPerksMenuEvents.1.AIequality.On.tooltip:0 "§R경고:§! 모드에서 AI 제국의 상승 특성 사용 가능성을 변경할 수 있는 옵션을 잠금 해제합니다."
 UniqueAscensionPerksMenuEvents.1.AIequality.Off.tooltip:0 "AI 제국이 상승 특성 가용성을 변경할 수 있는 옵션을 잠그고 초기화합니다."
 UniqueAscensionPerksMenuEvents.1.BuildingUpkeep.Off.tooltip:0 "전략 자원 건물 유지비 필요성을 제거하지만 행성에서 건물 건설 속도 보너스도 제거합니다."
 UniqueAscensionPerksMenuEvents.1.BuildingUpkeep.On.tooltip:0 "건물 유지 관리에 필요한 전략 자원을 제거하며, 행성에서의 건물 건설 속도를 증가시킵니다."
 UniqueAscensionPerksMenuEvents.1.Districts.Off.tooltip:0 "'$ap_pyramidal_society$' 상승 특성이 필요한 특별 구역을 제거하며, 게임에 존재하는 모든 제국에 적용됩니다. 그러나 해당 특성을 먼저 획득한 제국은 구역을 잃지 않습니다."
 UniqueAscensionPerksMenuEvents.1.Districts.On.tooltip:0 "'$ap_pyramidal_society$' 상승 특성이 필요한 특별 구역을 잠금 해제하며, 게임에 존재하는 모든 제국에 대해 적용됩니다."
 UniqueAscensionPerksMenuEvents.1.Heritage.Off.tooltip:0 "'$ap_lost_heritage$' 특성을 제거합니다. 이 특성은 일반적으로 승천 특성을 먼저 잠금 해제해야 하며, 게임에 존재하는 모든 제국에 해당합니다. 그러나 어떤 제국이 이 특성을 먼저 얻었다면, 그 특성을 잃지 않습니다."
 UniqueAscensionPerksMenuEvents.1.Heritage.On.tooltip:0 "게임에 존재하는 모든 제국에 대해 $ap_lost_heritage$ 기능을 잠금 해제하며, 이를 위해 승천 특성이 필요하지 않습니다."
 UniqueAscensionPerksMenuEvents.1.LeaderPowerful.Off.tooltip:0 "이 기능은 비활성화되지만 이미 수정된 지도자들은 변경되지 않습니다."
 UniqueAscensionPerksMenuEvents.1.LeaderPowerful.On.tooltip:0 "모든 지도자를 레벨 5로 직접 올리고 '$ap_expandable_brain_2$' 상승 특성과 같은 3개의 특성을 부여합니다. 이는 게임에 존재하는 모든 제국에 적용됩니다."
 UniqueAscensionPerksMenuEvents.1.LeaderTraits.Off.tooltip:0 "'$ap_expandable_brain_1$' 상승 특성이 필요했던 특별한 지도자 특성을 제거합니다. 이는 게임에 존재하는 모든 제국에 적용됩니다. 그러나 만약 어떤 제국이 이 특성을 먼저 얻었다면, 그들은 커스텀 지도자 특성을 잃지 않습니다."
 UniqueAscensionPerksMenuEvents.1.LeaderTraits.On.tooltip:0 "'$ap_expandable_brain_1$' 상승 특성이 필요한 특별한 지도자 특성을 잠금 해제하며, 이는 게임에 존재하는 모든 제국에 해당합니다."
 UniqueAscensionPerksMenuEvents.1.Manipulation.Off.tooltip:0 "'$ap_stellar_manipulation$' 특성을 제거합니다. 이 특성은 일반적으로 승천 특성을 먼저 잠금 해제해야 하며, 게임에 존재하는 모든 제국에 해당합니다. 그러나 어떤 제국이 미리 이 특성을 얻었다면, 그 특성을 잃지 않습니다."
 UniqueAscensionPerksMenuEvents.1.Manipulation.On.tooltip:0 "모든 제국이 게임에 존재하는 한, 승천 특성을 필요로 하지 않고 '$ap_stellar_manipulation$' 기능이 잠금 해제됩니다."
 UniqueAscensionPerksMenuEvents.1.SelfAware.Off.tooltip:0 "'$ap_self_aware_colony$' 특성과 상승 특성을 제거하며, 게임에 존재하는 모든 제국에 적용됩니다. 그러나 만약 어떤 제국이 이 특성을 미리 획득했다면, 그 특성은 잃지 않습니다."
 UniqueAscensionPerksMenuEvents.1.SelfAware.On.tooltip:0 "'$ap_self_aware_colony$' 기능과 상승 특성을 잠금 해제하며, 게임에 존재하는 모든 제국에 적용됩니다."
 UniqueAscensionPerksMenuEvents.Perks.Description.tooltip:0 "모드에 존재하는 상승 특성에 대한 모든 세부 정보를 보여주는 하위 메뉴로 이동합니다."
 AH_alien_ruins:0 "외계 유적 연구"
 AH_alien_ruins_intro:0 "고대 외계 문명의 유적이 §Y[special_project_target.GetName]§!에서 발견되었습니다. 즉시 §YScience Ship§!을 보내야 하며, 아마도 유용한 것을 찾을 수 있을 것입니다.\n\n(§SUnique Ascension Perks Mod§!)\" # \n\n보상:\n£society£ §G(200 - 600)§! §YAND§! £engineering£ §G(100 - 300)§!"
 AH_ancient_temple:0 "외계 신전 발견"
 AH_ancient_temple_intro:0 "고대 외계 문명의 신전이 §Y[From.Planet.GetName]§!에서 발견되었습니다. 우리는 탐험가 팀과 함께 즉시 §YScience Ship§!을 보내 내부에서 유용한 것을 찾아야 합니다.\n\n(§SUnique Ascension Perks Mod§!)\" # \n\n보상:\n£society£ §G(500 - 1000)§!"
 AH_city_ruins:0 "외계 도시 연구"
 AH_city_ruins_intro:0 "외계 도시가 §Y[special_project_target.GetName]§!에서 발견되었습니다. §Y과학선§!을 가진 탐사팀을 보내는 것이 고대 건축가가 어떻게 그렇게 독특한 건물을 만들었는지 이해하는 데 유용할 수 있습니다.\n\n(§S독특한 상승 특성 모드§!)\" # \n\n보상:\n£engineering£ §G(200 - 500)§! §Y그리고§! £society£ §G(100 - 300)§!"
 AH_old_databank:0 "AI 코어"
 AH_old_databank_intro:0 "§Y[From.Planet.System.GetName]§! 항성계에서 이상한 신호가 방출되고 있습니다. 그 신호의 원천 뒤에서 거대한 AI 코어가 발견된 것으로 보입니다. 그 구조물의 디자인은 매우 고대의 것으로 확인되며, 과거에 본 적이 없다는 것은 흥미로운 것들이 숨겨져 있을 가능성이 있음을 의미합니다. 이는 아마도 침입자로부터 보호하기 위해 방어 위치 뒤에 유사한 디자인의 군함들이 존재하는 이유이기도 합니다. 우리는 시스템을 정리하기 위해 호위를 보내고, 그 다음에는 §YScience Ship§!을 보내 코어를 연구해야 합니다.\n\n(§SUnique Ascension Perks Mod§!) # \n\nReward:\n£physics£ §G(8000 - 12000)§! §YAND§! £engineering£ §G(8000 - 12000)§!"
 AH_extinct_wildlife:0 "야생동물 발자국"
 AH_extinct_wildlife_intro:0 "우리는 §Y[From.Planet.GetName]§!에서 외계 제노 생명체의 거대한 발자국을 발견했습니다. 이 발자국이 우리를 매우 흥미로운 무언가로 이끌 가능성이 있지만, 이를 위해서는 더 조사하기 위해 §YScience Ship§!을 보내야 합니다.\n\n(§SUnique Ascension Perks Mod§!)\" # \n\n보상:\n£society£ §G(400 - 800)§! §YAND§! £food£ §G(500)§!"
 AH_abandoned_laboratory:0 "버려진 실험실"
 AH_abandoned_laboratory_intro:0 "버려진 연구소가 §Y[From.Planet.GetName]§!에서 발견되었습니다. 소유자가 어떤 종이었는지는 알 수 없지만, 유용한 연구를 찾기 위해 §YScience Ship§!와 함께 탐색 팀을 보낼 수 있습니다.\n\n(§SUnique Ascension Perks Mod§!) # \n\nReward:\n£physics£ £society£ £engineering£ §G(500 - 800)§!"
 AH_underground_entrance:0 "심연의 괴물"
 AH_underground_entrance_intro:0 "§Y[From.Planet.GetName]§! 우리 국민들은 두려워하고 있습니다. 처음에는 단순한 소문으로 보였던 것이 사실이었습니다. 행성의 깊은 곳에서 오는 괴물들이 무작위로 사람들을 죽이고 있습니다. 이런 일은 용납될 수 없습니다. 우리는 이 괴물들과 단호히 대처해야 하며, 지역 경찰은 강인한 §Y20 수송선§! 없이 우리 국민을 공격한 것이 실수였음을 이해하지 못할 것입니다. §R임무 중 일부 부대가 사망할 수 있습니다!§!\n\n(§S독특한 상승 특성 모드§!)\" # \n\n보상:\n£food£ £unity£ £society£ §Y임무 진행 상황에 따라§!"
 AH_deep_in_the_center:0 "자기 활동"
 AH_deep_in_the_center_intro:0 "행성: §Y[special_project_target.GetName]§!의 중심이 주변의 구멍에 완벽하게 맞지 않아 한쪽에서 다른 쪽으로 이동할 수 있으며, 이로 인해 행성의 다른 쪽에서 자기 활동이 발생하는 것 같습니다."
 AH_space_ruins:0 "외계 유적 연구"
 AH_space_ruins_intro:0 "고대 외계 문명의 유적이 §Y[special_project_target.GetName]§!에서 발견되었습니다. 즉시 §YScience Ship§!을 보내야 하며, 아마도 유용한 것을 찾을 수 있을 것입니다.\n\n(§SUnique Ascension Perks Mod§!)\" # \n\n보상:\n£society£ §G(200 - 600)§! §YAND§! £engineering£ §G(100 - 300)§!"
 AH_damaged_shipyard:0 "고대 조선소 활성화"
 AH_damaged_shipyard_intro:0 "§Y[special_project_target.System.GetName]§! 시스템에서 고대 조선소가 공허 속에서 떠다니고 있는 것이 발견되었습니다. 그들의 기계적 도구 대부분이 여전히 사용 가능한 것으로 보입니다. 오래된 구조물은 매우 크기 때문에 수리를 하고 새로운 군함 건설을 시작하기 위해 최소 3척의 §YConstruction Ships§!가 필요합니다.\n\n(§SUnique Ascension Perks Mod§!)\" # \n\n보상:\n£navy_size£ §G추가 함선§!"
 AH_unusual_region:0 "비정상 행성"
 AH_unusual_region_intro:0 "무언가 잘못되었습니다 §Y[special_project_target.GetName]§! 두 번째 스캔을 통해 이 행성이 조사되지 않은 비밀 지역을 숨기고 있다는 것을 확인할 수 있습니다. 이는 우리가 수집할 준비가 된 신규 자원을 찾을 수 있는 기회입니다. 이를 위해 우리는 더 깊은 조사를 위해 §YScience Ship§!을 보내야 합니다.\n\n(§SUnique Ascension Perks Mod§!)\" # \n\n보상:\n§GIncreased Output§! £volatile_motes£ §YOR§! £exotic_gases£ §YOR§! £rare_crystals£"
 AH_primitive_civilization:0 "공격적인 원시 문명"
 AH_primitive_civilization_intro:0 "어떤 외계 원주율 전사들이 §Y[From.Planet.GetName]§!에서 난동을 부리고 있습니다. 그들이 누구인지 이해해야 하지만, 우선 그들을 진정시켜야 합니다. §Y15 수송선§!이면 문제를 해결하기에 충분할 것입니다. §R임무 중 일부 병력이 사망할 수 있습니다!§!\n\n(§S독특한 상승 특성 모드§!)\" # \n\n보상:\n\n보상:\n£minerals£ §G(2500)§! §Y그리고§! £food£ §G(500)§! §Y그리고§! £society£ §G(1500 - 2500)§!"
 AH_new_discovery:0 "선조 도시 발견"
 AH_new_discovery_intro:0 "고대 도시가 §Y[special_project_target.GetName]§!에서 발견되었습니다. 우리의 전문가들은 이러한 건물이 단순한 고대 외계 문명에 의해 건설된 것이 아니라 기술적으로 고급인 고대 선조의 종족에 의해 지어졌다고 확인했습니다. 우리는 도시를 탐험하기 위해 §YScience Ship§!을 보내야 합니다.\n\n(§SUnique Ascension Perks Mod§!)\" # \n\n보상:\n£society£ §G(1500 - 2500)§! §YAND§! £unity£ §G(500 - 1000)§!"
 AH_false_planet_surface:0 "기계 행성 탐지됨"
 AH_false_planet_surface_intro:0 "신호가 §Y[From.Planet.GetName]§!에서 오고 있는 것 같습니다. 처음에는 단순한 거주 불가능한 행성처럼 보였던 것이, 표면을 찢어내며 인공 표면을 드러내기 시작했습니다. 이제 미공개 기계 행성이 존재한다는 것을 확인할 수 있습니다. 이제 질문은, 누가 그 기계 행성을 만들었고 왜 숨겼는가입니다? 우리가 확인할 수 있는 것은 건물들이 단지 프로토타입 형태라는 사실뿐입니다. 우리는 그 세계를 연구하기 위해 §YScience Ship§!을 보내야 합니다.\n\n(§SUnique Ascension Perks Mod§!)\" # \n\n보상:\n£§G행성이 기계 행성으로 변합니다§!"
 UniqueAscensionPerksSitesEvents.0.Name:0 "$AH_ancient_temple$ §G(1단계)§!"
 UniqueAscensionPerksSitesEvents.0.Desc:0 "$AH_ancient_temple_intro$"
 UniqueAscensionPerksSitesEvents.1.Name:0 "$AH_ancient_temple$: §G$HUMAN2_SHIP_Success$§!"
 UniqueAscensionPerksSitesEvents.1.Desc:0 "고대 외계 신전 탐사가 §Y[From.Planet.GetName]§! 종료되었습니다. 탐사를 담당했던 팀이 보고서를 보내왔습니다."
 UniqueAscensionPerksSitesEvents.10.Name:0 "$AH_city_ruins$ §G(1단계)§!"
 UniqueAscensionPerksSitesEvents.10.Desc:0 "$AH_city_ruins_intro$"
 UniqueAscensionPerksSitesEvents.11.Name:0 "$AH_city_ruins$: §G$HUMAN2_SHIP_Success$§!"
 UniqueAscensionPerksSitesEvents.11.Desc:0 "외계 도시인 §Y[special_project_target.GetName]§!에 대한 연구가 끝났습니다. 우리는 건물의 구조를 더욱 견고하고 안정적으로 만들기 위해 많은 새로운 기술을 배웠습니다."
 UniqueAscensionPerksSitesEvents.20.Name:0 "$AH_old_databank$ §R(3단계)§!"
 UniqueAscensionPerksSitesEvents.20.Desc:0 "$AH_old_databank_intro$"
 UniqueAscensionPerksSitesEvents.21.Name:0 "$AH_old_databank$: §G$HUMAN2_SHIP_Success$§!"
 UniqueAscensionPerksSitesEvents.21.Desc:0 "$AH_old_databank$의 연구가 완료되었습니다. 예상대로 우리는 매우 많은 흥미로운 연구 데이터를 확보하게 되었습니다."
 UniqueAscensionPerksSitesEvents.30.Name:0 "$AH_extinct_wildlife$ §G(1단계)§!"
 UniqueAscensionPerksSitesEvents.30.Desc:0 "$AH_extinct_wildlife_intro$"
 UniqueAscensionPerksSitesEvents.31.Name:0 "$AH_extinct_wildlife$: §G$HUMAN2_SHIP_Success$§!"
 UniqueAscensionPerksSitesEvents.31.Desc:0 "우리는 외계의 제노 생명체의 흔적을 따라갔고 그것은 한 산으로 이어졌습니다. 그 안에는 거대한 동굴이 발견되었으며, 이는 그 짐승의 둥지인 것으로 보입니다. 그러나 최근 활동의 증거는 발견되지 않아 이 둥지가 실제로는 버려진 것임을 의미합니다. 내부에는 여전히 수확할 수 있는 많은 음식이 남아 있어 다소 의아합니다. 여러 차례의 테스트를 통해 이 음식이 우리 종에게 먹을 수 있음을 확인할 수 있습니다."
 UniqueAscensionPerksSitesEvents.40.Name:0 "$AH_abandoned_laboratory$ §G(1단계)§!"
 UniqueAscensionPerksSitesEvents.40.Desc:0 "$AH_abandoned_laboratory_intro$"
 UniqueAscensionPerksSitesEvents.41.Name:0 "$AH_abandoned_laboratory$: §G$HUMAN2_SHIP_Success$§!"
 UniqueAscensionPerksSitesEvents.41.Desc:0 "탐사팀이 §Y[From.Planet.GetName]§!에 있는 버려진 실험실 탐사를 완료하였습니다. 모든 흥미로운 연구 결과는 수도로 전송되었습니다."
 UniqueAscensionPerksSitesEvents.50.Name:0 "$AH_underground_entrance$: §Y진입하기§!"
 UniqueAscensionPerksSitesEvents.50.Desc:0 "우리는 동굴의 모든 출입구를 봉쇄하고, 새로운 살해 시도를 제대로 방지하기 위해 하나의 거대한 구멍만 남겨두었습니다. 괴물들은 우리의 존재를 인식하고 동굴 깊숙한 곳으로 다시 모이기 시작했습니다. 우리는 이러한 위협이 행성에서 우세해지도록 두어서는 안 됩니다."
 UniqueAscensionPerksSitesEvents.51.Name:0 "$AH_underground_entrance$: §Y진행 중§!"
 UniqueAscensionPerksSitesEvents.51.Desc:0 "그들은 수천 마리지만 우리는 그들을 처치할 수 있습니다. 우리의 군대는 동굴에서 진전을 이루었지만, 여기서 보니 괴물의 수가 예상보다 많습니다. 동굴 전체를 정리하는 데는 시간과 자원이 필요할 것입니다."
 UniqueAscensionPerksSitesEvents.80.Name:0 "$AH_deep_in_the_center$ §Y(2단계)§!"
 UniqueAscensionPerksSitesEvents.80.Desc:0 "$AH_deep_in_the_center_intro$"
 UniqueAscensionPerksSitesEvents.81.Name:0 "$AH_deep_in_the_center$: §G$HUMAN2_SHIP_Success$§!"
 UniqueAscensionPerksSitesEvents.81.Desc:0 "행성: §Y[special_project_target.GetName]§!의 중심이 주변의 구멍에 완벽하게 맞지 않아 한쪽에서 다른 쪽으로 이동할 수 있는 것으로 보이며, 이로 인해 행성의 반대편에서 자기 활동이 발생하고 있습니다."
 UniqueAscensionPerksSitesEvents.90.Name:0 "$AH_alien_ruins$ §G(1단계)§!"
 UniqueAscensionPerksSitesEvents.90.Desc:0 "$AH_alien_ruins_intro$"
 UniqueAscensionPerksSitesEvents.91.Name:0 "$AH_alien_ruins$: §G$HUMAN2_SHIP_Success$§!"
 UniqueAscensionPerksSitesEvents.91.Desc:0 "고대 외계 유적에 대한 연구가 §Y[From.Planet.GetName]§!에서 끝났습니다. 탐사 팀이 그들의 보고서 사본을 보내왔습니다."
 UniqueAscensionPerksSitesEvents.110.Name:0 "$AH_damaged_shipyard$ §R(3단계)§!"
 UniqueAscensionPerksSitesEvents.110.Desc:0 "$AH_damaged_shipyard_intro$"
 UniqueAscensionPerksSitesEvents.111.Name:0 "$AH_damaged_shipyard$: §G$HUMAN2_SHIP_Success$§!"
 UniqueAscensionPerksSitesEvents.111.Desc:0 "우리의 건설선이 고대 조선소의 수리를 완료했습니다. 또한 새로운 군사 함대의 건설이 완료되었습니다."
 UniqueAscensionPerksSitesEvents.120.Name:0 "$AH_unusual_region$ §G(1단계)§!"
 UniqueAscensionPerksSitesEvents.120.Desc:0 "$AH_unusual_region_intro$"
 UniqueAscensionPerksSitesEvents.121.Name:0 "$AH_unusual_region$: §G$HUMAN2_SHIP_Success$§!"
 UniqueAscensionPerksSitesEvents.121.Desc:0 "우리의 과학선이 §Y[special_project_target.GetName]§!에서 미지의 지역을 조사 완료했습니다. 그리고 그 행성의 그 부분을 더 살펴본 것이 맞았던 것 같습니다. 우리는 몇 가지 전략 자원으로 보이는 것을 발견했습니다."
 UniqueAscensionPerksSitesEvents.130.Name:0 "$AH_primitive_civilization$ §Y(2단계)§!"
 UniqueAscensionPerksSitesEvents.130.Desc:0 "$AH_primitive_civilization_intro$"
 UniqueAscensionPerksSitesEvents.131.Name:0 "$AH_primitive_civilization$: §G$HUMAN2_SHIP_Success$§!"
 UniqueAscensionPerksSitesEvents.131.Desc:0 "공격적인 원주율들이 진압되었습니다. 그들이 왜 이렇게 적대적인지는 아직 알기 어렵지만, 우리는 해결책을 찾기 위해 그들을 지금은 살려두겠습니다."
 UniqueAscensionPerksSitesEvents.140.Name:0 "$AH_new_discovery$ §Y(2단계)§!"
 UniqueAscensionPerksSitesEvents.140.Desc:0 "$AH_new_discovery_intro$"
 UniqueAscensionPerksSitesEvents.141.Name:0 "$AH_new_discovery$: §G$HUMAN2_SHIP_Success$§!"
 UniqueAscensionPerksSitesEvents.141.Desc:0 "§Y[special_project_target.GetName]§!에 있는 선조 도시의 탐사가 완료되었습니다. 탐사팀이 도시가 어떻게 건설되었고 그 목적이 무엇이었는지를 설명하는 보고서 사본을 보내왔습니다."
 UniqueAscensionPerksSitesEvents.150.Name:0 "$AH_false_planet_surface$ §R(3단계)§!"
 UniqueAscensionPerksSitesEvents.150.Desc:0 "$AH_false_planet_surface_intro$"
 UniqueAscensionPerksSitesEvents.151.Name:0 "$AH_false_planet_surface$: §G$HUMAN2_SHIP_Success$§!"
 UniqueAscensionPerksSitesEvents.151.Desc:0 "§Y[From.Planet.GetName]§!는 기계 행성으로 변환을 완료했습니다. 그곳에 있는 모든 건물은 오래된 프로토타입일 뿐이며 사용할 수 없습니다. 이 행성은 기계만 식민지화할 수 있습니다. 생물학적 생명을 지원하기 위해서는 테라포밍이 필요합니다."
 UniqueAscensionPerksMenuEvents.1003.name:0 "§Y독특한 상승 특성 업데이트 발표§!"
 UniqueAscensionPerksMenuEvents.1003.desc:0 "$tr_aptitude_specialist_training_machine$ §H$MATCHMAKING_SERVER_VERSION$ [global_event_country.UAP_version]§! 베타:\n기초 구문 현대화 및 최적화(그리고 가능한 CTD 수정)."
