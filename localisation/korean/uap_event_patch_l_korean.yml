 CortanaEvent.12.a:0 "좋은 발상입니다, 코르타나."
 CortanaEvent.12.a.tooltip:0 "무작위 반복 기술을 잠금 해제합니다."
 CortanaEvent.12.Desc:0 "안녕하세요, 사령관. 제가 여분의 연구 과제를 직접 관리하면 당신에게 유용할 것이라고 생각했습니다. 제가 당신이 찾고 있던 정확한 기술인지 아닌지는 알 수 없지만, 적어도 당신에게 도움이 되기를 바랍니다. 저는 항상 당신 곁에 있을 것입니다. 조심하세요."
 CortanaEvent.12.Name:0 "코르타나의 주도적 행동"
 CortanaEvent.14.a:0 "도움 주셔서 감사합니다, 코르타나."
 CortanaEvent.14.a.tooltip:0 "한 부서의 연구 속도를 40% 향상시키거나 연구 중인 것이 없을 경우 일부 연구 포인트를 제공합니다."
 CortanaEvent.14.Desc:0 "안녕하세요, 저에게 특정 기술 연구를 도와달라고 요청하실 수 있을 뿐만 아니라 다른 방법으로도 도와드릴 수 있습니다. 제 전력을 모두 사용하지 않더라도, 현재 연구 중인 기술의 연구 속도를 높이기 위해 여유 용량을 그쪽으로 돌림으로써 여전히 유용할 수 있습니다."
