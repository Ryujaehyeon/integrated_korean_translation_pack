 CortanaEvent.0.Desc:0 "코르타나는 추가 연구 작업을 시작할 수 있는 충분한 여유 용량을 확인하였으며, 현재 대기 중입니다."
 CortanaEvent.0.Name:0 "코르타나 통합 연구 자산"
 CortanaEvent.1.Blocker:0 "행성 차단물"
 CortanaEvent.1.Building:0 "건물 및 직업"
 CortanaEvent.1.Desc:0 "코르타나는 필요한 여분의 연구 용량을 확인하였으며, 이를 다른 기술 연구에 전환할 준비가 되었습니다. 우리가 작업할 기술을 선택해 주십시오."
