 giga_log.500.title:0 "선택적 데이터 기록"
 giga_log.500.desc:0 "Gigastructural Engineering & More를 플레이해 주셔서 감사합니다!\n\n과거에 저희는 사용자 피드백을 바탕으로 변경 사항을 적용해 왔습니다. 모드를 가능한 한 최선으로 개발하기 위한 작업을 계속하면서, 플레이어로부터 데이터를 수집하는 것이 밸런스 결정에 매우 귀중할 것이라고 판단했습니다.\n\n원하신다면 Gigastructures를 플레이하는 동안 은하의 상태를 추적하는 기록 기능을 활성화하여 저희를 도울 수 있습니다. 세션이 끝난 뒤에는 game.log 파일과 모드 목록을 <SOMEWHERE> 링크의 설문에 업로드할 수 있습니다. 기록 기능은 매년 초에 약간의 지연을 추가할 가능성이 있습니다. 불편을 드려 죄송합니다.\n\n§H주의§!: 로그 파일의 작동 방식 때문에, Stellaris를 열 때마다 로그 파일은 지워집니다. 이전 세션의 로그 파일을 보내거나 볼 수 없습니다.\n\n§LGigastructures는 물론 그 어떤 Stellaris 모드도 귀하의 데이터를 저장하거나 원격 측정 정보를 어디론가 보낼 능력이 없습니다. Gigastructure 또는 개발팀 구성원에게 전송되는 유일한 데이터는 귀하가 자발적으로 제공하는 데이터뿐입니다. Stellaris 로그 파일에는 그러한 데이터를 자발적으로 입력하지 않는 한 식별 가능한 데이터가 포함되지 않습니다.§!"
 giga_log.500.a:0 "예, 기록 기능을 활성화하겠습니다."
 giga_log.500.b:0 "아니요, 기록 기능을 활성화하지 않겠습니다."
