l_korean:
 mem_sleepers_energy_cost:0 "대출금 갚기"
 mem_sleepers_research_boost:0 "오자리 전문 지식"
 mem_leader_trait_last_ozari:0 "마지막 오자리"
 mem_leader_trait_last_ozari_desc:0 "오자리족은 생명공학 기술이 매우 뛰어났었습니다."
 MEM_SLEEPERS_SCAN:0 "위험한 에너지 수치"
 MEM_SLEEPERS_SCAN_DESC:0 "§Y[From.GetName]§!의 상공에 있는 관측소는 행성으로부터 위험한 사건의 조짐이 관측되었다고 보고했습니다. 전문가들은 여전히 상황을 분석하고 있지만, 초기 관측 결과에 의하면 재앙이 코앞에 다가왔습니다."
 mem_sleepers.2.name:0 "지하 깊숙이"
 mem_sleepers.2.desc:0 "§Y[mem_sleepers_planet.GetName]§!에 있는 우리의 관측소가 행성에서 오는 비정상적이고 우려스러운 신호를 보고하고 있습니다. 그들은 행성 표면 아래의 고립된 지역에서 발생하는 에너지 신호를 감지하고 있습니다. 신호의 세기는 원주율 기술이 생성할 수 있는 것 이상이며, 우리의 발전소와 놀라울 정도로 유사합니다. 더욱 우려스러운 것은, 이 신호가 전력 원천의 불안정성이 증가하고 있음을 명확히 나타내고 있다는 점입니다. 우리가 신속하게 행동하지 않으면 이는 재앙으로 끝날 가능성이 높습니다."
 mem_sleepers.2.a:0 "전문가들을 보내 조사하라."
 mem_sleepers.3.name:0 "그라운드 제로"
 mem_sleepers.3.desc:0 "거대한 지하 폭발이 §Y[mem_sleepers_planet.GetName]§!의 지각을 관통하며 발생하였고, 슈퍼 화산 폭발에 필적하는 힘으로 재와 암석이 대기로 날아올랐습니다. 지진의 진원지에서 발견할 수 있었던 것은 이제 확실히 증발하였습니다.\n\n우리 관측소의 보고에 따르면, 사건을 목격한 원주민들은 이 재앙에 놀라움을 금치 못하고 있으며, 지역 문화는 신의 분노에 대한 두려움에서 비롯된 영성의 급증을 경험하고 있습니다."
 mem_sleepers.3.a:0 "적어도 최악의 결과는 아니군."
 mem_sleepers.4.name:0 "그라운드 제로"
 mem_sleepers.4.desc:0 "거대한 지하 폭발이 §Y[mem_sleepers_planet.GetName]§!의 지각을 찢어버리며, 슈퍼화산 폭발을 초월하는 힘으로 재와 암석을 대기 중으로 쏘아 올렸습니다. 이로 인해 행성의 대기 전체에 걸쳐 초음속 압력파가 발생하고, 대규모 지진이 연쇄적으로 일어났으며, 행성을 영구적인 황혼으로 몰아넣을 만큼의 먼지와 재의 기둥이 뒤덮였습니다. 이 재앙은 생물권을 황폐화시키고 원주율 문명을 멸망시켰습니다. 접지점에서 우리가 발견할 수 있었던 것은 분명히 기화되었습니다.\n\n관측소는 더 이상 관측할 사람이 없기 때문에 폐쇄되었습니다."
 mem_sleepers.4.a:0 "이런 일이 벌어지는 걸 막을 수 있었다면 좋았을 텐데."
 mem_sleepers.4.b:0 "아까운 행성만 버린 셈이군..."
 mem_sleepers.5.name:0 "지하 동면 시설"
 mem_sleepers.5.desc:0 "§Y[mem_sleepers_planet.GetName]§!의 에너지 신호는 우리 과학 팀의 정밀한 드릴링을 필요로 했지만 궁극적으로 그들을 광대한 동굴 시스템으로 이끌었습니다. 내부에 들어서자, 팀은 의도적으로 숨겨진 대규모 인공 구조물을 발견했습니다. 이 구조물은 명백히 우주 시대 기술을 사용하여 건설되었으며, 이 행성의 원주민들이 할 수 있는 것보다 수세기 앞선 것입니다. 이 구조물 안에서, 승무원들은 벽을 따라 줄지어 있는 수많은 수면 포드를 발견하고 놀랐습니다. 이 포드에는 §Y[mem_sleepers_natives.GetSpeciesNamePlural]§!와 일치하지 않는 외계인뿐만 아니라, 우리가 알고 있는 다른 어떤 종과도 다른 외계인들이 포함되어 있었으며, 고급 군사 장비의 대규모 비축물도 있었습니다. 그러나 터미널과 라벨에 사용된 언어는 우리가 원주민을 관찰하여 배운 언어와 놀라운 유사성을 보입니다.\n\n우리 공학자들은 이전 발견 이후 다소 기대 이하였던 원자로 제어 상황을 평가했습니다. 유지보수 없이 수세기, 아니 수천 년이 지나면서 피해가 누적되었지만, 우리의 기술 수준으로는 원자로를 안정화하는 것이 사소한 일일 것이며, 특히 우리의 자원을 일부 희생할 의향이 있다면 더욱 그렇습니다."
 mem_sleepers.5.a:0 "안정화를 시도하고 시설을 재가동시켜라."
 mem_sleepers.5.a.tooltip:0 "이 프로젝트에는 500 에너지 크레딧이 들어갑니다."
 mem_sleepers.5.b.tooltip:0 "필요한 500 에너지 크레딧이 부족하므로, 민간 부문에서 해당 금액을 빌려야 합니다."
 mem_sleepers.5.c:0 "모든 시스템의 전원을 끄고 금고에서 귀중품을 분해하십시오."
 mem_sleepers.5.c.tooltip:0 "우리 팀은 금고의 구조적 완전성을 위해 필요하지 않은 모든 것을 해체하기 시작할 것입니다."
 mem_sleepers.5.d:0 "고작 외계인 목숨 때문에 위험을 감수할 이유는 없다. 시설을 폭파해라."
 mem_sleepers.6.name:0 "기술적 보배"
 mem_sleepers.6.desc:0 "수면 포드를 전원 차단하고 그 거주자들을 마지막 안식처로 보낸 후, 우리 팀은 중앙 서버에 저장된 모든 잠재적으로 유용한 자원과 역사적 및 기술적 데이터를 분석하기 시작했습니다.\n\n이 장소의 건설자들은 자신들을 오자리(Ozari)라고 불렀습니다. 그들은 항성 간 비행을 달성하지 못한 것으로 보이지만, 생명공학 분야에서는 매우 고급이었습니다. 그들의 이러한 발전은 결국 그들 자신의 멸망으로 이어졌습니다: 그들은 오늘날의 §Y[mem_sleepers_natives.GetSpeciesNamePlural]§!의 명백한 조상들을 노예 종족으로 지성화하였고, 그들은 즉시 반란을 일으켰습니다. §Y[mem_sleepers_natives.GetSpeciesNamePlural]§!는 그들의 이전 주인을 거의 멸종시키기 직전까지 몰아넣었으며, 몇몇 오자리만이 이 지하 시설에서 피신할 수 있었습니다.\n\n오자리에겐 좋은 결말이 아니었을지 모르지만, 우리 과학자들은 우리가 발견한 기술의 조각들에서 큰 잠재력을 보고 있습니다."
 mem_sleepers.6.a:0 "또 다른 기술적 혁신이군. 훌륭하다!"
 mem_sleepers.7.name:0 "무덤에서부터"
 mem_sleepers.7.desc:0 "우리 과학 팀이 시설을 해체하는 데 바쁘던 중, 미공개 안전 장치가 일부 수면자들을 깨운 것 같습니다. 그들은 우리 팀의 작업에 대해 전혀 기쁘지 않았고 총격전이 발생했습니다. 우리의 우수한 화력은 전투의 흐름을 빠르게 바꾸었지만... 충분히 빠르지는 않았습니다.\n\n임박한 파멸을 깨달은 마지막 수면자들은 금고의 자폭 장치를 작동시켰고, 우리 팀 - 우리의 수석 과학자를 포함하여 - 도 함께 사라졌습니다.\n\n거대한 지하 폭발이 §Y[mem_sleepers_planet.GetName]§!의 지각을 뚫고 나가면서, 슈퍼 화산 폭발에 필적하는 힘으로 재와 바위를 대기로 쏟아냈습니다. 금고 단지는 남아 있는 것이 없습니다.\n\n우리 관측소는 사건을 목격한 원주민들이 이 재앙에 놀라워하고 있으며, 지역 문화가 신들의 분노에 대한 두려움에서 비롯된 영성의 급증을 경험하고 있다고 보고하고 있습니다."
 mem_sleepers.7.a:0 "그들을 잊지 않겠다."
 mem_sleepers.8.name:0 "그라운드 제로"
 mem_sleepers.8.desc:0 "거대한 지하 폭발이 §Y[mem_sleepers_planet.GetName]§!의 지각을 가르며 발생하였고, 슈퍼 화산 폭발에 필적하는 힘으로 재와 암석이 대기로 날아올랐습니다. 금고 복합체는 남아 있는 것이 없습니다.\n\n우리 관측소의 보고에 따르면, 사건을 목격한 원주민들은 이 재앙에 놀라움을 금치 못하고 있으며, 지역 문화는 신의 분노에 대한 두려움에서 비롯된 영성의 급증을 경험하고 있습니다."
 mem_sleepers.8.a:0 "그래... 그렇군."
 mem_sleepers.9.name:0 "그라운드 제로"
 mem_sleepers.9.desc:0 "거대한 지하 폭발이 §Y[mem_sleepers_planet.GetName]§!의 지각을 찢어버리며, 슈퍼화산의 분출에 필적하는 힘으로 재와 암석을 대기 중으로 날려 보냈습니다. 이로 인해 행성의 대기 전체에 초음속 압력파가 발생하였고, 대규모 지진의 연쇄가 일어났으며, 행성을 영구적인 황혼으로 몰아넣기에 충분한 먼지와 재의 기둥이 덮쳤습니다. 우리의 과학자들은 폭발의 규모에 놀랐습니다. 이는 모든 이전의 예상치를 훨씬 초월하여 생물권을 파괴하고 원주율 문명을 멸망시켰습니다.\n\n관측소는 더 이상 관측할 것이 없어서 폐쇄되었습니다."
 mem_sleepers.9.a:0 "아까운 행성만 버린 셈이군..."
 mem_sleepers.45.name:0 "깨어나다"
 mem_sleepers.45.desc:0 "에너지의 유입과 함께, 금고의 조용한 복도가 즉시 조명으로 밝혀졌습니다. 슬리퍼 포드가 하나씩 열렸습니다. 우리 팀은 슬리퍼 사회의 지도자들이 거주하는 의회 회의실로 서둘러 갔습니다. 과학자들은 외계인들이 빠르게 논의하는 모습을 발견했습니다. 그들의 언어는 지역 원주율이 사용하는 언어와 명확하게 관련이 있으며, 번역과 소통을 확립하는 데 불과 몇 문장만 필요합니다."
 mem_sleepers.45.a:0 "그렇다면 그들의 이야기를 들어봐야겠군."
 mem_sleepers.45.a.tooltip:0 "우리는 이 외계인들의 역사와 향후 운명을 논의할 것입니다."
 mem_sleepers.50.name:0 "깨어난 숙면자들"
 mem_sleepers.50.desc:0 "우리는 §YOzari§!, 이 세계의 첫 번째 자손입니다. 당신의 민족과는 달리, 우리의 종은 결코 별로 나아가지 않았습니다. 대신, 우리는 생물학과 유전을 정복하였고, 고향 세계에서 동족인 §Y[mem_sleepers_natives.GetSpeciesNamePlural]§!를 군인, 인부, 그리고 언젠가는 평등한 존재로 삼기 위해 향상시키는 데 성공하였습니다. 그러나 §Y[mem_sleepers_natives.GetSpeciesNamePlural]§!는 우리가 세상을 바라보는 방식과는 다르게 생각하였고, 비록 과학적 지식이 우리의 젊은 사촌들에게 대부분 숨겨져 있었지만, 그들은 수적 우세에서 힘을 찾았습니다. 그로 인해 발생한 전쟁은 우리를 멸종의 위기로 몰아넣었고, 우리는 우리 민족의 마지막 생존자로서 이 금고에서 피신하였습니다."
 mem_sleepers.50.a:0 "앞으로 어떻게 할 셈이지?"
 mem_sleepers.50.a.response:0 "우리 §Y오자리§!는 이제부터 우리에게 지성을 부여받은 자들의 후손들을 찾아갈 것이라네."
 mem_sleepers.51.name:0 "후원자들의 귀환"
 mem_sleepers.51.desc:0 "§Y[mem_sleepers_natives.GetSpeciesNamePlural]§!는 그들의 이전 주인들이 가진 대부분의 기술을 잃었을지 모르지만, 그들에게 자아를 부여한 이들을 잊지 않았습니다. 그들의 기억은 신들의 신화와 전설로 살아남았으며, 감사하지 않는 조상들에게 배신당했습니다.\n\n§YOzari§!가 자신을 드러냈을 때, §Y[mem_sleepers_natives.GetSpeciesNamePlural]§!는 무덤에서 돌아온 그들의 은인에게 기뻐했습니다. 그들의 유대는 새롭게 형성되었고, 두 종족의 지도자들은 과거의 실수를 반복하지 않겠다고 약속했습니다. 이제 그들은 우리를 환영하며, 우리 제국과의 관계에 대해 논의하기를 원합니다."
 mem_sleepers.51.a:0 "그들을 우리 제국에 편입시켜라."
 mem_sleepers.51.a.tooltip:0 "§Y[mem_sleepers_planet.GetName]§!는 우리 제국에 평화롭게 통합될 것입니다."
 mem_sleepers.51.b:0 "그들이 우리 보호국으로 들어오도록 해라."
 mem_sleepers.51.b.tooltip:0 "§Y[mem_sleepers_planet.GetName]§!는 우리 제국의 보호국이 될 것입니다."
 mem_sleepers.51.c:0 "그들의 운명은 그들 스스로 개척해야 한다."
 mem_sleepers.51.c.tooltip:0 "§Y[mem_sleepers_planet.GetName]§!는 독립 제국이 될 것입니다."
 mem_sleepers.51.d:0 "이 외계인들이 어떻게 될 지는 우리가 상관할 바 아니다."
 mem_sleepers.101.name:0 "심판의 날"
 mem_sleepers.101.desc:0 "§Y[mem_sleepers_natives.GetSpeciesNamePlural]§!는 한때 그들을 지성화한 문명을 거의 멸종에 이르게 할 수 있었지만, 이제는 조상들이 가졌던 힘을 더 이상 지니고 있지 않습니다. 그들이 가졌던 기술은 시간 속에 잃어버렸고, 이전 주인의 인도하는 손길 없이 그들은 스스로 문명을 처음부터 세워야 했습니다.\n\n거의 존재하지 않는 기술로 인해 그들은 §YOzari§!의 무기 재고에 맞설 수 없었습니다. 글라이더와 드론 공습은 며칠 만에 대부분의 원주민을 죽였고, 다시 깨어난 §YOzari§!는 §Y[mem_sleepers_planet.GetName]§!의 유일한 주인으로 남게 되었습니다. 그들의 지도자는 이제 우리에게 연락을 하여 우리 제국과의 관계에 대해 논의하고 싶어합니다."
 mem_sleepers.101.a:0 "배신자들은 절대 용서하면 안 되는 법이지... 그들을 우리 일원으로 받아들여라."
 mem_sleepers.101.a.xenophobe:0 "비록 외계인이지만 저 결의만큼은 마음에 드는군. 그들을 우리 일원으로 받아들여라."
 mem_sleepers.101.a.tooltip:0 "§Y[mem_sleepers_planet.GetName]§!는 우리 제국에 평화롭게 통합될 것입니다."
 mem_sleepers.101.b:0 "그들이 우리 보호국으로 들어오도록 해라."
 mem_sleepers.101.b.tooltip:0 "§Y[mem_sleepers_planet.GetName]§!는 우리 제국의 보호국이 될 것입니다."
 mem_sleepers.101.c:0 "그들은 용납할 수 없는 만행을 저질렀다. 그들과의 교류를 끊어라."
 mem_sleepers.101.c.tooltip:0 "§Y[mem_sleepers_planet.GetName]§!는 독립 제국이 될 것입니다."
 mem_sleepers.101.d:0 "이 외계인들이 어떻게 될 지는 우리가 상관할 바 아니다."
 mem_sleepers.145.name:0 "깨어나다"
 mem_sleepers.145.desc:0 "소수의 동면 장치만이 성공적으로 재가동되었습니다. 우리 과학자들은 장치 안의 외계인들을 서둘러 꺼낸 후 안정화했습니다. 그들의 언어는 행성의 현재 주민들이 사용하는 언어와 매우 유사했기에 통신을 수립하는 일은 어렵지 않았습니다.\n\n그들 중 많은 이들이 종족이 멸망했다는 소식을 쉽사리 받아들이지 못했지만, 냉정을 유지하고 있는 지도자 한 명이 집단을 대표해 우리와 대화하겠다고 나섰습니다."
 mem_sleepers.145.a:0 "그렇다면 그들의 이야기를 들어봐야겠군."
 mem_sleepers.145.a.tooltip:0 "우리는 이 외계인들의 역사와 향후 운명을 논의할 것입니다."
 mem_sleepers.150.name:0 "잔존자들"
 mem_sleepers.150.desc:0 "우리는 §YOzari§!로, 이 세계의 첫 번째 자손입니다. 당신의 민족과는 달리, 우리 종족은 결코 별로 나아가지 못했습니다. 대신, 우리는 생물학과 유전을 정복하였고, 고향 세계에서 동족인 §Y[mem_sleepers_natives.GetSpeciesNamePlural]§!를 끌어올려 군인, 인부, 그리고 언젠가는 동등한 존재가 되기를 희망했습니다. 그러나 §Y[mem_sleepers_natives.GetSpeciesNamePlural]§!는 우리가 바라보는 세계를 보지 않았고, 비록 과학적 지식이 우리의 어린 사촌들에게 대부분 withheld되었지만, 그들은 수적 우세에서 힘을 찾았습니다. 우리는 도살에서 피하기 위해 냉동 벙커를 만들려고 했지만, 제가 두려워하는 것은 이것이 완공된 유일한 것이라는 점입니다.\n\n우리는 더 이상 이 세계에 자리를 잡을 수 없습니다. 우리 종족은 거의 멸종 상태이며, 우리의 창조물들이 우리에게 호의적일 가능성은 낮습니다. 아마도 당신이 우리에게 당신의 민족 사이에서 피난처를 허락해 주실 수 있을까요?"
 mem_sleepers.150.a:0 "너희에게 터전을 마련해 줄 테니, 너희가 가진 지식을 공유해라."
 mem_sleepers.150.a.tooltip:0 "§Y오자리족 잔존자§!는 안식처를 제공받는 대가로 그들의 전문 지식을 활용해 우리 생명공학 연구를 도울 것입니다."
 mem_sleepers.150.a.response:0 "우리 종족의 진심을 담아 감사를 표하겠네. 절대 후회하지 않을 걸세."
 mem_sleepers.150.b:0 "미안하지만 너희가 있을 곳은 여기다. 너희가 지성화한 존재들에 대한 책임을 져라."
 mem_sleepers.150.b.response:0 "그러는 수밖에 없는 것 같군. 자네도 우릴 받아주지 않는다 하고, 이 시설에 계속 있을 수도 없으니..."
 mem_sleepers.150.c:0 "차라리 죽음으로서 영원히 해방되는 것은 어떤가, 외계인?"
 mem_sleepers.150.c.response:0 "그럴 필요 없다네. 이곳을 떠나겠네..."
 mem_sleepers.151.name:0 "마지막 오자리가 세상을 떠나다"
 mem_sleepers.151.desc:0 "오늘 우리는 §Y[From.From.From.From.From.GetName]§!의 마지막 §Y오자리족§!이 세상을 떠났다는 소식을 들었습니다. 이것으로 긍지 높았던 오자리족의 역사와 함께 그들과 우리와의 협력 관계도 끝을 맺게 되었습니다. 우리 과학자들은 우리의 가장 훌륭한 지성인들도 쉽게 달성하지 못할 정도로 수준 높았던 그들의 생명공학 전문지식을 매우 그리워할 것입니다."
 mem_sleepers.151.a:0 "고이 잠들기를."
 mem_sleepers.151.b:0 "그들은 이용 대상이었을 뿐이다..."
 mem_sleepers.152.name:0 "발전의 길"
 mem_sleepers.152.desc:0 "마지막 §YOzari§!가 과거와 화해하기 위해 나간 이후로 수년이 지났습니다. 그들은 새로운 삶의 목적을 찾은 것 같습니다. §Y[mem_sleepers_planet.GetName]의§! 원시 문명이 눈에 띄는 발전을 이루었습니다 - 분명히 §YOzari§!의 영향 때문입니다."
 mem_sleepers.152.a:0 "잘된 일이군."
 mem_sleepers.195.name:0 "깨어나다"
 mem_sleepers.195.desc:0 "최선의 노력에도 불구하고 원자로는 급속도로 망가졌습니다. 우리는 사라져가는 전력을 끌어모아 단 한 기의 동면 장치를 재가동할 수 있었습니다. 우리 과학자들은 서둘러 동면 장치로 향했고, 지도층의 예복을 입은 듯한 외계인 한 명을 발견했습니다.\n\n외계인이 사용하는 언어는 행성의 현재 주민들이 사용하는 언어와 매우 유사했기에 우리는 손쉽게 통신을 수립하는 데 성공했습니다. 그보다도 더 까다로웠던 것은 우리가 그 외의 다른 이들을 구하지 못했다는 소식을 알렸을 때 종족 간의 차이마저 넘어 느껴졌던 그의 심각한 정신적 충격입니다. 하지만 우리는 이제 이 유일한 생존자가 입을 열 준비가 되었다고 생각합니다."
 mem_sleepers.195.a:0 "그렇다면 그의 이야기를 들어봐야겠군."
 mem_sleepers.195.a.tooltip:0 "우리는 이 외계인의 행적과 향후 운명을 논의할 것입니다."
 mem_sleepers.200.name:0 "마지막 한 명"
 mem_sleepers.200.desc:0 "나는 이 세계의 첫 번째 태어난 후손인 §YOzari§!의 일원으로 말합니다. 당신의 민족과는 달리, 우리 종족은 결코 별로 나아가지 않았습니다. 대신, 우리는 생물학과 유전을 정복하였고, 결국 우리 고향 세계의 동족인 §Y[mem_sleepers_natives.GetSpeciesNamePlural]§!을 군인, 인부, 그리고 언젠가는 동등한 존재로 삼기 위해 향상시켰습니다. 그러나 §Y[mem_sleepers_natives.GetSpeciesNamePlural]§!은 우리가 바라보는 세계를 보지 않았고, 비록 과학적 지식이 우리의 어린 사촌들에게 대부분 withheld 되었지만, 그들은 숫자에서 힘을 찾았습니다. 우리는 학살에서 피하기 위해 냉동 벙커를 만들려고 했지만, 이것이 완공된 유일한 것이었고, 그래서 나는 이제 내 종족의 유일한 존재입니다.\n\n나는 더 이상 이 세계에 속하지 않습니다. 아마 당신이 별들 사이에서 나와 함께 하도록 허락해 주실까요?"
 mem_sleepers.200.a:0 "네가 가진 지식을 우리와 공유하겠다면 네게 살 곳을 주지."
 mem_sleepers.200.a.tooltip:0 "마지막 오자리는 생명공학에 관한 전문 지식이 풍부한 과학자로서 우리 제국에 합류할 것입니다."
 mem_sleepers.200.a.response:0 "자네에게 내가 아는 모든 것을 전해주겠네. 이 결정을 후회하지 않을 걸세."
 mem_sleepers.200.b:0 "안 된 일이지만, 그건 허용할 수 없다."
 mem_sleepers.200.b.response:0 "그럼 나는 어떻게 해야 한단 말일세?!"
 mem_sleepers.200.c:0 "그렇다면 우리가 마무리를 짓지. 죽음으로서 고통에서 해방되는 것은 어떤가?"
 mem_sleepers.200.c.response:0 "그렇게 하게나. 나에겐 자네를 막을 힘이 없으니..."
