l_korean:
 mem_we_are_gods.2.name:0 "우리가 신이라고?"
 mem_we_are_gods.2.desc:0 "이 행성의 원주민들은 우리가... 신이라고 믿게 된 것 같습니다. 우리의 연구팀 중 하나가 발견되었을 때, 원주민들이 그들을 공격하는 대신 무릎을 꿇게 되어 매우 곤란한 상황에 처하게 되었습니다. 우리를 숭배하는 종교가 그들의 사회 전반에 걸쳐 꾸준히 증가하고 있으며, 그 중 일부는 우리가 그들을 "더 높은 존재의 차원"으로 "승천"시킬 것이라고 언급하고 있습니다. 원주민들이 사실상 스스로를 제공하기 때문에, 추가 연구를 위해 원주민을 납치하는 것이 더 쉬워지긴 합니다."
 mem_we_are_gods.2.a:0 "흥미롭군."
 mem_we_are_gods.2.b:0 "신이라... 재밌는 원주민들이군."
 mem_we_are_gods.2.c:0 "제대로된 안목을 가지고 있군..."
