l_korean:
 trait_blokkat_blokkimous:0 "멀티버스 마니아"
 trait_blokkat_blokkimous_desc:0 "이 블록캣은 우리 우주가 영원으로 뻗어나가는 일종의 '시간적 다중우주'의 일부라는 증거를 찾은 것으로 보이며 이 새로운 현상을 연구하는 데 관심을 보입니다."
 prison_blokkat_is_blokkimous:0 "§MMultiverse Enthusiast§! - 이 블록캣은 우리 우주가 영원으로 뻗어나가는 일종의 '시간적 다중우주'의 일부라는 증거를 찾은 것으로 보이며 이 새로운 현상을 연구하는 데 관심을 보입니다."
 trait_blokkat_baron:0 "완전히 정신이 나갔습니다"
 trait_blokkat_baron_desc:0 "이 블록캣은 자연 상태에 있는 모든 것을 무작위화하고 비틀어버리는 기괴한 매력을 가지고 있습니다. 그들은 또한 자신들을 위해 귀족적이고 엘리트주의적인 분위기를 조성한 것 같습니다."
 prison_blokkat_is_baron:0 "§RUtterly Deranged§! - 이 블록캣은 자연 상태에 있는 모든 것을 무작위화하고 비틀어버리는 기괴한 매력을 가지고 있습니다. 그들은 또한 자신들을 위해 귀족적이고 엘리트주의적인 분위기를 조성한 것 같습니다."
 trait_blokkat_blokkepsii:0 "공감하는"
 trait_blokkat_blokkepsii_desc:0 "이 블록캣은 다른 종족들에 대해 깊이 관심을 갖고 연구하는 데 시간을 할애하는 것처럼 보입니다. 게다가, 여전히 수확 작업에 집중하고 있는 것처럼 보이지만, 그들은 그들이 할 수 있는 어떤 방법으로든 다른 종족들을 도울 수 있는 완벽한 의지가 있는 것으로 보입니다."
 prison_blokkat_is_blokkepsii:0 "§EEmpathetic§! - 이 블록캣은 다른 종족들에 대해 깊이 관심을 갖고 연구하는 데 시간을 할애하는 것처럼 보입니다. 게다가, 여전히 수확 작업에 집중하고 있는 것처럼 보이지만, 그들은 그들이 할 수 있는 어떤 방법으로든 다른 종족들을 도울 수 있는 완벽한 의지가 있는 것으로 보입니다. "
 trait_blokkat_bloblokkad:0 "과학 지도자"
 trait_blokkat_bloblokkad_desc:0 "이 블록캣은 무엇보다도 지식의 추구를 즐기는 것 같습니다. 그들은 정기적으로 '원초적인 것'을 실험하거나 정신나간 프로젝트를 만지작거리는 것을 볼 수 있습니다."
 prison_blokkat_is_bloblokkad:0 "§EScience Leader§! - 이 블록캣은 무엇보다도 지식의 추구를 즐기는 것 같습니다. 그들은 정기적으로 '원초적인 것'을 실험하거나 정신나간 프로젝트를 만지작거리는 것을 볼 수 있습니다."
 trait_blokkat_blokkofett:0 "뉴링크"
 trait_blokkat_blokkofett_desc:0 "이 블록캣은 우리와 같은 우주 개발 국가의 일부였습니다. 그들은 블록캣 프로토콜을 완성하고 블록캣에 가입했습니다. 이 은하수 수확 작업은 그들의 첫 번째 작업이며, 국가적 실체를 연구하도록 배정되었습니다."
 prison_blokkat_is_blokkofett:0 "§HNewlink§! - 이 블록캣은 우리와 같은 우주 개발 국가의 일부였습니다. 그들은 블록캣 프로토콜을 완성하고 블록캣에 가입했습니다. 이 은하수 수확 작업은 그들의 첫 번째 작업이며, 국가적 실체를 연구하도록 배정되었습니다."
 trait_blokkat_blokkutos:0 "드리머"
 trait_blokkat_blokkutos_desc:0 "이 블로캣은 항상 과거에 대한 향수를 가지고 있고 더 나은 미래를 꿈꿉니다. 그들의 꿈은 그들이 있는 곳에 있는 사람들에게 통일, 희망, 그리고 미지의 것에 대한 매혹을 불러일으킵니다."
 prison_blokkat_is_blokkutos:0 "§MDreamer§! - 이 블로캣은 항상 과거에 대한 향수를 가지고 있고 더 나은 미래를 꿈꿉니다. 그들의 꿈은 그들이 있는 곳에 있는 사람들에게 통일, 희망, 그리고 미지의 것에 대한 매혹을 불러일으킵니다."
 trait_blokkat_sophia:0 "로즈 나이트"
 trait_blokkat_sophia_desc:0 "이 블록캣은 무슨 이유에선지 스스로를 로즈 나이트라고 칭합니다. 완전히 구식인 전쟁 방법을 모두 알고 있는 것처럼 보입니다."
 prison_blokkat_is_sophia:0 "§PRose Knight§! - 이 블록캣은 무슨 이유에선지 스스로를 로즈 나이트라고 칭합니다. 완전히 구식인 전쟁 방법을 모두 알고 있는 것처럼 보입니다. 우리를 돕는 것도, 블록캣의 수확을 돕는 것에도 다소 무관심한 것처럼 보입니다. 그것은 또한 종종 '장미'라고 불리는 것을 요청합니다. 이 블록캣은 적함의 대포에 들어갈 수 있는 모든 것을 발사하고 싶은 광적인 욕망을 가지고 있으며, 또한 자신의 생명이 위험에 처해 있다는 것을 알았을 때 종종 도망칩니다. 그리고 배들을 서로 들이받으려고 시도하는 것을 즐깁니다.\n\n마지막으로 그것은 '무엇이든 볼 수 있는 가장 위대한 광경'을 보고 싶다고 주장합니다. 모두가 그것이 무엇인지에 대해 당황하고 있습니다."
 trait_blokkat_blokknight:0 "로즈 나이트"
 trait_blokkat_blokknight_desc:0 "이 블록캣은 옷을 차려입길 좋아하고, 원시 문명과의 용감한 상호작용과 행동들에 대해 끝임 없이 얘기합니다. 그들은 또한 원시적인 무기와 갑옷에 광적으로 집착하며, 가능한 한 많이 뽑아낼 수 있도록 지속적으로 보장합니다."
 prison_blokkat_is_blokknight:0 "§LThe Blokknight Returns§! - 이 블록캣은 옷을 차려입길 좋아하고, 원시 문명과의 용감한 상호작용과 행동들에 대해 끝임 없이 얘기합니다. 그들은 또한 원시적인 무기와 갑옷에 광적으로 집착하며, 가능한 한 많이 뽑아낼 수 있도록 지속적으로 보장합니다."
 trait_blokkat_yoru:0 "타락한 정신병자"
 trait_blokkat_yoru_desc:0 "이 블록캣은 모든 생명체의 궁극적인 절멸에 혈안이 되어 있는 것 같습니다."
 prison_blokkat_is_yoru:0 "§RViciously Psychotic§! - 이 블록캣은 모든 생명체의 궁극적인 절멸에 혈안이 되어 있는 것 같습니다. 대체 왜죠? 블록워크에 찍혔을 수도 있고, 오늘 아침 블록토스트를 태웠을 수도 있고, 아니면... 그냥 미친걸 수도요."
 trait_blokkat_silly:0 "우스꽝스러움"
 trait_blokkat_silly_desc:0 "이 블록캣은 변덕과 기쁨으로 가득합니다. 모든 블록캣은 내가 최강이기 때문에 PIEBLOKK에게 도전하면 안 된다는 것을 압니다! :3"
 prison_blokkat_is_pieblokk:0 "§C아주 우스꽝스러움 :3§! - $trait_blokkat_silly_desc$"
 trait_blokkat_megastructure_obsession:0 "거대구조물 집착"
 trait_blokkat_megastructure_obsession_desc:0 "이 블록캣은 원시적인 과학소설 오락물에 등장하는 것부터 은하 전체를 왜소하게 만들 정도로 불가능하게 복잡한 구조물 계획에 이르기까지, 모든 형태의 인공 거대구조물에 큰 관심을 보입니다."
 prison_blokkat_is_tempestkat:0 "§M거대구조물 집착§! - $trait_blokkat_megastructure_obsession_desc$"
