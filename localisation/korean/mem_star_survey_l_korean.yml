l_korean:
 mem_star_survey.1.name:0 "우주를 탐사하다"
 mem_star_survey.1.desc:0 "수천 년 동안 우리는 넓은 하늘의 별들을 바라보며 그 속에 담긴 진실과 비밀을 알고자 했습니다. 하지만 언제나 우리에게 있어 도달할 수 없는 목표와도 같았습니다. 하지만 지금의 우리에게는 다릅니다! 최고의 과학자들이 직접 천체들을 탐사하려고 준비 중입니다. 이미 과학자들이 모성 근처에 있는 연구할 만한 여러 종류의 항성들에 대한 목록을 정리하고 있습니다."
 mem_star_survey.1.a:0 "좋은 생각이군. 목록을 한 번 보자."
 mem_star_survey.1.b:0 "고작 그런 곳에 귀중한 인력을 쓴다고?"
 mem_star_survey.1.desc.gest:0 "수천 년간 우리는 별들을 쳐다보며 그 신비를 이해하고자 했지만, 그 지식은 우리가 얻을 수 있는 것이 아니었습니다. 이제 우리는 드디어 천체들을 가까이서 탐사할 수 있는 기술을 얻었습니다. 우리는 추가적인 조사에 적합한 여러 가지 항성들을 발견했습니다."
 mem_star_survey.1.a.gest:0 "진행해."
 mem_star_survey.1.b.gest:0 "우리 자원을 이런 곳에 투자할 수 없다."
 mem_star_survey.2.name:0 "A급 항성 연구"
 mem_star_survey.2.desc:0 "이 매우 밝은 항성은 아마도 몇 백만 년 안에 소멸할 것입니다 (천문학적 규모로는 매우 가까운 시점입니다), 왜냐하면 그 중심부의 융합 과정이 극도로 빠르기 때문입니다. [From.From.GetName]의 조사 중에 과학 장교 [Root.leader.GetName]는 탑재된 태양광 수집기가 정상적인 에너지 양의 150%를 생성하고 있음을 발견했습니다. 방사선이 존재하는 것을 고려하면 놀라운 일은 아니지만, 그들이 녹지 않았다는 점은 흥미롭습니다..."
 mem_star_survey.2.a:0 "획득한 에너지를 국고로 옮기자."
 mem_star_survey.2.b:0 "조금만 더 연구해보자."
 mem_star_survey.3.name:0 "K급 항성 연구"
 mem_star_survey.3.desc:0 "우리가 예상한 대로, 이 항성의 방사선 스펙트럼은 우리와 유사한 탄소-산소 생명체에 매우 적합합니다. 완벽한 행성 조건의 영역이 넓습니다. 우리는 미래에 이러한 항성을 찾아야 하며, 이들은 식민지화 가능한 행성을 가질 가능성이 가장 높습니다."
 mem_star_survey.4.name:0 "M급 항성 연구"
 mem_star_survey.4.desc:0 "이 유형의 별은 오래되었고 핵융합 과정이 느려졌습니다. 이 때문에 조금 더 가까이 다가가 핵융합 과정을 자세하게 연구할 수 있습니다."
 mem_star_survey.5.name:0 "중성자별 연구"
 mem_star_survey.5.desc:0 "이 항성은 우주에 있는 모든 것이 유한하다는 슬픈 기억을 떠올리게 합니다. 한때 빛나는 항성이었던 이 항성은 수명의 끝에 스스로 붕괴되었습니다.\n\n이 이국적인 천체를 연구하는 동안, 우리의 과학 책임자 [Root.leader.GetName]는 연구에 매료되었습니다."
 mem_star_survey.6.name:0 "항성 연구 완료"
 mem_star_survey.6.desc.spirit:0 "마침내 다양한 종류의 별에 관한 연구를 마쳤습니다. 과학자들이 수집한 데이터와 이미지 덕분에 우주의 어둠을 밝힐 새로운 지식을 얻을 수 있었습니다. 이제 얻은 이 지식을 대중과 나눌 것입니다."
 mem_star_survey.6.desc.mat:0 "우리는 다양한 유형의 항성을 연구하는 작업을 마무리했습니다. 수집된 데이터를 추가로 분석하기 위해 특별 연구 그룹이 구성되었습니다. 이 그룹은 항성의 중심에서 발생하는 물리적 과정에 대한 이해를 심화하는 데 집중할 수 있습니다. 그러나 우리의 한 과학 담당자는 그들의 시간을 발전소를 세밀하게 조정하는 데 더 잘 활용할 수 있다고 제안했습니다. 이는 몇 년 동안 예상된 에너지 예산을 초과하게 되어 에너지 크레딧이 더 많이 증가할 것입니다."
 mem_star_survey.6.desc.default:0 "마침내 다양한 ​​종류의 별에 대한 연구를 마쳤습니다. 수집한 모든 데이터를 분석하기 위한 특별 연구회가 조직되었습니다. 이 연구자들은 항성의 중심부에서 어떤 물리학적 일이 일어나는지 알아낼 것입니다."
 mem_star_survey.6.a:0 "과학의 한계에 도전해보자!"
 mem_star_survey.6.b:0 "에너지으로는 뭐든지 할 수 있지."
 mem_star_survey.6.c:0 "빛이 우리를 인도하리라."
