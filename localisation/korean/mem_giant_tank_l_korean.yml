l_korean:
 mem_giant_tank_category:0 "이상하고 거대한"
 mem_giant_tank_category_desc:0 "우리 탐사대가 오래전 작동했던 것으로 보이는 거대한 구조물들을 발견했습니다. 구조물들은 커다란 전장의 한 가운데에 자리 잡고 있습니다. 방사능 수치가 낮아 근접 조사를 진행할 수 있습니다."
 mem_giant_tank.1.name:0 "오래된 파편"
 mem_giant_tank.1.desc:0 "위대한 발견인 것처럼 보이는 구조물이 오히려 우리 과학자들에게는 커다란 실망이 되었습니다. 그들은 오래된 파편과 폐허 외에는 아무것도 발견하지 못했고 이전 이론을 다시 수정해야 했습니다."
 mem_giant_tank.1.a:0 "그럼 넘어가자고."
 mem_giant_tank.2.name:0 "과거의 거인"
 mem_giant_tank.2.desc:0 "이 고대 전투터 위에 앉아 있는 거대한 강철 덩어리들은 이 문명의 기술이 우리가 이전에 예상했던 것보다 훨씬 더 고급이라는 것을 보여줍니다. 그들의 우주 항해 능력이 사실상 존재하지 않는 것처럼 보이는 것을 고려할 때, 우리 팀은 이 문명이 별을 향해 나아갈 여유가 없을 정도로 자기들끼리의 전쟁에 몰두했음을 결론지었습니다.\n\n핵 분열 반응기로 구동되는 이 거인들은 [Root.leader.GetName]이 추정하기에 250,000에서 300,000톤 사이의 무게를 가지고 있으며, 전장 위를 움직이는 산처럼 굴러다녔을 것입니다. 처음에 [Root.GetSheHe]는 이들이 크고 취약한 목표물이라고 생각했지만, 우리 과학 팀이 거인의 강철 선체 깊숙이 두 개의 고출력 방어막 생성기를 발견한 이후로 그 생각이 바뀌었습니다. [Root.leader.GetName]의 추정이 맞다면, 이들은 우리 팀이 '랜드쉽'이라고 부르는 이 거대한 전투 차량을 보호했을 뿐만 아니라, 그 옆에서 이동하는 전체 연대도 보호했을 가능성이 있습니다.\n\n우리 군이 손에 넣기를 기다릴 수 없는 흥미로운 디자인들이 있습니다."
 mem_giant_tank.2.a:0 "좋아. 시작해보자!"
 MEM_GIANT_TANK_INVESTIGATION:0 "전쟁 기계"
 MEM_GIANT_TANK_INVESTIGATION_DESC:0 "과학자들은 고대 전쟁 기계를 복원할 준비가 되어 있습니다. 모든 재료가 준비되었고 과학자들을 위한 임시 주거 도시도 완공되었습니다."
 mem_giant_tank.11.name:0 "전쟁 기계"
 mem_giant_tank.11.desc:0 "이 고대 이동 요새를 복원하는 데는 상당한 노력이 필요했습니다. 이들은 우리가 예상했던 것보다 훨씬 더 고급이며, 우리는 그들의 기술의 일부만 이해하고 있습니다. 따라서 이러한 기계를 복제할 수 없으며, 이 두 대가 우리가 얻을 수 있는 전부입니다. 각각은 행성을 떠나기 위해 전용 수송선이 필요하지만, 이 외에는 모든 것이 출발 준비가 완료되었습니다."
 mem_giant_tank.11.a:0 "훌륭해."
 mem_giant_tank.11.a.tooltip:0 "이동식 요새 군대를 2개 얻습니다."
 mem_giant_tank.12.name:0 "고대 기계"
 mem_giant_tank.12.desc:0 "우리 팀은 이 이동식 요새를 수리할 수 없었습니다. 그들의 기술은 우리가 예상했던 것보다 훨씬 고급이었고, 따라서 우리의 시도는 헛수고였습니다.\n\n하지만 이러한 전쟁 기계를 운용하면서 이 문명이 스스로에게 가져온 것을 보니, 오히려 다행일지도 모릅니다. 그러나 우리는 이 잔해들 안에서 공학에 대한 우리의 지식을 더욱 발전시킬 흥미로운 발견들을 했습니다."
 mem_giant_tank.12.a:0 "안타깝군. 쓸모가 있었을 텐데."
 mem_giant_tank.13.name:0 "무덤에서부터"
 mem_giant_tank.13.desc:0 "우리 과학자 중 한 명이 이동식 요새 중 하나의 컴퓨터 시스템을 재활성화하는 데 비극적인 실수를 저질렀습니다. 이전 소유자들은 이러한 기계 중 하나가 적에게 포획될 가능성을 그 무엇보다 두려워했음에 틀림없으며, 그로 인해 보안 시스템에 극단적인 조치를 취했습니다. 그러나 우리 과학자들이 이를 비활성화하지 못하면서, 그 거대한 기계와 우리 전체 과학 팀은 핵 폭발 속에 사라졌습니다. 그들은 끝없는 전쟁의 최신 희생자가 되었습니다."
 mem_giant_tank.13.a:0 "끔찍하군!"
 mem_giant_tank_army:0 "이동식 요새"
 mem_giant_tank_army_plural:0 "이동식 요새"
 mem_giant_tank_army_desc:0 "전함 이상의 화력을 가진 거대한 전쟁 기계입니다."
