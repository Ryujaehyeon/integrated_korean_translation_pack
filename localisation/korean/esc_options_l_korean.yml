 esc_options_page_presets_tooltip:0 "게임 실행을 위한 제공된 프리셋 중 하나를 선택합니다."
 esc_options_page_components_tooltip:0 "Extra Ship Components §YNEXT§!" 모드에서 제공하는 부품 중 어떤 부품을 연구하고 이 게임 진행 중에 사용할 수 있는지 조정합니다."
 esc_options_page_buildings_tooltip:0 "\"Extra Ship Components §YNEXT§!\" 모드에서 제공하는 어떤 부품을 이 게임 진행 중에 연구하고 건설할 수 있는지 설정합니다."
 esc_options_page_ai_boost_tooltip:0 "경제 및 연구 부스트를 설정합니다. AI가 제어하는 제국이 이번 게임에서 받는 부스트입니다.\n\n§R참고§!: 이는 \"추가 우주선 부품 §YNEXT§!\" 모드에서 제공되는 AI 부스트만 제어하며, 다른 출처의 AI 부스트에는 영향을 미치지 않습니다."
 esc_options_page_crisis_tooltip:0 "특별 위기 설정을 구성합니다.\n\n§R참고§!: 이 옵션은 은하 생성 시 선택된 위기 설정을 무시하지 않으므로, 여기에서 위기를 활성화해도 은하가 위기가 꺼진 상태로 생성되면 아무것도 안 합니다."
 esc_options_preset_enable_everything:0 "\"Extra Ship Components §YNEXT§!\" 모드에서 제공하는 모든 선박 부품, 기술 및 건물을 활성화합니다."
 esc_options_preset_disable_everything:0 "\"Extra Ship Components §YNEXT§!\" 모드에서 제공하는 모든 함선 부품, 기술 및 건물을 비활성화합니다."
 esc_options_preset_everything_but_buildings:0 "모드 \"추가 우주선 부품 §YNEXT§!\"에서 제공하는 특별 건물을 제외한 모든 것을 활성화합니다. £sr_dark_matter£ §Y$sr_dark_matter$§!, £sr_zro£ §Y$sr_zro$§! 및 £nanites£ §Y$nanites$§!의 생산에 필요한 자원 건물은 비활성화되지 않습니다."
 esc_options_preset_leviathan_only:0 "레비아탄을 처치하거나 그들과 상호작용하여 얻는 선박 부품, 기술 및 건물을 제외한 모든 것을 비활성화합니다."
 esc_options_preset_vanilla_only:0 "바닐라 함선 부품의 고급 버전만 활성화합니다."
 esc_options_preset_vanilla_leviathans:0 "바닐라 함선 부품 및 고급 버전과 레비아탄을 처치하거나 그들과 상호작용하여 얻는 함선 부품, 기술 및 건물을 활성화합니다. \"추가 함선 부품 §YNEXT§!\" 모드에서 도입된 새로운 무기 유형과 특별 건물은 비활성화됩니다."
 esc_options_preset_new_weapon_types:0 "\"Extra Ship Components §YNEXT§!\" 모드에서 도입된 새로운 무기 유형만 활성화합니다."
