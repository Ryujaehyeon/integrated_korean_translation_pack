l_korean:
 mem_synthetic_sun.1.name:0 "이건 위성이 아니야"
 mem_synthetic_sun.1.desc:0 "§Y[Root.GetName]§!가 식민지로 개척된 이후, 그 달 §Y[mem_synthetic_sun_the_moon.GetName]§!은 주민들에게 항상 뭔가 이상하게 느껴졌습니다. 그들은 이 달의 궤도 역학을 완전히 이해하지 못했으며, 이제 그 이유를 발견했습니다. \n\n상대적으로 얇은 지각 아래, 이 달은 외계 기원으로 보이는 이상한 장비들로 가득 차 있었습니다. 사실, 이 달 전체가 수천 년 전에 인위적으로 건설된 것으로 보입니다. \n\n추측이 난무하고 있으며, 이 장비의 목적을 찾는 것이 현명할 수 있습니다."
 mem_synthetic_sun.1a:0 "우리는 이것에 대해 더 탐구해야 합니다."
 mem_synthetic_sun.1b:0 "너무 위험합니다. 그만 덮어두고 봉인해야 합니다."
 mem_synthetic_sun.2.name:0 "인공 태양"
 mem_synthetic_sun.2.desc:0 "[Leader.GetName]는 §Y[mem_synthetic_sun_the_moon.GetName]§! 탐사 중 [Leader.GetSheHe]가 만든 놀라운 발견을 보고합니다. \n\n달 내부의 장비는 작은 규모로 별 내부의 과정을 복제하도록 설계된 거대한 핵융합 반응기인 것으로 보입니다. 활성화되면 §Y[mem_synthetic_sun_the_planet.GetName]§! 아래에 추가 에너지를 공급하는 지속 가능한 반응이 시작되어 두 번째 태양 역할을 하게 됩니다. 그러나 그것이 얼마나 강력하거나 위험할지는 알 수 없으며, 특히 §Y[mem_synthetic_sun_the_planet.GetName]§!의 기후에 미치는 영향은 더욱 우려됩니다. \n\n일부는 장비를 원자재로 분해하고 우리가 할 수 있는 것을 역설계하자고 제안합니다."
 mem_synthetic_sun.2a:0 "주어진 선택지에 대한 고려는 해보아야 한다."
 mem_synthetic_sun.3.name:0 "인공 태양을 분해하라"
 mem_synthetic_sun.3.desc:0 "우리 인원은 합성체 태양의 장비를 모두 해체하는 작업을 마쳤습니다. 현재 우리의 이해 수준을 훨씬 초월하는 이 장비는 귀중한 자원뿐만 아니라 고급 기술에 대한 귀중한 통찰도 제공해 주었습니다... \n\n그럼에도 불구하고 일부는 합성체 태양을 파괴함으로써 큰 기회를 놓쳤다고 느끼고 있습니다."
 mem_synthetic_sun.4.name:0 "인공 태양 활성화"
 mem_synthetic_sun.4.desc:0 "[Root.GetName]의 승무원들이 §Y[mem_synthetic_sun_the_moon.GetName]§! 내부의 외계 기계를 성공적으로 재가동했습니다. \n\n현재 활성화 단계에 있으며, 완전 가동에 도달하는 데 몇 개월이 걸릴 것입니다. [Leader.GetName]은 기계가 완전히 작동하게 되면 표면에 머물고 싶지 않습니다."
 mem_synthetic_sun.4a:0 "이젠 그저 기다릴 차례입니다."
 mem_synthetic_sun.6.name:0 "인공 태양 가동"
 mem_synthetic_sun.6.desc:0 "[mem_synthetic_sun_the_moon.GetName] 내부의 장비가 성공적으로 최대 용량에 도달했습니다. 지각이 붕괴되어 별과 유사한 거대한 융합 플라즈마 구체가 형성되었습니다. 따뜻한 빛이 아래 행성에 비추어져 우리의 식량 성장과 에너지 생산에 이롭습니다. \n\n아주 작기 때문에 진정한 별의 최대 용량에 도달하지는 못하지만, 그 근접성으로 인해 보완됩니다. 또한 진정한 별의 수명도 가지지 않으며, 불과 몇 천 년 안에 꺼질 것으로 예상됩니다."
 mem_synthetic_sun.7.name:0 "인공 태양이 기후변화를 일으키다"
 mem_synthetic_sun.7.changes:0 "인공 태양으로부터 지속적인 에너지 유입으로 인해 행성 기후에 지대한 영향이 생겼습니다."
 mem_synthetic_sun.7.cold:0 "$mem_synthetic_sun.7.changes$\n\n전체적으로 보다 따뜻해진 기후, 많은 빙하들이 녹아 물과 증기상대가 되었고 해수면 상승과 식물종의 성장에도 도움을 주었습니다."
 mem_synthetic_sun.7.wet:0 "$mem_synthetic_sun.7.changes$\n\n전체적으로 보다 따뜻해진 기후, 지표수의 증기화가 가속화가 급격하게 진행되고 있습니다. 한때 바다나 호수였던 곳들이 마른땅으로 변모하며 숲이 줄어들고 사막화가 진행 되었습니다."
 mem_synthetic_sun.7a.tooltip:0 "행성의 분류가 바뀌었습니다."
 mem_synthetic_sun.8.name:0 "인공 태양이 생명을 번성케 하다"
 mem_synthetic_sun.8.desc:0 "$mem_synthetic_sun.7.changes$ \n\n정밀하게 조정된 준태양 에너지 공급이 계속됨에 따라, 행성의 생명체가 번성하고 생물 다양성이 급증했습니다. [mem_synthetic_sun_the_planet.GetName]은 이제 그 어느 때보다 생명체에 더 적합한 환경이 되었습니다."
 mem_synthetic_sun.9.name:0 "죽음의 태양"
 mem_synthetic_sun.9.desc:0 "[mem_synthetic_sun_the_moon.GetName] 내부 장비가 최대 용량에 도달했습니다. 그러나 그 출력은 우리가 기대했던 것과는 거리가 멉니다. \n\n이것이 우리의 과학자들의 실수였는지, 아니면 이 프로젝트가 원래 이렇게 되어야 했던 것인지, §Y[Root.GetName]§!는 이제 강력한 하드 방사선의 원주를 돌고 있습니다. 이는 우리 인구를 보호할 수 없는 것은 아니지만, 보고서에 따르면 지역 생태계가 하룻밤 사이에 시들고 죽어버려 행성이 훨씬 덜 살기 좋은 곳이 되었습니다."
 mem_synthetic_sun.10.name:0 "인공 태양 과충전"
 mem_synthetic_sun.10.desc:0 "이것이 고장인지 아니면 창조자의 의도적인 선택인지 명확하지 않지만, 완전히 가동된 합성체 태양의 열로 인해 [Root.GetName]의 지각이 녹아내렸습니다. \n\n몇 천 년 후, 한때 [mem_synthetic_sun_the_moon.GetName]였던 플라즈마 구체는 식을 것이며, 그 아래의 행성은 다시 식민지화할 수 있을 것입니다. 그러나 그때까지는 우리에게 잃어버린 상태입니다."
 mem_synthetic_sun.11.name:0 "인공 태양의 폭발"
 mem_synthetic_sun.11.desc:0 "기존 예측과 다르게, 만들어진 태양은 플라즈마 구체로 작아지며 붕괴되지 않았습니다.\n\n오히려 그 안에 마련되어 있던 매장 질량을 전부 태워 총한도에 곧바로 다다르며 어마어마한 충격파를 우주 밖 어딘가로 쏘아 보냈습니다.\n\n이러한 현상은 이 위성의 지반 내구성을 완전히 소모하게 했고, 달이 부서짐을 초래하며 그 파편들이 행성의 표면 위로 운석처럼 쏟아져 내려오게 했습니다."
 mem_synthetic_sun.11a:0 "우리는 누군가의 나날을 망쳐버렸네요, 그렇지 않습니까?"
 mem_synthetic_sun.12.name:0 "인공 태양이 픽 꺼지다"
 mem_synthetic_sun.12.desc:0 "안타깝게도 우리가 활용할 수 있기를 바랐던 합성체 태양이 출력을 안정화하는 데 실패했습니다. \n\n우리가 기대했던 것처럼 플라즈마 구체로 폭발하는 대신, 단지 표면 온도를 몇 도 올린 후, 이번에는 영구적으로 꺼졌습니다."
 mem_synthetic_sun.12a:0 "실망스럽군."
 MEM_SYNTHETIC_SUN_EXPLORE:0 "이상한 위성 탐험"
 MEM_SYNTHETIC_SUN_EXPLORE_DESC:0 "[mem_synthetic_sun_the_moon.GetName]은 단순한 항성체가 아니라, 이상한 기계들로 가득 찬 거대한 공학 작품입니다. 우리는 그것이 진정 무엇인지 밝혀내야 합니다."
 mem_synthetic_sun_chain_title:0 "인공 태양"
 mem_synthetic_sun_chain_desc:0 "우리는 이 황폐한 위성을 항성으로 바꿀 수 있는 장치를 발견하였습니다."
 MEM_SYNTHETIC_SUN_ACTIVATE:0 "인공 태양 활성화"
 MEM_SYNTHETIC_SUN_ACTIVATE_DESC:0 "우리는 인공 태양을 활성화하고 이것의 진정한 기능을 알아낼 수 있을 것입니다. 이러한 기기의 활성화는 큰 위험이 따를 것입니다... 하지만 그 잠재적 보상 또한 크겠죠."
 MEM_SYNTHETIC_SUN_DISMANTLE:0 "인공 태양을 분해하라"
 MEM_SYNTHETIC_SUN_DISMANTLE_DESC:0 "장비를 단순히 해체하여 재료와 귀중한 역설계를 위한 데이터를 추출할 수 있으며, 그 결과로 비어 있는 달의 껍데기만 남게 됩니다. 이를 활성화하는 데 따른 위험을 피할 수 있지만, 그로 인해 얻을 수 있는 보상을 놓치게 될 것입니다."
 mem_synthetic_sun_modifier:0 "인공 태양"
 mem_synthetic_sun_modifier_desc:0 "이 행성 주위를 거대한 그리고 부드럽고 따스한 빛을 내뿜는 플라즈마 구체가 공전하고 있습니다. 에너지와 식량 생산이 증가합니다."
 mem_synthetic_sun_radiation:0 "죽음의 태양"
 mem_synthetic_sun_radiation_desc:0 "이 행성 주변에 고에너지 방사선을 지표에 내리쬐는 거대한 플라즈마 구체가 공전하고 있습니다."
 mem_synthetic_sun_rain:0 "궤도 잔해"
 mem_synthetic_sun_rain_desc:0 "이 행성의 달을 또 다른 태양으로 만들려는 불행한 시도 이후, 잔해가 이 행성의 표면으로 쏟아지고 있습니다."
 pc_mem_synthetic_sun:0 "인공 태양"
 pc_mem_synthetic_sun_desc:0 "행성이 공전하는 표면에서 관찰하면 태양으로 착각할 수 있는 거대한 플라즈마 구체입니다. \n\n실제로는 실제 별보다 훨씬 어둡고 작으며, 고급 기술이 중심에 없었다면 그 반응을 지속할 수 없었을 것입니다."
