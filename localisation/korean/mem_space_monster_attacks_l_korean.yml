l_korean:
 mem_crystal_ship_giant:0 "고대 수정 군주"
 mem_crystal_ship_giant_plural:0 "고대 수정 군주들"
 d_mem_crystals_mining:0 "수정밭"
 d_mem_crystals_mining_desc:0 "수상한 공허 수정이 만들어낸 수정 생명체들로 덮인 장소. 이 수정들을 정기적으로 수확하는 것은 식민지의 광물 생산량을 매우 증가시킬 것이지만 생태계가 약해지고 식량 생산량이 줄어들 것입니다."
 d_mem_crystals_science:0 "수정밭"
 d_mem_crystals_science_desc:0 "고대의 공허 결정에 의해 생성된 반생명체 광물 형성물로 덮인 끊임없이 확장하는 지역입니다. 이 결정들을 연구하면 식민지의 연구 노력에 도움이 되지만, 광물 및 농업 생산 능력은 감소하게 됩니다."
 mem_crystal_removal:0 "수정 제거 작업"
 mem_crystal_removal_desc:0 "이 식민지의 노력의 상당 부분은 이제 행성 전체로 퍼진 수정체 감염 제거에 투입되고 있습니다."
 mem_space_monster_attacks.1.name:0 "수정 존재가 다가오다"
 mem_space_monster_attacks.1.desc:0 "우리 식민지의 장거리 센서들은 우주 심연에서 다가오는 신호를 하나 발견했습니다. 급파견된 탐사정에 의하면 이것은 거대한 수정 구조물로 보입니다. 통신을 시도한 결과 거대한 에너지 수치의 기록과 함께 탐사정과의 연결이 끊겼습니다.\n\n이 구조물은 적대적인 것으로 보입니다. 우리 함대는 경계 태세를 갖추고 있습니다."
 mem_space_monster_attacks.1.desc.gestalt:0 "우리 식민지의 장거리 센서들은 우주 심연에서 다가오는 신호를 하나 발견했습니다. 급파견된 탐사정에 의하면 이것은 거대한 수정 구조물로 보입니다. 통신을 시도한 결과 거대한 에너지 수치의 기록과 함께 탐사정과의 연결이 끊겼습니다.\n\n이 구조물은 적대적인 것으로 보입니다. 우리 함대는 경계 태세를 갖추고 있습니다."
 mem_space_monster_attacks.1.a:0 "왜 여기에 온 거지?"
 mem_space_monster_attacks.2.name:0 "죽음의 비"
 mem_space_monster_attacks.2.desc:0 "식민지 방어군은 수정 존재에 맞설 수 없었습니다. 전투가 결정된 직후, 그것은 [This.GetName]에 고속으로 발사된 작은 수정 조각을 쏟아내기 시작했습니다. 첫 보고서에서는 수십만 명의 사상자가 발생했다고 전하고 있습니다.\n\n이 숫자는 매시간 증가하고 있지만, 수정은 행성의 궤도를 떠나 공허로 돌아갔습니다."
 mem_space_monster_attacks.2.desc.gestalt:0 "식민지 방어군은 수정 존재에게 패배했습니다. 전투가 끝난 직후, 수정 존재는 [This.GetName]에 고속으로 발사된 작은 수정 조각을 쏟아내기 시작했습니다. 식민지의 인프라에 대한 피해는 상당하며 많은 드론이 손실되었습니다.\n\n수정 존재는 행성의 궤도를 떠나 깊은 우주로 돌아갔습니다."
 mem_space_monster_attacks.2.a:0 "끔찍하군!"
 mem_space_monster_attacks.2.b:0 "불행스럽군."
 mem_space_monster_attacks.3.name:0 "상황 종료"
 mem_space_monster_attacks.3.desc:0 "우리 함대가 승리를 거두었습니다. 수정 존재의 파편만이 남았습니다. 왜 그것이 여기 와서 우리를 공격했는지는 결코 밝혀지지 않을지도 모르지만, 우리의 식민지는 다시 안전해졌습니다.\n\n수정의 잔해를 간단히 스캔해본 결과, 그것들이 매우 귀중한 광물로 구성되어 있음을 알 수 있었습니다. 인근 화물선들은 이미 그것들을 수집하라는 명령을 받았습니다. 대부분의 파편은 자원으로 스크랩될 것이지만, 더 흥미로운 조각들은 추가 연구를 위해 보관될 것입니다.\n\n우리의 일부 과학자들은 자가 수리하는 선체와 같은 가능한 응용에 대해 이미 상상하고 있으며, 다른 이들은 큰 돌파구를 기대하기 전에 해야 할 기초 연구가 많다는 점을 지적하고 있습니다."
 mem_space_monster_attacks.3.desc.gestalt:0 "우리 함대가 승리를 거두었습니다. 수정 존재의 잔해만 남았습니다. 왜 그것이 여기 와서 우리를 공격했는지는 결코 밝혀지지 않을지도 모르지만, 우리의 식민지는 다시 안전해졌습니다.\n\n수정의 잔해를 간단히 스캔해본 결과, 그것들이 매우 귀중한 광물로 구성되어 있음을 알 수 있었습니다. 인근 화물선들은 이미 이를 수집하라는 명령을 받았습니다. 이 잔해 대부분은 자원으로 채취될 것이지만, 더 흥미로운 조각들은 추가 연구를 위해 보관될 것입니다.\n\n자체 수리 가능한 선체와 같은 가능한 응용 프로그램은 조사를 필요로 합니다."
 mem_space_monster_attacks.3.a:0 "잘했다."
 mem_space_monster_attacks.3.b:0 "확인했다."
 mem_space_monster_attacks.3.c:0 "재생시키십시오.."
 mem_space_monster_attacks.4.name:0 "복수"
 mem_space_monster_attacks.4.desc:0 "우리 함대가 승리를 거두었습니다. 수정 존재의 잔해만 남았습니다. 그것이 어디에서 왔는지, 왜 존재했는지는 알 수 없지만, 최소한 그 파괴로 인해 잔인한 공격의 희생자들이 복수당했습니다.\n\n수정의 잔해를 간단히 스캔해본 결과, 매우 가치 있는 광물로 구성되어 있음을 알 수 있었습니다. 인근 화물선들은 이미 이를 수집하라는 명령을 받았습니다. 이 잔해 대부분은 자원으로 채취될 것이지만, 더 흥미로운 조각들은 추가 연구를 위해 보관될 것입니다.\n\n일부 과학자들은 자가 수리하는 선체와 같은 가능한 응용에 대해 이미 환상을 품고 있지만, 다른 이들은 큰 돌파구를 기대하기 전에 해야 할 기초 연구가 많다고 지적합니다."
 mem_space_monster_attacks.4.desc.gestalt:0 "우리 함대가 승리했습니다. 수정 존재의 잔해만 남았습니다. 그것이 어디서 왔는지, 왜 존재했는지는 알 수 없지만, 최소한 그 파괴로 인해 추가 공격은 막을 수 있을 것입니다.\n\n수정의 잔해를 간단히 스캔해본 결과, 매우 귀중한 광물로 구성되어 있음을 확인했습니다. 인근 화물선들은 이미 이를 수집하라는 명령을 받았습니다. 대부분의 조각들은 자원으로 채취될 것이지만, 더 흥미로운 조각들은 추가 연구를 위해 보관될 것입니다.\n\n자체 수리 가능한 선체와 같은 가능한 응용 분야는 조사가 필요합니다."
 mem_space_monster_attacks.4.a:0 "잘했다."
 mem_space_monster_attacks.4.b:0 "확인했다."
 mem_space_monster_attacks.5.name:0 "수정 분석"
 mem_space_monster_attacks.5.desc:0 "회수된 수정 조각들은 우리가 이전에 접했던 작은 표본과 놀라운 유사성을 보이지만, 그 행동에는 뚜렷한 차이가 있습니다. 이전에 접했던 수정들은 공격적으로 행동했지만, 그들의 행동은 항상 자신의 영역에 제한되었습니다. 또한, 이 더 큰 표본의 거대한 크기는 우리의 과학자들에게 이것이 새 종족이어야 한다는 결론을 이끌어냅니다.\n\n그 질량의 거의 전부를 구성하는 물자는 놀라운 자기 수리 능력을 가지고 있으며, 이는 더 많은 시간과 연구가 주어진다면 우리의 함선 갑옷판에 적용될 수 있는 특성입니다. 새로운 연구 옵션이 프로젝트 풀에 추가되었습니다."
 mem_space_monster_attacks.5.a:0 "흥미롭군."
 mem_space_monster_attacks.6.name:0 "수정 증식"
 mem_space_monster_attacks.6.desc:0 "[Root.GetName]의 개척민들이 파괴적인 공격에서 아직 회복 중인 상황에서, 우리는 정착지 주변의 여러 장소에서 자생하는 결정 조각에 대한 우려스러운 보고를 받았습니다.\n\n추가 조사 결과, 이러한 결정의 확산은 식민지 근처에 국한되지 않는 것으로 밝혀졌습니다. 대신, 행성 전역에서 다양한 농도로 발견되며, 성장 과정 동안 토양에서 광물을 서서히 추출하고 있습니다. 현재로서는 이것이 행성의 생태계에 어떤 영향을 미칠지 판단하기 어렵습니다.\n\n취할 수 있는 여러 가지 행동 방침이 있습니다. 개척민들은 결정 감염을 근절하려 하거나, 주기적으로 수확하거나, 그들의 성장을 연구할 수 있습니다."
 mem_space_monster_attacks.6.desc.gestalt:0 "[Root.GetName]에서 드론들이 파괴적인 공격으로 인한 피해를 수리하고 있는 동안, 우리는 정착지 주변의 여러 장소에서 결정체 조각들이 자생하고 있는 것을 발견했습니다.\n\n추가 조사 결과, 이러한 결정체의 확산은 식민지 근처에 국한되지 않는 것으로 밝혀졌습니다. 대신, 행성 전역에서 다양한 농도로 발견되며, 성장 과정 동안 토양에서 광물을 서서히 추출하고 있습니다. 현재로서는 이것이 행성의 생태계에 어떤 영향을 미칠지 판단하기 어렵습니다.\n\n취할 수 있는 여러 가지 행동 경로가 있습니다. 드론들은 결정체 감염을 근절하려 하거나, 주기적으로 수확하거나, 그들의 성장을 연구할 수 있습니다."
 mem_space_monster_attacks.6.a:0 "그들이 정기적으로 크리스탈을 수확하도록 해라."
 mem_space_monster_attacks.6.a.tooltip:0 "§G광물 생산량 +50%§!\n§G+2 채굴 지구 슬롯§!\n§G+2 희귀 크리스탈 수집 직업§!\n§R-2 농업 지구 슬롯§!"
 mem_space_monster_attacks.6.b:0 "저 수정들을 연구하도록 하지."
 mem_space_monster_attacks.6.b.tooltip:0 "§G사회학 연구 +20%§!\n§G공학 연구 +20%§!\n§G+2 연구 직업§!\n§G+1 20명의 인구마다 추가 연구 직업§!\n§G+1 희귀 크리스탈 수집 직업§!\n§R-2 농업 지구§!\n§R-1 채굴 지구§!\n§R채굴 산출량 -10%§!"
 mem_space_monster_attacks.6.c:0 "그들이 수정 감염을 뿌리뽑게 하자."
 mem_space_monster_attacks.6.c.tooltip:0 "[Root.GetName]에 있는 우리 식민지는 모든 수정 산란을 제거하는 데 주력할 것입니다. 이 과정에서 얻은 모든 미네랄은 이 과정이 끝나면 제국의 저장고에 추가됩니다. 이 프로세스가 완료될 때까지 이 군집의 생산성이 50% 감소합니다. 일단 작업이 끝나면 지구의 생태계가 완전히 회복될 수 있을 것으로 기대됩니다."
 mem_space_monster_attacks.7.name:0 "생물권 변화"
 mem_space_monster_attacks.7.desc:0 "수정 침입을 막기 위한 식민지 개척자들의 끊임없는 노력에도 불구하고 확산은 이제 심각한 수준에 도달했습니다. 행성 생태계에 미치는 피해는 이제 부인할 수 없습니다. 농업 생산량은 사상 최저 수준이고 초목은 결정이 토양을 고갈시키면서 꾸준히 감소하고 있습니다.\n\n비록 우리의 과학자들이 행성이 완전히 생명을 잃는 것을 막을 수 있다고 확신하지만, 그들 자신도 광범위한 테라포밍 없이 역전될 수 있을지에 대해 의심하고 있습니다."
 mem_space_monster_attacks.7.desc.gestalt:0 "수정 감염을 억제하려는 드론의 끊임없는 노력에도 불구하고 확산은 이제 심각한 수준에 도달했습니다. 행성 생태계에 미치는 피해는 이제 부인할 수 없습니다. 농업 생산량은 사상 최저 수준이고 초목은 결정이 토양을 고갈시키면서 꾸준히 감소하고 있습니다.\n\n우리의 개입으로 행성이 완전히 생명이 없어질 것 같지는 않지만, 다시 예전처럼 되돌리는 것은 광범위한 테라포밍이 필요할 것입니다."
 mem_space_monster_attacks.7.a:0 "조금 우려스럽군."
 mem_space_monster_attacks.7.b:0 "알겠다."
 mem_space_monster_attacks.7.c:0 "예상된 일이었다."
 mem_space_monster_attacks.8.name:0 "정화"
 mem_space_monster_attacks.8.desc:0 "[Root.GetName]에 마지막으로 남은 수정 침입 흔적이 제거되었습니다. 식민지 생활이 서서히 정상으로 돌아오고 있습니다.\n\n가공된 수정이 제국 저장고에 추가되었습니다."
 mem_space_monster_attacks.8.a:0 "반가운 소식이군."
 MEM_SPACE_MONSTER_ATTACKS_CRYSTAL_STUDY:0 "수정 잔해"
 MEM_SPACE_MONSTER_ATTACKS_CRYSTAL_STUDY_DESC:0 "남아있는 수정 파편에 대한 조사는 우리의 연구에 도움이 될 수 있지만, 우리 연구 부서는 이 연구에 집중하기 위해 상당한 자원과 인력을 투입해야 할 것입니다."
 mem_space_monster_attacks.9.name:0 "생태계 복원"
 mem_space_monster_attacks.9.desc:0 "[root.GetName]의 생태계는 결정성 침범으로 인한 피해로부터 회복되는 분명한 징후를 보이고 있습니다."
 mem_space_monster_attacks.9.a:0 "아주 좋군."
 mem_space_monster_attacks.9.b:0 "그렇겠지."
 mem_space_monster_attacks.10.name:0 "감염 억제"
 mem_space_monster_attacks.10.desc:0 "마침내 감염이 안전 구역 내에서 억제되었으므로 이제 새로운 정상 상태를 확립할 수 있습니다.\n\n생태계는 손상되었지만 더 이상의 악화는 예상되지 않습니다. 이제부터는 수정 광야를 최적으로 활용하는 방법에 집중할 수 있습니다."
 decision_mem_crystal_fields_clearing:0 "불필요한 수정 밭 없애기"
 decision_mem_crystal_fields_clearing_desc:0 "이 과정은 결정체 감염의 모든 흔적을 제거할 것입니다. 이로 인해 발생한 생태적 피해는 시간이 지나면서 회복될 것입니다."
 decision_mem_crystal_fields_seeding:0 "수정밭 종자 뿌리기"
 decision_mem_crystal_fields_seeding_desc:0 "결정 필드가 조성되어 광물 추출량이 증가하고 희귀 결정의 원천이 됩니다. 그러나 지속적인 결정 성장으로 인해 이 행성의 생태계가 악화될 것입니다."
 tech_mem_crystal_cultivation:0 "수정 재배하기"
 tech_mem_crystal_cultivation_desc:0 "생태적 적응의 발전은 통제된 환경 내에서 새로운 수정 밭을 심을 수 있게 해줄 것입니다. 이 과정은 숙주 행성의 생태계를 파괴하겠지만 피해는 허용 가능한 범위 내에서 유지될 것입니다."
 building_mem_crystal_harvester:0 "수정 수확기"
 building_mem_crystal_harvester_desc:0 "이 드론 명령소는 결정 필드 내에서 여러 채집 기계를 운영하여 성숙한 샘플을 수집하여 가공합니다."
 situation_mem_spacemonster_attacks_crystal:0 "결정체 감염"
 situation_mem_spacemonster_attacks_crystal_type:0 "$situation_mem_spacemonster_attacks_crystal$"
 situation_mem_spacemonster_attacks_crystal_desc:0 "궤도 폭격 이후 우리는 [Target.GetName]에서 형성되고 있는 여러 개의 결정체 감염의 핫스팟을 인지하게 되었습니다."
 situation_mem_spacemonster_attacks_crystal_monthly_change_tooltip:0 "확장하는 감염체를 제거하기 위해서는 최소한 세 개의 수정체 추출기 직업이 채워져야 합니다."
 approach_mem_spacemonster_attacks_crystal_study:0 "크리스탈 연구"
 approach_mem_spacemonster_attacks_crystal_harvest:0 "크리스탈 수확"
 approach_mem_spacemonster_attacks_crystal_destroy:0 "크리스탈 제거"
 approach_mem_spacemonster_attacks_crystal_destroy_tooltip:0 "우리는 추가 조사를 위해 소수의 표본을 남기면서 수정체 감염을 제거할 것입니다."
 mem_space_monster_attacks_crystal_situation_modifier_desc:0 "광부가 너무 적음"
 r_mem_amoeba_sample:0 "고대 아메바 샘플"
 r_mem_amoeba_sample_desc:0 "고대 아메바 시체의 보관된 잔해, 합성할 준비가 되어 있습니다."
 relic_mem_amoeba_sample_active_tooltip:0 "§Y$pc_toxic$§! 행성을 §Y$toxic_terraforming_candidate$§! 수정자 없이 §Y$pc_gaia$§!로 변형합니다.\n우리의 경계 내에 [Owner.num_mem_toxic_world] 개가 있습니다."
 relic_mem_amoeba_sample_passive_tooltip:0 "§Y독성 세계 테라포밍 후보§!를 §Y로 $pc_gaia$s§!으로 변환할 수 있습니다.\n우리의 경계 내에는 §Y [Owner.num_toxic_terraform_candidates] §!이(가) 있습니다."
 tech_mem_toxic_gaiaforming:0 "독성 가이아 형성"
 tech_mem_toxic_gaiaforming_desc:0 "고대 아메바에서 확보한 샘플을 연구하면, 그것이 행성의 생물권에 미치는 영향을 복제하는 방법에 대한 통찰을 얻을 수 있습니다."
 decision_mem_toxic_terraforming:0 "독성 가이아형성"
 decision_mem_toxic_terraforming_desc:0 "이 행성은 10년 이내에 독성 황무지에서 무성한 정원 세계로 변모할 것입니다."
 situation_mem_toxic_gaiaforming:0 "유독한 가이아형성"
 situation_mem_toxic_gaiaforming_type:0 "$situation_mem_toxic_gaiaforming$"
 situation_mem_toxic_gaiaforming_desc:0 "$decision_mem_toxic_terraforming_desc$"
 situation_mem_toxic_gaiaforming_monthly_change_tooltip:0 "이 프로젝트는 완료될 때까지 진행됩니다."
 mem_toxic_gaiaforming_modifier_desc:0 "월간 진행률"
 d_mem_amoeba_corpse:0 "고대 아메바 유해"
 d_mem_amoeba_corpse_desc:0 "이 행성에 추락한 고대 아메바의 유해입니다. 이는 연구를 위한 충분한 기회를 제공하며, 분해 과정에서 생성된 이국적인 가스의 원천이기도 합니다."
 situation_mem_spacemonster_attacks_amoeba:0 "부패한 상처"
 situation_mem_spacemonster_attacks_amoeba_type:0 "$situation_mem_spacemonster_attacks_amoeba$"
 situation_mem_spacemonster_attacks_amoeba_desc:0 "아메바의 분해되는 생물량이 이전에 알려지지 않은 독성 물질을 방출하여 그 근처의 식물과 동물에 부정적인 영향을 미칩니다."
 situation_mem_spacemonster_attacks_amoeba_monthly_change_tooltip:0 "이 상황은 추가 입력 없이 종료로 진행됩니다."
 approach_mem_spacemonster_attacks_amoeba_embrace:0 "변화를 수용하다"
 approach_mem_spacemonster_attacks_amoeba_stall:0 "정지 과정"
 approach_mem_spacemonster_attacks_amoeba_destroy:0 "사체 제거"
 approach_mem_spacemonster_attacks_amoeba_destroy_tooltip:0 "우리는 추가 조사를 위해 샘플을 보존하면서 아메바 시체 감염을 제거할 것입니다."
 mem_space_monster_attacks_amoeba_situation_modifier_desc:0 "생물학자가 너무 부족합니다."
 MEM_SPACE_MONSTER_ATTACKS_AMOEBA_STUDY:0 "고대 아메바"
 MEM_SPACE_MONSTER_ATTACKS_AMOEBA_STUDY_DESC:0 "아메바 유해에 대한 조사는 우리의 연구 노력에 유익할 수 있지만, 연구 부서는 이 연구에 집중하기 위해 상당한 자원과 인력을 투입해야 할 것입니다."
 mem_space_monster_attacks.11.name:0 "거대한 우주 아메바 접근"
 mem_space_monster_attacks.11.desc:0 "우리 식민지의 장거리 감지기가 깊은 우주에서 접근하는 경고 신호를 포착했습니다. 급히 발사된 탐사선이 그것이 거대한 우주 아메바임을 밝혀냈습니다. 우리 함선의 통신 시도는 응답을 얻지 못했습니다.\n\n이 표본은 그 형제들에 비해 꽤 수동적으로 보이지만, 우리 식민지를 향해 곧장 다가오고 있습니다. 우리 함대는 경계 태세를 강화했습니다."
 mem_space_monster_attacks.11.desc.gestalt:0 "우리 식민지의 장거리 감지기가 깊은 우주에서 다가오는 경고 신호를 감지했습니다. 신속하게 발사된 탐사선이 그것이 거대한 우주 아메바임을 밝혀냈습니다. 우리 함선의 통신 시도는 아무런 응답을 얻지 못했습니다.\n\n이 표본은 같은 종류의 다른 생물에 비해 꽤 수동적으로 보이지만, 우리 식민지를 향해 곧장 다가오고 있습니다. 우리 함대는 경계 태세를 강화했습니다."
 mem_space_monster_attacks.11.a:0 "함대를 보내라."
 mem_space_monster_attacks.12.name:0 "Planetfall"
 mem_space_monster_attacks.12.desc:0 "우리의 방어를 무시하고 아메바는 [this.GetName]로 내려가며 대기권에 진입했습니다. 주요 식민지에서 명확히 보이는 불타는 흔적을 남기며, 인구가 드문 지역에 추락했습니다.\n\n대피 절차가 진행 중인 가운데, 사고 현장에서의 첫 보고서가 충돌로 인한 생물체의 사망을 확인했습니다.\n\n그것은 여기서 죽기 위해 온 것일까요?\n\n즉각적인 주변 지역은 더 가까운 조사를 위해 차단되었습니다."
 mem_space_monster_attacks.13.name:0 "위험 회피"
 mem_space_monster_attacks.13.desc:0 "우리 함대가 승리를 거두었습니다. 아메바의 잔해는 이제 엉망이 되어 남아 있습니다. 왜 이 생물이 여기 와서 우리를 공격했는지는 결코 밝혀지지 않을지도 모르지만, 우리의 식민지는 다시 안전해졌습니다.\n\n아메바의 잔해를 간단히 스캔해본 결과, 매우 귀중한 이국적인 가스와 다른 유용한 물자가 존재하는 것으로 나타났습니다. 인근 화물선들은 이미 이들을 수집하라는 명령을 받았습니다. 대부분의 잔해는 자원으로 긁어모아질 것이지만, 더 흥미로운 조각들은 추가 연구를 위해 보관될 것입니다.\n\n우리의 일부 과학자들은 자가 수리하는 선체와 같은 가능한 응용에 대해 이미 환상을 품고 있으며, 다른 과학자들은 큰 돌파구를 기대하기 전에 해야 할 기초 연구가 많다는 점을 지적하고 있습니다."
 mem_space_monster_attacks.13.a:0 "다시 살아나게 하십시오."
 mem_space_monster_attacks.14.name:0 "고대 표본"
 mem_space_monster_attacks.14.desc:0 "아메바 유적에 대한 분석은 우리의 질문에 대한 답변을 거의 제공하지 못했습니다. 그것은 우리가 접한 가장 오래된 표본으로 보입니다. 왜 그것이 여기로 왔는지는 여전히 미스터리지만, 우리가 접했을 때 그것은 생애 주기의 끝에 가까워졌던 것으로 추정됩니다.\n\n이 외에는 자연적인 재생 능력에 대한 이해가 미미하게 증가했으며, 이는 앞으로 이 분야의 연구 노력에 도움이 될 것입니다."
 mem_space_monster_attacks.15.name:0 "썩어가는 상처"
 mem_space_monster_attacks.15.desc:0 "접수된 보고서에 따르면 [Root.GetName]에 있는 아메바 시체를 둘러싼 우려스러운 상황이 전개되고 있습니다. 그 분해되는 생물량은 이전에 알려지지 않은 독성 물질을 방출하며, 이는 이미 주변의 식물과 동물에 부정적인 영향을 미치고 있습니다.\n\n시체 자체에 대한 연구 결과, 이는 우리가 지금까지 접한 가장 오래된 종류의 표본이며 생애 주기의 끝에 가까운 것으로 보입니다. 그러나 왜 이 행성에서 죽음을 선택했는지는 여전히 미스터리입니다.\n\n더 시급한 질문은 잔해를 어떻게 처리할 것인가입니다."
 mem_space_monster_attacks.16.name:0 "사체 제거됨"
 mem_space_monster_attacks.16.desc:0 "아메바 잔해가 드디어 제거되었고 [Root.GetName]의 생태계에 대한 이전 손상은 일시적인 것으로 보이며 지속적인 영향은 없을 것으로 예상됩니다.\n\n시체 자체는 우리에게 상당량의 희귀 가스와 물자를 제공하여 추가 연구에 활용할 수 있게 되었습니다."
 mem_space_monster_attacks.17.name:0 "부패 상태"
 mem_space_monster_attacks.17.desc.a:0 "부패하는 아메바의 독소가 영향을 미치는 지역이 꾸준히 확장되고 있습니다. 식물과 동물은 독소의 영향에 서서히 굴복하고 있습니다. 현재 우리의 식민지는 아직 영향을 받는 지역 밖에 있지만, 이 상태가 오래 지속되지는 않을 것입니다."
 mem_space_monster_attacks.17.desc.b:0 "부패하는 아메바의 독소에 영향을 받는 지역이 꾸준히 확장되고 있습니다. 식물과 동물은 독소의 영향에 서서히 굴복하고 있습니다. 확산을 늦추기 위해 취한 조치는 어느 정도 성공적이었지만, 결국 피할 수 없는 결과를 지연시킬 뿐입니다. 현재 우리의 식민지는 여전히 영향을 받는 지역 밖에 있지만, 이 상태가 오래 지속되지는 않을 것입니다."
 mem_space_monster_attacks.18.name:0 "변이"
 mem_space_monster_attacks.18.desc:0 "죽어가는 야생동물과 시들어가는 식물에 대한 보고가 증가하고 있습니다. 생존한 표본들 사이에서는 변이가 만연하고 있으며, 남아있는 야생동물의 공격성이 증가하고 있는 상황입니다.\n\n하지만 이것이 전부는 아니며, 우리 인구 내에서도 유사한 부정적인 영향이 관찰되고 있으며, 사망 사례까지 발생하고 있으며 그 수가 꾸준히 증가하고 있습니다."
 mem_space_monster_attacks.18.desc.machine:0 "죽어가는 야생동물과 시들어가는 식물에 대한 보고가 증가하고 있습니다. 생존한 표본 중에서는 변이가 만연하게 발생하고 있으며, 남아있는 야생동물의 공격성이 증가하고 있는 것으로 나타났습니다."
 mem_space_monster_attacks.19.name:0 "Regeneration"
 mem_space_monster_attacks.19.desc:0 "우리가 진행 중인 과정이 [This.GetName]를 불모의 독성 폐허로 만들 것이라고 생각했을 때, [This.GetPlanetMoon]의 대기에서 변화가 감지되었습니다. 아메바의 시체와 관련된 독성 입자의 농도가 꾸준히 감소하고 있습니다.\n\n이 감소의 명백한 이유는 변이된 식물들로, 이들은 이미 이러한 입자를 흡수하여 이전에 죽었던 지역을 되살리고 있습니다. 우리는 대기가 오염물질로부터 깨끗해지면 이들의 빠른 성장이 진정될 것으로 예상합니다.\n\n이 추세가 계속된다면 [This.GetName]는 이 시련 이전보다 더 거주 가능해질 것입니다."
 mem_space_monster_attacks.20.name:0 "독성 가이아형성"
 mem_space_monster_attacks.20.desc:0 "필요한 연구 기반이 마련되었으므로, 이제 고대 아메바 시체에서 배출된 물자를 합성하고 조정하여 행성을 통제된 방식으로 가이아포밍할 수 있습니다. 그러나 이는 독성이 있는 세계에서만 작동하며 상당한 양의 물자와 시간이 필요합니다."
 mem_space_monster_attacks.21.name:0 "Gaiaformation"
 mem_space_monster_attacks.21.desc:0 "우리 [Root.GetTerraformerPlural]는 [mem_toxic_gaiaforming_target.GetName]에서 가이아 포밍 과정이 완료되었다고 기쁜 소식을 전합니다! 합성 아메바 가스와 유전자 변형 씨앗을 사용하여 만든 새로운 실험실 제작 식물 하이브리드의 배치가 [mem_toxic_gaiaforming_target.GetName]의 기후와 대기를 10년이 채 안 되는 시간에 성공적으로 변화시켰습니다.\n\n하이브리드 식물은 예상대로 행성 전역에 번식하였으며, 이제 [mem_toxic_gaiaforming_target.GetName]의 화학적 대기 변화로 인해 '휴면' 단계에 들어가고 있습니다."
 mem_space_monster_attacks.23.name:0 "독성 후보"
 mem_space_monster_attacks.23.desc:0 "우리 [Root.GetTerraformerPlural]는 이미 절차를 제안할 가이아포밍 후보를 적절히 선정하였고, 이를 테라포밍하기 시작했습니다."
 mem_space_monster_attacks.23.desc_alt:0 "우리 [Root.GetTerraformerPlural]는 가이아 형성 후보에 적합한 대상을 찾지 못했습니다. 이미 투입된 자원은 대신 우리의 연구에 투자될 것입니다."
 TECH_UNLOCK_tech_mem_toxic_gaiaforming_TITLE:0 "§Y유물 잠금 해제:§! $r_mem_amoeba_sample$"
 TECH_UNLOCK_tech_mem_toxic_gaiaforming_DESC:0 "$r_mem_amoeba_sample_desc$"
