l_korean:
 mem_death_world_1:0 "위험한 토착생물"
 mem_death_world_1_desc:0 "이 행성의 토착 생명체는 비정상적으로 공격적이고 식민지 개척자들에게 적대적이어서 행성의 일상적인 활동을 방해합니다."
 mem_death_world_2:0 "적대적인 토착생물들"
 mem_death_world_2_desc:0 "이 행성의 토착 생명체들은 매우 공격적이며, 식민지 주민들을 끊임없이 위협하고 있습니다."
 mem_death_world_3:0 "자연의 복수"
 mem_death_world_3_desc:0 "이곳의 주민들은 토착 생명체들에게 끊임없는 공격을 받고 있으며, 삶은 투쟁의 연속입니다."
 mem_death_world_ransacked:0 "약탈"
 mem_death_world_ransacked_desc:0 "일부 동물들이 행성 시설에 침입하여 운영에 큰 혼란을 초래했습니다."
 mem_death_world_stinged:0 "톡쏘는"
 mem_death_world_stinged_desc:0 "독이 있는 생물들이 생활지역에 침입한 이후로 지역 주민들은 불안에 떨고 있습니다."
 mem_death_world_insects:0 "곤충떼 구름"
 mem_death_world_insects_desc:0 "수많은 곤충 군락들이 지역을 휩쓸고 있어 매일 활동에 지장을 주고 있습니다."
 mem_death_world_militia_supported:0 "생존주의 민병대"
 mem_death_world_militia_supported_desc:0 "이 행성에는 생존주의 전통에 기반한 강력한 민병대가 있습니다."
 mem_death_world_militia:0 "생존주의 운동"
 mem_death_world_militia_desc:0 "이 행성은 강한 생존주의 전통이 있습니다."
 mem_death_world_militia_rejected:0 "좌절된 생존주의 운동"
 mem_death_world_militia_rejected_desc:0 "생존주의 운동의 형성이 좌절되자, 식민지 주민들은 정부가 실제로 누구 편에 있는지 궁금해합니다."
 mem_death_world_death_swarm:0 "죽음을 몰고 오는 무리"
 mem_death_world_death_swarm_desc:0 "개척민들은 독성이 있는 곤충의 공격으로 인한 대규모 사망자 발생에 여전히 충격을 받고 있습니다."
 mem_death_world_stampede:0 "쇄도하는 위협"
 mem_death_world_stampede_desc:0 "식민지 주민들은 최근 시설을 훼손한 동물 무리의 습격 때문에 화가 나 있는 상태입니다."
 mem_death_world_wasteland:0 "생체물질 황무지"
 mem_death_world_wasteland_desc:0 "이 행성은 죽은 생체물질로 가득 차있으며, 이곳에서 과학적 연구가 가능합니다."
 mem_death_world_graveyard:0 "야생생물 무덤"
 mem_death_world_graveyard_desc:0 "이 행성은 죽은 야생생물들로 뒤덮혀있으며, 이곳에서 과학적 연구가 가능합니다."
 mem_death_world_toxic:0 "죽음의 행성"
 mem_death_world_toxic_desc:0 "이 행성은 다른 모든 것들에 적대적인 외계 생명체들이 과도하게 퍼져있어 거주할 수 없는 행성이 되었습니다."
 mem_death_world_harmony:0 "조화로운 생활"
 mem_death_world_harmony_desc:0 "수없이 많던 공격적인 야생 외계 생물들은 길들었고, 지금은 개척자들에 의해 인도되고 있습니다."
 mem_death_world_planetmind:0 "지성있는 행성"
 mem_death_world_planetmind_desc:0 "표면 아래 깊은 곳에, 행성 지능이 존재하며, 표면 거주자들의 의지에 얽매여 있습니다."
 mem_death_world_dead_planetmind:0 "죽은 지성있는 행성"
 mem_death_world_dead_planetmind_desc:0 "지표면 아래 깊은 곳에는 부검에 관심있는 연구자들에게 엄청난 양의 연구자료를 제공할 죽은 행성의 지성이 존재하고 있습니다."
 mem_pc_death_habitability:0 "죽음의 행성 거주 적합성"
 mem_alpha_torrasque_army:0 "알파 토라스크"
 mem_torrasque_army:0 "토라스크"
 mem_hunter_killer_army:0 "헌터킬러 무리"
 mem_alpha_torrasque_army_plural:0 "알파 토라스크 무리"
 mem_torrasque_army_plural:0 "토라스크 무리"
 mem_hunter_killer_army_plural:0 "헌터킬러 무리"
 mem_alpha_torrasque_army_desc:0 "죽음의 세계에서 거대한 짐승들 중 가장 강력한 이 괴물은 지역 야생 생물의 우두머리이자 가장 위험한 무기입니다."
 mem_torrasque_army_desc:0 "근육과 이빨로 이루어진 거대한 산, 이 거대한 짐승은 전체 군대를 상대하고 승리할 수 있습니다."
 mem_hunter_killer_army_desc:0 "상대적으로 작고 개별적으로 약한 생물의 크고 다양한 무리가 하나의 목적으로 뭉쳤습니다. 즉, 행성의 반갑지 않은 손님을 사냥하고 파괴하는 것입니다."
 mem_death_world_LOST:0 "행성이 사라졌습니다."
 mem_death_world.1.name:0 "각성하는 위협"
 mem_death_world.1.desc:0 "§Y[Root.GetName]§!의 이전에는 온화했던 생태계가 급격한 변화를 겪고 있는 것 같습니다. 여러 유순한 토착 생물들이 우리 개척민들에게 더욱 적대적으로 변하고 공격하고 있습니다. 갑작스러운 공격성 증가에 따라 수십 건의 부상이 밤사이 보고되었습니다. 이러한 추세가 계속된다면 행성의 의료 시스템이 압도당할 수 있습니다."
 mem_death_world.1.desc.hive:0 "§Y[Root.GetName]§!의 이전에 유순한 생태계가 급격한 변화를 겪고 있는 것 같습니다. 여러 유순한 원주율 생물들이 우리의 드론에 대해 더욱 적대적으로 변하고 있으며, 공격하고 있습니다. 많은 드론들이 갑작스러운 공격성 증가 이후 밤사이에 피해를 보고했습니다. 이러한 추세가 계속된다면 우리의 피해 회복 능력이 압도당할 수 있습니다."
 mem_death_world.1.desc.machine:0 "§Y[Root.GetName]§!의 이전에는 온화했던 생태계가 급격한 변화를 겪고 있는 것 같습니다. 여러 유순한 토착 유기체 생명체들이 우리 유닛에 대해 더욱 적대적으로 변하고 공격하고 있습니다. 많은 유닛이 갑작스러운 공격성 증가 이후 밤사이 피해를 보고했습니다. 이러한 추세가 계속된다면 우리의 복구 능력이 압도당할 수 있습니다."
 mem_death_world.1.desc.synth:0 "§Y[Root.GetName]§!의 이전에는 온화했던 생태계가 급격한 변화를 겪고 있는 것 같습니다. 여러 유순한 생물들이 우리 개척민들에게 더욱 적대적으로 변하고 공격하고 있습니다. 많은 합성체들이 갑작스러운 공격성 증가 이후 밤사이 피해를 보고했습니다. 이러한 추세가 계속된다면 우리의 복구 능력이 압도당할 수 있습니다."
 mem_death_world.2.name:0 "저장소 습격"
 mem_death_world.2.desc:0 "많은 수의 작은 토착 설치류가 어떻게든 §Y[Root.GetName]§!의 행성 저장 시설 중 하나에 들어왔습니다. 그들의 작은 크기에도 불구하고, 그들은 그곳에 보관된 민감한 장비에 상당한 피해를 주었습니다. 많은 물품은 가능한 한 빨리 교체해야 합니다."
 mem_death_world.3.name:0 "식민지 거주민 부상"
 mem_death_world.3.desc:0 " §Y[Root.GetName]§!의 주민들은 실내에 머무르라는 지시를 받았지만, 이번에는 그것만으론 충분치 않았습니다. 주거구역은 환기구를 통해 침입한 독성 생명체들에게 잠식당했습니다. 다행히 사망자는 없었지만, 시민들은 이 사건으로 상당히 고통스러워하고 있으며, 일부 희생자들은 회복하는데 상당한 시간이 걸릴 것으로 보입니다."
 mem_death_world.3.desc.hive:0 "우리의 드론들이 §Y[Root.GetName]§!에서 높은 경계 태세를 유지하고 있었음에도 불구하고 불행한 사건을 막지 못했습니다. 거주지 블록이 환기 샤프트에서 나타난 독성 생물체에 침입당해 우리의 드론을 쏘았습니다. 사망자는 없었지만, 일부 드론이 심각한 피해를 입었고 나머지 드론들은 재발을 방지하기 위해 추가적인 예방 조치를 취해야만 합니다."
 mem_death_world.3a:0 "더러운 해충들..."
 mem_death_world_stinged_hive:0 "독성 예방조치"
 mem_death_world_stinged_hive_desc:0 "우리 드론들에게 독성이 있는 생물들의 공격에 대해 추가적인 예방조치를 취해야 합니다."
 mem_death_world.4.name:0 "곤충떼 구름"
 mem_death_world.4.desc:0 "막대한 수의 거대한 곤충들이 §Y[Root.GetName]§! 전역에서 땅속에서 나타났습니다. 단독으로는 거의 위험하지 않지만, 그들의 단단한 외골격이 행성에 있는 차량의 유틸리티와 엔진을 막아 행성의 인프라를 방해할 위협이 됩니다."
 mem_death_world.4a:0 "역겨운 벌레들..."
 mem_death_world.5.name:0 "야생생물의 공격성"
 mem_death_world.5.desc:0 " §Y[Root.GetName]§!로부터 지역의 야생동물들이 식민지 주민들을 적극적으로 사냥하고 죽이고 있다는 보고가 들어왔습니다. 사상자의 비율은 낮은 편이지만 증가추세이며, 무시하기 어렵습니다. 이들 생명체는 진화론적인 모델이 예측하는 것보다 더 빠르게 우리의 전술과 방법에 적응하는 급격한 변화를 보입니다."
 mem_death_world.5.desc.gestalt:0 "§Y[Root.GetName]§!로부터 지역의 야생동물들이 드론들을 적극적으로 사냥하고 죽이고 있다는 보고가 들어왔습니다. 사상자의 비율은 낮은 편이지만 증가추세이며, 무시하기 어렵습니다. 이들 생명체는 진화론적인 모델이 예측하는 것보다 더 빠르게 우리의 전술과 방법에 적응하는 급격한 변화를 보입니다."
 mem_death_world.5a:0 "뭔가 조치를 취해야 해."
 mem_death_world.6.name:0 "생존주의 민병대"
 mem_death_world.6.desc:0 "행성 §Y[Root.GetName]§!에서의 미래에 대한 우려로 인해 많은 개척민들이 원주민 생명체가 공격성을 유지할 경우를 대비하여 무기와 야생 생존 기술을 연구하는 데 시간을 바치기로 선택받은 사회입니다. 생존주의 운동은 날이 갈수록 새로운 회원을 늘려가고 있습니다."
 mem_death_world.6a:0 "자위권을 지지하라."
 mem_death_world.6b:0 "자위권을 허용하라."
 mem_death_world.6c:0 "자위권 행사를 불허한다."
 mem_death_world.7.name:0 "죽음을 몰고오는 무리"
 mem_death_world.7.desc:0 "오늘, 매우 폭력적인 딱정벌레의 대군이 §Y[Root.GetName]§!의 하늘에서 내려왔습니다. 당국이 반응하기도 전에 여러 민간인 작업자들이 여러 번 물렸고 곧 치명적인 독에 의해 쓰러졌습니다."
 mem_death_world.7.desc.hive:0 "오늘, 비정상적으로 폭력적인 대벌레 떼가 §Y[Root.GetName]§!의 하늘에서 내려왔습니다. 당국이 대응하기도 전에 여러 드론이 여러 차례 물리고 곧 치명적인 독에 의해 쓰러졌습니다."
 mem_death_world.8.name:0 "쇄도하는 위협"
 mem_death_world.8.desc:0 "오늘 여러 마리의 대형 유순한 포유류가 모여 §Y[Root.GetName]§!의 시설 중 하나를 공격했습니다. 그들은 망치 모양의 머리로 벽을 들이받아 벽이 무너질 정도의 압력을 가했습니다. 그 후 생물들은 시설을 더 짓밟아 상당한 피해를 입힌 뒤 광야 공생군으로 도망쳤습니다. 다행히도, 작업자들은 탈출할 수 있었고 민간인 피해는 최소화되었습니다."
 mem_death_world.8.desc.gestalt:0 "오늘 여러 마리의 대형 유순한 포유류가 모여 §Y[Root.GetName]§!의 시설 중 하나를 공격했습니다. 그들은 망치 모양의 머리로 벽을 들이받아 벽이 무너질 정도의 압력을 가했습니다. 그 후 생물들은 시설을 더 짓밟아 상당한 피해를 입힌 뒤 광야 공생군으로 도망쳤습니다. 다행히도, 우리의 드론 작업자들은 도망칠 수 있었고, 인명 피해는 최소화되었습니다."
 mem_death_world.8a:0 "놈들을 멈춰야만 해."
 mem_death_world.9.name:0 "자연의 복수"
 mem_death_world.9.desc:0 "§Y[Root.GetName]§!의 원주율 생명체는 날이 갈수록 더욱 공격적이고 조직적으로 성장하고 있습니다. 그들은 복잡한 기동을 수행하고 우리의 군대를 피할 수 있습니다. 이 행성은 이제 단순한 일상 생존조차도 엄청난 과제가 되는 경계 사망 행성이 되었습니다."
 mem_death_world.9a:0 "우리는 너무 늦기 전에 놈들을 멈출 방법을 찾아야 해!"
 mem_death_world.10.name:0 "순수주의 운동"
 mem_death_world.10.desc:0 "§Y[Root.GetName]§!에 있는 개척민들은 외계 생명체와의 트라우마가 많은 경험을 통해 그들과 다른 모든 것에 대해 극도로 불신하게 되었습니다. 외국인 혐오 운동이 상승하고 있습니다."
 mem_death_world.10a:0 "골칫거리로군."
 mem_death_world.10b:0 "저들은 무엇이 옳은 결정인지 경험으로 안 것이다."
 mem_death_world.11.name:0 "해결책 모색"
 mem_death_world.11.desc:0 "§Y[Root.GetName]§!에서의 위기상황은 많은 전문가가 해결책을 제안하도록 하였습니다. 야생동물들의 공격성이 커짐에 따라, 무언가를 해야 할 필요성은 분명합니다. 우리는 이제 선택을 해야 합니다."
 mem_death_world.11.desc.gestalt:0 "§Y[Root.GetName]§!에서의 위기상황은 많은 전문가가 해결책을 제안하도록 하였습니다. 야생동물들의 공격성이 커짐에 따라, 무언가를 해야 할 필요성은 분명합니다. 우리는 이제 선택을 해야 합니다."
 mem_death_world.11a:0 "우리는 공격자들을 처치할 방법을 찾아야 합니다."
 mem_death_world.11b:0 "야생생물들을 좀 더 자세히 연구해보자."
 mem_death_world.11c:0 "우리는 피난처를 만들고 희망을 찾을 방법을 마련해야 한다."
 mem_death_world.11d:0 "이 사건의 배후에 있는 힘은 자연의 사이오닉 에너지다. 우리는 이를 이용해야 한다."
 mem_death_world.11e:0 "이 생물들은 전체의 일부입니다. 우리는 더 많은 것을 배워야 합니다."
 mem_death_world.12.name:0 "자연과의 전쟁"
 mem_death_world.12.desc:0 "확대 연구를 통해 §Y[Root.GetName]§!의 적대적인 생태계에 대한 여러 취약점이 밝혀졌습니다. 이 취약점이 타격을 받으면 전체 생태계가 붕괴될 수 있습니다. 군 지휘관들은 두 가지 가능한 해결책을 제안합니다: \n\n안전한 궤도에서 야생 생물을 파괴하도록 특별히 설계된 무기를 배치함으로써, 그들은 계획을 안전하게 실행할 수 있지만, 부수적 피해는 엄청날 것입니다. \n\n지상 작전은 성공 확률이 낮고 외부 지원이 필요할 가능성이 높지만, 행성의 가이아 잠재력을 유지해야 합니다."
 mem_death_world.12.desc.gestalt:0 "확대 연구를 통해 §Y[Root.GetName]§!의 적대적인 생태계에 대한 여러 취약점을 밝혀냈습니다. 이 취약점이 타격을 받으면 전체 생태계가 붕괴될 수 있습니다. 우리의 서브루틴은 두 가지 가능한 해결책을 결정했습니다: \n\n안전한 궤도에서 야생 생물을 파괴하도록 특별히 설계된 무기를 배치함으로써, 그들은 계획을 안전하게 실행할 수 있지만, 부수적 피해는 막대할 것입니다. \n\n지상 작전은 성공 확률이 낮고 외부 지원이 필요할 가능성이 높지만, 행성의 가이아 잠재력을 유지할 수 있을 것입니다."
 mem_death_world.12a:0 "선택지를 고려해볼까."
 mem_death_world.13.name:0 "야생생물 제거"
 mem_death_world.13.desc:0 "우리의 예측은 사실이었습니다. 우리의 고급 무기에 맞아 적대적인 생태계가 완전히 붕괴되었습니다. \n\n하지만, 해결책은 부작용이 없지 않았습니다. 전체 행성의 과도하게 성장한 생태계가 대규모로 갑작스럽게 파괴되면서 에너지가 폭발적으로 방출되어 급격한 기후 변화를 일으키고 세상을 황무지로 바꾸어 놓았습니다."
 mem_death_world.13a:0 "적어도 이젠 '우리의' 황무지지."
 mem_death_world.14.name:0 "골칫거리 근절"
 mem_death_world.14.desc:0 "지역 생태계가 우리의 공격의사를 감지했습니다. 공격을 준비하고 있습니다!"
 mem_death_world.14a:0 "전투를 준비하라!"
 mem_death_world.15.name:0 "아군의 승리"
 mem_death_world.15.desc:0 "우리의 분석이 예상한 대로, 여러 약점에 대한 공격이 생태계를 충분히 교란시켜 대규모 붕괴를 초래했습니다. 거의 모든 생태적 지위가 영향을 받았고, 남아 있는 굶주리고 혼란스러운 생물들은 우리의 정리 작전의 쉬운 표적이 됩니다."
 mem_death_world.15a:0 "우리의 행성을 되찾았군."
 mem_death_world.16.name:0 "아군의 패배"
 mem_death_world.16.desc:0 "우리는 야생 동물로부터 강한 저항을 예상했지만, 이 상황은 예상하지 못했습니다. 우리의 군대는 패배하고 전멸했습니다. \n\n우리의 공격에 자극을 받은 듯, 생태계는 빠르게 독성 가스를 대기로 방출하는 방향으로 변화하여, 우리에게는 거주할 수 없는 환경으로 급격히 변모했습니다."
 mem_death_world.16.desc.machine:0 "우리는 야생 생물로부터 강한 저항을 예상했지만, 이것은 예상하지 못했습니다. 우리의 군대는 패배하고 전멸했습니다. \n\n우리의 공격으로 인해 생태계는 빠르게 독성 가스를 대기로 방출하는 방향으로 변화하였고, 그 조성이 급격히 바뀌어 우리의 기계 유닛조차 거주할 수 없는 상태가 되었습니다."
 mem_death_world.17.name:0 "포괄적인 야생생물 연구"
 mem_death_world.17.desc:0 "적대적인 야생 생물에 대한 광범위한 샘플링과 부검이 §Y[Root.GetName]§!의 본질을 이해하는 데 매우 유용하다는 것이 입증되었습니다. \n\n서로 분리되어 있고 유전적으로 구별되는 종임에도 불구하고, 모든 종은 조직에 외래 물자가 붙어 있는 것으로 보이며, 이로 인해 서로 결합된 것처럼 보입니다. 지속적인 면역 억제는 숙주의 항체가 이를 표적으로 삼지 못하게 합니다. 이러한 효과를 이해함으로써 우리의 문제를 해결할 수 있는 가능한 방법에 대한 통찰을 얻게 되었습니다."
 mem_death_world.17a:0 "이 조직을 이용하면 우리 거주민들이 행성 생태계와 평화롭게 살 수 있도록 할 수 있을 것이다."
 mem_death_world.17a.hive:0 "이 조직을 이용하면 행성 생태계와 우리 드론들을 평화롭게 살 수 있도록 할 수 있을 것이다."
 mem_death_world.17b:0 "면역 억제를 방해할 방법을 찾을 수 있을 것입니다..."
 mem_death_world.18.name:0 "자연과의 조화속에서"
 mem_death_world.18.desc:0 "첫 번째 피험체는 이 행성의 야생 생물을 결합하는 이상한 조직을 제어하고 조종할 수 있는 놀라운 잠재력을 보여주었습니다. 그들은 토착 종의 공격을 피할 수 있었습니다. 곧 안전하고 접근 가능한 조직 이식이 인구 사이에 배포되었습니다. \n\n이 조직은 부작용이 없지 않았습니다. 피험체들은 외계에서 작동하기 어려움을 겪고 있지만, 행성을 제어하기 위한 대가로는 작은 가격입니다. 새롭게 형성된 공생 관계는 야생 생물의 확산을 가속화하여 이 행성을 그들 안에 결합 조직을 허용한 소수의 사람들을 제외한 모두에게 적대적인 이상한 새로운 세계로 바꾸어 놓았습니다."
 mem_death_world.18.desc.hive:0 "첫 번째 테스트 드론들은 이 행성의 야생 생물을 결합하는 이상한 조직을 제어하고 지시하는 놀라운 잠재력을 보여주었습니다. 그들은 원주율 종들에게 공격받지 않고 피할 수 있었습니다. 곧 안전하고 접근 가능한 조직 이식물이 우리의 드론들 사이에 배포되었습니다. \n\n이 조직은 부작용이 없지 않았습니다. 드론들은 외부에서 완전한 효율로 작동할 수 없지만, 이 행성을 제어하기 위한 대가로는 작은 가격입니다. 새롭게 형성된 공생 관계는 야생 생물의 확산을 가속화시켜, 이 조직을 몸 안에 받아들인 소수의 사람들을 제외한 모두에게 적대적인 이상한 새로운 세계로 행성을 변화시켰습니다."
 mem_death_world.18a:0 "매력적이로군."
 mem_death_world.19.name:0 "면역체계 붕괴"
 mem_death_world.19.desc:0 "작지만, 효과적인 바이러스 작용제 §Y[Root.GetName]§!은(는) 이것에 적응할 수 없었습니다. 전염병은 본래의 생태계 집단으로 빠르게 퍼져나갔고, 이들은 치명적인 거부반응을 일으켰습니다. 곧 모든 위험한 생물들은 죽을 것입니다."
 mem_death_world.19a:0 "완벽해."
 mem_death_world.20.name:0 "고립된 정원"
 mem_death_world.20.desc:0 "우리 공학자들은 개척민의 서식지를 증가하는 위험으로부터 보호하고 원주율 동물과 직접 대면하지 않고도 진정시키기 위한 계획을 세웠습니다. 지진을 시뮬레이션하는 해머 설치물, 전자기 분열기 및 음파 울타리를 조합하면, 우리 지역에서의 추가 활동을 저지할 수 있을 것입니다."
 mem_death_world.20.desc.gestalt:0 "우리 공학자들은 우리의 드론을 증가하는 위험으로부터 보호하고 원주율 동물들을 직접 대면하지 않고 진정시키기 위한 계획을 세웠습니다. 지진 시뮬레이션 해머 설치물, 전자기 분열기 및 음파 울타리의 조합으로, 우리는 우리의 지역에서 추가적인 활동을 저지할 수 있을 것입니다."
 mem_death_world.20a:0 "건설을 준비하라."
 mem_death_world.20.tooltip:0 "우리는 §Y억제구역§!을 건설할 수 있습니다. 이 건물은 적대 생명체의 침입을 막아줄 것입니다."
 mem_death_world.21.name:0 "억제 구역 현재 작동중"
 mem_death_world.21.desc:0 "우리의 방어를 성공적으로 배치했습니다. 일부 지역에서는 조치가 충분하지 않아 포기해야 했지만, 다른 지역은 추가 침입으로부터 안전할 것입니다."
 mem_death_world.21a:0 "우리 시대에는 평화가 있으리."
 mem_death_world.22.name:0 "억제구역 철거"
 mem_death_world.22.desc:0 "§Y[Root.GetName]§!의 §Y억제구역§!을 파괴하도록 만든 부주의한 결정으로 인해, 우리는 토착 생물체들이 우리의 생활공간으로 침투하도록 허락했습니다. 식민지는 한 시간도 채 버티지 못하고 점령당해 버렸습니다."
 mem_death_world.23.name:0 "사이오닉 존재"
 mem_death_world.23.desc:0 "우리가 맞았습니다! 이 지역의 야생 생물은 사이오닉 활동에 의해 촉진되는 집단적인 마음을 가지고 있습니다. 지표면 깊숙한 곳의 성장은 거대한 마음처럼 작용하여, 그 살점의 작은 조각을 감염시켜 행성의 생명체들을 인도하고 있는 것 같습니다. 이를 통해 우리는 그것과 소통할 수 있을 것입니다... 아니면 파괴할 수 있을 것입니다."
 mem_death_world.23a:0 "행성의 정신체와 사이오닉 연결을 시도하라."
 mem_death_world.23b:0 "새로 발견된 지식을 사용해 문제의 근원을 공격하라."
 mem_death_world.24.name:0 "행성 정신체 진정"
 mem_death_world.24.desc:0 "우리 제국의 여러 사이오닉 전문가들이 §Y[Root.GetName]§!로 여행하여 그것을 인도하는 정신과 교류하고 있습니다. 그들의 집단 의지는 행성의 생태계를 관통하는 사이오닉 연결에 침투했습니다. 이 정신적 공격에 압도된 행성 정신은 저항할 수 없었고, 성공적으로 진정되었으며, 그 야만적인 의지는 우리의 목적에 맞게 다시 쓰여졌습니다."
 mem_death_world.24a:0 "우리의 의지는 강하다."
 mem_death_world.25.name:0 "행성 정신체의 승리"
 mem_death_world.25.desc:0 "여러 사이오닉 전문가들이 우리 제국에서 §Y[Root.GetName]§!로 여행하여 그것을 안내하는 정신과 교류하고자 했습니다. 그들의 집단 의지는 행성의 생태계를 관통하는 사이오닉 연결로 스며들었습니다. 불행히도, 행성 정신은 그들이 예상했던 것보다 강력했습니다. \n\n그것은 그들의 정신을 파괴했을 뿐만 아니라, 행성 정신은 개척민의 정신을 직접 공격하는 방법도 배웠습니다. 곧 대부분의 식민지가 그것의 통제 아래에 놓이게 되었습니다. 추가 공격에 대한 우려로 인해, 그것은 생태계의 생물 주기를 변화시켜 우리에게 부적합한 대기를 생성하게 만들었습니다. 이는 식민지가 우리에게 영원히 잃게 되었음을 의미합니다."
 mem_death_world.26.name:0 "모든 악의 뿌리"
 mem_death_world.26.desc:0 "우리의 사이오닉 전문가들이 파악한 행성 구조로 인해 우리 과학자들은 전체 시스템에 전력을 공급하는 몇 가지 주요 신진대사 접속점을 찾을 수 있었습니다. 거대한 시추 플랫폼을 통해 그 접속점 내부에 수 톤의 매우 강력한 신경 독소가 주입됨에 따라, 표면의 생명이 정상으로 돌아가는 동안 우리는 행성의 정맥이 시들어 죽어가는 것을 실시간으로 볼 수 있었습니다."
 mem_death_world.26a:0 "승리는 우리의 것이다!"
 mem_death_world.26b:0 "참으로 비극적인 손실이로군. 하지만 우리는 선택의 여지가 없었다."
 mem_death_world.27.name:0 "행성 정신체의 응답"
 mem_death_world.27.desc:0 "우리는 행성의 깊이를 탐색하였고 답을 찾았습니다. 깊은 곳에서 행성정신은 기다리고 있었습니다. 그것은 우리를 들었습니다. \n\n우리는 그것의 원시적인 힘을 감지했지만, 우리는 더 강했습니다. 그것은 우리의 힘을 감지하고 복종하기로 선택했습니다."
 mem_death_world.27a:0 "좋다. 이제 우리는 하나로군."
 mem_death_world.27a.tooltip:0 "행성의 정신체와 그것이 이끄는 존재들이 우리와 함께 할 것입니다."
 mem_death_world.27b:0 "좋아. 이제 죽어라."
 mem_death_world.28.name:0 "행성 정신체의 거절"
 mem_death_world.28.desc:0 "행성 깊은 곳에서, 행성 정신은 우리를 기다리고 있었습니다. 그러나 우리가 그 존재로 접촉했을 때, 그것은 우리를 거부했습니다. \n\n그것은 행성의 생명체들이 모든 외부인에게 적대적으로 변하도록 이끌었습니다. 우리의 존재는 더 이상 가능하지 않습니다."
 mem_death_world.29.name:0 "행성의 극단적 변화"
 mem_death_world.29.desc:0 "§Y[Root.GetName]§!의 생명체는 극적인 변화를 겪었습니다. 그 대사 과정이 개척민에게 극도로 독성이며 식민지 장비에 부식성인 가스를 내뿜도록 변화했습니다. 이제 원주율 생태계는 번성하고 있지만 우리의 개척민은 죽거나 도망칠 수밖에 없었습니다."
 mem_death_world_chain_title:0 "죽음의 행성"
 mem_death_world_chain_desc:0 "지역 생태계의 공격성이 날로 증가하는 가운데, 우리는 이른바 "죽음의 세계"에서 위기를 해결할 방법을 찾아야 합니다. 그렇지 않으면 그 이름에 걸맞게 될 것입니다."
 MEM_DEATH_WORLD_WAR_ON_NATURE:0 "야생생물 행동관찰"
 MEM_DEATH_WORLD_WAR_ON_NATURE_DESC:0 "우리 과학자들이 궤도에서 행성을 관찰하고 생태계의 약점을 찾아야 합니다."
 MEM_DEATH_WORLD_WILDLIFE_REMOVAL:0 "야생생물 제거"
 MEM_DEATH_WORLD_WILDLIFE_REMOVAL_DESC:0 "강력한 무기가 궤도로부터 발사되어 외계 생태계를 교란하도록 설계되었습니다. 이 무기는 행성을 파괴할 가능성이 높지만, 위협을 확실히 무력화할 것입니다."
 MEM_DEATH_WORLD_EXTERMINATION_OR_BUST:0 "근절하거나, 실패하거나!"
 MEM_DEATH_WORLD_EXTERMINATION_OR_BUST_DESC:0 "지상 해결책을 통한 강한 충격은 우리가 가이아 행성의 잠재력을 그대로 유지하면서 적대적인 생태계를 파괴할 수 있도록 해줄 것입니다.\n\n§R기회는 오직 한 번뿐입니다! 만약 우리의 군대가 이 작전을 수행할 만큼 충분히 강하지 않다면, 우리는 이 행성을 영원히 잃게 될 것입니다.§!"
 MEM_DEATH_WORLD_STUDY_THE_NATURE:0 "야생생물 연구"
 MEM_DEATH_WORLD_STUDY_THE_NATURE_DESC:0 "현지 야생생물에 대한 관찰과 조사를 통해 우리는 그 구조와 원리를 더 잘 이해할 수 있게 됩니다."
 MEM_DEATH_WORLD_IN_HARMONY:0 "자연과의 조화"
 MEM_DEATH_WORLD_IN_HARMONY_DESC:0 "우리 식민지 주민들이 자연과 조화롭게 사는 방법을 찾습니다."
 MEM_DEATH_WORLD_SUICIDE:0 "면역체계 붕괴"
 MEM_DEATH_WORLD_SUICIDE_DESC:0 "우리는 지역 야생 생물의 결합 조직을 활용하여 적대적인 생태계를 파괴할 수 있습니다."
 MEM_DEATH_WORLD_WALLED_GARDEN:0 "고립된 정원"
 MEM_DEATH_WORLD_WALLED_GARDEN_DESC:0 "지역의 야생생물들이 우리의 식민지에 간섭하지 못하도록 막는 방법을 개발합니다."
 MEM_DEATH_WORLD_PSIONIC:0 "야생생물들의 사이오닉 활동 검사"
 MEM_DEATH_WORLD_PSIONIC_DESC:0 "우리는 행성의 생명체들이 더 높은 지능의 사이오닉에 의해 움직이는지에 대해 알아내야 합니다."
 MEM_DEATH_WORLD_PLANETMIND:0 "행성 정신체"
 MEM_DEATH_WORLD_PLANETMIND_DESC:0 "우리는 강력한 행성 정신체와 의지의 싸움을 해야 합니다."
 MEM_DEATH_WORLD_ROOT:0 "모든 악의 뿌리"
 MEM_DEATH_WORLD_ROOT_DESC:0 "우리는 직접적으로 그 행성의 사이오닉 힘에 노출되는 위험 없이, 우리의 사이오닉 영향을 사용하여 강력한 행성 정신을 탐색하고 공격할 수 있습니다."
 MEM_DEATH_WORLD_HIVE:0 "행성 내부의 군체의식 찾기"
 MEM_DEATH_WORLD_HIVE_DESC:0 "강력한 정신체가 이 행성의 생명체를 조종하고 있었습니다. 우리는 이를 찾고, 접촉을 시도해봐야 합니다."
 mem_pc_death:0 "죽음의 행성"
 mem_pc_death_desc:0 "적대적이고 매우 다재다능하며 극도로 공격적인 생태계를 가진 행성입니다. 선택된 소수만이 그 표면에서 생존하고 번영할 수 있습니다."
 trait_mem_pc_death_preference:0 "죽음의 행성 선호"
 trait_mem_pc_death_preference_desc:0 "이 종은 이 죽음의 세계의 생태계와 조화를 이루며 살아갈 수 있도록 작은 수정이 가능하지만, 그 밖의 환경에서는 생존할 수 없게 됩니다."
 mem_pc_death_tile:0 "죽음의 행성 지형"
 mem_pc_death_tile_desc:0 "외부인이 생존할 수 있을 정도로 무성하게 자란 지형."
 d_mem_death_world_blocker:0 "자연의 복수"
 d_mem_death_world_blocker_desc:0 "적대적인 외계 생명체를 막기 위해, 이 지역은 버려지고 장벽으로 격리되어야만 했습니다."
 d_mem_death_world_deterrence_hub:0 "억제구역"
 d_mem_death_world_deterrence_hub_desc:0 "원주율의 방어를 통제하는 대규모 복합체입니다."
 pc_mem_death_habitability:0 "죽음의 행성 거주 적합성"
