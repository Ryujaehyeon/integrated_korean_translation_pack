l_korean:
 mem_sight_unseen_anomaly:0 "바위 위에"
 mem_sight_unseen_anomaly_desc:0 "우리는 소행성의 측면에 정박해 있는 함선을 감지하고 있습니다. 함선은 완전히 비활성화 상태입니다. 아주 오랫동안 이곳에 있었던 것 같습니다."
 mem_sight_unseen_event_chain_title:0 "보이지 않는 광경"
 mem_sight_unseen_event_chain_desc:0 "우리 과학자들은 세계 간의 장벽이 가장 약해지는 지점을 찾을 것입니다. 이 \"균열\"을 통하여 우리는 다른 세계들을 들여다볼 수 있을 것입니다."
 mem_sight_unseen_soft_spots_found:0 "균열 탐사됨"
 MEM_SIGHT_UNSEEN_STUDY_VIEWER:0 "스크린 연구하기"
 MEM_SIGHT_UNSEEN_STUDY_VIEWER_DESC:0 "폐허의 선박에서 발견된 스크린에는 몇 가지 미지의 기술이 내장되어 있습니다. 우리는 이것을 더 자세히 연구해야 합니다."
 MEM_SIGHT_UNSEEN_PROBE_SOFT_SPOT:0 "균열을 탐사해라."
 MEM_SIGHT_UNSEEN_PROBE_SOFT_SPOT_DESC:0 "§S[soft_spot_planet.GetName]§!의 균열은 차원관측기를 사용하고 다른 현실을 관찰할 수 있는 기회를 제공합니다."
 mem_sight_unseen_studying_viewer:0 "차원관측기 연구"
 mem_sight_unseen_studying_viewer_desc:0 "차원을 꿰뚫어 보는 장치는 더는 다른 세계를 보는 데 사용할 수 없습니다. 그것을 분해하고 그것이 무엇으로 구성되어 있는지 볼 시간입니다."
 mem_sight_unseen_studying_viewer_fatigued:0 "$mem_sight_unseen_studying_viewer$"
 mem_sight_unseen_modifier_4:0 "제대로 음미하도록!"
 mem_sight_unseen_modifier_4_desc:0 "평행 우주에서의 비전이 지역 전문가들에게 더 열심히 일하도록 영감을 주었습니다. 만약 미세한 점액 생물들이 이렇게 근면하다면, 우리의 사람들은 어떻게 덜 할 수 있겠습니까?"
 mem_sight_unseen_modifier_5_good:0 "슬라임 영감"
 mem_sight_unseen_modifier_5_good_desc:0 "아름다운 공연에 대해 들은 사람이라면 누구나 웅장한 무언가를 창조하고 싶어질 것입니다."
 mem_sight_unseen_modifier_5_bad:0 "슬라임 갈구"
 mem_sight_unseen_modifier_5_bad_desc:0 "초현실적인 슬라임 춤을 보았다면, 이 세상의 쾌락 따윈 아무것도 아닙니다."
 mem_sight_unseen_modifier_6_good:0 "영감적인 폭력"
 mem_sight_unseen_modifier_6_good_desc:0 "다른 세계에선 이상한 외계인들이 서로 주도권을 잡기 위해 목을 물어뜯습니다. 이것을 알고서도 충동을 어떻게 억제합니까? 다른 사람의 머리라면 괜찮겠죠."
 mem_sight_unseen_modifier_6_bad:0 "폭력의 트라우마"
 mem_sight_unseen_modifier_6_bad_desc:0 "다른 세계에선 이상한 외계인들이 자신들의 머리를 물어뜯습니다. 이러한 광기가 어디서든지 존재한다면, 정녕 우리가 하는 일이 의미가 있을까요?"
 mem_sight_unseen_modifier_7:0 "위협적인 눈"
 mem_sight_unseen_modifier_7_desc:0 "거대한 눈이 이 세계를 지켜보고 있습니다. 무시하기에는 너무 위협적입니다."
 mem_sight_unseen_modifier_8_good:0 "페허의 영감"
 mem_sight_unseen_modifier_8_good_desc:0 "다른 세계에선 초소형 생물체들이 엄청난 도시를 건설했습니다. 이제 나태함은 용납되지 않을 것입니다."
 mem_sight_unseen_modifier_8_bad:0 "페허에 충격받다"
 mem_sight_unseen_modifier_8_bad_desc:0 "이 우주든, 그 옆에 우주든 모든 것은 끝납니다. 이제 무언가를 짓는 데에 의미는 있을까요?"
 mem_sight_unseen_modifier_9:0 "사랑할 시간은 있다"
 mem_sight_unseen_modifier_9_desc:0 "애인의 꼬리를 물고 산에서 굴러떨어지는 것은 로맨틱해 보이지 않을지도 모르지만, 애정을 표현하는 데에는 많은 방법이 있습니다."
 mem_sight_unseen_modifier_10:0 "공허에 빨려들어가다"
 mem_sight_unseen_modifier_10_desc:0 "어떤 자들은 공허 속에서 빛나는 하나의 빛을 영감으로 받아들입니다. 어떤 자들은 그에 불안해하고, 어떤 자들은 흥미를 느끼지 않습니다."
 mem_sight_unseen_modifier_11_good:0 "피라미드 구조물에 영감"
 mem_sight_unseen_modifier_11_good_desc:0 "다른 세계에서 외계인들은 오직 수작업만으로 인상적인 피라미드를 건설했습니다. 게으름을 피울 이유가 없습니다."
 mem_sight_unseen_modifier_11_bad:0 "피라미드에 겁을 먹다"
 mem_sight_unseen_modifier_11_bad_desc:0 "누군가가 우리의 건축 자재들을 노린다면 어떡하지? 우린 이에 대비해야 한다."
 mem_sight_unseen_modifier_12:0 "끝없는 감옥에 겁을 먹다"
 mem_sight_unseen_modifier_12_desc:0 "다른 세계의 감옥의 모습은 민중의 머릿속에 법에 대한 공포를 각인시켰습니다."
 mem_sight_unseen_modifier_13:0 "초현실적인 폭력"
 mem_sight_unseen_modifier_13_desc:0 "이 세계에서 발생한 폭력은 어디서든지 발생할 수 있습니다. 당신은 준비되어 있어야 합니다. 당신은 두려워해야 합니다. 당신은 이 두가지 모두를 지켜야 합니다."
 mem_sight_unseen_modifier_14:0 "결백증 전염병"
 mem_sight_unseen_modifier_14_desc:0 "초자연적인 병원의 환상에 겁먹은 지역 주민들은 이 세계에서 병원을 방문하는 것을 피하기 위해 무엇이든 할 용의가 있습니다. 어떤 이들에게는 건강한 생활이 그 방법입니다. 다른 이들에게는 주변의 불쾌한 세균으로부터 자신을 차단하는 것이죠."
 mem_sight_unseen_modifier_15:0 "공놀이 시간"
 mem_sight_unseen_modifier_15_desc:0 "다른 세계의 구형 생물체에 자극받은 민중은 모든 짐을 내려놓고 세상을 즐기고자 합니다. 아직 그들처럼 하늘 높게 튀어 오르진 못하지만, 열심히 노력하고 있습니다."
 mem_sight_unseen_modifier_16_good:0 "금욕적 열망"
 mem_sight_unseen_modifier_16_good_desc:0 "다른 세계의 비전이 지역 엘리트들에게 더 검소한 생활 방식을 채택하지 않을 경우 그들이 어떤 모습이 될지를 보여주었습니다. 이는 상당히 무섭습니다."
 mem_sight_unseen_modifier_16_bad:0 "탐욕스러운 열망"
 mem_sight_unseen_modifier_16_bad_desc:0 "다른 세계의 비전이 모두에게 무의미한 소비 이상의 삶이 있다는 것을 보여주었습니다. 무의미하고 과도한 소비가 있습니다."
 mem_sight_unseen_modifier_17:0 "성장 열망"
 mem_sight_unseen_modifier_17_desc:0 "다른 세계에는 가장 큰 나무들이 있습니다. 하지만 우리도 마찬가지로 거대한 것들을 기를 수 있습니다."
 mem_sight_unseen_modifier_19:0 "프랙탈 꿈들"
 mem_sight_unseen_modifier_19_desc:0 "다른 세계에서 밀려오는 환영의 집합체는 공학자들에게 굉장한 영감을 줍니다."
 mem_sight_unseen.1.name:0 "버려진 함선"
 mem_sight_unseen.1.desc:0 "[Leader.GetName]은(는) §Y[From.GetName]§!에 정박해 있는 난파선을 성공적으로 조사했다고 보고했습니다.\n\n 이 함선은 해적의 습격을 받기 전에 미지의 장소로 소규모 승무원을 수송하던 연구선이었던 것으로 보입니다. 해적을 따돌리기 위해 배는 암석에 불시착했지만, 그 과정에서 너무 심하게 손상되어 결국 살아남지 못했습니다. 생명 유지 장치의 고장으로 승무원들은 대부분 즉사했고, 조난 신호기는 미작동하여, 배는 지금까지 발견되지 않았습니다. 그 배에서 가장 눈에 띄는 것은 화물인 이상한 평면 패널 묶음입니다. 이 믿을 수 없을 정도로 매끄러운 표면 아래에는 용도를 알 수 없는 정교한 기계가 작동하고 있습니다. 거의 모든 패널은 수리할 수 없을 정도로 파손되었지만, 한 패널은 비교적 양호한 상태이며 분석할 수 있고, 어쩌면 다시 활성화될 수도 있습니다."
 mem_sight_unseen.1.a:0 "연구를 위해 [Owner.Capital_Scope.GetName]로 가져와라"
 mem_sight_unseen.2.name:0 "보이지 않는 광경"
 mem_sight_unseen.2.desc:0 "우리 과학자들이 추락한 외계선에서 회수한 이상한 패널에 대한 조사를 마쳤습니다. 결론은 꽤 흥미롭습니다. \n\n이 장치는 이제부터 §SViewer§!라고 불리며, 특정 시간-공간 영역에서 서로 다른 대체 현실 사이의 장벽을 뚫는 능력을 가지고 있어, 같은 좌표에서 다른 우주에서의 모습이 어떻게 보이는지를 드러냅니다. 이 장치는 세계 간의 이동이나 어떤 형태의 통신을 허용하지 않으며, 원래는 이세계 생명체와 그들의 이상한 외계 방식을 연구하는 데 사용되었던 것으로 보입니다. \n\n이 장치는 이른바 §Ssoft spots§! - 장벽이 다른 곳보다 약한 작은 지역 - 에서만 작동하며, 짧은 시간 동안만 사용할 수 있으므로 사용이 불편할 수 있습니다. \n\n기술에 대한 우리의 이해가 제한적이기 때문에, 우리가 소프트 스폿으로 간주하는 기준은 원래 설계자들보다 훨씬 좁지만, 우리의 연구원들은 그러한 사건의 시간과 공간 좌표를 찾아낼 수 있을 것이라고 믿고 있으며, 그렇게 되면 뷰어를 해당 위치로 전달하고 활성화할 수 있습니다."
 mem_sight_unseen.2.a:0 "약점에 대한 탐색을 시작하라."
 mem_sight_unseen.2.b:0 "우리는 그저 기술을 연구하면 족하다."
 mem_sight_unseen.2.c:0 "그 장치를 박살내라."
 mem_sight_unseen.2.c.tooltip:0 "우리가 저편의 외계인에게 도달할 수 있다는 증거는 없습니다. 불행히도, 그들에게 해를 끼칠 수도 없습니다. 장치를 파괴한다고 해서 상황이 전혀 달라지지는 않겠지만, 우리는 그들을 다시는 볼 필요에서 벗어날 수 있을 것입니다."
 mem_sight_unseen.3.name:0 "약점 식별"
 mem_sight_unseen.3.desc:0 "우리는 약점을 우리 식민지 §S[soft_spot_planet.GetName]§! 에서 식별했습니다. 관측기 연구자들은 관측기를 그 장소에 전달할 준비가 되었습니다."
 mem_sight_unseen.3.a:0 "한번 해보자."
 mem_sight_unseen.3.b:0 "지금은 아니다."
 mem_sight_unseen.3.b.tooltip:0 "우리는 외계 세계를 관측할 수 있는 기회를 다음으로 넘깁니다. 앞으로 다른 행성에 추가적인 기회가 올지도 모릅니다."
 MEM_SIGHT_UNSEEN_PUBLISH:0 "결과를 발표해라."
 MEM_SIGHT_UNSEEN_NO_PUBLISH:0 "조사 결과를 은폐하라."
 MEM_SIGHT_UNSEEN_HEAD:0 "§S보이지 않는 광경:§!"
 mem_sight_unseen.4.name:0 "$MEM_SIGHT_UNSEEN_HEAD$ 큐브 공장"
 mem_sight_unseen.4.desc:0 "뷰어의 반대편에서 우리는 대규모 산업 단지를 발견했습니다. 컨베이어 벨트가 다른 곳에서 흰색 반투명 큐브를 가져오고 있으며, 그 옆에는 각각 다른 색의 작고 미끄러운 파충류 생물이 앉아 있는 일련의 의자가 있습니다. 큐브가 생물들 앞에 멈추면, 각 생물은 매우 긴 혀를 내밀어 큐브를 열심히 핥으며, 핥은 부분이 생물과 같은 색으로 변합니다. \n\n큐브가 라인의 끝에 도달할 때쯤, 거의 모든 부분이 흰색을 잃습니다. 불행히도 그 이후에는 시야에서 벗어나 큐브에 어떤 일이 일어나는지 알 수 없습니다."
 mem_sight_unseen.5.name:0 "$MEM_SIGHT_UNSEEN_HEAD$ 슬라임 춤"
 mem_sight_unseen.5.desc:0 "뷰어의 반대편에서 우리의 시야는 두꺼운 검은 액체가 화면의 절반을 가리기 때문에 다소 제한적입니다. \n\n키가 큰 이족 보행자 형태의 검은색 인물이 시야에 들어옵니다. 그 인물은 아무것도 입고 있지 않으며, 무표정한 흰색 가면을 쓰고 있고, 어떤 종류의 크랭크 작동 장치를 들고 있습니다. 크랭크를 점점 더 빠르게 돌리기 시작하자 액체가 진동하기 시작하고, 그러더니 끊임없이 변화하는 프랙탈 형태로 솟아오릅니다. 그 인물은 크랭크를 사용해 슬라임을 조종하는 듯하다가 갑자기 멈추고, 보이지 않는 관객에게 인사를 한 뒤 액체로 변해 상자 안으로 쏟아져 들어가고, 가면만 남깁니다."
 mem_sight_unseen.6.name:0 "$MEM_SIGHT_UNSEEN_HEAD$ 머리 싸움"
 mem_sight_unseen.6.desc:0 "뷰어의 반대편에는 넓은 개방 공간이 발견되었고, 그곳에는 멀리 연단이나 무대가 있습니다. 시야에 들어오는 공간은 외계인들로 가득 차 있으며, 각 외계인은 길고 얇은 목에 세 개의 머리가 개별적으로 놓여 있습니다. 연단에 있는 유일한 외계인은 훨씬 더 화려한 옷을 입고 있습니다. 그 외계인이 무엇을 말하는지 알 수는 없지만, 입이 움직이고 팔다리가 휘젓는 정도로 보아 매우 거만한 연설인 것 같습니다. \n\n연설이 끝나자 외계인은 망치를 잡고 뒤에 놓인 거대한 북을 두드리기 시작합니다. 그 신호에 따라 다른 모든 외계인들의 머리가 돌아가고 목에 있는 다른 두 개의 머리를 물어 뜯으려 합니다. 부드러운 부분이 사라질 무렵, 전체 지역은 푸른 피가 뿜어져 나와 흠뻑 젖어 있었습니다."
 mem_sight_unseen.7.name:0 "$MEM_SIGHT_UNSEEN_HEAD$ 디 아이"
 mem_sight_unseen.7.desc:0 "관찰자의 반대편에 보이는 모든 공간은 거대한 눈으로 가득 차 있습니다. 그 눈은 주위를 둘러보며, 홍채가 확장되었다가 축소됩니다. 가끔씩 깜박이며 어두운 색의 비늘 같은 눈꺼풀을 드러냅니다. \n\n이것이 어떤 생명체에 속하는 것일까요? 우리는 결코 알지 못할지도 모릅니다."
 mem_sight_unseen.8.name:0 "$MEM_SIGHT_UNSEEN_HEAD$ 작지만 거대한 페허"
 mem_sight_unseen.8.desc:0 "볼 수 있는 한, 뷰어의 반대편은 오직 폐허가 된 거대 도시일 뿐입니다. 건물들은 높고 하늘로 솟아 있지만, 그 주민들은 작아 보입니다. [Owner.Species.GetAdj] [Owner.GetSpeciesSpawnNamePlural]가 걷기에도 너무 좁은 미세한 공중 보행로와 장난감 크기의 추락한 호버카들이 있습니다. 각 건물은 수천 개의 층을 가지고 있으며, 각 층은 불과 몇 센티미터 높이입니다. \n\n여기서는 생명의 흔적이 보이지 않습니다. 도시는 무너지고 있습니다."
 mem_sight_unseen.9.name:0 "$MEM_SIGHT_UNSEEN_HEAD$ 내리막길"
 mem_sight_unseen.9.desc:0 "관측기는 높은 산 정상에 설치되었습니다. 관측기 너머의 광경도 비슷한 산이지만, 살짝 더 경사가 완만하고 긴 수풀과 아름다운 꽃으로 가득합니다. 산 정상에는 마디로 된 몸을 가진 두 그룹의 외계인들이 서 있습니다.\n\n가끔 두 그룹으로부터 한 사람씩 앞으로 나섭니다. 이 둘은 서로의 꼬리를 물고 거의 완벽한 바퀴를 형성한 채 다른 이들이 뛰면서 기뻐할 때 경사를 따라 굴러 내려갑니다. 이들이 목적지에 도달할 때 어떠한 일이 벌어질지는 모르지만, 그들의 열정을 보아하니 적어도 피와 내장을 동반할 것 같지는 않습니다. 설마 구애 활동일까요?"
 mem_sight_unseen.10.name:0 "$MEM_SIGHT_UNSEEN_HEAD$ 멀리 떨어진 빛"
 mem_sight_unseen.10.desc:0 "처음에는 저쪽에 아무것도 없는 것처럼 보였습니다. 우리는 심지어 뭔가 고장났다고 의심하기도 했습니다. 그러나 잠시 후, 먼 곳에 외로운 빛이 나타났습니다. 그 빛은 예측할 수 없이 움직이며, 가끔 꺼지기도 하지만 항상 이전보다 더 밝게 돌아옵니다. 시야에 보이는 나머지 지역은 텅 비어 있는 것 같습니다."
 mem_sight_unseen.11.name:0 "$MEM_SIGHT_UNSEEN_HEAD$ 피라미드 짓기"
 mem_sight_unseen.11.desc:0 "뷰어를 통해 우리는 모두 동일한 빨간 제복을 입은 거대하고 믿기 힘들 정도로 근육질인 외계인 집단을 관찰할 수 있었습니다. 이 외계인들은 큰 돌 블록으로 피라미드를 건설하고 있었으며, 그들은 놀라운 솜씨로 이를 다루고 있었습니다. \n\n피라미드가 거의 완성되었을 때, 파란색 제복을 입은 또 다른 외계인 집단이 나타났습니다. 짧은 충돌 후, 빨간 제복을 입은 외계인들은 도망쳤고, 파란 제복을 입은 외계인들은 피라미드를 해체하기 시작하며 돌 블록을 우리의 시야에서 멀어지게 옮겼습니다. \n\n거의 아무것도 남지 않았을 때, 이번에는 노란색 제복을 입은 또 다른 외계인 집단이 나타났습니다. 불행히도, 이 순간 부드러운 지점이 사라져버려 우리는 다음에 무슨 일이 일어났는지 영원히 궁금해하게 되었습니다."
 mem_sight_unseen.12.name:0 "$MEM_SIGHT_UNSEEN_HEAD$ 끝없는 감옥"
 mem_sight_unseen.12.desc:0 "우리가 볼 수 있는 한 관측기의 반대편은 희미하게 붉은빛으로 빛나는 끝없는 빈 공간입니다.\n\n벽도, 천장도 바닥도 없고, 끝없이 늘어선 우리만 허공에 매달려 있을 뿐입니다. 각각의 우리 안에는 로브를 입은 실루엣이 앉아 있습니다. 어떤 특징도 알아볼 수 없습니다. 왜 그들은 이 우리에 갇혔을까요? 우리는 결코 알 수 없을 것입니다."
 mem_sight_unseen.13.name:0 "$MEM_SIGHT_UNSEEN_HEAD$ 살육의 장면"
 mem_sight_unseen.13.desc:0 "관측기의 다른 쪽 끝은 어떤 종류의 주거 지역인 것 같습니다. 여러 외계인의 시체가 바닥에 누워 있으며, 이들은 레이저 무기로 보이는 것에 의해 불타고 절단된 상태입니다. 유일하게 움직이는 외계인은 그 무기를 쥐고 있는 하나뿐입니다. \n\n그 외계인은 단순히 바닥에 앉아 있으며, 가끔 위치를 바꿀 뿐입니다. 부드러운 지점이 지속되는 동안, 다른 누구도 그 지역에 들어오지 않습니다."
 mem_sight_unseen.14.name:0 "$MEM_SIGHT_UNSEEN_HEAD$ 취침시간"
 mem_sight_unseen.14.desc:0 "관측기의 반대편은 겉보기에 병상으로 채워진 크고 밝게 빛나는 홀인 것 같습니다. 다양한 의료 장비가 연결된 채 의식을 잃은 듯한 외계인들이 침대 각각에 누워 있는데, 가장 중요하게 보이는 것은 그들의 머리에 직접 삽입된 탐침입니다.\n\n한 외계인은 깨어있습니다. 그는 모니터의 판독 값을 확인하면서 침대 사이를 걷습니다. 그러다 때때로 코트 아래에서 긴 칼을 뺀 후 환자의 가슴에 찔러넣어 사망에 이르게 합니다."
 mem_sight_unseen.15.name:0 "$MEM_SIGHT_UNSEEN_HEAD$ 뭉치 세계"
 mem_sight_unseen.15.desc:0 "관찰자의 다른 쪽 끝에서는 문명의 흔적이 전혀 보이지 않습니다. \n\n그러나 대체 현실에는 어떤 종류의 구형 생물들이 풍부하게 존재하는 것 같습니다. 몇 센티미터에서 수백 미터에 이르는 다양한 색상의 털복숭이 공들이 날아다니고 튕겨 다니며, 세상에 대한 걱정이 없는 듯 보입니다."
 mem_sight_unseen.16.name:0 "$MEM_SIGHT_UNSEEN_HEAD$ 관료주의 행태"
 mem_sight_unseen.16.desc:0 "관측기의 반대편은 작고 희미하게 빛나는 방입니다. 방 대부분은 거품이 끓고 구역질 나는 점액이 채워진 커다란 웅덩이가 차지하고 있습니다. 이 점액 속에 잠긴 것은 고도비만인 민달팽이처럼 생긴 거대한 생물입니다.\n\n두 개의 공기압 튜브가 생물체의 짧고 뭉툭한 팔에 닿을 수 있는 범위 내에 자리 잡고 있습니다. 때때로 서류 한 장이 튜브 중 하나를 통해 도착합니다. 그것을 읽은 후에, 그 생물은 때때로 다른 튜브에 넣어 보내지만, 대부분은 그냥 삼켜버립니다."
 mem_sight_unseen.17.name:0 "$MEM_SIGHT_UNSEEN_HEAD$ 나무"
 mem_sight_unseen.17.desc:0 "관찰자의 반대편에는 나무가 있습니다. 그 나무는 특별한 점이 없어 보이지만, 너무 두꺼워서 다른 것을 볼 수 없고, 너무 커서 그 수관이 구름에 닿습니다. \n\n그저 아무런 이유 없이 그렇게 큽니다."
 mem_sight_unseen.18.name:0 "$MEM_SIGHT_UNSEEN_HEAD$ 투명한 숲"
 mem_sight_unseen.18.desc:0 "뷰어의 다른 쪽 끝에는 끝없이 펼쳐진 광야 공생군이 보입니다. 나무, 풀, 덤불이 있지만, 모두 투명해 보이며, 주의 깊게 보지 않으면 거의 보이지 않습니다."
 mem_sight_unseen.18.a:0 "이상하지만, 흥미로운 일은 아니다."
 mem_sight_unseen.19.name:0 "$MEM_SIGHT_UNSEEN_HEAD$ 도형들"
 mem_sight_unseen.19.desc:0 "뷰어의 다른 쪽 끝에서는 여러 개의 작은 다면체로 덮인 빈 공간이 드러났습니다. 가끔씩, 그 다면체들이 서로 쌓여서 구형에 가까운 큰 물체를 형성하고 시야에서 사라졌습니다. 곧 다른 방향에서 또 다른 구체가 도착하여 다면체 더미로 분해되며 과정을 다시 시작했습니다."
 mem_sight_unseen.100.name:0 "$MEM_SIGHT_UNSEEN_HEAD$ 관측기 파괴"
 mem_sight_unseen.100.desc:0 "관측기를 §Y[Root.GetName]§!로 운송하던 도중 불행한 사건이 있었습니다. 엔진 고장으로 인해 운송 함선이 추락했습니다. 사망자는 없었지만, 장치는 수리할 수 없게 망가졌습니다."
 mem_sight_unseen.101.name:0 "$MEM_SIGHT_UNSEEN_HEAD$ 프로젝트 실패"
 mem_sight_unseen.101.desc:0 "관측기의 설치 지점의 문제로 인해 연구원들은 상당히 고전하고 있습니다.\n\n결국 위험지대에서 작업하다가 장치가 손상되는 상황을 우려를 해 프로젝트를 취소할 수밖에 없었습니다."
 mem_sight_unseen.102.name:0 "$MEM_SIGHT_UNSEEN_HEAD$ 관측기 고장"
 mem_sight_unseen.102.desc:0 "관측기의 부품 중 일부는 시간에 마모되어 작동을 멈췄습니다. 이 부품들은 우리의 기술력으로는 복원할 수 없으며, 이제 관측기는 사용 불가 상태가 되었습니다."
