 asteroid_manufactory_platform_supertensiles_DESC:0 "$asteroid_manufactory_0_DESC$"
 giga_asteroid_industry_candidate_supertensiles:0 "$asteroid_manufactory_candidate$: §Y$giga_sr_amb_megaconstruction$§!"
 giga_asteroid_industry_candidate_supertensiles_desc:0 "§T여기에는 ['concept_giga_asteroid_industry_supertensiles']이(가) 건설될 수 있습니다§!\n\n이 소행성 내에는 $giga_sr_amb_megaconstruction$의 자연 자원이 존재하며, 더 강력한 채굴 작업을 통해 추출할 수 있습니다."
 asteroid_manufactory_2:0 "소행성 자동 공장"
 asteroid_manufactory_2_DESC:0 "소행성으로부터 원자재를 추출하여 온갖 유용한 제품으로 가공하는 완전한 소행성 제조소입니다."
 giga_tech_asteroid_manufactory:0 "소행성 제조 공장"
 giga_tech_asteroid_manufactory_desc:0 "대부분의 행성계의 형성때 생긴 찌꺼기인 소행성은 쉽게 접근 가능한 원자재로 가득합니다. 주위로 건설된 거대한 구조물은 특수한 채집기가 장착되어 이를 이용해 자원들을 지속적으로 수집하고 우리 국민이 사용 가능한 굉장히 다양한 제품들로 가공할 수 있습니다. 이로써 끊임없이 성장하는 인구의 압박으로 인한 우리 행성측의 소비재 공장의 스트레스를 경감할 수 있게 되었습니다."
 giga_asteroid_industry.001.name:0 "소행성 산업 건설 현장 완료!"
 giga_asteroid_industry.001.desc:0 "이제 [FromFrom.solar_system.GetName] 시스템에 미래 산업 단지를 위한 건설 현장이 완료되었습니다. 소행성 근처에 떠 있는 이 대형 플랫폼은 대규모 채굴 단지를 건설하는 데 필요한 장비를 갖추고 있으며, 이는 다양한 제품을 생산하는 데 특화될 수 있습니다.\n\n남은 질문은: 어떤 종류의 시설을 건설해야 할까요?"
 giga_asteroid_industry.001.alloys:0 "광물 생산에 중점을 둔 채굴 시설입니다 £alloys£ §Y$alloys$§!."
 giga_asteroid_industry.001.alloys.effect:0 "이 장소는 ['concept_giga_asteroid_industry_alloys']을(를) 생산하도록 설정됩니다."
 giga_asteroid_industry.001.consumer_goods:0 "소비재를 생산하기 위해 설계된 공장입니다 £consumer_goods£ §Y$consumer_goods$§!."
 giga_asteroid_industry.001.consumer_goods.effect:0 "이 사이트는 ['concept_giga_asteroid_industry_consumer_goods']을(를) 생산하도록 설정됩니다."
 giga_asteroid_industry.001.energy:0 "전력 발전소를 위한 연료 저장소로, £energy£ §Y$energy$§!을(를) 생산합니다."
 giga_asteroid_industry.001.energy.effect:0 "이 장소는 ['concept_giga_asteroid_industry_energy']을(를) 건설하도록 설정됩니다."
 giga_asteroid_industry.001.food:0 "농장을 관개하고 £food£ §Y$food$§!을(를) 생산하는 얼음 가공기입니다."
 giga_asteroid_industry.001.food.effect:0 "이 사이트는 ['concept_giga_asteroid_industry_food']을(를) 건설하도록 설정됩니다."
 giga_asteroid_industry.001.supertensiles:0 "£giga_sr_amb_megaconstruction£ §Y$giga_sr_amb_megaconstruction$§!에 필요한 자재를 추출하는 기계입니다."
 giga_asteroid_industry.001.supertensiles.effect:0 "이 장소는 ['concept_giga_asteroid_industry_supertensiles']을(를) 건설하도록 설정됩니다."
 giga_asteroid_industry.003.name:0 "[FromFrom.GetName] 완료"
 giga_asteroid_industry.003.generic:0 "건설이 [FromFrom.planet.GetName] [FromFrom.GetName]에서 완료되었습니다. [FromFrom.solar_system.GetName] 시스템의 \n\n"
 giga_asteroid_industry.003.alloys:0 "$giga_asteroid_industry.003.generic$광석 바지선이 이미 줄을 서서 귀중한 광석을 우리의 행성 제련 시설로 운반할 준비를 하고 있습니다.\n\n지역 제련소는 추가 운송 유지비용을 감수하는 대신 폐기물을 줄일 수 있는 2차 가공의 혜택을 누릴 것입니다."
 giga_asteroid_industry.003.consumer_goods:0 "$giga_asteroid_industry.003.generic$이 거대한 공장은 다양한 소비재 제품을 위한 일반 부품을 생산하며, 마무리 및 최종 조립은 행성의 창고에서 이루어집니다.\n\n지역 창고는 보다 집중적인 수입의 혜택을 받을 수 있지만, 물류 비용이 증가합니다."
 giga_asteroid_industry.003.energy:0 "$giga_asteroid_industry.003.generic$얼음에서 유용한 연료를 대량으로 추출하여, 이 시설은 행성 내 발전소에서 사용할 연료를 저장합니다.\n\n지역 발전소는 향상된 에너지 그리드 효율성의 혜택을 받을 것입니다."
 giga_asteroid_industry.003.food:0 "$giga_asteroid_industry.003.generic$추출된 얼음은 수생 생태계를 포함한 농장을 유지하는 데 사용될 수 있으며, 가장 건조한 행성에서도 가능합니다.\n\n지역 농장은 향상된 생산량과 폐기물 재활용 인프라의 혜택을 받을 것입니다."
 giga_asteroid_industry.003.supertensiles:0 "$giga_asteroid_industry.003.generic$여기에서 추출된 자재는 이후 행성의 분자 주조 시설에서 추가로 정제되고 정화되어 대형 공학 프로젝트에 활용될 것입니다.\n\n지역 시설은 감소된 관료적 유지비의 혜택을 받지만, 물류 비용은 증가하게 됩니다."
 desc_asteroid_manufactory:0 "소행성을 중심으로 건설된 다목적 제조 시설입니다. 사용된 소행성의 종류와 자원에 따라 일자리를 제공하는 공장 건물 선택이 가능합니다."
