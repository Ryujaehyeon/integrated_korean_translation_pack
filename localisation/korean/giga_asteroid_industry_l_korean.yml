 concept_giga_asteroid_industry_supertensiles_desc:0 "$asteroid_manufactory_subtitle$§E요구 사항:§!\n- §Y메가구조물 건설 한도§! 옵션은 £job£§B직업 기반§!\n\n§E효과:§!\n$asteroid_manufactory_supertensiles_effect$"
