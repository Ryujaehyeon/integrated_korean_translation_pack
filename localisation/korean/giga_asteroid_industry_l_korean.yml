 asteroid_manufactory_0:0 "$gc_kilo$$name_asteroid_manufactory$"
 asteroid_manufactory_0_DESC:0 "미래의 소행성 제조소의 건설 현장으로, 인근 소행성 주위에 대규모 광업 시설과 공장을 건설하기 위해 필요한 장비와 시설을 갖추고 있습니다."
 asteroid_manufactory_0_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_kilostructure$ - $giga_list_category_basic_resource_production$ - $giga_list_category_advanced_resource_production$\n소행성의 §Y유형§!과 §Y매장량§!에 따라 §Y공장 건물§! 선택을 제공합니다.\n일치하는 공장 건물은 같은 §YSolar System§!의 행성에 건설될 경우 §Y보너스§!를 제공합니다.\n§L소행성을 중심으로 구축된 대규모 시설로, 행성에서 사용할 자원을 수확합니다.§!"
 asteroid_manufactory_0_CONSTRUCTION_INFO_DELAYED:0 "$asteroid_manufactory_cost$\n\n소행성에 §Y$asteroid_manufactory_candidate$§! 수정자가 있어야 건설할 수 있습니다.\n\n$MEGASTRUCTURE_UPGRADES_TO$\n\n$asteroid_manufactory_alloys_upgrade$\n$asteroid_manufactory_energy_upgrade$\n\n£consumer_goods£ $consumer_goods$를 사용하는 제국에 이용 가능:\n$asteroid_manufactory_consumer_goods_upgrade$\n\n£food£ $food$를 사용하는 제국에 이용 가능:\n$asteroid_manufactory_food_upgrade$\n\n§Y거대 구조물 건설 한도§!가 £job£§B직업 기반§!으로 설정된 경우 이용 가능:\n$asteroid_manufactory_supertensiles_upgrade$"
