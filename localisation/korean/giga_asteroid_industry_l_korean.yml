 giga_asteroid_industry_candidate_energy:0 "$asteroid_manufactory_candidate$: §Y$energy$§!"
 giga_asteroid_industry_candidate_energy_desc:0 "§T여기에는 ['concept_giga_asteroid_industry_energy']을(를) 건설할 수 있습니다§!\n\n이 소행성 내부의 물은 고농도의 중수소와 삼중수소를 포함하고 있어 대량 융합 발전소에 적합합니다."
 asteroid_manufactory_food:0 "얼음 채취 기지"
 asteroid_manufactory_food_DESC:0 "대규모 농업에 적합한 가공된 얼음을 분리하고 저장하는 시설로, 특히 건조한 세계에서 사용됩니다."
