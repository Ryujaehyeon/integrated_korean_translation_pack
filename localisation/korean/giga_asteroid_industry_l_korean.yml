 asteroid_manufactory_supertensiles:0 "거대 건설 자재 공장"
 asteroid_manufactory_supertensiles_DESC:0 "고급 재료 가공 시설로, 자연적으로 발생하는 $giga_sr_amb_megaconstruction$ 및 여러 관련 광물을 추출하여 행성의 클린룸 시설에서 추가 가공을 위해 준비합니다."
 asteroid_manufactory_supertensiles_trigger:0 "$giga_asteroid_industry_candidate_supertensiles$ 모디파이어가 필요합니다."
 asteroid_manufactory_supertensiles_placement:0 "- $asteroid_manufactory_rocky$ 또는 $asteroid_manufactory_icy$ 소행성 위에 £giga_sr_amb_megaconstruction£ §Y$giga_sr_amb_megaconstruction$§! 자원이 있는 경우에만 건설할 수 있습니다."
