 job_giga_media_coordinator_plural:0 "미디어의 거물"
 job_giga_media_coordinator_desc:0 "가상 엔터테인먼트 제국 뒤의 창의적 생각, 미디어 거물은 우리의 대중이 절대 부족하지 않도록 합니다. 조명. 카메라. 액션!"
