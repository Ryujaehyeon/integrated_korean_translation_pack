 giga_mbrain_uplink_research:0 "우주 시뮬라크룸"
 building_giga_matrioshka_brain_uplink_research:0 "$giga_mbrain_uplink$: $giga_mbrain_uplink_research$"
 building_giga_matrioshka_brain_uplink_research_desc:0 "무한한 우주의 역사가 정교하게 시뮬레이션된 세부 사항 속에 펼쳐져 있습니다. 너무 자세히 들여다보지는 마십시오. 어쩌면 당신 자신을 보게 될지도 모릅니다."
 giga_mbrain_uplink_research_concept:0 "\n£job_researcher£ ['building:building_giga_matrioshka_brain_uplink_research', $giga_mbrain_uplink_research$]"
 giga_mbrain_uplink_unity:0 "할당 하이퍼바이저"
 building_giga_matrioshka_brain_uplink_unity:0 "$giga_mbrain_uplink$: $giga_mbrain_uplink_unity$"
 building_giga_matrioshka_brain_uplink_unity_desc:0 "어마어마한 연산 능력이 조직화, 목록화, 규율화, 신호 보정에 투입됩니다. 성간 제국 관리는 그 어느 때보다 효율적입니다."
 giga_mbrain_uplink_unity_concept:0 "\n£job_bureaucrat£ ['building:building_giga_matrioshka_brain_uplink_unity', $giga_mbrain_uplink_unity$]"
 giga_mbrain_uplink_unity_concept_hive:0 "\n£job_synapse_drone£ ['building:building_giga_matrioshka_brain_uplink_unity', $giga_mbrain_uplink_unity$]"
