 job_giga_gamer_fe_npc_desc:0 "모든 주인공들의 뒤에는 친구든 적이든, 혹은 그저 행인이든 조연들이 있습니다. 이러한 조연들 중 일부는 현실 시뮬레이터의 거주자가 맡지만 대부분은 정교한 시뮬레이션입니다."
