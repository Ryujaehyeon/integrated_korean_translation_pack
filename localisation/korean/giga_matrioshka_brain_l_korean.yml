 giga_mbrain_uplink_sanctuary:0 "유기체 유토피아"
 building_giga_matrioshka_brain_uplink_sanctuary:0 "$giga_mbrain_uplink$: $giga_mbrain_uplink_sanctuary$"
 building_giga_matrioshka_brain_uplink_sanctuary_desc:0 "거주자들이 가장 터무니없는 환상을 살아낼 수 있는 가상 꿈의 세계입니다. 누구도 심판받지 않고, 어떤 요청도 거절되지 않습니다."
 giga_mbrain_uplink_sanctuary_concept:0 "\n£job_bio_trophy£ ['building:building_giga_matrioshka_brain_uplink_sanctuary', $giga_mbrain_uplink_sanctuary$]"
 giga_mbrain_uplink_entertainment:0 "미디어 기가플렉스"
 building_giga_matrioshka_brain_uplink_entertainment:0 "$giga_mbrain_uplink$: $giga_mbrain_uplink_entertainment$"
 building_giga_matrioshka_brain_uplink_entertainment_desc:0 "감각을 현혹하는 끝없는 즐길 거리들이 솔직히 무서울 정도로 개인 맞춤화되어 제공됩니다."
 giga_mbrain_uplink_entertainment_concept:0 "\n£job_entertainer£ ['building:building_giga_matrioshka_brain_uplink_entertainment', $giga_mbrain_uplink_entertainment$]"
 giga_mbrain_uplink_training:0 "훈련 시뮬레이터"
 building_giga_matrioshka_brain_uplink_training:0 "$giga_mbrain_uplink$: $giga_mbrain_uplink_training$"
 building_giga_matrioshka_brain_uplink_training_desc:0 "이 특별히 설계된 가상 공간에서는 시간의 제약 없이 우리의 가장 뛰어난 인재들에게 마땅한 지도를 제공할 수 있습니다."
 building_giga_matrioshka_brain_uplink_training_effect:0 "§G+$@matrioshka_brain_uplink_training_bonus|0$§! £mod_country_naval_cap_add£ $MOD_COUNTRY_NAVAL_CAP_ADD$를 $pop_group_unit$ £job_soldier£ §Y[owner.GetSoldier]§! 직업마다 제공합니다\n "
 giga_mbrain_uplink_training_concept:0 "\n£job_giga_virtual_training_coordinator£ ['building:building_giga_matrioshka_brain_uplink_training', $giga_mbrain_uplink_training$]"
 giga_mbrain_uplink_diplomacy:0 "가상 영사관"
 building_giga_matrioshka_brain_uplink_diplomacy:0 "$giga_mbrain_uplink$: $giga_mbrain_uplink_diplomacy$"
 building_giga_matrioshka_brain_uplink_diplomacy_desc:0 "지정된 외교관들이 엄격하게 통제된 조건에서 다른 제국의 외교관들과 만날 수 있는 호화로운 외교 스위트와 회의 공간입니다."
 giga_mbrain_uplink_diplomacy_concept:0 "\n£job_giga_virtual_diplomat£ ['building:building_giga_matrioshka_brain_uplink_diplomacy', $giga_mbrain_uplink_diplomacy$]"
 giga_mbrain_uplink_hell:0 "징벌 엔진"
 building_giga_matrioshka_brain_uplink_hell:0 "$giga_mbrain_uplink$: $giga_mbrain_uplink_hell$"
 building_giga_matrioshka_brain_uplink_hell_desc:0 "범죄 판결, 사회적 일탈, 또는 그저 불운한 출생 환경 때문에 이곳의 수감자들은 주관적 영겁의 고통을 선고받습니다."
 giga_mbrain_uplink_hell_concept:0 "\n£job_giga_virtual_hell_inmate£ ['building:building_giga_matrioshka_brain_uplink_hell', $giga_mbrain_uplink_hell$]"
 giga_mbrain_uplink_livestock:0 "꿈꾸는 들판"
 building_giga_matrioshka_brain_uplink_livestock:0 "$giga_mbrain_uplink$: $giga_mbrain_uplink_livestock$"
 building_giga_matrioshka_brain_uplink_livestock_desc:0 "가축들이 특별히 조정된 가상 세계에서 무지한 삶을 살게 하면, 그들은 통제되고 순응적이며... 부드럽게 유지됩니다."
 building_giga_matrioshka_brain_uplink_livestock_effect:0 "유지비 감소량은 [livestock.GetIcon] §Y[livestock.GetName]§! 직업에 따라 증가합니다"
 giga_mbrain_uplink_livestock_concept:0 "\n£job_livestock£ ['building:building_giga_matrioshka_brain_uplink_livestock', $giga_mbrain_uplink_livestock$]"
 giga_mbrain_uplink_amalgamation:0 "꿈 격자"
 building_giga_matrioshka_brain_uplink_amalgamation:0 "$giga_mbrain_uplink$: $giga_mbrain_uplink_amalgamation$"
 building_giga_matrioshka_brain_uplink_amalgamation_desc:0 "들판이 있습니다. 끝없는 들판, 그곳에서 유기체들은 더 이상 태어나지 않습니다... 길러집니다."
 building_giga_matrioshka_brain_uplink_amalgamation_effect:0 "유지비 감소량은 [organic_battery.GetIcon] §Y[organic_battery.GetName]§! 직업에 따라 증가합니다"
 giga_mbrain_uplink_amalgamation_concept:0 "\n£job_organic_battery£ ['building:building_giga_matrioshka_brain_uplink_amalgamation', $giga_mbrain_uplink_amalgamation$]"
 giga_mbrain_uplink_foundry:0 "야금 정련"
 building_giga_matrioshka_brain_uplink_foundry:0 "$giga_mbrain_uplink$: $giga_mbrain_uplink_foundry$"
 building_giga_matrioshka_brain_uplink_foundry_desc:0 "반복적 산업 설계 실험이 숨 가쁜 속도로 실행됩니다."
 giga_mbrain_uplink_foundry_concept:0 "\n£job_foundry£ ['building:building_giga_matrioshka_brain_uplink_foundry', $giga_mbrain_uplink_foundry$]"
 giga_mbrain_uplink_factory:0 "생산 라인 최적화"
 building_giga_matrioshka_brain_uplink_factory:0 "$giga_mbrain_uplink$: $giga_mbrain_uplink_factory$"
 building_giga_matrioshka_brain_uplink_factory_desc:0 "갈수록 정교해지는 설계 및 시장 예측 알고리즘 덕분에 수요가 생기기 전에 공급을 제공할 수 있습니다."
 giga_mbrain_uplink_factory_concept:0 "\n£job_artisan£ ['building:building_giga_matrioshka_brain_uplink_factory', $giga_mbrain_uplink_factory$]"
 giga_mbrain_uplink_refinery:0 "화학 정화 매트릭스"
 building_giga_matrioshka_brain_uplink_refinery:0 "$giga_mbrain_uplink$: $giga_mbrain_uplink_refinery$"
 building_giga_matrioshka_brain_uplink_refinery_desc:0 "저지연 중계, 정밀 계측, 방대한 처리 능력의 조합은 분자 수준의 제품 평가를 가능하게 합니다."
 building_giga_matrioshka_brain_uplink_refinery_effect:0 "[foundry.GetIcon][GetArtisanIcon] §Y산업 직업§!은 £building£ §Y정제소 건물§!이 있을 때 강화됩니다"
 giga_mbrain_uplink_refinery_concept:0 "\n£job_gas_refiner£ ['building:building_giga_matrioshka_brain_uplink_refinery', $giga_mbrain_uplink_refinery$]"
 giga_mbrain_uplink_anti_deviancy:0 "행동 조절기"
 building_giga_matrioshka_brain_uplink_anti_deviancy:0 "$giga_mbrain_uplink$: $giga_mbrain_uplink_anti_deviancy$"
 building_giga_matrioshka_brain_uplink_anti_deviancy_desc:0 "계산 비용은 높지만, 일탈 드론 군집의 형성을 예측하도록 조정된 알고리즘을 통해 그 영향이 커지기 전에 개입할 수 있습니다."
 building_giga_matrioshka_brain_uplink_anti_deviancy_effect:0 "기본 £crime£ §Y$PLANET_CRIME_NO_HAPPINESS_TITLE$§!을 $pop_group_unit$ 드론마다 §G$@matrioshka_brain_uplink_anti_deviancy_reduction|0%$§! 곱연산으로 감소시킵니다\n "
 giga_mbrain_uplink_anti_deviancy_concept:0 "\n£job_patrol_drone£ ['building:building_giga_matrioshka_brain_uplink_anti_deviancy', $giga_mbrain_uplink_anti_deviancy$]"
 giga_mbrain_uplink_robot:0 "작업 유닛 조정기"
 building_giga_matrioshka_brain_uplink_robot:0 "$giga_mbrain_uplink$: $giga_mbrain_uplink_robot$"
 building_giga_matrioshka_brain_uplink_robot_desc:0 "고급 관리 프로세스와 국지적 세부 관리를 통해 로봇 작업 유닛의 효율을 향상시킬 수 있습니다. 개별 유닛의 자율성은 감소하지만, 이는 받아들일 만한 손실로 간주할 수 있습니다."
 building_giga_matrioshka_brain_uplink_robot_effect_servitude:0 "§Y$policy_artificial_intelligence_policy$§! 정책이 §Y$ai_servitude_name$§!로 설정되어 있으면 효과가 증가합니다"
