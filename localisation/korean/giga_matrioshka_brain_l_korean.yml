 job_giga_virtual_diplomat_desc:0 "더 빠르게 일하고 더 많이 봄으로써, 우리의 외교관들은 우리 마트료시카 브레인의 엄청난 힘을 이용해 다른 국가로부터 전략적 승리를 얻어낼 수 있습니다."
