 job_giga_virtual_hell_inmate:0 "가상 죄인"
 job_giga_virtual_hell_inmate_plural:0 "가상 죄인"
 job_giga_virtual_hell_inmate_desc:0 "최하 중에서도 최하층의 존재들은 상상할 수 있는 최악의 환경에서 고통받는 벌을 받게됩니다. 이 덕분에 예비 범죄자들의 수를 줄일 수 있습니다."
 job_giga_virtual_hell_inmate_effect_desc:0 "[giga_virtual_hell_inmate.GetIcon] [giga_virtual_hell_inmate.GetNamePlural]는 £energy£ §Y$energy$§!를 지역 £crime£ §Y$PLANET_CRIME_TITLE$§!으로 전환하고, 제국 전체의 £crime£ §Y$PLANET_CRIME_TITLE$§! 감소, £mod_pop_government_ethic_attraction£ §Y$MOD_POP_GOVERNMENT_ETHIC_ATTRACTION$§!, 그리고 £political_power£ §Y$mod_pop_cat_ruler_political_power$§!를 생성합니다."
