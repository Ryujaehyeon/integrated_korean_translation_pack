 building_giga_matrioshka_brain_uplink_virtual_desc:0 "이 정도 규모의 네트워크에서 작업 관리와 신호 라우팅은 복잡한 문제지만, 충분한 연산 자원을 쏟아붓자 유망한 결과가 나왔습니다. 때로는 양이 그 자체로 질이 될 수 있습니다."
 building_giga_matrioshka_brain_uplink_virtual_effect:0 "유지비는 ['concept_giga_virtual_colony_size']에 따라 증가합니다"
 giga_mbrain_uplink_virtual_concept:0 "\n£job_mind_thrall£ ['building:building_giga_matrioshka_brain_uplink_virtual', $giga_mbrain_uplink_virtual$]"
