l_korean:
 mem_ashes_category:0 "마른 땅"
 mem_ashes_category_desc:0 "[Root.GetName]같이 황량한 지표에는 생명체의 존재가 보통 발견되지 않지만, 항상 그런 것은 아닌 것처럼 보입니다..."
 mem_ashes.999.name:0 "틀림없는 불모 행성"
 mem_ashes.999.desc:0 "[Root.GetName]은(는) [FromFrom.GetName]을(를) 계속 탐사했지만, 과거에도 현재에도 아무런 생명체의 징조가 보이지 않는다고 보고했습니다.\n\n반대를 나타내는 지표들은 모두 오류였던 것 같습니다."
 mem_ashes.1.name:0 "지표 저 아래에"
 mem_ashes.1.desc:0 "[From.GetName]의 표면은 우주 방사선에 의해 파괴되었고 모든 생명체가 완전히 사라졌지만, 그 아래에는 다른 이야기가 숨겨져 있습니다. \n\n이 행성은 한때 고급의 우주 비행 이전 문명의 고향이었던 것으로 보이며, 우리의 탐사자들은 저장, 운송 및 피난처로 사용되었을 것으로 추정되는 여러 지하 구조물을 발견했습니다. 이 중 가장 중요한 것은 거대한 벙커와 연결된 지하 고속 교통 시스템의 잔존 부분으로, 아마도 방사능 피난처일 것입니다. 내부에서는 급하게 설치된 원시적인 동결 포드가 대량으로 발견되었으며, 여전히 작동 중이고 외계인이 정지된 애니메이션 상태로 들어 있습니다. \n\n이 복합체는 현장에서 재가동하기에는 너무 손상되었지만, 우리는 포드를 추출하여 더 편리한 검사를 위해 행성을 떠나 재가동할 수 있습니다."
 mem_ashes.1.a:0 "가져와라. 저 놈들을 구해줄 수도 있겠지."
 mem_ashes.1.b:0 "그냥 거기다 둬. 이런 일에 낭비 할 시간도 없고."
 mem_ashes.1.c:0 "저 바보같은 외계종은 걍 처리해."
 mem_ashes_underground:0 "지하 유적"
 mem_ashes_underground_desc:0 "행성의 표면은 생명체가 사라졌지만, 한때 이곳에 살았던 문명의 유적이 지하에서 발견되었습니다."
 mem_ashes_snack:0 "냉동 간식"
 country_resource_food_add:0 "월 식량"
 mem_ashes_chain_title:0 "재로부터"
 mem_ashes_chain_desc:0 "[their_planet.GetName]에서 찾아낸 동면 포드에는 행성이 파괴되기 전의 마지막 생존자가 잠들어 있습니다."
 MEM_ASHES_EXTRACT:0 "동면 포드 수송"
 MEM_ASHES_EXTRACT_DESC:0 "수면 포드는 분명히 매우 원시적인 기술로 급하게 제작된 것이었습니다. 세월의 흔적이 그들을 더욱 신뢰할 수 없게 만들었습니다. 이들을 행성 밖으로 이동시키려면 섬세함과 정밀함이 필요합니다."
 mem_ashes.2.name:0 "동면 포드 수송 완료"
 mem_ashes.2.desc:0 "[their_planet.GetName]에서 발견한 동면 포드를 우리 모성에 있는 안전 시설로 잘 옮겼습니다. 다시 재활성화하는 것은 아마 꽤나 힘들겠지만, 우리 기술로는 아무런 문제없이 가능할 겁니다."
 mem_ashes.2.a:0 "고민을 좀 해봐야겠군..."
 MEM_ASHES_REVIVE:0 "잠든 자를 깨우기"
 MEM_ASHES_REVIVE_DESC:0 "이제 [their_planet.GetName]에서 발견한 외계인을 부활시킬 수 있습니다. 포드는 그리 안정적이지 않지만, 가능한 위험을 피할 수 있는 기술이 있습니다."
 MEM_ASHES_AUTOPSY:0 "동면자 부검"
 MEM_ASHES_AUTOPSY_DESC:0 "외계인을 [their_planet.GetName] 깨울 필요는 거의 없습니다. 그들의 아직 살아 있는, 얼어붙은 몸을 해부하는 것이 그들과 깨어 있을 때의 어떤 대화보다 더 많은 정보를 제공할 것입니다."
 mem_ashes.3.name:0 "수면에서 깨어난"
 mem_ashes.3.desc:0 "우리는 [their_planet.GetName]의 슬리퍼 포드에서 부활 프로토콜을 성공적으로 활성화하기 위해 상당한 노력을 기울였습니다. 번역 소프트웨어가 조정되면서 생존자들은 그들의 이야기를 공유할 수 있었습니다... \n\n그들은 자신들을 [their_species.GetNamePlural]이라고 부릅니다. 그들의 종은 고급 우주 시대에 접어들었지만, 첫 번째 행성 간 우주선이 이미 건설 중인 상황에서 그들은 태양에서 비정상적인 활동을 발견했습니다. 격변적인 태양 플레어를 예상하여, 그들의 정부는 구식 방사능 대피소를 사용하여 사회의 가장 우수한 인재들을 원시적인 냉동 기술로 저장하기로 비밀리에 계획했습니다. \n\n계획은 위험이 지나간 후 새로운 문명을 시작하기 위해 그들을 부활시키는 것이었지만, 플레어는 누구도 예상할 수 없었던 것보다 훨씬 더 심각했습니다. \n\n행성의 표면이 모두 멸균되고 대기가 날아가 버린 상황에서, 안전 신호는 결코 수신되지 않았고 포드는 마지막 생존 포드가 우리의 연구원들에 의해 회수될 때까지 퇴화하게 방치되었습니다. \n\n하지만 이제 슬리퍼들이 깨어나고 적응했기 때문에 우리는 그들을 연구 시설에 영원히 두고 있을 수 없습니다. 새로운 영구 숙소를 마련해야 합니다..."
 mem_ashes.3.a:0 "그들을 우리 제국의 일원으로 정착시킵니다."
 mem_ashes.3.a.tooltip:0 "[their_species.GetNamePlural]들이 §Y[planet_to_colonize.GetName]§!에 식민지를 세울 것입니다."
 mem_ashes.3.b:0 "성계 하나를 내주고 보호국으로 삼자."
 mem_ashes.3.b.tooltip:0 "§[their_species.GetNamePlural]들이 §Y[planet_to_colonize.GetName]§!에 식민지를 세울 것입니다. [planet_to_colonize.Solar_System.GetName]이(가) 그들에게 양도되어 우리의 속국이 될 것입니다."
 mem_ashes.3.c:0 "우리 행성에 정착시키자."
 mem_ashes.3.c.tooltip:0 "[their_species.GetNamePlural]는 공간이 있는 우리의 행성 중 하나에 정착할 것입니다."
 mem_ashes_need_free_space:0 "생존자들이 정착할 수 있는 행성 중 하나에 여유 공간이 필요합니다."
 mem_ashes.3.d:0 "화물선에 넣고 보내버려."
 mem_ashes.3.d.tooltip:0 "[their_species.GetNamePlural]들이 우리 제국에서 추방당해 다른 곳을 찾으러 떠날 것입니다. 언젠가 이들에 대한 소식을 듣게 되겠지요..."
 mem_ashes_survivors:0 "끈질긴 생존자들"
 mem_ashes_survivors_desc:0 "이 종족은 고향 세계의 파괴를 견뎌내고 기사회생의 기회를 얻었습니다. 그들은 이를 최대한 활용할 계획입니다."
 mem_ashes.4.name:0 "동면자 부검 완료"
 mem_ashes.4.desc:0 "우리 과학자들이 [their_planet.GetName]에서 발견한 포드 거주자의 해부를 완료했습니다. 얻어진 데이터는 매우 귀중하지만, 그 종의 마지막 생존자들이 우리의 검사대에서 죽음을 맞이함에 따라 그들은 영원히 멸종하게 되었습니다."
 mem_ashes.4.a:0 "생명이란 그런 것이지."
 mem_ashes.4.b:0 "우리한테 좋으면 그만이지!"
 mem_ashes.4.c:0 "데이터 추출 성공."
 mem_ashes.6.name:0 "[their_country.GetName]"
 mem_ashes.6.desc:0 "반갑습니다! 우리를 기억하시나요? \n\n당신 제국에서 우리가 자리잡지 못한 것은 참으로 안타까운 일이지만, 그 지하 벙커에서 우리를 구한 당신들의 친절을 우리는 평생 잊지 않을 것입니다. \n\n이제 저희도 자리를 잘 잡고 잘 지내고 있습니다. 저희 지도자 중 대피소를 만드는데 가장 크게 공헌한 지도자 한 명이 당신 제국에 합류해 자신의 지식을 나누고 싶다고 하고 있습니다. 이 요청을 받아주시겠습니까?"
 mem_ashes.6.a:0 "아니. 딱히 별로."
 mem_ashes.6.b:0 "좋아."
 mem_ashes.6.b.tooltip:0 "새 §Y총독§! 하나를 얻습니다."
 MEM_ASHES_ASSIMILATION:0 "잠든 자들을 동화시켜라"
 MEM_ASHES_ASSIMILATION_DESC:0 "유기체들이 동화에 반대할 수 없는 드문 기회입니다. 그들이 과거와 모든 것에 대해 배우기 위해 깨어날 필요조차 없습니다."
 mem_ashes.7.name:0 "잠든 자들이 동화됨"
 mem_ashes.7.desc:0 "우리는 [their_planet.GetName]에서 발견된 슬리퍼 포드에서 피실험체를 성공적으로 추출하기 위해 상당한 노력을 기울였습니다. 그들을 우리의 집단에 추가하면서 그들의 이야기를 조합해 나갔습니다. \n\n그들은 자신들을 [their_species.GetNamePlural]이라고 부릅니다. 그들의 종은 고급 우주 시대의 초기까지 발전했지만, 첫 번째 행성 간 우주선이 이미 건설 중인 상황에서 그들은 태양에서 비정상적인 활동을 발견했습니다. 격렬한 태양 플레어를 예상하며, 그들의 정부는 구식 방사능 대피소를 사용하여 사회의 가장 우수한 인재들을 원시적인 냉동 기술로 저장하기로 비밀리에 계획했습니다. \n\n계획은 위험이 지나간 후 새로운 문명을 시작하기 위해 그들을 되살리는 것이었지만, 플레어는 누구도 예상할 수 없을 만큼 훨씬 더 심각했습니다. \n\n행성의 전체 표면이 멸균되고 대기가 날아가 버린 상태에서 안전 신호는 결코 수신되지 않았고, 포드는 마지막 생존 포드가 우리에 의해 회수될 때까지 퇴화하게 방치되었습니다.\n\n이제 [their_species.GetNamePlural]의 대규모가 재활성화되었으므로, 그들을 위한 보다 영구적인 배치를 설정해야 합니다."
 mem_ashes.7.a:0 "우리 행성에 정착시키자."
 mem_ashes.7.a.tooltip:0 "새로 동화된 [their_species.GetNamePlural]들은 [planet_to_colonize.GetName]에 배치될 것입니다."
 mem_ashes.7.b:0 "처리해. [Root.GetName]에 그들을 위한 자리는 없다."
 mem_ashes.7.b.tooltip:0 "[their_species.GetNamePlural]들이 모두 죽을 것입니다."
 mem_ashes_leader_trait:0 "끈질긴 생존자"
 mem_ashes_leader_trait_desc:0 "이 지도자는 모성이 파괴되는 순간에서도 살아남아 두 번째 삶을 살고 있습니다."
 trait_mem_ashes_survivors:0 "끈질긴 생존자들"
 trait_mem_ashes_survivors_desc:0 "이 종족은 고향 세계의 파괴를 견뎌내고 기사회생의 기회를 얻었습니다. 그들은 이를 최대한 활용할 계획입니다."
 leader_trait_mem_ashes:0 "끈질긴 생존자"
 leader_trait_mem_ashes_desc:0 "이 지도자는 모성이 파괴되는 순간에서도 살아남아 두 번째 삶을 살고 있습니다."
