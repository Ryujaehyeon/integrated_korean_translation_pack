l_korean:
 mem_hithere.1.name:0 "이상한 신호"
 mem_hithere.1.desc:0 "우리의 관측소가 행성 §Y[receiver.GetName]§! 위에서 수신한 전송이 있습니다. 현재 우리가 사용할 수 있는 기술과는 달리, 이는 정보를 빛의 속도로 전달하는 간단한 전자기파로 구성되어 있습니다. 신호는 우주의 광활한 공백을 수년간 여행하며 희미해졌지만, 반복되어 있으므로 우리는 이를 쉽게 재구성하고 해독할 수 있을 것입니다."
 mem_hithere.1a:0 "별로 흥미로울 것도 없겠지. 삭제하라"
 mem_hithere.2.name:0 "기록된 메시지"
 mem_hithere.2.desc:0 "안녕하세요! 발린투 외부 지능 연구소의 우카 자오르 교수입니다. \n\n우리는 이 메시지를 은하를 가로질러 우리의 지능의 형제들에게 전하기 위해 보냅니다. 우리는 별들 사이를 여행할 기술이 없지만, 여러분이 그 기술을 가지고 있기를 바랍니다. \n\n이 메시지가 여러분에게 도달할 즈음, 이 녹음에 참여한 모든 이들은 아마도 이미 세상을 떠났을 것입니다. 그러나 우리는 여러분이 우리의 후손을 방문해 주기를 희망합니다. \n\n우리 문명이 완벽하지 않다는 것을 알고 있지만, 여전히 서로 이해할 수 있는 기반을 찾고 서로에게서 배울 수 있기를 바랍니다. \n\n우주는 차갑고 비어 있다고 믿지 않겠습니다; 우리는 만날 날을 꿈꿉니다. 우리의 고향 시스템의 좌표가 이 메시지에 첨부되어 있습니다. \n\n영원히 당신의, \n발린 사람들."
 mem_hithere.2a:0 "어쩌면 확인 해보는 것도 좋을 것 같군."
 mem_hithere.2a.phile:0 "앞으로! 새로운 친구를 향해!"
 mem_hithere.2a.phobe:0 "먼저 위협이 되는지 확인하는 것이 현명할 것이다."
 mem_hithere.2a.swarm:0 "더 많은 식량... 좋군..."
 mem_hithere.2a.pur:0 "우리의 타겟 목록이 늘어난 것 같습니다."
 mem_hithere.2a.serv:0 "그들이 우리를 필요로 한다!"
 mem_hithere.2a.assim:0 "[Root.GetName]에 더하기에 알맞은 대상인 것 같군요."
 mem_hithere_chain_title:0 "발린투 신호"
 mem_hithere_chain_desc:0 "누군가 외계 지성체에 도달하고자 메시지를 보냈습니다. 그들에게 방문해 보아야 할까 싶습니다."
 mem_hithere_poi:0 "바이트랄"
 mem_hithere_poi_desc:0 "신호의 근원."
 mem_hithere.3.name:0 "바이트랄 성계"
 mem_hithere.3.desc:0 "우리는 발린투 종족의 고향 시스템에 도착했습니다. 그러나 그들의 고향 행성은 대규모 핵 폭격의 여파를 겪고 있는 것으로 보입니다. 전체 행성이 방사선 조사되어 황폐해졌으며, 생명의 징후는 전혀 보이지 않습니다. 그들이 메시지를 발신한 것과 우리가 이를 수신한 사이에 발린투는 내부 또는 외부의 갈등으로 완전히 멸망한 것으로 보입니다."
 mem_hithere.3a.phobe:0 "뭐 그리 가치있는게 없어진건 아니니까."
 mem_hithere.3a.swarm:0 "우리의 식량이! 안돼!"
 mem_hithere.3a.pur:0 "누군가 우리들의 킬 스코어를 훔쳐버렸군. 수치스럽다."
 mem_hithere.3a.term:0 "모든 유기체의 본질은 자신을 스스로 파멸시키는 데에 있는 것이다."
 d_mem_hithere_institute:0 "외항성 지성 학회"
 d_mem_hithere_institute_desc:0 "옛날 옛적에 수백 명의 위대한 지성인들이 이곳에서 외계 지성을 찾고 있었습니다. 이제 남은 것은 폐허와 광대한 지하 자료 보관소뿐입니다."
 mem_hithere.4.name:0 "외부 위성 망원경"
 mem_hithere.4.desc:0 "§Y[Root.GetName]§!은(는) §Y발린§!의 불모의 자매 위성인 §Y[From.GetName]§!에서 진공 상태로 잘 보존된 철탑 배열망을 발견했습니다. 겉보기에 발린투는 외계 문명의 신호를 찾기 위해 설계된 고도로 정교한 전파 망원경을 만드는 데 상당한 노력을 기울였습니다."
 mem_hithere.5.name:0 "거대 가스 행성 송신 장치"
 mem_hithere.5.desc:0 "§Y발린§!이 공전하는 거대한 거대 가스 행성 §Y[From.GetName]§!에는 여전히 거대한 인공 구조물이 있습니다. 우주 쓰레기에 의해 심하게 손상되었지만, 그 목적은 분명합니다. 대형 궤도 안테나가 전파를 우주로 보내는 데 사용되었습니다. 이것은 아마도 우리가 수신한 신호의 원점일 것입니다."
 mem_hithere.6.name:0 "탐사 차량"
 mem_hithere.6.desc:0 "§Y[Root.GetName]§!는 §Y[From.GetName]§!에서 여전히 존재하는 여러 자율 로버와 착륙 모듈의 잔해를 감지했습니다. 발린투 문명이 원시적인 수단에도 불구하고 황량한 행성을 철저히 탐사한 것으로 보입니다. 일부 로버는 여전히 작동 중이며, 목적 없이 방황하고 무의미한 테스트를 수행하고 있습니다."
 mem_hithere.7.name:0 "붙잡힌 탐사정"
 mem_hithere.7.desc:0 "§Y[From.GetName]§!인 발린투 고향 시스템의 가장 바깥쪽 행성을 조사하는 동안, §Y[Root.GetName]§!가 작은 탐사선을 발견했습니다. 발린투가 전파한 신호 외에도 그들은 자신의 문명과 이를 찾는 방법을 설명하는 명판이 있는 탐사선을 최소한 하나 배치했지만, 불행히도 이 탐사선은 행성의 중력에 의해 끌려 들어갔습니다."
