l_korean:
 mem_mysterious_pyramids_category:0 "신비한 피라미드"
 mem_mysterious_pyramids_category_desc:0 "이 유독성 행성에 대한 조사 결과, 표면에 기하학적 정밀도로 배치된 12개 이상의 피라미드 형태가 확인되었습니다. 우리가 아는 지능적 생명체가 거주할 수 없는 이 행성을 조사할 가치가 있을 수 있습니다."
 mem_mysterious_pyramids.102.name:0 "테라포밍 실패"
 mem_mysterious_pyramids.102.desc:0 "가설대로, 피라미드 구조물은 인공입니다. 벽은 현지에서 조달한 시멘트 혼합물로 만들어졌으며, 더 깊은 분석에서는 핵분열 반응기와 일치하는 방사성 원소의 분해가 감지되었습니다. 여러 개가 대량의 가스 형태의 기체를 방출하는 것이 목격되었습니다. 분광 분석에 따르면 이들은 대부분 수증기와 이산화탄소로 구성되어 있으며, 상당량의 메탄도 포함되어 있습니다.\n\n과학 장교 [This.leader.GetName]는 피라미드가 [From.GetPlanetMoon]를 테라포밍하기 위해 세워진 가스 방출 시설이라고 믿고 있습니다. 수증기와 이산화탄소는 모두 생명에 유리합니다. 이 과정에서 이 시설들은 메탄 하이드레이트, 즉 불의 얼음으로 알려진 매장된 메탄 저장소에 접근했을 것입니다. 이 방출은 현재 이 세계의 대기 화학을 지배하는 runaway 온실 효과를 초래했을 수 있습니다. 산성 비바람이 표면을 휩쓸며 테라포머를 침식하고 있습니다. 그들이 고장 나기까지는 시간 문제일 뿐이지만, 이미 피해는 발생했습니다. 발생한 사건에 대한 분석은 우리가 미래에 이러한 함정을 피하는 데 도움이 될 것입니다."
 mem_mysterious_pyramids.102.a:0 "교훈을 주는 이야기군."
 mem_mysterious_pyramids.103.name:0 "테라포밍 장비"
 mem_mysterious_pyramids.103.desc:0 "피라미드 구조물에 대한 분석 결과, 이들은 실제로 인공 구조물임이 밝혀졌습니다. 수천 개의 육족 로봇이 [From.GetPlanetMoon]의 표면을 스치며, 궤도 사진에서 감지된 인프라 및 자원 추출 시설을 담당하고 있습니다. 피라미드 자체는 대기 처리기처럼 기능하지만, 처음 보기에는 대기 중의 혼합물에 전혀 영향을 미치지 않는 것처럼 보입니다.\n\n과학 장교 [This.leader.GetName]에게는 놀라운 계시가 있었습니다. 아마도 이 구조물들은 프로그래밍된 대로 작동하고 있는 것일 수 있습니다. 피라미드는 이 독성 대기를 생성하기 위해 건설되었고, 현재처럼 이를 유지하고 있는 것으로 보입니다. 과학 장교 [This.leader.GetName]는 이 세계가 우리와 매우 다른 종족을 수용할 수 있도록 이 세계를 변화시키기 위해 프로그래밍된 우주선이나 탐사선에 의해 방문되었을 것이라는 이론을 제기합니다. 이 세계의 적도 지역을 휩쓰는 부식성 폭풍은 그들에게는 바람에 불과할 수 있으며, 암모니아 호수는 그들의 농업 버전을 지원하기 위해 존재할 수 있습니다.\n\n또 다른 가능성이 제시됩니다: '제노포름'하여 독성 황무지로 만들기 위해 더 많은 세계를 찾기 위해 발송된 다른 탐사선이 있을 수 있습니다."
 mem_mysterious_pyramids.103.a:0 "분해해서 설계를 알아보자."
 mem_mysterious_pyramids.103.b:0 "그냥 놔두자. 우리한테 딱히 문제를 주는건 아니잖아?"
 mem_mysterious_pyramids.202.name:0 "수수께끼"
 mem_mysterious_pyramids.202.desc:0 "피라미드는 인공 건축이 가능할 정도로 복잡한 대형 석조 구조물입니다. 원거리 발굴을 통해 몇 가지 답을 얻었습니다. 이들은 단순한 화강암으로 구성되어 있으며, 내부 기계장치나 토목 기계보다 더 복잡한 공학의 흔적은 없습니다. 아마도 이들은 어떤 종류의 문화 유물일 수 있습니다: 죽은 자를 위한 표식이거나 천문학적 달력의 일부일 수 있습니다. 이들이 무엇이든, 이러한 이상한 것들은 우리에게는 아무런 도움이 되지 않습니다."
 mem_mysterious_pyramids.202.a:0 "독특하군."
