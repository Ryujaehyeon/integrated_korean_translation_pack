 giga_supertensiles_subsidies_desc:0 "이 조건에 따라 종속국이 지배국에 매월 지급해야 하는 £giga_sr_amb_megaconstruction£ §Y$giga_sr_amb_megaconstruction$§!의 양이 결정됩니다. 각 숫자는 종속국의 현재 월간 생산량의 백분율입니다.\n\n음수는 역으로 지배국이 종속국에 제공해야 하는 자원을 의미하며, 종속국의 현재 월간 생산율을 바탕으로 결정됩니다.\n\n§E이 조건은 엔진의 한계로 인해 개별 항목에 있습니다. 문제가 해결된다면 기여 항목으로 다시 옮겨 놓을 것입니다.§!"
