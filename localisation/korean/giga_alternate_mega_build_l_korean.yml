 building_giga_megaworkshop_desc:0 "이 시설에는 분자 합성기들과 먼지 한 점 없는 클린룸이 가득하며, 대규모 궤도 건설 프로젝트에 필요한 매우 전문적인 소재를 생산하고 있씁니다."
