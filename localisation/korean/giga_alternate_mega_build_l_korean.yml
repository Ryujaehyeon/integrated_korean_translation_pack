 giga_amb_base:0 "직업-기반 거대 건설 메커니즘"
 giga_amb_base_tooltip:0 "우리의 $MOD_MEGASTRUCTURE_BUILD_SPEED_ADD$는 제국의 £giga_sr_amb_megaconstruction£ §Y$giga_sr_amb_megaconstruction$§! 수입을 기반으로 합니다.\n\n매달, 최소한 하나의 메가구조물이 건설되고 있을 때, 최대 두 배의 £giga_sr_amb_megaconstruction£ §Y$giga_sr_amb_megaconstruction$§! 수입이 우리의 재고에서 차감되어 $MOD_MEGASTRUCTURE_BUILD_SPEED_ADD$로 전환됩니다. 이 값은 모든 건설 중인 메가구조물 사이에 나누어지며, 나누어진 후에는 수익 감소의 영향을 받습니다 §Yafter§!.\n\n속도 계산에 대한 자세한 내용은 §Y$giga_amb_speed$§! 국가 수정자를 참조하십시오."
 giga_amb_base_desc:0 "§L별 그 자체를 뛰어넘기 위해서는 숙련된 인원과 특수 소재가 필요합니다.§!"
 giga_amb_storage_capacity:0 "$giga_sr_amb_megaconstruction$ 비축 한도"
 giga_amb_storage_capacity_tooltip:0 "£giga_sr_amb_megaconstruction£ §Y$giga_sr_amb_megaconstruction$§! 비축 한도에는 제한이 있으며, 일반적인 £mod_country_resource_max_add£ §Y$MOD_COUNTRY_RESOURCE_MAX_ADD$§! 보정치의 영향을 받지 않습니다."
 giga_amb_storage_capacity_desc:0 "§L희귀하고 귀중한 최첨단 소재를 세심한 주의를 기울여 보관해야 합니다.§!"
 giga_amb_speed:0 "거대 건설 속도"
 giga_amb_speed_desc:0 "§L전문가들과 소재의 공급에는 한계가 있으므로, 이러한 자원을 어디에 사용해야할지 세심하게 선택해야 합니다.§!"
 giga_amb_flat_replacement:0 "거대 건설 호환성"
 giga_amb_flat_replacement_desc:0 "이 보정치는 다른 모드의 $MOD_MEGASTRUCTURE_BUILD_SPEED_ADD$ 수급처를 무효화하고 직업-기반 거대 건설 시스템에 적합한 대체 보정치를 제공합니다.\n§W--------------§!\n§L거대규모 방법론의 간결한 교정.§!"
 giga_amb_ai_limit:0 "거대 건설 AI 한계"
 giga_amb_ai_limit_tooltip:0 "AI는 다양한 프로젝트에 건설 속도를 분배한다는 개념을 이해하지 못하기 때문에, AI가 동시에 건설할 수 있는 거대 구조물의 수를 제한합니다.\n\n한도 최대치에 달했을 때 프로젝트 당 속도 0.75-0.5에 머물려고 할 것입니다. 이는 매년 갱신됩니다.\n\n한도치에 대해서는 §Y$giga_amb_speed$§! 국가 보정치를 확인하세요."
 giga_amb_ai_limit_desc:0 "§L\"왜 1.4의 속도를 가지고 링 월드 구획 10개를 만드는거야?!\" - TTFTCUTS§!"
 giga_amb_empire_size_penalty:0 "거대 건설 제국 규모 불이익"
 giga_amb_empire_size_penalty_desc:0 "§L우리의 행정적 부담이 증가함에 따라, 행성 간 프로젝트를 조정하는 것이 버거워지고 있습니다.§!"
 giga_amb_starting_megas_upkeep_offset:0 "거대 건설 유지비 지원 시작"
 giga_amb_starting_megas_upkeep_offset_desc:0 "게임 시작시에 소유하고 있는 모든 거대 구조물의 기본 $giga_sr_amb_megaconstruction$ 유지비를 지불합니다.\n\n§L우리에게 가장 중요한 우주 시설물을 관리하지 않는 것은 태만일 뿐입니다.§!"
 giga_sr_amb_megaconstruction:0 "초인장 소재"
 giga_sr_amb_megaconstruction_desc_only:0 "엄청난 수준의 장력을 버틸 수 있는 첨단 소재로, 거대한 우주 시설물의 건설에 필수적인 소재입니다."
 giga_sr_amb_megaconstruction_desc:0 "$giga_sr_amb_megaconstruction_desc_only$\n\n§L이 자원은 기가스트럭처 커스터마이제이션 메뉴의 §Y거대 구조물 건설 한도§! 옵션이 §Y직업-기반§!으로 설정되어있을 때 사용됩니다.§!"
 giga_tech_amb_supertensiles:0 "응용 초인장"
 giga_tech_amb_supertensiles_desc:0 "개선된 분자 합성 방식 덕분에 상상할 수 없는 항장력을 가진 소재의 실질적인 응용이 가능해졌습니다."
 giga_tech_amb_living_metal_infusion:0 "생체 금속 주입 과정"
 giga_tech_amb_living_metal_infusion_desc:0 "이론상, 생체 금속의 재생 특성을 사용해 분자 주조소의 생산량과 품질을 높일 수 있습니다."
 giga_tech_amb_sentient_metal_molecular_foundries:0 "자의식 금속 산업 나노컴퓨팅"
 giga_tech_amb_sentient_metal_molecular_foundries_desc:0 "자의식 금속이 가진 나노 규모의 컴퓨팅 능력을 처리 장치에 포함시키면, 분자 주조소의 처리량이 크게 높아질 수 있습니다."
 giga_tech_orbital_ring_supertensiles_mine_hub:0 "무중력 분자 청정실 설계"
 giga_tech_orbital_ring_supertensiles_mine_hub_desc:0 "오비탈 링에 $giga_sr_amb_megaconstruction$을 위한 전용 처리 공간을 설치하는 것은 추출 및 처리 작업을 크게 향상시킬 가능성이 있습니다."
 giga_tech_fe_megaworkshop_1:0 "$building_giga_fe_megaworkshop$"
 giga_tech_fe_megaworkshop_1_desc:0 "$building_giga_fe_megaworkshop_desc$"
 giga_tech_fe_megaworkshop_2:0 "$building_giga_fe_megaworkshop_2$"
 giga_tech_fe_megaworkshop_2_desc:0 "$building_giga_fe_megaworkshop_2_desc$"
 district_giga_supertensiles:0 "분자 주조소 지구"
 district_giga_supertensiles_plural:0 "분자 주조소 지구"
 district_giga_supertensiles_desc:0 "$building_giga_megaworkshop_desc$"
 d_giga_amb_start_bonus:0 "거대 건설 소재 보관소"
 d_giga_amb_start_bonus_desc:0 "§W이것에서 주어지는 자원량은 중반 게임까지 시간이 지남에 따라 줄어듭니다. 현명하게 사용하세요.§!\n§W--------------§!\n대규모 우주 건설에 적합한 건설 소재가 담긴 보관소입니다. 안타깝게도, 무한하지는 않습니다..."
 d_giga_hab_supertensiles_1:0 "$giga_sr_amb_megaconstruction$ 매장지"
 d_giga_hab_supertensiles_1_desc:0 "이 거주지는 이용 가능한 초인장 소재 매장지 근처에 건설되었습니다."
 d_giga_lifeless_supertensiles_1:0 "$giga_sr_amb_megaconstruction$ 매장지"
 d_giga_lifeless_supertensiles_1_desc:0 "이 행성은 이용 가능한 초인장 소재 매장지가 있습니다."
 col_giga_supertensiles_foundry:0 "대규모 물류 시설"
 col_giga_supertensiles_foundry_desc:0 "이 행성은 심우주 건설 프로젝트에 초점을 맞추고 있는 생산 및 물류 중심지입니다."
 col_giga_supertensiles_foundry_tt:0 "$col_giga_supertensiles_foundry_desc$"
 col_giga_habitat_supertensiles_foundry:0 "대규모 물류 기지"
 col_giga_habitat_supertensiles_foundry_desc:0 "거대 구조물 건설에 전념하는 인공 심우주 아콜로지입니다."
 col_giga_habitat_supertensiles_foundry_tt:0 "$col_giga_habitat_supertensiles_foundry_desc$"
 edict_giga_amb_sentient_metal_supertensiles:0 "자의식 금속 보조형 분자 주조소"
 edict_giga_amb_sentient_metal_supertensiles_desc:0 "감응 금속의 적응력 특성은 초강도 재료 제조에 여러 가지 잠재적 응용이 있습니다.\n\n£job_giga_megaengineer£ §Y$job_giga_megaengineer_plural$§!의 기본 생산량과 유지비를 §Y50%§! 증가시킵니다.\n\n£job_giga_megaengineering_overseer£ §Y$job_giga_megaengineering_overseer_plural$§!의 기본 생산량과 유지비를 §Y20%§! 증가시킵니다.\n\n두 직업의 £alloys£ $alloys$ 유지비의 §Y절반§!을 £giga_sr_sentient_metal£ §Y$giga_sr_sentient_metal$§!으로 대체합니다."
 giga_amb.1000.name:0 "§Y[FromFrom.GetName]§!: 전략적 자원 발견됨"
 giga_amb.1000.has_tech:0 "[Root.GetName](이)가 이전까지는 알려지지 않았던 §H$giga_sr_amb_megaconstruction$§! 매장지를 [FromFrom.GetName]에서 발견했습니다. 이전까지 자연 발생은 불가능하다 여겨졌지만, 매우 특정한 조건 하에서라면 이런 말도 안되게 강력한 분자 사슬이 형성되는 것도 무리는 아니었던 듯 합니다. 이를 이용해 우리의 인공 초인장 소재 생산에 도움을 줄 수 있을 것입니다."
 giga_amb.1000.no_tech:0 "[Root.GetName](이)가 이전까지는 알려지지 않았던 전략적 자원을 [FromFrom.GetName]에서 발견했습니다. 통칭 §H$giga_sr_amb_megaconstruction$§!로, 빽빽하게 맞물려 있는 섬유 물질은 엄청난 수준의 항장력을 지니며, 이전까지는 실행 불가능하다 여겨졌던 수준의 힘이 가해지는 대규모 프로젝트에 사용될 수 있습니다."
 giga_amb.1000.tooltip:0 "£giga_sr_amb_megaconstruction£§Y$giga_sr_amb_megaconstruction$§!\n§E$giga_sr_amb_megaconstruction_desc_only$§!"
 giga_amb.1001.name:0 "물류 계산 착오"
 giga_amb.1001.desc:0 "우리가 우주의 공허로 첫 발걸음을 내딛었을 때, 우리는 극복해야할 새로운 도전이 있으리라는 것을 알고 있었고 우리는 이에 따라 계획했습니다. 적어도 그렇게 생각했습니다. 가끔씩은 문제의 복잡성을 최대한 잘 예측해봐도 문제가 발생할 수 있습니다.\n\n대규모 우주 건설을 계획하고 착수하는 일은 처음에 예상했던 것보다 우리의 공급 라인에 큰 부담을 주고 있으며, 앞으로 상당한 재구성이 필요할 것입니다.\n\n새로운 생산 및 배치 기술에 대한 연구가 이러한 문제를 해결할 수도 있으리라고 기대되지만, 입증되지는 않았습니다."
 giga_amb.1001.tooltip:0 "\n§E거대 구조물 건설에 진전을 이루기 위해서는 §Y$giga_tech_amb_supertensiles$§! 기술을 연구 §P해야합니다§!."
 sm_ring_giga_supertensiles_hub:0 "메가물류 네트워크 조정자"
 sm_ring_giga_supertensiles_hub_desc:0 "이 궤도 시설은 $sr_living_metal$을 사용하여 생산 공정을 간소화함으로써 지상의 $building_giga_megaworkshop_plural$을 강화하는 데 도움을 주며, 전반적인 생산량 증가로 이어집니다."
 sm_ring_giga_supertensiles_mine_hub:0 "오비탈 청정실 시설"
 sm_ring_giga_supertensiles_mine_hub_desc:0 "오비탈 링에 특화된 스테이징 시설과 청정실을 설치하여 추출된 물질을 처리할 수 있으며 그렇지 않으면 낭비가 발생할 수 있습니다.\n\n§T 활성화된 £building£ §Y$building_giga_supertensiles_mines$§! 건물마다 §G+1§! £job_giga_supertensiles_extractor£ §YSupertensiles Extraction§! 직업을 제공합니다.\n"
 ring_giga_supertensiles_mine_hub_condition:0 "§R행성이 적어도 하나의 £building£ §Y$building_giga_supertensiles_mines$§! 건물을 지원할 수 있어야 합니다.§!"
 giga_tech_amb_supertensiles_acot_delta:0 "암흑 물질 주입 초인장 소재 생산"
 giga_tech_amb_supertensiles_acot_delta_desc:0 "암흑 물질 기반의 광결정 시스템은 분자 합성에 혁신을 일으킬 잠재력을 가지고 있습니다."
 job_giga_megaengineer_acot_delta:0 "광결정 물질 기술"
 job_giga_megaengineer_acot_delta_plural:0 "광결정 물질 기술"
 job_giga_megaengineer_acot_delta_desc:0 "광결정 도구와 암흑 물질 압축 기술은 물질 합성률을 현저하게 향상시켰습니다."
 job_giga_megaengineer_acot_delta_effect_desc:0 "$job_giga_megaengineer_acot_delta_swap_plural_with_icon$는 £alloys£ §Y$alloys$§!, £unity£ §Y$unity$§!, £sr_dark_matter£ §Y$sr_dark_matter$§!, 그리고 £acot_sr_dark_energy£ §Y$acot_sr_dark_energy$§!를 £giga_sr_amb_megaconstruction£ §Y$giga_sr_amb_megaconstruction$§!로 변환합니다."
