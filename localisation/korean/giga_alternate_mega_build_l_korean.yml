 job_giga_megaengineer_drone_acot_delta:0 "광결정 물질 드론"
 job_giga_megaengineer_drone_acot_delta_plural:0 "광결정 물질 드론"
 job_giga_megaengineer_drone_acot_delta_desc:0 "광결정 도구와 암흑 물질 압축 기술은 물질 합성률을 현저하게 향상시켰습니다."
