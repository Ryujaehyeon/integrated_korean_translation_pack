 job_giga_megaengineering_overseer_acot_delta:0 "거대 건축 오버로드"
 job_giga_megaengineering_overseer_acot_delta_plural:0 "거대 건축 오버로드"
 job_giga_megaengineering_overseer_acot_delta_desc:0 "선구자들과 그들의 강력한 건설 프로젝트를 따라 우리 전문가들도 각 분야에서 앞서 나가고 있습니다."
 job_giga_megaengineering_overseer_acot_delta_effect_desc:0 "$job_giga_megaengineering_overseer_acot_delta_swap_plural_with_icon$ 대량의 £alloys£ §Y$alloys$§!, £unity£ §Y$unity$§!, £sr_dark_matter£ §Y$sr_dark_matter$§!, 그리고 £acot_sr_dark_energy£ §Y$acot_sr_dark_energy$§!를 £giga_sr_amb_megaconstruction£ §Y$giga_sr_amb_megaconstruction$§!으로 전환하지만 유지비가 증가합니다."
