l_korean:
 mod_giga_elysium_host_stability_add:0 "엘리시움 행성 안정도"
 mod_giga_elysium_host_jobs_produces_mult:0 "엘리시움 행성 직업 산출량"
 giga_elysium_host_planet:0 "$name_orb_elysium$ 행성"
 giga_elysium_host_planet_desc:0 "높은 곳에서 통제되는 이 행성의 통치는 대부분 행성 당국의 손에 달려 있으며, 궤도의 기지에서 그들의 상급자가 관측하고 있습니다."
 giga_elysium_origin_fix:0 "$name_orb_elysium$ 기원 모성 픽스"
 giga_elysium_origin_fix_desc:0 "이 보정치가 보이면 안됩니다."
 giga_elysium_origin_build_speed:0 "$name_orb_elysium$ 기원 조립"
 giga_elysium_origin_build_speed_desc:0 "이 보정치가 보이면 안됩니다."
 giga_elysium_no_host:0 "행성 지원 부족"
 giga_elysium_no_host_desc:0 "아래 행성 기반 시설의 지원이 없으면, 이 기지의 주민들이 힘들어집니다."
 giga_origin_no_elysium:0 "궤도의 관리 없음"
 giga_origin_no_elysium_desc:0 "높은 곳에서 그들을 지도해 줄 $name_orb_elysium$이 없다면, 이 행성의 주민들은 엉망이 되고 비효율적이 됩니다."
 giga_dismantle_elysium:0 "$name_orb_elysium$ 해체"
 giga_dismantle_elysium_desc:0 "이 기지, 그리고 숨막히는 통제는 더 이상 우리에게 필요 없습니다."
 giga_dismantle_elysium_tooltip:0 "$name_orb_elysium$이 §R파괴§!될 것입니다."
 d_giga_elysium_buildings:0 "행성 지원 기반 시설"
 d_giga_elysium_buildings_desc:0 "§W$name_orb_elysium$은 아래 행성에서 잠금 해제되는 £building£ §Y건물 슬롯§!마다 슬롯을 얻습니다.§!\n§W--------------§!\n아래 행성의 독립과 와는 거리가 먼 엘리시움은 충분한 지원 기반 시설의 큰 이익을 누립니다."
 d_giga_elysium_origin_industry:0 "버려진 산업 지대"
 d_giga_elysium_origin_industry_desc:0 "과거 산업 개발 시대의 잔재인 이 낡은 제조 시설들은 이제 진보를 가로막을 뿐입니다."
 d_giga_elysium_origin_industry_effect:0 "일부 £job_foundry£ §Y[owner.GetAlloyProducer]§! 및 [owner.GetArtisanIcon] §Y[owner.GetArtisan]§! 직업을 §Y[owner.GetClerkOrMaintenanceDrone]§! 직업으로 대체합니다. 행성이 §Y산업§!, §Y주조§!, 또는 §Y공장§! 행성 특화를 가지고 있을 때 적용됩니다."
 giga_elysium.002.name:0 "[From.GetName]의 규제 없는 산업 확장"
 giga_elysium.002.desc:0 "§Y[From.GetName]§! 위에 있는 엘리시움 기지의 통제 센터에서 높은 실업률에 응하여 비인가 산업 활동이 많아지고 있다는 보고를 보냈습니다. 이 §Y$d_giga_elysium_cottage_industry$§!은 구직자들에게 고용을 약속하며, 조직 범죄의 냄새를 풍긴다고 합니다.\n\n[From.GetName]에 그것이 존재하면 §Y행성 안정도에 부정적인 영향§!을 줄 수 있으며, 국가의 간섭이 필요할지도 모릅니다."
 giga_elysium.002.desc.hive:0 "§Y[From.GetName]§! 상공 엘리시움 기지에 있는 통제 센터가 드론들이 오랫동안 빈둥거리고 있음에 응하여 지표의 지역 관리 군집이 §Y$d_giga_elysium_cottage_industry$§!의 건설을 지시했다고 보고했습니다.\n\n새로 개발된 이 지역은 추가적인 일자리를 제공할테지만, 반자율적이기 때문에 일탈 행위가 늘어나고 있으며, 장기적으로 보았을 때 §Y행성 안정도에 부정적인 영향§!을 줄 것 같습니다. 제거해야 할지도 모릅니다."
 giga_elysium.002.desc.machine:0 "§Y[From.GetName]§! 상공 엘리시움 기지에 있는 통제 센터가 드론들이 오랫동안 빈둥거리고 있음에 응하여 지표의 반자율적 건설 계획 하위 지능이 §Y$d_giga_elysium_cottage_industry$§!의 건설을 지시했다고 보고했습니다.\n\n새로 개발된 이 지역은 추가적인 일자리를 제공할테지만, 중앙 계획 시스템과의 통합 수준이 좋지 않으며, 장기적으로 보았을 때 §Y행성 안정도에 부정적인 영향§!을 줄 것 같습니다. 제거해야 할지도 모릅니다."
 MESSAGE_GIGA_ELYSIUM_COTTAGE_INDUSTRY_TITLE:0 "규제 없는 산업 확장"
 MESSAGE_GIGA_ELYSIUM_COTTAGE_INDUSTRY:0 "§Y$SYSTEM$§! 성계 내 §Y$PLANET$§!의 높은 실업률로 인해 직업을 제공하기 위한 §Y$d_giga_elysium_cottage_industry$§!이 건설되고 있습니다."
 d_giga_elysium_cottage_industry:0 "임시 산업 구역"
 d_giga_elysium_cottage_industry_desc:0 "이러한 소규모 산업들은 일자리를 제공하기 위해 유휴 인구에 의해 건설되었습니다."
 giga_elysium.004.name:0 "[From.GetName]의 규제 없는 도시 확장"
 giga_elysium.004.desc:0 "§Y[From.GetName]§! 위에 있는 엘리시움 기지의 통제 센터에서 높은 노숙자 비율에 응하여 권리가 없는 개척자들이 주요 거주지의 변두리에 §Y$d_giga_elysium_slums$§!을 건설했다고 합니다.\n\n관리하고 순찰을 돌기 어려우므로 조직 범죄의 온상이 될 것입니다. 따라서 [From.GetName]에 그것이 존재한다면 §Y행성 안정도에 부정적인 영향§!을 줄 수 있으며, 국가의 간섭이 필요할지도 모릅니다. "
 giga_elysium.004.desc.hive:0 "§Y[From.GetName]§! 상공 엘리시움 기지에 있는 통제 센터가 거주가 모자람에 응하여 드론 무리가 생존 본능을 느낄 때까지 몰려 주거지로써 §Y$d_giga_elysium_slums$§!을 건설했습니다.\n\n새로 개발된 이 지역은 추가적인 거주 공간을 제공할테지만, 미로같은 구조로 인해 일탈 분자들의 온상이 되고 있습니다. 장기적으로 보았을 때 §Y행성 안정도에 부정적인 영향§!을 줄 것 같습니다. 제거해야 할지도 모릅니다."
 giga_elysium.004.desc.machine:0 "§Y[From.GetName]§! 상공 엘리시움 기지에 있는 통제 센터가 드론 대기 구역이 엄청나게 모자라다는 사실에 응하여 지표의 반자율적 건설 계획 하위 지능이 §Y$d_giga_elysium_slums$§!의 건설을 지시했다고 보고했습니다.\n\n새로 개발된 이 지역은 집 없는 드론들에게 거주지를 제공할테지만, 개미굴 같은 구조로 인해 오염된 드론들의 온상이 되고 있습니다. 장기적으로 보았을 때 §Y행성 안정도에 부정적인 영향§!을 줄 것 같습니다. 제거해야 할지도 모릅니다."
 MESSAGE_GIGA_ELYSIUM_SLUMS_TITLE:0 "규제 없는 도시 확장"
 MESSAGE_GIGA_ELYSIUM_SLUMS:0 "§Y$SYSTEM$§! 성계 내 §Y$PLANET$§!의 높은 노숙자 비율로 인해 거주지를 제공하기 위한 §Y$d_giga_elysium_slums$§!이 건설되고 있습니다."
 d_giga_elysium_slums:0 "임시 거주 지역"
 d_giga_elysium_slums_desc:0 "형편 없이 계획되고 일탈 활동이 활발하게 일어나는 이 슬럼가는 정말 부족한 거주 공간을 제공합니다."
 giga_elysium.005.name:0 "[From.GetName]의 이전된 가축"
 giga_elysium.005.desc:0 "§Y[From.GetName]§! 상공 엘리시움 기지에 있는 통제 센터가 §Y$LIVESTOCK$ 팝§!을 위한 거주가 모자람에 응하여 지역 당국이 §Y$d_giga_elysium_livestock_pens$§!의 건설을 지시했다고 보고했습니다.\n\n기존 시설보다는 덜 통제되며, 거주자들은 덜 규칙적인 생활을 하게 될 것입니다. 앞으로 §Y행성 안정도에 부정적인 영향§!을 줄 것 같습니다. 시설 전체를 교체해야 할지도 모릅니다."
 giga_elysium.005.desc.hive:0 "§Y[From.GetName]§! 상공 엘리시움 기지에 있는 통제 센터가 §Y$LIVESTOCK$ 팝§!을 위한 거주가 모자람에 응하여 지표면에 있는 지역 관리 군집이 §Y$d_giga_elysium_livestock_pens$§!의 건설을 지시했다고 보고했습니다.\n\n기존 시설보다는 덜 통제되며, 거주자들은 덜 규칙적인 생활을 하게 될 것입니다. 앞으로 §Y행성 안정도에 부정적인 영향§!을 줄 것 같습니다. 시설 전체를 교체해야 할지도 모릅니다."
 giga_elysium.005.desc.machine:0 "§Y[From.GetName]§! 상공 엘리시움 기지에 있는 통제 센터가 §Y$slavery_matrix$ 팝§!을 위한 저장 공간이 엄청나게 모자람에 응하여 반자율적 건설 계획 하위 지능이 §Y$d_giga_elysium_livestock_pens$§!의 건설을 지시했다고 보고했습니다.\n\n기존 시설보다는 덜 통제되며, 거주자들은 덜 규칙적인 생활을 하게 될 것입니다. 앞으로 §Y행성 안정도에 부정적인 영향§!을 줄 것 같습니다. 시설 전체를 교체해야 할지도 모릅니다."
 MESSAGE_GIGA_ELYSIUM_LIVESTOCK_PENS_TITLE:0 "규제 없는 가축 이전"
 MESSAGE_GIGA_ELYSIUM_LIVESTOCK_PENS:0 "§Y$SYSTEM$§! 성계 내 §Y$PLANET$§!의 집이 없는 가축 £pop£ §Y팝§!들이 §Y$d_giga_elysium_livestock_pens$§!로 이전되었습니다."
 d_giga_elysium_livestock_pens:0 "임시 가축 울타리"
 d_giga_elysium_livestock_pens_desc:0 "우리의 표준 시설보다는 덜 통제되는 이 울타리는 우리의 \"손님들\"에게 추가적인 자유를 제공합니다. 너무 많이 제공하는 것일지도요."
 giga_elysium.006.name:0 "[From.GetName] 해체됨"
 giga_elysium.006.desc:0 "[fromfrom.GetName] 상공의 엘리시움 기지가 성공적으로 해체되었고, 지상 행정부로 통제권이 넘어갔습니다.\n\n남아있는 모든 주민들은 지상으로 이전되었으며, 기지의 잔재가 궤도에서 벗어났습니다."
 giga_elysium.006.desc.egal:0 "[fromfrom.GetName] 상공의 엘리시움 기지가 성공적으로 해체되었고, 엘리트들 도망쳤으며 그들의 억압적인 군림은 끝났습니다.\n\n남아있는 모든 주민들은 지상으로 이전되었으며, 기지의 잔재가 궤도에서 벗어났습니다."
 giga_elysium.006.desc.gestalt:0 "[fromfrom.GetName] 상공의 엘리시움 기지가 성공적으로 해체되었고, 지상 시설로 통제권이 이전되었습니다.\n\n남아있는 모든 드론들은 지상으로 이전되었으며, 기지의 잔재가 궤도에서 벗어났습니다."
 giga_elysium.006.good:0 "속이 시원하군요."
 district_giga_elysium_housing:0 "거주 지구"
 district_giga_elysium_housing_plural:0 "거주 지구"
 district_giga_elysium_housing_desc:0 "시뮬레이션된 시골 지역에 설치된 넓은 거주 공간으로, 고속 통신 기반 시설에 직접 연결할 수 있습니다."
 district_giga_elysium_control:0 "행성 통제 센터"
 district_giga_elysium_control_plural:0 "행성 통제 센터"
 district_giga_elysium_control_desc:0 "행성 활동을 위한 신경 중추로, 그곳의 감독자들은 아래의 시민들이 규정을 준수하도록 합니다."
 district_giga_elysium_admin:0 "행정 지구"
 district_giga_elysium_admin_plural:0 "행정 지구"
 district_giga_elysium_admin_desc:0 "기지와 아래 행성간의 통신을 관리하는 거대한 행성 시설입니다."
 district_giga_elysium_science:0 "연구 지구"
 district_giga_elysium_science_plural:0 "연구 지구"
 district_giga_elysium_science_desc:0 "제국의 최고 두뇌들이 모여 방해받지 않고 일할 수 있는 첨단 기술 연구실입니다."
 district_giga_elysium_entertainment:0 "오락 지구"
 district_giga_elysium_entertainment_plural:0 "오락 지구"
 district_giga_elysium_entertainment_desc:0 "대중을 만족시키기 위해 무한한 콘텐츠를 생산할 수 있는 전파 매체 생산의 중심지입니다."
 building_giga_elysium_host_capital:0 "엘리시움 행성 통제 센터"
 building_giga_elysium_host_capital_plural:0 "엘리시움 행성 통제 센터"
 building_giga_elysium_host_capital_desc:0 "상급자들을 대신해 행성을 관리하는 지역 관료들의 자리입니다."
 building_giga_elysium_host_major_capital:0 "엘리시움 행성 통제 복합 건물"
 building_giga_elysium_host_major_capital_plural:0 "엘리시움 행성 통제 복합 건물"
 building_giga_elysium_host_major_capital_desc:0 "지역 시민과 궤도의 상급자들 중간에서 중재하는 주요 행성 시설입니다."
 giga_elysium_dystopian_stability_desc:0 "\n§H$civic_dystopian_society$:§!(이)가 추가적으로 오비탈 엘리시움의 §Y50%§!의 £stability£ §Y안정도§!를 얻습니다."
 building_giga_elysium_host_hive_capital:0 "엘리시움 행성 시냅스 접속점"
 building_giga_elysium_host_hive_capital_plural:0 "엘리시움 행성 시냅스 접속점"
 building_giga_elysium_host_hive_capital_desc:0 "1차 시냅스 중계기로, 군체 의식은 이를 통해 행성 기능을 관리합니다."
 building_giga_elysium_host_hive_major_capital:0 "엘리시움 행성 시냅스 군집"
 building_giga_elysium_host_hive_major_capital_plural:0 "엘리시움 행성 시냅스 군집"
 building_giga_elysium_host_hive_major_capital_desc:0 "1차 시냅스 중계기로, 군체 의식은 이를 통해 행성 개발과 계획에 집중합니다."
 building_giga_elysium_host_machine_capital:0 "엘리시움 행성 중계 접속점"
 building_giga_elysium_host_machine_capital_plural:0 "엘리시움 행성 중계 접속점"
 building_giga_elysium_host_machine_capital_desc:0 "저 위의 기지로부터 오는 지시를 수행하는 신호 중계 허브입니다."
 building_giga_elysium_host_machine_major_capital:0 "엘리시움 행성 중계 연결체"
 building_giga_elysium_host_machine_major_capital_plural:0 "엘리시움 행성 중계 연결체"
 building_giga_elysium_host_machine_major_capital_desc:0 "궤도가 보내는 명령을 처리하는 강력한 행정 허브이자 중계 시설입니다."
 building_giga_elysium_host_jobs:0 "고용부"
 building_giga_elysium_host_jobs_plural:0 "고용부"
 building_giga_elysium_host_jobs_desc:0 "일자리가 할당되고 할당량이 발행되는 광범위한 정부 기관입니다."
 building_giga_elysium_host_jobs_effect:0 "§Y$@giga_elysium_jobs_per_100|*0$§! £job£ 직업을 제공하며, 이는 행성의 §Y100§! £pop£ 팝마다 해당하며, 우리 §Y제국 유형§! 및 현재 §Y식민지 지정§!에 적합합니다."
 building_giga_elysium_host_jobs_amenities_effect:0 "행성의 §Y100§! £pop£ 팝마다 §Y$@giga_elysium_jobs_per_100|*0$§! £job£ 일자리를 제공하며, 이는 우리의 §Y제국 유형§! 및 현재 §Y식민지 지정§!에 적합하고, 추가로 £amenities£ §YAmenities§!를 £job_clerk£ §Y$job_clerk$§! 일자리당 제공합니다."
