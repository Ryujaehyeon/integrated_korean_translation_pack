 building_giga_elysium_trash_heap_effect:0 "§Y$amenity$§!를 §Y$@giga_elysium_trash_amenities|%0$§!만큼 제공합니다. 이는 §Y이용 가능한 $amenity$§! 중 §Y$orbital_elysium$§!에 있는 양을 기준으로 합니다"
