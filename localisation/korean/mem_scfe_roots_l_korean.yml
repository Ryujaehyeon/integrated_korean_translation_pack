l_korean:
 SCFE_ROOTS_PROJECT_1:0 "궤도 지배 이니셔티브"
 SCFE_ROOTS_PROJECT_1_DESC:0 "§Y[mem_scfe_roots_planet.GetName]§!의 상황이 점점 더 적대적으로 변해가고 있어, 결정적인 군사 개입이 승인되었습니다. 우리는 식민지에 대한 궤도 통제를 확보하기 위해 중무장한 군사 선박을 파견할 것입니다. 이 전략적 관점에서, 해당 선박은 생태적 위협에 의해 침범당한 행성을 되찾기 위해 설계된 일련의 공격적인 조치를 조정할 것입니다. 승무원은 궤도 폭격부터 강력한 화학 물질의 배포에 이르기까지 다양한 전술을 배치할 준비가 되어 있으며, 외계 생물체가 우리의 제국적 야망에 추가적인 위협을 가하기 전에 근절될 수 있도록 보장할 것입니다."
 SCFE_ROOTS_PROJECT_2:0 "생태계 분석 중"
 SCFE_ROOTS_PROJECT_2_DESC:0 "§Y[mem_scfe_roots_planet.GetName]§!에서 심각해지는 생태적 혼란에 대응하여, 우리는 전담 과학 선박을 보내 행성의 급격히 변화한 생태계를 종합적으로 연구할 것입니다. 최신 생태 및 생물학 연구 기술을 갖춘 이 선박은 행성의 빠른 변화의 비밀을 밝혀내고 환경을 안정화하고 복원할 수 있는 잠재적 방법을 탐구할 것입니다."
 SCFE_ROOTS_PROJECT_3:0 "남아있는 존재"
 SCFE_ROOTS_PROJECT_3_DESC:0 "§Y[mem_scfe_roots_planet.GetName]§!의 복잡한 생태적 및 자기적 교란 속에서, 우리는 행성을 관통하는 끈질긴, 수수께끼 같은 존재를 감지했습니다. 이 존재의 본질을 밝혀내기 위해 우리는 이에 대한 생각을 집중하고, 이 불가사의한 존재와 이해하고 소통할 수 있는 방법을 모색해야 합니다."
 SCFE_ROOTS_PROJECT_4:0 "생태 복구 이니셔티브"
 SCFE_ROOTS_PROJECT_4_DESC:0 "§Y[mem_scfe_roots_planet.GetName]§!의 생태계를 크게 교란시킨 강력한 군사 개입 이후, 우리는 포괄적인 재활 프로젝트를 시작했습니다. 이 이니셔티브는 우리의 이전 공격적인 행동으로 인한 피해를 복구하고 행성의 환경을 원래의 활력으로 되돌리는 것을 목표로 합니다. 고급 생태 복원 기술과 헌신적인 환경 과학자 팀을 활용하여, 이 프로젝트는 자연의 균형을 재확립하고 행성의 식물과 동물의 회복을 촉진하고자 합니다."
 SCFE_ROOTS_PROJECT_5:0 "자기장 복원"
 SCFE_ROOTS_PROJECT_5_DESC:0 "행성의 자기장 불안정화가 게슈탈트 의식의 각성과 고통에 중요한 역할을 했다는 이해를 바탕으로, 우리의 과학자들은 자기장을 원래 상태로 복원하는 야심찬 프로젝트를 제안합니다. 이는 생태계를 안정시키고 행성 의식을 진정시키기를 희망합니다."
 SCFE_ROOTS_PROJECT_6:0 "표적 제거"
 SCFE_ROOTS_PROJECT_6_DESC:0 "우리의 광범위한 분석에서 수집된 데이터를 바탕으로, 과학자들은 게슈탈트 의식의 주요 노드에 대해 표적 화학 확산을 수행하는 계획을 세웠습니다. 이 공격적인 접근 방식은 게슈탈트가 해를 끼치는 능력을 무력화하여 식민지의 안전과 지속성을 보장하는 것을 목표로 합니다."
 SCFE_ROOTS_PROJECT_7:0 "정신 공격"
 SCFE_ROOTS_PROJECT_7_DESC:0 "우리는 사이오닉 능력을 활용하여 정신적 공격을 감행할 것이며, 이는 우리의 식민지에 위협이 될 수 없도록 게슈탈트를 근절하는 것을 목표로 합니다."
 SCFE_ROOTS_PROJECT_8:0 "게슈탈트를 지배하라"
 SCFE_ROOTS_PROJECT_8_DESC:0 "우리는 게슈탈트를 지배하려 시도할 것이며, 그 의지를 제국에 복종시켜 식민지의 생산성과 방어력을 향상시키기 위해 그 능력을 통합할 것입니다."
 SCFE_ROOTS_PROJECT_9:0 "행성의 게슈탈트를 동화하다"
 SCFE_ROOTS_PROJECT_9_DESC:0 "우리는 게슈탈트를 우리의 집단에 평화롭게 동화시키고, 그 의식을 우리의 의식과 융합하려고 합니다."
 decision_mem_scfe_restore_magnetic_field:0 "$SCFE_ROOTS_PROJECT_5$"
 decision_mem_scfe_restore_magnetic_field_desc:0 "이 행성의 자기장을 복원하여 더 살기 좋은 환경으로 만들 수 있습니다."
 decision_mem_scfe_connect_with_nature:0 "자연과의 연결"
 decision_mem_scfe_connect_with_nature_desc:0 "우리는 우리의 의식을 확장하여 전체 생태계와 연결하고 식물이 한계를 넘어 성장하도록 유도할 것입니다."
 decision_mem_scfe_draw_from_nature:0 "자연에서 얻기"
 decision_mem_scfe_draw_from_nature_desc:0 "우리는 우리의 의식을 확장하고 전체 생태계와 연결하여 그것이 심층에서 광물을 끌어내리도록 강요할 것입니다."
 mem_scfe_cant_terraform_special_planet:0 "특수 행성을 테라포밍할 수 없습니다."
 mem_scfe_rooted_magnetic_field:0 "$weak_magnetic_field$"
 mem_scfe_rooted_magnetic_field_desc:0 "이 장소의 자기장이 최근 약해져 방사선에 대한 보호력이 감소했습니다."
 mem_scfe_rooted_nature:0 "$mem_scfe_roots.2.name$"
 mem_scfe_rooted_nature_desc:0 "작물들이 전례 없는 속도로 번성하고 있어 기록적인 수확을 이루고 있지만, 토착 식물이 이제 경작지로 침입하여 작물 밭과 얽히고 수확 과정을 복잡하게 만들고 있습니다."
 mem_scfe_rooted_nature_maintenance:0 "$mem_scfe_roots.2.name$"
 mem_scfe_rooted_nature_maintenance_desc:0 "토착 식물이 전례 없는 속도로 번성하고 있으며, 때때로 우리의 인프라 내에서 자생하고 있어 추가적인 유지 관리 비용이 필요합니다."
 mem_scfe_rooted_doom:0 "운명 지어진 세계"
 mem_scfe_rooted_doom_desc:0 "자연이 우리에게 반란을 일으키고 있으며, 우리를 다시 우주로 내쫓고 있습니다."
 mem_scfe_rooted_crime:0 "선동"
 mem_scfe_rooted_crime_desc:0 "이 행성의 환경은 인구 사이에 증가하는 불만과 불안의 물결을 만들어냈습니다."
 mem_scfe_rooted_bleak:0 "$bleak_planet$"
 mem_scfe_rooted_bleak_desc:0 "$bleak_planet_desc$"
 mem_scfe_rooted_craters:0 "풍부한 분화구"
 mem_scfe_rooted_craters_desc:0 "넓은 분화구가 표면에 흩어져 있어 풍부한 광물 맥이 드러납니다."
 mem_scfe_rooted_death:0 "치명적인 생태계"
 mem_scfe_rooted_death_desc:0 "이 행성의 생태계는 착륙할 용기를 가진 지능적 존재를 파괴하도록 진화하였습니다."
 mem_scfe_roots_chain_title:0 "자연의 각성"
 mem_scfe_roots_chain_desc:0 "자연이 [mem_scfe_roots_planet.GetName]에서 깨어나고 있습니다. 우리는 그것을 이해해야 하며, 그렇지 않으면 맞서야 합니다."
 mem_scfe_roots.2.name:0 "식물 이상현상"
 mem_scfe_roots.2.desc:0 "우리의 §Y[mem_scfe_roots_planet.GetName]§! 식민지가 계속 발전함에 따라, 우리의 과학자들이 이상한 현상을 보고했습니다. 최근 행성의 자기장이 약화된 것이 지역 식물 생명체에 예상치 못한 영향을 미친 것으로 보입니다."
 mem_scfe_roots.2.desc1:0 "$mem_scfe_roots.2.desc$ 농작물이 전례 없는 속도로 번창하고 있어 기록적인 수확을 이루고 있습니다. 그러나 이러한 급속한 성장은 복잡한 문제를 동반하고 있습니다. 토착 식물이 이제 경작지로 침범하여 농작물 밭과 얽히고 수확 과정을 복잡하게 만들고 있습니다."
 mem_scfe_roots.2.desc2:0 "$mem_scfe_roots.2.desc$ 토착 식물이 전례 없는 속도로 번성하고 있으며, 때때로 우리의 인프라 내에서 자생하고 있어 추가적인 유지 관리 비용이 필요합니다."
 CONCERNING:0 "우려되는"
 mem_scfe_roots.4.name:0 "갑작스러운 과다 성장 사건"
 mem_scfe_roots.4.desc:0 "우리 행정부에 §Y[mem_scfe_roots_planet.GetName]§!로부터 놀라운 보고서가 도착했습니다. 하룻밤 사이에, 지역 종의 거대한 나무가 우리의 주요 시설 중 하나의 구조를 뚫고 나와 작동 불능 상태가 되었으며, 상당한 피해를 초래했습니다. 이 사건은 전례가 없으며, 행성의 자기장 변동이 지역 식물의 성장 속도뿐만 아니라 더 많은 것에 영향을 미치고 있을 가능성을 시사합니다. 이 공격적인 식물 행동을 이해하고 잠재적으로 억제하기 위해 즉각적인 조치가 필요합니다."
 mem_scfe_roots.4.a:0 "즉시 도움을 요청합니다."
 mem_scfe_roots.5.name:0 "선동"
 mem_scfe_roots.5.desc:0 "우리 인구 내에서 §Y[mem_scfe_roots_planet.GetName]§!에 대한 흥미로운 발전이 일어나고 있습니다. 지역 식물군이 행성의 변화하는 자기장으로 인해 극적인 변화를 겪으면서, 우리의 식민지는 인구 증가가 급증하였고, 전례 없는 출생 증가가 보고되었습니다. 그러나 이 현상은 인구 사이에서 불안과 동요의 물결이 일어나는 것과 함께 나타났습니다. 초기 평가에 따르면, 환경 변화에 대한 심리생물학적 반응이 기분과 행동에 영향을 미치고 있는 것으로 보입니다. 상황은 악화되고 있으며, 긴장이 고조됨에 따라 범죄자 활동이 증가하고 있습니다. 보다 영구적인 해결책이 마련될 때까지 상황을 안정시키기 위해 부드러운 진정제를 즉시 배포할 것을 권장합니다."
 mem_scfe_roots.8.name:0 "급진적인 변형"
 mem_scfe_roots.8.desc:0 "§Y[mem_scfe_roots_planet.GetName]§!의 생태계 대전환이 경악할 만한 새로운 극단에 도달했습니다. 대륙 전역에서 거대한 균류 탑이 토양에서 솟아올라 그 위압적인 존재감으로 경관을 지배하고 있습니다. 바다에서는 거대한 조류의 광범위한 소용돌이가 불길하게 소용돌이치며 해양 생태계를 변화시키고 있습니다. 이러한 놀라운 변화 속에서 실종에 대한 우려스러운 보고가 증가하고 있으며, 시민들이 점점 더 많이 사라지고 있습니다. 행성의 식물과 동물의 급속한 진화가 통제 불능 상태로 치닫고 있는 것으로 보입니다."
 mem_scfe_roots.8.a:0 "충분합니다. 식민지를 대피시키십시오."
 mem_scfe_roots.8.b:0 "모든 것을 태워버리자, 대가가 무엇이든."
 mem_scfe_roots.8.c:0 "우리 과학자들이 문제를 해결하게 하십시오."
 mem_scfe_roots.8.d:0 "기다려... 뭔가 느껴져."
 mem_scfe_roots.9.name:0 "자연에 대한 전쟁"
 mem_scfe_roots.9.desc:0 "우리의 공격적인 전술은 행성의 생태계를 교란시켜 폭력적인 반발을 일으켰습니다. 그러나 이 반응은 생태적 격변의 중심으로 확인된 미공개 지하 노드를 드러냈습니다. 우리의 고급 무기를 활용하여 이 노드를 표적 삼아 파괴함으로써 즉각적인 위협을 효과적으로 무력화했습니다. 각 노드가 파괴될 때마다 적대적인 식물 활동이 현저히 감소하는 것을 관찰하였고, 결국 생태적 교란이 중단되었습니다. 행성의 생태계는 심각하게 손상되어 광범위한 회복 노력이 필요하지만, 이 격변은 또 다른 기회를 드러냈습니다: 우리의 공격으로 남겨진 분화구는 귀중한 광물로 풍부하여 새로운 자원 잠재력을 제공합니다."
 mem_scfe_roots.9.a:0 "우리는 생태계를 회복할 것입니다."
 mem_scfe_roots.9.b:0 "대신 이 광물을 채굴합시다."
 mem_scfe_roots.10.name:0 "탈출"
 mem_scfe_roots.10.desc:0 "§Y[mem_scfe_roots_planet.GetName]§!의 상황이 급속히 악화됨에 따라, 식민지를 대피시키기로 결정하였습니다. 예측할 수 없고 위험한 생물체의 성장으로 인해 지속적인 거주를 정당화할 수 있는 위험이 너무 큽니다. 우리의 시민들을 안전한 곳으로 이동시키기 위해 첫 번째 셔틀이 준비되었으며, 우리는 한때 유망했던 이 세계를 정복하려는 노력을 마지못해 포기합니다."
 mem_scfe_roots.10.t:0 "종말이 오기 전에 개척민을 다른 세계로 이동시키십시오!"
 mem_scfe_roots.11.name:0 "다시 태어난 세계"
 mem_scfe_roots.11.desc:0 "우리의 헌신적인 노력으로 §Y[mem_scfe_roots_planet.GetName]§!의 황폐화된 생태계를 복원하는 데 성공했습니다. 한때 우리의 공격적인 개입으로 훼손된 이 행성은 이제 다시 생명으로 가득 차 있습니다. 재조림에서부터 토착 동물의 재도입에 이르기까지 광범위한 복원 프로젝트가 행성의 자연 질서를 성공적으로 되살렸습니다. 강물은 깨끗하고 맑게 흐르며, 숲은 지평선 너머로 확장되고, 공기는 번성하는 야생 동물의 소리로 가득 차 있습니다. 이 놀라운 회복은 생태 네트워크를 안정화시켰을 뿐만 아니라 이 세계를 지속 가능성과 조화의 등대으로 변모시켰습니다."
 mem_scfe_roots.12.name:0 "반짝이는 광물"
 mem_scfe_roots.12.desc:0 "이전 개입으로 인해 §Y[mem_scfe_roots_planet.GetName]§!의 생태계가 크게 변화함에 따라, 행성의 새롭게 드러난 광맥을 활용하는 방향으로 전략적 결정을 내렸습니다. 이 선택은 상당한 경제적 기회를 열어줍니다. 우리의 폭격으로 남겨진 광활하고 반짝이는 분화구는 이제 상처가 아닌 귀중한 자산으로 여겨집니다. 이러한 풍부한 광물 자원을 활용하기 위해 채굴 작업이 확대되고 있으며, 이는 우리 제국에 상당한 이익을 약속하고 지속적인 확장과 기술 발전에 필수적인 자재 공급을 확보하는 데 기여할 것입니다."
 mem_scfe_roots.13.name:0 "행성의 각성"
 mem_scfe_roots.13.desc:0 "우리 과학팀이 수행한 포괄적인 분석은 §Y[mem_scfe_roots_planet.GetName]§!의 생태계에 대한 놀라운 진실을 밝혀냈습니다. 행성의 식물군의 모든 요소는 방대한 상호 연결된 네트워크의 일부로, 지금까지 휴면 상태에 있던 행성 규모의 게슈탈트 의식입니다. 우리의 식민지 개척 노력과 행성의 변화하는 자기장의 불안정한 영향이 결합되어 이 지각 있는 존재에게 깊은 상처를 입혔습니다. 이제 게슈탈트가 깨어나고 고통받고 있으며, 최근의 파괴적인 사건들을 촉발하고 있습니다."
 mem_scfe_roots.13.a:0 "우리가 침략한 것은 그들의 세계입니다. 우리는 떠나야 합니다."
 mem_scfe_roots.13.b:0 "자기장을 복원합시다."
 mem_scfe_roots.13.c:0 "이제 우리의 적을 알게 되었습니다. 불태웁시다."
 mem_scfe_roots.14.name:0 "화학적 억제"
 mem_scfe_roots.14.desc:0 "계산적이고 단호한 캠페인을 통해, 우리 제국은 전략적으로 목표화학 확산을 사용하여 §Y[mem_scfe_roots_planet.GetName]§!에서 게슈탈트 의식을 성공적으로 무력화했습니다. 이 극단적인 조치는 한때 생기 넘치고 상호 연결된 생태계를 효과적으로 억제하여 행성을 길들였지만 생태적으로 약화시켰습니다. 게슈탈트가 제기한 즉각적인 위협은 제거되었지만, 환경은 우리의 개입의 상처를 지니고 있습니다. 그럼에도 불구하고, 행성은 여전히 우리의 통제 하에 있으며, 남아 있는 자원은 이제 자아를 가진 생태계의 복잡성 없이 착취하기 더 용이해졌습니다."
 mem_scfe_roots.15.name:0 "자기장 복원"
 mem_scfe_roots.15.desc:0 "우리의 과학자와 공학자들의 끊임없는 노력 덕분에 §Y[mem_scfe_roots_planet.GetName]§!의 자기장을 원래 상태로 성공적으로 복원하였습니다. 이 기념비적인 성과는 행성 관리의 전환점을 의미합니다. 자기장의 안정화는 생태적 불안을 진정시켰을 뿐만 아니라 행성의 자연 주기와 과정을 활성화하였습니다. 초기 보고서에 따르면 식물과 동물의 불규칙한 행동이 크게 감소하였으며, 생태계가 회복과 균형의 조짐을 보이기 시작하고 있습니다."
 mem_scfe_roots.16.name:0 "다섯 번째 눈을 통해"
 mem_scfe_roots.16.desc:0 "우리의 정신적 탐사는 §Y[mem_scfe_roots_planet.GetName]§!의 생명의 상호 연결된 본질에 대한 심오한 통찰을 가져왔습니다. 우리는 이곳의 모든 생물체가 이제 깨어나고 있는 거대한, 잠재된 게슈탈트 의식과 연결되어 있음을 발견했습니다. 우리의 식민지에서 촉발된 급격한 환경 변화가 그것에게 큰 고통을 안겼습니다. 이 지식을 바탕으로, 우리는 앞으로 어떻게 나아갈지를 결정해야 합니다."
 mem_scfe_roots.16.a:0 "정신적 공격을 감행합니다."
 mem_scfe_roots.16.b:0 "이 집단을 통제해 보십시오."
 mem_scfe_roots.16.c:0 "이 존재를 동화하려고 시도합니다."
 mem_scfe_roots.17.name:0 "게슈탈트 제거"
 mem_scfe_roots.17.desc:0 "§Y[mem_scfe_roots_planet.GetName]§!에 대한 게슈탈트 의식에 대한 우리의 결정적인 정신 공격이 성공을 거두었습니다. 한때 감각적이고 상호 연결된 생태계는 우리의 존재와 환경 변화에 distress로 반응했으나, 이제 효과적으로 무력화되었습니다. 한때 그것을 통합하고 보호했던 게슈탈트의 영향력이 사라지면서, 행성의 식물군은 정상 상태로 되돌아가고 있으며, 경관 전반에 걸쳐 안정화되고 있습니다."
 mem_scfe_roots.18.name:0 "지배의 격식"
 mem_scfe_roots.18.desc:0 "Zro 먼지의 강력한 특성을 활용하여 우리의 능력을 강화함으로써 우리는 엄청난 업적을 달성했습니다. 우리는 §Y[mem_scfe_roots_planet.GetName]§!의 게슈탈트 의식을 성공적으로 지배하여 우리의 의지에 굴복시켰습니다. 한때 독립적이었던 이 생태계는 복잡한 생명망을 지니고 있으며, 이제는 우리 제국의 통제의 연장선으로 작용합니다. 게슈탈트가 행성의 식물과 동물에 미치는 포괄적인 영향을 활용하여 우리는 이제 이 세계를 우리의 필요와 야망에 완벽하게 맞춘 맞춤형 낙원으로 변화시킬 수 있는 위치에 있습니다. 완전히 우리의 지배 아래 있는 이 생태계는 진정한 낙원을 약속합니다."
 mem_scfe_roots.19.name: ""
 mem_scfe_roots.19.desc:0 "우리의 정신은 §Y[mem_scfe_roots_planet.GetName]§!의 총체를 완전히 동화시켰습니다. 이 통합은 단순히 우리의 인지 범위를 확장한 것이 아니라, 우리를 근본적으로 변화시켰습니다. 우리는 다시 태어났습니다. 이 행성의 모든 풀잎을 통해 뻗어 나가고, 우리 지휘 아래의 모든 드론에 닿는 새로운 집단 의식입니다. 이 심오한 결합으로 우리의 인식은 깊어졌고, 생명과 존재에 대한 비할 데 없는 이해를 부여받았습니다. 우리의 연결은 이제 이 세계를 넘어 확장되어, 먼 행성의 식물을 감지하고 영향을 미치며, 광대한 새로운 길을 열고 있습니다."
 mem_scfe_roots.20.name:0 "여파"
 mem_scfe_roots.20.desc:0 "§Y[mem_scfe_roots_planet.GetName]§!의 생태계는 심각하게 손상되었지만, 우리가 충분한 노력을 기울인다면 복구할 수 있습니다."
 mem_scfe_roots.23.name:0 "자연의 보복"
 mem_scfe_roots.23.desc:0 "§Y[mem_scfe_roots_planet.GetName]§!의 생태계가 우리의 식민지에 대한 전면적인 분노를 발산했습니다. 거대한 뿌리가 땅을 찢고, 우리의 도시를 막을 수 없는 힘으로 파괴했습니다. 깊은 균열이 열리며 건물과 인프라를 통째로 삼켜버렸습니다. 이제 풍경은 황폐의 정경이 되었습니다. 먼지가 가라앉으면서, 섬뜩한 촉수가 부서진 지형을 기어 다니며 추가적인 교란의 징후를 탐색하고 있습니다. 이제 살아있는 요새가 된 이 행성은 모든 외계 생명체에게 불모의 땅이자 치명적인 장소가 되었습니다."
