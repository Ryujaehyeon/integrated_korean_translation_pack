 job_elven_malevolent_grove_researcher:0 "악의적인 숲 연구원"
 job_elven_malevolent_grove_researcher_plural:0 "악의적인 숲 연구원"
 job_elven_malevolent_grove_researcher_desc:0 "숲에 서식중인 나무처럼 생긴 생명체에 대한 다양한 연구를 통해 많은 것을 밝혀내고 있습니다. 아마도 충분히 안전하리라 생각되는 거리를 두고서요."
