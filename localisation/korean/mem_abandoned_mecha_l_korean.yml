l_korean:
 d_mem_abandoned_mecha:0 "메카의 무덤"
 d_mem_abandoned_mecha_desc:0 "고대 전장에 흩어진 파괴된 전투 기계의 잔해는 우리 공학자들에게 지속적인 영감을 제공합니다."
 mem_abandoned_mecha_category:0 "특이한 구조물"
 mem_abandoned_mecha_category_desc:0 "방사성 연대 측정을 통해 [From.GetName](이)가 약 800년간의 핵겨울을 거쳐왔음을 밝혀냈습니다. 이곳의 표면에는 한때 이 행성을 뒤덮고 있었을 어떤 문명의 폐허가 곳곳에 존재합니다. 그러나 궤도에서도 관측할 수 있을 만큼 거대한 이 유적들은 지금껏 발견된 어떠한 고고학적 유적지와도 아무런 관련이 없습니다."
 mem_abandoned_mecha.10.name:0 "버려진 메카"
 mem_abandoned_mecha.10.desc:0 "[From.GetName]의 고대 문명들은 핵무기가 발명되기 훨씬 이전부터 전 세계적인 갈등 상태에 있었던 것으로 보입니다. 과학자 [Root.leader.GetName]의 연구에 따르면, 핵 기술이 이론화되기 이전에 [From.GetName]의 문명들은 더 크고 치명적인 재래식 전쟁 무기를 만드는 데 상당한 노력을 기울였습니다. 특히, 그들은 [root.owner.GetSpeciesNamePlural]의 전차와 유사한 장갑 이족 보행기, 삼족 보행기 및 사족 보행기 기계를 개발했습니다. [Root.leader.GetName]은 이러한 무기를 "메카"라고 명명했습니다.\n\n수십 년간 이러한 기계로 전쟁을 치른 후 핵 분열이 발견되었다는 기록이 번역되었습니다. 힘의 균형이 바뀌었고, 원자 폭탄이 신속하게 설계되었습니다. 양측 모두 대량의 재고를 쌓을 시간이 없었기 때문에(상호 확증 파괴 개념을 형성할 수 없었기 때문에), 폭탄은 사용 가능해지자마자 투하되었고, 이로 인해 이러한 문명들은 그러한 무기의 장기적인 영향을 직접 경험하게 되었습니다.\n\n이제 버려진 메카가 표면에 흩어져 있습니다. 잔해에서 발견되는 대부분의 기술은 우리의 관점에서 구식이지만, 메카는 기계에 대한 새로운 시각을 제공합니다. 많은 메카가 반쯤 조립된 상태, 완전한 상태, 반파괴된 상태로 발견되기 때문에, 우리는 이들을 연구할 수 있는 충분한 기회를 가지고 있습니다."
 mem_abandoned_mecha.20.name:0 "특이한 유적"
 mem_abandoned_mecha.20.desc:0 "스캔 결과 [From.From.GetName]의 유적은 첫눈에 흥미롭지 않은 것으로 나타났습니다. 그러나 이제 멸종한 건축가들은 독특한 건축 양식을 가지고 있었던 것으로 보입니다. 불행히도, 건물은 연구하기에는 너무 많이 훼손되었습니다."
 mem_abandoned_mecha.20.a:0 "아주 좋군."
