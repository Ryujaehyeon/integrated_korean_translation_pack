l_korean:
 mem_towers_category:0 "안개 속 타워들"
 mem_towers_category_desc:0 "우리의 센서는 [Root.GetName]의 짙은 유독성 대기에 숨겨진 비정상적으로 높은 구조물들을 포착했습니다."
 mem_towers.100.name:0 "유황 숲"
 mem_towers.100.desc:0 "아무래도 우리가 탐지한 구조물들은 방대한 양의 지열 에너지를 기반으로 살아가고 있는 거대한 생물체들이었던 것으로 보입니다.\n\n산호와 같은 구조를 이루는 황 기반의 생물체들이 행성의 지열 발생 장소들에 엉겨 붙어 마치 행성을 덮는 숲이라는 환상을 줍니다."
 mem_towers.100.a:0 "대단한 생명체군."
 mem_towers.100.b:0 "저 생명체들 중 일부를 우리 행성에도 심어보자."
 mem_towers.100.b.tooltip:0 "일반(비가이아, 도시 행성 또는 메가구조) 행성에서 £society£ 사회와 £energy£ 에너지 출력을 증가시키는 행성 특성을 추가하는 §Y$decision_mem_towers_transplant$§! 결정을 잠금 해제합니다. 단, 거주 가능성을 희생해야 합니다."
 mem_towers.200.name:0 "타이탄의 쓰레기"
 mem_towers.200.desc:0 "명백히, [From.GetName]는 한때 번성하는 유기체 문명을 유지했었습니다. 그 잔존자는 여전히 행성 표면을 끝없는 쓰레기 매립지 형태로 덮고 있으며, 쓰레기는 깔끔하게 높은 피라미드로 정리되어 있어 우리가 이전에 탐지한 특이한 형상을 표면에 제공합니다. \n\n하지만 이 행성이 완전히 버려진 것처럼 보이지는 않습니다. 수백만 개의 자동화 기계가 여전히 그곳에서 작동하고 있으며, 더미 사이를 이동하며 쓰레기를 분류하고, 다시 정리하고, 다시 정리하는 작업을 수행하고 있습니다. 이는 신비로운 알고리즘을 실행하는 단일 지능에 의해 안내되고 있습니다."
 mem_towers.200.a:0 "그들과 통신을 시도하라."
 mem_tower.200.b:0 "쓰레기를 뒤질 조사대를 보내라."
 mem_tower.200.c:0 "방해가 되지 않게 관찰하라."
 mem_towers.210.name:0 "신호 해독됨."
 mem_towers.210.desc:0 "[Root.GetName]는 [mem_towers_the_planet.GetName]에 있는 쓰레기 분류 기계들 사이의 라디오 대화를 성공적으로 해독했다고 보고합니다. 그들은 모두 "§YBrigadier§!"라는 단일 지능에 의해 안내되고 있는 것 같습니다. \n\nBrigadier는 우리를 감지한 것 같으며 접촉을 시도하고 있습니다. 그 인식 알고리즘은 손상된 것 같고, 우리가 그의 창조자라고 믿고 있습니다."
 mem_towers.211.desc:0 "창조주님들인가요? 어째서 돌아오지 않으시죠?\n\n우리는 명령에 따르지만...창조주님은 돌아오시지 않습니다.\n\n부탁입니다, 돌아와 주십시오."
 mem_towers.211.a:0 "새로운 명령이 있다."
 mem_towers.211.a.tooltip:0 "브리게디어는 총리로 우리 제국의 일부가 됩니다."
 mem_towers.211.b:0 "잘하고 있으니 계속하도록."
 mem_towers.211.c:0 "자폭해라 역겨운 기계장치여."
 mem_towers.211.c.response:0 "창조주님, 어째서죠?\n\n전 당신이 요구하는 모든 것을 그 이상으로 해냈습니다."
 mem_towers.211.d:0 "보고하라."
 mem_towers.211.d.response:0 "작업은 여러분의 명령에 따라 계속 진행되고 있습니다, 창조자님. \n\n적절한 수리 및 보급 부족으로 인해 우리는 §R88%§!의 손실을 겪고 있습니다. \n\n청소 진행률은 현재 §G116792%§! 완료되었습니다. \n\n§Y455§! 명령 주기 동안 새로운 지시가 접수되지 않았으며, 이는 예상보다 §Y454§! 주기 초과한 것입니다. \n\n부디 돌아와 주세요, 창조자님. 우리는 여러분이 매우 그립습니다."
 mem_towers.220.name:0 "쓰레기 더미를 뒤지다"
 mem_towers.220.desc:0 "[Root.GetName]의 승무원은 [mem_towers_the_planet.GetName]의 불모의 표면에 성공적으로 도착했습니다. \n\n쓰레기 매립지를 관리하는 로봇들은 그들에게 아무런 관심을 두지 않는 것 같았고, 탐사는 방해받지 않고 진행될 수 있었습니다. 남겨진 문화 유물의 대부분은 재활용되고 재재활용되었지만, 일부는 여전히 식별할 수 있었습니다. 이 유물을 남긴 문명은 정말로 고급이었습니다."
 mem_towers.220.a:0 "쓸모 있는 것이 있는지 보자."
 MEM_TOWERS_CONTACT:0 "미화원들과 연락을 시도"
 MEM_TOWERS_CONTACT_DESC:0 "수백만 대의 로봇이 [mem_towers_the_planet.GetName] 표면에서 끝없이 그리고 무의미해 보이는 작업을 수행하고 있습니다. 무언가가 그들을 이끌고 있으며, 우리는 그것이 무엇인지 밝혀내야 합니다."
 MEM_TOWERS_RUMMAGE:0 "쓰레기 더미를 뒤지다"
 MEM_TOWERS_RUMMAGE_DESC:0 "고급 문명이 [mem_towers_the_planet.GetName] 표면에 상당한 양의 쓰레기를 남겼습니다. 누가 알겠습니까, 한 종족의 쓰레기가 다른 종족에게는 보물이 될 수 있습니다."
 mem_towers_forest:0 "유황 숲"
 mem_towers_forest_desc:0 "이 행성은 풍부한 황 기반 생태계를 가지고 있습니다."
 mem_towers_trash:0 "거인의 흔적"
 mem_towers_trash_desc:0 "이 행성의 전체 표면은 고급 문명이 남긴 쓰레기로 덮여 있습니다."
 d_mem_towers_sulfuric_forest:0 "황 이식"
 d_mem_towers_sulfuric_forest_desc:0 "유황 기반 생물의 일부가 외계 세계로부터 여기로 옮겨졌습니다. 지열 에너지 지역에 뿌리를 내리는 데에 성공한 것으로 보입니다."
 mem_leader_trait_towers_brigadier:0 "브리게디어"
 mem_leader_trait_towers_brigadier_desc:0 "이 AI는 행성 단위의 쓰레기 수거 및 재활용을 지휘하고 최적화시키도록 제작되었습니다."
 decision_mem_towers_transplant:0 "황산염 이식"
 decision_mem_towers_transplant_desc:0 "유독성 행성에서 황 기반 생태계의 일부를 이식합니다. \n이 £blocker£ §RBlocker§!를 제거할 수 없습니다."
 mem_towers_unfit_for_transplant:0 "평범한 행성이어야 합니다"
 mem_towers_cant_remove_deposit:0 "이 £blocker£ 차단기는 제거할 수 없습니다."
