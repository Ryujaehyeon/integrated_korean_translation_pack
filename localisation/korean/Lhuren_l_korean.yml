 mod_pop_elven_dragon_strategist_bonus_workforce_mult:0 "$job_elven_dragon_strategist_plural$ 직업 효율"
 d_elven_planetary_sentient_dragons:0 "자각있는 용들"
 d_elven_planetary_sentient_dragons_desc:0 "아마로 파충류로 추측되는 이 불가사의한 기원의 이 종은 분명히 우리 행성에 살고 있습니다. 의사소통은 항상 이 용들에 의해 시작되고 일반적으로 그들의 말을 이해하긴 어렵습니다. 수천년동안의 전쟁과 대부분의 국가들이 바로 그들의 숨은 조언에 의해 형성되었죠. 무엇이 그들이 우리를 관심있어 하는지, 그들의 인구가 얼마인지, 또는 그들이 어디에서 사는건지조차 과학적 탐구 정신으로 무장된 사람들조차 이들에 대한 연구를 피했습니다.  그래서 우리가 오직 알 수 있는 사실은 그들이 존재한다는 것 하나 뿐입니다."
 d_elven_planetary_sentient_dragons_blocker:0 "£blocker£ 감각 있는 드래곤"
 d_elven_planetary_sentient_dragons_blocker_desc:0 "$d_elven_planetary_sentient_dragons_desc$"
 d_elven_planetary_gardens_of_heaven:0 "천상의 정원"
 d_elven_planetary_gardens_of_heaven_desc:0 "의심스러운 증거를 가진 환상적인 전설에서는 어떻게 이 정원이 탄생되었는지 말합니다. 일부는 신학자들이 직접 건설했다고 말하고, 다른 주장으로는 어떤 지도자가 건설을 지시한 이후 계속 확장된 것이라고 주장합니다. 무엇이 기원이던간에 이 정원은 지금은 궤도에서조차 눈으로 쉽게 볼 수 있을 만큼 거대한 면적을 차지하며 중요한 일이 있을때마다 이 정원은 우리가 이루어낸 창조성의 상징이 되었습니다."
 d_elven_planetary_gardens_of_heaven_blocker:0 "£blocker£ 천상의 정원"
 d_elven_planetary_gardens_of_heaven_blocker_desc:0 "$d_elven_planetary_gardens_of_heaven_desc$"
 d_elven_planetary_forbidden_arcology:0 "금지된 고고학"
 d_elven_planetary_forbidden_arcology_desc:0 "'서민과 떨어져 살자'는 제안에서 시작되었다는 전설이 있다. 그것은 위대한 과학자와 엔지니어 모두의 마음에 부담을 주는 무언가의 건설로 끝났습니다. 대기를 꿰뚫을 만큼 높은 거대한 건물. 완전히 자급 자족하는이 도시 크기의 건물에는 사회 엘리트가 있습니다. 무단 침입 시도에 대한 처벌은 가혹합니다.\n§G행성도시로 테라포밍하면 변환됩니다!§!"
 d_elven_lhuren_helemar:0 "허수의 가장자리"
 d_elven_lhuren_helemar_desc:0 "어쩌면 우주적 하찮음은 양방향으로 작용하는지도 모릅니다. 아원자 요소가 우리에게 측정 불가능해지기 전까지 작아질 수 있는 한계가 있듯, 우리 자신도 우리 우주보다 훨씬 큰 존재 범위를 측정하기에는 너무 작은 것은 아닐까요?"
 d_elven_lhuren_gilgezu:0 "수정질 네크로폴리스"
 d_elven_lhuren_gilgezu_desc:0 "무한한 가능성의 교차로가 하나의 결말로 이어지는 선택의 환상에 불과하다면, 왜 생명은 본능적으로 각 길을 탐험하도록 이끌리는 걸까요?"
 r_elven_flaming_pearl:0 "타오르는 진주"
 r_elven_flaming_pearl_desc:0 "기원을 알 수 없는 이상한 물체이며, 우리가 알고 있는 많은 과학적 법칙을 거스르는 성질을 가진 미확인 물질로 구성되어있습니다.\n\n더욱 놀라운 것은, 이곳에 불을 붙이면 나는 향기가 용종을 끌어들이는 것 처럼 보인다는 것입니다.\n\n전설에 따르면, 진주의 소유자의 가치를 용이 알게 된다면 소원을 들어준다고 합니다. 어쩌면, 사실일지도 모르겠습니다."
 elven_relic_flaming_pearl_active:0 "용들을 불러내고...\n§Y누가 알겠어요?§!"
 elven_relic_events.0101.name:0 "용의 둥지"
 elven_relic_events.0101.desc:0 "제각기 다른 9마리의 용이 불에 응답하여 나타났습니다. 서로 난잡하게 지껄이기만 할 뿐이었으나, 이 기회를 놓치지 않고 §Y[Root.GetRulerTitle] [Root.GetRulerName]§!는 용을 설득하여 가장 큰 미스터리, 그들이 어디에서 왔는지를 물었습니다.\n\n용들은 [Root.Ruler.GetHimHer]에게 이 사실을 알려주게 되어 기쁜 것 처럼 보였습니다. 각기 다른 대답으로 낯설고, 추상적이고, 모순적인 대답이었으나 9마리의 용 모두가 서로의 의견이 진리이며 세세한 내용이 생략되지 않았다는 것에 동의하는 것 처럼 보였습니다.\n\n결국 [Root.GetRulerTitle]는 진실을 밝혀내는 것이 불가능하다는 것을 깨닥았습니다. 그럼에도 몇몇 학자들은 용들은 정직했으나 우리가 스스로 그 답에 도달하기를 바랬다는 이론을 제시했습니다."
 elven_relic_events.0101.a:0 "다른걸 기대해도 될까?"
 elven_relic_events.0102.name:0 "수수께끼같은 수수께끼"
 elven_relic_events.0102.desc:0 "한 용이 나타나 특이한 거래를 제안했습니다. 자신이 한번의 기회에서 답할 수 없었던, 수수께끼에 불과한 '무한값'에 대한 것을요.\n\n그것은 §Y[Root.GetRulerTitle] [Root.GetRulerName]§!이 처음에 예상했던 것 보다 어렵다는 것이 입증되었으며, 마침내 [Root.Ruler.GetSheHe]는 용의 발걸음을 멈추게 할 만큼 재치있는 답을 내놓을 수 있었습니다. 감명받은 용은 거래의 대가로 우리에게 또다른 수수께끼를 내주었습니다.\n\n[Root.GetName]의 온갖 석학들이 달려들어 수수께끼를 풀다가 지쳐 잠들었으나, 이들의 정신은 그 어느때보다도 맑아졌습니다."
 elven_relic_events.0102.a:0 "아...거의 다 풀었는데!"
 elven_relic_events.0103.name:0 "비늘 헤아리기"
 elven_relic_events.0103.desc:0 "허영심 많은 드래곤이 호출에 응답하여 [Root.GetSpeciesName]이 그녀의 윤이 나는 비늘을 감상하는 것만으로도 우주의 모든 비밀을 알아낼 수 있다고 주장했습니다. 사실, 그녀는 §Y[Root.GetRulerTitle] [Root.GetRulerName]§!에게 [Root.Ruler.GetHimHer]의 백성이 큰 돌파구를 맞이할 것이라고 기꺼이 약속했습니다. 만약 [Root.Ruler.GetSheHe]가 그녀의 몸에 있는 아름다운 비늘을 직접 세어본다면 말입니다.\n\n최종 개수는 백십육 개로 드러났지만, 그 과정에서 [Root.GetRulerTitle]는 고르지 않은 간격을 발견했습니다. 허영심 많은 드래곤의 분노를 사지 않기 위해 결점을 지적하기보다는, [Root.Ruler.GetSheHe]는 정확히 백십칠 개의 비늘이 있다고 거짓말을 했습니다.\n\n답변에 만족한 드래곤은 [Root.GetRulerName]의 부지런함을 칭찬하고 떠났습니다.\n\n그녀가 떠난 후 한 개의 비늘이 남았고, 과학자들은 그것을 조사하기를 기다릴 수 없습니다."
 elven_relic_events.0103.a:0 "과학을 위해서라면..."
 elven_relic_events.0104.name:0 "억겁의 지혜"
 elven_relic_events.0104.desc:0 "지혜로운 늙은 용이 찾아와, §Y[Root.GetRulerTitle] [Root.GetRulerName]§!가 준비한 제물을 받아들고선 그 은혜를 갚겠다 말했습니다. 그러나 용이 전해주는 이야기는 너무나 오래되어, [Root.Ruler.GetSheHe]는 그 이야기의 원류가 이 우주에 존재하는 것일지 확신하지 못했습니다.\n\n[Root.GetRulerTitle]는 많은 의문점이 있었으나, [Root.Ruler.GetSheHe]가 질문을 하려고 하면 다른 용이 나타나 다른 이야기를 시작하고, 또 다른 질문을 하려고 하면 다른 용이 나타나 다른 이야기를 시작하기를 반복했습니다.\n새로운 용들이 계속 오고가며, 마치 [Root.GetRulerName]는 보이지도 않는다는 듯 자신들끼리 이야기를 이어나갔습니다. 처음 이야기를 들을 때를 제외하고는 단 한차례도 끼어들 틈이 없었습니다만, [Root.Ruler.GetSheHe]는 새로운 이야기를 들으며 배우는 것에 만족했습니다.\n\n[Root.GetRulerTitle]의 이 만남에 대한 기억은 [Root.GetName]가 예술가들에게 이 이야기를 아름답게 묘사할 수 있는 영감을 주었습니다."
 elven_relic_events.0104.a:0 "그러나 이 이야기가 정말로 사실일까?"
 elven_relic_events.0105.name:0 "겸손에 대한 교훈"
 elven_relic_events.0105.desc:0 "§Y[Root.GetRulerTitle] [Root.GetRulerName]§!는 진주에 불을 붙이고 처음에는 몇 시간, 그리고 며칠 동안 용의 출현을 기다렸습니다, 마침내 불꽃이 흔들리고 사그라들었습니다.\n\n부적을 쓰는 의식을 따르고 유혹적인 제물을 준비했음에도 불구하고 [Root.GetRulerName]의 소환은  무시된 것 같았습니다. 그러나 이는 당연했을지 모릅니다, 진주는 [Root.Ruler.GetHimHer]에게 그들을 뛰어넘는 힘을 주지도 않았고, 단지 주의를 끌 뿐이였습니다. 아마 아무도 이번에는 단순히 접근하고 싶은 변덕이 없었을 수도 있습니다.\n\n그 외에는 그 경험이 [Root.GetRulerTitle]에게 많은 생각을 하게 했고, 그는 겸허하게 받아들였습니다."
 elven_relic_events.0105.a:0 "예측할 수 없는 생물."
 elven_relic_events.0106.name:0 "관대한 빗줄기"
 elven_relic_events.0106.desc:0 "작고 불쌍한 용 한 마리가 의식 장소로 다가와 배고픈 것을 먹여달라고 부탁했습니다.\n\n§Y[Root.GetRulerTitle] [Root.GetRulerName]§!는 기꺼이 그 생명체의 요구를 받아주고, 음식을 준비하도록 명령했습니다. 용은 요리사에게 그것이 무엇이며 어떻게 준비했는지 자세히 설명하도록 요청했고, 설명하자 용은 거부하고 다른 음식을 요구했습니다. 상황은 여덟 번 이상 반복되었고, 그 시점에서 드래곤은 마침내 자신의 궁금증이 풀렸다고 선언했습니다.\n\n그 대가로 그는 모든 [Root.GetAdj]의 세계에 생명의 비를 가져다 주어 우리가 더 풍부하고 다양한 요리를 내놓을 수 있도록 하겠다고 약속했습니다."
 elven_relic_events.0106.a:0 "요즘에는 모두가 대식가가 되었습니다..."
 elven_relic_flaming_pearl_rainfall:0 "타오르는 진주: 관대한 빗줄기"
 elven_relic_events.0107.name:0 "영감을 받은 기교"
 elven_relic_events.0107.desc:0 "이번에는 여러 드래곤이 진주에 끌렸지만 그 중 한 마리를 제외하고는 모두 잠시 머뭇거리다가 떠났습니다. 마지막 용은 조금 더 머물다가 다른 용들의 이상한 행동을 설명하도록 설득되었습니다. 결과적으로 그들은 단순히 [Root.GetSpeciesNamePlural]가 지루하고 제안이 관심을 끌 가치가 없다는 것을 알게 되었습니다. 그들은 분명히 '참신함을 잃고' 정체된 우리의 장인 정신을 보고 우리를 그렇게 판단했습니다.\n\n[Root.GetName]의 장인들은 가혹한 판단을 도전과 혁신의 원동력으로 받아들였습니다."
 elven_relic_events.0107.a:0 "용들은 그들의 말을 취소할 것이다."
 elven_relic_flaming_pearl_artifice:0 "타오르는 진주: 영감을 받은 기교"
 elven_relic_events.0108.name:0 "비취의 시대"
 elven_relic_events.0108.desc:0 "비취 용은 부름에 응했지만 말을 하지 않았고, 제시된 제물을 가져가지 않고 대신 선물을 남겼고 그 후 즉시 사라졌습니다. 뜻밖의 유품은 작은 비취 광석으로, 고대부터 천연 광상이 채굴되었다는 점에서 볼 때 오늘날 보기 드문 광경이지만 현대 합성 기술 덕분에 거의 가치가 없었습니다.\n\n그러나 샘플을 더 자세히 조사하면 보석이 소유해서는 안 되는 물리적 특성이 밝혀졌습니다. 이 '드래곤 비취'는 우수한 에너지 전도체이며 듀라늄보다 단단하고 대부분의 합성 수정체 수정보다 더 깨끗합니다!\n\n게다가, [Root.GetName] 전역의 광산 시설에 따르면 이 무시무시한 광물이 밤새 눈으로 볼 수 있는 곳까지 솟아올랐습니다!"
 elven_relic_events.0108.a:0 "녹색이 다시 유행하고 있어요!"
 elven_relic_flaming_pearl_jade:0 "타오르는 진주: 비취의 시대"
 elven_relic_events.0109.name:0 "창궁의 권한"
 elven_relic_events.0109.desc:0 "두 마리의 용이 타오르는 진주에게 끌렸고, 둘 다 자신이 유일한 정당한 주인이라고 주장하며 즉시 돌려달라 요구했습니다.\n그들의 관심이 우리에게서 서로에게로 옮겨지기까지는 오랜 시간이 걸리지 않았습니다. 그들은 자신들의 주장에서 물러서지 않고 싸우기 시작했습니다. 처음에는 매우 흥미롭게 볼 수 있었지만 결투는 며칠 동안 계속되었고 부수적인 피해가 행성 및 궤도 기반 시설에 막대한 피해를 입히기 시작했습니다.\n\n그것을 막기 보다는, §Y[Root.GetRulerTitle] [Root.GetRulerName]§!는 둘 사이에 휴전을 제안했습니다. 전투에서 서로를 이길 수 없다는 것이 분명했기 때문에 [Root.Ruler.GetSheHe]는 서로의 타당성을 확신할 수 있을 때까지 [Root.GetName]가 진주의 공정한 금고 역할을 할 것이라고 제안했습니다. [Root.GetRulerTitle]의 안심과 약간의 놀라움으로 라이벌 드래곤들은 의문의 여지 없이 조건을 수락하고 각자의 길을 갔습니다."
 elven_relic_events.0109.a:0 "무슨.... 일이 일어난거지?"
 elven_relic_flaming_pearl_authority:0 "타오르는 진주: 창궁의 권한"
 elven_relic_events.0110.name:0 "천상의 수호자"
 elven_relic_events.0110.desc:0 "모험을 좋아하는 어린 드래곤이 §Y[Root.GetRulerTitle] [Root.GetRulerName]§!에 접근했습니다! [Root.GetSpeciesNamePlural]과 함께 별을 탐험하는 데 관심을 보였습니다. 그 대가로 그는 제한된 시간 동안 제국의 수호자로 활동하겠다고 제안했습니다. 그는 우리 함대와 동행하여 우리 행성의 평화와 안전을 보호할 뿐만 아니라 위험으로부터 그들을 보호할 것입니다.\n\n그가 그 대담한 주장을 정확히 어떻게 이행할 것인지는 두고 봐야 알겠지만 [Root.GetRulerTitle]은 그를 거부할 이유가 없다고 생각했습니다."
 elven_relic_events.0110.a:0 "그리고 그는 너무 사랑스러웠습니다!"
 elven_relic_flaming_pearl_guardian:0 "타오르는 진주: 천상의 수호자"
 war_goal_wg_elven_imperial_tributary:0 "국경 수호"
 war_goal_wg_elven_imperial_tributary_desc:0 "우리의 국경이 지켜지고 그 너머에서 곪아지는 위협이 없도록 하기 위해 평화 유지 노력이 이루어지고 있습니다. 형식적인 공물은 우리 이웃의 우호적인 의도의 증거로 충분합니다.\n\n현상 유지 평화의 경우, 우리가 점유하는 성계은 최소한 하나의 행성을 포함하는 경우 새로운 지류로 해제됩니다."
 cb_elven_celestial_tribute:0 "창궁의 권한"
 casus_belli_cb_elven_celestial_tribute:0 "창궁의 권한"
 elven_celestial_tribute_favor_fail:0 "£trigger_no£ 우리는 5개의 §Y별의 축복§!이 필요하다"
 elven_celestial_tribute_favor:0 "£trigger_yes£ 우리는 5개의 §Y별의 축복§!이 필요하다"
 elven_councilor_celestial_grace:0 "천상의 업무 담당관"
 elven_councilor_celestial_grace_desc:0 "천상의 업무를 담당하는 지휘관의 의무는 고위 관료들을 그들의 공적과 과오에 따라 임명하고, 보상하며, 징계하는 것입니다."
