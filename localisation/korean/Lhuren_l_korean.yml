 job_elven_dragon_strategist:0 "천상 전략가"
 job_elven_dragon_strategist_plural:0 "천상 전략가"
 job_elven_dragon_strategist_desc:0 "용정의 고위 관료는 수양의 기술과 전쟁의 기술 모두에 정통해야 합니다. 오늘의 토대를 세심하게 놓는 이들만이 내일의 형상을 설계할 수 있습니다."
 job_elven_dragon_strategist_effect_desc:0 "£job_elven_dragon_strategist£ $job_elven_dragon_strategist_plural$는 £trade£ §Y$trade$§!를 £engineering£ §Y연구 점수§!, £consumer_goods£ §Y$consumer_goods$§!, £mod_planet_jobs_worker_produces_mult£ §Y$mod_planet_jobs_worker_produces_mult$§!로 전환합니다."
 mod_job_elven_dragon_strategist_add:0 "$job_elven_dragon_strategist$ 직업"
 mod_job_elven_dragon_strategist_per_pop:0 "POP $VALUE$마다 §G+1§! $job_elven_dragon_strategist$ 직업"
 mod_job_elven_dragon_strategist_per_pop_short:0 "\n$VALUE$ £pop£마다 §G+1§! £mod_elven_dragon_strategist_add£"
