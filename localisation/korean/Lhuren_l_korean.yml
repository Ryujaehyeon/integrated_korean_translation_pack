 job_elven_dragon_researcher:0 "용 연구가"
 job_elven_dragon_researcher_plural:0 "용 연구가"
 job_elven_dragon_researcher_desc:0 "이 세계의 가장 큰 수수께끼는 세계를 이해하는 것 그 자체입니다."
 job_elven_dragon_researcher_effect_desc:0 "£job_elven_dragon_researcher£ $job_elven_dragon_researcher_plural$은(는) £trade£ §Y$trade$§!를 £physics£ §Y연구 포인트§!, £unity£ §Y$unity$§! 및 £mod_planet_jobs_specialist_produces_mult£ §Y$mod_planet_jobs_specialist_produces_mult$§!로 전환합니다."
