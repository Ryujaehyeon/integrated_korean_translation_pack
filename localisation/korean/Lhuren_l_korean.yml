 job_elven_dragon_priest:0 "용 사제"
 job_elven_dragon_priest_plural:0 "용 사제"
 job_elven_dragon_priest_desc:0 "민중에 대한 영적인 지도는 가장 경건하고 독실한 사람만이 행할 수 있습니다."
 job_elven_dragon_priest_effect_desc:0 "£job_elven_dragon_priest£ $job_elven_dragon_priest_plural$은(는) $trade$ §Y£trade£§!를 £society£ §Y연구 포인트§!, $influence$ §Y£influence£§! 및 $mod_planet_jobs_ruler_produces_mult$ §Y£mod_planet_jobs_ruler_produces_mult£§!로 전환합니다."
