l_korean:
 elven_system_lhuren_initializer_NAME:0 "얼루노르 성단"
 elven_system_lhuren_initializer_DESC:0 "§L악명높은 드래곤 성단에서 시작합니다.§!\n\n$system_initializer_DESC$"
 NAME_LHU_ETERNAL_ARRAY:0 "영원의 배열"
 NAME_LHU_ETERNAL_FOUNDRY:0 "영원의 주조소"
 trait_elven_lhuren_immortality:0 "시간을 초월한 자"
 trait_elven_lhuren_immortality_desc:0 "이 종족의 구성원들은 순수한 형상의 현실에서 빌려온 법칙에 부분적으로 종속되어 있으며, 그곳에서는 우리가 아는 엔트로피가 아무런 영향도 미치지 못합니다."
 trait_elven_lhuren_celestial_grace:0 "[triggered_trait_elven_lhuren_celestial_grace]"
 trait_elven_lhuren_celestial_grace_ruler:0 "천상의 총애: 황색 비단"
 trait_elven_lhuren_celestial_grace_heir:0 "천상의 총애: 황색 비단"
 trait_elven_lhuren_celestial_grace_councilor_official:0 "천상의 총애: 진홍 깃펜"
 trait_elven_lhuren_celestial_grace_councilor_scientist:0 "천상의 총애: 비취 누각"
 trait_elven_lhuren_celestial_grace_councilor_commander:0 "천상의 총애: 푸른 물결"
 trait_elven_lhuren_celestial_grace_desc:0 "[triggered_trait_elven_lhuren_celestial_grace_desc]"
 trait_elven_lhuren_celestial_grace_ruler_desc:0 "황색 비단을 두른 이는 개인의 열정과 목적 없는 야망을 버려야 합니다. 그들은 대지의 욕망과 하늘의 뜻 사이를 가르는 장막이므로, 양쪽 모두를 이루어야 할 책임을 집니다."
 trait_elven_lhuren_celestial_grace_heir_desc:0 "황색 비단 속에서 태어난 이들은 덕의 귀감으로 떠받들어지며, 왕실 혈통에 내려진 지상의 의무와 천상의 위임을 함께 나눕니다."
 trait_elven_lhuren_celestial_grace_councilor_official_desc:0 "강한 정의감과 질서에 대한 열망을 지닌 이들은 진홍 깃펜을 쥐었다고 합니다. 이들은 공정한 지혜, 숙련된 선견지명, 절제된 연민으로 정의를 수호하고 영토를 행정하며 정책을 세울 것을 기대받습니다."
 trait_elven_lhuren_celestial_grace_councilor_scientist_desc:0 "정신과 영혼의 탐구에 헌신하는 이들은 비취 누각을 이룹니다. 얽매이지 않은 진리를 추구하는 물리학자-철학자, 의사-신비가, 발명가-예술가들에게 지적 깨달음과 영적 수양은 하나이며 같습니다."
 trait_elven_lhuren_celestial_grace_councilor_commander_desc:0 "근면, 헌신, 규율로 자신을 끝없이 단련하는 이들은 제국을 떠받치는 푸른 물결입니다. 장인, 상인, 노동자, 병사의 무리는 다른 이들이 하늘을 향해 손을 뻗을 수 있도록 대지를 돌봅니다."
 trait_elven_lhuren_celestial_grace_subtitle:0 "§c천상의 은총 특성§!"
 trait_elven_lhuren_taishanghuang:0 "[triggered_trait_elven_lhuren_taishanghuang]"
 trait_elven_lhuren_taishanghuang_default:0 "전 황제"
 trait_elven_lhuren_taishanghuang_female:0 "추락한 봉황"
 trait_elven_lhuren_taishanghuang_male:0 "추락한 용"
 trait_elven_lhuren_taishanghuang_desc:0 "[triggered_trait_elven_lhuren_taishanghuang_desc]"
 trait_elven_lhuren_taishanghuang_default_desc:0 "선택이든 강요든, 이 통치자는 천상의 은총을 내려놓았습니다."
 trait_elven_lhuren_taishanghuang_female_desc:0 "봉황의 관은 보기보다 훨씬 무겁고, 그 짐을 영원히 견딜 수 있는 이는 드뭅니다. 짓눌리느니 내려놓는 것이 더 품위 있는 선택입니다."
 trait_elven_lhuren_taishanghuang_male_desc:0 "용의 관은 보기보다 훨씬 무겁고, 그 짐을 영원히 견딜 수 있는 이는 드뭅니다. 짓눌리느니 내려놓는 것이 더 품위 있는 선택입니다."
 trait_elven_lhuren_taishanghuang_tooltip:0 "§H천상의 은총§! 아래에서 다시 통치자가 될 수 없습니다."
 trait_elven_lhuren_concessions:0 "씨족 양보"
 trait_elven_lhuren_concessions_desc:0 "여전히 권력에 매달리는 것이 전통에 어긋날지라도, 잠재적 도전자들은 일단 현상 유지를 존중하도록 설득되었습니다."
 elven_lhuren_origin_events.301.name:0 "대답해 줘... 나를 찾아 줘..."
 elven_lhuren_origin_events.301.desc:0 "현실이 자연 상태로 붕괴하면서, 메마른 포효가 용의 성운 전체에 소리 없이 울려 퍼졌습니다.\n\n저 너머에서 내려오던 천상의 은총을 폭력적으로 빼앗기자, 생명의 부드러운 물결은 급류로 변해 우리를 휩쓸어 갔습니다. 마치 다가오는 해일에 무력하게 맞서는 모래알에 불과했던 것처럼..."
 elven_lhuren_origin_events.301.a:0 "우리가 함께 나눈 장대하고 영광스러운 꿈이었지..."
 elven_lhuren_origin_events_tooltip.301.a:0 "우리는 위안 없는 필멸의 품으로 돌아갑니다."
 origin_elven_celestial_throne:0 "천상의 왕좌"
 origin_elven_celestial_throne_desc:0 "이 문명이 긴 여정의 끝에서 영원한 평화와 불멸의 삶을 찾은 지 수천 년이 지났으며, 더욱 긴 유배의 시작을 맞이했습니다.\n너무 오랜 시간이 지나 꿈이 결코 영원히 지속되지 않는다는 것을 잊었습니다."
 origin_tooltip_elven_celestial_throne_effects:0 "- 이야기 이벤트 체인: ['concept_eos_elven_lhuren_eternal_array_chain']\n- 맞춤형 항성 집합\n- $HOME_SYSTEM$$TABBED_NEW_LINE$- ['concept_eos_planetary_nebula'] 내부에 위치$TABBED_NEW_LINE$- ['concept_eos_hazard_storm_half'] 포함\n- $HOMEWORLD$$TABBED_NEW_LINE$- ['concept_eos_elven_lhuren_eternal_array_ruined'] 보유$TABBED_NEW_LINE$- $PLANETARY_FEATURES$$TABBED_NEW_LINE$$t$- ['concept_elven_planetary_gardens_of_heaven']$TABBED_NEW_LINE$$t$- ['concept_elven_planetary_forbidden_arcology']$TABBED_NEW_LINE$$t$- ['concept_elven_planetary_sentient_dragons']\n- §R없음§! ['concept_guaranteed_colonies'] §R근처§!\n- ['concept_eos_flaming_pearl'] 유물로 시작\n"
 civic_elven_celestial_grace:0 "천상의 품위"
 civic_elven_celestial_grace_desc:0 "황제가 천상에 대한 권리를 가지는 것은 신성한 권리에 의한 것이 아니라, 별이 자신들 스스로를 바치게 되는 것이다. 따라서 정당하고 완전한 통치자는 국운과 번영이 자연스레 따라오게 되며, 왕좌에 앉을 자격이 없는 통치자는 분쟁과 분노가 자연스레 따라오게 됩니다."
 civic_tooltip_celestial_grace_effects:0 "['concept_council'] 구성원은 그들의 §Y모행성§!에 §YCelestial Offices§!를 생성하며, 그 수는 유효한 §Y리더 기술§!에 따라 증가합니다:$TABBED_NEW_LINE$- ['concept_commanders']는 ['concept_eos_elven_dragon_strategists']를 제공합니다.$TABBED_NEW_LINE$- ['concept_scientists']는 ['concept_eos_elven_dragon_researchers']를 제공합니다.$TABBED_NEW_LINE$- ['concept_officials']는 ['concept_eos_elven_dragon_priests']를 제공합니다.$TABBED_NEW_LINE$- 외부 세계의 ['concept_council'] 구성원은 대신 ['concept_envoys']와 ['concept_diplomatic_weight']를 제공합니다.$TABBED_NEW_LINE$- 유효한 §Y모행성§!이 없는 ['concept_council'] 구성원은 §R-10%§! ['concept_stability']를 초래합니다.$TABBED_NEW_LINE$- 부적합한 통치자는 §Y$edict_eos_lhu_edict_celestial_mandate$§! 칙령을 통해 §Y퇴위§!를 선택할 수 있습니다.\n"
 EMPIRE_DESIGN_elven_civ3:0 "오를리노르 벨란데"
 EMPIRE_DESIGN_elven_civ3_desc:0 "드래곤 클러스터의 빽빽한 별들 사이에 숨겨진, 오를리노르는 거의 알려지지 않은 행성계입니다. 상호간 교류가 거의 없었던 탓에, 질서와 통일성이 중심이 된 사회 체제를 구축했습니다. 만약 이에 대해 위협을 가하는 존재가 있다면, 그들은 압도적인 폭력으로 대응할 것입니다."
 ELVEN_civ3_empire_adjective:0 "아우를로노렌"
