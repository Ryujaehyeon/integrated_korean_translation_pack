 EOS_FACTION_AZURE_DRAGON:0 "푸른 용"
 EOS_FACTION_STILL_LOTUS_LAKE:0 "고요한 연꽃 호수"
 EOS_FACTION_SILK_STRING_ZITHER:0 "비단 현금"
 EOS_FACTION_CLOUD_PIERCING_MOUNTAIN:0 "구름을 꿰뚫는 산"
 EOS_FACTION_WHITE_FEATHERED_FAN:0 "흰 깃 부채"
 EOS_FACTION_BLACK_PINE_FOREST:0 "검은 소나무 숲"
 EOS_FACTION_PLUM_BLOSSOM_GARDEN:0 "복숭아꽃 정원"
 elven_eternal_array_modifier:0 "영원의 배열(보호됨)"
 elven_eternal_array_modifier_desc:0 "이 행성은 거대한 보호막 안에 감싸는 수수께끼의 거대구조물에 의해 보호받고 있습니다."
 elven_eternal_array_broken_modifier:0 "영원의 배열(불협화)"
 elven_eternal_array_broken_modifier_desc:0 "한때 이 세계 주변에 뚫을 수 없는 보호막을 투사하던 거대구조물이 불안정해졌습니다. 지표의 겁에 질린 민중과도 같습니다."
 elven_eternal_array_repurposed_modifier:0 "영원의 배열(조화)"
 elven_eternal_array_repurposed_modifier_desc:0 "이 세계는 용의 성운의 변칙적 환경에서 에너지를 끌어오는 궤도 고리에 의해 유지되고 있습니다."
 elven_eternal_array_encased_modifier:0 "영원의 배열(봉인됨)"
 elven_eternal_array_encased_modifier_desc:0 "영묘한 영원 속에 안겨, 존재 밖에 영원한 낙원이 자리합니다."
 elven_lhuren_planet_boost:0 "음엔트로피"
 elven_lhuren_planet_boost_desc:0 "'순간'은 경험과 추상의 교차점에 놓인 역설이며, 오직 기억 속에서만 존재합니다. 그러나 기억이 시간과 공간에서 분리된 모든 관측 가능한 존재의 총체적 증명이라면, 우주의 붕괴가 그 반대 힘을 스스로 먹여 살리는 것도 가능하지 않을까요?"
 elven_lhuren_origin_ending_A_modifier:0 "길: 무아"
 elven_lhuren_origin_ending_A_modifier_desc:0 ""
 elven_lhuren_origin_ending_A_modifier_tooltip:0 "§W계획: 무아를 완료하여 다음 혜택을 얻었습니다:§!$TABBED_NEW_LINE$- £job_elven_dragon_strategist£ §Y$job_elven_dragon_strategist_plural$§!가 추가로 £mod_country_naval_cap_add£ §Y$MOD_COUNTRY_NAVAL_CAP_ADD$§! 제공$TABBED_NEW_LINE$- §Y거대구조물§!을 건설하거나 업그레이드하면 무작위 행성의 개발 가속$TABBED_NEW_LINE$- §Y$NAME_LHU_ETERNAL_FOUNDRY$§!가 £alloys£ §Y$alloys$§!와 £influence£ §Y$influence$§! 생산$TABBED_NEW_LINE$- §Y$NAME_LHU_ETERNAL_FOUNDRY$§!의 산출량은 §Y무아§!에 따라 증가\n\n$elven_lhuren_anatta_tooltip$"
 elven_lhuren_origin_ending_B_modifier:0 "길: 윤회"
 elven_lhuren_origin_ending_B_modifier_desc:0 ""
 elven_lhuren_origin_ending_B_modifier_tooltip:0 "§W계획: 윤회를 완료하여 다음 혜택을 얻었습니다:§!$TABBED_NEW_LINE$- £job_elven_dragon_researcher£ §Y$job_elven_dragon_researcher_plural$§!가 추가로 £mod_country_all_tech_research_speed£ §Y$MOD_COUNTRY_ALL_TECH_RESEARCH_SPEED$§! 제공$TABBED_NEW_LINE$- §Y$sm_lhu_array_eternity_shield_amp$§! 궤도 고리 건물 사용 가능$TABBED_NEW_LINE$- §Y$sm_lhu_array_eternity_shield_amp$§!가 §Y$mod_planet_buildings_upkeep_mult$§!, §Y$mod_planet_districts_upkeep_mult$§!를 감소시키고, 기지 §Y$MOD_SHIP_SHIELD_ADD$§!를 증가시킴. 효과는 §Y윤회§!에 따라 증가\n\n$elven_lhuren_samsara_tooltip$"
 elven_lhuren_origin_ending_C_modifier:0 "길: 반열반"
 elven_lhuren_origin_ending_C_modifier_desc:0 ""
 elven_lhuren_origin_ending_C_modifier_tooltip:0 "§W계획: 반열반을 완료하여 다음 혜택을 얻었습니다:§!$TABBED_NEW_LINE$- £job_elven_dragon_priest£ §Y$job_elven_dragon_priest_plural$§!가 추가로 £mod_country_edict_fund_add£ §Y$MOD_COUNTRY_EDICT_FUND_ADD$§! 제공$TABBED_NEW_LINE$- §Y$trait_elven_lhuren_immortality$§! 특성의 추가 기능 잠금 해제$TABBED_NEW_LINE$- §Y$NAME_LHU_ETERNAL_ARRAY$§!가 £energy£ §Y$energy$§!와 §Y열반§! 생산\n\n$elven_lhuren_nirvana_tooltip$"
 elven_lhuren_site_helemar:0 "우주의 변덕"
 elven_lhuren_site_helemar_intro:0 "루마르에 정착한 지 수세기가 지난 뒤, 성단을 더 탐사하던 중 용의 성운 깊은 곳에서 배경 방출에 가려진 작은 세계가 발견되었습니다. 처음 조사에서는 생명의 흔적 없는 얼음 바위에 지나지 않는다고 보고되었습니다. 그러나 반천 년쯤 뒤 두 번째 조사는 전 행성을 뒤덮은 바다 바로 아래에 숨겨진 풍부한 자원과 번성하는 생태계를 밝혀냈습니다.\n\n물론 루마르가 거의 같은 시기 은하의 나머지와 작별을 준비하고 있었으므로, 우리는 길게주가 주도했을 식민지화 계획을 목격하지 못했습니다.\n\n그럼에도 우리가 마지막으로 기록한 뒤 헬레마르의 운명이... 흥미로운 방향으로 흘렀다는 사실은 분명합니다. 우선 현재 상태에서는 어떤 후속 조사로도 생명 보유 행성으로 분류할 수 없습니다. 그런데 불길하게도...\n\n왜 궤도 스캔은 여전히 우리를 설득하려 드는 것일까요?"
 elven_lhuren_site.101.name:0 "별에 소원을 빌었네"
 elven_lhuren_site.101.desc:0 "헬레마르 조사는 첫 계획이 작성된 순간부터 방해가 되는 지연, 달갑지 않은 놀라움, 예기치 못한 복잡한 문제에 시달렸습니다. 그러나 그 어떤 관료적·기술적 사고도 조사대의 목숨을 거의 앗아갈 뻔한 불운의 연속에는 비할 수 없었습니다.\n\n원격 장비가 정확한 수치를 줄 것이라 믿을 수 없다는 사실을 깨달은 뒤, 대신 실험실에서 조사할 표본을 확보하려는 시도가 이루어졌습니다.\n\n끔찍한 실수였습니다.\n\n다행히도 우리의 정당한 편집증이 보답을 받았고, 과도할 만큼 배치한 안전 조치가... 가까스로 연구자들의 목숨을 지켜냈습니다. 불행히도 표본도 실험실도 살아남지 못해 진행 상황은 크게 후퇴했습니다.\n\n한 가지 위안이라면, 실패의 규모가 관련된 모든 부처에 굴욕이었다는 점입니다. 수치스러운 보고서를 읽은 §Y[Root.Owner.GetRulerTitle] [Root.GetRulerName]§!의 천상의 눈썹이 단 한 번 꿈틀거린 것을 관료들은 놓치지 않았고, 그들 역시 목이 걸려 있다는 깨달음은 더 높은 기준을 향해 그들을 몰아붙였습니다."
 elven_lhuren_site.101.a:0 "참으로 길상한 시작이군. 정말로."
 elven_lhuren_site.102.name:0 "천둥이 내 목소리를 앗아갔다"
 elven_lhuren_site.102.desc:0 "더 나은 도구와 더 많은 자원, 그리고 추가 진행을 직접 감독하고 보장하기 위해 §YFlaming Pearl§!까지 동반한 §Y[Root.Owner.GetRulerTitle] [Root.GetRulerName]§!의 딸 중 한 명이 돌아온 뒤, 누구도 이 프로젝트의 중요성을 다시는 과소평가하지 못하게 되었습니다.\n\n처음에는 §YFlaming Pearl§!의 존재와 이 조사에 배정된 이유가 대부분의 연구자에게 공개되지 않았습니다. 그것은 §Y린퀴엘 공주§!와 그 수행원들만이 알아야 할 일이었습니다.\n\n보고서를 읽고 황실만이 알아볼 징후를 발견한 §Y[ruler.GetHerHisCap] 영원히 빛나는 천상의 광휘§!는 헬레마르 조사 주변의 이상한 사건들이 단순한 불운이 아니었다고 의심하게 되었습니다. 운명의 흔들린 실에 이계의 간섭 흔적이 들러붙어 있었고, 이는 지금까지 우리 역사에서 §Y디랙 바다 뱀§!의 현현과만 연관되어 온 것이었습니다. 이해할 수 없고 은밀하지만 언제나 곁에 있던 우리의 후원자들 말입니다. 우리의 불멸은 그들에게 빚진 것이며, 그들의 인도로 우리는 그들이 사랑한 루마르의 정원을 지키기 위해 영원의 배열을 세웠습니다.\n\n그 의심은 곧 완전히 정당했음이 드러났습니다... 다만 누구도 예견할 수 없었던 한 가지 세부 사항이 있었습니다. 용과 같은 뱀들은 우리 민족이 용의 성운에서 만난 유일한 섬뜩한 존재가 아니었지만, 오늘까지 우리와 소통하려 한 유일한 존재였습니다. 이번에 §YFlaming Pearl§!이 끌어들인 것은 용이 아니라... §Y봉황§!이었습니다! 우리의 수많은 천년 역사에서도 몇 번밖에 목격되지 않았고, 언제나 무지와 구별할 수 없는 초연함으로 우리를 대하던 장엄한 조류의 형상이었습니다.\n\n그 만남이 얼마나 중대한 것이었든, 그 관심은 §YFlaming Pearl§! 위에 아주 짧은 순간만 머물렀습니다. §Y공주§!는 즉시 질문을 던지려 했지만, 첫마디를 꺼내기도 전에 알현은 끝나 있었습니다. 이후 접촉 시도는 아직 아무 성과도 내지 못했지만, 이 길상한 사건에 고무된 승선자 모두는 헬레마르가 품고 있을 획기적인 비밀을 풀기 위해 노력을 배가했습니다."
 elven_lhuren_site.102.a:0 "때로 답은 질문의 존재에서 비롯된다."
 elven_lhuren_site.103.name:0 "구름이 하늘을 삼켰다"
 elven_lhuren_site.103.desc:0 "봉황은 다시 모습을 드러내지 않았고, 나타났을 때처럼 뜻밖에 사라졌습니다. 그러나 우리의 질문이 무시된 것은 아니었던 듯합니다. 단지 그때는 답을 이해하지 못했을 뿐입니다.\n\n그 운명적인 조우 이후 §Y린퀴엘 공주§!는 이상 행동을 보이기 시작했습니다. 처음에는 회의 중 멍해지는 일이 잦았을 뿐이었습니다. 깊이 생각할 것이 많았으니 이해할 만했습니다. 그러나 몇 주가 지나자 존재하지 않는 인물과 접촉하려 하고, 일어나지 않은 사건을 언급하며, 심지어 자신의 임무 세부 사항조차 혼동하는 듯했습니다. 그 뒤 악화는 가속되어 회복의 희망이 남기 어려울 만큼 빠르게 인지가 무너졌습니다. 끝내 그녀는 예전 자신의 껍데기만 남았고, 반응하지 않는 몸에 갇힌 과활성의 정신은 천장을 크게 뜬 눈으로 바라보며 횡설수설했습니다. 황실 수행단은 그녀를 귀환시켜 최고의 의료를 받게 할 수밖에 없었지만, 지금까지 모든 치료는 실패했고 그녀의 상태는 제국 최고의 신경학자들마저 당혹스럽게 하며 예후도 암울합니다.\n\n그러나 그녀가 남긴 글은 흐려진 정신의 헛소리와는 가장 거리가 멀었습니다. 외적 증상이 악화될수록 일지와 보고서는 양자역학, 특히 허수 시간과 허수 에너지 개념에 대한 포괄적 논의로 뻗어 나갔습니다. 우주 이해에 빠진 변수가 존재한다는 설득력 있는 이론과 그 공식을 외삽하려는 시도도 있었습니다. 마지막 의식의 잔재가 사라지기 직전 완성한 대작은... 일종의 코드였습니다. 내부적으로 일관된 언어와 구문으로 쓰인 7백만 줄 이상의 코드였지만, 우리가 개발한 어떤 계산 체계와도 완전히 호환되지 않았습니다. 그 목적은 아직 알 수 없지만 한 가지는 분명합니다. 너무 정밀하고 의도적이므로, 반드시 어떤 목적에 봉사합니다. §Y린퀴엘 공주§!의 희생이 의미를 가지려면 그래야 합니다.\n\n어쩌면... 봉황들이 우리에게 말하지 않는 이유가 이것일지도 모릅니다. 용들의 수수께끼가 아무리 답답해도, 적어도 그 의미는 문명이 답을 알 만큼 성숙하면 자연스럽게 펼쳐집니다. 그러나 봉황이 더 약한 관찰자가 붕괴시킬 수 없는 모든 가능성의 폭발로만 생각을 전할 수 있다면, 그들이 지혜를 숨기는 것은 자비 때문일지도 모릅니다."
 elven_lhuren_site.103.a:0 "오늘 제국은 한 천재의 탄생을 축하하고... 애도한다."
 elven_lhuren_site.104.name:0 "비는 무자비하게 내렸다"
 elven_lhuren_site.104.desc:0 "§Y린퀴엘 공주§!가 남긴 수수께끼의 코드는 아직 실행할 환경의 개발을 기다리고 있지만, 다른 조사 경로도 계속 추구되었고 마침내 나름의 성과를 냈습니다.\n한때 헬레마르라 불렸던 치명적인 행성에서 끌어올린 표본은 과거의 희미한 파편을 드러냈습니다. 전체 그림을 그리기에는 너무 흐렸지만, 그래도 대략적인 밑그림을 만들기에는 충분했습니다. 발견물 가운데는 혹독한 환경과 시간의 흐름을 견뎌낸 금속 합금이 있었고, 이를 모아 복원하고 더 큰 부품으로 재조립하자 우리에게 섬뜩할 만큼 익숙한 무언가와 닮아가기 시작했습니다.\n\n가능한 모든 불가능을 제거한 뒤, 남은 이론이 아무리 그럴듯하지 않아 보여도, 길게주의 문명은 한때 스스로 영원의 배열을 건설하려 했던 것처럼 보였습니다. 그것은 우리 것과 상당히 달랐지만, 여러 면에서 가장 기본적인 부품의 복잡성만 보아도 루마르의 설계보다 더 발전했을 가능성을 시사합니다. 더 강한 폭풍을 견디기 위한 더 튼튼한 보호막이었던 셈입니다.\n하지만... 오늘날 헬레마르의 상태를 보면 그들의 노력은 실패로 끝났다고 추론할 수 있습니다. 그들이 무엇으로부터 그토록 절박하게 피난처를 찾았는지는 정확히 알 수 없지만, 이 세계의 거의 완전한 절멸은 우주적 규모의 재앙으로밖에 설명할 수 없습니다.\n\n그래도 망각에 맡겨졌음에도 갈라진 쌍둥이의 운명에는 의미가 없지 않습니다. 이제 우리는 우리 자신을 구하고, 우리의 영원을 보존하는 열쇠가 그들의 이야기에 이어지는 장을 쓰는 데 있다고 믿을 이유가 생겼습니다. 그들의 발전을 되짚고 기술을 재구성할 수 있다면, 봉황의 신탁이 전한 지혜가 구원의 길을 드러낼 것입니다.\n\n중첩 속에서 루마르와 길게주는 구원으로 향하는 무한한 경로를 찾았어야 했지만, 우리의 운명은 폐허라는 서로 다른 고유상태로 붕괴했을 뿐입니다. 그들의 파멸은 막을 수 없었지만 우리의 파멸은 아직 오지 않았고, 그 전에 우리는 여전히 경로 적분을 이룰 기회를 갖고 있습니다. 다시 하나의 민족이 되어, 어느 쪽도 홀로 이룰 수 없었던 미래를 함께 만들어야 합니다."
 elven_lhuren_site.104.a:0 "시간과 공간, 삶과 죽음, 실재와 허수를 넘어 우리는 재회하리라."
 elven_lhuren_site_gilgezu:0 "텅 빈 희망"
 elven_lhuren_site_gilgezu_intro:0 "전통은 우리의 방주가 이계의 폭풍 속에서 처음 이 성계로 흘러들었을 때, 드물게 훼손되지 않은 생명 보유 세계였던 이 행성이 우리의 구원이 되었다고 전합니다. 단단한 땅이라는 소박한 선물은 기적이었습니다.\n\n지친 은하의 방랑자들은 여기서 잠시 탐구를 멈추고, 앞길을 위해 휴식과 회복의 시간을 갖기로 했습니다. 그러나 일부는 영원히 뒤에 남았습니다.\n\n루마르가 발견되고 우리 민족이 그것을 약속된 낙원이라 선포한 뒤에도 길게주는 계속 번영했습니다. 단순한 전초기지에서 번영하는 동반자로 피어났고, 아름다움과 자원은 그만큼 풍부하지 않았을지라도 고유한 문화와 혁신에서는 결코 뒤지지 않았습니다.\n\n영원의 배열의 품이 루마르를 감싸려 할 때 우리와 합류하지 않은 이들은 대신 길게주로 돌아갔습니다. 길게주는 다른 길, 곧 은하의 나머지에 깨달음을 전하는 길을 선택했습니다."
 elven_lhuren_site.201.name:0 "길 잃은 아이들"
 elven_lhuren_site.201.desc:0 "처음 몇 천년 동안 길게주의 운명은 한가한 상상과 대중 소설 속에서 우리의 상상력을 자극하곤 했습니다. 길을 벗어난 형제자매들은 번영했을까? 물질주의적 선조의 모습처럼 은하를 정복하고 철권으로 다스렸을까? 별들로 돌아가 다른 곳에서 자신들만의 영원한 낙원을 찾았을까? 우리와 함께하지 않은 것을 후회했을까?\n\n영원이 흐르자 우리 민족의 관심은 줄어들었고, 기억도 오래지 않아 뒤따랐습니다. 이제 길게주를 다시 찾는 것은 우리에게 어떤 익숙함도 주지 않습니다... 그 황량한 껍데기에는 문명은커녕 생명의 흔적도 남아 있지 않습니다. 자연 지질 구조라고 보기에는 너무 의도적으로 보이는 몇 안 되는 흉터만이, 한때 지성 생명이 이 세계의 표면을 건드렸음을... 암시할 뿐입니다. 그러나 전체 이야기를 추론하기에는 아직 이릅니다. 사실 희박한 증거 속에서 우리가 답 대신 모을 수 있는 것은 '이야기'뿐일지도 모릅니다."
 elven_lhuren_site.201.a:0 "기억조차 시간과 함께 흐려진다."
 elven_lhuren_site.202.name:0 "잊힌 무덤"
 elven_lhuren_site.202.desc:0 "마침내 돌파구입니다! 지표 발굴은 여전히 정보가 거의 없었지만, 행성 암석권의 잔해 깊숙한 곳에서 흥미로운 것이 발견되었습니다. 면밀한 조사 끝에, 우리는 한때 바다 밑바닥이었던 곳 아래에서 결정화된 형성물 주머니를 찾아냈습니다. 나라만 한 규모의 그 퇴적물의 화학 조성에는 자연에서 발생한다고 알려지지 않은 화합물이 포함되어 있었습니다. 다시 말해 합성 물질입니다.\n\n그것이 길게주의 역사에 대해 알려 주는 것은 아직 적지만, 마침내 따라갈 만한 실질적인 단서의 흔적을 얻었습니다. 이 이론은 여전히 추측의 영역에 머물러 있지만, 길게주에 닥친 종말의 유일한 목적이 파괴만은 아니었던 듯합니다. 오히려 그것을 수행한 자는 이 세계에 문명이 거주했다는 모든 가시적 흔적을 제거하려 했을지도 모릅니다.\n\n우리 민족이 한때 이곳에 살았다는 사실을 몰랐다면, 틀림없이 우리조차 속았을 것입니다. 이 빈 바위에 두 번째 시선을 줄 이도 드물 것이고, 체계적인 발굴 노력은 말할 것도 없습니다."
 elven_lhuren_site.202.a:0 "무엇이 여기 숨겨져 있을까? 그리고 더 불길하게도, 왜?"
 elven_lhuren_site.203.name:0 "어두운 숲"
 elven_lhuren_site.203.desc:0 "최근 발견 이후, 우리는 더 이상 우리의 많은 가설을 검증할 회수 가능한 기록을 찾으리라 기대하지 않았습니다. 그래서 하나도 아니고 두 개의 고대 장치가 어떻게든 발굴되었고, 그중 하나에는 거의 온전한 데이터 드라이브까지 붙어 있었을 때 우리의 놀라움은 천지를 뒤흔들 만큼 컸습니다.\n\n하지만 곧 그 장치들의 기원이 외계라는 사실이 분명해졌습니다. 먼 곳에서 보내진 탐사정이었습니다. 하나는 환경과 태양 복사를 견디지 못한 잔해 더미에 불과했습니다. 그러나 첫 번째보다 약 5세기 뒤의 것으로 추정되는 두 번째 장치는 훨씬 정교한 기계였습니다. 우리는 일부 부품을 데이터뱅크에 접근할 수 있을 만큼 역설계했지만, 나머지는 우리 문명이 지금까지 생산한 어떤 것보다 훨씬 발전해 있었습니다.\n\n그러나 더욱 섬뜩한 발견은 탐사정의 기록 속에 있었습니다. 해독한 바에 따르면, 그 탐사정에는 특정 생명 신호를 찾고 일치가 이루어지면 중성미자 펄스를 되돌려 보내도록 설계된 AI 체계가 장착되어 있었습니다. 그 검색 매개변수는 무엇이었을까요? 바로... 우리와 일치하는 DNA 서열이었습니다. 서로 다르지만 명백히 우리의 전통에 뿌리를 둔 건축 세부 사항. 우리가 건설한 적 없는 웅장한 우주선과 우주 구조물의 포괄적 설계도. 어쩌면 우리의 발전이 다른 길을 걸었다면 우리가 만들었을 것들입니다. 탑재 AI가 자가 종료하기 전에 남긴 마지막 기록은 '이상 없음'으로 해석될 수 있는 것이었습니다.\n\n많은 질문이 남았지만, 어쩌면 일부 질문은 그 자체에 답을 담고 있을지도 모릅니다. 이 문명이 길게주의 파괴에 책임이 있었을까요? 의심스럽습니다. 단순한 파괴라면 그렇게까지 할 필요는 없었을 테니까요. 더 그럴듯하고 더 두려운 가능성은, 길게주의 사람들이 별들 사이의 무언가를 너무 두려워한 나머지 자신들의 고향 세계의 장엄함을 역사에서 지워 버리는 편이 그것에게 발견되는 것보다 낫다고 여겼다는 것입니다..."
 elven_lhuren_site.203.a:0 "불면의 밤은... 일이 끝난 뒤로 미루자."
 START_SCREEN_ELVEN_CELESTIAL_THRONE:0 "옛날 옛적, 수만 년 동안 기억이 닳아 없어진 지금은 존귀한 원로들조차 떠올리지 못하는 시대에, 우리 민족은 우주를 떠돌았습니다. 뒤에 남겨 둔 모성의 공허한 퇴폐에 환멸을 느낀 그들은 별들 사이에서 더 의미 있는 존재를 찾았습니다.\n\n흐릿한 기억은 긴 유배의 마지막 목적지를 말합니다. 그때는 수가 크게 줄어든 금욕적 유랑자들이 우연이라 말하는 이도, 운명이라 말하는 이도 있는 가운데 격동하는 성운을 마주했고, 폭풍 속에 배가 고립되었습니다. 퇴로가 끊기자 그들은 우주 변칙으로부터 몸을 숨길 임시 피난처를 찾아 앞으로 나아가기로 했습니다. 그렇게 그들은 우리가 지금 고향이라 부르는 풍요로운 성계를 찾았습니다. 그곳에서 그들은 깨달음을 얻고 필멸을 초월했습니다.\n\n감동적이기는 해도 그 소박한 기원 신화는, 깨지지 않는 껍질이 감싼 유일한 세계의 요람 안에서 태어나 자란 수십억의 우리에게는 언제나 흐려진 상상력의 변덕처럼 읽혔습니다. 결국 우리가 두 눈으로 본 유일한 '별'은 머리 위의 경질광 하늘에서 우리를 내려다보는 아름다운 장식뿐이었고, 같은 액체 벽화 위를 가로지르는 먹빛 용과 봉황만큼이나 신화적이고 은유적이었습니다.\n\n그 약속처럼 영원히 지속될 수만 있었다면..."
 elven_lhuren_eternal_array_chain_title:0 "네가 별들과 함께 사라진 날"
 elven_lhuren_eternal_array_chain_desc:0 "영원의 약속이 한순간에 산산조각 날 수 있다면, 우리는 어쩌면 잘못된 길을 걷고 있다고 스스로를 속인 것일까요?\n\n혼돈이 사회를 움켜쥐고 이해할 수 없는 재앙이 존재 자체를 위협하는 가운데서도, 가장 차가운 이성이 우세해야 하며 운명의 경로를 바로잡아야 합니다. 위기가 해소될 때까지 고대의 교리와 대중 영합적 수사는 모두 제쳐 두고 유일하게 변치 않는 진리를 추구해야 합니다. 다른 모든 길은 파멸로 이어집니다.\n\n그 과정은 상상할 수 없을 만큼 복잡하고 알 수 없는 변수로 가득하겠지만, 핵심 철학은 아주 단순합니다. 과거를 되짚어 현재를 이해하고, 현재를 붙잡아 미래를 빚어라."
 elven_lhuren_origin_gilgezu_poi:0 "과거의 흔적: 길게주"
 elven_lhuren_origin_gilgezu_poi_desc:0 "한때 풍요로웠던 세계의 황량한 껍데기입니다. 선택하지 않은 길, 모든 두려움의 검증이 이곳으로 이어집니다. 그런데도... 우리의 운명은 과연 더 자비로웠을까요?"
 elven_lhuren_origin_helemar_poi:0 "과거의 흔적: 헬레마르"
 elven_lhuren_origin_helemar_poi_desc:0 "한때 젊은 정원 세계였으나 이제 모든 생명에 적대적으로 변한 곳입니다. 우주조차 그토록 희망찬 존재를 거부한다면, 우리는 절멸이 모든 것의 자연스러운 끝임을 받아들여야 할까요?"
 elven_lhuren_origin_route_A_poi:0 "미래로 가는 길: 무아"
 elven_lhuren_origin_route_A_poi_desc:0 "확실한 파멸에서 벗어나려면 불확실성의 길을 견뎌야 합니다. 영원의 배열의 장벽 모듈을 해체하면 예측할 수 없는 미래로 내던져지겠지만, 우리는 앞에 놓인 어떤 것에도 맞설 만큼 강해질 것입니다.\n\n거대구조물 업그레이드: §Y$NAME_LHU_ETERNAL_ARRAY$§!"
 elven_lhuren_origin_route_B_poi:0 "미래로 가는 길: 윤회"
 elven_lhuren_origin_route_B_poi_desc:0 "우리 현실의 직물이 불변이 아니라는 사실을 알게 된 지금, 피할 수 없는 변화 앞에서 정지해 있는 것은 어리석은 일입니다. 새로운 설계로 §Y$NAME_LHU_ETERNAL_ARRAY$§!를 재구축하는 일은 우리의 적응력을 시험할 것입니다. 목적지 없는 길고 구불구불한 여정에서 첫 번째 시험일 뿐입니다.\n\n거대구조물 업그레이드: §Y$NAME_LHU_ETERNAL_ARRAY$§!"
 elven_lhuren_origin_route_C_poi:0 "미래로 가는 길: 반열반"
 elven_lhuren_origin_route_C_poi_desc:0 "우리는 한때 우리의 이야기를 '그 후로 오래오래 행복하게 살았습니다'로 끝내기로 선택했지만, 우리의 의지와 무관하게 또 다른 장이 쓰였습니다. 이제 우리는 봉황의 깃펜을 들어 운명의 비극적 각본을 다시 쓰고, 한 번 약속받았던 행복한 결말을 마침내 얻을 것입니다.\n\n거대구조물 업그레이드: §Y$NAME_LHU_ETERNAL_ARRAY$§!"
 elven_lhuren_origin_events.101.name:0 "내 행운이 비 내리는 하늘을 스치고"
 elven_lhuren_origin_events.101.desc:0 "우리는... 하늘이 무너지고 알 수 없는 별들의 타오르는 빛이 영원한 평온이라는 우리의 망상 위로 쏟아지던 날을 맞이하기에 너무나 준비되어 있지 않았습니다.\n\n어둠이 하늘을 가로질러 덩굴손을 뻗자, 우리는 그 안심되는 불변성만 잃은 것이 아니었습니다. 우리는 미래를 잃었습니다. 수천 년의 확신은 우리가 무조건 믿었던 약속이 애초에 주어진 적 없었다는 쓰라린 깨달음으로 변했습니다. 내일은 더 이상 예정되어 있지 않았습니다."
 elven_lhuren_origin_events.101.a:0 "그리고 상황은 더 나빠졌지..."
 elven_lhuren_origin_events.102.name:0 "황량한 세계를 가르며"
 elven_lhuren_origin_events.102.desc:0 "우리 우주의 창공을 떠받치던 거대한 버팀목, 영원의 배열은 오작동 중인 것으로 의심되었습니다. 그러나 너무나 뻔해 보였던 결론은 곧 우리를 바보로 만들었습니다. 모두의 당혹 속에서도 배열은 흠 하나 없이, 변함없이, 처음 생명을 얻은 날처럼 완벽하게 남아 있었습니다.\n\n결정적인 변수가 달라졌습니다. 우리가 아무리 부정하려 해도 더는 스스로를 속여서는 안 됩니다. 혹독한 진실은 그것이 우리의 거품 밖에 있을 뿐 아니라, 어쩌면 우리의 통제 밖에 있다는 것일지도 모릅니다.\n\n그럼에도 우리는 답을 찾아 나섰습니다. 그 답이 무엇이든 말입니다. 오랜 세월 화석화되어 있던 기록 보관소는 생명력 있는 지식의 정원이 되었고, 시든 설계도는 다시 우주선으로 피어났습니다.\n\n우리 탐구의 다음 목적지는 시간의 강 상류, 곧 우리 민족의 운명이 갈라지고 결정이 내려졌으며, 어쩌면 실수 또한 만들어졌던 장소들입니다."
 elven_lhuren_origin_events.102.a:0 "과거가 우리를 새로운 미래로 인도하게 하라."
 elven_lhuren_origin_events.103.name:0 "빛들이 강하게 빛날 때"
 elven_lhuren_origin_events.103.desc:0 "길게주와 헬레마르의 껍데기는 완전히 이해하려면 시간과 전념한 연구가 필요한 비밀을 계속 품고 있습니다. 그러나 그 지적 가치가 아무리 크더라도, 그 지식 대부분은 우리 민족의 긴급한 관심사와는 직접 관련이 없습니다.\n\n불편한 진실은, 영원의 배열이 '엔트로피'라는 개념조차 없는 존재들의 인도로 건설되었고, 그 때문에 우리 또한 우리가 사는 우주에서 그것의 필연성을 의도적으로 외면하게 되었다는 점입니다. 사실 우리가 현실이라 부르는 혼돈 속에서 변하지 않는 유일한 진리는 변화 그 자체입니다.\n\n답을 찾았는데도 해결책은 제시되지 않는다니, 참으로 답답한 일입니다.\n\n하지만 어쩌면... 그런 결론은 해방으로 볼 수도 있지 않을까요? 우리 앞길이 우리가 뒤에 남긴 머뭇거리는 발자국만큼이나 불확실하다 해도, 우리는 앞으로 나아가야 합니다. 알 수 없는 미래 속으로. 유일한 위안은 그것이 우리 자신의 선택이라는 점입니다."
 elven_lhuren_origin_events.103.a:0 "하지만 이번에는 우리 앞의 선택을 이해하고 있다."
 elven_lhuren_origin_events.104.name:0 "너와 하늘 위 모든 별을 잊기 위해"
 elven_lhuren_origin_events.104.desc:0 "우리 가운데 가장 오래되고 현명한 이들조차 합의에 이르지 못했지만, 수많은 제안 가운데 세 가지 길이 최후의 생명줄로 떠올랐습니다.\n\n§B무아§!의 지지자들은 우리가 통제할 수도 이해할 수도 없는 요소에 절대적으로 의존해 왔음을 비판합니다. 이번 위기는 우리의 무지가 얼마나 어리석었는지를 드러냈습니다. 그들은 우리 세계를 보호하는 장벽을 폐기하고, 대신 영원의 배열을 우리 문명이 스스로의 힘으로 엔트로피를 견딜 수 있도록 단련하는 데 전용해야 한다고 제안합니다.\n\n§G윤회§! 진영은 현상 유지로 돌아갈 수 없다는 점에는 동의하지만 더 신중한 태도를 권합니다. 이 파벌은 영원의 배열의 보호막을 통상적인 수단으로 안정화할 수 있으며, 용의 성운의 이국적 성질은 핵심 기능이 아니라 보조 기능으로 쓰이게 해야 한다고 믿습니다. 이는 우리가 앞으로 나아가는 동안 안정된 토대와 비상 수단을 제공할 것입니다.\n\n마지막으로 §R반열반§!의 길은 이처럼 중대한 결정을 성급하게 내려서는 안 된다고 봅니다. 지지자들은 우리 문명이 수만 년 동안 영원의 배열의 평화로운 품 안에서 살아남았다고 주장합니다. 그러므로 겨우 몇 년 지속된 위기가 그 선택지를 완전히 무효화해서는 안 된다는 것입니다. 초차원 편차가 감당할 수 없게 되기 전까지 영원의 배열의 완전한 기능을 회복할 수 있는 기간은 길어야 몇 천 년에 불과하다는 사실을 알면서도, 그들은 충분한 시간과 자원을 연구에 투입한다면 결국 근본 문제를 해결할 수 있다고 확신합니다."
 elven_lhuren_origin_events.104.a:0 "§B부정은 더 이상 우리의 영원을 지켜 주지 못합니다.§!"
 elven_lhuren_origin_events.104.a.tooltip:0 "예상 결과:\n- $elven_lhuren_origin_ending_A_modifier_tooltip$"
 elven_lhuren_origin_events.104.b:0 "§G과거의 실패에서 배워야 하지만, 반복해서는 안 됩니다.§!"
 elven_lhuren_origin_events.104.b.tooltip:0 "예상 결과:\n- $elven_lhuren_origin_ending_B_modifier_tooltip$"
 elven_lhuren_origin_events.104.c:0 "§R시간만 있다면, 우주 엔트로피 문제의 핵심을 해결할 수 있습니다.§!"
 elven_lhuren_origin_events.104.c.tooltip:0 "예상 결과:\n- §YLhûmar§! 통제권 상실\n- §YLhûmar§!가 파괴 불가능해짐\n- §YFlaming Pearl§! 통제권 상실\n- §Y현재 통치자§! 통제권 상실\n- $elven_lhuren_origin_ending_C_modifier_tooltip$"
 elven_lhuren_origin_events.105.name:0 "목이 말라 가며 '대답해 줘'라고 외친다"
 elven_lhuren_origin_events.105.desc:0 "우리는 §B무아§! 제안으로 나아갈 것입니다. 너무 오랫동안 우리는 유아론의 피난처에 머물며, 작은 동굴 벽에 춤추는 그림자를 바라보고, 우리 주위에서 타오르는 불꽃을 알아차리지 못했습니다. 가장 굴욕적인 우주적 농담의 대상이었던 셈입니다.\n\n그러나 새 길을 걷기 위해서는 먼저 우리 중 어떤 측면이 우리를 앞으로 밀어 줄 것인지, 어떤 것이 단지 죽은 무게에 불과한지 결정해야 합니다. 과거 영광의 연대기이자 우리의 독창성에 대한 요약 증명인 영원의 배열은 이 새 철학을 시험하기에 완벽한 대상입니다.\n\n이제 우리가 지배하고자 하는 우주로부터 우리를 단열해 줄 보호막은 필요하지 않습니다. 차라리 망치와 모루가 더 유용할 것입니다. 다가올 영겁 동안 우리가 필요로 할 정복과 수양의 수많은 도구를 벼려낼 수 있도록 말입니다."
 elven_lhuren_origin_events.105.a:0 "§B미지에 대한 두려움이 더는 우리를 짓누르지 못하게 하라!§!"
 elven_lhuren_origin_events.1051.name:0 "그리고 내 모든 감정이 사라진다"
 elven_lhuren_origin_events.1051.desc:0 "§Y[Root.Owner.GetRulerTitle] [Root.GetRulerName]§!의 칙령에 따라, 수천 년 동안 따스한 위안을 주던 그려진 창공은... 산산조각 났습니다. 우리가 늘 두려워했던 운명의 변덕 때문이 아니라, 바로 우리 자신의 손으로 말입니다.\n\n눈부시지만 가슴 아픈 광경 속에서 먹빛 구름의 정교한 짜임은 광대한 암흑의 공허 위에 흐릿한 얼룩으로 물러났습니다. 그러나 과도한 애도에 빠지지는 맙시다. 시간이 지나면 더 풍요로운 아름다움이 이 새 화폭을 장식할 것입니다. 루마르의 민중은 곧 우리의 형상으로 그려진 모든 새 별을 감상하게 될 것입니다.\n\n천명에 따라, 우리는 별가루로 이루어진 모든 것을 다스립니다."
 elven_lhuren_origin_events.1051.a:0 "§B그들이 머리를 조아리든 떨든, 어느 쪽이든 상관없다.§!"
 elven_lhuren_origin_events.1051.b:0 "§B우리는 별들 사이에 새로운 낙원을 벼려낼 것이다.§!"
 elven_lhuren_origin_events.106.name:0 "피로 씻긴 셀 수 없는 별들처럼"
 elven_lhuren_origin_events.106.desc:0 "§G윤회§!는 현재 위기를 완화하면서 새 상황에 적응하기 위한 느리지만 꾸준한 전략을 제시합니다. 변화의 거센 급류에 휩쓸리는 지금, 답은 물살에 맞서 발버둥치는 것도, 물이 흐르는 대로 무턱대고 몸을 맡기는 것도 아닙니다.\n\n충분한 선견 없이 극단적 노선에 전념한 결과를 이미 경험했기에, 우리는 다음 움직임을 계획할 더 나은 관측 지점을 확보하기로 했습니다.\n영원의 배열은 다시 무조건적 신뢰를 받을 만큼 믿음직하지 못하다는 사실을 입증했지만, 이제 우리는 그 힘의 기저 원리를 더 실용적인 방식으로 활용할 만큼 충분히 알고 있습니다.\n경이로운 기계의 더 이국적인 기능을 같은 문제에 대한 통상적인 해결책으로 대체하면, 현실을 거스르는 물리학적 위업을 행할 능력은 크게 줄어들 것입니다. 그렇습니다. 그러나 같은 '마법'이 대체 동력원으로 지닌 가능성은 결코 과소평가할 수 없습니다."
 elven_lhuren_origin_events.106.a:0 "§G아직 할 수 있을 때 최대한 활용하자.§!"
 elven_lhuren_origin_events.1061.name:0 "네가 사라진 그날로 돌아가"
 elven_lhuren_origin_events.1061.desc:0 "우주적 바둑판에서 판은 끝이 없고, 모든 수는 무한한 가능성을 방사합니다. 하지만 승리가 물리적으로 불가능할 때, 어떤 이들에게 게임은 오히려 더욱 흥미로워집니다.\n\n언젠가 형상과 실체가 충분히 멀리 흘러가 서로 얽힘을 풀고, 우리가 아는 존재가 원초적 혼돈으로 산산조각 난다 해도, 우리가 만든 물결은 '공간'과 '시간'이라는 개념이 의미를 잃고 특이점으로 붕괴한 뒤에도 계속 울려 퍼질 것입니다. 그때 남은 유일한 고유상태는... 모든 것의 총합을 담을 것입니다. 그렇게 '우주'가 마지막으로 구별 가능한 '순간'을 경험할 때, 그것은 우리를 기억할 것입니다..."
 elven_lhuren_origin_events.1061.a:0 "§G그리고 우리의 투쟁이 지닌 의미를 이해하리라.§!"
 elven_lhuren_origin_events.1061.b:0 "§G우리가 한때 살아 있었다는 것을 기억하라.§!"
 elven_lhuren_origin_events.107.name:0 "그리고 모든 것을 빛 속으로 삼킨다"
 elven_lhuren_origin_events.107.desc:0 "우리 중 일부는 영원의 배열의 평화로운 피난처 밖에서 경이와 아름다움을 발견했지만, §R반열반§! 계획이 훨씬 더 많은 이들의 정서를 울린다는 것도 사실입니다. 루마르가 껍질 속으로 물러나기 전 이 은하를 누볐던 존귀한 원로들 중에서도 그 시절을 기억하는 이는 드물고, 우리가 다시 나타났을 때 맞이한 은하에 익숙함을 느끼는 이는 더더욱 적습니다.\n\n위기 동안 배운 모든 것을 통해, 우리는 장벽 붕괴의 원인인 허수 표류에 대한 적응형 해법을 개발함으로써 영원의 배열의 보호막 모듈을 최대 용량으로 복구할 수단과 지식을 갖게 되었습니다. 불행히도... 이 방법은 증상을 치료할 뿐, 초차원 편차의 핵심에 있는 질병, 곧 엔트로피라는 자연력 자체를 치료하지는 못합니다. 따라서 우리가 과거의 방식으로 돌아갈 수는 있어도, 연구자들은 몇 천 년 뒤 같은 문제에 다시 직면하리라 예측합니다. 하지만 그... 짧은 유예는 우리가 더 영구적인 해법을 발견하기에 충분해야 합니다. 그렇습니다. 우리 종족의 가장 빛나는 정신들은 보편적으로 필연이라 받아들여지는 단 하나를 극복해야 합니다. 그래야만 우리는 고요한 영원을 되찾고 이 몇 년의 어둠을 망각으로 돌려보낼 수 있습니다."
 elven_lhuren_origin_events.107.a:0 "§R아주 오랜만에, 시간이 부족해졌습니다.§!"
 elven_lhuren_origin_events.1071.name:0 "내 모든 감정을 사라지게 하며"
 elven_lhuren_origin_events.1071.desc:0 "떠나는 날이 오면 눈물 어린 작별과 마지막 순간의 변심은 피할 수 없습니다. 떠나는 이들이 우리 모두를 위해 다시는 서로 만나지 않기를 바라야 한다면 더욱 그렇습니다. 재회의 날이 온다면... 그날은 우리의 낙원이 사라지는 날이기도 할 테니까요.\n\n영원의 배열 양쪽에 선 우리 민족이 새 여정을 시작하거나 집으로 돌아가기로 결심하는 동안, 어느 쪽도 진정으로 상대의 선택을 원망할 수는 없습니다. 헤어지는 순간에도 우리는 어떤 차원에서는 같은 적, 끝나도록 설계된 불완전한 우주의 법칙에 맞서 여전히 함께 결집하고 있음을 이해합니다."
 elven_lhuren_origin_events.1071.a:0 "§R미소와 함께 마지막 작별을 고할 때입니다.§!"
 elven_lhuren_origin_events.1071.b:0 "§R우리의 길은 갈라져도, 목적은 우리를 하나로 묶습니다.§!"
 elven_lhuren_origin_project_repurpose:0 "계획: 무아"
 elven_lhuren_origin_project_repurpose_TITLE:0 "영원의 배열: 무아"
 elven_lhuren_origin_project_repurpose_DESC:0 "영원의 배열은 더 이상 본래의 목적을 수행할 수 없지만, 여전히 어떤 목적에는 봉사할 수 있습니다. 하늘을 향해 손을 뻗는 우리가 앞으로 이런 천상 구조물을 더 많이 건설하려면, 그에 능숙해져야 합니다."
 elven_lhuren_origin_project_restore:0 "계획: 반열반"
 elven_lhuren_origin_project_restore_TITLE:0 "영원의 배열: 반열반"
 elven_lhuren_origin_project_restore_DESC:0 "우리는 영원의 배열의 품에서 나올 운명이 아니었습니다. 운명이 의도된 경로대로 펼쳐지지 못한 것은 우주의 근본적 오류 때문일 뿐입니다. 상관없습니다. 우리는 그 오류에 적응하고, 언젠가 그것을 바로잡을 방법을 찾을 것입니다. 우주의 나머지에는 별 관심이 없지만, 어쩌면 그 주민들도 언젠가 엔트로피의 시드는 포식에서 해방시켜 준 우리에게 감사할지 모릅니다."
 sm_lhu_array_eternity_shield_amp:0 "허수 메타형상의 근경 생성기"
 sm_lhu_array_eternity_shield_amp_desc:0 "영원의 배열은 특정 환경 밖에서는 복제될 수 없어 보이지만, 즈로가 유발한 변칙 현상은 때때로 같은 기술과 공명하며 소규모로 활용될 수 있습니다."
 elven_lhuren_eternal_array_ruined:0 "$NAME_LHU_ETERNAL_ARRAY$"
 elven_lhuren_eternal_array_ruined_DESC:0 "천상의 고리는 한때 낙원의 영역과 속된 황무지 사이의 경계를 그렸습니다. 이제 그것이 가르는 것은 영원한 은거의 약속을 믿었던 환멸한 천상인들의 마음뿐입니다."
 elven_lhuren_eternal_array_ruined_MEGASTRUCTURE_DETAILS:0 ""
 elven_lhuren_eternal_array_requires_immortality_pass:0 "$TRIGGER_PASS$[lhuren_lhumar.GetName]의 평온은 더럽혀지지 않도록 보호받아야 합니다."
 elven_lhuren_eternal_array_requires_immortality_fail:0 "$TRIGGER_FAIL$[lhuren_lhumar.GetName]의 평온은 더럽혀지지 않도록 보호받아야 합니다."
 elven_lhuren_eternal_array_repurposed:0 "$NAME_LHU_ETERNAL_FOUNDRY$"
 elven_lhuren_eternal_array_repurposed_DESC:0 "천상의 고리는 한때 운명의 직물로 보호의 고치를 짰습니다. 이제 그것은 운명의 실 자체가 자아질 베틀입니다."
 elven_lhuren_eternal_array_repurposed_MEGASTRUCTURE_DETAILS:0 ""
 elven_lhuren_eternal_array_restored:0 "$NAME_LHU_ETERNAL_ARRAY$"
 elven_lhuren_eternal_array_restored_DESC:0 "한때 두 세계 사이의 넘을 수 없는 경계에 서 있던 천상의 고리가 무한한 교차로의 수호자로 환생했습니다."
 elven_lhuren_eternal_array_restored_MEGASTRUCTURE_DETAILS:0 ""
 elven_lhuren_eternal_array_static:0 "$NAME_LHU_ETERNAL_ARRAY$"
 elven_lhuren_eternal_array_static_DESC:0 "천상의 고리는 행성을 보호하듯 둘러싸며, 깨지지 않는 껍질의 품 안에서 외로운 영원을 약속합니다."
 elven_lhuren_eternal_array_static_MEGASTRUCTURE_DETAILS:0 ""
 elven_lhuren_nirvana_tooltip:0 "§Y열반§!은 §Y$NAME_LHU_ETERNAL_ARRAY$§!가 보호하는 £pop£ POP에 의해 증가합니다.$TABBED_NEW_LINE$- 현재 열반: §Y[EOSNirvanaCounter]§!$TABBED_NEW_LINE$- 월간 열반: §G+1§!"
 elven_lhuren_anatta_tooltip:0 "§Y무아§!는 §Y거대구조물§!을 건설하고 업그레이드하면 증가합니다.$TABBED_NEW_LINE$- 현재 무아: §Y[ROOT.EOSAnattaCounter]§!"
 elven_lhuren_samsara_tooltip:0 "§Y윤회§!는 §Y기술§!을 연구하면 증가합니다.$TABBED_NEW_LINE$- 현재 윤회: §Y[ROOT.EOSSamsaraCounter]§!"
 elven_lhuren_origin_events.0001.name:0 "§R고유 기원 오류!§!"
 elven_lhuren_origin_events.0001.desc:0 "§Y$origin_elven_celestial_throne$§! 기원을 이 플레이어에게 올바르게 설정할 수 없습니다!\n\n사유: §R전역 이벤트 대상 불일치§!\n세부 정보: §H[this.GetName]§!이 §H[lhuren_lhumar.owner.GetName]§!와 같은 값이 아님\n또는: §H[lhuren_lhumar.GetName]§!에 유효한 소유자가 없음\n또는: §H[lhuren_lhumar.GetName]§!이 존재하지 않음\n\n§R주의:§! 이 기원은 플레이어 한 명만 지원할 수 있습니다. 중복 플레이어는 해당 메커니즘과 상호작용할 수 없습니다.\n새 게임을 시작하고 §Y$origin_elven_celestial_throne$§! 기원을 가진 제국이 하나만 생성되도록 하십시오."
 elven_lhuren_origin_events.0001.a:0 "어이쿠!"
 elven_celestial_grace_events.301.name:0 "천상의 은총 보존"
 elven_celestial_grace_events.301.desc:0 "우리 제국의 전통에서, 온 우주에 대한 지배권을 부여하는 위임은 무조건 주어지지 않습니다. 무능하거나 덕이 없거나 그저 지친 [Root.GetRulerTitle]은 결국 하늘의 총애를 잃고 불만을 품은 신민들의 끊임없는 반대에 직면할 것입니다.\n\n마찬가지로, 자신이 다스리는 땅과 백성에 아무런 유대가 없는 통치자는 자기 자아의 꼭두각시가 될 운명입니다. 결국 역사에는 자기 파괴의 소용돌이로 문명 전체를 휩쓸어 버린 유아론적 독재자가 부족하지 않습니다.\n\n[Root.GetRulerName]이 천상의 은총을 잃었다고 여겨진다면, 제국을 위해 [Root.Ruler.GetSheHeCap]는..."
 elven_celestial_grace_events.301.a:0 "귀족 씨족들을 달랜다."
 elven_celestial_grace_events.301.b:0 "[Ruler.GetHerHisCap] 후계자의 즉위를 준비한다."
 elven_celestial_grace_events.301.c:0 "새 왕조에 옥좌를 양도한다."
 elven_celestial_grace_events.301.d:0 "$TRIGGER_FAIL$조금 더 생각해 본다..."
 edict_eos_lhu_edict_celestial_mandate:0 "천상의 은총 보존"
 edict_eos_lhu_edict_celestial_mandate_desc:0 "체제의 정통성이 의심받을 때, 자격 없는 이가 우리 모두를 파멸로 이끌지 않도록 어려운 선택을 내려야 할 수 있습니다."
 planet_eos_celestials:0 "천상 관청"
