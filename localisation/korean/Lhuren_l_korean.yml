 ELVEN_civ3_home_system_name:0 "아우를로노르"
 gov_elven_celestial_grace_empire:0 "천상 왕조"
 gov_elven_celestial_grace_empire_desc:0 "이 정부는 왕조 군주정으로, 수많은 씨족과 혈통과 가문이 지상의 집착과 영적 수양 사이의 균형 속에서 조화를 추구합니다."
 RT_EOS_CELESTIAL_GRACE_EMPEROR:0 "용 황제"
 RT_EOS_CELESTIAL_GRACE_EMPRESS:0 "봉황 여제"
 HT_EOS_CELESTIAL_GRACE_CROWN_PRINCE:0 "용 황태자"
 HT_EOS_CELESTIAL_GRACE_CROWN_PRINCESS:0 "봉황 황태녀"
