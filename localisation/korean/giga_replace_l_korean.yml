 major_orbital:0 "$gc_kilo$거주지 대형 궤도 시설"
 major_orbital_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_kilostructure$ - $giga_list_category_habitable_upgrade$\n§Y$habitat_complex$§!에 £mod_planet_max_districts_add£ §Y$MOD_PLANET_MAX_DISTRICTS_ADD$§!, §Y자원 지구§!, 그리고 £mod_planet_max_buildings_add£ §Y$MOD_PLANET_MAX_BUILDINGS_ADD$§!을 제공합니다.\n§L지역 거주지 복합 단지 인구의 추가 생활 환경 및 근무 공간을 제공하도록 설계된 큰 기본 궤도 시설입니다.§!"
 minor_orbital:0 "$gc_kilo$거주지 소형 궤도 시설"
 minor_orbital_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_kilostructure$ - $giga_list_category_habitable_upgrade$\n§Y$habitat_complex$§!에 §Y자원 지구§!와 £mod_planet_max_buildings_add£ §Y$MOD_PLANET_MAX_BUILDINGS_ADD$§!을 제공합니다.\n§L지역 거주지 복합 단지 인구의 추가 생활 환경 및 근무 공간을 제공하도록 설계된 작은 기본 궤도 시설입니다."
