 add_research_options_galactic_wonders_utopia:0 "연구 선택지 획득:\n£engineering_research£§Y$tech_ring_world$§!\n£physics_research£§Y$tech_dyson_sphere$§!\n\n이를 선행으로 요구하는 기술:\n£physics_research£§Y$giga_tech_fusion_suppressor$§!\n£physics_research£§Y$giga_tech_penrose_sphere_2$§!\n£physics_research£§Y$giga_tech_ringworld_titanic_1$§!\n£society_research£§Y$giga_tech_planetary_computer$§!\n£engineering_research£§Y$giga_tech_star_lifter$§!\n£engineering_research£§Y$giga_tech_neutronium_gigaforge$§!\n£engineering_research£§Y$giga_tech_penrose_sphere_3$§!\n£engineering_research£§Y$giga_tech_ringworld_upgrade$§!\n£engineering_research£§Y$giga_tech_ringworld_titanic_2$§!\n£engineering_research£§Y$giga_tech_interstellar_ringworld$§!\n£engineering_research£§Y$giga_tech_war_moon_2$§!\n£engineering_research£§Y$tech_sm_megastructure$§!\n\n이를 선행으로 요구하는 승격 특전:\n§Y$ap_gigastructural_constructs$§!"
 add_research_options_galactic_wonders_utopia_megacorp:0 "연구 선택지 획득:\n£engineering_research£§Y$tech_ring_world$§!\n£physics_research£§Y$tech_matter_decompressor$§!\n£physics_research£§Y$tech_dyson_sphere$§!\n\n이를 선행으로 요구하는 기술:\n£physics_research£§Y$giga_tech_fusion_suppressor$§!\n£physics_research£§Y$giga_tech_penrose_sphere_2$§!\n£physics_research£§Y$giga_tech_ringworld_titanic_1$§!\n£society_research£§Y$giga_tech_planetary_computer$§!\n£engineering_research£§Y$giga_tech_star_lifter$§!\n£engineering_research£§Y$giga_tech_neutronium_gigaforge$§!\n£engineering_research£§Y$giga_tech_penrose_sphere_3$§!\n£engineering_research£§Y$giga_tech_ringworld_upgrade$§!\n£engineering_research£§Y$giga_tech_ringworld_titanic_2$§!\n£engineering_research£§Y$giga_tech_interstellar_ringworld$§!\n£engineering_research£§Y$giga_tech_war_moon_2$§!\n£engineering_research£§Y$tech_sm_megastructure$§!\n\n이를 선행으로 요구하는 승격 특전:\n§Y$ap_gigastructural_constructs$§!"
 ap_master_builders_desc:0 "거대 구조물을 건설하려면 전례 없는 수준의 자원과 계획이 필요합니다. 우리는 거대 건축 분야에서 새로운 지평을 열고 있습니다.\n\n이를 선행으로 요구하는 기술:\n£engineering_research£§Y$giga_tech_ringworld_gargantuan_1$§!\n\n이를 선행으로 요구하는 승격 특전:\n§Y$ap_vast_expanses$§!"
 transcendence_tooltip:0 "이를 선행으로 요구하는 기술:\n£society_research£§Y$giga_tech_psychic_hypersiphon_1$§!\n\n모든 구성원이 우리 종족이 가진 사이오닉 잠재력을 최대한 각성합니다."
 ap_voidborn_desc:1 "한때는 차갑고 극복하기 어려운 장벽으로 여겨졌던 공허는 우리에게 제2의 고향이 되었습니다. 우리는 심우주에서도 영구적으로 거주할 수 있게 적응하면서, 거주지에 필요한 기반 시설을 줄이고 다른 용도로 사용할 수 있는 공간을 더 확보했습니다.\n\n이를 선행으로 요구하는 기술:\n£society_research£ §Y$giga_tech_stellar_ring_habitat$§!\n£engineering_research£ §Y$giga_tech_interstellar_habitat$§!"
 enable_colossus_project:0 "특별 프로젝트 활성화: 콜로서스 계획\n\n이를 선행으로 요구하는 승격 특전:\n§Y$ap_vast_expanses$§!\n\n"
 tr_unyielding_finish_desc:1 "\n§E고유 거대 구조물 잠금 해제:§! §R$name_maginot$§!\n이를 필요로 하는 연구 선택지:\n£society_research£ §Y$giga_tech_maginot_world$§!\n\n$MOD_STARBASE_DEFENSE_PLATFORM_CAPACITY_MULT$ §G+50%§!\n$mod_starbases_upkeep_mult$ §G-20%§!\n§Y$military_federation$§! 연방 유형을 사용할 수 있습니다.\n잠금 해제된 승격 특전: §G+1§!"
 tr_unyielding_federations_finish_desc:1 "\n§E고유 거대 구조물 잠금 해제:§! §R$name_maginot$§!\n이를 필요로 하는 연구 선택지:\n£society_research£ §Y$giga_tech_maginot_world$§!\n\n$MOD_STARBASE_DEFENSE_PLATFORM_CAPACITY_MULT$ §G+50%§!\n$mod_starbases_upkeep_mult$ §G-20%§!\n§Y$military_federation$§! 연방 유형을 사용할 수 있습니다.\n잠금 해제된 승격 특전: §G+1§!"
