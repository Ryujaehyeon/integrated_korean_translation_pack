 spy_orb_0_MEGASTRUCTURE_DETAILS:3 "£galwonders£ $giga_list_category_megastructure$ - $giga_list_category_miscellaneous$\n§Y은하계 전체§!의 §Y감지 범위§!를 제공합니다\n§L$spy_orb_4$는 단계적으로 감지 범위를 확장해, 마지막 단계에서는 은하계 전체를 감시합니다.§!"
 strategic_coordination_center_0:0 "$gc_mega$전략 조정 센터 건설 현장"
 orbital_ring:0 "$gc_kilo$오비탈 링"
 orbital_ring_tier_1_CONSTRUCTION_INFO_DELAYED:1 "$giga_list_additional_data$ - 오비탈 링은 행성에 방어상의 이점을 제공하며, 거주 모듈과 궤도 생산 시설은 물론 다수의 항성 기지 모듈과 건물을 수용하는 플랫폼을 제공합니다."
 quantum_catapult_0:0 "$gc_mega$양자 발사 장치 건설 현장"
 quantum_catapult_0_CONSTRUCTION_INFO_DELAYED:1 "$giga_list_additional_data$ - 양자 발사 장치의 초기 버전은 함대를 목적지 §H밖에 있는§! 성계에 보내게 될 수도 있습니다. 이 '§Y오차 반경§!'은 향후 업그레이드를 통해 줄일 수 있습니다."
 hyper_relay:0 "$gc_kilo$초공간 중계기"
 orbital_arc_furnace_1:0 "$gc_kilo$$orbital_arc_furnace_4$: 적도 밴드"
 orbital_arc_furnace_1_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_kilostructure$ - $giga_list_category_advanced_resource_production$\n용융된 행성의 원초적인 힘을 이용하여, §Y$orbital_arc_furnace_4$§!은 접근 불가능했던 광물을 채굴하고 성계 전체의 채굴 작업을 개선합니다.\n§L대규모 시스템을 생산적인 동력원으로 만들 수 있는 장치입니다.§!"
 dyson_swarm_1:0 "$gc_kilo$$dyson_swarm_3$: 배열"
 dyson_swarm_1_MEGASTRUCTURE_DETAILS:1 "£gigastructural£ £megaupgrade£ $giga_list_category_kilostructure$ - $giga_list_category_basic_resource_production$\n서로 연결된 위성 배열인 §Y$dyson_swarm_3$§!은 항성 매장지의 생산량을 향상시키도록 설계되었습니다.\n§L§Y$dyson_swarm_3$§!은 §Y$dyson_sphere_5$§!의 원초적인 힘으로 나아가는 디딤돌입니다.§!"
 dyson_swarm_1_DESC:1 "서로 연결된 위성 배열인 §Y$dyson_swarm_3$§!은 항성 매장지의 생산량을 향상시키도록 설계되었습니다."
 dyson_swarm_2_DESC:1 "서로 연결된 위성 배열인 §Y$dyson_swarm_3$§!은 항성 매장지의 생산량을 향상시키도록 설계되었습니다."
 dyson_swarm_3_DESC:1 "서로 연결된 위성 배열인 §Y$dyson_swarm_3$§!은 항성 매장지의 생산량을 향상시키도록 설계되었습니다."
 cosmogenesis_world_0:0 "$gc_crisis$$pc_cosmogenesis_world$"
 cosmogenesis_world_0_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_crisis$ - $giga_list_category_science_production$\n팝을 효과적으로 소모하여 §Y연구§!와 §Y고급 논리§!를 생성하는 거대한 저장소 컴퓨터입니다. 효율성 - 그리고 소모율 - 은 인구에 따라 증가합니다.\n§L현실 내부에서 의미를 찾아내기 위해서는 새로운 종류의 과학이 필요합니다...§!"
 cosmogenesis_needle:0 "$gc_crisis$$NAME_Cosmogenesis_Sphere$"
 cosmogenesis_needle_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_crisis$ - $giga_list_category_special$\n우리가 만든 현실로 승천하기 위해, 우리는 이 우주를 영원히 떠나기 전에 호라이즌 니들에 모든 문명을 승선시켜야 합니다.\n§L우주 법칙에 대한 명백한 위반입니다.§!"
 crisis_sphere_0:0 "$gc_crisis$Aetherophasic Engine Frame"
 crisis_sphere_0_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_crisis$ - $giga_list_category_special$\\n$crisis_sphere_0_DESC$\\n§LOur minds will no longer be limited by the physical constraints of our feeble bodies, and reality itself shall be at our mercy. Truly, there can be no higher plane of existence.§!"
 galactic_crucible_0:0 "$gc_crisis$Galactic Crucible Frame"
 galactic_crucible_0_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_crisis$ - $giga_list_category_special$\\nThis vast station siphons energy from its host star, powering automated shipyards that produce §Y$entropy_conduit_plural$§!; vessels capable of reshaping stellar destinies.\\n§L$galactic_crucible_0_DESC$§!"
 grand_archive_0:0 "$grand_archive$"
 grand_archive_0_MEGASTRUCTURE_DETAILS:1 "$giga_list_category_kilostructure$ - $giga_list_category_miscellaneous$\n은하계 전역에서 수집한 가장 가치 있는 유물들을 보존하고 전시합니다.\n§L살아있는 우주 동물군을 포함하여 은하계 전역에서 수집한 주목할 만한 표본들을 보관하고 전시하도록 설계된 전용 궤도 구조물입니다.§!"
 deep_space_citadel_0:0 "$gc_kilo$$tech_deep_space_citadel$"
 deep_space_citadel_0_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_kilostructure$ - $giga_list_category_defensive$\\nA §Y$deep_space_citadel_0$§! is an armored Starbase designed for maximum defense within a stellar gravity well.\\n§L$deep_space_citadel_0_DESC$§!"
 shroud_seal:0 "$SHROUD_SEAL$"
 shroud_seal_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_kilostructure$ - $giga_list_category_psionics$\\nThe §Y$SHROUD_SEAL$§! attenuates nearby §Y$PSIONIC_AURA_PLURAL$§!. §Y$PSIONIC_AURA$§! in this system decay by $@shroud_seal_decrease|0$ intensity, and adjacent systems by -1.\\n§L$shroud_seal_DESC$§!"
 behemoth_egg:0 "$gc_crisis$Behemoth Egg"
 behemoth_egg_DESC:0 "A giant organic vessel bearing a gestating §YBehemoth§!."
 behemoth_egg_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_crisis$ - $giga_list_category_special$\\nThis structure supports the development of §YBehemoth eggs§!.\\n§L$behemoth_egg_DESC$§!"
 concept_automodding_hab_preference_desc:0 "Regular:\\n- ['trait:trait_auto_dry_preference']\\n- ['trait:trait_auto_wet_preference']\\n- ['trait:trait_auto_cold_preference']\\n\\nSpecial:\\n- ['trait:trait_auto_pc_nuked_preference']\\n- ['trait:trait_auto_pc_gaia_preference']\\n- ['trait:trait_auto_pc_hive_preference']\\n\\nArtificial:\\n- ['trait:trait_auto_pc_city_preference']\\n- ['trait:trait_auto_pc_relic_preference']\\n- ['trait:trait_auto_pc_habitat_preference']\\n- ['trait:trait_auto_pc_ringworld_habitable_preference']\\n- ['trait:trait_auto_pc_cosmogenesis_world_preference']\\n- ['trait:trait_auto_pc_alderson_slice_preference']"
