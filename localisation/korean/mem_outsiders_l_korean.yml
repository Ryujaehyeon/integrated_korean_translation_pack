l_korean:
 mem_outsiders_dig_site:0 "외부인들"
 mem_outsiders_dig_site_desc:0 "황량한 [From.Planet.GetName]의 표면 아래에는 광활하지만 버려진 전초 기지가 숨겨져 있습니다. \n\n전초 기지의 고립과 이 [From.Planet.GetPlanetMoon]에서 생물권이 전혀 존재하지 않는 것은 이전 거주자들이 이 행성에서 기원하지 않았음을 분명히 보여줍니다. 그러나 그들이 왜 이곳에 정착하기로 선택했는지는 미스터리입니다."
 mem_outsiders.1.name:0 "집까지 삼만리"
 mem_outsiders.1.desc:0 "전초 기지 한가운데에 있는 대형 건물은 가장 오래된 것으로 보입니다. 정착지의 역사 초기에 시작하는 것이 논리적이었습니다. 전초 기지의 시스템이 독특한 설계로 인해 연구가 어려웠지만, 결국 [Leader.GetName]는 많은 데이터를 해독할 수 있었습니다. 이 전초 기지를 건설한 종족은 그들의 먼 고향 세계를 따서 §YNeerteans§!라고 불렀습니다. 기지 자체는 §YNew Neert§!라고 불렸습니다. 이 건물은 어느 시점에 버려졌고 대부분의 중요한 시스템은 더 잘 갖춰진 시설로 이전되었지만, 일부 데이터와 로그는 남아 있습니다 - 아마도 초기 시절은 어떤 감정적 가치를 지니고 있었을 것입니다. 그러나 일부 메시지는 개척민을 이례적인 시각으로 비추고 있습니다: \n\n§S\"기지 로그, 사령관 구르. 임무 날짜 1.01.\n통로는 완전한 성공이었습니다. 기지 캡슐은 경미한 손상을 입었지만, 우리가 고칠 수 있는 것은 아닙니다. \n\n목적지는 우리의 모델과 일치하지만, 직접 목격하는 것은 여전히 충격적입니다. 하늘을 바라보며 어떤 플럭스 잔여물도 보이지 않는 것은 불안합니다. 융합 동력의 천체 광채는 제가 상상했던 것보다 훨씬 밝고, 검은 하늘에서 거의 불안할 정도로 선명합니다.\n\n플럭스 샘플에 접근할 수 없다는 것은 우리의 연구가 추가적인 시간을 필요로 한다는 것을 의미하지만, 시간 차이를 고려할 때 이는 문제가 되지 않을 것입니다.\"§!\n\n개척민이 단순히 다른 행성에서 온 것이 아니라 전혀 다른 우주에서 왔던 것처럼 보입니다. 그러나 그들이 로그를 작성할 만큼 오랫동안 살았던 것을 고려하면, 그들의 고향 우주는 그렇게 다르지 않을지도 모릅니다."
 mem_outsiders.2.name:0 "세대별 프로젝트"
 mem_outsiders.2.desc:0 "[Leader.GetName]는 오래된 건물에서 새로운 건물로 전초 기지를 계속 탐험해왔습니다. 많은 세대의 네르티안들이 [From.Planet.GetName]에서 살고 일하며 죽었던 것으로 보입니다. [Leader.GetSheHeCap]는 오래된 아카이브에서 intact 로그를 찾아 해독할 수 있었습니다. \n\n§S\"트라스 사령관의 공공 접근 뉴스레터. 임무 날짜 36.22.\n오늘은 원정대의 마지막 생존자인 부수석 공학자 크란드의 서거를 기념합니다. 그의 프로젝트에 대한 두려움 없는 노력은 우리 모두에게 조상들이 왜 이곳에 왔고 우리가 지금 왜 여기에 있는지를 상기시킵니다. 우리는 결코 이를 잊어서는 안 됩니다.\"§! \n\n유아원, 학교, 작업장 및 무덤은 문제 해결에 헌신한 개척민들의 끊임없는 노력을 조명합니다. \n\n현재로서는 식민지가 왜 붕괴되었는지 불분명합니다. 일부 중요한 시스템을 방해했을 수 있는 전투와 일치하는 표면적인 피해가 있지만, 피해가 너무 경미하여 고의적인 공격을 나타내지는 않습니다."
 mem_outsiders.3.name:0 "표면에 갇힘"
 mem_outsiders.3.desc:0 "네르티안들이 이 은하의 이 지역에 존재했던 하나 이상의 외계 문명과 관계를 유지해온 것 같습니다. [Leader.GetName]는 식민지 외곽에 있는 격납고와 보급 창고를 확인했습니다. 또 다른 해독된 로그가 이를 확인합니다. \n\n§S\n베어 의원의 기초 로그. 임무 날짜 212.14. \n오늘, 합의한 대로, 우리의 파트너가 그들의 선박 중 하나에 우리 인원을 허용했습니다. 생존자는 없었습니다. 우리가 두려워했던 대로입니다 - 거대한 천체의 중력 우물 밖에서, 우리의 몸은 생존을 위해 플럭스가 필요합니다. 우리의 파트너는 우리가 결국 이를 극복하거나 충분한 보호 장치를 개발할 수 있기를 희망한다고 표현했지만, 그들은 상황의 본질을 완전히 이해하지 못하는 것 같습니다. 존재하지도 않는 것의 부재에 대해 어떻게 스스로를 보호할 수 있을까요?\"§!\n\n플럭스는 네르티안 본 우주에서는 풍부하지만 우리 우주에서는 없는 것으로, 그들이 우주를 여행하는 데 필요했던 것 같습니다. 그들이 이 [From.Planet.GetPlanetMoon]를 살아서 떠날 방법을 찾았다는 징후는 없으며, 이는 그들의 부재를 더욱 불길하게 만듭니다."
 mem_outsiders.4.name:0 "플럭스 문제"
 mem_outsiders.4.desc:0 "[Leader.GetName]는 Neertean 식민지에서 가장 고급 실험 복합 단지를 확인했습니다. 이곳에는 그들의 연구 데이터 대부분이 포함되어 있지만, 우리는 그 함의에 대해 완전히 이해할 수 있는 필요한 기준 틀을 갖추고 있지 않습니다. 적어도 일부 로그는 통찰력을 제공합니다. \n\n\"§S수석 과학자 Dalk의 기밀 로그. 임무 날짜 331.79.\n우리가 해냈다고 생각합니다. 모든 노력이 드디어 결실을 맺었습니다. 모델은 Flux Decay를 완전히 중단하고 부분적으로 되돌리는 방법을 제시합니다. 고향 세계에 연락하고 싶어 미치겠습니다. 고향 세계가 실제로 어떤 모습일지 알아보고 싶습니다.\"§! \n\n어떤 시점에서 Neerteans는 멸종 수준의 문제인 Flux Decay에 직면한 것 같습니다. Flux Decay가 정확히 무엇이었는지는 명확하지 않지만, Flux가 무엇인지도 명확하지 않기 때문에 Neerteans는 그것이 방치될 경우 그들의 전체 우주를 파괴할 위협이 될 것이라고 생각했습니다. 중대한 시간 부족에 직면한 그들은 해결책을 찾았습니다 - 그들의 가장 뛰어난 인재들을 우리 우주로 보내는 것이었습니다. 그곳에서는 시간이 훨씬 더 빠르게 흐르기 때문에, 그렇게 하면 개척민들이 문제를 해결하고 그들의 발견을 고향에 보고할 충분한 시간을 가질 것이라고 믿었습니다."
 mem_outsiders.5.name:0 "어려운 선택"
 mem_outsiders.5.desc:0 "[Leader.GetName]는 붕괴 직전 Neertean 개척민들에게 서비스를 제공했던 지휘소를 찾을 수 있었습니다. 그들의 연구가 완료된 후 여기서 많은 논의가 이루어졌으며, 보존된 기록을 보면 그 이유를 쉽게 알 수 있습니다. 개척민들은 플럭스 붕괴 문제를 해결했을지도 모르지만, 또 다른 문제인 고향과 연락하는 방법은 해결하지 못했습니다. Neert 우주에서 우리의 우주로의 균열을 여는 것은 상대적으로 안전한 것처럼 보이지만, 그 반대는 상당히 파괴적입니다. Neerteans가 [From.Planet.GetName]를 떠날 수 없었던 만큼, 그들은 고향의 형제들을 구하기 위해 자신의 생명을 희생할 용의가 있는지 선택해야 했습니다. 지휘소 아카이브에 마지막으로 남긴 기록은 다음과 같습니다: \n\n§S\"지휘관 잘의 개인 기록. 임무 날짜 332.02. \n확인되었습니다. 소문이 퍼졌습니다. 우리는 상황을 통제하지 못하고 있습니다.\"§!"
 mem_outsiders.6.name:0 "혁명"
 mem_outsiders.6.desc:0 "식민지 외곽에 있는 작은 연구소는 네르트로 신호가 전송되도록 설계된 곳인 것 같습니다. 중앙 식민지 지도자가 축출된 후, 서로 다른 세력 간의 격렬한 전투가 벌어진 장소이기도 합니다. 연구소 아카이브에 보존된 유일한 기록은 다음과 같습니다: \n\n§S\"임시 사령관 둔의 공개 접근 뉴스레터. 임무 날짜 332.24. \n거짓말하는 폭군 잘이 축출되었습니다. 그는 우리의 §!\"의무\"§S가 §!\"모국\"§S을 구하기 위해 우리의 생명을 포기하는 것이라고 주장하지만, 이것이 바로 우리의 모국입니다. 우리가 태어난 곳이자 우리가 죽을 곳입니다. 우리는 이곳을 만들었고, 이곳에서 우리의 삶을 구축했습니다. 누가 우리에게 이를 포기하고 그들을 구하라고 요구할 수 있습니까? 우리는 그것을 허용하지 않을 것입니다. 나는 그것을 허용하지 않을 것입니다. 잘에게 여전히 충성하는 자가 나에게 도전할 수 있다고 생각한다면, 그들은 마음을 바꾸는 것이 좋습니다. 그렇지 않으면 나는 맹세합니다...\"§! \n\n로그는 갑자기 끝납니다. 다음에 무슨 일이 일어났는지, 그리고 후속 내전에서 누가 승리했다고 볼 수 있는지는 불분명합니다. 둔과 그의 추종자들은 어디에도 없습니다. 잘도 마찬가지입니다. 시간과 공간의 구조를 파괴하고 신호를 네르트로 전송하도록 설계된 장치는 여전히 온전합니다 - 파괴되지도 않았고 활성화되지도 않았으며, 마지막 명령을 기다리고 있습니다."
 mem_outsiders.6.a:0 "기계를 활성화해라."
 mem_outsiders.6.a.tooltip:0 "신호가 전송될 것입니다. [From.Planet.GetName]는 그 과정에서 파괴될 것입니다. 신호가 목적지에 도달할지는 누가 알겠습니까? 그곳에서 누군가에게 도움이 될지는 누가 알겠습니까?"
 mem_outsiders.6.b:0 "기계를 무시하고 전초기지를 해체하고 잔해를 수거해라."
 mem_outsider.7.name:0 "초차원 신호"
 mem_outsider.7.desc:0 "우리는 은하계 전체에 퍼지는 신호를 포착하고 있습니다. 대부분이 무작위적인 소음으로 오인했지만 니어티안 신호를 즉시 인식할 수 있습니다.\n\n메시지는 아마도 우리를 위한 것입니다."
 mem_outsiders.8.desc:0 "들리나? 우리말을 들을 수 있나?\n\n우리는 당신의 우주에 대한 탐험이 실패했음을 이해한다. 그래도 작업을 마칠 수 있어서 고맙다. 당신의 행동이 우리 우주에 얼마나 도움이 되었는지 과장하는 것은 불가능하다.\n\n감사의 표시로 우리는 우주 간의 상호 작용에 관한 자체 연구를 통해 기술 물품을 준비했다. 그중 일부가 당신들에게 도움이 될 거라고 확신한다."
 mem_outsiders.8.a:0 "천만에."
 mem_outsiders.8.a.response:0 "다시 한번 감사한다.\n\n안타깝게도 이것이 우리가 말하는 마지막 시간이다. 이제부터 우리의 모든 노력은 플럭스 부식을 완화하고 우리 문명을 재건하는 데 전념하겠다. 우리가 끝날 때쯤이면 당신의 문명은 이미 사라진 지 오래일 것이다."
 mem_outsiders.8.b:0 "이제 그 쪽 우주는 괜찮은가?"
 mem_outsiders.8.b.response:0 "괜찮지 않습니다. 당신은 Flux Decay가 우리 우주에 끼친 피해를 상상조차 할 수 없을 것입니다. 우리가 잃은 수많은 세계와 수십억의 생명은 아무것도 되돌릴 수 없으며, 이는 우리가 탐험한 지역에서만의 이야기입니다. \n\n하지만 이전에 절망적이었던 상황은 더 이상 그렇지 않습니다. 우리 우주는 아직 견딜 수 있을지도 모릅니다. 비록 우리를 둘러싼 비교적 작은 지역일지라도 말입니다."
 mem_outsiders.8.c:0 "어떻게 우리와 실시간으로 소통할 수 있지?"
 mem_outsiders.8.c.response:0 "우리는 원정대를 보낼 때 처음 생성된 균열을 이용한다. 우리가 그것에 가까울수록 더 빠른 시간이 흐른다."
 mem_outsiders.8.d:0 "당신들의 탐험을 안타깝게 생각한다."
 mem_outsiders.8.d.response:0 "그럴 필요 없습니다. 우리는 두 우주 간의 시간 흐름 차이로 인해 우리가 보낸 이들이 돌아올 가능성이 없다는 것을 충분히 알고 있었습니다. \n\n우리는 그들이 자신의 후손이 그들의 일을 완수해야 할 것이라는 것을 잘 알고 보내었습니다. 식민지가 내부 분열로 무너진 것은 비극적이지만, 그렇게 많은 세대가 지난 후에는 그만큼의 확신이 없을 것이라는 것을 예상해야 했습니다."
 mem_outsiders.8.e:0 "다른 원정대를 보낼건가?"
 mem_outsiders.8.e.response:0 "보내지 않을 것이다. 한 번 안정적인 균열을 열기 위해 우리가 들인 엄청난 노력 외에도, 당신의 우주는 우리에게 극도로 적대적이다.\n\n현재로서는 편도 여행을 보장할 방법이 없다."
 tech_mem_outsiders_weaponized_rift:0 "무기화된 플럭스 투영장치"
 tech_mem_outsiders_weaponized_rift_desc:0 "네르티안 우주로의 균열을 열어 우리 우주로 일부 플럭스를 유입시킬 수 있으며, 이를 좁은 빔으로 집중하면 그 입자들은 우리 우주의 물질과 상호작용할 때 엄청난 파괴력을 발휘할 수 있습니다."
 tech_mem_outsiders_rift_impellers:0 "플럭스 추진장치"
 tech_mem_outsiders_rift_impellers_desc:0 "니어티안 우주에서 소량의 플럭스를 끌어올 수 있으며 놀랍게도 효과적인 추진 수단으로 사용할 수 있습니다."
 tech_mem_outsiders_flux_campouphlage:0 "플럭스 교란기"
 tech_mem_outsiders_flux_campouphlage_desc:0 "우주 진공에 던져진 소량의 플럭스는 적의 조준을 절망적으로 혼란스럽게 만듭니다."
 tech_mem_outsiders_flux_power:0 "균열 에너지 제작술"
