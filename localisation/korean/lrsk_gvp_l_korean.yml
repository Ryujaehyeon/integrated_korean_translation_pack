 lrsk_gvp_civic_hive_thinker_caste:0 "사고자 계급"
 lrsk_gvp_civic_hive_thinker_caste_desc:0 "벌집의 야망을 더욱 확장하기 위해, 벌집 정신은 집단 지식을 키우기 위해 호기심 많고 분석적인 드론의 특별한 계급을 육성합니다."
 lrsk_gov_var_civic_hive_void_affinity_nomadic:0 "$rsk_gov_var_civic_hive_void_affinity$"
 lrsk_gov_var_civic_hive_void_affinity_nomadic_desc:0 "수천 년에 걸친 초공간 방목은 하이브 마인드를 행성의 부유한 자원에 대한 미식가로 만들었습니다."
 lrsk_gov_var_civic_machine_astroprospecting_mainframe_nomadic:0 "$lrsk_gov_var_civic_machine_astroprospecting_mainframe$"
 lrsk_gov_var_civic_machine_astroprospecting_mainframe_nomadic_desc:0 "이 기계 지능의 창조자들은 별을 활용하는 사회 계획을 세우기 위해 이를 만들었으며, 지금도 그들 없이 이 임무를 훌륭하게 수행하고 있습니다."
 lrsk_gov_var_civic_mc_gig_economy_nomadic:0 "$lrsk_gov_var_civic_mc_gig_economy$"
 lrsk_gov_var_civic_mc_gig_economy_nomadic_desc:0 "이 회사는 '긱 경제' 비즈니스 모델을 아크 전역 및 이후 초공간 규모로 적용하는 데 선두주자였습니다. 모두가 필요한 것을 제때 제공하기 위해 바쁘게 움직이고 있습니다."
 lrsk_gov_var_civic_mc_vacay_planning_nomadic:0 "$lrsk_gov_var_civic_mc_vacay_planning$"
 lrsk_gov_var_civic_mc_vacay_planning_nomadic_desc:0 "이 사회의 사람들은 항상 새롭고 흥미로운 경험에 대한 갈망을 가지고 있었고, 그래서 이 메가코퍼는 이를 제공함으로써 부유하고 강력해졌습니다. 그들의 큰 전환점은 행성 관광과 이를 지원하는 법적 인프라를 개척한 것이었습니다."
 LRSK_GVP_FED_START_SETTLED_COMMON:0 "수십 년 전, 우리의 첫 번째 원시 초광속 탐사선이 우리와 이웃한 항성계를 방문했을 때, 우리는 두 개의 뚜렷한 외계 문명의 존재를 발견했습니다."
 LRSK_GVP_FED_START_NOMADIC_COMMON:0 "수십 년 전, 우리의 방랑하는 길은 두 개의 거주 가능한 항성계에 도달하게 되었고, 그로 인해 두 개의 독특한 외계 문명과 첫 접촉을 하게 되었습니다."
 LRSK_GOV_VAR_START_SCREEN_FOR_DISCOVERY_SETTLED:0 "$LRSK_GVP_FED_START_SETTLED_COMMON$ $LRSK_GOV_VAR_START_SCREEN_FOR_DISCOVERY$"
 LRSK_GOV_VAR_START_SCREEN_FOR_DISCOVERY_NOMADIC:0 "$LRSK_GVP_FED_START_NOMADIC_COMMON$ $LRSK_GOV_VAR_START_SCREEN_FOR_DISCOVERY$"
 LRSK_GOV_VAR_START_SCREEN_TRADEWAYS_SETTLED:0 "$LRSK_GVP_FED_START_SETTLED_COMMON$ $LRSK_GOV_VAR_START_SCREEN_TRADEWAYS$"
 LRSK_GOV_VAR_START_SCREEN_TRADEWAYS_NOMADIC:0 "$LRSK_GVP_FED_START_NOMADIC_COMMON$ $LRSK_GOV_VAR_START_SCREEN_TRADEWAYS$"
 LRSK_GOV_VAR_START_SCREEN_GRAND_ALLIANCE_SETTLED:0 "$LRSK_GVP_FED_START_SETTLED_COMMON$ $LRSK_GOV_VAR_START_SCREEN_GRAND_ALLIANCE$"
 LRSK_GOV_VAR_START_SCREEN_GRAND_ALLIANCE_NOMADIC:0 "$LRSK_GVP_FED_START_NOMADIC_COMMON$ $LRSK_GOV_VAR_START_SCREEN_GRAND_ALLIANCE$"
 LRSK_GOV_VAR_START_SCREEN_CONVENED_PROVIDENCE_SETTLED:0 "$LRSK_GVP_FED_START_SETTLED_COMMON$ $LRSK_GOV_VAR_START_SCREEN_CONVENED_PROVIDENCE$"
 LRSK_GOV_VAR_START_SCREEN_CONVENED_PROVIDENCE_NOMADIC:0 "$LRSK_GVP_FED_START_NOMADIC_COMMON$ $LRSK_GOV_VAR_START_SCREEN_CONVENED_PROVIDENCE$"
 LRSK_GVP_ENTERPRISE_DESC_COMMON:0 "이 정부는 사람들이 정치적 권리가 없어도 큰 개인적 자유를 가질 수 있다는 원칙에 기반하고 있으며, 아마도 그렇게 하는 것이 더 나을 것입니다."
 LRSK_GVP_ENTERPRISE_START_COMMON_1:0 "우리의 역사 속에서 자유와 그로 인한 탁월함을 믿는 이들과, 아무리 비참함과 억압이 따르더라도 '평등'을 믿는 이들 간의 갈등이 있었습니다."
 LRSK_GVP_ENTERPRISE_START_COMMON_2:0 "자유는 우리의 [capital_scope.GetCapitalCarrierType]에서 거의 죽음에 이르렀습니다. 투표권을 가진 질투심 많고 성과가 부족한 다수에 의해 말이죠. 다행히도, 우리의 가장 현명한 철학자들이 조언했습니다."
 LRSK_GVP_ENTERPRISE_START_COMMON_3:0 "우리가 노력하고 성취하며 우리의 노동의 결실을 즐길 자유 없이 '민주주의' 아래에서 고통받지 않도록 개입해야 합니다."
 LRSK_GVP_SCHOLSTATE_COMBINE_STRING:0 "우리의 가장 대담하고 성공적인 지식인들 - 과학자, 학자, 발명가 - 그들의"
 LRSK_GVP_SCHOLSTATE_START_COMMON_1:0 "우리 종으로서의 지적 발전은 정치적 및 경제적 시스템에 의해 방해받았습니다. 전자는 우리의 사고를 당파적 이익과 군사에 맞추려 했고, 후자는 단기적인 이익을 위한 미미한 발전에만 관심을 가졌습니다. 그러나 우리 국민이 더 많이 알고, 더 많이 하려는 욕망은 이러한 좁은 시각의 사소함에 의해 영원히 방해받을 수는 없었습니다. $LRSK_GVP_SCHOLSTATE_COMBINE_STRING$"
 LRSK_GVP_SCHOLSTATE_START_COMMON_2:0 "이제 많은 분야에서 지식과 창의성이 정치 권력의 지표가 되며, 우리 사회의 모든 자원을 혁신, 발견, 새로운 해석의 과업에 투입할 수 있습니다."
 LRSK_GVP_COMMIE_START_1:0 "피를 갈망하는 왕들과 탐욕스러운 상인들을 위해 수세기 동안 노예로 살아온 후,"
 LRSK_GVP_ANARCHOSOC_START_1:0 "초기에는 우리 민족이 강도 귀족과 그들의 의지를 강요하는 국가에 의해 지배받았습니다."
 LRSK_GVP_CRUSADER_START_1:0 "우리 민족이 천 개의 거짓 신앙의 영적 혼란 속에서 얼마나 오랫동안 허우적거렸던가? 얼마나 많은 이들이 이유도 모른 채 저주받았던가? 모든 대가는 치를 만했으며, [capital_scope.GetCapitalCarrierTypeAdj] 성전이 모든 이들을 하나의 진정한 신앙 아래 통합한 것조차 그 어두운 날들을 끝내기 위해서는 마다하지 않았습니다."
 LRSK_GVP_NOBLE_START_1:0 "옛날 옛적에 수많은 제국이 [capital_scope.GetCapitalCarrierType]를 덮고 있었습니다: 사랑과 충성의 유대로 묶여 있으나, 자존심과 복수로 나뉘어 있었습니다. 영웅적인 전투, 기사도적인 로맨스, 그리고 교활한 음모로 가득한 서사시를 담은 모험을 통해 -"
 LRSK_GVP_MARGRAV:0 "대 마르그라프"
 LRSK_GVP_UTOPIAN_START_1:0 "너무 오랫동안 [capital_scope.GetCapitalCarrierType]의 사람들은 탐욕과 자존심의 지배 아래 신음하며 서로를 짐승처럼 잡아먹는 비합리적인 시스템에 시달렸습니다. 그러나 결국, 모든 이가 번영할 수 있는 협력의 보다 합리적인 사회를 구축하기 위해 헌신한 현대 도덕 철학자들의 노력 덕분에 이 상황은 변화했습니다. 우리는 이제 살고 있습니다."
