 LRSK_GVP_CEPHEUS_WARNING:0 "§R경고:§! 이 사회제도 또는 기원은 특수 종속국 유형 정의를 사용하며, 종속국은 Stellaris 3.4(Cepheus)에서 크게 변경되었습니다. 오류 없이 로드되지만, 새 종속국 협정 체계에 맞게 조정되지는 않았습니다. 향후 모드 업데이트에서 이를 다룰 것입니다. 그때까지는 사용에 주의하십시오.\n\n"
 LRSK_GOV_VAR_ESPER:0 "에스퍼"
 LRSK_GOV_VAR_ESP_LEADER:0 "이 지도자는 다음을 가능하게 하는 강화된 초감각 지각을 지녔습니다."
 LRSK_GOV_VAR_HIVEPRIM:0 "전지성 진사회성 종에서 진화했으며"
 LRSK_GOV_VAR_DEEPCODE:0 "심층 코드:"
 LRSK_GOV_VAR_MECHPRIM:0 "그 가장 근본적인 인공지능 알고리즘은"
 lrsk_gov_var_trait_natural_esper:0 "자연 $LRSK_GOV_VAR_ESPER$"
 lrsk_gov_var_trait_natural_esper_desc:0 "§L장막 에너지와의 오랜 접촉은 이 종족 구성원 다수에게 생물학으로는 설명할 수 없는 초감각 지각에 해당하는 선천적 특별 직감, 곧 '재주'나 '선물'을 남겼습니다.§!\n"
 lrsk_gov_var_trait_starborn_effects:0 "§G+25%§! 이민 성장\n§G-25%§! 재정착 비용\n§G+10%§! 거주 적합도"
 lrsk_gov_var_trait_starborn_hive:0 "무리 이동자"
 lrsk_gov_var_trait_starborn_hive_desc:0 "§L$LRSK_GOV_VAR_HIVEPRIM$ 거대한 불안한 무리로 움직이며, 가장 살기 힘든 곳으로도 빠르고 거침없이 확장했습니다.§!\n"
 lrsk_gov_var_trait_starborn_hive_effects:0 "§G+10%§! £pop£ §Y팝 성장§!\n§G-20%§! 재정착 비용\n§G+10%§! 거주 적합도\n§R-10§!년 §Y£leader£ 지도자§! 수명"
 lrsk_gov_var_trait_earthbound_effects:0 "직업에서 §G+10%§! $r_energy$\n§G+50%§! £defense_army£ 방위군 전력"
 lrsk_gov_var_trait_earthbound_hive:0 "무리 주자"
 lrsk_gov_var_trait_earthbound_hive_desc:0 "§L$LRSK_GOV_VAR_HIVEPRIM$ 예외적으로 높은 수준의 '팀워크'를 보였고, 영역을 활용하거나 방어하기 위해 서로 조율할 수 있는 복잡한 무리나 집단으로 자발적으로 조직되었습니다.§!\n"
 lrsk_gov_var_trait_earthbound_hive_effects:0 "§G-5%§! £pop£ §Y팝§!으로 인한 제국 크기\n직업에서 §G+10%§! $r_unity$\n§G-10%§! £pop£ §Y$MOD_POP_HOUSING_USAGE_MULT$§!\n§G+50%§! £defense_army£ 방위군 전력"
 lrsk_gov_var_trait_natural_intellectuals_effects:0 "직업에서 §G+5%§! $r_unity$\n§G+10%§! $r_lrsk_research$\n직업에서 §R-5%§! $r_minerals$"
 lrsk_gov_var_trait_natural_intellectuals_mech:0 "$LRSK_GOV_VAR_DEEPCODE$ 패턴 분석"
 lrsk_gov_var_trait_natural_intellectuals_mech_desc:0 "§L$LRSK_GOV_VAR_MECHPRIM$ 흥미로운 패턴을 찾아 데이터의 바다를 훑도록 원래 작성되었습니다. 이 특성이 자기 인식의 잠재력을 시사했습니다.§!\n"
 lrsk_gov_var_trait_natural_intellectuals_mech_effects:0 "직업에서 §G+5%§! $r_unity$\n§G+10%§! $r_lrsk_research$ \n단순 드론 직업 생산 §R-5%§!"
 lrsk_gov_var_trait_proles_effects:0 "§G+10%§! £army_power£ 지상군 피해\n직업에서 §G+10%§! $r_food$와 $r_minerals$\n§R-15%§! $r_lrsk_research$"
 lrsk_gov_var_trait_proles_hive:0 "전투병"
 lrsk_gov_var_trait_proles_hive_desc:0 "§L$LRSK_GOV_VAR_HIVEPRIM$ 다른 진사회성 종 또는 자기 종과 군체 대 군체 규모로 자원을 두고 치열하게 경쟁해야 했고, 이는 전쟁을 위해 조직된 사회와 유사한 행동 양식으로 이어졌습니다.§!\n"
 lrsk_gov_var_trait_proles_hive_effects:0 "§G+10%§! £army_power£ 지상군 피해\n단순 드론 직업 생산 §G+10%§!\n직업에서 §R-10%§! $r_unity$"
 lrsk_gov_var_trait_proles_mech:0 "$LRSK_GOV_VAR_DEEPCODE$ 기술 모방"
 lrsk_gov_var_trait_proles_mech_desc:0 "§L$LRSK_GOV_VAR_MECHPRIM$ 숙련된 지성 전문가들에게서 수집한 데이터를 모델링하고 재현하도록 설계된 듯합니다. 아마 그들을 대체하기 위해서였을까요? 이로 인해 학습 능력 면에서는 다소 경직되었지만, 지성체 정신의 패턴에 충분히 익숙하여 자기 주도적 사고와 창의성으로 부트스트랩될 수 있었습니다.\n"
 lrsk_gov_var_trait_proles_mech_effects:0 "§G+10%§! £army_power£ 지상군 피해\n복합 드론 직업 생산 §G+10%§!\n§R-33%§! §Y£leader£ 지도자§! 경험치 획득"
 lrsk_gov_var_trait_conservative_effects:0 "행복도 §G+5%§!\n통치 윤리관 선호 §G+25%§!\n§R-33%§! §Y£leader£ 지도자§! 경험치 획득"
 lrsk_gov_var_trait_conservative_mech:0 "$LRSK_GOV_VAR_DEEPCODE$ 프로파일링"
 lrsk_gov_var_trait_conservative_mech_desc:0 "§L$LRSK_GOV_VAR_MECHPRIM$ 설계자의 전략에 도움이 되도록 지성체 정신의 정밀하고 복잡한 데이터 모델을 만들기 위해 구축되었습니다. 이 AI를 진정한 지성으로 끌어올리는 것은 거의 너무 쉬웠습니다.§!\n"
 lrsk_gov_var_trait_conservative_mech_effects:0 "§G+2§! §Y£leader£ 지도자§! 기술 레벨\n§G+33%§! §Y£leader£ 지도자§! 경험치 획득"
 trait_lrsk_gov_var_trait_enlightened_effect:0 "§G+1§! 사절\n신뢰 성장 §G+10%§!\n§G+15%§! §Y$MOD_SHIP_ANOMALY_RESEARCH_SPEED$§!\n탐사 속도 §G+20%§!"
 trait_lrsk_gov_var_trait_enlightened_hive_effect:0 "§G+1§! 사절\n신뢰 성장 §G+10%§!\n함선 회피 확률 §G+10%§!\n함선 연사 속도 §G+5%§!"
 trait_lrsk_gov_var_trait_enlightened_mech_effect:0 "§G+1§! 고고학 기술\n과학선 이탈 확률 §G+20%§!\n§G+15%§! §Y$MOD_SHIP_ANOMALY_RESEARCH_SPEED$§!\n탐사 속도 §G+20%§!"
 lrsk_gvp_leader_trait_esper:0 "$LRSK_GOV_VAR_ESPER$"
 lrsk_gvp_leader_trait_esper_desc:0 "[This.GetLRSKGVPNatEsperLeaderTraitDesc]"
 lrsk_gov_var_leader_trait_admiral_esper:0 "$LRSK_GOV_VAR_ESPER$"
 lrsk_gov_var_leader_trait_admiral_esper_desc:0 "$LRSK_GOV_VAR_ESP_LEADER$ 들어오는 사격이 어디에 나타날지 감지하는 비범한 능력을 제공합니다."
 lrsk_gov_var_leader_trait_general_esper:0 "$LRSK_GOV_VAR_ESPER$"
 lrsk_gov_var_leader_trait_general_esper_desc:0 "$LRSK_GOV_VAR_ESP_LEADER$ 기묘한 전술적 통찰의 섬광과 적이 다음에 어디를 공격할지 감지하는 비범한 능력을 부여합니다."
 lrsk_gov_var_leader_trait_governor_esper:0 "$LRSK_GOV_VAR_ESPER$"
 lrsk_gov_var_leader_trait_governor_esper_desc:0 "$LRSK_GOV_VAR_ESP_LEADER$ 초자연적으로 인도된 지침으로 일상 행정을 향상시킵니다."
 lrsk_gov_var_leader_trait_ruler_esper:0 "$LRSK_GOV_VAR_ESPER$"
 lrsk_gov_var_leader_trait_ruler_esper_desc:0 "$LRSK_GOV_VAR_ESP_LEADER$ 기묘한 자신감과 판단력으로 국가라는 배를 이끌 수 있게 합니다."
 lrsk_gov_var_leader_trait_scientist_esper:0 "$LRSK_GOV_VAR_ESPER$"
 lrsk_gov_var_leader_trait_scientist_esper_desc:0 "$LRSK_GOV_VAR_ESP_LEADER$ 기묘한 천재성의 불꽃을 제공합니다."
 d_lrsk_gov_var_shroud_pockets:0 "이세계 주머니"
 d_lrsk_gov_var_shroud_pockets_desc:0 "이세계가 이 으스스하고 외딴 장소들에서 우리의 현실로 비집고 들어오고 있습니다. 이 주머니들에서 울부짖는 사이오닉 에너지는 분명 이 세계의 지성 생명체 발달에 영향을 주었습니다."
 d_lrsk_gvp_legacy_autoinf:0 "유산 자동화"
 d_lrsk_gvp_legacy_autoinf_desc:0 "이 문명은 방대한 자동화 기반 시설을 조금씩 구축하여, [owner.capital_scope.GetCapitalCarrierType]의 모든 건설과 물류에 매끄럽게 통합될 정도에 이르렀습니다."
 LRSK_GVP_BRIEF_CEPHEUS_NOTE:0 "§P참고: 아직 3.4에서 올바르게 작동하지 않습니다. 수정 예정.§!"
 LRSK_GVP_IMPECON_VASSAL_COMMON:0 "비투표 외교가 가능하며 전쟁에서 종주국을 도울 의무는 없지만, 종주국은 적어도 자신의 투자를 보호할 의무가 있습니다."
 preset_lrsk_gvp_vassal_foundry:0 "물류 식민지"
 preset_lrsk_gvp_vassal_foundry_desc:0 "$preset_lrsk_gvp_vassal_foundry$는 종주국 해군을 위한 자재와 보급품을 제공해야 하는 종속국입니다."
 LRSK_GVP_FOUNDRY_FLAVOR_TEXT_COMMON:0 "종주국의 군사 준비 태세를 개선하기 위해, 종속국은 조선소를 위한 노동자를 종주국에 제공해야 합니다."
 preset_lrsk_gvp_vassal_foundry_flavor_desc:0 "$LRSK_GVP_FOUNDRY_FLAVOR_TEXT_COMMON$ $LRSK_GVP_IMPECON_VASSAL_COMMON$"
 preset_lrsk_gvp_vassal_foundry_eff:0 "종주국은 이러한 종속국 하나당 §G-5%§! £ship_stats_build_cost£ §Y함선 건조 및 유지 비용§!을 얻습니다. 이러한 종속국을 하나 이상 보유하면 종주국은 함선 연사 속도 §G+5%§!를 얻습니다. 종속국은 해군 수용력 §R-15%§!를 받습니다."
 preset_lrsk_gvp_vassal_market:0 "시장 식민지"
 preset_lrsk_gvp_vassal_market_desc:0 "$preset_lrsk_gvp_vassal_market$는 종주국 인민의 물질적 필요와 욕구를 공급하기 위해 존재하는 종속국입니다."
 LRSK_GVP_MARKET_FLAVOR_TEXT_COMMON:0 "종주국의 더 큰 번영을 위해, 종속국은 종주국에 유리한 상업 기회를 제공해야 합니다."
 preset_lrsk_gvp_vassal_market_flavor_desc:0 "$LRSK_GVP_MARKET_FLAVOR_TEXT_COMMON$ $LRSK_GVP_IMPECON_VASSAL_COMMON$"
 preset_lrsk_gvp_vassal_market_eff:0 "종주국은 이러한 종속국 하나당 §G+5%§! $r_trade$와 §G-2%§! §Y시장 수수료§!를 얻습니다. 이러한 종속국을 하나 이상 보유하면 종주국은 §G+10%§! £pop_cat_specialist£ §Y$pop_cat_specialist$ £happiness£ 행복도§!를 얻습니다. 종속국은 무역 매력도 §R-15%§!를 받습니다."
 preset_lrsk_gvp_vassal_trophy:0 "전리품 식민지"
 preset_lrsk_gvp_vassal_trophy_desc:0 "$preset_lrsk_gvp_vassal_trophy$는 종주국의 선전자로 행동하고, 종주국의 의제를 되풀이하며 그 문화를 정당화하도록 만들어진 종속국입니다."
 LRSK_GVP_TROPHY_FLAVOR_TEXT_COMMON:0 "종주국의 영광을 위해, 종속국은 우월한 존재에 대한 올바른 공손함의 본보기로 만들어져야 합니다."
 preset_lrsk_gvp_vassal_trophy_flavor_desc:0 "$LRSK_GVP_TROPHY_FLAVOR_TEXT_COMMON$ $LRSK_GVP_IMPECON_VASSAL_COMMON$"
 preset_lrsk_gvp_vassal_trophy_eff:0 "종주국은 이러한 종속국 하나당 §G+5%§! £diplo_weight£ §Y$diplomatic_weight$§!와 $r_influence$ 생산을 얻습니다. 이러한 종속국을 하나 이상 보유하면 종주국은 §G+1§! 사절을 얻습니다. 종속국은 §R-10%§! £happiness£ §Y행복도§! 불이익을 받습니다."
 preset_lrsk_gvp_vassal_trophy_no_gestalt:0 "§P게슈탈트 종속국은 이 서비스를 제공할 수 없습니다.§!"
 preset_lrsk_gvp_vassal_prospector:0 "조달 식민지"
 preset_lrsk_gvp_vassal_prospector_desc:0 "$preset_lrsk_gvp_vassal_prospector$는 자신이 생산하는 건설 자원의 일부를 종주국에 바쳐야 하는 종속국입니다."
 LRSK_GVP_PROSPECT_FLAVOR_TEXT_COMMON:0 "종주국의 개발을 가속하기 위해, 종속국은 건설 노동자를 종주국에 제공해야 합니다."
 preset_lrsk_gvp_vassal_prospector_flavor_desc:0 "$LRSK_GVP_PROSPECT_FLAVOR_TEXT_COMMON$ $LRSK_GVP_IMPECON_VASSAL_COMMON$"
 preset_lrsk_gvp_vassal_prospector_eff:0 "종주국은 이러한 종속국 하나당 §G-5%§! £building£ §Y건물 건설 및 유지 비용§!을 얻습니다. 이러한 종속국을 하나 이상 보유하면 종주국은 §G+10%§! £pop_cat_worker£ §Y$pop_cat_worker$ £happiness£ 행복도§!를 얻습니다. 종속국은 건설 속도 §R-10%§!를 받습니다."
 preset_lrsk_gov_var_sublight_vassal:0 "아광속 봉신"
 preset_lrsk_gov_var_sublight_vassal_desc:0 "\n이 유형의 종속국은 아광속 성간 사업으로 세워진 다른 세력의 식민지로 시작되었습니다. 그들의 종주국은 현재 FTL 기술 독점을 통해 통제권을 유지합니다... 당분간은 말입니다. 이들은 대부분의 일을 할 수 있지만 외교적으로 독립되어 있지는 않습니다. 매월 §Y15%§!의 $r_energy$와 $r_minerals$, 그리고 §Y5%§!의 $r_alloys$와 $r_consumer_goods$를 모성에 공물로 바칩니다."
 preset_lrsk_gov_var_sublight_satellite:0 "아광속 위성국"
 preset_lrsk_gov_var_sublight_satellite_desc:0 "\n이 유형의 종속국은 아광속 성간 사업으로 세워진 다른 세력의 식민지로 시작되었습니다. 이들은 대부분의 일을 할 수 있지만 외교적으로 독립되어 있지는 않습니다. 종주국은 이 협정으로 매월 §Y+2§! $r_unity$와 §Y+0.25§! $r_influence$를 얻습니다."
 preset_lrsk_gov_var_subject_chartered_company:0 "헌장 식민지"
 preset_lrsk_gov_var_subject_chartered_company_desc:0 "$preset_lrsk_gov_var_subject_chartered_company$는 상업적 개척을 위한 주식회사로 세워진 종속국입니다."
 preset_lrsk_gov_var_subject_chartered_company_flavor_desc:0 "일부 초기 우주 항행 정부들은 성간 개척 노력의 자금 조달에 어려움을 겪었습니다. 그들이 개발한 한 가지 해결책은 특수 개척 기업의 창설을 장려하는 것이었습니다. 민간 이해관계자가 사업 자금을 선불로 제공하고 모성 정부는 법인 설립 계약 조건을 통해 간접 통제를 유지했습니다. 이 종속국은 그런 계획의 결과입니다."
 preset_lrsk_gov_var_subject_chartered_company_eff:0 "- §G15%§!의 §Y기본 자원§!이 과세됩니다.\n- 보유한 이 유형의 종속국마다 종주국은 §G+10%§! $r_trade$(최대 §G+150%§!)와 §G-2%§! §Y시장 수수료§!((최대 §G-20%§!))를 얻습니다.\n- 이 종속국 유형은 자신에게 헌장을 부여한 종주국에 대한 선천적 §G+50§! £opinion£ §Y우호도§!(시간이 지나며 §G+25§!로 감소) 보너스를 가집니다.\n- 이 종속국의 모든 §H$divided_patronage$§! 불이익은 같은 유형의 다른 종속국에 대한 $r_loyalty$에서 §G절반§!이 됩니다. "
 lrsk_requires_recipient_not_gestalt:0 "$TRIGGER_FAIL$§R그들은 §Y$ethic_gestalt_consciousness$§!이며, 식민 헌장을 이해할 수 있는지, 하물며 따를 수 있는지도 불분명합니다.§!"
