 job_lrsk_gov_var_job_functionary:0 "관료"
 job_lrsk_gov_var_job_functionary_plural:0 "사무원들"
 job_lrsk_gov_var_job_functionary_desc:0 "물론 근무 시간은 길고 서류 작업은 지루하며, 특권을 위해 돈까지 내고 있지만, 이게 이력서에 얼마나 멋져 보일지 생각해 보십시오!"
 job_lrsk_gov_var_job_functionary_effect_desc:0 "£job_lrsk_gov_var_job_functionary£ $job_lrsk_gov_var_job_functionary_plural$는 $r_unity$와 $r_trade$를 생산합니다."
