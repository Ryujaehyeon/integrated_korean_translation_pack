 LRSK_GOV_VAR_START_SCREEN_P2_FOLKISH_REGIME:0 "다른 [GetAdj] 문화들이 있습니다. 성격이 약하고 비뚤어졌지만, 그럼에도 교활하게 위협적입니다. 그들은 대부분 우리의 군사력에 의해 억제되어 있지만, 우리 지도부는 어디에서 오든 다른 열등한 외국 위협에 맞서고 봉쇄할 준비가 되어 있습니다."
 lrsk_gov_var_gov_folkish_realm:0 "민족주의 왕국"
 lrsk_gov_var_gov_folkish_realm_desc:0 "이 정부는 공통된 편견을 이용해 위신과 정당성을 유지하는 민족주의-대중주의 군주정입니다."
