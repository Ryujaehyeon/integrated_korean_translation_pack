 lrsk_gov_var_combat_data.3.name:0 "새로운 군사 정보"
 lrsk_gov_var_combat_data.3.desc:0 "§H[lrsk_cd_anttag.GetName]§!와의 전투 후, 우리는 그들의 전술적 결정에서 병력의 고위 전략을 추론하여 더 넓은 군사 작전에 대한 새로운 통찰을 얻었습니다."
 lrsk_gov_var_combat_data.3.a:0 "새 전투 데이터를 통합한다."
 lrsk_gov_var_combat_data.3.a.tooltip:0 "§Y[lrsk_cd_anttag.GetName]§!에 대한 다음 단계의 군사 정보를 얻었으며, 이 정보는 30일 동안 최신 상태로 유지됩니다."
 lrsk_gov_var_combat_data.3.b:0 "이에 대한 알림을 더 받지 않는다."
 lrsk_gov_var_combat_data.3.b.tooltip:0 "$lrsk_gov_var_combat_data.3.a.tooltip$$LRSK_GVP_CD_NO_MORE_NOTICE$"
 lrsk_gov_var_combat_data.4.name:0 "군사 정보 갱신"
 lrsk_gov_var_combat_data.4.desc:0 "§H[lrsk_cd_anttag.GetName]§! 함대와의 조우는 그들의 전투 능력에 대한 기존 정보 일부를 뒷받침하는 동시에 다른 부분은 수정하게 만들었습니다. 어쨌든 우리는 그들의 군사 작전에 대한 현재 이해 수준을 유지할 수 있습니다."
 lrsk_gov_var_combat_data.4.a:0 "확인했다."
 lrsk_gov_var_combat_data.4.a.tooltip:0 "§Y[lrsk_cd_anttag.GetName]§!에 대한 현재 군사 정보 수준을 30일 더 유지했습니다."
