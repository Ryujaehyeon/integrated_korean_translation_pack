 casus_belli_cb_lrsk_gov_var_hegemon:0 "패권국 대응"
 war_goal_wg_lrsk_gov_var_hegemon:0 "패권 재확립"
 war_goal_wg_lrsk_gov_var_hegemon_desc:0 "전쟁은 적을 우리의 패권 체제로 되돌리기 위해 수행됩니다.\n\n\n\n현상 유지 평화가 체결될 경우, 우리가 점령한 성계에 행성이 하나 이상 포함되어 있다면 해당 성계는 우리 패권의 새 구성원으로 해방됩니다."
 casus_belli_cb_lrsk_gov_var_subheg:0 "아광속 패권"
 war_goal_wg_lrsk_gov_var_subheg:0 "식민 개혁 강제"
 war_goal_wg_lrsk_gov_var_subheg_desc:0 "전쟁은 적을 이전 식민지들의 나머지 세력과 함께 우리의 패권 체제에 합류시키기 위해 수행됩니다.\n\n\n\n현상 유지 평화가 체결될 경우, 우리가 점령한 성계에 행성이 하나 이상 포함되어 있다면 해당 성계는 우리 패권의 새 구성원으로 해방됩니다."
 casus_belli_cb_lrsk_gov_var_subvas:0 "아광속 종속화"
 war_goal_wg_lrsk_gov_var_subvas:0 "식민 개혁 강제"
 war_goal_wg_lrsk_gov_var_subvas_desc:0 "전쟁은 식민 체계 개혁에 따라 적을 봉신으로 종속시키기 위해 수행됩니다.\n\n\n\n현상 유지 평화가 체결될 경우, 우리가 점령한 성계에 행성이 하나 이상 포함되어 있다면 해당 성계는 새 봉신으로 해방됩니다."
 casus_belli_cb_lrsk_gov_var_colony:0 "식민주의"
 war_goal_wg_lrsk_gov_var_impchart:0 "인가 강요"
 war_goal_wg_lrsk_gov_var_impchart_desc:0 "전쟁은 적이 식민 무역 인가를 받아들이도록 강제하여, 그들을 인가 식민지로 종속시키기 위해 수행됩니다.\n\n\n\n현상 유지 평화가 체결될 경우, 우리가 점령한 성계에 행성이 하나 이상 포함되어 있다면 해당 성계는 새 인가 식민지로 해방되며 대상은 10년 동안 조공국 지위를 강제받습니다."
 policy_lrsk_gvp_colfief_policy:0 "탐험가 식민지"
 policy_lrsk_gvp_colfief_policy_desc:0 "우리의 식민화 노력 과정에서, 우리 정부는 성장과 개발을 장려하기 위해 봉토 보유권을 부여합니다. 하지만 이러한 노력의 범위를 확장하여, 탐험가들이 우리의 이름으로 새로운 행성에 정착하도록 허용하거나 장려할 수도 있습니다. 기회가 주어진다면, 우리 신민들 중 일부 집단은 분명히 앞으로 나아가 더 큰 제국을 섬길 새로운 봉신 식민지를 만들 것입니다.\n"
 LRSK_GVP_COLFIEF_POLICY_EFFECT_COMMON:0 "매년 당신의 £pop£ §Y팝§! 집단 하나가 먼 성계에 §Y새 종속 제국§!을 세울 확률."
 lrsk_gvp_colfief_prohibited:0 "금지됨"
 lrsk_gvp_colfief_prohibited_name:0 "$policy_lrsk_gvp_colfief_policy$을 금지합니다."
 lrsk_gvp_colfief_prohibited_desc:0 "어떤 신민 집단이든 제멋대로 떠나 자신들의 봉신 영토를 세우도록 허용함으로써 생길 혼란은 필요하지 않습니다."
 lrsk_gvp_colfief_permited:0 "허용됨"
 lrsk_gvp_colfief_permited_name:0 "허용 $policy_lrsk_gvp_colfief_policy$"
 lrsk_gvp_colfief_permited_desc:0 "충성스러운 신민 집단이 새로운 봉신 식민지를 만드는 것을 막을 이유는 없지만, 굳이 장려할 필요도 느끼지 않습니다.\n\n§G12.5%§! $LRSK_GVP_COLFIEF_POLICY_EFFECT_COMMON$"
 lrsk_gvp_colfief_promoted:0 "승격"
 lrsk_gvp_colfief_promoted_name:0 "$policy_lrsk_gvp_colfief_policy$을(를) 장려합니다."
 lrsk_gvp_colfief_promoted_desc:0 "그러한 모험은 위대한 제국의 확장을 앞당길 뿐이므로, 국민들이 새로운 세계에서 새로운 기회를 잡도록 모험 정신을 키우고 장려해야 합니다.\n\n§G25%§! $LRSK_GVP_COLFIEF_POLICY_EFFECT_COMMON$\n§G25%§! 확률로 새 종속 제국의 모성이 추가 £pop£ §Y팝§!을 가지고 시작합니다.\n새 종속 제국의 윤리관은 §G당신과 일치할 가능성이 더 높습니다§!.\n새 종속 제국은 당신과 §G더 나은 초기 관계§!를 가집니다."
 LRSK_GOV_VAR_IMPECON_LEGIT:0 "\n\n당신이 만드는 각 특수 종속국은 우리 국민 사이에서 우리의 정통성을 높이며, 제국 전역의 $r_stability$을(를) §G+1§! 증가시킵니다.\n\n각 유형의 특수 종속국은 §Y10§!개로 제한됩니다."
 LRSK_GOV_VAR_IMPECON_PERM:0 "\n\n§R이 결정은 되돌릴 수 없습니다.§!"
 lrsk_gov_var_impecon.2.name:0 "[lrsk_impecon_colonized.GetName]의 착취"
 lrsk_gov_var_impecon.2.desc:0 "[lrsk_impecon_colonized.GetName]은(는) 당연하고 올바른 대로 우리에게 복종했습니다. 우리 국민은 우리의 종주권에서 이익을 거두기를 기대하고 있으므로, 우리는 그들의 경제와 사회를 우리의 이익에 맞게 재편할 선택지를 갖게 됩니다.\n\n(참고: 협정 메뉴에서도 이 선택지를 고를 수 있습니다.)"
 lrsk_gov_var_impecon.2.a:0 "그들이 우리 함대의 필요를 충족하게 한다."
 lrsk_gov_var_impecon.2.a.tooltip:0 "[lrsk_impecon_colonized.GetName]은(는) 우리의 §H$preset_lrsk_gvp_vassal_foundry$§!이(가) 되며, 이는 다음과 같이 정의됩니다:\n$preset_lrsk_gvp_vassal_foundry_eff$ $LRSK_GOV_VAR_IMPECON_LEGIT$"
 lrsk_gov_var_impecon.2.b:0 "그들을 값싼 상품의 공급원으로 만든다."
 lrsk_gov_var_impecon.2.b.tooltip:0 "[lrsk_impecon_colonized.GetName]은(는) 우리의 §H$preset_lrsk_gvp_vassal_market$§!이(가) 되며, 이는 다음과 같이 정의됩니다:\n$preset_lrsk_gvp_vassal_market_eff$ $LRSK_GOV_VAR_IMPECON_LEGIT$"
 lrsk_gov_var_impecon.2.c:0 "그들을 우리 영광의 본보기로 만든다."
 lrsk_gov_var_impecon.2.c.tooltip:0 "[lrsk_impecon_colonized.GetName]은(는) 우리의 §H$preset_lrsk_gvp_vassal_trophy$§!이(가) 되며, 이는 다음과 같이 정의됩니다:\n$preset_lrsk_gvp_vassal_trophy_eff$ $LRSK_GOV_VAR_IMPECON_LEGIT$"
 lrsk_gov_var_impecon.2.d:0 "그들이 우리를 위해 건설 자재를 찾아내게 한다."
 lrsk_gov_var_impecon.2.d.tooltip:0 "[lrsk_impecon_colonized.GetName]은(는) 우리의 §H$preset_lrsk_gvp_vassal_prospector$§!이(가) 되며, 이는 다음과 같이 정의됩니다:\n$preset_lrsk_gvp_vassal_prospector_eff$ $LRSK_GOV_VAR_IMPECON_LEGIT$"
 lrsk_gov_var_impecon.2.e:0 "필요 없다."
 lrsk_gov_var_impecon.2.e.tooltip:0 "그들을 현재의 예속 상태로 남겨둡니다."
 lrsk_gov_var_impecon.101.name:0 "제국을 섬기기 위해"
 lrsk_gov_var_impecon.101.desc:0 "§Y$lrsk_gov_var_civic_imperial_economy$§! 사회제도는 플레이어가 종속국으로부터 더 많은 이익을 얻도록 설계되었습니다. 기본 보정치 외에도, §H특화 종속국§!을 만들 선택지가 있습니다. 작동 방식은 종속국을 만들거나 획득한 뒤, 네 가지 특화 유형 중 하나로 바꾸는 선택지를 받는 것입니다. 이 선택지를 제공하는 이벤트가 각 유형을 설명합니다. $LRSK_SPECSUBJ_MENU_NOTICE$ 이들은 순수한 경제 자산이므로 확장할 수는 있지만 당신의 전쟁에는 참여하지 않습니다. 단, 당신은 이들을 방어해야 합니다. 이런 종속국을 손아귀에 둘 때마다 소량의 안정도 보너스를 얻지만, 착취적 통치의 부담은 그들을 불충하게 만들 것입니다. 또한 각각의 종속국은 당신에게 특별한 확장형 보너스를 제공하지만, 그 보너스에는 상한이 있습니다."
 lrsk_gov_var_impecon.101.a:0 "채찍을 들어라!"
 lrsk_gov_var_colfief.3.name:0 "부왕 봉신이 합류하다"
 lrsk_gov_var_colfief.3.desc:0 "[lrsk_colfief_new_vassal_founder_homeworld.GetName]의 탐험가들이 §Y[lrsk_colfief_new_vassal_world.GetName]§!에 새로운 식민지를 세우기 위해 [lrsk_colfief_new_vassal_star.GetName] 성계로 나아갔습니다. 스스로를 §Y[lrsk_colfief_new_vassal_empire.GetName]§!(이)라 부르는 이들은 [lrsk_colfief_new_vassal_empire.ruler.GetTitle] [lrsk_colfief_new_vassal_empire.ruler.GetName]의 충성스러운 감시 아래 우리의 더 위대한 제국을 섬기겠다고 맹세합니다."
 lrsk_gov_var_colfief.3.a:0 "그들의 충성을 받아들인다."
 lrsk_gov_var_colfief.3.a.tooltip:0 "§H$policy_lrsk_gvp_colfief_policy$§! 정책을 §R$lrsk_gvp_colfief_prohibited$§!(으)로 설정하면 추가 무작위 종속국 생성을 막을 수 있습니다."
