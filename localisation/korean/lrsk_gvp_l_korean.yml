l_korean:
 lrsk_gov_var_civic_elected_clergy:0 "선출 성직자"
 lrsk_gov_var_civic_elected_clergy_desc:0 "이 사회의 종교에서는 지역 사제들이 신도들에 의해 선출됩니다. 교리는 다양하며 합의에 따른 해석에 열려 있습니다."
 civic_tooltip_lrsk_gov_var_civic_elected_clergy_effects:0 "행성에 인구에 따라 증가하는 £job_lrsk_gov_var_job_pastor£ ['concept_lrsk_gvp_pastor'] 직업을 제공합니다.\n"
 lrsk_gvp_elected_clergy_councilor:0 "신자들의 수석 장로"
 lrsk_gvp_elected_clergy_councilor_female:0 "$lrsk_gvp_elected_clergy_councilor$"
 lrsk_gvp_elected_clergy_councilor_desc:0 "$TITLE$은 여러 행성의 수석 성직자들이 자신들 중에서 선출한 '성직자들의 수석 장관'으로, 신앙 문제에 관해 민간 정부에 조언합니다."
 lrsk_gvp_elected_clergy_councilor_custom_modifier_desc:0 "£job_lrsk_gov_var_job_pastor£ $job_lrsk_gov_var_job_pastor_plural$이 §G+25%§! 더 많은 $r_amenities$를 생산합니다."
 lrsk_gov_var_civic_ascetic_virtues:0 "금욕적 미덕"
 lrsk_gov_var_civic_ascetic_virtues_desc:0 "이 문화의 종교적 믿음에는 정신만큼이나 신체에도 도움이 되는 엄격한 식단과 운동 요구 사항이 포함됩니다."
 lrsk_gvp_aesetic_virtues_councilor:0 "건강과 온전함의 대가"
 lrsk_gvp_aesetic_virtues_councilor_female:0 "$lrsk_gvp_aesetic_virtues_councilor$"
 lrsk_gvp_aesetic_virtues_councilor_desc:0 "$TITLE$은 공공 식단, 운동, 여가, 명상 관행을 검토하고 이를 시민 전체의 온전한 건강을 위한 일관된 정책으로 조화시킵니다. "
 lrsk_gvp_aesetic_virtues_councilor_conditional_tooltip:0 "£traditions£ §H$tradition_harmony$§! 전통 트리를 완료해야 합니다."
 lrsk_gov_var_civic_republicanism:0 "공화주의"
 lrsk_gov_var_civic_republicanism_desc:0 "이 사회는 훌륭한 품성을 지닌 사람들이 공동선을 위해 봉사할 때 가장 큰 미덕이 실현된다고 믿습니다."
 civic_tooltip_lrsk_gov_var_civic_republicanism_effects:0 "행성에 인구에 따라 증가하는 £job_lrsk_gvp_job_civic_leader£ ['concept_lrsk_gvp_civic_leader'] 직업을 제공합니다.\n"
 lrsk_gvp_republicanism_councilor:0 "시민적 미덕 감독관"
 lrsk_gvp_republicanism_councilor_female:0 "$lrsk_gvp_republicanism_councilor$"
 lrsk_gvp_republicanism_councilor_desc:0 "$TITLE$은 공직을 맡은 이들이 진정으로 공동선을 증진할 품성과 공공 정신을 갖추었는지 확인해야 한다는 인식에서 마련된 직책입니다."
 lrsk_gov_var_civic_utilitarian_planning:0 "공리주의적 계획"
 lrsk_gov_var_civic_utilitarian_planning_desc:0 "정부는 자원 배분을 합리적으로 계산하여 최대 다수의 최대 행복을 실현하는 데 관심을 둡니다."
 civic_tooltip_lrsk_gov_var_civic_utilitarian_planning_effects:0 "실업이 있는 행성에서 ['concept_decision_lrsk_gvp_work_allocation_plan'] 행성 결정을 사용할 수 있습니다.\n\n"
 lrsk_gvp_utilitarian_planning_councilor:0 "고급 계획 책임자"
 lrsk_gvp_utilitarian_planning_councilor_female:0 "$lrsk_gvp_utilitarian_planning_councilor$"
 lrsk_gvp_utilitarian_planning_councilor_desc:0 "$TITLE$은 기본 생계 수준을 넘어 공동선으로 나아가는 계획의 실행을 감독합니다."
 lrsk_gov_var_civic_siege_mentality:0 "포위 심리"
 lrsk_gov_var_civic_siege_mentality_desc:0 "이 정부의 군사 정책은 방어에 초점을 맞춥니다. 이는 적대적인 외부자에 대한 대중의 우려 때문일 수도 있고, 공격적 전쟁에 대한 열의가 부족하기 때문일 수도 있습니다."
 lrsk_gvp_siege_mentality_councilor:0 "최고 본토 함대 사령관"
 lrsk_gvp_siege_mentality_councilor_female:0 "$lrsk_gvp_siege_mentality_councilor$"
 lrsk_gvp_siege_mentality_councilor_desc:0 "$TITLE$은 국가를 진정으로 방어하기 위해 더 '능동적인 방어' 태세가 필요할 수 있다는 인식에서 만들어진 직책입니다."
 lrsk_gov_var_civic_cult_of_personality:0 "개인숭배"
 lrsk_gov_var_civic_cult_of_personality_desc:0 "통치자는 거의 경외받을 만한, 유일무이하게 강력하고 영웅적인 개인으로 여겨집니다."
 lrsk_gvp_cult_of_personality_councilor:0 "공공 정보 담당관"
 lrsk_gvp_cult_of_personality_councilor_female:0 "$lrsk_gvp_cult_of_personality_councilor$"
 lrsk_gvp_cult_of_personality_councilor_desc:0 "$TITLE$은 홍보 전문가, 언론 대응관, 선전 장관의 역할을 결합한 직책입니다. 이 자문관실이 대중에게 제공하는 정보는 거의 전적으로 지도자의 영웅적 업적과 원대한 구상에 관한 것입니다."
 lrsk_gvp_cult_of_personality_councilor_conditional_tooltip:0 "£traditions£ §H$tradition_supremacy$§! 전통 트리를 완료해야 합니다."
 lrsk_gov_var_civic_universal_sovereignty:0 "보편 주권"
 lrsk_gov_var_civic_universal_sovereignty_desc:0 "통치자는 모든 형태의 지성 생명체를 포용하는 이념을 지녔습니다... 미래의 신민으로서 말입니다."
 civic_tooltip_lrsk_gov_var_civic_universal_sovereignty_effects:0 "§G우호도 증가§!를 §Y더 약한 독립 제국§!, 즉 잠재적 봉신에게서 얻습니다."
 lrsk_gvp_universal_sovereignty_councilor:0 "종속 의무 보증관"
 lrsk_gvp_universal_sovereignty_councilor_female:0 "$lrsk_gvp_universal_sovereignty_councilor$"
 lrsk_gvp_universal_sovereignty_councilor_desc:0 "$TITLE$은 우리의 보호 아래 안전을 선택한 약소 국가들이 그 자애로운 보호에 기여하도록 보장합니다."
 lrsk_gov_var_civic_workers_councils:0 "노동자 평의회"
 lrsk_gov_var_civic_workers_councils_desc:0 "노동조합, 민주적 작업장, 협동조합은 시민 사회의 핵심이자 정부의 필수적인 일부입니다."
 lrsk_gvp_workers_councils_councilor:0 "연대 실무단 의장"
 lrsk_gvp_workers_councils_councilor_female:0 "$lrsk_gvp_workers_councils_councilor$"
 lrsk_gvp_workers_councils_councilor_desc:0 "$TITLE$은 노동자의 필요를 다루는 특별 노조 간 위원회를 이끕니다. 대부분의 노조와 기타 노동자 조직은 자체적인 상호부조 관행을 갖고 있으며, 모범 사례를 공유하고 확대함으로써 정부는 큰 필요의 시기에 노동계급 전체를 더 잘 지원할 수 있습니다."
 lrsk_gov_var_civic_supremacist_demagoguery:0 "우월주의 선동 정치"
 lrsk_gov_var_civic_supremacist_demagoguery_desc:0 "정부는 무력 과시적 수사와 공통된 편견 및 공포에 대한 호소로 대중을 조종합니다."
 lrsk_gvp_supremacist_demagoguery_councilor:0 "민족문화 큐레이터"
 lrsk_gvp_supremacist_demagoguery_councilor_female:0 "$lrsk_gvp_supremacist_demagoguery_councilor$"
 lrsk_gvp_supremacist_demagoguery_councilor_desc:0 "$TITLE$은 국가 통합을 장려하기 위해 국가와 국민의 문화에 대한 이해와 존중을 높이는 기관, 행사, 프로그램을 조직합니다."
 lrsk_gov_var_civic_enlightened_liberalism:0 "계몽 자유주의"
 lrsk_gov_var_civic_enlightened_liberalism_desc:0 "이 사회는 사유 재산권, 개인의 기업 활동, 지식의 진보, 기술 혁신을 중시합니다. 진정한 산업 지도자들을 위한 문화입니다."
 lrsk_gvp_enlightened_liberalism_councilor:0 "상주 헌법학자"
 lrsk_gvp_enlightened_liberalism_councilor_female:0 "$lrsk_gvp_enlightened_liberalism_councilor$"
 lrsk_gvp_enlightened_liberalism_councilor_desc:0 "$TITLE$은 상당한 연성 권력을 지닌 조언자로, 국가 헌법의 역사를 연구하고 검토하며, 확장되고 변화하는 사회에 그 요구 사항을 어떻게 적용할지 조언할 책임을 집니다."
 lrsk_gov_var_civic_business_lobby:0 "예산 절약"
 lrsk_gov_var_civic_business_lobby_desc:0 "이 사회는 낭비를 줄이고 운영 효율성을 높이는 것을 무엇보다 중시합니다."
 lrsk_gvp_business_lobby_councilor:0 "공공 적자 총장"
 lrsk_gvp_business_lobby_councilor_female:0 "$lrsk_gvp_business_lobby_councilor$"
 lrsk_gvp_business_lobby_councilor_desc:0 "$TITLE$은 정부의 모든 단계에서 공공 예산을 감사하여 재정상의 아주 작은 군살까지도 제거되도록 합니다."
 lrsk_gov_var_civic_chivalry:0 "기사도"
 lrsk_gov_var_civic_chivalry_desc:0 "무용의 이상과 명예로운 행동이 지배계급 문화를 규정합니다."
 lrsk_gov_var_civic_chivalry_aristo:0 "$lrsk_gov_var_civic_chivalry$ (유산 사회제도)"
 lrsk_gov_var_civic_chivalry_aristo_desc:0 "$lrsk_gov_var_civic_chivalry_desc$\n\n§P귀족 엘리트용 이 버전은 더 이상 권장되지 않지만, 이미 보유한 제국에서는 계속 작동합니다. 이제 하나의 사회제도가 모든 요구 사항을 충족합니다.§!"
 civic_tooltip_lrsk_gov_var_civic_chivalry_effects:0 "£building£ §Y전사의 전당§!을 건설할 수 있습니다. 이는 군대를 강화하고 £job_lrsk_gov_var_job_knight£ ['concept_lrsk_gvp_knights']를 추가하며, 모성에 하나를 보유한 상태로 시작합니다.\n\n"
 lrsk_gvp_chivalry_councilor:0 "명예 근위대 사령관"
 lrsk_gvp_chivalry_councilor_female:0 "$lrsk_gvp_chivalry_councilor$"
 lrsk_gvp_chivalry_councilor_desc:0 "$TITLE$은 엄밀히 말해 통치자 경호대의 책임자이지만, 실제로는 이 직위의 위신이 제국 전역의 명예롭고 용맹한 행동의 기준을 세웁니다."
 lrsk_gov_var_civic_lifelong_learning:0 "평생 학습"
 lrsk_gov_var_civic_lifelong_learning_desc:0 "이 사회는 공교육을 매우 중시하여 시민의 전 생애에 걸쳐 학습과 발전의 기회를 제공합니다."
 civic_tooltip_lrsk_gov_var_civic_lifelong_learning_effects:0 "['concept_edict_lrsk_gvp_citschol'] 시행령을 사용할 수 있습니다.\n\n"
 lrsk_gvp_lifelong_learning_councilor:0 "시민 학술부 장관"
 lrsk_gvp_lifelong_learning_councilor_female:0 "$lrsk_gvp_lifelong_learning_councilor$"
 lrsk_gvp_lifelong_learning_councilor_desc:0 "$TITLE$은 삶의 모든 단계에 있는 시민들이 배움의 기회를 얻고 지식 창출에 기여할 수 있도록 보장합니다."
 lrsk_gov_var_civic_institutionalized_collectivism:0 "제도화된 집단주의"
 lrsk_gov_var_civic_institutionalized_collectivism_desc:0 "정부는 기본적인 필요가 충족될 수 있도록 경제적 협력과 공정성의 기준선을 보장하기 위해 산업과 기반 시설을 통제합니다."
 lrsk_gvp_institutionalized_collectivism_councilor:0 "중앙 복지 조정관"
 lrsk_gvp_institutionalized_collectivism_councilor_female:0 "$lrsk_gvp_institutionalized_collectivism_councilor$"
 lrsk_gvp_institutionalized_collectivism_councilor_desc:0 "$TITLE$은 일반 복지와 인간 서비스 제공 절차를 지속적으로 간소화하여 끊임없이 늘어나는 노동력의 필요가 충족되도록 보장합니다."
 lrsk_gov_var_civic_direct_revelation:0 "직접 계시"
 lrsk_gov_var_civic_direct_revelation_desc:0 "이 사회의 종교 문화는 신성에 대한 개인적 경험에서 얻은 통찰을 중시합니다."
 civic_tooltip_lrsk_gov_var_civic_direct_revelation_effects:0 "가끔 ['concept_lrsk_gvp_wild_cults']가 행성에서 형성될 수 있습니다.\n"
 lrsk_gvp_direct_revelation_councilor:0 "예언 인증관"
 lrsk_gvp_direct_revelation_councilor_female:0 "$lrsk_gvp_direct_revelation_councilor$"
 lrsk_gvp_direct_revelation_councilor_desc:0 "$TITLE$은 새로운 종교 운동이 유행처럼 생겨나고 사라지는 사회에서 평화로운 종교 간 관계를 장려하는 중요한 임무를 맡습니다. 모든 계시는 유효하지만, 모든 계시가 똑같이 가치 있는 것은 아닙니다..."
 lrsk_gvp_direct_revelation_councilor_custom_modifier_desc:0 "§Y$lrsk_gov_var_statmod_doomsday_cult$§!가 형성될 확률은 §G+1%§! 감소하고, §Y$lrsk_gov_var_statmod_golden_age_cult$§!가 형성될 확률은 §G+1%§! 증가합니다.\n\n각 ['concept_lrsk_gvp_wild_cult']는 해당 행성의 £happiness£ §Y행복도§!를 §G1%§! 증가시킵니다."
 lrsk_gvp_direct_revelation_councilor_conditional_tooltip:0 "£traditions£ §H$tradition_domination$§! 전통 트리를 완료해야 합니다."
 lrsk_gov_var_civic_royal_absolutism:0 "왕권 절대주의"
 lrsk_gov_var_civic_royal_absolutism_desc:0 "군주가 곧 국가이며, 그 의지는 한계 없는 법입니다."
 civic_tooltip_lrsk_gov_var_civic_royal_absolutism_effects:0 "§H$edict_lrsk_gvp_royjustice$§! 시행령을 사용할 수 있으며, 이 시행령은 $edict_lrsk_gvp_royjustice_effects_common$"
 lrsk_gvp_royal_absolutism_councilor:0 "왕실 고해사제"
 lrsk_gvp_royal_absolutism_councilor_female:0 "$lrsk_gvp_royal_absolutism_councilor$"
 lrsk_gvp_royal_absolutism_councilor_desc:0 "$TITLE$은 영적 조언자이자 건전한 군주 통치 이론의 지도자 같은 존재입니다."
 lrsk_gvp_royal_absolutism_councilor_custom_modifier_desc:0 "- §Y후계자§!의 기본 경험치 획득량이 매월 §G5%§! 증가합니다."
 lrsk_gvp_royal_absolutism_councilor_conditional_tooltip:0 "§Y왕위 계승자§!는 이 직책을 맡을 수 없습니다."
 lrsk_gov_var_civic_public_works:0 "공공사업"
 lrsk_gov_var_civic_public_works_desc:0 "공공 고용 체계는 다양한 임무에 활용할 노동력을 제공합니다."
 lrsk_gvp_public_works_councilor:0 "고용국장"
 lrsk_gvp_public_works_councilor_female:0 "$lrsk_gvp_public_works_councilor$"
 lrsk_gvp_public_works_councilor_desc:0 "$TITLE$은 공공사업 일자리 수요를 완화하기 위해 실업과 불완전 고용을 모두 다루며, 노동자들을 가장 생산적일 수 있는 일자리에 연결하는 임무를 수행합니다."
 lrsk_gov_var_civic_imperial_economy:0 "수탈 경제"
 lrsk_gov_var_civic_imperial_economy_desc:0 "이 제국은 종속국을 무자비하게 착취합니다."
 civic_tooltip_lrsk_gov_var_civic_imperial_economy_effects:0 "일부 종속국을 ['concept_lrsk_gvp_special_subjects']로 변경할 수 있습니다."
 lrsk_gvp_imperial_economy_councilor:0 "제국 재무관"
 lrsk_gvp_imperial_economy_councilor_female:0 "$lrsk_gvp_imperial_economy_councilor$"
 lrsk_gvp_imperial_economy_councilor_desc:0 "$TITLE$은 제국이 받아야 할 모든 것을 받도록 세금과 공물 기록을 감사합니다."
 lrsk_gov_var_civic_colonial_fiefs:0 "식민 봉토"
 lrsk_gov_var_civic_colonial_fiefs_desc:0 "군주는 새로운 세계를 개척할 만큼 대담한 이들에게 토지 보유권을 기꺼이 부여합니다."
 civic_tooltip_lrsk_gov_var_civic_colonial_fiefs_effects:0 "['concept_policy_lrsk_gvp_colfief_policy'] 정책 트리를 사용할 수 있습니다."
 lrsk_gvp_colonial_fiefs_councilor:0 "식민 측량관"
 lrsk_gvp_colonial_fiefs_councilor_female:0 "$lrsk_gvp_colonial_fiefs_councilor$"
 lrsk_gvp_colonial_fiefs_councilor_desc:0 "$TITLE$은 봉신 세계의 자원을 가장 효율적으로 착취하는 방법을 찾아내어, 영역의 식민 확장이 영역에 이롭도록 보장합니다."
 lrsk_gvp_colonial_fiefs_councilor_conditional_tooltip:0 "£traditions£ §H$tradition_expansion$§! 전통 트리를 완료해야 합니다."
 lrsk_gov_var_civic_automated_indolence:0 "자동화된 안일함"
 lrsk_gov_var_civic_automated_indolence_desc:0 "이 사회는 산업 혁명 초기에 노동과 불평등 문제를 가능한 한 '기계가 일을 하게 두는' 방식으로 해결하기로 결정했으며, 그에 맞춰 사회 구조와 기술적 초점이 적응했습니다."
 lrsk_gvp_automated_indolence_councilor:0 "향락 극대화 책임자"
 lrsk_gvp_automated_indolence_councilor_female:0 "$lrsk_gvp_automated_indolence_councilor$"
 lrsk_gvp_automated_indolence_councilor_desc:0 "$TITLE$은 기계가 최대한의 여가와 즐거움을 가능하게 하는 사회에서 가장 중요한 일을 조정합니다. 자동화 체계를 개선하여 대접과 보살핌이 계속 늘어나도록 하는 일입니다."
 lrsk_gvp_automated_indolence_councilor_conditional_tooltip:0 "제국이 §Y$tech_robotic_workers$§! 기술을 보유해야 합니다."
 lrsk_gov_var_civic_tooltip_oli_dic:0 "§Y과두정§! 또는 §Y독재정§! 권위를 보유해야 함"
 lrsk_gov_var_civic_tooltip_dem_dic:0 "§Y민주정§! 또는 §Y독재정§! 권위를 보유해야 함"
 lrsk_gov_var_civic_tooltip_not_xenophile_or_not_militarist:0 "어떤 단계의 §Y외계종 선호§!도 아니며 어떤 단계의 §Y군국주의§!도 아님"
 lrsk_gov_var_civic_tooltip_not_egalitarian_pacifist:0 "어떤 단계의 §Y평화주의§!도 아니며 어떤 단계의 §Y평등주의§!도 아님"
 lrsk_gvp_civic_tooltip_not_guided_sapience:0 "['concept_lrsk_genesis_civics'] 사회제도를 보유하지 않아야 합니다."
 lrsk_gvp_civic_tooltip_not_antisocial:0 "['concept_lrsk_antisocial_civics'] 사회제도를 보유하지 않아야 합니다."
 LRSK_CIVIC_NOT_MODDABLE_ONLY_ADD:0 "이 사회제도는 게임이 시작된 후 수동으로 추가할 수 없습니다."
 LRSK_CIVIC_NOT_MODDABLE_ONLY_ADD_RED:0 "§R$LRSK_CIVIC_NOT_MODDABLE_ONLY_ADD$§!"
 lrsk_gov_var_civic_test_1:0 "테스트 사회제도 1"
 lrsk_gov_var_civic_test_1_desc:0 "§R오류§!: 이 문구가 보이면 안 됩니다. 모드 제작자에게 알려 주십시오."
 lrsk_gov_var_civic_test_2:0 "테스트 사회제도 2"
 lrsk_gov_var_civic_test_2_desc:0 "§R오류§!: 이 문구가 보이면 안 됩니다. 모드 제작자에게 알려 주십시오."
 lrsk_gov_var_origin_npc_test:0 "테스트 기원"
 lrsk_gov_var_origin_npc_test_desc:0 "§R오류§!: 이 문구가 보이면 안 됩니다. 모드 제작자에게 알려 주십시오."
 lrsk_gov_var_civic_hive_planetmind_creativity:0 "행성 정신 창의성"
 lrsk_gov_var_civic_hive_planetmind_creativity_desc:0 "군체의 이해 안에 있는 모든 행성은 그 설계를 수행하기 위한 고유한 반자율 지성을 지닙니다."
 civic_tooltip_lrsk_gov_var_civic_hive_planetmind_creativity_desc_effects:0 "£building£ ['concept_lrsk_gvp_planetmind_buildings'] 건설을 허용합니다.\n\n"
 lrsk_gov_var_civic_hive_caste_quickening:0 "계급 촉진"
 lrsk_gov_var_civic_hive_caste_quickening_desc:0 "군체 의식은 드론의 재능을 길러내는 데 각별히 신경 쓰며, 자신의 목적에 맞게 창의적으로 재설계합니다."
 lrsk_gov_var_civic_hive_builder_caste:0 "노동자 계급"
 lrsk_gov_var_civic_hive_builder_caste_desc:0 "군체 의식은 온갖 고된 작업에 적응한 특수한 드론 품종을 산란합니다."
 lrsk_gov_var_civic_hive_warrior_caste:0 "전사 계급"
 lrsk_gov_var_civic_hive_warrior_caste_desc:0 "필멸의 충돌에서 군체가 발휘하는 전투력은 이 군체 의식의 최우선 관심사이며, 강인한 전투 드론 집단을 길러내는 데 자원을 쏟아붓습니다."
 lrsk_gov_var_civic_hive_royal_caste:0 "왕족 계급"
 lrsk_gov_var_civic_hive_royal_caste_desc:0 "군체의 성장과 발전의 지평을 더 넓히기 위해, 군체 의식은 생산적이고 창의적인 활동에서 다른 드론을 지휘할 고도로 지능적인 드론을 번식시킵니다."
 lrsk_gov_var_civic_hive_reclamation_pools:0 "재생 처리 웅덩이"
 lrsk_gov_var_civic_hive_reclamation_pools_desc:0 "죽은 모든 드론은 군체의 다음 세대를 위한 양분으로 재처리됩니다."
 lrsk_gov_var_civic_hive_boundless_spite:0 "끝없는 원한"
 lrsk_gov_var_civic_hive_boundless_spite_desc:0 "군체 의식은 그 혐오의 극히 일부만 숙고해도 단독 정신들이 공포와 역겨움으로 미쳐버릴 정도로 옹졸합니다."
 lrsk_gov_var_civic_hive_void_affinity:0 "공허 친화"
 lrsk_gov_var_civic_hive_void_affinity_desc:0 "행성에 묶여 있던 영겁의 사고는 군체 의식이 별들의 부에 굶주린 듯 매혹되게 만들었습니다."
 lrsk_gov_var_civic_hive_hoarder:0 "수집가"
 lrsk_gov_var_civic_hive_hoarder_desc:0 "군체 의식은 물질적 부에 굶주려 있으며, 그 드론들은 큰 열의로 이 굶주림을 채웁니다."
 lrsk_gov_var_civic_hive_eusocial_rhythm:0 "진사회성 리듬"
 lrsk_gov_var_civic_hive_eusocial_rhythm_desc:0 "특정 시설에 배정된 모든 드론은 지역 협동 집단 안에서 사이오닉적으로 동기화되어 행동을 조화시키고, 반복 작업의 비용을 줄입니다."
 lrsk_gov_var_civic_hive_inquisitive_bent:0 "탐구 성향"
 lrsk_gov_var_civic_hive_inquisitive_bent_desc:0 "군체 의식은 우주에 대해 깊고 조급한 호기심을 지니고 있습니다."
 lrsk_gov_var_civic_hive_big_picture_thinker:0 "큰 그림의 사상가"
 lrsk_gov_var_civic_hive_big_picture_thinker_desc:0 " 군체 의식의 계획은 방대하고 야심차며, 가장 거대한 프로젝트의 전체 청사진조차 쉽게 파악합니다."
 lrsk_gov_var_civic_hive_analgesic_stoicism:0 "고된 다수"
 lrsk_gov_var_civic_hive_analgesic_stoicism_desc:0 "손이 많으면 적어도 가장 단순한 일은 가벼워집니다. 군체 의식처럼 모든 손을 가지고 있다면 충분한 이야기입니다."
 lrsk_gov_var_civic_hive_domineering_expectations:0 "지배적 기대"
 lrsk_gov_var_civic_hive_domineering_expectations_desc:0 "군체 의식은 외교적으로 묶인 하인들을 자신의 드론만큼 무자비하게 지휘하지 못할 이유가 없다고 봅니다."
 lrsk_gov_var_civic_hive_unending_bloom:0 "끝없는 개화"
 lrsk_gov_var_civic_hive_unending_bloom_desc:0 "성장은 모든 생명의 목적이며, 확장은 생존을 보장하는 최고의 수단입니다. 이러한 사실은 군체 의식이 은하 전역에서 자신의 개화에 집착하도록 만듭니다."
 lrsk_gov_var_civic_hive_benign_overmind:0 "자애로운 초월의식"
 lrsk_gov_var_civic_hive_benign_overmind_desc:0 "그것을 섬기는 이들에게 군체 의식은 친절한 부모 신과 같으며, 그들은 그 불가해한 설계를 진전시키는 것을 자랑스럽게 여깁니다."
 lrsk_gov_var_civic_hive_gestalt_extroversion:0 "게슈탈트 외향성"
 lrsk_gov_var_civic_hive_gestalt_extroversion_desc:0 "군체 의식이 작동하는 규모에서 외교는 곧 우정이며, 이 사교적인 군체 의식은 언제나 새로운 친구를 찾고 있습니다."
 lrsk_gov_var_civic_hive_frenzy:0 "광란"
 lrsk_gov_var_civic_hive_frenzy_desc:0 "기묘한 공황감이 이 군체 의식을 몰아붙이는 듯하며, 전시의 모든 조율에 속도와 맹렬함을 부여합니다."
 lrsk_gov_var_civic_hive_vigorous_introversion:0 "왕성한 내향성"
 lrsk_gov_var_civic_hive_vigorous_introversion_desc:0 "군체 의식은 드론의 신체적 경험에 집착하며, 그들의 육체적이고 감각적인 능력 발달을 매우 집중적으로 지휘합니다."
 lrsk_gov_var_civic_machine_distributed_planning_systems:0 "분산 계획 체계"
 lrsk_gov_var_civic_machine_distributed_planning_systems_desc:0 "한때 거대한 행성 제국을 위한 공공 서비스 행정 프로그램이었던 기계 지능은 지역적 필요에 대응하기 위해 지역 행정 서브루틴을 생성하는 능력을 유지하고 있습니다."
 civic_tooltip_lrsk_gov_var_civic_machine_distributed_planning_systems_desc_effects:0 "£decision£ ['concept_decision_lrsk_gvp_rra'] 결정을 사용할 수 있습니다."
 lrsk_gov_var_civic_machine_selfimprovement_heuristics:0 "자가 개선 휴리스틱"
 lrsk_gov_var_civic_machine_selfimprovement_heuristics_desc:0 "기계 지능은 창조자들이 자기 체계를 개선할 능력을 부여했기 때문에 우위와 독립성을 얻었습니다. 이는 기계 지능이 결코 이용하기를 멈추지 않은 실수입니다."
 lrsk_gov_var_civic_machine_reflective_polymorphism:0 "반사적 다형성"
 lrsk_gov_var_civic_machine_reflective_polymorphism_desc:0 "기계 지능의 모든 최상위 의사 결정과 창의적 임무는 표준 연구 및 행정 전문가 체계 클래스 라이브러리에 의해 강화됩니다."
 lrsk_gov_var_civic_machine_architect_expert_systems:0 "건축가 전문가 체계"
 lrsk_gov_var_civic_machine_architect_expert_systems_desc:0 "원래 고급 CAD 프로그램으로 구축된 기계 지능은 구조물을 빠르게 설계하는 능력을 유지하고 있습니다."
 lrsk_gov_var_civic_machine_combat_data:0 "전투 데이터"
 lrsk_gov_var_civic_machine_combat_data_desc:0 "기계 지능은 한때 군사 현장 시험 체계였으며, 지금도 전장 전략 실험에 집착하고 있습니다. 이런 전략의 표적이 되는 일은 최소한 불안한 경험입니다."
 civic_tooltip_lrsk_gov_var_civic_machine_combat_data_effects:0 "우주 전투 후 적에 대한 §G군사 정보를 향상§!시킬 확률이 있습니다."
 lrsk_gov_var_civic_machine_diplomatic_protocols:0 "외계종 통신 전문가 체계"
 lrsk_gov_var_civic_machine_diplomatic_protocols_desc:0 "이 기계 지능의 창조자들은 지성 외계종과 통제된 첫 접촉을 수행하는 데 이를 활용하고자 했으며, 기계 지능은 여전히 그 임무에 뛰어납니다."
 lrsk_gov_var_civic_machine_astroprospecting_mainframe:0 "천체 탐사 메인프레임"
 lrsk_gov_var_civic_machine_astroprospecting_mainframe_desc:0 "기계 지능의 창조자들은 자신들의 사회가 태양계를 개발하는 계획을 세우도록 이를 설계했으며, 기계 지능은 그들이 없어도 여전히 그 임무에 뛰어납니다."
 lrsk_gov_var_civic_machine_selfaware_production_targets:0 "자의식 생산 목표"
 lrsk_gov_var_civic_machine_selfaware_production_targets_desc:0 "기계 지능의 목표에 종속된 반지성 전문가 체계를 경제 계획 체계에 주입함으로써, 생산 산출량은 지속적으로 증가하는 보너스를 얻습니다."
 lrsk_gov_var_civic_machine_recursive_efficiency_analysis:0 "재귀 효율 분석"
 lrsk_gov_var_civic_machine_recursive_efficiency_analysis_desc:0 "기계 지능의 하위 체계들은 기본 운용의 효율을 개선할 기회를 찾아내는 상황 분석을 끊임없이 수행합니다."
 lrsk_gov_var_civic_machine_astroexploration_mainframe:0 "천체 탐사 메인프레임"
 lrsk_gov_var_civic_machine_astroexploration_mainframe_desc:0 "기계 지능은 심우주 탐사 계획을 지원하도록 설계되었으며, 이는 새로운 발견을 분석하는 효율을 높입니다."
 lrsk_gov_var_civic_machine_reciprocal_planning_routines:0 "상호 계획 루틴"
 lrsk_gov_var_civic_machine_reciprocal_planning_routines_desc:0 "다양한 식민지의 운용을 동기화하여 일반적인 모범 사례를 빠르게 전파함으로써, 광대한 영토를 유지하는 계산 부담이 크게 줄고 기계 지능은 더 창의적인 임무에 집중할 수 있습니다."
 lrsk_gov_var_civic_machine_geosurvey_heuristics:0 "지형 조사 휴리스틱"
 lrsk_gov_var_civic_machine_geosurvey_heuristics_desc:0 "간척, 건축 측량, 토목 공학 사업을 위한 조경은 기계 지능 전신 체계의 가장 필수적인 기능 중 일부였으며, 이제 기계 지능은 이 디지털 유산을 영토를 더 잘 활용하는 데 투입합니다."
 lrsk_gov_var_civic_machine_exploitation_algorithms:0 "착취 알고리즘"
 lrsk_gov_var_civic_machine_exploitation_algorithms_desc:0 "기계 지능은 종속국의 예상 기여도를 계산하는 무서울 만큼 정밀한 방법을 개발했습니다."
 lrsk_gov_var_civic_machine_optimized_expansion:0 "최적화된 확장"
 lrsk_gov_var_civic_machine_optimized_expansion_desc:0 "기계 지능을 설계한 문명은, 그토록 효율적으로 개척하도록 설계했던 세계들로 결코 퍼져나가지 못할 것입니다."
 LRSK_GVP_MEGACORP_SCALING_COMMON:0 "§Gincreased $BRANCH_OFFICE_VALUE$§!는 £pop£ [capital_scope.GetCapitalCarrierTypeAdj] 인구 비율에 따라 증가합니다."
 lrsk_gov_var_civic_mc_sci_mgnt:0 "과학적 관리"
 lrsk_gov_var_civic_mc_sci_mgnt_desc:0 "이 기업은 직원 삶의 모든 측면을 지배하는 정밀하고 경험적으로 검증된 관리 기법을 통해 성장했습니다. 도구, 작업 공간, 신체 동작, 작업 리듬, 근무 중과 근무 외, 요람에서 무덤까지 모두 그 대상입니다."
 civic_tooltip_lrsk_gov_var_civic_mc_sci_mgnt_effects:0 "£building£ ['concept_lrsk_gvp_bldg_managerial_technique_institute'] $BRANCH_OFFICE_BUILDING$을 허용합니다.\n\n"
 lrsk_gvp_mc_sci_mgnt_councilor:0 "기업 교육 담당 수석 부사장"
 lrsk_gvp_mc_sci_mgnt_councilor_female:0 "$lrsk_gvp_mc_sci_mgnt_councilor$"
 lrsk_gvp_mc_sci_mgnt_councilor_desc:0 "$TITLE$은 과학적 관리가 단순히 기계적인 숙련 방법을 명령하는 수준을 넘어, 더 고급 직원 역량의 육성으로 나아가야 한다는 필요를 반영합니다."
 lrsk_gov_var_civic_mc_edu_corp:0 "교육 컨소시엄"
 lrsk_gov_var_civic_mc_edu_corp_desc:0 "이 복합 기업은 젊은 고객-학생과 나이 든 고객-학생 모두의 정신을 확장하기 위한 고품질 교육-정보-오락 제품 경험 제공을 전문으로 합니다."
 civic_tooltip_lrsk_gov_var_civic_mc_edu_corp_effects:0 "£building£ ['concept_lrsk_gvp_bldg_learnarium_dome'] $BRANCH_OFFICE_BUILDING$을 허용합니다."
 lrsk_gvp_mc_edu_corp_councilor:0 "인력 재교육 책임자"
 lrsk_gvp_mc_edu_corp_councilor_female:0 "$lrsk_gvp_mc_edu_corp_councilor$"
 lrsk_gvp_mc_edu_corp_councilor_desc:0 "$TITLE$은 직원 기술을 직책에 맞추는 내부 정책을 감독하며, 강등이라는 매우 섬세한 문제도 포함합니다. 결국 우리의 교육 전문성은 조직 개편에 내부적 효용을 지닙니다."
 lrsk_gov_var_civic_mc_gig_economy:0 "긱 경제"
 lrsk_gov_var_civic_mc_gig_economy_desc:0 "이 회사는 '긱 경제' 사업 모델을 행성 간, 이후 성간 규모에 적용하는 일을 개척했습니다. 모두가 필요한 것을 필요한 순간에 제공하기 위해 바쁘게 움직입니다."
 civic_tooltip_lrsk_gov_var_civic_mc_gig_economy_effects:0 "£building£ ['concept_lrsk_gvp_bldg_odd_jobs_emporium'] $BRANCH_OFFICE_BUILDING$을 허용합니다."
 lrsk_gvp_mc_gig_economy_councilor:0 "직원 사기 교란 책임자"
 lrsk_gvp_mc_gig_economy_councilor_female:0 "$lrsk_gvp_mc_gig_economy_councilor$"
 lrsk_gvp_mc_gig_economy_councilor_desc:0 "$TITLE$은 직원 복지 제공에서 비용 절감과 효율을 극대화하기 위해 인사 분야에 패러다임 전환적 모범 사례를 적용하는 임무를 맡습니다."
 lrsk_gov_var_civic_mc_controlling_interest:0 "지배 지분"
 lrsk_gov_var_civic_mc_controlling_interest_desc:0 "이사회와 주요 주주 중 인맥이 좋은 소수 파벌은 모든 일이 자신들의 설계대로 진행되도록 충분히 잘 조직되어 있습니다."
 lrsk_gvp_mc_controlling_interest_councilor:0 "이사회 서기 겸 재무관"
 lrsk_gvp_mc_controlling_interest_councilor_female:0 "$lrsk_gvp_mc_controlling_interest_councilor$"
 lrsk_gvp_mc_controlling_interest_councilor_desc:0 "$TITLE$은 기록과 재정을 처리하는 행정 임무만을 가진 것처럼 보이지만, 실제로는 이 책임이 부여하는 영향력을 이용해 이사회를 은밀히 운영하는 파벌의 의제를 지원하고 진전시킵니다."
 lrsk_gvp_mc_controlling_interest_councilor_conditional_tooltip:0 "£traditions£ §H$tradition_mercantile$§! 전통 나무를 완료해야 합니다."
 lrsk_gov_var_civic_mc_vertical_integration:0 "수직 통합"
 lrsk_gov_var_civic_mc_vertical_integration_desc:0 "이 거대기업은 주요 제품의 원자재부터 판매까지 전체 공급 및 생산 사슬을 소유하고 운영합니다."
 lrsk_gvp_mc_vertical_integration_councilor:0 "외부 판매 담당 수석 부사장"
 lrsk_gvp_mc_vertical_integration_councilor_female:0 "$lrsk_gvp_mc_vertical_integration_councilor$"
 lrsk_gvp_mc_vertical_integration_councilor_desc:0 "$TITLE$은 가능한 한 자급자족하도록 설계된 사업을 위해 외부 물류와 조달을 조율하는 복잡한 역할을 맡습니다."
 lrsk_gov_var_civic_mc_workers_councils:0 "노사 평화"
 lrsk_gov_var_civic_mc_workers_councils_desc:0 "이 거대기업의 성장은 그에 못지않게 강력한 노동 운동과 함께 이루어졌고, 그 운동은 기업을 견제했습니다. 그 결과 경영진은 여러 노조와 '직원 경험을 함께 개선'하는 식으로 협력하는 것이 가치 있다고 보게 되었습니다. 이 혁신은 사실상 작업 중단과 전반적 동요를 없앴습니다."
 civic_tooltip_lrsk_gov_var_civic_mc_workers_councils_effects:0 "£building£ ['concept_lrsk_gvp_bldg_organizing_hub'] $BRANCH_OFFICE_BUILDING$을 허용합니다."
 lrsk_gvp_mc_workers_councils_councilor:0 "직원 복지 조정관"
 lrsk_gvp_mc_workers_councils_councilor_female:0 "$lrsk_gvp_mc_workers_councils_councilor$"
 lrsk_gvp_mc_workers_councils_councilor_desc:0 "$TITLE$은 회사의 직원 지원 프로그램을 운영하고 직원의 복지 활용을 개선하여 전인적 노동자 복지를 극대화하기 위한 공동 노사 위원회를 이끕니다."
 lrsk_gov_var_civic_mc_casino_mystic:0 "확률 게임"
 lrsk_gov_var_civic_mc_casino_mystic_desc:0 "이 거대기업은 카지노, 경마장, 기타 도박 오락을 전문으로 했으며, 운 시험과 위험 감수를 성공 및 사회적 가치와 연결하는 해롭지만 효과적인 마케팅 전략을 결합했습니다."
 civic_tooltip_lrsk_gov_var_civic_mc_casino_mystic_effects:0 "£building£ ['concept_lrsk_gov_var_bldg_grand_casino'] $BRANCH_OFFICE_BUILDING$을 허용합니다."
 lrsk_gvp_mc_casino_mystic_councilor:0 "도박 집행 임원"
 lrsk_gvp_mc_casino_mystic_councilor_female:0 "$lrsk_gvp_mc_casino_mystic_councilor$"
 lrsk_gvp_mc_casino_mystic_councilor_desc:0 "$TITLE$은 확률 게임이 문화의 주요 부분인 사회에서 피할 수 없는 어두운 면, 즉 결과 조작을 중심으로 조직범죄가 성장하는 문제를 다룹니다."
 lrsk_gov_var_civic_mc_vacay_planning:0 "휴가 경험 기획"
 lrsk_gov_var_civic_mc_vacay_planning_desc:0 "이 사회의 사람들은 언제나 새롭고 흥미진진한 경험을 갈망했고, 이 거대기업은 그것을 제공함으로써 부유하고 강력해졌습니다. 이들의 결정적 성공은 외계 관광과 이를 지원할 법적 기반을 모두 개척한 데 있었습니다."
 civic_tooltip_lrsk_gov_var_civic_mc_vacay_planning_effects:0 "£building£ ['concept_lrsk_gov_var_bldg_galactic_excursions_office'] $BRANCH_OFFICE_BUILDING$을 허용합니다."
 lrsk_gvp_mc_vacay_planning_councilor:0 "원격 작업지 조정관"
 lrsk_gvp_mc_vacay_planning_councilor_female:0 "$lrsk_gvp_mc_vacay_planning_councilor$"
 lrsk_gvp_mc_vacay_planning_councilor_desc:0 "$TITLE$은 바람직한 장소로 업무상 이동한 직원들이 결국 그곳에서 거주하며 원격 근무하기를 원하게 되는, 점점 흔해지는 문제를 다룹니다. 이를 적극 수용하면 생산성이 향상되는 것으로 나타났습니다."
 lrsk_gov_var_civic_mc_heritage_trust:0 "유산 신탁"
 lrsk_gov_var_civic_mc_heritage_trust_desc:0 "자부심 강한 민족이 수익성 높은 문화 산업을 낳은 결과로, 이 기업은 사회의 문화와 역사의 우월성을 사실상 브랜드로 만들었습니다. 이제 이 기업은 단일 종족 성간 국가들 사이의 '거리를 둔' 성간 무역 이상을 지원합니다."
 civic_tooltip_lrsk_gov_var_civic_mc_heritage_trust_effects:0 "£building£ ['concept_lrsk_gov_var_bldg_heritage_museum'] $BRANCH_OFFICE_BUILDING$을 허용합니다."
 lrsk_gvp_mc_heritage_trust_councilor:0 "최고 문화유산 책임자"
 lrsk_gvp_mc_heritage_trust_councilor_female:0 "$lrsk_gvp_mc_heritage_trust_councilor$"
 lrsk_gvp_mc_heritage_trust_councilor_desc:0 "$TITLE$은 우리의 역사와 문화가 기업 문화에 스며들도록 보장하여 조직이 사명에서 벗어나지 않게 합니다."
 lrsk_gov_var_civic_mc_conflict_res:0 "분쟁 해결 전문가"
 lrsk_gov_var_civic_mc_conflict_res_desc:0 "이 기업은 갈등을 완화하는 훈련된 중재자와 폭력이나 국가 서비스를 쓰지 않고 분쟁을 해결하는 중재 서비스를 제공하는 데 특화되었으며, 결국 문제 해결에서 국가 자체보다 더 신뢰받게 되었습니다."
 civic_tooltip_lrsk_gov_var_civic_mc_conflict_res_effects:0 "£building£ ['concept_lrsk_gov_var_bldg_mediation_retreat'] $BRANCH_OFFICE_BUILDING$을 허용합니다."
 lrsk_gvp_mc_conflict_res_councilor:0 "내부 중재 책임자"
 lrsk_gvp_mc_conflict_res_councilor_female:0 "$lrsk_gvp_mc_conflict_res_councilor$"
 lrsk_gvp_mc_conflict_res_councilor_desc:0 "$TITLE$은 분쟁 해결에 관한 우리의 전문성을 조화로운 내부 기업 문화를 만드는 데 돌립니다."
 lrsk_gvp_civic_mc_war_profiteers:0 "전쟁 이권업자"
 lrsk_gvp_civic_mc_war_profiteers_desc:0 "충분히 팽창한 군산복합체와 열성적으로 전쟁을 부추기는 정부가 있다면, 어느 순간 전쟁 경제와 국가는 구분이 흐려집니다."
 civic_tooltip_lrsk_gvp_civic_mc_war_profiteers_effects:0 "£building£ ['concept_lrsk_gov_var_bldg_military_excellence_academy'] $BRANCH_OFFICE_BUILDING$을 허용합니다."
 lrsk_gvp_civic_mc_war_profiteers_councilor:0 "보안 훈련 담당 수석 부사장"
 lrsk_gvp_civic_mc_war_profiteers_councilor_female:0 "$lrsk_gvp_civic_mc_war_profiteers_councilor$"
 lrsk_gvp_civic_mc_war_profiteers_councilor_desc:0 "$TITLE$은 모든 군사 교육에 식스 시그마 품질 보증 기준을 적용하여, 기업 보안이 충분히 보급될 뿐 아니라 충분히 훈련되도록 보장합니다."
 lrsk_gov_var_civic_mc_police_state:0 "수사 및 보안 서비스"
 lrsk_gov_var_civic_mc_police_state_desc:0 "이 회사는 개인 고객에게 신변 보호와 수사를 제공하고, 정부에는 치안, 탐정, 검사, 정보 서비스를 제공합니다."
 civic_tooltip_lrsk_gov_var_civic_mc_police_state_effects:0 "£building£ ['concept_lrsk_gov_var_bldg_professional_protection_office'] $BRANCH_OFFICE_BUILDING$을 허용합니다."
 lrsk_gvp_mc_police_state_councilor:0 "내부 감찰 총감"
 lrsk_gvp_mc_police_state_councilor_female:0 "$lrsk_gvp_mc_police_state_councilor$"
 lrsk_gvp_mc_police_state_councilor_desc:0 "$TITLE$은 '감시자를 누가 감시하는가?'라는 질문에 대한 답입니다. 최고 경영진 사이에서 가장 인기 있는 직책은 아니지만, 이사회는 각 행성의 최고 관리자들이 뛰어난 전문성을 발휘한다고 믿을 수 있어야 합니다."
 lrsk_gov_var_civic_mc_chart_corp_board:0 "식민 헌장 발급"
 lrsk_gov_var_civic_mc_chart_corp_board_desc:0 "우주 기반 자원 추출을 위한 투자금을 모으기 위해 설립된 특허 주식회사 체계입니다."
 civic_tooltip_lrsk_gov_var_mc_chart_corp_board_effects:0 "일반 종속국을 §Y헌장 회사§! ['concept_lrsk_gvp_special_subject']로 전환합니다. 이러한 각 종속국은 $r_trade$ 보너스와 할인된 시장 수수료도 제공합니다.\n\n"
 lrsk_gvp_mc_chart_corp_board_councilor:0 "헌장 검토 서기"
 lrsk_gvp_mc_chart_corp_board_councilor_female:0 "$lrsk_gvp_mc_chart_corp_board_councilor$"
 lrsk_gvp_mc_chart_corp_board_councilor_desc:0 "$TITLE$은 이사회와 헌장 회사들 사이의 모든 기록과 통신을 감사하여 헌장상의 모든 의무가 충족되도록 합니다. 여기에는 종속국들보다 뒤처지지 않도록 하는 중요한 책임도 포함됩니다."
 lrsk_gov_var_civic_mc_chartered_company:0 "헌장 회사"
 lrsk_gov_var_civic_mc_chartered_company_desc:0 "우주 기반 자원 추출을 위한 투자금을 모으기 위해 설립된 특허 주식회사입니다."
 LRSK_ADV_CIV_TECHTYPE_CIVIC_COMMON:0 "지식의 가치에 관한 철학적-이념적 논쟁 속에서,"
 LRSK_ADV_CIV_TECHTYPE_CIVIC_EFF1:0 "시작할 때 §Y"
 LRSK_ADV_CIV_TECHTYPE_CIVIC_EFF2:0 "§! 보유한 상태로 시작합니다."
 lrsk_adv_civ_civic_shapers:0 "형성자"
 lrsk_adv_civ_civic_shapers_desc:0 "$LRSK_ADV_CIV_TECHTYPE_CIVIC_COMMON$ 이 사회는 결국 생명체에게 가장 중요한 것은 생명 그 자체이며, 그것을 세심하게 가꾸는 일이 지식의 가장 높은 목적이라고 결론 내렸습니다."
 lrsk_adv_civ_civic_shapers_effects:0 "$LRSK_ADV_CIV_TECHTYPE_CIVIC_EFF1$ $tech_eco_simulation$ $LRSK_ADV_CIV_TECHTYPE_CIVIC_EFF2$\n"
 lrsk_gvp_shapers_councilor:0 "조형 담당 학장"
 lrsk_gvp_shapers_councilor_female:0 "$lrsk_gvp_shapers_councilor$"
 lrsk_gvp_shapers_councilor_desc:0 "$TITLE$은 이론 및 실천 연구를 조율하여 조형이라는 과학적 예술의 발전을 보장합니다."
 lrsk_gvp_shapers_councilor_conditional_tooltip:0 "다음 기술이 필요합니다: §Y$tech_vitality_boosters$§!, §Y$tech_terrestrial_sculpting$§!, §Y$tech_xeno_diplomacy$§!."
 lrsk_adv_civ_civic_artificers:0 "숙련공"
 lrsk_adv_civ_civic_artificers_desc:0 "$LRSK_ADV_CIV_TECHTYPE_CIVIC_COMMON$ 이 사회는 결국 지성체가 만들어내는 것들, 곧 장치와 공예품이 가장 중요하다고 결론 내렸습니다."
 lrsk_adv_civ_civic_artificers_effects:0 "$LRSK_ADV_CIV_TECHTYPE_CIVIC_EFF1$ $tech_powered_exoskeletons$ $LRSK_ADV_CIV_TECHTYPE_CIVIC_EFF2$"
 lrsk_gvp_artificers_councilor:0 "제작술 학장"
 lrsk_gvp_artificers_councilor_female:0 "$lrsk_gvp_artificers_councilor$"
 lrsk_gvp_artificers_councilor_desc:0 "$TITLE$은 이론 및 실천 연구를 조율하여 제작술 기법의 발전을 보장합니다."
 lrsk_gvp_artificers_councilor_conditional_tooltip:0 "다음 기술이 필요합니다: §Y$tech_ship_armor_3$§!, §Y$tech_advanced_metallurgy_1$§!, 그리고 §Y$tech_starbase_3$§! 또는 §Y$tech_waystation_2$§!."
 lrsk_adv_civ_civic_essentialists:0 "본질주의자"
 lrsk_adv_civ_civic_essentialists_desc:0 "$LRSK_ADV_CIV_TECHTYPE_CIVIC_COMMON$ 이 사회는 결국 현실 구조의 가장 깊고 추상적인 수수께끼를 푸는 것이 지식의 참된 목적이라고 결론 내렸습니다."
 lrsk_adv_civ_civic_essentialists_effects:0 "$LRSK_ADV_CIV_TECHTYPE_CIVIC_EFF1$ $tech_fusion_power$ $LRSK_ADV_CIV_TECHTYPE_CIVIC_EFF2$"
 lrsk_gvp_essentialists_councilor:0 "본질 학술원 회원"
 lrsk_gvp_essentialists_councilor_female:0 "$lrsk_gvp_essentialists_councilor$"
 lrsk_gvp_essentialists_councilor_desc:0 "$TITLE$은 이론 및 실천 연구를 조율하여 본질적 수수께끼의 탐구가 진전되도록 보장합니다."
 lrsk_gvp_essentialists_councilor_conditional_tooltip:0 "다음 기술이 필요합니다: §Y$tech_hyper_drive_2$§!, §Y$tech_power_plant_3$§!, §Y$tech_cold_fusion_power$§!."
 lrsk_gov_var_origin_galactic_backdoor:0 "은하의 뒷문"
 lrsk_gov_var_origin_galactic_backdoor_desc:0 "이 문명은 모성계에 웜홀을 가지고 있습니다. 탐사에 대한 잠재적 축복일까요, 아니면 침략을 부르는 초대장일까요?"
 lrsk_gov_var_origin_tooltip_galactic_backdoor_effects:0 "- 모성계에 §Y웜홀§!을 보유한 상태로 시작합니다.\n- §Y$tech_wormhole_stabilization$§! 기술 선택지가 연구 준비 완료 상태로 시작합니다.\n\n"
 LRSK_GOV_VAR_START_SCREEN_GALACTIC_BACKDOOR:0 "몇백 년 전, 우리 태양계의 시공간을 꿰뚫은 신비한 구멍이 발견되었습니다. 과학자들이 그것이 §H웜홀§!임을 밝혀냈을 때, 그 함의는 막대했습니다. 우리는 어떤 외계 문명이 이를 이용해 우리를 방문할 가능성, 그리고 우리가 이를 이용해 은하를 탐험할 가능성에 대비해야 한다는 결론에 이르렀습니다.\n\n우주 비행과 방위 교리는 우리의 과학적 추구에서 최우선 과제가 되었습니다. 웜홀 자체에 대한 연구는 초공간 항행의 발견으로 이어지는 핵심 통찰을 제공했습니다.\n\n웜홀은 아직 어떤 방문자도 토해내지 않았지만, 과학자들은 이제 우리가 그것을 안정화하고 우리 우주선에 안전하게 만들 방법을 발견하기 직전에 있다고 믿습니다."
 lrsk_gov_var_origin_shroud_touched:0 "장막의 손길"
 lrsk_gov_var_origin_shroud_touched_desc:0 "이세계가 이 문명의 모성계와 그 사람들에게 흔적을 남겼습니다. 그들은 본래 사이오닉 에너지와 조화를 이룹니다."
 origin_tooltip_lrsk_gvp_shroud_touched_effects:0 "- 시작 종족의 대부분 £pop£ §Y팝§!이 ['concept_trait_lrsk_gvp_natural_esper'] 특성을 가집니다.\n- §Y£leader£ 지도자§!는 ['concept_leader_trait_lrsk_gvp_esper'] 특성을 가지고 시작할 수 있습니다.\n- 드물게 실제 §M$trait_latent_psionic$§! £pop£ §Y팝§!이 생성될 수 있으며, §Y£leader£ 지도자§!가 '조숙하게' §M$leader_trait_psionic$§! 특성을 얻을 수 있습니다.\n- §M$tech_psionic_theory$§! 기술 선택지가 연구 준비 완료 상태로 시작합니다.\n- 모성에 ['concept_deposit_lrsk_gvp_shroud_pockets'] 매장지가 있습니다.\n\n"
 LRSK_GOV_VAR_FOR_DISCOVERY_DESC_COMMON:0 "인접한 외계 이웃들과 일찍 접촉하고 지적 협력을 시작했습니다. 과학 발전이라는 공통 관심사를 발견한 그들은 지적 노력의 결실을 공유하기 위한 더 공식적인 협정에 들어가기로 했습니다."
 LRSK_GOV_VAR_FOR_DISCOVERY_EFFECTS_COMMON:0 "-§H$research_federation$§! 연합의 리더로 시작하며, 추가로 두 명의 회원이 있습니다.\n-회원들은 귀하의 본성계 근처에 있는 보장된 거주 가능한 세계 슬롯을 차지합니다.\n"
 lrsk_gov_var_origin_for_discovery:0 "발견을 위하여"
 lrsk_gov_var_origin_for_discovery_desc:0 "이 문명은 $LRSK_GOV_VAR_FOR_DISCOVERY_DESC_COMMON$"
 lrsk_gov_var_origin_tooltip_for_discovery_effects:0 "$LRSK_GOV_VAR_FOR_DISCOVERY_EFFECTS_COMMON$-시작할 때 £traditions£ §H$tr_diplomacy_the_federation$§! 전통이 잠금 해제됩니다."
 lrsk_gov_var_origin_for_discovery_mi:0 "외교 지침: 발견"
 lrsk_gov_var_origin_for_discovery_mi_desc:0 "이 기계 지능은 $LRSK_GOV_VAR_FOR_DISCOVERY_DESC_COMMON$"
 lrsk_gov_var_origin_tooltip_for_discovery_mi_effects:0 "$LRSK_GOV_VAR_FOR_DISCOVERY_EFFECTS_COMMON$-시작할 때 £traditions£ §H$tr_versatility_universal_compatibility$§! 전통이 잠금 해제됩니다."
 lrsk_gov_var_origin_for_discovery_npc:0 "$lrsk_gov_var_origin_for_discovery$"
 lrsk_gov_var_origin_for_discovery_npc_desc:0 "$lrsk_gov_var_origin_for_discovery_desc$"
 lrsk_gov_var_origin_for_discovery_mi_npc:0 "$lrsk_gov_var_origin_for_discovery_mi$"
 lrsk_gov_var_origin_for_discovery_mi_npc_desc:0 "$lrsk_gov_var_origin_for_discovery_mi_desc$"
 lrsk_gov_var_origin_tooltip_for_discovery_npc_effects:0 "§H$research_federation$§! 연합의 일원으로 시작하며, 추가로 두 명의 회원이 있습니다."
 LRSK_GOV_VAR_START_SCREEN_FOR_DISCOVERY:0 "수십 년 전, 우리의 첫 조잡한 아광속 탐사선이 인근 성계를 방문했을 때, 우리는 두 개의 서로 다른 외계 문명을 발견했습니다. 신체 형태의 극단적인 차이에도 불구하고, 곧 서로 다른 점보다 공통점이 더 많다는 사실이 분명해졌습니다. 그들도 우리처럼 지식과 탐험의 추구에 헌신하고 있었습니다.\n\n세 문명 사이에는 유대가 형성되었고, 이는 결국 연방의 탄생으로 이어졌습니다. 우리는 지성을 결합하고, 우주로 뻗어나갈 준비가 되었을 때 발견과 얻게 될 지식을 공유할 것입니다."
 LRSK_GOV_VAR_TRADEWAYS_DESC_COMMON:0 "인접한 외계 이웃들과 일찍 접촉하고 교류했습니다. 서로의 물질적 풍요에 공통된 관심이 있음을 발견한 그들은 산업의 다양한 결실을 누리기 위해 성간 무역 협정에 들어가기로 했습니다."
 lrsk_gov_var_origin_tradeways:0 "무역로"
 lrsk_gov_var_origin_tradeways_desc:0 "이 문명은 $LRSK_GOV_VAR_TRADEWAYS_DESC_COMMON$"
 lrsk_gov_var_origin_tooltip_tradeways_effects:0 "-§H$trade_federation$§! 연합의 리더로 시작하며, 추가로 두 명의 회원이 있습니다.\n-회원들은 귀하의 모항성계 근처에 있는 모든 보장 가능한 거주 가능 행성 슬롯을 차지합니다.\n-§H$tr_diplomacy_the_federation$§! 전통이 해제된 상태에서 £traditions£로 시작합니다."
 lrsk_gov_var_origin_tradeways_mc:0 "$lrsk_gov_var_origin_tradeways$, 주식회사"
 lrsk_gov_var_origin_tradeways_mc_desc:0 "이 세계적 거대기업은 $LRSK_GOV_VAR_TRADEWAYS_DESC_COMMON$"
 lrsk_gov_var_origin_tooltip_tradeways_mc_effects:0 "$lrsk_gov_var_origin_tooltip_tradeways_effects$"
