 job_lrsk_gov_var_job_gofer:0 "심부름꾼"
 job_lrsk_gov_var_job_gofer_plural:0 "$job_lrsk_gov_var_job_gofer$s"
 job_lrsk_gov_var_job_gofer_desc:0 "음식이 필요합니까? 태워줄 사람이요? 그 빌어먹을 삐삐거리는 컴퓨터를 고치는 법이요? 한 시간 안에 필요합니까? 심부름꾼들은 앱 기반 소셜 장터에서 표현될 수 있는 어떤 변덕이든 만족시키기 위해 여기저기 어디에나 있습니다. 팁은 선택 사항입니다."
 job_lrsk_gov_var_job_gofer_effect_desc:0 "£job_lrsk_gov_var_job_gofer£ $job_lrsk_gov_var_job_gofer_plural$는 $r_amenities$와 $r_consumer_goods$를 생산합니다."
