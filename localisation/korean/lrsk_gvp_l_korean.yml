 job_lrsk_gvp_job_civic_leader:0 "시민사회 지도자"
 job_lrsk_gvp_job_civic_leader_plural:0 "$job_lrsk_gvp_job_civic_leader$s"
 job_lrsk_gvp_job_civic_leader_desc:0 "자선 활동, 개혁 정치 운동, 자발적 조직, 이웃 서비스에 관여하는 지역 명사들입니다."
 job_lrsk_gvp_job_civic_leader_effect_desc:0 "£job_lrsk_gvp_job_civic_leader£ $job_lrsk_gvp_job_civic_leader_plural$는 $r_consumer_goods$를 $r_unity$와 $r_amenities$로 전환하고, $r_stability$를 증가시킵니다."
