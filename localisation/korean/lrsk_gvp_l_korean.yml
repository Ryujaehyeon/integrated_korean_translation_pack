 lrsk_government_variety_pack_backend.1001.name:0 "$lrsk_government_variety_pack_backend.1002.name$"
 lrsk_government_variety_pack_backend.1002.name:0 "왕실 정의의 대선포"
 lrsk_government_variety_pack_backend.1002.desc:0 "[this.Capital.GetName]의 왕실 궁정에서 열린 화려한 의식에서, [this.GetRulerTitle] [this.GetRulerName]이(가) 주재하고 왕국의 모든 귀족들이 참석한 가운데, [this.GetRulerTitle]은(는) [this.GetName]의 정부를 개정할 때가 왔다고 선포했습니다.\n\n이곳에서 거대한 국가 기계의 바퀴는 보통 천천히 굴러가며, 모든 법전 개정은 전파되고 등록되며 시행되기까지 시간이 걸립니다. 하지만 이 의식은 [this.GetRulerTitle]의 의제를 실행하는 데 어떠한 지연도 용납되지 않을 것임을 법원과 법 집행자들에게 통보했습니다. \n\n[this.Leader.GetSheHe]이(가) 개회 의식과 [this.Leader.GetHerHis] 기념 연설을 마치면, [this.GetRulerTitle] [this.GetRulerName]은(는) 무엇을 선언할까요?"
 lrsk_government_variety_pack_backend.1002.a:0 "나머지는 내 재상이 말해 줄 것이다..."
 lrsk_government_variety_pack_backend.1002.a.tooltip:0 "큰 효과는 없지만, 의식의 장관만으로도 통치자의 정통성을 강화하기에 충분합니다."
 lrsk_government_variety_pack_backend.1002.b:0 "가장 충성스러운 관료들을 궁정 귀족으로 봉하라!"
 lrsk_government_variety_pack_backend.1002.b.tooltip:0 "정치적 신뢰성을 기준으로 선발된 교육받은 전문가 계층의 정부 관료들이 귀족으로 격상되어 [this.Capital.GetName]에서 직위를 받습니다. 이는 그들의 지위 불안과 개혁 욕구를 억제하고 궁정의 권력을 떠받치겠지만, 잘 자리 잡은 식민 행성의 고착 엘리트들은 이 벼락출세자들을 못마땅하게 여길 것입니다. (이 선택지의 비용은 '정착된' 식민지 수에 따라 증가합니다.)"
 lrsk_government_variety_pack_backend.1002.c:0 "왕국 신분 의회를 소집하라!"
 lrsk_government_variety_pack_backend.1002.c.tooltip:0 "왕국의 자문 '입법부'가 소집되어, 가중 투표를 통해 모든 자유 사회 계층에서 대표를 뽑습니다. 이는 더 큰 통치 유연성을 제공하지만, 지속적인 비용이 들고 사회 계층 간 권력 균형을 불안정하게 만들 수 있습니다. (이 선택지의 비용은 제국 내 자유 £pop£ §Y팝§! 수에 따라 증가하며, 민간인은 절반으로 계산됩니다.)"
 lrsk_government_variety_pack_backend.1002.d:0 "우리 국가는 위기에 처했다!"
 lrsk_government_variety_pack_backend.1002.d.tooltip:0 "어떤 대가를 치르더라도 내외부의 모든 위협에 국가를 대비시킵니다. 이러한 방식은 집행 과정의 과잉으로 가장 큰 부담을 질 가능성이 높은 하층민들의 반감을 살 것입니다. 전쟁 중이거나 법 집행의 필요성이 명확할 때는 정치적 자본 비용이 더 적습니다."
 lrsk_government_variety_pack_backend.1002.e:0 "$lrsk_government_variety_pack_backend.1002.d$"
 lrsk_government_variety_pack_backend.1002.e.tooltip:0 "$lrsk_government_variety_pack_backend.1002.d.tooltip$\" # -100 영향력"
 lrsk_government_variety_pack_backend.1002.f:0 "국가의 법률을 개정하기로 결정했다."
 lrsk_government_variety_pack_backend.1002.f.tooltip:0 "모든 정책 재사용 대기시간을 초기화합니다. 당신의 [this.GetRulerTitle] 레벨이 높을수록 비용이 낮아집니다."
 lrsk_government_variety_pack_backend.1002.g:0 "$lrsk_government_variety_pack_backend.1002.f$"
 lrsk_government_variety_pack_backend.1002.g.tooltip:0 "$lrsk_government_variety_pack_backend.1002.f.tooltip$\" # -150/통치자 레벨 영향력"
 lrsk_government_variety_pack_backend.2000.name:0 "테스트 이벤트"
 lrsk_government_variety_pack_backend.2000.desc:0 "이것은 일반 테스트 이벤트입니다. 플레이어는 절대 이것을 보아서는 안 되며, 보았다면 모드 제작자에게 알려 주십시오."
 lrsk_government_variety_pack_backend.2001.name:0 "GVP 정부 유형 사용 중"
 lrsk_government_variety_pack_backend.2001.desc:0 "[this.GetName]이(가) GVP 추가 정부 유형을 사용 중임을 감지했습니다: '[this.GetGovernmentName]'"
 lrsk_government_variety_pack_backend.2002.name:0 "GVP 사회제도 사용 중"
 lrsk_government_variety_pack_backend.2002.desc:0 "[this.GetName]이(가) 하나 이상의 GVP 추가 사회제도를 사용 중임을 감지했습니다."
 lrsk_government_variety_pack_backend.2003.name:0 "유효하지 않은 사회제도 감지"
 lrsk_government_variety_pack_backend.2003.desc:0 "§HGovernment Variety Pack§! 업데이트로 인해, 당신의 사회제도 중 하나 이상이 §R유효하지 않게 되었습니다§!. 정부를 개혁할 수 있도록 충분한 $r_unity$을(를) 받았습니다. 정부 개혁이 재사용 대기 중이었다면 초기화되었습니다."
 lrsk_government_variety_pack_backend.2004.name:0 "버그가 있는 사회제도 감지"
 lrsk_government_variety_pack_backend.2004.desc:0 "다음 사회제도에는 의도대로 작동하지 않게 만드는 알려진 문제가 있습니다:$TABBED_NEW_LINE$§H$lrsk_gov_var_civic_colonial_fiefs$§! - §Y$policy_lrsk_gvp_colfief_policy$§!이(가) 설립 후 항상 실패하는 것으로 보입니다.\n\n현재 이에 대한 알려진 수정 방법은 없으므로, 수정이 발견될 때까지 이 사회제도에는 정적 보정치가 부여되었거나 기존 보정치가 강화되었습니다."
 lrsk_gvp_mc_bldg_special.12.name:0 "무예의 탁월함"
 lrsk_gvp_mc_bldg_special.12.desc:0 "우리 기업 무역 파트너 중 하나가 운영하는 §Y$lrsk_gov_var_bldg_military_excellence_academy$§!은(는) 우리 장교들의 전문성에 분명히 긍정적인 영향을 주고 있으며, 그곳에서 훈련받은 덕분에 더 낫고 효과적인 지도자가 되었습니다."
 lrsk_gvp_mc_bldg_special.12.a:0 "좋은 소식이군."
 lrsk_gvp_mc_bldg_special.12.b:0 "좋지만, 다시는 이 일로 나를 귀찮게 하지 마라."
 lrsk_gvp_mc_bldg_special.12.b.tooltip:0 "이 일이 다시 발생해도 업데이트를 받지 않습니다."
 lrsk_gvp_mc_bldg_special.21.name:0 "사슬에 묶인 수확"
 lrsk_gvp_mc_bldg_special.21.desc:0 "교묘한 함정, 유혹, 위험한 대출 계획, 노골적인 속임수를 통해, 우리는 §Y[lrsk_slaver_corp_abduct_location.GetName]§!의 비참한 자들을 충분히 옭아매어 영원히 빚진 노동력의 일부로 '고향'에 데려올 수 있게 되었습니다."
 lrsk_gvp_mc_bldg_special.21.a:0 "일하러 가라!"
 lrsk_gvp_mc_bldg_special.21.a.tooltip:0 "£pop£ §Y팝§!을 §Y[lrsk_slaver_corp_abduct_location.GetName]§!에서 납치하여 §Y[this.capital_scope.GetName]§!에 배치했습니다. (그들의 종족 권리를 확인하고 적절히 조정하는 것을 고려하십시오.) §H[lrsk_slaver_corp_abduct_gov.GetName]§! 정부는 우리에게 §R상당히 분노할 것입니다...§!"
 lrsk_gvp_mc_bldg_special.22.name:0 "가증스러운 노예상들!"
 lrsk_gvp_mc_bldg_special.22.desc:0 "§H[lrsk_slaver_corp_to_steal.GetName]§!의 비열한 기업 도적들이 새로운 저점을 찍었습니다. 그들은 §Y[lrsk_slaver_corp_abduct_location.GetName]§!에서 우리 국민을 옭아매고 납치하여 자신들의 행성에서 고역을 시키고 있습니다!"
 lrsk_gvp_mc_bldg_special.22.a:0 "이건 절대 용납할 수 없다."
 lrsk_gvp_mc_bldg_special.22.a.tooltip:0 "우리의 £pop£ §Y팝§! 집단 하나가 §Y[lrsk_slaver_corp_abduct_location.GetName]§!에서 §H[lrsk_slaver_corp_to_steal.GetName]§!의 노예상들에게 납치되었으며, 당연히 §R우리는 격분했습니다!§!"
 LRSK_GVP_SCANDAL_COMMON:0 "£mod_influence_produces_mult£ §Y$mod_country_base_influence_produces_mult$§!, £diplo_weight£ §Y$diplomatic_weight$§!, 그리고 £happiness£ §Y팝 행복도§!가 §Y1§!년 동안 감소합니다."
 lrsk_gvp_mc_bldg_special.31.name:0 "흥미진진한 기사..."
 lrsk_gvp_mc_bldg_special.31.desc:0 "§H[lrsk_media_corp_victim.GetName]§! 정부가 §Y[lrsk_media_corp_scoop_location.GetName]§!에서 수상한 일에 연루된 듯하며, 우리의 용감한 현지 언론 기자들이 이를 발견했습니다. 이 망신거리를 덮어 주겠다고 약속하면 §H[lrsk_media_corp_victim.GetName]§!에 대한 외교적 지렛대를 얻을 수 있습니다."
 lrsk_gvp_mc_bldg_special.31.a:0 "대특종이군!"
 lrsk_gvp_mc_bldg_special.31.a.tooltip:0 "§G호의 1개§!를 §H[lrsk_media_corp_victim.GetName]§!에게서 얻습니다. 다만 그들이 거부할 수도 있습니다..."
 lrsk_gvp_mc_bldg_special.31.b:0 "사람들은 알 권리가 있다."
 lrsk_gvp_mc_bldg_special.31.b.tooltip:0 "§H[lrsk_media_corp_victim.GetName]§!은(는) 망신을 당하여, 그들의 $LRSK_GVP_SCANDAL_COMMON$ 그들은 §R우리에게 만족하지 않을 것입니다...§!"
 lrsk_gvp_mc_bldg_special.31.c:0 "그냥... 이번 일은 넘어가는 게 좋을지도 모른다."
 lrsk_gvp_mc_bldg_special.31.c.tooltip:0 "이번에는 아무 일도 일어나지 않습니다."
 lrsk_gvp_mc_bldg_special.32.name:0 "추문 회피"
 lrsk_gvp_mc_bldg_special.32.desc:0 "§H[lrsk_media_corp_to_scoop.GetName]§! 기업 본사의 PR 전문가들이 §Y[lrsk_media_corp_scoop_location.GetName]§!에 있는 그들의 기자들이 우리에게 깊은 망신이 될 만한 무언가를 발견했다고 알려 왔습니다. '다행히도,' 그들은 말했습니다. '우리는 이것을 사업 기회로 보고 싶습니다...'"
 lrsk_gvp_mc_bldg_special.32.a:0 "정말 곤란한 상황에 빠졌군."
 lrsk_gvp_mc_bldg_special.32.a.tooltip:0 "§H[lrsk_media_corp_to_scoop.GetName]§!이(가) 우리에게서 §R호의 1개§!를 얻습니다."
 lrsk_gvp_mc_bldg_special.32.b:0 "우리는 협박당하지 않는다!"
 lrsk_gvp_mc_bldg_special.32.b.tooltip:0 "§H[lrsk_media_corp_to_scoop.GetName]§!이(가) 기사를 공개하면, 국가적 망신이 우리의 $LRSK_GVP_SCANDAL_COMMON$ 우리는 §R만족하지 않을 것입니다§! §H[lrsk_media_corp_to_scoop.GetName]§!에게."
 lrsk_gvp_mc_bldg_special.33.name:0 "우리가 특종을 빼앗겼다!"
 lrsk_gvp_mc_bldg_special.33.desc:0 "§H[lrsk_media_corp_to_scoop.GetName]§!의 기자들이 §Y[lrsk_media_corp_scoop_location.GetName]§!에서 국가적 망신거리를 발견하고 보도했습니다. 시민들과 은하 공동체 앞에서 우리의 명예를 회복하려면 이제 시간이 좀 걸릴 것입니다."
 lrsk_gvp_mc_bldg_special.33.a:0 "참견하는 거짓 언론 같으니!"
 lrsk_gvp_mc_bldg_special.33.a.tooltip:0 "국가적 망신이 우리의 $LRSK_GVP_SCANDAL_COMMON$ 우리는 §R만족하지 않습니다§! §H[lrsk_media_corp_to_scoop.GetName]§!에게."
 lrsk_gvp_mc_bldg_special.34.name:0 "제안 거부..."
 lrsk_gvp_mc_bldg_special.34.desc:0 "우리는 합리적으로 굴려고 했습니다. 좋은 외교 관계를 위해 노력했습니다. 누구에게도 불필요한 망신을 주고 싶지 않았습니다. 그러나 §H[lrsk_media_corp_victim.GetName]§! 정부는 우리의 매우 친절하고 공정한 제안을 거절했고, 이제 우리는 §Y[lrsk_media_corp_scoop_location.GetName]§!에서 그들이 저지른 부정에 대해 진실, 온전한 진실, 그리고 진실만을 보도할 수밖에 없습니다."
 lrsk_gvp_mc_bldg_special.34.a:0 "그들의 손해지."
 lrsk_gvp_mc_bldg_special.34.a.tooltip:0 "$lrsk_gvp_mc_bldg_special.31.b.tooltip$"
 lrsk_gvp_mc_bldg_special.34.b:0 "$lrsk_gvp_mc_bldg_special.31.c$"
 lrsk_gvp_mc_bldg_special.34.b.tooltip:0 "$lrsk_gvp_mc_bldg_special.31.c.tooltip$"
 lrsk_gvp_mc_bldg_special.51.name:0 "행운의 바람"
 lrsk_gvp_mc_bldg_special.51.desc.a:0 "$lrsk_gov_var_bldg_grand_casino$이(가) §Y[lrsk_casino_corp_play_location.GetName]§!에 개장한 것이 모두의 환영을 받은 것은 아닙니다. 악덕의 확산에 경악한 도덕 개혁가들이 그 존재 자체에 항의하며 불매 운동을 조직했습니다."
 lrsk_gvp_mc_bldg_special.51.a:0 "성가시군..."
 lrsk_gvp_mc_bldg_special.51.a.tooltip:0 "§R-10%§! $r_trade$이(가) §Y[lrsk_casino_corp_play_location.GetName]§!에서 2년 동안 적용됩니다."
 lrsk_gvp_mc_bldg_special.51.desc.b:0 "정말 대단한 경기였습니다! 수만, 어쩌면 수십만 명의 고객이 최근 권투 경기 결과에 돈을 걸었습니다. 그 경기는 $lrsk_gov_var_bldg_grand_casino$에서 §Y[lrsk_casino_corp_play_location.GetName]§!에 열린 것이었고, 행성 주민들에게 세기의 볼거리가 되었습니다."
 lrsk_gvp_mc_bldg_special.51.b:0 "승자에게 전리품이 돌아간다!"
 lrsk_gvp_mc_bldg_special.51.b.tooltip:0 "§G+5% £pop£ §Y팝§! £happiness£ §Y행복도§!가 §Y[lrsk_casino_corp_play_location.GetName]§!에서 1년 동안 적용됩니다."
 lrsk_gvp_mc_bldg_special.51.desc.c:0 "§Y[lrsk_casino_corp_play_location.GetName]§! 역사상 가장 거칠고 소란스러운 경기 후 난투라고 불리는 사건으로, 거리에는 최근 $lrsk_gov_var_bldg_grand_casino$의 스포츠 도박 이벤트 결과를 두고... 분노했는지? 들떴는지? 어쨌든 강한 감정으로 가득 찬 스포츠 팬들이 넘쳐납니다. 재산 피해를 복구하는 데 몇 달이 걸릴 수도 있습니다."
 lrsk_gvp_mc_bldg_special.51.c:0 "진정해, 그냥 경기일 뿐이잖아!"
 lrsk_gvp_mc_bldg_special.51.c.tooltip:0 "§R-5§! $r_stability$이(가) 1년 동안 적용되고, 정리해야 할 어느 정도의 §R황폐도§!가 생깁니다."
 lrsk_gvp_mc_bldg_special.51.desc.d:0 "$lrsk_gov_var_bldg_grand_casino$이(가) §Y[lrsk_casino_corp_play_location.GetName]§!에 건설된 이후, 휴가나 다른 여가를 위해 이 행성을 방문하려는 관심이 늘었습니다. 지금으로서는 덕분에 제대로 된 관광 붐이 지역 경제를 끌어올리고 있으며, 첫 잉여 수익도 이미 들어오고 있다고 말할 수 있습니다."
 lrsk_gvp_mc_bldg_special.51.d:0 "사랑하는 관광객 여러분, [lrsk_casino_corp_play_location.GetName]에 오신 것을 환영합니다!"
 lrsk_gvp_mc_bldg_special.51.d.tooltip:0 "§G+10%§! $r_trade$이(가) §Y[lrsk_casino_corp_play_location.GetName]§!에서 2년 동안 적용됩니다."
 lrsk_gvp_mc_bldg_special.52.name:0 "$lrsk_gvp_mc_bldg_special.51.name$"
 lrsk_gvp_mc_bldg_special.52.desc.a:0 "$lrsk_gvp_mc_bldg_special.51.desc.a$"
 lrsk_gvp_mc_bldg_special.52.a:0 "사업에 악영향이군!"
 lrsk_gvp_mc_bldg_special.52.a.tooltip:0 "§R-10% $BRANCH_OFFICE_VALUE$§!가 §Y[lrsk_casino_corp_play_location.GetName]§!에서 2년 동안 적용됩니다."
 lrsk_gvp_mc_bldg_special.52.desc.b:0 "$lrsk_gvp_mc_bldg_special.51.desc.b$"
 lrsk_gvp_mc_bldg_special.52.b:0 "$lrsk_gvp_mc_bldg_special.51.b$"
 lrsk_gvp_mc_bldg_special.52.b.tooltip:0 "§H[lrsk_casino_corp_host_player.GetName]§!은(는) 향후 4년 동안 우리에 대해 §G향상된 우호도§!를 가집니다."
 lrsk_gvp_mc_bldg_special.52.desc.c:0 "$lrsk_gov_var_bldg_grand_casino$의 보안팀은 §Y[lrsk_casino_corp_play_location.GetName]§!에서 어떻게, 왜 그런지 설명하지 못하지만... 터무니없이 운 좋은 고객 한 명이 거의 카지노를 털어 갔습니다! 기가 크랩스부터 은하 룰렛, 10차원 포커에 이르기까지, 이 떠돌이 도박꾼은 보이지 않는 힘에 이끌려 게임에서 게임으로 옮겨 다니는 듯 도저히 질 줄을 몰랐습니다. 우리가 잃은 것을 회복하려면 시간이 걸릴 것입니다."
 lrsk_gvp_mc_bldg_special.52.c:0 "분명 사기꾼이었을 거야!"
 lrsk_gvp_mc_bldg_special.52.c.tooltip:0 "§R-10% $BRANCH_OFFICE_VALUE$§!가 §Y[lrsk_casino_corp_play_location.GetName]§!에서 2년 동안 적용됩니다."
 lrsk_gvp_mc_bldg_special.52.desc.d:0 "충분히 긴 기간 동안 우연의 게임은 기대 수익률로 평탄해지는 경향이 있습니다. 그것이 도박이 사업이 되는 기초입니다. 하지만 때로는 우연의 변덕이 우리가 예상한 것보다 훨씬 더 우리 편으로 기울기도 합니다. $lrsk_gov_var_bldg_grand_casino$이(가) §Y[lrsk_casino_corp_play_location.GetName]§!에서 우리에게 깔끔한 작은 횡재를 안겨 주었습니다."
 lrsk_gvp_mc_bldg_special.52.d:0 "하우스는 언제나 이긴다."
 lrsk_gvp_mc_bldg_special.52.d.tooltip:0 "§G+10% $BRANCH_OFFICE_VALUE$§!가 §Y[lrsk_casino_corp_play_location.GetName]§!에서 2년 동안 적용됩니다."
