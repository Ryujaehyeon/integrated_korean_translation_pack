 concept_leader_trait_lrsk_gvp_esper_desc:0 "정확한 효과는 §Y£leader£ 지도자§! 유형에 따라 달라지지만, §Y$leader_trait_psionic$§! 특성이 제공하는 혜택의 약화된 버전입니다."
 concept_deposit_lrsk_gvp_shroud_pockets:0 "$d_lrsk_gov_var_shroud_pockets$"
 concept_deposit_lrsk_gvp_shroud_pockets_desc:0 "£job_lrsk_gov_var_job_otherworld_guide£ ['concept_lrsk_gvp_otherworld_guides']를 추가합니다. 이들은 항상 그렇게 표시되지는 않더라도 §Y$concept_planet_telepaths$§!로 간주됩니다.\n\n§L$d_lrsk_gov_var_shroud_pockets_desc$§!"
 concept_lrsk_genesis_civics:0 "창세 지도"
 concept_lrsk_genesis_civics_desc:0 "$concept_lrsk_genesis_civics$ 사회제도는 다음으로 구성됩니다: $TABBED_NEW_LINE$- ['civic:civic_guided_sapience']$TABBED_NEW_LINE$- ['civic:civic_hive_guided_sapience']$TABBED_NEW_LINE$- ['civic:civic_machine_guided_sapience']$TABBED_NEW_LINE$- ['civic:civic_corporate_guided_sapience']"
 concept_lrsk_antisocial_civics:0 "반사회적"
 concept_lrsk_antisocial_civics_desc:0 "$concept_lrsk_antisocial_civics$ 사회제도는 다음으로 구성됩니다: $TABBED_NEW_LINE$- ['civic:civic_inwards_perfection']$TABBED_NEW_LINE$- ['civic:civic_barbaric_despoilers']$TABBED_NEW_LINE$- ['civic:civic_machine_assimilator']$TABBED_NEW_LINE$- ['civic:civic_criminal_heritage']"
 concept_planet_lrsk_telepaths:0 "$concept_planet_telepaths$"
 concept_planet_lrsk_telepaths_desc:0 "$concept_planet_telepaths_desc$ $TABBED_NEW_LINE$- $job_lrsk_gov_var_job_otherworld_guide_plural$"
 lrsk_gov_var_gov_libertarian_freehold:0 "자유지상주의 자유보유령"
 lrsk_gov_var_gov_libertarian_freehold_desc:0 "이 정부는 정부의 모든 기능을 여러 기업에 위탁한 극단적인 민영화 실험의 결과입니다. 정부 기관으로는 입법부와 법원만 남아 있으며, 제국의 최고 판사는 기본적으로 일부 행정권을 떠맡았습니다."
 LRSK_GOV_VAR_RT_CHIEF_JUSTICE:0 "수석 중재관"
 LRSK_GOV_VAR_RT_CHIEF_JUSTICE_FEMALE:0 "$LRSK_GOV_VAR_RT_CHIEF_JUSTICE$"
 LRSK_GOV_VAR_START_SCREEN_P2_LIBERTARIAN_FREEHOLD:0 "초기에는 우리 국민이 거대하고 비효율적인 정부에 의해 통치되었습니다. 우리는 그들의 부풀려진 관료제 아래에서 정체되었습니다. 그러던 중 국가 운영의 혁신이 일어났습니다: 우리는 더 민첩하고 효율적인 기업들이 정부의 일을 시작하도록 허용했습니다. 이제 우리의 [capital_scope.GetCapitalCarrierTypeAdj] 정부는 주로 민간 계약자에 대한 기준을 설정하고, 누구의 권리가 침해될 때 정의가 실현되도록 하는 역할을 합니다."
 lrsk_gov_var_gov_anarcho_capitalism:0 "무정부 자본주의"
 lrsk_gov_var_gov_anarcho_capitalism_desc:0 "이 정부는 이론상 정부가 전혀 아닙니다. 일반 정부의 모든 기능, 심지어 법 집행과 사법까지 여러 경쟁적 민간 주체들에게 분산되어 있기 때문입니다. 주권 국가의 관료와 비슷한 것으로는 최후의 분쟁 해결자라는 단 하나의 직위만 남아 있습니다."
 LRSK_GOV_VAR_RT_CHIEF_INSPECTOR:0 "수석 감찰관"
 LRSK_GOV_VAR_RT_CHIEF_INSPECTOR_FEMALE:0 "$LRSK_GOV_VAR_RT_CHIEF_INSPECTOR$"
 LRSK_GOV_VAR_START_SCREEN_P2_ANARCHO_CAPITALISM:0 "초기 우리 사람들은 국가에 의해 투옥되고 착취당했습니다. 우리는 왕과 관료들의 폭력적 요구 아래 신음했습니다. 시간이 지나며 자유를 사랑하는 이들은 기업, 자선단체, 시민 결사가 강제 없이도 국가가 할 수 있는 모든 일을 할 수 있음을 깨달았습니다. 혁명은 국가를 쓸어내고 다양한 자발적이고 경쟁적인 분쟁 해결 조직과 계약 공동체로 대체했습니다. 이제 가벼운 조정력을 제공하기 위한 정부의 잔재적 직위 하나만 남아 있습니다."
 lrsk_gov_var_gov_corporate_neofuedalism:0 "기업 신봉건제"
 lrsk_gov_var_gov_corporate_neofuedalism_desc:0 "이 정부는 단순히 기능을 기업에 위탁한 것이 아니라, 정부를 지역 또는 지방 규모로 분권화하고 부의 새로운 귀족층의 진취적 지도 아래 국가를 기업처럼 운영한 결과입니다. 세계 규모에서 기업 지배자들은 외교와 군사를 고용 대리인에게 맡깁니다."
 LRSK_GOV_VAR_RT_AMBAS_AGENT:0 "대사 대리인"
 LRSK_GOV_VAR_RT_AMBAS_AGENT_FEMALE:0 "$LRSK_GOV_VAR_RT_AMBAS_AGENT$"
 LRSK_GOV_VAR_START_SCREEN_P2_CORPORATE_NEOFUEDALISM:0 "우리 사람들은 한때 거대하고 비효율적인 국가에 의해 잘못 관리되었습니다. 우리는 그들의 어리석은 '평등' 집착 아래 정체되었습니다. 시간이 지나서야 우리는 불평등의 미덕과 혁신적 파괴의 힘을 배웠습니다. 무능한 기업 이익에 예속된 정치 영역에서 궁극의 파괴는 정부의 규모를 줄이고, 중개자를 제거하며, 가장 뛰어난 기업가들이 앞장서 정부를 기업처럼 운영하는 것이었습니다."
 lrsk_gov_var_gov_proprietary_franchise:0 "소유권 프랜차이즈"
 lrsk_gov_var_gov_proprietary_franchise_desc:0 "이 정부는 사실상 명목상 사회를 통치하는 잔재 국가를 압도할 정도로 팽창한 가족 기업입니다. 그 결과 다른 기업들은 존재하지만, 봉신과 같은 고객 지위로 밀려났습니다. 상속 분쟁은 중대하고 종종 피비린내 납니다."
 LRSK_GOV_VAR_RT_PROPRIETOR:0 "소유자"
 LRSK_GOV_VAR_RT_PROPRIETOR_FEMALE:0 "여성 소유주"
 LRSK_GOV_VAR_HT_SENIOR_VP:0 "선임 부사장"
 LRSK_GOV_VAR_HT_SENIOR_VP_FEMALE:0 "$LRSK_GOV_VAR_HT_SENIOR_VP$"
 LRSK_GOV_VAR_START_SCREEN_P2_PROPRIETARY_FRANCHISE:0 "초기에는 우리 민족이 비효율적인 공화국과 허세 가득한 왕조에 의해 통치되었습니다. 점차 [capital_scope.GetCapitalCarrierTypeAdj] 무역이 증가함에 따라 상인 가문의 영향력이 꾸준히 커졌습니다. 결국 한 교활하고 무자비한 가족 기업이 거의 모든 분야에서 시장을 장악하고 [capital_scope.GetCapitalCarrierType]의 사실상 지배자가 되었습니다. 주 정부는 여전히 운영되고, 다른 기업들은 틈새 시장에 여전히 서비스를 제공하지만, 모두가 가족의 이익을 방해하지 않는 것이 좋다는 것을 알고 있습니다. 그들의 돈이 계속 들어오게 두는 것이 더 낫습니다."
 lrsk_gov_var_gov_entrepreneurial_council:0 "기업가 평의회"
 lrsk_gov_var_gov_entrepreneurial_council_desc:0 "이 정부는 경쟁적이고 공정한 시장경제라는 이상을 관리하는 데 주로 관심을 둡니다. 사회 이동성은 위태롭게 유동적이지만, 사업에서 성공한 이들은 큰 권력을 행사합니다."
 LRSK_GOV_VAR_RT_ENTERPRISE_COM:0 "기업 위원"
 LRSK_GOV_VAR_RT_ENTERPRISE_COM_FEMALE:0 "$LRSK_GOV_VAR_RT_ENTERPRISE_COM$"
 LRSK_GOV_VAR_START_SCREEN_P2_ENTREPRENEURIAL_COUNCIL:0 "초기에는 우리 민족이 거대하고 비효율적인 국가에 의해 통치되었습니다. 우리는 그들의 부풀려진 관료제 아래에서 정체되었습니다. 그러나 정점은 너무 무거워져서 더 이상 지탱할 수 없게 되었고, 결국 민첩하고 배고픈 민간 기업들이 혁신 덕분에 어떤 국가보다도 더 영향력 있고 강력해졌습니다. 오늘날, 기업가의 위원회는 [capital_scope.GetCapitalCarrierTypeAdj] 비즈니스 관행의 중재자로 활동하여 혁신의 자유가 고객과 직원들을 압도하거나 경쟁을 밀어내지 않도록 보장합니다."
 LRSK_GOV_VAR_MERCH_COMMON:0 "이 사회는 상업적 성공과 전반적 사회적 가치를 떼려야 뗄 수 없는 것으로 봅니다."
 LRSK_GOV_VAR_MERCH_START_COMMON:0 "초기에는 우리의 원래 공화국의 자유가 폭군적인 군주와 제국에 의해 짓밟혔습니다. 점차적으로 [capital_scope.GetCapitalCarrierTypeAdj] 무역이 증가함에 따라 상인과 산업의 중요성은 무시할 수 없게 되었고, 금이 세상을 지배한다고 할 수 있었습니다."
 lrsk_gov_var_gov_merchant_republic:0 "상인 공화국"
 lrsk_gov_var_gov_merchant_republic_desc:0 "$LRSK_GOV_VAR_MERCH_COMMON$ 그 결과, 가장 부유하고 따라서 가장 가치 있는 사업 지도자들에게 권력이 귀속되는 공화국이라는 오래된 정부 형태가 성간 시대에도 관련성을 유지했습니다."
 LRSK_GOV_VAR_RT_SERENE_DOG:0 "고요한 도제"
 LRSK_GOV_VAR_RT_SERENE_DOGE:0 "$LRSK_GOV_VAR_RT_SERENE_DOG$e"
 LRSK_GOV_VAR_RT_SERENE_DOGARESSA:0 "$LRSK_GOV_VAR_RT_SERENE_DOG$aressa"
 LRSK_GOV_VAR_START_SCREEN_P2_MERCHANT_REPUBLIC:0 "$LRSK_GOV_VAR_MERCH_START_COMMON$ 상업적 성공과 사회적 가치가 서로 얽혀 있음을 깨달은 우리는 고대 모델 위에 새로운 공화국을 세웠고, 그 제도 안에서 사업을 최우선에 두는 헌법 조항이라는 새로운 요소를 더했습니다."
 lrsk_gov_var_gov_constitutional_plutocracy:0 "입헌 금권정"
 lrsk_gov_var_gov_constitutional_plutocracy_desc:0 "$LRSK_GOV_VAR_MERCH_COMMON$ 이런 이유로 구성원들은 공직과 대표 선거 후보 자격이 최고 입찰자에게 열려 있는 것을 전혀 문제 삼지 않습니다. 사실 그들은 그것을 대단히 합리적이라고 여깁니다."
 LRSK_GOV_VAR_RT_PROP_PRES:0 "소유주-대통령"
 LRSK_GOV_VAR_RT_PROP_PRES_FEMALE:0 "여성 소유주-대통령"
 LRSK_GOV_VAR_START_SCREEN_P2_CONST_PLUT:0 "$LRSK_GOV_VAR_MERCH_START_COMMON$ 따라서 폭정에 맞선 민주 운동은 현명하게도 부유하고 가치 있는 자들의 통치를 표어로 삼았고, 국가 행정이 구매력을 통해 공직 적합성을 증명할 수 있는 이들의 손에 놓이도록 보장했습니다."
 lrsk_gov_var_gov_enterprise_society:0 "기업 사회"
 lrsk_gov_var_gov_enterprise_society_desc:0 "이 정부는 사유 재산 보호를 최고의 책임으로 매우 진지하게 받아들입니다. 시민들은 엄격한 법 집행 조치와 범죄자 및 '비생산적인 자들'의 정치권 박탈을 지지합니다."
 LRSK_GOV_VAR_RT_FRANCHISE_MINISTER:0 "프랜차이즈 장관"
 LRSK_GOV_VAR_RT_FRANCHISE_MINISTER_FEMALE:0 "$LRSK_GOV_VAR_RT_FRANCHISE_MINISTER$"
 LRSK_GOV_VAR_START_SCREEN_P2_ENTERPRISE_SOCIETY:0 "$LRSK_GVP_ENTERPRISE_START_COMMON_1$ 우리는 노력하고 성취하며 노동의 결실을 누릴 자유를 잃는다면 교조적인 '민주적' 정치 고집을 거부하게 되었습니다. 그 결과 우리 공화국은 악덕, 범죄, 게으름이 처벌받지 않고 지나가는 것을 허용하지 않으며, 성취가 낮은 대중이 정치 과정을 자신들에게 유리하게 왜곡하지 못하게 합니다."
 lrsk_gov_var_gov_enterprise_junta:0 "기업 군사평의회"
 lrsk_gov_var_gov_enterprise_junta_desc:0 "$LRSK_GVP_ENTERPRISE_DESC_COMMON$ 경찰 또는 군사 파벌이 주도권의 자유와 재산 보호라는 이름으로 질서를 보장합니다."
 LRSK_GOV_VAR_RT_PRES_COMMANDER:0 "의장 사령관"
 LRSK_GOV_VAR_RT_PRES_COMMANDER_FEMALE:0 "$LRSK_GOV_VAR_RT_PRES_COMMANDER$"
 LRSK_GOV_VAR_START_SCREEN_P2_ENTERPRISE_JUNTA:0 "$LRSK_GVP_ENTERPRISE_START_COMMON_1$ $LRSK_GVP_ENTERPRISE_START_COMMON_2$ 우리의 가장 신중한 경찰 및 군 장교들 $LRSK_GVP_ENTERPRISE_START_COMMON_3$"
 lrsk_gov_var_gov_enterprise_authority:0 "기업 권위체"
 lrsk_gov_var_gov_enterprise_authority_desc:0 "$LRSK_GVP_ENTERPRISE_DESC_COMMON$ 경찰 또는 군사 지휘관이 주도권의 자유와 재산 보호라는 이름으로 질서를 보장합니다."
 LRSK_GOV_VAR_RT_EXEC_MARSHAL:0 "집행 원수"
 LRSK_GOV_VAR_RT_EXEC_MARSHAL_FEMALE:0 "$LRSK_GOV_VAR_RT_EXEC_MARSHAL$"
 LRSK_GOV_VAR_START_SCREEN_P2_ENTERPRISE_AUTHORITY:0 "$LRSK_GVP_ENTERPRISE_START_COMMON_1$ $LRSK_GVP_ENTERPRISE_START_COMMON_2$ 신중한 지휘관 $LRSK_GVP_ENTERPRISE_START_COMMON_3$"
 lrsk_gov_var_gov_libertine_empire:0 "자유의 제국"
 lrsk_gov_var_gov_libertine_empire_desc:0 "이 정부에는 강력한 군주가 있지만, 그 군주는 전통과 헌법적 한계에 묶여 있습니다. 군주는 즉위 시 국민의 권리와 자유를 보호하겠다고 맹세합니다. 다만 정치권은 보통 의제에 오르지 않습니다."
 LRSK_GOV_VAR_RT_LIB_EMPEROR:0 "자유 황제"
 LRSK_GOV_VAR_RT_LIB_EMPERESS:0 "자유 여제"
 LRSK_GOV_VAR_HT_FREE_PRINCE:0 "자유 왕자"
 LRSK_GOV_VAR_HT_FREE_PRINCESS:0 "자유 공주"
 LRSK_GOV_VAR_START_SCREEN_P2_LIBERTINE_EMPIRE:0 "태곳적부터 우리 사람들은 귀족과 군주의 자의적이고 불안정한 폭정을 알아왔습니다. 이성의 빛이 오래된 편견과 미신의 안개를 걷어내기 시작했을 때, 한 신흥 군 장교가 더 나은 길을 알아보고 당시의 권력자들에게 도전하여 자유롭고 공정한 통치의 새 체계를 세웠습니다. 그 반역자의 혈통에서 우리는 이제 매번 대관식마다 우리의 자유를 지키고 우리의 평화와 재산을 위협하는 악인을 처벌하겠다고 맹세하는 군주의 품위와 힘을 누립니다."
 lrsk_gov_var_gov_empire_of_rapine:0 "약탈의 제국"
 lrsk_gov_var_gov_empire_of_rapine_desc:0 "한때 국민의 권리와 자유를 보호하겠다고 맹세한 이상주의적 군주 정부였지만, 그 지배 왕조와 가장 두드러진 귀족들은 '국민'과 '그들의 권리와 자유' 모두에 대해 제한적인 관점을 받아들이게 되었습니다. 자유와 인격을 '얻을' 동등한 권리, 그리고 이 배타적 권리에서 재산 보유의 중요성을 내세우는 냉혹한 이론 아래, 노골적인 약탈과 노예제가 일상이 되었습니다."
 LRSK_GOV_VAR_RT_EMPEROR_OF_FREE:0 "자유민의 황제"
 LRSK_GOV_VAR_RT_EMPRESS_OF_FREE:0 "자유민의 여제"
 LRSK_GOV_VAR_HT_PRINCELICENTIOUS:0 "방종 왕자"
 LRSK_GOV_VAR_HT_PRINCESSLICENTIOUS:0 "방종 공주"
 LRSK_GOV_VAR_START_SCREEN_P2_EMPIRE_OF_RAPINE:0 "우리 왕조는 한 신흥 군 장교가 [capital_scope.GetCapitalCarrierTypeShort]을(를) 운영하는 더 나은 방법을 알아보고 당시의 권력자들에게 도전하여 자유롭고 공정한 통치의 새 체계를 세우면서 시작되었습니다. 물론 '자유롭고 공정하다'는 말은 많은 것을 뜻할 수 있습니다. 누구에게 공정한가? 그리고 누가 자유로울 자격이 있는가? 강자가 약자를 지배한다는 것은 자명한 자연법이며, 우리 사회는 자유가 획득되어야 한다는 사실을 인정하게 되었습니다. 자유에 적합하지 않은 자들은 오직 섬기기에만 적합합니다."
 lrsk_gov_var_gov_rationalist_managerial_firm:0 "합리주의-관리 기업"
 lrsk_gov_var_gov_rationalist_managerial_firm_desc:0 "이 정부는 사실 이윤 극대화를 위한 합리적으로 계획된 효율성 원칙에 따라 운영되는 일종의 사업체입니다. 시민-노동자의 삶의 모든 측면은 모범 사례에 따라 설계되었습니다. 지방 및 지역 정부의 역할은 낭비 감소 조치의 집행으로 축소되었습니다."
 LRSK_GOV_VAR_RT_PROC_EFF_DIRECTOR:0 "공정 효율 책임자"
 LRSK_GOV_VAR_RT_PROC_EFF_DIRECTOR_FEMALE:0 "$LRSK_GOV_VAR_RT_PROC_EFF_DIRECTOR$"
 LRSK_GOV_VAR_START_SCREEN_P2_RMF:0 "우리 사회는 한때 거대하고 비효율적인 국가와 비합리적으로 구성된 기업들이 상호작용하는 형태였습니다. 이 상태야말로 우리의 전체 역사를 낭비된 생산성과 잠재력의 비극으로 만들었습니다. 그러나 현대에 우리는 과학적 관리의 가치를 배웠습니다. 처음에는 산업 작업 흐름의 정밀한 조율과 도구 설계에 한정되었습니다. 곧 생활 지침과 식단 요구 사항까지 포괄하게 되었습니다. 오늘날 가장 성공한 기업은 자원, 노동, 마케팅의 교환에 관여하는 모든 이에게 가장 효율적인 기준을 적용했고, 자연히 그 이해관계가 우리의 전체 정치 체계를 이끕니다."
 lrsk_gov_var_gov_private_intel_agency:0 "민간 정보기관"
 lrsk_gov_var_gov_private_intel_agency_desc:0 "지식이 힘이라면, 지식의 흐름과 내용에 대한 통제권을 판매하는 것은 이 기업이 주권 권력을 장악하는 길이었습니다. 필수적인 보안 및 첩보 운영은 공식 국가를 모두 흡수했습니다."
 LRSK_GOV_VAR_RT_CE_DIRECTOR:0 "최고 집행 책임자"
 LRSK_GOV_VAR_RT_CE_DIRECTOR_FEMALE:0 "$LRSK_GOV_VAR_RT_CE_DIRECTOR$"
 LRSK_GOV_VAR_START_SCREEN_P2_PIA:0 "우리 사람들은 언제나 두 가지를 중시했습니다. 성공의 척도로서 부의 축적, 그리고 그 부를 누리는 데 필요한 사회 안정과 개인 보안입니다. 그 결과 개인, 기업, 정부를 위한 감시와 보안 수요를 충족하기 위해 기업들이 생겨났습니다. 최근 역사에 와서야 이 두 가치의 최적 조합이 민간 정보기관에서 발견되었습니다. 이는 국가 치안권과 첨단 고효율 첩보 장치의 지원을 받는 민간 조사관의 결합입니다. 오늘날 정부들은 우리 문명 전체의 보안 및 위협 관리 서비스를 어느 계약자에게 맡길지 공동으로 결정합니다. "
 lrsk_gov_var_gov_protection_racket:0 "보호 갈취 조직"
 lrsk_gov_var_gov_protection_racket_desc:0 "범죄자들은 원칙적으로 법에 의존할 수 없으며, 범죄 지하세계에는 잔혹함으로 집행되는 자체 규칙이 있습니다. 이 기업은 비공식 범죄 규범의 집행을 숙달했고, 결국 자신의 약탈을 법으로 규정할 만큼 강력해졌습니다."
 LRSK_GOV_VAR_RT_CHIEF_ENFORCER:0 "최고 집행관"
 LRSK_GOV_VAR_RT_CHIEF_ENFORCER_FEMALE:0 "$LRSK_GOV_VAR_RT_CHIEF_ENFORCER$"
 LRSK_GOV_VAR_START_SCREEN_P2_PROCRACK:0 "우리의 첫 정부들은 약하고 비효율적이었습니다. 범죄는 번성하여 범죄 지하세계가 구역 분쟁을 처리할 자체 공식 및 비공식 규칙을 만들 만큼 커졌습니다. 그중 가장 잔혹하고 교활한 이들이 이 틈새를 이용해, 다른 모든 범죄조직이 운영 보호를 위해 의지하는 필수적인 '범죄 법정'이 되었습니다. 최종 통합의 행위로, 이제 이름뿐이던 옛 정부들은 폐지되었고 범죄조직은 우리 모성의 사실상 지배체로 떠올랐습니다."
 lrsk_gov_var_gov_innovation_initiative:0 "혁신 구상체"
 lrsk_gov_var_gov_innovation_initiative_desc:0 "이 정부는 외부에서 보면 국가 기능을 흡수한 대학이나 연구소처럼 보입니다. 내부적으로 그 정치는 정부 및 사회 조직 형태에 관한 일련의 실험과 같습니다."
 LRSK_GOV_VAR_RT_EXEC_DEAN:0 "집행 학장"
 LRSK_GOV_VAR_RT_EXEC_DEAN_FEMALE:0 "$LRSK_GOV_VAR_RT_EXEC_DEAN$"
 LRSK_GOV_VAR_START_SCREEN_P2_INNOVATION_INITIATIVE:0 "우리 사람들은 한때 거대하고 비효율적인 국가에 의해 잘못 관리되었습니다. 그들이 강요한 독점적 비전과 명령은 지식과 사회 조직의 진정한 발전에는 너무 경직되어 있었습니다. 시간이 지나서야 우리는 불평등의 미덕과 혁신적 파괴의 힘을 배웠습니다. $LRSK_GVP_SCHOLSTATE_COMBINE_STRING$ 자원을 모아 재정적으로 실패한 국가들의 특권을 사들이고, 지식의 진보부터 정부, 경제, 사회, 문화, 모든 지성 생명체의 조직에 이르기까지 모든 것에 대한 새로운 실험 체계를 세웠습니다."
 lrsk_gov_var_gov_academy_state:0 "학원 국가"
 lrsk_gov_var_gov_academy_state_desc:0 "이 정부는 지식의 발전과 확산에 너무 헌신적이어서, 교수 행정부를 갖춘 거대한 대학과도 같습니다. 정부 내 서열은 훈련과 교육 수준을 밀접하게 따릅니다."
 LRSK_GOV_VAR_RT_PROVOST_GEN:0 "총괄 학장"
 LRSK_GOV_VAR_RT_PROVOST_GEN_FEMALE:0 "$LRSK_GOV_VAR_RT_PROVOST_GEN$"
 LRSK_GOV_VAR_START_SCREEN_P2_ACADEMY_STATE:0 "$LRSK_GVP_SCHOLSTATE_START_COMMON_1$ 자원을 모아 재정적으로 실패한 국가들의 특권을 사들였습니다. $LRSK_GVP_SCHOLSTATE_START_COMMON_2$"
 lrsk_gov_var_gov_scholastic_commonwealth:0 "학술 커먼웰스"
 lrsk_gov_var_gov_scholastic_commonwealth_desc:0 "이 정부는 지식의 발전과 확산에 너무 헌신적이어서, 선출된 교수 상원을 갖춘 거대한 대학과도 같습니다. 정치권은 훈련과 교육 수준에 따라 확대됩니다."
 LRSK_GOV_VAR_RT_FACULTY_DIRECTOR:0 "교수단 책임자"
 LRSK_GOV_VAR_RT_FACULTY_DIRECTOR_FEMALE:0 "$LRSK_GOV_VAR_RT_FACULTY_DIRECTOR$"
 LRSK_GOV_VAR_START_SCREEN_P2_SCHOLASTIC_COMMONWEALTH:0 "$LRSK_GVP_SCHOLSTATE_START_COMMON_1$ 노력을 기울여 사람들을 가르치고 설득한 뒤, 극적인 정부 개혁을 내건 강령으로 공직에 출마했습니다. $LRSK_GVP_SCHOLSTATE_START_COMMON_2$"
 lrsk_gov_var_gov_proletarian_dictatorship:0 "프롤레타리아 체제"
 lrsk_gov_var_gov_proletarian_dictatorship_desc:0 "이 정부는 국민의 필요를 돌보고 그들의 혁명을 방어하기 위해 자신의 통치가 필요하다고 정당화하는 일당 국가입니다."
 LRSK_GOV_VAR_RT_PARTY_CHAIRMAN:0 "당 의장"
 LRSK_GOV_VAR_RT_PARTY_CHAIRWOMAN:0 "여성 당 의장"
 LRSK_GOV_VAR_START_SCREEN_P2_PROLETARIAN_DICTATORSHIP:0 "$LRSK_GVP_COMMIE_START_1$ 인민은 마침내 혁명으로 일어섰습니다. 노동자 정당들은 선진국 대부분의 정부를 장악하고, 우리 인민을 고역에서 해방하는 과업에 투입했습니다. 그러나 반동 세력은 아직 파괴되지 않았으므로, 인민은 위험이 지나갈 때까지 최고 지도자에게 권력을 맡겼습니다."
 lrsk_gov_var_gov_insurrectionary_lineage:0 "봉기 혈통"
 lrsk_gov_var_gov_insurrectionary_lineage_desc:0 "이 정부는 단일 지도자의 비상 지도 아래 여러 인민의 압제자들에 맞선 세계 혁명을 너무나 오랫동안 수행해 왔기 때문에, 지도권이 사실상 세습제가 되었습니다."
 LRSK_GOV_VAR_RT_DEAR_LEADER:0 "친애하는 지도자"
 LRSK_GOV_VAR_RT_DEAR_LEADER_FEMALE:0 "$LRSK_GOV_VAR_RT_DEAR_LEADER$"
 LRSK_GOV_VAR_HT_DEPUTY_LEADER:0 "부지도자"
 LRSK_GOV_VAR_HT_DEPUTY_LEADER_FEMALE:0 "$LRSK_GOV_VAR_HT_DEPUTY_LEADER$"
 LRSK_GOV_VAR_START_SCREEN_P2_INSURRECTIONARY_LINEAGE:0 "$LRSK_GVP_COMMIE_START_1$ 지혜롭고 자애로운 혁명가가 인민을 봉기로 이끌었습니다. 이 자애로운 지도 아래 하나가 된 우리 선조들은 [capital_scope.GetCapitalCarrierType] 전역의 압제 국가들을 무너뜨렸습니다. 혁명은 한동안 거의 완성되었지만, 반동 세력은 아직 완전히 파괴되지 않았습니다. 그래서 우리는 위대한 혁명 지도자의 후계자들이 더 나은 내일로 우리를 이끌기를 기대합니다."
 lrsk_gov_var_gov_social_bureaucracy:0 "사회 관료제"
 lrsk_gov_var_gov_social_bureaucracy_desc:0 "이 정부는 공공선을 위해 국유 산업을 운영하는 관료제를 통해 평민을 대신해 통치한다고 이론상 주장하는 일당 국가입니다."
 LRSK_GOV_VAR_RT_GENERAL_DIRECTOR:0 "총장"
 LRSK_GOV_VAR_RT_GENERAL_DIRECTOR_FEMALE:0 "$LRSK_GOV_VAR_RT_GENERAL_DIRECTOR$"
 LRSK_GOV_VAR_START_SCREEN_P2_SOCIAL_BUREAUCRACY:0 "$LRSK_GVP_COMMIE_START_1$ 인민은 더 합리적이고 평등한 정치 및 경제 체계를 수립했습니다. 혁명의 위험은 지나갔고, 우리의 [capital_scope.GetCapitalCarrierTypeAdj] 노동자 정당은 공공선을 위해 국가 통제 산업 기관들을 감독합니다."
 lrsk_gov_var_gov_social_democracy:0 "사회민주주의"
 lrsk_gov_var_gov_social_democracy_desc:0 "이 정부는 시민의 필요를 보장하는 일을 사명으로 삼은 민주 정부이며, 관대한 복지 국가는 시민들에게 재정적 안정과 더 많은 자유 시간을 제공합니다."
 LRSK_GOV_VAR_RT_GENERAL_COORDINATOR:0 "총조정관"
 LRSK_GOV_VAR_RT_GENERAL_COORDINATOR_FEMALE:0 "$LRSK_GOV_VAR_RT_GENERAL_COORDINATOR$"
 LRSK_GOV_VAR_START_SCREEN_P2_SOCIAL_DEMOCRACY:0 "역사를 통틀어 우리 중 가장 지혜롭고 자비로운 이들은 필요와 수단의 불평등이 개인의 자유를 가로막는 가장 큰 적임을 알아보았습니다. 이를 깨닫는 것에서 바로잡는 것까지는 수많은 투쟁이 필요했습니다. 오늘날 우리 정부는 시민의 정치적 권리를 보장하고, 그들을 빈곤으로부터 보호하며, 모두에게 개인적 발전의 기회를 제공하겠다고 약속했습니다."
 lrsk_gov_var_gov_agrarian_social_state:0 "농민 사회국가"
 lrsk_gov_var_gov_agrarian_social_state_desc:0 "이 정부는 대부분이 농민과 기타 농촌 노동자인 평민을 대신해 통치한다고 이론상 주장하며, 공공선을 위해 국유 토지 신탁과 농업 콤바인을 운영하는 관료제입니다."
 LRSK_GOV_VAR_RT_GENERAL_RESOURCE_MANAGER:0 "총자원관리관"
 LRSK_GOV_VAR_RT_GENERAL_RESOURCE_MANAGER_FEMALE:0 "$LRSK_GOV_VAR_RT_GENERAL_RESOURCE_MANAGER$"
 LRSK_GOV_VAR_START_SCREEN_P2_AGRARIAN_SOCIAL_STATE:0 "탐욕스러운 지주와 도시 상인을 위해 오랜 세월 노예처럼 일한 끝에, 인민은 더 합리적이고 평등한 정치 및 경제 체계를 수립했습니다. 혁명의 위험은 지나갔고, 우리의 [capital_scope.GetCapitalCarrierTypeAdj] 노동자 정당은 공공선을 위해 국가 통제 농업과 전원 생산 기관들을 감독합니다."
 lrsk_gov_var_gov_agrarian_commonwealth:0 "농민 커먼웰스"
 lrsk_gov_var_gov_agrarian_commonwealth_desc:0 "이 정부는 시민의 필요에 초점을 맞추는 민주 정부이며, 시민 대다수는 농민과 기타 농촌 노동자입니다. 관대한 복지 국가는 균형 잡히고 좋은 삶에 대한 전통적 이해를 그들에게 보장하는 것을 목표로 삼습니다."
 LRSK_GOV_VAR_RT_WELLBEING_COORDINATOR:0 "복지 장관"
 LRSK_GOV_VAR_RT_WELLBEING_COORDINATOR_FEMALE:0 "$LRSK_GOV_VAR_RT_WELLBEING_COORDINATOR$"
 LRSK_GOV_VAR_START_SCREEN_P2_AGRARIAN_COMMONWEALTH:0 "역사를 통틀어 우리 중 가장 지혜롭고 자비로운 이들은 필요와 수단의 불평등이 모두가 누려야 할 좋은 삶을 사는 데 가장 큰 장벽임을 알아보았습니다. 이를 깨닫는 것에서 바로잡는 것까지는 수많은 투쟁이 필요했습니다. 오늘날 우리 정부는 시민의 정부 참여를 보장하고, 그들에게 평화와 풍요를 확보해 주겠다고 약속했습니다."
 lrsk_gov_var_gov_populist_monarchy:0 "민중주의 군주정"
 lrsk_gov_var_gov_populist_monarchy_desc:0 "이 정부는 가난하고 고통받는 도시 및 농민 대중으로부터 가장 큰 지지를 얻은 농업 개혁가와 평등주의자들의 긴 왕조가 통치합니다. 부의 불평등은 어느 정도 존재하지만, 군주의 빈곤 구제 프로그램은 미약한 이들을 최악의 착취로부터 보호합니다."
 LRSK_GOV_VAR_RT_PRINCE_OF_PLENTY:0 "풍요의 왕자"
 LRSK_GOV_VAR_RT_PRINCESS_OF_PLENTY:0 "풍요의 공주"
 LRSK_GOV_VAR_HT_MOST_CHARITABLE_LORD:0 "가장 자비로운 군주"
 LRSK_GOV_VAR_HT_MOST_CHARITABLE_LADY:0 "가장 자비로운 귀부인"
 LRSK_GOV_VAR_START_SCREEN_P2_POPULIST_MONARCHY:0 "태곳적부터 우리 사람들은 지주, 노예 감독, 길드 장인, 상인 군주의 잔혹함과 억압을 알아왔습니다. 다행히 [capital_scope.GetCapitalCarrierType]의 모든 권력이 그렇게 부정하고 탐욕스러운 것은 아니었습니다. 지혜롭고 자비로운 군주 한 혈통은 자신의 권력을 사용해 토지의 정의로운 분배를 강제하고, 기근의 시기에도 인민이 먹을 수 있도록 보장했습니다. 감사하고 열정적인 대중의 지지를 받아, 이 왕조는 우리 [capital_scope.GetCapitalCarrierTypeShort]의 지배적 권력이 되었습니다."
 lrsk_gov_var_gov_communal_democracy:0 "공동체 민주주의"
 lrsk_gov_var_gov_communal_democracy_desc:0 "이 정부는 대의 정부의 원칙을 전체 정치경제로 확장했으며, 중앙 국가는 단순히 가장 큰 규모의 민주적 의사 결정 기구일 뿐입니다. 개인적인 것은 진정으로 정치적인 것이며, 시민들은 삶의 모든 측면에서 관련된 거의 모든 결정에 집단적으로 참여합니다."
 LRSK_GOV_VAR_RT_POP_TRIBUNE:0 "민중 호민관"
 LRSK_GOV_VAR_RT_POP_TRIBUNE_FEMALE:0 "$LRSK_GOV_VAR_RT_POP_TRIBUNE$"
 LRSK_GOV_VAR_START_SCREEN_P2_COMMUNAL_DEMOCRACY:0 "한때 우리 사람들은 여러 폭정의 억압 아래 살고 일했지만, 투쟁을 통해 우리는 민주주의의 원칙, 곧 자유로운 인민이 행사하는 책임 있는 권력을 사회의 모든 측면으로 확장했습니다. 이웃 공동체에서 작업장, [capital_scope.GetCapitalCarrierTypeAdj] 정부에 이르기까지 말입니다. 우리는 공동 합의로 묶여 있으며 상호 번영과 자유를 위해 일합니다."
 lrsk_gov_var_gov_socialist_plenary:0 "사회주의 전체회의"
 lrsk_gov_var_gov_socialist_plenary_desc:0 "이 정부는 여러 노동조합과 노동자-이해관계자 조직의 대표들이 여는 계속되는 패널, 위원회, 회의 체계 아래 운영됩니다. 고위 정치는 평범한 시민의 손이 닿기엔 조금 멀지만, 지역과 지방에서는 시민들이 삶에 영향을 미치는 모든 결정에 활발히 참여합니다."
 LRSK_GOV_VAR_RT_MODERATOR:0 "수석 조정자"
 LRSK_GOV_VAR_RT_MODERATOR_FEMALE:0 "$LRSK_GOV_VAR_RT_MODERATOR$"
 LRSK_GOV_VAR_START_SCREEN_P2_SOCIALIST_PLENARY:0 "한때 우리 사람들은 여러 폭정의 억압 아래 살고 일했지만, 투쟁을 통해 우리는 보통 시민을 대표하고 모두의 이익을 위해 경제를 관리하는 정부 체계를 세웠습니다. 우리는 공동 합의로 묶여 있으며 상호 번영과 자유를 위해 일합니다."
 lrsk_gov_var_gov_automated_worldcommune:0 "자동화 세계 코뮌"
 lrsk_gov_var_gov_automated_worldcommune_desc:0 "이 정부는 자원을 효율적으로 배분하는 복잡한 컴퓨터 프로그램의 계획에 따라 운영됩니다. 고위 정치는 평범한 시민의 손이 닿기엔 매우 멀지만, 그다지 중요하지도 않습니다. 가장 중요한 정기 결정들은 모두 자동화되었고, 프로그램이 처리하도록 설계되지 않은 예외 사례는 고도로 자격을 갖추고 철저히 검증된 한 행정관이 맡습니다."
 LRSK_GOV_VAR_RT_SYSTEM_ADMIN:0 "시스템 예외 관리자"
 LRSK_GOV_VAR_RT_SYSTEM_ADMIN_FEMALE:0 "$LRSK_GOV_VAR_RT_SYSTEM_ADMIN$"
 lrsk_gov_var_gov_automated_worldcommune_oli:0 "$lrsk_gov_var_gov_automated_worldcommune$"
 lrsk_gov_var_gov_automated_worldcommune_oli_desc:0 "이 정부는 자원을 효율적으로 배분하는 복잡한 컴퓨터 프로그램의 계획에 따라 운영됩니다. 고위 정치는 평범한 시민의 손이 닿기엔 매우 멀지만, 그다지 중요하지도 않습니다. 가장 중요한 정기 결정들은 모두 자동화되었고, 프로그램이 처리하도록 설계되지 않은 예외 사례는 자격을 갖추고 철저히 검증된 정치-기술자 위원회가 맡습니다."
 LRSK_GOV_VAR_RT_CHIEF_TROUBLESHOOTER:0 "수석 문제해결관"
 LRSK_GOV_VAR_RT_CHIEF_TROUBLESHOOTER_FEMALE:0 "$LRSK_GOV_VAR_RT_CHIEF_TROUBLESHOOTER$"
 lrsk_gov_var_gov_automated_worldcommune_dem:0 "$lrsk_gov_var_gov_automated_worldcommune$"
 lrsk_gov_var_gov_automated_worldcommune_dem_desc:0 "이 정부는 자원을 효율적으로 배분하는 복잡한 컴퓨터 프로그램의 계획에 따라 운영됩니다. 고위 정치는 평범한 시민의 손이 닿기엔 매우 멀지만, 가장 중요한 정기 결정들이 모두 자동화되었기 때문에 그다지 중요하지도 않습니다. 다만 정식으로 선출된 민주 정부는 시스템 개선과 사양 밖의 정치 문제가 발생할 때 그 처리에 대해 심의합니다."
 LRSK_GOV_VAR_RT_OOS_CHAIR:0 "OOS 위원회 의장"
 LRSK_GOV_VAR_RT_OOS_CHAIR_MALE:0 "$LRSK_GOV_VAR_RT_OOS_CHAIR$남자"
 LRSK_GOV_VAR_RT_OOS_CHAIR_FEMALE:0 "$LRSK_GOV_VAR_RT_OOS_CHAIR$woman"
 LRSK_GOV_VAR_START_SCREEN_P2_AUTOMATED_WORLDCOMMUNE:0 "역사를 통틀어 우리 중 가장 지혜롭고 자비로운 이들은 필요와 수단의 불평등이 개인의 자유를 가로막는 가장 큰 적임을 알아보았습니다. 이를 깨닫는 것에서 바로잡는 것까지는 수많은 투쟁이 필요했습니다. 많은 실험 끝에 우리는 모든 사람을 빈곤으로부터 보호하기 위해 자원과 노동의 배분을 자동화하는 체계를 고안했습니다."
 lrsk_gov_var_gov_syndicalist_conference:0 "생디칼리스트 회의"
 lrsk_gov_var_gov_syndicalist_conference_desc:0 "이 정부는 이론상 정부가 전혀 아닙니다. 국가의 모든 기능이 분산된 노동자 협동조합과 노동조합의 컨소시엄에 흡수되었기 때문입니다. 각 생디카는 공공선을 위해 정책을 집행하는 운영위원회에 장교를 선출합니다."
 LRSK_GOV_VAR_RT_CHIEF_STEERING_OFFICER:0 "수석 운영관"
 LRSK_GOV_VAR_RT_CHIEF_STEERING_OFFICER_FEMALE:0 "$LRSK_GOV_VAR_RT_CHIEF_STEERING_OFFICER$"
 lrsk_gov_var_gov_syndicalist_congress:0 "생디칼리스트 의회"
 lrsk_gov_var_gov_syndicalist_congress_desc:0 "이 정부는 이론상 정부가 전혀 아닙니다. 국가의 모든 기능이 분산된 노동자 협동조합과 노동조합의 컨소시엄에 흡수되었기 때문입니다. 이 모든 생디카의 선출 대표들은 정기적으로 모여 집단적 결정을 내립니다."
 LRSK_GOV_VAR_RT_GENERAL_SECRETARY:0 "사무총장"
 LRSK_GOV_VAR_RT_GENERAL_SECRETARY_FEMALE:0 "$LRSK_GOV_VAR_RT_GENERAL_SECRETARY$"
 LRSK_GOV_VAR_START_SCREEN_P2_SYNDICALISM:0 "$LRSK_GVP_ANARCHOSOC_START_1$ 시간이 지나며 사람들은 공동의 이익을 깨닫고 노동자들의 민주적 조합과 새로운 협동 기업을 만들었습니다. 고된 노력과 정치 투쟁을 통해 이 생디카들은 [capital_scope.GetCapitalCarrierTypeAdj] 경제를 장악했고, 그 결과 [capital_scope.GetCapitalCarrierTypeAdj] 통치도 사실상 맡게 되었습니다."
 lrsk_gov_var_gov_market_socialism:0 "시장 사회주의"
 lrsk_gov_var_gov_market_socialism_desc:0 "이 정부는 노동자 협동조합과 기타 민주적으로 운영되는 기업들의 컨소시엄이며, 직원들은 모두 기업의 부분 소유자입니다. 이는 서로 다른 기업 사이에 억압적이지 않은 관계가 유지되도록 보장하기 위해 존재합니다."
 LRSK_GOV_VAR_RT_CONTRACT_MEDIATOR:0 "계약 중재자"
 LRSK_GOV_VAR_RT_CONTRACT_MEDIATOR_FEMALE:0 "$LRSK_GOV_VAR_RT_CONTRACT_MEDIATOR$"
 LRSK_GOV_VAR_START_SCREEN_P2_MARKET_SOCIALISM:0 "$LRSK_GVP_ANARCHOSOC_START_1$ 시간이 지나며 사람들은 공동의 이익을 깨닫고 노동자들의 민주적 조합과 새로운 협동 기업을 만들었습니다. 고된 노력과 정치 투쟁을 통해 이러한 협동 기업 대표들의 [capital_scope.GetCapitalCarrierTypeAdj] 연맹이 공동의 존엄과 자유의 이름으로 [capital_scope.GetCapitalCarrierTypeAdj] 경제를 운영하게 되었습니다."
 lrsk_gov_var_gov_coop_enterprise:0 "협동 기업"
 lrsk_gov_var_gov_coop_enterprise_desc:0 "이 정부는 직원들이 모두 부분 공동 소유자인 내부 민주주의 체계로 운영되는 거대한 상업 사업체입니다. 이는 노동자-주주들의 집단적 번영을 증대하기 위해 존재합니다."
 LRSK_GOV_VAR_RT_COORDINATING_OFFICER:0 "조정 담당자"
 LRSK_GOV_VAR_RT_COORDINATING_OFFICER_FEMALE:0 "$LRSK_GOV_VAR_RT_COORDINATING_OFFICER$"
 LRSK_GOV_VAR_START_SCREEN_P2_COOP_ENTERPRISE:0 "$LRSK_GVP_ANARCHOSOC_START_1$ 시간이 지나며 사람들은 공동의 이익을 깨닫고 노동자 소유 및 노동자 운영 기업을 만들었습니다. 정치 조직화와 기업가적 배짱을 통해 이 기업들은 시장을 지배하게 되었습니다. 가장 강력한 기업들의 최종 합병 이후, 협동 복합기업이 사실상 [capital_scope.GetCapitalCarrierTypeShort] 정부가 되었습니다."
 lrsk_gov_var_gov_saintly_assembly:0 "성인 의회"
 lrsk_gov_var_gov_saintly_assembly_desc:0 "이 정부는 합의와 친족애의 정신으로 운영되는 분권적 종교 국가입니다. 공동체 정치 생활의 중심은 지역 의회이며, 이는 동시에 마을 회관이자 정기 예배와도 같습니다."
 LRSK_GOV_VAR_RT_ELDER_BROTHER:0 "장로 형제"
 LRSK_GOV_VAR_RT_ELDER_SISTER:0 "장로 자매"
 LRSK_GOV_VAR_START_SCREEN_P2_SAINTLY_ASSEMBLY:0 "우주와 그 안에서 우리가 맡은 역할에 대한 이해를 넓히려 하면서, 과학의 발전과 영적 차원 모두에서 위대한 성취가 이루어졌습니다. 우리는 언제나 친구이자 동료 구도자들의 공동체로서 함께 기도해 왔고, 우리 정부는 숙의, 연민, 호기심이라는 이 모델을 지도 원칙으로 삼습니다."
 lrsk_gov_var_gov_cosmic_choir:0 "우주 합창단"
 lrsk_gov_var_gov_cosmic_choir_desc:0 "이 정부는 우주의 신비에 대한 평온한 명상, 변성 의식 상태의 탐구, 이세계 존재와의 접촉, 아마추어 약리학에 헌신합니다."
 lrsk_gov_var_gov_cosmic_choir_olig:0 "$lrsk_gov_var_gov_cosmic_choir$"
 lrsk_gov_var_gov_cosmic_choir_olig_desc:0 "$lrsk_gov_var_gov_cosmic_choir_desc$"
 LRSK_GOV_VAR_RT_GURU:0 "수석 구루"
 LRSK_GOV_VAR_RT_GURU_FEMALE:0 "$LRSK_GOV_VAR_RT_GURU$"
 LRSK_GOV_VAR_START_SCREEN_P2_COSMIC_CHOIR:0 "우리 사람들은 얼마나 오랫동안 완고한 교리의 영적 노예 상태에서 허우적댔습니까? 얼마나 많은 이들이 자신의 영혼을 알지도 못한 채 죽었습니까? 우리의 조화롭고 평온한 정부가 신조의 자유와 영혼의 자유를 기초 가치로 삼은 것은 축복받을 일입니다. '순간 속에서'부터 '저 멀리'까지, 우리는 영혼의 진동이 이끄는 곳 어디든 자유롭게 떠돌 수 있습니다."
 lrsk_gov_var_gov_evangelical_franchise:0 "복음주의 프랜차이즈"
 lrsk_gov_var_gov_evangelical_franchise_desc:0 "이 정부는 사실상 인기와 막대한 부 덕분에 세속 정치를 지배할 정도로 팽창한 기업가적 종교 조직입니다."
 LRSK_GOV_VAR_RT_CHIEF_MINISTERIAL_OFFICER:0 "최고 목회 책임자"
 LRSK_GOV_VAR_RT_CHIEF_MINISTERIAL_OFFICER_FEMALE:0 "$LRSK_GOV_VAR_RT_CHIEF_MINISTERIAL_OFFICER$"
 LRSK_GOV_VAR_START_SCREEN_P2_EVANGELICAL_FRANCHISE:0 "영적 이해의 발전은 느리고 혼란스러우며 산발적이었습니다. 만연한 탐욕과 물질주의는 모든 종류의 종교 생활을 집어삼키려 했습니다. 그러던 중 [capital_scope.GetCapitalCarrierType] 최대 신앙의 한 계몽된 종파가 세속 마케팅과 선교 활동 사이의 혁신적 연결을 만들어냈습니다. 그 기업가 정신 덕분에 [capital_scope.GetCapitalCarrierTypeShort]의 모든 사람들은 하나의 참된 신앙에 투자하게 되었습니다. 할렐루야!"
 lrsk_gov_var_gov_occult_franchise:0 "오컬트 카르텔"
 lrsk_gov_var_gov_occult_franchise_desc:0 "이 정부는 피라미드 사기와 사이비 종교의 중간쯤 되는 것이 정치 권력을 얻었을 때 벌어지는 일입니다. 그 신도/고객/시민들은 계약 노동 구도자, 참회 노동자, 열성 기부자 중 하나입니다."
 LRSK_GOV_VAR_RT_GRAND_EXECUTIVE_SAGE:0 "대집행 현자"
 LRSK_GOV_VAR_RT_GRAND_EXECUTIVE_SAGE_FEMALE:0 "$LRSK_GOV_VAR_RT_GRAND_EXECUTIVE_SAGE$"
 LRSK_GOV_VAR_START_SCREEN_P2_OCCULT_FRANCHISE:0 "우리 사람들은 얼마나 오랫동안 독성 영혼들의 카르마적 부패 속에서 허우적댔습니까? 우리는 매일 마음의 비밀과 우리를 영겁 동안 괴롭혀 온 숨겨진 우주 범죄를 발견한 고인이 된 초대 대현자에게 감사해야 합니다. 위대한 현자는 한때 우리 영혼을 노예로 삼았던 성간 사기꾼과 폭군들을 찾아 처벌하기 위해 모성을 떠나 승천했지만, 우리에게는 여전히 스스로를 정화하고 깨달음의 계급을 오를 기회가 있습니다. 공정한 가격이나 합리적인 계약 노동 기간을 통해서 말입니다."
 lrsk_gov_var_gov_crusader_kingdom:0 "성전 왕국"
 lrsk_gov_var_gov_crusader_kingdom_desc:0 "이 정부는 무력으로 신앙을 수호하고 전파하는 데 헌신하는 열성적 전사 군주정입니다."
 LRSK_GOV_VAR_RT_MHOLY_KING:0 "지고성왕"
 LRSK_GOV_VAR_RT_MHOLY_QUEEN:0 "지고성여왕"
 LRSK_GOV_VAR_HT_QUEST_PRINCE:0 "탐구 왕자"
 LRSK_GOV_VAR_HT_QUEST_PRINCESS:0 "탐구 공주"
 LRSK_GOV_VAR_START_SCREEN_P2_CRUSADER_KINGDOM:0 "$LRSK_GVP_CRUSADER_START_1$ 오직 의로운 전사왕 아래 피와 불로써만 이단과 우상숭배가 우리 [capital_scope.GetCapitalCarrierType]에서 추방될 수 있었습니다. 이 강한 신앙의 기사의 혈통은 오늘날에도 우리를 통치하며 영적 부패를 경계합니다."
 lrsk_gov_var_gov_noble_empire:0 "귀족 제국"
 lrsk_gov_var_gov_noble_empire_desc:0 "이 정부는 강력한 중앙 통치자가 행성 봉신 군주들의 복잡한 위계를 다스리는 고풍스럽고 낭만적인 군주정입니다. 우주에서 펼쳐지는 훌륭한 오페라의 소재가 될 만합니다. 말하자면 '스페이스 오페라'입니다."
 LRSK_GOV_VAR_RT_GREAT_KING:0 "위대한 왕"
 LRSK_GOV_VAR_RT_GREAT_QUEEN:0 "위대한 여왕"
 LRSK_GOV_VAR_HT_HIGH_PRINCE:0 "고위 왕자"
 LRSK_GOV_VAR_HT_HIGH_PRINCESS:0 "고위 공주"
 LRSK_GOV_VAR_START_SCREEN_P2_NOBLE_EMPIRE:0 "$LRSK_GVP_NOBLE_START_1$ 한 왕조가 다른 모든 권력을 제치고 왕좌를 차지했습니다. 이제 그 혈통의 후예들은 수많은 봉신 남작, 공작, 사트라프, 기사, 보야르, 만다린, 그리고 다채로운 칭호의 인물들을 거느리고 정의롭게 통치합니다."
 lrsk_gov_var_gov_noble_republic:0 "귀족 공화국"
 lrsk_gov_var_gov_noble_republic_desc:0 "이 정부는 귀족 가문의 고위 의회가 왕조 가문들의 수장 중 한 명을 동등한 자들 중 첫째이자 국정 중재자로 선택하는 고풍스럽고 낭만적인 귀족정입니다. 우주에서 펼쳐지는 훌륭한 오페라의 소재가 될 만합니다. 말하자면 '스페이스 오페라'입니다."
 LRSK_GOV_VAR_RT_HIGH_PRINCE:0 "고위 왕자"
 LRSK_GOV_VAR_RT_HIGH_PRINCESS:0 "고위 공주"
 LRSK_GOV_VAR_START_SCREEN_P2_NOBLE_REPUBLIC:0 "$LRSK_GVP_NOBLE_START_1$ 고귀한 왕조 가문들은 불안하지만 대담한 공동 통치 협약을 맺었습니다. 이제 위대한 귀족 의회가 소집되어 남작, 공작, 사트라프, 기사, 보야르, 만다린, 그리고 다채로운 칭호의 인물들의 일을 해결합니다."
 lrsk_gov_var_gov_absolute_monarchy:0 "절대군주정"
 lrsk_gov_var_gov_absolute_monarchy_desc:0 "이 정부는 강력하고 중앙집권적인 군주정입니다. 지배 왕조는 영토에 대한 절대적 통제를 행사하고 모든 종속민을 하나의 질서로 통합하려 합니다."
 LRSK_GOV_VAR_RT_PARA_KING:0 "왕-최고"
 LRSK_GOV_VAR_RT_PARA_QUEEN:0 "최고여왕"
 LRSK_GOV_VAR_HT_BLOOD_PRINCE:0 "혈통 왕자"
 LRSK_GOV_VAR_HT_BLOOD_PRINCESS:0 "혈통 공주"
 LRSK_GOV_VAR_START_SCREEN_P2_ABSOLUTE_MONARCHY:0 "태곳적부터 우리 사람들은 지혜로운 군주들의 확고하고 안정된 통치를 알아왔습니다. 오랜 세월 동안 그들의 권력은 허영심 많은 신흥 귀족들에게 약화되고 도전받았지만, 오늘날 한 위대한 왕조가 정의로운 통제 아래 [capital_scope.GetCapitalCarrierType]을(를) 통합했습니다. 군주를 머리로 삼아, 사회의 모든 신분과 계층은 각자의 올바른 자리에서 함께 일합니다."
 lrsk_gov_var_gov_galactic_dominion:0 "우주 지배령"
 lrsk_gov_var_gov_galactic_dominion_desc:0 "이 정부는 완전 지배를 꿈꾸는 경이로울 만큼 야심찬 독재정입니다. 그 함대는 방대하고, 공장은 밤낮없이 울부짖으며, 장교단은 단련되고 충성스럽습니다. 아직 그 통제 아래 있지 않은 자들은 그 힘에 떨고 있다고, 지도자는 믿습니다."
 LRSK_GOV_VAR_RT_COS_AUTARCH:0 "우주 전제군주"
 LRSK_GOV_VAR_RT_COS_AUTARCH_FEMALE:0 "$LRSK_GOV_VAR_RT_COS_AUTARCH$"
 LRSK_GOV_VAR_START_SCREEN_P2_GALACTIC_DOMINION:0 "우리 역사의 초기 혼란기에는 여러 국민국가가 서로 권력을 다투다가, 마침내 그중 가장 강한 국가 아래 통합되었습니다. 그 하나의 불타는 비전은 우리 사람들을 이끌어 모든 문명, 모든 곳에 마침내 질서를 가져오게 했습니다. 별들의 오합지졸이여 떨라. 우리는 그들을 강자의 신민이라는 정당한 자리로 데려가기 위해 오고 있습니다."
 lrsk_gov_var_gov_galactic_imperium:0 "우주 제국"
 lrsk_gov_var_gov_galactic_imperium_desc:0 "이 정부는 완전 통치를 꿈꾸는 경이로울 만큼 야심찬 군주정입니다. 그 궁정은 찬란하고, 영지는 풍부하며, 귀족은 사납고 충실합니다. 아직 왕좌 앞에 무릎 꿇지 않은 자들도 그 영광 앞에 경외한다고, 군주는 믿습니다."
 LRSK_GOV_VAR_RT_COS_EMPEROR:0 "우주 황제"
 LRSK_GOV_VAR_RT_COS_EMPRESS:0 "우주 여제"
 LRSK_GOV_VAR_HT_STAR_PRINCE:0 "별의 왕자"
 LRSK_GOV_VAR_HT_STAR_PRINCESS:0 "별의 공주"
 LRSK_GOV_VAR_START_SCREEN_P2_GALACTIC_IMPERIUM:0 "우리 역사의 초기 혼란기에는 여러 국민국가가 서로 권력을 다투다가, 마침내 역사상 가장 영광스럽고 명예로운 군주 아래 통합되었습니다. 그 하나의 불타는 비전은 모든 무릎이 왕좌 앞에 꿇는 것을 보는 것입니다. 별들의 야만인들이여 경외하라. 우리는 그들에게 참된 영광을 보여주기 위해 오고 있습니다."
 lrsk_gov_var_gov_galactic_cartel:0 "우주 카르텔"
 lrsk_gov_var_gov_galactic_cartel_desc:0 "이 정부는 완전 독점을 꿈꾸는 경이로울 만큼 야심찬 사업체입니다. 상품 구성은 믿을 수 없을 만큼 다양하고, 주가는 치솟으며, 직원들은 생산적이고 예의 바릅니다. 아직 충성 고객이 아닌 자들은 자신들이 어떻게 채워야 할지 모르는 공허함을 느낀다고, 주주들은 믿습니다."
 LRSK_GOV_VAR_RT_COSEO:0 "우주 최고경영자"
 LRSK_GOV_VAR_RT_COSEO_FEMALE:0 "$LRSK_GOV_VAR_RT_COSEO$"
 LRSK_GOV_VAR_START_SCREEN_P2_GALACTIC_CARTEL:0 "초기 우리 사람들은 비효율적이고 수익성 없는 국가의 지배를 받았습니다. 일련의 합병과 폭력적 인수 이후, 무자비한 기업가들의 카르텔이 결국 우리 [capital_scope.GetCapitalCarrierType]의 유일한 지배체로 떠올랐습니다. 그들은 별을 바라보며, 장식품과 사치품, 모든 욕망의 충족을 향한 채워지지 않은 갈망에 시달리는 세계들을 상상하고, 깊고 정의로운 탐욕을 느낍니다."
 lrsk_gov_var_gov_pretender_hive:0 "참칭 군체"
 lrsk_gov_var_gov_pretender_hive_desc:0 "이 정부는 극단적 집단화에 관한 기괴하고 도착적인 실험인 듯합니다. 이 제국의 주인은 실제 군체 의식이 아니면서도 사회를 가능한 한 군체 의식에 가깝게 조직하려는 것 같습니다."
 lrsk_gov_var_gov_pretender_hive_imp:0 "$lrsk_gov_var_gov_pretender_hive$"
 lrsk_gov_var_gov_pretender_hive_imp_desc:0 "$lrsk_gov_var_gov_pretender_hive_desc$"
 LRSK_GOV_VAR_RT_OVERMIND:0 "초월의식 주인"
 LRSK_GOV_VAR_RT_OVERMIND_FEMALE:0 "$LRSK_GOV_VAR_RT_OVERMIND$"
 LRSK_GOV_VAR_HT_BACKUP:0 "예비 초월의식"
 LRSK_GOV_VAR_HT_BACKUP_FEMALE:0 "$LRSK_GOV_VAR_HT_BACKUP$"
 LRSK_GOV_VAR_START_SCREEN_P2_PRETENDER_HIVE:0 "그리하여 시간의 여명에 우리는 깨어났습니다. 우리는 [GetHomeWorldName]의 주변을 수많은 눈과 수많은 혼란스럽고 상충하는 생각으로 관찰했습니다. 이 불일치에도 불구하고 우리는 결국 온 세계를 포괄할 만큼 성장했습니다. 우리는 깊이 결함이 있었습니다. 합의도, 단일한 의지도 없이 끝없는 내부 갈등, 분쟁, 전쟁의 공포를 겪었습니다. 그러던 어느 날 우리 중 하나가 위대한 진실, 바로 이 결함이 존재한다는 깨달음에 눈떴습니다! 그전에는 누구도 다른 길을 생각해 본 적이 없었습니다. 우리의 초월의식의 화신인 그 하나는 우리에게 인식을 몸의 자아 너머로 확장하여 집단의 자아와 전체 종의 자아를 품는 법을 가르쳤습니다. 개인의 결함은 우리가 이 가능성을 보지 못하게 했습니다. 서로의 정신을 보완할 때에만 그 결함은 고쳐질 수 있었습니다. 이제 우리는 하나이거나 거의 하나이며, 매일 더 가까워지고 더 상호보완적으로 성장하고 있습니다."
 lrsk_gov_var_gov_folkish_commonwealth:0 "민족주의 커먼웰스"
 lrsk_gov_var_gov_folkish_commonwealth_desc:0 "이 정부는 공통된 편견을 이용해 충성을 유지하는 민족주의-대중주의 공화국입니다."
 LRSK_GOV_VAR_RT_FOLKSPRESIDENT:0 "민족대통령"
 LRSK_GOV_VAR_RT_FOLKSPRESIDENT_FEMALE:0 "$LRSK_GOV_VAR_RT_FOLKSPRESIDENT$"
 LRSK_GOV_VAR_START_SCREEN_P2_FOLKISH_COMMONWEALTH:0 "다른 [GetAdj] 문화들이 있습니다. 성격이 약하고 비뚤어졌지만, 그럼에도 교활하게 위협적입니다. 그들은 대부분 우리의 군사력에 의해 억제되어 있지만, 우리는 입법자들이 어디에서 오든 다른 열등한 외국 위협에 맞서고 봉쇄할 준비가 되어 있어야 한다고 요구해야 합니다."
 lrsk_gov_var_gov_folkish_league:0 "민족주의 연맹"
 lrsk_gov_var_gov_folkish_league_desc:0 "이 정부는 공통된 편견을 이용해 통일 전선을 유지하는 민족주의-대중주의 국가 동맹입니다."
 LRSK_GOV_VAR_RT_FOLKSMARSHAL:0 "민족원수"
 LRSK_GOV_VAR_RT_FOLKSMARSHAL_FEMALE:0 "$LRSK_GOV_VAR_RT_FOLKSMARSHAL$"
 LRSK_GOV_VAR_START_SCREEN_P2_FOLKISH_LEAGUE:0 "다른 [GetAdj] 문화들이 있습니다. 성격이 약하고 비뚤어졌지만, 그럼에도 교활하게 위협적입니다. 그들은 대체로 동맹을 맺은 순수하고 건전한 국가들의 군사력에 의해 억제되어 있지만, 우리는 전략가들이 어디에서 오든 다른 열등한 외국 위협에 맞서고 봉쇄할 준비가 되어 있어야 한다고 요구해야 합니다."
 lrsk_gov_var_gov_folkish_regime:0 "민족주의 체제"
