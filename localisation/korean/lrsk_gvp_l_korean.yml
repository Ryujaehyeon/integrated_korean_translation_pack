 job_lrsk_gov_var_job_pastor:0 "목사"
 job_lrsk_gov_var_job_pastor_plural:0 "$job_lrsk_gov_var_job_pastor$s"
 job_lrsk_gov_var_job_pastor_desc:0 "공동체에서 선출된 성직자인 이 영적 지도자들은 지역 신앙 고백의 필요를 섬깁니다."
