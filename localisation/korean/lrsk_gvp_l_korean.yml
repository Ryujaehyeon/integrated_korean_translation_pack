 job_lrsk_gov_var_job_investigator:0 "조사관"
 job_lrsk_gov_var_job_investigator_plural:0 "$job_lrsk_gov_var_job_investigator$s"
 job_lrsk_gov_var_job_investigator_desc:0 "민간인, 기업, 심지어 정부에게 고용되어 원치 않는 은밀한 행동을 찾아내고 폭로할 수 있는 탐정들입니다. 고객 요청 시 트렌치코트와 파이프 담배를 장착할 수 있습니다."
 job_lrsk_gov_var_job_investigator_effect_desc:0 "£job_lrsk_gov_var_job_investigator£ $job_lrsk_gov_var_job_investigator_plural$는 $type_crime$을 감소시키고, £political_power£ §Y정치력§! of $WORKERS$도 감소시킵니다."
 mod_job_lrsk_gov_var_job_investigator_add:0 "$job_lrsk_gov_var_job_investigator$ 직업"
