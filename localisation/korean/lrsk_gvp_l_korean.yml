 mod_job_lrsk_gvp_job_civic_leader_per_pop_short:0 "\n\n§G+1§! £mod_job_lrsk_gvp_job_civic_leader_add£당 $VALUE$ £pop£"
 edict_lrsk_gvp_citschol:0 "시민 학술 장려"
 edict_lrsk_gvp_citschol_desc:0 "우리는 시민들이 지적 관심사를 추구하고 이를 통해 공동체를 풍요롭게 할 수 있도록 해야 합니다."
 edict_lrsk_gvp_citschol_tooltip:0 "행성에 $edict_lrsk_gvp_citschol_effects_common$을(를) 부여합니다."
 edict_lrsk_gvp_citschol_no_suitable_planets:0 "§R이 효과는 £pop£ §Y팝§R 15명당 직업 1개를 제공하므로, 어떤 행성에도 £pop£ §Y팝§R이 최소 15명 이상 없다면 효과가 없습니다.§!"
 edict_lrsk_gvp_citschol_effects_common:0 "§Y1§!개의 £job_lrsk_gvp_job_citscholar£ ['concept_lrsk_gvp_citscholar'] 직업을 §Y15§! £pop£ §Y팝§!당 추가합니다."
 edict_lrsk_gvp_royjustice:0 "정의 선포"
 edict_lrsk_gvp_royjustice_desc:0 "왕국 전역에 더 잘 정의를 집행하기 위해, 우리의 주권 군주는 성대한 의식을 소집할 것입니다. 법 집행에 관여하는 모든 법률가와 치안판사는 반드시 참석해야 합니다. 이 의식에서 군주는 제국의 통치 관행에 대한 전면적인 개정을 선포할 것입니다."
 edict_lrsk_gvp_royjustice_tooltip:0 "이 시행령은 $edict_lrsk_gvp_royjustice_effects_common$ (새 통치자가 권력을 잡으면 이전 효과가 종료되고 이 시행령을 다시 사용할 수 있습니다.)"
 edict_lrsk_gvp_royjustice_effects_common:0 "플레이어에게 제국 통치에 관한 여러 효과 중 하나를 선택하게 합니다."
 edict_lrsk_gvp_royjustice_no_cooldown:0 "§R이 시행령으로 재사용 대기시간을 끝낼 수 있는 정책이 최소 하나는 재사용 대기 중이어야 합니다.§!"
 edict_lrsk_gvp_royjustice_15_years:0 "§R이 시행령은 15년에 한 번만 사용할 수 있습니다.§!"
 decision_lrsk_gov_var_rra:0 "재귀 감사 실행"
 decision_lrsk_gov_var_rra_desc:0 "행성의 지역 행정 서브루틴에 일시적으로 준자율 처리 능력을 부여하여, 생산성에 영향을 미치는 최근 행성 요인을 전면적으로 점검, 목록화, 분석하고 지역 운영을 다시 최적화하게 합니다."
 decision_lrsk_gov_var_rra_effects:0 "여러 £job_lrsk_gov_var_job_regional_coordinator£ ['concept_lrsk_gvp_regional_coordinators']를 추가합니다. 이전 감사 결과를 제거합니다.\n\n1년 후 감사가 종료되며 행성의 물류 체계가 향상될 것입니다. \n\n§H참고:§! 이 행성의 생산이 더 특화되어 있을수록 유용한 결과가 나올 가능성이 높아집니다!"
 lrsk_gvp_rra_fail_cooldown_planet:0 "£trigger_no£ §R10년§!을 기다려야 §Y[this.GetName]§!에서 다른 감사를 실행할 수 있습니다."
 lrsk_gvp_rra_fail_cooldown_empire:0 "£trigger_no£ §Y[this.owner.GetName]§!은(는) 자신의 식민지 중 하나에서 다른 감사를 실행하기 전에 §R5년§!을 기다려야 합니다."
 decision_lrsk_gvp_work_allocation_plan:0 "노동 배분 계획"
 decision_lrsk_gvp_work_allocation_plan_desc:0 "높은 실업률 때문에, 행성 정부는 실업 중인 주민들이 일자리를 찾도록 장려하는 계획을 설계하고 시행하며 지속적으로 개선합니다. 그 일자리가 이 행성에 있든 다른 곳에 있든 상관없습니다. 이는 지역 경제에 어느 정도 유감스러운 영향을 줄 것입니다."
 decision_lrsk_gvp_work_allocation_plan_effects:0 "§H$lrsk_gvp_statmod_work_plan$§! 보정치를 추가하여, $lrsk_gvp_statmod_work_plan_effects_common$ 효과를 제공합니다."
 decision_lrsk_gvp_end_work_allocation_plan:0 "노동 배분 계획 종료"
 decision_lrsk_gvp_end_work_allocation_plan_desc:0 "행성 고용 수준이 만족스러워졌으므로, 실업 완화 계획을 종료할 수 있습니다."
 decision_lrsk_gvp_end_work_allocation_plan_effects:0 "§H$lrsk_gvp_statmod_work_plan$§! 보정치를 제거하여, $lrsk_gvp_statmod_work_plan_effects_common$ 효과를 종료합니다."
 decision_lrsk_gov_var_charter_col:0 "식민 회사 인가"
 decision_lrsk_gov_var_charter_col_desc:0 "이 행성을 수도로 삼는 새로운 식민 회사를 종속 제국으로 인가합니다."
 decision_lrsk_gov_var_charter_col_effects:0 "[this.GetName]은(는) 새로운 §H$preset_lrsk_gov_var_subject_chartered_company$§!의 수도 행성이 되며, 다음 효과를 받습니다: $preset_lrsk_gvp_vassal_prospector_eff$\n이 제국은 당신 제국과 같은 윤리관 및 주 종족을 가집니다."
 lrsk_gov_var_empire_endisnigh:0 "종말이 가까웠다"
 lrsk_gov_var_empire_endisnigh_desc:0 "종말론 광신도들이 날뛰고 있습니다. 이유는... 뭐, 알잖습니까. 그들이 틀렸다는 것을 증명해야 합니다!"
 lrsk_gov_var_empire_enlightened:0 "계몽"
 lrsk_gov_var_empire_enlightened_desc:0 "이 제국은 외계의 후견을 통해 소통과 발견에 적극적인 태도를 갖게 되었습니다."
 lrsk_gov_var_empire_enlightened_hive:0 "승리를 위한 조율"
 lrsk_gov_var_empire_enlightened_hive_desc:0 "이 군체의식은 은하의 다른 사회를 상대하는 데 필요한 모든 이점을 얻도록 세심하게 훈련되었습니다."
 lrsk_gov_var_empire_enlightened_mech:0 "호기심 프로토콜"
 lrsk_gov_var_empire_enlightened_mech_desc:0 "이 기계 지성은 우주에 관한 새로운 데이터를 수집하도록 운용 휴리스틱이 최적화되었습니다."
 LRSK_GOV_VAR_EMPIRE_CYCLE_COMMON:0 ", 우리의 후견자가 우리 민족의 발전을 촉진하기 위해 간섭했던 방식을 본뜬 것입니다."
 lrsk_gov_var_empire_uplift_cycle:0 "지성화의 순환"
 lrsk_gov_var_empire_uplift_cycle_desc:0 "우리는 한 종족을 지성으로 끌어올렸습니다$LRSK_GOV_VAR_EMPIRE_CYCLE_COMMON$"
 lrsk_gov_var_empire_enlighten_cycle:0 "계몽의 순환"
 lrsk_gov_var_empire_enlighten_cycle_desc:0 "우리는 한 문명을 별들로 이끌었습니다$LRSK_GOV_VAR_EMPIRE_CYCLE_COMMON$"
 lrsk_gov_var_empire_black_box_drives:0 "블랙박스 초공간 드라이브"
 lrsk_gov_var_empire_black_box_drives_desc:0 "식민지 규정과 절차상의 요건이 이 제국의 팽창을 어느 정도 제한하고 있습니다. 물론 모두 종족의 이익을 위해서입니다."
 lrsk_gov_var_empire_colony_red_tape:0 "식민지 관료주의"
 lrsk_gov_var_empire_colony_penalty:0 "무역 불이익"
 lrsk_gov_var_empire_colony_penalty_desc:0 "종주국에 의해 무역이 불이익을 받습니다."
 lrsk_gov_var_empire_colony_favors:0 "무역 특혜"
 lrsk_gov_var_empire_colony_favors_desc:0 "종주국이 무역에서 그들을 우대합니다."
 lrsk_gov_var_empire_colony_opentrade:0 "관대한 무역 정책"
 lrsk_gov_var_empire_colony_opentrade_desc:0 "무역에 대한 우리의 개방 정책은 식민지들을 만족시키지만, 기회비용이 따릅니다."
 lrsk_gov_var_empire_colony_tradeadv:0 "무역 우위"
 lrsk_gov_var_empire_colony_tradeadv_desc:0 "식민지에 대한 우리의 유리한 지위는 무역 수입에 이익을 줍니다."
 LRSK_GOV_VAR_COL_CORR:0 "식민지 부패"
 lrsk_gov_var_empire_colonial_corruption_slight:0 "약간의 $LRSK_GOV_VAR_COL_CORR$"
 lrsk_gov_var_empire_colonial_corruption_slight_desc:0 "여기저기서 조금씩 챙기는 정도가 뭐 그리 문제겠습니까?"
 lrsk_gov_var_empire_colonial_corruption_low:0 "낮은 $LRSK_GOV_VAR_COL_CORR$"
 lrsk_gov_var_empire_colonial_corruption_low_desc:0 "뇌물은 이 식민지 체계에서 여러 문을 열 수 있는 열쇠입니다."
 lrsk_gov_var_empire_colonial_corruption_worrying:0 "우려스러운 $LRSK_GOV_VAR_COL_CORR$"
 lrsk_gov_var_empire_colonial_corruption_worrying_desc:0 "손을 더럽히지 않고는 어떤 일도 하기 어려워지고 있습니다."
 lrsk_gov_var_empire_colonial_corruption_crippling:0 "심각한 $LRSK_GOV_VAR_COL_CORR$"
 lrsk_gov_var_empire_colonial_corruption_crippling_desc:0 "모두가 뒷돈을 챙길 때, 정직한 관료가 되는 것은 약점이 됩니다."
 lrsk_gov_var_empire_colonial_corruption_entrenched:0 "뿌리내린 $LRSK_GOV_VAR_COL_CORR$"
 lrsk_gov_var_empire_colonial_corruption_entrenched_desc:0 "부패 문화가 식민 행정 전반에 스며들었고, 이를 뿌리 뽑는 것은 불가능해 보입니다."
 lrsk_gov_var_empire_colonial_trade:0 "식민지 무역 혜택"
 lrsk_gov_var_empire_colonial_trade_desc:0 "본국과 인가 식민지 사이의 무역은 막대한 부를 가져옵니다."
 lrsk_gvp_indigenous_resistance:0 "원주민 저항"
 lrsk_gvp_indigenous_resistance_desc:0 "계몽되지 않은 원주민들은 그들에 대한 우리의 자애로운 통치가 필요하다는 사실을 받아들이지 못합니다."
 lrsk_gvp_empire_scandal_wracked:0 "추문에 휩싸임"
 lrsk_gvp_empire_scandal_wracked_desc:0 "어떤 추문이 이 국가의 위신을 훼손했습니다."
 lrsk_gvp_empire_offworld_work_bonus:0 "외부 행성 노동자 보너스"
 lrsk_gvp_empire_offworld_work_bonus_desc:0 "우리의 여러 무역 동반자에게서 온 초청 노동자들이 멀리 떨어진 자원 채굴 거점의 생산성을 높여 줍니다."
 lrsk_gvp_empire_offworld_work_bonus_1:0 "$lrsk_gvp_empire_offworld_work_bonus$"
 lrsk_gvp_empire_offworld_work_bonus_2:0 "$lrsk_gvp_empire_offworld_work_bonus$"
 lrsk_gvp_empire_offworld_work_bonus_3:0 "$lrsk_gvp_empire_offworld_work_bonus$"
 lrsk_gvp_empire_offworld_work_bonus_4:0 "$lrsk_gvp_empire_offworld_work_bonus$"
 lrsk_gvp_empire_offworld_work_bonus_5:0 "$lrsk_gvp_empire_offworld_work_bonus$"
 lrsk_gvp_empire_offworld_work_bonus_6:0 "$lrsk_gvp_empire_offworld_work_bonus$"
 lrsk_gvp_empire_offworld_work_bonus_7:0 "$lrsk_gvp_empire_offworld_work_bonus$"
 lrsk_gvp_empire_offworld_work_bonus_8:0 "$lrsk_gvp_empire_offworld_work_bonus$"
 lrsk_gvp_empire_offworld_work_bonus_9:0 "$lrsk_gvp_empire_offworld_work_bonus$"
 lrsk_gvp_empire_offworld_work_bonus_10:0 "$lrsk_gvp_empire_offworld_work_bonus$"
 lrsk_gvp_empire_new_aristos:0 "새로운 귀족층"
 lrsk_gvp_empire_new_aristos_desc:0 "교육받고 충성스러운 관료들이 귀족 지위를 부여받았습니다."
 lrsk_gvp_empire_estates_general:0 "신분 의회 소집"
 lrsk_gvp_empire_estates_general_desc:0 "자문 성격의 '입법부'가 소집되어 통치에 어느 정도 유연성을 제공합니다."
 lrsk_gvp_empire_national_peril:0 "위기에 처한 국가"
 lrsk_gvp_empire_national_peril_desc:0 "국가는 내외부의 모든 위협에 대비하고 있습니다."
 lrsk_gov_var_empire_impecon_foundry:0 "군수 식민지"
 lrsk_gov_var_empire_impecon_foundry_desc:0 "우리의 해군 보급 종속국이 해군 증강을 위해 숙련된 인력을 추가로 제공하고 있습니다."
 lrsk_gov_var_empire_impecon_market:0 "시장 식민지"
 lrsk_gov_var_empire_impecon_market_desc:0 "우리의 상업 종속국이 확장되고 유리한 무역 기회를 제공하고 있습니다."
 lrsk_gov_var_empire_impecon_trophy_ol:0 "전리품 식민지"
 lrsk_gov_var_empire_impecon_trophy_ol_desc:0 "그들의 공적 명성을 우리를 찬양하는 데 바침으로써, 우리의 전리품 종속국은 우리의 외교적 영향력을 높입니다."
 lrsk_gov_var_empire_impecon_trophy_vs:0 "$lrsk_gov_var_empire_impecon_trophy_ol$"
 lrsk_gov_var_empire_impecon_trophy_vs_desc:0 "다른 제국의 하찮은 은하적 앞잡이에 불과하다는 굴욕이 대중의 불만을 일으킵니다."
 lrsk_gov_var_empire_impecon_provision:0 "보급 식민지"
 lrsk_gov_var_empire_impecon_provision_desc:0 "건설 보급품에 더해, 우리의 일반 보급 종속국은 건설 사업을 위한 더 많은 노동자를 제공합니다."
 lrsk_gov_var_empire_impecon_legit:0 "제국의 정통성"
 lrsk_gov_var_empire_impecon_legit_desc:0 "종속국의 경제와 사회를 특정 용도에 맞게 조직하면 우리 통치에 대한 국민의 신뢰가 높아집니다."
 lrsk_gvp_colonial_mission_loyalty:0 "$triggered_opinion_lrsk_gov_var_colonial_mission$"
 lrsk_gvp_colonial_mission_loyalty_desc:0 "우리 종주국의 관심이 분산되어 있더라도, 그들이 여전히 우리의 공동 상업 사업에 투자하고 있다는 사실에서 위안을 얻습니다."
 lrsk_gvp_impecon_special_service:0 "특별 복무"
 lrsk_gvp_impecon_special_service_desc:0 "우리 종주국은 관례를 넘어서는 봉사와 기여를 요구합니다."
 lrsk_gvp_statmod_work_plan:0 "노동 배분 계획"
 lrsk_gvp_statmod_work_plan_desc:0 "행성 정부는 실업 중인 주민들이 일자리를 찾도록 장려하고 있습니다. 그 일자리가 이 행성에 있든 다른 곳에 있든 상관없습니다. 이는 지역 경제에 어느 정도 유감스러운 영향을 줍니다."
 lrsk_gvp_statmod_work_plan_effects_common:0 "§G+50%§! 자동 재정착 확률, 그 대가로 §R-15%§! $r_trade$. (언제든 종료할 수 있으며, £pop£ §Y팝§! 실업자가 한 달 동안 없으면 자동으로 종료됩니다.)"
 lrsk_gvp_statmod_pleased_new_aristos:0 "흡족한 신흥 귀족"
 lrsk_gvp_statmod_pleased_new_aristos_desc:0 "새로 귀족으로 봉해진 궁정 인사들은 인정받은 것에 감사하고 있습니다."
 lrsk_gvp_statmod_resent_new_aristos:0 "벼락출세한 평민에 대한 반감"
 lrsk_gvp_statmod_resent_new_aristos_desc:0 "아무리 자격이 있다고 해도 평민을 귀족으로 봉한 왕관의 결정은 오래되고 확립된 귀족 가문들의 반감을 불러일으켰습니다."
 lrsk_gvp_statmod_estates_session:0 "소집 중인 신분 의회"
 lrsk_gvp_statmod_estates_session_desc:0 "제국의 모든 계층 대표들을 소집하는 일은 결코 작지 않으며, 그들의 지위에 걸맞은 생활을 유지하게 하는 데도 비용이 듭니다."
 LRSK_DESC_MOVED_BY:0 "저 너머에서 온 환상에 감화되어"
 LRSK_DESC_A_WILD_PROPH:0 "한 광기 어린 예언자가 설파하기 시작했습니다"
 lrsk_gov_var_statmod_divine_right_cult:0 "왕권신수 숭배"
 lrsk_gov_var_statmod_divine_right_cult_desc:0 "$LRSK_DESC_MOVED_BY$ 사회적 혼란과 공포 속에서, $LRSK_DESC_A_WILD_PROPH$ '하늘이 임명한 지도자들'에 대한 믿음의 필요성을."
 lrsk_gov_var_statmod_children_of_heaven_cult:0 "천상의 자녀 숭배"
 lrsk_gov_var_statmod_children_of_heaven_cult_desc:0 "$LRSK_DESC_MOVED_BY$ 우리 모든 국민이 사랑 넘치는 신성의 자녀로 조화를 이루는 모습에, $LRSK_DESC_A_WILD_PROPH$ 모두가 똑같이 결함이 있기에 똑같이 거룩한 인도가 필요하다고."
 lrsk_gov_var_statmod_holy_war_cult:0 "성전 숭배"
 lrsk_gov_var_statmod_holy_war_cult_desc:0 "$LRSK_DESC_MOVED_BY$ 신앙의 적에 맞서 영광스럽게 전사하는 보상에, $LRSK_DESC_A_WILD_PROPH$ 이교도에게 전투를 가져갈 성전사를 모집해야 한다고."
 lrsk_gov_var_statmod_harmony_cult:0 "자애로운 조화 숭배"
 lrsk_gov_var_statmod_harmony_cult_desc:0 "$LRSK_DESC_MOVED_BY$ 완전한 평온과 풍요의 사회에, $LRSK_DESC_A_WILD_PROPH$ 사랑과 비폭력을."
 lrsk_gov_var_statmod_chosen_few_cult:0 "선택받은 소수 숭배"
 lrsk_gov_var_statmod_chosen_few_cult_desc:0 "$LRSK_DESC_MOVED_BY$ 우리 민족의 위대한 운명에, $LRSK_DESC_A_WILD_PROPH$ 전통 문화의 고귀함과 하늘의 선택받은 자로서 우리 민족의 특별한 사명을."
 lrsk_gov_var_statmod_universal_family_cult:0 "보편 가족 숭배"
 lrsk_gov_var_statmod_universal_family_cult_desc:0 "$LRSK_DESC_MOVED_BY$ 신성을 인식할 수 있는 수많은 생각하고 느끼는 존재들의 다양한 아름다움에, $LRSK_DESC_A_WILD_PROPH$ 외계 존재들을 우리의 영적 친족으로 받아들이는 포용의 사명을."
 lrsk_gov_var_statmod_wild_revelry_cult:0 "광란의 환락 숭배"
 lrsk_gov_var_statmod_wild_revelry_cult_desc:0 "$LRSK_DESC_MOVED_BY$ 과잉의 끝에서 발견되는 영적 지혜에, $LRSK_DESC_A_WILD_PROPH$ 쾌락과 육체적 경험의 한계를 밀어붙이는 일을 통한 깨달음을."
 lrsk_gov_var_statmod_penance_and_redemption_cult:0 "고행과 구원 숭배"
 lrsk_gov_var_statmod_penance_and_redemption_cult_desc:0 "$LRSK_DESC_MOVED_BY$ 필멸자 영혼의 추함과 모두가 저지른 수많은 죄가 현실에 남긴 정신적 상처에, $LRSK_DESC_A_WILD_PROPH$ 보편적 참회와 고통을 통한 구원의 필요성을."
 lrsk_gov_var_statmod_doomsday_cult:0 "종말 숭배"
 lrsk_gov_var_statmod_doomsday_cult_desc:0 "$LRSK_DESC_MOVED_BY$ 피할 수 없는 재앙에, $LRSK_DESC_A_WILD_PROPH$ 우리 사회의 구제 불가능한 타락과 예정된 몰락을."
 lrsk_gov_var_statmod_golden_age_cult:0 "축복받은 삶 숭배"
 lrsk_gov_var_statmod_golden_age_cult_desc:0 "$LRSK_DESC_MOVED_BY$ 사소한 것들 속의 희망과 아름다움, 그리고 평범한 삶의 거룩함에, $LRSK_DESC_A_WILD_PROPH$ 조용한 명상과 소박한 즐거움의 생활 방식을."
 lrsk_gvp_dr_councilor_effect:0 "종교 간 화해"
 lrsk_gvp_dr_councilor_effect_desc:0 "§Y$lrsk_gvp_direct_revelation_councilor$§!의 지도 아래, 새로운 종교 운동 지도자들은 더 확립된 주류 신앙들과 서로 간의 차이를 해결하고 사회적 조화를 증진하도록 강하게 권장받습니다."
 lrsk_gov_var_statmod_planet_audit:0 "재귀 기능 감사"
 lrsk_gov_var_statmod_planet_audit_desc:0 "지역 행정 서브루틴은 일시적으로 준지성 권리와 행성 물류 체계를 감사하고 재프로그래밍할 광범위한 권한을 부여받았습니다."
 lrsk_gov_var_statmod_planet_audit_continues:0 "진행 중인 감사"
 lrsk_gov_var_statmod_planet_audit_continues_desc:0 "지역 행정 서브루틴들은 어떤 절차 변경을 해야 할지 합의에 이르지 못했습니다. 사실 그중 일부는 행성 체계의 기능을 반복해서 검토하고 조정하는 상태에 고착된 듯합니다. 어쩌면 이 감사는 무기한 계속될지도 모릅니다."
 lrsk_gov_var_statmod_planet_audit_confused:0 "혼란스러운 감사"
 lrsk_gov_var_statmod_planet_audit_confused_desc:0 "무언가 크게 잘못되었습니다. 지역 행정 서브루틴들이 시행한 변경 사항은 거의 이치에 맞지 않으며, 운영 무결성은 끔찍할 정도로 낮습니다. 이 감사를 실행한 것이 오산이었을지도 모르지만, 이 상황을 바로잡을 다른 방법도 분명하지 않습니다."
 PRIORITY_STRING:0 "우선순위 ="
 lrsk_gov_var_statmod_planet_spec_priority:0 "$PRIORITY_STRING$ 특화 생산"
 lrsk_gov_var_statmod_planet_spec_priority_desc:0 "복잡 드론의 특화 상품 생산을 간소화하기 위한 향상된 알고리즘이 구현되었습니다."
 lrsk_gov_var_statmod_planet_basic_priority:0 "$PRIORITY_STRING$ 기본 자원"
 lrsk_gov_var_statmod_planet_basic_priority_desc:0 "단순 드론의 자원 채취를 간소화하기 위한 향상된 알고리즘이 구현되었습니다."
 lrsk_gov_var_statmod_planet_logistic_priority:0 "$PRIORITY_STRING$ 물류"
 lrsk_gov_var_statmod_planet_logistic_priority_desc:0 "지역 행정 서브루틴은 자체 물류 최적화를 더욱 개선하는 데 집중했습니다."
 lrsk_gov_var_statmod_planet_mining_priority:0 "$PRIORITY_STRING$ 채굴"
 lrsk_gov_var_statmod_planet_mining_priority_desc:0 "모든 행성 광산과 관련 기반 시설이 배정과 대기열에서 우선순위를 받습니다."
 lrsk_gov_var_statmod_planet_energy_priority:0 "$PRIORITY_STRING$ 에너지"
 lrsk_gov_var_statmod_planet_energy_priority_desc:0 "모든 행성 발전기와 관련 기반 시설이 배정과 대기열에서 우선순위를 받습니다."
 lrsk_gov_var_statmod_planet_food_priority:0 "$PRIORITY_STRING$ 식량"
 lrsk_gov_var_statmod_planet_food_priority_desc:0 "모든 행성 농장과 관련 기반 시설이 배정과 대기열에서 우선순위를 받습니다."
 lrsk_gov_var_statmod_planet_smelting_priority:0 "$PRIORITY_STRING$ 합금"
