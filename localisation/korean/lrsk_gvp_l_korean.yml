 job_lrsk_gvp_job_citscholar:0 "시민 학자"
 job_lrsk_gvp_job_citscholar_plural:0 "$job_lrsk_gvp_job_citscholar$s"
 job_lrsk_gvp_job_citscholar_desc:0 "이 밝고 호기심 많은 평범한 시민들은 다양한 학문적 관심을 추구하고 이를 공동체와 나눌 수 있도록 정부의 보조를 받습니다."
 job_lrsk_gvp_job_citscholar_effect_desc:0 "£job_lrsk_gvp_job_citscholar£ $job_lrsk_gvp_job_citscholar_plural$는 $r_consumer_goods$를 $r_lrsk_research$, $r_unity$, $r_amenities$로 전환합니다."
