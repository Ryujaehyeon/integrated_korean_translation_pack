 job_lrsk_gov_var_job_suppressor:0 "억제자"
 job_lrsk_gov_var_job_suppressor_plural:0 "$job_lrsk_gov_var_job_suppressor$s"
 job_lrsk_gov_var_job_suppressor_desc:0 "법의 테두리 안에서 해결할 수 없는 문제에 대해, 이 비공식 집행자들은 둔기만으로도 뜻을 관철할 수 있습니다. 당신 구역의 불법 거래든, 직원들이 모여 자신들의 '권리'를 요구하는 일이든, 이 거친 자들이 일을 끝냅니다."
 job_lrsk_gov_var_job_suppressor_effect_desc:0 "£job_lrsk_gov_var_job_suppressor£ $job_lrsk_gov_var_job_suppressor_plural$는 £political_power£ §Y정치력§! of $WORKERS$를 감소시키는 동시에 $WORKERS$의 산출량을 증가시킵니다."
