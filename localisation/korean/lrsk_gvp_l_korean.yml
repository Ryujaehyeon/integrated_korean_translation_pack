 lrsk_gov_var_origin_tooltip_tradeways_npc_effects:0 "- 추가 구성원 둘이 있는 §H무역 연맹§! 연방의 구성원으로 시작합니다."
 lrsk_gov_var_origin_tradeways_mc_npc:0 "$lrsk_gov_var_origin_tradeways_mc$"
 lrsk_gov_var_origin_tradeways_mc_npc_desc:0 "$lrsk_gov_var_origin_tradeways_mc_desc$"
 LRSK_GOV_VAR_START_SCREEN_TRADEWAYS:0 "수십 년 전, 우리의 첫 조잡한 아광속 탐사선이 인근 성계를 방문했을 때, 우리는 두 개의 서로 다른 외계 문명을 발견했습니다. 생리 구조의 극단적인 차이에도 불구하고, 곧 서로 다른 점보다 공통점이 더 많다는 사실이 분명해졌습니다. 그들도 우리처럼 이윤과 물질적 풍요의 추구에 헌신하고 있었습니다.\n\n세 문명 사이에는 유대가 형성되었고, 이는 결국 연방의 탄생으로 이어졌습니다. 우리는 노동의 결실을 교환하고, 우주로 뻗어나갈 준비가 되었을 때 발견할 부로 함께 이익을 얻을 것입니다."
 lrsk_gov_var_origin_grand_alliance:0 "대연합"
 lrsk_gov_var_origin_grand_alliance_desc:0 "이 문명은 인접한 외계 이웃들과 일찍 접촉했습니다. 잠재적으로 위험한 우주에서 군사적 탁월성이 필요하다는 강한 믿음을 서로 확인한 그들은 상호 안보를 위한 방위 연합에 들어갔습니다. 그리고 어쩌면 공동 정복도 가능할 것입니다."
 lrsk_gov_var_origin_tooltip_grand_alliance_effects:0 "-§H$military_federation$§! 연합의 리더로 시작하며, 두 명의 추가 회원이 있습니다.\n-회원들은 귀하의 본성계 근처에 있는 보장된 거주 가능한 세계 슬롯을 차지합니다.\n-£traditions£ §H$tr_diplomacy_the_federation$§! 전통이 잠금 해제된 상태로 시작합니다."
 lrsk_gov_var_origin_grand_alliance_npc:0 "$lrsk_gov_var_origin_grand_alliance$"
 lrsk_gov_var_origin_grand_alliance_npc_desc:0 "$lrsk_gov_var_origin_grand_alliance_desc$"
 lrsk_gov_var_origin_tooltip_grand_alliance_npc_effects:0 "- 추가 구성원 둘이 있는 §H군사 동맹§! 연방의 구성원으로 시작합니다."
 LRSK_GOV_VAR_START_SCREEN_GRAND_ALLIANCE:0 "수십 년 전, 우리의 첫 조잡한 아광속 탐사선이 인근 성계를 방문했을 때, 우리는 두 개의 서로 다른 외계 문명을 발견했습니다. 생리 구조의 극단적인 차이에도 불구하고, 곧 서로 다른 점보다 공통점이 더 많다는 사실이 분명해졌습니다. 그들도 우리처럼 군사적 탁월함과 영광에 헌신하고 있었습니다.\n\n세 문명 사이에는 유대가 형성되었고, 이는 결국 연방의 탄생으로 이어졌습니다. 우리는 상호 방위를 위해 묶인 동맹이 되고, 우주로 뻗어나갈 준비가 되었을 때 그곳에서 나타나는 어떤 위협에도 강력한 공동 전선으로 맞설 것입니다."
 lrsk_gvp_origin_convened_providence:0 "섭리로 소집됨"
 lrsk_gvp_origin_convened_providence_desc:0 "이 문명은 인접한 외계 이웃들과 일찍 접촉했습니다. 서로 모두 강한, 비록 다양한 신앙을 지닌 민족임을 발견한 그들은 함께 신성을 추구하기 위한 신성한 pact를 맺었습니다."
 lrsk_gvp_origin_convened_providence_effects:0 "-§H$spiritualist_federation$§! 연합의 지도자로 시작하며, 추가로 두 명의 회원이 있습니다.\n-회원들은 귀하의 모항성계 근처에 있는 모든 보장 가능한 거주 가능 행성 슬롯을 차지합니다.\n-£traditions£ §H$tr_diplomacy_the_federation$§! 전통이 잠금 해제된 상태로 시작합니다."
 lrsk_gvp_origin_convened_providence_npc:0 "$lrsk_gvp_origin_convened_providence$"
 lrsk_gvp_origin_convened_providence_npc_desc:0 "$lrsk_gvp_origin_convened_providence_desc$"
 lrsk_gvp_origin_convened_providence_npc_effects:0 "- 추가 구성원 둘이 있는 §H신성 조약§! 연방의 구성원으로 시작합니다."
 LRSK_GOV_VAR_START_SCREEN_CONVENED_PROVIDENCE:0 "수십 년 전, 우리의 첫 조잡한 아광속 탐사선이 인근 성계를 방문했을 때, 우리는 두 개의 서로 다른 외계 문명을 발견했습니다. 생리 구조의 극단적인 차이에도 불구하고, 곧 서로 다른 점보다 공통점이 더 많다는 사실이 분명해졌습니다. 그들도 우리처럼 신성의 에너지에 조율된 영적 구도자들이었습니다.\n\n세 문명 사이에는 유대가 형성되었고, 이는 결국 연방의 탄생으로 이어졌습니다. 신성한 세계의 힘이 우리를 함께 일으켜 축복했으므로, 우리는 함께 신들을 공경할 것입니다."
 lrsk_gov_var_origin_uplift:0 "진화"
 lrsk_gov_var_origin_uplift_desc:0 "한 외계 제국이 이 문명의 발달에 개입하여, 성간 여행에 필요한 기술 수준으로 계몽했으며 어쩌면 전지성체 기원에서부터 개조했을 수도 있습니다."
 lrsk_gov_var_origin_tooltip_uplift_effects:0 "- 진보한 제국의 §H보호국§!으로 시작합니다.\n- 게임 시작 시 전지성체에게만 일반적으로 가능한 특성, 다른 종족 특성, 제국 보너스 등 여러 §G고유 이점§! 중 하나를 선택할 수 있습니다.\n- 원시 문명을 계몽하거나 전지성체를 지성화할 때 §G보상§!을 얻습니다.\n\n"
 LRSK_GOV_VAR_START_SCREEN_UPLIFT:0 "그들, 장로들은 언제나 우리와 함께 있었던 것처럼 보입니다. 실제로 얼마나 오래되었든, 먼 별에서 온 스승들의 존재는 우리를 깊이 빚어냈습니다. 그러나 우리는 최근에야 그들이 우리를 무엇을 위해 빚어왔는지 알게 되었습니다.\n\n초기부터 그들은 우리 종족이 큰 가능성을 지녔으며, 우리가 완전한 잠재력에 도달하도록 돕는 길로 인도하려는 의도를 가졌다고 설명했습니다. 그리고 그들은 실제로 우리를 인도했습니다. 그들의 조언으로 우리는 전기, 원자력, 조잡한 우주 비행을 빠르게 터득하며 거대한 기술적 진보를 이루었습니다. 장로들의 지도 아래 우리는 첫 초공간 드라이브를 건설했습니다. 이제 그들은 우리를 그들의 은하적 야망에 하위 동반자로 참여하도록 초대했습니다."
 LRSK_GOV_VAR_ORIGIN_SUBLIGHT_COMMON_DESC:0 "이 문명은 FTL 여행의 비밀을 풀기 전부터 성간 개척을 시도하기 시작했습니다."
 LRSK_GOV_VAR_ORIGIN_SUBLIGHT_COMMON_PRE:0 "- 당신 종족의 §H특수 종속 제국 셋§!의 종주국으로 시작합니다."
 LRSK_GOV_VAR_ORIGIN_SUBLIGHT_COMMON_MID:0 "\n- 이 종속국들은 모성계 근처의 보장 거주 가능 행성 슬롯을 차지합니다."
 LRSK_GOV_VAR_ORIGIN_SUBLIGHT_COMMON_POST:0 "\n- 성계가 새로운 형태로 진화하는 것으로 이어지는 고유 식민지 상호작용 이벤트가 있습니다.\n- §R경고:§! 모성으로 모드 추가 행성 유형을 선택하면 이 기원은 §P정상 작동을 보장할 수 없습니다§!."
 lrsk_gov_var_origin_sublight_empire:0 "아광속 제국"
 lrsk_gov_var_origin_sublight_empire_desc:0 "$LRSK_GOV_VAR_ORIGIN_SUBLIGHT_COMMON_DESC$ 그것을 발견한 뒤, 그들은 충분한 조건을 달아 아광속 식민지들과 공유하여, 그 분파들을 당분간 자신들의 손아귀 아래 두었습니다."
 lrsk_gov_var_origin_tooltip_sublight_empire_effects:0 "$LRSK_GOV_VAR_ORIGIN_SUBLIGHT_COMMON_PRE$, 이들은 세금을 통해 §G자원§!을 제공하지만 통합할 수는 없습니다.$LRSK_GOV_VAR_ORIGIN_SUBLIGHT_COMMON_MID$ 그리고 결국 당신의 FTL 독점에서 벗어날 것입니다.$LRSK_GOV_VAR_ORIGIN_SUBLIGHT_COMMON_POST$"
 LRSK_GOV_VAR_START_SCREEN_SUBLIGHT_COMMON_TEXT:0 "첫 대규모 개척 열풍이 부풀었다가 가라앉은 지 백 년이 넘었습니다. 아이러니하게도, 아광속 함선에 탄 최초의 개척자들은 목적지에 도착하는 데 너무 오래 걸렸고, 모성에 남은 우리는 그들을 앞질렀습니다. 그들이 의도한 식민지를 막 세우자마자, 우리는 새로 개발된 FTL 드라이브를 장착한 함선을 타고 도착하여 식민지 주민 누구도 예상하지 못했던 훨씬 더 가까운 관계를 수립했습니다.\n\n그 사이, 식민지 주민들이 떠날 때 막 시작되었던 세계 통합은 완성되었습니다. 다만 모성의 모든 민족을 동참시키기 위해 수십 년의 내향적 정치와 개발 우선순위를 감수해야 했습니다. 우리의 식민 후손들은 이 발전에 대해... 서로 다른 태도를 보입니다."
 LRSK_GOV_VAR_START_SCREEN_SUBLIGHT_EMPIRE:0 "$LRSK_GOV_VAR_START_SCREEN_SUBLIGHT_COMMON_TEXT$ 그럼에도 우리는 별들 사이의 빠른 여행의 비밀을 통제하고 있으며, 그들에게 제한된 접근만 허용하는 대가로 짧은 목줄을 유지합니다. 세계들의 부가 갑자기 우리의 명령 아래 놓였습니다."
 lrsk_gov_var_origin_sublight_commonwealth:0 "아광속 커먼웰스"
 lrsk_gov_var_origin_sublight_commonwealth_desc:0 "$LRSK_GOV_VAR_ORIGIN_SUBLIGHT_COMMON_DESC$ 그것을 발견한 뒤, 그들은 이론상 모든 구성원의 이익을 위해 작동하지만 대부분의 의사 결정권을 모성에 부여하는 성간 세계 커먼웰스에 들어간다는 조건으로 아광속 식민지들과 공유했습니다."
 lrsk_gov_var_origin_tooltip_sublight_commonwealth_effects:0 "$LRSK_GOV_VAR_ORIGIN_SUBLIGHT_COMMON_PRE$. 이들을 통합할 수는 없지만, 결합된 노력의 존경받는 지도자로서 이 협정에서 §G$r_influence$와 $r_unity$§!를 얻습니다.$LRSK_GOV_VAR_ORIGIN_SUBLIGHT_COMMON_MID$.$LRSK_GOV_VAR_ORIGIN_SUBLIGHT_COMMON_POST$"
 LRSK_GOV_VAR_START_SCREEN_SUBLIGHT_COMMONWEALTH:0 "$LRSK_GOV_VAR_START_SCREEN_SUBLIGHT_COMMON_TEXT$ 어쨌든, 우리 종족 전체의 이익을 위해 어느 정도 중앙 통제를 주장할 필요는 있었지만, 우리는 모두가 번영할 수 있는 새로운 세계 커먼웰스로 식민지들을 받아들였습니다."
 lrsk_gov_var_origin_sublight_empire_npc:0 "아광속 식민지"
 lrsk_gov_var_origin_sublight_empire_npc_desc:0 "이 문명은 아광속 개척 노력의 결과입니다. 그들의 모행성은 결국 FTL 여행을 발견했고, 기술적 강제나 외교 협상을 통해 그 위에 권위를 세웠습니다."
 lrsk_gov_var_origin_tooltip_sublight_empire_npc_effects:0 "- 다른 제국의 §H특수한 유형의 종속국§!으로 시작합니다. 초공간 드라이브를 종주국에 의존하여 예속되어 있거나, 모성 정부와 합의되었지만 불평등한 관계에 놓입니다.\n- 확장을 방해하는 식민 규정과 절차 요구 사항을 가진 상태로 시작합니다. 전초기지 비용, 식민지 개발 시간, 탐사 속도에 (§R-20%§!)가 적용됩니다.\n- §H아광속 제국의 종속국§!이라면, 이 제국은 제한 기능이 있는 2급 초공간 드라이브에 접근할 수 있습니다. FTL 준비 및 종료에 (§R-25%§!)가 적용됩니다. §H아광속 커먼웰스의 위성국§!에는 이런 제한이 없습니다."
 lrsk_gov_var_origin_tooltip_sublight_colony_loy_effects:0 "$lrsk_gov_var_origin_tooltip_sublight_empire_npc_effects$\n - 종주국과 §H같은 윤리관§!을 가집니다.\n\n"
 lrsk_gov_var_origin_sublight_colony_loy:0 "$lrsk_gov_var_origin_sublight_empire_npc$ - 충성파"
 lrsk_gov_var_origin_sublight_colony_loy_desc:0 "$lrsk_gov_var_origin_sublight_empire_npc_desc$ 이는 공식 개척 임무였으며, 모성 정부에 충성하고 가장 뛰어난 식민지 주민들을 태웠습니다."
 lrsk_gov_var_origin_tooltip_sublight_colony_gsp_effects:0 "$lrsk_gov_var_origin_tooltip_sublight_empire_npc_effects$\n - §H무작위 윤리관§!을 가집니다.\n\n"
 lrsk_gov_var_origin_sublight_colony_gsp:0 "$lrsk_gov_var_origin_sublight_empire_npc$ - 세대선"
 lrsk_gov_var_origin_sublight_colony_gsp_desc:0 "$lrsk_gov_var_origin_sublight_empire_npc_desc$ 이는 장기 냉동 보관이 등장하기 전에 출발한 최초의 개척 임무 중 하나였습니다. 여러 세대의 식민지 주민들이 착륙 전 수십 년 동안 함선에서 살았고, 그 결과 그들의 문화는 예상치 못한 방식으로 모성의 문화와 달라졌습니다."
 lrsk_gov_var_origin_tooltip_sublight_colony_dis_effects:0 "$lrsk_gov_var_origin_tooltip_sublight_empire_npc_effects$\n - 종주국에 §H반대되는§! 윤리관을 가집니다.\n\n"
 lrsk_gov_var_origin_sublight_colony_dis:0 "$lrsk_gov_var_origin_sublight_empire_npc$ - 반체제파"
 lrsk_gov_var_origin_sublight_colony_dis_desc:0 "$lrsk_gov_var_origin_sublight_empire_npc_desc$ 이 개척 임무는 타협의 결과였습니다. 떠오르는 다수 세계 문화에 동의하지 않은 모든 반체제 인사들에게 자신들의 방식으로 살아갈 세계를 찾을 식민선을 허용한 것입니다. 모성의 멍에 아래 다시 놓인 것을 불쾌하게 여기면서도, 그들은 독립 정신에 대한 자부심을 유지합니다."
 lrsk_gov_var_origin_colonial_charter:0 "식민 헌장"
 lrsk_gov_var_origin_colonial_charter_desc:0 "이 제국은 투자자들과 모성의 명목상 정부를 대신하여 성단의 모든 자원을 활용하도록 인가받은 자회사로 시작되었습니다."
 lrsk_gov_var_origin_colonial_venture:0 "식민 모험"
 lrsk_gov_var_origin_colonial_venture_desc:0 "이 제국은 인근 군주국의 모험가들이 군주의 영광을 위해 길들이고 정착시킬 새로운 세계를 찾아 나서면서 시작되었습니다."
 concept_lrsk_gvp_religious_job:0 "종교 직업"
 concept_lrsk_gvp_religious_job_desc:0 "소위 '종교' 직업과 관련된 변동치는 게임에서 '사제' 직업에 주는 효과로 설명되지만, 실제로는 종교와 관련된 직업군 전체에 영향을 줍니다. 여기에는 ['concept_lrsk_gvp_hedge_preachers']와 ['concept_lrsk_gvp_pastors']가 포함됩니다."
 concept_lrsk_gvp_wild_cult:0 "야생 교단"
 concept_lrsk_gvp_wild_cults:0 "$concept_lrsk_gvp_wild_cult$s"
 concept_lrsk_gvp_wild_cult_desc:0 "§Y$lrsk_gov_var_civic_direct_revelation$§! 사회제도를 가진 제국 소유 식민지에 무작위로 생성되는 새로운 종교 운동입니다.\n\n종류는 열 가지이며, $concept_lrsk_gvp_wild_cult$가 생성될 때 각각 10% 확률로 나타납니다. 대체로 이로운 효과를 지니고, £pop£ §Y팝§! 윤리관 선호를 바꿀 수 있으며, 각각 £job_lrsk_gov_var_job_hedge_preacher£ ['concept_lrsk_gvp_hedge_preacher'] 직업을 추가합니다."
 concept_lrsk_gvp_special_subjects:0 "$concept_lrsk_gvp_special_subject$s"
 concept_lrsk_gvp_special_subject:0 "특수 종속국 유형"
 concept_lrsk_gvp_special_subjects_desc:0 "§HGovernment Variety Pack§! 모드가 추가한 특정 사회제도에서 사용할 수 있는, 여러 이로운 효과를 지닌 새로운 종속국 사전 설정 및/또는 협정 조건입니다. 이는 Overlord DLC가 추가한 '전문화' 종속국과는 다릅니다."
 concept_lrsk_gvp_planetmind_buildings:0 "행성 정신 건물"
 concept_lrsk_gvp_planetmind_buildings_desc:0 "이 '$LRSK_DESC_PLANETMIND_NAME$' 건물들은 $r_lrsk_amenities_nohappy$ 생산을 향상시키는 동시에 $type_deviancy$를 증폭합니다. 또한 £job_lrsk_gov_var_job_planetmind_overseer£ ['concept_lrsk_gvp_planetmind_overseers']를 추가합니다."
 concept_lrsk_gvp_bldg_managerial_technique_institute:0 "$lrsk_gvp_bldg_managerial_technique_institute$"
 concept_lrsk_gvp_bldg_managerial_technique_institute_desc:0 "주재 행성에 §G+200§! £job_lrsk_gov_var_job_functionary£ ['concept_lrsk_gvp_functionary'] 직업을 제공하고, 거대기업에 §G+10%§! §Y$BRANCH_OFFICE_VALUE$§!를 제공합니다. 충원된 직업 §G+5%§! 보너스가 §H100§! §Y$job_lrsk_gov_var_job_functionary$§!마다 추가됩니다. 범죄 기업의 경우 이 보너스는 §G+10%§! $type_crime$로 바뀝니다.\n\n§L$lrsk_gvp_bldg_managerial_technique_institute_desc$§!"
 concept_lrsk_gvp_bldg_learnarium_dome:0 "$lrsk_gvp_bldg_learnarium_dome$"
 concept_lrsk_gvp_bldg_learnarium_dome_desc:0 "주재 행성에 §Y+50% 물질주의 선호§!와 §G+200§! £job_lrsk_gov_var_job_infoguide£ ['concept_lrsk_gvp_infoguide'] 직업을 제공하고, 거대기업에는 $LRSK_GVP_MEGACORP_SCALING_COMMON$ §Y물질주의§!를 제공합니다.\n\n§L$lrsk_gvp_bldg_learnarium_dome_desc$§!"
 concept_lrsk_gvp_bldg_odd_jobs_emporium:0 "$lrsk_gvp_bldg_odd_jobs_emporium$"
 concept_lrsk_gvp_bldg_odd_jobs_emporium_desc:0 "주재 행성에 §G+200§! £job_lrsk_gov_var_job_gofer£ ['concept_lrsk_gvp_gofer'] 직업을 제공하고, 거대기업에 §G+10% $BRANCH_OFFICE_VALUE$§!를 제공합니다. 충원된 직업 §G+5%§! 보너스가 §H100§! §Y$job_lrsk_gov_var_job_gofer$§!마다 추가됩니다. 범죄 기업의 경우 이 보너스는 §G+10%§! $type_crime$로 바뀝니다.\n\n§L$lrsk_gvp_bldg_odd_jobs_emporium_desc$§!"
 concept_lrsk_gvp_bldg_organizing_hub:0 "$lrsk_gvp_bldg_organizing_hub$"
 concept_lrsk_gvp_bldg_organizing_hub_desc:0 "주재 행성에 §Y+50% 평등주의 선호§!, §Y+25% £political_power£ 정치력§!과 §G+5%§! §Y$HAPPINESS$§!를 $WORKERS$에게 제공하고, 거대기업에는 $LRSK_GVP_MEGACORP_SCALING_COMMON$ §Y평등주의§!를 제공합니다.\n\n§L$lrsk_gvp_bldg_organizing_hub_desc$§!"
 concept_lrsk_gov_var_bldg_grand_casino:0 "$lrsk_gov_var_bldg_grand_casino$"
 concept_lrsk_gov_var_bldg_grand_casino_desc:0 "주재 행성에 §G+1000§! $r_amenities$와 §G+5%§! $r_trade$를 제공하고, 거대기업에는 §G+10%§! §Y$BRANCH_OFFICE_VALUE$§!를 제공하거나, 범죄 기업인 경우 행성의 $type_crime$을 §G15%§! 증가시킵니다.\n\n§L$lrsk_gov_var_bldg_grand_casino_desc$§!"
 concept_lrsk_gov_var_bldg_galactic_excursions_office:0 "$lrsk_gov_var_bldg_galactic_excursions_office$"
 concept_lrsk_gov_var_bldg_galactic_excursions_office_desc:0 "주재 행성에 §Y+50% 외계종 선호§!와 §G-15%§! £amenities£ §Y$MOD_POP_AMENITIES_USAGE_BASE$§!를 제공하고, 거대기업에는 $LRSK_GVP_MEGACORP_SCALING_COMMON$ §Y외계종 선호§!를 제공합니다.\n\n§L$lrsk_gov_var_bldg_galactic_excursions_office_desc$§!"
 concept_lrsk_gov_var_bldg_heritage_museum:0 "$lrsk_gov_var_bldg_heritage_museum$"
 concept_lrsk_gov_var_bldg_heritage_museum_desc:0 "주재 행성에 §Y+50% 외계종 혐오 선호§!와 §G+5%§! §Y$MOD_POP_CITIZEN_HAPPINESS$§!를 제공하고, 거대기업에는 $LRSK_GVP_MEGACORP_SCALING_COMMON$ §Y외계종 혐오§!를 제공합니다.\n\n§L$lrsk_gov_var_bldg_heritage_museum_desc$§!"
 concept_lrsk_gov_var_bldg_mediation_retreat:0 "$lrsk_gov_var_bldg_mediation_retreat$"
 concept_lrsk_gov_var_bldg_mediation_retreat_desc:0 "주재 행성에 §Y+50% 평화주의 선호§!와 §G+5§! $r_stability$를 제공하고, 거대기업에는 $LRSK_GVP_MEGACORP_SCALING_COMMON$ §Y평화주의§!를 제공합니다.\n\n§L$lrsk_gov_var_bldg_mediation_retreat$§!"
 concept_lrsk_gov_var_bldg_professional_protection_office:0 "$lrsk_gov_var_bldg_professional_protection_office$"
 concept_lrsk_gov_var_bldg_professional_protection_office_desc:0 "거대기업에 $LRSK_GVP_MEGACORP_SCALING_COMMON$ §Y권위주의§!를 제공합니다. 주재 행성은 §Y+50% 권위주의 선호§!와 §G+100§! £job_lrsk_gov_var_job_investigator£ ['concept_lrsk_gvp_investigator'] 직업을 얻거나, 제공 기업이 범죄 기업인 경우 §G+100§! £job_lrsk_gov_var_job_suppressor£ ['concept_lrsk_gvp_suppressor'] 직업을 얻습니다.\n\n§L$lrsk_gov_var_bldg_professional_protection_office$§!"
 concept_lrsk_gov_var_bldg_military_excellence_academy:0 "$lrsk_gov_var_bldg_military_excellence_academy$"
 concept_lrsk_gov_var_bldg_military_excellence_academy_desc:0 "거대기업에 $LRSK_GVP_MEGACORP_SCALING_COMMON$ §Y군국주의§!를 제공합니다. 주재 행성은 §Y+50% 군국주의 선호§!를 얻고, 소유자는 §G+10%§! 지휘관 $exp_gain$와 함선 및 지상군 시작 경험치 §G+50§!를 얻습니다. \n\n§L$lrsk_gov_var_bldg_military_excellence_academy_desc$§!"
 concept_lrsk_gvp_hedge_preachers:0 "$job_lrsk_gov_var_job_hedge_preacher_plural$"
 concept_lrsk_gvp_hedge_preacher:0 "$job_lrsk_gov_var_job_hedge_preacher$"
