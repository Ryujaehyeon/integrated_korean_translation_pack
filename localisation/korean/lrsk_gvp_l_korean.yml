 lrsk_gov_var_direct_revelation.90.name:0 "신앙 회복"
 lrsk_gov_var_direct_revelation.90.desc:0 "우리 국민은 늘 다양한 영적 유행과 새로운 환상에 끌려 왔지만, [this.capital_scope.GetName]을(를) 파괴할 대재앙에 대한 계시는 우리의 집단 정신에 영적 상처를 남겼습니다. 이제 [this.species.GetNamePlural]은(는) 수그러들 기미가 없는 난폭한 §R$lrsk_gov_var_statmod_doomsday_cult$§!의 허무주의적 위안으로 떼 지어 몰려가고 있습니다. [this.GetName]의 세속적, 영적 지도자인 우리가 [this.species.GetName]족의 운명이 아직 봉인되지 않았음을 증명해야 합니다!"
 lrsk_gov_var_direct_revelation.90.a:0 "우리의 운명은 아직 쓰이지 않았다!"
 lrsk_gov_var_direct_revelation.90.a.tooltip:0 "당신의 제국은 §G$lrsk_gov_var_empire_endisnigh$§! 보정치를 보유하여, 탐사 속도와 식민지 개발 속도가 §G20%§! 향상됩니다."
