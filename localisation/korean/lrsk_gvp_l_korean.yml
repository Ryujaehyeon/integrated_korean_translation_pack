 job_lrsk_gov_var_job_hedge_preacher:0 "순회 설교자"
 job_lrsk_gov_var_job_hedge_preacher_plural:0 "$job_lrsk_gov_var_job_hedge_preacher$s"
 job_lrsk_gov_var_job_hedge_preacher_desc:0 "새로운 종교 운동이나 자발적으로 발전한 자신만의 특이한 신조를 전파하는 떠돌이 열성가와 복음 전도자입니다."
 job_lrsk_gov_var_job_hedge_preacher_effect_desc:0 "£job_lrsk_gov_var_job_hedge_preacher£ $job_lrsk_gov_var_job_hedge_preacher_plural$는 $r_unity$와 $r_amenities$를 생산합니다."
