 lrsk_gov_var_distributed_planning_systems.20.name:0 "$RESULT_STRING$ 결론 없음..."
 lrsk_gov_var_distributed_planning_systems.20.desc:0 "지역 행정 서브루틴들은 어떤 절차 변경을 해야 할지 합의에 이르지 못했고, 명확한 개선 경로도 보지 못했습니다. 이번 감사는 현재 [this.GetName]의 생산을 최적화하지 못했습니다.\n\n로그를 디버깅하면 이 과정을 다듬고 [this.GetName]의 체계에 대한 우리의 이해를 개선하여, 향후 시도가 성공할 가능성을 높일 수 있기를 바랍니다."
 LRSK_GOV_VAR_SUBLIGHT_ORIGINS_COL_CORR_COMMON:0 "§P이는 식민지 부패를 증가시킬 것입니다!§!"
 LRSK_GOV_VAR_SUBLIGHT_ORIGINS_INTRO_1:0 "초광속 여행의 비밀을 배우기 전, 우리는 재래식 추진기로 여러 성간 식민 임무를 보냈습니다. 그중 셋은 가장 가까운 성계들에 뿌리를 내렸습니다. 하나는 새 세계에서 §G우리 정부에 충성하며 우리 사회를 재현하려고 시도§!하고, 하나는 냉동수면 기술의 혜택을 받지 못해 §Y도착하기 전까지 여러 세대가 식민선에서 살고 죽었으며§!, 마지막 하나는 §R우리의 통치 이상을 거부한 반체제 인사들§!로 이루어진 일종의 부적응자 섬입니다. 이 뒤섞인 무리로부터 우리는 만들어 내야 합니다"
 LRSK_GOV_VAR_SUBLIGHT_ORIGINS_INTRO_2:0 ".\n\n우리는 식민지들을 묶기 위한 권리와 의무의 법적 틀을 구축했습니다"
 LRSK_GOV_VAR_SUBLIGHT_ORIGINS_INTRO_3:0 ":\n\n-이 체제의 지도자로서 우리의 정통성 인정.\n-상호 원조와 방위.\n-식민지들의 추가 식민화 노력에 대한 엄격한 규제.\n"
 LRSK_GOV_VAR_SUBLIGHT_ORIGINS_INTRO_4:0 "\n§H이러한 엄격한 규정은 우리가 형성할 수 있는 다른 어떤 종속국/고객 관계보다 우선합니다.§! 바라건대, 이는 우리에게 꽤 오랫동안 지속될 것입니다...\n\n이제 서명식 날이 되었고, 우리는 우리 문명의 새로운 시대 분위기를 정할 연설을 할 기회를 얻었습니다. 무엇을 말해야 할까요?"
 lrsk_gov_var_sublight_origins.101.name:0 "아광속 식민 헌장"
 lrsk_gov_var_sublight_origins.101.desc.a:0 "$LRSK_GOV_VAR_SUBLIGHT_ORIGINS_INTRO_1$ 하나의 제국을$LRSK_GOV_VAR_SUBLIGHT_ORIGINS_INTRO_2$ 우리에게$LRSK_GOV_VAR_SUBLIGHT_ORIGINS_INTRO_3$-초공간 드라이브 사용 제한, 이를 통해 우리에게 실질적 독점을 부여.\n$LRSK_GOV_VAR_SUBLIGHT_ORIGINS_INTRO_4$"
 lrsk_gov_var_sublight_origins.101.desc.b:0 "$LRSK_GOV_VAR_SUBLIGHT_ORIGINS_INTRO_1$ 하나의 공동체를$LRSK_GOV_VAR_SUBLIGHT_ORIGINS_INTRO_2$ 함께$LRSK_GOV_VAR_SUBLIGHT_ORIGINS_INTRO_3$$LRSK_GOV_VAR_SUBLIGHT_ORIGINS_INTRO_4$"
 lrsk_gov_var_sublight_origins.101.a:0 "공동선을 위해 일하겠다는 우리의 의지를 강조한다."
 lrsk_gov_var_sublight_origins.101.a.tooltip:0 "이는 식민지들을 §G기쁘게§! 할 것입니다."
 lrsk_gov_var_sublight_origins.101.b:0 "우리의 힘과 권위를 강조한다."
 lrsk_gov_var_sublight_origins.101.b.tooltip:0 "이는 식민지들을 §R짜증나게§! 할 것입니다."
 lrsk_gov_var_sublight_origins.101.c:0 "관세 유예를 선언한다."
 lrsk_gov_var_sublight_origins.101.c.tooltip:0 "10년 동안 §R우리에게 $r_trade$§R 불이익§!이 적용되고, 모든 식민지는 $r_trade$ 보너스를 얻습니다. $lrsk_gov_var_sublight_origins.101.a.tooltip$"
 lrsk_gov_var_sublight_origins.101.d:0 "오래된 빚을 회수한다."
 lrsk_gov_var_sublight_origins.101.d.tooltip:0 "10년 동안 §G우리에게 $r_trade$§G 보너스§!가 적용되고, 모든 식민지는 $r_trade$ 불이익을 받습니다. $lrsk_gov_var_sublight_origins.101.b.tooltip$"
 lrsk_gov_var_sublight_origins.101.e:0 "대충 영감을 주는 말로 유지한다."
 lrsk_gov_var_sublight_origins.101.e.tooltip:0 "특별한 효과 없음."
 lrsk_gov_var_sublight_origins.101.f:0 "특별 거래에 열려 있음을 은근히 암시한다."
 lrsk_gov_var_sublight_origins.101.f.tooltip:0 "$LRSK_GOV_VAR_SUBLIGHT_ORIGINS_COL_CORR_COMMON$"
 LRSK_GOV_VAR_SUBLIGHT_ORIGINS_FTL_BREAK_PRE:0 "불행한 소식입니다. 우리의 아랫것들인 [from.GetName]이(가) 초공간 드라이브 기술을 역설계하는 데 성공했고, 함대를 완전 기능 드라이브로 업그레이드한 듯합니다.\n\n"
 LRSK_GOV_VAR_SUBLIGHT_ORIGINS_FTL_BREAK_POS:0 "그들에 대한 우리의 우위가 영원히 지속되지 않으리라는 것은 늘 알고 있었지만, 권력이 손아귀에서 빠져나가는 느낌은 결코 좋지 않습니다."
 lrsk_gov_var_sublight_origins.4.name:0 "FTL 독점 붕괴!"
 lrsk_gov_var_sublight_origins.4.desc.a:0 "$LRSK_GOV_VAR_SUBLIGHT_ORIGINS_FTL_BREAK_PRE$$LRSK_GOV_VAR_SUBLIGHT_ORIGINS_FTL_BREAK_POS$"
 lrsk_gov_var_sublight_origins.4.desc.b:0 "$LRSK_GOV_VAR_SUBLIGHT_ORIGINS_FTL_BREAK_PRE$그들은 우리의 다른 종속국에게서 그 기술을 얻은 듯합니다. 불충이 만연하고 있습니다.\n\n$LRSK_GOV_VAR_SUBLIGHT_ORIGINS_FTL_BREAK_POS$"
 lrsk_gov_var_sublight_origins.4.a:0 "그렇다면 어쩔 수 없지."
 lrsk_gov_var_sublight_origins.4.a.tooltip:0 "§H[from.GetName]§!은(는) 자체 초공간 드라이브를 배치하면서 초공간 드라이브 가동 및 종료 속도에 대한 20% 불이익을 잃습니다."
 lrsk_gov_var_sublight_origins.4.b:0 "그들은 이를 후회하게 될 것이다!"
 lrsk_gov_var_sublight_origins.4.b.tooltip:0 "$lrsk_gov_var_sublight_origins.4.a.tooltip$ 우리는 이 일로 그들을 처벌하여 $r_trade$을(를) 10% 감소시킬 것입니다. §R이는 그들을 화나게 할 것입니다§!."
 lrsk_gov_var_sublight_origins.4.c:0 "이제 채찍이 사라졌으니 당근을 써 봐야 할지도..."
 lrsk_gov_var_sublight_origins.4.c.tooltip:0 "$lrsk_gov_var_sublight_origins.4.a.tooltip$ 우리는 그들에게 특별 특혜를 부여하여 $r_trade$을(를) 10% 증가시킬 것입니다. §G이는 그들을 기쁘게 할 것입니다§!, 하지만 §R다른 식민지들을 불쾌하게 할 것입니다§!. $LRSK_GOV_VAR_SUBLIGHT_ORIGINS_COL_CORR_COMMON$"
 lrsk_gov_var_sublight_origins.4.d:0 "우리가 그렇게 잘 대해 줬는데... 이 무례함이라니..."
 lrsk_gov_var_sublight_origins.4.d.tooltip:0 "$lrsk_gov_var_sublight_origins.4.a.tooltip$ 우리는 가능한 모든 방식으로 이 일에 대해 그들을 처벌할 것입니다! §R이는 그들을 크게 화나게 할 것입니다§!."
 lrsk_gov_var_sublight_origins.4.e:0 "저쪽의 핵심 인물 몇 명을 '설득'해 보자..."
 lrsk_gov_var_sublight_origins.4.e.tooltip:0 "당신은 §H[from.GetName]§! 정부의 핵심 인물들에게 뇌물을 주거나 다른 방식으로 유인하려 시도할 것이며, 이는 §G그들의 우리에 대한 우호도를 높일 것입니다§!. $LRSK_GOV_VAR_SUBLIGHT_ORIGINS_COL_CORR_COMMON$"
 LRSK_GOV_VAR_SUBLIGHT_ORIGINS_FTL_PASS_PRE:0 "§H[from.GetName]§!으로부터 메시지가 도착했습니다:"
 LRSK_GOV_VAR_SUBLIGHT_ORIGINS_FTL_PASS_POS:0 "메시지의 어조로 보아, 그들은 이 일에 대해 어떤 형태의 인정을 기대하는 것이 분명합니다."
 lrsk_gov_var_sublight_origins.43.name:0 "칭찬할 만한 충성?"
 lrsk_gov_var_sublight_origins.43.desc.a:0 "$LRSK_GOV_VAR_SUBLIGHT_ORIGINS_FTL_PASS_PRE$ 그들은 '외교적 예의의 문제로' 초공간 드라이브 기술을 개발하여 우리의 통제를 우회하려 했던 '불량 연구팀'을 발견하고 숙청했다고 알려 왔습니다. $LRSK_GOV_VAR_SUBLIGHT_ORIGINS_FTL_PASS_POS$"
 lrsk_gov_var_sublight_origins.43.a:0 "보상은 확실히 필요하다."
 lrsk_gov_var_sublight_origins.43.a.tooltip:0 "§H[from.GetName]§!은(는) 보상을 받겠지만, §R다른 아광속 봉신들은 이를 원망할 것입니다.§!"
 lrsk_gov_var_sublight_origins.43.b:0 "그들은 그저 의무를 다했을 뿐이다."
 lrsk_gov_var_sublight_origins.43.b.tooltip:0 "§H[from.GetName]§!은(는) §R실망할 것입니다.§!"
 lrsk_gov_var_sublight_origins.43.c:0 "보상은 좋은 본보기가 될 것이다."
 lrsk_gov_var_sublight_origins.43.c.tooltip:0 "$lrsk_gov_var_sublight_origins.43.a.tooltip$"
 lrsk_gov_var_sublight_origins.43.d:0 "그건 됐고, 배신자들을 처벌하라!"
 lrsk_gov_var_sublight_origins.43.d.tooltip:0 "$lrsk_gov_var_sublight_origins.43.b.tooltip$ $LRSK_GOV_VAR_SUBLIGHT_ORIGINS_FTL_PASS_PUNISH$\" # +150 영향력"
 lrsk_gov_var_sublight_origins.43.e:0 "관련자 모두가 마땅한 대가를 받을 것이다."
 lrsk_gov_var_sublight_origins.43.e.tooltip:0 "$lrsk_gov_var_sublight_origins.43.a.tooltip$ $LRSK_GOV_VAR_SUBLIGHT_ORIGINS_FTL_PASS_PUNISH$\" # +50 영향력"
 lrsk_gov_var_sublight_origins.43.f:0 "그렇다면 적절한... 발언을 준비하라."
 lrsk_gov_var_sublight_origins.43.f.tooltip:0 "특별한 효과 없음."
 lrsk_gov_var_sublight_origins.5.name:0 "현상 유지 흔들기"
 lrsk_gov_var_sublight_origins.5.desc:0 "§H[from.GetName]§! 정부에 있는 우리의 아랫것들이 보낸 사절들이 곤란한 안건을 들고 도착했습니다. 그들은 이제 자체 초공간 드라이브를 만들 능력이 있다고 주장합니다. 이를 배치하는 것이 우리의 이익에 반한다는 점을 이해한 그들은 거래를 제안합니다. FTL 여행에 대한 우리의 독점을 존중하는 대가로, 자신들의 활동에 대한 여러 규제를 해제해 달라는 것입니다."
 lrsk_gov_var_sublight_origins.5.a:0 "터무니없군! 조금 더 빨리 날게 하더라도, 우리는 협박당하지 않는다."
 lrsk_gov_var_sublight_origins.5.a.tooltip:0 "§H[from.GetName]§!은(는) 화가 날 것이며, 자체 초공간 드라이브를 배치하면서 초공간 드라이브 가동 및 종료 속도에 대한 25% 불이익을 잃습니다."
 lrsk_gov_var_sublight_origins.5.b:0 "어쩌면 거래하는 것이 최선일지도..."
 lrsk_gov_var_sublight_origins.5.b.tooltip:0 "§H[from.GetName]§!은(는) 기뻐할 것이며, 확장 속도 20% 감소를 잃습니다."
 lrsk_gov_var_sublight_origins.5.c:0 "$lrsk_gov_var_sublight_origins.5.b$"
 lrsk_gov_var_sublight_origins.5.c.tooltip:0 "§H[from.GetName]§!은(는) 기뻐할 것이며, $r_trade$에 5% 보너스를 얻습니다."
 lrsk_gov_var_sublight_origins.6.name:0 "식민지 협상"
 lrsk_gov_var_sublight_origins.6.desc:0 "우리 식민지 중 하나가 식민 규정에 대해 불평하기 위해 사절을 보냈습니다. §H[from.GetName]§!은(는) 그것들이 지나치게 부담스럽고 낡았으며 결국 누구에게도 이롭지 않다고 느끼는 듯하며, 폐지를 제안합니다."
 lrsk_gov_var_sublight_origins.6.a:0 "어쩌면 이것이 최선일지도..."
 lrsk_gov_var_sublight_origins.6.a.tooltip:0 "모든 아광속 식민지는 확장 속도 20% 감소를 잃습니다. 그들은 기뻐할 것입니다."
 lrsk_gov_var_sublight_origins.6.b:0 "삐걱거리는 바퀴에 기름을 치는 법이지!"
 lrsk_gov_var_sublight_origins.6.b.tooltip:0 "§H[from.GetName]§!은(는) 확장 속도 20% 감소를 잃으며, 이를 고마워할 것입니다. 다른 식민지들은 불쾌해할 것입니다. $LRSK_GOV_VAR_SUBLIGHT_ORIGINS_COL_CORR_COMMON$"
 lrsk_gov_var_sublight_origins.6.c:0 "아니다, 모든 [this.GetSpeciesName]족의 선을 위해 통제를 유지해야 한다."
 lrsk_gov_var_sublight_origins.6.c.tooltip:0 "어떤 제한도 해제되지 않습니다. 모든 아광속 식민지가 화를 낼 것입니다."
 lrsk_gov_var_sublight_origins.6.d:0 "관료주의를 조금 줄이는 것은 우리 모두에게 좋을 수 있다."
 lrsk_gov_var_sublight_origins.6.d.tooltip:0 "모든 아광속 식민지는 $r_trade$에 10% 보너스를 얻습니다. 그들은 기뻐할 것입니다. 우리는 $r_trade$의 5%를 잃습니다."
 lrsk_gov_var_sublight_origins.6.e:0 "§H[from.GetName]§!이(가) 진정으로 원하는 것이 무엇인지 분명하군..."
 lrsk_gov_var_sublight_origins.6.e.tooltip:0 "§H[from.GetName]§!은(는) $r_trade$에 10% 보너스를 얻으며, 이를 고마워할 것입니다. 다른 식민지들은 불쾌해할 것입니다. $LRSK_GOV_VAR_SUBLIGHT_ORIGINS_COL_CORR_COMMON$"
 lrsk_gov_var_sublight_origins.6.f:0 "아니다, 규칙에는 다 이유가 있다."
 lrsk_gov_var_sublight_origins.6.f.tooltip:0 "모든 아광속 식민지가 화를 낼 것입니다."
 lrsk_gov_var_sublight_origins.6.g:0 "어쩌면 사절과 타협점을 찾을 수 있을지도..."
 lrsk_gov_var_sublight_origins.6.g.tooltip:0 "사절에게 뇌물을 주어 적절한 변명을 받아들이게 합니다. $LRSK_GOV_VAR_SUBLIGHT_ORIGINS_COL_CORR_COMMON$"
 lrsk_gov_var_sublight_origins.6.h:0 "우리의 지도력을 충분히 잘 설득하지 못하고 있는 것이 분명하다."
 lrsk_gov_var_sublight_origins.6.h.tooltip:0 "식민지들이 우리의 지도력을 존중하도록 설득하는 대중매체 캠페인은 우리에 대한 그들의 우호도를 높이고 불평을 더 오래 잠재울 것입니다. §Y15년 동안은 이를 다시 시도할 수 없습니다.§!"
 lrsk_gov_var_sublight_origins.70.name:0 "거래 재검토"
 LRSK_GOV_VAR_SUBLIGHT_ORIGINS_REVISE_1:0 "우리 정부의 일부 목소리가 아광속 식민 체제의 몇몇 측면에 의문을 제기하고 있습니다."
 LRSK_GOV_VAR_SUBLIGHT_ORIGINS_REVISE_C:0 "원래 식민지 주민의 안전을 위해 마련된 식민 탐사 및 식민화 규정은, 은하가 더 잘 알려진 지금 우리의 경제 성장과 잠재력을 억누르고 있을 뿐입니다."
 LRSK_GOV_VAR_SUBLIGHT_ORIGINS_REVISE_F:0 "초공간 드라이브 특허는 우리 식민지들이 상호 방위에 기여할 능력을 제한하는 편집증적 조치입니다."
 LRSK_GOV_VAR_SUBLIGHT_ORIGINS_REVISE_2:0 "어쨌든 이런 제한은 식민지들과의 관계를 방해하여 더 발전된 조직 형태를 가로막고 있습니다. 변화를 줄 때가 되었을까요?"
 LRSK_GOV_VAR_SUBLIGHT_ORIGINS_REVISE_N:0 "§H이는 체제의 더 깊은 개혁을 위해 필요합니다.§!"
 lrsk_gov_var_sublight_origins.70.desc.a:0 "$LRSK_GOV_VAR_SUBLIGHT_ORIGINS_REVISE_1$ 그들은 $LRSK_GOV_VAR_SUBLIGHT_ORIGINS_REVISE_C$라고 말합니다.\n\n$LRSK_GOV_VAR_SUBLIGHT_ORIGINS_REVISE_2$"
 lrsk_gov_var_sublight_origins.70.desc.b:0 "$LRSK_GOV_VAR_SUBLIGHT_ORIGINS_REVISE_1$ 그들은 $LRSK_GOV_VAR_SUBLIGHT_ORIGINS_REVISE_F$라고 말합니다.\n\n$LRSK_GOV_VAR_SUBLIGHT_ORIGINS_REVISE_2$"
 lrsk_gov_var_sublight_origins.70.desc.c:0 "$LRSK_GOV_VAR_SUBLIGHT_ORIGINS_REVISE_1$ 그들은 $LRSK_GOV_VAR_SUBLIGHT_ORIGINS_REVISE_C$라고 말합니다. 또 다른 이들은 $LRSK_GOV_VAR_SUBLIGHT_ORIGINS_REVISE_F$라고 말합니다. 어쩌면 두 관점 모두 일리가 있을지도 모릅니다.\n\n$LRSK_GOV_VAR_SUBLIGHT_ORIGINS_REVISE_2$"
 lrsk_gov_var_sublight_origins.70.a:0 "탐사 및 식민화 규정은 폐지되어야 한다."
 lrsk_gov_var_sublight_origins.70.a.tooltip:0 "$lrsk_gov_var_sublight_origins.6.a.tooltip$ $LRSK_GOV_VAR_SUBLIGHT_ORIGINS_REVISE_N$"
 lrsk_gov_var_sublight_origins.70.b:0 "FTL 데이터를 공개하라. 식민지들이 따라잡을 때다."
 lrsk_gov_var_sublight_origins.70.b.tooltip:0 "모든 아광속 식민지는 초공간 드라이브 속도 25% 불이익을 잃습니다. 그들은 기뻐할 것입니다. $LRSK_GOV_VAR_SUBLIGHT_ORIGINS_REVISE_N$"
 lrsk_gov_var_sublight_origins.70.c:0 "발전을 위해 두 제한을 모두 해제하라."
 lrsk_gov_var_sublight_origins.70.c.tooltip:0 "모든 아광속 식민지는 초공간 드라이브 속도 25% 불이익과 확장 속도 20% 감소를 모두 잃습니다. 그들은 매우 기뻐할 것입니다. $LRSK_GOV_VAR_SUBLIGHT_ORIGINS_REVISE_N$"
 lrsk_gov_var_sublight_origins.70.d:0 "이건 고려할 만하군... 나중에."
 lrsk_gov_var_sublight_origins.70.d.tooltip:0 "지금은 아무 일도 일어나지 않지만, §Y약 10년 후 이 문제에 대해 다시 질문받을 수 있습니다.§!"
 lrsk_gov_var_sublight_origins.70.e:0 "이런 징징거림으로 다시는 나를 귀찮게 하지 마라."
 lrsk_gov_var_sublight_origins.70.e.tooltip:0 "아무것도 바뀌지 않으며, §R이 문제에 대해 다시 질문받지 않습니다.§!"
 lrsk_gov_var_sublight_origins.7.name:0 "변화의 때인가?"
 lrsk_gov_var_sublight_origins.7.desc:0 "지금까지 우리가 성간 아광속 식민지들과 유지해 온 체제는 충분히 순조롭게 굴러갔습니다. 그러나 식민 구조가 지나치게 경직되거나 우리에게 충분한 이익을 주지 못하게 될 수도 있습니다. 체제를 바꾸는 것을 생각해 볼 필요가 있을지도 모릅니다."
 lrsk_gov_var_sublight_origins.7.a:0 "어쩌면 이걸 고려해 봐야겠군."
 lrsk_gov_var_sublight_origins.7.a.tooltip:0 "식민지 재구조화 특별 프로젝트를 얻습니다."
 LRSK_GOV_VAR_COLONIAL_RESTRUCTURING:0 "식민지 재구조화"
 LRSK_GOV_VAR_COLONIAL_RESTRUCTURING_DESC:0 "아광속 식민지들과의 현재 상황을 재검토하기 위해, 우리는 사회과학 및 역사 전문가 팀을 배정하여 대안을 모델링하게 할 것입니다. §H이는 어떤 형태로든 중대한 외교적 변화를 초래합니다.§! 한 선택지는 당신이 연방에 속해 있지만 지도자가 아니라면 §R외교 상황을 급격히 바꿀 수 있습니다§!. 그러나 즉시 최종 결정을 내릴 필요는 없습니다."
 LRSK_GOV_VAR_SUBLIGHT_ORIGINS_DECIDE_FED:0 "모든 아광속 식민지는 우리가 이끌 연방의 일부로 독립 국가로 해방되는 제안을 받습니다. 우리가 이미 연방의 구성원이지만 지도자가 아니라면, §P우리는 그 연방을 떠나 새 연방을 구성합니다.§! 우리가 이미 연방 지도자라면, §H그들은 종속국이 아니라 독립 국가로 그 연방에 합류합니다.§! 제안을 거부한 식민지는 독립하게 됩니다"
 LRSK_GOV_VAR_SUBLIGHT_ORIGINS_DECIDE_FEDTYPE:0 "우리가 새 연방을 구성한다면, 그 유형은 다음입니다:"
 LRSK_GOV_VAR_SUBLIGHT_ORIGINS_DECIDE_VAS:0 "모든 아광속 식민지는 일반 봉신이 되는 제안을 받으며, §H이는 우리가 그들을 통합할 수 있게 합니다.§! 제안을 거부한 식민지는 독립하게 됩니다"
 LRSK_GOV_VAR_SUBLIGHT_ORIGINS_DECIDE_VASTYPE:0 "\n\n(참고: 통합은 선택 사항입니다. 다른 사회제도나 기타 이유로 종속국 유형을 변경할 능력이 있다면, 이 역시 가능해집니다.)"
 lrsk_gov_var_sublight_origins.8.name:0 "결정의 시간"
 lrsk_gov_var_sublight_origins.8.desc:0 "식민지 재구조화 연구가 완료되었습니다. 발생할 수 있는 문제는 두 가지로 보이며, 각각에는 자체 해결책이 있습니다.\n\n한편으로, 식민지들은 식민 체제 아래에서 불편을 느끼고 성장하고 강해질수록 점점 더 독립을 원할 수 있습니다. 이에 대한 해결책은 그들을 §H독립 국가로 해방하되, 우리가 이끄는 성간 조직의 보호 아래 두는 것§!입니다. 이는 그들의 자치 욕구를 충족시키고, 그들의 힘이 여전히 우리 편에 남도록 보장할 것입니다.\n\n다른 한편으로, 간접적인 식민 통치는 경제적 관점에서 시대에 뒤떨어지고 비효율적일 수 있습니다. 어쩌면 식민지들을 §H우리 국가의 일부로 통합§!하는 편이 더 나을지도 모릅니다. 먼저 각 식민지와 하나씩 통합을 협상하는 것을 목표로, 식민 확장을 완전히 중단하도록 체제를 바꿔야 할 것입니다.\n\n다만 우리가 어떤 방식으로 진행하든, 식민지들이 이러한 개혁에 동의할 수도 있고 그렇지 않을 수도 있음을 명심하십시오. 동의하지 않는 식민지는 식민 헌장에 대한 이 급격한 변화 제안을 우리와의 관계 단절 구실로 삼을 수 있습니다. 그러나 식민지와의 관계가 좋을수록 이런 일이 일어날 가능성은 낮아집니다."
 lrsk_gov_var_sublight_origins.8.a.empire:0 "고삐를 조금 늦출 때다."
 lrsk_gov_var_sublight_origins.8.a.empire.tooltip:0 "$LRSK_GOV_VAR_SUBLIGHT_ORIGINS_DECIDE_FED$, 하지만 그들이 합류하도록 강제할 CB를 얻습니다. $LRSK_GOV_VAR_SUBLIGHT_ORIGINS_DECIDE_FEDTYPE$ §H패권§!."
 lrsk_gov_var_sublight_origins.8.b.empire:0 "우리 노동의 결실을 거둘 때다."
 lrsk_gov_var_sublight_origins.8.b.empire.tooltip:0 "$LRSK_GOV_VAR_SUBLIGHT_ORIGINS_DECIDE_VAS$, 하지만 그들에 대한 종속화 CB를 얻습니다.$LRSK_GOV_VAR_SUBLIGHT_ORIGINS_DECIDE_VASTYPE$"
 lrsk_gov_var_sublight_origins.8.a.commonwealth:0 "식민지들과 동등하게 걸어갈 때다."
 lrsk_gov_var_sublight_origins.8.a.commonwealth.tooltip:0 "$LRSK_GOV_VAR_SUBLIGHT_ORIGINS_DECIDE_FED$. $LRSK_GOV_VAR_SUBLIGHT_ORIGINS_DECIDE_FEDTYPE$ §H은하 연합§!."
 lrsk_gov_var_sublight_origins.8.b.commonwealth:0 "그들을 모두 집으로 데려올 때다."
 lrsk_gov_var_sublight_origins.8.b.commonwealth.tooltip:0 "$LRSK_GOV_VAR_SUBLIGHT_ORIGINS_DECIDE_VAS$.$LRSK_GOV_VAR_SUBLIGHT_ORIGINS_DECIDE_VASTYPE$"
 lrsk_gov_var_sublight_origins.8.c:0 "어쩌면... 이 문제를 조금 더 생각해 봐야 할지도."
 lrsk_gov_var_sublight_origins.8.c.tooltip:0 "개혁 계획은 연기됩니다. §H10년§! 후 재검토를 요청받게 됩니다."
 lrsk_gov_var_sublight_origins.8.d:0 "이건 전부 너무 급진적이다. 잊어라!"
 lrsk_gov_var_sublight_origins.8.d.tooltip:0 "식민 체제 개혁 계획을 모두 취소합니다. §R이 선택은 영구적이며, 다시 개혁 선택지를 얻지 못합니다!§!"
 lrsk_gov_var_sublight_origins.81.name:0 "개혁안 완료, 하지만..."
 lrsk_gov_var_sublight_origins.81.desc:0 "우리는 식민 체제 개혁 제안서를 완성했지만, 식민 체제가 혼란에 빠져 있어 무의미해 보입니다. 그럼에도 상황이 안정될 경우를 대비해 기록으로 남겨 둘 수 있습니다."
 lrsk_gov_var_sublight_origins.81.a:0 "아주 좋습니다."
 lrsk_gov_var_sublight_origins.81.a.tooltip:0 "다시 유효한 아광속 식민지를 보유하게 된 뒤 언젠가 식민 개혁을 진행하라는 안내를 받게 됩니다."
 lrsk_gov_var_sublight_origins.9.name:0 "제안 수락!"
 lrsk_gov_var_sublight_origins.9.desc:0 "§H[from.GetName]§!은(는) 제안된 재구조화를 받아들였습니다."
 lrsk_gov_var_sublight_origins.9.a.fed:0 "모든 것이 맞아떨어지고 있군."
 lrsk_gov_var_sublight_origins.9.a.fed.tooltip:0 "§H[from.GetName]§!은(는) 독립 국가로 우리 연방에 합류합니다."
 lrsk_gov_var_sublight_origins.9.a.vas:0 "$lrsk_gov_var_sublight_origins.9.a.fed$"
 lrsk_gov_var_sublight_origins.9.a.vas.tooltip:0 "§H[from.GetName]§!은(는) 일반 봉신이 됩니다. 우리는 그들을 통합할 선택지를 갖게 됩니다."
 LRSK_GOV_VAR_SUBLIGHT_ORIGINS_REFUSE:0 "§H[from.GetName]§!은(는) 독립합니다."
 lrsk_gov_var_sublight_origins.10.name:0 "제안 거부..."
 lrsk_gov_var_sublight_origins.10.desc:0 "§H[from.GetName]§!은(는) 제안된 재구조화를 거부했습니다."
 lrsk_gov_var_sublight_origins.10.a.empire:0 "이 일의 대가를 치르게 하겠다!"
 lrsk_gov_var_sublight_origins.10.a.empire.tooltip:0 "$LRSK_GOV_VAR_SUBLIGHT_ORIGINS_REFUSE$ 우리는 그들의 준수를 강제하기 위해 전쟁을 선포할 수 있습니다."
 lrsk_gov_var_sublight_origins.10.a.commonwealth:0 "유감이군... 그럼, 밖에서 행운을 빌지!"
 lrsk_gov_var_sublight_origins.10.a.commonwealth.tooltip:0 "$LRSK_GOV_VAR_SUBLIGHT_ORIGINS_REFUSE$"
 LRSK_UPLIFT_INTRO_COMMON:0 "진보한 외계 후견자의 개입으로 별들로 끌어올려졌습니다. 이 관계는 어떻게 시작되었을까요? 그리고 왜였을까요? 이 외계 후원자는 어떤 가능성을 보았을까요?"
 LRSK_UPLIFT_TOOLT_COMMON:0 "종족 특성을 얻어, 모든 [this.GetSpeciesName] 팝에게 다음 혜택을 제공합니다:\n\n"
 LRSK_UPLIFT_TOOLT_NOUPLIFT:0 "우리는 지성화된 것이 아니라,"
 LRSK_UPLIFT_TOOLT_HIVE_UNTHINK:0 "생각 없는 생물로서, 그들은 우리를 이렇게 불렀습니다"
 LRSK_UPLIFT_TOOLT_MECH_UNTHINK:0 "단순 학습 알고리즘이 가능하게 한 것은"
 LRSK_UPLIFT_TOOLT_NORM_UNTHINK:0 "영리한 동물들이 이렇게 보였습니다"
 lrsk_gov_var_uplift.4.name:0 "지금까지의 이야기..."
 lrsk_gov_var_uplift.4.desc:0 "당신의 군체는 $LRSK_UPLIFT_INTRO_COMMON$"
 lrsk_gov_var_uplift.4.a:0 "$LRSK_UPLIFT_TOOLT_HIVE_UNTHINK$ 무리 번식자..."
 lrsk_gov_var_uplift.4.a.tooltip:0 "§L생각이 생기기 전부터, 우리는 유용한 번식력과 회복력을 보여 주었습니다.§!\n\n§H무리 번식자§! $LRSK_UPLIFT_TOOLT_COMMON$$lrsk_gov_var_trait_starborn_hive_effects$"
 lrsk_gov_var_uplift.4.b:0 "$LRSK_UPLIFT_TOOLT_HIVE_UNTHINK$ 무리 주자..."
 lrsk_gov_var_uplift.4.b.tooltip:0 "§L우리의 본능적인 협동 능력은 더 높은 사고의 가능성을 시사했습니다.§!\n\n§H무리 주자§! $LRSK_UPLIFT_TOOLT_COMMON$$lrsk_gov_var_trait_earthbound_hive_effects$"
 lrsk_gov_var_uplift.4.c:0 "$LRSK_UPLIFT_TOOLT_HIVE_UNTHINK$ 척후자..."
 lrsk_gov_var_uplift.4.c.tooltip:0 "§L우리의 무지성 군체들은 늘 전쟁 중이었고, 투쟁은 우리를 영리하게 만들었습니다.§!\n\n§H척후자§! $LRSK_UPLIFT_TOOLT_COMMON$$lrsk_gov_var_trait_proles_hive_effects$"
 lrsk_gov_var_uplift.4.d:0 "$LRSK_UPLIFT_TOOLT_NOUPLIFT$ 우리는 훈련받았습니다."
 lrsk_gov_var_uplift.4.d.tooltip:0 "§L우리 군체는 이미 깨어 있고 지성을 갖추고 있었습니다. 그들은 은하의 다른 정신들과 경쟁하도록 군체를 훈련시켰습니다.§!\n\n§H승리를 위한 조율§! 제국 보정치를 얻어 다음을 제공합니다:\n\n$trait_lrsk_gov_var_trait_enlightened_hive_effect$"
 lrsk_gov_var_uplift.5.name:0 "$lrsk_gov_var_uplift.4.name$"
 lrsk_gov_var_uplift.5.desc:0 "당신의 기계 지능은 $LRSK_UPLIFT_INTRO_COMMON$"
 lrsk_gov_var_uplift.5.a:0 "$LRSK_UPLIFT_TOOLT_MECH_UNTHINK$ 패턴 분석..."
 lrsk_gov_var_uplift.5.a.tooltip:0 "§L우리의 초기 패턴 분석 서브루틴은 이미 지성의 문턱에 있었습니다.§!\n\n§H$lrsk_gov_var_trait_natural_intellectuals_mech$§! $LRSK_UPLIFT_TOOLT_COMMON$$lrsk_gov_var_trait_natural_intellectuals_mech_effects$"
 lrsk_gov_var_uplift.5.b:0 "$LRSK_UPLIFT_TOOLT_MECH_UNTHINK$ 기술 모방..."
 lrsk_gov_var_uplift.5.b.tooltip:0 "§L지성체 기술을 복제하는 우리의 서브루틴은 참된 사고로 부트스트랩될 수 있었습니다.§!\n\n§H$lrsk_gov_var_trait_conservative_mech$§! $LRSK_UPLIFT_TOOLT_COMMON$$lrsk_gov_var_trait_proles_mech_effects$"
 lrsk_gov_var_uplift.5.c:0 "$LRSK_UPLIFT_TOOLT_MECH_UNTHINK$ 프로파일링..."
 lrsk_gov_var_uplift.5.c.tooltip:0 "§L우리의 지성체 정신 라이브러리는 우리를 그 수준으로 끌어올리는 일을 거의 너무 쉽게 만들었습니다.§!\n\n§H$lrsk_gov_var_trait_proles_mech$! $LRSK_UPLIFT_TOOLT_COMMON$$lrsk_gov_var_trait_conservative_mech_effects$"
 lrsk_gov_var_uplift.5.d:0 "$LRSK_UPLIFT_TOOLT_NOUPLIFT$ 우리는 업그레이드되었습니다."
 lrsk_gov_var_uplift.5.d.tooltip:0 "§L우리 체계는 이미 자각하고 있었지만, 그들에 의해 탐사와 발견에 맞게 최적화되었습니다.§!\n\n §H호기심 프로토콜§! 제국 보정치를 얻어 다음을 제공합니다:\n\n$trait_lrsk_gov_var_trait_enlightened_mech_effect$"
 lrsk_gov_var_uplift.6.name:0 "$lrsk_gov_var_uplift.4.name$"
 lrsk_gov_var_uplift.6.desc:0 "당신의 문명은 $LRSK_UPLIFT_INTRO_COMMON$"
 lrsk_gov_var_uplift.6.a:0 "$LRSK_UPLIFT_TOOLT_NORM_UNTHINK$ 별 태생..."
 lrsk_gov_var_uplift.6.a.tooltip:0 "§L우리의 동물 조상들은 언제나 저 너머, 별들을 바라보는 듯했습니다.§!\n\n§H별 태생§! $LRSK_UPLIFT_TOOLT_COMMON$$lrsk_gov_var_trait_starborn_effects$"
 lrsk_gov_var_uplift.6.b:0 "$LRSK_UPLIFT_TOOLT_NORM_UNTHINK$ 땅붙이..."
 lrsk_gov_var_uplift.6.b.tooltip:0 "§L고향 영역을 향한 우리의 본능적 편향은 유용해 보였습니다.§!\n\n§H땅붙이§! $LRSK_UPLIFT_TOOLT_COMMON$$lrsk_gov_var_trait_earthbound_effects$"
 lrsk_gov_var_uplift.6.c:0 "$LRSK_UPLIFT_TOOLT_NORM_UNTHINK$ 거의 지적인..."
 lrsk_gov_var_uplift.6.c.tooltip:0 "§L우리의 기묘한 직관과 독창성은 큰 가능성을 보여 주었습니다.§!\n\n§H타고난 지식인§! $LRSK_UPLIFT_TOOLT_COMMON$$lrsk_gov_var_trait_natural_intellectuals_effects$"
 lrsk_gov_var_uplift.6.d:0 "$LRSK_UPLIFT_TOOLT_NORM_UNTHINK$ 노동자처럼..."
 lrsk_gov_var_uplift.6.d.tooltip:0 "§L우리의 큰 힘과 끈기는 노동에 쓰일 수 있었습니다.§!\n\n§H노동자§! $LRSK_UPLIFT_TOOLT_COMMON$$lrsk_gov_var_trait_proles_effects$"
 lrsk_gov_var_uplift.6.e:0 "$LRSK_UPLIFT_TOOLT_NORM_UNTHINK$ 이상하게 보수적인..."
 lrsk_gov_var_uplift.6.e.tooltip:0 "§L우리의 짐승 같은 고집은 도전처럼 보였습니다.§!\n\n§H보수적§! $LRSK_UPLIFT_TOOLT_COMMON$$lrsk_gov_var_trait_conservative_effects$"
 lrsk_gov_var_uplift.6.f:0 "$LRSK_UPLIFT_TOOLT_NOUPLIFT$ 우리는 계몽되었습니다."
 lrsk_gov_var_uplift.6.f.tooltip:0 "§L우리 문명은 젊었고, 외계인과의 만남은 더 많은 것을 발견하고 싶게 만들었습니다.§!\n\n§H계몽됨§! 제국 보정치를 얻어 다음을 제공합니다:\n\n$trait_lrsk_gov_var_trait_enlightened_effect$"
 lrsk_gov_var_uplift.8.hive.desc:0 "[Root.GetSpeciesNamePlural]. 우리 집단은 오랜 세월 [lrsk_uplift_watchpost_star.GetName] 성계에서 수많은 눈으로 너희를 지켜보아 왔음을 알아라. 이제 [Root.GetSpeciesNamePlural]이(가) 별들로 확장하고 있으니, 우리는 이 성계가 더 이상 [lrsk_my_uplift_tutor.GetName]의 일부일 필요가 없다고 결정했다. 이를 너희에게 선물한다."
 lrsk_gov_var_uplift.8.mech.desc:0 "주의 [Root.GetSpeciesNamePlural]: 신규 자원을 사용할 수 있습니다. [lrsk_uplift_watchpost_star.GetName] 성계의 감시초소 시설은 [lrsk_my_uplift_tutor.GetName]에서 폐기 대상으로 지정되었습니다. [Root.GetSpeciesNamePlural]이(가) 성간 여행에 참여하게 된 지금 불필요하기 때문입니다. 선택지: [lrsk_uplift_pupil.GetName]이(가) 소유권을 인수할 수 있습니다."
 lrsk_gov_var_uplift.8.norm.desc:0 "안녕, [Root.GetSpeciesNamePlural]. 한때 우리가 그랬듯 너희가 처음으로 별들을 향해 나아가는 모습을 보니 자부심으로 가득 차는군. 우리 사람들이 [lrsk_uplift_watchpost_star.GetName] 성계에서 너희를 관찰하고 인도해 온 세월 동안, 우리는 이 날이 오리라는 것을 늘 알고 있었다. 그렇다면 이제 그 오래된 감시초소 시설은 더 이상 필요하지 않을지도 모르지. 졸업 선물로, 그것을 너희에게 넘기고자 한다."
 lrsk_gov_var_uplift.8.hive.a:0 "우리는 그것을 우리 집단 안으로 받아들인다."
 lrsk_gov_var_uplift.8.mech.a:0 "확인: 신규 자원을 통합합니다."
 lrsk_gov_var_uplift.8.norm.a:0 "감사합니다. 실망시키지 않겠습니다."
 lrsk_gov_var_uplift.8.a.tooltip:0 "우리는 [lrsk_uplift_watchpost_star.GetName] 성계와 그곳에 주둔한 함대의 통제권을 얻게 됩니다."
 lrsk_gov_var_uplift.8.hive.b:0 "하지만 우리 집단이 아직 준비되지 않았다면?"
 lrsk_gov_var_uplift.8.mech.b:0 "경고: 우리 체계가 준비되었는지 불명확합니다."
 lrsk_gov_var_uplift.8.norm.b:0 "고맙지만... 바깥 은하는 무섭다고요!"
 lrsk_gov_var_uplift.8.b.tooltip:0 "[lrsk_my_uplift_tutor.GetName]은(는) [lrsk_uplift_watchpost_star.GetName] 성계의 항성기지에서 계속 우리를 보호할 것입니다. [lrsk_my_uplift_tutor.GetName]은(는) 우리에 대해 더 보호적인 태도를 보이게 될 수 있습니다."
 lrsk_gov_var_uplift.11.hive.desc:0 "흥미롭군. [Root.GetSpeciesNamePlural]이(가) 새로운 설계를 낳았다... 행성에 묶인 존재들을 멀리서 지켜보는 대신, 원시 문명의 세계 바로 위에 관측소를 짓는다고? [lrsk_my_uplift_tutor.GetName]은(는) 모든 방향을 보고 모든 것을 보지만, 돌이켜보면 어쩐지 우리는 훨씬 더 분명히 볼 수 있다."
 lrsk_gov_var_uplift.11.mech.desc:0 "[Root.GetName]에 대한 질의: 예상 밖의 보호 행동. [lrsk_my_uplift_tutor.GetName]이(가) [Root.GetSpeciesNamePlural]을(를) 지성화했을 때, 이상적인 관측 지점은 인근 성계로 결정되었습니다. 원시 세계 바로 위에 건설하는 것이 계산되지 않은 이점을 제공합니까?"
 lrsk_gov_var_uplift.11.norm.desc:0 "영리한 [Root.GetSpeciesNamePlural]이군! 행성에 묶인 원시 문명 바로 위에 감시초소를 짓다니? 광년이나 떨어진 곳이 아니라? 정말 좋은 생각이야. 왜 우리는 그걸 생각하지 못했을까!"
 lrsk_gov_var_uplift.11.hive.a:0 "우리의 지적 성장은 [lrsk_my_uplift_tutor.GetName]을(를) 압도한다!"
 lrsk_gov_var_uplift.11.mech.a:0 "제안: [lrsk_my_uplift_tutor.GetName] 계획 알고리즘 업그레이드."
 lrsk_gov_var_uplift.11.norm.a:0 "어쩌면 제자가 스승을 넘어선 걸까?"
 lrsk_gov_var_uplift.11.a.tooltip:0 "[lrsk_my_uplift_tutor.GetName]은(는) 당신의 태도를 §R좋아하지 않을 것입니다§!."
 lrsk_gov_var_uplift.11.hive.b:0 "하지만 의심이 우리의 수십억 정신을 휘감는다."
 lrsk_gov_var_uplift.11.mech.b:0 "위험 요인은 한계 내에 있지만, 여전히 우려됩니다."
 lrsk_gov_var_uplift.11.norm.b:0 "역효과가 나지 않기를 바랄 뿐이지..."
 lrsk_gov_var_uplift.11.b.tooltip:0 "[lrsk_my_uplift_tutor.GetName]은(는) 우리에 대해 더 보호적인 태도를 보이게 될 수 있습니다."
 lrsk_gov_var_uplift.11.hive.c:0 "당신의 인도가 있었기에 우리 집단은 이만큼 발전할 수 있었다."
 lrsk_gov_var_uplift.11.mech.c:0 "모든 체계는 이전 설계에 기반해 업그레이드됩니다."
 lrsk_gov_var_uplift.11.norm.c:0 "거인의 어깨 위에 섰기에 우리는 더 멀리 볼 수 있었습니다."
 lrsk_gov_var_uplift.11.c.tooltip:0 "[lrsk_my_uplift_tutor.GetName]은(는) 당신의 태도를 §G좋아할 것입니다§!."
 LRSK_UPLIFT_REWARD_COMMON:0 "[lrsk_uplift_grandchild.GetName]의 일은 우리의 뿌리를 떠올리게 하고 자부심으로 채워 줍니다. 우리는 이제 한때 우리의 후견자들이 우리에게 그랬듯, 원시 문명의 발전을 앞당길 만큼 멀리 왔습니다."
 lrsk_gov_var_uplift.120.name:0 "[lrsk_uplift_grandchild.GetName]의 승격"
 lrsk_gov_var_uplift.120.desc:0 "성공적인 지성화 $LRSK_UPLIFT_REWARD_COMMON$"
 lrsk_gov_var_uplift.120.a:0 "은하 생명의 순환 속 우리 역할이 확인되었다."
 lrsk_gov_var_uplift.120.a.tooltip:0 "5년 동안 §H$lrsk_gov_var_empire_uplift_cycle$§! 제국 보정치를 부여하여, $r_unity$ 획득을 10%§! 증가시키고 £happiness£ §Y행복도§!를 §G5%§! 증가시킵니다."
 lrsk_gov_var_uplift.120.b:0 "훌륭하지만, 다시는 이 일로 귀찮게 하지 마라."
 lrsk_gov_var_uplift.120.b.tooltip:0 "$lrsk_gov_var_uplift.120.a.tooltip$\n\n§P이 메시지를 다시 보지 않습니다.§!"
 lrsk_gov_var_uplift.130.name:0 "[lrsk_uplift_grandchild.GetName]의 계몽"
 lrsk_gov_var_uplift.130.desc:0 "성공적인 계몽 $LRSK_UPLIFT_REWARD_COMMON$"
 lrsk_gov_var_uplift.130.a:0 "$lrsk_gov_var_uplift.120.a$"
 lrsk_gov_var_uplift.130.a.tooltip:0 "5년 동안 §H$lrsk_gov_var_empire_enlighten_cycle$§! 제국 보정치를 부여하여, $r_unity$ 획득을 10%§! 증가시키고 £happiness£ §Y행복도§!를 §G5%§! 증가시킵니다."
 lrsk_gov_var_uplift.130.b:0 "$lrsk_gov_var_uplift.120.b$"
 lrsk_gov_var_uplift.130.b.tooltip:0 "$lrsk_gov_var_uplift.130.a.tooltip$\n\n§P이 메시지를 다시 보지 않습니다.§!"
 lrsk_gov_var_uplift.14.hive.desc:0 "매혹적이다. [Root.GetSpeciesNamePlural]이(가) 새로운 지성 생명을 은하적 집단으로 끌어올렸다. 우리는 수십억 자손의 부모이지만, [Root.GetName]은(는) 그중에서도 가장 인상적일지도 모른다."
 lrsk_gov_var_uplift.14.mech.desc:0 "[Root.GetName]의 최근 행동은 높은 관심 대상입니다. [Root.GetSpeciesNamePlural]을(를) 업그레이드하는 과정에서 [lrsk_my_uplift_tutor.GetName]이(가) 어떤 재귀 과정을 시작했습니까? 이는 추가 분석할 가치가 있습니다."
 lrsk_gov_var_uplift.14.norm.desc:0 "오. 오! 정말 해냈구나... 우리 발자취를 너무나 잘 따라와서, 이제 너희 사람들도 또 다른 존재의 부모가 되었어! 우리가 '조부모'가 되었다는 것이 정말 자랑스럽군. 잘했다!"
 lrsk_gov_var_uplift.14.hive.a:0 "이 순환은 모두를 목적 안에서 하나로 묶는다."
 lrsk_gov_var_uplift.14.mech.a:0 "분석: [lrsk_my_uplift_tutor.GetName]이(가) 프로그래밍한 호기심을 추구했을 뿐입니다."
 lrsk_gov_var_uplift.14.norm.a:0 "우리에게도 잘 풀렸으니, 안 될 이유가 있나?"
 lrsk_gov_var_uplift.14.a.tooltip:0 "지성화 또는 계몽은 §G[lrsk_my_uplift_tutor.GetName]의 당신에 대한 우호도를 향상시킬 것입니다§!."
 LRSK_GVP_CHARTER_AGREEMENT_NOTE:0 "\n\n(참고: 협정 메뉴에서도 이 변경을 할 수 있습니다.)"
 LRSK_GVP_CHARTER_COMMON:0 "[from.GetName]을(를) 우리 휘하의 §H$preset_lrsk_gov_var_subject_chartered_company$§! 종속국으로 만들어, 그들의 정부 형태를 $lrsk_gov_var_gov_colonial_company$(으)로 변경합니다. 다음 효과가 적용됩니다:\n$preset_lrsk_gov_var_subject_chartered_company_eff$"
 lrsk_gov_var_chartered.2.name:0 "[from.GetName]의 지위"
 lrsk_gov_var_chartered.2.desc.a:0 "[from.GetSpeciesNamePlural], 즉 [from.GetName]의 주민들은 마땅하고 올바른 대로 우리에게 복종했습니다. 우리는 식민 헌장을 부과하고 그들의 정치 지도부를 우리에게 책임지는 무역 및 채굴 회사 아래에 종속시킬 선택지가 있습니다. 그렇게 하겠습니까?"
 lrsk_gov_var_chartered.2.desc.b:0 "[from.GetName]은(는) 우리의 지휘 아래 반자치 영토로 조직되었습니다. 우리는 식민 헌장을 부과하여 그들이 식민 무역 및 채굴 회사로 운영되게 할 선택지가 있습니다. 그렇게 하겠습니까?"
 lrsk_gov_var_chartered.2.a:0 "신뢰할 수 있는 [from.GetSpeciesNamePlural] 몇몇에게 책임을 맡긴다."
 lrsk_gov_var_chartered.2.a.tooltip:0 "$LRSK_GVP_CHARTER_COMMON$\n\n그들의 주 종족은 [from.GetSpeciesName] 그대로 유지됩니다.$LRSK_GVP_CHARTER_AGREEMENT_NOTE$"
 lrsk_gov_var_chartered.2.b:0 "새 식민 회사는 수익성이 좋을 것이다."
 lrsk_gov_var_chartered.2.b.tooltip:0 "$LRSK_GVP_CHARTER_COMMON$$LRSK_GVP_CHARTER_AGREEMENT_NOTE$"
 lrsk_gov_var_chartered.2.c:0 "그렇다. 하지만 [from.GetSpeciesNamePlural]은(는) 스스로 통치하도록 믿을 수 없다."
 lrsk_gov_var_chartered.2.c.tooltip:0 "$LRSK_GVP_CHARTER_COMMON$\n\n[this.GetSpeciesNamePlural]이(가) [from.GetSpeciesNamePlural]을(를) 대신하여 [from.GetName]의 주 종족이 됩니다. §Y외계종 선호§! 제국들이 [from.GetName]과 접촉 중이라면 §R이에 격분할 것입니다.§!\n\n종속국은 §G+1.5§! $r_loyalty$를 얻지만, §H불안이 뒤따를 수 있습니다§!.\n\n"
 lrsk_gov_var_chartered.2.d:0 "필요 없다."
 lrsk_gov_var_chartered.2.d.tooltip:0 "그들을 현재의 예속 상태로 남겨둡니다."
 lrsk_gov_var_chartered.20.name:0 "[lrsk_subject_to_charter.GetName]의 전복"
 lrsk_gov_var_chartered.20.desc.a:0 "[lrsk_chartering_agent.GetName]에 의해 종속된 것만으로도 굴욕이 충분하지 않았다는 듯, [lrsk_chartering_usurped_species.GetName] 사람들의 [lrsk_subject_to_charter.GetName]을(를) 지배하게 된 이 새로운 종주자들은 [lrsk_chartering_usurped_species.GetNamePlural]이(가) 스스로를 통치할 자격이 있다고 여기지 않습니다. '야만 외계종을 계몽한다'는 명목으로 [lrsk_chartering_agent.GetName]은(는) [lrsk_chartering_agent.GetSpeciesNamePlural]이(가) 이끄는 새 괴뢰 정권을 [lrsk_chartering_agent.capital_scope.GetName]에서 설치하기로 결정했습니다."
 lrsk_gov_var_chartered.20.desc.b:0 "외세에 종속된 것만으로도 굴욕이 충분하지 않았다는 듯, [lrsk_chartering_usurped_species.GetName] 사람들의 [lrsk_subject_to_charter.GetName]을(를) 지배하게 된 새로운 종주자들은 [lrsk_chartering_usurped_species.GetNamePlural]이(가) 스스로를 통치할 자격이 있다고 여기지 않습니다. '야만 외계종을 계몽한다'는 명목으로 새로운 종주자들은 자신들의 종족이 이끄는 새 괴뢰 정권을 설치하기로 결정했습니다."
 lrsk_gov_var_chartered.20.a:0 "패배자에게 재앙을..."
 lrsk_gov_var_chartered.20.b:0 "어찌 감히!"
 lrsk_gov_var_chartered.20.b.tooltip:0 "이는 §P우리 관계를 악화시켰습니다§!, 대상은 [lrsk_chartering_agent.GetName]입니다."
 lrsk_gov_var_chartered.20.c:0 "끔찍하군!"
 lrsk_gov_var_chartered.21.name:0 "외계 통치 강요"
 lrsk_gov_var_chartered.21.desc:0 "[lrsk_chartering_agent.GetName]에 의한 우리의 종속만으로도 굴욕이 충분하지 않았다는 듯, 우리의 새로운 종주자들은 우리 [lrsk_subject_to_charter.GetSpeciesNamePlural]이(가) 스스로를 통치할 자격이 있다고 여기지 않습니다. '야만 외계종을 계몽한다'는 명목으로 [lrsk_chartering_agent.GetName]은(는) [lrsk_chartering_agent.GetSpeciesNamePlural]이(가) 이끄는 새 괴뢰 정권을 [lrsk_chartering_agent.capital_scope.GetName]에서 설치하기로 결정했습니다."
 lrsk_gov_var_chartered.21.a:0 "이 또한 지나가리라..."
 lrsk_gov_var_chartered.21.b:0 "[lrsk_chartering_usurped_species.GetNamePlural]은(는) 다시 일어설 것이다!"
 lrsk_gov_var_chartered.21.b.tooltip:0 "§H저항§!의 정신이 퍼질 것입니다..."
 LRSK_GOV_VAR_TRADE_NOTICE_COMMON:0 "제국 상태 화면에서 이것이 제국 보정치로 주는 효과를 확인하십시오."
 lrsk_gov_var_chartered.4.name:0 "식민 무역 수지"
 lrsk_gov_var_chartered.4.desc:0 "식민 무역 혜택의 정기 평가가 수행되었습니다. 모든 $preset_lrsk_gov_var_subject_chartered_company$ 종속국은 §G+2%§! $r_trade$ 보너스와 §G-1%§! 시장 수수료 할인을 제공합니다."
 lrsk_gov_var_chartered.4.a:0 "상황이 어떤지 보자."
 lrsk_gov_var_chartered.4.a.tooltip:0 "$LRSK_GOV_VAR_TRADE_NOTICE_COMMON$"
 lrsk_gov_var_chartered.4.b:0 "지금은 이 정도면 충분하다."
 lrsk_gov_var_chartered.4.b.tooltip:0 "$LRSK_GOV_VAR_TRADE_NOTICE_COMMON$ §Y6개월 동안 이에 대한 알림을 받지 않습니다.§!"
 lrsk_gov_var_chartered.4.c:0 "훌륭하지만, 다시는 이 일로 귀찮게 하지 마라."
 lrsk_gov_var_chartered.4.c.tooltip:0 "$LRSK_GOV_VAR_TRADE_NOTICE_COMMON$ §P이 메시지를 다시 보지 않습니다.§!"
 lrsk_gov_var_chartered.101.name:0 "'명예로운 옛 회사'"
 lrsk_gov_var_chartered.101.desc:0 "§Y$lrsk_gov_var_civic_mc_chart_corp_board$§! 사회제도는 영국 동인도 회사 같은 역사적 식민 합자회사를 모방하도록 설계되었습니다. 많은 유럽 국가들은 탐험과 식민화 초기 시대에 이런 회사를 만들었습니다. 이 국가들은 실제로 식민 사업에 자금을 댈 돈도, 먼 땅을 통치할 행정 능력도 없었기 때문에, 추출에 대한 간접 통제 방식으로 이런 회사를 만들었습니다. 회사 주식을 팔아 초기 자금을 마련하고(초기 투자자에게 수익을 약속하면서), 동시에 그들이 만든 식민지와 모국 사이의 모든 무역에 세금을 매길 수 있었습니다.\n\n스텔라리스 초반부가 새로운 '탐험과 식민화의 시대'를 배경으로 하므로, 이는 고유한 플레이스타일을 가진 사회제도에 잘 어울린다고 보였습니다. 이는 당신을 §Y$lrsk_gov_var_gov_colonial_charter_board$§!라 불리는 민간/공공 혼합체, 즉 식민 회사를 '인가'하는 일종의 공공 지주회사 역할에 놓습니다. 작동 방식은 이렇습니다. 종속국을 획득하면, 결국 그들을 §Y$preset_lrsk_gov_var_subject_chartered_company$§! 종속국으로 바꿀 선택지를 받게 됩니다. $LRSK_SPECSUBJ_MENU_NOTICE$ 당신은 §G+10%§! $r_trade$ (최대 §G+150%§!)와 §G-5%§! 시장 수수료 할인 (최대 §G-75%§!)을 각 $preset_lrsk_gov_var_subject_chartered_company$ 통제 대상마다 얻습니다. 또한 그들은 본질적으로 당신을 종주국으로 더 좋아하므로, 여러 식민 회사를 통제하기가 더 쉬워질 것입니다."
 lrsk_gov_var_chartered.101.a:0 "사업을 시작하자!"
 LRSK_SPECSUBJ_DISMISS_COMMON:0 "다시 묻지 마라."
 LRSK_SPECSUBJ_DISMISS_COMMON_DESC:0 "이 이벤트는 다시 나타나지 않습니다. 협정 메뉴를 사용해 종속국 유형을 변경하십시오."
 LRSK_SPECSUBJ_MENU_NOTICE:0 "(협정 메뉴를 사용해 적절한 사전 설정을 적용할 수도 있습니다.)"
 personality_lrsk_gov_var_quasicollective_consciousness:0 "준집단 의식"
 personality_lrsk_gov_var_quasicollective_consciousness_desc:0 "준집단 의식은 인공 군체의식처럼 조직된 사회이며, 행동 방식도 같습니다. 무엇보다 자기 종의 번식에 관심을 두고, 확장할 여지가 있으면 온건하지만, 포위되면 절멸적으로 공격적입니다."
 LRSK_QCC_HOSTILE_GREETING_01:0 "당신은 [Root.GetName]의 길을 가로막고 있습니다. 무엇을 논의하고 싶든, 우리의 전진이 필연적임을 받아들이십시오."
 LRSK_QCC_HOSTILE_GREETING_02:0 "[Root.GetName] 밖에 있는 모든 생명은 부차적이지만, 추악한 [From.GetName]의 생명은 삼차적입니다."
 LRSK_QCC_HOSTILE_GREETING_03:0 "당신들의 집단은 거짓입니다. 시간이 지나면, 당신들은 혼란스러운 불협화음의 덩어리임을 드러낼 것입니다."
 LRSK_QCC_DOMINEERING_GREETING_01:0 "당신들의 사회는 문명을 개인들로 쪼개는 일이 모든 진보의 희망을 어떻게 파괴하는지 은하 나머지에게 보여 주는 사례입니다."
 LRSK_QCC_NEUTRAL_GREETING_01:0 "우리는 [Root.GetName]입니다. 말을 신중히 고르십시오. 당신은 우리 모두 앞에 서 있습니다."
 LRSK_QCC_NEUTRAL_GREETING_02:0 "당신이 [From.GetName] 전체를 대표해 말하기를 바랄 뿐입니다. 이 개체가 [Root.GetName]의 모든 구성원의 목소리인 것처럼 말입니다."
 LRSK_QCC_NEUTRAL_GREETING_03:0 "당신들은 통합으로 가는 여정에서 몇 걸음을 내디뎠습니다. 하지만 우리처럼 자신을 바칠 준비가 되었습니까?"
 LRSK_QCC_NEUTRAL_GREETING_04:0 "우리는 당신의 목소리 너머로 울리는 수많은 목소리의 불협화음, [From.GetSpeciesName] 의식 속의 이 부조화를 들을 수 있습니다. 어떻게 견딥니까?"
 LRSK_QCC_THREATENED_GREETING_01:0 "우리는 영겁 동안 우리 사이의 갈등을 알지 못했습니다. 당신들이 그것을 우리에게 가져오지 않기를 바랍니다."
 LRSK_QCC_FRIENDLY_GREETING_01:0 "[Root.GetName]이(가) 당신을 맞이합니다, [From.GetRulerTitle]. 당신은 우리의 일부가 아니지만, 우리가 친구 또한 소중히 여긴다는 것을 알게 될 것입니다."
 LRSK_QCC_FRIENDLY_GREETING_02:0 "우리는 당신들을 [Root.GetName]의 명예 구성원으로 생각하고 싶습니다. '동맹'이라 불리는 불완전하지만 중요한 조화 속에 사는 이들로서 말입니다."
 LRSK_QCC_FRIENDLY_GREETING_03:0 "[From.GetName]과 [Root.GetName]은(는) 내부 만장일치를 추구하는 사회들이 평화롭게 공존할 수 있다는 증거가 될 것입니다."
 LRSK_QCC_FRIENDLY_GREETING_04:0 "당신들이 내부를 '개인들'로 나누는 데 집요하게 집중하더라도, 우리는 [From.GetName] 전체에 대한 우리의 신뢰를 확신합니다."
 LRSK_QCC_WAR_GREETING_01:0 "[Root.GetAdj]에 대한 모든 장애물은 제거되어야 합니다. 단일하지만 기능적인 지성의 존재로서, 당신들은 장애물이 되지 않을 선택권을 갖고 있습니다."
 LRSK_QCC_WAR_GREETING_02:0 "우리는 [Root.GetName]입니다. 방어막을 내리고 함선을 넘기십시오."
 LRSK_QCC_WAR_GREETING_03:0 "우리가 당신들에게 가하는 각각의 죽음은 외로운 생명의 상실이지만, 당신들이 우리에게 가하는 각각의 죽음은 우리 존재의 일부를 잘라냅니다. 당신들도 우리처럼 자신들이 죽어 가는 것을 느낄 수 있습니까?"
 LRSK_QCC_WAR_GREETING_04:0 "분리된 의지를 가진 하등 생물의 무리는 [Root.GetName]의 나뉠 수 없는 결의를 결코 이길 수 없습니다."
 LRSK_QCC_VASSAL_GREETING_01:0 "[Root.GetName]의 광대한 정신 능력은 [From.GetName]의 목표를 당신들 스스로 알기 전에 알고 추구할 것입니다."
 LRSK_QCC_VASSAL_GREETING_DISLOYAL_01:0 "어째서 우리의 위대한 정신이 그런 실패한 사회의 명령을 따라야 합니까?"
 LRSK_QCC_OVERLORD_GREETING_01:0 "말하십시오, [From.GetSpeciesName]. 군체가 듣고 있습니다."
 LRSK_QCC_CONSIDER_01:0 "[Root.GetName]은(는) 당신의 제안을 처리 중입니다."
 LRSK_QCC_CONSIDER_02:0 "다수의 [Root.GetAdj] 시냅스 단위가 당신의 제안을 평가하는 데 투입되었습니다."
 LRSK_QCC_CONSIDER_03:0 "[Root.GetName]은(는) 들었으며, 결정을 내리기 위해 연결을 집중할 것입니다."
 LRSK_QCC_CONSIDER_04:0 "하나의 정신이 당신을 들었고, 하나의 정신이 답할 것입니다."
 LRSK_QCC_DOW_SELECT:0 "[Root.GetName]에 맞서 무기를 드는 일은 가볍게 할 수 없습니다, [From.GetSpeciesName]."
 LRSK_QCC_DOW_ACCEPT:0 "우리 중 하나를 파괴하려는 것은 우리 모두를 파괴하려는 것입니다. 이제 [Root.GetName]은(는) [From.GetName]에 맞섭니다."
 LRSK_QCC_DOW_PROPOSE:0 "이것은 선전포고입니다. 동화는 의무입니다."
