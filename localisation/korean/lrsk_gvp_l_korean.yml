 lrsk_gov_var_colfief.101.name:0 "탐험가 식민지와 부왕 봉신"
 lrsk_gov_var_colfief.101.desc:0 "§Y$lrsk_gov_var_civic_colonial_fiefs$§! 사회제도는 '탐험가 식민지' 정책 계통에 접근할 수 있게 합니다. 기본적으로 처음 선택된 선택지는 아무 일도 하지 않습니다. 다른 정책 선택지를 고르면 당신의 £pop£ §Y팝§!들이 미탐사 행성에 새 제국을 세우게 할 수 있으며, 그 제국은 당신 제국의 종속국이 됩니다. 단, 최소 900 £pop£ §Y팝§!이 있는 거주 행성을 보유해야 하며, 그중 최소 200 £pop£ §Y팝§!은 자유 상태이고, 정화 중이 아니며, §Y$trait_syncretic_proles$§! 특성을 갖지 않고, §Y$pop_cat_ruler$§! 계층에 속하지 않아야 합니다. 또한 당신 제국에서 어느 정도 떨어진 비소유, 비점유 성계에 미탐사 행성이 있어야 하며, 그 행성은 앞 조건을 만족하는 £pop£ §Y팝§! 중 하나에게 어느 정도 괜찮은, 최소 50%의 거주 적합도를 가져야 합니다. AI 플레이어는 플레이어의 불만을 줄이기 위해 이 기능을 사용하지 않습니다."
