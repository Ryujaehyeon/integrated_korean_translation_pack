 job_lrsk_gov_var_job_otherworld_guide:0 "이세계 안내자"
 job_lrsk_gov_var_job_otherworld_guide_plural:0 "$job_lrsk_gov_var_job_otherworld_guide$s"
 job_lrsk_gov_var_job_otherworld_guide_desc:0 "이세계 주머니 근처에서 살 만큼 정신적으로 회복력이 있거나 병든 선견자와 마녀들의 공동체입니다. 그들의 운세와 예언은 사람들이 세계 속 자신의 자리에 대해 더 큰 확신을 느끼도록 도울 뿐 아니라, 사회에 공통의 문화적 초점을 제공합니다."
 job_lrsk_gov_var_job_otherworld_guide_effect_short_desc:0 "£job_lrsk_gov_var_job_otherworld_guide£ $job_lrsk_gov_var_job_otherworld_guide_plural$는 $r_consumer_goods$를 $r_amenities$와 $r_unity$로 전환하고, $r_stability$도 증가시킵니다."
 job_lrsk_gov_var_job_otherworld_guide_effect_desc:0 "$job_lrsk_gov_var_job_otherworld_guide_effect_short_desc$\n\n$job_lrsk_gov_var_job_otherworld_guide_trait_effect$"
 job_lrsk_gov_var_job_otherworld_guide_trait_effect:0 "§M$PSIONIC$§! 승천 단계가 높아질수록 산출량이 증가합니다. 일부 산출량은 행성 소유자가 §H$lrsk_gov_var_origin_shroud_touched$§! 기원을 보유해야 열립니다. 또한 §M$PSIONIC$§! £pop£ §Y팝§!은 이 직업을 맡을 가능성이 훨씬 높습니다."
