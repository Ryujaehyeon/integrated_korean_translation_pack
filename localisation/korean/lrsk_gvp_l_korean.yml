 lrsk_government_variety_pack_backend.3.name:0 "경고: 모드 충돌 감지"
 lrsk_government_variety_pack_backend.3.desc:0 "'Government Variety Pack'과 'Civics Variety Pack' 모드를 모두 실행 중인 것으로 보입니다. 두 모드의 제작자로서, 이 둘은 함께 사용하도록 의도되지 않았음을 경고합니다. 계속 함께 사용한다면 게임의 안정성을 보장할 수 없습니다."
