 lrsk_government_variety_pack_backend.102.name:0 "$lrsk_government_variety_pack_backend.101.name$"
 lrsk_government_variety_pack_backend.102.milcorp:0 "$LRSK_GVP_BACKEND_EXPLAIN_COMMON_1$ $civic_naval_contractors$§! 및/또는 §H$civic_private_military_companies$§!는 $LRSK_GVP_BACKEND_EXPLAIN_BLDG_ENABLED$ §Y$lrsk_gov_var_bldg_military_excellence_academy$§! $BRANCH_OFFICE_BUILDING$을(를) 활성화합니다. 이 건물은 유치 행성에 §Y+50% 군국주의 선호도§!를, 유치 제국에는 §G군사 §Y£leader£ 지도자§! 경험치 획득 보너스§!를 제공하며, 거대기업에는 $LRSK_GVP_MEGACORP_SCALING_COMMON$ §Y군국주의§!를 제공합니다."
 lrsk_government_variety_pack_backend.102.media:0 "$LRSK_GVP_BACKEND_EXPLAIN_COMMON_1$ $civic_media_conglomerate$§!는 $LRSK_GVP_BACKEND_EXPLAIN_BLDG_ENABLED$ §Y$lrsk_gov_var_bldg_local_news_office$§! $BRANCH_OFFICE_BUILDING$을(를) 활성화합니다. 이 건물은 유치 행성에 §G+10%§! £pop_cat_ruler£ §Y$pop_cat_ruler$ 직업 산출§!, §Y+20% £pop_cat_specialist£ $pop_cat_specialist$ £political_power£ 정치력§!, §G+5%§! £pop_cat_specialist£ §Y$pop_cat_specialist$ £happiness£ 행복도§!를 제공합니다. 거대기업에는 §G+10%§! §Y$BRANCH_OFFICE_VALUE$§!와 §G가끔 유치 제국에게 호의를 얻을 기회§!를 제공합니다.$LRSK_CRIM_CHANGES_EXPLAIN$"
 lrsk_government_variety_pack_backend.102.prosp:0 "$LRSK_GVP_BACKEND_EXPLAIN_COMMON_1$ $civic_private_prospectors$§!는 $LRSK_GVP_BACKEND_EXPLAIN_BLDG_ENABLED$ §Y$lrsk_gov_var_bldg_offworld_jobs_placement$§! $BRANCH_OFFICE_BUILDING$을(를) 활성화합니다. 이 건물은 유치 행성에 §Y+200 £job_lrsk_gov_var_job_offworld_worker£ $job_lrsk_gov_var_job_offworld_worker$ 직업§!($job_lrsk_gov_var_job_offworld_worker_effect_desc$)을 제공하며, 거대기업에는 §G향상된 식민지 성장 속도와 채굴 기지 산출§!, 그리고 채워진 직업당 §G+5%§! §Y$BRANCH_OFFICE_VALUE$§!를 제공합니다. 대상 직업은 $job_lrsk_gov_var_job_offworld_worker$입니다.$LRSK_CRIM_CHANGES_EXPLAIN$"
 lrsk_government_variety_pack_backend.102.indent:0 "$LRSK_GVP_BACKEND_EXPLAIN_COMMON_1$ $civic_indentured_assets$§!는 $LRSK_GVP_BACKEND_EXPLAIN_BLDG_ENABLED$ §Y$lrsk_gov_var_bldg_reformatory_workhouse$§! $BRANCH_OFFICE_BUILDING$을(를) 활성화합니다. 이 건물은 유치 행성에 §G+10%§! £pop_cat_worker£ §Y$pop_cat_worker$§! 및 £pop_cat_slave£ §Y$pop_cat_slave$§! 직업 산출을 제공하고, 거대기업에는 §G+15%§! §Y$BRANCH_OFFICE_VALUE$§!를 제공합니다.$LRSK_CRIM_CHANGES_EXPLAIN$ 예를 들어, 이 건물을 운영하는 범죄 거대기업은 가끔 행성에서 £pop£ §Y팝§!을 훔쳐 노예화할 수 있습니다!"
