 lrsk_government_variety_pack_backend.101.desc:0 "당신이 §H강화 사회제도§!, 즉 §HGovernment Variety Pack§! 모드로 기능이 확장된 기본 게임 사회제도를 사용하고 있으므로, 알아 두어야 할 새 기능에 대한 설명입니다."
