 LRSK_GOV_VAR_HT_TRUEBORNDAUGHTER:0 "참혈통 딸"
 LRSK_GOV_VAR_START_SCREEN_P2_FOLKISH_REALM:0 "다른 [GetAdj] 문화들이 있습니다. 성격이 약하고 비뚤어졌지만, 그럼에도 교활하게 위협적입니다. 그들은 대부분 우리의 군사력에 의해 억제되어 있지만, 우리 백성의 혈통 중 가장 순수하고 우리의 가치를 계승한 사랑받는 왕가는 어디에서 오든 다른 열등한 외국 위협에 맞서고 봉쇄할 준비가 되어 있습니다."
 lrsk_gov_var_gov_doom_horde:0 "파멸의 무리"
 lrsk_gov_var_gov_doom_horde_desc:0 "이 정부는 광적인 외계종 혐오 부족 연맹입니다. 가장 난폭하고 치명적인 족장들의 지도 아래, 이 광전사들은 은하의 모든 약한 존재들을 무자비하게 도살할 것입니다."
 LRSK_GOV_VAR_RT_DEATH_KHAN:0 "죽음의 카간"
 LRSK_GOV_VAR_RT_DEATH_KHATUN:0 "죽음의 카툰"
 lrsk_gov_var_gov_doom_horde_imp:0 "$lrsk_gov_var_gov_doom_horde$"
 lrsk_gov_var_gov_doom_horde_imp_desc:0 "$lrsk_gov_var_gov_doom_horde_desc$"
 LRSK_GOV_VAR_HT_TERROR_JINONG:0 "공포의 지농"
 LRSK_GOV_VAR_HT_TERROR_GONJI:0 "공포의 곤지"
 LRSK_GOV_VAR_START_SCREEN_P2_DOOM_HORDE:0 "한때 다른 [GetAdj] 문화들이 있었습니다. 약하고 무른, 우월한 자들의 유희에나 어울리는 존재들이었습니다. 이 약자들은 하나씩 처리되었고, 우리 [capital_scope.GetCapitalCarrierType]은(는) 더 이상 그들의 한심한 존재라는 수치를 지니지 않게 되었습니다. 오늘날에는 오직 강자만이 남아 있습니다."
 lrsk_gov_var_gov_death_cult:0 "살육의 교회"
 lrsk_gov_var_gov_death_cult_desc:0 "이 정부는 광적인 외계종 혐오 교회입니다. 죽음의 예언자들과 유혈의 구루들의 지도 아래, 이 광신자들은 은하의 모든 사악한 외계종을 베어 지옥으로 비명을 지르며 떨어지게 할 것입니다."
 LRSK_GOV_VAR_RT_BLOOD_ABBOT:0 "피의 수도원장"
 LRSK_GOV_VAR_RT_BLOOD_ABBESS:0 "피의 여성 수도원장"
 lrsk_gov_var_gov_death_cult_imp:0 "묵시록 신정"
 lrsk_gov_var_gov_death_cult_imp_desc:0 "이 정부는 광적인 외계종 혐오 신정 군주정입니다. 살인적인 왕실 신성의 지도 아래, 이 광신자들은 은하의 모든 사악한 외계종을 베어 지옥으로 비명을 지르며 떨어지게 할 것입니다."
 LRSK_GOV_VAR_RT_BLOOD_GOD:0 "피의 신"
 LRSK_GOV_VAR_RT_BLOOD_GODDESS:0 "피의 여신"
 LRSK_GOV_VAR_HT_SLAUGHTER_HERO:0 "살육의 영웅"
 LRSK_GOV_VAR_HT_SLAUGHTER_HEROINE:0 "살육의 여걸"
 LRSK_GOV_VAR_START_SCREEN_P2_DEATH_CULT:0 "한때 다른 [GetAdj] 문화들이 있었습니다. 죄 많고 저주받은, 그 사악한 방식 자체가 끊임없는 신성모독인 존재들이었습니다. 이 죄인들은 하나씩 처리되었고, 우리 [capital_scope.GetCapitalCarrierType]은(는) 그들의 이단에서 마침내 완전히 구원되었습니다. 오늘날에는 오직 거룩한 자들만이 남아 있습니다."
 lrsk_gov_var_gov_citizen_legion:0 "시민 군단"
 lrsk_gov_var_gov_citizen_legion_desc:0 "이 정부는 정치권이 퇴역군인에게 부여되는 광적인 외계종 혐오 국가입니다. 외계종 위협을 근절하기 위해 목숨을 건 자들만이 선거권을 맡을 신뢰를 받습니다. 그 자원 군단은 정치체에 대한 모든 위협으로부터 은하를 정화할 것입니다."
 LRSK_GOV_VAR_RT_GRAVE_MARSHAL:0 "$LRSK_GVP_MARGRAV$e"
 LRSK_GOV_VAR_RT_GRAVE_MARSHAL_FEMALE:0 "$LRSK_GVP_MARGRAV$ine"
 LRSK_GOV_VAR_START_SCREEN_P2_CITIZEN_LEGION:0 "한때 다른 [GetAdj] 문화들이 있었습니다. 타락하고 악독하며, 종족의 통합에 위협이 되는 존재들이었습니다. 우리 인민의 군단들이 이 퇴폐한 자들을 하나씩 처리했고, 마침내 우리 인민은 완전한 안전을 얻었습니다. 오늘날에는 이 명예로운 복무의 퇴역군인들이 우리를 이끕니다."
 lrsk_gov_var_gov_private_military_contractor:0 "민간 군사 계약자"
 lrsk_gov_var_gov_private_military_contractor_desc:0 "이 정부는 사실 지역 및 지방 정부와 계약하여 제국에 치안, 국방, 외교 서비스를 제공하는 용병 회사입니다. 정부 내 서열은 보통 고용 군인으로의 입대를 요구하지만, 회사의 내부 구조는 꽤 민주적일 수도 있습니다."
 LRSK_GOV_VAR_RT_CAPTAIN_DIRECTOR:0 "대장-책임자"
 LRSK_GOV_VAR_RT_CAPTAIN_DIRECTOR_FEMALE:0 "$LRSK_GOV_VAR_RT_CAPTAIN_DIRECTOR$"
 LRSK_GOV_VAR_START_SCREEN_P2_PMC:0 "우리 사람들은 언제나 두 가지를 중시했습니다. 미덕의 척도로서 무용, 성공의 척도로서 부의 축적입니다. 그 결과 전쟁 수행은 오랜 세월 가장 명예로운 직업이었습니다. 최근 역사에 와서야 이 두 가치의 최적 조합이 민간 군사 계약자에서 발견되었습니다. 이는 옛 용병 회사가 발전하여 정부 보안과 세력 투사 서비스 전반을 제공하게 된 형태입니다. 오늘날 정부들은 우리 문명 전체의 보안 및 위협 관리 서비스를 어느 계약자에게 맡길지 공동으로 결정합니다."
 lrsk_gov_var_gov_citizen_crusade:0 "시민 성전"
 lrsk_gov_var_gov_citizen_crusade_desc:0 "열성적인 신앙의 군국 공화국입니다. 모든 합법 거주자는 교회 회중의 구성원이지만, 교회를 방어하고 확장하기 위해 자원하는 자들만 시민권을 갖습니다."
 LRSK_GOV_VAR_RT_MP_MARSHALL:0 "지극히 경건한 원수"
 LRSK_GOV_VAR_START_SCREEN_P2_CITIZEN_CRUSADE:0 "$LRSK_GVP_CRUSADER_START_1$ 오직 거룩한 인민군의 헌신과 용맹만이 모든 불신자를 품 안으로 데려올 수 있었습니다. 이 경건한 군사 전통은 오늘날까지 이어집니다. 순교의 위험을 감수하려는 자들만이 통치할 권리를 갖습니다."
 lrsk_gov_var_gov_crusader_order:0 "성전 기사단"
 lrsk_gov_var_gov_crusader_order_desc:0 "이 정부는 무력으로 신앙을 수호하고 전파하는 데 헌신하는 열성적인 성전 전사들의 무리가 운영합니다."
 LRSK_GOV_VAR_RT_GRANDMASTER:0 "대군주"
 LRSK_GOV_VAR_RT_GRANDMASTER_FEMALE:0 "$LRSK_GOV_VAR_RT_GRANDMASTER$"
 LRSK_GOV_VAR_START_SCREEN_P2_CRUSADER_ORDER:0 "$LRSK_GVP_CRUSADER_START_1$ 오직 의로운 성전 전사단 아래 피와 불로써만 이단과 우상숭배가 우리 [capital_scope.GetCapitalCarrierType]에서 추방될 수 있었습니다. 이 강한 신앙의 기사들은 오늘날에도 우리를 통치하며 영적 부패를 경계합니다."
 lrsk_gov_var_gov_whig_republic:0 "휘그 공화국"
 lrsk_gov_var_gov_whig_republic_desc:0 "이 정부는 역설입니다. 시민들은 정치적 연줄을 지닌 부유한 거물들이 자신들의 자유를 위협한다고 깊이 의심하며, 그들이 밤낮없이 인민을 노예로 만들 음모를 꾸미고 있다고 확신합니다. 따라서 국가 권력을 줄이기 위한 개혁 요구가 거의 끊임없이 이어지지만, 이는 결국 어쨌든 가장 큰 기업들에게 이익을 주는 경우가 많습니다. 이것이 정치 문화에 편집증적 양식을 부여하긴 하지만, 시민들이 편집증적일 이유가 없다고 누가 말할 수 있겠습니까?"
 LRSK_GOV_VAR_RT_EXEC_MINISTER:0 "집행 장관"
 LRSK_GOV_VAR_RT_EXEC_MINISTER_FEMALE:0 "$LRSK_GOV_VAR_RT_EXEC_MINISTER$"
 lrsk_gov_var_gov_whig_commonwealth:0 "휘그 커먼웰스"
 lrsk_gov_var_gov_whig_commonwealth_desc:0 "이 정부는 역설입니다. 시민들은 권력의 전당에 연줄을 둔 악당들이 자신들의 자유를 위협한다고 깊이 의심하며, 그들이 밤낮없이 인민을 노예로 만들 음모를 꾸미고 있다고 확신합니다. 따라서 수도를 정화하겠다고 약속하는 정치인들에게 힘을 실어주려는 움직임이 거의 끊임없이 일어나고, 그 정치인들 역시 곧 의심의 표적이 됩니다. 이것이 정치 문화에 편집증적 양식을 부여하긴 하지만, 시민들이 편집증적일 이유가 없다고 누가 말할 수 있겠습니까?"
 LRSK_GOV_VAR_RT_EXEC_CHANCELLOR:0 "집행 재상"
 LRSK_GOV_VAR_RT_EXEC_CHANCELLOR_FEMALE:0 "$LRSK_GOV_VAR_RT_EXEC_CHANCELLOR$"
 LRSK_GOV_VAR_START_SCREEN_P2_WHIG:0 "우리 역사 내내 우리는 고통스러운 반복을 통해 한 가지 교훈을 배웠습니다. 권력은 부패합니다. 문명을 지키기 위해 누군가는 권력을 행사해야 하지만, 방치되면 권력자들은 서로 결탁하여 국가를 개인적 도구로 만들고 인민에게 등을 돌려 그들의 자유를 파괴할 것입니다. 이런 일은 여러 번 일어났지만, 이번에는 세심한 견제와 균형, 엄격히 제한된 권한을 갖춘 현재의 합리적으로 설계된 정부 아래에서 다음 혁명이 적어도 한 세기는 멀리 있다고 기대할 만한 이유가 있습니다."
 LRSK_STATELY_REPUBLIC:0 "이 장중한 공화국에서,"
 LRSK_DEMOCRATIC_REPUBLIC:0 "이 민중적 공화국에서,"
 LRSK_GVP_PIOUS_REP_COMMON:0 "시민들은 시민적 미덕과 거룩함을 구분하지 않습니다. 훌륭한 시민은 신앙 앞에서도 올바르고자 노력하며, 가장 윤리적이고 도덕적인 이들이 교회와 국가 모두에서 공직을 추구하도록 장려합니다."
 lrsk_gvp_gov_pious_republic:0 "경건한 공화국"
 lrsk_gvp_gov_pious_republic_desc:0 "$LRSK_STATELY_REPUBLIC$ $LRSK_GVP_PIOUS_REP_COMMON$"
 LRSK_GVP_RT_REV_GOV:0 "목사 주지사"
 LRSK_GVP_RT_REV_GOV_FEMALE:0 "$LRSK_GVP_RT_REV_GOV$"
 lrsk_gvp_gov_pious_commonwealth:0 "경건한 커먼웰스"
 lrsk_gvp_gov_pious_commonwealth_desc:0 "$LRSK_DEMOCRATIC_REPUBLIC$ $LRSK_GVP_PIOUS_REP_COMMON$"
 LRSK_GVP_RT_REV_PRES:0 "목사 대통령"
 LRSK_GVP_RT_REV_PRES_FEMALE:0 "$LRSK_GVP_RT_REV_PRES$"
 LRSK_GVP_START_SCREEN_P2_PIOUS_REPUBLIC:0 "우리가 법을 완성하고 거룩한 것을 공경하려 노력하면서, 덕 있는 통치의 발전과 영적 차원 모두에서 위대한 성취가 이루어졌습니다. 정치 세계와 도덕 세계는 깊은 신앙을 지닌 정치 지도자들을 통해 연결되었습니다."
 LRSK_GVP_BELLICOSE_REP_COMMON:0 "시민적 미덕에는 공화적 자유를 방어하는 시민-병사의 이상이 포함됩니다. 그 결과 시민들은 무용을 훌륭한 시민성의 핵심 구성 요소로 여기며, 군 경력은 종종 정부 경력으로 이어집니다."
 lrsk_gvp_gov_bellicose_republic:0 "호전적 공화국"
 lrsk_gvp_gov_bellicose_republic_desc:0 "$LRSK_STATELY_REPUBLIC$ $LRSK_GVP_BELLICOSE_REP_COMMON$"
 LRSK_GVP_RT_GOV_COMMANDER:0 "통치 사령관"
 LRSK_GVP_RT_GOV_COMMANDER_FEMALE:0 "$LRSK_GVP_RT_GOV_COMMANDER$"
 lrsk_gvp_gov_bellicose_commonwealth:0 "호전적 커먼웰스"
 lrsk_gvp_gov_bellicose_commonwealth_desc:0 "$LRSK_DEMOCRATIC_REPUBLIC$ $LRSK_GVP_BELLICOSE_REP_COMMON$"
 LRSK_GVP_RT_COMMANDER_CHIEF:0 "총사령관"
 LRSK_GVP_RT_COMMANDER_CHIEF_FEMALE:0 "$LRSK_GVP_RT_COMMANDER_CHIEF$"
 LRSK_GVP_START_SCREEN_P2_BELLICOSE_REPUBLIC:0 "시대를 거치며 발전하는 동안, 공화 정부를 향한 첫 용감한 실험들은 폭정 국가들의 공격으로 큰 고통을 겪었습니다. 무력으로 공화적 자유의 대의를 보호하고 진전시킨 경험은 우리 정치 문화에서 시민적 미덕과 무용을 서로 얽히게 했습니다."
 LRSK_GVP_TRANQUIL_REP_COMMON:0 "시민이 덕을 지녔다는 가장 큰 징표는 갈등을 원만하게 해결하는 능력입니다. 평화 조정자는 이상적인 공화국 지도자로 여겨지며, 외교 경력은 공직 출마를 준비하는 흔한 길입니다."
 lrsk_gvp_gov_tranquil_republic:0 "평온한 공화국"
 lrsk_gvp_gov_tranquil_republic_desc:0 "$LRSK_STATELY_REPUBLIC$ $LRSK_GVP_TRANQUIL_REP_COMMON$"
 LRSK_GVP_RT_GRAND_ARBITER:0 "대중재관"
 LRSK_GVP_RT_GRAND_ARBITER_FEMALE:0 "$LRSK_GVP_RT_GRAND_ARBITER$"
 lrsk_gvp_gov_tranquil_commonwealth:0 "평온한 커먼웰스"
 lrsk_gvp_gov_tranquil_commonwealth_desc:0 "$LRSK_DEMOCRATIC_REPUBLIC$ $LRSK_GVP_TRANQUIL_REP_COMMON$"
 LRSK_GVP_RT_CHIEF_MEDIATOR:0 "수석 조정관"
 LRSK_GVP_RT_CHIEF_MEDIATOR_FEMALE:0 "$LRSK_GVP_RT_CHIEF_MEDIATOR$"
 LRSK_GVP_START_SCREEN_P2_TRANQUIL_REPUBLIC:0 "우리가 폭정에서 자유로 나아가면서, 우리는 민족으로서도 성숙했습니다. 우리는 평화로운 상업이 정복보다 번영을 위한 우월한 수단임을 인정했고, 갈등을 평화롭게 해결한다는 원칙 위에 [capital_scope.GetCapitalCarrierTypeAdj] 공화국이 형성되었습니다."
 LRSK_GVP_ENLIGHTENED_REP_COMMON:0 "합리적이고 탐구심 많은 시민이 가장 덕 있는 시민으로 여겨집니다. 정치 문화는 교육을 강하게 중시하며, 최고의 정치인은 경험적이고 실험적인 방법으로 정치 문제에 접근하는 이들입니다."
 lrsk_gvp_gov_enlightened_republic:0 "계몽 공화국"
 lrsk_gvp_gov_enlightened_republic_desc:0 "$LRSK_STATELY_REPUBLIC$ $LRSK_GVP_ENLIGHTENED_REP_COMMON$"
 LRSK_GVP_RT_GOV_RECTOR:0 "통치 총장"
 LRSK_GVP_RT_GOV_RECTOR_FEMALE:0 "$LRSK_GVP_RT_GOV_RECTOR$"
 lrsk_gvp_gov_enlightened_commonwealth:0 "계몽 커먼웰스"
 lrsk_gvp_gov_enlightened_commonwealth_desc:0 "$LRSK_DEMOCRATIC_REPUBLIC$ $LRSK_GVP_ENLIGHTENED_REP_COMMON$"
 LRSK_GVP_RT_PRES_RECTOR:0 "주재 총장"
 LRSK_GVP_RT_PRES_RECTOR_FEMALE:0 "$LRSK_GVP_RT_PRES_RECTOR$"
 LRSK_GVP_START_SCREEN_P2_ENLIGHTENED_REPUBLIC:0 "아아, 우리의 선조들은 초기 시대에 폭정과 미신의 희생자였습니다. 이 어두운 시기는 시민적 미덕과 합리성이 시민성의 지도 원칙으로 확고히 자리 잡을 때까지 계속되었습니다. 현재의 공화국은 자유로운 탐구와 공동선에 대한 존중이라는 토대 위에 서 있습니다."
 lrsk_gov_var_gov_solar_monarchy:0 "태양 왕국"
 lrsk_gov_var_gov_solar_monarchy_desc:0 "이 정부는 국가를 체현한다고 주장하는 군주의 인격을 중심으로 합니다. 왕좌의 모든 신민과 속령은 태양을 도는 행성에 비유됩니다."
 LRSK_GOV_VAR_RT_SOLAR_KING:0 "태양 왕"
 LRSK_GOV_VAR_RT_SOLAR_QUEEN:0 "태양여왕"
 LRSK_GOV_VAR_HT_DAWN_PRINCE:0 "새벽의 왕자"
 LRSK_GOV_VAR_HT_DAWN_PRINCESS:0 "새벽의 공주"
 lrsk_gov_var_gov_constitutional_monarchy:0 "입헌군주정"
 lrsk_gov_var_gov_constitutional_monarchy_desc:0 "이 정부는 정의와 진보의 이름으로, 통치자의 권력의 성격과 한계를 규정하는 법적 틀에 따라 통치하기로 자신이 다스리는 인민과 pact를 맺은 군주정입니다."
 LRSK_GOV_VAR_RT_PEP_KING:0 "인민의 왕"
 LRSK_GOV_VAR_RT_PEP_QUEEN:0 "인민의 여왕"
 LRSK_GOV_VAR_HT_PEP_PRINCE:0 "인민의 왕자"
 LRSK_GOV_VAR_HT_PEP_PRINCESS:0 "인민의 공주"
 LRSK_GOV_VAR_START_SCREEN_P2_CONSTITUTIONAL_MONARCHY:0 "태곳적부터 우리 사람들은 귀족과 군주의 자의적이고 불안정한 폭정을 알아왔습니다. 그러나 점차 이성의 빛이 오래된 편견과 미신의 안개를 걷어냈고, 크고 작은 모든 사람들은 이런 상태가 계속될 수 없음을 깨달았습니다. 대체로 점진적이고 때로는 극적인 투쟁을 거쳐, 우리는 자유와 질서의 이름으로 인민의 대표들과 함께 일하기로 현명하게 동의한 군주의 품위와 힘을 누리게 되었습니다."
 lrsk_gov_var_gov_republic_of_virtue:0 "미덕의 공화국"
 lrsk_gov_var_gov_republic_of_virtue_desc:0 "이 정부는 시민들의 시민적 미덕을 기르는 데 헌신합니다. 미덕 없이는 자유와 평등이 지속될 수 없기 때문입니다."
 LRSK_GOV_VAR_RT_CH_TRUSTEE:0 "인민 수탁자"
 LRSK_GOV_VAR_RT_VALCOM_FEMALE:0 "$LRSK_GOV_VAR_RT_CH_TRUSTEE$"
 LRSK_GOV_VAR_START_SCREEN_P2_REPUBLIC_OF_VIRTUE:0 "한때 우리 사람들은 왕과 귀족의 억압 아래 살았지만, 투쟁을 통해 인민의 자유를 최고의 가치로 삼는 정부 체계를 세웠습니다. 따라서 우리는 나라에 대한 사랑과 공동체에 대한 의무감을 낳기 위해 지치지 않고 일하며, 사회 생활의 모든 영역에서 개선을 추구합니다. 이것이 사회적으로나 과학적으로나 우리의 발전의 열쇠였습니다."
 lrsk_gov_var_gov_federal_republic:0 "연방 공화국"
 lrsk_gov_var_gov_federal_republic_desc:0 "이 정부는 다양한 견해와 이해관계를 수용하기 위해 중앙 입법부와 여러 지역 정부 사이에 권력을 나눕니다."
 LRSK_GOV_VAR_RT_MLEADER:0 "다수당 대표"
 LRSK_GOV_VAR_RT_MLEADER_FEMALE:0 "$LRSK_GOV_VAR_RT_MLEADER$"
 LRSK_GOV_VAR_START_SCREEN_P2_FEDERAL_REPUBLIC:0 "한때 우리 사람들은 멀리 떨어진 중앙 국가의 무심한 요구를 견뎠지만, 투쟁을 통해 지역과 지방의 가치와 이해를 존중하는 정부 체계를 세웠습니다. 따라서 우리 정부의 입법부는 자유로운 토론과 시민 의견을 바탕으로 운영됩니다. 이것이 사회적으로나 과학적으로나 우리의 발전의 열쇠였고, 우리 정부가 다양한 [capital_scope.GetCapitalCarrierType]의 많은 부분을 통합할 수 있었던 이유입니다."
 lrsk_gov_var_gov_revolutionary_republic:0 "혁명 공화국"
 lrsk_gov_var_gov_revolutionary_republic_desc:0 "이 정부는 국내외의 적으로부터 자신의 자유를 단호히 방어하는 것을 최고의 의무로 보는 민주 국가입니다. 이러한 경계 태세는 다른 제국에서 선제적 정권 교체 정책으로 이어질 수 있습니다."
 LRSK_GOV_VAR_RT_SECCOM:0 "안보 위원"
 LRSK_GOV_VAR_RT_SECCOM_FEMALE:0 "$LRSK_GOV_VAR_RT_SECCOM$"
 LRSK_GOV_VAR_START_SCREEN_P2_REVOLUTIONARY_REPUBLIC:0 "태곳적부터 우리 사람들은 귀족, 대귀족, 주인, 군주의 잔혹함과 억압을 알아왔습니다. 거대하고 영웅적인 투쟁을 통해 우리는 그들의 족쇄를 끊고 모두를 위한 동등한 존엄을 요구했습니다. 우리 공화국은 우리의 자유를 지킬 준비가 되어 있습니다. 폭군과 그 폭력배 군대는 국경에서 덮칠 기회를 엿보고, 그 하수인들은 우리 안에 숨어 혼란을 부추기고 있기 때문입니다."
 lrsk_gov_var_gov_republican_directory:0 "공화국 총재정부"
 lrsk_gov_var_gov_republican_directory_desc:0 "이 정부는 이론상 인민에 의한, 인민을 위한 정부입니다. 그러나 국내외에서 이해관계를 방어하고 또 '방어'해야 한다는 요구는 이념적으로 일관된 파벌에 의한 정부를 형성하게 했습니다. 그래도 이 통치자들은 여전히 국가가 세워진 이상 중 일부를 품고 있습니다."
 LRSK_GOV_VAR_RT_PRES_COUNC:0 "주재 평의원"
 LRSK_GOV_VAR_RT_PRES_COUNC_FEMALE:0 "$LRSK_GOV_VAR_RT_PRES_COUNC$"
 LRSK_GOV_VAR_START_SCREEN_P2_REPUBLICAN_DIRECTORY:0 "우리 사람들은 왕과 귀족의 억압 아래, 그리고 과도한 혁명의 피비린내 나는 혼란 속에서 살아왔습니다. 자유를 세우는 것은 어렵고, 그것을 방어하는 것은 더욱 어렵습니다. 우리는 여전히 [capital_scope.GetCapitalCarrierType]의 후진적인 폭정들로부터 많은 도전에 직면하지만, 점점 더 많은 자유 인민들이 해방과 보호를 위해 우리 정부를 바라보고 있습니다. 자유가 언제나 전진하는 만큼, 우리의 경계도 영원해야 합니다."
 lrsk_gov_var_gov_republican_protectorate:0 "공화국 보호령"
 lrsk_gov_var_gov_republican_protectorate_desc:0 "이 정부는 이론상 혁명적이고 해방적인 사명을 가진 공화국입니다. 실제로는 군사력의 과도한 확장과 봉신국 제국을 관리해야 하는 필요가 대중주의 군사 지도자들의 통치로 이어졌습니다."
 LRSK_GOV_VAR_RT_FIRST_CONSUL:0 "제1집정관"
 LRSK_GOV_VAR_RT_FIRST_CONSUL_FEMALE:0 "$LRSK_GOV_VAR_RT_FIRST_CONSUL$"
 LRSK_GOV_VAR_START_SCREEN_P2_REPUBLICAN_PROTECTORATE:0 "무지와 억압의 어둠이 오랜 세월 이어진 뒤, 우리 인민은 일어섰습니다. 그들은 폭군을 타도하고 세계의 압제자들의 끝없는 무리에 맞섰습니다. 그리고 어깨를 맞대고 서서 승리했습니다. 승리는 노래하고 자유는 행진하며, [capital_scope.GetCapitalCarrierTypeShort]의 독재자들은 우리의 접근에 떨고 이미 우리가 해방한 이들은 감사 속에 우리에게 경례합니다."
 lrsk_gov_var_gov_revolutionary_empire:0 "혁명 제국"
 lrsk_gov_var_gov_revolutionary_empire_desc:0 "이 정부는 형식상 군주정이지만 정신은 공화적이라고, 그 충성파들은 주장합니다. 황제는 인민 의지의 체현이자 그 자유의 보호자가 되겠다고 맹세했으며, 실제로 모든 지성 생명체를 새로운 자유의 제국 안에 포용하겠다고 했습니다."
 LRSK_GOV_VAR_RT_PEP_EMPEROR:0 "인민의 황제"
 LRSK_GOV_VAR_RT_PEP_EMPERESS:0 "인민의 여제"
 LRSK_GOV_VAR_HT_PEP_CROWN_PRINCE:0 "인민의 황태자"
 LRSK_GOV_VAR_HT_PEP_CROWN_PRINCESS:0 "인민의 황태녀"
 LRSK_GOV_VAR_START_SCREEN_P2_REVOLUTIONARY_EMPIRE:0 "무지와 억압의 어둠이 오랜 세월 이어진 뒤, 우리 인민은 일어섰습니다. 그들은 폭군을 타도하고 세계의 압제자들의 끝없는 무리에 맞섰습니다. 그리고 어깨를 맞대고 서서 승리했습니다. 우리 [capital_scope.GetCapitalCarrierType]의 자유 인민들은 우리에게 지도를 구했고, 우리는 다시 한 번 세계를 놀라게 했습니다. 우리의 용맹한 투쟁을 이끈 영웅에게 자유롭게 왕관을 바친 것입니다. 황제는 다시 우리에게 약속했습니다. 온 [capital_scope.GetCapitalCarrierTypeShort]을(를) 자유롭고 평화롭게 만들겠다고. 그다음은, 어쩌면 은하일까요?"
 lrsk_gov_var_gov_coop_supersap:0 "협동 초지성"
 lrsk_gov_var_gov_coop_supersap_desc:0 "이 정부는 일종의 다중 인격 집단 의식으로 운영됩니다. 인구는 전체 지휘 지성의 필요를 충족하는 것 외에는 개인적 욕망을 전혀 지니지 않으며, 때로는 행성에 묶인 하위 정신들의 상반된 도움을 받습니다."
 RT_OVERMIND:0 "초월의식"
 RT_OVERMIND_FEMALE:0 "$RT_OVERMIND$"
 START_SCREEN_PART_TWO_COOP_SUPERSAP:0 "그리하여 시간의 여명에 우리는 깨어났습니다. 초월의식은 궁극적으로 그 협동적 자아를 구성하는 여러 다르지만 종속적인 관점에서 [GetHomeWorldName]의 주변을 살폈습니다. 우리는 하나처럼 움직이며 드론을 위한 거처를 짓고, 산업을 발전시키고, 새로운 기술을 연구하고, 대지의 자원을 활용했습니다.\n\n일상 업무를 처리하는 지역 하위 정신들의 도움을 통해 우리는 온 세계를 포괄할 만큼 성장했습니다. 소수의 자율 드론이 독립 요원으로 봉사하도록 만들어졌습니다. 이 더 강력한 드론들은 제한된 자유 사고 능력을 지녔지만, 하위 정신들과 달리 여전히 다른 도구들과 마찬가지로 초월의식의 의지에 필연적으로 묶여 있었습니다.\n\n우리가 [GetHomeWorldName]에 대한 완전한 지배를 이룩하자, 초월의식은 다른 태양을 도는 다른 세계들을 인식하게 되었습니다. 내부의 다양한 의식들과 회의한 끝에, 초월의식은 결론에 이르렀습니다. [GetName]은 더 성장해야 한다는 것입니다. 우리 자율 드론 중 가장 지능적인 이들이 새로운 여행 방법을 고안하여, 우리가 별들 사이의 광대한 거리를 건널 수 있게 했습니다."
 lrsk_gov_var_gov_conspiracy_of_equals:0 "동등자들의 음모"
 lrsk_gov_var_gov_conspiracy_of_equals_desc:0 "첫 번째 혁명은 평등을 설교했을 뿐이지만, 두 번째 혁명은 그것을 실천했습니다... 거짓 공화국의 몰락을 조율하고 진정한 민주주의를 수립한 비밀 결사의 지도 덕분입니다. 이 비밀 혁명 네트워크는 여전히 무대 뒤에서 역할을 합니다. 그 아이러니한 목적은 위계와 지배의 흔적이 남지 않도록, 너무 많은 것을 얻은 자들을 무너뜨리는 비밀 인민 경찰로 활동하는 것입니다."
 LRSK_GOV_VAR_RT_FIRST_CITIZEN:0 "제1시민"
 LRSK_GOV_VAR_START_SCREEN_P2_CONSPIRACY_OF_EQUALS:0 "한때 우리 사람들은 여러 억압적 위계 아래 살았지만, 투쟁을 통해 평등의 원칙을 사회의 모든 측면으로 확장했습니다. 위계를 추방하는 작업은 계속되고 있으며, 마치 우주의 도덕 질서가 우리의 계획에 동의하는 것 같습니다. 자유 속에서 사는 법을 배워가는 가운데, 너무 높이 오른 자는 결국 낮아지게 되기 때문입니다."
 lrsk_gov_var_gov_utopian_despotism_dic:0 "유토피아 전제정"
 lrsk_gov_var_gov_utopian_despotism_dic_desc:0 "세습 군주이든 종신 선출 독재자이든, 이 사회의 통치자들은 정확한 사회 계획에 따라 집단 공동체에 거주하는 신민들 사이의 빈곤을 근절함으로써 자신의 통치를 확보했습니다. 본질적인 계급 구분은 남아 있지만, 자애로운 전제군주들은 박애, 보편적 사랑, 도덕적 개선의 정신으로 인민을 특별히 돌봅니다."
 LRSK_GOV_VAR_RT_GRAND_PHILANTHROPIST_D:0 "대박애가"
 lrsk_gov_var_gov_utopian_despotism_imp:0 "$lrsk_gov_var_gov_utopian_despotism_dic$"
 lrsk_gov_var_gov_utopian_despotism_imp_desc:0 "$lrsk_gov_var_gov_utopian_despotism_dic_desc$"
 LRSK_GOV_VAR_RT_GRAND_PHILANTHROPIST_I:0 "$LRSK_GOV_VAR_RT_GRAND_PHILANTHROPIST_D$"
 LRSK_GOV_VAR_HT_PHILANTHROPIC_APPRENTICE:0 "박애 견습생"
 LRSK_GOV_VAR_START_SCREEN_P2_UTOPIAN_DESPOTISM:0 "$LRSK_GVP_UTOPIAN_START_1$ 지혜로운 박애가의 자애로운 지휘 아래 원대한 계획을 실행하기 위해 $LRSK_GVP_UTOPIAN_START_2$"
 lrsk_gov_var_gov_utopian_socialism:0 "유토피아 사회주의"
 lrsk_gov_var_gov_utopian_socialism_desc:0 "인민은 합리적이고 인도적인 경제 체계가 모든 필요를 제공한다는 확신 속에서 정밀하게 계획된 집단 공동체에 살아갑니다. 본질적인 계급 구분은 남아 있지만, 자애로운 경제 계획자들은 박애, 보편적 사랑, 도덕적 개선의 정신으로 노동자들을 특별히 돌봅니다."
 LRSK_GOV_VAR_RT_PHILANTHROPY_DIRECTOR:0 "박애 책임자"
 LRSK_GOV_VAR_START_SCREEN_P2_UTOPIAN_SOCIALISM:0 "$LRSK_GVP_UTOPIAN_START_1$ 위대한 박애 계획에 따라 $LRSK_GVP_UTOPIAN_START_2$"
 lrsk_gov_var_gov_social_imperialism:0 "식민 사회주의"
 lrsk_gov_var_gov_social_imperialism_desc:0 "이 사회주의 국가는 재화와 서비스의 광범위한 분배로 안정을 유지합니다... 그 재원은 식민주의적 탐욕입니다. 자결과 평등의 개념을 거의 고려하지 않는 팽창주의 정책 아래, 행성 간 혁명의 이름으로 이 국가의 패권 아래 떨어진 이들은 적절하게도 '포로 국민'이라 불립니다."
 LRSK_GOV_VAR_RT_INTERPLANETARY_CHAIRMAN:0 "행성 간 의장"
 LRSK_GOV_VAR_RT_INTERPLANETARY_CHAIRWOMAN:0 "행성 간 여성 의장"
 LRSK_GOV_VAR_HT_DEPUTY_CHAIRMAN:0 "부의장"
 LRSK_GOV_VAR_HT_DEPUTY_CHAIRWOMAN:0 "여성 부의장"
 LRSK_GOV_VAR_START_SCREEN_P2_SOCIAL_IMPERIALISM:0 "$LRSK_GVP_COMMIE_START_1$, 인민은 마침내 혁명으로 일어섰습니다. 노동자 정당들은 다수 국가의 정부를 장악하고 사회 발전의 과업에 투입했습니다. [Capital.GetName]의 인터내셔널 체계는 혁명의 선봉 국가가 동료 노동자 국가들의 연대 기여를 통해 세계를 해방하도록 힘을 실어주는 데 잘 작동했습니다."
 lrsk_gov_var_gov_pure_social_republic:0 "순수 집단체"
 lrsk_gov_var_gov_pure_social_republic_desc:0 "이 주인종 노동자 국가의 해방된 프롤레타리아들은 오직 한 종류의 사슬, 곧 퇴폐한 외계종의 영혼을 그 살아 있는 육체에 묶는 사슬만을 끊는 데 관심이 있습니다!"
 LRSK_GOV_VAR_RT_PEOPLES_CHAMPION:0 "인민의 투사"
 LRSK_GOV_VAR_START_SCREEN_P2_PURE_SOCIAL_REPUBLIC:0 "한때 다른 [GetAdj] 문화들이 있었습니다. 퇴폐하고 비정상적이며, 진정한 노동 인민의 통합에 위협이 되는 존재들이었습니다. 인민군은 이 부적응자들을 하나씩 처리했고, 평범하고 근면한 [GetSpeciesNamePlural]이 자유와 풍요 속에서 [capital_scope.GetCapitalCarrierType]을(를) 지배하게 되었습니다. 오늘날에는 오직 정상인만이 남아 있습니다."
 lrsk_gov_var_gov_onestate_socialism:0 "모범 사회주의"
 lrsk_gov_var_gov_onestate_socialism_desc:0 "이 사회는 한 국가 안에서 사회주의를 건설하는 데 전념했으며, 간접 지원을 넘어선 행성 간 혁명의 이상은 포기했습니다. 어떤 침략자에 대해서도 스스로를 방어할 준비가 되어 있지만, 이 사회는 다른 곳의 혁명가들에게 영감을 주기 위해 모든 노력을 자국 국경 안의 사회주의 건설에 집중합니다."
 LRSK_GOV_VAR_RT_NATIONAL_PARTY_CHAIR:0 "국민당 의장"
 LRSK_GOV_VAR_START_SCREEN_P2_ONESTATE_SOCIALISM:0 "$LRSK_GVP_COMMIE_START_1$, 인민은 마침내 혁명으로 일어섰습니다. 한 노동자 정당이 선진 국가를 장악하고 그 경제를 사회주의적 자유와 풍요의 모범을 건설하는 과업에 바쳤습니다. 이 모범은 외국과의 얽힘이나 전쟁 없이도 [capital_scope.GetCapitalCarrierType] 전역의 다른 혁명가들에게 영감을 주었습니다."
 lrsk_gov_var_gov_workers_republic:0 "노동자 공화국"
 lrsk_gov_var_gov_workers_republic_desc:0 "이는 노동계급과 그들이 선출한 지도자들이 우세한 공화제 정부 체계입니다. 구조는 대부분의 공화국과 비슷하지만, 가장 영향력 있는 정치 블록은 노동조합과 협동 산업 로비입니다."
 LRSK_GOV_VAR_RT_PLEBIAN_TRIBUNE:0 "평민 호민관"
 LRSK_GOV_VAR_START_SCREEN_P2_WORKERS_REPUBLIC:0 "초기 우리 사람들은 강도 귀족 같은 사업주와 그들의 뜻을 집행하는 국가들의 지배를 받았습니다. 시간이 지나며 사람들은 공동의 이익을 깨닫고 산업노조와 새로운 협동 기업을 만들었습니다. 이들은 사회에서 대중 권력의 주요 통로가 되었습니다. 실제로 노동 또는 협동 연맹의 지지 없이 공직에 출마하는 것조차 현실적으로 불가능합니다."
 lrsk_gov_var_gov_rustic_republic:0 "전원 공화국"
 lrsk_gov_var_gov_rustic_republic_desc:0 "일부 도시 중심지가 존재하긴 하지만, 인구의 압도적 다수는 농촌에서 살고 일합니다. 그 결과 공화제 체계가 채택되었을 때 농민 인구가 다른 모든 계급을 완전히 압도하여, 농업 의제를 지지하는 정치인들만 성공할 가능성이 있었습니다. 농촌 정책 문제에 영구히 몰두한 이 사회의 정부는 무모한 제국 건설에 쓸 시간도 정치 자본도 없습니다."
 LRSK_GOV_VAR_RT_COUNTRY_CHANCELLOR:0 "농촌 재상"
 LRSK_GOV_VAR_START_SCREEN_P2_RUSTIC_REPUBLIC:0 "태곳적부터 우리 인민의 압도적 다수는 농촌에서 살고 일해 왔습니다. 그들이 공동의 이익을 깨닫고 인민에 의한, 인민을 위한 정부를 세웠을 때, 가장 큰 목소리를 낸 것은 농촌 사람들이었습니다. 실제로 농장과 작은 마을의 지지 없이 공직에 출마하는 것조차 현실적으로 불가능합니다."
 lrsk_gov_var_gov_peasant_commune_collective:0 "농촌 코뮌 집단체"
 lrsk_gov_var_gov_peasant_commune_collective_desc:0 "이 사회는 대체로 자급적인 농업 코뮌들의 연방이며, 외교 정책을 처리하고 재난 대응을 조율하는 중앙 정부에 권한을 위임하는 선출 마을 의회가 운영합니다. 이는 정복에 거의 관심이 없는 근본적으로 평화로운 사회입니다."
 LRSK_GOV_VAR_RT_COMMUNAL_REPRESENTATIVE:0 "공동체 대표"
 LRSK_GOV_VAR_START_SCREEN_P2_PEASANT_COMMUNE_COLLECTIVE:0 "$LRSK_GVP_RURALREV_START_1$ 이미 너무 부유한 자들을 더 부유하게 하려고 그들을 전쟁터로 보내 싸우다 죽게 했습니다. 시간이 지나 그들은 공동의 이익을 깨닫고 농업 조합과 협동 소유 토지 신탁을 형성하여, 스스로 권력을 쟁취하고 도시의 약탈을 끝냈습니다. 이러한 제도로 연결된 작고 드문드문한 공동체들의 네트워크는 오늘날까지 [capital_scope.GetCapitalCarrierType]을(를) 평화롭게 운영합니다."
 lrsk_gov_var_gov_peasant_dictatorship:0 "농민 독재정"
 lrsk_gov_var_gov_peasant_dictatorship_desc:0 "혁명 정당이 지주, 외국 제국주의자, 도시 자본가라는 압제자들에 맞서 농민을 조직했을 때, 그들은 급진적 농업 집단주의 프로그램을 시행했습니다. 그 결과 도시 거주자와 지식인들이 겸손과 평등을 배우기 위해 일상적으로 도시를 떠나 농촌의 농민들과 함께하도록 강제되는 무자비한 독재정이 생겨났습니다. 당은 농민에게서 지지 기반을 얻고, 그 통치 우선순위는 농업의 필요를 반영합니다."
 LRSK_GOV_VAR_RT_COLLECTIVE_DIRECTOR:0 "집단 책임자"
 LRSK_GOV_VAR_START_SCREEN_P2_PEASANT_DICTATORSHIP:0 "T$LRSK_GVP_RURALREV_START_1$ 그들 중 다수는 피비린내 나는 정복 전쟁으로 농지를 황폐화한 외국 제국의 꼭두각시였습니다. 결집한 농민과 노동자들의 혁명 정당들이 결국 형성되어 도시를 포위하고 착취자들에게서 무력으로 권력을 빼앗았습니다. 그런 정당이 오늘날까지 통치하며, 모두가 사회를 작동하게 하는 농촌에서 도시로 이어지는 위대한 노동의 사슬과 그 안에서 우리 모두가 동등하고 평온한 자리를 갖는 법을 배우도록 보장합니다."
 lrsk_gov_var_gov_agrarian_monarchy:0 "농업 군주정"
 lrsk_gov_var_gov_agrarian_monarchy_desc:0 "이 세계의 농민들은 자신들을 착취한 지주와 도시 상인들에 맞서 일어섰지만, 여전히 왕가의 전통을 보존하고자 했습니다. 그들은 군주들이 사악한 조언자들에게 속은 자애로운 부모라고 믿었습니다. 이제 한 명의 군주가 농민 대중을 다스리며, 거대한 농촌 신민 가족의 사랑받지만 다소 버거운 가장이 되었습니다."
 LRSK_GOV_VAR_RT_FATHERKING:0 "아버지왕"
 LRSK_GOV_VAR_RT_MOTHERQUEEN:0 "어머니여왕"
 LRSK_GOV_VAR_HT_BROTHERPRINCE:0 "형제왕자"
 LRSK_GOV_VAR_HT_SISTERPRINCESS:0 "자매공주"
 LRSK_GOV_VAR_START_SCREEN_P2_AGRARIAN_MONARCHY:0 "태곳적부터 우리 사람들은 모든 인민의 부모인 자애로운 군주들을 돈과 나쁜 조언으로 타락시킨 도시의 지주와 상인 군주들의 잔혹함과 억압을 알아왔습니다. 농촌의 평민들이 평화와 풍요를 요구하며 도시 주인들에게 맞서 일어섰을 때, 그들은 사실상 각국의 왕실 아버지와 어머니들이 본래 되어야 했던 인도하는 빛이 되도록 해방했습니다. 감사하고 열정적인 대중의 지지를 받아, [capital_scope.GetCapitalCarrierType]의 최고 군주는 모두의 부모가 되었습니다."
 lrsk_gov_var_gov_reactionary_socialism:0 "반동적 사회주의"
 lrsk_gov_var_gov_reactionary_socialism_desc:0 "한때 이 사회의 옛 엘리트들은 자본주의의 부상에 위협을 받았습니다. 이에 대응하여 귀족과 소부르주아의 동맹은 떠오르는 노동계급을 조종해 새로운 산업 대장들에 맞서 자신들 편에 서게 할 수 있었습니다. 그 결과 새로 자수성가한 부르주아가 구부와 구혈통에게서 국가 권력을 빼앗는 위협을 결코 가하지 못하도록, 국가 소유, 규제, 관세, 조세의 제한적 체계가 만들어졌습니다."
 LRSK_GOV_VAR_RT_LORD_PRESIDENT:0 "귀족 대통령"
 LRSK_GOV_VAR_RT_LADY_PRESIDENT:0 "귀부인 대통령"
 LRSK_GOV_VAR_HT_VP_ESQ:0 "명예 부통령 Esq."
 LRSK_GOV_VAR_START_SCREEN_P2_REACTIONARY_SOCIALISM:0 "태곳적부터 우리 사람들은 우리가 그들을 위해 더 고되게 일할수록 더욱 부유해져 세계를 지탱하는 모든 사회적 유대를 끊어버린 상인 군주와 길드 장인들의 잔혹함과 억압을 알아왔습니다. 다행히 우리의 지혜로운 귀족들이 그들의 탐욕스러운 계획을 멈추게 했습니다. 평민과의 관대한 동반자 관계와 축적에 대한 신중한 제한을 통해, [capital_scope.GetCapitalCarrierTypeShort]은(는) 여전히 일하는 사람들을 위해 작동할 수 있습니다."
 lrsk_gov_var_gov_feudal_socialism:0 "봉건 사회주의"
 lrsk_gov_var_gov_feudal_socialism_desc:0 "이 사회의 귀족들은 오직 사회의 고귀한 신분만이 노동자와 농민을 착취로부터 보호할 수 있다고 설득하여 자본주의를 요람에서 목 졸라 죽일 수 있었습니다. 이제 군주와 궁정은 옛 토지 영지와 같은 방식으로 국영 산업을 통제하며, 광산과 제조소를 출생권으로 물려줍니다. 노동자들은 전통적인 귀족의 자선 의무를 대가로 생산 라인에 농노처럼 묶여 있으며, 그 의무는 산업 생산 방식 덕분에 훨씬 더 관대합니다."
 LRSK_GOV_VAR_RT_SOCIAL_KING:0 "사회 왕"
 LRSK_GOV_VAR_RT_SOCIAL_QUEEN:0 "사회여왕"
 LRSK_GOV_VAR_HT_PRINCE_OF_THE_PROLES:0 "프롤의 왕자"
 LRSK_GOV_VAR_HT_PRINCESS_OF_THE_PROLES:0 "프롤의 공주"
 LRSK_GOV_VAR_START_SCREEN_P2_FEUDAL_SOCIALISM:0 "태곳적부터 우리 사람들은 우리가 그들을 위해 더 고되게 일할수록 더욱 부유해져 의무와 자선의 모든 유대를 끊어버린 상인 군주와 길드 장인들의 잔혹함과 억압을 알아왔습니다. 다행히 우리의 지혜로운 귀족들은 충성을 대가로 평민들에게 결핍으로부터의 보호를 제공하며 개입하여 그들의 탐욕스러운 계획을 멈추게 했습니다. 그리하여 봉사와 환대의 전통적 양식은 현대까지 이어집니다."
 lrsk_gov_var_gov_crime_family:0 "범죄 가문"
 lrsk_gov_var_gov_crime_family_desc:0 "겉보기에는 가족 기업에 지나지 않는다고 하지만, 실제 운영은 모든 형태의 범죄와 해적으로 이루어져 있습니다. 최고 범죄 가문은 여러 하위 가문을 봉신으로 통제하며, 아직 존재하는 잔재 국가 기관도 모두 본가의 통제에 복종합니다. 가문 자체는 관례적으로 세습되는 두목이 통제하며, 그는 벨벳 장갑 속에 숨긴 철권으로 혈연마저 다스립니다."
 LRSK_GOV_VAR_RT_BOSSMAN:0 "보스맨"
 LRSK_GOV_VAR_RT_BOSSWOMAN:0 "여성 보스"
 LRSK_GOV_VAR_HT_HEAD_UNDERBOSS:0 "수석 언더보스"
 LRSK_GOV_VAR_START_SCREEN_P2_CRIME_FAMILY:0 "우리의 첫 정부들은 약하고 비효율적이었습니다. 범죄는 번성했고, 시간이 지나며 실제 권력은 하나의 대가족이 운영하는 강력한 범죄 기업에 자리 잡았습니다. 반봉건적 친족 유대와 지하세계의 의례적 결속을 통해, 그것은 비할 데 없는 힘을 지닌 은밀한 사업 제국으로 발전했습니다. 모든 경쟁 조직은 점차 하나씩 처리되었습니다. 최종 통합의 행위로, 이제 이름뿐이던 세계 정부의 관료들은 반지에 입을 맞추고 뇌물을 받았으며, 최고 범죄 가문은 우리 모성의 사실상 지배체로 떠올랐습니다."
 lrsk_gov_var_gov_rogue_freehold:0 "불량 자유보유령"
 lrsk_gov_var_gov_rogue_freehold_desc:0 "경제의 거의 완전한 민영화를 향한 급진적 시도로 단순히 시작된 것은, 자유보유령의 시민들이 노예제, 해적질, 약탈을 점점 더 좋아하게 되면서 더 사악한 것으로 변했습니다. 최고 법원이 비시민에 대해서는 그 모든 것을 합법으로 판결했고, 인격권 보험을 감당할 수 있는 자들만 시민이 될 수 있으므로... 증오받는 '국가주의자들'이 표적이기만 하다면, 그런 야만적 추구에 탐닉하는 것을 막을 것은 없습니다."
 LRSK_GOV_VAR_RT_HEAD_JUDGE:0 "수석 판사"
 LRSK_GOV_VAR_START_SCREEN_P2_ROGUE_FREEHOLD:0 "초기 우리 사람들은 거대하고 비효율적인 국가의 지배를 받았습니다. 그러다 통치술의 혁신이 자리 잡았습니다. 더 민첩하고 효율적인 기업들이 정부의 일을 맡게 한 것입니다. 개인 권리의 경계가 이제 시장 협상의 문제가 되면서, 우리 중 가장 뛰어나고 자유로운 이들은 마침내 자신들이 마땅히 가져야 할 것을 취할 수 있게 되었습니다. 국가 억압에서 해방되고, 자유 자체마저 상품이 된 지금, 우리가 탐닉할 수 있는 것에는 한계가 없습니다."
 lrsk_gov_var_gov_corporate_banditry:0 "기업적 도적질"
 lrsk_gov_var_gov_corporate_banditry_desc:0 "한때 완전한 자유의 시장 기반 무국가 사회를 세우려던 이상주의적 실험이었지만, 이 사회는 오래전에 불가침 원칙의 형식적 준수로 포장된 권력 정치 외의 모든 것을 포기했습니다. 노예제, 도적질, 살인, 절도는 이제 흔한 일이 되었고, 그저 빠져나갈 만큼 부유하기만 하면 됩니다. 군벌, 무장 조직, 난립하는 기업들이 이제 한때 해방 프로젝트였다고 여겨진 것의 폐허 위를 공개적으로 지배합니다. 가장 강력한 지배자들은 증오받는 '국가주의자들'을 상대로 해적 습격을 벌이고, 노예와 보물을 끌고 와 터무니없는 가격에 팔아넘기며 자신의 지배력을 과시합니다."
 LRSK_GOV_VAR_RT_CHIEFCORPSEC:0 "기업 보안 책임자"
 LRSK_GOV_VAR_START_SCREEN_P2_CORPORATE_BANDITRY:0 "초기 우리 사람들은 국가에 의해 투옥되고 착취당했습니다. 시간이 지나며 자유를 사랑하는 이들은 기업, 자발적 사회, 시민 결사가 강제 없이도 국가가 할 수 있는 모든 일을 할 수 있음을 깨달았습니다. 행동의 유일한 장벽은 사람들이 기꺼이 지불하거나 기부하려는 것이 되었습니다. 국가 억압에서 해방되고, 자유 자체마저 상품이 된 지금, 우리가 탐닉할 수 있는 것에는 한계가 없습니다."
 LRSK_GOV_VAR_GOV_MERCHANT_PRINCIPALITY_COMMON:0 "가장 부유한 상인과 복합기업들의 평의회가 이윤을 위해 모든 국정을 공동 관리하는 제국입니다."
 lrsk_gov_var_gov_merchant_principality_d:0 "상인 공국"
 lrsk_gov_var_gov_merchant_principality_d_desc:0 "$LRSK_GOV_VAR_GOV_MERCHANT_PRINCIPALITY_COMMON$ 가장 부유한 기업을 대표하는 이 강력한 사업 거물들은 후보자들의 과거 판단력과 현명한 사업 결정 기록에 따라 내부 문제의 최종 중재자를 자신들 중에서 선출합니다."
 lrsk_gov_var_gov_merchant_principality_i:0 "$lrsk_gov_var_gov_merchant_principality_d$"
 lrsk_gov_var_gov_merchant_principality_i_desc:0 "$LRSK_GOV_VAR_GOV_MERCHANT_PRINCIPALITY_COMMON$ 이들은 관련 기업들의 주식 가치에 따라 자신들 중에서 뽑힌 내부 문제의 최종 중재자가 이끌며, 새 국가원수가 취임할 때 가장 부유한 기업이 견습생이자 대표자와 같은 역할을 하는 후계자를 내세웁니다."
 LRSK_GOV_VAR_RT_MERCHANT_PRINCE:0 "상인 공작"
 LRSK_GOV_VAR_RT_MERCHANT_PRINCESS:0 "$LRSK_GOV_VAR_RT_MERCHANT_PRINCE$상인 공주"
 LRSK_GOV_VAR_HT_VICEPRINCEPS:0 "부총독"
 LRSK_GOV_VAR_START_SCREEN_P2_MERCHANT_PRINCIPALITY:0 "$LRSK_GOV_VAR_MERCH_START_COMMON$ 결국 가장 수익성 높은 기업의 수장들이 모여 생산과 교환을 최적으로 관리하고 보호하는 방법에 대한 합의에 도달했습니다. 이 협약은 점차 사실상의 정부에서 [capital_scope.GetCapitalCarrierTypeAdj] 권력의 진정한 중심으로 발전했습니다."
 LRSK_GOV_VAR_GOV_SHARESTAKE_COMMON:0 "그러나 우리는 기업가 정신을 중시했지만, 공공선도 중시했습니다. 그래서 상업의 주인들이 [capital_scope.GetCapitalCarrierType]의 새로운 주인이 되는 것을 막기 위해,"
 lrsk_gov_var_gov_stakeholder_polity:0 "이해관계자 정치체"
 lrsk_gov_var_gov_stakeholder_polity_desc:0 "기업들이 사회에서 큰 영향력을 지니지만, 그 경영진은 경험 많은 공공 옹호자, 공동체 지도자, 박애가들로 구성된 중앙 '공정 거래 평의회'를 통해 대중에 대한 책임 기준에 묶여 있습니다. 이는 최악의 탐욕스러운 충동을 억제합니다."
 LRSK_GOV_VAR_RT_CHEIF_OMBUDS:0 "수석 옴부즈맨"
 LRSK_GOV_VAR_RT_CHEIF_OMBUDS_FEMALE:0 "수석 여성 옴부즈맨"
 LRSK_GOV_VAR_START_SCREEN_P2_STAKEHOLDER_POLITY:0 "$LRSK_GOV_VAR_MERCH_START_COMMON$ $LRSK_GOV_VAR_GOV_SHARESTAKE_COMMON$ 우리는 사업 관행에 대한 공공-민간 공동 통치 체계와 사적 야망을 견제하는 공익 중앙 평의회를 수립했습니다. 공정성은 이 균형을 통해 보장됩니다."
 lrsk_gov_var_gov_shareholder_commonwealth:0 "주주 커먼웰스"
 lrsk_gov_var_gov_shareholder_commonwealth_desc:0 "기업들이 사회에서 큰 영향력을 지니지만, 그 경영과 정책은 광범위한 주식 소유와 보통 주주들의 조직화를 통해 상당히 민주화되었습니다. '시민-주주'에 대한 책임을 중시하는 강한 문화가 최악의 탐욕스러운 충동을 억제합니다."
 LRSK_GOV_VAR_RT_CHIEF_ARBITRATOR:0 "수석 중재관"
 LRSK_GOV_VAR_RT_CHIEF_ARBITRATOR_FEMALE:0 "$LRSK_GOV_VAR_RT_CHIEF_ARBITRATOR$"
 LRSK_GOV_VAR_START_SCREEN_P2_SHAREHOLDER_COMMONWEALTH:0 "$LRSK_GOV_VAR_MERCH_START_COMMON$ $LRSK_GOV_VAR_GOV_SHARESTAKE_COMMON$ 인민은 주식을 구매하고 시민 감시 조직으로 결합하여 기업 사업 체계 안에 자리를 샀고, 소유 지분을 이용해 나쁜 행위자들을 통제할 수 있게 되었습니다. 공정성은 광범위한 소유와 공동 통제를 통해 보장됩니다."
 lrsk_gov_var_gov_crusading_company:0 "성전 회사"
 lrsk_gov_var_gov_crusading_company_desc:0 "용병 회사와 대형 교회의 기묘한 혼합체인 이 기업은 신, 금, 영광을 믿습니다. 반드시 그 순서라고는 할 수 없습니다. 이들에게 신성한 존재를 가장 기쁘게 하는 것은 다른 이들에게 번영의 복음을 깨우쳐 주는 것입니다... 그리고 잠재 고객-신도 중 일부가 고집스럽다면, 선교사들이 단순히 패러다임을 깨는 공격적 마케팅 전술을 사용할 수도 있습니다."
 LRSK_GOV_VAR_RT_CHAPLAINMARTIAL:0 "군목 원수"
 LRSK_GOV_VAR_START_SCREEN_P2_CRUSADING_COMPANY:0 "우리 사람들은 얼마나 오랫동안 거짓 신앙의 영적, 물질적 빈곤 속에서 허우적댔습니까? 얼마나 많은 이들이 더 나은 길을 알 기회도 없이 저주받았습니까? 그 어두운 날들을 끝내기 위해서는, 설령 초심자 입회비만큼 합리적이지 않은 대가라 해도 치를 가치가 있었습니다. 오직 우리 영혼-구원 군단(tm)의 용기와 기업가 정신만이 대중에게 구원과 번영을 가져올 수 있었습니다. 이 경건한 군사 전통은 계속되니 기뻐하십시오! 구원은 모두에게 열려 있습니다! 합리적인 신용 이율과 불신자 공동체 소개 할인도 제공됩니다."
 lrsk_gov_var_gov_colonial_charter_board:0 "식민 헌장 이사회"
 lrsk_gov_var_gov_colonial_charter_board_desc:0 "이 제국 모성의 정부들은 우주의 자원을 개발할 재정이 부족했으므로, 우주 기반 자원 추출을 위한 투자금을 모으도록 주식회사에 헌장을 부여하는 체계를 마련했습니다. 이 헌장 회사들을 관리하는 공공-민간 협력 기관은 사회가 우주로 확장되면서 모든 국정을 포괄하게 되었습니다."
 LRSK_GOV_VAR_RT_HON_BOARD_CHAIR_COMMON:0 "명예 의장"
 LRSK_GOV_VAR_RT_HON_BOARD_CHAIR_M:0 "$LRSK_GOV_VAR_RT_HON_BOARD_CHAIR_COMMON$남자"
 LRSK_GOV_VAR_RT_HON_BOARD_CHAIR_F:0 "$LRSK_GOV_VAR_RT_HON_BOARD_CHAIR_COMMON$woman"
 LRSK_GOV_VAR_START_SCREEN_P2_COLONIAL_CHARTER_BOARD:0 "초기 정부들이 탐사와 확장을 시작했을 때, 그들은 식민 무역과 자원 개발을 위한 주식회사 헌장 발급을 통해 훨씬 더 야심찬 사업을 감당할 수 있음을 깨달았습니다. 이 체계는 초기 우주 비행과 성계 자원 탐사 시대까지 이어졌습니다. 결국 이 헌장 기업들을 관리하는 공공-민간 기관이 가장 중요한 정치적 의사 결정자가 되었습니다."
 lrsk_gov_var_gov_colonial_company:0 "식민 회사"
 lrsk_gov_var_gov_colonial_company_desc:0 "$lrsk_gov_var_civic_mc_chartered_company_desc$ 성간 제국을 관리하는 어려움은 상당한 통치 권한을 그 손에 남깁니다."
 LRSK_GOV_VAR_RT_GOV_PRES:0 "총독-대통령"
 LRSK_GOV_VAR_GOV_COLONIAL_FOUNDERS_COMMON:0 "그 창립자들이 출신한 곳입니다."
 lrsk_gov_var_gov_colonial_viceroyalty_imp:0 "부왕 왕조"
 lrsk_gov_var_gov_colonial_viceroyalty_imp_desc:0 "이 정부는 원래 $LRSK_GOV_VAR_GOV_COLONIAL_FOUNDERS_COMMON$ 군주정에 충성을 바치던 세습 귀족정으로 시작되었습니다."
 LRSK_GOV_VAR_RT_COL_VICEROY:0 "식민 부왕"
 LRSK_GOV_VAR_RT_COL_VICEREINE:0 "식민 여성 부왕"
 LRSK_GOV_VAR_HT_DEP_VICEROY:0 "부지사"
 LRSK_GOV_VAR_HT_DEP_VICEREINE:0 "여성 부부왕"
 lrsk_gov_var_gov_colonial_viceroyalty_dic:0 "부왕령 지배지"
 lrsk_gov_var_gov_colonial_viceroyalty_dic_desc:0 "이 정부는 $LRSK_GOV_VAR_GOV_COLONIAL_FOUNDERS_COMMON$ 제국의 군주 이름으로 공식 행동하는 단일 지휘관이 통제합니다."
 LRSK_GOV_VAR_RT_COL_REGENT:0 "식민 섭정"
 lrsk_gov_var_gov_colonial_viceroyalty_oli:0 "부왕령 평의회"
 lrsk_gov_var_gov_colonial_viceroyalty_oli_desc:0 "이 정부는 $LRSK_GOV_VAR_GOV_COLONIAL_FOUNDERS_COMMON$ 군주정의 이익에 공식 봉사하는 식민 수탁자 평의회가 관리합니다."
 LRSK_GOV_VAR_RT_COL_OVERSEER:0 "식민 감독관"
 lrsk_gov_var_gov_colonial_viceroyalty_dem:0 "부왕령 커먼웰스"
 lrsk_gov_var_gov_colonial_viceroyalty_dem_desc:0 "이 정부는 민주적으로 선출되었음에도, $LRSK_GOV_VAR_GOV_COLONIAL_FOUNDERS_COMMON$ 제국 군주의 식민 대리인으로 시작되었습니다."
 LRSK_GOV_VAR_RT_COL_GOVERNOR:0 "식민 총독"
 lrsk_gov_var_gov_colonial_viceroyalty_cmp:0 "부왕령 회사"
 lrsk_gov_var_gov_colonial_viceroyalty_cmp_desc:0 "이 정부는 $LRSK_GOV_VAR_GOV_COLONIAL_FOUNDERS_COMMON$ 군주정을 부유하게 할 신탁 의무를 지닌 상업 사업으로 시작되었습니다."
 LRSK_GOV_VAR_RT_COL_EXEC:0 "식민 집행 책임자"
 LRSK_GOV_VAR_START_SCREEN_P2_DEFAULT:0 "그러고 나서 아마도 어떤 종류의 정부를 만들었을 것입니다? (이런, 모드 제작자가 도입문 작성을 잊은 모양입니다. 몰입을 깨서 미안합니다. 가서 그에게 알려 주세요!)"
