 lrsk_crim_courier_bonus:0 "$LRSK_CRIME_OPTION_COMMON_1$ §Y$job_lrsk_gov_var_job_gofer_plural$§!를 불법 통신과 거래의 은밀한 운반책으로 사용하며, $LRSK_CRIME_OPTION_COMMON_2$ §R+20§!이고, 충원된 §Y$job_lrsk_gov_var_job_gofer$§! 직업마다 증가합니다.\n\n"
 lrsk_gvp_bldg_organizing_hub:0 "노사 관리 수련장"
 lrsk_gvp_bldg_organizing_hub_desc:0 "주요 노조 계약의 특이한 일부는 지사 소유자가 노조와 구축한 노사 관계를 더 넓게 촉진하는 것입니다. 이를 위해 이 수련 센터는 지역 기업과 노조가 적당한 수수료로 함께 일하는 법을 배울 수 있게 합니다."
 lrsk_gov_var_bldg_grand_casino:0 "대카지노"
 lrsk_gov_var_bldg_grand_casino_desc:0 "메가 슬롯부터 고액 경쟁 게임, 현장 스포츠 베팅까지, 우연과 행운에 바치는 이 호화로운 신전은 매일 수천 명이 자신의 운을 시험하는 짜릿함을 위해 현금을 걸게 합니다."
 lrsk_casino_events_desc:0 "행운과 운명의 바람은 주재국과 기업 모두에게 여러 방향으로 불 수 있습니다. §H때때로 행운의 여신이 변덕스럽게 당신에게 미소 짓거나 찡그릴 것을 예상하십시오!§!\n\n"
 lrsk_legit_gamble_bonus:0 "양질의 책임 있는 오락 경험 제공에 대한 전문적 헌신이 §Y$BRANCH_OFFICE_VALUE$§!를 §G10%§! 증가시킵니다.\n\n"
 lrsk_crim_gamble_bonus:0 "$LRSK_CRIME_OPTION_COMMON_1$ 이 §Y$lrsk_gov_var_bldg_grand_casino$§!를 이용하여 불운하고 빚진 이들을 고용해 온갖 금지되고 종종 치명적인 확률 게임과 기타 악덕을 은밀히 주최하며, $LRSK_CRIME_OPTION_COMMON_2$ §R+20§!입니다.\n\n"
 lrsk_gov_var_bldg_galactic_excursions_office:0 "은하 여행 사무소"
 lrsk_gov_var_bldg_galactic_excursions_office_desc:0 "은하는 당신이 탐험할 곳입니다! 우리와 함께 완벽한 성간 휴가를 계획하십시오. 모든 목적지에 경쟁력 있는 패키지 상품이 제공됩니다."
 lrsk_gov_var_bldg_heritage_museum:0 "유산 박물관"
 lrsk_gov_var_bldg_heritage_museum_desc:0 "은하의 모든 민족은 자신들을 특별하게 구분짓는 자랑스러운 유산을 지니고 있습니다. 우리의 천재성은 그것을 드러내도록 돕는 데 있습니다. 유산 박물관은 당신 민족의 천재성과 영광에 바치는 신전이며, 우리는 당신이 그것을 소중히 여기기를 권합니다."
 lrsk_gov_var_bldg_mediation_retreat:0 "중재 수련장"
 lrsk_gov_var_bldg_mediation_retreat_desc:0 "이 아름답고 외딴 수련장은 이해 당사자들이 우리의 전문 분쟁 중재 및 조정 전문가를 통해 비폭력적인 방식과 상호 이익을 위해 갈등을 해결하게 하는 완벽한 환경을 제공합니다."
 lrsk_gov_var_bldg_professional_protection_office:0 "전문 조사 사무소"
 lrsk_gov_var_bldg_professional_protection_office_desc:0 "헌신적인 전문 탐정, 감찰관, 경비원, 기타 '문제 해결사'들이 다양한 문제를 해결할 준비가 되어 있습니다. 배우자의 불륜 의심, 잠재적이고 원치 않는 범죄 활동, 노동자 동요 소문 등 무엇이든 말입니다."
 lrsk_gov_var_bldg_military_excellence_academy:0 "군사 탁월성 사관학교"
 lrsk_gov_var_bldg_military_excellence_academy_desc:0 "전투가 시작되기 전에 한 민족의 역량은 잘 단련되어야 합니다. 여기서 최고의 전략가들이 병사와 장교 모두에게 전쟁의 기술을 가르칩니다... 전쟁을 더 잘 수행하고, 전쟁이 가져오는 수익성 높은 투기 기회를 활용하기 위해서입니다."
 LRSK_MILITARY_EXCELLENCE_COMMON_1:0 "주재 제국의"
 LRSK_MILITARY_EXCELLENCE_COMMON_2:0 "생성되거나 레벨 상승 시 긍정적 특성을 얻을 확률이 §G+20%§! 증가하고, 제국 내 첫 번째 이후의 §G+10%§!를 §Y$lrsk_gov_var_bldg_military_excellence_academy$§!마다 더 얻습니다. 최대 +100%.\n\n"
 lrsk_military_excellence_naval_effect:0 "$LRSK_MILITARY_EXCELLENCE_COMMON_1$ §Y제독§!은 $LRSK_MILITARY_EXCELLENCE_COMMON_2$"
 lrsk_military_excellence_army_effect:0 "$LRSK_MILITARY_EXCELLENCE_COMMON_1$ §Y장군§!은 $LRSK_MILITARY_EXCELLENCE_COMMON_2$"
 lrsk_military_excellence_both_effect:0 "$LRSK_MILITARY_EXCELLENCE_COMMON_1$ §Y군사 지도자§!는 $LRSK_MILITARY_EXCELLENCE_COMMON_2$"
 lrsk_gov_var_bldg_reformatory_workhouse:0 "교정 작업장"
 lrsk_gov_var_bldg_reformatory_workhouse_desc:0 "감옥과 제조 시설이 결합된 이곳에서 채무자들은 그 빚이 돈에 대한 것이든 사회에 대한 것이든, 채권자에게 갚기 위해 고된 일을 합니다."
 lrsk_legit_debt_repay_bonus:0 "효율적인 노동력 자산 최적화가 §Y$BRANCH_OFFICE_VALUE$§!를 §G15%§! 증가시킵니다.\n\n"
 lrsk_crim_workhouse_pop_steal_chance:0 "$LRSK_CRIME_OPTION_COMMON_1$ 이 §Y$lrsk_gov_var_bldg_reformatory_workhouse$§!를 노예화 준비 장소로 사용합니다. 이들은 매년 §R5%§! 확률로 이 행성에서 £pop£ §Y팝§!을 훔쳐갈 수 있습니다! 행성에 £pop£ §Y팝§!, §Y$STRING_UNEMPLOYMENT$§!, $type_crime$이 많을수록 더 잘 발생합니다. 주재 제국에서는 최대 5년에 한 번만 일어날 수 있습니다. 기업은 또한 수감자들이 빚을 갚을... 대안적 방법을 제공하며, $LRSK_CRIME_OPTION_COMMON_2$ §R+20§!입니다.\n\n"
 lrsk_gov_var_bldg_offworld_jobs_placement:0 "외계 일자리 배치소"
 lrsk_gov_var_bldg_offworld_jobs_placement_desc:0 "외계 개발단에서 기회가 기다립니다! 먼 새로운 세계로 여행해 그곳을 작동하게 만들고, 가족을 위해 돈을 벌어 오십시오. 직원의 95%가 배치에서 안전하게 귀환합니다."
 lrsk_offworld_work_effect:0 "지사 소유자는 §G+10%§! §Y식민지 개발 속도§!와 §G+5%§! §Y채굴 기지 산출량§!을 보유한 $lrsk_gov_var_bldg_offworld_jobs_placement$마다 얻습니다. 각각 최대 100%와 50%.\n\n"
 lrsk_legit_worker_bonus:0 "§G+10%§! §Y$BRANCH_OFFICE_VALUE$§!, 그리고 추가 §G+5%§! §Y$BRANCH_OFFICE_VALUE$§!를 충원된 £job_lrsk_gov_var_job_offworld_worker£ §Y$job_lrsk_gov_var_job_offworld_worker$§! 직업마다 제공합니다.\n\n"
 lrsk_crim_smuggle_bonus:0 "$LRSK_CRIME_OPTION_COMMON_1$ §Y$job_lrsk_gov_var_job_offworld_worker_plural$§!를 밀수품 운반에 사용하며, $LRSK_CRIME_OPTION_COMMON_2$ §R+20§!이고, §R10%§!씩 충원된 §Y$job_lrsk_gov_var_job_offworld_worker$§! 직업마다 증가합니다.\n\n"
 lrsk_gov_var_bldg_local_news_office:0 "지역 뉴스 방송국"
 lrsk_gov_var_bldg_local_news_office_desc:0 "스포츠, 날씨, 정치 스캔들, 시사 평론가 등 행성의 모든 주목할 만한 뉴스를 대중 소비용으로 하루 종일 매일 방송합니다. 이 뉴스 방송국에는 모든 것이 있습니다."
 LRSK_MEDIA_FAVOR_COMMON:0 "이 행성에서 국가적 스캔들을 밝혀 협박에 사용할 때, 주재 제국으로부터 매년 §Y호의§!를 얻을 확률입니다! 수도 행성, $type_crime$이 높거나 $r_stability$가 낮은 행성, 그리고 특정 결정 기반 변동치가 있는 행성에서 더 잘 발생합니다. 예: §Y$anticrime_campaign$§!, §Y$crime_lord_deal$§!, §Y$planet_population_expelled$§!, §Y$planet_population_control$§!, §Y$planet_growth_discouraged$§!, §Y$martial_law$§!. 주재 제국에서는 최대 5년에 한 번만 일어날 수 있습니다."
 lrsk_media_legit_favor_chance:0 "지사 소유자는 §R5%§! $LRSK_MEDIA_FAVOR_COMMON$\n\n양질의 구독 옵션과 구독자 서비스가 §Y$BRANCH_OFFICE_VALUE$§!를 §G10%§! 증가시킵니다.\n\n"
 lrsk_media_crim_favor_chance:0 "지사 소유자는 §R2.5%§! $LRSK_MEDIA_FAVOR_COMMON$\n\n$LRSK_CRIME_OPTION_COMMON_1$ 이 §Y$lrsk_gov_var_bldg_local_news_office$§!를 이용해 $type_crime$에 맞서려는 모든 노력을 찾아내고 공개 보도하며, $LRSK_CRIME_OPTION_COMMON_2$ §R+20§!입니다.\n\n"
 job_lrsk_gov_var_job_knight:0 "영지 기병"
 job_lrsk_gov_var_job_knight_plural:0 "$job_lrsk_gov_var_job_knight$s"
 job_lrsk_gov_var_job_knight_desc:0 "현대 국가와 군사 장치의 필수적인 일부가 된 하급 전사 귀족입니다. 그래도 그들은 오래된 규범을 지킵니다. 영지를 방어하고, 약자를 보호하고, 질서를 유지하며, 정의를 실현하는 것입니다."
 job_lrsk_gov_var_job_knight_effect_desc:0 "£job_lrsk_gov_var_job_knight£ $job_lrsk_gov_var_job_knight_plural$은 £mod_country_naval_cap_add£ §Y$MOD_COUNTRY_NAVAL_CAP_ADD$§!를 증가시키고, £defense_army£ §Y방위군§!을 생성하며, $type_crime$을 감소시키고 $r_stability$를 증가시킵니다."
