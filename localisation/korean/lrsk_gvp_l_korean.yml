 LRSK_QCC_END_RIVALRY_HOSTILE:0 "우리가 관계를 무엇이라 부르든, [Root.GetName]은(는) 당신에 대해 경멸만을 품고 있습니다."
 LRSK_QCC_END_RIVALRY_PROPOSE:0 "[From.GetName]은(는) 당신과의 경쟁 관계를 끝내기로 숙고했습니다. 우리는 이 증오의 지속적 확산에 목적이 없다고 봅니다."
 LRSK_QCC_END_RIVALRY_ACCEPT_FRIENDLY:0 "[Root.GetName]은(는) 오늘 기쁨을 느낍니다. 우리의 [From.GetSpeciesAdj] 친구들이 마침내 오해를 풀었기 때문입니다."
 LRSK_QCC_END_RIVALRY_ACCEPT_NEUTRAL:0 "[Root.GetName]은(는) 감당할 수 있는 것보다 더 많은 적을 원하지 않습니다. 우리는 이 경쟁 관계를 끝내는 데 동의합니다."
 LRSK_QCC_END_RIVALRY_ACCEPT_HOSTILE:0 "형식은 당신이 말하는 동안 우리 정신 위로 밀려오는 증오의 물결을 바꾸지 않습니다."
 LRSK_QCC_INTEGRATE_FRIENDLY:0 "우리는 [Root.GetName]을(를) 소중히 여기지만, 우리에게 [From.GetName]보다 더 합당한 계승자는 거의 없을 것입니다."
 LRSK_QCC_INTEGRATE_NEUTRAL:0 "급진적인 제안이지만, 우리는 여럿을 하나로 결합하는 이점을 알고 있습니다."
 LRSK_QCC_INTEGRATE_HOSTILE:0 "우리는 통합의 진정한 의미를 압니다. 당신이 제안하는 것과는 전혀 다릅니다."
 LRSK_QCC_INTEGRATE_PROPOSE:0 "완전한 교감으로 가는 길은 하나뿐입니다. [From.GetName]에 합류하여 우리의 생각과 꿈과 하나가 되십시오."
 LRSK_QCC_INTEGRATE_ACCEPT_FRIENDLY:0 "더 큰 것의 일부가 됨으로써, 우리는 사회를 발전시킵니다. [Root.GetName]의 시대는 끝납니다. [From.GetName]의 시대가 밝아옵니다."
 LRSK_QCC_INTEGRATE_ACCEPT_NEUTRAL:0 "[Root.GetName]은(는) 시대에 맞춰 변해야 합니다. 우리의 개체들은 당신에게 합류할 것입니다."
 LRSK_QCC_INTEGRATE_ACCEPT_HOSTILE:0 "피할 수 없어 보입니다. 우리의 개체들이 [Root.GetName]의 영광스러운 나날을 잊을 것이라 생각하지 마십시오, [From.GetRulerTitle]."
 LRSK_QCC_INSULT_NEUTRAL:0 "말을 신중히 고르십시오. 우리는 이 정보를 보존할 것입니다."
 LRSK_QCC_INSULT_FRIENDLY:0 "우리는 당신에게 좋은 말만을 갖고 있으며, 당신도 우리에게 그러하리라 믿습니다."
 LRSK_QCC_INSULT_HOSTILE:0 "우리는 이미 당신 메시지의 본질을 알고 있는 듯합니다..."
 LRSK_QCC_INSULT_PROPOSE_01:0 "우리의 정신 네트워크는 광대하여 제국 곳곳의 생각과 사상에 접근할 수 있지만, 그 어떤 개체도 당신의 비극적 존재에 가치를 부여할 만한 것을 본 적이 없습니다."
 LRSK_QCC_INSULT_PROPOSE_02:0 "우리는 [Root.GetRulerTitle] [Root.GetRulerName]을(를) [From.GetName] 합류 후보로 평가했습니다. 유감스럽게도, 구성원 자격에는 기초적인 뇌가 필요하다고 알려 드려야겠습니다."
 LRSK_QCC_INSULT_ACCEPT_NEUTRAL:0 "모든 [Root.GetSpeciesName]이(가) 당신의 더러운 말을 들었습니다, [From.GetSpeciesName]. 우리는 즐겁지 않습니다."
 LRSK_QCC_INSULT_ACCEPT_FRIENDLY:0 "그런 거친 말을 잊을 수 있다면 좋겠지만, [Root.GetSpeciesName] 하나라도 살아 있는 한 당신의 잔혹함에 대한 기억은 계속될 것입니다."
 LRSK_QCC_INSULT_ACCEPT_HOSTILE:0 "우리의 위대한 사고 능력을 감정의 부재로 착각하지 마십시오. 우리의 분노는 당신이 상상할 수 있는 것보다 크며, 우리는 그 전부를 당신에게 느끼게 할 것입니다."
