 job_lrsk_gov_var_job_infoguide:0 "정보 안내자"
 job_lrsk_gov_var_job_infoguide_plural:0 "$job_lrsk_gov_var_job_infoguide$s"
 job_lrsk_gov_var_job_infoguide_desc:0 "숙련된 관광 안내자와 교육자들이 학습 명소를 운영하고, 학생-후원자들이 지식 탐구에서 가장 관련 있고 흥미로운 경험을 찾도록 돕습니다."
 job_lrsk_gov_var_job_infoguide_effect_desc:0 "£job_lrsk_gov_var_job_infoguide£ $job_lrsk_gov_var_job_infoguide_plural$는 $r_lrsk_research$와 $r_amenities$를 생산합니다."
