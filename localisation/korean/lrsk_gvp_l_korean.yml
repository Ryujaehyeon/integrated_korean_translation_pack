 mod_job_lrsk_gvp_job_citscholar_per_pop:0 "§G+1§! $job_lrsk_gvp_job_citscholar$ 직업 per $VALUE$ §Y팝§!"
 mod_job_lrsk_gvp_job_citscholar_per_pop_short:0 "\n§G+1§! £mod_job_lrsk_gvp_job_citscholar_add£당 $VALUE$ £pop£"
 job_lrsk_gov_var_job_regional_coordinator:0 "행성 감사관"
 job_lrsk_gov_var_job_regional_coordinator_plural:0 "$job_lrsk_gov_var_job_regional_coordinator$s"
 job_lrsk_gov_var_job_regional_coordinator_desc:0 "지역 행정 서브루틴에 일시적으로 반지성을 부여하고 행성 물류 체계를 감사하고 재프로그램할 광범위한 권한을 부여한 존재들입니다. 그들의 개입은 조직적 일관성과 서비스 효율에서 인상적인 이득을 풀어내지만, 동시에 일부 불규칙성과 갈등도 도입합니다."
 job_lrsk_gov_var_job_regional_coordinator_effect_desc:0 "£job_lrsk_gov_var_job_regional_coordinator£ $job_lrsk_gov_var_job_regional_coordinator_plural$는 $r_energy$를 $r_unity$와 $r_lrsk_amenities_nohappy$로 전환합니다. 그러나 $r_stability$를 감소시킵니다."
 mod_job_lrsk_gov_var_job_regional_coordinator_add:0 "$job_lrsk_gov_var_job_regional_coordinator$ 직업"
 mod_job_lrsk_gov_var_job_regional_coordinator_per_pop:0 "§G+1§! $job_lrsk_gov_var_job_regional_coordinator$ 직업 per $VALUE$ §Y팝§!"
 mod_job_lrsk_gov_var_job_regional_coordinator_per_pop_short:0 "\n\n§G+1§! £mod_job_lrsk_gov_var_job_regional_coordinator_add£ 당 $VALUE$ £pop£"
 job_lrsk_gov_var_job_planetmind_overseer:0 "행성 정신 감독자"
 job_lrsk_gov_var_job_planetmind_overseer_plural:0 "$job_lrsk_gov_var_job_planetmind_overseer$s"
 job_lrsk_gov_var_job_planetmind_overseer_desc:0 "지역 행성 정신의 의지를 집중하고 해석하여, 그것이 보조 군체 의식처럼 행동할 수 있게 하는 고도로 특화된 드론입니다. 이는 초월의식이 다른 임무를 수행할 여유를 줍니다. 그러나 행성 정신은 사물을 운영하는 방식에 대해 자신만의 이상한 생각을 가질 수도 있습니다..."
 job_lrsk_gov_var_job_planetmind_overseer_effect_desc:0 "£job_lrsk_gov_var_job_planetmind_overseer£ $job_lrsk_gov_var_job_planetmind_overseer_plural$는 $r_influence$를 생산하고, £pops£ §Y$MOD_POP_HOUSING_USAGE_MULT$§!를 감소시키며, £mod_country_naval_cap_add£ §Y$MOD_COUNTRY_NAVAL_CAP_ADD$§!를 증가시키고, £mod_empire_size_add£ §Y$EMPIRE_SIZE$§!를 감소시킵니다. 그러나 $type_deviancy$를 생산하고 $r_stability$를 감소시킵니다. 이들은 $r_food$와 $r_unity$를 소비합니다."
 mod_job_lrsk_gov_var_job_planetmind_overseer_add:0 "$job_lrsk_gov_var_job_planetmind_overseer$ 직업"
