 policy_esap_ct1_expansion_settlers:0 "개척자 정책"
 policy_esap_ct1_expansion_settlers_desc:0 "개척자와 확장 노력에 자원과 연구를 배정합니다."
 policy_option_esap_ct1_expansion_settlers_A:0 "경량 효율"
 policy_option_esap_ct1_expansion_settlers_A_desc:0 "우리 개척선은 더 작고 간결하여 더 빠르게 건조할 수 있습니다.\n\n§R정책을 변경하면 배치된 모든 개척선이 개장을 위해 해산됩니다.§!"
 policy_option_esap_ct1_expansion_settlers_B:0 "균형 잡힌 노력"
 policy_option_esap_ct1_expansion_settlers_B_desc:0 "우리의 확장은 우리의 생존을 보장합니다.\n\n§R정책을 변경하면 배치된 모든 개척선이 개장을 위해 해산됩니다.§!"
 policy_option_esap_ct1_expansion_settlers_C:0 "성간 개척자"
 policy_option_esap_ct1_expansion_settlers_C_desc:0 "저 좋은 밤 속으로 순순히 들어가지 마십시오. 노년은 날이 저물 때 불타오르고 포효해야 합니다. 사라지는 빛을 향해 분노하고, 또 분노하십시오.\n\n§R정책을 변경하면 배치된 모든 개척선이 개장을 위해 해산됩니다.§!"
 policy_option_esap_ct1_expansion_settlers_D:0 "마크로스 프론티어"
 policy_option_esap_ct1_expansion_settlers_D_desc:0 "거대한 재앙이 닥쳤을 때 살아남기 위해, 우리는 우주의 모든 방향에서 땅을 찾아야 합니다.\n\n§R정책을 변경하면 배치된 모든 개척선이 개장을 위해 해산됩니다.§!"
 sm_esap_ct2_diplomacy_finance_trade_post:0 "교역소"
 sm_esap_ct2_diplomacy_finance_trade_post_desc:0 "우리 제국의 가장 구석진 부분조차도 교역소에서 멀리 떨어져있지는 않습니다. 교역소는 주변 행성에서 만들어진 모든 종류의 희귀한 물건들을 사들이며, 상품들은 대량으로, 더 큰 시장으로 운송되어 판매됩니다."
 sesap_ct2_diplomacy_finance_trade_post:0 "무역소"
 sm_esap_ct2_diplomacy_finance_trade_post_desc_modifier:0 "£trade_value£ §Y무역 가치§! §G10§!을 생산하고, §Y무역 허브§! 하나당 추가로 £trade_value£ §Y무역 가치§! §G2§!를 생산합니다."
 tech_esap_technological_ascendancy_bonus_1_phys_research:0 "최신 끈 이론"
 tech_esap_technological_ascendancy_bonus_1_phys_research_desc:0 "발전된 끈 이론은 분명 많은 분야의 과학에 적용할 수 있을 것입니다."
 tech_esap_technological_ascendancy_bonus_1_shield:0 "동적 보호막 기술"
 tech_esap_technological_ascendancy_bonus_1_shield_desc:0 "닥쳐오는 공격을 예측하고 보호막 강도를 동적으로 조절하여 보호막의 효율을 크게 향상시켰습니다."
 tech_esap_technological_ascendancy_bonus_1_laser:0 "참신한 광 동기화 기술"
 tech_esap_technological_ascendancy_bonus_1_laser_desc:0 "이 신기술은 레이저의 빛을 더욱 잘 동기화되도록 합니다. 이 기술은 에너지 무기의 공격력을 증가시킬것입니다."
 tech_esap_technological_ascendancy_bonus_1_survey:0 "병렬형 감지기 구조"
 tech_esap_technological_ascendancy_bonus_1_survey_desc:0 "이 신기술은 함선에서 동시에 여러개의 감지기를 조정할수있도록 해줍니다. 다수의 감지기를 통해, 이전보다 훨씬 빠른속도로 행성을 탐사할 수 있습니다."
 tech_esap_technological_ascendancy_bonus_1_admin_cap:0 "양자 얽힘 통신"
 tech_esap_technological_ascendancy_bonus_1_admin_cap_desc:0 "우리는 양자 얽힘을 이용해 제국 전체의 통신을 매우 효율적으로 만드는 새로운 통신 시스템을 개발했습니다."
 tech_esap_technological_ascendancy_bonus_1_society_research:0 "이론심리학 연구"
 tech_esap_technological_ascendancy_bonus_1_society_research_desc:0 "이론심리학이 직접적으로 응용되는 것은 아니지만, 다른 관련 분야에 긍정적인 영향을 미칠 것입니다."
 tech_esap_technological_ascendancy_bonus_1_army:0 "새로운 군사 전술"
 tech_esap_technological_ascendancy_bonus_1_army_desc:0 "소규모 정예 분대를 이용해 군대의 효율을 높이는 새로운 군사 전술을 개발해냈습니다."
 tech_esap_technological_ascendancy_bonus_1_lifespan:0 "차세대 영양소"
 tech_esap_technological_ascendancy_bonus_1_lifespan_desc:0 "은하계에 존제하는 다양한 음식에 대한 대규모 정량적 연구를 통해 새로운 영양 혼합물을 만들어낼 수 있었습니다. 소위 차세대 영양소라 불리는 이 혼합물은 건강에 더 좋습니다."
 tech_esap_technological_ascendancy_bonus_1_influence:0 "선진 정치 연구"
 tech_esap_technological_ascendancy_bonus_1_influence_desc:0 "우리가 별을 향해 나아가기 시작한 이래로 우리의 정치 체계는 빠르게 발전해왔습니다. 우리가 연구하기 힘들 정도로 빠르게 말입니다. 이제는 이 문제를 해결해야합니다. 우리는 현재 정치 구조에 대한 전반적인 연구가 필요합니다."
 tech_esap_technological_ascendancy_bonus_1_envoy:0 "외계 풍습 연구"
 tech_esap_technological_ascendancy_bonus_1_envoy_desc:0 "우리는 외계 제국의 풍습을 연구할 것입니다. 이 지식은 우리 외교관들이 은하의 다른 문명과 만날 때 잘 사용될 것입니다."
 tech_esap_technological_ascendancy_bonus_1_engineering_research:0 "고급 이론 화학"
 tech_esap_technological_ascendancy_bonus_1_engineering_research_desc:0 "원자와 분자의 성질은 우리의 공학 연구에 필수적입니다. 이론 연구가 직접적인 응용으로 이어지지는 않으나, 이론 분야에서의 발전은 결국 더 실용적인 분야에서의 발전으로 이어질 것입니다."
 tech_esap_technological_ascendancy_bonus_1_armor:0 "아원자 소재 연구"
 tech_esap_technological_ascendancy_bonus_1_armor_desc:0 "아원자 수준에서 물질의 구조를 조사함으로써 장갑의 내구성을 높일 수 있었습니다."
 tech_esap_technological_ascendancy_bonus_1_missiles:0 "진공 폭발 연구"
 tech_esap_technological_ascendancy_bonus_1_missiles_desc:0 "폭발 무기가 처음 개발되었을 때에는 대기 내에서 사용되었지만, 현재 폭발 무기는 우주의 진공에서 사용되는 만큼 그 조건이 크게 달라졌습니다. 우주에서 폭발이 어떤 작용을 하는지에 대한 연구를 진전시키면 폭발 무기의 효율성이 크게 좋아질 것입니다."
 tech_esap_technological_ascendancy_bonus_1_kinetic:0 "초정밀 조준 시스템"
 tech_esap_technological_ascendancy_bonus_1_kinetic_desc:0 "질량 병기는 적 함선의 좁은 범위에 엄청난 양의 운동 에너지를 전달합니다. 이 기술로 적 함선의 약점을 정확히 찾아냄으로써 질량 병기의 공격이 최대한의 피해를 입힐수 있도록 합니다."
 tech_esap_technological_ascendancy_bonus_1_stations:0 "행성 기지 표준화"
 tech_esap_technological_ascendancy_bonus_1_stations_desc:0 "자원 추출과 연구에 사용되는 행성 기지의 설계를 표준화했습니다. 이로써 더 적은 자원으로 새로운 행성 기지를 건설할수 있게 되었습니다."
 leader_trait_admiral_esap_ct1_war_deceptive:0 "기만"
 leader_trait_admiral_esap_ct1_war_deceptive_desc:0 "강할때 약하게 보이고, 약할때 강하게 보입니다."
 leader_trait_admiral_esap_ct1_war_decisive:0 "결단력"
 leader_trait_admiral_esap_ct1_war_decisive_desc:0 "군에 닥치는 최악의 재앙은 주저함에서 비롯됩니다."
 leader_trait_admiral_esap_ct1_war_moderate:0 "중도"
 leader_trait_admiral_esap_ct1_war_moderate_desc:0 "적이 뿌리는 미끼를 물지 마십시오. 귀향하는 군인들을 방해하지 마십시오."
 leader_trait_admiral_esap_ct1_war_observant:0 "관찰력"
 leader_trait_admiral_esap_ct1_war_observant_desc:0 "적을 쓰러뜨릴 기회는 적 스스로에게서 비롯됩니다."
 leader_trait_admiral_esap_ct1_war_opportunist:0 "기회주의자"
 leader_trait_admiral_esap_ct1_war_opportunist_desc:0 "기회는 잡을수록 늘어납니다."
 leader_trait_admiral_esap_ct1_war_prudent:0 "신중함"
 leader_trait_admiral_esap_ct1_war_prudent_desc:0 "행동하기전에 신중하고 또 신중하십시오."
 leader_trait_admiral_esap_ct1_war_wise:0 "지혜"
 leader_trait_admiral_esap_ct1_war_wise_desc:0 "싸울 때와 싸우지 않을 때를 아는 자가 이길것입니다."
 leader_trait_general_esap_ct1_war_ambusher:0 "매복자"
 leader_trait_general_esap_ct1_war_ambusher_desc:0 "신중하게 매복하고 기다리는 자가 승리하는 법입니다."
 leader_trait_general_esap_ct1_war_demoralizer:0 "사기저하"
 leader_trait_general_esap_ct1_war_demoralizer_desc:0 "적을 무너뜨리는 가장 탁월한 방법은 적의 사기를 꺾는 것입니다."
 leader_trait_general_esap_ct1_war_enigma:0 "수수께끼"
 leader_trait_general_esap_ct1_war_enigma_desc:0 "계획은 밤처럼 어둡고 보이지않게, 행동할 때는 내려치는 벼락처럼 빠르게."
 leader_trait_general_esap_ct1_war_inspirational:0 "감화"
 leader_trait_general_esap_ct1_war_inspirational_desc:0 "부하를 사랑하는 자식처럼 대하십시오. 그들은 당신을 끝까지 따를 것입니다."
 leader_trait_general_esap_ct1_war_preservative:0 "보존적"
 leader_trait_general_esap_ct1_war_preservative_desc:0 "공격받지 않을 위치를 고수할 때, 방어의 안전은 보장됩니다."
 leader_trait_ruler_esap_egalitarian_2_nerd:0 "너드"
 leader_trait_ruler_esap_egalitarian_2_nerd_desc:0 "이 지도자는 항상 최신 유행의 문화 시스템을 갖추고있습니다. 이것이 연구원들이 계산하는데 필요한 자원을 확보하는데 방해가 되진 않습니다. 최신형 가상 현실 그래픽 시스템이 좀 더 일찍 도착한다면 말이죠..."
 leader_trait_ruler_esap_egalitarian_2_competitive:0 "경쟁적"
 leader_trait_ruler_esap_egalitarian_2_competitive_desc:0 "이 지도자는 굉장히 경쟁적입니다. 경쟁자의 성공을 개인적 모욕으로 받아들이고, 그들에게 패배하는것을 재앙으로 여깁니다."
 leader_trait_ruler_esap_egalitarian_2_race_watcher:0 "경주 관람객"
 leader_trait_ruler_esap_egalitarian_2_race_watcher_desc:0 "이 지도자는 선박경주를 관람하는것을 즐깁니다. 항상 경기의 최신 데이터를 갱신하며 시간이 허락하는 한 경기장에 방문합니다."
 leader_trait_ruler_esap_egalitarian_2_academic:0 "학구적"
 leader_trait_ruler_esap_egalitarian_2_academic_desc:0 "이 지도자는 학자로서 배움의 중요성을 이해하고있습니다."
 leader_trait_ruler_esap_egalitarian_2_pious:0 "독실함"
 leader_trait_ruler_esap_egalitarian_2_pious_desc:0 "이 지도자는 매우 독실하여, 우리의 이상을 향해 변함없이 헌신합니다. 이 헌신으로 우리의 시민들에게 큰 존경을 받습니다."
 leader_trait_ruler_esap_egalitarian_2_stargazer:0 "천문학자"
 leader_trait_ruler_esap_egalitarian_2_stargazer_desc:0 "이 지도자는 어린시절부터 별들에 매료되어 바깥세상에 무엇이 있는지 궁금증을 품어왔습니다."
 leader_trait_ruler_esap_egalitarian_2_shrewd_politician:0 "기민한 정치가"
 leader_trait_ruler_esap_egalitarian_2_shrewd_politician_desc:0 "이 지도자는 정치의 안팎으로 모두 정통합니다."
 leader_trait_ruler_esap_egalitarian_2_military_background:0 "군부 출신"
 leader_trait_ruler_esap_egalitarian_2_military_background_desc:0 "이 지도자는 군인출신입니다. 효과적인 군사 운용에 필요한것을 잘 알고있습니다."
 leader_trait_ruler_esap_egalitarian_2_progressive:0 "진보적"
 leader_trait_ruler_esap_egalitarian_2_progressive_desc:0 "이 지도자는 진보주의적입니다. 변화를 빠르게 수용하고 사회가 더 발전할것이라는 확고한 믿음을 갖고 있습니다."
 leader_trait_governor_esap_egalitarian_2_entrepreneur:0 "사업가"
 leader_trait_governor_esap_egalitarian_2_entrepreneur_desc:0 "이 지도자는 총독이 되기전에 성공한 사업가로서, 돈을 버는데 있어서 검증된 전문가입니다."
 leader_trait_governor_esap_egalitarian_2_strict:0 "엄격함"
 leader_trait_governor_esap_egalitarian_2_strict_desc:0 "이 지도자는 엄격하기로 유명합니다. 그들의 관리들에게 완고한 규율을 요구합니다. 그 누구도 이 지도자의 권위에 의문을 가지지않습니다."
 leader_trait_governor_esap_egalitarian_2_ascetic:0 "금욕적"
 leader_trait_governor_esap_egalitarian_2_ascetic_desc:0 "이 지도자는 자신의 일에 집중하기위해 세속적인 즐거움을 버렸습니다. 그는 부하들에게도 똑같은 헌신을 기대합니다."
 leader_trait_governor_esap_egalitarian_2_ecologist:0 "환경주의자"
 leader_trait_governor_esap_egalitarian_2_ecologist_desc:0 "이 지도자는 우리 문명이 서있는 행성에 얼마나 의존하고 있는지 깊이 이해하고 있습니다."
 leader_trait_governor_esap_egalitarian_2_ambitious:0 "야심가"
 leader_trait_governor_esap_egalitarian_2_ambitious_desc:0 "이 지도자는 만족을 모릅니다."
 leader_trait_governor_esap_egalitarian_2_orator:0 "연설가"
 leader_trait_governor_esap_egalitarian_2_orator_desc:0 "이 지도자는 능숙한 연설가로서 온 제국에 연설방송을 통해 시민들을 선동할 수 있습니다."
 leader_trait_scientist_esap_egalitarian_2_bioinformatician:0 "생체정보"
 leader_trait_scientist_esap_egalitarian_2_bioinformatician_desc:0 "이 지도자는 숙련된 생물정보학자로, 생물학적 문제를 컴퓨터를 기반으로 한 방법으로 해결합니다."
 leader_trait_scientist_esap_egalitarian_2_navy_background:0 "해군 출신"
 leader_trait_scientist_esap_egalitarian_2_navy_background_desc:0 "이 지도자는 연구자가 되기전까지 해군에 복무했었습니다. 그는 군함의 근무 절차에 익숙합니다."
 leader_trait_scientist_esap_egalitarian_2_racer:0 "늙은 레이서"
 leader_trait_scientist_esap_egalitarian_2_racer_desc:0 "이 지도자는 젊을적에 많은 경주대회에서 우승한 성공적인 레이서였습니다."
 leader_trait_scientist_esap_egalitarian_2_mathematician:0 "수학자"
 leader_trait_scientist_esap_egalitarian_2_mathematician_desc:0 "이 지도자는 수학을 전공했었으며, 이론물리학을 연구할 때 가진 기술을 활용 합니다."
 leader_trait_scientist_esap_egalitarian_2_explorer:0 "탐험가"
 leader_trait_scientist_esap_egalitarian_2_explorer_desc:0 "이 지도자는 천성적인 탐험가로서, 우주와 우주 너머에 무엇이 있는지에 대한 궁금증이 가득합니다."
 leader_trait_scientist_esap_egalitarian_2_systematic:0 "체계적"
 leader_trait_scientist_esap_egalitarian_2_systematic_desc:0 "이 지도자는 아주 체계적입니다. 그는 직면하는 문제를 해결할때 운에 맡기는 경우가 없습니다."
 leader_trait_scientist_esap_egalitarian_2_traveler:0 "여행자"
 leader_trait_scientist_esap_egalitarian_2_traveler_desc:0 "이 지도자는 머나먼곳까지 여행해봤습니다. 이 은하의 다양한 장소와 제국들에 대해 잘 알고있습니다."
 leader_trait_scientist_esap_egalitarian_2_chemist:0 "화학자"
 leader_trait_scientist_esap_egalitarian_2_chemist_desc:0 "이 지도자는 화학을 전공했었으며, 다양한 공학분야의 고급 연구에 임할때 가진 지식을 활용합니다."
 leader_trait_general_esap_egalitarian_2_impetuous:0 "성급함"
 leader_trait_general_esap_egalitarian_2_impetuous_desc:0 "이 지도자는 행동이 민첩하여, 상대방이 미처 준비되기 전에 먼저 공격합니다."
 leader_trait_general_esap_egalitarian_2_careful:0 "조심스러움"
 leader_trait_general_esap_egalitarian_2_careful_desc:0 "이 지도자는 조심스럽고 신중해서, 불필요한 모험은 하지 않습니다."
 leader_trait_general_esap_egalitarian_2_courageous:0 "용감함"
 leader_trait_general_esap_egalitarian_2_courageous_desc:0 "이 지도자는 용감합니다. 그의 용기는 부하들을 고무시킵니다."
 leader_trait_general_esap_egalitarian_2_planer:0 "계획적"
 leader_trait_general_esap_egalitarian_2_planer_desc:0 "이 지도자는 복잡한 계획을 새우고, 군사작전을 최적화 하는데 능숙합니다."
 leader_trait_general_esap_egalitarian_2_unpredictable:0 "예측불가"
 leader_trait_general_esap_egalitarian_2_unpredictable_desc:0 "이 지도자의 행동은 예측할수 없습니다. 항상 예측할수 없는 순간에 적을 공격합니다."
 leader_trait_admiral_esap_egalitarian_2_intellegent:0 "지능적"
 leader_trait_admiral_esap_egalitarian_2_intellegent_desc:0 "이 지도자는 지능적이며 함대를 관리하고 적의 책략을 예측하는데 능숙합니다."
 leader_trait_admiral_esap_egalitarian_2_bad_tempered:0 "성질 나쁨"
 leader_trait_admiral_esap_egalitarian_2_bad_tempered_desc:0 "이 지도자는 성질이 고약합니다. 부하들의 어리석음을 용납하지 못하고, 적에게는 오로지 분노밖에 느끼지 못합니다."
 leader_trait_admiral_esap_egalitarian_2_tactical:0 "전술적"
 leader_trait_admiral_esap_egalitarian_2_tactical_desc:0 "이 지도자는 전술에 대한 예리한 감각을 가지고 있으며 적을 제압하고 적 제독의 계획에 대응하는 데 능숙합니다."
 leader_trait_admiral_esap_egalitarian_2_spaceborn:0 "우주태생"
 leader_trait_admiral_esap_egalitarian_2_spaceborn_desc:0 "이 지도자는 우주선에서 태어나 대부분의 삶을 그곳에서 살아왔습니다. 공허하게 빈 우주만이 그의 진정한 고향입니다."
 leader_trait_admiral_esap_egalitarian_2_battleborn:0 "전투태생"
 leader_trait_admiral_esap_egalitarian_2_battleborn_desc:0 "이 지도자는 어린시절부터 싸우며 살아왔습니다. 그의 삶은 오로지 전투와 다음 전투를 위한 회복의 연속이었습니다. 우주의 전투는 그저 좀 더 큰 규모의 전투일 뿐입니다."
 leader_trait_admiral_esap_egalitarian_2_shipwrighter:0 "조선공"
 leader_trait_admiral_esap_egalitarian_2_shipwrighter_desc:0 "이 지도자는 조선공으로써 일해 왔었으며, 우주선이 어떻게 건조되어야 하는지 잘 알고있습니다."
 leader_trait_admiral_esap_egalitarian_2_energy_weapons:0 "에너지 병기광"
 leader_trait_admiral_esap_egalitarian_2_energy_weapons_desc:0 "이 지도자는 젊을적부터 에너지 병기에 매료되었습니다. 그는 에너지 병기를 어떻게 하면 가장 효율적으로 사용할 수 있는지 잘 알고있습니다."
 leader_trait_admiral_esap_egalitarian_2_explosive_weapons:0 "폭발 병기광"
 leader_trait_admiral_esap_egalitarian_2_explosive_weapons_desc:0 "이 지도자는 젊을적부터 폭발 병기에 매료되었습니다. 그는 폭발 병기를 어떻게 하면 가장 효율적으로 사용할 수 있는지 잘 알고있습니다."
 leader_trait_admiral_esap_egalitarian_2_kinetic_weapons:0 "질량 병기광"
 leader_trait_admiral_esap_egalitarian_2_kinetic_weapons_desc:0 "이 지도자는 젊을적부터 질량 병기에 매료되었습니다. 그는 질량 병기를 어떻게 하면 가장 효율적으로 사용할 수 있는지 잘 알고있습니다."
 leader_trait_admiral_esap_egalitarian_2_physicist:0 "물리학자"
 leader_trait_admiral_esap_egalitarian_2_physicist_desc:0 "이 지도자는 물리학을 공부해왔으며, 우주의 이론적 원리를 잘 알고 있습니다."
 edict_esap_cornucopia:0 "풍요의 뿔 신호기"
 edict_esap_cornucopia_desc:0 "새 식민지에 수도 행성과 연결되는 웜홀을 만들어 핵심 자원을 이전할 수 있습니다. 이를 통해 §Y5년§! 동안 §Y편의§!와 §Y안정도§!가 증가합니다."
