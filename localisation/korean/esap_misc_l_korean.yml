 decision_esap_mining_desc:0 "새로운 채굴 기술은 행성 깊숙한 곳의 광물이 풍부한 동굴들을 발굴할수 있도록 해주었지만, 그 과정에 행성의 대기가 유독한 부산물로 오염되었습니다."
 decision_esap_mining_tooltip:0 "행성의 §Y거주 적합도§!와 §Y행복도§!를 §Y20§!년간 §G-10%§! 감소시킵니다. §Y$d_esap_mining$§! 행성 특징을 생성하고, §Y$mod_district_mining_max$§!을 §G2§! 증가시킵니다. §G10%§! 확률로 §Y$d_crystalline_caverns$§! 혹은 §Y$d_dust_caverns$§! 중 하나의 행성 특징이 생성됩니다. 이 행성 결정은 행성마다 §Y20§!년마다, §Y5§!회 발동할 수 있습니다."
