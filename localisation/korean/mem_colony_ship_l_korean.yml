l_korean:
 mem_colony_ship.2.name:0 "근접 경고"
 mem_colony_ship.2.desc:0 "초기 경고 시스템이 §Y[the_system.GetName] 시스템§!으로 빛의 약 3분의 1 속도로 접근하는 정체불명의 물체를 탐지했습니다. \n\n수집된 데이터는 결론을 내리기에는 불확실하지만, 물체의 속도를 고려할 때 인공 기원일 가능성이 가장 높습니다 - 원시 설계의 항성 간 선박입니다.\n\n그것은 우리의 경고나 신호에 반응하지 않았으므로 의도는 알 수 없지만, 현재의 경로는 현재 비어 있는 행성 §Y[mem_colony_ship_the_planet.GetName]§!이 최종 목적지임을 시사합니다. 모든 구조물을 지나쳐 충돌하거나 착륙하거나 행성을 공전할 것으로 예상됩니다."
 mem_colony_ship.2.a:0 "어디 한번 지켜보자."
 mem_colony_ship.2.b:0 "파괴하라. 감수할 수 있는 위험이 아니다."
 mem_colony_ship.2.eden:0 "식재 서브루틴을 시작합니다."
 mem_colony_ship_size:0 ""
 mem_colony_ship_size_plural:0 ""
 mem_colony_ship.3.name:0 "침입자 함선 파괴"
 mem_colony_ship.3.desc:0 "우린 §Y[FromFrom.Solar_System.GetName]§! 성계에 침입한 미확인 함선을 성공적으로 파괴하였습니다.\n\n잠재적인 위협은 제거되었지만, 함선의 임무와 정체는 여전히 미스터리로 남아있습니다."
 mem_colony_ship.3.a:0 "우리에겐 선택의 여지가 없었다."
 mem_colony_ship.3.b:0 "아무도 우리 영역을 자유롭게 침범하지 못한다."
 mem_colony_ship.3.c:0 "상태: 국경 안전"
 mem_colony_ship.3.d:0 "꼴 좋다."
 mem_colony_ship.6.name:0 "행성 착륙 실패"
 mem_colony_ship.6.desc:0 "우리가 추적해온 정체불명의 우주선이 성공적으로 §Y[mem_colony_ship_the_planet.GetName]§!에 도착했습니다. \n\n그러나 행성의 대기권에 진입하려고 시도하는 과정에서 우주선의 시스템이 고장난 것으로 보이며, 이로 인해 지표면으로 추락하게 되었고, 충격으로 인해 연기가 나는 분화구만 남게 되었습니다."
 mem_colony_ship.6.a:0 "이게 전부였나?"
 mem_colony_ship.6.eden:0 "탈출 서브루틴."
 d_mem_colony_ship_crater:0 "충돌 현장"
 d_mem_colony_ship_crater_desc:0 "용감했지만 운이 없었던 우주선의 기대에 미치지 못한 최후."
 mem_gov_colony_ship:0 "자치 식민 정부"
 mem_gov_colony_ship_desc:0 "새로운 세계를 관리하도록 임명된 자치권 있는 정부"
 RT_MEM_COLONIAL_MARSHAL:0 "식민지 원수"
 RT_MEM_COLONIAL_MARSHAL_FEMALE:0 "식민지 원수"
 mem_colony_ship_civic_one:0 "이데올로기 파벌주의"
 mem_colony_ship_civic_two:0 "변방 지역 혼란스러움"
 mem_colony_ship_civic_one_desc:0 ""
 mem_colony_ship_civic_two_desc:0 ""
 mem_recently_colonized_age:0 "새로운 식민지"
 mem_recently_colonized_age_desc:0 "상대적으로 미개한 함선에서 나온 개척자들은 외계 행성에 적응하기 위해 노력하고 있습니다. 그들은 서서히 성장하고 기술적인 발전을 이루거나... 죽을 것입니다."
 mem_colony_ship.8.name:0 "착륙"
 mem_colony_ship.8.desc:0 "우리의 공간에 침입했던 정체불명의 우주선이 성공적으로 행성에 착륙한 것 같습니다. \n\n그들은 [landed_country.GetSpeciesName]이라고 자신을 부르는 종족의 구성원들과 이 세계에 원시 식민지를 세우기 위한 장비를 가지고 있었으며, 이 세계를 §Y[mem_colony_ship_the_planet.GetName]§!이라고 부르기로 결정한 것 같습니다. \n\n그들은 이 시스템에서 우리의 존재를 전혀 인지하지 못한 것 같아, 그들의 감지기가 심각한 손상을 입었거나 처음부터 그리 좋지 않았던 것으로 보입니다."
 mem_colony_ship.8.a:0 "그들이 누구 영역에 침범했는지를 알려주자."
 mem_colony_ship.8.b:0 "일단 무시하자."
 mem_colony_ship.8.b.tooltip:0 "우린 그들과 연락을 시도하지 않을 것이지만, 다른 원시 문명 행성처럼 상호작용할 수 있습니다."
 mem_colony_ship.8.c:0 "공격하기에 최적의 시간이군."
 mem_colony_ship.8.eden:0 "식민지 성공적으로 조성되었습니다. 돌보기를 시작합니다."
 mem_colony_ship.10.name:0 "[mem_colony_ship_the_planet.GetName]에 대한 개방된 채널"
 mem_colony_ship.10.desc:0 "귀족 [root.GetSpeciesNamePlural]님, 저희가 귀하의 행성을 식민지화한 것에 대해 용서해 주시기 바랍니다. 저희는 귀하께서 이 항성계를 주장하고 계신 줄도 몰랐고, 심지어 초공간 제국이 존재할 수 있다는 것조차 알지 못했습니다. 이것이 저희의 유일한 생존 기회였음을 이해해 주십시오: 저희 고향은 급속히 임박한 파멸에 직면해 있었고, §Y[mem_colony_ship_the_planet.GetName]§!는 생명체를 지원할 가능성이 가장 높은 행성으로 판단되었습니다. 귀하 문명의 성취가 저희가 지금까지 이룬 것보다 훨씬 뛰어난 것은 분명합니다. 저희에게 자비를 베풀어 주시고, 생존의 기사회생을 허락해 주시기 바랍니다."
 mem_colony_ship.10.desc.machine:0 "§LYikes, 로봇들! 우주 로봇들이 우리를 주시하고 있습니다. 알겠습니다, 침착하세요. 지금은 패닉에 빠질 때가 아닙니다.§! \n\n들으세요, 음... 귀족 [Root.GetSpeciesNamePlural]? 당신의 행성을 식민지화한 것에 대해 용서해 주시기 바랍니다. 우리는 당신이 이 시스템에 대한 권리를 주장하고 있다는 사실이나, 심지어 초공간 제국이 존재할 수 있다는 것조차 몰랐습니다... 로봇 제국이 존재한다는 것은 더더욱 몰랐습니다. 이것이 우리의 유일한 생존 기회였음을 이해해 주십시오: 우리의 고향은 빠르게 임박한 파멸에 직면해 있었고, §Y[mem_colony_ship_the_planet.GetName]§!는 우리가 생명체를 지원할 가능성이 가장 높은 행성으로 판단한 곳이었습니다. 당신 문명의 성취가 우리가 지금까지 이룬 것보다 훨씬 뛰어나다는 것은 분명합니다. 제발, 자비가 당신에게 어떤 개념이라면, 우리에게 자비를 베풀어 주시고 생존의 기사회생을 허락해 주십시오."
 mem_colony_ship.10.a:0 "너희들은 우리 제국의 일부가 될 것이다."
 mem_colony_ship.10.a.tooltip:0 "[mem_colony_ship_the_planet.GetName]이(가) 병합됩니다."
 mem_colony_ship.10.b:0 "우리의 보호령으로 이 성계를 가져도 좋다."
 mem_colony_ship.10.b.tooltip:0 "이 성계는 우리의 보호령이 된 식민지 주민들에게 넘겨질 것입니다."
 mem_colony_ship.10.c:0 "우리의 조공국으로 이 성계를 가져도 좋다."
 mem_colony_ship.10.c.tooltip:0 "이 성계는 우리의 조공국이 된 식민지 주민들에게 넘겨질 것입니다."
 mem_colony_ship.10.d:0 "불쌍한 것들, 너희들의 고생은 끝났다."
 mem_colony_ship.10.d.tooltip:0 "로봇 관리인 유닛이 [mem_colony_ship_the_planet.GetName]으로 파견되어 불쌍한 개척민들을 돌볼 것입니다."
 mem_colony_ship.10.e:0 "통신을 끊어라."
 mem_colony_ship.10.e.tooltip:0 "우린 행동을 취하지 않을 것이지만, 다른 원시 문명 행성처럼 상호작용할 수 있습니다."
 mem_colony_ship.12.name:0 "[From.GetName] 상황 안정화"
 mem_colony_ship.12.desc:0 "[From.GetName]에서 [From.Owner.GetAdj] 개척민의 새로운 고향인 상황은 개척민들이 착륙한 순간부터 사실상 혼란스러웠습니다. 그러나 원시적인 기술과 미흡한 지도자에도 불구하고 [From.Owner.GetSpeciesNamePlural]는 지난 몇 년 동안 상당한 발전을 이루었습니다. \n\n행성의 상황은 안정되었고 인프라가 구축되어 주민들은 다시 한 번 초기 우주 시대 문명으로 분류될 수 있게 되었습니다."
 mission_mem_colony_ship_technological_enlightenment:0 "$mission_technological_enlightenment_9$"
 mission_mem_colony_ship_technological_enlightenment_desc:0 "$mission_technological_enlightenment_9_desc$"
 MEM_COLONY_SHIP_NOT_NOW:0 "저 미개 종족들은 지금 혼돈 상태에 빠졌다."
 building_mem_colony_ship_shelter:0 "미개한 식민지 대피소"
 building_mem_colony_ship_shelter_desc:0 "FTL 이전 식민지선의 잔해는 이전 승무원들에게 거주 가능한 피난처를 제공하며, 행성 표면으로의 계획된 확장을 위한 중심지가 됩니다."
 building_mem_colony_ship_protocity:0 "원시 도시"
 building_mem_colony_ship_protocity_desc:0 "미개한 식민지의 첫 건축물로 지역에서 얻을 수 있는 물질로 만들어졌습니다. 아직 도시라 부르기에는 너무 작지만 언젠가 그 무엇보다도 거대해질 것입니다."
 building_mem_colony_ship_farming_outpost:0 "농업 기지"
 building_mem_colony_ship_farming_outpost_desc:0 "외계 토양으로부터 가능한 한 많은 양분을 쥐어짜 내기 위해 농업 기지들이 탐사된 땅을 뒤덮습니다."
 building_mem_colony_ship_industrial_outpost:0 "산업 기지"
 building_mem_colony_ship_industrial_outpost_desc:0 "전략적으로 배치된 공장들은 개척민이 외계 세계에서 생존하고 확장하는 데 필요한 도구, 기계 및 기타 물품을 제공합니다."
 building_mem_colony_ship_power_outpost:0 "전력 기지"
 building_mem_colony_ship_power_outpost_desc:0 "식민지가 성장하는 데에 필요한 에너지를 공급하는 발전소로 천연자원을 소모합니다."
 building_mem_colony_ship_mining_outpost:0 "채광 기지"
 building_mem_colony_ship_mining_outpost_desc:0 "식민지를 위한 필수 광물 자원을 제공하기 위해 얕은 광상 위와 주변에 배치된 광산 마을과 캠프의 네트워크입니다."
 job_mem_colony_ship_colonist:0 "$job_colonist$"
 job_mem_colony_ship_colonist_plural:0 "$job_colonist_plural$"
 job_mem_colony_ship_colonist_desc:0 "새로운 세계에 정착하는 것은 어렵습니다. 초공간 제국의 지원이 없다면 더욱 힘듭니다."
 mod_job_mem_colony_ship_colonist_add:0 "$job_mem_colony_ship_colonist$ 직업"
