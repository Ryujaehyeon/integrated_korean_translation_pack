l_korean:
 mem_nanobot_room_category:0 "독특한 채굴 전초 기지"
 mem_nanobot_room_category_desc:0 "[Root.GetName]의 표면에서 흥미로운 발견이 있었던 것으로 보입니다. 버려진 채굴 기지인 것 같지만, 우리의 과학 선박의 감지기가 기지 내부에서 발생하는 변동하는 에너지 신호를 감지했습니다. \n\n시설이 여전히 활성 상태인 것으로 보입니다."
 mem_nanobot_room.1.name:0 "나노봇 채굴"
 mem_nanobot_room.1.desc:0 "초기 착륙 시 어려움이 있었음에도 불구하고 [Root.leader.GetName]가 이끄는 과학 탐사팀은 안전하게 기지에 들어갈 수 있었습니다. 그들의 감지기를 따라 팀은 불안정한 에너지 신호가 발생하는 깊은 시설로 힘든 여정을 시작했습니다. 그들이 발견한 것은 매우 특별한 것이었습니다. \n\n불규칙한 에너지 신호는 나노봇의 떼에 의해 생성되었으며, 나이가 많고 유지보수가 부족했음에도 불구하고 그들의 목적을 잊지 않은 것처럼 보였습니다. 팀은 나노봇들이 더 나은 표현이 없어서 '삼키는' 것처럼 보이는 쓸모없는 바위와 돌을 '소화'하고, 내용을 '배출'하여 쓸모없는 물자를 폐기 상자에 넣고, '역류'하여 귀중한 물자를 회수함으로써 수집하는 모습을 경탄하며 지켜보았습니다. 이 회수 상자는 한동안 비워지지 않은 것처럼 보였습니다."
 mem_nanobot_room.1.a:0 "그들의 창조자들도 우리가 이 광물들을 가져가는 데 그리 상관하지 않겠지."
 mem_nanobot_room.1.mat:0 "나노봇을 수리한다."
 mem_nanobot_room.10.name:0 "실패"
 mem_nanobot_room.10.desc:0 "에너지 신호는 나타났던 것만큼 빠르게 사라졌습니다. 몇 시간의 탐색과 조사 끝에 [Root.leader.GetName]은 [Leader.GetHisHer] 수색을 포기했습니다. 에너지 신호를 발생시킨 원인은 결코 발견되지 않을 것입니다."
 mem_nanobot_room.10.a:0 "어쩔수 없지."
 mem_nanobot_room.20.name:0 "치명적인 실패"
 mem_nanobot_room.20.desc:0 "팀이 행성 표면에 착륙하자, [Root.leader.GetName]은(는) 우연히 오래된 방어 프로토콜을 작동시켰습니다. 땅이 흔들렸고, 팀의 호기심과 공포 속에서 에너지 신호가 시설의 깊이를 따라 과학 팀을 향해 직접 이동하기 시작했습니다. 팀은 행성을 떠나려고 시도했지만 실패했습니다. \n\n에너지 신호는 공격적인 나노봇의 무리로 밝혀졌으며, 이들은 [Root.leader.GetName]과(와) [Leader.GetHisHer] 승무원, 심지어 전체 과학 선박을 신속하게 삼켜버렸습니다. 승무원을 소비한 후, 나노봇들은 다시 채굴 시설로 기어 들어갔습니다. 나노봇들이 원래 무엇을 하고 있었는지는 영원히 알 수 없을 것 같습니다."
 mem_nanobot_room.20.a:0 "젠장할."
