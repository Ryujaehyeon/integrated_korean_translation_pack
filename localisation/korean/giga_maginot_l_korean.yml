 GIGA_MAGINOT_REACTOR:0 "마지노 동력 시스템"
 GIGA_MAGINOT_REACTOR_DESC:0 "$name_maginot_world$에 과할만큼 많이 연결되었고 파묻혀있는 동력 시스템은 모든 궤도 작전에 에너지를 공급합니다."
 GIGA_MAGINOT_PLANET_REACTOR:0 "업그레이드된 마지노 동력 시스템"
 GIGA_MAGINOT_PLANET_REACTOR_DESC:0 "요새 행성 기술 덕분에, 행성 쪽의 동력 시설을 개선할 수 있었습니다."
 GIGA_MAGINOT_STAR_REACTOR:0 "코로나 흡수기 네트워크"
 GIGA_MAGINOT_STAR_REACTOR_DESC:0 "고차원 공학과 궁극의 항성 제어 기술 덕분에, 외부 항성을 이용해 모든 마지노 시스템에 동력을 공급할 수 있습니다."
 GIGA_MAGINOT_OMEGA_LANCE:0 "오메가 절멸 광선"
 GIGA_MAGINOT_OMEGA_LANCE_DESC:0 "말 그대로 달 크기의 무기이며 $name_maginot_world$만을 보호합니다. 행성의 핵 내에 설치된 거대한 원자로에 의해 구동되고, 지각 아래에있는 수많은 시스템에 의해 조절되는 이 에너지 광선은 모든 것을 파쇄할 수 있습니다."
 GIGA_MAGINOT_KINETIC_BATTERY:0 "중화기 행성 포대"
 GIGA_MAGINOT_KINETIC_BATTERY_DESC:0 "$name_maginot_world$의 지표면에 건설된 거대한 실탄 포대로, 궤도 시스템과 연결되었을때 엄청난 파괴력을 자랑합니다."
 GIGA_MAGINOT_DEFENCE_DRONE_SWARM:0 "궤도 방위 드론 무리"
 GIGA_MAGINOT_DEFENCE_DRONE_SWARM_DESC:0 "호스트 $name_maginot_world$에 연결된 드론 무리입니다. 승무원이나 보호막 생성기, 독립적인 명령 코어가 필요 없기 때문에, 비슷한 크기의 자유 비행 타격기보다 더 효율적으로 전투 작전을 수행할 수 있습니다."
 giga_tech_maginot_world:0 "최종 거점 방위 이론"
 giga_tech_maginot_world_desc:0 "우리의 제국을 보호하기 위해, 우리는 궁극의 방위 거점을 건설하고 행성 전체를 거대한 요새 단지, 즉 $name_maginot_world$으로 바꾸어야합니다.\n\n이 행성에는 궤도 방위, 행성 화포, 셀 수 없이 많은 벙커, 지하 깊은 곳의 사령부 복합 건물과 대륙 크기의 보호막 생성기가 있습니다. 또한, 적의 콜로서스급 전함 공격을 단념시킬 죽음의 손 시스템도 개발될 것입니다.\n\n§Y$name_maginot_world$ 건설을 시작하려면 행성 건물이 필요합니다.§! 하지만 건물은 완전 개발에 적합하지 않은 다른 장소에도 건설할 수 있습니다."
 maginot_desc:0 "행성을 가로지르는 거대한 요새로서 어떠한 적군도 감히 감당할 수 없는 존재입니다."
 allow_maginot:0 "§H거대 구조물 잠금 해제:§! $name_maginot_world$"
 giga_tech_maginot_firepower_1:0 "향상된 마지노 화력"
 giga_tech_maginot_firepower_1_desc:0 "실제 개발이 완료되었으므로, 이제 $name_maginot_world$ 성계의 다양한 최적화와 관련하여 한계를 더욱 넘어서는 데 초점을 맞출 수 있습니다. 특히, 훨씬 더 강력한 화력말입니다."
 allow_giga_maginot_firepower_1:0 "마지노 무기 피해량: §G+25%§! \n마지노 무기 발사 속도: §G+10%§! \n마지노 무기 사정 거리: §G+20%§!"
 maginot_display_firepower_1:0 "\n§L$giga_tech_maginot_firepower_1$ 기술§!: \n$MOD_SHIP_WEAPON_DAMAGE$ §G+25%§!\n$MOD_SHIP_FIRE_RATE_MULT$ §G+10%§!\n$MOD_SHIP_WEAPON_RANGE_MULT$ §G+20%§!"
 giga_tech_maginot_planetcraft_upgrade:0 "업데이트된 마지노 강화 기술"
 giga_tech_maginot_planetcraft_upgrade_desc:0 "신세대 천체 점함이 마지노 강화에 다양한 개선의 가능성을 열어주었고, 이 구조물이 거대한 위협에 맞설때 더욱 견고하게 만들 수 있습니다. 또한, 무기와 반응로 개선도 적용되었습니다."
 allow_giga_maginot_planetcraft_upgrade:0 "§H플랫폼 구획 잠금 해제:§! 업그레이드된 마지노 전략 방위 플랫폼\n마지노 무기 피해량: §G+50%§!\n마지노 선체: §G+500 000§! \n마지노 장갑: §G+200 000§! \n마지노 보호막: §G+200 000§!"
 maginot_display_planetcraft_upgrade:0 "§L$giga_tech_maginot_planetcraft_upgrade$ 기술§!: \n$MOD_SHIP_WEAPON_DAMAGE$ §G+50%§!\n$MOD_SHIP_HULL_ADD$ §G+500 000§!\n$MOD_SHIP_ARMOR_ADD$ §G+200 000§!\n$MOD_SHIP_SHIELD_ADD$ §G+200 000§!"
 giga_tech_maginot_systemcraft_upgrade:0 "항성 개장"
 giga_tech_maginot_systemcraft_upgrade_desc:0 "항성 그 자체마저도 우리의 명령에 따라 움직이니, 이제 우리 방어를 도외시해서는 안됩니다. 최신 혁신을 통해 마지노 보호 방법에 근본적인 여러 개선을 이루었습니다."
 allow_giga_maginot_systemcraft_upgrade:0 "§H플랫폼 구획 잠금 해제:§! 시스템크래프트급 마지노 전략 방위 플랫폼\n마지노 무기 피해량: §G+250%§! \n마지노 무기 발사 속도: §G+100%§! \n마지노 명중률: §G+20§! \n마지노 목표 추적: §G+10§! \n마지노 선체: §G+500 000§! \n마지노 장갑: §G+200 000§! \n마지노 보호막: §G+200 000§!"
 maginot_display_systemcraft_upgrade:0 "§L$giga_tech_maginot_systemcraft_upgrade$ 기술§!: \n$MOD_SHIP_WEAPON_DAMAGE$ §G+250%§!\n$MOD_SHIP_FIRE_RATE_MULT$ §G+100%§!\n$MOD_SHIP_ACCURACY_ADD$ §G+20§!\n$MOD_SHIP_TRACKING_ADD$ §G+10§!\n$MOD_SHIP_HULL_ADD$ §G+500 000§!\n$MOD_SHIP_ARMOR_ADD$ §G+200 000§!\n$MOD_SHIP_SHIELD_ADD$ §G+200 000§!"
 district_maginot_world_barracks_wilderness:0 "뼈 도시"
 district_maginot_world_barracks_wilderness_desc:0 "일반적인 임무를 수행하는 공통 공생체들의 분주한 중심지이지만, 이곳의 군사적 초점의 흔적은 결코 눈에 띄지 않습니다."
 district_maginot_world_barracks_wilderness_plural:0 "뼈 도시들"
 district_maginot_world_shield_generators_wilderness:0 "방패 캐노피 숲"
 district_maginot_world_shield_generators_wilderness_desc:0 "전체 생태계의 방패 생성 기관을 조화롭게 하여 어떤 단일 유기체도 만들어낼 수 없는 수준의 힘의 장을 생성할 수 있습니다. 추가적인 점 방어 적응은 대부분의 포탄이 그 지점까지 도달하는 것을 방지합니다. 궤도 보호자와의 상리 공생 관계는 전체 행성을 더욱 안전하게 유지합니다."
 district_maginot_world_shield_generators_wilderness_plural:0 "방패 캐노피 숲"
 district_maginot_world_planetary_cannons_wilderness:0 "공중 영토 방어망"
 district_maginot_world_planetary_cannons_wilderness_desc:0 "압력이 가해진 낭종으로 점철된 광활한 평원은 저궤도에 있는 모든 것을 향해 부식성 뼈 작살의 숲을 발사할 수 있으며, 적 함선이 사정거리 내로 접근하는 것을 저지합니다. 따라서 발사기는 주로 장거리 포탄이나 수송선의 요격을 위해 조정되었습니다. 암호화된 생체 전기 방출기는 궤도 전략 방어 생태계의 수송 능력을 향상시키고 기존 플랫폼을 강화합니다."
 district_maginot_world_planetary_cannons_wilderness_plural:0 "공중 영토 방어망"
 district_maginot_world_bunkers_wilderness:0 "요새화된 웜홀"
 district_maginot_world_bunkers_wilderness_desc:0 "갑각으로 덮인 틈새와 중량급 지상 적응이 시야에 가득합니다. 이 세계의 땅은 근육으로 덮인 협곡, 뼈로 된 첨탑, 그리고 돌출된 돌기로 얽혀 있어 어떤 것도 직선으로 이동할 수 없습니다. 위장된 화학 분사기는 적군에게 지옥을 쏟아붓기 위해 대기 중이며, 그들의 겹치는 사격 범위는 행성의 모든 평방 미터를 커버합니다. 영토 전투는 모든 공생체가 끊임없이 훈련하도록 보장하며, 올바른 페로몬이 외부의 위협을 모두 통합할 때까지 계속됩니다."
 district_maginot_world_bunkers_wilderness_plural:0 "요새화된 웜홀"
 maginot_central_command_gestalt_wilderness:0 "스트라토심비온트"
 job_maginot_central_command_gestalt_wilderness:0 "$maginot_central_command_gestalt_wilderness$"
 maginot_central_command_gestalt_wilderness_plural:0 "스트라토심비온트"
 job_maginot_central_command_gestalt_wilderness_plural:0 "$maginot_central_command_gestalt_wilderness_plural$"
 maginot_central_command_gestalt_wilderness_desc:0 "특별히 선발된 공생체는 $name_maginot_world$의 지휘 업무에 적합하며, 가장 깊은 지휘 복합체에서 행성 방어의 광범위한 배열을 관리합니다."
 job_maginot_central_command_gestalt_wilderness_desc:0 "$maginot_central_command_gestalt_wilderness_desc$"
 maginot_shield_generator_operator_gestalt_wilderness:0 "아에기시심비온트"
 job_maginot_shield_generator_operator_gestalt_wilderness:0 "$maginot_shield_generator_operator_gestalt_wilderness$"
 maginot_shield_generator_operator_gestalt_wilderness_plural:0 "아이기스 심비온트들"
 job_maginot_shield_generator_operator_gestalt_wilderness_plural:0 "$maginot_shield_generator_operator_gestalt_wilderness_plural$"
 maginot_shield_generator_operator_gestalt_wilderness_desc:0 "필드 크기의 방패 캐노피 성장을 관리하도록 훈련받았으며, 그 외에도 $name_maginot_world$가 탄도 포식의 위협으로부터 안전하게 유지되도록 합니다."
 job_maginot_shield_generator_operator_gestalt_wilderness_desc:0 "$maginot_shield_generator_operator_gestalt_wilderness_desc$"
 maginot_planetary_cannon_operator_gestalt_wilderness:0 "센티넬 심비온트"
 job_maginot_planetary_cannon_operator_gestalt_wilderness:0 "$Sentinelsymbiont$"
 maginot_planetary_cannon_operator_gestalt_wilderness_plural:0 "센티넬 심비온트들"
 job_maginot_planetary_cannon_operator_gestalt_wilderness_plural:0 "$maginot_planetary_cannon_operator_gestalt_wilderness_plural$"
 maginot_planetary_cannon_operator_gestalt_wilderness_desc:0 "무리의 위험으로부터 보호하려는 본능적인 충동을 가진 공학 및 전투 공생체입니다. 이들은 SD 플랫폼의 궤도 캐노피와 행성 표면의 발사기 하층 구조를 모두 감독합니다."
 job_maginot_planetary_cannon_operator_gestalt_wilderness_desc:0 "$maginot_planetary_cannon_operator_gestalt_wilderness_desc$"
 maginot_bunker_officer_gestalt_wilderness:0 "워렌심비온트"
 job_maginot_bunker_officer_gestalt_wilderness:0 "$maginot_bunker_officer_gestalt_wilderness$"
 maginot_bunker_officer_gestalt_wilderness_plural:0 "워렌심비온트"
 job_maginot_bunker_officer_gestalt_wilderness_plural:0 "$maginot_bunker_officer_gestalt_wilderness_plural$"
 maginot_bunker_officer_gestalt_wilderness_desc:0 "행성의 인구를 위한 깊은 피난처를 유지하도록 특별히 적응한 공생체입니다."
 job_maginot_bunker_officer_gestalt_wilderness_desc:0 "$maginot_bunker_officer_gestalt_wilderness_desc$"
 giga_tech_maginot_world_wilderness_swap:0 "궁극의 요새 방어 적응"
 giga_tech_maginot_world_wilderness_swap_desc:0 "우리의 서식지를 방어하기 위해 우리는 궁극적인 방어 거점을 발전시켜야 하며, 전체 행성을 거대한 요새 생태계인 $name_maginot_world$로 변형해야 합니다. \n\n이 세계는 궤도 방어 시스템, 행성 포대, 수많은 벙커, 깊은 지하 지휘-호르몬 기관, 대륙 크기의 방패 생성기로 장비될 것입니다. 또한, 적의 콜로서스급 전함을 저지하기 위해 데드 핸드 기관이 개발될 것입니다.\n\n§Y행성 건물은 $name_maginot_world$ 건설을 시작하는 데 필요합니다§!, 하지만 이 건물은 완전 개발에 적합하지 않은 다른 위치에서도 건설할 수 있습니다."
