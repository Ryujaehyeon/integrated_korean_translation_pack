l_korean:
 name_maginot:0 "마지노 행성"
 is_giga_maginot_world:0 "$TRIGGER_FAIL$§R마지노 행성이어야 합니다.§!"
 giga_tech_repeatable_maginot_cap:0 "마지노 행성관리 프로토콜"
 giga_tech_repeatable_maginot_cap_desc:0 "우리 제국에 추가적인 §Y마지노 행성§!를 건설하고 관리할 수 있게 해주는 고급 건설 기술 및 유지관리 프로토콜."
 giga_maginot_capacity_increase_title:0 "§Y마지노 행성§! 수용량: §G+1§!"
 giga_maginot_capacity_increase_desc:0 "제국의 §Y마지노 행성§! 수용량이 §G+1§! 증가합니다."
 d_maginot_subspace_disruptor:0 "마지노 아공간 분열 시스템"
 d_maginot_subspace_disruptor_desc:0 "$name_maginot_world$이 아공간을 통해 전파되는 강력한 분열장을 생성하여 이 성계의 웜홀 활동을 막고 있습니다. 또한, 이곳과 주위 성계에서의 점프 드라이브가 불가능해집니다."
 heavy_defender:0 "중갑 수비대"
 heavy_defender_desc:0 "행성 방위 임무를 맡은 특수 부대입니다."
 heavy_defender_plural:0 "중갑 수비대"
 robot_heavy_defender:0 "로봇 중갑 수비대"
 robot_heavy_defender_desc:0 "행성 방위 임무를 맡은 특수 로봇 부대입니다."
 robot_heavy_defender_plural:0 "로봇 중갑 수비대"
 machine_heavy_defender:0 "중장비 수비대"
 machine_heavy_defender_desc:0 "행성 방위에 특화된 중장비 전투 부대입니다."
 machine_heavy_defender_plural:0 "기계 수비대"
 maginot_artillery_army:0 "행성 포병대"
 maginot_artillery_army_desc:0 "침략군을 갈기갈기 찢을 수 있지만 상대적으로 부서지기 쉬운 거대한 대포입니다."
 maginot_artillery_army_plural:0 "행성 포병대"
 maginot_shield_army:0 "보호막 생성기"
 maginot_shield_army_desc:0 "적군의 공격을 흡수하기위해 고안된 거대한 보호막 생성기입니다."
 maginot_shield_army_plural:0 "보호막 생성기"
 maginot_bunker_army:0 "방어 시설망"
 maginot_bunker_army_desc:0 "광대한 벙커 조직으로, 참호와 숨겨진 화포를 이용해 적의 진군을 최대한 방해합니다."
 maginot_bunker_army_plural:0 "방어 시설망"
 maginot_assault_unit:0 "마지노 강습 유닛"
 maginot_assault_unit_desc:0 "전투 작전과 행성 침공을 위해 $name_maginot$ 시설에서 훈련받은 특수 유닛입니다."
 maginot_machine_assault_unit:0 "$maginot_assault_unit$"
 maginot_machine_assault_unit_desc:0 "$maginot_assault_unit_desc$"
 NAME_planetary_artillery:0 "행성 포병대"
 NAME_shield_battery:0 "보호막 생성기"
 NAME_fortification_network:0 "방어 시설망"
 NAME_heavy_defender:0 "중장비 방어 부대"
 building_giga_maginot_stronghold:0 "마지노 요새 복합 건물"
 building_giga_maginot_stronghold_desc:0 "과도한 요새화 분야의 새로운 기술은 이와 같은 복합체의 건설을 가능하게 합니다. 여기 $name_maginot_world$를 건설하면 이러한 방어가 전체 행성을 커버하도록 확장됩니다."
 building_giga_maginot_global_bunker:0 "마지노 행성 규모 벙커 체계"
 building_giga_maginot_global_bunker_desc:0 "행성을 덮은 깊은 벙커 체계입니다. 이는 우리 군대에게 전례 없는 공격력을 줍니다."
 decision_maginot_anti_jump_on:0 "£maginot_bunker_01£ 마지노 아공간 분열 시스템 활성화"
 decision_maginot_anti_jump_on_desc:0 "$name_maginot_world$이 아공간 분열장을 생성하기 시작했으며, 이로써 이 성계와 주변의 성계에서의 아공간 사용을 방해하지만, 주변 성계에서의 효과는 더 약합니다."
 decision_maginot_anti_jump_on_effect:0 "이 성계와 §Y제국이 소유한§! §Y1 점프 거리§! 떨어진 모든 성계는 §Y점프 드라이브 사용§!과 §Y아공간 여행§!을 막는 특별한 보정치를 받습니다. $name_maginot_world$이 있는 성계는 §YNDB나 QSO의 목표가 될 수 없습니다.§! 결정이 활성화 되어야 확인되므로, 새로이 나타난/정복된 성계를 보호하기 위해 결정을 토글하십시오."
 decision_maginot_anti_jump_on_must_not_already_be_active:0 "£trigger_no£ 성계 내의 또다른 $name_maginot_world$이 이미 아공간 분열장을 생성 중입니다."
 decision_maginot_anti_jump_off:0 "£maginot_bunker_01£ 마지노 아공간 분열 시스템 비활성화"
 decision_maginot_anti_jump_off_desc:0 "유지보수 혹은 목표 매개변수를 업데이트하기 위해 장이 꺼졌습니다."
 decision_maginot_anti_jump_off_effect:0 "이 성계와 §Y제국이 소유한§! §Y1 점프 거리§! 떨어진 모든 성계의 점프 드라이브 보호가 비활성화됩니다. 새로이 나타난/정복된 성계를 보호하기 위해 결정을 토글하십시오."
 decision_maginot_basic_garrison_check:0 "£maginot_bunker_08£ 마지노 수비대 재충전"
 decision_maginot_basic_garrison_check_desc:0 "수비대가 경계태세를 갖추도록 합니다."
 decision_maginot_basic_garrison_check_effect:0 "기본 §Y5개 수비대§!를 삭제하고 다시 추가함으로써 $name_maginot_world$에 대한 기본 지상 방어 기능을 제공합니다.\n§Y궤도 방위망§!, §Y보호막 생성기 배열§! 그리고 §Y벙커 단지§!로 추가된 군대를 재충전합니다."
 maginot_wait_for_army_refresh:0 "£trigger_no£ 다시 시도하기 전에 게임을 시작하여 효과를 업데이트하십시오."
 decision_maginot_repair_strategic_defence_command:0 "£maginot_bunker_02£ 마지노 전략 방위 사령부 수리"
 decision_maginot_repair_strategic_defence_command_effect:0 "궤도 방위 체계를 수리합니다. 궤도 방위 관리를 다시 가능하게합니다."
 decision_maginot_repair_strategic_defence_command_desc:0 "이 행성은 최근의 전투로부터 복구 중입니다."
 decision_maginot_repair_strategic_defence_command_no_bombardment:0 "£trigger_no£ 행성이 포격 중일 때 $strategic_defence_command_platform$을(를) 수리할 수 없습니다."
 decision_maginot_basic_point_check:0 "£maginot_bunker_03£ §G마지노 포인트값§!"
 decision_maginot_basic_point_check_effect:0 "§Y현재 값:§! \n§E[this.giga_maginot_current_SD_platform_count] 전략 방위 플랫폼§! \n§E[this.maginot_offensive_upgrade_points_current] $offensive_upgrade_point_plural$ 사용 가능§! | 직업으로부터 얻는 최대 포인트 [this.maginot_offensive_upgrade_points_max]\n§E[this.maginot_defensive_upgrade_points_current] $defensive_upgrade_point_plural$ 사용 가능§! | 직업으로부터 얻는 최대 포인트 [this.maginot_defensive_upgrade_points_max]\n§Y현재 보정치:§! \n§L[this.maginot_orbital_defence_hp_upgrades] 내구도 업그레이드§! \n§G+[this.maginot_orbital_defence_hp_display]%§! $MOD_SHIP_HULL_MULT$ \n§G+[this.maginot_orbital_defence_hp_display]%§! $MOD_SHIP_ARMOR_MULT$ \n§G+[this.maginot_orbital_defence_hp_display]%§! $MOD_SHIP_SHIELD_MULT$ \n§G+[this.maginot_orbital_defence_hp_regen_display]§! $MOD_SHIP_HULL_REGEN_ADD_STATIC$ \n§G+[this.maginot_orbital_defence_hp_regen_display]§! $MOD_SHIP_ARMOR_REGEN_ADD_STATIC$ \n§G+[this.maginot_orbital_defence_hp_regen_display]§! $MOD_SHIP_SHIELD_REGEN_ADD_STATIC$ \n§L[this.maginot_orbital_defence_atk_upgrades] 공격력 업그레이드§! \n§G+[this.maginot_orbital_defence_atk_display]%§! $MOD_SHIP_WEAPON_DAMAGE$ \n§G+[this.maginot_orbital_defence_atk_display]%§! $MOD_SHIP_FIRE_RATE_MULT$ \n§L[this.maginot_orbital_defence_trg_upgrades] 목표 설정 시스템 업그레이드§! \n§G+[this.maginot_orbital_defence_range_display]%§! $MOD_SHIP_WEAPON_RANGE_MULT$ \n§G+[this.maginot_orbital_defence_tracking_display]§! $MOD_SHIP_TRACKING_ADD$"
 decision_maginot_basic_point_check_desc:0 "클릭하면 다른 결정에 사용되는 업그레이트 포인트, 현재 합금, 그리고 전략 방위 플랫폼 수와 같은 값을 새로고침합니다."
 decision_maginot_construct_secondary_SD_platform:0 "£maginot_bunker_04£ §S마지노 2차 전략 방위 플랫폼 건설§!"
 decision_maginot_construct_secondary_SD_platform_effect:0 "$offensive_upgrade_point_plural$ §Y2§!를 소비해 지원 전략 방위 플랫폼으로 사용될 $name_asteroid_artillery$를 만듭니다\n§Y현재 플랫폼:§! [this.giga_maginot_current_SD_platform_count]\n§E[this.maginot_offensive_upgrade_points_current] $offensive_upgrade_point_plural$ 사용 가능§!"
 decision_maginot_construct_secondary_SD_platform_desc:0 "채굴을 위해 소행성을 궤도로 끌어 내리는 것은 구식입니다. 방위 플랫폼으로 사용하기 위해 파내는 것이 훨씬 더 흥미롭습니다."
 decision_maginot_orbital_defence_hp_upgrade:0 "£maginot_bunker_05£ §B마지노 궤도 보호 체계 업그레이드§!"
 decision_maginot_orbital_defence_hp_upgrade_effect:0 "§R비용: [this.maginot_orbital_defence_hp_cost] £alloys£ $alloys$§!\n$defensive_upgrade_point$ §Y1§!을 소비해 다음을 얻습니다\n+25% $MOD_SHIP_HULL_MULT$ | 현재 §G+[this.maginot_orbital_defence_hp_display]%§! \n+25% $MOD_SHIP_ARMOR_MULT$ | 현재 §G+[this.maginot_orbital_defence_hp_display]%§! \n+25% $MOD_SHIP_SHIELD_MULT$ | 현재 §G+[this.maginot_orbital_defence_hp_display]%§! \n+500 $MOD_SHIP_HULL_REGEN_ADD_STATIC$ | 현재 §G+[this.maginot_orbital_defence_hp_regen_display]§! \n+500 $MOD_SHIP_ARMOR_REGEN_ADD_STATIC$ | 현재 §G+[this.maginot_orbital_defence_hp_regen_display]§! \n+500 $MOD_SHIP_SHIELD_REGEN_ADD_STATIC$ | 현재 §G+[this.maginot_orbital_defence_hp_regen_display]§! \n§Y현재 수준:§! [this.maginot_orbital_defence_hp_upgrades] \n§E[this.maginot_defensive_upgrade_points_current] $defensive_upgrade_point_plural$ 사용 가능§!"
 decision_maginot_orbital_defence_hp_upgrade_desc:0 "보호막 생성기는 궤도 플랫폼에 보호막을 씌울 뿐만 아니라, 선체 온전성을 강화하기 위해 분자 결합 생성기로 전환될 수도 있습니다."
 decision_maginot_orbital_defence_atk_upgrade:0 "£maginot_bunker_06£ §R마지노 궤도 화력 업그레이드§!"
 decision_maginot_orbital_defence_atk_upgrade_effect:0 "§R비용: [this.maginot_orbital_defence_atk_cost] £alloys£ $alloys$§! \n$offensive_upgrade_point$ §Y1§!을 소비해 다음을 얻습니다\n+10% $MOD_SHIP_WEAPON_DAMAGE$ | 현재 §G+[this.maginot_orbital_defence_atk_display]%§! \n+10% $MOD_SHIP_FIRE_RATE_MULT$ | 현재 §G+[this.maginot_orbital_defence_atk_display]%§! \n§Y현재 수준:§! [this.maginot_orbital_defence_atk_upgrades] \n§E[this.maginot_offensive_upgrade_points_current] $offensive_upgrade_point_plural$ 사용 가능§!"
 decision_maginot_orbital_defence_atk_upgrade_desc:0 "화포는 많을 수록 좋습니다. 그리고 끝없이 증가하는 엄청난 수의 궤도의 대군을 조정하기 위해 업링크 시설을 확장하는 것도 좋습니다."
 decision_maginot_orbital_defence_trg_upgrade:0 "£maginot_bunker_07£ §M마지노 목표 설정 시스템§!"
 decision_maginot_orbital_defence_trg_upgrade_effect:0 "§R비용: [this.maginot_orbital_defence_trg_cost] £alloys£ $alloys$§! \n$defensive_upgrade_point$ §Y1§!을 소비해 다음을 얻습니다\n+20% $MOD_SHIP_WEAPON_RANGE_MULT$ | 현재 §G+[this.maginot_orbital_defence_range_display]%§! \n+5 $MOD_SHIP_TRACKING_ADD$ | 현재 §G+[this.maginot_orbital_defence_tracking_display]§! \n§YCurrent Level:§! [this.maginot_orbital_defence_trg_upgrades] \n§E[this.maginot_defensive_upgrade_points_current] $defensive_upgrade_point_plural$ 사용 가능§!"
 decision_maginot_orbital_defence_trg_upgrade_desc:0 "보호막 생성기를 행성 감지기 기지로 대체하여 향상된 목표 정보를 얻고 항성계 전체를 감시할 수 있습니다."
 defensive_upgrade_point:0 "£job_maginot_shield_generator_operator£ 방어 업그레이드 포인트"
 defensive_upgrade_point_plural:0 "$defensive_upgrade_point$"
 offensive_upgrade_point:0 "£job_maginot_planetary_cannon_operator£ 공격 업그레이드 포인트"
 offensive_upgrade_point_plural:0 "$offensive_upgrade_point$"
 maginot_no_offensive_upgrade_points_available:0 "£trigger_no£ $offensive_upgrade_point_plural$이 없습니다"
 maginot_no_defensive_upgrade_points_available:0 "£trigger_no£ $defensive_upgrade_point_plural$이 없습니다"
 maginot_targetting_upgrade_hard_cap:0 "£trigger_no£ 목표 설정 시스템은 총 §Y5 회§!만 업그레이드될 수 있습니다."
 decision_maginot_mass_recruitment:0 "£maginot_bunker_09£ 마지노 대량 징집"
 decision_maginot_mass_recruitment_desc:0 "마지노 시설에서 다수의 특수군을 동시에 훈련시켜, 우리 제국의 공격적 정복에 도움이 되게 합니다."
 decision_maginot_mass_recruitment_effect:0 "동시에 §Y[this.maginot_bunker_count]§! 특수 마지노 강습군을 징집합니다.\n\n지상군의 숫자는 행성의 §Y[maginot_world_bunker_name]§! 지구의 숫자에 따라 달라지며 최소 숫자는 §Y1§!입니다."
 decision_maginot_mass_recruitment_katzenpanzer:0 "£maginot_bunker_10£ 마지노 캇첸 판처 대량 징집"
 decision_maginot_mass_recruitment_katzenpanzer_desc:0 "$name_maginot$은 대량의 캇첸 $riesigerkatzenpanzer_assault$을 생산하기에 완벽한 장소입니다."
 decision_maginot_mass_recruitment_katzenpanzer_effect:0 "동시에 §Y[this.maginot_bunker_count]§! $riesigerkatzenpanzer_assault$을 징집합니다.\n\n지상군의 숫자는 행성의 §Y[maginot_world_bunker_name]§! 지구의 숫자에 따라 달라지며 최소 숫자는 §Y1§!입니다. "
 district_maginot_world_barracks:0 "병영 지구"
 district_maginot_world_barracks_desc:0 "지상 그리고 지하에 병력을 수용하는 광범위한 지원 시설입니다. 다양한 휴양 및 오락 구역을 포함합니다."
 district_maginot_world_barracks_plural:0 "병영 지구"
 district_maginot_world_shield_generators:0 "보호막 생성기 배열"
 district_maginot_world_shield_generators_desc:0 "한 척의 함선이 만들어낸다고는 믿을 수 없는 규모의 역장으로, 그 위력은 함대 전체에 비견됩니다. 추가적인 국지 방어 병기와 미사일 방어용 미사일 덕분에 대부분의 공격은 역장 근처에도 오지 못합니다. 특수 지원 시설을 사용해 궤도 플랫폼 보호막을 보완할 수 있습니다."
 district_maginot_world_shield_generators_plural:0 "보호막 생성기 배열"
 job_maginot_planetary_shield_effect_desc:0 "1 §Y방어 배터리§! 군대를 제공하며, 적의 공격을 대량으로 흡수할 수 있고, 100개의 직업당 1 §Y$defensive_upgrade_point$§!를 제공합니다."
 district_maginot_world_planetary_cannons:0 "궤도 방위망"
 district_maginot_world_planetary_cannons_desc:0 "우뚝 솟은 행성 화포로, 저궤도의 모든 함선을 갈아버려 우주선 함장이 사정거리내로 다가오지 못하게 합니다. 즉, 이 화포는 주로 적의 무기와 강습선을 방해하는 용도입니다. 방대한 명령 및 제어는 궤도 전략 방위 체계와 인터페이스로 접속하는 것을 복잡하게 하며, 기존의 플랫폼을 강화할 뿐만 아니라, 더 많은 수의 플랫폼을 배치할 수 있게 합니다."
 district_maginot_world_planetary_cannons_plural:0 "궤도 방위망"
 job_maginot_planetary_artillery_effect_desc:0 "1 §Y행성 포병§! 군대를 제공하며, 이 군대는 극단적인 피해를 주지만 상대적으로 취약하고, 100개의 직업당 1 §Y$offensive_upgrade_point$§!을 제공합니다."
 district_maginot_world_bunkers:0 "벙커 단지"
 district_maginot_world_bunkers_desc:0 "눈에 들어오는 것은 전부 벙커와 중장비 대지상 병기 뿐입니다. 지상에는 끝없는 참호, 대전차 장애물, 그리고 중장벽이 십자 모양으로 나열되어 있으며, 이 행성에서 어떠한 것도 직선으로 움직일 수 없게 합니다. 위장 포좌는 적군에게 지옥을 보여줄 것이며, 그 사계는 행성의 모든 곳을 덮고 있습니다. 광범위한 훈련 시설을 통해 우리 군은 만일의 사태에 대비할 것이고, 훈련은 모든 종류의 지형에서 계속 진행됩니다."
 district_maginot_world_bunkers_plural:0 "벙커 단지"
 job_maginot_planetary_bunker_effect_desc:0 "\n지속적인 피해를 입히면서 적군의 사기를 저해하는 §Y방어 시설망§! 한 부대를 제공합니다."
 district_maginot_ringworld_barracks:0 "병영 구획"
 district_maginot_ringworld_barracks_desc:0 "링 월드 안팎에 병력을 수용하는 광범위한 지원 시설입니다. 다양한 휴양 및 오락 구역을 포함합니다."
 district_maginot_ringworld_barracks_plural:0 "병영 구획"
 district_maginot_ringworld_shield_generators:0 "보호막 생성기 구획"
 district_maginot_ringworld_shield_generators_desc:0 "한 척의 함선이 만들어낸다고는 믿을 수 없는 규모의 역장으로, 그 위력은 함대 전체에 비견됩니다. 추가적인 국지 방어 병기와 미사일 방어용 미사일 덕분에 대부분의 공격은 역장 근처에도 오지 못합니다. 특수 지원 시설을 사용해 근공간 플랫폼 보호막을 보완할 수 있습니다."
 district_maginot_ringworld_shield_generators_plural:0 "보호막 생성기 구획"
 district_maginot_ringworld_planetary_cannons:0 "궤도 방위 구획"
 district_maginot_ringworld_planetary_cannons_desc:0 "링 월드에 거대한 무기 포대를 설치해 저궤도 상의 함선을 파괴할 수 있도록 합니다. 화포의 주 목적은 적의 화포와 강습함이며, 적들은 가까이 다가오지 못할 것입니다. 거대한 사령 및 통제 시설이 근공간 전략 방위 체계에 접해있어, 현존 플랫폼을 강화시킬 뿐만 아니라, 대량의 플랫폼을 전개할 수 있게됩니다."
 district_maginot_ringworld_planetary_cannons_plural:0 "궤도 방위 구획"
 district_maginot_ringworld_bunkers:0 "벙커 구획"
 district_maginot_ringworld_bunkers_desc:0 "벙커와 중무장 지상 병기들이 온 땅을 덮고 있습니다. 이 구획은 기존의 지표면에 맞지 않아, 지형이 망가져 있는 듯 보입니다. 위장 포좌는 적군에게 지옥을 보여줄 것이며, 그 사계는 모든 곳을 덮고 있습니다. 광범위한 훈련 시설을 통해 우리 군은 만일의 사태에 대비할 것이고, 훈련은 근공간을 포함한 모든 종류의 지형에서 계속 진행됩니다."
 district_maginot_ringworld_bunkers_plural:0 "벙커 구획"
 zone_maginot_shield_generators_global_shield_network:0 "글로벌 방패 네트워크"
 zone_maginot_housing:0 "막사 확장"
 zone_maginot_housing_desc:0 "모든 계급과 전문 분야의 군인들이 거주하는 막대한 규모의 병영 단지로, 지평선을 넘어 펼쳐져 있습니다."
 zone_maginot_entertainment:0 "군인 여가 구역"
 zone_maginot_entertainment_desc:0 "군인들이 배치 사이에 경험하고 싶어하는 민간인 사치품을 거의 모두 수용할 수 있는 거대한 돔들이 줄지어 있습니다."
 zone_maginot_ringworld_entertainment:0 "$zone_maginot_entertainment$"
 zone_maginot_ringworld_entertainment_desc:0 "$zone_maginot_entertainment_desc$"
 zone_maginot_logistics:0 "해상 보급 허브"
 zone_maginot_logistics_desc:0 "민간인 무역 센터는 활동 중인 함대를 위한 보급품 조달 및 배송에 중점을 둡니다."
 zone_maginot_ringworld_logistics:0 "$zone_maginot_logistics$"
 zone_maginot_ringworld_logistics_desc:0 "$zone_maginot_logistics_desc$"
 zone_maginot_shield_generators:0 "보조 방패 배터리"
 zone_maginot_shield_generators_desc:0 "행성 보호막을 더욱 강력하게 만드는 대규모 반물질 반응로가 적의 탄약이 우리의 포인트 방어를 뚫을 가능성에 대비하고 있습니다."
 zone_maginot_ringworld_shield_generators:0 "$zone_maginot_shield_generators$"
 zone_maginot_ringworld_shield_generators_desc:0 "$zone_maginot_shield_generators_desc$"
 zone_maginot_orbital_defense_grids:0 "행성 방어 포대"
 zone_maginot_orbital_defense_grids_desc:0 "거대한 자기 가속기 포가 행성을 접근 방식으로 감히 다가오는 적들을 하늘에서 감시합니다."
 zone_maginot_ringworld_orbital_defense_grids:0 "$zone_maginot_orbital_defense_grids$"
 zone_maginot_ringworld_orbital_defense_grids_desc:0 "$zone_maginot_orbital_defense_grids_desc$"
 zone_maginot_specialized_training_facilities:0 "전문 훈련 시설"
 zone_maginot_specialized_training_facilities_desc:0 "군사 훈련의 모든 형태를 위한 군인 훈련에 전념하는 대규모 시설입니다."
 zone_maginot_ringworld_specialized_training_facilities:0 "$zone_maginot_specialized_training_facilities$"
 zone_maginot_ringworld_specialized_training_facilities_desc:0 "$zone_maginot_specialized_training_facilities_desc$"
 zone_maginot_recovery_zones:0 "회복 구역"
 zone_maginot_recovery_zones_desc:0 "군인 치료와 전투 드론 수리를 위해 전투 중에 헌신하는 강력하게 요새화된 구역으로, 의료 복지와 수리 서비스를 제공하며, 최악의 상황에서도 항상 도움이 가까이에 있다는 것을 아는 군인들에게 사기를 북돋아 줍니다."
 zone_maginot_ringworld_recovery_zones:0 "$zone_maginot_recovery_zones$"
 zone_maginot_ringworld_recovery_zones_desc:0 "$zone_maginot_recovery_zones_desc$"
 zone_maginot_killing_fields:0 "평탄화된 살육의 전장"
 zone_maginot_killing_fields_desc:0 "광활한 평지와 뒤틀린 금속이 펼쳐진 이곳은 침략자들에게 중포 포격 앞에서 숨을 곳도, 생존의 희망도 제공하지 않습니다."
 zone_maginot_ringworld_killing_fields:0 "$zone_maginot_killing_fields$"
 zone_maginot_ringworld_killing_fields_desc:0 "$zone_maginot_killing_fields_desc$"
 zone_maginot_fortified_trenches:0 "강화된 참호"
 zone_maginot_fortified_trenches_desc:0 "세기 전의 전술이 현대의 건설 방법과 자재와 결합되어 지금도 효과적임을 입증합니다."
 zone_maginot_ringworld_fortified_trenches:0 "$zone_maginot_fortified_trenches$"
 zone_maginot_ringworld_fortified_trenches_desc:0 "$zone_maginot_fortified_trenches_desc$"
 maginot_destruction.2000.name:0 "$name_maginot_world$ 함락됨"
 maginot_destruction.2000.desc:0 "우리 군이 성공적으로 [From.GetStarName] 성계의 $name_maginot_world$ [From.GetName](을)를 함락했다고 보고했습니다. 전투는 행성 지각 깊은 곳의 거대한 벙커 및 방어 시설 미로로까지 이어졌지만, 결국 우리 군이 승리했습니다. 적 사령관이 끝까지 싸웠지만, 결국 음흉한 죽음의 손 페일세이프 시스템은 불발되었습니다. 행성의 파괴는 피했으며, 이제 $name_maginot_world$의 기능에 대한 모든 통제를 얻었습니다. §Y아공간 분열 시스템을 직접 재활성화해야합니다.§!"
 maginot_destruction.2000.a:0 "훌륭하군."
 maginot_destruction.2010.name:0 "$name_maginot_world$ 점령당함"
 maginot_destruction.2010.desc:0 "우리는 $name_maginot_world$ [From.GetName]을 [From.GetStarName] 성계에서 잃었습니다. 행성 지각 깊숙이 뻗은 방대한 벙커와 방어 시설의 미로에도 불구하고, 적 부대는 우리의 방어선을 뚫고 지휘 센터를 점령했습니다. 그들은 데드 핸드 안전장치를 성공적으로 비활성화했고, 그 결과 행성 파괴는 피하게 되었습니다. 적은 이제 강력한 방어 구조물이자 우리 방어선의 핵심을 통제하고 있습니다. \n현재 지휘부가 이미 죽지 않았다면, 이 실패에 대해 지옥 같은 문책이 내려졌을 것입니다."
 maginot_destruction.2010.a:0 "정말로."
 maginot_destruction.2001.name:0 "[From.GetStarName] 내에서 죽음의 손 발동!"
 maginot_destruction.2001.desc:0 "최악의 시나리오입니다. [From.GetStarName] 성계의 $name_maginot_world$ [From.GetName](이)가 모두와 함께 파괴되었습니다.\n\n적이 행성을 파괴할 정도의 강력한 무기를 가동하자, 죽음의 손 반물질 억제 시스템이 의도한대로 고장났으며, 곧 막대한 양의 에너지를 내뿜었습니다. 교묘한 배치와 대규모 지반 공학을 통해, 그 폭발은 의도한 대로 방향을 바꾸었으며 대륙 크기의 지각 덩어리를 매우 강력한 성형 폭탄으로 바꾸었습니다.\n\n[From.GetName]의 희생은 헛되지 않았습니다. 궤도의 모든 함선이 이 무기로 파괴되었습니다. 행성보다 훨씬 거대한 함선만이 우리의 분노에 버틸 수 있었습니다.\n\n§Y알림: 아공간 분열 시스템이 완파되었고, 이에 대한 피드백으로 주변 성계의 비슷한 장비를 전부 강제 중지시킬 것입니다. 남아있는 $name_maginot_world_plural$의 시스템을 직접 재가동시켜야 합니다.§!"
 maginot_destruction.2001.a:0 "우리 행성을 날려버리지 말라는 교훈을 주겠군."
 maginot_destruction.2002.name:0 "[From.GetStarName]에서의 대참사!"
 maginot_destruction.2002.desc:0 "§R[From.GetStarName] 성계의 $name_maginot_world$ [From.GetName]의 파괴 임무를 맡은 우리 함대에 대참사가 일어났습니다!§!\n\n무기 배치는 계획대로 진행되었지만, 행성이 갑자기 파괴되면서 대륙 크기의 덩어리가 거의 빛에 가까운 속도로 튕겨져 나왔고, 말도 안되게 거대한 초고온 플라스마 창이 되었습니다. 우리 함선의 보호막은 복사 에너지 대폭발과 가차없는 운동 에너지로 과부화되었고, 궤도 상의 모든 함선이 막대한 피해를 입었습니다. 더 작은 함선들은 즉시 파괴되었습니다.\n\n적은 그 행성을 파괴하고자 하는 자들을 막기 위한 페일세이프로 터무니없는 양의 반물질을 쌓아놓은 듯 합니다. 우리가 교전하는 다른 $name_maginot_world_plural$에도 비슷한 페일세이프가 있을 것이라 예상됩니다. 그러한 장치를 조심스레 비활성화하기 위해선 지상군을 이용해야하며, 그렇지 않으면 행성 자체가 최종 무기가 되기 때문에 우리는 더 큰 피해를 받을지도 모릅니다."
 maginot_destruction.2002.a:0 "면목 없군."
 maginot_destruction.2003.name:0 "[From.GetStarName]에서의 대실패!"
 maginot_destruction.2003.desc:0 "§R[From.GetStarName] 성계의 $name_maginot_world$ [From.GetName]의 파괴 임무를 맡은 우리 콜로서스에 대참사가 일어났습니다!§!\n\n명령한 대로 행성이 파괴된 듯 했지만, 마지막 방어 시설이 고장나자 대륙 크기의 덩어리가 거의 빛에 가까운 속도로 튕겨져 나왔고, 말도 안되게 거대한 초고온 플라스마 창이 되었습니다. 우리 콜로서스의 보호막은 복사 에너지 대폭발과 가차없는 운동 에너지로 과부화되었고, 막대한 피해를 입었습니다. 그것으로는 모자랐는지, 궤도 상에 있던 모든 함선도 영향을 받아, 더 작은 함선을 쓸어버렸습니다.\n\n적은 그 행성을 파괴하고자 하는 자들을 막기 위한 페일세이프로 터무니없는 양의 반물질을 쌓아놓은 듯 합니다. 우리가 교전하는 다른 $name_maginot_world_plural$에도 비슷한 페일세이프가 있을 것이라 예상됩니다. 그러한 장치를 조심스레 비활성화하기 위해선 지상군을 이용해야하며, 그렇지 않으면 행성 자체가 최종 무기가 되기 때문에 우리는 더 큰 피해를 받을지도 모릅니다."
 maginot_destruction.2003.a:0 "엄청나게 비싼건데!"
 maginot_destruction.2004.name:0 "$name_maginot_world$, [From.GetStarName](으)로 피신"
 maginot_destruction.2004.desc:0 "$name_maginot_world$ [From.GetName]이 [From.GetStarName] 성계에서 호라이즌 니들에 탑승했습니다.\n\n마지막 장교들을 탑승시킨 뒤 데드 핸드 반물질 격납 시스템은 의도대로 고장나도록 허용되었습니다. 우리는 그렇게 강력한 방어 시스템을 무인 상태로 남겨 다른 국가가 쉽게 이용하게 하고 싶지 않기 때문입니다.\n대륙 크기의 성형 플라스마 폭발은 빈 우주로 유도되어, 이미 탑승한 식민지와 호라이즌 니들 시스템의 값비싼 손실을 피했습니다. 니들 자체는 우주 반동과 2차 영향으로부터 잘 보호되어 있지만, $name_maginot_world$에 속한 다른 플랫폼과 우주 기반 시스템은 그렇지 않았고, 그 궤도에 있던 모든 것은 우주 먼지로 변했습니다. 군용 또는 민간 함선이 궤도에 남아 있지 않았기를 바랍니다.\n\n다음 식민지로 나아갑시다!"
 maginot_destruction.2004.a:0 "모든 것이 계획대로 진행된다."
 maginot_orbital_defence.1004.name:0 "마지노 전략 방위 사령부 파괴됨!"
 maginot_orbital_defence.1004.desc:0 "$name_maginot_world$ §Y[maginot_world_location.GetName]§!의 보호 궤도 사령부 기지가 §Y[maginot_orbital_defence_destroyer.GetName]§!의 공격에 파괴되었습니다.\n\n궤도 방위는 잔해가 돼버렸지만, 중앙 방위 기지는 시간이 지나면 복구할 수 있습니다. 마지노 행성 그 자체는 온전하고 여전히 지상 침공에 저항할 것입니다. 만약 기지가 업그레이드 되었던 상태였다면, 기지를 복구할 때 모든 업그레이드 또한 복구됩니다. 2차 전략 방위 플랫폼은 복구되지 않을 것이며, 처음부터 새로 건설해야 합니다."
 maginot_orbital_defence.1004.a:0 "제기랄!"
 maginot_orbital_defence.1006.name:0 "마지노 전략 방위 사령부 수리됨!"
 maginot_orbital_defence.1006.desc:0 "$name_maginot_world$ §Y[maginot_world_location.GetName]§!의 사령부 기지를 성공적으로 수리하였습니다. 구조물은 정상 작동 상태로 복구되었고, 이제 우리의 영토를 보호할 준비가 되었습니다.\n\n이전에 적용되었던 모든 업그레이드도 유지될 것이지만, 2차 전략 방위 플랫폼은 복구되지 않습니다."
 maginot_orbital_defence.1006.a:0 "훌륭해!"
 job_maginot_central_command:0 "마지노 중앙 사령부 참모"
 job_maginot_central_command_plural:0 "마지노 중앙 사령부 참모"
 job_maginot_central_command_desc:0 "$name_maginot_world$을 감독하는 작전 참모입니다. 제국 최고의 참모들로 구성되어 있습니다. 그들은 가장 깊은 사령부 복합 건물로부터 광대한 행성 방위를 지휘할 것이며, 자신의 목숨을 우리 국가를 위해 바칠 준비가 되어있습니다."
 job_maginot_central_command_effect_desc:0 "£job_maginot_central_command£ $job_maginot_central_command_plural$는 £crime£ §Y$PLANET_CRIME_TITLE$§!를 감소시키며, £mod_planet_stability_add£ §Y$PLANET_STABILITY_TITLE$§!를 증가시키고, £defense_army£ §YDefense Armies§!를 생성하고, £mod_country_naval_cap_add£ §Y$MOD_COUNTRY_NAVAL_CAP_ADD$§!을 높이며, a£unity£ §Y$unity$§! 및 £influence£ §YInfluence§!을 생산합니다"
 mod_job_maginot_central_command_add:0 "$job_maginot_central_command$"
 job_maginot_central_command_gestalt:0 "마지노 중앙 지휘 드론"
 job_maginot_central_command_gestalt_plural:0 "마지노 중앙 지휘 드론"
 job_maginot_central_command_gestalt_desc:0 "지휘 임무에 적합한 특별히 선택된 드론으로, $name_maginot_world$을 감시합니다. 들은 가장 깊은 사령부 복합 건물로부터 광대한 행성 방위를 지휘할 것입니다."
 job_maginot_central_command_gestalt_effect_desc:0 "£job_maginot_central_command_gestalt£ $job_maginot_central_command_gestalt_plural$는 £crime£ §Y$PLANET_CRIME_TITLE$§!를 감소시키며, £mod_planet_stability_add£ §Y$PLANET_STABILITY_TITLE$§!를 증가시키고, £defense_army£ §YDefense Armies§!를 생성하고, £mod_country_naval_cap_add£ §Y$MOD_COUNTRY_NAVAL_CAP_ADD$§!을 높이며, a£unity£ §Y$unity$§! 및 £influence£ §YInfluence§!을 생산합니다"
 mod_job_maginot_central_command_gestalt_add:0 "$job_maginot_central_command_gestalt$"
 job_maginot_shield_generator_operator:0 "보호막 생성기 조작자"
 job_maginot_shield_generator_operator_plural:0 "보호막 생성기 조작자"
 job_maginot_shield_generator_operator_desc:0 "도시 한 블럭 규모의 생성기 배열을 다루는 훈련을 받았고, 그 외에도 적 공격의 위협으로부터 $name_maginot_world$을 안전하게 합니다."
 job_maginot_shield_generator_operator_effect_desc:0 "£job_maginot_shield_generator_operator£ $job_maginot_shield_generator_operator_plural$는 £energy£ §Y$energy$§!와 £alloys£ §Y$alloys$§!를 £unity£ §YUnity§!로 전환하고 $name_maginot_world$를 위한 §Ydefensive upgrades§!를 활성화합니다. 100개의 직업당 1 §Y$defensive_upgrade_point$§!입니다."
 mod_job_maginot_shield_generator_operator_add:0 "$job_maginot_shield_generator_operator$"
 job_maginot_shield_generator_operator_gestalt:0 "보호막 생성기 조작 드론"
 job_maginot_shield_generator_operator_gestalt_plural:0 "보호막 생성기 조작 드론"
 job_maginot_shield_generator_operator_gestalt_desc:0 "도시 한 블럭 규모의 생성기 배열을 다루는 훈련을 받았고, 그 외에도 적 공격의 위협으로부터 $name_maginot_world$을 안전하게 합니다."
 job_maginot_shield_generator_operator_gestalt_effect_desc:0 "£job_maginot_shield_generator_operator_gestalt£ $job_maginot_shield_generator_operator_gestalt_plural$는 £energy£ §Y$energy$§!와 £alloys£ §Y$alloys$§!를 £unity£ §YUnity§!로 전환하고 $name_maginot_world$를 위한 §Ydefensive upgrades§!를 활성화합니다. 100개의 직업당 1 §Y$defensive_upgrade_point$§!가 제공됩니다."
 mod_job_maginot_shield_generator_operator_gestalt_add:0 "$job_maginot_shield_generator_operator_gestalt$"
 job_maginot_planetary_cannon_operator:0 "방위망 관리자"
 job_maginot_planetary_cannon_operator_plural:0 "방위망 관리자"
 job_maginot_planetary_cannon_operator_desc:0 "행성 화포와 궤도 업링크 모두를 관리하는 훈련된 공학자들입니다. 훈련된 인력은 지상 병기뿐만 아니라 전략 방위 플랫폼에도 주둔하며 $name_maginot_world$의 성계에 존재하는 멍청한 적대 세력과 교전합니다."
 job_maginot_planetary_cannon_operator_effect_desc:0 "£job_maginot_planetary_cannon_operator£ $job_maginot_planetary_cannon_operator_plural$는 £energy£ §Y$energy$§!와 £alloys£ §Y$alloys$§!를 £unity£ §YUnity§!로 전환하고 $name_maginot_world$의 §Y공격 업그레이드§!를 가능하게 합니다. 100개의 직업당 1 §Y$offensive_upgrade_point$§!가 제공됩니다."
 mod_job_maginot_planetary_cannon_operator_add:0 "$job_maginot_planetary_cannon_operator$"
 job_maginot_planetary_cannon_operator_gestalt:0 "방위망 관리 드론"
 job_maginot_planetary_cannon_operator_gestalt_plural:0 "방위망 관리 드론"
 job_maginot_planetary_cannon_operator_gestalt_desc:0 "행성 화포와 궤도 업링크 모두를 관리하는 훈련된 공학 드론들입니다. 전투 드론은 지상 병기뿐만 아니라 전략 방위 플랫폼에도 주둔하며 $name_maginot_world$의 성계에 존재하는 멍청한 적대 세력과 교전합니다."
 job_maginot_planetary_cannon_operator_gestalt_effect_desc:0 "£job_maginot_planetary_cannon_operator_gestalt£ $job_maginot_planetary_cannon_operator_gestalt_plural$는 £energy£ §Y$energy$§!와 £alloys£ §Y$alloys$§!를 £unity£ §YUnity§!로 전환하고 $name_maginot_world$에 대해 §Y공격 업그레이드§!를 활성화합니다. 100개의 직업당 1 §Y$offensive_upgrade_point$§!입니다."
 mod_job_maginot_planetary_cannon_operator_gestalt_add:0 "$job_maginot_planetary_cannon_operator_gestalt$"
 job_maginot_bunker_officer:0 "마지노 방위 사령관"
 job_maginot_bunker_officer_plural:0 "마지노 방위 사령관"
 job_maginot_bunker_officer_desc:0 "벙커 구획 전체의 방위 체계를 세우는 장교입니다."
 job_maginot_bunker_officer_effect_desc:0 "£job_maginot_bunker_officer£ $job_maginot_bunker_officer_plural$는 £energy£ §Y$energy$§!와 £alloys£ §Y$alloys$§!를 £unity£ §Y$unity$§!로 전환하고, £mod_country_naval_cap_add£ §Y$MOD_COUNTRY_NAVAL_CAP_ADD$§!를 증가시키며 £defense_army£ §YDefense Armies§!를 생성합니다."
 mod_job_maginot_bunker_officer_add:0 "$job_maginot_bunker_officer$"
 job_maginot_bunker_officer_gestalt:0 "마지노 방위 지휘 드론"
 job_maginot_bunker_officer_gestalt_plural:0 "마지노 방위 지휘 드론"
 job_maginot_bunker_officer_gestalt_desc:0 "벙커 구획 전체의 방위 체계를 세우기 위해 특별히 만들어진 드론입니다."
 job_maginot_bunker_officer_gestalt_effect_desc:0 "£job_maginot_bunker_officer_gestalt£ $job_maginot_bunker_officer_gestalt_plural$는 £energy£ §Y$energy$§!와 £alloys£ §Y$alloys$§!를 £unity£ §Y$unity$§!로 전환하고, £mod_country_naval_cap_add£ §Y$MOD_COUNTRY_NAVAL_CAP_ADD$§!를 증가시키며 £defense_army£ §YDefense Armies§!를 생성합니다."
 mod_job_maginot_bunker_officer_gestalt_add:0 "$job_maginot_bunker_officer_gestalt$"
 job_maginot_military_police:0 "마지노 헌병"
 job_maginot_military_police_plural:0 "마지노 헌병"
 job_maginot_military_police_desc:0 "평화 유지 및 법 집행의 의무를 지닌 헌병입니다. 매일 무장 군인을 상대하는 특수한 훈련을 받았습니다. $name_maginot_world$의 일상입니다."
 job_maginot_military_police_effect_desc:0 "£job_maginot_military_police£ $job_maginot_military_police_plural$은 £crime£ §Y$PLANET_CRIME_TITLE$§!을 감소시키고, £mod_planet_stability_add£ §Y$PLANET_STABILITY_TITLE$§!를 증가시키며, £defense_army£ §Y방위군§!을 생성합니다"
 mod_job_maginot_military_police_add:0 "$job_maginot_military_police$"
 maginot_world_0:0 "$gc_mega$$name_maginot_world$ 건설 현장"
 maginot_world_0_DESC:0 "미래의 $name_maginot_world$가 아래 행성에 건설될 건설 현장입니다. 이 거대한 주둔지는 언젠가 행성의 맨틀 깊숙이 뻗어나가고 대기를 넘어 깊은 우주로 이어져 적들에게 거의 무적의 장애물이 될 것입니다. 행성의 모든 구역은 독특한 방어 구역으로 대체되며, 행성 방어 플랫폼 관리가 가능해질 것입니다. $orbital_ring_tier_1_plural$가 통합되고 제거됩니다."
 maginot_world_0_MEGASTRUCTURE_DETAILS:0 "£gigastructural£ $giga_list_category_megastructure$ - $giga_list_category_defensive$\n대량의 §Y방위군§!과 §YFTL 억제기§!를 제공하며 §Y점프 드라이브§!를 차단합니다 - §B마지노 요새 복합 건물이 건설된 행성에 건설할 수 있습니다§!\n§L행성 전체를 뒤덮은 거대한 요새-복합 단지로, 어떤 전쟁터에서도, 어떤 적에게도 맞설 수 있는 궁극의 방어입니다.§!"
 maginot_world_1:0 "$name_maginot_world$ 비계"
 maginot_world_1_DESC:0 "부착된 방위 고리와 함께, 초기 지형 형성, 굴착 및 우주 엘리베이터 건설이 시작됩니다. 벙커는 지하 가장 깊은 곳에 있고, 죽음의 손 시스템 설치의 시작이 가능합니다."
 maginot_world_2:0 "$name_maginot_world$"
 maginot_world_2_DESC:0 "행성을 뒤덮는 광대한 요새로 이루어져있으며, 완전한 난공불락의 행성입니다."
 maginot_world_ringworld_0:0 "$name_maginot_ringworld$ 건설 현장"
 maginot_world_ringworld_0_DESC:0 "아래의 링 월드 구획에 건설될 $name_maginot_ringworld$의 건설 현장입니다. 이 거대한 요새는 언젠가 링 월드의 상부 구조를 뒤엎을 것이며, 이는 적들에게 거의 난공불락의 장애물로 여겨질 것입니다. 행성의 모든 지구는 특수 방위 지구로 대체되며, 행성의 방위 플랫폼을 관리할 수 있을 것입니다."
 maginot_world_ringworld_0_MEGASTRUCTURE_DETAILS:0 "이것은 표시되어서는 안 됩니다."
 maginot_world_ringworld_1:0 "$name_maginot_ringworld$ 상부 구조"
 maginot_world_ringworld_1_DESC:0 "전체적인 상부 구조를 크게 바꾸는 링 월드 개조 초기 단계입니다. 최하층 벙커가 설치되었고, 죽음의 손 시스템 설치를 시작할 수 있습니다."
 maginot_world_ringworld_2:0 "$name_maginot_ringworld$"
 maginot_world_ringworld_2_DESC:0 "링 월드를 뒤덮는 광대한 요새로 이루어져있으며, 완전히 난공불락입니다."
 requires_maginotable_planet_type:0 "$TRIGGER_FAIL$마지노 행성은 일반적인 행성, 거대 가스 행성 거주지, 혹은 링월드 거주구획에만 건설할 수 있습니다."
 requires_not_maginot_world:0 "$TRIGGER_FAIL$마지노 행성에 마지노 행성을 건설할 수 없습니다."
 requires_maginot_stronghold_built:0 "$TRIGGER_FAIL$$building_giga_maginot_stronghold$를 먼저 건설하여 행성 벙커를 위한 건설 공간을 마련해야합니다."
 giga_dialog.5001.name:0 "$name_maginot_world$ 건설 현장 완공"
 giga_dialog.5001.desc:0 "미래의 $name_maginot_world$ 건설 현장이 이제 [giga_system.GetName] 시스템에 완공되었습니다. 곧 이 행성은 거대한 요새 복합체가 될 것이며, 우리는 궁극적인 방어를 갖게 될 것입니다. \n\n§S행성의 모든 구역은 독특한 방어 구역으로 대체되며, 행성 방어 관리가 가능해질 것입니다. $orbital_ring_tier_1_plural$이 통합되고 제거될 것입니다.§! \n\n§R경고: $name_maginot_world$는 식민지 파괴 시 행성을 폭파하고 궤도에 있는 모든 함선을 전멸시키는 안전 장치를 갖추고 있습니다!"
 giga_dialog.5001.a:0 "훌륭해."
 giga_dialog.5002.name:0 "$name_maginot_world$ 내부 완성"
 giga_dialog.5002.desc:0 "[giga_system.GetName] 성계의 $name_maginot_world$ 완성에 더 가까워졌습니다. 지형 형성과 우주 건설이 이미 진행 중이며, 최하층 벙커와 사령부를 위한 공간을 파냈습니다. 이제 반물질 기반 페일세이프 시스템을 설치하고 행성의 초기 방위를 마무리할 수 있습니다."
 giga_dialog.5002.a:0 "훌륭해."
 giga_dialog.5003.name:0 "$name_maginot_world$ 완성!"
 giga_dialog.5003.desc:0 "환상적인 소식입니다! [giga_system.GetName] 성계에서 행성의 맨틀부터 심우주까지 뻗어있는 궁극의 요새가 완성되었습니다. 진정 경외심을 불러일으키는 구조물로, 적들은 돌파할 수 없을 것입니다. 이곳에는 궤도 방위, 행성 화포, 지표면의 광대한 벙커들, 깊은 지하 사령부 복합 건물 그리고 해군 함대 전체의 보호막 생성 능력을 뛰어넘는 보호막 생성기가 존재합니다.\n또한 죽음의 손 시스템을 통해 행성을 대규모 파괴로부터 지켜내는데, 페일세이프가 활성화된 경우 행성 전체를 거대한 반물질 성형 폭탄으로 이용하여 §R궤도 내의 모든 적대 세력을 완전히 제거합니다.§!\n\n§Y결정§!을 통해 다양한 방위 시스템을 관리할 수 있습니다. §Y지구§!를 건설하여 결정에 사용되는 $defensive_upgrade_point_plural$ 및 $offensive_upgrade_point_plural$를 얻으십시오."
 giga_dialog.5003.a:0 "드디어, 안전해졌군."
 giga_dialog.5004.name:0 "$name_maginot_ringworld$ 건설 현장 완공"
 giga_dialog.5004.desc:0 "[giga_system.GetName] 성계 내에서 $name_maginot_ringworld$의 건설 현장이 완성되었습니다. 곧 이 링 월드 구역은 하나의 거대한 요새 단지가 될 것이며 궁극의 방어를 가지게됩니다.\n\n행성의 모든 지구는 특수 방위 지구로 대체되며, 근공간 방위 플랫폼을 관리할 수 있을 것입니다.\n\n§R경고: $name_maginot_ringworld$에는 페일세이프가 있으며, 식민지가 파괴될 경우 궤도의 모든 함선을 파괴하고 행성을 폭파시킬 것입니다!"
 giga_dialog.5004.a:0 "훌륭해."
 giga_dialog.5005.name:0 "$name_maginot_ringworld$ 외부 완공"
 giga_dialog.5005.desc:0 "[giga_system.GetName] 성계의 $name_maginot_ringworld$ 완성에 더 가까워졌습니다. 지형 형성과 우주 건설이 이미 진행 중이며, 최하층 벙커와 사령부를 위한 공간을 지정했습니다. 이제 반물질 기반 페일세이프 시스템을 설치하고 행성의 초기 방위를 마무리할 수 있습니다."
 giga_dialog.5005.a:0 "훌륭해."
 giga_dialog.5006.name:0 "$name_maginot_ringworld$ 완성!"
 giga_dialog.5006.desc:0 "환상적인 소식입니다! [giga_system.GetName] 성계에서 항성을 부분적으로 감싸는 궁극의 요새가 완성되었습니다. 진정 경외심을 불러일으키는 구조물로, 적들은 돌파할 수 없을 것입니다. 이곳에는 근공간 방위, 상부 구조의 포대, 광대한 벙커 구획, 깊은 지하 사령부 복합 건물 그리고 해군 함대 전체의 보호막 생성 능력을 뛰어넘는 보호막 생성기가 존재합니다.\n또한 죽음의 손 시스템을 통해 구획을 대규모 파괴로부터 지켜내는데, 페일세이프가 활성화된 경우 행성 전체를 거대한 반물질 성형 폭탄으로 이용하여 §R궤도 내의 모든 적대 세력을 완전히 제거합니다.§!\n\n§Y결정§!을 통해 다양한 방위 시스템을 관리할 수 있습니다. §Y지구§!를 건설하여 결정에 사용되는 $defensive_upgrade_point_plural$ 및 $offensive_upgrade_point_plural$를 얻으십시오."
 giga_dialog.5006.a:0 "드디어, 안전해졌군."
