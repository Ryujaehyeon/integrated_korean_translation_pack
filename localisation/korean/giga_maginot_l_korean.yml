 d_maginot_command:0 "중앙 마지노 사령부 복합 건물"
 d_maginot_command_desc:0 "행성의 가장 깊은 곳에서 매우 엄중히 보호되는 사령부와 통제 벙커입니다. 행성이 파괴될 경우를 대비한 거대한 반물질 기반 죽음의 손 시스템도 있습니다."
