 concept_esap_government_perks: "Government Perks"
 concept_esap_government_perks_desc: "There are different ways to rule, and your empire may specialize in one or many different ways by selecting specific §YGovernment Perks§! (an ['concept_ascension_perk'] subcategory). The §Gbonuses§! offered by these perks are synergetic, and are further buffed up to §H5§! times for each §YGovernment Perk§! selected. Ultimately, obtaining §H4§! of these perks would unlock either the §Y$ap_esap_gov_5$§! or §Y$ap_esap_gov_GC_5$§! Ascension Perks, which could be any bureaucrat's or synaptic drone's respective §GMagnum Opus§!.\n\nAmong these perks we have the §Hfollowing options§! for regular empires:\n* §Y$ap_esap_gov_1$§!\n* §Y$ap_esap_gov_2$§!\n* §Y$ap_esap_gov_3$§!\n* §Y$ap_esap_gov_3_corp$§!\n* §Y$ap_esap_gov_4$§!\n* §Y$ap_esap_gov_5$§!\n\nAmong these perks we have the §Hfollowing options§! for Gestalt empires:\n* §Y$ap_esap_gov_GC_1$§!\n* §Y$ap_esap_gov_GC_2$§!\n* §Y$ap_esap_gov_GC_3$§!\n* §Y$ap_esap_gov_hive_4$§!\n* §Y$ap_esap_gov_machines_4$§!\n* §Y$ap_esap_gov_GC_5$§!"
