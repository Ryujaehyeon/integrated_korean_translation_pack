l_korean:
 EXPLORATION_CRUISER_UPGRADE_PROJECT:0 "과학선 업그레이드 계획"
 EXPLORATION_CRUISER_UPGRADE_PROJECT_DESC:0 "우리 함대의 공학자들이 기존의 과학선을 새로운 탐사선 클래스로 개조하는 중대한 작업을 시작할 준비가 되어 있습니다. 이 프로젝트는 완료하는 데 약 250일이 소요될 것으로 예상됩니다. 완료되면, 해당 과학선의 과학자 리더는 자동으로 새로운 배로 전환됩니다."
 nsc_events_exploration_ship.3.name:0 "프로토타입 탐사선"
 nsc_events_exploration_ship.3.desc:0 "우리의 용감한 과학자들은 은하를 탐험하고 그 안에 숨겨진 모든 비밀을 밝혀내기 위한 탐구에서 엄청난 위험에 직면했습니다. 우리의 공학자들은 이 문제에 대한 해결책을 찾기 위해 과학자들과 함께 협력해 왔습니다. 우리는 마침내 답을 찾았다고 믿습니다.\n\n탐사선은 새로운 세계를 탐험하고 새로운 생명체와 문명을 찾기 위해 헌신하는 대형 전투 가능 과학선입니다. 우리의 과학자들은 더 이상 공허의 공포를 두려워할 필요가 없습니다!"
 nsc_events_exploration_ship.3.a:0 "훌륭합니다, 우리는 그 누구도 가본 적 없는 곳으로 대담하게 나아갈 것입니다!"
 nsc_events_exploration_ship.10.name:0 "과학 함대 업그레이드"
 nsc_events_exploration_ship.10.desc:0 "이제 탐사선의 영구 디자인을 확정했으므로, 우리 함대 물류 팀은 과학선 함대를 이 새로운 향상된 디자인으로 업그레이드할 것인지 알고 싶어합니다. 각 선박의 업그레이드는 약 §G250일§!이 소요되며, 선박당 §B400 합금§!과 §Y50 에너지§!의 투자가 필요하지만, 이는 우리의 주요 탐사 과학자들이 점점 더 적대적인 우주에서 생존할 확률을 크게 높여줄 것입니다. 최대 8척의 과학선을 새로운 클래스으로 업그레이드할 수 있습니다. 업그레이드하고자 하는 각 선박에 대해 특별 프로젝트가 생성되며, 프로젝트를 시작하기 위해 해당 선박을 우리의 본거지 시스템으로 이동해야 합니다. 프로젝트를 완료하는 데 시간 제한은 없습니다. 귀하의 결정을 기다립니다."
 nsc_events_exploration_ship.10.1:0 "§Y1§! 함선을 업그레이드하기로 선택합니다. (§Y50 에너지§! & §B400 합금§!)"
 nsc_events_exploration_ship.10.2:0 "§Y2§! 함선을 업그레이드하기로 선택합니다. (§Y100 에너지§! & §B800 합금§!)"
 nsc_events_exploration_ship.10.3:0 "§Y3§! 함선을 업그레이드하기로 선택합니다. (§Y150 에너지§! & §B1200 합금§!)"
 nsc_events_exploration_ship.10.4:0 "§Y4§! 함선을 업그레이드하기로 선택합니다. (§Y200 에너지§! & §B1600 합금§!)"
 nsc_events_exploration_ship.10.5:0 "§Y5§! 함선을 업그레이드하기로 선택합니다. (§Y250 에너지§! & §B2000 합금§!)"
 nsc_events_exploration_ship.10.6:0 "§Y6§! 함선을 업그레이드하기로 선택합니다. (§Y300 에너지§! & §B2400 합금§!)"
 nsc_events_exploration_ship.10.7:0 "§Y7§! 함선을 업그레이드하기로 선택합니다. (§Y350 에너지§! & §B2800 합금§!)"
 nsc_events_exploration_ship.10.8:0 "§Y8§! 함선을 업그레이드하기로 선택합니다. (§Y400 에너지§! & §B3200 합금§!)"
 nsc_events_exploration_ship.10.end:0 "어떤 함선도 업그레이드하지 않기로 선택합니다. (§M+25 영향력§!)"
 nsc_events_exploration_ship.11.name:0 "과학선 업그레이드 완료"
 nsc_events_exploration_ship.11.desc:0 "과학 탐사선 업그레이드 프로젝트가 완료되었습니다. 과학자 리더가 자신의 자리에 배치되었으며, 새로운 탐사선이 이제 귀하의 명령을 기다리고 있습니다."
 nsc_flagship_cannot_be_acquired_by_conventional_means.tooltip.fail:0 "§R$TRIGGER_FAIL$§! 크기와 복잡성 때문에 $nsc_flagship_shipyard$ 메가구조물만이 기함급 선박을 생산할 수 있습니다."
 nsc_flagship_shipyard:0 "대형 조선소"
 nsc_flagship_shipyard_DESC:0 "이 거대한 스테이션은 지금까지 은하에 등장했던 함선 중 가장 크고 치명적인 함선을 건조할 수 있는 시설입니다."
 nsc_flagship_shipyard_MEGASTRUCTURE_DETAILS:0 "$nsc_flagship_shipyard_DESC$"
 requires_no_existing_nsc_grand_shipyard:0 "$TRIGGER_FAIL$하나의 $nsc_flagship_shipyard$ 이상 건설할 수 없습니다."
 requires_no_existing_nsc_flagship:0 "£trigger_no£ 기함은 한 척 이상 건조할 수 없습니다."
 can_not_start_another_nsc_flagship_building:0 "£trigger_no£ 추가적인 기함 건조 프로젝트를 시작할 수 없습니다."
 nsc_flagship_shipyard_complete:0 "대형 조선소"
 nsc_flagship_shipyard_complete_DESC:0 "이 거대한 조선소는 우리 제국의 강력한 기함이 있는 곳입니다."
 nsc_events_flagship.1.name:0 "대형 조선소 건설 준비 완료"
 nsc_events_flagship.1.desc:0 "기함을 건조하는 데 필요한 대규모 건조장의 설계가 완료되었습니다. 조립시설 건설은 시작할 수 있지만, 일단 해군 기술자들이 기함의 설계를 마무리해야 합니다. 우리는 한 척의 기함만을 건조할 수 있기 때문에, 함선이 건조된 후에는 개조 및 업그레이드가 가능하겠지만, 건조하기 전에는 단일 설계를 해야 합니다."
 nsc_events_flagship.1.a:0 "이 함선이 은하의 흐름을 바꾸겠군..."
 nsc_events_flagship.3.name:0 "기함 건조 발각"
 nsc_events_flagship.3.desc:0 "우리의 신규 함급인 기함의 건조는 당연히 우리가 부여할 수 있는 가장 높은 수준의 보안 단계를 부여했고, 프로젝트를 은폐하기 위해 상당한 시간과 자원을 쏟아부었습니다. \n\n그러나, 이 강력한 함선의 건조를 철저히 비밀에 부치려던 우리의 엄청난 노력에도 불구하고, 이 프로젝트는 너무나 거대하여 거의 은폐하는 것이 불가능했기 떄문에 은하의 다른 제국들도 그 사실을 알게 되었고, 그들도 우리가 성간 전쟁의 흐름을 바꿀 함선을 건조하는 동안 가만히 있지는 않았습니다. 우리 첩보 요원들은 이미 많은 제국들이 이 소식을 듣고 은하의 힘의 균형을 유지하길 원하면서 자체적인 기함 건설 프로젝트를 시작했다고 보고했습니다. \n\n새로운 군비 경쟁이 시작되었습니다."
 nsc_events_flagship.3.a:0 "알려질거라 예상하지 못한건 아니지만, 아쉽기는 하군."
 nsc_events_flagship.4.name:0 "우주의 궁극적인 힘"
 nsc_events_flagship.4.desc:0 "다년간의 작업, 방대한 양의 자원 소비, 믿을 수 없는 규모의 건조장 건설, 그리고 상당한 양의 정치적 자본의 지출이 있은 후, 기함은 마침내 그 당당한 자태를 내보였습니다. 이 함선은 적 함대를 전멸시키고 전체 전쟁의 흐름까지도 바꿀 수 있는 궁극의 함선입니다. \n\n이 거대한 신형 군함의 공개는 우리 제국 시민들과 타국의 외계인들에게는 큰 충격으로 다가왔지만, 이전의 첩보 보고에서도 알 수 있듯이, 그들의 정부는 놀라움에 사로잡히지 않았고, 이 강력한 신무기에 대항하기 위한 준비를 해왔습니다. 첩보 보고에 따르면 몇몇 제국이 그들의 기함 생산을 더욱 서두르고 있다고 합니다."
 nsc_events_flagship.4.a:0 "Excellent."
 nsc_events_flagship.6.name:0 "전략적 우위 상실"
 nsc_events_flagship.6.desc:0 "우리 첩보 요원들은 이제 여러 강대국들이 해군 경쟁에서 우리에게 뒤쳐지지 않기 위해 그들만의 기함급 함선을 진수했다고 보고했습니다. 은하는 이제 이 거대한 함선 몇 척의 본거지이며, 각 함선은 함대 전체를 격파하기에도 충분한 화력을 가지고 있습니다. 다행인 점은 이 함선을 건조하고 유지하는 데 드는 막대한 비용으로 인해 어떤 국가도 한 척 이상의 기함을 건조하지는 못하겠지만, 이 함선의 믿을 수 없는 힘은 언젠가는 이들이 충돌하는 미래의 전장을 만들 것입니다."
 nsc_events_flagship.6.a:0 "알겠다."
 nsc_events_flagship.7.name:0 "격침된 기함"
 nsc_events_flagship.7.desc:0 "우리 함대의 자존심이자 제국의 힘의 영광스러운 상징인 기함이 파괴되었습니다!\n\n이렇게 큰 재난의 충격은 절대 과소평가될 수 없습니다. 시민들은 거대한 기함의 능력에 많은 믿음을 가지고 있었으며, 우리의 선전은 시민에게 영감을 주기 위해 기함을 크게 부각시켰습니다. 앞으로 며칠, 몇 주, 심지어는 몇 년 동안 많은 이들이 가장 강력한 군함의 파괴로 이어진 제국 지휘부의 결정에 의문을 제기할 것입니다.\n\n이제 우리는 기함 유지에 필요한 상당한 자원을 더 이상 쓸 필요가 없게 되었으므로, 이전과 같은 심층적인 특수 프로젝트가 필요하겠지만 새로운 기함을 건조하는 것이 가능할 것이며, 다음 기함은 잃지 않도록 주의해야 할 것입니다. 우리의 함대 전략에 대한 검토는 확실히 적절합니다."
 nsc_events_flagship.7.a:0 "좋아, 즉시 건조를 시작하도록."
 nsc_events_flagship.8.name:0 "자발적 군비 축소"
 nsc_events_flagship.8.desc:0 "강력한 슈퍼무기인 플래그십의 존재는 강력한 파급 효과를 가져옵니다. 이러한 놀라운 전투함의 유지 비용은 상당하며, 그 존재 자체가 국가의 군사적 성향을 상징합니다 - 이는 국제적 긴장을 높이고 해군 군비 경쟁을 가속화할 수 있습니다.\n\n경제적 이유든 정치적 이유든, 존경하는 [Root.GetRulerTitle]님께서는 플래그십을 해체하기로 결정하셨습니다. 그러나 조선소는 여전히 운영 중입니다. 새로운 플래그십의 건설을 즉시 시작하기 위해 상당한 자원을 투자하는 것은 가능하지만, 이렇게 대규모 프로젝트를 비밀로 유지하는 것은 어려울 것입니다 - 적어도 이번에는 이미 대규모 조선소가 존재하기 때문에 더 수월할 것입니다 - 그리고 이러한 대규모 프로젝트를 해체한 후 다시 건설하는 이유는 최선의 경우에도 의심스럽습니다. 어쨌든, 그렇게 하려면 특별 프로젝트가 필요합니다.\n\n반면, 나중을 위해 기다리고 선택지를 열어두는 것이 더 신중하다면, 다른 플래그십을 건설해야 할 때 필요하거나 바람직할 경우 사용할 수 있는 플래그십 재건령이 이제 마련되어 있습니다."
 nsc_events_flagship.8.a:0 "필요할 때 기함을 재건할 것입니다."
 nsc_events_flagship.9.name:0 "새 기함 건조됨"
 nsc_events_flagship.9.desc:0 "새로운 기함이 마침내 건조되어 함대에 합류할 준비가 되었습니다. 바라건대, 이 함선이 지난번의 동형함과 같은 암울한 운명을 맞이하지 않기를 바랍니다. 이 함선은 함대에서 가장 강력하지만 저렴하지도 않고 대체로 빠르지도 않습니다만 이 함선을 잃는 것은 사기와 군사력에 엄청난 타격을 주기 떄문에 신중하게 다뤄야 합니다. \n\n우리는 시민들을 실망시키지 않도록 노력해야 할 것입니다."
 nsc_events_flagship.9.a:0 "우리는 다시는 실패하지 않을 것이다."
 nsc_events_flagship.10.name:0 "전설적인 전투"
 nsc_events_flagship.10.desc:0 "기함을 건조하기 위한 거대 건조장이 건설되기 이전부터, 많은 해군 이론가들은 이전의 교리가 주력함끼리의 충돌에 초점을 맞추었듯이, 이 해군 군비 경쟁이 언젠가는 전장에서 기함끼리의 충돌을 이끌 것이라고 주장해왔습니다. 일각에서는 또한 기함에 대항할 유일한 방법이 같은 기함이기 때문에 충돌이 불가피하다는 주장까지 나왔습니다.\n\n드디어 많은 이론가가 예상했던 그날이 왔습니다. 우리 기함이 적의 기함을 공격하려 하고, 하늘이 그들의 힘으로 어지러워질 것입니다. 양국은 각자의 기함을 건조하는 데 막대한 자원을 투입했으며, 주력함을 중심으로 교리를 설계했습니다.\n\n은하의 모두가 이 전투에 시선을 집중하고 있습니다. 이 전투는 은하의 힘의 균형과 해군 교리의 미래를 결정지을 것입니다."
 nsc_events_flagship.10.a:0 "영광을 향해!"
