l_korean:
 mem_poisoned_world_category:0 "유독성 행성"
 mem_poisoned_world_category_desc:0 "지금은 유독성 가스로 가득 찼지만, 이 [Root.GetPlanetMoon]은(는) 과거에 산업 시대에 진입한 종족으로 가득하였습니다. 버려진 도시들이 표면에 줄지어 늘어져 있습니다."
 mem_poisoned_world.100.name:0 "대탈출"
 mem_poisoned_world.100.desc:0 "[From.GetName]에 있는 버려진 도시들을 조사한 결과 또 다른 미스터리가 드러났습니다. 수백만의 시체에 대한 증거를 찾는 대신, 과학 책임자 [This.leader.GetName]는 이 [From.GetPlanetMoon]이 버려졌다는 결론에 도달했습니다. 광범위하고 급조된 대량 교통 시스템이 풍경을 가로지르고 있으며, 여러 주요 도시의 벽에서 시민들에게 대피하라는 지시가 발견되었습니다.\n\n그 다음에 무슨 일이 일어났는지는 여전히 불확실합니다. 우주 프로그램의 뚜렷한 증거가 없는 상황에서, 유일한 다른 가능한 설명은 이러한 교통망의 중심에 세워진 이상한 아치형 구조물에 있습니다. 알려진 어떤 초공간 여행 방법과도 일치하지 않는 이 장치들은 부식성 대기에 수세기 동안 노출되어 거의 분해되었습니다. 이러한 아치들이 어떻게 작동했는지는 결코 알 수 없겠지만, 가능한 것들을 보는 것만으로도 우리의 시야가 열렸습니다."
 mem_poisoned_world.100.a:0 "남은 것을 분석합니다."
 mem_poisoned_world.101.name:0 "집단적 광기"
 mem_poisoned_world.101.desc:0 "우리 과학팀이 [From.GetName]의 유적을 탐사하면서 놀라운 발전이 보고되었습니다. 방사능 구름과 독성 가스는 사고나 자연 재해로 인한 것이 아닙니다. 대규모 석유화학 공장은 가능한 한 많은 오염 물질을 배출하기 위해 존재하며, 토양에서는 여러 고급 신경독성 물질이 검출되었고, 표면의 큰 부분은 최근에 치명적인 수준의 방사성 코발트로 염이 되어 있습니다. 유일한 가능한 설명은 이 [From.GetPlanetMoon]의 주민들이 의도적으로 자신의 고향의 하늘과 표면을 독살했다는 것입니다.\n\n흩어진 잔해와 에너지 무기 사용의 잔여 입자 증거는 이 세계 주위 궤도에서 전투가 있었음을 암시합니다. 아마도 이 사람들이 맞설 수 없는 외계의 위협이 있었던 것일 수 있습니다. 그들의 반응은 이 세계의 지질학적 역사에 핵융합 장치의 폭발과 일치하는 일련의 분화구로 영원히 기록될 수 있으며, 이는 주민들의 주요 그림 문자에서 두 개의 기호를 형성합니다. 지름 수백 킬로미터에 달하는 이 기호는 독설처럼 보이며, 독자를 자신과 교미하라고 초대합니다."
 mem_poisoned_world.101.a:0 "기묘하군."
 mem_poisoned_world.200.name:0 "벌집"
 mem_poisoned_world.200.desc:0 "건물처럼 생긴 구조물들이 사실은 비행 생물체가 거주하는 거대한 '벌집. 입이 여러 개 달린 이 흉물스러운 괴물들이 조사를 위해 하강하는 [This.GetName]에 달려들어 선체를 손쉽게 뜯어버리기 시작했습니다. 다행히 함선이 최소의 피해를 보고 탈출에 성공했지만, 이 위험한 토착 생물들의 존재 때문에 추가 조사는 불가능해 보입니다."
 mem_poisoned_world.200.a:0 "무섭군. 다시는 내려가지 말자."
 mem_poisoned_world.200.a.tooltip:0 "[This.GetName]이(가) 약한 피해를 입습니다."
