l_korean:
 mem_ark_object:0 "고대 정거장"
 mem_ark.2.name:0 "공간 이상현상"
 mem_ark.2.desc:0 "원주율 문명과 함께 있는 §Y[mem_ark_the_planet.GetName]§! 에 대해 우리의 관심을 끌고 있는 다른 무언가가 있습니다. \n\n우주 정거장이 행성을 공전하고 있으며, 이는 원주율이 가진 어떤 기술보다도 고급이지만 외계 지능에 의해 건설되기에는 너무나 원시적입니다."
 mem_ark.2.a:0 "흥미롭군."
 mem_ark.2.a.tooltip:0 "행성 위에 §S관측소§!를 건설하거나 행성을 정복해 더 알아내세요."
 mem_ark.4.name:0 "다른 무언가"
 mem_ark.4.desc:0 "우리는 §Y[mem_ark_the_planet.GetName]§!를 꽤 오랫동안 관찰해왔으며, 원주민들이 우주 정거장을 건설하거나 발사할 수단이 없다는 것을 확인했습니다. \n\n다른 누군가가 그들의 세계 위에 그것을 건설했음에 틀림없습니다."
 mem_ark.4.a:0 "뭔가 더 조사해봐야겠군."
 mem_ark.5.desc:0 "우리 식민지 개척자들이 §Y[mem_ark_the_planet.GetName]§!의 궤도에서 [mem_ark_the_planet.GetPlanetMoon] 위에 원시 우주 정거장이 존재한다는 것을 확인했습니다. \n\n[mem_ark_grounders.GetNamePlural]는 이러한 구조물을 건설할 수단이 없었으므로, 문제는 - 누가 만들었는가입니다?"
 MEM_ARK_PROJECT:0 "정거장 조사"
 MEM_ARK_PROJECT_DESC:0 "§Y[mem_ark_the_planet.GetName]§! 위에 있는 기지는 분명히 어색하게 보입니다 - 이를 건설할 수 있었던 이들은 분명히 고급 기술이 부족합니다."
 mem_ark.100.name:0 "방주"
 mem_ark.100.desc:0 "[mem_ark_the_planet.GetName] 궤도를 도는 기지는 약 500년 된 것으로 보입니다. \n\n[Root.GetName]의 승무원이 수집한 바에 따르면, 이 행성은 실제로 기지가 건설된 시점에 핵전쟁 또는 유사한 재난을 경험했습니다. 현재 [mem_ark_grounders.GetNamePlural]로 알려진 종은 심각한 변이를 겪은 생존자들의 후손이며, [mem_ark_sky_people.GetNamePlural]이라고 불리는 원래 종의 마지막 생존자들은 궤도에서 피신했습니다. \n\n냉동 캡슐과 다양한 장비로 가득 찬 착륙 포드가 여전히 기지에 부착되어 있으며, 배치를 기다리고 있습니다. 보기에, 이 포드를 발사할 예정이었던 유지 보수 승무원은 보급이 바닥나기 전에 사망하여 표면이 거주 가능하다고 판단되기 전에 사라졌습니다. 이 단계에서 포드를 내려보내는 것 외에 기지에 손을 대려는 시도는 기지를 파괴할 것입니다."
 mem_ark.100.a:0 "탈출포드를 발사하라."
 mem_ark.100.a.tooltip:0 "아래 행성에 [mem_ark_sky_people.GetName] £pop£ 인구가 추가됩니다."
 mem_ark.100.a.delayed:0 "우리가 공간이 생기면 포드를 발사해야 합니다."
 mem_ark.100.a.delayed.tooltip:0 "행성 법령이 §Y[mem_ark_the_planet.GetName]§!에 추가되어 새로운 £pop£ 팝을 수용할 수 있는 여유 주택이 생기면 포드를 해제합니다."
 mem_ark.100.b:0 "아무것도 만지지 않는 것이 좋겠다."
 mem_ark.100.c:0 "모두 중지시켜버리고 정거장을 연구하라."
 mem_ark.100.d:0 "탈출 포드와 정거장을 폐기하라."
 mem_ark.102.name:0 "[mem_ark_the_planet.GetName]: 지식은 힘입니다"
 mem_ark.102.desc:0 "표면의 §Y[mem_ark_the_planet.GetName]§!에서 [mem_ark_grounders.GetAdj] 원주민과 [mem_ark_sky_people.GetAdj] 신참 사이에 초기 긴장이 있었던 것으로 보이나, 그들은 마침내 지속 가능한 평화를 이룩했습니다. \n\n[mem_ark_sky_people.GetNamePlural]는 다양한 기술 장치로 모두를 매료시켰고, 과학에 관심이 많은 [mem_ark_grounders.GetNamePlural]를 감명시켜 신참들이 그들의 새로운 지도자가 되어줄 것을 요청하게 만들었습니다."
 mem_ark.102.a:0 "현명한 선택이야."
 mem_ark.102.b:0 "조금 우려스럽군."
 mem_ark.103.name:0 "[mem_ark_the_planet.GetName]: 우수한 화력"
 mem_ark.103.desc:0 "§Y[mem_ark_the_planet.GetName]§!의 표면에서 [mem_ark_grounders.GetAdj] 원주민과 [mem_ark_sky_people.GetAdj] 신참 사이에 초기 긴장이 있었습니다. 갈등은 전면전으로 번졌습니다. \n\n하지만 [mem_ark_grounders.GetAdj] 전사가 얼마나 많은 수로 참호에 자리 잡은 신참의 위치를 공격하더라도, [mem_ark_sky_people.GetNamePlural]이 가져온 자동 화기에 맞설 수 없었습니다. 결국, 원주민은 침략자에게 모든 권력을 넘길 수밖에 없었습니다."
 mem_ark.103.a:0 "좋은 구경거리야."
 mem_ark.103.b:0 "저들은 언젠가 위협이 될지도 모른다..."
 mem_ark.103.c:0 "정말 그렇게까지 할 필요가 있었나?"
 mem_ark.104.name:0 "[mem_ark_the_planet.GetName]: 평화와 조화"
 mem_ark.104.desc:0 "[mem_ark_sky_people.GetNamePlural]는 §Y[mem_ark_the_planet.GetName]§! 표면의 [mem_ark_grounders.GetAdj] 사회에 통합하는 데 큰 어려움이 없었습니다. \n\n그들 대부분은 [mem_ark_grounders.GetNamePlural]이 발전시킨 단순하고 평화로운 삶의 방식에 매료된 것처럼 보이며, 자신들의 문명을 파괴한 기술 수준으로 돌아가고 싶어하지 않습니다."
 mem_ark.104.a:0 "잘된 일이군."
 mem_ark.104.b:0 "걱정거리가 하나 줄었군."
 mem_ark.104.c:0 "하. 멍청한 놈들이군."
 mem_ark.105.name:0 "[mem_ark_the_planet.GetName]: 하늘의 신들"
 mem_ark.105.desc:0 "[mem_ark_sky_people.GetNamePlural]는 꽤 운이 좋았던 것 같습니다. [mem_ark_grounders.GetAdj] 문화는 [mem_ark_sky_people.GetAdj] 종의 변이 이전 이미지를 특징으로 하며, 이는 잃어버린 천국에 거주했던 신성한 존재나 성인으로 두드러지게 나타납니다. \n\n이제 [mem_ark_grounders.GetNamePlural]가 이러한 존재를 직접 만났을 때, 대부분은 그들에게 충성을 맹세하며 그들을 돌아온 신이라고 부릅니다. 대부분의 [mem_ark_sky_people.GetNamePlural]는 이러한 발전에 꽤 편안해 보입니다."
 mem_ark.105.a:0 "이게 무슨 이단인가?!"
 mem_ark.105.b:0 "전부 다 머저리군."
 mem_ark.105.c:0 "우리가 그들을 판단할 자격은 없지."
 mem_ark_just_landed:0 "방금 착륙한"
 mem_ark_background_radiation:0 "오염된"
 mem_ark_background_radiation_desc:0 "이 행성의 방사능 수치는 생존할 수 없을 정도는 아니지만, 삶이 매우 고달파지기엔 충분합니다."
 mem_ark_station_in_orbit:0 "궤도의 정거장"
 mem_ark_station_in_orbit_desc:0 "이 행성에는 설명하기 어려운 우주 정거장이 궤도를 돌고 있습니다."
 decision_mem_ark_release_pods:0 "포드 발사"
 decision_mem_ark_release_pods_desc:0 "궤도 기지에서 발사된 포드가 행성에 정착할 것입니다."
 mem_ark_need_tile:0 "이 행성에는 주거가 더 필요합니다."
 mem_ark_edict_tooltip:0 "행성에 [mem_ark_sky_people.GetName] £pop£ 인구가 추가됩니다."
