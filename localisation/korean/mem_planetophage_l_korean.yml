l_korean:
 MEM_PLANET_EATER_CRACKER:0 "행성 소비자"
 MEM_PLANET_EATER_CRACKER_ACTION:0 "섭취 행성"
 FLEETORDER_DESTROY_PLANET_WITH_MEM_PLANET_EATER_CRACKER:0 "섭취 행성"
 NAME_MEM_planetophage:0 "강철 턱 MKI"
 mem_planetophage_ateplanet_counter:0 "먹은 물린 수"
 mem_planetophage_disabled_powergrid:0 "비활성화된 전력망"
 mem_planetophage_debris:0 "잔해 껍질"
 MEM_PLANETOPHAGE_RESTORE:0 "강철 턱 복원"
 MEM_PLANETOPHAGE_RESTORE_DESC:0 "이 행성 크기의 함선은 전체 행성을 삼켜 원자재로 변환하여 제작자의 편의에 따라 사용할 수 있도록 만들어졌습니다. 그러나 알 수 없는 이유로, 이 함선은 행성의 자원을 사용하여 스스로 무장했습니다. 우리는 원래의 목적에 따라 이를 복원하고 자원을 우리에게 사용할 수 있도록 해야 합니다."
 mem_planetophage_ship_buff:0 "버프"
 mem_planetophage_crust:0 "강철 턱의 구체"
 mem_planetophage_crust_desc_short:0 "강철 턱의 조각상으로, 승리한 전투의 일원인 재능아 군인이 만든 것입니다."
 mem_planetophage_crust_desc_details:0 "창조자는 전투가 그의 깊은 내면에서 영감을 불러일으켰다고 말하며, 그것을 작은 기념물로 표현하고 싶어 했습니다. 조각상 자체는 원래의 파편으로 적절하게 만들어졌습니다."
 mem_planetophage_category:0 "달의 어두운 면"
 mem_planetophage_category_desc:0 "이 [solar_system.GetName] 성계는 이전 데이터에서 제시된 것보다 행성체가 적고 활동의 흔적이 없는 황폐한 상태로 보입니다. 부서진 에큐모노폴리스를 공전하는 달 [from.GetName]만이 예외입니다. 희미한 에너지 신호가 그 지하에서 추적될 수 있습니다. 이 부서진 행성은 여러 다른 행성에서 유래한 잔해의 "껍질"로 덮여 있습니다. 생명체의 흔적은 발견되지 않았지만, 추가 조사를 통해 이 행성이 어떻게 그리고 왜 이러한 화려한 확장을 가지고 있는지 밝혀질 수 있습니다."
 mem_planetophage.1.name:0 "산업 기계"
 mem_planetophage.1.desc:0 "[from.GetName]의 파괴된 지각 아래에서 우리의 [Owner.GetScientistPlural]은 접근 가능한 구역을 기준으로 방대한 산업 단지에 속하는 것으로 보이는 전선, 케이블 및 기타 기계 장비를 발견했습니다. 일부 구획은 명백히 원자재 추출에 전념하고 있었으며, 다른 구획은 서버와 고급 회로로 가득 차 있었습니다. 언급된 것들은 모두 활성화되어 작동 중이 아니었다는 점이 주목되었습니다. 희미한 에너지 신호는 여전히 존재하지만, 더 깊은 곳에 있습니다. 전문 장비와 중장비 없이는 우리의 [Owner.GetScientistPlural]가 그곳에 도달할 수 없습니다."
 mem_planetophage.1.a:0 "건설 함선을 보내십시오."
 mem_planetophage.1.b:0 "이건 가치가 없습니다."
 MEM_PLANETOPHAGE_REACTIVATE:0 "더 깊이 파기"
 MEM_PLANETOPHAGE_REACTIVATE_DESC:0 "이 세계의 표면 아래에서 미세한 에너지 신호가 방출되고 있습니다. 이를 탐사하면 이 장소의 신비를 이해하는 데 더 가까워질 수 있습니다."
 mem_planetophage.2.name:0 "그건 달이 아닙니다"
 mem_planetophage.2.desc:0 "우리의 [Owner.GetScientistPlural]가 여기로 이끈 에너지 신호의 출처에 도달한 후, 우리는 이 세계의 진정한 본질을 인식하게 되었습니다. 우리의 초기 평가와는 달리, 이것은 산업 용도로 사용되는 위성이 아닙니다. 더 구체적으로 말하자면, 이것이 과연 위성인지, 아니면 거대한 우주 정거장에 대해 이야기하는 것이 더 정확한지조차 명확하지 않습니다. 기계와 그 주변의 암석 사이의 경계는 분명히 정의될 수 없습니다.\n\n에너지 신호는 복합체의 에너지 네트워크의 제어 지점으로 확인되었습니다. 초기 관측 결과, 이 시설은 의도적으로 정지되었으며 지속적인 손상으로 인해 작동을 멈춘 것이 아닙니다. 우리는 데이터 저장소에 잠재적으로 저장된 정보에 접근하기 위해 제한된 영역을 재활성화하려고 시도할 수 있습니다."
 mem_planetophage.2.a:0 "켜세요."
 mem_planetophage.2.a.tt:0 "§R확실하신가요?§!"
 mem_planetophage.2.b:0 "그냥 두세요."
 mem_planetophage.5.name:0 "그것은 우주 정거장이 아닙니다."
 mem_planetophage.5.desc:0 "막 에너지 공급을 재가동한 지 몇 분도 지나지 않아, 전체 위성이 점점 더 강한 진동을 일으키기 시작했습니다. 제한된 지역만 활성화하려는 우리의 의도가 실패로 돌아왔다는 것이 빠르게 명확해졌습니다. 섹션마다 연속적으로 재가동되었습니다. 우리의 과학자들이 무슨 일이 일어나고 있는지 이해했을 때, 그들의 실수를 수정하기에는 이미 너무 늦었습니다. 불안정한 외부 지각으로 인한 붕괴의 희생자가 되지 않기 위해, 그들은 철수할 수밖에 없었습니다.\n\n그들의 함선의 안전한 곳에서, 그들은 생명을 얻는 세계를 계속 관찰했습니다. 다음 충격은 이 거대한 기계가 정거장이 아니라 이미 이전 궤도를 떠나기 시작한 선박이라는 사실을 깨달았을 때였습니다. 모든 가용 정보를 종합해 볼 때, 이 기계가 이 시스템의 파괴에 책임이 있을 가능성이 매우 높습니다. 그리고 이제 우리는 덕분에 다시 활성화되었습니다..."
 mem_planetophage.110.name:0 "행성 재활용기"
 mem_planetophage.110.descbase:0 "거대한 물체가 우리의 공간에 들어왔습니다. 접근하는 동안 여러 차례 통신을 시도했지만 응답은 없었습니다. 우리의 전방 관측자들은 이 물체를 의식적으로 이동할 수 있는 유랑 행성으로 묘사합니다. 이 물체는 심우주에서 온 것이 아니라 하이퍼스페이스 침입점을 통해 우리의 시스템에 들어왔습니다. 이 물체 자체는 우주선보다는 우주 정거장이나 심지어 행성과 더 많은 유사성을 가지고 있습니다. 그러나 그것이 암시하는 바는 그렇습니다. 짧은 정지 후, 우리의 시스템에 대한 데이터를 수집하는 것으로 보이며, 인근 행성을 향해 항로를 설정했습니다."
 mem_planetophage.110.desc.angry:0 "$mem_planetophage.110.descbase$이 외교에 관심이 없는 것처럼 보이며, 이미 가까이 다가온 함선을 파괴했습니다."
 mem_planetophage.110.desc.neutral:0 "$mem_planetophage.110.descbase$비록 어떤 함대를 공격적으로 추적하는 것처럼 보이지 않더라도, 일부 탐사선이 증명하듯이 가까운 영역에 들어오는 물체에 대해서는 여전히 스스로를 방어할 것입니다."
 mem_planetophage.200.name:0 "잃어버린 식욕"
 mem_planetophage.200.desc:0 "The bigger they are, the harder they fall and the §Y강철 턱§!는 분명히 가장 큰 것 중 하나였습니다. 그러나 끊임없이 배고픈 기계는 우리 함대가 제공할 수 있는 모든 것을 동원한 포화 공격을 경험한 후 행성에 대한 식욕을 잃은 것 같습니다. 우리는 이 괴물을 완전히 처치할 수는 없었지만, 마치 패배를 인정하듯 스스로 정지한 것 같습니다.\n\n우리의 공학자 중 일부는 이를 재프로그래밍하여 우리의 대의에 동원할 것을 제안하는 반면, 다른 이들은 보다 윤리적인 접근 방식을 요구하고 있습니다."
 mem_planetophage.200.a:0 "수리하고 재프로그래밍하세요!"
 mem_planetophage.200.b:0 "행성은 행성입니다..."
 mem_planetophage.200.b.tt:0 "§L잔해가 기계 세계가 됩니다§!"
 mem_planetophage.200.c:0 "재활용하고 연구하세요!"
 mem_planetophage.210.name:0 "무한한 기계"
 mem_planetophage.210.desc:0 "우리 기술자와 공학자들이 작업을 마치고 §Y강철 턱§!을(를) 다시 작동하게 만들었습니다. 그들은 기계의 핵심 시스템 깊숙한 곳에서 조작의 흔적을 발견했습니다. 누군가가 이 괴물의 의사결정을 조작하려 했던 이유에 대해서는 추측할 수밖에 없지만, 이는 제작자들의 불행한 결말을 설명합니다. 우리 기술자들이 핵심 시스템을 원래 상태로 복원한 후, 그들은 강철 턱에 대한 부분적인 제어권을 얻었습니다. 논리 큐에 대한 소규모 개선도 이루어져, 더 이상 어떤 가치 있는 행성을 목표로 삼지 않게 될 것입니다. 대신, 우리는 가장 쓸모없는 행성의 바위를 엄청난 양의 원자재로 바꿀 수 있게 될 것입니다."
 mem_planetophage.210.a.tt:0 "§L강철 턱이 중립이 되어 더 이상 거주 가능한 세계를 목표로 삼지 않습니다.§!"
