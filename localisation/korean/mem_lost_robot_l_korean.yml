l_korean:
 mem_lost_robot.1.name:0 "사라진 로봇"
 mem_lost_robot.1.desc:0 "[Root.GetName]의 위성 채굴 스테이션 관리자가 우리가 보낸 마지막 배송에서 'AL' 모델 로봇이 누락되었다고 보고했습니다.\n\n그들은 그것을 조사하여 위성에서 채광 작업를 시작할 수 있도록 보내달라고 요청합니다."
 mem_lost_robot.1.accept:0 "관리자들이 실수한게 분명해. 배송 목록을 확인해봐라."
 mem_lost_robot.1.deny:0 "로봇 1대 사라진 것뿐이다. 그것 없이 진행해라."
 mem_lost_robot.2.name:0 "사라진 로봇"
 mem_lost_robot.2.desc:0 "비행 명세서와 영수증을 확인한 결과, 마지막 배송에서 실제로 로봇이 누락된 것으로 보입니다.\n\n여기 두 가지 선택지가 있습니다. 하나는 로봇이 달로 보내기 위해 사용된 우주 화물의 어딘가에 남아있을 수 있고, 다른 하나는 로봇이 행성을 떠나지 않았고 여전히 그것을 생산한 공장 어딘가에 있을 수 있습니다."
 mem_lost_robot.2.cargo:0 "우주 화물칸을 확인해라."
 mem_lost_robot.2.factory:0 "공장 창고를 확인해라."
 mem_lost_robot.10.name:0 "비어있는 화물칸"
 mem_lost_robot.10.desc:0 "아쉽게도 로봇은 화물선에 없었습니다. 설상가상으로, 다른 배송에서 화물이 반환될 때까지 기다려야 했기 때문에 검색하는 동안 상당한 시간을 잃었습니다.\n\n우리는 이제 로봇이 화물선에 적재된 적이 없다는 것을 알고 있으므로 공장을 탐색할 수 있습니다."
 mem_lost_robot.10.factory:0 "좋아. 공장을 찾아보자고."
 mem_lost_robot.10.abandon:0 "시간 낭비다. 탐색을 그만두자."
 mem_lost_robot.11.name:0 "비어있는 화물칸"
 mem_lost_robot.11.desc.first:0 "아쉽게도 로봇은 화물선에 없었습니다. 우리는 이제 로봇이 화물선에 적재된 적이 없다는 것을 알고 있으므로 공장을 탐색할 수 있습니다."
 mem_lost_robot.11.desc.second:0 "안타깝게도 로봇도 화물에 없었습니다. 마지막 수단으로, [Root.GetName]의 표면을 수색해보는 것이 좋겠습니다. 만약 로봇이 어떻게든 탈출했다면, 공장 주변에 여전히 있을 수 있습니다."
 mem_lost_robot.11.factory:0 "좋아. 공장을 찾아보자고."
 mem_lost_robot.11.planet:0 "알겠다. 행성을 탐색해라."
 mem_lost_robot.11.abandon:0 "시간 낭비다. 탐색을 그만두자."
 mem_lost_robot.20.name:0 "비어있는 공장"
 mem_lost_robot.20.desc.first:0 "[Root.GetName] 공장에서 많은 시간을 보낸 결과, 로봇이 더 이상 그곳에 존재하지 않는다는 확신을 갖게 되었습니다. 아마도 우주 화물에 잊혀졌을 가능성이 있으니, 그곳을 수색해야 할지도 모릅니다."
 mem_lost_robot.20.desc.second:0 "[Root.GetName] 공장에서 많은 시간을 들여 점검한 결과, 로봇이 더 이상 그곳에 존재하지 않음을 확신할 수 있습니다. 최후의 수단으로, [Root.GetName]의 표면을 수색해보는 것이 좋겠습니다. 만약 로봇이 어떻게든 탈출했다면, 공장 주변에 여전히 있을지도 모릅니다."
 mem_lost_robot.20.cargo:0 "알았다. 화물선을 조사해라."
 mem_lost_robot.20.planet:0 "좋다. 행성을 수색해라."
 mem_lost_robot.20.abandon:0 "자원 낭비다. 수색을 취소해."
 mem_lost_robot.30.name:0 "로봇 회수"
 mem_lost_robot.30.desc.cargo:0 "화물선을 위에서 아래까지 점검한 결과, 화물 구역에서 탈출한 후 청소실에 갇힌 로봇을 드디어 발견했습니다. 우리는 이를 달로 보내기 전에 재프로그래밍을 예약할 것입니다."
 mem_lost_robot.30.desc.factory:0 "거대한 공장을 철저히 수색한 결과, 우리는 로봇이 컨베이어 벨트 아래에 갇혀 있는 것을 발견했습니다. 이 로봇이 어떻게 여기까지 오게 되었는지, 왜 제자리에서 벗어났는지는 알 수 없지만, 우리는 이 로봇을 달로 보내기 전에 재프로그래밍을 예약할 것입니다."
 mem_lost_robot.101.name:0 "비극"
 mem_lost_robot.101.desc:0 "우리는 마침내 로봇을 발견했습니다. 보기에, 그것은 화물선에 실리기 전에 공장에서 도망쳤습니다. 그 후 [Root.GetName]에 숨어 "디신토"라는 이름의 채굴 장비를 만들었습니다. 이는 원래 달에서 만들어야 했던 것입니다.\n\n불행히도, 활성화되자마자 그것은 거대한 분화를 일으켜 광범위한 파괴를 초래하고 주변 지역의 대부분 인구를 즉시 죽였습니다. 분화구의 크기로 판단할 때, 로봇은 초기 디신토의 설계를 개선하여 그러한 힘을 발휘할 수 있게 만든 것 같습니다. 디신토는 활성화 과정에서 파괴되었고, 로봇 자체는 충격파를 견뎌냈지만 그 과정에서 기억을 잃어버려 이 개선된 채굴 장치의 계획을 회수할 수 없습니다."
 mem_lost_robot.101.a:0 "비극이로군."
 mem_lost_robot_101.tooltip:0 "거대한 분화구가 행성의 표면에 생성되어 주변의 모든 인구를 죽이고 우리 시설을 파괴했습니다."
 mem_lost_robot.102.name:0 "의미없는 수색"
 mem_lost_robot.102.desc.luck:0 "[Root.GetName]의 지역 주민들이 야생에서 홀로 있는 로봇을 발견했다고 보고했습니다. 보고에 따라 우리는 산림 개간에서 사라졌던 'AL' 모델을 발견했습니다. 그것은 완전히 정신을 잃었고 분명히 행성 표면에 큰 분화구를 만들 수 있는 디신토라는 광산 장치를 만들려고 했습니다. 다행히도 제시간에 도착하여 활성화되지 않아 재난을 피할 수 있었습니다."
 mem_lost_robot.102.desc:0 "광범위한 탐색 끝에 우리는 마침내 로봇을 발견했습니다. 그것은 본래 달이 아닌 행성에서 '디신토'라는 광산 장비를 만들려고 했던 고장난 유닛이었습니다. 만약 작동했다면, 이 장치는 행성 표면에 큰 분화구를 만들었을 것입니다. 다행히도, 이 장치는 그 제작자만큼이나 고장 나 있었기에 우리는 잠재적인 비극을 피할 수 있었습니다."
 mem_lost_robot.102.a:0 "재료를 수집해라."
 mem_lost_robot.103.name:0 "운좋은 발견"
 mem_lost_robot.103.desc.luck:0 "[Root.GetName]에 있는 주민들이 외딴 곳에서 외로운 로봇을 발견했다고 보고했습니다. 보고를 따라 우리는 숲의 공터에서 실종된 'AL' 모델을 찾았습니다. 또한 로봇이 제작 중인 [Root.GetName]의 달에서 사용되는 채굴 장치인 디신토도 발견했습니다.\n\n자세히 조사해본 결과, 로봇이 디신토의 설계를 우리가 상상할 수 없을 정도로 개선한 것으로 보입니다. 초기 추정에 따르면 이 새로운 설계를 사용하면 광물 생산을 상당히 증가시킬 수 있을 것으로 보입니다."
 mem_lost_robot.103.desc:0 "광범위한 탐색 끝에 우리는 마침내 로봇을 발견했습니다. 우리는 또한 [Root.GetName]의 달에서 로봇이 제작하고 있던 채굴 장치인 디신토를 발견했습니다.\n\n자세히 조사해본 결과, 로봇이 디신토의 설계를 우리가 상상할 수 없을 정도로 개선한 것으로 보입니다. 초기 추정에 따르면 이 새로운 설계를 사용하면 우리의 광물 생산을 상당히 증가시킬 수 있을 것으로 보입니다."
 mem_lost_robot.103.a:0 "정말 유용하겠군."
 mem_lost_robot_enhanced_mining:0 "향샹된 채굴"
 mem_lost_robot_enhanced_mining_desc:0 "개선된 디신토를 사용하여 광물 생산량이 증가했습니다."
 d_mem_lost_robot_crater:0 "디신토 분화구"
 d_mem_lost_robot_crater_desc:0 "디신토가 활성화된 후 거대한 분화구와 광범위한 파괴를 남겼습니다."
