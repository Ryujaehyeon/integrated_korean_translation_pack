l_korean:
 mem_satellite_cloud_category:0 "위성군"
 mem_satellite_cloud_category_desc:0 "우리 센서가 항성 §Y[Root.GetName]§! 근처에서 여러 개의 고체 구조물의 존재를 감지했습니다. 추가적인 조사가 필요합니다."
 mem_satellite_cloud.201.name:0 "관찰 실패"
 mem_satellite_cloud.201.desc:0 "과학자 §Y[Root.leader.GetName]§!는 인공 물체가 항성의 코로나 내에 분명히 존재하지만, 항성의 강인한 중력과 전자기 간섭으로 인해 물체를 관측하는 것은 물론 회수하는 것도 완전히 불가능하다고 보고합니다. 이 신비로운 물체들은 아마도 영원히 우리의 손이 닿지 않는 곳에 있을 것입니다."
 mem_satellite_cloud.202.name:0 "회수 실패"
 mem_satellite_cloud.202.desc:0 "과학자 §Y[Root.leader.GetName]§!의 초기 보고서에 따르면, 수백 개의 위성이 항성을 공전하고 있습니다. 그러나 이들에 접근하는 것은 어떤 종류의 근접 센서를 작동시킨 것으로 보이며, 그로 인해 전체 위성 구름이 조종 스러스터를 작동시켜 항성의 코로나로 떨어지게 되었습니다. 위성이 항성 내부의 지옥불에서 어떻게든 살아남을 수 있다 하더라도, 이제 우리는 이들을 회수할 능력이 전혀 없습니다."
 mem_satellite_cloud.301.name:0 "치명적인 관찰 실패"
 mem_satellite_cloud.301.desc:0 "우리 함선은 §Y[From.GetName]§! 주위를 공전하는 고체 구조물을 조사하는 동안, 별의 코로나에 가장 가까운 물체를 회수하려고 시도했습니다. 그러나 그 과정에서 함선이 별에 너무 가까이 접근하여 파괴되었습니다. 이제 이 신비로운 물체들은 영원히 우리의 손이 닿지 않는 곳에 있을 가능성이 높습니다."
 mem_satellite_cloud.302.name:0 "무인 드론들이 깨어나다"
 mem_satellite_cloud.302.desc:0 "§Y[Root.GetName]§!(으)로부터 긴급 신호가 들어왔습니다. 과학선이 조사하던 물체들의 정체는 별의 코로나 내부에 동면 상태로 있던 무인 드론들의 무리였습니다. 우리 선박이 접근하자 재가동을 시작한 이들은 전투 태세에 들어가고 있습니다."
 mem_satellite_cloud.retreat:0 "후퇴하라!"
 mem_satellite_cloud.1.name:0 "설치미술품"
 mem_satellite_cloud.1.desc:0 "각각 독특한 모양과 구조를 가진 수백 개의 프리즘 물체들이, 별빛이 희귀한 스펙트럼 패턴을 내며 통과할 수 있도록 별 주위에 배치되어 있습니다. 프리즘 대부분은 너무 오랜 시간이 지나 정렬이 깨진 것처럼 보이지만, 아직 남아있는 것만으로도 \\"넋을 잃게 만들만큼 아름답습니다.\\"
 mem_satellite_cloud.2.name:0 "솔라리움"
 mem_satellite_cloud.2.desc:0 "우리의 관측 결과, 고급 태양돛을 이용해 §Y[From.GetName]§! 위에 떠 있는 수백 개의 거주지 위성이 발견되었습니다. 이들 각각의 두드러진 특징은 별을 향해 있는 투명한 돔으로, 놀라운 열 내성을 암시합니다. 현재 버려져 있고 겉보기에는 부서져 가고 있는 이 위성들은 안전하게 회수할 수 없습니다. 그러나 우리의 과학자들은 원거리 스캔을 통해 유용한 구조 데이터를 추출할 수 있을 것입니다."
 mem_satellite_cloud.3.name:0 "클라우드 컴퓨팅"
 mem_satellite_cloud.3.desc:0 "철저한 스캔 후, 우리의 과학 팀은 항성을 공전하는 고급 에너지 수집 위성의 방대한 네트워크가 존재한다는 보고를 받았습니다. §Y[Root.leader.GetName]§!에 따르면, 이들은 초강력 섬유 광섬유와 연결되어 있는 것으로 보이며, 그들이 흡수한 에너지는 어떤 계산을 수행하기 위해 사용될 의도였던 것으로 추측됩니다. 비록 이 위성들 자체는 수리 불가능할 정도로 손상되었지만, 우리가 발견한 기술은 고급 계산에 대한 통찰을 제공해 주었습니다."
 mem_satellite_cloud.4.name:0 "관측소"
 mem_satellite_cloud.4.desc:0 "§Y[Root.leader.GetName]§!는 §Y[From.GetName]§! 주위를 공전하는 수백 개의 포물선 안테나가 모두 바깥쪽을 향하고 있다고 보고합니다. 위성 구름이 별에서 방출된 막대한 양의 에너지를 채널링하여 외부로 전송하고 들어오는 신호를 처리한 것으로 보입니다. 현재는 복구할 수 없을 정도로 손상되었지만, 위성 구름은 항성 관측 기술에 대한 귀중한 통찰을 제공했습니다."
 mem_satellite_cloud.5.name:0 "고철 덩어리"
 mem_satellite_cloud.5.desc:0 "별 주위를 도는 거대한 잔해 구름이 있습니다. 한때는 위성 네트워크였던 것으로 보이나, 이제는 별에 가까운 가혹한 환경으로 인해 거의 알아볼 수 없을 정도로 침식되었습니다. 그러나 이 외계 기술의 뒤틀린 잔해조차도 회수하여 우리의 산업에서 스크랩으로 가공할 수 있습니다."
 mem_satellite_cloud.6.name:0 "항성 조작기"
 mem_satellite_cloud.6.desc:0 "수백 개의 태양 전자판이 §Y[From.GetName]§! 별 근처에 있습니다. 그것들은 한때 엄청난 양의 태양 에너지를 어딘가로 보내기 위해서 거대한 에너지 변환기 노드와 연결되어 사용된 것으로 보입니다. 그러나, 현재 상태를 보아 이것들을 안전하게 다시 활성화하거나 복구할 수 없습니다. 그런데도, 살아있는 시스템은 우리에게 진보된 에너지 조작에 대한 귀중한 통찰력을 제공하고 있습니다."
 mem_satellite_cloud.7.name:0 "항성 채집"
 mem_satellite_cloud.7.desc:0 "우리의 관측 결과, 별의 코로나에서 전하를 띤 플라즈마를 흡수하는 수백 개의 고급 기지가 발견되었습니다. 대형 용기에 저장된 이 플라즈마는 아마도 선박에 실려 가공 센터로 전달될 예정이었을 것입니다. 불행히도, 이 기지들은 오랫동안 유지보수가 이루어지지 않은 것으로 보이며, 대부분의 저장 용기는 균열이 생기고 누수가 발생하고 있습니다. 전체 시스템은 안전하게 수리하거나 조작하기에는 너무 불안정합니다. 그러나 쉽게 접근할 수 있는 플라즈마는 우리의 산업에 큰 도움이 될 것입니다."
 mem_satellite_cloud.8.name:0 "파이로보어 식민지"
 mem_satellite_cloud.8.desc:0 "이 미확인 구조물들은 항성을 향한 크고 투명한 돔들로 밝혀졌는데, 이것은 그것들이 온실이나 수경 실험실로 사용된 것으로 추측됩니다. 그들 중 대부분은 부서지고 생명 반응은 잡히지 않지만, 이상하게도, 몇몇 실험실의 생명체는 태양과 가까운 곳에서 발생하는 혹독한 환경에도 불구하고(아니면 혹독한 환경 덕에) 번성하는 것처럼 보입니다. 우주의 극도의 열과 진공에 어떻게든 적응한 원시 유기체의 거대한 집단이 여러 위성의 선체를 덮고 있습니다. 이 유기체들의 표본을 항성으로부터 멀리 옮기는 것은 불가능할 것 같지만, 원격 관찰조차도 그들의 독특한 적응을 연구하는 데 매우 유용할 것입니다."
 mem_satellite_cloud.dissapointing:0 "실망스럽군."
 mem_satellite_cloud.useful:0 "유용하겠어."
