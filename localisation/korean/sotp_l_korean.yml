 FLAG_CATEGORY_halo:0 "할로"
 EMPIRE_DESIGN_UNSC:0 "유엔 우주 사령부"
 EMPIRE_DESIGN_UNSC_desc:0 "UNSC(유엔 우주 사령부)는 통합 지구 정부의 군사, 탐사 및 과학 기관으로 기능했습니다. 원래 군사력으로 위임된 UNSC는 한때 우주 전투를 감독하고 반란을 진압하는 책임을 맡고 있었습니다.\n\n인류가 우주로 퍼져 나가면서 다른 종족을 만나는 것은 불가피했습니다. 이제 멸종의 가능성에 직면한 UNSC는 인류의 주요 정부이자 생존을 위한 최고의 희망이 되었습니다."
 EMPIRE_DESIGN_COV:0 "코드: EMPIRE_DESIGN_COV korean_value: 계약"
 EMPIRE_DESIGN_COV_desc:0 "미공개 제국인 언약은 별들 사이에 퍼져 있는 신성한 제국으로, 여러 세계에서 온 다양한 종족들로 구성되어 있으며, 그들의 선구자 신들과 위대한 여정에 대한 변함없는 믿음으로 굳건히 지켜지고 있습니다. 그들은 또한 신성해지고 선구자들과 함께 신의 경지에 오를 수 있다는 믿음을 가지고 있습니다.\n\n언약은 전쟁을 통해 형성되었으며, 전쟁을 통해 퍼져나가며, 숨겨진 지식과 강력한 선구자 유물을 획득하기 위한 탐구에서 만나는 모든 종족을 소비하거나 파괴합니다."
 START_SCREEN_COV:0 "신의 제국인 계약은 수많은 세계에서 온 다양한 종족들로 구성되어 있으며, 그들의 선구자 신들에 대한 변함없는 믿음으로 굳건히 지켜져 있습니다. 이는 고위 예언자들의 모든 말에 의존하고 있습니다. 계약은 전쟁을 통해 형성되었습니다: 산 슈윰과 상헤일리 종족은 서로 용감하게 싸웠고, 마침내 교착 상태가 간신히 깨졌습니다. 평화가 찾아오면서 두 종족 간의 연합 조약이 체결되어 계약이 형성되었습니다. 시대를 거치며 엘리트들은 신성한 계약의 존경받는 보호자가 되어 반란을 진압하고, 더 많은 종족을 모집하고 노예로 삼으며 결국 계약은 오늘날과 같은 모습이 되었습니다. 엘리트, 그룬트, 재칼, 브루트, 헌터, 공학자, 드론 등 많은 종족들이 제국의 중추가 되었고, 그들의 다양성과 믿음이 계약의 진정한 힘이 되었습니다.\n\n계약이 퍼져나가면서 더 많은 종족이 통합되거나 파괴되었고, 많은 강력한 선구자 유물들이 발굴되었습니다. 계약의 저명한 인물들이 새로운 세계에서 선구자 유물의 보물들을 발견한 많은 항해 중 하나에서 그들은 그곳에 숨겨진 발견이 그들의 신앙 전체를 의심하게 만들 것이라는 것을 전혀 알지 못했습니다. 그것은 그들이 신들에 의해 선택받은 것이 아니라 인류가 선택받았다는 것이었습니다. 예언자들은 제국을 보존하기 위해 무엇이든 할 것이며, 이단자들에 대한 성전이 선포되었고 예언자들은 그들의 무지한 추종자들을 승리와 권력, 그리고 신성한 세계로 이끌 것입니다."
