 frameworld_penrose_fake_tooltip:0 "§Y[this.GetName]§!에 §Y$d_frameworld_penrose$§!를 추가하며, 다음과 같은 효과를 얻습니다:\n    $mod_planet_technician_energy_produces_add_planet$: §G+1§!\n    $mod_planet_technician_minerals_upkeep_add_planet$: §R+1§!"
