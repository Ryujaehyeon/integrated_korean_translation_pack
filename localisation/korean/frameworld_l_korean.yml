 GIGA_FRAMEWORLD_MESSAGE_OUTPOST_POPS:0 "§Y$PLANET$§!에 건설된 §Y$giga_frameworld_outpost$§!로 인해 £pop£ §Y$SPECIES$ 팝§!이 §Y$FRAME$§!에 이동되었습니다."
 GIGA_FRAMEWORLD_MESSAGE_OUTPOST_POPS_PLURAL:0 "§Y$PLANET$§!에 건설된 §Y$giga_frameworld_outpost$§!로 인해 $COUNT$ £pop£ §Y$SPECIES$ 팝§!이 §Y$FRAME$§!에 이동되었습니다."
 giga_frameworld_docs_note:0 "\n\n§Y기원 문서는 상황기록에서 확인할 수 있습니다.§!"
 giga_frameworld_docs_chain_title:0 "$pc_giga_frameworld$ 문서"
 giga_frameworld_docs_chain_desc:0 "§Y$pc_giga_frameworld$§! 기원은 하나의 수도 행성에 집중하는 \"단일 행성\" 플레이입니다. 개척선을 건설할 수 없으며, 수도가 함락되면 패배합니다. 건물 슬롯은 제한되어 있지만, 지구를 무한히 확장할 수 있습니다.\n\n이 메뉴의 하위 범주에서 추가적인 세부사항을 확인하세요."
 giga_frameworld_docs_expansion:0 "1. 확장"
 giga_frameworld_docs_expansion_desc:0 "추가 구역은 §Y행성 결정§! 및 §Y소행성 수확§!을 통해 추가할 수 있습니다. 각 확장은 사용된 방법에 관계없이 §Y$pc_giga_frameworld$§!에 여러 점진적 보너스를 추가합니다. 모든 확장 보너스는 §Y행성 특성§! 메뉴에서 확인할 수 있습니다.\n확장 결정은 세 가지 종류가 있습니다:\n\n- §T$giga_frameworld_expand$§!: 비용은 £alloys£ $alloys$이며, 시행할 때마다 비용이 증가합니다. 또한 두 번 사용될 때마다 §Y건물 슬롯§!을 제공합니다. £mod_megastructures_cost_mult£ §Y$mod_megastructures_cost_mult$§!의 영향을 받습니다.\n- §T$giga_frameworld_reorganise$§!: 많은 양의 £influence£ $influence$를 소모하며 여러 일반 행동을 가속화합니다.\n- §T$giga_frameworld_expand_mass$§!: 비용은 £giga_sr_bulk_matter£ $giga_sr_bulk_matter$이며, 사용 시마다 §Y$mod_district_giga_frameworld_mining_max$§!에 1을 추가합니다."
 giga_frameworld_docs_asteroids:0 "2. 소행성 채굴"
 giga_frameworld_docs_asteroids_desc:0 "§Y$frameworld_harvest_0$§! 거대 구조물로 소행성을 채굴함으로써 §Y$pc_giga_frameworld$§!을 확장할 수 있습니다. 채굴된 소행성 하나 당 하나의 지구가 추가되며, 다양한 보너스가 주어지고, 채굴 4회마다 §Y$mod_district_giga_frameworld_mining_max$§!가 1 추가됩니다. 채굴 비용은 £mod_planet_clear_blocker_cost_mult£ §Y$MOD_COUNTRY_CLEAR_BLOCKER_COST_MULT$§!의 영향을 받습니다.\n\n확장하는데 소행성 채굴을 주로 사용해야할 것입니다. 채굴 가능한 소행성이 있는 성계가 은하지도에 표시될 것입니다:\n\n\"$frameworld_has_harvestable_asteroid$\": 자원 매장층이 없는 소행성을 표시합니다. 채굴에 적합합니다.\n\"$frameworld_has_harvestable_asteroid_2$\": 자원 매장층이 남아있는 소행성만 표시합니다. 채굴이 느려집니다.\n\"$frameworld_has_harvestable_asteroid_3$\": 전략적 자원 매장층이 남아있는 소행성만 표시합니다. 채굴 적합성은 떨어집니다."
 giga_frameworld_docs_outposts:0 "3. $giga_frameworld_outpost_plural$"
 giga_frameworld_docs_outposts_desc:0 "거주가능한 행성에는 식민지 대신, §Y$giga_frameworld_outpost_plural$§!를 건설할 수 있습니다. 이는 여러가지 보너스를 제공하며, £mod_planet_pop_assembly_reduction£ §Y팝 조립§! 속도를 크게 높여줍니다. 전초 기지 자원 생산량은 대상 행성의 특징과 유형에 따라 달라지며, 고급 행성 유형에는 특별한 전추기지를 건설할 수 있습니다. 가능한 한 많이 건설해야 합니다."
 giga_frameworld_docs_districts:0 "4. 지구"
 giga_frameworld_docs_districts_desc:0 "기술 연구를 통해 §Y정제소§!와 §Y2 단계 건물§!과 동등한 추가 지구 유형과 해당하는 건물이 잠금 해제됩니다.\n\n£society£ §Y$tech_paradise_dome$§!을 연구하는 것은 §Y$civic_machine_servitor$§! 제국에게 특히나 중요합니다. §Y$building_organic_sanctuary$§! 건설을 위한 공간이 제한되어 있기 때문입니다."
 giga_frameworld_docs_conquest:0 "5. 정복"
 giga_frameworld_docs_conquest_desc:0 "정복된 행성의 팝들은 §Y매월 4 팝§!씩 §Y$pc_giga_frameworld$§!으로 재정착될 것입니다. 모든 팝이 재정착되면, §Y$giga_frameworld_outpost$§!가 자동적으로 생성될 것입니다.\n\n§Y$pc_giga_frameworld$§! 제국에게 정복당한 행성의 §Y$giga_frameworld_outpost_plural$§!가 파괴된다면, 성계를 재정복해여 수리할 수 있습니다."
 giga_frameworld_docs_stations:0 "6. 방어 기지"
 giga_frameworld_docs_stations_desc:0 "§Y$pc_giga_frameworld$§! 주변에는 수많은 방어 기지가 있으며, §Y항성 기지 기술§! 수준에 따라 점점 강력해집니다. 방어 기지가 파괴된다면, 행성 결정을 통해 수리할 수 있습니다.\n\n§Y$giga_frameworld_maginot$§! 업그레이드 결정을 완료하면 방어 기지가 3개 추가됩니다."
 giga_frameworld_docs_disabled:0 "7. 비활성화된 컨텐츠"
 giga_frameworld_docs_disabled_desc:0 "§Y$pc_giga_frameworld$§! 제국은 거주 가능한 거대 구조물과 그와 관련된 기술을 §Y사용할 수 없습니다§!. §E게임의 한계로 인해, 기술 목록에는 사용 불가능한 거대 구조물 기술이 표시될 것입니다.§!\n\n$giga_fwm$ 거대 구조물 잠김\n$giga_fwa$ 승격 특전 잠김\n$giga_fwt$ 기술 잠김\n\n$name_alderson$ $giga_fwm$$giga_fwa$\n$name_ringworld_behemoth$ $giga_fwm$\n$name_birch$ $giga_fwm$$giga_fwa$\n$name_eq_shipyard$ $giga_fwm$\n$name_ringworld_gargan$ $giga_fwm$\n$habitat_0$ $giga_fwm$\n$name_interstellar_hab$ $giga_fwm$$giga_fwt$\n$name_interstellar_ring$ $giga_fwm$$giga_fwt$\n$name_discomoon$ $giga_fwm$$giga_fwt$\n$name_maginot$ $giga_fwm$\n$pc_virtual_reality$ $giga_fwm$$giga_fwt$\n$name_orbital_arcology$ $giga_fwm$\n$name_orb_elysium$ $giga_fwm$$giga_fwt$\n$name_penrose_ring$ $giga_fwm$$giga_fwt$\n$pc_ringworld_habitable$ $giga_fwm$\n$name_upgrade_ringworld$ $giga_fwm$\n$name_ringworld_titanic$ $giga_fwm$"
 giga_fwt:0 "£job_researcher£"
 giga_fwa:0 "£mod_country_ascension_perks_add£"
 giga_fwm:0 "£ehof_mega£"
 giga_frameworld_docs_bonuses:0 "8. 기원 보너스"
 giga_frameworld_docs_bonuses_desc:0 "거주가능한 거대 구조물과 다른 장치들과 관련된 기술과 승격 특전은 §Y$pc_giga_frameworld$§! 제국의 단일 행성 플레이에 부적합합니다. 대신에 이러한 기술과 승격 특전은 §Y대체 보너스§!를 제공합니다. §E게임의 한계로 인해, 어떤 기술의 보너스는 보이지 않습니다.§!\n\n$giga_fwa$ §Y$ap_voidborn$§!: $giga_fw_exe$\n$giga_fwa$ §Y$ap_machine_worlds$§!: §W$giga_frameworld_advanced_city$§! 결정\n$giga_fwa$ §Y$ap_arcology_project$§!: §W$giga_frameworld_advanced_sanctuary$§! decision for §Y$civic_machine_servitor$§! 제국\n$giga_fwa$ §Y$ap_world_shaper$§!: §W$giga_frameworld_gaia$§! 결정\n\n£engineering_research£ §Y$tech_habitat_1$§!: $giga_fw_exe$ 및 §W$frameworld_salvage_habitat_0$§! 거대 프로젝트\n£engineering_research£ §Y$tech_habitat_2$§!: $giga_fw_exc$\n£engineering_research£ §Y$tech_habitat_3$§!: $giga_fw_exc$\n£engineering_research£ §Y$giga_tech_equatorial_shipyard$§!: §W$giga_frameworld_advanced_industrial$§! 결정\n£engineering_research£ §Y$giga_tech_orbital_arcologies$§!: §W$giga_frameworld_expand_infrastructure$§! 결정\n£engineering_research£ §Y$tech_ring_world$§!: $giga_fw_exe$\n£engineering_research£ §Y$giga_tech_ringworld_titanic_2$§!: §W$giga_frameworld_reorganise$§! 비용 감소\n£engineering_research£ §Y$giga_tech_ringworld_behemoth$§!: 대규모 확장 결정\n£engineering_research£ §Y$giga_tech_ringworld_gargantuan_2$§!: §W$giga_frameworld_expand_infrastructure$§! 결정 (두 번째 사용)\n£society_research£ §Y$giga_tech_maginot_world$§!: §W$giga_frameworld_maginot$§! 결정\n£society_research£ §Y$giga_tech_planetary_computer$§!: §W$giga_frameworld_computing_complex$§! 결정"
