 giga_biotrophy_scaling:0 "$job_bio_trophy$ 스케일링"
 giga_biotrophy_scaling_fluff:0 "특정 지점을 넘어서면, 유기체들을 돌보는 것의 이점은 그들의 늘어난 인구에 따른 수송 문제로 인해 상쇄됩니다."
 giga_biotrophy_scaling_desc:0 "§W이 거대 구조물을 통해 일반적인 행성보다 더 많은 £job_bio_trophy£ §Y$job_bio_trophy_plural$§!를 수용할 수 있으며. 트로피의 수가 많아질 때 발생하는 §Y$mod_planet_jobs_complex_drone_produces_mult$§! 변동을 줄여줍니다.\n\n더 많은 £job_bio_trophy£ §Y$job_bio_trophy_plural$§!는 언제나 좋은 것이지만, 팝이 §Y150§!에 달하면 새로운 팝의 효율성이 §Y50%§!에서 §Y20%§!까지 감소하게 됩니다.\n\n$job_bio_trophy$ 팝: §Y[Root.giga_biotrophy_count]§!\n기본 보너스: §G+[Root.giga_biotrophy_count]%§!\n조정된 보너스: §G+[Root.giga_biotrophy_adjusted]%§!\n효율: §Y[Root.giga_biotrophy_efficiency]%§!§!\n§W--------------§!\n$giga_biotrophy_scaling_fluff$"
 d_giga_biotrophy_scaling:0 "$giga_biotrophy_scaling$"
 d_giga_biotrophy_scaling_desc:0 "§W자세한 내용은 같은 이름의 행성 보정치를 참조하십시오.§!\n\n$giga_biotrophy_scaling_fluff$"
 frameworld_blank:0 ""
