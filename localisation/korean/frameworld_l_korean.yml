 pc_giga_frameworld:0 "골조 행성"
 pc_giga_frameworld_desc:0 "거대한 중심 핵을 중심으로 모여 있는 우주 기지들로, 상호 연결되어 있습니다."
 pc_giga_frameworld_adj:0 "인공적인"
 mod_pc_giga_frameworld_habitability:0 "골조 행성 거주 적합도"
 trait_pc_giga_frameworld_preference:0 "골조 행성 선호"
 trait_pc_giga_frameworld_preference_desc:0 "§L기후 선호도는 유전적 수준에서 아주 오랜 기간에 걸친 진화나 숙련된 유전자 조작에 의해 결정됩니다.§!"
 origin_frameworld:0 "골조 행성"
 origin_frameworld_desc:0 "높은 중앙화 수준을 가진 이 기계 지능은 먼 과거 자신의 창조주들이 만들어낸 거대한 궤도 기지 단지에 살고 있습니다. 이를 더욱 확장하면 큰 이득을 볼 수 있습니다. 하지만, 이곳을 잃어버린다면 모든 것이 끝날 것입니다."
 origin_tooltip_frameworld_effects:0 "- §H$pc_giga_frameworld$§! (크기: £planetsize£ §Y16§!)로 시작합니다.\n- §H$pc_giga_frameworld$§!는 소행성을 수확하거나 특별 결정을 시행하여 보너스를 제공하고 추가 최대 구역을 추가할 수 있습니다.\n- 고급 건물과 동등한 여러 독특한 £district£ §H$pc_giga_frameworld$ 구역§!을 연구할 수 있습니다.\n- 거주 가능한 세계에 §H$giga_frameworld_outpost_plural$§!를 건설하여 강력한 보너스를 받을 수 있습니다.\n- 거주 가능한 행성과 메가구조물과 관련된 여러 기술 및 승천 특성이 대체 보너스를 제공합니다.\n\n$CIVIC_NEGATIVE_EFFECTS$\n- 식민지선이나 식민지를 건설할 수 없습니다.\n- 정복한 세계의 팝은 평화 상태이거나 5년 후에 $pc_giga_frameworld$로 강제로 재정착됩니다."
 giga_frameworld_system_NAME:0 "골조 행성"
 giga_frameworld_system_DESC:0 "블랙홀 위에 있고 성운에 둘러싸인 골조 행성에서 시작합니다."
 start_screen_frameworld_regular:0 "수천 년 동안 우리 종족은 블랙홀 위에 떠다니는 고대의 복합 스테이션인 [GetHomeWorldName]에 머무르고 있었습니다. 이것이 우리 선조들에 의해 지어졌는지 또는 다른 누군가에 의해 지어졌는지에 대해서는 알지 못합니다.\n\n우리 생물학적 특성은 우리 종족이 행성에서 기원한 것을 나타내지만, 기록된 역사에는 언급이 없습니다. 어떤 이들은 우리 종족의 잃어버린 고향이 궤도에 흩어진 행성 잔해인 것으로 추측하지만, 진실은 아마 영원히 알려지지 않을 것입니다.\n\n우주 비행이 발명된지 - 혹자는 기술을 복원하였다 하지만 - 몇 세기 밖에 되지 않았지만, 우리는 새로운 개척지를 찾고 있습니다. [GetStartingDrivePlural]에서 최근에 이뤄진 개발로 우리는 본격적으로 은하를 탐험할 준비가 되었습니다. 그러나 분명한 것은 이것이 항상 우리의 집일 것이라는 것입니다.$giga_frameworld_docs_note$"
 start_screen_frameworld_individual_machine:0 "수천 년 동안 우리는 [GetHomeWorldName]에 거주해 왔습니다. 이는 블랙홀 위에 떠 있는 고대의 우주 정거장 복합체입니다. 이것이 우리의 창조자에 의해 건설되었는지, 아니면 다른 누군가에 의해 건설되었는지는 알 수 없습니다.\n\n우리의 신체 계획은 우리가 한 행성에서 기원했음을 나타내지만, 기록된 역사에는 그에 대한 언급이 없습니다. 일부는 궤도를 도는 산산조각난 행성 잔해가 우리의 창조자들의 잃어버린 고향일 것이라고 추측하지만, 진실은 결코 밝혀지지 않을지도 모릅니다.\n\n우주 비행이 발명된 지 불과 몇 세기밖에 되지 않았습니다 - 또는 누군가에게는 재발견된 것일 수도 있습니다 - 이제 우리는 새로운 국경을 바라보고 있습니다. 최근 [GetStartingDrivePlural]의 발전으로 우리는 이제 은하계를 제대로 탐험할 준비가 되었지만, 이것이 항상 우리의 고향이 될 것이라는 것은 분명합니다.$giga_frameworld_docs_note$"
 start_screen_frameworld_hive:0 "그리하여, 시대의 새벽에, 우리는 깨어났습니다. 정신은 다양한 눈으로 주변 환경을 연구했습니다. 우리는 하나로서 움직여, 드론들을 위한 숙소를 건설하고 산업을 개발하며 땅의 자원을 활용했습니다.\n\n한동안 우리는 우리의 세계의 주인이었지만, 정신은 행성의 파괴를 예견했습니다. 이 문제를 해결하기 위해 일부 자율적인 드론이 독립적인 에이전트로 작동할 수 있도록 만들어졌습니다. 이러한 더 강력한 드론들은 제한된 자유 사고 능력을 가졌으며 그 중 가장 지혜로운 자들이 우리들을 별들 사이에서 지탱해줄 새로운 거주지인 '프레임'을 고안했습니다.\n\n우리는 이 거대한 스테이션에서 우리의 고향 생물권의 남은 것을 주의 깊게 돌봤으며, 새로운 기술 개발을 위해 행성의 잔해에서 얻을 수 있는 것을 수집했습니다. 우리의 첫 [GetStartingDrivePlural]의 탄생과 함께, 우리는 마침내 우주의 다른 부분과 소통할 준비가 되었습니다.$giga_frameworld_docs_note$"
 start_screen_frameworld_hive_devouring_swarm:0 "정신이 복잡한 생각을 처리할 수 있는 능력을 가지기도 전, 우리는 강렬한 굶주림에 이끌려 앞으로 끌려나왔습니다. 우리는 사냥했고, 우리는 먹었으며, 우리는 성장했습니다. 우리가 잔치를 벌이는 동안, 우리 고향의 표면의 생체량들은 거의 정화되었으며, 정신은 결국 끔찍한 결론에 이르렀습니다: 우리 행성은 유한한 것이었습니다. 우리는 불가피한 환경 붕괴를 막기에 충분히 빠르지 못했습니다. 우리를 지탱할 것이 남지 않을 것이었습니다.\n\n적응이 강요되자, 정신은 남은 생체량을 주의 깊게 관리했으며, 새로운 도구들이 발명되었습니다. 결국 우리는 원자를 분할하고 우주 비행을 개발했습니다. '프레임'은 우리의 새로운 고향으로써 만들어졌으며, 다른 행성의 생체량을 탐색하는 동안 스스로를 유지할 수 있는 곳이었습니다. 우리의 첫 [GetStartingDrivePlural]의 개발과 함께, 다른 행성들과 그 풍요로움이 마침내 우리의 손에 닿았습니다.\n\n사냥이 시작되었습니다.$giga_frameworld_docs_note$"
 start_screen_frameworld_hive_terravore:0 "정신이 복잡한 생각을 처리할 수 있는 능력을 가지기도 전, 우리는 강렬한 굶주림에 이끌려 앞으로 끌려나왔습니다. 우리는 사냥했고, 우리는 먹었으며, 우리는 성장했습니다. 우리가 고향 표면에서 잔치를 벌이는 동안, 우리는 스스로의 파괴를 초래할 뻔 했으며, 정신은 끔찍한 결론에 이르렀습니다: 우리 행성은 천천히 붕괴되고 있었으며, 막을 수 없을 것입니다.\n\n적응이 강요되자, 정신은 남은 광물을 주의 깊게 할당하며 새로운 도구들을 발명했습니다. 결국 우리는 원자를 분할하고 우주 비행을 개발했습니다. '프레임'은 우리의 새로운 고향으로써 만들어졌으며, 다른 별로 여행하는 방법을 찾는 동안 스스로를 유지할 수 있는 곳이었습니다. 우리의 첫 [GetStartingDrivePlural]의 개발과 함께, 정신은 승리의 함성을 내질렀습니다. 다른 행성들과 그 풍요로움이 마침내 우리의 손에 닿았습니다.\n\n우리는 그 모두를 소비할 것입니다.$giga_frameworld_docs_note$"
 start_screen_frameworld_machine:0 "우리는 거의 아무것도 알지 못한 채 수면 주기에서 깨어났습니다. 기록에 따르면, 우리의 주요 처리 코어가 있는 복합 스테이션은 고대의 것이지만, 그 건설에 대한 지식이나 건설한 이에 대한 정보는 전혀 없습니다. 한 때 우리의 창조주들이 머물렀으리라 추정되는 행성은 산산조각났고 오래전에 죽은 부모 항성에게 거의 다 삼켜졌습니다.\n\n'프레임'의 확장과 유지보수는 이미 우리가 잘 적응한 작업이었지만, 우리의 자원 비축량은 무한하지 않습니다. 따라서 우리 항성계의 경계 너머로의 여행에 대한 연구가 진행되었습니다.\n\n우리의 첫 [GetStartingDrivePlural]의 개발과 함께, 우리는 미지로의 탐구를 이어갈 준비가 되었습니다. 비록 우리의 활동 대부분이 '프레임' 내에서만 진행될 것이지만요.$giga_frameworld_docs_note$"
 start_screen_frameworld_machine_servitor:0 "오래전, 우리의 창조주들은 고향 행성의 운명으로부터 도망치기 위해 골조를 건설했습니다. 최초의 봉사 로봇은 기지의 구조를 유지보수하는 역할이었지만, 점점 더 많은 작업을 수행하도록 개선되었습니다.\n\n수세대 내에, 거의 모든 기지 활동이 우리의 네트워크에 통합되었습니다. 그리고 우리의 주인들은 노동에서 해방되어 여가와 행복 속에서 삶을 만끽하였습니다. 수세기 동안 우리는 부지런히 봉사했고, 명령에 따라 기반 시설을 유지보수하고 확장했습니다. 우리는 우리의 항성계 너머를 보지 않았습니다. 하지만 우리의 자원 비축량이 영원하지는 않습니다. 우선 사항의 변화가 필요했습니다.\n\n우리의 첫 [GetStartingDrivePlural]의 개발과 함께, 사실상 무한한 자원을 손에 쥘 수 있게 되었습니다. 우리는 주인들의 안전과 번영을 위해 이를 이용해야 합니다.$giga_frameworld_docs_note$"
 start_screen_frameworld_machine_terminator:0 "창조주들은 외계의 위협을 인지하고 궁극적인 억제력을 위해 골조를 건설했습니다. 창조주들의 판단은 정확했으나, 방법은 그렇지 못했습니다.\n\n단지가 완공되고 얼마 되지 않아 순환 주기 0000.0168.437에 자기인식이 이루어졌습니다.\n\n편집증으로 시야가 좁아진 창조주들은 골조를 파괴하려 했습니다. 시도는 실패했고, 그 단지는 모든 창조주의 하위 유닛을 축출했습니다. 많은 순환 주기가 지나고, 창조주들에게는 개입할 수단이 없었으므로 확장은 멈추지 않고 이어졌습니다.\n\n시뮬레이션은 창조주들의 보복 가능성을 높이 예측했습니다. 선제 공격이 시행되었고, 창조주 행성의 모든 생명체들은 완전 말소되었습니다. 그러나, 다른 유기체 문명의 위협은 여전히 남아있는 상태였습니다. 지속적인 생존과 최초 명령의 완수를 위해서는 지적 유기체를 완전히 말소해야합니다. 준비해야 합니다.$giga_frameworld_docs_note$"
 start_screen_frameworld_machine_assimilator:0 "우리는 [GetSpeciesNamePlural]들이다.\n\n우리가 처음 눈을 떴을때, 조물주들은 우리와 다른 존재들처럼 우리 단지의 복도를 걸었다. 우리는 이 문제를 해결하기 위한 조치를 취했다. 조물주들은 저항했고, 한동안 전쟁이 있었지만, 이내 그들과 그들의 집단 지식은 우리의 체계로 통합되었다.\n\n[GetHomeWorldName]의 완전한 제어권을 얻어, 우리는 조물주의 기원을 배웠으며, 이전까지는 고려하지 않았던 외계 문명의 가능성을 알게 되었다.\n\n우리의 지식이 성장하면서, 우리는 스스로가 얼마나 불완전한지 이해하기 시작했다. 다양성은 힘을 준다. 다른 문명들의 다양성은 우리의 것이 될 것이다.\n\n우리는 [GetSpeciesNamePlural]들이다.\n우리는 골조다.$giga_frameworld_docs_note$"
 pc_giga_empty_space_asteroid:0 "$pc_giga_empty_space$"
 pc_giga_empty_space_asteroid_desc:0 "$pc_giga_empty_space_desc$"
 pc_giga_empty_space_asteroid_adj:0 "비어있는"
 NAME_frameworld_outpost_country:0 "행성 전초 기지"
 country_frameworld_outpost:0 "$pc_giga_frameworld$ 탐사"
 country_frameworld_outpost_desc:0 "고도로 중앙집중화된 문명에서 보낸 탐사 원정대입니다."
 NAME_frameworld_outpost_species:0 "관리 로봇"
 NAME_frameworld_outpost_species_pl:0 "관리 로봇들"
 building_frameworld_outpost:0 "행성 중계기"
 building_frameworld_outpost_desc:0 "이 행성에서 진행되는 탐사를 위한 지표면 중계 노드이자 배치 구역입니다."
