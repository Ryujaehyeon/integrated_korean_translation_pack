 frameworld_penrose_1:0 "불완전한 $name_penrose$"
 frameworld_penrose_1_DESC:0 "아직 완성되지 않은 $name_penrose$입니다. 거울 패널과 입자 주입기가 미완 상태입니다."
 frameworld_penrose_2:0 "$name_penrose$"
 frameworld_penrose_2_DESC:0 "$pc_black_hole$의 작용권을 거울로 완전히 감쌌으므로, 이제 에너지를 생산할 수 있습니다."
 frameworld_decompressor_0:0 "$matter_decompressor_4$ 구조물 토대"
 frameworld_decompressor_0_DESC:0 "성계의 $pc_black_hole$ 위에 있는 거대한 물질 처리 시설 고리를 지탱하기 위한 구조물입니다."
 frameworld_decompressor_1:0 "$matter_decompressor_4$ 처리 고리"
 frameworld_decompressor_1_DESC:0 "추출된 물질을 사용 가능한 광물로 가공하는데 전념하는 거대 시설입니다."
 frameworld_decompressor_2:0 "$matter_decompressor_4$ 천공 배열망"
 frameworld_decompressor_2_DESC:0 "중력장을 왜곡해 $pc_black_hole$에서 물질을 추출할 수 있는 드릴로 바꾸는 중력 렌즈 시설들입니다."
 frameworld_origin_colony_cost:0 "식민지 비용 불이익"
 frameworld_origin_colony_cost_desc:0 "§W§E호환성 보정치:§! $colonizer_plural$의 건조를 완전히 비활성화 하려면 덮어쓰기가 필요하며, 다른 모드들과 잘 호환되지 않을 것입니다.\n\n어떻게서든 $colonizer$을 얻게 된다면 식민지를 건설하는데 사용할 수는 있을테지만, 개척자들은 정복된 행성의 팝들처럼 재이주될 것입니다.§!\n§W--------------§!\n§L우리의 네트워크 구성은 분산적인 행성 식민지의 필요성과 근본적으로 양립할 수 없습니다. 우리는 본질적으로 골조에 연결되어 있습니다.§!"
 frameworld_outpost_bonus:0 "$giga_frameworld_outpost$ 네트워크"
 frameworld_outpost_bonus_desc:0 "§L다른 우주 문명의 식민지보다 작은 우리의 보조 $giga_frameworld_outpost_plural$는 우리의 영향력을 멀리 떨어진 행성까지 확대시켜줍니다.§!"
 giga_frameworld_outpost_empire_size_modifier_text:0 " 그리고 $giga_frameworld_outpost_plural$"
 giga_frameworld_outpost_pops_modifier_text:0 "추가 인구는 $giga_frameworld_outpost_plural$ 건설 시 발생합니다."
 frameworld_expanded_maintenance_protocol:0 "확장된 유지보수 프로토콜"
 frameworld_expanded_maintenance_protocol_desc:0 "작업에 배정되지 않은 드론들을 비활성화 상태로 두는 것은 용납할 수 없는 낭비 요인입니다. 이러한 드론들은 이차 작업에 재배정될 것이며, 필요에 따라 기지 기능의 유지보수 및 보조 작업에 착수할 것입니다."
 frameworld_expanded_maintenance_protocol_tooltip:0 "실업자 §Y5번째 이상§!인 팝은 이 $pc_giga_frameworld$에서 대신 £job_frame_maintenance_worker£ §Y$job_frame_maintenance_worker_plural$§!로 고용됩니다.\n\n$job_frame_maintenance_worker_effect_desc$"
 frameworld_expanded_maintenance_protocol_gestalt:0 "$frameworld_expanded_maintenance_protocol$"
 frameworld_expanded_maintenance_protocol_gestalt_desc:0 "배정되지 않은 드론이 비활성 상태로 남는 것은 용납할 수 없는 낭비입니다. 이러한 드론들은 필요에 따라 보조 및 유지보수를 수행하며 다른 스테이션 기능을 지원하도록 재배치될 것입니다."
 frameworld_expanded_maintenance_protocol_gestalt_tooltip:0 "이 $pc_giga_frameworld$에 있는 §Y5번째 이상의§! 실업 팝이 £job_frame_maintenance_drone£ §Y$job_frame_maintenance_drone_plural$§!으로 고용될 것입니다\n\n$job_frame_maintenance_drone_effect_desc$"
 frameworld_ai_build_cooldown:0 "$pc_giga_frameworld$ AI 건설 쿨다운"
 frameworld_ai_build_cooldown_desc:0 "AI 도우미 이벤트의 쿨다운입니다."
 frameworld_ai_artisans:0 "$job_artisan_drone$ 조정"
 frameworld_ai_artisans_desc:0 "AI 직업 관리 도우미입니다."
 frameworld_conquered:0 "행정 과확장"
 frameworld_conquered_desc:0 "소유자가 바뀜에 따라 이 행성은 혼란에 빠졌습니다."
 frameworld_conquered_tooltip:0 "이 행성의 성장과 건설, 군사 훈련은 사실상 중단되었습니다."
 frameworld_conquered_no_resettle:0 "물류 과잉"
 frameworld_conquered_no_resettle_desc:0 "개발된 민간 성간 인프라가 없어 이 $origin_frameworld$ 제국은 전쟁 시기에 수송 수요를 충족시키기 어려워하고 있습니다."
 frameworld_conquered_no_resettle_tooltip:0 "£pop£팝들은 이 보정치가 만료되거나 평화로 인해 없어지기 전까지 이 행성에서 자동으로 이주되지 않을 것입니다."
 frameworld_building_wreck_fix:0 "연결체 지구 업그레이드 파괴 픽스"
 frameworld_building_wreck_fix_desc:0 "이게 보이신다면 무언가 잘못된 것입니다. 이 보정치는 연결체 지구 업그레이드 결정 중 건물이 파괴되는 것을 막기 위한 것이며, 프로젝트 종료 이후에는 존재해서는 안됩니다."
 frameworld_outpost_planet:0 "$pc_giga_frameworld$ $giga_frameworld_outpost$"
 frameworld_outpost_planet_effects:0 "$giga_frameworld_outpost_plural$은 호스트 행성에 기반한 자원을 생산하며 직업 생산 보정치에 영향을 받습니다."
 frameworld_outpost_planet_desc:0 "§T§H착취 가능한 희귀 자원 매장지:§!\n\n$volatile_motes$ £volatile_motes£: §Y[this.GetFrameworldOutpostVolatileMotes]§!\n$exotic_gases$ £exotic_gases£: §Y[this.GetFrameworldOutpostExoticGases]§!\n$rare_crystals$ £rare_crystals£: §Y[this.GetFrameworldOutpostRareCrystals]§![FrameworldOutpostTerravoreText][FrameworldOutpostNaniteText][FrameworldOutpostEnvironmentalistText]\n\n§T--------------§!\n§L완전히 개발된 식민지의 규모는 아니지만, 우리의 전초 기지는 여전히 귀중한 자원을 제공할 수 있습니다.§!"
 frameworld_outpost_planet_desc_terravore:0 "\n\n행성 노천 광산: [FrameworldOutpostTerravoreState]\n노천 채굴된 횟수: §Y[GetFrameworldOutpostTerravoreDamage]/3§!"
 frameworld_outpost_planet_desc_nanite:0 "\n\n나노이트 흡수: [FrameworldOutpostNaniteState]\n흡수된 횟수: §Y[GetFrameworldOutpostNaniteDamage]/3§!"
