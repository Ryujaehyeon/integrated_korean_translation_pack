 frameworld_defense_army:0 "$pc_giga_frameworld$ $defense_army$"
 frameworld_defense_army_plural:0 "$pc_giga_frameworld$ $defense_army_plural$"
 frameworld_defense_army_desc:0 "$pc_giga_frameworld$의 전기 시설의 위, 그리고 주변에서 싸워야 하는 독특한 환경에 맞추어 특수화된 방어 유닛입니다."
 frameworld_defense_army_machine:0 "$pc_giga_frameworld$ $machine_defense$"
 frameworld_defense_army_machine_plural:0 "$pc_giga_frameworld$ 드론 그리드"
 frameworld_defense_army_machine_desc:0 "방어 유닛은 $pc_giga_frameworld$의 독특한 구조에서 전투를 수행하는 데 필요한 특수 조건에 맞춰 설계되었습니다."
 frameworld_defense_army_individualist_machine:0 "$pc_giga_frameworld$ $individual_machine_defense$"
 frameworld_defense_army_individualist_machine_plural:0 "$pc_giga_frameworld$ $individual_machine_defense_plural$"
 frameworld_defense_army_individualist_machine_desc:0 "독특한 $pc_giga_frameworld$의 건설 주변에서 전투를 수행하는 데 필요한 특수한 조건에 맞춰 설계된 방어 유닛입니다."
