 frameworld_harvest_0_DESC:0 "보이면 안됨."
 frameworld_harvest_0_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_project$ - $giga_list_category_special$\n소행성을 해체해 원자재를 얻으며, §Y$pc_giga_frameworld$§!을 확장합니다\n§L대규모 공사에는 대량의 자원이 필요합니다.§!"
 frameworld_harvest_0_CONSTRUCTION_INFO_DELAYED:0 "$giga_list_additional_data$ - §Y$pc_giga_frameworld$§!를 한 번 확장하며, 추가로 4회의 수확마다 §G+1§! §Y$mod_district_giga_frameworld_mining_max$를 더합니다§!.\n\n비용은 £mod_planet_clear_blocker_cost_mult£ §Y$MOD_COUNTRY_CLEAR_BLOCKER_COST_MULT$§! 수정자에 따라 조정됩니다."
