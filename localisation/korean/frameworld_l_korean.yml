 giga_frameworld_outpost_icon_desc:0 "이 성계에는 한 개 이상의 §Y$giga_frameworld_outpost_plural$§!가 있습니다.\n\n§Y$giga_frameworld_outpost_plural$§!는 §Y$origin_frameworld$§! 기원을 가진 제국이 소유한 소형 식민지입니다. 성계를 장악하는데 이를 침공할 필요는 없습니다."
 giga_frameworld_outpost_icon_tooltip:0 "$giga_frameworld_outpost_plural$는 그냥 지나칠 수 없습니다. 이 버튼은 맵 아이콘을 추가하는데 사용된 방법의 부산물로 무시해도 됩니다."
