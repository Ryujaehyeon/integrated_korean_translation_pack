 frameworld_salvage_habitat_0_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_project$ - $giga_list_category_special$\n거주지 기지를 해체해 자원을 얻고, §Y$pc_giga_frameworld$§!을 확장합니다\n§L필요에 따라 외계 궤도 시설을 바꿀 수 있습니다.§!"
