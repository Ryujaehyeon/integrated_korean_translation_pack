 giga_frameworld_ai_build_district_penrose_desc:0 "$giga_frameworld_ai_helper$\n\n$district_giga_frameworld_penrose_desc$"
 tech_frameworld_harvest_1:0 "고해상도 소행성 측량"
 tech_frameworld_harvest_1_desc:0 "광물 탐지의 발전으로 인해, 채굴 대상을 더 빠르고 정확하게 평가할 수 있게 되었습니다."
 tech_frameworld_harvest_2:0 "개선된 소행성 분해"
 tech_frameworld_harvest_2_desc:0 "새로이 개발된 채굴 레이저를 소행성 채굴에 사용하여 보다 효율적인 소행성 분해가 가능해졌습니다."
 tech_frameworld_harvest_3:0 "자동화 분해 드론"
 tech_frameworld_harvest_3_desc:0 "자동화된 채굴 드론 함대입니다. 원래는 광물 채굴용이지만, 소행성 채굴에도 사용될 수 있습니다."
 tech_frameworld_defensive_station_2:0 "항성 거점 방어선"
 tech_frameworld_defensive_station_2_desc:0 "항성 기지 건설의 발전을 통해 우리의 방어선 기지를 개장해야 합니다."
 giga_frameworld_tech_unlock_defensive_station_2_title:0 "§H기능 잠금 해제:§! $frameworld_defensive_station$ 항성 거점 업그레이드"
 giga_frameworld_tech_unlock_defensive_station_2_desc:0 "$pc_giga_frameworld$의 방어선을 항성 거점 수준으로 업그레이드합니다."
 tech_frameworld_defensive_station_3:0 "항성 요새 방어선"
 tech_frameworld_defensive_station_3_desc:0 "$tech_frameworld_defensive_station_2$"
 giga_frameworld_tech_unlock_defensive_station_3_title:0 "§H기능 잠금 해제:§! $frameworld_defensive_station$ 항성 요새 업그레이드"
 giga_frameworld_tech_unlock_defensive_station_3_desc:0 "$pc_giga_frameworld$의 방어선을 항성 요새 수준으로 업그레이드합니다."
 tech_frameworld_defensive_station_4:0 "성채 방어선"
 tech_frameworld_defensive_station_4_desc:0 "$tech_frameworld_defensive_station_2$"
 giga_frameworld_tech_unlock_defensive_station_4_title:0 "§H기능 잠금 해제:§! $frameworld_defensive_station$ 항성 성채 업그레이드"
 giga_frameworld_tech_unlock_defensive_station_4_desc:0 "$pc_giga_frameworld$의 방어선을 항성 성채 수준으로 업그레이드합니다."
 tech_frameworld_defensive_station_5:0 "마지노주의 방어선"
 tech_frameworld_defensive_station_5_desc:0 "최고의 방어는... 좋은 방어입니다."
 giga_frameworld_tech_unlock_defensive_station_5_title:0 "§H기능 잠금 해제:§! $frameworld_defensive_station$ 마지노 업그레이드"
 giga_frameworld_tech_unlock_defensive_station_5_desc:0 "$pc_giga_frameworld$의 방어선을 성채 수준을 넘어선 수준으로 강화합니다."
 tech_frameworld_repeatable_outpost_output:0 "행성 탐사 기반시설"
 tech_frameworld_repeatable_outpost_output_desc:0 "우리의 행성 탐사를 위한 지원 장비와 기반시설을 개선하면, 자원 추출의 기회를 보다 효율적으로 파악할 수 있습니다."
 tr_expansion_adopt_giga_frameworld:0 "$tr_expansion_adopt$"
 tr_expansion_colonization_fever_giga_frameworld:0 "유연한 탐사"
 tr_expansion_colonization_fever_giga_frameworld_delayed:0 "행성 탐사의 철저한 준비를 통해 원만한 배치가 이루어집니다. 너무 과할 경우, 잉여 노동 유닛을 핵심 기능에 맞게 바꿀 수 있습니다."
 tr_expansion_colonization_fever_giga_frameworld_desc:0 "$tr_expansion_colonization_fever_desc$\n\n§H주의:§! 이 전통을 채택했든 아니든, 새로운 행성에 §Y$giga_frameworld_outpost$§!가 건설되면 식민지의 모든 새로운 £pop£ 팝은 $pc_giga_frameworld$에 추가됩니다."
