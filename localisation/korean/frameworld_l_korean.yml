 pc_giga_frameworld_outpost_planet:0 "골조 전초기지 행성"
 pc_giga_frameworld_outpost_planet_desc:0 "거대한 우주 스테이션에서 감시를 받는 주거 가능한 행성입니다. 스테이션에서 파견된 탐험대가 정기적으로 지표면을 방문하여 조사를 수행하고 가벼운 자원 채취를 진행합니다.\n\n지표면에서 활성화된 영구적인 정착지는 찾아볼 수 없습니다."
 pc_giga_frameworld_outpost_planet_adj:0 "두번째"
 pc_giga_frameworld_outpost_artificial:0 "$pc_giga_frameworld_outpost_planet$"
 pc_giga_frameworld_outpost_artificial_desc:0 "거대한 우주 스테이션에서 감시를 받는 주거 가능한 인공 구조물입니다. 스테이션에서 파견된 탐험대가 정기적으로 지표면을 방문하여 조사를 수행하고 가벼운 자원 채취를 진행합니다.\n\n지표면에서 활성화된 영구적인 정착지는 찾아볼 수 없습니다."
