 giga_frameworld_consume_world_desc_nonhive:0 "대규모 표면 자료 수집은 풍부한 자원을 제공할 것입니다."
 giga_frameworld_consume_world_effect:0 "\n무작위로 유효한 $frameworld_outpost_0$ 행성이 §Y$d_frameworld_terravore_damage$§! 차단기를 얻어 전초 기지 자원 생산량이 §Y25%§! 감소합니다.\n\n각 $frameworld_outpost_0$는 최대 §Y3§! 회 수탈될 수 있습니다."
