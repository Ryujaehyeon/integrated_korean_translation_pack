 giga_frameworld_penrose:0 "$d_frameworld_penrose$"
 giga_frameworld_penrose_effect:0 "거대 구조물의 단계적 건설을 시작합니다. 이 구조물은 $pc_giga_frameworld$의 §Y$district_giga_frameworld_generator_plural$§!를 더 강력하고 수는 적은 §Y$district_giga_frameworld_penrose_plural$§!으로 바꿉니다.\n\n§Y$district_giga_frameworld_penrose_plural$§!은 추가적인 £job_technician£ §Y[owner.GetTechnician] 직업§!을 제공하지만, 이전 지구의 직업보다 비쌉니다.\n\n$frameworld_penrose_fake_tooltip$"
 giga_frameworld_penrose_desc:0 "성계의 $pc_black_hole$ 주위에 건설된 거대한 거울로, 초방사성 산란을 이용해 엄청난 효율로 에너지를 생성합니다."
 giga_frameworld_decompressor:0 "$d_frameworld_decompressor$"
 giga_frameworld_decompressor_effect:0 "거대 구조물의 단계적 건설을 시작합니다. 이 구조물은 $pc_giga_frameworld$의 §Y$district_giga_frameworld_mining_plural$§!를 더 강력하고 수는 적은 §Y$district_giga_frameworld_decompressor_plural$§!으로 바꿉니다.\n\n§Y$district_giga_frameworld_decompressor_plural$§!은 추가적인 £job_miner£ §Y[owner.GetMiner] 직업§!을 제공하지만, 이전 지구의 직업보다 비쌉니다."
 giga_frameworld_decompressor_desc:0 "왜곡된 중력장을 $pc_black_hole$에서 물질을 추출할 수 있는 드릴로 바꾸는 중력 렌즈 시설입니다."
 giga_frameworld_advanced_city:0 "드론 거주 구획 업그레이드"
 giga_frameworld_advanced_city_effect:0 "$pc_giga_frameworld$의 §Y$district_giga_frameworld_city_plural$§!를 더 적은 수의 §Y$district_giga_frameworld_city_advanced_plural$§!로 대체합니다.\n\n§Y$district_giga_frameworld_city_advanced_plural$§!는 대체하는 구역보다 두 배 더 효과적입니다.\n"
 giga_frameworld_advanced_hive_effect:0 "$pc_giga_frameworld$의 §Y$district_giga_frameworld_hive_plural$§!를 더 적은 수의 §Y$district_giga_frameworld_hive_advanced_plural$§!로 바꾸며, §Y$district_giga_frameworld_amenities_gestalt$§!의 £job_maintenance_drone£ §Y$job_maintenance_drone_plural$§! 직업 두 개를 £job_frame_maintenance_overseer£ §Y$job_frame_maintenance_overseer_plural$§!로 대체합니다.\n\n§Y$district_giga_frameworld_hive_advanced_plural$§!는 이전 지구보다 두 배 더 강력합니다.\n$job_frame_maintenance_overseer_effect_desc$\n"
 giga_frameworld_advanced_nexus_effect:0 "$pc_giga_frameworld$의 §Y$district_giga_frameworld_nexus_plural$§!를 더 적은 수의 §Y$district_giga_frameworld_nexus_advanced_plural$§!로 바꾸며, §Y$district_giga_frameworld_amenities_gestalt$§!의 £job_maintenance_drone£ §Y$job_maintenance_drone_plural$§! 직업 두 개를 £job_frame_maintenance_overseer£ §Y$job_frame_maintenance_overseer_plural$§!로 대체합니다.\n\n§Y$district_giga_frameworld_nexus_advanced_plural$§!는 이전 지구보다 두 배 더 강력합니다.\n$job_frame_maintenance_overseer_effect_desc$\n"
 giga_frameworld_advanced_city_desc:0 "거주 및 자원 저장 기지를 위한 개선된 설계입니다. 생활 공간의 체계화가 더 나아질 것입니다."
 giga_frameworld_advanced_industrial:0 "중공업 확장"
 giga_frameworld_advanced_industrial_foundry_effect:0 "$pc_giga_frameworld$의 §Y$district_giga_frameworld_foundry_plural$§!를 더 적은 수의 §Y$district_giga_frameworld_foundry_advanced_plural$§!로 바꿉니다.\n\n§Y$district_giga_frameworld_foundry_advanced_plural$§!는 £job_fabricator£ §Y[owner.GetAlloyProducer] 직업§!을 2개 더 제공하지만, 유지비로 £volatile_motes£ §Y$volatile_motes$§!이 사용됩니다."
 giga_frameworld_advanced_industrial_factory_effect:0 "$pc_giga_frameworld$의 §Y$district_giga_frameworld_factory_plural$§!를 더 적은 수의 §Y$district_giga_frameworld_factory_advanced_plural$§!로 대체합니다.\n\n§Y$district_giga_frameworld_factory_advanced_plural$§!는 2개의 추가 [owner.GetArtisanIcon]§Y[owner.GetArtisan] 직업§!을 제공하지만 유지 관리에 £rare_crystals£ §Y$rare_crystals$§!가 필요합니다."
 giga_frameworld_advanced_industrial_desc:0 "확장된 주조 시설과 이종 물질을 사용하는 첨단 산업 과정을 도입함으로써, 처리량이 크게 개선될 것입니다."
 giga_frameworld_advanced_sanctuary:0 "성역 아콜로지 프로젝트"
 giga_frameworld_advanced_sanctuary_effect:0 "$pc_giga_frameworld$의 §Y$district_giga_frameworld_sanctuary_plural$§!를 더 적은 수의 §Y$district_giga_frameworld_sanctuary_advanced_plural$§!로 바꿉니다.\n\n§Y$district_giga_frameworld_sanctuary_advanced_plural$§!는 이전 지구보다 두 배로 더 많은 £job_bio_trophy£ §Y$job_bio_trophy_plural$§!를 수용할 수 있습니다."
 giga_frameworld_advanced_sanctuary_desc:0 "유기적 욕구의 충족와 오락 시설의 전략적 재구상을 통해 기능이나 편의를 희생하지 않고도 훨씬 더 높은 밀도의 거주지를 건설할 수 있을 것입니다."
 giga_frameworld_gaia:0 "환경 유지 시스템 업그레이드"
 giga_frameworld_gaia_desc:0 "모든 형태의 유기체에게 이상적인 환경을 제공하기 위해 만들어진 첨단 기후 통제 체계입니다."
 giga_frameworld_computing_complex:0 "데이터 처리 시설 업그레이드"
 giga_frameworld_computing_complex_desc:0 "고밀도 데이터 저장과 정보 처리 가속화를 위한 전용 시설 덕분에 우리의 연구 능력이 크게 상승할 것입니다."
 giga_frameworld_expand_infrastructure:0 "기지 기반 시설 확장"
 giga_frameworld_expand_infrastructure_desc:0 "기지 제조와 유지보수 시설의 처리량을 개선하면 대량의 모듈을 유지할 수 있을 것입니다."
 giga_frameworld_orbital_ring_upgrade:0 "가공 오비탈 건설"
 giga_frameworld_orbital_ring_upgrade_desc:0 "$d_frameworld_orbital_ring_desc$"
 giga_frameworld_nanites:0 "나노기술 주입"
 giga_frameworld_nanites_desc:0 "우리는 스스로를 변화시켰고, 이제 그 과정을 완성해야 합니다."
 giga_frameworld_nanites_effect:0 "확장 결정을 가능하게 하며 £nanites£ §Y$nanites$§! 비용이 발생합니다.\n\n여러 구역에 나노 기술을 적용합니다:\n\n§H$district_giga_frameworld_foundry$:§!\n- £alloys£ §Y$alloys$§!를 직접 추가 생산합니다\n- £energy£ §Y$energy$§! 유지비 증가\n- £nanites£ §Y$nanites$§! 유지비 추가\n\n§H$district_giga_frameworld_science$:§!\n- [owner.GetResearcherIcon] §Y[owner.GetResearcher]§! 직업 1개 제거\n- [owner.GetNanotechResearcherIcon] §Y[owner.GetNanotechResearcher]§! 직업 3개 추가\n- £nanites£ §Y$nanites$§! 유지비 추가\n\n§H$district_giga_frameworld_refinery$:§!\n- $giga_r_motes$$giga_r_gases$$giga_r_crystals$ §Y전략 자원§!을 직접 추가 생산합니다\n- £energy£ §Y$energy$§! 유지비 증가\n- £nanites£ §Y$nanites$§! 유지비 추가\n"
 giga_frameworld_maginot:0 "마지노주의 시행"
 giga_frameworld_maginot_effect:0 "다양한 면에서 $pc_giga_frameworld$의 방어적 잠재력을 높이는 §Y$name_maginot$ 메커니즘§!을 잠금 해제합니다:\n\n엄청나게 강력하고 업그레이드 가능한 방어 기지인 §Y$strategic_defence_command_platform$§!이 추가됩니다\n\n$pc_giga_frameworld$의 방어선에 §Y$frameworld_defensive_station_plural$§!을 3개 더 추가합니다\n\n우주 방어를 강화하고 특수군을 제공하는 §Y$district_giga_frameworld_maginot_shield_generators$§!과 §Y$district_giga_frameworld_maginot_planetary_cannons$§!을 건설할 수 있습니다\n\n§Y$district_giga_frameworld_fortress_plural$§!가 강력한 방위군을 추가적으로 제공합니다\n\n이 성계와 주변 성계 같의 웜홀 형성과 점프드라이브 활동을 방해하는 토글형 §Y아공간 분열 시스템§!을 얻습니다\n\n"
 giga_frameworld_maginot_desc:0 "우리는 이제 한 행성이 어느 정도 수준까지 요새화될 수 있는지를 이해했습니다. 그리고 이 지식을 통해 우리 스스로의 방어를 개선하기 위한 분명한 길이 보이게 되었습니다."
 giga_frameworld_ai_helper:0 "§H(AI 도우미)§!"
 giga_frameworld_ai_outpost:0 "$frameworld_outpost_0$ $giga_frameworld_ai_helper$ 건설"
 giga_frameworld_ai_outpost_desc:0 "AI를 위한 $frameworld_outpost_0$를 건설합니다. AI는 건설선을 잘 관리하지 못하기 때문입니다."
 giga_frameworld_ai_asteroid:0 "$frameworld_harvest_0$ $giga_frameworld_ai_helper$"
 giga_frameworld_ai_asteroid_desc:0 "AI를 위해 소행성을 채굴합니다. AI는 건설선을 잘 관리하지 못하기 때문입니다."
 giga_frameworld_ai_habitat:0 "$frameworld_salvage_habitat_0$ $giga_frameworld_ai_helper$"
 giga_frameworld_ai_habitat_desc:0 "AI를 위해 거주지를 인양합니다. AI는 건설선을 잘 관리하지 못하기 때문입니다."
 giga_frameworld_building_audit:0 "AI 행성 감사 $giga_frameworld_ai_helper$"
 giga_frameworld_building_audit_desc:0 "행성의 건물과 지구를 감사하고, 중요 건물이 없으면 건설하며, 가능하다면 건물을 동등한 기능의 지구로 대체합니다."
 giga_frameworld_ai_build_district_anticrime:0 "$district_giga_frameworld_anticrime$"
 giga_frameworld_ai_build_district_anticrime_desc:0 "$giga_frameworld_ai_helper$\n\n$district_giga_frameworld_anticrime_desc$"
