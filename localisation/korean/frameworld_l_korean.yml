 frameworld_crucible:0 "$gestation_colony$"
 frameworld_crucible_desc:0 "사이버네틱 드론을 집단의 생산적인 구성원으로 육성하는 데 전념하는 계획."
 frameworld_crucible_effects:0 "확장과 $giga_frameworld_outpost_plural$에서 온 절반의 £job_replicator£ §Y$job_replicator$§! 직업을 £job_giga_extra_crucible_drone£ §Y$job_giga_extra_crucible_drone_plural$§! 직업으로 대체합니다.\n\n$job_giga_extra_crucible_drone_effect_desc$"
 mod_giga_frameworld_growth_jobs_add:0 "2차 팝 성장 ['concept_giga_frameworld_growth_job_value_tooltip']"
 concept_giga_frameworld_growth_job_value_tooltip:0 "직업 가치"
 concept_giga_frameworld_growth_job_value:0 "2차 팝 성장 직업 가치"
 concept_giga_frameworld_growth_job_value_desc:0 "§Y$pc_giga_frameworld$§!는 확장과 §Y$giga_situation_frameworld_outposts$§!를 통해 추가 인구 성장 £job£ 직업을 받습니다.\n\n이 보정치는 제공된 직업에 의해 부여되는 §Y총 기본 성장 및 조립§!을 나타냅니다. 이는 §Y국가 유형§!, §Y시빅§! 및 §Y승천 트리§!에 따라 달라집니다."
 giga_frameworld_origin.107.name:0 "첫 번째 [Root.GetSpeciesName] 탐사"
 giga_frameworld_origin.107.desc:0 "우리의 건설 유닛이 §Y[From.GetName]§!에 행성 중계 기지를 건설했습니다. 이 집결지로부터, 탐사대가 출발하여 지표면을 조직적으로 탐사할 것입니다.\n\n이렇게 멀리 있는 §Y[Root.GetHomeWorldName]§!까지의 영향력에는 한계가 있지만, 탐사대는 탐험 도중 발견한 유용한 자원을 사용할 수 있을 것입니다.\n\n이 행성에 대한 우리의 이해가 골조에 대한 이해만큼이나 완벽해질 수는 없겠지만, 별들 사이로 첫 발을 디디는 중요한 순간입니다."
 giga_frameworld_origin.107.desc.hive:0 "우리의 건설 팀이 §Y[From.GetName]§!에 행성 중계 기지를 건설했습니다. 이 집결지로부터, 탐사대가 출발하여 지표면을 조직적으로 탐사할 것입니다.\n\n이렇게 멀리 있는 §Y[Root.GetHomeWorldName]§!까지의 영향력에는 한계가 있지만, 탐사대는 탐험 도중 발견한 유용한 자원을 사용할 수 있을 것입니다.\n\n이 행성에 대한 우리의 이해가 골조에 대한 이해만큼이나 완벽해질 수는 없겠지만, 별들 사이로 첫 발을 디디는 중요한 순간입니다."
 giga_frameworld_origin.107.desc.machine:0 "우리의 건설 유닛이 §Y[From.GetName]§!에 행성 중계 기지를 건설했습니다. 이 집결지로부터, 탐사대가 출발하여 지표면을 조직적으로 탐사할 것입니다.\n\n이렇게 멀리 있는 §Y[Root.GetHomeWorldName]§!까지의 영향력에는 한계가 있지만, 탐사대는 탐험 도중 발견한 유용한 자원을 사용할 수 있을 것입니다.\n\n이 행성에 대한 우리의 이해가 골조에 대한 이해만큼이나 완벽해질 수는 없겠지만, 별들 사이로 첫 발을 디디는 중요한 순간입니다."
 giga_frameworld_origin.107.a:0 "[Root.GetName]에게 기념할 만한 날이다!"
 giga_frameworld_origin.500.desc.first:0 "우리의 환경 전문가들이 [Root.GetName]의 파종 작업이 완료되었다고 보고했습니다! 마지막 §Y바올§!의 몸에서 얻어낸§Y바올§! 유전 암호를 세심하게 선택하고 이용해 만들어진 실험실 잡종 식물이 환경 유지 체계의 확장으로서 배치되었습니다.\n\n행정부는 고대의 §Y바올§!과 놀라우리만큼 유사한 지적 외계종 다수가 [Root.GetName]에 나타났다고도 보고하였습니다!\n\n군체 의식의 일원은 아니지만, 이러한 §G누-바올§! 외계종들은 자신들의 조상만큼이나 평화로운듯 합니다. 우리는 [Root.GetName]에 있는 그들의 거처를 다루어야할 것입니다."
 giga_frameworld_origin.500.desc:0 "우리의 환경 전문가들이 [Root.GetName]의 파종 작업이 완료되었다고 보고했습니다! 다시 한 번, §Y바올§! 유전 암호를 가지고 있는 실험실 잡종 식물의 배치 때문에 다수의 §G누-바올§!들이 나타났습니다."
 giga_frameworld_origin.001.name:0 "$name_penrose$ 뼈대 완성"
 giga_frameworld_origin.001.desc:0 "[giga_system.star.GetName] 주위로 미래의 $name_penrose$ 를 위한 뼈대가 완성되었습니다. 이 골조는 언젠가 가장 반사 능력이 뛰어난 물질로 만들어진 거대한 거울을 지탱할 것입니다. 이 거울과 입자 주입기를 완성하고 나면 $pc_black_hole$의 회전 에너지를 얻어낼 수 있을 것입니다."
 giga_frameworld_origin.001.a:0 "훌륭해."
 giga_frameworld_origin.002.name:0 "불완전한 $name_penrose$ 건설됨"
 giga_frameworld_origin.002.desc:0 "거대한 거울의 절반이 [giga_system.star.GetName](을)를 감싸는 뼈대에 설치되었고, 입자 주입기가 부분적으로 완성되었습니다. 이를 제대로 사용하기 위해서는 추가적인 작업이 필요합니다."
 giga_frameworld_origin.002.a:0 "훌륭해."
 giga_frameworld_origin.003.name:0 "통합된 $name_penrose$ 완성"
 giga_frameworld_origin.003.desc:0 "마지막 거울 패널의 설치와 함께, [giga_system.star.GetName](은)는 완전히 감싸이게 되었습니다. 이제 우리는 $pc_black_hole$의 회전 에너지를 이용할 수 있습니다."
 giga_frameworld_origin.003.a:0 "멋지군!"
 giga_frameworld_origin.004.name:0 "$matter_decompressor_4$ 구조물 토대 완성"
 giga_frameworld_origin.004.desc:0 "[giga_system.star.GetName]에서 물질을 추출하려면, 우선 시설을 건설할 토대를 확보해야 합니다. 억류 지주가 [giga_system.star.GetName]의 사건의 지평선 위에 있는 $pc_giga_frameworld$ 상부 구조에 건설되었습니다. 이곳에서 거대한 처리 고리가 중력 천공기가 작동될 것입니다."
 giga_frameworld_origin.004.a:0 "훌륭해."
 giga_frameworld_origin.005.name:0 "$matter_decompressor_4$ 처리 고리 완성"
 giga_frameworld_origin.005.desc:0 "현재의 구조물 토대에 걸설된 이 처리 고리에는 거대한 정제소와 제련소들이 존재합니다. 이러한 시설들은 [giga_system.star.GetName]에서 물질을 추출해 사용 가능한 광물로 변환합니다. 남은 것은 감압 장치를 장착하는 것입니다. 이 장치는 왜곡된 중력이 집중된 지역을 이용해 거대한 드릴을 만들 것입니다. 이 드릴은 중력의 방향 전환과 집중을 통해 만들어집니다."
 giga_frameworld_origin.005.a:0 "훌륭해."
 giga_frameworld_origin.006.name:0 "통합된 $matter_decompressor_4$ 완성"
 giga_frameworld_origin.006.desc:0 "중력 천공 배열망의 완성과 함께, [giga_system.star.GetName] 위의 $matter_decompressor_4$가 완성되었습니다. 이제 사건의 지평선 안에 영원히 갇혀있으리라 생각되었던 물질에 접근할 수 있게 되었으며, [giga_system.star.GetName]에서 바로 광물을 추출할 수 있습니다."
 giga_frameworld_origin.006.a:0 "멋지군!"
 giga_frameworld_origin.007.name:0 "거주지 구획 확장 완료"
 giga_frameworld_origin.007.desc:0 "[giga_planet.GetName]의 도시 지역의 확장 및 재설계가 완료되었습니다. 더욱 압축된 신식 설계 덕분에, 하나의 기지 모듈에 더 많은 사람들을 거주시킬 수 있게 되었습니다. 물론 작업 공간과 편의 시설에도 편리하게 접근할 수 있습니다.\n\n우리의 거주 지역은 이제 진정한 도시입니다. 이전까지 외부 지원 장비가 차지하고 있던 공간도 비워졌습니다."
 giga_frameworld_origin.007.desc.hive:0 "[giga_planet.GetName]의 도시 지역의 확장 및 재설계가 완료되었습니다. 더욱 압축된 신식 설계 덕분에, 유지보수 드론의 재배치에 드는 이동 시간이 감소되고 작업 이양이 개선되었습니다.\n\n시설의 공유로 인한 효율성덕에, 이전까지 새로운 건설을 위한 유지보수 체계에 사용되었던 공간이 비워졌습니다."
 giga_frameworld_origin.007.desc.machine:0 "[giga_planet.GetName]의 도시 지역의 확장 및 재설계가 완료되었습니다. 더욱 압축된 신식 설계 덕분에, 드론 유지보수를 보관 시설에 보다 긴밀하게 통합하여, 이동시간의 간접비와 전체 공간 사용량을 감소시켰습니다.\n\n시설의 공유로 인한 효율성덕에, 이전까지 새로운 건설을 위한 2차 시스템에 사용되었던 공간이 비워졌습니다."
 giga_frameworld_origin.007.a:0 "기지는 커져야 한다."
 giga_frameworld_origin.008.name:0 "중공업 개조 성공"
 giga_frameworld_origin.008.desc:0 "산업 개혁 프로젝트가 완료됨에 따라 [giga_planet.GetName]의 주조소와 공장들이 시끄럽게 굴러가기 시작했습니다.\n\n현대식 산업 방식 덕분에 이전까지 [giga_planet.GetName]의 공간을 크게 차지하고 있던 장비들을 작도 효율적인 중앙 기지로 압축함으로써 생산량이 크게 상승했습니다. 재설계로 인해 절약된 공간은 다른 기지 모듈을 위해 사용할 수 있으며, 그냥 더 많은 공장을 위해 사용할 수도 있습니다."
 giga_frameworld_origin.008.a:0 "생산량 예측 상승 중."
 giga_frameworld_origin.009.name:0 "안식처 시설 업그레이드 완료"
 giga_frameworld_origin.009.desc:0 "오랜 기간 동안 재편 과정을 거친 결과, 새로운 유기체 요구 충족 시설이 [giga_planet.GetName]에서 작동하기 시작했습니다. 우리의 관리를 받는 유기체들은 문제를 느끼지 않을 것이며 개선된 시스템의 득을 볼 것입니다.\n\n이전까지 유지보수 체계가 차지하고 있던 공간에 더 많은 인구를 수용하는데 사용하거나 완전히 다른 목적으로 사용할 수 있게 되었습니다."
 giga_frameworld_origin.009.a:0 "작업에 끝은 없다."
 giga_frameworld_origin.010.name:0 "환경 유지 시스템 업그레이드됨"
 giga_frameworld_origin.010.desc:0 "[giga_planet.GetName]의 환경 제어 및 대기 처리 시스템의 개조가 완료되었습니다. 이제 우리의 시민들은 광범위하게 시뮬레이션되는 행성 환경을 즐길 수 있게 되었습니다. 수자원 처리와 빛에 대한 제어가 더 나아져, 식량 생산이 훨씬 더 효율적이게 되었고 이에 따라 노동 요구량도 감소했습니다.\n\n[giga_planet.owner.GetName]에게 새로운 날이 밝아오고 있으며, 상쾌한 공기가 느껴집니다."
 giga_frameworld_origin.010.a:0 "상쾌하군!"
 giga_frameworld_origin.010.desc.servitor:0 "[giga_planet.GetName]의 환경 제어 및 대기 처리 시스템의 개조가 완료되었습니다. 이제 우리의 관리를 받는 유기체들은 광범위하게 시뮬레이션되는 행성 환경을 즐길 수 있게 되었습니다. 수자원 처리와 빛에 대한 제어가 더 나아져, 식량 생산이 훨씬 더 효율적이게 되었고 이에 따라 다양한 유기체 식단의 필요성이 충족되었습니다.\n\n[giga_planet.owner.GetName]에게 새로운 날이 밝아오고 있으며, 상쾌한 공기가 느껴집니다."
 giga_frameworld_origin.010.a.servitor:0 "우리의 관리 시설에는 아직 개선할 점이 많다."
 giga_frameworld_origin.010.desc.assimilator:0 "[giga_planet.GetName]의 환경 제어 및 대기 처리 시스템의 개조가 완료되었습니다. 이제 우리의 유기체 드론들은 개선된 조건, 특히 원래 설계 매개변수를 벗어난 조건의 득을 볼 것입니다.\n\n수자원 처리와 빛에 대한 제어가 더 나아져, 식량 생산이 훨씬 더 효율적이게 되었고 이에 따라 통합 드론 군집의 효율적인 활동이 계속 이어질 수 있게 되었습니다. 이러한 변화로 인해 생산량 예측치가 상승하고 있습니다."
 giga_frameworld_origin.010.a.assimilator:0 "알겠다."
 giga_frameworld_origin.011.name:0 "데이터 처리 시설 업그레이드됨"
 giga_frameworld_origin.011.desc:0 "건설 작업의 끝에 [giga_planet.GetName]에 새로운 고대역폭 계산 단지가 생겨났습니다. 이제 엄청난 슈퍼컴퓨터 뱅크를 사용해 우리가 아직 해결하지 못한 정말 어려운 과학적 문제를 해결할 수 있으며, 전반적인 연구력이 크게 개선될 것입니다.\n\n이러한 시스템을 핵심 기지 기능에 통합하는 작업이 현재 진행 중이며, 추가적인 열 관리 부하로 인해 큰 문제가 발생하지는 않을 것으로 예상됩니다."
 giga_frameworld_origin.011.a:0 "우주의 비밀이 우리의 손아귀에 있다."
 giga_frameworld_origin.012.name:0 "기지 기반 시설 확장됨"
 giga_frameworld_origin.012.desc:0 "오랫동안 이어진 건설 끝에, [giga_planet.GetName]의 주요 구획을 연결하는 새로운 핵심 운송 기반 시설 통로가 완성되었습니다.\n\n개선된 구조적 무결성과 상호 연결된 운송망으로 인해 추가적인 기능형 모듈을 더 설치할 수 있을 것입니다."
 giga_frameworld_origin.012.desc.2:0 "[giga_planet.GetName]의 주요 구획에서 두 번째 기반 시설 업그레이드가 완료되었습니다.\n\n개선된 구조적 무결성과 상호 연결된 운송망으로 인해 추가적인 기능형 모듈을 더 설치할 수 있을 것입니다."
 giga_frameworld_origin.012.a:0 "알겠다."
 giga_frameworld_origin.013.name:0 "마지노 프로젝트 완료"
 giga_frameworld_origin.013.desc:0 "마침내 [giga_planet.GetName] 주위를 둘러싼 궁극의 방어 방벽을 완성했습니다. 이제 우리의 고향은 겹겹이 쌓인 요새로 둘러싸여 있습니다. 진정 경이라 할 수 있는 우리 군사 공학의 업적으로, 어떠한 군대도 뚫을 수 없으며, 이는 통합 방어 플랫폼과 거대한 질량 포대, 광대한 수비대 포좌, 전체 해군 함대의 보호막보다 강력한 보호막을 생성하는 생성기 덕분입니다.\n또한, 죽음의 손 시스템이 [giga_planet.GetName]의 완전 파괴 억제기로 기능하고 있으며, 페일세이프가 활성화되면 기지의 중앙핵을 반물질 성형 폭탄으로 이용해 §R궤도 상의 모든 적들을 완전히 제거합니다.§!\n\n§Y결정§!을 통해 다양한 방어 시스템을 관리할 수 있고, 이러한 결정에 사용되는 $defensive_upgrade_point_plural$와 $offensive_upgrade_point_plural$를 얻기 위해서는 §Y지구§!를 건설해야 합니다."
 giga_frameworld_origin.013.a:0 "이제 그 누구도 우리에게 피해를 줄 수 없을 것이다."
 giga_frameworld_origin.014.name:0 "이차 가공 오비탈 완공"
 giga_frameworld_origin.014.desc:0 "[giga_planet.GetName] 근처에 몇 개의 새로운 처리 시설을 완공했습니다. 이 시설들은 우리의 몇몇 2차 처리 건물의 기능을 향상시켜 생산 라인을 더욱 효율화하고 향상시킬 수 있을 것입니다."
 giga_frameworld_origin.014.a:0 "모든 시스템 정상."
 giga_frameworld_origin.015.name:0 "나노입자 주입 완료"
 giga_frameworld_origin.015.desc:0 "우리는 [giga_planet.GetName]의 핵심 인프라에 우리의 군체 통합을 완료하여, 우리의 존재를 구조 자체와 융합했습니다. 이제 우리는 비할 데 없는 정밀도로 모든 시스템을 조작할 수 있으며, 그 결과로 큰 혜택을 누릴 것입니다."
 giga_frameworld_origin.015.a:0 "정수, 구체화되다."
 giga_frameworld_origin.101.name:0 "합병된 인구 이전됨"
 giga_frameworld_origin.101.desc.a:0 "[From.GetName]의 지역 인구가 이제 [Root.Capital.GetName](으)로 완전히 이동되었습니다. 짧은 실험을 통해, 그렇게 거대한 외부 정착지를 완전하게 관리한다는 것은 우리의 능력 밖이라는 것이 인정되었으며, 추후의 프로토콜은 지역 인구의 효율적인 이전에 초점을 맞출 것입니다.\n\n[From.FrameworldEvent101GetOutpost]"
 giga_frameworld_origin.101.desc.b:0 "설정된 프로토콜에 따라, [From.GetName]의 인구가 [Root.Capital.GetName](으)로 이전되었습니다.\n\n[From.FrameworldEvent101GetOutpost]"
 giga_frameworld_origin.101.a:0 "승인됨."
 giga_frameworld_origin.101.outpost:0 "궤도에 §Y$frameworld_outpost_0$§!가 설치되었으며, 지표면에 궤도 중계지가 남아 있습니다."
 giga_frameworld_origin.101.no_outpost:0 "§Y$frameworld_outpost_0$§!의 건설에 부적합하므로, 아무 조치도 취해지지 않았습니다."
 giga_frameworld_origin.103.name:0 "궤도 잔해 인양됨"
 giga_frameworld_origin.103.desc.a:0 "[From.GetName]에 식민지가 잘 건설되었으니, 우리의 기반시설 승무원들이 궤도에 있는 파손된 기지에 대한 인양 작업을 시작했습니다.\n\n기지 내에서 발견된 통신 장비의 양이 우리가 도착했을 때 지표에서 감지된 활동 수준과 불균형한 득 하여, 기지의 목적은 아직 불확실합니다.\n\n이 기지의 옜 주인의 동기를 완전히 이해하지 못할지도 모르지만, 회수된 재료들의 가치는 확실합니다."
 giga_frameworld_origin.103.a:0 "이상하지만, 쓸모있군."
 giga_frameworld_origin.308.name:0 "자원 탐사대 결과"
 giga_frameworld_origin.308.desc:0 "탐사팀이 진행 중인 자원 조사를 통해 행성 자원 개발 기회를 발견했습니다.[frameworld_outpost_motes.FrameworldEvent308Motes][frameworld_outpost_gases.FrameworldEvent308Gases][frameworld_outpost_crystals.FrameworldEvent308Crystals][frameworld_outpost_betharian.FrameworldEvent308Betharian][frameworld_outpost_zoo.FrameworldEvent308Zoo]"
 giga_frameworld_origin.308.desc.motes.general:0 "이러한 입자는 화학적으로 활성화되었을 떄 폭발적인 운동량을 발생시키며, 요리에 사용되었을 경우에는 매우 매운 맛을 내는 것으로 추측됩니다."
 giga_frameworld_origin.308.desc.motes:0 "\n\n§Y[this.GetName]§!의 탐색 파견대가 풍부한 §H$volatile_motes$§!을 발견했습니다. $giga_frameworld_origin.308.desc.motes.general$"
 giga_frameworld_origin.308.desc.motes.ecu:0 "\n\n§Y[this.GetName]§!의 고대 화학 처리 시설에서 대량의 §H$volatile_motes$§!을 발견했습니다. $giga_frameworld_origin.308.desc.motes.general$"
 giga_frameworld_origin.308.desc.motes.desert:0 "\n\n§Y[this.GetName]§!의 사막 모래에 대한 화학적 분석 결과 §H$volatile_motes$§!이 풍부하게 함유되어 있음이 밝혀졌습니다. $giga_frameworld_origin.308.desc.motes.general$"
 giga_frameworld_origin.308.desc.motes.caverns:0 "\n\n§Y[this.GetName]§!의 지하 동굴 깊은 곳에서 탐험대가 풍부한 §H$volatile_motes$§! 매장지를 발견했습니다. $giga_frameworld_origin.308.desc.motes.general$"
 giga_frameworld_origin.308.desc.gases.general:0 "이러한 가스는 전술적으로 다양하게 사용할 수 있으며 오락용으로도 사용할 수 있습니다."
 giga_frameworld_origin.308.desc.gases:0 "\n\n§Y[this.GetName]§!에 대한 심층 탐사를 통해 아직 개발되지 않은 §H$exotic_gases$§! 매장층을 발견했습니다. $giga_frameworld_origin.308.desc.gases.general$"
 giga_frameworld_origin.308.desc.gases.ecu:0 "\n\n§Y[this.GetName]§!의 고대 산업 구획에 대한 항공 탐지를 통해 §H$exotic_gases$§!가 대량으로 묻혀있는 매장층을 발견했습니다. $giga_frameworld_origin.308.desc.gases.general$"
 giga_frameworld_origin.308.desc.gases.swamp:0 "\n\n§Y[this.GetName]§!의 늪지대를 철저하게 탐사한 결과 §H$exotic_gases$§! 추출 가능 지점이 다수 발견되었습니다. $giga_frameworld_origin.308.desc.gases.general$"
 giga_frameworld_origin.308.desc.gases.bog:0 "\n\n§Y[this.GetName]§!의 늪같은 습지대에 대한 저고도 항공 탐사를 통해 §H$exotic_gases$§! 추출에 적합한 지역 여러 곳을 발견했습니다. $giga_frameworld_origin.308.desc.gases.general$"
 giga_frameworld_origin.308.desc.crystals.general:0 "레이저 무기 시스템 뿐만 아니라 첨단 전자제품에도 잘 어울리는 수정입니다. 그 이유는 훌륭한 굴절 특성 때문입니다."
 giga_frameworld_origin.308.desc.crystals:0 "\n\n§Y[this.GetName]§!의 탐사팀이 거대한 §H$rare_crystals$§! 매장층의 위치를 발견했습니다. $giga_frameworld_origin.308.desc.crystals.general$"
 giga_frameworld_origin.308.desc.crystals.ecu:0 "\n\n§Y[this.GetName]§!의 조사팀이 거의 손상되지 않은 보관 시설에서 대량의 §H$rare_crystals$§!을 발견했습니다. $giga_frameworld_origin.308.desc.crystals.general$"
 giga_frameworld_origin.308.desc.crystals.caverns:0 "\n\n§Y[this.GetName]§!의 지질 탐사를 통해 §H$rare_crystals$§! 형성층이 있는 거대한 동굴을 발견했습니다. $giga_frameworld_origin.308.desc.crystals.general$"
 giga_frameworld_origin.308.desc.crystals.forest:0 "\n\n§Y[this.GetName]§!의 탐사팀이 규산염 나무 숲을 발견했습니다. 이러한 나무를 가공하면 §H$rare_crystals$§!을 추출할 수 있습니다. $giga_frameworld_origin.308.desc.crystals.general$"
 giga_frameworld_origin.308.desc.crystals.reef:0 "\n\n§Y[this.GetName]§!에 대한 해양 조사를 통해 결정화된 산호초를 다수 발견했으며, 이러한 산호초를 수확해 §H$rare_crystals$§!을 얻을 수 있습니다. $giga_frameworld_origin.308.desc.crystals.general$"
 giga_frameworld_origin.308.desc.betharian.general:0 "이 암석은 에너지 생산에 대한 엄청난 잠재력을 지니고 있으며, 알맞게 설계된 발전소에 이용할 수 있습니다."
 giga_frameworld_origin.308.desc.betharian:0 "\n\n§Y[this.GetName]§!에서 대량의 §H베사리안 암석§!이 발견되었습니다. $giga_frameworld_origin.308.desc.betharian.general$"
 giga_frameworld_origin.308.desc.betharian.fields:0 "\n\n자연 형성된 수많은 §H베사리안 암석§!이 §Y[this.GetName]§!에서 발견되었습니다. $giga_frameworld_origin.308.desc.betharian.general$"
 giga_frameworld_origin.308.desc.zoo.general:0 "이러한 생명체들은 무해하며 탐사팀에게 우호적입니다. 또한 외계 생명체를 가까이서 연구할 최적의 조건을 제공하기도 합니다."
 giga_frameworld_origin.308.desc.zoo:0 "\n\n§Y[this.GetName]§!의 동물학 연구를 통해 §H유순한 지역 야생동물§!의 존재를 확인했습니다. $giga_frameworld_origin.308.desc.zoo.general$"
 giga_frameworld_origin.308.desc.zoo.valley:0 "\n\n§Y[this.GetName]§!에 있는 외딴 계곡이 발견되었으며, 이 곳에는 §H유순한 지역 야생동물§!이 살고 있습니다. $giga_frameworld_origin.308.desc.zoo.general$"
 giga_frameworld_origin.308.a:0 "훌륭해."
 giga_frameworld_origin.308.a.tooltip:0 "§L새로운 기회에는 새로운 방법이 필요합니다.§!"
 giga_frameworld_origin.308.a.motes:0 "\n§Y[frameworld_outpost_motes.GetName]§!에서 발견된 §Y£volatile_motes£ $volatile_motes$§!:"
 giga_frameworld_origin.308.a.gases:0 "\n§Y[frameworld_outpost_gases.GetName]§!에서 발견된 §Y£exotic_gases£ $exotic_gases$§!:"
 giga_frameworld_origin.308.a.crystals:0 "\n§Y[frameworld_outpost_crystals.GetName]§!에서 발견된 §Y£rare_crystals£ $rare_crystals$§!:"
 giga_frameworld_origin.308.a.betharian:0 "\n§Y[frameworld_outpost_betharian.GetName]§!에서 발견된 §Y£energy£ 베사리안 암석§!:"
 giga_frameworld_origin.308.a.zoo:0 "\n§Y[frameworld_outpost_zoo.GetName]§!에서 발견된 §Y£unity£ £society_research£ 유순한 외계 생명체§!:"
 giga_situation_frameworld_outposts_type:0 "$giga_frameworld_outpost$ 네트워크"
 giga_situation_frameworld_outposts:0 "$giga_situation_frameworld_outposts_type$"
 giga_situation_frameworld_outposts_desc:0 "§Y$giga_frameworld_outpost_plural$§!은 $origin_frameworld$ 제국의 식민지를 대체하며, $pc_giga_frameworld$에 상당한 성장 보너스를 제공합니다. 우리 네트워크에서 얻는 총 보너스는 여기에서 확인할 수 있습니다.\n\n$EMPIRE_SIZE$ 보정치는 식민지 수와 같으며, £mod_empire_size_colonies_mult£ §Y$MOD_EMPIRE_SIZE_COLONIES_MULT_ORIGINAL$§!의 보정치를 포함합니다."
 giga_situation_frameworld_outposts_stage:0 "$giga_situation_frameworld_outposts$"
 giga_situation_frameworld_outposts_monthly_change_tooltip:0 "이 상황은 진행되지 않습니다."
 giga_situation_frameworld_outposts_approach:0 "일반적인 작전들"
 giga_situation_frameworld_outposts_approach_desc:0 "탐험과 조사"
