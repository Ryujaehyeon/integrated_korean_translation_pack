l_korean:
 mem_scfe_belltower_category:0 "사막 신호"
 mem_scfe_belltower_desc:0 "우리 과학선의 스캐너가 이 사막 행성에 있는 외딴 건물에서 나오는 에너지 신호를 발견했습니다. 승무원들은 이를 조사하기 위한 탐사를 준비하고 있습니다."
 mem_scfe_tower_city_category:0 "예상치 못한 타워"
 mem_scfe_tower_city_category_desc:0 "우리 과학선의 스캐너가 이 거대 가스 행성에서 예상치 못한 것을 감지했습니다: 구름 속에서 거대한 탑이 솟아오르고 있습니다."
 mem_scfe_reverse_engine_category:0 "매장된 문명"
 mem_scfe_reverse_engine_desc:0 "우리 과학선의 스캐너가 황폐화된 세계의 깊은 지하에서 신호를 감지했습니다. 우리 팀은 그 출처를 파악하기 위해 §Y[Root.GetName]§!에 탐사를 보내고자 합니다."
 mem_scfe_failed_hive_category:0 "파괴된 문명"
 mem_scfe_failed_hive_desc:0 "우리 과학선의 스캐너가 §Y[Root.GetName]§!에 고급 문명의 유적을 발견했습니다. 우리 승무원은 조사할 준비가 되어 있습니다."
 mem_scfe_lonely_shroud_category:0 "불가능한 메시지"
 mem_scfe_lonely_shroud_category_desc:0 "우리의 과학 선박이 이 시스템의 깊은 곳에서 장막에 덮인 행성을 발견했습니다. 가까이 다가가자, 비정상적인 방출이 승무원들의 호기심을 자극합니다. 이 저주받은 세계에서 우리와 소통하려는 미공개 지능이 존재할까요?"
 mem_scfe_war_torn_category:0 "황폐한 행성"
 mem_scfe_war_torn_category_desc:0 "우리 과학선의 스캐너가 먼 과거에 §Y[Root.GetName]§!에 가해진 상당한 궤도 폭격의 증거를 발견했습니다."
 mem_scfe_the_first_music_anomaly:0 "첫 번째 음악"
 mem_scfe_the_first_music_anomaly_desc:0 "§Y[Root.GetName]§!을 탐사하는 동안, 우리는 반복적으로 괴력 신호를 수신했습니다. 우리의 과학자들은 이 항성계에서 격렬한 태양풍이 관측되었다고 주장하지만, 이 신호는 태양풍과 같은 자연적 요인에서 발생한 것이 아닙니다.\n\n우리의 과학자들은 이것이 인공 신호라고 판단했으며, 우리가 이 신호를 얼마나 쉽게 발견했는지를 고려할 때, 이 신호를 연구할 필요가 있는 것 같습니다."
 mem_scfe_mem_woorskyr_world_category:0 "산 위에 우뚝 솟은"
 mem_scfe_mem_woorskyr_world_category_desc:0 "§Y[Root.GetName]§!의 가장 두드러진 mem_aspect는 행성을 둘러싸고 있는 듯한 거대한 나무의 존재로, 산들 위로 우뚝 솟아 있습니다. 우리 제국의 식물학자들은 이 특별한 나무의 본질을 깊이 이해하기 위해 심층 연구를 강력히 주장하고 있습니다."
 mem_scfe_mem_koeleothan_world_category:0 "파도 아래의 이동하는 대량"
 mem_scfe_mem_koeleothan_world_category_desc:0 "우리 승무원은 §Y[Root.GetName]§! 아래의 거대한 이동을 관찰했습니다. 그들은 이 현상의 원인을 파악하기 위해 추가 연구를 허용해 줄 것을 요청합니다."
 mem_scfe_mem_xenograss_world_category:0 "외계 농작물 밭"
 mem_scfe_mem_xenograss_world_category_desc:0 "§Y[Root.GetName]§!에서 샘플링 임무를 수행하는 동안 조사 팀은 독특한 풀 종류를 발견했습니다. 이 풀의 특이한 구성과 성장 주기는 이 세계의 토착 식물이 아님을 시사합니다. 흥미롭게도, 이 풀은 주로 큰 분화구 군집에서 자생하며, 우리 과학자들은 수세기 전 중요한 유성 사건에 의해 이 행성에 도입되었을 것이라고 이론화하고 있습니다. 이 발견을 바탕으로, 그들은 외계 풀의 이 광범위한 지역을 더 탐험하기 위해 연장 임무를 요청했습니다. 그들은 또한 조사 중에 어떤 농작물 원형도 만들지 않겠다고 유머러스하게 보장했습니다."
 mem_scfe_quantummem_pearl_world_category:0 "천 개의 세계가 있는 세계"
 mem_scfe_quantummem_pearl_world_category_desc:0 "§Y[Root.GetName]§!에 대한 철저한 조사 및 목록 작성을 진행하는 동안, 우리의 스캐너는 특정 목표 위치와 일치하지 않는 수천 개의 비정상적인 신호를 순간적으로 감지했습니다. 이에 혼란스러워한 탐사 팀은 조사를 계속 진행하며, 이 특이한 장소에 대한 보다 자세한 조사를 위해 다시 돌아오기로 메모했습니다."
 mem_scfe_mem_beetle_world_category:0 "대기 중인 딱정벌레"
 mem_scfe_mem_beetle_world_category_desc:0 "§Y[Root.GetName]§!에 대한 우리의 초기 탐사에서, 우리는 감정이 있는 존재가 아닌 기괴한 통찰력을 가진 딱정벌레로부터 예상치 못한 환영을 받았습니다. 이 딱정벌레는 마치 항상 우리를 관찰하고 있는 것처럼, 우리의 도착과 행보를 예측하는 기괴한 능력을 보여주었습니다. 조사 완료 후, 여러 곤충학자들이 이 매혹적인 곤충에 대한 보다 철저한 연구를 위해 체류를 연장하고자 하는 강한 관심을 표명했습니다."
 mem_scfe_vanishing_act_category:0 "거주 행성"
 mem_scfe_vanishing_act_category_desc:0 "우리의 과학선이 §Y[Root.GetName]§! 궤도에 도착하였고, 즉시 우주 항해 문명의 흔적을 감지하였습니다. 승무원들이 첫 접촉 절차를 시작할 준비를 하고 있습니다."
