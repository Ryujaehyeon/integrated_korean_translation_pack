l_korean:
 mem_hollow_asteroid_resort:0 "특별 보고서"
 mem_hollow_asteroid_protector:0 "인류의 수호자"
 mem_hollow_asteroid_tactics:0 "사냥 전술"
 mem_opinion_pirate_hunter:0 "해적 사냥꾼"
 mem_opinion_pirate_extradite:0 "포로 인도를 거부함"
 mem_opinion_pirate_extradite_accepted:0 "포로 인도를 수락함"
 mem_hollow_asteroid_category:0 "비어있는 소행성?"
 mem_hollow_asteroid_category_desc:0 "스캔에 따르면, 이 소행성의 질량은 그 엄청난 크기에 비해서는 너무 작습니다. 이것은 표면 아래에 어떤 공간이 있음을 암시합니다. "
 mem_hollow_asteroid.1.name:0 "빈 소행성"
 mem_hollow_asteroid.1.desc:0 "소행성은 실제로 속이 비어 있는 것으로 밝혀졌습니다. 사실, 이 소행성은 하나의 소행성이 아니라 작은 소행성들이 얽히고설켜 만들어진 집단입니다. 별 가치는 없지만 기이한 구조입니다."
 mem_hollow_asteroid.1.a:0 "실망스럽군..."
 mem_hollow_asteroid.2.name:0 "함정입니다!"
 mem_hollow_asteroid.2.desc:0 "소행성의 비어 있는 부분에 어떤 외계 시설이 있었던 것으로 보입니다. 그러나 우리 과학 팀이 벽을 뚫자마자 그들은 어떤 자폭 메커니즘을 작동시킨 것 같아, 소행성과 함께 그들 및 그들의 우주선이 증발해 버렸습니다."
 mem_hollow_asteroid.2.a:0 "끔찍하구나!"
 mem_hollow_asteroid.10.name:0 "우주 묘지"
 mem_hollow_asteroid.10.desc:0 "우리 과학 팀이 내부로 들어가면서 예상치 못한 것을 발견했습니다: 죽은 외계인들입니다. 100개가 넘는 시체가 소행성의 벽을 따라 늘어서 있으며, 장식적인 옷을 입고 다양한 일상 용품과 함께 보존되어 있습니다. 이들은 우주의 진공 상태에 의해 보존된 것입니다. 우리의 분석에 따르면 이들은 모두 30만 년 이상 전에 사망한 것으로 보입니다. 이 구조물은 이 외계 종족에 대한 독특한 지식의 원천으로, 그들의 생활 방식과 생리학에 대한 정보를 제공합니다."
 mem_hollow_asteroid.10.a:0 "많은 것을 배울 수 있겟군."
 mem_hollow_asteroid.10.b:0 "이 구조물을 재활용할 순 없겠나?"
 mem_hollow_asteroid.10.c:0 "신과 가까워지길 원했군..."
 mem_hollow_asteroid.10.d:0 "그들의 장식은 환상적이구나!"
 mem_hollow_asteroid.20.name:0 "버려진 우주 관광지"
 mem_hollow_asteroid.20.desc:0 "소행성의 내부는 놀라운 광경을 품고 있습니다. 여러 개의 거주지 캡슐이 소행성의 벽에 붙어 있으며, 그 중심에는 여러 개의 인공 환경을 담고 있는 거대한 투명 구체가 있습니다. 오랫동안 버려지고 비활성화되었지만, 쉽게 재활성화할 수 있으며, 최소한의 조정으로 우리의 필요에 맞게 사용할 수 있습니다."
 mem_hollow_asteroid.20.a:0 "상업용 리조트로 전환해라."
 mem_hollow_asteroid.20.b:0 "가능한 한 많은 시민이 이 장소를 즐길 수 있도록 해라."
 mem_hollow_asteroid.20.c:0 "구조물을 해체하고 그 잔해를 연구해라."
 mem_hollow_asteroid.30.name:0 "고대 미술 전시관"
 mem_hollow_asteroid.30.desc:0 "우리 과학자들이 매우 이상한 것을 발견했습니다. 소행성의 내부 벽에는 수천 개의 큰 결정체가 점점이 박혀 있으며, 이들은 그림 문자와 기하학적 패턴으로 덮여 있습니다. 다양한 형태, 색상 및 조각들 사이에서 팀은 동일한 결정체 한 쌍도 찾을 수 없었습니다. 모든 결정체는 이제 기록을 위해 촬영되었지만, 그 창조자가 무엇을 말하고자 했는지는 영원히 미스터리로 남을지도 모릅니다."
 mem_hollow_asteroid.30.a:0 "멋지군."
 mem_hollow_asteroid.30.b:0 "다른 것이 더 없다면, 연구를 위해 활용해라."
 mem_hollow_asteroid.30.c:0 "창조의 기적에 맞먹는 위업이군."
 mem_hollow_asteroid.30.d:0 "제작자들의 가치관을 나눌 수 있다면...."
 mem_hollow_asteroid.40.name:0 "원형 감옥"
 mem_hollow_asteroid.40.desc:0 "과학 팀이 소행성의 내부에 침입했을 때, 그들은 외벽에 고정된 수많은 작은 생명 포드를 발견했습니다. 중앙에는 큰 구체가 고정되어 있어 모든 포드를 명확하게 볼 수 있습니다. 이 소행성은 이전에 알려지지 않은 고대 종족에 의해 소수의 경비원이 수감자들을 은밀히 관찰할 수 있도록 설계된 고보안 감옥으로 사용된 것으로 보입니다 -- 수감자와 경비원의 유해가 여전히 구조물에 흩어져 있습니다. 정거장의 컴퓨터에서 추출한 데이터 흔적에 따르면, 결함이 있는 소프트웨어 업데이트로 인해 거주자들이 시스템에서 잠겨버려 굶주리게 된 것으로 보입니다. 그들이 구출되지 않은 이유는 명확하지 않으며 -- 적어도 그들의 시신이 회수되지 않은 이유도 불분명합니다."
 mem_hollow_asteroid.40.a:0 "이 교도소의 설계를 연구해야 한다."
 mem_hollow_asteroid.50.name:0 "버려진 프로젝트"
 mem_hollow_asteroid.50.desc:0 "우리 과학팀이 소행성 내부를 탐사하는 동안, 그들은 속이 빈 핵으로 이어지는 복잡한 터널 시스템을 발견했습니다. 명백히 인공적으로 설계된 이 터널은 케이블, 지지 기둥, 그리고 목적이 불분명한 대형 용기로 가득 차 있으며, 모두 밀봉되어 열기 어렵습니다. 소행성 깊숙한 곳에는 데이터 단말기가 들어 있는 작은 구체가 숨겨져 있습니다. 그러나 그들이 포함하고 있을지도 모르는 정보를 해독하는 데는 시간이 걸릴 것입니다."
 mem_hollow_asteroid.50.a:0 "일에 착수하십시오."
 mem_hollow_asteroid.51.name:0 "형성 중인 크라켄"
 mem_hollow_asteroid.51.desc:0 "우리가 [From.GetName] 내부의 단말기에서 추출한 데이터에는 믿을 수 없고 매우 불안한 정보가 포함되어 있습니다. 이곳 전체는 고대의 우주 항해 종족에 의해 유전자 공학의 산물인 강력한 존재, 크라켄의 몸체가 되도록 설계되었습니다. 핵심과 터널은 캔스터 안에 보존된 유전자 씨앗에서 자란 유기체 조직으로 채워질 예정이었습니다. 자가 추진되고 자가 유지되며 창조자의 정신적 통제 하에 있는 이 존재는 혼자서도 전체 함대를 상대하고 이길 수 있을 것입니다.\n\n그러나 이 프로젝트는 미완성인 것으로 보입니다. 캔스터의 노화로 인해 크라켄 유전자 씨앗에 유전적 손상이 발생하여 사용할 수 없게 되었습니다. 그러나 놀라운 재생 능력을 가진 이 존재에 다른 크라켄의 조직을 도입하면 이를 복구하고 우리만의 괴물을 만들어낼 수 있을 것입니다."
 mem_hollow_asteroid.51.a:0 "다른 크라켄을 찾아보자."
 mem_hollow_asteroid.51.b:0 "프로젝트를 중단해라. 어떤 것들은 건드리지 않은 채로 두는 것이 더 낫다..."
 mem_hollow_asteroid.100.name:0 "해적들"
 mem_hollow_asteroid.100.desc:0 "소행성 내부의 자연 동굴 신호가 해적 집단을 끌어당겼습니다. 빠르게 접근하고 있는 작은 무장 함대를 발견했습니다."
 mem_hollow_asteroid.100.a:0 "전투 준비!"
 mem_hollow_asteroid.102.name:0 "해적함대를 물리침"
 mem_hollow_asteroid.102.desc:0 "마지막 해적 방어대가 무력화되었습니다. 이제 전술 팀이 그들의 은신처에 들어가 이를 점령하고 확보할 수 있습니다."
 mem_hollow_asteroid.102.a:0 "강습군을 보내라."
 mem_hollow_asteroid.102.b:0 "이럴 필요 없어! 기지 전체를 가져와라."
 MEM_HOLLOW_ASTEROID_PIRATES:0 "해적 기지 상륙"
 MEM_HOLLOW_ASTEROID_PIRATES_DESC:0 "우리 함대가 해당 지역을 확보했습니다. 이제 지상군이 진입할 시간입니다."
 mem_hollow_asteroid.103.name:0 "해적 은신처"
 mem_hollow_asteroid.103.desc:0 "우리 전술 팀은 해적의 방어를 뚫고 들어가 범죄자들의 절망적이지만 헛된 저항에 직면했습니다. 이 범죄자들 중 많은 수가 총격전에서 사망했지만, 몇몇은 성공적으로 제압되어 현재 구금 중이며 심문을 기다리고 있습니다. 또한, 그들이 수년간 민간인 수송선에서 훔친 상당량의 전리품이 압수되었습니다."
 mem_hollow_asteroid.103.a:0 "잘 된 일이군."
 mem_hollow_asteroid.103.b:0 "잘했어!"
 mem_hollow_asteroid.104.name:0 "해적 재판"
 mem_hollow_asteroid.104.desc.01:0 "우리가 이전에 체포한 해적단은 우리 제국의 민간인으로 구성되어 있었습니다! 이 범죄자들은 도난당한 배를 타고 주요 이동 경로를 벗어나 몰래 나가 민간인 교통을 밀수하고 약탈하며 생계를 유지했습니다. 추가 심문을 통해 이 해적들이 독자적으로 행동했음을 확인했으며, 이제 그들 모두가 사망했거나 구금된 상태이므로 우리는 우리 민간인들에게 공포가 드디어 끝났음을 확신할 수 있습니다.\n\n포로들에 대한 처리는 아직 결정되지 않았습니다."
 mem_hollow_asteroid.104.desc.02:0 "우리가 구금 중인 해적단은 대부분 §Y[mem_hollow_asteroid_pirates_foreign_country.GetAdjective]§! 민간인으로 구성되어 있는 것으로 확인되었습니다. 그들은 수년 동안 민간인 해상 운송로를 테러하며 주로 그들의 이전 국가를 목표로 삼았습니다. 추가 심문을 통해 그들이 독자적으로 행동하고 있었음이 분명해졌으며, 현재 전체 해적단은 사망하거나 체포되었습니다.\n\n§Y[mem_hollow_asteroid_pirates_foreign_country.GetName]§!는 해적들을 송환하여 그들의 국민에 대한 범죄로 재판을 받을 수 있도록 공식 요청을 제출했습니다. 그들의 요청을 거부하는 것은 우리의 외교 관계에 심각한 결과를 초래할 수 있습니다."
 mem_hollow_asteroid.104.a:0 "공개 재판을 열어라."
 mem_hollow_asteroid.104.a.tooltip:0 "공개 재판이 열립니다. \"인류의 수호자\" 변동치는 10년 동안 우리의 제국의 행복도를 5% 증가합니다."
 mem_hollow_asteroid.104.b:0 "간단하게, 이 반역자들을 즉시 처단하라."
 mem_hollow_asteroid.104.b.tooltip:0 "이 반역자들은 공개적으로 처형 될 것입니다. 우리의 영향력이 강화됩니다."
 mem_hollow_asteroid.104.c:0 "공개 재판을 열어라."
 mem_hollow_asteroid.104.c.tooltip:0 "공개 재판이 열립니다. \"인류의 수호자\" 변동치는 10년 동안 우리의 제국의 행복도를 5% 증가합니다. 또한 [mem_hollow_asteroid_pirates_foreign_country.GetName]을 제외한 모든 알려진 제국에 \"해적 사냥꾼\" 의견 변동치를 얻습니다. [mem_hollow_asteroid_pirates_foreign_country.GetName]은(는) 심하게 기분이 상할 것입니다."
 mem_hollow_asteroid.104.d:0 "간단하게, 이 반역자들을 즉시 처단하라."
 mem_hollow_asteroid.104.d.tooltip:0 "이 해적들은 우리의 영향력을 강화하기 위해 공개적으로 처형됩니다. 또한 §Y[mem_hollow_asteroid_pirates_foreign_country.GetName]§!를 제외한 모든 알려진 제국에게 \"해적 사냥꾼\" 의견 변동치를 얻습니다. §Y[mem_hollow_asteroid_pirates_foreign_country.GetName]§!는 심각하게 불쾌해합니다."
 mem_hollow_asteroid.104.e:0 "해적들을 그들에게 내줘라."
 mem_hollow_asteroid.104.e.tooltip:0 "알려진 모든 제국에게 \"해적 사냥꾼\" 의견 변동치를 얻습니다. §Y[mem_hollow_asteroid_pirates_foreign_country.GetName]§!은(는) 우리의 결정에 기뻐할 것입니다."
 mem_hollow_asteroid.104.f:0 "협상을 제시해라."
 mem_hollow_asteroid.104.f.tooltip:0 "포로들은 협조에 대한 대가로 사면을 제안받을 것입니다. [mem_hollow_asteroid_pirates_foreign_country.GetName]은(는) 심하게 불쾌해합니다."
 mem_hollow_asteroid.104.g:0 "협상을 제시해라."
 mem_hollow_asteroid.104.g.tooltip:0 "포로들은 협조를 위한 사면 제안을 받게 됩니다."
 mem_hollow_asteroid.105.name:0 "비밀 은닉처"
 mem_hollow_asteroid.105.desc:0 "우리는 억류된 해적들과 협상을 했습니다. 그들을 사면하는 대신에 그들이 수년 동안 획득한 전리품이 있는 거대한 은닉처의 위치를 ​​우리에게 제공하기로 동의했습니다. 회수된 물건 중에서 우리는 많은 양의 가치 있는 물자와 귀금속을 발견했습니다."
 mem_hollow_asteroid.105.a:0 "좋은 거래군."
 mem_hollow_asteroid.106.name:0 "습격 전술"
 mem_hollow_asteroid.106.desc:0 "형량을 줄이는 대신, 일부 해적들이 그들의 전술 전문 지식을 제공했습니다. 수년간의 약탈 경험은 그들에게 회피와 기동을 위한 여러 가지 요령을 가르쳤고, 우리 함대 지휘부는 그들로부터 배울 점이 많을 것입니다. 이는 향후 갈등에서 우리에게 유리한 점을 줄 것입니다."
 mem_hollow_asteroid.106.a:0 "좋은 거래군."
 mem_hollow_asteroid.107.name:0 "숨겨진 전투순양함"
 mem_hollow_asteroid.107.desc:0 "사면을 대가로 체포된 해적 중 일부가 밀수 작전에서 발견한 특별한 것으로 우리를 안내해 주겠다고 제안했습니다. 큰 피해를 당한 후 승무원이 버린 것처럼 보이는 고급 전투순양함입니다. 그들의 이야기에 따르면, 그들은 언젠가 함선을 다시 활성화할 수 있기를 바라며 거기에 숨겨두었다고 합니다. 그런 날은 절대 오지 않겠지만요. 이 군함을 작동 상태로 복원할 수 있을지도 모릅니다."
 mem_hollow_asteroid.107.a:0 "인상적이군."
 MEM_HOLLOW_ASTEROID_PIRATES_CRUISER:0 "전투 순양함 수리 중"
 MEM_HOLLOW_ASTEROID_PIRATES_CRUISER_DESC:0 "해적들에 따르면, 배는 심하게 망가진 상태라고 합니다. 그러나 우리 과학자와 공학자들은 충분히 수리할 수 있다고 합니다."
 mem_hollow_asteroid.108.name:0 "수리 완료"
 mem_hollow_asteroid.108.desc:0 "해적들이 우리를 이끌었던 전투함은 정말 매혹적입니다. 우리는 이전에 이와 유사한 함선을 본 적이 없으며, 아마도 다시는 보지 못할 것입니다. 그 기원의 정체는 여전히 미스터리로 남아 있습니다. 이제 이 버려진 함선이 수리되고 시스템이 다시 가동되면서, 강력한 함선이 우리의 함대에서 복무할 준비가 되었습니다. 새로운 승무원이 이전 주인들보다 이 함선을 운용하는 데 더 많은 행운이 있기를 바랍니다."
 mem_hollow_asteroid.108.a:0 "정말 이상한 함선이군."
 mem_hollow_asteroid.110.desc:0 " "
