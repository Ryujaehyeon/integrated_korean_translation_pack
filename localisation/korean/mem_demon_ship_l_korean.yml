l_korean:
 mem_demon_ship_category:0 "이상한 신호"
 mem_demon_ship_category_desc:0 "첫 번째 탐사 스캔에서 §Y[Root.GetName]§!의 외부 대기에서 비정상적인 수치가 나타났습니다. 과학 팀은 이러한 수치의 출처에 대해 두 번째 보다 철저한 스캔을 수행하고자 합니다."
 MEM_DEMON_SHIP_PROJECT:0 "초기형 함선 궤도 안정화"
 MEM_DEMON_SHIP_PROJECT_DESC:0 "우리 과학자들은 과학선을 우리의 프로토타입에 도킹함으로써 궤도를 수정하고 안정화할 수 있을 것이라고 확신하고 있습니다. 이는 긴 계산과 정확한 조작을 필요로 합니다. 그들은 세부 사항은 생략하지만, 성공적인 작전을 위한 시간 창이 제한적이라는 사실을 강조합니다."
 mem_demon_ship.103.desc:0 "우리 과학 팀은 이상한 신호의 원인을 확인할 수 없었습니다. 무엇이 있는 건지 혹은 센서 오작동인지는 알 수 없습니다."
 mem_demon_ship.1.name:0 "잃어버린 초기형 함선 발견"
 mem_demon_ship.1.desc:0 "§Y[Root.leader.GetName]§!는 기뻐하고 있습니다. 더 철저한 스캔 후, 이 이상 현상은 우주선으로 밝혀졌습니다. 흥미롭게도, 그것은 우리의 것입니다. 우리의 승무원은 그것이 몇 년 전 시험 비행 중에 잃어버린 우리의 프로토타입 초공간 항법이 가능한 우주선 중 하나임을 인식합니다.\n\n그의 궤도는 불안정하며, 우주선은 천천히 대기로 하강하고 있습니다. 손상된 것 같지는 않지만, 에너지 수치는 최소입니다. 우리는 신호에 대한 응답을 받지 못했습니다.\n\n우주선과 그 승무원에게 무슨 일이 있었는지를 더 조사하기 위해서는 먼저 궤도를 안정시켜야 합니다. [Root.leader.GetName]는 이미 계획을 세웠습니다."
 mem_demon_ship.1.a:0 "우리 함선을 재건하라."
 mem_demon_ship.1.b:0 "저런 구닥다리 함선은 필요없어."
 mem_demon_ship.2.name:0 "궤도 안정화"
 mem_demon_ship.2.desc:0 "예상보다 조금 더 까다로운 상황이 발생했지만 §Y[Root.leader.GetName]§!는 이제 프로토타입이 안정적인 궤도에 있으며 더 면밀히 조사할 준비가 되었습니다. §Y[Root.GetName]§!가 도킹을 시작합니다."
 mem_demon_ship.2.a:0 "기밀을 유지하도록."
 mem_demon_ship.3.name:0 "초기형 함선 손실"
 mem_demon_ship.3.desc:0 "우리는 FTL 초기형 함선의 궤도가 가스 행성의 대기로 가라 앉기 전에 그것을 안정시킬 수 없었고, 파괴되었습니다."
 mem_demon_ship.4.name:0 "긴급 메시지"
 mem_demon_ship.4.desc:0 "긴급 메시지가 §Y[Root.leader.GetName]§! 과학자로부터 도착했습니다: 승무원들이 사망하였으며, 그들의 훼손된 시체가 압력이 낮아진 구획을 떠다니고 있습니다. 진공 상태에서는 부패가 일어나지 않기 때문에 [root.leader.GetSheHe]는 그들이 얼마나 오래 죽어 있었는지 추측할 수밖에 없습니다.\n\n현재로서는 왜 대기가 없는지에 대한 의문이 남아 있으며, 선체는 온전한 것으로 보입니다. 이 배는 한동안 에너지를 소진한 것 같습니다. 더 많은 정보를 알기까지는 시간이 걸릴 것입니다."
 mem_demon_ship.4.a:0 "끔찍하군"
 mem_demon_ship.5.name:0 "냉혹한 발견"
 mem_demon_ship.5.desc:0 "모든 에너지 셀은 소진되어 일부는 최소한의 함선 시스템을 가동하기 위해 §Y[Root.GetName]§!의 예비 셀로 교체해야 했습니다.\n\n로그북에는 승무원들이 첫 번째 초공간 비행에 대한 기쁜 기대 속에서 농담을 나누는 모습이 기록되어 있지만, 함선의 초공간 엔진이 활성화된 직후 모든 녹음이 중단됩니다. 녹음이 다시 시작되기까지 얼마나 시간이 지났는지 평가하기는 어렵습니다. 비행은 끝난 것 같고 분위기는 완전히 변했습니다. 방금 전까지 미소를 짓던 그 얼굴들은 이제 고통으로 일그러져 있으며, 그들이 스스로를 훼손할 때 그들의 비명이 메아리칩니다. 녹음은 갑자기 끝납니다.\n\n더 조사할까요, 아니면 죽은 자를 편히 두어야 할까요?"
 mem_demon_ship.5.a:0 "파괴해라. 아무도 이것을 알아선 안돼."
 mem_demon_ship.5.b:0 "무엇이 일어났는지 알아야 해."
 mem_demon_ship.6.name:0 "FTL 초기형 함선 파괴"
 mem_demon_ship.6.desc:0 "§Y[Root.GetName]§!은 FTL 초기형 함선의 도킹을 해제하고 궤도유지를 위한 에너지를 차단합니다. 잠시 후, 함선은 대기 진입 중 화재로 인해 소실되었습니다."
 mem_demon_ship.6.a:0 "평화가 있기를"
 mem_demon_ship.7.name:0 "마지막 보고서"
 mem_demon_ship.7.desc:0 "센서 데이터 분석을 통해 FTL 사건 동안 기록된 자료를 검토한 §Y[Root.leader.GetName]§!는 프로토타입과 그 승무원이 우리의 존재 평면을 떠나 자연 법칙이 적용되지 않는 다른 차원으로 들어갔다는 결론에 도달했습니다. 심각한 정신적 스트레스가 승무원을 광기로 몰아넣었음에 틀림없습니다.\n\n추가 데이터를 검토하는 동안 과학 담당자는 어두운 존재의 감정에 압도되었고 [root.leader.GetHisHer] 보조원들도 마찬가지였습니다. 그들은 신속하게 데이터 코어를 제거하여 §Y[Root.GetName]§!으로 가져가기로 했습니다.\n\n그들이 배로 돌아온 직후, 우리의 과학 팀은 프로토타입의 FTL 코어 내부에서 에너지 급증을 기록했습니다. 그들은 긴급 분리 절차를 시작했으며, 배가 공허 속으로 사라지기 전에 간신히 절차를 완료했습니다. §Y[Root.leader.GetName]§!는 이 배 자체가 이상한 차원 에너지에 의해 변화되었을 가능성에 대해 추측합니다.\n\n그것이 살아있을까요? 우리는 결코 알 수 없겠지만, 회수된 데이터 코어는 이제 FTL 여행에 대한 중요한 데이터를 제공할 수 있습니다."
 mem_demon_ship.7.a:0 "지식이 확장되고 있군!"
 mem_demon_ship.8.name:0 "마지막 보고서"
 mem_demon_ship.8.desc:0 "센서 데이터 분석을 통해 FTL 사건 중 기록된 §Y[Root.leader.GetName]§!는 프로토타입과 그 승무원이 우리의 존재 평면을 떠나 자연 법칙이 적용되지 않는 다른 차원으로 들어갔다는 결론에 도달했습니다. 심각한 정신적 스트레스가 승무원을 광기로 몰아넣었음에 틀림없습니다.\n\n추가 데이터를 검토하는 동안, [root.leader.GetSheHe] [root.leader.GetWasWere] 승무원들이 싸우고 비명을 지르는 소리에 방해받았습니다. 한 과학자의 조수가 미쳐버린 듯 보였고, "다른 쪽"으로 더 많은 승객을 이동시켜야 한다고 외치며 §Y[Root.GetName]§!를 파괴하려고 했습니다. 많은 운과 몇 가지 부상의 대가로 나머지 팀은 그를 과학선에 가두는 데 성공했습니다.\n\n이 사건 이후, [Root.leader.GetName]는 프로토타입과 그로 인해 "다른 쪽"에서 가져온 모든 것을 원격으로 선박의 자폭 장치를 사용하여 파괴하기로 결정했습니다. 우리는 그 선박과 승무원에게 정확히 무슨 일이 일어났는지 결코 알 수 없겠지만, 우리의 과학 팀은 살아 있으며 수석 과학자의 동료는 회복 중입니다."
 mem_demon_ship.8.a:0 "비극이 끝났군."
 mem_demon_ship.9.name:0 "마지막 FTL"
 mem_demon_ship.9.desc:0 "FTL 사건 동안 기록된 센서 데이터를 분석한 결과, 우리의 과학 팀은 프로토타입과 그 승무원이 우리의 존재 평면을 떠나 자연 법칙이 적용되지 않는 다른 차원으로 들어갔다는 결론에 도달했습니다. 심각한 정신적 스트레스가 승무원을 광기로 몰아넣었음에 틀림없습니다.\n\n과학 데이터의 전송에는 끝부분에 비디오 메시지가 포함되어 있었습니다. 그곳에서 수석 과학자는 [root.leader.GetHisHer] 자신의 눈을 [root.leader.GetHisHer] 손에 들고 카메라 앞에 서서 낮은 목소리로 말합니다: "우리는 이제 저편으로 갑니다." 과학 팀의 고통스러운 비명이 전송을 통해 메아리치고 그 후 전송이 종료됩니다.\n\n우리의 과학 선박을 찾고 있던 회수 팀은 그것의 흔적을 발견하지 못했습니다."
 mem_demon_ship.9.a:0 "끔찍하군"
 mem_demon_ship.9.a.tooltip:0 "탐사선과 승무원을 잃습니다."
