 mem_scfe_celestial_disturbance_clues:0 "발견된 단서"
 mem_scfe_celestial_disturbance_system_name:0 "베히시"
 mem_scfe_celestial_disturbance_home_name:0 "바디알나"
 mem_scfe_celestial_disturbance_home_moon_name:0 "텔칼라린"
 mem_scfe_celestial_init.1.name:0 "새로운 항성계 발견"
 mem_scfe_celestial_init.1.base:0 "우리의 초공간 경로 탐지 시스템에서 최적화가 이루어져 이전에는 감지하지 못했던 희미한 초공간 경로를 발견할 수 있게 되었으며, 이를 통해 탐험되지 않은 항성계를 발견하게 되었습니다."
 mem_scfe_celestial_init.1.desc:0 "$mem_scfe_celestial_init.1.base$ §H아난시§!"
 mem_scfe_celestial_init.point:0 "$mem_scfe_celestial_init.1.name$는 §HAnansi§!입니다."
 mem_scfe_celestial_disturbance.2.name:0 "혼란스러운 항성계"
 mem_scfe_celestial_disturbance.2.desc:0 "이 시스템에 진입하자, 우리 함선의 스캐너가 비정상적인 천체 구성을 감지했습니다. 그 중심에는 중성자별과 M형 항성이 구성하는 인상적인 이중성이 있습니다. 시스템 내 행성들의 궤도는 매우 불규칙해 보이며, 이는 중성자별이 최근에 도착했음을 시사하며, 상당한 중력 교란을 일으켰습니다. 승무원들은 이러한 변화의 결과를 연구하고 이 시스템이 지니고 있을지도 모르는 비밀을 밝혀내기 위해 철저한 탐사를 시작하기를 간절히 원하고 있습니다."
 mem_scfe_celestial_disturbance.3.name:0 "얼음 행성"
 mem_scfe_celestial_disturbance.3.desc:0 "우리 팀은 이 행성 §Y[From.GetName]§!이 원래 태양에서 그렇게 멀지 않았다고 생각하며, 스캔 결과도 이를 확인합니다. 이 행성은 이제 얼어붙은 황무지로, 표면은 1킬로미터 두께의 얼음층으로 덮여 있습니다. 스캔 결과에 따르면, 이 행성은 한때 거주 가능했으며, 중성자별의 도착으로 인한 중력의 격변에 의해 현재의 먼 궤도로 던져지기 전에 태양에 더 가까이 공전하고 있었습니다. 얼음 아래 깊은 곳에서, 당신의 스캐너는 고대 구조물의 잔존자를 감지하며, 여기에서 고급 문명이 한때 번영했음을 시사합니다. 그러나 이 유적을 발굴하려면 상당한 자원과 노력이 필요합니다. 하지만 그게 전부는 아닙니다..."
 mem_scfe_celestial_disturbance.4.name:0 "호기심 많은 실험"
 mem_scfe_celestial_disturbance.4.desc:0 "이 달에서는 매우 흥미로운 과학 복합체를 발견했습니다. 달 기지의 주요 실험실에는 인상적이고 신비로운 장치가 있습니다. 철저한 조사 후, §G[Root.Leader.GetName]§!는 이 장치가 초공간을 생성하기 위한 야심찬 실험의 일환이었다고 판단합니다. 잃어버린 문명은 별로 가는 자신만의 경로를 만들려고 시도했지만 결국 실패하였고, 중성자별의 도래로 인해 그들의 우선순위가 바뀌면서 연구를 포기하게 되었습니다."
 mem_scfe_celestial_disturbance.5.name:0 "혼란스러운 거인"
 mem_scfe_celestial_disturbance.5.desc:0 "이 거대 가스 행성은 이 항성계에서 중성자별의 통과 흔적을 여전히 보여줍니다. §Y[From.GetName]§!의 스캔 결과, 거대 가스 행성이 중성자별의 파괴적인 영향으로 인해 상당한 변화를 겪었음을 알 수 있습니다. 중력의 격변으로 인해 행성이 대부분의 위성을 잃었습니다. 일부는 항성계에서 튕겨 나갔고, 다른 일부는 거대 가스 행성에 너무 가까이 접근하여 찢어져 화려한 고리 시스템을 형성했습니다. 우리는 잔해 속에서 희귀한 광물을 발견하고 이를 모았습니다."
 mem_scfe_celestial_disturbance.6.name:0 "외로운 달"
 mem_scfe_celestial_disturbance.6.desc:0 "거대 가스 행성의 한때 수많았던 위성들 중에서, 단 하나만 궤도를 유지하며 살아남았습니다. 이 위성의 스캔 결과, 고대 채굴 작업의 흔적이 발견되었으나, 현재는 유성의 폭격으로 심각하게 파손된 상태입니다. 해당 지역은 대부분 파괴되어 거의 단서가 남아 있지 않습니다."
 mem_scfe_celestial_disturbance.7.name:0 "녹아내린 세계"
 mem_scfe_celestial_disturbance.7.desc:0 "§Y[From.GetName]§! 현재 이중 태양에 가장 가까운 행성은 한때 더 멀리 위치해 있었습니다. 중성자별의 도착은 궤도를 극적으로 변화시켜 별들이 방출하는 강렬한 열과 방사선에 위험하게 가까워지게 만들었습니다. 행성의 표면은 녹아내려 지옥 같은 풍경이 되었습니다. 이전 구조물이나 생명의 흔적은 모두 파괴되어 황량하고 녹아내린 황무지만 남아 있습니다."
 mem_scfe_celestial_disturbance.8.name:0 "원래의 별"
 mem_scfe_celestial_disturbance.8.desc:0 "§Y[From.GetName]§!, 이 항성계의 원래 항성은 이제 방황하는 중성자별과 함께 은하를 가로지르는 궤도를 공유하고 있습니다. 시간이 지나면서, 죽은 항성의 거대한 중력은 이 항성의 물질 일부를 흡수하여 그 구성과 행동을 변화시켰습니다."
 mem_scfe_celestial_disturbance.9.name:0 "방황하는 별"
 mem_scfe_celestial_disturbance.9.desc:0 "이 중성자별은 이 시스템 내에서 극심한 교란의 주요 원인입니다. 그 강력한 중력장은 주기적으로 동반체에서 물질을 끌어당겨 충분한 물질이 축적될 때 폭발적인 반응을 일으킵니다. 다행히 현재 스캔 결과 이러한 사건이 임박하지 않았음을 나타냅니다."
 mem_scfe_celestial_disturbance.11.name:0 "현실의 균열"
 mem_scfe_celestial_disturbance.11.desc_1:0 "우리 팀이 행성의 스캔을 마치면서, 그들은 현실의 구조에 얇은 균열이 생긴 것을 발견합니다. 이 균열은 행성 위의 일정 거리에서 떠 있습니다. 이 이상현상은 그들이 지금까지 접한 어떤 것과도 다릅니다. 우리의 과학 리더는 이 이상한 현상에 당황해 있습니다. 그것은 얇고 흔들리는 균열로, 시공간의 구조에서 나타나며, 희미하고 변동하는 에너지 수치를 방출하고 있습니다. 이 이상현상의 진정한 본질과 기원은 여전히 미스터리로 남아 있으며, 우리의 감지기가 이를 이해하지 못합니다."
 mem_scfe_celestial_disturbance.11.desc_2:0 "우리 팀이 행성의 스캔을 마치면서, 그들은 현실의 구조에 얇은 균열이 생긴 것을 발견합니다. 이 균열은 행성 위의 일정 거리에서 떠 있습니다. 우리의 과학 리더는 이 현상을 이전에 발견한 것과 유사한 유형의 아스트랄 상흔으로 인식합니다. 그러나 이번 것은 규모가 작고 태양계의 중력장 깊숙한 곳에 위치해 있어 이례적입니다. 이러한 균열에 익숙한 스캐너들도 이번 균열에 대해서는 이해할 수 없으며, 현재로서는 이를 상호작용하거나 더 연구할 방법이 거의 없습니다."
 mem_scfe_celestial_disturbance.12.name:0 "얼음 아래의 비밀"
 mem_scfe_celestial_disturbance.12.desc:0 "전체 항성계가 이제 완전히 탐사되었으므로, 우리의 관심은 §Y[mem_scfe_celestial_disturbance_homeworld.GetName]§!의 얼음 행성과 그 아래 얼음에 묻힌 유적들로 향하고 있습니다. 이 유적들은 이 항성계와 한때 번영했던 잃어버린 문명에 관한 신비를 푸는 중요한 단서를 담고 있을지도 모릅니다. 숨겨진 비밀을 밝혀내기 위해 보다 심층적인 탐사가 필요합니다."
 mem_scfe_celestial_disturbance_dig:0 "$mem_scfe_celestial_disturbance.12.name$"
 mem_scfe_celestial_disturbance_dig_desc:0 "$mem_scfe_celestial_disturbance.12.desc$"
 mem_scfe_celestial_disturbance_dig.1.name:0 "기지 캠프 설립"
 mem_scfe_celestial_disturbance_dig.1.desc:0 "§Y[From.planet.GetName]§!의 표면에 기지 캠프가 설치되었습니다. 북극에 있는 가장 큰 가시적 유적 위에 직접 위치하고 있습니다. 스캐너는 얼음 아래에 뜨거운 공기의 주머니가 있음을 나타내며, 이는 아래의 도시가 얼음의 무게에 의해 파괴되지 않았음을 시사합니다. 기계가 준비되었으므로, 팀은 고대 유적에 숨겨진 비밀을 밝혀내기 위해 드릴링을 시작할 준비가 되어 있습니다."
 mem_scfe_celestial_disturbance_dig.1.a:0 "발굴을 시작합니다."
 mem_scfe_celestial_disturbance_dig.2.name:0 "열기구"
 mem_scfe_celestial_disturbance_dig.2.desc:0 "과학 팀은 얼음 아래에 묻혀 있는 거대한 도시를 부지런히 발굴하고 있습니다. 목표에 가까워지면서 그들은 특이한 조건을 마주하게 됩니다. 도시 주변에서 이전에 감지된 공기 주머니는 매우 뜨거워 얼음이 녹고 있습니다. 이 주머니는 사실 뜨거운 수증기로 가득 차 있어, 이를 뚫기 전에 추가적인 주의가 필요합니다. 외계 도시의 유적은 이제 드러나 있으며, 따뜻한 비에 지속적으로 적셔지고 뜨거운 수증기에 둘러싸여 있습니다. 보호 장비를 착용한 팀은 도시를 탐험하고 그 신비를 밝혀낼 준비를 하고 있습니다."
 mem_scfe_celestial_disturbance_dig.3.name:0 "녹아내린 우물"
 mem_scfe_celestial_disturbance_dig.3.desc:0 "열원 식별에는 그리 오랜 시간이 걸리지 않았습니다: 지면 깊숙이 내려가는 거대한 발광 우물이 발견되었습니다. 그 바닥에서는 과부하가 걸린 것으로 보이는 고대 반응기의 잔존자들이 상당량의 용융 금속으로 탐지되었습니다. 이 우물은 행성 위를 돌고 있는 차원 균열의 중심 바로 아래에 위치하고 있으며, 이는 우연의 일치라고 볼 수 없습니다. 이 현상의 설명은 도시의 잔해 속 어딘가에 있을 것입니다."
 mem_scfe_celestial_disturbance_dig.4.name:0 "박물관"
 mem_scfe_celestial_disturbance_dig.4.desc:0 "가혹한 환경은 탐사를 복잡하게 만들어 팀이 더 넓은 지역을 탐사하기 위해 분리되도록 합니다. 한 그룹은 큰 구조물에 들어가게 되며, 이는 박물관으로 밝혀집니다. 이 문명의 고대 역사는 시간과 물에 의해 대부분 파괴되었지만, 그들은 이 사회의 우주 탐사 노력을 재현하는 밀폐된 방에 접근하는 데 성공합니다. 마침내, 우리의 번역 장치가 작업할 수 있는 무언가를 갖게 되었습니다."
 mem_scfe_celestial_disturbance_dig.5.name:0 "고립된"
 mem_scfe_celestial_disturbance_dig.5.desc:0 "§H제타니안§!의 이야기는 깊은 비극의 연대기입니다. 그들은 은하 탐사의 경계까지 고급 발전을 이루었으나, 항성계 내 초공간 연결의 부족으로 인해 고립되었습니다. 인공 초공간을 만들기 위한 시도를 포함한 그들의 노력에도 불구하고 모든 시도는 실패했습니다. 깊이 단결된 민족으로서, 그들은 냉동 보존된 개인들과 영구적으로 분리되는 생각이 견딜 수 없었기 때문에 느린 식민지 선박을 보내는 것을 원치 않았습니다."
 mem_scfe_celestial_disturbance_dig.6.name:0 "최후의 수단"
 mem_scfe_celestial_disturbance_dig.6.desc:0 "주로 파괴된 과학 단지에서 또 다른 그룹이 보고합니다. 그들은 제타니안의 이야기의 마지막 장을 조합했습니다. 떠돌고 있는 중성자별이 그들의 항성계를 향해 다가오는 것을 감지했을 때, 그들은 자신의 운명이 임박했음을 깨달았습니다. 절망은 그들의 연구에 불을 지폈고, 이는 돌파구로 이어졌습니다: 대체 우주로의 균열 생성. 통로와 목적지가 안전하다고 판단되자, 그들은 균열을 통해 전체 인구를 이 새로운 우주로 대피시켰습니다."
 mem_scfe_celestial_disturbance.13.name:0 "결론"
 mem_scfe_celestial_disturbance.13.desc.a:0 "이제 이 항성계에서 발생한 사건들에 대한 명확한 이해를 갖게 되었습니다. 아이러니하게도, 제타니안의 운명을 결정지은 중성자별은 이 항성계를 은하의 나머지 부분과 다시 연결하는 초공간 경로를 가져왔습니다."
 mem_scfe_celestial_disturbance.13.desc1:0 "$mem_scfe_celestial_disturbance.13.desc.a$ 균열에 대한 질문은 여전히 수수께끼로 남아 있습니다. 그들의 모든 연구는 파괴되어 현재 우리의 이해를 훨씬 초월한 상태입니다. 아마도 미래는 제타니안이 발견한 답을 드러낼 것입니다."
 mem_scfe_celestial_disturbance.13.a:0 "아마도 그렇습니다."
 mem_scfe_celestial_disturbance_site:0 "$mem_scfe_celestial_disturbance.12.name$"
 mem_scfe_celestial_disturbance_site_desc:0 "$mem_scfe_celestial_disturbance.12.desc$"
 mem_scfe_celestial_disturbance_site.1.name:0 "야영지 구축"
 mem_scfe_celestial_disturbance_site.1.desc:0 "§Y[From.planet.GetName]§!의 표면에 기지 캠프가 설치되었습니다. 북극에 있는 가장 큰 가시적 유적 위에 직접 위치하고 있습니다. 스캐너는 얼음 아래에 뜨거운 공기의 주머니가 있음을 나타내며, 이는 아래의 도시가 얼음의 무게에 의해 파괴되지 않았음을 시사합니다. 기계가 준비되었으므로, 팀은 고대 유적에 숨겨진 비밀을 밝혀내기 위해 드릴링을 시작할 준비가 되어 있습니다."
 mem_scfe_celestial_disturbance_site.1.a:0 "발굴을 시작합니다."
 mem_scfe_celestial_disturbance_site.2.name:0 "열기구"
 mem_scfe_celestial_disturbance_site.2.desc:0 "과학 팀은 얼음 아래에 묻혀 있는 거대한 도시를 부지런히 발굴하고 있습니다. 목표에 가까워지면서 그들은 특이한 조건을 마주하게 됩니다. 도시 주변에서 이전에 감지된 공기 주머니는 매우 뜨거워 얼음이 녹고 있습니다. 이 주머니는 사실 뜨거운 수증기로 가득 차 있어, 이를 뚫기 전에 추가적인 주의가 필요합니다. 외계 도시의 유적은 이제 드러나 있으며, 따뜻한 비에 지속적으로 적셔지고 뜨거운 수증기에 둘러싸여 있습니다. 보호 장비를 착용한 팀은 도시를 탐험하고 그 신비를 밝혀낼 준비를 하고 있습니다."
 mem_scfe_celestial_disturbance_site.3.name:0 "녹아내린 우물"
 mem_scfe_celestial_disturbance_site.3.desc:0 "열원 식별에는 그리 오랜 시간이 걸리지 않았습니다: 지면 깊숙이 내려가는 거대한 발광 우물이 발견되었습니다. 그 바닥에서는 과부하가 걸린 것으로 보이는 고대 반응기의 잔존자들이 상당량의 용융 금속으로 탐지되었습니다. 이 우물은 행성 위를 돌고 있는 차원 균열의 중심 바로 아래에 위치하고 있으며, 이는 우연의 일치라고 볼 수 없습니다. 이 현상의 설명은 도시의 잔해 속 어딘가에 있을 것입니다."
 mem_scfe_celestial_disturbance_site.4.name:0 "박물관"
 mem_scfe_celestial_disturbance_site.4.desc:0 "가혹한 환경은 탐사를 복잡하게 만들어 팀이 더 넓은 지역을 탐사하기 위해 분리되도록 합니다. 한 그룹은 큰 구조물에 들어가게 되며, 이는 박물관으로 밝혀집니다. 이 문명의 고대 역사는 시간과 물에 의해 대부분 파괴되었지만, 그들은 이 사회의 우주 탐사 노력을 재현하는 밀폐된 방에 접근하는 데 성공합니다. 마침내, 우리의 번역 장치가 작업할 수 있는 무언가를 갖게 되었습니다."
 mem_scfe_celestial_disturbance_site.5.name:0 "고립"
 mem_scfe_celestial_disturbance_site.5.desc:0 "§H제타니안§!의 이야기는 깊은 비극의 연대기입니다. 그들은 은하 탐사의 경계까지 고급 발전을 이루었으나, 항성계 내 초공간 연결의 부족으로 인해 고립되었습니다. 인공 초공간을 만들기 위한 시도를 포함한 그들의 노력에도 불구하고 모든 시도는 실패했습니다. 깊이 단결된 민족으로서, 그들은 냉동 보존된 개인들과 영구적으로 분리되는 생각이 견딜 수 없었기 때문에 느린 식민지 선박을 보내는 것을 원치 않았습니다."
 mem_scfe_celestial_disturbance_site.6.name:0 "최후의 수단"
 mem_scfe_celestial_disturbance_site.6.desc:0 "주로 파괴된 과학 단지에서 또 다른 그룹이 보고합니다. 그들은 제타니안의 이야기의 마지막 장을 조합했습니다. 떠돌고 있는 중성자별이 그들의 항성계를 향해 다가오는 것을 감지했을 때, 그들은 자신의 운명이 임박했음을 깨달았습니다. 절망은 그들의 연구에 불을 지폈고, 이는 돌파구로 이어졌습니다: 대체 우주로의 균열 생성. 통로와 목적지가 안전하다고 판단되자, 그들은 균열을 통해 전체 인구를 이 새로운 우주로 대피시켰습니다."
