 mem_mortis_spores_section:0 "집단"
 mem_mortis_spores_cap:0 ""
 MEM_MORTIS_SPORE:0 "균사체 식민지"
 MEM_MORTIS_SPORE_desc:0 "이 작은 "생물"들은 우주에서 일관된 구조를 형성합니다. 그들은 우주 생물을 목표로 삼아 포자로 감염시켜 복제하는 것을 선호합니다."
 MEM_MORTIS_SPORE_KAMIKAZE_TT:0 "1 §Y$MEM_MORTIS_SPORE$§!을(를) 생성합니다. 함선 내구도가 5% 미만일 경우 사용된 해군 용량당"
 mem_mortis_spore:0 "균사체 식민지"
 mem_mortis_spore_desc:0 "이 작은 "생물"들은 우주에서 일관된 구조를 형성합니다. 그들은 우주 생물을 표적으로 삼아 포자로 감염시켜 복제하는 것을 선호합니다."
 NO_COMMUNICATIONS_MEM_MORTIS:0 "미세 외계인"
 mem_mortis_fc_1:0 "우리의 감지기가 기기에서 희미한 맥박을 감지했습니다. 리드미컬하지만 불규칙하게, 마치 결코 반복되지 않는 신호처럼요. 이 작은 입자들은 활성화된 것처럼 보이며, 그것들이 의도적인 것인지 아닌지에 대해서는 아무도 확신할 수 없습니다."
 mem_mortis_fc_2:0 "우리 전문가들은 관측된 신호가 식물 호르몬이며 입자가 일종의 균사체라는 것을 깨달았습니다. 우주를 떠다니는 방대한 곰팡이 네트워크가 집단 형성으로 이루어져 있으며, 이른바 §Y$mem_mortis_spores_plural$§!가 함께 이동하며, 공허를 가로질러 화학적 및 전자기적 속삭임을 교환하고 있습니다. 신호가 의사소통의 시도인지 아니면 그들의 집단적 존재의 부산물에 불과한지는 여전히 알려져 있지 않습니다.\n\n$mem_mortis_spore_desc$"
