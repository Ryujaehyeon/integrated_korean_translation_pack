 mem_mortis.101.name:0 "생명의 징후"
 mem_mortis.101.desc:0 "$mem_mortis_fc_1$"
 mem_mortis.102.name:0 "우리 사이의 균류"
 mem_mortis.102.desc:0 "$mem_mortis_fc_2$"
 mem_mortis.102.a:0 "정말 매혹적입니다."
 mem_mortis.120.name:0 "장막 공생체"
 mem_mortis.120.desc:0 "감지기가 $mem_Fungal_Chorus$를 모니터링한 결과, 그 행동의 변화가 감지되었습니다. 이 작은 생물들은 어떻게든 현실을 뚫고 들어가며, 장막의 가혹한 환경에 적응하여 그들의 집단이 저 너머의 이상한 후원자와 융합되었습니다. 장막 존재가 그들과 단순한 계약 이상의 것을 형성한 것처럼 보입니다. 모든 가능성에 반하여 결과는 장막 공생이었습니다."
 mem_mortis.601.title:0 "용이 해적을 물리쳤습니다."
 mem_mortis.601.desc:0 "죽은 드래곤이 사라지자, 근처의 함선 엔진이 가동되기 시작했습니다. 잠시 후, 그 함선이 우리 지역 함대에 신호를 보냈습니다."
 mem_mortis.601.a:0 "당신은 누구입니까?"
 mem_mortis.601.a.response:0 "한바탕 모험을 즐기는 군인, 비열한 개 같은 군인, 그리고 감히 가까이 다가오는 모든 무지한 우주 생물들의 천적!"
 mem_mortis.601.b.response:0 "수염이라고? 그래, 왜 안 되겠어! 더 이상 너의 어리석은 질문은 없겠지?"
 mem_mortis.601.c:0 "이제 무엇을 할 계획인가요?"
 mem_mortis.601.c.response:0 "아르르, 혹시 무시무시한 용병들이 절실하신가요? 당신의 깃발 아래에서 돕고 항해할 잔인한 해적들이 필요하신가요?"
 mem_mortis.601.d:0 "죽다"
 mem_mortis.610.name:0 "미친 개"
 mem_mortis.610.desc:0 "별들이여, 우리가 찾았다, 친구들! 가장 괴물 같은 거대 생물, 깊고 어두운 무한의 심연에 숨어 있다! 어떤 타이탄보다도 더 큰 악몽의 생물! 전투 준비하라! 이 우주 괴물을 물고기 사료로 만들어 버리겠다! 무기를 들어라, 개자식들아!"
 mem_mortis_foundation:0 "첫 번째 기초"
 mem_mortis_foundation_desc:0 "작은 역사에 집착하는 과학자들의 전초 기지."
 mem_mortis_shroomed_planet:0 "죽음의 균류 감염"
 mem_mortis_shroomed_planet_desc:0 "이 행성은 공격적인 곰팡이 감염에 의해 점령되었습니다. 적대적인 환경으로 간주해야 합니다."
 mem_mortis_pirate_insight:0 "해적의 통찰"
 mem_mortis_pirate_insight_desc:0 "약탈 경로에 대한 상세 정보"
 mem_mortis_psi_power_modifier:0 "버섯화 수준"
 mem_mortis_psi_power_modifier_unique:0 "승격된 버섯"
 mem_mortis_shroomed_planet_remains:0 "진정된 네크로-버섯"
 NO_COMMUNICATIONS_MEM_MORTIS_SPORE:0 "생물학적 먼지 구름"
 ftl_components_bio:0 "생체 스러스터"
 sensor_components_bio:0 "감지기 부품: 생체 감지기"
 bombardment_mem_mortis_fungi_bombardment:0 "죽음의 균류 확산"
 bombardment_mem_mortis_fungi_bombardment_desc:0 "살아있는 물질을 무감각한 살덩어리로 변하게 하는 전염성이 강한 곰팡이 감염입니다."
 NAME_mem_mortis_arrfish:0 "아드미랄 야르피쉬"
 mem_mortis_arrfish_catchphrase:0 "우정은 에너지 크레딧보다 더 소중하다고들 합니다."
 mem_mortis_arrfish_backstory:0 "$NAME_mem_mortis_arrfish$는 한 작은 원시 제국의 함대를 지휘했습니다. 그가 고향을 떠나 있는 동안 $mem_Fungal_Chorus$이 그의 종족을 감염시켜 거의 멸종에 이르게 했습니다. 몇 안 되는 생존 함선과 함께 그는 그의 동족과 함께 깊은 우주로 도망쳐 그들의 마지막 잔재를 형성했습니다. 지금도 그는 복수를 다짐하고 있지만, 대부분의 시간은 사소한 약탈에 정신이 팔립니다...."
