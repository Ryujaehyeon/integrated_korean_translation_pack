 leader_trait_mem_mortis_arrfish_desc:0 ""
 r_mem_mortis_undead_scale:0 "균류 포자 주머니"
 r_mem_mortis_undead_scale_desc:0 "이 희귀한 표본은 감염된 드래곤에서 수확되었습니다. 포함된 포자는 매우 적응력이 뛰어나며 거의 죽어가는 존재를 감염시킬 수 있습니다."
 r_mem_mortis_undead_scale_effect:0 "§Y10§! £pop£ §H언데드 팝§!를 §Y100§! $farmer_type_plural_with_icon$마다 각 £planetsize£ 행성에서 생성합니다."
 mem_mortis_serpents_fang:0 "세계 뱀의 송곳니"
 mem_mortis_serpents_fang_desc_short:0 "거대한 이빨로, 태양계에 걸쳐 있는 요르문간드의 잔해에서 나온 것입니다."
 mem_mortis_serpents_fang_desc_details:0 "이른바 세계 뱀은 $mem_mortis_archive_0$을 영원히 지켜보았습니다. 이제는 단순한 사냥 트로피로 전락했습니다."
 mem_mortis_archive_0:0 "은하 데이터베이스"
 mem_mortis_archive_0_MEGASTRUCTURE_DETAILS:0 "$mem_mortis_archive_0_DESC$"
 mem_mortis_archive_0_DESC:0 "은하 역사에 대한 거의 완벽한 복제본이 데이터베이스에 보관되어 있으며, 일반적인 문구와 제국의 흥망성쇠에 대한 문서와 같은 사소한 세부사항을 포함하고 있습니다."
 mem_mortis_archive_1:0 "$mem_mortis_archive_0$"
 mem_mortis_archive_1_DESC:0 "$mem_mortis_archive_0_DESC$"
