 mem_mortis.614.name:0 "은하의 끝"
 mem_mortis.614.desc:0 "[root.GetName]는 [from.GetName] 항성계가 있는 은하의 가장자리에 도착했습니다. 그 안에는 시스템의 죽어가는 블랙홀을 감싸고 있는 거대한 우주 뱀이 기다리고 있습니다."
 mem_mortis.614.a:0 "짐승과 맞서라!"
 building_mem_mortis_bio:0 "진홍색 버드나무"
 building_mem_mortis_bio_desc:0 "이 지역의 붉은 바다에만 의존하는 독특하게 이상한 식물의 싹입니다. 이 종은 수세기 동안 적응하였으며, 이 행성 표면에만 존재하는 영양분으로 번성합니다."
 d_mem_mortis_bio:0 "피의 해양"
 d_mem_mortis_bio_desc:0 "독성 추출물로 가득 찬 붉은 바다. 오직 지역 식물만이 적응하여 독소를 영양소로 전환할 수 있었습니다."
 building_mem_mortis_synth:0 "빛나는 촉매"
 building_mem_mortis_synth_desc:0 "지역의 $d_mem_mortis_cyber$의 독특한 특성을 활용하기 위한 저장 및 필터링 시설입니다. 전통적인 재활용과는 달리, 이 반짝임은 접촉하는 모든 것을 변형시킵니다."
 d_mem_mortis_synth:0 "반짝이는 호수"
 d_mem_mortis_synth_desc:0 "Shimmer는 반짝이고 진주빛의 비누 물입니다. 이 물질은 주어진 어떤 원소도 변환할 수 있는 능력을 가지고 있습니다. Shimmer는 우리가 아는 어떤 형태의 생명체에도 해로운 것으로 보이며, 이로 인해 형성된 호수는 완전히 불모 상태가 되어 수경 재배에 사용할 수 없습니다."
 building_mem_mortis_psionic:0 "안개 정제소"
 building_mem_mortis_psionic_desc:0 "사이오닉 능력을 향상시키기 위해 지역 안개를 활용하는 강화 시설입니다. 잠재적인 응용 가능성은 매혹적이지만, 초자연적인 것을 과소평가해서는 안 됩니다."
 d_mem_mortis_psionic:0 "환상의 안개"
 d_mem_mortis_psionic_desc:0 "행성 주위에는 짙고 보랏빛 안개가 감싸고 있습니다. 표면을 돌아다니는 누구에게나 완벽한 삶에 대한 달콤한 환상을 보여주며, 모든 소원이 이루어지고 모든 욕망과 필요가 끝나는 모습을 제공합니다."
 building_mem_mortis_cyber:0 "웅덩이 조형기"
 building_mem_mortis_cyber_desc:0 "지역 액체를 유용한 사이버 장비로 변형하는 산업 기계입니다. 근로자들은 때때로 제품에 의해 자신의 얼굴이 복제되는 불안한 경험을 묘사합니다."
 d_mem_mortis_cyber:0 "변형하는 웅덩이"
 d_mem_mortis_cyber_desc:0 "형태를 바꾸는 금속 액체로 가득 찬 풀입니다. 이 물질은 끊임없이 변화하며 사라지는 것만큼 빠르게 형태를 형성합니다. 가까이 다가오는 기계는 완벽하게 복제될 수 있습니다."
 d_mem_mortis_cyber_tt:0 "['building:building_mem_mortis_cyber']를 잠금 해제합니다."
 d_mem_mortis_synth_tt:0 "['building:building_mem_mortis_synth']를 잠금 해제합니다."
 d_mem_mortis_bio_tt:0 "['building:building_mem_mortis_bio']를 잠금 해제합니다."
 d_mem_mortis_psionic_tt:0 "['building:d_mem_mortis_psionic']를 해제합니다."
 mem_mortis_roar_title:0 "세계 뱀의 포효"
 mem_mortis_roar_desc:0 "강력한 뱀 모양의 포효는 우리 승무원들을 어리둥절하게 만들고 함선에 피해를 입혔습니다."
 mem_mortis_behemoth:0 "뱀의 강화 효과"
 mem_mortis_behemoth_roar:0 "뱀의 포효"
 mem_mortis_behemoth_roar_stun:0 "뱀의 눈부신 포효"
