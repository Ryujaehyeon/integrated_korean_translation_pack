l_korean:
 mem_lunatics_category:0 "광기의 조수"
 mem_lunatics_category_desc:0 "§Y[From.GetName]§!의 궤도 스캔에서 극심한 현지 조수에 정기적으로 얻어맞는 고대의 온전한 구조물이 감지되었습니다. 추가 조사를 통해 그 목적을 알 수 있을지도 모릅니다."
 tech_mem_lunatics_tidals:0 "달 에너지 활용"
 tech_mem_lunatics_tidals_desc:0 "달의 위상에 따라 전력을 적극적으로 활용하도록 발전기를 재건하면 출력이 향상될 수 있습니다."
 mem_lunatics.1.name:0 "광기의 행위"
 mem_lunatics.1.desc:0 "고대 구조물은 극심한 현지 조수에 정기적으로 부딪히며, 거대한 조력 발전기로 동력을 얻고 있습니다. 내부에서 우리 과학자들은 의식 목적으로 만들어진 듯한 여러 방을 발견했습니다. 벽을 덮은 현지 달의 그림과 다양한 숭배 행위를 하는 사람들을 상징하는 것으로 보이는 그림들이 이를 시사합니다. 우리가 도착했을 때 이 방들 대부분은 봉인되어 있었습니다. 안에서 우리 팀은 바닥에 누운 시신들을 발견했습니다. 그들 중 다수는 스스로를 죽이거나, 불구로 만들거나, 훼손한 것으로 보입니다. 해독된 일부 기록은 이것을 ""조수 협약""이라 부르며 달의 여신을 기쁘게 하기 위한 의식 행위를 언급합니다. 이상하게도 추가 연구는 달의 위상과 조력 에너지 생산 사이에 초기 계산이 예측한 것 이상의 연결이 있음을 드러냈습니다."
 mem_lunatics.1.a:0 "잠재력이 있군."
 mem_lunatics.1.b:0 "공허화."
 mem_lunatics.1.c:0 "가져갈 수 있는 것은 가져가라."
 mem_lunatics.2.name:0 "달의 광인들"
 mem_lunatics.2.desc:0 "조수 협약의 역사에 대한 발견 이후, 우리 과학자들은 달이 식민지에 미치는 영향을 분석했고, 식민지의 에너지 생산을 눈에 띄게 늘릴 방법이 있을 수 있음을 깨달았습니다. 달의 위상에 따라 전력을 적극적으로 활용하도록 발전기를 개조하면 출력이 향상될 것입니다. 조력의 효과가 가장 강할 때, 이 조력 발전기에 특수 제작 터빈을 장착하면 더 높은 효율로 에너지를 활용할 수 있습니다. 그러나 시제품을 작업하던 일부 기술자들은 동료들의 이상한 행동을 보고했습니다. 분명 통상 과학으로는 정량화할 수 없는 힘이 작용하고 있는 듯합니다..."
 zone_mem_lunatics_energy:0 "조력 농장"
 zone_mem_lunatics_energy_desc:0 "조력의 효과가 가장 강할 때, 조력 발전기에 특수 제작 터빈을 장착하면 더 높은 효율로 에너지를 활용합니다."
 zone_mem_lunatics_energy_spiritualist:0 "조력 성소"
 zone_mem_lunatics_energy_spiritualist_desc:0 "조력의 효과가 가장 강할 때, 우리는 숭배하는 신들에게 가장 가까워집니다."
