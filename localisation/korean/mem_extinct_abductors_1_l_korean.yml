l_korean:
 mem_extinct_abductors_category:0 "고대 복합단지"
 mem_extinct_abductors_category_desc:0 "우리 조사 팀은 §Y[From.GetName]§!에 있는 고대 건물의 외딴 복합체를 발견했습니다. 이전 식민지의 다른 흔적은 찾을 수 없습니다. 우리 팀은 이를 더 조사하고자 합니다."
 mem_extinct_abductors.2.name:0 "고대 복합단지"
 mem_extinct_abductors.2.desc:0 "우리 조사팀은 흥미로운 것을 발견하지 못했습니다. 이곳은 가치 있는 정보와 기술이 모두 제거되어 텅 비어 있었습니다. 이전 소유자들이 이곳을 질서 관리 노예처럼 떠났는지, 아니면 고철주이들이 남은 것을 모두 챙겼는지는 불확실합니다."
 mem_extinct_abductors.2.a:0 "좋아. 넘어가자고."
 mem_extinct_abductors.3.name:0 "고귀한 희생"
 mem_extinct_abductors.3.desc:0 "복잡한 구조물의 깊은 곳에서 §Y[From.GetName]§! 우리 조사팀은 나중에 이곳의 이전 소유자들이 실험했던 위험한 돌연변이 물질로 밝혀진 이상한 물질에 오염되었습니다. 배로 돌아온 후, 조사팀의 여러 구성원들이 고통과 분노로 인해 미쳐버린 왜곡된 괴물로 변하기 시작했습니다. 이러한 돌연변이는 승무원들 사이에서 급속도로 퍼졌고 상황이 통제 불능에 이르자, §Y[Root.leader.GetName]§! 탑승한 주 과학자는 [Root.GetHisHer] 마지막 남은 이성의 순간에 우주선을 행성과 충돌하도록 설정할 수 있었습니다. 이후의 초공간 충격은 §Y[From.GetName]§!의 대규모 파괴를 초래했으며, 조사팀이 이전에 조사했던 복합체를 포함하여 추가적인 위협을 피할 수 있었습니다."
 mem_extinct_abductors.3.a:0 "용감한 장교를 기리겠다."
 mem_extinct_abductors.47.desc:0 "이 이벤트가 보인다면 버그가 발생한 것입니다. MEM팀에 버그를 신고해 주세요"
 mem_ea_uplifter.100.name:0 "외로운 전초기지"
 mem_ea_uplifter.100.desc:0 "우리 조사 팀이 §Y[From.GetName]§!에 있는 외딴 복합체에 대한 예비 탐사를 막 끝마쳤습니다. 불행히도 구조적 손상으로 인해 그들은 지금까지 유용한 정보를 얻지 못했습니다. 무너진 구획을 통과할 수 있는 길을 만들기 위해서는 중장비가 필요할 것입니다."
 mem_ea_uplifter.100.a:0 "알았다."
 mem_ea_uplifter_digsite_1:0 "외로운 전초기지"
 mem_ea_uplifter_digsite_1_desc:0 "§Y[From.Planet.GetName]§!에서 발견된 시설은 궤도 폭격의 대상이 되었음에도 전체적인 구조는 여전히 멀쩡합니다. 하지만 내부는 완전히 엉망입니다. 무너진 방들과 복도에 가득한 잔해들이 우리 팀의 조사를 막고 있습니다. 폐허 내부로 안전하게 진입할 통로를 확보하기 위해선 중장비가 필요합니다."
 mem_ea_uplifter.102.name:0 "다 어디갔지?"
 mem_ea_uplifter.102.desc:0 "막힌 복도와 반쯤 무너진 방들 속에서 길을 찾느라 고군분투하던 발굴 팀은 마침내 이전보다 덜 황폐한 구역에 도달했습니다. 접근 가능한 지역은 순수한 민간인 거주 지역의 인상을 줍니다. 그러나 지금까지 원래 주민들의 행방에 대한 단서는 발견되지 않았습니다.\n\n복합체의 중심에는 깊은 곳까지 이어지는 거대한 엘리베이터 샤프트가 있습니다. [Root.leader.GetName]는 그곳에서 답을 찾기를 희망하며 미지의 세계로 더 깊이 들어갈 준비를 합니다."
 mem_ea_uplifter.102.a:0 "계속 나아가라."
 mem_ea_uplifter.103.name:0 "놀라운 발견"
 mem_ea_uplifter.103.desc:0 "표면 아래 깊은 곳에서 우리의 발굴 팀은 수천 개의 냉동 포드에 의해 둘러싸인 큰 홀 안에 서 있습니다. 그 포드에는 수천 년 동안 누워 있던 다양한 종의 유해가 있습니다. 그러나 이것이 전부는 아닙니다...\n\n처음에 [Root.leader.GetName]은 [Root.leader.GetHisHer] 스캐너의 오작동이라고 생각했습니다. 여러 번의 반복 스캔과 스캐너 교체에도 불구하고 같은 결과가 나왔고, 이제 우리는 더 많은 질문에 직면하게 되었습니다: 왜 일부 고인은 §Y[Root.Owner.GetSpeciesAdj]§! 출신이며, 그들은 어떻게 여기까지 오게 되었을까요?!"
 mem_ea_uplifter.103.a:0 "이게 어떻게 된 일이지?"
 mem_ea_uplifter.104.name:0 "얼어붙은 표본"
 mem_ea_uplifter.104.desc:0 "우리 과학자들은 냉동 포드 안에서 우리 종을 제외한 최소 다섯 종을 확인했습니다. 가장 흔한 종은 소형의 두 발로 걷는 종으로, 우리 팀은 이 장소의 건설자로 간주하고 있습니다. 그들이 모두 같은 방에 있다는 사실은 의문을 제기합니다. 그들은 자발적으로 이곳에 있었던 것일까요?\n\n우리 과학자들이 중앙 컴퓨터의 데이터 메모리로부터 재구성한 바에 따르면, 답은 "예"인 것 같습니다. 우리의 단편적인 정보는 이곳의 소유자들이 추진하던 거대한 업리프팅 프로젝트일 가능성을 나타냅니다. 그들은 또한 나머지 네 종의 고향 행성 좌표를 발견했습니다. 우리는 다른 팀이 데이터 저장소의 잔해를 조사하는 동안 이들을 조사해야 합니다."
 mem_ea_uplifter.104.a:0 "매우 흥미롭군."
 mem_ea_uplifter.1.name:0 "깜짝 놀랄만한 발견"
 mem_ea_uplifter.1.desc:0 "§Y[From.GetName]§!에 위치한 복합체는 분명히 심각한 궤도 폭격의 대상이었으나 여전히 대부분은 온전합니다. 그럼에도 불구하고 내부는 형편이 좋지 않습니다. 우리 팀은 막힌 복도와 반쯤 무너진 방들로 이루어진 미로를 헤매는 데 어려움을 겪었습니다. 그러나 그들의 노력은 보상을 받았고, 그들은 3층 지하에 위치한 큰 홀을 발견했습니다. 그 홀은 수천 개의 냉동 포드로 가득 차 있었고, 그 안에는 수천 년 동안 누워 있던 다양한 종의 유해들이 있었습니다. 이 샘플 중 일부는 §Y[Root.Owner.GetSpeciesAdj]§! 출신입니다!"
 mem_ea_uplifter.1.a:0 "그게 가능하단 말인가?"
 MEM_EA_UPLIFTER_INVESTIGATION:0 "얼어붙은 표본"
 MEM_EA_UPLIFTER_INVESTIGATION_DESC:0 "우리 과학자들은 §Y[From.GetName]§!에서 수상한 냉동 보관소를 자세히 조사하기 원합니다."
 mem_ea_uplifter.2.name:0 "얼어붙은 표본"
 mem_ea_uplifter.2.desc:0 "우리 과학자들은 §Y[From.From.GetName]§!의 냉동 포드 안에서 우리 종을 제외한 최소 다섯 종을 확인했습니다. 가장 흔한 종은 소형의 두발 보행자로, 우리 팀은 이들이 이 장소의 건설자라고 보고 있습니다. 그들이 모두 같은 방에 누워 있다는 사실은 의문을 제기합니다. 그들은 모두 자발적으로 이곳에 있었던 것일까요?\n\n우리 과학자들이 중앙 컴퓨터의 데이터 메모리에서 재구성한 바에 따르면, 그 대답은 "예"인 것 같습니다. 우리의 단편적인 정보는 이곳의 소유자들이 추진하던 거대한 업리프팅 프로젝트일 가능성을 나타냅니다. 그들은 또한 나머지 네 종의 고향 행성의 좌표를 발견했습니다. 우리는 다른 팀이 데이터 저장소의 잔해를 조사하는 동안 이들을 조사해야 합니다."
 mem_ea_uplifter.2.a:0 "아주 흥미로워."
 mem_ea_uplifter_chain_title:0 "죽은 자의 기원"
 mem_ea_uplifter_chain_desc:0 "냉동 보관실에서 발견한 다른 종의 기원에 대해 자세히 알아보십시오."
 mem_ea_uplifter_worlds_visited:0 "기원 조사"
 mem_ea_uplifter_system_1:0 "첫번째 성계 좌표"
 mem_ea_uplifter_system_1_desc:0 "냉동 보관실의 기록에 따르면 [mem_ea_uplifter_system_1.GetName]이(가) 얼어붙은 종족 중 하나가 기원한 행성일 수 있습니다."
 mem_ea_uplifter_system_2:0 "두번째 성계 좌표"
 mem_ea_uplifter_system_2_desc:0 "냉동 보관실의 기록에 따르면 [mem_ea_uplifter_system_2.GetName]이(가) 얼어붙은 종족 중 하나가 기원한 행성일 수 있습니다."
 mem_ea_uplifter_system_3:0 "세번째 성계 좌표"
 mem_ea_uplifter_system_3_desc:0 "냉동 보관실의 기록에 따르면 [mem_ea_uplifter_system_3.GetName]이(가) 얼어붙은 종족 중 하나가 기원한 행성일 수 있습니다."
 mem_ea_uplifter_system_4:0 "네번째 성계 좌표"
 mem_ea_uplifter_system_4_desc:0 "냉동 보관실의 기록에 따르면 [mem_ea_uplifter_system_4.GetName]이(가) 얼어붙은 종족 중 하나가 기원한 행성일 수 있습니다."
 mem_ea_uplifter.3.name:0 "첫번째 성계 도착"
 mem_ea_uplifter.3.desc:0 "우리는 고대 복합단지의 데이터에서 발견된 첫 번째 성계에 도달했습니다. 이 성계는 독성 가스의 두꺼운 층 덮인 행성을 가지고 있군요. 우리의 탐사대는 조사 작업을 즉시 시작할 준비가 되어 있습니다."
 mem_ea_uplifter.3.a:0 "그리하도록."
 mem_ea_uplifter.4.name:0 "두번째 성계 도착"
 mem_ea_uplifter.4.desc:0 "우리 함선은 고대 복합단지의 데이터 저장 장치에서 발견된 좌표에 막 도착했습니다. 함선 센서는 즉시 성계 전체에 흩어져있는 여러 적대적인 신호를 포착했습니다. 우리가 목적지에 도착하기를 원한다면 싸울 준비를 해야 합니다."
 mem_ea_uplifter.4.a:0 "우리는 싸울 것이다."
 mem_ea_uplifter.5.name:0 "세번째 성계 도착"
 mem_ea_uplifter.5.desc:0 "세 번째 종족의 모행성 좌표는 우리를 수킬로미터 두께의 얼음 껍질로 덮인 얼음 행성으로 안내했습니다. 우리는 이 행성에 대한 조사를 시작할 준비가 되어 있습니다."
 mem_ea_uplifter.5.a:0 "알았다."
 mem_ea_uplifter.6.name:0 "네번째 성계 도착"
 mem_ea_uplifter.6.desc:0 "이 시스템에 도착한 후 인근 우주를 간단히 스캔한 결과, 황량한 행성이 냉동 챔버에서 발견된 네 번째 종의 고향임을 확인했습니다. 더 이상 어떤 생명체도 지탱하지 않는 것 같습니다. 우리의 과학자가 이를 조사해야 합니다."
 mem_ea_uplifter.6.a:0 "조사를 시작해라."
 MEM_EA_UPLIFTER_SYSTEM_1_INVESTIGATION:0 "유독성 행성"
 MEM_EA_UPLIFTER_SYSTEM_1_INVESTIGATION_DESC:0 "행성 [This.GetName]는 한때 원시 문명의 고향이었습니다. 그에게 무슨 일이 있었던 걸까요?"
 MEM_EA_UPLIFTER_SYSTEM_2_INVESTIGATION:0 "용암형 행성"
 MEM_EA_UPLIFTER_SYSTEM_2_INVESTIGATION_DESC:0 "행성 [This.GetName]는 한때 원시 문명의 고향이었습니다. 그곳에 무슨 일이 있었던 걸까요?"
 MEM_EA_UPLIFTER_SYSTEM_3_INVESTIGATION:0 "얼음형 행성"
 MEM_EA_UPLIFTER_SYSTEM_3_INVESTIGATION_DESC:0 "행성 [This.GetName]는 한때 원시 문명의 고향이었습니다. 그곳에 무슨 일이 있었던 걸까요?"
 MEM_EA_UPLIFTER_SYSTEM_4_INVESTIGATION_01:0 "불모형 행성"
 MEM_EA_UPLIFTER_SYSTEM_4_INVESTIGATION_01_DESC:0 "행성 [This.GetName]는 한때 원시 문명의 고향이었습니다. 그곳에 무슨 일이 있었던 걸까요?"
 mem_crystal_ship_giant_blue:0 "고대 수정 군주"
 mem_crystal_ship_giant_blue_plural:0 "고대 수정 군주들"
 MEM_EA_UPLIFTER_SYSTEM_4_INVESTIGATION_02:0 "이상한 수정"
 MEM_EA_UPLIFTER_SYSTEM_4_INVESTIGATION_02_DESC:0 "§Y[Prev.GetName]§!의 표면 전체에서 이상한 수정이 발견되었습니다. 이것들이 문명 실종의 원인일까요?"
 mem_ea_uplifter.7.name:0 "위험한 기술"
 mem_ea_uplifter.7.desc:0 "우리 과학 팀은 §Y[mem_ea_homeworld_1.GetName]§!에서 수많은 유적을 발견했습니다. 이 유적은 한때 이곳에 살았던 고도로 산업화된 문명의 이야기를 전합니다. 그러나 그들의 기술 발전은 그들의 세계 생태계에 매우 부정적인 영향을 미쳤습니다. 적절한 대응책을 찾지 못한 그들은 자신의 생물권에서 치명적인 붕괴를 겪게 되었습니다. 수석 과학자 §Y[Root.leader.GetName]§!는 이 행성이 예전 상태로 복원될 가능성이 없다고 의심하고 있습니다."
 mem_ea_uplifter.7.a:0 "각 발전은 그 자체로 재앙의 씨앗을 품고 있을 수 있습니다..."
 mem_ea_uplifter.8.name:0 "불의 죽음"
 mem_ea_uplifter.8.desc:0 "§Y[mem_ea_homeworld_2.GetName]§! -- 한때 거주 가능한 행성이었던 -- 이제는 화산과 용암 강이 흩어져 있는 불타는 황무지에 불과하며, 짙은 연기로 뒤덮여 있고, 하늘에서는 산성 비가 쏟아지고 있습니다.\n\n그리고 무엇을 위해서입니까? 자비도 후회도 모르는 자원에 굶주린 자동기계들의 끝없는 탐욕을 잠재우기 위해서요? 이 시스템은 매우 풍부한 광물을 가지고 있으며, 따라서 이 기계들을 이곳으로 유인했음에 틀림없습니다. 그들은 세계를 먹어치우는 벌레 떼처럼 이곳에 내려왔습니다. 한때 이 행성을 고향으로 삼았던 문명에 대해 배울 것은 아무것도 남아 있지 않습니다."
 mem_ea_uplifter.8.a:0 "우리에게도 일어날 수 있는 일이었어..."
 mem_ea_uplifter.9.name:0 "우주의 영향"
 mem_ea_uplifter.9.desc:0 "§Y[mem_ea_homeworld_3.GetName]§!'의 주민들은 수천 년 전 이곳에서 발생한 재앙적 사건의 희생자가 되었습니다. 우리의 스캐너는 행성의 얼음 껍질 아래에서 8,000년 전의 대규모 충돌을 가리키는 흔적을 발견했습니다. 충돌 이후의 초기 화재 폭풍이 지나간 후, 겨울은 일시적인 기후 단계가 아닌 영구적인 기후 단계가 된 것으로 보입니다."
 mem_ea_uplifter.9.a:0 "우리가 할 수 있는건 없겠군."
 mem_ea_uplifter.101.name:0 "초대받지 못한 손님"
 mem_ea_uplifter.101.desc:0 "§Y[mem_ea_homeworld_4.GetName]§!의 표면은 생명 없는 황무지입니다. 여기서 문명이 존재했음을 나타내는 것을 찾기는 거의 불가능합니다.\n\n하지만 우리의 과학자들은 흥미로운 발견을 했습니다. 행성의 표면 전체에 걸쳐 폭이 1~2미터에 불과한 결정체들이 흩어져 있으며, 각각은 다음 결정체와 몇십 미터 정도 떨어져 있습니다.\n\n그들이 그 중 하나의 샘플을 채취한 직후, §Y[Root.GetName]§!는 태양계 가장자리에 적대적인 신호가 들어오는 것을 감지했습니다. 표면에 남아 있는 모든 인원은 §Y[Root.GetName]§!로 소환되었으며, 이는 귀하의 명령을 기다리며 궤도를 떠날 준비가 되어 있습니다."
 mem_ea_uplifter.101.a:0 "저 것들을 처리하기 위해선 과학선으로는 부족하겠군!"
 mem_ea_uplifter.10.name:0 "수정의 주인"
 mem_ea_uplifter.10.desc:0 "이 결정이 왜 결정되었는지는 여전히 불분명하지만, 이 결정의 결과는 꽤 명백합니다. 우리의 과학 팀은 이 행성에서 한때 지배적이었던 종의 흔적을 거의 찾지 못했습니다. 그들의 종말은 크리스탈이 처음 나타난 순간부터 불가피했습니다. 그들의 기술은 그것에 대한 방어 수단을 가질 만큼 발전하지 못했을 것입니다. 작은 크리스탈 형성체들은 행성의 지각에서 대부분의 유용한 광물을 고갈시킨 것으로 보이며, 그 결과 한때 무성하고 생명력이 넘쳤던 이 행성이 생명 없는 황무지로 변해버렸습니다.\n\n거대한 크리스탈이 파괴된 지금, 우리의 과학자들은 두 가지 가능한 옵션을 제안합니다: 우리는 이 광물 풍부한 크리스탈 형성체를 수확하거나 그들의 방해받지 않은 성장 과정을 연구할 수 있습니다."
 mem_ea_uplifter.10.a:0 "수정을 수확해라."
 mem_ea_uplifter.10.b:0 "수정을 연구하자."
 mem_ea_uplifter.11.name:0 "궁금증"
 mem_ea_uplifter.11.desc:0 "조사를 마친 후에 우리는 복합단지의 계획에 대한 지식을 거의 얻지 못했습니다. 아직 생존해 있는 종족이 하나도 없으므로 더 많은 의문이 남아 있습니다. 그들은 왜 복합단지의 주인들에게 도움을 받지 못했을까요? 그들은 어디로 갔을까요?"
 mem_ea_uplifter.11.a:0 "우리는 해답을 찾을 것이다!"
 mem_ea_uplifter.13.name:0 "돌파"
 mem_ea_uplifter.13.desc:0 "수년간의 노력 끝에, §Y[mem_ea_start.GetName]§!에 있는 고대 복합체에서 활동 중인 우리의 과학자들이 시설의 데이터 저장소의 심각하게 손상된 부분을 복구하는 데 성공했습니다. 이제 우리는 이전에는 읽을 수 없었던 데이터에 접근할 수 있게 되었습니다. 우리가 회수한 다양한 기록 중에는 "오릴라"라 불리는 그들의 고향 항성계의 위치도 포함되어 있습니다. 그들의 제국은 불분명한 공격자와 전쟁 중이었던 것으로 보입니다. 그들은 적보다 더 고급 기술을 보유하고 있었음에도 불구하고 패배의 길을 걷고 있었던 것 같습니다. 이 전초 기지가 적대적인 함대의 공격을 받았을 때, 그곳의 주민들은 도움을 기다리기 위해 냉동 챔버를 사용할 수밖에 없었습니다 - 그러나 그 도움은 결코 도착하지 않았던 것 같습니다."
 mem_ea_uplifter.13.a:0 "그들은 패배했나?"
 mem_ea_uplifter_system_5:0 "오릴라의 고향 성계"
 mem_ea_uplifter_system_5_desc:0 "자료에 따르면 [mem_ea_uplifter_system_5.GetName] 성계는 오릴라라고 불리는 신비한 지성화된 종족이 거주하던 곳입니다."
 mem_ea_uplifter.14.name:0 "고대의 전장"
 mem_ea_uplifter.14.desc:0 "성계에 도착한 우리 과학자들이 예상한 것을 다시 확인해주었습니다. 오릴라는 패배했고, 그들의 성계는 함선의 파편으로 가득 차있습니다.\n\n조사 결과, 이 성계의 행성 중 하나에서 이상한 에너지 측정 수치값을 얻었습니다. 행성은 고도로 발전된 에너지막으로 보호되어 있는 것 같습니다. 우리는 행성 표면에서 유용한 자료를 얻을 수 없습니다."
 mem_ea_uplifter.14.a:0 "더 가까이 가보자."
 mem_ea_uplifter_homesystem_chain_title:0 "오릴라"
 mem_ea_uplifter_homesystem_chain_desc:0 "이 고대 종족에게 어떤 일이 일어났는지 알아내야 합니다."
 mem_ea_uplifter_homesystem_investigated:0 "풀린 수수께끼"
 MEM_EA_UPLIFTER_HOMESYSTEM_INVESTIGATION:0 "보호막에 덮인 행성"
 MEM_EA_UPLIFTER_HOMESYSTEM_INVESTIGATION_DESC:0 "이 곳은 고도의 에너지에 의해 둘러싸여 있습니다. 무엇을 보호하고 있을까요? 행성에 아직 살아있는 오릴라가 존재할 지 모릅니다."
 mem_ea_uplifter.15.name:0 "라스트 오릴라"
 mem_ea_uplifter.15.desc_01:0 "아 ... 오랜 시간 지난 끝에 ... 드디어 오셨군요."
 mem_ea_uplifter.15.desc_02:0 "탐욕은 그들의 영혼을 오염시켰고, 증오로 그들의 세계를 차단했으며, 고통과 유혈 사태로 그들을 몰아넣었습니다.\n그들은 속도를 발전시켰지만, 스스로를 가두었습니다. 풍요를 가져다주는 기계는 그들을 결핍 속에 남겨두었습니다. 그들의 지식은 그들을 냉소적으로 만들었고, 그들의 영리함은 차갑고 무자비하게 만들었습니다. 그들은 너무 많이 생각하고, 너무 적게 느꼈습니다.\n\n기계보다 그들이 필요로 했던 것은 동료애였고, 영리함보다 그들이 필요로 했던 것은 친절과 부드러움이었습니다.\n이러한 자질이 없이는 그들의 삶의 방식은 폭력적이었고, 그들은 타인의 생명을 위협했습니다."
 mem_ea_uplifter.15.a:0 "우리는 오릴라가 개선시키려고 노력한 이종족 중 하나였습니다."
 mem_ea_uplifter.15.b:0 "넌 누구냐!"
 mem_ea_uplifter.15.b.response:0 "저는 챕'린, 오릴라의 마지막입니다.\n\n저는 그의 의식의 이미지일 뿐, 그 사람 자체는 아닙니다.\n\n그는 한때 우리 종족을 대표하여 우리 뒤를 따를 이들에게 나아가도록 선택받은 사회였습니다."
 mem_ea_uplifter.15.c:0 "정확하게 말해, 넌 누구냐?"
 mem_ea_uplifter.15.c.response:0 "나는 오릴라 챱린의 의식의 이미지입니다.\n\n나는 단순한 AI 이상이지만 살아있는 존재 이하입니다. 내가 이렇게 존재하는 것은 영광이자 짐입니다...\n\n내가 기꺼이 선택한 짐입니다.\n\n우리 종족의 마지막이 사라진 이후, 이 세계에 남아 있는 것을 유지하고 행성 방어막의 지속적인 기능을 보장하는 것이 나의 책임이었습니다.\n\n하지만 나의 가장 중요한 임무는 당신의 도착을 기다리는 것이었습니다."
 mem_ea_uplifter.15.d:0 "오릴라에게 무슨 일이 일어났지?"
 mem_ea_uplifter.15.d.response:0 "우리의 기술 발전이 가능한 결과를 예측하는 능력을 초월했던 시기가 있었습니다.\n\n우리는 무모하게 불사의 탐구를 추구했습니다.\n\n결과를 인식하게 되었을 때, 이미 피해는 발생한 상태였습니다. 지속적인 클론 기술은 우리 종족을 불임으로 만들었고, 우리는 서서히 유전자 풀의 불가피한 퇴화를 겪고 있습니다."
 mem_ea_uplifter.15.e:0 "왜 우리를 포함한 다른 종들을 지성화하고 보호했지?"
 mem_ea_uplifter.15.e.response:0 "우리가 피할 수 없는 멸망에 직면했을 때, 우리는 고급 종족을 무자비한 공격으로부터 보호할 준비가 되어 있거나 그런 의지가 있는 다른 문명이 없다는 것을 보았습니다.\n\n그래서 우리는 그러한 종족이 스스로를 방어할 수 있도록 별들로 나아가는 길을 찾도록 도와주려 했고, 언젠가는 그들이 우리 보호자의 자리에서 우리를 이어받을 수 있기를 바랐습니다."
 mem_ea_uplifter.15.f:0 "당신들 제국은 어땠지?"
 mem_ea_uplifter.16.name:0 "라스트 오릴라"
 mem_ea_uplifter.16.desc_01:0 "우리는 제국을 원하지 않았습니다. 그것은 우리의 방식이 아니었습니다.\n\n우리는 누구를 지배하거나 정복하고 싶지 않았습니다. 가능하다면 모두를 돕고 싶었습니다. 모든 지능적 생명체는 서로를 돕고 싶어해야 합니다. 우리는 모두 서로의 행복을 위해 살고, 서로의 불행으로 살고 싶지 않습니다.\n우리는 서로를 미워하고 경멸하고 싶지 않습니다. 우리는 이 우주에 모두를 위한 공간이 있으며, 우리의 은하가 풍부하고 모두를 위해 제공할 수 있다고 믿었습니다; 삶의 방식은 자유롭고 아름다울 수 있습니다.\n\n하지만 다른 이들은 길을 잃었습니다..."
 mem_ea_uplifter.16.desc_02:0 "이것은 사실입니다.\n\n당신의 종족은 우리의 후계자들 중 가장 유망한 다섯 종족 중 하나였습니다. 불행히도 우리가 시작한 일을 마치기 전에, 우리의 성장하는 약점을 이용하려는 자들에게 공격을 받았습니다.\n비록 우리의 기술이 그들의 것보다 훨씬 우수했지만, 그들은 수적 우세에서 힘을 얻었고 우리의 힘은 줄어들었습니다. 결국 우리는 고향으로 퇴각할 수밖에 없었고, 그곳은 우리의 감옥이 되었습니다.\n\n여기서 우리는 우리의 자녀들이 사라지는 것을 지켜봐야 했습니다. 이제 우리 민족의 모든 희망이 당신과 당신의 종족에게 달려 있습니다."
 mem_ea_uplifter.16.a:0 "길을 잃었다고?"
 mem_ea_uplifter.16.b:0 "우리가 약한 자들을 보호하기 원하나?"
 mem_ea_uplifter.17.name:0 "라스트 오릴라."
 mem_ea_uplifter.17.desc.01:0 "나는 당신의 문명의 발전을 관찰해왔습니다.\n\n전쟁의 길을 걷는 당신을 보니 매우 마음이 아팠습니다. 이로 인해 이미 많은 파괴와 고통이 발생했습니다.\n\n하지만 여전히 우리는 수천 년 전과 같은 당신 종족의 위대한 잠재력을 보고 있습니다. 당신이 이 잠재력을 실현하고 생명의 보호자로서의 운명을 받아들이기를 여전히 희망합니다.\n\n당신은 이를 받아들이고 우리의 길을 따르겠습니까?"
 mem_ea_uplifter.17.desc.02:0 "나는 당신의 문명의 발전을 관찰해 왔습니다.\n\n당신이 어두운 길을 걷는 모습을 보니 매우 마음이 아픕니다. 두려움과 편협함은 당신을 위대함으로 이끌지 못하고, 오직 쇠퇴로만 이끌 것입니다.\n\n하지만 나는 여전히 당신의 종족에서 우리가 수천 년 전 보았던 위대한 잠재력을 보고 있습니다. 당신이 이 잠재력을 실현하고 생명의 보호자로서의 운명을 받아들이기를 여전히 희망합니다.\n\n당신은 그것을 받아들이고 우리의 길을 따르겠습니까?"
 mem_ea_uplifter.17.desc.03:0 "나는 당신의 문명의 발전을 관찰해왔습니다.\n\n당신은 지난 몇 년 동안 큰 발전을 이루었고, 당신이 되어온 것에 자부심을 느낍니다.\n\n우리의 길을 따르고 생명의 보호자로서 우리의 자리를 차지할 준비가 되었습니까?"
 mem_ea_uplifter.17.a:0 "당신의 방식을 존중하겠습니다."
 mem_ea_uplifter.17.a.tooltip:0 "당신의 제국의 정부가 독특한 형태인 §H고대의 길§!로 변경됩니다. 당신은 §H길§!이라는 독특한 시민을 얻게 되며, 이는 §G+5% 연구 및 +10% 정부 윤리 매력 보너스§!를 제공합니다. 이 시민은 영구적입니다.\n"
 mem_ea_uplifter.17.a.response:0 "깊은 감사의 말씀을 드립니다.\n\n저는 마지막 우리의 함선을 이끌며 귀하의 함대에 합류하겠습니다.\n\n하지만 이 행성은 몇 시간 후에 자폭할 것입니다. 우리의 기술이 잘못된 손에 넘어가는 것을 감수할 수는 없습니다.\n\n너무 많은 고통이 따를 수 있습니다."
 mem_ea_uplifter.17.b:0 "우리는 우리만의 길이 있다."
 mem_ea_uplifter.17.b.tooltip:0 "자신의 운명을 개척하십시오.\n\n당신의 제국은 행복도에 §G5% 보너스§!를 얻습니다."
 mem_ea_uplifter.17.b.response:0 "그 말을 듣게 되어 유감입니다. 하지만 저는 당신을 다른 선택으로 강요할 수 없고, 강요할 생각도 없습니다.\n\n미래에 당신이 마음을 바꿀 희망이 있을지도 모르지만, 제 시간은 얼마 남지 않았습니다.\n곧 이 방패를 유지하는 데 필요한 에너지가 소진될 것이고, 우리의 기술이 잘못된 손에 넘어가는 것을 허용할 수 없습니다 - 그로 인해 큰 고통이 따를 것입니다.\n\n이 행성은 몇 시간 내에 자폭할 것입니다. 이 행성에서 거리를 두는 것을 권장합니다.\n\n당신이 평화와 번영 속에서 살기를 바랍니다. 안녕, [Root.GetSpeciesNamePlural]."
 mem_ea_uplifter.17.c:0 "우리는 스스로를 바꾸지 않을 것이다!"
 mem_ea_uplifter.17.d:0 "이것이 우리의 운명이라면 받아 들일 것이다."
 mem_ea_uplifter.17.d.tooltip:0 "당신의 제국의 윤리는 §H물질주의/평화주의/외계종 선호§!로 변경되며, 당신의 제국의 정부는 독특한 형태인 §H고대의 길§!로 변경됩니다. 당신은 독특한 시민인 $HThe Way$!를 얻게 되며, 이는 §G5% 연구 및 10% 정부 윤리 매력 보너스$!를 제공합니다. 이 시민은 영구적입니다.\n"
 mem_ea_uplifter.17.d.response:0 "당신이 우리의 길을 따르기로 결정한 것에 기쁩니다.\n\n저는 마지막 우리의 함선을 이끌며 당신의 함대에 합류하겠습니다.\n\n하지만 이 행성은 몇 시간 내에 자폭할 것입니다. 우리의 기술이 잘못된 손에 넘어가는 고통을 감수할 수는 없습니다."
 END:0 "END"
 mem_ea_uplifter_catchphrase:0 "우리의 길을 따르기로 결심해 주셔서 기쁩니다."
 mem_chaplin_backstory:0 "고대 오릴라 중 하나인 챕린의 기억 인상을 가진 AI. 그의 국가와 종족은 사라졌지만, 그는 여전히 그들의 가치와 미덕을 지키고 있습니다."
 mem_ea_forging_own_destiny:0 "운명을 개척하는 자"
 mem_ea_knowledge_of_the_ancients:0 "고대인의 지식"
 mem_eventship_03:0 "스트라이크 순양함"
 mem_eventship_03_plural:0 "스트라이크 순양함대"
 civic_mem_the_way:0 "길"
 civic_mem_the_way_desc:0 "이 사회는 고대 문명의 가치와 유산을 받아 들여 더 큰 대의를 추구합니다."
 gov_mem_way_of_the_ancients:0 "고대인의 길"
 gov_mem_way_of_the_ancients_desc:0 "이 정부는 고대 전신 문명의 발자취를 따라 은하 전역에 더 큰 선을 퍼뜨립니다."
 mem_ancient_fleet_headquarter_ruined:0 "폐허가 된 고대 함대 본부"
 mem_ancient_fleet_headquarter_ruined_DESC:0 "폐허가 된 고대 함대 본부입니다. 내부는 오래전 약탈자들이 다 뜯어가 텅 비었지만, 거대구조물의 주선체는 거의 완전합니다. 알맞은 기술과 대량의 자원이 있다면, 개장할 수 있을 것입니다."
 mem_ancient_fleet_headquarter_ruined_MEGASTRUCTURE_DETAILS:0 ""
 mem_ea_uplifter_site:0 "외로운 전초기지"
 mem_ea_uplifter_site_desc:0 "§Y[From.Planet.GetName]§!에서 발견된 시설은 궤도 폭격의 대상이 되었음에도 전체적인 구조는 여전히 멀쩡합니다. 하지만 내부는 완전히 엉망입니다. 무너진 방들과 복도에 가득한 잔해들이 우리 팀의 조사를 막고 있습니다. 폐허 내부로 안전하게 진입할 통로를 확보하기 위해선 중장비가 필요합니다."
