 # Admiral traits

 leader_trait_extra_precision_attacker:0 "정밀 타격가"
 leader_trait_extra_precision_attacker_desc:0 "이 지도자는 불필요한 탄약을 소모하기보다 정밀하고 유도된 공격을 중시합니다. 이들의 함대는 목표를 추적하고 매 공격을 명중시키는 데 탁월합니다."
 leader_trait_extra_precision_attacker_2:0 "$leader_trait_extra_precision_attacker$ II"
 leader_trait_extra_precision_attacker_2_desc:0 "$leader_trait_extra_precision_attacker_desc$"
 leader_trait_extra_precision_attacker_3:0 "$leader_trait_extra_precision_attacker$ III"
 leader_trait_extra_precision_attacker_3_desc:0 "$leader_trait_extra_precision_attacker_desc$"

 leader_trait_extra_brute_forcer:0 "무차별 공격가"
 leader_trait_extra_brute_forcer_desc:0 "이 지도자는 순수한 공격 횟수로 적을 압도하는 것을 중시합니다. 이들의 함대는 빗나가는 탄의 수에 상관없이 빠르고 자주 사격하도록 훈련받았습니다."
 leader_trait_extra_brute_forcer_2:0 "$leader_trait_extra_brute_forcer$ II"
 leader_trait_extra_brute_forcer_2_desc:0 "$leader_trait_extra_brute_forcer_desc$"
 leader_trait_extra_brute_forcer_3:0 "$leader_trait_extra_brute_forcer$ III"
 leader_trait_extra_brute_forcer_3_desc:0 "$leader_trait_extra_brute_forcer_desc$"

 leader_trait_extra_slowhard:0 "느리지만 치명적인"
 leader_trait_extra_slowhard_desc:0 "이 지도자는 자동 또는 속사형 무기보다 중화기를 선호합니다. 이들의 함대는 자주 사격하지는 않지만, 발사하는 한 발 한 발이 파괴적입니다."
 leader_trait_extra_slowhard_2:0 "$leader_trait_extra_slowhard$ II"
 leader_trait_extra_slowhard_2_desc:0 "$leader_trait_extra_slowhard_desc$"
 leader_trait_extra_slowhard_3:0 "$leader_trait_extra_slowhard$ III"
 leader_trait_extra_slowhard_3_desc:0 "$leader_trait_extra_slowhard_desc$"

 leader_trait_extra_fastsoft:0 "다다익선"
 leader_trait_extra_fastsoft_desc:0 "이 지도자는 압도적인 화력보다 속사 전략을 선호합니다. 이들의 함대는 소형 탄환의 파도를 쏟아내지만, 각 탄환은 제조 기술이 허용하는 한도 내에서 최대한의 정확도를 자랑합니다."
 leader_trait_extra_fastsoft_2:0 "$leader_trait_extra_fastsoft$ II"
 leader_trait_extra_fastsoft_2_desc:0 "$leader_trait_extra_fastsoft_desc$"
 leader_trait_extra_fastsoft_3:0 "$leader_trait_extra_fastsoft$ III"
 leader_trait_extra_fastsoft_3_desc:0 "$leader_trait_extra_fastsoft_desc$"

 # Destiny traits

 leader_trait_extra_ruralist:0 "전원주의자"
 leader_trait_extra_ruralist_desc:0 "이 지도자는 분산형 기반 시설을 구현하여 행성 전역에 시설을 배치합니다. 시설의 생산량을 향상시키지만, 이는 인구 증가에 비례하지 않습니다."
 leader_trait_extra_military_studies:0 "군사 과학자"
 leader_trait_extra_military_studies_desc:0 "이 지도자는 군사 연구에 집중하며, 자신의 기술을 행성의 병사들로부터 얻는 과학적 발전을 향상시키는 데 쏟아붓습니다."
 leader_trait_extra_veteran_pops:0 "숙련자 편향"
 leader_trait_extra_veteran_pops_desc:0 "이 지도자는 경험이 풍부한 인력을 편애합니다. 이러한 태도는 숙련 노동자들에게 환영받아 그들의 성과를 향상시키지만, 행성의 인구 성장을 감소시킵니다."
 leader_trait_extra_grand_researcher:0 "위대한 연구원"
 leader_trait_extra_grand_researcher_desc:0 "이 지도자는 엄청난 과학적 야망을 품고 있으며, 이 행성을 과학 발전의 선두 주자로 만듭니다."
 leader_trait_extra_genius_archaologist:0 "천재 고고학자"
 leader_trait_extra_genius_archaologist_desc:0 "이 지도자는 고대 제국, 파괴된 문명, 혹은 잊힌 유물의 숨겨진 역사를 밝혀내는 데 통달했습니다."
 leader_trait_extra_silent_reconnaisance:0 "침묵 속의 속삭임"
 leader_trait_extra_silent_reconnaisance_desc:0 "'그들은 우리 암호를 해독하는 것이 불가능하다고 했어. 어떻게 우리 위치를 알았지? 대체 어떻게?!' - 적 사령부에서 녹음된 대화."
 leader_trait_extra_grand_admiral:0 "대제독"
 leader_trait_extra_grand_admiral_desc:0 "이 지도자는 수천 번의 공격을 이끌었으며, 그 경험은 우리 제국 전역에 널리 알려져 있습니다. 그의 전략적 전문성으로, 우리의 적들은 우리의 힘 아래 짓밟히는 모래알에 불과할 것입니다."
 leader_trait_extra_ground_hero:0 "지상의 영웅"
 leader_trait_extra_ground_hero_desc:0 "먼지가 가라앉고 적이 후퇴했을 때, 이 지도자는 의기양양하게 서 있었습니다. 그의 군대는 그를 구원자로 칭송했고, 적들은 그를 악마라 불렀습니다. 이제 이 영웅이 우리 군대를 이끌 것입니다."

 # Capital Focus traits

 leader_trait_extra_univ_capital_focus:0 "범용 수도 집중"
 leader_trait_extra_univ_capital_focus_desc:0 "이 지도자는 수도 행성을 통치합니다. 그는 수도의 강점이 어떤 필요에도 유연하게 대처할 수 있는 능력에 있다고 봅니다."
 leader_trait_extra_univ_capital_focus_2:0 "$leader_trait_extra_univ_capital_focus$ II"
 leader_trait_extra_univ_capital_focus_2_desc:0 "$leader_trait_extra_univ_capital_focus_desc$"
