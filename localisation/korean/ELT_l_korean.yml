 leader_trait_extra_hyperfixated:0 "과몰입"
 leader_trait_extra_hyperfixated_desc:0 "이 지도자는 현재 관심 있는 기술을 연구하는 데 있어 독보적으로 효율적입니다. 하지만 그 과정에서 주목해야 할 다른 잠재적 연구 분야를 보지 못하는 어려움을 겪습니다."
 leader_trait_extra_hyperfixated_2:0 "$leader_trait_extra_hyperfixated$ II"
 leader_trait_extra_hyperfixated_2_desc:0 "$leader_trait_extra_hyperfixated_desc$"
 leader_trait_extra_hyperfixated_3:0 "$leader_trait_extra_hyperfixated$ III"
 leader_trait_extra_hyperfixated_3_desc:0 "$leader_trait_extra_hyperfixated_desc$"

 #Anti Gravity Researcher

 leader_trait_extra_anti_gravity_researcher:0 "반중력 연구원"
 leader_trait_extra_anti_gravity_researcher_desc:0 "이 지도자는 우리의 과학 및 관측 기지를 개선할 수단을 제공했습니다. 그의 지식으로 우리는 순식간에 기술을 향상시킬 것입니다!"
