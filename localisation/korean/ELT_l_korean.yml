 leader_trait_extra_foundry_capital_focus_3_desc:0 "$leader_trait_extra_foundry_capital_focus_desc$"

 leader_trait_extra_factory_capital_focus:0 "소비재 수도 집중"
 leader_trait_extra_factory_capital_focus_desc:0 "이 지도자는 수도 행성을 통치합니다. 그들은 최고급 소비재를 생산하여 시민들이 어떤 상품도 부족하지 않도록 하는 것에 집중하는 것이 수도의 강점이라고 생각합니다."
 leader_trait_extra_factory_capital_focus_2:0 "$leader_trait_extra_factory_capital_focus$ II"
 leader_trait_extra_factory_capital_focus_2_desc:0 "$leader_trait_extra_factory_capital_focus_desc$"
