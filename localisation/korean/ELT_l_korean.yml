 #Lab Outsourcer

 leader_trait_extra_lab_outsourcer:0 "연구소 외주 전문가"
 leader_trait_extra_lab_outsourcer_desc:0 "이 지도자는 연구 협정의 잠재력이 인력 제공 비용을 다른 제국에 전가하는 능력에 있음을 깨달았습니다."
 leader_trait_extra_lab_outsourcer_2:0 "$leader_trait_extra_lab_outsourcer$ II"
 leader_trait_extra_lab_outsourcer_2_desc:0 "$leader_trait_extra_lab_outsourcer_desc$"
 leader_trait_extra_lab_outsourcer_3:0 "$leader_trait_extra_lab_outsourcer$ III"
 leader_trait_extra_lab_outsourcer_3_desc:0 "$leader_trait_extra_lab_outsourcer_desc$"

 #Swarm Tactics

 leader_trait_extra_swarm_tactics:0 "무리 전술"
 leader_trait_extra_swarm_tactics_desc:0 "이 지도자는 다소 약하더라도 수많은 함선의 힘을 믿습니다. 순수한 수적 우위로 적을 압도할 것입니다."
 leader_trait_extra_swarm_tactics_2:0 "$leader_trait_extra_swarm_tactics$ II"
 leader_trait_extra_swarm_tactics_2_desc:0 "$leader_trait_extra_swarm_tactics_desc$"
 leader_trait_extra_swarm_tactics_3:0 "$leader_trait_extra_swarm_tactics$ III"
 leader_trait_extra_swarm_tactics_3_desc:0 "$leader_trait_extra_swarm_tactics_desc$"

 #Lone Wolf

 leader_trait_extra_lone_wolf:0 "고독한 늑대"
 leader_trait_extra_lone_wolf_desc:0 "이 지도자는 단독으로 움직이는 강력한 함선의 힘을 믿습니다. 순수한 힘으로 우리의 발전된 함대가 적을 압도할 것입니다."
