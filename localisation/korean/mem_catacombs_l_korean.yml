l_korean:
 mem_catacombs_category:0 "지하의 유적"
 mem_catacombs_category_desc:0 "행성을 철저하게 조사하던 중 지표가 황폐해지기 전 누군가가 만들었을 것으로 보이는 터널 망으로 향하는 입구를 발견했습니다."
 mem_catacombs.10.name:0 "수집품"
 mem_catacombs.10.desc:0 "우리는 거의 모든 동굴을 탐험하는 데 성공하였으며, 우리가 발견한 것은 전례가 없습니다. \n\n다양한 금고와 갤러리 안에서 우리는 비활성 대기 속에 보존된 수백 개의 유물을 발견하였습니다. 이 아카이브는 수백 개의 세계와 문화에 대한 자료를 포함하고 있을 가능성이 있으며, 테스트 결과 여러 유물이 수백만 년 된 것으로 밝혀졌습니다. \n\n이 귀중한 유물 모음은 오래전에 멸종한 문화를 연구하는 연구원들에게 큰 도움이 될 수 있습니다. 그러나 많은 수집가들도 관심을 보이며, 이 컬렉션에 대해 큰 금액을 지불할 의사가 있습니다."
 mem_catacombs.10.a:0 "아니다. 우리를 위해 연구자료로 쓸 것이다."
 mem_catacombs.10.b:0 "가격을 매겨봐."
 mem_catacombs.10.c:0 "외계 오물들이 우리를 오염시킬 수는 없지."
 mem_catacombs.11.name:0 "자연적 형성"
 mem_catacombs.11.desc:0 "최초 분석에서 지하 동굴은 인공적인 네트워크인 것처럼 보였지만 사실 자연적으로 형성된 자연동굴로 밝혀졌습니다. 동굴은 행성 깊숙하게 분포해 있지만 위험도와 비교하면 가치가 있는 것이 없습니다."
 mem_catacombs.11.a:0 "아깝군."
 mem_catacombs.12.name:0 "붕괴"
 mem_catacombs.12.desc:0 "동굴을 탐험하는 과정에서 §Y[Root.leader.GetName]§!와 팀 위에 갤러리가 무너져 즉사했습니다. 여러 명의 연구원도 잔해에 갇혀 며칠 동안 고립되었고, 거의 모든 유물은 무너짐이나 이후의 수색 작업으로 파괴되었습니다. 현장에서 회수된 가치 있는 것은 아무것도 없습니다."
