l_korean:
 mem_dimensional_rift_category:0 "희망의 빛"
 mem_dimensional_rift_category_desc:0 "우리 과학선이 이 소행성대에서 높은 기술 수준의 합금 흔적을 발견했고, 승무원들이 보물을 발견했다며 기뻐합니다."
 mem_dimensional_rift.105.name:0 "결과 없음"
 mem_dimensional_rift.105.desc:0 "광범위한 탐색과 센서 재조정이 결과를 내지 못한 후, §Y[Root.leader.GetName]§!과 §Y[Root.GetName]§!의 승무원은 탐색을 포기했습니다."
 mem_dimensional_rift.105.a:0 "다시 일하자."
 mem_dimensional_rift.106.name:0 "갑작스러운 끝"
 mem_dimensional_rift.106.desc:0 "소행성대를 스캔하는 동안 함선이 큰 바위에 걸려 워프 엔진이 파괴되었습니다. §Y[Root.GetName]§!와(과) 함께 모든 승무원들이 실종되었습니다."
 mem_dimensional_rift.106.a:0 "§Y[Root.Owner.GetName]§!에게는 정말 슬픈 날이로군."
 mem_dimensional_rift.7.name:0 "버려진 연구소"
 mem_dimensional_rift.7.desc:0 "춥고 낡아빠진 고대 연구 기지가 근처 소행성 꼭대기에 있습니다. 자세히 살펴보면 전원 동력원이 뜯겨나갔거나 강제로 빼낸 것으로 보입니다. 과학 장교 [root.leader.GetName]은(는) 스테이션의 시스템을 다시 활성화하기 위해 휴대용 전원 동력원을 요청합니다."
 mem_dimensional_rift.7.a:0 "동력원을 넣어봐."
 mem_dimensional_rift.7.b:0 "지금 당장 그런 곳에 에너지를 낭비할 상황이 아니다."
 MEM_DIMENSIONAL_RIFT_PROJECT:0 "데이터 분석"
 MEM_DIMENSIONAL_RIFT_PROJECT_DESC:0 "우리 과학자들은 노후한 연구 기지에 있는 데이터 파일을 활성화할 허가를 요청합니다. 그들은 이것이 우리의 연구 노력을 더욱 발전시킬 수 있다고 주장합니다."
 mem_dimensional_rift.1.name:0 "버려진 연구소"
 mem_dimensional_rift.1.desc:0 "정거장의 시스템이 잠시 깜박이며 한때 분주했던 실험실의 잔존자들에게 희미한 빛을 비춥니다. 유압문을 작동시키는 대부분의 회로가 고장 나서 정거장은 여전히 거주할 수 없는 상태이며, 침해된 중앙 제어실을 넘어서는 조사가 불가능합니다. 승무원들은 이제 남아 있는 데이터 파일을 점검할 수 있는 허가를 요청합니다."
 mem_dimensional_rift.1.a:0 "연구를 계속해라. 연구소가 왜 그렇게 변했는지 알아내."
 mem_dimensional_rift.1.b:0 "더 이상 그런 곳에 시간을 낭비할 수 없다."
 mem_dimensional_rift.2.name:0 "버려진 연구소"
 mem_dimensional_rift.2.desc:0 "역사관의 마지막 로그는 모든 연구가 완료되고 시설이 폐쇄되었음을 나타내는 종료 성명으로 보입니다. 파일의 데이터는 여러 개의 시공간 균열이 역사관의 외부 선체의 중요한 부분을 찢어 많은 인명 피해를 초래했음을 나타내는 것 같습니다. 실험에 대한 데이터는 삭제되었거나 손실된 것으로 보입니다. 이 역사관을 찢어놓은 것이 무엇인지는 확실하지 않습니다. 그럼에도 불구하고 우리는 초공간 장과 물리 법칙의 주장된 허점에 대한 방대한 통찰을 얻었습니다."
 mem_dimensional_rift.2.a:0 "승무원들에게 표창을 주게."
 budget_group_country_modifier:0 "사건 보정치"
 mem_powering_abandoned_station:0 "버려진 스테이션에 전원 공급 중"
