l_korean:
 mem_foss_sky_dig_site:0 "화석화된 고층 건물"
 mem_fosssky_dig_site_desc:0 "[From.Planet.GetName]에서 우리가 관찰한 거대한 평원 한가운데에 파괴된 분화구 지하를 살펴봤더니 놀라운 사실이 밝혀졌습니다. 한때 고층 건물이 밀집한 얕은 계곡이었던 곳이 이 행성의 종말 이후로 흙으로 덮였거나 축적된 것으로 보입니다.\n\n스캔 결과, 엄청나게 높은 건물로 보이는 주변에 많은 응고된 잔해, 암석 및 회반죽이 표시되어 있으며 다행히도 대부분 손상되지 않은 상태로 남아 있습니다. 추가 스캔은 내부의 대부분이 어느 정도 보존돼있을 가능성이 있지만, 안으로 들어가 그 비밀을 알아내려면 시간과 섬세한 관리가 필요합니다."
 mem_foss_sky.1.name:0 "목마른 사람 있나요?"
 mem_foss_sky.1.desc:0 "천천히 그러나 확실히 우리는 초기 발굴 현장과 기지 캠프를 정리하였으며, 건물의 지붕이 중앙을 차지하고 있습니다. 우리는 더 나아가면서 붕괴와 부상을 피하기 위해 모든 단계와 잡기가 매우 신중하게 측정되어야 합니다. \n\n현재로서는 작은 수송을 위한 착륙 패드와 대기 공간이나 조종사 라운지로 사용되었던 것으로 보이는 오두막을 볼 수 있습니다. 더 중요한 것은, 우리는 첫 번째 유물을 발견했습니다. \n\n간식과 음료 자판기는 그리 대단해 보이지 않을 수 있지만, 우리가 발견한 것처럼 완벽하게 보존되고 조심스럽게 추출된 자판기는 대중의 상상력을 자극하며 그 아래에 무엇이 있을지에 대한 궁금증을 불러일으켰고, 이곳을 점유했던 사람들의 일반적인 식단에 대한 아이디어를 제공했습니다. \n\n처음에는 죽고 지루한 세계의 잔해로 여겨졌던 것이 이제는 훨씬 더 많은 주목을 받을 가치가 있습니다."
 mem_foss_sky.1.a:0 "$DIG$"
 mem_foss_sky.2.name:0 "멋진 경치군!"
 mem_foss_sky.2.desc:0 "우리는 옥상 계단 접근로를 통해 아래로 내려왔습니다. 이곳은 주요 잔해가 remarkably 깨끗하게 정리되어 있었습니다. 가장 가능성이 높은 것은 스카이 로지입니다. \n\n썩었지만 알아볼 수 있는 가구들이 여기저기 흩어져 있으며, 여러 개인의 미라화된 유해가 건물의 엘리베이터 뱅크 주변에 모여 있는 모습입니다. 그들은 하강할 수 없었던 것 같습니다. 우리는 심지어 거의 완벽하게 보존된 다양한 음료의 개봉되지 않은 병들도 발견했습니다. 이 건물의 창문은 주변 폭발로부터 창문으로 향하는 엄청난 양의 토양의 힘을 견딜 수 있었던 것 같습니다. 유리(그렇게 불릴 수 있다면)에는 단 하나의 금이 가지 않았습니다. \n\n한 지역에서는 우리가 차량이라고 생각하는 녹아내린 잔해가 큰 창문에 눌려 있지만, 외부에만 긁힘을 일으켰습니다. 일부 팀은 이 물자의 샘플을 얻기 위해 현장에서 멀리 보내졌으며, 그 조성을 파악하려고 하고 있지만, 지금까지는 이 타워에만 독특한 것 같습니다. \n\n다음 단계는 엘리베이터 샤프트가 아래로 더 내려가는 플랫폼으로 사용 가능한지 확인하는 것입니다. 내부의 콘크리트 계단은 현재 안전하게 통과하기에는 너무 많이 부식된 것 같습니다."
 mem_foss_sky.2.a:0 "$DIG$"
 mem_foss_sky.3.name:0 "갇힘"
 mem_foss_sky.3.desc:0 "엘리베이터 샤프트는 외부 하중 지지 구조물만큼이나 내구성이 뛰어난 것으로 입증되었습니다. 하늘 라운지 거주자들이 열 수 없었던 문은 우리의 최고의 절단 레이저로 몇 시간 동안 주의를 기울인 후에야 겨우 열렸고, 다른 층들도 마찬가지로 단단히 조여져 있습니다. \n\n우리는 그 사이에 약 30층 아래에서 여러 가지 독특한 유물과 종의 유해를 목록화할 수 있었습니다. 유해의 경우, 대부분은 엘리베이터 주변에 모여 있지만, 일부는 책상이나 휴게실에서 발견되었으며, 사망 원인으로는 자살이나 폭력의 증거가 있었습니다. 또한 여러 차례의 식인 사건도 발견되었습니다. \n\n마천루의 지상층이었던 곳에 도착했을 때, 두 가지 흥미로운 상황을 마주했습니다. 첫째, 엘리베이터는 여전히 여기 있으며 아래 층에 잠겨 있어 더 이상 탐험할 수 없습니다. 또한 비상 출구 계단을 포함한 계단의 남은 부분 위에 어떤 종류의 방패가 펼쳐져 있는 것 같습니다. 둘째, 엘리베이터 아래쪽, 지하층 쪽으로... 전력 신호를 감지하기 시작했습니다. \n\n다음 단계는 이 엘리베이터 아래로 내려가는 것입니다."
 mem_foss_sky.3.a:0 "$DIG$"
 mem_foss_sky.4.name:0 "계획되지 않은 파티"
 mem_foss_sky.4.desc:0 "엘리베이터를 통과하는 가장 좋은 방법은 힘으로 밀어붙이는 것이라는 결론이 내려졌습니다. 특수 중성자 폭발물이 브레이크와 케이블에 설치되었고, 건물은 모든 인원으로부터 완전히 비워졌습니다. 우리는 폭파 장치를 작동시켰고, 약간의 삐걱거림을 제외하면 건물의 놀라운 구조적 견고함과 강인함에 대한 우리의 학습된 가정이 잘못되지 않았음을 입증했습니다. \n\n차량은 샤프트 바닥에 충돌하여 지하로 내려갈 수 있는 명확한 경로를 남겼습니다. 도착하자마자 우리는 외부 폭발문과 내부 문을 뚫기 위해 일주일을 보냈습니다. \n\n우리가 발견한 것은 놀라운 것이었습니다: 거의 완벽하게 보존된 벙커와 대기 모드의 핵 발전기들. 이들을 조심스럽게 활성화하여 꽤 원시적인 컴퓨터를 확인할 수 있었고, 이 장소에 대한 우리의 초기 의심을 확인할 수 있었습니다: 이 건물은 원래 이 사회의 부유하고 권력 있는 엘리트들을 위한 요새로 건설되었습니다. 게다가, 그것은 한 가지 목표를 염두에 두고 건설되었습니다 - 위층의 노동자들은 이것이 무엇을 위한 것인지 알지 못하게 하려는 것이었습니다. 사실, 폭발문은 지하 라운지/로비 옆의 큰 벽화 뒤에 숨겨져 있었습니다. \n\n이 건물은 먼지가 가라앉은 후 제어소로 사용될 예정이었지만, 이는 분명히 실현되지 않았습니다. 우리가 여기서 발견한 시체들은 위층의 것보다 다소 늦은 시기로 날짜가 매겨져 있어, 그들이 식량 공급이 바닥날 때까지 한동안 생존할 수 있었음을 나타냅니다. 그 시점에서 그들은 위층의 자칭 열등자들과 유사한 운명을 겪었을 것입니다. 우리는 이 행성이 겪은 종말이 너무나도 완전하고 예상치 못한 것이었기에 외부 환경의 독성과 이 중심 상업 지구의 완전한 매립이 그들의 장기 계획에 고려되지 않았던 것이라고 추측할 수밖에 없습니다. \n\n현재로서는 이 사람들은 매우 호화로운 무덤을 스스로 건설한 것입니다."
 mem_foss_sky.4.a:0 "흥미로운 이야기군."
 mem_foss_sky_site:0 "화석화된 고층 건물"
 mem_fosssky_site_desc:0 "[From.Planet.GetName]에서 우리가 관찰한 거대한 평원 한가운데에 파괴된 분화구 지하를 살펴봤더니 놀라운 사실이 밝혀졌습니다. 한때 고층 건물이 밀집한 얕은 계곡이었던 곳이 이 행성의 종말 이후로 흙으로 덮였거나 축적된 것으로 보입니다.\n\n스캔 결과, 엄청나게 높은 건물로 보이는 주변에 많은 응고된 잔해, 암석 및 회반죽이 표시되어 있으며 다행히도 대부분 손상되지 않은 상태로 남아 있습니다. 추가 스캔은 내부의 대부분이 어느 정도 보존돼있을 가능성이 있지만, 안으로 들어가 그 비밀을 알아내려면 시간과 섬세한 관리가 필요합니다.\n\n하지만, 폭격으로 폐허가 된 이 지형 어디에서도 산산이 부서진 뼛조각 외에는 이렇다 할 유해나 유물, 심지어 시신조차 발견되지 않았기에, 이곳은 이 종족의 문화를 더 알아낼 수 있는 우리의 유일한 기회일지도 모릅니다."
