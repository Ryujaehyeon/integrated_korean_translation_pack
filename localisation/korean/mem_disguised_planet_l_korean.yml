l_korean:
 mem_disguised_planet_category:0 "변덕쟁이 행성"
 mem_disguised_planet_category_desc:0 "이 행성의 대기 스캔 결과 시뮬레이션과 일치하지 않으며 자세히 분석해본 결과 불규칙한 데이터를 얻었습니다."
 mem_disguised_planet.1.name:0 "홀로그램 위장"
 mem_disguised_planet.1.desc:0 "추가 조사를 통해 [From.GetName]의 supposedly toxic atmosphere가 실제로 존재하지 않음을 밝혀냈습니다. 홀로그램 생성기, 빛의 굴절 및 입자 분산을 교묘하게 사용하여 행성이 두껍고 적대적인 대기를 가지고 있다는 설득력 있는 환상을 만들어냈습니다. \n\n가짜 구름이 걷히자 [Root.GetName]는... 완전히 불모 행성, 환상 아래 숨겨진 모습을 발견했습니다. 누군가 이 불모의 바위를 다른 종류의 불모의 바위로 위장하기 위해 많은 노력을 기울인 것 같습니다."
 mem_disguised_planet.1.a:0 "대체 왜 이런 짓을?"
 mem_disguised_planet.2.name:0 "숨겨진 세계"
 mem_disguised_planet.2.desc:0 "[Root.GetName]는 [From.GetName]의 supposedly toxic atmosphere가 실제로는 전혀 독성이 없다고 보고합니다. \n\n홀로그램 생성기, 빛의 굴절 및 입자 분산을 교묘하게 활용하여 이 행성이 두껍고 적대적인 대기를 가지고 있다는 설득력 있는 환상을 만들어냈습니다. 실제로 대기는 꽤 온화해 보입니다. 가짜 구름이 걷히자, 거주 가능한 표면이 드러났습니다. \n\n어떤 시점에서 누군가 이 세계를 훨씬 덜 살기 좋은 것으로 위장하는 데 상당한 노력을 기울인 것 같습니다."
 mem_disguised_planet.2.a:0 ""
 mem_disguised_planet.3.name:0 "수수께끼에 싸여 있는 수수께끼"
 mem_disguised_planet.3.desc:0 "추가 조사가 진행된 결과, [From.GetName]의 supposedly toxic atmosphere는 실제로 존재하지 않는 것으로 밝혀졌습니다. 홀로그램 생성기, 빛의 굴절 및 입자 분산을 교묘하게 활용하여 이 행성이 두꺼운 적대적인 대기를 가지고 있다는 설득력 있는 환상을 만들어냈습니다. \n\n[Root.GetName]이 가짜 구름 아래에서 실제로 발견한 것은 꽤 이상한 것이었습니다 - 완전히 뚫을 수 없는 것처럼 보이는 방패로 덮인 작은 행성이었으며, 이 행성이 누구에 의해 그리고 어떤 목적으로 이렇게 광범위하게 미공개로 남겨졌는지는 전혀 명확하지 않습니다."
 mem_disguised_planet.3.a:0 "이상하군."
 mem_disguised_planet.100.name:0 "실패"
 mem_disguised_planet.100.desc:0 "[Root.GetName]은(는) [FromFrom.GetName]에서 이전에 판독된 비정상적인 신호를 복제할 수 없습니다. 그것은 부적절하게 보정된 센서에 의해 발생했을 가능성이 있습니다."
 mem_disguised_planet.100.a:0 "실망스럽군."
 mem_disguised_planet_modifier:0 "홀로그램 영사기"
 mem_disguised_planet_modifier_desc:0 "고대의 홀로그램 영사기는 이 행성에서 유독성 구름의 가짜 이미지를 생성합니다."
 d_mem_disguised_planet_mystery_pile:0 "수수께끼 기둥"
 d_mem_disguised_planet_mystery_pile_desc:0 "이 더미가 정확히 무엇인지는 불분명하지만, 고도로 복잡한 중합제로 구성되어 있고 보기에 고통스럽고 악취가 납니다. 또한 흔들거립니다."
 d_mem_disguised_planet_triple_deposit:0 "숨겨진 계곡"
 d_mem_disguised_planet_triple_deposit_desc:0 "해로운 행성의 가짜 이미지 아래에 안전하게 숨겨진 희귀 자원이 풍부한 계곡이 있습니다."
