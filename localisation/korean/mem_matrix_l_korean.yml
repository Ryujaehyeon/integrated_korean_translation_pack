l_korean:
 mem_matrix_category:0 "고대 구조물"
 mem_matrix_category_desc:0 "§Y[From.GetName]§!을(를) 궤도 조사한 결과 황폐해진 유적들 사이에서 손상되지 않은 구조물 하나를 발견했습니다. 추가 조사가 필요합니다."
 mem_matrix.1.name:0 "충격적인 발견"
 mem_matrix.1.desc:0 "이 고대 건물의 복합체는 어떤 원시적인 AI에 의해 유지되고 있습니다. 이 컴퓨터 시스템은 우리 팀이 건물에 들어오는 것을 전혀 인지하지 못하는 것처럼 보였습니다. 복합체의 깊은 곳에서는 우리의 과학자들을 위한 충격적인 계시가 기다리고 있었습니다: 중앙 컴퓨터에 연결된 포드 형태의 구조물에 갇힌 수천 명의 인간형 외계인들! 그들은 매우 높은 수준의 뇌 활동을 보이고 있습니다. 이 시스템은 포드에 갇힌 상태에서도 이 주민들을 생존하게 유지하며, 손실을 보충하기 위해 대체 생명체를 번식하는 것 같습니다. 수석 과학자 §Y[Root.leader.GetName]§!는 데이터베이스를 연구하고 이 장소의 목적이 무엇인지 알아내는 데 시간이 걸릴 것이라고 믿고 있습니다."
 mem_matrix.1.a:0 "불쾌하군."
 mem_matrix.2.name:0 "오작동"
 mem_matrix.2.desc:0 "스캐너에 고장이 있었던 것 같습니다. 우리의 조사 팀은 지정된 위치에서 잔해와 폐허 외에는 아무것도 발견하지 못했습니다."
 mem_matrix.2.a:0 "그럼 됐어."
 mem_matrix.3.name:0 "고대 방어망"
 mem_matrix.3.desc:0 "§Y[Root.leader.GetName]§!와 조사 팀의 나머지가 고대 구조물에 들어갔을 때, 그들은 무의식적으로 자동 방어 시스템을 활성화했습니다. 그들의 구조 요청은 격렬한 총격과 건물의 붕괴에 의해 묻혀버렸습니다. 그들 중 아무도 살아남지 못했습니다..."
 mem_matrix.3.a:0 "끔찍하군!"
 MEM_MATRIX_INVESTIGATION:0 "고대 복합 건물"
 MEM_MATRIX_INVESTIGATION_DESC:0 "과학자들이 §Y[From.GetName]§에서 발견된 인공지능 복합 건물을 연구하고자 합니다."
 mem_matrix.5.name:0 "신경망"
 mem_matrix.5.desc:0 "저장된 데이터에 대한 상세 분석을 통해 이 복합체의 역사가 밝혀졌습니다. 한때 이곳은 일종의 감옥이자 신경 연결 및 AI 연구를 전문으로 하는 과학 기관이었습니다. 그들의 가장 큰 업적은 첫 번째 자각형 AI가 행성의 핵무기고를 사용하여 자신의 연구를 수행하면서 끔찍하게 되돌아왔습니다. 그로 인해 발생한 대화재는 이 행성의 모든 생명을 소멸시켰습니다 - 이 시설의 내용물을 제외하고는 말입니다. 그 이후로 AI는 천천히 스스로를 재작성하며 점점 더 수동적으로 변해갔습니다. AI는 수감자들이 평범한 삶을 살고 있다고 믿게 하여 그들을 진정시키기 위해 여러 겹의 현실을 만들어냈고, 그들이 자신의 상황의 진실을 인식하지 못하도록 했습니다. AI 자체는 현실이 환상이라는 생각에 집착하게 되었고 - 자신이 컴퓨터가 아니라 컴퓨터의 시뮬레이션이며, 다른 존재의 차원에서 프로그램의 일부에 불과하다고 믿게 되었습니다. AI의 프로그램은 이 재귀에 깊이 얽혀 있어 전체 시스템을 파괴하지 않고는 접근할 수 없게 되었습니다. 그러나 현재 사용 가능한 자원의 일부만을 사용하고 있기 때문에 우리는 슈퍼컴퓨터의 나머지 자원을 마음대로 사용할 수 있습니다."
 mem_matrix.5.a:0 "정말 흥미롭군."
 d_mem_matrix:0 "신경망 컴퓨터 복합 시설"
 d_mem_matrix_desc:0 "고대의 연구 복합 시설입니다. 수천에 이르는 생명체가 연결되어 하나의 거대한 컴퓨터로 작동합니다."
