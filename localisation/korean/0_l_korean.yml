l_korean:
 Name_HUI:0 "릴리안 스칼렛"
 HUI_backstory:0 "하늘에서 떨어진 정체불명의 소녀. 과거도, 고향도, 이끌어 줄 기억도 없는 §Y릴리안 스칼렛§!은 이제 자신에게 두 번째 삶을 준 제국의 곁에서 새로운 길을 걷습니다."
 HUI_catch_phrase:0 "최선을 다하겠습니다."
 HUIspawn.0.name:0 "하늘에서 떨어진 캡슐"
 HUIspawn.0.desc:0 "§Y출처 불명§!의 수송 캡슐이 최근 §Y수도 행성§!에 추락했습니다.\n\n당국은 캡슐 안에서 어린 소녀가 발견되었다고 현 통치자에게 보고했습니다. 소녀의 외모는 범상치 않습니다. §W곧게 뻗은 백발§!에 §B푸른 눈 한쪽§!과 §R붉은 눈 한쪽§!, 그리고 머리 위에는 옅고 창백한 광륜이 떠 있습니다.\n\n캡슐 내부는 샅샅이 수색되었습니다. 알려진 기술도, 국가 표식도, 외교 전문도 발견되지 않았습니다. 내벽에 새겨진 문구 하나가 유일한 단서였습니다.\n\n§Y\"릴리안 스칼렛, 117.\"§!\n\n소녀는 의료 시설로 이송되어 현재 안정을 되찾았습니다."
 HUIspawn.0.a:0 "회복 병동에 있는 §Y릴리안 스칼렛§!을 찾아갑니다."
 HUI.2.name:0 "회복 병동"
 HUI.2.desc:0 "어린 소녀가 창가에 서서 말없이 바깥세상을 바라보고 있습니다.\n\n의료진의 보고에 따르면 소녀에게는 §R기억이 없습니다§!. 처음에는 말조차 거의 알아듣지 못했지만, §Y믿기 힘든 속도§!로 적응하여 몸짓으로 의사를 전하더니 이내 서툰 문장으로 말하기 시작했습니다.\n\n예비 심문에서 소녀는 자신이 누구인지, 어디에서 왔는지, 왜 이곳에 왔는지 답하지 못했습니다.\n\n마법 검사와 정밀 의료 스캔 결과, 뇌에는 활성화된 기억 각인이 거의 남아 있지 않았습니다. 지금의 기억이 소녀의 §Y첫 기억§!일지도 모른다는 것이 의료진의 판단입니다.\n\n더 우려스러운 것은 소녀의 힘입니다. 마력 출력은 §Y비정상적으로 높으며§!, §M장막§!과의 친화력은 너무나 극단적이어서 스캐너로는 수치화조차 불가능합니다.\n\n소녀가 무엇이든 간에, 소녀는 §R위험합니다§!.\n\n그리고 매우 강력합니다.\n\n§L\"무슨 말씀을 하시기 전에... 죄송합니다. 아무것도 기억나지 않는 모양이에요. 이 모든 게... 저에게는... 처음이라서요.\"§!"
 HUI.2.a:0 "소녀의 §W광륜§!과 정체에 대해 물어봅니다."
 HUI.3.name:0 "과거가 없는 소녀"
 HUI.3.desc:0 "§L\"저도 모릅니다.\"§!\n\n§Y릴리안 스칼렛§!은 잠시 시선을 내리깔았다가 다시 당신을 바라봅니다.\n\n§L\"하지만 무언가가 저를 당신에게로 이끌었다는 것은 압니다. 저는 갈 곳도, 기억할 것도 없습니다. 기억하고 싶습니다... 제가 누구인지.\"§!\n\n소녀의 목소리에 거짓은 없습니다. 준비된 호소도, 숨겨진 정치적 의도도 없습니다.\n\n그저 §R과거가 없는§! 소녀와 누구도 가늠할 수 없는 힘, 그리고 서로 다른 두 하늘을 담은 듯한 눈동자만이 있을 뿐입니다."
 HUI.3.a:0 "함께 가자, §Y릴리안§!. 이곳에서 바라본 세상이 어떤지 보여 주겠다."
 HUI.4.name:0 "릴리안 스칼렛"
 HUI.4.desc:0 "몇 달이 지난 지금, §Y릴리안 스칼렛§!은 비범한 능력을 입증해 보였습니다.\n\n소녀의 지성은 거의 §M초자연적§!이라 할 만하며, 국가 최고의 두뇌들마저 능가합니다. 시간이 흐르며 소녀는 말단 행정직을 하나 맡았고, 또 하나, 다시 또 하나를 맡으며 국가 권력의 중심에 점점 가까워졌습니다.\n\n한때 불가능하다고 여겨졌던 보고서들이 이제는 아침 식사 전에 처리됩니다. 구역 분쟁은 소녀의 주석 아래 자취를 감춥니다. 보급 오류, 외교 브리핑, 예산 모순, 군수 요청 모두가 그 차분하고 초인적인 집중력 앞에 무릎을 꿇습니다.\n\n소녀의 존재는 우리 국가에 §G비할 데 없는 이익§!을 가져다줄 것입니다.\n\n§L\"곁에 머물게 해 주셔서 감사합니다. 당신이 주신 이 새로운 삶에 걸맞은 사람이 되도록 열심히 노력할게요.\"§!\n\n§Y릴리안 스칼렛§!이 국가의 고위 §B공직자§!로 공식 인정되었습니다."
 HUI.4.a:0 "§Y릴리안 스칼렛§!을 고위 §B공직자§!로 등용합니다."
 leader_trait_admiral_HUI:0 "하늘이 내린 인재"
 leader_trait_admiral_HUI_desc:0 "이 단독 버전에서는 사용되지 않습니다."
 leader_trait_HUI_1:0 "전쟁의 광륜"
 leader_trait_HUI_1_desc:0 "이 단독 버전에서는 사용되지 않습니다."
 leader_trait_governor_HUI:0 "하늘이 내린 인재"
 leader_trait_governor_HUI_desc:0 "§Y릴리안 스칼렛§!은 범상치 않은 기품과 절제, 직관을 지니고 있어 자신에게 맡겨진 세계를 더욱 굳건하게 만듭니다."
 leader_trait_hui_2:0 "장막의 손길"
 leader_trait_hui_2_desc:0 "릴리안의 존재는 §M장막§!의 흐름과 공명하여 행정의 부담을 덜어 주고, 운명을 아주 미세하게 제국에 유리한 쪽으로 기울입니다."
 leader_trait_scientist_HUI:0 "하늘이 내린 인재"
 leader_trait_scientist_HUI_desc:0 "이 단독 버전에서는 사용되지 않습니다."
 leader_trait_hui_3:0 "초월적 지성"
 leader_trait_hui_3_desc:0 "이 단독 버전에서는 사용되지 않습니다."
 edict_HUI_restore_lillian:0 "릴리안 스칼렛 복원"
 edict_HUI_restore_lillian_desc:0 "비상 보호 조치입니다. 모드 충돌, 세이브 문제 또는 비정상적인 사망 상태로 §Y릴리안 스칼렛§!을 잃었다면, 이 법령이 그녀를 불사의 §B조언자§!로 재창조합니다."
