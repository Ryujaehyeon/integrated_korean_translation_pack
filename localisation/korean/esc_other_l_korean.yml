 esc_extra_large:0 "초대형"
 d_esc_large_borehole_1:0 "심층 시추공"
 d_esc_large_borehole_1_desc:0 "행성의 맨틀과 핵에서 곧바로 귀중한 자원을 채굴할 수 있는 거대한 시추공입니다."
 d_esc_mantle_mineral_cluster:0 "광물 군집"
 d_esc_mantle_mineral_cluster_desc:0 "행성 맨틀 깊은 곳에 위치한 고품질 광물의 조밀한 광맥으로, 맨틀 채굴 시설을 통한 채굴에 적합합니다."
 d_esc_mantle_alloy_plume:0 "합금 플룸"
 d_esc_mantle_alloy_plume_desc:0 "행성 핵에서 상부 맨틀로 솟구치는 용융 합금 플룸으로, 맨틀 채굴 시설이 빨아들일 준비가 되어 있습니다."
 d_esc_mantle_exotic_gases_pocket:0 "이종 가스 포켓"
 d_esc_mantle_exotic_gases_pocket_desc:0 "행성 상부 맨틀 안에 갇힌 가압 이종 가스 포켓으로, 맨틀 채굴 시설을 통해 접근할 수 있습니다."
 d_esc_mantle_rare_crystal_cluster:0 "희귀 수정 군집"
 d_esc_mantle_rare_crystal_cluster_desc:0 "행성 맨틀 안에 자리 잡은 거대한 희귀 수정 군집으로, 맨틀 채굴 시설이 차지하기를 기다리고 있습니다."
 d_esc_mantle_volatile_motes_cluster:0 "용융 티끌"
 d_esc_mantle_volatile_motes_cluster_desc:0 "행성 상부 맨틀의 용융암 포켓 안에 떠 있는 휘발성 티끌로, 맨틀 채굴 시설로 추출할 수 있습니다."
 d_esc_mantle_trade_value:0 "아름다운 수정"
 d_esc_mantle_trade_value_desc:0 "산업적 가치는 없지만, 광채 때문에 부유층이 귀하게 여기는 수정입니다. 맨틀 채굴 시설은 사치품에 대한 끝없는 수요를 충족하기 위해 이를 추출할 수 있습니다."
 d_esc_mantle_living_metal:0 "생체 금속 플룸"
 d_esc_mantle_living_metal_desc:0 "단순한 생물처럼 행동하는 기묘한 용융 금속 플룸으로, 완전히 새로운 종류의 자가 수복 소재에 응용될 가능성을 암시합니다."
 d_esc_mantle_immanis_colosseus:0 "죽은 거상"
 d_esc_mantle_immanis_colosseus_desc:0 "행성 상부 맨틀에 떠 있는, 상상을 초월할 만큼 거대한 생물의 보존된 사체입니다. 그 연구는 생명 자체에 대한 우리의 이해를 새로 정의할 가능성이 있습니다."
 edict_esc_mod_control_edict:0 "ESC NEXT 설정 메뉴"
 edict_esc_mod_control_edict_desc:0 "ESC NEXT 옵션 메뉴 열기"
 decision_esc_mod_menu:0 "$edict_esc_mod_control_edict$"
 decision_esc_mod_menu_desc:0 "$edict_esc_mod_control_edict_desc$"
 decision_esc_mod_cheat_menu:0 "ESC NEXT 치트 메뉴"
 decision_esc_mod_cheat_menu_desc:0 "ESC NEXT 치트 메뉴를 엽니다"
 decision_esc_clone_dragon:0 "에테르 드레이크 유체 복제"
 decision_esc_clone_dragon_desc:0 "우리의 과학자들이 더 어리고 유순한 드레이크를 만들기 위해 에테르 드레이트를 복제하려할 것입니다."
 decision_esc_clone_sky_dragon:0 "하늘 용 유채 복제"
 decision_esc_clone_sky_dragon_desc:0 "우리의 과학자들이 우리와 함께 할 어린 드레이크를 만들기 위해 하늘 용을 복제하려할 것입니다."
 mod_weapon_type_psionic_weapon_damage_mult:0 "사이오닉 무기 피해량"
 mod_weapon_type_psionic_weapon_fire_rate_mult:0 "사이오닉 무기 공격 속도"
 mod_weapon_type_nanite_weapon_damage_mult:0 "나노봇 무기 피해량"
 mod_weapon_type_nanite_weapon_fire_rate_mult:0 "나노봇 무기 공격 속도"
 mod_weapon_type_biological_weapon_damage_mult:0 "생체 무기 피해량"
 mod_weapon_type_biological_weapon_fire_rate_mult:0 "생체 무기 공격 속도"
 mod_planet_farmers_rare_crystals_produces_add:0 "£rare_crystals£ $rare_crystals$, £job_farmer£ $job_farmer_plural$로부터"
 mod_planet_farmers_minerals_upkeep_add:0 "£minerals£ $minerals$ 유지비, £job_farmer£ $job_farmer_plural$"
 mod_planet_metallurgists_nanites_produces_add:0 "£nanites£ $nanites$, £job_foundry£ $job_foundry_plural$로부터"
 mod_planet_metallurgists_consumer_goods_upkeep_add:0 "£consumer_goods£ $consumer_goods$ 유지비, £job_foundry£ $job_foundry_plural$"
 mod_planet_researchers_sr_zro_produces_add:0 "£sr_zro£ $sr_zro$, £job_researcher£ $job_researcher_plural$로부터"
 mod_planet_biologists_sr_zro_produces_add:0 "£sr_zro£ $sr_zro$, £job_biologist£ $job_biologist_plural$로부터"
 mod_planet_physicsts_sr_dark_matter_produces_add:0 "£sr_dark_matter£ $sr_dark_matter$, £job_physicist£ $job_physicist_plural$로부터"
 mod_planet_miners_alloys_upkeep_add:0 "£alloys£ $alloys$ 유지비, £job_miner£ $job_miner_plural$"
 mod_esc_weapon_effect_healing:0 "대상에게 피해를 줄 때 일부 $HITPOINTS$ 또는 $ARMOR$를 수리합니다"
 mod_esc_weapon_effect_critical_damage:0 "이 무기는 때때로 대상에게 증가된 피해를 주는 치명타를 가할 수 있습니다"
 esc_psionic_avatar_army:0 "§M사이오닉 아바타§!"
 esc_psionic_avatar_army_desc:0 "물질계의 거주자들을 대신해 싸우도록 소환된 강력한 사이오닉 개체입니다."
 esc_erasure_squad_army:0 "말소 부대"
 esc_erasure_squad_army_desc:0 "적을 현실에서 지워버릴 강력한 무장을 장비한 특수부대입니다."
 esc_eradicator_droids_army:0 "박멸 드로이드 군단"
 esc_eradicator_droids_army_desc:0 "적을 현실에서 지워버릴 강력한 무장을 장비한 첨단 기계 군단입니다."
 esc_tesla_droids_army:0 "테슬라 드로이드"
 esc_tesla_droids_army_desc:0 "강력한 테슬라 병기로 적을 산채로 구워버리는 기계 군대입니다."
 esc_tesla_troopers_army:0 "테슬라 군대"
 esc_tesla_troopers_army_desc:0 "절연 장갑으로 중무장한 채로 강력한 테슬라 병기를 휘두르는 군인입니다."
 esc_biohorror_army:0 "바이오-호러 무리"
 esc_biohorror_army_desc:0 "원격 조종되는 생체공학적 짐승들입니다."
 sm_esc_starbase_reactor:0 "항성기지 반응로"
 sm_esc_starbase_reactor_desc:0 "방대한 우주 시설에 동력을 공급하는 거대한 영점 반응로입니다."
 sm_esc_starbase_dm_orbital_plant:0 "궤도 암흑 물질 공장"
 sm_esc_starbase_dm_orbital_plant_desc:0 "블랙홀과 같은 자연적인 원천에 가까워져 생산량이 크게 증가하는 £sr_dark_matter£ §Y$sr_dark_matter$§! 생산에 전념하는 대규모 스타베이스 시설입니다."
 sm_esc_starbase_zro_orbital_plant:0 "궤도 지로 공장"
 sm_esc_starbase_zro_orbital_plant_desc:0 "자연 자원이 가까이 있을 때 출력이 상당히 증가하는 £sr_zro£ §Y$sr_zro$§!를 합성하는 전문화된 궤도 시설입니다."
 sm_esc_starbase_nanite_factory:0 "궤도 나노봇 공장"
 sm_esc_starbase_nanite_factory_desc:0 "산업 규모로 £nanites£ §Y$nanites$§!를 생산하는 궤도 시설로, 자연 나나이트 원천과의 근접성 덕분에 생산성이 더욱 향상됩니다."
 esc_special_projects.1001.name:0 "이상한 능력을 보이는 유기체"
 esc_special_projects.1001.desc:0 "우리의 세력권 내에 존재하는 수많은 유기체들이 이상한 능력을 보이고 있습니다. 이 현상을 조사해본 결과, 이러한 능력이 §M사이오닉§!이라 칭해지며 생각으로 실현되는 에너지 조작의 형태를 나타냄이 밝혀졌습니다. $job_calculator$ 드론들은 이러한 능력을 개량하여 무기로 바꿀 수 있다고 생각합니다. 이러한 연구 방안을 승인해야할까요?"
 esc_special_projects.1001.a:0 "알 수 있는것은 전부 알아내야한다!"
 esc_special_projects.1001.b:0 "따로 연구할 것들이 많다"
 ESC_MACHINE_EMPIRE_PSIONICS:0 "§M사이오닉§!이란 무엇인가?"
 ESC_MACHINE_EMPIRE_PSIONICS_DESC:0 "우리 세력권 내의 수많은 유기체들이 보이는 이 이상한 능력, §M사이오닉§!을 연구해야합니다. 조언자 지능은 생각으로 실현되는 에너지 조작이 §M사이오닉§! 능력의 핵심이며, 이를 우리 함대에서 사용할 수 있는 무기로 사용할 수 있다고 생각합니다. 그러한 병기는 알려진 물리학 법칙을 위반하는 듯 하지만, 가능하다고 판명된다면 상당한 이점을 얻게 되는 것입니다."
 esc_special_projects.1002.name:0 "§M사이오닉§! 연구 완료!"
 esc_special_projects.1002.desc:0 "많은 연구와 실험 끝에, $job_calculator$ 드론들이 유기체들의 §M사이오닉§! 능력을 통제하고 강화할 방안을 찾아냈습니다. 이로써 우리는 거의 무한대에 가까운 장갑층을 뚫을 수 있는 독특한 §M사이오닉§! 병기를 만들 수 있을 것입니다. 그러나 수많은 유기체를 함선에 태워야 작동하며 이 무기의 잠재력을 최대한으로 이용하려면 £sr_zro£ §Y$sr_zro$§!라는 물질이 필요합니다."
 esc_special_projects.2002.name:0 "자동화 드레드노트 관찰: 제안됨"
 esc_special_projects.2002.desc:0 "자동화 드레드노트는 매혹적인 선구자 기술입니다만, 그 함선은 우리가 그 구조를 연구하는 것을 두고 볼 것 같지는 않습니다. 그러나 그 함선은 이 성계를 하루종일 순찰하는데, 이 때의 움직임을 관측하는 것 만으로도 많은 것을 배울 수 있습니다.  어쩌면 그 함선에 내장된 전투 컴퓨터의 논리를 복제할 수 있다면, 이를 우리 함선에 적용할 수 있을 것이고 성능이 크게 향상될 것입니다."
 esc_special_projects.2002.option.a:0 "우리는 배울 수 있는 모든 것을 배울 것이다."
 esc_special_projects.2002.option.b:0 "우린 저 쓰레기 덩어리를 복제할 필요가 없다!"
 ESC_DREADNOUGHT_OBSERVATION:0 "자동화 드레드노트 관찰"
 ESC_DREADNOUGHT_OBSERVATION_DESC:0 "고대의 자동화 드레드노트에 내장된 전투 체계에 진짜 지능은 없는 듯 합니다만, 그럼에도 그 체계는 매우 발전된 것이며 전투 체계의 논리를 복제할 수 있다면 우리 함선의 성능이 대폭 향상될 것은 틀림 없습니다."
 esc_special_projects.2003.name:0 "자동화 드레드노트 관찰: 보고"
 esc_special_projects.2003.desc:0 "관측팀이 자동화 드레드노트의 움직임과 전투 행동에 대해 수집한 데이터 덕분에, 우리의 과학부가 적어도 전투 컴퓨터의 논리 일부는 복제할 수 있으리라 생각합니다. 물론 우리의 함선 설계에 적용할 수 있습니다."
 esc_special_projects.3002.name:0 "나노봇 사고 연결망 개발"
 esc_special_projects.3002.desc:0 "나노 기술과 AI의 발달로 일부 과학자들이 나노봇 기판에서 작동하며 유기체의 생각 과정을 전례없는 수준으로 모방하는 차세대 AI 개발 작업에 착수했습니다. 군 당국은 이러한 AI를 함대 전투 컴퓨터에 도입하는 데 관심이 있으며, 연구를 후원하고자 합니다."
 esc_special_projects.3002.option.a:0 "연구를 승인해라"
 esc_special_projects.3002.option.b:0 "그런 기술은 필요하지 않다!"
 ESC_NANITE_THOUGHT_MATRIX_DEVELOP:0 "나노봇 사고 연결망 개발"
 ESC_NANITE_THOUGHT_MATRIX_DEVELOP_DESC:0 "일부 연구에 따르면, 나노봇 기판에서 작동하는 AI는 기계의 속도와 정밀도는 없지만 유기체의 생각 과정을 완벽하게 복제합니다. 그러한 AI가 개발된다면 많은 분야에서 혁명이 일어날 것입니다. 또한 군 당국이 전투 목적으로 그러한 AI를 사용하는데 관심을 보이고 있습니다. 함선에 이런 AI를 탑재하면 단순하고 시대에 뒤떨어진 AI를 사용하는 적보다 크게 앞서나갈 수 있을 것입니다."
 esc_special_projects.3003.name:0 "온전한 잿빛 폭풍 함선 회수"
 esc_special_projects.3003.desc:0 "최근 잿빛 폭풍이라고 불리는 외우주의 위협과의 전투에서 거의 손상되지 않은 함선을 복구했습니다. 과학자들의 선행 조사에 따르면 이 함선은 나노봇를 기판에서 작동하는 AI에 의해 조종된 것으로, 이 AI는 오래 전 멸종한 어떤 유기체 종족의 생각을 모방했습니다. 또한 이 함선의 AI 기술을 복제하여 우리 함선의 전투력을 향상시키는 데 사용할 수 있을 것이라고 합니다."
 esc_special_projects.3003.option.a:0 "연구를 승인해라"
 esc_special_projects.3003.option.b:0 "그런 기술은 필요하지 않다!"
 ESC_NANITE_THOUGHT_MATRIX_RENGINEER:0 "나노봇 사고 연결망 역설계"
 ESC_NANITE_THOUGHT_MATRIX_RENGINEER_DESC:0 "매우 온전한 상태의 잿빛 폭풍 함선을 복구한 뒤, 우리 과학자들은 이 함선은 나노봇 기판에서 작동하는 진보된 형태의 AI가 조종하고 있으며, 이 AI는 오래 전 멸종한 유기체 종족의 생각을 모방했습니다. 그러한 함선의 힘을 목격했으니, 베끼고 싶어지는 것은 당연한 일일 것입니다."
 esc_special_projects.3004.name:0 "나노봇 사고 연결망"
 esc_special_projects.3004.desc:0 "마침내 유기체의 사고 방식을 완벽하게 복제할 수 있는 나노봇 기반의 AI를 만들 수 있게 되었습니다. 기술 발전의 새로운 시대가 열릴 것입니다."
 esc_special_projects.4002.name:0 "거대 포식자 연구: 제안"
 esc_special_projects.4002.desc:0 "우리는 공허에서 살아남기 위해 비범한 생리적 적응에 의존해야 하는, 압도적인 크기와 흉포함을 지닌 우주 생명체들을 마주쳤습니다. 그 적응을 연구하고 복제할 수 있다면, 우리 전쟁생물의 훨씬 더 강력한 표현형이 가능해질 것입니다."
 esc_special_projects.4002.option.a:0 "배울 수 있는 것을 배우겠다"
 esc_special_projects.4002.option.b:0 "우리 전쟁생물이 우리에게 반기를 들게 하고 싶지는 않다!"
 ESC_GIGAPREDATOR_STUDY:0 "거대 포식자 연구"
 ESC_GIGAPREDATOR_STUDY_DESC:0 "우주 레비아탄은 그 질량의 생물이 살아남을 수 없어야 할 영역에서 번성하며, 우리가 거의 이해하지 못하는 생물학적 적응으로 유지됩니다. 이러한 적응을 연구하면 우리만의 훨씬 더 강력한 전쟁생물을 만들어내는 방법을 배울 수 있습니다."
 esc_special_projects.4003.name:0 "거대 포식자 연구: 보고"
 esc_special_projects.4003.desc:0 "우리 연구자들은 레비아탄이 공허에서 생존하는 핵심 비밀을 밝혀냈으며, 이 지식이 우리 전쟁생물에 적용되어 더 강하고 똑똑한 표현형을 만들어 우리 함대의 전력을 크게 높일 수 있다고 확신합니다."
 ESC_NULL_STRING:0 ""
 esc_events.2000.title:0 "날아오르는 에테르 드레이크"
 esc_events.2000.desc:0 "에테르 드레이크를 복제해내기 위한 노력이 결실을 거두었으며, 어린 개체를 만들어냈습니다. 과학자들의 앞에서 상당히 온순한 모습을 보이고 있으며, 우리의 힘이 되어줄 것입니다."
 esc_events.2002.title:0 "날아오르는 하늘 용"
 esc_events.2002.desc:0 "하늘 용을 복제해내기 위한 노력이 결실을 거두었으며, 어린 개체를 만들어냈습니다. 과학자들이 다룰 때 상당히 온순한 모습을 보이고 있으며, 우리의 힘이 되어줄 것입니다."
 esc_events.3011.name:0 "풍부한 광물"
 esc_events.3011.desc:0 "§Y[Root.GetName]§!의 광부들이 행성 맨틀 깊은 곳에서 유난히 풍부한 £minerals£ §Y$minerals$§! 광맥을 발견하여, 현지 자원 산출에 상당한 향상이 기대됩니다."
 esc_events.3012.name:0 "용융 합금"
 esc_events.3012.desc:0 "§Y[Root.GetName]§!의 맨틀 채굴 작업이 행성 핵에서 솟구치는 용융 £alloys£ §Y$alloys$§! 플룸을 발견했습니다. 추출 공정을 약간 조정하면 맨틀 채굴 시설이 이 풍요를 활용할 수 있습니다."
 esc_events.3013.name:0 "이종 가스 포켓"
 esc_events.3013.desc:0 "§Y[Root.GetName]§!의 광부들이 맨틀 안에 갇힌 가압 £exotic_gases£ §Y$exotic_gases$§! 포켓을 발견했습니다. 맨틀 채굴 시설로 추출하기에 알맞습니다."
 esc_events.3014.name:0 "결정의 선물"
 esc_events.3014.desc:0 "§Y[Root.GetName]§!의 광부들이 행성 맨틀 안에 박힌 거대한 £rare_crystals£ §Y$rare_crystals$§! 군집을 발견했습니다. 이 발견은 현지 경제를 상당히 풍요롭게 할 것입니다."
 esc_events.3015.name:0 "용융 티끌"
 esc_events.3015.desc:0 "§Y[Root.GetName]§!의 광부들이 맨틀의 용융암 속에 녹아 있는 상당량의 £volatile_motes£ §Y$volatile_motes$§!를 발견했습니다. 맨틀 채굴 시설이 이제 이 귀중한 발견을 활용할 수 있습니다."
 esc_events.3016.name:0 "예쁜 결정"
 esc_events.3016.desc:0 "§Y[Root.GetName]§!의 광부들이 행성 맨틀 안에서 산업적 가치는 없지만 사치품 시장이 갈망하는 결정 군집을 발견했습니다. 맨틀 채굴 시설로 이 수정을 추출하면 상당한 £trade_value£ §Y$trade$§!를 얻을 수 있을 것입니다."
 esc_events.3017.name:0 "생체 금속"
 esc_events.3017.desc:0 "§Y[Root.GetName]§!의 광부들이 행성 맨틀에서 단순한 생물처럼 행동하는 용융 금속 형성물이라는 기묘한 발견을 보고했습니다. 맨틀 채굴 시설의 장비를 개조하면 이 £sr_living_metal£ §Y$sr_living_metal$§!를 연구하고 소량을 산업용으로 추출할 수 있습니다."
 esc_events.3051.name:0 "임마니스 콜로세우스"
 esc_events.3051.desc:0 "§Y[Root.GetName]§!의 맨틀 채굴 시설이 엄청난 것을 발굴했습니다. 거의 이해할 수 없을 만큼 거대한 생명체의 사체가 행성 맨틀 안에 떠 있으며, 압도적인 압력과 작열하는 열기에도 어떻게든 보존되어 있습니다.\n\n초기 조사에 따르면 이 생물은 가로 약 250킬로미터, 두께 최소 20킬로미터에 달합니다. 이런 존재가 어떻게 자신을 유지했는지는 아직 알 수 없지만, 유력한 이론은 행성 지각의 화석 연료를 대사했다는 것입니다.\n\n이 생물은 약 15만 년 전에 죽어 그 이후 천천히 맨틀로 가라앉은 것으로 보입니다. 내부 탐사에서는 희미하지만 아직 살아 있는 내부 생물권이 드러났고, 그곳에는 표면 생명과 전혀 닮지 않은 생물들이 살고 있으며, 그 계통은 수백만 년 전에 갈라진 듯합니다.\n\n추가 연구가 필수적입니다."
