 esc_nanite_weapons_armor_damage_debuff_1:0 "공격적 분해 나노봇"
 esc_nanite_weapons_armor_damage_debuff_1_desc:0 "집요한 분해용으로 프로그램된 나노봇이 선체 표면에 달라붙어 쉬지 않고 갉아먹으며, 지속적인 구조 피해를 입힙니다."
