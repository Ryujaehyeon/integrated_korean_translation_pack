 sm_esc_arkship_advanced_armor:0 "개선된 중성자 금속 갑옷 plating"
 sm_esc_arkship_advanced_armor_desc:0 "우리 문명에 있어 아크십의 중요성은 아무리 강조해도 지나치지 않습니다. 우리는 아크십의 지속적인 생존을 보장하기 위해 할 수 있는 모든 일을 해야 합니다. 이 새로운 세대의 장갑판으로, 가장 치열한 공격조차도 그들에게 손상을 입힐 가능성이 거의 없다는 것을 확신할 수 있습니다.\n"
 sm_esc_arkship_advanced_lm_armor:0 "개선된 재생성 네트로늄 장갑 plating"
 sm_esc_arkship_advanced_lm_armor_desc:0 "우리 문명에서 아크십의 중요성은 아무리 강조해도 지나치지 않습니다. 우리는 아크십의 지속적인 생존을 보장하기 위해 할 수 있는 모든 일을 해야 합니다. 이 새로운 세대의 재생형 장갑판 덕분에 가장 치열한 공격조차도 그들에게 피해를 줄 가능성이 거의 없다는 것을 확신할 수 있습니다.\n"
 sm_esc_arkship_advanced_crystal_armor:0 "강화된 결정체 갑옷 plating"
 sm_esc_arkship_advanced_crystal_armor_desc:0 "우리 문명에 대한 아크쉽의 중요성은 아무리 강조해도 지나치지 않습니다. 우리는 아크쉽의 지속적인 생존을 보장하기 위해 할 수 있는 모든 일을 해야 합니다. 이 새로운 세대의 결정체 갑옷 장착으로, 가장 치열한 공격조차도 그들에게 피해를 줄 가능성이 거의 없다는 것을 확신할 수 있습니다.\n"
 sm_esc_arkship_advanced_shields:0 "개선된 초고속 방패 배열"
 sm_esc_arkship_advanced_shields_desc:0 "우리 문명에 대한 아크쉽의 중요성은 아무리 강조해도 지나치지 않습니다. 우리는 그들의 지속적인 생존을 보장하기 위해 할 수 있는 모든 일을 해야 합니다. 이 새로운 세대의 초고속 방패 생성기를 통해, 우리의 아크쉽은 우주의 어두운 공허를 여행하는 동안 마주칠 수 있는 어떤 위협으로부터도 잘 보호받을 것입니다.\n"
 sm_esc_arkship_advanced_psi_shields:0 "개선된 사이오닉 방패 생성기"
 sm_esc_arkship_advanced_psi_shields_desc:0 "우리 문명에 대한 아크쉽의 중요성은 아무리 강조해도 지나치지 않습니다. 우리는 그들의 지속적인 생존을 보장하기 위해 할 수 있는 모든 일을 해야 합니다. 이 새로운 세대의 사이오닉 방패 생성기로, 우리의 아크쉽은 우주의 어두운 공허를 여행하는 동안 마주칠 수 있는 어떤 위협으로부터도 잘 보호받을 것입니다.\n"
 sm_esc_arkship_crystal_core_armor:0 "크리스탈 코어 장갑 plating"
 sm_esc_arkship_crystal_core_armor_desc:0 "우리 문명에 대한 아크쉽의 중요성은 아무리 강조해도 지나치지 않습니다. 우리는 아크쉽의 지속적인 생존을 보장하기 위해 모든 노력을 다해야 합니다. 이 새로운 크리스탈 코어 장갑을 설치함으로써, 우리는 아크쉽의 방어 능력을 크게 향상시켜 초공간의 가장 적대적인 조우에서도 생존할 수 있도록 할 것입니다.\n"
 sm_esc_arkship_bio_armor:0 "생체 물자 장갑 plating"
 sm_esc_arkship_bio_armor_desc:0 "우리 문명에 있어 아크선의 중요성은 아무리 강조해도 지나치지 않습니다. 우리는 아크선의 지속적인 생존을 보장하기 위해 모든 노력을 다해야 합니다. 이 새로운 생체 물자 장갑판을 설치함으로써, 우리는 아크선의 방어 능력을 크게 향상시켜 초공간의 가장 적대적인 조우에서도 생존할 수 있도록 할 것입니다.\n"
 sm_esc_arkship_nanite_armor:0 "나노-물자 방어판"
 sm_esc_arkship_nanite_armor_desc:0 "우리 문명에 대한 아크십의 중요성은 아무리 강조해도 지나치지 않습니다. 우리는 아크십의 지속적인 생존을 보장하기 위해 모든 노력을 다해야 합니다. 이 새로운 나노 물자 방어판을 설치함으로써, 우리는 아크십의 방어 능력을 크게 향상시켜 초공간의 가장 적대적인 만남에서도 생존할 수 있도록 할 것입니다.\n"
 sm_esc_arkship_shielding_armor:0 "차폐 장갑 plating"
 sm_esc_arkship_shielding_armor_desc:0 "우리 문명에서 아크십의 중요성은 아무리 강조해도 지나치지 않습니다. 우리는 아크십의 지속적인 생존을 보장하기 위해 모든 노력을 다해야 합니다. 이 새로운 방어막 생성 장갑판을 설치함으로써, 우리는 아크십의 방어 능력을 크게 향상시켜 초공간의 가장 적대적인 조우에서도 생존할 수 있도록 할 것입니다.\n"
 sm_esc_arkship_hardlight_armor:0 "하드라이트 장갑 plating"
 sm_esc_arkship_hardlight_armor_desc:0 "강력한 스펙트럴 레이스를 물리친 우리는 하드 라이트의 창조에 대한 통찰을 얻었습니다. 이 새로운 '물자'로 제작된 갑옷 판은 우리의 아크쉽에 이 은하에서 이전에 본 적이 없는 방어 능력을 부여할 것입니다.\n"
 sm_esc_arkship_horror_armor:0 "차원 공포 갑옷 장갑"
 sm_esc_arkship_horror_armor_desc:0 "이 은하를 침략하려 했던 강력한 차원 공포를 물리친 우리는 이제 이 세상을 초월한 물질에 대한 지식을 보유하고 있습니다. 그리고 이제 사라진 우주 태생 거대 생물의 굳센 가죽을 기반으로 한 장갑판을 설치함으로써, 우리의 아크십이 초공간의 가장 적대적인 조우에서도 생존할 수 있도록 보장할 것입니다.\n"
 sm_esc_arkship_cyclonic_shields:0 "사이클론 보호막 생성기 배열"
 sm_esc_arkship_cyclonic_shields_desc:0 "우리 문명에 대한 아크십의 중요성은 아무리 강조해도 지나치지 않습니다. 우리는 그들의 지속적인 생존을 보장하기 위해 모든 노력을 다해야 합니다. 사이클로닉 방패 생성기를 통해 우리의 아크십은 우주의 어두운 공허를 항해하는 동안 마주칠 수 있는 어떤 위협으로부터도 잘 보호받을 것입니다.\n"
 sm_esc_arkship_dark_matter_shields:0 "암흑 물질 방패 생성기 배열"
 sm_esc_arkship_dark_matter_shields_desc:0 "선조 기술을 연구한 결과, 우리는 어두운 물질을 활용하여 우리의 함선 주위에 거의 뚫을 수 없는 장벽을 생성하는 보호막을 개발하였습니다. 이러한 어두운 물질 보호막을 우리의 방주선에 설치함으로써, 우리는 초공간의 가장 적대적인 조우에서도 생존할 수 있도록 보장할 것입니다.\n"
 sm_esc_arkship_hangar_bay_advanced:0 "고급 전투기 격납고"
 sm_esc_arkship_hangar_bay_advanced_desc:0 "전투기의 새로운 세대가 서비스에 들어가면서, 가장 뛰어나고 유능한 전투기들은 우리의 아크십을 보호하는 가장 중요한 임무에 배치되어야 합니다.\n"
 sm_esc_arkship_archaeo_hangar_bay_advanced:0 "합성체 전투기 격납고 기술"
 sm_esc_arkship_archaeo_hangar_bay_advanced_desc:0 "전투기 세대가 새로 등장함에 따라, 가장 우수하고 능력 있는 전투기들은 우리의 아크쉽을 보호하는 가장 중요한 임무에 배치되어야 합니다.\n"
 sm_esc_arkship_amoeba_hangar_bay_advanced:0 "유전자 조작 아메바 격납고"
 sm_esc_arkship_amoeba_hangar_bay_advanced_desc:0 "유전 조작을 통해 전투 능력이 자연적으로 발생하는 종의 어떤 구성원보다도 월등한 아메바 샘플이 생산되었습니다. 가장 강력하고 충성스러운 아메바 무리는 우리의 아크쉽을 보호하는 임무를 맡아야 합니다.\n"
 sm_esc_arkship_laser_battery_advanced:0 "고급 레이저 포대"
 sm_esc_arkship_laser_battery_advanced_desc:0 "우리 문명에 대한 아크쉽의 중요성은 아무리 강조해도 지나치지 않습니다. 우리는 아크쉽의 지속적인 생존을 보장하기 위해 할 수 있는 모든 일을 해야 합니다. 최신 세대의 전투 레이저를 통해 우리는 아크쉽에 강력한 억제 무기를 제공하여 그들에게 해를 끼치고자 하는 자들을 멀리 쫓을 것입니다.\n"
 sm_esc_arkship_archaeo_laser_battery_advanced:0 "기술-합성 레이저 포대"
 sm_esc_arkship_archaeo_laser_battery_advanced_desc:0 "우리 문명에 대한 아크쉽의 중요성은 아무리 강조해도 지나치지 않습니다. 우리는 아크쉽의 지속적인 생존을 보장하기 위해 할 수 있는 모든 일을 해야 합니다. 새로운 세대의 기술-합성체 레이저를 통해, 우리는 아크쉽에 강력한 억제 무기를 제공하여 그들에게 해를 끼치고자 하는 자들을 멀리할 것입니다.\n"
 sm_esc_arkship_lance_battery_advanced:0 "고급 타키온 랜스 배터리"
 sm_esc_arkship_lance_battery_advanced_desc:0 "우리 문명에서 아크쉽의 중요성은 아무리 강조해도 지나치지 않습니다. 우리는 아크쉽의 지속적인 생존을 보장하기 위해 할 수 있는 모든 일을 해야 합니다. 최신 세대의 포탑 기반 타키온 랜스를 통해, 우리는 아크쉽에 강력한 억제 무기를 제공하여 그들에게 해를 끼치고자 하는 자들을 멀리할 것입니다.\n"
 sm_esc_arkship_particle_launcher_advanced:0 "고급 에너지 발사기"
 sm_esc_arkship_particle_launcher_advanced_desc:0 "우리 문명에 대한 아크쉽의 중요성은 아무리 강조해도 지나치지 않습니다. 우리는 아크쉽의 지속적인 생존을 보장하기 위해 할 수 있는 모든 일을 해야 합니다. 최신 세대의 에너지 발사기 무기를 통해, 우리는 아크쉽에 강력한 억제 무기를 제공하여 그들에게 해를 끼치고자 하는 자들을 멀리 떨어뜨릴 것입니다.\n"
 sm_esc_arkship_arc_emitter_battery_advanced:0 "고급 아크 포 대포"
 sm_esc_arkship_arc_emitter_battery_advanced_desc:0 "우리 문명에서 아크선의 중요성은 아무리 강조해도 지나치지 않습니다. 우리는 아크선의 지속적인 생존을 보장하기 위해 할 수 있는 모든 일을 해야 합니다. 최신 세대의 포탑 기반 아크 방출기를 통해, 우리는 아크선에 해를 끼치고자 하는 자들을 멀리 쫓아낼 강력한 억제 무기를 제공할 것입니다.\n"
 sm_esc_arkship_mass_driver_battery_advanced:0 "고급 가우스 포 배터리"
 sm_esc_arkship_mass_driver_battery_advanced_desc:0 "우리 문명에서 아크쉽의 중요성은 아무리 강조해도 지나치지 않습니다. 우리는 아크쉽의 지속적인 생존을 보장하기 위해 할 수 있는 모든 일을 해야 합니다. 새로운 세대의 가우스 캐논을 통해 우리는 아크쉽에 강력한 억제 무기를 제공하여 그들에게 해를 끼치고자 하는 자들을 멀리할 것입니다.\n"
 sm_esc_arkship_kinetic_artillery_battery_advanced:0 "고급 운동 에너지형 함포 배터리"
 sm_esc_arkship_kinetic_artillery_battery_advanced_desc:0 "우리 문명에 대한 아크십의 중요성은 아무리 강조해도 지나치지 않습니다. 우리는 아크십의 지속적인 생존을 보장하기 위해 할 수 있는 모든 일을 해야 합니다. 새로운 세대의 운동 에너지형 함포를 통해, 우리는 아크십에 강력한 억제 무기를 제공하여 그들에게 해를 끼치고자 하는 자들을 멀리하게 할 것입니다.\n"
 sm_esc_arkship_mass_accelerator_advanced:0 "고급 기가 포 배터리"
 sm_esc_arkship_mass_accelerator_advanced_desc:0 "우리 문명에 있어 아크쉽의 중요성은 아무리 강조해도 지나치지 않습니다. 우리는 아크쉽의 지속적인 생존을 보장하기 위해 가능한 모든 노력을 다해야 합니다. 새로운 세대의 대규모 질량 가속기를 통해, 우리는 아크쉽에 강력한 억제 무기를 제공하여 그들에게 해를 끼치고자 하는 자들을 멀리할 것입니다.\n"
 sm_esc_arkship_archaeo_mass_driver_battery_advanced:0 "합성체 질량 발사기 배터리 기술"
 sm_esc_arkship_archaeo_mass_driver_battery_advanced_desc:0 "우리 문명에서 아크십의 중요성은 아무리 강조해도 지나치지 않습니다. 우리는 아크십의 지속적인 생존을 보장하기 위해 할 수 있는 모든 일을 해야 합니다. 새로운 세대의 기술-합성체 매스 드라이버를 통해, 우리는 아크십에 해를 끼치고자 하는 자들을 멀리 쫓아낼 강력한 억제 무기를 제공할 것입니다.\n"
 sm_esc_arkship_archaeo_mass_accelerator_advanced:0 "합성체 포병 배터리"
 sm_esc_arkship_archaeo_mass_accelerator_advanced_desc:0 "우리 문명에서 아크쉽의 중요성은 아무리 강조해도 지나치지 않습니다. 우리는 아크쉽의 지속적인 생존을 보장하기 위해 할 수 있는 모든 일을 해야 합니다. 새로운 세대의 기술 합성체 포병 포를 통해, 우리는 아크쉽에 강력한 억제 무기를 제공하여 그들에게 해를 끼치고자 하는 자들을 멀리할 것입니다.\n"
 sm_esc_arkship_missile_battery_advanced:0 "고급 미사일 포대"
 sm_esc_arkship_missile_battery_advanced_desc:0 "우리 문명에 대한 아크선의 중요성은 아무리 강조해도 지나치지 않습니다. 우리는 아크선의 지속적인 생존을 보장하기 위해 할 수 있는 모든 일을 해야 합니다. 새로운 세대의 미사일을 통해 우리는 아크선에 강력한 억제 무기를 제공하여 그들에게 해를 끼치고자 하는 자들을 멀리할 것입니다.\n"
 sm_esc_arkship_archaeo_missile_battery_advanced:0 "기술-합성체 나노 미사일 포대"
 sm_esc_arkship_archaeo_missile_battery_advanced_desc:0 "우리 문명에서 아크십의 중요성은 아무리 강조해도 지나치지 않습니다. 우리는 아크십의 지속적인 생존을 보장하기 위해 할 수 있는 모든 일을 해야 합니다. 새로운 세대의 기술 합성체 나노 미사일을 통해, 우리는 아크십에 강력한 억제 무기를 제공하여 그들에게 해를 끼치고자 하는 자들을 멀리할 것입니다.\n"
 sm_esc_arkship_swamer_missile_battery_advanced:0 "고급 스워머 미사일 발사기"
 sm_esc_arkship_swamer_missile_battery_advanced_desc:0 "우리 문명에서 아크선의 중요성은 아무리 강조해도 지나치지 않습니다. 우리는 아크선의 지속적인 생존을 보장하기 위해 할 수 있는 모든 일을 해야 합니다. 새로운 세대의 군집 미사일로, 우리는 아크선에 강력한 억제 무기를 제공하여 그들에게 해를 끼치고자 하는 자들을 멀리할 것입니다.\n"
 sm_esc_arkship_flak_battery_advanced:0 "고급 플락 포대"
 sm_esc_arkship_flak_battery_advanced_desc:0 "우리 문명에서 아크쉽의 중요성은 아무리 강조해도 지나치지 않습니다. 우리는 아크쉽의 지속적인 생존을 보장하기 위해 모든 노력을 다해야 합니다. 새로운 세대의 대공 캐논을 통해 우리의 아크쉽이 적의 미사일과 공중 공격에 잘 보호받을 수 있다는 확신을 가질 수 있습니다.\n"
 sm_esc_arkship_pd_battery_advanced:0 "고급 포인트 방어 포대"
 sm_esc_arkship_pd_battery_advanced_desc:0 "우리 문명에서 아크십의 중요성은 아무리 강조해도 지나치지 않습니다. 우리는 아크십의 지속적인 생존을 보장하기 위해 할 수 있는 모든 일을 해야 합니다. 새로운 세대의 포인트 방어 포를 통해, 우리는 아크십이 적의 미사일과 공중 공격에 잘 보호받고 있다는 것을 확신할 수 있습니다.\n"
 sm_esc_arkship_archaeo_pd_battery_advanced:0 "기술-합성체 CIWS 배터리"
 sm_esc_arkship_archaeo_pd_battery_advanced_desc:0 "우리 문명에서 아크선의 중요성은 아무리 강조해도 지나치지 않습니다. 우리는 아크선의 지속적인 생존을 보장하기 위해 할 수 있는 모든 일을 해야 합니다. 기술 합성체 CIWS를 통해 우리의 아크선이 적의 미사일과 공중 공격에 잘 보호받고 있다는 것을 확신할 수 있습니다.\n"
 sm_esc_arkship_amoeba_hangar_bay_cybernetic:0 "사이버네틱 증강 아메바 베이"
 sm_esc_arkship_amoeba_hangar_bay_cybernetic_desc:0 "광범위한 사이버네틱 증강을 활용하여, 우리의 연구원들은 놀라운 전투 능력과 그들의 조종자에 대한 의심할 여지 없는 충성심을 가진 특수 아메바를 만들어내는 데 성공했습니다. 가장 강력하고 충성스러운 이 아메바 무리들은 우리의 아크십을 보호하는 임무를 맡아야 합니다.\n"
 sm_esc_arkship_hangar_bay_mercenary:0 "용병 비행대 격납고"
 sm_esc_arkship_hangar_bay_mercenary_desc:0 "이 정예 용병들은 다음 급여 이상의 충성을 입증했습니다. 그들은 우리 국민에게 충성을 다하는 모습을 보여주었습니다. 그에 따라 우리는 그들이 우리의 아크십을 보호하는 가장 중요한 임무를 맡을 수 있다고 생각합니다.\n"
 sm_esc_arkship_chrono_cannons:0 "시간-공간 포대"
 sm_esc_arkship_chrono_cannons_desc:0 "우리 문명에서 아크십의 중요성은 아무리 강조해도 지나치지 않습니다. 우리는 아크십의 지속적인 생존을 보장하기 위해 가능한 모든 노력을 다해야 합니다. 치명적인 시간-공간 포를 통해 우리는 아크십에 해를 끼치려는 자들을 멀리 쫓아낼 강력한 억제 무기를 제공합니다.\n"
 sm_esc_arkship_voidspawn_missile_battery:0 "공허의 탄환 발사기"
 sm_esc_arkship_voidspawn_missile_battery_desc:0 "우리 아크십은 별들 사이의 집이자 우리 민족을 은하의 공포로부터 보호하는 요새입니다. 우리의 과학자들이 고안한 최고의 무기로 무장하는 것은 당연한 일입니다. 공허의 자식에 대한 광범위한 연구 끝에 우리는 그 치명적인 힘을 모방할 수 있는 무기를 만들어냈습니다. 우리 아크십에 완벽한 무기입니다.\n"
 sm_esc_arkship_plasma_missile_battery:0 "플라스마 미사일 발사기"
 sm_esc_arkship_plasma_missile_battery_desc:0 "우리 문명에 대한 아크십의 중요성은 아무리 강조해도 지나치지 않습니다. 우리는 아크십의 지속적인 생존을 보장하기 위해 할 수 있는 모든 일을 해야 합니다. 치명적인 플라즈마 미사일로, 우리는 아크십에 강력한 억제 무기를 제공하여 그들에게 해를 끼치고자 하는 자들을 멀리 쫓을 것입니다.\n"
 sm_esc_arkship_bio_missile_battery:0 "산성 블롭 폭탄 포대"
 sm_esc_arkship_bio_missile_battery_desc:0 "우리의 방주선은 별들 사이의 집이자 우리 민족을 은하의 공포로부터 보호하는 요새입니다. 우리의 과학자들이 고안한 최고의 무기로 무장하는 것은 당연한 일입니다. 그리고 우리의 명령에 따라 치명적인 산성 덩어리를 발사할 수 있는 공생 생물들은 분명히 우리의 방주선을 무장시키는 데 사용할 수 있는 무기입니다.\n"
 sm_esc_arkship_crystal_cannon_battery:0 "크리스탈 조각 포 배터리"
 sm_esc_arkship_crystal_cannon_battery_desc:0 "우리 문명에 대한 아크십의 중요성은 아무리 강조해도 지나치지 않습니다. 우리는 아크십의 지속적인 생존을 보장하기 위해 할 수 있는 모든 일을 해야 합니다. 수정 조각 포의 배터리를 통해 우리는 아크십에 강력한 억제 무기를 제공하여 그들에게 해를 끼치고자 하는 자들을 멀리할 것입니다.\n"
 sm_esc_arkship_gravitic_cannon_battery:0 "마이크로싱귤래리티 포대"
 sm_esc_arkship_gravitic_cannon_battery_desc:0 "우리 문명에 대한 아크쉽의 중요성은 아무리 강조해도 지나치지 않습니다. 우리는 아크쉽의 지속적인 생존을 보장하기 위해 할 수 있는 모든 일을 해야 합니다. 중력 이상 현상 발사기의 배터리를 통해, 우리는 아크쉽에 해를 끼치려는 자들을 멀리 쫓아낼 강력한 억제 무기를 제공할 것입니다.\n"
 sm_esc_arkship_hangar_bay_gravitic:0 "특이점 폭격기 격납고"
 sm_esc_arkship_hangar_bay_gravitic_desc:0 "우리 문명에 대한 아크쉽의 중요성은 아무리 강조해도 지나치지 않습니다. 우리는 아크쉽의 지속적인 생존을 보장하기 위해 할 수 있는 모든 일을 해야 합니다. 여러 대의 치명적인 특이점 폭격기 전투기를 통해, 우리는 아크쉽에 해를 끼치려는 자들을 멀리 쫓아낼 강력한 억제 무기를 제공할 것입니다.\n"
 sm_esc_arkship_matter_annihilator_battery:0 "물질 제거기 포대"
 sm_esc_arkship_matter_annihilator_battery_desc:0 "우리 문명에서 아크쉽의 중요성은 아무리 강조해도 지나치지 않습니다. 우리는 아크쉽의 지속적인 생존을 보장하기 위해 할 수 있는 모든 일을 해야 합니다. 타 차원 존재의 침략자를 물리치고 그들의 신비한 기술을 포획한 덕분에, 이제 우리는 아크쉽에 해를 끼치려는 누구라도 멀리할 수 있는 무기를 만들 수 있게 되었습니다.\n"
 sm_esc_arkship_nanite_missile_battery:0 "나노입자 어뢰 발사기"
 sm_esc_arkship_nanite_missile_battery_desc:0 "우리 문명에 대한 아크십의 중요성은 아무리 강조해도 지나치지 않습니다. 우리는 아크십의 지속적인 생존을 보장하기 위해 모든 노력을 다해야 합니다. 나나이트 어뢰 발사기의 배터리를 통해 우리는 아크십에 강력한 억제 무기를 제공하여 그들에게 해를 끼치려는 자들을 멀리 떨어뜨릴 것입니다.\n"
 sm_esc_arkship_nanite_reconstructor_battery:0 "나노 복원기 배터리"
 sm_esc_arkship_nanite_reconstructor_battery_desc:0 "우리 문명에 대한 아크쉽의 중요성은 아무리 강조해도 지나치지 않습니다. 우리는 아크쉽의 지속적인 생존을 보장하기 위해 할 수 있는 모든 일을 해야 합니다. 나나이트 재구성기의 배터리를 통해 우리는 아크쉽에 강력한 억제 무기를 제공하여 그들에게 해를 끼치고자 하는 자들을 멀리할 수 있습니다.\n"
 sm_esc_arkship_hangar_bay_nanite:0 "나노이트 폭격기 격납고"
 sm_esc_arkship_hangar_bay_nanite_desc:0 "우리 문명에 대한 아크쉽의 중요성은 아무리 강조해도 지나치지 않습니다. 우리는 아크쉽의 지속적인 생존을 보장하기 위해 할 수 있는 모든 일을 해야 합니다. 여러 대의 치명적인 나나이트 폭격기 전투기를 통해, 우리는 아크쉽에 해를 끼치려는 자들을 멀리 쫓아낼 강력한 억제 무기를 제공할 것입니다.\n"
 sm_esc_arkship_enigmatic_cannon_battery:0 "불가사의한 에너지 방출기 배터리"
 sm_esc_arkship_enigmatic_cannon_battery_desc:0 "우리 문명에 대한 아크십의 중요성은 아무리 강조해도 지나치지 않습니다. 우리는 아크십의 지속적인 생존을 보장하기 위해 할 수 있는 모든 일을 해야 합니다. 우리는 알 수 없는 요새의 영원한 수수께끼를 해결하고 그 놀라운 기술에 접근하게 되었습니다. 그리고 그 기술로 우리는 아크십에 강력한 억제 무기를 제공할 포신을 제작했습니다. 이 무기는 아크십에 해를 끼치고자 하는 자들을 멀리 쫓아낼 것입니다.\n"
 sm_esc_arkship_tiyanki_cannon_battery:0 "에너지 사이폰 포대"
 sm_esc_arkship_tiyanki_cannon_battery_desc:0 "우리 문명에 대한 아크쉽의 중요성은 아무리 강조해도 지나치지 않습니다. 우리는 아크쉽의 지속적인 생존을 보장하기 위해 할 수 있는 모든 일을 해야 합니다. 우리는 티얀키에 대해 광범위하게 연구하였고, 그들의 에너지 사이펀의 힘을 모방한 무기를 개발하는 데 성공했습니다. 이 무기를 통해 우리의 아크쉽은 해를 끼치려는 자들을 멀리 떨쳐낼 수 있는 억제력을 갖게 될 것입니다.\n"
 sm_esc_arkship_psionic_cannon_battery:0 "사이오닉 에너지 발사기 배터리"
 sm_esc_arkship_psionic_cannon_battery_desc:0 "우리 문명에 대한 아크쉽의 중요성은 아무리 강조해도 지나치지 않습니다. 우리는 아크쉽의 지속적인 생존을 보장하기 위해 할 수 있는 모든 일을 해야 합니다. 강력한 사이오닉 에너지 발사기의 배터리를 통해, 우리는 아크쉽에 해를 끼치려는 자들을 멀리할 수 있는 억제 무기를 제공할 것입니다.\n"
 sm_esc_arkship_hangar_bay_psionic:0 "사이오닉 인터셉터 격납고"
 sm_esc_arkship_hangar_bay_psionic_desc:0 "우리 문명에 대한 아크쉽의 중요성은 아무리 강조해도 지나치지 않습니다. 우리는 아크쉽의 지속적인 생존을 보장하기 위해 할 수 있는 모든 것을 해야 합니다. 여러 대의 치명적인 사이오닉 요격기로, 우리는 아크쉽에 해를 끼치려는 자들을 멀리 쫓아낼 강력한 억제 무기를 제공할 것입니다.\n"
 sm_esc_arkship_tesla_cannon_battery:0 "테슬라 코일 배열"
 sm_esc_arkship_tesla_cannon_battery_desc:0 "우리 문명에 있어 아크십의 중요성은 아무리 강조해도 지나치지 않습니다. 우리는 아크십의 지속적인 생존을 보장하기 위해 할 수 있는 모든 일을 해야 합니다. 강력한 테슬라 코일의 배터리를 통해, 우리는 아크십에 해를 끼치려는 자들을 멀리 쫓아낼 수 있는 억제 무기를 제공할 것입니다.\n"
 sm_esc_arkship_hangar_bay_tesla:0 "테슬라 간섭기 격납고"
 sm_esc_arkship_hangar_bay_tesla_desc:0 "우리 문명에 대한 아크쉽의 중요성은 아무리 강조해도 지나치지 않습니다. 우리는 아크쉽의 지속적인 생존을 보장하기 위해 할 수 있는 모든 일을 해야 합니다. 여러 대의 치명적인 테슬라 간섭기를 통해 우리는 아크쉽에 강력한 억제 무기를 제공하여 그들에게 해를 끼치고자 하는 자들을 멀리할 것입니다.\n"
 sm_esc_arkship_spinal_bio_missile_mount:0 "산성 블롭 폭풍 아크십 발사기"
 sm_esc_arkship_spinal_bio_missile_mount_desc:0 "우리의 방주선은 별들 사이의 집이자 우리 민족을 은하의 공포로부터 보호하는 요새입니다. 우리의 과학자들이 고안한 최고의 무기로 무장하는 것은 당연한 일입니다. 그리고 우리의 명령에 따라 치명적인 산성 덩어리의 폭풍을 발사할 수 있는 거대한 공생 생물들은 분명히 우리의 방주선의 주 무장으로 적합한 웅장한 무기입니다.\n"
 sm_esc_arkship_spinal_crystalline_mount:0 "아크십 수정 임펠러"
 sm_esc_arkship_spinal_crystalline_mount_desc:0 "우리의 방주선은 별들 사이의 집이자 우리 민족을 은하의 공포로부터 보호하는 요새입니다. 우리의 과학자들이 고안한 최고의 무기로 무장하는 것은 당연한 일입니다. 그리고 거대한 수정 찌르개는 분명히 우리의 방주선의 주요 무장으로서 충분히 웅장한 무기입니다.\n"
 sm_esc_arkship_spinal_particle_lance_mount:0 "파괴의 빛 아크십"
 sm_esc_arkship_spinal_particle_lance_mount_desc:0 "우리의 방주선은 별들 사이의 집이자 우리 민족을 은하의 공포로부터 보호하는 요새입니다. 우리의 과학자들이 고안한 최고의 무기로 무장하는 것은 당연한 일입니다. '파괴의 빛' 입자 랜스는 분명히 우리의 방주선의 주 무장이 될 만큼 웅장한 무기입니다.\n"
 sm_esc_arkship_spinal_arc_cannon_mount:0 "신성한 천둥"
 sm_esc_arkship_spinal_arc_cannon_mount_desc:0 "우리의 방주선은 별들 사이의 집이자 우리 민족을 은하의 공포로부터 보호하는 요새입니다. 우리의 과학자들이 고안한 최고의 무기로 무장하는 것은 당연한 일입니다. '신성한 천둥' 아크 포는 분명히 우리의 방주선의 주 무장으로 적합한 웅장한 무기입니다.\n"
 sm_esc_arkship_spinal_wave_motion_gun_mount:0 "아크십 차원파 포격기"
 sm_esc_arkship_spinal_wave_motion_gun_mount_desc:0 "우리의 방주선은 별들 사이의 집이자 우리 민족을 은하의 공포로부터 보호하는 요새입니다. 우리의 과학자들이 고안한 최고의 무기로 무장하는 것은 당연한 일입니다. 그리고 거대한 차원파 포는 분명히 우리의 방주선의 주 무장으로서 충분히 웅장한 무기입니다.\n"
 sm_esc_arkship_spinal_arc_en_ciel_mount:0 "아크쉽 아크앙씨엘 포격기"
 sm_esc_arkship_spinal_arc_en_ciel_mount_desc:0 "우리의 방주선은 별들 사이의 집이자 우리 민족을 은하의 공포로부터 보호하는 요새입니다. 우리의 과학자들이 고안한 최고의 무기로 무장하는 것은 당연한 일입니다. 그리고 아크 앙 시엘 포는 분명히 우리의 방주선의 주 무장으로 적합한 웅장한 무기입니다.\n"
 sm_esc_arkship_spinal_arc_shockwave_mount:0 "아크십 아크 충격파 발사기"
 sm_esc_arkship_spinal_arc_shockwave_mount_desc:0 "우리의 방주선은 별들 사이의 집이자 우리 민족을 은하의 공포로부터 보호하는 요새입니다. 우리의 과학자들이 고안한 최고의 무기로 무장하는 것은 당연한 일입니다. 아크 충격파 발사기는 매우 강력한 무기로, 반드시 악의적인 자들이 우리의 방주선에서 멀리 떨어지게 할 것입니다.\n"
 sm_esc_arkship_spinal_dark_matter_shockwave_mount:0 "아크십 암흑 물질 헤일로 폭발 발사기"
 sm_esc_arkship_spinal_dark_matter_shockwave_mount_desc:0 "우리의 아크십은 별들 사이의 집이자 우리 민족을 은하의 공포로부터 보호하는 요새입니다. 우리의 과학자들이 고안한 최고의 무기로 무장하는 것은 자연스러운 일입니다. 그리고 선행 문명에서 연구한 기술을 바탕으로 다크 매터 헤일로 블라스트 포를 개발했기에, 우리의 아크십에 악의적인 의도로 접근하는 자가 없도록 할 무기를 갖추게 되었습니다.\n"
 sm_esc_arkship_spinal_archaeo_mount:0 "아크십 기술-합성 파괴자"
 sm_esc_arkship_spinal_archaeo_mount_desc:0 "우리의 방주선은 별들 사이의 집이자 우리 민족을 은하의 공포로부터 보호하는 요새입니다. 우리의 과학자들이 고안한 최고의 무기로 무장하는 것은 당연한 일입니다. 새로운 세대의 기술 합성체 '파괴자' 대규모 직격 에너지 무기를 통해, 우리는 우리의 방주선에 강력한 억제 무기를 제공하여 그들에게 해를 끼치고자 하는 자들을 멀리할 것입니다.\n"
 sm_esc_arkship_spinal_extradimensional_mount:0 "아크쉽 물질 소멸기"
 sm_esc_arkship_spinal_extradimensional_mount_desc:0 "우리의 방주선은 별들 사이의 집이자 우리 민족을 은하의 공포로부터 보호하는 요새입니다. 우리의 과학자들이 고안한 최고의 무기로 무장하는 것은 당연한 일입니다. 우리는 평행 차원에서 침략자들을 물리쳤고, 이제 우리의 방주선의 안전을 보장하기 위해 강력한 물질 소멸기를 보유하고 있습니다, 총구를 겨누고 있습니다.\n"
 sm_esc_arkship_spinal_gravitic_cannon_mount:0 "아크십 슈퍼 중력포"
 sm_esc_arkship_spinal_gravitic_cannon_mount_desc:0 "우리의 방주선은 별들 사이의 집이자 우리 민족을 은하의 공포로부터 보호하는 요새입니다. 우리의 과학자들이 고안한 최고의 무기로 무장하는 것은 당연한 일입니다. 거대한 슈퍼 중력포는 매우 강력한 무기로, 반드시 악의적인 자들이 우리의 방주선에서 멀리 떨어지게 할 것입니다.\n"
 sm_esc_arkship_spinal_mass_accelerator_mount:0 "아크쉽 기반 상대론적 운동학적 킬 차량"
 sm_esc_arkship_spinal_mass_accelerator_mount_desc:0 "우리의 방주선은 별들 사이의 집이자 우리 민족을 은하의 공포로부터 보호하는 요새입니다. 따라서 우리는 과학자들이 고안한 최고의 무기로 무장하는 것이 당연합니다. 그러므로 우리는 우리의 방주선에 가장 크고 강력한 무기를 장착해야 합니다.\n"
 sm_esc_arkship_spinal_autocannon_mount:0 "아크십 템셋 자동포"
 sm_esc_arkship_spinal_autocannon_mount_desc:0 "우리의 방주선은 별들 사이의 집이자 우리 민족을 은하의 공포로부터 보호하는 요새입니다. 따라서 우리는 과학자들이 고안한 최고의 무기로 무장하는 것이 당연합니다. 그러므로 우리는 우리의 방주선에 가장 크고 강력한 무기를 장착해야 합니다.\n"
 sm_esc_arkship_spinal_asteroid_thrower_mount:0 "아크십 소행성 발사기"
 sm_esc_arkship_spinal_asteroid_thrower_mount_desc:0 "우리 아크십은 별들 사이의 집이자 우리 민족을 은하의 공포로부터 보호하는 요새입니다. 소행성 발사기는 그리 복잡하지 않은 무기지만, 여전히 파괴적인 힘을 발휘할 수 있습니다. 누군가가 나쁜 의도로 우리 아크십에 접근하기 전에 두 번 생각하게 만들 만큼 충분합니다.\n"
 sm_esc_arkship_spinal_mhd_cannon_mount:0 "아크십 자기유체역학 포신 캐논"
 sm_esc_arkship_spinal_mhd_cannon_mount_desc:0 "우리의 방주선은 별들 사이의 집이자 우리 민족을 은하의 공포로부터 보호하는 요새입니다. 따라서 우리는 과학자들이 고안한 최고의 무기로 무장하는 것이 당연합니다. 그러므로 우리의 방주선에 가장 크고 강력한 무기를 장착해야 합니다.\n"
 sm_esc_arkship_spinal_enigmatic_mount:0 "아크십 수수께끼 에너지 랜스"
 sm_esc_arkship_spinal_enigmatic_mount_desc:0 "우리의 방주선은 별들 사이의 집이자 우리 민족을 은하의 공포로부터 보호하는 요새입니다. 우리는 과학자들이 고안한 최고의 무기로 그것을 무장시키는 것이 당연하다고 생각합니다. 우리는 알 수 없는 요새의 영원한 수수께끼를 해결하고 그 놀라운 기술에 접근하게 되었습니다. 그리고 그 기술로 우리는 이 은하에서 본 적 없는 에너지 창을 만들었습니다.\n"
 sm_esc_arkship_spinal_tiyanki_gun_mount:0 "아크십 티얀키 빔 캐논"
 sm_esc_arkship_spinal_tiyanki_gun_mount_desc:0 "우리의 방주선은 별들 사이의 집이자 우리 민족을 은하의 공포로부터 보호하는 요새입니다. 우리의 과학자들이 고안한 최고의 무기로 무장하는 것은 당연한 일입니다. 티얀키와 그들의 강력한 모계에 대한 광범위한 연구 끝에 우리는 그들의 힘을 모방할 수 있는 무기를 만들었습니다. 우리의 방주선에 완벽한 무기입니다.\n"
 sm_esc_arkship_spinal_missile_mount:0 "아크십 반사 미사일 발사기"
 sm_esc_arkship_spinal_missile_mount_desc:0 "우리의 방주선은 별들 사이의 집이자 우리 민족을 은하의 공포로부터 보호하는 요새입니다. 우리의 과학자들이 고안한 최고의 무기로 무장하는 것은 당연한 일입니다. 그래서 우리는 방주선에 가장 강력한 미사일 포대를 장착하고, 우리에게 해를 끼치려는 자들을 쫓아낼 것입니다.\n"
 sm_esc_arkship_spinal_nanite_missile_mount:0 "아크십 나나이트 전투머리 미사일 발사기"
 sm_esc_arkship_spinal_nanite_missile_mount_desc:0 "우리의 방주선은 별들 사이의 집이자 우리 민족을 은하의 공포로부터 보호하는 요새입니다. 우리의 과학자들이 고안한 최고의 무기로 무장하는 것은 당연한 일입니다. 그래서 우리는 방주선에 가장 강력한 나노 미사일 포대를 장착하고, 우리에게 해를 끼치려는 자들을 쫓아낼 것입니다.\n"
 sm_esc_arkship_spinal_psi_lance_mount:0 "아크십 공허 광선"
 sm_esc_arkship_spinal_psi_lance_mount_desc:0 "우리의 방주선은 별들 사이의 집이자 우리 민족을 은하의 공포로부터 보호하는 요새입니다. 우리의 과학자들이 고안한 최고의 무기로 무장하는 것은 당연한 일입니다. 사이오닉에 대한 깊은 이해와 우리의 정신의 힘으로, 우리는 이 은하에서 본 적 없는 가장 강력한 사이오닉 에너지 창으로 우리의 방주선을 보호할 것입니다.\n"
 sm_esc_arkship_spinal_psi_shockwave_mount:0 "아크십 사이오닉 충격파 발사기"
 sm_esc_arkship_spinal_psi_shockwave_mount_desc:0 "우리의 방주선은 별들 사이의 집이자 우리 민족을 은하의 공포로부터 보호하는 요새입니다. 우리의 과학자들이 고안한 최고의 무기로 무장하는 것은 당연한 일입니다. 사이오닉에 대한 깊은 이해와 우리의 정신력으로, 우리는 이 은하에서 본 적 없는 가장 강력한 사이오닉 무기로 우리의 방주선을 보호할 것입니다.\n"
 sm_esc_arkship_spinal_tesla_cannon_mount:0 "아크십 테슬라 포탑"
 sm_esc_arkship_spinal_tesla_cannon_mount_desc:0 "우리의 방주선은 별들 사이의 집이자 우리 민족을 은하의 공포로부터 보호하는 요새입니다. 우리의 과학자들이 고안한 최고의 무기로 무장하는 것은 당연한 일입니다. 우리는 테슬라 무기의 숙련도를 활용하여 우리의 방주선에서 사용할 적절한 힘의 무기를 만들 것입니다.\n"
 sm_esc_arkship_spinal_tesla_shockwave_mount:0 "아크십 테슬라 충격파 발사기"
 sm_esc_arkship_spinal_tesla_shockwave_mount_desc:0 "우리의 아크십은 별들 사이의 집이자 우리 민족을 은하의 공포로부터 보호하는 요새입니다. 우리의 과학자들이 고안한 최고의 무기로 무장하는 것은 당연한 일입니다. 우리는 테슬라 무기의 숙련도를 활용하여 우리의 아크십에서 사용할 적절한 힘의 무기를 만들 것입니다.\n"
