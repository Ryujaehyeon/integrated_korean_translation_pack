 job_giga_birch_ktisma_manager_drone_factory_desc:0 "크티스마 인술라의 끝없는 공장 라인 관리 전문가인 이 특수 드론 클러스터들은 어떤 제품도 소홀히 되지 않도록 합니다."
 job_giga_birch_ktisma_manager_drone_factory_effect_desc:0 "£job_giga_birch_ktisma_manager_drone£ $job_giga_birch_ktisma_manager_drone_factory_plural$는 추가로 £minerals£ §Y$minerals$§! (또는 £food£ §Y$food$§!)를 £consumer_goods£ §Y$consumer_goods$§!로 전환하고, £mod_pop_bonus_workforce_mult£ §Y$artisan_jobs_bonus_workforce_mult$§!를 더욱 증가시킵니다."
