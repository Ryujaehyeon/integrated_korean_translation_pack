 job_giga_birch_ktisma_manager_drone_foundry_supertensiles:0 "크티스마 궤도 메가노드"
 job_giga_birch_ktisma_manager_drone_foundry_supertensiles_plural:0 "크티스마 궤도 메가노드들"
 job_giga_birch_ktisma_manager_drone_foundry_supertensiles_desc:0 "우주 건설용 소재 제조 전문가인 이 특수 드론 클러스터들이 모든 초대형 건설 프로젝트가 필요한 것을 얻도록 합니다."
 job_giga_birch_ktisma_manager_drone_foundry_sentient_metal:0 "크티스마 자기조립 관리 클러스터"
