 mod_job_giga_birch_origin_trader_drone_per_pop_short:0 "\n§Y$VALUE$§! £pop£마다 £mod_job_clerk_add£ §G+1§!"
 d_giga_birch_mechanics:0 "버치 월드 코어 시스템"
 d_giga_birch_mechanics_desc:0 "엄청나게 발전된 기계들이 이 거대한 구조물의 모든 면을 관통하고 있습니다."
 d_giga_birch_mechanics_tooltip:0 "이 행성 기능은 $name_birch$의 많은 게임 기능을 관리하며 이 기능이 제대로 작동하는 데 필요합니다."
 d_giga_aiondia_blocker_structure:0 "버려진 제어실"
 d_giga_aiondia_blocker_structure_desc:0 "§P$d_aeternum_decaying_hyperstructure$§!\n\n §H$district_giga_birch_structure_aiondia_subtitle$§!의 중앙에 위치한 궁전 안에는 우리의 전문가들이 전혀 이해할 수 없는 놀라운 복잡성을 지닌 제어실이 존재합니다. Aiondia의 구조적 작동을 제어하는 시스템이 우리의 이해를 초월한 수준에 있거나, 우리가 수억 년에 걸쳐 만들어진 장난의 희생자일 수 있습니다. 그들의 화려한 성격의 이유가 무엇이든, 우리가 메가시티를 넘어 영향력을 확장하고 싶다면 Aiondia의 유지 보수 시스템을 위한 제어 장치를 해독해야 할 것입니다."
 d_giga_aiondia_blocker_orykta:0 "휴지 상태의 추출기"
 d_giga_aiondia_blocker_orykta_desc:0 "§P$d_aeternum_decaying_hyperstructure$§!\n\nAeternite 황금 시대의 절정기에도 불구하고, 아이온디아는 아래의 블랙홀에서 모든 원자재를 끌어오는 방식으로 지속될 것이라고는 예상되지 않았습니다. 추출 배열은 비상 시에 대비한 백업 예비로 설계되었습니다. 이러한 자원을 최대한 활용하고자 한다면, 우리는 해당 시스템을 가동하고 그 범위를 대폭 확장해야 할 것입니다."
 slot_giga_birch_orykta_insula_clear_blocker_prereq:0 "클리어 $d_giga_aiondia_blocker_orykta$"
 d_giga_aiondia_blocker_ktisma:0 "잘못된 작업"
 d_giga_aiondia_blocker_ktisma_desc:0 "§P$d_aeternum_decaying_hyperstructure$§!\n\n수백 수천 년 동안의 정체와 가끔씩 발생하는 기이한 제조 요청이 $district_giga_birch_ktisma_plural$의 공장과 주조소를 제어하는 시스템에 집중할 것이 거의 없게 만들었습니다. 시간이 지나면서 이는 변형된 자기 복제 기계의 제멋대로인 의사 생태계로 발전하게 되었습니다. 이러한 시설을 활용하고자 한다면, 우리는 이 혼돈 속에서 질서를 만들어야 할 것입니다."
 slot_giga_birch_ktisma_insula_clear_blocker_prereq:0 "클리어 $d_giga_aiondia_blocker_ktisma$"
 d_giga_aiondia_blocker_physma:0 "붕괴된 생태계"
 d_giga_aiondia_blocker_physma_desc:0 "§P$d_aeternum_decaying_hyperstructure$§!\n\n적절한 규제가 없으면 $district_giga_birch_physma_plural$의 광대한 지역이 생태적 붕괴에 시달리며 황량한 황무지에 불과하게 되었습니다. 이 지역을 완전히 활용하고자 한다면, 이를 유지하는 환경 통제 시스템을 복구해야 합니다."
 slot_giga_birch_physma_insula_clear_blocker_prereq:0 "클리어 $d_giga_aiondia_blocker_physma$"
 d_giga_birch_origin_home_insula:0 "근원 인슐라"
 d_giga_birch_origin_home_insula_desc:0 "문명의 요람"
 d_giga_birch_origin_home_insula_restored:0 "근원 인슐라"
 d_giga_birch_origin_home_insula_restored_desc:0 "한때 문명의 요람이었던 이 지역은 현재 인구의 대부분이 줄어 자연보호구역으로써 유지되고 있습니다."
 d_giga_birch_origin_home_farms:0 "황금빛 들판"
 d_giga_birch_origin_home_farms_desc:0 "이 풍요롭고 비옥한 계곡은 최고의 농경지로써 오랫동안 풍요를 가져왔습니다."
 d_giga_birch_origin_home_catalytic_farms:0 "광물화된 토양"
 d_giga_birch_origin_home_catalytic_farms_desc:0 "헤아릴 수 없는 산의 기저에 터널을 뚫은 덕분에 내부의 슬러리를 조금씩 빨아들여 경작지를 상당히 확장할 수 있었습니다."
 d_giga_birch_origin_home_mines:0 "헤아릴 수 없는 산"
 d_giga_birch_origin_home_mines_desc:0 "고대 기록에 따르면 무궁무진한 광물 자원으로 가득 차있는 산이 솟아있다고 합니다. 현대적인 분석에 따르면 이 산은 구조물의 슬러리 레인 시스템에서 파열된 도관에서 발생했으며 광물 슬러리가 수년에 걸쳐 표면을 계속해서 위로 밀어 올리고 경화된 것입니다."
 d_giga_birch_origin_home_lithoid_mines:0 "슬러리 레인 트랩"
 d_giga_birch_origin_home_lithoid_mines_desc:0 "넓은 지역을 얕은 댐으로 둘러싸면 다른 지역으로 부분적으로 배수될 슬러리를 집중할 수 있습니다. 하류의 침식된 토양의 감소된 보충은 우리가 수집할 수 있는 추가적인 광물에 비하면 감내할만 합니다."
 d_giga_birch_origin_home_generators:0 "발전 설비"
 d_giga_birch_origin_home_generators_desc:0 "용이한 연료 접근성과 발전소 건설에 적합한 환경입니다."
 d_giga_birch_origin_home_machine_generators:0 "가스 필드"
 d_giga_birch_origin_home_machine_generators_desc:0 "풍부한 가스 매장량은 충분한 에너지 생성으로 이어집니다."
 d_giga_birch_origin_home_labs:0 "고대 유적"
 d_giga_birch_origin_home_labs_desc:0 "우리 고고학자들에 의해 면밀히 연구된 이 유적들은 이 구조물의 진정한 본질에 대한 첫 번째 힌트를 제공했습니다."
 d_giga_birch_expedition_1_factory:0 "버려진 거주지 - 공장"
 d_giga_birch_expedition_1_factory_desc:0 "미지의 문명에 속한 도시의 유적입니다. 현지의 노력은 기존의 제조 시설을 우리가 사용할 수 있도록 재설계하는 데 초점을 맞추고 있습니다."
 d_giga_birch_expedition_1_miners:0 "버려진 거주지 - 재활용"
 d_giga_birch_expedition_1_miners_desc:0 "미지의 문명에 속한 도시의 유적입니다. 현지의 노력은 기존의 구조물을 해체하고 재활용하는 데 초점을 맞추고 있습니다."
 d_giga_birch_expedition_1_technicians:0 "버려진 거주지 - 발전소"
 d_giga_birch_expedition_1_technicians_desc:0 "미지의 문명에 속한 도시의 유적입니다. 현지의 노력은 기존의 발전 시설을 우리가 사용할 수 있도록 재설계하는 데 초점을 맞추고 있습니다."
 d_giga_birch_expedition_1_farmers:0 "버려진 거주지 - 농장"
 d_giga_birch_expedition_1_farmers_desc:0 "미지의 문명에 속한 도시의 유적입니다. 현지의 노력은 외진 지역에서 작물을 기르는 데 초점을 맞추고 있습니다."
 d_giga_birch_expedition_1_restored:0 "버려진 거주지"
 d_giga_birch_expedition_1_restored_desc:0 "미지의 문명에 속한 도시의 유적입니다."
 d_giga_birch_expedition_2_exterminate:0 "토착 문명 - 고요한 유적"
 d_giga_birch_expedition_2_exterminate_desc:0 "구조물에 존재했던 원시 문명의 영토입니다. 그들의 절멸 이후 여기엔 침묵만이 감돕니다."
 d_giga_birch_expedition_2_trade:0 "토착 문명 - 교역소"
 d_giga_birch_expedition_2_trade_desc:0 "구조물에 존재했던 원시 문명의 영토입니다. 이곳에서 외부인들과 거래가 오갔을 겁니다."
 d_giga_birch_expedition_2_integrate:0 "토착 문명 - 준 자치구"
 d_giga_birch_expedition_2_integrate_desc:0 "구조물에 존재했던 원시 문명의 영토입니다. 준 자치민들은 통합을 따랐을 것입니다."
 d_giga_birch_expedition_2_conquer:0 "토착 문명 - 준 자치구"
 d_giga_birch_expedition_2_conquer_desc:0 "구조물에 존재했던 원시 문명의 영토입니다. 준 자치민들은 정복을 받아들였을 것입니다."
 d_giga_birch_expedition_2_sanctuary:0 "토착 문명 - 성소"
 d_giga_birch_expedition_2_sanctuary_desc:0 "구조물에 존재했던 원시 문명의 영토입니다. 이젠 유기체들을 위한 대규모 보호 구역입니다."
 d_giga_birch_expedition_2_restored:0 "토착 문명"
 d_giga_birch_expedition_2_restored_desc:0 "구조물에 존재했던 원시 문명의 영토입니다."
 d_giga_birch_expedition_3:0 "산업 수준 전초기지"
 d_giga_birch_expedition_3_desc:0 "구조물의 기계가 가득한 층을 고향으로 연결하는 탑에 있는 탐사 전초기지입니다."
 d_giga_birch_expedition_3_restored:0 "산업 수집 전초기지"
 d_giga_birch_expedition_3_restored_desc:0 "이 전초기지는 주변의 고대 산업 유적에서 기계 설비들을 인양하는 탐험가들을 지원합니다."
 d_giga_birch_expedition_4:0 "고대 산업 복합단지"
 d_giga_birch_expedition_4_desc:0 "고대의 자동화 공장들이 다시 한번 불꽃을 일으키며 우리의 산업 역량을 크게 확장시켰습니다."
 d_giga_birch_expedition_4_restored:0 "복구된 산업 복합단지"
 d_giga_birch_expedition_4_restored_desc:0 "고대의 자동화 공장들이 옛 영광을 되찾아 자재들로 이루어진 끝없는 흐름을 만들어냅니다."
 d_giga_birch_expedition_5:0 "지역 관제 센터"
 d_giga_birch_expedition_5_desc:0 "수도를 포함하는 구조물의 하위 섹션에 대한 명령 및 제어 시스템입니다."
 d_giga_birch_expedition_5_restored:0 "지역 관제 센터"
 d_giga_birch_expedition_5_restored_desc:0 "수도를 포함하는 구조물의 하위 섹션에 대한 명령 및 제어 시스템입니다."
 d_giga_birch_expedition_6_farm:0 "극지방 동굴형 전초기지 - 이끼 농장"
 d_giga_birch_expedition_6_farm_desc:0 "극지방의 혹독한 환경으로부터 보호된 동굴들은 현재 영양가 높은 지역의 이끼 품종을 재배하고 있습니다."
 d_giga_birch_expedition_6_generator:0 "극지방 동굴형 전초기지 - 가스 우물"
 d_giga_birch_expedition_6_generator_desc:0 "극지방의 혹독한 환경으로부터 보호된 동굴들에 있는 가스 우물들은 지역 발전소에서 사용하고 있습니다."
 d_giga_birch_expedition_6_restored:0 "극지방 동굴형 거주지"
 d_giga_birch_expedition_6_restored_desc:0 "극지방의 혹독한 환경으로부터 보호된 동굴에 있는 거주지입니다."
 d_giga_birch_expedition_7:0 "침몰된 관측소"
 d_giga_birch_expedition_7_desc:0 "극지방에서 성장하는 문명에 대한 연구에 전념하는 것처럼 보이는 고대 과학 시설입니다."
 d_giga_birch_expedition_7_restored:0 "침몰된 관측소"
 d_giga_birch_expedition_7_restored_desc:0 "사용할 수 있도록 수리 및 개조된 고대 과학 시설입니다."
 d_giga_birch_expedition_8:0 "주 제어 허브"
 d_giga_birch_expedition_8_desc:0 "구조물의 전체 시스템을 제어하는 마스터 제어 시스템은 현재 에너지 부족으로 제 성능을 발휘하지 못하고 있습니다."
 d_giga_birch_expedition_8_restored:0 "주 제어 허브"
 d_giga_birch_expedition_8_restored_desc:0 "구조물의 주 관리 센터는 시스템의 많은 부분들을 조절합니다."
 d_giga_birch_expedition_9_energy:0 "추출 기관 - 에너지 초점"
 d_giga_birch_expedition_9_energy_desc:0 "거대한 구조물이 중심부에 있는 초대질량 블랙홀의 사건의 지평선 위에 걸려 있습니다. 최근의 수리 작업은 에너지 발전에 초점을 맞추고 있습니다."
 d_giga_birch_expedition_9_minerals:0 "추출 기관 - 광물 초점"
 d_giga_birch_expedition_9_minerals_desc:0 "거대한 구조물이 중심부에 있는 초대질량 블랙홀의 사건의 지평선 위에 걸려 있습니다. 최근의 수리 작업은 광물 추출에 초점을 맞추고 있습니다."
 d_giga_birch_expedition_9_dark_matter:0 "추출 기관 - 암흑 물질 초점"
 d_giga_birch_expedition_9_dark_matter_desc:0 "거대한 구조물이 중심부에 있는 초대질량 블랙홀의 사건의 지평선 위에 걸려 있습니다. 최근의 수리 작업은 사용 가능한 암흑 물질의 추출에 초점을 맞추고 있습니다."
 d_giga_birch_expedition_9_restored:0 "추출 기관"
 d_giga_birch_expedition_9_restored_desc:0 "거대한 구조물이 중심부에 있는 초대질량 블랙홀의 사건의 지평선 위에 걸려 무한한 양의 원자재들을 공급합니다."
 d_giga_birch_edge_of_eternity:0 "해양 고고학 복합단지"
 d_giga_birch_edge_of_eternity_desc:0 "해저부터 구축된 일련의 거대한 구조물들은 완전히 물로 뒤덮인 이 세상에 살기 좋은 환경을 제공합니다."
 d_giga_birch_edge_of_eternity_ruins:0 "£blocker£ 무너져가는 표면 인프라"
 d_giga_birch_edge_of_eternity_ruins_desc:0 "거친 날씨와 몇 세기 동안 유지보수가 이루어지지않은 플랫폼은 붕괴되고 있습니다."
 d_giga_birch_edge_of_eternity_farms:0 "해양 농장"
 d_giga_birch_edge_of_eternity_farms_desc:0 "식용 가능한 해초와 야생 동물들로 가득 찬 울타리가 층을 이루고 있습니다."
 d_giga_birch_edge_of_eternity_farms_blocker:0 "£blocker£ 적대적인 해양 생명체"
 d_giga_birch_edge_of_eternity_farms_blocker_desc:0 "위험한 생물들이 해초로 이루어진 탑을 호시탐탐 노리며 수확 작업을 방해하고 있습니다."
 d_giga_birch_edge_of_eternity_farms_blocker_condition:0 "§R$MISSING_TECHNOLOGY$: $tech_dangerous_wildlife$§!"
 d_giga_birch_edge_of_eternity_generators:0 "파력 발전기"
 d_giga_birch_edge_of_eternity_generators_desc:0 "바다 표면을 가로질러 이동하는 거대한 파도로부터 에너지를 추출하기 위해 만들어진 기계들입니다."
 d_giga_birch_edge_of_eternity_generators_blocker:0 "£blocker£ 얼어붙은 파도 배열"
 d_giga_birch_edge_of_eternity_generators_blocker_desc:0 "단단하게 얼어붙은 얼음은 파력 발전기들의 효율을 떨어뜨립니다."
 d_giga_birch_edge_of_eternity_generators_blocker_condition:0 "§R$MISSING_TECHNOLOGY$: $tech_massive_glacier$§!"
 d_giga_birch_edge_of_eternity_mines:0 "해저 채광 터널"
 d_giga_birch_edge_of_eternity_mines_desc:0 "해저에 구멍을 뚫고 들어가 심해저에 숨겨진 광물을 추출합니다."
 d_giga_birch_edge_of_eternity_mines_blocker:0 "£blocker£ 화산으로 인한 터널 붕괴"
 d_giga_birch_edge_of_eternity_mines_blocker_desc:0 "화산 활동으로 인해 터널이 파열되어 작업하기에는 위험한 지역이 되었습니다."
 d_giga_birch_edge_of_eternity_mines_blocker_condition:0 "§R$MISSING_TECHNOLOGY$: $tech_volcano$§!"
 mod_pc_birch_habitability:0 "버치 월드 거주 적합성"
 trait_pc_birch_preference:0 "버치 월드 선호"
 trait_pc_birch_preference_desc:0 "§L$pc_birch$는 매우 방대하며 다양한 생물군을 포함하고 있습니다.§!"
