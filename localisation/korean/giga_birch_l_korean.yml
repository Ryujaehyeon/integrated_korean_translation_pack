 job_giga_birch_physma_manager_farm_administration_priest_desc:0 "이 신성한 행정관들은 자연과 영성이 거의 상상할 수 없는 규모로 만나는 Physma 인술라의 신성하게 비율이 맞춰진 경관을 돌봅니다."
 job_giga_birch_physma_manager_farm_fortress:0 "피스마 공급망 지휘관"
 job_giga_birch_physma_manager_farm_fortress_plural:0 "피스마 공급망 지휘관들"
 job_giga_birch_physma_manager_farm_fortress_desc:0 "행정관과 하인으로 구성된 이들은 농업 및 군사 프로젝트의 관리자이며, 지역에 주둔한 군대의 모든 공급 요구 사항이 충족되도록 보장합니다."
 job_giga_birch_physma_manager_farm_angler:0 "피스마 대어잡이"
 job_giga_birch_physma_manager_farm_angler_plural:0 "피스마 대어잡이들"
 job_giga_birch_physma_manager_farm_angler_desc:0 "그들은 항상 더 큰 물고기가 있다고 말하지만, 더 큰 배에 대한 과학은 지난 몇 세기 동안 많은 발전을 이루었습니다."
 job_giga_birch_physma_manager_farm_angler_effect_desc:0 "£job_giga_birch_physma_manager£ $job_giga_birch_physma_manager_farm_angler_plural$는 추가로 £trade£ §Y$trade$§!를 생산하며, 대량의 £food£ §Y$food$§!를 생성하고, £mod_pop_bonus_workforce_mult£ §Y$farmer_jobs_bonus_workforce_mult$§!를 더욱 증가시킵니다."
 job_giga_birch_physma_manager_farm_laboratory_angler:0 "피즈마 수석 해양학자"
 job_giga_birch_physma_manager_farm_laboratory_angler_plural:0 "피즈마 수석 해양학자들"
 job_giga_birch_physma_manager_farm_laboratory_angler_desc:0 "해양 생태계에 대한 깊은 이해에 헌신하며, 수영하거나 떠다니거나 잠수하는 모든 것에 대해 이 전문 연구원들은 알고 있습니다."
 job_giga_birch_physma_manager_farm_administration_angler:0 "물리학자 전류의 대가"
 job_giga_birch_physma_manager_farm_administration_angler_plural:0 "전류의 물리학자 마스터들"
 job_giga_birch_physma_manager_farm_administration_angler_desc:0 "바다를 항해하고 그 풍요를 누리는 것은 우리 문명만큼 오래된 전통으로, 미래 세대를 위해 반드시 지켜져야 합니다."
 job_giga_birch_physma_manager_farm_administration_angler_priest:0 "피스마 심해 추기경"
 job_giga_birch_physma_manager_farm_administration_angler_priest_plural:0 "심해 카디날"
 job_giga_birch_physma_manager_farm_administration_angler_priest_desc:0 "바다를 항해하고 그 풍요를 누리는 것은 우리 문명만큼 오래된 신성한 의무입니다. 바다의 영혼들은 우리의 가장 오래된 친구 중 일부이며, 그들은 적절히 존경받을 것입니다."
 job_giga_birch_physma_manager_farm_fortress_angler:0 "피스마 메가포트 제독"
 job_giga_birch_physma_manager_farm_fortress_angler_plural:0 "피즈마 메가요새 제독들"
 job_giga_birch_physma_manager_farm_fortress_angler_desc:0 "매일 우리는 인공 섬과 전함의 경계를 더욱 모호하게 하고 있습니다. 이 광기는 언제 끝날까요?"
 job_giga_birch_physma_manager_laboratory:0 "물리학 연구소 관리자"
 job_giga_birch_physma_manager_laboratory_plural:0 "물리학 연구소 관리자"
 job_giga_birch_physma_manager_laboratory_desc:0 "행정관으로서 환경 연구를 담당하는 이 공무원들과 그 하인들은 자연 세계에 대한 우리의 이해를 심화시킵니다."
 job_giga_birch_physma_manager_laboratory_effect_desc:0 "£job_giga_birch_physma_manager£ $job_giga_birch_physma_manager_laboratory_plural$는 추가로 £consumer_goods£ §Y$consumer_goods$§!를 $giga_r_research$ §Y연구 포인트§!로 전환하고, £mod_pop_bonus_workforce_mult£ §Y$researcher_jobs_bonus_workforce_mult$§!를 더욱 증가시킵니다."
 job_giga_birch_physma_manager_laboratory_administration:0 "고위 큐레이터"
 job_giga_birch_physma_manager_laboratory_administration_plural:0 "피즈마 고위 큐레이터들"
 job_giga_birch_physma_manager_laboratory_administration_desc:0 "행정관으로서 문화 연구를 담당하는 이 공무원들과 그 하인들은 과거 연구를 통해 역사를 보존하고 미래를 이해하는 역할을 합니다."
 job_giga_birch_physma_manager_laboratory_administration_priest:0 "피스마 대유물 관리자"
 job_giga_birch_physma_manager_laboratory_administration_priest_plural:0 "피스마 대유물 관리자들"
 job_giga_birch_physma_manager_laboratory_administration_priest_desc:0 "고대 문서와 고대 경전을 보관하는 이 공무원들과 그 하인들은 과거의 연구를 통해 미래를 이해하는 데 도움을 줍니다."
 job_giga_birch_physma_manager_laboratory_fortress:0 "기계물리학 헤드 무기 공학자"
 job_giga_birch_physma_manager_laboratory_fortress_plural:0 "물리학자 헤드 탄약 공학자들"
 job_giga_birch_physma_manager_laboratory_fortress_desc:0 "행성 전쟁의 모든 상상 가능한 전장에서 새로운 설계를 시험하는 이들 행정관과 그 하인들은 무기 연구의 관리자입니다."
 job_giga_birch_physma_manager_administration:0 "행정관 물리학자 관리인"
 job_giga_birch_physma_manager_administration_plural:0 "행정관 물리학자 인슐라"
 job_giga_birch_physma_manager_administration_desc:0 "문화 업무의 행정관으로서, 이 공무원들과 그 하인들은 사회가 잘 작동하는 기계처럼 계속 기능하도록 보장합니다."
 job_giga_birch_physma_manager_administration_effect_desc:0 "£job_giga_birch_physma_manager£ $job_giga_birch_physma_manager_administration_plural$은 추가로 £consumer_goods£ §Y$consumer_goods$§!를 £unity£ §Y$unity$§!로 전환하고, £mod_pop_bonus_workforce_mult£ §Y$bureaucrat_jobs_bonus_workforce_mult$§!를 더욱 증가시킵니다."
 job_giga_birch_physma_manager_administration_priest:0 "기하학적 고위 성직자"
 job_giga_birch_physma_manager_administration_priest_plural:0 "피스마 고위 성직자"
 job_giga_birch_physma_manager_administration_priest_desc:0 "행정관의 신성한 업무를 담당하는 이 사제들과 그 하급자들은 사회가 조화롭고 영적으로 일치하도록 보장합니다."
 job_giga_birch_physma_manager_administration_priest_effect_desc:0 "£job_giga_birch_physma_manager£ $job_giga_birch_physma_manager_administration_priest_plural$는 추가로 £consumer_goods£ §Y$consumer_goods$§!를 £unity£ §Y$unity$§!로 전환하고, £mod_pop_bonus_workforce_mult£ §Y$bureaucrat_jobs_bonus_workforce_mult$§!를 더욱 증가시킵니다."
 job_giga_birch_physma_manager_administration_fortress:0 "물리학자 연계 총괄"
 job_giga_birch_physma_manager_administration_fortress_plural:0 "물리학자 연락 장군들"
 job_giga_birch_physma_manager_administration_fortress_desc:0 "군사 업무의 행정관으로서, 이 민간인 하인들과 그 하인들은 인술라 전역에서 민간 및 군사 작전을 조정합니다."
 job_giga_birch_physma_manager_administration_fortress_priest:0 "신성한 전략가 피스마"
 job_giga_birch_physma_manager_administration_fortress_priest_plural:0 "신성한 전략가들"
 job_giga_birch_physma_manager_administration_fortress_priest_desc:0 "군사 업무의 행정관으로서, 이 신성하게 임명된 장군들은 인슐라 전역에서 민간인 및 군사 작전을 조정합니다."
 job_giga_birch_physma_manager_fortress:0 "기계 생명체 메가 요새 지휘관"
 job_giga_birch_physma_manager_fortress_plural:0 "기계 생명체 메가 요새 지휘관들"
 job_giga_birch_physma_manager_fortress_desc:0 "이 숙련된 장군들이 내재된 요새의 수비대를 지휘함으로써, 어떤 적도 이 세계에 발을 들여놓을 용기가 없을 것입니다."
 job_giga_birch_physma_manager_fortress_effect_desc:0 "£job_giga_birch_physma_manager£ $job_giga_birch_physma_manager_fortress_plural$은(는) £mod_country_naval_cap_add£ §Y$MOD_COUNTRY_NAVAL_CAP_ADD$§!를 추가로 증가시키고, £mod_planet_defense_armies_add£ §Y$MOD_PLANET_DEFENSE_ARMIES_ADD$§!를 제공하며, £mod_pop_bonus_workforce_mult£ §Y$giga_soldier_jobs_bonus_workforce_mult$§!를 더욱 증가시킵니다."
 job_giga_birch_physma_worker:0 "피즈마 인슐라 노동자"
 job_giga_birch_physma_worker_plural:0 "피즈마 인슐라 노동자"
 job_giga_birch_physma_worker_desc:0 "노동자들은 피즈마 인슐라의 시설에 배치되기 위한 훈련을 받았지만, 아직 구체적인 일은 배정받지 않았습니다."
 job_giga_birch_physma_worker_effect_desc:0 "$job_giga_birch_physma_worker_swap_plural_with_icon$ 소량의 £unity£ §Y$unity$§! 및 그들의 $giga_r_food$$giga_r_minerals$$giga_r_energy$ §Y인구 유지 자원§!을 생산하며, $giga_birch_physma_name$ 구역을 건설하여 전문화할 수 있습니다."
 job_giga_birch_physma_worker_swap_plural_with_icon:0 "[giga_birch_physma_worker.GetIcon] [giga_birch_physma_worker.GetNamePlural]"
 mod_job_giga_birch_physma_worker_add:0 "[giga_birch_physma_worker.GetName] 직업"
 mod_job_giga_birch_physma_worker_per_pop:0 "§G+1§! [giga_birch_physma_worker.GetName] 직업당 $VALUE$ 팝"
 mod_job_giga_birch_physma_worker_per_pop_short:0 "\n§Y$VALUE$§! £pop£당 £mod_job_giga_birch_physma_worker_add£ §G+1§!"
 job_giga_birch_physma_manager_drone:0 "피즈마 인슐라 감독 클러스터"
 job_giga_birch_physma_manager_drone_plural:0 "피즈마 인슐라 감독 클러스터"
 job_giga_birch_physma_manager_drone_desc:0 "환경 프로젝트, 연구, 신호 무결성 관리자들인 이 드론 클러스터들은 다른 드론들과 함께 피즈마 인슐라의 원활한 운영을 담당합니다."
 mod_job_giga_birch_physma_manager_drone_add:0 "[giga_birch_physma_manager_drone.GetName] 직업"
 mod_job_giga_birch_physma_manager_drone_per_pop:0 "§G+1§! [giga_birch_physma_manager_drone.GetName] 직업당 §Y$VALUE$§! 팝"
 mod_job_giga_birch_physma_manager_drone_per_pop_short:0 "\n§Y$VALUE$§! £pop£당 £mod_job_giga_birch_physma_manager_drone_add£ §G+1§!"
 job_giga_birch_physma_manager_drone_farm:0 "물리적 농업 오버마인드"
 job_giga_birch_physma_manager_drone_farm_plural:0 "물리적 농업 오버마인드들"
 job_giga_birch_physma_manager_drone_farm_desc:0 "행정관들은 거대한 농업 프로젝트를 관리하며, 이 드론 집단과 그 하위들은 상상할 수 없는 규모의 풍작을 보장합니다."
 job_giga_birch_physma_manager_drone_farm_effect_desc:0 "£job_giga_birch_physma_manager_drone£ $job_giga_birch_physma_manager_drone_farm_plural$는 추가로 대량의 £food£ §Y$food$§!를 생산하며, £mod_pop_bonus_workforce_mult£ §Y$farmer_jobs_bonus_workforce_mult$§!를 더욱 증가시킵니다."
 job_giga_birch_physma_manager_drone_farm_laboratory:0 "피즈마 생물처리 클러스터"
 job_giga_birch_physma_manager_drone_farm_laboratory_plural:0 "피즈마 생물 처리 집합체"
 job_giga_birch_physma_manager_drone_farm_laboratory_desc:0 "고급 환경 프로젝트의 행정관으로서, 이 전문 드론 클러스터는 전체 자연 생태계만큼 큰 실험을 통해 행성 생물권에 대한 우리의 이해를 발전시킵니다."
 job_giga_birch_physma_manager_drone_farm_administration:0 "피스마 생물조절 집단"
 job_giga_birch_physma_manager_drone_farm_administration_plural:0 "생체 조절 클러스터"
 job_giga_birch_physma_manager_drone_farm_administration_desc:0 "농업 기록 관리의 대가인 이 드론 집단은 모든 잎, 가지, 뿌리 및 덩이줄기의 크기, 품질 및 목적지를 알고 있습니다."
 job_giga_birch_physma_manager_drone_farm_fortress:0 "물리학 공급망 감독관"
 job_giga_birch_physma_manager_drone_farm_fortress_plural:0 "물리학 공급망 감독관"
 job_giga_birch_physma_manager_drone_farm_fortress_desc:0 "행정관은 농업 및 군사 프로젝트 모두를 관리하며, 이 드론 집단과 그 하위들은 현지 주둔 군대의 모든 공급 요구 사항이 충족되도록 보장합니다."
 job_giga_birch_physma_manager_drone_laboratory:0 "기계 생명체 연구 군집"
 job_giga_birch_physma_manager_drone_laboratory_plural:0 "물리학 연구 군집"
 job_giga_birch_physma_manager_drone_laboratory_desc:0 "행정관의 환경 연구를 담당하는 이 드론 집단과 그 하급자들은 자연 세계에 대한 우리의 이해를 증진시킵니다."
 job_giga_birch_physma_manager_drone_laboratory_effect_desc:0 "£job_giga_birch_physma_manager_drone£ $job_giga_birch_physma_manager_drone_laboratory_plural$는 추가로 £minerals£ §Y$minerals$§! (또는 £energy£ §Y$energy$§!)를 $giga_r_research$ §Y연구 포인트§!로 전환하고 £mod_pop_bonus_workforce_mult£ §Y$researcher_jobs_bonus_workforce_mult$§!를 추가로 증가시킵니다."
 job_giga_birch_physma_manager_drone_laboratory_administration:0 "피스마 아카이브 클러스터"
 job_giga_birch_physma_manager_drone_laboratory_administration_plural:0 "물리학 자료 보관소 클러스터"
 job_giga_birch_physma_manager_drone_laboratory_administration_desc:0 "행정관의 문화 연구, 이 드론 집단과 그 하위들은 과거 연구를 통해 역사를 보존하고 미래를 이해하는 역할을 합니다."
 job_giga_birch_physma_manager_drone_laboratory_fortress:0 "공학 군집"
 job_giga_birch_physma_manager_drone_laboratory_fortress_plural:0 "공학 군집"
 job_giga_birch_physma_manager_drone_laboratory_fortress_desc:0 "행정관들은 무기 연구를 담당하며, 이 드론 집단과 그 하위들은 행성 전쟁의 모든 상상 가능한 전장에서 새로운 설계를 시험합니다."
 job_giga_birch_physma_manager_drone_administration:0 "피즈마 중계 오버마인드"
 job_giga_birch_physma_manager_drone_administration_plural:0 "피스마 중계 오버마인드"
 job_giga_birch_physma_manager_drone_administration_desc:0 "행정관은 거대한 신호 중계기의 관리자로, 이 드론 집단과 그 하위들은 서로 다른 인슐라 간의 정신적 응집력이 유지되도록 보장합니다."
 job_giga_birch_physma_manager_drone_administration_effect_desc:0 "£job_giga_birch_physma_manager_drone£ $job_giga_birch_physma_manager_drone_administration_plural$ 추가로 £energy£ §Y$energy$§! (그리고 £food£ §Y$food$§!, 또는 £minerals£ §Y$minerals$§!)을 £unity£ §Y$unity$§!로 전환하고 £mod_pop_bonus_workforce_mult£ §Y$bureaucrat_jobs_bonus_workforce_mult$§!를 더욱 증가시킵니다."
 job_giga_birch_physma_manager_drone_administration_fortress:0 "전쟁 의식"
 job_giga_birch_physma_manager_drone_administration_fortress_plural:0 "피스마 웜마인드"
 job_giga_birch_physma_manager_drone_administration_fortress_desc:0 "전투에서 이론과 실제가 만나는 곳에 위치한 이 특수 드론 집단은 군사 전략의 실행을 숙고하기 위해 만들어졌습니다."
 job_giga_birch_physma_manager_drone_administration_fortress_servitor:0 "유기체 방어 조정기"
 job_giga_birch_physma_manager_drone_administration_fortress_servitor_plural:0 "물리학 유기체 방어 조정기"
 job_giga_birch_physma_manager_drone_administration_fortress_servitor_desc:0 "우리의 유기체 보호 대상은 보호받아야 하며, 이 특수 드론 집단이 그들에게 해가 가지 않도록 할 것입니다."
 job_giga_birch_physma_manager_drone_fortress:0 "피스마 메가포트 지휘 클러스터"
 job_giga_birch_physma_manager_drone_fortress_plural:0 "물리학 메가 요새 지휘관 집단"
 job_giga_birch_physma_manager_drone_fortress_desc:0 "이 목적에 맞게 제작된 드론 집단이 내재된 요새의 주둔지를 지휘함으로써, 어떤 적도 이 세계에 발을 들여놓을 엄두를 내지 못할 것입니다."
 job_giga_birch_physma_manager_drone_fortress_effect_desc:0 "£job_giga_birch_physma_manager£ $job_giga_birch_physma_manager_fortress_plural$는 추가로 £mod_country_naval_cap_add£ §Y$MOD_COUNTRY_NAVAL_CAP_ADD$§!를 증가시키고, £mod_planet_defense_armies_add£ §Y$MOD_PLANET_DEFENSE_ARMIES_ADD$§!를 제공하며, £mod_pop_bonus_workforce_mult£ §Y$giga_soldier_jobs_bonus_workforce_mult$§!를 더욱 증가시킵니다."
 job_giga_birch_physma_worker_drone:0 "피즈마 인슐라 노동드론"
