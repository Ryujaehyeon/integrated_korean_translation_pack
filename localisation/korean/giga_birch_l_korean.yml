 job_giga_birch_origin_trader_drone:0 "해외 연결 인슐라 드론"
 job_giga_birch_origin_trader_drone_plural:0 "해외 연결 인슐라 드론"
 job_giga_birch_origin_trader_drone_desc:0 "이 드론들은 지구상의 다른 이웃들과의 무역 파트너쉽을 관리합니다."
 job_giga_birch_origin_trader_drone_effect_food_desc:0 "£job_giga_birch_origin_trader_drone£ $job_giga_birch_origin_trader_drone_plural$은 £food£ §Y$food$§!을 £energy£ §Y$energy$§!과 거래합니다."
