 zone_giga_birch_physma_insula_farm_flavour:0 "환경 경작"
 zone_giga_birch_physma_insula_farm_flavour_desc:0 "이 인술라는 최대한 자연적으로 설계되어, 은하 전역의 행성 생물권 재현과 우리 고유의 새로운 환경들을 담고 있습니다. 눈이 닿는 곳 너머까지 광활한 경작지가 펼쳐지는 이상적인 농업 조건을 갖추고 있습니다."
 zone_giga_birch_physma_insula_farm_flavour_angler:0 "세계의 바다"
 zone_giga_birch_physma_insula_farm_flavour_angler_desc:0 "이 인술라는 최대한 자연적으로 설계되어, 은하 전역의 행성 생물권 재현과 우리 고유의 새로운 환경들을 담고 있습니다. 수백 개 행성의 표면적보다 넓은 거대한 바다가 펼쳐지며, 궁극의 낚시를 도전합니다."
 zone_giga_birch_physma_insula_farm_laboratory_flavour:0 "농업과학 네트워크"
 zone_giga_birch_physma_insula_farm_laboratory_flavour_desc:0 "이 인술라는 최대한 자연적으로 설계되어, 은하 전역의 행성 생물권 재현과 우리 고유의 새로운 환경들을 담고 있습니다. 농업과 새로운 농업 기술 개발에 이상적인 조건입니다."
 zone_giga_birch_physma_insula_farm_laboratory_flavour_angler:0 "해양 분석 네트워크"
 zone_giga_birch_physma_insula_farm_laboratory_flavour_angler_desc:0 "이 인술라는 최대한 자연적으로 설계되어, 은하 전역의 행성 생물권 재현과 우리 고유의 새로운 환경들을 담고 있습니다. 수백 개 행성의 표면적보다 넓은 거대한 바다가 해양 생태계 연구에 이상적입니다."
 zone_giga_birch_physma_insula_farm_administration_flavour:0 "통합 농업"
 zone_giga_birch_physma_insula_farm_administration_flavour_desc:0 "이 인술라는 최대한 자연적으로 설계되어, 은하 전역의 행성 생물권 재현과 우리 고유의 새로운 환경들을 담고 있습니다. 농업과 문화 연구에 이상적인 조건입니다."
 zone_giga_birch_physma_insula_farm_administration_flavour_angler:0 "통합 수산업"
 zone_giga_birch_physma_insula_farm_administration_flavour_angler_desc:0 "이 인술라는 최대한 자연적으로 설계되어, 은하 전역의 행성 생물권 재현과 우리 고유의 새로운 환경들을 담고 있습니다. 수백 개 행성의 표면적보다 넓은 거대한 바다가 파도 위의 사회가 어떤 모습일지 탐구하는 데 이상적입니다."
 zone_giga_birch_physma_insula_farm_fortress_flavour:0 "분산 지원 시스템"
 zone_giga_birch_physma_insula_farm_fortress_flavour_desc:0 "이 인술라는 최대한 자연적으로 설계되어, 은하 전역의 행성 생물권 재현과 우리 고유의 새로운 환경들을 담고 있습니다. 인공 산악 지대에 요새화 최적 지점이 산재한 이상적인 농업 조건을 갖추고 있습니다."
 zone_giga_birch_physma_insula_farm_fortress_flavour_angler:0 "해양 초대형 요새"
 zone_giga_birch_physma_insula_farm_fortress_flavour_angler_desc:0 "이 인술라는 최대한 자연적으로 설계되어, 은하 전역의 행성 생물권 재현과 우리 고유의 새로운 환경들을 담고 있습니다. 수백 개 행성의 표면적보다 넓은 거대한 바다에는 외부 침입에 언제든 대응할 수 있는 거대 이동 요새들이 점점이 놓여 있습니다."
