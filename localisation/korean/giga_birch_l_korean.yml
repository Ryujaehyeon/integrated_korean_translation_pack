 job_giga_birch_orykta_manager_desc:0 "$name_birch$의 $pc_core_black_hole$과 상호 작용하도록 설계된 장비를 다루는 전문가들은 추출 작업이 최대 효율로 진행되도록 숙련된 감독관입니다."
