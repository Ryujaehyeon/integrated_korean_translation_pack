 job_giga_birch_physma_worker_drone_desc:0 "드론들은 피즈마 인슐라의 시설에 배치되었지만, 아직 구체적인 일은 배정받지 않았습니다."
 job_giga_birch_physma_worker_drone_effect_desc:0 "$job_giga_birch_physma_worker_drone_swap_plural_with_icon$ 소량의 £unity£ §Y$unity$§! 및 그들의 $giga_r_food$ $giga_r_minerals$ $giga_r_energy$ §Y인구 유지 자원§!을 생산하며, $giga_birch_physma_name$ 구역을 건설하여 전문화할 수 있습니다."
