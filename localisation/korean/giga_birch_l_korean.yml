 giga_situation_birch_expedition_9_approach_energy:0 "확장된 에너지 수집"
 giga_situation_birch_expedition_9_approach_energy_tooltip:0 "수리가 완료되면, 추출 어레이는 £energy£ §Y$energy$§!의 수집에 집중할 것입니다.\n"
 giga_situation_birch_expedition_9_approach_energy_desc:0 "추출 어레이의 에너지 입자 수집 기능을 확장하는 데 초점을 맞추면 에너지 생산량을 높일 수 있습니다."
 giga_situation_birch_expedition_9_approach_minerals:0 "집중 광물 천공"
 giga_situation_birch_expedition_9_approach_minerals_tooltip:0 "수리가 완료되면, 추출 어레이는 £minerals£ §Y$minerals$§!의 수집에 집중할 것입니다.\n"
 giga_situation_birch_expedition_9_approach_minerals_desc:0 "광물 추출에 초점을 맞춘 중력 천공의 설계를 유지하면 원자재의 흐름이 더 커질 것입니다."
 giga_situation_birch_expedition_9_approach_dark_matter:0 "암흑 물질 흡수"
 giga_situation_birch_expedition_9_approach_dark_matter_tooltip:0 "수리가 완료되면, 추출 어레이는 £sr_dark_matter£ §Y$sr_dark_matter$§!의 수집에 집중할 것입니다.\n"
 giga_situation_birch_expedition_9_approach_dark_matter_desc:0 "중력 천공은 블랙홀에서 직접 많은 양의 암흑 물질을 추출하도록 수정될 수 있습니다."
 giga_birch.101:0 "버치 월드 잃음!"
 giga_birch.101.desc:0 "우리는 구조물을 빼앗겼습니다. 우리의 집에서 쫓겨났기에, 탐사는 더 이상 진행할 수 없습니다."
 giga_birch.101.a:0 "무슨 수를 써서라도 우리의 고향을 되찾을 것이다."
 giga_birch.103:0 "[this.GetName] 말소됨!"
 giga_birch.103.desc:0 "구조물은 산산조각이 났고, 파편화된 껍질들이 빈 공간에 떨어지거나 내부의 블랙홀에 의해 사라져버렸습니다. 우리의 집은 파괴되었고, 그것을 수리할 어떠한 희망도 그것과 함께 사라졌습니다. 우리는 목적을 잃었습니다."
 giga_birch.103.a:0 "헤아릴 수 없는 손실이군."
 giga_birch.105:0 "[this.GetName] 되찾음!"
 giga_birch.105.desc:0 "구조물을 되찾았습니다! 영토의 많은 부분이 파괴되었지만 재건할 수 있습니다. 이제 우리가 통제권을 되찾았으니, 탐사 활동을 재개할 수 있습니다."
 giga_birch.105.a:0 "다시, 우리의 고향은 안전하다."
 giga_birch.800:0 "심층 조사"
 giga_birch.800.desc:0 "[from.planet.GetName]에 대한 우리의 식민지 개척 노력이 공식적으로 완료된 지 1년이 지났습니다. 그리고 우리의 식민지 개척자들은 지구 표면을 가로지르는 폭풍과 위험한 해류로부터 그들을 보호하는 고대 고고학 단지에 더 익숙해지고 있습니다. 거대한 해양 구조물에 대한 많은 의문점들이 풀리지 않은 채 남아있고, 과학적 발견의 가능성이 높습니다.\n\n핵심 플랫폼 중 하나에 있는 사이트는 정리되었고 추가 조사를 할 준비가 되었습니다."
 giga_birch.800.a:0 "많은 것을 배울 수 있겠지."
 site_giga_birch_origin_edge_of_eternity:0 "고대 해양 아콜로지"
 site_giga_birch_origin_edge_of_eternity_intro:0 "[planet.GetName]의 고대 아콜로지는 우리의 식민지 개척자들을 사나운 바다로부터 보호해주는 유일한 장치입니다. 그것들이 어떻게 그리고 왜 지어졌는지는 행성 위에 떠다니는 구조물과 함께 미스터리로 남아 있습니다."
 giga_birch.801:0 "고대 통로"
 giga_birch.801.desc:0 "아콜로지의 거의 방문하지 않은 구역에 있는 일련의 통로들은 [owner.GetArchaeologistPlural]들로 하여금 플랫폼의 많은 부분을 복합단지와 완전히 분리시키는 거대한 방폭문으로 이끌었습니다.\n\n이곳은 안전한 데이터 저장소 또는 기타 중요한 영역일 수 있습니다."
 giga_birch.801.a:0 "봉인된 문은 좋은 신호지."
 giga_birch.802:0 "지역 지도화"
 giga_birch.802.desc:0 "방폭문이 열렸고, 그 안에 있는 지역은 현재 지도로써 제작되고 있습니다. 아콜로지의 거대한 섹션은 일종의 디지털 아카이브에 할당된 것으로 보이지만, 구조 전반에 걸쳐 명백하게 진행된 붕괴 상태는 더 이상 찾을 수 없다는 것을 의미할 수 있습니다."
 giga_birch.802.a:0 "수단과 방법을 가리지 마라."
 giga_birch.803:0 "황폐화된 서버"
 giga_birch.803.desc:0 "아카이브의 깊숙한 곳에서 손상되지 않은 것처럼 보이는 기록들이 들어 있는 방이 발견되었습니다. 주변 지역의 배치와 낮은 수준의 보안 레벨은 그것이 특별한 중요성이 없고, 구체적으로 보존되지 못하고 잊혀져 버렸다는 것을 시사합니다.\n\n[owner.GetArchaeologistPlural]들은 내용을 해독하고 있지만, 손상의 정도로 인해, 사용할 수 있는 것들을 하나로 묶는 데 시간이 걸릴 수 있습니다."
 giga_birch.803.a:0 "아카이브가 부분적이나마 온전하다니 다행이군."
 giga_birch.804:0 "스키마 수집"
 giga_birch.804.desc:0 "아카이브의 남은 부분에서 사용 가능한 데이터를 통합하려는 노력이 마침내 몇 가지 결과를 낳았습니다.\n\n이 특정 섹션은 아콜로지 및 기타 유사한 시설에 대한 도식을 저장하는 데 사용된 것으로 보입니다! 스토리지 미디어의 악화로 인해 불완전하지만, 제한적인 정보조차도 설계자들의 생각을 엿볼 수 있다는 점에서 매우 중요할 것입니다."
 giga_birch.804.a:0 "우리는 이 지식을 다른 행성을 식민지화하는데 사용할 수 있습니다..."
 giga_birch.804.pops:0 "§H[this.GetName]§!의 §Y$trait_pc_birch_preference$§!를 가진 모든 £pop£ §Y팝§!들이 대신 §Y$trait_pc_ocean_preference$§!를 가지게 됩니다."
 giga_birch.804.b:0 "...또는 거주지 건설을 위한 용도로 변경할 수도 있습니다."
 giga_birch_origin_building_reward_habitat:0 "아콜로지 역공학"
 giga_birch_origin_building_reward_habitat_desc:0 "우리는 영원의 끝자락에 있는 고고학 단지로부터 건축에 대해 많은 것을 배웠습니다."
 giga_birch_origin_building_reward_planet:0 "아콜로지 역공학"
 giga_birch_origin_building_reward_planet_desc:0 "우리는 영원의 끝자락에 있는 고고학 단지로부터 건축에 대해 많은 것을 배웠습니다."
 giga_explorer_1:0 "탐험가"
 giga_explorers_1:0 "탐험가"
 giga_explorer_2:0 "조사 드론"
 giga_explorers_2:0 "조사 드론"
 giga_explorer_3:0 "탐사 드론"
 giga_explorers_3:0 "탐사 드론"
 giga_birch.1001:0 "제1차 탐험대"
 giga_birch.1001.desc:0 "오늘은 작동하는 횡단 첨탑과 그것을 통해 우리 고향 세계의 기원을 발견하기 위한 우리의 첫 번째 주요 탐사 작전의 출발일입니다. 과거에 우리의 고향 인슐라에서 멀리 떨어진 지역을 지도화하려는 많은 시도가 있었지만, 비교적 규모도 작고 장비가 빈약하여 광대한 황야에선 거의 쓸모가 없었습니다.\n\n이제 우리는 우주에서 구조물을 보았고 그것의 진정한 크기를 이해했으므로, [GigaGetExplorerPlural]들은 그러한 웅장한 규모의 탐험에 필요한 장비와 공급품을 갖추는 것이 필수적입니다.\n\n원정대 대장 [giga_birch_expedition_leader.GetName](은)는 대부분의 공급망을 유지하면서도 극한의 거리를 필요한만큼 이동할 수 있을 충분히 큰 통합군을 이끌고 작전을 진두지휘하도록 임명되었습니다.\n\n거기서 무엇을 발견할지 모르지만, 우리는 그것이 적어도 이 고대 구조물의 진정한 본질을 밝혀줄 수 있기를 바랍니다."
 giga_birch.1001.a:0 "우리는 진실을 찾기 위해 어둠 속으로 뛰어들 겁니다."
 giga_birch.1002:0 "황폐해진 폐허"
 giga_birch.1002.desc:0 "원정대장 [giga_birch_expedition_leader.GetName](은)는 [GigaGetExplorerPlural]들이 안타깝게도 기능을 하지는 못하는 거대한 지원 첨탑 주변에 우리와 비슷한 규모의 대규모 정착촌을 발견했다고 보고했습니다.\n\n[GetArchaeologistPlural]은 마모된 유적들과 슬러리에 뒤덮인 구조물들 사이에 있는 그 정착지가 약 200년 동안 버려졌다고 추정합니다.\n\n더 철저한 조사가 진행 중이며 곧 추가적인 보고가 있을 겁니다."
 giga_birch.1002.a:0 "공간과 시간으로 분리되었었군."
 giga_birch.1003:0 "영구적 존재의 가능성?"
 giga_birch.1003.desc:0 "[GigaGetExplorerPlural]들이 발견한 폐허가 된 정착지에 대한 보고서가 도착했지만 우리가 본 것을 설명하지는 못했습니다.\n\n탐험대장 [GetArchaeologist]에 따르면, 한때 이곳에 살았던 문명은 잘 정착되어 있었고, 상당한 수준의 산업 인프라를 가지고 있었습니다. 유해가 발견되지 않았고, 발견된 모든 저장 매체가 알아볼 수 없을 정도로 망가져, 그들이 어떤 모습이었는지 정확히 이해하는 데 도움이 될 만한 것은 별로 남아 있지 않습니다. 확실한 것은 그들의 도구나 가구들의 디자인이 이질적인 것으로 보아 우리들과 다른 형태의 신체를 지녔다는 것입니다.\n\n탐험대 대장 [giga_birch_expedition_leader.GetName](은)는 이 미스터리가 장기적인 연구의 대상이 될 수 있기 때문에 현장 작전을 위한 전진 기지를 구축할 것을 제안했습니다. [giga_birch_expedition_leader.GetSheHeCap] [giga_birch_expedition_leader.GetIsAre]는 또한 덜 중요한 장소들 중 일부에서 재활용이나 토지 재개발을 통해 자원을 모을 수 있다고 제안합니다."
 giga_birch.1003.a:0 "공장의 용도를 변경하자."
 giga_birch.1003.a.desc:0 "그들의 생산 인프라를 £consumer_goods£ §Y$consumer_goods$§!를 생산하도록 재설계할 것입니다.\n "
 giga_birch.1003.b:0 "구조물의 일부를 갈아버려라."
 giga_birch.1003.b.desc:0 "덜 쓸모있는 몇몇 폐허들을 부숴 £minerals£ §Y$minerals$§!과 £alloys£ §Y$alloys$§!으로 만듭니다.\n "
 giga_birch.1003.c:0 "발전소를 복구한다."
 giga_birch.1003.c.desc:0 "발전 설비를 복구하여 추가적인 £energy£ §Y$energy$§! 생산을 얻습니다.\n "
 giga_birch.1003.d:0 "경작 가능한 곳은 전부 농장으로 사용해야한다."
 giga_birch.1003.d.desc:0 "무의미한 잔해를 치우고 £food£ §Y$food$§!을 생산합니다.\n "
 giga_birch.1004:0 "불확실한 미래"
 giga_birch.1004.desc:0 "우리와 비슷한 기술적 궤적을 따라간 것으로 보이는 멸종된 문명의 발견은 우리 자신의 영속성에 대한 불확실성을 남겼습니다. 우리는 구조물의 외부 껍질 너머의 공간에 접근할 수 있다는 장점이 있지만, 하위 계층에 도달할 수 있는 기능적 첨탑은 아직 하나도 찾지 못했습니다. 첨탑들이 전부 작동 불가능할 수 있으며, 이 경우 우리는 목표를 결코 달성하지 못할 수도 있습니다.\n\n우리는 더 많이 노력해야합니다. 다음 탐험은 더 멀리 가고, 더 많이 배우고, 그들의 임무를 위협할 수 있는 어떤 것도 더 잘 물리칠 수 있을 것입니다."
 giga_birch.1004.a:0 "이 전진 기지가 첫 발걸음이 될 것입니다."
 giga_birch.2001:0 "제2차 탐험대"
 giga_birch.2001.desc:0 "미지에 대한 두 번째 주요 탐험을 시작할 때가 됐습니다. 다시 한 번 구조의 하위 계층에 접근할 수 있는 가동 가능한 첨탑을 찾아야합니다.\n\n우리의 이전 발견을 바탕으로, 우리의 탐험가들은 첫 번째 탐험에서 발견한 유적들 사이에 세워진 전진 기지에서 출발할 것입니다. 탐험대장 [giga_birch_expedition_leader.GetName](와)과 [GigaGetExplorerPlural]의 [giga_birch_expedition_leader.GetHerHis]팀은 어떤 도전에도 응할 준비가 되어 있습니다."
 giga_birch.2001.a:0 "다시한번 미지로."
 giga_birch.2002:0 "문명의 증거"
 giga_birch.2002.desc:0 "탐험대장 [giga_birch_expedition_leader.GetName](은)는 탐험대가 산업화된 사회의 무선 신호를 포착했으며, 추가 조사를 위해 주 호송차에 앞서 위장한 정찰병 몇 명을 보냈다고 보고했습니다.\n\n지금까지 수집된 정보에 따르면, 그들은 우리보다 훨씬 뒤떨어진 기술 수준을 가진 [giga_birch_expedition_2_country.GetSpeciesClassPlural]인 것으로 보입니다. 그들은 많은 도시들을 가지고 있는데, 그들 중 몇몇은 첨탑을 중심으로 지어졌고, 주로 고정익 항공기를 장거리로 발진하는 데 사용되는 구조물들이 그들의 외부에 부분적으로 지어져 있습니다.\n\n그들이 우리의 [GigaGetExplorerPlural]을 탐지했다는 징후는 없으며, 현황을 유지하기 위해 모든 노력을 기울이고 있습니다."
 giga_birch.2002.a:0 "가능한 한 많은 정보를 수집해라."
 giga_birch.2003:0 "접촉!"
 giga_birch.2003.desc:0 "들켰습니다!\n\n탐험대장 [giga_birch_expedition_leader.GetName]는 탐험대가 관찰하던 [giga_birch_expedition_2_country.GetSpeciesClass] 종들이 그들의 존재를 알게 되었다는 긴급 무전을 보냈습니다. 원시인의 비행기 한 대가 이례적으로 먼 거리를 비행하며 우리의 정전 구역 안을 지나 주 호송대를 직접 보았습니다. 그 항공기는 가까스로 탈출했고, 조난 신호를 보냈습니다.\n\n호송대로 전달 된 메시지에서 대화를 요청하고 있습니다."
 giga_birch.2003.a:0 "화면에 띄워라."
 giga_birch.2004:0 "[giga_birch_expedition_2_country.GetName]"
 giga_birch.2004.title:0 "메시지 수신"
 giga_birch.2004.desc:0 "저는 [giga_birch_expedition_2_country.GetName]의 [giga_birch_expedition_2_country.GetRulerTitle] [giga_birch_expedition_2_ruler.GetName]입니다. 이방인들이여, 용건을 말씀해 주십시오. 우리는 평화적인 논의를 원하지만, 필요하다면 스스로를 방어할 준비가 되어 있습니다."
 giga_birch.2004.a:0 "그럼 의논해보죠."
 giga_birch.2004.a.desc:0 "우리는 서로에 대해 더 알기 위해 정보를 교환할 것입니다."
 giga_birch.2004.b:0 "우린 기능하는 첨탑을 찾고 있습니다."
 giga_birch.2004.b.desc:0 "본론으로 들어간다."
 giga_birch.2004.c:0 "마음에 안 드는걸."
 giga_birch.2004.c.desc:0 "우리는 이 외계인들을 모두 몰살시킬 목적으로 즉각 공격을 개시할 것입니다."
 giga_birch.2005.desc:0 "[giga_birch_expedition_2_country.giga_birch_2005_part1] [giga_birch_expedition_2_country.giga_birch_2005_part2]\n\n[root.giga_birch_2005_part3]"
 giga_birch.2005.desc.1:0 "당신은 [giga_birch_expedition_2_country.GetName]의 대표자와 이야기합니다."
 giga_birch.2005.desc.1.democracy:0 "[giga_birch_expedition_2_country.GetName](은)는 민주주의 국가입니다. 저는 국민을 대표하여 선출된 지도자이자 정부 수반으로서 여러분께 말하는 것입니다."
 giga_birch.2005.desc.1.oligarchy:0 "저는 [giga_birch_expedition_2_country.GetName]의 수장으로서, 통치 위원회를 대변합니다."
 giga_birch.2005.desc.1.autocracy:0 "당신은 이 나라의 유일한 지도자와 대화하고 있습니다. 당신은 제가 당신에게 직접 말하는 것이 우리 국민들 사이에서 존경의 표시로 여겨진다는 것을 알아야 합니다."
 giga_birch.2005.desc.2:0 "우리는 이 땅에서 오랫동안 살아오며 역사를 기록해왔고, 오늘까지 다른 지적 생명체를 만나지 못했습니다. 이것은 중대한 사건이고, 우리는 당신들의 행동이 악의가 아니라 주의에서 나온 것이기를 바랍니다."
 giga_birch.2005.desc.2.militarist:0 "우리는 이 땅에서 오랫동안 살아오며 역사를 기록해왔고, 오늘까지 다른 지적 생명체를 만나지 못했습니다. 우리의 용감한 전사들은 평화든 전장이든 여러분을 환영할 준비가 되어 있습니다."
 giga_birch.2005.desc.2.spiritualist:0 "고대의 경전들은 우리 민족이 오래 전에 이 땅에 왔다는 것을 말해주고 있고, 우리는 그때부터 여기에 정착했습니다. 저 너머의 땅을 탐험하기 위해 많은 사절들을 보냈음에도 불구하고, 우리는 오늘날까지 다른 지적 생명체를 발견하지 못했습니다. 우리는 당신들의 행동이 악의가 아니라 주의에서 나온 것이기를 바랍니다."
 giga_birch.2005.desc.3:0 "그러한 점에서, 이방인들, 여러분은 무엇입니까? 탐험가? 이 보고서는 당신이 우리와 매우 비슷하다는 것을 시사하지만, 우리가 가능하다고 생각하지 않았던 몇 가지 환상적인 기술에 대해서도 언급하고 있습니다."
 giga_birch.2005.desc.3.hive:0 "그러한 점에서, 이방인들, 여러분은 정확히 무엇입니까? 당신들의 대표자들은 목적을 가지고 행동하는 반면, 그들의 부하들은 침묵하고 그들의 행동에만 몰두합니다. 여러분은 다른 방법으로 의사소통을 합니까?"
 giga_birch.2005.desc.3.machine:0 "그러한 점에서, 이방인들, 여러분은 정말이지 무엇입니까? 기계들은 환상적이지만, 사람은 한 명도 보지 못했습니다. 우리가 얼굴을 맞대고 이야기하는 것이 예의에 어긋난다고 생각합니까?"
 giga_birch.2005.desc.3.assimilator:0 "그러한 점에서, 이방인들, 여러분은 정말이지 무엇입니까? 여러분의 움직임과 태도는 거의 로봇처럼 보이는데, 당신이 우리에게 보낸 대표자들은 그저 꼭두각시들인가요? 그들에게 무슨 짓을 한 겁니까?"
 giga_birch.2005.a:0 "이것으로 모든 것이 설명될 것입니다."
 giga_birch.2005.a.hive:0 "우리는 하나로써 당신 앞에 서 있습니다. 이것을 받으세요."
 giga_birch.2005.a.machine:0 "데이터 전송을 시작합니다."
 giga_birch.2005.a.desc:0 "우리의 임무를 상세히 설명하는 정보 패킷을 보낼 것입니다.\n "
 giga_birch.2006.desc:0 "아, 그래서 당신은 우리의 세계를 유지하는 기계가 있다고 믿는 이 하위 계층으로 여행할 방법을 찾고 있는 겁니까? 당신이 옳은지 아닌지에 대해 많은 것을 말할 수는 없지만, 당신은 우리보다 훨씬 더 많이 알고 있는 것 같습니다. 우리가 아는 것은 우리가 마주친 첨탑들 중 어떤 것도 접근하려는 시도에 반응하지 않았고, 강제 침입에 저항하는 반응을 보인다는 것입니다.\n\n한편 여러분의 상당한 기술 발전은... 인상적이군요.\n\n우리는 불리한 입장에 있는 것처럼 보이는군요, [root.GetSpeciesName]. 우린 이제 어떻게 되는거죠?"
 giga_birch.2006.desc.im:0 "잠깐, 기계뿐이라는 뜻인가? 너희 창조자에게 그 후 무슨 일이 있었는지도 모른다는 건가? 어쨌든 확실히 걱정스럽다. 하지만 평화를 의도한다면, 우리 두 문화 간의 외교 관계에 대해 열려 있다.\n\n여기에는 아래 기계층으로 들어가기 위해 사용 가능한 첨탑을 찾아야 한다고 되어 있다. 미안하지만, 우리가 마주친 모든 탑은 작동하지 않았고 강제로 들어갈 수도 없었다.\n\n하지만 너희의 놀라운 기술 발전은… 경외심을 불러일으킨다.\n\n우리가 불리한 입장에 있는 것 같군, [root.GetSpeciesName]. 이제 어떻게 해야 할까?"
 giga_birch.2006.desc.hive:0 "그러니까 당신들은 일종의... 오버마인드에 지배되는 하나의 거대한 유기체의 부분들이군요? 제겐 너무 이질적인 개념이지만, 가능은 하겠군요. 솔직히 말해서 조금 불안하지만, 우리는 우리 사이에 외교 관계를 맺을 준비가 되어 있습니다... 그런데 당신의 존재를 과연 문화로 간주할 수 있을까요? 우리 사회학자들은 몇 가지 용어를 재정의해야 할지도 모릅니다.\n\n하지만 그건 일단 제쳐놓고, 여기에는 아래 계층에 있는 기계에 접근할 수 있는 기능하는 첨탑을 찾고 있다고 나와 있네요. 유감스럽게도, 우리가 마주친 것은 모두 작동하지 않았기 때문에 많은 도움을 드릴 수 없습니다. 우린 이제 어떻게 되는거죠?"
 giga_birch.2006.desc.machine:0 "잠깐, 기계만 있다는 겁니까? 그리고 당신들의 창조자가 어떻게 된 된 건지도 모른다고요? 그건 걱정스럽군요. 하지만 만약 당신의 의도가 평화적이라면, 우리는 우리 사이에 외교 관계를 맺을 준비가 되어 있습니다... 그런데 당신의 존재를 과연 문화로 간주할 수 있을까요? 우리 사회학자들은 몇 가지 용어를 재정의해야 할지도 모릅니다.\n\n하지만 그건 일단 제쳐놓고, 여기에는 아래 계층에 있는 기계에 접근할 수 있는 기능하는 첨탑을 찾고 있다고 나와 있네요. 유감스럽게도, 우리가 마주친 것은 모두 작동하지 않았기 때문에 많은 도움을 드릴 수 없습니다. 우린 이제 어떻게 되는거죠?"
 giga_birch.2006.desc.servitor:0 "사람들이 고국으로 돌아왔는데, 당신은 당신의 의지를 탐구하고 있습니까? 기계에 그렇게 많은 것을 맡긴다는 것은... 이상하지만, 만약 당신이 말한 것이 사실이라면, 당신의 의도는 적어도 좋아는 보입니다. 첨탑에 대한 당신의 관심에 대해서는, 우리가 마주친 첨탑들 중 어떤 것도 접근하려는 시도에 반응하지 않았고, 강제 침입에 저항하는 반응을 보였습니다.\n\n당신은 분명히 우리 기술보다 훨씬 높은 수준의 기술을 가지고 있는 것처럼 보입니다. 우리는 불리한 입장에 있는 것처럼 보이는군요, [root.GetSpeciesNamePlural]. 만약 당신이 긍정적이라면 우리 국민들 사이의 외교 관계에 대해 개방적입니다."
 giga_birch.2006.desc.assimilator:0 "\"유기체와 기체의 결합이라고요\"? 직접 이러한 선택을 했다는 것이 믿기는 어렵지만... 우리의 삶을 존중한다면 여러분의 삶의 방식을 존중할 것입니다.\n\n우리는 아래의 기계에 대한 당신의 가설이 사실인지는 모르지만, 당신은 우리보다 훨씬 더 많이 알고 있는 것 같습니다. 우리가 아는 것은 우리가 마주친 첨탑들 중 어떤 것도 접근하려는 시도에 반응하지 않았고, 강제 침입에 저항하는 반응을 보인다는 것입니다.\n\n한편 여러분의 상당한 기술 발전은... 우려스럽군요.우리는 불리한 입장에 있는 것처럼 보이는군요, [root.GetSpeciesName]. 우린 이제 어떻게 되는거죠?"
 giga_birch.2006.oncon:0 "§H탐사가 완료되면 다음을 수행합니다:§!"
 giga_birch.2006.a:0 "우리는 상품과 아이디어의 교환을 희망합니다."
 giga_birch.2006.a.desc:0 "장기적인 무역 거래를 위한 협상을 시작합니다. [giga_birch_expedition_2_country.GetName](은)는 독립적인 상태를 유지할 것입니다.\n\n$giga_birch.2006.oncon$\n "
 giga_birch.2006.a.xenophobe:0 "우리는 무역을 원하지만, 그 이상은 아닙니다."
 giga_birch.2006.a.xenophobe.desc:0 "장기적인 무역 거래를 위한 협상을 시작합니다. [giga_birch_expedition_2_country.GetName](은)는 거리를 둘 것입니다.\n\n$giga_birch.2006.oncon$\n "
 giga_birch.2006.b:0 "우리와 함께 합시다. 이건 당신들의 세상이기도 하니까요."
 giga_birch.2006.b.desc:0 "우리의 대외적 기치 아래 그들 국가와의 평화적 통합을 제안합니다.\n\n$giga_birch.2006.oncon$\n\n$giga_birch.2009.integrate.desc$"
 giga_birch.2006.c:0 "항복하지 않으면 죽음 뿐이다."
 giga_birch.2006.c.desc:0 "우리의 탐험대는 이 원시인들을 무력으로 정복하려고 할 것입니다.\n\n$giga_birch.2006.oncon$\n\n$giga_birch.2009.conquer.desc$"
 giga_birch.2006.d:0 "너희들을 너희 자신으로부터 구원하리라."
 giga_birch.2006.d.desc:0 "우리의 탐사는 이 유기체들이 적절한 돌봄을 받을 수 있게 보장할 것입니다.\n\n$giga_birch.2006.oncon$\n\n$giga_birch.2009.sanctuary.desc$"
 giga_birch.2007.desc:0 "유감스럽게도 이 근처에서는 그런 것들을 찾을 수 없을 것입니다. 우리가 마주친 첨탑들 중 어떤 것도 접근하려는 시도에 반응하지 않았고, 강제 침입에 저항하는 반응을 보였습니다. 여기까지 왔으니 우리보단 수색을 계속하기에 용이할 것 같군요.\n\n당신의 명백한 기술 수준이 우려스럽습니다. 우리는 불리한 입장에 있는 것처럼 보이는군요, [root.GetSpeciesName]. 우린 이제 어떻게 되는거죠?"
 giga_birch.2008.desc.exterminate:0 "우리가 그저 굴복하고 사라질 것이라고 생각하나 이방인? 우리는 우리의 생활 방식을 보존하기 위해 마지막 숨을 내쉴 때까지 싸울 것이다."
 giga_birch.2008.exterminate:0 "곧 알 수 있겠지."
 giga_birch.2008.desc.trade:0 "그건... 좋은 것처럼 들리는군요. 우리는 서로에게서 많은 것을 배울 수 있을 겁니다. 장관들에게 즉시 제안서 초안을 작성하도록 하겠습니다."
 giga_birch.2008.trade:0 "훌륭하군."
 giga_birch.2008.desc.integrate:0 "만약 당신이 말하는 환경의 취약성에 대한 말이 사실이라면, 이 임무는 정말이지 매우 중요한 것입니다. 우리가 할 수 있는 모든 방법으로 도움을 드리겠습니다."
 giga_birch.2008.integrate:0 "환영합니다."
 giga_birch.2008.desc.conquer:0 "항복? 당신에게 기술적 우위가 있을지언정, 우리의 군대는 탐험대 정도는 충분히 무찌를 수 있다. 항복은 없다."
 giga_birch.2008.conquer:0 "안타깝게 됐군."
 giga_birch.2008.desc.sanctuary:0 "우리에게 기술을 전수해 주고 싶다고요? 이건... 예상치 못한 일이네요. 당황스럽기도 하고요. 몇 일 내에 우리 최고의 과학자들이 당신의 제안을 연구할 준비를 하도록 하겠습니다."
 giga_birch.2008.sanctuary:0 "이건 시작일 뿐이다..."
 giga_birch.2008.a:0 "(이 문장이 보인다면, 뭔가 이상이 있다는 뜻입니다.)"
 giga_birch.2009:0 "여파"
 giga_birch.2009.desc.exterminate:0 "세 번의 섬광. 우리의 핵융합 폭탄이 [giga_birch_expedition_2_country.GetAdj]의 세 도시를 눈 깜짝할 사이에 쓸어버렸고 세 개의 원자 폭풍이 기둥처럼 치솟고 있습니다.\n\n다음 달에 걸쳐 우리 탐험대는 찾을 수 있는 모든 [giga_birch_expedition_2_species.GetName](을)를 체계적으로 추적해 죽였습니다. 아무도 남지 않았습니다.\n\n그들이 스스로를 얼마나 강하다고 생각하든, 우린 단순한 무력으로 그들을 굴복시켰습니다. 그들 문명의 잔해는 다음 외계인과의 만남을 위한 실험장과 연구지로 이용될 것입니다."
 giga_birch.2009.exterminate:0 "모든 것이 순조롭군."
 giga_birch.2009.exterminate.desc:0 "£district£ §Y$district_giga_origin_birch_lab_plural$§!가 추가적인 £society_research£ §Y$society_research$§!와 £unity£ §Y$unity$§!을 생산합니다.\n "
 giga_birch.2009.desc.trade:0 "일정 기간의 협상 끝에 [giga_birch_expedition_2_country.GetName](와)과 무역 파트너십을 성공적으로 맺었습니다. 우리의 국가들은 독립적이지만, 무역상들은 국경을 오갈 것이고, 장거리 운송 시스템에 대한 계획을 세우고 있습니다."
 giga_birch.2009.trade:0 "우리 모두에게 이익이 되는 미래를 위하여."
 giga_birch.2009.trade.desc:0 "£district£ §Y$district_giga_origin_birch_lab_plural$§!가 추가적인 £society_research£ §Y$society_research$§!와 £unity£ §Y$unity$§!을 생산합니다.\n "
 giga_birch.2009.desc.integrate:0 "치열한 협상 끝에 [giga_birch_expedition_2_country.GetName](은)는 구조물을 이전의 영광스러웠던 형태로 복원하기 위한 우리의 임무에 동참하기로 합의했습니다. 그들은 은하계의 나머지 부분에 관한 한 우리의 깃발 아래 있을 것이고, 두 종족은 시간이 지남에 따라 더 가까워질 것입니다."
 giga_birch.2009.integrate:0 "우리는 이제 운명 공동체입니다."
 giga_birch.2009.integrate.desc:0 "[situation.target.GetName]에 8개의 §Y[giga_birch_expedition_2_species.GetName]§! £pop£ 팝이 나타납니다.\n "
 giga_birch.2009.desc.conquer:0 "치열한 전투 끝에 원정군은 [giga_birch_expedition_2_country.GetName](을)를 무조건 항복시켰습니다. 그들의 수는 우리의 뛰어난 화력 앞에선 아무것도 아니었습니다.\n\n우리는 이제 그들의 땅을 차지하고 있으며, 그들의 자원은 우리의 것입니다."
 giga_birch.2009.conquer:0 "복종하는 법을 가르쳐야겠군."
 giga_birch.2009.conquer.desc:0 "[situation.target.GetName]에 §Y$pop_recently_conquered$§! 특성을 가진 6개의 §Y[giga_birch_expedition_2_species.GetName]§! £pop£ 팝이 나타납니다.\n"
 giga_birch.2009.desc.sanctuary:0 "기술을 공유한다는 초기의 미명하에, 우리는 유기적인 보호구역 네트워크에 [giga_birch_expedition_2_country.GetName](을)를 성공적으로 통합했습니다. 그들은 거의 깨닫지도 못했지만요. 단기적으로 그들은 자신들이 감독받지 않고 살고 있다고 생각할 것이지만, 안전하고 만족스러운 새로운 삶으로 서서히 풀어질 것입니다.\n\n우리의 \"연합\"은 알려지지 않은 [giga_birch_expedition_2_species.GetAdjective] 세대를 위해 기념될 것입니다."
 giga_birch.2009.sanctuary:0 "시간이 지나면 감사하게 될거다."
 giga_birch.2009.sanctuary.desc:0 "[situation.target.GetName]에 8개의 §Y[giga_birch_expedition_2_species.GetName]§! £pop£ 팝이 나타납니다.\n "
 giga_birch.2009.a:0 "이 문장이 보인다면, 뭔가 이상이 있다는 뜻입니다."
 giga_birch.3001:0 "제3차 탐험대"
 giga_birch.3001.desc:0 "기능하는 첨탑을 찾기 위해 미지의 세계로 떠나는 세 번째 탐험대를 조직할 때가 왔습니다.\n\n우리는 임무를 시작한 이래로 수십 년 동안 많은 것을 배웠고, 추진력과 센서 기술의 새로운 발전들로 인해 [GigaGetExplorerPlural]들은 그 어느 때보다 더 멀리 가서 더 많은 것을 볼 수 있을 것입니다.\n\n이번 원정대는 [giga_birch_expedition_leader.GetName]이 지휘를 맡고 2차 원정대가 구축한 원거리 전진기지에서 진행됩니다."
 giga_birch.3001.a:0 "그들은 미래를 찾아 떠납니다."
 giga_birch.3002:0 "후보지"
 giga_birch.3002.desc:0 "탐험대장 [giga_birch_expedition_leader.GetName](은)는 [GigaGetExplorerPlural](이)가 마침내 기능하는 수송 첨탑을 발견했다고 보고했습니다!\n\n수천 번의 실패 끝에, 하나의 첨탑이 내부 시스템이 온전히 보존되었음을 나타내는 징후를 보여주었고, 만약 그것이 제대로 가동될 만큼 충분한 전력을 공급할 수 있다면 이를 통해 우리는 하위 계층으로의 통행이 가능할지도 모릅니다...\n\n[giga_birch_expedition_leader.GetName]은 고대의 기계를 활성화하는 데 오랜 시간과 상당한 양의 에너지 크레딧 공급이 필요하기 때문에 우리의 승인을 기다리고 있습니다."
 giga_birch.3002.a:0 "이 기회를 놓칠 수는 없지. 당장 시작하자!"
 giga_birch.3003:0 "기능합니다!"
 giga_birch.3003.desc:0 "전부 끝났습니다! 탐험대장 [giga_birch_expedition_leader.GetName](은)는 엄청난 양의 에너지를 쏟아 부은 끝에 고대의 수송 첨탑이 활성화되었다고 보고했습니다!\n\n우리가 추측한 대로, 첨탑들은 단순히 지지뿐만 아니라 계층 간의 이동에도 사용되었습니다. [GigaGetExplorerPlural](은)는 이제 아래 계층에 접근할 수 있을 것입니다.\n\n탐사대 전체의 안전과 첨탑이 한 번에 얼마나 수송할 수 있는지, 우리가 어디까지 갈 수 있는지 알아보기 위해 작은 파견단이 구성되었습니다."
 giga_birch.3003.a:0 "마침내. 내려갈 시간이다."
 giga_birch.3004:0 "기계의 세상"
 giga_birch.3004.desc:0 "며칠 동안 아래쪽으로 이동한 [GigaGetExplorerPlural](은)는 첨탑의 수송 포드가 장애물을 만나 더 이상 나아갈 수 없다고 보고했습니다. 그들은 지나친 수십 개의 층 중 세 개에만 접근할 수 있었고, 그 중 두 개의 층은 완전히 특징이 없어 보였고, 사이에는 공기가 없는 빈 공간만 존재했습니다.\n\n세 번째 계층은 좀 다릅니다. 초기 보고서에 따르면 이 계층은 공업적인 기계들이 가득하고, 열 전달 매체로 추정되는 불활성 기체로 이루어진 대기를 가지고 있습니다.\n\n탐험대장 [giga_birch_expedition_leader.GetName](은)는 추가 탐사를 수행할 사이트를 확보하기 위해 이 계층의 첨탑 기슭에 전진 기지를 설치할 것을 제안합니다.\n\n한 가지만 정하면 됩니다. 전진 기지의 주요 목표는 무엇입니까?"
 giga_birch.3004.a:0 "모든 통신 인프라를 먼저 연구합니다."
 giga_birch.3004.a.desc:0 "£district£ §Y$district_giga_origin_birch_lab_plural$§!가 추가적인 £physics_research£ §Y$physics_research$§!를 제공합니다.\n "
 giga_birch.3004.b:0 "산업 프로세스에 초점을 맞춥니다."
 giga_birch.3004.b.desc:0 "£district£ §Y$district_giga_origin_birch_lab_plural$§!가 추가적인 £engineering_research£ §Y$engineering_research$§!를 제공합니다.\n "
 giga_birch.3004.c:0 "쓸만한건 모두 갈아버립니다."
 giga_birch.3004.c.desc:0 "£district£ §Y$district_giga_origin_birch_lab_plural$§!가 적은 양의 £minor_artifacts£ §Y$minor_artifacts$§!을 생산할 것입니다.\n "
 giga_birch.4001:0 "제4차 탐험대"
 giga_birch.4001.desc:0 "세 번째 탐험대가 성공적으로 첨탑을 활성화하고 기계 계층으로 이동했을 때, [GigaGetExplorerPlural]가 이동한 구조물의 코어까지의 거리는 1% 미만인 것으로 추정합니다. 그 이후로, 기계 계층에 대한 중력의 영향과 시간의 흐름에 대한 새로운 측정을 통해 구조물의 밀도에 대한 계산을 개선했습니다.\n\n이러한 데이터와 다른 은하들의 관측 결과를 바탕으로, 우리는 이 구조물이 초거대 블랙홀 주위에 구축된 것으로 추측합니다. 기계 계층은 외부 표면으로부터 사건의 지평선까지의 거리의 30% 이상 떨어진 곳에 배치되어 있는 것 같습니다. 이 새로운 추정치는 우리가 얼마나 많은 진전을 이루었는지를 근본적으로 재구성하며, 초기 예상보다 훨씬 더 빨리 핵심부에 도달할 수 있는 가능성을 시사합니다.\n\n네 번째 탐험대는 탐험대장 [giga_birch_expedition_leader.GetName](이)가 이끌 것이며, 우리의 목표에 더 가까이 다가갈 수 있는 기계 계층의 또 다른 첨탑을 찾는 데 초점을 맞출 것입니다."
 giga_birch.4001.a:0 "실제로 그렇지 않더라도, 여기서 배울 것이 너무나 많습니다."
 giga_birch.4002:0 "휴면중인 공장?"
 giga_birch.4002.desc:0 "탐험대장 [giga_birch_expedition_leader.GetName](이)가 탐험대가 자동화 제조 시설일 수도 있는 대규모 시설을 만났다고 보고했습니다. 이동하며 마주친 다른 구조물에 비해 놀라울 정도로 보존이 잘 된 것으로 보입니다. 이 시설을 수리하거나 다른 목적으로 사용할 수 있는지를 판단하기 위한 보다 심층적인 조사를 시작할 준비가 됐습니다."
 giga_birch.4002.a:0 "우리의 모든 관심이 여기에 쏠려 있습니다."
 giga_birch_origin_expedition_4:0 "고대 제조 단지 조사"
 giga_birch_origin_expedition_4_DESC:0 "[GigaGetExplorerPlural]들은 기계 계층에서 대부분이 보존되어 있는 고대 제조 단지의 잔해를 발견했습니다. 우리는 그 시스템을 연구하여 복구 가능 여부를 결정해야 합니다"
 giga_birch.4003:0 "약간의 노력과 열정만 있다면..."
 giga_birch.4003.desc:0 "[GigaGetExplorerPlural](이)가 수행한 조사 결과는 다음과 같습니다: 고대 제조 단지는 손상 정도가 크지 않아 복원이 가능하며, 이는 매우 유익할 것입니다.\n\n탐험대장 [giga_birch_expedition_leader.GetName]에 따르면  [giga_birch_expedition_leader.GetSheHe]들은 그것이 어떤 결과를 가져올지 아직 정확히 확신할 수는 없지만, 기계를 이해하기 위한 헌신적인 노력 끝에 가능할 것이라고 말했습니다."
 giga_birch.4003.a:0 "시작하겠습니다."
 giga_birch.4004:0 "중요한 힌트"
 giga_birch.4004.desc:0 "조사 결과, 구조물 내부의 정보 네트워크의 대락적인 배치도를 알아내었습니다.\n\n이 정보를 통해 우리는 노력을 더욱 집중할 수 있으며, 이 네트워크의 중요 노드들이 있을 가능성이 높은 지역을 목표로 삼을 수 있습니다. 조사해야할 공간은 여전히 넓지만, 적어도 지도는 갖게 되었습니다."
 giga_birch.4004.a:0 "시간이 지나면, 그것의 비밀을 알게 될 것입니다."
 giga_birch.4005:0 "제조 단지 접근 최종국면 도달"
 giga_birch.4005.desc:0 "고대 제조 단지의 복원작업이 돌이킬 수 없는 지점까지 도달했습니다. 이후에 계획을 변경하게 된다면, 기계에 필요한 일부 재료와 부품들의 복제법을 이해하지 못했기에 기계를 수리할 수 있는 가능성을 망치게 될 것입니다."
 giga_birch.4005.desc.alloys:0 "$giga_birch.4005.desc$\n\n수리가 완료되면, 시설은 다량의 고품질 £alloys£ §Y$alloys$§!을 생산하게 될 것입니다."
 giga_birch.4005.desc.goods:0 "$giga_birch.4005.desc$\n\n수리가 완료되면, 시설은 다량의 £consumer_goods£ §Y$consumer_goods$§!를 생산하게 될 것입니다."
 giga_birch.4005.desc.supertensiles:0 "$giga_birch.4005.desc$\n\n수리가 완료되면, 시설은 다량의 £giga_sr_amb_megaconstruction£ §Y$giga_sr_amb_megaconstruction$§!를 생산하게 될 것입니다."
 giga_birch.4005.a:0 "이제 남은 일은 작업을 완료하는 것뿐입니다."
 giga_birch.4006:0 "제조 단지 복원 프로젝트 완성"
 giga_birch.4006.desc:0 "기계 계층의 고대 제조 단지를 복원하는 프로젝트가 성공적으로 완료되었습니다. 벌써 시설은 가동하기 시작했고, 수 세기 만에 고대의 기계들이 굉음을 내뱉습니다.\n\n이 제조 단지는 우리 제국의 제조 능력을 크게 증가시킬 것입니다."
 giga_birch.4006.a:0 "[root.owner.GetAdj] 산업을 위한 새로운 여명이 밝았습니다."
 giga_birch.4006.a.desc:0 "[situation.target.GetName]의 §Y$d_giga_birch_expedition_4$§!기능에 몇 가지 새 직업이 추가되었습니다."
 giga_birch.5001:0 "제5차 탐험대"
 giga_birch.5001.desc:0 "네 번째 탐험 이후, 우리는 네트워크 맵의 해석에서 상당한 진전을 이루었습니다. 중요 노드의 후보지로 여러 곳을 지정했으며, 이번 탐험은 가장 가까운 곳부터 시작될 것입니다.\n\n탐험대장 [giga_birch_expedition_leader.GetName](이)가 [GigaGetExplorerPlural](을)를 가능성 있는 장소로 이끌고, 예측 모델이 정확한지 확인할 것입니다.\n\n우리는 여전히 이러한 노드들이 어떤 형태를 취할지, 혹은 합리적인 상호작용이 가능한 물리적인 형태를 갖고 있을지 모르지만, 우리의 의구심을 확인하기 위해서 그만한 가치가 있습니다."
 giga_birch.5001.a:0 "새로운 시각으로 구조물을 볼 것이다."
 giga_birch.5002:0 "네트워크 추적"
 giga_birch.5002.desc:0 "탐험대장 [giga_birch_expedition_leader.GetName](은)는 탐험대가 예상된 네트워크 노드의 부근에 도달하여, 기계 첨탑 중 하나의 주요 줄기에 통합된 특이한 구조물을 발견했다고 보고했습니다.\n\n첨탑 자체가 반응하는 것으로 보이기 때문에 이 이상한 구조물에 접근하는 것은 문제가 없지만, [GigaGetExplorerPlural](은)는 신중하게 진행하고 있습니다."
 giga_birch.5002.a:0 "이것이 우리가 찾고 있는 것일 수도 있습니다."
 giga_birch.5003:0 "맥락의 부족"
 giga_birch.5003.desc:0 "특이한 첨탑 내부에서 [GigaGetExplorerPlural](이)가 구조물의 시스템을 통해 자원과 전력의 흐름을 관리하는 것으로 보이는 일종의 제어 센터를 발견했습니다. [GetResearchers](은)는 만약 이 네트워크에서 사용되는 프로토콜을 해독할 수 있다면, 이를 통해 그 시스템을 제어하고, 마침내 구조물을 되살릴 수 있다고 추측합니다."
 giga_birch.5003.desc.wait:0 "특이한 첨탑 내부에서 [GigaGetExplorerPlural](이)가 일종의 제어 센터를 발견했지만, 실제로 무엇을 하는지는 밝혀내지 못했습니다.\n\n탐험대장 [giga_birch_expedition_leader.GetName](은)는 다른 후보지들이 모두 상당히 멀리 떨어져 있고, 손상되지 않았을 수도 있기 때문에 더 나은 수준의 이해 없이는 이 장비를 간섭하려고 시도하지 않을 것이라고 말했습니다."
 giga_birch.5003.a:0 "[GetResearchers](은)는 이것을 즉시 해독할 것입니다."
 giga_birch.5003.b:0 "아마도 해결책은 시간이 지나면 저절로 드러날 것입니다."
 giga_birch.5003.b.desc:0 "£engineering_research£ §Y$tech_mega_engineering$§!의 연구는 조사를 계속할 실마리가 될 것입니다."
 giga_birch_origin_expedition_5:0 "네트워크 프로토콜 해독"
 giga_birch_origin_expedition_5_DESC:0 "우리는 이 불가사의한 같은 제어 센터가 구조물의 시스템에 접근하고 그 옛 영광을 회복할 열쇠가 될 수 있다고 판단했습니다. 우리는 그 네트워크에서 사용된 프로토콜을 해독해야 합니다."
 giga_birch.5004:0 "새로운 돌파구"
 giga_birch.5004.desc:0 "구조 공학 분야의 새로운 발전으로 인해, 이전에 발견한 제어 센터에 대한 배경 지식을 알게 되었고, 우리가 이해할 수 없었던 미확인 데이터가 구조물 시스템 내의 자원 분배와 관련이 있다는 것을 알아냈습니다.\n\n이러한 새로운 통찰과 함께, 우리는 이제 그 시스템을 제어하기 위해 사용되는 네트워크 프로토콜을 해독하기 위해 필요한 모든 것을 갖추었다고 생각합니다."
 giga_birch.5004.a:0 "[GetResearchers](은)는 이것을 즉시 해독할 것입니다."
 giga_birch.5005:0 "밝혀진 네트워크"
 giga_birch.5005.desc:0 "거대한 웹이 우리의 눈 앞에 펼쳐져 있습니다. 미세한 데이터의 실들로 연결된 1000억 개의 작은 별들의 형성체입니다. 거의 모든 별들은 어두워져 있으며, 몇 개의 점들만이 흩어져 어둠에 맞서 깜빡거리고 있습니다.\n\n이것이 구조물의 디지털 본질이자 진정 아름다운 실체입니다.\n\n하지만, 구조물은 죽어가고 있습니다.\n\n우리의 로컬 노드는 크게 손상되지는 않았지만, 저전력 상태에서 힘겹게 구동하고 있습니다. 네트워크 전체의 지원 없이는 자체적으로 조직할 수 없습니다. 구조물 전체가 서서히 무너져 내리고 있습니다.\n\n이를 복구하기 위해 필요한 에너지의 총량은 우리가 투입할 수 있는 양을 넘어섭니다. 하지만 만약 우리가 그 근원에 접근해 구조물의 '심장'을 다시 살릴 수만 있다면, 스스로 시스템을 복구할 것입니다.\n\n한편, 우리가 사용할 수 있는 적은 양의 전력 누출은 우리의 노드와 가장 가까운 노드에 있는 일부 자동화 시스템들을 재기동하기에 충분합니다."
 giga_birch.5005.a:0 "이제 진짜 목표를 찾아냈군."
 giga_birch.5006:0 "새로운 편의의 시대"
 giga_birch.5006.desc:0 "상황이 심각하지만, 오늘은 분명 기념할만한 날입니다. 구조물의 관리 임무를 확립하기 위한 첫 번째 단추를 꿰었기 때문입니다. 우리는 이제 그것의 기초적인 작동과, 이를 위해 적어도 무엇을 고쳐야 하는지를 알게 되었습니다.\n\n실망스럽게도, 이러한 발견들은 우리 자신이 이 구조물의 역사에서 어떤 역할을 하는지 설명해주지는 않았습니다. 제어 센터 인터페이스의 적응성이 뛰어나 [GigaGetExplorerPlural]에 너무 잘 맞춰져 구조물의 창조자들이 우리와 조금이라도 유사한 존재였는지를 알 수 없을 정도입니다.\n\n그럼에도 불구하고, 우리의 고향에서 다시 가동시킨 자동화 시스템은 모든 분야에서 혁신을 일으켜, 제국의 능력을 크게 확장시켰습니다."
 giga_birch.5006.a:0 "이조차도 작은 과실에 불과하겠지."
 giga_birch.6001:0 "제6차 탐험대"
 giga_birch.6001.desc:0 "다섯 번째 탐험에서 우리는 진정한 목표가 구조물의 심장을 되살리고 전력 발전 시스템을 다시 가동시키는 것임을 알아내었습니다. 여섯 번째 탐험대는 그 심장을 찾기 위해 떠날 것입니다.\n\n기계 계층의 제어 센터에서 복구한 네트워크 맵을 통해 우리는 더 깊은 계층에 접근할 수 있는 멀리 떨어져 있는 첨탑을 정확히 찾아낼 수 있었습니다. 그 이후는 불확실하지만, 더 멀리 우리를 안내해 줄 다른 지휘 센터가 존재할 것입니다.\n\n탐험 대장 [giga_birch_expedition_leader.GetName](은)는 [GigaGetExplorerPlural](을)를 이끌고 하위 계층으로 향해 전진 기지를 설치할 것입니다."
 giga_birch.6001.a:0 "불확실한 길, 확실한 목표"
 giga_birch.6002:0 "얼음 계층"
 giga_birch.6002.desc:0 "탐험대장 [giga_birch_expedition_leader.GetName](은)는 수송 첨탑에 성공적으로 도달했으며, 이전과 마찬가지로 [GigaGetExplorerPlural]의 한 그룹을 정찰병으로서 주 호송대에 앞서 파견했다고 보고했습니다.\n\n이번에는 한개의 계층에만 접근할 수 있었고, [GigaGetExplorerPlural](은)는 눈보라와 마주쳤습니다. 추가적인 관측 결과, 이 계층은 얼음과 눈으로 가득 차 있고 대규모의 폭풍들이 거의 연속적으로 지형을 가로지르고 있습니다.\n\n이러한 악조건은 탐험에 어려움을 제기하지만, 탐험대는 잘 준비되었고 여전히 높은 사기를 유지합니다."
 giga_birch.6002.a:0 "예상치 못한 일이지만, 놀랄 일도 아니지."
 giga_birch.6003:0 "눈의 유령"
 giga_birch.6003.desc:0 "폭풍이 휩쓸고 다니는 극지방을 다니는 동안, [GigaGetExplorerPlural](은)는 다수의 버려진 정착지들을 마주쳤습니다. 이는 우리의 고향 계층에 비해 훨씬 더 흔하게 발견되었으며, 각 정착지들은 서로 다른 문화에 의해 다양한 기술적 발전 수준에서 건설된 것으로 보입니다.\n\n흥미롭게도, 어느 정착지도 이런 극한의 기후를 대비하지 않은 것으로 보입니다. 탐험대장 [giga_birch_expedition_leader.GetName](이)가 제기한 바와 같이, 이 정착지들이 버려진 이유가 지난 몇 세기 동안의 환경 변화 때문일 수 있을 것입니다.\n\n이러한 변화는 구조물의 환경 제어 시스템의 악화로 인해 발생했을 가능성이 있고, 향후 이를 복구할 수 있을 것이빈다. 그러나 기존의 주민들은 이미 사라진지 오래입니다."
 giga_birch.6003.a:0 "이러한 비극은 피할 수 있었을텐데..."
 giga_birch.6003.b:0 "너무 멍청하면, 살아남지 못하는 법이지."
 giga_birch.6003.c:0 "훌륭한 탈출이군."
 giga_birch.6004:0 "약간의 대피처"
 giga_birch.6004.desc:0 "탐험대장 [giga_birch_expedition_leader.GetName](은)는 특별히 심한 눈보라가 몰아쳐 탐험대가 협곡으로 철수해야 했지만, 그 과정에서 우연히 흥미로운 것을 발견했다고 보고했습니다.\n\n이 특정한 협곡은 일련의 큰 동굴들을 관통하는데, 그 위치 때문에 지금까지 찾은 장소들 중에서 가장 전진 기지를 설치하기 적합한 장소로 보입니다. 게다가 그 동굴들은 가스 분출구에서 연료를 공급받아 화학 합성을 통해 생존하는 많은 종의 지의류들이 서식하는 풍부한 지하 생태의 요람으로 보입니다.\n\n여기에 기지를 설치하면, 지의류를 수확하거나 가스정에 직접 접근해 에너지를 생성할 수 있습니다."
 giga_birch.6004.a:0 "이 지의류를 재배해야한다."
 giga_birch.6004.a.desc:0 "동굴의 전초기지는 £food£ §Y$food$§! 생산에 집중할 것입니다.\n "
 giga_birch.6004.b:0 "가스정을 발굴해라."
 giga_birch.6004.b.desc:0 "동굴의 전초기지는 £energy£ §Y$energy$§! 생산에 집중할 것입니다.\n "
 giga_birch.7001:0 "제7차 탐험대"
 giga_birch.7001.desc:0 "여섯 번째 탐험중에 세운 극지방 전진 기지에서 얻은 측정 결과를 토대로한 구조물 네트워크 맵의 추가 분석으로 우리는 두 번째 지휘 센터의 위치에 대한 확실한 단서를 얻었습니다.\n\n탐험대장 [giga_birch_expedition_leader.GetName](이)가 이끄는 일곱번째 탐험대는 전진 기지에서 출발해 지휘 센터에 도달하여 안전을 확보하는 것을 목표로 합니다."
 giga_birch.7001.a:0 "점점 가까워지고 있다."
 giga_birch.7002:0 "얼음 밑에 갇힌 구조물"
 giga_birch.7002.desc:0 "탐험대장 [giga_birch_expedition_leader.GetName](은)는 [GigaGetExplorerPlural]들이 목적지에 도착했다고 보고했습니다. 처음에는 아무것도 찾을 수 없었지만, 그들은 마침내 도착 지점에서 수십 킬로미터 떨어진 얼어붙은 호수의 바닥에서 거대한 인공 구조물을 발견했습니다.\n\n이 구조물이 다른 지휘 센터인지는 아직 알 수 없으며, 기계 계층의 지휘 센터보다 상당히 크고 첨탑에 연결되어 있지 않습니다.\n\n침몰된 구조물로 그룹을 보내기 위한 준비가 되었습니다."
 giga_birch.7002.a:0 "왜 저게 저 밑에 있는거지?"
 giga_birch_origin_expedition_7:0 "침몰된 구조물 조사"
 giga_birch_origin_expedition_7_DESC:0 "우리 [GigaGetExplorerPlural]가 얼음 호수 바닥에 놓인 고대 구조물을 발견했습니다. 우리는 그 목적을 밝혀내야 합니다. 그것이 우리가 찾고 있는 지휘소일 수 있기 때문입니다."
 giga_birch.7003:0 "고대의 관측소"
 giga_birch.7003.desc:0 "[GigaGetExplorerPlural](이)가 호수 바닥에 있는 구조물에 들어갔을 때, 그들은 이것이 또 다른 지휘 센터이기를 희망했습니다.\n\n그러나 그들이 발견한 것은 훨씬 더 지역적이며, 우리의 목적에 더 직접적으로 유용할 수 있습니다.\n\n침몰된 시설은 일종의 관측소로 보이며, 수천 개의 감시 초소와 연결되어 있습니다. 대부분은 오프라인 상태이며, 일부는 극지방에서 흔히 볼 수 있었던 폐허가 된 정착지와 동일한 위치에 있습니다. 이는 원시 문명의 발전을 연구하기 위한 대규모 실험인 것으로 보이며, 이 곳은 연구의 중심이었을 것입니다. 우리가 알아낸 바에 따르면, 이 계층이 항상 얼어붙어 있지는 않았으며, 환경 변화 가설이 좀 더 가능성이 있습니다.\n\n이 관측소는 상태가 좋지 않음에도 불구하고, 여전히 손상되지 않은 대규모 컴퓨팅 하드웨어 어레이를 보유하고 있으며, 약간의 작업을 거쳐 우리의 목적에 맞게 재사용할 수 있습니다."
 giga_birch.7003.a:0 "적어도 정착지들에 대한 설명은 되는군."
 giga_birch.7004:0 "예측할 수 없는 결과"
 giga_birch.7004.desc:0 "이것이 또 다른 지휘 센터는 아닐지 모르지만, 관측소는 귀중한 자산일 수 있습니다. 이곳의 컴퓨팅 성능은 매우 뛰어나며, 저장 매체에 남아있는 고대 데이터는 우리에게 많은 것을 알려줄 것입니다.\n\n걱정스러운 것은, 우리 또한 이 장소의 건설자들에 의해 오래 전에 시작된 실험의 실험 대상이었는지에 대한 의문을 제기한다는 것입니다. 그러한 가능성을 배제할 수는 없지만 현재로서는 확인할 수도 없습니다.\n\n우리는 아직 주요 목표에 도달하지 못했을 수도 있지만, 이 새로운 정보를 바탕으로 이후의 탐색이 더 쉬워질 것입니다."
 giga_birch.7004.a:0 "약간의 좌절과 희망."
 giga_birch.7005:0 "관측소 접근 최종국면 도달"
 giga_birch.7005.desc:0 "고대 관측소의 복원작업이 돌이킬 수 없는 지점까지 도달했습니다. 이후에 계획을 변경하게 된다면, 많은 섬세한 기기들이 아직 우리의 이해 범위를 벗어나기 때문에 관측소를 수리할 수 있는 가능성을 망치게 될 것입니다."
 giga_birch.7005.desc.science:0 "$giga_birch.7005.desc$\n\n완공되면, 이 시설은 우리의 [root.owner.GetResearchers]의 연구에 도움을 줄 것입니다."
 giga_birch.7005.desc.unity:0 "$giga_birch.7005.desc$\n\n일단 완성되면, 시설은 사회 연구를 지원할 줄 것입니다."
 giga_birch.7005.desc.trade:0 "$giga_birch.7005.desc$\n\n일단 완성되면, 시설의 컴퓨팅 능력은 시장 예측의 정확성을 높여줄 것입니다."
 giga_birch.7005.a:0 "그것은 중요한 자산이 될 것입니다."
 giga_birch.7006:0 "관측소 복구 완료"
 giga_birch.7006.desc:0 "침몰한 관측소의 복구 작업은 막바지에 이르렀고, 시설은 우리의 기술이 허용하는 완전한 운영 능력을 회복했습니다.\n\n이 시설의 풍부한 처리 능력은 이미 활용되고 있으며, 우리는 이 시설이 앞으로 수십 년 동안 우리 제국에서 중요한 요소로 남을 것으로 기대합니다."
 giga_birch.7006.a:0 "훌륭하군."
 giga_birch.7006.a.desc:0 "[situation.target.GetName]의 £district£ §Y$district_giga_origin_birch_lab_plural$§!가 추가적인 자원을 생산합니다."
 giga_birch.8001:0 "제8차 탐험대"
 giga_birch.8001.desc:0 "일곱 번째 탐험에서 다른 제어 센터를 찾지 못한 것은 다양한 측면에서 구조물의 네트워크 맵에 대한 더 많은 이해로 이어졌습니다. 첫째로 관측소 현장에서의 추가적인 측정치로 후보지의 목록을 줄일 수 있었고, 둘째로 관측소 자체가 모델을 개선하는 데 필요한 컴퓨팅 성능을 제공했습니다.\n\n여덟 번째 탐험은 탐험대장 [giga_birch_expedition_leader.GetName](이)가 이끌 것이며, 가장 유력한 후보지로 이동할 예정입니다."
 giga_birch.8001.a:0 "목표가 눈에 보이는군."
 giga_birch.8002:0 "거대한 문제"
 giga_birch.8002.desc:0 "탐험대장 [giga_birch_expedition_leader.GetName](은)는 탐험대가 목적지에 도착했다고 보고했습니다. 현재 매우 거센 폭풍이 탐험대의 위치로 다가오고 있지만, 그들은 우리가 찾는 지휘 센터일 가능성이 있는 인공 구조물을 육안으로 확인했습니다.\n\n이 구조물은 첫 번째와 마찬가지로 첨탑에 붙어있지만 형태는 상당히 다릅니다. 전체적으로 훨씬 크고 단순합니다. 폭풍이 지나가면 제대로 된 탐사가 시작될 것입니다."
 giga_birch.8002.a:0 "기대되는군."
 giga_birch.8003:0 "공간적 난제"
 giga_birch.8003.desc:0 "[GigaGetExplorerPlural]들은 특이한 것을 발견했습니다. 구조물의 레이아웃은 4차원 설계의 특징을 가지고 있으며, 외부 크기에서는 상상하기 힘들 정도로 내부 공간을 더 넓게 구성하기 위해 인공적인 3차원 매니폴드를 사용하고 있습니다.\n\n그러나 매니폴드를 유지하는 시스템이 오작동하여 내부로 이어지는 문턱이 붕괴되어 복도는 완벽하게 매끄러운 벽에 의해 갑자기 막힌 것으로 보입니다.\n\n4차원 구조에 대한 우리의 지식을 바탕으로, 손상된 시스템을 수리하고 내부 공간에 접근하는 것은 그리 어렵지 않을 것입니다."
 giga_birch.8003.desc.wait:0 "[GigaGetExplorerPlural](은)는 당혹스러워하고 있습니다. 탐사한 구조물의 배치는 전혀 말이 되지 않습니다.\n\n복도는 아무런 맥락 없이 갑자기 완전히 평평한 표면으로 끝납니다. 전력 도관은 전기가 흐름에도 폐쇄 회로를 형성할 수 없는 방식으로 구성되어 있습니다. 우리가 식별할 수 있는 몇 가지 표식들은 존재가 의심스러운 은신처와 막다른 골목을 가리킵니다.\n\n탐험대장 [giga_birch_expedition_leader.GetName](은)는 우리가 볼 수 있는 것 이상의 무언가가 일어나고 있을 수 있으며, 이 광기의 뒤에 숨겨진 단서를 계속해서 찾아야 한다고 말했습니다."
 giga_birch.8003.a:0 "아주 멋진 디자인이로군."
 giga_birch.8003.b:0 "침착함을 잃지말아야합니다. 이게 마지막 남은 과제일지도 모릅니다."
 giga_birch.8003.b.desc:0 "£physics_research£ §Y$giga_tech_tetradimensional_engineering$§! 기술을 연구하는 것은 조사를 계속할 실마리가 될 것입니다."
 giga_birch_origin_expedition_8:0 "4차원 구조물 접근"
 giga_birch_origin_expedition_8_DESC:0 "4차원의 특성을 가진 제어 센터를 수리하기 위해서는 일반적이지 않은 방법들이 필요할 것입니다. 그러나 이는 우리의 능력 범위 안에 있을 것입니다."
 giga_birch.8004:0 "새로운 시선"
 giga_birch.8004.desc:0 "차원 물리학에 대한 우리의 이해가 깊어짐에 따라 제어 허브와 그 독특한 디자인 뒤에 숨겨진 수수께끼는 나날이 사라져갑니다. 이제 [root.GetResearchers]에 의한 간단한 검사만으로도 그 구조가 4차원이라는 것이 분명해졌으며, 돌이켜보면 예상할 수 있는 설계입니다.\n\n이젠 접근에 그리 많은 시간이 필요치 않을겁니다."
 giga_birch.8004.a:0 "한순간에, 모든게 설명이 되는군."
 giga_birch.8005:0 "진정한 깊음"
 giga_birch.8005.desc:0 "탐험대장 [giga_birch_expedition_leader.GetName](은)는 탐험대가 조사하고 있는 구조물의 수리가 완료되었다고 보고했습니다. 분리된 3차원 매니폴드를 유지하는 시스템이 복원되어, 이제 내부 공간으로 접근할 수 있습니다.\n\n내부에서 [GigaGetExplorerPlural](은)는 우리가 찾던 주 지휘 허브를 정확히 찾아내었습니다. 이제부터 구조물의 수리 시스템을 다시 시작하고 복구 과정을 시작할 수 있습니다.\n\n그러나 그 전에 우리는 구조물의 심장을 되살려야 합니다.\n\n지휘 허브는 에너지와 원자재의 흐름이 구조물을 현재 상태 그대로 겨우 유지할 뿐이라는 것을 보여주었기 때문에 우리는 더 깊숙히 내려가야 합니다. 우리는 초대질량 블랙홀 자체로 이동하여 사건의 지평선 위에 걸려 있는 거대한 중력 천공과 수집기들를 수리해야 합니다."
 giga_birch.8005.a:0 "기능하는 수집기를 찾아야만 합니다!"
 giga_birch.8006:0 "직간접 제어 가정"
 giga_birch.8006.desc:0 "거의 다 왔습니다. 가장 중요한 부분은 아직 앞에 있지만, 제어 허브가 복원되어 이제 구조물의 시스템을 훨씬 높은 수준으로 통제할 수 있습니다. 네트워크 전체의 전력 수준이 매우 낮음에도 불구하고, 우리는 에너지와 자재를 덜 중요한 지역에서 우리의 노드로 재할당하여 자동화 시스템을 더 많이 되살릴 수 있습니다.\n\n생산성은 상당히 향상될 것이며, 구조물이 완전히 복구되면 그 효과는 훨씬 더 클 것으로 예상됩니다."
 giga_birch.8006.a:0 "무엇이 가능해질지 상상해보십시오..."
 giga_birch.9001:0 "제9차 탐험대"
 giga_birch.9001.desc:0 "여덟 번째 탐험에서 제어 허브가 다시 활성화된 이후로, [GetResearchers]들은 구조물의 네트워크 계획을 철저히 조사하여 노력을 집중해야할 추출 배열을 찾고 있습니다.\n\n거의 모든 배열이 완전히 고장났거나 비활성화 하기에는 로컬 시스템에 필수적이어서 수리가 까다롭습니다. 이러한 상태라면, 구조물의 전체적인 붕괴까지 몇 세기밖에 남지 않았을 것입니다...무서운 상황이지만, 그렇기 때문에 우리의 임무는 더욱 중요합니다.\n\n탐사대장 [giga_birch_expedition_leader.GetName](은)는 복원에 가장 적합한 중력 천공과 수집 시스템을 찾고 수리하는 작업을 지휘할 것입니다."
 giga_birch.9001.a:0 "퍼즐의 마지막 조각이로군."
 giga_birch.9002:0 "망각의 가장자리에서 비틀거리다"
 giga_birch.9002.desc:0 "[GigaGetExplorerPlural]들이 하강을 완료하고 구조물의 가장 낮은 계층으로 들어섰을 때, 그들은 경외심에 휩싸였습니다.\n\n그들 앞에는 끝없는 수집기들의 숲이 매달려 있습니다. 아래로는 먹색 심연이 무한히 펼쳐져 있습니다.\n\n이곳은 차갑고, 귀가 먹먹해질듯한 침묵이 구조물의 심장에 갇힌 신 위에 자리잡고 있습니다.\n\n빠르게 회전하는 사건의 지평선과 탐험대 사이는 고작 100km밖에 떨어져 있는데, 이 수치는 블랙홀의 거대함에 비해면 터무니없이 짧습니다. 이와 같은 것을 만드는 데 필요한 공학의 규모와 정밀성은 정말이지 놀랍고 우리는 계승자로서 겸손함을 느낍니다."
 giga_birch.9002.a:0 "놀랍군."
 giga_birch.9003:0 "휴면중인 중력 천공"
 giga_birch.9003.desc:0 "탐험대장 [giga_birch_expedition_leader.GetName](은)는 [GigaGetExplorerPlural]들이 마침내 목적지에 도착했다고 보고했습니다.\n\n추출 배열은 다른 수많은 배열 중 하나일 뿐이며, 우리의 물질 감압기 설계와 유사한 거대한 중력 천공입니다. 다른 배열들은 눈에 띄게 손상되었거나 단순히 작동하지 않는 반면, 이 배열은 적어도 최소한의 기능을 하는 것으로 보입니다.\n\n관련 기술이 보이는만큼 밀접하게 연관되어 있다면, 복원 과정은 비교적 간단할 것입니다."
 giga_birch.9003.a:0 "즉시 수리를 시작하라."
 giga_birch.9004:0 "추출 배열 접근 최종국면 도달"
 giga_birch.9004.desc:0 "추출 배열의 복원작업이 돌이킬 수 없는 지점까지 도달했습니다. 이후에 계획을 변경하게 된다면, 프로젝트에 불필요한 중단이 발생하고 다시 시작해야 할 것입니다."
 giga_birch.9004.desc.energy:0 "$giga_birch.9004.desc$\n\n일단 완성되면, 입자 수집 배열은 £energy£ §Y$energy$§! 생산에 전문화될 것입니다."
 giga_birch.9004.desc.minerals:0 "$giga_birch.9004.desc$\n\n일단 완성되면, 물질 천공은 £minerals£ §Y$minerals$§! 생산에 전문화될 것입니다."
 giga_birch.9004.desc.dark_matter:0 "$giga_birch.9004.desc$\n\n일단 완성되면, 물질 천공은 사용 가능한 £sr_dark_matter£ §Y$sr_dark_matter$§!의 추출에 전문화될 것입니다."
 giga_birch.9004.a:0 "한 걸음 가까이."
 giga_birch.9005:0 "추출 배열 복구 완료"
 giga_birch.9005.desc:0 "구조물 코어의 휴면중인 중력 천공 및 수집기 배열의 수리가 완료되었습니다. 이 새로운 물질과 에너지 흐름으로 우리는 자동 수리 시스템을 시동할 수 있으며, 이는 최종적으로 구조물의 완전한 작동 상태로 이어질 것입니다.\n\n이제 남은 일은 예비 수리가 완료될 때까지 기다렸다가 작업을 완료하는 데 필요한 고급 자원을 공급하는 것 뿐입니다."
 giga_birch.9005.a:0 "정말 다 왔군."
 giga_birch.9005.a.desc:0 "우리의 진보는 가속할 것이다...\n "
 giga_birch.10000:0 "최종장"
 giga_birch.10000.desc:0 "몇 년 전, 이젠 마지막인 아홉 번째 탐험대는 우리가 고향이라고 부르는 거대한 구조물의 중심부에 있는 추출 배열을 성공적으로 수리했습니다. 그 이후로, 우리는 공정의 마지막 단계에 대비하여 운송 및 유통 인프라에 초점을 맞추도록 자체 수리 시스템을 신중하게 지시해 왔습니다.\n\n구조물을 완전히 되살리려면 상당한 양의 고급 자원을 공급해야 합니다."
 giga_birch.10000.a:0 "때가 되었다."
 giga_birch.10000.a.desc:0 "§H결정 잠금해제:§! $decision_giga_origin_birch_restore$"
 giga_birch.10001:0 "새로운 시대의 밝아오는 새벽"
 giga_birch.10001.desc:0 "끝났습니다! 우리가 고향 계층의 하늘 너머에 있는 우주에 대해 처음 알게 되었을 때, [this.GetName](이)가 자연적인 것이 아니라는 것을 믿기 어려웠습니다. 우리는 탐험을 떠나 진정한 본질을 알아내려고 했지만... 이렇게 방치되어 붕괴에 가까워져 있었을 것이라고는 전혀 예상하지 못했습니다.\n\n오늘날, 우리는 우리의 세계의 부활을 목도합니다. 수많은 기계들이 조화를 이루어 전체를 구성하며, 너무나 방대하고 경이로운 공학의 교향곡을 연주합니다.\n\n우리의 원래의 고향 인슐라는 한 때 우리 문명의 요람이었지만, 이제는 역사적 보존지로 바뀌었습니다. 우리는 언제나 우리의 기원을 기억하기 위해 그것을 보존할 것입니다. 구조물은 다시 살아났습니다. 우리의 운명을 형성하기 위해 그것을 어떻게 사용할 것인가요?"
 giga_birch.10001.a:0 "광대한 확장, 무한한 가능성."
 giga_birch.10001.a.desc:0 "기존의 지구와 특성들이 새롭게 변화합니다.\n "
 giga_birch.11010:0 "고향 계층에서의 발견"
 giga_birch.11010.desc:0 "[GigaGetExplorerPlural](이)가 고향 계층을 지도화하던 도중 몇가지 작은 발견들이 있었습니다."
 giga_birch.11010.a:0 "훌륭하군."
 giga_birch.11020:0 "새로운 데이터 발견"
 giga_birch.11020.desc.exterminate:0 "[GetArchaeologistPlural]들이 옛 [giga_birch_expedition_2_country.GetAdj] 유적지의 잔해를 조사한 결과 탐사 데이터가 발견되었습니다.\n\n우리의 자체 로그만큼 상세하거나 포괄적이지는 않지만, 이 데이터는 [GigaGetExplorerPlural]에게 유용할 것입니다."
 giga_birch.11020.desc.trade:0 "[giga_birch_expedition_2_country.GetAdj]의 무역 파트너들이 연락을 취해 우리의 첫 접촉 이전의 자체 탐사 기록을 제공했습니다.\n\n우리의 자체 로그만큼 상세하거나 포괄적이지는 않지만, 이 데이터는 [GigaGetExplorerPlural]에게 유용할 것입니다."
 giga_birch.11020.desc.integrate:0 "[GetResearchers]는 [giga_birch_expedition_2_country.GetAdj] 수도에 있는 기록 보관소를 유지하고 있으며, 그곳에서 첫 접촉 이전의 탐사 활동에 대한 기록의 재발견을 보고하였습니다.\n\n우리의 자체 로그만큼 상세하거나 포괄적이지는 않지만, 이 데이터는 [GigaGetExplorerPlural]에게 유용할 것입니다."
 giga_birch.11020.a:0 "환상적이군."
 giga_birch.11030:0 "기계 계층에서의 발견"
 giga_birch.11030.desc:0 "[GigaGetExplorerPlural](이)가 기계 계층을 지도화하던 도중 몇가지 작은 발견들이 있었습니다."
 giga_birch.11030.a:0 "훌륭하군."
 giga_birch.11040:0 "제조 단지 과부하"
 giga_birch.11040.desc:0 "복구된 고대 제조 단지의 근로자들은 일부 기계들이 독자적으로 우리의 생산 일정에 적응해 미리 할당량을 달성하고 있다고 보고하고 있습니다."
 giga_birch.11040.a:0 "훌륭하군."
 giga_birch.11060:0 "극지방 계층에서의 발견"
 giga_birch.11060.desc:0 "[GigaGetExplorerPlural](이)가 극지방 계층을 지도화하던 도중 몇가지 작은 발견들이 있었습니다."
 giga_birch.11060.a:0 "훌륭하군."
 giga_birch.11070:0 "관측 통찰"
 giga_birch.11070.desc:0 "극지방에 있는 복원된 관측소의 [GetResearchers]은 새로운 데이터의 유입을 보고했습니다. 구조물의 정보 네트워크에서 발생한 접합 재지정으로 우리는 이전에 알려지지 않았던 일련의 처리 노드 집합에 연결된 것 같습니다."
 giga_birch.11070.a:0 "훌륭하군."
