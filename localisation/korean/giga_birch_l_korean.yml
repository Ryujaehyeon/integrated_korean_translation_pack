 zone_giga_birch_orykta_insula_minerals_flavour_desc:0 "이 인술라는 아래 사건 지평선과 고용량 연결을 갖추고 있으며, 거대한 중력 시추기들이 $pc_core_black_hole$에서 물질을 추출합니다."
 zone_giga_birch_orykta_insula_minerals_refinery_flavour:0 "심층 우물 산업 구역"
 zone_giga_birch_orykta_insula_minerals_refinery_flavour_desc:0 "이 인술라는 아래 사건 지평선과 직접 연결되어 있으며, 거대 구조물들이 $pc_core_black_hole$에서 물질을 추출하여 더 무거운 원소로 융합합니다."
 zone_giga_birch_orykta_insula_minerals_dark_matter_flavour:0 "광대역 물질 추출기"
