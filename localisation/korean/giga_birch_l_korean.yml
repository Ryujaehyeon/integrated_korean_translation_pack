 concept_giga_birch_manager_replacement:0 "버치 월드 인술라 관리자 교체"
 concept_giga_birch_manager_replacement_desc:0 "인술라 관리자 교체는 덧셈 방식으로 효과가 결합됩니다."
 zone_giga_birch_structure_ops_extra:0 "구조물 운영 확장"
 zone_giga_birch_structure_ops_extra_desc:0 "버치 시스템 개발을 위해 추가로 할당된 공간."
 zone_giga_birch_structure_ops_aiondia:0 "궁전 복합체"
 zone_giga_birch_structure_ops_aiondia_desc:0 "웅장함. 화려함. 우아함. 에테르나이트 수도의 육각형 구조 중앙에 자리한 거대한 궁전 복합체가 구현한 개념들입니다. 표면상으로는 완벽해 보이지만, 정해진 길을 벗어나 돌아다닌 방문자들은 구조물 유지에 필요한 재료를 조달하려는 자동화 시스템들이 버둥거리는 모습과, 겉보기 완벽함의 외관을 유지하기 위해 속이 비어 벌집처럼 뚫린 덜 눈에 띄는 벽들을 발견하게 될 것입니다."
 district_giga_birch_orykta:0 "오리크타 인슐라"
 district_giga_birch_orykta_plural:0 "오리크타 인슐라이"
 district_giga_birch_orykta_subtitle:0 "추출 어레이"
 district_giga_birch_orykta_desc:0 "이 인슐라는 사건의 지평선 아래에 직접 연결되어 있으며, $pc_core_black_hole$에서 물질과 에너지를 추출하는 거대 구조물이 위치해 있습니다."
