 giga_situation_birch_expedition_7_approach_science:0 "분석 매트릭스"
 giga_situation_birch_expedition_7_approach_science_tooltip:0 "수리가 완료되면, 관측소는 $giga_r_research$ §Y연구§! 분야의 지원에 집중할 것입니다.\n"
 giga_situation_birch_expedition_7_approach_science_desc:0 "관측소의 엄청난 컴퓨팅 능력은 [owner.GetResearchers]에 가장 잘 적용될 것입니다."
 giga_situation_birch_expedition_7_approach_unity:0 "문화 아카이브"
 giga_situation_birch_expedition_7_approach_unity_tooltip:0 "수리가 완료되면, 관측소는 £unity£ §Y문화 유산§!의 보관 및 보존에 집중할 것입니다.\n"
 giga_situation_birch_expedition_7_approach_unity_desc:0 "그 관측소는 이미 역사를 기록하고 보존하기 위해 지어졌습니다. 우리는 우리의 것을 보존하기 위해 그것을 사용해야 합니다."
 giga_situation_birch_expedition_7_approach_trade:0 "금융 예측 엔진"
 giga_situation_birch_expedition_7_approach_trade_tooltip:0 "수리가 완료되면, 관측소는 £mod_trade_value_add£ §Y금융 시장§!의 변동을 예측하는 것에 집중할 것입니다.\n"
 giga_situation_birch_expedition_7_approach_trade_desc:0 "관측소의 가공되지 않은 처리 능력은 시장에 대한 보다 정확한 예측을 만드는 데 사용될 수 있으며, 우리가 제국을 번영으로 더 잘 이끌 수 있게 해줍니다."
 giga_situation_birch_expedition_9:0 "중력 천공 복구"
 giga_situation_birch_expedition_9_type:0 "$giga_situation_birch_expedition_9$"
 giga_situation_birch_expedition_9_desc:0 "이 휴면중인 추출 배열이 구조물을 되살리는 열쇠가 될 수 있습니다. 또한 원하는 출력으로 조정할 수 있는 기회를 제공합니다."
 giga_situation_birch_expedition_9_outcome:0 "[target.GetName](이)가 §Y접근 방식§!에 따라 서로 다른 직업과 최대 지구를 제공하는 행성 특징을 얻습니다."
