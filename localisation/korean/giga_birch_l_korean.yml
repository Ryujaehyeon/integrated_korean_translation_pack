 job_giga_birch_physma_manager_farm_plural:0 "농업의 피스마 이사들"
 job_giga_birch_physma_manager_farm_desc:0 "행정관들은 거대한 농업 프로젝트를 관리하며, 이들 공무원과 그 하인들은 헤아릴 수 없는 규모의 풍작을 보장합니다."
 job_giga_birch_physma_manager_farm_effect_desc:0 "£job_giga_birch_physma_manager£ $job_giga_birch_physma_manager_farm_plural$는 추가로 대량의 £food£ §Y$food$§!를 생산하며, £mod_pop_bonus_workforce_mult£ §Y$farmer_jobs_bonus_workforce_mult$§!를 더욱 증가시킵니다."
 job_giga_birch_physma_manager_farm_laboratory:0 "기하학적 생명체 관리자"
 job_giga_birch_physma_manager_farm_laboratory_plural:0 "물리학적 생명체 관리자"
 job_giga_birch_physma_manager_farm_laboratory_desc:0 "고급 환경 프로젝트의 행정관으로서, 이 전문 연구원들은 전체 자연 생태계만큼 큰 실험을 통해 행성 생물권에 대한 우리의 이해를 심화시킵니다."
