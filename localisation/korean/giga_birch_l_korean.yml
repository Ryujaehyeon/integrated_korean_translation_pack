 job_giga_birch_origin_trader_desc:0 "국내 무역 파트너들과 일하는 기업가들입니다."
 job_giga_birch_origin_trader_effect_food_desc:0 "£job_giga_birch_origin_trader£ $job_giga_birch_origin_trader_plural$은 £food£ §Y$food$§!을 £mod_trade_value_add£ §Y$TRADE_VALUE$§!로 변환합니다."
