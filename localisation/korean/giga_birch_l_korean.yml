 desc_district_birch_ktisma:0 "$district_giga_birch_ktisma_plural$를 $name_birch$에 건설할 수 있습니다."
 allow_district_birch_physma:0 "§H구역 잠금 해제:§! $name_birch$ $district_giga_birch_physma$"
