 giga_birch_origin_random_4_supertensiles:0 "$giga_birch_origin_random_4$"
 giga_birch_origin_random_4_supertensiles_desc:0 "$giga_birch_origin_random_4_desc$"
 giga_birch_origin_random_4_engineering:0 "$giga_birch_origin_random_4$"
 giga_birch_origin_random_4_engineering_desc:0 "$giga_birch_origin_random_4_desc$"
 giga_birch_origin_random_7:0 "관측소 통찰"
 giga_birch_origin_random_7_desc:0 "극지방에 있는 고대 관측소는 우리에게 귀중한 정보를 제공하고 있습니다."
 giga_birch_origin_random_7_unity:0 "$giga_birch_origin_random_7$"
 giga_birch_origin_random_7_unity_desc:0 "$giga_birch_origin_random_7_desc$"
 giga_birch_origin_random_7_science:0 "$giga_birch_origin_random_7$"
 giga_birch_origin_random_7_science_desc:0 "$giga_birch_origin_random_7_desc$"
 giga_birch_origin_random_7_trade:0 "$giga_birch_origin_random_7$"
 giga_birch_origin_random_7_trade_desc:0 "$giga_birch_origin_random_7_desc$"
 stage_9:0 "스테이지 IX"
 stage_10:0 "스테이지 X"
 giga_situation_birch_origin:0 "우리들의 오래된 집 탐험"
 giga_situation_birch_origin_type:0 "$giga_situation_birch_origin$"
 giga_situation_birch_origin_desc:0 "이제 우리의 홈 월드가 관리자가 없는 것처럼 보이는 거대한 범위의 인공적인 구조라는 것이 우리에게 분명합니다. 우리는 미래의 환경 붕괴 가능성을 막기 위해 그것에 대해 더 배워야 합니다."
 giga_situation_birch_origin_monthly_change_tooltip:0 "이 상황의 진행도는 §Y접근 방식§!에 따라 달라집니다."
 giga_situation_birch_origin_expedition_progress:0 "탐사가 현재 진행중입니다."
 giga_situation_birch_origin_final_push_progress:0 "자가 수리 시작됨"
 giga_situation_birch_origin_motivated_progress:0 "$giga_birch_origin_motivated_explorers$"
 giga_situation_birch_origin_stage_effects:0 "탐험가들이 새로운 탐사에 착수합니다."
 giga_situation_birch_origin_outcome:0 "만약 모든 것이 문제 없이 진행된다면, [target.GetName]의 자가 수리 시스템을 고치는 방법을 알아내어 무너져가는 우리의 고향을 되살릴 수 있을 것입니다."
 giga_situation_birch_origin_approach_regular:0 "일반적인 예산"
 giga_situation_birch_origin_approach_regular_desc:0 "우리는 구조의 진정한 본질을 발견하는 것에 전념하고 있지만, 또한 구조 너머의 은하에도 주의를 기울여야 합니다."
 giga_situation_birch_origin_approach_regular_effect:0 "우리 탐험가들은 임무를 수행하는 동안 때때로 추가적인 발견을 할 수 있습니다.\n "
 giga_situation_birch_origin_approach_extra:0 "추가적인 예산"
 giga_situation_birch_origin_approach_extra_desc:0 "우주에서의 노력을 희생하더라도 추가적인 자원과 인력이 탐험가들에게 제공될 것입니다."
 giga_situation_birch_origin_approach_extra_effect:0 "탐험가들은 임무를 수행하는 동안 추가적인 발견을 할 가능성이 훨씬 더 높아질 것입니다.\n "
 giga_situation_birch_origin_approach_extra_progress:0 "$giga_situation_birch_origin_approach_extra$"
 giga_situation_birch_origin_approach_frugal:0 "제한된 예산"
 giga_situation_birch_origin_approach_frugal_desc:0 "만약 필요하다면, 우리는 다른 문제에 집중하기 위해 탐험 자금을 줄일 수 있지만, 충분한 장비가 없다면 탐험가들은 많은 지역을 커버할 수 없을 것입니다."
 giga_situation_birch_origin_approach_frugal_effect:0 "탐험가들은 추가적인 발견을 하기에는 너무 가늘게 늘어나 있을 것입니다.\n "
 giga_situation_birch_origin_approach_frugal_progress:0 "$giga_situation_birch_origin_approach_frugal$"
 giga_situation_birch_expedition_3:0 "첨탑 재기동"
 giga_situation_birch_expedition_3_type:0 "$giga_situation_birch_expedition_3$"
 giga_situation_birch_expedition_3_desc:0 "Our [owner.GigaGetExplorerPlural]가 손상되지 않은 비가동 상태의 첨탑을 찾아내었습니다. 아래 계층을 더 탐사하려면 충분한 에너지를 공급하여 재기동할 필요가 있습니다."
 giga_situation_birch_expedition_3_outcome:0 "탐험은 계속되어야한다."
 giga_situation_birch_expedition_3_monthly_change_tooltip:0 "이 상황의 진행도는 §Y접근 방식§!에 따라 달라집니다."
 giga_situation_birch_expedition_3_stage:0 "건축 비용"
 giga_situation_birch_expedition_3_stage_desc:0 "진행도는 에너지 크레딧의 투자 정도에 달려있습니다. $giga_situation_birch_expedition_3_approach_supercharge$은 덜 효율적이고 매월 1000의 진행도를 제공합니다."
 giga_situation_birch_expedition_3_approach_halt:0 "전력 없음"
 giga_situation_birch_expedition_3_approach_halt_tooltip:0 "진행도가 시간에 따라 낮아질 것입니다."
 giga_situation_birch_expedition_3_approach_halt_desc:0 "지속적인 전력 공급이 없다면, 첨탑은 비가동 상태를 유지할 것입니다."
 giga_situation_birch_expedition_3_approach_halt_progress:0 "전력 없음이 적용되었습니다."
 giga_situation_birch_expedition_3_approach_power:0 "표준 전력"
 giga_situation_birch_expedition_3_approach_power_desc:0 "꾸준하게 전력을 공급하면 안전하고 효율적으로 첨탑을 재기동할 수 있습니다."
 giga_situation_birch_expedition_3_approach_power_progress:0 "표준 전력이 적용되었습니다."
 giga_situation_birch_expedition_3_approach_supercharge:0 "전력 과공급"
 giga_situation_birch_expedition_3_approach_supercharge_desc:0 "훨씬 강력한 전력원을 첨탑에 공급함으로써, 비록 효율이 낮지만 목표에 더 빨리 도달할 수 있습니다."
 giga_situation_birch_expedition_3_approach_supercharge_progress:0 "첨탑이 과충전되고 있습니다."
 giga_situation_birch_expedition_4:0 "산업의 불길에 불을 지피다"
 giga_situation_birch_expedition_4_type:0 "$giga_situation_birch_expedition_4$"
 giga_situation_birch_expedition_4_desc:0 "기계 레이어에서 휴면 상태인 제조업체를 복구하려면 상당한 작업이 필요하지만, 결과는 분명히 노력할 가치가 있습니다."
 giga_situation_birch_expedition_4_outcome:0 "[target.GetName]의 §Y$d_giga_birch_expedition_4$§!는 §Y접근 방식§!에 따라 추가적인 직업을 갖게 될 것입니다."
 giga_situation_birch_expedition_4_outcome_alloys:0 "[target.GetName]의 §Y$d_giga_birch_expedition_4$§!는 £alloys£ §Y$alloys$§! 생산을 포함하는 직업을 추가적으로 갖게 될 것입니다."
 giga_situation_birch_expedition_4_outcome_goods:0 "[target.GetName]의 §Y$d_giga_birch_expedition_4$§!는 £consumer_goods£ §Y$consumer_goods$§! 생산을 포함하는 직업을 추가적으로 갖게 될 것입니다."
 giga_situation_birch_expedition_4_outcome_supertensiles:0 "[target.GetName]의 §Y$d_giga_birch_expedition_4$§!는 £giga_sr_amb_megaconstruction£ §Y$giga_sr_amb_megaconstruction$§! 생산을 포함하는 직업을 추가적으로 갖게 될 것입니다."
 giga_situation_birch_expedition_4_monthly_change_tooltip:0 "이 상황의 진행도는 §Y접근 방식§!에 따라 달라집니다."
 giga_situation_birch_expedition_4_progress:0 "접근 방식 선택됨"
 giga_situation_birch_expedition_4_stage_1:0 "유연한 공사"
 giga_situation_birch_expedition_4_stage_1_desc:0 "이 프로젝트는 아직 초기 단계에 있으며 비용을 지불하면 심각한 중단 없이 계획을 변경할 수 있습니다."
 giga_situation_birch_expedition_4_stage_2:0 "최종 공사"
 giga_situation_birch_expedition_4_stage_2_desc:0 "이 시점부터 시설은 심각한 손상 없이는 다시 재설계할 수 없습니다."
 giga_situation_birch_expedition_4_approach_choose:0 "접근 방식 선택"
 giga_situation_birch_expedition_4_approach_choose_tooltip:0 "수리를 시작하려면 다른 접근 방식을 선택합니다. 이 상황이 두 번째 단계에 도달하면 더 이상 다른 접근 방식을 선택할 수 없습니다."
 giga_situation_birch_expedition_4_approach_choose_desc:0 "시작할 준비는 됐지만, 방향은 정해지지 않았습니다."
 giga_situation_birch_expedition_4_approach_alloys:0 "합금 주조소"
 giga_situation_birch_expedition_4_approach_alloys_tooltip:0 "수리가 완료되면, 공장은 £alloys£ §Y$alloys$§!의 생산에 집중할 것입니다.\n "
 giga_situation_birch_expedition_4_approach_alloys_desc:0 "고품질의 합금을 생산하기 위해 시설을 개조하는 것은 함선 생산 능력을 향상시킬 것입니다."
 giga_situation_birch_expedition_4_approach_goods:0 "소비재 공장"
 giga_situation_birch_expedition_4_approach_goods_tooltip:0 "수리가 완료되면, 공장은 £consumer_goods£ §Y$consumer_goods$§!의 생산에 집중할 것입니다.\n "
 giga_situation_birch_expedition_4_approach_goods_desc:0 "이 시설을 소비재 생산으로 전환하면 다른 공장들의 부담을 덜고 생활 환경을 개선할 수 있을 것입니다."
 giga_situation_birch_expedition_4_approach_supertensiles:0 "분자 주조소"
 giga_situation_birch_expedition_4_approach_supertensiles_tooltip:0 "수리가 완료되면, 공장은 £giga_sr_amb_megaconstruction£ §Y$giga_sr_amb_megaconstruction$§!의 생산에 집중할 것입니다.\n "
 giga_situation_birch_expedition_4_approach_supertensiles_desc:0 "초인장 소재를 생산하기 위해 그 시설을 사용하는 것은 우리에게 우주 건설 분야에서 확고한 우위를 가져다 줄 것입니다."
 giga_situation_birch_expedition_7:0 "침몰된 관측소 재설계"
 giga_situation_birch_expedition_7_type:0 "$giga_situation_birch_expedition_7$"
 giga_situation_birch_expedition_7_desc:0 "극지방의 침몰된 관측소를 수리하는 것은 우리의 계산 능력을 크게 향상시킬 것이지만, 그것을 정상적으로 작동시키기 위해서는 많은 노력이 필요할 것입니다."
 giga_situation_birch_expedition_7_outcome:0 "[target.GetName]의 §Y$d_giga_birch_expedition_7$§!는 강력한 직업을 갖게 될 것입니다. 또한 £district£ §Y$district_giga_origin_birch_lab_plural$§!는 §Y접근 방식§!에 따라 추가적인 자원 생산을 제공할 것입니다."
