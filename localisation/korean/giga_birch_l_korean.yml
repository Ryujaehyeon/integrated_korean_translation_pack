 trait_pc_origin_dummy_birch_preference:0 "더미 버치 월드 선호 (이것이 보이면 안됩니다.)"
 trait_pc_origin_dummy_birch_preference_desc:0 "$trait_pc_birch_preference_desc$"
 mod_pc_giga_edge_of_eternity_habitability:0 "$pc_giga_edge_of_eternity$ 적합성"
 trait_pc_giga_edge_of_eternity_preference:0 "$pc_giga_edge_of_eternity$ 선호"
 trait_pc_giga_edge_of_eternity_preference_desc:0 "$trait_pc_ocean_preference_desc$"
 edict_giga_migrate_birch_world:0 "버치 월드: 대이주"
 edict_giga_migrate_birch_world_desc:0 "버치 월드의 광활한 공간은 무한한 기회를 제공합니다. 우리는 우리의 실업자들이 대신 버치 월드에서 살도록 장려해야합니다."
 edict_giga_migrate_birch_world_tooltip:0 "즉시 모든 실업자와 하인, 가축, 노예 팝들을 버치 월드로 이주시킵니다(건물이 파괴되기 전까지만 기능합니다).\n시행령의 효력이 발생한 이후 3달 마다 각 행성에서 1 팝씩.'"
 giga_mega.402.name:0 "은하중심"
 giga_mega.402.desc:0 "우리 종족이 우주 비행을 성공하고 별 사이로 모험을 시작한 이후로, 은하지리의 한 측면은 천문학자와 물리학자들 모두를 배제해왔습니다. 바로 은하중심입니다. 실제로 지금까지 은하중심은 은하의 나머지 부분으로부터 완전히 분리되어 있었습니다. 그러나 초공간 항로 기술의 새로운 발전으로 인해 우리 과학자들은 희미한 초공간 단절 지점의 위치를 정확히 파악할 수 있다면 초공간 항로 네트워크를 사용하여 은하중심에 접근할 수 있다고 믿게 되었습니다.\n은하중심에 접근하기 위한 특별 프로젝트가 준비되었습니다. 프로젝트가 성공하면 은하중심으로 이어지는 몇 개의 초공간 항로가 생성될 것이므로 우리의 과학자들은 경쟁자들이 그것들을 사용할 수 없도록 한 후에 프로젝트를 시작하도록 권고하고 있습니다. 그러나 초공간 항로가 정확히 어느 지점에 생겨날지는 예측할 수 없습니다."
 giga_mega.402.a:0 "승인한다."
 giga_mega.403.name:0 "은하중심에 초공간 항로가 연결 됨!"
 giga_mega.403.desc:0 "환상적인 소식입니다! 집중적인 연구와 지도 작성 후에, 우리의 과학자들은 중앙 성계로 이어지는 초공간 단절 지점이 발견되었다고 발표했습니다! 우리의 연구 팀은 장거리 타키온 광선을 사용하여 이러한 단절 지점을 원격으로 열어 새로운 초공간 항로를 생성했습니다. 이것은 이제 은하중심에 접근 가능하다는 것을 의미하며(다른 모든 사람 또한.), 우리의 연구원들은 그곳을 탐험하기 위해 과학선을 보낼 것을 강력히 권고하고 있습니다."
 giga_mega.403.a:0 "놀랍군!"
 giga_mega.403.a.tooltip:0 "이제 은하중심에 진입할 수 있습니다."
 giga_dialog.4101.name:0 "초대질량 블랙홀"
 giga_dialog.4101.desc:0 "험난한 여정 끝에 우리의 과학선은 마침내 우리 은하중심에 도달했습니다.\n성계에 진입하고 승무원들은 엄청나게 거대한 §Y비활성 초대질량 블랙홀§!을 보고 깜짝 놀랐습니다.\n\n이 거대한 물체는 수십억 항성 질량 및 수백 천문단위의 지름을 가지고 있습니다. 해양 행성 하나가 궤도를 선회하는 모습도 포착되었으며, 한 과학자는 블랙홀의 엄청난 조력 때문에 틀림없이 거대한 파도를 일으킬 것이라고 추측했습니다.\n현재로서는 단순한 추측에 불과하지만, 과학계에서 가장 급진적인 부류는 이 블랙홀 주위에 거대한 구체를 건설하는 것이 가능할 것이라는 이론을 세웠으며, 내용에 따르면 수천 조의 생명체가 거주할 수 있다고 합니다."
 giga_dialog.4101.a:0 "믿을 수 없군!"
 giga_dialog.4102.name:0 "$name_birch$ 건설 현장 완료!"
 giga_dialog.4102.desc:0 "미래의 $name_birch$를 위한 건설 현장이 이제 은하중심의 중앙 블랙홀 주변에서 완성되었습니다. 이 골격은 거주에 알맞은 중력을 가진 사건의 지평선 바로 위에서 거대한 초합금 구체가 될 실제 구조물 자체를 짓기 위한 기반 시설 역할을 할 것입니다."
 giga_dialog.4102.a:0 "아주 좋아."
 giga_dialog.4103.name:0 "$name_birch$ 적도 뼈대 완료!"
 giga_dialog.4103.desc:0 "$name_birch$ 건설의 첫 번째 단계가 완료되었습니다. 우리는 블랙홀을 감싸는 거대한 고리를 만들었고, 나머지 구조물의 거대한 뼈대를 만들기위한 기반 역할을 할 것입니다."
 giga_dialog.4103.a:0 "놀랍군."
 giga_dialog.4104.name:0 "$name_birch$ 뼈대 완료!"
 giga_dialog.4104.desc:0 "$name_birch$의 뼈대가 완성되었습니다! 이제 거대한 골격이 블랙홀을 둘러싸고 있습니다. 이제 우리는 가장 어려운 부분인 거대한 구체 자체를 건설해야합니다. 길고 힘든 작업 이겠지만, 완성된다면 무한한 생활 공간을 얻을 수 있을 것입니다."
 giga_dialog.4104.a:0 "우리는 가까워지고 있다."
 giga_dialog.4105.name:0 "$name_birch$ 완료!"
 giga_dialog.4105.desc:0 "오늘은 은하 역사에서 가장 믿을 수 없는 날입니다. 실제로 수십 년간의 위험한 작업 끝에 우리는 이제 은하중심에 절대적으로 거대한 $name_birch$ 건설을 완료했습니다. 이 거대한 구체는 현재 불모지이지만, 이것의 거대한 표면적은 사실상 무한한 수의 인구를 수용할 수 있다는 것을 의미합니다. 이 프로젝트가 완료됨에 따라 우리는 거주 공학의 정점에 도달했습니다. 이 거대 구조물은 은하 역사상 지금까지 건설된 다른 모든 거대 구조물을 덮을 것입니다!\n\n§YThe $name_birch$는 인구가 증가함에 따라 자동으로 더 많은 지구 슬롯을 확보 할 것입니다. 한계는 없습니다.§!"
 giga_dialog.4105.a:0 "웅장하군!"
 birch_world_0:0 "$gc_tera$$name_birch$ 건설 현장"
 birch_world_0_DESC:0 "미래의 $name_birch$ 건설 현장으로 초대질량 블랙홀 주변에 거대한 구체를 건설하는 데 필요한 인력과 기반 시설을 수용합니다."
 birch_world_0_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_terastructure$ - $giga_list_category_habitable_mega$\n§Y초대질량 블랙혹§! 주위로 §Y무한한 지구§!를 가진 거주지를 건설합니다.\n§L초대질량 블랙홀 주위로 건설된 거대한 껍데기형 구조물로, 무한한 인구를 수용할 수 있습니다. 이는 궁극의 거주지입니다.§!"
 birch_world_0_CONSTRUCTION_INFO_DELAYED:0 "$giga_list_additional_data$ - §Y버치 월드§!는 §Y100§! 팝마다 §Y지구 슬록 1개§!를 얻습니다. 그 지구는 매우 강력하고 과다한 직업을 제공합니다. §YAncient Caches of Technologies§!가 활성화되어있고 §Y공허 구체§!가 잠금 해제되었다면, 존재하는 가장 강력한 거주지인 §Y공허 구체 버치 월드§!로 업그레이드할 수 있습니다"
 birch_world_1:0 "$name_birch$ 적도 뼈대"
 birch_world_1_DESC:0 "이 거대한 고리는 블랙홀의 적도를 돌며 $name_birch$의 거대한 뼈대를 완성하기위한 첫 번째 단계입니다."
 birch_world_2:0 "$name_birch$ 뼈대"
 birch_world_2_DESC:0 "초대질량 블랙홀을 중심으로 만들어진 미래의 $name_birch$ 뼈대입니다. 이제 $name_birch$의 구체의 구성을 시작할 수 있습니다."
 birch_world_3:0 "$name_birch$"
 birch_world_3_DESC:0 "초대질량 블랙홀 주위에 지어진 완성 된 $name_birch$입니다. 사건의 지평선 위의 금속 구체에 불과하지만, 거의 무한한 생활 공간을 제공합니다."
 giga_tech_birch_world_1:0 "$name_birch$"
 giga_tech_birch_world_1_desc:0 "$name_birch$는 가장 광범위한 거주지를 위한 이론적인 인공 구조물일 뿐이었지만 이제 현실이 되었습니다. 거대한 블랙홀 주위에 건설된 이 넓은 세계는 특별히 블랙홀의 사건의 지평선에 건설되도록 만들어졌으며, 이 수준에서 표면 중력은 우리 고향의 중력과 비슷합니다."
 giga_tech_birch_world_2:0 "피즈마 건설 현장"
 giga_tech_birch_world_2_desc:0 "피즈마 인슐라는 완벽한 자연을 위해 만들어진 거대한 땅입니다. 농업, 연구 및 여가의 장소입니다."
 giga_tech_birch_world_3:0 "크티즈마 건설 현장"
 giga_tech_birch_world_3_desc:0 "크티즈마 인슐라는 생산에 전념하는 거대한 땅입니다. 주거와 산업의 장소입니다."
 giga_tech_birch_world_4:0 "블랙홀 추출"
 giga_tech_birch_world_4_desc:0 "블랙홀에서 산다는 것은 우리가 감압기와 암흑 물질 기술을 사용하여 표면에서 자원을 추출할 수 있음을 의미합니다."
 vsbw_begin:0 "무한한 확장"
 vsbw_begin_desc:0 "이 버치 월드를 궁극의 거주지로 바꿀 시간입니다. 어중간하게 할 수는 없습니다. 그 전체 표면은 우리 문명이 알고 있는 가장 진보된 기술을 통해 개선될 것입니다."
 pc_void_birch:0 "초대질량 버치 보이드 스피어"
 pc_void_birch_desc:0 ""
 pc_void_birch_adj:0 ""
 mod_pc_void_birch_habitability:0 "버치 월드 거주 적합성"
 trait_pc_void_birch_preference:0 "버치 월드 선호"
 trait_pc_void_birch_preference_desc:0 "우리 인구가 살기에 최적의 거주지입니다. 모든 의미에서 전설적입니다."
 sc_void_birch_built:0 "$pc_void_birch$"
 d_giga_void_birch_mechanics:0 "보이드 버치 코어 시스템"
 d_giga_void_birch_mechanics_desc:0 "$d_giga_birch_mechanics_desc$"
 district_giga_birch_void_structure:0 "알파 건설 작전"
 district_giga_birch_void_structure_desc:0 "제국의 가장 훌륭한 지도자들이 이 놀라운 건축물의 정점에 모여 모든 작전을 감독합니다."
 district_giga_birch_void_structure_plural:0 "$district_giga_birch_void_structure$"
 mod_district_giga_birch_void_structure_max_add:0 "최대 $district_giga_birch_void_structure_plural$"
 district_giga_birch_void_orykta:0 "알파 추출 작전"
 district_giga_birch_void_orykta_desc:0 "우리는 우주의 주인으로서 이 거대한 블랙홀을 개발하고 탐구할 것입니다. 사건의 지평선과 다른 원시적인 개념들은 더 이상 의미가 없습니다."
 district_giga_birch_void_orykta_plural:0 "$district_giga_birch_void_orykta$"
 mod_district_giga_birch_void_orykta_max:0 "최대 $district_giga_birch_void_orykta_plural$"
 district_giga_birch_void_ktisma:0 "알파 니다벨리르 하이퍼컴플렉스"
 district_giga_birch_void_ktisma_desc:0 "우리는 더 이상 물리적인 자원 제약에 얽매이지 않습니다. 우리가 원하는 것이 있다면, 얻을 것입니다."
 district_giga_birch_void_ktisma_plural:0 "알파 니다벨리르 하이퍼컴플렉스"
 mod_district_giga_birch_void_ktisma_max:0 "최대 $district_giga_birch_void_ktisma_plural$"
 district_giga_birch_void_physma:0 "알파 마트료시카 시설"
 district_giga_birch_void_physma_desc:0 "우주는 아직도 많은 비밀을 간직하고 있고, 그 해답을 밝히는 것은 우리의 의무입니다. 우리는 항상 문명을 발전시켜야 합니다. 정체되고 몰락한 제국의 전철을 밟지 않도록 말입니다."
 district_giga_birch_void_physma_plural:0 "알파 마트료시카 시설"
 mod_district_giga_birch_void_physma_max:0 "최대 $district_giga_birch_void_physma_plural$"
 vsbw.1.title:0 "끝났다."
 vsbw.1.desc:0 "20년 간의 고된 초거대 규모의 건설의 끝에, 마침내 끝났습니다.\n[center_of_the_universe.GetName](은)는 성공적으로 천체 공허 구체로 만들어져 1 광년에 달하는 극초거대 구조물을 감싸고 있습니다.\n\n누군가는 이 프로젝트를, 그러니까 사실상 은하 역사상 가장 거대하고 진보된 거주지를 만든 프로젝트를 광기라 할지도 모르겠습니다.\n\n그러나 그들은 그저 바보일 뿐입니다. 우리는 이를 이렇게 부르고 싶습니다.\n\n야망."
 vsbw.1.a:0 "눈이 아프군."
 mod_job_acot_enforcer_per_pop:0 "§Y$VALUE$§! 팝마다 $job_acot_enforcer$ 직업 §G+1§!"
 mod_job_acot_enforcer_per_pop_short:0 "\n§Y$VALUE$§! £pop£마다 £mod_job_acot_enforcer_add£ §G+1§!"
 mod_job_acot_enforcer_drone_per_pop:0 "§Y$VALUE$§! 팝마다 $job_acot_enforcer_drone$ 직업 §G+1§!"
 mod_job_acot_enforcer_drone_per_pop_short:0 "\n§Y$VALUE$§! £pop£마다 £mod_job_acot_enforcer_drone_add£ §G+1§!"
 mod_job_acot_overseer_per_pop:0 "§Y$VALUE$§! 팝마다 $job_acot_overseer$ 직업 §G+1§!"
 mod_job_acot_overseer_per_pop_short:0 "\n§Y$VALUE$§! £pop£마다 £mod_job_acot_overseer_add£ §G+1§!"
 mod_job_acot_overseer_drone_per_pop:0 "§Y$VALUE$§! 팝마다 $job_acot_overseer_drone$ 직업 §G+1§!"
 mod_job_acot_overseer_drone_per_pop_short:0 "\n§Y$VALUE$§! £pop£마다 £mod_job_acot_overseer_drone_add£ §G+1§!"
 mod_job_acot_overseer_droid_per_pop:0 "§Y$VALUE$§! 팝마다 $job_acot_overseer_droid$ 직업 §G+1§!"
 mod_job_acot_overseer_droid_per_pop_short:0 "\n§Y$VALUE$§! £pop£마다 £mod_job_acot_overseer_droid_add£ §G+1§!"
 origin_birch:0 "버치 월드"
 origin_birch_desc:0 "이 제국은 오랫동안 잊혀진 문명의 잔재로서, 선조들이 은하중심에 만든 버치 월드의 메아리치는 광활한 공간 속에서 살고 있습니다."
 origin_birch_effects:0 "- §H$pc_origin_birch$§!를 §H은하 중심§!에서 본거지로 시작합니다.\n- §H은하 중심§!은 은하에 개방된 상태로 시작합니다.\n- §H\"$giga_situation_birch_origin$\"§! 상황으로 시작합니다.\n- 본거지에서 고유한 §H$district_giga_origin_birch_lab_plural$§!에 접근할 수 있으며, 이는 §H탐사§!를 통해 업그레이드할 수 있습니다.\n- §H탐사§!를 통해 본거지에 강력한 수정자를 잠금 해제합니다.\n- §H$pc_origin_birch$§!는 수리할 수 있으며, 특별한 §H$pc_birch$§! £district£ §H인술라§! 및 §H섹터§! 구역을 잠금 해제합니다.\n- 거주 가능성 선호도가 §H$trait_pc_birch_preference$§!로 설정되어 대부분의 행성에서 정착이 훨씬 더 어려워집니다.\n- 인근 행성이 추가 식민지 개척의 열쇠를 쥐고 있을 수 있습니다.\n\n§R이 기원을 여러 사람이 사용할 수 없습니다. 첫 번째 이후 이 기원을 가진 제국은 대신 $origin_default$로 생성됩니다.§!"
 giga_start_screen_birch:0 "우리의 고대 과거에 대한 정보는 매우 부족합니다. 몇 세기 전까지만 해도 우리는 [GetHomeWorldName]가 전부라고 생각했습니다. 우리 아래에는 뚫을 수 없는 장벽이 있고, 그 위에는 거대한 첨탑에 의해 천 킬로미터 높이에서 유지되고 있으며, 롤스타가 하늘을 가로질러 낮과 밤을 표시하는 경로를 그렸습니다.\n\n거대한 소행성 충돌이 우리의 가정을 산산조각 내며 상단 장벽을 뚫고 외부 우주를 보여주었습니다. 가장 가까운 첨탑을 지지대로 사용하여 우리는 균열에 도달하기 위한 탑을 세우고 더 넓은 은하로 첫 걸음을 내디뎠습니다.\n\n우리가 외부 표면에서 발견한 고대 항성 항구와 드라이독은 모든 것을 바꾸어 놓았습니다. 우리의 첫 우주선이 외부로 나아가면서 우리는 우리의 고향이 자연적인 것이 아님을 깨달았습니다. 오히려 그것은 명백히 파손된 상태의 거대한 인공 구체였습니다.\n\n위에서는 더 이상 답을 찾을 수 없기에, 우리는 이제 이론적인 아래 층으로 가는 방법을 찾기 위한 대규모 탐사를 계획하고 있습니다."
 giga_birch.title:0 "은하중심에 연결되는 초공간 항로 발견"
 giga_birch.desc:0 "우리는 감지기가 다시 제대로 작동하도록 관리했고 우리는 은하중심에서 혼자가 아니라는 것을 발견했습니다. 블랙홀 중력에 의해 주 은하 고리보다 더 가까이 당겨진 성계가 몇 개 있습니다.\n\n현재 은하계의 나머지 부분과는 아무런 관련이없는 것 같습니다. 기록을 번역한 결과 우리는 블랙홀 중력이 내부 사이의 연결을 방해하고 타벨없이는 일반 성계와 그 사이의 초공간 항로가 약화되고 희미해진다고 믿고있습니다.\n\n우리는 §Y특별 프로젝트§!를 시작할 수 있습니다"
 giga_birch.003.name:0 "은하중심과 우리 은하의 연결"
 giga_birch.003.desc:0 "우리의 모든 기기에 밀려드는 감지정보들과 함께 초공간 항로가 은하중심과 나머지 은하 사이에 연결되었습니다.\n\n우리는 그곳으로 떠날 수 있습니다. 하지만 무엇이 우리를 기다릴까요?"
 giga_birch.003.desc2:0 "우리의 모든 기기에 밀려드는 감지정보들과 함께 초공간 항로가 은하중심과 나머지 은하 사이에 연결되었습니다.\n\n확신하건대, 이것은 우리가 한 일이 아닙니다! 은하가 다가오고 있습니다..."
 decision_giga_origin_birch_restore:0 "$pc_birch$ 복구"
 decision_giga_origin_birch_restore_desc:0 "마침내 우리의 집이 원래의 영광을 되찾게 만들 수 있습니다."
 decision_giga_origin_birch_restore_tooltip:0 "존재하는 행성 특성들과 지구들은 대체될 것입니다."
 giga_birch_origin_motivated_explorers:0 "고양된 탐험가들"
 giga_birch_origin_motivated_explorers_desc:0 "§L새로이 밝혀진 정보들로, 우리 탐험가들은 그 어느 때보다 능력이 뛰어납니다.§!"
 giga_birch_origin_motivated_explorers_effect:0 "월간 탐사 진행도: §G+25%§!"
 giga_birch_origin_random_4:0 "제조 흑자"
 giga_birch_origin_random_4_desc:0 "기계층에 있는 고대의 제조 복합단지는 예상보다 훨씬 더 잘 작동하고 있습니다."
 giga_birch_origin_random_4_alloys:0 "$giga_birch_origin_random_4$"
 giga_birch_origin_random_4_alloys_desc:0 "$giga_birch_origin_random_4_desc$"
 giga_birch_origin_random_4_goods:0 "$giga_birch_origin_random_4$"
