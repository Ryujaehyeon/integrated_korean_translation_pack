 trait_auto_pc_birch_preference_tt:0 "$pc_birch$ 거주 가능성: §G100%§!\n$t$- $IDEAL_PREFERENCE_TT$"
 trait_auto_pc_birch_preference_desc:0 "$trait_auto_hab_preference_desc$"
