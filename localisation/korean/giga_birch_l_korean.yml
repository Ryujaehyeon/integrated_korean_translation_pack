 zone_giga_birch_orykta_insula_urban_desc:0 "추출 작업."
 zone_giga_birch_orykta_insula_extra:0 "오리크타 확장"
 zone_giga_birch_orykta_insula_extra_desc:0 "오리크타 시스템 개발을 위해 추가로 할당된 공간."
 district_giga_birch_orykta_energy:0 "펜로즈 분사 장치"
 district_giga_birch_orykta_energy_plural:0 "펜로즈 분사 장치"
 district_giga_birch_orykta_energy_subtitle:0 "펜로즈 인젝터"
 district_giga_birch_orykta_energy_desc:0 "이러한 가속기와 수집기는 블랙홀의 에르고스피어(작용권)를 통해 광자를 통과시킴으로써 회전하는 블랙홀의 각운동량을 강탈합니다."
 mod_district_giga_birch_orykta_energy_max_add:0 "최대 $district_giga_birch_orykta_energy_plural$"
 zone_giga_birch_orykta_energy:0 "발전기 구역"
 zone_giga_birch_orykta_energy_desc:0 ""
 zone_giga_birch_orykta_insula_energy:0 "발전기 집중"
 zone_giga_birch_orykta_insula_energy_desc:0 "플라즈마 도관과 초전도 송전선이 차폐된 초구조물을 통해 흐르며, $name_birch$의 심장부에서 조용히 타오르는 에너지를 끌어냅니다."
 zone_giga_birch_orykta_insula_energy_effect:0 "£job_giga_birch_orykta_manager£ §Y$job_giga_birch_orykta_manager_plural$§! $giga_birch_manager_replace$ §Y$job_giga_birch_orykta_manager_energy_plural$§!\n\n$job_giga_birch_orykta_manager_energy_effect_desc$"
 zone_giga_birch_orykta_insula_energy_effect_gestalt:0 "£job_giga_birch_orykta_manager_drone£ §Y$job_giga_birch_orykta_manager_drone_plural$§! $giga_birch_manager_replace$ §Y$job_giga_birch_orykta_manager_drone_energy_plural$§!\n\n$job_giga_birch_orykta_manager_drone_energy_effect_desc$"
 zone_giga_birch_orykta_insula_energy_flavour:0 "초복사 수집기"
 zone_giga_birch_orykta_insula_energy_flavour_desc:0 "이 인술라는 아래 사건 지평선과 강화된 연결을 갖추고 있으며, 업그레이드된 수집기 어레이가 $pc_core_black_hole$에서 엄청난 양의 에너지를 추출합니다."
 zone_giga_birch_orykta_insula_energy_minerals_flavour:0 "질량-에너지 추출"
 zone_giga_birch_orykta_insula_energy_minerals_flavour_desc:0 "이 인술라는 아래 사건 지평선과 강화된 연결을 갖추고 있으며, 거대 구조물들이 $pc_core_black_hole$에서 물질과 에너지를 엄청난 속도로 추출합니다."
 zone_giga_birch_orykta_insula_energy_refinery_flavour:0 "중력 융합 추출기"
 zone_giga_birch_orykta_insula_energy_refinery_flavour_desc:0 "이 인술라는 아래 사건 지평선과 직접 연결되어 있으며, 거대 구조물들이 $pc_core_black_hole$에서 에너지를 추출하고 방출된 물질을 이국적인 재료로 융합합니다."
 zone_giga_birch_orykta_insula_energy_dark_matter_flavour:0 "입자 수집 어레이"
 zone_giga_birch_orykta_insula_energy_dark_matter_flavour_desc:0 "이 인술라는 아래 사건 지평선과 직접 연결되어 있으며, 거대 구조물들이 $pc_core_black_hole$에서 에너지와 암흑물질을 포획합니다."
 zone_giga_birch_orykta_insula_energy_negative_mass_flavour:0 "초복사 렌즈 어레이"
 zone_giga_birch_orykta_insula_energy_negative_mass_flavour_desc:0 "이 인술라는 아래 사건 지평선과 직접 연결되어 있으며, 거대 구조물들이 $pc_core_black_hole$에서 에너지를 수집하여 $giga_sr_negative_mass$ 변환기에 집중시킵니다."
 district_giga_birch_orykta_minerals:0 "물질 천공기"
 district_giga_birch_orykta_minerals_plural:0 "물질 천공기"
 district_giga_birch_orykta_minerals_subtitle:0 "물질 시추기"
 district_giga_birch_orykta_minerals_desc:0 "사건의 지평선 너머에서 잃어버린 물질을 회수하는 뒤틀린 중력의 드릴입니다."
 mod_district_giga_birch_orykta_minerals_max_add:0 "최대 $district_giga_birch_orykta_minerals_plural$"
 zone_giga_birch_orykta_minerals:0 "채굴 구역"
 zone_giga_birch_orykta_minerals_desc:0 ""
 zone_giga_birch_orykta_insula_minerals:0 "채굴 집중"
 zone_giga_birch_orykta_insula_minerals_desc:0 "확장된 운송 통로와 거대 처리 시설이 $pc_core_black_hole$에서 회수된 원자재를 문명의 토대로 변환합니다."
 zone_giga_birch_orykta_insula_minerals_effect:0 "£job_giga_birch_orykta_manager£ §Y$job_giga_birch_orykta_manager_plural$§! $giga_birch_manager_replace$ §Y$job_giga_birch_orykta_manager_minerals_plural$§!\n\n$job_giga_birch_orykta_manager_minerals_effect_desc$"
