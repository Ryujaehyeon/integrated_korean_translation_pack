 pc_birch_desc:0 "수백 개의 동심원 형태의 층으로 구성되어 있는 $pc_birch$는 초거대 블랙홀 주위를 둘러싼 가장 거대한 껍질 세계의 예시입니다. 이는 중력 원천 주위에 여러 개의 고체 껍질을 가진 인공 구조입니다. 수조 개의 행성에 해당하는 사용 가능한 토지를 보유하고 있어 사실상 무한한 인구를 지원할 수 있습니다."
 pc_birch_adj:0 "debug"
 pc_origin_birch:0 "붕괴하는 $pc_birch$"
 pc_origin_birch_desc:0 "$pc_birch_desc$\n\n이 특정 $pc_birch$는 현재 대부분의 시스템이 오프라인 상태이며 상당히 손상 되었습니다. 이 세계의 원시 문명은 하나의 인공 대륙이나 집단 거주지에 살고 있으며, 외부 껍질에 뚫린 구멍을 통해 우주에 접근합니다."
 pc_origin_birch_adj:0 "버치"
 pc_origin_dummy_birch:0 "$pc_origin_birch$"
 pc_origin_dummy_birch_desc:0 "$pc_origin_birch_desc$"
 pc_origin_dummy_birch_adj:0 "$pc_origin_birch_adj$"
 pc_giga_edge_of_eternity:0 "$pc_melted_frozen$"
 pc_giga_edge_of_eternity_desc:0 "수 킬로미터 깊이의 바다로 뒤덮인 행성입니다. 행성급의 폭풍은 지표면을 가로질러 맹위를 떨치고, 믿을 수 없을 정도로 높은 파도는 일상입니다. 행성의 남극 근처에 위치한 고대 고고학 단지가 아니라면, 이 행성의 환경은 식민지화를 하기에는 너무 사나울 것입니다."
 pc_giga_edge_of_eternity_adj:0 "$pc_melted_frozen_adj$"
