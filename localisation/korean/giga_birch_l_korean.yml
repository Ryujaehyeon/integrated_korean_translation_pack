 job_giga_birch_physma_manager_farm_administration_desc:0 "농업 기록 관리의 대가인 이 행정관들은 모든 잎, 가지, 뿌리 및 덩이줄기의 크기, 품질 및 목적지를 알고 있습니다."
 job_giga_birch_physma_manager_farm_administration_priest:0 "버단스의 물리학자 전령"
