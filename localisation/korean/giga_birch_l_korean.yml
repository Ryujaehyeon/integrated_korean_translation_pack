 job_giga_birch_orykta_manager_energy:0 "오리크타 펜로즈 관리자"
 job_giga_birch_orykta_manager_energy_plural:0 "오리크타 펜로즈 관리자들"
 job_giga_birch_orykta_manager_energy_desc:0 "감마 반사경, 입자 가속기, 수집 어레이 운영이 이 에너지 생성 전문가들의 전문 영역입니다."
 job_giga_birch_orykta_manager_energy_effect_desc:0 "£job_giga_birch_orykta_manager£ $job_giga_birch_orykta_manager_energy_plural$은(는) 추가로 많은 양의 £energy£ §Y$energy$§!를 생산하며, £mod_pop_bonus_workforce_mult£ §Y$technician_jobs_bonus_workforce_mult$§!를 더욱 증가시킵니다."
 job_giga_birch_orykta_manager_energy_minerals:0 "오리크타 추출 감독관"
 job_giga_birch_orykta_manager_energy_minerals_plural:0 "오리크타 추출 감독관들"
 job_giga_birch_orykta_manager_energy_minerals_desc:0 "입자 수집기와 중력 시추기 운영 전문가인 이 숙련 행정관들이 산업의 혈액을 흐르게 합니다."
 job_giga_birch_orykta_manager_energy_refinery:0 "오리크타 융합 장인"
 job_giga_birch_orykta_manager_energy_refinery_plural:0 "오리크타 융합 장인들"
 job_giga_birch_orykta_manager_energy_refinery_desc:0 "원자 변환과 그에 따른 에너지 방출 수집을 총괄하는 이 숙련 행정관들은 아무것도 낭비되지 않도록 합니다."
 job_giga_birch_orykta_manager_energy_dark_matter:0 "오리크타 가속기 관리자"
 job_giga_birch_orykta_manager_energy_dark_matter_plural:0 "오리크타 가속기 관리자들"
 job_giga_birch_orykta_manager_energy_dark_matter_desc:0 "$pc_core_black_hole$ 주변의 거대 가속기와 정밀 수집 장비 운영 전문가인 이 숙련 행정관들은 어떤 입자도 수집하지 못하는 일이 없도록 합니다."
 job_giga_birch_orykta_manager_energy_negative_mass:0 "오리크타 준광학 전문가"
 job_giga_birch_orykta_manager_energy_negative_mass_plural:0 "오리크타 준광학 전문가들"
 job_giga_birch_orykta_manager_energy_negative_mass_desc:0 "고에너지 입자빔을 통한 중력 보조 질량 역전 전문가인 이 숙련 행정관들이 $giga_sr_negative_mass$ 생산을 효율적으로 유지합니다."
 job_giga_birch_orykta_manager_minerals:0 "오리크타 감압 관리자"
 job_giga_birch_orykta_manager_minerals_plural:0 "오리크타 감압 관리자들"
 job_giga_birch_orykta_manager_minerals_desc:0 "변덕스러운 물질 시추기 봉쇄 필드 조정의 달인인 이 숙련 행정관들이 최대 광물 처리량을 보장합니다."
 job_giga_birch_orykta_manager_minerals_effect_desc:0 "£job_giga_birch_orykta_manager£ $job_giga_birch_orykta_manager_minerals_plural$는 추가로 많은 양의 £minerals£ §Y $minerals$ §!를 생산하며, £mod_pop_bonus_workforce_mult£ §Y $miner_jobs_bonus_workforce_mult$ §!를 더욱 증가시킵니다."
 job_giga_birch_orykta_manager_minerals_refinery:0 "오리크타 DWIZ 관리자"
 job_giga_birch_orykta_manager_minerals_refinery_plural:0 "오리크타 DWIZ 관리자들"
 job_giga_birch_orykta_manager_minerals_refinery_desc:0 "산업 효율의 귀감인 이 숙련 행정관들이 우리의 $zone_giga_birch_orykta_insula_minerals_refinery_flavour$를 최대 효율로 운영합니다."
 job_giga_birch_orykta_manager_minerals_dark_matter:0 "오리크타 지평선 탐사가"
 job_giga_birch_orykta_manager_minerals_dark_matter_plural:0 "오리크타 지평선 탐사가들"
 job_giga_birch_orykta_manager_minerals_dark_matter_desc:0 "사건 지평선 너머에 갇힌 모든 것의 감별사인 이 숙련 행정관들은 그 안의 어떤 것도 정말 닿을 수 없지 않다는 것을 증명합니다."
 job_giga_birch_orykta_manager_minerals_negative_mass:0 "오리크타 분리 관리자"
 job_giga_birch_orykta_manager_minerals_negative_mass_plural:0 "오리크타 분리 관리자들"
 job_giga_birch_orykta_manager_minerals_negative_mass_desc:0 "$giga_sr_negative_mass$를 형성하는 데 필요한 정밀한 방식으로 물질을 분리하는 것은 실로 복잡한 작업으로, 이 숙련 행정관들은 그것을 손쉽게 해냅니다."
 job_giga_birch_orykta_manager_refinery:0 "오리크타 도가니 감독관"
 job_giga_birch_orykta_manager_refinery_plural:0 "오리크타 도가니 감독관들"
 job_giga_birch_orykta_manager_refinery_desc:0 "거대 융합 도가니의 관리자인 이 숙련 행정관들이 충분한 전략 자원이 저장 시설로 유입되도록 합니다."
 job_giga_birch_orykta_manager_refinery_effect_desc:0 "£job_giga_birch_orykta_manager£ $job_giga_birch_orykta_manager_refinery_plural$는 추가로 £minerals£ §Y$minerals$§! (또는 £food£ §Y$food$§!)를 £volatile_motes£ §Y$volatile_motes$§!으로 전환하고, £rare_crystals£ §Y$rare_crystals$§!를 생성하며, £exotic_gases£ §Y$exotic_gases$§!를 추가로 증가시킵니다. £mod_pop_bonus_workforce_mult£ §Y$giga_refinery_jobs_bonus_workforce_mult$§!"
 job_giga_birch_orykta_manager_refinery_dark_matter:0 "오리크타 융합 연금술사"
 job_giga_birch_orykta_manager_refinery_dark_matter_plural:0 "오리크타 융합 연금술사들"
 job_giga_birch_orykta_manager_refinery_dark_matter_desc:0 "원자 변환 산물에서 희귀한 암흑물질을 이끌어내는 이 숙련 행정관들은 최대 규모로 연금술을 수행합니다."
 job_giga_birch_orykta_manager_refinery_negative_mass:0 "오리크타 중력자 연금술사"
 job_giga_birch_orykta_manager_refinery_negative_mass_plural:0 "오리크타 중력자 연금술사들"
 job_giga_birch_orykta_manager_refinery_negative_mass_desc:0 "융합 도가니에 중력을 충분히 능숙하게 적용하면 $giga_sr_negative_mass$도 그 연금술의 불꽃에서 끌어낼 수 있습니다."
 job_giga_birch_orykta_manager_dark_matter:0 "오리크타 수석 직조사"
 job_giga_birch_orykta_manager_dark_matter_plural:0 "오리크타 수석 직조사들"
 job_giga_birch_orykta_manager_dark_matter_desc:0 "직조 예술의 달인인 이 숙련 행정관들이 블랙홀의 안개 속에서 최고의 효율로 암흑물질을 이끌어냅니다."
 job_giga_birch_orykta_manager_dark_matter_effect_desc:0 "£job_giga_birch_orykta_manager£ $job_giga_birch_orykta_manager_dark_matter_plural$은 추가로 £minerals£ §Y$minerals$§!와 £energy£ §Y$energy$§!를 £sr_dark_matter£ §Y$sr_dark_matter$§!로 전환하고, £mod_pop_bonus_workforce_mult£ §Y$giga_dark_matter_jobs_bonus_workforce_mult$§!를 더욱 증가시킵니다."
 job_giga_birch_orykta_manager_dark_matter_negative_mass:0 "오리크타 추상 물리학자"
