l_korean:
 name_birch:0 "버치 월드"
 allow_birch:0 "§H거대 구조물 잠금 해제:§! $name_birch$"
 desc_birch:0 "버치 월드는 초대질량 블랙홀을 둘러싼 거대 구조물로, 무한한 인구를 수용할 수 있습니다."
