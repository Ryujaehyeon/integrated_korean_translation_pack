 job_giga_birch_orykta_manager_negative_mass_desc:0 "거대 변환 어레이의 감독자인 이 숙련 행정관들이 $giga_sr_negative_mass$의 효율적인 생산을 보장합니다."
 job_giga_birch_orykta_manager_negative_mass_effect_desc:0 "£job_giga_birch_orykta_manager£ $job_giga_birch_orykta_manager_negative_mass_plural$는 추가로 £minerals£ §Y$minerals$§!와 £energy£ §Y$energy$§!를 £giga_sr_negative_mass£ §Y$giga_sr_negative_mass$§!으로 전환하고, £mod_pop_bonus_workforce_mult£ §Y$giga_negative_mass_jobs_bonus_workforce_mult$§!를 더욱 증가시킵니다."
 job_giga_birch_orykta_worker:0 "오리크타 인슐라 노동자"
