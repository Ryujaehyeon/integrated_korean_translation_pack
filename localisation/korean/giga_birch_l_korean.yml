 giga_birch_start_NAME:0 "망가진 코어"
 giga_birch_start_DESC:0 "$pc_origin_birch$로 은하 중심핵에서 시작합니다."
 district_giga_birch_structure:0 "조립 오퍼레이션"
 district_giga_birch_structure_plural:0 "조립 오퍼레이션"
 district_giga_birch_structure_subtitle:0 "구조물 운영"
 district_giga_birch_structure_desc:0 "이 작은 인술라는 확장 전문가 팀이 거주할 수 있도록 설계되었으며, 이들은 $name_birch$에서 더 많은 인프라를 구축할 수 있는 인술라를 건설할 수 있습니다."
 mod_district_giga_birch_structure_max:0 "최대 $district_giga_birch_structure_plural$"
 district_giga_birch_structure_aiondia:0 "$district_giga_birch_structure$"
 district_giga_birch_structure_aiondia_plural:0 "$district_giga_birch_structure_plural$"
 district_giga_birch_structure_aiondia_desc:0 "한때 Aeternite 구의 모든 중심지였던 §H$district_giga_birch_structure_aiondia_subtitle$§!의 거대 도시는 더 나은 시절을 보냈습니다. 상상할 수 있는 거의 모든 기준으로 여전히 믿을 수 없을 만큼 인상적이지만, 가까이에서 관찰하면 미세한 퇴화의 징후가 보입니다. 주민이 없는 상태에서 왜곡된 형태로 변형된 건물들, 유령 정류장이 있는 교통망, 그리고 일상 생활의 세부 사항에서 느껴지는 억압적인 무관심이 그것입니다.\n\n전성기에는 어땠을지 상상할 수밖에 없습니다."
 district_giga_birch_structure_aiondia_subtitle:0 "Elätyksenkaupunki"
