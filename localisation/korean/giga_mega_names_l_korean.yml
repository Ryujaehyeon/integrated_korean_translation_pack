 alderson_disk_2_construction_gaia_restored_right_complete_DESC:0 "$alderson_disk_2_gaia_DESC$"
 succ_0:0 "$gc_kilo$$name_succ$ 건설 현장"
 succ_0_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_kilostructure$ - $giga_list_category_strategic_resource_production$\n£exotic_gases£ §Y이국적 가스§!와 £energy£ §Y에너지§! 매장량을 §Y가스 거대행성§!에서 드러내고 증폭시킵니다.\n§LS.U.C.C.는 기체 행성의 대기를 체계적으로 깎아내 가장 가치 있는 가스를 추출하고, 나머지는 거대한 핵융합 배열의 연료로 사용합니다.§!"
 succ_0_DESC:0 "$name_succ$를 위한 건설 현장입니다. 이곳에는 이 거대 가스 행성 주위에 $name_succ_full$를 건설하는데 필요한 인력과 시설이 있습니다."
 succ_0_CONSTRUCTION_INFO_DELAYED:0 "$sr_mega_extra_data$"
 succ_1:0 "$name_succ$ 궤도 장치"
 succ_1_DESC:0 "완전하고 운영 중인 $name_succ_full$로, 거대 가스 행성에서 방대한 양의 가스를 꾸준히 수확하고 있습니다. 핵융합 발전소는 수집된 수소를 사용하여 막대한 양의 에너지를 생성하고 있습니다."
 sr_mega_extra_data:0 "전략 자원 매장지를 §Y드러내고§! §Y증폭§!시키며, 일반 자원 매장지를 §Y증폭§!(생성하지는 않음)시킬 것입니다."
 automated_stripmine_0:0 "$gc_kilo$$name_auto_stripmine$ 건설 현장"
 automated_stripmine_0_DESC:0 "$name_auto_stripmine$이 설치될 건설 현장입니다. 이곳에는 궤도 채굴 장치와 행성 주변 공장을 건설하는데 필요한 모든 것들이 포함되어 있습니다."
 automated_stripmine_0_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_kilostructure$ - $giga_list_category_strategic_resource_production$\n£volatile_motes£ §Y휘발성 입자§!와 £minerals£ 또는 £alloys£ 매장량을 §Y용융 행성§!에서 드러내고 증폭시킵니다.\n§L거대한 드릴과 견인 빔의 정교한 움직임으로 자동화 노천광은 용융 행성의 지각을 벗겨내고, 불타는 맨틀에서 귀중한 휘발성 입자를 수확합니다.§!"
 automated_stripmine_0_CONSTRUCTION_INFO_DELAYED:0 "$sr_mega_extra_data$"
 automated_stripmine_1:0 "$name_auto_stripmine$ 궤도 장치"
 automated_stripmine_1_DESC:0 "이 대형 궤도 장치에는 다량의 광물을 궤도로 추출하는 두 개의 거대한 트랙터 빔이 장착되어 있습니다. 이 광물들은 행성 표층에 있는 수 많은 자동 채굴 장치에 의해 채굴됩니다."
 kugelblitz_0:0 "$gc_kilo$비어 있는 $name_kugelblitz$"
 kugelblitz_0_DESC:0 "가속된 호킹 복사를 통해 에너지를 생성하고 저장할 수 있는 인공 쿨겔블리츠를 생성할 수 있는 대형 구조물입니다. 또한 저장된 에너지를 추출하여 사용할 수 있습니다."
 kugelblitz_0_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_kilostructure$ - $giga_list_category_storage$\n각 자원을 엄청난 양으로 저장합니다.\n§L에너지와 물질을 복사 형태로 저장할 수 있는, 쿠겔블리츠 기반의 극도로 진보한 저장 장치입니다.§!"
 kugelblitz_1:0 "빈 $name_kugelblitz$"
 kugelblitz_1_DESC:0 "가속된 호킹 복사를 이용해 에너지를 생성하고 에너지를 보관할 수 있는 인공 쿠겔블리츠를 만들 수 있는 대형 구조물입니다. 또한 필요에 따라 보관된 에너지와 물질로 추출해 사용할 수 있습니다."
 kugelblitz_2:0 "$name_kugelblitz$"
 kugelblitz_2_DESC:0 "이 구조물에는 인공 쿠겔블리츠와 에너지 주입기 및 추출기가 포함되어 있습니다. 쿠겔블리츠는 가속된 호킹 복사를 이용해 에너지를 생성하고 추출하고 물질로 재변환해 사용할 수 있습니다."
 kugelblitz_3:0 "위대한 $name_kugelblitz$"
 kugelblitz_3_DESC:0 "이 구조물은 인공 구상번개와 그로부터 에너지를 방출하고 추출할 수 있는 설비를 포함합니다. 4차원 공간 공학의 적용으로 단일 구상번개의 저장 용량을 계속 늘릴 수 있게 되었습니다."
 kugelblitz_ruined:0 "폐허가 된 $name_kugelblitz$"
 kugelblitz_ruined_DESC:0 "망가진 $name_kugelblitz$입니다. 제어된 인공 특이점을 수용하도록 제작된 이 구조물은 과거에 엄청난 피해를 입었으며 더 이상 작동하지 않습니다. 어렵지만 수리는 가능한 것으로 보입니다."
 kugelblitz_ruined_MEGASTRUCTURE_DETAILS:0 "$kugelblitz_ruined_DESC$"
 kugelblitz_restored:0 "$name_kugelblitz$"
 kugelblitz_restored_DESC:0 "$kugelblitz_2_DESC$"
 giga_tech_planetary_seeder_nexus:0 "대규모 극한 생물 유지 시스템"
 giga_tech_planetary_seeder_nexus_desc:0 "기초 생명체의 구성 요소는 적절한 배열이 없을 뿐, 뜨겁고 차가운 황량한 세계에서도 자주 발견됩니다. 그러나 우주 깊은 곳에서 번성하는 큐톨로이드와 아메바의 발견으로 인해, 이제는 무생명 세계에 배치되면 이러한 구성 요소를 수확 및 소비에 적합한 다양한 물질로 축적하고 재배열할 수 있는 맞춤형 인공 '생명체'를 만드는 가능성이 열렸습니다. 이 모든 것이 흩어진 분자를 다양한 식용 화합물로 섞고 재배열하는 것에 불과하기 때문에, 이러한 물질은 정기적으로 보충해야 하며 적절한 '생태계'를 구성하지는 않겠지만, 우리의 영양 산업에 유용한 자재 공급을 제공할 수 있습니다."
 planetary_seeder_nexus_0:0 "$gc_kilo$$name_planetary_seeder_nexus$: 유기체 바이오센서"
 planetary_seeder_nexus_0_DESC:0 "이 장소는 $name_planetary_seeder_nexus$를 건설하기 위한 기지로 사용될 것입니다. 이는 궤도 생명공학 시설로, 생명 없는 세계에서 발견되는 분산된 유기체 화합물을 재처리하여 식용 물질로 변환할 수 있는 다양한 준생물 자동체를 생산합니다. 대규모 지질 조사 배열이 인근 세계를 지속적으로 스캔하고, 고농도의 가공 가능한 유기체 화합물의 위치를 확인하기 위해 탐사선을 배치합니다."
 planetary_seeder_nexus_0_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_kilostructure$ - $giga_list_category_basic_resource_production$\n시스템 행성에 £food£ §Y식량§! 자원을 생성합니다.\n§L거대 가스 행성의 궤도에 건설된 기지로, 유기체 화합물을 식용 물질로 재처리하는 생물학적 자동체를 생산합니다.§!"
 planetary_seeder_nexus_0_CONSTRUCTION_INFO_DELAYED:0 "$giga_list_additional_data$ - $planetary_seeder_nexus_1_mod_tooltip$"
 planetary_seeder_nexus_1:0 "$name_planetary_seeder_nexus$: 생물 제조소"
 planetary_seeder_nexus_1_DESC:0 "지하 바다, 암석 지각 및 기체 대기에서 번성할 수 있는 영양가 있는 식물성 플랑크톤과 유사한 생명체가 대량으로 생산되어 지역 성계에 퍼집니다."
 planetary_seeder_nexus_2:0 "$name_planetary_seeder_nexus$: 효소 식물"
 planetary_seeder_nexus_2_DESC:0 "고급 식물은 일반적인 생명을 유지할 수 없는 세계에서 놀라운 분자 화학의 위업을 수행할 수 있는 효소가 풍부한 세포 자동자를 제조합니다. 이들은 탄소가 풍부한 세계의 지각과 대기를 결정화된 자당 기둥으로 재배치하거나 탄화수소와 물을 조작하여 단백질 슬러리를 생산하는 등의 작업을 수행합니다."
 planetary_seeder_nexus_3:0 "$name_planetary_seeder_nexus$"
 planetary_seeder_nexus_3_DESC:0 "완전한 $name_planetary_seeder_nexus$으로, 이 시스템의 거의 모든 세계에 특수 효소와 영양 생명체의 생산, 배치 및 이후 수확을 감독합니다."
 giga_tech_orbital_artificial_eco:0 "궤도 생태계"
 giga_tech_orbital_artificial_eco_desc:0 "행성의 궤도에 완전히 작동하는 복잡한 생태계를 만드는 것은 꽤 어려운 일이지만, 이러한 기술은 연구 목적을 위해 행성을 공전하는 대규모 생태계를 구축할 수 있게 해줍니다."
 orbital_artificial_eco_0:0 "$gc_kilo$$name_orbital_artificial_eco$ 건설 현장"
 orbital_artificial_eco_0_DESC:0 "이 건설 현장은 우리가 자유로운 인공 생태계를 실험할 수 있는 거대 구조물인 $name_orbital_artificial_eco$를 건설하는 거점 역할을 할 것입니다."
 orbital_artificial_eco_0_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_kilostructure$ - $giga_list_category_science_production$\n£society_research£ §Y사회학 연구§!를 생산하며 §Y테라포밍 속도§!를 §Y7.5%§! 증가시킵니다\n§L자연 연구용의 완전 인공 생태계를 수용하는 매우 거대한 기지입니다.§!"
 orbital_artificial_eco_0_CONSTRUCTION_INFO_DELAYED:0 "$giga_list_additional_data$ - $orbital_eco_arcology_1_mod_tooltip$"
 orbital_artificial_eco_1:0 "$name_orbital_artificial_eco$: 유전자 은행"
 orbital_artificial_eco_1_DESC:0 "유전자 공학 덕분에 수입 된 종들 뿐만 아니라 만들어진 종으로 가득 차있는 $name_orbital_artificial_eco$입니다. 이 독특한 생태계는 자연이 어떻게 기능하는지 연구하기 위해 우리 과학자들에 의해 마음대로 모델링하고 변형될 수 있습니다. 또한 테라포밍을 25% 빠르게 합니다."
 orbital_artificial_eco_2:0 "$name_orbital_artificial_eco$: 외계 생물 구역"
 orbital_artificial_eco_2_DESC:0 "외계 생물 구역은 다양한 모의 환경과 시설을 갖추고 있어 모든 동식물이 지속 가능한 수를 유지하도록 보장합니다."
 orbital_artificial_eco_3:0 "$name_orbital_artificial_eco$: 행성 테스트 스테이션"
 orbital_artificial_eco_3_DESC:0 "완전한 $name_orbital_artificial_eco$로, 외래종과 유전 공학에서 파생된 인공종으로 가득 차 있습니다. 과학자들은 자연 기능을 연구하기 위해 이 독특한 생태계를 자유롭게 형성하고 왜곡할 수 있습니다."
 orbital_artificial_eco_ruined:0 "폐허가 된 $name_orbital_artificial_eco$"
 orbital_artificial_eco_ruined_DESC:0 "폐허가 된 $name_orbital_artificial_eco$입니다. 이전에는 통제된 환경에서 다양한 생물군을 수용하는데 사용되었지만 더 이상은 아닙니다. 적당한 기술이 있다면 복원이 가능할 수도 있습니다."
 orbital_artificial_eco_ruined_MEGASTRUCTURE_DETAILS:0 "$orbital_artificial_eco_ruined_DESC$"
 orbital_artificial_eco_restored:0 "$name_orbital_artificial_eco$"
 orbital_artificial_eco_restored_DESC:0 "$orbital_artificial_eco_3_DESC$"
 giga_dialog.1003.name:0 "폐허가 된 $name_orbital_artificial_eco$"
 giga_dialog.1003.desc:0 "폐허가 된 $name_orbital_artificial_eco$가 [from.GetName] 성계의 가스 행성 주위를 공전하는 모습을 발견했습니다. 많은 피해를 입은 것으로 보이지만 주 골격은 여전히 대부분 손상되지 않았습니다. 우리 과학자들은 우리가 적절한 기술을 가지고 있다면 그것을 수리하는 것이 가능할 것이라고 믿습니다."
 giga_dialog.1003.a:0 "흥미롭군."
 giga_tech_engineering_test_site:0 "대규모 실험 시설"
 giga_tech_engineering_test_site_desc:0 "행성 궤도에 실험 시설을 건설하는 것은 어렵고 매우 위험할 수 있습니다. 그러나, 잠재적인 이익은 굉장히 클 것입니다."
 macro_test_site_0:0 "$gc_kilo$$name_eng_test_site$ 건설 현장"
 macro_test_site_0_DESC:0 "거대공학 실험 기지를 건설하는데 필요한 모든 자재률 수용하는 대형 건설 현장으로, 아래에 있는 행성에서 다양한 공학 관련 실험을 할 수 있는 구조입니다."
 macro_test_site_0_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_kilostructure$ - $giga_list_category_science_production$\n£engineering_research£ §Y공학 연구§!를 생산하며 §Y장갑 내구도§!를 §Y2.5%§! 증가시킵니다\n§L행성 궤도를 돌고 있는 거대한 기지로, 공학 관련 실험을 자유롭게 수행할 수 있습니다.§!"
 macro_test_site_0_CONSTRUCTION_INFO_DELAYED:0 "$giga_list_additional_data$ - $orbital_test_site_1_mod_tooltip$"
 macro_test_site_1:0 "$name_eng_test_site$: 물자 시험 베이"
 macro_test_site_1_DESC:0 "많은 과학 실험 시설과 건설 시설을 갖춘 이 기지는 아래의 행성에서 공학 연구와 관련된 다양한 실험을 수행할 수 있게 해줍니다.\n또한, 함선의 장갑을 25% 증가시킵니다."
 macro_test_site_2:0 "$name_eng_test_site$: 자재 시뮬레이션"
 macro_test_site_2_DESC:0 "자재 시뮬레이션은 실제 자재 테스트의 효율성을 더욱 높이고, 놀라운 모의 파괴 및 행성 파괴를 수행할 수 있습니다."
 macro_test_site_3:0 "$name_eng_test_site$: 궤도 사격장"
 macro_test_site_3_DESC:0 "사격장은 아래 행성에 거의 지속적인 폭격을 가하거나, 더 느린 원거리 무기를 성계의 다른 행성으로 발사할 수 있습니다. 물론, 전투 상황에서 사용하기에는 너무 느립니다."
 macro_test_site_ruined:0 "폐허가 된 $name_eng_test_site$"
 macro_test_site_ruined_DESC:0 "오래 전 만들어진 폐허가 된 $name_eng_test_site$입니다. 내부는 완전히 파손되었지만 외부 선체는 대부분 온전한 상태여서 수리할 수 있습니다."
 macro_test_site_ruined_MEGASTRUCTURE_DETAILS:0 "$macro_test_site_ruined_DESC$"
 macro_test_site_restored:0 "$name_eng_test_site$"
 macro_test_site_restored_DESC:0 "$macro_test_site_3_DESC$"
 macro_test_site_1_dismantle:0 "거대 구조물 해체"
 macro_test_site_1_dismantle_DESC:0 "이 거대 구조물은 해체되어 자원으로 재활용될 것입니다."
 giga_dialog.403.name:0 "폐허가 된 $name_eng_test_site$"
 giga_dialog.403.desc:0 "우리의 과학선이 [from.GetName] 성계에서 행성 주위를 돌고 있는 꽤나 거대한 기지를 발견했습니다. 자세히 보면 이 기지는 오래 전에 알려지지 않은 종에 의해 지어진 $name_eng_test_site$으로 보입니다. 아마 과거에 많은 실험의 실험장 역할을 했을 것이지만, 안타깝게도 지금은 폐허가 되었습니다."
 giga_dialog.403.a:0 "$INTRIGUING$"
 giga_tech_macro_scale_weather_manipulation:0 "거시 기후 조작"
 giga_tech_macro_scale_weather_manipulation_desc:0 "가스 거성 대기 중에 대규모 폭풍을 전문적으로 생성하는 시설을 건설하면 자연 폭풍에 비해 그 영향을 연구하기가 더 쉽습니다. 이러한 응용 전망은 매우 넓습니다."
 atmosphere_shredder_0:0 "$gc_kilo$$name_atmosphere_shredder$: 폭풍의 눈"
 atmosphere_shredder_0_DESC:0 "실험적인 전체 대기 폭풍을 시작하는 데 필요한 자재를 갖춘 대형 기상 제어 시설입니다. 이 구조물은 우리가 가스 거성에서 다양한 실험을 수행하고 전체 성계에서 귀중한 데이터를 수집하는 데 도움이 될 수 있습니다."
 atmosphere_shredder_0_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_kilostructure$: $giga_list_category_science_production$\n이 성계 행성에 £physics_research£§Y물리학 연구§! 자원 매장지 생성.\n§L가스 거성 주위를 돌며 연구와 실험을 위한 영원한 폭풍을 생성하는 대형 우주 정거장입니다.§!"
 atmosphere_shredder_0_CONSTRUCTION_INFO_DELAYED:0 "$giga_list_additional_data$ - $orbital_atmosphere_shredder_1_mod_tooltip$"
 atmosphere_shredder_1:0 "$name_atmosphere_shredder$: 교반 팔"
 atmosphere_shredder_1_DESC:0 "거대한 교반 팔은 행성 측 폭풍의 강도를 높여 연구 잠재력을 더욱 향상시킬 수 있습니다."
 atmosphere_shredder_2:0 "$name_atmosphere_shredder$: 안정 팔"
 atmosphere_shredder_2_DESC:0 "안정 팔은 폭풍 속에 상대적으로 평온한 '주머니'를 만들어 연구를 위해 폭풍 속으로 보낸 드론 및 기타 자동 기계를 안전하게 회수할 수 있습니다."
 atmosphere_shredder_3:0 "$name_atmosphere_shredder$: 실험 링"
 atmosphere_shredder_3_DESC:0 "실험 링에는 정거장의 덜 정밀한 센서가 장착되어 있습니다. 이 링을 폭풍의 힘 속에 담그면 대량의 데이터를 회수할 수 있습니다."
 atmosphere_shredder_complete_name:0 "$name_atmosphere_shredder$"
 atmosphere_shredder_ruined:0 "파괴된 $name_atmosphere_shredder$"
 atmosphere_shredder_ruined_DESC:0 "파괴된 $name_atmosphere_shredder$으로, 먼 과거의 우주 경쟁 시대에 건설되었습니다. 폭풍 제어 메커니즘과 내부 부품은 파괴되었지만 외부 선체는 대부분 손상되지 않아 수리할 수 있습니다."
 atmosphere_shredder_ruined_MEGASTRUCTURE_DETAILS:0 "$atmosphere_shredder_ruined_DESC$"
