l_korean:
 fusion_suppressor_0:0 "$gc_mega$$name_fusion_suppressor$ 건설 현장"
 fusion_suppressor_0_DESC:0 "미래의 $name_fusion_suppressor$를 위한 건설 현장입니다. 이 최첨단 장비의 건설을 시작하기 위한 모든것이 있습니다."
 fusion_suppressor_0_MEGASTRUCTURE_DETAILS:0 "£gigastructural£ $giga_list_category_megastructure$ - $giga_list_category_miscellaneous$\n일반적인 §Y별§!을 §Y중성자별§!과 §Y블랙홀§!로 바꿀 수 있습니다 - $giga_list_damages_system_planets$\n§L핵융합 억제기는 별 내부의 핵융합 과정에 조작을 가하여, 조기에 초신성을 발생시키고 별을 보다 실험적인 천체로 바꿉니다."
 fusion_suppressor_0_CONSTRUCTION_INFO_DELAYED:0 "$giga_list_additional_data$ - $name_fusion_suppressor$의 완전한 완공은 구조물을 해체하고 사용 가능한 §Y블랙홀§!을 유지하거나, 항성이 §H초신성§!으로 폭발하여 §R시스템 내 모든 함선과 구조물을 파괴하고, 그 과정에서 모든 행성을 정화§!하여 사용 가능한 §Y중성자별§!을 남기는 선택지를 제공합니다. 남은 천체는 £giga_sr_iodizium£ §Y$giga_sr_iodizium$§!, £energy£ §Y$energy$§!, 그리고 £physics_research£ §Y$physics_research$§!로 무작위로 씨앗이 뿌려집니다.\n\n§H참고:§! $name_fusion_suppressor$는 중성자별을 다른 메가구조물에 사용하기 위해 §Y완전히 완공§!되어야 합니다.\n\n£giga_sr_iodizium£ §Y$giga_sr_iodizium$§!은 행성의 £physics_research£ £society_research£ £engineering_research£ §Y연구§!와 £energy£ §Y$energy$§! 출력을 개선하는 강력한 건물을 연료로 사용하는 데 사용될 수 있습니다.\n\n§Y중성자별§!은 §Y융합 억제기§!에 의해 생성되며 §YNidavellir 하이퍼포지§!에 적합합니다. §Y블랙홀§!은 다른 블랙홀 기반 메가구조물에 사용될 수 있습니다."
 fusion_suppressor_1:0 "$name_fusion_suppressor$ 중력 조절기"
 fusion_suppressor_1_DESC:0 "이 거대한 기기는 항성의 중력을 조작하여 항성의 물질을 더 작을 부피로 압축할 수 있습니다."
 fusion_suppressor_2:0 "$name_fusion_suppressor$ 항성 안정기"
 fusion_suppressor_2_DESC:0 "$name_fusion_suppressor$는 이제 항성을 안정화할 수 있고 중력 조작기가 불안정해 갑자기 폭발하는 일 없이 항성을 압축할 수 있습니다."
 fusion_suppressor_3:0 "$name_fusion_suppressor$ - 항성 압축 - I 단계"
 fusion_suppressor_3_DESC:0 "$name_fusion_suppressor$가 항성의 물질을 압축하기 시작합니다. 항성 핵 반응의 성질을 연구할 기회가 열렸습니다. 더욱 압축하면 더 많은 연구를 생산할 것입니다."
 fusion_suppressor_4:0 "$name_fusion_suppressor$ - 항성 압축 - II 단계"
 fusion_suppressor_4_DESC:0 "항성이 한 번 더 압축되면 기본 구조가 높은 과학적 잠재력을 지닌 이상한 반응을 보이기 시작합니다. 항성 자체의 구조는 악화되어가는 듯 하지만, 더 많고 색다른 핵융합 반응이 발생하려고 합니다."
 fusion_suppressor_5:0 "$name_fusion_suppressor$ - 중성자별 단계"
 fusion_suppressor_5_DESC:0 "$name_fusion_suppressor$가 간신히 별을 양성자와 전자가 핵 안에서 융합해 중성자가 될 정도로 압축했습니다. 항성이 중성자별이 될거라고 말합니다. 이것은 사실상 일반적인 항성 플라스마로 둘러싸인 중성자별입니다."
 fusion_suppressor_6:0 "별을 블랙홀로 붕괴시키기"
 fusion_suppressor_6_DESC:0 "항성의 물질이 이제 빛 조차 천체의 중력을 빠져나오지 못하는 수준으로 붕괴되어 사실상 인공 블랙홀이 되었습니다. 굉장한 연구 잠재력을 지니고 있습니다."
 fusion_suppressor_6b:0 "항성 기폭"
 fusion_suppressor_6b_DESC:0 "$name_fusion_suppressor$를 조작하여 중력장을 해제하고 반발력을 가하십시오. 압축된 별을 파괴적인 초신성으로 폭발시키고, $name_fusion_suppressor$도 함께 파괴하십시오. 5보다 작은 크기의 모든 행성과 소행성은 파괴될 것이며, 거대 가스 행성은 대기가 날아갈 것입니다. 살아남은 행성들은 상대적 속도로 충돌하는 인공 초신성에 의해 생성된 아이오디지움 원석을 얻게될 것입니다. 이러한 크리스탈은 행성에 강력한 건물을 건설하는 데 사용될 수 있습니다."
 fusion_suppressor_7:0 "$name_fusion_suppressor$ 해체"
 fusion_suppressor_7_DESC:0 "이 $name_fusion_suppressor$를 해체해 블랙홀을 사용 가능하게 합니다."
 penrose_sphere_0:0 "$gc_mega$$name_penrose$ 건설 현장"
 penrose_sphere_0_DESC:0 "이 플랫폼은 블랙홀 주위에 $name_penrose$를 건설하는데 필요한 인재들과 기반 시설을 수용합니다."
 penrose_sphere_0_MEGASTRUCTURE_DETAILS:0 "£gigastructural£ £megaupgrade£ $giga_list_category_megastructure$ - $giga_list_category_basic_resource_production$ - $giga_list_category_weaponry$\n£energy£ §Y에너지§!를 생산할 수도 있고 §Y폭탄§!이 될 수도 있습니다. §Y펜로즈 링 월드§!로 업그레이드될 수 있습니다\n§L블랙홀 주변의 거울로된 공입니다. 초방사성 산란을 이용해 에너지를 생산하며 이를 폭탄으로 이용할 수도 있습니다.§!"
 penrose_sphere_1:0 "$name_penrose$ 뼈대"
 penrose_sphere_1_DESC:0 "이 뼈대로 인해, 블랙홀의 작용권을 넘어 빛을 앞, 뒤로 반사하며 대량의 에너지를 생산하는 거대한 거울을 지지할 수 있습니다."
 penrose_sphere_a2:0 "아공간 왜곡 폭탄 비무장화"
 penrose_sphere_a2_DESC:0 "이 $name_penrose$는 폭탄으로 개조되었습니다. 이제 폭발시키기 전에 잠시 에너지를 축적시켜야합니다."
 penrose_sphere_a3:0 "아공간 왜곡 폭발"
 penrose_sphere_a3_DESC:0 "블랙홀 주위의 거대한 거울같은 구조물은 그 내부 표면과 블랙홀의 작용권 사이로 복사 에너지가 왕복하여 반사될 수 있도록 합니다. 이는 초방사성 산란을 일으키고 복사 에너지를 기하급수적으로 증폭할 것입니다."
 penrose_sphere_a4:0 "폭파!"
 penrose_sphere_a4_DESC:0 "방금 거울의 상태가 한계를 넘도록 충분한 복사 에너지를 가했으며, 에너지 흐름을 방출하고 있습니다!"
 penrose_sphere_a41:0 "아공간 왜곡 폭탄"
 penrose_sphere_a41_DESC:0 "이 아공간 왜곡 폭탄은 폭발 직전입니다!"
 penrose_sphere_a41_MEGASTRUCTURE_DETAILS:0 "$penrose_sphere_a41_DESC$"
 penrose_sphere_a42:0 "아공간 왜곡 폭탄"
 penrose_sphere_a42_DESC:0 "이 아공간 왜곡 폭탄은 폭발 직전입니다!"
 penrose_sphere_a42_MEGASTRUCTURE_DETAILS:0 "$penrose_sphere_a42_DESC$"
 penrose_sphere_b2:0 "$name_penrose$"
 penrose_sphere_b2_DESC:0 "블랙홀 주위에 세워진 큰 거울로, 방사선이 거울의 내부 표면과 블랙홀의 작용권 사이를 튕겨다니면서 에너지를 발생시키고 있습니다."
 penrose_sphere_b3:0 "안정된 $name_penrose$"
 penrose_sphere_b3_DESC:0 "이 $name_penrose$는 특수한 구조로 안정회되어 폭발 위험 없이 거울 안에 더 많은 방사선을 담을 수 있게 되었습니다. 이에 더 많은 에너지를 생성합니다."
 penrose_sphere_b4:0 "$name_penrose$ 링 월드"
 penrose_sphere_b4_DESC:0 "이 $name_penrose$의 생산량 일부가 주변에 구축된 거대하고 발전된 링 월드를 지원하는 목적으로 전환되었습니다."
 gigablackhole_ring_world_2:0 "$name_penrose_ring$ 뼈대"
 gigablackhole_ring_world_2_DESC:0 "이 뼈대는 링 월드 전체 원주의 절반을 사용합니다. 이제 실제 거주지에 대한 작업을 시작해야합니다."
 gigablackhole_ring_world_2_MEGASTRUCTURE_DETAILS:0 "$gigablackhole_ring_world_2_DESC$"
 gigablackhole_ring_world_3:0 "$name_penrose_ring$ 구획"
 gigablackhole_ring_world_3_DESC:0 "$name_penrose$에 의해 구동되는 두 개의 거주 가능한 구획과 하나의 지원 구획으로 구성된 거대한 링 월드."
 ehof_megastructure_phase0:0 "$gc_mega$$ehof_ehofp0$"
 ehof_megastructure_phase0_DESC:0 "초기 현장은 시설 건설의 기지로 사용됩니다."
 ehof_megastructure_phase0_MEGASTRUCTURE_DETAILS:0 "£galwonders£ £megaupgrade£ £gigastructural£ £megaupgrade£ $giga_list_category_megastructure$ - $giga_list_category_transportation$\n제한없는 §Y성간 여행§!을 위해 §Y$ehof_wormholes$§!을 안정화합니다 - $giga_list_potentially_hazardous$\n§LE.H.O.F는 진정 경이로운 기술이며, 이전까지 닿을 수 없으리라 생각되었던 장소로 이동하기 위해 난해한 웜홀 기술을 사용합니다.§!"
 ehof_megastructure_phase0_CONSTRUCTION_INFO_DELAYED:0 "무한한 성간 여행을 위해 $ehof_wormholes$를 팽창시키고 안정화시킵니다."
 ehof_megastructure_phase1:0 "$ehof_ehofp1$"
 ehof_megastructure_phase1_DESC:0 "성간 여행을 위해 $ehof_wormholes$을 조작하고 확장합니다.\n\n"
 ehof_megastructure_phase1_MEGASTRUCTURE_DETAILS:0 "$ehof_megastructure_phase0_MEGASTRUCTURE_DETAILS$"
 ehof_megastructure_phase1_decommissioned:0 "$ehof_ehofp1$ (§E해체됨§!)"
 ehof_megastructure_phase1_decommissioned_DESC:0 "암호화되어 시설에 대한 제어권을 되찾을 수는 없지만, 여전히 귀중한 $ehof_qnm$을 생산합니다."
 ehof_megastructure_phase1_decommissioned_MEGASTRUCTURE_DETAILS:0 "$ehof_megastructure_phase1_decommissioned_DESC$"
 ehof_megastructure_phase2:0 "$ehof_ehofp2$"
 ehof_megastructure_phase2_DESC:0 "성간 여행을 위해 $ehof_wormholes$을 조작하고 확장합니다.\n\n"
 ehof_megastructure_phase2_MEGASTRUCTURE_DETAILS:0 "$ehof_megastructure_phase0_MEGASTRUCTURE_DETAILS$"
 ehof_megastructure_phase2_decommissioned:0 "$ehof_ehofp2$ (§E해체됨§!)"
 ehof_megastructure_phase2_decommissioned_DESC:0 "$ehof_megastructure_phase1_decommissioned_DESC$"
 ehof_megastructure_phase2_decommissioned_MEGASTRUCTURE_DETAILS:0 "$ehof_megastructure_phase2_decommissioned_DESC$"
 ehof_megastructure_phase3:0 "$ehof_ehofp3$"
 ehof_megastructure_phase3_DESC:0 "§H£giga_sr_negative_mass£부정 질량§!을 사용하여 $ehof_wormholes$를 항성 간 여행과 $sr_dark_matter$ 추출을 위해 안정화합니다."
 ehof_megastructure_phase3_MEGASTRUCTURE_DETAILS:0 "$ehof_megastructure_phase0_MEGASTRUCTURE_DETAILS$"
 ehof_megastructure_phase3_decommissioned:0 "$ehof_ehofp3$ (§E해체됨§!)"
 ehof_megastructure_phase3_decommissioned_DESC:0 "$ehof_megastructure_phase1_decommissioned_DESC$"
 ehof_megastructure_phase3_decommissioned_MEGASTRUCTURE_DETAILS:0 "$ehof_megastructure_phase3_decommissioned_DESC$"
 ehof_megastructure_phase4:0 "$ehof_ehofp4$"
 ehof_megastructure_phase4_DESC:0 "§H£giga_sr_negative_mass£부정 질량§!을 사용하여 $ehof_wormholes$를 항성간 여행과 $sr_dark_matter$ 추출을 위해 안정화합니다."
 ehof_megastructure_phase4_MEGASTRUCTURE_DETAILS:0 "$ehof_megastructure_phase0_MEGASTRUCTURE_DETAILS$"
 ehof_megastructure_phase4_decommissioned:0 "$ehof_ehofp4$ (§E해체됨§!)"
 ehof_megastructure_phase4_decommissioned_DESC:0 "$ehof_megastructure_phase1_decommissioned_DESC$"
 ehof_megastructure_phase4_decommissioned_MEGASTRUCTURE_DETAILS:0 "$ehof_megastructure_phase4_decommissioned_DESC$"
 ehof_megastructure_restored:0 "$ehof_megastructure_phase2$"
 ehof_megastructure_restored_DESC:0 "$ehof_megastructure_phase2_DESC$"
 ehof_megastructure_restored_MEGASTRUCTURE_DETAILS:0 "$ehof_megastructure_phase0_MEGASTRUCTURE_DETAILS$"
 ehof_megastructure_ruined:0 "폐허가 된 $ehof_ehofp2$"
 ehof_megastructure_ruined_DESC:0 "부분 건설된 궤도 구조물이 심각한 파손 상태에 있습니다. 이 $ehof_ehof$은 한때 성간 여행에 사용되었습니다."
 ehof_megastructure_ruined_MEGASTRUCTURE_DETAILS:0 "$ehof_megastructure_phase0_MEGASTRUCTURE_DETAILS$"
 ehof_megastructure_ruined_origin:0 "폐허가 된 $ehof_ehof_abr$ 알파"
 ehof_megastructure_ruined_origin_DESC:0 "$ehof_megastructure_ruined_DESC$"
 ehof_megastructure_ruined_origin_MEGASTRUCTURE_DETAILS:0 "$ehof_megastructure_ruined_MEGASTRUCTURE_DETAILS$"
 ehof_megastructure_restored_origin:0 "$ehof_ehof_abr$ 알파 복구"
 ehof_megastructure_restored_origin_DESC:0 "디버그\" # 메가가 건설 시 교환됩니다"
 ehof_presphere_ruined:0 "폐허가 된 $ehof_presphere_dyson$"
 ehof_presphere_ruined_DESC:0 "이 외계 메가구조물은 $ehof_the_compound_text$를 영원히 무찌르기 위해 파괴되었습니다."
 ehof_presphere_ruined_MEGASTRUCTURE_DETAILS:0 "말도 안되는 양의 에너지를 뽑아낼 수 있습니다. 이것을 계속 파손된채로 둘 수는 없습니다."
 ehof_presphere_dyson:0 "§B보존 구체§!"
 ehof_presphere_dyson_DESC:0 "$ehof_the_compound_text$의 패배 이후 복원된 $ehof_presphere_dyson$은 그 주위에 구축된 백색 구멍에서 비할 데 없는 에너지를 끌어낼 수 있습니다."
 ehof_presphere_dyson_MEGASTRUCTURE_DETAILS:0 "말도 안되는 양의 에너지를 뽑아낼 수 있습니다"
 ehof_trader_wormhole_01:0 "$ehof_trader_gateway$"
 ehof_trader_wormhole_01_DESC:0 "$ehof_trader_gateway_DESC$"
 ehof_trader_wormhole_01_MEGASTRUCTURE_DETAILS:0 "$ehof_trader_gateway_DESC$"
 ehof_trader_wormhole_external:0 "$ehof_trader_gateway$"
 ehof_trader_wormhole_external_DESC:0 "$ehof_trader_gateway_DESC$"
 ehof_trader_wormhole_external_MEGASTRUCTURE_DETAILS:0 "$ehof_trader_gateway_DESC$"
 compound_wormhole_ehof:0 "사건의 지평선 조작기"
 compound_wormhole_ehof_DESC:0 "$ehof_the_compound$가 그들 고유의 암흑 물질로 가동되는 유형의 $ehof_ehof$을 건설한 것으로 보입니다."
 compound_wormhole_ehof_MEGASTRUCTURE_DETAILS:0 "$compound_wormhole_ehof_DESC$"
 compound_wormhole_portal:0 "§R$ehof_wormhole$§!"
 compound_wormhole_portal_DESC:0 "$ehof_megastructure_wormhole_destination_DESC$"
 compound_wormhole_portal_MEGASTRUCTURE_DETAILS:0 "$ehof_megastructure_wormhole_destination_DESC$"
 ehof_megastructure_wormhole_destination:0 "$ehof_wormhole$"
 ehof_megastructure_wormhole_destination_DESC:0 "$ehof_wormholes$은 인위적인 창조물로, 은하의 한 지점에서 다른 지점을 연결합니다."
 ehof_megastructure_wormhole_destination_MEGASTRUCTURE_DETAILS:0 "$ehof_megastructure_wormhole_destination_DESC$"
 alderson_disk_0:0 "$gc_giga$$name_alderson$ 건설 현장"
 alderson_disk_0_DESC:0 "이 건설 플랫폼에는 이 성계 전체에 걸친 거대한 원반을 건설하는데 필요한 기반시설을 갖추고 있습니다."
 alderson_disk_0_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_gigastructure$ - $giga_list_category_habitable_mega$\n8개의 거대한 §Y조각§!으로 이루어진 성계 크기의 디스크이며, 그 조각들에는 추가적인 특성화를 적용할 수 있습니다.\n$giga_list_removes_system_planets$\n§L거대한 태양계 크기의 디스크는 어마어마한 생활 공간을 제공합니다."
 alderson_disk_0_CONSTRUCTION_INFO_DELAYED:0 "$giga_list_additional_data$ - §Y앨더슨 조각§!이 §Y가이아§!/§Y기계§!/§Y군체§! 또는 §Y앨더슨 컴퓨팅 단지§! 조각, §Y도시 행성§! 조각으로 바뀝니다"
 alderson_disk_1:0 "$name_alderson$ 뼈대 "
 alderson_disk_1_DESC:0 "$name_alderson$의 거대한 뼈대는 별에서 성계의 가장자리까지 뻗어 있습니다. 실제 구획을 조립하는 기반 역할을 할 것입니다."
 alderson_disk_2:0 "앨더슨 조각 뼈대 "
 alderson_disk_2_DESC:0 "완전한 앨더슨 조각을 구성하는 데 사용될 거대한 뼈대입니다."
 alderson_disk_2_MEGASTRUCTURE_DETAILS:0 "$alderson_disk_2_DESC$"
 alderson_disk_2_gaia:0 "가이아 앨더슨 조각"
 alderson_disk_2_gaia_DESC:0 "$name_alderson$의 거대한 조각으로서 성계의 가장자리까지 뻗어 있습니다. 표면에 수많은 인구를 수용할 수 있습니다."
 alderson_disk_ruined_left:0 "폐허가 된 $name_alderson$ 구획"
 alderson_disk_ruined_left_DESC:0 "이 거대한 구조물을 누가, 혹은 무엇이 만들었는지는 알 수 없습니다. 이 구획의 건설은 부분적으로만 완료되었으며 시간이 지나면서 심각한 수리가 필요하게 되었습니다."
 alderson_disk_ruined_left_MEGASTRUCTURE_DETAILS:0 "$alderson_disk_ruined_left_DESC$"
 alderson_disk_ruined_center:0 "$alderson_disk_ruined_left$"
 alderson_disk_ruined_center_DESC:0 "$alderson_disk_ruined_left_DESC$"
 alderson_disk_ruined_center_MEGASTRUCTURE_DETAILS:0 "$alderson_disk_ruined_left_DESC$"
 alderson_disk_ruined_right:0 "$alderson_disk_ruined_left$"
 alderson_disk_ruined_right_DESC:0 "$alderson_disk_ruined_left_DESC$"
 alderson_disk_ruined_right_MEGASTRUCTURE_DETAILS:0 "$alderson_disk_ruined_left_DESC$"
 alderson_disk_2_construction_gaia_restored_left_complete:0 "$alderson_disk_2_gaia$"
 alderson_disk_2_construction_gaia_restored_left_complete_DESC:0 "$alderson_disk_2_gaia_DESC$"
 alderson_disk_2_construction_gaia_restored_center_complete:0 "$alderson_disk_2_gaia$"
 alderson_disk_2_construction_gaia_restored_center_complete_DESC:0 "$alderson_disk_2_gaia_DESC$"
