l_korean:
 mem_vestigial_wormhole_object:0 "웜홀 흔적"
 mem_vestigial_wormhole_object_desc:0 "멀리 떨어진 두 개의 공간을 연결하는 공간 균열입니다. 이것은 복구할 수 없을 정도로 불안정해졌습니다. 아무것도 들어가거나 나갈 수 없을 것입니다."
 mem_vestigial_wormhole_ship_object:0 "신원불명의 선박"
 MEM_VESTIGIAL_WORMHOLE_TEMPLATE:0 "웜홀 탐사 구역"
 mem_vestigial_wormhole_science_ship:0 "$science$"
 mem_vestigial_wormhole_science_ship_plural:0 "$science_plural$"
 shipsize_mem_vestigial_wormhole_science_ship_construction_speed_mult:0 ""
 shipsize_mem_vestigial_wormhole_science_ship_build_cost_mult:0 ""
 shipsize_mem_vestigial_wormhole_science_ship_upkeep_mult:0 ""
 mem_vestigial_wormhole_wanderer_trait:0 "웜홀 방황자"
 mem_vestigial_wormhole_wanderer_trait_desc:0 "불안정한 웜홀에 갇혔던 적이 있는 이 여행자는 우주여행에 대한 지식이 많습니다."
 mem_vestigial_wormhole_scientist_spider:0 "주인 거미"
 mem_vestigial_wormhole_scientist_spider_desc:0 "이 지도자는 연결된 과학자들의 껍데기를 조종하는 거대한 외계 거미 생명체입니다."
 mem_vestigial_wormhole_ruler_spider:0 "$leader_trait_mem_vestigial_wormhole_scientist_spider$"
 mem_vestigial_wormhole_ruler_spider_desc:0 "$leader_trait_mem_vestigial_wormhole_scientist_spider_desc$"
 mem_vestigial_wormhole.2.name:0 "웜홀 흔적"
 mem_vestigial_wormhole.2.desc:0 "§Y[From.GetName]§! 항성계에는 특이한 특징이 있습니다 - §Swormhole§!입니다. \n\n하지만 이 웜홀은 매우 불안정합니다. 아마도 먼 과거에는 이를 통해 먼 세계로 여행할 수 있었겠지만, 지금은 완전히 붕괴될 위기에 처해 있습니다. 그 혼란스러운 특성 때문에 통과하는 것은 불가능하며, 그 안으로 들어가거나 나오는 것은 매우 희박한 가능성입니다."
 mem_vestigial_wormhole.3.name:0 "웜홀 흔적"
 mem_vestigial_wormhole.3.desc:0 "§Y[the_system.GetName]§! 항성계의 웜홀은 우리가 생각했던 것보다 덜 불안정한 것으로 판명되었습니다. \n\n오늘, 모든 가능성을 뒤엎고 외계 선박이 그곳에서 나타났습니다. 이것이 결정적인 계기가 된 것 같습니다 - 잠시 후 웜홀이 완전히 붕괴되었습니다. \n\n이 선박은 우리가 이전에 만난 어떤 선박과도 다릅니다. 완전히 비활성 상태인 것처럼 보이며, 시스템을 천천히 떠다니고 있습니다."
 mem_vestigial_wormhole.3.a:0 "우린 이를 조사해야 한다."
 mem_vestigial_wormhole.3.b:0 "저 침략자를 파괴해라."
 MEM_VESTIGIAL_WORMHOLE_PROJECT:0 "수상한 함선 조사"
 MEM_VESTIGIAL_WORMHOLE_PROJECT_DESC:0 "웜홀이 붕괴하기 직전 그로부터 작은 함선이 하나 튀어나왔습니다. 우린 이 함선에 타서 누가 무엇을 가지고 이 함선을 보냈는지 알아내야 합니다."
 mem_vestigial_wormhole.4.name:0 "생존자"
 mem_vestigial_wormhole.4.desc:0 "[Leader.GetName]는 [the_system.GetName] 시스템으로 붕괴하는 웜홀을 통해 들어온 정체불명의 함선에 탑승한 후, [Leader.GetSheHe]가 예상치 못한 것을 발견했다고 보고합니다: 살아있는 조종사입니다. \n\n짧은 심문을 통해 진실이 밝혀졌습니다: 조종사는 웜홀을 탐사하던 과학자로, 어떤 종류의 공간 이상 현상이 이를 불안정하게 만들었습니다. 우리의 항성 차트와 함선에 저장된 차트를 비교해보면 [the_guy.GetHerHis]의 여정은 약 20억 년 전, 여러 은하 떨어진 곳에서 시작된 것으로 보입니다."
 mem_vestigial_wormhole.4.a:0 "[the_guy.GetHerHim]에게 우리의 과학 부서에서 직책을 제안합니다."
 mem_vestigial_wormhole.4.a.tooltip:0 "새로운 §Y과학자§!를 얻습니다."
 mem_vestigial_wormhole.4.b:0 "우리는 [the_guy.GetHerHis] 서비스가 필요하지 않습니다."
 mem_vestigial_wormhole.4.c:0 "침입자를 처형해라."
 mem_vestigial_wormhole.4.d:0 "웜홀이 신체에 끼칠 영향을 조사하기 위해 해부팀을 준비해라."
 mem_vestigial_wormhole.4.inwards:0 "[the_guy.GetHerHim]을 추방하여 우리의 문화를 보존합니다."
 mem_vestigial_wormhole.4.servitor:0 "우리는 [the_guy.GetHerHim]에게 성역에서의 자리를 찾아줄 것입니다."
 mem_vestigial_wormhole.4.purifier:0 "외계인 놈을 처형해라."
 mem_vestigial_wormhole.4.terminator:0 "유기 존재를 처형하라."
 mem_vestigial_wormhole.4.swarm:0 "저녁 시간이군!"
 mem_vestigial_wormhole.4.tooltip:0 "우린 새로운 §Y과학선§!을 얻습니다."
 mem_vestigial_wormhole.6.name:0 "거대한 우주 거미"
 mem_vestigial_wormhole.6.desc.psi:0 "[Root.GetName]가 [Solar_System.GetName] 시스템에 있는 버려진 우주선에 접근하자, [Leader.GetName]는 안에 많은 마음들이 존재하는 것을 감지했습니다: 차갑고, 외계의 탐욕스러운 마음들이 먹이를 기다리고 있었습니다. \n\n더 자세히 살펴보니, 그 배는 크고 공격적인 여덟 다리 생물들로 가득 차 있었습니다. [Leader.GetHerHis]의 예감 덕분에 매복을 피한 [Leader.GetName]는 생물학적 위험을 통제하기 위해 신중하게 후퇴하고 우주선을 침몰시키기로 결정했습니다."
 mem_vestigial_wormhole.6.desc.cyborg:0 "[Solar_System.GetName] 시스템에 있는 버려진 선박은 우리가 예상했던 것만큼 버려지고 생명 없는 것이 아닌 것으로 드러났습니다. \n\n[Root.GetName]이 그와 접촉하자, 과학 팀은 거대한 여덟 개 다리를 가진 생물의 군대에 포위당했습니다. 그 중 하나는 [Leader.GetName]에 가까이 접근하기도 했으나, [Leader.GetHerHis]의 새로 설치된 개인 방어 시스템에 의해 소각되었습니다. \n\n승무원들은 퇴각할 수밖에 없었고, 가능한 오염을 피하기 위해 선박을 자침했습니다."
 mem_vestigial_wormhole.6.desc.robot:0 "[Solar_System.GetName] 성계 내의 버려진 함선은 우리가 예상했던 바와 달리 생명체가 없는 채 버려진 것이 아니라는 게 밝혀졌습니다.\n\n[Root.GetName]에 승선하자마자 연구팀은 여덟 개의 다리를 가진 거대 생물체들에 포위당했습니다. 어떻게 해도 그들의 장갑을 관통할 수 없었고 어떤 피해도 주지 못했습니다.\n\n가능한 모든 감염을 막기 위해 [Leader.GetName]은(는) 함선을 격침하기로 결정했습니다."
 mem_vestigial_wormhole.desc.robust:0 "[Solar_System.GetName] 시스템의 유기물은 우리가 예상했던 것만큼 버려지고 생명 없는 것이 아닌 것으로 판명되었습니다. \n\n[Root.GetName]이 그와 접촉하자, 과학 팀은 거대한 여덟 다리 생물의 군대에 포위당했습니다. 그 중 하나는 [Leader.GetName]를 기습하기도 했지만, [Leader.GetHerHim]를 물었을 때, [Leader.GetHerHis]의 강화된 면역 체계가 위협을 인식하고 예비 포식자에게 치명적이었습니다. \n\n그러나 [Leader.GetHerHis]의 운을 더 시험하고 싶지 않았던 [Leader.GetName]는 떠나기로 결정하고 추가 오염을 방지하기 위해 배를 침몰시키기로 했습니다."
 mem_vestigial_wormhole.6.a.psi:0 "선견지명은 과대평가하기 어렵다."
 mem_vestigial_wormhole.6.a.cyborg:0 "우리의 살충제가 보충되었다."
 mem_vestigial_wormhole.6.a.robot:0 "살덩이는 연약하되 강철은 영원하다."
 mem_vestigial_wormhole.a.robust:0 "우리의 우월성을 증명하라."
 mem_vestigial_wormhole.7.name:0 "거대 우주 거미들"
 mem_vestigial_wormhole.7.desc:0 "[Solar_System.GetName] 항성계의 버려진 우주선은 우리가 예상했던 것만큼 버려지고 생명 없는 것이 아닌 것으로 판명되었습니다. \n\n[Root.GetName]이 그것에 접안하자, 과학 팀은 거대한 여덟 다리 생물의 군대에 포위당했습니다. 그들이 반응하기도 전에, 가장 큰 생물 중 하나가 [bitten_leader.GetName]를 공격하여 [bitten_leader.GetHerHis]의 몸에 붙어 [bitten_leader.GetHerHim]가 깊은 혼수 상태에 빠지게 만들었습니다. 팀은 추가 오염을 피하기 위해 철수하며 우주선을 자폭해야 했습니다."
 mem_vestigial_wormhole.7.a:0 "[bitten_leader.GetName]을(를) 치료를 위해 모성으로 데려와라"
 mem_vestigial_wormhole.7.a.tooltip:0 "§Y[bitten_leader.GetName]§!은(는) 혼수상태로 인해 더 이상 [bitten_leader.GetHerHis] 임무를 진행할 수 없습니다."
 mem_vestigial_wormhole.8.name:0 "여덟 다리"
 mem_vestigial_wormhole.8.desc:0 "물린 지 한 달 후, [bitten_leader.GetName]은 [Capital_Scope.GetName]의 의료 시설에서 깨어났습니다. 하지만 [bitten_leader.GetSheHe] [bitten_leader.GetHasHave] 변화했습니다. \n\n[bitten_leader.GetHisHerCap] 예전의 성격은 사라졌고, 대신 [bitten_leader.GetHerHis] 몸에 여전히 붙어 있는 거대한 거미로 대체된 것 같습니다. 이 생물은 숙주를 통해 대화하며 접촉을 시도했습니다. 자신을 §YEight-Legs§!라고 부르며 고대의 고급 종족의 일원이라고 주장합니다. \n\n[bitten_leader.GetName]을 사실상 죽였음을 인정하면서, [bitten_leader.GetHerHis] 대신 우리 제국에 봉사하겠다고 제안했습니다."
 mem_vestigial_wormhole.8.desc.hive:0 "[bitten_leader.GetName]가 다시 깨어났지만, 변했습니다. 우리는 더 이상 [bitten_leader.GetHerHim]을(를) 우리 일부로 느끼지 못합니다. \n\n새롭고 차갑고 어두운 마음이 그 자리를 대신했습니다: §YEight-Legs§!라는 이름을 가진 생물이 [bitten_leader.GetHerHis]의 몸을 차지했습니다. 이제 그것은 자신의 생명을 대가로 우리에게 봉사하겠다고 제안합니다. 우리는 그것을 믿을 수 있을까요?"
 mem_vestigial_wormhole.8.a:0 "여덟 다리가 우리를 섬기도록 허락한다."
 mem_vestigial_wormhole.8.a.tooltip:0 "§Y[bitten_leader.GetName]§!이(가) §Y여덟 다리§!로서 복직하게 됩니다.\n그들은 연구 속도 §G+10%§!를 주는§Y$leader_trait_mem_vestigial_wormhole_scientist_spider$§! 특성을 획득합니다."
 mem_vestigial_wormhole.8.b:0 "신체 훔치는 자를 안락사합니다."
 mem_vestigial_wormhole.8.b.tooltip:0 "§Y[bitten_leader.GetName]§!은(는) 죽습니다. 하지만 적어도 [bitten_leader.GetHerHis]의 피부 안에 뭔가가 걸어 다니는 일은 없겠죠..."
 mem_vestigial_wormhole.8.c:0 "괴생명체를 해부하라."
 mem_vestigial_wormhole.8.purifier:0 "외계 침략자를 소각로에 던져버리십시오."
 mem_vestigial_wormhole.8.swarm:0 "신체 강탈자를 섭취하자."
 mem_vestigial_wormhole.8.swarm.tooltip:0 "우리는 여덟다리를 우리가 모두를 대하는 방식과 동등하게 대우할 것이다..."
 mem_vestigial_wormhole.9.name:0 "유령선"
 mem_vestigial_wormhole.9.desc:0 "[Leader.GetName]은(는) [Solar_System.GetName] 성계 안의 웜홀에서 나타난 불가사의한 함선에 성공적으로 상륙했다고 보고했습니다.\n\n [Leader.GetSheHe]와 [Leader.GetHerHis] 승무원들이 안 속에서 찾아낸 것은 설명하기 어렵습니다. 그 함선는 분명히 유기체인 선원을 염두에 두고 설계되었지만, 살아있는 생명체나 신원을 확인할 수 있는 유해는 발견되지 않았습니다. 유기체가 한때 존재했다는 것을 알려주는 유일한 증거는 조종석에 여전히 묶여 있는 빈 우주복뿐입니다. 조종사에게 무슨 일이 일어났었는지는 전혀 알 수 없습니다. 애초에 조종사가 존재했다고 가정했을 때 말입니다. 그 배는 탐사를 위해 디자인된 것으로 보이며 추가적인 과학선으로 용도변경이 가능합니다."
 mem_vestigial_wormhole.9.a:0 "그리하도록"
 mem_vestigial_wormhole.9.a.tooltip:0 "새 §S과학선§!을 얻습니다."
 mem_vestigial_wormhole.9.b:0 "함선을 분해해 모든 것을 알아내라."
 mem_vestigial_wormhole.9.c:0 "함정일지도 모른다. 파괴하라!"
 mem_vestigial_wormhole.10.name:0 "도망"
 mem_vestigial_wormhole.10.desc:0 "[Root.GetName]은(는) 최근 [Solar_System.GetName] 성계에 나타난 괴함선에 성공적으로 상륙했다고 보고했습니다.\n\n그러나 [stolen_leader.GetName]이(가) 발을 내딛자마자, 그 함선은 탐지기에서 사라졌습니다. 무슨 일이 일어났는지는 정확하지 않습니다. 그러나 그 함선의 항적에 남겨진 공간 왜곡은 함선이 우리가 닫혔다고 생각한 웜홀로 다시 빨려 들어갔다는 것을 보여주고 있습니다. 그 배를 추적할 방법이 없어, [stolen_leader.GetName]은(는) 사망자로 처리될 것입니다."
 mem_vestigial_wormhole.10.a:0 "공간 이상 현상이 또 한 명의 희생자를 불렀구나..."
 mem_vestigial_wormhole.10.a.tooltip:0 "§Y[stolen_leader.GetName]§!은(는) 사라졌습니다."
 leader_trait_mem_vestigial_wormhole_wanderer:0 "웜홀 방황자"
 leader_trait_mem_vestigial_wormhole_wanderer_desc:0 "불안정한 웜홀에 갇혔던 적이 있는 이 여행자는 우주여행에 대한 지식이 많습니다."
 leader_trait_mem_vestigial_wormhole_scientist_spider:0 "주인 거미"
 leader_trait_mem_vestigial_wormhole_scientist_spider_desc:0 "이 지도자는 연결된 과학자들의 껍데기를 조종하는 거대한 외계 거미 생명체입니다."
