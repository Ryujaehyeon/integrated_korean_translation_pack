l_korean:
 decision_nsc_mothball_menu:0 "함대 보관"
 decision_nsc_mothball_menu_desc:0 "함대를 비활성화하고 예약할 수 있으며, 유지비와 해군 용량 사용량을 줄입니다."
 decision_nsc_mothball_menu_trigger.fail:0 "£trigger_no£ §R이 기능을 사용하려면 이 행성 위에 귀하 소속의 함대가 궤도를 돌고 있어야 합니다.§!\n\n§Y이 기능을 사용할 수 없는 경우, 각 동결된 함대를 클릭하고 행성을 오른쪽 클릭하여 '궤도에 있음'으로 표식을 새긴 자로 설정되어 있는지 확인하십시오.§!"
 decision_nsc_mothball_menu_tooltip:0 "함대 유휴 관리 패널을 엽니다."
 nsc_events_mothball.menu.name:0 "함대 보유 관리"
 nsc_events_mothball.menu.desc:0 "함대 보관 시스템에 오신 것을 환영합니다. 이 창에서는 보관할 함대 또는 재가동할 함대를 선택할 수 있습니다. 다음 사항에 유의하시기 바랍니다:\n\n행성의 궤도에서 함대를 보관하려면 귀하의 제국이 해당 행성을 식민지화해야 합니다. 한 행성의 궤도에서는 최대 5개의 함대를 보관할 수 있습니다.\n\n임대된 함대는 보관할 수 없습니다.\n\n함대를 보관하면 해군 용량 사용량이 75% 감소하고, 보관 상태인 동안 유지 비용이 90% 감소합니다.\n\n보관된 함대를 제어하거나 이동할 수 없습니다. 실수로 보관된 함대를 클릭하여 이동하려고 하면, 다시 클릭한 후 행성을 우클릭하여 궤도에 있다고 표식을 새긴 자로 설정하십시오. 궤도에 표식을 새기지 않은 함대는 재가동할 수 없습니다.\n\n함대를 재가동하는 데는 함선을 전투 준비 상태로 수리하는 데 필요한 합금이 소모됩니다. 비용은 함대에 있는 모든 함선의 총 선체 점수에 따라 달라집니다. 함대를 재가동하는 데는 360일이 소요됩니다.\n\n§R경고: 함대를 재가동하기 전에 증가된 유지 비용과 해군 용량을 감당할 수 있는지 확인하십시오!§!"
 nsc_events_mothball.menu.close:0 "Close"
 nsc_events_mothball.menu.fleet_mothball_stop.tooltip:0 "함대를 전투 준비 상태로 재가동합니다."
 nsc_mothball_stop_trigger.fail:0 "함대가 현재 재가동 중입니다."
