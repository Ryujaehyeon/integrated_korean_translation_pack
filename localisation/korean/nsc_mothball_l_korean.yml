 NSC_EVENTS_MOTHBALL_MESSAGE_TITLE:0 "유휴 함대 복원"
 NSC_EVENTS_MOTHBALL_MESSAGE_DESC:0 "§Y[From.GetName]§! 함대가 [This.Orbit.GetName] 행성에서 보관된 후 수리되었습니다."
 nsc_events_mothball.5.name:0 "[From.GetName]에서 잃은 함대"
 nsc_events_mothball.5.desc:0 "[From.GetName]가 적에게 빼앗겼을 때, 우리의 유휴 함대는 적의 손에 넘어가지 않도록 우리 직원에 의해 파괴되었습니다."
 nsc_events_mothball.5.a:0 "[This.GetName]에게 어두운 날입니다."
 nsc_events_mothball.6.name:0 "[From.GetName]에서 파괴된 적 함대"
 nsc_events_mothball.6.desc:0 "우리가 [From.GetName]를 점령했을 때, 궤도에 동면 상태의 적 함대가 있었습니다. 이 함대는 우리가 그들을 장악하기 전에 적 직원에 의해 파괴되었습니다."
 nsc_events_mothball.6.a:0 "Unfortunate."
 nsc_events_mothball.8.name:0 "[From.GetName]에서 잃은 함대"
 nsc_events_mothball.8.desc:0 "우리가 [From.GetName]를 포기했을 때, 누군가 우리의 궤도에 있는 유휴 함대를 재가동하는 것을 소홀히 했습니다. 그 결과, 그들은 모든 다른 궤도 시설과 함께 파괴되었습니다."
 nsc_events_mothball.8.a:0 "그건 말도 안 됩니다!"
