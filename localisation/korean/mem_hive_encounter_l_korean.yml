l_korean:
 mem_hive_encounter.2.name:0 "지능적 개별 생명체"
 mem_hive_encounter.2.desc:0 "[root.GetName]가 별들을 조사하기 시작하면서, 우리는 새로운 개념을 발견했습니다: 어떤 포괄적인 의식과 연결되지 않은 개별 생명체의 지능입니다.\n\n이는 우리가 이전에 불가능하다고 생각했던 것입니다. 우리는 이것이 어떻게 가능해졌는지에 대한 질문에 상당한 하위 프로세스를 할애했지만 아직 큰 진전을 이루지 못했습니다. 이 과정을 가속화하기 위해, 아마도 우리는 [mem_hive_encounter_normal_country.GetName]와 같은 좀 더 친근한 사회에 샘플 제공을 요청해야 할 것입니다."
 mem_hive_encounter.2.a:0 "통신을 개설하고 표본을 요청하라."
 mem_hive_encounter.2.b:0 "우리는 그들의 도움이 필요 없다."
 mem_hive_encounter.3.name:0 "교신 수신"
 mem_hive_encounter.3.desc:0 "안녕하세요 [root.species.GetNamePlural]님,\n\n별들을 탐험하기 시작하면서, 우리는 당신과 같은 집단 지성이 아닌 문명들을 만나게 되었습니다. 개별 생명체의 지능 개념은 우리에게 새로운 것이며, 우리가 이전에 진실이라고 믿었던 많은 것들을 반증합니다. 이러한 상황이 어떻게 발생했는지 우리는 궁금하며, 조사하고자 합니다.\n\n따라서, 우리는 당신의 종의 샘플을 보내주실 것을 요청합니다. 우리는 그들에게 어떤 피해도 주지 않을 것을 약속합니다. 대신, 우리는 당신에게 우리의 호의와 함께 당신이 직접 실험을 진행할 수 있는 비생명 [mem_hive_encounter_hive_country.GetSpeciesAdj] 드론 샘플을 제공할 수 있습니다."
 mem_hive_encounter.3.a:0 "당연하지. 지원자들을 찾아보자고."
 mem_hive_encounter.3.b:0 "우리의 몇몇 범죄자들을 보내줄 순 있지. 우리는 그들이 필요없거든."
 mem_hive_encounter.3.c:0 "우리는 시체 몇 구라면 보내줄 수 있지."
 mem_hive_encounter.3.d:0 "우리는 도와주지 않겠다."
 mem_hive_encounter.4.name:0 "준비된 지원자들"
 mem_hive_encounter.4.desc:0 "여러 자원자들이 [mem_hive_encounter_hive_country.species.GetNamePlural]의 피험체로 나서고자 합니다. 호기심, 모험심, 그리고 경우에 따라 절박함이 결합된 동기로, 그들은 현재의 삶을 뒤로하고 하이브에서 살기를 원하고 있습니다."
 mem_hive_encounter.4.b:0 "훌륭하군"
 mem_hive_encounter.5.name:0 "지원자가 발견되지 않았습니다."
 mem_hive_encounter.5.desc:0 "우리의 [mem_hive_encounter_hive_country.GetName] 피험체로 활동할 자원봉사자를 모집하는 요청은 무시당했습니다. 우리는 어떤 참가자도 나서도록 설득하지 못했습니다. 그럼에도 불구하고 [mem_hive_encounter_hive_country.GetSpeciesAdj] 요청에 응할 방법을 찾아야 할까요?"
 mem_hive_encounter.6.desc.a:0 "우리는 당신의 실험지원자들을 찾았습니다. 저희가 보내드린 그대로 그들이 안전하게 돌아오겠다 믿겠습니다!"
 mem_hive_encounter.6.desc.b:0 "우리 교도소에서 바람직하지 않은 쓰레기들을 석방해주기로 했고, 이젠 죄수가 아닌 실험체로써 새 삶을 시작할 것입니다. [mem_hive_encounter_normal_country.GetAdj] 실험실에서 절대 돌아오지 않았으면 좋겠네요."
 mem_hive_encounter.6.desc.c:0 "아무도 그리워하지 않을 시체 표본을 보내겠습니다. 뭐 원하는 대로 사용하시지요."
 mem_hive_encounter.6.desc.d:0 "도움을 드릴 수 없어 죄송하군요. 우리 종족의 생물학적 비밀을 타국에 전하는 것은 아무리 고귀한 의도가 있더라도 힘들 것이라 생각됩니다."
 mem_hive_encounter.6.a:0 "협조에 감사드립니다."
 mem_hive_encounter.6.b:0 "불행하군."
 mem_hive_encounter.7.name:0 "연구 시작 가능"
 mem_hive_encounter.7.desc.a:0 "[mem_hive_encounter_normal_country.species.GetName] 표본이 도착했습니다. 협조적인 그들의 도움과 추가적인 정보를 얻어내는데 관심이 있어 보였음에도, 우리는 아직도 그들의 뇌에서 어떤 작용이 일어나는지 이해하기 위해 고군분투하고 있습니다. 개별 생명체들은 우리의 상상을 초월할 정도의 많은 생각 회로를 거치며 불안한 시간을 보내는 것처럼 보입니다. 개별 생명체들의 상호작용은 각자의 이 생각들이 서로 독립적이며 가끔은 상당한 의견 차이를 보인다는 것을 보여줍니다. 이에 아직도 우리는 이들이 어떻게 사회라는 공동체에 기초한 생활을 보내는지 이해하지 못했습니다."
 mem_hive_encounter.7.desc.b:0 "[mem_hive_encounter_normal_country.species.GetName] 표본이 도착했습니다. 그들은 우리를 두려워하는 것처럼 보이며, 우리의 모습에 불안과 분노를 표현합니다. 흥미롭게도, 그들의 분노의 대부분은 그들 자신의 정부를 향하고 있습니다. 이들은 사회에 적응하지 못한 추방자들이기 때문에 그들의 행동이 정상인지 판단하기는 어렵습니다. 그럼에도 불구하고, 우리는 그들의 사회에서 허용되는 사고의 자유 수준에 매료됩니다. 어떻게 문명이 이렇게 중앙 지향성이 결여된 상태에서 형성될 수 있을까요?"
 mem_hive_encounter.7.desc.c:0 "[mem_hive_encounter_normal_country.species.GetName] 표본이 도착했습니다. 살아있는 표본을 얻지 못한 것은 유감스러운 일이며, 이는 개인의 활동을 조사할 수 없다는 걸 의미합니다. 하지만, 우리는 어떤 비밀이 밝혀질지 모르는 일련의 실험을 준비했습니다."
 mem_hive_encounter.7.a:0 "연구를 시작하지."
 mem_hive_encounter.8.name:0 "성공적인 결론"
 mem_hive_encounter.8.desc.a:0 "우리의 [mem_hive_encounter_normal_country.species.GetName] 표본에 대한 조사는 성과를 거두었습니다. 우리는 개별 지능을 가진 생명체들이 서로 및 우리와 어떻게 상호작용하는지에 대한 이해를 얻었으며, 이는 외계 행동에 대한 많은 통찰을 제공합니다. 또한 그들의 뇌의 작동 방식에 대한 실험을 수행할 수 있었습니다. 그들의 문명과 우리의 문명, 그리고 생물학(신경 및 유전적 구조 측면에서) 사이에는 엄청난 차이가 있음에도 불구하고 어느 정도의 비교 가능성이 있는 것으로 보입니다. 그들과 우리의 주요 차이점은 그들이 사이오닉적으로 연결할 수 있는 능력이 부족하다는 점으로, 이는 각 마음이 본질적으로 스스로의 장치에 맡겨진다는 것을 의미합니다. 개별 [mem_hive_encounter_normal_country.GetSpeciesAdj] 뇌는 평균 [root.GetSpeciesAdj] 드론의 뇌보다 훨씬 더 발전해 있습니다.\n\n우리는 언젠가 사이오닉 링크를 자유롭게 적용하고 제거할 수 있게 되어, 본질적으로 다른 인구를 [root.GetName]에 통합할 수 있는 능력을 얻게 될 것이라고 믿습니다. 그동안 생물학과 국가 운영의 기초에 대한 우리의 이해는 고급화되었습니다."
 mem_hive_encounter.8.desc.b:0 "우리의 과학적 서브루틴이 [mem_hive_encounter_normal_country.species.GetName] 샘플에 대한 돌파구를 마련했습니다. 그들의 문명과 우리의 문명, 그리고 생물학(신경 및 유전 구조 측면에서) 간의 엄청난 차이에도 불구하고 어느 정도의 비교 가능성이 있는 것으로 보입니다. 그들과 우리 사이의 주요 차이점은 그들이 사이오닉적으로 연결할 수 있는 능력이 부족하다는 점으로, 이는 각 마음이 본질적으로 스스로의 장치에 맡겨진다는 것을 의미합니다. 개별 [mem_hive_encounter_normal_country.GetSpeciesAdj] 뇌는 평균 [root.GetSpeciesAdj] 드론보다 훨씬 더 발달되어 있습니다.\n\n우리는 언젠가 사이오닉 링크를 자유롭게 적용하고 제거할 수 있게 되어, 본질적으로 다른 인구를 [root.GetName]에 통합할 수 있는 능력을 얻게 될 것이라고 믿습니다. 그동안 생물학과 외계 유전의 기초에 대한 우리의 이해는 고급화되었습니다."
 mem_hive_encounter.8.a:0 "훌륭하군."
 mem_hive_encounter.9.name:0 "연구를 시작할 수 있습니다"
 mem_hive_encounter.9.desc:0 "[mem_hive_encounter_hive_country.GetName]의 드론이 도착했습니다. 지금까지 그들은 우리 과학자들의 어떠한 자극에도 반응이 없는 것으로 판명되었습니다. 하지만 이 조사를 통해 그들을 군체의식으로부터 분리하는 것이 그들에게 생명을 주는 힘을 단절시킨 것이라는 것으로 추측할 수 있었습니다. 독립적인 개별 생명체로서 생각할 수 없는 그들은 이제 목적이 없고, 우리의 관리에 전적으로 맡겨져 있습니다. 이들에 대해 더 많은 것을 알아내기 위해 과학자들은 빠르게 행동해야 할 것입니다."
 mem_hive_encounter.10.name:0 "군체 드론으로부터의 조사"
 mem_hive_encounter.10.desc.a:0 "우리 과학자들은 [mem_hive_encounter_hive_country.GetSpeciesAdj] 드론의 상태가 사망으로 판별될 정도로 악화되기 전에 최선을 다해 분석했습니다. 개별 드론을 벌집에 연결하고 벌집이 이를 제어할 수 있게 하는 사이오닉 연결이 존재하는 것으로 보입니다. 관찰할 수 없는 현상을 연구하는 데 내재된 어려움에도 불구하고 - 우리는 연결을 재활성화할 수 없었습니다 - 우리 과학자들은 그 본질과 [mem_hive_encounter_hive_country.GetName]에 대한 이해에서 어느 정도 진전을 이루었습니다. 그들은 연결을 설정하는 데 사용되는 뇌의 부분을 정확히 찾아냈지만, 그 기능에 대한 가설은 대부분 추측에 불과합니다.\n\n그들은 [mem_hive_encounter_hive_country.GetSpeciesAdj] 드론이 본질적으로 독립적인 사고를 할 수 없다고 믿지 않습니다 - 그들의 신경 구조에는 이를 방해할 만한 것이 없어 보이지만, 이를 방지하기 위한 강인한 억제가 존재합니다 - 제공된 표본들이 단순히 이를 지원할 만큼 발달하지 않았던 것으로 보입니다. 오히려, 그들은 준지성체와 유사하지만, 말할 수 있는 생존 본능이 없습니다.\n\n시간이 지나면, 우리 과학자들은 [mem_hive_encounter_hive_country.GetSpeciesNamePlural]를 연결하는 사이오닉 링크를 생성하거나 제거할 수 있는 능력을 갖게 될 것이라고 믿습니다. 이는 효과적으로 독립적인 개별 [mem_hive_encounter_hive_country.GetSpeciesNamePlural]를 생성할 수 있게 해줄 것입니다. 그러나 그 날은 먼 미래에 있습니다. 그동안 생물학과 외계 유전학의 기초에 대한 우리의 이해는 발전했습니다. 또한, [mem_hive_encounter_leader.GetName]는 사이오닉에 대한 새로운 관심을 발견했습니다."
 mem_hive_encounter.10.desc.b:0 "우리 과학자들은 [mem_hive_encounter_hive_country.GetSpeciesAdj] 드론을 가능한 한 최선을 다해 분석했습니다. 그러나 드론의 상태가 악화되어 사망으로 판별될 때까지였습니다. 드론 개체를 벌레집에 묶어주고 벌레집이 이를 제어할 수 있게 하는 사이오닉 연결이 있는 것으로 보입니다. 그러나 이 연결이 비활성 상태였기 때문에, 우리 과학자들은 이를 연구하기 어려웠고, 그 부재에서 발생하는 일에 대해 더 많은 것을 알게 되었습니다. 그들은 [mem_hive_encounter_hive_country.GetSpeciesAdj] 드론이 본질적으로 독립적인 사고를 할 수 없는 것은 아니라고 믿고 있습니다. 그들의 신경 구조에는 이를 방해할 만한 어떤 것도 없어 보이지만, 이를 방지하기 위한 강인한 억제가 존재합니다. 그러나 제공된 샘플들은 이를 지원할 만큼 충분히 발달하지 않은 것으로 보입니다. 오히려 그들은 준지성체와 유사하지만, 말할 수 있는 생존 본능이 없습니다.\n\n우리 과학자들은 시간이 지나면 [mem_hive_encounter_hive_country.GetSpeciesNamePlural]를 묶고 있는 사이오닉 연결을 생성하거나 제거할 수 있는 능력을 갖게 될 것이라고 믿고 있습니다. 이는 독립적인 개별 [mem_hive_encounter_hive_country.GetSpeciesNamePlural]를 생성할 수 있게 해줄 것입니다. 그러나 그 날은 먼 미래에 있습니다. 그동안 생물학과 외계 유전의 기초에 대한 우리의 이해는 고급화되었습니다."
 mem_hive_encounter.10.a:0 "훌륭해."
 mem_hive_encounter.11.name:0 "손님"
 mem_hive_encounter.11.desc:0 "우리가 동의한 대로 지원자 [mem_hive_encounter_normal_country.species.GetName] 표본을 [mem_hive_encounter_normal_country.GetName](으)로 돌려보낼 시간이 되었습니다. 물론, 우리는 추가 연구를 위해 약속을 어기고 지원자들을 돌려보내지 않을 수도 있지만, [mem_hive_encounter_normal_country.species.GetNamePlural]은(는) 이에 대해 불편해할 것입니다!"
 mem_hive_encounter.11.a:0 "다시 돌려보내라."
 mem_hive_encounter.11.b:0 "돌려보내지 마라."
 mem_hive_encounter.12.name:0 "지원자 귀환"
 mem_hive_encounter.12.desc:0 "우리가 [mem_hive_encounter_hive_country.GetName]에 보냈던 자원봉사자들이 돌아왔습니다. 그들은 "눈을 뜨게 해주는" 경험을 통해 "시야가 넓어졌다"고 주장합니다. 그 의미가 무엇이든 간에, 모든 보고에 따르면 [mem_hive_encounter_hive_country.GetSpeciesNamePlural]는 훌륭한 호스트였던 것 같습니다. 자원봉사자들은 확실히 더 익숙한 환경으로 돌아온 것에 기쁘게 생각하고 있습니다!"
 mem_hive_encounter.12.a:0 "좋은 소식이군."
 mem_hive_encounter.13.name:0 "지원자 구금!"
 mem_hive_encounter.13.desc:0 "[mem_hive_encounter_hive_country.GetName]는 우리가 보낸 자원봉사자들을 반환하겠다는 약속된 날짜가 지나도 반환하지 않기로 했습니다. 그들은 연구를 완료하는 데 더 많은 시간이 필요하다고 주장하며, 이는 유기체의 중대한 안전 문제이기 때문에 이전 합의에 얽매이지 않는다고 느낍니다."
