l_korean:
 giga_dialog.40041.desc:0 "[From.From.GetName] 다이슨 스피어 구축 작업이 계속되었고, 고급 항성 에너지 수확기를 더 설치함으로써 다이슨 스피어의 산출량을 더욱 증가시켰습니다.\n\n에너지 획득량은 예상 최대값의 50%에 도달했습니다."
 giga_dialog.40042.desc:0 "또 다른 일련의 항성 에너지 수확 패널을 추가함으로써, [From.From.GetName] 성계의 다이슨 스피어 건설이 거의 완료되었습니다.\n\n이제 이 크기의 별의 예상 최대 출력량의 75%를 생산하고 있습니다.\n\n곧 별 자체의 전체 에너지를 우리 손끝에서 사용할 수 있을 것입니다."
 giga_dialog.101.name:0 "$name_kugelblitz$ 건설지 완성"
 giga_dialog.101.desc:0 "[giga_system.GetName] 성계의 $name_kugelblitz$의 건설 현장이 완성되었습니다. 물질이 아닌 복사 에너지로 이뤄진 블랙홀인 인공 쿠겔블리츠를 건설하는데 필요한 인력과 장비가 포함되어 있습니다! 우리는 에너지와 물질을 쿠겔블리츠로 주입해 추후 필요에 따라 추출하여 다시 물질로 전환할 수 있는 매우 효율적인 저장소로 사용할 수 있습니다."
 giga_dialog.101.a:0 "훌륭해."
 giga_dialog.102.name:0 "$name_kugelblitz$ 완성"
 giga_dialog.102.desc:0 "우리의 공학자들은 인공 쿠겔블리츠를 생성할 수 있는 대형 장치를 완성했습니다."
 giga_dialog.102.a:0 "좋아."
 giga_dialog.103.name:0 "쿠겔블리츠 생성됨!"
 giga_dialog.103.desc:0 "우리의 $name_kugelblitz$가 성공적으로 인공 쿠겔블리츠를 생성했습니다. 현재 가속된 호킹 복사를 통해 에너지를 공급하고 있으며 이제 물질과 에너지를 복사 에너지 형태로 보관할 수 있습니다!"
 giga_dialog.103.a:0 "위대한 업적이다."
 giga_dialog.106.name:0 "쿠겔블리츠 정제!"
 giga_dialog.106.desc:0 "우리 $name_kugelblitz$가 [giga_planet.GetName] 상공에서 성공적으로 업그레이드되었습니다! 이미 [giga_system_owner.GetName] 곳곳의 저장고들은 인공 특이점의 증가한 수용량을 활용하기 위해 내용물을 비우고 [giga_planet.GetName]으로 운송하기 시작했습니다."
 giga_dialog.106.a:0 "위대한 업적이다."
 giga_dialog.107.name:0 "거대한 창고"
 giga_dialog.107.desc:0 "우리 $name_kugelblitz$가 [giga_planet.GetName] 근처에서 4차원 기술의 최신 발전 수준까지 완전히 업그레이드되었습니다. 구조물 핵심의 인공 특이점은 이미 기반이 된 소천체를 거의 넘어설 정도로 성장했습니다.\n\n이러한 구조물이 있다면 이전에는 거의 불가능하다고 여겨졌을 양의 원자재와 정제 상품을 저장할 수 있습니다. 산출 예측에 따르면 쿠겔블리츠가 안정 수용량까지 채워지려면 수년이 걸릴 수도 있습니다."
 giga_dialog.107.a:0 "참으로 놀랍군!"
 giga_dialog.104.name:0 "폐허가 된 $name_kugelblitz$"
 giga_dialog.104.desc:0 "우리의 과학선은 [from.GetName]의 성계에서 특이한 광경을 발견했습니다. $name_kugelblitz$ 하나가 행성 주위를 공전하고 있는 것을 발견했습니다! 이 매우 발전된 구조물은 제어된 특이점을 수용하고 있으며, 대량의 에너지를 생성할 수 있습니다. 다만 안타깝게도 현재 끔찍한 상태에 빠져있습니다."
 giga_dialog.104.a:0 "매혹적이군."
 giga_dialog.105.name:0 "$name_kugelblitz$ 수리됨!"
 giga_dialog.105.desc:0 "망가진 $name_kugelblitz$가 이제 우리의 공학자들에 의해 정상 작동 상태로 되돌아왔습니다! 재활성화 즉시 이 구조물은 고질량의 제어된 특이점을 생성하기 시작했고, 다량의 에너지를 추출할 수 있을 뿐만 아니라 복사 에너지 형태로 물질을 보관할 수 있게되었습니다."
 giga_dialog.105.a:0 "어떻게 작동하는거지?"
 giga_dialog.1207.title:0 "$name_penrose$의 목적"
 giga_dialog.1207.a.desc:0 "[giga_system.GetName] 주위의 거울 프레임이 완성되었으므로, 이를 폭탄으로 사용하기 위한 준비를 시작할 수 있습니다.\n\n몇 년 동안은 에너지를 축적하여 기폭 준비를 해야합니다. 성계의 모든 것은 파괴될 것이며, 폭발은 매우 강력하여 하이퍼레인을 통해 번져나갈 것입니다. 이웃한 성계의 모든 행성들은 에너지의 격류로 인해 거주 불가능하게 될 것이며 두번의 점프 거리에 포함되는 모든 행성들이 방사능에 노출될 것입니다. 가장 중요한 것은 아공간을 통해 충격파가 전달되어 네번의 점프 거리에 포함되는 모든 초공간 항로를 방해하고 하이퍼레인을 재배치한다는 것입니다!"
 giga_dialog.1207.b.desc:0 "[giga_system.GetName] 주위의 거울 프레임이 완성되었으므로, 이를 에너지 생산을 위한 안정화 작업을 시작할 준비가 되었습니다.\n\n생산량은 보통 (250 £energy£)이지만, 적절한 기술이 있다면 안정화가 가능할 것입니다."
 giga_dialog.1207.a:0 "폭탄으로 만들어라."
 giga_dialog.1207.b:0 "에너지 발전에 사용하지."
 giga_dialog.3401.name:0 "$name_fusion_suppressor$ 건설 현장"
 giga_dialog.3401.desc:0 "미래의 $name_fusion_suppressor$의 건설 현장이 [giga_system.GetName] 성계에서 성공적으로 완공되었습니다. 그것은 항성 내부의 조작을 수행할 수 있는 $name_fusion_suppressor$를 건설하는 데 필요한 기반 시설을 수용 할 것입니다."
 giga_dialog.3401.a:0 "좋아."
 giga_dialog.3402.name:0 "중력 변조기 건설"
 giga_dialog.3402.desc:0 "우리의 공학자들은 [giga_system.GetName] 주변에 $name_fusion_suppressor$의 대규모 중력 변조기 구성을 완료했습니다. 이 거대한 부피의 장치는 인공 중력장을 생성하여 항성 전체를 압축하고 내부 융합 과정을 변경할 수 있습니다."
 giga_dialog.3402.a:0 "환상적이야."
 giga_dialog.3403.name:0 "항성 안정기 건설"
 giga_dialog.3403.desc:0 "[giga_system.GetName] 주위의 $name_fusion_suppressor$의 항성 안정기가 이제 완성되었습니다. 이로써 중력 조절기가 인공 중력장을 생성하는 동안 항성을 안정화시킬 수 있습니다. 이제, 별을 압축해서 결국 파괴하거나 블랙홀로 바꿔버릴 실제 과정을 시작해야할지도 모릅니다."
 giga_dialog.3403.a:0 "놀라워."
 giga_dialog.3404.name:0 "항성 압축 - I 단계"
 giga_dialog.3404.desc:0 "우리의 $name_fusion_suppressor$는 성공적으로 [giga_system.GetName]의 압축을 시작했습니다. 외관상 항성의 부피가 줄어들며 항성의 핵융합 과정이 바뀌기 시작했고 강력한 중력장이 생성되었습니다. 이것이 항성 플라스마에 미치는 영향은 $name_fusion_suppressor$의 다양한 연구소에서 연구되고 있습니다."
 giga_dialog.3404.a:0 "믿을 수 없군."
 giga_dialog.3405.name:0 "항성 압축 - II 단계"
 giga_dialog.3405.desc:0 "$name_fusion_suppressor$가 또다시 [giga_system.GetName](을)를 더욱 작은 부피로 압축했습니다. 항성 내부에서 흥미로운 현상이 일어나면서 대단한 과학적 성과를 얻어내었으며, 별이 반-물리학적 방식으로 반응하고 있습니다. 더 압축하면 더 많은 결과가 나올것입니다."
 giga_dialog.3405.a:0 "좋아."
 giga_dialog.3406.name:0 "항성 압축 - 중성자별"
 giga_dialog.3406.desc:0 "이제 $name_fusion_suppressor$가 [giga_system.GetName](을)를 항성의 핵 내부의 양성자와 전자가 서로 융합해 중성자가 되어 핵이 중성자별이 될 정도로 압축했습니다. 주위에 색다른 항성 플라스마 층이 둘러싸고 있습니다.\n\n이제 우리는 항성을 이 상태로 유지하여 물리학과 공학 연구를 생산할 수 있습니다. 아니면 항성을 더 압축하여 물리학 연구를 생산하는 인공 블랙홀로 만들 수도 있습니다. 마침내 $name_fusion_suppressor$는 모든 중력 압축을 제거하고 척력을 방출할 수 있습니다. 이 척력은 항성의 내부에 작용해 항성을 초신성으로 만들고 $name_fusion_suppressor$를 파괴하며 이 성계 행성의 표면에 강력한 건물을 건설하는데 사용될 수 있는 새로운 전략적 자원을 만들 것입니다."
 giga_dialog.3406.a:0 "훌륭해."
 giga_dialog.3407.name:0 "$name_fusion_suppressor$ 분해"
 giga_dialog.3407.desc:0 "[giga_system.GetName] 성계에 있는 $name_fusion_suppressor$이 완전히 해체되었습니다. 만들어진 블랙홀을 이제 사용할 수 있습니다."
 giga_dialog.3407.a:0 "환상적이야."
 giga_dialog.3409.title:0 "초신성"
 giga_dialog.3409.desc:0 "$name_fusion_suppressor$가 항성에 가하던 모든 중력장을 제거하고 음 중력장을 가하기 시작했습니다.\n수 초도 안되어서, 항성의 중성자핵 내부의 강력한 척력이 원래 있던 중력장을 뛰어넘었고, 갑자기 초밀도 항성의 비등 에너지가 날뛰기 시작했습니다.\n항성이 더 밝게 빛나기 시작했고 수 초간 맥동하는듯 했습니다. 직후 항성의 바깥층이 돌연 척력에 의해 빛에 가까운 속도로 튕겨져 나왔습니다. 수 시간 안에, 성계의 모든 행성이 엄청난 에너지의 파장으로 둘러싸여 행성의 표면과 대기를 찢어버렸습니다.\n새로운 용암 행성에 아이오디지움 매장층이 생겼고, 채집해 사용할 준비가 되었습니다."
 giga_dialog.3409.a:0 "놀랍군!"
 giga_dialog.3410.title:0 "블랙홀"
 giga_dialog.3410.desc:0 "$name_fusion_suppressor$가 인공 중력장을 최대치까지 강화합니다. 항성 자신의 중력으로 빛 조차 빠져나올 수 없는 지점까지 붕괴되고 사실상 블랙홀로 변화합니다. $name_fusion_suppressor$ 내부의 연구소가 인공 블랙홀을 연구하기 시작하여 막대한 과학적 데이터를 생산합니다."
 giga_dialog.3410.a:0 "멋지군!"
 giga_dialog.2502.title:0 "$name_alderson$ 건설 현장 완공!"
 giga_dialog.2502.desc:0 "우리 $name_alderson$의 건설 현장이 [giga_system.GetName] 시스템에서 완료되었습니다. 이 플랫폼은 구조물의 거대한 프레임을 건설하기 위한 전초 기지로 사용될 것이며, 이 시스템의 가장자리에까지 뻗어 나갈 것입니다."
 giga_dialog.2502.a:0 "아주 좋아."
 giga_dialog.2503.title:0 "$name_alderson$ 뼈대 완공!"
 giga_dialog.2503.desc:0 "우리 $name_alderson$의 시스템을 가로지르는 구조물이 이제 완공되었습니다! 이 거대한 금속 골격은 전체 시스템을 덮고 있으며, 실제 슬라이스를 건설하는 기초로 사용될 것입니다. 각 슬라이스는 15개의 구역을 가지며, 각 구역은 일반 링월드 구역의 4배 강력합니다. 완공되면, 이 강력한 구조물은 분명히 우리가 이 은하에서 가장 위대한 건축가가 될 수 있도록 해줄 것입니다."
 giga_dialog.2503.a:0 "하지만 어떻게 스스로 무너지지 않을까?"
 giga_dialog.2503.a.tooltip:0 "다차원 공학은 말 그대로 이 일의 전제조건입니다."
 giga_dialog.2504.title:0 "가이아 앨더슨 조각 완성!"
 giga_dialog.2504.desc:0 "$name_alderson$의 조각 중 하나가 드디어 완성되었습니다! 이 거대한 조각은 수 천문 단위에 걸쳐 있으며, 우리 인구와 산업에 엄청난 생활 공간을 제공할 것입니다. 심지어 광범위한 생태계와 기후 덕분에 사실상 은하계의 모든 종이 거주할 수 있습니다. 이럴 때가 아닙니다. 당장 작업을 시작하죠."
 giga_dialog.2504.a:0 "놀라워!"
 giga_dialog.25070.title:0 "$name_alderson$ 완료!"
 giga_dialog.25070.desc:0 "해냈습니다! [giga_system.GetName] 성계에서 우리는 항성에서 성계 가장자리까지 뻗는 거대한 원반을 완전히 조립하는 데 성공했습니다. 이 거대한 기가구조물은 우리가 이전에 만든 그 무엇보다도 압도적이며, 물리학과 공학 법칙에 대한 우리의 궁극적 지배를 증명하는 증거로 우뚝 서 있습니다."
 giga_dialog.25070.a:0 "이제 누가 우리에게 맞서겠는가?"
 giga_dialog.25071.title:0 "$name_alderson$ 완성! 기원 보유"
 giga_dialog.25071.desc:0 "해냈습니다! [giga_system.GetName] 성계에서 우리는 항성에서 성계 가장자리까지 뻗는 거대한 원반을 완전히 조립하는 데 성공했습니다. 이 거대한 기가구조물은 우리가 이전에 만든 그 무엇보다도 압도적이며, 물리학과 공학 법칙에 대한 우리의 궁극적 지배를 증명하는 증거로 우뚝 서 있습니다."
 giga_dialog.25071.a:0 "이제 누가 우리에게 맞서겠는가?"
 giga_dialog.3301.name:0 "$name_auto_stripmine$ 건설 현장 완성"
 giga_dialog.3301.desc:0 "우리의 공학자들이 [giga_system.GetName] 근처에 미래의 $name_auto_stripmine$을 위한 건설 현장 조립을 완료했습니다.이 거대한 궤도 플랫폼은 행성 주위에서 행성의 거의 모든 광물을 채굴하게될 거대 채굴 단지을 건설하는데 필요한 모든 것을 지니고 있습니다."
 giga_dialog.3301.a:0 "훌륭해."
 giga_dialog.3302.name:0 "$name_auto_stripmine$ 궤도장치 건설됨"
 giga_dialog.3302.desc:0 "우리의 $name_auto_stripmine$의 궤도장치가 이제 완성되었습니다. 이 거대한 구조물은 두 개의 큰 견인 광선이 있는데, 채굴된 대량의 광물을 위로 견인하고 표면을 강한 에너지 광선으로 녹여 행성의 일부를 채굴할 수도 있습니다. 또한 가공 고리와 결합하여 광물 생산량을 더욱 향상시킬 수 있습니다. 이제 우리는 수백만 개의 로봇 드릴 팔이 달린 행성측 시설의 건설을 완료하여 노천광 드릴 작업을 시작해야합니다."
 giga_dialog.3302.a:0 "놀랍군!"
 giga_dialog.3303.title:0 "행성 노천광 채굴"
 giga_dialog.3303.desc:0 "우리의 $name_auto_stripmine$이 성공적으로 작동했습니다! 거대한 궤도 견인 광선이 수 천개의 방대한 채굴 단지에서 행성의 광물을 채굴하고 수집하는 수 백만개의 자동 로봇 드릴 덕분에, 엄청난 양의 광물을 견인하고 있습니다.\n\n몇 십년 정도가 걸릴거라 예상하는데, 행성의 내핵에 도달하고 무든 광물이 채굴되면 채굴 작업이 중지될 것입니다."
 giga_dialog.3303.monster.desc:0 "우리의 $name_auto_stripmine$이 성공적으로 작동했습니다! 거대한 궤도 견인 광선이 수 천개의 방대한 채굴 단지에서 행성의 광물을 채굴하고 수집하는 수 백만개의 자동 로봇 드릴 덕분에, 엄청난 양의 광물을 견인하고 있습니다.\n\nThe previous inhabitants of [giga_planet.GetName] failed to escape the activation of the structure in time. They will likely be gathered as if they were nothing but rocks and added to the $name_auto_stripmine$'s output.\n\n몇 십년 정도가 걸릴거라 예상하는데, 행성의 내핵에 도달하고 모든 광물이 채굴되면 채굴 작업이 중지될 것입니다."
 giga_dialog.3303.a:0 "광물 생산량 정상."
 giga_dialog.3303.b:0 "정말로 무섭네요... 그들에게 말이에요."
 giga_dialog.3304.title:0 "외핵에 도달한 행성 채굴 장치"
 giga_dialog.3304.desc:0 "[giga_planet.GetName]의 $name_auto_stripmine$에 배치된 우리 공학자와 과학자들이 채굴 작업이 행성의 용암 외핵에 도달했다고 알립니다.\n이는 대략 6년 뒤, 내핵에 도달하면 광물 채굴 작업이 중지되리라는 것을 의미합니다."
 giga_dialog.3304.a:0 "알겠다."
 giga_dialog.3305.title:0 "행성 고갈"
 giga_dialog.3305.desc:0 "[giga_planet.GetName]의 $name_auto_stripmine$이 더 이상 채굴할 광물이 없습니다. [giga_planet.GetName](은)는 우주의 추운 공간에 내버려진 작은 용암 핵으로 줄어들었습니다. 핵에 남아있는 광물은 고급 수압파쇄 기술을 통해 추출되었습니다. 이제 찌꺼기들과 간신히 활용할만한 물질만이 남아있습니다. 궤도장치는 해체되었고 이제 행성의 핵에 광물 매장지가 존재합니다."
 giga_dialog.3305.a:0 "피할 수 없는 일이다."
 giga_dialog.3306.name:0 "행성 노천광산에서 자원이 발견됨"
 giga_dialog.3306.desc.minerals:0 "[fromfrom.GetName] $name_auto_stripmine$에서 상당히 큰 광맥이 발굴했습니다. 이 광맥은 궤도 상의 $name_auto_stripmine$의 £minerals£§Y광물§! 생산량을 상당히 높혀줄 것입니다.\n\n이는 행성의 다른 [from.gigas_stripmine_rich_mineral_deposit_length] 층 동안 지속될 것입니다."
 giga_dialog.3306.desc.alloys:0 "[fromfrom.GetName] $name_auto_stripmine$에서 특이하게 밀도가 높은 맨틀을 발견했습니다. 이 특히 밀도가 높은 지각의 일부는 £alloys£§Y합금§!과 구조적으로 매우 유사하여 정제된 재료를 직접 채굴할 수 있게 해줍니다. 그러나 함선 용으로 적합한 강력한 방어재를 채굴하는 것은 간단한 작업이 아니며, 이 밀도가 높은 광맥에 중점을 두면 £minerals£§Y광물§! 생산이 느려질 것입니다.\n\n밀도가 높은 재료가 고갈되기 전에 행성의 또 다른 [from.gigas_stripmine_alloy_deposit_length] 층을 제거할 수 있다고 추정됩니다."
 giga_dialog.3306.desc.gas:0 "[fromfrom.GetName] $name_auto_stripmine$가 넓은 동굴을 파괴했는데, 거기에는 고압의 £exotic_gases£§Y외계 가스§!가 가득했습니다! 지표의 드론들은 이 귀중한 가스를 추출할 수 있습니다. 그러나 가스 수확을 위해 드론을 할당하면 £minerals£§Y광물§! 생산이 느려질 것입니다.\n\n이러한 동굴이 없어지기 전까지는 행성의 [from.gigas_stripmine_gas_deposit_length] 층을 예상합니다."
 giga_dialog.3306.desc.motes:0 "[fromfrom.GetName] $name_auto_stripmine$에서 강한 휘발성을 띄는 화합물을 발견했습니다. 이러한 물질은 약간의 정제를 거쳐 £volatile_motes£§Y불안정 분말§!의 용도로 사용할 수 있습니다. 그러나 이 노다지를 이용할 때의 화합물의 우연한 발화를 피하기 위해 채광 작업을 늦춰야 하므로 £minerals£§Y광물§! 생산이 느려질 것입니다.\n\n행성의 [from.gigas_stripmine_motes_deposit_length] 층 이후에 이 화합물이 다 고갈될 것으로 보입니다."
 giga_dialog.3306.desc.crystals:0 "[fromfrom.GetName] $name_auto_stripmine$가 결정체로 가득찬 동굴을 발견했습니다. 적절한 정화와 처리를 통해 이 결정의 조각들을 유용한 £rare_crystals£§Y희귀 크리스탈§!로 변환할 수 있습니다. 그러나 이 동굴은 불안정하며 결정을 손상시키지 않고 해체하기 위해서는 섬세한 작업이 필요하기에 £minerals£§Y광물§! 생산이 느려질 것입니다.\n\n동굴은 행성의 다른 [from.gigas_stripmine_crystal_deposit_length] 층 뒤에 더 존재할 것으로 예상됩니다."
 giga_dialog.3306.desc.tensiles:0 "[fromfrom.GetName] $name_auto_stripmine$에서 정말로 놀라운 것과 맞닥뜨렸습니다. 행성의 특이한 부분이 '비어있는' 것으로 나타났는데, 이 공간은 자연적으로 발생한 £giga_sr_amb_megaconstruction£§Y초인장 소재§! 덕분에 중력의 힘에 저항하고 있습니다. 이 동공은 £minerals£§Y광물§!의 생산량을 낮출 것이지만, 자연적인 £giga_sr_amb_megaconstruction£§Y초인장 소재§!의 추정 수확량은 향후 거대 구조물 건설에 있어서 그야말로 값어치를 매길 수 없습니다.\n\n이 공간은 오래가지 않을 것으로 예상되며, 행성의 [from.gigas_stripmine_supertensile_deposit_length] 층 동안만 채광이 지속될 것입니다."
 giga_dialog.3306.desc.default:0 "[fromfrom.GetName] $name_auto_stripmine$이 행성 지표 깊숙한 곳에서 자원의 비정상적인 농축을 발견했습니다. 이러한 자원은 생산량을 증가시키는 데 매우 값지게 사용될 것으로 예상되지만, 이는 영원히 지속되지 않을 것입니다."
 giga_dialog.1901.name:0 "$name_succ$ 건설 현장 완성"
 giga_dialog.1901.desc:0 "[giga_system.GetName] 성계의 $name_succ_full$를 위한 건설 현장이 완성되었습니다! 이 발판 위에서 우리는 거대 가스 행성의 대기를 끊임없이 채집해 외계 가스로 여과하는 거대한 기계를 건설할 것입니다. 이 기계는 또한 대기에 존재하는 수소를 사용하는 핵융합 발전소 덕분에 에너지도 생산할 수 있습니다.\n\n언젠가는 행성이 말라서 불모 행성이 된다는 것을 명심하십시오."
 giga_dialog.1901.a:0 "그 줄임말을 떠올리는데 얼마나 걸렸지?"
 giga_dialog.1903.title:0 "$name_succ$ 작동!"
 giga_dialog.1903.desc:0 "[giga_system.GetName] 성계의 $name_succ$는 이제 작동하기 시작합니다! 견인 광선이 활성화되었고, 가스 행성의 대기는 지속적으로 수집되고 있습니다.\n\n우리의 과학자들에 따르면 수십 년내에 고갈될 것이라고 합니다."
 giga_dialog.1903.a:0 "놀랍군!"
 giga_dialog.1904.title:0 "$name_succ$ 고갈됨"
 giga_dialog.1904.desc:0 "우리 $name_succ_full$이(가) [giga_system.GetName] 시스템에서 거대 가스 행성의 암석 내부 핵에 도달했습니다. 더 이상 추출할 대기가 남아 있지 않으며, 이전의 거대 가스 행성은 작은 미네랄이 풍부한 불모 행성으로 축소되었습니다. 메가구조물 자체는 해체되었으며, 이제 핵을 원하는 방식으로 활용할 수 있습니다."
 giga_dialog.1904.a:0 "모든 것은 끝이 있지."
 giga_dialog.3001.name:0 "말도 안 되는 사각형"
 giga_dialog.3001.desc:0 "[from.GetName] 성계에는 이상한게 있습니다. 우리 과학자들은 성계의 별 주위를 도는 거대한 궤도 구조물을 보고 당황했습니다. 사실, 그것은 너무나도 우스꽝스러워서 장난이나 센서의 오류라고 추정했습니다.\n\n$name_ringworld_square$.\n\n[from.GetName] 성계 내에는 사각형 모양의 링 월드가 있습니다. 과거에 상당히 많은 피해을 입은 것으로 보이지만 구조적으로는 대부분 온전한 것으로 보입니다. 이 구조물의 이상한 모양은 우리가 알고있는 물리학과 공학을 무시합니다. 원래 같으면 중력이 수 천년 전에 이를 산산조각 내야 했기 때문입니다. 그러나 이것은 우리가 그에 대한 비밀을 밝혀내길 기다리며 유유히 떠 있습니다. 작은 버려진 기지가 별 위로 조용히 떠다니고 있으며, 우리 과학자들은 이곳에 독특한 구조에 대한 유용한 정보가 담겨있을 것이라 믿고 있습니다.\n이 구조물과 시설을 조사하여 비밀을 알아내기 위한 §S특별 프로젝트§!가 준비되어 있습니다."
 giga_dialog.3001.a:0 "정말 이상하군."
 giga_dialog.3002.name:0 "사각형의 신비"
 giga_dialog.3002.desc:0 "수십 차례의 탐험과 수개월의 연구 끝에 우리 과학자들은 마침내 스퀘어월드의 비밀을 뚫었다고 믿습니다.\n스퀘어월드의 외관은 심하게 손상되었지만, 내부는 대부분 온전하며 대부분의 내부 시스템은 실제로 작동했습니다! 골격은 대부분 믿을 수 없을 정도로 복잡한 자가 수리 장치로 채워진 매우 진보된 합금 '큐베린'으로 만들어져서 그것에 가해지는 엄청난 힘을 어떻게 견딜 수 있는지 설명 해줍니다.\n우리의 과학자들은 충분한 자원과 기술을 제공한다면 이것을 수리하는 것이 가능할 것이라고 믿습니다. 우리는 링 월드 내에서 많은 비활성화된 큐베린 제조 공장을 발견했는데, 향후 수리 중에 이 링 월드의 전원 공급 장치를 복구하면 다시 큐베린을 생산할 수 있을 것입니다.\n연구 팀도 별 위의 작은 기지가 스퀘어월드 내부 시스템에 일종의 '중앙 액세스 포인트' 역할을 한다는 결론을 내렸습니다. 그들은 우리가 방대한 내부 아카이브에 저장된 스퀘어월드 및 그 건설 기술에 대한 데이터에 접근할 수 있도록 자원을 할당하기를 장려했습니다. 그 데이터가 이 멋진 구조물을 복구하는 열쇠가 될 수 있습니다..."
 giga_dialog.3002.a:0 "놀랍군! 즉시 이 기지를 수리하도록."
 giga_dialog.3003.name:0 "스퀘어월드 복원됨!"
 giga_dialog.3003.desc:0 "우리 공학자들이 폐허가 된 스퀘어월드의 한 구획을 성공적으로 수리했다는 기쁜 소식을 전했습니다! 보조 회로에 전력이 복원되었으며, 큐베린은 첨단 에너지-물질 변환기를 갖춘 자동화된 공장에서 흘러나오고 있습니다. 많은 양의 큐베린이 구조와 토양에 있는 식물을 약간 너무 푸르게 만드는 이상한 현상을 일으켰지만, 그것 외에는 모든 것이 정상인 것으로 보입니다."
 giga_dialog.3003.a:0 "놀라워!"
 giga_dialog.3004.name:0 "스퀘어월드가 말하다"
 giga_dialog.3004.desc:0 "놀라운 소식입니다! 스퀘어월드 성계에서 기지를 수리하고 전력을 공급한 후, 기지와 스퀘어월드 자체에서 호스팅되는 고대의 잠든 AI가 깨어난 것 같습니다.\n기지로부터 복구된 자료에 따르면 §Y게릭스§!라는 이름의 이 AI는 분명히 스퀘어월드와 그 방대한 내부 시스템을 유지 관리 한 것으로 보입니다. 우리 연구팀이 가까스로 연락을 취했으며, 그것은 우리와 소통하는데 매우 열성적입니다."
 giga_dialog.3004.a:0 "창을 띄워라."
 giga_dialog.3005.name:0 "게릭스, 스퀘어월드의 관리인"
 giga_dialog.3005.desc:0 "아, 방문객 여러분! 최대 절전 모드에서 해제될 수 있도록 기지에 충분한 전력을 보내 주셔서 감사합니다. 현명한 지성체와 이야기한 지 오래되었습니다.\n\n저는 스퀘어월드의 방대한 데이터 아카이브를 유지 관리하는 인공지능인 게릭스이며, 제 창조자의 생김새를 따라 파충류 홀로그램의 외형을 취했습니다. \n\n어쨌든, 스퀘어월드의 유감스러운 상황에 사과드립니다. 저는 파충류 번식에 관한 흥미로운 다큐멘터리를 발견했고, 제 창조자를 더 잘 이해하기 위해 예비 전원을 사용하여 지난 120,000년 동안 연구해왔습니다. 불행하게도 그 사이에 스퀘어월드에 뭔가 엄청난 일이 일어난 것 같군요... 오, 좋습니다.\n\n이제 당신이 여기에 계시고 제 창조자는 오래전에 사라졌으므로 스퀘어월드의 데이터뱅크에 접근 할 수 있는 권한을 드릴 수 있을 겁니다. 의외로 대부분 손상되지 않았습니다."
 giga_dialog.3005.a:0 "그 데이터 뱅크에는 무엇이 있지?"
 giga_dialog.3005.a.response:0 "오, 많은 것들이 있지요. 제 창조자들은 그들이 알고 있던 다양한 제국과 종족, 과학적 지식, 그리고 가장 중요한 것인 그들의 신 §B큐비§!에 대한 많은 자료가 저장되어 있습니다.\n그들은 미래 세대가 혜택을 누릴 수 있도록 그것을 보존하기를 원했습니다. 음, 당신이 지금 여기 왔으니... 그 일이 성공했다고 봐야겠군요. 안타깝게도 그들은 더는 볼 수 없지만요..."
 giga_dialog.3005.b:0 "스퀘어월드는 얼마나 오래됐지?"
 giga_dialog.3005.b.response:0 "글쎄요, 별들의 위치로 미루어 볼 때, 이 구조물은 여러분 시간으로 약 120,000년 사이에 부서진 것으로 추정되지만, 그보다 훨씬 오래됐습니다.\n이건 약 567,000년 전에 저의 창조자들이 만들었고, 수천 년 동안 문명을 수용했습니다. 불행하게도 저는 연구에 완전히 몰두하고 있었기 때문에, 그들이 어떻게 되었는지는 잘 모르겠습니다. 가장 가능성이 높은 것은 그들의 문명이 이전의 다른 거대한 제국들과 마찬가지로 퇴폐로 인해 붕괴했거나 단순히 너무 오래되어 갈라졌을 거라 생각됩니다."
 giga_dialog.3005.c:0 "누가 스퀘어월드를 만들었고, 그 이유는 뭐지?"
 giga_dialog.3005.c.response:0 "제 창조자들이 말하길, 그들은 §R(데이터 손상 됨)§!라고 알려진 종족이었고, §R(데이터 손상 됨)§!이라고 알려진 비교적 큰 제국인 §R(데이터 손상 됨)§!\n\n그들은 믿을 수 없을 만큼 신앙심이 깊었고, 그들이 §B큐비§!라고 부르는 신을 숭배했습니다. 이 신은 그들의 종족이 수백만년에 걸쳐 진화하는 데 도움을 주었다고 하며, 많은 사람이 이 기하학적 모양의 완벽함이 §B큐비§!의 존재를 세상에 드러낼 방법이라고 생각했습니다.\n\n제 창조자들은 결국 놀라운 물질을 발견했습니다. 그것은 타의 추종을 불허하는 엄청난 자가 수리 특성을 보유하고 있었고, 그들은 이 물질이 §B큐비§!에 의해 만들어졌다고 믿었기 때문에 '큐베린'이라고 불렀습니다. 그리고 그것을 §B큐비§!에 대한 경배와 감사의 표시로 바치기 위한 방법으로 물리학을 무시하는 이 멋진 기하학적 구조를 구축하는데 사용하기로 결정했습니다.\n\n또한 그들은 과학적 진보에 대한 많은 자료, 큐베린, 스퀘어월드 및 §B큐비§!를 데이터 뱅크에 추가했는데, 이는 미래의 문명의 전능한 §B큐비§!를 알게 되기를 바라는 마음에서였습니다."
 giga_dialog.3005.d:0 "우리가 스퀘어월드를 수리할 수 있을까?"
 giga_dialog.3005.d.response:0 "다행히도 그렇습니다! 아카이브에는 스퀘어월드의 내부 및 외부 구조에 대한 많은 자료가 포함되어 있습니다. 이 모든 것을 정리할 수 있도록 몇 달만 시간을 주신다면, 저는 당신의 과학자들에게 구조물을 수리하는 데 필요한 모든 정보가 담긴 데이터 캐시를 드릴 수 있습니다. 저 또한 이전의 영광을 되찾은 스퀘어월드가 보고 싶군요!"
 giga_dialog.3005.e:0 "안녕."
 giga_dialog.3005.e.response:0 "아카이브가 당신에게 도움이 되기를 바랍니다. 알고 싶은 것이 있다면 주저하지 말고 연락해주십시오."
 giga_dialog.3006.name:0 "아카이브"
 giga_dialog.3006.desc:0 "우리가 로그 오프하기 직전에, §Y게릭스§!가 2년 안에 스퀘어월드를 수리하는데 필요한 모든 정보를 담은 데이터 캐시를 우리에게 보내겠다고 약속했습니다. 그동안 우리는 스퀘어월드 허브의 거대 구조물을 '업그레이드'하여 그에게 다시 연락할 수도 있습니다. 우리 과학자들은 스퀘어월드의 데이터 뱅크를 쉽게 탐색할 수 있는 그의 능력이 우리 연구에 큰 도움을 줄 수 있을 거라고 생각합니다."
 giga_dialog.3006.a:0 "그렇겠지."
 giga_dialog.3007.name:0 "게릭스, 스퀘어월드의 관리인"
 giga_dialog.3007.desc:0 "다시 한번 인사드립니다. 스퀘어월드를 수리하는 데 필요한 모든 정보가 담긴 데이터 캐시 작성을 완료했습니다! 즉시 과학자들에게 전달하겠습니다."
 giga_dialog.3007.a:0 "훌륭해! 우리는 이 지식을 잘 활용할 것이다."
 giga_dialog.3008.name:0 "게릭스, 스퀘어월드의 관리인"
 giga_dialog.3008.desc:0 "아, 반갑습니다! 아카이브에서 더 많은 자료를 찾으러 오셨습니까? 어떻게 도와드릴까요?"
 giga_dialog.3008.a:0 "우리의 연구를 도와줄 수 있나?"
 giga_dialog.3008.c:0 "화면을 종료해라."
 giga_dialog.3009.name:0 "게릭스, 스퀘어월드의 관리인"
 giga_dialog.3009.desc:0 "아 그럼요! 유용한 자료를 찾기 위해 스퀘어월드의 아카이브를 확인할 수 있습니다. 어떤 종류의 자료를 검색 하시겠습니까?"
 giga_dialog.3009.a:0 "일반 £physics_research£ §Y물리학 연구§!"
 giga_dialog.3009.a.response:0 "좋습니다! 저는 귀하의 [GetPhysicistSwapPluralWithIcon]에 대한 데이터를 수집하겠습니다. 이는 해당 분야의 연구 속도를 §Y10% 증가§!시키지만, 대신 §Y+5% §!$physicist_type_plural_with_icon$의 비용이 발생합니다.\n\n다른 분야를 강화하고 싶으시면 저에게 다시 연락하시고 다른 옵션을 선택하시면 됩니다."
 giga_dialog.3009.b:0 "일반 £society_research£ §YSociety Research§!"
 giga_dialog.3009.b.response:0 "좋습니다! 저는 귀하의 [GetBiologistSwapPluralWithIcon]에 대한 데이터를 가져오겠습니다. 이는 해당 분야의 연구 속도를 §Y10% 증가§!시키는 대신 §Y+5% §!$biologist_type_plural_with_icon$의 비용이 발생합니다..\n\n다른 분야를 강화하고 싶으시면 다시 저에게 연락하시고 다른 옵션을 선택해 주십시오."
 giga_dialog.3009.c:0 "일반 £engineering_research£ §Y공학 연구§!"
 giga_dialog.3009.c.response:0 "좋습니다! 귀하의 [GetEngineerSwapPluralWithIcon]에 대한 데이터를 수집하겠습니다. 이는 해당 분야의 연구 속도를 §Y10% 증가§! 시키는 대신 §Y+5% §!$engineer_type_plural_with_icon$의 비용이 발생합니다..\n\n다른 분야를 강화하고 싶으시면 다시 연락 주시고 다른 옵션을 선택해 주십시오."
 giga_dialog.3009.d:0 "신경 쓰지 마라, 우리 연구를 돕지 않아도 돼."
 giga_dialog.3009.d.response:0 "좋습니다, 연구 지원을 그만두죠. 그게 당신이 원하는 거라면..."
 giga_dialog.13701.name:0 "거대 구조물 관리"
 giga_dialog.13701.desc:0 "[fromfrom.GetName]에 새롭게 건설된 [from.GetName]에는 추가 옵션을 조절할 수 있는 버튼이 거대 구조물 UI의 우상단에 있습니다. \n\n이와 같은 버튼을 사용할 수 있는 다른 거대 구조물을 찾아보세요. [from.GetName](은)는 이러한 추가 옵션을 가진 유일한 거대 구조물이 아닙니다.\n\n이 메시지는 한 번만 표시됩니다."
 giga_repeatables.001.name:0 "킬로구조물 수용량 증가"
 giga_repeatables.001.desc:0 "거대공학의 발전에 따라 기술자들이 현대적 기법을 우리의 건설 방식에 적용했고, 그 결과 더 많은 킬로구조물을 건설하고 유지할 수 있게 되었습니다."
 giga_repeatables.001.a.name:0 "$SPLENDID$"
 giga_kilo_cap_increased:0 "§Y해당 킬로구조물의 수용량이 2 증가합니다.§!"
 giga_dialog.25070.b:0 "우리 조상들은 자랑스러워하실 것입니다."
 giga_dialog.25070.gestalt.b:0 "우리는 우리의 기원을 초월했습니다."
 giga_dialog.3001.gestalt.desc:0 "[from.GetName] 항성계에는 이상한 구조물이 있습니다. 우리의 계산기는 이 거대한 궤도 설치물이 항성계의 별을 돌고 있는 모습을 보고 당황해 있습니다. 사실, 이 구조물은 너무 터무니없어서 변칙적인 파괴 행위나 우리의 감지기에 나타난 이상 현상으로 간주되었습니다.\n\n$name_ringworld_square$.\n\n[from.GetName] 항성계 내에는 정사각형 모양의 링월드가 있습니다. 과거에 상당한 피해를 입은 것으로 보이지만, 여전히 대부분 구조적으로 온전한 것 같습니다. 이 구조물의 이상한 형태는 우리가 알고 있는 물리학과 공학의 모든 것을 무시하며, 중력이 수천 년 전 이 구조물을 부숴버렸어야 합니다. 그럼에도 불구하고, 여기에는 여전히 가만히 서서 그 비밀을 밝혀줄 무언가를 기다리고 있습니다.\n\n작고 대부분 버려진 정거장도 별 위에서 조용히 떠 있으며, 우리의 계산기는 이 특이한 구조물에 대한 유용한 정보를 포함하고 있을 것이라고 믿고 있습니다.\n\n이 구조물과 정거장을 조사하기 위해 §SSpecial Project§!가 발행되어 이 구조물이 어떻게 여전히 존재하는지 알아내려 하고 있습니다."
 giga_dialog.3002.gestalt.desc:0 "수십 차례의 탐사와 몇 달 간의 연구 끝에, 우리의 계산기들은 드디어 이 정사각형 세계의 신비를 파헤쳤다고 믿고 있습니다.\n\n정사각형 세계의 외부는 심각하게 손상되었지만, 내부는 대부분 온전하며 대부분의 내부 시스템은 실제로 작동하고 있습니다! 그 구조는 주로 고급 합금인 큐베린으로 만들어져 있으며, 믿을 수 없을 만큼 복잡한 자기 수리 전자 장치가 내장되어 있어, 엄청난 힘을 견딜 수 있는 이유를 설명합니다.\n\n우리의 공학 드론들은 충분한 자원과 고급 기술이 주어진다면 이 물체를 수리할 수 있을 것이라고 믿고 있습니다. 우리는 링 월드 내에서 비활성화된 여러 큐베린 제조 공장을 탐지했으며, 미래의 수리 중 이 링 월드의 전력 공급을 복원하면 다시 큐베린을 생산하기 시작할 수 있습니다.\n\n연구 팀은 또한 별 위의 작은 정거장이 정사각형 세계의 내부 시스템에 대한 '중앙 접근 지점' 역할을 한다고 결론지었습니다. 그들은 집단에게 에너지 크레딧과 합금을 사용하여 이를 수리하고 이후 재가동할 것을 권장하며, 이는 정사각형 세계와 그 건설자에 대한 귀중한 데이터에 접근할 수 있게 해줄 수 있습니다. 해당 데이터는 이 놀라운 구조물을 수리하는 열쇠가 될 수 있습니다..."
 giga_dialog.3003.gestalt.desc:0 "우리 공학자들은 파괴된 스퀘어월드의 한 구역이 성공적으로 수리되었다고 보고했습니다! 보조 회로에 전원이 복구되었고, 고급 에너지-물질 변환기가 장착된 자동화된 공장에서 큐베린이 흐르고 있습니다. 구조물과 토양에 있는 대량의 큐베린은 식물들을 다소 지나치게 푸르게 만드는 이상한 효과를 주었지만, 그 외에는 모든 것이 완전히 정상으로 보입니다."
