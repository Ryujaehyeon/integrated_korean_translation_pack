l_korean:
 policy_pd_terraforming:0 "Terraforming"
 policy_pd_terraforming_desc:0 "우리는 우리의 과학자들이 행성 테라포밍에 접근 방식에 대해 결정할 수 있습니다."
 pd_choose_every_planet_terraforming_name:0 "모든 생물군계 선택"
 pd_choose_every_planet:0 "모든 생물군계 선택"
 pd_choose_every_planet_desc:0 "각 테라포밍 프로젝트가 끝날 때마다 생태계 선택에 대한 결정을 내릴 수 있습니다."
 pd_same_as_homeworld_terraforming_name:0 "모국 행성 동질적"
 pd_same_as_homeworld:0 "모국 행성 동질적"
 pd_same_as_homeworld_desc:0 "적절한 행성은 모두 같은 종류로 테라포밍되며, 나머지는 무작위 종류로 테라포밍됩니다."
 pd_random_same_class_terraforming_name:0 "무작위 유사 생물군계"
 pd_random_same_class:0 "무작위 유사 생물군계"
 pd_random_same_class_desc:0 "같은 행성 그룹 내의 생물 군계 중 하나를 무작위로 선택합니다."
 climate_superhabitables:0 "Superhabitable"
 climate_cavern:0 "Cavern"
 climate_tidallyocked:0 "조석 고정"
 climate_continental:0 "대륙"
 climate_ocean:0 "해양"
 climate_tropical:0 "열대"
 climate_desert:0 "사막"
 climate_arid:0 "Arid"
 climate_savannah:0 "초원"
 climate_arctic:0 "극지"
 climate_alpine:0 "고산"
 climate_tundra:0 "동토"
 building_megalfora_mine:0 "거대식물 뿌리 광산"
 building_megalfora_mine_desc:0 "거대식물 나무는 지각 깊은 곳까지 뿌리를 내리고 있어, 채굴하기 어려운 광물 매장지가 드러납니다."
 building_megalfora_lab:0 "거대식물 연구소"
 building_megalfora_lab_desc:0 "거대식물 나무와 주변 숲의 독특한 구조에서 배울 수 있는 것은 많습니다."
 building_megalfora_grid:0 "거대식물 수액 추출기"
 building_megalfora_grid_desc:0 "거대식물 나무의 수액은 에너지가 풍부하며 나무에 부정적인 영향을 주지 않고도 추출할 수 있습니다. 이러한 수액은 우리의 에너지 생산량을 개선시켜줍니다."
 building_petrified_mine:0 "석화 광산 운영"
 building_petrified_mine_desc:0 "행성에 풍부한 화석화된 목재 덕분에 광물에 쉽게 접근할 수 있습니다."
 building_petrified_guild:0 "석화된 목재 작업장"
 building_petrified_guild_desc:0 "석화된 나무의 희귀한 조성은 놀라운 소비재를 가능하게 합니다."
 building_petrified_lab:0 "석화 연구 네트워크"
 building_petrified_lab_desc:0 "행성의 격동의 과거는 풍부한 연구 기회를 제공합니다."
 building_reef_lab:0 "암초 바다 연구 센터"
 building_reef_lab_desc:0 "독특한 암초 구조와 풍부한 생물 다양성 덕분에 특별한 무언가를 발견할 수 있습니다."
 building_reef_guild:0 "암초 직공 단체"
 building_reef_guild_desc:0 "새롭고 아름다운 소비재를 만드는데 사용되는 암초입니다."
 building_reef_mine:0 "암초 광업 협회"
 building_reef_mine_desc:0 "채굴 가능하고 광물이 풍부한 암초 덕분에 행성의 광물 생산량이 상승합니다."
 building_archipelago_foundry:0 "군도 용암 주조소"
 building_archipelago_foundry_desc:0 "풍부한 화산 활동이 우리의 주조소를 크게 개선할 수 있습니다."
 building_archipelago_farm:0 "군도 화산 농업"
 building_archipelago_farm_desc:0 "화산 토양의 높은 함량은 농업 수확량을 향상시키는 데 사용될 수 있습니다."
 building_archipelago_resort:0 "군도 해변 리조트 네트워크"
 building_archipelago_resort_desc:0 "많은 섬들이 아름답고 안전하여 이상적인 리조트와 스파를 제공합니다."
 building_biolumen_lab:0 "생물 발광 연구소"
 building_biolumen_lab_desc:0 "생물 발광 정글은 놀라운 다양성의 독특한 생명체로 가득 차 있으며, 아직 발견되지 않은 의학적 및 산업적 발견으로 가득 차 있습니다."
 building_biolumen_resort:0 "생물 발광 행성 리조트"
 building_biolumen_resort_desc:0 "생물 발광 정글은 아름답습니다. 이 리조트 시스템은 생물 발광 식물의 따뜻한 빛 아래에서 누구나 원하는 모든 것을 제공합니다."
 building_biolumen_farm:0 "생물 발광 농업 네트워크"
 building_biolumen_farm_desc:0 "이곳에서 발달한 식물 생명체의 풍부함은 우리의 농부들이 생물 발광 작물을 활용할 수 있게 하여 이 행성에서 농업을 더욱 효율적으로 만듭니다."
 building_geothermal_grid:0 "지열 발전망"
 building_geothermal_grid_desc:0 "이 행성의 강력한 지열 활동에 우리의 전력망을 연결함으로써 기술자들의 생산량을 증가시킬 수 있습니다."
 building_geothermal_foundry:0 "지열 슬러리 여과기"
 building_geothermal_foundry_desc:0 "지열 슬러리는 희귀하고 귀중한 자원으로 가득 차 있으며, 적절한 필터링을 통해 이를 정제하여 우리의 주조소 생산량을 향상시킬 수 있습니다."
 building_geothermal_lab:0 "지열 공학 부서"
 building_geothermal_lab_desc:0 "지극히 활발한 지열 활동과 극단적인 온도 차로 인해 공학자들은 일반적인 공학 문제에 독특한 해결책을 적용해야 합니다."
 building_salt_lab:0 "소금 시험 연구소"
 building_salt_lab_desc:0 "이 행성의 희귀한 소금 형성물은 많은 산업적 및 기술적 용도로 활용될 수 있으며, 이를 연구함으로써 이곳에서 이루어지는 연구의 질이 향상됩니다."
 building_salt_mine:0 "소금 평가 시설"
 building_salt_mine_desc:0 "이곳의 희귀한 소금 덕분에 희귀하고 새로운 광물을 쉽게 찾을 수 있습니다."
 building_salt_foundry:0 "소금 강화 주조소"
 building_salt_foundry_desc:0 "희귀한 소금 중 일부는 합금의 품질과 양을 향상시키는 데 사용될 수 있습니다."
 building_aquifer_farm:0 "수원 농업 네트워크"
 building_aquifer_farm_desc:0 "수자원 네트워크를 활용하여 식량 생산을 증대시키면 이 세계의 농업 생산량을 크게 향상시킬 수 있습니다."
 building_aquifer_resort:0 "수원 휴양 서비스"
 building_aquifer_resort_desc:0 "이 리조트는 관광객이 대수층의 자연미와 시원하고 풍부한 물을 즐길 수 있게 합니다."
 building_aquifer_lab:0 "대수층 동굴 연구소"
 building_aquifer_lab_desc:0 "이 연구소는 지하 대수층에서만 발견되는 독특한 생명체를 연구합니다."
 mod_building_aquifer_lab_max:0 "최대 $building_aquifer_lab$"
 building_primal_foundry:0 "원초적 마그마 주조소"
 building_primal_foundry_desc:0 "접근이 용이한 화산 활동을 통해 주조소의 생산량을 향상시킬 수 있습니다."
 building_primal_grid:0 "원시 에너지망"
 building_primal_grid_desc:0 "높은 수준의 화산 활동을 에너지 생성 개선에 활용할 수 있습니다."
 building_primal_mine:0 "원시 화산 광산"
 building_primal_mine_desc:0 "높은 수준의 화산 활동으로 인해 풍부한 광맥에 접근할 수 있는 많은 오래된 화산 관이 생성되었습니다."
 building_coral_resort:0 "산호 숲 행성 리조트"
 building_coral_resort_desc:0 "건조한 기후와 다채로운 산호 숲은 멋진 휴양지로 만들어 줍니다."
 building_coral_lab:0 "산호 숲 연구소"
 building_coral_lab_desc:0 "독특한 육상의 산호는 생물학자와 엔지니어 모두에게 많은 비밀을 간직하고 있습니다."
 building_coral_guild:0 "산호 직공 조합"
 building_coral_guild_desc:0 "이 행성에서 발견된 산호는 아름답고 다양한 소비용도로 사용됩니다."
 building_supercon_farm:0 "초대륙 관개 시스템"
 building_supercon_farm_desc:0 "이 행성은 농사와 물을 위한 넓은 공간이 있지만, 같은 장소에서는 불가능합니다. 이 고급 관개 시스템은 농업 생산량을 향상시킵니다."
 building_supercon_lab:0 "초대륙 연구 네트워크"
 building_supercon_lab_desc:0 "초대륙은 식물과 동물의 집합체 및 판구조론의 상태를 연구하는 독특한 연구 기회를 제공합니다."
 building_supercon_grid:0 "초대륙 에너지망"
 building_supercon_grid_desc:0 "이 초대륙의 먼 내륙은 건조하고 개방적이며 메마릅니다. 행성 전체의 에너지 출력을 개선하기 위한 대규모 태양광 네트워크를 구축하기에 완벽한 장소입니다."
 building_pd_sinkhole_mine:0 "싱크홀 광산 조합"
 building_pd_sinkhole_mine_desc:0 "싱크홀은 풍부한 채굴 기회를 제공합니다."
 building_pd_sinkhole_guild:0 "싱크홀 지하 물품"
 building_pd_sinkhole_guild_desc:0 "동굴과 싱크홀은 귀중한 자원에 접근할 수 있게 해줍니다."
 building_pd_sinkhole_lab:0 "싱크홀 연구 네트워크"
 building_pd_sinkhole_lab_desc:0 "싱크홀은 독특한 생명체의 서식지이며, 이를 활용하기 위한 많은 공학적 도전 과제를 제공합니다."
 building_storm_lab:0 "폭풍 기상 연구소"
 building_storm_lab_desc:0 "이 행성의 극한 기후는 새로운 공학 기술과 기상 패턴 연구를 실용적으로 연구할 수 있게 합니다."
 building_storm_grid:0 "폭풍 풍력 발전망"
 building_storm_grid_desc:0 "이 행성의 극심한 바람은 이 행성의 전력망의 전력 출력을 증가시킵니다."
 building_storm_mine:0 "폭풍으로 파괴된 구덩이 채굴"
 building_storm_mine_desc:0 "이 행성의 극한 기후는 표면의 일부를 매우 낮은 수준으로 파괴하여 쉽게 접근할 수 있는 많은 채굴 기회를 제공합니다."
 building_iceberg_lab:0 "빙산 연구 실험실 네트워크"
 building_iceberg_lab_desc:0 "일관된 얼음산은 독특한 공학 및 생물학 연구 기회를 제공합니다."
 building_iceberg_farm:0 "빙산 켈프 농장"
 building_iceberg_farm_desc:0 "이 세계의 미역은 매우 풍부하게 자생하여, 이 세계에서의 농업은 매우 생산적입니다."
 building_iceberg_foundry:0 "빙산 주조소"
 building_iceberg_foundry_desc:0 "차가운 염수와 풍부한 염분이 합금 생산량을 향상시킵니다."
 building_cryo_lab:0 "빙설-연구 네트워크"
 building_cryo_lab_desc:0 "이 행성의 동식물을 연구하는 것은 연구원들의 연구 기회를 넓혀줄 것입니다."
 building_cryo_guild:0 "빙설-직공 단체"
 building_cryo_guild_desc:0 "빙설-단백질은 산업적으로 응용할 꺼리가 많으며, 이 행성의 직공들은 놀라우리만큼 독특한 제품을 만들 수 있습니다."
 building_cryo_grid:0 "빙설-단백질 활용 그리드"
 building_cryo_grid_desc:0 "이곳에서는 빙설식물의 희귀한 단백질을 가공해 에너지 생산을 개선합니다."
 building_lichen_farm:0 "이끼 농장"
 building_lichen_farm_desc:0 "이 농장은 이끼를 이용해 생산량을 개선합니다."
 building_lichen_grid:0 "이끼 생체 반응로"
 building_lichen_grid_desc:0 "잉여 이끼를 생체 반응로에 추가하여 에너지 생산량을 개선할 수 있습니다."
 building_lichen_lab:0 "이끼 연구 센터"
 building_lichen_lab_desc:0 "이 연구 시설은 이끼 숲의 독특한 생물 다양성과 산업적 이용 방법에 대해 연구합니다."
 building_cryo_resort:0 "빙설식물 리조트"
 building_cryo_resort_desc:0 "아름다운 빙설식물 숲 근처에 건설된 이 거대한 리조트로 인해 이 행성에서 관광 사업이 탄생하게 됩니다."
 building_glacio_foundry:0 "화산성 빙하 마그마 주조소"
 building_glacio_foundry_desc:0 "높은 화산 에너지를 이용해 생산량을 개선하는 특수 주조소입니다."
 building_glacio_resort:0 "화산성 빙하 온천 리조트"
 building_glacio_resort_desc:0 "이 리조트는 이곳에 있는 풍부한 온천을 이용합니다."
 building_glacio_mine:0 "화산성 빙하 파이로덕트 광산"
 building_glacio_mine_desc:0 "이 행성에 있는 휴면기의 파이로덕트 덕분에 광부들이 채굴하기 어려운 광물에 접근할 수 있습니다."
 building_lanthanide_guild:0 "란타넘 소비재"
 building_lanthanide_guild_desc:0 "이 직공 단체는 란타넘 금속을 사용해 독특한 소비재를 생산합니다."
 building_lanthanide_lab:0 "란타넘 연구 네트워크"
 building_lanthanide_lab_desc:0 "이 연구소 네트워크로 실험장을 통해 우리의 연구자들이 란타넘을 사용하는 새로운 방법을 찾아냅니다."
 building_lanthanide_mine:0 "란타넘 매장지 광산"
 building_lanthanide_mine_desc:0 "란타넘이 가득한 매장지 덕분에 이 행성의 생산성이 증가합니다."
 building_wet_td_farm:0 "조석 고정 농업 단지"
 building_wet_td_farm_desc:0 "변함없는 햇빛 덕분에 식량을 굉장히 효율적으로 생산할 수 있습니다."
 building_wet_td_grid:0 "조석 고정 재생 에너지"
 building_wet_td_grid_desc:0 "변함없는 햇빛과 바람 덕분에 효율적으로 에너지를 생산할 수 있습니다."
 building_wet_td_bio_lab:0 "조석 고정 생물학 연구소"
 building_wet_td_bio_lab_desc:0 "이 행성의 각 지역은 독특한 환경적 지역을 가지고 있으며, 그 곳의 동식물들은 독특하고 신기한 방식으로 살아갑니다."
 building_karst_grid:0 "동굴 지열 탭"
 building_karst_grid_desc:0 "깊은 동굴은 풍부한 지열 에너지에 쉽게 접근할 수 있게 하여 행성의 에너지 생성량을 향상시킵니다."
 building_karst_lab:0 "동굴 공학 조합"
 building_karst_lab_desc:0 "지하에 도시를 건설하는 것은 쉬운 일이 아닙니다. 이 길드는 지역 연구원들과 협력하여 이곳의 공학 생산성을 향상시킵니다."
 building_karst_mine:0 "동굴 채굴 컨소시엄"
 building_karst_mine_desc:0 "깊은 동굴은 풍부한 광맥에 쉽게 접근할 수 있게 하여 행성의 광물 생산을 향상시킵니다."
 building_superhab_lab:0 "초거주 가능 진화 연구소"
 building_superhab_lab_desc:0 "초거주 가능 세계는 모든 생명체에 이상적이지 않지만, 생물학적 생명이 진화하기에는 이상적입니다. 발견의 빈도가 증가함에 따라 전 세계적으로 사회 연구가 향상됩니다."
 building_superhab_farm:0 "초거주 가능 농장 네트워크"
 building_superhab_farm_desc:0 "이 행성의 이상적인 성장 조건은 정상보다 높은 농업 생산량을 가능하게 합니다."
 building_superhab_foundry:0 "초거주 가능 고중력 주조소"
 building_superhab_foundry_desc:0 "이 높은 중력에서 합금을 제조하면 밀도가 높고 고품질의 합금을 더 쉽게 만들 수 있습니다."
 building_gaia_lab:0 "가이아 연구 센터"
 building_gaia_lab_desc:0 "이 중심에서 연구원들은 행성의 이상적 환경을 조절하고 유지하며, 종종 새로운 연구 기회를 제공합니다."
 building_gaia_unity_admin:0 "가이아 관료 조정"
 building_gaia_unity_admin_desc:0 "이 조정 센터의 복잡한 사무실은 멋진 경관과 이상적인 공용 공간으로 보완되어 행성 관료의 생산성을 크게 향상시킵니다."
 building_gaia_unity_temple:0 "가이아 교회 조정소"
 building_gaia_unity_temple_desc:0 "이 웅장한 신전 행정 건물은 이상적인 식물군 속 깊숙이 위치해 있습니다. 멋진 경관은 이곳을 방문하는 성직자들에게 활력을 주고 영감을 줍니다."
 building_gaia_unity_robot:0 "가이아 조정 허브"
 building_gaia_unity_robot_desc:0 "이 행성의 이상적인 온도와 기상 제어 시스템은 여기 있는 조정기의 처리 능력을 향상시킵니다."
 building_gaia_unity_servitor:0 "생체 트로피 파라다이스"
 building_gaia_unity_servitor_desc:0 "이러한 이상적인 환경에서는 지능을 가진 유기체의 모든 필요를 충족시키는 것이 훨씬 쉬워지며, 자율성 표현의 사례가 급격히 감소합니다. 내부의 유기체들은 주거 요구가 완전히 충족됩니다."
 building_gaia_unity_hive:0 "가이아 조정 노드"
 building_gaia_unity_hive_desc:0 "이 행성의 이상적인 온도와 기상 제어 시스템은 이 세계의 드론에게 큰 편안함을 제공하여, 그들이 벌집의 응집력에 더 많은 정신적 능력을 집중할 수 있게 합니다."
 building_gaia_resort:0 "가이아 이상적인 리조트"
 building_gaia_resort_desc:0 "제어된 날씨와 숨막히는 경관은 오락과 의료 요구를 모두 충족시키는 최고의 리조트를 가능하게 합니다."
 decision_nuked_own_planet:0 "행성 핵폭격"
 decision_nuked_own_planet_desc:0 "우리는 번영하기 위해 방사능 환경이 필요합니다. 기존의 핵탄두를 사용하여 이 세계를 우리의 현재 필요에 맞게 변화시킬 수 있습니다."
 decision_pd_flood_planet:0 "행성의 바다 확장"
 decision_pd_flood_planet_desc:0 "이 해양 행성은 우리 민족에게 이상적인 보금자리가 될 잠재력을 가지고 있습니다. 해수면을 조정하고 도시를 수중으로 이동함으로써, 파도 아래에서 살아가는 데 적응한 이들이 번영할 수 있도록 보장할 수 있습니다."
 decision_pd_flood_planet_tooltip:0 "얼음은 §Y$sm_ice_mining_station$§!이 있는 항성계에서 수확됩니다.\n§Y$pd_aw_flooded_planet$§! 수정자가 추가되었습니다:\n$pd_aw_flooded_planet_tooltip$"
 pd_aw_flooded_planet:0 "침수된 세계"
 decision_pd_unflood_planet:0 "물 제거 행성"
 decision_pd_unflood_planet_desc:0 "이 결정은 이 세계에서 침수된 생태계를 제거하여 원래 상태로 되돌립니다."
 ICE_MINING_PD_PLANET_SUCCESS_TITLE:0 "행성 침수"
 ICE_MINING_PD_PLANET_SUCCESS_DESC:0 "$SYSTEM|Y$ 시스템에서 채굴한 얼음을 사용하여 §Y[This.GetName]§!를 침수시키는 데 성공했습니다."
 decision_pd_build_dayside_farm:0 "$decision_build_dayside_farm$"
 decision_pd_build_dayside_farm_desc:0 "$decision_build_dayside_farm_desc$"
 decision_pd_build_dayside_farm_effects_short:0 "$decision_build_dayside_farm_effects_short$"
 policy_pd_gaia_modifier:0 "세계 형성"
 policy_pd_gaia_modifier_desc:0 "비용이 많이 들지만, 우리는 모든 행성 프로젝트에 고급 테라포밍 기술을 적용할 수 있어, 모든 테라포밍된 행성이 완벽하게 형성되도록 보장합니다."
 pd_expensive_gaia_terraforming_name:0 "행성 조형가 테라포밍"
 pd_expensive_gaia_terraforming:0 "행성 조형가 테라포밍"
 pd_expensive_gaia_terraforming_desc:0 "모든 테라포밍 프로젝트는 §Y$engineered_environment_gaia$ 수정자§!를 얻게 됩니다. 이로 인해 모든 테라포밍 프로젝트의 비용이 증가합니다."
 pd_normal_terraforming_name:0 "일반 테라포밍 기준"
 pd_normal_terraforming:0 "일반 테라포밍 기준"
 pd_normal_terraforming_desc:0 "테라포밍 비용은 표준으로 유지되며, 우리가 선택한 행성에 행성 조형가를 사용할 것입니다."
 pd_nemma:0 "넴마 세계"
 pd_nemma_desc:0 "이 행성의 섬들은 실제로 거대한 광물 껍질을 가진 양서 파충류입니다. 넴마라고 불리는 이들은 표면에 떠 있으며 방해받지 않으면 온순하게 있습니다."
 pd_alpha_centauri:0 "카이론 세계"
 pd_alpha_centauri_desc:0 "행성은 외계 균류 성장으로 뒤덮여 있고 극단적인 날씨와 지진 불안정으로 시달립니다. 이러한 위험에도 불구하고, 풍부한 자원과 회복력 있는 생물권이 연구와 개발에 귀중한 기회를 제공합니다."
 zone_pd_hive_spawning:0 "산란 구역"
 zone_pd_hive_spawning_desc:0 "새로운 드론의 산란에 전념하는 구역입니다."
 zone_pd_machine_replication:0 "조립 구역"
 zone_pd_machine_replication_desc:0 "새로운 기계 유닛의 건설에 전념하는 구역입니다."
 pd_pelagic_planet:0 "수중"
 pd_pelagic_planet_desc:0 "이 행성은 거의 전체적으로 전 세계적인 바다로 덮여 있으며, 표면을 뚫는 육지가 거의 없습니다."
