 est_event_greed_5.name:0 "파벌 매수"
 est_event_greed_5.desc:0 "우리 제국내의 각 파벌의 대표자들은 탐욕스럽고 뇌물에 약합니다. 파벌 회원들의 요구에 맞춰 우리의 정책을 바꾸기 보다는 파벌의 영향 있는 개인들에게 \"선물\"\을 보내는게 나을겁니다."
