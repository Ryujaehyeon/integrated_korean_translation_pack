 policy_est_piracy_2_raiding_desc:0 "다른 이들이 우리가 사용할 수 있는 자원을 통제하고 있습니다. 우리는 그들의 영토에 대한 습격을 조직할 수 있지만, 이는 목표 대상을 화나게 할 것입니다. 우리는 이웃의 분노를 감수할 수 있는 정도를 신중하게 선택해야 합니다.\n\n"
