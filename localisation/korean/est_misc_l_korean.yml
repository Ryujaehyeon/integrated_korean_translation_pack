 leader_trait_scientist_est_librarian_mechanics_default_desc:0 "이 연대기는 도면, 구조 수정 및 엔지니어링 로그를 기록합니다. 탐사에는 잘 맞지 않지만, 그들의 체계적인 전문성은 행성 엔지니어링 연구를 향상시킵니다."
 leader_trait_scientist_est_librarian_mechanics_GC:0 "인덱서: 기계적 아카이브 유닛"
 leader_trait_scientist_est_librarian_mechanics_GC_desc:0 "이 유닛은 구조 설계도, 하위 구성 요소 매트릭스 및 제조 로그를 기록합니다. 탐사에는 적합하지 않지만, 행성 공학 연구에 효율적으로 기여합니다."
