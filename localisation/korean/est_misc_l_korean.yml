 job_est_inquisitor:0 "심문관"
 job_est_inquisitor_plural:0 "심문관"
 job_est_inquisitor_desc:0 "심문관들은 참된 길에서 벗어난 관점을 가지고 있는 자들을 찾아내 제거합니다."
 job_est_inquisitor_effect_desc:0 "£job_est_inquisitor£ $job_est_inquisitor_plural$은 §Y범죄§!를 감소시키고 §Y통치 윤리관 선호도§!를 증가시키며 소량의 통합력을 생산합니다."
