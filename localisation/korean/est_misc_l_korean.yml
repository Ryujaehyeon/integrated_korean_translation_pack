 job_est_shadow_administrator:0 "그림자 행정가"
 job_est_shadow_administrator_plural:0 "그림자 행정가"
 job_est_shadow_administrator_desc:0 "우리의 사회는 비밀스러운 장막으로 덮여있기에 실제 통치를 담당하는 자가 누군인지 아는 자는 거의 없습니다. 이를 통해 대중을 통제하기 더욱 쉬워집니다."
 job_est_shadow_administrator_effect_desc:0 "£job_est_shadow_administrator£ $job_est_shadow_administrator_plural$는 £unity£ §YUnity§!를 생산하고, 행성의 £stability£ §YStability§!를 증가시키며, 행성의 £crime£ §YCrime§!를 감소시킵니다."
