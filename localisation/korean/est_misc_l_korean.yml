l_korean:
 tech_est_mechanical_knights:0 "전쟁 기계"
 tech_est_mechanical_knights_desc:0 "우리 기술자들이 전장에 배치될 특별한 전쟁 기계를 개발했습니다. 이 이족보행 전투 로봇들은 일반적인 부대보다 더 큰 무기와 더 육중한 장갑으로 무장할 수 있습니다."
 est_titan_army:0 "타이탄"
 est_titan_army_plural:0 "타이탄"
 est_titan_army_desc:0 "타이탄은 거대한 보행 로봇이며, 우월한 화력과 장갑을 통해 모든 전장을 지배할 것입니다."
 est_mechanical_knights_army:0 "기계 기사"
 est_mechanical_knights_army_plural:0 "기계 기사"
 est_mechanical_knights_army_desc:0 "기계 기사는 맞춤형 1인용 전투 로봇입니다. 설계 구조가 매우 다양하기 때문에, 모든 기계 기사들은 유일무이하며 전장에서 많은 유용성을 가집니다."
 est_militarism_1_militia_army:0 "민병대"
 est_militarism_1_militia_army_plural:0 "민병대"
 est_militarism_1_militia_army_desc:0 "행성을 지키기 위해, 주민들 일부가 민병대로 징집되었습니다."
 est_militarism_1_slave_militia_army:0 "징집된 노예군"
 est_militarism_1_slave_militia_army_plural:0 "징집된 노예부대"
 est_militarism_1_slave_militia_army_desc:0 "일반적으로는 노예는 전투에 투입되지 않지만, 이들은 행성을 보호하기 위해 징집되었습니다."
 est_militarism_1_drone_emergency_army:0 "비상 소집대"
 est_militarism_1_drone_emergency_army_plural:0 "비상 소집대"
 est_militarism_1_drone_emergency_army_desc:0 "우리 드론들은 타고난 전사들입니다. 만약 긴급상황이 발생한다면 모든 드론들이 행성을 방어할 것 입니다."
 est_militarism_1_machine_emergency_army:0 "비상 소집대"
 est_militarism_1_machine_emergency_army_plural:0 "비상 소집대"
 est_militarism_1_machine_emergency_army_desc:0 "우리 드론들은 타고난 전사들입니다. 만약 긴급상황이 발생한다면 모든 드론들이 행성을 방어할 것 입니다."
 agenda_est_academy_finish:0 "장려된 학계"
 council_agenda_agenda_est_academy_name:0 "장려된 학계"
 council_agenda_agenda_est_academy_desc:0 "지도자는 질 높은 훈련이 필요합니다."
 agenda_est_administratum_finish:0 "대행정청"
 council_agenda_agenda_est_administratum_name:0 "대행정청"
 council_agenda_agenda_est_administratum_desc:0 "위대한 아뎁투스 아드미니스트라툼은 항상 앞으로 나아갑니다."
 agenda_est_aesthetics_finish:0 "아름다운 미학"
 council_agenda_agenda_est_aesthetics_name:0 "아름다운 미학"
 council_agenda_agenda_est_aesthetics_desc:0 "우리의 아름다운 작품으로 문화를 풍요롭게 합시다!"
 agenda_est_archivist_finish:0 "보조 기록"
 council_agenda_agenda_est_archivist_name:0 "보조 기록"
 council_agenda_agenda_est_archivist_desc:0 "이 은하의 유산은 보존되어야 합니다."
 agenda_est_benevolence_finish:0 "자애로운 자선"
 council_agenda_agenda_est_benevolence_name:0 "자애로운 자선"
 council_agenda_agenda_est_benevolence_desc:0 "황금률이 종종 우선시됩니다."
 agenda_est_biogenesis_finish:0 "공생 완성"
 council_agenda_agenda_est_biogenesis_name:0 "완전한 공생"
 council_agenda_agenda_est_biogenesis_desc:0 "우리는 하나입니다."
 agenda_est_chivalry_finish:0 "명예로운 기사도"
 council_agenda_agenda_est_chivalry_name:0 "명예로운 기사도"
 council_agenda_agenda_est_chivalry_desc:0 "미덕은 우리에게 힘을 줍니다."
 agenda_est_collectivism_finish:0 "효과적인 집단주의"
 council_agenda_agenda_est_collectivism_name:0 "효율적인 집단주의"
 council_agenda_agenda_est_collectivism_desc:0 "모두를 위해, 하나는 모두를 위해!"
 agenda_est_commerce_finish:0 "상업적 이익"
 council_agenda_agenda_est_commerce_name:0 "상업적 이익"
 council_agenda_agenda_est_commerce_desc:0 "평소와 다름없이 사업이 진행됩니다. 그 이익을 챙기세요!"
 agenda_est_confederacy_finish:0 "연합 구조화"
 council_agenda_agenda_est_confederacy_name:0 "연합 구조화"
 council_agenda_agenda_est_confederacy_desc:0 "중앙집중적인 권력은 부패한 권력입니다. 자율성이 핵심입니다."
 agenda_est_cooperativity_finish:0 "협력적 이니셔티브"
 council_agenda_agenda_est_cooperativity_name:0 "협력적 이니셔티브"
 council_agenda_agenda_est_cooperativity_desc:0 "황금 규칙은 거의 항상 우선합니다."
 agenda_est_cybernetics_finish:0 "향상된 팩토리오 이니셔티브"
 council_agenda_agenda_est_cybernetics_name:0 "강화된 팩토리오 이니셔티브"
 council_agenda_agenda_est_cybernetics_desc:0 "이 안건을 시행하여 모든 행성에서 자동화 생산을 증대시키고 자동화 일자리의 에너지 유지비를 줄입니다. 새로운 건축 기술을 사용해야 하며, 이는 건설 비용을 증가시킵니다. 그러나 적절한 계획을 세우면 초기 시행 비용이 이 이니셔티브를 개별적으로(행성당) 배치하는 것보다 낮아집니다."
 agenda_est_desires_finish:0 "열정적인 욕망"
 council_agenda_agenda_est_desires_name:0 "열정적인 욕망"
 council_agenda_agenda_est_desires_desc:0 "더 많은 것을 위한 공간은 항상 있습니다."
 agenda_est_destruction_finish:0 "파괴 작전"
 council_agenda_agenda_est_destruction_name:0 "파괴적 작전"
 council_agenda_agenda_est_destruction_desc:0 "전멸이 정답입니다."
 agenda_est_faith_finish:0 "신념"
 council_agenda_agenda_est_faith_name:0 "신념"
 council_agenda_agenda_est_faith_desc:0 "신앙이 있으면 구원이 주어집니다."
 agenda_est_foundation_finish:0 "자기 성찰 기초"
 council_agenda_agenda_est_foundation_name:0 "자기 성찰 기초"
 council_agenda_agenda_est_foundation_desc:0 "우주를 이해하기 전에 먼저 자신을 이해해야 한다."
 agenda_est_friendship_finish:0 "우정 추구"
 council_agenda_agenda_est_friendship_name:0 "우정 추구"
 council_agenda_agenda_est_friendship_desc:0 "우정은 번영을 촉진합니다!"
 agenda_est_fury_finish:0 "집중된 분노"
 council_agenda_agenda_est_fury_name:0 "집중된 분노"
 council_agenda_agenda_est_fury_desc:0 "적은 진정한 분노를 알게 될 것입니다."
 agenda_est_greed_finish:0 "무한한 탐욕"
 council_agenda_agenda_est_greed_name:0 "무한한 탐욕"
 council_agenda_agenda_est_greed_desc:0 "결국 그것은 우리의 것이 될 것이며, 대가가 무엇이든 상관하지 않습니다."
 agenda_est_hacking_finish:0 "정교한 해킹"
 council_agenda_agenda_est_hacking_name:0 "정교한 해킹"
 council_agenda_agenda_est_hacking_desc:0 "정보와 정보 수집이 갈등을 결정짓는 요소입니다."
 agenda_est_individualism_finish:0 "중시되는 개인주의"
 council_agenda_agenda_est_individualism_name:0 "중요한 개인주의"
 council_agenda_agenda_est_individualism_desc:0 "자유롭고 권한이 부여된 개인이 가장 번영하는 존재입니다."
 agenda_est_industry_finish:0 "고급 산업"
 council_agenda_agenda_est_industry_name:0 "고급 산업"
 council_agenda_agenda_est_industry_desc:0 "산업은 사회의 기초 중 하나로, 항상 발전해야 합니다."
 agenda_est_industry_finish_machine:0 "고급 산업"
 council_agenda_agenda_est_industry_machine_name:0 "고급 산업"
 council_agenda_agenda_est_industry_machine_desc:0 "산업은 사회의 기초 중 하나로, 항상 발전해야 합니다."
 agenda_est_isolation_finish:0 "완벽한 고립"
 council_agenda_agenda_est_isolation_name:0 "완벽한 고립"
 council_agenda_agenda_est_isolation_desc:0 "우리는 필요한 모든 것을 가지고 있습니다."
 agenda_est_justice_finish:0 "정의 집행"
 council_agenda_agenda_est_justice_name:0 "정의 집행"
 council_agenda_agenda_est_justice_desc:0 "정의로운 사회는 건강한 사회입니다."
 agenda_est_liberty_finish:0 "자유 증진"
 council_agenda_agenda_est_liberty_name:0 "자유 증진"
 council_agenda_agenda_est_liberty_desc:0 "자유로운 사회는 번영하는 사회입니다."
 agenda_est_malice_finish:0 "외계인 혐오 지침"
 council_agenda_agenda_est_malice_name:0 "외계인 혐오 지침"
 council_agenda_agenda_est_malice_desc:0 "외계인의 약점은 억제되고, 통제되며, 필요할 경우 제거되어야 합니다."
 agenda_est_mechanicum_finish:0 "기계문명 발전"
 council_agenda_agenda_est_mechanicum_name:0 "기계 발전"
 council_agenda_agenda_est_mechanicum_desc:0 "메카니쿰은 봉사하기 위해 존재합니다."
 agenda_est_might_finish:0 "비할 데 없는 힘"
 council_agenda_agenda_est_might_name:0 "비할 데 없는 힘"
 council_agenda_agenda_est_might_desc:0 "적은 우월한 힘에 굴복할 것입니다."
 agenda_est_militarism_finish:0 "군사적 세뇌"
 council_agenda_agenda_est_militarism_name:0 "군사적 세뇌"
 council_agenda_agenda_est_militarism_desc:0 "검, 방패 그리고 군인의 의무."
 agenda_est_mystery_finish:0 "신비로운 신비주의"
 council_agenda_agenda_est_mystery_name:0 "신비로운 신비주의"
 council_agenda_agenda_est_mystery_desc:0 "그들이 발견하지 않도록..."
 agenda_est_nature_finish:0 "자연의 공생"
 council_agenda_agenda_est_nature_name:0 "자연의 공생"
 council_agenda_agenda_est_nature_desc:0 "어머니 자연이 가장 잘 알고 있습니다."
 agenda_est_omnipresence_finish:0 "확장된 편재성"
 council_agenda_agenda_est_omnipresence_name:0 "확장된 편재성"
 council_agenda_agenda_est_omnipresence_desc:0 "최대 인식을 달성해야 합니다."
 agenda_est_order_finish:0 "법과 질서"
 council_agenda_agenda_est_order_name:0 "법과 질서"
 council_agenda_agenda_est_order_desc:0 "정의가 승리할 때, 법과 질서가 지배합니다."
 agenda_est_perseverance_finish:0 "열렬한 인내"
 council_agenda_agenda_est_perseverance_name:0 "열렬한 인내"
 council_agenda_agenda_est_perseverance_desc:0 "역경은 단순히 학습의 기회입니다."
 agenda_est_philosophy_finish:0 "철학의 확산"
 council_agenda_agenda_est_philosophy_name:0 "철학의 확산"
 council_agenda_agenda_est_philosophy_desc:0 "계몽은 무지의 어둠을 걷어냅니다."
 agenda_est_piracy_finish:0 "두려운 해적행위"
 council_agenda_agenda_est_piracy_name:0 "두려운 해적 행위"
 council_agenda_agenda_est_piracy_desc:0 "법의 긴 팔은 그리 멀리 닿지 않습니다..."
 agenda_est_proselytism_finish:0 "제한 없는 전도"
 council_agenda_agenda_est_proselytism_name:0 "제한 없는 전도"
 council_agenda_agenda_est_proselytism_desc:0 "우리의 소명은 유일한 소명입니다."
 agenda_est_purposefulness_finish:0 "목적성 강조"
 council_agenda_agenda_est_purposefulness_name:0 "목적 강조"
 council_agenda_agenda_est_purposefulness_desc:0 "목적은 주어지는 것이 아니라 만들어지는 것입니다."
 agenda_est_serverbound_finish:0 "복잡한 서버 경계"
 council_agenda_agenda_est_serverbound_name:0 "복잡한 서버 바운드"
 council_agenda_agenda_est_serverbound_desc:0 "효율성이 핵심입니다."
 agenda_est_shroudborn_finish:0 "안개 속의 연구"
 council_agenda_agenda_est_shroudborn_name:0 "안개 태생 연구"
 council_agenda_agenda_est_shroudborn_desc:0 "안개가 드리운 광활한 공간이 우리를 둘러싸고 있습니다."
 agenda_est_spaceborn_finish:0 "우주 태생 발전"
 council_agenda_agenda_est_spaceborn_name:0 "우주 태생 개발"
 council_agenda_agenda_est_spaceborn_desc:0 "공허는 정복되어야 합니다."
 agenda_est_subminds_finish:0 "효율적인 하위 정신"
 council_agenda_agenda_est_subminds_name:0 "효율적인 서브마인드"
 council_agenda_agenda_est_subminds_desc:0 "탈중앙화가 해답일 수 있습니다."
 agenda_est_swarm_finish:0 "벌레의 심장"
 council_agenda_agenda_est_swarm_name:0 "벌레의 심장"
 council_agenda_agenda_est_swarm_desc:0 "별들은 결국 사라질 것입니다."
 agenda_est_swarm_bioship_finish:0 "벌레의 심장"
 council_agenda_agenda_est_swarm_bioship_name:0 "벌레의 심장"
 council_agenda_agenda_est_swarm_bioship_desc:0 "별들은 결국 사라질 것입니다."
 agenda_est_venerability_finish:0 "위임된 존경"
 council_agenda_agenda_est_venerability_name:0 "위임된 존경"
 council_agenda_agenda_est_venerability_desc:0 "우리의 장로들과 지도자들은 정말로 깊은 존경을 받고 있습니다. 그들을 기리도록 합시다."
 building_est_aesthetics_5_wonder_garden:0 "아름다움의 정원"
 building_est_aesthetics_5_wonder_garden_desc:0 "전설적인 아름다움의 정원. 정원사들은 우리 제국 전역의 식물로 그 정원을 채우고 초목의 교향곡을 작곡했습니다. 이 은하에서 가장 위대한 단일 예술 작품이며 아름다움의 절정으로 여겨집니다."
 building_est_aesthetics_5_wonder_monument:0 "기억의 기념비"
 building_est_aesthetics_5_wonder_monument_desc:0 "기억의 기념비는 은하계에서 가장 큰 건물 중 하나이며, 우주에서 보일 정도로 거대합니다. 과거의 것들을 기리기 위해 건설되었지만, 어떤 사람들은 이 기념비를 한 번 보면 기억에서 사라지지 않는다는 점에서 이름이 지어졌다 말하기도 합니다."
 building_est_aesthetics_5_wonder_stage:0 "영광의 무대"
 building_est_aesthetics_5_wonder_stage_desc:0 "전 은하에서 가장 성공한 공연가들이 자신의 기량을 뽐내기 위해 이 영광의 무대에 몰려듭니다. 매일 밤 이 무대에서 은하계에서 가장 위대한 공연이 시작합니다."
 building_est_aesthetics_5_wonder_halls:0 "평온의 전당"
 building_est_aesthetics_5_wonder_halls_desc:0 "수시간 동안 평온의 전당을 걸어다녔는데 다른 사람을 본 적이 없다는 사람도 있습니다. 그러나, 이 전당에는 영감과 이해 혹은 내면의 평화를 찾기 위해 조용히 걸어다니는 수천 명의 사람들이 있습니다. 이 전당에는 끝이 없어보이며, 복도와 거대한 방의 끝은 어둠 뿐입니다. 저 위의 천장도 보이지 않고, 천장을 받치는 기둥마저도 공허 속으로 사라지는 것 같습니다."
 building_est_aesthetics_5_wonder_museum:0 "장엄한 박물관"
 building_est_aesthetics_5_wonder_museum_desc:0 "장엄한 박물관에는 이 은하계에서 발견된 위대한 문화재를 담고 있으며, 어떤 문화재는 은하계 바깥에서 왔을지도 모릅니다. 박물관의 소장품들은 최근 사건에서 중요했던 것이거나 사라진지 오래인 문명의 문화재까지 다양합니다. 소장품들이 너무나도 다양하고 많기 때문에 한 사람이 태양 순환기 동안 전시관을 관람한다 하더라도 다 둘러볼 수 없습니다."
 building_est_aesthetics_finish_gallery:0 "갤러리"
 building_est_aesthetics_finish_gallery_desc:0 "우리의 갤러리에는 다양한 전시회가 열리는데, 예술과 자연사, 지역 문화부터 제국과 은하 전역에서 수집된 다양한 고고학적 문화재까지 수많은 것들이 전시됩니다."
 building_est_archivist_finish_archive:0 "행성 기록 보관소"
