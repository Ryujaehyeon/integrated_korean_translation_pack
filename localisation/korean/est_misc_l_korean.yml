 policy_est_symbiosis_approach:0 "공생 접근 방식"
 policy_est_symbiosis_approach_desc:0 "유전적 숙련도에 따라 우리의 함선에 대해 다양한 공생 보너스를 발동할 수 있습니다."
 est_symbiosis_approach_0:0 "없음"
 est_symbiosis_approach_0_name:0 "활성화된 접근 방식 없음"
 est_symbiosis_approach_0_desc:0 "우리의 유전적 지식은 다른 곳에 우선시되어야 합니다.\n\n§ENo Effect§!"
 est_symbiosis_approach_1:0 "선체 재생 우선시"
 est_symbiosis_approach_1_name:0 "선체 재생 우선시"
 est_symbiosis_approach_1_desc:0 "우리의 유전적 지식은 우리의 함선 외골격을 강화하는 데 우선되어야 합니다.\n\n"
 est_symbiosis_approach_2:0 "생체선 성장 우선시"
 est_symbiosis_approach_2_name:0 "생체선 성장 우선시"
 est_symbiosis_approach_2_desc:0 "우리의 유전적 지식은 우리의 함선 성장 호르몬에 우선적으로 집중되어야 합니다.\n\n"
 policy_est_biogenesis_finish_food_to_minerals:0 "식량 전환"
 policy_est_biogenesis_finish_food_to_minerals_desc:0 "우리는 새로운 것을 성장시키기 위해 물자 대신 유기체를 건설 프로젝트의 건설 자재로 사용할 수 있습니다. 우리가 식량으로 사용될 수 있는 자원을 어느 정도 건설 프로젝트로 전환할지를 결정해야 합니다.\n\n"
 est_biogenesis_finish_food_to_minerals_0:0 "없음"
 est_biogenesis_finish_food_to_minerals_0_name:0 "전환 안함"
 est_biogenesis_finish_food_to_minerals_0_desc:0 "모든 유기 물질은 드론이 성장하는데 사용되어야 합니다.\n\n§E효과 없음§!"
 est_biogenesis_finish_food_to_minerals_1:0 "식량 전환 최소"
 est_biogenesis_finish_food_to_minerals_1_name:0 "전환량 최소"
 est_biogenesis_finish_food_to_minerals_1_desc:0 "우리는 새로운 드론을 키우기 위해 모든 유기체를 사용하려고 노력해야 합니다. 일부는 건설에 사용될 수 있지만, 이는 바람직하지 않습니다.\n\n"
 est_biogenesis_finish_food_to_minerals_2:0 "제한된 식량 전환"
 est_biogenesis_finish_food_to_minerals_2_name:0 "제한된 전환"
 est_biogenesis_finish_food_to_minerals_2_desc:0 "유기체는 주로 새로운 드론을 성장시키는 데 사용되어야 하지만, 건설 프로젝트에 제한된 양을 허용할 수 있습니다.\n\n"
 est_biogenesis_finish_food_to_minerals_3:0 "소량의 식량 전환"
 est_biogenesis_finish_food_to_minerals_3_name:0 "소량의 전환"
 est_biogenesis_finish_food_to_minerals_3_desc:0 "유기체 물질은 건설에 중요한 용도가 있으며, 우리는 그 목적을 위해 일부를 사용할 것입니다.\n\n"
 est_biogenesis_finish_food_to_minerals_4:0 "적정 수준의 식량 전환"
 est_biogenesis_finish_food_to_minerals_4_name:0 "적정 수준의 전환"
 est_biogenesis_finish_food_to_minerals_4_desc:0 "우리 제국의 건설과 드론의 성장은 모두 중요합니다. 우리는 중간 지점을 찾으려고 노력할 것입니다.\n\n"
 est_biogenesis_finish_food_to_minerals_5:0 "상당한 식량 전환"
 est_biogenesis_finish_food_to_minerals_5_name:0 "상당한 전환"
 est_biogenesis_finish_food_to_minerals_5_desc:0 "우리가 필요한 드론을 확보했습니다. 이제 주로 새로운 건설 프로젝트에 집중합시다.\n\n"
 est_biogenesis_finish_food_to_minerals_6:0 "대규모 식량 전환"
 est_biogenesis_finish_food_to_minerals_6_name:0 "대규모 전환"
 est_biogenesis_finish_food_to_minerals_6_desc:0 "불가피하게 일부 유기체가 우리의 드론을 유지하는 데 사용되어야 하지만, 건설에 무엇이 사용될지는 의문입니다. 몇몇이 굶주린다면 그것은 우리가 감수해야 할 희생입니다.\n\n"
 est_biogenesis_finish_food_to_minerals_7:0 "광범위한 식량 전환"
 est_biogenesis_finish_food_to_minerals_7_name:0 "광범위한 전환"
 est_biogenesis_finish_food_to_minerals_7_desc:0 "드론의 생명은 변덕스럽지만, 우리가 건설하는 것들은 많은 주기를 견딜 것입니다. 지속 가능한 제국을 건설하기 위해 모든 자원을 집중합시다.\n\n"
 est_biogenesis_finish_food_to_minerals_8:0 "제한없는 식량 전환"
 est_biogenesis_finish_food_to_minerals_8_name:0 "제한없는 전환"
 est_biogenesis_finish_food_to_minerals_8_desc:0 "제한 없이 모든 식량을 사용하여 우리 문명을 위한 구조물과 함선을 성장시키지 않도록 합시다.\n\n"
 country_food_produces_add:0 "월간 식량"
 policy_est_fury:0 "$tradition_est_fury$"
 policy_est_fury_desc:0 "$tradition_est_fury_desc$"
 est_fury_0:0 "폭풍전야"
 est_fury_0_name:0 "$est_fury_0$"
 est_fury_0_desc:0 "우리 마음 속에 불씨가 태어났습니다. 지금은 아직 약합니다.\n\n"
 est_fury_policy_tooltip_0:0 "$est_fury_1_name$ 정책에서만 전환 가능합니다."
 est_fury_1:0 "치솟는 광분"
 est_fury_1_name:0 "$est_fury_1$"
 est_fury_1_desc:0 "우리는 이제 그것을 느낍니다, 불꽃. 그것은 우리를 파괴하고, 죽이도록 몰아갑니다.\n\n"
 est_fury_policy_tooltip_1:0 "다른 제국의 £opinion£ §Y우호도§!가 §R-10§! 감소합니다.\n\n $est_fury_0_name$,$est_fury_2_name$ 정책에서만 전환될수 있고 적어도 §Y1§!개의 §Y분노§! 전통을 잠금해제해야 합니다."
 est_fury_2:0 "무조건적인 증오"
 est_fury_2_name:0 "$est_fury_2$"
 est_fury_2_desc:0 "우리 안의 불꽃을 끄는 유일한 방법은 우리가 만나는 모든 것을 파괴하는 것입니다. 그렇게 하면 잠시나마 고통을 덜 수 있습니다.\n\n"
 est_fury_policy_tooltip_2:0 "다른 제국의 £opinion£ §Y우호도§!가 §R-25§! 감소합니다.\n\n $est_fury_1_name$,$est_fury_3_name$ 정책에서만 전환될수 있고 적어도 §Y2§!개의 §Y분노§! 전통을 잠금해제해야 합니다."
 est_fury_3:0 "순수한 분노"
 est_fury_3_name:0 "$est_fury_3$"
 est_fury_3_desc:0 "우리는 정신을 잃기 시작하고, 불꽃이 점점 더 우리를 지배하여 폭력으로 이끌고 있습니다.\n\n"
 est_fury_policy_tooltip_3:0 "다른 제국의 £opinion£ §Y우호도§!가 §R-45§! 감소합니다.\n\n $est_fury_2_name$,$est_fury_4_name$ 정책에서만 전환될수 있고 적어도 §Y3§!개의 §Y분노§! 전통을 잠금해제해야 합니다."
 est_fury_4:0 "끝없는 격노"
 est_fury_4_name:0 "$est_fury_4$"
 est_fury_4_desc:0 "불꽃이었던 것이 이제는 지옥불이 되었습니다. 우리가 아무리 파괴하고 죽여도 고통을 막을 수는 없습니다.\n\n"
 est_fury_policy_tooltip_4:0 "다른 제국의 £opinion£ §Y우호도§!가 §R-70§! 감소합니다.\n\n $est_fury_3_name$ 정책에서만 전환될수 있고 적어도 §Y4§!개의 §Y분노§! 전통을 잠금해제해야 합니다."
 est_fury_5:0 "영겁의 격노"
 est_fury_5_name:0 "$est_fury_5$"
 est_fury_5_desc:0 "우리 자신을 해방시키는 유일한 방법은 놓아주는 것입니다. 불꽃이 우리의 마음을 섭취하게 하십시오. 그렇게 하면 우리는 마침내 쉴 수 있습니다.\n\n"
 est_fury_policy_tooltip_5:0 "다른 제국의 £opinion£ §Y우호도§!가 §R-100§! 감소합니다.\n\n $est_fury_4_name$ 정책에서만 전환될수 있고 적어도 §Y5§!개의 §Y분노§! 전통을 잠금해제해야 합니다.\n한번 이 정책이 활성화되면 절대 되돌릴 수 없습니다."
 policy_est_fury_5_ravage:0 "유린"
 policy_est_fury_5_ravage_desc:0 "$tr_est_fury_5_delayed$"
 est_fury_5_ravage_on:0 "유린한다"
 est_fury_5_ravage_on_name:0 "$est_fury_5_ravage_on$"
 est_fury_5_ravage_on_desc:0 "적들의 살아있는 영혼에게 분노를 보여줄 수 없을때, 우리는 그 분노를 다른 이들이 지은 것들을 파괴함으로서 표출할수 있습니다."
 est_fury_5_ravage_off:0 "유린하지 않는다"
 est_fury_5_ravage_off_name:0 "$est_fury_5_ravage_off$"
 est_fury_5_ravage_off_desc:0 "우리가 침략하는 행성에 너무 많은 피해를 주지 않도록 스스로를 억제하는 것은 어려운 일이지만, 가능할지도 모릅니다.\n\n"
 policy_est_greed_2_negotiations:0 "협상 전략"
 policy_est_greed_2_negotiations_desc:0 "$tr_est_greed_2_delayed$"
