 job_est_engineer_desc:0 "수석 공학자들은 다른 사람들이 마법이라고 여길 정도로 기계를 다루는 사람들입니다."
 job_est_engineer_effect_desc:0 "£job_est_engineer£ $job_est_engineer_plural$는 £engineering£ §Y공학§!과 소량의 £trade_value£ §Y무역가치§!를 생산합니다."
