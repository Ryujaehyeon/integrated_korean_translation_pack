 est_greed_2_negotiations_0_desc:0 "\n\n§ENo Effect§!"
 est_greed_2_negotiations_1:0 "무정한 협상가"
 est_greed_2_negotiations_1_name:0 "$est_greed_2_negotiations_1$"
 est_greed_2_negotiations_1_desc:0 "외국 제국 £opinion£ §Y의 의견§!이 §R-15§! 감소합니다.\n\n"
 est_greed_2_negotiations_2:0 "냉혹한 협상가"
 est_greed_2_negotiations_2_name:0 "$est_greed_2_negotiations_2$"
 est_greed_2_negotiations_2_desc:0 "외국 제국 £opinion£ §Y여론§!이 §R-30§! 감소합니다.\n\n"
 est_greed_2_negotiations_3:0 "무자비한 협상가"
 est_greed_2_negotiations_3_name:0 "$est_greed_2_negotiations_3$"
 est_greed_2_negotiations_3_desc:0 "외국 제국 £opinion£ §Y의 의견§!이 §R-45§!만큼 감소합니다.\n\n"
