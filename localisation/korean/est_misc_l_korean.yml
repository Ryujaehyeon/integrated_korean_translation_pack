 est_subminds_3_unity:0 "통합 집중"
 est_subminds_3_unity_name:0 "$est_subminds_3_unity$"
 policy_flag_est_subminds_3_unity_name:0 "$est_subminds_3_unity$"
 est_subminds_3_unity_desc:0 "£unity£ §Y유니티§! 생산량이 모든 섹터 행성에서 §G+20%§! 증가합니다.\n\n"
 sr_est_rare_minerals:0 "희귀 광물"
 sr_est_rare_minerals_desc:0 "특정한 희귀 광물들이 많은 행성의 지표면 깊숙한 곳 아래에서 발견됩니다. 이 얻기 힘든 귀중한 광물들은 다양한 용도를 지니고 있습니다."
 tech_est_industry_2_1:0 "지질 조사 장치"
 tech_est_industry_2_1_desc:0 "특수 조사 장치는 지하의 광물 자원을 더욱 찾기 쉽게 해줍니다."
 tech_est_industry_2_2:0 "생산 라인 표준화"
 tech_est_industry_2_2_desc:0 "제국 전역의 생산라인을 표준화함에 따라 생산 과정을 굉장히 단순화 할수 있습니다. 이를 통해 생산 과정의 개선이 매우 간단해질 것입니다."
 tech_est_industry_2_3:0 "채굴 스테이션 개선"
 tech_est_industry_2_3_desc:0 "처음 우리가 궤도 채굴 스테이션을 건설했을때는 많은 것들을 개발하지 못했지만 개선된 궤도 채광 기술을 통해 구식 설계를 개선해 더욱 효율적이고 값싼 스테이션을 만들어냈습니다."
 tech_est_industry_2_4:0 "불꽃의 정신"
 tech_est_industry_2_4_desc:0 "우리의 용광로에는 지어진 이래로 절대 꺼진적이 없는 화마가 깃들어 있습니다. 이 안에 들어 있는 열은 절대로 죽지 않을 것입니다."
 tech_est_industry_2_4_effect_title:0 "£building£ §Y$building_est_industry_3_blast_furnace$§!는 §G+2§! £unity£ §Y유니티§!를 생산합니다."
 tech_est_industry_2_4_effect_desc:0 ""
 tech_est_industry_2_5:0 "채굴의 장인"
 tech_est_industry_2_5_desc:0 "극도로 숙련된 기술을 통해 우리 광부들은 가장 귀중한 결정체들을 땅속에서 추출해냅니다."
 tech_est_industry_finish:0 "희귀 광물 굴착"
 tech_est_industry_finish_desc:0 "가장 귀중한 광석들을 찾아내기 위해서는 행성의 깊은 곳까지 파내려 가야합니다. 새로운 굴착 기술을 통해 우리는 충분한 깊이까지 도달할수 있게 되어 광물을 채굴할 수 있게 되었습니다."
 leader_trait_scientist_est_keeper_astronomy:0 "관리자: 천문학"
 leader_trait_scientist_est_keeper_astronomy_desc:0 "천문학 전문 관리자입니다. 우리 은하에는 수억 개의 천체가 존재하며, 이 모든 것들을 우리 기록 보관소에 기록해야합니다. 이 관리자는 기록 보관소에 접근함으로써 우리의 물리학 연구에 도움이 될 것입니다."
 leader_trait_scientist_est_keeper_mathematics:0 "관리자: 수학"
 leader_trait_scientist_est_keeper_mathematics_desc:0 "수학 전문 관리자입니다. 수 천년 동안 우리의 수학자들은 수 없이 많은 정리들을 발견하고 방대한 양의 수학 이론을 구축했습니다. 이 관리자는 기록 보관소를 통해 수학적 이론에 접근하고 검색하는 방법에 대해 알고 있으며 우리의 물리학 연구에 도움이 될 것입니다."
 leader_trait_scientist_est_keeper_electronics:0 "관리자: 전기"
 leader_trait_scientist_est_keeper_electronics_desc:0 "전기 전문 관리자입니다. 전기가 처음 발견 되었을때 우리 사회에서는 혁명이 일어났고 그 이후로 수백만개의 전자 기기가 만들어졌습니다. 혹시 필요한 일이 있을 경우를 대비해 모든 전자 기기들이 전부 기록 되어 있습니다. 이 데이터베이스를 이용하는 관리자는 물리학 연구에 도움이 될 것입니다."
 leader_trait_scientist_est_keeper_software:0 "관리자: 소프트웨어"
 leader_trait_scientist_est_keeper_software_desc:0 "컴퓨터 소프트웨어 전문 관리자입니다. 첫번째 컴퓨터가 만들어지기도 전에 우리는 구동 가능한 수 없이 많은 프로그램들을 만들어 왔습니다. 이 관리자는 이런 컴퓨터 프로그램들을 거대한 데이터베이스에 기록하고 분류하는데 전문화 되어있으며 소프트웨어에 대한 지식은 물리학 연구에 도움이 될 것입니다."
 leader_trait_scientist_est_keeper_culture:0 "관리자: 문화"
 leader_trait_scientist_est_keeper_culture_desc:0 "문화 전문 관리자입니다. 우리 문명의 여명 때부터 수 천 가지의 문화들이 피어나고 시들었습니다. 다른 행성들에 더 많은 문화가 존재했고, 여전히 존재합니다. 이 관리자는 존재했던 그리고 존재하는 모든 문화에 대한 방대한 기록보관소에 접근할 줄 알고 있으며 이 정보는 우리의 사회학 연구에 도움이 될 것입니다."
 leader_trait_scientist_est_keeper_history:0 "관리자: 역사학"
 leader_trait_scientist_est_keeper_history_desc:0 "역사학 전문 관리자입니다. 한 해가 지날 때마다, 우리 문명의 역사가 일 년 늘어나며, 지난 모든 사건을 우리의 역사 기록 보관소에 추가해야합니다. 이 관리자는 이런 사건들을 기록하고 기록 보관소에 등록하는 일을 맡고 있으며 그들의 역사에 관한 지식은 우리의 사회학 연구에 도움이 될 것입니다."
 leader_trait_scientist_est_keeper_taxonomy:0 "관리자: 분류학"
 leader_trait_scientist_est_keeper_taxonomy_desc:0 "분류학 전문 관리자입니다. 우리의 문명이 태어나기도 전에 새로운 종들이 진화하고 멸종했습니다. 그 모든 종족들 하나 하나의 특징들을 기록하고 분류해야합니다. 이 관리자는 다양한 생명체를 기록하고 이를 데이터베이스에 등록하는 전문가이며, 이 관리자의 분류학적 기록 보관소에 대한 지식은 사회학 연구에 도움이 될 것입니다."
 leader_trait_scientist_est_keeper_communication:0 "관리자: 의사소통"
 leader_trait_scientist_est_keeper_communication_desc:0 "언어와 여러 형태의 소통을 전문으로 하는 관리자입니다. 우리 제국에서는 수천가지의 언어가 사용되고 있고 은하 전역에서는 우리와는 다른 수많은 형태의 의사소통 방식이 존재합니다. 이 모든 것들을 반드시 기록해야하고 특징과 규칙을 알아야합니다. 이 관리자는 다양한 형태의 의사소통 방식을 기록했으며 우리의 사회학 연구에 도움이 될 것입니다."
 leader_trait_scientist_est_keeper_war:0 "관리자: 전쟁학"
 leader_trait_scientist_est_keeper_war_desc:0 "전쟁학 전문 관리자입니다. 오랜 세월에 걸쳐서 수 많은 전쟁이 일어났고, 우리는 모두를 위해 모든 전투를 가능한한 자세히 기록했습니다. 이 관리자는 전쟁 관련 데이터베이스를 전문적으로 다루며, 그 지식은 우리의 사회학 연구에 도움이 될 것입니다."
 leader_trait_scientist_est_keeper_chemistry:0 "관리자: 화학"
 leader_trait_scientist_est_keeper_chemistry_desc:0 "화학 전문 관리자입니다. 화학이 한 분야로 취급되기도 전에, 우리는 수없이 다양한 화합물을 만들어왔습니다. 이 화합물과 반응물들을 데이터베이스에 등록하지 않는다면 많은 것들이 잊혀지고 말 것입니다. 이 관리자는 화학 데이터베이스에 익숙하기에 이 지식은 공학 연구에 도움이 될 것입니다."
 leader_trait_scientist_est_keeper_geology:0 "관리자: 지질학"
 leader_trait_scientist_est_keeper_geology_desc:0 "지질학 전문 관리자입니다. 우리가 별들에 닿게 됨으로서 지질학 분야의 위상 또한 높아졌습니다. 은하는 행성들로 가득하고 각자 고유한 광물과 성질을 가지고 있습니다. 이 관리자는 지질학 기록 보관소의 시료를 채집하기 위해 오래 여행했고 그 지식은 우리의 공학 연구에 도움이 될 것입니다."
 leader_trait_scientist_est_keeper_architecture:0 "관리자: 건축학"
 leader_trait_scientist_est_keeper_architecture_desc:0 "건축과 건설 전문 관리자입니다. 모든 건축물의 설계는 우리의 건축학 기록 보관소에 저장됩니다. 이 관리자는 그 설계들을 관리하고, 이 정보들을 손쉽게 분류하고 접근할 수 있도록 하는 시스템을 만듭니다. 이는 우리의 공학 연구에 도움이 될 것입니다."
 leader_trait_scientist_est_keeper_mechanics:0 "관리자: 기계공학"
 leader_trait_scientist_est_keeper_mechanics_desc:0 "기계공학 전문 관리자입니다. 모든 기계 발명품의 청사진을 기록해야합니다. 이 관리자는 데이터베이스에 청사진을 분류하는 역할을 맡고 있으며, 가능 하다면 새로 만들어진 기계들 또한 기록 보관소에 등록될 것입니다. 이 지식은 우리의 공학 연구에 도움이 될 것입니다."
 leader_trait_scientist_est_librarian_mathematics:0 "[EstChorniclerPhysicsName]"
 leader_trait_scientist_est_librarian_mathematics_desc:0 "[EstChorniclerPhysicsDesc]"
 leader_trait_scientist_est_librarian_mathematics_default:0 "연구원: 이론 분석가"
 leader_trait_scientist_est_librarian_mathematics_default_desc:0 "이 연대기는 이론적 및 물리적 아카이브를 관리하여 핵심 원리에 대한 빠른 접근을 가능하게 합니다. 탐사에는 적합하지 않지만, 그들의 체계적인 통찰력은 행성 물리학 연구를 향상시킵니다."
 leader_trait_scientist_est_librarian_mathematics_GC:0 "인덱서: 물리학 노드"
 leader_trait_scientist_est_librarian_mathematics_GC_desc:0 "이 유닛은 물리 모델과 이론적 상수의 로컬 캐시를 유지합니다. 탐사에는 적합하지 않지만, 최적화된 인덱싱은 행성 물리학 연구를 향상시킵니다."
 leader_trait_scientist_est_librarian_taxonomy:0 "[EstChorniclerBioName]"
 leader_trait_scientist_est_librarian_taxonomy_desc:0 "[EstChorniclerBioDesc]"
 leader_trait_scientist_est_librarian_taxonomy_default:0 "연대기 작성자: 생물학 등록자"
 leader_trait_scientist_est_librarian_taxonomy_default_desc:0 "이 연대기는 종, 유전체 및 생태계에 대한 방대한 기록을 유지합니다. 탐사에는 적합하지 않지만, 그들의 조직적인 접근 방식은 행성 사회 연구를 향상시킵니다."
 leader_trait_scientist_est_librarian_taxonomy_GC:0 "색인자: 생물 분류 노드"
 leader_trait_scientist_est_librarian_taxonomy_GC_desc:0 "이 유닛은 유전체 구조, 생태적 패턴 및 행동 프로필을 보관합니다. 탐사에는 적합하지 않지만, 집중된 루틴은 행성 사회 연구를 향상시킵니다."
