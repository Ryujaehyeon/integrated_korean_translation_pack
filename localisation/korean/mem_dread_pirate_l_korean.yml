l_korean:
 mem_dread_pirate.2.name:0 "공포의 해적 전설"
 mem_dread_pirate.2.desc:0 "§S[marauder_sender.GetName]§!의 공격선 중 하나를 파괴한 후, §Y[combat_system.GetName] 시스템§!에서 우리의 군대는 흥미로운 정보가 담긴 온전한 데이터 코어를 회수했습니다. \n\n이 코어는 [marauder_sender.GetAdj] 전설의 일종인 §SDread Pirate Raewynn§!에 대해 이야기합니다. 그는 [Root.GetName]이 우주로 나아가기 수세기 전 은하계를 떠돌았으며, §Y[mem_dread_pirate_the_planet.Solar_System.GetName] 시스템§! 어딘가에서 사라진 것으로 보입니다. 그렇지 않으면 평범한 [mem_dread_pirate_the_planet.GetPlanetMoon]인 [mem_dread_pirate_the_planet.GetName]이 이제 그의 안식처로 여겨집니다. \n\n우리는 이전에 이 [mem_dread_pirate_the_planet.GetPlanetMoon]을 조사했지만 관련된 것을 발견하지 못했으나, 이 새로운 데이터는 더 면밀히 살펴볼 가치가 있을 수 있습니다."
 mem_dread_pirate.2.a:0 "우린 이를 조사해야 한다."
 mem_dread_pirate_chain_title:0 "공포의 해적 레이윈"
 mem_dread_pirate_chain_desc:0 "약탈자의 전설은 은하 전체가 두려워한 공포의 해적 레이윈과 그의 엄청난 보물에 관한 이야기를 담고 있습니다."
 MEM_DREAD_PIRATE_PROJECT:0 "공포의 해적의 흔적을 조사하다."
 MEM_DREAD_PIRATE_PROJECT_DESC:0 "그 외에 특별할 것 없는 [mem_dread_pirate_the_planet.GetPlanetMoon], §Y[mem_dread_pirate_the_planet.GetName]§!는 §SDread Pirate Raewynn§!의 마지막 안식처라는 소문이 돌고 있습니다. 좀 더 자세히 살펴볼 가치가 있을지도 모릅니다."
 mem_dread_pirate.3.name:0 "공포의 해적 기지"
 mem_dread_pirate.3.desc:0 "[Leader.GetName]는 드레드 해적 레윈의 소굴을 찾는 데 성공했다고 보고합니다. 높은 산의 절벽에 지어진 방어막이 있는 벙커는 지금까지 우리의 스캔을 피했지만, 약탈자 데이터를 사용함으로써 우리는 이제 더 잘 알게 되었습니다. \n\n우리가 여기 처음이 아니었던 것 같습니다. 사실, 우리 팀이 처음 도착했을 때 끔찍한 광경이 기다리고 있었습니다: 많은 수의 오래전에 죽은 외계인들의 유해와 그들이 사용했던 장비의 대부분이 현장에 흩어져 있었습니다. [mem_dread_pirate_the_planet.GetName]에 숨겨진 방대한 지하 복합체와 우리의 선조들이 남긴 작업을 모두 살펴보는 데 상당한 노력이 필요할 것입니다."
 mem_dread_pirate.3.a:0 "발굴 현장으로 지정."
 mem_dread_pirate_dig_site:0 "공포의 해적 무덤"
 mem_dread_pirate_dig_site_desc:0 "[From.Planet.GetPlanetMoon]의 숨겨진 시설이 공포의 해적 레이윈은 무덤으로 여겨집니다.\n\n많은 자들이 이곳을 방문했지만, 빈손으로 돌아가거나 죽은 것으로 보입니다."
 mem_dread_pirate.11.name:0 "대기실"
 mem_dread_pirate.11.desc:0 "우리는 [From.Planet.GetName]의 지하 복합체 깊숙이 들어가 큰 방에 도달했습니다. 이 방은 과거에 격납고나 저장 공간으로 사용되었던 곳입니다. \n\n방 안에는 이전 탐험가들이 설치한 여러 개의 텐트와 고고학 장비가 있었지만, 현재까지 거주자나 그들의 유해는 발견되지 않았습니다. [Leader.GetName]는 다음 메시지가 담긴 데이터패드를 발견했습니다: \n\n§S\"나는 여기서 나가고 있습니다. 이것은 드레드 해적의 보물을 찾으려는 모든 이들에게 보내는 경고입니다. 여기서는 아무것도 찾을 수 없고, 오직 죽음과 실패만이 기다리고 있습니다. 우리 중 백 명 이상이 여기로 들어왔고, 겨우 몇 명만이 남아 있습니다. 나머지는 함정과 자신의 탐욕의 희생자가 되었습니다. 니란, 만약 당신이 어떻게든 살아남아 이 메시지를 발견한다면, 당신의 비참한 날들이 고통과 불행으로 가득 차기를 바랍니다.\"§!"
 mem_dread_pirate.12.name:0 "발굴 작업"
 mem_dread_pirate.12.desc:0 "우리 고고학자들은 [From.Planet.GetName]에 있는 지하 복합체의 상층부를 성공적으로 조사했습니다. 여러 종의 유해와 함께 그들의 개인 기록과 소지품이 회수되었습니다. \n\n과거 여러 탐험가 그룹이 Dread Pirate Raewynn이 모은 불법적으로 얻은 보물을 찾기 위해 이 장소를 방문한 것으로 보이며, 그가 착용했던 전설적인 §Sceremonial mask§!도 포함되어 있습니다. 이 마스크는 은하의 많은 약탈자 부족들 사이에서 문화적 아이콘이었으며, 이를 회수한 사람은 많은 존경을 받을 것입니다. \n\n부와 명예에 대한 환상이 고고학자들의 마음을 흐리게 하면서 현장에서 긴장이 고조되었고, 발굴 지역의 통제권을 두고 내-fighting이 발생했습니다. 많은 이들이 목숨을 잃었습니다."
 mem_dread_pirate.13.name:0 "동굴 붕괴"
 mem_dread_pirate.13.desc:0 "[Leader.GetName]은(는) [From.Planet.GetName]의 지하 시설에서 거대한 붕괴 현장을 발견했습니다. 수많은 시체가 잔해 사이에 묻혀 있는 것으로 보아 거대한 폭발이 이 구역 전체를 뒤흔든 것으로 보입니다. 영향을 덜 받은 구역에선 멀쩡한 데이터 패드가 하나 발견되었습니다. 데이터 패드에는 다음과 같은 글이 적혀 있습니다.\n\n'기계공 워레스'의 로그, 날짜: 꺼져. 니란이 오늘 나를 해고했다. 난 그녀에게 고전력 절단기를 계속 사용하면 근처에 있는 메테인 가스를 점화시킬지도 모른다고 말했다. 그녀는 임무를 믿지 못하겠다면 짐을 챙기고 떠나라고 했다. 코렐의 팀에게 호소했지만 전부 니란의 편에 섰다. 좋아, 그렇게도 폭발하고 싶다면-<<음성 출력 너무 높음. 인식 실패>> <<예상하지 못한 녹화종료>>\"
 mem_dread_pirate.14.name:0 "주거 시설"
 mem_dread_pirate.14.desc:0 "[From.Planet.GetName]의 고고학자들이 Raewynn의 승무원들을 위한 기숙사로 생각되는 일련의 방을 발견했습니다. 승무원들은 여전히 여기 있으며, 침대에서 죽어 미라가 되어 있습니다. \n\n시신의 상태로 인해 그들을 죽인 원인을 확실히 알 수는 없지만, 그들에 대해 가장 이상한 점은 그들이 속했던 종이 우리에게 알려져 있지 않다는 것입니다. 아마도 그들은 현재 멸종된 약탈자 문화의 일원이었을까요?"
 mem_dread_pirate.15.name:0 "발굴"
 mem_dread_pirate.15.desc:0 "우리 고고학 팀은 [From.Planet.GetName]에 위치한 지하기지의 시설 밑에 존재하는 거대한 터널 네트워크를 발견했습니다. 아무래도 레이윈의 선원들은 [From.Planet.GetPlanetMoon]의 지각에 있는 무언가를 찾기 위해 노력한 것으로 보이며 남겨진 발굴 장비들은 이의 증거입니다. 공포의 해적을 뒤쫓은 고고학자들의 것으로도 보이는 장비들이 터널 곳곳에 흩어져 있습니다. 버려진 임시 캠프에서 [Leader.GetName]은(는) 또 다른 데이터 패드를 하나 발견했습니다. 메시지는 하나만 기록되어 있었습니다.\n\n§S\"니란, 난 너를 기다리기 위해 나와 내 선원들을 위험에 노출시킬 수 없다. 너를 위해 충분한 물자와 [From.Planet.GetPlanetMoon]을(를) 떠날 수 있는 셔틀을 하나 두고 가겠지만, 그 누구도 너를 기다리지 않을 것이다. 셔틀은 가장 가까운 문명으로 향하게 되어 있으며 너를 체포할 자들에게 인도할 것이다. 항로를 바꾸려고 하지 마라. 너를 믿은 게 실수였다. 행운을 빌지. 우리가 다시는 만나지 않기를 바라는군.\"§!"
 mem_dread_pirate.16.name:0 "니란의 운명"
 mem_dread_pirate.16.desc:0 "[Leader.GetName]는 복잡한 구조물의 나머지 부분과 분리된 거대한 빈 방으로 이어지는 터널을 따라왔습니다. 그 디자인과 기술은 Raewynn의 군대가 당시 사용하던 것과 매우 다릅니다. 긴 샤프트 끝에는 아마도 한때 바깥으로 이어졌던 해치가 있지만, 과거의 지각 활동으로 인해 무너진 것 같습니다. 그러나 Raewynn이나 그의 보물의 흔적은 보이지 않습니다. 방에서 유일하게 흥미로운 부분은 바닥에 누워 있는 시체로, 두려운 해적을 찾기 위한 탐사의 수장인 §YProfessor Nyrran§!의 인장을 가진 슈트를 입고 있습니다. 그녀는 여전히 데이터패드를 움켜잡고 있습니다. 마지막 기록은 다음과 같습니다: \n\n§S\"여기에 오는 것은 실수였습니다. Raewynn이 여기에 있었더라도 그는 사라졌습니다. 제가 한 희생은 아무 의미가 없었습니다. 표면으로 나갈 만큼의 산소가 남아 있지 않아서 가고 싶어도 갈 수 없지만, 바깥에서 저를 기다리는 것은 제가 여기 오기 위해 해야 했던 희생에 대한 체포와 재판뿐입니다. 저를 앞지르기 위해 서로 죽인 바보들의 죽음은 저에게 덮어씌워질 것입니다. 제 나머지 승무원들은 죽었거나 저를 버렸습니다. 저는 여기 남아 제 죽음을 기다리겠습니다\"§!"
 mem_dread_pirate.16.a:0 "공포의 해적 전설이 거짓말이었다는 것인가?"
 mem_dread_pirate.23.name:0 "해적 함대"
 mem_dread_pirate.23.desc:0 "해적 함대가 §Y[FromFrom.GetName]§! 항성계에 진입했습니다. \n\n그들은 항성계의 변두리에 위치하고 있으며 적대적이지 않은 것으로 보입니다. 그들의 기함이 우리에게 신호를 보내고 있습니다."
 mem_dread_pirate.24.desc:0 "안녕하세요. 저는 §SDread Pirate Raewynn§!입니다. \n\n당신이 [mem_dread_pirate_the_planet.GetName]에 있는 제 §Y\"Tomb\"§!을 약탈했다는 소식을 들었습니다. 보시다시피, 제 죽음에 대한 소문은 다소 부정확하지만, 저는 그곳에 제 소지품을 일부 남겨두어야 했습니다. \n\n제 가면을 돌려주셨으면 합니다."
 mem_dread_pirate.24.a:0 "가면은 저기에 없었다."
 mem_dread_pirate.24.a.response:0 "그렇습니까? 믿을 수 없습니다. \n\n당신은 제 기지를 상당히 철저히 약탈했습니다. 아마도 약간의 화력 시연이 저 같은 사람에게 거짓말을 하지 말라는 교훈이 될 것입니다."
 mem_dread_pirate.24.b:0 "가면은 이제 우리 것이다.(거짓말)"
 mem_dread_pirate.24.b.response:0 "과연, 그 길을 선택하겠단 것인가? 나의 힘을 조금 보여주면 마음을 바꿀지도 모르겠군."
 mem_dread_pirate.24.c:0 "이 가면이 대체 왜 중요한 것이지?"
 mem_dread_pirate.24.c.response:0 "많은 기억을 담고 있는 가면이지. 하지만 내 힘의 상징이기도 하다.\n\n가면이 없으면 다른 자들이 나를 따르게 하기가 힘들군."
 mem_dread_pirate.24.d:0 "넌 공포의 해적처럼 보이지 않는군."
 mem_dread_pirate.24.d.response:0 "어째서? 난 [convo_portrait.Species.GetName]이다. 너희들은 우리 함대를 목격한 적이 없는가?"
 mem_dread_pirate.24.e:0 "어떻게 지금까지 살아남았지?"
 mem_dread_pirate.24.e.response:0 "청결한 생활과 좋은 식습관이 당신에게 어떤 변화를 가져올 수 있는지 놀라실 겁니다."
 mem_dread_pirate.26.name:0 "공포의 해적 기함 파괴"
 mem_dread_pirate.26.desc.1:0 "우린 §Y[combat_system.GetName]§!에서 공포의 해적 기함을 파괴하였습니다. 그는 자신의 가면을 되찾기 위해 우리에게 왔습니다. 즉, 아무도 가면을 가지고 있지 않았다는 것입니다.\n\n함선의 잔해를 탐색해야 합니다. 우리가 놓친 무언가가 있을지도 모릅니다."
 mem_dread_pirate.26.desc.2:0 "공포의 해적의 기함은 [ship_killer.GetName]의 세력과 싸우다 침몰했습니다. 그는 자신의 가면을 찾기 위해 우리 영토에 왔습니다. 이는 우리 둘 다 그것을 가지고 있지 않다는 의미입니다. \n\n우리는 배의 잔해를 수색하여 더 많은 정보를 찾아야 합니다. 어쩌면 우리가 놓친 다른 단서가 있을지도 모릅니다."
 mem_dread_pirate.26.a:0 "진행하도록."
 mem_dread_pirate_destroyed_galleon:0 "파괴된 함선"
 MEM_DREAD_PIRATE_BOARDING_PROJECT:0 "기함에 승선하다"
 MEM_DREAD_PIRATE_BOARDING_PROJECT_DESC:0 "공포의 해적은 우리가 가지고 있지 않았음에도 불구하고 가면을 찾아 우리 영역을 침범했습니다. 이제 그의 함선은 잔해에 불과하니 과학팀을 보내 더 자세히 조사할 수 있습니다."
 mem_dread_pirate.27.name:0 "공포스럽지 않은 해적"
 mem_dread_pirate.27.desc:0 "우리는 [combat_system.GetName]에서 만난 이른바 "두려운 해적"이 사기꾼이라는 것을 이미 의심하고 있었으며, 그의 기함의 잔해를 연구한 결과 이를 확인할 수 있었습니다. \n\n그 배의 주인은 단지 [mem_dread_pirate_the_planet.GetName]에 있는 Raewynn의 기지에서 발생한 초공간 신호를 따라온 약탈자 군벌에 불과했습니다. 아마도 이 장치는 실제 두려운 해적이 한때 소유했던 것이었을 것입니다. 이것이 그가 우리가 복합체를 방문했다는 것을 알았던 이유일 것입니다. \n\n이 정보를 바탕으로 우리는 복합체에서 전송되고 있는 유사한 미공개 초공간 신호를 격리할 수 있었습니다. 아마도 이것이 두려운 해적의 실제 안식처를 가리킬 수 있을까요?"
 mem_dread_pirate.27.a:0 "우린 이를 조사해야 한다."
 MEM_DREAD_PIRATE_TRIANGULATION_PROJECT:0 "신호를 추적하다"
 MEM_DREAD_PIRATE_TRIANGULATION_PROJECT_DESC:0 "§Y[mem_dread_pirate_the_planet.GetName]§!에 있는 복합체는 다른 항성계의 미지의 물체와 여전히 초공간 통신을 유지하고 있는 것으로 보입니다. 이를 알고 있다면 그의 역사에 대해 더 많은 것을 밝혀낼 수 있을 것이며, 아마도 그가 착용했던 전설적인 가면을 회수할 수도 있을 것입니다."
 mem_dread_pirate.30.name:0 "신호 추적 완료"
 mem_dread_pirate.30.desc:0 "[Leader.GetName]는 [mem_dread_pirate_the_planet.GetName]에 있는 복합체에서 발생한 신호를 성공적으로 추적할 수 있었습니다. 이 신호는 근처의 미지의 항성계로 전송되고 있습니다. \n\n은하에 드레드 해적의 흔적이 남아 있다면, 그곳에 있습니다."
 mem_dread_pirate.30.a:0 "이 신호를 따라가자."
 mem_dread_pirate_gigawarform:0 "거대 전투 기계"
 mem_dread_pirate_gigawarform_plural:0 "거대 전투 기계들"
 mem_dread_pirate_large_warship_key:0 ""
 mem_dread_pirate_small_warship_key:0 ""
 mem_dread_pirate_extra_large_warship_key:0 ""
 mem_dread_pirate_boss_trait:0 "공포의 해적"
 mem_dread_pirate_boss_trait_desc:0 "오래전 은하를 공포에 몰아넣었던 전설적인 두려운 해적 레이윈."
 mem_dread_pirate_poi_name:0 "공포의 해적이 지난 길"
 mem_dread_pirate_poi_desc:0 "공포의 해적 레이윈에 대한 마지막 단서가 우릴 이곳으로 인도했습니다."
 mem_dread_pirate.31.name:0 "공포의 해적의 최종 목적지"
 mem_dread_pirate.31.desc:0 "우리는 신호의 흔적을 따라 [From.GetName] 항성계에 도착했습니다. \n\n이 지역에는 특이한 형태의 함선이 존재합니다. 그 중 하나가 우리에게 신호를 보내고 있습니다."
 mem_dread_pirate.32.desc:0 "흠, 전설의 공포의 해적을 보기 위해 왔는가?\n\n단서를 전부 모으고 조합했군. 보물을 기대했는가? 답을 원했는가?\n\n난 너희들과 대화할 생각이 없다. 나를 혼자 내버려 두기를 바란다."
 mem_dread_pirate.32.a:0 "통신을 끊어라"
 mem_dread_pirate.32.b:0 "당신이 공포의 해적인가?"
 mem_dread_pirate.32.b.response:0 "나는 그랬습니다. 이 칭호는 이제 무의미합니다. 내 승무원을 잃었을 때 나는 그것을 뒤로 남겼습니다. 내 새로운 동료들은 그런 칭호에 별로 신경 쓰지 않습니다. \n\n아마도 당신은 내 가면을 보러 온 것인가요? 더 이상 그것을 쓸 이유는 없지만, 나는 그것을 포기할 생각도 없습니다."
 mem_dread_pirate.32.c:0 "[mem_dread_pirate_the_planet.GetName]에서 무슨 일이 발생했습니까?"
 mem_dread_pirate.32.c.response:0 "큰 배신입니다. 겁쟁이들은 저와 직접 대면할 용기가 없어서 사보타주에 의존했습니다. 생명 유지 장치가 고장났을 때 제 승무원의 대부분이 죽었습니다. 저는 아래 터널에서 탈출할 수 있었습니다. \n\n제가 그곳에서 무엇을 찾고 있었는지 알고 싶으신가요? 당신 앞을 보세요. 이 배는 표면 아래에 미공개로 숨겨져 있었습니다. 그들은 제가 그것을 찾으면 막을 수 없을 것이라고 두려워했습니다. 그들은 틀리지 않았습니다."
 mem_dread_pirate.32.d:0 "그 배는 정확히 무엇인가요?"
 mem_dread_pirate.32.d.response:0 "나는 [mem_dread_pirate_the_planet.GetName]의 깊은 지하에서 그것을 발견했습니다. 그것이 내가 그 행성을 기지로 선택한 이유였습니다. \n\n누가 만들었는지는 모르지만, 그것은... 오래되었습니다. 그리고 살아 있습니다. 내가 그것을 발견했을 때, 그것은 버려져 있었고, 혼자였으며, 목적을 기다리고 있었지만, 그것을 줄 사람은 아무도 없었습니다. 나는 그것에 그 목적을 주었습니다. 그 대가로 그것은 나를 그 일부로 만들었습니다. 나를 살려주었고, 내가 미공개 상태로 숨겨져 있을 때 나와 함께 해주었습니다."
 mem_dread_pirate.32.e:0 "우리와 함께하겠는가?"
 mem_dread_pirate.32.e.response:0 "싫다."
 mem_dread_pirate.34.name:0 "공포의 해적의 끝"
 mem_dread_pirate.34.desc:0 "우리 함대는 전설의 해적 레이윈의 기함을 파괴하였습니다.\n\n함선의 잔해 속에서 우리는 우리가 찾던 보물을 얻었습니다. 파괴가 거의 불가능한 금속으로 만들어진 가면은 여전히 멀쩡했습니다."
 mem_dread_pirate.35.name:0 "$mem_dread_pirate.34.name$"
 mem_dread_pirate.35.desc:0 "보고에 의하면 공포의 해적과 그의 함대가 §Y[FromFrom.GetName]§!에 의해 파괴되었다고 합니다.\n\n그의 가면에 대해선 아무런 정보가 들어오고 있지 않습니다. 교전 도중에 사라졌을까요? 가면의 가치를 몰랐을까요? 아니면 거기에 없었을지도 모릅니다."
 mem_dread_pirate.35.a:0 "실망스러운 전설의 끝이군."
 r_mem_dread_pirate_mask:0 "공포의 해적의 가면"
 r_mem_dread_pirate_mask_desc:0 "이 가면은 한때 공포의 해적 레이윈이 썼었습니다. 그의 죽은 후에도 이 가면은 은하 곳곳에서 해적들에게 존경의 대상입니다."
 mem_dread_pirate_relic_activation_effect:0 "우리 수도에 작은 약탈자 함대가 도착할 것입니다. 유물의 사용으로 이미 얻은 제독이 없으면 특별한 제독이 같이 올 것입니다."
 mem_dread_pirate_requires_some_marauders:0 "£trigger_no£ 우리의 부름에 응답할 약탈자가 없습니다."
 mem_dread_pirate_damage_against_marauder_and_horde:0 "약탈자와 칸의 무리에게 가하는 데미지: §G+25%§!"
 mem_dread_pirate.36.name:0 "[mar_country.GetName]"
 mem_dread_pirate.36.desc.1:0 "공포의 해적 레이윈은 [mar_country.GetName] 사이에서 매우 존경받는 이름입니다. 우린 아무도 그의 가면을 찾지 못할 것이라 믿었습니다.\n\n어떤 자들은 가면이 힘의 상징이라며 가면의 주인을 섬길 의욕이 넘쳐납니다. 난 그러한 사람 중 하나가 아니지만, 그들을 막지 않을 것입니다."
 mem_dread_pirate.36.desc.2:0 "무식한 드와막이 레이윈의 가면을 찾았다고? 가면 쓰면 드와막이 공포의 해적이 될까?\n\n어떤 [mar_country.species.GetNamePlural] 녀석들은 그렇다고 하네. 바보! 바아보오! 드와막보다 무식해!"
 mem_dread_pirate.36.desc.3:0 "어떤 [mar_country.species.GetNamePlural] 사람들은 공허의 여신이 너희들을 레이윈은 안식처로 이끌었다고 믿는다. 그리고 이제 너희들은 그의 가면을 손에 넣었지. 이 행위로 너희들은 그녀의 선택받은 화신이 되는 걸까?\n\n아마 아니겠지. 하지만 너희를 따르고자 하는 자들이 그리하고 살아남는다면 그것에 장점이 있을지도 모르겠군..."
 mem_dread_pirate.36.a:0 "통신을 끊어라."
 mem_dread_pirate.40.name:0 "공포의 신봉자들"
 mem_dread_pirate.40.desc.1:0 "공포의 해적의 가르침들은 우리를 이끈다. 우리는 임무를 수행해낼 것입니다."
 mem_dread_pirate.40.desc.2:0 "앗싸아아아아아!!!! 공포의 해적은 최강의 드와막 박살내기 신이었지! 이제 드와막들을 박살내러 가자!"
 mem_dread_pirate.40.desc.3:0 "우린 당신의 부름을 받고 응했습니다. 공허의 여신은 당신을 그녀의 화신으로 선택하였습니다. 그대의 말은 곧 그녀의 말이니 우리는 그녀의 이지를 이 땅에 실현해 보이겠습니다."
 mem_dread_pirate.40.a:0 "환영한다!"
 mem_dread_pirate_relic_admiral:0 "공포의 신봉자"
 mem_dread_pirate_relic_admiral_desc:0 "이 지도자는 공포의 해적 레이윈의 가르침을 따릅니다. 강하고 빠르게 때려라, 그러면 세상이 너한테 무릎을 꿇을 것이다."
 mem_dread_pirate_relic_ruler:0 "$leader_trait_mem_dread_pirate_relic_commander$"
 mem_dread_pirate_relic_ruler_desc:0 "$leader_trait_mem_dread_pirate_relic_commander_desc$"
 mem_dread_pirate_site:0 "공포의 해적 무덤"
 mem_dread_pirate_site_desc:0 "[From.Planet.GetPlanetMoon]의 숨겨진 시설이 공포의 해적 레이윈은 무덤으로 여겨집니다.\n\n많은 자들이 이곳을 방문했지만, 빈손으로 돌아가거나 죽은 것으로 보입니다."
 leader_trait_mem_dread_pirate_boss:0 "공포의 해적"
 leader_trait_mem_dread_pirate_boss_desc:0 "오래전 은하를 공포에 몰아넣었던 전설적인 두려운 해적 레이윈."
 leader_trait_mem_dread_pirate_relic_commander:0 "공포의 신봉자"
 leader_trait_mem_dread_pirate_relic_commander_desc:0 "이 지도자는 공포의 해적 레이윈의 가르침을 따릅니다. 강하고 빠르게 때려라, 그러면 세상이 너한테 무릎을 꿇을 것이다."
