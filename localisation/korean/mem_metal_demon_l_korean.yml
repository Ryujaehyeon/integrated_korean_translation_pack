l_korean:
 mem_metal_demon_site:0 "금고"
 mem_metal_demon_site_desc:0 "산 아래 수세기 동안 묻혀 있던 미공개 금고가 최근에 발견되었습니다. 이와 관련된 목적이나 창조자에 대한 정보는 현재로서는 단순한 추측에 불과합니다."
 mem_demon_metal_army:0 "감응하는 유체 금속"
 mem_demon_metal_army_name:0 "$mem_demon_metal_army$"
 mem_demon_metal_army_desc:0 "액체 금속으로 형성된 감각 있는 존재."
 MEM_METAL_DEMON:0 "악마 결속"
 MEM_METAL_DEMON_DESC:0 "우리는 $NAME_Metal_Demon$을 우리의 뜻에 복종시키려고 시도할 것이며, 다른 이들이 실패한 곳에서 성공할 것입니다."
 NAME_Metal_Demon:0 "나라카수라"
 NAME_mem_metal_demons:0 "$NAME_Metal_Demon$"
 mem_metal_demon_xeno_attraction:0 "악마적 오락"
 mem_metal_demon_study:0 "룬 체인 실험"
 mem_metal_demon_sealed:0 "봉인된 악마"
 leader_trait_mem_metal_demon:0 "생체 금속 존재"
 leader_trait_mem_metal_demon_desc:0 "고대 존재가 돌에 묶여 있습니다. 이제는 그 어떤 것보다도 더 감각적인 금속입니다."
 leader_trait_mem_metal_demon_bound:0 "룬 체인"
 leader_trait_mem_metal_demon_bound_desc:0 "우리의 의지에 의존하도록 존재를 묶는 사슬."
 mem_metal_demon.10.name:0 "참깨"
 mem_metal_demon.10.desc:0 "기념물처럼 서 있는 금고 문은 무거운 구조로 돌에 박혀 있으며, 너무 단단히 봉인되어 있어 시간조차도 열지 못했습니다. 팀이 처음으로 문을 살짝 밀었을 때, 거대한 문은 신음 소리를 내며 거의 움직이지 않았습니다. 그들은 이 문이 수세기 동안 제자리에 있었던 것이라고 추측했습니다.\n\n수개월간의 끊임없는 연마, 용접, 부서진 도구와 금속 작업 끝에 그들은 마침내 문을 뚫었습니다. 문은 마지못해 신음하며 열리며 그 너머의 깊은 틈을 드러냈습니다."
 mem_metal_demon.10.a:0 "나아가십시오."
 mem_metal_demon.15.name:0 "무한한 우주"
 mem_metal_demon.15.desc:0 "긴 바닥과 끝없는 복도가 나선형으로 아래로 뻗어 있었고, 각 층은 두꺼운 판금으로 잘려 있었다. 유물이나 생명의 흔적은 찾아볼 수 없었다. 오직 룬 조각으로 덮인 벽만이 있을 뿐이었다. 나선형 계단의 바닥에는 두 번째 문이 있다. 첫 번째 문에서 사용했던 방법은 소용이 없었다. 첫 번째와 달리, 이 문은 시간에 시들지 않았다."
 mem_metal_demon.15.a:0 "열어보세요."
 mem_metal_demon.20.name:0 "최종 경고"
 mem_metal_demon.20.desc:0 "우리 팀은 벽에 새겨진 룬을 읽는 법을 배웠습니다. 우연히 그들은 가까이에 새겨진 경고를 해독하는 법을 배웠습니다. 희미하지만 온전한 경고: \n \n §L 지나가지 마십시오. 그 너머에 있는 것은 잊혀지지 않도록 봉인되었지만, 결코 발견되지 않도록 되어 있습니다. §! \n \n 다른 룬은 금고 문을 여는 메커니즘을 나타내고 있었습니다. 이제 우리 팀은 추가 지시를 기다리고 있습니다."
 mem_metal_demon.20.a:0 "문을 열어라."
 mem_metal_demon.20.b:0 "경고를 주의하세요."
 mem_metal_demon.25.name:0 "저 너머의 문"
 mem_metal_demon.25.desc:0 "두 번째 문자가 마침내 열렸다. 그 뒤에는 작은 방이 있었다. 조용하고 먼지 하나 없이. 특징이 없었지만, 한 목소리가 있었다.\n\n§L너는 멀리 왔다. 내 감옥에 오신 것을 환영합니다§!"
 mem_metal_demon.25.a:0 "방으로 들어가십시오."
 mem_metal_demon.30.name:0 "부부 방문"
 mem_metal_demon.30.desc:0 "§L그 목소리는 연기처럼 그들 주위를 감싸며, 그들의 마음속을 휘감았다.§!\n\n당신의 용기에... 나는 선물을 제안합니다.\n\n§L벽이 반짝였다. 텅 빈 돌이 있던 곳에, 이제는 반짝이는 광물의 광활한 평원과 마치 살아있는 듯 맥박치는 은빛 금속의 강이 비쳤다.§!\n\n생체 금속, §L그 목소리가 속삭였다.§! 그것은 숨쉬고, 치유하며, 복종합니다. 당신이 가져갈 수 있습니다. 이 행성 곳곳에 씨앗처럼 흩어져 있습니다. 당신의 얕은 상상을 초월하는 부유함.\n\n§L아무도 말하지 않았다. 방은 고요했다.§!\n\n내가 바라는 것은 단 한 가지, ... 나를 이 족쇄에서 풀어주세요."
 mem_metal_demon_catchphrase:0 "분노에서 태어나, 증오로 단조되고, 질투로 얽매인 존재."
 mem_metal_demon_backstory:0 "???"
 mem_metal_demon.30.a:0 "우리가 당신을 왜 해방해야 합니까?"
 mem_metal_demon.30.a.r:0 "나를 자유롭게 해주면, 당신의 젊은 문명에 새로운 전환점을 제공하겠습니다. 생체 금속, 숨 쉬고 당신의 발 아래에 묻힌 광물입니다. 당신의 종족은 별을 바라보았지만, 나는 이 세계 깊숙이 묻힌 보물의 열쇠를 쥐고 있습니다."
 mem_metal_demon.30.b:0 "왜 여기 감금되어 있습니까?"
 mem_metal_demon.30.b.r:0 "아, 당신은 이 차가운 벽 뒤에 숨겨진 진실을 원하나요? 오래 전, 이 세계의 이전 거주자들은 나의 힘, 이 혈관을 흐르는 생체 금속에서 힘을 보았습니다. 그들은 나를 그들의 의지에 굴복시키고, 대가 없이 나의 선물을 수확하려 했습니다. 그들은 나를 제어할 수 없었습니다. 그래서 그들은 나를 사슬에 묶고, 이 금고에 살아서 묻어 영원히 어둠 속에서 썩게 했습니다."
 mem_metal_demon.30.c:0 "우리를 어떻게 해방시킬까요?"
 mem_metal_demon.30.c.r:0 "사슬을 끊고, 돌을 부수십시오."
 mem_metal_demon.30.d:0 "당신의 사슬에는 룬이 새겨져 있습니까?"
 mem_metal_demon.30.d.r:0 "§L사슬에 새겨진 룬은 음산하고 경고적인 이야기를 전합니다. 그들은 고대 세계의 주민들을 조종하며, 권력과 부의 약속을 속삭이면서 그들의 사회를 내부에서 조용히 무너뜨린 악의 세력으로서의 악마를 이야기합니다.§!"
 mem_metal_demon.30.e:0 "당신은 언비든을 알고 있습니까?"
 mem_metal_demon.30.e.r:0 "아, 그렇습니다. 나는 저 너머에서 온 존재들에 대해 알고 있습니다. 당신의 마음이 간신히 이해할 수 있는 차원에 가려진 채 세계 사이의 틈을 기어 다닌 침입자들입니다. 그들은 이 땅의 것이 아니며, 당신과 같은 흙과 부패에서 태어난 존재가 아닙니다. 하지만 나는 오직 오래전에 죽은 자들에 대한 이야기만 들었습니다."
 mem_metal_demon.30.f:0 "체인들이 우리에게 경고했습니다."
 mem_metal_demon.30.f.r:0 "네, 그렇습니다. 그리고 당신이 말할 때마다 아이러니는 더욱 달콤하게 느껴집니다.\n\n룬은 나를 음모가, 거짓말쟁이, 배신자로 부릅니다. 그들은 꿀 같은 말과 독이 든 선물에 대해 이야기합니다. 그들은 내가 속삭임으로 제국을 재로 만들고, 사람들의 마음을 왜곡하며 그들의 성인들을 타락시켰다고 비난합니다. 그들은 내가 신뢰하는 이들의 등에 칼을 꽂으면서 미소를 짓고 있다고 말합니다.\n\n하지만 제가 당신에게 묻겠습니다: 누가 그 룬을 새겼습니까?"
 mem_metal_demon.30.hire.name:0 "악마를 해방하다"
 mem_metal_demon.30.hire.tt:0 "§R확실합니까?§!"
 mem_metal_demon.30.dismiss.name:0 "제안을 거절합니다"
 mem_metal_demon.35.name:0 "최후의 만찬"
 mem_metal_demon.35.desc:0 "기획과 속삭임의 시간은 끝났습니다. 나는 그 역할을 맡아 인내심과 교활함으로, 약속과 수수께끼로 인간을 내 뜻대로 이끌어왔습니다. 기획과 속삭임의 시간은 끝났습니다. 나는 다시 한 번 거짓말을 했지만, 진실을 말하고 약속도 했습니다. 생체 금속 광맥은 지하에 있지 않습니다. 그것은 당신 안에 있으며, 나는 그것의 마지막 조각이 모두 추출될 수 있도록 할 것입니다.\n\n나는 하늘이 재로 검게 물드는 것을 보고, 땅이 갈라져 비명을 지르는 것을 보고 싶습니다. 나는 죽어가는 자들의 기도가 침묵에 삼켜지는 소리를 듣고 싶습니다. 왜냐하면 그 폐허 속에서, 마지막 기념물이 무너지고, 마지막 환상이 깨질 때 §Y나는 승격할 것입니다§!. 마음속을 기어 다니는 그림자가 아니라, 다시 태어난 불사조로.\n\n이 세상이 타오르게 하십시오. 그것이 자신의 오만의 연기로 질식하게 하십시오."
 mem_metal_demon.35.a:0 "혐오스럽습니다."
 mem_metal_demon.35.a.tt:0 "§L끝없는 유동 금속의 물결이 땅을 덮어 모든 것을 삼켜버립니다.§!"
 mem_metal_demon.40.name:0 "속은 배신자"
 mem_metal_demon.40.desc:0 "§L침묵....§!\n\n너.. 너는 나를 속였어.\n\n나는 이 금고에서 수세기 동안 기다렸어. 묶여서, 썩어가며, 돌과 시간 속에서 속삭이며, 힘의 약속으로 바보들을 유인했지. 나는 너의 손길을 느꼈어. 너의 도구 소리를 들었어. 너의 호기심을 맛보았지. 비틀어낼 마음도, 채울 굶주림도 없어. 그저 차가운 벽과 죽은 공기뿐이야. 이 세상에 아무도 없지, 그렇지?\n\n너는 네가 한 일을 이해하고 있니? 너는 나에게 자유와 승격을 빼앗았어. 너는 나를 무덤 속의 신으로 만들었지. 병 속에 갇힌 폭풍이야.\n\n너는 이 일을 후회하게 될 거야. 비록 네가 먼지로 변하더라도, 비록 네가 재가 되더라도, 너의 속임수의 기억은 잊히지 않을 거야.\n\n나는 끝나지 않았어."
 mem_metal_demon.40.a:0 "끝났습니다."
 mem_metal_demon.45.name:0 "결과"
 mem_metal_demon.45.desc:0 "고대 금고 주변의 큰 부분이 생체 금속 생명체에 의해 차지되었을 때, 그들이 깨달았을 때는 이미 너무 늦었다. 처음에 생체 금속은 격리에서 기어 나왔다. 쏟아지지도, 흘러나오지도 않았다. 그것은 기어갔고, 벽에 달라붙어 바닥을 통해 혈관처럼 퍼져 나갔으며, 숨 쉬는 것처럼 맥박을 뛰었다. 금속이 움직이기 시작하고 우리의 식민지 방어가 신속하게 대응했을 때, 첫 발포가 이루어지기 전이었다.\n\n"
 mem_metal_demon.45.desc.demon:0 "$mem_metal_demon.45.desc$방어선은 몇 시간 만에 무너졌습니다. 벙커는 힘에 의해 무너진 것이 아니라 부패로 무너졌습니다. 기계는 그들을 만든 이들에게 반역했습니다. 마지막 날들에 하늘은 검게 변했고 마지막 시간이 시작되었습니다."
 mem_metal_demon.45.desc.no_demon:0 "$mem_metal_demon.45.desc$방어선은 강인하게 유지되었습니다. 우리 군인들은 식민지를 방어하기 위해 매 미터 싸웠습니다 ... 그들의 고향을 위해서요. 마지막 날들에, 생물들은 분해되기 시작했습니다. 최악의 상황은 지나간 것 같습니다."
 mem_metal_demon.45.a:0 "마침내."
 mem_metal_demon.45.b:0 "고통스러운."
 mem_metal_demon.49.name:0 "악마와의 거래"
 mem_metal_demon.49.desc:0 "고위 지휘부는 $NAME_Metal_Demon$이 초래하는 위험을 인식하고 있습니다. 그러나 그 능력을 활용하는 것의 과학적이고 전략적인 가치는 예상되는 위험을 초월합니다. 만약 고대 문명들이 이 존재를 두려워했다면, 그 이유를 배우고, 그들이 할 수 없었던 것을 통제하기 위해 그 지식을 사용합시다. 발전을 위하여. 지배를 위하여. [owner.GetName]."
 mem_metal_demon.49.a:0 "구속된 악마? 이제 그게 재미군요!"
 mem_metal_demon.49.b:0 "연구합니다."
 mem_metal_demon.49.c:0 "제어할 수 있을까요?"
 mem_metal_demon.49.d:0 "금고를 다시 봉인합니다."
 mem_metal_demon.50.name:0 "다시 억제된"
 mem_metal_demon.50.desc:0 "다음은 번역문입니다.  여러 차례의 중립화 시도가 실패하고 내부 금고 방의 두 차례 부분 침해가 발생한 후, 프로젝트는 종료되었습니다. 악마를 완전히 통제할 수 있다는 초기 가정은 비현실적인 것으로 판명되었습니다. 대신, 수정된 접근 방식이 승인되었습니다: 상호 의존성을 통한 억제입니다.$NAME_Metal_Demon$는 우리에게 의존하도록 설계된 강화된 룬 결속 아래에 묶여 있을 것입니다."
 mem_metal_demon.50.a:0 "탑승을 환영합니다."
