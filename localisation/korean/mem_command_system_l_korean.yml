l_korean:
 mem_command_system_category:0 "지진 감지"
 mem_command_system_category_desc:0 "이 세계의 지진계 측정 결과, 표면 아래 깊은 곳에서 비정상적인 움직임이 감지되었습니다. 지진의 심각성과는 거리가 멀지만, 이 일반적인 움직임 패턴은 우리 과학자들을 당황하게 만들었습니다."
 mem_command_system.1.name:0 "지하 지휘소"
 mem_command_system.1.desc:0 "§Y[From.From.GetName]§!는 대기 중 방사선 스캔에 따르면 약 30,000년 전에 죽은 행성이 되었습니다. 세계에서 가장 큰 국가 중 하나의 도시와 주요 군사 시설의 잔해 아래에서, 우리의 과학자들은 지하 네트워크로 이어지는 거대한 엘리베이터 샤프트를 발견했습니다. 몇 킬로미터 깊이의 지하에 위치해 있습니다.\n\n§Y[This.leader.GetName]§!는 이 터널과 역의 네트워크가 일종의 거대한 철도라고 보고합니다. 그들의 창조자들은 \"명령 시스템\"이라고 부르는 이 철도가 일종의 방사능 대피소로 사용되기를 의도했던 것으로 보입니다. 명령 시스템은 지속적으로 이동함으로써 지구 침투 무기 또는 \"EPWs\"의 공격을 피할 수 있었습니다. 그러나 철도의 창조자들은 핵 겨울의 지속 기간과 표면이 방사능 낙진으로 인해 얼마나 오랫동안 거주 불가능할지를 크게 과소평가한 것 같습니다. 평균 80년이 지난 후, 각 기차는 보급이 바닥나고, 그 승무원들은 곧 사망했습니다.\n\n현재, 버려진 기차들은 §Y[From.From.GetName]§!의 지하에서 여전히 작동하고 있으며, 그 놀라운 나이에도 불구하고 흔들리고 있습니다. 그 안에 들어간 기술은 우리의 기준으로는 구식이지만, 수만 년 후에도 작동하게 한 방법을 연구하는 것은 우리에게 많은 귀중한 정보를 제공할 수 있습니다."
 mem_command_system.100.name:0 "오류"
 mem_command_system.100.desc:0 "많은 논의 끝에 §Y[This.leader.GetName]§!와 §Y[This.GetName]§!의 승무원들은 §Y[From.From.GetName]§!에서의 지진 측정값이 고장난 지진계 때문이라는 결론에 도달했습니다. 긍정적인 점은, 이것이 §Y[This.leader.GetName]§!에게 앞으로 이상 현상을 연구할 때 더 조심해야 한다는 교훈을 주었다는 것입니다; 다음 번에는 이러한 실수가 누군가의 죽음으로 이어질 수 있습니다."
 mem_command_system.100.a:0 "한 번 속지 두 번 속나..."
 d_mem_command_system:0 "지하 지휘소"
 d_mem_command_system_desc:0 "핵 재앙 발생 시 군사 지휘소를 수용하기 위해 설계된 대규모 지하 철도 네트워크입니다. 원래 거주자들은 오래전에 멸종하였습니다."
