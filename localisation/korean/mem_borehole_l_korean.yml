l_korean:
 mem_borehole_category:0 "땅 위의 구멍"
 mem_borehole_category_desc:0 "표층 스캔 결과 행성의 지각 내에 긴 수직 동굴이 드러났습니다. 정확한 직각과 비정상적으로 매끄러운 표면은 동굴이 인공적으로 만들어진 시설임을 시사하고 있습니다."
 mem_borehole.1.name:0 "버려진 깊은 광산"
 mem_borehole.1.desc:0 "[Root.leader.GetName]는 이 시설이 행성의 지각 깊은 곳에서 광물을 추출하기 위해 설계된 일종의 광산이라고 보고합니다. 현재 이 광산은 비활성 상태이며, 최소한의 수리로 다시 가동할 수 있습니다."
 mem_borehole.1a:0 "장비를 수리해라."
 mem_borehole.1b:0 "장비를 분해해서 정보를 얻자."
 mem_borehole.1c:0 "시추 장비를 인양하라."
 mem_borehole.2.name:0 "희귀 광물 조사"
 mem_borehole.2.desc:0 "이 갱도는 희귀한 광맥 채굴을 위해 설계된 것 같습니다. 하지만 갱도가 그 광물에 닿았을 때, 프로젝트는 알 수 없는 이유로 취소되었습니다."
 mem_borehole.2a:0 "왜 그랬는지 연구해 봐야겠다."
 mem_borehole.2b:0 "저들이 어떤 광물을 찾았는지 볼까."
 mem_borehole.3.name:0 "미사일 격납고"
 mem_borehole.3.desc:0 "광산 바닥에서 우리 과학 팀은 지금까지 기록된 가장 큰 열핵탄두가 장착된 거대한 로켓을 발견했습니다. 그러나 [Root.leader.GetName]은 이것이 사실 무기가 아니라 어떤 종류의 신기한 프로젝트라고 제안합니다. 그 이유는 이 로켓의 질량, 물자 구성 및 구조로 인해 비행할 수 없으며, 조차도 탈출 속도에 도달할 수 없기 때문입니다. 그러나 디자인 선택 중 일부는 여전히 매우 흥미롭습니다."
 mem_borehole.3a:0 "그 로켓에 대해서 알아봐야겠군."
 mem_borehole.4.name:0 "서식지"
 mem_borehole.4.desc:0 "검사 결과, 갱도의 벽은 생명 유지 장치가 장착된 수천 개의 작은 자립 포드로 구성되어있는 것으로 나타났습니다. 그들 중 대부분은 깨끗한 상태고 거주민도 없지만, 내부에 흩어진 물건들이 있는 것으로 보아 주민들이 급하게 떠났음을 암시합니다. 포드의 독특한 설계는 흥미로운 연구대상이 될 수 있을 것으로 보입니다."
 mem_borehole.4a:0 "조사해보자."
 mem_borehole.5.name:0 "진흙 퇴적물"
 mem_borehole.5.desc:0 "초기 관측 결과, 샤프트는 거의 완전히 고에너지 방사능 슬러지로 채워져 있습니다. 이는 다른 문명의 산업 오염물질이 버려진 장소였던 것으로 보입니다. [Root.leader.GetName]은(는) [Leader.GetHerHis] 위험한 물자 보호 기술이 [Leader.GetHerHim]과 [Leader.GetHerHis] 팀을 이 \"자연에 대한 범죄\"로부터 구할 수 있다는 믿음이 부족하다고 주장하며 더 이상 진행하기를 거부합니다."
 mem_borehole.5a:0 "역겹군. 하지만 흥미로워."
 mem_borehole.6.name:0 "바닥을 향한 경주"
 mem_borehole.6.desc:0 "과학 팀이 보어홀을 조사했습니다. 벽의 질감을 판단할 때, 강력한 레이저 설치로 조각된 것으로 보이며, 특히 유용한 광물층에 닿지 않고 행성의 용융 핵에 도달한 것으로 보입니다. 근처에서 [Root.leader.GetName]이(가) 에너지가 오래전에 소진된 작은 송신기를 발견했습니다. 데이터 뱅크의 초기 분석에 따르면, 이 송신기는 경쟁자들보다 먼저 행성의 용융 핵에 도달했다는 메시지를 은하 전역에 반복적으로 방송하기 위해 설계된 것으로 보입니다."
 mem_borehole.6a:0 "축하해야겠군. 아마도."
 mem_borehole.7.name:0 "아무런 가치없는 발견"
 mem_borehole.7.desc:0 "[Root.leader.GetName]는 이 샤프트가 분명히 인공 보어홀임에도 불구하고, 유용한 기술이나 광물 매장물이 회수되지 않은 채로 깨끗하게 긁혀졌다고 보고합니다."
 mem_borehole.8.name:0 "함정이다!"
 mem_borehole.8.desc:0 "[From.GetName]에서 보어홀을 탐사하는 동안, §Y[Root.leader.GetName]§!이(가) 어떤 종류의 덫을 작동시킨 것으로 보이며, 이로 인해 전체 구조물이 무너져 [Leader.GetHerHim]과 [Leader.GetHerHis] 팀의 대부분이 사망했습니다."
