 civic_mem_colonial_greed_desc:0 "향신료는 흘러야 합니다. (이 사회제도는 보이지 않습니다)"
 civic_mem_colonial_administration_desc:0 "$civic_mem_colonial_greed_desc$"
 civic_mem_land_of_opportunity_desc:0 "$civic_mem_colonial_greed_desc$"
