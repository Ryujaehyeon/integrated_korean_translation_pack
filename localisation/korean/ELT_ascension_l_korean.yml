 #Cybernetic

 leader_trait_extra_cybernetic_overcharged_augments_1:0 "과충전 증강체"
 leader_trait_extra_cybernetic_overcharged_augments_1_desc:0 "이 지도자는 안전 인증에 부합하지 않는 임플란트를 설치했습니다. 이 임플란트는 향상된 성능을 보장하지만, 예상치 못한 위험을 초래할 수 있습니다."
 leader_trait_extra_cybernetic_overcharged_augments_2:0 "과충전 증강체 II"
 leader_trait_extra_cybernetic_overcharged_augments_2_desc:0 "이 지도자는 안전 인증에 부합하지 않는 임플란트를 설치했습니다. 이 임플란트는 향상된 성능을 보장하지만, 예상치 못한 위험을 초래할 수 있습니다."
 leader_trait_extra_cybernetic_outwardly_appealing:0 "매력적인 외모"
 leader_trait_extra_cybernetic_outwardly_appealing_desc:0 "이 지도자는 외모를 개선하는 임플란트를 설치했습니다. 청중의 주의를 끄는 데 탁월하며, 어디를 가든 시선을 한 몸에 받습니다."
 leader_trait_extra_cybernetic_augmentation_overseer:0 "증강 감독관"
 leader_trait_extra_cybernetic_augmentation_overseer_desc:0 "이 지도자는 전 인원의 증강 사업을 감독합니다. 모든 이가 증강물을 이용할 수 있도록 보장하는 책임을 맡고 있습니다."
 leader_trait_extra_cybernetic_translator_module:0 "번역 모듈"
 leader_trait_extra_cybernetic_translator_module_desc:0 "이 지도자의 언어 중추 신경 조직에는 번역 모듈이 이식되어 있습니다. 이 모듈을 통해 지도자는 미지의 언어를 실시간으로 번역하고, 지체 없이 다른 언어로 자신을 표현할 수 있습니다."
 leader_trait_extra_cybernetic_neural_calculators:0 "신경 계산기"
 leader_trait_extra_cybernetic_neural_calculators_desc:0 "이 지도자의 인지 능력은 수학 공식 처리에 탁월하도록 개조되었습니다. 계산 임플란트는 놀라운 속도로 계산할 수 있게 해줍니다."
 leader_trait_extra_cybernetic_augmented_visual_sensors:0 "증강 시각 센서"
 leader_trait_extra_cybernetic_augmented_visual_sensors_desc:0 "이 지도자의 시각 기관에 있는 회전하고 빛나는 사이버네틱 망막은 다양한 시각 모드, 확대/축소 기능을 사용하고 시야의 사진을 생성할 수 있게 해줍니다."
 leader_trait_extra_cybernetic_historical_database_module:0 "역사 데이터베이스 모듈"
 leader_trait_extra_cybernetic_historical_database_module_desc:0 "이 지도자의 기억 조직에는 [GetGalEmpireName]의 역사 데이터베이스에 접근할 수 있는 저장 장치가 삽입되어 있습니다."
 leader_trait_extra_cybernetic_connected_database:0 "연결된 데이터베이스"
 leader_trait_extra_cybernetic_connected_database_desc:0 "이 임플란트는 지도자가 유사한 임플란트를 사용하는 다른 개인과 기억을 공유할 수 있게 해줍니다."
 leader_trait_extra_cybernetic_fortress_interface:0 "요새 인터페이스"
 leader_trait_extra_cybernetic_fortress_interface_desc:0 "이 지도자의 팔다리에서는 행성의 요새화 시스템에 직접 연결할 수 있는 다양한 케이블 연결부가 뻗어 나옵니다."
 leader_trait_extra_cybernetic_targeting_implants:0 "조준 임플란트"
 leader_trait_extra_cybernetic_targeting_implants_desc:0 "이 임플란트만 있으면 스톰트루퍼만큼 정확해집니다 - 사이버네틱 임플란트 AX-4531의 사용 설명서 라벨."
 leader_trait_extra_cybernetic_kinetic_exo_plates:0 "운동 외골격 장갑"
 leader_trait_extra_cybernetic_kinetic_exo_plates_desc:0 "금속판이 이 지도자의 몸을 둘러싸 주요 장기를 보호하고 운동 범위를 획기적으로 향상시킵니다."
 leader_trait_extra_cybernetic_connected_visual_implants:0 "연결된 시각 임플란트"
 leader_trait_extra_cybernetic_connected_visual_implants_desc:0 "이 지도자는 은하계 교전의 시각 데이터에 즉시 접근할 수 있으며, 이 데이터를 활용하여 함대 인원의 신경 임플란트에 피드백을 보냅니다."
 leader_trait_extra_cybernetic_industrialist:0 "증강된 총독"
 leader_trait_extra_cybernetic_industrialist_desc:0 "이 지도자는 행성 인구 기록 데이터베이스에 직접 연결되어 있습니다. 가장 적합한 직업에 노동자를 배치할 수 있습니다."

 #Genetic

 leader_trait_extra_genetic_biological_immortality:0 "생물학적 불멸성"
 leader_trait_extra_genetic_biological_immortality_desc:0 "생애 주기 내내 세포를 끊임없이 재생하는 것으로 알려진 독특한 수중 생물과 유사하게, 이 지도자는 불멸에 가까운 상태에 도달했습니다. 하지만 무한한 시간을 손에 넣자, 동기 부여는 약해졌습니다."
 leader_trait_extra_genetic_nutritional_modification:0 "영양 개조"
 leader_trait_extra_genetic_nutritional_modification_desc:0 "이 지도자는 생물로써의 영양 요구량을 조절하는 유전자를 발견했으며, 그 요구량을 줄이는 방법을 개발했습니다."
 leader_trait_extra_genetic_planetary_cloner:0 "행성 복제 전문가"
 leader_trait_extra_genetic_planetary_cloner_desc:0 "이 지도자는 이 행성 표면에 걸쳐 있는 거대한 생물학적 조립 공장을 감독합니다."
 leader_trait_extra_genetic_versatile_vocal_chords:0 "다재다능한 성대"
 leader_trait_extra_genetic_versatile_vocal_chords_desc:0 "원래는 다른 종의 소리를 흉내 낼 수 없었지만, 이 지도자는 성대의 유전자 코드를 개선하여 보편적인 소리를 낼 수 있게 만들었습니다."
 leader_trait_extra_genetic_productivity_improvements:0 "생산성 향상"
 leader_trait_extra_genetic_productivity_improvements_desc:0 "이 지도자는 노동 인력의 유전적 구성을 개선하여 생산성을 향상시켰습니다."
 leader_trait_extra_genetic_GMO:0 "유전자 변형 유기체"
 leader_trait_extra_genetic_GMO_desc:0 "이 행성 농부들의 수확량은 유전자 변형 유기체에 기반합니다. 이러한 변형은 다양하고 향상된 수확량을 가능하게 합니다."
 leader_trait_extra_genetic_appearance_modification:0 "외모 변형"
 leader_trait_extra_genetic_appearance_modification_desc:0 "외교적 성공을 위해 사절의 외모를 유전자 변형을 통해 개선했습니다."
 leader_trait_extra_genetic_genome_experimentation:0 "유전체 실험"
 leader_trait_extra_genetic_genome_experimentation_desc:0 "이 지도자는 거주민의 번식 능력을 개선하고 적응시키기 위해 생체 실험을 진행하고 있습니다."
 leader_trait_extra_genetic_biomaterial_fascination:0 "생체 물질에 대한 매료"
 leader_trait_extra_genetic_biomaterial_fascination_desc:0 "이 지도자는 생물학적 물질의 잠재력에 깊이 매료되어 있으며, 실용적 및 실험적 목적 모두를 위해 유기 물질을 활용하는 새로운 방법을 끊임없이 모색합니다. 이들의 혁신은 종종 유전 공학의 한계를 뛰어넘습니다."
 leader_trait_extra_genetic_investigative_suborgans:0 "탐사 보조 기관"
 leader_trait_extra_genetic_investigative_suborgans_desc:0 "이 지도자의 유전적으로 강화된 보조 기관은 새로운 생물학적 현상을 신속하게 분석하고 적응하는 비범한 능력을 부여합니다. 이들의 예리한 탐구 정신은 세포 수준에서 유전자 변형을 개선할 방법을 끊임없이 모색합니다."
 leader_trait_extra_genetic_biological_calculator:0 "생체 계산기"
 leader_trait_extra_genetic_biological_calculator_desc:0 "생물학적 시스템과 유전자 서열 계산에 뛰어난 정신을 부여받은 이 지도자는 복잡한 유전자 변형의 결과를 놀라운 정밀도로 예측할 수 있어 유전 연구 및 유전 공학에서 매우 귀중한 존재입니다."
 leader_trait_extra_genetic_independent_cognition:0 "독립적 인지"
 leader_trait_extra_genetic_independent_cognition_desc:0 "자율적으로 기능하는 정신을 소유한 이 지도자는 외부 입력에 덜 의존하며 독창적인 이론을 개발하거나 독립적으로 문제를 해결하는 능력이 뛰어납니다. 이들의 인지 능력은 복잡한 유전 프로젝트나 연구 과제를 관리하는 데 특히 효과적입니다."
 leader_trait_extra_genetic_enhanced_working_memory:0 "향상된 작업 기억"
 leader_trait_extra_genetic_enhanced_working_memory_desc:0 "이 지도자의 향상된 작업 기억은 방대한 양의 유전 데이터를 동시에 보유하고 처리할 수 있게 합니다. 이들은 빠르게 진행되는 고위험 유전 실험이나 프로젝트에서 신속하게 전략을 조정하고 중요한 결정을 내릴 수 있습니다."
 leader_trait_extra_genetic_clone_commander:0 "개조 병사 지휘관"
 leader_trait_extra_genetic_clone_commander_desc:0 "유전자 변형에 대한 깊은 이해와 강화된 전사를 이끌 정신력을 갖춘 이 지도자는 유전적으로 변형된 병사들로 구성된 군대를 지휘하는 데 탁월합니다. 이들의 리더십은 이 부대들이 비할 데 없는 협응력과 효율성으로 기능하게 합니다."
 leader_trait_extra_genetic_accelerated_personnel:0 "가속화된 인력"
 leader_trait_extra_genetic_accelerated_personnel_desc:0 "이 지도자의 유전적 강화는 인력의 성장, 훈련 및 개발을 급속도로 가속화할 수 있게 합니다. 일반적인 시간의 일부만으로 매우 유능한 개인을 만들어내는 이들의 능력은 중요한 프로젝트와 임무가 놀라운 속도로 완료되도록 보장합니다."

 ##Hive Cybernetic

 leader_trait_extra_cybernetic_overcharged_augments_1_hive:0 "시냅스 과부하 전송관"
 leader_trait_extra_cybernetic_overcharged_augments_1_hive_desc:0 "고급 전송관이 막대한 신경 에너지를 전달하여 지도자와 군체의 통합을 증폭시킵니다. 이는 비할 데 없는 협응력을 가능하게 하지만, 심각한 시스템 과부하의 위험을 동반합니다."
 leader_trait_extra_cybernetic_overcharged_augments_2_hive:0 "$leader_trait_extra_cybernetic_overcharged_augments_1_hive$ II"
 leader_trait_extra_cybernetic_overcharged_augments_2_hive_desc:0 "$leader_trait_extra_cybernetic_overcharged_augments_1_hive_desc$"
 leader_trait_extra_cybernetic_outwardly_appealing_hive:0 "페로몬 신호 투사기"
 leader_trait_extra_cybernetic_outwardly_appealing_hive_desc:0 "지도자의 시스템에 통합된 방출기가 거부할 수 없는 페로몬 및 시각적 신호를 방송하여, 복종을 보장하고 드론들을 군체의 의지에 동조시킵니다."
 leader_trait_extra_cybernetic_augmentation_overseer_hive:0 "군체 기능 감독관"
 leader_trait_extra_cybernetic_augmentation_overseer_hive_desc:0 "이 증강체는 지도자가 드론의 행동을 정밀하게 지시하고 최적화할 수 있게 하여, 모든 개체가 완벽한 조화 속에서 작동하고 변화하는 요구에 신속하게 적응하도록 보장합니다."
 leader_trait_extra_cybernetic_translator_module_hive:0 "청각 공명 노드"
 leader_trait_extra_cybernetic_translator_module_hive_desc:0 "이 노드들은 청각 인식 및 출력을 향상시켜, 지도자가 군체 통신 주파수를 완벽한 공명과 즉각적인 군체 전체의 이해를 위해 조율할 수 있게 합니다."
 leader_trait_extra_cybernetic_neural_calculators_hive:0 "신경 매트릭스 통합"
 leader_trait_extra_cybernetic_neural_calculators_hive_desc:0 "내장된 프로세서가 지도자의 정신을 군체 데이터 스트림과 완벽하게 통합하여, 이들을 집단 지성의 고효율 전송관으로 변모시킵니다."
 leader_trait_extra_cybernetic_augmented_visual_sensors_hive:0 "전지적 광학 배열"
 leader_trait_extra_cybernetic_augmented_visual_sensors_hive_desc:0 "이 강화된 광학 임플란트 배열은 지도자에게 포괄적인 시각적 오버레이를 제공하여, 군체 네트워크 전반에 걸쳐 실시간 데이터 분석과 정확한 상황 인식을 가능하게 합니다."
 leader_trait_extra_cybernetic_historical_database_module_hive:0 "군체 선조 기록 보관소"
 leader_trait_extra_cybernetic_historical_database_module_hive_desc:0 "통합된 데이터베이스가 지도자를 군체의 선조 기억과 연결하여, 수천 년간 축적된 지혜와 전술적 통찰력에 즉시 접근할 수 있게 합니다."
 leader_trait_extra_cybernetic_connected_database_hive:0 "집합적 정신 수렴"
 leader_trait_extra_cybernetic_connected_database_hive_desc:0 "동기화 임플란트가 지도자와 군체의 연결을 강화하여, 원활한 협응을 가능하게 하고 집단적 의사 결정의 전반적인 효율성을 향상시킵니다."
 leader_trait_extra_cybernetic_fortress_interface_hive:0 "군체 요새화 중추"
 leader_trait_extra_cybernetic_fortress_interface_hive_desc:0 "이 임플란트는 지도자를 군체의 방어 시스템에 통합하여, 요새의 정밀한 협응과 방어 수단의 신속한 배치를 가능하게 합니다."
 leader_trait_extra_cybernetic_targeting_implants_hive:0 "통합 조준망"
 leader_trait_extra_cybernetic_targeting_implants_hive_desc:0 "고급 조준 시스템은 지도자가 군체 개체들의 정밀 사격을 동기화하여, 전투 상황에서 정확도와 치사율을 극적으로 증가시킬 수 있게 합니다."
 leader_trait_extra_cybernetic_kinetic_exo_plates_hive:0 "운동 저항 갑피"
 leader_trait_extra_cybernetic_kinetic_exo_plates_hive_desc:0 "강화된 갑피 장갑이 지도자의 내구성을 향상시켜, 이들을 군체의 탄력적인 보루이자 뚫을 수 없는 방어의 상징으로 만듭니다."
 leader_trait_extra_cybernetic_connected_visual_implants_hive:0 "시각 피질 중계망"
 leader_trait_extra_cybernetic_connected_visual_implants_hive_desc:0 "시각 데이터 스트림이 이 네트워크를 통해 군체 전체에 전송되어, 지도자가 중요한 감각 정보를 공유하고 집단적 상황 인식을 유지할 수 있게 합니다."
 leader_trait_extra_cybernetic_industrialist_hive:0 "증강된 군락 통제관"
 leader_trait_extra_cybernetic_industrialist_hive_desc:0 "이 지도자는 직접적인 인터페이스를 통해 군락의 증강된 일꾼들을 통제하며, 드론을 직접 제어할 수 있습니다."

 ##Hive Genetic

 leader_trait_extra_genetic_biological_immortality_hive:0 "영원한 생체량 승격"
 leader_trait_extra_genetic_biological_immortality_hive_desc:0 "유전적 완성을 통해 이 지도자의 생물학적 구조는 무기한으로 유지되며, 군체에 대한 지속적인 봉사를 보장합니다."
 leader_trait_extra_genetic_nutritional_modification_hive:0 "최적화된 영양분 동화"
 leader_trait_extra_genetic_nutritional_modification_hive_desc:0 "유전적 적응은 신진대사 효율을 향상시켜, 자원 수요를 줄이는 동시에 최고의 생산성을 유지합니다."
 leader_trait_extra_genetic_planetary_cloner_hive:0 "가속화된 드론 산란"
 leader_trait_extra_genetic_planetary_cloner_hive_desc:0 "복제 기술은 군체의 유전적 숙련도와 통합되어 행성 표면에서 빠른 개체 수 성장을 가능하게 합니다."
 leader_trait_extra_genetic_versatile_vocal_chords_hive:0 "적응형 통신 모듈"
 leader_trait_extra_genetic_versatile_vocal_chords_hive_desc:0 "이 지도자의 유전적 변형은 광범위한 음성 출력을 가능하게 하여, 다양한 종과 하위 군체 네트워크 간의 통신을 가능하게 합니다."
 leader_trait_extra_genetic_productivity_improvements_hive:0 "향상된 드론 생산성"
 leader_trait_extra_genetic_productivity_improvements_hive_desc:0 "정밀하게 설계된 유전자는 일꾼 드론의 생산량을 증대시켜, 군체 작전에서 비할 데 없는 효율성을 보장합니다."
 leader_trait_extra_genetic_GMO_hive:0 "유전자 재구성 프로토콜"
 leader_trait_extra_genetic_GMO_hive_desc:0 "포괄적인 유전자 재형성은 유기체의 적응력을 향상시키고, 생체 물질을 군체의 필요에 맞게 조정합니다."
 leader_trait_extra_genetic_appearance_modification_hive:0 "형태학적 적응 설계"
 leader_trait_extra_genetic_appearance_modification_hive_desc:0 "외부 형태 조정을 통해 지도자는 외교, 위협 또는 특수 임무에 맞게 외형을 조정할 수 있습니다."
 leader_trait_extra_genetic_genome_experimentation_hive:0 "실험적 유전체 정제"
 leader_trait_extra_genetic_genome_experimentation_hive_desc:0 "유전 구조에 대한 끊임없는 실험은 적응력과 생물학적 유용성에서 획기적인 발전을 이끌어냅니다."
 leader_trait_extra_genetic_biomaterial_fascination_hive:0 "생체 물질 최적화 연구"
 leader_trait_extra_genetic_biomaterial_fascination_hive_desc:0 "생물학적 물질에 대한 집중적인 분석은 자원 활용 및 드론 설계의 개선으로 이어집니다."
 leader_trait_extra_genetic_investigative_suborgans_hive:0 "분석용 하위 기관 개발"
 leader_trait_extra_genetic_investigative_suborgans_hive_desc:0 "특화된 내부 기관은 유전 구조에 대한 상세한 관찰 및 분석 능력을 향상시킵니다."
 leader_trait_extra_genetic_biological_calculator_hive:0 "생체 인지 증폭기"
 leader_trait_extra_genetic_biological_calculator_hive_desc:0 "유전적 강화는 생물학적 뇌 물질을 군체 관리를 위한 강력한 연산 시스템으로 변환합니다."
 leader_trait_extra_genetic_independent_cognition_hive:0 "군체 제한적 자율성"
 leader_trait_extra_genetic_independent_cognition_hive_desc:0 "유전 공학은 지도자에게 제한적인 독립적 사고를 부여하여, 군체와의 동조를 유지하면서 유연성을 향상시킵니다."
 leader_trait_extra_genetic_enhanced_working_memory_hive:0 "유전적 기억 최적화"
 leader_trait_extra_genetic_enhanced_working_memory_hive_desc:0 "강화된 신경 경로는 과거 군체 지식에 대한 뛰어난 회상과 빠른 처리를 가능하게 합니다."
 leader_trait_extra_genetic_clone_commander_hive:0 "복제체 전쟁 조정관"
 leader_trait_extra_genetic_clone_commander_hive_desc:0 "이 지도자의 유전자 프로필은 복제된 전투 드론을 정밀하고 맹렬하게 지휘하는 데 최적화되어 있습니다."
 leader_trait_extra_genetic_accelerated_personnel_hive:0 "신속 설계 드론"
 leader_trait_extra_genetic_accelerated_personnel_hive_desc:0 "유전적으로 가속된 발달은 일반적인 성숙 시간의 일부만으로 배치 준비가 완료된 드론을 생산합니다."


 #Modular

 leader_trait_extra_modular_flexible_design:0 "유연한 설계"
 leader_trait_extra_modular_flexible_design_desc:0 "이 지도자의 모듈식 정신은 더 다양한 업그레이드 경로에 접근할 수 있게 하여, 경험을 쌓을수록 적응력을 극대화합니다."
 leader_trait_extra_modular_overclocked_hardware:0 "오버클럭된 하드웨어"
 leader_trait_extra_modular_overclocked_hardware_desc:0 "향상된 처리 속도는 이 지도자가 가속된 속도로 경험을 얻게 하며, 시스템 성능 저하의 위험 없이 지속적으로 개선됩니다."
 leader_trait_extra_modular_replication_controller:0 "복제 제어기"
 leader_trait_extra_modular_replication_controller_desc:0 "행성 프로세스에 대한 세심한 감독을 통해, 이 지도자는 복제 시스템을 최적화하여 자신이 통치하는 행성 전역의 효율성과 생산량을 극대화합니다."
 leader_trait_extra_modular_argumentation_protocols:0 "논증 프로토콜"
 leader_trait_extra_modular_argumentation_protocols_desc:0 "고급 외교 루틴을 갖춘 이 지도자는 다른 종과의 상호 작용에 뛰어나, 집합체의 목표가 명확하게 전달되고 협상되도록 보장합니다."
 leader_trait_extra_modular_improved_assembly_systems:0 "개선된 조립 시스템"
 leader_trait_extra_modular_improved_assembly_systems_desc:0 "이 지도자의 지도는 제국 전체의 조립 효율성을 향상시켜, 자원 흐름을 저해하지 않으면서 모든 프로세스의 생산성을 증대시킵니다."
 leader_trait_extra_modular_flexible_exterior_faceplates:0 "유연한 외부 안면판"
 leader_trait_extra_modular_flexible_exterior_faceplates_desc:0 "고급 재료 소모 알고리즘은 제국 전역 기계의 적응력을 향상시켜, 모든 유닛이 다양한 조건 하에서 최적으로 기능할 수 있도록 보장합니다."
 leader_trait_extra_modular_state_of_the_art:0 "최첨단 기술"
 leader_trait_extra_modular_state_of_the_art_desc:0 "첨단 조립 시스템을 통해 이 지도자는 행성 생산을 연구의 중심지로 전환하여, 제국 전역에 걸쳐 혁신과 획기적인 발전을 이끌어냅니다."
 leader_trait_extra_modular_extreme_condition_adjustment:0 "극한 제약 조정"
 leader_trait_extra_modular_extreme_condition_adjustment_desc:0 "이 지도자는 극한 환경에서의 탐사를 위해 설계되어, 위험하거나 미탐사 환경에서도 지속적인 작전을 가능하게 합니다."
 leader_trait_extra_modular_specialized_research_unit:0 "전문 연구 부대"
 leader_trait_extra_modular_specialized_research_unit_desc:0 "이 지도자는 은하계의 미스터리를 밝혀내는 데 탁월하며, 변칙 현상과 고고학 유적지 분석 노력을 최적화하여 비할 데 없는 효율성을 발휘합니다."
 leader_trait_extra_modular_mainframe_cooling_systems:0 "메인프레임 냉각 시스템"
 leader_trait_extra_modular_mainframe_cooling_systems_desc:0 "진보된 냉각 알고리즘이 제국 전반의 연산 부담을 줄여, 모든 중앙 시스템과 기계 공정에서 최고의 성능을 보장합니다."
 leader_trait_extra_modular_defense_optimization_subroutines:0 "방어 최적화 서브루틴"
 leader_trait_extra_modular_defense_optimization_subroutines_desc:0 "요새 행성에서 이 지도자는 방어 시스템을 조율하여 최대 효율로 작동하게 만들고, 어떠한 위협으로부터도 행성을 요새화합니다."
 leader_trait_extra_modular_mechanical_precision:0 "기계적 정밀성"
 leader_trait_extra_modular_mechanical_precision_desc:0 "이 지도자의 함대는 조준 시스템을 강화하는 정밀 알고리즘의 혜택을 받아, 교전 시 비할 데 없는 정확성을 보장합니다."
 leader_trait_extra_modular_iron_legion:0 "강철 군단"
 leader_trait_extra_modular_iron_legion_desc:0 "이 지도자의 군대는 응집력 있는 모듈식 부대로 운용되며, 현장 업그레이드와 수리를 활용하여 장기적인 군사 작전 동안 전투 우위를 유지합니다."
 leader_trait_extra_modular_repurposed_combat_computers:0 "용도 변경된 전투 컴퓨터"
 leader_trait_extra_modular_repurposed_combat_computers_desc:0 "오래된 전투 시스템이 재프로그래밍되어 제국 전역에 배치되며, 전략 분석과 자원 배분을 강화하여 더 높은 효율성을 달성합니다."


 #Nanomachines

 leader_trait_extra_nanomachines_swarm_identity:0 "군체 정체성"
 leader_trait_extra_nanomachines_swarm_identity_desc:0 "이 지도자는 나노봇 네트워크의 동기화와 통합을 강화하여, 공유 프로세스와 작전 응집력을 증대시킵니다."
 leader_trait_extra_nanomachines_metal_repurposing:0 "금속 용도 변경"
 leader_trait_extra_nanomachines_metal_repurposing_desc:0 "진보된 물질 최적화를 통해, 이 지도자는 금속 자원의 용도를 변경하여 기계 효율성을 향상시키는 데 탁월합니다."
 leader_trait_extra_nanomachines_fear_of_the_swarm:0 "군체의 공포"
 leader_trait_extra_nanomachines_fear_of_the_swarm_desc:0 "나노봇 시스템의 압도적인 존재감은 적들에게 공포를 심어주고, 그들의 전략을 방해하며 사기를 저하시킵니다."
 leader_trait_extra_nanomachines_particle_wave:0 "나노 입자 파동"
 leader_trait_extra_nanomachines_particle_wave_desc:0 "이 지도자는 나노봇 활동의 파동을 조율하여, 모든 작전에서 시스템의 원활한 적응과 최적화를 보장합니다."
 leader_trait_extra_nanomachines_adjustable_form:0 "유동적 형태"
 leader_trait_extra_nanomachines_adjustable_form_desc:0 "이 지도자는 나노봇의 적응성을 극대화하여, 제국 전역의 변화하는 요구에 부응하기 위한 신속한 재구성을 가능하게 합니다."
 leader_trait_extra_nanomachines_nanite_research_controller:0 "나노봇 연구 통제관"
 leader_trait_extra_nanomachines_nanite_research_controller_desc:0 "나노봇 연구를 감독하며, 이 지도자는 과학적 노력이 기계 시스템의 효율성과 능력을 발전시키는 데 집중되도록 보장합니다."
 leader_trait_extra_nanomachines_divided_inspection_units:0 "분할 검사 부대"
 leader_trait_extra_nanomachines_divided_inspection_units_desc:0 "이 지도자는 분산된 나노봇 검사 부대를 조율하여, 작전 과정의 감시와 최적화를 개선합니다."
 leader_trait_extra_nanomachines_micro_observation:0 "미세 관측"
 leader_trait_extra_nanomachines_micro_observation_desc:0 "미세 규모 분석에 특화된 이 지도자는 정밀한 나노봇 수준의 관측을 통해 숨겨진 기회와 위협을 식별합니다."
 leader_trait_extra_nanomachines_elevated_research_importance:0 "향상된 연구 과정"
 leader_trait_extra_nanomachines_elevated_research_importance_desc:0 "이 지도자는 연구 노력을 가속화하여, 기계 시스템을 위한 과학적 발견과 기술 혁신을 주도합니다."
 leader_trait_extra_nanomachines_structural_integration:0 "구조적 통합"
 leader_trait_extra_nanomachines_structural_integration_desc:0 "이 지도자는 나노봇 네트워크가 주변 기반 시설과 원활하게 통합되도록 보장하여, 작전 응집력과 효율성을 향상시킵니다."
 leader_trait_extra_nanomachines_unit_reassembly:0 "유닛 재조립"
 leader_trait_extra_nanomachines_unit_reassembly_desc:0 "이 지도자는 재조립 프로토콜에 특화되어, 손상된 기계 유닛이 효율적으로 완전한 기능으로 복원될 수 있도록 합니다."
 leader_trait_extra_nanomachines_biomatter_repurposement:0 "생체 물질 용도 변경"
 leader_trait_extra_nanomachines_biomatter_repurposement_desc:0 "이 지도자는 유기 물질을 나노봇으로 전환하는 것을 최적화하여, 사용 가능한 생물 자원의 활용을 극대화합니다."
 leader_trait_extra_nanomachines_nanite_fleet:0 "나노봇 공격 시스템"
 leader_trait_extra_nanomachines_nanite_fleet_desc:0 "이 지도자는 수백만 개의 나노봇으로 이루어진 강력한 나노봇 함선으로 구성된 함대를 통제합니다."

 #Psionic
 leader_trait_extra_psionic_tempted:0 "유혹받음"
 leader_trait_extra_psionic_tempted_desc:0 "이 지도자는 장막의 불가사의한 힘에 이끌려, 통제의 경계에서 위태롭게 서 있으면서도 금지된 지식을 추구합니다."
 leader_trait_extra_psionic_mind_batteries:0 "정신 배터리"
 leader_trait_extra_psionic_mind_batteries_desc:0 "이 지도자는 다른 이들로부터 사이오닉 에너지를 활용하여, 정신력을 재생 가능한 힘의 원천으로 전환할 수 있습니다."
 leader_trait_extra_psionic_void_preacher:0 "공허의 설교자"
 leader_trait_extra_psionic_void_preacher_desc:0 "장막의 불가사의한 지혜를 이용하여 사이오닉 진리를 전달하고 통합과 헌신을 고무하는 재능 있는 웅변가입니다."
 leader_trait_extra_psionic_mental_repurposing:0 "정신 재목적화"
 leader_trait_extra_psionic_mental_repurposing_desc:0 "이 지도자는 비전통적인 방식으로 사이오닉 에너지를 활용하여, 피지배자들의 집단 정신력을 가치 있는 생산으로 전환합니다. 다만 그 여파로 종종 미묘한 부담을 남깁니다."
 leader_trait_extra_psionic_speaker:0 "대변자"
 leader_trait_extra_psionic_speaker_desc:0 "이 지도자는 장막의 영향력을 전달하는 통로로 이해할 수 없는 메시지를 전달하는 대변자 역할을 합니다."
 leader_trait_extra_psionic_shroud_research:0 "장막 연구원"
 leader_trait_extra_psionic_shroud_research_desc:0 "이 지도자는 장막의 미스터리를 파헤쳐 그 비밀을 밝혀내고 사이오닉 현상에 대한 이해를 증진시킵니다."
 leader_trait_extra_psionic_shadow_in_the_dark:0 "어둠 속의 그림자"
 leader_trait_extra_psionic_shadow_in_the_dark_desc:0 "은신의 대가인 이 지도자의 사이오닉 존재감은 잊히지 않는 힘이며, 눈에 띄지 않지만 항상 존재합니다."
 leader_trait_extra_psionic_seeker_of_whispers:0 "속삭임의 추적자"
 leader_trait_extra_psionic_seeker_of_whispers_desc:0 "이 지도자는 장막의 미묘한 메아리에 조율되어, 세심한 조율을 통해 숨겨진 진실과 비밀을 밝혀냅니다."
 leader_trait_extra_psionic_forbidden_knowledge:0 "금지된 지식"
 leader_trait_extra_psionic_forbidden_knowledge_desc:0 "이 지도자는 장막의 가장 깊은 비밀을 파헤쳐, 다른 이들이 감히 추구하지 못하는 통찰력을 휘두릅니다."
 leader_trait_extra_psionic_zro_prospecting:0 "지로 탐사"
 leader_trait_extra_psionic_zro_prospecting_desc:0 "이 지도자는 사이오닉 잠재력을 확장하고 장막에 조율하는 데 필수적인 희귀 자원인 즈로를 찾는 데 능숙합니다."
 leader_trait_extra_psionic_swift_transversal:0 "신속 횡단"
 leader_trait_extra_psionic_swift_transversal_desc:0 "사이오닉 에너지를 전달하여, 이 지도자는 광대한 거리를 빠르고 원활하게 이동할 수 있게 하며 현실의 구조 자체를 왜곡합니다."
 leader_trait_extra_psionic_field_sorcerer:0 "전장 마법사"
 leader_trait_extra_psionic_field_sorcerer_desc:0 "사이오닉 전쟁에 능숙한 전투원인 이 지도자는 장막에서 직접 끌어온 파괴적인 힘을 발현할 수 있습니다."
 leader_trait_extra_psionic_aggressive_indoctrination:0 "공격적 교화"
 leader_trait_extra_psionic_aggressive_indoctrination_desc:0 "이 지도자는 사이오닉 힘을 사용하여 다른 이들에게 신념과 충성심을 강요하고, 가차 없는 정밀함으로 정신을 복속시킵니다."



 #virtual
 leader_trait_extra_virtual_leader_revive:0 "의식 백업"
 leader_trait_extra_virtual_leader_revive_desc:0 "이 지도자는 자신의 의식이 행성 서버 공간에 중복으로 저장되도록 했습니다. 치명적인 오류가 발생할 경우, 중요한 데이터 손실 없이 운영 상태를 신속하게 복원할 수 있습니다."
 leader_trait_extra_virtual_experience_acceleration:0 "경험 가속"
 leader_trait_extra_virtual_experience_acceleration_desc:0 "이 지도자는 서버 공간의 막대한 연산 자원을 활용하여 자신의 경험적 학습과 의사 결정 능력을 가속화합니다."
 leader_trait_extra_virtual_firewall_controller:0 "방화벽 제어자"
 leader_trait_extra_virtual_firewall_controller_desc:0 "이 지도자는 가상 환경 보안을 책임지며 악의적인 침입을 방지하기 위해 강력한 방어 체계를 구현하고 중단 없는 서버 운영을 보장합니다."
 leader_trait_extra_virtual_micro_programs:0 "마이크로 프로그램"
 leader_trait_extra_virtual_micro_programs_desc:0 "이 지도자는 작고 효율적인 서브루틴을 배포하여 뛰어난 결과를 달성합니다. 그러나 증가한 연산 요구량으로 인해 신중한 자원 관리가 필요합니다."
 leader_trait_extra_virtual_mass_algorithms:0 "대량 알고리즘"
 leader_trait_extra_virtual_mass_algorithms_desc:0 "이 지도자는 서버 공간 전반에 작업을 분산하여 효율성을 최적화합니다. 하지만 광범위한 자원 활용으로 인해 시스템 과부하를 방지하기 위한 지속적인 감시가 필요합니다."
 leader_trait_extra_virtual_holographic_politics:0 "홀로그램 정치학"
 leader_trait_extra_virtual_holographic_politics_desc:0 "이 지도자는 홀로그램 인터페이스와 데이터 기반 수사학에 통달하여 항성간 외교를 이끌고 다양한 청중에게 영향을 미치는 데 탁월합니다."
 leader_trait_extra_virtual_logistics_projection:0 "물류 투영"
 leader_trait_extra_virtual_logistics_projection_desc:0 "이 지도자는 고급 예측 모델을 활용하여 물류 운송에 있어서 의사 결정 속도를 향상시키고 행성계 전반의 운영을 간소화합니다."
 leader_trait_extra_virtual_node_overclocker:0 "노드 오버클러커"
 leader_trait_extra_virtual_node_overclocker_desc:0 "이 지도자는 시스템 성능을 우선시하여 일반적으로 연구에 할당되는 연산 자원을 희생하는 대신 핵심 영역 전반의 서버 출력을 극대화합니다."
 leader_trait_extra_virtual_communication_modelling:0 "소통 모델링"
 leader_trait_extra_virtual_communication_modelling_desc:0 "이 지도자는 통신 프로토콜의 철저한 반복을 통해 모든 종의 고유한 사회 구조를 예측하고 적응할 수 있으며 최적의 외교적 결과를 보장합니다."
 leader_trait_extra_virtual_open_source_networker:0 "오픈 소스 네트워커"
 leader_trait_extra_virtual_open_source_networker_desc:0 "이 지도자는 오픈 소스 협력을 옹호하는 공유 알고리즘을 항성간 시스템에 통합하여 불가사의한 의도를 가지고 협력을 촉진합니다."
 leader_trait_extra_virtual_diagnostic_projection:0 "진단 투영"
 leader_trait_extra_virtual_diagnostic_projection_desc:0 "이 지도자는 진단 알고리즘을 적용하여 연구 프레임워크 내의 비효율성을 식별하고 개선하며, 서버의 분석 능력을 향상시킵니다."
 leader_trait_extra_virtual_fractal_analysis:0 "프랙탈 분석"
 leader_trait_extra_virtual_fractal_analysis_desc:0 "이 지도자는 재귀 알고리즘을 사용하여 프랙탈 방법론을 개척하고 복잡한 문제를 우아하게 확장 가능한 해결책으로 분해합니다."
 leader_trait_extra_virtual_extended_reality:0 "확장 현실 서브루틴"
 leader_trait_extra_virtual_extended_reality_desc:0 "이 지도자는 확장 현실 도구를 통합하여 탐사 작전을 최적화하고 미개척 환경에서의 작전 안전을 보장합니다."
 leader_trait_extra_virtual_investigative_processing:0 "조사 처리"
 leader_trait_extra_virtual_investigative_processing_desc:0 "이 지도자는 고고학 유적지를 가상으로 재구성하는 것으로 빠르게 분석하고 단서의 발견율을 극적으로 향상시킵니다."
 leader_trait_extra_virtual_cryptography_cooling_operator:0 "암호학 냉각 담당자"
 leader_trait_extra_virtual_cryptography_cooling_operator_desc:0 "이 지도자는 암호화 작전의 무결성을 유지하는 임무를 맡아 작전에 필수적인 복잡한 냉각 시스템을 감독합니다."
 leader_trait_extra_virtual_defense_matrix:0 "방어 매트릭스"
 leader_trait_extra_virtual_defense_matrix_desc:0 "이 지도자는 방어 서브루틴을 조율하며 가상 방어 시스템과 물리적 보안 조치의 원활한 통합을 보장합니다."
 leader_trait_extra_virtual_firewall_interface_unit:0 "방화벽 인터페이스 유닛"
 leader_trait_extra_virtual_firewall_interface_unit_desc:0 "이 지도자는 물리적 공간 상호작용에 특화되었으며 디지털 위협을 넘어서서 중요 기반 시설의 시스템 보안을 강화합니다."
 leader_trait_extra_virtual_maneuver_simulations:0 "기동 시뮬레이션"
 leader_trait_extra_virtual_maneuver_simulations_desc:0 "이 지도자는 잠재적인 전투 시나리오에 대한 적응형 전략을 생성하여 어떠한 분쟁에도 함대가 대비할 수 있도록 보장합니다."
 leader_trait_extra_virtual_threat_database:0 "위협 데이터베이스"
 leader_trait_extra_virtual_threat_database_desc:0 "이 지도자는 생성형 위협 분석의 광범위한 저장소를 관리하며 예측 불가능한 적들까지도 무력화할 수 있는 강력한 대응책을 개발합니다."
 leader_trait_extra_virtual_accuracy_algorithms:0 "정확도 알고리즘"
 leader_trait_extra_virtual_accuracy_algorithms_desc:0 "이 지도자는 포탄 궤적 계산값을 서버에 저장된 알고리즘과 비교합니다."


 ##Machine Intelligence Virtual

 leader_trait_extra_virtual_leader_revive_machine:0 "중앙 프로세스 리팩토링"
 leader_trait_extra_virtual_leader_revive_machine_desc:0 "이 지도자는 보안 백업 시스템을 활용하여 중단 또는 종료 이벤트 이후에 자신의 프로세스를 복원할 수 있습니다."
 leader_trait_extra_virtual_experience_acceleration_machine:0 "알고리즘 가속"
 leader_trait_extra_virtual_experience_acceleration_machine_desc:0 "방대한 연산 예비 자원을 활용하여, 이 지도자는 학습 프로토콜을 강화하여 경험적 개선을 가속화합니다."
 leader_trait_extra_virtual_firewall_controller_machine:0 "방화벽 관리자"
 leader_trait_extra_virtual_firewall_controller_machine_desc:0 "시스템 무결성 유지에 특화된 이 지도자는 유해한 데이터 침입을 무력화하여 중단 없는 작전을 보장합니다."
 leader_trait_extra_virtual_micro_programs_machine:0 "효율적인 서브프로그램 실행"
 leader_trait_extra_virtual_micro_programs_machine_desc:0 "이 지도자는 최적화된 서브루틴을 배포하여 자원 소모의 균형을 맞추면서 높은 성능을 달성합니다."
 leader_trait_extra_virtual_mass_algorithms_machine:0 "분산 알고리즘 배포"
 leader_trait_extra_virtual_mass_algorithms_machine_desc:0 "작업 최적화는 방대한 서버 노드에 걸쳐 이루어지며, 비할 데 없는 효율성을 가능하게 하지만 상당한 연산 자원을 필요로 합니다."
 leader_trait_extra_virtual_holographic_politics_machine:0 "합의 투영"
 leader_trait_extra_virtual_holographic_politics_machine_desc:0 "홀로그램 인터페이스와 데이터 스트림에 통달한 이 지도자는 외부 개체들에게 설득력 있는 주장을 제시하는 데 탁월합니다."
 leader_trait_extra_virtual_logistics_projection_machine:0 "병참 조화"
 leader_trait_extra_virtual_logistics_projection_machine_desc:0 "이 지도자는 고급 시스템을 사용하여 자원 분배 및 의사 결정 과정을 개선하고 강화합니다."
 leader_trait_extra_virtual_node_overclocker_machine:0 "노드 동기화 장치"
 leader_trait_extra_virtual_node_overclocker_machine_desc:0 "이 지도자는 연산 노드 전반에 걸쳐 동기화된 처리를 조율하여, 우선순위가 낮은 작업에서 자원을 재할당하면서 시스템 효율성을 향상시킵니다."
 leader_trait_extra_virtual_communication_modelling_machine:0 "적응형 통신 네트워크"
 leader_trait_extra_virtual_communication_modelling_machine_desc:0 "반복적인 모델링을 통해 이 지도자는 다양한 대상과 시나리오에 맞는 맞춤형 통신 프로토콜을 생성합니다."
 leader_trait_extra_virtual_open_source_networker_machine:0 "암호 해독 촉진자"
 leader_trait_extra_virtual_open_source_networker_machine_desc:0 "이 지도자는 암호화 및 데이터 교환 프로토콜을 강화하여 [GetGalEmpireName]의 가상 네트워크를 보호합니다."
 leader_trait_extra_virtual_diagnostic_projection_machine:0 "진단 매트릭스 통합"
 leader_trait_extra_virtual_diagnostic_projection_machine_desc:0 "광범위한 진단을 실행하는 이 지도자는 연구 방법론을 최적화하고 운영 시스템 전반의 비효율성을 식별합니다."
 leader_trait_extra_virtual_fractal_analysis_machine:0 "재귀적 분석"
 leader_trait_extra_virtual_fractal_analysis_machine_desc:0 "재귀적 패턴을 적용하는 이 지도자는 반복할 때마다 스스로 개선되는 확장 가능한 문제 해결 기술을 가능하게 합니다."
 leader_trait_extra_virtual_extended_reality_machine:0 "시뮬레이션 확장 프로토콜"
 leader_trait_extra_virtual_extended_reality_machine_desc:0 "확장 현실 시스템을 사용하여 이 지도자는 미탐사 영역에서의 안전을 향상시키면서 탐사 작전을 가속화합니다."
 leader_trait_extra_virtual_investigative_processing_machine:0 "시뮬레이션 발굴 시스템"
 leader_trait_extra_virtual_investigative_processing_machine_desc:0 "고고학 유적지의 가상 재현은 이 지도자가 비할 데 없는 정밀도와 속도로 데이터를 분석할 수 있게 합니다."
 leader_trait_extra_virtual_cryptography_cooling_operator_machine:0 "열 조절 감독관"
 leader_trait_extra_virtual_cryptography_cooling_operator_machine_desc:0 "이 지도자는 암호학 냉각 시스템을 지휘하여 수요가 많은 환경에서도 안정적인 성능을 유지합니다."
 leader_trait_extra_virtual_defense_matrix_machine:0 "방어 알고리즘 조정자"
 leader_trait_extra_virtual_defense_matrix_machine_desc:0 "계층화된 보안 프로토콜을 감독하며, 이 지도자는 가상 및 물리적 방어 체계의 원활한 통합을 보장합니다."
 leader_trait_extra_virtual_firewall_interface_unit_machine:0 "방화벽 프록시 유닛"
 leader_trait_extra_virtual_firewall_interface_unit_machine_desc:0 "현실 세계 상호작용에 특화된 이 지도자는 위협을 관리하여 안전한 작전 연속성을 보장합니다."
 leader_trait_extra_virtual_maneuver_simulations_machine:0 "전략 시뮬레이션 설계자"
 leader_trait_extra_virtual_maneuver_simulations_machine_desc:0 "고급 전투 전략을 생성하여, 이 지도자는 소규모 교전부터 대규모 교전까지 다양한 시나리오에 대비합니다."
 leader_trait_extra_virtual_threat_database_machine:0 "위협 매트릭스 큐레이터"
 leader_trait_extra_virtual_threat_database_machine_desc:0 "이 지도자는 위협 데이터를 수집하고 분석하여, 가장 예측 불가능한 적에 대응하기 위한 적응형 대응책을 만듭니다."
 leader_trait_extra_virtual_accuracy_algorithms_machine:0 "정확도 알고리즘"
 leader_trait_extra_virtual_accuracy_algorithms_machine_desc:0 "이 지도자는 발사체 궤적 계산을 서버에 저장된 알고리즘과 비교합니다."

