l_korean:
 #Ascenion leader traits

 #Gestalt ruler traits

 leader_trait_extra_cybernetic_gestalt_ruler: "사이버네틱 넥서스-프라임"
 leader_trait_extra_cybernetic_gestalt_ruler_desc: "이 통치자는 중앙 사이버네틱 도관 역할을 하며, 강화된 생체기계 통합을 통해 집단의 효율성을 향상시킵니다."
 leader_trait_extra_genetic_gestalt_ruler: "게놈 소버린-노드"
 leader_trait_extra_genetic_gestalt_ruler_desc: "생물학적 최적화의 대가인 이 통치자는 전체 집단을 위해 유전자 주형을 지속적으로 개량합니다."
 leader_trait_extra_nanomachines_gestalt_ruler: "나노봇 코어-디렉터"
 leader_trait_extra_nanomachines_gestalt_ruler_desc: "이 통치자는 방대한 나노봇 무리를 지휘하여 게슈탈트 전체에 걸쳐 전례 없는 자가 수리, 재구성, 물질 변환을 가능하게 합니다."
 leader_trait_extra_virtual_gestalt_ruler: "가상 초월정신 인스턴스"
 leader_trait_extra_virtual_gestalt_ruler_desc: "프랙탈 프로세서 내에서 순수한 데이터로만 존재하는 이 통치자는 의사 결정을 가속화하고 네트워크 전체의 사고 주기를 동기화합니다."
 leader_trait_extra_modular_gestalt_ruler: "모듈성 아키텍트-프라임"
 leader_trait_extra_modular_gestalt_ruler_desc: "적응형 구성에 특화된 이 통치자는 모든 전략적 요구에 맞춰 집단의 형태와 기능을 재구성합니다."
 leader_trait_extra_psionic_gestalt_ruler: "사이오닉 통합 앵커"
 leader_trait_extra_psionic_gestalt_ruler_desc: "이 통치자는 게슈탈트의 통합된 사이오닉 공명을 전달하여 조정을 증폭시키고 집단 의지의 범위를 확장합니다."


 leader_trait_extra_cybernetic_gestalt_ruler_hive: "중앙 증강 인터페이스"
 leader_trait_extra_cybernetic_gestalt_ruler_hive_desc: "사이버네틱 승천의 힘을 통해 군체의 모든 드론과 연결되어, 집단은 그 어느 때보다 단결되었습니다."
 leader_trait_extra_genetic_gestalt_ruler_hive: "완성된 중앙 개체"
 leader_trait_extra_genetic_gestalt_ruler_hive_desc: "우리의 유전적 숙련도의 중심으로서, 이 군체의 중앙 개체는 그 어느 때보다 집단을 잘 이끌고 있습니다."
 leader_trait_extra_psionic_gestalt_ruler_hive:0 "장막에 가려진 의식"
 leader_trait_extra_psionic_gestalt_ruler_hive_desc:0 "이 군체의 모든 정신은 이 중앙 의식을 통해 흐르며, 장막과의 안정적인 연결을 보장합니다."


 leader_trait_extra_nanomachines_gestalt_ruler_machine: "나노봇 중앙 장치"
 leader_trait_extra_nanomachines_gestalt_ruler_machine_desc: "무리의 중앙 처리 장치로, 상상할 수 없을 정도로 많은 나노봇를 완벽하게 제어합니다."
 leader_trait_extra_virtual_gestalt_ruler_machine: "가상 프로세서 코어"
 leader_trait_extra_virtual_gestalt_ruler_machine_desc: "가상 집단의 중앙 제어 장치로, 수 세기 앞을 내다보는 전략을 세웁니다."
 leader_trait_extra_modular_gestalt_ruler_machine: "모듈성 제어 장치"
 leader_trait_extra_modular_gestalt_ruler_machine_desc: "모듈식 부품으로 완성된 이 중앙 장치는 절대 고장 나지 않도록 강화되었으며, 집단 기계 병력을 완벽하게 이끕니다."
 leader_trait_extra_psionic_gestalt_ruler_machine:0 "장막에 가려진 의식"
 leader_trait_extra_psionic_gestalt_ruler_machine_desc:0 "이 제국의 통합된 데이터 흐름은 이 중앙 의식에 의해 조정되어, 장막과의 안정적인 연결을 보장합니다."

 #Gestalt destiny traits
 ELT_destiny_gain: "드문 기회"
 ELT_destiny_gain.desc.hive: "우리 군체를 위한 광범위한 작업 끝에, §I[From.GetName]§!이(가) 우리의 승천에 걸맞은 특성을 개발했습니다!"
 ELT_destiny_gain.desc.machine: "우리 네트워크를 위한 광범위한 작업 끝에, §I[From.GetName]§!이(가) 우리의 승천에 걸맞은 특성을 개발했습니다!"

