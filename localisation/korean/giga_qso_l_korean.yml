l_korean:
 giga_tech_quasi_stellar_1:0 "초차원 차폐막"
 giga_tech_quasi_stellar_1_desc:0 "퀘이사는 놀라우리만큼 에너지가 넘치는 천체입니다. 어떤 종류의 공학 프로젝트든간에 그 주변에서 진행하고자 한다면, 퀘이사의 중력과 복사 에너지로부터 우리의 구조물을 보호할 진보된 차폐막을 개발해야합니다."
 giga_tech_quasi_stellar_2:0 "중력 압축"
 giga_tech_quasi_stellar_2_desc:0 "은하 중심의 초대질량 퀘이사는 거대하고 극도로 강한 강착 원반에 둘러싸여있습니다. 당연하게도, 이 원반으로 인해 퀘이사의 주변에서는 어떠한 것도 조립할 수 없습니다. 하지만, 퀘이사 주변의 중력 상수를 변화시키면 우리는 대상의 질량 증가를 구현할 수 있고, 이는 원반을 더 작게 만듭니다.  결과적으로 원반의 에너지 포텐셜을 상승시켜, 퀘이사에 더 가까운 곳에 구조물을 건설할 수 있게 해줄 것입니다."
 giga_tech_quasi_stellar_3:0 "상대론적 제트 편향"
 giga_tech_quasi_stellar_3_desc:0 "초대질량 퀘이사의 가장 두드러진 특징 중 하나는 두 개의 거대한 제트입니다. 이것은 퀘이사의 양 극에서 이온화된 물질을 빛에 가까운 속도로 쏘는 초가속된 제트입니다. 이러한 제트는 극도로 강력하여 제트의 무시무시한 에너지를 흡수하고 그 방향을 돌릴 수 있다면 미래의 초거대 병기에 동력을 공급하는데 굉장히 유용할 것입니다."
 giga_tech_quasi_stellar_4:0 "테라급 컴퓨팅 장치"
 giga_tech_quasi_stellar_4_desc:0 "$name_quasistellar$는 극도로 거대하기 때문에 이 구조물을 제대로 유지하고 초거대 병기에 사용될 어마어마한 양의 에너지를 관리하고자 한다면, 무기와 마찬가지로 매우 큰 컴퓨터가 필요할 것입니다."
 giga_tech_quasi_stellar_5:0 "퀘이사 에너지 조작"
 giga_tech_quasi_stellar_5_desc:0 "어떻게든 초대질량 퀘이사가 방출하는 엄청난 에너지를 흡수하고 보관하고 그 방향을 돌리려면 초차원 축전기부터 초중력장 조절까지, 극히 진보된 기술 여러개를 조합할 필요가 있습니다."
 giga_tech_quasi_stellar_6:0 "$name_quasistellar$"
 giga_tech_quasi_stellar_6_desc:0 "$name_quasistellar$는 전 은하에서 가장 에너지가 넘치는 천체를 무기로 이용하기 위해, 우리가 아는 모든 종류의 기술을 실제로 사용하는 무기입니다. 이 공포스러운 구조물은 크기면에서 $name_ndb$과 시스템 크래프트조차 몇 단계 뛰어넘는 무기로, 진실로 초거대 무기 제조 기술의 정점입니다."
 quasi_stellar_obliterator_0:0 "$gc_tera$$name_quasistellar$ 건설 현장"
 quasi_stellar_obliterator_0_DESC:0 "미래의 $name_quasistellar$를 위한 건설 현장이며 거대한 초대질량 퀘이사 옆에 떠있습니다. 상대적으로 작은 이 플랫폼은 은하의 지성체가 만들었던 초거대 무기 중 가장 거대하고 웃음밖에 나오지 않는 구조물을 위한 기지로 사용될 것입니다."
 quasi_stellar_obliterator_0_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_terastructure$ - $giga_list_category_weaponry$\n§Y초대질량 퀘이사§! 주위로 §Y성단§! 전체를 파괴할 수 있는  초강력 병기를 건설합니다\n§L웃음만 나올 정도로 거대한 초거대 무기가 퀘이사 주위에 건설되었고 말도 못하게 파괴적인 힘을 가지고 있습니다.§!"
 quasi_stellar_obliterator_0_CONSTRUCTION_INFO_DELAYED:0 "$giga_list_additional_data$ - §Y준-천체 말소기§!는 단일 §Y행성§!이나 §Y성계§! 혹은 §Y성단§! 전체를 파괴할 수 있습니다. 은하가 §Y분노§!하여 우리에 맞서 §Y연합§!할 가능성이 매우 높습니다."
 quasi_stellar_obliterator_1:0 "$name_quasistellar$ 방출 축전기"
 quasi_stellar_obliterator_1_DESC:0 "퀘이사를 둘러싼 이 거대하지만 불완전한 고리는 초차원 초중력적 압력을 사용해 국소적으로 중력상수를 바꾸고 효과적으로 퀘이사의 거친 강착 원반을 압축합니다."
 quasi_stellar_obliterator_2:0 "$name_quasistellar$ 상대론적 편향장치"
 quasi_stellar_obliterator_2_DESC:0 "복잡하게 설계된 일련의 전선관과 초-고효율의 편향기가 퀘이사 양극의 제트를 조심스레 흡수하고 그 방향을 돌립니다. 이는 우리의 초거대 무기를 위한 사용 가능한 막대한 양의 에너지를 제공합니다."
 quasi_stellar_obliterator_3:0 "$name_quasistellar$ 하이퍼 컴퓨터"
 quasi_stellar_obliterator_3_DESC:0 "퀘이사로부터 흡수된 엄청난 에너지의 흐름을 정확히 제어, 조정하고 구조물 전체를 안정화하기 위해 초거대 무기의 거대한 뼈대에 통합된 무지막지하게 거대한 컴퓨터입니다."
 quasi_stellar_obliterator_4:0 "$name_quasistellar$ 테라급 축전기"
 quasi_stellar_obliterator_4_DESC:0 "퀘이사를 감싸고 있는 이 거대한 고리는 강착 원반과 펜로즈 과정에서 에너지를 흡수하고, 에너지의 방향을 거대한 저장 장치든 무기 그 자체든 원하는 쪽으로 돌리는데 사용됩니다."
