 giga_qso.008.name:0 "$name_quasistellar$: 매개변수"
 giga_qso.008.desc:0 "여기서 Q.S.O. 자체의 동력 출력/소모를 관리할 수 있습니다.\n\nQ.S.O.의 §Y충전 속도§!를 높이면 £giga_sr_quasaric_energy£ §Y$giga_sr_quasaric_energy$§! 출력이 증가하지만, 그 대가로 더 높은 £energy£ §Y$energy$§! 유지비가 필요합니다.\n\n충전 속도를 낮추면 £giga_sr_quasaric_energy£ §Y$giga_sr_quasaric_energy$§! 출력이 감소하는 대신, Q.S.O.의 £energy£ §Y$energy$§! 유지비가 줄어들거나 없어지거나 심지어 £energy£ §Y$energy$§! 생산으로 바뀔 수 있습니다.\n\n또한 £minerals£§Y$minerals$§!, £food£§Y$food$§!, £consumer_goods£ §Y$consumer_goods$§!, £alloys£ §Y$alloys$§!, £giga_sr_bulk_matter£ §Y$giga_sr_bulk_matter$§! 및 §R기타 자원...§! 같은 다양한 자원을 아래의 블랙홀에 투입하여 소량의 £giga_sr_quasaric_energy£ §Y$giga_sr_quasaric_energy$§!를 빠르게 얻을 수 있습니다."
