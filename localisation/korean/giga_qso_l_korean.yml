 giga_qso.003.desc:0 "표적으로 삼을 제국을 선택하십시오."
 giga_qso.004.desc:0 "표적으로 삼을 항성 등급을 선택하십시오."
 giga_qso.005.desc:0 "표적으로 삼을 성계를 선택하십시오."
 giga_qso.006.desc:0 "Q.S.O.의 표적 지정 방식을 선택하십시오.\n\n§Y성단§!을 표적으로 삼으면 성계 자체와 모든 인접 성계가 파괴 대상으로 지정됩니다. $giga_fe_shield$ 또는 $d_maginot_subspace_disruptor$로 보호되는 인접 성계는 영향을 받지 않습니다.\n\n§Y성계§!를 표적으로 삼으면 주변 성계는 그대로 두고 해당 성계만 파괴 대상으로 지정합니다.\n§T현재 표적 성계:§! §Y[root.giga_qso_targeted_systems]/4§!\n\n§Y행성§!을 표적으로 삼으면 성계는 그대로 두고 선택한 행성만 파괴 대상으로 지정합니다. 여러 성계 또는 제국에 걸쳐 최대 §Y10§!개 행성을 동시에 표적으로 삼을 수 있습니다.\n§T현재 표적 행성:§! §Y[root.giga_qso_targeted_planets]/10§!"
 giga_qso.006.a:0 "성단을 표적으로 지정"
 giga_qso.006.b:0 "성계를 표적으로 지정"
 giga_qso.006.c:0 "행성을 표적으로 지정"
 giga_qso.007.desc:0 "표적으로 삼을 행성을 최대 §Y10§!개 선택하십시오. 이 행성들은 같은 성계나 같은 제국에 속해 있을 필요가 없습니다.\n\n§T현재 표적 행성:§! §Y[root.giga_qso_targeted_planets]/10§!"
 giga_qso.0070.desc:0 "지정된 성단에 발사하려는 의사를 확인하십시오. 이 시점 이후에는 물러날 수 없으며 §R지정된 성단은 파괴됩니다.§!"
 giga_qso.0071.desc:0 "지정된 성계에 발사하려는 의사를 확인하십시오. 이 시점 이후에는 물러날 수 없으며 §R지정된 성계는 파괴됩니다.§!\n\n§T현재 표적 성계:§! §Y[root.giga_qso_targeted_systems]/4§!"
 giga_qso.0072.desc:0 "표적 지정을 해제할 성계를 선택하십시오.\n\n§T현재 표적 성계:§! §Y[root.giga_qso_targeted_systems]/4§!"
 giga_qso.0073.desc:0 "지정된 행성에 발사하려는 의사를 확인하십시오. 이 시점 이후에는 물러날 수 없으며 §R지정된 행성은 파괴됩니다.§!\n\n§T현재 표적 행성:§! §Y[root.giga_qso_targeted_planets]/10§!"
