 qso_intensity_minimal_desc:0 "Q.S.O.가 매우 느리게 충전 중이며, 출력의 상당 부분이 에너지로 변환되고 있습니다."
 qso_intensity_low:0 "QS-O: 느린 충전"
 qso_intensity_low_desc:0 "QS-O는 느리게 충전되고 출력의 일부가 에너지로 변환됩니다."
 qso_intensity_med:0 "Q.S.O: 일반 충전"
 qso_intensity_med_desc:0 "Q.S.O.가 정상 속도로 충전 중이며, 출력의 일부가 에너지로 변환되고 있습니다."
 qso_intensity_high:0 "QS-O: 과충전"
 qso_intensity_high_desc:0 "QS-O는 약간 과충전되고 있으며 일부 에너지는 출력을 높이기 위해 소비되고 있습니다."
 qso_intensity_maximum:0 "Q.S.O: 최대 충전"
 qso_intensity_maximum_desc:0 "Q.S.O.가 가능한 최대치로 과충전되어 있습니다."
 giga_qso.100.yes:0 "계속하지."
 giga_qso.100.no:0 "다시 생각해보자..."
 giga_birch.300.name:0 "초대질량 퀘이사"
 giga_birch.300.desc:0 "험난한 여정 끝에 우리의 과학선이 마침내 우리 은하중심에 도달했습니다.\n성계에 도달하자 승무원들은 §Y초대질량 퀘이사§!를 보고 기절해버렸습니다.\n\n이 거대한 천체의 무게는 수억 개의 항성과 맞먹는 질량을 가졌으며 직경은 수백 천문 단위입니다.\n지금은 추측일 뿐이지만, 과학계의 급진파 일부는 이 퀘이사 주변에 초거대 병기를 건설 할 수 있다는 이론을 세웠습니다. 이 퀘이사는 엄청난 파괴력을 발휘할 수 있는 광선을 발산하기 위해 대격변 에너지를 활용할 것입니다."
 giga_birch.300.a:0 "놀랍군!"
 giga_qso.110.name:0 "기계 행성 파괴"
 giga_qso.110.desc:0 "$name_quasistellar$의 웜홀이 행성의 머리에 나타난 순간 이미 기계 행성은 끝장났습니다. 얼마 지나지 않아 은하의 전체 에너지 생산량과 맞먹는 거대한 에너지 흐름이 웜홀에서 뿜어져 나왔으며, 행성을 완전히 소거하는 데 불과 몇 초밖에 걸리지 않았습니다.\n\n이전 기계 행성에는 아무것도 남아 있지 없으며 그 결과 유령 신호가 심각하게 약화되었습니다."
 giga_qso.110.a:0 "이것이 그들에게 가르침을 줄 것이다."
 giga_qso.112.name:0 "컨틴전시의 끝"
 giga_qso.112.desc:0 "컨틴전시는 실패했습니다. 마지막 기계 행성이 파괴됨에 따라 은하계는 적어도 컨틴전시로부터의 체계적인 대량 멸종 위협에서 벗어났습니다. 살아남은 모든 컨틴전시의 함대는 전원이 꺼지거나 스스로 파괴되었고 유령 신호는 더 이상 전송되지 않습니다.\n\n주 연결부는 $name_quasistellar$의 매우 강력한 광선에 의해 단 몇 초 만에 완전히 제거되어 아무것도 남기지 않았습니다.\n\n컨틴전시는 더 이상 없지만 [quasistellar_owner.GetName](이)가 다른 목표에게 초거대 병기를 겨냥할지는 아직 모르는 일입니다..."
 giga_qso.112.a:0 "과연 진정한 별의 힘에 대항할 수 있었을까?"
