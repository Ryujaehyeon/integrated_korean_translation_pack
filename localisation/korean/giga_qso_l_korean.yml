 giga_qso.002.name:0 "준항성 말소기"
 giga_qso.002.desc:0 "이곳은 $name_quasistellar$ §E표적 관리 메뉴§!입니다. 여기서 §Y[root.GetName]§!에 대한 충성도에 따라 표적으로 삼을 국가를 선택할 수 있습니다.\n\n§R적대§! 표적에는 일반적으로 ['concept_marauder_empires'], ['concept_endgame_crises'], 그리고 우리와 전쟁 중인 제국이 포함됩니다.\n\n§Y중립§! 표적에는 일반적으로 ['concept_preftl_civilizations'], 우리와 평화 상태이지만 ['concept_subject_agreement'], ['concept_federation'] 또는 특정 ['concept_diplomatic_pacts']를 공유하지 않는 제국이 포함됩니다.\n\n§G우호§! 표적에는 우리 국경 안의 소유 성계가 포함됩니다."
