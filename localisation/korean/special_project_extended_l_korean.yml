 01_FALLEN_EMPIRE_DISMISSIVE_DOW_SELECT:0 "이런 일에 쓸 시간은 없다!"
 ABANDONED_LABORATORY:0 "버려진 연구소 §G(1단계)§!"
 ABANDONED_LABORATORY_DESC:0 "버려진 연구소가 §Y[special_project_target.GetName]§!에서 발견되었습니다. 이 연구소의 소유자가 어떤 종인지 확인할 수는 없지만, 유용한 연구를 찾기 위해 §YScience Ship§!와 함께 탐색 팀을 보낼 수 있습니다.\n\n보상:\n£physics£ £society£ £engineering£ §G(500 - 800)§! \n\n(§SSpecial Project Extended Mod§!)"
 ABANDONED_SHIP_ORBIT:0 "버려진 함선 §G(1단계)§!"
 ABANDONED_SHIP_ORBIT_DESC:0 "우리는 §Y[special_project_target.System.GetName]§! 시스템에서 버려진 우주선을 발견했습니다. 간단한 관찰을 통해 해당 선박에 가해진 피해가 경량 무기에 의한 것임을 추론할 수 있으며, 따라서 §YConstruction Ship§! 하나면 복구하는 데 충분할 것입니다.\n\n보상:\n£navy_size£ §G추가 함선§! \n\n(§SSpecial Project Extended Mod§!)"
 ABANDONED_TITAN:0 "버려진 타이탄 §R(3단계)§!"
 ABANDONED_TITAN_DESC:0 "우리 정찰대가 §Y[special_project_target.System.GetName]§! 항성계에서 해적 집단을 발견했습니다. 그들은 다른 국가에서 타이탄급 함선을 훔쳐서 실제로 이를 수리하고 밀수 작전의 주력함으로 사용하려고 하고 있는 것 같습니다. 우리는 그들이 그 거대한 전투함을 장악하도록 허용할 수 없습니다. 그들을 처리하기 위해 군함을 파견하고 수리가 가능한지 확인하기 위해 §Y건설선§!도 보내야 합니다.\n\n보상:\n£navy_size£ §G추가 함선§! §Y그리고§! £energy£ §G(2000)§! §Y그리고§! £engineering£ §G(2000)§! \n\n(§SSpecial Project Extended Mod§!)"
 ADVANCED_POWER_PLANT:0 "고급 발전소 §Y(2단계)§!"
 ADVANCED_POWER_PLANT_DESC:0 "우리 기술자들은 §Y[special_project_target.GetName]§!에 고급 발전소를 건설하고 싶어 하며, 프로젝트를 시작하기 위한 승인 신호를 기다리고 있습니다.\n\n보상:\n§Y보정치:§! §G추가 에너지 산출§! \n\n(§S특수 프로젝트 확장 모드§!)"
 AGGRESSIVE_FLORA_STUDY:0 "공격적인 식물군 §R(3단계)§!"
 AGGRESSIVE_FLORA_STUDY_DESC:0 "§Y[special_project_target.GetName]§!의 식물은 매우 공격적인 것 같습니다. 게다가 일부는 육식성이며, 이 식물들 중 일부는 사람이나 지역 동물을 죽이는 취미를 발전시킨 것으로 보입니다. 다른 행성의 식물에서는 볼 수 없는 행동입니다. 우리는 이들을 연구하기 위해 §Y과학선§!을 보낼 수 있지만 조심해야 합니다.\n\n보상:\n£society£ §G(4000 - 6000)§! §Y그리고§! £food£ §G(600 - 1200)§! \n\n(§SSpecial Project Extended Mod§!)"
 AGGRESSIVE_PRIMITIVES:0 "공격적인 원시인 §Y(2단계)§!"
 AGGRESSIVE_PRIMITIVES_DESC:0 "어떤 외계 원시 전사들이 §Y[special_project_target.GetName]§!에서 난동을 부리고 있습니다. 그들이 누구인지 이해해야 하지만, 우선 그들을 진정시켜야 합니다. §Y15 수송선§!이면 문제를 해결하기에 충분할 것입니다. §R임무 중 일부 병력이 사망할 수 있습니다!§!\n\n보상:\n\n보상:\n£minerals£ §G(2500)§! §Y그리고§! £food£ §G(500)§! §Y그리고§! £society£ §G(1500 - 2500)§! \n\n(§SSpecial Project Extended Mod§!)"
 AI_CORE_OPENING:0 "AI 코어 §R(3단계)§!"
 AI_CORE_OPENING_DESC:0 "§Y[special_project_target.System.GetName]§! 항성계에서 이상한 신호가 방출되고 있습니다. 그 신호의 원천 뒤에 거대한 AI 코어가 발견된 것으로 보입니다. 그 구조물의 디자인은 매우 고대의 것으로 보이며 과거에 본 적이 없다는 점에서 흥미로운 것들을 숨기고 있을 가능성이 큽니다. 이는 방어 위치 뒤에 비슷한 디자인의 군함들이 존재하는 이유를 설명하기도 합니다. 아마도 침입자로부터 보호하기 위해서일 것입니다. 우리는 시스템을 정리하기 위해 호위를 보내고, 그 후에 §Y과학선§!을 보내 코어를 연구해야 합니다.\n\n보상:\n£physics£ §G(8000 - 12000)§! §Y그리고§! £engineering£ §G(8000 - 12000)§! \n\n(§SSpecial Project Extended Mod§!)"
 ALIEN_ACTIVITY:0 "외계 활동 §G(1단계)§!"
 ALIEN_ACTIVITY_DESC:0 "우리는 §Y[special_project_target.GetName]§!에서 외계 종의 화석을 발견했습니다. 고고학 팀이 새로운 고고학 현장을 조사하기 위해 §YScience Ship§!을 빌리고 싶어합니다.\n\n보상:\n£unity£ §G(50 - 500)§! \n\n(§SSpecial Project Extended Mod§!)"
 ALIEN_CITY_STUDY:0 "외계 도시 연구 §G(1단계)§!"
 ALIEN_CITY_STUDY_DESC:0 "외계 도시가 §Y[special_project_target.GetName]§!에서 발견되었습니다. §Y과학선§!을 이용해 탐사팀을 보내는 것이 이 도시의 고대 건축가가 어떻게 그렇게 독특한 건물을 만들었는지 이해하는 데 유용할 수 있습니다.\n\n보상:\n£engineering£ §G(200 - 500)§! §Y그리고§! £society£ §G(100 - 300)§! \n\n(§SSpecial Project Extended Mod§!)"
 ALIEN_DEAD_CITY:0 "외계 '죽은 도시' §G(1단계)§!"
 ALIEN_DEAD_CITY_DESC:0 "우리는 §Y[special_project_target.GetName]§!에 매우 열악한 상태의 도시를 발견했습니다. 일부 사람들은 이를 '죽은 도시'로 분류하고 있으며, §YScience Ship§!을 보내면 무슨 일이 있었는지 알아내는 데 도움이 될 수 있습니다.\n\n보상:\n£unity£ §G(50 - 500)§! \n\n(§SSpecial Project Extended Mod§!)"
 ALIEN_FAUNA_STUDY:0 "외계 동물군 연구 §G(1단계)§!"
 ALIEN_FAUNA_STUDY_DESC:0 "생물학자 팀이 §Y[special_project_target.GetName]§!에서 풍부한 동물 활동을 연구하고 싶어합니다. 그들은 최상의 조건에서 관찰을 하기 위해 §YScience Ship§!을 요청하고 있습니다.\n\n보상:\n£society£ §G(400 - 600)§! §YAND§! £food£ §G(200 - 300)§! \n\n(§SSpecial Project Extended Mod§!)"
 ALIEN_FLORAL_STUDY:0 "외계 식물군 연구 §G(1단계)§!"
 ALIEN_FLORAL_STUDY_DESC:0 "생물학자 팀이 §Y[special_project_target.GetName]§!에서 풍부한 식물 활동을 연구하고 싶어합니다. 그들은 최상의 조건에서 관찰을 하기 위해 §YScience Ship§!을 요청하고 있습니다.\n\n보상:\n£society£ §G(200 - 500)§! §YAND§! £food£ §G(100 - 300)§! \n\n(§SSpecial Project Extended Mod§!)"
 ALIEN_HIERARCHY:0 "외계종 위계 §Y(2단계)§!"
 ALIEN_HIERARCHY_DESC:0 "외계 종족의 번식을 허용하는 것도 나쁜 생각은 아니지만, 그 거대한 권력을 구축하기 시작한 이가 누구인지 기억해야 합니다. 우리의 주요 종족이 그들을 잊지 않았음을 알리기 위해 외계 계층을 수립할 수 있습니다.\n\n보상:\n§Y수정치:§! §G주요 팝 행복도 증가§! §Y그리고§! £unity£ §G(500 - 1000)§! \n\n(§SSpecial Project Extended Mod§!)"
 ALIEN_PLANET_STUDY:0 "외계 행성 연구 §G(1단계)§!"
 ALIEN_PLANET_STUDY_DESC:0 "탐사팀이 §YScience Ship§! 중 하나를 사용하여 §Y[special_project_target.GetName]§!를 완전히 탐사하고 싶어합니다. 그들은 그 세계에서 연구에 매우 유용한 정보를 찾을 것이라고 주장합니다.\n\n보상:\n£physics£ £society£ £engineering£ §G(200 - 800)§! \n\n(§SSpecial Project Extended Mod§!)"
 ALIEN_PROTOTYPE_WORK:0 "외계 원형 생물 제작 §R(3단계)§!"
 ALIEN_PROTOTYPE_WORK_DESC:0 "우리 과학 팀 중 하나가 우리의 사람들과 함께할 수 있는 프로토타입 애완동물을 제작하는 데 성공했습니다. §Y[special_project_target.GetName]§! 이로 인해 그들의 삶이 더욱 즐거워질 것입니다.\n\n보상:\n§Y수정:§! §G행성 사회 고정 출력§! §Y그리고§! £society£ §G(2500 - 5000)§! §Y그리고§! £unity£ §G(1500 - 2400)§! \n\n(§SSpecial Project Extended Mod§!)"
 ALIEN_RUINS_STUDY:0 "외계 폐허 연구 §G(1단계)§!"
 ALIEN_RUINS_STUDY_DESC:0 "고대 외계 문명의 일부 유적이 §Y[special_project_target.GetName]§!에서 발견되었습니다. 즉시 §YScience Ship§!을 보내야 하며, 어쩌면 유용한 것을 발견할 수 있을 것입니다.\n\n보상:\n£society£ §G(200 - 600)§! §YAND§! £engineering£ §G(100 - 300)§! \n\n(§SSpecial Project Extended Mod§!)"
 ALIEN_STRONGHOLD_DISCOVERY:0 "외계 요새 발견 §G(1단계)§!"
 ALIEN_STRONGHOLD_DISCOVERY_DESC:0 "우리는 §Y[special_project_target.GetName]§!에 고대 외계 문명의 거대한 주둔지를 발견했습니다. 우리 민족의 엘리트들은 이미 그 구조를 조사하고 도식을 개발하기 위해 과학 §YScience Ship§!을 보내달라고 요청하고 있습니다.\n\n보상:\n£influence£ §G(25 - 50)§! \n\n(§SSpecial Project Extended Mod§!)"
 ALIEN_TEMPLE_DISCOVERY:0 "외계 사원 발견 §G(1단계)§!"
 ALIEN_TEMPLE_DISCOVERY_DESC:0 "고대 외계 문명의 신전이 §Y[special_project_target.GetName]§!에서 발견되었습니다. 우리는 탐험가 팀과 함께 즉시 §YScience Ship§!을 보내 내부에서 유용한 것을 찾아야 합니다.\n\n보상:\n£society£ §G(500 - 1000)§! \n\n(§SSpecial Project Extended Mod§!)"
 ALIEN_UNION_CONTRACT:0 "외계종 연합 §Y(2단계)§!"
 ALIEN_UNION_CONTRACT_DESC:0 "거대한 은하에서 우리는 미래에 어떤 일이 일어날지 결코 알 수 없습니다. 그렇기 때문에 우리는 항상 준비해야 합니다. 그리고 그 준비는 이웃과의 외교 회의를 통해 서로의 관점을 이해하는 것에서 시작해야 합니다.\n\n보상:\n§Y수정치:§! §G외계인 상호작용 증가§! §Y그리고§! £society£ §G(1000 - 2000)§! \n\n(§SSpecial Project Extended Mod§!)"
 ALPINE_LANDING_TEST:0 "툰드라 착륙 시험 §G(1단계)§!"
 ALPINE_LANDING_TEST_DESC:0 "민간 기업이 식민지 선박을 개발하고 있으며, 동토 행성에서 그들의 선박을 테스트하기 위해 우리에게 비용을 지불하고자 합니다. 그들은 §Y[special_project_target.GetName]§!를 테스트에 적합한 행성으로 선택했습니다. 이는 식민지가 없는 거주 가능한 행성이기 때문입니다. 착륙 훈련 프로토콜을 시작하기 위해 §Y식민지 선박§!이 필요합니다. 우리는 그 기회를 이용해 우리 공학자와 과학자 몇 명을 승무원과 함께 보낼 것입니다. 그들은 착륙하는 동안 이 행성에 대한 유용한 관찰을 할 것입니다.\n\n보상:\n£energy£ §G(200 - 500)§! §Y그리고§! £physics£ §G(200 - 400)§! \n\n(§SSpecial Project Extended Mod§!)"
 AMOEBA_GRAND_MOTHER:0 "아메바 대모 §Y(2단계)§!"
 AMOEBA_GRAND_MOTHER_DESC:0 "§Y[special_project_target.System.GetName]§! 항성계에서 문제가 발생했습니다. 거대한 아메바 할머니가 놀라운 속도로 많은 외계 선박을 출산하는 모습이 목격되었습니다. 빠르게 저지하지 않으면 이 항성계는 심각하게 침략당할 수 있으며, 자손들이 인근 항성계로 퍼질 수 있습니다. 우리는 침략을 연구하고 저지하기 위해 §Y2 과학선§!을 위한 경로를 확보해야 합니다.\n\n보상:\n£society£ §G(2000 - 4500)§! §YAND§! £energy£ §G(1000 - 4000)§! \n\n(§SSpecial Project Extended Mod§!)"
 ANCIENT_BATTLEFIELD_STUDY:0 "고대 전장 연구 §Y(2단계)§!"
 ANCIENT_BATTLEFIELD_STUDY_DESC:0 "고대 전투터가 발견되었습니다 §Y[special_project_target.GetName]§!. 중세 시대의 일부 고대 외계 종족들이 이곳에서 큰 전투를 벌였던 것으로 보입니다. 이 전투는 기술을 전혀 사용하지 않았음에도 불구하고 지형의 형태를 완전히 바꿀 만큼 규모가 컸습니다. 우리는 이 지역을 연구하기 위해 §YScience Ship§!을 보낼 수 있습니다.\n\n보상:\n£influence£ §G(25)§! §YAND§! £unity£ §G(1000)§! \n\n(§SSpecial Project Extended Mod§!)"
 ANCIENT_CONSTRUCTION_SITE:0 "고대 건설 현장 §Y(2단계)§!"
 ANCIENT_CONSTRUCTION_SITE_DESC:0 "우리는 §Y[special_project_target.System.GetName]§! 항성계에서 고대 건설 현장을 발견했습니다. 우리의 공학자들은 최소한 §Y3 건설선§!의 도움으로 이 현장을 사용하여 우리의 해군을 위한 더 많은 함선을 건조할 수 있다고 확인했습니다.\n\n보상:\n£navy_size£ §G추가 함선§! \n\n(§SSpecial Project Extended Mod§!)"
 ANCIENT_MINING_BASE:0 "고대 채굴 기지 §R(3단계)§!"
 ANCIENT_MINING_BASE_DESC:0 "우리는 §Y[special_project_target.System.GetName]§! 시스템에서 고대 채굴 기지를 발견했습니다. 이 기지는 은하의 주요 고대 채굴 기지 중 하나로, 주변에 수백 개의 채굴 드론이 보호하고 있는 것을 볼 수 있습니다. 그러나 우리의 스캐너는 기지의 화물창 안에 있는 광물의 양이 매우 방대하다는 것을 확인할 수 있습니다. 우리는 군사력을 동원하여 이곳을 정리하고, 자재를 손상시키지 않고 화물창을 제대로 열기 위해 최소한 §Y4 건설선§!을 보내야 합니다.\n\n보상:\n£minerals£ §G(15000)§! \n\n(§SSpecial Project Extended Mod§!)"
 ANCIENT_SHIPYARD:0 "고대 조선소 활성화 §R(3단계)§!"
 ANCIENT_SHIPYARD_DESC:0 "§Y[special_project_target.System.GetName]§! 항성계에서 고대 조선소가 우주에서 떠다니고 있는 것이 발견되었습니다. 그들의 기계적 도구 대부분이 여전히 사용 가능한 것으로 보입니다. 오래된 구조물은 매우 커서 수리를 하고 새로운 군함 건설을 시작하기 위해 최소 3척의 §Y건설선§!이 필요합니다.\n\n보상:\n£navy_size£ §G추가 선박§! \n\n(§SSpecial Project Extended Mod§!)"
 ANCIENT_TOWER_EXPLORATION:0 "고대 탑 §Y(2단계)§!"
 ANCIENT_TOWER_EXPLORATION_DESC:0 "§Y[special_project_target.GetName]§! 위에서 우리는 산 정상에 서 있는 매우 높은 탑을 볼 수 있습니다. 이 탑은 고대 문명의 지도자들이 모이는 장소 역할을 했던 것으로 보입니다. 우리는 이를 연구하기 위해 탐험가 팀과 함께 §YScience Ship§!을 보낼 수 있습니다.\n\n보상:\n£influence£ §G(50)§! §YAND§! £society£ §G(800 - 1600)§! \n\n(§SSpecial Project Extended Mod§!)"
 ANCIENT_TYANKI_MEETING:0 "티얀키 여왕 §R(3단계)§!"
 ANCIENT_TYANKI_MEETING_DESC:0 "타얀키들이 §Y[special_project_target.System.GetName]§! 항성계에 모이고 있습니다. 거대한 타얀키 여왕이 우주에서 페로몬을 방출하며 떠다니고 있는 것으로 보이며, 이는 매우 먼 거리에서도 다른 타얀키들이 감지할 수 있어 그들을 가까이 불러들이고, 또한 그들이 자신의 종이 아닌 다른 존재들에 대해 매우 공격적으로 만들고 있습니다. 우리는 그 여왕을 어떻게든 이동시켜야 하며, 그렇지 않으면 이곳은 향후 몇 년간 적대적인 타얀키들로 완전히 점령당할 것입니다. §Y10 척결선§! 정도면 그녀를 강제로 이동시키기에 충분할 것이지만, 우리는 그녀에게 가까이 다가가야 할 것입니다.\n\n보상:\n£society£ §G(5000 - 10000)§! §YAND§! £energy£ §G(2000 - 3000)§! §YAND§! £food£ §G(500 - 1000)§! \n\n(§SSpecial Project Extended Mod§!)"
 ARCTIC_LANDING_TEST:0 "$TUNDRA_LANDING_TEST$"
 ARCTIC_LANDING_TEST_DESC:0 "$TUNDRA_LANDING_TEST_DESC$"
 ARID_LANDING_TEST:0 "건조 행성 착륙 시험 §G(1단계)§!"
 ARID_LANDING_TEST_DESC:0 "민간 기업이 식민지 선박을 개발하고 있으며, 그들의 선박을 건조 행성에서 테스트하기 위해 우리에게 비용을 지불하고자 합니다. 그들은 §Y[special_project_target.GetName]§!를 테스트에 적합한 행성으로 선택했습니다. 이는 식민지화되지 않은 거주 가능한 행성입니다. 착륙 훈련 프로토콜을 시작하기 위해 §YColony Ship§!이 필요합니다. 우리는 그 기회를 이용해 우리 공학자와 과학자들을 그들의 승무원과 함께 보낼 것입니다. 그들은 착륙하는 동안 이 행성에 대한 유용한 관찰을 할 것입니다.\n\n보상:\n£energy£ §G(200 - 500)§! §YAND§! £engineering£ §G(200 - 400)§! \n\n(§SSpecial Project Extended Mod§!)"
 ASTEROID_CRACKING:0 "소행성 균열 작업 §G(1단계)§!"
 ASTEROID_CRACKING_DESC:0 "우리의 스캐너가 §Y[special_project_target.GetName]§!이 처음 생각했던 것보다 더 많은 광물이 숨겨져 있을 수 있음을 감지했습니다. 우리는 소행성을 조금 깨고 내부에 숨겨진 자원을 수집하기 위해 §Y건설선§!을 보낼 가능성이 있습니다.\n\n보상:\n£minerals£ §G(500)§! §Y그리고§! £rare_crystals£ §G(50)§! \n\n(§SSpecial Project Extended Mod§!)"
 ASTEROID_CRASH_HARVESTAGE:0 "소행성 충돌 수확 §G(1단계)§!"
 ASTEROID_CRASH_HARVESTAGE_DESC:0 "고밀도의 광물이 포함된 소행성이 §Y[special_project_target.GetName]§!에 충돌했습니다. 충돌 지점은 크며 대부분의 광물이 여전히 온전하게 남아 수집할 준비가 되어 있음을 확인할 수 있습니다. 우리가 충분히 빠르다면 다른 이들이 도착해 보물을 차지하기 전에 §Y과학선§!으로 광물을 수집할 수 있습니다.\n\n보상:\n£minerals£ §G(100 - 400)§! \n\n(§SSpecial Project Extended Mod§!)"
 ASTEROID_LAB:0 "소행성 연구소 §G(1단계)§!"
 ASTEROID_LAB_DESC:0 "우리는 §Y[special_project_target.GetName]§! 소행성에서 버려진 실험실로 보이는 것을 발견했습니다. 외관상으로는 구조물이 다소 오래되고 원시적이지만, 우리의 과학자들은 여전히 흥미로운 정보를 찾을 수 있다고 주장합니다. 조사를 진행하기 위해서는 §Y과학선§!과 완전한 과학 팀이 필요합니다.\n\n보상:\n£physics£ £society£ £engineering£ §G(200 - 600)§! \n\n(§SSpecial Project Extended Mod§!)"
 ASTEROID_MINERAL_SURFACE:0 "소행성 풍부 광맥판§G (1단계)§!"
 ASTEROID_MINERAL_SURFACE_DESC:0 "우리는 §Y[special_project_target.GetName]§!의 표면 판 아래에 고품질 광물이 대량으로 존재하는 것을 발견했습니다. 추출을 시작하기 위해서는 최소한 §Y5 척수함§!이 필요하며, 이를 통해 표면 판을 부수고 광물을 수집할 수 있는 충분한 힘을 얻을 수 있습니다.\n\n보상:\n£minerals£ §G(200 - 800)§! \n\n(§SSpecial Project Extended Mod§!)"
 AUGMENTED_INTEGRATED_SYSTEMS:0 "증강 민간 시스템 §Y(2단계)§!"
 AUGMENTED_INTEGRATED_SYSTEMS_DESC:0 "§Y[special_project_target.GetName]§!에서 한 발명가는 행성의 삶의 질을 향상시키기 위해 그의 새로운 프로젝트 중 하나를 시도하고 싶어 합니다.\n\n보상:\n£unity£ §G(800 - 1600)§! \n\n(§SSpecial Project Extended Mod§!)"
 BEAUTIFUL_LAKE:0 "아름다운 호수 §G(1단계)§!"
 BEAUTIFUL_LAKE_DESC:0 "우리의 스캐너는 §Y[special_project_target.GetName]§! 지역 중 하나에 거대한 호수가 존재한다는 것을 감지했습니다. 특히 주목할 점은 물의 투명도가 거의 100.00%에 이른다는 것입니다. 우리는 이렇게 맑은 물을 본 적이 없으며, 우리의 눈만이 한계인 깊은 곳까지 볼 수 있는 가능성이 있습니다. 우리는 그 아름다운 호수를 탐험하고 그곳에 존재하는 지역 식물군과 동물군을 연구하기 위해 §YScience Ship§!을 보낼 수 있습니다.\n\n보상:\n£physics£ §G(200 - 400)§! §YAND§! £society£ §G(300 - 600)§! §YAND§! £food£ §G(100)§! \n\n(§SSpecial Project Extended Mod§!)"
 BIG_DEBRIS_ANALYZE:0 "대형 잔해 분석 §G(1단계)§!"
 BIG_DEBRIS_ANALYZE_DESC:0 "우리의 스캐너가 §Y[special_project_target.System.GetName]§! 시스템에서 대량의 잔해를 탐지했습니다. 이 잔해가 어디에서 왔는지 예측하는 것은 불가능하며, 이를 연구하기 위해서는 §YScience Ship§!이 유용할 것입니다.\n\n보상:\n£physics£ §G(800 - 1600)§! §YAND§! £engineering£ §G(800 - 1600)§! §YAND§! £minerals£ §G(500)§! \n\n(§SSpecial Project Extended Mod§!)"
 BINARY_STARS_STUDY:0 "쌍성 연구 §Y(2단계)§!"
 BINARY_STARS_STUDY_DESC:0 "일부 천문학자들은 §Y[special_project_target.System.GetName]§! 항성계의 쌍별을 연구하고 싶어합니다. 그들은 작업을 시작하기 위해 우리의 §Y과학자§! 중 한 명이 필요합니다.\n\n보상:\n£physics£ §G(1000 - 1200)§! §Y그리고§! £energy£ §G(600 - 1000)§! \n\n(§SSpecial Project Extended Mod§!)"
 BIOLOGIST_CONGRESS:0 "생물학자 회의 §G(1단계)§!"
 BIOLOGIST_CONGRESS_DESC:0 "물리학자들의 회의가 §Y[Root.Capital.GetName]§!에서 조직되고 있습니다. 그들은 국가의 사회 기술 향상을 위한 주장을 하기 위해 모였습니다.\n\n보상:\n§Y수정치:§! §G사회 연구 속도 증가§! §Y그리고§! £society£ §G(1000 - 1500)§! \n\n(§SSpecial Project Extended Mod§!)"
 BLACK_HOLE_DARKMATTER:0 "암흑물질의 구멍 §Y(2단계)§!"
 BLACK_HOLE_DARKMATTER_DESC:0 "§Y[special_project_target.GetName]§!는 블랙홀 중에서도 매우 드문 특정 상태에 들어갔으며, 완전한 스캔을 수행한 후에도 암흑 물질을 발견할 가능성이 큽니다. 이 기회를 활용하기 위해 §Y과학선§!을 보내야 합니다.\n\n보상:\n§G암흑 물질 증가 출력§! §Y그리고§! £energy£ §G(500 - 750)§! §Y그리고§! £physics£ §G(800 - 1200)§! \n\n(§SSpecial Project Extended Mod§!)"
 BLACK_HOLE_GROWING:0 "성장하는 블랙홀 §R(3단계)§!"
 BLACK_HOLE_GROWING_DESC:0 "우리의 스캐너가 §Y[special_project_target.GetName]§!에서 오는 활동의 증가를 감지했습니다. 블랙홀이 어떤 방식으로 크기가 증가하고 있는 것 같습니다. 이는 매우 드문 과정으로, 백만 년에 한 번만 발생합니다. 우리는 이를 관찰하기 위해 §Y과학선§!을 보내야 합니다.\n\n보상:\n£physics£ §G출력 증가§! §Y그리고§! £physics£ §G(2000 - 4000)§! \n\n(§SSpecial Project Extended Mod§!)"
 BLUE_STAR_OBSERVATION:0 "청색 항성 관측 §G(1단계)§!"
 BLUE_STAR_OBSERVATION_DESC:0 "과학자 팀이 A형 블루 스타를 관찰하기 위해 우리의 §YScience Ship§! 중 하나를 빌리고 싶어합니다. 그들은 자신들이 설정한 복잡한 기준을 모두 따르는 별 중 하나인 §Y[special_project_target.GetName]§!를 관찰하기로 결정했습니다.\n\n보상:\n£physics£ §G(500 - 1000)§! \n\n(§SSpecial Project Extended Mod§!)"
 BRIGHT_SUN_VIEW:0 "밝은 태양 관측 §G(1단계)§!"
 BRIGHT_SUN_VIEW_DESC:0 "우리는 §Y[special_project_target.GetName]§!에서 오는 빛이 완벽하게 밝은 지점을 발견했습니다. 그 위치에 §Y과학선§!을 보내어 그 태양에서 오는 빛을 연구할 수 있습니다.\n\n보상:\n£energy£ §G(200)§! §Y그리고§! £physics£ §G(100 - 400)§! \n\n(§SSpecial Project Extended Mod§!)"
 BROWN_DWARF_STUDY:0 "갈색왜성 연구 §G(1단계)§!"
 BROWN_DWARF_STUDY_DESC:0 "천문학자 그룹이 §Y[special_project_target.GetName]§!를 연구하고자 합니다. 그들은 이 별이 갈색 왜성 단계에 들어선 시점으로부터 나이를 결정하려고 합니다. 연구를 시작하기 위해서는 §Y과학선§!이 필요합니다.\n\n보상:\n£engineering£ §G(200 - 400)§! §Y그리고§! £physics£ §G(200 - 400)§! \n\n(§SSpecial Project Extended Mod§!)"
 BUILDING_DEV_PROJECT:0 "건설자 프로젝트 §G(1단계)§!"
 BUILDING_DEV_PROJECT_DESC:0 "우리 건설자들이 §Y[special_project_target.GetName]§!에서 건물 개발 속도를 더 빠르게 하는 데 도움이 될 수 있는 프로젝트를 시작했습니다. 그들은 프로젝트 시작을 위한 우리의 승인을 기다리고 있습니다.\n\n보상:\n§Y수정치:§! §G건물 속도 증가§! §Y그리고§! £engineering£ §G(100 - 400)§! \n\n(§SSpecial Project Extended Mod§!)"
 BUSY_SPACEPORT:0 "분주한 우주항 §G(1단계)§!"
 BUSY_SPACEPORT_DESC:0 "§Y[special_project_target.GetName]§!에서 우주 교통량과 자원 수송이 기하급수적으로 증가한 것으로 보입니다. 그러나 행성에 있는 민간 우주항은 민간선과 수송선의 전체 교통량을 감당하기에 충분히 크지 않아, 행성 주변에서 수집된 새로운 자원, 특히 합금의 대규모 반입이 중단되고 있습니다. 이러한 우주 교통 증가를 감당하고 새 자원을 활용할 수 있도록 행성의 지역 우주항을 개선해야 합니다.\n\n보상:\n§Y수정치:§! §G추가 합금 산출§! \n\n(§S특수 프로젝트 확장 모드§!)"
 CANYON_BIOME_EXPLORATION:0 "협곡 생물군계 탐사 §G(1단계)§!"
 CANYON_BIOME_EXPLORATION_DESC:0 "우리는 §Y[special_project_target.GetName]§!에서 수천 킬로미터에 걸쳐 펼쳐진 매우 큰 협곡 생물군계를 발견했습니다. 한 지질학자 그룹이 §YScience Ship§!의 도움으로 생물군계의 일부를 탐사하고 싶어합니다.\n\n보상:\n£minerals£ §G(100 - 300)§! §YAND§! £society£ §G(200 - 400)§! \n\n(§SSpecial Project Extended Mod§!)"
 CIVILIAN_PIRATE_ATTACK:0 "민간선 해적 공격 §Y(2단계)§!"
 CIVILIAN_PIRATE_ATTACK_DESC:0 "§Y[special_project_target.System.GetName]§! 항성계에서 민간인 선박이 해적 무리에게 공격받았다는 구조 요청을 받았습니다. 우리는 해적을 중립화하고 §Y건설선§!으로 그들의 선박을 수리하여 반드시 그들을 도와야 합니다.\n\n보상:\n£unity£ §G(600 - 1400)§! §Y그리고§! £energy£ §G(1500)§! §Y그리고§! £minerals£ §G(1000)§! \n\n(§SSpecial Project Extended Mod§!)"
 CIVILIAN_SHIP_MALFUNCTION:0 "민간선 고장 §G(1단계)§!"
 CIVILIAN_SHIP_MALFUNCTION_DESC:0 "민간인 선박 중 하나에서 §Y[special_project_target.System.GetName]§! 시스템으로부터 구조 요청이 감지되었습니다. 그들의 스러스터 중 하나가 고장 나서 우주에 갇힌 것 같습니다. 그들은 우리의 도움을 요청하고 있으며, §Y건설선§!을 보내면 그들의 선박을 수리하는 데 충분할 것입니다. 그들은 서두르고 있으며, 우리가 빠르게 도와준다면 보상할 준비가 되어 있습니다.\n\n보상:\n£energy£ §G(300)§! §Y그리고§! £unity£ §G(10 - 200)§! \n\n(§SSpecial Project Extended Mod§!)"
 CIVIL_WAR_RAGING:0 "격화되는 내전 §R(3단계)§!"
 CIVIL_WAR_RAGING_DESC:0 "우리나라의 다양한 반란 세력으로 구성된 동맹이 §Y[special_project_target.GetName]§!에 대한 공격을 시작했습니다. 그들은 이미 많은 중요한 위치를 장악하기 시작했습니다. 우리는 그들을 저지하고 더 이상의 진전을 막기 위해 최소한 §Y45 수송선§!으로 신속하게 타격해야 합니다. §R임무 중 일부 병력이 사망할 수 있습니다!§!\n\n보상:\n£influence£ £energy£ £unity£ £minerals£ §Y임무 진행 상황에 따라§! \n\n(§SSpecial Project Extended Mod§!)"
 CLEAR_MOON:0 "맑은 달 §G(1단계)§!"
 CLEAR_MOON_DESC:0 "§Y[special_project_target.GetName]§!에서 매우 이상한 현상이 목격되었습니다. 매일 밤 달이 행성 주변에서 구름에 가려지지 않고 완벽하게 보이는 듯하며, 마치 달이 구름을 쫓아내는 것처럼 보입니다. 매일 밤 보름달을 볼 수 있다는 사실은 행성의 발명가들에게 몇 가지 아이디어를 주었습니다. 그들은 도시 위로 비치는 달빛을 강화해 밤에도 더 밝게 만들 수 있는 장치를 만들 수 있으며, 그런 기능이 행성에 많은 긍정적인 변화를 가져올 것이라고 주장합니다.\n\n보상:\n§Y매장지:§! §G추가 안정도§! \n\n(§S특수 프로젝트 확장 모드§!)"
 COLD_BARREN_EXPLORATION:0 "차가운 불모 행성 탐사 §G(1단계)§!"
 COLD_BARREN_EXPLORATION_DESC:0 "우리의 과학 팀 중 하나가 차가운 황량한 세계에서 발생하는 현상에 대한 지식을 향상시키기 위해 §Y[special_project_target.GetName]§!을 탐험하고 싶어합니다. 그들은 탐험을 제대로 수행하기 위해 우리의 §YScience Ship§! 중 하나가 필요하며, 이는 우리에게도 유용할 수 있습니다.\n\n보상:\n£unity£ §G(75 - 150)§! §YAND§! £energy£ §G(200 - 400)§! §YOR§! £physics£ §G(300 - 400)§! \n\n(§SSpecial Project Extended Mod§!)"
 COLLAPSTAR_STUDY:0 "붕괴성 연구 §Y(2단계)§!"
 COLLAPSTAR_STUDY_DESC:0 "§Y[special_project_target.GetName]§!가 특정 상태에 들어간 것으로 보입니다. 이로부터 나오는 에너지의 밀도와 형태는 우리가 이를 '콜랩스타'로 분류할 수 있게 해줍니다. 우리는 §Y과학선§!을 보내 이 과정을 연구할 수 있습니다.\n\n보상:\n£physics£ §G(1000 - 2000)§! §Y그리고§! £engineering£ §G(1000 - 2000)§! \n\n(§SSpecial Project Extended Mod§!)"
 COMBAT_SIMILATION:0 "전투 시뮬레이션 §G(1단계)§!"
 COMBAT_SIMILATION_DESC:0 "전투에서 우리 지상 군대와 우주 해군이 그 광대한 은하에서 무엇을 마주할지 아는 것은 불가능합니다. 그들이 경험 없이 전선에 나서는 것을 허용할 수 없습니다. 우리 전문가 중 일부는 부대와 조종사의 훈련을 돕기 위해 우리나라 전역에 퍼질 수 있는 전투 시뮬레이션 프로그램을 만들었습니다. 그들이 둥지를 떠날 때 어느 정도 경험을 갖추도록 하는 것입니다.\n\n보상:\n§Y수정치:§! §G군대/함선이 더 많은 경험으로 시작합니다§! §Y그리고§! £society£ §G(200 - 600)§! \n\n(§SSpecial Project Extended Mod§!)"
 CONSTRUCTION_LANDING_TEST:0 "건설선 착륙 시험 §G(1단계)§!"
 CONSTRUCTION_LANDING_TEST_DESC:0 "건설 선박 개발에 참여하는 민간 기업이 그들의 선박을 §Y[special_project_target.GetName]§!에서 테스트하기 위해 우리에게 비용을 지불하고자 합니다. 테스트 절차를 시작하기 위해 §Y건설 선박§!을 보내야 합니다.\n\n보상:\n£energy£ §G(100 - 400)§! §Y그리고§! £engineering£ §G(100 - 400)§! \n\n(§SSpecial Project Extended Mod§!)"
 CONSUMER_DELIVERY:0 "소비재 배송 §G(1단계)§!"
 CONSUMER_DELIVERY_DESC:0 "§Y[special_project_target.GetName]§!에서 막대한 양의 소비재가 주문되었습니다. 행성의 주민들이 어떻게든 상당한 부를 축적하여 그런 양의 사치품을 구매할 수 있게 된 것으로 보입니다. 하지만 우리 민간 수송선 대부분은 다른 임무로 바쁘기 때문에, 그들은 이 주문을 마무리하기 위해 국가의 도움이 필요합니다.\n\n보상:\n§Y수정치:§! §G추가 소비재 산출§! \n\n(§S특수 프로젝트 확장 모드§!)"
 CONTINENTAL_LANDING_TEST:0 "대륙 행성 착륙 시험 §G(1단계)§!"
 CONTINENTAL_LANDING_TEST_DESC:0 "민간 기업이 대륙 행성에서 그들의 식민지 선박을 시험하기 위해 우리에게 비용을 지불하고자 합니다. 그들은 식민지화되지 않은 거주 가능한 행성인 §Y[special_project_target.GetName]§!를 시험하기에 좋은 행성으로 선택했습니다. 착륙 훈련 프로토콜을 시작하기 위해 §Y식민지 선박§!이 필요합니다. 우리는 그 기회를 이용해 그들의 승무원과 함께 일부 공학자와 과학자를 보낼 것입니다. 그들은 착륙하는 동안 그 행성에 대한 유용한 관찰을 할 것입니다.\n\n보상:\n£energy£ §G(200 - 500)§! §Y그리고§! £society£ §G(200 - 400)§! \n\n(§SSpecial Project Extended Mod§!)"
 CONTINENTAL_WORLD_EXPLORATION:0 "대륙 행성 탐사 §G(1단계)§!"
 CONTINENTAL_WORLD_EXPLORATION_DESC:0 "탐험가 팀이 §Y[special_project_target.GetName]§!에 착륙하여 그 대륙 행성을 연구하고 흥미로운 무언가를 발견하고자 합니다. 그들은 탐사를 시작하기 위해 우리의 §YScience Ship§! 중 하나가 필요합니다.\n\n보상:\n£energy£ §G(100 - 200)§! §YAND§! £society£ §G(300 - 600)§! \n\n(§SSpecial Project Extended Mod§!)"
 COUNTRY_REVIEW:0 "국가 검토 §G(1단계)§!"
 COUNTRY_REVIEW_DESC:0 "우리의 지도자들에 의해 모인 전문가 팀이 우리 나라의 전반적인 검토를 수행하고자 합니다. 이는 미래에 심각한 위협이 될 수 있는 문제와 우리가 놓쳤을 수 있는 기회를 찾아내기 위함입니다. 그들의 보고서는 직접 통치자에게 전달될 것입니다.\n\n보상:\n£influence£ §G(60)§! \n\n(§SSpecial Project Extended Mod§!)"
 CRACKED_ASTEROID_EXPLORATION:0 "갈라진 소행성 탐사 §G(1단계)§!"
 CRACKED_ASTEROID_EXPLORATION_DESC:0 "우리의 탐사선이 §Y[special_project_target.GetName]§! 표면에 거대한 구멍을 발견했습니다. 소행성이 갈라져 있어 함선이 내부로 들어갈 수 있는 것 같습니다. 광물 채굴 장소를 찾을 가능성이 매우 크므로 §Y과학선§!을 보내 탐사하는 것이 매우 유용할 것입니다.\n\n보상:\n£minerals£ §G산출량 증가§! \n\n(§SSpecial Project Extended Mod§!)"
 CRYSTAL_HIVE_SYSTEM:0 "수정 번식 군체 §Y(2단계)§!"
 CRYSTAL_HIVE_SYSTEM_DESC:0 "§Y[special_project_target.System.GetName]§! 시스템이 침략당했습니다. 거대한 수정 존재체 무리가 발견되어 수십 개의 수정 선박을 생성하고 있습니다. 너무 많은 부수적 피해를 피하기 위해 호위와 함께 §Y과학선§!으로 그 발생을 막아야 합니다.\n\n보상:\n£minerals£ §G(1000 - 4000)§! §Y그리고§! £physics£ §G(2000 - 4500)§! \n\n(§SSpecial Project Extended Mod§!)"
 CYBERNETIC_TROOPS:0 "사이버네틱 부대 §Y(2단계)§!"
 CYBERNETIC_TROOPS_DESC:0 "사이버네틱 병사들이 §Y[special_project_target.GetName]§!에서 갑자기 등장했습니다. 그들은 행성에서 공포를 퍼뜨리고 있으며, 병사들이 제작된 것으로 보이는 의심스러운 공장이 발견되었습니다. 우리는 즉시 §Y20 수송선§!으로 그들을 저지해야 합니다. §R임무 중 일부 병사가 사망할 수 있습니다!§!\n\n보상:\n£engineering£ §G(1500 - 2500)§! §Y그리고§! £energy£ §G(1500)§! \n\n(§SSpecial Project Extended Mod§!)"
 CYBREX_CORE_STUDY:0 "사이브렉스 코어 연구 §M(4단계)§!"
 CYBREX_CORE_STUDY_DESC:0 "§Y[special_project_target.System.GetName]§! 시스템에서 믿을 수 없는 것이 발견되었습니다. 고대 사이브렉스 선조 종의 일종의 코어로 보이는 거대한 구조물이 이 시스템에서 드러났으며, 이 구조물은 초공간을 사용하지 않고 시스템 간에 매우 느리게 이동하고 있어 한동안 미공개 상태를 유지할 수 있습니다. 우리는 이 코어가 내부에 매우 귀중한 것을 숨기고 있다는 것을 확인할 수 있습니다. 강력한 선박으로 구성된 자동 함대가 이를 호위하고 있기 때문입니다. 우리는 내부에 무엇이 있는지 알아내야 하며, 이를 위해서는 선조의 자동 선박을 물리칠 강력한 함대와 숙련된 과학자가 탑승한 §YScience Ship§!이 필요합니다.\n\n보상:\n§YModifier:§! §G연구 속도 증가§! §YAND§! £physics£ £society£ £engineering£ §G(15000)§! \n\n(§SSpecial Project Extended Mod§!)"
 DANGEROUS_WORLD_EXPLORATION:0 "위험한 행성 §Y(2단계)§!"
 DANGEROUS_WORLD_EXPLORATION_DESC:0 "§Y[special_project_target.GetName]§!에서는 날씨가 격렬하고, 동물군은 매우 공격적이며, 식물군은 치명적으로 독성이 있습니다. 우리의 전문가들이 반대하더라도, 베테랑 탐험가 그룹은 행성을 발견하기 위해 §Y과학선§!을 사용하고 싶어합니다.\n\n보상:\n£society£ §G(1000 - 2500)§! §Y그리고§! £food£ §G(200)§! \n\n(§SSpecial Project Extended Mod§!)"
 DARK_INTERGALAXYNET:0 "다크 은하간 네트워크 §M(4단계)§!"
 DARK_INTERGALAXYNET_DESC:0 "우리 기술자들이 '다크 은하간 네트워크'에 접속할 수 있을 만큼 충분한 보호 체계와 방화벽을 갖춘 거대한 강력 컴퓨터를 건설하는 데 성공했습니다. 그곳은 암시장과 관련된 매우 흥미로운 거래에 접근할 수 있는 장소로 알려져 있습니다. 그러나 누군가 우리를 해킹하려 할 수도 있다는 점을 주의해야 합니다. 우리는 웹에 5번 침투를 시도할 수 있습니다. §R다크 은하간 네트워크에 들어가는 것은 매우 위험하며, 가장 강력한 방화벽조차 해커로부터 우리를 보호하기에 충분하지 않을 것입니다! 막대한 자원 손실을 입거나 정체불명의 세력에게 공격당할 수도 있습니다!§!\n\n보상:\n§Y???§! \n\n(§S특수 프로젝트 확장 모드§!)"
 DESERT_LANDING_TEST:0 "사막 행성 착륙 시험 §G(1단계)§!"
 DESERT_LANDING_TEST_DESC:0 "민간 기업이 식민지 선박을 개발하고 있으며, 사막 행성에서 그들의 선박을 테스트하기 위해 우리에게 비용을 지불하고자 합니다. 그들은 식민지가 없는 거주 가능한 행성인 §Y[special_project_target.GetName]§!를 테스트에 적합한 행성으로 선택했습니다. 착륙 훈련 프로토콜을 시작하기 위해 §Y식민지 선박§!이 필요합니다. 우리는 그 기회를 이용해 그들의 승무원과 함께 몇몇 공학자와 과학자를 보낼 것입니다. 그들은 착륙하는 동안 그 행성에 대한 유용한 관찰을 할 것입니다.\n\n보상:\n£energy£ §G(200 - 500)§! §Y그리고§! £engineering£ §G(200 - 400)§! \n\n(§SSpecial Project Extended Mod§!)"
 DESTROYED_AUTO_DREADNOUGHT:0 "파괴된 드레드노트 §M(4단계)§!"
 DESTROYED_AUTO_DREADNOUGHT_DESC:0 "우리의 스캐너가 §Y[special_project_target.System.GetName]§!에서 고대 선박의 함대를 발견했습니다. 이 선박들 중 대부분은 여전히 온전하며 자동 컴퓨터에 의해 제어되고 있습니다. 가장 큰 선박은 dreadnought 크기로 매우 나쁜 상태에 있으며 사용이 불가능해 보입니다. 우리는 §YScience Ship§!을 통해 그 선박을 더 자세히 살펴볼 수 있는 가능성이 있지만, 그 전에 통로를 정리해야 할 것입니다.\n\n보상:\n§YModifier:§! §GAdvanced Ship Efficiency§! §YAND§! £engineering£ §G(8000)§! §YAND§! £physics£ §G(8000)§! §YAND§! £minerals£ §G(2500)§! \n\n(§SSpecial Project Extended Mod§!)"
 DYSON_SPHERE_OUTPUT:0 "다이슨 스피어 과잉 출력 §R(3단계)§!"
 DYSON_SPHERE_OUTPUT_DESC:0 "우리의 다이슨 구체가 §Y[special_project_target.System.GetName]§! 항성계에서 에너지가 넘쳐나는 것 같습니다. 거대 구조물의 예비 용량이 이미 가득 차 있기 때문에, 이를 수집하기 위해 §Y과학선§!을 보내지 않으면 에너지가 손실될 것임을 확인할 수 있습니다.\n\n보상:\n£energy£ §G(4000 - 6000)§! \n\n(§SSpecial Project Extended Mod§!)"
 ENERGY_GRID:0 "에너지 그리드 프로젝트 §Y(2단계)§!"
 ENERGY_GRID_DESC:0 "우리 공학자들은 §Y[special_project_target.GetName]§!에 거대한 에너지망을 건설하여 행성에 존재하는 대부분의 사용되지 않는 에너지를 활용하고자 합니다. 그들은 프로젝트를 시작하기 위한 승인을 기다리고 있습니다.\n\n보상:\n£energy£ §G(1000 - 2000)§! \n\n(§SSpecial Project Extended Mod§!)"
 ENGINEERS_CONGRESS:0 "공학자 회의 §G(1단계)§!"
 ENGINEERS_CONGRESS_DESC:0 "공학자 회의가 §Y[Root.Capital.GetName]§!에서 조직되고 있습니다. 그들은 국가의 공학 기술 향상을 위한 주장을 하기 위해 모였습니다.\n\n보상:\n§Y수정치:§! §G공학 연구 속도 증가§! §Y그리고§! £engineering£ §G(1000 - 1500)§! \n\n(§SSpecial Project Extended Mod§!)"
 ENTREPOT_DEVELOPPEMENT:0 "저장고 개발 §Y(2단계)§!"
 ENTREPOT_DEVELOPPEMENT_DESC:0 "비축량이 가득 찼을 때 어떤 자원도 낭비할 여유는 없습니다. 더 많은 자원을 저장할 수 있는 거대한 저장고 개발을 위한 건설 프로젝트를 시작해야 합니다.\n\n보상:\n§Y수정치:§! §G자원 저장 용량 증가§! \n\n(§S특수 프로젝트 확장 모드§!)"
 EXPLODED_SHIP_RECOVER:0 "원형 함선 회수 §G(1단계)§!"
 EXPLODED_SHIP_RECOVER_DESC:0 "우리의 스캐너가 §Y[special_project_target.System.GetName]§! 시스템에서 우리의 프로토타입 선박 중 하나의 폭발을 감지했습니다. 이 사고의 배후에 있는 테스트 회사는 문제의 원인을 알고 있으며, 다른 제국의 손에 넘어가기 전에 나머지 선박을 인양해 주기를 원합니다. §Y건설선§!을 보내면 문제가 해결될 것입니다.\n\n보상:\n£energy£ §G(100 - 200)§! §Y그리고§! £minerals£ §G(250 - 500)§! \n\n(§SSpecial Project Extended Mod§!)"
 EXPLODING_PLANET:0 "행성 라그나로크 §R(3단계)§!"
 EXPLODING_PLANET_DESC:0 "'라그나로크'에 대해 들어본 적이 있습니까? 행성이 파괴되는 과정입니다. 일부 전문가들은 §Y[special_project_target.GetName]§!가 조만간 파괴될 것이라고 예측하고 있습니다. 행성의 중심부는 거의 우주선이 도달할 수 있는 위치에 있는 것 같습니다. 우리는 §YScience Ship§!을 이용해 최종 사건을 가속화하기 위해 전문가 팀을 보낼 수 있습니다.\n\n보상:\n§G행성이 파괴된 세계로 변합니다§! §Y그리고§! £minerals£ §G(2000)§! §Y그리고§! £energy£ §G(3000)§! \n\n(§SSpecial Project Extended Mod§!)"
 FE_REMNANTS_ASSAULT:0 "몰락 잔당 강습 §M(4단계)§!"
 FE_REMNANTS_ASSAULT_DESC:0 "§Y[special_project_target.System.GetName]§! 항성계에서 어떤 활동이 감지되었습니다. 잔존자 그룹이 자신의 제국을 힘으로 복원하려고 시도하고 있는 것으로 보입니다. 그들은 경계를 설정하기 위해 여러 항성계를 공격하고 있습니다. 현재의 잔존 제국의 위협으로 이미 충분한 문제가 있으며, 새로운 제국이 등장하는 것을 감당할 여유가 없습니다. 최소한 §Y10 군함§!으로 그들을 저지할 수 있으며, 그들의 고급 선박을 훔치는 것도 시도할 수 있습니다.\n\n보상:\n£navy_size£ §G추가 선박§! §YAND§! £engineering£ §G(5000)§! §YAND§! £energy£ §G(2500)§! \n\n(§SSpecial Project Extended Mod§!)"
 FE_TECHONOLOGY_CACHE:0 "고대 기술 은닉처 §R(3단계)§!"
 FE_TECHONOLOGY_CACHE_DESC:0 "우리의 스캐너가 §Y[special_project_target.System.GetName]§! 시스템에서 한 멸망한 제국의 잔존자 소형 함대를 탐지했습니다. 그들은 그들의 고급 기술의 열쇠를 숨기고 있는 기지를 보호하고 있는 것으로 보입니다. 잔존자이기 때문에 그들을 공격해도 다른 멸망한 제국을 화나게 하지 않을 것이며, 게다가 우리는 그들의 기술에 접근할 수 있을지도 모릅니다. 우리는 임무를 완수하기 위해 호위함과 함께 §YScience Ship§!을 보내야 합니다.\n\n보상:\n§G연구 옵션:§! §Y$tech_dark_matter_deflector$§! §YOR§! £physics£ §G(12000)§! \n\n(§SSpecial Project Extended Mod§!)"
 FISSURE_EXPLORATION:0 "거대 균열 §Y(2단계)§!"
 FISSURE_EXPLORATION_DESC:0 "거대한 균열이 §Y[special_project_target.GetName]§!에서 발견되었습니다. 이 균열은 탐험되지 않은 행성의 일부로 배가 들어갈 수 있을 만큼 큽니다. 우리는 아마도 뭔가를 놓쳤으므로 §Y과학선§!을 보내는 것이 최선의 방법입니다.\n\n보상:\n£minerals£ §G(1000 - 1500)§! §Y그리고§! £society£ §G(1500 - 2500)§! \n\n(§SSpecial Project Extended Mod§!)"
 FLOATING_ISLANDS_STUDY:0 "부유 섬 §Y(2단계)§!"
 FLOATING_ISLANDS_STUDY_DESC:0 "§Y[special_project_target.GetName]§!에서 흥미로운 발견이 이루어졌습니다. 일부 땅이 떠 있을 수 있는 것으로 보입니다. 이러한 과정이 어떻게 발생할 수 있는지 아직 이해하지 못했으므로, §YScience Ship§!을 보내면 이를 연구하는 데 도움이 될 수 있습니다.\n\n보상:\n£society£ §G(800 - 1600)§! §YAND§! £physics£ §G(800 - 1600)§! \n\n(§SSpecial Project Extended Mod§!)"
 FROZEN_EXPEDITION:0 "얼어붙은 원정 §G(1단계)§!"
 FROZEN_EXPEDITION_DESC:0 "거주할 수 없는 얼음 행성이지만, §Y[special_project_target.GetName]§!에서 거주 가능한 행성에서만 발견되는 몇몇 지형 형성이 발견되었습니다. 탐험가 팀이 그 행성의 해당 부분을 탐사하고 흥미로운 발견을 할 수 있도록 우리의 §YScience Ship§! 중 하나를 빌리고 싶어 합니다.\n\n보상:\n£minerals£ §G(100 - 300)§! §YAND§! £physics£ §G(500 - 800)§! \n\n(§SSpecial Project Extended Mod§!)"
 FROZEN_WORLD_EXPLORATION:0 "얼어붙은 행성 탐사 §G(1단계)§!"
 FROZEN_WORLD_EXPLORATION_DESC:0 "우리의 과학 팀 중 하나가 얼어붙은 세계에서 발생하는 현상에 대한 지식을 향상시키기 위해 §Y[special_project_target.GetName]§!을 탐험하고자 합니다. 그들은 탐험을 제대로 수행하기 위해 우리의 §YScience Ship§! 중 하나가 필요하며, 이는 우리에게도 유용할 수 있습니다.\n\n보상:\n£unity£ §G(75 - 150)§! §Y그리고§! £energy£ §G(200 - 400)§! §Y또는§! £physics£ §G(300 - 400)§! \n\n(§SSpecial Project Extended Mod§!)"
 GAIA_WORLD_STUDY:0 "가이아 행성 연구 §R(3단계)§!"
 GAIA_WORLD_STUDY_DESC:0 "생물학자 전문가 팀이 거주 가능한 세계에서 §Y[special_project_target.GetName]§!를 연구하고 싶어합니다. 그들은 가이아 행성이 은하의 모든 생물이 거의 완벽한 생명 조건에서 살 수 있는 완벽한 생태계에 도달하는 방법을 이해하려고 하고 있습니다. 프로젝트를 시작하기 위해서는 §YScience Ship§!이 필요합니다.\n\n보상:\n£society£ §G(5000 - 8000)§! \n\n(§SSpecial Project Extended Mod§!)"
 GAIA_WORLD_TOURISM_TEST:0 "가이아 관광 §Y(2단계)§!"
 GAIA_WORLD_TOURISM_TEST_DESC:0 "부유한 관광객들로 구성된 한 그룹이 §Y[special_project_target.GetName]§!에서 여행을 하고 싶어 합니다. 그 아름다운 가이아 행성이 주목받지 않았고 관광 활동의 좋은 목적지가 되었습니다. 이 작업을 위해서는 §Y식민지선§!이 필요합니다.\n\n보상:\n£energy£ §G(1500 - 3000)§! \n\n(§SSpecial Project Extended Mod§!)"
 GAS_GIANT_OVERFLOW:0 "가스 거성 분출 §G(1단계)§!"
 GAS_GIANT_OVERFLOW_DESC:0 "§Y[special_project_target.GetName]§!의 표면에서 가스 활동의 과잉이 감지되었습니다. 행성에서 가스가 쏟아져 나올 것 같습니다. 이때 §Y과학선§!을 적절히 배치할 수 있다면, 일부 열을 수집하고 이를 특별한 온도 변환 장치를 통해 에너지로 변환할 수 있을 것입니다.\n\n보상:\n£energy£ §G(200 - 600)§! \n\n(§SSpecial Project Extended Mod§!)"
 GATEWAY_INVESTIGATION:0 "관문 조사 §Y(2단계)§!"
 GATEWAY_INVESTIGATION_DESC:0 "전문가 그룹이 §Y[special_project_target.System.GetName]§!에 있는 게이트웨이를 조사하고 싶어 합니다. 그들은 우리 과학자들이 아마 놓쳤던 흥미로운 발견을 할 것이라고 주장합니다. 그들은 임무를 시작하기 위해 우리의 §YScience Ship§! 중 하나가 필요할 것입니다.\n\n보상:\n£engineering£ §G(1000 - 2000)§! §YAND§! £energy£ §G(500 - 1200)§! \n\n(§SSpecial Project Extended Mod§!)"
 GENE_MODIF_OPPORTUNITY:0 "유전적 개선 §Y(2단계)§!"
 GENE_MODIF_OPPORTUNITY_DESC:0 "유전자의 품질을 향상시킬 가능성이 있는 것 같습니다. 프로젝트는 길어질 것이지만, 우리의 전문가들은 결과가 나올 것이라고 확신합니다.\n\n보상:\n§G추가 종 특성§! §Y그리고§! £society£ §G(1000 - 2000)§! \n\n(§SSpecial Project Extended Mod§!)"
 GIANT_MACHINE_DESTRUCTION:0 "거대 기계 파괴 §R(3단계)§!"
 GIANT_MACHINE_DESTRUCTION_DESC:0 "거대한 전투 기계 무리가 §Y[special_project_target.GetName]§!에서 발견되었습니다. 그들의 설계와 기술은 매우 고급인 것으로 보이지만, 기계들은 어떤 의사소통의 시도에도 적대적인 반응만을 보였습니다. 이들이 행성에서 난동을 부리도록 두어서는 안 됩니다. 이는 새로운 식민지에 대한 미래의 위협이 될 것입니다. 우리는 이들을 처리하기 위해 §Y40 대수송선§!을 보낼 수 있습니다. §R임무 중 일부 병력이 사망할 수 있습니다!§!\n\n보상:\n£influence£ §G(50)§! §YAND§! £energy£ §G(3500)§! §YAND§! £unity£ §G(2000)§! §YAND§! £engineering£ §G(4000 - 8000)§! \n\n(§SSpecial Project Extended Mod§!)"
 GIANT_TANK_WAR:0 "거대 전차 전쟁 §Y(2단계)§!"
 GIANT_TANK_WAR_DESC:0 "전쟁이 §Y[special_project_target.GetName]§!의 땅을 휩쓸고 있으며, 거대한 자동 전차들이 서로 싸우고 있습니다. 그들의 무기는 강인한 갑옷을 뚫기에는 너무 심하게 손상된 것으로 보입니다. §Y14 수송선§!을 보내어 이 끝없는 전쟁을 한 번에 끝낼 수 있습니다. §R임무 중 일부 병력이 사망할 수 있습니다!§!\n\n보상:\n£engineering£ §G(1500 - 2500)§! §Y그리고§! £minerals£ §G(1500 - 2000)§! \n\n(§SSpecial Project Extended Mod§!)"
 GOVERNOR_COUNCIL:0 "총독 회의 §G(1단계)§!"
 GOVERNOR_COUNCIL_DESC:0 "국가의 모든 총독으로 구성된 위원회가 §Y[Root.Capital.GetName]§!에서 조직되었습니다. 그들은 자원을 낭비하지 않고 보다 효율적으로 사용하기 위해 섹터를 적절히 다루는 방법에 대한 경험을 공유할 것입니다. 인구를 통제하는 방법도 논의될 것입니다.\n\n보상:\n£influence£ §G(50 - 100)§! \n\n(§SSpecial Project Extended Mod§!)"
 GRAVITY_MANIPULATION:0 "중력 조작 §G(1단계)§!"
 GRAVITY_MANIPULATION_DESC:0 "국가의 물리학자들이 식민지 내부의 중력 조작 능력을 개선하고, 거주 가능 행성에서 거대한 무중력장을 필요로 하는 새로운 실험 연구를 시작하기 위한 특수 프로젝트를 진행 중입니다. 그들은 프로젝트를 시작하기 위한 승인을 기다리고 있습니다.\n\n보상:\n§Y수정치:§! §G물리학 산출 증가§! \n\n(§S특수 프로젝트 확장 모드§!)"
 GREAT_CITY_PROJECT:0 "대도시 프로젝트 §Y(2단계)§!"
 GREAT_CITY_PROJECT_DESC:0 "§Y[special_project_target.GetName]§!의 건설자들이 모든 인구의 건물을 개발하여 도시를 개선하고 삶의 질을 높이며 도시의 중요성을 증가시키고자 합니다.\n\n보상:\n£influence£ §G(50 - 100)§! \n\n(§SSpecial Project Extended Mod§!)"
 GROUND_LIVING_DESASTER:0 "살아 있는 재앙 §M(4단계)§!"
 GROUND_LIVING_DESASTER_DESC:0 "고대 재앙이 §Y[special_project_target.GetName]§!에서 발생하고 있습니다. 고대의 거대한 괴물들이 이 행성에서 난동을 부리고 있으며, 그들은 너무 거대하고 강력해서 주변 날씨가 심각하게 교란된 것 같습니다. 이는 우리 군사력을 시험할 수 있는 놀라운 기회로, 이 괴물들을 처치하기 위해 최소한 §Y50 수송선§!을 보내야 합니다. §R임무 중 일부 병력이 사망할 수 있습니다!§!\n\n보상:\n§Y수치:§! §G군대 효율 증가§! §Y그리고§! £influence£ £unity£ £food£ §Y임무 진행 상황에 따라§! \n\n(§SSpecial Project Extended Mod§!)"
 HACKING_POSSIBILITY:0 "해킹 가능성 §Y(2단계)§!"
 HACKING_POSSIBILITY_DESC:0 "우주에서 떠다니는 거대한 컨테이너가 발견되었습니다. 측면과 장갑을 통해 내부의 전리품이 엄청나게 크다는 것을 확인할 수 있습니다. 그 컨테이너의 보안 시스템은 매우 고급이지만, 우리의 해커들은 이를 비활성화하고 거대한 상자를 열 수 있다고 주장합니다.\n\n보상:\n£minerals£ §G(2000)§! §YAND§! £energy£ §G(2000)§! §YAND§! £engineering£ §G(1250)§! \n\n(§SSpecial Project Extended Mod§!)"
 HIDDEN_TREASURE_SEARCH:0 "해적 보물 수색 §Y(2단계)§!"
 HIDDEN_TREASURE_SEARCH_DESC:0 "해적들을 여러 차례 체포한 후, 우리는 그들의 약탈물 중에서 매우 흥미로운 것을 발견했습니다. 그것은 §Y[special_project_target.GetName]§!를 중요한 장소로 표시한 일종의 지도입니다. 선원들의 심문 결과, 해적들이 약탈한 모든 것을 포함한 보물이 그곳에 미공개로 숨겨져 있으며, 철저히 경비되고 있다는 것이 확인되었습니다. 우리는 최소한 §Y8 수송선§!을 동원하여 그 은신처를 성공적으로 공격할 수 있을 것이나, 쉽지는 않을 것입니다. \n\n보상:\n£minerals£ §G(2500)§! §YAND§! £energy£ §G(2500)§! \n\n(§SSpecial Project Extended Mod§!)"
 HIVE_MINDED_HORDE:0 "군체 의식 무리 §Y(2단계)§!"
 HIVE_MINDED_HORDE_DESC:0 "수천 개의 개체로 이루어진 거대한 무리가 §Y[special_project_target.GetName]§!의 표면에 나타났습니다. 이러한 좀비들은 행성에서 퍼져나가 미래의 식민지 건설을 매우 어렵게 만들고 있습니다. 우리의 군사 전문가들은 침략을 저지하기 위해 최소한 §Y30 수송선§!을 행성에 보내고자 합니다. §R임무 수행 중 일부 병력이 사망할 수 있습니다!§!\n\n보상:\n£unity£ £society£ §Y임무 진행 상황에 따라§! \n\n(§SSpecial Project Extended Mod§!)"
 HORROR_IN_THE_DARK:0 "어둠 속의 공포 §R(3단계)§!"
 HORROR_IN_THE_DARK_DESC:0 "§Y[special_project_target.GetName]§!의 깊은 곳에서 거대한 괴물이 탐지된 것 같습니다. 우리의 전문가들에 따르면 그 생명체는 매우 위험하고 강력하며 최근에 깨어난 자로서 미래의 위협이 될 수 있습니다. 괴물을 처치하기 위해 최소한 §Y40 수송선§!을 보내야 합니다. §R임무 중 일부 병력이 사망할 수 있습니다!§!\n\n보상:\n£food£ §G(1500)§! §Y그리고§! £unity£ §G(3200)§! §Y그리고§! £society£ §G(3000 - 6000)§! \n\n(§SSpecial Project Extended Mod§!)"
 HOSTILE_FROM_WORMHOLE:0 "웜홀에서 온 적대 세력 §Y(2단계)§!"
 HOSTILE_FROM_WORMHOLE_DESC:0 "우리는 §Y[special_project_target.System.GetName]§! 시스템에서 시간적 웜홀을 감지했습니다. 많은 적대적인 함대가 알려지지 않은 시스템에서 나타나고 있으며, 우리의 스캐너는 더 많은 함대가 계속 올 것임을 확인했습니다. 우리는 그 인공 웜홀을 연구하고 닫기 위해 §Y2 과학선§!이 통과할 수 있는 길을 확보해야 합니다.\n\n보상:\n£minerals£ §G(1000 - 4000)§! §YAND§! £physics£ §G(2000 - 4500)§! \n\n(§SSpecial Project Extended Mod§!)"
 ICE_ASTEROID_EXPLORATION:0 "얼음 소행성 탐사 §G(1단계)§!"
 ICE_ASTEROID_EXPLORATION_DESC:0 "우리의 과학 팀 중 하나가 §Y[special_project_target.GetName]§!를 탐사하여 그 거대한 얼음 덩어리가 매우 단단하게 유지되도록 하는 물질을 더 잘 이해하고 싶어합니다. 그 과학 팀은 얼음 소행성에 대해 매우 열정적이지만, 안전하게 탐사를 시작하기 위해서는 우리의 §YScience Ship§! 중 하나가 필요합니다. 이 탐사는 우리에게도 유용할 수 있습니다.\n\n보상:\n£unity£ §G(50 - 250)§! §YAND§! £energy£ §G(100 - 300)§! §YOR§! £physics£ §G(200 - 500)§! \n\n(§SSpecial Project Extended Mod§!)"
 ICE_BIOME_EXPLORATION:0 "얼음 생물군계 탐사 §G(1단계)§!"
 ICE_BIOME_EXPLORATION_DESC:0 "아름다운 얼음 생태계가 §Y[special_project_target.GetName]§!에서 거의 완벽한 겨울 날씨와 함께 발견되었습니다. 지질학자 팀이 행성의 그 부분을 탐사하기 위해 우리의 §YScience Ship§! 중 하나를 사용하고자 합니다.\n\n보상:\n£physics£ §G(200 - 400)§! §YAND§! £society£ §G(400 - 600)§! \n\n(§SSpecial Project Extended Mod§!)"
 IMPROVED_DRY_DOCKS:0 "개선된 건선거 §R(3단계)§!"
 IMPROVED_DRY_DOCKS_DESC:0 "§Y[special_project_target.GetName]§!에서 조선소의 효율성을 개선하여 선박을 더 낮은 비용으로 생산하기 위한 공학 프로젝트가 시작되었습니다. 이들은 프로젝트를 시작하기 위한 승인을 기다리고 있습니다.\n\n보상:\n§Y수정치:§! §G선박 건조 비용 감소§! §Y그리고§! £engineering£ §G(1500 - 3000)§! \n\n(§SSpecial Project Extended Mod§!)"
 IMPROVE_AGRIAN_DISTRICT:0 "농업 지구 개선 §G(1단계)§!"
 IMPROVE_AGRIAN_DISTRICT_DESC:0 "우리 건설자들은 §Y[special_project_target.GetName]§!의 식량 재배가 개선될 수 있다고 주장합니다. 그들은 식량 생산을 향상시키기 위해 건설 프로젝트를 시작할 수 있는 허가를 요청하고 있습니다.\n\n보상:\n§Y수정치:§! §G추가 식량 생산량§! §Y그리고§! £food£ §G(100 - 200)§! \n\n(§SSpecial Project Extended Mod§!)"
 IMPROVE_CITY_DISTRICT:0 "도시 지구 개선 §G(1단계)§!"
 IMPROVE_CITY_DISTRICT_DESC:0 "우리 건설자들은 §Y[special_project_target.GetName]§!의 도시들이 개선될 수 있다고 주장합니다. 그들은 우리의 인구를 더 나은 조건으로 유지하기 위해 건설 프로젝트를 시작할 수 있는 허가를 요청하고 있습니다.\n\n보상:\n§Y수정치:§! §G추가 유니티 출력§! §Y그리고§! £unity£ §G(100 - 400)§! \n\n(§SSpecial Project Extended Mod§!)"
 IMPROVE_ENERGY_DISTRICT:0 "$IMPROVE_MINING_DISTRICT$"
 IMPROVE_ENERGY_DISTRICT_DESC:0 "우리 건설자들은 §Y[special_project_target.GetName]§!의 발전소를 개선할 수 있다고 주장합니다. 그들은 에너지 생산을 향상시키기 위해 건설 프로젝트를 시작할 수 있는 권한을 요청하고 있습니다.\n\n보상:\n§Y수정치:§! §G추가 에너지 출력§! §Y그리고§! £energy£ §G(100 - 300)§! \n\n(§SSpecial Project Extended Mod§!)"
 IMPROVE_MINING_DISTRICT:0 "산업 지구 개선 §G(1단계)§!"
 IMPROVE_MINING_DISTRICT_DESC:0 "우리 건설자들은 §Y[special_project_target.GetName]§!의 산업이 개선될 수 있다고 주장합니다. 그들은 광물 생산을 향상시키기 위해 건설 프로젝트를 시작할 수 있는 승인을 요청하고 있습니다.\n\n보상:\n§Y수정치:§! §G추가 광물 생산량§! §Y및§! £minerals£ §G(100 - 300)§! \n\n(§SSpecial Project Extended Mod§!)"
 INFERNAL_FOREST_STUDY:0 "지옥의 숲 §Y(2단계)§!"
 INFERNAL_FOREST_STUDY_DESC:0 "아마도 불가능할 것 같지만 §Y[special_project_target.GetName]§!에서 생명체가 발견되었습니다. 이 행성이 용암 행성임에도 불구하고 대부분이 흑요석으로 구성된 일종의 숲이 자생하고 있으며, 불에 타고 있음에도 불구하고 여전히 번식하고 생존하고 있습니다. 우리는 이들을 연구하기 위해 §YScience Ship§!을 보낼 수 있습니다.\n\n보상:\n£engineering£ §G(1000 - 2000)§! §YAND§! £society£ §G(1000 - 2000)§! \n\n(§SSpecial Project Extended Mod§!)"
 INFESTED_STATION:0 "감염된 기지 §Y(2단계)§!"
 INFESTED_STATION_DESC:0 "우리의 §Y[special_project_target.System.GetName]§! 시스템에 있는 한 정거장이 활동의 징후를 보이지 않아 순찰대에 의해 점검되었습니다. 끔찍한 소식입니다. 전체 승무원이 놀라운 속도로 번식하는 외계 종족에 의해 사망했습니다. 스캐너는 정거장 내부에 수천 개의 존재가 있음을 보여줍니다. 완전히 감염되었습니다. 우리의 사람들은 복수를 원하고 있으며, 우리도 동의합니다. §Y30 대수송선§!을 보내는 것으로 정거장을 정리하고 우리의 고인들의 작업을 회수하는 데 충분할 것입니다. §R임무 중 일부 병력이 사망할 수 있습니다!§!\n\n보상:\n£minerals£ £energy£ £unity£ £society£ §Y임무 진행 상황에 따라§! \n\n(§SSpecial Project Extended Mod§!)"
 LARGE_CARRIER_ASSAULT:0 "대형 호송대 습격 §R(3단계)§!"
 LARGE_CARRIER_ASSAULT_DESC:0 "우리는 §Y[special_project_target.System.GetName]§! 시스템에서 귀중한 물품을 운송하는 범죄자 세력의 대형 호송대를 발견했습니다. 그들을 납치하기 위해 최소 §Y16 Military Ships§!의 함대를 보낼 수 있습니다.\n\n보상:\n£energy£ §G(4000)§! §YAND§! £minerals£ §G(8000)§! \n\n(§SSpecial Project Extended Mod§!)"
 LAVA_FORTRESS_EXPLORATION:0 "용암 요새 §Y(2단계)§!"
 LAVA_FORTRESS_EXPLORATION_DESC:0 "§Y[special_project_target.GetName]§!에서 흥미로운 발견이 이루어졌습니다. 고대 문명이 그 용암 행성의 가혹한 생명 조건에 저항할 수 있었던 것으로 보입니다. 그들은 심지어 그 용암 요새와 같은 구조물을 건설하는 데 성공했습니다. 우리는 이러한 일이 어떻게 가능했는지 이해하기 위해 §YScience Ship§!을 보내야 합니다.\n\n보상:\n£engineering£ §G(2000 - 4000)§! \n\n(§SSpecial Project Extended Mod§!)"
 LEADERS_MEETING:0 "지도자 회의 §G(1단계)§!"
 LEADERS_MEETING_DESC:0 "우리 통치자가 국가의 모든 지도자와 회의를 조직했습니다. 목적은 그들이 국가에서 지나치게 많은 특권을 남용하는 것을 막고, 에너지 크레딧과 소비재 유지비를 줄이는 것입니다. 특히 국가가 발전하고 잠재적 경쟁자와 겨루기 위해 모든 자원이 필요한 상황에서는 더욱 중요합니다. 이제 회의를 시작하려면 우리의 승인만 있으면 됩니다.\n\n보상:\n§Y수정치:§! §G지도자 유지비 감소§! \n\n(§S특수 프로젝트 확장 모드§!)"
 LGATE_INVESTIGATION:0 "L-게이트 조사 §R(3단계)§!"
 LGATE_INVESTIGATION_DESC:0 "전문가 팀이 §Y[special_project_target.System.GetName]§! 항성계의 l-게이트를 조사하고 싶어합니다. 그들은 나나이트 기술로 구성된 비밀을 연구하고 발견할 수 있다고 주장합니다. 팀은 실험을 시작하기 위해 §YScience Ship§!이 필요합니다.\n\n보상:\n§G+1 L-Gate Insight Found§! §YAND§! £energy£ §G(1500 - 2500)§! §YAND§! £engineering£ §G(2000 - 4000)§! \n\n(§SSpecial Project Extended Mod§!)"
 LOCAL_INDUSTRY:0 "지역 산업 §G(1단계)§!"
 LOCAL_INDUSTRY_DESC:0 "§Y[special_project_target.GetName]§! 식민지에 있는 부유한 투자자가 행성의 전문가 직업이 합금과 소비재를 생산하는 데 도움이 될 거대한 지역 산업을 건설하고 싶어 합니다. 그는 프로젝트를 시작하고 모든 행정 절차를 처리하기 위해 우리의 도움이 필요합니다.\n\n보상:\n§Y매장지:§! §G추가 합금 및 소비재 생산§! \n\n(§S특수 프로젝트 확장 모드§!)"
 LOST_FE_TITAN:0 "잃어버린 몰락 타이탄 §M(4단계)§!"
 LOST_FE_TITAN_DESC:0 "추락한 잔존자 그룹이 §Y[special_project_target.System.GetName]§! 시스템에서 발견되었습니다. 하지만 가장 흥미로운 점은 그들 중에 수리 중인 장애인 추락 타이탄이 있다는 사실입니다. 이는 적 함대를 무력화하고 §Y2 건설선§!으로 추락 타이탄을 수리함으로써 우리가 그 군사 선박을 손에 넣을 수 있는 독특한 기회일 것입니다.\n\n보상:\n£navy_size£ §G추가 함선§! §YAND§! £engineering£ §G(6000)§! §YAND§! £energy£ §G(3000)§! \n\n(§SSpecial Project Extended Mod§!)"
 MACHINE_RAPID_CONSTRUCTION:0 "기계 건설 프로그램 §G(1단계)§!"
 MACHINE_RAPID_CONSTRUCTION_DESC:0 "우리는 기계 건설을 막 시작했지만 생산 속도가 전문가들에게는 너무 느립니다. 그들은 기계 생산 시설의 효율성을 높이기 위해 기술 분야의 일자리를 늘릴 것을 권장합니다.\n\n보상:\n§Y수치 조정:§! §G로봇 제작 속도 증가§! §Y그리고§! £engineering£ §G(300 - 800)§! \n\n(§SSpecial Project Extended Mod§!)"
 MACHINE_UPKEEP:0 "기계 유지비 §G(1단계)§!"
 MACHINE_UPKEEP_DESC:0 "로봇 제작을 시작한 이후, 우리 기술자들은 이 기계들을 대량 생산하면 장기적으로 전체 유지비에 상당한 비용이 들 것이라고 확인했습니다. 그들은 모든 로봇에 장착해 변형 없이 완벽하게 작동하는 데 필요한 에너지를 줄일 장치를 개발하고 싶어 합니다.\n\n보상:\n§Y수정치:§! §G로봇 POP 유지비 감소§! \n\n(§S특수 프로젝트 확장 모드§!)"
 MACHINE_WORLD_DETECTED:0 "기계 행성 감지 §R(3단계)§!"
 MACHINE_WORLD_DETECTED_DESC:0 "§Y[special_project_target.GetName]§!에서 신호가 나오고 있는 것으로 보입니다. 처음에는 단순한 거주 불가능 행성처럼 보였던 것이 표면을 찢어내기 시작하며 인공 표면을 드러냈습니다. 이제 그곳에 숨겨진 기계 행성이 있음을 확인할 수 있습니다. 문제는 누가 이 기계 행성을 만들었고, 왜 숨겨 두었느냐는 것입니다. 우리가 확인할 수 있는 것은 건물들이 일종의 원형에 불과해 보인다는 사실뿐입니다. 이 행성을 연구하려면 §Y과학선§!을 보내야 합니다.\n\n보상:\n£§G행성이 기계 행성으로 변함§! \n\n(§S특수 프로젝트 확장 모드§!)"
 MAGNETIC_ACTIVITY_STUDY:0 "자기 활동 §Y(2단계)§!"
 MAGNETIC_ACTIVITY_STUDY_DESC:0 "§Y[special_project_target.GetName]§!에서 높은 자기 활동이 감지되었습니다. 이 현상은 일시적이므로 §Y과학선§!을 보내어 그 발생 원인을 이해하는 것이 유용할 수 있습니다.\n\n보상:\n£physics£ §G(1500 - 2500)§! \n\n(§SSpecial Project Extended Mod§!)"
 MASSIVE_WAR_ONGOING:0 "대규모 전쟁 진행 중 §R(3단계)§!"
 MASSIVE_WAR_ONGOING_DESC:0 "우리의 군사력 중 일부가 훈련 중 §Y[special_project_target.GetName]§! 갑자기 알 수 없는 군사 세력의 공격을 받았습니다. 그들이 행성에 가져온 장비는 대부분 훈련 도구로 구성되어 있어 패배하는 것은 시간 문제입니다. 그들을 구하고 적을 무찌르기 위해 최소한 §Y45 수송선§!을 보내야 합니다. §R임무 중 일부 병력이 사망할 수 있습니다!§!\n\n보상:\n£influence£ £energy£ £unity£ £minerals£ §Y임무 진행 상황에 따라§! \n\n(§SSpecial Project Extended Mod§!)"
 MEDIUM_CARRIER_ASSAULT:0 "중형 호송대 습격 §Y(2단계)§!"
 MEDIUM_CARRIER_ASSAULT_DESC:0 "우리는 §Y[special_project_target.System.GetName]§! 시스템에서 귀중한 물품을 운송 중인 범죄자 세력의 중형 호송대를 발견했습니다. 그들을 납치하기 위해 최소 §Y10 Military Ships§!의 함대를 보낼 수 있습니다.\n\n보상:\n£energy£ §G(2000)§! §YAND§! £minerals£ §G(4000)§! \n\n(§SSpecial Project Extended Mod§!)"
 MEDIUM_DEBRIS_ANALYZE:0 "중형 잔해 분석 §G(1단계)§!"
 MEDIUM_DEBRIS_ANALYZE_DESC:0 "우리의 스캐너가 §Y[special_project_target.System.GetName]§! 시스템에서 잔해의 중간 그룹을 탐지했습니다. 이 잔해가 어디에서 왔는지 예측하는 것은 불가능하며, 이를 연구하기 위해서는 §YScience Ship§!이 유용할 것입니다.\n\n보상:\n£physics£ §G(400 - 800)§! §YAND§! £engineering£ §G(400 - 800)§! §YAND§! £minerals£ §G(250)§! \n\n(§SSpecial Project Extended Mod§!)"
 MICROSCOPIC_LIFE_STUDY:0 "미생물 연구 §G(1단계)§!"
 MICROSCOPIC_LIFE_STUDY_DESC:0 "생물학자 그룹이 §Y[special_project_target.GetName]§!에 존재하는 미세 생물을 연구하고자 합니다. 그들은 최상의 조건에서 관찰을 시작하기 위해 우리의 §YScience Ship§! 중 하나가 필요합니다.\n\n보상:\n£society£ §G(300 - 700)§! \n\n(§SSpecial Project Extended Mod§!)"
 MICRO_FOREST_STUDY:0 "초소형 숲 연구 §G(1단계)§!"
 MICRO_FOREST_STUDY_DESC:0 "우리 탐사대는 §Y[special_project_target.GetName]§!에서 놀라운 것을 발견했습니다. 가장 높은 나무가 10센티미터를 넘지 않지만 수 마일에 걸쳐 퍼져 있는 숲입니다. 이 안에는 전체 미세 생태계가 살아 있는 것으로 보이며, 이를 연구하기 위해 §YScience Ship§!와 함께 전문가 팀을 보낼 수 있습니다.\n\n보상:\n£society£ §G(300 - 800)§! §YAND§! £food£ §G(75)§! \n\n(§SSpecial Project Extended Mod§!)"
 MILITARY_EXERCICE:0 "군사 구조 훈련 §G(1단계)§!"
 MILITARY_EXERCICE_DESC:0 "군사 구조 훈련이 §Y[special_project_target.GetName]§!에서 조직되었습니다. 그러나 후보자의 과잉으로 인해 조직자들은 충분한 수송선이 없다는 것을 알게 되었고, 진행을 위해 §Y3 Transport Ships§!의 요청을 하고 있습니다.\n\n보상:\n£unity£ §G(50 - 500)§! \n\n(§SSpecial Project Extended Mod§!)"
 MILITARY_SERVICE:0 "$SPECIES_RIGHT_MILITARY_SERVICE$ §G(1단계)§!"
 MILITARY_SERVICE_DESC:0 "장관은 우리의 권리를 방어하기 위해 어디선가 필요할 경우를 대비하여 새로운 군대를 형성하는 데 도움을 주기 위해 일정 기간 동안 군 복무를 부과하고자 합니다.\n\n보상:\n§Y수치:§! §G군대 건설 속도 증가§! §Y그리고§! £society£ §G(200 - 500)§! \n\n(§SSpecial Project Extended Mod§!)"
 MILITARY_TACTICS:0 "군사 전술 §G(1단계)§!"
 MILITARY_TACTICS_DESC:0 "국가의 모든 주지사들이 §Y[Root.Capital.GetName]§!에서 모였습니다. 그들은 자원을 낭비하지 않고 더 효율적으로 사용하기 위해 섹터를 적절히 다루는 방법에 대한 경험을 공유할 것입니다. 인구를 통제하는 방법도 포함됩니다.\n\n보상:\n£unity£ §G(200 - 2000)§! \n\n(§SSpecial Project Extended Mod§!)"
 MINERALS_OVERFLOW:0 "광물 과잉 §G(1단계)§!"
 MINERALS_OVERFLOW_DESC:0 "터널 시스템에서 매우 밀집된 양의 광물이 발견되었습니다. §Y[special_project_target.GetName]§!를 위해 §Y과학선§!의 도움을 받아 회수 팀을 보낼 수 있습니다.\n\n보상:\n£minerals£ §G(300 - 700)§! \n\n(§SSpecial Project Extended Mod§!)"
 MINERAL_FAST_GROWTH:0 "광물 급속 성장 §R(3단계)§!"
 MINERAL_FAST_GROWTH_DESC:0 "§Y[special_project_target.GetName]§!에서 매우 이례적인 일이 벌어지고 있습니다. 우리 산업이 100% 효율로 가동 중임에도 행성의 광물량이 천천히 감소하는 것이 아니라 오히려 증가하고 있습니다. 이 기회를 이용해 이 광물 덩어리를 처리하고 매우 많은 양의 광물을 생산할 수 있는 거대 채굴 시설을 건설할 수 있습니다.\n\n보상:\n§Y수정치:§! §G행성 광물 고정 산출§! \n\n(§S특수 프로젝트 확장 모드§!)"
 MINING_DRONE_STATION:0 "고대 채굴 기지 §G(1단계)§!"
 MINING_DRONE_STATION_DESC:0 "우리 정찰대는 §Y[special_project_target.System.GetName]§! 시스템에 고대 드론이 보호하는 고대 채굴 기지를 발견했습니다. 우리는 그 화물을 열기 위해 호위함과 함께 §YConstruction Ship§!을 보내야 합니다.\n\n보상:\n£minerals£ §G(2000)§! \n\n(§SSpecial Project Extended Mod§!)"
 MINING_UPGRATE_PROJECT:0 "채굴 업그레이드 §Y(2단계)§!"
 MINING_UPGRATE_PROJECT_DESC:0 "§Y[special_project_target.GetName]§!에서 우리의 건설자 중 한 명이 광산 기지의 생산성을 향상시켜 단기간에 더 많은 광물을 생산할 수 있는 가능성을 원하고 있습니다.\n\n보상:\n£minerals£ §G(1000 - 1600)§! \n\n(§SSpecial Project Extended Mod§!)"
 MOLTEN_WORLD_EXPLORATION:0 "용암 행성 탐사 §G(1단계)§!"
 MOLTEN_WORLD_EXPLORATION_DESC:0 "우리의 과학 팀 중 하나가 용융 행성에서 발생하는 현상에 대한 지식을 향상시키기 위해 §Y[special_project_target.GetName]§!을 탐사하고자 합니다. 그들은 탐사를 제대로 수행하기 위해 우리의 §YScience Ship§! 중 하나가 필요할 것입니다. 이 탐사는 우리에게도 유용할 수 있습니다.\n\n보상:\n£unity£ §G(75 - 150)§! §YAND§! £minerals£ §G(200 - 400)§! §YOR§! £engineering£ §G(300 - 400)§! \n\n(§SSpecial Project Extended Mod§!)"
 MONSTERS_FROM_DEEPTH:0 "깊은 곳에서 온 괴물 §Y(2단계)§!"
 MONSTERS_FROM_DEEPTH_DESC:0 "§Y[special_project_target.GetName]§! 우리 국민들은 두려워하고 있습니다. 처음에는 소문으로 여겨졌던 것이 사실로 드러났습니다. 행성의 깊은 곳에서 오는 괴물들이 무작위로 사람들을 죽이고 있습니다. 이런 일은 용납될 수 없습니다. 우리는 이 괴물들을 한 번에 처리해야 합니다. 지역 경찰은 강인한 힘이 부족하지만, §Y20 대수송선§!이 있다면 그들이 우리 국민을 공격한 것이 실수였음을 깨달을 것입니다. §R임무 수행 중 일부 부대가 사망할 수 있습니다!§!\n\n보상:\n£food£ £unity£ £society£ §Y임무 진행 상황에 따라§! \n\n(§SSpecial Project Extended Mod§!)"
 MONSTER_FOSSIL_STUDY:0 "괴물 화석 연구 §G(1단계)§!"
 MONSTER_FOSSIL_STUDY_DESC:0 "우리는 §Y[special_project_target.GetName]§!에서 고대 생물의 매우 큰 화석을 발견했습니다. §Y과학선§!과 전문가 팀의 도움으로 그 위치에 고고학 유적지를 만들 수 있습니다.\n\n보상:\n£society£ §G(500 - 1000)§! \n\n(§SSpecial Project Extended Mod§!)"
 MOON_PALACE_DISCOVERY:0 "달의 궁전 발견 §Y(2단계)§!"
 MOON_PALACE_DISCOVERY_DESC:0 "§Y[special_project_target.GetName]§!에서 흥미로운 발견이 이루어졌습니다. 고대 문명이 달을 위해 헌정하여 '달 궁전'이라 불리는 전체 궁전을 건설한 것으로 보입니다. 우리는 §Y과학선§!의 도움으로 궁전을 탐험할 수 있습니다.\n\n보상:\n£physics£ §G(1000 - 2000)§! §Y그리고§! £unity£ §G(300 - 800)§! \n\n(§SSpecial Project Extended Mod§!)"
 MORE_FAUNA:0 "외계 동물군 도입 §G(1단계)§!"
 MORE_FAUNA_DESC:0 "우리 생물학자들이 §Y[special_project_target.GetName]§!에서 특정 문제를 발견했습니다. 행성에 존재하는 동물군의 수가 현지 식물군의 안정성을 유지하고 돕기에는 명백히 너무 적은 것으로 보입니다. 그들은 앞으로 몇 세기 안에 아무 조치도 취하지 않으면 번식을 도와줄 존재가 없어 식물군 대부분이 죽을 것이라고 주장합니다. 자연의 균형을 맞추기 위해 다른 식민지의 동물군을 이 행성에 들여올 수 있습니다.\n\n보상:\n§Y매장지:§! §G추가 외계 동물원 수용량§! \n\n(§S특수 프로젝트 확장 모드§!)"
 MULTIPLE_MOONS:0 "여러 위성 §G(1단계)§!"
 MULTIPLE_MOONS_DESC:0 "우리의 스캐너가 §Y[special_project_target.GetName]§! 주위를 도는 위성들의 궤도 계산을 마쳤으며, 다음 천 년 안에 충돌할 가능성이 있음을 가정할 수 있습니다. 우리는 §YScience Ship§!을 보내어 더 깊은 조사를 하고 미래에 이러한 대재앙을 피할 수 있는 방법을 찾을 가능성이 있습니다.\n\n보상:\n£physics£ §G(200 - 500)§! §YAND§! £minerals£ §G(100 - 200)§! \n\n(§SSpecial Project Extended Mod§!)"
 NATIONAL_MARKET:0 "국가 시장 §G(1단계)§!"
 NATIONAL_MARKET_DESC:0 "드디어 우리는 대규모 국가 시장을 시작할 수 있을 만큼 충분한 자원과 이익 수준에 도달했습니다. 이는 국경 안에서 오가는 무역 가치를 크게 증가시킬 것입니다. 이 특수 프로젝트는 우리 국경 안의 모든 식민지와 사용 가능한 항성기지에 많은 슈퍼마켓을 건설하는 것으로 구성됩니다.\n\n보상:\n§Y수정치:§! §G무역 가치 증가§! \n\n(§S특수 프로젝트 확장 모드§!)"
 NATIVE_INTERACTION:0 "토착민 상호작용 §Y(2단계)§!"
 NATIVE_INTERACTION_DESC:0 "토착민 그룹이 §Y[special_project_target.GetName]§!에서 오랫동안 연구되었습니다. 그들은 오래전에 우리를 알아차렸고, 긴 숙고 끝에 총독이 토착민과의 소통을 허용했습니다.\n\n보상:\n£society£ §G(1000 - 2200)§! \n\n(§SSpecial Project Extended Mod§!)"
 NAVY_WORMHOLE_TRAINING:0 "해군 웜홀 훈련 §G(1단계)§!"
 NAVY_WORMHOLE_TRAINING_DESC:0 "자연 발생한 웜홀인 §Y[special_project_target.System.GetName]§! 시스템은 우리의 해군 장교들의 관심을 끌었습니다. 그들은 최소한의 피해로 웜홀에서 나오는 적을 intercept하는 방법에 대한 시뮬레이션 훈련을 시작하기 위해 인근에 함대를 보내고 싶어합니다. 그들은 최소 §Y8 군함§!을 가지고 작전을 시작하기 위한 초록 불을 기다리고 있습니다.\n\n보상:\n£unity£ §G(200 - 500)§! \n\n(§SSpecial Project Extended Mod§!)"
 NEUTRON_MAGNETIC_FIELD:0 "중성자 자기장 §Y(2단계)§!"
 NEUTRON_MAGNETIC_FIELD_DESC:0 "§Y[special_project_target.GetName]§!에서의 자기 활동이 급격히 증가한 것으로 보입니다. 우리의 물리학자들은 이 단계가 우리가 중성자 물질을 수집할 수 있는 기회가 될 수 있다고 주장합니다. 즉시 §YScience Ship§!을 배치하여 중성자 물질이 형성될 출처를 찾아야 합니다.\n\n보상:\n§G중성자 물질 증가 출력§! §YAND§! £minerals£ §G(500 - 750)§! §YAND§! £engineering£ §G(800 - 1200)§! \n\n(§SSpecial Project Extended Mod§!)"
 NEWS_INTERVIEW:0 "뉴스 인터뷰 §G(1단계)§!"
 NEWS_INTERVIEW_DESC:0 "우리의 우주 영토에서 많은 기자들이 §Y[Root.Capital.GetName]§!에 모여 미래에 국가를 어떻게 관리할 것인지에 대한 인터뷰를 시작했습니다.\n\n보상:\n£unity£ §G(10 - 200)§! §YAND§! £society£ §G(300 - 800)§! \n\n(§SSpecial Project Extended Mod§!)"
 NUCLEAR_TEST:0 "핵실험 §G(1단계)§!"
 NUCLEAR_TEST_DESC:0 "우리의 군사 개발 센터 중 하나가 §Y[special_project_target.GetName]§!에서 새로운 핵미사일을 시험하고 싶어합니다. 그들은 이미 미사일을 위한 수송 수단을 갖추고 있지만, 현장 팀이 현상을 매우 가까운 거리에서 관찰할 수 있도록 §YScience Ship§!이 필요합니다.\n\n보상:\n£engineering£ §G(500 - 1000)§! \n\n(§SSpecial Project Extended Mod§!)"
 OCEAN_LANDING_TEST:0 "해양 행성 착륙 시험 §G(1단계)§!"
 OCEAN_LANDING_TEST_DESC:0 "민간 기업이 식민지 선박을 개발하고 있으며, 해양 행성에서 그들의 선박을 테스트하기 위해 우리에게 비용을 지불하고자 합니다. 그들은 식민지가 없는 거주 가능한 행성인 §Y[special_project_target.GetName]§!를 테스트에 적합한 행성으로 선택했습니다. 착륙 훈련 프로토콜을 시작하기 위해 §Y식민지 선박§!이 필요합니다. 우리는 그 기회를 이용해 몇몇 공학자와 과학자를 그들의 승무원과 함께 보낼 것입니다. 그들은 착륙하는 동안 이 세계에 대한 유용한 관찰을 할 것입니다.\n\n보상:\n£energy£ §G(200 - 500)§! §Y그리고§! £society£ §G(200 - 400)§! \n\n(§SSpecial Project Extended Mod§!)"
 OLD_TRANSPORT_RECOVER:0 "수송선 화물 회수 §G(1단계)§!"
 OLD_TRANSPORT_RECOVER_DESC:0 "농업 산업이 우리에게 연락을 해왔습니다. 그들은 그들의 수송선 중 하나가 §Y[special_project_target.System.GetName]§! 항성계에서 발견되었다고 말했습니다. 이 호송선은 해적에게 공격받았지만 긴급 초공간 항법을 통해 무사히 통과했으나, 그들의 산업과의 연락이 끊기고 우주에서 표류하게 되었습니다. 그들은 배급할 음식이 plentiful하다고 하며, 우리를 도와준 대가로 공물을 주겠다고 합니다. 문제를 해결하기 위해서는 §YConstruction Ship§! 하나면 충분할 것입니다.\n\n보상:\n£unity£ §G(100)§! §Y그리고§! £food£ §G(100 - 400)§! \n\n(§SSpecial Project Extended Mod§!)"
 ORANGE_STAR_OBSERVATION:0 "주황색 항성 관측 §G(1단계)§!"
 ORANGE_STAR_OBSERVATION_DESC:0 "한 팀의 과학자들이 K형 주황색 항성을 관찰하기 위해 우리의 §YScience Ship§! 중 하나를 빌리고 싶어합니다. 그들은 자신들이 설정한 복잡한 기준을 모두 따르는 별 중 하나인 §Y[special_project_target.GetName]§!를 관찰하기로 결정했습니다.\n\n보상:\n£engineering£ §G(500 - 1000)§! \n\n(§SSpecial Project Extended Mod§!)"
 OUTPOST_SEARCHING:0 "전초기지 강습 §Y(2단계)§!"
 OUTPOST_SEARCHING_DESC:0 "우리의 스파이들은 우리 영토에서 수배 중인 대부분의 범죄자들이 §Y[special_project_target.GetName]§!의 고대 버려진 전초 기지 안에 함께 숨어 있다는 것을 확인했습니다. 우리는 그들을 한 번에 모두 체포할 수 있는 기회를 가지고 있으며, 경찰은 그들을 진압하기 위해 최소 §Y15 수송선§!을 보내는 것을 권장합니다. 큰 손실이 예상됩니다.\n\n보상:\n£physics£ §G(1000 - 2000)§! §Y그리고§! £energy£ §G(1000)§! \n\n(§SSpecial Project Extended Mod§!)"
 PALACE_PROJECT:0 "영향력의 궁전 §Y(2단계)§!"
 PALACE_PROJECT_DESC:0 "우리 국민을 같은 방향으로 유지하려면 그들이 자신이 어디에 속해 있는지 기억하게 만들 무언가를 건설해야 합니다. 여기서 우리 설계자 중 하나가 '영향력의 궁전'을 만들었습니다. 그 독특한 설계는 우리 주민들이 우리의 윤리관에서 등을 돌리지 않도록 고취할 것입니다.\n\n보상:\n§Y수정치:§! §G정부 윤리관 선호도 증가§! \n\n(§S특수 프로젝트 확장 모드§!)"
 PARAMILITARIST_GROUP:0 "준군사주의 파벌 §Y(2단계)§!"
 PARAMILITARIST_GROUP_DESC:0 "군국주의 세력이 §Y[special_project_target.GetName]§!에 기지를 세웠습니다. 그들이 무엇을 할지는 아직 알 수 없지만, 그들의 순찰대가 우리의 정찰대를 발견하자마자 사격을 했습니다. 이는 그들이 우리에게 적대적임을 의미합니다. 그들이 반격하기 전에 §Y20 수송선§!으로 그들을 공격해야 합니다. §R임무 중 일부 병력이 사망할 수 있습니다!§!\n\n보상:\n£minerals£ §G(2000)§! §Y그리고§! £energy£ §G(3500)§! \n\n(§SSpecial Project Extended Mod§!)"
 PEAK_COLONY:0 "절정의 식민지 §G(1단계)§!"
 PEAK_COLONY_DESC:0 "§Y[special_project_target.GetName]§!이 최고의 식민지 상을 받았습니다. 범죄가 없고 안정도가 높으며 무료 편의 시설이 눈에 띄게 존재하는 덕분에, 사람들은 이 식민지가 장차 매우 중요해져 수도에 맞먹는 위상에 도달할 수도 있다고 주장합니다. 이 식민지의 발전을 도울 기회가 있으며, 그 개선은 미래에 좋은 효과를 가져올 수 있습니다.\n\n보상:\n§Y수정치:§! §G추가 영향력 산출§! \n\n(§S특수 프로젝트 확장 모드§!)"
 PERFECT_NIGHT:0 "완벽한 밤 §G(1단계)§!"
 PERFECT_NIGHT_DESC:0 "§Y[special_project_target.GetName]§!에서 특별한 행사가 시작되었습니다. 우리 국민의 예술가 대부분이 매우 드문 현상인 '완벽한 밤'을 재현하기 위해 식민지에 모인 것으로 보입니다. 이런 사건은 행성에서 거대한 축제의 조직을 촉발했으며, 행성의 편의 시설을 크게 증가시킬 수 있습니다.\n\n보상:\n§Y수정치:§! §G추가 편의 산출§! \n\n(§S특수 프로젝트 확장 모드§!)"
 PHYSICIST_CONGRESS:0 "물리학자 회의 §G(1단계)§!"
 PHYSICIST_CONGRESS_DESC:0 "물리학자 회의가 §Y[Root.Capital.GetName]§!에서 조직되고 있습니다. 그들은 국가의 물리학 기술 향상을 위한 주장을 하기 위해 모였습니다.\n\n보상:\n§Y수정치:§! §G물리학 연구 속도 증가§! §Y그리고§! £physics£ §G(1000 - 1500)§! \n\n(§SSpecial Project Extended Mod§!)"
 PHYSICS_REVOLUTION:0 "물리학 혁명 §Y(2단계)§!"
 PHYSICS_REVOLUTION_DESC:0 "우리는 물리학 분야의 모든 발전을 통해 우리 물리학자들이 그 전문 분야의 연구를 가속화하고 보호막을 개선하기 위해 거대한 도약을 이루고자 합니다.\n\n보상:\n§G개선된 보호막§! §Y그리고§! £physics£ §G(500 - 1000)§! \n\n(§SSpecial Project Extended Mod§!)"
 PIERCE_THE_BLOCUS:0 "봉쇄 돌파 §Y(2단계)§!"
 PIERCE_THE_BLOCUS_DESC:0 "§Y[special_project_target.GetName]§!에서 일부 군사 세력이 행성의 관광객 그룹을 공격했습니다. 함대가 행성 주위에 봉쇄를 형성하고 있어 추가 지원이 오거나 구조자가 탈출하는 것을 피하고 있는 것으로 보입니다. 우리는 우주와 육지의 적을 처리하기 위해 최소한 §Y14 수송선§!을 호위하는 함대를 보내야 합니다. §R임무 중 일부 병력이 사망할 수 있습니다!§!\n\n보상:\n£energy£ §G(1250 - 2500)§! §Y그리고§! £influence£ §G(35 - 75)§! \n\n(§SSpecial Project Extended Mod§!)"
 PLANETARY_SPACE_ELEVATOR:0 "우주 엘리베이터 §R(3단계)§!"
 PLANETARY_SPACE_ELEVATOR_DESC:0 "§Y[special_project_target.GetName]§!에서 사람들의 수송을 돕기 위해 거대한 행성 우주 엘리베이터를 건설하는 프로젝트가 진행되었습니다. 이 대규모 프로젝트는 사람들의 이주 매력을 변화시키고 인구 성장에 도움을 줄 수 있습니다.\n\n보상:\n§Y수정:§! §G행성 성장 속도 및 이주 증가§! §Y그리고§! £engineering£ §G(2000 - 4000)§! \n\n(§SSpecial Project Extended Mod§!)"
 PLANET_ASTEROID_BELT:0 "행성 소행성대 §G(1단계)§!"
 PLANET_ASTEROID_BELT_DESC:0 "§Y[special_project_target.GetName]§!의 소행성대에 대한 추가 스캔을 수행한 결과, 행성의 띠가 매우 흥미로운 무언가를 숨기고 있으며, 이는 추가 조사가 필요하다는 것을 우리의 탐사선이 확인할 수 있었습니다. 전문가 팀과 함께 띠를 점검하기 위해 §Y과학선§!을 보내야 합니다.\n\n보상:\n£alloys£ §G(20 - 50)§! §Y그리고§! £minerals£ §G(200 - 400)§! \n\n(§SSpecial Project Extended Mod§!)"
 PLANET_ENERGY_EXTRACTION:0 "행성 가스 추출 §G(1단계)§!"
 PLANET_ENERGY_EXTRACTION_DESC:0 "우리의 공학자 중 일부가 §Y[special_project_target.GetName]§! 표면 깊숙이 숨겨진 가스를 더 많이 추출하기 위한 계획을 구상하는 데 성공했습니다. §Y건설선§!의 도움으로 이 프로젝트를 시작하여 행성의 에너지 출력을 증가시킬 수 있습니다.\n\n보상:\n£energy£ §G출력 증가§! \n\n(§SSpecial Project Extended Mod§!)"
 PLANET_MINERAL_EXTRACTION:0 "행성 광물 추출 §G(1단계)§!"
 PLANET_MINERAL_EXTRACTION_DESC:0 "우리의 공학자들 중 일부가 §Y[special_project_target.GetName]§!의 표면 깊숙이 숨겨진 더 많은 광물을 추출하기 위한 계획을 구상하는 데 성공했습니다. §Y건설선§!의 도움으로 이 프로젝트를 시작하여 행성의 광물 생산량을 증가시킬 수 있습니다.\n\n보상:\n£minerals£ §G증가된 생산량§! \n\n(§SSpecial Project Extended Mod§!)"
 PLANET_SURFACE:0 "행성 표면 스캔 §G(1단계)§!"
 PLANET_SURFACE_DESC:0 "우리 국민은 행성 §Y[special_project_target.GetName]§!에 대한 추가 조사를 원합니다. 이를 통해 이 행성이 우리 국가의 미래 식민지로 사용될 수 있는지 알아보려 합니다. 우리는 이 임무를 위해 §Y과학선§!을 보낼 수 있으며, 첫 번째 조사에서 놓친 새로운 정보가 발견될 수 있습니다.\n\n보상:\n£physics£ £society£ §G(300 - 600)§! \n\n(§SSpecial Project Extended Mod§!)"
 PLASMOID_LIFE_STUDY:0 "플라스모이드 생명 연구 §G(1단계)§!"
 PLASMOID_LIFE_STUDY_DESC:0 "§Y[special_project_target.GetName]§!는 항성이지만, 그 태양에서 생명체가 플라스모이드 형태로 나타나는 데 성공했습니다. 태양이 선체를 즉시 녹일 것이기 때문에 우리는 이러한 플라스모이드 생명체를 가까이에서 연구하는 것은 불가능합니다. 그러나 우리는 §Y과학선§!을 이용해 항성을 스캔하여 그 위에 있는 플라스모이드 생명체의 개수를 대략적으로 추정할 수 있습니다.\n\n보상:\n£society£ §G(200 - 500)§! §Y그리고§! £physics£ §G(300 - 600)§! \n\n(§SSpecial Project Extended Mod§!)"
 PRECURSOR_CITY_DISCOVERY:0 "선구자 도시 발견 §Y(2단계)§!"
 PRECURSOR_CITY_DISCOVERY_DESC:0 "고대 도시가 §Y[special_project_target.GetName]§!에서 발견되었습니다. 우리의 전문가들은 이러한 건물들이 단순한 고대 외계 문명에 의해 건설된 것이 아니라, 기술적으로 고도로 발전한 고대 선조들에 의해 지어졌다고 확인했습니다. 우리는 도시를 탐험하기 위해 §YScience Ship§!을 보내야 합니다.\n\n보상:\n£society£ §G(1500 - 2500)§! §YAND§! £unity£ §G(500 - 1000)§! \n\n(§SSpecial Project Extended Mod§!)"
 PROBE_RETRIEVING:0 "탐사정 회수 §G(1단계)§!"
 PROBE_RETRIEVING_DESC:0 "우리는 §Y[special_project_target.System.GetName]§! 시스템에서 고대 탐사선을 발견했습니다. 그 탐사선의 설계는 매우 오래된 것으로 보이지만, 그 기원이 우리나라에서 비롯된 것임을 확인할 수 있습니다. 일부 역사적 기록에 따르면, 우리는 수세기 전에 우주 시대에 도달하기 전에 그 장치를 공허에 발사했으나 기계와의 연락을 잃었습니다. 이제 우리는 기계를 연구하여 흥미로운 데이터를 찾고 나머지 자재를 §YScience Ship§!으로 회수할 기회를 갖게 되었습니다.\n\n보상:\n£physics£ £society£ £engineering£ §G(400)§! §YAND§! £minerals£ §G(100)§! \n\n(§SSpecial Project Extended Mod§!)"
 PRODUCTIVITY_CENTER:0 "생산성 센터 §Y(2단계)§!"
 PRODUCTIVITY_CENTER_DESC:0 "우리 발명가 중 하나가 국가의 모든 시민이 모든 작업에서 도움을 받아 결국 더 나은 산출을 낼 수 있게 하는 흥미로운 도구를 만들었습니다. 그는 프로젝트를 시작하기 위한 승인을 요청하고 있습니다.\n\n보상:\n§Y수정치:§! §G자원 생산 증가§! \n\n(§S특수 프로젝트 확장 모드§!)"
 PSIONIC_TRAINING:0 "사이오닉 훈련 §R(3단계)§!"
 PSIONIC_TRAINING_DESC:0 "우리는 우리의 사이오닉 능력의 잠재력을 이해하는 시작 단계에 있습니다. 우리 인구의 효율성을 높이기 위해 전국적으로 글로벌 훈련이 조직되었습니다.\n\n보상:\n§Y수치:§! §G삶의 질 향상§! §Y그리고§! £society£ §G(3500 - 5500)§! §Y그리고§! £energy£ §G(1000 - 2500)§! \n\n(§SSpecial Project Extended Mod§!)"
 PULSAR_CLOCK_CHANGED:0 "펄서 시계 활동 §R(3단계)§!"
 PULSAR_CLOCK_CHANGED_DESC:0 "§Y[special_project_target.GetName]§!가 '펄서 시계' 단계에 들어선 것으로 보입니다. 펄서는 시계처럼 매초 일종의 충격을 전송하는 것 같습니다. 동시에, 펄서의 외관이 연한 파란색에서 분홍색으로 변하여 매우 먼 거리에서도 더 잘 구별할 수 있게 되었습니다. 우리는 이 현상을 연구하기 위해 §Y과학선§!을 보낼 수 있습니다.\n\n보상:\n£engineering£ §G산출량 증가§! §Y그리고§! £engineering£ §G(2000 - 4000)§! \n\n(§SSpecial Project Extended Mod§!)"
 PULSAR_PHYSICS_FORCE:0 "펄서 물리 왜곡 §Y(2단계)§!"
 PULSAR_PHYSICS_FORCE_DESC:0 "우리는 §Y[special_project_target.GetName]§!에서 이상한 행동을 감지했습니다. 펄서가 거대한 불꽃처럼 폭발할 것 같습니다. 우리는 좋은 관측을 위해 그 근처에 §YScience Ship§!을 배치해야 합니다.\n\n보상:\n£physics£ §G(1000 - 2000)§! §YAND§! £engineering£ §G(1000 - 2000)§! \n\n(§SSpecial Project Extended Mod§!)"
 PURPLE_STAR_REFLECTION:0 "보라색 항성 반사 §G(1단계)§!"
 PURPLE_STAR_REFLECTION_DESC:0 "우리의 스캐너는 §Y[special_project_target.GetName]§!에서 발생하는 이상한 태양 활동을 감지했습니다. 보라색 별이 매우 짧은 시간 동안 '반사 단계'에 들어설 것으로 보이며, 그 시간 동안 은하의 가장 아름다운 사진을 얻을 수 있지만, 이러한 행동은 §YScience Ship§!이 별을 관찰하고 적절한 순간에 사진을 찍기 위해 충분히 가까이 있어야만 가능합니다.\n\n보상:\n£influence£ §G(25 - 50)§! \n\n(§SSpecial Project Extended Mod§!)"
 RADAR_UPGRADE:0 "레이더 업그레이드 §G(1단계)§!"
 RADAR_UPGRADE_DESC:0 "우리 기술자들이 함선과 식민지에 있는 레이더의 범위를 일시적으로 늘리는 장치를 개발하고 있습니다. 그들은 우리가 아무리 조심해도 지나치지 않으며, 미래의 위협이 자라고 임계 규모에 도달하기 전에 막기 위해 주변에서 일어나는 일을 항상 주시해야 한다고 주장합니다. 그들은 특수 프로젝트를 시작하기 위한 승인을 기다리고 있습니다.\n\n보상:\n§Y수정치:§! §G레이더 범위 증가§! \n\n(§S특수 프로젝트 확장 모드§!)"
 REBEL_BATTLES:0 "반란 전투 §Y(2단계)§!"
 REBEL_BATTLES_DESC:0 "대규모 반란군이 §Y[special_project_target.GetName]§!에서 발견되었습니다. 그들은 지역 보안군에 대항하여 싸우기 시작했습니다. 상황을 통제하기 위해서는 최소 §Y14 수송선§!을 동원하여 지원을 보내야 합니다. §R임무 중 일부 병력이 사망할 수 있습니다!§!\n\n보상:\n£minerals£ §G(1500)§! §Y그리고§! £energy£ §G(2000)§! §Y그리고§! £unity£ §G(1000)§! \n\n(§SSpecial Project Extended Mod§!)"
 RED_STAR_JEWELER:0 "적색 항성 보석공 §G(1단계)§!"
 RED_STAR_JEWELER_DESC:0 "루비 제작에 특화된 민간 기업이 M형 적색 항성의 깊은 색상을 관찰하여 제품을 완벽하게 만들고자 합니다. 그들은 다음 작업을 위한 완벽한 대상으로 §Y[special_project_target.GetName]§!를 선택하였으며, 진행을 위해 §YScience Ship§!이 필요합니다.\n\n보상:\n£minerals£ §G(300 - 600)§! \n\n(§SSpecial Project Extended Mod§!)"
 RESEARCHER_CONGRESS:0 "연구자 회의 §G(1단계)§!"
 RESEARCHER_CONGRESS_DESC:0 "연구원 회의가 §Y[Root.Capital.GetName]§!에서 조직되고 있습니다. 그들은 국가의 모든 기술 개선을 위한 주장을 하기 위해 모였습니다.\n\n보상:\n§Y수정치:§! §G연구 속도 증가§! §Y그리고§! £physics£ £society£ £engineering£ §G(700 - 1500)§! \n\n(§SSpecial Project Extended Mod§!)"
 RETIREMENT_PLACE:0 "은퇴지 §G(1단계)§!"
 RETIREMENT_PLACE_DESC:0 "§Y[special_project_target.GetName]§!에서 우리 탐사대 일부가 매우 평온한 장소로 묘사될 수 있을 만큼 완벽한 조건을 갖춘 흥미로운 위치를 발견했습니다. 이곳은 우리 국민의 은퇴지로 좋은 목적지가 될 수 있습니다. 이 새로운 지역을 완전히 탐사하고, 우리의 가장 용감한 노인들이 남은 생을 평온히 쉬며 보낼 장소가 될 수 있는지 확인하려면 더 많은 시간과 조사가 필요합니다.\n\n보상:\n§Y매장지:§! §G추가 편의 산출 및 편의 사용량 감소§! \n\n(§S특수 프로젝트 확장 모드§!)"
 RINGWORLD_INVESTIGATION:0 "링월드 조사 §Y(2단계)§!"
 RINGWORLD_INVESTIGATION_DESC:0 "공학 전문가 그룹이 §Y[special_project_target.GetName]§!라는 링월드 구역을 조사하고 싶어 합니다. 그들은 우리가 해당 구역의 대부분 용량을 사용하지 않았으며, §Y과학선§!을 이용하면 유용한 것을 발견할 수 있다고 주장합니다.\n\n보상:\n£energy£ §G산출량 증가§! §Y그리고§! £engineering£ §G(1500 - 3000)§! §Y그리고§! £energy£ §G(500)§! \n\n(§SSpecial Project Extended Mod§!)"
 RING_WORLD_IMPROVEMENT:0 "링월드 개선 §R(3단계)§!"
 RING_WORLD_IMPROVEMENT_DESC:0 "링월드 §Y[special_project_target.GetName]§!의 효율을 높이는 특수 프로젝트가 시작되었습니다. 그곳에 있는 인구의 제조 효율을 높이기 위해 생태계를 변경하는 방식입니다.\n\n보상:\n§Y수정치:§! §G행성 자원 산출 증가§! \n\n(§S특수 프로젝트 확장 모드§!)"
 ROBOTS_ASSAULT:0 "로봇 강습 §G(1단계)§!"
 ROBOTS_ASSAULT_DESC:0 "무장 로봇 그룹이 §Y[special_project_target.GetName]§!의 도시에서 공포를 퍼뜨리고 있습니다. 이들은 몇 달 동안 실종된 악당 공학자에 의해 제작되고 재프로그래밍된 것으로 보입니다. 위기를 통제하기 위해 최소한 §Y2 수송선§!을 보내야 합니다. §R임무 중 일부 병력이 사망할 수 있습니다!§!\n\n보상:\n£minerals£ §G(500)§! §Y그리고§! £engineering£ §G(200 - 500)§! \n\n(§SSpecial Project Extended Mod§!)"
 ROBOT_AUTO_FACTORIES:0 "대형 로봇 공장 §R(3단계)§!"
 ROBOT_AUTO_FACTORIES_DESC:0 "위기가 발생하고 있습니다 §Y[special_project_target.GetName]§!. 우리는 어디서 나타났는지 모르는 거대한 공장들이 수천 대의 전투 로봇을 발사하기 시작했다는 것을 감지했습니다. 그들을 죽이는 것은 쉽지만, 그 수는 계속 증가하고 있으며, 지역 군대는 지원이 없으면 빠르게 압도당할 것입니다. 우리는 그들을 지원하고 행성에 대한 통제를 재확립하기 위해 최소한 §Y40 수송선§!을 보내야 합니다. §R임무 중 일부 병력이 사망할 수 있습니다!§!\n\n보상:\n£influence£ §G(50)§! §Y그리고§! £energy£ §G(6000)§! §Y그리고§! £unity£ §G(2000)§! §Y그리고§! £engineering£ §G(3000 - 6000)§! \n\n(§SSpecial Project Extended Mod§!)"
 ROBO_MODDING_OPPORTUNITY:0 "로봇 개조 개선 §Y(2단계)§!"
 ROBO_MODDING_OPPORTUNITY_DESC:0 "로봇 모딩의 품질을 향상시킬 가능성이 있는 것 같습니다. 프로젝트는 오래 걸리겠지만, 우리의 전문가들이 결과가 나올 것이라고 확인할 수 있습니다.\n\n보상:\n§G추가 로봇/기계 특성§! §Y그리고§! £engineering£ §G(1000 - 2000)§! \n\n(§SSpecial Project Extended Mod§!)"
 RULER_CELEBRATION:0 "통치자 기념식 §G(1단계)§!"
 RULER_CELEBRATION_DESC:0 "§Y[Root.GetRulerTitle] [ruler.GetRegnalName]§!는 §Y[Root.Capital.GetName]§!에서 국가를 통치하는 데 얼마나 모범적이었는지를 기념하는 축제를 준비하고 싶어하며, 자신의 의무를 다하고 우리를 밝은 미래로 이끌 것임을 확언합니다.\n\n보상:\n£influence£ §G(25 - 50)§! §Y그리고§! £unity£ §G(100 - 500)§! \n\n(§SSpecial Project Extended Mod§!)"
 SAPIENT_AI_ACTIVATED:0 "고대 AI §Y(2단계)§!"
 SAPIENT_AI_ACTIVATED_DESC:0 "우리의 탐사선이 §Y[special_project_target.GetName]§!에서 오는 신호를 감지했습니다. 이는 우리의 것이 아니며, 매우 고대의 기계에서 오는 신호임을 확인했습니다. 해독된 메시지에는 대화하고 싶다는 내용이 포함되어 있습니다. 해당 메시지를 분석한 결과 적대적인 징후는 발견되지 않았으므로, 공학자 팀과 함께 §Y과학선§!을 보내는 것이 좋은 생각일 수 있습니다.\n\n보상:\n£engineering£ §G산출량 증가§! §Y그리고§! £engineering£ §G(1000 - 2000)§! \n\n(§SSpecial Project Extended Mod§!)"
 SAPIENT_AI_TRANSCENDENCE:0 "지성 AI 초월 §R(3단계)§!"
 SAPIENT_AI_TRANSCENDENCE_DESC:0 "기계도 초월에 도달할 수 있기 때문에, 그들의 출력 효율성을 높이기 위한 기계-신경 임플란트를 통해 능력을 증대시키는 프로그램이 시작되었습니다.\n\n보상:\n§Y수정:§! §G로봇 생명 질 향상§! §Y그리고§! £engineering£ §G(3500 - 5500)§! §Y그리고§! £minerals£ §G(1000 - 2500)§! \n\n(§SSpecial Project Extended Mod§!)"
 SAPIENT_XENO_ALLIANCE:0 "AI - 외계종 동맹 §R(3단계)§!"
 SAPIENT_XENO_ALLIANCE_DESC:0 "은하에서 이해받기 위해 우리는 다른 외계 국가들과 기계들과 외교 협상을 해야 합니다. 그들 중 정부의 권력을 쥐게 된 존재에게는 서로를 이해하고 가능한 한 미래의 갈등을 피하기 위해 외교가 필수적입니다.\n\n보상:\n§Y수치:§! §G합성체 관계 증가§! §Y그리고§! £society£ §G(3000 - 6000)§! §Y그리고§! £influence£ §G(50 - 100)§! \n\n(§SSpecial Project Extended Mod§!)"
 SATELLITE_GONE_WRONG:0 "고장난 위성 §G(1단계)§!"
 SATELLITE_GONE_WRONG_DESC:0 "우리의 §Y[special_project_target.System.GetName]§! 항성계에 있는 위성 중 하나가 고장을 일으켰습니다. 공학자 팀이 문제를 이해하기 위해 우리의 §YConstruction Ship§! 중 하나를 빌리고 싶어 합니다. 작업이 끝나면 위성은 폐기될 것입니다.\n\n보상:\n£minerals£ §G(200)§! §YAND§! £engineering£ §G(100 - 500)§! \n\n(§SSpecial Project Extended Mod§!)"
 SAVANNAH_LANDING_TEST:0 "사바나 행성 착륙 시험 §G(1단계)§!"
 SAVANNAH_LANDING_TEST_DESC:0 "민간 기업이 식민지 선박을 개발하고 있으며, 초원 세계에서 그들의 선박을 테스트하기 위해 우리에게 비용을 지불하고자 합니다. 그들은 식민지화되지 않은 거주 가능한 행성인 §Y[special_project_target.GetName]§!를 테스트에 적합한 행성으로 선택했습니다. 착륙 훈련 프로토콜을 시작하기 위해 §Y식민지 선박§!이 필요합니다. 우리는 그 기회를 이용해 우리의 공학자와 과학자들을 그들의 승무원과 함께 보낼 것입니다. 그들은 착륙하는 동안 세계에 대한 유용한 관찰을 할 것입니다.\n\n보상:\n£energy£ §G(200 - 500)§! §Y그리고§! £engineering£ §G(200 - 400)§! \n\n(§SSpecial Project Extended Mod§!)"
 SCIENCE_LANDING_TEST:0 "과학선 착륙 시험 §G(1단계)§!"
 SCIENCE_LANDING_TEST_DESC:0 "사설 기업이 과학선 개발을 위해 §Y[special_project_target.GetName]§!에서 그들의 선박을 테스트할 수 있도록 우리에게 비용을 지불하고자 합니다. 테스트 절차를 시작하기 위해 §Y과학선§!을 보내야 합니다.\n\n보상:\n£energy£ §G(100 - 600)§! §YAND§! £physics£ §G(100 - 400)§! \n\n(§SSpecial Project Extended Mod§!)"
 SCIENCE_NEXUS_CONGRESS:0 "과학 넥서스 회의 §R(3단계)§!"
 SCIENCE_NEXUS_CONGRESS_DESC:0 "우리 과학자들은 §Y[special_project_target.System.GetName]§! 시스템에 있는 과학 넥서스 내에서 새로운 의회를 개최하고자 합니다. 그들은 이 거대 구조물 안에서 신기술에 대한 보다 효율적인 대화를 나눌 것이라고 주장합니다. 의회를 개막하기 위해 필요한 것은 §Y과학선§! 하나입니다.\n\n보상:\n£physics£ £society£ £engineering£ §G(5000 - 10000)§! \n\n(§SSpecial Project Extended Mod§!)"
 SCIENTIST_CLONE_ARMY:0 "클론 군대 §Y(2단계)§!"
 SCIENTIST_CLONE_ARMY_DESC:0 "우리의 스파이들은 끔찍한 발견을 했습니다. §Y[special_project_target.GetName]§!에서 거대한 전차 복합체가 숨겨진 벙커가 발견되어 전체 클론 군대를 개발하고 있습니다. 우리는 그들이 무엇을 위해 군대를 만들고 있는지 아무도 모르기 때문에 군사력을 보내야 합니다. 클론 생산을 중단하고 미친 과학자를 체포하기 위해 §Y20 수송선§!을 보내십시오. §R임무 중 일부 병력이 사망할 수 있습니다!§!\n\n보상:\n£minerals£ £energy£ £unity£ £engineering£ £society£ §Y임무 진행 상황에 따라§! \n\n(§SSpecial Project Extended Mod§!)"
 SCIENTIST_MEETING:0 "과학자 회의 §G(1단계)§!"
 SCIENTIST_MEETING_DESC:0 "국가의 모든 과학자가 모인 회의가 §Y[Root.Capital.GetName]§!에서 조직되었습니다. 그들은 우주 탐사 중 배운 모든 것과 기술 분야의 수장으로서의 경험과 지식을 공유할 것입니다.\n\n보상:\n£physics£ £society£ £engineering£ §G(200 - 1000)§! \n\n(§SSpecial Project Extended Mod§!)"
 SEARCH_BETHARIAN_STONE:0 "베사리안석 회수 §G(1단계)§!"
 SEARCH_BETHARIAN_STONE_DESC:0 "§Y[special_project_target.GetName]§!에 있는 우리 탐험가 중 하나가 베사리안석 입자를 발견했습니다. 이는 행성에서 더 많은 베사리안석이 발견될 가능성이 있음을 의미합니다.\n\n보상:\n§G베사리안석 발견§! \n\n(§S특수 프로젝트 확장 모드§!)"
 SEA_MONSTER_HUNT:0 "바다 괴물 사냥 §Y(2단계)§!"
 SEA_MONSTER_HUNT_DESC:0 "거대한 바다 괴물들이 §Y[special_project_target.GetName]§!에서 목격되었습니다. 일부 전문가들은 이들이 매우 공격적이며 번식률이 매우 높다고 분류하였으므로, 미래의 식민지에 문제를 피하기 위해 이들의 개체수를 조절해야 합니다. 임무를 수행하기 위해서는 최소 §Y14 수송선§!이 필요합니다. §R임무 중 일부 병력이 사망할 수 있습니다!§!\n\n보상:\n£society£ §G(1000 - 3000)§! §Y그리고§! £food£ §G(200 - 500)§! \n\n(§SSpecial Project Extended Mod§!)"
 SECURITY_REINFORCEMENT:0 "치안 강화 §G(1단계)§!"
 SECURITY_REINFORCEMENT_DESC:0 "§Y[special_project_target.GetName]§!에서 일부 불만이 감지되었습니다. 지역 경찰은 향후 발생할 가능성이 있는 폭동을 극복하기 위해 최소 10년 동안 보안 강화를 요청하고 있습니다.\n\n보상:\n§Y수정치:§! §G행성 불만 감소§! §Y그리고§! £society£ §G(100 - 400)§! \n\n(§SSpecial Project Extended Mod§!)"
 SENATE_REUNION:0 "상원 회합 §G(1단계)§!"
 SENATE_REUNION_DESC:0 "상원 의원들이 §Y[Root.Capital.GetName]§!에서 재회를 조직했습니다. 정치가 멈추지 않으며 심각한 논의가 필요합니다. 우리의 정책에 방해가 되지 않기를 바랍니다.\n\n보상:\n£influence£ §G(50 - 100)§! \n\n(§SSpecial Project Extended Mod§!)"
 SHIPYARD_RAPID_ASSEMBLY:0 "조선소 신속 조립 §G(1단계)§!"
 SHIPYARD_RAPID_ASSEMBLY_DESC:0 "우주를 지배하기 위해서는 함선의 수가 필요하며, 이를 위해 효율적인 조선소가 필요합니다. 우리의 공학자들은 확인 주문을 받으면 해당 프로젝트에 착수할 수 있습니다.\n\n보상:\n§Y수정치:§! §G함선 건조 속도 증가§! §Y그리고§! £engineering£ §G(300 - 800)§! \n\n(§SSpecial Project Extended Mod§!)"
 SHIP_CRASH_HARVESTAGE:0 "추락 함선 회수 §G(1단계)§!"
 SHIP_CRASH_HARVESTAGE_DESC:0 "정체불명의 우주선이 §Y[special_project_target.GetName]§!에 추락했습니다. 우리는 잔해를 조사하기 위해 즉시 §YScience Ship§!을 보내야 합니다.\n\n보상:\n£engineering£ §G(300 - 600)§! §YAND§! £minerals£ §G(500)§! \n\n(§SSpecial Project Extended Mod§!)"
 SHOOTING_STARS:0 "$colony.9330.name$ §G(1단계)§!"
 SHOOTING_STARS_DESC:0 "밤 동안 §Y[special_project_target.GetName]§!에서 우리 국민은 대규모 별똥별 무리를 볼 수 있습니다. 아직 우리 은하에서 이 현상의 위치를 파악할 수는 없지만, 추가 연구를 허용하면 그 식민지의 주민들은 고마워할 것입니다. 특히 그들 대부분은 호주와 천문학 연구에 긍정적인 태도를 발전시킨 것으로 보입니다.\n\n보상:\n§Y수정치:§! §G추가 안정도§! \n\n(§S특수 프로젝트 확장 모드§!)"
 SHROUDING_PLANET:0 "장막에 뒤덮이는 행성 §M(4단계)§!"
 SHROUDING_PLANET_DESC:0 "장막에 덮인 행성에 대한 저주받은 행성이라는 §Y[special_project_target.GetName]§!에 대한 소문이 돌고 있습니다. 우리의 당국과 지도자들은 이 문제를 무시했지만, 소문을 확인하는 듯한 매우 이상한 일이 실제로 발생하고 있습니다. 이 행성은 이미 다른 사람들이 '장막'이라고 부른 다른 차원에서 오는 이상한 물질에 의해 회복되고 있는 것으로 보입니다. 이 행성이 완전히 회복되기까지는 시간이 걸릴 것이므로, 우리는 가까이에서 관찰하기 위해 §YScience Ship§!을 보낼 수 있습니다.\n\n보상:\n£society£ §G산출량 증가§! §Y그리고§! §G행성이 장막에 덮인 행성으로 변환됩니다§! §Y그리고§! £society£ §G(10000)§! §Y그리고§! £energy£ §G(5000)§! \n\n(§SSpecial Project Extended Mod§!)"
 SMALL_CARRIER_ASSAULT:0 "소형 호송대 습격 §G(1단계)§!"
 SMALL_CARRIER_ASSAULT_DESC:0 "우리는 §Y[special_project_target.System.GetName]§! 시스템에서 귀중한 물품을 운반하는 범죄자 세력의 작은 호송대를 발견했습니다. 그들을 납치하기 위해 최소한 §Y5 Military Ships§!의 함대를 보낼 수 있습니다.\n\n보상:\n£energy£ §G(1000)§! §YAND§! £minerals£ §G(2200)§! \n\n(§SSpecial Project Extended Mod§!)"
 SMALL_DEBRIS_ANALYZE:0 "소형 잔해 분석 §G(1단계)§!"
 SMALL_DEBRIS_ANALYZE_DESC:0 "우리의 스캐너가 §Y[special_project_target.System.GetName]§! 시스템에서 잔해의 작은 그룹을 감지했습니다. 이 잔해가 어디에서 왔는지 예측하는 것은 불가능하며, 이를 연구하기 위해서는 §YScience Ship§!이 유용할 것입니다.\n\n보상:\n£physics£ §G(200 - 400)§! §YAND§! £engineering£ §G(200 - 400)§! §YAND§! £minerals£ §G(125)§! \n\n(§SSpecial Project Extended Mod§!)"
 SMALL_TERRORIST_FLEET:0 "소규모 테러리스트 함대 §G(1단계)§!"
 SMALL_TERRORIST_FLEET_DESC:0 "소규모 테러리스트 함대가 §Y[special_project_target.System.GetName]§! 항성계에서 탐지되었습니다. 일부 민간인이 그들의 함선 안에 인질로 잡혀 있는 것으로 보입니다. 이들을 납치하기 위해서는 최소한 §Y3 군함§!을 동원한 구조 작전이 권장됩니다.\n\n보상:\n£minerals£ §G(750)§! §YAND§! £energy£ §G(500)§! \n\n(§SSpecial Project Extended Mod§!)"
 SOLAR_ECLIPSE:0 "영구 일식 §G(1단계)§!"
 SOLAR_ECLIPSE_DESC:0 "§Y[special_project_target.GetName]§! 식민지에서 매우 이례적인 일이 벌어지고 있습니다. 행성의 달이 매우 이상한 행동을 보이며 궤도를 바꾸어 낮 동안 항상 행성에서 태양을 가리는 것으로 보입니다. 우리 과학자들은 이 현상이 얼마나 오래 지속될지, 그리고 현지 인구에 중대한 변화가 영향을 줄지 확인하는 데 시간이 필요합니다.\n\n보상:\n§Y수정치:§! §G편의 사용량 감소§! \n\n(§S특수 프로젝트 확장 모드§!)"
 SPACESHIP_GRAVEYARD:0 "우주선 묘지 §G(1단계)§!"
 SPACESHIP_GRAVEYARD_DESC:0 "거대한 우주선 묘지가 §Y[special_project_target.GetName]§!에서 발견되었습니다. 다양한 우주선의 부품들이 많이 보이지만, 가장 인상적인 것은 큰 우주선의 껍데기로, 큰 피해 없이 지면에 추락한 상태입니다. 해당 선박을 분석하기 위해 §Y과학선§!을 보낼 수 있습니다.\n\n보상:\n£unity£ §G(50 - 250)§! §Y그리고§! £engineering£ §G(200 - 600)§! \n\n(§SSpecial Project Extended Mod§!)"
 SPACE_BATTLE_DEBRIS:0 "우주 전투 잔해 §Y(2단계)§!"
 SPACE_BATTLE_DEBRIS_DESC:0 "우리의 감지기가 §Y[special_project_target.System.GetName]§! 시스템에서 전투를 감지했습니다. 유용한 것을 찾기 위해 §Y과학선§!을 호위할 군사 함대를 보내는 것이 좋은 생각일 수 있습니다.\n\n보상:\n£minerals£ §G(1250)§! §YAND§! £energy£ §G(1000 - 2000)§! §YAND§! £engineering£ §G(1500 - 3000)§! \n\n(§SSpecial Project Extended Mod§!)"
 SPACE_FUNERALS:0 "우주 장례식 §G(1단계)§!"
 SPACE_FUNERALS_DESC:0 "우리 국민은 나라를 지키기 위해 목숨을 바친 모든 영웅들에게 경의를 표하기 위해 §Y[Root.Capital.GetName]§!에서 우주 장례식을 조직하고자 합니다.\n\n보상:\n£influence£ §G(5 - 25)§! §YAND§! £unity£ §G(10 - 200)§! \n\n(§SSpecial Project Extended Mod§!)"
 SPACE_GUARDIAN_SPOTTED:0 "우주 수호자 §M(4단계)§!"
 SPACE_GUARDIAN_SPOTTED_DESC:0 "우리는 §Y[special_project_target.System.GetName]§! 시스템에서 오는 거대한 우주 괴물 무리를 탐지했습니다. 그들은 무언가에 의해 조종되어 팀을 이루어 시야에 있는 모든 것을 공격하는 것으로 보입니다. 그들의 이상한 행동이 문제였지만, 그들 중 하나에서 발견된 이상한 재생 모듈은 우리 §Y과학선§! 중 하나가 연구할 수 있을 것으로 보이며, 우리가 그들에게 접근할 수 있는 방법을 찾아야 합니다.\n\n보상:\n§Y수정:§! §GHull/Armor/Shield 재생§! §Y그리고§! £society£ §G(15000)§! §Y그리고§! £energy£ §G(5000)§! \n\n(§SSpecial Project Extended Mod§!)"
 SPACE_MONSTER_INVASION:0 "우주 태생 생물 침공 §R(3단계)§!"
 SPACE_MONSTER_INVASION_DESC:0 "우리는 §Y[special_project_target.System.GetName]§! 시스템에서 이상한 활동을 감지했습니다. 여러 종의 우주 외계인들이 함께 모여 그룹을 형성하고, 그 그룹에 속하지 않은 모든 것을 공격하기 시작한 것으로 보입니다. 우리는 무슨 일이 일어나고 있는지 이해해야 하며, 가까이에서 조사하기 위해 최소한 §Y10 군함§!을 보내야 할 것입니다.\n\n보상:\n§G연구 옵션:§! §Y$tech_crystal_armor_2$§! §Y또는§! £physics£ §G(5000)§! §Y그리고§! £society£ §G(3000 - 6000)§! §Y그리고§! £energy£ §G(1500 - 3000)§! \n\n(§SSpecial Project Extended Mod§!)"
 SPACE_STATION_DESTROYED:0 "파괴된 우주 기지 §Y(2단계)§!"
 SPACE_STATION_DESTROYED_DESC:0 "우리는 §Y[special_project_target.System.GetName]§! 시스템에서 발생한 대규모 폭발을 감지했습니다. 적대적인 함대에 의해 한 기지가 파괴된 것으로 보입니다. 그러나 우리의 과학자들은 기지의 잔해 옆에 있으며, 이를 자세히 살펴보고 싶어 하지만, 그 전에 시스템을 확보해야 합니다. 우리는 한 §YScience Ship§!을 기지의 잔해로 호위해야 합니다.\n\n보상:\n£minerals£ §G(2500)§! §YAND§! £physics£ §G(2000 - 4000)§! §YAND§! £engineering£ §G(2000 - 4000)§! \n\n(§SSpecial Project Extended Mod§!)"
 SPY_ORB_OBSERVATION:0 "첩보 구체 관측 §R(3단계)§!"
 SPY_ORB_OBSERVATION_DESC:0 "우리의 스파이 오브가 있는 §Y[special_project_target.System.GetName]§! 시스템의 도움으로 이웃 행성에 대해 더 깊이 스파이할 수 있는 가능성이 생겼습니다. 더 나은 정확도로 스파이 방향을 조정하기 위해서는 메가구조물에 연결된 §YScience Ship§!이 필요합니다..\n\n보상:\n£influence£ §G(100 - 200)§! \n\n(§SSpecial Project Extended Mod§!)"
 STARBASE_HANGAR_REPAIR:0 "항성기지 격납고 수리 §G(1단계)§!"
 STARBASE_HANGAR_REPAIR_DESC:0 "스타베이스의 §Y[special_project_target.System.GetName]§! 시스템에 있는 격납고에서 기능 장애가 발견되었습니다. 손상된 부분의 유지보수 및 수리를 돕기 위해 §YConstruction Ship§!을 보내야 합니다.\n\n보상:\n£engineering£ §G(400 - 800)§! \n\n(§SSpecial Project Extended Mod§!)"
 STARBASE_INSPECTION:0 "항성기지 점검 §G(1단계)§!"
 STARBASE_INSPECTION_DESC:0 "§Y[special_project_target.System.GetName]§! 시스템에 있는 스타베이스의 검사가 필요합니다. 유지 보수 프로토콜 검사를 시작하기 위해 즉시 §YScience Ship§!을 파견해야 합니다.\n\n보상:\n£unity£ §G(10 - 100)§! §YAND§! £engineering£ §G(150 - 800)§! \n\n(§SSpecial Project Extended Mod§!)"
 STARBASE_SHIPS_REPAIR:0 "항성기지 함선 수리 §G(1단계)§!"
 STARBASE_SHIPS_REPAIR_DESC:0 "§Y[special_project_target.System.GetName]§! 시스템의 스타베이스에서 건조된 초계함 보충물이 심각한 고장으로 인해 도크에 갇혀 있습니다. §Y건설선§!을 보내면 문제를 해결하고 우리 해군에 추가 함선을 더할 수 있습니다.\n\n보상:\n£navy_size£ §G추가 함선§! \n\n(§SSpecial Project Extended Mod§!)"
 STRANGE_PLACE:0 "이상 현상 §G(1단계)§!"
 STRANGE_PLACE_DESC:0 "우리는 §Y[special_project_target.GetName]§! 근처에서 매우 이상한 현상이 발생하고 있음을 발견했습니다. 일종의 미니 중력장이 형성되고 있는 것 같습니다. 이러한 사건이 어떻게 발생할 수 있는지에 대한 아이디어는 없지만, 일부 물리학자들이 그 현상을 자세히 살펴보고 싶어 합니다. 이를 위해서는 우리의 §YScience Ship§! 중 하나가 필요합니다.\n\n보상:\n£sr_dark_matter£ §G(25)§! \n\n(§SSpecial Project Extended Mod§!)"
 STRATEGIC_RESOURCE_DISCOVERY:0 "전략 자원 §Y(2단계)§!"
 STRATEGIC_RESOURCE_DISCOVERY_DESC:0 "낙관적인 탐색자 그룹이 §Y[special_project_target.GetName]§!가 귀중한 무언가를 숨기고 있다고 주장하며, 우리는 즉시 §Y과학선§!을 배치하여 더 깊은 조사를 진행해야 한다고 말했습니다.\n\n보상:\n§G전략 자원 발견§! §Y그리고§! £physics£ £society£ £engineering£ §G(500 - 1000)§! \n\n(§SSpecial Project Extended Mod§!)"
 SYSTEM_CONTROLLED_STATION:0 "통제된 성계 §R(3단계)§!"
 SYSTEM_CONTROLLED_STATION_DESC:0 "§Y[special_project_target.System.GetName]§! 시스템의 통제가 중립에서 군사 세력으로 전환된 것으로 보입니다. 이들은 자신의 주요 기지로 삼으려 하고 있습니다. 우리 국경과 매우 가까운 만큼, 그들의 군사 작전이 우리를 겨냥할 것임이 확실하므로, 우리는 먼저 공격하고 그들의 주력 함선을 납치하여 지도자들을 체포해야 합니다. §Y10 척의 군사 함선§!이면 납치에 충분할 것이지만, 그 전에 이 군사 기지들로부터 시스템을 정리해야 합니다.\n\n보상:\n£influence£ §G(150)§! §YAND§! £unity£ §G(4000)§! §YAND§! £energy£ §G(3000)§! \n\n(§SSpecial Project Extended Mod§!)"
 SpecialProjectCompletedEvents.0.Desc:0 "§S특수 프로젝트§!의 타이머가 끝났고, 결국 §R실패§!로 종료되었습니다."
 SpecialProjectCompletedEvents.0.Name:0 "특수 프로젝트: §R실패§!"
 SpecialProjectCompletedEvents.1.Desc:0 "§Y[special_project_target.GetName]§!에서 가능한 한 많은 광물을 추출하는 데 성공했습니다. 남은 전리품은 이미 현지 인양업자와 민간 기업들이 가져갔습니다. 이제 임무가 성공했음을 확인할 수 있습니다."
 SpecialProjectCompletedEvents.1.Name:0 "소행성 충돌 수확: §G성공§!"
 SpecialProjectCompletedEvents.10.Desc:0 "§Y[special_project_target.GetName]§! 탐사는 성공했습니다. 열정적인 과학 팀은 필요한 정보 대부분을 수집했고, 그 얼어붙은 행성에서 발견한 유용한 모든 것에 대한 보고서를 우리에게 제출했습니다. 그들은 앞으로 새로운 행성에서 가능한 다른 탐사에 매우 들떠 있습니다."
 SpecialProjectCompletedEvents.10.Name:0 "얼어붙은 탐사: §G성공§!"
 SpecialProjectCompletedEvents.1001.Desc:0 "과학자들이 옳았습니다. §Y[special_project_target.GetName]§!의 연구소에는 실제로 흥미로운 다양한 데이터가 많이 들어 있었던 것으로 보입니다. 건물을 탐사하는 동안 전투나 긴급 대피의 흔적, 어떤 유기체 흔적도 발견되지 않았습니다. 그 구조물의 주인이 누구였는지는 알 수 없지만, 그의 연구는 잘 활용할 수 있을 것입니다."
 SpecialProjectCompletedEvents.1001.Name:0 "소행성 연구소: §G성공§!"
 SpecialProjectCompletedEvents.1002.Desc:0 "§Y[special_project_target.GetName]§!에 있는 아름다운 호수의 탐사가 완료되었습니다. 현지 동식물은 그리 특별해 보이지 않았지만, 우리의 관심을 끈 것은 이전에 한 번도 마주친 적 없는 미생물이 대량으로 존재한다는 사실입니다. 이들이 바로 그 맑은 물의 원인이었습니다. 생물학적 숙주를 찾는 감염성 행동을 보이는 대신, 이들은 물속의 오염물 같은 무생물 물질을 찾습니다. 또한 깨끗한 물의 조건이 이들의 발달을 가능하게 하고, 그 결과 물을 더욱 깨끗하게 만든다는 점도 확인되었습니다. 물론 매우 흥미로운 발견이며, 가장 흥미로운 소식은 이 미생물을 모아 압축하면 우리 국민을 위한 일종의 식용 제품을 만들 수 있다는 사실입니다."
 SpecialProjectCompletedEvents.1002.Name:0 "아름다운 호수: §G성공§!"
 SpecialProjectCompletedEvents.1003.Desc:0 "§Y[special_project_target.GetName]§! 주변을 도는 위성들의 궤적에 대한 추가 계산을 마쳤습니다. 충돌은 우리 해군의 막대한 화력을 이용해 위성을 몇 킬로미터 이동시키는 방식으로 피할 수 있을 것으로 추정됩니다. 아, 그리고 우리 과학 팀은 수집 준비가 된 광물이 흐르는 흥미로운 장소도 발견했습니다."
 SpecialProjectCompletedEvents.1003.Name:0 "여러 위성: §G성공§!"
 SpecialProjectCompletedEvents.1004.Desc:0 "예상대로, §Y[special_project_target.GetName]§!의 소행성대에 전문가 팀을 보낸 것은 옳았습니다. 소행성 중 하나에 자원 화물이 버려져 있었던 것으로 보입니다. 우리 과학선은 내용물을 손상시키지 않고 제대로 수집하는 데 성공했으며, 컨테이너 내부에는 광물과 단단한 합금까지 포함한 귀중한 자원이 실려 있었습니다."
 SpecialProjectCompletedEvents.1004.Name:0 "행성 소행성대: §G성공§!"
 SpecialProjectCompletedEvents.1005.Desc:0 "§Y[special_project_target.GetName]§! 행성의 두 번째 조사가 완료되었고, 이 행성에서 특별한 것은 아무것도 발견되지 않았음을 확인할 수 있습니다. 그래도 만약 §Y[special_project_target.GetName]§!이 식민지가 된다면, 적어도 우리 국민에게 아주 나쁜 일은 일어나지 않기를 바랄 수는 있습니다."
 SpecialProjectCompletedEvents.1005.Name:0 "행성 표면 스캔: §G성공§!"
 SpecialProjectCompletedEvents.1006.Desc:0 "§Y[special_project_target.GetName]§! 근처의 알 수 없는 광원 조사가 완료되었습니다. 그 빛은 행성 주변 공허를 떠도는 거대한 고철 더미에서 나오고 있었던 것으로 보입니다. 우리 과학자는 그 고철 더미에서 실질적인 용도를 찾지 못했지만, 추가 조사 결과 내부에 상당한 양의 합금이 존재하며 이를 추출해 향후 우주 건물과 함선에 사용할 수 있음을 확인했습니다."
 SpecialProjectCompletedEvents.1006.Name:0 "알 수 없는 광원: §G성공§!"
 SpecialProjectCompletedEvents.1007.Desc:0 "물리학자들이 §Y[special_project_target.GetName]§! 근처의 이상 현상 연구를 마쳤습니다. 소형 중력 우물은 일시적인 현상에 불과했던 것으로 보입니다. 근원은 알 수 없지만, 우리 팀은 향후 사용할 수 있는 매우 희귀한 물질 일부를 추출하는 데 성공했습니다. 그들은 이를 암흑물질이라고 부릅니다."
 SpecialProjectCompletedEvents.1007.Name:0 "이상 현상: §G성공§!"
 SpecialProjectCompletedEvents.1008.Desc:0 "§Y[special_project_target.GetName]§!의 우리 과학선이 미지의 지역 조사를 완료했습니다. 행성의 그 부분을 더 깊이 살펴본 것은 옳았던 듯합니다. 전략 자원으로 보이는 것을 발견했습니다."
 SpecialProjectCompletedEvents.1008.Name:0 "특이한 행성: §G성공§!"
 SpecialProjectCompletedEvents.1009.Desc:0 "일정 기간의 투자와 건설 끝에, 우리 건설자들은 제공된 자원으로 §Y[special_project_target.GetName]§!의 현지 민간 우주항을 개선하는 데 마침내 성공했습니다. 이제 수많은 수송선이 유용한 자원, 특히 우리 해군에 사용할 수 있는 합금을 대량으로 수입해 오는 것을 확인할 수 있습니다."
 SpecialProjectCompletedEvents.1009.Name:0 "분주한 우주항: §G성공§!"
 SpecialProjectCompletedEvents.101.Desc:0 "§Y[special_project_target.GetName]§!의 관광 여행은 성공적이었습니다. 관광객 그룹은 그 여정에 만족했으며, 앞으로 더 많은 활동을 요청할 수도 있습니다."
 SpecialProjectCompletedEvents.101.Name:0 "가이아 관광: §G성공§!"
 SpecialProjectCompletedEvents.1010.Desc:0 "완료되었습니다. §Y[special_project_target.GetName]§!에서 필요한 모든 데이터가 수집되었고, 이제 이 장소가 우리 국민의 은퇴 쉼터로 완벽한 곳이 될 것임을 확인할 수 있습니다. 이런 소식은 식민지에 많은 긍정적인 반응을 불러온 듯합니다. 누구도 §Y[special_project_target.GetName]§!이 그런 귀중한 지역을 숨기고 있으리라고 생각하지 못했습니다."
 SpecialProjectCompletedEvents.1010.Name:0 "은퇴지: §G성공§!"
 SpecialProjectCompletedEvents.1011.Desc:0 "§Y[special_project_target.GetName]§!에 있는 상인이 행성의 현지 시장을 개선할 수 있도록 충분한 건물을 건설하고 충분한 지원을 제공했습니다. 이제 앞으로 몇 년 동안 행성의 현지 무역이 크게 증가할 것이라고 추정할 수 있습니다."
 SpecialProjectCompletedEvents.1011.Name:0 "무역 개선: §G성공§!"
 SpecialProjectCompletedEvents.1012.Desc:0 "§Y[special_project_target.GetName]§!의 발명가들이 밤마다 맑은 보름달의 빛을 반사하고 증폭하는 장치 설치를 마쳤습니다. 이 장치는 매일 밤 거대한 빛의 존재로 조금 더 밝아지게 하여 사람들의 밤에 대한 두려움을 줄이고, 그 결과 행성의 안정도를 높입니다."
 SpecialProjectCompletedEvents.1012.Name:0 "맑은 달: §G성공§!"
 SpecialProjectCompletedEvents.1013.Desc:0 "완료되었습니다. §Y[special_project_target.GetName]§! 식민지는 절정의 상태에 도달했습니다. 우리 국가의 많은 중요 인물들이 이 행성에 정착했고, 이제 이곳은 우리 국가에 매우 중요한 영향력의 원천으로 발전했습니다. 우리 해군 제독들은 만약 우리에게 전쟁이 일어난다면, §Y[special_project_target.GetName]§! 식민지는 수도 바로 전에 마지막에서 두 번째로 함락될 식민지일 수도 있다고 주장합니다."
 SpecialProjectCompletedEvents.1013.Name:0 "절정의 식민지: §G성공§!"
 SpecialProjectCompletedEvents.1014.Desc:0 "완료되었습니다. §Y[special_project_target.GetName]§!에서 우리 첩자들이 행성의 지하 세계에 침투했습니다. 이제 그들의 도움으로 범죄량이 크게 줄어들어 이곳의 삶이 안정적으로 유지되기를 기대할 수 있습니다. 상황을 완벽히 통제하려면 행성의 치안도 강화해야 한다는 점을 잊어서는 안 됩니다."
 SpecialProjectCompletedEvents.1014.Name:0 "지하 세계 침투: §G성공§!"
 SpecialProjectCompletedEvents.1015.Desc:0 "임무는 성공적으로 완료되었습니다. 우리 생물학 전문가들은 자연의 균형을 최대한 맞추기 위해 행성에 들여올 동물의 수량과 종을 신중하게 선택했습니다. 그런데 함선들이 동물 화물을 내리는 동안 뜻밖에도 새로운 외계 동물군 종들이 동시에 발견되었습니다. 활동적인 생명체가 거의 없던 §Y[special_project_target.GetName]§! 식민지는 이제 많은 연구의 원천이 될 것입니다."
 SpecialProjectCompletedEvents.1015.Name:0 "외계 동물군 도입: §G성공§!"
 SpecialProjectCompletedEvents.1016.Desc:0 "§Y[special_project_target.GetName]§!에서 '완벽한 밤'을 완벽하게 재현할 수 있는 예술가를 가리는 대회가 시작되었습니다. 우리 모든 영토의 사람들이 이 행사에 참여하기 위해 모이고 있으며, 이는 수년 동안 위대함과 행복을 가져올 것으로 보입니다. 이 모든 것은 행성의 편의 생산을 오랜 기간 크게 증가시킬 것입니다."
 SpecialProjectCompletedEvents.1016.Name:0 "완벽한 밤: §G성공§!"
 SpecialProjectCompletedEvents.1017.Desc:0 "§Y[special_project_target.GetName]§!의 지역 산업이 완성되었고, 이제 행성의 합금과 소비재 산출이 크게 증가할 것임을 확인할 수 있습니다. 이는 가까운 미래에 이 자원들의 추가 투자에서 우리에게 큰 도움이 될 것입니다."
 SpecialProjectCompletedEvents.1017.Name:0 "지역 산업: §G성공§!"
 SpecialProjectCompletedEvents.1018.Desc:0 "§Y[special_project_target.GetName]§!의 소비재 배송이 완료되었습니다. 이제 행성의 부가 더욱 증가해, 이 기간 동안 그 식민지가 더 많은 소비재를 생산할 수 있을 것으로 추정할 수 있습니다."
 SpecialProjectCompletedEvents.1018.Name:0 "소비재 배송: §G성공§!"
 SpecialProjectCompletedEvents.1019.Desc:0 "연구가 완료되었고, 모두의 놀라움 속에 §Y[special_project_target.GetName]§!에서 목격된 별똥별 무리가 우리 은하 안에 직접 존재하는 것이 아니라, 아직 우리가 도달할 수 없는 먼 성단 안에 더 가까이 있다는 사실을 확인할 수 있습니다. 어쩌면 미래에 우리가 그 먼 거리까지 도달할 수 있다면, 이 발견은 우리 영토의 일부가 될지도 모릅니다."
 SpecialProjectCompletedEvents.1019.Name:0 "$colony.9330.name$: §G성공§!"
 SpecialProjectCompletedEvents.102.Desc:0 "황폐한 죽은 행성 §Y[special_project_target.GetName]§!에 대한 연구는 대부분의 경우 매우 거대한 핵무기가 그 막대한 피해의 원인이었고, 결국 행성의 대기 전체를 바꾸었다고 결론지었습니다. 이곳에 어떤 문명이 살고 있었든, 그들은 그런 위험한 단계에 아직 준비되어 있지 않았던 것이 분명합니다."
 SpecialProjectCompletedEvents.102.Name:0 "죽은 행성 황폐화: §G성공§!"
 SpecialProjectCompletedEvents.1020.Desc:0 "§Y[special_project_target.GetName]§!의 영구 일식 연구가 완료되었고, 전문가들은 달이 약 10년 동안 행성에서 태양을 가리는 특이한 궤적을 계속 유지할 것이라고 계산했습니다. 또한 이 현상으로 현지 주민들이 하루 중 더 긴 시간을 잠들게 되어, 그 기간 동안 편의 필요량이 줄어든 것으로 보입니다."
 SpecialProjectCompletedEvents.1020.Name:0 "영구 일식: §G성공§!"
 SpecialProjectCompletedEvents.1021.Desc:0 "지도자 회의가 완료되었고, 통치자는 모든 지도자에게 특권 덕분에 유지비를 크게 줄이고 소비재를 지나치게 낭비하지 않는 방법을 가르쳤습니다. 이 작은 변화는 우리 경제를 조금 더 안정시키는 데 도움이 될 것입니다."
 SpecialProjectCompletedEvents.1021.Name:0 "지도자 회의: §G성공§!"
 SpecialProjectCompletedEvents.1022.Desc:0 "국가에 대한 완전한 검토가 완료되었고, 보고서는 국가의 통치자에게 전달되었습니다. 이제 우리가 확실한 파멸로 향하고 있지 않기만을 바랄 뿐입니다..."
 SpecialProjectCompletedEvents.1022.Name:0 "국가 검토: §G성공§!"
 SpecialProjectCompletedEvents.1023.Desc:0 "특수 프로젝트가 완료되었습니다. 이제 모든 식민지와 항성기지가 국가 시장에 참여함에 따라 우리 국가의 무역 가치는 한동안 크게 증가할 것이며, 가까운 미래에 에너지 크레딧 수입을 개선할 수 있을 것입니다."
 SpecialProjectCompletedEvents.1023.Name:0 "국가 시장: §G성공§!"
 SpecialProjectCompletedEvents.1024.Desc:0 "공학 프로젝트가 완료되었고 장치가 모든 기계 POP에 설치되었습니다. 이제 이들이 작동하는 데 필요한 에너지가 크게 감소했음을 확인할 수 있으며, 덕분에 우리는 이 자원을 다른 곳에 사용할 수 있을 것입니다."
 SpecialProjectCompletedEvents.1024.Name:0 "기계 유지비: §G성공§!"
 SpecialProjectCompletedEvents.1025.Desc:0 "드디어 레이더 장치가 설치되었습니다. 이제 우리 스캐너의 범위가 증가했음을 확인할 수 있으며, 주변의 현재 또는 미래 위협에 대한 대비 능력을 높일 수 있습니다."
 SpecialProjectCompletedEvents.1025.Name:0 "레이더 업그레이드: §G성공§!"
 SpecialProjectCompletedEvents.1026.Desc:0 "대규모 중력 조작장이 거의 모든 식민지에 설치되어 물리학자들이 많은 새로운 실험을 시작할 수 있게 되었습니다. 이 기능은 일정 기간 물리학 연구 분야를 크게 향상시키는 데 도움이 될 것입니다."
 SpecialProjectCompletedEvents.1026.Name:0 "중력 조작: §G성공§!"
 SpecialProjectCompletedEvents.1027.Desc:0 "드디어 우리 국경 안의 무역로에서 상인들의 안전을 보장할 임시 치안 지부를 출범시키기에 충분한 함선과 인원을 모았습니다. 그들은 대부분의 소형 및 중형 자원 수송선을 보호할 수 있을 것입니다. 그러나 무역량이 매우 높은 수준에 도달하기 시작하면 해적 행위도 더 강해질 것이고, 해군이 조치를 취해야 할 것입니다."
 SpecialProjectCompletedEvents.1027.Name:0 "$MOD_STARBASE_TRADE_PROTECTION_ADD$: §G성공§!"
 SpecialProjectCompletedEvents.1028.Desc:0 "탐사정 스캔이 완료되었습니다. 탐사정은 우리 모성계에서 아주 먼 위치까지는 도달하지 못했던 것으로 보입니다. 우리가 확인할 수 있는 것은 기계가 받은 손상이 엄청난 속도로 움직이는 소행성대에 의해 발생했다는 사실뿐입니다. 하지만 탐사정은 데이터 저장 한계에 도달할 때까지 상당한 수의 행성을 스캔하는 데 성공했습니다. 이제 위험 없이 인양할 수 있습니다."
 SpecialProjectCompletedEvents.1028.Name:0 "탐사정 회수: §G성공§!"
 SpecialProjectCompletedEvents.1029.Desc:0 "§Y[special_project_target.GetName]§! 성계에서 진행된 웜홀 요격 작전 훈련 시뮬레이션은 성공적이었습니다. 우리 해군은 이제 웜홀에서 곧바로 근접 전투로 튀어나오는 적 함대에 대해 우위를 점할 준비가 되었다고 생각합니다."
 SpecialProjectCompletedEvents.1029.Name:0 "해군 웜홀 훈련: §G성공§!"
 SpecialProjectCompletedEvents.103.Desc:0 "해냈습니다. §Y[special_project_target.GetName]§! 블랙홀이 수집 준비가 된 상당한 양의 암흑물질을 생성하기로 한 위치를 찾아내는 데 성공했습니다."
 SpecialProjectCompletedEvents.103.Name:0 "암흑물질의 구멍: §G성공§!"
 SpecialProjectCompletedEvents.104.Desc:0 "뉴트로늄의 근원이 §Y[special_project_target.GetName]§! 근처에 형성되었고, 이제 이를 활용할 수 있습니다."
 SpecialProjectCompletedEvents.104.Name:0 "중성자 자기장: §G성공§!"
 SpecialProjectCompletedEvents.105.Desc:0 "우리 과학자는 §Y[special_project_target.GetName]§!에서 나오는 거대한 폭발을 관측했습니다. 그들은 이렇게 아름다운 빛을 본 적이 없다고 주장합니다. 이 사건은 포착되어 실제로 이를 분석 중인 많은 물리학자 팀에게 방송되었습니다."
 SpecialProjectCompletedEvents.105.Name:0 "펄서 물리 왜곡: §G성공§!"
 SpecialProjectCompletedEvents.106.Desc:0 "§Y[special_project_target.GetName]§!의 고대 AI는 공학 분야에서 많은 흥미로운 정보를 드러냈지만, 에너지원이 곧 바닥날 것으로 보입니다. 기계가 너무 무거워 운반할 수 없기 때문에, 우리 기술자들은 추가 연구를 위해 이를 온라인 상태로 유지할 비상 발전기를 가져오기로 결정했습니다."
 SpecialProjectCompletedEvents.106.Name:0 "고대 AI: §G성공§!"
 SpecialProjectCompletedEvents.107.Desc:0 "§Y[special_project_target.GetName]§!의 해적 은신처 공격은 성공적이었습니다. 해적 선원 전원이 체포되었고 보물도 발견되었습니다."
 SpecialProjectCompletedEvents.107.Name:0 "해적 보물 수색: §G성공§!"
 SpecialProjectCompletedEvents.108.Desc:0 "§Y[special_project_target.GetName]§!의 전초기지 강습은 성공적이었고, 모든 범죄자가 무력화되었습니다. 철저한 조사 끝에 그 전초기지를 담당하던 과학 팀의 시신을 발견했습니다. 슬픈 이야기지만, 적어도 그들이 작업하던 결과는 사용할 수 있습니다."
 SpecialProjectCompletedEvents.108.Name:0 "전초기지 강습: §G성공§!"
 SpecialProjectCompletedEvents.109.Desc:0 "$SpecialProjectCompletedEvents.110.Desc$"
 SpecialProjectCompletedEvents.109.Name:0 "거대 균열 왜곡: §G성공§!"
 SpecialProjectCompletedEvents.11.Desc:0 "§Y[special_project_target.GetName]§! 탐사는 성공했습니다. 열정적인 과학 팀은 필요한 정보 대부분을 수집했고, 그 용암 행성에서 발견한 유용한 모든 것에 대한 보고서를 우리에게 제출했습니다. 그들은 앞으로 새로운 행성에서 가능한 다른 탐사에 매우 들떠 있습니다."
 SpecialProjectCompletedEvents.11.Name:0 "용암 행성 탐사: §G성공§!"
 SpecialProjectCompletedEvents.110.Desc:0 "§Y[special_project_target.GetName]§!의 균열 탐사는 매우 결실 있는 것으로 드러났습니다. 매우 다양한 생물 다양성과 많은 희귀 광물이 발견되었습니다."
 SpecialProjectCompletedEvents.110.Name:0 "링월드 조사: §G성공§!"
 SpecialProjectCompletedEvents.111.Desc:0 "그들이 옳았습니다. §Y[special_project_target.GetName]§!에서 전략 자원을 발견했습니다. 어쩌면 우리 국경 안의 모든 행성을 한 번 더 조사해야 할지도 모릅니다."
 SpecialProjectCompletedEvents.111.Name:0 "전략 자원: §G성공§!"
 SpecialProjectCompletedEvents.112.Desc:0 "일시적 웜홀이 닫혔습니다. 여기서 유용한 것을 알아낼 수 있을지 지켜봅시다."
 SpecialProjectCompletedEvents.112.Name:0 "일시적 웜홀: §G성공§!"
 SpecialProjectCompletedEvents.113.Desc:0 "건설 현장 수리는 성공적이었고, 단지는 우리 해군을 위한 새로운 함선을 건조할 수 있게 되었습니다."
 SpecialProjectCompletedEvents.113.Name:0 "고대 건설 현장: §G성공§!"
 SpecialProjectCompletedEvents.114.Desc:0 "로봇 개조 개선 프로젝트는 성공적이었습니다. 이제 기계 POP의 생산성을 높일 수 있습니다."
 SpecialProjectCompletedEvents.114.Name:0 "로봇 개조 개선: §G성공§!"
 SpecialProjectCompletedEvents.115.Desc:0 "유전적 개선 프로젝트는 성공적이었습니다. 이제 우리 인구의 유용성을 높일 수 있습니다."
 SpecialProjectCompletedEvents.115.Name:0 "유전적 개선: §G성공§!"
 SpecialProjectCompletedEvents.116.Desc:0 "우리 무기 체계의 개선은 성공적이었습니다. 함선과 지상군의 피해 산출이 크게 향상될 것입니다."
 SpecialProjectCompletedEvents.116.Name:0 "무기 개선: §G성공§!"
 SpecialProjectCompletedEvents.117.Desc:0 "방어막 개선은 성공적이었습니다. 우리는 물리학 분야에서 또 하나의 거대한 도약을 이루었습니다."
 SpecialProjectCompletedEvents.117.Name:0 "물리학 혁명: §G성공§!"
 SpecialProjectCompletedEvents.118.Desc:0 "우리는 하나의 국민이며, 함께 강하게 남을 것입니다. 우리의 운명은 가장 강대한 존재 중 하나가 되는 것으로 선택되었습니다."
 SpecialProjectCompletedEvents.118.Name:0 "통합에 대한 신뢰: §G성공§!"
 SpecialProjectCompletedEvents.119.Desc:0 "우리 해커들이 컨테이너를 여는 데 성공했습니다. 안에는 많은 귀중한 광물과 자원이 들어 있었습니다. 소문에 따르면 이 컨테이너는 왕국을 잃고 세금으로 거둔 모든 자원을 가지고 도망치려던 고대 왕의 전리품이었다고 합니다."
 SpecialProjectCompletedEvents.119.Name:0 "해킹 가능성: §G성공§!"
 SpecialProjectCompletedEvents.12.Desc:0 "§Y[special_project_target.GetName]§! 탐사는 성공했습니다. 열정적인 과학 팀은 필요한 정보 대부분을 수집했고, 그 독성 행성에서 발견한 유용한 모든 것에 대한 보고서를 우리에게 제출했습니다. 그들은 앞으로 새로운 행성에서 가능한 다른 탐사에 매우 들떠 있습니다."
 SpecialProjectCompletedEvents.12.Name:0 "독성 행성 탐사: §G성공§!"
 SpecialProjectCompletedEvents.120.Desc:0 "최종 강습이 시작되었습니다. 우리 측 사상자 수를 말하기는 어렵습니다. 하지만 우리 병력의 지휘관은 적이 무력화되었음을 확인했습니다. 과학자는 스스로 목숨을 끊었지만, 우리는 그들의 모든 물자를 확보했습니다."
 SpecialProjectCompletedEvents.120.Name:0 "클론 군대: §G성공§!"
 SpecialProjectCompletedEvents.121.Desc:0 "거대한 뇌 같은 생명체가 확보되었습니다. 전기 충격 장치의 도움으로 군체 의식은 정지되었고 모든 '좀비'가 즉시 움직임을 멈췄습니다. 우리 군사 전문가들은 그 행성에서 이런 위기가 다시 일어나는 것을 피하기 위해 모든 시체를 파괴해야 한다고 강하게 주장합니다."
 SpecialProjectCompletedEvents.121.Name:0 "군체 의식 무리: §G성공§!"
 SpecialProjectCompletedEvents.122.Desc:0 "'여왕', 적어도 우리가 그 큰 어미 같은 외계종에게 붙인 이름의 존재는 조종석에 누워 매우 빠르게 수백 개의 알을 낳고 있었습니다. 우리는 그런 크기의 존재가 침공의 근원일 가능성이 높다는 것을 알고 있었기에, 그녀를 처리하기 위해 중화기를 가져왔습니다. 임무는 성공으로 끝났지만, 이 외계종들이 기지를 감염시켰을 때 승무원들이 어떤 악몽을 견뎌야 했는지는 아직 상상할 수 없습니다."
 SpecialProjectCompletedEvents.122.Name:0 "감염된 기지: §G성공§!"
 SpecialProjectCompletedEvents.123.Desc:0 "우리는 마지막 괴물까지 무력화했습니다. 항복을 권유하는 많은 제안에도 불구하고 그들은 끝까지 우리에게 적대적이었고, 결국 대부분을 말살하는 것 외에는 선택지가 없었습니다."
 SpecialProjectCompletedEvents.123.Name:0 "깊은 곳에서 온 괴물: §G성공§!"
 SpecialProjectCompletedEvents.124.Desc:0 "공격적인 원시종들은 진압되었습니다. 그들이 왜 그렇게 적대적인지는 아직 알기 어렵지만, 해결책을 찾기 위해 당분간은 살려 둘 것입니다."
 SpecialProjectCompletedEvents.124.Name:0 "공격적인 원시종: §G성공§!"
 SpecialProjectCompletedEvents.125.Desc:0 "모든 사이버네틱 병사가 파괴되었습니다. 기계 공장은 확보되었고, 철거 전문가 팀이 공장을 파괴하기 위해 이동 중입니다."
 SpecialProjectCompletedEvents.125.Name:0 "사이버네틱 부대: §G성공§!"
 SpecialProjectCompletedEvents.126.Desc:0 "테러리스트 집단이 무력화되었습니다. 그들의 위치는 확보되었고 물자는 압수되었습니다."
 SpecialProjectCompletedEvents.126.Name:0 "테러리스트 집단: §G성공§!"
 SpecialProjectCompletedEvents.127.Desc:0 "준군사주의 파벌을 제거했습니다. 그들의 기지는 확보되었고 전리품은 압수되었습니다."
 SpecialProjectCompletedEvents.127.Name:0 "준군사주의 파벌: §G성공§!"
 SpecialProjectCompletedEvents.128.Desc:0 "아메바 대모와 그 자손들이 더 이상 우리를 방해하지 않을 장소로 유인할 방법을 찾아냈습니다."
 SpecialProjectCompletedEvents.128.Name:0 "아메바 대모: §G성공§!"
 SpecialProjectCompletedEvents.129.Desc:0 "그 웜홀을 만든 것이 무엇이든, 우리가 안으로 들어가 확인하는 것은 불가능했습니다. 그래서 우리는 그것을 완전히 닫기로 결정했습니다."
 SpecialProjectCompletedEvents.129.Name:0 "웜홀에서 온 적대 세력: §G성공§!"
 SpecialProjectCompletedEvents.13.Desc:0 "§Y[special_project_target.GetName]§!의 착륙 시험은 성공적이었습니다. 민간 기업은 대륙 행성에 대해 필요한 정보 대부분을 수집했고, 우리가 그들과 함께 보낸 팀도 시험 중에 매우 유용한 관찰을 수행했습니다."
 SpecialProjectCompletedEvents.13.Name:0 "대륙 행성 착륙 시험: §G성공§!"
 SpecialProjectCompletedEvents.130.Desc:0 "$SpecialProjectCompletedEvents.69.Desc$"
 SpecialProjectCompletedEvents.130.Name:0 "중형 호송대 습격: §G성공§!"
 SpecialProjectCompletedEvents.131.Desc:0 "민간인들의 함선을 수리했습니다. 그들은 매우 감사해하며 우리 성계의 집으로 돌아갑니다."
 SpecialProjectCompletedEvents.131.Name:0 "민간선 해적 공격: §G성공§!"
 SpecialProjectCompletedEvents.132.Desc:0 "잔해 분석을 완료했고, 유용한 것은 모두 수집되었습니다."
 SpecialProjectCompletedEvents.132.Name:0 "우주 전투 잔해: §G성공§!"
 SpecialProjectCompletedEvents.133.Desc:0 "기지의 잔해가 분석되었습니다. 우리 과학자들은 내부에서 유용한 기술 일부를 발견했다고 확인했습니다."
 SpecialProjectCompletedEvents.133.Name:0 "파괴된 우주 기지: §G성공§!"
 SpecialProjectCompletedEvents.134.Desc:0 "둥지에서 모든 수정 개체를 몰아내는 데 성공했으며, 이제 둥지를 파괴할 수 있습니다. 그런 거대한 둥지가 다시는 지어지지 않기를 바랍니다."
 SpecialProjectCompletedEvents.134.Name:0 "수정 번식 군체: §G성공§!"
 SpecialProjectCompletedEvents.135.Desc:0 "천문학자들이 §Y[special_project_target.GetName]§! 연구를 마쳤습니다. 그들은 보고서 사본을 보내왔습니다."
 SpecialProjectCompletedEvents.135.Name:0 "쌍성 연구: §G성공§!"
 SpecialProjectCompletedEvents.136.Desc:0 "§Y[special_project_target.GetName]§! 연구가 완료되었습니다. 그 '붕괴성'은 우리가 이전에 한 번도 보지 못했던 많은 새로운 현상을 보여 주었습니다."
 SpecialProjectCompletedEvents.136.Name:0 "붕괴성 연구: §G성공§!"
 SpecialProjectCompletedEvents.137.Desc:0 "§Y[special_project_target.GetName]§!의 고대 탑 조사가 완료되었습니다. 수백 차례의 회의 이야기를 담은 일부 기록 보관소가 발견되었으며, 이는 우리 수도에서 연구될 수 있습니다."
 SpecialProjectCompletedEvents.137.Name:0 "고대 탑: §G성공§!"
 SpecialProjectCompletedEvents.138.Desc:0 "'위험한 행성' 탐사가 끝났습니다. 엄청난 위험과 죽음의 가능성에도 불구하고, 베테랑 탐험가 집단은 §Y[special_project_target.GetName]§!에서 가장 흥미로운 부분을 완전히 탐사하는 데 성공했습니다."
 SpecialProjectCompletedEvents.138.Name:0 "위험한 행성: §G성공§!"
 SpecialProjectCompletedEvents.139.Desc:0 "§Y[special_project_target.GetName]§!의 부유 섬 연구는 그들이 어떻게 날 수 있었는지 밝혀냈습니다. 각 섬의 중심에 자연 중력장이 형성된 것으로 보이며, 대부분의 암석이 다른 행성에서 온 것임을 확인했습니다. 이는 그들이 온 원래 행성을 찾아낼 수 있다면 이 과정 뒤의 진짜 비밀을 발견할 수도 있음을 설명합니다."
 SpecialProjectCompletedEvents.139.Name:0 "부유 섬: §G성공§!"
 SpecialProjectCompletedEvents.14.Desc:0 "§Y[special_project_target.GetName]§!의 착륙 시험은 성공적이었습니다. 민간 기업은 열대 행성에 대해 필요한 정보 대부분을 수집했고, 우리가 그들과 함께 보낸 팀도 시험 중에 매우 유용한 관찰을 수행했습니다."
 SpecialProjectCompletedEvents.14.Name:0 "열대 행성 착륙 시험: §G성공§!"
 SpecialProjectCompletedEvents.140.Desc:0 "§Y[special_project_target.GetName]§!의 지옥의 숲에 있는 나무의 구성은 흑요석뿐 아니라 일종의 탄소도 포함하고 있어 나무가 불에 충분히 견딜 수 있게 해 줍니다. 심지어 씨앗도 마찬가지라, 미래 세대의 성장을 가능하게 합니다."
 SpecialProjectCompletedEvents.140.Name:0 "지옥의 숲: §G성공§!"
 SpecialProjectCompletedEvents.141.Desc:0 "§Y[special_project_target.GetName]§!의 용암 요새는 도구 한 조각도 없이 맨손으로 지어진 것으로 보입니다. 이 정보를 통해 우리는 그 행성에서 살아남은 종족이 혹독한 생활 조건에 자연적으로 적응했으리라고 추정할 수 있습니다."
 SpecialProjectCompletedEvents.141.Name:0 "용암 요새: §G성공§!"
 SpecialProjectCompletedEvents.142.Desc:0 "§Y[special_project_target.GetName]§! 행성의 중심부가 주변의 구멍에 완벽히 맞아 있지 않아 한쪽에서 다른 쪽으로 움직일 수 있고, 그 결과 행성 반대편에서 자기 활동이 발생하는 것으로 보입니다."
 SpecialProjectCompletedEvents.142.Name:0 "자기 활동: §G성공§!"
 SpecialProjectCompletedEvents.143.Desc:0 "§Y[special_project_target.GetName]§!의 '달의 궁전' 탐사가 완료되었고, 팀은 보고서 사본을 보내왔습니다."
 SpecialProjectCompletedEvents.143.Name:0 "달의 궁전 발견: §G성공§!"
 SpecialProjectCompletedEvents.144.Desc:0 "§Y[special_project_target.GetName]§!의 선구자 도시 탐사가 완료되었습니다. 탐험가 팀은 도시가 어떻게 건설되었고 그 목적이 무엇이었는지를 설명하는 보고서 사본을 보내왔습니다."
 SpecialProjectCompletedEvents.144.Name:0 "선구자 도시 발견: §G성공§!"
 SpecialProjectCompletedEvents.145.Desc:0 "§Y[special_project_target.GetName]§!의 고대 전장 연구가 완료되었습니다. 고고학자 집단이 전투의 세부 사항을 설명하는 보고서 사본을 보내왔습니다."
 SpecialProjectCompletedEvents.145.Name:0 "고대 전장 연구: §G성공§!"
 SpecialProjectCompletedEvents.146.Desc:0 "§Y[special_project_target.GetName]§!의 거대 화석 연구가 완료되었고, 고고학자 팀은 연구 보고서를 보내왔습니다. 뼈의 상처 위치로 볼 때 이 거대 생물은 같은 종의 다른 개체와 싸웠던 것으로 보이며, 이는 이곳에 혼자 있던 것이 아니고 앞으로 더 많은 거대 사체가 발견될 수 있음을 의미합니다."
 SpecialProjectCompletedEvents.146.Name:0 "거대 외계 화석: §G성공§!"
 SpecialProjectCompletedEvents.147.Desc:0 "'경이로운 행성' §Y[special_project_target.GetName]§!의 탐사가 완료되었습니다. 박물관으로 보낼 좋은 사진도 몇 장 촬영되었습니다."
 SpecialProjectCompletedEvents.147.Name:0 "경이로운 행성 연구: §G성공§!"
 SpecialProjectCompletedEvents.148.Desc:0 "고급 발전소 건설이 완료되어 에너지 산출 생산량을 증가시킬 수 있게 되었습니다."
 SpecialProjectCompletedEvents.148.Name:0 "고급 발전소: §G성공§!"
 SpecialProjectCompletedEvents.149.Desc:0 "§Y[special_project_target.GetName]§!의 발명가가 만든 프로젝트가 완료되었고, 삶의 질이 크게 향상되었습니다."
 SpecialProjectCompletedEvents.149.Name:0 "증강 민간 시스템: §G성공§!"
 SpecialProjectCompletedEvents.15.Desc:0 "§Y[special_project_target.GetName]§!의 착륙 시험은 성공적이었습니다. 민간 기업은 해양 행성에 대해 필요한 정보 대부분을 수집했고, 우리가 그들과 함께 보낸 팀도 시험 중에 매우 유용한 관찰을 수행했습니다."
 SpecialProjectCompletedEvents.15.Name:0 "해양 행성 착륙 시험: §G성공§!"
 SpecialProjectCompletedEvents.150.Desc:0 "에너지 그리드의 도움으로 §Y[special_project_target.GetName]§!의 초과 에너지 활용이 완전히 완료되었습니다."
 SpecialProjectCompletedEvents.150.Name:0 "에너지 그리드 프로젝트: §G성공§!"
 SpecialProjectCompletedEvents.151.Desc:0 "§Y[special_project_target.GetName]§!의 대도시 프로젝트가 완료되었습니다. 건설자들은 작업을 마쳐 그 도시에서 나오는 영향력을 증가시켰습니다."
 SpecialProjectCompletedEvents.151.Name:0 "대도시 프로젝트: §G성공§!"
 SpecialProjectCompletedEvents.152.Desc:0 "§Y[special_project_target.GetName]§!의 채굴 기지 업그레이드는 성공적이었고, 개선 기간 동안 놀라운 양의 광물이 생산되었습니다."
 SpecialProjectCompletedEvents.152.Name:0 "채굴 업그레이드: §G성공§!"
 SpecialProjectCompletedEvents.153.Desc:0 "§Y[special_project_target.GetName]§!의 토착민 집단과의 소통은 문제 없이 완료되었습니다. 이 외계종들은 매우 평화주의적이고 외계종 선호적인 것으로 보입니다. 그들은 우리의 관습에 관심을 보이고 있습니다. 우리 국민과 그들 사이의 적절한 상호작용을 가능하게 하는 사회 센터가 개설되었습니다."
 SpecialProjectCompletedEvents.153.Name:0 "토착민 상호작용: §G성공§!"
 SpecialProjectCompletedEvents.154.Desc:0 "새 대학 개발을 완료했습니다. 이제 우리 지도자와 국민은 지식을 쉽게 늘릴 수 있는 중심 장소를 찾을 수 있을 것입니다."
 SpecialProjectCompletedEvents.154.Name:0 "대학 개발: §G성공§!"
 SpecialProjectCompletedEvents.155.Desc:0 "새 저장고 건설이 완료되어 우리 국가의 자원 저장 용량이 증가했습니다."
 SpecialProjectCompletedEvents.155.Name:0 "저장고 개발: §G성공§!"
 SpecialProjectCompletedEvents.156.Desc:0 "생산성 센터가 완성되었고, 일정 기간 우리 인구의 자원 산출 생산량이 증가할 것입니다."
 SpecialProjectCompletedEvents.156.Name:0 "생산성 센터: §G성공§!"
 SpecialProjectCompletedEvents.157.Desc:0 "추진기 개조가 우리 함선에 성공적으로 적용되었습니다. 일시적이기는 하지만 우리 함선은 이제 이전보다 훨씬 더 빠르게 목적지에 도달할 수 있습니다."
 SpecialProjectCompletedEvents.157.Name:0 "추진기 개조: §G성공§!"
 SpecialProjectCompletedEvents.158.Desc:0 "'영향력의 궁전'이 모든 행성에 건설되었습니다. 무료 방문을 통해 우리 인구는 우리가 이 시대에 도달하기 위해 기울인 모든 노력을 더 잘 이해할 수 있습니다. 그러므로 우리는 함께 통합된 상태로 남아야 합니다."
 SpecialProjectCompletedEvents.158.Name:0 "영향력의 궁전: §G성공§!"
 SpecialProjectCompletedEvents.159.Desc:0 "다른 제국과 단순한 관계를 수립하는 데 성공했습니다. 지금은 그들 중 일부가 우리의 경쟁자나 적일 수도 있지만, 우리는 여전히 공통의 관심 지점을 찾으려 할 것입니다."
 SpecialProjectCompletedEvents.159.Name:0 "외계종 연합: §G성공§!"
 SpecialProjectCompletedEvents.16.Desc:0 "§Y[special_project_target.GetName]§!의 착륙 시험은 성공적이었습니다. 민간 기업은 사막 행성에 대해 필요한 정보 대부분을 수집했고, 우리가 그들과 함께 보낸 팀도 시험 중에 매우 유용한 관찰을 수행했습니다."
 SpecialProjectCompletedEvents.16.Name:0 "사막 행성 착륙 시험: §G성공§!"
 SpecialProjectCompletedEvents.160.Desc:0 "외계종 위계 조직이 완료되었으며, 이는 다른 종의 인구에는 지나치게 큰 영향을 주지 않으면서 우리의 주 종족 인구에 큰 영향을 줄 것입니다."
 SpecialProjectCompletedEvents.160.Name:0 "외계종 위계: §G성공§!"
 SpecialProjectCompletedEvents.161.Desc:0 "§Y[special_project_target.GetName]§!의 상황을 통제했습니다. 반란군 지도자들은 무력화되었고 전투는 멈췄습니다."
 SpecialProjectCompletedEvents.161.Name:0 "반란 전투: §G성공§!"
 SpecialProjectCompletedEvents.162.Desc:0 "§Y[special_project_target.GetName]§!의 바다 괴물 사냥이 완료되었고, 이제 그들의 개체 수가 조절되었습니다."
 SpecialProjectCompletedEvents.162.Name:0 "바다 괴물 사냥: §G성공§!"
 SpecialProjectCompletedEvents.163.Desc:0 "우리 군사 병력은 모든 거대 자동 전차를 파괴하는 데 성공했습니다. 대부분 시뮬레이션 프로그램으로 구성된 공장이 그들을 통제하고 있었던 것으로 보입니다. 그것을 비활성화하자 전차들은 작동을 멈췄습니다."
 SpecialProjectCompletedEvents.163.Name:0 "거대 전차 전쟁: §G성공§!"
 SpecialProjectCompletedEvents.164.Desc:0 "§Y[special_project_target.GetName]§!의 전투가 끝났습니다. 우리는 적을 무력화하고 동굴에 피신해 있던 관광객들을 구출했습니다."
 SpecialProjectCompletedEvents.164.Name:0 "봉쇄 돌파: §G성공§!"
 SpecialProjectCompletedEvents.165.Desc:0 "전문가 집단은 에너지를 지나치게 낭비하지 않고 관문을 사용하는 방법을 찾아냈고, 덕분에 앞으로 더 많은 에너지를 절약할 수 있게 되었습니다. 우리는 이 구조물을 완벽히 숙달하지 못했던 것으로 보입니다."
 SpecialProjectCompletedEvents.165.Name:0 "관문 조사: §G성공§!"
 SpecialProjectCompletedEvents.17.Desc:0 "§Y[special_project_target.GetName]§!의 착륙 시험은 성공적이었습니다. 민간 기업은 사바나 행성에 대해 필요한 정보 대부분을 수집했고, 우리가 그들과 함께 보낸 팀도 시험 중에 매우 유용한 관찰을 수행했습니다."
 SpecialProjectCompletedEvents.17.Name:0 "사바나 행성 착륙 시험: §G성공§!"
 SpecialProjectCompletedEvents.18.Desc:0 "§Y[special_project_target.GetName]§!의 착륙 시험은 성공적이었습니다. 민간 기업은 건조 행성에 대해 필요한 정보 대부분을 수집했고, 우리가 그들과 함께 보낸 팀도 시험 중에 매우 유용한 관찰을 수행했습니다."
 SpecialProjectCompletedEvents.18.Name:0 "건조 행성 착륙 시험: §G성공§!"
 SpecialProjectCompletedEvents.19.Desc:0 "$SpecialProjectCompletedEvents.20.Desc$"
 SpecialProjectCompletedEvents.19.Name:0 "$SpecialProjectCompletedEvents.20.Name$"
 SpecialProjectCompletedEvents.2.Desc:0 "§Y[special_project_target.GetName]§!의 지하 체계에 도달하는 데 성공했습니다. 이로써 행성의 광물 산출이 증가했으며, 일부 초과 광물이 직접 수집되었을 가능성도 있습니다."
 SpecialProjectCompletedEvents.2.Name:0 "행성 광물 추출: §G성공§!"
 SpecialProjectCompletedEvents.20.Desc:0 "§Y[special_project_target.GetName]§!의 착륙 시험은 성공적이었습니다. 민간 기업은 극지 행성에 대해 필요한 정보 대부분을 수집했고, 우리가 그들과 함께 보낸 팀도 시험 중에 매우 유용한 관찰을 수행했습니다."
 SpecialProjectCompletedEvents.20.Name:0 "극지 행성 착륙 시험: §G성공§!"
 SpecialProjectCompletedEvents.201.Desc:0 "$SpecialProjectCompletedEvents.69.Desc$"
 SpecialProjectCompletedEvents.201.Name:0 "대형 호송대 습격: §G성공§!"
 SpecialProjectCompletedEvents.202.Desc:0 "§Y[special_project_target.GetName]§!의 베테랑 탐험가 팀이 자신들을 죽이려는 공격적인 식물군에도 불구하고 마침내 행성 숲 대부분을 탐사하고 연구하는 데 성공했습니다."
 SpecialProjectCompletedEvents.202.Name:0 "공격적인 식물군: §G성공§!"
 SpecialProjectCompletedEvents.203.Desc:0 "블랙홀 §Y[special_project_target.GetName]§!의 크기가 증가했습니다. 그 근처의 연구 기지는 분명 효율적인 연구를 수행할 수 있을 것입니다."
 SpecialProjectCompletedEvents.203.Name:0 "성장하는 블랙홀: §G성공§!"
 SpecialProjectCompletedEvents.204.Desc:0 "§Y[special_project_target.GetName]§!이 기계 행성으로 변하는 것을 완료했습니다. 그곳에서 발견된 모든 건물은 오래된 원형일 뿐이며 사용할 수 없습니다. 이 행성은 기계만 식민지화할 수 있습니다. 생물학적 생명체를 지원하려면 테라포밍해야 할 것입니다."
 SpecialProjectCompletedEvents.204.Name:0 "기계 행성 감지: §G성공§!"
 SpecialProjectCompletedEvents.205.Desc:0 "§Y[special_project_target.GetName]§!의 '라그나로크' 종말 사건을 가속하는 데 성공했습니다. 행성은 파괴되어 산산조각난 행성으로 변했습니다."
 SpecialProjectCompletedEvents.205.Name:0 "행성 라그나로크: §G성공§!"
 SpecialProjectCompletedEvents.206.Desc:0 "생물학 전문가 팀이 §Y[special_project_target.GetName]§! 연구를 마쳤습니다. 가이아 행성은 원래 은하의 모든 개체가 함께 살아갈 수 있는 행성을 만들고자 했던 외계종 선호 성향의 고대 선구자 종족이 창조한 것으로 보입니다."
 SpecialProjectCompletedEvents.206.Name:0 "가이아 행성 연구: §G성공§!"
 SpecialProjectCompletedEvents.207.Desc:0 "§Y[special_project_target.GetName]§!의 테라포밍 과정이 완료되어, 거주 불가능했던 행성이 거주 가능 행성으로 바뀌었습니다."
 SpecialProjectCompletedEvents.207.Name:0 "테라포밍 구조물: §G성공§!"
 SpecialProjectCompletedEvents.208.Desc:0 "'펄서 시계' 연구가 완료되었습니다. 어떻게든 §Y[special_project_target.GetName]§!이 우리가 만든 것처럼 매초 충격파가 나오는 시간과 비교할 수 있는 상태에 있었음을 확인할 수 있습니다. 우주에서 길을 잃었을 때 펄서를 거대한 시계로 사용할 수 있으리라고 누가 생각했겠습니까."
 SpecialProjectCompletedEvents.208.Name:0 "펄서 시계 활동: §G성공§!"
 SpecialProjectCompletedEvents.209.Desc:0 "§Y[special_project_target.GetName]§!의 얼어붙은 시간 연구가 완료되었습니다. 우리 과학 팀은 많은 발견을 했고 보고서를 보내왔습니다. 또한 행성이 다시 자전을 시작해 시간이 계속 흐를 수 있게 된 것으로 보입니다."
 SpecialProjectCompletedEvents.209.Name:0 "시간이 얼어붙은 행성: §G성공§!"
 SpecialProjectCompletedEvents.21.Desc:0 "§Y[special_project_target.GetName]§!의 착륙 시험은 성공적이었습니다. 민간 기업은 툰드라 행성에 대해 필요한 정보 대부분을 수집했고, 우리가 그들과 함께 보낸 팀도 시험 중에 매우 유용한 관찰을 수행했습니다."
 SpecialProjectCompletedEvents.21.Name:0 "툰드라 행성 착륙 시험: §G성공§!"
 SpecialProjectCompletedEvents.210.Desc:0 "전문가 팀이 L-게이트 조사를 마쳤습니다. 그들은 앞으로 L-게이트를 더 효율적으로 사용할 방법을 발견한 것으로 보입니다. 또한 L-게이트 통찰을 발견할 가능성이 있다고 주장합니다."
 SpecialProjectCompletedEvents.210.Name:0 "L-게이트 조사: §G성공§!"
 SpecialProjectCompletedEvents.211.Desc:0 "우리 건설선들이 고대 조선소 수리를 마쳤습니다. 추가로 새로운 군사 함대 건조도 완료되었습니다."
 SpecialProjectCompletedEvents.211.Name:0 "고대 조선소 활성화: §G성공§!"
 SpecialProjectCompletedEvents.212.Desc:0 "과학자 팀이 §Y[special_project_target.GetName]§!에서 새로운 원형 애완동물 제작을 마쳤습니다. 이미 현지 주민들에게 판매되기 시작했습니다."
 SpecialProjectCompletedEvents.212.Name:0 "외계 원형 생물 제작: §G성공§!"
 SpecialProjectCompletedEvents.213.Desc:0 "§Y[special_project_target.GetName]§!에서 시작된 공학 프로젝트가 우리 건선거의 효율을 높이는 작업을 마쳤습니다. 이제 일정 기간 더 낮은 비용으로 함선을 건조할 수 있습니다."
 SpecialProjectCompletedEvents.213.Name:0 "개선된 건선거: §G성공§!"
 SpecialProjectCompletedEvents.214.Desc:0 "§Y[special_project_target.GetName]§! 개선을 완료했습니다. 이제 그 링월드의 주민들은 더 나은 효율로 일할 수 있을 것입니다."
 SpecialProjectCompletedEvents.214.Name:0 "링월드 개선: §G성공§!"
 SpecialProjectCompletedEvents.215.Desc:0 "§Y[special_project_target.GetName]§!에 거대 채굴 시설 건설을 마쳤습니다. 이제 행성은 새롭게 증가한 고정 광물 산출을 얻었습니다."
 SpecialProjectCompletedEvents.215.Name:0 "광물 급속 성장: §G성공§!"
 SpecialProjectCompletedEvents.216.Desc:0 "§Y[special_project_target.GetName]§!의 행성 우주 엘리베이터가 완성되었습니다. 이제 인구는 그 위치에서 더 빠른 속도로 수송될 수 있습니다."
 SpecialProjectCompletedEvents.216.Name:0 "우주 엘리베이터: §G성공§!"
 SpecialProjectCompletedEvents.217.Desc:0 "전역 사이오닉 훈련이 완료되었습니다. 이제 우리 국민은 삶의 질과 작업 효율을 높이기 위해 사이오닉 능력을 사용할 수 있게 되었습니다."
 SpecialProjectCompletedEvents.217.Name:0 "사이오닉 훈련: §G성공§!"
 SpecialProjectCompletedEvents.218.Desc:0 "우리 지성체들에게 기계-신경 장치를 이식하는 프로그램이 완료되었습니다. 그들은 더 나은 효율로 일할 수 있는 새로운 시대에 도달했습니다."
 SpecialProjectCompletedEvents.218.Name:0 "지성 AI 초월: §G성공§!"
 SpecialProjectCompletedEvents.219.Desc:0 "외교 협상이 시작되었습니다. 이제 기계 지성 국가들과의 관계가 우리 모두의 미래에 결실을 가져오기를 기대할 수 있습니다."
 SpecialProjectCompletedEvents.219.Name:0 "AI - 외계종 동맹: §G성공§!"
 SpecialProjectCompletedEvents.22.Desc:0 "§Y[special_project_target.GetName]§!의 짧은 '반사 단계'는 우리의 예측만큼 빠르게 지나갔고, 우리 과학 팀은 가장 명망 높은 박물관 중 하나에 전시될 매우 흥미로운 사진들을 찍을 수 있었습니다."
 SpecialProjectCompletedEvents.22.Name:0 "보라색 항성 반사: §G성공§!"
 SpecialProjectCompletedEvents.220.Desc:0 "우리는 결코 패배하지 않을 것이므로, 우리의 통합은 강하게 남아 외부에서 오는 모든 위험에 맞설 것입니다."
 SpecialProjectCompletedEvents.220.Name:0 "통합 저항: §G성공§!"
 SpecialProjectCompletedEvents.221.Desc:0 "우리 군사 병력이 마침내 군사 태스크포스 군대를 분쇄하는 데 성공했습니다. 그들은 마지막 힘과 마지막 구성원까지 싸웠고, 포획된 마지막 인원은 자살했습니다. 그들의 기원을 추적하는 것은 불가능하지만, 이제 적어도 그들의 진보된 장비를 연구할 수 있습니다."
 SpecialProjectCompletedEvents.221.Name:0 "태스크포스 전복: §G성공§!"
 SpecialProjectCompletedEvents.222.Desc:0 "우리 군사 병력이 §Y[special_project_target.GetName]§!의 괴물을 죽이는 데 성공했습니다. 그것이 무엇이었든, 모든 연구는 그것이 적대적이며 우리 국민을 죽이려 했음을 확인합니다. 이제 사체 연구를 시작해, 앞으로 더 많은 개체와 마주칠 경우 그 존재를 더 잘 이해할 수 있습니다."
 SpecialProjectCompletedEvents.222.Name:0 "어둠 속의 공포: §G성공§!"
 SpecialProjectCompletedEvents.223.Desc:0 "우리 군사 병력과 현지 보안군의 협력으로 거대한 로봇 군대를 물리쳤고 대형 공장들도 파괴되었습니다. 조사가 시작되었고 체포 소식도 들리기 시작했습니다. 이 재앙의 주범을 알아내기까지 오래 걸리지는 않을 것입니다."
 SpecialProjectCompletedEvents.223.Name:0 "대형 로봇 공장: §G성공§!"
 SpecialProjectCompletedEvents.224.Desc:0 "우리 군사 병력이 마침내 모든 거대 전쟁 기계를 격파했습니다. 그들의 장갑은 매우 견고했지만, 일부 약점이 지나치게 노출되지 않도록 감춰져 있어 완전히 파괴되기 전에 작동을 멈추게 만들 수 있었습니다. 이 기회로 기술자와 과학자 팀을 보내 그들의 무기와 장갑을 연구할 수 있습니다."
 SpecialProjectCompletedEvents.224.Name:0 "거대 기계 파괴: §G성공§!"
 SpecialProjectCompletedEvents.225.Desc:0 "적 기지에 대한 최종 공세를 시작했습니다. 그들의 강력한 방어에도 불구하고 우리 병사들은 돌파에 성공했고 건물을 제압했습니다. 적 지도자들은 발견되어 항복했습니다. 대규모 전쟁은 끝났고, 이제 이들이 누구였는지 이해하기 위한 심문과 조사가 시작될 수 있습니다."
 SpecialProjectCompletedEvents.225.Name:0 "대규모 전쟁 진행 중: §G성공§!"
 SpecialProjectCompletedEvents.226.Desc:0 "우리 군사 병력이 행성의 모든 반란군 기지를 장악하는 데 성공했습니다. 그들의 지도자들은 무력화되었고 §Y[special_project_target.GetName]§!의 통제권은 회복되었습니다."
 SpecialProjectCompletedEvents.226.Name:0 "격화되는 내전: §G성공§!"
 SpecialProjectCompletedEvents.227.Desc:0 "이 성계에서 공격을 시작한 모든 군사 함대에는 인원이 없었고, 대신 먼 곳의 근원에 의해 자동으로 통제되고 있었던 것으로 보입니다. 그 조종자들이 어디에 있는지는 현재로서는 알 수 없지만, 분명한 것은 그들이 매우 먼 거리에서 함대 전체를 통제할 만큼 강력한 기술을 가지고 있으며 이는 매우 위험하다는 사실입니다."
 SpecialProjectCompletedEvents.227.Name:0 "알 수 없는 적의 강습: §G성공§!"
 SpecialProjectCompletedEvents.228.Desc:0 "성계에 있던 모든 군사 기지를 파괴하는 데 성공했고, 그들의 기함도 탈취했으며 지도자들은 체포되었습니다."
 SpecialProjectCompletedEvents.228.Name:0 "통제된 성계: §G성공§!"
 SpecialProjectCompletedEvents.229.Desc:0 "이 모든 우주 태생 외계 생물들이 모여 함께 싸우게 된 원인을 알아냈습니다. 알 수 없는 종족이 미래의 군사 프로젝트를 위해 이들을 통제하려고 일종의 신경 처리 장치를 그들 안에 삽입했던 것으로 보입니다. 하지만 결국 사용하지 않았고, 시간이 지나 처리 장치가 손상되어 오작동을 일으키면서 현지 성계에 이 모든 문제를 발생시켰습니다."
 SpecialProjectCompletedEvents.229.Name:0 "우주 태생 생물 침공: §G성공§!"
 SpecialProjectCompletedEvents.23.Desc:0 "$SpecialProjectCompletedEvents.24.Desc$"
 SpecialProjectCompletedEvents.23.Name:0 "청색 항성 관측: §G성공§!"
 SpecialProjectCompletedEvents.230.Desc:0 "해적들을 성공적으로 처리하고 타이탄급 함선의 통제권을 확보했습니다. 이제 남은 것은 그 함선을 어떻게 할지 결정하는 일뿐입니다."
 SpecialProjectCompletedEvents.230.Name:0 "버려진 타이탄: §G성공§!"
 SpecialProjectCompletedEvents.231.Desc:0 "기지에 있던 기술을 우리 과학선으로 이전하는 데 성공했습니다. 그것들이 더 나은 연구를 위해 우리 수도에 도달하는 것은 시간문제일 것입니다."
 SpecialProjectCompletedEvents.231.Name:0 "고대 기술 은닉처: §G성공§!"
 SpecialProjectCompletedEvents.232.Desc:0 "AI 코어 연구가 완료되었습니다. 예상대로 우리는 매우 많은 양의 흥미로운 연구 데이터를 손에 넣었습니다."
 SpecialProjectCompletedEvents.232.Name:0 "AI 코어: §G성공§!"
 SpecialProjectCompletedEvents.233.Desc:0 "티얀키 여왕을 있던 위치에서 성공적으로 이동시켰습니다. 이제 그녀는 정처 없이 표류하는 대신 다시 공허 속을 움직이기 시작했습니다. 다른 티얀키들도 더 이상 그녀의 위치로 모여들지 않을 것이며, 앞으로 공격적인 태도를 멈출 것입니다."
 SpecialProjectCompletedEvents.233.Name:0 "티얀키 여왕: §G성공§!"
 SpecialProjectCompletedEvents.234.Desc:0 "건설선이 고대 채굴 기지의 저장고를 여는 데 성공했으며, 예상대로 내부에는 상당한 양의 광물이 수집 가능한 상태로 보관되어 있었습니다."
 SpecialProjectCompletedEvents.234.Name:0 "고대 채굴 기지: §G성공§!"
 SpecialProjectCompletedEvents.235.Desc:0 "다이슨 스피어에서 넘쳐 나오는 에너지 수집을 완료했습니다. 해당 에너지를 모성계로 운반하기 위해 이미 수송선이 파견되었습니다."
 SpecialProjectCompletedEvents.235.Name:0 "다이슨 스피어 출력: §G성공§!"
 SpecialProjectCompletedEvents.236.Desc:0 "과학 넥서스 회의가 완료되었습니다. 과학자들이 이 거대구조물의 도움을 받아 경험을 공유한 덕분에 우리는 방대한 새 지식을 확보했습니다."
 SpecialProjectCompletedEvents.236.Name:0 "과학 넥서스 회의: §G성공§!"
 SpecialProjectCompletedEvents.237.Desc:0 "첩보 구체 덕분에 대부분의 이웃 국가에 대한 정찰을 마쳤고, 유용한 정보를 다수 확보할 수 있었습니다."
 SpecialProjectCompletedEvents.237.Name:0 "첩보 구체 관측: §G성공§!"
 SpecialProjectCompletedEvents.24.Desc:0 "과학자 팀은 §Y[special_project_target.GetName]§! 관측을 마치고 우리에게 유용할 수 있는 보고서를 작성했습니다."
 SpecialProjectCompletedEvents.24.Name:0 "주황색 항성 관측: §G성공§!"
 SpecialProjectCompletedEvents.25.Desc:0 "민간 기업은 만족했습니다. §Y[special_project_target.GetName]§!의 색을 모방한 루비 시제품이 이미 일부 생산되었으며, 그중 일부는 프로젝트를 도운 대가로 우리에게 선물로 제공되었습니다."
 SpecialProjectCompletedEvents.25.Name:0 "적색 항성 보석공: §G성공§!"
 SpecialProjectCompletedEvents.26.Desc:0 "§Y[special_project_target.GetName]§! 근처에서 진행된 해군 훈련은 중단 없이 종료되었습니다. 많은 해군 장교들이 우리의 조치를 높이 평가했으며, 가까운 미래에 직접 훈련을 실시하자고 요청할 수도 있습니다."
 SpecialProjectCompletedEvents.26.Name:0 "백색 항성 함장: §G성공§!"
 SpecialProjectCompletedEvents.27.Desc:0 "§Y[special_project_target.GetName]§! 근처의 에너지 수집은 성공적으로 끝났고, 항성은 정상 상태로 돌아왔습니다."
 SpecialProjectCompletedEvents.27.Name:0 "황색 항성 에너지: §G성공§!"
 SpecialProjectCompletedEvents.28.Desc:0 "§Y[special_project_target.GetName]§!의 수리가 완료되었습니다. 이제 새 함선 하나를 해군에서 운용하거나 자재로 해체할 수 있습니다."
 SpecialProjectCompletedEvents.28.Name:0 "버려진 함선: §G성공§!"
 SpecialProjectCompletedEvents.29.Desc:0 "§Y위성§! 해체 작업이 완료되었습니다. 일부 공학자들은 장치의 오작동을 일으킨 오류를 파악했으며, 앞으로 더 나은 장치를 건설하는 방안을 검토할 것입니다."
 SpecialProjectCompletedEvents.29.Name:0 "잘못된 위성: §G성공§!"
 SpecialProjectCompletedEvents.3.Desc:0 "§Y[special_project_target.GetName]§!의 지하계에 도달하는 데 성공했습니다. 이로써 행성의 에너지 산출이 증가했으며, 일부 잉여 가스도 직접 수집되었을 가능성이 있습니다."
 SpecialProjectCompletedEvents.3.Name:0 "행성 가스 추출: §G성공§!"
 SpecialProjectCompletedEvents.30.Desc:0 "§Y민간선§! 수리는 제한 시간 안에 성공적으로 완료되었습니다. 민간인들은 우리의 조치에 매우 감사하고 있으며, 이제 더 이상의 문제 없이 여정을 계속할 수 있습니다."
 SpecialProjectCompletedEvents.30.Name:0 "민간선 오작동: §G성공§!"
 SpecialProjectCompletedEvents.301.Desc:0 "마침내 고대 사이브렉스 코어의 구성을 이해하는 데 성공했습니다. 내부에서 유용한 것은 연구자들의 효율을 크게 높여 새로운 기술을 훨씬 더 빠른 속도로 해금할 잠재력을 지닌 도구뿐인 것으로 보입니다."
 SpecialProjectCompletedEvents.301.Name:0 "사이브렉스 코어 연구: §G성공§!"
 SpecialProjectCompletedEvents.302.Desc:0 "절차가 끝났습니다. §Y[special_project_target.GetName]§! 근처에 있던 우리의 존재가 행성이 '장막 행성'으로 변하는 과정을 가속한 것으로 보입니다. 과학자들은 내부에서 수많은 미확인 소리가 들려오는 장막을 관찰할 기회를 얻었지만, 확실한 것은 필요한 잠재력 없이는 추가 연구가 불가능하다는 점입니다."
 SpecialProjectCompletedEvents.302.Name:0 "행성 장막화: §G성공§!"
 SpecialProjectCompletedEvents.303.Desc:0 "드레드노트 분석을 완료했으며, 과학선이 함선 효율을 높이는 고급 컴퓨터를 회수한 것으로 보입니다. 이 물자는 수도로 이송되어 연구된 뒤 군용 및 민간 함선에 적용될 것입니다."
 SpecialProjectCompletedEvents.303.Name:0 "파괴된 드레드노트: §G성공§!"
 SpecialProjectCompletedEvents.304.Desc:0 "해냈습니다! 건설선이 몰락한 타이탄을 수리하는 데 성공했습니다. 우리 역사상 처음으로 은하에서 가장 강력한 함선 중 하나를 손에 넣게 되었습니다."
 SpecialProjectCompletedEvents.304.Name:0 "잃어버린 몰락 타이탄: §G성공§!"
 SpecialProjectCompletedEvents.305.Desc:0 "'사냥꾼들'이 왔습니다. 드레드노트 크기의 거대한 함선이 행성 궤도에서 포착되었습니다. 그 함선은 우리 위치로 접근하고 있는 듯합니다. 우리가 발각되었습니다! 우리 팀은 관문으로 달려가고 있으며, 지금은 그것을 폐쇄해야 합니다. 몇 분 뒤, 우리는 시간 기계 시제품을 폐쇄하는 데 성공했습니다. 위험한 위기를 피했으며 흥미로운 정보도 얻었습니다. 미래에는 몰락 제국을 포함한 은하의 모든 국가를 쓰러뜨릴 만큼 강력한 미지의 종족이 우리 은하를 침공할 것이며, 우리는 그 재앙에서 멀리 떨어진 새 보금자리를 찾아 은하를 떠나야 할 것입니다. 우리는 그 사건에 대비하고, 공개하지 않은 채 마음에 새겨 두어야 합니다."
 SpecialProjectCompletedEvents.305.Name:0 "시간 기계 시제품: §G성공§!"
 SpecialProjectCompletedEvents.306.Desc:0 "'암흑 은하간-넷'에서의 거래를 완료했습니다."
 SpecialProjectCompletedEvents.306.Name:0 "암흑 은하간-넷: §G다섯 번째 항목§!"
 SpecialProjectCompletedEvents.307.Desc:0 "며칠간의 전투 끝에 §Y[special_project_target.GetName]§!이 마침내 확보되었습니다. 우리는 세 괴물을 쓰러뜨리는 데 성공했고, 전문가들은 배후에서 그들의 행동을 관찰할 수 있었습니다. 사상자는 막대했지만, 우리는 지상전에서 우리의 가치를 증명했습니다."
 SpecialProjectCompletedEvents.307.Name:0 "살아있는 재앙: §G성공§!"
 SpecialProjectCompletedEvents.308.Desc:0 "몰락한 잔존 세력의 승무원을 무력화하는 데 성공했습니다. 이제 이 고급 군함들의 통제권은 우리에게 있습니다."
 SpecialProjectCompletedEvents.308.Name:0 "몰락한 잔존 세력 강습: §G성공§!"
 SpecialProjectCompletedEvents.309.Desc:0 "이 생명체들 역시 결함 있는 신경 처리기에 의해 조종되고 있었다는 사실을 알아냈습니다. 그 발견 자체는 그리 놀랍지 않았지만, 함선에 탑재된 재생 모듈을 복제할 방법을 찾아냈습니다."
 SpecialProjectCompletedEvents.309.Name:0 "우주 수호자: §G성공§!"
 SpecialProjectCompletedEvents.31.Desc:0 "§Y시제품 함선§! 인양은 제한 시간 안에 성공적으로 완료되었습니다."
 SpecialProjectCompletedEvents.31.Name:0 "시제품 함선 회수: §G성공§!"
 SpecialProjectCompletedEvents.32.Desc:0 "§Y수송선§! 수리는 성공적이었으며, 해적들이 손대기 전에 화물 대부분을 구할 수 있었습니다."
 SpecialProjectCompletedEvents.32.Name:0 "수송선 화물 회수: §G성공§!"
 SpecialProjectCompletedEvents.33.Desc:0 "$SpecialProjectCompletedEvents.35.Desc$"
 SpecialProjectCompletedEvents.33.Name:0 "소형 잔해 분석: §G성공§!"
 SpecialProjectCompletedEvents.34.Desc:0 "$SpecialProjectCompletedEvents.35.Desc$"
 SpecialProjectCompletedEvents.34.Name:0 "중형 잔해 분석: §G성공§!"
 SpecialProjectCompletedEvents.35.Desc:0 "잔해 분석은 성공적이었습니다. 여기에서 발견된 일부 물자는 신기술 진전에 도움이 될 것으로 보이며, 나머지 잔해도 쉽게 인양할 수 있을 것입니다."
 SpecialProjectCompletedEvents.35.Name:0 "대형 잔해 분석: §G성공§!"
 SpecialProjectCompletedEvents.36.Desc:0 "§Y[special_project_target.GetName]§!의 외계 도시 연구가 끝났습니다. 건물을 더 견고하고 안정적으로 만들기 위한 건축 기술을 새로 많이 배웠습니다."
 SpecialProjectCompletedEvents.36.Name:0 "외계 도시 연구: §G성공§!"
 SpecialProjectCompletedEvents.37.Desc:0 "§Y[special_project_target.GetName]§!의 식물군 연구는 성공적이었으며, 생물학자 팀은 우리의 도움에 감사하고 있습니다."
 SpecialProjectCompletedEvents.37.Name:0 "외계 식물군 연구: §G성공§!"
 SpecialProjectCompletedEvents.38.Desc:0 "§Y[special_project_target.GetName]§!의 동물군 연구는 성공적이었으며, 생물학자 팀은 우리의 도움에 감사하고 있습니다."
 SpecialProjectCompletedEvents.38.Name:0 "외계 동물군 연구: §G성공§!"
 SpecialProjectCompletedEvents.39.Desc:0 "§Y[special_project_target.GetName]§! 연구가 끝났습니다. 탐사팀은 자신들의 작업에 만족한 듯하며, 보고서 사본을 우리에게 제공했습니다."
 SpecialProjectCompletedEvents.39.Name:0 "외계 행성 연구: §G성공§!"
 SpecialProjectCompletedEvents.4.Desc:0 "§Y[special_project_target.GetName]§!의 표면 판을 파괴하는 데 성공했습니다. 폭발 뒤 소행성에서 일정량의 광물이 분출되었으며, 우리 군사력에 의해 해당 자원은 이제 모성계로 향하고 있을 것입니다."
 SpecialProjectCompletedEvents.4.Name:0 "풍부한 소행성 판: §G성공§!"
 SpecialProjectCompletedEvents.40.Desc:0 "§Y[special_project_target.GetName]§!의 고대 외계 유적 연구가 끝났습니다. 탐사팀은 보고서 사본을 보내왔습니다."
 SpecialProjectCompletedEvents.40.Name:0 "외계 유적 연구: §G성공§!"
 SpecialProjectCompletedEvents.41.Desc:0 "§Y[special_project_target.GetName]§!의 고대 외계 사원 탐사가 끝났습니다. 탐사를 담당했던 팀이 보고서를 보내왔습니다."
 SpecialProjectCompletedEvents.41.Name:0 "외계 사원 발견: §G성공§!"
 SpecialProjectCompletedEvents.42.Desc:0 "§Y[special_project_target.GetName]§!의 요새 탐사가 끝났습니다. 담당 팀이 우리에게 보고서를 보내왔습니다."
 SpecialProjectCompletedEvents.42.Name:0 "외계 요새 발견: §G성공§!"
 SpecialProjectCompletedEvents.43.Desc:0 "§Y[special_project_target.GetName]§!의 외계 화석 연구가 끝났습니다. 고고학자 팀은 무슨 일이 있었는지에 대한 보고서를 보내왔습니다."
 SpecialProjectCompletedEvents.43.Name:0 "외계 활동: §G성공§!"
 SpecialProjectCompletedEvents.44.Desc:0 "§Y[special_project_target.GetName]§!의 '죽은 도시' 연구가 끝났습니다. 담당 팀이 보고서를 보내왔습니다."
 SpecialProjectCompletedEvents.44.Name:0 "외계 '죽은 도시': §G성공§!"
 SpecialProjectCompletedEvents.45.Desc:0 "§Y[special_project_target.GetName]§!에서의 핵실험이 끝났으며, 책임 팀은 결과에 만족하고 있습니다."
 SpecialProjectCompletedEvents.45.Name:0 "핵실험: §G성공§!"
 SpecialProjectCompletedEvents.46.Desc:0 "§Y[special_project_target.GetName]§!의 미생물 연구는 성공적이었으며, 생물학자가 보고서 사본을 제공했습니다."
 SpecialProjectCompletedEvents.46.Name:0 "미생물 연구: §G성공§!"
 SpecialProjectCompletedEvents.47.Desc:0 "§Y[special_project_target.GetName]§! 표면에 있는 미확인 함선의 잔해 분석은 성공적이었습니다. 우리 과학팀은 흥미로운 정보를 일부 알아냈습니다."
 SpecialProjectCompletedEvents.47.Name:0 "추락 함선 수확: §G성공§!"
 SpecialProjectCompletedEvents.48.Desc:0 "§Y[special_project_target.GetName]§!에서의 착륙 시험은 성공적이었습니다. 민간 기업은 더 나은 과학선을 개발하는 데 필요한 정보 대부분을 수집했습니다."
 SpecialProjectCompletedEvents.48.Name:0 "과학선 착륙 시험: §G성공§!"
 SpecialProjectCompletedEvents.49.Desc:0 "§Y[special_project_target.GetName]§!에서의 착륙 시험은 성공적이었습니다. 민간 기업은 더 나은 건설선을 개발하는 데 필요한 정보 대부분을 수집했습니다."
 SpecialProjectCompletedEvents.49.Name:0 "건설선 착륙: §G성공§!"
 SpecialProjectCompletedEvents.5.Desc:0 "§Y[special_project_target.GetName]§! 내부 탐사는 성공적이었습니다. 다수의 광물 추출지가 확인되었고, 채굴 기지 팀이 이 매장지에 도달하는 데 도움이 되도록 지도가 작성되었습니다."
 SpecialProjectCompletedEvents.5.Name:0 "갈라진 소행성 탐사: §G성공§!"
 SpecialProjectCompletedEvents.50.Desc:0 "§Y[special_project_target.GetName]§!에서의 착륙 시험은 성공적이었습니다. 민간 기업은 더 나은 수송선을 개발하는 데 필요한 정보 대부분을 수집했습니다."
 SpecialProjectCompletedEvents.50.Name:0 "수송선 착륙 시험: §G성공§!"
 SpecialProjectCompletedEvents.51.Desc:0 "§Y[special_project_target.GetName]§!에서의 군사 구조 훈련은 성공적이었으며, 모든 참가자는 우리의 도움에 매우 감사하고 있습니다."
 SpecialProjectCompletedEvents.51.Name:0 "군사 구조 훈련: §G성공§!"
 SpecialProjectCompletedEvents.52.Desc:0 "§Y[special_project_target.System.GetName]§! 성계의 항성기지 점검을 마쳤으며, 현재로서는 기지에 오작동이 없는 것으로 보입니다. 다만 앞으로 문제가 발생할 수 있으므로 가까운 미래에 추가 점검이 필요할 것입니다."
 SpecialProjectCompletedEvents.52.Name:0 "항성기지 점검: §G성공§!"
 SpecialProjectCompletedEvents.53.Desc:0 "§Y[special_project_target.System.GetName]§! 성계 항성기지의 격납고 수리를 완료했습니다. 공학자들은 오작동의 원인을 찾아냈으며, 앞으로 이러한 문제를 피하기 위해 자재를 개선할 수도 있습니다."
 SpecialProjectCompletedEvents.53.Name:0 "항성기지 격납고 수리: §G성공§!"
 SpecialProjectCompletedEvents.54.Desc:0 "§Y[special_project_target.System.GetName]§! 성계 항성기지 도크에 있던 초계함 수리가 완료되었습니다. 함선들은 이제 완전히 운용 가능하며 해군 전력에 합류할 준비가 되었습니다."
 SpecialProjectCompletedEvents.54.Name:0 "항성기지 함선 수리: §G성공§!"
 SpecialProjectCompletedEvents.55.Desc:0 "§Y[Root.Capital.GetName]§!에서의 총독 회의가 끝났고, 모든 참가자는 향상된 지식을 가지고 회의장을 떠났습니다."
 SpecialProjectCompletedEvents.55.Name:0 "총독 회의: §G성공§!"
 SpecialProjectCompletedEvents.56.Desc:0 "§Y[Root.Capital.GetName]§!에서의 과학자 회의가 끝났고, 모든 참가자는 향상된 지식을 가지고 회의장을 떠났습니다."
 SpecialProjectCompletedEvents.56.Name:0 "과학자 회의: §G성공§!"
 SpecialProjectCompletedEvents.57.Desc:0 "§Y[Root.Capital.GetName]§!에서의 우주 장례식이 끝났습니다. 이 영웅들은 결코 잊히지 않을 것입니다."
 SpecialProjectCompletedEvents.57.Name:0 "우주 장례식: §G성공§!"
 SpecialProjectCompletedEvents.58.Desc:0 "§Y[Root.Capital.GetName]§!에서의 기자 인터뷰가 끝났고, 그들이 던진 거의 모든 질문에 답변이 제공되었습니다. 밝은 미래가 우리를 기다리고 있다는 내용의 기사가 작성되었습니다."
 SpecialProjectCompletedEvents.58.Name:0 "뉴스 인터뷰: §G성공§!"
 SpecialProjectCompletedEvents.59.Desc:0 "§Y[Root.Capital.GetName]§!에서의 상원 회합이 끝났습니다. 어느 정당이 우리 정부의 윤리를 이끌 방식에 대해 상대를 설득했는지는 말하기 어렵습니다."
 SpecialProjectCompletedEvents.59.Name:0 "상원 회합: §G성공§!"
 SpecialProjectCompletedEvents.6.Desc:0 "§Y[special_project_target.GetName]§! 탐사는 성공적이었습니다. 열정적인 과학팀은 필요한 정보 대부분을 수집했고, 이 거대한 얼음 덩어리에서 관측할 만한 유망 지점의 좌표를 우리에게 제공했습니다. 그들은 앞으로 새로운 소행성에서 진행될 다른 탐사 임무에도 큰 기대를 보이고 있습니다."
 SpecialProjectCompletedEvents.6.Name:0 "얼음 소행성 탐사: §G성공§!"
 SpecialProjectCompletedEvents.60.Desc:0 "§Y[Root.Capital.GetName]§!에서 제독과 장군들의 군사 전술 회의가 끝났고, 모든 참가자는 향상된 지식을 가지고 회의장을 떠났습니다."
 SpecialProjectCompletedEvents.60.Name:0 "군사 전술: §G성공§!"
 SpecialProjectCompletedEvents.61.Desc:0 "§Y[Root.Capital.GetName]§!에서의 통치자 기념식이 끝났으며, §Y[Root.GetRulerTitle] [ruler.GetRegnalName]§!은 신뢰할 수 있는 통치자임을 입증했습니다."
 SpecialProjectCompletedEvents.61.Name:0 "통치자 기념식: §G성공§!"
 SpecialProjectCompletedEvents.62.Desc:0 "§Y[Root.Capital.GetName]§!에서 열린 물리학자 회의가 끝났습니다. 전국의 물리학자들이 지식을 모은 끝에 큰 진전을 이루었습니다."
 SpecialProjectCompletedEvents.62.Name:0 "물리학자 회의: §G성공§!"
 SpecialProjectCompletedEvents.63.Desc:0 "§Y[Root.Capital.GetName]§!에서 열린 생물학자 회의가 끝났습니다. 전국의 생물학자들이 지식을 모은 끝에 큰 진전을 이루었습니다."
 SpecialProjectCompletedEvents.63.Name:0 "생물학자 회의: §G성공§!"
 SpecialProjectCompletedEvents.64.Desc:0 "§Y[Root.Capital.GetName]§!에서 열린 공학자 회의가 끝났습니다. 전국의 공학자들이 지식을 모은 끝에 큰 진전을 이루었습니다."
 SpecialProjectCompletedEvents.64.Name:0 "공학자 회의: §G성공§!"
 SpecialProjectCompletedEvents.65.Desc:0 "§Y[Root.GetName]§!의 도시 개선은 성공적이었습니다. 생활 여건이 향상되었고 주민들은 우리에게 매우 감사하고 있습니다."
 SpecialProjectCompletedEvents.65.Name:0 "도시 지구 개선: §G성공§!"
 SpecialProjectCompletedEvents.66.Desc:0 "§Y[Root.GetName]§!의 산업 개선은 성공적이었습니다. 행성의 산업 효율은 100% 이상으로 작동하는 것으로 확인되었습니다."
 SpecialProjectCompletedEvents.66.Name:0 "$SpecialProjectCompletedEvents.67.Name$"
 SpecialProjectCompletedEvents.67.Desc:0 "§Y[Root.GetName]§!의 발전소 개선은 성공적이었습니다. 행성의 발전 효율은 100% 이상으로 작동하는 것으로 확인되었습니다."
 SpecialProjectCompletedEvents.67.Name:0 "산업 지구 개선: §G성공§!"
 SpecialProjectCompletedEvents.68.Desc:0 "§Y[Root.GetName]§!의 식량 재배 개선은 성공적이었습니다. 행성의 농업 효율은 100% 이상으로 작동하는 것으로 확인되었습니다."
 SpecialProjectCompletedEvents.68.Name:0 "농업 지구 개선: §G성공§!"
 SpecialProjectCompletedEvents.69.Desc:0 "§Y[special_project_target.GetName]§! 탈취는 성공적이었습니다. 우리 병력은 많은 양질의 자원과 유용한 물자를 회수했습니다."
 SpecialProjectCompletedEvents.69.Name:0 "소형 호송대 강습: §G성공§!"
 SpecialProjectCompletedEvents.7.Desc:0 "§Y[special_project_target.GetName]§!에서 뿜어져 나오는 가스 분출물을 성공적으로 수집했습니다. 온도 변환 장치의 도움으로 분출물에서 나오는 모든 열을 에너지로 전환했습니다."
 SpecialProjectCompletedEvents.7.Name:0 "가스 거성 과잉 분출: §G성공§!"
 SpecialProjectCompletedEvents.70.Desc:0 "$SpecialProjectCompletedEvents.81.Desc$"
 SpecialProjectCompletedEvents.70.Name:0 "고대 채굴 기지: §G성공§!"
 SpecialProjectCompletedEvents.71.Desc:0 "민간인 인질을 태운 함선을 탈취하는 데 성공했습니다. 그들을 안전하게 모성계로 돌려보내기 위한 대피 및 호위 절차가 진행 중입니다."
 SpecialProjectCompletedEvents.71.Name:0 "소형 테러리스트 함대: §G성공§!"
 SpecialProjectCompletedEvents.72.Desc:0 "§Y[special_project_target.GetName]§!의 상황을 통제했습니다. 모든 로봇이 무력화되었고, 탈주 공학자는 체포되었습니다."
 SpecialProjectCompletedEvents.72.Name:0 "로봇 강습: §G성공§!"
 SpecialProjectCompletedEvents.73.Desc:0 "우리 군사력은 §Y[special_project_target.GetName]§!에 있는 민병대의 은신처 다수를 확보했고, 그 지도자들을 체포했습니다. 이제 전투가 완전히 멈추기까지는 며칠만 남았습니다."
 SpecialProjectCompletedEvents.73.Name:0 "시가전: §G성공§!"
 SpecialProjectCompletedEvents.74.Desc:0 "§Y[special_project_target.GetName]§!에서 더 많은 베사리안석을 추출할 수 있는 매장지를 발견했습니다. 이제 그 지역을 정리하고 채굴을 시작하기만 하면 됩니다."
 SpecialProjectCompletedEvents.74.Name:0 "베사리안석 회수: §G성공§!"
 SpecialProjectCompletedEvents.75.Desc:0 "§Y[special_project_target.GetName]§!에서 건물 개발을 더 빠르게 진행할 수 있게 하는 특수 프로젝트가 완료되었습니다. 이제 식민지를 더 빠른 속도로 건설할 수 있습니다."
 SpecialProjectCompletedEvents.75.Name:0 "건설자 프로젝트: §G성공§!"
 SpecialProjectCompletedEvents.76.Desc:0 "§Y[special_project_target.GetName]§!의 보안이 강화되었습니다. 이제 행성에서 통제 불능의 사태가 발생하더라도 대비할 수 있을 것이라 확신할 수 있습니다."
 SpecialProjectCompletedEvents.76.Name:0 "보안 강화: §G성공§!"
 SpecialProjectCompletedEvents.77.Desc:0 "§Y[Root.Capital.GetName]§!에서 열린 연구자 회의가 끝났습니다. 전국의 과학자들이 지식을 모은 끝에 큰 진전을 이루었습니다."
 SpecialProjectCompletedEvents.77.Name:0 "연구자 회의: §G성공§!"
 SpecialProjectCompletedEvents.78.Desc:0 "군 복무가 이제 시작되었으며, 새 지상군 편성이 더 나은 효율로 개선되었습니다."
 SpecialProjectCompletedEvents.78.Name:0 "$SPECIES_RIGHT_MILITARY_SERVICE$: §G성공§!"
 SpecialProjectCompletedEvents.79.Desc:0 "기계 생산 효율 개선이 완료되었습니다. 이제 기계 POP을 더 빠른 속도로 조립할 수 있습니다."
 SpecialProjectCompletedEvents.79.Name:0 "기계 건설 프로그램: §G성공§!"
 SpecialProjectCompletedEvents.8.Desc:0 "§Y[special_project_target.GetName]§! 탐사는 성공적이었습니다. 열정적인 과학팀은 필요한 정보 대부분을 수집했고, 이 따뜻한 불모 행성에서 발견한 유용한 것들에 대한 보고서를 제공했습니다. 그들은 앞으로 새로운 행성에서 진행될 다른 탐사 임무에도 큰 기대를 보이고 있습니다."
 SpecialProjectCompletedEvents.8.Name:0 "따뜻한 불모 행성 탐사: §G성공§!"
 SpecialProjectCompletedEvents.80.Desc:0 "조선소의 함선 조립 효율을 높였습니다. 이제 민간선이나 군함을 더 빠른 속도로 건조할 수 있습니다."
 SpecialProjectCompletedEvents.80.Name:0 "조선소 신속 조립: §G성공§!"
 SpecialProjectCompletedEvents.81.Desc:0 "채굴 기지의 저장고를 여는 데 성공했습니다. 예상대로 내부의 광물량은 매우 많았습니다. 이제 수거를 시작할 수 있습니다."
 SpecialProjectCompletedEvents.81.Name:0 "전투 시뮬레이션: §G성공§!"
 SpecialProjectCompletedEvents.82.Desc:0 "우리 위치에서 §Y[special_project_target.GetName]§!에서 오는 빛에 대한 연구를 마쳤습니다. 거울이나 빛 반사를 활용하는 소재를 연구하려는 산업체나 개인이 있다면, 그곳은 실험을 진행하기에 완벽한 위치일 것입니다."
 SpecialProjectCompletedEvents.82.Name:0 "밝은 태양 관측: §G성공§!"
 SpecialProjectCompletedEvents.83.Desc:0 "천문학자 팀이 §Y[special_project_target.GetName]§! 연구를 마쳤습니다. 이 항성은 약 18억 5,200만 년 전부터 갈색 왜성 단계에 접어든 것으로 보입니다."
 SpecialProjectCompletedEvents.83.Name:0 "갈색 왜성 연구: §G성공§!"
 SpecialProjectCompletedEvents.84.Desc:0 "§Y[special_project_target.GetName]§!에서 그들의 수는 놀라울 정도입니다. 천이나 백만이 아니라, 플라스모이드 개체 형태로 그 항성에 살아가는 수십억 개체가 존재합니다. 항성의 열이 외부에서 오는 위험으로부터 그들을 보호하는 일종의 방패처럼 작용한다고 추정할 수 있습니다."
 SpecialProjectCompletedEvents.84.Name:0 "플라스모이드 생명 연구: §G성공§!"
 SpecialProjectCompletedEvents.85.Desc:0 "지질학자 집단은 §Y[special_project_target.GetName]§!의 협곡 생물군계에서 흥미로운 지역 대부분의 탐사를 마쳤습니다. 수천 년 전 그곳에는 거대한 호수가 있었던 것으로 보이며, 이는 행성의 진정한 본질을 완전히 뒤집는 발견입니다."
 SpecialProjectCompletedEvents.85.Name:0 "협곡 생물군계 탐사: §G성공§!"
 SpecialProjectCompletedEvents.86.Desc:0 "$SpecialProjectCompletedEvents.87.Desc$"
 SpecialProjectCompletedEvents.86.Name:0 "대륙형 행성 탐사: §G성공§!"
 SpecialProjectCompletedEvents.87.Desc:0 "탐사팀은 §Y[special_project_target.GetName]§! 전역을 이동하며 조사를 마쳤습니다. 그들은 행성의 생태계에서 많은 흥미로운 것을 발견했고, 보고서 사본을 우리에게 보내왔습니다."
 SpecialProjectCompletedEvents.87.Name:0 "열대 행성 탐사: §G성공§!"
 SpecialProjectCompletedEvents.88.Desc:0 "§Y[special_project_target.GetName]§!의 얼음 생물군계 탐사는 성공적이었습니다. 행성의 해당 지역에 있는 얼음은 거의 완벽한 투명도를 지니고 있어 보석처럼 보입니다."
 SpecialProjectCompletedEvents.88.Name:0 "얼음 생물군계 탐사: §G성공§!"
 SpecialProjectCompletedEvents.89.Desc:0 "예상대로 완전히 거주 불가능함에도 불구하고, §Y[special_project_target.GetName]§!은 백만 년 뒤 생명을 부양할 가능성을 지닐 수도 있는 것으로 보입니다. 흥미로운 수정들도 발견되었으며, 가치가 있어 보입니다."
 SpecialProjectCompletedEvents.89.Name:0 "얼어붙은 원정: §G성공§!"
 SpecialProjectCompletedEvents.9.Desc:0 "§Y[special_project_target.GetName]§! 탐사는 성공적이었습니다. 열정적인 과학팀은 필요한 정보 대부분을 수집했고, 이 차가운 불모 행성에서 발견한 유용한 것들에 대한 보고서를 제공했습니다. 그들은 앞으로 새로운 행성에서 진행될 다른 탐사 임무에도 큰 기대를 보이고 있습니다."
 SpecialProjectCompletedEvents.9.Name:0 "차가운 불모 행성 탐사: §G성공§!"
 SpecialProjectCompletedEvents.90.Desc:0 "§Y[special_project_target.GetName]§!의 초소형 숲 연구는 성공적이었습니다. 예상대로 그 안에는 매우 복잡한 생태계가 존재하며, 다양한 식물군과 동물군이 살아가고 있습니다. 그들 대부분은 자신들의 관점에서 우리 같은 거대한 생명체를 보고 놀란 듯합니다."
 SpecialProjectCompletedEvents.90.Name:0 "초소형 숲 연구: §G성공§!"
 SpecialProjectCompletedEvents.91.Desc:0 "우리의 예상은 틀렸습니다. §Y[special_project_target.GetName]§!에는 화산이 수백 개가 아니라 수천 개 존재합니다. 확실한 것은 이 행성을 테라포밍하는 일이 어려운 과제가 되리라는 점입니다."
 SpecialProjectCompletedEvents.91.Name:0 "화산 생물군계 탐사: §G성공§!"
 SpecialProjectCompletedEvents.92.Desc:0 "§Y[special_project_target.GetName]§!의 뇌우 연구를 마쳤으며, 예상대로 그 뇌우는 끝이 없습니다. 약화되는 징후는 단 하나도 발견되지 않았습니다. 하지만 우리가 이를 제어하고 활용하는 데 성공한다면, 이 폭풍은 미래에 잠재적인 무한 에너지원이 될 수도 있습니다."
 SpecialProjectCompletedEvents.92.Name:0 "끝없는 뇌우 연구: §G성공§!"
 SpecialProjectCompletedEvents.93.Desc:0 "§Y[special_project_target.GetName]§!의 '거대한 토네이도'가 마침내 끝을 맞이했습니다. 내부에 모여 있던 모든 바람이 서로 다른 방향으로 퍼지기 시작했습니다. 우리는 폭풍의 궤적을 계산할 수 있었으므로, 언젠가 우리 식민지 중 하나에서 이런 일이 벌어진다면 적절한 대피 절차를 준비할 수 있을 것입니다."
 SpecialProjectCompletedEvents.93.Name:0 "거대한 토네이도 연구: §G성공§!"
 SpecialProjectCompletedEvents.94.Desc:0 "§Y[special_project_target.GetName]§!의 우주선 묘지에서 거대한 함선과 대부분의 다른 부품에 대한 분석이 완료되었습니다. 수 세기 전 이곳에서 대규모 우주전이 벌어졌으며, 이 잔해들은 파괴된 함선 수량의 극히 일부에 불과하다고 추정할 수 있습니다."
 SpecialProjectCompletedEvents.94.Name:0 "우주선 묘지: §G성공§!"
 SpecialProjectCompletedEvents.95.Desc:0 "§Y[special_project_target.GetName]§!의 생물 화석 근처에 고고학 현장이 조성되었습니다. 이제 사체 연구를 계속할 수 있습니다."
 SpecialProjectCompletedEvents.95.Name:0 "괴물 화석 연구: §G성공§!"
 SpecialProjectCompletedEvents.96.Desc:0 "§Y[special_project_target.GetName]§!의 회수팀은 터널계에서 발견된 광물 대부분을 수집하는 데 성공했습니다."
 SpecialProjectCompletedEvents.96.Name:0 "광물 과잉: §G성공§!"
 SpecialProjectCompletedEvents.97.Desc:0 "조사팀은 §Y[special_project_target.GetName]§!의 버려진 연구소 탐사를 마쳤고, 흥미로운 연구 자료는 모두 수도로 보내졌습니다."
 SpecialProjectCompletedEvents.97.Name:0 "버려진 연구소: §G성공§!"
 SpecialProjectCompletedEvents.98.Desc:0 "외계 생명체의 흔적을 따라간 끝에 그것이 산으로 이어진다는 사실을 확인했습니다. 내부에서는 그 짐승의 둥지였던 것으로 보이는 거대한 동굴이 발견되었지만, 최근 활동의 증거는 감지되지 않았습니다. 즉 둥지는 현재 버려진 상태입니다. 안에는 아직 수집할 수 있는 식량이 풍부하게 남아 있어 다소 의아합니다. 여러 차례 시험한 결과, 그 식량은 우리 종족이 섭취할 수 있음을 확인했습니다."
 SpecialProjectCompletedEvents.98.Name:0 "야생동물 흔적: §G성공§!"
 SpecialProjectCompletedEvents.99.Desc:0 "§Y[special_project_target.GetName]§! 탐사를 마쳤으며, 예상대로 광물과 여러 흥미로운 용도로 사용할 수 있는 희귀 수정까지 포함해 많은 흥미로운 자원이 발견되었습니다."
 SpecialProjectCompletedEvents.99.Name:0 "소행성 균열 작업: §G성공§!"
 SpecialProjectGroundEvents.1.Desc:0 "우리 병력은 벙커 입구를 확보했지만, 단지는 예상보다 더 큰 것으로 보입니다. 내부에는 수천 명의 클론 병사가 숨어 있습니다. 이미 많은 자원을 확보했지만, 과학자를 찾아낸다면 이 전투를 완전히 끝낼 수 있습니다. 다만 사상자 수는 더 커질 수 있습니다."
 SpecialProjectGroundEvents.1.Name:0 "클론 군대: §Y진입§!"
 SpecialProjectGroundEvents.10.Desc:0 "그들의 공격이 시작되었습니다. 적들은 중장갑 차량 부대를 동반해 세 방향에서 몰려오고 있습니다. 하지만 우리가 보낸 막대한 증원군은 진지를 지켜낼 수 있을 것으로 보입니다. 며칠간의 전투 끝에 적들이 후퇴하기 시작했습니다. 타격을 가할 수 있다면 지금이 마지막 기회입니다."
 SpecialProjectGroundEvents.10.Name:0 "대규모 전쟁 진행 중: §Y방어§!"
 SpecialProjectGroundEvents.11.Desc:0 "병력을 집결시켜 적 영토에 대한 공세를 시작했습니다. 행성에서는 격렬한 전투가 벌어지고 있으며 양측 모두 많은 사상자가 발생하고 있습니다. 일주일 뒤 마침내 우위를 점했고, 적들은 마지막 최종 기지로 후퇴했습니다."
 SpecialProjectGroundEvents.11.Name:0 "대규모 전쟁 진행 중: §Y공격§!"
 SpecialProjectGroundEvents.12.Desc:0 "우리 병력이 행성에 상륙했습니다. 이제 주요 전선 대부분에서 반란군의 공격을 격퇴하기 시작했으며, 그들은 재편성과 다음 공격 준비를 위해 집결할 수밖에 없게 되었습니다."
 SpecialProjectGroundEvents.12.Name:0 "내전 격화: §Y상륙§!"
 SpecialProjectGroundEvents.13.Desc:0 "모든 반란군의 공격을 밀어내는 데 성공했습니다. 그러나 그들은 재집결해 새로운 대규모 공격을 준비하고 있으며, 사상자 수는 막대할 것입니다. 여기서 우리는 일단 후퇴할지, 아니면 수도를 요새화할지 선택해야 합니다."
 SpecialProjectGroundEvents.13.Name:0 "내전 격화: §Y공격§!"
 SpecialProjectGroundEvents.14.Desc:0 "반란군의 대규모 공격이 수도에서 시작되었습니다. 우리 병력은 준비를 마치고 그들을 기다리고 있었습니다. 전투는 며칠 동안 이어진 끝에 승리로 끝났고, 반란군은 마지막 기지들로 후퇴할 수밖에 없었습니다."
 SpecialProjectGroundEvents.14.Name:0 "내전 격화: §Y방어§!"
 SpecialProjectGroundEvents.15.Desc:0 "우리 병력이 행성에 상륙하고 있으며, 괴물 무리는 아직 우리의 존재를 알아차리지 못했습니다. 더 작은 개체 하나가 평원에 뒤처진 채 남아 있었던 것으로 보입니다. 그 개체가 우리 병력을 발견했고, 첫 전투가 임박했습니다."
 SpecialProjectGroundEvents.15.Name:0 "살아있는 재앙: §Y상륙§!"
 SpecialProjectGroundEvents.16.Desc:0 "괴물 무리의 가장 작은 개체를 처치했지만, 예상대로 우리의 전투는 눈에 띄지 않을 수 없었습니다. 거대한 괴물 중 하나가 우리를 향해 오고 있습니다. 이제 진짜 싸움이 될 것입니다!"
 SpecialProjectGroundEvents.16.Name:0 "살아있는 재앙: §Y첫 피§!"
 SpecialProjectGroundEvents.17.Desc:0 "거대한 괴물 중 하나와 교전을 시작했습니다. 그 피부는 매우 단단해 뚫기 어렵지만, 이 생명체는 입을 꽤 자주 벌리는 듯하며, 그때 우리가 사격할 수 있는 약점을 찾을 수 있습니다. 지금까지 전투는 잘 진행되고 있는 것으로 보입니다."
 SpecialProjectGroundEvents.17.Name:0 "살아있는 재앙: §Y전투 중§!"
 SpecialProjectGroundEvents.18.Desc:0 "첫 번째 생명체가 약해지기 시작했습니다. 사상자가 계속 늘어나자 괴물은 동료들을 싸움에 끌어들이기 위해 거대한 포효를 내질렀습니다. 그중 둘이 우리 위치로 합류하는 것이 포착되었고, 곧 본격적인 전투가 시작될 것입니다."
 SpecialProjectGroundEvents.18.Name:0 "살아있는 재앙: §Y증원§!"
 SpecialProjectGroundEvents.2.Desc:0 "모든 복제 탱크를 확보했습니다. 과학자와 그의 남은 정예 클론 병사들은 최종 방에 몸을 숨겼습니다. 그들의 물자 대부분도 내부에 숨겨져 있습니다. 우리는 공격을 끝낼지, 아니면 이미 모은 것만 가지고 떠날지 선택해야 합니다."
 SpecialProjectGroundEvents.2.Name:0 "클론 군대: §Y진행 중§!"
 SpecialProjectGroundEvents.3.Desc:0 "우리 병력은 증원을 위한 상륙 지점을 구축했습니다. 그러나 우리의 예상은 틀렸습니다. 그들은 수천이 아니라 수십만에 달하는 병력으로 우리 위치를 향해 오고 있습니다. 정찰병 중 하나가 그들이 모두 나오는 산을 찾아냈습니다. 그 방향으로 대규모 타격을 가할 수도 있지만, 해당 위치에 약점이 숨어 있는지 확신해야 합니다. 지금은 더 많은 정보를 기다리기 위해 후퇴하거나 진지를 유지하는 것밖에 할 수 없습니다."
 SpecialProjectGroundEvents.3.Name:0 "군체 의식 무리: §Y상륙§!"
 SpecialProjectGroundEvents.4.Desc:0 "'좀비' 무리에 맞서 버텨내는 데 성공했습니다. 정찰병이 돌아와 거대한 뇌 같은 생명체가 일종의 군체 의식처럼 행성의 모든 개체를 조종하고 있음을 확인했습니다. 그 존재만으로 무리는 공격에서 방어로 행동을 바꾸었으며, 이 증거만으로도 그 생명체가 이 존재들의 유일한 지도자임을 확인하기에 충분합니다."
 SpecialProjectGroundEvents.4.Name:0 "군체 의식 무리: §Y진행 중§!"
 SpecialProjectGroundEvents.5.Desc:0 "기지의 도크를 확보했습니다. 이 괴물들은 죽음을 두려워하지 않고 끝없이 몰려오고 있습니다. 그 행동은 기지 안의 무언가가 놀라운 속도로 그들을 번식시키고 있다는 사실을 확인시켜 줄 뿐입니다. 탄약이 바닥나기 전에 감염의 근원으로 빠르게 진격해야 합니다."
 SpecialProjectGroundEvents.5.Name:0 "감염된 기지: §Y진입§!"
 SpecialProjectGroundEvents.6.Desc:0 "기지의 주 구역을 확보했습니다. 더 강하고 빠르며 저항력이 높은 괴물의 새로운 변종들이 마주쳤습니다. 이 외계 생명체는 전투 중에 빠르게 진화하고 있는 듯합니다. 이 모든 것의 배후에 있는 존재는 신속히 제거되어야 합니다."
 SpecialProjectGroundEvents.6.Name:0 "감염된 기지: §Y진행 중§!"
 SpecialProjectGroundEvents.7.Desc:0 "동굴에서 외부로 이어지는 모든 입구를 봉쇄하고, 새로운 살육 시도를 제대로 막기 위해 거대한 구멍 하나만 열어 두었습니다. 괴물들은 우리의 존재를 알아차렸고 동굴 더 깊은 곳으로 재집결하기 시작했습니다. 이런 위협이 행성에서 활개치게 둘 수는 없습니다."
 SpecialProjectGroundEvents.7.Name:0 "깊은 곳의 괴물: §Y진입§!"
 SpecialProjectGroundEvents.8.Desc:0 "그들은 수천에 달하지만 처치할 수 있습니다. 우리 병력은 동굴 안에서 진전을 이루었지만, 여기서부터는 괴물의 수가 예상보다 많다는 사실이 드러났습니다. 동굴 전체를 정리하려면 시간과 자원이 필요할 것입니다."
 SpecialProjectGroundEvents.8.Name:0 "깊은 곳의 괴물: §Y진행 중§!"
 SpecialProjectGroundEvents.9.Desc:0 "우리 군사력의 마지막 피난처를 발견했으며, 그들을 구하기 위해 주변에 증원군 배치가 시작되고 있습니다. 적들은 이 공격에서 후퇴하기 시작했고, 이제 다음 공격을 위해 다시 집결하고 있습니다. 여기서 우리는 지금 후퇴할지, 아니면 방어를 준비할지 선택해야 합니다."
 SpecialProjectGroundEvents.9.Name:0 "대규모 전쟁 진행 중: §Y상륙§!"
 SpecialProjectOtherEvents.10.Desc:0 "시간 기계를 가동하고 있습니다. 이제 다른 시대로 이어지는 관문이 열렸습니다. 기계에서 차가운 바람이 쏟아져 나오지만, 앞쪽에 표면이 보이는 것으로 보아 우리 행성은 미래에도 여전히 존재할 것입니다. 탐사팀은 반대편으로 갈 준비를 마쳤습니다."
 SpecialProjectOtherEvents.10.Name:0 "시간 기계 시제품: §Y1부§!"
 SpecialProjectOtherEvents.11.Desc:0 "탐사팀이 들어갔습니다. 반대편의 온도는 -110°C에 달하지만, 우리의 장비는 여전히 이를 견딜 만큼 충분히 튼튼합니다. 몇 시간 동안 탐사했지만 아직 생명의 흔적은 발견되지 않았고, 대신 알 수 없는 물질로 만들어진 거대한 건물이 보입니다. 안으로 들어가는 것이 좋은 생각일까요?"
 SpecialProjectOtherEvents.11.Name:0 "시간 기계 시제품: §Y2부§!"
 SpecialProjectOtherEvents.12.Desc:0 "우리 팀은 건물 안으로 들어갔고, 예상대로 내부는 텅 비어 있었습니다... 생명의 흔적이 전혀 감지되지 않아 이곳에서 무슨 일이 있었는지 의문이 듭니다. 하루를 이동한 뒤 서쪽의 대피소에서 오는 신호를 받기 시작했습니다. 신호원을 찾아냈고, 그곳에는 피로 쓰인 메시지가 있었습니다. '그들이 우리 모두를 죽이러 왔다. 은하를 떠날 때 뒤에 남겨 둔 이들에게 미안하다.' 그 메시지는 차가운 급류가 몸을 훑고 지나가는 듯한 느낌을 주었습니다. 무언가 위험한 일이 벌어졌다고 추정할 수밖에 없습니다."
 SpecialProjectOtherEvents.12.Name:0 "시간 기계 시제품: §Y3부§!"
 SpecialProjectOtherEvents.13.Desc:0 "은하에 현재 존재하는 모든 국가를 표시하는 외교 패널을 발견했습니다. 놀라운 점은 접촉 목록에 표시된 수가 0이라는 사실입니다. 이는 은하의 모든 국가가 패배했거나 파괴되었다는 뜻입니다. 갑자기 패널 화면에 '사냥꾼들이 왔다!'라는 거대한 붉은 메시지가 나타났습니다. 그들이 무엇을 말하는지 전혀 알 수 없습니다. 몰락 제국들조차 패배했습니다. 시간 기계의 관문에서 우리가 나타난 행성에서 메아리가 감지되었습니다. 이제 떠날 때인 것 같습니다."
 SpecialProjectOtherEvents.13.Name:0 "시간 기계 시제품: §Y4부§!"
 SpecialProjectOtherEvents.14.Name:0 "암흑 은하간-넷: §G첫 번째 항목§!"
 SpecialProjectOtherEvents.15.Name:0 "암흑 은하간-넷: §G두 번째 항목§!"
 SpecialProjectOtherEvents.16.Name:0 "암흑 은하간-넷: §G세 번째 항목§!"
 SpecialProjectOtherEvents.17.Name:0 "암흑 은하간-넷: §G네 번째 항목§!"
 TASKFORCE_OVERTURN:0 "전복 태스크포스 §R(3단계)§!"
 TASKFORCE_OVERTURN_DESC:0 "숙련된 군사 태스크포스의 군대가 알 수 없는 국가에서 탈영하여 §Y[special_project_target.GetName]§!에 공격을 감행했습니다. 그들은 숫자는 적지만 매우 숙련되고 효과적이며, 그들이 원하는 것이 무엇인지 추측하기는 여전히 어렵습니다. 그러나 한 가지는 확실합니다: 지역 보안군은 그들에게 전혀 상대가 되지 않을 것입니다. 우리는 그들을 한 번에 처치하기 위해 최소 §Y40 수송선§!을 보내야 합니다. §R임무 중 일부 병력이 사망할 수 있습니다!§!\n\n보상:\n£influence£ §G(75)§! §Y그리고§! £energy£ §G(4000)§! §Y그리고§! £unity£ §G(1500)§! §Y그리고§! £physics£ §G(2200 - 4400)§! \n\n(§SSpecial Project Extended Mod§!)"
 TEMPORAL_WORMHOLE:0 "시간 웜홀 §Y(2단계)§!"
 TEMPORAL_WORMHOLE_DESC:0 "§Y[special_project_target.System.GetName]§! 성계에 시간 웜홀이 열렸지만, 그 구조는 매우 불안정해 보입니다. 모든 물리학자들은 사라지기 전에 §Y과학선§!으로 관측해야 한다고 주장합니다.\n\n보상:\n§Y???§! \n\n(§S특수 프로젝트 확장 모드§!)"
 TERRAFORMING_STRUCTURES:0 "테라포밍 구조물 §R(3단계)§!"
 TERRAFORMING_STRUCTURES_DESC:0 "§Y[special_project_target.GetName]§!의 우주 공간에서 흥미로운 양의 구조물이 보입니다. 일부 전문가는 이 구조물들의 형태와 위치를 볼 때, 이 모든 것의 목적이 거대한 테라포밍 프로젝트였다는 이론을 제시했습니다. 테라포밍 과정을 시작하기 위해 §Y과학선§!을 보낼 수 있습니다.\n\n보상:\n£§G행성이 거주 가능 행성으로 테라포밍됨§! \n\n(§S특수 프로젝트 확장 모드§!)"
 TERRORIST_GROUP:0 "테러리스트 집단 §Y(2단계)§!"
 TERRORIST_GROUP_DESC:0 "테러리스트 그룹이 §Y[special_project_target.GetName]§!에서 발견되었습니다. 그들이 어떤 재앙을 일으키기 전에 §Y20 수송선§!으로 신속하게 타격해야 합니다. §R작전 중 일부 병력이 사망할 수 있습니다!§!\n\n보상:\n£minerals£ §G(1500)§! §Y그리고§! £energy£ §G(4000)§! \n\n(§SSpecial Project Extended Mod§!)"
 THRUSTERS_MODIFICATION:0 "추진기 개조 §Y(2단계)§!"
 THRUSTERS_MODIFICATION_DESC:0 "미래의 다가오는 사건에 뒤처지지 않기 위해, 우리의 공학자 중 한 명이 우주에서 더 빠르게 이동할 수 있도록 하는 시간 부스터를 개발하고 있습니다. 그는 이 부스터를 민간인 및 군함에 장착할 수 있는 권한을 요청하고 있습니다.\n\n보상:\n§Y수치:§! §G함선 속도 증가§! §Y그리고§! £engineering£ §G(500 - 900)§! \n\n(§SSpecial Project Extended Mod§!)"
 THUNDERSTOMS_STUDY:0 "끝없는 뇌우 연구 §G(1단계)§!"
 THUNDERSTOMS_STUDY_DESC:0 "그들은 이제 끝나고 있으며, 끝이 없습니다. 거대한 폭풍우가 §Y[special_project_target.GetName]§!에서 끊임없이 몰아치고 있습니다. 우리의 전문가들은 기상 재해 연구를 위해 §Y과학선§!을 보내는 것이 안전하다고 추정했습니다.\n\n보상:\n£physics£ §G(500 - 1000)§! \n\n(§SSpecial Project Extended Mod§!)"
 TIME_FREEZE_PLANET:0 "시간이 얼어붙은 행성 §R(3단계)§!"
 TIME_FREEZE_PLANET_DESC:0 "§Y[special_project_target.GetName]§!의 회전이 멈춘 것 같습니다. 행성에서 매우 우려스러운 일이 발생하고 있으며, 시간이 일시적으로 진행되지 않는 것 같습니다. 사건을 관찰하기 위해 §Y과학선§!을 보낼 수 있습니다.\n\n보상:\n£physics£ £society£ £engineering£ §G산출량 증가§! §Y그리고§! £physics£ £society£ £engineering£ §G(1500 - 3000)§! \n\n(§SSpecial Project Extended Mod§!)"
 TIME_MACHINE:0 "시간 기계 시제품 §M(4단계)§!"
 TIME_MACHINE_DESC:0 "우리의 발명가들은 매우 놀라운 것을 만들었습니다. 바로 시간 기계의 첫 번째 프로토타입입니다. 이 기계는 시작 프로토타입에 불과하기 때문에 발명가들은 정의된 시간선으로 점프하는 데 성공하지 못했고, 따라서 가능한 유일한 것은 천 년에서 수백만 년까지의 미래로의 무작위 점프입니다. §R시간을 가지고 노는 것은 항상 나쁜 생각이었습니다. 특히 미래로 가는 경우에는 더욱 그렇습니다! 우리는 그 반대편에서 무엇이 기다리고 있을지 전혀 알 수 없습니다!§!\n\n보상:\n§Y변경치:§! §G영향력 증가§! §Y그리고§! £unity£ §G(10000 - 20000)§! §Y그리고§! £physics£ £society£ £engineering£ §G(20000)§! \n\n(§SSpecial Project Extended Mod§!)"
 TITANIC_ALIEN_FOSSIL:0 "거대 외계 화석 §Y(2단계)§!"
 TITANIC_ALIEN_FOSSIL_DESC:0 "거대한 외계 생물의 화석이 §Y[special_project_target.GetName]§!에서 발견되었습니다. 우리는 그 크기의 표본을 본 적이 없으며, 우리의 생물학자 팀은 이렇게 거대한 생물이 어떻게 죽었는지 알고 싶어합니다. 고고학 프로젝트를 시작하기 위해 §YScience Ship§!을 보내야 합니다.\n\n보상:\n£society£ §G(1500 - 2500)§! \n\n(§SSpecial Project Extended Mod§!)"
 TITANIC_TORNADO:0 "거대한 토네이도 연구 §G(1단계)§!"
 TITANIC_TORNADO_DESC:0 "§Y[special_project_target.GetName]§!에서 매우 놀라운 것이 목격되었습니다. '타이타닉 토네이도'라는 이름에 걸맞은 거대한 크기의 토네이도가 행성에서 아무것도 막을 수 없이 휘몰아치고 있습니다. 이러한 기상 현상은 매우 드물기 때문에, 더 가까이 관찰하기 위해 §Y과학선§!을 보내야 합니다.\n\n보상:\n£engineering£ §G(500 - 1000)§! \n\n(§SSpecial Project Extended Mod§!)"
 TOMB_WORLD_DESOLATION:0 "무덤 행성 황폐화 §Y(2단계)§!"
 TOMB_WORLD_DESOLATION_DESC:0 "국내의 일부 과학자들이 재난 전문가로서 §Y[special_project_target.GetName]§!에 대한 연구를 하고 싶어합니다. 그들은 이 작업이 우리의 식민지 중 하나에서 이러한 재난을 피하는 데 도움이 될 것이라고 주장합니다. 그들의 작업을 시작하기 위해서는 §YScience Ship§!이 필요합니다.\n\n보상:\n£physics£ £society£ £engineering£ §G(1200 - 1800)§! \n\n(§SSpecial Project Extended Mod§!)"
 TOXIC_WORLD_EXPLORATION:0 "독성 행성 탐사 §G(1단계)§!"
 TOXIC_WORLD_EXPLORATION_DESC:0 "우리의 과학 팀 중 하나가 독성 세계에서 발생하는 현상에 대한 지식을 향상시키기 위해 §Y[special_project_target.GetName]§!를 탐험하고 싶어합니다. 그들은 탐험을 제대로 수행하기 위해 우리의 §YScience Ship§! 중 하나가 필요하며, 이는 우리에게도 유용할 수 있습니다.\n\n보상:\n£unity£ §G(75 - 150)§! §YAND§! £society£ §G(200 - 400)§! \n\n(§SSpecial Project Extended Mod§!)"
 TRADE_IMPROVEMENT:0 "무역 개선 §G(1단계)§!"
 TRADE_IMPROVEMENT_DESC:0 "§Y[special_project_target.GetName]§!의 현지 시장은 놀라운 속도로 성장하는 듯합니다. 우리 민간 상선 다수가 이 행성으로 향하고 있지만, 이런 무역 발전을 뒷받침하려면 무역과 자금이 제한 없이 흐를 수 있는 많은 장소를 건설할 수 있도록 우리의 도움이 필요합니다.\n\n보상:\n§Y제국 보정치:§! §G무역가치 추가§! \n\n(§S특수 프로젝트 확장 모드§!)"
 TRADE_PROTECTION:0 "$MOD_STARBASE_TRADE_PROTECTION_ADD$ §G(1단계)§!"
 TRADE_PROTECTION_DESC:0 "전문가들은 우리 무역로의 보안이 매우 허술하다는 점을 알아차렸습니다. 따라서 아주 작은 해적 집단조차도 민간선을 아무 처벌 없이 약탈할 수 있습니다. 그들은 가까운 미래에 우리 무역로를 노릴 수 있는 잠재적 해적 행위를 줄이기 위해, 국경 안에서 순찰을 수행할 임시 보안 지부를 설립하자고 제안합니다.\n\n보상:\n§Y제국 보정치:§! §G무역로 보호 증가§! \n\n(§S특수 프로젝트 확장 모드§!)"
 TRANSPORT_LANDING_TEST:0 "수송선 착륙 시험 §G(1단계)§!"
 TRANSPORT_LANDING_TEST_DESC:0 "운송선 개발을 위한 민간 기업이 그들의 선박을 §Y[special_project_target.GetName]§!에서 테스트하기 위해 우리에게 비용을 지불하고자 합니다. 테스트 절차를 시작하기 위해 §Y운송선§!을 보내야 합니다.\n\n보상:\n£energy£ §G(100 - 400)§! §Y그리고§! £society£ §G(100 - 400)§! \n\n(§SSpecial Project Extended Mod§!)"
 TROPICAL_LANDING_TEST:0 "열대 행성 착륙 시험 §G(1단계)§!"
 TROPICAL_LANDING_TEST_DESC:0 "민간 기업이 식민지 선박을 개발하고 있으며, 열대 행성에서 그들의 선박을 테스트하기 위해 우리에게 비용을 지불하고자 합니다. 그들은 식민지화되지 않은 거주 가능한 행성인 §Y[special_project_target.GetName]§!을 테스트에 적합한 행성으로 선택했습니다. 착륙 훈련 프로토콜을 시작하기 위해 §YColony Ship§!이 필요합니다. 우리는 그 기회를 이용해 우리의 공학자와 과학자 몇 명을 그들의 승무원과 함께 보낼 것입니다. 그들은 착륙하는 동안 이 행성에 대한 유용한 관찰을 할 것입니다.\n\n보상:\n£energy£ §G(200 - 500)§! §YAND§! £society£ §G(200 - 400)§! \n\n(§SSpecial Project Extended Mod§!)"
 TROPICAL_WORLD_EXPLORATION:0 "열대 행성 탐사 §G(1단계)§!"
 TROPICAL_WORLD_EXPLORATION_DESC:0 "끝없는 정글인 §Y[special_project_target.GetName]§!는 탐험가 그룹의 관심을 끌었으며, 그들은 우리의 §YScience Ship§! 중 하나를 사용하여 그 세계를 발견하고자 합니다.\n\n보상:\n£food£ §G(100 - 200)§! §YAND§! £society£ §G(300 - 600)§! \n\n(§SSpecial Project Extended Mod§!)"
 TUNDRA_LANDING_TEST:0 "극지 착륙 시험 §G(1단계)§!"
 TUNDRA_LANDING_TEST_DESC:0 "민간 기업이 식민지 선박을 개발하고 있으며, 극지 행성에서 그들의 선박을 시험하기 위해 우리에게 비용을 지불하고자 합니다. 그들은 식민지화되지 않은 거주 가능한 행성인 §Y[special_project_target.GetName]§!를 시험에 적합한 행성으로 선택했습니다. 착륙 훈련 프로토콜을 시작하기 위해 §Y식민지 선박§!이 필요합니다. 우리는 그 기회를 이용해 우리의 공학자와 과학자 몇 명을 그들의 승무원과 함께 보낼 것입니다. 그들은 착륙하는 동안 그 행성에 대한 유용한 관찰을 할 예정입니다.\n\n보상:\n£energy£ §G(200 - 500)§! §Y그리고§! £physics£ §G(200 - 400)§! \n\n(§SSpecial Project Extended Mod§!)"
 UNDERWORLD_INFILTRATION:0 "지하 세계 침투 §G(1단계)§!"
 UNDERWORLD_INFILTRATION_DESC:0 "§Y[special_project_target.GetName]§!의 범죄는 심각한 문제가 될 만큼 크지는 않지만, 전문가들은 이를 외면하기보다는 추가 확산을 막는 편이 더 낫다고 주장합니다. 일부 보안 장교들은 행성에서 성장 중인 작은 지하 세계에 첩자를 침투시켜 내부에서 폐쇄하고자 합니다.\n\n보상:\n§Y제국 보정치:§! §G범죄 감소§! \n\n(§S특수 프로젝트 확장 모드§!)"
 UNITY_AMBITION:0 "통합에 대한 신뢰 §Y(2단계)§!"
 UNITY_AMBITION_DESC:0 "어떤 사람들은 2200년 이후 우리가 얼마나 멀리 왔는지 아직도 믿지 못하고 있습니다. 이제 우리 국민들에게 이것이 시작에 불과하다는 것을 보여줄 시간입니다. 함께 우리는 끝까지 더 강해질 것입니다.\n\n보상:\n£unity£ §G(1000 - 5000)§! \n\n(§SSpecial Project Extended Mod§!)"
 UNITY_RESISTANCE:0 "통합 저항 §R(3단계)§!"
 UNITY_RESISTANCE_DESC:0 "우리는 강인하게 함께 서 있습니다. 우리의 국민은 사회의 정점이며, 따라서 그들은 존중받아야 합니다. 우리의 전통을 개선하고 새로운 상승을 발전시키기 위해서는 우리 국민 간의 완벽한 단결에 도달해야 합니다. 그리고 마지막으로 우리는 새로운 야망을 창출할 수 있을 것입니다.\n\n보상:\n§Y수치:§! §G유니티 출력 증가§! §Y그리고§! £unity£ §G(5000 - 10000)§! \n\n(§SSpecial Project Extended Mod§!)"
 UNIVERSITY_DEVELOPPEMENT:0 "대학 개발 §Y(2단계)§!"
 UNIVERSITY_DEVELOPPEMENT_DESC:0 "고급 연구 없이는 누구도 멀리 나아갈 수 없습니다.\n\n보상:\n§Y수정치:§! §G경험치 증가§! §Y그리고§! £unity£ §G(300 - 600)§! \n\n(§SSpecial Project Extended Mod§!)"
 UNKNOW_ENEMY_ASSAULT:0 "알 수 없는 적의 강습 §R(3단계)§!"
 UNKNOW_ENEMY_ASSAULT_DESC:0 "§Y[special_project_target.System.GetName]§! 시스템이 정체불명의 세력에 의해 침략당하였습니다. 이들은 구별 없이 보이는 모든 것을 공격하는 것 같습니다. 우리는 이들을 무력화하고 그들의 선박 중 하나를 탈취하여 §Y10 군함§!으로 상황을 파악해야 합니다.\n\n보상:\n£influence£ §G(80)§! §Y그리고§! £unity£ §G(5500)§! §Y그리고§! £energy£ §G(4500)§! \n\n(§SSpecial Project Extended Mod§!)"
 UNKNOW_LIGHTSOURCE:0 "알 수 없는 광원 §G(1단계)§!"
 UNKNOW_LIGHTSOURCE_DESC:0 "우리 함선은 §Y[special_project_target.GetName]§! 근처에서 이상하고 알려지지 않은 광원 하나를 발견했습니다. 스캐너는 그 지점에서 적대적인 신호가 없음을 확인할 수 있습니다. 추가 조사를 위해 §Y과학선§!을 보내야 할 필요가 있으며, 아마도 흥미로운 무언가를 발견할 수 있을 것입니다.\n\n보상:\n£alloys£ §G산출량 증가§! §Y그리고§! £alloys£ §G(50)§! \n\n(§SSpecial Project Extended Mod§!)"
 UNUSUAL_WORLD:0 "특이한 행성 §G(1단계)§!"
 UNUSUAL_WORLD_DESC:0 "§Y[special_project_target.GetName]§!에 뭔가 잘못되었습니다. 두 번째 스캔을 통해 이 행성이 조사되지 않은 비밀 지역을 숨기고 있음을 확인할 수 있습니다. 이는 우리가 수집할 준비가 된 신규 자원을 찾을 수 있는 기회입니다. 이를 위해 §Y과학선§!을 보내 깊이 있는 조사를 해야 합니다.\n\n보상:\n§G산출량 증가§! £volatile_motes£ §Y또는§! £exotic_gases£ §Y또는§! £rare_crystals£ \n\n(§SSpecial Project Extended Mod§!)"
 URBAN_COMBAT:0 "시가전 §G(1단계)§!"
 URBAN_COMBAT_DESC:0 "도시 전투가 §Y[special_project_target.GetName]§!에서 많이 발생하였으며, 우리의 범죄자 검사들은 현재 정부에 불만을 품은 폭동 집단이 그 배후라고 주장하고 있습니다. 그들은 민병대를 구성할 만큼 충분한 범죄자와 강도를 모집하였습니다. 우리는 민병대를 한 번에 해산하기 위해 최소한 §Y2 수송선§!을 보내야 합니다. §R임무 중 일부 병력이 사망할 수 있습니다!§!\n\n보상:\n£energy£ §G(600)§! §Y그리고§! £influence£ §G(30)§! \n\n(§SSpecial Project Extended Mod§!)"
 VOLCANO_BIOME_EXPLORATION:0 "화산 생물군계 탐사 §G(1단계)§!"
 VOLCANO_BIOME_EXPLORATION_DESC:0 "§Y[special_project_target.GetName]§!에서 수백 개의 화산이 있는 거대한 생물군계가 발견되었습니다. 용암 행성이지만, 우리는 행성에서 이렇게 많은 화산을 본 적이 없습니다. 생물군계를 연구하기 위해 §Y과학선§!을 보낼 수 있습니다.\n\n보상:\n£engineering£ §G(200 - 400)§! §Y그리고§! £society£ §G(200 - 400)§! \n\n(§SSpecial Project Extended Mod§!)"
 WARM_BARREN_EXPLORATION:0 "따뜻한 불모 행성 탐사 §G(1단계)§!"
 WARM_BARREN_EXPLORATION_DESC:0 "우리의 과학 팀 중 하나가 따뜻한 황량한 세계에서 발생하는 현상에 대한 지식을 향상시키기 위해 §Y[special_project_target.GetName]§!를 탐험하고 싶어합니다. 그들은 탐험을 제대로 수행하기 위해 우리의 §YScience Ship§! 중 하나가 필요하며, 이는 우리에게도 유용할 수 있습니다.\n\n보상:\n£unity£ §G(75 - 150)§! §YAND§! £minerals£ §G(200 - 400)§! §YOR§! £engineering£ §G(300 - 400)§! \n\n(§SSpecial Project Extended Mod§!)"
 WEAPONARY_AMELIORATION:0 "무기 개선 §Y(2단계)§!"
 WEAPONARY_AMELIORATION_DESC:0 "우리 군사 전문가들은 향후 몇 년 동안 우리의 무기를 개선하기 위해 과학자들과 심도 있게 협력하였습니다. 프로젝트를 시작하기 위해 필요한 것은 단지 승인입니다.\n\n보상:\n§G개선된 피해§! §Y및§! £engineering£ §G(500 - 1000)§! \n\n(§SSpecial Project Extended Mod§!)"
 WHITE_STAR_CAPTAIN:0 "백색 항성 함장 §G(1단계)§!"
 WHITE_STAR_CAPTAIN_DESC:0 "우리 해군의 함장 중 한 명이 F형 백색 왜성 근처에서 해군 훈련을 진행하고 싶어 합니다. 그가 진행하고 싶어 하는 장소는 §Y[special_project_target.GetName]§!이며, 시작하기 위해 필요한 것은 §Y10 척의 군함§!입니다.\n\n보상:\n£unity£ §G(250 - 750)§! \n\n(§SSpecial Project Extended Mod§!)"
 WILDLIFE_TRACK:0 "야생동물 흔적 §G(1단계)§!"
 WILDLIFE_TRACK_DESC:0 "우리는 §Y[special_project_target.GetName]§!에서 외계 제노 생명체의 거대한 발자국을 발견했습니다. 이 발자국이 우리를 매우 흥미로운 무언가로 이끌 가능성이 있지만, 이를 조사하기 위해서는 §YScience Ship§!을 보내야 합니다.\n\n보상:\n£society£ §G(400 - 800)§! §YAND§! £food£ §G(500)§! \n\n(§SSpecial Project Extended Mod§!)"
 WONDROUS_WORLD_STUDY:0 "경이로운 행성 연구 §Y(2단계)§!"
 WONDROUS_WORLD_STUDY_DESC:0 "우리 전문가들은 §Y[special_project_target.GetName]§!를 '경이로운 세계'로 분류했습니다. 이러한 아름다움을 가진 행성을 보는 것은 요즘 드문 일입니다. 우리 국민들은 행성을 탐사하고 사진을 찍기 위해 §Y과학선§!을 보내기를 원합니다.\n\n보상:\n£minerals£ £energy£ £physics£ £society£ £engineering£ £unity£ \n\n(§SSpecial Project Extended Mod§!)"
 YELLOW_STAR_ENERGY:0 "황색 항성 에너지 §G(1단계)§!"
 YELLOW_STAR_ENERGY_DESC:0 "§Y[special_project_target.GetName]§! 근처에서 에너지의 과잉이 감지되었습니다. G형 노란 별이 '과잉 활동'의 짧은 단계에 들어서는 것으로 보이며, §Y건설선§!의 도움으로 일부 에너지를 수확할 수 있습니다.\n\n보상:\n£energy£ §G(500 - 1000)§! \n\n(§SSpecial Project Extended Mod§!)"
