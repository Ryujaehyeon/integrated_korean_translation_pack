l_korean:
 mem_crashed_object_category:0 "물체 충돌"
 mem_crashed_object_category_desc:0 "이 소행성의 탐사 결과, 그 표면에 흩어져 있는 거대한 물체의 조각들을 발견했습니다. 이는 추가 조사가 필요합니다."
 mem_crashed_object.11.name:0 "외계인의 흔적"
 mem_crashed_object.11.desc:0 "소행성 표면에 추락한 물체를 자세히 살펴보니 외계 탐사선으로 밝혀졌습니다! 기본적인 태양 에너지 수집 및 라디오 수신과 송신 기술과 함께, 탐사선은 측면에 장착된 평평하고 홈이 파인 디스크도 포함하고 있습니다. 디스크를 돌리면 쏟아지는 소리들이 발생합니다. [Root.leader.GetName]는 이것이 외계의 음악 형태라고 믿습니다!\n\n불행히도, 이 음악은 그리 좋지 않거나, 혹은 우리와 매우 다른 오디오 감각 장비에 맞춰져 있을 수 있습니다. 그럼에도 불구하고 완전히 다른 종족의 문화 유물... 그건 뭔가 특별한 것이 아닐까요?"
 mem_crashed_object.11.a:0 "나쁜건.. .아니잖아?"
 mem_crashed_object.12.name:0 "탈출정"
 mem_crashed_object.12.desc:0 "소행성 표면에 있는 잔해를 탐사하기 위해 파견된 탐사대가 흥미로운 발견을 가져왔습니다. 실질적인 추진 시스템이 없는 것으로 보아, 이는 비상용 우주선으로 판단됩니다. 그 안에는 지속적인 냉동 보존이 가능한 여러 개의 포드가 발견되었습니다. 대부분은 단일의 임시 포드를 수리하기 위해 분해되었으며, 그 포드에는 한 명의 탑승자가 있었습니다. 시스템이 그들을 살리기 위해 힘겹게 작동했지만, 우리의 추정에 따르면 냉동 시스템은 오백 년 이상 전에 고장났습니다. 별의 방사선이 대부분의 조직을 멸균했기 때문에 생물의 탈수된 유해로부터는 거의 알 수 있는 것이 없습니다.\n\n하지만 모든 것이 잃어버린 것은 아닙니다. 임시 시스템의 순수한 발명적 천재성이 장기 시스템 유지 관리 및 냉동 기술에 대한 우리의 지식을 향상시켰습니다."
 mem_crashed_object.12.a:0 "서로 만나지 못해 아쉽군."
 mem_crashed_object.13.name:0 "빛의 함정"
 mem_crashed_object.13.desc:0 "초기 스캔은 결과는 오류였던 것으로 보입니다. 궤도에서 발견된 빛은 지표 위에 노출된 금속 광석이 반사되었던 것 뿐입니다."
 mem_crashed_object.13.a:0 "아주 많은 광물을 캘 수 없겠군, 아마도."
