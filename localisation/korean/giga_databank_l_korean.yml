 concept_giga_character_dofus_desc:0 "도푸스 테케니크 마키나는 19 AKA부터 캣테일의 성전까지 로쿠알리아의 감독 대통령으로 재임했습니다. 그는 때때로 조금 순진한 면이 있습니다."
