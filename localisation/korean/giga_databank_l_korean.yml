l_korean:
 concept_giga_sr_amb_megaconstruction:0 "$giga_sr_amb_megaconstruction$"
 concept_giga_sr_amb_megaconstruction_desc:0 "£giga_sr_amb_megaconstruction£ §H$giga_sr_amb_megaconstruction$§!은 믿기 어려울 만큼 높은 인장 응력을 견딜 수 있는 첨단 소재를 뜻하며, 가장 거대한 우주 시설을 건설하는 데 필수적입니다.\n\n이 자원의 수입이 높을수록 ['concept_megastructures'] 건설 속도가 빨라집니다. 이 자원은 진행 중인 모든 거대구조물 사이에 §H분배§!되므로, 여러 거대구조물을 동시에 건설하면 전체 건설 속도가 §H느려집니다§!. 따라서 병렬 거대구조물 건설 능력에 대한 일종의 '완만한' 상한으로 작용합니다.\n\n또한 대부분의 거대구조물은 이 자원을 어느 정도 §H유지비§!로 소모하며, 더 큰 구조물일수록 유지비도 커집니다.\n\n증가 방법:\n- £building£['building:building_giga_megaworkshop_hub'] 또는 £building£ ['building:building_giga_megaworkshop'] 건설\n- £mining_station£ ['concept_mining_stations']을 초인장재 매장지가 있는 ['concept_celestial_objects']에 건설"
 concept_giga_sr_bulk_matter:0 "$giga_sr_bulk_matter$"
 concept_giga_sr_bulk_matter_desc:0 "£giga_sr_bulk_matter£ §H$giga_sr_bulk_matter$§!은 천체에서 채취한 대량의 저가치 미정제 물질을 뜻하며, 극도로 거대한 ['concept_megastructures'] 또는 행성 환경을 재현하려는 구조물의 건설 충전재로 사용됩니다.\n\n§H소행성§!, §H암석형 행성§!, §H가스 거성§!에서 채취할 수 있으며, §Y1§! £giga_sr_bulk_matter£ §H$giga_sr_bulk_matter$§!을 ['concept_planet_size']당 하나의 비율로 얻습니다.\n\n이 자원은 §H링월드§!, §H마트료시카 브레인§!, §H$name_alderson$§!, §H버치 월드§!, §H준성 파괴포§!, §H초대질량 E.H.O.F.§!, §H니콜-다이슨 빔§! 건설에 필요합니다.\n\n또한 §H달 거대제작기§!와 §H베히모스 조립 공장§!이 각각 §H공격 위성§!과 §H베히모스 행성함§!을 제작하는 데 사용합니다.\n\n거대구조물이 건설 과정에서 §H행성을 제거§!한다면, 해당 성계 행성들이 보유한 £giga_sr_bulk_matter£ §H$giga_sr_bulk_matter$§! 양은 초기 건설 단계에서 §H할인§!됩니다. 남은 양은 성계 항성 위의 §H대량 물질 저장고§!에 저장되며, 이후 채취해 회수할 수 있습니다.\n\n예를 들어 성계에 §Y75§! £giga_sr_bulk_matter£이 있다면, §H링월드 골조§!는 원래 §Y100§! £giga_sr_bulk_matter£이 필요하지만 §Y25§! £giga_sr_bulk_matter£만 필요합니다. 그러나 성계에 §Y150§! £giga_sr_bulk_matter£이 있다면, 거대구조물의 초기 단계는 £giga_sr_bulk_matter£ 비용이 들지 않으며 §H저장고§!에는 채취 가능한 §Y50§! £giga_sr_bulk_matter£이 남습니다. 이후 건설 단계는 이 메커니즘의 영향을 받지 않으며 저장된 £giga_sr_bulk_matter£을 요구합니다.\n\n증가 방법:\n- §H$decision_harvest_matter_for_planetary_printing$§! ['concept_decision']을 항성이 아닌 ['concept_celestial_object']에 사용해 §H$moon_printer_orbital_mass_harvester_1$§!를 건설하고 행성을 해체하여, §Y1§! £giga_sr_bulk_matter£ §H$giga_sr_bulk_matter$§!을 매 §Y6§!개월마다 산출합니다. 이는 중단할 수 없으며 결국 행성을 완전히 §R제거§!합니다.\n- 성계의 ['concept_star']에서 이 결정을 선택하면 ['concept_system']의 모든 행성에 이 과정을 시작합니다."
