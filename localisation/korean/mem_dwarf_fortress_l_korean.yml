l_korean:
 mem_dwarf_fortress_category:0 "불길 안에서"
 mem_dwarf_fortress_category_desc:0 "심층 스캔의 결과 지표에 이상한 형상들이 포착되었습니다. 이는 인공 조형물의 존재 가능성을 시사합니다."
 mem_dwarf_fortress.1.name:0 "그저 뜨거운 공기"
 mem_dwarf_fortress.1.desc:0 "이상한 형상들은 그저 평범한 고원의 모습을 열과 고르지 않은 마그마의 분포가 스캔을 왜곡했던 것으로 보입니다.어떠한 인공적인 것도 현장에서 발견되지 않았습니다."
 mem_dwarf_fortress.1.a:0 "계속 나아가라."
 mem_dwarf_fortress.2.name:0 "불길 내부에서의 발견"
 mem_dwarf_fortress.2.desc:0 "우리 광부들은 인공적으로 만들어진 것이 분명한 동굴망의 입구를 [mem_dwarf_fortress_planet.GetName]의 불타는 표면 아래서 발견하였습니다.\n\n발굴을 시작하면 채굴 작업이 완전히 중단되겠지만, 심연이 감추고 있는 비밀이 과연 무엇인지 누가 알겠습니까?"
 mem_dwarf_fortress.2.a:0 "발굴을 시작해라."
 mem_dwarf_fortress.2.b:0 "이것 때문에 채굴 작업을 멈출 수는 없지."
 mem_dwarf_fortress.3.name:0 "땅을 쳐!"
 mem_dwarf_fortress.3.desc:0 "다양한 형태의 탐사 굴착을 진행한 결과, 우리의 과학 팀은 명백히 인공 기원인 복잡한 동굴 시스템에 속하는 여러 개의 지하 통로를 발견했습니다.\n\n그 범위를 가늠하는 것은 불가능합니다."
 mem_dwarf_fortress.3.a:0 "더 자세히 조사한다."
 mem_dwarf_fortress_site:0 "심연 속으로"
 mem_dwarf_fortress_site_desc:0 "인공적으로 만들어진 동굴망이 [mem_dwarf_fortress_planet.GetName]의 불타는 표면 아래 있습니다. 위험할 정도로 온도가 높지만, 내열 장비가 충분하다면 추가 탐사를 이어갈 수 있을 겁니다."
 mem_dwarf_fortress.4.name:0 "뜨거운 발걸음"
 mem_dwarf_fortress.4.desc:0 "가느다란 터널 중 가장 큰 것을 따라 한참을 간 끝에, 탐사대는 이곳이 우연한 자연 현상이 아닌 인위적으로 건설된 장소라는 결정적인 증거를 마침내 발견했습니다.\n\n과학자들 앞에, 터널은 갑자기 채석장 같은 구덩이로 깊어집니다. 정체불명의 글자가 새겨진 돌판이 대략 다듬어진 돌 계단의 시작을 표시하고 있습니다. 이 계단은 한쪽으로는 아래로, 다른 쪽으로는 다시 위로 이어져 있으며, 그 사이에는 수십 미터 길이의 빈 바닥이 남아 있습니다."
 mem_dwarf_fortress.4.desc_01:0 "$mem_dwarf_fortress.4.desc$ \n\n구덩이를 건널 때, 과학 장교 [Root.leader.GetName]가 미공개 압력판을 밟아 함정 기계 장치를 의도치 않게 작동시켰습니다. 용암이 빠르게 구덩이를 채우며 계단 꼭대기에 도달하기 직전에 멈췄습니다. 불행히도 팀원 중 누구도 제때 빠져나오지 못했습니다.\n\n용암은 이미 식기 시작했으며, 며칠 내에 안전하게 통과할 수 있을 것으로 예상됩니다."
 mem_dwarf_fortress.4.desc_02:0 "$mem_dwarf_fortress.4.desc$  \n\n구덩이를 가로지를 때, 과학 장교 [Root.leader.GetName]의 보조원이 미공개 압력판을 밟아 함정 기구를 우연히 작동시켰습니다. 용암이 빠르게 구덩이를 채우며 계단 꼭대기에 도달하기 직전에 멈췄습니다. 불행히도 탐사 팀은 구덩이에서 무사히 빠져나오지 못했습니다. 과학 장교 [Root.leader.GetName]은 결코 예전과 같지 않을 것입니다."
 mem_dwarf_fortress.4.desc_03:0 "$mem_dwarf_fortress.4.desc$  \n\n구덩이를 가로지르던 중, 과학 장교 [Root.leader.GetName]가 미공개 압력판을 발견했습니다. 간단한 조사 결과, 이는 정교한 함정 메커니즘의 일부로 밝혀졌으며, 활성화되었을 경우 구덩이를 용암으로 채웠을 것입니다. 팀은 더 깊은 곳에서 유사한 함정을 주의 깊게 살펴보고 있습니다."
 mem_dwarf_fortress.4.a:0 "끔찍한 결과로군. 하지만 우리는 나아가야 한다."
 mem_dwarf_fortress.4.b:0 "불행한 일이지만, 우리는 계속 앞으로 가야만 한다."
 mem_dwarf_fortress.4.c:0 "잘했다. 계속 진행하라."
 mem_dwarf_fortress.5.name:0 "더 많은 함정"
 mem_dwarf_fortress.5.desc:0 "구덩이에서부터 터널의 품질은 자연적으로 울퉁불퉁한 암석 벽이 매끄러운 돌 표면으로 대체되면서 꾸준히 개선되었습니다. 우리의 탐사 팀은 결국 어떤 종류의 벙커 같은 구조물의 입구로 보이는 더 큰 동굴에 들어섰습니다. 동굴 한가운데에는 단 하나의 큰 기둥이 전체 천장의 무게를 지탱하고 있습니다. 그 위에는 탐사 팀이 어떤 종류의... 레버로 추측하는 해독할 수 없는 글자가 새겨진 또 다른 돌판이 놓여 있습니다."
 mem_dwarf_fortress.5.desc_01:0 "$mem_dwarf_fortress.5.desc$ \n\n과학 장교 [Root.leader.GetName]과 [Root.Leader.GetHerHis] 동료들은 이 기계가 무엇을 하기 위해 만들어졌는지에 대한 호기심에 이끌려 그 비밀을 밝혀내기로 했습니다. 모든 예방 조치를 무시하고 [Root.Leader.GetSheHe]는 레버를 당겼습니다.\n\n딸깍하는 소리와 함께 큰 붕괴 소리가 홀을 가득 채웠습니다. 거의 즉시 기둥과 그 위의 천장이 바닥으로 무너졌고, 천천히 원래 위치로 돌아가면서 그 무게에 눌린 불행한 이들을 드러냈습니다."
 mem_dwarf_fortress.5.desc_02:0 "$mem_dwarf_fortress.5.desc$ \n\n과학 장교 [Root.leader.GetName]과 [Root.Leader.GetHerHis] 동료들은 이 기계가 무엇을 하도록 만들어졌는지에 대한 호기심에 이끌려 그 비밀을 밝혀내기로 했습니다. 모든 예방 조치를 무시하고 [Root.Leader.GetSheHe]는 레버를 움직였습니다.\n\n딸깍 소리와 함께 큰 붕괴음이 홀을 가득 채웠습니다. 거의 즉시 기둥과 그 위의 천장이 바닥으로 무너졌고, 천천히 원래 위치로 돌아가면서 그 무게에 눌린 불행한 이들을 드러냈습니다. 간신히 죽음을 피했지만, 이는 과학 장교 [Root.leader.GetName]에게 오랫동안 잊지 못할 인상을 남겼습니다."
 mem_dwarf_fortress.5.desc_03:0 "$mem_dwarf_fortress.5.desc$ \n\n[Root.Leader.GetHerHis] 자신의 호기심과 [Root.Leader.GetHerHis] 동료들의 호기심에 이끌려, 과학 장교 [Root.leader.GetName]는 [Root.Leader.GetHerHis] 유치한 레버를 당기고 싶은 충동을 억누르기로 결정하고, 대신 [Root.Leader.GetHerHis] 스캐너를 사용하여 안전한 거리에서 기계를 연구하기로 했습니다.\n\n결과는 [Root.Leader.GetHerHis] 의심을 확인해주었습니다: 레버는 기둥과 천장의 큰 부분을 고정하는 복잡한 기계와 연결되어 있습니다. 레버를 작동시키면 대부분의 천장이 바닥으로 떨어질 것 같았습니다. 이후, 기계는 떨어진 조각들을 다시 원래 위치로 들어올려 기계를 초기화할 것입니다. 누가 이런 함정을 만들었을까요?"
 mem_dwarf_fortress.5.a:0 "다른 팀을 보내라. 우리는 포기하지 않을 것이다!"
 mem_dwarf_fortress.5.b:0 "생존자들을 더 신중하게 행동하라고 꾸짖는다."
 mem_dwarf_fortress.5.c:0 "큰일 날뻔했군. 다른 함정들도 조심해라."
 mem_dwarf_fortress.6.name:0 "위험한 방"
 mem_dwarf_fortress.6.desc:0 "벙커에 들어가는 것은 예상외로 쉬웠습니다. 주요 출입구가 부분적으로만 닫혀 있었기 때문입니다. 그러나 탐사대는 음산한 장면을 맞이했습니다. 짧지만 건장한 외계인 휴머노이드의 미라화된 시체들이 바닥에 흩어져 있었습니다. 여기서 정확히 무슨 일이 있었는지는 불분명하지만, 그들 모두가 폭력적인 최후를 맞이한 것으로 보입니다.\n\n벙커 입구 근처의 첫 번째 접근 가능한 복합체는 보안 요원을 위한 막사와 무기고로 사용되었던 것으로 추정됩니다. 이 외계인들은 우리와 유사한 기술을 보유하고 있었던 것으로 보이며, 파워 아머와 에너지 기반 무기를 사용했습니다. 그러나 흥미롭게도, 저장 공간의 큰 부분은 망치와 도끼와 같은 여러 구식 근접 무기로 가득 차 있었습니다.\n\n복합체 내부로 조사가 진행되면서, 과학 장교 [Root.leader.GetName]는 [Root.Leader.GetSheHe]가 어떤 훈련 홀로 생각하는 곳으로 들어갔습니다. 팀원이 아무 표시도 없는 레버를 경솔하게 당기자, 여러 개의 스파이크가 바닥에서 빠르게 솟아올랐다가 다시 나타났던 것처럼 빠르게 수축했습니다. 레버를 당겼을 때 나타난 아이콘은 이 스파이크가 사용자가 회피 기술을 훈련하는 데 사용되도록 설계되었음을 시사합니다."
 mem_dwarf_fortress.6.desc_01:0 "$mem_dwarf_fortress.6.desc$ \n\n보아하니, 과학 장교 [Root.leader.GetName]과 [Root.Leader.GetHerHis] 팀의 대부분은 최악의 회피 능력을 가진 것 같습니다..."
 mem_dwarf_fortress.6.desc_02:0 "$mem_dwarf_fortress.6.desc$ \n\n어떤 위험도 우아하게 피하며, 과학 장교 [Root.leader.GetName]는 누구도 심각하게 다치기 전에 '훈련' 메커니즘을 비활성화하는 데 성공했습니다. 이 사건 이후 레버를 당기던 바보는 그의 직위에서 해임되었습니다."
 mem_dwarf_fortress.6.a:0 "끔찍하군!"
 mem_dwarf_fortress.6.b:0 "이만하면 다행이군..."
 mem_dwarf_fortress.6.c:0 "어디서 이런 멍청이를 찾았지?"
 mem_dwarf_fortress.7.name:0 "어두운 농담"
 mem_dwarf_fortress.7.desc:0 "입구 구역을 지나, 과학 장교 [Root.leader.GetName]과 [Root.Leader.GetHerHis] 팀은 상업 지구라고 믿는 곳에 들어섰습니다. 벽의 부조, 바닥, 일상 용품에서, 탐사 팀은 이전 거주자들의 역사 중 상당 부분을 재구성했습니다. 이 시설은 이러한 혹독한 환경에서, 시설 깊은 곳에 그들에게 믿을 수 없을 만큼 가치 있는 희귀 광물의 광맥이 존재한다고 믿고 설립되었습니다. 마그마를 지표로 펌프질하여 거의 무한한 에너지원에 접근할 수 있었고, 여러 개의 용암 기반 함정에 의존하는 방어 시스템을 구축했으며, 그들의 "원치 않는 존재"를 처리하는 방법을 발견했습니다 - 이는 부조에서 광범위하고 반복적으로 보여졌습니다.\n\n특히 가치 있는 발견은 외계인의 언어를 번역할 수 있는 충분한 샘플을 제공한 도서관이었습니다. 이는 그들의 기술과의 상호작용을 더 쉽게 만들 뿐만 아니라, 그들의 유머를 엿볼 수 있게 해주었습니다. 다양한 함정 위치에서 발견된 돌판의 보관된 이미지는 다음과 같이 적혀 있었습니다: "발을 조심하세요..."와 "이것을 만지지 마세요!"는 각각 용암과 레버 함정을 위한 것입니다. 또 다른 예로는 그들의 묘지 중 하나에 있는 묘비가 전사 하나가 여러 개의 스파이크에 찔리는 모습을 부조로 보여주며, "왜 피하지 않았나요?!"라는 캡션이 달려 있었습니다. 이로 인해 그리 멀지 않은 기억이 떠올랐다는 것은 놀라운 일이 아닙니다...\n\n과학 장교 [Root.leader.GetName]은 현재 탐사 팀이 아직 열지 못한 거대한 문 뒤에 잠겨 있는 중앙 구역을 검색하여 여기서 무슨 일이 있었는지에 대한 더 많은 정보를 찾기를 기대하고 있습니다."
 mem_dwarf_fortress.7.a:0 "열어 봐라."
 mem_dwarf_fortress.8.name:0 "불과 피로"
 mem_dwarf_fortress.8.desc:0 "게이트를 여는 것은 꽤나 힘든 일이었습니다. 발굴 팀이 마침내 통과했을 때, 이것이 우연이 아니라는 것이 분명해졌습니다. 누군가 내부에서 다시 열 수 없을 정도로 밀봉하기 위해 많은 노력을 기울였던 것입니다. 아무도 시도하지 않았던 것은 아닙니다. 주민들은 서로를 죽이는 것에 더 관심이 있었던 것처럼 보였지만, 그 이유는 한 과학자가 벙커의 데이터 저장소에서 연대기를 우연히 발견한 후에야 명확해졌습니다.\n\n처음에 전초 기지는 꾸준히 성장하였고, 그 번영은 많은 신입 주민들을 끌어들였습니다. 많은 주민들은 광산에서 일할 뿐만 아니라, 자신들과 다른 아름답고도 이상한 창조물들의 프랙탈 이미지로 정교하게 장식된 물건들을 만드는 미술에도 참여했습니다. 그들의 채굴 노력이 첫 성공을 거두었을 때, 식민지는 경제적 호황을 경험했습니다.\n\n모호한 경쟁자들에게 끊임없이 포위당했음에도 불구하고, 여러 세대에 걸쳐 지속되었습니다. 그러나 행성의 중심부를 향한 발굴이 마무리 단계에 접어들면서, 연대기의 기록은 오래전부터 시들해져 갔고, 인구 사이에서 커져가는 탐욕과 광범위한 편집증에 대해 보고하고 있었습니다.\n\n비이성적인 행동과 폭력적인 폭발이 증가하면서, 모든 것은 '경비대의 군주'가 벙커의 감독관에게 매우 귀중한 유물의 소유권을 두고 결투를 도전하면서 재앙적인 사건의 연쇄로 절정에 달했습니다. 그 유물은 이름으로만 언급된 §Y'Cubortob Unil Omoth'§!였습니다. 결투는 곧 생과 사의 싸움으로 변했고, 도전자가 승리로 끝났습니다. 이후의 기록은 첫 번째 결투와 유사한 연속적인 결투가 매일 발생하고 있음을 보고하고 있습니다. 연대기의 끝은 반복되는 한 줄로 이루어져 있습니다: "그것은 내 것이 될 것이다!"\n\n상황은 그 시점부터 빠르게 악화된 것으로 보이며, 발굴 팀은 어떤 물체가 전체 사회를 붕괴시킬 수 있는지 궁금해하게 되었습니다. 불행히도, 그 유물에 대한 추가 정보는 발견되지 않았습니다.\n\n이 식민지에서 채굴된 귀중한 물자에 대해 더 알아내기 위해, 과학자들은 중심 천공 구역으로 향했지만, 또 다른 차단된 문에 맞닥뜨리게 되었습니다..."
 mem_dwarf_fortress.8.a:0 "뭘 해야 하는지 알겠지?"
 mem_dwarf_fortress.9.name:0 "집단 정신병"
 mem_dwarf_fortress.9.desc:0 "문이 열리자, 발굴 팀은 이 구역에 더 많은 시체가 널려 있는 것을 발견하고 놀라지 않았습니다. 그러나 그 중 하나는 눈에 띄었습니다.\n\n가장 외진 구석에 숨겨져 있던 한 시체가 벽에 기대어 있었고, 그 죽음의 손아귀에는 이상하게 생긴, 지나치게 큰 금속 부츠가 쥐어져 있었습니다. 시체 옆에는 데이터패드가 있었고, 그 내용은 이 이상한 물체의 본질에 대한 단서를 제공했습니다. 마지막 로그 항목에 적힌 유일한 내용은 "내 것, 드디어 내 것!!!"이었지만, 과학 장교 [Root.leader.GetName]는 이 금속 사바톤이 §Y'Cubortob Unil Omoth'§!로, 이 식민지의 붕괴 원인임을 빠르게 결론지었습니다.\n\n자세히 살펴보니, 이 유물의 일부는 전초 기지가 원래 채굴하기 위해 설립된 초희귀 물자였던 것으로 밝혀졌습니다. 시설의 연대기에서는 손상되거나 조작될 경우 원래 형태를 '기억'하는 능력 덕분에 '생체 금속'이라고 명명되었습니다 - 본질적으로 자가 수리 물자입니다. 지하 광맥이 열리고 생체 금속이 주민들에게 도입되자, 그것은 식민지의 나머지 주민들 사이에서 빠르게 널리 사용되었습니다. 이전 거주자들이 분명히 깨닫지 못했던 것은 이 물자와의 장기적인 접촉이 그들의 정신 건강에 미치는 부정적인 장기적 영향이었습니다. 과학 장교 [Root.leader.GetName]는 모두에게 이 물질과의 직접적인 신체 접촉을 피하고, 이를 다룰 때 보호복을 착용할 것을 현명하게 권고했습니다.\n\n이 희귀 금속의 매장량은 아직 완전히 개발되지 않은 것으로 보이며, 충분한 안전 조치를 취하면 여기서 채굴 작업을 재개할 수 있을 것입니다."
 mem_dwarf_fortress.9.a:0 "뛰어난 업적이군."
 mem_dwarf_fortress_boot:0 "영감을 주는 장인기술"
 r_mem_dwarf_fortress_boot:0 "큐보르토브 우닐 오모스"
 r_mem_dwarf_fortress_boot_desc:0 "'게으른 일꾼을 부수는 망치'\n\n이것은 듀라스틸 장화입니다. 최고급 장인 기술로 제작되었습니다. 통치자가 노동자들을 때리고 발로 차는 모습을 묘사한 판화가 널리 새겨져 있습니다. 그것은 뉴트로늄 고리에 살아있는 금속의 송곳을 달아 장식하고 있으며 위협적입니다."
 leader_trait_mem_traumatized:0 "$leader_trait_traumatized$"
 leader_trait_mem_traumatized_desc:0 "$leader_trait_traumatized_desc$"
 mem_dwarf_fortress.8.b:0 "채굴이라, 그렇지?"
 mem_dwarf_fortress.9.b:0 "다시 일하러 가세, 친구들."
