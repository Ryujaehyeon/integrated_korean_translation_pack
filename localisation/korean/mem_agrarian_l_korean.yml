l_korean:
 mem_agrarian_dig_site:0 "목가적인 농장"
 mem_agrarian_dig_site_desc:0 "이 행성의 작은 고립된 지역은 정돈된 농작물 구역으로 덮여 있으며, 식물들이 무성하게 자라 있지만 여전히 인식할 수 있습니다. 이 특징은 특히 [From.Planet.GetName]에 존재하는 유일한 기존 인공 구조물이라는 점을 고려할 때 매우 이질적으로 보입니다. \n\n기계화된 농업 장비는 여전히 밭에서 녹슬고 있으며, 농장 주인은 어디에도 보이지 않습니다."
 mem_agrarian.1.name:0 "거대한 무덤"
 mem_agrarian.1.desc:0 "§Y[Leader.GetName]§!는 [From.Planet.GetName]의 이전 거주자들이 사라진 이유에 대한 가능한 설명을 발견했다고 보고합니다. \n\n정착지의 변두리에서 [Leader.GetSheHe]는 여러 시신이 가방에 담겨져 콘크리트가 부어지기 전에 쌓인 도랑을 발견했습니다. 이 도랑은 불균형한 품질의 충전물로 구분되어 있는 것으로 보아, 시신을 처리하는 과정이 몇 달, 아니면 몇 년이 걸렸음을 시사합니다. 발견된 시신은 이 종이 얼마나 공동체적인지에 따라 모든 가구의 약 60-80%를 차지하는 것으로 추정됩니다. \n\n시신에서 외부의 외상이 발견되지 않으며, 방사능 오염, 알려진 독소 또는 부식성 물질의 흔적도 없습니다. 그러나 참조용 생물체가 없고 일반적으로 집단 묘지의 상태가 좋지 않아 사망 원인을 추론하는 것은 불가능합니다."
 mem_agrarian.2.name:0 "병원"
 mem_agrarian.2.desc:0 "우리는 정착지 외곽에서 반쯤 묻힌 건물을 발견했습니다. §Y[Leader.GetName]§!는 이 건물이 식민지가 아직 살아 있을 때 병원으로 사용되었을 것이라고 믿고 있습니다. \n\n건물 자체는 대부분 정리되었고 많은 문서가 파괴되었습니다. 정착민들이 식물 기반의 필기 표면, 점토 벽돌 작업, 나무 가구와 같은 저기술 솔루션을 선택했음에도 불구하고, 필요할 때마다 사용했던 고급 기술, 즉 정교한 의료 스캐너와 분자 제약 프린터에 접근할 수 있었던 것으로 보입니다. \n\n병원 기록이 사라졌음에도 불구하고, §Y[Leader.GetName]§!는 어느 시점에서 매우 전염성이 강한 질병이 정착민들에게 영향을 미쳤다고 추론합니다."
 mem_agrarian.3.name:0 "안테나"
 mem_agrarian.3.desc:0 "§Y[Leader.GetName]§! 보고서에 따르면 [From.Planet.GetName]의 버려진 정착지 한가운데에서 이상한 것을 발견했습니다. \n\n상대적으로 얕은 깊이에서 고고학자들은 매우 높은 안테나를 발견했습니다. 그 기초는 정착지 한가운데에 의도적으로 배치된 것으로 보이며, 이는 안정적인 신호 범위를 보장하기 위한 것으로 보입니다. 이 안테나는 어떤 초공간 사양에도 맞춰져 있지 않지만, 그럼에도 불구하고 지금까지 회수된 기술 중 가장 고급의 기술이라고 할 수 있습니다. \n\n전송되는 신호의 정확한 성격은 현재로서는 불확실하지만, 신호의 출처는 안테나 바로 아래 지하에서 발견될 가능성이 높습니다."
 mem_agrarian.4.name:0 "생체 물질 조작"
 mem_agrarian.4.desc:0 "§Y[Leader.GetName]§!는 [From.Planet.GetName]의 안테나 아래에 있는 지하 복합체를 성공적으로 침투했다는 보고를 합니다. 정착지의 나머지 부분에 비해 매우 고급으로, 평균적인 우주 항해 문명 수준에 해당합니다. 대부분의 장비는 고장났지만, 일부 데이터는 여전히 회수되었습니다. 행성 인구의 멸종으로 이어진 사건들이 명확해졌습니다. \n\n정착민들은 영혼을 억압하는 기술 사회에서 벗어나고자 했던 원시인 집단으로, 은하의 먼 지역에서 활동하던 문명에서 유래했습니다. \n\n그들이 필요하다고 판단한 제한된 기술만으로 [From.Planet.GetName]로 이동하여 식민지를 세웠습니다. 식민지 운영에 충분한 인력을 확보하기 위해 그들은 특별히 설계된 프로그래머블 바이오매스를 가져왔습니다. 이는 당시 로봇 기술보다 열등했지만 그들의 원시적인 생활 방식에 더 적합했습니다. \n\n지하 복합체와 안테나는 사실 바이오매스 구조물의 제어 시스템이었습니다."
 mem_agrarian.5.name:0 "걸작"
 mem_agrarian.5.desc:0 "확대 연구 후, §Y[Leader.GetName]§!는 [From.Planet.GetName]에서 식민지가 붕괴된 나머지 사건들을 조합했습니다. \n\n한동안 식민지는 원활하게 운영되었고 정착민들은 감염에 직면할 때까지 단순한 삶을 즐겼습니다. 감염은 아마도 이 세계에 토착된 것이었고, 대부분은 빠르게 succumbed 되었지만, 인구의 일부는 죽기까지 수년이 걸렸습니다. 격리 조치에도 불구하고 감염의 확산은 막을 수 없었고 모든 정착민이 감염되었습니다. 유일하게 영향을 받지 않은 생명체는 생물량이었습니다. 그들이 운명 지어진 것을 깨달은 정착민들은 자신의 마음을 생물량 제어 시스템에 복사하고 구조물로서 삶을 살기로 선택했습니다. \n\n하지만 그들 중 한 기술자는 다른 계획을 가지고 있었습니다. 자신을 일종의 궁극적인 예술가로 여기며, 그는 성격 코어에 대한 완전한 접근을 위해 전송 시스템을 파괴했습니다. 과정이 완료된 후, 그는 다른 정착민들의 진정한 본성에 대한 기억을 지우고 그들의 성격을 조작하는 데 모든 시간을 바쳤습니다. 무슨 일이 일어나고 있는지, 자신들이 누구인지 전혀 알지 못한 사실상 불사의 정착민들은 천천히 부패하는 건물과 방치된 들판 사이에서 생물량 구조물로서 같은 날을 반복해서 살았고, 유일하게 자각이 있는 사람은 그들의 성격과 기억을 변경하여 자신의 취향에 맞는 무언가를 만들었습니다. \n\n이 과정은 약 40년 동안 지속되었고, 전력 중단이 전송을 방해하여 모든 구조물이 분해되었습니다. 복합체가 존재한다는 것을 아는 유일한 사람은 그것을 유지하는 데 관심이 없었던 것 같습니다."
 mem_agrarian.5.a:0 "흥미로운 이야기로군."
 d_mem_agrarian_deposit:0 "황량한 농경지"
 d_mem_agrarian_deposit_desc:0 "외계 개척민들이 한때 정착했던 넓은 지역입니다. 이 다산한 땅은 소유주들이 전염병으로 사망한 후 버려졌습니다."
 mem_agrarian_site:0 "목가적인 농장"
 mem_agrarian_site_desc:0 "이 행성의 작은 고립된 지역은 정돈된 농작물 구역으로 덮여 있으며, 식물들이 무성하게 자라 있지만 여전히 인식할 수 있습니다. 이 특징은 특히 [From.Planet.GetName]에 존재하는 유일한 기존 인공 구조물이라는 점을 고려할 때 매우 이질적으로 보입니다. \n\n기계화된 농업 장비는 여전히 밭에서 녹슬고 있으며, 농장 주인은 어디에도 보이지 않습니다."
