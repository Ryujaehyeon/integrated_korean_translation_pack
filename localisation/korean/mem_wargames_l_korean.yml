l_korean:
 mem_wargame_observer_object:0 "버려진 스테이션"
 mem_wargame.1.name:0 "고대 전쟁터"
 mem_wargame.1.desc:0 "삼중 §Y[From.GetName] 항성계§!는 꽤나 이색적인 광경입니다. \n\n잔해로 가득 차 있지만, 그럼에도 불구하고 생명체로 가득 차 있으며, 이 항성계의 여러 행성들은 원시 문명을 보유하고 있는 것으로 보입니다. \n\n우리는 고립된 행성 중 하나를 공전하는 버려진 기지를 감지하고 있으며, 조용히 항성계를 지켜보고 있습니다."
 mem_wargame.1.a:0 "우린 조사해야만 한다."
 MEM_WARGAME_EXPLORE_STATION:0 "버려진 스테이션 조사"
 MEM_WARGAME_EXPLORE_STATION_DESC:0 "§Y[mem_wargame_system.GetName] 항성계§!를 조사하는 동안, 우리는 한 행성을 공전하고 있는 버려진 기지를 발견했습니다. 이 기지는 이 항성계의 과거에 대한 흥미로운 정보를 담고 있을지도 모릅니다."
 mem_wargame.2.name:0 "전쟁 게임"
 mem_wargame.2.desc:0 "[Root.GetName]는 [mem_wargate_station_planet.GetName] 주위를 도는 이상한 기지에 대한 성공적인 조사를 보고합니다. \n\n생존한 데이터 코어에 따르면, 이 시스템은 대규모 실험으로 설정되었거나, 어쩌면 일종의 오락으로 사용되었습니다. \n\n네 종족이 미지의 세력에 의해 지성화되어, 초공간 항법이 불가능한 전투함을 제공받고 서로 싸우도록 설정되었으며, 그들의 후원자는 시스템 외곽의 안전한 미공개 위치에서 이를 지켜볼 수 있었습니다. \n\n모든 종족의 음모자들이 기지에 침투하여 탑승한 모두를 학살하면서 실험은 갑작스럽게 종료되었습니다. 이상하게도 보복은 없었고, 기술을 유지하는 데 필요한 실용적인 지식이 부족한 원주민들은 곧 원시적인 삶으로 돌아갔습니다."
 mem_wargames_station_site:0 "버려진 스테이션"
 mem_wargames_station_site_desc:0 "성계 외각의 거대한 가스 구름에 숨겨져 있는 이 버려진 스테이션은 확실히 연구가 필요합니다."
 mem_wargame.3.name:0 "격납고"
 mem_wargame.3.desc:0 "우주 정거장에 진입하는 것은 그리 어렵지 않았습니다. 셔틀 격납고는 활짝 열려 있고, 이 구역의 공기는 배출되어 대기가 없습니다. \n\n에너지 무기로 인한 화상 자국이 벽 몇 군데에서 보이며, 놀랍게도 화학 추진 발사체의 충격 흔적도 발견됩니다. 공기가 배출된 이유는 현재로서는 불분명하지만, 확실히 전투 때문은 아닙니다."
 mem_wargame.4.name:0 "관람실"
 mem_wargame.4.desc:0 "고고학자들이 [From.Planet.GetName] 주위를 도는 기지 안에서 진전을 이루고 있습니다. \n\n그들의 최근 발견은 큰 방으로, 벽에는 대형 스크린이 가득 차 있고 많은 관람객을 위한 편의 시설이 마련되어 있습니다. 바, 테이블, 좌석이 식별됩니다. 깨진 유리와 부서진 스크린 같은 작은 전투의 흔적도 보입니다."
 mem_wargame.5.name:0 "전쟁 게임"
 mem_wargame.5.desc:0 "[Leader.GetName]는 [From.Planet.GetName]을(를) 공전하는 이상한 기지에 대한 성공적인 조사를 보고합니다. \n\n생존한 데이터 코어에 따르면, 이 시스템은 대규모 실험 또는 아마도 일종의 오락으로 설정되었습니다. \n\n네 종족이 미공개된 당사자에 의해 지성화되었고, 초공간 항법이 불가능한 전투함을 제공받아 서로 싸우도록 설정되었으며, 그들의 후원자는 시스템 외곽의 안전한 장소에서 이를 지켜볼 수 있었습니다. \n\n실험은 네 종족의 음모자들이 기지에 침투하여 탑승한 모두를 학살하면서 갑작스럽게 종료되었습니다. 이상하게도 보복은 없었고, 기술을 유지하는 데 필요한 실질적인 지식이 부족한 원주민들은 곧 원시적인 삶으로 돌아갔습니다."
 mem_wargame.5.ega:0 "누군가 에어록 밖으로 튕겨나가는 순간까지 오락거리를 보듯이 희희낙락했겠지."
 mem_wargame.5.pac:0 "야만적인 족속들..."
 mem_wargame.5.pacphobe:0 "멍청한 짓에 걸맞은 멍청한 최후로군."
 mem_wargame.5.mil:0 "재미있는 발상이군."
 mem_wargame.5.mat:0 "매우 교육적이었겠어."
 mem_wargames_comprehensive_study:0 "심리역사학적 이해"
 mem_wargames_comprehensive_study_desc:0 "전쟁 게임 관측소에서 회수된 데이터는 우리가 원시 문명으로 이해하는 많은 부분을 변화시켰습니다."
 mod_station_observer_missions_upkeep_mult:0 "관측 기지 임무 유지비"
 mod_station_observer_missions_produces_mult:0 "전초 기지 관측 임무 산출량"
