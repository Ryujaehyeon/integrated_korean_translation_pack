l_korean:
 INVESTIGATE_REALITY_CODE_1:0 "신호 추적"
 INVESTIGATE_REALITY_CODE_1_DESC:0 "우리가 방금 연결한 $ehof_ehof_abr$가 있는 시스템의 어딘가에서 희미한 신호를 감지하고 있습니다. 아마도 흥미로운 무언가일 수 있습니다?"
 INVESTIGATE_REALITY_CODE_2:0 "신호 추적"
 INVESTIGATE_REALITY_CODE_2_DESC:0 "우리는 $ehof_ehof_abr$가 방금 연결된 시스템의 어딘가에서 또 다른 희미한 신호를 감지하고 있습니다. 아마도 흥미로운 무언가일 수 있습니다?"
 INVESTIGATE_REALITY_CODE_3:0 "신호 추적"
 INVESTIGATE_REALITY_CODE_3_DESC:0 "세 번째로, 우리 $ehof_ehof_abr$가 방금 연결한 시스템의 어딘가에서 희미한 신호를 감지하고 있습니다. 아마도 흥미로운 무언가일 수 있습니다."
 INVESTIGATE_REALITY_CODE_4:0 "신호 추적"
 INVESTIGATE_REALITY_CODE_4_DESC:0 "우리는 $ehof_ehof_abr$가 방금 연결한 시스템의 어딘가에서 다시 한 번 희미한 신호를 감지하고 있습니다. 아마도 흥미로운 무언가일 수 있습니다?"
 INVESTIGATE_REALITY_CODE_5:0 "신호 추적"
 INVESTIGATE_REALITY_CODE_5_DESC:0 "우리는 $ehof_ehof_abr$가 방금 연결된 시스템의 어딘가에서 또 다른 미약한 신호를 감지하고 있습니다. 아마도 흥미로운 무언가일 수 있습니다."
 INVESTIGATE_REALITY_CODE_6:0 "신호 추적"
 INVESTIGATE_REALITY_CODE_6_DESC:0 "우리는 $ehof_ehof_abr$가 방금 연결한 시스템의 어딘가에서 익숙한 신호를 감지하고 있습니다. 이는 흥미로운 무언가일 것으로 안전하게 추측할 수 있습니다."
 INVESTIGATE_REALITY_CODE_7:0 "창조자들의 경이"
 INVESTIGATE_REALITY_CODE_7_DESC:0 "새로 발견된 성계에서 엄청난 에너지 레벨이 감지되고 있습니다!\n\n조사하는 것이 최선입니다."
 ehof_travel.1001.NAME:0 "신호 추적"
 ehof_travel.1001.DESC:0 "우리는 $ehof_ehof_abr$가 방금 연결한 시스템의 어딘가에서 희미한 신호를 감지하고 있습니다. 아마도 흥미로운 무언가일 수 있습니다?"
 ehof_travel.1001.a:0 "종요할 정도로 모호하게 들리는군요!"
 ehof_travel.1002.NAME:0 "현실에 대한 계시"
 ehof_travel.1002.1.DESC:0 "§H[this.GetName]§!가 §H[from.solar_system.GetName]§! 시스템에서 전송을 감지했습니다. 이전 전송과 마찬가지로, 이 전송은 함선의 주요 시스템을 비활성화했습니다; 이번에는 함선의 $ehof_closed_modular$가 이를 신속하게 완전 기능으로 복원할 수 있었습니다. 함선의 [Owner.GetScientistPlural]는 이 현상을 $ehof_epcs$라고 명명했습니다.\n\n§H[this.GetName]§!가 다시 온라인 상태가 된 후, 탑재된 $ehof_ep$ 스캐너가 전송의 출처를 찾을 수 있었습니다: 우리의 조사관들이 §H[from.GetName]§!라고 명명한 유독성 행성입니다.\n\n$ehof_ep$ 스캐너를 포함한 추가 조사가 전송의 출처를 정확히 찾아낼 수 있을 것입니다. 전송이 매우 짧고 반복되지 않았기 때문에, 이를 수행하는 데 시간이 걸릴 수 있습니다."
 ehof_travel.1002.2.DESC:0 "또 다른 $ehof_epcs$ 전송이 §H[this.GetName]§!의 §H[from.solar_system.GetName]§! 시스템에서 수신되었습니다. 이전 두 번과 마찬가지로, 전송은 함선을 비활성화했습니다. 그러나 이번에는 개선된 $ehof_closed_modular$가 함선의 기능을 몇 분 안에 복원할 수 있었습니다.\n\n$ehof_ep$ 스캐너는 시스템 내에서 전송의 출처를 식별할 수 있었습니다: 파괴된 행성 §H[from.GetName]§!. 추가 조사를 통해 우리는 행성의 정확한 출처를 찾을 수 있을 것이지만, 시간이 좀 걸릴 것입니다."
 ehof_travel.1002.3.DESC:0 "§H[this.GetName]§!는 §H[from.solar_system.GetName]§! 시스템 내에서 또 다른 $ehof_epcs$ 전송을 받았습니다. 우리 [Owner.GetScientistPlural]가 탑승한 우주선은 이 전송이 §H[from.GetName]§!라는 이름의 얼어붙은 행성에서 발생했음을 확인했습니다.\n\n우리가 그곳으로 탐사를 떠나기 전에 송신기의 정확한 위치를 추가 조사를 통해 파악해야 합니다."
 ehof_travel.1002.4.DESC:0 "또 다른 $ehof_epcs$의 전송이 §H[from.solar_system.GetName]§! 시스템 내에서 §H[this.GetName]§!에 의해 감지되었습니다. 이번에는 §H[from.GetName]§!라는 이름의 용암 행성에서 방출되는 것으로 보입니다.\n\n함선의 $ehof_ep$ 스캐너가 그 출처를 정확히 찾아낼 수 있겠지만, 시간이 좀 걸릴 것입니다."
 ehof_travel.1002.5.DESC:0 "§H[this.GetName]§!는 $ehof_epcs$의 또 다른 전송을 받았습니다. 이번 전송은 §H[from.GetName]§!라는 이름의 거대 가스 행성에서 §H[from.solar_system.GetName]§! 시스템으로부터 발생했습니다.\n\n우리는 가능한 한 빨리 이 출처를 조사해야 합니다."
 ehof_travel.1002.6.DESC:0 "§H[root.solar_system.GetName]§! 항성계에 진입하자, §H[this.GetName]§!가 $ehof_ep$ 신호를 감지했습니다 - 하지만 이상하게도, 이번에는 항성계 중심에 있는 surprisingly large brown dwarf에서 온 것이었습니다.\n\n이렇게 거의 초거대 천체의 내부를 조사하는 것은 벅차지만, 우리는 그 신호의 출처를 찾아야 하며 $ehof_epcs$를 완료해야 합니다."
 ehof_travel.1002.a:0 "훌륭합니다! 즉시 조사하세요!"
 ehof_travel.1003.NAME:0 "창조자들의 경이"
 ehof_travel.1003.DESC:0 "우리는 §H[from.solar_system.GetName]§! 항성계에서 발산되는 이상한 신호를 감지하고 있습니다! 아마도 우리가 오랫동안 찾고 있던 $ehof_epcs$와 관련이 있을까요?"
 ehof_travel.1003.a:0 "멋집니다! 신호를 풀어낼 때가 왔습니다!"
 ehof_travel.1004.NAME:0 "주인이 부른다"
 ehof_travel.1004.DESC:0 "$ehof_the_sphere$의 외부에서는 어떤 입구도 확인할 수 없습니다. 이는 $ehof_epcs$에 대한 연구에서 관찰한 증폭기 물체와 유사할 수 있으며, 그 입구는 $ehof_ep$와 관련된 특정 조건에서만 나타납니다.\n\n구조를 연구하여 내부로 들어갈 방법을 찾아야 하며, 그 기능을 파악하는 것은 물론입니다. 우리의 [Owner.GetResearchers]는 표면을 가로지르는 물결 모양의 비반복 패턴을 기반으로 이 구조물을 $ehof_the_sphere_named$라고 명명하기로 결정했습니다."
 ehof_travel.1004.a:0 "멋지군요! 시작합시다..."
 ehof_shrouded_maze_digsite:0 "부서진 도시"
 ehof_shrouded_maze_digsite_desc:0 "[from.planet.GetName]의 초기 '표면' 스캔 결과, 이 행성은 찢어졌음에도 불구하고 전체 표면을 뒤덮던 도시 경관이 비교적 완전한 상태로 남아 있는 것으로 나타났습니다. 아마도 이 도시의 남은 파편들이 행성에 어떤 일이 일어났는지 밝혀줄 수 있을 것입니다."
 ehof_shrouded_maze.11.name:0 "그리고 그것은 아름다웠습니다"
 ehof_shrouded_maze.11.desc:0 "부서진 도시의 행성과 여기 부서진 조각들 중 하나에 있는 수도에 대한 설명"
 ehof_shrouded_maze.11.a:0 "답변"
 ehof_shrouded_maze.12.name:0 "약속"
 ehof_shrouded_maze.12.desc:0 "행성의 번영을 설명하고, '약속'에 대해 설명한다"
 ehof_shrouded_maze.12.a:0 "답변"
 ehof_shrouded_maze.13.name:0 "끔찍한 거래"
 ehof_shrouded_maze.13.desc:0 "읽기 검사, 첫 번째 미로 단서,"
 ehof_shrouded_maze.13.a:0 "옳은 답변"
 ehof_shrouded_maze.13.b:0 "그른 답변"
 ehof_shrouded_maze.14.name:0 "파편 속의 평화"
 ehof_shrouded_maze.14.desc:0 "아, 그런 일이 실제로 일어났군요, 두 번째 미로 단서, 세 번째 미로 단서"
 ehof_shrouded_maze.14.a:0 "정말 놀랍군"
 giga_shrouded_maze:0 "완만히 변하는 풍경"
 giga_shrouded_maze_desc:0 "우리가 짙은 안개와 구름 사이로 이 행성의 표면을 관찰할 수 있는 작은 부분은 계속해서 이동하고 있습니다."
