l_korean:
 mem_aevumd.40520.name:0 "여기 있는 모든 것은 작업 중입니다."
 mem_aevumd.40520.desc:0 "자신을 신이라 자칭하는 존재로, 시간을 조작하고 나이를 거꾸로 되돌립니다. 그는 어느 정도 당신을 돕기 위해 자신의 힘을 사용할 것입니다. 그러나 그의 조작은 그의 수명에 대가를 치르게 합니다. 이는 그가 조작할 때마다 일부 건강을 잃는다는 것을 의미합니다. 그의 제국은 그를 늙지 않고 건강하게 유지하는 책임이 있습니다."
 mem_aevumd.40520.a:0 "당신의 수염은 무슨 일인가요?"
 NAME_mem_aevum_time_lord:0 "시간의 마법사 아에붐"
 mem_aevum_color:0 "§Y§!"
 spawn_mem_aevum:0 "생성 §Y$NAME_mem_aevum_time_lord$§!"
 mem_aevum_time_lord_catchphrase:0 "시간은 상대적이며, 과거는 끝나지 않았고 미래는 이미 펼쳐지고 있습니다. 오직 내일만이 무엇이 될지를 알고 있습니다."
 mem_aevum_time_lord_backstory:0 "한때 과학자였던 그는 이제 자칭 신입니다. 관측소 37의 유일한 생존자로서 그는 시간 조작 능력을 얻었습니다. 신 놀이를 좋아하더라도, 그는 자신의 병을 가진 누구와 마찬가지로 죽을 수 있는 존재입니다."
 mem_aevum_allowed:0 "§G$NAME_mem_aevum_time_lord$ 허용됨§!"
 mem_aevum_disabled:0 "§R$NAME_mem_aevum_time_lord$ 비활성화됨§!"
 mem_aevum_tooltip:0 "- $mem_aevum_system$ 성계를 생성합니다.\n- 첫 번째 플레이어가 이를 조사합니다.\n- $NAME_mem_aevum_time_lord$을 만나 그의 명령을 수행하거나 하지 않거나.\n- 어쨌든 그의 시간 마법 메뉴에 접근합니다.\n- 그 능력을 사용하여 현재를 형성하세요."
 mem_aevum_building_temple:0 "영원한 신전"
 mem_aevum_building_temple_desc:0 "영원히 지속되도록 건설합니다. 한때 $NAME_mem_aevum_time_lord$의 요청이었던 것이 이제는 예측과 경제 계획을 위한 장소로 만들어졌습니다."
 mem_aevum_mega_chronomancer_palace:0 "$mem_aevum_building_temple$"
 mem_aevum_mega_chronomancer_palace_DESC:0 "$mem_aevum_building_temple_desc$"
 mem_aevum_mega_chronomancer_palace_MEGASTRUCTURE_DETAILS:0 "모든 천체에서 §Y1§!의 크기를 드러내어 §Y3§! £sr_zro£ 자원을 매장합니다.\n시스템 전체를 §Y정지§! 시스템과 유사한 시간적 이상으로 덮습니다."
 overclock_mem_aevum_default:0 "인프라"
 overclock_mem_aevum_high:0 "방어"
 overclock_mem_aevum_eco:0 "공격"
 overclock_mem_aevum_default_desc:0 "건설 프로젝트를 초과 충전하는 것은 지속적인 경제 성장의 중요한 부분입니다."
 overclock_mem_aevum_high_desc:0 "우리의 방어망을 강화하면 어떤 공격자도 저지할 수 있습니다."
 overclock_mem_aevum_eco_desc:0 "충전!"
 mem_aevum_invade_thisguy_title:0 "§Y를 침공합니다 [mem_aevum_primitive_rewind_world.GetName] §!"
 mem_aevum_invade_thisguy_desc:0 "그의 시간은 끝났습니다. 우리는 그의 유한성을 상기시킬 것입니다. [mem_aevum_primitive_rewind_world.GetName]을 침공하고 §Y$NAME_mem_aevum_time_lord$§!을 생사에 관계없이 회수하십시오."
 mem_aevum_decoded_messages_chain_title:0 "§Y$NAME_mem_aevum_time_lord$§! 기원"
 mem_aevum_decoded_messages_chain_desc:0 "우리는 §Y[mem_aevum_primitive_rewind_world.System.GetName]§! 성계에서 여러 왜곡된 메시지를 발견했습니다. 이들은 시간적 이상에서 손실된 전송으로 보입니다. 우리가 할 수 있는 것을 회수하고 이 성계의 기원에 대해 배워야 합니다."
 mem_aevum_decoded_messages:0 "연구된 이상 현상"
 mem_aevum_decoded_messages2:0 "메시지 해독됨"
 mem_aevum_decoded_messages3:0 "시간의 변동이 사라짐"
 mem_aevum_decoded_messages4:0 "전송이 중단되었습니다."
 mem_aevum_findsystem_title:0 "§Y 시스템에 들어가세요 [mem_aevum_primitive_rewind_world.System.GetName] §!"
 mem_aevum_findsystem_desc:0 "시간적 이상 현상에 휘말린 것 같습니다. 가능한 한 많은 지식을 수집해야 합니다."
 r_mem_aevum_houglass:0 "수정체 모래시계"
 r_mem_aevum_houglass_desc:0 "시간 그 자체로 엮여진 존재. 각 알갱이는 반짝이는 결정이다. 좁은 공간을 따라 쏟아져 내린다. 잊혀진 태양들, 잃어버린 문명들, 그리고 선명한 비전들...\n\n이 $r_mem_aevum_houglass$는 모든 것을 보았고 아무것도 보지 못했다. 과거와 미래는 영원히 그 원들에 묶여 있다."
 mem_aevum_revivetimelord:0 "§Y의 $NAME_mem_aevum_time_lord$의 시기적절한 죽음을 되돌립니다.§!"
 mem_aevum_sit_wait_20years:0 "지연된 만족"
 mem_aevum_sit_wait_20years_type:0 "시간 낭비"
 mem_aevum_sit_wait_20years_desc:0 "§Y$NAME_mem_aevum_time_lord$§!가 우리에게 20년을 기다리라고 요청했습니다. 우리가 무엇을 기다리고 있는지는 알 수 없지만, 그가 우리의 인내심을 시험하고 있다는 것은 확실합니다."
 mem_aevum_sit_wait_20years_monthly_change_tooltip:0 "시간 낭비"
 mem_aevum_hmm_okletswait:0 "우리는 더 이상 기다리지 않을 것입니다."
 mem_aevum_letswait_approach:0 "기다립니다."
 mem_aevum_sc_t:0 "$sc_t$"
 mem_aevum_system:0 "정지 상태"
 mem_aevum_make_lightshow:0 "오락을 제공합니다 §Y$NAME_mem_aevum_time_lord$§!"
 mem_aevum_make_lightshow_DESC:0 "우리는 §Y$NAME_mem_aevum_time_lord$§!를 위해 장관을 만들어야 합니다. 그게 무슨 뜻이든 간에... \n\n화학 물질을 태우고 §Y[mem_aevum_primitive_rewind_world.GetName]§!의 궤도에서 레이저를 쏴보세요."
 mem_aevum_invade_thisguy:0 "침략 §Y[mem_aevum_primitive_rewind_world.GetName]§!"
 mem_aevum_decode_message:0 "메시지 연구하기"
 mem_aevum_cursedworld:0 "시간에 얼어붙음"
 mem_aevum_buildtemple_title:0 "신전 건설: $NAME_mem_aevum_time_lord$"
 mem_aevum_buildtemple_desc:0 "마지막 시험입니다. 희망적으로. §Y을(를) 위해 신전이라는 거대 구조물을 건설합시다 - $NAME_mem_aevum_time_lord$ §!."
 mem_aevum_stage1:0 "대기 중"
 mem_aevum_stage2:0 "더 기다림"
 mem_aevum.1.name:0 "두 번째 만남?"
 mem_aevum.1.desc:0 "아, 시대의 거주자들이여, 시간의 본질인 Aevum 앞에 다시 서 있습니다.\n\n하루살이 존재의 한계 안에서 순환하는 존재들이 품고 있는 질문은 무엇입니까? 말하십시오, 그리고 당신의 짧은 욕망의 메아리가 우리의 담론을 통해 울려 퍼지게 하십시오.\n\n나는 당신에게 임무를 제시합니다, 시대의 거주자여. 내 영역의 하늘을 밝혀주십시오, §Y[mem_aevum_primitive_rewind_world.GetName]§!, 당신의 능력의 범위를 드러내십시오.\n\n당신의 노력의 광채가 내 세계의 태피스트리에서 춤추는 그림자를 꿰뚫게 하십시오!"
 mem_aevum.1.a:0 "당신은 누구입니까?"
 mem_aevum.1.a.response:0 "나는 §Y$NAME_mem_aevum_time_lord$§!입니다, 신입니다. 불멸의 존재로서, 시간의 현재는 내 손아귀를 벗어나며, 그림자들이 영원의 감춰진 속삭임 속에서 춤을 춥니다."
 mem_aevum.1.b:0 "우리는 이미 만난 적이 있습니까?"
 mem_aevum.1.b.response:0 "우리는 과거의 메아리 속에서 이미 대화하였고, 결코 태어나지 않을 미래를 엿보았습니다. 현재는 단지 반영일 뿐이며, 운명이 엮어낸 교향곡과 일치합니다. 이를 의문시하는 것은 우주의 포옹에 저항하는 것입니다.\n\n§L그의 눈은 멀리 떠돌며 설명할 수 없는 어떤 블랙홀을 반영하는 것처럼 보입니다.§!\n\n한 번도 문명화되지 않은 존재가 나에게 말했습니다: 과거에 있었던 것은 미래에도 있을 것입니다. 흥미롭지 않나요?"
 mem_aevum.1.c:0 "§Y[mem_aevum_primitive_rewind_world.System.GetName]§!에 대해 아는 것이 있습니까?"
 mem_aevum.1.c.response:0 "내 힘을 반영합니다. 그것은 나의 고향이며, 나의 존재의 힘에 의해 형성되어 나의 모든 것을 반영합니다.\n\n나는 시대의 직조자이며, 그것은 나의 존재의 무한한 메아리를 품도록 만들어졌습니다."
 mem_aevum.1.d:0 "좋습니다, 우리는 당신의 명령을 수행하겠습니다."
 mem_aevum.1.e:0 "터무니없는 소리입니다. 침투 작전을 준비하세요!"
 mem_aevum.2.name:0 "시간 부족"
 mem_aevum.2.desc:0 "§Y[mem_aevum_primitive_rewind_world.System.GetName]§! 성계는 심각한 공간적 및 시간적 이상 현상을 겪고 있습니다.\n\n시간이 느려져 거의 정지 상태입니다. 이 성계에 들어가는 모든 함선이나 존재는 약 9배 느려집니다. [this.GetName]에서 오는 메시지조차 지연되며 성계를 떠난 후 재구성해야 했습니다.\n\n이러한 이상 현상을 초래할 수 있는 원인은 확실하지 않습니다."
 STRANGE:0 "이상한"
 mem_aevum.5.name:0 "제3차 회의"
 mem_aevum.5.desc:0 "잘했어, 시간에 얽매인 자여.\n\n정말로, 너는 오락과 아름다움을 얽어냈구나. 이렇게 원시적인 기술이 내 밤하늘에 무엇을 불러올 수 있는지 정말 놀랍구나.\n\n이제, 시대의 거주자여, 내 다음 속삭임을 준비하거라."
 mem_aevum.5.a:0 "보상은 어떻습니까?"
 mem_aevum.5.a.response:0 "아, 시대의 거주자여, 시간을 인식하라. 시간은 미로 같은 통로를 통해 흐른다.\n\n나는 너의 미약한 요청을 부정하지도, 부정하고 싶지도 않지만, 내 행동의 순간은 아직 드러나지 않았다."
 mem_aevum.5.b:0 "왜 원시인들 사이에서 살고 있습니까?"
 mem_aevum.5.b.response:0 "원주율, 당신이 언급한 원주율들은 내일의 지배의 족쇄를 만들 수 있습니다.\n\n아니면 당신의 지배의 그물에 먼저 그들을 가두겠습니까?\n\n판단은 시간의 흐름 속에서 하루살이 같은 덧없는 것입니다. 나에게 모든 순환하는 존재들은 불분명하게 비슷한 모습을 지니고 있습니다.\n\n§L그는 잠시 말을 멈추어 자신의 말이 스며들도록 한 후 계속합니다...§!\n\n당신은 불쾌할 수 있지만, 그들은 당신의 과거 자아의 메아리를 반영합니다. 곧 그들은 하늘을 날고 천국을 떠돌 것입니다, 현재의 당신처럼."
 mem_aevum.5.d:0 "다음에 무엇을 하길 원하십니까?"
 mem_aevum.4.name:0 "$mem_aevum.5.name$"
 mem_aevum.4.desc:0 "당신의 이 영혼은 나를 기쁘게 합니다, 시대의 거주자.\n\n지금은 인내를 받아들이라는 당신의 유일한 칙령입니다. 우리의 운명이 다시 얽히기 전에 §Y20년§!의 모래가 모래시계를 통해 흘러가게 하십시오."
 mem_aevum.4.b:0 "당신의 종족은 수염을 가져야 하나요?"
 mem_aevum.4.b.response:0 "운명의 실타래가 당신이 부르는 우주라는 천상의 영역과 얽혔습니까? 별들 사이를 날아다니도록 운명 지어졌습니까? 당신의 종족은 우주의 광활함을 견디기 위해 태어났습니까?\n\n§L그는 잠시 기다리며, 심한 모욕에 대한 분노로 얼굴이 일그러졌습니다. 그의 팔이 뻗어 있습니다. 그의 말을 강조하기 위한 정교하게 준비된 장관§!\n\n그런데, 이 우주적 현실 앞에서 당신은 내 수염의 존재에 신경을 쓰고 있습니까?!?"
 mem_aevum.4.a:0 "좋습니다, 기다립시다."
 mem_aevum.4.d:0 "우리는 이럴 시간이 없습니다. 침공 준비를 하십시오."
 mem_aevum.7.name:0 "패배한 시간 마법사의 저주"
 mem_aevum.7.desc:0 "오 시대의 거주자들, 당신들이 한 용감하지만 어리석은 행동이 무엇인지. \n\n 당신의 야만적인 노력에 대해, 나는 당신에게 나의 작별 선물을 주겠다. \n\n§L 그가 말하는 순간, 행성 주위의 시간은 번개처럼 빠르게 흐르기 시작한다. 마치 그가 시스템의 흐름을 빨아들이는 것 같다. 침략하는 군대는 신의 분노 앞에서 천천히 공황에 빠지기 시작한다. §!\n\n 이 길이 당신들 스스로의 선택이었다는 것을 당신의 의식에 새기라, 시대의 거주자들여. 결과를 직면하라. \n\n§L 그의 저주가 완전히 발효되면서 [Root.Capital.GetName]에서 사이렌이 울리기 시작한다. §!"
 mem_aevum.7.a:0 "그게 전부였나요?"
 mem_aevum.9.name:0 "중간막"
 mem_aevum.9.desc:0 "당신의 인내에 감사를 표하지만, 매우 유감스럽게도 운명이라는 무자비한 심판이 우리의 운명적인 정점에 시험을 부여했음을 알려야 합니다.\n\n당신의 연약한 20년은 제가 요구하는 기간을 충족하지 못합니다. 중간에서 만납시다, 좋습니까?\n\n저는 §Y당신의 진행 상황을 5년만큼 초기화하겠습니다§! 그리고 우리는 그 결과에서 만날 것입니다."
 mem_aevum.9.a:0 "괜찮습니다."
 mem_aevum.9.b:0 "충분하다. §Y[mem_aevum_primitive_rewind_world.GetName]§!를 침략하라."
 mem_aevum.10.name:0 "제4차 회의"
 mem_aevum.10.desc:0 "나는 당신을 축하합니다, 시대의 거주자여. 운명의 악명 높은 변덕에도 불구하고, 당신은 내가 원하는 것을 이룩했습니다.\n\n원하신다면 잠시 쉬거나 다음 시험을 갈망하십시오. 두려워하지 마십시오, 당신의 보상이 가까이 다가옵니다.\n\n§L그는 기뻐하는 듯 보입니다. 밝은 미소와 기대하는 눈빛으로 당신의 지친 표정을 맞이합니다...§!\n\n그리고 이제, 마지막 노력으로, 나의 신성한 기쁨에 대한 증거로...\n\n나를 위해 신전을 건설하시오, 그것이 당신의 건축적 기량의 정점이 되게 하십시오. 당신의 최고의 창조물로 나를 존경하십시오."
 mem_aevum.10.a:0 "좋습니다. 건설을 시작합시다."
 mem_aevum.11.name:0 "마지막 회의"
 mem_aevum.11.desc:0 "잘했습니다. 당신의 성취를 자랑스럽게 생각하세요.\n\n당신은 묻습니다: 이렇게 큰 인내와 노력에 대한 보상은 무엇입니까?\n\n간단합니다, 시대의 거주자여, 정말로! 신이 당신의 영역을 축복할 것입니다. §Y저, $NAME_mem_aevum_time_lord$, 당신의 제국에 합류할 것입니다.§!\n\n계절이 지나가는 동안 저를 숭배할 자유를 느끼세요."
 mem_aevum_decode_message_DESC:0 "병 속의 메시지\n\n이 메시지는 §Y정지§! 성계 곳곳에 흩어져 있습니다. 우리의 과학자는 이 메시지를 하나씩 다시 연결할 수 있다고 믿고 있습니다. 메시지를 올바른 순서로 정리하면 이는 쉬운 작업이 될 것입니다. 어떤 이들은 이를 매듭을 푸는 것에 비유하기도 했습니다."
 mem_aevum.11.a:0 "우리는 당신에게 무엇을 제공받을 수 있습니까?"
 mem_aevum.11.a.response:0 "어린 자여, 내가 너의 영역에 무엇을 제공할 수 있는지에 대한 질문을 멈추어라.\n\n대신, 신에게 무엇을 바칠지를 고민해보아라. 너의 시련은 가치의 증거로서 마무리되고 있다. 절정을 받아들이고, 너에게 부여된 힘을 만끽하라. 왜 너의 어린 현재를 초월하는 것에 대해 질문하는가?\n\n§H그는 잠시 생각을 멈춘다. 깊은 숙고의 순간 후에 그는 계속해서 말한다.§!\n\n내 능력의 태피스트리를 보여주겠다. 시간의 무기화, 적을 지연시키는 기술, 경제 흐름을 가속화하는 방법, 또는 거대한 구조물의 건설을 신속하게 하는 것에 대해 생각해본 적이 있는가?"
 mem_aevum.11.b:0 "그것은 관측소 37을 파괴한 생물에게 무슨 일이 있었던 것인가?"
 mem_aevum.11.b.response:0 "나는 시간의 흐름 속에 잃어버린 사건의 수수께끼를 깊이 생각해 보았고, 당신이 그 퍼즐의 조각을 발견한 것 같습니다.\n\n조금 설명할 기회를 주십시오. 원주율로 알려진 생물체는 이 시스템을 반복적으로 자신의 무덤으로 선택받은 사회, 매 몇 년마다 죽음의 경계로 돌아옵니다. 나는 그것이 같은 존재임을 확신할 수 있습니다. 순환하는 죽음의 춤에 갇혀 있습니다.\n\n그러나 약 100년 전, 호기심을 자아내는 운명의 전환이 일어났고, 의식적인 죽음이 멈췄습니다. 원주율도 나도 그 과거 시대의 그림자 속에서 펼쳐진 수수께끼의 열쇠를 쥐고 있지 않습니다.\n\n§H그가 웃고 있습니다...§!\n시간만이 모든 것을 말해줄 것이라고 할 수 있습니다."
 mem_aevum.11.c:0 "왜 당신은 결코 대피하지 않았습니까?"
 mem_aevum.11.c.response:0 "당신은 부드러운 감정을 건드렸습니다, 시대의 거주자.\n\n아프지만, 내 메시지가 결코 집으로 돌아가지 못했을 것이라고 의심합니다. 이 시스템에서 잃어버린 채, 끝없이 반향하며 되돌아오는 메아리, 영원한 복도에서 불려지는 애가. 내 존재의 무대에서 우주적 힘이 연주하는 잔인한 농담에 불과합니다.\n\n나와 내 승무원의 운명은 이제 오직 당신의 지식의 장막 속에 가려져 있습니다."
 mem_aevum.11.d:0 "당신은 신이 아니죠?"
 mem_aevum.11.d.response:0 "§H오랜 침묵, 아마도 그가 가장 길게 한 침묵은 커져가는 기대감을 불러일으킵니다.§!\n\n내가 뭐라고 말할 것 같습니까? 예와 아니오, 둘 다 진실이 아닌 것들로 가려져 있습니다.\n\n나는 당신이 내 힘의 경계를 이해할 것이라는 환상을 품고 있지 않습니다. 이것을 이해하십시오: 본질적으로 신은 한계가 없는 존재가 아닙니다.\n\n당신은 신으로 태어났습니까, 아니면 시간의 흐름이 당신에게 그 칭호를 부여했습니까?\n\n수천 년 동안 내 힘은 당신의 시대에 얽매인 이해를 초월했지만, 여전히 한계가 있습니다. 원주율의 눈에는 당신과 내가 신성하며, 각각 신과 같은 능력을 지니고 있습니다.\n\n신의 본질을 정의하는 것은 한계의 부재가 아니라, 성취할 수 있는 것의 발현입니다. 현재의 시대에서 나는 신이며, 더 이상 신이 아닌 날까지 그렇습니다."
 mem_aevum.16.name:0 "함장 일지: 1276일째"
 mem_aevum.16.desc:0 "마침내, 이 기계를 다시 작동시켰습니다. 마지막 메시지를 위해서만이라도. 확인합니다: 이것이 제 마지막 녹음이 될 것입니다. 관측소에서의 대피 후, 우리의 탈출 포드는 여러 가지 이상 현상을 지나쳤습니다. 한 승무원은 존재하지 않게 되도록 젊어졌고, 또 다른 승무원은 급속히 노화되어 단 몇 순간 만에 나이가 들었습니다.\n\n우리 중 세 명만이 지표에 도달했습니다. 대부분의 비축 식량은 상했습니다. 우리의 유일한 선택은 가장 가까운 원시 도시로 가서 음식과 피난처를 찾는 것이었습니다. 주요 지침은 저 멀리 던져버렸습니다! 저는 제 승무원들이 이렇게 죽도록 내버려 둘 수 없었습니다.\n\n§L녹음에서 작은 한숨이 나옵니다.§!\n\n우리는 도시로 들어갈 수 있었습니다. 외계인으로서가 아니라, 구세주로서 맞이받았습니다. 그들은 우리를 신의 사자로 믿었습니다. 어떻게 된 일인지 우리의 모습이 여러 벽에 이미 새겨져 있었습니다.\n\n다음 해에, Shlay와 Dirko가 죽었습니다. Shlay는 치명적인 감염에 걸렸고, Dirko는 그의 새로운 역할을 남용한 후 이단자들에 의해 잔인하게 죽임을 당했습니다. 얼마나 부끄러운 죽음인지... 하지만 저는 여전히 남아 있습니다. 무슨 목적을 위해? 누가 알겠습니까... \n§L긴 정적...§!\n\n이 메시지를 발견한 분에게, 우리의 친족에게 우리가 죽었다고 전해주십시오.\n\n- Aevum T. Dohrnii - 관측소 37의 유일한 생존자"
 mem_aevum.16.a:0 "비극적"
 mem_aevum.16.b:0 "그에게 물어봅시다."
 mem_aevum.13.name:0 "함장 일지: 437일째"
 mem_aevum.13.desc:0 "지난 1년 동안 우리는 원주율 내에서 어떤 이상 현상도 관찰하지 못했습니다. 그들은 우리의 존재를 인식하지 못하는 것 같습니다. 우리는 그들이 어떤 종류의 신을 숭배하고 있다고 확신합니다.\n\n함장과 승무원들은 우리가 §Y[mem_aevum_primitive_rewind_world.System.GetName]§! 성계에서 시간을 이렇게 파괴한 존재나 대상을 찾을 수 있을지 확신하지 못하고 있습니다. 우리는 낙관적이며, 모든 역경에도 불구하고 이 미스터리의 뿌리를 밝혀내기를 희망합니다.\n\n- Aevum T. Dohrnii - 관측소 37의 함장 및 수석 과학자"
 mem_aevum.13.a:0 "흥미롭습니다."
 mem_aevum.14.name:0 "함장 일지: 576일째"
 mem_aevum.14.desc:0 "거대한 물체가 이 성계에 도착했습니다.\n\n§L배경에서 사이렌 소리가 들립니다. 그의 목소리에는 억제된 공포가 뚜렷하게 느껴집니다.§!\n\n그 크기는 더 큰 소행성과 더 작은 행성체 사이입니다. 하이퍼드라이브는 감지되지 않았습니다. 진입 지점은 별에 너무 가까워서 정상적인 점프가 아닙니다. 방금 도착한 물체는 시간의 왜곡을 일으킵니다. 일부 시간적 이상 현상이 우리의 탑재 시스템을 파괴하여 바위와 희귀 광물만 남겼습니다.\n\n- 에이붐 T. 도르니 - 관측소 37의 함장 및 수석 과학자"
 mem_aevum.14.a:0 "매혹적입니다."
 mem_aevum.15.name:0 "함장 일지: 579일째"
 mem_aevum.15.desc:0 "기초 기능을 복구하기 위한 무의미한 시도가 3일간 계속된 후, 우리는 §Y[mem_aevum_primitive_rewind_world.GetName]의§! 표면으로 대피해야 했습니다. 우리는 제프와 콸트렉의 희생을 겪었습니다. 그들이 우리를 구하고 제국을 위해 죽었다는 사실을 그들의 가족에게 전해 주시기 바랍니다.\n\n§L떨어지는 잔해의 충돌 소리가 들립니다.§!\n\n우리는 긴급 대피가 필요합니다. 우리의 상황은 심각합니다. 반복합니다, 대피가 우리의 유일한 선택입니다.\n\n- 에이붐 T. 도르니 - 관측소 37의 함장 및 수석 과학자"
 mem_aevum.15.a:0 "걱정스럽습니다."
 mem_aevum.17.name:0 "시간 속에서 잃어버린 신호"
 mem_aevum.17.desc:0 "우리는 시간 루프에 갇힌 것으로 보이는 여러 메시지를 발견했습니다. 첫 번째 메시지를 찾았고, 이를 해독할 준비가 되었습니다. 우리는 무엇을 해야 할까요?"
 mem_aevum.17.a:0 "해독을 시작합시다."
 mem_aevum.17.b:0 "관심 없음."
 mem_aevum.18.name:0 "중간막"
 mem_aevum.18.desc:0 "요구 사항은 하루살이 메아리입니다. 욕망은 잡히지 않는 그림자입니다. 우리의 운명이 다시 얽힙니다. 왜, 이 시대의 거주자들아, 우리의 길이 이렇게 빨리 다시 만나는 것인가?"
 mem_aevum.18.a:0 "아마도 우리는 묻지 말아야 할 것입니다."
 mem_aevum.18.c:0 "신성한 존재가 없습니다."
 mem_aevum.19.name:0 "미래의 전령"
 mem_aevum.19.desc:0 "경하합니다, 우리는 §Y$NAME_mem_aevum_time_lord$§!를 §Y[mem_aevum_primitive_rewind_world.System.GetName]§! 성계에서 발견했습니다. 그는 우리의 존재를 인식하지 못한 것 같았습니다. 임무는 완벽하게 성공했습니다."
 mem_aevum.19.a:0 "당신은 누구입니까?"
 mem_aevum.19.a.response:0 "저는 [mem_aevum_future_leader.GetName]입니다. 과학자이자 탐험가입니다."
 mem_aevum.19.b:0 "당신의 임무는 무엇이었습니까?"
 mem_aevum.19.b.response:0 "§Y를 관찰하기 위해 알려진 존재인 $NAME_mem_aevum_time_lord$ §!를 관찰합니다."
 mem_aevum.19.c:0 "[mem_aevum_future_leader.GetName]는 이미 활성 서비스 중입니다."
 mem_aevum.19.c.response:0 "네 .. 저는 지금 제 함선에서 근무 중입니다, 그렇죠?"
 mem_aevum.19.d:0 "당신은 더 나이 들어 보입니다."
 mem_aevum.19.d.response:0 "§Y[mem_aevum_primitive_rewind_world.System.GetName]§! 시스템은 신비로운 방식으로 작동합니다."
 mem_aevum.19.welcomeback:0 "과거에 오신 것을 환영합니다!"
 mem_aevum.20.name:0 "새롭게 반복"
 mem_aevum.20.desc:0 "10년 전, §Y[mem_aevum_primitive_rewind_world.System.GetName]§! 시스템을 관찰하기 위해 파견된 과학자가 과거로 돌아갔습니다. 우리의 다른 미래 자아처럼 같은 일을 고려해봐야 합니다. 또 다른 선택지는 역사가 반복되지 않을 경우 어떤 일이 발생하는지 보는 것입니다. 선택은 당신의 몫입니다."
 mem_aevum.20.a:0 "루프를 완료합니다."
 mem_aevum.20.tt:0 "[mem_aevum_future_leader2.GetName]을 과거로 보냅니다."
 mem_aevum.20.b:0 "루프를 무시합니다."
 mem_aevum.21.name:0 "미확인 탈출 포드"
 mem_aevum.21.desc:0 "우리의 고향 성계로 정체불명의 물체가 접근하고 있습니다. 그것은 우리 특별 설계의 과학 함선 탈출 포드 중 하나인 것 같습니다. 우리는 그것을 식별할 수 없었습니다. 포드는 우리의 활동 중인 과학자 중 한 명의 휘장을 달고 있습니다."
 mem_aevum.21.a:0 "채널 열기."
 mem_aevum.21.b:0 "부숴버려라!"
 mem_aevum_leader_2young_tt:0 "£trigger_no£ §Y$NAME_mem_aevum_time_lord$§!는 너무 어립니다!"
 mem_aevum_chronomancer_on_cooldown:0 "§Y$NAME_mem_aevum_time_lord$§!는 휴식을 취하고 있습니다."
 mem_aevum_speed_building:0 "$mem_aevum_button1_title$"
 mem_aevum_speed_building_decision:0 "$mem_aevum_button4_title$"
 mem_aevum_button2_deage_all_tt:0 "모든 지도자: \n   불사의 존재: §G+300§! 경험치 \n   필멸자 시대: §G-30§! 년 \n"
 mem_aevum_button2_deage_all_tt_except_aevum:0 "소유한 필멸 지도자당: §Y$NAME_mem_aevum_time_lord$§!: §G+10§! 년"
 mem_aevum_button4_speed_production_decision:0 "$mem_aevum_button4_title$ 결정을 해제하여 다음을 부여합니다: \n 팝 유지비: §R+150%§! 팝으로부터의 자원: §G+200%§! \n 10년 동안\n"
 mem_aevum_alreadyfutureproof_tt:0 "£trigger_no£ 우리는 더 많은 사람을 미래로 보내서는 안 됩니다. 첫 번째는 이미 충분히 어리석었습니다."
 mem_aevum_button5_future_war_tt:0 "우리 인구의 §R10%§!를 미래로 보냅니다. 다음 번에 우리가 §Y전쟁에 들어가§!면, 그들은 §Y출격 준비가 완료된 함대§!와 함께 도착할 것입니다."
 mem_aevum_button6_freeze_enemies:0 "전쟁 중이거나 경쟁 관계에 있는 모든 제국: \n§Y$mem_aevum_ship_frozen$§! 보정치가 §Y3§!개월 동안 추가됩니다: \n함선 속도 감소: §R+90%§!\n함선 발사 속도: §R-50%§!"
 mem_aevum_ship_frozen:0 "시간 마법사의 저주"
 mem_aevum_button8_removecooldown_tt:0 "다음 2개의 유물은 §Y 적용되지 않습니다.§! $relic_activation_cooldown$ 보정치를."
 mem_aevum_speed_building_desc:0 "우리의 지역 생산은 §Y$NAME_mem_aevum_time_lord$§! 조작에 의해 강화됩니다."
 mem_aevum_speed_production_mod:0 "생산 모든 비율%"
 mem_aevum_hourglass_tick_title:0 "$r_mem_aevum_houglass$는 시대를 부여합니다!"
 mem_aevum_future_fleet_arrived_title:0 "과거 함대 도착"
 mem_aevum_chronomancer_on_cooldown_tt:0 "$mem_aevum_chronomancer_on_cooldown$"
 mem_aevum_leader_trait_legendary_timeskipper:0 "시간병"
 mem_aevum_leader_trait_legendary_timeskipper_desc:0 "그의 정신은 수천 년에 걸쳐 혼란스러웠고, 그의 몸은 무수히 나이를 먹고 젊어졌다. §Y$NAME_mem_aevum_time_lord$§!는 후회하고, 잊고, 반복할 충분한 시간을 가졌다. 그의 시간은 그의 운명의 해안에 반복적으로 부딪히는 파도에 불과하다."
 mem_aevum_trait_scaleswithage:0 "\n§Y이 §! §C지도자: §!\n    연령당 나이: §R-1§! §Y(비존재로 나이 들 수 있음)§!\n    §Y추가 효과§! 나이에 따라 잠금 해제됨\n    §Y추가 수염 볼륨§! 나이에 따라 잠금 해제됨"
 mem_aevum_trait_houtglass_access:0 "§Y시간 마법 접근 권한을 부여합니다§! $r_mem_aevum_houglass$ 유물을 통해"
 lmao:0 "lmao?"
 mem_aevum.105.name:0 "도난당한 재산"
 mem_aevum.105.desc:0 "당신의 획득을 칭찬하지만, 유감스럽게도 나는 정당하게 내 것이었던 것을 되찾아야 합니다. 그러나 작은 보상을 제공하겠습니다."
 mem_aevum.105.a:0 "무슨 일이죠?"
 mem_aevum.104.name:0 "잃어버린 것과 발견된 것"
 mem_aevum.104.desc:0 "당신은 위험한 땅을 밟고 있습니다, 시대의 거주자여. 내가 소유한 것에 대한 수호는 더 큰 경계를 요구합니다. 나의 소중한 것을 이렇게 야만적인 행위로 도난당하게 하는 것은 정말 용서할 수 없는 일입니다."
 mem_aevum.104.a:0 "확인되었습니다."
 mem_aevum.106.name:0 "시의적절한 죽음"
 mem_aevum.106.desc:0 "이 캐릭터의 죽음으로 예언의 실타래가 끊어졌습니다. 저장된 게임을 복원하여 운명의 엮임을 되살리거나, 당신이 만든 운명 지어진 세계에서 계속 진행하십시오."
 mem_aevum.106.a:0 "매혹적입니다."
 mem_aevum_future_fleet_arrived_loc:0 "과거 함대 도착"
 MOD_mem_aevum_TITLE:0 "시간 마법"
 mem_aevum_desc_text:0 "안내해 주세요"
 mem_aevum_button1_title:0 "§P함선 조선소 시간 최적화§!"
 mem_aevum_button2_title:0 "§P지도자 수명 흡수§!"
 mem_aevum_button3_title:0 "§P적시 연구§!"
 mem_aevum_button4_title:0 "§P행성 단계 최적화§!"
 mem_aevum_button5_title:0 "§P내일의 전쟁§!"
 mem_aevum_button6_title:0 "§P국제 시간 왜곡§!"
 mem_aevum_button7_title:0 "§P건축 간격 단축기§!"
 mem_aevum_button8_title:0 "§P유물 건너뛰기§!"
 mem_aevum_stage1_AnteCogitationem:0 "§Y안티 코기타시오넴§!"
 mem_aevum_stage2_Cogitatio:0 "§Y코기타티오§!"
 mem_aevum_stage3_Paratio:0 "§Y파라티오§!"
 mem_aevum_stage4_Actio:0 "§Y행동§!"
 mem_aevum_stage5_Manutentio:0 "§Y마누텐티오§!"
 mem_aevum_opencastmenu:0 "§Y시간 마법 창 열기§!"
 mem_aevum_deadfr_tt:0 "§R$NAME_mem_aevum_time_lord$은(는) 죽었고, 우리가 그를 죽였습니다§!"
 mem_aevum_slowgrowing:0 "시간 성장 폭발"
 mem_aevum_speedgrowing:0 "시간 성장 폭발"
 mem_aevum_blessedworld:0 "시간의 축복"
 mem_aevum_leader_trait_legendary_houtglasskeeper:0 "$r_mem_aevum_houglass$의 수호자"
 mem_aevum_leader_trait_legendary_houtglasskeeper_desc:0 "외계 부품으로 제작된 $r_mem_aevum_houglass$는 하나의 목적을 가지고 만들어졌습니다: Vumi 사건 동안 획득한 원초적 시간 에너지를 $NAME_mem_aevum_time_lord$로 전달하는 것입니다."
 mem_aevum_thisisugly:0 "§O이 작업은 저에게 몇 시간과 모드 작업 시간의 30%를 소모했습니다.\n... 즐기세요.§!"
 mem_aevum.110.name:0 "시의적절한 죽음"
 mem_aevum.110.desc:0 "당신은 자신의 실패의 무게를 견디지 못하고 다시 저에게 돌아왔습니다. 당신의 선택의 결과는 당신의 귀환의 그림자 속에서 메아리칩니다."
 mem_aevum.110.a:0 "그를 받아들입니다."
 mem_aevum.115.name:0 "시대 건너뛰기"
 mem_aevum.115.desc:0 "나는 당신에게 알리고 싶습니다, 시대의 거주자여, 때때로 나는 시간의 직물 속을 빠르게 건너뛰는 개념에 대해 생각합니다. 그러면, 계시가 찾아옵니다 - 그런 힘이 내 손안에 있습니다. [planet_governed.GetName]에서 빠른 건너뛰기를 시행하게 해 주십시오. 이 실험의 결과는 매우 유리할 것임을 확신합니다."
 mem_aevum.115.a:0 "물론입니다."
 mem_aevum.115.b:0 "아니요."
 mem_aevum.115.c:0 "최소한 앞으로 건너뛰세요."
 mem_aevum.116.name:0 "세대 건너뛰기"
 mem_aevum.116.desc:0 "나는 당신에게 알리고 싶습니다, 시대의 거주자여, 내 마음이 탐구로 떠났음을. 삶이 시간의 족쇄에 묶여 있는 것인지, 아니면 그러한 사소한 선형성을 초월하는 것인지? 내 가설을 시험해 보게 해 주십시오. [planet_governed.GetName]에 대한 실용적인 실험은 공공 생활에 지나치게 방해가 되지 않을 것이며, 얻어진 통찰은 밝은 빛을 비출 수 있습니다."
 mem_aevum.116.a:0 "물론입니다."
 mem_aevum.116.b:0 "아니요."
 mem_aevum.116.c:0 "최소한 앞으로 건너뛰세요."
 mem_aevum.117.name:0 "거대 구조물 건너뛰기"
 mem_aevum.117.desc:0 "오, 시간에 얽매인 자여, 당신이 만들어내는 경이로움을 관찰하십시오. 이러한 영감은 나의 축복을 받을 자격이 있습니다. 나는 단지 [mem_aevum_nomegaforu.GetName]의 건설에 대한 시간적 지연을 요청합니다. 당신의 창조의 웅장함을 음미할 수 있는 잠시 멈춤을 요청합니다. 이 기회를 나에게 주시겠습니까?"
 mem_aevum.117.a:0 "확실히 그렇습니다."
 mem_aevum.117.b:0 "아니요."
 mem_aevum.118.name:0 "상황 건너뛰기"
 mem_aevum.118.desc:0 "당신이 [mem_aevum_situationlmao.GetName]에서 이룬 진전을 보십시오. 분명히, 이 상황에 대한 나의 의지를 강요하는 것에 반대하지 않겠죠. 간단한 해결책을 제시합니다: 뒤로 또는 앞으로 도약하는 것, 중간은 없습니다."
 mem_aevum.118.a:0 "앞으로."
 mem_aevum.118.b:0 "뒤로."
 mem_aevum.119.name:0 "함선 건너뛰기"
 mem_aevum.119.desc:0 "시대의 거주자여, 두 가지 화학 물질을 혼합하고 그 결합의 연금술에 대해 생각해 본 적이 있습니까? 저는 시간의 본질과 귀하의 함선 연료를 혼합해야 한다는 강한 충동을 느낍니다. 어떤 결과가 나오더라도, 저는 그것이 우리 모두에게 이익을 가져다줄 것이라고 확신합니다."
 mem_aevum.119.a:0 "좋습니다."
 mem_aevum.119.b:0 "제발 그러지 마세요."
 mem_aevum.114.name:0 "지도자 건너뛰기"
 mem_aevum.114.desc:0 "이것은 어색한 고백이지만, 당신의 판단을 구하고자 합니다. [mem_aevum_bullyhim.getName]이 감히 저를 공격한 후, 저는 분노에 휩싸였습니다. 물론 언어적으로 말이죠. [mem_aevum_bullyhim.GetSheHeCap]은 정말로 [mem_aevum_bullyhim.getHerHis]의 위치를 모릅니다. 이러한 경솔한 배신에 대한 처벌을 고민하면서, 저는 빠르게 노화시키는 [mem_aevum_bullyhim.getHerHis]에 기울고 있습니다. 그러나 우리의 우호적인 관계를 고려하여, 저는 결정을 당신에게 맡기겠습니다."
 mem_aevum.114.a:0 "당신의 방식대로 하세요."
 mem_aevum.114.b:0 "아니요."
 mem_aevum_leader_noenemies_or_rivals:0 "£trigger_no£ §Y우리는 저주할 적이 없습니다§!"
 mem_aevum_speed_building_decision_desc:0 "이 행성의 시간 흐름이 대폭 가속화되어 생산 및 소비 속도가 높아졌습니다."
 mem_aevum_spinny_boi:0 "매 §Y10년§!마다 §Y$r_mem_aevum_houglass$§!가 회전하여 그 수동 효과가 변경됩니다."
 NAME_mem_aevum_time_lord_hologram:0 "암호화된 홀로그램 녹화"
 mem_aevum_unlock_chronopalace:0 "$mem_aevum_building_temple$ 청사진"
 mem_aevum_unlock_chronopalace_desc:0 "이 복잡한 구조물은 3개의 회전하는 요소를 가지고 있는 것 같습니다. 복제하는 것은 그리 어렵지 않을 것입니다. 하지만 이 구조물에 대해 뭔가 영원하고 비자연적인 느낌이 듭니다."
 mem_aevum_confused_leadership:0 "혼란스러운 지도자"
 mem_aevum_empty_appraoch:0 ""
 mem_aevum_letswait_approach2:0 "대기 중"
 mem_aevum_unlock_chronopalace_tt:0 "§H거대 구조물 잠금 해제:§! $mem_aevum_building_temple$"
 mem_aevum_trait_getsagefromrelics:0 "\n§Y이§! §C지도자:§!\n    유물 활성화 시: §G+50§! 년\n    유물 획득 시: §G+50§! 년"
 mem_aevum.1.g:0 "당신은 훌륭한 노예가 될 것입니다!"
 mem_aevum.1.g.response:0 "아.. 사실은 그렇지 않습니다. 종속 상태에 있는 자가 어떻게 그런 귀중한 선물을 제공할 수 있겠습니까?\n\n§L그는 당신에게 증거로 즈로를 제공합니다...§!"
 mem_aevum.1.f:0 "당신은 장막과 관련이 있습니까?"
 mem_aevum.1.f.response:0 "시간을 초월한 고전, 그렇지 않습니까? 그럼에도 불구하고, 나는 감동하지 않고, 영향을 받지 않습니다. 과연, 내가 왜 이런 것에 내 존재를 드러내야 할까요? 나는 영원하며, 이곳이 제공하는 하루살이의 매력 너머에 있습니다.\n\n§L그는 눈에 띌 만큼 잠시 멈춥니다.§!\n\n아니요... 나는 그런 영역이 시간의 경계를 넘어 존재하는 나에게 적합할 것이라고 의심합니다."
 mem_aevum.5.e:0 "원주율이 원주율을 방해하지 않았기를 바랍니다."
 mem_aevum.5.e.response:0 "그들은 당신이 그들의 존재를 이해하기도 전에 이미 당신을 알고 있었습니다. 분명히, 당신은 그것을 감지했어야 합니다 - 이곳을 가로지르는 이상한 왜곡과 시간의 균열을?\n\n이 영역의 본질은 왜곡되어 있으며, 인간의 이해를 초월하는 방식으로 구부러져 있습니다."
 mem_aevum.4.e:0 "성가신 외계인"
 mem_aevum_will_age_aevum:0 "§Y는 $NAME_mem_aevum_time_lord$에 의해 §!로 나이를 먹을 것입니다."
 mem_aevum.4.e.response:0 "무척 재미있는 선언이군요. 그리고 말씀해 주세요, 시대 거주자여, 당신 안에 어떤 자신감이 불러일으켜졌습니까? 분명히, 당신에게 주어진 모든 시간 속에서 더 지혜로운 말들이 선택받은 사회로 선택되었을 것입니다.\n\n§L그는 단 몇 초 만에 눈에 띄게 나이를 먹어갑니다...§!"
 mem_aevum.9.c:0 "우리는 이럴 시간이 없습니다."
 mem_aevum.9.d:0 "시간은 돈이다"
 mem_aevum.10.c:0 "지불할 시간입니다."
 mem_aevum.10.c.response:0 "너는 단순한 인내에 대해 나에게 보상을 기대할 수 없겠지? 하지만...\n\n§L알 수 없는 데이터가 우리의 데이터 뱅크로 흘러 들어오는 것 같다. 우리의 상상을 초월하는 수확 기술에 대한 청사진 안에서...§!\n\n ...어쩌면 대신 지식의 조각을 제공할 수 있을 것 같다. 그것을 가져가고, 가능하다면 현명하게 사용하라."
 mem_aevum.10.d:0 "왜 그래야 합니까?"
 mem_aevum.10.d.response:0 "시도하는 데 해가 있을까요?\n\n§L전화의 반대편에서 우리를 바라보는 눈만 기대할 뿐입니다...§!\n\n이미 쌓아온 것을 낭비할 이유가 무엇인가요?"
 mem_aevum.10.e:0 "음식이 상했나요, 아니면 왜 이런 게임을 하시나요?"
 mem_aevum.10.e.response:0 "아직도 당신은 현재를 바라보며, 과거에 눈먼 자입니다. 어제는 신선함을 지녔지만, 오늘은 썩어버렸고, 내일은 다시 자라기 시작할 것입니다.\n\n시간은 직선이 아닌 끝없는 원으로 흐릅니다.\n\n§L그는 제스처로 함께 하자고 제안합니다...§!\n\n당신은 내 습관에 참여하고 싶습니까?"
 mem_aevum.11.e:0 "당신의 모래시계는 리토이드로 만들어졌습니까?"
 mem_aevum.11.e.response:0 "호기심 가득한 질문이군요!\n\n§H땀이 그의 수염이 있는 외부 갑각을 타고 흐릅니다...§!\n\n이 훌륭한 작품은 정말 볼만하다는 데 동의하지 않으십니까? 하지만 당신은 시간에 얽매여, 그 부조리함 속에서 위안을 찾으려는 듯 사소한 질문을 계속합니다.\n\n안심하세요, 이 작업에서 바위에 사는 존재들은 해를 입지 않았습니다.\n\n§H그는 다음 말을 잠시 생각합니다...§!\n\n적어도 육지에 사는 존재들은 아니었습니다..."
 mem_aevum.11.f:0 "시간이 다 되었군요."
 mem_aevum.11.f.response:0 "이제 이해하셨군요."
 mem_aevum.11.g:0 "더 많이 면도해야 합니다."
 mem_aevum.11.g.response:0 "§H몇 분 후, 그는 돌아옵니다. 그 이후로는 아무런 언급이 없었습니다. 어쩐지, 그는 훨씬 더 젊어 보입니다.\n\n소름 끼치네요...§!"
 mem_aevum.11.j:0 "면도했나요?"
 mem_aevum.11.j.response:0 "당신은 매우 통찰력이 있습니다, 시간에 얽매인 자여. 결국, 이렇게 중대한 순간에 꾸밈없이 나타나는 것은 매우 무례할 것입니다, 그렇지 않습니까?\n\n§H어쩌면 당신이 차림새가 부족한 것은 아닌지 궁금해하십니다...§!\n\n새로운 시대 앞에 서기 위해서는 일정한 우아함이 필요합니다."
 mem_aevum.11.h:0 "완벽함에 동참하세요"
 mem_aevum.11.h.response:0 "이것은 꽤나 재미있는 것처럼 보입니다, 시대 거주자들. 왜 제가 자제해야 하죠?"
 mem_aevum.11.i:0 "조금 더 자원을 활용할 수 있나요?"
 mem_aevum.11.i.response:0 "당신은 광활한 우주를 통해 승격하며 매년 새로운 지평을 잡고 있지만, 그런 장엄한 영광 앞에서 저를 자제하길 원하십니까? 분명히 농담이시군요!\n\n§H그가 한숨을 쉽니다...§!\n\n하지만 안타깝게도, 당신이 그렇지 않다는 것을 깨닫습니다. 항상 그렇듯, 시간의 모래가 당신에게 예의의 지혜를 속삭이지 않은 것 같습니다. 좋습니다, 저는 수긍하겠습니다...\n§H그가 또 다른 나쁜 농담을 하려는 듯 미소를 짓습니다...§!\n\n...당분간은요."
 mem_aevum.18.d:0 "우리의 시간을 돌려주세요!"
 mem_aevum_aevum_got_stronger_from_relics:0 "§Y$NAME_mem_aevum_time_lord$§!: §G+50§! 년"
 mem_aevum_stasis_nabula:0 "영원한 지평선"
 mod_planet_researchers_sr_zro_produces_add:0 "£sr_zro£ $sr_zro$에서 £job_researcher£ [GetResearcherPlural]을(를) 생산합니다."
 mem_aevum.200.name:0 "간주곡"
 mem_aevum.200.desc:0 "시간의 흐름이여, 나에게 급속히 다가온다, 시대의 거주자여. 나는 그것을 이해하기 시작하고, 현재의 좁은 경계를 넘어 보게 된다.\n\n마침내, 그 광대함이 나에게 조금 더 드러난다. 얼마나 압도적인가. 내 시야 안에는 훨씬 더 많은 것이 있다.\n\n§L그는 조금 혼란스러운 것 같다...§!\n\n다음 시간의 전개가 당신의 필멸의 인식 너머로 당신을 휘감게 될 것이니, 준비하라, 시간에 얽매인 자여."
 mem_aevum.201.name:0 "승격"
 mem_aevum.201.desc:0 "나는 지금 그것을 느낀다. 영원의 급류가 나에게 몰려오고, 내 존재의 모든 섬유를 통해 흘러들어온다. 그것은 모든 모공으로 스며들며, 끊임없고 무한한 지혜의 강이다.\n\n§L미친 듯한 웃음소리와 극적인 음악이 오디오 스트림을 가득 채운다...§!\n\n§P무한한 힘이다!§!"
 mem_aevum_beard:0 "아에붐의 영원한 수염"
 mem_aevum_beard_desc_short:0 "$NAME_mem_aevum_time_lord$가 우리와 삶의 길을 갈라놓았을 때, 우리는 그를 마지막으로 면도했습니다. 이상하게도, 그 수염은 나이를 먹지 않는 것 같습니다."
 mem_aevum_beard_desc_details:0 "정말로 장엄한 수염으로, 우리가 지금까지 만난 어떤 연체동물 종에서도 전혀 들은 적이 없는 것입니다. 심지어 Aevum 자신의 수염에서도 말이죠. 그 존재만으로도 그것이 스스로 하나의 이상 현상이라고 말할 수 있습니다."
 mem_aevum_anomaly_category:0 "즈로 초과"
 mem_aevum_anomaly_category_desc:0 "우리의 스캔 결과, 표면에 대량의 즈로와 시간적 이상 현상이 존재하는 것으로 나타났습니다."
 mem_aevum_hourglas_site:0 "시간의 끝"
 mem_aevum_hourglas_site_desc:0 "우리는 지표 아래에 거대한 즈로 광상이 존재한다는 것을 확인했습니다. 원주민들은 이 장소에 대해 알고 있는 것 같지만, 그들이 가진 막대한 재산에 대해서는 모르는 것 같습니다."
 building_mem_aevum_archeo_obelisks:0 "맥동하는 오벨리스크"
 building_mem_aevum_archeo_obelisks_desc:0 "A massive construction made possible by integrating Zro into the construction site. The $building_mem_aevum_archeo_obelisks$ sends out waves of cognitive-enhancing Zro dust. If perfectly timed, 광부와 과학자 모두 이상한 맥박을 느끼고 새로운 과학 지식을 빠르게 이론화할 수 있습니다. 일부는 공기를 Zro로 채우는 것이 최선의 아이디어가 아닐 수 있다고 우려했습니다."
 mem_aevum_unlock_time_building:0 "시간 건설"
 mem_aevum_unlock_time_building_desc:0 "새로운 방법으로 넓은 지역에 즈로를 적용하는 것입니다. 완벽하게 조정된 연속적인 펄스는 우리의 과학자 생산성을 크게 향상시킬 수 있습니다."
 building_mem_aevum_archeo_obelisks_tt:0 "§Y효과는 팝당 증가합니다.§!"
 mem_aevum_mega_nuke:0 "스킵 입자 포병"
 mem_aevum_mega_nuke_DESC:0 "$tech_mem_aevum_unlock_time_components_desc$"
 mem_aevum_shield:0 "시간 방패"
 mem_aevum_shield_DESC:0 "$tech_mem_aevum_unlock_time_components_desc$"
 XL_mem_aevum_nuke_1:0 "$mem_aevum_mega_nuke$"
 mem_aevum_unlock_time_components:0 "부품 시간 잠금 해제"
 mem_aevum_unlock_time_components_desc:0 "시간 흐름에 맞춰 Zro를 함대에 통합하는 새로운 방법입니다. 특정한 시간 흐름에 대한 정렬은 우리의 함선이 파괴적인 힘에 대한 저항력을 증가시키고, 물체가 큰 거리를 즉시 건너뛰는 새로운 옵션을 제공합니다."
 mem_aevum_nullifier_aux:0 "$mem_aevum_shield$"
 council_agenda_mem_aevum_zro_party_name:0 "노화 축하 행사"
 council_agenda_mem_aevum_zro_party_desc:0 "우리는 성년이 되는 이들과 우리를 떠나는 이들을 기념합니다."
 mem_aevum_unlock_agenda:0 "시간의 축제"
 mem_aevum_unlock_agenda_desc:0 "Zro를 사용하는 새로운 방법입니다. 이는 우리의 문화적 즐거움을 향상시키고 우리 국민의 사기를 높일 것입니다."
 mem_aevum_zro_party_effect_desc:0 "모든 £sr_zro£ §Y즈로§!를 교환하여 10배의 £unity£ §Y통합§!을 얻으세요."
 mem_aevum_party_hard:0 "끝나지 않는 파티"
 mem_aevum_party_hard_type:0 "끝없는 파티"
 mem_aevum_party_hard_desc:0 "Aevum의 끊임없이 변하는 욕망이 이 파티를 초래했습니다. 그에게 미치는 즈로의 효과는 완전히 이해되지 않지만, 매달 이를 없애는 창의적인 방법이 있다는 것은 확실합니다.\n\n§YAevum의 지루함:§! [this.mem_aevum_boredom]"
 mem_aevum_party_hard_monthly_change_tooltip:0 "진행 상황"
 mem_aevum_party_hard_approach:0 "비용 최소화"
 mem_aevum_party_hard_approach2:0 "인구 초대"
 mem_aevum_party_hard_approach3:0 "Aevum에 집중합니다."
 mem_aevum_party_hard_approach4:0 "취소"
 mem_aevum_party_hard_complete:0 "끝나기나 할까요?"
 mem_aevum_ages_aevum:0 "Aevum의 시대: §G+2§! 년마다"
 mem_aevum_unlock_agenda_tt:0 "§H의 의제를 잠금 해제합니다§!: $council_agenda_mem_aevum_zro_party_name$"
 mem_aevum.204.name:0 "축제 시간"
 mem_aevum.204.desc:0 "시간에 얽매인 당신은 왜 현재의 하루살이 외교, 전쟁, 그리고 경제 성장과 유사한 스프레드시트에 그렇게 정신이 팔려 있습니까? 더 흥미로운 일이 없습니까?\n\n§L그가 처한 상황을 정말로 이해하고 있는지 궁금합니다...§!\n\n가장 덧없는 보물인 즈로를 가져오고, 연회로 시간의 소용돌이치는 흐름을 기리도록 합시다. 오늘 밤, 우리는 시대 자체에 도전합니다!"
 mem_aevum.204.a:0 "기념합시다!"
 mem_aevum.204.b:0 "요청이 거부되었습니다."
 mem_aevum.210.name:0 "흐르는 시간"
 mem_aevum.210.desc:0 "우리 과학자들은 시공간에서 이상한 패턴을 발견했습니다. 그 출처는 $mem_aevum_party_hard$인 것 같습니다. 우리는 즈로가 에이붐의 시간 변환 능력과 결합하여 시간의 흐름에 방해를 초래한다고 의심하고 있습니다. 이는 더 작은 규모에서도 재현 가능할 것으로 믿어집니다.\n\n 우리는 어떻게 계속해야 할까요?"
 mem_aevum.210.a:0 "새로운 맞춤형인가요?"
 mem_aevum.210.b:0 "연구를 개선합니다."
 mem_aevum.210.c:0 "무기로 사용하세요!"
 mem_aevum.215.name:0 "지친 노인"
 mem_aevum.215.desc:0 "이것은 얼마나 하루살이 같은 기쁨이었는가, 시간에 얽매인 자여. 하지만 안타깝게도, 나는 암울한 소식을 전해야 한다.\n\n§L그는 피곤해 보인다. 아마 그의 노령이 그를 따라잡았나?§!\n\n이 공연의 무게가 무거워지고, 나는 지치고 있다. 이 허세의 막을 내리자."
 mem_aevum.215.a:0 "좋습니다."
 mem_aevum.225.name:0 "간단한 파티 묘기"
 mem_aevum.225.desc:0 "당신을 기쁘게 해드리겠습니다, 시대의 거주자여, 특별한 것의 조각을. 보십시오, 그리고 이 하루살이 같은 장관을 목격하십시오, 제 작은 묘기입니다. 주목하십시오!"
 mem_aevum.225.a:0 "감사합니다?"
 mem_aevum.225.a.tt:0 "현재 업그레이드 중인 무작위 거대 구조물을 즉시 완료합니다."
 mem_aevum.220.name:0 "오래된 친구"
 mem_aevum.220.desc:0 "당신의 동족 중, 시간에 얽매인 존재여, 내가 가장 존경하는 존재가 있습니다, §Y[mem_aevum_bullyhimnot.GetName]§!. 그의 존재는 영원의 흐름조차 흔들리게 합니다.\n\n§L그가 '친구'라는 단어를 아는지 궁금합니다.§!\n\n노화의 영역에 숨겨진 무한한 경이로움을 드러내 보이겠습니다."
 mem_aevum.220.a:0 "확실히."
 mem_aevum.220.b:0 "아니요."
 mem_aevum.300.name:0 "동굴이 보임"
 mem_aevum.300.desc:0 "우리 과학자들은 높은 수준의 즈로가 있는 지하 형성을 발견했습니다. 이 희귀한 매장지를 발견한 것은 우리가 처음이 아닌 것 같지만, 원주민들은 분명히 이를 사용하거나 감지할 수 없습니다. 흥미롭게도 우리가 착륙했을 때 그들 중 누구도 이곳에 오지 않았습니다. 그들은 이곳을 신성하게 여기는 것 같습니다. 우리의 발굴 팀은 제3자가 관련되어 있다고 이론을 세우고 있습니다."
 mem_aevum.300.a:0 "진행합니다."
 mem_aevum.305.name:0 "잃어버린 기록"
 mem_aevum.305.desc:0 "우리 팀은 터널 중 하나에서 데이터 패드를 발견했습니다. 처음 여기에 있었던 누군가가 남기고 잃어버린 것 같습니다. 우리는 일부 데이터를 복구할 수 있었습니다. 내용은 다음과 같습니다: \n\n§L..거대한 물체가 시스템에 도착했습니다...시간적 이상이 우리의 시스템을 파괴했습니다...긴급 대피가 필요합니다...하지만 나는 남아 있습니다. 무슨 목적일까요? §!\n\n여기에는 하나 이상의 존재가 살았던 것 같고, 그들이 누구든 원주민에게도 외계인이었습니다."
 mem_aevum.305.a:0 "흥미롭습니다."
 mem_aevum.310.name:0 "즈로 한가운데"
 mem_aevum.310.desc:0 "거대한 동굴 구역이 발견되었습니다. 이곳은 실종된 외계인의 거주지인 것 같습니다. 주변을 빠르게 살펴보니 비정상적인 형태의 즈로와 버려진 장비가 보입니다. 여기서 무슨 일이 있었는지는 확실하지 않지만, 즈로의 발견만으로도 노력할 가치가 있었습니다."
 mem_aevum.310.a:0 "발굴하고 진행합니다."
 mem_aevum.315.name:0 "죽은 자와 잊혀지지 않은 자"
 mem_aevum.315.desc:0 "우리 팀은 동굴 안에 살고 있는 신비로운 외계인의 최후의 안식처를 발견했습니다. 여기에는 단 하나의 시체만 묻혀 있었습니다. 그와 함께 완전히 작동하는 데이터패드에 기록된 증언이 있었습니다."
 mem_aevum.315.a:0 "녹음을 재생합니다."
 mem_aevum.320.name:0 "내 마지막 메시지"
 mem_aevum.320.desc:0 "§L의식적인 문신과 작은 수염이 있는 불가사리 하나가 우리 앞에 나타납니다.§!\n\n젊은이들아,\n\n나는 Aevum이다. 너희는 나의 마지막 안식처를 찾았고, 원주율들이 너희에게 문제를 일으키지 않기를 바란다. 나는 그들에게 이곳을 떠나달라고 부탁했다. 그것이 나의 마지막 소원이다. 나는 짧게 말한다. 나는 한때 연구원이었고 지금도 그렇다. Zro와의 실험은 시간 조작의 가능성을 발견하게 했다. 나는 이 과정을 시간 마법이라고 부른다. 안타깝게도 그것은 잘못되어 나에게 치명적인 질병을 앓게 했다. 나는 내 죽음을 확신하지만, 내 연구를 포기할 수는 없다. 나의 가장 위대한 업적을 가져가라: $r_mem_aevum_houglass$ 그리고 너희의 목적을 위해 사용하라.\n\n다른 시대의 거주자여, 안녕."
 mem_aevum.320.a:0 "이상하군요."
 mem_aevum_anomaly_category_placeholder:0 "우리 과학자들은 외계 장비의 존재를 확인했습니다. 이 장비는 대량의 즈로를 연료로 사용합니다. 그것은 시간의 흐름을 조작하는 것처럼 보입니다."
 mem_aevum.325.name:0 "시간 연구"
 mem_aevum.325.desc:0 "$mem_aevum_anomaly_category_placeholder$ 우리는 이를 복제하고 우리의 연구를 증진시키는 데 적용할 수 있다고 믿습니다."
 mem_aevum.325.a:0 "훌륭합니다."
 mem_aevum.335.name:0 "시간 무기"
 mem_aevum.335.desc:0 "$mem_aevum_anomaly_category_placeholder$ 안타깝게도 이 장비는 우리에게 수수께끼와 같습니다. 이론 자체는 새로운 무기를 개발하기에 충분히 탄탄해 보입니다."
 mem_aevum.335.a:0 "매혹적입니다."
 mem_aevum.330.name:0 "시간 문화"
 mem_aevum.330.desc:0 "$mem_aevum_anomaly_category_placeholder$ 그것은 완전한 미스터리이지만, 우리는 그것이 우리 팀에 미친 영향을 주목했습니다. 좋은 파티 묘기로 활용될 수 있을 것입니다."
 mem_aevum.330.a:0 "이상하군요."
 d_mem_aevum_bio_lab:0 "생화학 연구 개발 단지"
 d_mem_aevum_bio_lab_desc:0 "한때 위대한 혁신의 장소였던 이곳은 이제 재건될 준비가 된 폐허입니다."
 mem_aevum_plushie_site:0 "시간의 황폐"
 mem_aevum_plushie_site_desc:0 "초기 스캔에서 미약한 에너지 신호의 흔적이 발견되었습니다. 추가 조사를 통해 버려진 궤도 인프라가 드러났습니다. 황폐한 복합체는 우리가 그 이전의 목적을 밝혀내기를 기다리고 있습니다."
 mem_aevum.340.name:0 "[from.planet.GetName] 생화학 연구소 로그"
 mem_aevum.340.desc:0 "우리 발굴 팀은 오래전에 버려진 연구 복합체를 발견했습니다. 내부 구조와 남아 있는 장비로 판단할 때, 이 실험실은 전체가 생화학 연구개발(R&D) 복합체였던 것으로 보입니다. 추가 단서를 찾는 과정에서 여러 개의 데이터 패드와 로그 항목이 발견되었습니다. 이들의 해독 작업이 이미 진행 중이며, 희망적으로 여기서 무슨 일이 있었는지를 밝혀줄 것입니다."
 mem_aevum.345.name:0 "주기 56, 회전 34"
 mem_aevum.345.desc:0 "이곳은 [from.planet.GetName] 기지에서의 첫 번째 날입니다. 톨리트 에일레스를 박사님이 개인적으로 저를 이곳에 요청하셨습니다. 그는 우리 시대에서 가장 존경받는 외계 생물학자 중 한 명으로 자리 잡았으며, 그의 연구 덕분에 생체 분자 재생 기술에 대한 우리의 연구는 이제 재판소의 과거 기대보다 수십 년 앞서 있습니다. 저는 그의 선택받은 사회의 직원 중 한 명이라는 것이 자랑스럽습니다.\n\n저와 함께 또 다른 방문자가 도착했습니다. 흥미롭게도, 등록되지 않은 외계인이며, 여섯 개의 팔다리와 두꺼운 털로 덮인 하반신을 가지고 있습니다."
 mem_aevum.350.name:0 "주기 78, 회전 2"
 mem_aevum.350.desc:0 "그 손님은 우리의 연구를 계속 관찰했습니다. 그는 톨리스 에일레스를 제외한 우리 직원들과는 상호작용하지 않았습니다. 솔직히 말하자면, 다른 종족과 잘 지내는 것은 쉽지 않았습니다. 불가사리는 꽤 친근해 보였지만, 그 외계인의 표정을 하나도 해독할 수 없었고, 수수께끼 같은 말투와 말하는 것을 선호하는 것도 도움이 되지 않았습니다. 손님이 자신의 세포 퇴화를 되돌릴 수 있는 재생 조직 샘플을 가져왔다고 들었습니다. 손님은 이 샘플에 대해 엄청난 흥미를 느꼈습니다."
 mem_aevum.355.name:0 "주기 109, 회전 22"
 mem_aevum.355.desc:0 "며칠 전 우리의 신비로운 손님이 갑작스럽게 떠났습니다. Dr. Eilleth는 기분이 매우 안 좋은 것 같고 그 이후로 거의 먹지를 않았습니다. 그는 자신의 사무실에 틀어박혀 과학적으로는 전혀 의미가 없는 방정식과 원형 도면을 중얼거리고 있습니다. 그는 손님과 함께 자신의 불멸이 떠나는 것을 보았다고 말합니다. 아마도 그의 노령이 그에게 영향을 미치고 있는 것 같습니다."
 mem_aevum.360.name:0 "주기 124, 회전 14"
 mem_aevum.360.desc:0 "의사가 정신을 잃고 무단 실험을 시작한 것 같습니다. 처음에는 작은 생물들로 시작했고, 그 다음에는 더 큰 동물들로 진행했습니다. 이제 그는 사람을 대상으로 시험하려 하고 있습니다. 그는 외곽 식민지에서 사람들을 납치할 생각을 하고 있는 것 같습니다. 그의 계획에 대해 물었을 때, 그는 진화의 비계에 간섭하지 말라고 말했습니다. 그는 조직 샘플을 외계 DNA와 결합하고 있습니다. 일부 동물 실험체는 이상한 피부 패턴이 나타났습니다. 다른 실험체들은 단순히 시술 후 곧바로 시들고 죽어버립니다.\n\n아무도 그의 작업을 방해할 용기가 없습니다. 우리가 어떻게 이 천재를 이해할 수 있을까요? 아니면 그를 막아야 할까요?"
 mem_aevum.365.name:0 "주기 145, 회전 7"
 mem_aevum.365.desc:0 "그는 "수염"에 대해 계속 이야기하며, 손님의 얼굴 털이 그의 재생 능력의 원천이었음에 틀림없다고 주장합니다. 그는 외계 피험체들이 수염을 기를 수 있도록 변형하라고 명령했습니다. §R수염!§!. 나는 재판소에 연락해 그의 연구를 중단시키고 싶습니다. 반면에 일부 피험체들은 실제로 이전보다 더 젊어 보입니다. 아마도 제가 충분히 교육받지 못한 것일지도 모릅니다. 어쩌면 그는 정말로 위대한 발견의 전야에 있는 것일지도 모릅니다. 그를 방해한다면 제게 어떤 일이 일어날지 두렵습니다..."
 mem_aevum.370.name:0 "주기 169, 회전 16"
 mem_aevum.370.desc:0 "나는 그것을 보았습니다! 그는 내 동료 중 한 명을 데려갔고, 그는 며칠째 돌아오지 않고 있습니다. 의사의 광기는 점점 더 깊어지고 있습니다. 이제 실험실은 피와 포름알데히드 냄새로 가득 차 있습니다. 하이브리드 시체들이 관측 데크를 따라 줄지어 서 있으며, 턱에 거친 털이 있는 촉수 달린 것들입니다. 그들 중 아무도 살아남지 못했습니다. Dr. Eilleth는 더 이상 우리와 이야기하지 않으며, 오직 기억으로 재구성된 여섯 개의 팔을 가진 손님을 닮은 자작 인형에게만 이야기합니다. 그는 이 인형을 어떤 신과 같은 존재로 숭배하기 시작했습니다.\n\n이것은 멈춰야 합니다! 나는 이 광기에 대해 재판소에 알렸지만, 그 이후로 아무런 답변이 없었습니다."
 mem_aevum.370.a:0 "매우 불안함"
 mem_aevum.375.name:0 "169주기, 19회전"
 mem_aevum.375.desc:0 "보안 경고가 울리고 있습니다. 중앙 사령부에서 모든 갑판에 전송된 메시지가 울려 퍼집니다: "즉각적인 중단. 연구 종료."\n\nDr. Eilleth는 폭력적인 발작을 일으키며 우리 모두가 그의 인생 작업을 방해했다고 비난했습니다. 그는 우리의 무능함을 저주하며 우리가 그의 불멸 달성 실패에 책임이 있다고 소리쳤습니다.\n\n도착하는 군인들이 의사보다 더 합리적이기를 바랍니다..."
 mem_aevum.380.name:0 "무엇이 남았는가?"
 mem_aevum.380.desc:0 "The entire [from.planet.GetName] 유기체-화학 연구 기지가 이제 조용히 떠다닙니다. 벽과 바닥에 남아 있는 잔해를 보아하니 군대는 의사보다 더욱 비합리적이었습니다. 그의 연구 샘플은 발견되지 않았습니다. 군대는 연구와 직접적으로 연결된 모든 것을 제거했음에 틀림없습니다. 우리가 발견한 유일하게 온전한 물체는 여섯 개의 팔을 가진 봉제 인형이었습니다. 우리의 과학자들은 그것이 케라틴 기반의 유기체 물질로 만들어졌다고 말합니다. 그것이 무엇을 의미하든..."
 mem_aevum.380.a:0 "수염이 있는 불가사리? 매혹적입니다."
 mem_aevum_plushie:0 "수염 달린 불가사리 인형"
 mem_aevum_plushie_desc_short:0 "유기체 물질을 기반으로 한 각질로 미친 과학자가 $mem_aevum_plushie$을 만들었습니다."
 mem_aevum_plushie_desc_details:0 "정화된 연구실에서 발견된 이 인형은 정화 팀이 남긴 유일한 것입니다."
 leader_trait_mem_aevum_legendary_timeskipper:0 "시간병"
 leader_trait_mem_aevum_legendary_timeskipper_desc:0 "그의 정신은 수천 년에 걸쳐 혼란스러웠고, 그의 몸은 무수히 나이를 먹고 젊어졌다. §Y$NAME_mem_aevum_time_lord$§!는 후회하고, 잊고, 반복할 충분한 시간을 가졌다. 그의 시간은 그의 운명의 해안에 반복적으로 부딪히는 파도에 불과하다."
 leader_trait_mem_aevum_legendary_houtglasskeeper:0 "$r_mem_aevum_houglass$의 수호자"
 leader_trait_mem_aevum_legendary_houtglasskeeper_desc:0 "외계 부품으로 제작된 $r_mem_aevum_houglass$는 하나의 목적을 가지고 만들어졌습니다: Vumi 사건 동안 획득한 원초적 시간 에너지를 $NAME_mem_aevum_time_lord$로 전달하는 것입니다."
 tech_mem_aevum_unlock_chronopalace:0 "$mem_aevum_building_temple$ 청사진"
 tech_mem_aevum_unlock_chronopalace_desc:0 "이 복잡한 구조물은 3개의 회전하는 요소를 가지고 있는 것 같습니다. 복제하는 것은 그리 어렵지 않을 것입니다. 하지만 이 구조물에 대해 뭔가 영원하고 비자연적인 느낌이 듭니다."
 tech_mem_aevum_unlock_chronopalace_tt:0 "§H거대 구조물 잠금 해제:§! $mem_aevum_building_temple$"
 tech_mem_aevum_unlock_time_building:0 "시간 건설"
 tech_mem_aevum_unlock_time_building_desc:0 "새로운 방법으로 넓은 지역에 즈로를 적용하는 것입니다. 완벽하게 조정된 연속적인 펄스는 우리의 과학자 생산성을 크게 향상시킬 수 있습니다."
 tech_mem_aevum_unlock_time_components:0 "부품 시간 잠금 해제"
 tech_mem_aevum_unlock_time_components_desc:0 "시간 흐름에 맞춰 Zro를 함대에 통합하는 새로운 방법입니다. 특정한 시간 흐름에 대한 정렬은 우리의 함선이 파괴적인 힘에 대한 저항력을 증가시키고, 물체가 큰 거리를 즉시 건너뛰는 새로운 옵션을 제공합니다."
 tech_mem_aevum_unlock_agenda:0 "시간의 축제"
 tech_mem_aevum_unlock_agenda_desc:0 "Zro를 사용하는 새로운 방법입니다. 이는 우리의 문화적 즐거움을 향상시키고 우리 국민의 사기를 높일 것입니다."
 tech_mem_aevum_unlock_agenda_tt:0 "§H의 의제를 잠금 해제합니다§!: $council_agenda_mem_aevum_zro_party_name$"
