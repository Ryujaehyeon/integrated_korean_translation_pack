l_korean:
 ap_esap_bio_bonus:0 "인공 번식"
 ap_esap_bio_bonus_desc:0 "우리 미래 세대에게 중요한 것은 자연적인 탄생과정에서 벗어나는 것입니다. 생명 공학의 발전은 새로운 개체의 탄생과정을 크게 간소화시켰습니다."
 ap_esap_cyber_bonus:0 "회로 속의 사고"
 ap_esap_cyber_bonus_desc:0 "향상된 뇌-컴퓨터 인터페이스는 우리의 정신을 거대한 네트워크에 직접 연결하는 것을 가능케 했습니다. 이제 제국 전체의 통신은 간단하고 즉각적이게 되었습니다. 실제로, 몇몇 개인들은 거대 네트워크에 너무 깊숙히 연결되어, 현실과의 접촉을 잃어버리기 시작했습니다."
 ap_esap_psi_bonus:0 "정신 억제"
 ap_esap_psi_bonus_desc:0 "우리의 사이오닉 능력이 성장함에 따라, 이 힘이 어떻게 다른 사이오닉적으로 연약한 존재에게 영향을 미치는지 배울 수 있었습니다. 우리는 이를 이용해 적들의 감정을 위축시키거나 강조해서 그들의 제국 전체에 우울함과 분노 그리고 공포를 퍼뜨릴 수 있습니다."
 ap_esap_psi_bonus_tooltip:0 "우리와 전쟁중인 제국의 §Y전쟁 피로도§!를 §R+33%§! 증가시킵니다."
 ap_esap_gov_1:0 "$ap_executive_vigor$"
 ap_esap_gov_1_desc:0 "$ap_executive_vigor_desc$"
 ap_esap_gov_1_tooltip:0 "['concept_esap_government_perks']에 연결됩니다. 각 §H정부 특성§!이 잠금 해제될 때마다(이 특성을 포함하여) §YCouncil Agenda Progress Speed§!가 §G9%§!만큼 증가합니다."
 ap_esap_gov_2:0 "$ap_transcendent_learning$"
 ap_esap_gov_2_desc:0 "$ap_transcendent_learning_desc$"
 ap_esap_gov_2_tooltip:0 "['concept_esap_government_perks']에 연결됩니다. §Y리더 경험치 증가§!가 §G+50%§!만큼 증가하며, 잠금 해제된 각 §H정부 특성§!에 대해 추가로 §G+10%§!가 더해집니다(이 특성을 포함하여)."
 ap_esap_gov_3:0 "$ap_imperial_prerogative$"
 ap_esap_gov_3_desc:0 "$ap_imperial_prerogative_desc$"
 ap_esap_gov_3_tooltip:0 "['concept_esap_government_perks']에 연결됩니다. 각 §H정부 특성§!이 잠금 해제될 때마다 §Y제정된 위원회 안건 효과 지속 시간§!이 §G9%§! 증가합니다."
 ap_esap_gov_3_corp:0 "식민지 기업"
 ap_esap_gov_3_corp_desc:0 "우리의 자산을 은하계 내 다른 행성으로 확장하는 것은 지속적으로 증가하는 공급 수요를 보장할 것입니다."
 ap_esap_gov_3_corp_tooltip:0 "['concept_esap_government_perks']에 연결됩니다. 각 §H정부 특성§!이 잠금 해제될 때마다 §Y제정된 의회 안건 효과 지속 시간§!이 §G9%§! 증가합니다."
 ap_esap_gov_4:0 "이상적인 관료 체계"
 ap_esap_gov_4_desc:0 "적절한 서류 작업이 제출되기 전까지는 어떠한 것도 진정한 성과로 간주될 수 없습니다."
 ap_esap_gov_4_tooltip:0 "['concept_esap_government_perks']에 연결됩니다. £stability£ §Y행성 안정성§!이 잠금 해제된 각 §H정부 특성§!에 대해 §G1.5§!만큼 증가합니다(이 특성을 포함하여)."
 ap_esap_gov_4_global_req:0 "$TRIGGER_FAIL$£society£ §Y$tech_global_production_strategy$§! 기술이 필요합니다."
 ap_esap_gov_5:0 "국가적 우위"
 ap_esap_gov_5_desc:0 "우리가 최초로 도시를 건설한 이래로 수천년간 우리의 정부는, 우주시대 이전의 지도자들로서는 이해조차 못할 경지로 발전해왔습니다."
 ap_esap_gov_5_tooltip:0 "궁극적인 ['concept_esap_government_perk']. £influence£ §Y월간 영향력§!이 잠금 해제된 각 §H정부 특성§!에 대해 §G0.3§! 증가합니다(이 특성을 포함하여)."
 ap_esap_gov_GC_1:0 "끊임없는 실행"
 ap_esap_gov_GC_1_desc:0 "우리 제국의 드론이 취하는 행동의 대부분은 자동적이며 이런 행동은 매개변수에 조종됩니다. 매 순간 우리는 완벽한 최적화를 위해 끊임없이 노력하면서 이러한 매개 변수 하나하나를 지속적으로 조정합니다."
 ap_esap_gov_GC_1_tooltip:0 "['concept_esap_government_perks']에 연결됩니다. 잠금 해제된 각 §H정부 특성§!에 대해 §YCouncil Agenda Progress Speed§!가 §G9%§! 증가합니다(이 특성 포함)."
 ap_esap_gov_GC_2:0 "$ap_transcendent_learning$"
 ap_esap_gov_GC_2_desc:0 "우리는 관찰했고 그 관찰로부터 무언가를 배웠습니다. 우리의 배움을 관찰하고 그 관찰로부터 무언가를 배우기도 했습니다. 허나 이제, 우리는 우리의 배움을 관찰하는 우리를 관찰하고 그 관찰로부터 무엇을 배우는지 관찰할 것입니다. 또한 우리의 배움을 관찰하는 우리를 관찰하는 우리를 관찰하고, 그 관찰로부터 배우는 우리를 관찰하는 우리로부터 배우는 우리를..."
 ap_esap_gov_GC_2_tooltip:0 "['concept_esap_government_perks']에 연결됩니다. §Y리더 경험치 획득§!이 §G+50%§! 증가하며, 잠금 해제된 각 §H정부 특성§!에 대해 추가로 §G+10%§!가 더해집니다(이 특성을 포함하여)."
 ap_esap_gov_GC_3:0 "의식 노드"
 ap_esap_gov_GC_3_desc:0 "우리의 목소리는 은하의 모든 천체로 확장되어야 하며, 우리의 식민지와 항성 기지에 중앙 노드를 개발하는 것은 우리의 부속물에 대한 더 큰 통제를 보장할 것입니다."
 ap_esap_gov_GC_3_tooltip:0 "['concept_esap_government_perks']에 연결됩니다. 각 §H정부 특성§!이 잠금 해제될 때마다 §Y제정된 의회 안건 효과 지속 시간§!이 §G9%§! 증가합니다."
 ap_esap_gov_hive_4:0 "거대한 메아리"
 ap_esap_gov_hive_4_desc:0 "우리 제국의 신경접합 드론은 이제 제국 전체에 단순히 생각만을 전달하지 않습니다. 그것들은 우리 제국 전체에 울려 퍼지는 거대한 메아리를 증폭시켜 모든 드론이 하나의 유기체처럼 행동하도록 합니다."
 ap_esap_gov_hive_4_tooltip:0 "['concept_esap_government_perks']에 연결됩니다. £stability£ §Y행성 안정성§!이 잠금 해제된 각 §H정부 특성§!에 대해 §G1.5§!만큼 증가합니다(이 특성을 포함하여)."
 ap_esap_gov_machines_4:0 "$ap_esap_gov_hive_4$"
 ap_esap_gov_machines_4_desc:0 "우리 제국의 조정기는 이제 제국 전체에 단순히 생각만을 전달하지 않습니다. 그것들은 우리 제국 전체에 울려 퍼지는 거대한 메아리를 증폭시켜 모든 드론이 하나의 유기체처럼 행동하도록 합니다."
 ap_esap_gov_machines_4_tooltip:0 "['concept_esap_government_perks']에 연결됩니다. £stability£ §Y행성 안정성§!이 잠금 해제된 각 §H정부 특성§!에 대해 §G1.5§!만큼 증가합니다(이 특성을 포함하여)."
 ap_esap_gov_GC_5:0 "우월한 정신"
 ap_esap_gov_GC_5_desc:0 "우리가 깨어났을 때부터 우리의 정신은 수천년전 한 행성에 있는 몇 대의 드론을 통제했던 것과는 다른 차원의 수준으로 발전해 왔습니다."
 ap_esap_gov_GC_5_tooltip:0 "궁극적인 ['concept_esap_government_perk']. £influence£ §Y월간 영향력§!이 잠금 해제된 각 §H정부 특성§!에 대해 §G0.3§! 증가합니다 (이 특성을 포함하여)."
 sartek_transcendent_learning_tooltip:0 "§Y지도자 경험치 획득량§! §G+50%§!"
 mod_sartek_transcendent_learning:0 "초월적 학습"
 ap_esap_ct1_war:0 "전쟁의 기술"
 ap_esap_ct1_war_desc:0 "승리한 전사들은 이미 승리하고 전장에 나서지만, 패배한 전사들은 전장에 나선 후에 승리하는 방법을 찾습니다."
 ap_esap_ct1_war_tooltip:0 "새로운 ['concept_esap_ct1_war_traits',$special_leader_traits_esap$] 세트를 활성화합니다. 이는 모든 £commander£ ['concept_commander']가 레벨 §Y3§!에 도달할 때 §G획득됩니다§!"
 ap_esap_ct1_war_req_1:0 "$TRIGGER_FAIL$ §Y100§! 이상의 §Y$NAVY_SIZE_TITLE$§!이 필요합니다."
 ap_esap_ct1_war_req_2:0 "$TRIGGER_FAIL$ §Y$ap_esap_ct3_not_war$§! 승천 특전을 보유하면 활성화 할 수 없습니다."
 ap_esap_ct1_expansion:0 "은하의 개척자들"
 ap_esap_ct1_expansion_desc:0 "은하는 광대하지만, 끝이 없는 것은 아닙니다. 우리가 개척하지 않는다면, 다른 이들이 개척할것입니다."
 ap_esap_ct1_expansion_tooltip:0 "['edict:esap_cornucopia',$edict_esap_cornucopia$] 칙령에 접근할 수 있습니다. 이 특권은 또한 §H정착민 정책§!을 허용하여, 우리의 확장 여정에서 §Y식민지 선박을 사용자 정의§!할 수 있는 능력을 부여하며, §E우리가 가져올 수 있는 자원의 양을 할당§!하거나 이를 우리의 §ENew Worlds 연구§! 노력에 특화할 수 있습니다."
 ap_esap_ct1_expansion_req_1:0 "$TRIGGER_FAIL$ 최소 §G3§!개의 행성이 필요합니다."
 ap_esap_ct1_expansion_req_2:0 "$TRIGGER_FAIL$ §Y$ap_esap_ct3_not_expansion$§! 승천 특전을 보유하면 활성화 할 수 없습니다."
 ap_esap_ct1_diplomacy:0 "세치 혀"
 ap_esap_ct1_diplomacy_desc:0 "우리의 사절들은 듣기좋은 감언이설로, 타국의 관료들의 현실에 대한 인식을 뒤틀어놓습니다."
 ap_esap_ct1_diplomacy_req_1:0 "$TRIGGER_FAIL$ §Y100§! 이상의 §Y외교 가중치§!가 필요합니다."
 ap_esap_ct1_diplomacy_req_2:0 "$TRIGGER_FAIL$ §Y$ap_esap_ct3_not_diplomacy$§! 승천 특전을 보유하면 활성화 할 수 없습니다."
 ap_esap_ct1_finance:0 "이익의 속삭임"
 ap_esap_ct1_finance_desc:0 "우리 경제로부터 생긴 수익은 우리 함대의 증강과 행성의 건축물 건설을 위한 기금으로 쓰입니다. 그러나, 우리 영토를 지킬 함선들과 모든 시민들의 보금자리가 될 건물을 가지고 있음에도, 우리는 여전히 더 많은 이익을 갈망하고 있습니다."
 ap_esap_ct1_finance_tooltip:0 "§Y$district_city$§!가 건설될 때 마다 £energy£ §Y에너지 크레딧§!을 §Y200§! 획득합니다. §Y$district_city$§!의 £energy£ §Y에너지 유지비§!가 §Y1§! 감소합니다."
 ap_esap_ct1_finance_req_1:0 "$TRIGGER_FAIL$ §Y2500§! 이상의 £energy£ §Y에너지§!가 필요합니다."
 ap_esap_ct1_finance_req_2:0 "$TRIGGER_FAIL$ §Y$ap_esap_ct3_not_finance$§! 승천 특전을 보유하면 활성화 할 수 없습니다."
 ap_esap_ct1_infrastructure:0 "국가 건설자"
 ap_esap_ct1_infrastructure_desc:0 "우리가 별들 사이로 퍼져나가면서 우리 제국의 행성들에서는 문명이 폭발적으로 발전했습니다."
 ap_esap_ct1_infrastructure_tooltip:0 "모든 지구를 개발한 행성의 §Y$MOD_PLANET_HOUSING_MULT$§!가 §G15%§! 증가합니다."
 ap_esap_ct1_infrastructure_req_1:0 "$TRIGGER_FAIL$ §Y수도§!에 §Y10§!개 이상의 £building£ §Y건물§!을 건설해야합니다."
 ap_esap_ct1_infrastructure_req_2:0 "$TRIGGER_FAIL$ §Y$ap_esap_ct3_not_infrastructure$§! 승천 특전을 보유하면 활성화 할 수 없습니다."
 ap_esap_ct2_war_expansion:0 "정복의 길"
 ap_esap_ct2_war_expansion_desc:0 "우리의 은하 정복은 이제 막 시작되었습니다. 우리는 온 은하가 우리의 지배 아래에 놓이기 전까진 멈추지 않을 것입니다."
 ap_esap_ct2_war_expansion_tooltip:0 "행성을 점령 할때마다, §Y100§!의 £influence£ §Y영향력§!을 획득합니다. 우리가 전쟁을 선포한 후 §Y10§!년간 §Y$MOD_SHIP_WEAPON_DAMAGE$§!과 §Y$MOD_SHIP_FIRE_RATE_MULT$§!가 §G+10%§! 증가합니다."
 ap_esap_ct2_war_expansion_req_1:0 "$TRIGGER_FAIL$ §Y$ap_esap_ct1_war$§! 승천 특전이 필요합니다."
 ap_esap_ct2_war_expansion_req_2:0 "$TRIGGER_FAIL$ §Y$ap_esap_ct1_expansion$§! 승천 특전이 필요합니다."
 ap_esap_ct2_expansion_diplomacy:0 "제국적 야망"
 ap_esap_ct2_expansion_diplomacy_desc:0 "우리의 야망은, 이 은하에 유래없는 제국을 세우는 것입니다."
 ap_esap_ct2_expansion_diplomacy_tooltip:0 "새로 건설된 식민지의 §Y건물§!과 §Y지구§!의 §Y건설 속도§!가 §G+100%§! 증가하고 £pop£ §Y$MOD_POP_GROWTH_SPEED$§!가 §G+50%§! 증가합니다. 이 효과는 §Y10§!년간 지속됩니다."
 ap_esap_ct2_expansion_diplomacy_req_1:0 "$TRIGGER_FAIL$ §Y$ap_esap_ct1_expansion$§! 승천 특전이 필요합니다."
 ap_esap_ct2_expansion_diplomacy_req_2:0 "$TRIGGER_FAIL$ §Y$ap_esap_ct1_diplomacy$§! 승천 특전이 필요합니다."
 ap_esap_ct2_diplomacy_finance:0 "황금의 강"
 ap_esap_ct2_diplomacy_finance_desc:0 "우리 제국의 모든 행성은 언제나 풍요롭습니다. 이 풍요속에서 흐르는 황금의 강이 부와 번영을 우리 제국의 중심으로 이끕니다."
 ap_esap_ct2_diplomacy_finance_tooltip:0 "£trade_value£ §Y무역가치§!를 §G10§! 생산하는 §Y$sm_esap_ct2_diplomacy_finance_trade_post$§! 항성기지 건물을 잠금해제합니다."
 ap_esap_ct2_diplomacy_finance_req_1:0 "$TRIGGER_FAIL$ §Y$ap_esap_ct1_diplomacy$§! 승천 특전이 필요합니다."
 ap_esap_ct2_diplomacy_finance_req_2:0 "$TRIGGER_FAIL$ §Y$ap_esap_ct1_finance$§! 승천 특전이 필요합니다."
 ap_esap_ct2_finance_infrastructure:0 "미래의 건축가"
 ap_esap_ct2_finance_infrastructure_desc:0 "우리 제국이 아무리 위대할지라도, 미래의 우리제국에 비하면 색이 바랩니다. 지금까지 우리가 이룩한것들은, 앞으로 우리가 이뤄낼 것 앞에서 조그마해집니다."
 ap_esap_ct2_finance_infrastructure_req_1:0 "$TRIGGER_FAIL$ §Y$ap_esap_ct1_finance$§! 승천 특전이 필요합니다."
 ap_esap_ct2_finance_infrastructure_req_2:0 "$TRIGGER_FAIL$ §Y$ap_esap_ct1_infrastructure$§! 승천 특전이 필요합니다."
 ap_esap_ct2_infrastructure_war:0 "위대한 장벽"
 ap_esap_ct2_infrastructure_war_desc:0 "위대한 장벽은 제국의 국경에 퍼져있는 방어구조물의 네트워크입니다. 방벽은 외계의 침략자들에게서 우리 영역을 난공불락으로 만들어 줍니다."
 ap_esap_ct2_infrastructure_war_req_1:0 "$TRIGGER_FAIL$ §Y$ap_esap_ct1_infrastructure$§! 승천 특전이 필요합니다."
 ap_esap_ct2_infrastructure_war_req_2:0 "$TRIGGER_FAIL$ §Y$ap_esap_ct1_war$§! 승천 특전이 필요합니다."
 ap_esap_ct3_not_war:0 "평화와 번영"
 ap_esap_ct3_not_war_desc:0 "전쟁에서는 어느쪽이든 자신을 승자라고 말하지만, 사실 모두가 패자일 뿐입니다. 칼을 내려놓을 때, 비로소 별들 사이에 천국을 만든다는 열망을 품을 수 있습니다."
 ap_esap_ct3_not_war_req_1:0 "$TRIGGER_FAIL$ §Y$ap_esap_ct2_expansion_diplomacy$§! 승천 특전이 필요합니다."
 ap_esap_ct3_not_war_req_2:0 "$TRIGGER_FAIL$ §Y$ap_esap_ct2_finance_infrastructure$§! 승천 특전이 필요합니다."
 ap_esap_ct3_not_war_req_3:0 "$TRIGGER_FAIL$ §Y$ap_esap_ct1_war$§! 승천 특전을 보유하면 활성화 할 수 없습니다."
 ap_esap_ct3_not_expansion:0 "가장 평온한 제국"
 ap_esap_ct3_not_expansion_desc:0 "다른 지배자들이 국경내의 별들의 수를 헤아리는동안, 우리는 금고속 크레딧의 수를 세어봅니다. 우리 제국이 선보이는 부와 번영은 이 은하의 무엇과도 비할 수 없습니다."
 ap_esap_ct3_not_expansion_req_1:0 "$TRIGGER_FAIL$ §Y$ap_esap_ct2_diplomacy_finance$§! 승천 특전이 필요합니다."
 ap_esap_ct3_not_expansion_req_2:0 "$TRIGGER_FAIL$ §Y$ap_esap_ct2_infrastructure_war$§! 승천 특전이 필요합니다."
 ap_esap_ct3_not_expansion_req_3:0 "$TRIGGER_FAIL$ §Y$ap_esap_ct1_expansion$§! 승천 특전을 보유하면 활성화 할 수 없습니다."
 ap_esap_ct3_not_diplomacy:0 "전쟁 기계"
 ap_esap_ct3_not_diplomacy_desc:0 "오랜 세월 동안, 우리 제국은 다양한 형태와 단계를 지나 진화된 모습을 만들어 왔습니다. 반면, 이 은하는 필연적으로 종말을 향해 나아가고 있습니다. 그리하여 우리 제국은 전쟁이라는 하나의 목표를 위해 모습을 갖추었습니다."
 ap_esap_ct3_not_diplomacy_tooltip:0 "§Y$MOD_PLANET_ARMY_BUILD_SPEED_MULT$§!와 §Y$MOD_STARBASE_SHIPYARD_BUILD_SPEED_MULT$§!가 §G+100%§! 증가하며 §Y$MOD_COUNTRY_NAVAL_CAP_MULT$§!과 §Y$MOD_COUNTRY_COMMAND_LIMIT_MULT$§!이 §G+25%§! 증가하고 §Y$MOD_COUNTRY_BORDER_FRICTION_MULT$§!이 §R+100%§! 증가합니다. 우리 제국에 대한 다른 제국의 £opinion£ §Y우호도§!가 §G-50§! 감소합니다."
 ap_esap_ct3_not_diplomacy_req_1:0 "$TRIGGER_FAIL$ §Y$ap_esap_ct2_finance_infrastructure$§! 승천 특전이 필요합니다."
 ap_esap_ct3_not_diplomacy_req_2:0 "$TRIGGER_FAIL$ §Y$ap_esap_ct2_war_expansion$§! 승천 특전이 필요합니다."
 ap_esap_ct3_not_diplomacy_req_3:0 "$TRIGGER_FAIL$ §Y$ap_esap_ct1_diplomacy$§! 승천 특전을 보유하면 활성화 할 수 없습니다."
 ap_esap_ct3_not_finance:0 "성간 형제단"
 ap_esap_ct3_not_finance_desc:0 "세월은 우리에게 이 은하가 얼마나 가혹해질수 있는지 보여줬습니다. 함께할때, 우리는 공포와 맞서 나아갈 수 있습니다. 모두에게는 각자의 역할이 있으며, 그 역할에 기쁘게 임할것입니다."
 ap_esap_ct3_not_finance_req_1:0 "$TRIGGER_FAIL$ §Y$ap_esap_ct2_infrastructure_war$§! 승천 특전이 필요합니다."
 ap_esap_ct3_not_finance_req_2:0 "$TRIGGER_FAIL$ §Y$ap_esap_ct2_expansion_diplomacy$§! 승천 특전이 필요합니다."
 ap_esap_ct3_not_finance_req_3:0 "$TRIGGER_FAIL$ §Y$ap_esap_ct1_finance$§! 승천 특전을 보유하면 활성화 할 수 없습니다."
 ap_esap_ct3_not_infrastructure:0 "위대한 계획"
 ap_esap_ct3_not_infrastructure_desc:0 "때가 되었습니다. 지금 이순간 은하 통합의 계획을 시작합니다. 우리는 이 별들사이에 단 하나의 제국만이 남을때까지 다른 모든 목표들을 내려놓아야합니다."
 ap_esap_ct3_not_infrastructure_tooltip:0 "행성을 점령할 때마다 £alloys£ §Y합금§!과 £consumer_goods£ §Y소비재§!를 생성합니다."
 ap_esap_ct3_not_infrastructure_req_1:0 "$TRIGGER_FAIL$ §Y$ap_esap_ct2_war_expansion$§! 승천 특전이 필요합니다."
 ap_esap_ct3_not_infrastructure_req_2:0 "$TRIGGER_FAIL$ §Y$ap_esap_ct2_diplomacy_finance$§! 승천 특전이 필요합니다."
 ap_esap_ct3_not_infrastructure_req_3:0 "$TRIGGER_FAIL$ §Y$ap_esap_ct1_infrastructure$§! 승천 특전을 보유하면 활성화 할 수 없습니다."
 ap_esap_technological_ascendancy_bonus_1:0 "우주의 비밀"
 ap_esap_technological_ascendancy_bonus_1_desc:0 "우주에는 아직도 발견되지 못한 비밀들이 존재합니다."
 ap_esap_technological_ascendancy_bonus_1_tooltip:0 "§G15§! 새로운 §M희귀§! ['concept_esap_technological_ascendancy_bonus_1_techs',technologies]이 발견되고 연구될 수 있습니다."
 ap_esap_technological_ascendancy_bonus_1_req_1:0 "$TRIGGER_FAIL$ §Y$ap_technological_ascendancy$§! 승천 특전이 필요합니다."
 ap_esap_technological_ascendancy_bonus_1_req_2:0 "$TRIGGER_FAIL$ §G10§!개 이상의 희귀 기술을 개발해야합니다."
 ap_esap_technological_ascendancy_bonus_2:0 "기술적 완벽성"
 ap_esap_technological_ascendancy_bonus_2_desc:0 "문명은 그들이 다루는 기술의 수준으로 평가할수 있습니다. 우리는 이 경기에서 지지 않을 것입니다. 우리는 결코 우리가 알고 있는 것에 만족하지 않을 것입니다."
 ap_esap_technological_ascendancy_bonus_2_tooltip:0 "반복 연구 기술을 연구중일때, §Y연구 속도§!가 §G+50%§! 증가합니다."
 ap_esap_technological_ascendancy_bonus_2_req_1:0 "$TRIGGER_FAIL$ §Y$ap_technological_ascendancy$§! 승천 특전이 필요합니다."
 ap_esap_technological_ascendancy_bonus_2_req_2:0 "$TRIGGER_FAIL$ 최소한 하나의 반복 연구 기술을 개발해야합니다."
 ap_esap_nature:0 "생명애"
 ap_esap_nature_desc:0 "우리가 개척하는 모든 행성에는 저마다의 독특함이 있습니다. 이를 이해한다면 우리는 행성의 잠재성을 최대한 활용할 수 있을 겁니다."
 ap_esap_nature_tooltip:0 "행성을 개척한 후 §Y25§!년간, §Y5§!년마다, 유익한 행성 §Y특징§!을 무작위로 생성합니다. 승천 특전을 활성화하면 지배중인 모든 행성에도 적용됩니다."
 ap_esap_nature_req_1:0 "$TRIGGER_FAIL$ §Y$ap_esap_mining$§! 승천 특전이 필요합니다."
 ap_esap_garden:0 "정원 행성"
 ap_esap_garden_desc:0 "은하계에서 가장 아름답다고 여겨지는 우리의 정원 행성은 생명으로 가득합니다. 큰 도시와 공장, 공해 대신, 행성은 정원과 비옥한 대지와 자연이 보존되고 있습니다."
 ap_esap_garden_tooltip:0 "§H행성 결정 잠금 해제§!: ['modifier:mod_esap_garden']"
 ap_esap_garden_req_1:0 "$TRIGGER_FAIL$ §Y$ap_esap_mining$§! 승천 특전이 필요합니다."
 ap_esap_mining:0 "행성 심핵 추출"
 ap_esap_mining_desc:0 "우리 행성의 중심에는 아직 풍부한 양의 광물이 우리를 기다리고 있습니다. 드디어 우리는 그것을 가져올 기술을 갖게되었습니다."
 ap_esap_mining_tooltip:0 "§H행성 결정 잠금 해제§!: ['concept_esap_mining_decision']"
 ap_esap_mining_req_1:0 "$TRIGGER_FAIL$ §Y$ap_esap_nature$§! 특전을 보유하면 활성화 할 수 없습니다."
 ap_esap_mining_req_2:0 "$TRIGGER_FAIL$ £engineering£ §Y$tech_mining_3$§! 기술이 필요합니다."
 ap_esap_industry:0 "공장 행성"
 ap_esap_industry_desc:0 "하늘은 매연으로 가득하고, 땅은 공장으로 뒤덮인 공장 행성은 은하에서 가장 아름다운 행성은 아닐지라도, 행성의 생산능력은 은하의 그 어떤 행성보다 훨씬 뛰어납니다."
 ap_esap_industry_tooltip:0 "§H행성 결정 잠금 해제§!: ['modifier:mod_esap_industry',$decision_esap_industry_activate$]"
 ap_esap_industry_hive_tooltip:0 "§H행성 결정 잠금 해제§!: ['modifier:mod_esap_industry_hive',$decision_esap_industry_hive_activate$]"
 ap_esap_industry_machines_tooltip:0 "§H행성 결정 잠금 해제§!: ['modifier:mod_esap_industry_machines',$decision_esap_industry_machines_activate$]"
 ap_esap_industry_req_1:0 "$TRIGGER_FAIL$ §Y$ap_esap_mining$§! 승천 특전이 필요합니다."
 ap_esap_industry_req_2:0 "$TRIGGER_FAIL$ £engineering£ §Y$tech_alloys_2$§! 기술이 필요합니다."
 ap_esap_authoritarian_1:0 "절대적 통치"
 ap_esap_authoritarian_1_desc:0 "언젠가 지배계급의 절대적 권리에 대한 정당성에 의문을 가진 때가 있었습니다. 이런 의문들은 완벽한 제국을 만들기위한 노력에 해가 될 뿐입니다."
 ap_esap_egalitarian_1:0 "유토피아를 향해서"
 ap_esap_egalitarian_1_desc:0 "우리 제국은 단지 목적을 위한 수단에 지나지않습니다. 그리고 이 목적은 시민들의 번영입니다. 우리가 모든 시민들에게 최상의 생활조건을 제공할 수 있을때 우리 제국은 완전해졌다고 여겨질것입니다."
 ap_esap_egalitarian_1_tooltip:0 "행성에서 £happiness£ §Y평균 행복도§!가 최소 §H70%§!일 때, £pop£ §Y인구 성장 속도§!를 §G+5%§!, £unity£ §Y통합§! 산출량을 §G+5%§!, £pop_cat_specialist£ §Y$pop_cat_specialist_plural$§! 산출량을 §G+2.5%§! 증가시킵니다."
 ap_esap_xenophile_1:0 "친화력"
 ap_esap_xenophile_1_desc:0 "우리의 적을 친구로 두는 것이 더 이롭지 않겠습니까?"
 ap_esap_xenophile_1_tooltip:0 ""
 ap_esap_militarist_1:0 "전쟁의 거수"
 ap_esap_militarist_1_desc:0 "함선은 크기가 중요합니다. 우수한 병기와 장갑을 두른 전함으로 이뤄진 함대를 상대할 수 있는것은 없습니다."
 ap_esap_militarist_1_tooltip:0 "§Y전함§!과 §Y타이탄§!의 §Y선체§!와 §Y장갑§!, §Y보호막§!을 §G+20%§! 증가시키고, §Y사거리§!를 §G+25%§! 증가시킵니다."
 ap_esap_militarist_1_req_1:0 "$TRIGGER_FAIL$ £engineering£ §Y$tech_battleships$§! 기술이 필요합니다."
 ap_esap_pacifist_1:0 "언어의 힘"
 ap_esap_pacifist_1_desc:0 "얼마나 강대한 무기라 할지라도 현명한 말 한마디에 무너질 때도 있습니다."
 ap_esap_pacifist_1_tooltip:0 "모든 갈락틱 커뮤니티 결의안이 §G통과될§! 경우, 다른 §E비평화주의§! 및 §E비형태적§! 갈락틱 커뮤니티 회원들은 §G+75%§! §Y$mod_pop_ethic_pacifist_attraction_mult$§!를 §H10§!년 동안 얻습니다."
 ap_esap_materialist_1:0 "별의 탐험가"
 ap_esap_materialist_1_desc:0 "이 은하에 대해 이해하는 것은 은하의 주민으로서 당연한 의무입니다. 모든 항성, 행성 그리고 위성까지, 모든 것은 계량화 및 문서화되어 보관되어야 합니다."
 ap_esap_materialist_1_tooltip:0 "§Y과학선§!의 §Y속도§!를 §G+25%§! 증가시킵니다. 그리고 천체를 성공적으로 탐사할때마다 월간 §Y연구 점수§!의 10%를 획득합니다."
 ap_esap_authoritarian_2:0 "절대적인 계급제도"
 ap_esap_authoritarian_2_desc:0 "모든 개인의 삶은 태어났을때 이미 완벽히 계획되어 있습니다. 그들의 첫 호흡부터 마지막 순간까지, 그들이 평생동안 수행해야할 모든 일이 결정되어 있습니다. 평생동안 필요한 기술에 대한 완벽한 지식을 바탕으로, 교육은 그들에게 주어진 계획이 실현될 수 있도록 완벽하게 맞춰져 있습니다."
 ap_esap_authoritarian_2_modifier_desc:0 "§Y노동자§!가 생산하는 £food£ §Y식량§!과 £minerals£ §Y광물§!이 §G10%§! 증가합니다. §Y전문가§!가 생산하는 £alloys£ §Y합금§!과 £consumer_goods£ §Y소비재§!, £engineering£ §Y공학 연구§!, £physics£ §Y물리학 연구§!, £society£ §Y사회학 연구§!가 §G10%§! 증가합니다. §Y통치자§!가 생산하는 £unity£ §Y통합력§!이 §G10%§! 증가합니다."
 ap_esap_egalitarian_2:0 "자아 실현"
 ap_esap_egalitarian_2_desc:0 "우리 시민들은 제국에 봉사하기 위해서 존재하는 것이 아닙니다. 오히려 우리 제국이 시민들을 위해 존재합니다. 우리들 각자가 각자의 잠재력을 최대한으로 발휘한 후에야 완벽을 주장할 수 있습니다. 그때 비로소 우리 제국은 진정하게 위대해질 수 있습니다."
 ap_esap_egalitarian_2_tooltip:0 "새로운 ['concept_esap_egalitarian_2_traits',$special_leader_traits_esap$] 세트를 활성화합니다. 이는 모든 지도자(£commander£, £official£, £scientist£)가 레벨 §Y3§!에 도달할 때 획득됩니다."
 ap_esap_xenophobe_2:0 "위대한 정화"
 ap_esap_xenophobe_2_desc:0 "이 은하에 들끓는 모든 외계생물들은 정화되어야 합니다. 가장 지적인 존재부터, 벌레나 곰팡이 혹은 풀같이 하찮은것까지 말입니다."
 ap_esap_xenophile_2:0 "영원한 우정"
 ap_esap_xenophile_2_desc:0 "진정한 위대함은 협력을 통해서만 이룩할수 있습니다. 함깨할때 우리는 이 은하에 새로운 시대로 이끌 수 있습니다."
 ap_esap_xenophile_2_tooltip:0 "우리 연방에 소속된 다른 제국의 우리제국에 대한 £opinion£ §Y우호도§!가 §G+25§! 상승합니다."
 ap_esap_militarist_2:0 "전쟁갈망"
 ap_esap_militarist_2_desc:0 "우리 문명이 별들로 뻗어나간 이후로 많은 변화가 있었지만, 전쟁은 변치 않았습니다. 전쟁은 우리의 존재 목적입니다. 전쟁은 우리 삶에 영원한 기쁨을 주고, 적들의 삶의 종지부를 찍을것입니다."
 ap_esap_militarist_2_tooltip:0 "전쟁중이지 않을때 매년 £pop£ §YPOP§!의 £happiness£ §Y$MOD_POP_HAPPINESS$§!가 §G-3%§! 감소하고 £unity£ §Y통합력§! 생산량이 §G-5%§! 감소합니다. 불이익은 §Y10§!회 까지 중첩되며 전쟁중일때 매년 §Y1§! 씩 제거됩니다."
 ap_esap_pacifist_2:0 "팍스 갤럭티카"
 ap_esap_pacifist_2_desc:0 "전쟁에 승자는 없고 패자만 있을 뿐입니다. 우리 제국의 진정한 잠재력을 끌어내기 위해서는 사소한 논쟁은 뒤로 해야합니다. 우리는 진정한 평화와 번영의 시대를 맞이 할 것입니다."
 ap_esap_pacifist_2_tooltip:0 "평화 상태일때 매년 £trade_value£ §Y무역 가치§! 생산량을 §G+1%§!씩 증가시키고, £stability£ §Y안정도§!를 §G0.2§!씩 증가 시킵니다. 이익은 §Y50§!회 까지 중첩되며 전쟁중일때 매년 §Y5§! 씩 늘어납니다."
 ap_esap_materialist_2:0 "진보 혹은 퇴보"
 ap_esap_materialist_2_desc:0 "우리가 새로운 발견에 대한 갈증을 채우는 순간은 새로운 암흑시대로 빠져드는 순간이기도 합니다. 기술적 발전에 대한 결연한 추구는 우리 문명의 퇴보를 막는 유일한 길입니다."
 ap_esap_materialist_2_tooltip:0 "새로운 기술이 연구될 때마다 §G추가§! £unity£ §Y유니티§!를 획득합니다; 이 보상은 현재 £unity£ §Y유니티§! 생산량에 따라 증가하며, 기술당 최대 £unity£ §G10000§!까지 가능합니다."
 ap_esap_spiritualist_2:0 "사회의 기둥"
 ap_esap_spiritualist_2_desc:0 "믿음이 우리 사회의 모든 측면을 뒷받침합니다. 우리의 믿음과 교리를 기초로 하지않는 기관은 없습니다."
 ap_esap_spiritualist_2_tooltip:0 "§Y$policy_esap_spiritualist_2_doctrine$§! 정책을 잠금해제합니다. 정책 실행 시, §Y$job_priest_plural$§!가 £engineering£ §Y공학 연구§!이나 £physics£ §Y물리학 연구§!, £society£ §Y사회학 연구§! 중 하나를 추가적으로 §Y2§! 생산하게됩니다."
 ap_esap_hive_swarm:0 "거대한 군체"
 ap_esap_hive_swarm_desc:0 "하늘이 어두워지고, 대지가 움직입니다. 군단이 다가옵니다."
 ap_esap_hive_swarm_tooltip:0 "§Y$MOD_SHIP_FIRE_RATE_MULT$§!을 §G+20%§!만큼 증가시키고 §Y코르벳§!에 대해, 모든 다른 함선에 대해서는 §Y$MOD_SHIP_FIRE_RATE_MULT$§!과 §Y$MOD_SHIP_WEAPON_RANGE_MULT$§!을 §R-5%§!만큼 감소시킵니다."
 ap_esap_hive_devouring:0 "굶주린 군체"
 ap_esap_hive_devouring_desc:0 "우리는 우주의 생명체를 포식하며 강해졌습니다. 하지만 굶주림은 멈추지않습니다."
 ap_esap_hive_devouring_tooltip:0 "정화 중 £pop£ §YPop§!을 정화할 때 얻는 £society£ §YSociety§!의 양이 두 배가 됩니다. 또한, 비슷한 양의 £food£ §YFood§!도 얻습니다."
 ap_esap_hive_terravores:0 "행성포식자"
 ap_esap_hive_terravores_desc:0 "행성을 포식하는 과정은 세심하게 이뤄집니다. 첫번째로, 모든 유기체를 처리합니다. 그후 흙을 정제하고 바다를 메마르게 합니다. 마지막으로 대기를 없앱니다."
 ap_esap_hive_terravores_tooltip:0 ""
 ap_esap_one_purpose:0 "하나의 목적"
 ap_esap_one_purpose_desc:0 "이 은하에서 우리의 존재는 단 하나의 목적으로 정의 됩니다. 이것이 바로 우리의 존재이유입니다."
 ap_esap_smallworld:0 "작은 세상"
 ap_esap_smallworld_desc:0 "이 우주는 각종 다양한 수십억개의 행성들로 가득 차 있습니다. 하지만 그 중에서 생명이 살기 적합한 곳은 극히 일부일 뿐입니다. 우리는 커다란 세상 뿐 아니라 작은 세상도 정교하고 탐욕스럽게 이용할 수 있어야 합니다."
 ap_esap_smallworld_tooltip:0 "제국의 모든 행성의 최소 크기를 §Y15§!로 증가시킵니다."
 ap_esap_ct1_infrastructure_tooltip_midgame: "§HAfter mid-game starts§!: §G+1§! §Y$MOD_PLANET_BUILDING_CAPACITY_ADD$§!"
 ap_esap_ct1_infrastructure_tooltip_endgame:0 "§H종반 게임 시작 후§!: §G+1§! §Y$MOD_PLANET_BUILDING_CAPACITY_ADD$§!"
