l_korean:
 mem_voggo_dig_site:0 "구름 속에서"
 mem_voggo_dig_site_desc:0 "§Y[From.Planet.GetName]§!의 초고층 대기 안에 대형 스테이션이 떠 있습니다. \n\n시간의 흐름으로 많이 풍화되었지만 외관은 꽤나 고급스럽습니다. 스테이션 자체는 오래 전에 버려진 것 같습니다."
 mem_voggo.1.name:0 "대기실"
 mem_voggo.1.desc:0 "§Y[From.Planet.GetName]§!에 있는 기지의 호화로운 내부를 정리하고 목록화하는 데 상당한 노력이 필요했습니다. 입은 피해로 인해 비틀린 통로가 위험해졌고, 내부 공기는 고장난 생명 유지 시스템으로 인해 위험하게 불안정해졌습니다. \n\n이 모든 것 중 가장 이상한 점은 장식입니다. 모든 방에는 최소한 하나의 동상이나 같은 인물이 웅장한 포즈를 취하고 있는 초상화가 있습니다."
 mem_voggo.2.name:0 "클론들을 보내라"
 mem_voggo.2.desc:0 "§Y[From.Planet.GetName]§!의 깊은 내부로 진입한 고고학자들은 죽은 시체들을 발견하기 시작했습니다. 그들 중 일부는 총격, 칼날 및 둔기 등에 의해 사망했지만, 다른 이들은 생명 유지 장치의 고장으로 사망한 것으로 보입니다. \n\n모든 시체는 유전적으로 동일하며, 탑승한 초상화와 강인한 유사성을 보입니다. 그러나 서로 다른 시체들은 발달과 건강 상태가 다르게 나타나며, 일부는 다른 시체들에 비해 심각하게 변형되었거나 두개골 부위가 축소된 모습을 보입니다. \n\n[Leader.GetName]은 그들 모두가 동일한 개인의 클론으로, 서로 다른 성공률로 복제된 것이라고 믿고 있습니다. 가장 퇴화된 것들은 아마도 여러 세대에 걸친 클론 기술의 결과일 것입니다."
 mem_voggo.3.name:0 "복제 연구소"
 mem_voggo.3.desc:0 "정거장의 중앙핵 근처에서 [Leader.GetName]는 복제를 위해 만들어진 방 여럿을 발견했습니다. 장비 대부분이 파괴되어있는 것으로 보아 대규모 전투가 벌어진 곳으로 보입니다. 마치 누군가가 내부의 무언가를 꺼내려고 한 듯이 복제기의 내에는 반 정도 성장한 유체들과 박살난 측정기들이 존재합니다."
 mem_voggo.4.name:0 "지성소"
 mem_voggo.4.desc:0 "지금까지 우리는 이 기지가 버려졌다고 믿었습니다. 우리는 잘못 생각했습니다. \n\n기지의 가장 안쪽 부분에서, [Leader.GetName]는 외부로부터 차단된 밀폐된 구역을 발견했습니다. \n\n그 안에서, [Leader.GetSheHe]은 기지의 초상화와 유사한 외모를 가진 살아있는 외계인을 발견했습니다. 변형된 유전적 결함이 없는 것으로 보아, 그는 기지에 널려 있는 클론들의 원형 템플릿일 가능성이 높습니다. 그는 우리와 대화하기를 원합니다."
 mem_voggo.4.pur:0 "상관 없다. 죽여라."
 mem_voggo.4.swarm:0 "포식하라."
 mem_voggo.5.name:0 "보고 대왕"
 mem_voggo.5.desc:0 "아, 누군가가 나를 구속에서 풀어주러 왔군! \n\n내 소개를 하지. 나는 §S보고 대왕§!이며 위엄넘치는 자, 현자, 기름부음받은 자, 욕된 자, 기피된 자, 배신자 및 추방자로도 알려져 있지. 나는 한때 위대하고 풍요로운 §Y보르쿤 국가§의 통치자였네! 자네는 그 이름을 알고 있는가?\n\n아니라고? 그렇게 생각했는데... 당해도 싸군.\n\n드디어 자유로워졌으니 내가 섬길 수 있게 해주게. 나는 자네가 알게 될 가장 유능한 관리자네."
 mem_voggo.5.a:0 "좋소, 합승을 환영하오."
 mem_voggo.5.a.tooltip:0 "§Y보고 대왕§!이 새로운 §S총독§!으로 합류함."
 mem_voggo.5.b:0 "당신을 위한 빈자리는 우리에겐 없는 거 같군."
 mem_voggo.5.c:0 "당신의 이야기를 들려주시오."
 mem_voggo.5.c.responce:0 "오, 이것은 음모와 배신으로 가득 찬 스릴 넘치는 이야기입니다. 몇십 년 전 이 이야기에 관한 책을 썼지만, 실수로 음식 기계 중 하나를 통해 처리해버린 것 같습니다. 걱정하지 마십시오, 제가 또 다른 책을 쓸 것입니다. 지금은 요약본을 드리겠습니다.\n\n제가 속한 §YVorkun Nation§!은 한때 은하계 무대에서 강력한 제국이었고, 저는 그 지도자였습니다. 저만 그런 것은 아니었지만, 다른 이들과는 다른 재능을 지니고 있었습니다. 저는 대부분이 보지 못하는 것들을 볼 수 있었습니다. 사람들은 저를 존경하며 중요한 문제에 대해 항상 저에게 상담했습니다. 제 끝없는 지혜를 인정해주었죠. 한동안 좋은 시절이었습니다.\n\n하지만 예지력과 권력을 부여받는 것은 끔찍한 저주가 될 수 있습니다. 다른 보르쿤들이 행복한 무지 속에서 삶을 살아가는 동안, 저는 끔찍한 재앙을 예견했습니다. 벽에 적힌 글을 보았고, 대부분은 외설적인 낙서였습니다.\n\n저는 대의회 앞에 나아가 그들에게 선택이 있다고 말했습니다 - 저에게 절대 권력을 주거나 멸망하든지. 그들은 저에게도 선택이 있다고 말했습니다 - 추방 아니면 죽음. 그들은 그들의 선택을 했고, 저는 제 선택을 했습니다. 보아하니, 제가 옳았고 그들은 틀렸습니다."
 mem_voggo.5.d:0 "이 스테이션에서 무슨 일이 일어난 건가요?"
 mem_voggo.5.d.responce:0 "이곳은 나의 개인 기지이자, 나의 안전한 피난처였습니다. 추방된 후 도착했을 때, 나는 친구, 동맹, 동료가 전혀 없었고, 나 스스로를 만들어낼 수밖에 없었습니다. 나의 무한한 지성을 나눌 수 있는 사람이 아니라면 누가 이 자격을 갖출 수 있을까요? 그래서 나는 몇 대의 클론 기술 기계를 구입하고 작업을 시작했습니다. \n\n하지만 과정은 내가 예상했던 것보다 더 결함이 많았습니다. 내 클론들은 나와 같은 인내심과 연민을 지니지 않았습니다. 많은 이들이 나에게 등을 돌렸습니다. 내가 가장 깊은 성소에서 피신하려 할 때, 그들은 서로를 공격했고, 각자 자신을 군대로 클론하려 했습니다. 곧 첫 번째 세대의 클론들은 죽었지만, 각자 자신의 클론을 남겼습니다. 세대가 거듭될수록 그들은 더욱 수가 많아지고 정신이 나빠졌으며, 생명 유지 장치가 더 이상 그들을 견딜 수 없게 되었습니다. 나는 나만의 장비로 보호받고 있었고, 그들은 질식해 죽었습니다. \n\n한동안은 재미있었습니다. 하지만 그들이 모두 죽어서 기쁩니다."
 mem_voggo_trait:0 "보고 대왕"
 mem_voggo_trait_desc:0 "보고 대왕은 가장 위대한 상상을 하는 천재이자 선견지명이 있습니다. 모두가 그를 경외합니다."
 mem_voggo_trait_ruler:0 "$mem_voggo_trait$"
 mem_voggo_trait_ruler_desc:0 "$mem_voggo_trait_desc$"
