l_korean:
 mem_crystal_pyramid_category:0 "이상한 빛"
 mem_crystal_pyramid_category_desc:0 "[From.GetName]의 밤, 행성의 투명한 표면 아래에서 수 킬로미터에 달하는 거대한 빛나는 광채가 보입니다. 이 빛의 출처가 무엇이든, 그것은 표면에서 1킬로미터 이상의 얼음으로 분리되어 있기 때문에 자체 에너지를 생성할 수 있어야 합니다."
 mem_crystal_pyramid.1.name:0 "수정 피라미드"
 mem_crystal_pyramid.1.desc:0 "[Root.leader.GetName]의 팀이 [From.GetName]에서 눈부시고 색이 변하는 빛을 발산하는 거대하고 완벽하게 매끄러운 피라미드를 발견했습니다. 그 출처를 찾았음에도 불구하고, 팀은 피라미드가 어떻게 거기에 위치하게 되었는지, 어떻게 빛을 생성하는지, 그리고 얼마나 오랫동안 그곳에 있었는지를 파악할 수 없습니다. 그들은 얼음을 뚫고 피라미드에 직접 접근하기 위한 특별 프로젝트에 대한 자금을 요청하고 있습니다."
 MEM_CRYSTAL_PYRAMID_PROJECT:0 "수정 피라미드"
 MEM_CRYSTAL_PYRAMID_PROJECT_DESC:0 "[crystal_pyramid_planet.GetName]에서 일하는 우리 우리 연구팀이 크리스탈 피라미드 연구에 필요한 추가 인원을 요청했습니다."
 mem_crystal_pyramid.2.name:0 "갑작스러운 방전"
 mem_crystal_pyramid.2.desc:0 "마치 [Root.leader.GetName]의 노력에 응답하듯, [From.GetName]의 얼음 시트 아래에서 빛이 그 어느 때보다 밝게 반짝이다가 갑자기 사라졌습니다. 빛이 발생한 얼음 속에서 거대한 피라미드 형태의 공간이 발견되었으며, 이는 그곳에 있었던 것이 갑자기 존재를 멈췄음을 암시합니다. 사라진 이유가 무엇이든 간에, [Root.GetName]은 짧고 갑작스러운 방출로부터 방대한 양의 데이터와 에너지를 수집하는 데 성공했습니다."
 mem_crystal_pyramid.2.a:0 "이상한 일이군."
 mem_crystal_pyramid.3.name:0 "이상한 것"
 mem_crystal_pyramid.3.desc:0 "[crystal_pyramid_planet.GetName]의 표면 아래에 있는 피라미드에 도달한 후, [Root.leader.GetName]는 장치의 본질에 대한 보고서를 발행했습니다. 이 장치는 우리 팀이 지금까지 본 적이 없는 물자로 만들어져 있으며, 표면에 약간의 손상을 주려는 모든 시도에 저항하고 있습니다. 피라미드에서 방출되는 파동에는 어떤 패턴도 없는 것처럼 보이지만, 다양한 파장에서의 높은 에너지는 우리 과학자들에게 훌륭한 데이터 출처가 되고 있습니다. 이 이상한 물체가 만들어내는 철학적 논쟁은 끝이 없지만, 진정한 가치는 그것을 더 연구할 수 있는 능력에 있는 것 같습니다."
 mem_crystal_pyramid.3.a:0 "모든 것을 이해할 수 있는건 아니지."
 mem_crystal_pyramid.4.name:0 "수정 가족"
 mem_crystal_pyramid.4.desc:0 "[Root.leader.GetName]가 이끄는 광부 팀이 피라미드에 도착하자, 피라미드는 눈부신 붉은 색으로 빛났습니다. [Root.leader.GetName]의 서두르는 명령에도 불구하고, 한 광부가 피라미드를 만졌고, 그 순간 피라미드는 갑자기 사라졌습니다. 그들이 실망한 것은, 피라미드가 사라진 직후 행성 주위에 결정체 존재들이 나타났다는 것입니다."
 mem_crystal_pyramid.4.a:0 "좋지 않은데."
