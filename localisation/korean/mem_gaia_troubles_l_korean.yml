l_korean:
 mem_gaia_troubles.name:0 "새로운 가이아 행성"
 mem_gaia_troubles.desc:0 "이 가이아 행성은 모두에게 완벽한 세계입니다. 행성의 탐험이 이미 시작되었습니다."
 mem_gaia_troubles.2.name:0 "망치?"
 mem_gaia_troubles.2.desc:0 "§Y[From.GetName]§!의 지하 동굴에서 정찰대가 지표 아래로 수 마일에 걸쳐 이어지는 놀라운 동굴 네트워크를 발견했습니다. 동굴을 탐색하는 동안 우리는 매우 큰 동 cavern에 우연히 도달한 것 같습니다. 이 cavern은 매우 비자연적이며, 거의 원형의 형태를 하고 있습니다. 중앙에는 약한 전자기 신호를 방출하는 물체가 있는 작은 바위가 놓여 있습니다. 이 물체는 예상치 못한 디자인으로, 중세 전쟁 망치에 비유할 수 있습니다!"
 mem_gaia_troubles.2.a:0 "그대로 둬라. 신경쓸 필요 없어."
 mem_gaia_troubles.2.b:0 "연구를 위해 이 유물을 수도로 가져와라."
 mem_gaia_troubles.2.c:0 "전시회로 공개합니다."
 mem_gaia_troubles.2.d:0 "망치를 가이아 행성에 그대로 두고 조사하게."
 mem_gaia_troubles.2.e:0 "EM신호라고? 그 신호가 우리에게 반응하는지 확인해보자!"
 mem_gaia_troubles.3.name:0 "유물 유지"
 mem_gaia_troubles.3.desc:0 "우리의 선택은 고대 기술을 연구하지 않는 것을 의미합니다. 그러나 우리는 이 위대한 가이아 행성에 해를 끼칠 수 있는 위험을 감수하지 않을 것입니다."
 mem_gaia_troubles.3.a:0 "적어도 나빠질 일은 없겠지!"
 mem_gaia_troubles.4.name:0 "문제 발생"
 mem_gaia_troubles.4.desc:0 "위험한 날씨가 §Y[From.GetName]§!에서 발생했습니다. 일부 더 자유로운 사고를 가진 과학자들이 이것이 §Y[From.GetName]§!에서 유물을 제거한 것 때문일 수 있다고 제안했습니다. 그러나 과학계의 대다수는 이것이 단순한 우연일 뿐이라고 믿고 있습니다."
 mem_gaia_troubles.4.a:0 "저 멍청한 과학자는 어떻게 박사학위를 딴거야?"
 mem_gaia_troubles.4.b:0 "이 망치를 돌려놔. 나중에 후회하는 것보단 낫지."
 mem_gaia_troubles.5.name:0 "문제 발생"
 mem_gaia_troubles.5.desc:0 "§Y[From.GetName]§!에서 대규모 지각 활동이 일어나고 있으며, 이 행성에 일반적으로 그러한 활동이 거의 없다는 점을 고려할 때 행성의 주민들은 상당히 우려하고 있습니다. 많은 도시가 지진으로 심각한 피해를 보았습니다. 과학계 보고서에 따르면 이제 더 많은 과학자가 이러한 이상한 일이 우리가 유물을 제거했기 때문에 발생했다는 생각을 지지하고 있습니다."
 mem_gaia_troubles.5.a:0 "단지 우연일 뿐이야."
 mem_gaia_troubles.5.b:0 "뭔가 심상치 않아, 유물을 돌려놓도록."
 mem_gaia_troubles.6.name:0 "문제 발생"
 mem_gaia_troubles.6.desc:0 "[From.GetName]에서 비정상적인 일이 발생했습니다. 행성의 중력이 엄청나게 증가했습니다. 우리의 수석 과학자들은 이것이 정확히 어떻게 일어났는지에 대해 당혹스러워합니다."
 mem_gaia_troubles.6.a:0 "작업은 계속되어야만 해!"
 mem_gaia_troubles.6.b:0 "그래.... 유물을 되돌려야할 시간이군."
 mem_gaia_troubles.7.name:0 "문제 발생"
 mem_gaia_troubles.7.desc:0 "§Y[From.GetName]§!의 전체 생태계가 우리의 눈앞에서 붕괴되었습니다. 숲은 사라지고, 바다는 말라버렸으며, 사막이 행성 전체에 퍼졌습니다. 수백만의 우리 국민이 불과 얼마 전만 해도 알던 세계와는 매우 다른 세상에서 살고 있습니다. 과학계의 대다수는 상황이 더욱 악화될 수 있다는 우려 속에 유물을 행성으로 되돌릴 것을 촉구하고 있습니다. 그러나 유물에서 얻는 과학적 성과는 막대합니다."
 mem_gaia_troubles.7.a:0 "어떠한 대가를 치루더라도 연구를 해야 한다!"
 mem_gaia_troubles.7.b:0 "늦기전에 이 재앙을 멈춰야만 해!"
 mem_gaia_troubles.8.name:0 "문제 발생"
 mem_gaia_troubles.8.desc:0 "아니요. 그런 일은 일어날 수 없었습니다. 우리는 그들의 말을 듣는 것이 좋았을 것입니다..."
 mem_gaia_troubles.8.a:0 "너무 늦어버렸어..."
 mem_gaia_troubles.9.name:0 "문제 발생"
 mem_gaia_troubles.9.desc:0 "§Y[From.GetName]§!은(는) 완전히 죽어버렸습니다. 유독한 가스로 가득 차 있어 이제는 생명체가 다시 살 수 있을 거 같지 않습니다."
 mem_gaia_troubles.9.a:0 "어쩌면 우리가 너무 극단적이었을지도..."
 mem_gaia_troubles.10.name:0 "반환된 유물"
 mem_gaia_troubles.10.desc:0 "이 유물이 무엇이든 간에 우리가 재앙에서 벗어났다는 것을 알게 된 후, 유물을 돌려놓기로 한 결정은 과학 공동체의 대다수들로부터 환영을 받았습니다. 일부 사람들은 여전히 ​​연구를 수행하기를 원하지만, 우주의 비밀에 대한 그들의 갈증은 또 다른 날까지 기다려야 할 것입니다."
 mem_gaia_troubles.10.a:0 "적어도 다른 나쁜 일들은 일어나지 않았잖아. 안 그래?"
 mem_gaia_troubles.20.name:0 "EM 실험"
 mem_gaia_troubles.20.desc:0 "장비가 §Y[From.GetName]§!로 운송되고 있으며, 테스트 준비 중입니다. 테스트가 시작되면 곧 알려드리겠습니다."
 mem_gaia_troubles.21.name:0 "EM 실험"
 mem_gaia_troubles.21.desc:0 "마지막 테스트 결과가 이 유물에 대한 몇 가지 추가 정보를 밝혀냈지만, 확실한 결론을 내리기에는 부족합니다. EM 빔의 강도와 관련하여 우리의 다음 행동은 무엇이어야 할까요?"
 mem_gaia_troubles.21.a:0 "시험 강도를 높여 다시 시도해라."
 mem_gaia_troubles.21.b:0 "강도를 조금 낮춰서 해보자."
 mem_gaia_troubles.22.name:0 "EM 실험"
 mem_gaia_troubles.22.desc:0 "마지막 테스트 라운드에서 유물에 대한 추가 정보가 밝혀졌지만, 확실한 결론을 내리기에는 부족합니다. EM 빔의 강도와 관련하여 우리의 다음 행동은 무엇이어야 할까요?"
 mem_gaia_troubles.22.a:0 "시험 강도를 높여 다시 시도해라."
 mem_gaia_troubles.22.b:0 "강도를 조금 낮춰서 해보자."
 mem_gaia_troubles.23.name:0 "EM 실험"
 mem_gaia_troubles.23.desc:0 "EM 실험에서 우리는 어떤 용도에 관한 정보도 얻지 못했습니다. 이 유물을 절대 이해하지 못할 거라는 결론에 도달하는 것이 그렇게 빠르지는 않았군요."
 mem_gaia_troubles.24.name:0 "EM 실험"
 mem_gaia_troubles.24.desc:0 "우리는 이 유물을 '활성화'한 것 같습니다. 우리가 무엇을 했는지는 확실하지 않습니다. EM 빔을 특정 주파수로 조정한 후, 여러 드론이 동굴 바닥의 미공개 포드에서 솟아올라 대기 상층으로 향하며 동굴 천장을 뚫고 나갔습니다! 우리의 위성이 그들의 무기가 충전 중임을 감지했습니다. 우리는 방어 준비를 해야 합니다."
