l_korean:
 mem_primitives.101.name:0 "[mem_primitives_the_planet.GetName]: 작은 한 걸음"
 mem_primitives.101.desc:0 "오늘 우리의 관측 전초 기지가 §Y[mem_primitives_the_planet.GetName]§! 위에서 원주율 문명 발전의 중요한 이정표를 목격했습니다: 행성 표면에서 발사된 유인 우주선이 행성의 자연 위성인 §Y[mem_primitives_the_moon.GetName]§!에 도달했습니다. 승무원들은 우주선에서 오랜 시간 동안 나와 그 표면을 걸었고, 아래의 [pre_ftl_country.GetSpeciesNamePlural]는 사건의 영상이 [mem_primitives_the_planet.GetPlanetMoon]을 통해 방송되는 것을 매료되어 지켜보았습니다.\n\n그들의 발전 단계에서는 이러한 탐사가 영구적인 전초 기지를 세울 수 있을 것이라고 기대할 수는 없지만, 그럼에도 불구하고 [pre_ftl_country.GetSpeciesNamePlural]에게는 큰 성과입니다."
 mem_primitives.101.sister.desc:0 "오늘 우리의 관측 전초 기지가 §Y[mem_primitives_the_planet.GetName]§! 위에서 원주율 문명 발전의 중요한 이정표를 목격했습니다: 행성 표면에서 발사된 유인 우주선이 또 다른 자연 위성인 §Y[mem_primitives_the_moon.GetName]§!에 도달했습니다. 승무원들은 우주선에서 오랜 시간 동안 나와 달 표면을 걸었습니다. [pre_ftl_country.GetSpeciesNamePlural]는 사건의 영상이 [mem_primitives_the_planet.GetPlanetMoon]에 방송되는 동안 매료되어 지켜보았습니다.\n\n비록 현재 개발 단계에서는 이러한 탐사가 영구적인 전초 기지를 설립할 수 있을 것으로 기대할 수 없지만, 그럼에도 불구하고 이는 [pre_ftl_country.GetSpeciesNamePlural]에게 큰 성과입니다."
 mem_primitives.101.hab.desc:0 "오늘 우리의 관측 전초 기지가 §Y[mem_primitives_the_planet.GetName]§! 위에서 원주율 문명 발전의 중요한 이정표를 목격했습니다: 행성 표면에서 발사된 유인 우주선이 자연 위성인 §Y[mem_primitives_the_moon.GetName]§!에 도달했습니다. 승무원은 우주선에서 오랜 시간 동안 나와 달 표면을 걸었습니다 - [pre_ftl_country.GetSpeciesNamePlural]이 다른 거주 가능한 세계의 공기를 처음으로 마신 순간입니다. [pre_ftl_country.GetSpeciesNamePlural]은 사건의 영상이 [mem_primitives_the_planet.GetPlanetMoon] 전역에 방송되는 것을 매료되어 지켜보았습니다.\n\n비록 현재 개발 단계에서는 이러한 탐사가 영구적인 전초 기지를 설립할 수 있을 것이라고 기대할 수 없지만, 그럼에도 불구하고 [pre_ftl_country.GetSpeciesNamePlural]에게는 큰 성과입니다."
 mem_primitives.101.hab.sister.desc:0 "오늘 우리의 관측 전초 기지가 §Y[mem_primitives_the_planet.GetName]§! 위에서 원주율 문명 발전의 중요한 이정표를 목격했습니다: 행성 표면에서 발사된 유인 우주선이 또 다른 자연 위성인 §Y[mem_primitives_the_moon.GetName]§!에 도달했습니다. 승무원은 오랜 시간 동안 우주선에서 나와 그 표면을 걸었습니다 - [pre_ftl_country.GetSpeciesNamePlural]가 다른 거주 가능한 세계의 공기를 처음으로 마신 순간입니다. [pre_ftl_country.GetSpeciesNamePlural]는 이 사건의 영상이 [mem_primitives_the_planet.GetPlanetMoon]에 방송되는 것을 매료되어 지켜보았습니다.\n\n비록 현재 개발 단계에서는 이러한 탐사가 영구적인 전초 기지를 설립할 수 있을 것이라고 기대할 수 없지만, 그럼에도 불구하고 이는 [pre_ftl_country.GetSpeciesNamePlural]에게 큰 성과입니다."
 mem_primitives.101:0 "Congratulations."
 mem_primitives.101.phobe:0 "왜 그들은 자신의 더러움을 스스로 간직할 수 없는 걸까요?"
 mem_primitives.101.mat:0 "그들은 올바른 길을 가고 있습니다."
 mem_primitives.101.matphile:0 "그들은 너무 빨리 자랍니다!"
 mem_primitives.301.name:0 "[mem_primitives_the_planet.GetName]: 세계적 갈등"
 mem_primitives.301.desc:0 "오늘은 §Y[pre_ftl_country.GetName]§!의 새로운 시대를 알리는 날입니다. 오랜 긴장 기간 끝에, 그다지 큰 사건이 아니었던 외교적 사건이 여러 국제 블록 간의 대규모 갈등을 촉발했습니다. 거의 전체 [mem_primitives_the_planet.GetPlanetMoon]이 이 갈등에 연루되었으며, 사망자 수는 그들이 스스로 초래할 수 있었던 어떤 사건보다도 초과할 것으로 예상됩니다. \n\n이 갈등에서 누가 승리할지는 두고 봐야겠지만, 이 시련이 [mem_primitives_the_planet.GetPlanetMoon]의 역사에 깊은 영향을 미칠 것임은 의심의 여지가 없습니다."
 mem_primitives.303.name:0 "[mem_primitives_the_planet.GetName]: 전쟁이 끝났습니다"
 mem_primitives.303.desc:0 "§Y[mem_primitives_the_planet.GetName]§!에서 한동안 계속된 피비린내 나는 갈등이 마침내 끝났습니다. 오늘 서명된 평화 조약은 정치적 풍경에 큰 변화를 가져왔으며, 여러 국가가 하룻밤 사이에 두각을 나타내거나 몰락하게 되었습니다. \n\n하지만 이것이 끝일까요? 막대한 배상금, 굴욕, 영토 손실로 얼룩진 패자들은 힘을 모을 수 있는 대로 복수를 계획할 것이 분명합니다."
 mem_primitives.303a:0 "20년간의 휴전"
 mem_primitives.305.name:0 "[mem_primitives_the_planet.GetName]: 모든 전쟁의 종말"
 mem_primitives.305.desc:0 "§Y[From.GetSpeciesNamePlural]§! 간의 갈등이 한동안 교착 상태에 있었으며, 모든 측이 인력과 경제 모두에서 재앙적인 손실을 겪었습니다. \n\n오늘, 전투 당사자들 간에 백서가 체결되면서 마침내 갈등이 끝난 것 같습니다. 전쟁의 트라우마가 대중의 마음에 생생하게 남아 있는 가운데, [mem_primitives_the_planet.GetPlanetMoon]의 사람들은 군사적 공격성을 경계하고 상호 이해를 앞으로 나아가는 길로 보고, 다시는 전쟁의 참혹함을 경험하지 않기를 희망하고 있습니다."
 mem_primitives.305a.milphobe:0 "부끄러운 줄 알아라."
 mem_primitives.305a.pacphile:0 "드디어 그들도 깨달았군."
 mem_primitives.307.name:0 "[mem_primitives_the_planet.GetName]: 새로운 세계적 갈등"
 mem_primitives.307.desc:0 "오늘, §Y[mem_primitives_the_planet.GetName]§!의 취약한 평화가 다시금 깨졌습니다. 이전 갈등에서 가장 수치스러운 패배를 겪고, 그로 인해 겪은 고통의 정점에 서 있었던 국가가 최근 카리스마 있는 지도자가 이끄는 초국가주의 정부의 통제 하에 놓이게 되었습니다. 그들은 한동안 공격성을 보였지만, 이번에는 다른 주요 국가들이 마침내 유화 정책을 끝내기로 결정했습니다. \n\n그들의 국민의 맹렬한 광신과 고급 군사 교리를 무장한 복수주의자들은 비슷한 원한을 품은 국가들의 블록에 의해 지지받는 강력한 세력이 되었지만, 그들이 사실상 전 세계를 상대로 전쟁을 벌이고 역사를 뒤바꿀 수 있는 능력이 있는지는 오직 시간만이 알 것입니다."
 mem_primitives.307a:0 "이렇게 될 수 밖에 없었다."
 mem_primitives.309.name:0 "[mem_primitives_the_planet.GetName]: 제2의 평화"
 mem_primitives.309.desc:0 "§Y[mem_primitives_the_planet.GetName]§!에서 벌어지고 있던 전쟁이 끝났습니다. §Y[pre_ftl_country.GetName]§!의 역사는 반복되는 경향이 있는 것 같습니다. 첫 번째 세계 대전에서 승리한 세력이 두 번째 세계 대전에서도 승리했습니다. \n\n공격자들이 완전히 제거되고 그들의 이념이 철저히 불신받게 되면서, 우리는 이것이 그들의 문명에서 주요 전환점 중 하나가 될 것으로 기대할 수 있습니다."
 mem_primitives.311.name:0 "[mem_primitives_the_planet.GetName]: 새로운 세계 질서"
 mem_primitives.311.desc:0 "모든 역경에도 불구하고, §Y[mem_primitives_the_planet.GetName]§!에서 시작된 공격적인 세력이 세계적 갈등에서 승리했습니다. \n\n그들은 전체 [mem_primitives_the_planet.GetPlanetMoon]을 지배하지는 못하지만, 그들의 지위를 회복하고 지배적인 세력으로 떠올랐습니다. 그들의 민족주의적 수사가 정당화되고 전쟁 범죄가 비유적으로 덮여진 만큼, §Y[from.GetSpeciesNamePlural]§!의 방향에서 심오한 변화가 있을 것으로 기대할 수 있습니다."
 mem_primitives.401.name:0 "[mem_primitives_the_planet.GetName]: 종교적 발전"
 mem_primitives.401.desc:0 "우리의 관측 전초 기지가 §Y[mem_primitives_the_planet.GetName]§! 위에서 §Y[pre_ftl_country.GetName]'s§! 발전에 중대한 변화가 있음을 발견했습니다. \n\n한때 소수의 신흥 종교였던 이 교단은 반역적인 행동으로 처형된 신비주의자에 의해 설립되었으며, 이제는 주요 종교로 성장하여 널리 퍼졌습니다. 가난한 사람들과 소외된 이들 사이에서 인기를 끌며, 용서와 관용을 핵심 가치로 가르치고, 미덕 있는 삶을 사는 이들에게는 내세에서 천국의 보상을 약속합니다. \n\n이제 이 종교가 두각을 나타내고 강력한 사회적 세력이 되었으므로, 그 가치가 더 헤게모니적인 태도로 변화할 것으로 예상할 수 있습니다."
 mem_primitives.401a.mat:0 "그들은 미신으로 자신을 속입니다."
 mem_primitives.401a.sp:0 "그들이 올바른 길에 있는지 확인해 보겠습니다."
 mem_primitives.401a.sphile:0 "그들은 그들만의 방식으로 진실에 다가가고 있습니다."
 mem_primitives.401a.sphobe:0 "이 이단은 결국 처리하겠습니다."
 mem_primitives.403.name:0 "[mem_primitives_the_planet.GetName]: 종교적 발전"
 mem_primitives.403.desc:0 "우리의 관측 전초 기지가 §Y[mem_primitives_the_planet.GetName]§! 위에서 §Y[pre_ftl_country.GetName]'s§! 발전에 큰 변화가 있음을 발견했습니다. \n\n한 부족 전쟁광 신비가 세운 종교가 정복과 개종을 통해 넓은 지역에 퍼졌습니다. 전쟁광 신앙으로, 국가 운영과 밀접하게 얽혀 있으며, 그 확산을 보장하기 위해 희생을 감수할 준비와 규율을 강조하며, 그 이름을 위해 싸우다 죽는 이들에게는 천국을 약속합니다."
 mem_primitives.405.name:0 "[mem_primitives_the_planet.GetName]: 종교적 발전"
 mem_primitives.405.desc:0 "우리의 관측 전초 기지 위에 있는 §Y[mem_primitives_the_planet.GetName]§!는 §Y[pre_ftl_country.GetName]'s§! 발전에서 주요한 변화를 감지했습니다. \n\n새로운 종교가 [mem_primitives_the_planet.GetPlanetMoon] 전역에서 두각을 나타내고 있으며, 내면의 평화를 찾기 위해 자기 성찰과 금욕을 강조하고 있습니다. 모든 영혼이 끝없이 다시 태어나는 운명에 얽매여 있다고 믿으며, 신도들에게 환생의 끝없는 순환에서 벗어나 무의 상태에서 영원한 행복을 얻을 기회를 약속합니다."
 mem_primitives.407.name:0 "[mem_primitives_the_planet.GetName]: 종교적 발전"
 mem_primitives.407.desc:0 "우리의 관측 전초 기지에서 §Y[mem_primitives_the_planet.GetName]§!는 §Y[pre_ftl_country.GetName]'s§! 발전에 중대한 변화가 있음을 발견했습니다. \n\n종교적 장식과 유사 과학적 표현을 결합한 준종교적 가르침이 그들의 엘리트 사이에서 인기를 얻고 있습니다. 이 가르침은 사회를 괴롭히는 대부분의 문제들이 [mem_primitives_the_planet.GetPlanetMoon]의 과거에서 외계인의 활동에서 비롯되었다고 가르칩니다. 더 구체적으로는 [mem_primitives_the_planet.GetPlanetMoon]의 표면에서 자신의 백성을 대량 학살한 외계 통치자에 관한 것입니다. \n\n전해지는 바에 따르면, 죽은 외계인들의 유령이 이제 [mem_primitives_the_planet.GetName]를 괴롭히고 있으며, 이는 인구 사이에 정신적 고통을 초래하고 있습니다."
 mem_primitives.407a:0 "터무니 없군. 우린 그런 짓을 하지 않았어."
 mem_primitives.501.name:0 "[mem_primitives_the_planet.GetName]: 전염병"
 mem_primitives.501.desc:0 "우리는 §Y[mem_primitives_the_planet.GetName]§!에서 매우 전염성이 강한 새로운 균주를 감지하고 있습니다. 이 전염병은 [mem_primitives_the_planet.GetPlanetMoon] 전역에 빠르게 퍼지고 있으며, [pre_ftl_country.GetName]의 의학 수준이 원시적이기 때문에 전체 인구를 잠재적으로 몰살시킬 수 있습니다. \n\n물론, 우리의 고급 의학 지식이 있다면, 우리가 원한다면 이 전염병의 확산을 쉽게 막을 수 있을 것입니다."
 mem_primitives.501a:0 "치료제 개발을 시작해라."
 mem_primitives.501b:0 "우리는 간섭하지 않는다."
 mem_primitives.501b.phobe:0 "사라지게 두어라. 외계종은 죽어야 한다."
 mem_primitives.503.name:0 "[from.GetSpeciesNamePlural] 멸종"
 mem_primitives.503.desc:0 "§Y[mem_primitives_the_planet.GetName]§! 위의 관측 전초 기지가 보고합니다. [mem_primitives_the_planet.GetPlanetMoon]에 있는 마지막 지능 생명체들이 인구를 황폐화시킨 전염병에 의해 멸종되었습니다. §Y[from.GetSpeciesNamePlural]§!는 이제 공식적으로 멸종된 것으로 간주되며, 관측 전초 기지는 더 이상 관측할 것이 없으므로 해체되었습니다. \n\n하지만 이 전염병은 우리 시민들에게 위험하지 않으므로, 원한다면 [mem_primitives_the_planet.GetPlanetMoon]을 식민지화할 수 있습니다."
 mem_primitives.503a.phobe:0 "사라지게 두어라. 외계종은 죽어야 한다."
 mem_primitives.503a.matphobe:0 "그들은 진화의 게임에서 졌을 뿐이야."
 mem_primitives.505.name:0 "[mem_primitives_the_planet.GetName]: 전염병이 끝났습니다"
 mem_primitives.505.desc:0 "더 이상 §Y[mem_primitives_the_planet.GetName]§!의 표면을 휩쓸던 전염병의 새로운 사례를 보지 못하고 있습니다. 아마도 생존 가능한 숙주가 고갈되어 자연 면역이 있는 자들만 남았을 것입니다."
 mem_primitives.506.name:0 "[mem_primitives_the_planet.GetName]: 치료 완료"
 mem_primitives.506.desc:0 "[Root.GetName]는 §Y[mem_primitives_the_planet.GetName]§!을 휩쓸고 있는 전염병에 맞서기 위해 특별히 설계된 합성체 백신을 [mem_primitives_the_planet.GetPlanetMoon]의 대기로 성공적으로 분산시켰습니다. \n\n우리는 감염률이 한 달 이내에 제로로 떨어질 것으로 예상하고 있습니다. 전염병은 사실상 끝났습니다."
 MEM_PRIMITIVES_BD_CURE_PROJECT:0 "전염병 예방 접종"
 MEM_PRIMITIVES_BD_CURE_PROJECT_DESC:0 "우리 연구소에서 설계한 합성체 백신은 [mem_primitives_the_planet.GetPlanetMoon]의 대기 중에 은밀히 퍼질 수 있으며, 이로 인해 원시 인구가 잠재적으로 멸종되는 것을 방지할 수 있습니다."
 mem_primitives.601.name:0 "[mem_primitives_the_planet.GetName]: 파괴적인 테러 공격"
 mem_primitives.601.desc:0 "§Y[pre_ftl_country.GetName]§! 오늘 숙련된 대규모 인명 피해 사건을 경험했습니다. 여러 급진화된 시민들이 §Y[mem_primitives_the_planet.GetName]§!의 주요 문화 및 경제 중심지를 공격하여 [mem_primitives_the_planet.GetPlanetMoon]의 역사에서 가장 파괴적인 단일 테러 사건이 발생했습니다. \n\n수천 명의 사망자와 불타는 건물의 이미지가 대중의 마음에 생생하게 남아 있는 가운데, 이 사건은 이 문명의 역사에서 전환점이 될 가능성이 높습니다."
 mem_primitives.601a.mil:0 "누군가 외교에 지친 것 같군..."
 mem_primitives.601a.pacphobe:0 "적어도 우리는 그러한 야만성을 넘어섰어. 그렇지?"
 mem_primitives.603.name:0 "[mem_primitives_the_planet.GetName]: 원자 공포!"
 mem_primitives.603.desc:0 "관측 전초 기지에서 §Y[mem_primitives_the_planet.GetName]§!의 위에 있는 승무원들이 오늘 거대한 폭발을 목격했다고 보고했습니다. 그들은 원주민들이 핵무기로 서로를 멸망시킬까 걱정했지만, 이는 고립된 사건임이 분명해졌습니다. 몇몇 급진파가 군대에서 강력한 핵 장치를 훔쳐 [mem_primitives_the_planet.GetPlanetMoon]의 표면에 있는 인구 중심지 중 하나를 파괴하는 데 사용한 것으로 보입니다.\n\n이러한 규모의 사건은 [pre_ftl_country.GetName]의 역사를 확실히 변화시킬 것입니다."
 mem_primitives.701.name:0 "[mem_primitives_the_planet.GetName]: 디지털 재앙"
 mem_primitives.701.desc:0 "§Y[mem_primitives_the_planet.GetName]§! 위의 관측 전초 기지가 [mem_primitives_the_planet.GetPlanetMoon]의 인프라에서 연쇄적인 실패를 목격했다고 보고합니다. \n\n상대적으로 최근에 전자 컴퓨터의 광범위한 사용을 채택한 §Y[pre_ftl_country.GetName]§!는 날짜 변경을 제대로 처리할 준비가 되어 있지 않았던 것으로 보입니다. 새로운 밀레니엄이 시작되면서 연도 숫자가 변수의 범위를 초과하여 날짜가 0으로 초기화되었습니다. \n\n우리 연구원들은 대부분의 통신 인프라가 중단되고 교통 및 유틸리티에 혼란이 발생했으며 여러 개의 원자력 발전소가 멜트다운에 들어갔다는 보고를 받았습니다. 긴급 코드 패치가 전달되고 있지만, 이 사건이 문명을 파괴할 가능성은 낮지만, 그들의 기술에 대한 인식에는 확실히 영향을 미칠 것입니다."
 mem_primitives.701a:0 "안타깝군."
 mem_primitives.701a.sp:0 "그들은 기계를 너무 많이 신뢰했다."
 mem_primitives.701a.sphobe:0 "그들은 영혼 없는 기계에 의존하는 대가를 치렀다."
 mem_primitives.701a.mat:0 "끔직하게 무능하군..."
 mem_primitives.701a.matphile:0 "그들은 그것을 극복하고 배울 것이다."
 mem_primitives.701.a.tooltip:0 "[pre_ftl_country.GetSpeciesNamePlural]는 다음 시대를 향한 진행 상황이 일부 감소합니다."
 mem_primitives.801.name:0 "[mem_primitives_the_planet.GetName]: 제국의 몰락"
 mem_primitives.801.desc:0 "우리의 관측 전초 기지에서 §Y[mem_primitives_the_planet.GetName]§!는 [From.GetSpeciesAdj] 문명이 거의 천 년 동안 단일 대제국에 의해 지배받아 왔다는 보고를 하였습니다. 이 제국은 세계의 거주 가능한 표면의 5분의 1 이상을 차지하고 있으며, 전성기에는 모든 [From.GetSpeciesNamePlural]의 거의 3분의 1을 포함하는 영토를 가지고 있어 학습과 문화의 중심지 역할을 해왔습니다. 도시가 건설되고, 기술이 발견되었으며, 새로운 번영의 수준에 도달하였습니다.\n\n그러나 지난 50년 동안 제국이 약화된 것으로 보입니다. 내부 갈등과 그들의 부를 노리는 새롭게 등장한 외부 적들의 조합이 제국을 약화시켰습니다. 최근, [From.GetSpeciesAdj] 지식인들이 "야만인"이라고 여기는 대군이 제국의 심장부로 침투하여 수도를 약탈하고 제국의 중심지에서 무자비하게 약탈하며 난동을 부렸습니다.\n\n비록 "야만인"들이 나중에 후퇴하였지만, 우리는 제국이 오래 버티지 못할 것이라고 믿습니다. 이는 [From.GetSpeciesNamePlural]에게 상당한 후퇴를 초래할 수 있습니다."
 mem_primitives.801a:0 "안됐군."
 mem_primitives.801a.materialist:0 "진보는 험난한 여정이다."
 mem_primitives.801a.sphobe:0 "무슨 상관이야?"
 mem_primitives.801.tooltip:0 "[from.GetSpeciesNamePlural]은(는) 청동기 시대로 회귀합니다."
 mem_primitives.801.hive.desc:0 "우리의 관측 전초 기지에서 §Y[mem_primitives_the_planet.GetName]§!는 [pre_ftl_country.GetSpeciesAdj] 하이브 마인드가 거의 천 년 동안 단일한 대의식에 의해 지배받아 왔다는 보고를 하였습니다. 이 하이브는 세계의 거주 가능한 표면의 5분의 1 이상을 차지하고 있으며, 전성기에는 모든 [pre_ftl_country.GetSpeciesAdj] 드론의 거의 3분의 1을 포함하는 영토를 가지고 있어 학습과 문화의 중심지 역할을 해왔습니다. 거대한 둥지가 세워지고, 기술이 발견되었으며, 새로운 번영의 수준에 도달하였습니다.\n\n하지만 지난 50년 동안, 대의식이 약해진 것으로 보입니다. 내부의 일탈과 지배적인 하이브의 영토와 드론의 일부를 차지하려는 새로 부상한 외부 하이브의 조합이 대의식을 약화시켰습니다. 최근, [pre_ftl_country.GetSpeciesAdj]가 "야만인"이라고 명명한 특히 폭력적인 드론의 대군이 대의식의 영토 깊숙이 침투하여 중앙 연결체를 약탈한 후 하이브의 중심지에서 무자비하게 학살을 저질렀습니다.\n\n비록 "야만인"들이 나중에 후퇴하였지만, 그들은 치명적인 타격을 입혀 대의식을 죽음의 침대에 놓이게 하였습니다. 이는 [pre_ftl_country.GetSpeciesNamePlural]에게 상당한 후퇴를 초래할 수 있습니다."
 mem_primitives.801.a.tooltip:0 "[pre_ftl_country.GetSpeciesNamePlural]는 다음 시대를 향한 상당한 진행을 잃습니다."
