 BATTLESHIP_SNIPER_GUN_2_DESC:0 "이 특화된 고속 포탑은 민첩한 초계함에 대항하기 위해 설계되었습니다. 장거리에서도 높은 정밀도를 보장합니다만, 튼튼한 함선이라면 충분히 맞으면서 버틸 수 있습니다."
