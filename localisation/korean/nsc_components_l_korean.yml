 PERDITION_BEAM_FLAGSHIP:0 "정의의 집행자"
 PERDITION_BEAM_FLAGSHIP_DESC:0 "가장 거대한 함선을 위한 가장 거대한 무기입니다. 별로 크지 않은 지도자에겐 충분한 보상이 될 겁니다."
 PERDITION_BEAM_STARBASE:0 "원자상 분해기"
 PERDITION_BEAM_STARBASE_DESC:0 "적들을 원자로 분해해 버리는 무기입니다."
 XL_BEAM_STARBASE:0 "편광 전자 변조기"
 XL_BEAM_STARBASE_DESC:0 "원자상 분해기의 두배 정도의 화력에 차지하는 공간은 절반 정도인 무기입니다."
 BASIC_XL_BEAM:0 "시험형 에너지 랜스"
 BASIC_XL_BEAM_DESC:0 "시험형 에너지 랜스입니다. 랜스의 실용성을 입증하기 위해 만들어진 시험형 무기로, 다음 세대에 비해 화력이 약하지만 전략자원을 필요로 하지 않습니다."
 BASIC_T_BEAM:0 "시험형 천벌 광선"
 BASIC_T_BEAM_DESC:0 "시험형 천벌 광선은 타이탄급 무기의 초기형으로, 그 크기와 위용에 비해선 사실 파괴력이 부족한 편입니다. 그런만큼 전략자원은 필요로 하지 않습니다."
 TOMAHAWK_CRUISE_MISSILE:0 "토마호크 순항 미사일"
 TOMAHAWK_CRUISE_MISSILE_DESC:0 "매우 긴 사거리와 강력한 화력을 자랑하지만 매우 비싼 주력함 대응 미사일입니다. 방위 거점이나 사정거리가 긴 함선에 매우 유용한 무기입니다."
 NSC_PD_MISSILE:0 "해링턴 고급 미사일 포드"
 NSC_PD_MISSILE_DESC:0 "빠르고 기동성이 뛰어난 목표물을 격추할 수 있는 고급 포인트 방어 미사일 팟입니다."
 FRIGATE_TORPEDO_1:0 "작살 어뢰"
 FRIGATE_TORPEDO_1_DESC:0 "프리깃 클래스의 소형 발사기에 맞도록 설계된 특수 어뢰로, 적 지역에서의 신속한 은밀 공격에 사용됩니다."
 BATTLECRUISER_TORPEDO_1:0 "미닛맨 어뢰"
 BATTLECRUISER_TORPEDO_1_DESC:0 "대부분의 다른 어뢰보다 더 빠르게 발사할 수 있는 능력에서 이름을 따온 미누트맨은 전투순양함 클래스에 맞춰 설계된 특별한 변형으로, 더 큰 적의 자본 함선에 치명적인 타격을 가할 수 있습니다. 또한 항성 기지와 방어 플랫폼에 장착하여 장거리 자본 함선 방어를 할 수 있습니다."
 BATTLESHIP_SNIPER_GUN_1:0 "전자기 유동 기관포"
 BATTLESHIP_SNIPER_GUN_1_DESC:0 "이 특화 고속 포탑은 민첩한 초계함에 대항하기 위해 설계되었습니다. 장거리에서도 높은 정밀도를 보장합니다만, 튼튼한 함선이라면 충분히 맞으면서 버틸 수 있습니다."
