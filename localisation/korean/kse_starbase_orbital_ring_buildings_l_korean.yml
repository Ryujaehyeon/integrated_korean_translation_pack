l_korean:
 sm_KSE_adv_assembly_yard:0 "KSE 로봇 보조 조립장"
 sm_KSE_adv_assembly_yard_plural:0 "KSE 로봇 보조 조립장"
 sm_KSE_adv_assembly_yard_desc:0 "로봇이 도크 작업자를 보조하여 생산 역량을 추가하고, 함선 생산 속도를 높이며 비용을 낮춥니다."
 sm_KSE_drydock:0 "KSE 완전 자동 드라이독"
 sm_KSE_drydock_plural:0 "KSE 완전 자동 드라이독"
 sm_KSE_drydock_desc:0 "더 이상 인간 도크 작업자가 필요하지 않습니다. 로봇은 생산 역량, 생산 속도, 비용 효율성을 더욱 향상합니다."
 sm_KSE_admin_office:0 "KSE 항성기지 행정 사무소"
 sm_KSE_admin_office_plural:0 "KSE 항성기지 행정 사무소"
 sm_KSE_admin_office_desc:0 "효율적인 제국 관리는 진보의 핵심입니다. 고도로 숙련된 AI 보조 사무원이 이곳에서 제국을 관리합니다."
 sm_ring_KSE_admin_office:0 "KSE 궤도 행정 지부"
 sm_ring_KSE_admin_office_plural:0 "KSE 궤도 행정 지부"
 sm_ring_KSE_admin_office_plural_desc:0 "효율적인 통신 관리는 행성 발전의 핵심입니다. 고도로 숙련된 AI 보조 사무원이 이곳에서 행성을 관리합니다."
 sm_KSE_army_logistics_office:0 "KSE 항성기지 지상군 군수 사무소"
 sm_KSE_army_logistics_office_plural:0 "KSE 항성기지 지상군 군수 사무소"
 sm_KSE_army_logistics_office_desc:0 "베테랑 장교들이 이곳에서 모든 지상군 관련 문제를 관리합니다. 그들의 지식과 현장 중심 접근 방식은 대중에게 크게 인정받고 있습니다."
 sm_ring_KSE_army_logistics_office:0 "KSE 궤도 지상군 군수 지부"
 sm_ring_KSE_army_logistics_office_plural:0 "KSE 궤도 지상군 군수 사무소"
 sm_ring_KSE_army_logistics_office_desc:0 "궤도 고리 지상군 군수 사무소는 행성 지상군 관리와 배치 속도를 크게 향상합니다."
