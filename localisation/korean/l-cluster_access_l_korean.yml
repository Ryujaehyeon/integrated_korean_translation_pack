l_korean:
 TECH_UNLOCK_L_GATE_ACCESS_DESC:0 "정책을 잠금 해제하여 §EL-Cluster§!를 닫거나 열 수 있는 능력을 부여합니다. 정책을 결정하려면 §H$NAME_Final_Egress$§!를 통제해야 합니다."
 TECH_UNLOCK_L_GATE_ACCESS_TITLE:0 "§H기능 잠금 해제:§! $tech_lcluster_access$"
 TECH_UNLOCK_L_GATE_TACTICAL_USE_DESC:0 "§E$lgates$§!를 사용할 수 있는 능력을 해제합니다, §EL-Cluster§!가 닫혀 있을 때."
 TECH_UNLOCK_L_GATE_TACTICAL_USE_TITLE:0 "§H기능 잠금 해제:§! $tech_tactical_lgate_use$"
 artifact_lgate_insight_cooldown_desc:0 "다시 수행하는 데 시간이 걸립니다."
 casus_belli_cb_lgate_port:0 "$lcluster_policy$"
 casus_belli_cb_lgate_danger:0 "$lgate$ $opinion_threat$"
 casus_belli_cb_lgate_danger_desc:0 "§EL-성단§!은 은하에 중대한 위협이 됩니다. §E$lgates$§!가 잠재적 대재앙을 촉발하는 데 사용되지 않도록 신속히 행동해야 합니다."
 decision_close_lcluster:0 "L-클러스터 닫기"
 decision_close_lcluster_desc:0 "$lcluster_policy_closed_desc$"
 decision_close_lcluster_effects:0 "§E$lgates$§!의 사용을 방지하며 비활성화합니다."
 decision_open_lcluster:0 "L-클러스터 열기"
 decision_open_lcluster_desc:0 "$lcluster_policy_open_desc$"
 decision_open_lcluster_effects:0 "§E$lgates$§!를 활성화하여 사용할 수 있게 됩니다."
 feature_lgate_access:0 "$tech_lcluster_access$"
 feature_lgate_access_desc:0 "우리 제국은 §H$NAME_Final_Egress$§! 항성계에 대한 접근을 통제할 수 있습니다."
 lcluster_policy:0 "L-클러스터 접근"
 lcluster_policy_cannot_set:0 "L-클러스터 정책을 설정할 수 없습니다."
 lcluster_policy_cannot_set_desc:0 "우리가 §H$NAME_Final_Egress$§! 항성계를 장악할 때까지, §EL-Cluster§!에 대한 접근을 제어할 수 없습니다."
 lcluster_policy_cannot_set_name:0 "$lcluster_policy_cannot_set$"
 lcluster_policy_closed:0 "L-클러스터 폐쇄"
 lcluster_policy_closed_desc:0 "§EL-클러스터§!는 닫힌 상태로 유지됩니다. 대량 멸종이 우리 민족과 아마도 은하를 위협할 때, 이곳이 피난처이자 마지막 후퇴의 장소로 기능하길 바랍니다..."
 lcluster_policy_open:0 "L-클러스터 개방"
 lcluster_policy_open_desc:0 "§EL-클러스터§!는 개방 상태를 유지합니다. 그것이 제공하는 비할 데 없는 전술적 기동성과 우리의 상품 운송의 용이성은 과소평가될 수 없으며, 우리 제국의 이익을 위해 활용될 것입니다."
 lgate_access:0 "$tech_lcluster_access$"
 lgate_access_desc:0 "이 제국은 §H$NAME_Final_Egress$§! 항성계에 대한 접근을 제어하고 있습니다. §EL-Cluster§!"
 needs_terminal_egress:0 "우리는 §H$NAME_Final_Egress$§!를 통제해야 §EL-Cluster§!에 대한 접근을 통제할 수 있습니다."
 not_in_lcluster:0 "§EL-클러스터§!에서 건설할 수 없습니다."
 opinion_wg_access_lcluster_long:0 "우리 영토에서 만연하다"
 policy_lcluster_policy:0 "$lcluster_policy$"
 policy_lcluster_policy_desc:0 "§EL-클러스터§!는 독특한 자원에 대한 접근뿐만 아니라 전체 게이트 네트워크에 대한 통제도 제공합니다. 이제 그것을 어떻게 사용할지는 우리에게 달려 있습니다."
 tech_lcluster_access:0 "L-클러스터 접근 제어"
 tech_lcluster_access_desc:0 "어느 정도 시간과 연구 끝에 우리는 §H$NAME_Final_Egress$§! 시스템에 위치한 마스터 제어판에 접근할 수 있는 한, 언제든지 $lgate$ 네트워크를 활성화하거나 비활성화할 수 있는 방법을 발견했습니다."
 tech_tactical_lgate_use:0 "전술 L-게이트 사용"
 tech_tactical_lgate_use_desc:0 "§E$lgates$§!는 현재 은하를 태우고 있는 위기로부터 우리를 안전하고 고립된 상태로 유지할 수 있습니다. 하지만 우리는 은하를 그 암울한 운명에 처하게 할 수 있을까요? 다가오는 폭풍에 맞서 굳건히 서지 않을 것인가요? 어쨌든 §E$lgates$§!의 제한적 사용에 대한 전술적 교리를 유지하는 것은 우리가 위협으로 간주하는 자들에게 타격을 가할 수 있게 해줄 것입니다."
 war_goal_wg_access_lcluster:0 "$decision_open_lcluster$"
 war_goal_wg_access_lcluster_desc:0 "§EL-클러스터§!를 개방하고 적대적인 문명의 경계를 열기 위해 전쟁을 시작하며 20년간 통행권을 획득합니다.\n전체 §EL-클러스터§!의 폐쇄는 은하의 균형에 위협과 큰 변화를 초래합니다."
 war_goal_wg_access_lcluster_long:0 "$decision_open_lcluster$ 및 L-게이트"
 war_goal_wg_access_lcluster_long_desc:0 "전쟁을 시작하여 §EL-게이트§!를 열고 적 문명의 국경을 개방하십시오. 50년간의 통행권을 획득하고 경쟁을 끝내십시오.\n전체 §EL-클러스터§!의 폐쇄는 위협이자 은하의 균형에 큰 변화를 의미합니다."
 war_goal_wg_access_lcluster_long_tooltip:0 "§Y[From.GetName]§!는 완전히 패배하였으며, 그들은 자만심을 버리고 §EL-Gates§!와 국경을 우리에게 개방하기로 합의하였습니다. 이는 §Y50§! 이내의 일입니다. 동시에 우리는 그들과의 적대 상태도 종료하였으나, 그들이 이 결과에 동의하지 않았고 언젠가 반격할 것임은 분명합니다.\n§Y[Root.GetName]§!는 §G+150§! £influence£를 얻었습니다.\n"
 war_goal_wg_access_lcluster_tooltip:0 "§Y[From.GetName]§!가 패배하였고, 그들은 그들의 오만을 내려놓고 §Y20§!년 이내에 L-게이트와 국경을 우리에게 개방하기로 합의하였습니다.\n§Y[Root.GetName]§!는 §G+100§! £influence£를 얻었습니다.\n"
