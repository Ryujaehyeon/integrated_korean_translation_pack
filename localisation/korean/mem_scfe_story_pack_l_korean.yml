 mem_scfe_d_exotic_gases_layers:0 "이국적인 가스 층"
 mem_scfe_d_exotic_gases_layers_desc:0 "이 행성에서는 수백만 년 동안 우주 고래가 죽어 £exotic_gases£와 $exotic_gases$의 층을 생성했습니다."
 mem_scfe_d_ancient_underground_city:0 "고대 지하 도시"
 mem_scfe_d_ancient_underground_city_desc:0 "이 거대한 도시는 한때 이 행성에 존재했던 문명에 의해 건설되었습니다. 놀랍게도, 여전히 온전하며 많은 인구를 수용할 수 있을 만큼 큽니다."
 mem_scfe_d_exotic_gases_layers_orbital:0 "$mem_scfe_d_exotic_gases_layers$"
 mem_scfe_d_exotic_gases_layers_orbital_desc:0 "$mem_scfe_d_exotic_gases_layers_desc$"
 mem_scfe_site_biggest_show_of_world:0 "세계 최대의 쇼"
 mem_scfe_site_biggest_show_of_world_desc:0 "우주로의 우리의 탐사는 예상치 못한 결실을 맺었습니다!\n우리의 무인 탐사선 중 하나가 고장 나자, 탐사 팀은 이를 구출하기 위해 거대 가스 행성을 공전하는 위성에 긴급 착륙시키기로 결정했습니다. 놀랍게도, 탐사선은 고대 문명의 잔존자들 사이에 착륙하게 되었습니다.\n시간이 이 사회의 기억을 지워버렸지만, 그 존재에 대한 웅변적인 증거를 남겼습니다: 아기자기한 마을, 질서 관리 노예가 있는 교외, 잘 갖춰진 사회적 구조, 그리고 대부분 보존된 고요한 자연 경관. 이 행성은 크기는 작지만, 번영하는 공동체에 필요한 모든 요소를 갖추고 있습니다. 그러나 우리의 스캔 결과, 생명체는 감지되지 않는 기묘한 정적이 드리워져 있습니다.\n이 유적을 더 탐험하는 데 추가적인 시간을 할애하는 것이 필수적입니다."
 mem_scfe_biggest_show.1.name:0 "자동화기"
 mem_scfe_biggest_show.1.desc:0 "개막 착륙 이후, 우리의 연구 팀은 폐허 속에 자리 잡은 작은 도시의 중심부를 탐구해 왔습니다. 이곳은 행성의 신경 중심부였던 것으로 보입니다. 우리의 초기 조사에서 두 가지 중요한 발견이 있었습니다.\n첫째, 이곳의 고립은 환상입니다. 행성은 인형처럼 보이는 수많은 존재들로 가득 차 있으며, 이들은 생명체를 섬뜩하게 모방하고 있습니다 - 아마도 이 세계의 건축가들일 것입니다. 다양한 복장을 한 이들은 여러 작업을 위해 설계된 것으로 보이며, 한때 번성했던 인구의 대체물로 추정됩니다. 현재 그들은 잠재 상태에 있으며, 활성화를 기다리는 조용한 군대입니다.\n둘째, 이 행성은 놀라울 정도로 잘 보존되어 있습니다. 대부분의 시설이 에너지 고갈로 중단되었음에도 불구하고, 핵심 유지 보수 시스템이 배경에서 윙윙거리며 자신의 역할을 충실히 수행하고 있습니다. 우리의 다음 목표는 분명합니다: 이 수수께끼를 풀기 위해 제어 허브를 찾아야 합니다."
 mem_scfe_biggest_show.2.name:0 "인형극"
 mem_scfe_biggest_show.2.desc:0 "인형에 대한 면밀한 조사에서, 우리의 연구원들은 perplexing anomaly를 발견했습니다. 초기 가설과는 달리, 약 30%의 인형이 어린이의 모습을 하고 있었고, 20%는 노인의 모습을 반영하고 있었습니다. 이는 힘든 작업에 적합하지 않은 형태를 고려할 때 이상한 일입니다.\n모든 주택은 이러한 인형들만 거주하고 있었으며, 전통적인 삶의 흔적은 전혀 없었습니다. 더욱 혼란스러운 것은 이들이 혈연 단위를 모방하도록 정교하게 배치되어 있었다는 점입니다. 또한, 이러한 침묵의 감시자들로 구성된 공장, 교육 기관, 문화 센터의 존재는 이 미스터리를 더욱 깊게 만듭니다. 누가 인형만을 위해 이렇게 정교한 모조품을 공학할 수 있을까요?\n우리는 이제 우리가 예상했던 것보다 더 큰 미스터리의 문턱에 서 있습니다."
 mem_scfe_biggest_show.3.name:0 "각성"
 mem_scfe_biggest_show.3.desc:0 "조사 중, 우리의 탐사 팀은 잠재적인 에너지 원인 에너지 노드를 발견했습니다. 이 노드는 행성의 제어 시스템에 전력을 공급할 수 있는 가능성을 지니고 있습니다. 심사숙고 끝에 노드에 에너지를 주입하기로 결정했습니다. 시스템에 전력이 공급되자마자 날카로운 소음이 공기를 가득 채웠습니다.\n이 행동이 동시에 인형들을 잠에서 깨운 것처럼 보입니다. 그들의 목소리는 아직 해독할 수 없지만, 인사하는 듯한 따뜻함을 담고 있었고, 이는 우리 팀이 아닌 알 수 없는 존재를 향한 것이었습니다. 흥미롭게도 모든 인형이 동일한 인물을 부르고 있는 것처럼 보이며, 그 인물은 분명히 우리 팀에는 없습니다.\n인형들과의 직접적인 소통은 여전히 어렵지만, 그들이 통일된 목적을 공유하고 있다는 것은 분명합니다. 그들의 집단적 노력의 본질을 밝혀내기 위해 추가 조사를 권장합니다."
 mem_scfe_biggest_show.4.name:0 "생명의 쇼"
 mem_scfe_biggest_show.4.desc:0 "마침내 제어소가 공개되었습니다. 이곳은 행성의 밀집한 구름 속에 교묘하게 숨겨져 있었습니다. 우리의 시스템 분석은 이 행성의 진정한 목적을 밝혀냈습니다.\n이 행성은 비범한 규모의 제작을 위한 무대였으며, 주연은 자신의 주연 역할을 인식하지 못한 살아있는 인물이었습니다. 행성의 인프라는 이들의 문명의 일상 생활을 정교하게 모방하여 이 장관을 연출했습니다. 미공개된 채로 우리는 세대를 아우르는 서사를 기록한 방대한 양의 녹음 자료를 발견했습니다. 이는 천 년에 걸쳐 펼쳐진 서사로, 오직 한 사람의 눈을 위해 만들어진 서사입니다.\n각 주인공은 외딴 마을에서 나와 평화로운 삶을 살았으며, 결국 이 복잡한 가장극에서 자신의 역할을 알지 못한 채 세상을 떠났습니다. 시대가 바뀌면서 쇼의 서사는 발전했습니다. 정치적 음모, 열정적인 사랑, 모험적인 시련으로 가득한 초기 드라마에서부터 일상 존재의 소박한 아름다움에 이르기까지. 삶의 단순한 기쁨과 고통은 모든 등장인물에게 예외 없이 즐거운 결말을 약속하는 서사 속에서 펼쳐졌습니다. 이제 이 천 년에 걸친 드라마의 동기를 밝혀낼 시간이 왔습니다."
 mem_scfe_biggest_show.5.name:0 "세계의 주인공"
 mem_scfe_biggest_show.5.desc:0 "우리 팀은 시스템 내의 감독 기록 보관소를 침입하여 한때 위대한 문명의 황혼을 드러냈습니다. 이 사회는 광대한 은하를 지배한 후 수천 년에 걸쳐 서서히 쇠퇴했습니다. 그들의 황금기가 저물면서 인구 과잉과 자원 고갈로 인해 광범위한 고통이 발생했습니다.\n대담한 조치로, 지도자들은 주의를 분산시키기 위한 계획을 세웠습니다 - 그들의 문명의 평화로운 시절을 반영한 웅장한 쇼로, 일상 생활의 음침한 현실을 가리기 위한 것이었습니다. 이 쇼는 풍요의 시대에 대한 향수를 불러일으키며 대중의 마음과 정신을 사로잡았고, 그 창조자들조차도 포함되었습니다.\n원래 전문 배우들이 출연하던 이 쇼는 인기를 끌면서 평범한 사람들을 주연으로 캐스팅하게 만들었습니다. 이는 열렬한 대중의 열망에 의해 유아가 주인공으로 선정되는 결과로 이어졌습니다. 이 쇼는 열정적인 리뷰를 받았고, 관객들은 주인공에게 사랑과 질투, 찬사를 쏟았습니다.\n갑자기 방송이 중단되었습니다. 문명이 마지막 이야기를 유지하기 위한 절박한 시도로 자원을 위해 행성을 서로 잡아먹기까지 했던 것으로 보입니다. 이 쇼는 그들의 유일한 유산으로 남아 있습니다.\n하나의 수수께끼가 남아 있습니다: 전시된 삶을 살았던 무고한 주인공은 어떻게 되었을까요?"
 mem_scfe_biggest_show.6.name:0 "나쁜 결말"
 mem_scfe_biggest_show.6.desc:0 "원시 숲의 깊은 곳에서, 우리의 탐색은 쇼의 주인공 발견으로 마무리되었습니다. 그의 희박한 연대기는 우리가 쇼의 클라이맥스 전환을 조합하는 데 도움을 주었습니다.\n결말은 극적이면서도 갑작스러웠습니다. 먼저, 인형들은 공연을 중단했으며, 이는 고향 행성이 추가 지시를 전송하지 못한 결과일 가능성이 높습니다. 그 다음, 사회적 건축물들은 에너지 생명선의 단절로 인해 무너졌습니다. 사랑하는 이들이 자동인형이고 자신의 삶이 각본에 짜인 환상이라는 현실에 직면한 주인공은 진실의 고통을 견뎌야 했습니다.\n그러나 그의 세계의 재에서, 탈출을 위한 새로운 결의가 그 안에서 타올랐습니다. 그의 유해를 둘러싼 것은 그의 결단력을 증명하는 증거들: 원시적인 장치들, 항공기, 그리고 로켓의 골격 프레임 - 각각은 그의 불굴의 정신을 증명합니다.\n안타깝게도, 그의 마지막 모험은 또한 그의 파멸이었습니다. 영원할 것 같았던 이야기는 주인공의 죽음으로 엄숙한 결말을 맞이했습니다.\n그의 외로운 서사를 되돌아보며, 우리는 우리의 이야기 방향에 대해 고민하게 됩니다."
 mem_scfe_biggest_show.6.a:0 "아쉬운 일이군요..."
 r_mem_scfe_protagonist_of_the_show:0 "쇼의 주인공"
 r_mem_scfe_protagonist_of_the_show_desc:0 "이 말라버린 고대 외계인은 무너진 고대 문명의 마지막 기쁨이자 생존자, 상징이었습니다... 지금은 그저 시체일 뿐입니다."
 mem_scfe_protagonist_of_the_show_relic_activated:0 "$r_mem_scfe_protagonist_of_the_show$"
 mem_scfe_first_music.1.name:0 "신호"
 mem_scfe_first_music.1.desc:0 "최근의 격렬한 태양풍이 §Y[From.Planet.GetName]§!의 대기 일부를 제거하여, 행성의 밀집한 대기층에 의해 제한되었던 신호가 다시 우주로 방출되었습니다. 태양의 교란 직후, 신호는 소음으로 심하게 왜곡되었습니다. 그러나 항성 조건이 정상으로 돌아오면서 이러한 신호의 선명도가 현저히 개선되었습니다. 우리의 과학자들이 그 출처를 정확히 파악했습니다: 이 신호는 행성의 표면에서 방출되고 있습니다. 고고학 팀이 현재 출처를 조사하기 위해 이동 중입니다."
 mem_scfe_site_the_first_music:0 "첫 번째 음악"
 mem_scfe_site_the_first_music_desc:0 "최근의 격렬한 태양풍이 §Y[From.Planet.GetName]§!의 대기 일부를 제거하여, 행성의 밀집한 대기층에 의해 제한되었던 신호가 다시 우주로 방출되었습니다. 태양의 교란 직후, 신호는 잡음으로 심하게 왜곡되었습니다. 그러나 항성 조건이 정상으로 돌아오면서, 이러한 신호의 선명도가 현저히 개선되었습니다. 우리의 과학자들은 이 신호의 출처를 정확히 파악했습니다: 그것은 행성의 표면에서 방출되고 있습니다. 우리는 이를 연구해야 합니다."
 mem_scfe_first_music.2.name:0 "첫 번째 행성"
 mem_scfe_first_music.2.desc:0 "최신 고고학 팀의 보고서에 따르면, §Y[From.Planet.GetName]§!는 우리 태양이 태어나기 수십억 년 전에 형성된 깊은 고대의 세계입니다. 이 행성의 원시 기반암은 우리 은하의 나이와 맞먹으며, 불로장생의 지위를 나타냅니다. 게다가, 행성의 핵에서 서서히 감소하는 열은 오랜 역사를 시사합니다. 우리는 현재 존재하는 가장 오래된 세계의 마지막 시대를 관찰하고 있을 가능성이 있습니다."
 mem_scfe_first_music.3.name:0 "구형 물체"
 mem_scfe_first_music.3.desc:0 "고고학 팀이 지하 신호 전송에 관여하는 구형 장치를 발굴했습니다. 탐험가들이 가까이 다가가자 장치는 신호를 강화하며 밀집된 지질층을 통해 빛을 발산하며 그들을 더 가까이 오라고 유도하는 듯했습니다. 강력한 외피를 뚫고 들어가자, 그 출처가 드러났습니다: 현재 우리의 과학 지식으로는 외계의 금속 같은 물질로 이루어진 소형 구형 기계입니다. 발견된 후, 기계는 방출을 중단하고 침묵에 빠졌습니다. 그 내부 소프트웨어나 기계 구조를 해독하려는 시도는 그 불침투성 껍질에 의해 저지되었습니다. 그럼에도 불구하고 팀은 마지막 신호를 포착했습니다. 이제 제국의 지성들이 모일 시간입니다."
 mem_scfe_first_music.3.a:0 "제국의 지성들이 모일 시간입니다."
 mem_scfe_first_music.4.name:0 "§H기계의 신호 분석§!: 결과"
 mem_scfe_first_music.4.desc:0 "기계에서 발산되는 수수께끼 같은 신호는 복잡한 암호로 인코딩되어 있으며, 이를 해독할 수 있는 암호학자의 날카로운 눈에는 정교한 구조를 자랑합니다. 우리 제국의 가장 뛰어난 두뇌들은 끊임없이 노력해 왔으며, 낮과 밤이 하나로 합쳐져 수백 대의 기계의 계산 능력을 활용하여 메시지를 해독하는 데 힘쓰고 있습니다. 우리의 수석 연구원이 중요한 단서를 발견하여 돌파구를 마련했습니다.\n§H이 비밀번호는 음악입니다!§!\n실제로, 음계의 교향곡이 우주로 퍼져 나갔습니다. 이 코드는 소리의 음계, 악기의 음색, 파형으로 엮인 태피스트리로, 기존의 아름다움을 초월합니다. 우주 내 어떤 멜로디도 그 화려함에 필적할 수 없습니다.\n하지만 그 중요성은 단순한 미적 가치에 그치지 않습니다. 이 우주적 교향곡은 열역학의 불변 법칙을 거스르는 듯 보이며, 그 존재 속에서 엔트로피가 역전되는 것 같습니다. 마치 이 음악이 시간의 시작부터 울려 퍼져 생명의 본질을 담고 있는 것처럼 느껴집니다.\n이 멜로디 신호의 기원과 의도는 여전히 신비에 싸여 있습니다. 그럼에도 불구하고 이 발견은 우리에게 우주의 신비로운 비밀을 엿볼 수 있는 드문 기회를 제공합니다. 우리는 아직 이 초월적인 멜로디에 이름을 부여하지 않았지만, 그것을 명명할 특권이 우리를 기다리고 있습니다 - 우리 문명에 대한 집단적인 영예입니다."
 mem_scfe_first_music.4.a:0 "빛이 있으라, 빛이 존재하라."
 mem_scfe_Fiat_Lux:0 "음악 - Fiat Lux"
 mem_scfe_Fiat_Lux_desc:0 "'§YFiat Lux§!'의 발견은 우리 사회와 문화에 깊은 인상을 남겼으며, 제국의 가장 호화로운 행성부터 가난이 가득한 행성까지, 모든 연령과 배경의 시민들이 이 음악을 즐기고 있습니다. 어쩌면 이것이 음악의 진정한 힘일지도 모릅니다."
 r_mem_scfe_music_of_the_universe:0 "우주의 악보"
 r_mem_scfe_music_of_the_universe_desc:0 "이것은 암호화된 신호에서 얻은 음악 작품입니다. 이 음악은 우주에 생명을 불어넣는 힘을 가지고 있으며 현재 기술로는 설명할 수 없습니다. 그러나 미래에 이를 설명할 수 있다면, 우리는 우주의 비밀을 이해하는 데 훨씬 더 가까워질 것입니다."
 mem_scfe_music_of_the_universe_modifier:0 "우주의 악보"
 mem_scfe_music_of_the_universe_modifier_desc:0 "이 악보는 우주에서 첫 번째여야 합니다..."
 SCFE_SIGNAL_ANALYSIS_OF_MACHINE_PROJECT:0 "기계 신호 분석"
 SCFE_SIGNAL_ANALYSIS_OF_MACHINE_PROJECT_DESC:0 "기계를 기록한 마지막 신호인 §Y[Root.GetName]§!를 분석해야 합니다. 시간이 오래 걸리겠지만, 우리 과학자들이 제기한 많은 질문에 대한 답을 줄 것입니다."
 mem_scfe_site_tomb_of_dead_whale:0 "우주 고래의 무덤"
 mem_scfe_site_tomb_of_dead_whale_desc:0 "§Y[From.Planet.GetName]§!의 지각 구성은 정말 매혹적입니다. 고대 존재의 화석화된 잔해로 가득 찬 수많은 층이 고르게 배열되어 있어, 이 행성이 지속적인 생태적 번영과 대량 멸종의 주기를 경험했음을 나타냅니다.\n가장 최근의 대재앙은 2억 년 전으로 거슬러 올라갑니다. 이 행성의 현재 생물권이 기본적인 유전적 구성을 가진 원생 생물로 제한되어 있다는 점에서 갑작스러웠던 것으로 보입니다.\n이 행성은 분명히 '불행한' 거주 가능한 세계의 범주에 속합니다. 그러나 고대 화석의 크기라는 논란의 여지가 남아 있습니다. 규모 이론에 따르면, 이 생물들은 그 크기가 너무 커서 이 행성에서 생존하는 것이 생체역학적으로 불가능해 보입니다."
 mem_scfe_tomb_of_dead_whales.1.name:0 "무덤"
 mem_scfe_tomb_of_dead_whales.1.desc:0 "발견된 거대한 존재들은 우주를 항해하는 티얀키 고래로, 그들은 최종 안식처를 위해 집단적으로 인정된 목록에서 지정된 행성으로 모여드는 것으로 알려져 있습니다. §Y[From.Planet.GetName]§!는 불행히도 이러한 선택된 목적지 중 하나였습니다.\n작은 화석화된 존재들은 행성의 토착 주민으로, 티얀키의 독특한 죽음 의식의 불행한 희생자였습니다. 우리의 학자들은 고래가 하강할 때 발생한 파괴적인 충격파에 의해 행성의 원래 생명체가 멸종되었을 것이라고 추정하며, 이는 작은 화석의 희소성으로 입증됩니다.\n6억 년 전의 지층에서는 지능적 문명일 가능성이 있는 불분명한 잔존자들이 남아 있습니다. 그러나 탐사 팀의 발견은 결론적이지 않으며, 대부분의 데이터는 지나치게 단순하거나 과도하게 손상된 것으로 보입니다. 우리의 가설이 확인된다면, 티얀키의 매장 관습이 우주 전역에서 지능적 생명의 발전을 의도치 않게 저해했을 가능성이 있습니다.\n보다 심층적인 조사가 이러한 추측의 진실성을 밝혀낼 수 있을 것입니다."
 mem_scfe_tomb_of_dead_whales.2.name:0 "$primitive_plural$"
 mem_scfe_tomb_of_dead_whales.2.desc:0 "우리의 조사는 이 행성에 감정이 있는 종족이 존재한다는 것을 확인했습니다. 이들은 우주 고래의 장례식이 빈번하게 열리는 가운데서도 번성했습니다. 우리는 이 존재들을 인펠릭스(Infelix)라고 명명했습니다. 이들은 최소한 산업 수준의 기술과 문화를 보유하고 있으며, 놀라운 회복력을 보여주었습니다. 생존을 위해 그들은 정착지를 끊임없이 이동시키고 방어를 위해 폭발물을 사용했습니다.\n그들의 독창적인 창작물 중 하나는 대륙 간의 신속한 이동을 가능하게 하는 이동식 구조물인 §HWheeled Tower§!였습니다. 또 다른 발명품인 §HLegged Observatory§!는 티얀키 고래의 중력이 행성에 영향을 미치기 전에 접근을 감지할 수 있었습니다. 인펠릭스의 연료에 대한 우려는 거의 고갈되지 않는 기름 자원을 제공하는 티얀키 시체들에 의해 완화되었습니다.\n적응하고 생존하기 위한 그들의 용감한 노력에도 불구하고, 바퀴가 달린 탑의 잔존자들은 우리의 연구원들에게 슬픈 결론을 이끌어냈습니다: 인펠릭스의 끈질긴 노력은 결국 헛된 것이었습니다."
 mem_scfe_tomb_of_dead_whales.3.name:0 "화석"
 mem_scfe_tomb_of_dead_whales.3.desc:0 "우리의 중무장한 고고학 팀이 또 다른 중요한 발견을 하였습니다. 그들은 이전에 발굴된 유적에서 멀리 떨어진 장소에서 이 문명의 초기 단계의 흔적을 감지하였습니다.\n그들의 형성기에도 불구하고 이 문명은 고래의 유해를 활용하였으며, 이는 화석에 새겨진 의도적인 표식으로 입증됩니다. 이 초기 주민들은 후손들과는 달리 티얀키 시체를 적극적으로 이용하였으며, 그들은 필수 자재를 위해 고래의 사체에 전적으로 의존하였고, 심지어 그 시체를 피난처로 사용하기도 하였습니다.\n고래 유해에 적용된 도구의 정교함에는 지역별 차이가 있었지만, 공통점이 나타났습니다: 고래 뼈로 제작된 기호와 같은 예술적 표현이 대부분 지역에서 널리 퍼져 있었습니다.\n이 기호의 정확한 의미는 여전히 불분명하지만, 발굴 팀은 각 깊은 층을 파고들수록 기호의 복잡성이 증가하는 것에 흥미를 느끼고 있습니다. 이 패턴은 매혹적인 질문을 제기합니다: 그들이 더 깊은 곳으로 파고들 경우 무엇을 발견할 수 있을까요?"
 mem_scfe_tomb_of_dead_whales.4.name:0 "피난처"
 mem_scfe_tomb_of_dead_whales.4.desc:0 "우리 고고학 팀은 놀라운 발견을 하였습니다: 문명의 독특한 건축 양식과 공명하는 구조물이지만 우주 시대에 부합하는 기술적 정교함을 지니고 있어, 위의 원시적인 유적들과 극명한 대조를 이루고 있습니다. 이러한 발전을 이룬 문명이 거대한 고래들이 하늘에서 내려옴으로써 원시 상태로 추락했다는 것은 믿기 어려운 일입니다.\n이 발견은 티얀키 고래의 장례식이 행성의 반복적인 멸종의 촉매라는 기존 이론을 반박합니다. 팀의 연구 결과에 따르면, 떨어지는 고래의 영향은 실제로 파괴적이지만, 전체 문명을 obliterate할 만큼 재앙적이지는 않습니다.\n수만 마리의 티얀키 고래가 동시에 행성에 내려오는 가상의 시나리오는 이론적으로 그러한 멸종을 초래할 수 있지만, 그러한 사건은 극히 불가능합니다. 이는 최근 발견에 대해 우리 연구원들을 혼란스럽게 하고 있습니다.\n이러한 미스터리를 풀기 위해서는 보다 광범위한 발굴이 필수적입니다."
 mem_scfe_tomb_of_dead_whales.5.name:0 "멸종"
 mem_scfe_tomb_of_dead_whales.5.desc:0 "우리의 발굴 팀이 깊이 파고들수록, 그들은 우주 여행의 문턱에 서 있던 한때 호화롭고 번영했던 행성 제국의 잔존자를 더 많이 발견했습니다.\n이 고대 사회는 우주 시대의 기술을 사용하며 고래의 유해를 자원으로 활용하여 번창했습니다. 그들은 자신들이 직면한 도전 과제를 잘 알고 있었습니다. 그들의 전성기에는 고래의 하강이 더 이상 두려움의 원인이 아니라 우주 탐사의 여정에서 단순한 장애물에 불과했습니다.\n그러나 우리의 과학자들이 처음 제기한 이론과 일치하는 비극적인 전개 속에서, 유적에서 회수된 기록들은 고래가 실제로 이 문명의 파멸을 예고했음을 나타냅니다.\n모든 고래 시체가 동시에 폭발하는 대재앙이 발생했습니다. 유적에 대한 추가 조사는 이 문명이 어떻게 타락했는지에 대한 전체 이야기를 밝혀낼 수 있습니다."
 mem_scfe_tomb_of_dead_whales.6.name:0 "카르마"
 mem_scfe_tomb_of_dead_whales.6.desc:0 "티얀키 우주 고래는 본래 몸속의 고유한 방어막 덕분에 사후에 연소되지 않습니다. 방대한 양의 유기체 물질은 일반적으로 비활성 상태로 남아 있으며, 표면 아래에서 조용히 분해되거나 다른 물질로 변환됩니다. 드물게 표면에서 폭발할 경우, 그로 인해 발생하는 독성 가스는 미미하고 일시적이며, 빠르게 상층 대기로 퍼져 피해를 주지 않습니다.\n따라서 정부의 제안은 하강하는 고래를 미리 제거하기 위해 행성 간 핵미사일을 사용하는 것이었으나, 상당한 반대에 부딪혔습니다. 그러나 첫 번째 고래가 하강 중 성공적으로 중화된 이후 감정이 긍정적으로 바뀌었습니다.\n비극적으로도 고려되지 않았던 것은 고래들의 깊은 영적 연결로, 폭력에 대해 집단적으로 통합된 분노로 반응했습니다. 수많은 티얀키 고래가 복수의 충돌로 행성에 집결하였고, 이는 제국의 기록에서 생생하게 묘사된 위기였습니다.\n방어를 위해 핵무기 창고가 배치되었으나, 이는 상황을 더욱 악화시켰습니다. 행성 표면 근처에서 핵 폭발에 휘말린 고래들은 아래에 묻힌 다른 고래 시체들 사이에서 재앙적인 연쇄 폭발을 촉발했습니다.\n이후 발생한 대규모 폭발은 대재앙이었으며, 공기를 치명적인 가스로 포화시켰고, 제국은 이에 맞설 기회가 없었지만 행성 자체는 장수했습니다.\n인구의 소수 집단이 기적적으로 생존했습니다. 만약 그 이후로 이 행성을 그들의 멸망을 위한 장소로 선택한 장수하는 우주 고래들의 복수심이 없었다면, 그들은 다시 번영할 수 있었을 것입니다. 바퀴가 달린 탑의 건설과 고래 시체를 피난처로 활용하는 것은 생존자들이 목표로 삼은 고래의 하강을 피하기 위한 마지막 절박한 전략이었습니다.\n나머지는, 전해지는 바와 같이, 역사입니다."
 mem_scfe_tomb_of_dead_whales.6.a:0 "그들의 이야기는 단순한 운 이상의 것입니다."
 mem_scfe_tomb_of_dead_whales.6.b:0 "이제 우리는 그 고래를 사냥할 이유가 생겼습니다."
 mem_scfe_tomb_of_dead_whales.6.c:0 "남아 있는 가스의 매장량이 많습니다."
 mem_scfe_tomb_of_dead_whales.6.d:0 "비극적인 이야기."
 mem_scfe_whale_fossil:0 "고래 화석"
 mem_scfe_whale_fossil_desc:0 "티얀키 우주 고래들이 한때 죽은 행성으로 사용했던 행성입니다. 지층에 많은 고래 화석이 있어 광업 산업을 발전시키기 어렵습니다."
 mem_scfe_site_whale_lesson:0 "고래의 교훈 죽은 행성"
 mem_scfe_whale_hunt:0 "고래 사냥"
 mem_scfe_site_soul_of_the_art:0 "예술의 영혼"
 mem_scfe_site_soul_of_the_art_desc:0 "고대 문명이 남긴 전투함의 잔해로 보이는 다채로운 패턴이 장식된 수킬로미터에 달하는 고대의 죽은 행성이 발견되었습니다. 이 행성을 공전하는 수많은 잔해가 있으며, 이는 고대 문명의 전투함의 흔적일 가능성이 높습니다. 게다가, 이 행성에서 지속적인 신호가 발생하고 있어 우리 팀의 탐사에 대한 큰 관심을 불러일으키고 있습니다."
 mem_scfe_soul_of_the_art.1.name:0 "함대 잔해"
 mem_scfe_soul_of_the_art.1.desc:0 "잔해 분석 결과, 이 행성의 궤도에서 두 개의 독특한 설계를 가진 함대 간의 충돌이 있었던 것으로 보입니다. 대부분의 파편은 우리가 §HPainted Fleet§!이라고 부르는 함대에 귀속되며, 이 함대는 복잡하고 다채로운 패턴과 단순한 구조를 가진 선박들로 구성되어 있어 빠른 대량 생산을 나타냅니다. 특히, 이 선박들은 승무원을 위한 필수 편의 시설, 예를 들어 식사 시설과 위생 시설이 부족합니다. 반면, §HSacred Fleet§!는 엄숙한 외관을 가지고 있지만 내부에는 복잡한 상징적 장식이 있으며, Zro의 잔존자도 포함되어 있습니다.\n비정상적으로 큰 공간의 존재는 발견된 장식 유물로 미루어 보아 종교적 기능을 수행했을 가능성을 시사합니다. 안타깝게도 §HSacred Fleet§!에 대한 데이터는 부족하여 추가적인 설명에 어려움이 있습니다. 따라서 이 행성에 정찰 팀을 파견하여 종합적인 조사를 수행하는 것이 권장됩니다."
 mem_scfe_soul_of_the_art.2.name:0 "다채로운 유적"
 mem_scfe_soul_of_the_art.2.desc:0 "우리 탐사 팀은 전쟁이나 파괴적인 사건의 흔적이 전혀 없는 생동감 넘치는 색상의 행성에서 거의 손상되지 않은 잔존자의 문명을 발견했습니다. 지형에 나타난 혼란스러운 붓질은 의도적인 패턴을 암시하기에는 너무 불규칙합니다. 일부 건축물은 deteriorated 되었지만, 그들의 붕괴는 공격적인 파괴가 아니라 오랜 시간 동안의 자연 요소와 지각 변동에 의한 것임이 확인되었습니다.\n행성 표면 곳곳에는 §HPainted Fleet§! 선박의 잔해가 흩어져 있습니다. 우리의 분석에 따르면, 대다수는 전투 피해가 아닌 갑작스러운 내부 전기 고장으로 끝났습니다. 현재 지능적 생명체의 증거는 없으며, 오직 로봇 잔해의 침묵하는 증언만이 남아 있습니다. 그들의 한때 생생했던 외관은 이제 색이 바래고 벗겨져 다채로운 잔해와 난파선 사이에 흩어져 있습니다."
 mem_scfe_soul_of_the_art.3.name:0 "채색된 유적"
 mem_scfe_soul_of_the_art.3.desc:0 "구조물 안에서, 우리 팀은 행성의 표면을 반영하는 다양한 색으로 칠해진 로봇들을 발견했습니다. 시간의 파괴에 노출된 동료들과는 달리, 이 로봇들은 최소한의 환경 피해로 보존되어 있습니다.\n이 로봇들은 혼란스러운 예술적 시도 중에 작동을 중단한 것으로 보이며, 벽을 무질서하게 칠하거나 정과 망치를 사용해 벽에 이미지와 수수께끼 같은 기호를 새겼습니다. 그들의 회로는 수리할 수 없을 정도로 악화되었습니다.\n흥미롭게도, 바위와 건물 외벽에 그려진 겉보기에 무질서한 패턴은 이제 방대한 정보 저장소로 이해되고 있습니다. 이 발견은 우리가 이 문명의 멸망 이야기를 해독하고 재구성할 수 있는 잠재력을 지니고 있습니다."
 mem_scfe_soul_of_the_art.4.name:0 "불화"
 mem_scfe_soul_of_the_art.4.desc:0 "우리 언어학자들은 이 행성의 끈질긴 신호를 일종의 음악으로 해독했습니다. 그러나 가사는 일관된 의미가 결여되어 있으며, 주로 중복된 표현과 불협화음의 음조 변형으로 구성되어 있어 불쾌한 청각 경험을 초래합니다.\n가사의 내용은 영혼의 개념을 경외하고 질문하며, 대체 차원에서 온 불가사의한 존재들에 대한 두려움을 표현합니다. 이러한 주제 분석을 통해 우리는 행성 표면을 장식하는 채색된 비문을 해석할 수 있었습니다. 이 비문은 시나 다른 문학 형식과 유사하게 형이상학적 문제를 탐구하며, 삶의 본질, 영혼의 덧없음, 그리고 파괴로 인해 촉발된 두려움에 대해 숙고합니다. 그러나 이들은 리드미컬한 구조가 결여되어 있으며 문학적 정교함이 부족합니다."
 mem_scfe_soul_of_the_art.5.name:0 "연구 시설"
 mem_scfe_soul_of_the_art.5.desc:0 "표면 아래에는 거대한 연구 복합체가 있습니다. 광범위한 회로 손상에도 불구하고 일부 기본 장치들은 시간의 시험을 견뎌냈습니다. 우리의 연구원들이 분석한 바에 따르면 이 문명은 집단 의식을 공유하는 기계들로 구성되어 있었던 것으로 보입니다.\n그들의 데이터베이스의 잔존자를 파고들면서 우리는 '슈라우드'라는 알려지지 않은 영역에 대한 지식과 이 차원에서 에너지를 harness하여 행성 파괴를 일으킬 수 있는 거대한 무기를 발견했습니다. 우리는 §HSacred Fleet§! 선박에 대한 기록을 발견했으며, 이는 기계 문명의 방어 전략과 전투에서의 조우, 그리고 Zro에 대한 연구를 자세히 설명하고 있습니다.\n놀랍게도, 대다수의 기록된 물자는 예술에 초점을 맞추고 있습니다. 이 시설은 다양한 문명에서 온 문화 유물 - 그림, 문학 작품, 음악 작곡 등과 이러한 예술적 표현에 전념한 연구들로 가득 차 있습니다."
 mem_scfe_soul_of_the_art.6.name:0 "끝"
 mem_scfe_soul_of_the_art.6.desc: "From the unearthed data, the fate of this planet has been pieced together. It fell victim to the Shroud weapon and was ultimately obliterated.\nPrior to this catastrophe, the Gestalt Consciousness discerned that the weapon's destructive capacity was ineffective against organic beings. It hypothesized that through an appreciation of art - a pursuit uniquely cherished by organics - the machine entities that formed the collective consciousness could cultivate souls, thereby rendering themselves impervious to the Shroud's assault.\nIn pursuit of this immunity, the civilization embarked on a fervent acquisition and examination of artistic knowledge. They endeavored to mimic organic creativity, attempting to sing, write, and even decorate the planet's surface, their ships, and themselves. Despite these efforts, the Gestalt Consciousness's creations lacked the essence of true artistry, and it was ultimately vanquished by the weapon it sought to evade."
 mem_scfe_soul_of_the_art.6.a:0 "헛된 시도였습니다..."
 mem_scfe_soul_of_the_art.6.a.tooltip:0 "연구 옵션 획득:\n§Y$tech_pk_godray$§! \n기술 진행 획득: \n§Y$tech_pk_godray$§! §G+50%§! \n§Y$mem_scfe_d_society_20$§!을(를) §Y[From.Planet.GetName]§!에 추가합니다.\n"
 mem_scfe_soul_of_the_art.6.a.tooltip_alt:0 "§Y$mem_scfe_d_society_20$§!을 §Y[From.Planet.GetName]§!에 추가합니다.\n"
 mem_scfe_site_king_of_underground_city:0 "지하 도시의 왕"
 mem_scfe_site_king_of_underground_city_desc:0 "초기 관측에 따르면, §Y[From.Planet.GetName]§!는 생명체가 없는 전형적인 사막 행성으로 보입니다. 그러나 우리의 궤도 스캐너는 행성 표면 아래, 특히 지하 동굴에서 발생하는 미세한 지하 신호와 음향 방출을 감지했습니다. 추가 조사를 위해서는 전통적인 지상 탐사가 필요합니다."
 mem_scfe_king_of_underground_city.1.name:0 "지하 도시"
 mem_scfe_king_of_underground_city.1.desc:0 "§Y[From.Planet.GetName]§!에 발굴 및 운송 선박이 파견되었습니다. 팀은 규모가 이전 추정치를 훨씬 초과하는 지하 대도시를 발굴했습니다. 도시의 건축가들은 감각이 있었지만, 고급 기술을 갖추고 있지는 않았습니다. 그들은 놀랍도록 복잡한 언어 체계를 가지고 있었습니다. 그들은 상당한 지하 구조물을 건설하고 유지했으며, 이는 그들의 기술적 능력과는 상반되는 공학적 업적입니다. 그들은 표면의 극심한 사막 더위에서 피신하고 지하의 지하수층을 이용하고자 했던 것으로 추측됩니다.\n문명의 붕괴 원인을 파악하기 위해 추가 분석이 필수적이며, 특히 남겨진 잔존자의 풍부함을 고려할 때 더욱 그렇습니다."
 mem_scfe_king_of_underground_city.2.name:0 "끝없는 기록"
 mem_scfe_king_of_underground_city.2.desc:0 "이 도시는 문서로 가득 차 있으며, 이는 그 주민들이 기록 보관을 매우 중요하게 여겼음을 시사합니다. 비교적 원시적인 방법을 사용했음에도 불구하고, 그들은 가장 작은 공동체 단위 내에서도 세심하게 체계적인 기록 보관소를 유지했습니다.\n이러한 문서화 경향은 우연히도 유익하면서도 부담이 됩니다; 이는 심층 연구 및 분석을 위한 특별한 기회를 제공하지만, 동시에 우리의 탐사 팀에 상당한 작업 부담을 부과합니다.\n이 기록의 대부분은 그들의 고대 역사를 연대기적으로 기록하고 있으며, 도시 거주자들의 사회 구조와 생물학적 특성에 대한 통찰을 제공합니다. 그들은 가장 지혜로운 구성원들을 군주로 임명한 것으로 보이며, 이들의 권위는 사망할 때까지 유지되었습니다. 역사적 기록에 따르면, 이러한 통치 아래에서 그들은 번영하였고, 근면하고 응집력 있는 본성을 최대한 활용했습니다."
 mem_scfe_king_of_underground_city.3.name:0 "핵심 아카이브"
 mem_scfe_king_of_underground_city.3.desc:0 "중앙 저장소는 통치자의 거주지와 그들의 몰락 이전의 최종 행정 문서를 포함한 가장 중요한 데이터를 위해 지정되었으며, 회수된 데이터의 해독 및 분석 후에 발굴되었습니다.\n더욱이, 그들의 언어가 거의 완전히 해독됨에 따라 우리의 연구원들은 놀라운 발견을 하게 되었습니다: §Y[From.Planet.GetName]§!는 한때 극지 행성이었습니다. 지하 도시는 차가운 표면으로부터의 피난처로서 지열 분출구 위에 건설되었습니다.\n행성의 이상 현상으로 촉발된 재앙적인 기후 변화는 점차 온도 상승을 유도하였고, 이는 전체 행성의 사막화로 이어졌으며, 이 사건은 아마도 주민들의 멸종을 초래했을 것입니다.\n중앙 기록 보관소의 문서에 따르면 도시의 주민들은 그들의 종이 사소한 기후 변화에도 극도로 취약하다는 것을 인식하고 있었습니다. 또한 그들은 다가오는 기후 재앙에 맞서기 위해 역사상 가장 존경받는 통치자가 제안한 전략을 따르고 자원을 모으도록 촉구받았음을 드러냅니다."
 mem_scfe_king_of_underground_city.4.name:0 "왕좌"
 mem_scfe_king_of_underground_city.4.desc:0 "우리 연구팀이 궁전으로 접근함에 따라 발굴된 역사 기록은 점점 더 음산해집니다. 그 중 하나의 문서는 지열 배출구를 비활성화하는 동안 발생한 사고의 희생자 목록을 자세히 설명하고 있습니다. 또 다른 문서는 한 지역의 인구가 대량으로 감소함에 따라 두 지역의 통합을 의무화하는 법령을 기록하고 있습니다.\n여행의 끝에서, 한 왕좌가 발견되었습니다.\n이 왕좌는 사실 테라포밍 장치였으며, 이 문명이 우주 여행을 결코 이루지 못했다는 사실로 인해 더욱 놀라운 발견이었습니다. 그 디자인은 고급스럽고 아방가르드하여 우리의 기술적 능력과 비교해도 여전히 가치를 유지합니다.\n연구원들은 왕의 개인 녹음 장치를 활성화하는 데 성공했으며, 그 장치는 그의 마지막 후회로 가득 찬 메시지를 감동적으로 재생했습니다. 왕은 그들의 곤경에 대한 훌륭한 해결책을 고안했지만, 그때까지 그의 거의 모든 신하들이 사망한 상태였습니다. 지도자와 혁신을 상징하는 이 왕좌는 잃어버린 민족이 그들의 세계를 구하기 위한 마지막 노력의 증거로 남아 있습니다."
 mem_scfe_king_of_underground_city.4.a:0 "장치를 활성화합니다."
 mem_scfe_king_of_underground_city.4.b:0 "장치를 회수합니다."
 mem_scfe_king_of_underground_city.4.c:0 "이 고대 왕에게 경의를 표합니다."
 mem_scfe_ancient_terraforming_technology:0 "고대 테라포밍 기술"
 mem_scfe_tomb_of_the_king:0 "왕의 무덤"
 mem_scfe_site_when_the_world_sings:0 "세상이 노래할 때"
 mem_scfe_site_when_the_world_sings_desc:0 "우리 탐사대의 보고에 따르면, 음악과 유사한 신비로운 소리가 §Y[From.Planet.GetName]§!의 모든 구석에서 울려 퍼지고 있습니다. 이 청각 현상은 확실히 음악이라고 할 수는 없지만, 편안함을 주며 이를 경험한 이들에게는 매우 즐거운 것으로 평가받고 있습니다.\n이 조화로운 현상의 본질과 기원을 이해하기 위해 보다 자세한 조사가 필요합니다."
 mem_scfe_when_the_world_sings.1.name:0 "세상이 노래할 때"
 mem_scfe_when_the_world_sings.1.desc:0 "§Y[From.Planet.GetName]§!에 대한 특이한 점이 드러났습니다. 궤도 관측에서는 어떤 물리적 이상도 감지되지 않았지만, 뚜렷한 간격과 음조로 특징지어진 끈질긴 소리가 감지되었으며, 행성 전체에서 들립니다.\n이 행성은 멜로디가 가득한 소리로 가득 차 있는 것처럼 보이며, 적어도 음악을 연상시키는 청각적 시퀀스가 존재합니다. 이 소리는 편안함을 불러일으키며, 청취자들에 의해 매우 만족스럽다고 묘사됩니다.\n이 매혹적인 소리의 신비를 풀기 위해 추가적인 조사 노력이 필요합니다."
 mem_scfe_when_the_world_sings.2.name:0 "음악의 원천"
 mem_scfe_when_the_world_sings.2.desc:0 "음악의 출처는 행성 전역에 퍼져 있는 유적지로 추적되었습니다. 초기 가정과는 달리, 이 구조물들은 그들의 창조자를 보호하는 것이 아니라 생명체 집단이 거주하고 있습니다. 이 유기체들은 성대와 유사한 기관 구조를 통해 소리를 생성하여, 행성의 교향곡이 노래하는 무척추동물의 합창으로 연주됩니다!\n이 발견은 매혹적이면서도 예상치 못한 것으로, 새로운 질문의 연쇄를 촉발합니다: 이 유적의 설계자는 어떻게 되었는가? 이 음향을 내는 존재들은 그들의 설계의 산물인가? 그리고 이 멜로디는 어떤 목적을 가지고 있는가?\n이 질문들에 답하기 위해서는 추가적인 고고학적 노력이 필요합니다."
 mem_scfe_when_the_world_sings.3.name:0 "행성 규모 연구 프로젝트"
 mem_scfe_when_the_world_sings.3.desc:0 "발굴된 단서들은 §Y[From.Planet.GetName]§!가 야심찬 행성 연구 이니셔티브를 위한 거점 역할을 했음을 시사합니다. 다양한 유적에서 수집한 데이터 분석은 유적 건설자들의 목표를 밝히며, 그들의 고급 유전자 조작 및 뇌 과학 능력을 드러냅니다. 이 유적들은 한때 이 복잡한 연구 분야에 전념했던 중심지였던 것으로 보입니다.\n우리가 해독한 정보의 조각들은 그들의 과학적 노력들이 상승과 초월이라는 높은 목표를 향해 나아갔음을 나타냅니다. 그들의 작업에서 반복적으로 등장하는 주제는 '피어남'이라는 개념으로, 이는 그들의 학문적 추구를 매료시켰습니다. 현재 유적과 행성 자체의 상태는 그들이 연구의 결실을 실현했는지에 대한 의문을 남깁니다.\n이 '피어남'의 수수께끼는 우리의 지속적인 조사에서 초점이 될 것입니다."
 mem_scfe_when_the_world_sings.4.name:0 "꽃피는 프로젝트"
 mem_scfe_when_the_world_sings.4.desc:0 "연구 전초 기지에서 회수한 정보에 대한 후속 검토는 중요한 발견을 가져왔습니다: 신비로운 블루밍 프로젝트입니다. 유적의 설계자들은 그들의 진화 여정의 정점으로 구상한 인공 게슈탈트 의식의 창조에 몰두하고 있었습니다. 그들은 이러한 통합된 집단 지성이 사회적 갈등을 근절하고 전례 없는 계몽의 시대를 열 것이라고 가정했습니다. 그들의 방법론은 유전자 치료를 통해 신경 연결을 배양하는 데 의존했으며, 이러한 연결은 그들의 인구 사이에서 공유될 예정이었습니다.\n그들의 이론적 작업은 결실을 맺은 것 같습니다: 블루밍 프로젝트는 유전자 치료를 퍼뜨리기 위해 설계된 레트로바이러스로 그들의 대기를 침투시킴으로써 실현되었습니다. 비록 그 바이러스는 이후 멸종되었지만, 다른 감각 생명체의 부재는 그것이 그들의 전체 종에 걸쳐 확산되었음을 시사합니다. 이론에 따르면 유적 내에 거주하는 멜로디 유기체는 실제로 유적 건설자의 변형된 잔존자일 수 있습니다.\n이 가설을 검증하기 위해서는 추가적인 상세 연구가 필요합니다."
 mem_scfe_when_the_world_sings.5.name:0 "게슈탈트 의식"
 mem_scfe_when_the_world_sings.5.desc:0 "우리의 확장된 조사 결과, 발성하는 존재들이 잔해 건축자들이 부분적으로나마 게슈탈트 의식을 형성했다는 것을 확인했습니다. '노래'는 사실 그들의 상호 연결된 신경 상태의 집단적 발성 표현으로, 완벽하게 동기화되어 있으며 군체 의식을 나타냅니다. 우리의 관찰에 따르면, 블루밍 프로젝트가 목표를 달성한 것이 분명합니다.\n그러나 그들의 신경 반응에 대한 더 깊은 검토는 우려스러운 현실을 시사합니다. 이 집단 의식은 단일하고 압도적인 감각인 고통을 표현하고 있습니다. 원형 레트로바이러스나 원래 종이 없는 상황에서는 이 부정적인 결과가 프로젝트 시행 중에 발생했는지 아니면 그 이후에 발생했는지 판단하기 어렵습니다. 그럼에도 불구하고 이 생물들이 내는 소리는 멜로디가 있는 표현이 아닙니다:\n§R하나로 통합된 조화로운 비명입니다.§!"
 mem_scfe_when_the_world_sings.5.a:0 "이미 일어난 일은 일어난 일입니다. 그것에 대해 계속 생각해봐야 소용이 없습니다."
 mem_scfe_when_the_world_sings.5.b:0 "우리는 여기서 무엇을 배울 수 있을까요?"
 mem_scfe_when_the_world_sings.5.c:0 "우리는 그들을 애도하고 기릴 것입니다."
 mem_scfe_singing_planet:0 "휘파람 세계"
 mem_scfe_singing_planet_desc:0 "이 세계는 조화로운 멜로디에 매료되어 있습니다. 일부는 이 음악을 우울하거나 불안하다고 느끼지만, 끝없이 이어지는 멜로디에 매혹되지 않을 수는 없습니다."
 mem_scfe_screaming_planet:0 "울부짖는 세계"
 mem_scfe_screaming_planet_desc:0 "이 행성에서 일어난 일은 우리 모두에게 교훈이 되어야 합니다. 한때 유망한 종이었던 그 유기체들은 이제 끝없는 고통 속에서 하나의 통일된 비명을 내지르며 살아가고 있습니다."
 machine_defense_plural:0 "드론 그리드"
 mem_scfe_relic_activation_cooldown:0 "특별 $relic_activation_cooldown$"
 mem_scfe_special_relic_cooldown_info:0 "특별 유물은 일반 유물과 독립적으로 활성화할 수 있습니다."
 mem_scfe_requires_relic_no_cooldown:0 "$TRIGGER_FAIL$§RC다른 유물은 §Y$mem_scfe_relic_activation_cooldown$§!이 활성화되어 있는 동안 활성화할 수 없습니다.§!"
