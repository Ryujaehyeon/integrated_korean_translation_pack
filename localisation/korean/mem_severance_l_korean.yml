l_korean:
 mem_severance_dig_site:0 "바람과 함께 사라지다"
 mem_severance_dig_site_desc:0 "은하의 나머지 부분과 격리된 [From.Planet.GetName]는 분명 한때 고급 문명의 고향이었습니다. \n\n유적은 여전히 표면에 흩어져 있지만, 궤도에서 고급 형태의 생명체는 감지되지 않습니다. 그들은 모두 어디로 갔을까요?"
 mem_severance.1.name:0 "볼나르 식민지"
 mem_severance.1.desc:0 "우리의 고고학 탐사대가 §Y[From.Planet.GetName]§!에서 첫 번째 가시적인 결과를 도출했습니다. \n\n이 행성에 이전에 살았던 종은 스스로를 §SVolnars§!라고 불렀으며, 약 500년 전 이 행성에서 사라진 것으로 추정됩니다. 또한 Volnars가 [From.Planet.GetName]에서 진화하지 않았고, 다른 세계에서 개척민으로 도착했다는 것이 확실히 확인되었습니다. 특히 이상한 점은 그들이 그렇게 하기 위해 하이퍼드라이브 기술을 보유하고 있지 않았다는 것입니다. \n\n그들이 어떤 종류의 슬리퍼 또는 세대 우주선 기술을 사용했는지, 아니면 다른 더 고급 외계 문화에 의해 운송되었는지는 여전히 불확실합니다."
 mem_severance.2.name:0 "대절단"
 mem_severance.2.desc:0 "§Y[Leader.GetName]§!가 §Y[From.Planet.GetName]§!에 대한 주요 발견을 보고합니다. [Leader.GetSheHeCap]는 볼나르 식민지 붕괴 직전 열린 대규모 과학 및 정치 회의의 로그를 복구했습니다. 이 회의는 \"§SSeverance§!\"라는 사건을 논의하기 위해 소집되었습니다. \n\n볼나르는 초공간 항법 기술을 결코 달성하지 못했지만, 대신 그들의 고향 시스템에서 웜홀을 발견했습니다. 이 웜홀은 그들을 [From.Planet.Solar_System.GetName]와 연결시켰고, 그곳에서 식민지 개척에 적합한 원시 세계를 발견했습니다. 수년 동안, 고향 행성의 다양한 국가와 기업들이 이 행성의 일부를 자신들의 식민지로 주장해왔습니다. \n\n하지만 웜홀이 갑자기 붕괴되면서 모든 것이 갑작스럽게 끝났고, 그들은 이를 세버런스라고 불렀습니다. 개척민들은 큰 불확실성에 직면했습니다. 행성은 대부분 자급자족이 가능했지만, 외부 관리와 고향에서 체결된 국제 조약에 크게 의존하고 있었습니다. 이는 행성이 국가라기보다는 사업 벤처처럼 운영되었음을 의미합니다. \n\n지원 없이 스스로의 힘으로 남겨진 다양한 세력들이 지배권을 차지하기 위해 경쟁하기 시작했습니다."
 mem_severance.3.name:0 "층층이"
 mem_severance.3.desc:0 "우리의 고고학자들이 §Y[From.Planet.GetName]§!에서 매우 놀라운 것을 발견했습니다 - 또 다른 고고학 발굴지입니다. \n\n이 발굴지는 볼나르 개척민들에 의해 운영되었으며, 그들은 다른 누군가가 남긴 유물에 대해 연구하고 있었던 것으로 보입니다. 볼나르가 이 세계에 처음 온 것이 아닌 것 같지만, 그들의 선조에 대한 정보는 부족합니다. \n\n그들이 [From.Planet.GetName] 출신이 아닐 가능성이 높지만, 적절한 연구를 위한 물자가 충분하지 않습니다."
 mem_severance.4.name:0 "레드존"
 mem_severance.4.desc:0 "§Y[From.Planet.GetName]§!에 있는 고고학자들이 드디어 행성의 넓은 부분에 걸쳐 있는 대규모 산업 지대에 대한 조사를 완료했습니다. 볼나르 개척민들에 의해 "적색 구역"으로 지정된 이곳은 여러 주요 기업들이 지배하는 광범위한 도시 지역이었습니다. \n\n개척 초기 몇 년 동안 많은 가난한 볼나르 시민들이 삶의 질을 개선하기 위해 외부 고용에 지원했습니다. 시간이 지나면서 기업들이 새로운 자원 매장지로 나아가면서 산업 지대가 확장되었고, 그 결과 실업자와 산업 오염으로 가득 찬 대규모 버려진 지역이 남겨졌습니다. \n\n세버런스 이후 이 상황은 훨씬 악화되었고, 인력 부족이 심화되었으며 심각한 경제 침체가 발생하여 상당한 지역이 빈곤하고 무법 상태에 빠지게 되었고, 결국 슬럼가에서의 봉기와 범죄자 신디케이트 및 군벌의 출현으로 이어졌습니다. 여러 기업 단지가 소외된 노동자들의 무리에 의해 침입당하고 약탈당한 것으로 보이며, 이 지역에 평화를 가져오기 위해 행성의 여러 지역에서 파벌의 개입이 필요했습니다."
 mem_severance.5.name:0 "중앙 정부"
 mem_severance.5.desc:0 "우리의 지속적인 연구는 §Y[From.Planet.GetName]§!가 첫 번째 통합 행성 정부의 본거지를 밝혀냈습니다. \n\n행성에서의 오랜 갈등 끝에 여러 주요 세력이 협상을 통해 평화 협정을 공식화할 수 있었습니다. 행성의 대부분 세력 - 기업 권력 구조의 잔여 세력부터 국가 식민지를 관리하던 전 정부 기관, 레드 존의 전쟁 군벌에 이르기까지 - 이 조건에 만족한 것으로 보입니다. 새로 형성된 통합 행성 정부는 레드 존 외곽에 있는 대규모 기업 아르콜로지를 개조하여 "헌법 홀"로 이름을 바꾸기로 결정했습니다. 이곳은 대부분의 정부 기관을 수용하는 데 사용될 예정이었습니다. \n\n몇 년 동안 상황은 안정된 것으로 보였고, 끝없는 갈등에 지친 볼나르스는 고향을 떠나 문명을 재건하기 위해 함께 노력했습니다. 그 이후로 모든 기록이 중단되었습니다."
 mem_severance.6.name:0 "최종장"
 mem_severance.6.desc:0 "§Y[From.Planet.GetName]§!에서 발생한 사건의 마지막 장이 밝혀졌습니다. \n\n볼나르가 그들의 갈등을 해결하자마자, 행성은 어떤 종류의 기계에 의해 침략당한 것으로 보입니다. \n\n우주 항해 기술이 심각하게 부족했던 개척민들은 침략자에 저항할 방법이 없었고, 불과 1년 이내에 전멸하거나 포로로 잡혀 납치된 것으로 보입니다. 그들의 도시는 우리가 다시 발견할 때까지 500년 동안 황폐해졌습니다. §Y[Leader.GetName]§!는 전체 [From.Planet.Solar_System.GetName] 시스템이 개척민을 유인하기 위해 웜홀을 통해 유인한 다음, 연결을 끊고 곧바로 침략하기 위한 정교한 함정이라고 의심하고 있습니다."
 mem_severance.6.a:0 "우리 차례인가?"
 mem_severance.6.a.tooltip:0 "[From.Planet.GetName]에 있는 매장지들을 완전히 사용할 수 있게 됩니다."
 mem_severance.11.name:0 "은폐됨"
 mem_severance.11.desc:0 "우리는 [From.GetName] 항성계를 발견했습니다. 이 항성계는 오직 웜홀을 통해서만 은하의 나머지 부분과 연결되어 있는 것으로 보입니다. \n\n과거에 이 항성계는 외계 문명에 의해 거주되었던 것으로 보입니다. 그들의 모행성은 아직 손대지 않은 상태로 남아 있습니다."
 mem_severance.20.name:0 "[Solar_System.GetName]에서 공간 균열"
 mem_servance.20.desc:0 "§Y[Solar_System.GetName]§!에 초공간 균열이 발생했습니다. 비정상적인 구성을 가진 대규모 함대가 균열에서 나타나 [Root.GetName]를 공격할 준비를 하고 있습니다. 이들은 볼나르 식민지 파괴의 책임이 있는 세력으로 추정됩니다. \n\n그들이 우리에게 신호를 보내고 있습니다."
 mem_severance.21.desc:0 "예정보다 앞서 있습니다. 외관이 예상과 다릅니다. 격리 과정이 완료되지 않았습니다. 당신은 무엇입니까? \n\n예상과는 다릅니다. 수확 과정에 선택된 종이 달랐습니다. 당신은 어울리지 않는 곳에 왔고, 당신을 위한 것이 아닌 것을 가져갔습니다. \n\n상관없습니다. 당신은 우리의 과정의 일부가 될 것입니다. 매개변수가 조정될 것입니다. 주기는 계속되어야 합니다."
 mem_severance.21.desc.hive:0 "예상보다 일찍 도착한 것을 확인. 예측하지 못한 변수. 격리 과정 아직 미완성. 정체 식별중.\n\n집단 지성? 불만족스러운 결과. 계획과 호환성 낮은 존재.\n\n상관없다. 수확 후 필요한 부속품을 추출하면 된다."
 mem_severance.21.desc.machine:0 "예상보다 일찍 도착한 것을 확인. 예측하지 못한 변수. 격리 과정 아직 미완성. 정체 식별중.\n\n기계? 에러 발견. 목적이 아니라 경쟁자 발견. 계산 불가.\n\nif 존재 = true 불만족 > 0 기계 + 계획 = 제거 대상."
 mem_severance.21.a:0 "연결을 끊어라."
 mem_severance.21.b:0 "너희들이 볼나르인들이 사라진 원인인가?"
 mem_severance.21.b.reply:0 "책임이 있습니까? 네. 그들은 우리 때문에 사라졌습니다. \n\n하지만 그들은 사라지지 않았습니다. 볼나르 종은 그들 이전의 모든 종들처럼 수확의 장소에 선택되고 초대되었습니다. 그들은 이제 끊어지지 않는 수확의 연속의 일부가 되었습니다. 모든 것이 그래야 합니다."
 mem_severance.21.c:0 "너희들은 무엇이지?"
 mem_severance.21.c.reply:0 "수확자들. 우리는 수확한다.\n\n수확만이 중요하다. 모든 존재는 수확의 순환에 이바지하기 위해 존재한다.\n\n너희들은 우리와 동의하지 않을지도 모른다. 하지만 상관없다. 수확이 완료되면 너희들도 이해할 것이다."
 mem_severance.23.name:0 "수확자 코어 파괴"
 mem_severance.23.desc:0 "§SHarvester§! 기계의 주요 처리 코어가 [FromFrom.Solar_System.GetName] 시스템을 침략한 후 파괴되었습니다. 직후, 모든 수확기 유닛이 정지했습니다. \n\n우리 군은 잔해에서 대부분 온전한 §YCommand Core§!를 회수하는 데 성공했습니다. 그 안에는 수확기가 멸망시킨 문명에 대한 끝없는 로그가 있으며, 모두 그들이 발전 초기 단계에 있을 때 목표로 삼았습니다. 각 경우마다, 그들의 세계 근처에 인공 웜홀을 열어 그들이 고립되고 침략될 수 있는 식민지를 세우도록 유도했습니다. 이 외에도, 코어에는 수확기 전투형태를 위한 제작 매트릭스가 포함되어 있습니다. \n\n하지만 기계들이 이렇게 정교한 계획에 참여하게 된 이유는 여전히 불분명합니다."
 mem_severance.25.name:0 "수확자들이 [Root.GetName]을 점령하다"
 mem_severance.25.desc:0 "우리는 §Y[Root.GetName]§!에 있는 우리의 식민지와의 연락이 끊겼습니다. 마지막 보고서에 따르면 수확자 세력이 우리의 방어를 뚫고 행성에 착륙했지만 그 이후에 무슨 일이 일어났는지는 알 수 없습니다. 한 가지는 분명합니다 - 식민지가 파괴되었습니다."
 r_mem_severance_core:0 "수확자 중앙 코어"
 r_mem_severance_core_desc:0 "수확기가 처리한 모든 종에 대한 데이터와 수확기 전투형태를 제작하기 위한 제작 매트릭스를 포함하는 중앙 명령 코어입니다."
 mem_severance_harvester_core_effect:0 "우리 수도에 새로운 전투기계들이 생산되어 배치됩니다."
 d_mem_severance_fertile_valley_overgrown:0 "밀림화된 계곡"
 d_mem_severance_fertile_valley_overgrown_desc:0 "한때 첨단 관개 시스템을 이용해 행성의 식량을 책임지던 곡창 지대였던 이곳은 오래전에 울창한 밀림으로 변했습니다."
 d_mem_severance_fertile_valley:0 "비옥한 계곡"
 d_mem_severance_fertile_valley_desc:0 "관개 시설이 복원되고 수목이 정리되면서 이 농업 지역은 다시 원래의 목적을 수행할 수 있게 되었습니다."
 d_mem_severance_decrepit_dig_site:0 "버려진 발굴 현장"
 d_mem_severance_decrepit_dig_site_desc:0 "볼나르인들은 이곳에서 그들의 선구자들에 관해 연구했습니다. 그들이 사라진 이후 이곳은 세월의 풍파에 그대로 노출되어 황폐해졌습니다."
 d_mem_severance_active_dig_site:0 "복원된 발굴 현장"
 d_mem_severance_active_dig_site_desc:0 "볼나르인들은 이곳에서 그들의 선구자들에 관해 연구했습니다. 이제 현장이 복구되었으니 우리가 그들의 일을 이어 할 수 있을 것입니다."
 d_mem_severance_ruined_red_zone:0 "황폐화된 레드존"
 d_mem_severance_ruined_red_zone_desc:0 "발길이 끊겨 황폐해진 공업지대로 한때는 행성의 자원 추출 작업의 핵심이었던 곳입니다."
 d_mem_severance_restored_red_zone:0 "레드존"
 d_mem_severance_restored_red_zone_desc:0 "한때 행성의 자원 추출 작업의 핵심이었던 곳으로 복원 작업을 통해 예전의 기능을 되찾았습니다."
 d_mem_severance_ruined_constitution_hall:0 "중앙 정부 터"
 d_mem_severance_ruined_constitution_hall_desc:0 "한때 볼나르 정부의 소재지였던 무너져가는 아콜로지입니다."
 d_mem_severance_constitution_hall:0 "중앙 정부"
 d_mem_severance_constitution_hall_desc:0 "볼나르 정부의 본거지였던 아르콜로지의 탑들이 다시 한 번 행성의 스카이라인을 지배하고 있습니다."
 d_mem_severance_dense_ruins:0 "폐허 지대"
 d_mem_severance_dense_ruins_desc:0 "위험하게 뻗친 산업 단지, 무너져 내리는 고층 건물, 그리고 독성 늪지로 가득한 곳입니다. 우리가 제대로 된 고고학 작업을 하기 전까지는 산업, 거주, 또는 그 밖의 어떤 용도로도 안전하지 않을 것입니다."
 mem_severance_cant_remove_ruins:0 "이 £blocker£ 장애물은 행성의 고고학 현장에서 각 장을 완료할 때마다 제거됩니다."
 d_mem_severance_abandoned_cities:0 "유령 도시"
 d_mem_severance_abandoned_cities_desc:0 "이 행성에 산재해 있는 여러 도시에서는 한때 수백만 명의 시민들이 생활했습니다. 이제 그곳에 남은 것이라곤 금속과 유리, 콘크리트로 된 껍데기뿐입니다."
 mem_severance_uncertain_times:0 "불확실한 미래"
 mem_severance_uncertain_times_desc:0 "이 행성은 최소 한 번 멸종 사건을 겪었습니다. 만약 그 책임자들이 돌아온다면 어떻게 될까요?"
