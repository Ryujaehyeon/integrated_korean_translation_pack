 mem_severance_site:0 "바람과 함께 사라지다"
 mem_severance_site_desc:0 "은하의 나머지 부분과 격리된 [From.Planet.GetName]는 분명 한때 고급 문명의 고향이었습니다. \n\n유적은 여전히 표면에 흩어져 있지만, 궤도에서 고급 형태의 생명체는 감지되지 않습니다. 그들은 모두 어디로 갔을까요?"
 d_mem_severance_decrepit_site:0 "버려진 발굴 현장"
 d_mem_severance_decrepit_site_desc:0 "볼나르인들은 이곳에서 그들의 선구자들에 관해 연구했습니다. 그들이 사라진 이후 이곳은 세월의 풍파에 그대로 노출되어 황폐해졌습니다."
 d_mem_severance_active_site:0 "복원된 발굴 현장"
 d_mem_severance_active_site_desc:0 "볼나르인들은 이곳에서 그들의 선구자들에 관해 연구했습니다. 이제 현장이 복구되었으니 우리가 그들의 일을 이어 할 수 있을 것입니다."
