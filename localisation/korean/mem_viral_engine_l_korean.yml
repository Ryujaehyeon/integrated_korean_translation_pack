l_korean:
 mem_viral_engine.10.name:0 "바이러스 확산"
 mem_viral_engine.10.desc:0 "[This.GetName]의 지역 정부가 새로운 질병이 발병했다고 급하게 보고해왔습니다. 병원균이 치명적이지는 않지만, 감염자들 사이에서 정신적 고통과 불면증 증상이 나타난다고 보고됩니다. 그냥 큰 영향을 주지 않는 평범한 바이러스일 수도 있습니다. 어찌 되었든, 생물 연구부에서 병원체에 대해 자세히 알아낼 때까지 확산을 막을 방법을 생각해내야 합니다."
 mem_viral_engine.10.a:0 "감염된 환자를 격리해라."
 mem_viral_engine.11.name:0 "이상 행동"
 mem_viral_engine.11.desc:0 "우리의 노력 덕분인지, 바이러스는 더 확산하지 않았습니다. 하지만 이미 감염된 사람들은 이상한 증상을 경험하고 있습니다. 성격이 변화하는가 하면, 의료진에게 갑작스럽게 공격을 가하기도 합니다. 또한 격리지역 바깥사람들과 소통에 관심을 가지지 않으며 감염자들끼리만 소통을 선호하는 것으로 보입니다. 이 증상의 원인이 되는 병원체를 분리하려고 노력 중이지만, 이런 일을 수행 할 의료진이 [This.GetName]에 매우 부족한 상태입니다. 현재 도움을 요청하고 있습니다."
 mem_viral_engine.11.a:0 "추가 지원요청을 수락한다."
 mem_viral_engine.11.b:0 "그런 일에 쓸 시간 따위 없다."
 MEM_VIRAL_ENGINE_ISOLATE_PATHOGEN:0 "응급 상황"
 MEM_VIRAL_ENGINE_ISOLATE_PATHOGEN_DESC:0 "[From.GetName]의 의료진들이 자신들의 행성에서 확산하는 질병을 조사하게 인원을 추가 투입해달라고 요청했습니다. 과학선을 보냄으로 큰 도움을 줄 수 있을 것입니다."
 mem_viral_engine.12.name:0 "감염자"
 mem_viral_engine.12.desc:0 "[From.GetName]의 감염자들 사이에서 보고되었던 공격성 증상과 감정 장애 증상이 줄어들었다고 합니다. 그 대신, 감염자들이 뭔가를 지으려고 강박적으로 변하기 시작했습니다. 도대체 무엇을 지으려고 저런 행동을 보이는 것인지 알 수 없지만, 물어볼 때 감염자 모두가 답변을 거부합니다. 건축에 대해 아무것도 모르는 사람들이 금속 건물 뼈대를 용접하기 시작하고, 선생직을 맡던 사람들이 토대를 위한 땅을 파는가 하면, 빈곤층이었던 사람들은 18글자로 이루어진 알 수 없는 언어로 코드를 작성하기 시작했습니다. 대체 이 사람들이 뭘 하는 건지 아직도 알 수 없습니다."
 mem_viral_engine.12.generic:0 "감염자들을 조사해."
 mem_viral_engine.12.col:0 "도시들로부터 멀리 떨어진 곳에 감염자들을 격리시켜."
 mem_viral_engine.12.col.tooltip:0 "감염자들이 노동을 하지 못하게 됩니다."
 mem_viral_engine.12.phobe:0 "우리 국민은 우리가 보호해야한다. 격리시켜!"
 mem_viral_engine.12.phobe.tooltip:0 "감염자들이 노동을 하지 못하게 됩니다."
 mem_viral_engine.12.mat:0 "치료제를 찾아야겠군. 모든 분야의 지성들을 모아 연구하자."
 mem_viral_engine.12.ind:0 "치료제를 만들자. 개인의 자유의지는 그 누구도 빼앗지 못한다."
 mem_viral_engine.12.spi:0 "저 너머의 목소리가 행동으로 나타난 것일 수도 있다! 지켜보되 방해하지 말아라."
 mem_viral_engine.12.spiphile:0 "외계의 정신은 신성하고 아름답군. 방해하지 말아라."
 mem_viral_engine.12.phile:0 "뭔가 새로운 것일 수도 있지. 하던 일을 완수하게 하자."
 MEM_VIRAL_ENGINE_STUDY_INFECTED:0 "감염자 조사"
 MEM_VIRAL_ENGINE_STUDY_INFECTED_DESC:0 "감염된 사람들은 이상하게 행동합니다. 알 수 없는 임무를 수행하기 위해 서로 협력하고 있습니다. 우리 국민의 안전을 위해 그들의 최종 목표가 무엇인지 알아내야만 합니다."
 MEM_VIRAL_ENGINE_RESEARCH_CURE:0 "치료제 찾기"
 MEM_VIRAL_ENGINE_RESEARCH_CURE_DESC:0 "한 종류의 알 수 없는 외계 바이러스에 의해 우리 국민이 조종되고 있습니다. 이 일은 묵과할 수 없습니다. 이 사태를 진정시킬 항바이러스제를 찾아내야만 합니다."
 mem_viral_engine.13.name:0 "연구 완료"
 mem_viral_engine.13.desc:0 "감염된 행동에 대한 분석이 합의에 도달했습니다. 바이러스에 감염된 이들은 믿을 수 없을 만큼 복잡한 생물학적 컴퓨터를 구축하고 있습니다.\n\n감염된 이들 중 한 명이 우리 직원에게 접근하여 나머지를 대표한다고 주장했습니다. 그들은 강박이 목소리의 형태를 띠었으며, 이 목소리들이 그들에게 어떤 침습적인 절차에 자신의 몸을 제출해야 한다고 말하고 있다고 주장했습니다. 그들은 우리가 간섭하지 말 것을 요청했습니다.\n\n우리 사람들에게 어떤 일이 일어날지 전혀 알 수 없습니다. 이것이 이를 막을 수 있는 마지막 기회일 수 있습니다."
 mem_viral_engine.13.a:0 "허용하도록 하지."
 mem_viral_engine.13.a.tooltip:0 "감염자들이 자신들이 만든 기계를 활성화합니다. 부정적이지 않은 결과가 나오기만을 바랄 뿐입니다."
 mem_viral_engine.13.b:0 "당장 멈춰!"
 mem_viral_engine.13.b.tooltip:0 "건설을 어떤 방식으로든 멈출 것입니다... 무력을 사용해서라도 말이죠."
 mem_viral_engine.14.name:0 "바이러스 격리 성공"
 mem_viral_engine.14.desc:0 "[This.GetName]의 행정부와 합동 조사를 한 결과 범인을 찾아냈습니다. 범인은 바이러스였습니다만, 우리 신체에서는 볼 수 없었던 여러 아미노산으로 이루어진 바이러스였습니다. 이 바이러스는 뇌를 공격해 의사 결정과 감정 표현을 관장하는 뇌 부위에 조작을 가합니다. 일부 바이러스 학자들은 이 바이러스가 예상보다 더 높은 지능을 가지고 있을 수도 있다고 주장합니다."
 mem_viral_engine.14.a:0 "선택할 시간이군"
 mem_viral_engine.15.name:0 "늦음"
 mem_viral_engine.15.desc:0 "연구자들에게 시간이 모자랐습니다. 알아내기엔 너무 많은 것들이 미지로 남았고, 감염자들이 이미 기계를 거의 다 완성했습니다."
 mem_viral_engine.15.a:0 "우리가 할 수 있는건... 기다리고 희망하는 것 뿐이군."
 mem_viral_engine.16.name:0 "바이러스 격리 완료"
 mem_viral_engine.16.desc:0 "대의를 위해서, 우리는 감염자들을 사회로부터 완전히 격리했습니다. 잘 치료하고 보살필 것이지만, 다시는 사회로 돌아오지 못할 것입니다. 나머지 국민이 이 희생에 기뻐하고 있습니다."
 mem_viral_engine.16.a:0 "대신 우리 기억에 영원히 남을 것이다!"
 mem_viral_engine.17.name:0 "치료제 발견"
 mem_viral_engine.17.desc:0 "성공입니다! 이 이상한 병원균을 없앨 항바이러스제 합성에 성공했습니다. [This.GetName]의 주민들이 예방 주사를 맞아 앞으로도 위험한 일은 일어나지 않을 것입니다."
 mem_viral_engine.17.a:0 "의학계의 승리로군!"
 mem_viral_engine.22.name:0 "바이러스 엔진"
 mem_viral_engine.22.desc:0 "[This.GetName]에서의 건설이 완료되었으며, 우리의 의사들은 우리 인구에서 바이러스의 흔적이 남아 있지 않다고 보고했습니다. 그들이 영향 아래에서 구축한 기계는 디지털 데이터가 아닌 아미노산과 단백질 그룹의 움직임을 기반으로 한 컴퓨터입니다. 흥미롭지만 완전히 이질적입니다.\n\n우리의 최선의 추측은 바이러스가 자신만의 거주지를 구축했으며, 호환 가능한 생물학적 구조를 기반으로 한 끈질긴 시뮬레이션 환경이라는 것입니다. 임시 대리인을 통해 통신이 가능해졌으며, 전력과 일반적인 유기체 물자의 주기적인 주입을 대가로, 기계는 우리에게 계산 엔진으로서의 사용을 제안했습니다. 우리의 연구 노력에 있어 그 유용성은 엄청날 수 있습니다."
 mem_viral_engine.22.a:0 "양측 모두에게 좋게 진행되어 다행이군."
 mem_viral_engine.22.a.tooltip:0 "§Y바이러스 엔진§!이 활성화되어 우리 연구에 도움을 줍니다."
 mem_viral_engine.19.name:0 "바이러스 폭동"
 mem_viral_engine.19.desc:0 "감염된 자들의 추가 활동을 성공적으로 차단했습니다. 불행히도, 이로 인해 그들은 무서운 폭력으로 되돌아갔습니다. 지역 군대는 치명적인 무력으로 보복할 수밖에 없었습니다. 일부 감염된 자들은 탈출에 성공했으며, 미래에 위협이 될 수 있습니다. 하지만 당면한 문제는 해결되었습니다."
 mem_viral_engine.19.a:0 "모두 잡아버려!"
 mem_viral_engine.20.name:0 "바이러스 송신기"
 mem_viral_engine.20.desc:0 "감염자들이 건설을 완료했습니다. 마지막으로 보이는 부분은 라디오 송신기 접시였습니다. 완공 직후 활성화되어 우주로 엄청난 양의 데이터를 송신했습니다. 어느 시점에서 자동 접종 시스템을 통해 감염자의 몸에서 바이러스가 완전히 제거되었습니다. 질병에서 회복된 이들은 원래의 성격으로 돌아왔으며, 발생한 일에 대한 기억은 거의 없다고 주장합니다.\n\n현재 이론은 이 장치가 바이러스의 구성 부품을 코드화된 전자 정보로 변환한 다음, 이를 알 수 없는 장소로 전송했다는 것입니다. 우리는 답보다 더 많은 질문과 함께 매우 크고, 매우 쓸모 없는 라디오 송신기를 남겨두게 되었습니다."
 mem_viral_engine.20.a:0 "뭐... 다행이군."
 mem_viral_engine.21.name:0 "바이러스 폭탄"
 mem_viral_engine.21.desc:0 "감염자들이 작업하던 건설 프로젝트는 그저 속임수에 불과했습니다! 이 건물은 대규모 바이러스 확산 시스템을 숨기고 있었으며, 그 목적은 감염성 물질의 구름을 대기 중에 퍼뜨리는 장치였습니다. 개입 시도가 감염자들에 의해 끔찍한 폭력으로 맞닥뜨렸고, 행성 전역에서 새로운 바이러스 감염 사례가 보고되었습니다. 보안군은 감염자들을 저지하고 노출된 사람들을 격리하기 위해 필사적인 전투를 벌였습니다. 도시들은 폭력으로 몸부림쳤고, 화재가 세계 산업 중심지를 휩쓸었습니다. 그들은 대부분의 반란군을 투옥하거나 처치하는 데 성공했지만, 일부는 광야 공생군으로 도망쳤습니다. [This.GetName]는 이 짧지만 잔인한 내전에서 잃어버린 이들을 애도합니다. 재건해야 하지만, 결코 잊지 않을 것입니다."
 mem_viral_engine.21.tooltip:0 "[root.GetName]의 [root.mem_pops_killed] POP이 사망합니다."
 d_mem_viral_engine:0 "바이러스 엔진"
 d_mem_viral_engine_desc:0 "역사상 어느 컴퓨터와 비교해봐도 견줄 만한 것이 없는 생물학적 컴퓨터입니다. 기계 안에 사는 이 지성체들은 우리의 도움에 감사하며 우리의 연구를 도와주려고 합니다."
 mem_mysterious_illness:0 "알 수 없는 병"
 mem_mysterious_illness_desc:0 "알 수 없는 질병이 확산하고 있습니다. 주민들이 불안에 떨고 있으며, 감염되지 않을까 걱정하고 있습니다."
 mem_grateful_populace:0 "감사하는 주민들"
 mem_grateful_populace_desc:0 "주민들이 자신들을 지키기 위해 행해졌던 희생을 영원히 기억합니다. '그들'의 희생을 기리기 위해 열심히 하루를 살아갑니다."
 mem_medical_breakthrough:0 "의학적 성과"
 mem_medical_breakthrough_desc:0 "유행성 전염병이 근절되었습니다. 주민들이 기뻐합니다!"
 mem_viral_insurgency:0 "바이러스 폭동"
 mem_viral_insurgency_desc:0 "살아남은 감염자들이 자신들의 범죄 행위를 지속하기 위해 격리 구역에서 도망쳤습니다. 어떤 대가를 치르더라도 모두 추적해서 잡아내야 합니다!"
 d_mem_viral_transmitter:0 "바이러스성 송신기"
 d_mem_viral_transmitter_desc:0 "외계 바이러스는 이 쓸모없는 거대한 송신기를 남기고 떠났습니다."
 job_mem_viral_engineer:0 "바이러스 엔진 연산원"
 job_mem_viral_engineer_plural:0 "바이러스 엔진 연산원"
 job_mem_viral_engineer_desc:0 "생물학적 컴퓨터를 운영하는 연구원들로, 비할 데 없는 계산 능력을 가진 지능이 거주하고 있습니다. 그들은 우리의 도움에 감사하며, 우리의 연구를 도와줌으로써 보답할 의사를 가지고 있습니다."
 mod_job_mem_viral_engineer_add:0 "$job_mem_viral_engineer$ 직업"
 mod_job_mem_viral_engineer_per_pop:0 "$VALUE$ POP마다 §G+1§! $job_mem_viral_engineer$ 직업"
 mod_job_mem_viral_engineer_per_pop_short:0 "\n$VALUE$ £pop£마다 §G+1§! £job_researcher£"
