l_korean:
 mem_hidden_tundra_category:0 "우주에서 가장 흥미로운 불모지"
 mem_hidden_tundra_category_desc:0 "수석 과학자 §Y[Root.leader.GetName]§!가 행성 §Y[From.GetName]§!에서 흥미로운 데이터를 얻었습니다. 더 자세한 조사가 필요할 것으로 보입니다."
 mem_hidden_tundra.1.name:0 "이곳은 거주 가능한 행성이야!"
 mem_hidden_tundra.1.desc:0 "§Y[From.GetName]§!는 우리의 초기 스캔에서 보여준 것처럼 황량하지 않고 실제로는 동토 행성입니다. 그러나 거의 특징이 없는 표면과 거의 식물 생명이 없는 상태로 여전히 꽤 황량해 보입니다.\n\n하지만 우리는 소규모의 지역적인 테라포밍 작업의 도움으로 여전히 식민지를 건설할 수 있을 것입니다."
 mem_hidden_tundra.2.name:0 "우주에 널리고 널린 흥미롭지 않은 불모지"
 mem_hidden_tundra.2.desc:0 "§Y[Root.leader.GetName]§!의 첫 번째 가정과는 달리, §Y[From.GetName]§!는 단지 우주에 있는 죽은, 지루한 암석입니다. 우리는 연구 노력을 다른 곳에 집중해야 합니다."
 mem_hidden_tundra.1.fascinating:0 "환상적이군."
 mem_hidden_tundra.1.xenophobe:0 "해충이 회복력 있는 것 같습니다."
 mem_hidden_tundra.2.fascinating:0 "환상적이군."
