l_korean:
 mmc_plague:0 "대역병"
 mmc_plague_desc:0 "이 잔인한 나노 바이러스는 이 행성의 모든 생물체를 체계적으로 죽입니다."
 mmc_plague.7.desc:0 "은하에서 대규모 전염병이 발생합니다. 이 악의 계획 뒤에 누가 있는지는 아무도 모릅니다. 은하의 종족들은 서로를 불신하게 되고, 모든 별 뒤에 적이 있다고 생각합니다. 은하의 무정부 상태는 피할 수 없는 것처럼 보입니다. 생존을 위한 경주가 시작됩니다. 은하가 스스로를 파괴하기 전에 범죄 국가를 찾아내고 파괴할 수 있습니까?"
 mmc_plague.71.desc:0 "은하에서 대규모 전염병이 발생합니다. 이 악한 계획 뒤에 당신이 있다는 것을 아는 사람은 없습니다. 은하의 종족들은 서로를 불신하게 되고, 모든 별 뒤에 적이 있다고 생각합니다. 은하의 무정부 상태는 피할 수 없는 것처럼 보입니다. 생존을 위한 경쟁이 시작됩니다. 은하가 스스로를 파괴할 때까지 당신은 파괴를 피할 수 있을까요?"
 mmc_plague.10.name:0 "위대한 역병 종식"
 mmc_plague.10.desc:0 "can the galaxy recover from this disaster?","범죄 제국의 잿더미 속에서 과학자는 마침내 나노 바이러스의 조종자를 발견했습니다. 은하의 공포는 드디어 끝났습니다. 질문은 남습니다. 은하가 이 재난에서 회복할 수 있을까요?"
 mmc_plague.102.desc:0 "위대한 전염병이 갑자기 멈췄습니다. 무슨 일이 일어난 걸까요? 왜일까요? 우리는 이제 안전한 걸까요? 범인이 목표를 달성했다는 가장 논리적인 결론에 도달했습니다. 은하의 모든 제국을 약화시켰지만, 자신을 노출하는 위험은 감수하지 않았습니다."
 casus_belli_cb_plague:0 "전염병"
 casus_belli_cb_plague_acquire_hint:0 "은하적 전염병이 진행 중입니다."
 war_goal_wg_plague:0 "전염병 범인을 찾습니다."
 war_goal_wg_plague_desc:0 "전쟁은 은하적 전염병의 범인을 찾기 위해 벌어집니다."
 opinion_plague_crisis:0 "우리가 중범죄의 원인자입니다."
 opinion_culprit_exposed:0 "폭로된 범인"
 opinion_stopped_plague:0 "전염병을 멈췄습니다."
 SUBJECT_plague_vassal:0 "전염병 속국"
 SUBJECT_DESC_plague_vassal:0 "우리는 그들에게 우리의 의지를 강요하고 그들이 범인이 아니라는 증거를 얻었습니다. 그들은 진짜 범인을 찾는 데 도움을 주지만 그 이상은 아닙니다."
 mmc_supernova.2.desc:0 "우리는 §H[destroyed_system.GetName]§! 성계에서 혼란스러운 초공간 텔레메트리를 수신하고 있습니다. 우리의 측정이 정확하다면, 주별이 자발적으로 초신성 폭발을 일으켜 엄청난 영향을 미친 것으로 보입니다. 모든 행성이 파괴되었고, 해당 성계에 있었던 모든 함선이나 기지도 파괴되었을 것입니다. 별 자체는 블랙홀로 붕괴된 것으로 보입니다."
 d_quarantine_hospital:0 "$building_quarantine$"
 d_quarantine_hospital_desc:0 "$building_quarantine_desc$"
