l_korean:
 mem_elusive_carcosa.11.name:0 "영감? 혹은 망상?"
 mem_elusive_carcosa.11.desc:0 "최근 존경받던 과학자의 별세에 따라 고인의 연구실에서 발견된 다양한 노트와 문서들은 호기심을 자아내는 그림을 그립니다. 그들의 황혼기에 '엘루시브 카르코사'라는 이름의 생물에 대한 이상한 집착을 발전시킨 것 같습니다. 이 동물이 정확히 무엇이 그렇게 독특했는지 해독하기는 어렵지만, 고인은 이 생물의 확보를 최우선 과제로 여겼던 것 같습니다.\n\n노트에 따르면, 이 생물은 [mem_carcosa_colony.GetName]에서 마지막으로 목격되었습니다. 연구 선박의 감지기를 사용하면 그것을 찾는 것은 쉬울 것입니다."
 mem_elusive_carcosa.11.a:0 "뭔가 심상치 않은데?"
 mem_elusive_carcosa.11.b:0 "미친 망상을 들어줄만큼 한가하지 않아."
 MEM_CHASE_CARCOSA:0 "포착 불가 카르코사"
 MEM_CHASE_CARCOSA_DESC:0 "사망한 과학자의 메모를 따라 포착불가 카르코사를 찾기 위해 [mem_carcosa_colony.GetName](으)로 향했습니다."
 mem_elusive_carcosa.12.name:0 "포착 불가 카르코사"
 mem_elusive_carcosa.12.desc:0 "우리의 [mem_carcosa_colony.GetName]에 대한 조사는 결과를 내지 못했습니다. 그러나 [mem_carcosa_colony_2.GetName]에서 이상한 보고가 있었습니다. 여러 개척민들이 신비로운 생물을 목격했다고 주장하며, 그 생물이 우리가 정리한 엘루시브 카르코사의 노트와 일치한다고 말했습니다. 그러나 그들의 보고서를 이 노트와 비교해보면 외모나 행동 모두 일치하는 것이 없습니다. [mem_carcosa_colony_2.GetName]의 과학 책임자는 자신이 각 목격 사례를 재확인했다고 맹세하지만, 유일한 가능한 결론은 관련된 모든 인원의 심각한 간과입니다."
 mem_elusive_carcosa.12.default:0 "기묘하군."
 mem_elusive_carcosa.12.mat:0 "쓸데없는 자원 낭비일뿐이야."
 mem_elusive_carcosa.12.col:0 "아무래도 이 일에 더 적합한 [Root.Owner.GetSpeciesName]을(를) 찾아야겠군."
 mem_elusive_carcosa.12.phobe:0 "외계종이 꾸민 모략의 악취가 나는군."
 mem_elusive_carcosa.31.name:0 "죽음"
 mem_elusive_carcosa.31.desc:0 "그 과학자의 메모는 우리를 속인 것 같습니다. 그런 생물이 존재한다는 증거는 없습니다."
 mem_elusive_carcosa.31.a:0 "실망이야"
 mem_elusive_carcosa.13.name:0 "재생 중인 연체동물"
 mem_elusive_carcosa.13.flav1:0 "우리는 [mem_carcosa_colony_3.GetName]에서 살고 있는 새로운 수생류의 연체동물에 대한 소식을 듣고 있습니다. 보고서에 따르면, 이 동물은 몇 피트 길이이며, 수생류의 특성을 가지고 있고 경미한 부상을 치유하는 능력이 있다고 합니다. 많은 개척민들이 이 동물이 존재한다고 강력히 주장하고 있지만, 결정적인 증거는 아직 발견되지 않았습니다."
 mem_elusive_carcosa.13.flav2:0 "[mem_carcosa_colony_4.GetName]에서 새로운 환상적인 형태의 짐승이 발견된 것 같습니다. 그에 대한 설명은 [mem_carcosa_colony_3.GetName]에서 온 것과 일치하지만, 과학자들은 두 행성에서 동시에 나타나거나 진화했을 가능성이 낮거나 아예 불가능하다고 판단하여 같은 동물이라고 선언하는 데 주저하고 있습니다.\n\n두 종족 간의 중요한 차이점은 이 새 종족이 막대한 양의 생체 전기를 활용할 수 있다고 주장된다는 점입니다. 이 생체 전기를 사용하여 먹이를 사냥합니다. 우리의 많은 사람들은 증거 부족과 다양한 목격자 증언 간의 불일치로 인해 이 생물체가 실제로 존재하는지조차 의심하고 있습니다."
 mem_elusive_carcosa.13.flav3:0 "[mem_carcosa_colony_4.GetName]에서의 보고가 사라지는 듯하던 찰나, [mem_carcosa_colony_5.GetName]의 인구가 드문 지역에서 세 번째 버전의 생물이 발견되었다는 주장이 제기되었습니다. 다른 두 버전과 마찬가지로, 이 생물은 생체 전기 능력을 가진 키 큰 포유류로 묘사되며, 지역 전설 외에는 발견되지 않는 것 같습니다. \n\n우리 정부 관계자들은 이러한 목격이 대중 사이에서 생물의 인기가 높아진 직후 시작되었으며, 현실에 근거할 가능성은 매우 낮다고 언급하고 있습니다."
 mem_elusive_carcosa.13.opt1:0 "흥미진진한데?"
 mem_elusive_carcosa.13.opt2:0 "전보다는 발전한 것 같군."
 mem_elusive_carcosa.13.opt3:0 "분명히 그렇군, 아직 증거는 없어."
 mem_elusive_carcosa.14.name:0 "포착 불가 카르코사"
 mem_elusive_carcosa.14.desc:0 "[mem_carcosa_colony_3.GetName]에서의 목격은 꾸준히 증가하여 현재 우리 영토의 다른 행성으로 퍼졌습니다. 우리의 통신 채널에는 카르코사의 위치에 대한 보고가 넘쳐 흐르지만, 여전히 증언들은 일치하지 않습니다. \n\n이 생물의 역설적인 특성이 명백해짐에 따라 우리 시민들은 흥미를 보였습니다. 이에 대해 신속하게 조치를 취해야 합니다."
 mem_elusive_carcosa.14.ignore:0 "무시해라. 제풀에 지칠 거야."
 mem_elusive_carcosa.14.neutral:0 "정보 검역을 설정하고 추가 보고를 금지해라."
 mem_elusive_carcosa.14.col:0 "정부와 시민들은 이 생물을 찾기 위해 노력할 것이다."
 mem_elusive_carcosa.14.mat:0 "이 생물의 본질을 연구하기 위해 다른 과학적 시도를 해봐라."
 mem_elusive_carcosa.14.phobe:0 "외계 종족 침투 시도! 모든 방위군은 경계태세를 갖춰라."
 mem_elusive_carcosa.14.phile:0 "찾아낼 수 있는 방법이 있긴 한가?"
 mem_elusive_carcosa.14.spirit:0 "저 악마의 환영들을 쫒아내라!"
 mem_elusive_carcosa.14.ind:0 "이 생물을 사냥하기 위해 용병대를 고용해라."
 mem_carcosa_ignore:0 "산만해진 주민들"
 mem_carcosa_influence:0 "제한된 뉴스"
 mem_carcosa_mineral:0 "산업 집중"
 mem_carcosa_physics:0 "과학 집중"
 mem_carcosa_upkeep:0 "경계 태세"
 mem_carcosa_sociology:0 "카르코사 접촉 연구"
 mem_carcosa_happy:0 "두려움에 떠는 대중들"
 mem_carcosa_energy:0 "거물 사냥꾼 고용"
 mem_elusive_carcosa.15.name:0 "포착 불가 카르코사"
 mem_elusive_carcosa.15.desc:0 "우리가 예상한 대로, 인구의 열광적인 집착은 오래가지 못했습니다. 시간이 지나고 엘루시브 카르코사의 존재에 대한 결정적인 증거가 나타나지 않자, 대중의 관심은 급격히 줄어들었고, 이제는 주변 집단과 추방자들만이 그 존재를 어떤 형태로든 강하게 믿고 있습니다."
 mem_elusive_carcosa.15.a:0 "예상된 결과군."
 mem_elusive_carcosa.16.name:0 "포착 불가 카르코사"
 mem_elusive_carcosa.16.desc:0 "이 신화 같은 존재의 문제는 중대히 다루어져야 합니다. 우리 과학자들은 제국 전역에서 그 존재를 완전히 증명하거나 부정하기 위해 가장 믿을 만한 목격을 조사하려고 몇 가지 특별 프로젝트를 준비했습니다."
 mem_elusive_carcosa.16.a:0 "이 문제를 끝내자."
 MEM_CARCOSA_HUNT_1:0 "카르코사 사냥"
 MEM_CARCOSA_HUNT_1_DESC:0 "[This.GetName]의 보고서는 포착 불가 카르코사의 존재 가능성을 제안합니다."
 MEM_CARCOSA_HUNT_2:0 "카르코사 사냥"
 MEM_CARCOSA_HUNT_2_DESC:0 "[This.GetName]의 보고서는 포착 불가 카르코사의 존재 가능성을 제안합니다."
 MEM_CARCOSA_HUNT_3:0 "카르코사사냥"
 MEM_CARCOSA_HUNT_3_DESC:0 "[This.GetName]의 보고서는 포착 불가 카르코사의 존재 가능성을 제안합니다."
 mem_elusive_carcosa.17.name:0 "카르코사 사냥꾼"
 mem_elusive_carcosa.17.desc:0 "우리의 광범위한 노력에도 불구하고, 과학자들은 [paul_carcosa_fail_planet.GetName]에 대한 아무런 성과를 내지 못했습니다."
 mem_elusive_carcosa.17.a:0 "애석하군."
 mem_elusive_carcosa.30.name:0 "사냥 실패"
 mem_elusive_carcosa.30.desc:0 "우리 과학자들이 포착 불가 카르코사에 대한 사냥 자료를 계속 조사 할 것이지만, 그 흔적은 희미합니다."
 mem_elusive_carcosa.30.a:0 "실망스러운 결론이야."
 mem_elusive_carcosa.18.name:0 "돌파구"
 mem_elusive_carcosa.18.desc:0 "유레카! 우리가 타 차원 존재의 본질을 규명하기 위한 노력이 아무런 성과가 없을 것이라고 생각했을 때, 새로운 단서가 우리에게 중요한 통찰을 제공했습니다.\n\n최근 [mem_carcosa_colony_4.GetName]에서 작업 중인 한 젊은 연구원이 관찰자 효과를 기반으로 한 새로운 이론을 제시했습니다. 이 이론은 그 동물의 존재가 타 차원 존재라고 가정하며, 놀라운 결론에 도달합니다: 그 동물은 자신에 대한 정보를 조작할 수 있는 능력을 가지고 있어, 자신의 존재를 정의하고 식별 및 포획하기 매우 어렵게 만듭니다.\n\n본질적으로, 이는 [Root.GetName]에 의해 발견된 최초의 생명체인 메메틱 존재의 사례입니다."
 mem_elusive_carcosa.18.a:0 "말도 안되는군!"
 mem_elusive_carcosa.18.a.tooltip:0 "연구원들은 이 통찰력을 바탕으로 연구할 것입니다."
 mem_elusive_carcosa.19.name:0 "자기 조작 과부하 제안서"
 mem_elusive_carcosa.19.desc:0 "지난 몇 달 동안, 우리의 과학자들은 엘루시브 카르코사의 패턴을 분석하는 데 열심히 일해왔습니다. [mem_carcosa_colony_4.GetName]의 연구원이 개발한 이론은 독창적으로 통찰력이 있었지만, 결코 포괄적이지 않았으며 이 동물의 능력을 완전히 이해하기 위해서는 여전히 많은 작업이 필요합니다.\n\n그럼에도 불구하고, 우리의 과학자들은 최근에 돌파구를 마련했습니다 - 카르코사가 자신의 특성을 수정하는 것을 막을 수는 없지만, 다른 사람들이 그렇게 하는 것을 막을 수는 없습니다. 우리의 최고 전문가들은 양자 계산을 사용하여 카르코사가 스스로 변화하는 것보다 더 빠르게 변화를 일으켜 관찰 가능한 형태로 안정화할 수 있을 것이라고 믿고 있습니다.\n\n이 과정은 매우 실험적이며 자원 집약적이지만, 이 생물체로부터 얻을 수 있는 지식의 잠재력은 충분히 가치가 있을 수 있습니다."
 mem_elusive_carcosa.19.a:0 "어서 진행해라."
 mem_elusive_carcosa.19.b:0 "우리는 이 생물로부터 많은 걸 배울 것이다."
 MEM_CARCOSA_QUANTUM_COMPUTER:0 "문화 요소 조작 능력 과부하"
 MEM_CARCOSA_QUANTUM_COMPUTER_DESC:0 "우리의 외계 생물학자들과 컴퓨터 과학자들은 특수한 고속 양자 정보 전파 알고리즘을 사용하여 포착하기 힘든 카르코사를 메메틱 과부하 상태로 유도할 수 있다고 믿고 있습니다. 이를 통해 우리의 현장 팀 중 하나가 카르코사를 포획할 수 있을 것입니다."
 mem_elusive_carcosa.20.name:0 "생포된 카르코사"
 mem_elusive_carcosa.20.desc:0 "성공! 양자 정보 컴퓨터는 카르코사에 대한 모든 언급을 초당 수천만 번 속도로 미리 생성된 설명으로 바꾸기 시작했으며, 생물체가 적응할 수 있는 기회를 제한했습니다. 이 기계가 켜진 지 불과 몇 시간 후, [mem_carcosa_colony_capture.GetName]의 외딴 시골 지역에서 묘사와 일치하는 생물이 확보되었습니다!\n\n우리가 알고 있는 바로는, 그 생물은 우리 차원에서 발생하지 않았습니다. 무언가 알 수 없는 방법으로 이곳으로 이송된 것입니다. 이것을 연구하면 물리학에 상당한 진전이 있을 것으로 보입니다. 하지만 그것이 어디에서 왔든, 이 생물은 초자연적 능력을 갖추고 있습니다. 그것이 생포되자, 육체적인 형태를 얻었지만, 본래의 힘은 잃지 않았습니다.\n\n우리는 카르코사에게 많은 것을 배울 수 있습니다만, 우리가 이 독특한 특성을 똑같이 사용할 수는 없을 것입니다 . 우리는 무엇에 집중해야 할까요?"
 mem_elusive_carcosa.20.a:0 "이것은 우리 우주의 신비를 풀 수있는 열쇠다."
 mem_elusive_carcosa.20.b:0 "이걸 사용해서 다른 제국들의 시선에 우리 종을 재정립해라."
 mem_elusive_carcosa.20.b.tooltip:0 "우리는 다른 제국들에게 §Y신뢰의 상징§! 의견 변동치를 얻습니다."
 mem_elusive_carcosa.20.c:0 "이 고된 일에 열광하게 바꾸자."
 mem_elusive_carcosa.20.c.tooltip:0 "§Y[Root.GetName]§!의 POP들에게 §Y생산력 조작§! 특성을 추가합니다. 이 특성은 우리 종족에게 광물 생산량과 에너지 생산량을 추가로 §Y+10%§! 제공합니다."
 mem_elusive_carcosa.20.d:0 "우리 사람들이 일상 속에서 즐거움을 찾도록 하자."
 mem_elusive_carcosa.20.d.tooltip:0 "§Y[Root.GetName]§!의 POP들에게 §Y행복도 조작§! 특성을 추가합니다. 이 특성은 우리 종족의 행복도를 추가로 §Y+5%§! 제공합니다."
 mem_elusive_carcosa.20.e:0 "우리를 더 아름답게 만들자."
 mem_elusive_carcosa.32.name:0 "카르코사 생포 실패"
 mem_elusive_carcosa.32.desc:0 "수개월간 엘루시브 카르코사를 변형하는 데 집중한 양자 계산을 진행한 결과, 우리 과학자들은 [mem_carcosa_colony_5.GetName]에서 기이한 소문이 표식을 새긴 자 증가하는 것 외에는 아무것도 생산하지 못했습니다. 이는 지금까지 가장 유망한 접근 방식이었으며, 우리 과학자들은 더 이상 아이디어가 없습니다."
 mem_elusive_carcosa.32.a:0 "좌절스럽구나."
 mem_elusive_carcosa.21.name:0 "[mem_carcosa_fallen_empire.GetName]으로부터의 통신"
 mem_elusive_carcosa.21.desc:0 "당신들은 문화 요소 조작을 할 수 있는 존재를 사로잡았군요.\n\n당신같이 애송이 같은 어린 문명이 문화 요소 조작 기술을 익혔다는 것에 다소 놀랐지만, 일단 당신이 잡은 것을 생각하면 이해가 갑니다.\n\n어느 쪽이든 우리는 대화를 위해 당신의 종족들과 의사소통하고 있습니다. 솔직히 말하면, 당신에게 경고하려고 왔습니다. 우리같이 위대한 기술력을 가진 종족을 당신들의 미개한 기술로 조작할 수는 없습니다. 우리는 당신의 조작 효과를 차단할 것입니다. 하지만, 이 기술을 다시 사용한다면 차단으로 끝나지 않을 겁니다."
 mem_elusive_carcosa.21.a:0 "음.. 그건 불길하긴 했지"
 mem_elusive_carcosa_hunt_chain_title:0 "포착 불가 카르코사 탐색"
 mem_elusive_carcosa_hunt_chain_desc:0 "포착 불가 카르코사는 그것을 붙잡는 모든 시도를 피하고 있습니다. 그 존재를 증명하거나 부인하기 위해 가장 믿을만한 목격을 조사하고 엘리트 현장 팀을 파견해야 할 것입니다."
 mem_carcosa_sightings_checked:0 "행성 탐사됨"
 trait_mem_redefined_productivity:0 "생산량 조작"
 trait_mem_redefined_productivity_desc:0 "이 종의 구성원들은 많은 이들이 지루하다고 여기는 일을 기꺼이 수행합니다."
 trait_mem_redefined_happiness:0 "행복도 조작"
 trait_mem_redefined_happiness_desc:0 "이 종족은 일상 생활에서 기쁨을 느낍니다."
 mem_powering_memetic_overload:0 "문화 요소 조작 능력 과부하에 동력 공급"
 mem_opinion_trustworthy:0 "신뢰의 상징"
