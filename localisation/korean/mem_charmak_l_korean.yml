l_korean:
 mem_charmak_site:0 "유령 전함"
 mem_charmak_site_desc:0 "[From.Planet.GetName]의 상층 대기에서 큰 배가 무작정 떠다니고 있습니다. 내부에서는 생명 신호를 감지할 수 없습니다. \n\n몇 개의 무작위 소행성 충돌과 노화 외에는 외부 손상이 보이지 않습니다."
 mem_charmak_warship_section_key:0 ""
 mem_charmak.1.name:0 "차르막"
 mem_charmal.1.desc:0 "우주선 내부는 미라로 변한 시체들로 어지럽혀져 있습니다. 일부 시체는 폭력적인 죽음의 흔적을 보이지만, 대부분은 기아와 생명 유지 장치 고장으로 사망한 것으로 보입니다. 이들은 §SCharmak§!이라고 불리는 작지만 회복력 있고 신체적으로 능숙한 조류 종에 속하며, 약 800년 전 이 은하계 지역에서 활동했습니다. \n\n그들의 생리학은 우주 적응의 징후를 보이며, 과거 어느 시점에 행성 거주를 포기하고 이와 같은 우주선에서 생활하게 되었음을 시사합니다."
 mem_charmak.2.name:0 "차르막 무리"
 mem_charmak.2.desc:0 "우리가 [From.Planet.GetName]에서 발견한 함선과 그 안의 다양한 유물에 대한 추가 연구는 §SCharmak§! 사회에 대한 더 많은 통찰을 제공했습니다. \n\nCharmak은 주로 신체적 강인함과 전투 능력을 기반으로 한 씨족 중심 사회를 조직했습니다. 강인한 자들은 약한 형제들을 폭력적으로 강제하여 그들의 명령을 따르게 했으며, 서로 지배권을 두고 싸웠습니다. 그들 중 가장 강한 자는 §YCharmakar§!라 불리며 씨족의 리더로서 역할을 했습니다. \n\nCharmak의 삶은 짧고 잔인했지만, 그들과 마주친 불행한 이들에게는 훨씬 더 나빴습니다. 그들은 행성을 약탈하는 사회로, 개인의 안전을 무시하고 행성의 정착지를 공격하며 만나는 모든 것을 죽이고 약탈했습니다. \n\n그들의 활동 중 매우 적은 수가 이 끝없는 약탈과 관련이 없었으며, 전투에 참여하지 않는 대부분은 새로운 무기를 제조하고 설계하는 일을 했습니다. 싸우거나 일하기에는 너무 부상당하거나 병약해진 소수의 선택된 자들은 동료들이 더 열심히 약탈하도록 영감을 주기 위해 예술을 창작하거나 최근의 습격에서 얻은 전리품을 기록하는 일을 하며 생계를 유지했습니다."
 mem_charmak.3.name:0 "차르마카라데"
 mem_charmak.3.desc:0 "[From.Planet.GetName] 위의 궤도에서 발견된 함선의 목적은 더욱 명확해졌습니다. 차르막 무리에서 가장 유명하고 번영하는 씨족 중 하나의 기함이자 차르마카라데로 알려진 무리 전역의 차르막카르가 정기적으로 만나는 장소였습니다.\n\n부족은 대부분 배타적이지만, 때로는 동맹을 수립하거나 공격을 조정하거나 전체 무리의 다른 문제를 해결하기 위해 함께 모여야했습니다. 평균적으로 차르마카라데는 차르막카르의 53%가 동의하고 다른 47%는 사망했습니다."
 mem_charmak.4.name:0 "오렌지 괴물"
 mem_charmak.4.desc:0 "§Y[Leader.GetName]§!는 [Leader.GetSheHe]이 연구 중인 배에서 마지막으로 열린 Charmakarade의 기록을 발견했다고 보고합니다. 이는 Charmak 문명이 붕괴되기 직전의 일입니다. \n\n안건에는 호드가 마주친 새로운 적에 대한 내용만이 있었으며, Charmak은 그들의 정체를 알 필요가 없다고 생각하고 단순히 §SOrange Freaks§!라고 언급했습니다. 그들은 호드 내의 더 작고 고립된 부족들에 대해 일련의 기습 공격을 감행했으며, 이는 Charmak에게는 전례 없는 일이었습니다 - 그리고 그들이 처음으로 공격의 대상이 된 것은 큰 우려의 원인이었습니다. \n\n많은 Charmakar가 보복 캠페인에 자신의 부족의 지원을 약속했습니다."
 mem_charmak.5.name:0 "치명적인 결과"
 mem_charmak.5.desc:0 "차르막 사회의 마지막 해에 대한 기록은 부족하지만 §Y[Leader.GetName]§!는 이제 [Leader.GetSheHe]이 그들의 몰락을 재구성할 수 있다고 믿고 있습니다. \n\n차르막 캠페인은 성공적이었고 §SOrange Freaks§!의 전체 문명이 그 결과로 멸망했습니다. 초기 습격에서 포로로 잡힌 많은 차르막이 발견되어 해방되었고 그들의 약함에 대해 공개적으로 수치심을 느끼게 했습니다. 그러나 그 후 이상한 일이 발생했습니다. \n\n그들의 포로들은 포로들을 자기 편으로 만들려는 시도를 하고 있었고, 그렇게 하면서 그들의 사회적 및 정치적 차이에 대해 자세히 논의했습니다. 포로들은 그들이 배운 것을 나머지 차르막에게 전달했습니다. \n\n차르막은 그들이 테러를 가한 사회의 구조를 연구하는 데 관심을 두지 않았고, 폭력의 능력 이외의 기준으로 지도자를 선택할 수 있다는 사실이 처음에는 그들에게 인상적이지 않았지만, 장기적으로 그들의 정신에 깊은 영향을 미쳤습니다. 이 문제에 대해 생각할수록 차르막의 방식에 대한 의구심이 커졌고, 결국 강박적인 불복종이나 깊은 우울증으로 이어져, 그들은 단순히 명령을 따르기를 거부하고, 죽음의 위협을 받더라도 그렇게 했으며, 궁극적으로는 먹고 마시고 배를 유지하는 것을 거부했습니다. \n\n10년 이내에 그들의 전체 사회는 붕괴되었고, 한때 두려운 종족은 멸종하게 되었습니다. 그러나 그들의 주력함인 §YCharmakaradum§!는 남아 있으며, 우리는 그것을 다시 작동 가능한 상태로 복원할 수 있습니다."
 mem_charmak.5.a:0 "이 함선을 사용해라."
 mem_charmak.5.a.tooltip:0 "전함 §Y차르마카라덤§!이 해군에 추가됩니다."
 mem_charmak.5.b:0 "부품을 분해해라."
 mem_charmak_ship_size:0 "씨족함"
 mem_charmak_ship_size_plural:0 "씨족함"
