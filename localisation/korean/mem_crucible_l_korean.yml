l_korean:
 mem_crucible.3.name:0 "광기의 이끌림"
 mem_crucible.3.desc:0 "[From.GetName]의 인구는 어떤 종류의 집단 광기에 영향을 받은 것으로 보입니다. \n\n우리의 전초 기지에서의 보고서에 따르면 거리에서 폭동이 일어나고 무의미한 만트라를 외치는 일이 널리 퍼져 있습니다. 인지 능력을 유지한 소수의 원주민들은 인구 밀집 지역을 떠나고 있으며, 그들의 수는 빠르게 감소하고 있습니다. [From.Owner.GetName]는 완전한 붕괴 직전에 있습니다."
 mem_crucible.3.a:0 "큰 문제로군."
 mem_crucible.4.name:0 "장막"
 mem_crucible.4.desc.first:0 "우리는 [From.GetName]에서 이상한 현상을 관찰했습니다.\n\n$mem_crucible.4.common$"
 mem_crucible.4.desc.latter:0 "또다시, [From.GetName]에 장막이 드리우는 것 같습니다.\n\n$mem_crucible.4.common$"
 mem_crucible.4.common:0 "마치 광기가 가득 찬 듯한 정체를 알 수 없는 안개가 행성 전체를 삼켜버렸습니다.\n\n센서가 안개를 통과할 수가 없어, 그 안에서 정확히 어떤 일이 일어나고 있는지는 알 방법이 없습니다."
 mem_crucible.4.a:0 "대체 무슨일이..."
 mem_crucible.5.name:0 "[mem_crucible_country.GetName]의 재탄생"
 mem_crucible.5.desc.never_seen_death:0 "이전에 가려져 있던 행성 [From.GetName]가 극적인 변화를 겪은 것으로 보입니다. \n\n이전에 침투할 수 없었던 안개가 걷히고, 지능을 가진 석기 시대 수준의 문명이 드러났습니다."
 mem_crucible.5.desc.seen_death:0 "우리가 이전에 가려졌던 [From.GetName]행성은 갑작스럽게 변화한 듯합니다.\n\n이전의 뚫을 수가 없었던 안개가 갈라지면서, 석기시대 수준으로 퇴보한[mem_crucible_country.GetSpeciesNamePlural]의 모습이 드러났습니다."
 mem_crucible.5.desc.seen_many_deaths:0 "이전과 마찬가지로, [From.GetName]의 베일이 드러났습니다. 이전에는 뚫을 수 없었던 안개가 분해되면서 [mem_crucible_country.GetSpeciesNamePlural]이(가) 다시 한번 석기시대로 회귀한 것처럼 보입니다."
 mem_crucible.5.a:0 "정말 이상하군."
 mem_crucible.6.name:0 "장막"
 mem_crucible.6.desc:0 "우리의 관측소가 [From.GetName] 위에서 보고한 바에 따르면, 갑자기 행성을 뒤덮은 기괴한 안개로 인해 지표면과의 모든 접촉이 끊겼습니다. \n\n마치 행성이 우리의 존재에 부정적으로 반응하는 것 같습니다."
 mem_crucible.6.a:0 "문제가 생겼군."
 mem_crucible.7.name:0 "장막"
 mem_crucible.7.desc:0 "우리는 [Root.GetName]와의 모든 연락을 잃었습니다. 행성의 표면이 이상한 안개에 휩싸인 것 같습니다. \n\n마치 행성이 우리의 존재에 부정적으로 반응하는 것 같습니다."
 mem_crucible.7.a:0 "문제가 생겼군."
 mem_crucible.8.name:0 "[From.Owner.GetName] 발생"
 mem_crucible.8.desc:0 "[Root.GetName]는 [From.GetName]의 표면에서 원시 문명을 발견했다고 보고합니다. \n\n이상한 점은 이 행성의 인구가 완전히 미쳐버린 것처럼 보이며, 고급 인프라를 파괴하고 폭동을 일으키며 무의미한 폭력에 가담하고 있다는 것입니다. \n\n우리는 그들의 세계 위에 §Y관측소§!를 건설하여 그들을 더 면밀히 연구하는 것을 고려해야 합니다."
 mem_crucible.11.name:0 "장막"
 mem_crucible.11.desc:0 "우리의 함선은 [From.GetName]에서 보고하기를, 갑자기 행성을 감싼 기이한 안개로 인해 포격을 계속할 수 없다고 합니다. 이 안개는 표면에 대한 모든 가시성과 접촉을 차단합니다. \n\n마치 행성이 우리의 행동에 부정적으로 반응하는 것 같습니다."
 mem_crucible.11.a:0 "정말 이상한 일이군."
 mem_crucible.100.name:0 "기이한 시련"
 mem_crucible.100.desc:0 "우리는 [From.GetName]에서 동일한 패턴이 반복되는 것을 관찰했습니다: 한 문명이 비정상적으로 빠른 속도로 발전하다가 결국 광기에 빠져 이상한 보라색 안개에 휩싸입니다. 그 안개가 걷히면 석기 시대로 퇴보한 인구가 드러나고, 패턴은 다시 시작됩니다. 마치 어떤 신비로운 힘이 이 과정을 불확실한 목표로 이끌고 있는 것 같습니다."
 mem_crucible.100.a:0 "우리는 이것의 끝을 알아봐야만 한다."
 mem_crucible.100.b:0 "그래서 뭐?"
 mem_crucible.100.b.tooltip:0 " [From.GetName]에서 대부분의 알림을 비활성화합니다."
 mem_crucible.101.name:0 " [mem_crucible_planet.GetName]에서의 관측"
 mem_crucible.101.desc:0 "[Root.GetName]는 [From.GetName]에 대한 포괄적인 연구의 성공적인 완료를 보고합니다. \n\n이 행성은 특별히 이상한 점이 없는 것으로 보입니다. 그러나 주별인 [mem_crucible_controller_planet.GetName]의 영향을 받는 것 같습니다. 조사자들은 행성들 간에 어떤 종류의 신호 교환이 오가는 것을 포착했지만, 무엇이 전송되고 있는지, 그리고 그 목적이 무엇인지 말하기에는 아직 이릅니다."
 mem_crucible.101.a:0 "여기에 대해서 더 알아봐야 해."
 mem_crucible.102.name:0 " [mem_crucible_controller_planet.GetName]에서의 관측"
 mem_crucible.102.desc:0 "[Root.GetName]의 연구원들은 [mem_crucible_controller_planet.GetName]의 표면을 자세히 조사할 수 없었습니다. 하지만, 그들은 이전에 알려진 것보다 더 많은 것을 찾아낼 수 있었습니다.\n\n어떤 종류의 활동이 분명히 진행 중입니다. 엄청난 양의 에너지가 저장되고 있는 것으로 보입니다. 무슨 일이 일어나고 있는지, 어떤 목적으로 진행되고 있는지는 분명치 않지만, 우리는 이 행성의 신비를 전례 없이 완전히 밝히는 데에 근접했습니다."
 mem_crucible.102.a:0 "장막 안에 무엇을 숨기고 있는것인가...?"
 mem_crucible.200.name:0 "기이한 시련"
 mem_crucible.200.desc:0 "이제 우리는 [mem_crucible_planet.GetName]와 [mem_crucible_controller_planet.GetName] 사이의 이상한 전송을 가로채고 후자의 표면을 대략적으로 지도화하는 데 성공했으므로, 전체 [mem_crucible_planet.Solar_System.GetName] 시스템의 진정한 본질을 밝혀내는 데 한 걸음 더 다가섰습니다. \n\n우리는 어떤 종류의 존재가 끝없는 죽음과 재탄생의 순환을 조종하고 있다는 것을 의심할 여지 없이 알 수 있지만, 그 목적이 무엇인지 아직은 알 수 없습니다. 그럼에도 불구하고, 이를 통제하는 자는 엄청난 힘을 지니고 있습니다. 이제 우리는 행성의 가려진 표면을 부분적으로 지도화하고 신호 교환을 해독하는 데 어느 정도 성공했으므로, 이 신비를 마침내 풀 수 있기를 희망합니다."
 mem_crucible.200.a:0 "훌륭해. 진행하라."
 mem_crucible.200.b:0 "우리는 너무 멀리 간 것 같다. 어떤 비밀은 알려지지 않는게 좋을때도 있지."
 mem_crucible.201.name:0 "시련의 조율자"
 mem_crucible.201.desc:0 "[Leader.GetName]은(는) [Leader.GetSheHe] [Leader.GetHasHave]이(가) [Root.GetName] 의 센서 배열을 수정하여 신비한 장막에 침투해 [mem_crucible_controller_planet.Solar_System.GetName] 성계에서 일어나는 이상한 사건의 원인을 찾아낼 수 있게 되었다고 보고합니다.\n\n [mem_crucible_controller_planet.GetName] 의 안개 깊숙한 곳에는 \"§Y조율자§!\"라 불리는 고대의 강력한 기계가 있었습니다. 이 기계의 목적은 단 하나, §S볼다린§! 이라고 불리는 것을 막아 달을 빠져나가지 못하게 하는 것이었습니다. 하지만, 시스템에 주어진 매개변수 내에서는 작업을 해결할 수 없었습니다. 기계 조율자가 할 수 있는 것은 '볼다린'이라 불리던 조각들이 들어갈 필멸의 껍데기가 만들어져, 볼더렌의 탈출이 가까워지면 그 성과를 되돌려버리는 것뿐이었습니다. 이 순환은 조율자가 망가지기 전까지는 계속될 것입니다."
 mem_crucible.201.a:0 "그럼 기계를 꺼버려."
 mem_crucible.201.a.tooltip:0 "볼다린은 탈출하여 [mem_crucible_planet.GetName]의 가이아 행성을 우리가 차지할 수 있도록 해 줄 것입니다."
 mem_crucible.201.b:0 "조율자를 강화하라."
 mem_crucible.201.c:0 "볼더린에 대한 보다 영구적인 해결책을 찾아보자."
 mem_crucible.201.d:0 "조율자를 용도에 맞게 변경하라."
 mem_crucible.201.e:0 "조율자가 중단되는 일 없이 주기를 계속하도록 만들어라."
 mem_crucible.301.name:0 "진정한 볼다린"
 mem_crucible.301.desc:0 "볼다린의 실체가 형성되어 [mem_crucible_planet.GetName] 의 경계를 벗어나 필멸의 껍질을 남겨둡니다.\n\n이 강력한 사이오닉은 이제 성계 전체에 위협이 되고 있습니다."
 mem_crucible.301.a:0 "반드시 싸울 준비를 해야겠어."
 mem_crucible.302.xenophile:0 "뭘 좀 물어봐도 괜찮겠습니까?\n\n여러분들은 항상 다른 사람의 프로젝트를 아무런 고민없이 무너뜨려 오셨는지요? 어쩌면 여러분들의 짧은 생각이 예기치 않은 결과를 초래할 수도 있다는 생각은 해보신적 없으십니까?\n\n우리는 그 판단이 무작위적인 판단 실수인지 궁금하군요. 아니면 은하계를 돌아다니면서 자기 것이 아닌 것들을 박살내고 다니는 것을 좋아하시는 분들입니까?"
 mem_crucible.302.xenophobe:0 "아무짝에도 쓸모없는 [Root.GetSpeciesNamePluralInsult]!\n\n네놈들이 무슨 짓을 했는지 알아? 무슨 일이 일어날지 생각은 하고 그 더러운 손을 놀린거야?\n\n너희들의 멍청한 간섭이 은하계 전체를 위험에 빠뜨렸어!"
 mem_crucible.302.a:0 "그땐 좋은 생각인줄 알았지..."
 mem_crucible.302.b:0 "단지 어떤일이 일어날지 알고싶었을 뿐이다."
 mem_crucible.302.c:0 "이 광기는 끝나야만 했다."
 mem_crucible.302.d:0 "우리 영토 내에서 뭐든지 할 권리가 있다."
 mem_crucible.310.name:0 "볼다린 해결책"
 mem_crucible.310.desc:0 "[Root.GetName]의 승무원들은 Voldareen 문제를 진정으로 "해결"할 수는 없었지만, 그들은 재탄생 루프를 끊는 데 성공했습니다. \n\n짙은 안개가 [mem_crucible_planet.GetName]을 완전히 감싸버려, 그 행성을 우리의 현실에서 영원히 차단했습니다. 필요가 없어지자, 제어자는 방어력을 낮추고 [mem_crucible_controller_planet.GetName] 위의 짙은 장막을 제거하며 시스템을 종료했습니다. 이제 우리는 그 행성과 그 이상한 기술을 차지할 수 있게 되었습니다."
 mem_crucible.320.name:0 "볼다린 해결책"
 mem_crucible.320.desc:0 "사이오닉에 대한 우리의 이해를 바탕으로, [Leader.GetName]는 볼다린 문제에 대한 대안 솔루션을 제시할 수 있었습니다. \n\n악성 사이 엔티티는 효과적으로 무력화되었으며, 구축된 볼다린 껍질인 [mem_crucible_country.GetSpeciesNamePlural]은 진정한 자유를 얻었습니다. \n\n마침내 그 목적을 달성한 제어자는 방어력을 낮추었으며, [mem_crucible_planet.GetName]와 [mem_crucible_controller_planet.GetName]를 우리의 재량에 맡겼습니다."
 mem_crucible_insanity_age:0 "집단적 광기"
 mem_crucible_insanity_age_desc:0 "이전에는 상대적으로 발전되어있던 이 행성의 주민들은 무질서한 폭력과 의미를 알 수 없는 만트라의 미친 성가를 부르는 일종의 집단적인 정신병에 걸렸습니다."
 mem_crucible_broke_crucible:0 "시련의 간섭"
 d_mem_crucible_controller:0 "조율자"
 d_mem_crucible_controller_desc:0 "거대한 사이오닉 컴퓨터의 잔해입니다. 그것이 만들어진 문제를 해결한 후, 작동을 멈췄지만, 비어 있는 껍데기조차 놀라운 기술을 담고 있습니다."
 mem_crucible_chain_title:0 "시련"
 mem_crucible_chain_desc:0 " [mem_crucible_planet.GetName]의 죽음과 부활의 끝없는 반복은 자연스럽지 않습니다.\n\n배후에 무엇이 있는지 알아내야만 합니다."
 MEM_CRUCIBLE_STUDY_HOMEWORLD:0 "반복되는 세계 연구"
 MEM_CRUCIBLE_STUDY_HOMEWORLD_DESC:0 "[mem_crucible_planet.GetName]은(는) 죽음과 부활의 무한한 순환에 갇혀있는 위성입니다. 만약 우리가 이유를 알아내고자 한다면, 바로 여기부터 시작해야만 합니다."
 MEM_CRUCIBLE_STUDY_CONTROLLER:0 "장막이 드리운 세계 연구"
 MEM_CRUCIBLE_STUDY_CONTROLLER_DESC:0 "[mem_crucible_controller_planet.GetName]은(는) 이상한 안개 속에 영구히 갇혀있으며, 끝없는 재탄생의 순환에 갇힌 위성의 궤도를 돌고 있습니다. 뭔가 특별한 것이 있을 겁니다."
 MEM_CRUCIBLE_CONTACT_THE_CONTROLLER:0 "근본적 원인"
 MEM_CRUCIBLE_CONTACT_THE_CONTROLLER_DESC:0 "[mem_crucible_planet.GetName] 에 무한한 순환을 일으키던 원인은 [mem_crucible_controller_planet.GetName]에 숨어있었습니다.\n\n이제 그 본질을 들여다볼 차례입니다."
 MEM_CRUCIBLE_SOLVE_THE_PROBLEM:0 "문제 해결"
 MEM_CRUCIBLE_SOLVE_THE_PROBLEM_DESC:0 "시련의 조율자는 그 문제에 대한 해결책을 찾으려 애써왔습니다. 이제 외부의 관점이 필요할지도 모릅니다."
 MEM_CRUCIBLE_CHANGE_THE_PROBLEM:0 "매개변수 변경"
 MEM_CRUCIBLE_CHANGE_THE_PROBLEM_DESC:0 "시련의 조율자는 주어진 매개변수 안에서 문제를 해결할 수가 없습니다.\n\n그러나 우리가 직접 사이오닉 힘에 대해 이해한다면, 우리는 그것에게 진정한 해결책을 줄 수 있을 것입니다."
 job_mem_crucible_researcher:0 "시련의 조율자 연구원"
 job_mem_crucible_researcher_plural:0 "시련의 조율자 연구원"
 job_mem_crucible_researcher_desc:0 "문제를 해결한 후 작동을 멈춘 채 우리에게 놀라운 기술로 가득한 빈 껍질을 남겨둔 거대한 사이오닉 컴퓨터의 잔해를 연구하고 있습니다."
 job_mem_crucible_research_drone:0 "시련의 조율자 연구 드론"
 job_mem_crucible_research_drone_plural:0 "시련의 조율자 연구 드론들"
 job_mem_crucible_research_drone_desc:0 "문제를 해결한 후 작동을 멈춘 채 우리에게 놀라운 기술로 가득한 빈 껍질을 남겨둔 거대한 사이오닉 컴퓨터의 잔해를 드론을 이용해 연구하고 있습니다."
