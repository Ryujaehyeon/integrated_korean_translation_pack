l_korean:
 mem_beached_category:0 "다친 고래"
 mem_beached_category_desc:0 "§Y[This.GetName]§!에서 생명 신호가 센서에 잡히고 있습니다. 티얀키 우주 고래의 생체 신호와 파동의 세기가 비슷하지만, 그 정도가 희미합니다."
 mem_beached.1.name:0 "길을 잃은 티얀키"
 mem_beached.1.desc:0 "[From.GetName]을(를) 더 자세히 조사해본 결과, 소행성 표면에 생긴 틈 사이에 암컷 티얀키가 있는 것으로 밝혀졌습니다. 왕년에 잘 나갔던 것으로 보이지만 더는 아니군요.\n\n현재 우리의 행동에 응답하지 않는 것으로 보아 동면 중인 것으로 보입니다. 겉가죽에 커다란 흉터가 있는데, 아마 공격을 받고 무리에서 떨어져 나갔거나 아니면 무리 중에서 겨우 살아남은 티얀키 일수도 있습니다. 회복을 위해 소행성에 숨은 듯하지만, 회복하기에는 너무 상처가 커보입니다."
 mem_beached.1.a:0 "도와줄 방법을 찾아보자."
 mem_beached.1.b:0 "이 또한 자연의 섭리니."
 mem_beached.1.c:0 "생체 해부를 해 볼 기회군."
 mem_beached.1.d:0 "신선한 고기군!"
 mem_beached.2.name:0 "치료받은 티얀키"
 mem_beached.2.desc:0 "우리의 티얀키 해부학에 대한 이해는 완벽하지 않지만 §Y[leader.GetName]§! [Leader.GetHerHis] 최선을 다했습니다. \n\n자세한 검사는 그녀의 피부 아래 여러 개의 중금속 물체를 발견했습니다. 이들은 우주 고래의 연조직에 박히도록 특별히 설계된 것으로 보이며, 자연 치유 과정을 방해하고 있습니다. 이들이 발견된 후 제거하는 것은 어렵지 않았고, 적절한 지혈과 티얀키 혈액의 합성체 유사체 수 톤을 주입한 후, 생물체는 빠르게 회복하기 시작했습니다. \n\n그녀는 의식을 되찾았고, 우리의 도움을 인식하고 있는 듯 가까이 머물며 우리의 우정의 정도를 가늠하는 것 같습니다."
 mem_beached.2.a:0 "우리가 키워볼까?"
 mem_beached.2.b:0 "이제 다시 우주로 돌려보내자."
 mem_beached.3.name:0 "티얀키 이름 짓기"
 mem_beached.3.desc:0 "입양한 티얀키 우주 고래가 [Owner.GetAdj] 시민들 사이에서 인기가 많아졌습니다. 이름을 짓자는 의견이 나오기 시작했고, 이에 많은 이들이 알맞은 이름을 제안했습니다."
 mem_beached_3.no_name:0 "이름은 뭔 이름이야."
 mem_beached_3.flopsy:0 "폴짝이."
 mem_beached_3.jewel:0 "보석."
 mem_beached_3.candy:0 "사탕."
 mem_beached_3.greenie:0 "초록이."
 mem_beached_3.crystal:0 "크리스탈."
 mem_beached_3.starlight:0 "별빛."
 mem_beached_3.salad:0 "샐러드."
 mem_beached.4.name:0 "[Root.GetName]의 출산"
 mem_beached.4.desc:0 "티얀키의 생리에 대해 잘 알지 못하기에 [Root.GetName]의 임신 소식은 우리를 놀라게 했습니다. 짐작건대, 우리가 발견했을 때 이미 임신을 했었으나 부상 때문에 그 과정이 중단되었고 우리가 치료해줬을 때 임신이 재개된 것으로 보입니다. 오늘 이 티얀키가 새끼를 셋 출산했습니다. "
 MEM_BEACHED_PROJECT:0 "부상당한 티얀키 치료하기"
 MEM_BEACHED_PROJECT_DESC:0 "티얀키의 신체 구조에 대해 잘 알지 못하지만, 그렇다고 그냥 지나치기에는 이 고래의 상태가 꽤 심각해 보입니다. 도와주는 게 좋아 보입니다."
 mem_beached_space_whale_child_section:0 ""
 mem_beached_space_whale_section:0 ""
 mem_beached_vigor:0 "길 잃은 활력"
 mem_beached_wound:0 "오래된 상처"
