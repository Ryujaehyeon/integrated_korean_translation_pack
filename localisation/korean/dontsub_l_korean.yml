 message_dontsub_desc406:0 "무슨 소리죠? 왜 당신은 우리의 최신 §Y'어두운 그림자 신념'§!을 좋아하지 않나요? 당신은 우리의 주식 수익을 방해하는 그런 증오자 중 한 명이 틀림없습니다! 나는 당신의 죽음까지 메시지를 스팸으로 보내기 위해 존재하지 않는 그룹을 소환할 것입니다! 내 말을 명심하세요!!!"
 message_dontsub_desc407:0 "§R당신은 §H아동 안전§!에 대한 규칙을 위반했습니다.§!\n\n§E이것이 당신에게 의미하는 바:§!\n - 당신이 게시한 콘텐츠 중 하나 이상이 삭제되었습니다.\n - 당신의 계정은 영구적으로 정지되었습니다.\n - 이 위반은 §Y8.10.114514§!까지 당신의 계정 상태에 영향을 미칩니다.\n\n§E당신이 할 수 있는 일§!\n계정을 정상적으로 유지하려면, 우리의 §B서비스 약관§! 및 §B커뮤니티 가이드라인§!을 숙지하세요."
 message_dontsub_desc408:0 "인간은 3가지 주요 욕구를 가지고 있습니다: 음식, 수면, 사랑하기 - 즉, 근친 교배 동물입니다.\n\n오, 네! 당신의 동물이 동물원에서 근친 교배를 하려 하고 있습니다!"
 message_dontsub_desc409:0 "내가 발표할 거야. 핫도그 그림자는 게으르기 짝이 없어, 그는 내 와이프와 함께 '즐거운 시간'을 보내고 있어."
