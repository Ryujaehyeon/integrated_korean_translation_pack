 message_dontsub_desc386:0 "§P젠트리의 생명도 중요합니다! 우리 위대한 통치자에게 한 가지 질문이 있습니다: '당신은 언제부터 우리를 인간으로 대하기 시작할 것인가요?' *고개를 끄덕이며 더욱 강하게*§!"
 message_dontsub_desc387:0 "당신의 손 위치는 이러한 정치적 올바름만큼 중요합니다:\n1. 0도: 탑승 요청\n2. 15도: 누군가의 머리를 쓰다듬기\n3. 30-60도: §R오 안돼 당신은 외계인 쓰레기 숭배자입니다! 정화하라!!!!!!§!"
 message_dontsub_desc388:0 "0K4Y M473, 여기서 나는 50M37H1N6에 대해 이야기하고 있어. 아무도 심지어 나 자신도 이해할 수 없다는 것을 알아. 나는 여기서 4DD F1173r를 추가하기 위해 30P13이 다음을 할 시간을 가져야 해..."
 message_dontsub_desc389:0 "패치 3.1145141919810은 이러한 패치가 전혀 존재하지 않는다는 버그를 마침내 수정했습니다."
 message_dontsub_desc390:0 "행성 결정 §R'30% 시작 시 충돌'§!이 멀티플레이어 개발 스트리밍 중에 우연히 은하 전체에서 활성화되었습니다."
 message_dontsub_desc391:0 "Interstellaris는 종교 시스템 업데이트가 있었으며, 항상 우리의 §Y영광스러운 최고 패치 노트§!였습니다!"
 message_dontsub_desc392:0 "새로운 기원 아이디어: §Y느림보로 태어남§! - 10년마다 500% CPU0 속도 패널티를 받습니다."
 message_dontsub_desc393:0 "우주적 젠트리피케이션으로 법적으로 인정받는 유독성 행성을 낙원으로 변형하는 중대한 뉴스입니다."
