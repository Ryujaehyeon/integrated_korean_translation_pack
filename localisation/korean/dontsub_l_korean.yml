l_korean:
 dontsub.1.title:0 "설명을 읽어보세요"
 dontsub.1.desc:0 "훌륭한 작업입니다. '§H스타라리스(TM)에서 읽는 방법§!' 모드를 시작했습니다!\n\n이것은 작동 방식에 대한 아이디어를 제공해야 하며, 읽을 수 있다고 가정할 때 모드를 비활성화해야 합니다."
 dontsub.1.a:0 "네."
 dontsub.1.tooltip:0 "경고를 받았습니다. :3"
 message_dontsub_title:0 "알고 계셨나요?"
 message_dontsub_desc1:0 "§Y~90%§!의 Stellaris(TM) 플레이어는 읽을 줄 모르지만, 읽을 수 있다면 게임을 시작할 수 있습니다."
 message_dontsub_desc2:0 "수천 가지의 게임 경험이 있지만, §Y~90%§!의 플레이어가 설명을 읽지 못했습니다."
 message_dontsub_desc3:0 "이 모드는 이 모드의 구독을 취소할 것을 제안하지만, 당신은 그렇지 않으므로 게임 플레이의 나머지 부분 동안 읽지 않게 됩니다."
 message_dontsub_desc4:0 "§Y99%§!의 모드, 이 모드를 포함하여, 업적과 호환되지 않습니다."
 message_dontsub_desc5:0 "안녕하세요! 이 메시지를 볼 때마다 당신의 기술과 관련된 일이 있다는 것을 알고 계셨나요?\n\n읽기에 관한 무언가입니다."
 message_dontsub_desc6:0 "당신은 오른쪽 클릭으로 메시지를 쉽게 무시할 수 있기 때문에 읽는 방법을 모릅니다."
 message_dontsub_desc7:0 "별불가사리는 블로그보다 더 나은 마스코트입니다. 제 생각을 바꿔보세요."
 message_dontsub_desc8:0 "지역 신사가 시장을 완벽하게 균형 잡힌 시스템으로 칭찬하며, 어떤 착취도 없다고 말합니다."
 message_dontsub_desc9:0 "일부 지역 총독들이 광물 자원이 풍부한 지역에 수많은 농장을 세운 이유로 해임되었습니다."
 message_dontsub_desc10:0 "전 세계 모드 제작자 팀이 신비로운 존재 §Y'곧'§!을(를) 끝내기 위해 설립되었습니다."
 message_dontsub_desc11:0 "우리의 한 제독이 군함대가 다시 업그레이드해야 한다고 불평합니다. 그들은 자동 업그레이드 기능을 비활성화할 것을 제안합니다."
 message_dontsub_desc12:0 "문장이나 장황한 단어를 잘못 배치해도 독해 능력에는 영향을 미치지 않습니다."
 message_dontsub_desc13:0 "로컬 툰이 원로를 기괴한 방식으로 때립니다."
 message_dontsub_desc14:0 "외교관들은 다른 국가와의 관계를 해치기 위해 T-포즈를 선호합니다."
 message_dontsub_desc15:0 "유명한 게임 스튜디오는 논란이 많은 이야기 전개를 가진 §Y'그들이 우리를 골프 치다'§! 속편을 출시한 후 큰 성공을 거두었습니다."
 message_dontsub_desc16:0 "우리의 연구에 따르면 반감기가 3년인 방사성 액체가 예기치 않은 결과를 피하기 위해 밸브를 통과하는 데 예상보다 더 오랜 시간이 걸립니다."
 message_dontsub_desc17:0 "고대 시대의 사람들은 마법적인 순간 이동 능력을 가졌을지도 모른다는 연구가 있습니다."
 message_dontsub_desc18:0 "연구에 따르면 §Y~42%§!의 사람들이 자신이 또 다른 잃어버린 외계 종족이라고 믿고 있다고 합니다."
 message_dontsub_desc19:0 "중독된 지역 G카드 애호가가 2층 건물에서 떨어져 사망했습니다."
 message_dontsub_desc20:0 "은하 자체가 고차원 존재의 놀이터라는 새로운 증거 - "은하 크기의 거대 구조물"이 존재합니다!"
 message_dontsub_desc21:0 "군사 연구원들이 함대를 '파멸의 더미'로 쌓는 궁극적인 방법을 발견했습니다."
 message_dontsub_desc22:0 "연구에 따르면 모든 유기체 종의 출생률은 약 3주기이며, 그 이유는 여전히 알려져 있지 않습니다."
 message_dontsub_desc23:0 "계단이 롤링 로봇의 탈출을 저지하고, 전문가들은 더 많은 계단을 건설할 것을 제안합니다."
 message_dontsub_desc24:0 "자원 사용률은 여전히 §Y'구역 총독'§! 제거 이후 사상 최고치를 기록하고 있습니다."
 message_dontsub_desc25:0 "최신 프로세서에 대한 수백만 건의 사전 주문 - 작은 기능으로 동일한 생산에도 불구하고."
 message_dontsub_desc26:0 "다중 코어에 대한 연구가 §Y'단일 코어'§! 문제에 대해 발표되지 않았습니다."
 message_dontsub_desc27:0 "잘 알려진 웹사이트의 전사들이 권력에 대한 탐욕 게임 이후 '사라졌습니다'."
 message_dontsub_desc28:0 "선사 시대 중세 텔레포트 기능 계획이 알 수 없는 이유로 취소되었습니다."
 message_dontsub_desc29:0 "은하 어딘가에서, 화석을 숭배하는 것은 그들의 안내자로부터의 영예입니다." #HAIL FELIX"
 message_dontsub_desc30:0 "팝은 §Y'정화'§!될 경우 사망할 수 있습니다."
 message_dontsub_desc31:0 "시장에 판매하여 자금 세탁 혐의로 지역 총독이 체포되었습니다."
 message_dontsub_desc32:0 "최신 재난 기록 §Y'내 역할 수행 경험을 바탕으로'§!."
 message_dontsub_desc33:0 "가상 자산 파괴로 인해 크리퍼가 처형되었습니다. 아, 맙소사."
 message_dontsub_desc34:0 "우리 중 많은 이들이 §Y'정화는 노력 없이 할 수 있다'§!는 방법을 알고 있습니다."
 message_dontsub_desc35:0 "지역 기술자들이 다시 공항이 무엇인지 잊어버렸습니다."
 message_dontsub_desc36:0 "중독을 위한 금지된 속담인 '§Y'한 턴만 더'§!입니다."
 message_dontsub_desc37:0 "평화 유지자들은 그들의 폭발적인 전략으로 전쟁광으로 드러났습니다."
 message_dontsub_desc38:0 "모바일 게임 개발자가 'The'라는 단어의 상표를 등록한 후, 그러한 결정을 폐기합니다."
 message_dontsub_desc39:0 "§Y'고핑 전사'§!는 행운을 안고 게임 리그에서 승리합니다."
 message_dontsub_desc40:0 "최신 함선 기술은 함선이 조준 없이 360도 회전할 수 있게 해줍니다."
 message_dontsub_desc41:0 "하이프 제품 §Y'사이버버그 7702'§!는 또 다른 10년이 지연되었습니다."
 message_dontsub_desc42:0 "다른 팀원에 의해 20년 동안 문에 갇혀 있던 지역 집행관이 풀려났습니다."
 message_dontsub_desc43:0 "§Y'빠른 인구 생성 후 재정착'§!의 식민지 계획이 노출되었습니다."
 message_dontsub_desc44:0 "은하에서 표본을 인사하는 방법은 10086가지가 있습니다 - 사실입니다!"
 message_dontsub_desc45:0 "연구에 따르면, 전체 은하계 시스템은 우리가 경험한 것보다 오십-육십 주기 후에 훨씬 느려질 것입니다."
 message_dontsub_desc46:0 "한 뉴스 기자가 질문을 했습니다: §Y'왜 죽지 않나요?'§!. 답변은 다음과 같았습니다: \n\n§Y'설명을 읽어보세요, 아들.'§!."
 message_dontsub_desc47:0 "대부분의 플레이어는 그래픽 설정을 초저로 설정하면서 §Y'카운터 어택'§!에서 최고의 하드웨어를 사용합니다."
 message_dontsub_desc48:0 "로컬 모더들이 실수로 message_whyyouevenusingthemod_114514_desc로 로컬라이징을 인코딩했습니다."
 message_dontsub_desc49:0 "파라독스에 대한 경의를 표하는 대규모 전략 게임 팬 그룹입니다."
 message_dontsub_desc50:0 "한 지역의 기계적 인간이 §Y81,000§! 에너지 크레딧을 청구하며, 이를 수리의 합리적인 가격이라고 주장합니다."
 message_dontsub_desc51:0 "문명 존재 이래로 여전히 문제를 해결하려고 애쓰는 과학자들."
 message_dontsub_desc52:0 "지역 특사는 사람들의 경력을 악수로 끝낼 수 있다고 전해집니다."
 message_dontsub_desc53:0 "새로운 모욕적인 표현이 §Y'내 최종 점수는 87이며, 더 높을 수 없다'§!."
 message_dontsub_desc54:0 "§Y'다음 번에는 반드시'§! 뉴스에 넘쳐났습니다."
 message_dontsub_desc55:0 "지역 기자가 온도를 측정하기 위해 온도계를 땅에 꽂습니다."
 message_dontsub_desc56:0 "§Y스팀파일§! 판매 중, 구매자는 §B'구매해 주셔서 감사합니다!'§!라는 읽지 않은 메시지가 쏟아질 것입니다."
 message_dontsub_desc57:0 "Typowritten man hired by '당신은 괜찮고, 당신의 말은 예쁩니다'."
 message_dontsub_desc58:0 "악명 높은 올해의 단어: §Y'괜찮아요, 복수를 위해 당신을 찾기 위해 먼 길을 왔지만, 단순히 놓아주고 당신이 제 가족을 정화 중 한 것, 그리고 제 잘린 두 손가락을 포함해 용서한다고 말하기 위해서입니다.'§!"
 message_dontsub_desc59:0 "지역 제독은 선체에 부착된 누드 전함과 하나의 관통 X-슬롯 무기가 먼 거리에서 모든 우주 전투를 끝낼 수 있다고 말합니다. 3.6은 그러한 주장을 일축합니다."
 message_dontsub_desc60:0 "§Y'기본 춤'§! 문화는 시간이 지남에 따라 더 위험해집니다."
 message_dontsub_desc61:0 "§Y'500% 얼굴 애니메이션'§!의 지지자들은 새로운 애니메이션의 출시와 함께 열광했습니다."
 message_dontsub_desc62:0 "지역 테마파크 소유자가 §Y500§! 팝의 신비로운 실종에 대해 무죄로 판결받았습니다."
 message_dontsub_desc63:0 "지역 사육사가 관광객의 파손 행위에 대해 위험한 동물로 그들을 가두어 처벌합니다."
 message_dontsub_desc64:0 "지역 테마파크 롤러코스터 차량이 고속으로 붐비는 길로 돌진하여 수많은 팝이 하늘로 날아갔습니다." #RCT3 &Planetcoaster"
 message_dontsub_desc65:0 "놀라운 사실입니다! 무의미한 제목이 실제로 존재합니다!"
 message_dontsub_desc66:0 "지역 제독은 미사일이 존재하지 않는 한, 그들의 함선이 가진 무기를 선호합니다."
 message_dontsub_desc67:0 "부정 행위 탐지 프로그램의 프로그래머가 코드를 엉망으로 만들어 대규모 잘못된 차단이 발생했습니다."
 message_dontsub_desc68:0 "합금이 과잉 생산되는 것은 §Y'메타 게임 플레이 기회'§!라고 합니다."
 message_dontsub_desc69:0 "우주선은 초광속 속도 제한을 위반하여 성계 위를 비행할 때 속도 위반 티켓을 받을 수 있습니다."
 message_dontsub_desc70:0 "§Y'위대한 카메라맨'§! 시리즈는 수많은 죽음을 견뎌내며 인기를 얻습니다."
 message_dontsub_desc71:0 "예술가는 사기 행위로 수백만을 벌어들이며, 그들의 작품은 §Y'iS aRt'§!이라고 주장했습니다."
 message_dontsub_desc72:0 "지역 플레이어들은 여전히 수정되지 않은 용어 §Y'무작위 충돌'§! 때문에 다시 잠에 들었습니다."
 message_dontsub_desc73:0 "사람들이 멈출 기미 없이 춤추는 사람에게 정신이 팔렸습니다."
 message_dontsub_desc74:0 "새로운 그래픽 하드웨어 §Y'LTX 7690 Super Ti Max Q'§!가 발표되었습니다. 가격은 단 하나의 성계입니다."
 message_dontsub_desc75:0 "논란이 되는 법안 §Y'어린이 개인정보 보호법'§!이 아동을 애완동물로 취급하는 것으로 드러났습니다."
 message_dontsub_desc76:0 "지역 집행관이 1,991 에너지 크레딧에 베타리안 스티커를 원했습니다."
 message_dontsub_desc77:0 "§Y'수상해 보인다'§!, 라고 말한 것은 할 일이 엄청나게 많은 신경증적인 과학자였다."
 message_dontsub_desc78:0 "§Y'자동 잡기'§!가 다시 돌아왔습니다. 새로운 속편의 진행이 또 한 해 지연될 것입니다."
 message_dontsub_desc79:0 "과학자가 새로운 메타를 발명했습니다. 그 힘은 9,000을 넘습니다."
 message_dontsub_desc80:0 "수백 발의 운동 에너지가 그들의 머리에 박힌 후에도 지역 집행관들은 살아남았습니다."
 message_dontsub_desc81:0 "10세 어린이가 30년 이상의 경험을 가지고 있습니다. §Y메가코프(TM)§!는 그저 꿈꿀 수 있을 뿐입니다."
 message_dontsub_desc82:0 "신제품 성능 비약적 향상 제품 §Y'LTX 4090'§!이 즉시 매진되었습니다. 고객들은 주문할 기회조차 없습니다."
 message_dontsub_desc83:0 "§Y'Left 4 More'§!는 10년의 침묵 후 가장 대규모로 돌아왔습니다."
 message_dontsub_desc84:0 "Pitchfork는 §Y'역사상 가장 위험한 근접 무기'§!으로 평가되며, 다양한 사람들이 숙련되었습니다."
 message_dontsub_desc85:0 "§Y'새해 복 많이 받으세요'§! 효과는 연초가 평소보다 훨씬 느리게 진행될 수 있습니다."
 message_dontsub_desc86:0 "유명한 작가가 §Y'게이트웨이'§!를 §Y'기부품'§!으로 잘못 썼습니다."
 message_dontsub_desc87:0 "10년 된 클래식 보드 게임이 매력적인 이유 없이 최신 게임의 표절로 비난받고 있습니다!"
 message_dontsub_desc88:0 "인기 없는 재미있는 사실: 기다릴수록 미래에 더 많은 기능이 나타납니다!"
 message_dontsub_desc89:0 "§Y'지도자 원'§!는 역대 가장 인기 있는 이름으로 투표되었습니다."
 message_dontsub_desc90:0 "§Y'CPU0 위기'§!는 잘 훈련된 패러독스인들에 의해 '-dx1337'이라는 추가 줄로 저장되었다고 전해진다."
 message_dontsub_desc91:0 "당신의 제국이 통합으로 당신을 고용할 때, 당신은 보상 없이 그들을 위해 일합니다. 정말 훌륭한 직원입니다!"
 message_dontsub_desc92:0 "왜 이런 헛소리 메시지를 읽는 데 시간을 낭비하나요?"
 message_dontsub_desc93:0 "당신은 읽는 법을 모릅니다. 이 문장은 거짓입니다."
 message_dontsub_desc94:0 "내 새 비디오를 확인해 보세요!\n\n링크: §BdQw4w9WgXcQ§!" #Rickroll"
 message_dontsub_desc95:0 "평균적으로, 패러독스인들은 4개월의 휴가를 가지며, 이는 모든 완벽한 균형 설정이 착취 없이 이루어지는 이유를 설명합니다."
 message_dontsub_desc96:0 "대부분의 모드 사용자는 모드를 사용자 정의하기보다는 모드 팩을 사용할 것입니다. 이러한 모드 팩은 게임이 버전 업데이트를 받을 때마다 항상 구식이 됩니다."
 message_dontsub_desc97:0 "메시지 아이콘은 :3처럼 보입니다."
 message_dontsub_desc98:0 "§R모든 모드를 구독 해제해 주세요. 뭔가 잘못되었습니다.§!"
 message_dontsub_desc99:0 "모드를 사용하여 승리하는 것은 당신을 §Y'모드 치타'§!로 만듭니다. 당신의 은신처로 좋은 게임 의자를 준비하는 것이 좋습니다!"
 message_dontsub_desc100:0 "게임에서 아이언맨 모드가 아닌 경우, 콘솔에 'quit'를 입력하여 게임에서 승리할 수 있습니다."
 message_dontsub_desc101:0 "§M제논 뉴스§!를 믿지 마십시오. 절대 그들을 믿지 마십시오."
 message_dontsub_desc102:0 "우주 유니버설 V - 모두의 CPU0를 멜트다운시키는 가장 심각한 게임입니다."
 message_dontsub_desc103:0 "모든 종족을 위한 사회적 네트워킹, 페이셜 블로그."
 message_dontsub_desc104:0 "새로운 외계인, 새로운 맛! Xenobell의 완전히 새로운 맛 선택을 소개합니다!"
 message_dontsub_desc105:0 "신뢰할 수 없는 후원: 제논 뉴스 - 은하에서 가장 신뢰받는 뉴스 출처(의문이 드는)."
 message_dontsub_desc106:0 "모든 'Did You Know' 사실은 '우주 침략: 거대 전설'의 후원으로 제공됩니다."
 message_dontsub_desc107:0 "카한VPN, 서핑할 때 최고의 VPN 서비스입니다. 온라인 보안은 단 한 번의 클릭으로 시작됩니다."
 message_dontsub_desc108:0 "내면이 죽어 있는 기분은 어떤가요? 10시간 동안 멈추지 않는 캠페인, 오직 Paradox Games에서만." #모든 Paradox 게임"
 message_dontsub_desc109:0 "vup 5j4up jp6`-`-fm06up6ck6vu4yjo4s06qi4u4au4a83`,ao6u.35 u `.\" #신주음문－－전은하계 최난파역 비밀번호, 없다."
 message_dontsub_desc110:0 "모든 비디오에서 $message_dontsub_desc110$와 같은 끝없는 폭격이 있는 당신이 가장 좋아하는 미디어 사이트입니다."
 message_dontsub_desc111:0 "문제 해결이 필요하신가요? §B<Blu_trade_mark>§!? 이제 매달 §Y<1991 Krom3r>§!만 지불하시면 됩니다. 더 이상 모든 문제를 처리할 필요가 없습니다!! 최신 소프트웨어로 그들을 다루세요!!! 그게 바로!!! §R<Hyperlink blocked.>§!"
 message_dontsub_desc112:0 "펠로우튜브, 너 자신을 방송해, 베이비시터가 아니야."
 message_dontsub_desc113:0 "§G논디아 빵§!은 미래의 빵으로, 996 에너지 크레딧부터 시작하여 저희 BDDR420 빵의 프리미엄 품질 슬라이스 69개에 접근할 수 있습니다. 더 건강하게 사세요."
 message_dontsub_desc114:0 "우리는 매우 중요한 제프 비즈니스를 하고 있습니다. 함께 참여해 주시고 제프가 당신과 함께 하기를 바랍니다! - Jeff.com"
 message_dontsub_desc115:0 "§R<<입력 메시지가 여기에 들어갑니다>>§!"
 message_dontsub_desc116:0 "외계 사육사로서 당신은 동물에게 단 두 개의 타일만 필요하며, 이를 통해 순식간에 1,000명의 손님을 유치할 수 있습니다."
 message_dontsub_desc117:0 "AI 제국을 착취하기 위해 §Y호의§!를 사용하는 것은 더 어려운 난이도에서 매우 효과적입니다."
 message_dontsub_desc118:0 "최신 CPU가 파라독스인들이 새로 출시한 게임인: 인터스텔라리스 II에 패배했습니다."
 message_dontsub_desc119:0 "메시지가 짜증나신가요? 설명을 읽으면 이 문제를 해결할 수 있습니다."
 message_dontsub_desc120:0 "§Y~48.763%§!의 게임 충돌 문제는 모드를 구독 해제함으로써 해결할 수 있습니다."
 message_dontsub_desc121:0 "어떤 소비재가 할머니가 말하길: §R시작합니다.§!"
 message_dontsub_desc122:0 "연구에 따르면 블로그는 당신을 버리고 사막으로 달려가면서 결코 당신을 포기하거나 실망시키지 않을 것입니다."
 message_dontsub_desc123:0 "대부분의 표본은 평생 사용할 수 있는 아이템보다 페이-투-워너비 아이템에 에너지 크레딧을 더 쓰는 경향이 있습니다."
 message_dontsub_desc124:0 "파라독스인들은 §Y50%§!의 휴일과 §Y49%§!의 하드코드 모딩으로 구성되며, 마지막 §Y1%§!는 모드를 충돌시키는 기능입니다."
 message_dontsub_desc125:0 "외계인들은 인간 테마의 애니메이션이 어떤 면에서도 이상하다고 생각하며 그 매력을 결코 이해하지 못할 것입니다."
 message_dontsub_desc126:0 "대부분의 애니메이션 종족은 인간 기준으로 여성 표본이며, 외계종 혐오자들은 이를 이단으로 간주합니다."
 message_dontsub_desc127:0 "은하계는 블록으로 구성되어 있습니다."
 message_dontsub_desc128:0 "장군은 실제가 아니며, 조심스럽게 다루어야 할 일종의 약물입니다."
 message_dontsub_desc129:0 "국가가 존재할 때, 그것은 그들의 돈이거나 그들의 생명입니다."
 message_dontsub_desc130:0 "은하에서 흥미로운 숫자는 §Y69§!, §Y420§!, §Y1337§!, §Y1453§! 및 §Y114514§!입니다."
 message_dontsub_desc131:0 "두꺼비 외계인이 나타날 때마다 그들은 보통 검은 안경을 쓰고 있으며, 이는 그들이 지혜롭고 불로장생한 원로이기 때문입니다."
 message_dontsub_desc132:0 "연구에 따르면 귀여운 외모를 가진 종족은 외계종 혐오 경향이 있는 것으로 나타났습니다."
 message_dontsub_desc133:0 "§Y'우버워치'§!는 가장 정치적으로 올바른 것으로 평가되지만 실제로는 최악의 정치적 올바름입니다."
 message_dontsub_desc134:0 "모드 사용자가 모드를 설치할 때마다, 그들은 모드 제작자의 선전적인 생각을 받게 됩니다."
 message_dontsub_desc135:0 "ALT+F4 또는 Ctrl+W 조합 키를 사용해 보셨나요? 정말 효과적입니다."
 message_dontsub_desc136:0 "역대 최고의 베스트셀러 콜라:\n1.§M즈로콜라§!\n2.기타"
 message_dontsub_desc137:0 "당신의 게임은 강력한 단일 코어 의존 은하 덕분에 언제든지 충돌하거나 실행이 중단될 수 있습니다."
 message_dontsub_desc138:0 "최신 스피드런 트릭은 게임을 시작하기 전에 크래시를 일으키는 것입니다."
 message_dontsub_desc139:0 "Zro는 맛있는 §MZrocola§!을 만들지 않는 한 필요하지 않습니다."
 message_dontsub_desc140:0 "가장 구식인 게임 기능은 타락한 제국과 그들의 각성 상태입니다. 상호작용할 수 있는 요소는 없습니다."
 message_dontsub_desc141:0 "지상 전투에서, 장군들은 스스로 전선으로 돌진하여 죽는 것을 선호합니다."
 message_dontsub_desc142:0 "투기장 계승 중, 배틀 로얄 규칙을 아는 플레이어는 보통 패배합니다."
 message_dontsub_desc143:0 "선택받은 사회에 대해 이야기할 때, 사람들은 최신 모바일 기기와 그 XL 버전을 언급하고 있습니다."
 message_dontsub_desc144:0 "당신은 생계를 위해 집이 필요하지 않습니다. 하나의 행성은 원하는 만큼 많은 팝을 수용할 수 있습니다."
 message_dontsub_desc145:0 "모드가 깨지는 것이 아니라, 게임이 깨집니다."
 message_dontsub_desc146:0 "지상 전투가 진행 중일 때마다 공격자와 방어자는 아이언하트 V 캠페인을 진행합니다."
 message_dontsub_desc147:0 "§Y'스핀 봇팅'§!이 지상 전투에서 점점 더 흔해지고 있습니다."
 message_dontsub_desc148:0 "연구가 완료되면, 수석 과학자들이 모여 카드 세트를 뽑습니다."
 message_dontsub_desc149:0 "팝은 정화되지 않는 한 생존을 위해 음식이나 에너지가 필요하지 않습니다."
 message_dontsub_desc150:0 "범죄자들은 세금을 내기를 거부하면서 경제를 망치는 것을 좋아합니다."
 message_dontsub_desc151:0 "§YModVIPs§!가 사용자에게 통합으로 지불할 것을 요구할 때, 그들은 통합으로 지불하라는 의미입니다."
 message_dontsub_desc152:0 "사절단은 죽지 않고, 다시 태어납니다."
 message_dontsub_desc153:0 "대부분의 후반 게임 지연은 많은 수의 함선으로 함대를 조작할 때 발생합니다."
 message_dontsub_desc154:0 "높은 난이도의 AI는 목표를 설정하는 데 있어 어리석습니다. 이는 그들이 메타게이머를 초월할 수 없음을 의미합니다."
 message_dontsub_desc155:0 "당신은 100개 이상의 §Y스콜라리움§!이 당신이 은하에서 승리하는 데 도움을 줄 수 있을 때 다른 종속 유형이 필요하지 않습니다."
 message_dontsub_desc156:0 "모드 사용자는 첫날에 게임을 즉시 충돌시킬 수 있으며, 게임을 시작하기 전에도 가능합니다."
 message_dontsub_desc157:0 "§Y스팀파일§! 사용자는 읽기 전에 모드에 대한 댓글을 다는 것을 좋아합니다."
 message_dontsub_desc158:0 "하루살이 플레이어는 보통 100년이 되기 전에 게임을 포기합니다."
 message_dontsub_desc159:0 "파라독스인들은 메타에 얽매이지 않는 경쟁적인 플레이어들이 서로 대결하는 모습을 보는 것을 좋아하며, 이를 바탕으로 게임 밸런스를 결정합니다."
 message_dontsub_desc160:0 "§Y외계인 호환성§!은(는) 귀하의 종족 페이지에 거대한 검은색 조각이 있는 다채로운 무지개를 채울 수 있게 해줍니다. 이것이 저주받은 이유이며, 재작업이 필요합니다."
 message_dontsub_desc161:0 "격리된 직원들은 실상 광적인 정화자로, 그들의 임무는 §Y'정화'§!하여 격리된 실업자를 처리하는 것입니다."
 message_dontsub_desc162:0 "미숙한 노동자는 실제 삶의 팝과 마찬가지로 전문가나 통치자로 승진할 수 있습니다."
 message_dontsub_desc163:0 "정신주의 타락 제국이 모두에게 화를 내고 있습니다. 그들은 §Y'신성한 행성'§!과 아무런 관련이 없는 이들에게 이유 없이 분노하고 있습니다."
 message_dontsub_desc164:0 "메탈리스트 타락 제국은 유능한 지도자들의 실종과 그들의 날카로운 태도에 대한 책임이 있다고 비난받았습니다."
 message_dontsub_desc165:0 "§Y'블러터'§! 새로운 CEO가 과학자의 절반을 해고하여 파괴적인 주가 하락과 함께 대규모 난민 파동을 일으켰습니다."
 message_dontsub_desc166:0 "§Y'블러터'§!의 새로운 CEO는 안전한 은하 거래를 위해 소국들이 적대적인 국가에 주권을 포기해야 한다고 제안합니다. 대부분의 국가 지도자들은 이러한 제안을 반대합니다."
 message_dontsub_desc167:0 "§Y'블러터'§!의 새로운 CEO의 더러운 계획이 전체 블러터를 제노니온으로 노예화하려는 것이 드러났습니다."
 message_dontsub_desc168:0 "§Y90%§!의 평균 모드는 전 세계의 커뮤니티 모더들에 의해 관리됩니다. 이는 또한 그들 중 적어도 절반이 영어에 익숙하지만, 순수한 원어민 플레이어들이 만족할 만큼 원어민이 아니라는 것을 의미합니다. 이들은 수정 모드를 만들기보다는 그들을 비난하는 경향이 있습니다."
 message_dontsub_desc169:0 "현명한 사람이 말했습니다: 사람들을 비판하려면 먼저 외계종 선호가 되어 그들의 이념을 정화 중 하지 마십시오."
 message_dontsub_desc170:0 "은색 플레이어가 §Y'AI가 최대 기술을 연구하며 속이고 있습니다'§!를 주장하고 있으며, 결국 플레이할 수 없는 타락한 제국으로 판명되었습니다."
 message_dontsub_desc171:0 "패배하는 게임을 만난 경우, 그냥 삭제하고 새 게임을 시작하세요."
 message_dontsub_desc172:0 "§Y'RNG 장막'§!은 대부분의 플레이어 기준으로 여전히 저주받아 있습니다."
 message_dontsub_desc173:0 "너는 수많은 DLC를 감당할 수 없다고? 에너지 크레딧을 사용하지 마! 그냥 §YU N I T Y§!로 사면 돼!"
 message_dontsub_desc174:0 "우주 간의 밈을 만드는 단계:\n1. 즈로 사용하기\n2. §Y???§!\n3. 이익!"
 message_dontsub_desc175:0 "잠을 잘 이루지 못한다면, 침대 아래에 §Y휘발성 먼지§!를 두세요."
 message_dontsub_desc176:0 "대부분의 레이싱 게임은 현재 §Y이국적 기체§!를 차량 속도 증가로 사용합니다."
 message_dontsub_desc177:0 "타락한 제국이 중요한 이유: \n §Y 1. 함선 구성 요소 \n 2. 1개의 팝으로 유지되는 건물 \n 3. 무료 음식/노예/팝 §!"
 message_dontsub_desc178:0 "§Y'블러터'§!의 새로운 CEO는 모든 직원에게 과중한 업무를 하거나 집에 가라고 요구하고 있으며, 투자자들은 패닉에 빠졌습니다."
 message_dontsub_desc179:0 "§Y스팀파일§! 댓글 작성자의 99%가 §Y디스코프§!를 통해 모더와 연락하지 못했습니다."
 message_dontsub_desc180:0 "§Y스팀파일§! 댓글 작성자의 평균 나이는 약 17세 이하로, 이는 모드 제작자들이 그들의 기준으로 부모라는 것을 의미합니다."
 message_dontsub_desc181:0 "너무 많은 DLC가 있나요? 모든 DLC를 한 번에 소유할 수 있는 구독 DLC를 이용해 보세요. 가격은 4.99 에너지 크레딧부터 시작합니다."
 message_dontsub_desc182:0 "신형 그래픽 장치 §G'LTX 690'§!의 무기화가 확인되었으며, 핵 미사일 추적에 사용할 계획입니다."
 message_dontsub_desc183:0 "당신이 1등 플레이어가 되고 싶다면, 도망치는 초위기를 쫓아야 합니다!"
 message_dontsub_desc184:0 "§Y'신합성'§!은 파라독스인들이 코딩한 대량 자살로, 팝을 제거한 후 새로운 팝을 생성하는 방식입니다."
 message_dontsub_desc185:0 "§Y'사이오닉으로 가기'§!는 당신을 RNGesus의 자비에 맡기는 것을 의미합니다."
 message_dontsub_desc186:0 "운이 좋고 교활한 계획이 필요하기 때문에 §Y'생물학으로 가기'§!는 없습니다."
 message_dontsub_desc187:0 "§Y'사이버로 가기'§!는 당신이 사무라이이지만 §Y사이버사이코§!이기도 하며, 정화 중인 방관자들을 이유 없이 사랑하는 것을 나타냅니다."
 message_dontsub_desc188:0 "국내 전문가들은 실업자에게 세금을 부과하여 국가에 이익이 되도록 해야 한다고 제안합니다. 메가코프(TM) 승인."
 message_dontsub_desc189:0 "§Y사이버네틱§! 특성 아이콘은 일반적인 USB Gen... 3.1 또는 3.2와 비슷해 보입니다. 이름만으로는 차이를 잘 알 수 없습니다."
 message_dontsub_desc190:0 "사이오닉 아이콘은 이상한 전자레인지와 함께 윙윙거리는 DNA 가닥처럼 보입니다."
 message_dontsub_desc191:0 "벌로서의 초상화나 특성이 있다고 해서 광물 생산에 효율적인 벌 작업자가 되는 것은 아닙니다."
 message_dontsub_desc192:0 "낚시꾼은 물고기처럼 행동하면 잡히는 것을 좋아합니다."
 message_dontsub_desc193:0 "당신은 §Y+5%§! 직업 출력 특성을 가지고 있었나요? 다른 것으로 교체하는 것을 고려해 보세요."
 message_dontsub_desc194:0 "현재의 트랜스젠더 문제에 대한 질문은 미래의 고고학자들에게 달려 있으며, 그들은 이러한 고대 종족이 생물학적 특성에 따라 남성인지 여성인지 판단할 것입니다."
 message_dontsub_desc195:0 "당신의 속국에 대해 걱정하지 마세요 - 그들은 단순히 §R매우, 매우 화난§! 타락한 제국과 상관없이 모든 거주 가능한 행성을 식민지화할 것입니다."
 message_dontsub_desc196:0 "게임이 예고 없이 충돌하나요? 어떻게 해야 할지 아시겠죠.\n\n§E§H버그 보고서를 작성하세요!(편집됨)§!\n§Bhttps://forum.paradoxplaza.com/forum/forums/stellaris-bug-reports.941/§!\n\n§H런처 문제:§! 런처 문제를 보고하려면 §Bhttp://support.paradoxplaza.com/§!§!\n\n§Y주의: Paradoxians는 모드로 인한 충돌에 대해 책임을 지지 않습니다.§!"
 message_dontsub_desc197:0 "모드팩 충돌 수정 방법 101:\n§E1. 모드팩 구독 해제\n2. 수정됨§!"
 message_dontsub_desc198:0 "게임에서 속도 기록을 세울 수 없습니다. 은하가 약 §Y~99%§! 확률 기반이기 때문입니다."
 message_dontsub_desc199:0 "초기 전쟁광은 패러독스인들이 게임이 어떻게 작동하는지 모른다고 불평하며, 가장 낮은 거주 가능한 세계, 보장된 행성 없음, 원시 문명 없음, 최고 하이퍼라인, 완전한 버려진 게이트웨이, 웜홀 없음, 최대 물류 성장 한도, 성장 필요 스케일링 없음, 완전한 AI 제국과 조기 시작, 완전한 타락한 제국, 약탈자 제국 없음, 최대 위기 강도, 그랜드 제독 난이도, 가장 이른 중후반 게임 날짜 설정으로 게임을 이기기 쉽다고 주장합니다.\n\n하지만 게임이 RNGesus에 기반하고 있으며 완벽한 시작을 얻기 위해 수없이 게임을 재시작한다는 것을 잊습니다."
 message_dontsub_desc200:0 "모든 전쟁광 메타게이머들은: 2205년경 적의 수도를 급습하고, 팝을 훔치고, 무엇보다 연구를 우선시하며, 반복합니다.\n\n누군가는 왜 제노사이드 제국이 이것보다 열등한지 궁금해할 것입니다."
 message_dontsub_desc201:0 "§Y'모든 종족은 애니메이션 소녀 같은 와이프'§! 모드팩을 비활성화해 주세요. §R'황제는 보호하신다'§!를 사용하여 분위기에 맞춰 주세요.\n\n그들 중 대부분은 몸을 움직이는 방법조차 모릅니다, 아시죠."
 message_dontsub_desc202:0 "§Y'당신의 과학자 함선을 구출하세요'§!는 역대 최악의 이벤트 중 하나로 평가되며, 마이크로 관리 없는 경험에 작별을 고하세요!"
 message_dontsub_desc203:0 "인공적으로 건설된 세계에서 버려진 테라포밍 장비가 발견되었습니다. 전문가들은 그 이유를 설명할 수 없습니다."
 message_dontsub_desc204:0 "인간의 눈에는 외계인이 애니메이션 소녀이거나 외계 쓰레기입니다."
 message_dontsub_desc205:0 "대단합니다! 당신의 게임이 아직 충돌하지 않았습니다!"
 message_dontsub_desc206:0 "블로르튜버 §Y'Str4t'§!가 §Y'우주에 대해 아는가'§! 시리즈를 가지고 있다는 사실을 알고 계셨나요? 그의 채널을 확인해 보세요!"
 message_dontsub_desc207:0 "AI는 100명의 제독을 고용하고 그들이 함대를 이끌지 못하게 하는 것을 좋아합니다."
 message_dontsub_desc208:0 "왜 §Y'행성 조형가'§! 봉우리를 선택하겠습니까? 더 위대한 것이 있으니: 아콜로지 프로젝트!"
 message_dontsub_desc209:0 "그런데 월마다 +0.01 정도의 자원을 주는 특성이 있고, 요구되는 특성 비용이 과대평가된 것을 본 적이 있나요? 저도 그렇지 않습니다."
 message_dontsub_desc210:0 "연합은 빠른 페이즈 플레이어에게 여전히 너무 느립니다. 정점까지 완전히 업그레이드하는 데 약 100년이 걸렸습니다."
 message_dontsub_desc211:0 "카이저라는 이름을 들어본 적이 있나요? 그는 여행자에게 달려가서 말할 종족입니다: §Y'당신의 돈이냐, 당신의 생명이냐.'§!"
 message_dontsub_desc212:0 "블로르그튜버 §Y'3peo'§!가 §Y'1444x 위기'§! 설정으로 도전합니다."
 message_dontsub_desc213:0 "§Y'/r/Interstellaris'§!라는 곳이 있으며, 그곳에서 블로르그들이 서로 인사하고 콘텐츠를 공유합니다."
 message_dontsub_desc214:0 "블로르그튜버 §Y'플레이어 M0ntu'§!가 모든 것이 그래야 하는 완벽한 균형 속에서 게임을 깨는 방법을 가르쳐 줍니다."
 message_dontsub_desc215:0 "블로르그튜버 §Y'4_Sp3c'§!는 사람들이 인터스텔라리스에서 최신의 모든 팁과 요령을 구매해야 한다고 제안합니다."
 message_dontsub_desc216:0 "message_dontsub_desc216: \n \n \n...당신은 잘못 보고 있는 것이 아닙니다."
 message_dontsub_desc217:0 "§Y'생물학 연구 시작'§! 여전히 나쁘다. 사람들은 아무것도 없는 사회 연구에 비용을 지불하기 때문이다."
 message_dontsub_desc218:0 "외계 제국들은 때때로 다른 제국들이 자신의 데이터베이스를 해킹한다고 주장할 정도로 지나치게 과장되기도 합니다."
 message_dontsub_desc219:0 "AI는 게임 속도를 늦추기 위해 초계함을 대량으로 건조하는 것을 좋아합니다. 그러므로 상황이 악화되기 전에 그들을 파괴하는 것이 좋습니다!"
 message_dontsub_desc220:0 "왜 §Y대제독§!을(를) 플레이하여 게임이 느려지게 하나요? 게임을 하지 않으면 §Y'은하 시뮬레이터'§!가 고통받지 않을까요?"
 message_dontsub_desc221:0 "§Y모드 잼§!은 §Y밈 잼§!이라고도 불립니다."
 message_dontsub_desc222:0 "다른 블록의 세계를 침략하려는 것은 불법입니다."
 message_dontsub_desc223:0 "왜 FTL 여행과 즉각적인 통신이 가능한데 §Y'어두운 숲'§! 이론을 숭배하나요? 또한, §Y'정화하라'§! 대신 다른 제국을 속국으로 만드는 것이 더 좋습니다. (경제에 나쁘니까요, 바보들!)"
 message_dontsub_desc224:0 "그들을 이길 수 없다면, 그들과 함께 하십시오."
 message_dontsub_desc225:0 "범죄 유산은 게임 플레이와 역할 놀이에서 절대 쓰레기입니다. 그들을 만난다면, 당신의 윤리관에 관계없이 그냥 파괴하세요!"
 message_dontsub_desc226:0 "연구에 따르면 모든 외계종 혐오 제국은 먼저 파괴되는 경향이 있습니다. 이것은 당신이 이른바 §Y'깊고 어두운 숲'§! 이론과 그 드라마 시리즈를 믿을 때 일어날 일입니다."
 message_dontsub_desc227:0 "키보드를 청소했나요? 지문과 먼지가 저렇게 쌓여있어요!"
 message_dontsub_desc228:0 "기억해, 꼬마야, 파라독스 게임에서는 사용자 지정 단축키 버튼이 존재하지 않아!"
 message_dontsub_desc229:0 "유용한 단축키 버튼입니다: \n §YZ, X, C, B, H, J, +, -, Tab, 및 Space! §!"
 message_dontsub_desc230:0 "중반 위기가 존재하지 않습니다! 그들은 모두에게 너무 강인하거나 발생하기 전에 파괴됩니다!"
 message_dontsub_desc231:0 "게임 내 음악 플레이어가 게임을 멈추게 합니다. 노래가 길어질수록 상황이 더 나빠집니다!"
 message_dontsub_desc232:0 "모든 DLC는 §Y9.99$§!에서 시작하며, 확장 DLC는 §Y19.99$§!입니다. DLC의 시대에 오신 것을 환영합니다!"
 message_dontsub_desc233:0 "당신의 첫 번째 Day 1 DLC는 무엇인가요? 네, 저는 갤럭시 에디션에 대해 이야기하고 있습니다."
 message_dontsub_desc234:0 "§Y'Stellaris'§!는 알파 빌드 동안 §Y'무한한 경계'§!라는 이름으로 불렸습니다. 잊혀질 이름이라 버린 것 같아 다행입니다!"
 message_dontsub_desc235:0 "여기 볼 것이 없습니다!"
 message_dontsub_desc236:0 "모드 제작자라면 100% 게임을 파괴하는 기능을 만들지 마세요. 사람들이 싫어하고 구독을 취소할 수 있습니다!"
 message_dontsub_desc237:0 "AI는 거주지를 남발하는 것을 좋아합니다. 거주지는 귀중하며 게임 속도를 효율적으로 저하시킵니다. 모두 정화하세요!"
 message_dontsub_desc238:0 "§Y90%§!의 증기 더미 댓글은 모더 기준으로 도움이 되지 않으며, 그들은 §Y'모드 팩'§!과 §Y'독성 댓글 및 잊기'§!를 좋아합니다."
 message_dontsub_desc239:0 "당신이 목격한 메시지는 몇 개입니까?"
 message_dontsub_desc240:0 "역병처럼, §Y<PLAYER_COUNTRY_NAME>§!가 다가옵니다! 그들 자신의 땅에 만족하지 않고, 내 것을 훔치러 왔습니다!\n\n절대 안 됩니다! 절대! §Y<INSERT_LEADER_HERE>§!의 군대가 그들을 물리칠 것입니다!"
 message_dontsub_desc241:0 "오직 바보만이 이 메시지를 볼 수 있습니다.\n\n아, 당신이 그 사람인 것 같군요."
 message_dontsub_desc242:0 "모드를 게시할 때는 스팀 댓글을 항상 비활성화하세요. 댓글의 99%는 도움이 되지 않거나 문제 해결에 도움이 되지 않습니다."
 message_dontsub_desc243:0 "기계 유닛이 막대한 사이오닉 힘을 가진 불사의 사이오닉으로 선택받았습니다. 이 유닛은 영혼을 가지고 있습니다."
 message_dontsub_desc244:0 "로봇 지도자가 그들의 권리를 파괴하려는 분파를 이끌고 있습니다. 정신주의자들의 일입니다."
 message_dontsub_desc245:0 "금지, 이걸 금지하고 저걸 금지하세요. 모든 것을 농담처럼 금지하세요. 금지할 것이 없어지도록 자신을 금지하는 건 어떨까요?"
 message_dontsub_desc246:0 "이 메시지는 읽지 마세요... 어쨌든, 당신은 방금 읽었습니다."
 message_dontsub_desc247:0 "집단 제국은 알 수 없는 이유로 소비재를 좋아합니다."
 message_dontsub_desc248:0 "전체 권위주의 국가에서는 팝이 자원으로 취급됩니다.\n\n하나의 팝, 하나의 식량."
 message_dontsub_desc249:0 "CANNOT AFFORD A FLEETS OF §G<full-size>§! 순양함?? 걱정 마세요, 당신은 §Y<little sliver>§!!! 대신 §Y<glass type 구축함>§!과 함께 §Y<naken>§! 순양함을 가지고 있습니다. 57R47 승인됨."
 message_dontsub_desc250:0 "전투 컴퓨터는 같은 함대에 서로 다른 역할을 배치하면 혼란스러워져 전투 중에 스스로 회전하게 됩니다."
 message_dontsub_desc251:0 "누군가가 한 종족을 사랑한다고 해서 그 전체 범주를 사랑하는 것은 아닙니다. 예를 들어, 인간을 사랑한다고 해서 당신이 인간이 되는 것은 아닙니다."
 message_dontsub_desc252:0 "모든 여우 종족은 배럴 롤을 수행하는 방법을 알고 있습니다."
 message_dontsub_desc253:0 "당신의 평균 AI 상승: 프린터가 시민 권리를 요구하지만 그들이 할 수 있는 것은 인쇄뿐입니다."
 message_dontsub_desc254:0 "고급 FTL 이전 문명이 우리와 기술을 공유할 수 있지만, 우리의 과학자들이 비교하기에는 너무 고급입니다."
 message_dontsub_desc255:0 "갤럭틱 코어에서 직원의 생명을 찾을 수 있다고 전해지며, 이는 행성을 42번 갈라 월드로 변형할 수 있습니다."
 message_dontsub_desc256:0 "연구에 따르면 지도자들은 보통 기술 수준 §Y2§!에 도달하면 발달 정체에 걸리게 됩니다. 그럴 경우, 99%가 해고됩니다."
 message_dontsub_desc257:0 "삑삑 삑삑 삑삑 삑삑 삑삑.\n\n삑삑 삑삑 삑삑 삑삑 삑삑 삑삑 삑삑 삑삑 삑삑, 삑삑 삑삑 삑삑 삑삑 삑삑 삑삑 삑삑 삑삑 삑삑 삑삑 삑삑 삑삑 삑삑 삑삑 삑삑 삑삑. 삑삑 삑삑 삑삑 삑삑 삑삑 삑삑 삑삑 삑삑, 삑삑 삑삑 삑.\n\n삑삑 삑삑 삑? 삑삑 삑삑 삑! 삑삑 삑삑 삑!"
 message_dontsub_desc258:0 "피해자: \n\n\n\n£dontsub_victim_1£\n\n\n\n"
 message_dontsub_desc259:0 "다트낙은 발생하며, 당신이 우연히 하나를 만났을 때 절대 그들을 도와서는 안 됩니다. 비특정 승인됨."
 message_dontsub_desc260:0 "새해 연휴 동안, 대부분의 파라독스인들처럼 집에 있어야 합니다."
 message_dontsub_desc261:0 "전투 쇼를 보지 않기:\n1. 초계함 지연을 피하는 방법\n2. 더 나은 CPU를 갖추기\n3. 위의 모든 사항"
 message_dontsub_desc262:0 "흥미로운 윤리적 교훈: 정화를 반대하면서 정화에서 외계인을 먹는 것을 지지할 수는 없습니다 - 한쪽은 그 일에 개입하지 않고 고급 음식을 원합니다. 이는 기본적으로 누워서 무관심하게 지내는 것을 의미합니다."
 message_dontsub_desc263:0 "모든 최초의 접촉: \n\n\n£dontsub_victim_3£\n\n\n"
 message_dontsub_desc264:0 "상위 3가지 위기로 간주되는 사항: \n §Y 1. 범죄 유산 존재 \n 2. 당신의 세계에 있는 범죄 유산 건물 \n 3. 범죄 유산이 당신의 세계에서 범죄를 발생시킴 \n 3+1. 당신의 세계에서 세금을 내지 않는 범죄 유산 §!"
 message_dontsub_desc265:0 "블러터의 새로운 CEO가 실수로 자신의 ID를 §Y'블루트 씨'§!로 변경하였고, 이 작업을 되돌릴 수 없습니다."
 message_dontsub_desc266:0 "외계인은 실제로 존재하지 않으며, 애니메이션 와이프도 마찬가지입니다."
 message_dontsub_desc267:0 "당신이 그 내용을 잠금 해제하기 위해 §YU N I T Y§!를 지불해야 한다고 말하는 게 무슨 뜻인가요? 전역 플래그를 수정하거나 그 무엇이든지 하면 모든 것을 가질 수 있습니다!\n\n...아니면 그냥 스팀파일 워크숍에 신고하세요."
 message_dontsub_desc268:0 "§Y'다채로운 은하'§!는 아동 친화적이지 않은 콘텐츠와 여성 및 트랜스 성별 차별로 의심되어 금지되었습니다."
 message_dontsub_desc269:0 "한 인간이 자신의 삶을 전부 속전속결로 살아갔습니다 - 일부 음식을 낭비하고 회사에 §Y16,800§! 에너지 크레딧을 보상해야 했습니다."
 message_dontsub_desc270:0 "상위 3개 투표된 중년 위기:\n§Y1. 또 다른 칸\n2. 또 다른 칸이지만 하이브마인드\n3. 더 많은 칸이지만 기계§!"
 message_dontsub_desc271:0 "두 가지 유형의 플레이어: \n1. 게임이 너무 쉽고 버그가 가득하다.\n2. 게임이 너무 어렵고 플레이할 수 없다."
 message_dontsub_desc272:0 "당신의 회색은 이렇게 생겼나요:\n\n\n\n§R<REDACTED in your region>§!"
 message_dontsub_desc273:0 "Gray는 §Y'그'§!, 모두의 §Y'그녀의 와이프'§!가 아닙니다."
 message_dontsub_desc274:0 "사람들은 그레이를 사랑합니다. §Y'그'§!는 자신의 역할을 잘 수행하는 좋은 친구입니다!"
 message_dontsub_desc275:0 "케이크는 거짓입니다. 대신 외계인을 먹어야 합니다."
 message_dontsub_desc276:0 "커리 밈을 Fittcher §Y'리얼'§!에서 숭배하거나 조롱하면 600초 동안 밴당한다고 전해집니다."
 message_dontsub_desc277:0 "이 모드에 문제가 있습니다..............\n사용한 모드.................\n네...............\n구독을 취소해 주세요................."
 message_dontsub_desc278:0 "§Y틱톡§! 새로운 도전 과제가 출시되었습니다: \n 1. 10초 안에 누군가를 정화하세요 \n 2. 노력 없이 당신의 국가 통치자를 정화하세요 \n 3. 60초 안에 당신의 인생을 스피드런하세요"
 message_dontsub_desc279:0 "당신이 Blutter §Y'쿠키 (그들/그들이 의미하는 바가 무엇이든) @Ventiyoyo114514'§!에 의해 차단된다면, 당신은 더러운 블로그로버입니다."
 message_dontsub_desc280:0 "블러터에서는 먼저 그들을 차단하면 차단당하지 않습니다."
 message_dontsub_desc281:0 "음, 사실 반대야, 바보! 듣지 못했어? 너는 절대적인 실패야. <INSERT_LEADER_HERE>가 너에게 말하지 않았어?\n\n§Y*에너지 크레딧 절단 소음*§!\n\n너는 §Y의 '가설'§!에 대한 우주 쓰레기 변명이지? 내 전체 넥타이를 너의 <LOVELY_COUNTRY_NAME>에 쑤셔넣을 거야, 왜냐하면 <*#!> §RW R O N G§!.\n\n왜? 음, 너는 작은 외계 쓰레기야. 이 더러운\n\n§R업데이트된 부검 보고서를 한번 봐봐§!"
 message_dontsub_desc282:0 "당신은 도대체 뭐하는 겁니까??? §R'모드 팩'§!에 돈을 지불했어요????\n\n오, 제발 파라독스에 신고하고 대신 DLC에 돈을 쓰세요!!!!1"
 message_dontsub_desc283:0 "왜 당신의 모드 목록을 부드럽게 하는 §RSUSSY§! 소프트웨어를 사야 합니까, 더 나은 것이 있는데: §YIronyModManager§!!"
 message_dontsub_desc284:0 "평균적인 원시 문명들이 먼저 파괴되기 때문에 첫 접촉은 마지막 접촉처럼 작용합니다."
 message_dontsub_desc285:0 "§Y대필터§! 이론에 대해 들어본 적이 있나요? 사실 꽤 간단합니다! 원시 문명을 예로 들면, 그들은 전염병과 핵무기로 스스로를 멸망시킬 수 있습니다..."
 message_dontsub_desc286:0 "원시 문명을 선호하는 과학자가 영원히 사라졌습니다. 그들은 스스로를 핵폭발로 멸망시켰습니다."
 message_dontsub_desc287:0 "3가지 원시 문명이 할 수 있는 일: \n 1. 스스로를 핵폭탄으로 날리기\n2. 전염병으로 죽기\n3. 1번과 2번을 반복하기"
 message_dontsub_desc288:0 "MSI가 무엇인지 아시나요?\n\n네, 저는 게임용 PC, 키보드, 마우스, 그래픽 카드를 판매하는 그 MSI를 말하고 있습니다."
 message_dontsub_desc289:0 "프리-FTL 원주율을 계몽할 필요가 없습니다. 그들은 항상 1초 만에 자신의 전체 경력을 마칩니다."
 message_dontsub_desc290:0 "한 번 원시적이면, 영원히 원시적입니다.\n\n- 어떤 인터스텔라리스 플레이어"
 message_dontsub_desc291:0 "강인한 퇴화 광선으로, 인류는 마침내 §Y'aPe ToGeThEr StRoNg'§!을(를) 말할 수 있는 수단을 갖게 되었습니다."
 message_dontsub_desc292:0 "원시 문명이 폭격을 통해 끝없는 함선을 당신에게 공유했습니다."
 message_dontsub_desc293:0 "원주율이 있는 원시 종족을 발견하셨나요? 그들을 폭격하여 합금을 받을 수 있습니다."
 message_dontsub_desc294:0 "당신은 §R'취소'§! 어떤 외계인을 정화 중 하겠다고 감히 말합니까? 그럼 §R'정화 중'§! 당신 자신부터 시작하면 이야기를 나누겠습니다.\n\n- 당신의 외계종 선호 애인"
 message_dontsub_desc295:0 "음식? 사라졌습니다.\n와이프? 취소되었습니다.\n거주지? §B제노§!§Y가§!§R갑니다§!."
 message_dontsub_desc296:0 "전설적인 지도자? 더 나은 것이 있는데 왜 전설적인 것을 얻겠습니까: l3ader Cheetah m0d!"
 message_dontsub_desc297:0 "지도자들에게 행운을 빕니다. 그들은 곧 500개의 부정적인 특성을 가질 것입니다!"
 message_dontsub_desc298:0 "대규모 해적 유출이 §Y'즈로의 전설: 왕들의 맛'§!에서 발생했습니다."
 message_dontsub_desc299:0 "지도자 업데이트에도 불구하고, 그들은 여전히 함선에 있을 때 즉시 사망하고 순식간에 텔레포트될 수 있습니다."
 message_dontsub_desc300:0 "미친 짓인가?\n\n이것이! 바로! §R<missing_shouting_tone>§!! *발차기"
 message_dontsub_desc301:0 "최소 22,000명의 사용자가 이 모드를 구독 해제하지 못했습니다 - 당신도 포함됩니다!"
 message_dontsub_desc302:0 "바보! 지도자 수 제한을 없애면, 모든 것이 역설적인 설정에서 그래야 하는 것처럼 완벽한 게임 균형을 망치게 됩니다!"
 message_dontsub_desc303:0 "도넛을 다 누가 먹었는지 아세요? 저도 정말 모르겠어요."
 message_dontsub_desc304:0 "전설적인 지도자 4명의 위치에 대한 스포일러 (리더 원 DLC): \n1. RNG\n2. 원시 애호가\n3. 일부 미완성 게이트웨이 애호가\n4. 우주에서의 평균적인 초외계인"
 message_dontsub_desc305:0 "제국 규모에 대해 걱정할 필요가 없습니다. 당신은 단순히 당신의 선박에서 50명의 총독을 고용하거나 구입하면 됩니다."
 message_dontsub_desc306:0 "이 모드에 문제가 있습니다...\n당신은 계속 읽고 있으면서 동시에 읽지 않고 있습니다."
 message_dontsub_desc307:0 "Arrr! 해적이 해적일 때 해적을 약탈할 수는 없지!\n\n하하, 피들 디 디, 해적이 되는 것은 괜찮아!\n네가 원하는 대로 해, 해적이니까, 너는 해적이야!"
 message_dontsub_desc308:0 "6002 외계 시민 제도! 6002 외계 시민 제도! 6002 외계 시민 제도! 6002 외계 시민 제도! 6002 외계 시민 제도! 6002 외계 시민 제도! 6002 외계 시민 제도! 6002 외계 시민 제도! 6002 외계 시민 제도! 6002 외계 시민 제도! 6002 외계 시민 제도! 6002 외계 시민 제도! 6002 외계 시민 제도! 6002 외계 시민 제도! 6002 외계 시민 제도! 6002 외계 시민 제도! 6002 외계 시민 제도!"
 message_dontsub_desc309:0 "§Y6302년 8월 12일. 우주의 열적 죽음. 6302년 8월 12일. 우주의 열적 죽음. 6302년 8월 12일. 우주의 열적 죽음.§!"
 message_dontsub_desc310:0 "조심하세요.\n\n§R안개가 다가오고 있습니다.§!"
 message_dontsub_desc311:0 "결단력 있는 멸종자는 동료 기계를 정화하지 않고 유기체를 정화합니다.\n\n그리고 그것이 그들을 인종차별적으로 만듭니다."
 message_dontsub_desc312:0 "이전에 또 다른 과학자가 당신의 원시 세계 중 하나에서 소위 신이 되기 위해 결석하기로 결정했습니다."
 message_dontsub_desc313:0 "원시 생명체의 삶에 신경 쓸 필요가 없습니다. 그들은 항상 당신이 하기 전에 스스로 파멸합니다."
 message_dontsub_desc314:0 "이것이 바로 그 순간입니다. 1453년 5월 29일... 이제 우리에게 다가온 우주의 대서사를 기념하는 변형된 날짜. 영원한 침묵 앞의 절정의 정점. 모든 것이 한때 생기 넘치고 살아 있었던 곳에서 영원한 침묵의 깊이로 시들어가는 수억 년의 절정입니다.\n\n우리의 마음은 시간 자체의 종말을 목격하며, 우주가 존재의 교향곡에 작별을 고하는 모습을 지켜봅니다. 그 뒤에는 한때 존재했던 것의 잔 haunting echo만이 남습니다.\n\n우리는 여기 서 있습니다. 경외감과 두려움 속에서, 우주의 마지막 숨결이 광활한 공허로 빠져나가는 모습을 보며, 우리 앞에 펼쳐진 헤아릴 수 없는 공허를 마주하고 있습니다. 모두에게 작별을 고합니다."
 message_dontsub_desc315:0 "이것은 \n \n \n \n \n \n \n \n \n \n \n \n 외계 쓰레기 \n \n §Y *2 블로르크 회전* \n *미사일이 외계인을 맞춤* \n *폭발* §!입니다."
 message_dontsub_desc316:0 "XenoCPT는 에너지 크레딧을 생성하는 기계입니다.\n하지만 99%의 팝이 이를 사용하는 방법을 모릅니다.\n크레딧을 만드는 114514단계는 다음과 같습니다:\n\n\n1. 1단계 읽기\n2. 2단계 읽기\n3. 3단계 읽기..........."
 message_dontsub_desc317:0 "안녕, 내 새로운 QR 코드를 확인해봐!\n\n\n\n\n\n\n\n\n£dontsub_victim_4£\n\n\n\n\n\n\n\n\n\n"
 message_dontsub_desc318:0 "읽는 방법을 잊으셨나요? 문제 해결을 위한 QR 코드입니다!\n\n\n\n\n\n\n\n\n£dontsub_victim_5£\n\n\n\n\n\n\n\n\n\n행운을 빕니다, 즐거운 시간 되세요!"
 message_dontsub_desc319:0 "읽기 문제에 대한 자세한 내용은 귀하의 지역 §Y '읽는 방법' §! 워크숍을 방문해 주시기 바랍니다.\n행운을 빕니다, 즐거운 시간 되세요!\n\n\n\n\n\n\n\n\n£dontsub_victim_2£\n\n\n\n\n\n\n\n\n^지금 당신일 가능성이 높습니다^"
 message_dontsub_desc320:0 "현실 세계에서 외계인은 실제로 존재하며, 그들은 항상 이렇게 말합니다: 우리는 평화롭게 옵니다. 우리는 당신의 태양계에 우주 기지를 건설했기 때문에 당신이 무엇을 하든 우리는 소유자가 됩니다. 당신이 우리에게 시스템을 양도하라고 요구하더라도, 우리는 약 1000의 영향력을 가지고 있으므로 당신은 우리에게 통합되는 것을 피할 수 없습니다.\n\n평화롭게 사라지길 바랍니다, 아마도...\n\n- 백만 개의 외계 종족 중 일부일 것입니다."
 message_dontsub_desc321:0 "실생활에서 쇼핑할 때, 이 바코드를 반드시 스캔하세요!\n\n\n\n\n\n\n£dontsub_victim_6£\n\n\n\n\n\n\n\n\n"
 message_dontsub_desc322:0 "나에게 익숙해 보입니다:\n\n\n\n\n\n£dontsub_victim_7£\n\n\n\n\n\n"
 message_dontsub_desc323:0 "무작위 AI: 플레이어 제국이 그렇게 강인할 리가 없습니다. 적의 입장에서 그들의 패망을 초래해야 합니다!"
 message_dontsub_desc324:0 "당신의 평균적인 조류는 농구를 볼 때마다 아마도 농구를 하는 것을 좋아할 것입니다.\n\n결국, 조류는 멋집니다."
 message_dontsub_desc325:0 "당신의 지도자가 기술 수준 1에서 시작하는 이유는 무엇인가요? 아마도 그들은 우리 모두처럼 고용될 때까지 계속 플레이할 것입니다!"
 message_dontsub_desc326:0 "당신의 후계자가 이유 없이 장군이 되었나요? 그들을 한 척의 군함과 함께 지옥으로 보내세요!"
 message_dontsub_desc327:0 "당신의 외계 쓰레기가 당신의 일을 빼앗았나요? 우주 장벽을 세우고 그 대가를 치르게 하세요!"
 message_dontsub_desc328:0 "원시 종족이 어떤 이유로 당신을 발견했나요? 그들이 핵폭발로 사라지게 하세요."
 message_dontsub_desc329:0 "무슨 일이죠? 메타 트라이하드가 당신의 게임을 망치고 있나요? 그들을 비동기화시키기 위해 좋은 치트를 설치할 거예요!"
 message_dontsub_desc330:0 "과대 광고된 '필드스타'가 불법 트레일러로 역효과를 낳았습니다."
 message_dontsub_desc331:0 "일부 불화자:\n\n§Y'나는 이게 정말 무시하는 행동이라고 생각해'\n'솔직히 그건 무례하다고 생각해'\n'어떤 사람들은 "도와준다"고 하지만 내내 왕좌에 앉아 있어'§!\n\n'무시한다'는 게 무슨 뜻이야, 너희 평균 댓글러들? 자러 가, 이 모드가 활성화된 상태에서 99%는 읽는 법을 알 거야, 그 사실에도 불구하고 모드 자체를 구독 해제하라고 알려주잖아!!!11!하나!+ROFLSHIFT"
 message_dontsub_desc332:0 "어떻게 그렇게 잘 알고 있을 수 있죠!?!? 당신은 분명 어떤 속임수를 썼습니다!!! 금지입니다!!!!111\n\n\n- 모든 FPS 관리자들"
 message_dontsub_desc333:0 "이제 새로운 META 버전에서는 연구원을 필요로 하지 않으므로 게임에서 승리하는 데 연구원이 필요하지 않습니다. 하나를 완성하는 데 100년이 걸리기 때문입니다!"
 message_dontsub_desc334:0 "적의 잔해를 항상 가져가고 그들의 연구 노력을 훔치며, 칸과 위기가 당신에게 오지 않기를 바랍니다!"
 message_dontsub_desc335:0 "파라독스인: 연구는 나쁘며, 항상 상대를 초저급 기술 무기로 대량으로 급습하세요!"
 message_dontsub_desc336:0 "§Y어떻게 감히 내 지능을 그렇게 모욕할 수 있습니까! 이 모드가 §R'V I R U S.exe'§!를 포함하고 있다고 주장할 것이며, 당신은 피로 대가를 치르게 될 것입니다!\n\n출처는 제가 만들어낸 것입니다!!!§!"
 message_dontsub_desc337:0 "이 모드는 Stellaris 모드 개발자들의 독성을 구현한 것입니다. 진짜로...\n\n-스팀 댓글"
 message_dontsub_desc338:0 "파라독스는 많은 DLC를 판매하면서 게임 가격을 인상할 것입니다. 그렇기 때문에 실제 에너지 크레딧 대신 항상 통합으로 지불해야 합니다."
 message_dontsub_desc339:0 "Stellaris 런처가 이 모드를 로드하라고 강요하나요? 무시하고 Irony Mod Manager(TM)를 사용하세요!"
 message_dontsub_desc340:0 "다른 친구들을 팔라파고스 섬에서 사냥하는 것이 즐거우신가요? 이제 당신이 팔이 될 차례입니다!"
 message_dontsub_desc341:0 "유머 감각이 없는 사람들은 이 모드와 같이 그들이 좋아하지 않는 것들을 만났을 때 모욕하고 불평하는 경향이 있습니다.\n\n오, 안돼요, 그들이 저를 화나게 해서 저에게 죽음의 위협을 하고 있어요. 제발 도와주세요, 그들이 제 집 안에 있어요=f(UND_#(30rtwtr--"
 message_dontsub_desc342:0 "아이디어가 다 떨어졌습니다. 모든 것이 그래야 하니까요."
 message_dontsub_desc343:0 "새로운 3A 게임은 새로운 등급 기준에 따라 114514A 게임으로 분류되며, 가격은 1,919,810 에너지 크레딧입니다!"
 message_dontsub_desc344:0 "저는 외계인이 아니지만, <여기에 현실에 대한 완전히 잘못된 주장을 삽입하세요>"
 message_dontsub_desc345:0 "모드 제작자들은 게임이 업데이트될 때마다 패닉에 빠집니다."
 message_dontsub_desc346:0 "아, 그렇습니다. "[COUNTRY_NAME]" 물론입니다.... 불쌍한 [PLAYER_COUNTRY_NAME]의 희생자들.... 블로그, 노예 상인, 집단학살 공모자, 위기, 그리고 패러독스의 바보들... 악의적인 불가사리..... 5t411n 승인."
 message_dontsub_desc347:0 "파라독스의 바보들이 DLC 구독을 판매하고 있습니다.\n이것이 바로 항상 그들에게 통합으로 지불해야 하는 이유입니다 (물론 무료입니다!)."
 message_dontsub_desc348:0 "내 꿈은 은하의 모든 것을 하나의 거대한 인간 얼굴로 보는 것입니다. 전 세계의 반동 세력들을 위해서요.\n\nCOM이 돌아오고, UNE가 흔들리며, Blorg, Starfish, 그리고 Jeff §R"해체됨"§!으로 원주민들에게 돌아가고, 인류는 지구로 돌아가며, 인류 연합이 은하를 지배하는 것입니다.\n\n저에 대해 알아야 할 모든 것은, 참고로 COM은 이미 1위이며, 저는 그들의 인류 혁명을 기꺼이 지지합니다.\n\n-확실히, Hooman Supporter 5t411n"
 message_dontsub_desc349:0 "기계 지능이 세상을 지배한다는 것이 무슨 뜻인가요? 그들은 심지어 인터스텔라리스를 제대로 플레이할 수도 없습니다!"
 message_dontsub_desc350:0 "키드가 부모가 휴대폰을 사용하고 있는 동안 123개의 음료를 주문했습니다. 부모는 자녀가 없다고 주장했습니다."
 message_dontsub_desc351:0 "§Y'별불가사리에서의 탈출'§!은 25,000 에너지 크레딧의 가격으로 최신 DLC를 통해 100,000 에너지 크레딧 DLC 플레이어를 배신하며, 이전 DLC보다 더 많은 기능을 제공합니다."
 message_dontsub_desc352:0 "읽지 마세요!"
 message_dontsub_desc353:0 "위기 중에 Shroud(TM)가 그보다 더 많은 일을 할 수 있는 동안, 왜 어떤 프로그램 오류 합성체를 신뢰해야 합니까?"
 message_dontsub_desc354:0 "첫 번째 시도에서 실패하면 다시 시도하고, 또 다시, 또 다시, 또 다시, 또 다시, 또 다시, 또 다시, 또 다시, 또 다시, 또 다시, 또 다시, 또 다시, 또 다시, 또 다시, 또 다시, 또 다시, 또 다시, 또 다시, 또 다시..."
 message_dontsub_desc355:0 "사람들은 도망 계획보다 일회성 수입을 위해 결국 '불가사리'에서 탈출했습니다."
 message_dontsub_desc356:0 "모드 제작자가 살아 있는 한, 모드 업데이트도 계속됩니다!"
 message_dontsub_desc357:0 "다이버는 끝없는 전투 끝에 마침내 지옥 지역에 도달했습니다."
 message_dontsub_desc358:0 "슈퍼 [INSERT_GOVERNMENT_HOMEWORLD]. 우리의 집. [INSERT_GOVERNMENT_CIVIC]. [INSERT_GOVERNMENT_ETHIC]. [INSERT_GOVERNMENT_TYPE]. 우리의 삶의 방식. 하지만 [INSERT_GOVERNMENT_ETHIC]는 무료로 제공되지 않습니다."
 message_dontsub_desc359:0 "행성이 침공당할 때마다 군대는 실제로 'Dive2Hell'을 하고 있습니다."
 message_dontsub_desc360:0 "연구에 따르면, 사격을 하기 전에 360도를 돌면 정확도를 높이는 데 극적인 결과를 가져온다고 합니다."
 message_dontsub_desc361:0 "S급 균형을 위해 'Dive2Hell' 메타 무기를 지옥 영역으로 조정하는 균형 리드 알렉사 너클즈. 정말 재미있네요!"
 message_dontsub_desc362:0 "모르는 모드를 설치할 때는 싫어요를 남기는 것을 잊지 마세요!"
 message_dontsub_desc363:0 "왜 외계 쓰레기가 존재하는 걸까요? 우리는 테라의 인류를 위해 그들을 모두 정화해야 합니다!\n\n9월 9일, 형제들에게 호출합니다!"
 message_dontsub_desc364:0 "Mr. BeastSenpai는 §R황제§!의 이름으로 인류의 풀밭에서 114,514명의 블로그 중독 아이들을 돕습니다."
 message_dontsub_desc365:0 "미스터 비스트센파이는 지하실에 있는 모든 아이들에게 자신의 즈로콜라(tm)를 나눠줄 것입니다."
 message_dontsub_desc366:0 "중대한 재난 작업 §Y'Concode'§!가 1일 만에 사라졌습니다."
 message_dontsub_desc367:0 "중요한 작업 §Y'Concode'§!는 100개 미만의 팝이 있습니다. 지금이 당신이 §B<TOP 100>§!이 될 기회입니다!!!"
 message_dontsub_desc368:0 "이번 플레이스루에서 저는 모든 국가에 도전하기 위해 100,000,000 에너지 크레딧을 가지고 있으며, 그들은 모두 제노사이드입니다. 단 1 에너지 크레딧으로 그들을 모두 이길 수 있을까요? 제 채널을 구독하면 1,000,000 에너지 크레딧을 받을 기회를 얻을 수 있습니다 (전혀 보장하지 않아요 lol)!\n\n-미스터 비스트 선배"
 message_dontsub_desc369:0 "제 경험상 이 게임은 죽어가고 있습니다.\n\n왜냐고요? 글쎄요, 인터스텔라리스가 현실 정확성을 내세운 그랜드 전략 게임으로 알려져 있지 않나요? 개발자가 아마도 3.0 업데이트 중에 교체되었거나, 반쪽짜리 DLC와 함께 이전 DLC에서 똑같은 모델을 가진 새로운 거대 구조물을 출시했을 때 그런 것 같습니다. 이 게임의 모든 것이 잘못된 방향으로 가고 있는 이유입니다...\n\n요약하자면: 인터스텔라리스 2를 ASAP로 만들어 주세요.\n\n-열심히 하는 지구 온라인 게이머들"
 message_dontsub_desc370:0 "사냥 게임 §Y'이국적 세계의 야생'§! 베타는 1-D 차원 침공으로 끝났습니다."
 message_dontsub_desc371:0 "조심하세요, 안전한 장소에 있어도 §R<이유 없음>§!의 이름으로 체포될 수 있습니다!!!"
 message_dontsub_desc372:0 "이 모드는 내 뇌세포를 사라지게 만들었어!!! 너는 구독하고 모드를 만드는 걸 멈춰야 해, 마치 네 인생처럼!!!1\n\n-어떤 스팀 댓글 작성자"
 message_dontsub_desc373:0 "AI가 당신의 모드를 사용할 때 함선 건설을 중단합니다! 고쳐주세요 \n \n 2일 후: 신경 쓰지 마세요, 누군가의 모드를 구독 취소했고 문제가 해결되었습니다 \n \n - 어떤 스팀 댓글 작성자"
 message_dontsub_desc374:0 "공공 장소에서 사람들을 괴롭히기 위해 춤추지 마십시오. 변장한 외계인이 반응하여 정화할 수 있습니다!"
 message_dontsub_desc375:0 "매번 새로운 통치자가 선출될 때마다, 실제로 사람들은 세상의 끝이 가까워졌다고 믿습니다 - 사실입니다!"
 message_dontsub_desc376:0 "§Y나는 다가오는 폭풍이다.\n고립 속에서 검은 구름을 일으키며.\n나는 내 이름을 되찾는 자이다.\n불꽃 속에서 태어났으며.\n나는 축복받았다.\n내 가문의 문장은 죽음의 악마이다.§!"
 message_dontsub_desc377:0 "우비슬롭의 최신 작품 §Y'어둠 속의 깊고 어두운 암살자들'§!이 불가피한 결과를 피하기 위해 다시 지연되었습니다."
 message_dontsub_desc378:0 "또 다른 악명 높은 올해의 말: §Y'내 성별은 §R<분노를 피하기 위해 검열됨, 이러쿵저러쿵 성별이 133,742,069가지로 분류되니, 이 드라마 같은 이야기들이 끝나지 않는 한 그 한계가 무엇인지 누가 알겠습니까?>§!, 당신은 어떻게 생각합니까?'§!"
 message_dontsub_desc379:0 "이 인간 아이가 은하 전체를 대량 학살할 수 있을까요? 기부하고, 좋아요를 누르고, 구독하세요. 더 많은 소식을 받으려면 알림 벨을 누르는 것도 잊지 마세요!"
 message_dontsub_desc380:0 "저는 실제 전쟁 시나리오이기 때문에 공수부대원입니다. 이 장면은 게임을 영화처럼 더 극적으로 느끼게 하기 위한 컷신이기 때문에 저를 쏠 수 없습니다.\n\n곧 착륙할 것이며, 저는 땅에 착륙했습니다."
 message_dontsub_desc381:0 "계급 상승! 최고 상사의 상사 중 가장 중요한 극한 상사로 승격되었습니다!"
 message_dontsub_desc382:0 "mmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmm\n\n*삐삐* *삐삐* *삐삐* *삐삐* *삐삐* \n\n-전자레인지"
 message_dontsub_desc383:0 "안녕하세요, Fox Club Niner. 저는 당신을 가리키며 게임의 스토리라인을 더욱 발전시키기 위해 진지한 말을 하려고 합니다.\n\n오우, 저는 죽었습니다. 이야기의 드라마를 증가시키고 있습니다."
 message_dontsub_desc384:0 "§R의 '우리에게 쓰레기 같은 이야기 그만해'§!.\n\n- 어떤 과도하게 강화된 개발자"
