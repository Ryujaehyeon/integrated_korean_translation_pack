l_korean:
 pd_placeholder_tooltip:0 "플레이스홀더 AP - 사용 금지"
 d_pd_tree_of_life_uncommon:0 "생명의 나무"
 d_pd_tree_of_life_uncommon_desc:0 "하이브에 의해 이곳으로 이식된 대수목의 분지입니다. 이 행성의 환경은 대수목에 적합하지만, 드문 생태계로 인해 완전한 크기로 성장할 수 없습니다."
 d_pd_tree_of_life_home:0 "생명의 나무"
 d_pd_tree_of_life_home_desc:0 "생명의 나무는 셀 수 없이 많은 세대 동안 벌레집단을 보호하고 지원해왔습니다."
 d_pd_tree_of_life_colony:0 "생명의 나무 묘목"
 d_pd_tree_of_life_colony_desc:0 "하이브에 의해 이곳으로 이식된 위대한 나무의 분지입니다. 완전히 성체가 되는 데는 시간이 걸릴 것입니다."
 d_pd_tree_of_life_bloomed:0 "개화된 생명의 나무"
 d_pd_tree_of_life_bloomed_desc:0 "위대한 나무는 수많은 세대 동안 벌집을 보호하고 지원해왔습니다. 이제 꽃을 피운 이 나무의 유익한 효과는 모든 드론이 느낄 수 있습니다."
 decision_pd_replant_tree_of_life:0 "생명의 나무 다시 심기"
 decision_pd_replant_tree_of_life_desc:0 "우리의 벌레집이 번영할 수 있도록 여기 생명의 나무 묘목을 심어야 합니다."
 decision_pd_bloom_tree_of_life:0 "생명의 나무"
 decision_pd_bloom_tree_of_life_desc:0 "위대한 생명의 나무가 꽃을 피우도록 장려하는 데는 상당한 시간과 자원이 필요하지만, 그렇게 하면 그 진정한 잠재력을 열 수 있습니다."
 decision_pd_bloom_tree_of_life_tooltip:0 "이 행성은 §Y피어난 $pc_pd_megaflora_hive_bloomed$§!으로 성장할 것입니다.\n\n각 구역이 제공하는 £pop£ §Y일자리§!와 £housing£ §Y주택§!이 두 배로 증가합니다."
 pd_tree_of_life_bloomed:0 "개화된 생명의 나무 세계"
 pd_tree_of_life_growing:0 "자라는 생명의 나무 묘목"
 pd_tree_of_life_growing_desc:0 "이 행성의 드론들은 우리가 여기 심은 거대한 나무 묘목을 세우는 데 집중하고 있습니다."
 pd_tree_of_life_home:0 "생명의 나무 세계"
 pd_tree_of_life_home_desc:0 "이 행성의 위대한 나무는 완전히 성장했습니다. 그 뿌리 시스템은 작업 드론을 위한 공간을 제공하며 자연적으로 피해를 견딥니다."
 pd_no_lifetree:0 "생명의 나무가 없습니다."
 pd_no_lifetree_desc:0 "생명의 나무가 없이는 벌레집단이 완전하지 않습니다."
 origin_pd_aw_tree_of_life:0 "대체 원천 - 사용하지 마십시오"
 origin_pd_aw_tree_of_life_desc:0 "이 기원은 자리 표시자이며 Stellaris에서 작동하지 않습니다. 게임을 시작하기 전에 이 기원을 제거해 주십시오. 문제가 발생할 수 있습니다."
 decision_pd_wasteland_planet:0 "규제되지 않은 산업 기준"
 decision_pd_wasteland_planet_desc:0 "환경 문제는 아무것도 안 한다고 우리를 방해할 뿐입니다. 행성의 자연 생태계 상태를 무시함으로써 우리는 그 진정한 산업 잠재력을 발휘할 수 있습니다."
 decision_pd_wasteland_planet_effects_short:0 "§Y$pd_wasteland_planet$§! 수정자가 추가되었습니다.\n\n§G산업 생산량§!이 증가하지만 £mod_pop_environment_tolerance£ §R거주 가능성§!이 감소합니다."
 decision_pd_wasteland_planet_cleanup:0 "환경 정화"
 decision_pd_wasteland_planet_cleanup_desc:0 "이 행성의 심각한 환경 파괴로 인해 생태계가 위태로운 상태에 놓였습니다. 우리는 이 세계에 가해진 피해를 바로잡을 것입니다."
 decision_pd_wasteland_planet_cleanup_tooltip:0 "이 행성의 원래 생태계를 복원할 것입니다."
 pd_wasteland_planet:0 "산업 황무지"
 pd_wasteland_planet_desc:0 "환경 문제는 우리를 방해할 뿐입니다. 행성의 자연 생태계 상태를 무시함으로써 우리는 행성의 진정한 산업 잠재력을 발휘할 수 있습니다."
 pd_wasteland_planet_tooltip:0 "£district£ §Y발전 구역§! 및 §Y채굴 구역§!을(를) 잠금 해제합니다."
 pd_aw_wasteland_planet:0 "산업 황무지"
 pd_aw_wasteland_planet_desc:0 "$decision_pd_wasteland_planet_desc$"
 pd_aw_wasteland_planet_tooltip:0 "£district£ §Y발전 구역§! 및 §Y채굴 구역§!을 잠금 해제합니다."
 MESSAGE_PD_WASTELAND_DESC:0 "$PLANET|Y$ 이제 §Y$decision_pd_wasteland_planet$§! 가 있습니다."
 MESSAGE_PD_WASTELAND_MESSAGE_TYPE_TITLE:0 "환경 규제 폐지"
 MESSAGE_PD_WASTELAND_CLEANUP_DESC:0 "$PLANET|Y$의 생태계가 복원되었습니다."
 MESSAGE_PD_WASTELAND_CLEANUP_MESSAGE_TYPE_TITLE:0 "환경 규제 복원"
 decision_pd_shroud_planet:0 "장막 위상 변화"
 decision_pd_shroud_planet_desc:0 "이 행성과 장막 사이의 장벽을 약화시켜 물자와 사이오닉 영역 간의 균형을 만들 수 있습니다."
 decision_pd_shroud_planet_effects_short:0 "§Y$pd_aw_shroud_planet$§! 수정자가 추가되었습니다.\n\n£pop£ §GP사이오닉 인구 생산량§!을 증가시키지만 £pop£ §Y비사이오닉 인구 생산량§!을 감소시킵니다."
 decision_pd_shroud_planet_cleanup:0 "위상 이동 행성"
 decision_pd_shroud_planet_cleanup_desc:0 "우리 물리학자들은 이 행성과 장막 사이의 장벽을 강화하여 물자 영역에 고정시킬 수 있습니다."
 decision_pd_shroud_planet_cleanup_tooltip:0 "\n이 행성에서 사이오닉 영향을 제거하겠습니다."
 pd_aw_shroud_planet:0 "안개에 닿은"
 pd_aw_shroud_planet_desc:0 "이곳에서는 물자 영역과 수막 사이의 의도적으로 약화된 장벽이 정신 능력을 가진 개인들이 현실을 어느 정도 재구성할 수 있게 하였습니다. 그러나 그러한 재능이 없는 이들에게는 악몽과 현실 사이의 경계가 흐려져 끝없는 고통과 괴로움의 태피스트리가 생겨납니다."
 pd_aw_shroud_planet_tooltip:0 "§GPsionic§! £pop£ 팝:\n- $mod_psionic_pop_bonus_workforce_mult$: §G10%§!\n- $MOD_POP_HAPPINESS$: §G25%§!\n\n§Y비사이오닉§! £pop£ 팝:\n- £mod_pop_environment_tolerance£ §Y행성 거주 가능성§!: §R-50%§!\n- $MOD_POP_HAPPINESS$: §R-25%§!\n- $MOD_LOGISTIC_GROWTH_MULT$: §R-25%§!"
 MESSAGE_PD_SHROUD_DESC:0 "$PLANET|Y$가 이제 §Y$pd_aw_shroud_planet$§!입니다."
 MESSAGE_PD_SHROUD_MESSAGE_TYPE_TITLE:0 "행성의 장막 교류 완료"
 MESSAGE_PD_SHROUD_CLEANUP_DESC:0 "$PLANET|Y$에서 수증기의 영향이 제거되었습니다."
 MESSAGE_PD_SHROUD_CLEANUP_MESSAGE_TYPE_TITLE:0 "행성의 안개 제거"
 decision_pd_necro_planet:0 "행성 네크로폴리스 건설"
 decision_pd_necro_planet_desc:0 "이 세계는 우리의 영원한 중요성의 유산이 속삭이는 신전으로 확장되기를 갈망합니다."
 decision_pd_necro_planet_effects_short:0 "§Y$district_pd_aw_necro$§! 수정자가 추가되었습니다.\n§Y$district_farming_plural$§! 건설이 §G$district_pd_aw_necro_plural$§!로 대체되었습니다."
 decision_pd_necro_planet_cleanup:0 "행성 네크로폴리스 제거"
 decision_pd_necro_planet_cleanup_desc:0 "우리는 이 행성의 이전 소유자들이 남긴 사원과 무덤을 제거해야 합니다."
 decision_pd_necro_planet_cleanup_effects_short:0 "§Y$pd_aw_necro_planet$§! 수정자가 제거됩니다."
 pd_aw_necro_planet:0 "OW의 자리 표시자"
 MESSAGE_PD_NECRO_DESC:0 "$PLANET|Y$는 이제 §Y$pd_aw_necro_planet$§!입니다."
 MESSAGE_PD_NECRO_MESSAGE_TYPE_TITLE:0 "행성 네크로폴리스 완공"
 MESSAGE_PD_NECRO_CLEANUP_DESC:0 "$PLANET|Y$에 있는 행성 네크로폴리스가 제거되었습니다."
 MESSAGE_PD_NECRO_CLEANUP_MESSAGE_TYPE_TITLE:0 "네크로폴리스 제거됨"
 tech_pd_uncommon_necro_habitability:0 "죽은 행성 거주 가능성"
 tech_pd_uncommon_necro_habitability_desc:0 "네크로폴리스 내에서 생존의 복잡함을 탐색하는 것은 불사의 영원한 포옹을 나누는 이들에게 쉽게 익숙해집니다."
 mod_pc_pd_nuked_cave_habitability:0 "$pc_pd_nuked_cave$ 거주 가능성"
 mod_pc_pd_nuked_superhabitable_habitability:0 "$pc_pd_nuked_superhabitable$ 거주 가능성"
 mod_pc_pd_nuked_tidally_locked_habitability:0 "$pc_pd_nuked_tidally_locked$ 거주 가능성"
 pd_necro_planet:0 "Necropolis"
 pd_necro_planet_tooltip:0 "$unity$ £unity£ from [GetAdministratorPluralWithIcon]: §G+0.5§!\n$MOD_PLANET_ORBITAL_BOMBARDMENT_DAMAGE$ §G-25%§!\n$MOD_POP_GROWTH_SPEED_REDUCTION$ §R10%§!"
 pd_necro_planet_desc:0 "이 세계는 광활한 신전이며, 그 표면은 영원한 의미의 속삭임으로 가득 차 있습니다."
 pd_aw_necro_city_planet:0 "$pd_aw_necro_planet$"
 pd_aw_necro_city_planet_desc:0 "$pd_aw_necro_planet_desc$"
 pd_aw_necro_city_planet_tooltip:0 "$unity$ £unity£에서 [GetAdministratorPluralWithIcon]: §G+0.5§!\n$MOD_PLANET_ORBITAL_BOMBARDMENT_DAMAGE$ §G-25%§!\n$MOD_POP_GROWTH_SPEED_REDUCTION$ §R10%§!"
 decision_pd_lithoid_planet:0 "석영 영양 생태계 생성"
 decision_pd_lithoid_planet_desc:0 "이 세계는 수정과 돌로 새겨지기를 기다리고 있습니다. 허약한 생물학적 생태계가 우리의 발목을 잡고 있습니다."
 decision_pd_lithoid_planet_effects_short:0 "이 세계에 석영 영양 생태계가 조각되어 우리의 필요에 더 잘 맞도록 결정 주파수를 정밀하게 조정할 수 있게 됩니다."
 decision_pd_lithoid_planet_tooltip:0 "완료되면 이 행성의 리토트로픽 결정의 주파수를 선택할 수 있게 됩니다."
 decision_pd_lithoid_planet_cleanup:0 "생물학적 생태계 복원"
 decision_pd_lithoid_planet_cleanup_desc:0 "이 행성의 생물학적 생태계를 원래의 영광으로 회복해야 합니다."
 decision_pd_lithoid_planet_cleanup_effects_short:0 "인공적으로 생성된 석영영양 생태계가 제거되어 생물학적 자연 상태로 복원됩니다."
 decision_pd_lithoid_planet_cleanup_tooltip:0 "모든 석영영양 변수가 제거되며, 행성은 생물학적 생태계로 돌아갑니다."
 decision_pd_lithoid_change_frequency:0 "리토트로픽 주기 변경"
 decision_pd_lithoid_change_frequency_desc:0 "우리는 리소트로픽 생태계의 결정체 주기를 우리의 필요에 맞게 조정할 것입니다."
 decision_pd_lithoid_change_frequency_effects_short:0 "이 행성의 결정체 주기를 변경할 수 있습니다."
 decision_pd_lithoid_change_frequency_tooltip:0 "현재의 리소트로픽 수정자가 제거되어 다른 주기로 변경할 수 있게 됩니다."
 pdlithoidplanets.100.name:0 "결정 주파수"
 pdlithoidplanets.100.desc:0 "리소트로픽 생물군계를 §Y[This.GetName]§!에 맞춰 어떤 공명 주파수로 조정해야 할까요?"
 pdlithoidplanets.100.cyan:0 "Cyan"
 pdlithoidplanets.100.cyan.tooltip:0 "이 공명 주파수는 응집력 있는 힘으로 작용하여 우리의 암석류 인구 간의 단결을 촉진하고 인구 성장의 조화로운 급증을 육성합니다."
 pdlithoidplanets.100.red:0 "Red"
 pdlithoidplanets.100.red.tooltip:0 "이 공명은 광물 매장물과 완벽하게 시너지를 이루어, 이를 더 쉽게 접근할 수 있고 채굴하기에 적합하게 만듭니다."
 pdlithoidplanets.100.yellow:0 "Yellow"
 pdlithoidplanets.100.yellow.tooltip:0 "이 공명 주파수는 우리의 전력 네트워크와 완벽하게 통합되어, 총 용량의 급증을 가능하게 합니다."
 MESSAGE_PD_LITHOID_DESC:0 "$PLANET|Y$는 이제 §YLithotrophic World§!입니다."
 MESSAGE_PD_LITHOID_MESSAGE_TYPE_TITLE:0 "석영 영양 생태계 완성"
 MESSAGE_PD_LITHOID_CLEANUP_DESC:0 "$PLANET|Y$의 생물학적 생태계가 복원되었습니다."
 MESSAGE_PD_LITHOID_CLEANUP_MESSAGE_TYPE_TITLE:0 "석영 생태계 제거됨"
 pd_aw_lithoid_planet_cyan:0 "석영 영토"
 pd_aw_lithoid_planet_cyan_desc:0 "주파수: 500 nm\n공명하는 진동이 우호감을 증진시키고 리토이드의 성장 속도를 가속화합니다."
 pd_aw_lithoid_planet_red:0 "석영 영토"
 pd_aw_lithoid_planet_red_desc:0 "주파수: 650 nm\n튼튼한 결정 공명은 광물 매장물과 완벽하게 시너지를 이루어, 채굴이 더 용이하게 됩니다."
 pd_aw_lithoid_planet_yellow:0 "석영 영토"
 pd_aw_lithoid_planet_yellow_desc:0 "주파수: 580 nm\n이 결정체 공명의 역동적인 조화는 우리의 전력 네트워크와 완벽하게 통합되어, 그 총 용량을 발휘합니다."
 building_pd_planet_infester_1:0 "감염 노드 - 첫 번째 단계"
 building_pd_planet_infester_1_desc:0 "이 노드는 초기 감염 단계의 중심으로, 이 행성에서 벌집의 존재에 필수적입니다. 이 노드를 잃게 되면 벌집의 영향력이 사라질 것입니다."
 building_pd_planet_infester_2:0 "감염 노드 - 두 번째 단계"
 building_pd_planet_infester_2_desc:0 "이 거대한 노드는 현재 중간 감염 단계에 있으며, 행성의 중요한 프로세스를 조작할 수 있을 만큼 튼튼한 벌레집과 연결되어 있습니다. 이 노드를 잃게 되면 여기서 벌레집의 지배력이 무너질 것입니다."
 building_pd_planet_infester_3:0 "행성 감염 노드"
 building_pd_planet_infester_3_desc:0 "정점에 도달한 이 강력한 노드는 모든 행성 프로세스에 대한 완전한 지배력을 행사합니다. 이 노드를 잃는다면 여기서 벌집의 지배력이 무너질 것입니다."
 building_pd_planet_infester_3_effect_desc:0 "이 행성은 §Y$pc_hive$§!로 변형될 것입니다."
 pdplanetaryinfesters.120.name:0 "행성 하이브 완성"
 pdplanetaryinfesters.120.desc:0 "노드가 그 잠재력에 도달함에 따라 우리는 깊은 성취감을 느낍니다.\n\n이 순간은 [Root.GetName]에 대한 벌레집단의 통제력이 크게 향상된 것을 의미하며, 행성에 대한 지배력을 강화합니다."
 pdplanetaryinfesters.120.a:0 "벌집을 위한 또 다른 보금자리."
 civic_hive_pd_planetary_infesters:0 "행성 감염체"
 civic_hive_pd_planetary_infesters_desc:0 "이 하이브 마인드는 행성의 생태계에 스며듭니다. 각 세계는 그 자체의 연장선이 되어, 그 지침 아래 통합된 네트워크로서 번영합니다."
