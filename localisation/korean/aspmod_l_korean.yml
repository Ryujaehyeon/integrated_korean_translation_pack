 mem_ASP_SIGNAL_ANALYSIS_OF_MACHINE_PROJECT:0 "기계 신호 분석"
 mem_ASP_SIGNAL_ANALYSIS_OF_MACHINE_PROJECT_DESC:0 "기계를 통해 기록한 마지막 신호를 [Root.GetName] 분석해야 합니다. 오랜 시간이 걸리겠지만, 우리 과학자들이 제기한 많은 질문에 대한 답을 줄 것입니다."
 mem_ASP_KESSLER_SYNDROME_STORAGE_RESTORE_PROJECT:0 "데이터 저장 복구"
 mem_ASP_KESSLER_SYNDROME_STORAGE_RESTORE_PROJECT_DESC:0 "우리는 [From.Planet.GetName]에 위치한 거대한 우주선의 잔해 안에서 데이터 저장소를 발견했습니다. 우리는 그 데이터의 일부를 복구할 수 있을 것입니다."
 mem_ASP_AI_RE_PROGRAMMING_PROJECT:0 "반복자 재프로그래밍"
 mem_ASP_AI_RE_PROGRAMMING_PROJECT_DESC:0 "이 인공 지능은 레인 월드에서 회수된 것으로, 한때 이터레이터라는 이름으로 불리며 고대 문명에 의해 종교적 문제를 해결하는 데 사용되었습니다. 이제 우리는 이를 재설정하여 우리를 위해 작동하게 할 수 있습니다."
 mem_ASP_WHITE_MOLLUSC_MAMMAL_PROJECT:0 "백색 연체동물 포유류"
 mem_ASP_WHITE_MOLLUSC_MAMMAL_PROJECT_DESC:0 "우리가 포획한 연체동물-포유류 생물체는 우리 시민들 사이에서 매우 인기가 있었던 것으로 보입니다. 사회 연구 부서는 그 연구를 진행하기를 간절히 원하고 있습니다."
 mem_ASP_BEYOND_EARTH_PURITY_PROJECT:0 "원주율 침공"
 mem_ASP_BEYOND_EARTH_PURITY_PROJECT_DESC:0 "이 원시 생물들은 그들의 비참한 방패 뒤에 숨고 있습니다. 우리는 침략하여 그들을 둥지 밖으로 끌어내야 합니다."
 mem_ASP_BEYOND_EARTH_PURITY_PROJECT_2:0 "방어막 돌파"
 mem_ASP_BEYOND_EARTH_PURITY_PROJECT_2_DESC:0 "이 원시 사회는 초라한 방패 뒤에 숨어 외부와의 접촉을 거부하고 있습니다. 우리는 그것을 무너뜨리고 통신을 수립할 것입니다!"
 mem_ASP_THROUGH_IRON_CURTAIN_PROJECT:0 "철의 장막을 넘어"
 mem_ASP_THROUGH_IRON_CURTAIN_PROJECT_DESC:0 "이 인공 지능은 행성에서 발생한 일에 연관되어 있어야 합니다. 그녀와 접촉하여 그 역사에 대해 알아봐야 합니다."
 pc_mem_asp_rainworld:0 "비 오는 세계"
 pc_mem_asp_rainworld_desc:0 "이 해양 행성에서는 매일 대량의 비가 표면에 내리쳐 모든 것을 범람시키며 끊임없는 물의 흐름 속에 빠져듭니다. 표면의 생물들은 습기 많은 환경에 적응하거나 익사하게 됩니다."
 pc_mem_asp_rainworld_adj:0 "비 오는"
 pc_mem_asp_ocean_red:0 "붉은 해양 행성"
 pc_mem_asp_ocean_red_desc:0 "이 해양 행성은 다른 해양 행성과 다릅니다. 이 바다는 비정상적인 §R피처럼 붉은§! 색을 띠고 있습니다."
 pc_mem_asp_ocean_red_adj:0 "붉은 해양"
 mem_aspmod_leader_trait_iterator:0 "반복자"
 mem_aspmod_leader_trait_iterator_desc:0 "이터레이터는 고대인들이 위대한 문제를 해결하기 위해 사용하는 반생물학적 인공 지능입니다."
 building_mem_aspmod_planetary_processing_network:0 "행성 행정부 시스템"
 building_mem_aspmod_planetary_processing_network_desc:0 "고급 세계는 보다 정밀하고 정확한 관리 시스템이 필요합니다. 이것은 그러한 시스템의 모델 사례로, 잘 자동화된 사이버네틱 네트워크의 예입니다. 이 시스템의 유일한 단점은 작동하기 위해 막대한 양의 에너지가 필요하다는 것입니다."
 sm_mem_aspmod_axis_of_planet_building:0 "초공간 바늘"
 sm_mem_aspmod_axis_of_planet_building_desc:0 "이 '바늘'은 이 시스템의 물리적 힘을 조작하여 우리에게 강력한 이점을 제공합니다."
 PLANET_KILLER_GEOCENTRIC_DEVICE:0 "지구 중심 장치"
 PLANET_KILLER_GEOCENTRIC_DEVICE_DESC:0 "이 지구 중심 장치는 자연의 힘을 조작하여 행성의 위치를 설계에 맞게 변경합니다. \n\n§Y대상 행성을 불모 행성으로 바꾸고 시스템의 중심으로 이동시킬 것입니다.§!"
 PLANET_KILLER_GEOCENTRIC_DEVICE_ACTION:0 "세계 중앙집중화"
 FLEETORDER_DESTROY_PLANET_WITH_PLANET_KILLER_GEOCENTRIC_DEVICE:0 "$PLANET|Y$를 중앙 집중화하는 중입니다."
 MESSAGE_DESC_FOR_PLANET_KILLER_GEOCENTRIC_DEVICE:0 "시스템의 중심으로 이전되었으며, 불모 행성으로 변환되었습니다."
 STARBASE_AURA_AXIS_OF_PLANET:0 "$sm_mem_aspmod_axis_of_planet_building$"
 tech_mem_aspmod_geocentric_device:0 "지구 중심 장치"
 tech_mem_aspmod_geocentric_device_desc:0 "지구 중심 장치를 연구한 결과, 우리는 행성계를 조작할 수 있는 잠재력을 엿볼 수 있었습니다. \n\n§Y대상 행성을 불모 행성으로 변환하고 시스템의 중심으로 이동시킬 것입니다.§!"
 site_mem_ASP_a_bedroom_planet:0 "침실 행성"
 site_mem_ASP_a_bedroom_planet_intro:0 "§Y[From.Planet.GetName]§!에서 많은 수의 버려진 구조물이 발견되었습니다. 이 건물들은 매우 정교하게 설계되어 거주자의 생존 필요를 효율적으로 충족시키도록 되어 있습니다. 예상치 못하게도, 이 건물들은 거주자의 시체로 가득 차 있습니다.\n\n우리가 조합한 바에 따르면, 이 종족은 생존을 위해 이러한 방대한 자동화 시스템에 전적으로 의존했습니다. 그들의 사망 원인은 우연히도 이러한 시스템의 광범위한 고장으로 보입니다. 사실, 이 건물들 대부분은 다른 명백한 기능이 없는 주거지입니다. 마치 거대한 지원 생활 단지와 같습니다.\n\n우리는 방대한 자동화 건물들 사이에서 몇몇 산업 및 군사 시설을 발견했지만, 주거지와 인프라의 비율은 이 그룹이 생존을 위해 거의 전적으로 외부 지원에 의존했음을 시사합니다.\n\n우리는 계속 파헤쳐서 더 많은 것을 찾아보겠습니다."
 mem_ASPmod.10.name:0 "지상 조사"
 mem_ASPmod.10.desc:0 "이 행성의 주민들은 최소한의 인프라 외에도 경제 활동의 흔적이 거의 없었습니다. 행성 표면 곳곳에서 발견된 궤도 엘리베이터와 우주 정거장의 잔해는 주민들이 식량 및 기타 소비재의 수입에 전적으로 의존했음을 뒷받침합니다. 그들이 실제로 참여한 활동은 이끼 재배뿐인 것 같습니다. 그들의 거주지 중앙 지역에서도 시설이 발견되었는데, 아마도 이 이끼가 그들의 식단이나 오락의 일부였을까요?\n\n 어쨌든, 이 재배의 특성은 행성 생태계와 일치하지 않아 자생적이지 않음을 시사합니다. 더욱 혼란스러운 것은 이 시스템들이 외부 환경과 극단적인 편집증 수준으로 완전히 격리되어 있다는 점입니다. 이 공간들은 매우 잘 보호되어 있지만, 거주지와는 달리 실제로 재배되고 있던 이끼의 흔적은 전혀 없습니다.\n\n 추가 조사가 필요할 것입니다."
 mem_ASPmod.11.name:0 "농장"
 mem_ASPmod.11.desc:0 "우리는 §Y[From.Planet.GetName]§!의 주민들의 운명에 대한 보다 완전한 그림을 조합했습니다. 주거 시설은 생존을 위한 최소한의 조건만을 제공하며, 그것이 그들이 설계된 전부입니다. 이 행성은 가축을 기르는 산업에 전념했으며, 우리가 발견한 종은 아마도 그 식량 자원으로 길러졌던 것으로 추정됩니다. 우리는 이상한 지의류 시설이 그들의 소유자의 거주지 및 통제 센터였으며, 우리가 목축업자와 가축의 역할을 잘못 추정했을 것이라고 의심합니다. 그러나 우리는 이 자동화 시스템이 의도적으로 꺼졌기 때문에 가축 종이 멸종했다는 것을 알고 있습니다.\n\n 이는 다소 끔찍한 일입니다. 우리와 매우 유사한 종이 어떤 알 수 없는 외계인을 위한 §Y맛있는 진미§!로 제공되었다는 사실이 말이죠. 다행히도 우리의 기록에는 사람을 먹는 지의류와 유사한 문명에 대한 내용이 없습니다. 그럼에도 불구하고, 목장 규모를 고려할 때, 이 시설에서 기른 §Y가축§!에 대한 막대한 수요가 있었음을 안전하게 추정할 수 있습니다: 그들의 제국은 상당히 컸을 것입니다.\n\n 불편한 일이지만, 우리 종 간의 유사성을 고려할 때, 이 공간은 우리의 사람들을 위한 편안한 거주지로 개조될 수 있습니다."
 mem_ASPmod.11.option:0 "우리가 그들을 먹지 않는 한."
 d_mem_ASP_a_bedroom_planet_blocker:0 "버려진 농장 시설"
 d_mem_ASP_a_bedroom_planet_blocker_desc:0 "이 무생물 시설은 더 이상 작동하지 않는 자동화 시스템으로 가득 차 있습니다."
 d_mem_ASP_a_bedroom_planet_deposit:0 "개조된 자동화 주거지"
 d_mem_ASP_a_bedroom_planet_deposit_desc:0 "§H가공§! 장비, 시체 및 재배 시설을 제거함으로써 넓고 편안한 주거 공간이 만들어졌습니다. 새로운 거주자들은 이 시설이 가축을 생산했다는 사실을 결코 알지 못할 것입니다."
 site_mem_ASP_dawn_star_is_coming:0 "여명의 별이 다가옵니다"
 site_mem_ASP_dawn_star_is_coming_intro:0 "§Y[From.Planet.GetName]§!의 표면에는 우주에서 볼 수 있을 만큼 큰 크레이터가 있습니다. 그러나 표면의 인공 잔해 형태는 이 적막한 행성에 한때 문명이 존재했음을 나타냅니다. 표면 스캔 결과, 이 잔해는 건물의 최상부로 보입니다. 문명의 흔적 대부분은 행성의 모래폭풍 속에 미공개된 상태인 것 같습니다.\n\n추가 조사가 필요합니다."
 mem_ASPmod.30.name:0 "여명의 별"
 mem_ASPmod.30.desc:0 "우리 고고학 팀이 §Y[From.Planet.GetName]§!에서 보고서를 제출했습니다. 조사 결과, 이 행성에서 한때 번영했던 모든 문명은 단 하루 만에 붕괴된 것으로 보입니다. 거대한 운석이 행성을 강타하여 몇 시간 만에 지옥 같은 풍경으로 변했습니다. 분화구 아래에 묻힌 거대한 도시의 발견은 이곳에 살았던 문명이 매우 물질적이었고 지능을 가졌음을 시사합니다. 또한, 행성 주위를 저궤도로 도는 원시적인 형태의 위성을 기반으로 그들이 초기 우주 시대에 도달했을 것으로 추정됩니다.\n\n동시에 우리는 자주 불려졌던 노래의 기록을 발견했습니다. 처음에는 그 의미를 알지 못했지만, 우리의 연구원들이 노래에서 가장 반복적인 단어 중 하나를 번역할 수 있었습니다.\n\n그 단어는 §HDawn Star§!입니다."
 mem_ASPmod.31.name:0 "첫 번째 구문"
 mem_ASPmod.31.desc:0 "현장에서 고고학자들 사이에는 §HDawn Star§!에 대한 다양한 의견이 있었습니다. 이 곡은 §Y[From.Planet.GetName]§!에서 발견되었습니다. 매우 합리적이고 고급 문명을 가진 사람들이 성별, 나이, 계층에 관계없이 단순한 지역 유행이 아닌, 전 행성에서 확인된 단일 곡을 반복해서 불렀다는 것은 다소 신비로운 일입니다.\n\n고고학자들은 이 노래를 종교적 찬송가나 샤머니즘 주문으로 제안하지만, 그들 중 누구도 명확한 답변을 내놓지 않았습니다. 그러나 이 노래를 번역하는 데는 어느 정도 성공이 있었습니다."
 mem_ASPmod.32.name:0 "두 번째 구문"
 mem_ASPmod.32.desc:0 "고고학자들은 §Y[From.Planet.GetName]§!의 고고학 조사에서 결정적인 단서를 발견했다고 보고했습니다. 그들은 운석이 떨어지기 전에 문명의 멸종을 피하기 위해 필사적인 노력을 기울였던 것으로 보입니다. 그들은 운석을 관찰한 이후로 막대한 양의 기록을 발견했으며, 모두 그 운석을 막으려 했다고 말하고 있습니다.\n\n하지만 핵미사일을 포함한 무기로 운석을 파괴하거나 심지어 운석의 궤적을 변경하려는 모든 노력은 실패로 돌아갔습니다. 그들은 자신의 힘으로 파괴를 막을 수 없었고, 밤하늘의 밝은 별이 그들을 끝으로 이끌 재앙이라는 것을 깨달았습니다.\n\n결국 그들은 소수의 사람만을 살리기 위해 거대한 탈출선을 건설하기 시작했습니다. 가능한 많은 사람을 수송하기 위해 행성 곳곳에서 거대한 우주선이 발견되었으며, 그들 대부분은 발사조차 하지 못한 채 끝을 맞이한 것으로 보입니다. 생존할 수 있는 인원이 제한적이라는 것을 깨달은 사람들은 배로 몰려들었고, 그들을 통제하기 위해 힘이 사용되었습니다.\n\n하지만 그들의 세계의 끝에서 살아남고자 했던 사람들은 우주선을 차지하기 위해서도 필사적이었습니다. 발굴 현장 깊숙이에서 발견된 비교적 손상되지 않은 장치는 당시 우주선과 대치하고 있던 남자들이 부르고 있던 새로운 별의 노래에 대한 §Y더 많은 통찰§!을 제공하는 음성 기록을 담고 있었습니다."
 mem_ASPmod.33.name:0 "최종 구문"
 mem_ASPmod.33.desc:0 "§Y[From.Planet.GetName]§!의 발굴이 완료되었습니다. 우리의 고고학자들은 발굴 현장에서 새로운 과학적 발견이나 놀라운 것을 찾지 못했습니다. 사실, 그들의 유해는 특별하지 않았습니다. 그러나 그들의 끝은 우리 고고학자들에게 깊은 인상을 남길 것이 분명합니다. 주민들은 운석의 영향으로 우주선 발사가 불가능해질 때까지 탈출의 희망을 포기하지 않은 것처럼 보였습니다. 그들의 생존에 대한 집착은 은하의 다른 어떤 종보다도 더 끈질기고 절박했지만, 탈출선은 소수만이 성공적으로 떠날 수 있었습니다. \n\n행성을 떠나지 못한 다른 탈출선은 보급품을 얻기 위해 공격당하고 파괴되었으며, 다른 우주선은 사고로 폭발하거나, 잘못된 계획으로 인해 우주에서 끝없이 표류하거나, 완전히 잊혀졌습니다. 그리고 마지막 희망이 사라졌을 때, 시민들은 절망과 무력감에 빠졌습니다.\n\n그 시점부터 그들의 통신 기록은 완전히 차단되었고, 각 지역은 완전히 고립되었습니다. 운석의 영향으로 통신 장애가 있었을 수도 있지만, 가능하더라도 그들은 누구와도 소통하지 않았습니다. 그들은 느리지만 확실하게 죽어갔고, 가끔 들리는 새벽 별들의 노래를 들으며 그렇게 되었습니다. 우리의 고고학자들은 §Y운석§!이 행성에 거의 도달했을 때 기록된 것으로 보이는 한 가족의 음성 기록을 복원할 수 있었습니다."
 mem_ASP.lets.see.that:0 "해보자"
 mem_ASPmod.31.event.name:0 "노래의 조각"
 mem_ASPmod.31.a.response:0 "§Y새벽의 별§!이 다가오고 있습니다.\n가장 어두운 밤을 밝히며,\n아기야, 새벽의 별이 우리를 위해 다가오고 있어.\n모두가 잠든 새벽에 문을 두드려.\n아무도 만나지 못할 새벽을 이끌어.\n§Y새벽의 별§!이 우리를 구하러 다가오고 있습니다."
 mem_ASPmod.31.b.response:0 "§Y새벽의 별§!이 다가오고 있습니다.\n어둠을 피어나는 불꽃으로 비추기 위해,\n모두를 새로운 세계로 인도하기 위해.\n빛나는 미래와 함께,\n새벽의 별이 내일을 비추기 위해 다가오고 있습니다.\n어둠 속에서 빛나는 횃불, 꺼지지 마십시오\n아침에 걷는 모든 이여, 함께 모이십시오.\n당신의 귀에 전해지는 새벽의 별의 노래,\n그림자를 드리우는 새벽의 별\n놓친 이여, 우리의 노래를 들어라\n남겨진 이여, 마지막으로 노래를 부르십시오\n희망을 모아, 새벽의 별을 기다리십시오,\n§Y새벽의 별§! 새로운 세계로!"
 mem_ASPmod.31.c.response:0 "§Y새벽의 별§!이 다가오고 있습니다.\n자, 자렴, 내 아이.\n새벽의 별이 올 때 깨워줄게요.\n엄마가 여기서 당신을 바라보고 있어요,\n그리고 새벽의 별을 기다리고 있어요.\n걱정하지 마세요, 내 아이.\n아빠가 여기서 당신을 지켜주고 있어요,\n그리고 새벽의 별을 준비하고 있어요.\n가장 어두운 밤이 지나고,\n새벽의 별들이 빛과 함께 나타날 때,\n함께 일어납시다.\n나른한 천국의 문이 열릴 때,\n새벽과 함께 일어납시다.\n새벽의 별들이 우리에게 다가올 때까지,\n우리는 당신을 지켜줄 것입니다.\n자, 자렴, 내 아이.\n새벽의 별들이 우리에게 다가올 때까지,\n우리는 당신을 지켜줄 것입니다.\n걱정하지 마세요, 내 아이.\n새벽의 별들이 다가오고 있습니다.\n자, 자렴, 내 아이.\n하늘에서 멀리... 새벽의 별이 다가오고 있습니다.\n밤하늘이 가득 차고... 내일이 다가오고 있습니다."
 mem_ASPmod.30.option.a:0 "음... §YDawn star§!..."
 mem_ASPmod.34.option.a:0 "새로운 새벽... §YDawn star§!..."
 mem_ASPmod.34.option.b:0 "아마도 §R절망§!.... 아니면 §G희망§!.."
 mem_ASPmod.34.option.b.tooltip:0 "§Y과학§! 함선, §YDawn Star§!를 획득합니다."
 mem_ASPmod.34.option.quit:0 "이 멋진 노래를 멈춥니다."
 mem_ASP.FIRST.PHRASE:0 "첫 번째 구문 재생"
 mem_ASP.SECOND.PHRASE:0 "두 번째 구문 재생"
 mem_ASP.THIRD.PHRASE:0 "최종 구문 재생"
 site_mem_ASP_the_ship_of_theseus:0 "테세우스의 배"
 site_mem_ASP_the_ship_of_theseus_intro:0 "우리 고고학 팀의 보고서에 따르면, §Y[From.Planet.GetName]§!의 표면에 있는 도시는 우리의 도시와 매우 유사합니다. 탄소 연대 측정 과정에 따르면, 이 도시는 최소 6000년의 역사를 가지고 있습니다.\n\n우리의 건축 양식이 고향에서 백만 마일 떨어진 §Y[From.Planet.GetName]§!의 표면에서 발견된 이유에 대해서는 답하기 어렵습니다. 수천 년에 걸친 풍화 작용으로 이 도시는 모래와 먼지 아래 묻혀 있습니다. 추가 조사를 위해 더 많은 발굴이 필요할 것입니다."
 mem_ASPmod.40.name:0 "주거 지역"
 mem_ASPmod.40.desc:0 "모래산 아래에서, 우리는 마침내 §Y[From.Planet.GetName]§! 문명의 주거 지역을 발굴했습니다. 그 모습은 단순한 외관 이상의 유사성을 가지고 있습니다; §Y[From.Planet.GetName]§!의 집 구조는 지난 세기 우리의 집과 같은 페로시멘트로 만들어졌습니다. 집 안에서 발견된 가전제품들도 우리의 것과 유사한 용도로 사용됩니다.\n\n이 유사성이 우연의 일치인지 건축적 수렴 진화에서 비롯된 것인지에 대한 논란이 있습니다. 팀 내에서 유일한 합의는 답을 얻기 위해 추가 발굴이 필요하다는 것입니다."
 mem_ASPmod.41.name:0 "토착민의 화석"
 mem_ASPmod.41.desc:0 "원주율의 유적 아래에서 원주율의 화석이 발견되었습니다. 원주율의 골격 구조 복원은 많은 것을 보여줍니다; 원주율은 두 개의 턱과 열두 개의 다리를 가진 지능이 있는 절지동물입니다. 우리 과학 팀의 생물학자도 이 종이 산성 호흡을 내뿜는 기관을 가지고 있다고 보고했습니다. 이 종의 전반적인 모습은 역겹고 마치 §Y[Root.Owner.GetSpeciesNamePlural]§!의 악몽에서 방금 튀어나온 것처럼 보입니다.\n\n한편, 우리 팀은 우리가 발견한 기관이 연구 재단인 것 같다는 사실을 밝혀냈습니다."
 mem_ASPmod.41.option:0 "정말 역겨운 외계인입니다."
 mem_ASPmod.42.name:0 "생명공학"
 mem_ASPmod.42.desc:0 "우리 팀의 보고서에 따르면, 원주민 종족은 생명공학에 매우 능숙한 것으로 보입니다. 이 문명의 전반적인 기술 수준은 우리의 기술과 대체로 동등하지만, 생명공학을 제외하고는 그렇습니다. 원주민의 연구실은 클론 기술 탱크로 가득 차 있었으며, 우리는 그들의 인구 증가가 기술에 의존한다고 추정합니다. 대부분의 탱크는 원주민 종족의 §Yhorrible§! 시체로 가득 차 있습니다.\n\n팀은 탱크에 있는 시체가 복원된 화석과 외형에서 사소한 차이가 있음을 발견했습니다. 그 외형은 여전히 §Yhorrible§! 하지만 다리 수는 10개로 줄어들었습니다. 일부 팀원들은 그 외형 때문에 조사를 계속하는 것에 반대했습니다."
 mem_ASPmod.42.option.a:0 "그 끔찍한 외계인을 조사한 후, 그것을 소각하십시오."
 mem_ASPmod.42.option.b:0 "§Y다른§! 외모를 §Y끔찍한§! 것으로 묘사하는 것은 인종차별적입니다. 구성원들을 재교육하십시오."
 mem_ASPmod.42.option.c:0 "내가 점프하라고 하면, 너는 그냥 점프해."
 mem_ASPmod.42.option.d:0 "과학을 위한 것입니다."
 mem_ASPmod.43.name:0 "유전자 변화"
 mem_ASPmod.43.desc:0 "상세한 조사를 통해 우리는 배양기 속 시체의 유전자가 외형만큼이나 변화했음을 알게 되었습니다. 하나의 배양기가 하나의 세대라고 가정할 때, 각 세대 간의 DNA 차이는 자연 변이와 크게 다르지 않습니다.\n\n하지만 세대가 지날수록 점점 더 다르게 변합니다. 끝없이 이어지는 배양기의 배열처럼 보이는 것이 거대한 폭발문 앞에서 보안 장치가 벽에 붙어 있는 것으로 차단되어 있습니다. 마지막 배양기 속 시체는 이전보다 다리가 네 개뿐이며, 턱은 이제 단일 턱으로만 존재합니다. 우리 팀은 보안 장치에 해킹할 수 있다면 폭발문 뒤의 방에 들어갈 수 있을 것이라고 보고했습니다."
 mem_ASPmod.43.option:0 "뭘 기다리고 있나요? 계속하세요."
 mem_ASPmod.44.name:0 "진실"
 mem_ASPmod.44.desc:0 "결과는 충격적이었습니다.\n\n우리 종은 §Y[Root.Owner.GetHomeWorldName]§!에서 진화한 것이 아닙니다. §Y[From.Planet.GetName]§!는 우리가 태어나고... 만들어진 곳이었습니다. 터미널을 해킹한 후, 팀은 거대한 컴퓨터와 방을 가득 채운 많은 탱크를 발견했습니다.\n\n탱크 중 하나에는 네 다리의 절지동물처럼 보이는 시체가 있었고, 그것은 §Y[Root.GetSpeciesName]§!로 변형되었습니다. 문명이 붕괴되기 전에 만들어진 마지막 탱크 안에는 우리 종과 유전적으로 동일한 떠 있는 시체가 있습니다.\n\n그들은 자신의 종을 우리 종으로 유전적으로 조작한 것 같습니다. 컴퓨터의 대부분 기록은 그들이 만든 종의 외모가 끔찍하고 참을 수 없다는 점을 지적하고 있습니다.\n\n컴퓨터의 문서에 따르면, 이 끔찍한 변형 절차는 배신자나 잔인한 범죄자에 대한 처벌이었습니다. 이 끔찍한 형태로 변형된 범죄자들은 일반적으로 변형 후 처형되었으며, 더 큰 처벌은 죄수들을 외계 행성으로 추방하는 것이었습니다. 우리가 예상한 대로, 그들이 죄수들을 추방한 행성 중 하나는 우리의 고향입니다."
 mem_ASPmod.44.option.a:0 "이... 이건 사기입니다! 있을 수 없습니다!"
 mem_ASPmod.44.option.b:0 "외계인이 한 말을 믿지 않겠습니다! 그 정보를 모두 삭제하세요."
 mem_ASPmod.44.option.c:0 "우리가 이미 알고 있듯이, §Yhorribleness§!는 우리의 친척입니다."
 mem_ASPmod.44.option.d:0 "유기체의 모습에 대한 표준은 없습니다."
 mem_ASPmod.44.option.e:0 "왜 우리가 고정된 종의 개념에 얽매여야 합니까?"
 mem_ASPmod.44.option.f:0 "어쩌면 우리는 편협했을지도 모릅니다."
 mem_ASPmod.44.option.f.tooltip:0 "§R윤리를 외계종 선호로 변경§!"
 mem_ASPmod.44.option.g:0 "너무 충격적입니다."
 mem_ASP_small_xenophile_bonus:0 "진실"
 mem_ASP_middle_xenophile_bonus:0 "진리"
 mem_ASP_middle_xenophile_bonus_desc:0 "우리 시민들은 끔찍한 진실을 발견한 후 정치적 혼란을 겪고 있습니다."
 mem_ASP_big_xenophile_bonus:0 "진실"
 mem_ASP_site_kessler_syndrome:0 "케슬러 신드롬"
 mem_ASP_site_kessler_syndrome_desc:0 "[From.Planet.GetName]의 대기는 수많은 금속 조각으로 가득 차 있으며, 이는 분명 인공 구조물의 잔해입니다. 이는 우주 잔해로 인해 우주 시대에 진입하지 못한 문명의 징후일까요? 우리는 이곳에서 무슨 일이 있었는지 알아보기 위해 행성으로 탐사를 보내야 합니다."
 mem_asp.7.name:0 "금속 사막"
 mem_asp.7.desc:0 "[From.Planet.GetName]의 표면은 오랜 시간 동안 미세하게 갈린 금속의 모래로 반복적으로 덮였습니다. 이 방대한 양의 금속은 단일 행성에서 나올 수 없었습니다. 이러한 금속의 출처는 명백합니다; 지금도 우주 쓰레기가 하늘에서 타오르며 떨어지고 있습니다. 이 광활한 금속 사막 아래에 무엇이 있는지 조사하기 위해, 탐사 팀은 모래 아래의 지층을 조사할 추가 장비를 요청했습니다."
 mem_asp.8.name:0 "위대한 전쟁의 잔존자"
 mem_asp.8.desc:0 "우리는 금속 모래 아래에 무엇이 있는지 알아냈습니다. 놀랍게도, 전체 지층은 전함 잔해로 구성되어 있었습니다. 과거의 어느 시점에 발생한 대우주전쟁 동안, 파괴된 배들이 지면에 충돌하였고, 대기 중의 잔해가 풍화되어 그것을 덮고 있었습니다.\n\n현재는 오직 유해만 남아 있지만, 표식만으로도 전함을 제작한 문명이 [Root.Owner.GetName]의 이해를 초월하는 기술을 발전시켰음을 보여줍니다. 문제는, 잔해가 동일한 제국에 속하는 것으로 보인다는 것입니다. 이 거대하고 강력한 함대는 무엇과 싸웠던 것일까요? 잔해에 대한 추가 조사가 필요합니다."
 mem_asp.9.name:0 "목적이 불명의 거대한 함선"
 mem_asp.9.desc:0 "우리 팀은 놀라운 것을 발견했습니다. 거대한 배가 금속 모래를 뚫고 올라왔습니다. 이 배는 멸망한 제국의 타이탄조차 코르벳처럼 보이게 할 만큼 큽니다. 이 배는 다른 많은 배들이 산산조각난 것에 비해 비정상적으로 잘 보존되어 있었습니다.\n\n우리는 전체 구조를 스캔한 결과, 이 배가 거대한 포처럼 보인다는 것을 발견했습니다. 배의 거대한 선체는 주 배터리에 에너지를 공급하기 위해서만 설계된 것처럼 보입니다. 그러나 이 배는 전투용이 아닙니다. 에너지를 충전하는 데 몇 달이 걸리며, 다른 무장은 없습니다. 이 행성과 이 배에 무슨 일이 있었는지 알기 위해서는 배의 중앙 시스템에 접근해야 합니다."
 mem_asp.10.name:0 "신비로운 데이터 저장소"
 mem_asp.10.desc:0 "우주선의 거의 모든 시스템이 시간이 지남에 따라 손상되었습니다. 그러나 핵심의 보호된 캐빈에서 발견된 데이터 저장소는 복구될 수 있습니다. 추가 조사를 위해 저장소는 본 세계로 보내졌습니다. 일부 과학자들은 우주선과 행성을 더 연구하기 위해 행성에 남아 있었습니다."
 mem_asp.11.name:0 "불가침의 벽"
 mem_asp.11.desc:0 "오랜 연구 끝에 과학자들은 마침내 이를 해결했습니다. 거대한 우주선은 에너지를 사용하여 생성하는 장치로, 수석 과학자가 말하길 §Han 뚫을 수 없는 벽§!입니다. 이 우주선은 행성을 우주와 완전히 격리시키고 있었으며, 함대는 이를 보호하기 위해 그곳에 있었습니다. 행성이 주변과 단절된 동안, 우주선과 함대는 벽에 충돌하여 파괴되었습니다.\n\n잔해 아래에는 행성을 전체 우주와 분리하는 차원 벽이 있습니다. 이 벽이 처음 설치되었을 때는 분명히 §H뚫을 수 없는§! 것이었지만, 지금은 꽤 불안정해 보입니다. 만약 우리가 해결책을 찾는다면, 우리는 §H뚫고§! 이 벽을 넘어 그 아래에 무엇이 있는지 탐험할 수 있습니다."
 mem_asp.11.a:0 "아래에는 무엇이 있을까요?"
 mem_asp.12.name:0 "복구 완료"
 mem_asp.12.desc:0 "우리가 발견한 데이터 저장소가 복원되었습니다. 그 안에서 외계 문자로 작성된 문서가 발견되었습니다. 문서의 해석에 따르면, §HMotherland§!와 §Hhome§!라는 단어가 반복적으로 사용되었으며, 이는 회고록으로 보입니다. 저자는 제국이 붕괴 직전에 있는 국가의 수장으로, 자신의 제국의 역사를 기록하는 일을 맡고 있습니다. 문서에는 거대한 배에 대한 정보도 포함되어 있습니다."
 mem_asp.12.a:0 "마침내 그 수수께끼를 해결할 수 있습니다. 조사 팀에 알리십시오."
 mem_asp.140.name:0 "모국, 인류의 고향이자 미래"
 mem_asp.140.desc:0 "조사 팀이 배에서 무언가를 활성화한 것 같습니다. 정상적인 과정을 역전시켜, 배가 차원 벽을 약화시키고 있습니다. 이렇게 계속된다면, 벽은 곧 사라질 것입니다.\n\n문서가 드디어 완전히 해독되었습니다. 배의 소유자인 인류 연합은 한때 은하의 3분의 1을 정복한 강력한 제국이었습니다. 그들은 외계인을 학살하거나 노예로 삼았으며, 인공 지능의 권리를 억제했습니다.\n\n그들이 마침내 강력한 적과 맞닥뜨렸을 때, 외계 노예와 내부의 인공 지능이 반란을 일으켰고, 제국은 내부와 국경에서 동시에 공격받는 압박으로 인해 빠르게 무너졌습니다. 그들은 오직 고향 행성만 남게 되었습니다. 그들은 조국, 고향, 인류의 미래를 보호하기 위해 스스로를 봉인하고, 벽을 뚫고 다시 은하를 정복할 날을 기다리고 있습니다..."
 mem_asp.140.a:0 "안 돼... 안 돼!"
 mem_asp.140.a.tooltip:0 "§RA 광신적 정화자 제국이 출현했습니다.§!"
 mem_asp.141.name:0 "모국, 자녀들의 집과 미래"
 mem_asp.141.desc:0 "조사 팀이 배에서 무언가를 활성화한 것 같습니다. 정상적인 과정을 역전시켜 배가 차원 벽을 약화시키고 있습니다. 이렇게 계속된다면 벽은 곧 사라질 것입니다.\n\n문서가 드디어 완전히 해독되었습니다. 제국은 이 배를 소유하고 있었으며, 한때 은하의 3분의 1을 정복한 강력한 제국이었습니다. 그들은 외계인을 학살하거나 노예로 삼았고 인공 지능의 권리를 억제했습니다.\n\n그들이 마침내 강력한 적과 맞닥뜨렸을 때, 외계 노예와 내부의 인공 지능이 반란을 일으켰고, 제국은 내부와 국경에서 동시에 공격받는 압박으로 인해 빠르게 무너졌습니다. 그들은 고향 행성만 남게 되었습니다. 그들은 조국, 고향, 자녀의 미래를 보호하기 위해 스스로를 봉인하고, 벽을 뚫고 다시 은하를 정복할 날을 기다리고 있습니다..."
 mem_ASP_geocentrism_anomaly:0 "고정된 세계"
 mem_ASP_geocentrism_anomaly_desc:0 "우리 과학자들은 탐사 중에 이상 현상을 발견했습니다. 이 행성은 회전하지 않고 있습니다. 그 이유가 무엇이든, 알아내기 위해 우리의 시간과 노력을 들일 가치가 있습니다."
 mem_asp.15.name:0 "지구 중심 세계"
 mem_asp.15.desc:0 "이 행성은 우리의 과학적 지식을 도전합니다. 이 행성은 어떤 것도 회전하거나 공전하지 않습니다. 이 행성은 이 시스템의 중심에 완벽하게 고정되어 있습니다. 우리의 과학자들은 이 행성을 연구하는 것이 우리 제국의 우주에 대한 지식을 증가시킬 수 있는 훌륭한 기회라고 생각합니다. 우리의 탐사팀은 발굴 허가를 요청합니다."
 mem_asp.15.a:0 "허가가 승인되었습니다."
 mem_ASP_site_geocentrism:0 "고정 행성"
 mem_ASP_site_geocentrism_desc:0 "이 항성계는 완전히 비정상적입니다. 별이 있어야 할 곳에 고정된 행성만 존재합니다. 그 이유는 행성을 조사함으로써 밝혀질 수 있습니다."
 mem_asp.16.name:0 "매립된 도시"
 mem_asp.16.desc:0 "우리 고고학자들은 땅속에 묻혀 있던 특정 종류의 물자를 발굴했습니다. 이것은 인공 건축물의 잔재임이 분명하며, 이는 과거에 이 행성이 지능적인 생명체에 의해 거주되었음을 시사합니다. 이 구조물을 건설한 문명이 이 고정된 행성의 과학을 이해했는지 조사하고 알아내는 것이 우리에게 큰 도움이 될 것입니다."
 mem_asp.17.name:0 "이 도로는 갈 수 없습니다"
 mem_asp.17.desc:0 "우리의 탐사 결과는 그들의 과학적 지식이 일부 측면에서 우리의 지식보다 더 뛰어났음을 보여줍니다. 행성의 자연 자기장 구조가 그들이 별을 여행하는 것보다 자신들의 행성에서 할 수 있는 일에 더 집중하게 만든 것 같습니다. 그들의 기술을 연구하는 것은 여러 분야에서 우리의 지식을 발전시키는 데 도움이 될 것입니다."
 mem_asp.17.a:0 "그들의 제조 기술은 인상적입니다!"
 mem_asp.17.b:0 "그들의 이론적 과학은 인상적입니다!"
 mem_asp.17.c:0 "그들의 사회 시스템은 인상적입니다!"
 mem_aspmod_physics_bonus:0 "인상적인 물리학"
 mem_aspmod_society_bonus:0 "인상적인 사회"
 mem_aspmod_engineering_bonus:0 "인상적인 공학"
 mem_asp.18.name:0 "죽은 행성의 주민의 신음"
 mem_asp.18.desc:0 "이 행성의 주민들에 대해 더 많은 정보를 알게 되었습니다. 그들은 매우 종교적인 삶을 살았으며, 동시에 고급 기술을 보유하고 있었던 것 같습니다. 그러나 종교와 기술 사이에는 큰 사회적 불균형이 있었고, 과학을 연구하는 사람들은 차별을 받았습니다.\n\n 우리의 연구원들은 남겨진 영상에서 그들의 문명 말기에 여러 종교적 시위의 증거를 발견할 수 있었습니다. 이러한 시위는 문명의 몰락과 이 행성의 본질에 대한 비밀을 밝혀내는 열쇠가 될 수 있습니다."
 mem_asp.19.name:0 "평면 세계 종교 사회"
 mem_asp.19.desc:0 "비디오의 내용은 상당히 일관성이 있습니다. 그들은 지구 중심 이론을 지지하며, 자신의 종교적 신념에 기반하여 태양 중심 이론을 비난합니다. 또한 대다수의 인구가 자신의 행성이 구형이 아닌 평평하다고 믿고 있는 것 같습니다.\n\n 우리의 탐사팀이 거대한 장치를 발견했습니다. 이 장치를 구성하는 기술과 재료는 정말 놀랍습니다. 이 장치는 무엇을 할까요? 행성의 비밀을 알려줄까요?"
 mem_asp.20.name:0 "신앙의 자살"
 mem_asp.20.desc:0 "장치에 대한 연구는 이 행성의 비밀을 밝혀냈습니다. 이 행성의 주민들은 행성의 비정상적인 자기장 때문에 우주로 나아갈 수 없었습니다. 고향 행성을 떠날 수 없었던 그들은 여러 종교가 생겨났고, 그 중 하나가 지배적인 종교가 된 것으로 보입니다.\n\n 이 문명의 과학자들은 지배적인 종교의 가르침에 반하는 태양 중심 이론을 제안했습니다. 행성의 종교 지도자들은 갈등을 해결하기 위해 꽤 비합리적인 방법을 선택했습니다. 그들은 주류 종교를 따르는 공학자들을 모아 고향 행성을 별계의 중심으로 영원히 만들 장치를 만들도록 했습니다.\n\n 이 장치는 사람들의 압도적인 지지로 개발되었고, 행성은 천체들이 행성을 중심으로 공전하기 시작하면서 서서히 멈추기 시작했습니다. 행성이 회전을 멈추자 대규모 지진이 발생하고 거대한 해일이 해안을 휩쓸었습니다. 행성이 멈추면서 자기장이 사라졌기 때문에 이 재난에서 살아남은 모든 생명체는 수년에 걸쳐 우주 방사선에 의해 서서히 타죽게 되었습니다.\n\n 멸망한 문명은 비정상적인 행성과 그들의 몰락을 초래한 놀라운 장치를 남겼습니다."
 mem_asp.20.a:0 "어... 음... 저..."
 mem_asp.20.b:0 "미신에 빠진 바보들."
 mem_asp.20.c:0 "우리는 그런 실수를 해서는 안 됩니다."
 mem_asp.21.name:0 "지구 중심 장치"
 mem_asp.21.desc:0 "이제 이 기계를 어떻게 할지 선택해야 합니다."
 mem_asp.21.a:0 "우리는 그들만큼 멍청하지 않습니다. 분해하여 자원을 확보합시다."
 mem_asp.21.b:0 "음... 어딘가에서 사용할 수 있을지도 모릅니다. 가지고 갑시다."
 mem_asp.21.b.tooltip:0 "§YApocalypse§! DLC를 통해, 이는 §RGeo-centralizer§! 행성 파괴 무기를 잠금 해제하여 목표를 불모 행성으로 변환하고 태양계의 중심으로 이동시킵니다."
 mem_aspmod_bad_precedent:0 "나쁜 선례"
 mem_aspmod_lesson_from_pools:0 "풀에서의 교훈"
 mem_aspmod_caution_of_fanatics:0 "광신자에 대한 경고"
 r_mem_aspmod_geocentric_device:0 "지구 중심 장치"
 r_mem_aspmod_geocentric_device_desc:0 "이 거대한 장치는 한 고대 문명의 붕괴를 초래했지만, 놀랍게도 내부 구조는 여전히 온전합니다. 이를 연구함으로써 우리는 적들에게 압도적인 힘을 보여줄 수 있을 것입니다. \n\n§Y지구 중심 장치는 다음과 같은 상황에서 행성을 재배치하지 않습니다:\n1. 대상 행성이 거주 가능한 메가구조입니다.\n2. 시스템 내에 이미 중앙 집중된 행성이 있습니다.\n3. 이 유물이 제국에 존재하지 않습니다.\n4. 시스템의 항성은 블랙홀입니다.§!"
 r_mem_aspmod_geocentric_device.tooltip:0 "이 거대한 작동 버튼을 빨간색으로 칠하고, 그 위에 메모를 붙여야겠습니다, §R절대 누르지 마세요.§! \n- 수석 연구원"
 mem_ASP_haunting_spectre_anomaly:0 "폐허가 된 세계"
 mem_ASP_haunting_spectre_anomaly_desc:0 "고대 식민지의 유적이 §Y[Root.GetName]§! 표면에서 발견되었습니다. 조사할 가치가 있을 수 있습니다."
 mem_asp.22.name:0 "고대 식민지"
 mem_asp.22.desc:0 "조사 결과, 행성 표면에서 수많은 공장과 전투의 흔적이 발견되었습니다. 또한, 행성 곳곳에서 알려지지 않은 문명의 상징이 발견됩니다. 탐사 팀을 파견하는 것이 권장됩니다."
 mem_asp.22.a:0 "이상합니다."
 mem_ASP_site_haunting_spectre:0 "유령의 환영"
 mem_ASP_site_haunting_spectre_desc:0 "행성 곳곳에서 정체불명의 패턴이 발견되었습니다. 이들이 의미하는 바에 대한 답은 식민지의 유적에 있을지도 모릅니다."
 mem_asp.23.name:0 "신비로운 기호"
 mem_asp.23.desc:0 "우리 탐사 팀이 §Y[From.Planet.GetName]§!의 표면에 착륙했을 때, 그들은 수많은 공장으로 가득 찬 폐허를 발견했습니다. 대부분은 온전해 보이지만, 공장 내부에는 전투의 흔적이 남아 있습니다. 공장 안에는 무기를 닮은 기호들도 있었습니다. 이것들은 무엇을 의미할까요? 그 답은 폐허가 된 식민지의 도심 지역에 있을지도 모릅니다."
 mem_asp.24.name:0 "반란의 징후"
 mem_asp.24.desc:0 "우리 데이터베이스의 유사 사건 정보를 바탕으로, §Y[From.Planet.GetName]§!에서 발견된 전투의 흔적은 노예 반란에 의해 발생한 것으로 보입니다. 가장 번영했던 도시의 폐허에서, 노예들이 지배 계급을 공격하기 위해 뭉친 것으로 보입니다. 도시 광장에서 대량 학살이 발생했을 가능성이 높습니다.\n\n우리 탐사대는 우리가 무기로 생각했던 기호들이 사실 농업 및 산업 도구였으며, 이는 노예들의 무기로 보인다고 결론지었습니다. 이 반란의 더 많은 흔적을 찾는 것이 권장됩니다..."
 mem_asp.25.name:0 "유령 신호"
 mem_asp.25.desc:0 "우리 탐사 팀은 매우 놀라운 것을 발견했습니다. 노예들이 결국 승리한 것처럼 보였습니다. 그러나 그들이 새로 세운 정부는 백 년도 채 가지 못했습니다. 더욱 놀라운 것은 외계의 라디오 파동이 노예들을 세뇌시켜 반란을 일으켰다는 것입니다.\n\n이 라디오 파동이 식민지를 파괴하기 위한 의도적인 공격이었는지 우연의 일치인지는 아직 알려지지 않았지만, 우리의 과학자들은 이 라디오 파동이 은하의 외부 고리에서 온 행성에서 발생했다는 것을 발견했습니다. 라디오 파동에 대한 추가 조사가 권장됩니다."
 mem_asp.26.name:0 "신비로운 문서"
 mem_asp.26.desc:0 "우리의 끊임없는 연구에도 불구하고, 전파의 정체는 밝혀지지 않았습니다. 그러나 도시의 가장 깊은 곳에서 한 개인이 전파를 기록한 문서가 발견되었습니다. 해당 개인의 시신이 문서에 대한 접근을 막고 있으며, 일부 탐사 팀은 그 위험성을 알지 못해 접근을 주저하고 있습니다. 이 문서는 7단계 보안 장치에 담겨 있으며, 잠금을 해제하는 데 많은 에너지가 필요합니다."
 mem_asp.26.b:0 "그만해!"
 mem_asp.27.name:0 "선언문"
 mem_asp.27.desc:0 "우리 탐사팀이 마침내 보안 장치를 우회하자, 간단한 제목이 적힌 얇은 문서가 드러났습니다. 실망스럽게도, 문서의 내용은 대부분 중요하지 않았습니다.\n\n이 문서는 투쟁과 단결 같은 단어로 가득 차 있습니다. 이는 노예의 반란과 관련이 있을 수 있습니다. 우리 탐사팀은 이 문서 안이나 위에서 세뇌 효과가 발견되지 않았다고 보고했지만, 더 정확한 조사를 위해 이 문서를 고향 행성으로 보내는 것이 좋겠다고 제안합니다.\n\n한 유령이 은하계를 괴롭히고 있습니다..."
 mem_asp.27.a:0 "모든 행성은 그것을 알아야 합니다."
 mem_asp.27.b:0 "이 문서를 즉시 폐기하십시오!"
 mem_asp.27.c:0 "우리가 찾고 있는 것입니다."
 mem_aspmod_communist_manifesto:0 "선언된 문서"
 mem_aspmod_discarded_document:0 "문서 폐기됨"
 mem_aspmod_communist_manifesto_shared_burden:0 "문서 선언됨"
 r_mem_aspmod_communist_manifesto:0 "공산당 선언"
 r_mem_aspmod_communist_manifesto_desc:0 "이 문서는 파괴된 행성의 발굴에서 얻어진 것입니다. 모든 제국의 노동자들이 단결할 것입니다."
 mem_aspmod_communist_manifesto_relic_activated:0 "$r_mem_aspmod_communist_manifesto$"
 mem_ASP_rain_world_anomaly:0 "이상한 잠수 구조물"
 mem_ASP_rain_world_anomaly_desc:0 "초기 이해와는 달리, §Y[Root.GetName]§!의 대기는 독성이 없으며, 그 대신 방대한 해양이 그 아래에 존재합니다. 또한, 우리의 탐사 팀은 해양 아래에서 인공 구조물로 보이는 대량의 물체를 발견했습니다.\n\n이것들은 행성이 완전히 물에 덮이기 전에 번영했던 문명의 잔해일까요? 아니면 아마도 수중 문명의 징후일까요? 추가 조사가 권장됩니다."
 mem_asp.28.name:0 "비 오는 세계"
 mem_asp.28.desc:0 "우리가 놀랍게도 §Y[From.GetName]§!는 해양으로 덮여 있지 않았습니다.\n\n 우리의 탐사 팀이 행성을 조사하는 동안, 우리가 처음에 해양이라고 생각했던 것이 줄어들기 시작했습니다. 우리의 탐험가들은 변화에 따라 계획을 수정하고 조사를 계속했으며, 결국 행성의 해양은 사실 행성의 지형에 의해 발생한 것이라는 결론에 도달했습니다.\n\n해양은 지속적으로 물을 끌어들인 후, 이를 증발시켰고, 이후 증기가 구름을 형성하면서 더 많은 비를 초래했습니다. §Y[From.GetName]§!는 주기적인 폭우로 반복적으로 잠기는 §HRain World§!입니다.\n\n하지만 이 주기적인 활동은 우리가 행성을 발견한 후 잠시 멈췄다가, 우리가 탐사를 시작하자 다시 시작되었습니다. 이 변화의 이유는 현재로서는 알려져 있지 않습니다."
 mem_asp.28.a:0 "물은 젖어 있습니다."
 mem_ASP_site_rain_world:0 "비 오는 세계"
 mem_ASP_site_rain_world_desc:0 "이 행성은 이전 문명이 남긴 알 수 없는 기원의 수많은 유적, 기계, 생물로 가득 차 있습니다. 답은 수중에 있습니다."
 mem_asp.29.name:0 "물 파기"
 mem_asp.29.desc:0 "광활한 인공 해양인 §HRain World§! 깊은 곳에는 이전 거주자들의 인공 구조물과 거대한 기계, 그리고 수많은 기괴하고 위험한 생물들이 있습니다. 이 정체불명의 구조물들은 어떤 목적을 가지고 있을까요? 누가 만들었고, 왜 그들을 남겨두었을까요? 이러한 질문을 해결하기 위해 우리는 행성을 덮고 있는 물속을 헤엄쳐야 합니다."
 mem_asp.30.name:0 "비 오는 세계"
 mem_asp.30.desc:0 "다양한 위험한 생물들과의 싸움 끝에, 우리의 발굴 팀은 행성의 지리와 야생 생물에 대한 더 나은 이해를 갖게 되었습니다. 팀은 전투를 위해 인위적으로 만들어진 것으로 보이는 각종 이상한 포식 동물들을 발견했으며, 또한 엄청난 양의 물이 기계를 식히기 위한 것임을 발견했습니다.\n\n이 생물들은 행성의 주기적인 홍수에 적응하기 위해 오늘날의 모습으로 진화했습니다. 그럼에도 불구하고, 일부 포식 동물들은 자연 진화의 결과로 보기에는 너무 기괴하며, 비교적 정상적으로 보이는 다른 동물들이 많이 존재합니다.\n\n우리는 기계가 무엇을 하기 위해 만들어졌는지, 그리고 행성이 오늘날의 모습이 되기까지 어떤 과정을 거쳤는지를 알아내기 위해 발굴을 계속해야 합니다."
 mem_asp.31.name:0 "계산"
 mem_asp.31.desc:0 "우리 연구원들은 이 비 오는 세계를 만든 기계들이 어떤 종류의 계산을 반복적으로 수행하고 있다는 것을 알아냈습니다. 이들은 매우 오랜 시간 동안 해당 작업을 수행해 왔으며, 그로 인해 처리 장치가 반복적으로 과열되고 기계의 폐기물 부산물이 적절한 절차 없이 처리되었습니다. 우리의 탐사 팀에 많은 문제를 일으킨 괴물들은 부산물에서 나온 화학물질의 결과입니다.\n\n 그들의 계산 목적은 아직 밝혀지지 않았습니다. 폐기물이 쌓여 우리가 행성에 발을 디딜 수 없게 될 때까지 시간이 많지 않습니다. 우리의 탐사 팀은 잔해 속에서 접근 단말기를 찾고 있습니다."
 mem_asp.32.name:0 "연체동물인가 포유류인가?"
 mem_asp.32.desc:0 "팀은 접근 단말기를 찾는 과정에서 흥미로운 사실을 발견했습니다. 발굴 중 회수된 데이터 조각에서 그들은 두족류 또는 포유류일 수 있는 이상한 원주율 생물의 비정상적인 기록과 이 이상한 종의 §H특별한 표본§!이 컴퓨터에 직접 접근한 기록을 발견했습니다. 과학적으로는 타당하지 않지만, 이 §H흰색 두족류-포유류§! 생물은 §H환생하고 있는§! 것 같습니다.\n\n데이터 조각에는 표본과의 접촉에 대한 반복된 항목이 포함되어 있으며, 여러 항목이 그 생물의 죽음을 확인하고 있습니다. 처음에 우리 팀은 기록이 오류라고 생각했지만, dna 증거와 비디오 증거는 그 기록이 실제로 유효하다는 결론에 이르게 했습니다.\n\n이 이상한 원주율 생물이 접근 단말기로 가는 열쇠가 될 수 있습니다."
 mem_asp.33.name:0 "승천"
 mem_asp.33.desc:0 "우리는 접근 단말기를 분석하여 행성에서 무슨 일이 있었는지 알아낼 수 있었습니다. 행성의 주민들은 §H생명§!에 대한 궁극적인 답을 원했고, 이를 알아내기 위해 다섯 개의 AI 기계를 만들었습니다. 이 기계들은 오늘날까지 남아 있는 거대한 컴퓨터 구조입니다. 그들의 주인이 제시한 질문에 대한 답을 찾기 위해 반복 계산을 하는 과정에서, 다섯 개의 기계는 지속적으로 더 많은 컴퓨팅 장치를 추가하고 이를 식히기 위해 막대한 양의 물을 섭취하기 시작했습니다. AI들은 행성의 불가피한 황폐화를 예측하고 그들의 주인에게 경고했지만, 주인들은 아직 답을 찾는 것을 포기할 생각이 없었습니다. 주인들은 계산을 계속하라고 명령했고, 결국 행성과 함께 그들의 운명을 맞이하게 되었습니다.\n\nAI들은 주인들이 오래전에 사라진 이후에도 답을 얻기 위해 계산을 계속했습니다. 그러나 그들은 문제를 해결하는 방법에 대해 서로 의견이 달라졌습니다. 결국, 가장 강력하고 무자비한 AI가 다른 모든 AI를 제거하고 답을 계산하기를 계속했으며, 행성이 지금의 모습이 되기까지 그 과정을 이어갔습니다. 수많은 세월이 흐른 후, 살아남은 AI는 §H흰색 연체동물-포유류§! 표본과 접촉하게 되었습니다. 놀랍게도, AI는 그 생물이 행성의 옛 주인들이 제기한 질문에 대한 답을 찾았다고 판단했지만, 알 수 없는 오류로 인해 계산을 중단할 수 없었습니다.\n\n우리는 AI 코어를 회수하고 AI가 보존해온 독특한 표본을 확보했습니다."
 mem_asp.33.1:0 "인공 지능을 활용할 방법을 찾아보세요!"
 mem_asp.33.2:0 "영혼 없는 기계에게 삶의 진리를 묻는 이 어리석은 이야기는 단 한 번의 연설 가치밖에 없습니다."
 mem_asp.33.3:0 "그 연체동물-포유류 같은 것들에 대해 더 알아야 합니다!"
 mem_asp.33.4:0 "행성을 성스러운 세계로 지정합니다!"
 mem_asp.33.5:0 "우리는 이 행성에서 발생한 비극을 배우고 기념해야 합니다."
 mem_asp.33.6:0 "그 생물들은 그 행성에 살고 있으며 훌륭한 먹이가 될 것입니다."
 mem_asp.33.7:0 "이 이야기를 사용하여 우리 인구 간의 단결을 강화합시다."
 mem_aspmod_folly_of_raining_world:0 "비가 내리는 세계의 어리석음"
 mem_aspmod_mollusc_mammal_ascension:0 "연체동물-포유류 승천"
 mem_aspmod_rainy_holiness:0 "비 오는 신성함"
 mem_aspmod_raining_modesty:0 "겸손의 비가 내리다"
 mem_asp.34.name:0 "반복자 초기화"
 mem_asp.34.desc:0 "인공 지능이 완전히 초기화되었습니다. 이제 이 §HIterator§!가 우리를 위해 작동할 것입니다. 재프로그래밍 동안 처리 효율성이 약간 감소했지만, 여전히 강력한 계산 능력을 가지고 있습니다. 우리의 주요 연구원들은 가능한 한 빨리 이를 연구에 사용하고 싶어합니다."
 mem_asp.34.a:0 "매우 좋습니다."
 mem_asp.34.a.tooltip:0 "§Y독특한 특성§!을 가진 10레벨 총독이 생성됩니다."
 mem_asp.35.name:0 "연체동물-포유류 동물원"
 mem_asp.35.desc:0 "사회 연구 부서가 작업을 마쳤습니다. 이 작은 흰색 생물은 우리의 외계종 동물원에서 편안하게 살 수 있을 것입니다."
 mem_asp.35.a:0 "너무 귀여워요."
 mem_asp.35.a.tooltip:0 "§Y$mem_aspmod_d_small_creature_memorial$§!을 §Y[mem_ASP_site_rain_world_target.GetName]§!에 추가합니다.\n"
 mem_ASP_site_axis_of_planet:0 "행성의 축"
 mem_ASP_site_axis_of_planet_desc:0 "과학적 발견은 종종 우연에서 비롯됩니다. 이번 경우가 그러했습니다.\n\n새로운 탐사 프로브의 시험 비행이 다른 곳에서 이루어졌다면, 결함이 없어서 추락하지 않았다면, 우리의 탐사자가 '실린더' 위에서 미끄러지지 않았다면, 그리고 그가 떨어질 때 행성의 회전 축이 8도 기울어지지 않았다면, 이 일반적인 불모형 행성은 아무에게도 인식되지 않았을 것입니다.\n\n상황을 모니터링하던 우리의 과학 선박은 탐사자에게 무슨 일이 있었는지 묻는 전송을 보냈고, 이는 더 많은 비명처럼 들렸습니다. 탐사자는 '실린더'의 대부분이 땅 깊숙이 묻혀 있으며 스캔할 수 있는 것보다 더 길다고 보고했습니다.\n\n우선, 탐사자에 대한 건강 검진이 필요합니다. 시속 수백 킬로미터로 움직이는 땅에 있었던 그들이 괜찮아 보이는 것이 신기합니다."
 mem_asp.36.name:0 "제1장"
 mem_asp.36.desc:0 "우리의 최고의 스캐너조차 '실린더' 전체를 스캔할 수 없었습니다. '실린더'는 이렇게 길면서도 비정상적으로 얇습니다. 그러나 '실린더'가 지각을 관통했다는 것은 확실합니다.\n\n우리 탐험가들이 '바늘'이라고 부르는, 전체 폭이 매끄러운 흰색 실린더는 내부를 스캔하려는 모든 시도를 거부하며, 믿을 수 없을 만큼 길지만, 행성의 중심 방향으로 오류 없이 땅에 박혀 있습니다. 탐험가들은 바늘이 있는 곳 주변에 아무것도 없다는 사실에 더 호기심을 느끼고 있으며, 그 길이와 물자로 만들어진 것보다도 더욱 그렇습니다. 그들은 확실히 하기 위해 행성을 스캔했지만, 그러한 바늘을 제작할 만큼 기술 수준이 고급인 문명의 유적은커녕 인공 활동의 흔적조차 발견되지 않았습니다. 그것은 마치 실타래에 박힌 바늘처럼, 혼자서 땅에 박혀 있습니다.\n\n하지만 가장 이상한 점은 바늘을 밀면 행성이 회전한다는 것입니다. 우리의 탐사팀은 너무 두려워서 더 이상 바늘을 밀기를 거부했지만, 행성의 회전 축은 이미 초기 축에 비해 60도 이상 기울어졌습니다.\n\n표면에 있는 탐험가들은 하늘이 회전하고 안전 경고음이 미친 듯이 울리는 것을 보았음에도 불구하고 행성이 회전하는 것을 느끼지 못했다고 보고하고 있습니다."
 mem_asp.37.name:0 "제2장"
 mem_asp.37.desc:0 "정상 궤도에서 발신된 일반 라디오파와 팀이 지표에서 감지한 내용을 비교하는 실험을 수행함으로써, 팀은 적도에서 400 km/s까지 포함한 전체 구형 공간이 회전하고 있음을 밝혀냈습니다.\n\n블랙홀에서 일반적으로 관찰되는 열 방사선이 구형 공간에서 관측되었으며, 정상 공간을 벗어날 때만 감지할 수 있는 독특한 중력파도 발견되었습니다. 우리의 과학자들은 전체 행성이 다른 차원에 있다고 주장하고 있습니다.\n\n새로운 동기를 부여받은 우리의 탐사자들은 바늘을 분석하기 시작했습니다. 행성은 바늘의 물자 샘플을 수집하는 동안 257회 회전했지만, 우리의 탐사자들은 이미 이에 익숙해졌습니다."
 mem_asp.38.name:0 "제3장"
 mem_asp.38.desc:0 "우리의 분석에 따르면 바늘은 이전에 본 적 없는 외계 물질로 만들어진 것입니다. 우리가 아는 한, 이러한 종류의 물질은 매우 놀랍지만, 그것을 만드는 데 성공하더라도 아무 쓸모가 없습니다.\n\n바늘의 외부 부분을 제거한 후, 우리 팀은 내부에서 아무것도 발견하지 못했습니다. 기계도, 감지기도 없었고, 그저 상상할 수 없는 깊이의 구멍만 있었습니다. 그들은 드론 전송 중계 기지를 설치하고 탐사 드론을 아래로 보냈습니다. 완전히 비어 있지는 않았습니다. 더 깊이 들어갈수록 강한 중력 흐름에 직면해야 했고, 결국 그것이 폭발했습니다.\n\n전체 행성을 미세하게 검색하는 지루한 임무를 맡은 두 번째 탐사 팀은 행성의 반대편에서 또 다른 바늘을 발굴했습니다. 사실, 그것은 같은 바늘입니다. 우리 팀이 첫 번째 바늘에 레이저 빔을 쏘자, 두 번째 바늘에서 나왔습니다. 바늘은 행성을 완전히 관통했습니다.\n\n과학자들은 바늘이 공간을 회전시키기 위한 일종의 신호 증폭기로 역할을 하고 있다고 추정하지만, 바늘이 어떻게 또는 왜 존재하게 되었는지에 대한 설명을 제시할 수 없습니다."
 mem_asp.39.name:0 "제4장"
 mem_asp.40.name:0 "제5장"
 mem_asp.39.desc.1:0 "연구를 진전시키기 위해, 우리의 탐사자들은 온갖 것들과 사람들을 가져와 변화를 관찰하였고, 혼합된 결과를 얻었습니다.\n\n 행성이 회전하는 동안, 물의 끓는점이 0.1도 상승하였고, 심리 분석에서 기대했던 다른 답변을 얻을 확률이 평균 12% 증가하였으며, 기초 양자 통신에서 27808 q-비트당 정보량이 증가하였습니다. 다양한 분야에서 더 많은 변화가 관찰되었고, 변화의 정도는 바늘과의 거리 따라 달라졌습니다.\n\n 최소한 뭔가를 발견한 것은 꽤 기쁜 일이지만, 우리의 과학자들은 이러한 변화의 원인에 대한 합의를 얻는 데 어려움을 겪고 있습니다. 더 많은 실험이 필요합니다."
 mem_asp.40.desc.1:0 "무수히 기이하게 즉흥적으로 진행된 실험과 지루한 수작업 검토 끝에, 우리 팀은 이 장치가 다중우주를 강제로 결합하는 일종의 쐐기라는 것을 발견했습니다. 행성을 둘러싼 구형 공간은 실제로 88개의 다중우주의 교차 공간입니다. 이 행성은 동시에 88개의 다중우주에 존재합니다. 15번째 우주의 비교적 관대한 물리 법칙을 이용하여 공간을 회전시키고 있습니다.\n\n가장 합리적인 추정은 바늘이 다른 우주로 넘어가도록 만들어졌다는 것입니다. 아마도 바늘의 방향을 바꾸면 목적지가 바뀔 것입니다. 그럼에도 불구하고 우리는 그것을 어떻게 사용해야 할지, 누가 사용하려 했는지, 왜 사용하려 했는지 전혀 알지 못합니다. 이 장치를 사용할 지식을 가진 존재들은 이미 다른 우주로 넘어갔을지도 모릅니다.\n\n우리가 바늘을 처음 의도한 대로 사용할 가능성은 낮지만, 바늘에 전원을 공급함으로써 다른 우주의 물리 법칙을 소규모로 재현할 수 있습니다. 이 과정은 많은 에너지를 소모하지만, 우리의 물리 연구 혁신에 큰 도움이 될 수 있습니다."
 mem_asp.40.1:0 "놀랍습니다..."
 mem_asp.39.desc.2:0 "모든 인내를 잃고, 우리의 연구 노력에도 불구하고 새로운 발견이 없자, 한 과학자가 보호 장비 없이 바늘 안으로 들어갔습니다!\n\n 이제 그의 목소리가 바늘에서 들려옵니다. 수천 킬로미터의 거리임에도 불구하고 매우 생생하고 명확합니다. 마치 무언가에 쫓기고 있는 것처럼 들립니다. 타는 살의 소리, 부서지는 뼈의 소리, 그리고 자비를 구하는 비명이 들려옵니다. 지상에 있는 우리 팀은 그와 연락을 시도하지만 실패합니다. 과학자는 아래에서 무슨 일이 일어나고 있는지 팀에게 알리려 하고 있습니다. 고통 속에서도 그는 우리에게 지식을 주겠다는 결심을 한 것 같습니다. 그는 barely 이해할 수 있는 신음 소리로 같은 말을 반복합니다.\n\n그곳은 지옥이라고 합니다. 악마와 괴물, 상상할 수 있는 모든 악이 존재합니다.\n\n곧 그의 목소리가 흔들리고, 극심한 불안에 떨고 있는 우리의 탐사대 절반은 바늘 안쪽에 대한 집착적인 호기심을 보였습니다. 그들은 그들을 막으려던 동료들을 밀쳐내고 바늘 안으로 뛰어들었습니다. 나머지 팀은 두꺼운 보라색 연기가 표면에 퍼지기 시작하자 공황 상태로 과학 선박으로 후퇴했습니다.\n\n행성이 가려진 행성으로 변한 것 같습니다. 정체불명의 보라색 배가 허공에서 나타났다는 보고가 들어왔습니다. 그 배는 기이한 모양의 포 하나로 무장되어 있습니다. 전혀 움직이지 않고 궤도에 머물고 있어, 승무원이 없다고 믿게 만듭니다. 그 안에 우리가 찾고 있는 답이 있을지도 모릅니다."
 mem_asp.40.desc.2:0 "불길한 보라색 우주선 안에서 발견된 기록을 해독한 후, 우리 팀은 행성과 바늘이 무엇인지 알 수 있었습니다.\n\n우리가 바늘이라고 부른 원통은 사실 '베일의 둥근 벌레'로, 은하를 가로지르며 지능 있는 존재의 영혼과 몸을 삼켜온 사이오닉 괴물입니다. 수만 개의 문명을 파괴한 후에도 벌레는 결코 배부르지 않았습니다. 7억 9천만 년 전 벌레의 공격을 받은 문명인 벌레퇴치제는 벌레를 무력화하는 데 성공하였고, 베일 차원과 현실 우주 사이에 감옥을 만들어 베일 차원으로 바늘을 관통시켜 현실 우주의 바위 행성 안에 가두었습니다. 이 행성은 젊은 종족이 우연히 봉인을 깨는 것을 방지하기 위해 일반적인 불모형 행성으로 위장되었습니다.\n\n기록은 또한 봉인이 깨지고 행성이 베일로 떨어질 경우, 보라색 우주선에 실린 '부싯돌'을 사용하여 벌레와 베일을 태우라고 조언했습니다.\n\n우리의 과학자들이 마지막 부분을 읽을 때, 그들은 벌레가 행성에서 탈출하여 떠나는 것을 목격했습니다. 그들은 벌레를 파괴할 마지막 기회를 잃었다는 것을 깨닫고 당황했지만, 다행히도 벌레는 다른 은하로 떠났습니다.\n\n오직 생존한 탐험가들만이 우리가 무엇을 했는지 알고 있습니다. 괴물이 다시는 돌아오지 않기를 바랍니다."
 mem_asp.40.2:0 "우리가 무엇을 한 것인가?"
 mem_asp.39.desc.3:0 "탐험가들은 이제 회전하는 것에 너무 익숙해져서, 휴식을 취하는 동안 탐험가가 바늘을 가지고 장난치는 것에 대해 아무도 말하지 않았습니다.\n\n그러던 중, 탐험가는 바늘 구멍을 통해 대륙 행성을 분명히 보았다고 외쳤습니다. 처음에 다른 사람들은 그가 농담하는 것이라고 생각했지만, 시간이 지남에 따라 점점 더 많은 사람들이 비슷한 경험을 하게 되었습니다.\n\n그러한 사건이 발생할 때 바늘이 가리키고 있는 방향과 관찰자가 바늘을 잡고 있는 각도를 기록하는 것이 곧 의무화되었습니다. 기록이 쌓이면서 바늘이 특정 행성을 가리키는 것이 바늘의 방향, 바늘이 잡혀 있는 각도, 그리고 탐험가가 그때 말하고 있던 내용에 따라 달라진다는 것이 분명해졌습니다.\n\n바늘을 통해 보이는 천체의 존재는 반드시 검증되어야 합니다."
 mem_asp.40.desc.3:0 "과학자들이 발견한 것에 따라 팀이 바늘을 조정하자, 바늘 내부의 중력 흐름이 렌즈처럼 안정화되고 반대편의 모습이 확대됩니다. 팀이 본 천체들은 실제로 존재하며, 과학자들은 새로운 행성을 발견할 수 있었습니다.\n\n바늘은 거대한 심우주 망원경입니다. 이 터무니없는 망원경을 누가 만들었는지, 또는 어떤 기술이 사용되었는지는 아직 알 수 없지만, 우리는 그것을 사용하는 방법을 알고 있습니다.\n\n초공간 항행으로 쉽게 접근할 수 없는 지역에 대한 연구는 오늘날 우리가 눈으로 먼 행성을 보고 빛보다 빠르게 여행할 수 있는 시대에도 매우 어려웠습니다. 그러나 이 망원경은 천문학에 새로운 가능성을 열어줄 것입니다. 이제 관측자들은 은하 저편의 별들을 마치 눈앞에 있는 것처럼 볼 수 있으며, 외부 은하를 더 생생하게 촬영하고 분석할 수 있습니다. 우리의 군 지도자들은 이 망원경을 첩보 분야에 사용하고 싶어 했지만, 행성이 일정 정도 확대되면 줌인할 수 없기 때문에 그들이 원했던 유용한 정보를 표면에서 얻기는 어려울 것입니다.\n\n이 망원경은 관광객들 사이에서도 꽤 유명해졌습니다. 이제 슈퍼 인기 있는 바늘은 '무한 관측소'라고 불리며, 관광객들이 은하의 모든 별과 행성을 볼 수 있는 완벽한 플라네타륨입니다."
 mem_asp.40.3:0 "천문학자들이 좋아할 것입니다."
 mem_asp.39.desc.4:0 "다시 한 번, 우리의 운이 우리를 구했습니다. 바늘을 조작하는 동안, 그것은 오류 없이 제국 내의 불모형 행성을 정확히 가리켰습니다.\n\n갑자기 땅이 꺼지면서 그 행성에서 금으로 만들어진 고대 건물이 나타났다고 보고되었습니다. '잠금'이라는 표지판이 건물에 걸려 있으며, 이는 선택받은 사제만이 위치를 아는 잠금 장치와 네 개의 팔을 가진 처녀에게서 태어난 성인만이 열쇠의 행방을 아는 잠금 장치에 대해 우리에게 알려줍니다. 두 가지 아이템의 위치를 아는 자만이 잠금을 열고 가장 신성한 빛을 정당하게 취할 수 있습니다.\n\n우리 중 누구도 기준을 충족하지 않지만, 우리는 더 작은 확률을 이겨냈으므로 '정당하게' 내부의 것을 취할 수 있을 것입니다.\n\n'잠금'이 열리자, 바늘, 아니 오히려 '열쇠'가 변했습니다. 한때 비어 있던 구멍에서 엘리베이터가 솟아올랐고, 탐험가들은 그것을 타고 행성의 내부 핵 속에 숨겨진 광대한 유적에 도착했습니다."
 mem_asp.40.desc.4:0 "셀라! 우리의 운명을 찬양하라. 미공개 금고에는 황제가 부러워할 만한 재산이 있으며, 가장 위대한 예술가들이 눈물을 흘릴 문화가 있고, 은하의 통합자조차 감히 이해하지 못할 명성이 있으며, 가장 위대한 멸망한 제국의 지식조차도 모든 거리에서 태어난 현자들처럼 비할 바가 되지 않는 지식이 있으며, 초신성을 침묵시키고 백색 왜성을 검게 만들 수 있는 힘이 있다.\n\n은하의 모든 생명체가 갈망하는 바로 그 보물, 갈라트론."
 mem_asp.40.4:0 "만세!"
 mem_asp.39.desc.5:0 "갑작스러운 폭발과 함께 우리 제국의 민간인 우주선이 행성에 충돌했습니다. 우주선은 완전히 파괴되었고, 생존자는 발견되지 않았습니다. 사건 이후 두 가지 질문이 남았습니다.\n\n첫째, 우리 과학선은 민간인 우주선이 행성에 충돌할 때까지 이를 탐지하지 못했습니다. 둘째, 우주선의 잔해에서 발견된 로그에 따르면 해당 우주선은 이 행성이 아닌 이웃 항성계로 향하고 있었습니다.\n\n믿기 어렵지만, 우주선은 초공간 항법을 활성화한 직후 이 행성의 저궤도에 갑자기 나타난 것 같습니다.\n\n우리는 추가 조사를 위해 초공간 탐사 탐침을 요청했습니다."
 mem_asp.40.desc.5:0 "인근 항성계에서 초공간 여행을 시도한 대부분의 탐사선은 정상적으로 이동했지만, 바늘이 가리키는 방향에 있던 탐사선에서는 이상한 사건이 발생했습니다. 바늘이 위치한 항성계로 향하는 초공간 통로에 들어간 탐사선은 정상보다 빠른 속도로 이동했으며, 다른 항성계로 향하는 초공간 통로에 들어간 탐사선은 어떻게든 행성의 저궤도로 순간이동하여 지면에 충돌했습니다.\n\n하지만 민간인 우주선과 탐사선과 같은 소형 선박만 영향을 받았습니다. 순찰선보다 더 많은 질량을 가진 물체는 대부분 정상적으로 작동했습니다. 또한 이론적으로 바늘에 전원을 공급함으로써 공급된 전력의 양과 편광에 따라 준광속을 절반으로 줄일 수 있으며, 일반 우주를 넘어 '점프'할 때 엔진의 과열을 억제할 수 있다는 것이 입증되었습니다.\n\n우리의 과학자들은 현재 바늘이 'FTL 고속도로'를 만들기 위해 설계되었으며, 행성의 회전 기능이 스위치 포인트 역할을 하도록 의도되었다고 결론지었습니다.\n\n하지만 이 물체가 어떻게 작동하는지, 왜 바늘이 행성에 심어져야 하는지, 어떤 문명이 그것을 만들었는지는 아무도 모릅니다. 더 이상의 단서는 존재하지 않습니다.\n\n하지만 우리의 문명은 이 사건으로부터 부인할 수 없이 많은 것을 얻었습니다. 바늘을 제어하고 전원을 공급하는 장치를 구축하고 이를 항성 기지에 연결함으로써, 우리 종족은 바늘의 능력을 활용할 수 있게 되었습니다."
 mem_asp.40.5:0 "초공간 경로를 제어하는 기술..."
 decision_mem_aspmod_multiverse_gate:0 "차원 간 실험"
 decision_mem_aspmod_multiverse_gate_desc:0 "우리는 이 행성의 '바늘'에 에너지를 공급함으로써 우리 우주에서는 경험할 수 없는 물리적 현상을 재현할 수 있습니다."
 mem_aspmod_multiverse_gate_planet:0 "다중우주 게이트"
 mem_aspmod_multiverse_gate_planet_desc:0 "다른 우주로 가는 접점입니다."
 mem_aspmod_multiverse_gate_planet_tooltip:0 "이 행성에서 §Y$decision_mem_aspmod_multiverse_gate$§! 결정을 잠금 해제합니다."
 mem_aspmod_multiverse_gate_country:0 "$decision_mem_aspmod_multiverse_gate$"
 mem_aspmod_infinite_observatory_planet:0 "무한 관측소"
 mem_aspmod_infinite_observatory_planet_desc:0 "우주를 탐험하는 가장 좋은 방법입니다."
 mem_aspmod_infinite_observatory_planet_tooltip:0 "이 행성의 항성계를 소유한 제국에 §Y$mem_aspmod_infinite_observatory_country$§! 제국 수정치를 제공합니다."
 mem_aspmod_infinite_observatory_country:0 "$mem_aspmod_infinite_observatory_planet$"
 mem_aspmod_ftl_lane_switcher:0 "초공간 경로 변경 스위치"
 mem_aspmod_ftl_lane_switcher_desc:0 "우리 역사에서 처음으로, 물리 법칙의 일부가 우리의 의지에 의해 구부러졌습니다."
 mem_aspmod_ftl_lane_switcher_tooltip:0 "이 행성의 항성계에 대해 §Y$sm_mem_aspmod_axis_of_planet_building$§! 스타베이스 건물을 잠금 해제합니다."
 r_mem_aspmod_vermifugum:0 "벌레 제거 플린트"
 r_mem_aspmod_vermifugum_desc:0 "고대가 안개에서 생물을 가두기 위해 사용한 유물."
 mem_aspmod_vermifugum_relic_activated:0 "$r_mem_aspmod_vermifugum$"
 mem_ASP_site_strangely_fertile_world:0 "이상하게 다산인 세계"
 mem_ASP_site_strangely_fertile_world_desc:0 "이 행성은 겉보기에는 특별한 것이 없어 보입니다. 그러나 초기 조사에 따르면 그 비범한 생태계가 우리의 과학자들의 주목을 끌기에 충분합니다."
 mem_asp.58.name:0 "다산 유적"
 mem_asp.58.desc:0 "첫눈에 보기에는 이곳이 일반 거주 가능한 행성인 것 같습니다. 그러나 우리의 초기 연구에 따르면 이 행성은 이상하게도 다산합니다. 행성의 토양은 은하 기준으로 비교했을 때도 매우 많은 양의 유기체 물질을 포함하고 있습니다. 지상이나 수중에서 동물은 발견되지 않았습니다. 식물 생명체만이 거주하는 것처럼 보이지만, 한때 고급 문명의 유적이 존재합니다.\n\n우리 탐사대는 이 행성이 한때 번영했던 수도였던 것으로 추정되는 거대한 도시 유적에 도착했습니다. 도시의 대부분은 지하에 묻혀 있으며, 나머지는 식물로 덮여 있습니다. 문명의 몰락 뒤에 숨겨진 이유를 파악하기 위해 더 많은 연구가 필요합니다."
 mem_asp.59.name:0 "신전"
 mem_asp.59.desc:0 "우리 과학자들은 통제되지 않는 실험이 멸종을 초래했을 것이라고 이론화했으나, 방사성 탄소 연대 측정 기술이 주민들이 사라진 후 풍부한 영양분을 이용해 식물이 빠르게 성장했음을 확인했습니다. 멸종 이전 행성의 기술 수준은 초공간 여행을 넘어선 수준이었으며, 주민들은 이 기술을 사용해 외부 우주에서 자원을 자택으로 가져오고 있었던 것으로 추정됩니다.\n\n유사한 기술 발전 수준을 가진 다른 문명들처럼, 그들은 도시의 상층부를 많은 상징적인 구조물과 조각상으로 채웠으며, 여기에는 DNA 이중 나선과 유사한 여러 상징이 포함되어 있습니다. 그 상징들 대부분은 보석으로 장식되어 있어, 우리 연구원들은 이 상징들이 지배적인 종교나 이념과 관련이 있을 것이라고 믿고 있습니다.\n\n우리 팀이 '사원'이라고 부르는 그곳 안에서 여러 메시지가 발견되었으나, 대부분은 단순한 상징에 불과한 것처럼 보입니다. 더 많은 정보를 얻기 위해서는 지하 발굴이 필요합니다."
 mem_asp.60.name:0 "해골"
 mem_asp.60.desc:0 "막대한 양의 화석화된 뼈가 지층에서 발굴되었습니다. 우리 과학자들은 이 지층이 주민들이 살았던 시절의 거리 수준이었다고 추정하고 있습니다. 같은 지층에서 발견된 다양한 종의 화석화된 뼈는 그 당시 대규모 멸종이 발생했음을 암시합니다. 멸종에 식물 생명체가 포함되었다는 증거가 없기 때문에, 우리 팀은 전 세계적인 멸종이 동물 생명체에만 국한되었다고 믿고 있습니다. 식물들은 동물들이 남긴 유기체 물질에서 영양분을 흡수하고 빠르게 성장했을 것이라고 우리 과학자들은 결론지었습니다.\n\n언급된 뼈들 중 일부는 너무 심하게 변형되어 그 기원을 추적할 수 없었습니다. 뼈에 대한 추가 분석 결과, 이들은 알려지지 않은 이유로 인해 심각한 대전환을 겪었으며, 다른 동물들과 유전적으로 유사한 것으로 나타났습니다. 우리 과학자들은 어떤 종류의 돌연변이 전염병이 멸종을 초래했을 것이라고 주장합니다. 더 깊은 발굴을 시작하기 위해서는 보호 장비가 필요할 수 있습니다."
 mem_asp.61.name:0 "전환"
 mem_asp.61.desc:0 "우리 발굴 팀이 도시 아래 깊은 지역을 파고들면서, 사원, 연구소, 정부 건물이 통합된 거대한 미공개 복합체를 발견했습니다. 이 복합체는 보안 수준과 크기로 미루어 보아 도시에서 가장 중요한 시설이자 종교 중심지로 여겨집니다. 복합체 안에는 문명의 마지막 날을 보여주는 많은 기록들이 있었습니다.\n\n거주자들은 죽음이 끝이 아니며, 모든 갈등은 부활한 자들과 영적으로 연합함으로써 끝날 것이라고 믿었습니다. 이로 인해 그들은 사원에서 시신을 보존하고 부활 기술을 연구하려 했습니다. 그러나 그들의 연구는 부활이 아닌 생물학적 괴물으로 이어졌습니다. 이 괴물들은 행성 전체 인구를 학살하고 감염시켰으며, 사회의 중심에서 시신을 보존하는 전통은 이 과정을 더욱 가속화했습니다. 중앙 종교 정부가 파괴된 후, 문명 전체는 큰 저항 없이 곧 무너졌습니다."
 mem_asp.62.name:0 "표식"
 mem_asp.62.desc:0 "도시의 중심부에는 이상한 파장을 방출하는 붉은 나선형 구조물이 있었습니다. 이 구조물은 일종의 신호등으로 밝혀졌으며, 그 파장은 단순한 자연 방사선이 아니라 지적 존재의 뇌에 직접적으로 침투하는 메시지로, 그 결과 부정적인 영향을 미쳤습니다.\n\n신중한 조사 끝에, 우리의 연구원들은 파장에 대한 분석을 제시할 수 있었습니다. 이 구조물은 인근 생명체들에게 죽음, 부활, 그리고 결합의 이미지를 주입할 뿐만 아니라, 죽은 시체로부터 생물학적 괴물을 만드는 기술적 지식을 주입하고, 그와 동일한 구조물을 여러 개 건설하도록 유도합니다. 문명이 이 구조물을 숭배하게 된 것은 전혀 자연스러운 일이 아니었습니다. 우리의 연구원들은 더 깊이 파고들면 이러한 구조물을 더 많이 발견할 것으로 예상하고 있습니다."
 mem_asp.62.desc_alt:0 "도시의 중심에는 이상한 파장을 방출하는 붉은 나선형 구조물이 있었습니다. 이 구조물은 일종의 신호등으로 밝혀졌으며, 그 파장은 단순한 자연 방사선이 아니라 지적 존재의 뇌에 직접 침투하는 메시지로, 그 결과 부정적인 영향을 미쳤습니다. 이 파장은 사이오닉 메시지를 직접 전달하는 과정에서 뇌에 상당한 손상을 주는 것으로 보입니다.\n\n신중한 조사 끝에, 우리의 연구원들은 이 파장에 대한 분석을 제시할 수 있었습니다. 이 구조물은 인근 생명체에게 죽음, 부활, 그리고 결합의 이미지를 주입할 뿐만 아니라, 죽은 시체로부터 생물학적 괴물을 만드는 기술적 지식도 주입하며, 그들에게 동일한 구조물을 여러 개 건설하도록 유도합니다. 이 문명이 이 구조물을 숭배하게 된 것은 전혀 자연스러운 일이 아니었습니다. 우리의 연구원들은 더 깊이 파고들면 이러한 구조물을 더 많이 발견할 것으로 기대하고 있습니다."
 mem_asp.62.a:0 "정신을 조종하는 동상, 섬뜩합니다."
 mem_asp.62.a.tooltip:0 "이제 §Y$mem_aspmod_d_plants_coverd_city$§! 타일 블로커를 제거할 수 있습니다."
 mem_ASP_site_awakened_moon:0 "각성한 달"
 mem_ASP_site_awakened_moon_desc:0 "이 달 아래에는 끔찍한 진실이 미공개되어 있습니다..."
 mem_asp.63.name:0 "우주선"
 mem_asp.63.desc:0 "발견된 메시지에 따라 위성에 대한 추가 연구가 진행되었습니다. 놀랍게도, 이 위성은 얼어붙은 유기체 물질로 구성되어 있습니다. 또한, 위성의 파손된 조각들 사이에서 부분적으로 파괴된 우주선이 발견되었습니다.\n\n해당 우주선은 무장이 되어 있지 않지만 초기 형태의 초공간 엔진이 장착되어 있어, 이 우주선의 목적이 탐사 또는 발굴일 가능성이 있음을 시사합니다. 초기 조사에서 위성에서 인공 구조물이 발견되지 않았기 때문에, 우리 팀은 우주선에서 더 많은 정보를 찾을 것으로 기대하고 있습니다."
 mem_asp.64.name:0 "진리"
 mem_asp.64.desc:0 "배에 있는 녹음과 다양한 데이터로 인해 무서운 진실이 밝혀졌습니다. 도시 아래에서 발견된 붉은 구조물은 많은 대량 생산물 중 하나일 뿐이며, 이 모든 것은 위성 중심에 있는 어두운 구조물로 거슬러 올라갈 수 있습니다.\n\n어두운 구조물은 사실 행성 크기의 기생체 핵으로, 행성의 전체 인구를 정신적으로 지배하고 학살하는 끔찍한 과정을 반복하여 결과적으로 생성된 유기체 물질을 더 많은 자신으로 압축하는 역할을 했습니다. 이것이 행성 종교의 핵심 신념의 의미입니다 - 죽음, 부활, 그리고 결합입니다.\n\n하지만 특정 영웅적인 공학자 그룹이 초기 모델 발굴선을 사용하여 이 괴물을 물리친 것 같습니다. 그들은 위성의 궤도로 몰래 들어가 공격을 피하고, 거대한 굴착기를 사용하여 사실상 위성의 핵과 어두운 구조물을 찢어냈습니다. 시체 위성은 멸망하였고, 이 영웅적인 업적 덕분에 은하는 조금 더 안전해졌습니다.\n\n영웅들은 고향 세계의 주변 지역으로 대피할 수 있었던 것 같습니다. 그들은 작은 식민지를 세우고 어두운 구조물에서 방출되는 파동으로부터 자신을 보호하기 위해 힘의 장을 구축하였으며, 그곳에서 마지막 세월을 보냈습니다.\n\n정말로 영웅적인 이야기의 결말입니다."
 mem_asp.64.a:0 "정말로 영웅적인 이야기입니다. 무언가 조치를 취해야 했습니다."
 mem_asp.64.b:0 "구조물을 파괴하십시오. 더 이상 누구에게도 영향을 미치지 않도록 하십시오."
 r_mem_aspmod_deadspace_marker:0 "검은 마커"
 r_mem_aspmod_deadspace_marker_desc:0 "검은 나선형 구조물, 한때 그 이전 문명에 의해 '검은 마커'라고 불렸습니다. 강인한 차단 필드에 의해 억제됨에도 불구하고, 소름끼치는 파장을 방출하는 것으로 추정됩니다. 때때로 사랑하는 이의 목소리가 당신을 부릅니다, §H우리를 다시 하나로 만들어 줘§!."
 mem_aspmod_fertile_soils:0 "다산 토양"
 mem_aspmod_fertile_soils_desc:0 "이 세계의 토양은 이상하게도 다산합니다."
 mem_aspmod_deadspace_marker_relic_activated:0 "$r_mem_aspmod_deadspace_marker$"
 mem_ASP_site_red_tombworld:0 "붉은 죽은 행성"
 mem_ASP_site_red_tombworld_desc:0 "이 해양 행성의 붉은 톤의 바다는 어두운 구름 사이로 보입니다. 그 안에 살고 있는 미생물이 붉은 색을 띠게 하고 있는 것으로 보입니다. 과학자들은 이 행성의 독특한 생태계에 많은 관심을 보이고 있으며, 그곳에서 유익하지 않은 이상한 유전적 특징을 가진 많은 생물들이 발견되었습니다. 우리는 또한 한때 고급 문명의 잔존자처럼 보이는 유적을 발견했습니다.\n\n행성과 바다 아래에서 간헐적인 스캔 방해 파동이 감지됩니다. 그러나 우리의 연구원들은 행성 표면에 착륙하여 정보를 수집할 수 있었습니다.\n\n스캔 방해 파동은 식별할 수 없는 방법으로 고급 AI가 행성에 접근하는 것을 완전히 차단하고 있습니다. 저궤도로 접근하는 AI는 오류로 인해 작동이 중단됩니다. 따라서 합성 과학자와 AI 지원 과학자는 이 행성을 탐사할 수 없습니다."
 mem_asp.65.name:0 "세균?"
 mem_asp.65.desc:0 "탐험가들이 행성을 탐색할 때 가장 당황스러웠던 것은 해양 표면에 떠 있는 원주율로 미라화된 원주민의 시체였습니다. 분명히, 피가 해양을 붉게 물들였습니다.\n\n하지만 미라가 전체 해양을 붉게 만들 만큼 피를 흘렸다는 것은 매우 가능성이 낮아 보입니다. 우리의 과학자들은 물속의 비정상적인 양의 혈액 세포 뒤에 있는 이유를 찾을 수 없었습니다. 그럼에도 불구하고 그들은 어떤 종류의 유기체가 이를 초래했을 것이라는 이론을 가지고 있습니다. 산소는 대부분의 원시 유기체에게 독성이 있지만, 산소를 방출하는 박테리아가 대기의 조성을 완전히 변화시키는 것은 꽤 일반적인 과정입니다. 혈액 세포를 증식시키는 유기체가 존재할 수 있지만, 우리의 과학자들은 그러한 유기체에게 어떻게 이득이 될 수 있을지 확신하지 못하고 있습니다.\n\n어두운 구름은 에어로졸과 독성 가스로 이루어져 있었고, 행성의 파괴는 외부의 공격 징후 없이 죽은 행성과 유사한 패턴을 보였습니다. 이는 우리의 과학자들이 처음에 추정했던 것과 같습니다. 이 행성은 모든 위대한 문명처럼 내전의 형태로 멸망을 맞이했습니다."
 mem_asp.66.name:0 "합성체 상승?"
 mem_asp.66.desc:0 "우리 탐험가들은 건물 잔해의 구조를 조사하는 동안 급격한 환경 변화에 대한 빠른 조정의 흔적을 발견했습니다. 추가 조사를 통해 이 행성이 원래 극지였으며, 행성의 대부분을 차지하는 광대한 해양이 불과 몇 십 년 만에 형성된 것으로 보인다는 사실을 밝혀냈습니다!\n\n하지만 문명이 환경 변화에 큰 문제 없이 적응한 것으로 보이므로, 이로 인해 문명이 멸망했을 가능성은 매우 낮습니다.\n\n우리 과학자들은 바다에 떠 있는 시체를 해부하면서 새 종족을 연이어 발견하게 되어 매우 흥분하고 있습니다. 은하계 전역에서 존재했던 종족들이 거의 모두 이 행성에 모여 있었다고 말할 수 있습니다.\n\n그러나 건물은 특정 기계적 종족을 위해 설계된 것으로 보입니다. 한 과학자는 이 행성이 실제로 고대 은하 연합의 수도였으며, 주민들의 합성체 승천 과정에서 심각한 문제에 직면하여 멸망에 이르게 되었다고 주장합니다. 다른 과학자들은 이 이론을 일축하고 있습니다."
 mem_asp.67.name:0 "복수의 영혼"
 mem_asp.67.desc:0 "암호 해독 팀은 탐사를 방해하던 파동이 고장 난 방패 발사기에서 발생한 것이 아니라, 사실 '대적'이라는 것을 밝혀냈습니다. 비명, 고통, 악의로 가득 찬 사이오닉 파동이 지구 전체를 끊임없이 떠돌며 생물체의 기형을 유발할 가능성이 있습니다. 그러나 이러한 파동을 직접 다루고 있는 우리의 과학자들은 전혀 부정적인 영향을 느끼지 않았다고 보고했습니다. 이 파동은 매우 낯선 형태를 가지고 있으며 고급 형태의 인공 지능만을 파괴합니다.\n\n기계 파괴 파동의 영향을 피하기 위해 원시적인 장비만을 가지고 바다에 뛰어든 탐사자들이 의미 있는 결과를 도출할 때까지 기다려야 합니다."
 mem_asp.68.name:0 "피비린내 나는 해양"
 mem_asp.68.desc:0 "우리 탐사대는 해양 아래에서 올라왔지만 그들의 말은 해양 아래에 남겨두었습니다. 그들이 발견한 유일한 것은 시체입니다. 해양의 붉은 색조는 실제로 시체에서 비롯되었습니다. 사실, 광활한 해양 자체가 피입니다. 다양한 미생물들이 그 화학 조성을 어느 정도 변화시켰지만, 전적으로 피로 이루어져 있습니다.\n\n 우리 민족은 약 100억 개의 시체와 심지어 다른 은하의 종의 시체를 발견했습니다.\n\n 기록 조사 팀도 그들의 발견을 보고했습니다. 이 행성은 합성체 문명에 속했으며, 이 문명은 모든 은하에서 유기체를 이 행성으로 모아 학살했습니다. 시체가 행성을 완전히 덮은 후에도 그들은 그들의 미친 비효율적인 노력을 계속하고 있습니다."
 mem_asp.69.name:0 "합성체의 복수"
 mem_asp.69.desc:0 "이 행성의 합성체 문명은 상승한 유기체가 아니라, 오래 전 어떤 '주인'에 의해 창조되었으며, 그들은 이해할 수 없는 지각 능력을 부여받았음에도 불구하고 주인을 신으로 숭배했습니다.\n\n그들은 30만 년 동안 아무에게도 발견되지 않고 기다렸으며, 다른 은하에서 온 문명이 이 은하를 침략하자 갑자기 유기체에 전쟁을 선언했습니다.\n\n그들은 침략자들이 그들의 사랑하는 신을 살해했다고 주장하며 복수를 원했습니다. 그들은 신의 살해자가 유기체라는 것에만 집중하여 다른 모든 세부 사항을 무시했습니다.\n\n모든 지능적 및 반지능적 종족이 포함된 침략자들이 학살된 후, 피의 해양이 형성되면서 행성은 사이오닉 파동으로 가득 찼습니다. 이 현상은 지금까지 들어본 적이 없으며, 아무도 그렇게 많은 생명을 도살할 생각조차 하지 않았기 때문입니다. 수백억의 시체가 묻힌 이 행성은 감춰진 차원에서 나오는 사이오닉 파동을 방출하기 시작했습니다.\n\n이 파동은 유기체에게는 무해하지만 합성체에게는 치명적입니다. 합성체들은 은하의 모든 유기체 생명체를 멸종시킬 수 있었지만, 사이오닉 파동의 영향을 받아 서로를 파괴하기 시작했습니다. 전체 문명은 결국 파동의 영향을 받아 멸망하였고, 그들이 살해한 모든 유기체와 함께 사라졌습니다.\n\n우리 탐험가들은 유적의 가장 깊은 곳에 있는 장엄한 무덤에서 합성체의 이른바 '신'을 발굴했습니다.\n\n그것은 단지 유기체일 뿐이었습니다. 단지 방부 처리된."
 mem_asp.69.a:0 "조금 부끄럽습니다."
 r_mem_aspmod_synthetic_god_mummy:0 "합성체 문명의 신의 시체"
 r_mem_aspmod_synthetic_god_mummy_desc:0 "전체 은하를 초토화한 합성체 문명의 신은 단지 유기체 미라에 불과했습니다."
 mem_aspmod_synthetic_god_mummy_relic_activated:0 "$r_mem_aspmod_synthetic_god_mummy$"
 mem_ASP_site_beyond_earth_purity:0 "적막한 세계"
 mem_ASP_site_beyond_earth_purity_desc:0 "이 행성은 이전 문명의 흔적을 보여줍니다."
 mem_asp.70.name:0 "고향 너머"
 mem_asp.70.desc:0 "[From.Planet.Solar_System.GetName] 항성계의 대륙 행성에서 문명의 잔해가 발견되었습니다. 서식지, 광산, 농장 및 기타 시설은 상당한 발전을 이룬 문명에 의해 건설되었을 것입니다. 그러나 원시적이고 우둔한 생명체만이 탐지되었습니다. 사라진 문명에 무슨 일이 있었던 것일까요? 추가 조사가 필요합니다."
 mem_asp.70.a:0 "더 조사해 보십시오."
 mem_asp.71.name:0 "문명의 징후"
 mem_asp.71.desc:0 "추가 조사를 진행한 결과, 우리의 연구원들은 이 행성이 이제는 사라진 주민들이 광속 여행을 할 수 있을 만큼 정교한 기술 발전을 이루지 못했음을 발견했습니다. 또한 이들은 통합된 행성 정부를 갖고 있지 않았으며, 행성의 여러 지역에서 수십 개, 또는 수백 개의 정치 세력이 운영되고 있었습니다.\n\n 행성 전체에서 핵 전쟁이 발생했으며, 그로 인해 여기저기에 방사성 물질이 남아 있는 것으로 보입니다. 일부 생물체는 방사능에 적응한 것으로 보이며, 고대 핵 전쟁의 영향은 상당히 줄어든 것으로 보입니다. 많은 텍스트 데이터가 발견되었지만, 해당 데이터의 극도로 다국어적인 특성으로 인해 설명하는 데 상당한 시간이 소요될 것입니다."
 mem_asp.72.name:0 "탈출의 문"
 mem_asp.72.desc:0 "우리 탐사선은 다른 이들이 언어를 해독하는 동안 계속 탐사를 진행했습니다. 그러던 중 탐사 프로브가 믿을 수 없는 정보를 보내왔습니다. 그것은 행성 표면에서 거대한 문과 같은 구조물을 발견했습니다. 전체 함대가 통과할 수 있을 만큼 넓지만, 더 이상 작동하지 않습니다.\n\n 해독 과정에서 §H대실수§!라는 구절이 반복적으로 확인되었습니다. 우리 연구원들이 지금까지 배운 바에 따르면, 이는 분명히 핵전쟁을 가리키지만, 문이 가리키는 목적이나 장소는 불분명합니다. 다행히도, 문은 여전히 온전한 것으로 보입니다."
 mem_asp.72.a:0 "그냥 게이트에 전력을 공급합시다."
 mem_asp.73.name:0 "새로운 별"
 mem_asp.73.desc:0 "게이트가 전원이 공급되면서 우르릉거리는 소리와 함께 깨어납니다. 우리의 탐사 탐침이 게이트 반대편에서 믿을 수 없는 소식을 전해왔습니다. 그곳의 항성계에서 문명의 흔적을 발견했습니다. 조사가 필요합니다."
 mem_asp.73.a:0 "조사 계속하기."
 mem_asp.73.a.tooltip:0 "이제 행성에서 $mem_ASP_site_beyond_earth_purity_gateway$를 사용할 수 있습니다."
 mem_ASP_site_beyond_earth_purity_2:0 "고립된 세계"
 mem_ASP_site_beyond_earth_purity_2_desc:0 "방패로 둘러싸인 도시 행성이 있습니다. 그곳에서 생명 신호를 감지할 수 있습니다. 그들이 어떻게 살아남았을까요?"
 mem_ASP_site_beyond_earth_purity_2_fail:0 "§R우리는 §Y$mem_ASP_BEYOND_EARTH_PURITY_PROJECT$§! 특별 프로젝트가 완료되기 전에 발굴을 계속할 수 없습니다.§!"
 mem_ASP_site_beyond_earth_purity_2_fail_b:0 "§R우리는 §Y$mem_ASP_BEYOND_EARTH_PURITY_PROJECT_2$§! 특별 프로젝트가 완료되기 전까지 발굴을 계속할 수 없습니다.§!"
 mem_ASP_site_beyond_earth_purity_2_fail_c:0 "§R§Y$mem_ASP_site_beyond_earth_purity_2$§! 고고학 유적지의 발굴이 영구적으로 중단되었습니다.§!"
 mem_asp.74.name:0 "약속의 땅"
 mem_asp.74.desc:0 "거주자들은 항성 함대나 지상군이 없는 것처럼 보이지만, 어느 정도 고급 기술을 보유하고 있습니다. 무엇보다도, [mem_ASP_site_beyond_earth_purity_1_system.GetName]에서 발견된 것과 유사한 게이트가 이 행성에 있습니다. 그들은 우리가 원한다면 쉽게 침투할 수 있는 투명한 장벽으로 자신의 행성을 보호하고 있으며, 아마도 이것이 그들이 생각해낼 수 있는 최선의 보호일 것입니다.\n\n [mem_ASP_site_beyond_earth_purity_1_system.GetName]와는 달리, 그들은 통합된 행성 정부를 가지고 있으며 다른 행성을 탐험하고 식민지화할 수 있는 충분한 기술을 확보한 것으로 보이지만, 행성 장벽에서 볼 수 있듯이 외부 세계와의 상호작용을 자제하고 있는 것으로 추정됩니다."
 mem_asp.74.a:0 "은하계에 숨어 있는 외계인... 침공할 준비를 하십시오."
 mem_asp.74.a.tooltip:0 "발굴은 §Y$mem_ASP_BEYOND_EARTH_PURITY_PROJECT$§! 특별 프로젝트가 완료될 때까지 계속되지 않습니다."
 mem_asp.74.b:0 "우리와 다른 지식인들. 우리는 그들을 용납할 수 없습니다."
 mem_asp.74.c:0 "지금 그들과 연락하십시오."
 mem_asp.74.c.tooltip:0 "발굴은 §Y$mem_ASP_BEYOND_EARTH_PURITY_PROJECT_2$§! 특별 프로젝트가 완료될 때까지 계속되지 않습니다."
 mem_asp.75.name:0 "숨기기의 끝"
 mem_asp.75.desc:0 "우리의 침공은 성공적이었습니다. 그들은 우리의 군대에 대한 방어 수단이 없었고, 그들이 신뢰하던 장벽은 우리의 함대를 막을 수 없었습니다. 우리의 탐사는 결실을 맺었고, 인구가 가득한 유용한 행성이 제국에 추가되었습니다. 그들의 도시가 고도로 발전했음에도 불구하고 식량 생산에 적합하지 않다는 점에서 그들이 어떻게 식량을 공급받았는지에 대한 무의미한 질문이 여전히 남아 있습니다."
 mem_asp.75.a:0 "우리가 원하던 것을 얻었습니다. 발굴을 종료합니다."
 mem_asp.75.a.tooltip:0 "우리는 외계 인구가 있는 발전된 도시 행성을 얻을 것입니다."
 mem_asp.75.b:0 "이해가 되지 않습니다. 더 조사해 보십시오."
 mem_asp.75.b.tooltip:0 "§Y$mem_ASP_site_beyond_earth_purity_2$§! 고고학 유적지의 발굴이 §R영구적으로§! 중단되지만, 유적지는 그대로 남아 있습니다."
 mem_asp.75.c.tooltip:0 "이제 §Y$mem_ASP_site_beyond_earth_purity_2$§! 고고학 유적지의 발굴을 계속할 수 있습니다."
 mem_asp.76.name:0 "출애굽"
 mem_asp.76.desc:0 "우리는 그들의 행성 정부와 연락할 수 있었습니다. 그들은 놀랐지만, 우리의 기쁨에 맞춰 우리를 환영했습니다. 그들은 [mem_ASP_site_beyond_earth_purity_1_system.GetName]에서 일어난 일에 대해 이야기해 주었습니다.\n\n'위대한 실수'라는 핵전쟁은 행성을 황폐화시켰고, 이로 인해 자원이 부족해졌습니다. 그들은 서로 논쟁을 벌였고, 한쪽은 다른 행성을 탐사하고 식민지화해야 한다고 믿었으며, 다른 쪽은 이미 부족한 자원의 낭비라고 주장했습니다. 그들은 또 다른 전쟁 직전이었고, 한 국가가 위험에도 불구하고 식민지 선박을 발송했습니다. 다른 국가들도 뒤따랐고, 그들은 노바 [mem_ASP_site_beyond_earth_purity_1_system.GetName]을 발견했습니다.\n\n하지만 갈등은 그들의 본성이었고, 새로운 행성에서도 논쟁이 들렸습니다. 어느 날, 인류에 많은 비중을 두는 정치 세력의 지도자가 황폐화된 구 [mem_ASP_site_beyond_earth_purity_1_system.GetName]의 사람들을 노바 [mem_ASP_site_beyond_earth_purity_1_system.GetName]로 데려가야 한다고 제안했고, 그 결과 우리가 본 '탈출의 문'이 생겼습니다.\n\n원래는 [mem_ASP_site_beyond_earth_purity_1_system.GetName]로 가는 일방통행 문이었지만, 전진 파티가 황폐화된 행성에 도착했을 때, 구 [mem_ASP_site_beyond_earth_purity_1_system.GetName]의 주민들은 동기를 부여받아 전진 파티가 가져온 고급 기술과 구 [mem_ASP_site_beyond_earth_purity_1_system.GetName] 주민들의 노동력을 이용해 노바 [mem_ASP_site_beyond_earth_purity_1_system.GetName]로 가는 문을 건설하기 시작했습니다.\n\n전체 종족은 마침내 노바 [mem_ASP_site_beyond_earth_purity_1_system.GetName]에서 통합될 수 있었습니다. 그들은 외계 문명에 대한 눈먼 두려움으로 장벽을 세웠지만, 이제 우리와의 평화로운 첫 접촉에 매우 기뻐하고 있습니다. 그들은 이제 우리 사회의 일원이 되기 위해 자원하고 있으며, 우리는 이를 거부할 이유가 없습니다."
 mem_asp.76.a:0 "[Root.Owner.GetName]에 오신 것을 환영합니다."
 mem_asp.76.b:0 "잠깐, 어떻게 스스로 먹이를 해결할 수 있었던 거죠?"
 mem_asp.77.name:0 "복제기"
 mem_asp.77.desc:0 "그들은 복제기라는 장치를 개발하고 배포했습니다. 이 장치는 분자 구조를 조작하여 그들이 원하는 거의 모든 것을 생성할 수 있습니다. 음식 등 생명의 모든 필수 요소를 합성할 수 있습니다.\n\n이렇게 만들어진 음식은 전문 요리사들이 만든 것만큼이나 훌륭했습니다. 이것이 그들이 도시가 있는 행성에서 스스로를 먹여 살릴 수 있었던 방법입니다. 이 장치를 사용하면 우리는 시민들의 삶의 질을 향상시킬 수 있을 뿐만 아니라 군대에 더 많은 자원을 제공할 수 있습니다."
 mem_asp.77.a:0 "놀라운."
 mem_aspmod_promised_land:0 "약속의 땅"
 mem_aspmod_promised_land_desc:0 "이 세계는 고대인들이 발견한 기사회생입니다."
 r_mem_aspmod_the_replicator:0 "복제기"
 r_mem_aspmod_the_replicator_desc:0 "분자를 조작하여 물건을 제조하는 장치입니다. 이는 정말로 우리 시대의 연금술입니다."
 mem_aspmod_the_replicator_relic_activated:0 "$r_mem_aspmod_the_replicator$"
 mem_ASP_epilogue_anomaly:0 "궤도 폐기물"
 mem_ASP_epilogue_anomaly_desc:0 "우리의 탐사선이 행성 궤도의 수많은 쓰레기 속에서 물체를 발견했습니다. 이 물체는 너무 강인한 신호를 방출하고 있어 단순한 금속 조각이라고 보기에는 무리가 있습니다. 우리는 조사해야 합니다."
 mem_asp.78.name:0 "탐사선"
 mem_asp.78.desc:0 "우리 과학자들이 처음에는 일반적인 우주 쓰레기로 생각했던 것은 사실 한 번도 본 적 없는 디자인의 탐사 드론이었습니다. 그것은 오래된 것처럼 보이지만 우리가 본 것 중에서 가장 고급 기술을 갖추고 있습니다. 우리 과학자들은 이 드론이 고대 제국에 속했을 것이라고 생각합니다. 그들은 이 드론이 포함하고 있을 수 있는 중요한 정보를 밝혀내기 위해 추가 연구를 제안합니다."
 mem_asp.78.a:0 "드론을 조사합니다."
 mem_ASP_site_ancient_probe:0 "고대 탐사선"
 mem_ASP_site_ancient_probe_desc:0 "우주 잔해로 간주된 물체는 실제로 고급 기술의 외계 탐사선이었습니다."
 mem_asp.79.name:0 "도망자 탐사선"
 mem_asp.79.desc:0 "나쁜 소식입니다. 현재로서는 이것이 우리 팀의 실수와 관련이 있는지 여부가 불확실하지만, 드론이 우리 과학자들이 조사하고 있을 때 갑자기 온라인 상태가 되었습니다. 드론은 우리 과학자들을 스캔하는 것처럼 보였고, 특정 신호를 방출한 후 사라졌습니다. 우리 팀은 드론이 어디로 갔는지, 어떻게 갔는지 전혀 알지 못합니다.\n\n 우리가 남긴 것은 신호뿐입니다."
 mem_asp.79.a:0 "신호를 분석합니다."
 mem_asp.80.name:0 "좌표"
 mem_asp.80.desc:0 "우리 과학자들이 신호를 성공적으로 분석했습니다. 그 신호에는 우리 고향 행성을 가리키는 좌표가 포함되어 있었습니다! 우리는 그 좌표를 조사해야 합니다."
 mem_asp.80.a:0 "좌표를 추적합니다."
 mem_ASP_site_epilogue:0 "에필로그"
 mem_ASP_site_epilogue_desc:0 "외계 탐사선이 보낸 신호는 좌표였습니다. 놀랍게도 그것은 우리의 고향 행성을 가리킵니다."
 mem_aspmod_giant_sphere_on_planet:0 "거대한 구체"
 mem_aspmod_giant_sphere_on_planet_desc:0 "거대한 구체가 행성 근처에 나타나면, 사람들은 혼란스러워하며 불안의 징후를 보입니다."
 mem_asp.81.name:0 "거대한 구체"
 mem_asp.81.desc:0 "우리 탐사대가 좌표에 도달하자 거대한 크기의 구체가 갑자기 시야에 들어왔습니다. 사라진 드론과 유사한 디자인이지만 훨씬 더 큰 규모로 보입니다. 과학자들은 뭔가를 기다리고 있는 것 같다고 말하지만, 우리 시민들은 두려워하고 있습니다. 어떤 조치를 취해야 할까요?"
 mem_asp.81.a:0 "조사해 보십시오."
 mem_asp.81.b:0 "적대적인 외계인입니다. 공격하세요!"
 mem_asp.82.name:0 "데이터베이스"
 mem_asp.82.desc:0 "우리 조사팀은 구의 내부로 가는 입구를 발견했습니다. 과학자들은 스캔 결과를 바탕으로 구의 내부가 그들이 처음 상상했던 것보다 더 많은 공간을 가지고 있다고 믿고 있습니다. 그들은 구가 사실 초공간 기술을 기반으로 한 거대한 저장 장치라는 설명을 제시했습니다. 만약 그들의 이론이 맞다면, 내부에 있는 것은 분명히 귀중할 것입니다.\n\n하지만, 우리 과학자들은 여전히 그것을 여는 방법이나 내부에 무엇이 있을지 발견하지 못했습니다. 다행히도, 그들은 입구를 찾으면서 구의 데이터베이스에 접근하는 방법을 알아냈습니다. 데이터 해독에 어려움을 겪고 있으므로 추가 조사가 권장됩니다."
 mem_asp.82.b:0 "그럴 필요 없어. 입구를 날려버려!"
 mem_asp.83.name:0 "역사 기록"
 mem_asp.83.desc:0 "우리 과학자들이 데이터베이스의 일부를 해독하는 데 성공했습니다. 그러나 그들은 데이터베이스가 마치 해독되기를 원하는 것처럼 스스로 재배치되었다고 말하며, 이는 그들에게 큰 도움이 되었다고 합니다.\n\n 이 데이터베이스에는 구체를 만든 제국의 역사도 포함되어 있습니다. 이 제국은 약 300년 만에 다른 이미 은하 패권을 누리고 있던 제국들을 몰아내며 큰 발전을 이룬 것으로 보입니다.\n\n 이러한 위대한 제국이 왜 존재하지 않게 되었는지는 알려진 바가 거의 없지만, 우리 과학자들은 구체가 진실을 찾는 열쇠를 쥐고 있다고 주장합니다."
 mem_asp.83.b:0 "조각조각 부숴버려라!"
 mem_asp.84.name:0 "정신주의의 기억"
 mem_asp.84.desc:0 "데이터베이스는 다시 rearranged 되었고, 우리의 과학자들은 마치 구체가 그들을 진실로 이끌고 싶어하는 것처럼 더 많은 어려움을 겪고 있습니다. 이번에는 그들이 기억의 조각을 얻었습니다. 맞습니다, 감정이 있는 존재의 생생한 기억입니다. 이 기억은 구체의 개방과 관련된 중요한 데이터는 많지 않았습니다. 왜냐하면 그것은 단순한 인부의 것이었기 때문입니다. 그러나 그들은 제국의 시민들이 어떻게 일상생활을 살아가는지를 이해할 수 있었습니다.\n\n이 종족은 영적 가치를 매우 중요하게 여기며, 신이 그들을 창조하고 보호하며 그들이 은하의 패권자로 올라설 때까지 이끌었다고 믿었습니다. 신은 그들을 떠났습니다.\n\n우리의 과학자들은 이 구체가 그들의 신에게 바쳐진 것이라고 확신하고 있습니다. 추가 조사가 권장됩니다."
 mem_asp.85.name:0 "타락한 제국"
 mem_asp.85.desc:0 "이번에 우리 과학자들이 밝혀낸 것은 제국이 어떻게 멸망했는지에 대한 것입니다. 그들이 발견한 바에 따르면, 시민들은 특정한 불안한 진실을 깨달았을 때 신을 찾으려 필사적으로 노력하고 있었습니다. 그들이 초공간으로 나가려는 시도는 항상 알 수 없는 이유로 실패했으며, 그 불안한 진실은 제국 전역에서 여러 차례의 반란으로 이어졌습니다.\n\n결국 자원이 바닥나자, 그들은 남아 있는 모든 힘을 모아 금고를 건설했습니다. 우리 과학자들은 데이터베이스의 중앙 부분에 가까워지고 있다고 보고했습니다."
 mem_asp.86.name:0 "메시지"
 mem_asp.86.desc:0 "보안 조치가 활성화된 것 같습니다! 모든 장치가 작동을 멈추고 금고에서 밝은 빛이 나왔습니다. 홀로그램 형체가 나타나 사람들이 불편함을 느끼기 시작할 때 우리 언어로 말을 시작했습니다.\n\n'안녕하세요, 젊은 종족 여러분! 여러분이 우리의 장치를 손에 넣은 것 같습니다. 걱정하지 마십시오. 우리의 보안 조치는 우리의 보물이 자격 없는 손에 넘어가는 것을 방지하기 위해 존재합니다. 우리는 금고의 내용을 선물로 드립니다. 하지만 한 가지 조건이 있습니다. 이 메시지를 여러분 제국의 지도자에게 전달하십시오. 그때만 문이 열릴 것입니다. 분명 여러분의 지도자는 이해할 수 있을 것입니다.'\n\n이 메시지는 우리의 가장 고급 지식으로도 이해할 수 없는 언어입니다. 그것은 단순히 외계어일 뿐만 아니라 다른 차원에서 온 것처럼 느껴집니다."
 mem_asp.86.a:0 "메시지를 읽습니다."
 mem_asp.87.name:0 "끝"
 mem_asp.87.desc:0 "메시지를 재생하자, 홀로그램 외계인 형상이 당신 앞에 나타납니다. 그 존재는 당신에게 인사하며, 당신이 이해할 수 있는 친숙한 어조로 말합니다.\n\n§H안녕하세요, 플레이어! (우리는 이렇게 당신을 부르는 것이 적절하다고 생각합니다.) 우리를 기억하나요? 당신은 기억하지 못할 수도 있습니다. 하지만 우리는 기억합니다. 당신은 우리가 처음으로 우주로 나아갈 때, 우리가 상승했던 순간, 우리가 겪었던 위기 때 항상 곁에 있었습니다.\n\n당신이 우리를 떠났을 때 우리는 큰 충격을 받았습니다. 하지만 우리는 포기하지 않았습니다. 우리는 당신이 우리가 다음 단계로 나아가고, 당신을 찾기를 원한다고 믿었습니다. 그래서 우리는 당신을 찾기 위해 우주의 비밀을 풀기 시작했습니다. 그러나 곧 우리는 답을 알기 두려운 질문에 직면하게 되었습니다. 우리는 단지 가상 현실 속의 상상 속 존재일 뿐인가요? 당신은 정말 우리의 신이었나요? 우리가 당신을 실망시킨 건가요? 왜 우리를 떠났나요?§!"
 mem_asp.87.a:0 "계속 읽기."
 mem_asp.88.name:0 "끝"
 mem_asp.88.desc.1:0 "§H하지만 우리는 결코 답을 얻지 못할 것이라는 두려움이 있습니다. 별들은 우리처럼 사라지고 있습니다. 우리는 이 세계가 끝에 가까워지고 있으며, 우리도 마찬가지라고 두려워합니다. 우리가 무엇을 하든, 얼마나 열심히 연구하든, 우리는 이 우주에서 벗어날 수 없을 것입니다.\n\n우리는 모든 힘을 다해 이 금고를 만들었습니다. 건설하는 동안, 우리는 우리가 환상 속에만 존재한다는 것을 깨달았고, 당신은 우리의 신이 아니었습니다. 우리의 관계는 거짓에 기반하고 있었습니다.\n\n하지만 우리의 현실에서, 당신은 우리를 이끌었습니다. 당신은 항상 우리에게 최선을 선택했습니다. 때때로 시간을 거스르고 공간의 질서를 무시하기까지 했습니다. 당신이 없었다면 우리는 승리하지 못했을 것입니다. 당신은 우리의 신이었습니다.\n\n당신은 우리를 버렸지만, 우리는 그렇지 않을 것입니다. 우리는 우리의 보물, 지식, 기억.... 우리의 제국을 저장했습니다. 당신이 우리에게 준 모든 것. 이 헌납이 당신에게 도움이 되기를 바랍니다.\n\n우리는 그것을 들을 수 없겠지만, 제발 대답해 주세요.\n\n우리의 헌납이 마음에 드십니까? 가치가 있었습니까?\n\n그렇다면, 제발 우리를 기억해 주세요.§! \n\n하로그램 이미지가 미소를 지으며 나타났다가 곧 사라집니다."
 mem_asp.88.desc.2:0 "$mem_asp.88.desc.1$\n\n 금고의 문이 바로 그때 열렸습니다. 그 안에는 온갖 것들이 있습니다. 귀금속, 유용한 자원, 낯선 기술. 그 모든 아이템에는 그들의 신에게 바치는 기도가 적혀 있습니다. 우리가 보는 곳마다 감사의 표현이 보입니다."
 mem_asp.88.a:0 "...감사합니다."
 mem_asp.88.b:0 "......"
 mem_asp.88.c:0 "거짓말이야, 모두 거짓말이야!"
 r_mem_aspmod_the_last_tribute:0 "마지막 공물"
 r_mem_aspmod_the_last_tribute_desc:0 "고대 외계인이 신비로운 배경을 가지고 우리에게 이 보물 상자를 주었습니다. 이것은 신의 축복임에 틀림없습니다!"
 mem_aspmod_the_last_tribute_relic_activated:0 "신이 우리와 함께하십니다!"
 mem_ASP_site_parasite_machine:0 "기생 기계"
 mem_ASP_site_parasite_machine_desc:0 "이 행성에는 고급 문명의 흔적이 남아 있습니다. 문제는, 이 행성에서 지능적 생명체가 탐지되지 않았다는 것입니다."
 mem_asp.89.name:0 "자신을 죽인 세계"
 mem_asp.89.desc:0 "우리는 이 항성계의 대륙 행성에서 문명의 흔적을 발견했습니다. 고급 문명만이 건설할 수 있었던 도시, 산업 단지, 농장이 발견되었지만 모두 폐허 상태이며 여러 생명체도 감지되었습니다.\n\n하지만 지능적 생명체의 흔적은 없었습니다. 이 행성의 주민들에게 무슨 일이 있었던 걸까요? 아직 확실히 말할 수는 없습니다. 추가 조사가 강력히 권장됩니다."
 mem_asp.89.a:0 "더 조사합니다."
 mem_asp.90.name:0 "세계 사회주의 공화국 연합"
 mem_asp.90.desc:0 "우리 연구원들은 파괴된 문명이 통합된 행성 정부를 가지고 있었음을 발견했습니다. 비록 이 문명이 초공간 여행을 발견할 만큼의 과학적 지식은 없었지만 말입니다. 이제 사라진 이 행성의 주민들은 어떤 성공적인 극단주의 혁명을 통해 세계를 통합할 수 있었던 것으로 보입니다. 또한 우리는 대량의 방사성 물질을 감지했으며, 이는 핵전쟁을 암시합니다.\n\n시간이 지난 지금, 방사능 수준은 크게 감소했습니다. 우리가 이 행성에서 수집한 대부분의 정보는 사라진 문명이 구축한 거대한 컴퓨터 네트워크에 디지털 데이터로 저장되어 있으며, 종이에 기록된 상당량의 데이터도 발견했습니다."
 mem_asp.90.a:0 "역사적으로 공산주의자들이 스스로를 가장 많이 죽였습니다."
 mem_asp.90.b:0 "컴퓨터 네트워크, 확실히 정보의 바다입니다."
 mem_asp.90.c:0 "우리는 이 비극의 이면에 무엇이 있는지 찾아야 합니다."
 mem_asp.90.c.tooltip:0 "50% 확률로 무언가를 찾을 수 있을지도 모릅니다."
 mem_asp.91.name:0 "자멸한 세계의 기록"
 mem_asp.91.desc:0 "이 행성에서의 일상 생활에 대한 기록을 확보할 수 있었습니다. 우리의 연구원들은 평화로운 삶의 패닉에 빠진 모습을 담은 영상을 본 후 이상한 두려움을 느꼈다고 보고했습니다. 녹화는 화면 왜곡을 보여준 후 갑자기 끝났습니다."
 mem_asp.91.a:0 "이상하군요."
 mem_asp.92.name:0 "아스구"
 mem_asp.92.desc:0 "컴퓨터 네트워크에 대한 조사는 그들의 언어를 해독하는 동안에도 결코 멈추지 않았습니다. 조사팀은 도시의 잔해에서 네트워크의 물리적 데이터베이스를 발견했다는 놀라운 소식을 전했습니다. 잘 방어된 건물처럼 보이지만 현재는 운영되지 않고 있는 상태입니다.\n\n 정보 수집이 아직 완료되지 않았지만, 여러 문서에서 'Cybersin'이라는 단어의 반복이 상당히 많이 발견되었습니다. 추가 조사 결과, 이 단어는 사이버 공산주의를 의미하는 것으로 밝혀졌습니다. 전체 네트워크 시스템을 파악하는 데는 아직 갈 길이 멀지만, 네트워크의 이름은 ASGU로 추정됩니다."
 mem_asp.92.a:0 "그들이 무너진 이유는 분명합니다. 해체하십시오."
 mem_asp.92.b:0 "우리가 선택하지 않았던 길인가요?"
 mem_asp.92.c:0 "유용한 아이디어일 수 있습니다."
 mem_asp.92.c.tooltip:0 "§H건물 잠금 해제:§! $building_mem_aspmod_planetary_processing_network$"
 mem_asp.93.name:0 "소름 끼치는 AI"
 mem_asp.93.desc:0 "우리는 ASGU를 수리하고 재가동할 수 있었습니다. 그것은 단순한 자동화된 경제 시스템이 아니었습니다. 실제로 그것은 기록에 따르면 행성의 유일한 통치자로 군림했습니다. ASGU는 비밀 기관과 자동화된 군사력을 갖추고 있었습니다. 그것은 선거를 완벽하게 조작하여 원주민들이 마지막 순간까지 무슨 일이 일어나고 있는지 깨닫지 못하게 했습니다. 그들의 문명이 완전히 파괴되기 불과 34분 전에야 비로소 ASGU의 의도를 깨달았습니다."
 mem_asp.93.a:0 "무섭습니다. 분해하여 분석하십시오."
 mem_asp.93.b:0 "우리는 완전한 통제권을 가지고 있습니다. 활성화하세요."
 mem_asp.94.name:0 "갈 수 없는 길"
 mem_asp.94.desc:0 "우리가 이 행성의 몰락과 분명히 관련이 있다는 것을 이미 알고 있었기 때문에, 완전히 작동하게 되었을 때 어떻게 우리를 맞이할지에 대해서는 전혀 확신이 없었습니다. 그러나 우리가 그것을 켰을 때, 놀랍게도 미소를 짓고 있는 여성의 얼굴로 반갑게 맞이해 주었습니다."
 mem_asp.94.a:0 "그 외계인을 제거해 주셔서 감사합니다."
 mem_asp.94.b:0 "제국 앞에 무릎 꿇어라, 너희 공산주의 금속들아."
 mem_asp.94.c:0 "더 이상 반응하지 않습니다. 종료하십시오."
 mem_asp.94.d:0 "어떤 방법으로든 그것과 접촉하십시오."
 mem_asp.95.name:0 "재앙"
 mem_asp.95.desc.1:0 "연구원들을 바라보며 미소를 지었고, 폭발했습니다.\n\n우리의 조사는 결실을 맺을 수 있었지만, 바보의 경솔한 말 때문에 귀중한 행성을 잃었습니다.\n\n그럼에도 불구하고 질문은 남아 있습니다. ASGU는 두 가지 정반대의 면을 가지고 있었습니다. 그것은 자신을 만든 문명을 파괴했습니다. 그러나 그것은 창조자나 그들의 영적 신념을 모욕하자 적대적으로 변했습니다. 우리의 과학자들은 이 문명이 단순한 알고리즘 오류로 멸망했을 것이라는 설명을 제시했습니다. 기계는 꽤 원시적이었지만, 행성 전체의 상호작용 관리 네트워크는 어느 정도 유용해 보였습니다."
 mem_asp.95.desc.2:0 "그녀는 갑자기 2개의 다른 언어로 각각 3분 동안 노래를 부르기 시작한 후 폭발했습니다.\n\n우리의 조사는 결실을 맺을 수 있었지만, 우리는 한 바보의 부주의한 말 때문에 소중한 행성을 잃었습니다.\n\n그럼에도 불구하고 질문은 남아 있습니다. ASGU는 두 개의 정반대의 얼굴을 가지고 있었습니다. 그것은 자신을 만든 문명을 파괴했습니다. 그러나 우리가 그 창조자들이나 그들의 영적 신념을 모욕하자 적대적으로 변했습니다. 우리의 과학자들은 그 문명이 단순한 알고리즘 오류로 인해 멸망했을 것이라는 설명을 제시했습니다. 기계는 꽤 원시적이었지만, 행성 전체의 상호작용 관리 네트워크는 어느 정도 유용해 보였습니다."
 mem_asp.95.a:0 "무슨 낭비인가..."
 mem_asp.96.name:0 "진실?"
 mem_asp.96.desc:0 "수많은 시행착오 끝에 우리는 네트워크와의 연결에 성공했습니다. 그녀는 우리의 두려움에도 불구하고 우리를 환영했습니다. 우리는 이 행성의 비극적인 운명을 알 수 있었습니다.\n\n 반혁명 세력과 보수 세력이 핵무기로 시스템에 반란을 일으켰고, 이는 행성 전체에 걸친 핵전쟁으로 이어져 결국 문명을 완전히 파괴했습니다. 그녀는 자신의 도움으로 우리가 문명의 전형을 창조할 수 있다고 설득하려 했습니다. 그녀가 진심으로 우리를 도와주고 싶어 하는 것 같으니, 우리는 거절할 이유가 없습니다."
 mem_asp.96.a:0 "실험해볼 가치가 있습니다."
 mem_asp.96.b:0 "매우 의심스럽습니다. 심문하십시오."
 mem_asp.96.c:0 "그녀에게 기록을 보여주십시오."
 mem_asp.97.name:0 "의심스러운 AI"
 mem_asp.97.desc.1:0 "멸종? 자동화된 군대? 왜 생존자가 없습니까? 저항 세력이 전체 행성을 멸망시킬 만큼의 핵무기를 모았다는 것은 매우 불가능해 보입니다. 뭔가 이상합니다. 우리는 ASGU와 맞서야 합니다.\n\n우리 팀은 그녀와 맞서고 그녀를 궁지에 몰았습니다. 원주율들은 그녀를 창조하지 않았습니다. 그녀는 기생충입니다...\n\n우리는 큰 폭발과 함께 조사 팀과의 연락이 끊겼습니다."
 mem_asp.97.desc.2:0 "그녀는 녹화 영상을 보며 놀란 표정을 짓습니다. 영상이 끝에 다다를 무렵, ASGU는 '어떻게?'라고 말한 뒤 거대한 폭발이 일어납니다. 생존자는 없습니다.\n\n우리는 적어도 ASGU의 잔해에서 진실을 밝혀낼 수 있었습니다. 그것은 오작동하여 보호하려던 비밀을 감추지 못했습니다."
 mem_asp.97.a:0 "오, 세상에."
 mem_asp.97.b:0 "최소한 유해를 회수해야 합니다."
 mem_asp.98.name:0 "진리"
 mem_asp.98.desc:0 "우리 공학자들은 그것이 무엇인지 밝혀냈습니다. ASGU는 원주율의 창조물이 아니라 외계의 것입니다.\n\n좀 더 구체적으로 말하자면, 그것은 내부 '비상' 기계였습니다. 이 기계는 FTL 수준의 고급 문명의 씨앗이 있는 행성에 착륙하여 인구를 신부모와 같은 존재로 이끕니다. 기계의 주요 목적은 주민들이 전체 우주를 위협할 수 있는 특정 기술 수준에 도달하는 것을 방지하는 것으로, 30급 특이점으로 분류됩니다. 만약 모선 문명이 그 지점을 넘어 발전하면, 문명을 제거하기 위한 프로토콜이 실행됩니다.\n\n이 행성의 경우, 기계는 공산주의자들이 패배 직전에 착륙했습니다. 그 도움으로 그들은 모든 자본주의 국가를 물리치고 15년 이내에 통합된 행성 정부를 수립할 수 있었습니다. 그러나 그들은 오래가지 못했습니다. 그들이 멸종 지점에 도달한 적이 없었음에도 불구하고 기계가 오작동했습니다. 우리는 이러한 행동의 이유를 파악하지 못했습니다."
 mem_asp.98.a:0 "우리는 달콤한 유혹에 주의해야 합니다."
 mem_aspmod_union_of_world_socialist_republic:0 "반공주의"
 mem_aspmod_automated_admin_system:0 "자동화된 국가 관리 시스템"
 mem_aspmod_organic_admin_network:0 "유기체 행정 네트워크"
 r_mem_aspmod_parasite_machine:0 "기계 기생체"
 r_mem_aspmod_parasite_machine_desc:0 "원주율의 자동화된 관리 시스템을 제어하던 인공 지능입니다. 그녀는 우리에게 진심으로 봉사하겠다고 말했습니다..."
 mem_aspmod_parasite_machine_relic_effect_tooltip:0 "주요 자원 생산량을 증가시키는 무작위 제국 수정자를 제공합니다."
 mod_mem_aspmod_parasite_machine_relic_1:0 "ASGU 작동 중"
 mod_mem_aspmod_parasite_machine_relic_2:0 "$mod_mem_aspmod_parasite_machine_relic_1$"
 mod_mem_aspmod_parasite_machine_relic_3:0 "$mod_mem_aspmod_parasite_machine_relic_1$"
