 esc_building_quantum_node:0 "양자 계산 노드"
 esc_building_quantum_node_desc:0 "무한의 기계의 첨단 프로세서에 기반을 둔 거대한 컴퓨팅 복합 단지입니다. 과학자들에게 엄청난 양의 자료를 제공하며, 심지어는 AI의 도움을 받아 자동적으로 기본 연구를 진행할 수도 있습니다."
 esc_building_dragon_hatchery:0 "용의 둥지"
