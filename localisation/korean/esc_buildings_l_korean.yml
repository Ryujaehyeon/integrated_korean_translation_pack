 esc_building_magmaminer_1_desc:0 "행성의 중심까지 도달하는 거대 구조물 광산입니다. 운영하기 위해서는 막대한 수의 노동자가 필요하며, 엄청난 양의 자원을 생산할 수 있습니다.\n\n§R경고: 이 건물은 작동하기 위해 $d_esc_large_borehole_1$이 필요하며, 이는 사용 가능한 구역 수를 영구적으로 1 감소시킵니다.§!"
 esc_planetary_core_miner_effect_regular_1:0 "£job_esc_planetary_core_miner£ $job_esc_planetary_core_miner_plural$는 행성의 맨틀과 핵을 채굴하여 대량의 £minerals£ §Y$minerals$§!을 생산합니다."
