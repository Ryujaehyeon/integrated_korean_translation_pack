l_korean:
 mem_astral_tales.3.name:0 "신비로운 손님"
 mem_astral_tales.3.desc:0 "[ruler.GetHisHer] 사무실에 들어서자, [ruler.GetRulerTitle] [ruler.GetName]는 즉시 뭔가 이상하다는 것을 느꼈습니다. 조명이 불안할 정도로 어두워졌고, 예전보다 훨씬 더 그랬습니다. 어두운 그림자가 방 구석에서 기어 나와 보이는 것의 남은 부분을 갉아먹고 있습니다.\n\n이 그림자들 속에서 후드가 있는 형체가 나타나 마치 스스로 존재하려는 듯합니다. 그 형체가 완성되자 일부 빛이 다시 돌아왔습니다.\n\n예고 없이 찾아온 손님은 조용히 [ruler.GetRulerTitle]에게 가까이 오라고 손짓합니다..."
 mem_astral_tales.3.a:0 "접근 방식에 대한 인물"
 mem_astral_tales.3.b:0 "보안에 연락하세요! 침입자 경고!"
 mem_astral_tales.4.name:0 "전령"
 mem_astral_tales.4.desc:0 "§H그 형체는 침묵 속에 서 있습니다...§!"
 mem_astral_tales.4.a:0 "여기 어떻게 들어왔습니까?"
 mem_astral_tales.4.a.response:0 "§H마치 [ruler.GetRulerTitle]의 질문에 답하듯, 그 형체는 잠시 동안 미약하지만 눈에 띄는 사이오닉 힘의 아우라를 발산합니다.§!"
 mem_astral_tales.4.b:0 "당신은 누구입니까?"
 mem_astral_tales.4.b.response:0 "§H[ruler.GetRulerTitle]의 마음에 [mem_shroudwalker_country.GetName]의 문장을 나타내는 이미지가 형성됩니다.§!"
 mem_astral_tales.4.c:0 "당신은 왜 여기 있습니까?"
 mem_astral_tales.4.c.response:0 "§H모자 쓴 손님이 작은 정육면체 모양의 금속 물체를 드러내고 조심스럽게 땅에 놓습니다.\n\n그 형체는 천천히 몇 걸음 뒤로 물러나 다시 그림자 속으로 녹아들어 완전히 사라질 때까지 계속합니다."
 mem_astral_tales.4.d:0 "이게 뭐죠?"
 mem_astral_tales.5.name:0 "여행자"
 mem_astral_tales.5.desc_02:0 "§H큐브가 부드러운 빛을 발하기 시작합니다. 잠시 후, 그곳에서 오릴라의 홀로그램이 투사되었습니다.§!\n\n나는 당신을 맞이합니다, [ruler.GetRulerTitle].\n\n마침내 당신을 만나기 위해 꽤 긴 여정을 해야 했습니다.\n\n§H홀로그램이 [ruler.GetName]에게 경의를 표하는 듯한 모습을 보입니다...§!"
 mem_astral_tales.5.desc_01:0 "§H큐브가 부드러운 빛을 발하기 시작합니다. 잠시 후, 그곳에서 알려지지 않은 외계인의 홀로그램이 투사되었습니다.§!\n\n나는 당신을 인사합니다, [ruler.GetRulerTitle].\n\n당신을 만나기 위해 꽤 긴 여정을 해야 했습니다.\n\n§H홀로그램이 [ruler.GetName]에게 경의를 표하는 듯한 기미를 보입니다...§!"
 mem_astral_tales.5.a:0 "챕'린? 너 맞아?"
 mem_astral_tales.5.b:0 "당신은 누구이며 무엇입니까?"
 mem_astral_tales.6.desc_01:0 "§H홀로그램이 살짝 고개를 기울입니다.§!\n\n이분법적 명칭이 당신의 종에게 이름으로는 거의 충분하지 않을 것이라고 생각합니다. 이 그림자 걷는 자들은 제 구체가 그들의 그림자 터널에서 튕겨져 나간 이후 저를 '여행자'라고 부르게 되었고, 이제 저를 어떤 신성한 전령으로 믿고 있습니다.\n\n§H여행자가 알아보기 힘든 윙크를 보냅니다.§!\n\n하지만 제가 그들을 바로잡을 수 있는 존재인가요? 단순한 홀로그램, 과학자, 심지어 의사일 뿐입니다. 하지만 신학자는 아닙니다, 아닙니다. 사실, 그들의 무지는 제 목적에 꽤 유익하게 작용했으며 제가 있어야 할 곳에 있게 해주었습니다. 하지만 걱정하지 마십시오, 저는 당신에게 의료 비상 사태의 본질을 말하라고 요청하러 온 것이 아닙니다. 사실, 당신은 꽤 괜찮아 보입니다... 지금은요. 게다가, 제 전문 분야는 전혀 다른 곳에 있습니다."
 mem_astral_tales.6.desc_02:0 "§H오릴라가 살짝 고개를 기울입니다.§!\n\n죄송합니다. 그 이름은 익숙하게 들리지만, 제 것은 아닙니다.\n\n제 초기 지명은 당신에게도 별로 도움이 되지 않을 것입니다. 이 그림자 걷는 자들은 제가 그들의 그림자 터널에서 쫓겨나자 저를 '여행자'라고 부르기 시작했고, 이제 그들은 저를 어떤 신성한 전령으로 믿고 있습니다.\n\n§H여행자가 알아보기 힘든 윙크를 합니다.§!\n\n하지만 제가 그들을 바로잡을 수 있을까요? 단순한 홀로그램, 과학자, 심지어 의사일 뿐입니다. 하지만 신학자는 아닙니다, 아닙니다. 사실, 그들의 무지는 제 목적에 꽤 유익하게 작용했으며 제가 있어야 할 곳에 있게 해주었습니다. 하지만 걱정하지 마십시오, 저는 당신에게 의료 응급 상황의 본질을 말해달라고 요청하러 온 것이 아닙니다. 사실, 당신은 꽤 괜찮아 보입니다... 지금은요. 게다가, 제 전문 분야는 전혀 다른 곳에 있습니다."
 mem_astral_tales.6.desc_03:0 "§H가능한 함의를 깨닫고 그는 부끄러움에 고개를 저었다.§!\n\n전혀 그렇지 않습니다. 그 점에 대해서는 확신할 수 있습니다. 같은 대화를 천 번이나 나누고 모든 가능한 결과를 이미 알고 있다면, 여기저기 즉흥적으로 변화를 주어 흥미를 더하려고 할 것입니다. 하지만 제 말이 선택받은 사회에 맞지 않았던 것 같습니다. 사과드립니다."
 mem_astral_tales.6.a:0 "지금요? 그게 위협인가요?"
 mem_astral_tales.6.b:0 "그렇다면 당신의 전문 분야는 무엇입니까?"
 mem_astral_tales.6.c:0 "'천 번'이라는 말은 무슨 뜻인가요?"
 mem_astral_tales.7.desc_01:0 "§H손짓 하나로 여행자 주변의 여러 화면이 깜박이기 시작합니다. [ruler.GetName]는 이전에 들어본 적이 없는 외계 문명 간의 전쟁, 행성 재앙, 은하 전역의 재난, 죽음과 파괴, 그리고 새로운 문명의 재탄생의 조각들을 알아차릴 수 있습니다. 창조와 파괴의 순환...§!\n\n보시다시피, 저는 여러분이 역사학자, 고고학자, 그리고 마지막으로 물리학자라고 생각할 수 있는 것의 혼합체입니다. 그러나 일반적인 종류와는 달리, 저는 과거를 연구하지 않습니다 - 제가 방문하는 곳의 현재를 연구하여 지식을 축적합니다. 무한한 생명을 가진 특권이죠.\n\n다음은 제가 물리학에 대한 전문 지식을 발휘하는 곳입니다. 여러분이 적어도 다중우주 이론 - 우리의 현실 옆에 존재하는 평행 현실에 대해 알고 있다고 가정해도 괜찮을까요? 사실, 제 경우에는 이론이라기보다는 실질적인 문제에 가깝습니다. 이러한 다양한 현실들 사이에 포괄적인 연결을 형성하는 다른 존재의 차원도 있습니다. 여러분이 알고 있는 장막과, 아마도 만나고 싶지 않을 끔찍한 에너지 존재들이 사는 천체 차원 - 그것들이 바로 그런 것들 중 두 가지입니다.\n\n저는 평행 우주 간에 이동하기 위해 이러한 차원을 가로지릅니다. 사실, 저는 명확한 목적 없이 그냥 방황하지는 않습니다. 아마 여러분은 '세상은 하나의 무대이며, 모든 남자와 여자는 단지 배우일 뿐이다'라는 속담을 들어본 적이 있을 것입니다. 그렇다면 그들은 누구를 위해 연기하고 있는 걸까요? 누가 지켜보고 있는 걸까요?\n\n이것이 제가 오래 전에 스승들로부터 계시를 받기 전, 스스로에게 질문했던 것입니다. 모든 현실에는 적어도 하나의 특별한 문명이 존재하는데, 그 문명에 대한 고차원 존재의 유일한 초점이 그 문명에만 집중되어 있습니다.\n\n제 스승들로부터 주어진 임무는 그러한 문명을 찾아내고 여러분과 같은 방식으로 접촉하는 것입니다. [ruler.GetHeShe]"
 mem_astral_tales.7.desc_02:0 "§H여행자가 고개를 끄덕입니다...§!\n\n실제로 그렇습니다. 하지만 그뿐만이 아닙니다. 그들은 또한 당신의 전체 문명에 다양한 방식으로 영향을 미칩니다. 예를 들어, 당신은 한때 부적절하거나 비논리적으로 보였던 결정을 내린 적이 있습니까? 그러나 그 결정이 나중에 그 상황에서 가능한 최선의 결과로 이어졌던 경우가 분명히 있을 것입니다.\n\n이것이 그들의 영향력이 미칠 수 있는 범위입니다. 그들은 우리의 시간과 공간에 대한 인식에 얽매이지 않으며, 그들 중 일부는 과거, 현재, 미래에 대한 완전한 지식을 가지고 있어 이를 자신의 목표를 달성하는 데 사용합니다. 좋든 나쁘든 말입니다."
 mem_astral_tales.7.desc_03:0 "나의 후원자들은 당신을 통해 당신의 고차원 존재에게 메시지를 전달하고자 합니다. 그러나 그 메시지의 내용에 대한 지식은 당신의 현실 인식을 영원히 변화시킬 수 있음을 유의하십시오. 이전의 다른 이들은 그 의미의 무게에 의해 무너졌습니다.\n\n메시지를 받을지 여부는 당신의 결정입니다."
 mem_astral_tales.7.a:0 "더 높은 힘이 우리를 지켜보고 있나요?"
 mem_astral_tales.7.b:0 "그렇다면, 왜 저희에게 연락하신 건가요?"
 mem_astral_tales.7.c:0 "우리는 알아야 합니다!"
 mem_astral_tales.7.d:0 "모르는 것이 더 나은 경우도 있습니다."
 mem_astral_tales.8.desc_01:0 "§H여행자는 요청받은 메시지를 전달하기 시작합니다...§!\n\n안녕하세요, 저는 More Events Mod의 Malthus입니다.\n\n먼저 이 간섭에 대해 사과드리지만, Stellaris 외부에서 여러분에게 실제로 연락할 방법이 없었습니다. 스팀 페이지나 다른 소셜 미디어에 남긴 메시지는 아마도 몇몇 사람들만 볼 수 있을 것입니다. 그러나 이 이벤트가 제가 우리 모드의 콘텐츠를 통해 여러분에게 직접 이야기하는 유일한 시간이 될 것임을 확신할 수 있습니다.\n\nMEM 작업은 2016년 Stellaris 출시 직후 시작되었고, 그 해 5월에 스팀에 처음 출시되었습니다. 처음에는 몇 가지 추가적인 이상 현상과 기초적인 이벤트로 시작했습니다. VonMourn이 시간 문제로 프로젝트에서 물러나면서 저는 2016년 7월 18일부터 워크숍에서 배포를 맡게 되었고 - 지금으로부터 7년 이상 전입니다 - 남은 팀원들과 함께 게임이 받은 많은 업데이트 동안 이를 확장하고 유지해왔습니다.\n\n우리는 항상 우리의 콘텐츠를 가능한 한 몰입감 있게 만들고 싶었지만, 항상 큰 문제 하나가 있었습니다. 그것은 바로 아트 자산 - 2D든 3D든 말입니다. 우리 중 누구도 아티스트가 아니며, 함께할 의향이 있는 사람을 찾는 것은 수년간 주로 실패한 노력입니다.\n그렇지만, 우리가 설정한 목표를 달성하고 싶다면 하나의 대안이 남아 있습니다. §Y위원회.§! 다행히도 우리는 바로 그런 일을 하는 매우 유능한 아티스트와 접촉하게 되었습니다. 예전, 우리가 PayPal 기부 링크를 가지고 있었을 때, 우리는 약 20달러를 모았고, 그것은 Caligula와 제 개인 자금과 함께 모드에 사용된 패러곤과 종족 초상화 제작에 들어갔습니다. 이 텍스트 위에 있는 예시와 같이, 나머지는 우리의 스팀 워크숍 페이지의 사진 섹션에서 확인할 수 있습니다. 우리는 이 작업에 총 몇 백 달러를 썼고, 아무것도 후회하지 않습니다. 그러나 우리의 자금은 누구나 한정되어 있으므로 언젠가는 중단해야 합니다.\n\n그럼에도 불구하고, 우리는 모드에 추가하고 아티스트와의 협력을 계속하고 싶은 많은 것들이 있습니다. 이를 위해서는 여러분의 지원이 필요합니다.\n이 모드를 즐기셨다면, 우리가 이 프로젝트에 쏟은 수많은 시간들이 가치가 있었습니다. 만약 여유가 되신다면 이 프로젝트가 여러분의 지원을 받을 가치가 있다고 생각하신다면, 우리의 모드 페이지를 확인하시고 개선을 위한 기부를 부탁드립니다. 한 푼 한 푼이 중요하며, 저를 지원하기로 결정한 모든 분들께 감사드립니다.\n\n또한, 과거에 이미 지원해주신 모든 분들께 진심으로 감사의 말씀을 전하고 싶습니다. 여러분은 저의 영웅입니다.\n\n이 모든 내용을 읽어주셔서 감사합니다.\n\n§H여행자는 임무를 마치고 작별 인사를 하며 그의 큐브와 함께 물질화되지 않습니다...§!"
 mem_astral_tales.8.desc_02:0 "§H여행자는 [ruler.GetName]의 거절을 실망의 기색 없이 받아들입니다.§!\n\n이 경우, 당신에게 최선을 기원하며 이제 떠나겠습니다. 그건 그렇고, 당신의 저장 장치에 제 데이터를 몇 개 남겨두었습니다. 마음껏 사용하세요.\n\n§H잠시 후, 여행자는 [ruler.GetName]를 지나쳐 바라보며 말합니다:§!\n\n과거는 다시 올 것입니다. 우리는 다른 시간과 장소에서 다시 만날 것입니다.\n\n§H그 직후 그는 그의 큐브와 함께 물질화되지 않고 사라지고, [ruler.GetRulerTitle]는 다시 [ruler.GetHisHer] 사무실에 홀로 남겨집니다."
 mem_astral_tales.8.a:0 "그게 전부 그냥 게임이라고?!"
 mem_astral_tales.8.b:0 "안녕히 가세요, 여행자."
 mem_astral_tales_otherworldly_knowledge:0 "이세계의 지식"
