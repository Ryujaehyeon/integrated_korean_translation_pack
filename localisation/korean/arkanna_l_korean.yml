l_korean:
 arkanna.1.name:0 "떠오르는 백색 여제"
 arkanna.1.desc:0 "§H아르카나 미라§!는 §R초자연적인 힘과 마법§!을 휘두르며 대신들과 경비병들, 그리고 선황의 정예 근위대를 헤치고 왕궁으로 가는 길을 열었습니다.\n\n§H제라 자페§!의 왕관을 차지한 그녀는 절대 권력을 선포하고 새로운 §M마법정치§!를 수립했으며, §H지구§! 위에 많은 이들이 완벽한 §G유토피아§!라 부르는 것을 세웠습니다.\n\n하지만 그녀는 만족하지 않았습니다.\n\n거의 오백 년 동안 §Y불멸의 여제§!로 군림해 온 그녀는 더 많은 것을 원합니다. §Y지구만으로는 더 이상 충분하지 않습니다.§!\n\n§H제라 자페§!에 새로운 목적을 부여하기 위해, 그녀는 오직 하나의 명령을 위한 §B우주 계획§!을 창설했습니다: §B별을 향해 나아가라§!."
 arkanna.1.a:0 "§H백색 여제께 영광을!§!"
 origin_zz_order:0 "제라 자페 왕조"
 origin_zz_order_desc:0 "당신은 §H알베나르§! 행성에서 몰락한 제국의 고삐를 이어받게 됩니다.\n\n상상을 초월하는 힘을 지닌 전설적인 §Y불멸자§!, §H아르카나 미라§!가 왕궁을 습격하여 §R경비병§!과 §R전사§!, 그리고 늙은 황제 본인마저 도륙했습니다. 이제 그녀는 스스로를 절대적인 §Y여제§!로 선포했습니다.\n\n그녀의 운명은 광대합니다. 발밑의 세계보다 훨씬 더 큽니다.\n\n이제 §H제라 자페§!의 영토를 §B별들§! 너머로 확장할 때가 왔습니다."
 origin_zz_order_effects:0 "이벤트 발생: §H떠오르는 백색 여제§!.\n§H아르카나 미라§!가 통치자로 시작합니다.\n§H아르카나 미라§!는 §Y불멸의 통치자§!입니다.\n§Y백색 여제§!는 통치하는 동안 제국 전역에 강력한 보너스를 부여합니다.\n\n§G+400%§! 거대공학 건설 속도\n§G+100%§! 연구 속도\n§G+200%§! 조사 속도"
 leader_trait_zz_white_empress:0 "백색 여제"
 leader_trait_zz_white_empress_desc:0 "§H아르카나 미라§!는 단순한 통치자가 아닙니다. 그녀는 §H제라 자페§!의 절대적인 §Y백색 여제§!이자, 역사와 산업, 그리고 야망을 별을 향해 굽히는 §Y불멸자§! 군주입니다."
