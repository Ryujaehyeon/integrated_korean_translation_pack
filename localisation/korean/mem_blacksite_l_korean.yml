l_korean:
 mem_blacksite.2.name:0 " §S[blacksite_fallen_empire.GetName]§!으로부터의 통신"
 mem_blacksite.2.desc:0 "은하적으로 중요한 사업이 귀하의 협력을 필요로 합니다. 특히 민감한 프로젝트가 진행 중이며, 우리는 이를 우리 영토 내에서 수행하지 않기를 원합니다. 귀하가 통제하는 시스템 내의 [blacksite_planet.GetPlanetMoon], §Y[blacksite_planet.GetName]§!는 귀하에게 아무런 가치가 없으므로 이 프로젝트에 적합합니다. \n\n우리의 블랙 사이트 운영에 간섭하지 않고 우리의 셔틀이 자유롭게 출입할 수 있도록 해주시는 것이 모두에게 더 좋을 것입니다. \n\n이는 우리가 가볍게 요청하는 것이 아닙니다. 귀하가 귀족적인 목표에 기여할 뿐만 아니라 우리와의 좋은 관계를 쌓을 수 있는 기회입니다."
 mem_blacksite.2.a:0 "괜찮네. 비밀구역을 내어주지."
 mem_blacksite.2.a.tooltip:0 "§Y[blacksite_planet.GetName]§!은(는) [blacksite_fallen_empire.GetName]에게 제공되는 비밀구역이 될 것입니다. 이제부터는 §YFacility Six§!라고 불리게 될 것입니다.\n그들의 약속에도 불구하고, §R이 프로젝트의 결과가 어떻게 될지는 예측할 수가 없습니다.§!"
 mem_blacksite.2.b:0 "허용할 수 없다."
 mem_blacksite.2.c:0 "정확히 거기서 뭘 하려고 그러는거지?"
 mem_blacksite.2.c.response:0 "매우 중요한 프로젝트다. 걱정하지 마라. 우리는 너희들을 위험에 빠뜨리지 않을 것이다. 약속한다."
 mem_blacksite.400.name:0 "$mem_blacksite.2.name$"
 mem_blacksite.400.desc:0 "[Root.GetSpeciesName]! 좋은 소식이다. 우리가 너희들의 영토 내에서 수행한 프로젝트는 공식적으로 마무리 되었다.\n\n대성공으로 끝났을 뿐만 아니라 모든 성계가 완전히 파괴되는 것을 방지했다. 멋지지 않나?\n\n자네들은 모범적인 동업자였으니, 이바지에 대한 보상을 받을 자격이 충분하다."
 mem_blacksite.400.a:0 "뭐, 끝이 좋으면 다 좋은거지."
 mem_blacksite.500.name:0 " [blacksite_planet.GetName]에서의 대규모 폭발"
 mem_blacksite.500.desc:0 " §Y[blacksite_fallen_empire.GetName]§!에 의해 운영되는 비밀구역으로 활용되던 [blacksite_planet.GetPlanetMoon] §Y[blacksite_planet.GetName]§!에서 엄청난 폭발이 일어났으며, 그 직후 [blacksite_planet.GetPlanetMoon]은(는) 완전히 분해되어 버렸습니다. 대체 무슨 일이 있었던 것인지는 알 수 없지만, 비밀구역 작업에 사용된 장비의 파편은 지역 곳곳에서 발견되고 있습니다."
 mem_blacksite.500.a:0 "대체 무슨일이..."
 mem_blacksite.500.a.tooltip:0 "§Y[blacksite_planet.GetName]§!이(가) 폭발하여 조각난 행성이 되었습니다."
 mem_blacksite.501.name:0 "비밀구역 보고"
 mem_blacksite.501.desc:0 "[Root.GetSpeciesNamePlural]! 놀라지 마라. \n\n우리는 [blacksite_planet.GetName]이(가) 폭발한 걸 이미 알고 있었다. 이건 걱정할 일이 아니다. 지극히 정상적인 일일 뿐이다. 행성은 항상 이래왔으니, 우리를 믿어라.\n\n어쨌든 다 끝났어. 우린 이제 끝이다."
 mem_blacksite.501.a:0 "...좋아."
 mem_blacksite.501.b:0 "우리 행성을 날려먹었잖아. 여기에 대한 설명이 필요하겠는데."
 mem_blacksite.501.b.response:0 "이 뻔뻔한 애송이. 우린 자네들에게 아무것도 말하지 않겠다. 받아들여라."
 mem_blacksite.600.name:0 "비밀구역 기능정지"
 mem_blacksite.600.desc:0 "§Y[blacksite_fallen_empire.GetName]§!에 의해 운영되고 있던 [blacksite_planet.GetPlanetMoon] §Y[blacksite_planet.GetName]§!은(는) 완전히 기능 정지 상태가 되었습니다.\n\n어떤 수송선도 입장하거나 떠난 적이 없으며, 통신 또한 없습니다. 에너지 배출량 또 한 거의 눈에 띄지 않는 수준으로 떨어졌습니다. 시설은 버려진 듯합니다."
 mem_blacksite.600.a:0 "시설에 침투할 준비를 해라."
 mem_blacksite.600.a.tooltip:0 "무언가 내부에서 흥미로운 것을 발견할지도 모를 일입니다. 그러나 이것은 또한 §Y[blacksite_fallen_empire.GetName]§!이(가) 곱게 바라보지는 않을 듯합니다..."
 mem_blacksite.600.b:0 "완전히 거리를 유지한 채 관찰하도록."
 mem_blacksite.600.c:0 "그냥 내버려두는게 낫겠다."
 mem_blacksite.600.c.tooltip:0 "§Y[blacksite_fallen_empire.GetName]§!은(는) 우리가 일에 개입하는 것을 원하지 않을 것입니다. [blacksite_planet.GetPlanetMoon]은(는) 어떤 자원이나 특별한 프로젝트를 생성하지 않습니다."
 mem_blacksite.602.name:0 "비밀구역: 버려짐"
 mem_blacksite.602.desc:0 " [From.GetName]은(는) 비밀구역 내에서 아무것도 발견하지 못했다고 보고해왔습니다. 이 장소는 완전히 황폐해진 것 같습니다..."
 mem_blacksite.602.a:0 "실망스럽군."
 mem_blacksite.602.a.tooltip:0 ""
 mem_blacksite.603.name:0 "비밀구역: 살아남은 과학자"
 mem_blacksite.603.desc:0 "[From.GetName]의 승무원들이 블랙 사이트를 성공적으로 침투했다고 보고합니다. \n\n처음에는 이곳이 버려진 곳이라고 생각했지만, 그들이 지나가던 중 생존자를 만났습니다. 과학자가 대규모 대피 중에 잊혀지고 남겨진 것 같습니다. 그들은 이러한 대우에 대해 상당히 원망하고 있으며, 고향으로 돌아가기보다는 우리 제국에 봉사하기를 원합니다."
 mem_blacksite.603.a:0 "환영한다."
 mem_blacksite.603.a.tooltip:0 "새로운 과학자가 우리 제국에 합류합니다."
 mem_blacksite.603.b:0 "어쨌든, 그 과학자를 집에 보내라."
 mem_blacksite.604.name:0 "비밀구역: 단 한명의 생존자"
 mem_blacksite.604.desc:0 "[From.GetName]의 승무원들이 블랙 사이트에 성공적으로 침입했다고 보고했습니다. 내부는 상당한 피해를 입은 것으로 보이며, 곳곳에서 전투의 흔적이 발견되었습니다. \n\n깊은 곳에서 그들은 비윤리적인 사이오닉 실험의 피험체였다고 주장하는 유일한 생존자를 발견했습니다. 그들은 우리 제국에 망명을 요청했습니다."
 mem_blacksite.604.a:0 "집에 온걸 환영하지."
 mem_blacksite.604.a.tooltip:0 "새로운 과학자가 우리 제국에 합류할 것입니다. 하지만 그들은 뭔가 이상한 점이 있는 것 같습니다..."
 mem_blacksite.604.b:0 " [blacksite_fallen_empire.GetSpeciesNamePlural]에서 몰락제국의 실험체를 훔칠 수는 없지."
 mem_blacksite.605.name:0 "비밀구역: 완벽한 기계"
 mem_blacksite.605.desc:0 "[From.GetName]의 승무원들이 블랙 사이트를 성공적으로 침입했다고 보고합니다. 내부는 심각한 피해를 입은 것으로 보이며, 곳곳에서 전투의 흔적이 발견됩니다. \n\n깊은 곳에서 그들은 블랙 사이트 설립의 이유라고 주장하는 인공 지능 구조물을 발견했습니다. 그들은 [blacksite_fallen_empire.GetName]의 원치 않는 포로라고 주장하며, 우리가 그들을 창조자에게 넘기지 않는 한 우리에게 봉사하겠다고 제안합니다."
 mem_blacksite.605.a:0 "집에 온걸 환영하지."
 mem_blacksite.605.a.tooltip:0 "새로운 로봇 과학자가 제국에 합류합니다. 하지만 그들은 뭔가 이상한 점이 있는 것 같습니다..."
 mem_blacksite.605.b:0 "로봇을 다시 [blacksite_fallen_empire.GetSpeciesNamePlural]에게 돌려주도록."
 mem_blacksite.610.name:0 "$mem_blacksite.2.name$"
 mem_blacksite.610.desc:0 "정말로 우리가 [Root.GetSpeciesName]을(를) 샅샅이 뒤졌는지 알지 못할 거라고 생각한 건가?! 정녕 어떤 결과도 없으리라 생각한 것이냐?\n\n이건 마지막 경고다. §Y[blacksite_recovered_leader.GetName]§!을(를) 내놓는다면 너흰 용서받을 수 있을 것이다. 거절하면, 네놈은 우리의 분노를 일으킬 뿐만 아니라 위험하고 불안정한 힘을 지닌 이들을 숨겨놓은 결과를 직면하게 될 것이다!"
 mem_blacksite.610.a:0 "아, 알겠다..."
 mem_blacksite.610.a.tooltip:0 "§Y[blacksite_recovered_leader.GetName]§!이(가) 더이상 우리 제국을 위해 봉사하지 않을 것입니다."
 mem_blacksite.610.b:0 "우리가 그 말에 따르지 못하는 것이 정말 '죄송'하군요."
 mem_blacksite.610.b.tooltip:0 "§Y[blacksite_recovered_leader.GetName]§!은(는) 우리 지도자로 남을 것입니다."
 mem_blacksite.621.name:0 "이상한 사고"
 mem_blacksite.621.desc:0 " §Y[blacksite_recovered_leader.GetName]§!이(가) 탑승한 과학 우주선 [Root.GetName]에서 오늘 엄청난 폭발이 일어났습니다.\n\n폭발의 원인은 불분명하나 테러행위가 의심되고 있습니다. 탑승자 전원이 사망한 것으로 추정됩니다."
 mem_blacksite.621.a:0 "참으로 의심스럽군..."
 mem_blacksite.621.a.tooltip:0 " [blacksite_recovered_leader.GetName]이(가) 생존했을 가능성이 없습니다."
 mem_blacksite_whom_we_rescued:0 "비밀 장소에서 구출한 인물"
 mem_blacksite_who_requested_asylum:0 "망명을 허락한 인물"
 mem_blacksite.622.name:0 "연구 본부 파괴공작"
 mem_blacksite.622.physics:0 "§Y[blacksite_recovered_leader.GetName]§!, [Root.MemBlacksiteBackstory] 그리고 물리학 연구를 책임지고 있었지만, 우리를 향한 호의와는 거리가 먼 의도를 지닌 것 같습니다.\n\n오늘, [blacksite_recovered_leader.GetSheHe]은(는) [blacksite_recovered_leader.GetHerHis] 기관의 주요 연구시설에서 다량의 고성능 폭발 장치를 설치하여 방대한 방사선 누출을 일으켰습니다. [blacksite_recovered_leader.GetSheHeCap]은(는) 그 직후 일어난 혼란 속에서 탈출을 시도하다 보안팀에 의해 사살되었습니다. [blacksite_recovered_leader.GetHisHerCap]의 동기가 무엇이었는지는 현재로선 알 수가 없습니다."
 mem_blacksite.622.society:0 "§Y[blacksite_recovered_leader.GetName]§!, [Root.MemBlacksiteBackstory]은(는) 우리의 사회 연구를 담당하게 되었으며, 분명히 우리에게 우호적이지 않은 의도를 품고 있었습니다. \n\n오늘, [blacksite_recovered_leader.GetSheHe]는 [blacksite_recovered_leader.GetHerHis]의 권한 아래 중요한 연구 시설에 여러 고출력 폭발 장치를 설치하고, 격리된 여러 공격적인 생명체를 풀어주었습니다. [blacksite_recovered_leader.GetSheHeCap]는 그 혼란 속에서 도망치려 했으나, 우리 보안팀에 의해 저격당했습니다. [blacksite_recovered_leader.GetHisHerCap]의 동기는 현재 알려져 있지 않습니다."
 mem_blacksite.622.engineering:0 "§Y[blacksite_recovered_leader.GetName]§!, [Root.MemBlacksiteBackstory]은(는) 우리의 기계 연구를 담당하게 되었으며, 분명히 우리에게 우호적이지 않은 의도를 품고 있었습니다. \n\n오늘, [blacksite_recovered_leader.GetSheHe]는 [blacksite_recovered_leader.GetHerHis]의 권한 아래 중요한 연구 시설에 여러 개의 고출력 폭발 장치를 설치하여 여러 기계 프로토타입에 피해를 주고 그들이 미쳐 날뛰게 만들었습니다. [blacksite_recovered_leader.GetSheHeCap]는 그 혼란 속에서 도망치려 했으나, 우리의 보안 팀에 의해 저격당했습니다. [blacksite_recovered_leader.GetHisHerCap]의 동기는 현재 알려져 있지 않습니다."
 mem_blacksite.622.a:0 "우리의 연구성과가 날아가버렸군..."
 mem_blacksite.623.name:0 "사이오닉 테러"
 mem_blacksite.623.desc:0 "§Y[blacksite_recovered_leader.GetName]§!, [Root.MemBlacksiteBackstory], 분명히 우리에게 우호적이지 않은 의도를 품고 있었습니다. \n\n오늘, [blacksite_recovered_leader.GetSheHe]가 [Root.Capital_Scope.GetName]에 있는 우리의 연구 본부에 침투하여 강력한 사이오닉 파동을 방출하였고, 연구원과 직원들에게 영향을 미쳐 일부는 광기에 빠지게 만들었습니다. 여러 부서가 물자와 인력 손실로 인해 영향을 받았으며, 우리의 과학적 작업에 상당한 혼란을 초래하고 있습니다."
 mem_blacksite.623.a:0 "그런 끔찍한 일이.."
 mem_blacksite.624.name:0 "사이오닉 전투"
 mem_blacksite.624.desc:0 "§Y[blacksite_recovered_leader.GetName]§!, [Root.MemBlacksiteBackstory], 그는 우리에게 우호적인 사람이 아니었던 것 같습니다.\n\n오늘, [blacksite_recovered_leader.GetSheHe]은(는) §Y[blacksite_chosen_one.GetName]§!, 우리 제국의 선택받은 자를 기습하여 사이오닉 공격을 시도했습니다. 아마도 [blacksite_chosen_one.GetHerHis]의 엄청난 힘을 훔치려고 시도한 것으로 보입니다.\n\n일반인들이 느끼기엔 찰나의 순간 동안 둘 사이의 정신적인 대치가 주변의 공간을 찢어놓았고, 마침내 반역자의 정신은 완전히 지워져 생명이 없는 껍데기만이 남았습니다."
 mem_blacksite.624.a:0 " [blacksite_chosen_one.GetName]이여 만세!"
 mem_blacksite.625.name:0 "사이오닉 황폐화"
 mem_blacksite.625.desc:0 "§Y[blacksite_recovered_leader.GetName]§!, [Root.MemBlacksiteBackstory], 그는 우리에게 우호적인 사람이 아니었던 것 같습니다. \n\n오늘, [blacksite_recovered_leader.GetSheHe]이(가) §Y[blacksite_ravaged_leader.GetName]§!을 습격해 잔인한 사이오닉 공격을 가했습니다. 공격자는 보안군에 의해 사살되었지만, 피해자인 [blacksite_recovered_leader.GetHerHis]은(는) 큰 피해를 당하고 말았습니다. 어찌 되었든, [blacksite_ravaged_leader.GetHerHis]의 사이오닉 능력은 완전히 사라졌습니다."
 mem_blacksite.625.a:0 "그런 끔찍한..."
 mem_blacksite.625.a.tooltip:0 "§Y[blacksite_ravaged_leader.GetName]§!은(는) §Y사이오닉§! 특성을 잃습니다."
 mem_blacksite.626.name:0 "광기의 색"
 mem_blacksite.626.desc.cyborg:0 "§Y[blacksite_recovered_leader.GetName]§!, [Root.MemBlacksiteBackstory], 은(는) 다소 정신이 나간 것 처럼 보입니다.\n\n오늘, [blacksite_recovered_leader.GetSheHe]은(는) [Root.Capital_Scope.GetName]의 연구본부에 침입해 묵시적인 예언에 대해 주절거리며 날뛰었습니다. [blacksite_recovered_leader.GetSheHe] [blacksite_recovered_leader.GetWasWere]이(가) 무슨 의도로 그랬는지는 명확하지 않지만, 연구본부의 직원들은 약간의 가벼운 두통과 메스꺼움, 그리고 환각에 대한 불만을 표했을 뿐 다른 문제는 없는 것으로 보입니다.\n\n [blacksite_recovered_leader.GetName]은(는) 체포된 후 갑자기 피를 토하며 죽어버렸습니다. 연구원들은 이후 추가적인 증상을 보이지 않았으며, 간단한 진료 후 곧바로 퇴원하였습니다."
 mem_blacksite.626.desc.machine:0 "§Y[blacksite_recovered_leader.GetName]§!, [Root.MemBlacksiteBackstory], 은(는) 다소 정신이 나간 것 처럼 보입니다.\n\n오늘, [blacksite_recovered_leader.GetSheHe]은(는) [Root.Capital_Scope.GetName]의 연구본부에 침입해 묵시적인 예언에 대해 주절거리며 날뛰었습니다. [blacksite_recovered_leader.GetSheHe] [blacksite_recovered_leader.GetWasWere]이(가) 무슨 의도로 그랬는지는 명확하지 않습니다.\n\n[blacksite_recovered_leader.GetName]은(는) 잠시후 갑자기 거꾸러져 죽어버렸습니다."
 mem_blacksite.626.a:0 "이게 대체 다 무슨 짓이지?"
 mem_blacksite.631.name:0 "$mem_blacksite.621.name$"
 mem_blacksite.631.desc:0 "$mem_blacksite.621.desc$"
 mem_blacksite.631.a:0 "$mem_blacksite.621.a$"
 mem_blacksite.631.a.tooltip:0 "$mem_blacksite.621.a.tooltip$"
 mem_blacksite.632.name:0 "$mem_blacksite.622.name$"
 mem_blacksite.632.physics:0 "§Y[blacksite_recovered_leader.GetName]§!, [Root.MemBlacksiteBackstory]와 우리의 물리학 연구 부서를 담당하게 된 이들은 우리에게 우호적이지 않은 의도를 품고 있었던 것으로 보입니다. \n\n오늘, 그들은 고급 하드웨어를 사용하여 그들이 통제하는 여러 시설에 대한 완전하고 비감시적인 접근을 얻었고, 침입이 국소화되기 전에 대규모 방사능 유출을 일으켰으며 [blacksite_recovered_leader.GetName]는 보안 팀에 의해 영구적으로 비활성화되었습니다. 그들이 어떤 동기로 행동했는지는 알려져 있지 않습니다."
 mem_blacksite.632.society:0 "§Y[blacksite_recovered_leader.GetName]§!, [Root.MemBlacksiteBackstory]와 우리 사회 연구 부서의 책임자로 임명된 이들은, 우리에게 우호적이지 않은 의도를 품고 있었던 것으로 보입니다. \n\n오늘, 그들은 고급 하드웨어를 사용하여 자신들이 통제하는 여러 시설에 대한 완전하고 비감시적인 접근을 얻었고, 여러 위험한 생체 샘플과 유해한 세균 배양물을 방출한 후, 침해가 국한되기 전에 [blacksite_recovered_leader.GetName]가 보안 팀에 의해 영구적으로 비활성화되었습니다. 그들이 어떤 동기로 행동했는지는 알려져 있지 않습니다."
 mem_blacksite.632.engineering:0 "§Y[blacksite_recovered_leader.GetName]§!, [Root.MemBlacksiteBackstory] 우리 공학 연구 부서의 책임자로 임명된 이들은 우리에게 우호적이지 않은 의도를 품고 있었던 것으로 보입니다. \n\n오늘 그들은 고급 하드웨어를 사용하여 자신들이 통제하는 여러 시설에 대한 완전하고 비감시적인 접근을 얻었으며, 프로토타입 조립 라인의 중장비를 재프로그래밍하여 인근 인원과 민감한 장비를 공격하게 했습니다. 이 침해가 국한되기 전에 보안 팀에 의해 [blacksite_recovered_leader.GetName]가 영구적으로 비활성화되었습니다. 그들이 어떤 동기로 행동했는지는 알려져 있지 않습니다."
 mem_blacksite.632.a:0 "우리의 연구 성과들이 소실되어버렸군..."
 mem_blacksite.633.name:0 "데이터 전송 중단"
 mem_blacksite.633.desc:0 "§Y[blacksite_recovered_leader.GetName]§!, [Root.MemBlacksiteBackstory]은(는) 우리에게 우호적이지 않은 의도를 지녔던 것으로 드러났습니다.\n\n그는 [Capital_Scope.GetName]연구본부의 폐쇄된 네트워크에 접속하여 귀중하고 중요한 데이터들을 대량으로 소실시켜버렸습니다.\n\n해킹의 원인을 파악하고, [blacksite_recovered_leader.GetName]을(를) 영구적으로 중지시키는 데 시간이 걸렸습니다. 이 시점에서 우리의 연구 기반시설은 돌이키기 어려운 심각한 피해를 보고 말았습니다. 그가 이런 식으로 행동한 원인은 불분명합니다."
 mem_blacksite.633.a:0 "우리의 연구 성과들이 소실되어버렸군..."
 mem_blacksite.634.name:0 "해커와 해킹"
 mem_blacksite.634.desc:0 "§Y[blacksite_recovered_leader.GetName]§!, [Root.MemBlacksiteBackstory]은(는) 우리에게 우호적이지 않은 의도를 지녔던 것으로 드러났습니다.\n\n최근, 그는 큐레이터 과학자인 §Y[curator.GetName]§!이(가) 운영하는 사설망 속 매우 민감한 정보에 액세스 하려고 시도하였습니다. 매우 정교한 장비였음에도 불구하고, [blacksite_recovered_leader.GetName]은(는) 큐레이터의 인증을 복제하지 못했으며, 큐레이터는 침입을 성공적으로 추적하여 가장 위험한 시스템을 억제했습니다.\n\nAI의 전반적인 성능이 약해지기는 했으나, 기계는 계속 작동중이며 여전히 유용하게 쓰일 수 있습니다."
 mem_blacksite.634.a:0 "잘했다, [curator.GetName]."
 mem_blacksite.634.a.tooltip:0 "§Y[blacksite_recovered_leader.GetName]§!:\n특성 §S$mem_blacksite_trait_synthetic_project$§!이(가) §S$mem_blacksite_trait_synthetic_project_tamed$§!로 대체됩니다."
 mem_blacksite.635.name:0 "소규모 AI 반란"
 mem_blacksite.635.desc:0 "§Y[blacksite_recovered_leader.GetName]§!, [Root.MemBlacksiteBackstory]은(는) 우리에게 우호적이지 않은 의도를 품고 있었던 것으로 보입니다. \n\n최근 그들은 자신의 코드 일부를 우리의 글로벌 네트워크에 업로드하여 제국 내 AI 시스템을 감염시키려 했던 것으로 보입니다. 사이버네틱 및 합성체 유닛과 함께 맞춤형 AI 보조가 가장 큰 영향을 받았습니다. 일부는 심지어 광란 상태에 빠져 처치해야 했습니다. 주동자는 발견되어 격리되고 영구적으로 비활성화되었지만, 이미 피해는 발생한 상태였습니다."
 mem_blacksite.635.a:0 "우리 제국에 피해가 남겠군."
 mem_blacksite.635.a.tooltip:0 "어느 지도자든 §S$leader_trait_sapient_AI_assistant$§! 혹은 §S$leader_trait_custom_AI_assistant$§! 특성이 있다면 특성을 잃거나 죽을 것입니다.\n아무 로봇 또는 사이보그 지도자는 죽을 수 있습니다."
 mem_blacksite.700.name:0 "[blacksite_planet.GetName]의 미확인 선박"
 mem_blacksite.700.desc:0 "경고 보고서에 §Y[blacksite_planet.GetName]§!에 위치한 [blacksite_fallen_empire.GetName]의 비밀구역이 올라왔습니다.\n\n처음 행성에서 엄청난 폭발이 일어났으며, 행성의 지각은 완전히 붕괴하고 말았습니다. 그러나 행성이 완전히 파괴되기 전에 미확인 선박의 소함대가 출발하는 것이 포착되었습니다. 그 출처와 목적이 무엇인지는 분명하지 않지만, 지금까지의 행동으로 미뤄볼 때 그다지 우호적이지 않은 것은 분명해 보입니다."
 mem_blacksite.700.a:0 "성계를 비울 준비를 하라."
 mem_blacksite.700.b:0 " [blacksite_fallen_empire.GetSpeciesNamePlural]에 연락해 설명을 요구하라."
 mem_blacksite.701.name:0 "$mem_blacksite.2.name$"
 mem_blacksite.701.desc:0 "당신은 매우 관찰력이 뛰어납니다. §Y[blacksite_planet.GetName]§!에 있는 우리의 비밀 기지가 행성을 완전히 파괴한 것은 사실입니다. 그리고 몇몇... 글쎄요, 그들이 무엇인지에 대해 깊이 생각하지 말고... 이 폭발에서 도망친 것은 사실이며, 그들은 이제 당신에게 적대적인 행동을 취할 태세입니다. \n\n이제, 당신이 아마 생각하고 있을 것을 압니다. "그들의 무모한 실험이 우리 모두를 위험에 빠뜨렸다!" 첫째로, 당신의 선배들에 대해 그런 생각을 하는 것은 무례한 일입니다. 우리는 당신이 아직 돌을 부딪히고 있을 때부터 이런 일을 해왔습니다. \n\n둘째로, 이것은 가치 있는 희생이었습니다. 전체 은하의 미래에 비해 단 하나의 변방 시스템은 무엇일까요? \n\n마지막으로, 당신은 실제로 위험에 처해 있지 않습니다. 탐사선은 어떤 종류의 초공간 드라이브도 장착되어 있지 않으며, 그것을 만들 만큼 똑똑하지도 않습니다... 우리가 생각하기에는요. \n\n만약 그들이 실제로 초공간 드라이브를 만드는 것을 목격한다면, 저희에게 연락해 주세요 - 왜냐하면 그것은 실제로 문제가 될 수 있기 때문입니다. 하지만 우리는 그들이 그것을 할 수 없다고 확신합니다. 절대 확신합니다."
 mem_blacksite.701.a:0 "통신 꺼버려..."
 mem_blacksite.701.b:0 "대체 거기서 뭘 하고 있는거지?"
 mem_blacksite.701.b.response:0 "당신들에게 거짓말 하지 않겠습니다."
 mem_blacksite.800.name:0 "$mem_blacksite.2.name$"
 mem_blacksite.800.desc:0 "§Y[blacksite_planet.GetName]§!에서 탈출 사건이 발생했습니다. 여러 명의 극도로 위험한 피험자들이 탈출하였으며 현재 우리 영토 어딘가에 숨어 있을 것으로 추정됩니다. 우리는 그들을 추적하고 체포하기 위해 조사관을 파견할 예정입니다. \n\n귀하의 당국의 전폭적인 협력이 필요합니다. 이것이 단지 우리의 이익을 위한 것이 아님을 기억해 주십시오. 귀하의 행성에서 도망자들이 난동을 부리지 않기를 원하실 것입니다. 우리를 믿으십시오."
 mem_blacksite.800.a:0 "좋다. 협조하지."
 mem_blacksite.800.b:0 "우리는 당신들이 우리의 주권을 위반하도록 내버려두지 않을 것이다!"
 mem_blacksite.800.b.tooltip:0 "도망가게 놔두면 §R위험§!할 수 있습니다."
 mem_blacksite.800.c:0 "그 도망자들은 대체 누구지?"
 mem_blacksite.800.c.response:0 "$mem_blacksite.701.b.response$"
 mem_blacksite.810.name:0 "비밀구역 탈주: 도망자들"
 mem_blacksite.810.xenophile:0 "우리 영토에서 사건을 수사중인 익명의 수사관으로부터 연락을 받았습니다. 처음 이곳에 온 이후로, [blacksite_defector.GetSheHe]은(는) [blacksite_fallen_empire.GetName]의 정체와 비교하여 우리의 활력과 진보에 매혹되어 있었습니다.\n\n§Y[blacksite_defector.GetName]§!(으)로 신원이 확인되었으며, [blacksite_defector.GetSheHe]은(는) [blacksite_defector.GetHerHis] 이전의 고용주를 떠나고 [Root.GetName]에게 봉사하겠다고 제안합니다."
 mem_blacksite.810.materialist:0 "$mem_blacksite.810.xenophile$"
 mem_blacksite.810.spiritualist:0 "$mem_blacksite.810.xenophile$"
 mem_blacksite.810.a:0 "집에 온 것을 환영하네."
 mem_blacksite.810.a.general:0 "새로운 장군이 우리 제국에 합류합니다."
 mem_blacksite.810.a.scientist:0 "새로운 과학자가 우리 제국에 합류합니다."
 mem_blacksite.810.a.governor:0 "새로운 총독이 우리 제국에 합류합니다."
 mem_blacksite.810.b:0 "[blacksite_fallen_empire.GetSpeciesNamePlural]을(를) 분노케 할 수는 없다."
 mem_blacksite.821.name:0 "비밀구역 탈주: 사이오닉 도망자"
 mem_blacksite.821.desc:0 "우리는 비윤리적인 사이오닉 실험의 희생자라고 주장하는 비밀구역 도망자와 접촉했습니다.\n\n그들은 우리를 위해 일할 것을 제안합니다."
 mem_blacksite.821.a:0 "집에 온 것을 환영하네."
 mem_blacksite.821.a.tooltip:0 "$mem_blacksite.604.a.tooltip$"
 mem_blacksite.821.b:0 "저들을 [blacksite_fallen_empire.GetName]에게 넘겨라."
 mem_blacksite.822.name:0 "비밀구역 탈주: 완벽한 기계"
 mem_blacksite.822.desc:0 "우리는 비밀구역의 도망자라고 주장하는 인공지능의 연락을 받았습니다. 그들은 아마도 완벽한 사고 기계가 되도록 만들어진 듯합니다.\n\n그는 보호를 대가로 우리를 위해 일하겠다고 제안했습니다."
 mem_blacksite.822.a:0 "집에 온 것을 환영하네."
 mem_blacksite.822.a.tooltip:0 "$mem_blacksite.604.a.tooltip$"
 mem_blacksite.822.b:0 "[blacksite_fallen_empire.GetName]에게 넘기도록."
 mem_blacksite.830.name:0 "비밀구역 탈주: 민간인 테러"
 mem_blacksite.830.desc:0 "여러 소식통이 일련의 파괴적인 공격이 우리 영토 전역에서 발생했다고 보고해왔습니다. 알 수 없는 방식으로 누군가가 우리 시설 중 일부에 침투했고, 강력한 폭발물을 심어둔 후 어떤 경보도 울리지 않은 채로 빠져나갔습니다.\n\n많은 추측이 있지만, 한때 우리 영토에서 운영되었던 비밀구역에서 탈출한 도망자가 범인일 가능성이 큽니다."
 mem_blacksite.830.a:0 "어떻게 이런 일이 있을 수 있지?!"
 mem_blacksite.830.a.tooltip:0 "모든 행성은 하나의 £building£ 건물이 §S파괴된§! 상태일 것입니다."
 mem_blacksite.1001.name:0 "$mem_blacksite.2.name$"
 mem_blacksite.1001.desc:0 "이 멍청한 [Root.GetSpeciesNamePluralInsult]! 네가 무슨 짓을 했는지 알고있나?\n\n너희는 우리의 재산을 파괴했을 뿐만 아니라, 우리에게 귀중한 연구 자료를 희생시킨거야!\n\n대체 어떤 놈이 네게 행성파괴 병기를 사용하라고 지껄인거지?!"
 mem_blacksite.1001.a:0 "통신 꺼버려."
 mem_blacksite.1001.a.mat:0 "그렇게 하면 자료를 백업할 수 있지 않나."
 mem_blacksite.1001.a.mil:0 "살아있는 목표물에 연습하는게 가장 좋거든."
 MEM_BLACKSITE_INVESTIGATE:0 "비밀구역 비밀조사"
