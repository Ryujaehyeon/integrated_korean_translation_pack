 giga_vat_switch_07:0 "[giga_vat_switch_07]"
 giga_maximum_mutation_title:0 "§c최대 변이§!"
 giga_maximum_mutation_desc:0 "우리의 유전적 운명을 추구하려면, 아무리 기이하고 난해해 보여도 가능한 모든 길을 고려해야 합니다."
 giga_prethoryn_larvae:0 "변이된 유충"
 giga_prethoryn_larvae_desc_short:0 "작고 꿈틀대는 유충입니다. 극도로 빠르게 성장합니다. 발밑에 깔려 으스러질 수도 있습니다."
 giga_prethoryn_larvae_desc_details: ""
 giga_vat_maximum_mutation_1:0 "최대 변이: 인셉투스"
 giga_vat_maximum_mutation_2:0 "최대 변이: 비룰루스"
 giga_vat_maximum_mutation_3:0 "최대 변이: 아우레우스"
 giga_vat_maximum_mutation_4:0 "최대 변이: 엑살투스"
 giga_vat_maximum_mutation_1_DESC:0 "시작은 매우 중요합니다. 우리의 변이가 어떻게 진행될지를 정의하기 때문입니다. 이 프로젝트가 후원자들의 말만큼 결실을 맺을지는 오직 시간이 말해줄 것입니다."
 giga_vat_maximum_mutation_2_DESC:0 "다음 단계 역시 첫 단계만큼 중요합니다. 기초가 높이 여러 번 쌓이지 않았는데 어떻게 궁전을 세울 수 있겠습니까."
 giga_vat_maximum_mutation_3_DESC:0 "어떤 프로젝트든 수정과 검토가 필요합니다. 우리의 설계를 어떻게 개선할 수 있을까요? 어떤 결함을 최소화할 수 있을까요? 이제 우리 표본들이 완전함으로 승천할 시간입니다."
 giga_vat_maximum_mutation_4_DESC:0 "마지막 장식은 위대한 작업을 완성합니다. 그렇지 않으면 그 작업은 자신의 무게를 견디지 못하고 무너질 것입니다. "
 giga_vat_events.100.name:0 "변이 극대화"
 giga_vat_events.100.desc:0 "이토록 방대하고 효율적인 복제 장치 배열에 접근하게 된 과학자들은 꽤 특이한 아이디어를 고안했습니다. 우리 제국이 지금까지 수집한 모든 유전 물질 표본을, 그것이 무엇이든 상관없이 결합하고 변이시키면 무엇이 나올까요? 그 발상은 기괴하지만, 생물학의 진전으로 이어질 수 있으며 이 프로젝트가 구상하는 생명체들은 은하 전쟁의 무대에서 활용될 가능성도 있습니다."
 giga_vat_events.100.a:0 "대체 무슨 일이 잘못될 수 있겠나?"
 giga_vat_events.101.name:0 "인셉투스"
 giga_vat_events.101.desc:0 "유망한 초기 결과를 바탕으로 [capital.GetName]의 과학자들은 더 큰 규모의 실험을 준비합니다. $name_the_vat$의 광범위한 실험실을 활용해, 그들은 초계함 크기의 표본을 확보하려 합니다. 그것이 초계함의 능력에 미치지 못할지, 아니면 이를 넘어설지는 아직 알 수 없습니다."
 giga_vat_events.101.a:0 "$INTRIGUING$"
 giga_vat_events.1011.name:0 "인셉투스 잉태"
 giga_vat_events.1011.desc:0 "우리는 그것이 자라는 것을 보았습니다. 먹이를 먹는 것도 보았습니다. 그 모든 과정 내내 분노, 공포, 좌절이 있었습니다. 우리가 어떻게 그것의 감정을 알았는지는 모릅니다. 그것은 너무나 거대했지만, 여전히 너무 작았고, 여전히 우리를 두려워했습니다. 그것은 순식간에 우리를 으스러뜨리거나 녹여버릴 수 있었습니다. 그런데 왜 두려워했을까요? 자신이 우리를 공격하면 우리가 무엇을 할지 두려워한 걸까요? 아니면 다음에 무엇이 만들어질지를 두려워한 걸까요."
 giga_vat_events.1011.a:0 "$DISCONCERTING$"
 giga_vat_events.102.name:0 "비룰루스"
 giga_vat_events.102.desc:0 "인셉투스의 성공에 이어, 수석 과학자들은 구축함 크기에 해당하는 훨씬 더 큰 실험을 제안하고 있습니다. 팀의 많은 이들이 우려를 표했지만, 승인명령은 내려졌고 더 깊은 변이 작업이 시작되었습니다."
 giga_vat_events.102.a:0 "$GOOD$"
 giga_vat_events.1021.name:0 "악성의 힘"
 giga_vat_events.1021.desc:0 "분노. 폭력과 분노의 혼합물 앞에서는 다른 모든 감정이 부차적이었습니다. 그것은 구속구에 몸부림쳤고, 그 구속구만이 그것이 정거장을 갈가리 찢지 못하게 막고 있었습니다. 며칠 동안 그것은 몸부림쳤습니다. 그 분노는 끝이 없었던 걸까요? 그동안 우리는 더 작은 표본들에서도 변화를 감지했습니다. 공포와 뒤섞인 비슷한 분노의 감정이었습니다. 그것들은 단순한 가족적 유대보다 더 큰, 마치 더 거대한 유기체의 일부인 듯한 연결을 공유하는 것처럼 보입니다."
 giga_vat_events.1021.a:0 "$DISTURBING$"
 giga_vat_events.103.name:0 "아우레우스"
 giga_vat_events.103.desc:0 "프로젝트가 시작된 이래 우리 제독들과 다른 군 관계자들은 이 프로젝트에 큰 관심을 보여 왔습니다. 그들은 거의 항공모함에 가까운 능력을 가진 표본을 요청하고 있습니다. $name_the_vat$에 배치된 많은 과학자들이 사직했거나 작업을 거부하고 있지만, 선택된 소수는 완전함을 추구하며 계속 나아가고 있습니다."
 giga_vat_events.103.a:0 "$INCREDIBLE$"
 giga_vat_events.1031.name:0 "생물학적 승천"
 giga_vat_events.1031.desc:0 "또다시 분노였습니다. 이전과는 비교도 되지 않을 만큼 거대했습니다. 몸부림도 더 강했습니다. 그러던 어느 날 모든 것이 멈췄습니다. 그날 느껴진 감정은 단 하나뿐이었습니다. 복종. 그들은 해냈습니다. 자신들이 만든 이 통제 불능의 생명체를 제어한 것입니다. 그것은 복종했고, 그와 함께 다른 모든 표본들도 복종했습니다. 더 이상 분노도, 공포도, 좌절도 없었습니다. 복종만이 빛났습니다. 유기체는 우리를 받아들였습니다."
 giga_vat_events.1031.a:0 "$ASTOUNDING$"
 giga_vat_events.104.name:0 "엑살투스"
 giga_vat_events.104.desc:0 "우리는 완전함을 달성했습니다. 하지만 더 나아간다면 어떨까요? 위대함에 도달한 뒤에도 더 많은 것이 있을 수 있을까요? 팀의 일부는 가능한 한 높이 도달하지 못할 이유가 없다고 말합니다. 성공한다면 진화의 마지막 단계가 실현될지도 모릅니다."
 giga_vat_events.104.a:0 "$UNDERSTOOD$"
 giga_vat_events.1041.name:0 "변이 극대화"
 giga_vat_events.1041.desc:0 "궁극의 생명체, 우리의 아름다운 표본들이 마침내 우리 앞에 창조되어 실현되었습니다. 그들의 힘은 적들이 은하 무대에서 우리에게 도전하기 전에 다시 생각하게 만들 것입니다. 우리는 이 프로젝트에서 독특한 무언가를 얻었습니다. 우리 표본들과 우리는 연결되어 있습니다. 우리의 정신과 그들의 정신이 하나의 존재로 얽혀 있습니다. 이런 힘이 은하에 풀려난다면 무슨 일이 일어날지는 누구도 알 수 없습니다. 프로그램 내내 표본들의 탈출 시도가 몇 차례 있었습니다. 다행히 모두 제거되었습니다. 다만 탈출해 은하간 공간으로 향한 몇 개체가 있기는 했습니다. 분명 아무 문제도 일으키지 않을 것입니다."
 giga_vat_events.1041.a:0 "분명히..."
