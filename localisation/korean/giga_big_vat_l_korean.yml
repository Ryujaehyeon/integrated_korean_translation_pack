l_korean:
 giga_tech_the_vat:0 "거대 복제 시설"
 giga_tech_the_vat_desc:0 "유전 공학의 새로운 시대가 도래함에 따라 더욱 위대하고 더욱 야심찬 프로젝트로의 길이 열렸습니다. 이전까지는 행성에 제한되어있었지만, 거대한 궤도 복제 시설로 인해 우리는 생체 공학자들로 하여금 우리의 해군을 보다 더 보강하기 위해 진정한 우주 생명체들의 함대를 빠르게 성장시킬 수 있게 되었습니다."
 giga_dialog.11301.name:0 "$name_the_vat$ 건설 현장"
 giga_dialog.11301.desc:0 "$name_the_vat_long$의 건설 현장이 이제 완료되었습니다. 이 궤도 플랫폼은 지금까지 구상된 가장 큰 배양탱크를 건설하기 위해 필요한 구조물을 세우는 전초 기지 역할을 합니다.\n\n완공되면, 우리의 함대에서 사용할 생물체를 대량으로 신속하게 생산할 수 있게 될 것입니다."
 giga_dialog.11301.a:0 "좋아."
 giga_dialog.11302.name:0 "인큐베이터 기반 건설 완료"
 giga_dialog.11302.desc:0 "궤도 복제 시설의 기반 인큐베이터가 건설되었습니다. 이제 이것은 동종의 복제 인큐베이터중에서 가장 큰 것이며 다양한 설계의 거대한 클론을 만들어낼 수 있습니다.\n\n§Y생체 레비아탄을 무찌르면 B.I.G 인큐베이터의 초기 인큐베이터에서 레비아탄을 복제할 수 있습니다.§!"
 giga_dialog.11302.a:0 "휼륭하군."
 giga_dialog.11303.name:0 "1차 및 2차 보조 인큐베이터 건설"
 giga_dialog.11303.desc:0 "$name_the_vat_long$의 건설에서 중요한 또다른 단계가 이제 끝났습니다. 구조물의 효율을 높이는 이 보조 인큐베이터를 사용해 동시에 더 많은 표본을 복제할 수 있습니다."
 giga_dialog.11303.a:0 "좋아."
 giga_dialog.11304.name:0 "3차 및 4차 보조 인큐베이터 건설"
 giga_dialog.11304.desc:0 "또다시 $name_the_vat_long$의 건설의 한 단계가 완료되었습니다. 이 추가 인큐베이터를 사용해 동시에 더 많은 복제를 생산할 수 있을 것입니다."
 giga_dialog.11304.a:0 "놀라워!"
 giga_dialog.11305.name:0 "5차 및 6차 보조 인큐베이터 건설"
 giga_dialog.11305.desc:0 "$name_the_vat_long$이 완료되었습니다. 6개의 보조 배양기와 거대한 주 배양기를 통해 우리는 매우 짧은 시간 안에 거대한 괴물의 전체 함대를 복제할 수 있게 되어, 이전에는 상상하지 못했던 방식으로 전장에서 지배할 수 있게 될 것입니다."
 giga_dialog.11305.a:0 "복제를 시작하지."
 the_vat_0:0 "$gc_mega$$name_the_vat$ 건설 현장"
 the_vat_0_DESC:0 "미래의 인큐베이터를 위한 건설 현장입니다. 이 거대한 복제 시설로 바꾸어내기위해 우리의 공학자들과 생물학자가 필요한 모든 것을 가지고 있습니다."
 the_vat_0_MEGASTRUCTURE_DETAILS:0 "£galwonders£ $giga_list_category_megastructure$ - $giga_list_category_ship_production$\n§Y생물학적 전함§!을 제작하기 위해 £food£ §Y$food$§!를 사용하여 알려진 §Y레비아탄§!과 §Y우주 태생 외계인§!을 기반으로 합니다.\n§L생물학적 급속 성장 탱크는 대량의 생물학적 우주선을 생산할 수 있는 우주 기반 클론 기술 시설입니다.§!\" #gigalistentry BIG VAT"
 the_vat_1:0 "$name_the_vat$: 기반"
 the_vat_1_DESC:0 "이것은 동종의 복제 인큐베이터 중에서 가장 큰 것이 될 것이고 정말 많은 복제를 만들 수 있습니다."
 the_vat_2:0 "$name_the_vat$: 보조 인큐베이터"
 the_vat_2_DESC:0 "$the_vat_1_DESC$ 복제 속도를 향상시킬 추가 시설."
 the_vat_3:0 "$name_the_vat$: 보조 인큐베이터"
 the_vat_3_DESC:0 "$the_vat_1_DESC$ 복제 속도를 더욱 향상시킬 추가 시설."
 the_vat_4:0 "$name_the_vat$"
 the_vat_4_DESC:0 "이것은 수많은 대규모 클론을 만들어낼 수 있는 거대한 인큐베이터입니다. 6개의 보조 인큐베이터와 거대한 인큐베이터를 갖춘 이 시설은 거대하고 무시무시한 함대를 복제할 준비가 되어있습니다."
 the_vat_menu_title:0 "§E생물학적 급성장 인큐베이터§!"
 the_vat_menu_desc:0 "§cB.I.G. 배양조§!는 생물학적 조선소입니다. 주 배양조는 보조 배양조보다 두 배 빠르게 복제합니다.\n\n우주 생물군을 복제할 때 무작위 설계가 선택되므로, 개장 비용을 피하고 싶다면 이 점에 유의하십시오."
