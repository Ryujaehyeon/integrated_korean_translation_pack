l_korean:
 giga_ai_savings_info:0 "기가 AI 거대 구조물 저축 정보"
 giga_ai_savings_info_desc:0 "§L재정 계획에 대한 도움의 손길§!"
 mod_giga_ai_savings_tooltips_minerals_produces_add:0 "AI가 거대 구조물을 위해 얼마나 자원을 쌓아뒀는지 볼 수 있습니다. 이 값은 지원되는 거대 구조물의 건설 비용에서 차감되며, 건설이 시작되면 감소합니다.\n\n§E중요한 경제적 거대 구조물:§!\n£alloys£ $alloys$: §Y[giga_ai_savings_important_alloys]§!\n£unity£ $unity$: §Y[giga_ai_savings_important_unity]§!\n\n§E이차적 경제적 거대 구조물:§!\n£alloys£ $alloys$: §Y[giga_ai_savings_resource_alloys]§!\n£unity£ $unity$: §Y[giga_ai_savings_resource_unity]§!\n\n§E다용도 거대 구조물:§!\n£alloys£ $alloys$: §Y[giga_ai_savings_utility_alloys]§!\n£unity£ $unity$: §Y[giga_ai_savings_utility_unity]§!\n\n§E군용 거대 구조물:§!\n£alloys£ $alloys$: §Y[giga_ai_savings_military_alloys]§!\n£unity£ $unity$: §Y[giga_ai_savings_military_unity]§!\n\n값을 제대로 보이기 위한 더미 보정치입니다."
 r_giga_ai_savings:0 "AI 저축 예금"
 r_giga_ai_savings_desc:0 "AI 거대 구조물 저축 기능을 위한 보정치를 제공하는 AI 전용 유물입니다. 인간 플레이어에는 어떠한 영향도 없으며, 소유하게 된다면 연초에 제거됩니다.\n\n§L홀라홀라 겟 달러§!"
