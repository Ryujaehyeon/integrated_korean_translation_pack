l_korean:
 mem_vazuran_event_system_starbase_object:0 "고대 잔해 지역"
 mem_vazuran_event_system_swarm_large_object:0 "공허태생 유기체의 잔해"
 tech_mem_scourge_damage_bonus:0 "공허태생 껍질의 약점"
 tech_mem_scourge_damage_bonus_desc:0 "혹시 모를 타 은하 생명체 침공에 대비해야만 합니다. 얻어낸 표본으로 과학자들이 약점을 찾아낼 것입니다. 과연 있을지 없을지는 장담할 수 없습니다. 그들이 돌아온다고 하더라도 연구를 통해 우위를 점해 우리의 것을 반드시 지켜낼 것입니다."
 mem_vazuran_systems.1.name:0 "묘지"
 mem_vazuran_systems.1a.desc:0 "[root.GetName]는 [root.solar_system.GetName] 항성계에 도달했다고 보고합니다. 함장은 끔찍한 장면을 묘사합니다. 여러 행성이 파괴되었고, 전체 항성계는 잔해로 가득 차 있습니다. 더욱 기이한 점은, 우리의 데이터베이스와 일치하지 않는 유기체 껍데기가 이들 사이에 흩어져 있다는 것입니다. 추가 조사가 필요합니다."
 mem_vazuran_systems.1.a:0 "조사를 개시하라."
 mem_vazuran_event_system_scourge_chain_title:0 "폐허가 된 성계"
 mem_vazuran_event_system_scourge_chain_desc:0 "끔찍한 사건이 일어났던 [mem_vazuran_event_system_01.GetName] 성계를 조사합니다."
 mem_vazuran_event_system_scourge_projects_researched:0 "조사 완료"
 MEM_VAZURAN_EVENT_SYSTEM_SCOURGE_INVESTIGATION_01:0 "생체 함선 조사"
 MEM_VAZURAN_EVENT_SYSTEM_SCOURGE_INVESTIGATION_01_DESC:0 "[root.solar_system.GetName]에 있던 우리 과학자들이 잔해들 사이에서 있는 죽은 유기체 껍질에서 두 종류의 우주 태생 생명체들을 식별해냈습니다. 다만 성장 단계만 다른 같은 종인지, 완전히 다른 종인지는 알 수 없는 상태입니다."
 MEM_VAZURAN_EVENT_SYSTEM_SCOURGE_INVESTIGATION_02:0 "잔해 조사"
 MEM_VAZURAN_EVENT_SYSTEM_SCOURGE_INVESTIGATION_02_DESC:0 "무수한 잔해들 사이에서 수 많은 난파선이 여전히 남아있습니다. 이곳에서 어떤 일이 벌어졌는지 알아보려면 이것들을 조사해보는 것이 가장 최선일 것입니다."
 mem_vazuran_systems.101.name:0 "유전 공학?"
 mem_vazuran_systems.101.desc:0 "여러 샘플을 연구한 결과, [root.solar_system.GetName]-X1과 [root.solar_system.GetName]-X2로 분류된 서로 다른 표현형이 여러 유전 마커와 특성을 공유함에도 불구하고 사실상 서로 다른 종이라는 것이 명확해졌습니다. 두 분류의 각 개체 샘플 간에는 유전적 변이가 없으며, 이는 무성 생식 또는 클론 기술을 의미합니다.\n\n유기체 자체는 유전 공학의 산물로 보이며, 현재 상태로의 자연 진화는 매우 불가능합니다. X1과 X2 모두 군용 등급 갑옷 판과 유사한 내구성을 가진 예외적으로 단단한 갑각을 특징으로 하며, 유기체 발사체를 위한 매스 드라이버 역할을 하는 것으로 보이는 장기를 가지고 있습니다. 탐사 팀은 다양한 잔해 속에 여전히 묻혀 있는 다수의 발사체를 발견했습니다. 잔해 필드를 판단할 때, 그들은 formidable 전투원이었음에 틀림없습니다."
 mem_vazuran_systems.101.a:0 "당황스럽군."
 mem_vazuran_systems.102.name:0 "희생과 의무"
 mem_vazuran_systems.102.desc:0 "[root.solar_system.GetName] 시스템을 가로지르는 광대한 잔해 필드 내에서 여러 주를 탐사한 끝에, 우리의 탐사 팀은 중대한 돌파구를 마련했습니다. 잔해 중 하나를 조사하는 과정에서 그들이 이전 함대의 기함을 확인했다는 것이 분명해졌습니다. 더욱이, 이 배는 여전히 온전한 데이터 저장소를 보유하고 있었으며, 우리의 [root.owner.GetScientistResearchSubroutinePlural]는 이를 통해 약 4천 년 전 이곳에서 발생한 사건들을 재구성할 수 있었습니다.\n\n그들의 제국은 모든 생물량을 소비하며 점점 더 강해지는 외계 침략 세력인 공허 태생 생명체와 필사적인 전쟁을 벌였습니다.\n\n한때 여러 정착 세계가 번영하던 이 인구 중심지에 스웜이 다가오고, 공격자와 맞서기 위해 도달할 수 있는 병력이 거의 없는 상황에서, 제독은 어려운 결정을 내려야 했습니다. 자신의 국민을 구할 수도, 적을 물리칠 수도 없다는 것을 알게 된 그는 적이 원하는 생물량을 차단하기 위해 시스템 내 모든 식민지 세계를 파괴하기로 결정한 후, 나머지 함대가 위협에 접근할 수 있도록 최대한의 시간을 벌기 위해 그들과 전투를 벌였습니다.\n\n제독의 로그 마지막 항목에는 다음과 같이 적혀 있습니다: §SSome may question my right to destroy planets with tens of billions of souls, but those who understand will realize that I had no right to let them live. No sacrifice can be too great when our entire galaxy is at stake. They did their duty and so shall we...§!\n\n우리의 단순한 존재는 그의 희생이 헛되지 않았음을 증명하는 것 같습니다."
 mem_vazuran_systems.102.a:0 "다수의 필요가 소수의 요구를 능가하는 법이지."
 mem_vazuran_systems.102.b:0 "전멸 과정은 이미 종료되었습니다. 우리의 서비스는 여기서 필요하지 않습니다."
 mem_vazuran_systems.102.c:0 "얼마나 친절한 자들인지... 자신들을 스스로 정화해 우리의 일을 덜어주는군."
 mem_vazuran_systems.102.d:0 "너무 많은 음식들이 낭비되었군..."
 mem_vazuran_systems.103.name:0 "무리"
 mem_vazuran_systems.103.desc:0 "이곳에서 한때 발생했던 일과 또 다른 초외계 침공의 위협을 알고 있는 우리는 [root.owner.GetScientistResearchSubroutinePlural]가 다시 돌아올 경우를 대비하여 광범위한 준비를 요청합니다. 우리가 아는 한, 이 침공 세력은 분명히 위험하고 위협적이었음에도 불구하고 단지 선봉대에 불과했을 수 있습니다. 이러한 수평선의 그림자가 드리워진 상황에서, 그들 중 몇몇은 이 적과 마주할 경우 활용할 수 있는 가능한 약점을 찾기 위해 이용 가능한 샘플에 대한 심층 연구를 수행하자는 제안을 이미 내놓았습니다."
 mem_vazuran_systems.103.a:0 "이런 최악의 시나리오에 대비를 해야겠군."
 mem_vazuran_systems.1b.desc:0 "REPLACE_ME"
 mem_vazuran_systems.1.b:0 "조사를 개시하라."
 mem_vazuran_event_system_colony_trap_chain_title:0 "폐허가 된 성계"
 mem_vazuran_event_system_colony_trap_chain_desc:0 "끔찍한 사건이 일어났던 [mem_vazuran_event_system_01.GetName] 성계를 조사합니다."
 mem_vazuran_event_system_colony_trap_projects_researched:0 "조사 완료"
