l_korean:
 mem_orila_primitives.10.name:0 "REPLACE_ME"
 mem_orila_primitives.10.desc:0 "REPLACE_ME"
 mem_orila_primitives.20.name:0 "Devastation"
 mem_orila_primitives.20a.desc:0 "우리는 §Y[From.GetName]§! 항성계에 도착하였고, 즉시 함대의 감지기에서 다양한 잔해 필드를 탐지하였습니다. 초기 분석에 따르면 이 잔해들은 고대이면서도 고급 기술을 갖추고 있는 것으로 보입니다. 그러나 우리가 이 잔존자들을 처음 발견한 것은 아닌 듯합니다. 이들은 이미 오래전에 유용한 부품이 모두 제거된 상태입니다.\n\n하지만 이것이 유일한 이상 현상은 아닙니다. 이 항성계의 한 행성은 과거의 어느 시점에 조각나 버렸습니다. 이러한 일이 발생한 원인은 불분명하지만, 항성계 전역에 퍼져 있는 잔해가 같은 사건에서 비롯된 것으로 보입니다. 추가 조사가 권장됩니다."
 mem_orila_primitives.20b.desc:0 "우리는 또 다른 파괴된 항성계에 도착하여 또 다른 파괴된 행성을 발견했습니다. 이 항성계에서 발견된 잔해들은 고대이면서도 고급 기술을 지닌 것으로 보입니다. 그러나 불행히도 우리 도착하기 훨씬 이전에 유용한 부품들은 모두 제거되었습니다.\n\n주변을 간단히 스캔한 결과, 우리가 이전에 발견한 중금속 합금의 흔적이 드러났습니다. 이 행성도 같은 힘의 희생양이 되었던 것 같습니다."
 mem_orila_primitives.20c.desc:0 "우리는 또 다른 파괴된 행성에 도착한 또 다른 황폐한 항성계에 도착했습니다. 이 항성계에서 발견된 잔해들은 고대이면서도 고급 기술로 보입니다. 하지만 불행히도 우리 도착하기 훨씬 이전에 유용한 부품들은 모두 제거되었습니다.\n\n주변을 간단히 스캔한 결과 Vazurans가 사용한 중금속 합금의 흔적이 발견되었습니다. 또 다른 세계가 그들의 공포의 지배에 희생되었습니다."
 mem_orila_primitives.20d.desc:0 "우리는 §Y[From.GetName]§! 항성계에 도착하였고, 즉시 우리의 함대 감지기에서 다양한 잔해 필드를 포착하였습니다. 초기 분석에 따르면 이 잔해는 고대이면서도 고급 기술로 보입니다. 그러나 우리가 이 잔존자들을 처음 발견한 것은 아닌 듯합니다. 이들은 오래전에 유용한 부품이 모두 제거된 상태입니다."
 mem_orila_primitives.20e.desc:0 "$mem_orila_primitives.20d.desc$\n\n하지만 더 많은 것이 있습니다. 이 성계의 세계 중 하나는 행성 방패에 의해 보호되고 있어, 우리의 장거리 스캐너로는 그 표면을 감지할 수 없습니다. 우리는 더 많은 정보를 얻기 위해 가까이 조사해야 할 것입니다."
 mem_orila_primitives.100.name:0 "수신 중인 전송"
 mem_orila_primitives.100.desc:0 "들어오는 우주선, 이 시스템은 은하 상원에서 통과된 비간섭 조약의 보호를 받고 있으며 할리소스 평의회에 의해 보장됩니다.\n\n귀하의 행동이 해당 조약을 위반하지 않는 한 이 시스템에 머무르는 것이 허용됩니다. 보호된 행성, 이 기지 또는 그 자산에 대한 어떠한 공격도 적절한 대응을 받을 것임을 경고합니다.\n\n질문이 있는 경우, 이 기지의 행정 AI가 모든 가능한 정보를 제공할 것입니다."
 mem_orila_primitives.100.a:0 "이 '비간섭 조약'의 조건은 무엇입니까?"
 mem_orila_primitives.100.desc.a:0 "'비간섭 조약'은 아직 우주 항해를 시작하지 않은 문명을 보호하여 그 자연적인 문화 및 기술 발전에 해롭거나 방해가 되는 개입을 방지합니다."
 mem_orila_primitives.100.b:0 "은하 상원인가요?"
 mem_orila_primitives.100.desc.b:0 "은하 상원은 종간 외교를 위한 공통점입니다. 이는 이 은하에서 평화와 번영을 보장하기 위해 모든 우주 항해 문명의 대표들로 구성되어 있습니다."
 mem_orila_primitives.100.c:0 "이 기지를 누가 건설했습니까?"
 mem_orila_primitives.100.desc.c:0 "이 기지는 오릴란 연합에 의해 건설되었습니다."
 mem_orila_primitives.100.d:0 "이 '의회'란 무엇입니까?"
 mem_orila_primitives.100.desc.d:0 "오릴란 연합의 통치 기관으로, 은하 상원의 창립 회원이자 네 개의 가장 영향력 있는 국가 중 하나입니다."
 mem_orila_primitives.100.e:0 "우리와 당신의 창조자 사이에 연락을 맺을 수 있습니까?"
 mem_orila_primitives.100.desc.e:0 "[This.GetName]와 할리소스 의회 간의 외교 채널을 초기화하는 중입니다...\n\n잠시만 기다려 주십시오...\n\n외교 채널이 초기화되었습니다..."
 mem_orila_primitives.100.desc.f:0 "[This.GetName]와 할리소스 의회 간의 외교 채널을 초기화하는 중입니다...\n\n잠시만 기다려 주십시오...\n\n오류: 연결을 설정할 수 없습니다."
 mem_orila_primitives.100.g:0 "밀접 접촉"
 mem_orila_primitives.100.desc.g:0 "인정했습니다. 채널을 닫습니다."
 mem_orila_primitives.100.h:0 "AI 해킹 시도"
 mem_orila_primitives.100.i:0 "§G우리의 창조자들은 모두 사라졌지만, 우리의 프로토콜은 일치합니다. 우리와 함께 하세요.§!"
 mem_orila_primitives.100.desc.i:0 "교체_필요"
 mem_orila_primitives.101.desc:0 "적대적인 침입자여, 공격을 중단하고 즉시 이 성계를 떠나십시오. 추가적인 적대 행위는 전면적인 대응으로 이어질 것입니다."
 mem_orila_primitives.110.desc:0 "들어오는 선박, 이 시스템은 ... 비 ... 체류가 허용되지 않습니다 ... 귀하의 행동은 .. 위반합니다 .. 경고했습니다 ... 공격성 .. 모든 이용 가능한 정보를 제공하겠습니다."
 mem_orila_primitives.110.a:0 "어떤 정보가 제공됩니까?"
 mem_orila_primitives.110.desc.a:0 "서버 연결이 끊어졌습니다...\n\n다시 연결을 시도하고 있습니다...\n\n서버가 응답하지 않습니다..."
 mem_orila_primitives.110.b:0 "교체_필요"
 mem_orila_primitives.110.desc.b:0 "교체_필요"
 mem_orila_primitives.120.desc:0 "REPLACE_ME"
 mem_orila_primitives_magnus.1.name:0 "중력 이상 현상"
 mem_orila_primitives_magnus.1.desc.a:0 "The [This.GetName]가 [From.GetName] 성계에 도착했습니다. 그 감지기는 주변에 비정상적인 중력 이상이 있음을 보여줍니다. 가장 중요한 것은 이 성계의 중력 중심이 - 모든 기존의 기대를 저버리고 - 주요 항성이 아닌 지구형 행성이라는 점입니다. 현재 존재하는 모든 다른 물체는 그 주위를 공전하고 있습니다.\n\n그러나 여기서 특이점이 끝나는 것은 아닙니다. 이 중심 행성은 분명히 가이아 클래스 세계로, 방어 에너지 보호막에 둘러싸여 있습니다. 우리의 센서 데이터는 산업 이전 문명의 존재를 시사합니다. 두 개의 유사하지만 뚜렷하게 구분되는 디자인의 잔해로 둘러싸인 파괴된 전초 기지가 별 근처에 위치해 있습니다."
 mem_orila_primitives_magnus.1.desc.b:0 "$mem_orila_primitives_magnus.1.desc.a$\n\n행성 근처에 또 다른 기지가 여전히 작동 중인 것으로 보입니다. 그것은 신호를 송신하고 있습니다. 여기 우리의 존재는 간과되지 않았습니다."
 mem_orila_primitives_magnus.1.a:0 "이곳은 참 이상한 곳입니다."
 mem_orila_primitives_magnus.1.b:0 "화면에."
 mem_orila_primitives_magnus.2.a:0 "이 시스템에 대해 무엇을 알려주실 수 있습니까?"
 mem_orila_primitives_magnus.2.desc.a:0 "이 성계는 은하 표준 달력의 주기 18035에서 처음 발견되었으며, 이 지역을 통과하는 특히 격렬한 장막 폭풍의 여파로 나타났습니다. 중심에 별이 아닌 행성이 위치한 이 독특한 중력 구조는 그 이후로 과학적 조사의 주제가 되어 왔습니다.\n\n성계 내의 다른 궤도 천체들은 그다지 흥미롭지 않지만, 중심 행성은 여러 가지 특이점을 지니고 있습니다. 여러 유전적으로 관련 없는 지능 종족들이 그 가장 큰 대륙에 더 많거나 적게 안정적인 공존을 이루고 있습니다. 이들이 자연스럽게 서로 진화했을 가능성은 매우 낮으므로, 책임 당사자에 대한 어떤 징후가 없더라도 외부의 영향이 가장 가능성이 높다고 여겨집니다.\n\n이 원주율이 없는 사회는 기술 발전이 거의 없는 영구적인 중세 시대에 얼어붙어 있는 것으로 보이며, 모든 원주율들은 잠재적 사이오닉 능력의 징후를 보입니다. 이것이 유전적 조작 때문인지 아니면 장막 에너지와의 지속적인 접촉의 결과인지는 불분명합니다. 이 성계에서 우리의 현실과 장막을 구분하는 장막은 매우 얇으며, 갑작스러운 출현으로 보아 그 기원이 우리의 우주 밖에 있을 가능성이 높습니다."
 mem_orila_primitives_magnus.2.b:0 "다른 기지에는 무슨 일이 있었나요?"
 mem_orila_primitives_magnus.2.desc.b:0 "이 성계는 정체불명의 적의 공격을 받았습니다. 공격자들은 저지되었지만, 이 성계의 중앙 허브가 입은 피해는 너무 광범위하여 기능을 멈추게 되었습니다."
 mem_orila_primitives_magnus.4.name:0 "신화와 전설"
 mem_orila_primitives_magnus.4.desc:0 "과학자들이 [mem_nirn_site.GetName]의 원주민을 연구하면서, 원주민들이 "블랙리치"라고 부르는 얼어붙은 북쪽 땅 아래에 있는 거대한 지하 동굴 시스템에 대해 알게 되었습니다.\n\n획득한 정보에 따르면, 이곳은 한때 그 근처에서 발견된 방대한 광물 자원 때문에 정착했던 이제는 오래 잃어버린 문명의 고향이었다고 전해집니다. 특히, 우리 과학자들이 그들의 자료에서 설명을 통해 추론한 바에 따르면, 희귀 결정이 있었습니다. 이와 더불어 고고학적 발견의 약속은 이 신비로운 장소를 찾기 위한 비밀 탐사를 정당화합니다."
 mem_dark_heart_boost:0 "어둠의 에너지 정렬"
 mem_orila_primitives_magnus_crystal_processing_hub:0 "크리스탈 가공 허브"
 mem_orila_primitives_magnus_crystal_processing_hub_desc:0 "니른에서 비밀리에 채굴된 원석을 가공하여 외부로 수출하는 작은 산업 공장입니다."
 mem_orila_primitives_magnus_abandoned_crystal_processing_hub:0 "버려진 수정체 가공 허브"
 mem_orila_primitives_magnus_abandoned_crystal_processing_hub_desc:0 "니른에서 비밀 작전의 필요성이 사라지면서, 이곳은 영원히 버려졌습니다."
 mem_orila_primitives_artificial_world:0 "인공 행성"
 mem_orila_primitives_artificial_world_desc:0 "이 세계는 먼 과거에 미니어처 별 주위에 행성 크기의 다이슨 구를 건설하여 인위적으로 만들어졌습니다. 구 아래를 가리는 상층 표면은 가장 두꺼운 부분에서 불과 몇 킬로미터에 불과합니다."
 d_mem_nirn_blackreach:0 "검은 심연의 동굴"
 d_mem_nirn_blackreach_desc:0 "고대 유적이 점점이 박혀 있는 희귀 결정이 풍부한 광대한 지하 동굴 네트워크."
 r_mem_dark_heart:0 "어두운 심장"
 r_mem_dark_heart_desc:0 "우리 현실의 경계에 존재하는 세계의 깊은 곳에서 발견되었습니다. 그곳은 장막과 분리되는 베일이 가장 얇은 곳입니다. 구체는 매끄러운 검은 표면 위에서 반짝이는 에너지로 맥동합니다. 방출되는 에너지가 강해질수록 구체 자체는 더욱 어두워 보입니다..."
 mem_nirn_blackreach_site:0 "아래에 무엇이 있는가"
 mem_nirn_blackreach_site_desc:0 "우리는 먼 과거에 멸망한 문명의 유적이 있다고 전해지는 거대한 지하 동굴 시스템의 존재를 알게 되었습니다."
 mem_orila_primitives_magnus_site.1.name:0 "입구 찾기"
 mem_orila_primitives_magnus_site.1.desc:0 "다양한 토착 정보 출처에 대한 연구 덕분에 우리의 관측 팀은 깊은 지하로 이어지는 여러 유적지를 정확히 찾아낼 수 있었습니다. 가장 외진 장소가 선택받은 사회 구성원과의 직접 접촉 위험을 최소화하기 위해 우리의 탐사의 출발점으로 정해졌습니다.\n\n유적지에 도착하자마자 관찰된 토착 인구가 사용하는 건물과의 차이가 즉시 드러났습니다. 이 장소의 이전 거주자들은 그 시대를 훨씬 앞선 기술적 발전을 이루었음이 분명하며, 오늘날에도 여전히 그러합니다.\n\n요새 같은 구조물 안에는 목적을 알 수 없는 부서진 기계들이 널려 있었습니다. 빠르게 중화된 공격적인 지역 동물 외에는 최근 거주 흔적이 발견되지 않았습니다.\n\n이 지역의 초기 조사에서 중앙 건물 중 하나에 지하로 이어지는 엘리베이터 샤프트가 있는 것으로 보입니다. 우리의 공학자들이 이 접근 지점을 확보하여 지하 층을 탐사할 수 있도록 작업을 시작했습니다."
 mem_orila_primitives_magnus_site.1.a:0 "저를 계속 업데이트해 주세요."
 mem_orila_primitives_magnus_site.2.name:0 "지하 복합체"
 mem_orila_primitives_magnus_site.2.desc:0 "엘리베이터 샤프트에 임시 리프트를 설치함으로써 우리는 유적의 지하 층에 접근할 수 있었습니다.\n\n시간의 흐름이 그곳에도 영향을 미쳤지만, 기적적으로 벙커 같은 구조물 곳곳에서 발견된 이상한 기계의 대부분은 여전히 작동 중이었으며, 빛을 발하는 수정 장치들을 통해 빛을 제공하고 원시 자동인형을 재충전하고 있었습니다. 활성화된 자동인형은 우리의 탐사대에 대해 적대적으로 반응했습니다. 그러나 이 모든 것에 에너지를 공급한 원천은 확인할 수 없었습니다. 복잡한 구조물의 일부는 무너진 복도로 인해 접근할 수 없었습니다.\n\n항상 존재하는 자동인형 외에는 이전 거주자들의 행방에 대한 단서는 발견되지 않았습니다. 구조물의 가장 깊은 층에 도달한 우리의 탐사대는 광대한 자연 동굴로 이어지는 출구를 발견했습니다. 해당 출구에 기지 캠프를 설치하고 구조물을 통해 지표와 연결되는 공급 경로를 마련하여 추가 탐사를 진행할 수 있도록 하였습니다."
 mem_orila_primitives_magnus_site.2.a:0 "탐사를 계속합니다."
 mem_orila_primitives_magnus_site.3.name:0 "어둠 속의 추적자"
 mem_orila_primitives_magnus_site.3.desc:0 "우리의 탐사가 광대한 동굴 시스템에 들어섰을 때, 진정으로 이질적인 풍경이 기다리고 있었습니다. 공기는 무겁고 거대한 빛나는 균류 숲에 의해 끊임없이 퍼지는 포자로 가득 차 있었습니다. 이들의 고유한 생물 발광 덕분에 포자는 동굴의 광대한 영역을 섬뜩한 푸른 색조로 물들였고, 여기저기 있는 물웅덩이에 축적되어 불투명한 청록색으로 변했습니다. 거대한 결정체가 땅과 동굴 천장에서 튀어나와 있으며, 그 반사 표면은 균류의 빛을 더욱 확산시켜 음산한 분위기에 기여하고 있습니다.\n\n멀리서는 지표 입구에서 발견되는 것과 비슷한 구조물들이 보였습니다. 이 구조물을 다음 목적지로 정하고, 우리의 탐사는 검은 영역의 섬뜩한 황혼 속을 계속 나아갔습니다. 이상한 인간형 동굴 거주자들과 그들의 곤충 애완동물들이 호기심 어린 시선으로 지켜보고 있었습니다.\n\n이 원시적인 존재들은 지표에 사는 인간형 종족의 퇴화된 친척으로 보였지만, 그들의 지능은 부족하고 동굴 시스템에 신체적으로 적응해 있었습니다. 우리의 숫자는 좋든 나쁘든 그들이 어떤 접근을 시도하는 것을 단념하게 만든 것 같았습니다. 그래서 그들은 거리를 유지했습니다."
 mem_orila_primitives_magnus_site.3.a:0 "정말 이상한 곳입니다."
 mem_orila_primitives_magnus_site.4.name:0 "잊혀진 도시"
 mem_orila_primitives_magnus_site.4.desc:0 "우리 탐사는 이전에 수평선에서 발견한 구조물에 도착했습니다. 그러나 그 크기는 상당히 기만적이었고, 이동해야 할 거리는 이전 추정치보다 두 배에서 세 배 더 많았습니다.\n\n하지만 그만한 가치가 있었습니다. 우리의 고고학자들은 몇 개의 폐허가 된 건물 대신 광대한 동굴의 중심에 위치한 완전한 버려진 도시를 발견했습니다.\n\n이전에 방문한 금고와 마찬가지로, 이곳에서도 기계적 구조물과 기계들이 여전히 작동하고 있습니다. 우리 팀은 현장을 탐색하는 동안 꽤 많은 자동인형을 처치해야 했습니다. 표면적인 조사 중에 그들은 이미 여러 흥미로운 지점을 확인했습니다. 그 중 첫 번째는 도시 내 다른 구조물들과는 달리 봉인된 중앙 첨탑 같은 건물입니다.\n\n이 사실은 그 안에 흥미로운 무언가가 존재할 가능성을 암시합니다. 입구를 여는 작업은 이미 시작되었습니다."
 mem_orila_primitives_magnus_site.4.a:0 "열어보세요."
 mem_orila_primitives_magnus_site.5.name:0 "어두운 심장"
 mem_orila_primitives_magnus_site.5.desc:0 "첨탑의 입구가 열렸습니다. 내부에 들어선 연구원들은 그들의 선입견을 빠르게 수정해야 했습니다.\n\n종교적 예배를 위한 신전이라는 일반적인 가정과는 달리, 그들은 과학의 장소를 발견했습니다. 첨탑에는 여러 개의 실험실과 과학 연구의 아카이브가 있었습니다.\n\n구조물의 높은 곳에는 신비로운 장치가 이상한 구체를 공중에 떠 있게 하는 전체 층이 할당되어 있었습니다. 그 매끄러운 검은 표면은 끊임없이 변화하는 상태였으며, 에너지의 폭발이 자주 뚫고 나왔습니다. 우리의 스캔에 따르면, 이 물체는 사이폰처럼 작용하여 장막 차원 내에서 흐르는 힘을 harnessing하고 있었습니다. 우리의 차원과 장막의 차원 사이의 장막이 특히 얇은 이곳에서, 이 유물의 잠재적 에너지 출력은 엄청난 것으로 보였습니다.\n\n이 장소의 창조자들에 대한 우리의 축적된 지식에 따르면, 이 물체가 그들의 제작물이라는 것은 배제되었습니다. 불행히도, 그 기원의 신비는 그들의 사라짐만큼이나 여전히 미스터리로 남아 있습니다."
 mem_orila_primitives_magnus_site.5.a:0 "올려주세요."
 mem_floating_pebbles_site:0 "부유하는 조약돌"
 mem_floating_pebbles_site_desc:0 "Scans of [From.Planet.GetName]는 해양 표면에 떠 있는 여러 개의 큰 합금 형성을 나타냅니다. [From.Planet.GetName] 주위의 행성 방패로 인해 이러한 구조물의 본질을 멀리서 파악하기 어렵습니다.\n\n현장 조사가 진행된다면 그 목적을 이해하는 데 도움이 될 수 있습니다."
 mem_orila_primitives_pebbles_site.1.name:0 "무생명 도시"
 mem_orila_primitives_pebbles_site.1.desc:0 "우리 과학자들은 이 거대한 구조물 중 적어도 수십 개를 조사했으며, 이들은 떠다니는 도시였던 것으로 판단하고 있습니다. 흥미롭게도, 어디에서도 지능적인 생명체의 흔적은 발견되지 않았습니다. 대부분의 집 내부는 정교한 조각으로 장식되어 있었으며 - 아마도 지역 주민을 나타내는 것일 것입니다 - 그러나 여전히 그들의 이전 거주자에 대한 단서는 얻을 수 없었습니다.\n\n이전 조사 주변의 넓은 지역에서 추가 스캔을 통해 떠다니는 도시와 유사한 디자인의 구조물이 발견되었지만, 이 세계의 몇 안 되는 군도 중 하나의 산맥 깊숙이 지어졌습니다."
 mem_orila_primitives_pebbles_site.2.name:0 "산악 벙커"
 mem_orila_primitives_pebbles_site.2.desc:0 "산맥 내부의 건축물들도 버려져 있습니다. 이 "벙커"에 대한 우리의 이해로는, 사치나 웅장한 건축물에 대한 고려 없이 시간 압박 속에서 지어진 것으로 보입니다. 내부의 모든 것이 "실용성"을 외치고 있습니다.\n\n산맥의 이전 거주자들이 홍수에 대비해 자신들을 방어했음을 나타냅니다. 방어벽이 상승하는 조수에 얼마나 오랫동안 저항했는지는 불확실하지만, 결국 하층은 침수되어 오직 상층만 거주 가능하게 남았습니다. 우리 팀이 탐사한 다양한 벙커들 사이의 이상한 공통점은 떠 있는 도시에서 발견되는 것과 유사한 동상의 존재가 어색하게 자리잡고 있다는 것입니다. 더욱 호기심을 자아내는 것은 그들의 배치가 오직 침수되지 않은 지역에만 이루어져 있다는 점으로, 마치 이전 거주자들이 - 다시 말해 그들 자신에 대한 흔적을 남기지 않은 - 어려운 상황 속에서도 이 동상들을 보존하는 것을 최우선으로 삼았던 것처럼 보입니다."
 mem_orila_primitives_pebbles_site.3.name:0 "비 오는 날, 증기 안개가 끼는 가능성"
 mem_orila_primitives_pebbles_site.3.desc:0 "우리의 탐사선은 상승한 조수의 주된 원인으로 추정되는 것을 발견했습니다. [From.Planet.GetName]의 북부에 위치한 초간헐천입니다. 현재는 해양에 잠겨 있지만, 이 증기와 끓는 물의 간헐천은 끊임없이 파도를 뚫고 올라와 100미터 이상의 높이에 도달합니다. 우리 팀은 이 간헐천이 시간이 지남에 따라 방출한 열 에너지가 이 행성의 대기 온도를 점진적으로 상승시켜 극지방 주변의 모든 얼음을 녹였다고 추정하고 있습니다. 우리의 계산에 따르면, [From.Planet.GetName]은 이 지속적인 에너지 방출이 없었다면 액체 형태의 물이 없는 얼어붙은 사막이었을 것입니다.\n\n우리 과학자의 이론은 해수면 상승과 그에 따른 출현에 직면한 원주민 인구가 떠 있는 도시와 높은 곳에 지어진 지하 벙커에서 살기로 나뉘었다는 것입니다. 그들은 물이 자신들에게 닿지 않을 것이라고 잘못 믿었습니다.\n\n벙커는 결국 침수되었지만, 해양 민족에게 무슨 일이 일어났는지는 확실하지 않습니다."
 mem_orila_primitives_pebbles_site.3.a:0 "바다의 도시로 돌아갑니다."
 mem_orila_primitives_pebbles_site.4.name:0 "슬퍼하는 천사"
 mem_orila_primitives_pebbles_site.4.desc:0 "부유하는 도시 중 하나에서 우리의 과학자들은 약간의 사고로 인해 하나가 파손된 조각상을 재검토했습니다. 그들은 놀랍게도 외부의 파티나 같은 층이 암시하던 것처럼 동질의 금속 물자로 구성되어 있지 않다는 것을 발견했습니다. 대신 내부에는 자연 지질학적 과정의 결과일 가능성이 매우 낮은 다양한 광물의 분리된 영역이 명확하게 존재했습니다.\n\n끔찍한 결론은 사라진 주민들의 미스터리를 해결했습니다. 그들은 사라진 것이 아닙니다. 그들은 여기 있었던 것입니다 - 조각상으로 오해받고 있었습니다. 이 리토이드는 높은 습도로 인해 느린 외부 부식으로 고통받았으며, 점차 그들을 질식시키고 있었습니다. 궁극적으로, 그들이 물에서 자신을 구하려는 시도는 불가피한 일을 단지 미루었을 뿐입니다.\n\n그들의 멸망을 감안할 때, 그들은 훨씬 건조한 기후에서 진화했을 것으로 추정되며, 이는 행성의 과거에 대한 우리의 이전 계산을 뒷받침합니다. 그러나 슈퍼 간헐천을 통한 에너지 방출과 그동안 해양 바닥에 흩어져 있는 다양한 다른 출구를 유발한 원인은 아직 불분명합니다. 우리는 수중 탐사선을 사용하여 이러한 "핫스팟"을 조사하기 시작했습니다."
 mem_orila_primitives_pebbles_site.4.b:0 "비극적입니다."
 mem_orila_primitives_pebbles_site.5.name:0 "단지 시작일 뿐입니다."
 mem_orila_primitives_pebbles_site.5.desc:0 "우리는 충격을 받았습니다. 수십 미터의 흙과 잔해를 지나자 드릴이 모두 우리가 제조할 수 있는 어떤 물자보다 강한 고체층에 부딪혔습니다, 자연적으로 존재하는 어떤 것과 비교할 수 없을 정도로요.\n\n추가 탐사와 다양한 심층 조사 스캔을 통해 우리의 데이터는 이 표면이 지구 전체를 둘러싸고 있으며, 상층인 흙, 바위, 산, 바다 등이 모두 같은 기초층 위에 놓여 있다는 것을 시사합니다. 그 기원이 자연적인 과정의 결과라고 가정하는 것은 불가능합니다. 이러한 구조물을 만들기 위해 필요한 기술은 우리의 기술을 쉽게 초월하며, 이는 원주율이 그 창조자일 수 없음을 분명히 합니다.\n\n더 이상의 탐사의 길을 제공할 수 있는 곳은 단 하나뿐입니다. 바로 슈퍼 간헐천의 원천입니다. 그곳의 힘을 견디기 위해서는 특별히 장비가 갖춰진 드론이 필요할 것입니다."
 mem_x.x05.a:0 "그렇게 하겠습니다!"
 mem_orila_primitives_pebbles_site.6.name:0 "인공 행성"
 mem_orila_primitives_pebbles_site.6.desc:0 "이 초거대 간헐천의 출처에 접근하면서 우리의 드론은 점점 더 강인하고 폭력적인 흐름과 싸워야 했습니다. 개선된 추진력과 방어 덕분에 드론은 간헐천이 발생하는 땅의 큰 균열에 도달할 수 있었습니다.\n\n우리가 이미 추측했던 것처럼, 그 개구부는 인공 구조물로 내려가며 물자를 통과하는 개구부로 이어졌습니다. 드론은 몇 킬로미터 직선으로 터널을 따라 내려갔고, 이 통로가 구조물의 의도된 특징인지 여부에 대한 의심을 남기지 않았습니다. 하강하는 동안 주변의 물은 초가열된 플라즈마로 대체되었고 - 예상했던 것처럼 마그마는 아니었습니다. 터널의 반대편을 빠져나올 때, 드론은 거의 기능을 잃었지만, 우리는 연락이 완전히 끊기기 전에 마지막으로 텔레메트리 데이터를 수신했습니다.\n\n수신된 데이터에 따르면, 구형 구조물은 미니어처 다이슨 구처럼 작은 별을 둘러싸고 있습니다. 우리의 과학자들은 이 별이 행성의 활성 코어에서 방출될 에너지를 제공하는 데 사용되며, 더 적은 물자를 사용한다고 추정합니다. [From.Planet.GetName]는 인공 행성을 만들기 위한 거대한 구조물입니다. 거주지와 같은 더 간단한 대안이 많은데, 왜 이런 목적이 필요한지는 여전히 미스터리입니다.\n\n그러나 수집된 데이터는 우리가 돌파구를 찾는 데 필요한 것일지도 모릅니다."
 mem_burning_skies_site:0 "죽은 세계"
 mem_burning_skies_site_desc:0 "[From.Planet.GetName]은(는) 폐허 속에 놓여 있습니다 - 황폐해지고 거의 생명체가 없는 상태입니다. 현재 상태로 이어진 사건들이 발생한 이후로 지나간 시간에도 불구하고, 높은 농도의 방사선이 여전히 표면을 장막처럼 덮고 있습니다."
 mem_orila_primitives_skies_site.1.name:0 "전쟁에 의해 황폐화됨"
 mem_orila_primitives_skies_site.1.desc:0 "행성은 광범위한 전투 지역과 평평해진 폐허로 덮여 있으며, 한때는 광활한 도시였던 곳이 이제는 금속 뼈무덤에 불과합니다.\n\n지면에 녹슬어 있는 차량들을 보면, 우리 과학자들은 반복되는 표식에 따라 두 개의 뚜렷한 세력으로 나뉜 것으로 추정합니다. 이 세계의 주민들은 서로 싸웠습니다. 그러나 여러 곳에서 발견되는 전통적인 전쟁의 흔적은 이 문명이 멸망한 진짜 이유를 숨길 수 없습니다.\n\n그때로부터 시간이 흘렀음에도 불구하고, 많은 지역 - 특히 더 큰 도시의 폐허 - 는 보호받지 못한 인원에게 치명적인 수준을 훨씬 초과하는 방사능 수치를 보입니다. 이 문명이 멸망할 당시, 행성의 전체 표면이 방사능 사망 지역이었을 것이라고 추정할 수 있습니다."
 mem_orila_primitives_skies_site.1.a:0 "그들은 왜 서로 싸웠을까요?"
 mem_orila_primitives_skies_site.1.b:0 "그들은 우리를 위한 새로운 집을 만들었습니다."
 mem_orila_primitives_skies_site.2.name:0 "평온의 안식처"
 mem_orila_primitives_skies_site.2.desc:0 "더욱 자세한 스캔 결과, 그들의 거주자가 멸종한 이후 경과한 시간을 고려할 때 상대적으로 온전하게 남아 있는 다양한 장소들이 드러났습니다. 전략적 중요성이 부족하거나 전쟁과 핵 교환으로 인한 광범위한 파괴로부터 이 장소들을 보호하는 유리한 지형 덕분에 이곳들은 그들의 문명의 마지막 순간을 목격했습니다.\n\n그 중 하나는 외딴 계곡에 위치한 작은 마을로, 주민들은 공동체 중심에 있는 대형 신전 같은 구조물 안팎에 모여 있었습니다. 그들의 유해는 여전히 땅에 흩어져 있습니다. 이들이 모두 이곳에 함께 있었던 것을 감안할 때, 그들이 하나씩 방사능에 서서히 굴복했을 가능성은 낮아 보입니다.\n\n우리의 고고학자들은 이미 그곳에서 발견된 다양한 생존 문서와 경전들을 조사하기 시작했으며, 이를 통해 이러한 상황에 이르게 된 경위를 파악하기를 희망하고 있습니다."
 mem_orila_primitives_skies_site.2.a:0 "계속하세요."
 mem_orila_primitives_skies_site.3.name:0 "종교 전쟁"
 mem_orila_primitives_skies_site.3.desc:0 "settlement 내의 중심 구조물은 실제로 우리 팀이 추정한 대로 종교적 숭배의 장소였습니다. 살아남은 경전의 연구는 이 추정을 뒷받침합니다. 그러나 그들의 아이콘은 정말로 놀라웠습니다. 우리의 데이터베이스 내에서 교차 참조한 결과, 이 시스템 내의 잔해에서 발견된 표식과 밀접하게 연결되어 있었습니다. 이 문명이 아직 우주 비행을 할 수 없었던 것은 분명하지만, 과거에 그들 사이에 어떤 형태의 접촉이 있었던 것이 분명하며, 그것이 그들의 종교의 일부가 되었기 때문에 그들의 먼 과거에 역사에 중대한 영향을 미쳤을 가능성이 높습니다.\n\n다른 문서들은 전쟁으로 이어지는 최근의 발전에 대한 단서를 제공합니다. "타오르는 하늘의 날들"이라고 불리는 사건이 몇십 년 전 발생했으며, 이는 그들의 공동체 내에서 큰 분열을 초래했습니다. 한쪽은 그들의 신들을 고수하는 반면, 다른 쪽은 그들이 그들의 민족을 저버렸다고 믿었습니다. 시간이 지남에 따라 이 두 그룹 간의 긴장이 계속해서 높아졌기 때문에 결국 공개적인 갈등이 발생하는 것은 불가피했습니다.\n\n더 많은 최근 이벤트를 자세히 설명하는 추가 물자가 있지만, 우리 팀은 그것이 흩어져 있는 특성 때문에 모든 것을 종합하는 데 어려움을 겪고 있습니다."
 mem_orila_primitives_skies_site.3.a:0 "믿음으로 나뉘었나요?"
 mem_orila_primitives_skies_site.3.b:0 "신성한 전쟁인가?"
 mem_burning_skies_scrolls:0 "타오르는 하늘 두루마리의 날들"
 mem_burning_skies_scrolls_desc_short:0 "고대 공동체 내에서 큰 분열을 초래한 "타오르는 하늘의 날들"로 불리는 사건에 대한 이야기를 담고 있는 두어 세대 전의 두루마리입니다."
 mem_burning_skies_scrolls_desc_details:0 "그들 중 한쪽은 자신의 신화에 집착하고 다른 쪽은 그들이 자신의 민족을 저버렸다고 믿었습니다. 시간이 지남에 따라 이 두 부분 간의 긴장은 계속해서 고조되었고, 공개적인 갈등이 발생하는 것은 불가피했습니다."
 mem_orila_primitives_skies_site.4.name:0 "옵트 아웃"
 mem_orila_primitives_skies_site.4.desc:0 "고대 뉴스 기사에서 발견된 단편적인 단서들을 조합하여, 이 문명 멸망 이전의 사건들에 대한 우리 팀의 이해는 암울한 그림을 그립니다.\n\n“타오르는 하늘의 관찰자들”이라고 불리는 종교적 분파는 - 분열을 촉발한 사건을 언급하는 것이 분명합니다 - 비관적인 세계관 덕분에 경제적으로 덜 유리한 지역에 빠르게 뿌리를 내렸으며, 사람들의 삶에서 겪는 고난과 불행에 의미를 부여했습니다. 그들의 신의 멸망을 믿으며, 이 빠르게 퍼지는 새로운 종교의 목표는 신성한 유물을 장악하여 그들의 목적에 이롭게 사용하려는 것이었습니다. 그들의 주요 목표는 고대 첨탑 주위에 세워진 위대한 성스러운 도시였습니다. 이 첨탑은 그들의 신들에 의해 창조되었다고 전해집니다.\n\n이 새로운 종교가 시작한 세계를 아우르는 전쟁에 대한 상충된 정보가 있었으며, 특히 누가 핵 교환을 시작했는지는 시대를 초월하여 잊혀진 것 같습니다. 그러나 주요 인구 중심지, 그 중에서도 성스러운 도시는 완전히 파괴된 반면, 나머지 세계는 이러한 사건의 여파로 치명적인 방사능 낙진에 직면했다는 것은 분명합니다.\n\n피할 수 없는 멸망의 지식에 직면한 이 정착지의 주민들은 친구와 사랑하는 이들에 둘러싸여 집단 자살을 선택했습니다.\n\n여기서 우리가 배울 것은 더 이상 없습니다. 우리의 조사를 파괴된 성스러운 도시의 좌표로 옮기기 위한 준비가 진행되고 있습니다."
 mem_orila_primitives_skies_site.4.a:0 "확실히, 여기에는 아무것도 남아 있지 않습니다."
 mem_orila_primitives_skies_site.5.name:0 "고대 첨탑"
 mem_orila_primitives_skies_site.5.desc:0 "부서진 전투 기계들이 버려진 광장과 거리 곳곳에 흩어져 있었으며, 방사능 먼지가 바람에 실려 하늘을 흐릿하고 회색으로 만들었습니다. 이 황무지에서는 salvagable한 것이 없었기에, 우리의 탐사는 고대 첨탑의 남은 구조물 안으로 향했습니다. 그 원래 목적을 밝혀내기로 결심했습니다.\n\n구조물 안에서는 이곳의 원주민 문명이 건설하지 않았다는 것이 분명해졌습니다. 사실, 그 건설에 사용된 기술은 우리의 현재 이해를 훨씬 초월하는 것으로 보였습니다. 시스템 전역에서 발견된 잔해와의 부인할 수 없는 연결이 있었지만, 이 구조물은 그와 달리 어떤 유물도 깨끗이 제거되지 않았습니다. 이 건물에 대한 광범위한 연구는 우리 팀이 이를 전체 행성을 둘러싸는 방어막 생성기의 일종으로 분류하게 만들었습니다.\n\n이 건설의 중요한 부품을 대량 생산을 위해 재현할 수는 없겠지만, 우리의 세계 중 하나에서 이 유물을 기능적인 상태로 복원하는 것은 우리의 능력 안에 있을 것입니다."
 mem_burning_skies_site.5.a:0 "죽은 자를 편히 쉬게 할 시간입니다."
 mem_orila_primitives_skies_site.5.a.tt:0 "하나의 건물 키트가 $building_mem_planetary_shield_generator_orila$에 사용 가능해집니다."
