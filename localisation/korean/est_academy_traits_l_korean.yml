l_korean:
 leader_trait_resilient_est_2:0 "회복력"
 leader_trait_resilient_est_2_desc:0 "이 지도자는 우수한 신체 조건과 회복력을 가지고 있기에 기대 수명이 매우 깁니다."
 leader_trait_trickster_est_2:0 "협잡꾼"
 leader_trait_trickster_est_2_desc:0 "이 지도자는 기습과 적의 오판을 이용하며 교활하게 싸웁니다."
 leader_trait_fleet_logistician_est_2:0 "함대 군수 전문가"
 leader_trait_fleet_logistician_est_2_desc:0 "이 지도자는 군수 분야 전문이며, 유지 관리비를 줄이기 위한 보급품 관리법을 알고 있습니다."
 leader_trait_engineer_est_2:0 "기술자"
 leader_trait_engineer_est_2_desc:0 "이 지도자는 타고난 기술자로, 항성 기지 혜택없이 관련 기술을 통해 함선 수리를 조직 및 감독 할 수 있습니다."
 leader_trait_aggressive_est_2:0 "공격적인"
 leader_trait_aggressive_est_2_desc:0 "이 지도자는 공격적인 제독으로, 짧은 순간에 최대한 많은 화력을 집중시키고자 합니다."
 leader_trait_cautious_est_2:0 "신중한"
 leader_trait_cautious_est_2_desc:0 "이 지도자는 신중한 제독으로, 불필요한 위험을 피하고 전투시 함선 간 상호 지원이 가능하도록 항상 대형을 유지하는 것에 중점을 둡니다."
 leader_trait_scout_est_2:0 "정찰병"
 leader_trait_scout_est_2_desc:0 "이 지도자는 정찰 전문가이며, 항상 장거리 우주선 감지기들을 최대한 활용할 수 있는 전문적인 기술을 가지고 있습니다."
 leader_trait_unyielding_est_2:0 "불굴"
 leader_trait_unyielding_est_2_desc:0 "이 지도자는 전투에 참여했을 때 후퇴의 가능성을 염두에 두는 것을 거부하며, 대신에 필요하다면 사력을 다해 싸우는 것을 선호합니다."
 leader_trait_gale_speed_est_2:0 "질풍"
 leader_trait_gale_speed_est_2_desc:0 "이 지도자는 어떠한 우주 교전에서라도 속도와 신속한 기동이 성공의 열쇠라고 믿습니다."
 leader_trait_trickster_2_est:0 "능숙한 속임수꾼"
 leader_trait_trickster_2_est_desc:0 "이 지도자는 교활하게 싸우며, 적을 능가하기 위해 잘못된 방향으로 유도하고 기습에 의존합니다."
 leader_trait_fleet_logistician_2_est:0 "전문 함대 물류 전문가"
 leader_trait_fleet_logistician_2_est_desc:0 "이 지도자는 물류 분야를 완벽하게 숙달하였으며, 유지 보수 비용을 줄이기 위해 자원을 관리하는 방법을 알고 있습니다."
 leader_trait_engineer_2_est:0 "능숙한 공학자"
 leader_trait_engineer_2_est_desc:0 "이 리더는 자연적인 공학자로, 우주 조선소의 도움 없이도 우주선 수리를 조직하고 감독할 수 있는 지식과 기술을 가지고 있습니다."
 leader_trait_aggressive_2_est:0 "매우 공격적"
 leader_trait_aggressive_2_est_desc:0 "이 지도자는 공격적인 제독으로, 가능한 한 짧은 시간 안에 적에게 최대한의 화력을 쏟아붓는 것을 항상 추구합니다."
 leader_trait_cautious_2_est:0 "매우 신중"
 leader_trait_cautious_2_est_desc:0 "이 지도자는 신중한 제독으로, 불필요한 위험을 피하고 항상 함대 유닛이 서로를 지원할 수 있는 편성을 유지하는 데 주의를 기울입니다."
 leader_trait_scout_2_est:0 "고급 정찰병"
 leader_trait_scout_2_est_desc:0 "이 지도자는 정찰의 전문가로, 장거리 우주선 감지기를 최대한 활용할 수 있는 기술적 능력을 가지고 있습니다."
 leader_trait_unyielding_2_est:0 "가혹한 불굴"
 leader_trait_unyielding_2_est_desc:0 "이 지도자는 전투가 시작되면 후퇴할 가능성조차 고려하지 않으며, 필요하다면 죽을 때까지 싸우는 것을 선호합니다."
 leader_trait_gale_speed_2_est:0 "초고속"
 leader_trait_gale_speed_2_est_desc:0 "이 지도자는 속도와 신속한 기동이 모든 우주 전투에서 성공의 열쇠라고 믿습니다."
 leader_trait_restrained_est_2:0 "자제하는"
 leader_trait_restrained_est_2_desc:0 "이 지도자는 타인의 생명을 대단히 염려하여, 전투 중 생포한 민간인 뿐 아니라 자신의 병사에게도 불필요한 죽음이 일어나는 것을 피하려 합니다."
 leader_trait_charismatic_est_2:0 "카리스마"
 leader_trait_charismatic_est_2_desc:0 "이 지도자는 의욕을 고취시키는 거부할 수 없는 카리스마를 지녀, 병사들에게 영웅으로 숭배됩니다."
 leader_trait_butcher_est_2:0 "도살자"
 leader_trait_butcher_est_2_desc:0 "이 지도자는 적에게 사상자를 안겨주는데 특히 능숙하며, 자비를 주지않고 대가 따위도 바라지 않습니다."
 leader_trait_glory_seeker_est_2:0 "영광을 찾는 자"
 leader_trait_glory_seeker_est_2_desc:0 "이 지도자는 항상 전투의 가장 격렬할 때, 위험이 가까이 있을지라도 적극적으로 앞장서서 군대의 사기를 고무시킵니다."
 leader_trait_army_logistician_est_2:0 "지상군 군수전문가"
 leader_trait_army_logistician_est_2_desc:0 "이 지도자는 언제나 보급에 신경을 쓰며, 지상군의 유지 비용을 줄입니다."
 leader_trait_restrained_3_est:0 "즉각적인 자제"
 leader_trait_restrained_3_est_desc:0 "이 지도자는 다른 이들의 생명에 대해 유난히 걱정하며, 자신의 군인들뿐만 아니라 전투에 휘말린 민간인들의 불필요한 죽음을 피하기 위해 주의합니다."
 leader_trait_charismatic_3_est:0 "매우 카리스마 있는"
 leader_trait_charismatic_3_est_desc:0 "이 영감을 주는 지도자는 부대에 의해 영웅으로 숭배받는 부인할 수 없는 카리스마를 지니고 있습니다."
 leader_trait_butcher_2_est:0 "야만적인 정육점 주인"
 leader_trait_butcher_2_est_desc:0 "이 지도자는 적에게 피해를 주는 데 특히 능숙하며, 일체의 자비를 베풀지 않고 그에 대한 자비도 기대하지 않습니다."
 leader_trait_glory_seeker_3_est:0 "영광의 숭배자"
 leader_trait_glory_seeker_3_est_desc:0 "이 지도자는 항상 전투의 한가운데에 있으며, 위험이 따르더라도 최전선에서 이끌어 군대의 사기를 높입니다."
 leader_trait_army_logistician_3_est:0 "베테랑 군대 물류 전문가"
 leader_trait_army_logistician_3_est_desc:0 "이 지도자는 마치 어디서든 보급품을 conjure 할 수 있는 듯하여 지상군의 유지비용을 감소시킵니다."
 leader_trait_iron_fist_est_2:0 "철권"
 leader_trait_iron_fist_est_2_desc:0 "이 지도자는 인정사정 없는 효율성의 추구로 악명이 높으며, 노예의 노동력을 최대한 활용할 수 있는 능력이 있습니다."
 leader_trait_army_veteran_est_2:0 "지상군 베테랑"
 leader_trait_army_veteran_est_2_desc:0 "이 지도자는 군대의 구조적 비효율성을 상세히 경험한 베테랑입니다."
 leader_trait_retired_fleet_officer_est_2:0 "은퇴한 함대 장교"
 leader_trait_retired_fleet_officer_est_2_desc:0 "이 지도자는 예전에 함대 장교였습니다. 개인적으로 강력한 행성 간 주둔군 추진에 힘쓰고 있습니다."
 leader_trait_architectural_interest_est_2:0 "건축학에 관심"
 leader_trait_architectural_interest_est_2_desc:0 "이 지도자는 건축과 건설 기술들에 강한 관심을 구축했습니다."
 leader_trait_agrarian_upbringing_est_2:0 "농업 육성"
 leader_trait_agrarian_upbringing_est_2_desc:0 "이 지도자는 시골 농업 구역에서 자라났으며, 농업 생산량을 향상시킬 수 있는 방법에 대한 여러가지 아이디어를 가졌습니다."
 leader_trait_intellectual_est_2:0 "지능적"
 leader_trait_intellectual_est_2_desc:0 "이 지도자는 자연스럽게 과학을 향하는 경향이 있으며, 연구 대상인 자연에 관한 호기심을 길러왔습니다."
 leader_trait_environmental_engineer_est_2:0 "환경 공학자"
 leader_trait_environmental_engineer_est_2_desc:0 "이 지도자는 조경 경력이 있으며 더 큰 프로젝트로 관심을 돌렸습니다."
 leader_trait_righteous_est_2:0 "정당한"
 leader_trait_righteous_est_2_desc:0 "이 지도자는 부패하지 않았으며, 무엇이 옳고 그른지에 대한 확고한 신념이 있습니다."
 leader_trait_iron_fist_3_est:0 "철의 손아귀"
 leader_trait_iron_fist_3_est_desc:0 "이 지도자는 비효율성을 용납하지 않는 잔인한 추구로 악명 높으며, 노예 노동에서 최대의 성과를 이끌어낼 수 있습니다."
 leader_trait_army_veteran_2_est:0 "군사 전설"
 leader_trait_army_veteran_2_est_desc:0 "이 지도자는 군대의 베테랑으로, 그 구조적 비효율성에 대한 깊은 경험을 가지고 있습니다."
 leader_trait_retired_fleet_officer_2_est:0 "존경받는 함대 장교"
 leader_trait_retired_fleet_officer_2_est_desc:0 "이 리더는 전직 함대 장교로, 강인한 행성 간 존재감을 증진하는 데 개인적으로 헌신하고 있습니다."
 leader_trait_architectural_interest_3_est:0 "건축 촉진"
 leader_trait_architectural_interest_3_est_desc:0 "이 지도자는 건축과 건설 기술에 강인한 관심을 기릅니다."
 leader_trait_agrarian_upbringing_3_est:0 "농경 생활 방식"
 leader_trait_agrarian_upbringing_3_est_desc:0 "이 지도자는 수경 재배 농장에서 자랐으며, 농경 수확량을 개선할 수 있는 여러 가지 아이디어를 가지고 있습니다."
 leader_trait_intellectual_2_est:0 "계몽 지식인"
 leader_trait_intellectual_2_est_desc:0 "이 지도자는 자연스럽게 과학에 대한 성향을 가지고 있으며, 자신의 국민들에게 자연 세계에 대한 호기심을 키우고자 합니다."
 leader_trait_environmental_engineer_2_est:0 "야망 있는 공학자"
 leader_trait_environmental_engineer_2_est_desc:0 "이 지도자는 조경 분야에서 경력을 쌓았으며, 결국 더 큰 프로젝트로 관심을 돌렸습니다."
 leader_trait_righteous_3_est:0 "깊은 정의감"
 leader_trait_righteous_3_est_desc:0 "이 지도자는 부패하지 않으며, 옳고 그름에 대한 강인한 신념을 가지고 있습니다."
 leader_trait_meticulous_est_2:0 "세심한"
 leader_trait_meticulous_est_2_desc:0 "이 지도자는 알려지지 않은 현상의 검사에 있어서 철저합니다."
 leader_trait_spark_of_genius_est_2:0 "천재의 번뜩임"
 leader_trait_spark_of_genius_est_2_desc:0 "이 지도자는 갑자기 영감이 떠오르기 쉽습니다."
 leader_trait_carefree_est_2:0 "무사태평"
 leader_trait_carefree_est_2_desc:0 "이 지도자는 다른 이들보다 덜 세심합니다."
 leader_trait_roamer_est_2:0 "방랑자"
 leader_trait_roamer_est_2_desc:0 "이 지도자는 별들을 배회할 운명을 타고 났습니다."
 leader_trait_archaeologist_est_2:0 "고고학자"
 leader_trait_archaeologist_tooltip_est_2:0 "고고학 발굴 속도: §G+25.0%§!\n선구자 이상 연구 속도: §G+100%§!"
 leader_trait_archaeologist_est_2_desc:0 "이 지도자는 현장에 있는 외계 유물과 구조물 잔해 연구에 뛰어납니다."
 leader_trait_archaeologist_ancrel_est_2:0 "$leader_trait_archaeologist$"
 leader_trait_archaeologist_ancrel_est_2_desc:0 "$leader_trait_archaeologist_desc$"
 leader_trait_maniacal_est_2:0 "연구광"
 leader_trait_maniacal_est_2_desc:0 "이 지도자는 연구에 남다른 열정을 갖고 있습니다."
 leader_trait_custom_AI_assistant_est_2:0 "인공지능 보조"
 leader_trait_custom_AI_assistant_est_2_desc:0 "이 지도자는 데이터 처리작업에 도움이 되는 간단한 신경망을 구축해 냈습니다."
 leader_trait_sentient_AI_assistant_est_2:0 "지능형 인공지능 보조"
 leader_trait_sentient_AI_assistant_est_2_desc:0 "이 지도자는 독립적으로 의사결정과 성찰까지 가능한 복잡한 신경망을 구축했습니다."
 leader_trait_expertise_materials_est_2:0 "재료 전문가"
 leader_trait_expertise_materials_est_2_desc:0 "이 지도자는 수년간의 연구 끝에, 재료 분야의 전문가로 인정받았습니다."
 leader_trait_expertise_rocketry_est_2:0 "추진 전문가"
 leader_trait_expertise_rocketry_est_2_desc:0 "이 지도자는 수년간의 연구 끝에, 추진 분야의 전문가로 인정받았습니다."
 leader_trait_expertise_voidcraft_est_2:0 "외우주 전문가"
 leader_trait_expertise_voidcraft_est_2_desc:0 "이 지도자는 수년간의 연구 끝에, 외우주 분야의 전문가로 인정받았습니다."
 leader_trait_expertise_industry_est_2:0 "산업 전문가"
 leader_trait_expertise_industry_est_2_desc:0 "이 지도자는 수년간의 연구 끝에, 산업 분야의 전문가로 인정받았습니다."
 leader_trait_expertise_field_manipulation_est_2:0 "역장 조작 전문가"
 leader_trait_expertise_field_manipulation_est_2_desc:0 "이 지도자는 수년간의 연구 끝에, 역장 조작 분야의 전문가로 인정받았습니다."
 leader_trait_expertise_particles_est_2:0 "입자 전문가"
 leader_trait_expertise_particles_est_2_desc:0 "이 지도자는 수년간의 연구 끝에, 입자 분야의 전문가로 인정받았습니다."
 leader_trait_expertise_psionics_est_2:0 "사이오닉 전문가"
 leader_trait_expertise_psionics_est_2_desc:0 "이 지도자는 수년간의 연구 끝에, 사이오닉 분야의 전문가로 인정받았습니다."
 leader_trait_expertise_computing_est_2:0 "컴퓨터 전문가"
 leader_trait_expertise_computing_est_2_desc:0 "이 지도자는 수년간의 연구 끝에, 컴퓨터 분야의 전문가로 인정받았습니다."
 leader_trait_expertise_new_worlds_est_2:0 "신세계 전문가"
 leader_trait_expertise_new_worlds_est_2_desc:0 "이 지도자는 수년간의 연구 끝에, 신세계 분야의 전문가로 인정받았습니다."
 leader_trait_expertise_statecraft_est_2:0 "국가운영 전문가"
 leader_trait_expertise_statecraft_est_2_desc:0 "이 지도자는 수년간의 연구 끝에, 국가운영 분야의 전문가로 인정받았습니다."
 leader_trait_expertise_biology_est_2:0 "생물학 전문가"
 leader_trait_expertise_biology_est_2_desc:0 "이 지도자는 수년간의 연구 끝에, 생물학 분야의 전문가로 인정받았습니다."
 leader_trait_expertise_military_theory_est_2:0 "군사이론 전문가"
 leader_trait_expertise_military_theory_est_2_desc:0 "이 지도자는 수년간의 연구 끝에, 군사이론 분야의 전문가로 인정받았습니다."
 leader_trait_meticulous_3_est:0 "철저한 세심함"
 leader_trait_meticulous_3_est_desc:0 "이 지도자는 미지의 현상에 대한 조사에서 매우 철저합니다."
