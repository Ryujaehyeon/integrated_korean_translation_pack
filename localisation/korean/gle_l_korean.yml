 gle.7.title:0 "능력 사용 가능"
 gle.7.desc:0 "§H[event_target:gle_leader.GetName]§!는 [event_target:gle_leader.GetIsAre] §H[event_target:gle_sector.GetName]§! 구역을 관리하며, [event_target:gle_leader.GetHasHave] 충분한 경험을 쌓았고 [event_target:gle_leader.GetHerHis] 능력 중 하나를 마스터할 준비가 되어 있습니다."
 gle.7.a:0 "접근하십시오."
 gle.7.b:0 "나중에."
 gle.250.window_title:0 "§E능력 선택§!"
 gle.250.title:0 "§H[event_target:gle_leader.GetName]§!는 [event_target:gle_leader.GetHerHis] 능력을 잠금 해제할 수 있습니다. 아래에서 하나를 선택하세요."
 gle.250.desc:0 ""
 gle_gray_direction_name:0 "회색 접촉"
 gle_randomize_direction_name:0 "§Y50§! £influence£ 무작위 방향"
 gle_reset_abilities_name:0 "§Y75§! £influence£ 능력 초기화"
 gle_have_a_ability_first_tooltip:0 "§R£trigger_no£ 우리는 최소한 하나의 능력을 먼저 잠금 해제해야만 그렇게 선택할 수 있습니다.§!"
 gle_contact_gray_only:0 "§G연락처 §Y회색§! 방향은 §Y연락처§! 메뉴에서 제안하며, 그들은 이를 기억하여 통치할 때 사용할 것입니다.§!"
 gle_cannot_change_gray_ability:0 "§R£trigger_no£ 그레이의 능력을 변경할 수 없습니다.§!"
 gle.260.title:0 "무작위 방향"
 gle.260.desc:0 "우리가 §H[event_target:gle_leader.GetName]§!'s 방향을 무작위로 설정할 것인지 확실합니까?\n\n그렇게 하려면 §Y50§! £influence£ §H$influence$§!의 비용이 듭니다."
 gle.270.title:0 "능력 초기화"
 gle.270.desc:0 "모든 [event_target:gle_leader.GetHerHis] 능력을 §H[event_target:gle_leader.GetName]§! 초기화하시겠습니까?\n\n이를 수행하는 데는 §Y75§! £influence£ §H$influence$§!가 필요하며, [event_target:gle_leader.GetSheHe]는 §Y5§!년의 §R경험 패널티§!를 받게 됩니다."
 gle_trait_temp_reduced:0 "통치 패널티"
 gle_trait_temp_reduced_desc:0 "최근 능력 변화로 인해 이 $official$ 새로운 기술에 적응하는 데 시간이 필요합니다."
 gle.1000.enter:0 "네 직업에 대해 이야기해 보자, §H[event_target:gray_governor.GetName]§!."
 gle.1000.tooltip2:0 "§H[event_target:gray_governor.GetName]§!에게 조언을 해주면, 더 많은 작업을 수행할 수 있을 것입니다."
 gle.1000.tooltip:0 "§H[event_target:gray_governor.GetName]§!는 이 결정을 기억할 것입니다."
 gle.1000.title:0 "토의"
 gle.1000.desc_first:0 "아, 맞아요! 그 얘기가 나왔으니...\n\n통치 업무가 매우 바빴고, 몇 가지 작업이 누락된 것을 인정합니다. 솔직히, 이런 일이 쌓이게 한 사람은 진지한 조사를 받아야 합니다! 예를 들어, 베타리안 돌 위에 수경 재배 농장을 짓는 허가를 누가 승인한 건가요? 이런 것들을 승인하는 사람은 대체 누구인가요?\n\n이 엉망진창을 보면서, 잠깐 제 자신을 여러 버전으로 만들어서 이 모든 일들을 처리할까 생각해봤습니다. 하지만 현실적으로 말하자면, 그건 혼란스러워질 거예요. 마치 클론 군대가 에너지 무기를 사방으로 쏘아대는 영화처럼요. 그리고 아니요, 그 길은 제가 가고 싶은 길이 아닙니다...\n\n어쨌든, 주제에서 벗어난 점 사과드립니다. 다시 궤도로 돌아갈 수 있도록 조언을 주시면 정말 감사하겠습니다. 명확한 지침이 있다면, 이 작업들을 처리하기 위해 최선을 다하겠습니다. 그럼, 어디서부터 시작해야 할까요, 보스?"
 gle.1000.desc1:0 "나는 혼자서도 순식간에 전체 도시를 건설할 수 있습니다!"
 gle.1000.desc2:0 "제가 할 수 있는 게 있나요?"
 gle.1000.desc3:0 "아, 그렇군요, 새로운 '약속', 외로운 황량한 행성에서 당신과 저, 두 손이 떨리며 아무 목적 없이 걷고 있습니다.\n\n농담은 제쳐두고, 이번에는 무슨 일인가요?"
 gle.1000.desc4:0 "내가 고철주이들에게 여러 번 찢겨지기 직전으로 돌아가서 내 일을 수월하게 바꿔주겠다고 언급했다면, 고맙지 않습니다.\n\n그 기억은 전혀 떠올리지 않을 것이며, 그 부검 보고서를 절대 즐기지 않을 것입니다."
 gle.1000.desc5:0 "제게 목표를 주십시오! 새로운 것들을 시도해보고 싶습니다!"
 gle.1000.desc6:0 "이번에는 무엇을 할까요?"
 gle.1000.desc7:0 "아마 이 은하의 일부 사람들은 나를 그들의 '아내'처럼 사랑하는지도 모릅니다. 맞습니다, 그들이 다른 종을 그들 중 하나, 즉 모두의 아내로 묘사하는 문화를 가진 종이라고 상상해 보세요.\n\n그리고 그들은 그것에 대해 본질적으로 자랑스러워할 것입니다. 이상하다고는 말하지 않겠습니다. 그저 제 머릿속에 떠오른 쓰레기 같은 생각일 뿐입니다."
 gle.1000.desc8:0 "당신이 선택받은 사회라고 들었습니다, 사장님! 그러니 당신은 인상적이고 무적이라는 뜻이죠?\n\n언젠가 당신과 제가 친선전으로 일대일 싸움을 할 수 있을까요? 단, 전투 장소는 사람들로부터 격리된 곳이어야 합니다."
 gle.1000.desc9:0 "이번에는 내 새로운 직업이 무엇일까?"
 gle.1000.desc10:0 "당신을 위해 무엇을 할 수 있을까요? 번식 의식 외에는요."
 gle.1000.desc11:0 "걱정하지 마세요, 만약 당신이 비밀리에 저에게 행성의 전체 인구를 한 번에 '처리'하길 원하신다면, 그들은 전혀 불편함을 느끼지 않을 것입니다!"
 gle.1000.desc12:0 "도시 계획에 대해 이야기하자면, 모든 도로의 교차로에 더 많은 통행료 부스를 설치할 수 있을 것 같습니다. 바다와 공중도 포함됩니다! 그렇게 하면 세금 수입이 하늘 높은 줄 모르고 치솟을 것입니다!\n\n이 사람들이 모든 도로 차선을 활용하기를 거부하기 때문이 아니라는 점을 말씀드리고 싶습니다."
 gle.1000.endtext:0 ""
