 gle.1000.response:0 "문제 없습니다, 보스! 제가 하죠!"
 gle.1000.1.response:0 "아, 고전적인 주 7일, 휴일 없는 풀타임 직업이군요... 왜 저를 원하시는지 잘 모르겠지만, 알겠습니다!"
 gle.1000.2.response:0 "연구를 위해 제 나나이트 일부를 드리고 싶습니다만, 너무 과하게 하지는 마세요!\n\n제 몸을 간지럽히는 것과 같아요."
 gle.1000.3.response:0 "하루에 사과 하나면 의사를 멀리할 수 있습니다... 그걸로 충분합니다!"
 gle.1000.4.response:0 "문제 없습니다, 모두를 위한 금광입니다!"
 gle.1000.5.response:0 "향신료는 흐르지 않으면 안 됩니다... 그래, 그걸로 충분합니다!"
 gle.1000.6.response:0 "농장, 맞죠? "§H특별한 돌§!" 위에 아무것도 짓지 않도록 최선을 다하겠습니다.\n\n무슨 뜻인지 아시죠."
 gle.1000.7.response:0 "저는 제 책무를 다하고 있습니다!"
 gle.1000.8.response:0 "저는 종교에 대해 잘 알지 못한다는 것을 인정합니다."
 gle.1000.9.response:0 "저는 아직 모든 물고기 관련 말장난을 배우고 있습니다. 그러니 웃지 말아 주세요."
 gle.1000.10.response:0 "어디서든 진주를 소환할 시간입니다."
 gle.1000.11.response:0 "그게 마피아가 하는 방식이죠... 아니, 제가 그렇게 할 수 있습니다."
