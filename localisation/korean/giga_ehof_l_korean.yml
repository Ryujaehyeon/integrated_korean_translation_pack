l_korean:
 ehof_anomaly.14.name:0 "파괴된 성계"
 ehof_anomaly.14.desc:0 "우리 함선이 §H[root.solar_system.GetName]§! 시스템에 도착하자마자, 시스템의 항성에서 유래한 것으로 보이는 초공간 전송을 받았습니다. 이 신호는 $ehof_the_compound_text$에 대한 은하 전역 방송과 암호학적으로 유사했습니다.\n\n하지만 이 시스템에서 발견한 것은 신호뿐만이 아닙니다. 모든 행성이 파괴되었거나 불타버렸으며, 가장 안쪽의 행성은 몇 개의 바위 조각과 뒤따르는 소행성대 외에는 아무것도 남지 않았습니다.\n\n이 파괴의 원인은 아직 알려지지 않았지만, 우리의 [Owner.GetScientistPlural]는 이 시스템의 항성에 기인한다고 의심하고 있습니다. 이 항성은 비정상적인 에너지 분포와 표면 및 층에서의 이상한 변화를 보이고 있습니다. 이러한 파괴는 초신성과 같은 거대한 에너지 폭발로만 발생할 수 있었지만, 항성이 여전히 존재하기 때문에 그것은 사실이 아닙니다.\n\n§H[root.solar_system.GetName]§!에서 무언가 끔찍한 일이 발생했으며, 그 항성이 메시지의 출처인 것으로 보이므로 이 신비를 조사하는 것이 매우 중요합니다."
 ehof_anomaly.14.a:0 "드디어! 이 악몽에서 깨어날수 있겠군요!"
 INVESTIGATE_WOUNDED_STAR:0 "파괴된 성계"
 INVESTIGATE_WOUNDED_STAR_DESC:0 "우리의 과학선이 §H[root.solar_system.GetName]§!를 조사하기 위해 출발했습니다.\n\n그 비밀은 마침내 $ehof_the_compound_text$에 대한 해결책을 제공할 수 있습니다. 그렇지 않더라도, 우리는 적어도 우리가 받은 메시지의 출처를 찾을 수 있을 것입니다."
 ehof_anomaly.10021.name:0 "상처 입은 별"
 ehof_anomaly.10021.desc:0 "우리의 조사에 따르면 §H[root.solar_system.GetName]§!는 표면에 거대한 이상 현상을 가지고 있습니다: 대략 330만 킬로미터의 표면 지름을 가진 원형의 움푹 들어간 부분이 별의 광구까지 내려가 있습니다. 이 움푹 들어간 부분은 적색 거성 자체의 크기의 약 1/32에 불과하지만, 여전히 정말 거대합니다.\n\n이 움푹 들어간 부분은 믿을 수 없을 만큼 에너지가 강한 충격체에 의해 남겨진 분화구로 이론화되고 있습니다. 무엇이 그것을 일으켰는지는 알 수 없지만, 우리의 [Owner.GetScientistPlural]는 현재 두 가지 상충하는 가설을 가지고 있습니다: 그것은 믿을 수 없을 만큼 거대했거나 믿을 수 없을 만큼 빨랐습니다.\n\n충격 자체는 시스템 전역에 거대한 양의 항성 플라즈마를 방출하여, 시스템 내 모든 행성을 미니어처 초신성과 같이 녹이고, 부수고, 가열했습니다.\n\n별 내부에서 작용하는 폭력적인 힘에도 불구하고, 충격체는 여전히 인식 가능할 수 있으며, 더 나아가 우리가 받은 메시지와 관련이 있을 수 있습니다.\n\n충격체의 흔적을 찾기 위해 별의 외부 및 내부 층에 대한 조사가 필요할 것입니다."
 ehof_anomaly.10021.a:0 "충격 원인을 찾기 위해 필요한 모든 조치를 취하세요!"
 INVESTIGATE_STELLAR_WOUND:0 "상처 입은 별"
 INVESTIGATE_STELLAR_WOUND_DESC:0 "우리 [Owner.GetScientistPlural]는 충격체에 대한 추가 정보를 얻기 위해 고강도 스캐너와 우리가 만들 수 있는 가장 강력한 열 차폐 장비를 갖춘 여러 함선을 준비하고 있습니다.\n\n별의 표면과 내부는 유동적인 특성으로 인해 끊임없이 변화하므로, 충격체는 원래 충격 지점에서 멀리 떠나 있을 수 있습니다.\n\n따라서 §H[root.solar_system.GetName]§!의 전체 스캔이 필요할 것입니다."
 ehof_anomaly.10022.name:0 "휴면 중인 괴수"
 ehof_anomaly.10022.desc:0 "우리는 드디어 §H[root.solar_system.GetName]§!의 외부 층에 대한 조사를 마쳤으며, 그 결과는 정말 놀랍습니다.\n\n별과 충돌한 것은 큰 행성이나 상대론적 발사체가 아니었습니다. 충돌체는 수천 년 전 별과 충돌한 거대한 인공 구조물입니다. 우리가 아는 한, 그것은 여전히 온전하며, 아마도 메시지의 원천일지도 모릅니다!\n\n그 구조물의 크기는 우주선으로서는 상상할 수 없는 수준입니다: 가장 긴 부분이 거의 2300킬로미터에 달하며, 약 980경 톤의 행성 같은 질량을 가지고 있습니다. 충돌 모델에 따르면, 이 우주선은 §H[root.solar_system.GetName]§!에 충돌할 때 시속 5000킬로미터 이상의 속도로 이동하고 있었던 것으로 보입니다.\n\n이 놀라운 발견에 대한 응답으로, 우리의 [Owner.GetScientistPlural]는 이제 이 우주선에 대한 실질적인 탐사를 요청하고 있습니다. 이를 수행하는 것은 엄청난 노력이 필요할 것입니다. 왜냐하면 이 우주선은 별의 광구 아래 약 800만 킬로미터 깊이의 대류 영역에 위치해 있기 때문입니다. 이 우주선이 별의 심장부에서 충돌한 후에도 여전히 온전하고, 그 힘에 노출된 상태에서 우리는 그것이 메시지의 원천일 것이라고 추측하며, 그 비콘 너머에서도 여전히 기능할 수 있을 것이라고 생각합니다."
 ehof_anomaly.10022.a:0 "이 노력은 그만한 가치가 있을 것이에요."
 INVESTIGATE_DORMANT_LEVIATHAN:0 "휴면 중인 괴수"
 INVESTIGATE_DORMANT_LEVIATHAN_DESC:0 "거대한 구조물이 §H[root.solar_system.GetName]§! 깊숙이 가라앉아 있는 것을 조사하기 위해서는 방대한 양의 자원과 우리 제국의 고급 기술이 필요합니다.\n\n우리 제국 전역에서 [Owner.GetResearchers]와 [Owner.GetEngineerPlural]이 프로젝트에 필요한 장비를 설계하고 조립하기 위해 이 시스템으로 이동합니다."
 ehof_anomaly.10023.name:0 "괴수 연구"
 ehof_anomaly.10023.desc:0 "우리는 해냈습니다! 우리는 §H[root.solar_system.GetName]§! 내의 잠재된 구조물에 도달했으며, 그것이 우주선임을 확인할 수 있습니다.\n\n우리의 [Owner.GetScientistPlural]과 [Owner.GetEngineerPlural]는 거의 무한한 자원의 공급을 바탕으로 그들이 \"항성 반엘리베이터\"라고 부르는 것을 구축할 수 있었습니다. 이 구조물은 별의 광구를 안전하게 넘어, 대류 영역을 지나, 구조물까지 이어지는 거대한 케이블-터널 혼합체입니다. 구조물의 양 끝에는 중앙 터널 주위에 인공 중력장 생성기가 설치되어 있습니다: 먼 쪽 끝에서는 구조물을 우주에 고정하기 위해, 별 내부에서는 구조물을 안전하게 유지하고 별의 대류층의 흐름이 그것을 멀리 이동시키지 않도록 하기 위해서입니다.\n\n우리가 탐사선을 반엘리베이터를 통해 내려보낸 후, 우리는 그 배가 온전해 보이며, 심지어 타락한 제국의 기술을 훨씬 초월한 것임을 직접 확인했습니다.\n\n우리의 스캐너는 배의 선체를 관통할 수 없거나, 그 선체가 무엇으로 만들어졌는지조차 파악할 수 없습니다. 우리의 [Owner.GetScientistPlural]의 현재 추측은 표면 물자가 일종의 초고체라는 것입니다 - 고체와 유체의 특성을 단일 상태에서 가지는 물질입니다. 만약 배의 외부가 실제로 끊임없이 변화하는 준 초고체로 만들어졌다면, 그것이 충격과 별 내부에서 수천 년을 견딜 수 있었던 이유를 설명할 수 있을 것입니다.\n\n우리의 [Owner.GetScientistPlural]는 배 안으로 들어갈 방법을 찾으려 하고 있지만, 그렇게 하기 위한 승인을 기다리고 있습니다."
 ehof_anomaly.10023.a:0 "확인했습니다. 진입하세요!"
 ENTERING_LEVIATHAN:0 "괴수 내부 진입"
 ENTERING_LEVIATHAN_DESC:0 "우리 [Owner.GetScientistPlural]는 이제 잠재된 우주선에 들어갈 방법을 찾으려고 하고 있습니다.\n\n이 신비로운 거대 존재 안에 어떤 기술적 경이로움이 기다리고 있을지 아무도 모릅니다.\n\n희망적으로, 우리는 이것이 메시지의 출처임을 확인할 수 있을 것입니다. 그것은 심지어 $ehof_the_compound_text$ 자체에 맞서 싸울 방법을 포함하고 있을지도 모릅니다!"
 ehof_anomaly.10024.name:0 "각성"
 ehof_anomaly.10024.desc:0 "이런 일이 일어날줄이야! 배의 외부 선체를 통해 길을 내기 위해 도구를 사용하자마자, 선체가 변화하여 배 안으로 들여보내주는 거대한 복도를 반들었습니다. 복도는 굉장히 거대해서 한 번에 여러대의 차량도 들여보낼 수 있습니다.\n\n내부의 벽은 순백색으로 칠해져있고 알 수 없는 이유로 액체처럼 녹고 굳기를 반복하며 모습을 바꿉니다. 액체 벽의 구조는 동종이고 균일하며 그 구조에 어떠한 유형의 차이도 없습니다.\n\n또한, 복도는 완전히 비어있었습니다. 복도 그 자체를 제외하고는, 내부에서 어떠한 기술적 혹은 과학적 가치가 있는 것을 찾을 수 없었습니다.\n\n복도 또한 바뀌고 있었지만, 우리가 마지막 지점에 도착할 때까지 그 길이는 항상 일정했습니다.\n\n몇 분 뒤, 우리는 복도와 마찬가지로 같은 변화하는 액체로 만들어진 거대한 공동에 도착하였습니다.\n\n정말 셀 수 없이 많은 알 수 없는 존재들이 액체 벽에서 나타나 그 공동을 채우기 시작했습니다.\n\n다행히도 그것들이 우리를 공격하지는 않았습니다. 그것들은 벽의 액체와 같은 것으로 만들어진듯한 거대한 팔면체 모양의 존재로 합쳐졌습니다.\n\n우리에게 정신적으로 말을 걸기 시작했습니다. 어쩌면 사이오닉 정신감응같은 것으로 우리의 마음에 직접적으로 접근하고 있을지도 모릅니다. 그것은 스스로를 이 함선의 지배 의식이라 소개하며 우리가 해낸 일이 기쁘다고 말했습니다.\n\n그것은 우주의 운명이 경각에 달했다며 즉시 우리의 지도자를 만나게 해달라 요청했습니다."
 ehof_anomaly.10024.a:0 "모든 것에 대비하고, 접촉을 시도하세요!"
 REPAIR_ANNIHILATOR:0 "괴수 재활"
 REPAIR_ANNIHILATOR_DESC:0 "우리는 $ehof_the_stellar_annihilator$가 다시 활성화되어 별을 탈출할 수 있도록 동력 코어의 수리를 돕기로 했습니다.\n\n이는 엄청난 프로젝트가 될 것이며 어 거대한 계획을 실행시키기 위해선 국가 전체가 하나되어 모을 수 있는 자원을 전부 모아야 할 것입니다."
 annihilator_dialog.006.desc:0 "모든 수리 완료, $ehof_shroud_ftl$ 가동중, 목적지 §H[root.Capital.GetName]§!\n\n저는 현재로썬 여러분들을 방어해 줄 것입니다. 하지만 $ehof_preservation_sphere$의 파괴가 우리의 최우선사항이어야 합니다.\n\n§G($ehof_the_stellar_annihilators$ 순서를 바꾸려면 아래의 UI를 이용하세요)§!"
 annihilator_dialog.006.tooltip:0 "$ehof_the_stellar_annihilator$는 §H[annihilator_spawn_here.GetName] 별§!을 성공적으로 탈출했으며 §H[root.Capital.GetName]§!(으)로 이동하기 위해 $ehof_shroud_ftl$를 가동시키기 시작했습니다."
