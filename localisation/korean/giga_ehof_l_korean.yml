 ehof_reply_not_good:0 "좋지 않은데..."
 ehof_timetoresearch:0 "과학자들에게 $tech_negative_pressure$!에 대해 조사하라고 해라."
 ehof_megastructure.008.desc:0 "우리는 현재 우리가 사용하고 있는것보다 더 진보된 $ehof_ehof$을 탈취했습니다. 작전을 더 좋은 $ehof_ehof$로 이관하시겠습니까?\n\n그러지 않으실 경우, 우리는 당신이 우리의 $ehof_ehof$을 전략적 위치에 두었다고 생각하고 이관에 대해 더이상 물어보지 않겠습니다."
 ehof_megastructure.008.a:0 "아니"
 ehof_megastructure.008.b:0 "그래"
 ehof_megastructure.410.desc:0 "이유가 있으실거라 생각합니다만, 정말로 $ehof_ehof$ 해체를 100% 확신하십니까?\n\n§R이 작업은 되돌릴 수 없습니다!§!"
 ehof_megastructure.410.a:0 "100% 확신한다."
 ehof_megastructure.101_name:0 "$ehof_ehof$"
 ehof_megastructure.101_desc_0:0 "우리가 계획한 $ehof_ehof$의 건설 현장을 완공되었고 다음 단계의 준비가 되었습니다. 필요한 자원이 모이자마자 시설의 건설을 진행할 수 있습니다."
 ehof_megastructure.101_desc_1:0 "$ehof_ehofp1$가 완공되었습니다!\n\n이 초거대 구조물은 우리 사회의 가장 위대한 업적 중 하나입니다. 이를 통해 우리는 이제 우주의 구조를 구부리고 은하 어디로든 $ehof_wormhole_text$를 생성할 수 있게 되었습니다."
 ehof_megastructure.101_desc_2:0 "$ehof_ehofp2$가 완공되었습니다!\n\n이 메가구조물에 대한 추가 업그레이드를 통해 우리는 새로운 이동 능력과 $ehof_wormhole_text$ 안정화 과정에 대한 더 많은 지식을 확보했습니다."
 ehof_megastructure.101_desc_3:0 "$ehof_ehofp3$가 완공되었습니다!\n\n메가구조물에 대한 추가 업그레이드를 통해 $ehof_wormhole_text$ 안정화 과정의 효율성을 높이고 시설의 잠재적 목표를 확장하였습니다."
 ehof_megastructure.101_desc_4:0 "놀라운 성과입니다. 시설에 대한 마지막 추가는 $ehof_wormhole_text$ 여행에 대한 완전한 지배를 제공합니다!\n\n이제 $ehof_wormhole_text$ 안정화는 100% 효율적이며, 터널링할 수 있는 여행 목적지에 대한 제한이 없습니다."
 ehof_megastructure.101_desc_restored:0 "§H[ehof_recently_built_system.GetName]§!에 있는 $ehof_ehofp2$가 예전의 영광으로 복원되었습니다.\n\n이제 우리는 우주의 구조를 구부리고 은하 어디로든 $ehof_wormholes_text$를 생성할 수 있습니다."
 ehof_redo_prefix:0 "§G마지막으로 지정한 성계 유형에 연결 시도§!\n--------------------------------"
 ehof_redo_notready_tooltip:0 "$TRIGGER_FAIL$§R$ehof_ehof$이 준비되지 않았습니다§!\n\n"
 ehof_p1_desc:0 "§H$ehof_ehofp1$§!\n이 시설은 매우 제한된 수의 성계 유형으로 갈 수 있습니다. 신비로운 균열 조작기는 아직도 큰 수수께끼이며, 우리는 이것의 능력을 매우 제한적으로 사용할 수 있습니다. 이 시설의 결점을 알고있지만, 현재로서는 정확성과 능력을 개선할 기술을 가지고 있지 않으며, 신비로운 균열 조작기에 대한 이해도도 모자랍니다."
 ehof_p2_desc:0 "§H$ehof_ehofp2$§!\n그 전신에서 살짝 개선된 이 시설은 좀 더 다양한 항성 유형으로 갈 수 있습니다."
 ehof_p3_desc:0 "§H$ehof_ehofp3$§!\n완전히 갖추어져서 그 전신에 비해 비약적인 개선이 이루어진 이 시설은 어떤 항성 유형으로도 갈 수 있습니다."
 ehof_p4_desc:0 "§H$ehof_ehofp4$§!\n우리는 오메가가 그 정점이라고 확신했습니다. 우리가 틀렸습니다. 이 시설은 모든 항성 유형으로 갈 수 있을 뿐만 아니라, 우리는 이제 연결로를 무한히 열어놓을 수 있습니다. 게다가 우리는 우리가 여행하고자하는 정확한 항성을 선택할 수 있습니다."
 ehof_cohesive_desc:0 "$ehof_cohesive$ 시스템: $ehof_ehof$의 초기 테스트 중, 우리는 은하 초공간 네트워크 외부에 있는 별들을 발견했습니다. 이 별들은 아케인 리프트 조작기의 타겟팅 메커니즘을 통해서만 접근할 수 있습니다. 그러나 현재 돌아올 방법이 없으므로, 이러한 시스템에는 과학 및 건설 선박만 보내는 것이 현명할 것입니다."
 ehof_travel.001_01_desc:0 "$ehof_p1_desc$\n\n$ehof_cohesive_desc$\n\n$ehof_mega_phase.10041_response_2_p1$"
 ehof_travel.001_02_desc:0 "$ehof_p2_desc$\n\n$ehof_cohesive_desc$\n\n$ehof_mega_phase.10041_response_2_p2$"
 ehof_travel.001_03_desc:0 "$ehof_p3_desc$\n\n$ehof_cohesive_desc$\n\n$ehof_mega_phase.10041_response_2_p3$"
 ehof_travel.001_04_desc:0 "$ehof_p4_desc$\n\n$ehof_cohesive_desc$\n\n$ehof_mega_phase.10041_response_2_p4$"
 ehof_cause:0 "§H원리§!: 매 순간마다, 수많은 가상 입자-반입자 쌍이 우주의 모든 미세한 입자에서 양자 플럭투에이션으로 발생합니다. 이러한 플럭투에이션은 양자 거품으로 알려진 공간의 미시적 구조를 형성합니다. 이 양자 거품에서는 극히 짧은 시간 동안만 존재하는 가상 미세 블랙홀들이 나타날 수 있습니다. 이러한 블랙홀은 양자 터널링을 통해 실제 $ehof_wormholes_text$로 변할 수 있습니다. 비록 여전히 매우 짧은 시간만 지속되지만, 아케인 리프트 조작기에 의해 즉각적인 지점 간 우주 여행을 위해 안정화되고 팽창될 가능성이 있습니다."
 ehof_effect:0 "§H이론§!: 회전하는 블랙홀의 에르고스피어 내부에서 양자 변동의 가장 높은 밀도를 찾을 수 있습니다. 그곳은 이미 거대한 회전력과 중력에 의해 공간이 엄청나게 뒤틀려 있으며, 양자 거품이 매우 강하게 자극받아 발생하는 미세 블랙홀의 수가 평균 공간보다 몇 배나 더 많습니다. 따라서 잠재적인 $ehof_wormholes_text$의 수가 실용적인 용도로 충분히 높습니다."
 ehof_mega_phase.10041_response_2_p1:0 "$ehof_cause$\n\n$ehof_effect$\n\n§H응용§!: $ehof_ehofp1$은 압축된 전자기장을 이용하고 아케인 리프트 조작기를 통해 $ehof_wormholes_text$을 팽창시키고 안정화시킵니다.\n\n이 시설은 아직 매우 실험적인 단계에 있으며, 팽창 및 안정화 과정은 매우 신뢰할 수 없습니다. 따라서 $ehof_ehofp1$의 가능한 목표는 다음과 같습니다:\n - §ERandomized Destinations§!\n - $ehof_category_01$\n - $ehof_category_02$\n - $ehof_category_03$"
 ehof_mega_phase.10041_response_2_p2:0 "$ehof_cause$\n\n$ehof_effect$\n\n§H응용§!: $ehof_ehofp2$는 압축된 전자기장을 이용하고, 신비한 균열 조작기를 사용하며, 블랙홀의 사건 지평선에 음압을 적용하여 $ehof_wormholes_text$를 팽창시키고 안정화합니다.\n\n신비한 균열 조작기의 확률적 목표 루틴은 우리 승무원이 장치에 대한 접근을 더욱 확대함에 따라 확장되었습니다.\n\n$ehof_ehofp2$의 목표에는 다음이 포함됩니다:\n - §E무작위 목적지§!\n - $ehof_category_01$\n - $ehof_category_02$\n - $ehof_category_03$\n - $ehof_category_04$\n - $ehof_category_05$"
 ehof_mega_phase.10041_response_2_p3:0 "$ehof_cause$\n\n$ehof_effect$\n\n§H응용§!: $ehof_ehofp3$는 추상 물리학의 혁신과 $giga_sr_negative_mass$에 대한 실험을 활용합니다. 고급 하드라이트 구조물 프로젝터와 멸균 초중성미자 탐지기는 $ehof_wormholes_text$ 팽창 메커니즘의 정밀도와 효율성을 100%로 증가시킵니다. 하드라이트 구조물 프로젝터는 전자기장 프로젝터를 대체하며, 아케인 리프트 조작기를 지원합니다. 멸균 초중성미자 탐지기는 $ehof_ehofp3$가 터널링을 시작하기 전에 $ehof_wormhole_text$의 대상을 결정할 수 있게 하여, 우리가 원하는 목표에 맞춰 웜홀을 선택적으로 열어 어떤 종류의 천체로도 이동할 수 있게 합니다.\n\n$giga_sr_negative_mass$ 주입기가 메가구조물에 통합되어 열린 웜홀을 더욱 안정화합니다.\n\n$ehof_ehofp3$의 대상은 다음과 같습니다:\n - §ERandomized Destinations§!\n - $ehof_category_01$\n - $ehof_category_02$\n - $ehof_category_03$\n - $ehof_category_04$\n - $ehof_category_05$\n - $ehof_category_06$\n - $ehof_category_07$"
 ehof_mega_phase.10041_response_2_p4:0 "$ehof_cause$\n\n$ehof_effect$\n\n§H응용§!: $ehof_ehofp4$는 $ehof_the_sphere_named$에서 얻은 지식을 통해 완전히 복원된 신비한 균열 조작기를 활용합니다. 완전한 상태에서 이 유물은 우리가 시스템을 정밀하게 목표로 삼고 $ehof_wormholes_text$를 무기한 유지할 수 있게 해줍니다.\n\n$ehof_ehofp4$는 진정한 항성 간 여행의 정점입니다!"
 ehof_cooldown:0 "\n\n$ehof_ehof$이 §H£time£[root.ehof_cooldown_days] 일§! 동안 냉각 중입니다."
 ehof_mega_check_desc:0 "__ehof_mega_check_desc__ : 성공적으로 §H[ehof_megastructure_system.GetName]§!의 $ehof_ehof$에서 $ehof_wormhole_text$를 통과한 후, 우리 시스템의 기술자들이 우리의 함선이 [ehof_destination_system.GetName]에 성공적으로 도착했다고 보고했습니다.\n\n$ehof_cooldown$"
