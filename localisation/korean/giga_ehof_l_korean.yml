 ehof_trader_old_system:0 "[urmazin_system_01.GetName]"
 ehof_trader_realm:0 "모두가 꿈꿔온 왕국"
 ehof_galactic_market:0 "$galactic_market_station$"
 ehof_trader_gateway:0 "§S$ehof_trader$ 웜홀§!"
 ehof_trader_gateway_plural:0 "§S$ehof_trader$ 웜홀§!"
 ehof_trader_gateway_DESC:0 "웜홀 게이트는 자연적으로 형성된 것으로 보이지 않습니다. 이들은 중앙 허브를 중심으로 완벽한 원형 링을 이루며 모든 $ehof_trader$ 시스템을 연결하고 있습니다."
 ehof_mega_trader.008.desc:0 "이곳은 정전지대입니다. 무기를 탑재한 함선은 허용되지 않습니다.\n\n당신의 군용 함선은 즉시 퇴출될 것입니다."
 r_rare_system:0 "풍요로운 성계"
 r_rare_system_desc:0 "자원으로 가득 차 있다고 전해지는 항성계의 좌표입니다 (구매 시 주의). 우리는 $ehof_ehof$를 통해 그곳에 도달할 수 있습니다."
 ehof_mega_trader.002.name:0 "우르마진"
 ehof_mega_trader.002.desc:0 "§H[root.GetName]§!에서 $ehof_ehof$를 통과한 후 놀라운 보고서를 받았습니다. 도착한 $ehof_trader_new_system$ 시스템은 수많은 우주 정거장과 선박으로 가득 차 있습니다. 이 시스템은 대규모로 테라포밍과 우주 공학이 이루어진 것으로 보이며, 시스템 내의 거의 모든 행성이 거대한 도시로 덮여 있고, 행성 궤도는 자연적이지 않을 정도로 완벽합니다.\n\n§H[root.GetName]§!는 시스템 전역에서 전송을 받고 있습니다. 주민들이 우리의 언어를 이미 번역한 것처럼 보이며, 우리와 대화하고 싶어하는 것 같습니다."
 ehof_mega_trader.002.a:0 "인상적이군."
 ehof_mega_trader.003.desc:0 "반갑습니다, 저 너머의 §H[root.owner.GetSpeciesClassPlural]§!들이여. 저희의 화려한 유토피아이자 집인 $ehof_trader_new_system$ 성계에 잘 오셨습니다.\n\n저희는 $ehof_trader$이며 평화로운 의사를 가지고 있습니다. 저희에 대해 더 많은 이야기를 하지 않고 여러분을 먼저 소개해 달라는 것이 무례해 보일지는 모르겠지만, 상황이 급박합니다.\n\n혹시 극도로 희귀한 자원이지만 저희 문명에 필수적인 물질을 가지고 있느냐고 여쭤보아야겠습니다.\n\n$ehof_alt_qnm$를 가지고 계십니까?"
 ehof_mega_trader.003.a:0 "$ehof_alt_qnm$가 뭡니까?"
 ehof_mega_trader.004.desc:0 "$ehof_alt_qnm$은 다른 어떤 물질과도 비교할 수 없는 독특하고 상상할 수 없을 만큼 희귀한 물질입니다.\n\n이 물질은 음의 중력 전하, 음의 질량을 가지고 있으며, 시공간을 음의 방향으로 왜곡할 수 있습니다.\n\n이 독특한 특성이 바로 우리가 $ehof_trader_dt$를 안정화할 수 있게 해줍니다.\n\n만약 당신이 $ehof_alt_qnm$을 소유하고 있고 우리와 일부를 나눌 준비가 되어 있다면, 당신의 친절에 대한 보상이 있을 것입니다!"
 ehof_mega_trader.004.a:0 "이것은 §H부정 질량§!...과 비슷하게 들립니다!"
 ehof_mega_trader.005.desc:0 "당신은 $ehof_alt_qnm$에 대해 알고 있습니까?\n\n§H부정 질량§!을 여유롭게 가지고 계시다면, 우리는 $ehof_trader_dt$ 너머의 위대한 보물을 보상으로 드리겠습니다!\n\n우리는 $ehof_trader_d$가 우리에게 준 선물로 별들을 탐색하며 발견한 특별한 항성계로 가는 길도 보여드릴 수 있습니다.\n\n당신은 우리를 도와주시겠습니까, §H[root.owner.GetSpeciesClassPlural]§! 경계 너머에서?"
 ehof_mega_trader.005.a:0 "거래 성립이다"
 ehof_mega_trader.006.desc:0 "안녕하세요, §H[root.owner.GetSpeciesClassPlural]§! 경계 너머에서 오신 것을 환영합니다!\n\n원하시는 만큼 머무르셔도 좋지만, 저희는 재고를 보충할 시간이 필요합니다. 다른 상품을 제공할 수 있기까지 §Y5년§! £time£ 기다려 주셔야 합니다.\n\n거래하고 싶은 §H부정 질량§!이 있으신가요?"
 ehof_mega_trader.006.c:0 "$ehof_trader_new_system$ 성계에는 웜홀이 너무 많습니다..."
 ehof_mega_trader.006.c.response:0 "웜홀은 우리의 유일한 항성 간 여행 수단입니다. 우리는 당신이 만들 수 있는 것과 유사한 영구적이고 임시적인 연결을 생성할 수 있습니다. §H부정 질량§!의 사용을 통해 웜홀을 무한정 안정화할 수 있습니다. 우리는 웜홀을 열기 위해 보유한 §H부정 질량§!의 양이 매우 제한적이기 때문에 $ehof_trader_new_system$에서 다른 시스템으로만 웜홀을 엽니다.\n\n적어도, 우리가 당신을 발견하기 전까지는 그랬습니다.\n\n우리는 다른 시스템으로 여행하기 위해 임시 웜홀을 생성할 수 있지만, 그렇게 하면 더 많은 에너지가 소모되고 돌아올 방법이 없어집니다. 이는 $ehof_trader_new_system$와 우리가 전에 본 적 없는 규모의 유토피아를 건설하려는 꿈에 도움이 되지 않습니다. 이는 천 년 전, 대전쟁과 우리의 원래 고향 시스템인 $ehof_trader_old_system$ 내의 사건 이후에 설정한 목표입니다.\n\n하지만, 당신의 기술로 인해 이 시스템들은 당신에게 유익할 것이며, 당신은 그것들을 원하는 대로 자유롭게 사용할 수 있을 것입니다."
 ehof_mega_trader.006.d:0 "§H부정 질량§!에 대해 무엇을 알고 있습니까?"
 ehof_mega_trader.006.d.response:0 "우리가 §H부정 질량§!을 오래전에 발견했음에도 불구하고, 그 모든 비밀을 탐구하지는 못했습니다. 우리가 아는 것은 그것이 자연적으로 발생할 수 없거나, 적어도 발생할 가능성이 극히 낮다는 것입니다.\n\n그 특성은 여러 기본 물리 법칙을 위반하는 것으로 보입니다. 예를 들어, 응력-에너지 텐서의 응력 성분은 그것이 위치한 공간의 질량 밀도보다 더 크며, 이는 불가능해야 합니다.\n\n진정한 §H부정 질량§!은 우주의 확장을 이끄는 진공의 부정 에너지 밀도의 의사 부정 질량 특성과는 다릅니다.\n\n당신이 $ehof_trader_dt$에서 우리가 지금까지 모은 것보다 더 큰 양의 §H부정 질량§!을 가지고 있다는 것은, 그것이 당신이 스스로 생성하지 않고도 극히 드문 사건에서 생성되었거나, 믿을 수 없을 만큼 고급 존재들에 의해 생성되었음을 의미합니다.\n\n우리는 후자가 사실이라고 믿습니다."
 ehof_mega_trader.006.b:0 "우리는 너에 대해 더 알고싶다"
 ehof_mega_trader.007.desc:0 "여러분이 알고싶은게 뭐죠?"
 ehof_mega_trader.007.a:0 "너는 누구지?"
 ehof_mega_trader.007.a.response:0 "저희는 $ehof_trader$입니다. 기술-유기 생명체의 평등주의 사회이며, $ehof_trader_d$에 의해 사이오닉 능력을 타고났습니다.\n\n저희의 목표는 저희의 중앙 항성계인 $ehof_trader_new_system$ 성계를 보지못한 크기의 놀라운 유토피아로 만드는 것입니다.\n\n저희가 함께 성장하고 평화롭고 주의 깊게 진화하고면서 저희를 이끌어주고, 이 궁극적인 목표를 성취하게끔 도와주는, $ehof_trader_d$와의 조화 속에서 살고 있습니다."
 ehof_mega_trader.007.b:0 "너의 역사를 말해보겠나?"
 ehof_mega_trader.007.b.response:0 "우리의 중앙 허브인 $ehof_trader_new_system$는 우리의 원래 고향 시스템인 $ehof_trader_old_system$와 연결되어 있습니다.\n\n전체 시스템이 황폐화된 것을 보셨을 것입니다. 그것들은 우리의 유기체 선조들의 함대, 서식지 및 구조물의 잔해입니다.\n\n수천 년 전, 그들이 아직 행성에 묶여 있었을 때, $ehof_trader_dt$는 이미 $ehof_trader_old_system$ 시스템에 존재하고 있었습니다. 그것이 얼마나 오랫동안 거기에 있었는지는 알 수 없지만, 우리의 기록된 역사 전반에 걸쳐 그것에 대한 언급이 존재합니다.\n\n그들이 처음 $ehof_trader_d$의 증거를 보았을 때, 우리의 선조들은 그것에 도달하는 데 집중했습니다. 그들이 고향 세계를 떠나는 데 수세기가 걸렸지만, 그들의 초점은 결코 흔들리지 않았습니다. $ehof_trader_dt$에 도달하는 것이 그들의 주요 목표였습니다. $ehof_trader_t$는 어떤 종류의 행성처럼 보였지만, 실제로는 차원 외의 영역인 $ehof_trader_realm$으로 가는 게이트, 포탈이었습니다.\n\n그들이 처음으로 $ehof_trader_realm$에 물리적으로 들어갔을 때, 우리의 선조들은 $ehof_trader_d$와 접촉하게 되었습니다. 그것은 친절하고 사려 깊었으며, 그들이 처한 차원 간 현실에 대해 가르쳐 주었습니다.\n\n그들은 $ehof_trader_d$와 조화롭게 살았고, 그것에 의해 더 높은 사회와 존재의 상태로 안내받았습니다.\n\n이러한 깨달음으로 그들의 문명은 곧 찬란한 항성 제국으로 발전했습니다. $ehof_trader_old_system$ 시스템의 모든 세계가 식민지화되었고, 제국은 $ehof_trader_dt$를 중심으로 형성되었습니다.\n\n불행히도, 이 멋진 시대는 지속될 수 없었습니다. $ehof_trader_old_system$는 완전히 착취되었고 자원이 고갈되었으며, 더 이상 확장할 공간이 없었던 대제국은 멸망할 운명이었습니다.\n\n유일한 논리적 선택은 외행성 확장이었습니다. 불행히도, 그들은 빛보다 빠른 여행 기술을 개발하지 못했으며, 수많은 사람들을 거의 거주할 수 없는 이웃 시스템으로 세대 우주선에 보내는 것은 선택지가 아니었습니다.\n\n제국은 $ehof_trader_old_system$과 가장 가까운 이웃인 $ehof_trader_new_system$ 사이의 간극을 가로지를 기계 지능을 개발하기로 결정하여, 제국을 위해 그것을 테라포밍하기로 했습니다."
 ehof_mega_trader.007.continue:0 "계속"
 ehof_mega_trader.007.b.response.b:0 "수년이 흘렀고, 처음으로 테라포밍 기계들이 그들의 여정을 시작한 이후로 많은 시간이 지났습니다. 그들은 오래전에 $ehof_trader_new_system$을 테라포밍했습니다. 그러나 시간이 지나면서 기계들은 자아를 갖게 되었고, $ehof_trader_new_system$ 시스템을 사랑하게 되었으며 자신들을 그 정당한 수호자로 여기게 되었습니다.\n\n이로 인해 제국과 그들의 기계 사이에 틈이 생겼고, 이는 불가피하게 전면전으로 번지게 될 것입니다.\n\n두 제국이 마침내 전투를 벌였을 때, 그들은 서로 비슷한 실력을 가지고 있음을 발견했습니다. 전쟁이 계속된다면, 두 종족 모두 멸종에 이를 것이었습니다. 두 종족의 손실을 막기 위해 $ehof_trader_d$는 전쟁을 끝낼 뿐만 아니라 두 사이의 문제를 해결할 수 있는 해결책을 제안했습니다: 그것은 $ehof_trader_old_system$의 유기체와 $ehof_trader_new_system$의 기계를 새로운 존재로 통합하는 것이었습니다...\n\n... 우리입니다.\n\n우리의 사람들이 태어난 후, 우리는 $ehof_trader_new_system$에 완벽한 유토피아를 만드는 것을 목표로 삼았고, 그 이후로 상처받은 $ehof_trader_old_system$을 우리보다 앞선 이들의 어리석음을 기념하는 기념물로 남겨두었습니다."
 ehof_mega_trader.007.c:0 "$ehof_trader_d$와 $ehof_trader_t$가 뭐지?"
 ehof_mega_trader.007.c.response:0 "$ehof_trader_d$는 $ehof_trader_realm$에 거주하는 비물질 존재입니다. $ehof_trader_dt$가 언제 창조되었는지는 알 수 없지만, 분명히 우리의 유기체 전조자보다 이전에 존재했습니다.\n\n§H부정 질량§!은 $ehof_trader_dt$를 열어두게 하지만, 다른 시스템으로의 웜홀을 열고 유지할 수 있게 해주는 것도 바로 그것입니다. 불행히도, $ehof_trader_dt$ 내의 §H부정 질량§!의 양은 유한합니다. 언젠가 우리의 확장이 끝나거나 $ehof_trader_t$가 붕괴되어 $ehof_trader_d$와의 연결이 끊어질 것이며, 이는 우리의 사이오닉 능력과 $ehof_trader_d$의 안내를 잃게 만들 것입니다. 이 두 사건 모두 우리의 문명의 붕괴로 이어질 것이므로, 우리는 이 운명을 피하기 위해 당신의 §H부정 질량§!이 필요합니다."
 ehof_mega_trader.006.a:0 "§H교환§!"
 ehof_mega_trader.101.desc:0 "우리는 §H부정 질량§!과 교환할 수 있는 몇 가지 꿈의 유물을 가지고 있습니다. 이 유물들은 $ehof_trader_dt$에서 우리가 낚아낸 환상의 반영이므로 §R일회용§! 아이템임을 명심하십시오 - 그리고 우리는 매 §Y5년§! £time£마다 재고를 보충합니다.\n\n어떤 현실로 만들어진 반영을 교환하고 싶으신가요?"
