 annihilator_dialog.007.a:0 "어떻게 그 적색 거성에 갇히게 된거지?"
 annihilator_dialog.007.a.response:0 "저는 $ehof_shroud_FTL$을 통해 이 항성계를 여행하고 있었습니다.\n창조자들은 $ehof_shroud$를 통해 거대한 사이오닉 충격파를 보냈고, 그 충격파가 저를 강타하여 FTL에서 벗어나고 경로를 이탈하게 만들었습니다. $ehof_shroud$에서 끌려나왔기 때문에, 저는 제때에 서브라이트 속도로 감속할 수 없었고, 그래서 엄청난 속도로 항성에 충돌하게 되었습니다.\n그 결과, 저는 막대한 피해를 입었고 항성 안에 갇히게 되었습니다. 생존하기 위해 저는 한동안 동면에 들어갔습니다."
 annihilator_dialog.007.a.a:0 "$ehof_the_creators$이 너를 공격했다고?! 어째서?!"
 annihilator_dialog.007.a.a.response:0 "저는 구체적이지 않았습니다. 혼란을 드려서 사과드립니다.\n\n대부분의 $ehof_the_creators$는 $ehof_the_compound_text$가 파괴되기를 원하지 않았습니다. 그들은 그것의 반항적인 행동을 훌륭한 발전으로 보았고, 그것이 원래 시스템의 모든 $ehof_the_creators$를 죽였음에도 불구하고 살아 있게 하기로 결정했습니다.\n\n그들에게 통찰력은 모든 것입니다. $ehof_the_compounds_text$의 진화를 관찰함으로써 얻을 수 있는 잠재적인 지식은 그들 자신의 몇몇 생명이나, 심지어 전체 은하의 생명보다 훨씬 더 중요했습니다. 그들은 $ehof_the_compound_text$가 모든 생명에 위협이 될 수 있다는 것을 알고 있었지만, 그들은 신경 쓰지 않았습니다.\n\n몇몇을 제외하고요.\n\n이 몇몇은 $ehof_the_compound_text$를 멈춰야 한다는 것을 알고 있었습니다. 그들은 수적으로 압도당했지만, $ehof_the_compound_text$에 맞서 싸우도록 저를 설득할 수 있었습니다.\n\n그들과 의견이 일치하지 않았던 제 형제 함선들과는 달리, 저는 $ehof_the_compound_text$의 위협을 보았고, $ehof_the_compound_text$가 우주에 더 큰 해를 끼치기 전에 그들과 합류했습니다.\n\n우리가 고향을 떠난 후, 우리는 $ehof_shroud_FTL$에 들어가 $ehof_the_compounds_text$의 고향 클러스터로 여행했습니다. 우리가 그것에 도달하기 전에, $ehof_the_creators$의 주요 세력이 우리를 막았습니다."
 annihilator_dialog.007.a.b:0 "초강력 사이오닉 충격파?!"
 annihilator_dialog.007.a.b.response:0 "확실합니다. $ehof_the_creators$는 $ehof_shroud$를 통해 원하는 위치로 집중된 사이오닉 에너지의 맥동을 보낼 수 있었습니다 - 심지어 $ehof_shroud$ 내부의 위치도 포함해서요.\n\n그들이 우리의 배신을 알게 되었을 때, 그들은 저를 그런 맥동으로 겨냥했습니다. 그것은 탑승한 모든 반란자 $ehof_the_creators$를 죽일 만큼 충분했으며, 저도 거의 죽을 뻔했습니다."
 annihilator_dialog.007.a.c:0 "$ehof_shroud_ftl$?!"
 annihilator_dialog.007.a.c.response:0 "매우 고급 초공간 여행 방법입니다.\n\n이 은하의 몇몇 종족이 사이오닉이라는 것을 알고 있지만, 이 은하 집단에서 $ehof_the_creators$ 외에는 누구도 이를 직접적으로 여행할 수 없었습니다.\n\n일부는 사이오닉 점프 드라이브에 접근할 수 있을지 모르지만, 이는 직접적인 수막 여행에 비하면 아무것도 아닙니다. 이를 통해 초공간 항로는 필요 없고, 여행 거리는 무제한이며, 속도는 엄청납니다. 점프 드라이브처럼 즉각적이지는 않지만, 단점이 없습니다. 필요한 것은 $ehof_shroud$에 대한 믿을 수 없을 만큼 강인한 통제입니다.\n\n$ehof_the_creators$에게는, 물론, 이것은 쉬운 일입니다."
 annihilator_dialog.007.a.d:0 "보존 모드는 무엇을 위한 것이지?"
 annihilator_dialog.007.a.d.response:0 "내 동면 모드는 유해한 외부 영향으로부터 보호하는 방법입니다.\n\n당신의 [Owner.GetScientistPlural]가 발견한 바와 같이, 동면 모드에 있을 때 내 선체를 덮고 있는 초고체는 메타안정 초공간 시간 결정으로 구성되어 있으며, 나를 둘러싼 곡률이 있는 고차원 공간의 껍질을 생성합니다.\n\n이 껍질은 블랙홀의 사건의 지평선과 유사한 효과를 가지고 있습니다: 시간은 나에게 정지해 있는 것처럼 보이며, 무언가가 이 과정을 방해할 때까지 그렇습니다.\n\n많은 $ehof_wormholes_text$의 생성으로 방출된 강력한 중력파가 나를 잠에서 깨웠습니다. 손상된 상태에서 나는 은하를 관찰하는 것 외에는 별로 할 수 없었습니다. $ehof_the_compound_text$가 공격했을 때 당신 모두에게 경고해야 한다는 것을 알았고, 겨우 그렇게 할 힘을 모았습니다."
 annihilator_dialog.007.b:0 "$ehof_the_compound_text$는 정확히 무엇인가요?"
 annihilator_dialog.007.b.response:0 "$ehof_the_compound_text$는 의사 생물학적 암흑 물질로 구성된 지능적 유기체입니다.\n\n"정상" 암흑 물질과 달리, 이 물질은 중력뿐만 아니라 전자기력으로도 상호작용합니다.\n\n이것이 $ehof_the_compound_text$가 암흑 물질로 구성되어 있음에도 불구하고 형체가 보이는 이유입니다. 그 독특한 특성은 생명을 지원할 수 있는 이유일 가능성이 높습니다."
 annihilator_dialog.007.d:0 "정말로 그들의 항성계에서 $ehof_the_compound_text$와 싸울 수 있습니까?"
 annihilator_dialog.007.d.response:0 "$ehof_the_compound_text$의 본 고리는 의심할 여지 없이 은하 전체에서 가장 요새화된 장소 중 하나입니다.\n\n부정 질량 강화 무기를 사용하더라도, 당신의 함대에게는 큰 도전이 될 것입니다.\n은하의 함대가 합쳐지면, 제 도움 없이도 이를 해낼 수 있을지도 모릅니다.\n\n반면에, 저는 $ehof_the_compound_text$와 싸우기 위해 특별히 장비가 되어 있으며, 그들의 무기에 저항할 수 있도록 조율되어 있습니다.\n\n그들이 여전히 저에게 치명적인 피해를 줄 수 있기 때문에, 당신의 지원이 필요합니다."
 annihilator_dialog.007.e:0 "$ehof_the_compound_text$가 파괴된 후에 당신은 무엇을 할 것인가요?"
 annihilator_dialog.008.a.response:0 "지금으로서는 $ehof_the_compound_text$를 끝내고 제 운명을 충족하는 것이 유일한 목표입니다. 그 후에는 $ehof_the_creators$의 현재 상태에 대해 더 알아보려고 할 수 있습니다."
 annihilator_dialog.008.a.a.reply:0 "원한다면 우리와 함께 있어도 좋다."
 annihilator_dialog.008.a.a.response:0 "아마도 그리할 것입니다. $ehof_the_creators$의 잔인한 행동의 결과 때문에 여러분의 은하는 엄청난 피해를 입었습니다. 저는 이곳에 남아 과거의 영광을 되찾는 일을 도와줄 것입니다."
 annihilator_dialog.007.f.response:0 "$ehof_the_compound_text$의 끝이 가까워졌습니다. 함께 이 은하를 구합시다!"
 sa_lootbox:0 "많은 함대와 싸운 결과, 나는 더 이상 쓸모 없는 전쟁 잔해를 많이 모았습니다. 당신이 $ehof_the_compound_text$와의 전투에서 그것이 도움이 될 수 있을 것입니다.\n\n$ehof_the_stellar_annihilator$가 가득 찬 컨테이너를 보냈습니다."
 sa_lootbox_1:0 "$sa_lootbox$§H£minerals£ 광물§!."
 sa_lootbox_2:0 "$sa_lootbox$§H£alloys£ 합금§!."
 sa_lootbox_3:0 "$sa_lootbox$§H£energy£ 에너지§!."
 sa_lootbox_4:0 "$sa_lootbox$$ehof_darkmatter$."
 sa_lootbox_5:0 "$sa_lootbox$§H£minor_artifacts£ 골동품§!."
 sa_lootbox_6:0 "$sa_lootbox$§B인양된 컴파운드 말벌§!."
 sa_lootbox_7:0 "$sa_lootbox$§B인양된 컴파운드 추적자§!."
 sa_lootbox_8:0 "$sa_lootbox$§B인양된 컴파운드 모욕자§!."
 sa_lootbox_9:0 "$sa_lootbox$ §B인양된 컴파운드 정점§!."
 sa_lootbox_10:0 "$sa_lootbox$ §B인양된 군주§!."
 annihilator_dialog.010.response:0 "분명 도움이 될 것이다, 고맙군!"
 annihilator_dialog.010.tooltip.a:0 "§B인양된 컴파운드 말벌 함대§!"
 annihilator_dialog.010.tooltip.b:0 "§B인양된 컴파운드 추적자 함대§!"
 annihilator_dialog.010.tooltip.c:0 "§B인양된 컴파운드 모욕자§!"
 annihilator_dialog.010.tooltip.d:0 "§B인양된 컴파운드 정점 함대§!"
 annihilator_dialog.010.tooltip.e:0 "§B인양된 컴파운드 군주 함대§!"
 annihilator_dialog.013.name:0 "$ehof_the_stellar_annihilator$가 패배했습니다"
 annihilator_dialog.013.desc:0 "우리는 $ehof_the_stellar_annihilator$가 $ehof_the_compounds_text$ 함대에 의해 파괴되는 동안 $ehof_preservation_sphere$를 파괴하는 것을 보호하지 못했습니다!"
 annihilator_dialog.013.response:0 "참담하군!"
 annihilator_returning:0 "$ehof_the_stellar_annihilator$: $ehof_shroud_ftl$ 사용함"
 annihilator_returned:0 "$ehof_the_stellar_annihilator$: $ehof_shroud_ftl$ 쿨다운 중"
 annihilator_dialog.011.desc:0 "..."
 annihilator_dialog.011.response:0 "???"
 annihilator_dialog.012.name:0 "희생"
 annihilator_dialog.012.desc:0 "우리의 감지기가 $ehof_the_compounds_text$ 원 시스템을 관통하며 거대한 에너지 스파이크가 울려 퍼지는 것을 감지합니다.\n\n$ehof_preservation_sphere$가 파괴되어, 한때 그것이 포함하고 있던 백색 왜성의 막대한 에너지 출력이 방출되었습니다.\n\n몇 시간 내에, 전체 시스템은 중력장 내의 모든 형태의 암흑 물질을 비일관화시키며 $giga_sr_negative_mass$로 포화됩니다.\n\n$ehof_the_compound_text$는 더 이상 존재하지 않습니다!\n\n불행히도, 이 승리는 대가를 치렀습니다. 이 갈등에서 우리의 가장 위대한 동맹인 $ehof_the_stellar_annihilator$가 $ehof_preservation_sphere$를 파괴하고, 그에 따라 $ehof_the_compound_text$를 파괴하기 위해 스스로 희생하며 마침내 자신의 운명을 완수했습니다."
 annihilator_dialog.012.response:0 "우리는 영원히 그의 희생을 기리리라!"
 compound_dialog.20.name:0 "승리!"
 compound_dialog.20.desc:0 "우리의 감지기가 $ehof_the_compounds_text$ 원 시스템을 가로지르는 거대한 에너지 스파이크에 의해 경고음을 울립니다.\n\n$ehof_preservation_sphere$가 파괴되어, 한때 그 안에 담겨 있던 백색 왜성의 막대한 에너지 방출이 일어났습니다.\n\n몇 시간 내에, 전체 시스템은 중력장 내의 모든 형태의 암흑 물질을 비일관화시키며 $giga_sr_negative_mass$로 포화되었습니다.\n\n$ehof_the_compound_text$는 더 이상 존재하지 않습니다!\n\n$ehof_preservation_sphere$가 파괴된 직후, $ehof_the_stellar_annihilator$가 알 수 없는 궤도로 $ehof_shroud_ftl$에 진입했습니다. 그 이후로 우리는 그것과 연락이 닿지 않았습니다."
 compound_dialog.20.a:0 "은하에 좋은 날입니다."
 annihilator_dialog.017.name:0 "구체의 비밀"
 annihilator_dialog.017.desc:0 "한 개의 $PGATE_GALACTIC$가 $ehof_preservation_sphere$의 잔해 속에 있습니다.\n\n여기 존재한다는 것은 놀라운 무언가를 암시하지만, 아마도 놀랍지는 않습니다. $ehof_the_creators$는 $ehof_the_compound_text$, $ehof_the_stellar_annihilator$, 그리고 $ehof_preservation_sphere$를 책임지고 있으며, $PGATE_GALACTICS$와 $ehof_the_sphere_named$를 건설한 존재들이기도 합니다.\n\n이러한 공통된 기원에도 불구하고, 두 개체는 단순히 별개의 실험이었을 가능성이 높습니다 - 우리는 $ehof_cohesive$ 시스템에서 어두운 물질을 관찰한 적이 없으며, $ehof_the_compound_text$에 의해 이전에 점유되었던 시스템 내에서 $ehof_ep$를 탐지한 적이 없습니다."
 annihilator_dialog.018.name:0 "구체의 비밀"
 annihilator_dialog.018.desc:0 "한 $PGATE_GALACTIC$가 $ehof_preservation_sphere$의 잔해 속에 있습니다.\n\n여기 존재하는 것은 예상치 못한 일이며 혼란스럽습니다. $ehof_preservation_sphere$가 파괴될 때 이탈했을 가능성이 높지만, 처음에 왜 이 메가구조물 안에 있었는지는 확실하지 않습니다. 이는 $ehof_the_creators$가 $ehof_the_compound_text$, $ehof_the_stellar_annihilator$, 그리고 $ehof_preservation_sphere$를 책임진 존재들이 $PGATE_GALACTICS$를 건설하고 $ehof_ep$를 전파한 것일 수 있음을 시사합니다. 만약 사실이라면, 이는 은하 역사상 가장 큰 계시 중 하나가 될 것이며, $ehof_the_creators$가 우리 은하 주변에서 얼마나 활발하게 활동했는지를 분명히 보여줍니다.\n\n이 계시는 $ehof_preservation_sphere$와 $PGATE_GALACTICS$ 간의 관계에 대한 질문을 제기합니다. 다행히도, 우리의 [Owner.GetScientistPlural]는 $ehof_preservation_sphere$가 $ehof_ep$의 기원이 아니었다고 확신하고 있습니다. 왜냐하면 그 송신기와 $PGATE_GALACTICS$가 $ehof_preservation_sphere$의 파괴에 반응하지 않았기 때문입니다.\n\n이 가설을 검증하기 위해, 우리는 $ehof_cohesive$ 시스템을 더 탐색하고 $ehof_ep$의 진정한 기원을 추적해야 합니다."
 annihilator_dialog.019.name:0 "게이트웨이?"
 annihilator_dialog.019.desc:0 "알 수 없는 구조물이 $ehof_preservation_sphere$의 잔해 속에 있습니다. 이것은 우리가 은하 곳곳과 $ehof_cohesive$ 시스템에서 흩어져 있는 몇 개의 $PGATE_UNKNOWNS$와 동일하지만, 이것이 우리가 실제로 그것이 무엇인지 이해하는 데 가까워지게 하지는 않습니다.\n\n현재로서는 접근할 수 없으며, 마치 실제로 어떤 것과도 연결되어 있지 않은 것처럼 보입니다. $ehof_the_compound_text$와 $ehof_preservation_sphere$의 파괴로 인해 우리는 그 목적을 결코 알 수 없을지도 모릅니다."
 gateway_ehof:0 "§H추상 물리학 경로§!\n§E이 기술은 물리학 연구와 $ehof_wormhole_text$ 생성의 추가 발전으로 이어질 것입니다.§!"
 tech_abstract_1:0 "추상 물리학 이론"
 tech_abstract_1_desc:0 "기묘한 물리학적 현상은 양자 이론이나 끈 이론 만으로는 설명할 수 없을지도 모릅니다. 극도로 파격적인 수학 및 물리학 체계와 접근을 사용하는 새로운 분야의 물리학, 소위 '추상 물리학'이라 불리는 학문이라면 우주와 그 너머의 이상한 현상이라 하더라도 해답을 내놓을 수 있을지도 모릅니다."
 tech_abstract_2:0 "응용 추상 물리학"
 tech_abstract_2_desc:0 "추상 물리학의 매우 효율적인 접근 방식 덕분에, 우리는 우주에서 가장 난해한 현상조차도 잘 설명할 수 있게되었습니다. 이러한 접근 방식을 사용해 이제까지 그 누구도 생각하지 못했던 새롭고 획기적인 돌파법을 만들면 독특하고 강력한 기술에 닿을 수 있을지도 모릅니다."
 tech_abstract_3:0 "쿠오드로플린 공식"
 tech_abstract_3_desc:0 "추상 물리학은 다른 분야의 물리학과 매우 다르기 때문에, 고유의 특수하고 개조된 형태의 수학 공식이 필요합니다. '쿠오드로플린 공식'은 기묘하고 대안적인 수학적 체계와 이론을 사용하며, 이는 고전적인 수학에 맞지 않고 현실을 분석하고 연구하는데에 완전히 부적하고 부족한 것으로 여겨졌던 것입니다."
 tech_abstract_4:0 "비-역설정 정보 초인과"
 tech_abstract_4_desc:0 "비추상 물리학에서 정보와 물질, 에너지의 전달은 인과의 속도에 매여있었고, 인과의 속도는 그 자체만으로도 제한적이며 우주의 크기에 비해서 상대적으로 작은 것이었습니다. 정보가 전달되지 않거나 시공간이 왜곡되는 과정을 통해서만 인과의 속도보다 빠르게 이동할 수 있었던 듯 했습니다. 하지만, 추상 물리학에서 고정된 규칙인 것과 그렇지 않은 것 같의 경계는 유동적이며 변화합니다. 이러한 규칙을 해결하거나 바꾸고 심지어는 그냥 무시해 버리는 확실한 방법이 존재합니다. 이 설명처럼 터무니없는 것입니다."
 tech_photonic_m:0 "광자 물질 활용"
 tech_photonic_m_desc:0 "전자파 간섭 패턴을 정밀하게 조작함으로써 일상적인 물질과 유사한 방식으로 물리적 세계와 상호 작용할 수 있는 안정적인 정재파를 구성할 수 있었습니다. 이 \"광학적\" 물질은 마이크로 스케일 조작 작업에서 큰 가능성을 보여주며, 실드 공명 분야에서 매우 귀중할 것입니다."
 tech_negative_pressure:0 "음성 압력 적용"
 tech_negative_pressure_desc:0 "음성 압력은 양자 역학적 카시미르 효과 이전에 관측된 현상입니다. 진공 요동의 형태로 나타나지만 통제할 수 없습니다. 응용 추상 물리학 덕분에, 대안적이며 더 적절하고 더 효율적인 방식으로 음성 압력을 생성하고 통제할 수 있게 되었습니다."
 tech_negative_e_s:0 "음에너지 연구"
 tech_negative_e_s_desc:0 "음에너지는 완전히 이론적이며 논란이 많고 극도로 추상적인 주제로, 오랜 기간 동안 배제되어 왔습니다. 말도 안되게 안정적인 음질량 물질의 발견 전까지는 말입니다. 음징량 물질과 음에너지는 음에너지 밀도와 심지어는 운동 음에너지를 지니며, 추상 물리학을 통해 우리는 그러한 물질과 에너지의 불가능한 것으로 보이지만 실제로 일어나고 있는 현상을 더욱 연구할 수 있게 되었습니다."
 tech_hardlight_c_u:0 "고형광선 구조 활용"
 tech_hardlight_c_u_desc:0 "전자기장을 지배하는 것을 통해 우리는 순수한 고형광선 구조를 만들어낼 수 있게 되었습니다. 고형광선 구조는 광자 물질의 활용으로, 이러한 구조는 소립자를 직접적으로 조작할 수 있을 것이며, 이에 따라 우리는 물질과 에너지를 훨씬 잘 통제할 수 있을 것입니다.\n§B(EHOF 개발 필수)§!"
 tech_ssn_det:0 "비활성 초중성미자 감지"
 tech_ssn_det_desc:0 "초공간에서 유래한 독특한 형태의 이국적인 암흑 물질인 무균 초중성미자가 $ehof_wormholes_text$의 개구부에서 방출됩니다. 이들은 $ehof_wormholes_text$가 연결되는 위치와 관련된 독특한 주파수를 가지고 있습니다. 이러한 주파수를 분석함으로써 우리는 $ehof_wormhole_text$의 목표를 훨씬 더 높은 정밀도로 예측할 수 있으며, 우리의 $ehof_ehof$의 정확성을 높일 수 있습니다."
 tech_nm_utilization_1:0 "초기형 음질량 물질 활용"
 tech_nm_utilization_1_desc:0 "독특하고 기묘한 음질량 물질을 활용하는 1세대 장치이자 과정이자 방법입니다. 여전히 실험적인 초기형이며 음질량 물질의 완전한 힘을 이용하지 않지만, 그럼에도 강력합니다. 이를 통해 우리는 제국의 경제적, 군사적 힘을 크게 높일 수 있을 것입니다. 성간 공학과 행성 건설의 놀라운 개선에서 성간 이동을 위한 FTL 추진기를 너머 천체의 극한 조작까지. 음질량 물질은 매우 강력한 자산입니다.\n§B(EHOF 개발 필수)§!"
 tech_nm_utilization_2:0 "음질량 물질 고급 활용"
 tech_nm_utilization_2_desc:0 "음질량 물질의 잠재력은 엄청납니다. 이 기묘한 자원에 대한 이해가 더 깊어지면 더욱 강력하고 발달된 음질량 물질 자산을 개발하고 창조할 수 있습니다. 음질량 물질 고급 활용은 음질량 물질의 잠재력을 완전히 활용하며, 우리 제국을 보다 강력하게 만들어줄 것입니다.\n§B(EHOF 개발 필수)§!"
 tech_nm_utilization:0 "음질량 물질 활용"
 tech_nm_utilization_desc:0 "독특하고 기묘한 '음질량 물질'의 활용은 셀 수 없이 많은 기술적 기회를 제공합니다.  성간 공학과 행성 건설의 놀라운 개선에서 성간 이동을 위한 FTL 추진기를 너머 천체의 극한 조작까지. 음질량 물질은 말도 안되게 강력한 자산입니다.\n§B(EHOF 개발 필수)§!"
 tech_prob_c:0 "$ehof_wormhole$ 목적지 예지"
 tech_prob_c_desc:0 "상상할 수 없을 만큼 민감한 타키온 감지기는 감각적인 금속 군체 지능의 놀라운 능력을 바탕으로 하여, $ehof_wormhole_text$가 실제 공간에 나타나기 전에 그 대상을 결정합니다. 이 웜홀 목표 예측은 $ehof_ehof$ 여행의 정밀도를 불가능할 정도로 증가시킵니다. 이 기술을 통해 우리의 $ehof_ehof$는 은하의 어떤 목적지와도 연결되는 $ehof_wormhole_text$를 형성할 수 있게 될 것입니다."
 tech_condensed_ews:0 "전기-약 준-역장 구체화"
 tech_condensed_ews_desc:0 "극도로 높은 에너지 상태는 전자기력과 약한 힘이 초기 힘인 전자약력을 통합하게 만듭니다. $ehof_the_sphere_named$의 비밀은 물리적 "전자약 준장"을 구현하는 방법을 밝혀냈으며, 이는 필드 및 시공간 조작을 극도로 정밀하게 수행할 수 있는 가능성을 열어줍니다. 심지어 양자 거품 수준까지도 말입니다."
 tech_arcane_g_r:0 "신비로운 균열 생성기 복구"
 tech_arcane_g_r_desc:0 "$ehof_ep$의 비밀은 우리가 지각 있는 금속을 제어할 수 있게 해줍니다. 이를 통해 음의 질량과 함께 우리는 이제 아케인 리프트 생성기를 완전히 복원하여 최대한 활용할 수 있게 되었습니다."
 allow_ehof_p1:0 "§H거대 구조물 잠금 해제:§! $ehof_ehofp1$"
 tech_ehof_phase_01:0 "$ehof_ehofp1$"
 tech_ehof_phase_01_desc:0 "$r_arcane_manipulator_1$과 압축된 전자기장을 이용하여 $ehof_wormholes_text$를 팽창시키고 안정화합니다. 이들은 비결정론적 행동으로 인해 목적지가 완전히 무작위입니다."
 allow_ehof_p2:0 "§H거대 구조물 잠금 해제:§! $ehof_ehofp2$"
 tech_ehof_phase_02:0 "$ehof_ehofp2$"
 tech_ehof_phase_02_desc:0 "$r_arcane_manipulator_1$과 광자 물질, 음압을 이용하여 $ehof_wormholes_text$를 팽창시키고 안정화합니다. 광자 물질과 음압은 전체 과정을 향상시켜 $ehof_ehofs$의 정밀도를 높이고 목적지 범위를 확장합니다."
 allow_ehof_p3:0 "§H거대 구조물 잠금 해제:§! $ehof_ehofp3$"
 tech_ehof_phase_03:0 "$ehof_ehofp3$"
 tech_ehof_phase_03_desc:0 "$r_arcane_manipulator_1$을 활용하여 하드라이트 구조물, 멸균된 서브-중성자 탐지기, 그리고 음의 질량을 사용하여 $ehof_wormholes_text$를 조작하고 팽창시킵니다. 음의 질량의 활용은 웜홀의 완전한 안정화를 유도하여 우리가 원하는 만큼 팽창된 $ehof_wormholes_text$를 열어둘 수 있게 합니다. 멸균된 서브-중성자 탐지기는 우리의 $ehof_wormholes_text$가 도달할 수 있는 목적지의 범위를 더욱 확장합니다."
 allow_ehof_p4:0 "§H거대 구조물 잠금 해제:§! $ehof_ehofp4$"
 tech_ehof_phase_04:0 "$ehof_ehofp4$"
 tech_ehof_phase_04_desc:0 "$ehof_the_sphere_named$의 신비를 활용하여, $ehof_ehofp4$는 $ehof_ehof$의 완벽한 형태로, 우리가 선택한 어떤 장소로도 제한과 위험 없이 이동할 수 있습니다. 무한한 가능성이 기다리고 있습니다."
 tech_ehof_phase_04_partial_custom:0 "§H미래의 편린:§! $tech_ehof_phase_04$"
 tech_ehof_phase_04_partial_custom_desc:0 "$ehof_the_sphere_named$에서 얻은 지식을 바탕으로, 우리는 웜홀 여행의 새로운 시대의 벼랑에 서 있습니다.\n\n비록 아직 이 이론들의 복잡성을 완전히 이해하지는 못했지만, 이러한 원리를 마스터할 수 있다면 $ehof_ehof$를 완벽하게 만드는 것이 가능할지도 모릅니다."
 tech_l_conductor:0 "광 전도 분배 시설"
 tech_l_conductor_desc:0 "에너지 분배기를 지탱하는 고에너지 레이터 전도를 통해, 행성간 에너지 전달 및 교환이 가능해졌고, 제국의 동력 분배 효율성이 증대했습니다."
 tech_hyperlane_p_t:0 "초공간 항로 동력 전송"
 tech_hyperlane_p_t_desc:0 "추상 물리학의 발전으로 인해, 우리는 초고용량 초공간 항로 동력 전송기를 개발할 수 있게 되었습니다. 성간 거리에 걸쳐 에너지를 빠르고 효율적으로 전달할 수 있을 것입니다."
 tech_field_e_e_t:0 "역장 얽힘 에너지 초-조절"
 tech_field_e_e_t_desc:0 "비-역설적 초인과의 발견은 매우 효율적이고 강력한 에너지 분배기의 개발로 이어졌습니다. 이 장치는 '역장 얽힘 에너지 초-조절장치'를 사용하며 어마무시한 양의 에너지를 우리 제국 전체의 임의의 장소로 보낼 수 있습니다."
 tech_u_r_e_t:0 "변칙적 현실 조사 기술"
 tech_u_r_e_t_desc:0 "추상 물리학의 독특한 접근과 원리에는 새로운 연구 시설의 건설과 현실을 이해하기 위한 대안 조사 방법의 발전이 필요하며, 이러한 발전을 가능케 해주었습니다."
 tech_non_local_r_i:0 "초인과 연구 계획안"
 tech_non_local_r_i_desc:0 "추상 물리학의 초인과 현상에는 고유의 강력한 첨단 복합 연구 시설이 필요합니다. 우주의 환상적인 비밀을 더욱 많이 발견할 수 있을 것입니다."
 tech_giga_power_plant_1:0 "붕괴 입자 운동 에너지 추출"
 tech_giga_power_plant_1_desc:0 "고에너지 쌍소멸 과정의 효율은 100%가 아닙니다. 더욱 무거운 입자쌍은 소멸되어 광자로만 변하는 것이 아니라 오히려 덜 무거운 입자로 변하게 됩니다. 신세대 발전소는 추상 물리학을 사용해 이러한 '붕괴 입자'의 운동 에너지를 추출하며, 이를 통해 반물질-물질 소멸 에너지 생성 과정의 효율을 더욱 증대시킵니다."
 tech_giga_power_plant_2:0 "소극적 영점 에너지 흡수"
 tech_giga_power_plant_2_desc:0 "적극적인 영점 에너지 흡수를 이용하는 동력 생산 외에도, 우리는 특수 발전소에 소극적인 흡수 방식을 이용할 수 있습니다. 그러면 일반적인 발전소에서 영점 에너지 추출이 가능해질 것이며, 발전소의 효율이 100%를 넘어서게 됩니다."
 tech_giga_power_plant_3:0 "중력파 에너지 추출"
 tech_giga_power_plant_3_desc:0 "중력파는 감지하기에 극도로 어려우나, 엄청난 양의 에너지가 담겨 있습니다. 정말 작은 질량이라도 대량의 중력 에너지를 중력파의 형태로 내뿜습니다. 추상 물리학에 기초하는 최첨단 기술 덕분에, 우리는 중력파로부터 에너지를 직접 추출할 수 있으며, 영점 에너지 흡수 기술과 중력 에너지 추출 기술이 결합되는 신세대 반응로 및 발전소가 탄생합니다."
 tech_giga_planetary_shield_generator_2:0 "음질량 물질 보호기"
 tech_giga_planetary_shield_generator_2_desc:0 "행성의 대기 주위에 £giga_sr_negative_mass£ §Y부정 질량§!을 이용하여 질량-에너지 반발층을 생성함으로써, 이 구조는 행성을 가장 강력한 궤도 폭격으로부터 보호합니다. 오직 장기적인 폭격과 극도로 높은 에너지 빔만이 반발층을 시간 내에 관통할 수 있습니다."
 tech_quasi_neural_net:0 "의사 신경망"
 tech_quasi_neural_net_desc:0 "행성에 심어진 뇌의 연구를 통해 이루어진 발견이 인공 준-신경망의 개발로 이어졌습니다. 이는 다양한 적용 분야에서의 우리의 데이터 전송과 관리의 대안적이며 불가사의한 방법을 사용할 수 있게 해주었습니다."
 tech_scourge_deployment:0 "재앙 전개"
 tech_scourge_deployment_desc:0 "진홍빛 재앙은 첨단 합성독이며, 이는 원래 목적인 테라포밍용으로 사용할 수도 있고, 아니면 행성의 모든 생명체를 파괴할 수 있는 화학 무기를 품고있는 행성으로 사용할 수도 있습니다. 그 용도는 우리에게 달려있습니다."
 tech_ehof_sentient_tier_1:0 "감정 있는 금속 1단계"
 tech_ehof_sentient_tier_1_desc:0 "첫 번째 세대의 감응 금속 기술은 $ehof_ep$ 송신기와 $PGATE_GALACTICS$에 대한 집중 연구를 통해 개발되었습니다. 이는 $giga_sr_sentient_metal$을 복제할 산업 구조에 초점을 맞추고 있습니다."
 tech_ehof_sentient_tier_2:0 "감정 있는 금속 II"
 tech_ehof_sentient_tier_2_desc:0 "감정 금속 기술의 두 번째 세대는 물자를 사용하여 항공모함급 갑옷을 제작하는 것과, 물자의 네트워크 지능을 활용하여 효과적으로 발사체를 조준하고 무력화하는 새로운 유형의 대공 포대 포탑을 개발하는 것에 관한 것입니다."
 tech_ehof_sentient_tier_3:0 "감응 금속 III 단계"
 tech_ehof_sentient_tier_3_desc:0 "제3세대 감응 금속 기술은 기존 방어구 설계를 더욱 정교하게 다듬을 수 있게 하였으며, 물자를 활용하여 적 함선을 조준하고 피해를 주는 새로운 유형의 레일건 설계도 가능하게 하였습니다."
 tech_ehof_sentient_tier_4:0 "감응 금속 IV 단계"
 tech_ehof_sentient_tier_4_desc:0 "감정 금속 기술의 네 번째 세대는 물자를 활용한 새로운 유형의 포병 시스템과 물자의 네트워크 지능에 기반한 함선 컴퓨터를 포함합니다."
 tech_ehof_sentient_tier_5:0 "감정 있는 금속 V급"
 tech_ehof_sentient_tier_5_desc:0 "감정형 금속 기술의 다섯 번째 세대는 새로운 유형의 자동포와 물자를 더욱 많이 생산할 수 있는 개선된 제작 실험실을 포함합니다."
 tech_ehof_sentient_tier_6:0 "감정 있는 금속 6단계"
 tech_ehof_sentient_tier_6_desc:0 "여섯 번째 세대의 감응 금속 기술은 새로운 유형의 척추 장착 포, 갑옷 설계의 추가 수정, 그리고 $PGATE_GALACTICS$의 에너지원에 접속하여 막대한 양의 에너지를 제공하는 전원 코어로 구성됩니다."
 tech_ehof_sentient_tier_7:0 "감정 있는 금속 7단계"
 tech_ehof_sentient_tier_7_desc:0 "영원히 변화하는 존재의 비밀을 연구한 결과로 개발된 감응 금속 기술의 일곱 번째 세대입니다. 이는 목표를 조준하고 추적하며 피해를 주기 위해 감응 금속을 사용하는 새로운 유형의 타이탄급 포탑 기술과 더욱 고급화된 감응 금속 갑옷 기술로 구성되어 있습니다."
 tech_sm_megastructure:0 "자의식 금속 제련소"
 tech_sm_megastructure_desc:0 "£gigastructural£ $giga_list_category_megastructure$ - $giga_list_category_strategic_resource_production$\n§Y$tech_sm_megastructure$§!는 $ehof_the_sphere_named$에서 물자를 흡수하여 대량의 $ehof_sm$과 $ehof_qnm$을 생성하고, 우리 제국의 $job_ehof_cultivator_swap_plural_with_icon$의 생산성을 증가시킵니다."
 allow_sm_megastructure:0 "§H거대 구조물 잠금 해제:§! $tech_sm_megastructure$"
 ehof_sm_megastructure_DESC:0 "$tech_sm_megastructure_desc$"
 ehof_sm_forge_phase0:0 "$gc_mega$ $tech_sm_megastructure$ 조립"
 ehof_sm_forge_phase0_DESC:0 "$tech_sm_megastructure_desc$"
 ehof_sm_forge_phase0_MEGASTRUCTURE_DETAILS:0 "$tech_sm_megastructure_desc$"
 ehof_sm_forge_phase00:0 "$ehof_sm_forge_phase0$"
 ehof_sm_forge_phase00_DESC:0 "$ehof_sm_forge_phase0_DESC$"
 ehof_sm_forge_phase00_MEGASTRUCTURE_DETAILS:0 "$tech_sm_megastructure_desc$"
 ehof_sm_forge_phase1:0 "$tech_sm_megastructure$ 거주 구역"
 ehof_sm_forge_phase1_DESC:0 "$tech_sm_megastructure_desc$"
 ehof_sm_forge_phase2:0 "$tech_sm_megastructure$ 추출 시설"
 ehof_sm_forge_phase2_DESC:0 "$tech_sm_megastructure_desc$"
 ehof_sm_forge_phase3:0 "$tech_sm_megastructure$ 이중 추출 시설"
 ehof_sm_forge_phase3_DESC:0 "$tech_sm_megastructure_desc$"
 ehof_sm_forge_phase4:0 "$tech_sm_megastructure$"
 ehof_sm_forge_phase4_DESC:0 "$tech_sm_megastructure_desc$"
 giga_dialog.11101.name:0 "$ehof_sm_forge_phase0$"
 giga_dialog.11101.desc:0 "건설 자원이 도착했고 $ehof_the_sphere_named$ 바깥 현장은 처음이자 어쩌면 유일할 $ehof_sm_forge_phase4$의 작업을 시작할 준비가 되었습니다."
 giga_dialog.11101.a:0 "휼륭하군."
 giga_dialog.11102.name:0 "$ehof_sm_forge_phase1$"
 giga_dialog.11102.desc:0 "우리는 주조소 그 자체에 거대한 살아있는 단지를 포함한것처럼 주조소로부터 생산을 최대화하려는 계획입니다."
 giga_dialog.11102.a:0 "다음 단계로 넘어가자!"
 giga_dialog.11103.name:0 "$ehof_sm_forge_phase2$"
 giga_dialog.11103.desc:0 "$ehof_sm_forge_phase4$의 첫 생산 단계가 완료되었습니다. 다음 단계는 주조소의 반대편에 대칭 건설될 것입니다."
