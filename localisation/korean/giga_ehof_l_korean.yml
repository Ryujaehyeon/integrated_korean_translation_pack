 pc_wh_star:0 "화이트 홀"
 pc_wh_star_desc:0 "블랙홀의 대척점입니다. 화이트홀은 천문학적으로 다량의 에너지를 방출하며 모든 물질을 뿜어냅니다. 사건의 지평선을 지나는 것은 불가능합니다. 이 모든 에너지들이 어디서 나오는지 수수께끼입니다. 화이트홀은 우주의 미지의 차원의 진공 에너지를 통해 끊없는 에너지가 공급되는 것일 가능성이 있습니다. 아니면 전체 인플레이션 우주론의 원리에 의해 생성된 것일 수도 있습니다. 이에 대한 답은 아무도 모릅니다..."
