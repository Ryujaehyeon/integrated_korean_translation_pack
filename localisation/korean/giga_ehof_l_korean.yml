 INVESTIGATE_CORE_ANOMALY_DESC:0 "§H[from.GetName]§!에서 발견된 핵심 이상 현상에 대한 탐사 프로젝트가 승인되었습니다. 우리의 최고의 [Owner.GetScientistPlural]와 [Owner.GetEngineerPlural]가 핵심 이상 현상에 도달할 수 있는 기계를 개발하기 위해 작업하고 있으며, 이를 통해 그 비밀을 밝혀낼 수 있을 것입니다."
 ehof_anomaly.10001.name:0 "핵 탐사 시설"
 ehof_anomaly.10001.desc:0 "§H[fromfrom.GetName]§!의 중심 탐사가 성공적으로 이루어졌습니다. 우리의 탐사 팀은 §H[fromfrom.GetName]§! 내의 핵심 이상 현상이 사실상 알려지지 않은 고급 문명이 만든 거대한 버려진 연구 시설임을 발견했습니다.\n\n핵심 시설은 완전히 기능하는 것으로 보이지만, 알려지지 않은 사건에서 약간 손상되었습니다.\n\n우리의 탐사 결과에 따르면, 이 시설은 §H[fromfrom.GetName]§!의 중심에 있는 이국적인 조건을 연구하기 위해 건설되었습니다. 핵심 시설을 건설한 이들에게 무슨 일이 있었는지는 알 수 없습니다.\n\n사건으로 인한 피해 조사를 통해 시설의 초구조물은 손상되지 않았음을 확인했으며, 우리는 이곳에서 한때 수행되었던 연구를 안전하게 계속할 수 있습니다. 우리의 [Owner.GetScientistPlural]는 이 시설을 우리의 이익을 위해 사용하자고 요청하며, 이것이 우리의 연구에 매우 귀중할 것이라고 말합니다."
 ehof_anomaly.10001.a:0 "믿을 수 없군요. 시설의 복구를 준비하세요."
 ehof_anomaly.10001.b:0 "가장 쓸만한 기술을 해체하고, 시설을 내버려 두세요."
 EXPLORE_LARGE_STATION:0 "손상된 우주 정거장"
 EXPLORE_LARGE_STATION_DESC:0 "우리 정부는 §H[from.GetName]§! 궤도에 있는 손상된 우주 정거장을 탐사하기 위한 탐사 프로젝트를 승인하였으며, 우리의 [Owner.GetScientistPlural]는 이제 정거장을 조사하기 위한 무장 탐사 팀을 준비하고 있습니다."
 ehof_anomaly.10002.name:0 "버림받은 관저"
 ehof_anomaly.10002.desc:0 "대규모 우주 정거장을 탐사한 탐사팀은 §H[fromfrom.GetName]§! 궤도에서 그 초기 목적을 파악할 수 있었습니다.\n\n팀이 수집한 데이터에 따르면, 이 대규모 우주 정거장은 §H[fromfrom.GetName]§!의 이전 문명의 중앙 정부 자리로 사용되었습니다.\n\n§H[fromfrom.GetName]§!의 문명은 초국가 정부의 회원국 간의 긴장으로 인해 전 세계적인 갈등 직전에 있었으며, 이는 궁극적으로 열핵 전쟁으로 이어졌고, 물론 §H[fromfrom.GetName]§!를 황폐화시켰습니다. 이러한 긴장은 §H[fromfrom.GetName]§!에서 중요한 자원이 부족했기 때문에 발생했으며, 이전 주민들은 이를 \"Gonva\"라고 불렀던 것으로 보입니다.\n\n우리 [Owner.GetScientistPlural]는 정거장의 기록만으로는 이 자원을 식별할 수 없었지만, 그 기록은 이 자원이 그들의 사회의 거의 모든 수준에서 기능하는 데 필수적이라는 것을 나타냈습니다."
 ehof_anomaly.10002.a:0 "이런. 스스로의 욕심에 자멸한 사회라니요!"
 STUDY_NATURAL_NETWORK:0 "상호 연결 식물 속"
 STUDY_NATURAL_NETWORK_DESC:0 "우리 [Owner.GetScientistPlural]는 §H[from.GetName]§!의 숲으로 들어갈 준비를 하고 있으며, 행성 표면에 네트워크를 형성하고 있는 독특한 식물 속에 대해 더 많은 정보를 발견하기를 희망하고 있습니다."
 ehof_anomaly.10003.name:0 "행성-식물-두뇌"
 ehof_anomaly.10003.desc:0 "장기적인 연구를 통해 §H[fromfrom.GetName]§!의 상호 연결된 식물 속에 대한 놀라운 계시가 밝혀졌습니다.\n\n이 식물들은 사실상 지구 전체를 둘러싼 거대한 뇌처럼 행동하고 있습니다. 개별 식물들은 뉴런이나 시냅스처럼 기능하는 군체를 형성합니다. 이 "행성-식물-뇌"는 심지어 원시적인 형태의 의식을 가지고 있는 것처럼 보입니다!\n\n불행히도 뇌와의 의사소통 시도는 실패했습니다. 우리의 [Owner.GetScientistPlural]는 이 뇌가 생각과 같은 논리적 작업을 수행할 만큼 고급이지 않거나, 아예 의사소통이 불가능하다고 믿고 있습니다.\n\n뇌의 의식 여부와 관계없이, 그 기능은 우리에게 고급 네트워킹 메커니즘에 대한 통찰을 제공하였고, 이를 통해 우리 자신의 네트워크에 유익한 기술을 발전시킬 수 있습니다."
 ehof_anomaly.10003.a:0 "정말 흥미로운 발견이군요!"
 EXPLORE_ABANDONED_STATION:0 "소행성 기지"
 EXPLORE_ABANDONED_STATION_DESC:0 "버려진 것으로 보이는 소행성 기지를 탐사하기 위해 여러 무장 탐사팀이 파견되었습니다.\n\n기지의 초기 목적을 알아내고, 감지되지 않았을 수도 있는 생명의 흔적을 찾아야합니다."
 ehof_anomaly.10004.name:0 "수수께끼의 버림받은 식민지"
 ehof_anomaly.10004.desc:0 "연결된 소행성 기지에 대한 조사 결과, 아직 완전히 이해되지 않은 우려스러운 발견이 있었습니다.\n\n우리의 발견에 따르면, 이 기지는 원래 수백만 명의 거주자를 수용하고 지원할 수 있는 완전 자급자족 식민지였습니다.\n\n컴퓨터 시스템에서 발견된 기록에 따르면, 이 기지는 거대한 지각 재앙으로 행성이 파괴된 문명의 피난처 역할을 했습니다.\n\n우려스럽게도, 이 기지는 우리의 탐사 팀 외에는 생명체가 전혀 없는 완전한 공허 상태입니다. 생물학적 생명체는 하나도 발견되지 않았으며, 인공 대기 속의 미생물조차 없습니다. 이 식민지는 우리가 도착하기 전의 어떤 알려지지 않은 사건에 의해 완전히 생명체가 제거된 것으로 보입니다.\n\n식민지의 컴퓨터 코어에 대한 추가 검토 결과, 32년 121일 전의 17분 동안 기록된 기록이 돌이킬 수 없이 손상된 것으로 나타났습니다. 모든 생명이 기지에서 사라진 사건이 이 17분 동안 발생했을 가능성이 있습니다.\n\n우리 [Owner.GetScientistPlural]는 기지에서 회수 가능한 기술을 가져오고 떠나는 것이 더 바람직한지, 아니면 우리 민족을 위한 귀중한 식민지로 사용할 수 있는지에 대해 논의하고 있습니다."
 ehof_anomaly.10004.a:0 "두고가기엔 너무나 유용한 기지로군요."
 ehof_anomaly.10004.b:0 "저주받은 곳입니다. 빨리 떠나야 해요!"
 ehof_anomaly.16.name:0 "소멸"
 ehof_anomaly.16.desc:0 "이건 끔찍합니다! 우리는 갑자기 §H[fromfrom.GetName]§! 에서 우리의 개척민들이 갑작스럽고 이상하며 강렬한 정신적 붕괴를 겪고 있다는 보고를 받았습니다. 주민들이 이러한 붕괴를 겪기 시작한 비율은 증가하다가 보고가 갑자기 중단되었습니다.\n\n우리는 식민지에 조사 팀을 보냈지만, §H[fromfrom.GetName]§! 의 원주민들과 마찬가지로 우리의 개척민들이 알 수 없는 원인으로 사라졌다는 사실을 발견했습니다.\n\n역사에 따르면, 마지막 보고가 전송된 직후 17분 동안 같은 부패가 발생했습니다.\n\n§H[fromfrom.getName]§! 에서 이러한 비정상적인 사건의 원인은 여전히 미스터리로 남아 있습니다."
 ehof_anomaly.16.a:0 "이렇게 될 줄 알았어야 하는 건데. "
 STUDY_PLASMATIC_LIFE:0 "플라스마 생명체 연구"
 STUDY_PLASMATIC_LIFE_DESC:0 "플라스마 생명체에 대한 직접적인 연구가 승인되었습니다.\n\n표면 온도가 최대 485°C인 §H[from.GetName]§!의 치명적인 환경에 배치될 강화 및 보호 장치가 준비되었습니다."
 ehof_anomaly.10005.name:0 "비-유기체 플라스마 생명체"
 ehof_anomaly.10005.desc:0 "플라스마 생명체를 연구하고 그 생태계를 관찰한 결과 놀라운 성과를 거두었습니다! 이들의 의사 유전적 기초에 대한 분석은 이 생명체들이 진정으로 무기물이라는 사실을 밝혀냈습니다.\n\n무기 생명체의 발전 조건은 믿을 수 없을 만큼 복잡하고 희귀하여, 이전에 발견된 사례는 거의 없습니다.\n\n이들의 세포는 강렬한 고온 산화 메커니즘을 활용하며, 대사 과정을 운영하기 위해 '혈액' 역할을 하는 간단하지만 여전히 강력한 액체 금속을 사용합니다.\n\n이로 인해 이 극한 환경에서 생존하고 번성할 수 있는 능력을 갖추게 됩니다.\n\n단세포 및 다세포 유기체가 발견되었으며, 모두 무성 생식을 할 수 있습니다. 성적 생식 형태는 아직 발견되지 않았지만, 우리의 [Owner.GetScientistPlural]는 더 복잡한 유기체와 사회적 상호작용이 가능한 고급 유기체를 찾기 위해 두 번째 조사를 시작하고자 합니다."
 ehof_anomaly.10005.a:0 "놀라운 생물이군요. 연구를 확장하세요."
 ehof_anomaly.10005.b:0 "이 독특한 생태계는 내버려 두는 것이 좋겠어요."
 INVESTIGATE_INTELLIGENT_PLASMATICS:0 "고등 플라스마 유기체 탐색"
 INVESTIGATE_INTELLIGENT_PLASMATICS_DESC:0 "정부의 승인을 받아, 우리의 [Owner.GetResearchers]가 §H[from.GetName]§!의 플라스마 생태계를 지능적 플라스마 유기체를 찾아 탐색하는 강렬하고 야심찬 탐사를 시작했습니다."
 ehof_anomaly.10006.name:0 "플라스마 사회"
 ehof_anomaly.10006.desc:0 "§H[fromfrom.GetName]§!의 플라스마 생태계에 대한 우리의 탐사는 놀라운 돌파구를 마련했습니다!\n\n§H[fromfrom.GetName]§!의 남극 근처에서, 우리의 [Owner.GetResearchers]는 사회적 플라스마 존재를 발견했습니다. 이 생물들은 자신의 몸을 도구로 사용하여 간단한 구조물을 만들 수 있는 것으로 보이며, 서로 소통하고 작은 무리를 형성할 수 있는 능력을 가지고 있습니다. 이러한 무리는 개별 생물의 생존 가능성을 높입니다. 분석된 관찰 데이터를 바탕으로, 그들은 수렵 채집꾼 단계의 발전에 있습니다. 그들은 아직 고급 사회적 생물과는 거리가 멀지만, 그럼에도 불구하고 놀라운 발견입니다.\n\n계속된 관찰은 진화 생물학과 외계 생물학 연구에 매우 유용할 것입니다."
 ehof_anomaly.10006.a:0 "언젠가 이런 생물들을 더 많이 발견할 수 있을지도 모르겠군요!"
 ehof_red_toxic_digsite:0 "스칼렛 스커지"
 ehof_red_toxic_digsite_desc:0 "고강도 스캐너가 두꺼운 대기를 관통하기 위해 X선을 사용할 준비가 되고 있습니다. 우리의 [Owner.GetScientistPlural]는 이러한 스캔이 이 행성을 덮고 있는 붉은 안개가 자연적인 기원이 아닐 것이라는 추측을 바탕으로 그 기원을 밝혀줄 것이라고 희망하고 있습니다."
 ehof_red_toxin.41.name:0 "오염된 낙원"
 ehof_red_toxin.41.desc:0 "§H[from.Planet.GetName]§!의 X선 스캔 시도가 성공했습니다.\n\n우리 시스템은 표면의 82,844 평방 킬로미터 지역을 매핑했습니다. 숲과 도시가 행성 표면에 위치해 있으며, 적어도 그 잔존자들은 존재합니다. 이를 통해 §H[from.Planet.GetName]§!에 한때 문명이 존재했음을 알 수 있으며, 적어도 식물 생명체는 한때 행성의 생태계의 일부였음을 알 수 있습니다.\n\n건물의 건축 양식과 크기는 문명이 상당히 발전했음을 나타내지만, 상당한 궤도 잔해가 없다는 것은 그들이 행성을 넘어 영구적인 존재를 달성하지 못했음을 의미합니다.\n\n문명이 붉은 안개에 책임이 있는지는 아직 알 수 없습니다.\n\n불행히도, 행성에서 무슨 일이 있었는지 더 알아보기 위해서는 표면 탐사가 필요할 것입니다. 멸종한 문명의 기록과 표면 및 환경 샘플을 찾는 것만이 붉은 안개와 그 기원에 대해 더 많은 정보를 제공할 것입니다.\n\n붉은 안개는 유기체 생명체에 매우 위험합니다. 어떤 탐험대에 대한 위험 때문에, 대신 고급 로봇 탐사 유닛이 사용되고 있으며, 부식 방지 갑옷과 에너지 보호막이 장착되어 있습니다."
 ehof_red_toxin.41.a:0 "탐사팀을 준비해라."
 ehof_red_toxin.42.name:0 "스칼렛 스커지"
 ehof_red_toxin.42.desc:0 "§H[from.Planet.GetName]§!의 표면 탐사는 성공적이었으며, 우리는 붉은 안개의 본질을 규명하였습니다.\n\n§H[from.Planet.GetName]§!의 이전 거주자들이 \"붉은 재앙\"이라고 부른 이 물질은 §H[from.Planet.GetName]§!의 이전 문명 구성원들에 의해 만들어진 고급 합성체 독소입니다.\n\n누가, 그리고 왜 이 독소를 만들었는지는 행성의 일반 인구에게 알려지지 않은 사실이며, 정부 및 과학 기관의 기밀 기록을 조사해도 붉은 재앙의 기원을 밝혀내지 못했습니다.\n\n현재 우리가 아는 것은 독소가 321 갈락틱 표준 년 전, \"기원 지점\"이라는 이름의 북반구의 한 위치에 갑자기 나타났으며, 1년 이내에 행성 전체를 덮어 생태계를 완전히 파괴했다는 것입니다.\n\n이 독소는 직경이 0.1에서 100 마이크론 사이인 입자로 구성되어 있습니다. 이러한 크기의 다양성은 독소를 포획하거나 필터링하기 매우 어렵게 만들며, 동시에 대기의 모든 층을 침투할 수 있게 합니다. 가장 우려되는 점은 이 독소가 아직 알려지지 않은 방법으로 스스로 복제할 수 있는 것으로 보인다는 것입니다.\n\n우리의 [Owner.GetScientistPlural]는 §H[from.Planet.GetName]§!의 기원 지점에 대한 추가 탐사가 재앙에 대한 남은 질문에 답할 것이라고 믿고 있습니다."
 ehof_red_toxin.42.a:0 "스칼렛 스커지가 어디서 왔는지 알아내야 합니다."
 ehof_red_toxin.421.name:0 "'기원지'"
 ehof_red_toxin.421.desc:0 "우리의 로봇 탐사 부대가 스칼렛 스커지의 '기원지' 탐사를 위해 준비중입니다. 그곳은 스칼렛 스커지의 기원일 뿐만 아니라 스커지 자체가 만들어진 장소일 수도 있습니다."
 ehof_red_toxin.43.name:0 "화합물 23RCA"
 ehof_red_toxin.43.desc:0 "ORIGIN 사이트의 조사는 우리가 예상했던 것보다 스칼렛 스카지에 대한 더 많은 비밀을 밝혀냈습니다.\n\nORIGIN 사이트는 내부적으로 \"위험 테스트 구역 Y-173\"으로 명명되었으며, 스칼렛 스카지가 생성된 장소가 아니라 독소 생성에 책임이 있는 기관이 사용한 테스트 사이트였습니다. 이 사이트는 큰 돔의 정점에 내장된 관측소로 구성되어 있으며, 한때 작은 마을과 작은 숲을 둘러싸고 있었습니다. 이곳은 원래 §H[from.Planet.GetName]§!의 지배 종족의 피험체들이 거주했으나, 화석 증거에 따르면 다른 동물 생명체도 존재했음을 나타냅니다.\n\n고급 격리 물자로 구성된 이 돔은 스카지가 대기 중으로 누출되는 것을 방지하기 위해 설계되었습니다. 불행히도 독소의 창조자들조차 그 효과를 과소평가했습니다. 스카지는 돔의 물자를 부식시켜 대기로 들어갔고, 이는 §H[from.Planet.GetName]§!의 모든 생명체에 대한 종말의 시작을 알렸습니다.\n\n사이트의 손상된 시스템에서 데이터 추출 및 복구 결과, 이곳은 혁신 단조라는 민간 연구 개발 조직에 의해 운영되었음을 나타냅니다.\n\n스칼렛 스카지(내부적으로 \"화합물 23RCA\"로 언급됨)는 ORIGIN 사이트에서 유기체 및 무기체에 대한 영향을 연구하기 위해 테스트되었으며, 테스트에 참여한 종족의 구성원들은 기후 조절 실험에 참여하고 있다고 들었습니다.\n\n기록은 또한 혁신 단조의 원래 주요 시설인 \"저장소\"라는 위치를 밝혀냈습니다. 이곳은 스카지가 처음 생성된 장소일 뿐만 아니라 혁신 단조의 다른 많은 위대한 창조물의 인큐베이터이기도 했습니다.\n\n우리의 [Owner.GetScientistPlural]는 스칼렛 스카지가 어떻게 합성되었는지 알아내고 유용할 수 있는 다른 혁신 단조 연구를 발견하기 위해 저장소를 탐험하고자 합니다."
 ehof_red_toxin.43.a:0 "저장소는 분명 유용하겠지. 우리에게도 말이에요."
 ehof_red_toxin.431.name:0 "'저장소'"
 ehof_red_toxin.431.desc:0 "저장소는 우리의 최종 탐사의 목표인 §H[from.Planet.GetName]§!입니다. 이 임무를 위해 무장 로봇 탐사 유닛이 배치되고 있습니다.\n\n저장소가 혁신 대장간의 가장 위대한 창조물의 출생지라면, 우리가 아직 예측할 수 없는 방식으로 위험할 수 있습니다."
 ehof_red_toxin.44.name:0 "근원과 해결책"
 ehof_red_toxin.44.desc:0 "우리의 저장소 탐사는 완전한 성공을 거두었습니다.\n\n저장소는 거대한 산맥 아래에 지어진 거대한 시설입니다.\n\nORIGIN 사이트에서 회수한 데이터가 나타낸 것처럼, 이곳은 행성의 다른 어떤 곳보다도 훨씬 우수한 기술 혁신의 보물창고였습니다.\n\n저장소는 내부 보안 시스템에 의해 보호되어 있었고, 이는 우리 부대에게도 도전이 되었지만, 보안을 극복한 후에는 시설을 자유롭게 탐험할 수 있었습니다.\n\n우리는 스칼렛 스커지를 처음으로 생성한 실험실을 찾을 수 있었고, 그곳에서 스칼렛 스커지에 대한 모든 것을 알게 되었습니다.\n\n이것은 혁신 단지가 만든 일련의 테라포밍 제제의 첫 번째 완전 작동 프로토타입이었습니다. 이 제제는 우주 선박을 통해 적대적이지만 잠재적으로 거주 가능한 행성에 배포되어, 생물학적 물질을 포함한 유해 물질로부터 대기를 정화하는 데 사용될 예정이었습니다.\n\n이 제제는 예상과 다르게 행동하게 되었고, 결국 의도한 작업에서 너무 효과적이라는 것이 입증되었습니다.\n\n시설의 중심부에서 우리는 혁신 단지의 가장 위대한 [Owner.GetScientistPlural]의 집합체인 고급 지능을 발견했습니다. 그들은 스커지에서 벗어나기 위해 자신의 의식을 업로드한 존재들이었습니다. 그들은 저장소, §H[from.Planet.GetName]§!의 문명, 스칼렛 스커지, 그리고 스칼렛 스커지 위기에 대한 그들의 해결책에 대해 더 많은 정보를 제공했습니다.\n\n스커지가 행성을 휩쓸던 중, 그들은 남극 근처에 \"촉매\"라는 거대한 탑을 건설했습니다. 이는 스칼렛 스커지로부터 대기를 정화하기 위한 것이었습니다. 그들의 초기 시도는 스칼렛 스커지가 복제되는 것을 막는 방법을 찾지 못했기 때문에 실패했으며, 두 번째 시도에 필요한 자원이 부족했습니다.\n\n그들은 우리의 고급 기술이 스커지의 자기 복제를 무력화하고 대기를 정화하는 방법을 결정할 수 있게 해줄 것이라고 말했습니다.\n\n이제 우리는 이 세계를 정화하여 다시 거주 가능하게 만들거나, 스칼렛 스커지를 우리의 목적을 위해 사용할 수 있습니다."
 ehof_red_toxin.44.a:0 "스커지는 괴물입니다. 그것으로부터 행성을 해방시키세요!"
 ehof_red_toxin.44.b:0 "스커지는 여러 분야에서 정말 유용할 거에요."
 INVESTIGATE_ONE_ORBIT:0 "하나의 궤도"
 INVESTIGATE_ONE_ORBIT_DESC:0 "우리가 §H[root.solar_system.GetName]§! 항성계에 도착한 지 얼마 지나지 않아, 우리의 감지기가 이상한 행성 배열을 감지하기 시작했습니다.\n\n이 항성계에는 두 개의 행성이 있으며, 두 행성이 같은 궤도를 공유하는 것으로 보입니다. 이들의 별로부터의 거리는 거의 정확히 동일하여 완벽한 항성 대칭을 이루고 있습니다.\n\n우리의 [Owner.GetScientistPlural]는 이 두 행성에 대해 더 조사하여 이들 및 이 이상한 배열에 대해 더 많은 정보를 알아내고자 합니다."
 ehof_anomaly.10011.name:0 "하나의 낙원"
 ehof_anomaly.10011.desc:0 "§H[root.solar_system.GetName]§! 시스템에 있는 두 행성 중 첫 번째 행성을 조사한 결과, §H[fromfrom.GetName]§!는 희귀하고 매우 거주 가능한 가이아 행성임을 발견했습니다.\n\n이 행성은 평균보다 높은 질량을 가지고 있지만, 밀도는 암석 행성에 일반적인 수준입니다. 행성 생태계는 놀라운 다양성을 자랑합니다.\n\n이 행성을 연구하는 것은 우리의 생물학적 연구에 가치가 있을 수 있지만, 우리의 초점은 §H[fromfrom.GetName]§!의 형제 행성 연구에 있습니다."
 ehof_anomaly.10011.a:0 "이것에 대해 더 알아낼 수 없어서 슬프군요."
 INVESTIGATE_ONE_ORBIT_2:0 "하나의 궤도 II"
 INVESTIGATE_ONE_ORBIT_2_DESC:0 "§H[fromfrom.GetName]§!의 조사는 이 이상한 행성 배열이 어떻게 형성되었는지를 보여줄 것입니다."
 ehof_anomaly.10012.name:0 "쌍둥이 낙원"
 ehof_anomaly.10012.desc:0 "우리가 §H[root.solar_system.GetName]§! 항성계의 두 번째 행성인 §H[fromfrom.GetName]§!를 조사한 결과, 믿을 수 없는 것이 드러났습니다.\n\n§H[fromfrom.GetName]§!는 형제 행성과 동일한 특성을 가지고 있습니다 - 그것도 가이아 행성입니다!\n\n두 행성 모두 가이아 행성이며, 질량, 밀도, 경사, 궤도, 자전 속도 및 공전 속도가 동일합니다. 두 행성을 구분짓는 유일한 것은 생태계와 위치가 다르다는 사실입니다.\n\n이 전체 항성계는 너무 비현실적으로 보이지만, 실제로 존재합니다. 이러한 행성 배열이 자연적으로 형성될 확률은 본질적으로 제로에 가깝습니다. 인공 기원일 가능성이 있지만, 이 시스템의 창조자에 대한 어떤 흔적도 발견되지 않았습니다..."
 INVESTIGATE_SCARRED_PLANET:0 "흉터"
 INVESTIGATE_SCARRED_PLANET_DESC:0 "우리 [Owner.GetScientistPlural]는 스카의 지질 구조와 물자 조성을 연구하여 그 형성 과정에 대한 세부 정보를 찾으려 합니다. 스캐너는 또한 주변 지역을 분석하여 어떤 비정상적인 물질이 있는지 탐지하고 있습니다.\n\n현재 우리는 스카가 어떤 형태의 초강력 무기 배치의 결과일 수 있다고 의심하고 있습니다."
 ehof_anomaly.10013.name:0 "거대한 노치"
 ehof_anomaly.10013.desc:0 "우리의 스카르 조사 결과는 우리의 가설이 맞다는 것을 증명했습니다. 스카르는 사실 거대한 무기에 의해 생성되었습니다.\n\n우리는 이전에 이 정도 규모의 무기를 본 적이 있지만, 여기에서 사용된 무기의 세부 사항이 이 사례를 매우 매력적으로 만듭니다. 스카르의 지질 구조, 행성 표면에 대한 절단 각도, 60킬로미터 깊이, 그리고 그 안에 존재하는 비정상적인 물질들은 모두 스카르가 거대한 운동 에너지 무기에 의해 생성되었다는 믿음으로 이어집니다.\n\n우리의 감지기도 전체 협곡을 가로지르는 불규칙한 방사선 경로를 감지했습니다. 그러나 이 방사능 오염은 플루토늄과 같이 스스로 방사능을 가진 물질의 결과가 아니라, 강한 감마 방사선에 노출된 결과입니다. 이는 행성 표면에 충돌하여 스카르를 만든 운동 에너지 발사체가 적어도 부분적으로는 반물질로 구성되었다는 사실을 드러냅니다. 발사체는 물질-반물질 반응에 의해 완전히 소멸된 것으로 보이며, 우리는 그 구성에 대해 더 이상 알 수 없었습니다.\n\n더욱이, 우리의 [Owner.GetScientistPlural]는 스카르의 나이를 약 125만 년으로 추정했습니다. 그 놀라운 나이 때문에, 우리는 이 무기를 만든 사람이나 처음에 왜 발사되었는지에 대해 더 이상 알 수 없을 것이라고 예상합니다."
 ehof_megastructure.016.name:0 "신비로운 돌"
 ehof_megastructure.016.desc:0 "우리의 과학선이 §H[root.solar_system.GetName]§! 성계의 중심 근처에 있는 거대하고 매우 밝은 물체를 발견했습니다.\n\n처음에는 중성자별로 오인하였으나, 그 물체는 알 수 없는 출처의 구조물인 것으로 드러났습니다. 그 물체가 발하는 에너지양과 신호가 막대하여 성계 내에 있는 함선의 보호막이 간섭받고 있습니다.\n\n가까이서 보니, 그것은 행성 크기의 둥근 구조물로 위와 아래의 표면에는 수수께끼의 문양이 적혀있으며 매우 강력한 푸른 빛을 뿜어내고 있습니다. 물체에 대해 심층 조사를 했지만 우리 감지기의 출력값이 기묘하고 이해할 수 없기 때문에 사실상 소득은 없었습니다. 어쩌면 강력한 간섭 때문일지도 모릅니다.\n\n구조물이 발하는 에너지가 너무 강하기 때문에 이를 직접 조사하는 것은 불가능합니다. 최소 온도는 구조물 인근으로 5백만 켈빈이며 최고 온도는 문양 근처에서 수조 켈빈에 달합니다.\n\n현재로서는 그냥 내버려둘 수 밖에 없습니다."
 ehof_megastructure.016.a:0 "놀라워!"
 ehof_megastructure.017.name:0 "태고의 기둥"
 ehof_megastructure.017.desc:0 "우리의 과학선 중 하나가 신비로운 $PGATE_GALACTICS$ 중 하나를 발견했습니다! 그것은 §H[root.solar_system.GetName]§! 항성계 안에 위치해 있습니다.\n\n우리는 이러한 구조물에 대한 소문만 들었지만, 이들은 외부 은하계로의 여행을 가능하게 하는 일종의 고급 게이트라고 전해집니다."
 ehof_megastructure.017.a:0 "멋지군!"
 ehof_megastructure.018.name:0 "블랙홀 구조물"
 ehof_megastructure.018.desc:0 "§H[root.solar_system.GetName]§!의 중심에 파손된 궤도 구조물이 존재합니다. 그 구조물은 중앙의 블랙홀을 감싸는 것 처럼 보이며 미작동에 버려진 것 같습니다. 그 구조물의 목적을 알아내기 위해서 탐사해야 합니다."
 ehof_megastructure.018.a:0 "흥미로운데!"
 ehof_megastructure.018.b:0 "하, 내버려 두는게 더 멋져."
 EXPLORE_RUINED_EHOF:0 "블랙홀 구조물 탐사"
 EXPLORE_RUINED_EHOF_DESC:0 "§H[root.solar_system.GetName]§! 성계 내부에서 블랙홀을 둘러싸는 파손된 구조물의 탐사 프로젝트가 진행 중입니다. 그 목적을 알아내기 위해, 우리는 구조물의 잔해로 탐사단을 보내야할 것입니다."
 INVESTIGATE_ENIGMATIC_PATTERN:0 "수수께끼의 패턴"
 INVESTIGATE_ENIGMATIC_PATTERN_DESC:0 "§H[ehof_code_fleet.GetName]§!의 승무원만이 그 이상한 전송을 기억합니다. 다행히도 그들은 휴대용 장치에 일부 내용을 기록할 수 있었지만, 이는 포괄적인 분석이라고 할 수는 없습니다. 그들의 보고서는 더 조사되어야 합니다.\n\n§H[ehof_code_fleet.GetName]§!에 영향을 준 에너지 섬광의 출처에 대한 아이디어는 아무도 없지만, 이는 이미 이상한 $ehof_cohesive$ 시스템 중 하나에서 발생했습니다. 우리의 과학 선박은 $ehof_cohesive$ 시스템을 연구하는 동안 이 신비로운 패턴의 더 많은 투영을 주의 깊게 살펴보라는 조언을 받았습니다."
 ehof_reality_code.002.name:0 "신호 배열"
 ehof_reality_code.002.desc:0 "우리는 $ehof_ep$를 연구하면서 첫 번째 돌파구를 마련했습니다.\n\n이는 불확정한 위치에서 발신된 고에너지 정보 전송으로, 우리의 함선에 향하고 있습니다. 게다가, 이는 전자 시스템에 간섭할 수 있는 것으로 보이며, 우리가 관찰한 이상 행동과 전력 손실을 초래합니다.\n\n더 많은 정보를 얻기 위해, 우리는 우리의 과학선에 두 가지 새로운 기술을 장착했습니다: $ehof_ep$에서 발견된 주파수에 조정된 스캐너와 $ehof_closed_modular$입니다. $ehof_ep$ 스캐너는 강화되어 있으며, $ehof_ep$ 전송으로 인한 전력 서지와 버퍼 오버플로우를 견딜 수 있도록 특별히 설계된 실험용 정보 처리 장치가 장착되어 있습니다. $ehof_closed_modular$는 수동으로 활성화되는 독립 전원 시스템으로, 함선에서 비활성화된 시스템을 신속하게 재활성화하도록 설계되었습니다.\n\n이러한 업그레이드 덕분에, 우리의 과학선은 $ehof_ep$의 전송을 안전하게 수신하고 분석할 수 있습니다."
 EXPLORE_CREATOR_PLANET:0 "$ehof_the_sphere$ 탐사"
 EXPLORE_CREATOR_PLANET_DESC:0 "이제 $ehof_the_sphere$가 우리에게 내부로 접근하는 것을 허용했으며, 마침내 비밀을 밝혀낼 수 있게 되었습니다. 그 누구도 우리 앞에 놓인 수수께끼와 신비로운 기술들을 모를 것입니다!"
 ehof_anomaly.10417.name:0 "껍데기 속의 소우주"
 ehof_anomaly.10417.desc:0 "마침내 우리는 $ehof_the_sphere_named$의 비밀을 밝혀냈습니다!\n\n그곳에는 미니어처 우주라고밖에 설명할 수 없는 것이 포함되어 있습니다. 더욱 놀라운 것은 이 \"마이크로버스\"의 시공간 부피가 외부 공간에 비해 역으로 접혀 있어 $ehof_the_sphere$ 내부의 부피가 외부 표면적이 암시하는 것보다 수천 배 더 크다는 점입니다.\n\n이 마이크로버스는 외부와 내부 부피로 나뉘어 있습니다. 외부 부피는 외부 우주와 동일한 진공 에너지 밀도를 가지고 있습니다. 수백 개의 별과 함께 항성 복사, 진공 에너지, 심지어 타 차원 존재의 신비로운 힘을 수확하는 수많은 구조물로 가득 차 있습니다. 내부 부피는 외부 부피보다 훨씬 높은 진공 에너지 밀도를 가진 빈 공간으로 보입니다. 우리는 이를 더 이상 분석할 수 없습니다.\n\n우리의 [Owner.GetScientistPlural]는 이 부피들이 엄청난 양의 에너지를 생성하도록 구조화되어 있다고 결론지었습니다. 이 에너지는 먼저 외부 부피에서 추출된 후 내부 부피로 흡입됩니다. 내부 부피에는 최소 10^49 줄의 에너지가 포함되어 있으며, 이는 천 개 이상의 별의 총 질량-에너지에 해당합니다."
 ehof_anomaly.10417.a:0 "이건 역사상 가장 위대한 과학적 발견이 될 것입니다!"
 ehof_anomaly.10418.desc:0 "우리는 $ehof_ep$ 송신기와 $PGATE_GALACTICS$가 $ehof_epcs$를 추적하는 동안 만난 모든 것이 $ehof_the_sphere$에 종속되어 있다는 것을 추가로 확인했습니다. 이러한 구조물은 $ehof_the_sphere_named$로부터 마이크로 웜홀을 통해 에너지와 데이터 방송을 수신합니다. 그 데이터는 물론 $ehof_ep$이며, 이는 다시 $ehof_ep$ 송신기와 $PGATE_GALACTIC$ 네트워크를 제어합니다.\n\n이러한 전송의 목적지를 모니터링한 결과, 우리가 예상했던 것보다 은하 밖에 더 많은 $ehof_cohesive$ 시스템이 존재한다는 것을 발견했습니다! 가장 놀라운 사실은 $ehof_the_sphere_named$가 이러한 전송의 유일한 출처가 아니라는 점입니다 - 우리 은하 너머에도 더 많은 출처가 있습니다.\n\n불행히도, 우리는 여전히 $ehof_the_sphere$와 그 네트워크의 원래 목적이나 그것을 만든 사람에 대한 정보를 확인할 수 없었습니다. 목표가 무엇이었든, 그것은 수천 개의 별이 그들의 전체 생애 동안 생성할 수 있는 것보다 더 많은 에너지를 필요로 했습니다!"
 tremendous_ring_system_category:0 "변칙적인 거대 가스 행성"
 tremendous_ring_system_category_desc:0 "§H[root.solar_system.GetName]§! 성계에 있는 거대 가스 행성 §H[from.GetName]§!(은)는 흔치 않은 질량 분포와 규모를 보이고 있습니다. \n\n우리 과학자들은 이 행성에 대해 좀 더 알아보기 위한 조사를 요청하고 있습니다. "
 ehof_anomaly.01.name:0 "거대한 고리"
 ehof_anomaly.01.desc:0 "우리는 일반적인 고리보다 훨씬 거대한 고리를 가지고 있는 거대 가스 행성 §H[from.GetName]§!(을)를 발견하였습니다.\n\n이 고리는 지름이 대략 3.78억 km인 것으로 추측되며, 행성의 직경이 171,557km인 것에 비하면 엄청난 차이가 있씁니다.\n\n현재 이렇게 인상적인 고리가 어떻게 형성되었는지는 분석 우주론적 계산 연구와 천체 수학의 주제가 되었습니다."
 ehof_anomaly.01.a:0 "매력적이군요."
 methane_oceans_category:0 "그렇게 척박하진 않은 행성"
 methane_oceans_category_desc:0 "과학선의 감지기가 §H[root.solar_system.GetName]§! 성계의 불모 행성, §H[from.GetName]§!의 표면에서 이상 현상을 감지했습니다.\n\n우리의 과학자들은 이 이상 현상에 대해 더 알아보기 위해 행성을 조사하기를 원하고 있습니다."
 ehof_anomaly.02.name:0 "메탄 바다"
 ehof_anomaly.02.desc:0 "우리의 과학자들이 불모 행성으로 보이는 §H[from.GetName]§!(이)가 사실 완전한 불모지는 아니라는 사실을 알아냈습니다.\n\n§H[from.GetName]§!의 소행성 충돌 분화구에 메탄으로 된 작은 바다가 있습니다. 이 분화구의 표면 온도가 밤낮 주기에 따라 섭씨 -193도에서 -143도 사이로 유지되기 때문에 아러한 바다가 존재할 수 있는 것입니다.\n\n§H[from.GetName]§!의 메탄 바다는 단순한 형태의 무기질 생명체를 품고 있을지도 모릅니다.\n\n만약 어떠한 형태로든 메탄 바다에 생명체가 존재한다면 우주 생물학계의 논쟁감이 될 것입니다."
 ehof_anomaly.02.a:0 "흥미롭군요."
 nanite_deserts_category:0 "이상한 사막"
 nanite_deserts_category_desc:0 " §H[root.solar_system.GetName]§! 성계에 있는 사막 행성 §H[from.GetName]§!의 지표면은 특이한 특징을 지니고 있습니다. \n\n과학선의 스캔 결과에 기반하여, 과학자들은 이상 현상 탐사 팀을 보내길 희망하고 있습니다. "
 ehof_anomaly.03.name:0 "나노봇 사막"
 ehof_anomaly.03.desc:0 "우리는 §H[from.GetName]§! 사막의 50%가 모래 알갱이를 닮은 나노 로봇들로 이루어져있음을 알아냈습니다.\n\n사막의 나머지 50%는 은하계의 다른 행성에서 볼 수 있는 평범한 사막들과 같이 자연 과립 물질로 이루어져 있습니다.\n\n이 '나노 모래'의 샘플 분석을 통해 나노 로봇들이 고차원적인 작업을 하고 있지는 않다는 것을 확인했습니다.\n\n나노 모래와 사막의 다른 모래 알갱이들의 유일한 차이점은 현미경으로 보았을 때 다르다는 것 뿐입니다.\n\n이 나노 로봇들의 사용처와 §H[from.GetName]§! 사막의 50%가 나노 로봇으로 이루어져 있는지에 대한 이유는 수수께끼입니다."
 ehof_anomaly.03.a:0 "놀랍군요!"
 coreless_planet_category:0 "핵이 없는 행성"
 coreless_planet_category_desc:0 "§H[root.solar_system.GetName]§!성계의 불모 행성 §H[from.GetName]§! 내부는 구성과 구조가 이상합니다.\n\n이 행성의 이상 현상을 좀 더 알아내기 위해 추가적인 조사가 필요합니다."
 ehof_anomaly.04.name:0 "핵 이상"
 ehof_anomaly.04.desc:0 "우리 과학자들은 §H[from.GetName]§!에 핵이 없다는 것을 알아냈습니다.\n\n이 행성은 철로 구성된 핵이 전혀 존재하지 않으며, 암석질의 맨틀이 핵이 있어야 할 자리까지 차지하고 있고, 행성의 중심에는 이상한 구조물이 있습니다.\n\n과학자들은 그것이 외계 물질로 구성된 것인지, 인공적인 구조물인지 확신하지 못하고 있습니다.\n\n그들은 행성 내부에 탐사 팀을 보내 이상 현상을 더 연구하길 원하지만, 해당 구조물까지 도달하는 데에는 시간과 자원이 필요할 것입니다."
 ehof_anomaly.04.a:0 "인상적이군요. 탐사 팀을 파견하세요."
 ehof_anomaly.04.b:0 "아니, 그러지 않을 것입니다."
 cataclysmic_star_category:0 "강렬한 별"
 cataclysmic_star_category_desc:0 "항성 §H[from.GetName]§!(은)는 강하고 불규칙한 에너지 신호를 방출하고 있으며, 비정상적인 질량 분포를 보이고 있습니다.\n\n이 항성의 이상 현상을 알아내기 위해 추가적인 조사가 필요합니다."
 ehof_anomaly.05.name:0 "격변변광성"
 ehof_anomaly.05.desc:0 "우리는 항성 §H[from.GetName]§!의 내부에 §HD형§! , 즉 항성 §H백색 왜성§!의 잔해가 존재한다는 것을 발견했습니다.\n\n백색 왜성으로 인해 항성의 질량이 1.2배 증가했으며, 방사선이 내리쬐는 항성의 \"맨틀\"에 위치하고 있습니다.\n\n§H백색 왜성§!은 §H[from.GetName]§! 의 핵에 심각한 불안정을 유발하고 있으며, 이는 수억톤에 달하는 성간 물질을 뿜어내는 강력하고 비정상적인 플라스마 폭발을 자주 일으키고 있습니다.\n\n아마도 §HD형§! 항성은 §H[from.GetName]§! 항성과 수백만년 전에 충돌한 뒤, 항성 내부로 완벽히 흡수된 것 같습니다.\n\n§H[from.GetName]§!의 불안정성은 항성의 죽음을 10만년 이내로 앞당길 것으로 추측됩니다."
 ehof_anomaly.05.a:0 "무섭군요!"
 oxygen_world_category:0 "변칙적인 얼어붙은 행성"
 oxygen_world_category_desc:0 "우리 제국의 과학선이 §H[root.solar_system.GetName]§! 성계에 있는 §H[from.GetName]§! 행성 지상의 얼음에서 변칙적인 특징을 감지해냈습니다.\n\n과학자들은 이 행성에 탐사팀을 내려보내 더 자세히 분석하고자 합니다."
 ehof_anomaly.06.name:0 "결정화된 산소 행성"
 ehof_anomaly.06.desc:0 "우리 제국의 과학자들이 §H[from.GetName]§! 표면의 '얼음' 이 물이나 이산화탄소가 얼어 생긴 것이 아니며, 산소가 결정화된 것이라고 보고했습니다.\n\n§H[from.GetName]§! 의 표면은 산소의 녹는점인 절대온도 51켈빈보다 낮을 정도로 굉장히 춥습니다.\n\n한 항성계에서 고체 산소가 안정적으로 존재한다는 것은 굉장히 드문, 이례적인 일입니다.\n\n§H[from.GetName]§!(은)는 굉장히 특이한 곳입니다. §H[from.GetName]§!(은)는 미래 저온 물리학의 주요 연구지가 될 것입니다."
 ehof_anomaly.06.a:0 "놀랍군요!"
 abandoned_seat_category:0 "파괴된 행성"
 abandoned_seat_category_desc:0 "죽은 행성인 §H[from.GetName]§!이(가) 우리의 과학선 중 하나에 의해 발견되었습니다.\n\n이 행성은 §H[root.solar_system.GetName]§!에 위치하고 있으며, 우주 잔해로 구성된 작은 고리를 가지고 있습니다. 이 고리는 이전 위성과 우주 정거장의 잔존자처럼 보입니다.\n\n우리의 [Owner.GetScientistPlural]는 §H[from.GetName]§!의 표면을 황폐화시킨 동일한 사건이 위성과 우주 정거장의 파괴에도 책임이 있다고 믿고 있습니다.\n\n그들은 잔해의 고리와 행성 자체를 탐사하여 이 세계에 무슨 일이 있었는지에 대해 더 알아내고자 합니다."
 ehof_anomaly.07.name:0 "손상된 우주 정거장"
 ehof_anomaly.07.desc:0 "§H[from.GetName]§! 주위의 잔해 고리 안에서, 우리의 [Owner.GetScientistPlural]가 대형 우주 정거장을 발견했습니다.\n\n우리 과학선의 스캔 결과, 이 우주 정거장은 중간 정도의 구조적 손상이 있는 것으로 보이며, 버려진 상태인 것 같습니다.\n\n정거장의 손상되지 않은 구조물은 나머지 우주 잔해와 비교할 때 독특한 미학을 보여줍니다.\n\n우리 [Owner.GetScientistPlural]는 이 정거장이 한때 그 파괴된 세계에 거주했던 문명에게 매우 중요했을 것이라고 추정합니다.\n\n그들은 §H[from.GetName]§!에 무슨 일이 있었는지 알아내기 위해 정거장을 더 조사하고 싶어합니다."
 ehof_anomaly.07.a:0 "흥미롭군요, 정거장을 조사하세요!"
 ehof_anomaly.07.b:0 "파헤쳐선 안 되는 비밀도 있는 법이죠."
 natural_network_category:0 "생각하는 행성?"
 natural_network_category_desc:0 "우리는 §H[from.GetName]§! 행성이 있는 §H[root.solar_system.GetName]§! 시스템 전역에서 이상한 신호를 감지하고 있습니다.\n\n이 신호는 동물 생명의 뇌파와 유사하며, 우리의 [Owner.GetScientistPlural]는 이 행성이 실제로 \"살아있는\" 것인지, 아니면 그들의 기기가 간섭을 받고 있는 것인지 확신하지 못하고 있습니다.\n\n이 행성의 이상 현상에 대해 더 많은 것을 발견하기 위해 추가 조사가 필요합니다."
 ehof_anomaly.08.name:0 "행성 생체 연결망"
 ehof_anomaly.08.desc:0 "우리는 §H[from.GetName]§!가 행성 전역에 걸쳐 상호 연결된 거대한 식물 군락 네트워크로 덮여 있다는 것을 발견했습니다.\n\n이 네트워크는 단일 속의 식물로 구현되어 있으며, 이 식물의 종들은 뿌리를 통해 서로 연결할 수 있는 능력을 가진 것으로 보입니다. 이 속은 행성을 지배하고 있으며, 전 세계 식물의 약 절반 이상을 차지하고 있습니다. 이들은 우리의 과학 선박에 의해 감지된 이상 신호의 원천입니다.\n\n우리 [Owner.GetScientistPlural]는 이 네트워크가 최소한 경미한 형태의 준신경 활동을 가지고 있다고 추정하지만, 이 활동은 그 본질로 인해 동물 신경 패턴과는 여전히 구별되어야 합니다.\n\n우리 [Owner.GetScientistPlural]는 이 식물과 전 세계 네트워크에 대해 더 많은 정보를 찾기 위해 연구를 확장하고자 합니다."
 ehof_anomaly.08.a:0 "신기하군요, 추가적인 조사를 진행하도록 하세요!"
 ehof_anomaly.08.b:0 "식물은 식물인 채로 두자구요."
 connected_asteroid_category:0 "소행성 기지"
 connected_asteroid_category_desc:0 "우리의 조사원들은 §H[root.solar_system.GetName]§! 시스템 주변의 넓은 소행성 대에서 비정상적인 질량 분포와 조성을 가진 비정상적인 형성을 발견했습니다.\n\n우리의 [Owner.GetScientistPlural]는 이 이상 현상을 조사하여 더 많은 정보를 얻고자 합니다."
 ehof_anomaly.09.name:0 "연결된 소행성 거주지"
 ehof_anomaly.09.desc:0 "§H[root.solar_system.GetName]§! 시스템의 소행성대에서 발견된 비정상적인 형체는 여러 개의 소행성이 거대한 지지대와 수송관을 통해 연결되어 형성된 거대한 우주 정거장입니다.\n\n최신 스캔 결과에 따르면, 이 정거장은 버려진 상태이며 손상되지 않은 것으로 보입니다. 이 관측을 확인하기 위해 추가 조사가 필요합니다. 우리의 [Owner.GetScientistPlural]가 정거장 내부를 탐사하여 더 많은 정보를 찾기를 요청하고 있습니다."
 ehof_anomaly.09.a:0 "기지를 탐사하되, 조심하세요."
 ehof_anomaly.09.b:0 "그 기지는 무시하세요."
 hot_society_category:0 "생명체가 사는 용암 행성"
 hot_society_category_desc:0 "용암 행성인 §H[from.GetName]§!의 표면에서 생명체의 활동 징후로 추정되는 신호가 포착되었습니다.\n\n그러나 일반적으로 유기체는 이런 극한의 환경에서 살아남을 수도, 자연적으로 진화할 수도 없습니다.\n\n이 행성의 비정상적인 현상에 대해 자세히 알아보기 위해 추가적인 조사가 필요합니다."
 ehof_anomaly.10.name:0 "플라스마 생명체"
 ehof_anomaly.10.desc:0 "§H[from.GetName]§! 행성의 이상 현상에 대한 원격 조사는 흥미로운 결과를 내놓았습니다.\n\n이 행성에는 과학자들이 \"플라스마 생명체\"로 명명한 독특한 형태의 생명체가 살고 있습니다. 이것들은 유기질을 흉내내는 플라스마로 구성되어 있으며, 유기체의 생태와 비슷한 방식으로 동작하는 신체를 가지고 있습니다.\n\n다양한 형태의 플라스마 생명체가 행성에 서식하고 있으며, 행성엔 독특한 생물권이 형성되었습니다.\n\n만일 이 생명체의 구성 물질이 탄소에 기반한다면, 이론적으로는 유기 생명체로 간주할 수 있을 것입니다. 그러나 아직 이 생명체들이 유기체인지는 밝혀지지 않았습니다.\n\n더 많은 것을 알아내기 위해선 표본을 확보하여 직접적인 연구를 수행할 필요가 있지만, 행성의 끔찍한 환경 때문에 표본 수집을 위해선 위험을 감수해야 할 것입니다."
 ehof_anomaly.10.a:0 "놀랍군요, 이 생명체들에 대한 조사를 추가적으로 진행하세요."
 ehof_anomaly.10.b:0 "우리는 그에 대해 [Owner.GetScientistPlural]의 생명과 자원을 위험에 빠뜨려서는 안 됩니다."
 intoxicated_world_category:0 "붉은 행성"
 intoxicated_world_category_desc:0 "§H[root.solar_system.GetName]§! 성계 내에서 지금까지 단 한번도 보고되지 않은 형태의 행성이 발견되었습니다.\n\n원격 조사와 스캔에 따르면 해당 행성은 유독성 행성인 것으로 추측되지만, 더 확실하게 행성의 종류를 결정하기 위해 직접적인 조사가 필요합니다."
 ehof_anomaly.11.name:0 "붉은 유독성 행성"
 ehof_anomaly.11.desc:0 "§H[from.GetName]§!의 대기를 직접 조사한 결과, 이 행성이 사실 유독성 행성임을 발견했습니다. 행성의 색깔, 더 구체적으로 말하자면 그 대기는 공기 중의 입자에 의해 발생합니다.\n\n입자의 화학 분석 결과, 이들은 구리, 여러 복합 탄소 화합물, 인, 황, 코발트, 그리고 심지어 아크티늄으로 구성되어 있음을 보여줍니다. 이 물질은 방사능이 있으며, 부식성이 강하고 대부분의 다른 물질에 강하게 달라붙습니다.\n\n유기체 생명체에 대한 끔찍한 치명성 외에도, 이 물질은 매우 밀도가 높고 불투명하여 빛과 저에너지 방사선이 행성 표면에 도달하는 것을 차단합니다. 이러한 요인들이 결합되어 표면을 자세히 분석하기가 믿을 수 없을 만큼 어렵습니다.\n\n우리 [Owner.GetResearchers]는 행성을 분석하기 위해 고강도 스캐너의 사용을 요청합니다."
 ehof_anomaly.11.a:0 "얼마나 끔찍하면서도 아름다운지요! 대기 너머 무엇이 있는지 알아보도록 하죠."
 ehof_anomaly.11.b:0 "그 안개 너머에 뭐가 있는지 확인하지 않는게 나을지도 모르겠군요."
 scarred_planet_category:0 "흉터"
 scarred_planet_category_desc:0 "§H[root.solar_system.GetName]§! 성계의 불모 행성이 이상 현상을 보이고 있습니다.\n\n감지기가 지상에 있는 거대한 협곡에 대한 경보를 발했으며, 무엇이 문제인지 확인하기 위해 추가적인 조사가 필요합니다."
 ehof_anomaly.12.name:0 "흉터"
 ehof_anomaly.12.desc:0 "§H[from.GetName]§!의 협곡이 자연 형성이 아님을 확인할 수 있었습니다. 협곡 자체의 구조는 자연적일 수 없음을 나타내며, 행성 표면의 6분의 1을 가로지르고 상부 맨틀 깊숙이까지 뻗어 있습니다. 만약 우리의 [Owner.GetResearchers]의 주요 이론이 맞다면, 행성의 고리는 원래 협곡을 채웠던 물자로 구성되어 있을 수 있습니다.\n\n아직 원인은 찾지 못했지만, 상처의 행성 물자와 행성 고리에 대한 심층 분석이 무엇이 원인인지에 대한 단서를 제공할 것입니다."
 ehof_anomaly.12.a:0 "흥미롭군요. 원인이 뭘까요?"
 ehof_anomaly.12.b:0 "지질학같은 것에 낭비할 시간은 없습니다."
 ehof_anomaly.13.name:0 "하나의 궤도"
 ehof_anomaly.13.desc:0 "우리가 §H[root.solar_system.GetName]§! 항성계에 도착한 지 얼마 지나지 않아, 우리의 감지기가 이상한 행성 배열을 감지했습니다. 이 항성계에는 같은 궤도를 공유하는 두 개의 행성이 있는 것으로 보입니다.\n\n우리 [Owner.GetScientistPlural]는 이 두 행성을 조사하여 이 이상한 궤도 배열이 어떻게 형성되었는지를 이해하고자 합니다."
 reality_code:0 "§E현실 코드§!"
 ehof_closed_modular:0 "폐쇄 모듈"
 ehof_the_sphere:0 "§H구체§!"
 ehof_the_spheres:0 "§B구의§!"
 ehof_the_sphere_named:0 "§E제행무상§!"
 ehof_the_sphere_nameds:0 "천변만화의"
 ehof_ep:0 "§E불가사의한 패턴§!"
 ehof_eps:0 "$ehof_ep$"
 ehof_epcs:0 "$ehof_ep$ §E신호 배열§!"
 ehof_reality_code.1.name:0 "수수께끼의 패턴"
 ehof_reality_code.1.desc:0 "우리는 §H[ehof_code_fleet.GetName]§!로부터 이상한 보고를 받았습니다.\n\n§H[ehof_code_fleet.solar_system.GetName]§! 내에서 정기 조사 중, 함선은 강력한 에너지 파동에 의해 타격을 받았습니다. 함선의 주 전원이 차단되었고, 선박은 여섯 시간 동안 비활성 상태로 있었습니다.\n\n다행히도, 백업 전원 코어는 손상되지 않았고, 승무원들은 이를 활성화하여 주요 시스템이 다시 작동할 수 있을 때까지 생명 유지 장치를 유지할 수 있었습니다.\n\n함선이 완전한 기능을 회복하자, 기이한 사건들이 선내에서 발생하기 시작했습니다. 보고서에 따르면 모든 시스템이 독립적으로 재가동되며 통제되지 않게 작동하는 것으로 묘사되었습니다. 마치 함선이 사로잡힌 것처럼 보였습니다. 모니터는 수수께끼 같지만 정돈된 패턴을 표시하기 시작했습니다. 자동문은 모니터 표시와 동기화되어 닫히고 열렸으며, 내부 통신은 반복적인 소리를 내며 울려 퍼졌습니다.\n\n이 $ehof_ep$는 선내의 [Owner.GetScientistPlural]이 그렇게 명명한 이후로 나타나지 않았습니다. 우리는 이 미스터리를 더 조사해야 합니다."
 ehof_p4_chain_title:0 "$reality_code$"
 ehof_p4_chain_desc:0 "필요한 기술을 갖춘 우리의 과학선은 이제 $ehof_eps$의 전송을 안전하게 수신하고 처리할 수 있습니다.\n\n우리는 $ehof_cohesive$ 항성계를 계속 탐험하여 $ehof_ep$의 추가 전송을 찾아야 합니다."
 ehof_mega_chain_1_poi:0 "근원"
 ehof_mega_chain_1_poi_desc:0 "이 $ehof_ep$는 이 위치에서 유래한 것으로 보입니다."
 code_1_cat:0 "현실 코드 - 유독성 행성"
 code_01_category_desc:0 "§H[this.GetName]§!가 §H[from.solar_system.GetName]§! 시스템에서 전송을 감지했습니다. 이전 전송과 마찬가지로, 이 전송은 함선의 주요 시스템을 비활성화했지만, 이번에는 함선의 $ehof_closed_modular$가 짧은 시간 후에 완전한 기능으로 복원할 수 있었습니다. 함선의 [Owner.GetScientistPlural]는 이 현상을 $ehof_epcs$라고 명명했습니다.\n\n함선이 다시 온라인 상태가 된 후, $ehof_ep$ 스캐너는 전송의 출처를 찾아냈습니다: 우리 조사관들이 §H[from.GetName]§!라고 명명한 유독성 행성입니다.\n\n$ehof_ep$ 스캐너를 포함한 추가 조사가 전송의 출처를 더욱 정확히 파악할 수 있을 것입니다. 전송이 매우 짧고 반복되지 않았기 때문에, 이를 수행하는 데 시간이 걸릴 수 있습니다."
 ehof_reality_code.101.name:0 "현실 코드 - 유독성 행성"
 ehof_reality_code.101.desc:0 "§H[this.GetName]§!는 §H[from.planet.GetName]§!에서 전송된 $ehof_ep$ 신호의 출처를 찾아낼 수 있었습니다: 그것은 행성의 남반구 지각 내의 한 장소에서 전송되었습니다.\n\n출처의 위치에 도달하기 위해서는 발굴이 필요할 것입니다. 높은 온도와 독성 대기가 이를 더 어렵게 만들겠지만, 적절한 장비가 있다면 큰 문제는 아닐 것입니다.\n\n우리가 원하는 답을 얻기 위해 프로젝트에 필요한 시간과 자원을 투자해야 할 것입니다."
 code1_digsite:0 "현실 코드 - 유독성 행성 발굴"
 code1_digsite_desc:0 "§H[this.GetName]§!는 §H[from.planet.GetName]§!의 전송된 $ehof_ep$ 신호의 출처를 찾아낼 수 있었습니다: 그것은 행성의 남반구 지각 내의 한 장소에서 전송되었습니다.\n\n출처의 위치에 도달하기 위해서는 발굴이 필요합니다. 높은 온도와 독성 대기가 이를 더 어렵게 만들겠지만, 적절한 장비가 있다면 큰 문제는 아닐 것입니다.\n\n우리가 원하는 답을 얻기 위해 프로젝트에 필요한 시간과 자원을 투입해야 할 것입니다."
 ehof_reality_code.111.name:0 "현실 코드 - 유독성 행성 발굴 I"
 ehof_reality_code.111.desc:0 "§H[from.planet.GetName]의§! 위험한 대기로부터 발굴 현장을 보호하기 위해 부식 및 열 저항성 재료로 만들어진 격리 돔이 제안된 드릴 샤프트 위치 주위에 건설되었습니다.\n\n소스가 지표 아래 몇십 킬로미터에 위치해 있기 때문에 일반적인 보링기를 사용하여 그 위치로 가는 터널을 뚫을 수 있습니다. 구멍이 뚫린 후에는 유인 연구 유닛이 구멍으로 내려가 소스를 조사할 것입니다.\n\n이제 발굴을 시작할 수 있습니다."
 ehof_reality_code.112.name:0 "현실 코드 - 유독성 행성 발굴 II"
 ehof_reality_code.112.desc:0 "보어가 송신기 위치까지 터널을 뚫는 작업을 마쳤습니다. 돌아온 후, 현장 팀이 직접 출처를 조사하기 위해 하강했습니다.\n\n위치 자체는 꽤 이상합니다. 출처 근처에서 지각 물자가 비어 있는 방으로 바뀌었고 중앙에는 일종의 팔면체 구조물이 있습니다.\n\n구조물은 어떤 형태의 뚫을 수 없는 방어막을 발산하는 것처럼 보입니다. 더 이상 탐사를 진행할 수 없게 된 상황에서, 물체 표면에 대한 초기 조사는 그것이 절대 영도보다 겨우 높은 온도의 알려지지 않은 물자로 구성되어 있음을 밝혀냈습니다. 이렇게 낮은 온도에서는 물체의 상태가 거의 시간에 얼어붙은 것으로 간주될 수 있습니다. 구조물이 어떻게 그리고 왜 이 온도에 도달할 수 있는지는 알 수 없습니다.\n\n스캐너는 구조물의 표면을 관통할 수 없으며 평균 필드 여기 이상의 방사선 징후를 감지하지 못합니다 - 그리고 $ehof_ep$의 전송만이 감지됩니다. 우리가 더 많은 정보를 알아내는 유일한 방법은 방어막을 뚫고 물체 내부로 들어가는 방법을 찾는 것입니다."
 ehof_reality_code.113.name:0 "현실 코드 - 유독성 행성 발굴 III"
 ehof_reality_code.113.desc:0 "객체에 접근하는 데 꽤 오랜 시간이 걸렸지만, 기다림은 보람이 있었습니다.\n\n여러 가지 방법을 시도한 끝에, 팀은 $ehof_ep$를 모방하는 주파수와 진폭의 중력전자기파 조합을 적용하여 객체가 반응하기를 바랐고, 실제로 반응했습니다!\n\n방어막이 꺼지고, 객체의 표면 중 하나에 입구가 나타났습니다. 팔면체 내부에서 팀은 믿을 수 없을 만큼 복잡한 메커니즘을 발견했습니다.\n\n집중적으로 연구한 결과, 그 구조의 전반적인 기능을 파악할 수 있었습니다. 그것은 $ehof_ep$의 원천이 아니라, 오히려 그것을 증폭하고 반복하는 장치입니다. 이 시퀀스는 중력전기파를 통해 같은 시스템 내의 $PGATE_GALACTIC$으로 전송되며, 그곳에서 완전히 소멸하는 것으로 보입니다.\n\n팀은 이 구조의 데이터뱅크에서 $ehof_epcs$의 조각을 성공적으로 추출했습니다.\n\n또한, 그들은 팔면체의 물자 구성에 대한 놀라운 발견을 했습니다. 그것은 주로 §HLiving Metal§! 및 §HNanites§!!와 여러 특성을 공유하는 새로운 자기 복제 및 자기 재생 물질로 만들어져 있습니다.\n\n전자의 경우처럼, 급격히 변화하는 환경 조건에서도 구조를 유지할 수 있으며; 후자의 경우처럼, 에너지와 물자를 흡수하여 스스로 복제할 수 있습니다. 흥미롭게도, 그것은 자신의 환경에 대한 어느 정도의 인식을 가지고 있는 것처럼 보이지만, 우리가 그것이 어떻게 그리고 어느 정도인지 정량화할 수는 없었습니다. 또한 §HDark Matter§! 및 $giga_sr_negative_mass$에 대해 비반응적이며 이를 활용할 수 없는 것으로 보입니다.\n\n이러한 특성에 기반하여, 그것은 여러 분야에서 놀라운 잠재력을 가지고 있습니다."
 code_2_cat:0 "현실 코드 - 조각난 행성"
 code_02_category_desc:0 "$ehof_epcs$의 또 다른 전송이 §H[this.GetName]§!의 §H[from.solar_system.GetName]§! 시스템에서 수신되었습니다. 이전 두 번과 마찬가지로, 전송은 함선을 비활성화했습니다. 그러나 이번에는 개선된 $ehof_closed_modular$가 몇 분 안에 함선의 기능을 복원할 수 있었습니다.\n\n$ehof_ep$ 스캐너는 시스템 내에서 전송의 출처를 식별할 수 있었습니다: 파괴된 행성 §H[from.GetName]§!. §H[this.GetName]§!에 탑재된 $ehof_ep$ 스캐너는 행성의 정확한 출처를 찾을 수 있지만, 그 과정에는 시간이 걸릴 것입니다."
 ehof_reality_code.201.name:0 "현실 코드 - 조각난 행성"
 ehof_reality_code.201.desc:0 "우리 팀은 §H[from.planet.GetName]§!에서 발신된 $ehof_ep$ 전송의 출처를 확인했습니다: 행성 잔해의 가장 큰 덩어리 깊숙한 곳입니다.\n\n이번 발굴은 첫 번째 발굴보다 더 도전적일 것입니다. 출처가 더 깊이 위치해 있을 뿐만 아니라, 행성의 중력장 내에서 위험하고 불안정한 조건 때문입니다. 우리가 발굴할 조각은 부서지거나 다른 조각과 충돌할 수 있습니다.\n\n주의가 필요합니다."
 code2_digsite:0 "현실 코드 - 조각난 행성 발굴"
 code2_digsite_desc:0 "우리 팀은 §H[from.planet.GetName]§!에서 발신된 $ehof_ep$ 전송의 기원을 확인했습니다: 행성 잔해의 가장 큰 조각 깊숙한 곳입니다.\n\n이번 발굴은 첫 번째 발굴보다 더 도전적일 것이며, 그 이유는 출처가 더 깊이 위치해 있을 뿐만 아니라, 이전 행성의 중력장 내에서 위험하고 불안정한 조건 때문입니다. 우리가 발굴하고 있는 조각은 경고 없이 부서지거나 다른 조각과 충돌할 수 있습니다.\n\n주의가 필요합니다."
 ehof_reality_code.211.name:0 "현실 코드 - 조각난 행성 발굴 I"
 ehof_reality_code.211.desc:0 "소행성 충돌 및 지진으로부터 발굴 현장을 보호하기 위해 에너지 장벽 및 대형 전자기장 전용 발전기를 여러대 설치하여 주변 물질의 영향에 의해 파괴되지 않는 일종의 고립된, 파편 물질로 이루어진 ‘섬’을 만들었습니다. 필요한 장치가 설치되었으며, 장치들을 전개시킬 준비가 되었습니다.\n\n파편 구조의 불안정성과 깊은 깊이로 인해 기존의 굴삭기로는 굴착이 불가능합니다. 대신, 특수 유인 굴착기가 탐사에 사용될 것입니다.\n\n신호의 근원에 도달할 때까지 파편 층을 파내려갈것입니다. \n\n특수 굴착기가 전개될 준비가 되었습니다."
 ehof_reality_code.212.name:0 "현실 코드 - 조각난 행성 발굴 II"
 ehof_reality_code.212.desc:0 "유인 굴착 장치가 $ehof_ep$ 전송의 기원에 도달했습니다. 이전 발굴과 마찬가지로, 이 장소는 팔면체 물체를 둘러싼 구조적 공허입니다. 이는 팔면체가 다른 다면체와 비교하여 알려지지 않은 목적을 수행한다는 추정을 이끌어내며, 이후의 장소들도 같은 방식으로 구성될 것이라는 결론에 이릅니다.\n\n출처의 스캔 결과는 첫 번째와 동일하므로, 우리 팀은 이전에 사용했던 동일한 \"암호\"로 이를 열어보려고 합니다."
 ehof_reality_code.213.name:0 "현실 코드 - 조각난 행성 발굴 III"
 ehof_reality_code.213.desc:0 "옥타헤드론에 들어가기 위한 단계는 동일했지만, 실제로 접근하는 데는 상당한 시간이 걸렸습니다.\n\n이전 소스에서 사용했던 중력전자기 파장에는 반응하지 않았습니다. 그러나 새로운 주파수와 진폭으로 추가 파장을 조정한 후, 팀은 올바른 키를 찾았습니다.\n\n내부에 들어가자 팀은 또 다른 $ehof_epcs$ 조각을 추출했습니다. 이를 첫 번째와 두 번째 조각과 결합하여 옥타헤드론의 데이터뱅크에 제한적으로 접근하고 $ehof_ep$, $PGATE_GALACTICS$, $giga_sr_sentient_metal$에 대한 정보를 검색할 수 있었습니다.\n\n$PGATE_GALACTICS$는 $ehof_epcs$를 위한 항성 간 송신기로 작용합니다. 알려진 모든 $PGATE_GALACTICS$가 휴면 상태인 것으로 보아, $ehof_ep$의 특정 속성이 이들을 활성화한다고 추정할 수 있습니다.\n\n팀은 또한 $giga_sr_sentient_metal$에 대한 정보를 발견했습니다. 이 물자는 놀라운 적응성과 인식을 책임지는 고급 분산 지능에 의해 관리되는 것으로 보입니다. 그들은 지역 지능 네트워크에 새로운 명령을 제공할 수 있었고, 그로 인해 옥타헤드론이 동등한 질량의 삼각형 피라미드로 재조합되었습니다.\n\n이 발견은 자가 치유 선박 갑옷이나 초강인 건축 자재와 같은 특수화된 $giga_sr_sentient_metal$ 부품 개발로 이어질 수 있으며, 이는 그 잠재적 응용의 표면을 긁어내는 것에 불과합니다.\n\n팀은 이제 표면으로 돌아갈 준비가 되었습니다."
 code_3_cat:0 "현실 코드 - 얼음 행성"
 code_03_category_desc:0 "§H[this.GetName]§!는 §Hfrom.solar_system.GetName]§! 시스템 내에서 $ehof_epcs$의 또 다른 전송을 기록했습니다. 탑재된 [Owner.GetScientistPlural]은 전송이 §H[from.GetName]§!라는 이름의 얼어붙은 행성에서 발생했음을 확인했습니다.\n\n행성의 정확한 위치는 추가 조사를 통해 확인해야 합니다."
 ehof_reality_code.301.name:0 "현실 코드 - 얼음 행성"
 ehof_reality_code.301.desc:0 "§H[root.GetName]§!은(는) §H[from.planet.GetName]§!에서 $ehof_ep$ 송신기의 위치를 확인했습니다.\n\n이전 두 개와 마찬가지로, 이번에는 북극 얼음층과 행성의 지각 아래에 묻혀 있으며, 이 송신기가 위치한 깊이는 계속해서 증가하고 있습니다. 세계의 얼음 표면을 뚫기 위해서는 전문 도구가 필요할 것입니다."
 code3_digsite:0 "현실 코드 - 얼음 행성 발굴"
 code3_digsite_desc:0 "우리 팀은 §H[from.planet.GetName]§!에 있는 $ehof_ep$ 송신기의 위치를 확인했습니다.\n\n이전 두 개와 마찬가지로, 이번에는 북극 얼음층과 그 아래의 행성 지각에 묻혀 있으며, 이 송신기가 위치한 깊이는 계속해서 증가하고 있습니다. 세계의 얼음 표면을 뚫기 위해서는 특수 도구가 필요할 것입니다."
 ehof_reality_code.311.name:0 "현실 코드 - 얼음 행성 발굴 I"
 ehof_reality_code.311.desc:0 "굴착 장소를 낮은 온도로부터 보호하기 위해 열 전도력이 약한 거대한 돔이 설치되었으며, 열을 돔의 내부에 가둘 것입니다. 굴착 장비가 설치되었고 배치 준비를 마쳤습니다. 행성의 얼어붙은 표면과 지각, 그리고 발원지의 깊이 때문에, 특화된 유인 드릴 장치가 굴착을 위해 사용될 것입니다. 그것은 증폭기가 있는 위치에 도달할 때 까지 행성의 지각과 외부 맨틀을 뚫고 발원지에 접근할 것입니다. 이제 장치를 배치할수 있습니다."
 ehof_reality_code.312.name:0 "현실 코드 - 얼음 행성 발굴 II"
 ehof_reality_code.312.desc:0 "유인 드릴 장치가 발원지의 위치에 도달했다고 보고했습니다. 모든 것이 이전 두 번의 사례와 비슷합니다. 텅 빈 공간 내부에 증폭기가 있었습니다. 드릴 장치의 승무원은 증폭기의 내부로 진입할 절차에 착수할 준비가 되었습니다."
 ehof_reality_code.313.name:0 "현실 코드 - 얼음 행성 발굴 III"
 ehof_reality_code.313.desc:0 "팀은 난이도 없이 팔면체에 들어가 $ehof_ep$의 또 다른 조각을 추출할 수 있었습니다.\n\n그 조각을 사용하여 송신기의 시스템에 더 접근하고 $PGATE_GALACTICS$에 대한 정보를 발견했습니다 - 특히, 그것들을 활성화하는 방법입니다!\n\n놀랍지 않게도, $ehof_epcs$는 이러한 이상한 구조물을 활용하는 열쇠입니다. $ehof_ep$를 운반하는 중력전자기파는 $PGATE_GALACTIC$을 활성화하기 위해 특정한 진폭과 주파수를 가져야 합니다. 허용 가능한 매개변수에서 약간만 벗어나도 $PGATE_GALACTIC$은 들어오는 $ehof_ep$ 전송을 무시할 것이며, 이는 다른 우주 현상이 우연히 $PGATE_GALACTICS$를 활성화하는 것을 방지하기 위한 것으로 보입니다.\n\n팀은 또한 $giga_sr_sentient_metal$에 대한 더 고급 제어 스키마를 찾을 수 있었습니다. 그들은 $giga_sr_sentient_metal$을 사용하여 다른 물자들로 만들어진 구조물을 건설하거나 수리하는 것이 이제 가능할 수 있다고 믿고 있으며, 단지 일치하는 물질의 저장소가 제공된다면 가능합니다.\n\n팀은 지표면으로 돌아갈 준비를 하고 있습니다."
 code_4_cat:0 "현실 코드 - 용암 행성"
 code_04_category_desc:0 "우리의 감지기가 또 다른 $ehof_epcs$ 전송을 탐지했습니다. 이번에는 §H[from.solar_system.GetName]§! 항성계에서 보낸 것입니다. 이전 전송들과 마찬가지로, 이번 전송도 거주 불가능한 지구형 천체에서 발신되었습니다. 이번 경우는 §H[from.GetName]§!라는 이름의 용암 행성입니다.\n\n조사 및 발굴 팀을 동원해야 합니다."
 ehof_reality_code.401.name:0 "현실 코드 - 용암 행성"
 ehof_reality_code.401.desc:0 "§H[root.GetName]§!에 탑승한 [Owner.GetScientistPlural]이(가) $ehof_ep$ 송신기가 §H[from.planet.GetName]§! 내부에 위치한 곳을 확인했습니다.\n\n이번에도 행성 깊숙이 박혀 있으며, 이번에는 초기 지질 스캔 결과 맨틀에 위치한 것으로 나타났습니다. 그러나 §H[from.planet.GetName]§!와 같은 용융 세계의 경우 "맨틀"과 "지각" 사이에 확실한 경계가 없습니다. 과열된 대기와 액체 암석 표면으로 인해 송신기로 나아가기 전에 발굴 현장을 안정화해야 합니다."
 code4_digsite:0 "현실 코드 - 용암 행성"
 code4_digsite_desc:0 "우리 조사선에 탑승한 [Owner.GetScientistPlural]가 §H[from.planet.GetName]§! 내부에 $ehof_ep$ 송신기가 위치한 곳을 확인했습니다.\n\n이번에도 행성 깊숙이 박혀 있으며, 이번에는 초기 지질 스캔 결과 맨틀에 위치하고 있습니다 - 그러나 §H[from.planet.GetName]§!와 같은 용융 세계의 경우 \"맨틀\"과 \"지각\" 사이에 확실한 경계가 없습니다. 과열된 대기와 액체 암석 표면으로 인해 송신기로 나아가기 전에 발굴 현장을 안정화해야 합니다."
 ehof_reality_code.411.name:0 "현실 코드 - 용암 행성 발굴 I"
 ehof_reality_code.411.desc:0 "발굴 현장을 §H[from.planet.GetName]§!의 행성 세력으로부터 보호하기 위해, 팀은 먼저 작은 얼음 소행성을 표면에 끌어당겨 떨어뜨린 다음, 에너지 장벽과 용암 펌프를 설치하여 결과적으로 생긴 섬을 더욱 고립시켰습니다. 이러한 조치에도 불구하고, 현장은 여전히 위험합니다.\n\n행성의 특성상, $ehof_ep$ 송신기에 도달하기 위해서는 이전 탐사와는 다른 접근 방식이 필요합니다: 용암으로 이루어진 이 행성은 굴착기(굴착할 것이 없기 때문에), 유인 차량(너무 위험함), 원격 드론(신호 간섭이 너무 심함)의 사용을 불가능하게 합니다.\n\n팀의 현재 제안은 중무장된 반자율 드론을 송신기까지 침수시키는 것으로, 이 드론은 먼저 송신기의 방패를 비활성화할 수 있는 중력 전자기 \"암호\"를 찾아낸 다음, 송신기의 로컬 네트워크에 명령을 보내어 송신기가 표면으로 올라오게 할 것입니다.\n\n이러한 접근 방식은 몇 년 전만 해도 실행 불가능했겠지만, $giga_sr_sentient_metal$ (드론을 덮기 위해), $giga_sr_negative_mass$ (드론을 보호하기 위해), 그리고 $ehof_ep$ (드론을 제어하기 위해)에 대한 우리의 진화하는 이해는 이를 실행 가능하게 만들었습니다."
 ehof_reality_code.412.name:0 "현실 코드 - 용암 행성 발굴 II"
 ehof_reality_code.412.desc:0 "팀이 자율 드론의 구성을 완료하였으며 §H[from.planet.GetName]§!의 용융된 바다에 배치할 준비가 되었습니다."
 ehof_reality_code.413.name:0 "현실 코드 - 용암 행성 발굴 III"
 ehof_reality_code.413.desc:0 "유인 굴삭팀이 증폭기에 도달했다는 보고가 들어왔습니다. 굴삭팀의 팀원들이 증폭기에 들어갈때 수행해야 하는 필수단계들을 수행할 준비를 하고 있습니다."
 ehof_reality_code.414.name:0 "현실 코드 - 용암 행성 발굴 IV"
 ehof_reality_code.414.desc:0 "모든 것이 계획대로 진행되었습니다! 증폭기가 예상대로 수면 위로 떠올랐고, 팀은 이를 섬 기지에 고정했습니다. 고정이 완료되자 팀은 내부로 들어가 $ehof_epcs$의 또 다른 조각을 무사히 추출했습니다.\n\n분석 결과, 이 조각들은 $ehof_ep$의 특정하고 독특한 표현의 일부로, 단순히 $PGATE_GALACTICS$를 활성화하는 다른 전송들과는 다릅니다. 불행히도, 이 시퀀스는 아직 완전하지 않은 것처럼 보이며, 우리의 [Owner.GetScientistPlural]조차도 우리가 이를 완성했을 때 어떤 결과가 나올지 확신하지 못하고 있습니다.\n\n우리는 $giga_sr_sentient_metal$에 대해서도 더 많은 사실을 알게 되었습니다: 특히, 이 물질을 지배하는 분산 지능이 어떻게 이로부터 입력을 받는지에 대한 것입니다.\n\n이제 우리는 이 물질의 구성 입자가 신경세포, 눈, 손 역할을 한다는 것을 알고 있습니다 - 지능은 물질 자체에 내재되어 있습니다. 지금까지 우리가 본 $giga_sr_sentient_metal$의 양과 그 적응력으로 볼 때, 이 하이브 마인드의 계산 능력은 우리 최대의 컴퓨터 네트워크를 능가할 것입니다.\n\n이 새로운 지식을 바탕으로, 우리는 분산 지능이 직접 관리하고 우리가 $ehof_ep$를 통해 제공하는 고차원 지시로 간접적으로 제어되는 시스템을 만들 수 있을지도 모릅니다. 하이퍼 복잡한 하이브 마인드에 의해 제어되는 무기, 함선 및 구조물은 우리가 가진 어떤 것보다 훨씬 더 빠르게 반응하고 적응할 수 있을 것입니다."
 code_5_cat:0 "현실 코드 - 거대 가스 행성"
 code_05_category_desc:0 "§H[this.GetName]§!는 §H[from.solar_system.GetName]§! 시스템의 거대 가스 행성 §H[from.GetName]§!에서 발생한 $ehof_ep$ 전송을 감지했습니다. 송신기를 찾기 위해 팀을 배정해야 합니다."
 ehof_reality_code.501.name:0 "현실 코드 - 거대 가스 행성"
 ehof_reality_code.501.desc:0 "우리가 이전에 만난 모든 $ehof_ep$ 송신기와 마찬가지로, 이번 송신기도 행성 내부 어딘가에 위치해 있습니다 - 이번에는 북극 아래의 금속 수소에 박혀 있습니다.\n\n그러나 거대 가스 행성의 특성 때문에, 이 송신기에 도달하는 것은 이전의 발굴보다 훨씬 더 큰 도전이 됩니다. 이전의 지구형 행성과 비교했을 때, §H[from.planet.GetName]§!의 크기만으로도 송신기에 도달하기 위해서는 열 배의 거리를 이동해야 합니다. 행성의 가스와 액체 층을 통과해야 한다는 점은 추가적인 복잡성을 더합니다."
 code5_digsite:0 "현실 코드 - 거대 가스 행성 발굴"
 code5_digsite_desc:0 "우리가 이전에 만난 모든 $ehof_ep$ 송신기와 마찬가지로, 이번 송신기도 행성 내부 어딘가에 위치해 있습니다. 이번에는 북극 아래 깊은 곳의 금속 수소에 내장되어 있습니다.\n\n그러나 거대 가스 행성의 특성 때문에, 이 송신기에 도달하는 것은 이전의 발굴보다 훨씬 더 큰 도전이 됩니다. 이전의 지구형 행성과 비교했을 때, §H[from.planet.GetName]§!의 크기만으로도 송신기에 도달하기 위해서는 열 배의 거리를 이동해야 합니다. 또한 행성의 가스와 액체 층을 통과해야 한다는 점은 추가적인 복잡성을 더합니다."
 ehof_reality_code.511.name:0 "현실 코드 - 거대 가스 행성 발굴 I"
 ehof_reality_code.511.desc:0 "전송기를 도달하기 위해, 우리 팀은 먼저 작전 기지를 건설했습니다 - 본질적으로, 모든 면에 스러스터가 장착된 우리의 우주 정거장 중 하나입니다. 이는 §H[from.solar_system.GetName]§!에서 §H[from.planet.GetName]§!로 향하고 있습니다.\n\n행성의 외부 대기에 도달하면, 전송기 위의 지점으로 항해하여 이전 발굴에서 사용된 것과 유사한 반자율 드론을 배치할 것입니다."
 ehof_reality_code.512.name:0 "현실 코드 - 거대 가스 행성 발굴 II"
 ehof_reality_code.512.desc:0 "팀은 드론이 발사를 준비했다고 보고했습니다. 우리의 [Owner.GetEngineerPlural]는 실험적인 $giga_sr_negative_mass$ 스러스터를 추가하기로 결정했습니다. 이는 드론이 아래의 수많은 킬로미터의 가스와 액체를 통과하는 과정을 가속화하고, §H[from.planet.GetName]§!의 조수가 드론을 이탈시키더라도 경로를 수정할 수 있도록 보장할 것입니다."
 ehof_reality_code.513.name:0 "현실 코드 - 거대 가스 행성 발굴 III"
 ehof_reality_code.513.desc:0 "드론이 큰 사고 없이 $ehof_ep$ 송신기에 도착했습니다. 이전 송신기들과 마찬가지로, 이 송신기도 주변에 공간의 공허를 유지하는 방패로 보호받고 있습니다. 이번 경우에는 외피 물자가 내부의 팔면체를 묻는 것을 방지하는 대신, 방패가 §H[from.planet.GetName]§!의 대기에서 발생하는 엄청난 압력이 수천 년 동안 그곳에 있었던 팔면체를 부수는 것을 막고 있습니다.\n\n드론은 이제 송신기의 방패가 비활성화될 때까지 중력전자기파 테스트를 시작할 것이며, 그 시점에서 노출된 송신기에 동일한 표면 명령을 전송할 것입니다."
 ehof_reality_code.514.name:0 "현실 코드 - 거대 가스 행성 발굴 IV"
 ehof_reality_code.514.desc:0 "한 번 수면 위로 드러난 후, 현장 팀은 증폭기에 접근하여 또 다른 조각을 추출할 수 있었습니다. $ehof_epcs$에 대한 지금까지 수집한 정보에 따르면, 우리의 [Owner.GetScientistPlural]는 거의 완전하다고 믿고 있습니다!\n\n송신기의 데이터 뱅크에 접근함으로써, 팀은 마침내 전체 시퀀스의 목적을 파악할 수 있었습니다. $PGATE_GALACTIC$에 전체 $ehof_epcs$가 전송되면, 그것은 원래 $ehof_ep$의 출처와 접촉을 시도할 것입니다 - 그리고 우리는 그 전송을 사용하여 출처의 위치를 파악할 수 있습니다!\n\n팀은 또한 $giga_sr_sentient_metal$ 군체 의식과 우리가 만난 고대 구조물이 어떻게 전력을 공급받는지에 대한 정보를 찾을 수 있었습니다. $ehof_ep$ 송신기, 특히 $PGATE_GALACTICS$가 막대한 양의 에너지를 소모하는 것은 분명하지만, 우리는 그 에너지가 어디에서 오는지 결코 파악할 수 없었습니다. 아직 확실하지는 않지만, 우리는 둘 다 어떤 형태의 내부 에너지 저장이나 생산을 가지고 있지 않다는 것을 확인할 수 있었습니다 - 그들이 사용하는 에너지는 단순히 어디서도 나오지 않는 것처럼 보입니다. 이는 그들이 어떤 형태의 거시적 비국소성을 사용한다는 것을 나타낼 수 있으며, 이는 우리의 [Owner.GetScientistPlural]가 오랫동안 불가능하다고 믿어온 것입니다."
 code_6_cat:0 "현실 코드 - 별"
 code_06_category_desc:0 "§H[root.solar_system.GetName]§! 항성계에 진입하자, §H[this.GetName]§!에서 $ehof_ep$ 신호가 감지되었습니다. 하지만 이상하게도 이번 신호는 항성계 중심에 있는 놀랍도록 큰 갈색 왜성에서 발생했습니다.\n\n이렇게 거의 준항성인 물체의 내부를 조사하는 것은 벅차지만, 우리는 그 출처를 찾아야 하며 $ehof_epcs$를 완료해야 합니다."
 ehof_reality_code.601.name:0 "현실 코드 - 별"
 ehof_reality_code.601.desc:0 "우리는 송신기의 정확한 위치를 파악했습니다. 그러나 실제로 그곳에 도달하는 것은 전혀 다른 문제입니다. 갈색 왜성의 엄청난 크기와 그 안의 믿을 수 없는 밀도 및 온도는 이 프로젝트를 극도로 어렵게 만들 것입니다. 이 프로젝트의 예상 시간과 자원 비용은 엄청나지만, $ehof_epcs$를 완성하고 그 기원을 찾는 것은 어떤 비용을 치르더라도 가치가 있습니다."
 code6_digsite:0 "현실 코드 - 항성 발굴"
 code6_digsite_desc:0 "우리는 송신기의 정확한 위치를 확인했습니다. 하지만 실제로 그곳에 도달하는 것은 전혀 다른 문제입니다. 갈색 왜성의 엄청난 크기와 그 안의 믿을 수 없는 밀도와 온도로 인해 이 프로젝트는 매우 어려울 것입니다. 이 프로젝트의 예상 시간과 자원 비용은 엄청나지만, $ehof_epcs$를 완성하고 그 기원을 찾는 것은 어떤 비용을 치르더라도 가치가 있습니다."
 ehof_reality_code.611.name:0 "현실 코드 - 항성 발굴 I"
 ehof_reality_code.611.desc:0 "거대 가스 행성 발굴과 마찬가지로, 우리는 §H[from.planet.GetName]§!'s 광구에 작전 플랫폼을 배치했습니다. 그곳에서 유인 선박을 배치할 예정입니다 - 본질적으로는 송신기의 복제본으로, 대부분의 내부가 전력 생성에 할당됩니다. 초기 제안은 이전 두 번의 발굴에서 사용했던 것과 같은 무인 드론을 활용할 계획이었지만, 우리의 중력 전자기 투사 기술은 여기서 필요한 거리만큼 $ehof_ep$ 제어 코드를 방송할 만큼 강력하지 않습니다... 특히 그 거리가 고밀도의 분자 수프로 가득 차 있을 때는 더욱 그렇습니다.\n\n우리의 재료 과학은 아직 $ehof_ep$ 송신기에서 사용되는 기술과는 거리가 멀지만, 그 송신기에서 배운 것 덕분에 우리의 장비는 손상되지 않을 것이며 (그리고 우리의 [Owner.GetScientistPlural]도 안전할 것입니다) 이 될 수 있었던 별의 깊이를 탐구할 수 있습니다."
 ehof_reality_code.612.name:0 "현실 코드 - 항성 발굴 II"
 ehof_reality_code.612.desc:0 "닻이 근원지에 도달했습니다. 닻은 고정되었고 시설과의 연결이 안정화되었습니다.\n\n엘레베이터 장치의 사용이 가능합니다."
 ehof_reality_code.613.name:0 "현실 코드 - 항성 발굴 III"
 ehof_reality_code.613.desc:0 "엘레베이터 장치는 증폭기에 도달했다고 보고했습니다. 다른 행성들과 동일하게 증폭기 주변에 보호막이 공간을 유지시키고 있습니다. 하지만 행성의 내부 물질이 장치를 파괴하지 못하게 하는 대신 별의 압력과 대기가 파괴하지 못하게 합니다. 우리 팀은 장치에 진입할 준비가 되었습니다."
 ehof_reality_code.614.name:0 "현실 코드 - 항성 발굴 IV"
 ehof_reality_code.614.desc:0 "잠수 팀이 무사히 돌아왔습니다! 그들은 증폭기에 접근하여 $ehof_epcs$의 마지막 조각을 추출할 수 있었습니다.\n\n이제 그것을 소유하게 되었으니, 우리는 드디어 $ehof_epcs$를 조립하고 그 진정한 기원을 찾을 수 있습니다."
 ehof_reality_code.1000.name:0 "현실 코드 - 근원"
 ehof_reality_code.1000.desc:0 "수년간 $ehof_epcs$의 모든 조각을 찾은 끝에, 우리는 마침내 그것을 조립했습니다. $PGATE_GALACTIC$에서 이 완성된 시퀀스를 방송하자, 이전에 본 적 없는 방식으로 반응했습니다. 그것은 불분명한 방향으로 새로운 "답변" 시퀀스를 전송했습니다.\n\n하지만 이 전송 직후, 최종 $ehof_ep$ 발굴 현장을 정리 중인 우리 팀은 갈색 왜성 깊은 곳에서 알람을 울리는 에너지 급증을 보고했습니다 - 그리고 그 직후, 중간 부분의 구름이 갈라지며 주황색 번개가 튀어나왔습니다. 우리가 오래 전에 보았던 것처럼, 이 번개는 시스템의 가장자리를 향해 믿을 수 없을 만큼 빠른 속도로 날아갔습니다. 우리의 과학 선박이 마침내 그 흔적을 따라잡았을 때, 그 뒤에 남겨진 초공간 통로를 발견했습니다. 아마도 그것의 폭력적인 에너지에 의해 드러난 것일 것입니다.\n\n우리는 이 초공간 통로의 반대편에 무엇이 있는지 알지 못하지만, $ehof_ep$의 기원일 것이라고 강하게 의심하고 있습니다."
 ehof_reality_code.10001.name:0 "항성 근절자"
 ehof_reality_code.10001.desc:0 "드디어 §H[root.GetStarName]§!에 도달했습니다. 이는 $ehof_ep$의 기원 시스템입니다.\n\n이 시스템은 거대한 블랙홀과 그 주위를 도는 하나의 천체로 구성되어 있습니다: 직경이 수백만 킬로미터에 달하는 거대한 구형 메가구조물입니다. 이 구조물은 분명 자연적인 기원이 아니며, 우리가 이전에 접한 적 없는 함선에 의해 방어되고 있는 것으로 보입니다.\n\n이 \"항성 근절자\"는 중무장한 것으로 보이므로 조심스럽게 접근해야 합니다!"
 ehof_reality_code.10002.name:0 "근절자를 근절하다"
 ehof_reality_code.10002.desc:0 "우리가 항성 제거기를 파괴하려던 찰나, 그것은 긴급 초공간 점프를 실행하고 흔적도 없이 사라졌습니다. 이제 그것이 사라졌으니, 우리는 우리의 임무를 재개할 수 있습니다.\n\n거대 구조물의 표면에 대한 간단한 분석 결과, 거대한 파도가 지속적으로 그러나 불규칙하게 표면을 가로지르고 있으며, 짧은 수명의 고에너지 입자가 지속적으로 방출되고 있음을 보여줍니다. 우리가 $ehof_cohesive$ 시스템 내에서 만난 다른 구조물들과 마찬가지로, 이 거대 구조물의 표면은 진정으로 헤아릴 수 없는 양의 $giga_sr_sentient_metal$로 이루어져 있을 가능성이 높습니다. 이 가설을 검증하려는 시도는 불행히도 실패로 돌아갔으며, 격렬한 에너지 방출이 우리의 스캐너를 혼란스럽게 합니다.\n\n주 표면과는 구별되는 두 개의 원형 지역이 $ehof_the_sphere$를 가로지르며, 각각의 "극"에 위치해 있습니다. 나머지 표면과는 달리, 이 지역들은 정적입니다. $PGATE_GALACTICS$에서 보았던 것과 동일한 대형 문양이 이 두 지역의 중앙에 자리잡고 있습니다.\n\n특히 영감을 받은 [Owner.GetScientist]가 이 구조물을 "$ehof_the_sphere_named$"라고 부르기 시작했습니다."
 ehof_reality_code.10002.a:0 "정말 놀랍군!"
 code_final_digsite:0 "현실 코드 - $ehof_the_sphere_named$"
 code_final_digsite_desc:0 "$ehof_the_sphere$에 들어가는 방법을 찾는 것은 불가능한 작업처럼 보입니다.\n\n그냥 힘으로 밀고 들어가려는 시도는 헛수고일 것입니다. 표면 전체는 정의된 온도가 없지만, 그 위를 가로지르는 파동에 해당하는 개별 지역은 온도가 존재합니다. 이들의 온도는 절대 영도에 가까운 것부터 수십만 도에 이르기까지 불규칙하게 변동합니다. 표면에 닿기만 해도 어떤 장비든 순식간에 파괴될 것입니다.\n\n대신, 우리의 [Owner.GetResearchers]는 $ehof_epcs$를 사용할 것을 제안합니다. 이는 송신기와 $PGATE_GALACTICS$에 접근하는 열쇠였으므로, $ehof_the_sphere$와도 상호작용할 수 있게 해줄 것입니다.\n\n현재 제안은 $ehof_the_spheres$ 꼭대기에 있는 캡스톤 위에 $ehof_epcs$ 송신기 파일론을 하나 건설하여 이 접근 방식을 검증한 후 더 진행하는 것입니다."
 ehof_reality_code.1001.name:0 "현실 코드 - $ehof_the_sphere_named$ I"
 ehof_reality_code.1001.desc:0 "송신기 파일론은 $ehof_the_sphere$를 여는 데 부분적으로 성공했습니다.\n\n중력전자기 캐리어 파를 통해 $ehof_epcs$를 방송하자, $ehof_the_spheres$가 반응했습니다. 아래 극에서는 1미터의 미세한 틈이 열렸지만, 단 1초 동안만이었습니다. 방송을 계속했음에도 불구하고 입구는 다시 봉인되었고, $ehof_epcs$를 재전송해도 다시 나타나게 할 수는 없었습니다.\n\n우리는 이제 우리의 접근 방식이 가장 일반적인 의미에서 작동한다는 것을 알게 되었지만, $ehof_the_sphere$로의 입구를 안정화하기 위해 추가적인 파일론을 건설해야 한다는 것도 알고 있습니다."
 ehof_reality_code.1002.name:0 "현실 코드 - $ehof_the_sphere_named$ II"
 ehof_reality_code.1002.desc:0 "우리가 $ehof_the_sphere$를 뚫으려는 시도가 진행되었습니다. 여러 개의 추가 방출기 파일론을 배치하고 $ehof_epcs$ 방송을 주기적으로 송출한 결과, 구조물 상단의 개구부 크기가 증가했습니다.\n\n전송 소스의 수에 비례하여 개구부의 크기가 기하급수적으로 증가하는 것으로 보입니다: 두 번째 파일론을 추가하니 입구의 반경이 16미터로 증가하고 16초 동안 유지되었으며, 세 번째 파일론을 추가하니 반경이 81미터로 증가하고 같은 시간 동안 유지되었습니다. 네 번째 파일론을 추가하니 반경이 256미터로 증가하고 같은 초 동안 유지되었습니다.\n\n이 결과를 바탕으로 우리의 [Owner.GetScientistPlural]는 입구가 테서랙트 방식으로 확장된다고 믿고 있습니다. 성장 속도를 기준으로 할 때, $ehof_the_sphere$를 완전히 열기 위해서는 32개의 파일론이 필요할 것입니다."
 ehof_reality_code.1003.name:0 "현실 코드 - $ehof_the_sphere_named$ III"
 ehof_reality_code.1003.desc:0 "우리 [Owner.GetScientistPlural]의 가설이 옳았음이 증명되었습니다.\n\n서른두 개의 기둥이 모두 $ehof_epcs$를 합창하듯 노래하며, 캡스톤의 표면을 완전히 벗겨냈습니다. 기본 규칙이 변경되지 않았다면, 캡스톤은 약 열두 갈락틱 표준일 동안 열려 있을 것입니다.\n\n$ehof_the_spheres$ 캡스톤 너머에는 $giga_sr_sentient_metal$의 구분되지 않은 평원이 있습니다. 이것은 일종의 최종 시험인 것 같습니다 - 우리는 물자의 네트워크 지능에 대한 지식을 활용하여, 그것이 옆으로 이동하고 캡스톤을 열어 두도록 재프로그래밍해야 할 것입니다."
 ehof_reality_code.1004.name:0 "현실 코드 - $ehof_the_sphere_named$ IV"
 ehof_reality_code.1004.desc:0 "$giga_sr_sentient_metal$을(를) 조종하려는 초기 시도가 실패했습니다. 표면은 겉보기에는 안정적인 것처럼 보이지만, 하층은 본질적으로 현재의 형태로 끊임없이 그리고 능동적으로 재형성되고 있습니다. 이는 단순히 정상적인 재생 특성이 작용하는 것이 아니라, 우리가 전송한 명령이 작동했을 것입니다. 오히려, 집단 정신의 지역 네트워크 자체가 끊임없이 변화하고 있으며, 우리가 보내는 명령은 밀리초 후에 덮어씌워지고, 그들이 구조에 가하는 조정은 무효화됩니다.\n\n마지막 기회가 닫히기 전에 단 10일만 남았습니다. 이 기회를 영원히 잃을 수도 있습니다."
 ehof_reality_code.1005.name:0 "현실 코드 - $ehof_the_sphere_named$ V"
 ehof_reality_code.1005.desc:0 "단 며칠이 남지 않은 상황에서, 팀은 실험적인 슈퍼컴퓨터를 프로토타입하고 배치했습니다. 그 핵심에는 우리가 자체 기술과 얽힌 $giga_sr_sentient_metal$의 밀집 네트워크가 자리 잡고 있습니다. 이는 우리가 만들 수 있는 가장 이상적인 컴퓨터 물질에 가깝습니다. 비록 $giga_sr_sentient_metal$의 전반적인 융통성은 부족하지만, 그 원시적인 계산 능력은 물자의 독립적인 하이브 마인드를 기하급수적으로 초월합니다.\n\n현재 이 시스템은 $ehof_the_spheres$ 극지 캡스톤에 배치되고 있습니다. 운이 좋다면, 지역 네트워크의 재계산을 초월하고 $giga_sr_sentient_metal$ 봉인을 더 끈질기게 재형성할 수 있을 것입니다."
 ehof_reality_code.1006.name:0 "현실 코드 - $ehof_the_sphere_named$ VI"
 ehof_reality_code.1006.desc:0 "완료되었습니다. $ehof_the_sphere$가 열렸습니다.\n\n그들은 시인을 보냈어야 했습니다.."
 ehof_reality_code.005.name:0 "현실 코드 - $giga_sr_sentient_metal$"
 ehof_reality_code.005.desc:0 "우리 [Owner.GetScientistPlural]는 우리가 발견한 물자를 $giga_sr_sentient_metal$이라고 명명했습니다. 그들이 파악한 정보에 따르면, 우리의 과학 공동체는 이것이 상상할 수 없는 잠재력을 가지고 있다고 확신하고 있습니다.\n\n하지만 현재로서는 그 사용이 우리의 이해만큼이나 제한적입니다. 우리의 [Owner.GetEngineerPlural]는 기존의 $giga_sr_sentient_metal$ 샘플을 §HAlloys§!와 §HEnergy§!를 공급하여 복제할 전문 전파 시설에 대한 초기 설계를 작성했습니다.\n\n또한, 우리의 [Owner.GetScientistPlural]가 이 신비로운 구조물이 $giga_sr_sentient_metal$로 구성되어 있을 수 있다고 믿게 되면서 $PGATE_GALACTIC$를 재조사하는 프로젝트가 제안되었습니다."
 ehof_reality_code.004.name:0 "현실 코드 - Activation"
 ehof_reality_code.004.desc:0 "우리 [Owner.GetResearchers]가 $ehof_ep$ 송신기로부터 수집한 지식 덕분에, 이제 $PGATE_GALACTICS$를 활성화하는 방법을 알게 되었습니다. 우리 [Owner.GetResearchers]는 이미 우리의 우주선 송신기에 필요한 증강 장치를 개발하기 시작했습니다. $PGATE_GALACTIC$이 활성화될 때 정확히 어떤 일이 발생하는지는 알 수 없지만, 우리는 그것을 활성화하는 방법만 알고 있습니다!"
 ehof_precursor:0 "상형문자"
 ehof_precursor_digsite_desc:0 "§H[from.Planet.GetName]§!에 미스터리 서클과 유사하지만 행성 표면 자체에 새겨져있는 거대한 상형문자를 발견했습니다.\n\n확실히 조사할 가치가 있을 것 같습니다."
 ehof_megastructure.0051.name:0 "상형문자 I"
 ehof_megastructure.0051.desc:0 "§H[this.GetName]§!의 승무원들이 행성 북극을 둘러싼 산맥 바로 남쪽에 위치한 가장 큰 지오글리프 주변에 착륙하여 캠프를 설치했습니다.\n\n즉각적으로 이 지오글리프가 무엇인지, 누가 여기에 놓았는지를 알아내는 데 생각이 집중됩니다. 몇 차례의 논의 끝에 [Owner.GetScientistPlural]이(가) 공기와 지면 샘플을 테스트하고 지오글리프 자체의 표면 스캔을 진행하기 시작했습니다."
 ehof_megastructure.0052.name:0 "상형문자 II"
 ehof_megastructure.0052.desc:0 "시간이 좀 지나 [Owner.GetScientistPlural]가 §H[from.Planet.GetName]§!의 표면을 덮고 있는 지오글리프를 조사하기 시작했지만, 그들은 의미 있는 진전을 이루지 못했습니다.\n\n팀은 난감해하며 임무를 실패로 선언했습니다. 그들은 극지점을 정리하고 배에 탑승하기 시작했습니다.\n\n§H[this.leader.GetName]§!는 행성을 떠날 것을 명령했고, §H[this.GetName]§!는 궤도로 상승하기 시작했습니다 - 그러나 상승하는 동안 과학 팀은 그들이 몇 주 동안 착륙해 있었던 바로 그 글리프가 희미한 주황색으로 빛나는 것을 발견했습니다. 다른 글리프들은 그렇지 않았습니다."
 ehof_megastructure.0053.name:0 "상형문자 III"
 ehof_megastructure.0053.desc:0 "§H[this.leader.GetName]§!는 상승을 중단하고 지면으로 돌아왔습니다. §H[this.GetName]§!가 하강함에 따라 기호의 주황색 빛이 점점 더 강해지며 우주선이 점점 가까워졌습니다.\n\n이러한 전개에 혼란스러운 팀은 행성을 한 바퀴 돌기로 결정하고, 낮은 고도로 모든 기호 위를 비행하며 지나갈 때마다 각 기호가 점등되는 모습을 지켜보았습니다.\n\n결국 모든 기호가 점등되었고 계속해서 켜져 있었지만, 승무원들은 이것이 무엇을 의미하는지 여전히 알지 못합니다. §H[this.leader.GetName]§!는 다시 한 번 극지 연구 기지에 착륙하여 지오글리프를 직접 재검토하기로 결정했습니다."
 ehof_megastructure.00531.name:0 "상형문자 IV"
 ehof_megastructure.00531.desc:0 "§H[from.Planet.GetName]§!의 표면으로 돌아온 직후, 과학 팀의 감지기가 잠시 동안 큰 지진 활동을 감지했습니다 - 그리고 모든 기호가 동시에 빛을 멈췄습니다.\n\n승무원의 안전을 걱정한 그들은 신속하게 §H[this.GetName]§!에 탑승하여 다시 궤도로 나갔습니다.\n\n§H[from.Planet.GetName]§!의 대기를 떠나자마자, 우주선의 감지기는 엄청난 양의 판구조 활동 증가를 감지했습니다. §H[from.Planet.GetName]§!의 표면이 터지기 시작했고, 내부에서 발사된 거대한 주황색 빛이 우리가 지금까지 달성할 수 있었던 속도를 훨씬 초과하여 발사되었습니다.\n\n빛은 곧 가시 범위를 벗어났지만, 승무원들은 그 방향을 통해 의도된 목적지를 파악할 수 있었습니다. 우리는 그것이 향하고 있는 시스템을 조사해야 합니다."
 EXPLORE_EHOF_PRECURSOR_NO_RUINED:0 "주황색 빛"
 EXPLORE_EHOF_PRECURSOR_NO_RUINED_DESC:0 "함선의 센서는 우리가 실현시킬 수 있는 속도를 훨씬 뛰어 넘는 거대한 주황색 빛을 감지했습니다.\n\n빛은 곧 가시 범위를 벗어났지만, 승무원들은 계산된 빛의 궤적과 속도 덕분에 목적지를 결정할 수 있었습니다. 우리는 그것의 목적지로 보이는 성계를 조사해야합니다."
 EXPLORE_EHOF_PRECURSOR_RUINED:0 "$EXPLORE_EHOF_PRECURSOR_NO_RUINED$"
 EXPLORE_EHOF_PRECURSOR_RUINED_DESC:0 "$EXPLORE_EHOF_PRECURSOR_NO_RUINED_DESC$"
 ehof_megastructure.0054_name:0 "막다른 길"
 ehof_megastructure.0054_desc:0 "주황색 번개가 도달한 후 이 시스템에 도착했지만, 그곳에서는 아무것도 보이지 않습니다...\n\n이 이상 현상에 소요된 모든 시간에도 불구하고, 지오글리프가 무엇을 위한 것이었는지, 누가 만들었는지, 왜 만들었는지, 그리고 주황색 번개가 무엇이었는지에 대한 진정한 통찰은 없었습니다.\n\n그러나 시스템 주위에 흩어져 있는 이상한 잔해를 조사한 결과, 이곳에 한때 어떤 종류의 거대 구조물이 있었던 것으로 보이며, 아마도 블랙홀에 의해 시간이 지남에 따라 파괴되었을 것입니다.\n\n잔해 속에서 우리의 [Owner.GetScientistPlural]는 고급 기술과 웜홀 안정화와 관련된 지식을 포함한 크고 기능적인 데이터 캐시를 발견했습니다.\n\n그러나 가장 중요한 발견은 매우 외계적이고 이세계적인 유물이었습니다. 이 유물을 연구하는 것은 분명히 가치가 있을 것입니다."
 ehof_megastructure.0055_name:0 "시설"
 ehof_megastructure.0055_desc:0 "오렌지 볼트가 도달한 후 시스템에 도착했지만, 그곳에서는 아무것도 보이지 않습니다. 그러나 시스템 중심의 블랙홀 주위에는 손상된 구조물이 있습니다. 구조물 내부에서 수집된 데이터에 따르면, 이 구조물이 작동할 때는 그 위에 구축된 블랙홀을 조작하여 웜홀을 열고 안정화할 수 있었다고 합니다. 우리의 [Owner.GetScientistPlural]는 이 구조물을 $ehof_ehof$라고 명명했으며, 줄여서 $ehof_ehof_abr$라고 부릅니다. \n\n낡고 버려진 듯한 상태에도 불구하고, 승무원들은 생명체의 흔적이나 우리가 여기까지 오게 된 이유에 대한 단서를 찾기 위해 나섰습니다.\n\n구조물을 스캔하고 테스트하며 깊이 생각해본 결과, 지오글리프가 무엇을 위한 것인지, 누가 만들었는지, 왜 만들었는지, 오렌지 볼트가 무엇이었는지에 대한 실질적인 통찰은 없다는 것이 분명해졌습니다.\n\n그러나 구조물에 대한 우리의 조사 결과, 웜홀 안정화와 관련된 고급 지식이 많이 드러났습니다. 아마도 더 중요한 것은, 시설 내의 두드러진 위치에 설치된 목적과 출처가 불명인 신비로운 유물을 발견했다는 것입니다. 우리의 [Owner.GetScientistPlural]는 이 유물을 더 연구해야 한다고 확신하고 있습니다."
 STUDY_ARCANE_ARTIFACT_1:0 "§B신비로운 유물 연구§!"
 STUDY_ARCANE_ARTIFACT_1_DESC:0 "우리가 발견한 신비로운 유물은 주황색 번개와 연결될 가능성이 있어, 이에 대한 단서를 제공할 수 있습니다.\n\n이 유물은 다른 놀라운 비밀을 지니고 있을지도 모르며, 이를 밝혀내기를 기다리고 있습니다.\n\n§R(이 프로젝트는 $ehof_ehof$를 잠금 해제하기 위해 필수입니다!)§!"
 STUDY_ARCANE_ARTIFACT_2:0 "§B신비로운 유물 연구§!"
 STUDY_ARCANE_ARTIFACT_2_DESC:0 "우리가 파괴된 $ehof_ehof$에서 발견한 신비로운 유물은 밝혀지기를 기다리는 거대 구조물에 대한 놀라운 비밀을 담고 있을 수 있습니다.\n\n§B(이 프로젝트는 $ehof_ehof$의 잠금을 해제하기 위해 필수입니다!)§!"
 STUDY_ARCANE_ARTIFACT_3:0 "§B신비로운 유물 연구§!"
 STUDY_ARCANE_ARTIFACT_3_DESC:0 "우리가 손상된 $ehof_ehof$에서 발견한 신비로운 유물이 이 거대 구조물이 어떻게 작동했는지를 밝혀줄 수 있습니다.\n\n§B(이 프로젝트는 $ehof_ehof$ 복원에 필수적입니다!)§!"
 ehof_anomaly.4321.name:0 "$r_arcane_manipulator_1$"
 ehof_anomaly.4321.desc:0 "신비로운 유물에 대한 우리의 장기 연구는 매우 유익했습니다. 그러나 대부분의 시간은 유물의 기이한 특성과 맞서는 데 소모되었습니다.\n\n유물은 특정한 팔면체 형태를 유지하고 있지만, 그 크기와 질량은 독립적으로 극단적으로 진동합니다. 우리의 [Owner.GetResearchers]는 데이터패드만큼 작은 크기부터 현대 크루저만큼 큰 크기까지 기록했으며, 질량은 단일 표준 합금 단위에서 [Root.GetHomeWorldName]의 질량의 약 1/8에 해당하는 수준까지 다양합니다. 유물의 불투명성과 고체성도 비슷하게 불규칙하게 변합니다.\n\n이러한 요소들은 우리의 [Owner.GetScientistPlural]가 이 유물이 실제로 우리의 현실에 부분적으로 고정된 고차원 물체라고 믿게 만들었으며, 그 차원들을 통한 회전이 우리가 관찰하는 모든 기이한 효과의 원인이라고 생각하게 합니다."
 ehof_anomaly.4322.name:0 "$r_arcane_manipulator_1$"
 ehof_anomaly.4322.desc:0 "우리는 이 유물의 기능 중 적어도 하나를 확인했습니다: 그것은 웜홀을 안정화하고 조작할 수 있는 능력을 가지고 있습니다.\n\n이 유물은 우주에 존재하는 모든 종류의 웜홀, 심지어 시공간의 양자 변동에서 발생하는 단기적이고 가상인 $ehof_wormholes_text$조차도 안정화하고 조작할 수 있는 잠재력을 지니고 있습니다.\n\n아마도 이것은 $ehof_ehof$에서 메가구조물의 웜홀 조작을 위해 사용되었을 것입니다.\n\n이 유물은 다른 기능을 가질 수도 있지만, 그 신비로운 특성 때문에 이를 파악하기는 어려울 것입니다. 우리의 [Owner.GetResearchers]조차도 이 유물의 불규칙한 행동이 의도된 것인지, 아니면 어떤 방식으로 손상된 것인지 확신하지 못하고 있습니다.\n\n어쨌든, 우리의 [Owner.GetScientistPlural]는 이 유물을 $ehof_wormhole_text$의 안정화, 조작, 그리고 궁극적으로 여행을 위해 활용할 수 있을 것이라고 믿고 있습니다. 파괴된 $ehof_ehof$는 그 목적을 위해 복원되고 재설립될 가능성이 있습니다."
 ehof_anomaly.4323.name:0 "$r_arcane_manipulator_1$"
 ehof_anomaly.4323.desc:0 "신비로운 유물에 대한 우리의 장기 연구는 매우 유익했습니다. 그러나 대부분의 시간은 유물의 기이한 특성과 맞서는 데 소비되었습니다.\n\n유물은 특정한 팔면체 형태를 유지하고 있지만, 그 크기와 질량은 독립적으로 극단적으로 진동합니다. 우리의 [Owner.GetResearchers]는 데이터패드만큼 작은 크기부터 현대 크루저만큼 큰 크기까지 기록했으며, 질량은 단일 표준 합금 단위에서 [Root.GetHomeWorldName]의 질량의 약 1/8에 해당하는 수준까지 다양합니다. 유물의 불투명성과 고체성 또한 비슷하게 불규칙하게 변합니다.\n\n이러한 요소들은 우리의 [Owner.GetScientistPlural]가 이 유물이 실제로 우리의 현실에 부분적으로 고정된 고차원 물체라고 믿게 만들며, 그 차원들을 통한 회전이 우리가 관찰하는 모든 기이한 효과의 원인이라고 생각하게 합니다."
 ehof_anomaly.4324.name:0 "$r_arcane_manipulator_1$"
 ehof_anomaly.4324.desc:0 "우리는 이 유물의 기능 중 적어도 하나를 확인했습니다: 그것은 웜홀을 안정화하고 조작할 수 있는 능력을 가지고 있습니다.\n\n이 유물은 우주에 존재하는 모든 유형의 웜홀, 심지어 시공간의 양자 변동에서 발생하는 단기적이고 가상인 $ehof_wormholes_text$를 안정화하고 조작할 수 있는 잠재력을 가지고 있습니다.\n\n아마도 이것은 $ehof_ehof$에서 메가구조의 웜홀 조작을 위해 사용되었을 것입니다.\n\n이 유물은 다른 기능을 가지고 있을지도 모르지만, 그 신비로운 특성 때문에 그것들을 파악하기는 어려울 것입니다. 우리의 [Owner.GetResearchers]조차도 이 유물의 불규칙한 행동이 의도된 것인지, 아니면 어떤 방식으로 손상된 것인지 확신하지 못하고 있습니다.\n\n어쨌든, 우리의 [Owner.GetScientistPlural]는 이 유물을 $ehof_wormhole_text$의 안정화, 조작, 궁극적으로 여행을 위해 활용할 수 있을 것이라고 믿고 있습니다. 파괴된 $ehof_ehof$는 그 목적을 위해 복원되고 재설립될 가능성이 있습니다."
 r_arcane_manipulator_1:0 "§B신비로운 균열 생성기§!"
 r_arcane_manipulator_1_desc:0 "현실을 초월하는 듯한 이 이세계의 구조물은 모든 종류의 웜홀, 가상 $ehof_wormholes_text$을 포함하여 안정화하고 조작할 수 있습니다."
 giga_relic_no_active:0 "이 유물은 활성화 효과가 없습니다."
 ehof_megastructure.0056_name:0 "이벤트 호라이즌"
 ehof_megastructure.0056_desc:0 "손상된 블랙홀 구조를 탐사한 결과, 우리는 이것이 원래 독특한 형태의 항성 간 여행을 가능하게 했음을 확인했습니다.\n\n이 소위 "$ehof_ehof$" (줄여서 $ehof_ehof_abr$) 내부에서 회수된 데이터는 이것이 고대 웜홀 생성기이자 안정화 장치임을 보여줍니다. 우리는 이 메가구조물 안팎에서 웜홀 안정화와 관련된 고급 지식을 많이 발견했습니다.\n\n아마도 더 중요한 것은, 우리는 시설 내의 두드러진 위치에 설치된 목적과 출처가 불명인 신비로운 유물을 발견했습니다. 우리의 [Owner.GetScientistPlural]는 이것을 더 연구해야 한다고 확신하고 있습니다."
 bombardment_redtoxin:0 "진홍빛 재앙"
 bombardment_redtoxin_desc:0 "$bombardment_redtoxin$ 진홍빛 재앙을 이용한 궤도 폭격을 통해 행성을 감염시켜 행성의 모든 생명체를 살해합니다.\n- §H지상군§!에 §R대규모§! 피해\n- §H행성§!에 §R대규모§! 피해\n- §H팝§!에 §R대규모§! 피해\n- 행성을 무방비 상태로 폭격함\n- 행성에 거주할 수 없게 만들지만 간단히 테라포밍할 수 있는 붉은 독성 행성으로 만듦"
 opinion_policy_orbital_bombardment_redtoxin:0 "우리는 머스타드 가스를 좋아하지 않지."
 orbital_bombardment_redtoxin:0 "진홍빛 재앙"
 orbital_bombardment_redtoxin_name:0 "진홍빛 재앙 궤도 폭격 태세"
 orbital_bombardment_redtoxin_desc:0 "궤도 폭격에 진홍빛 재앙 사용을 허용합니다.\n\n§E'진홍빛 재앙' 폭격 허용§!"
 ehof_red_toxin.2.name:0 "붉은 독성 행성으로 파괴된 행성"
 ehof_red_toxin.2.desc:0 "우리 행성 중 하나가 붉은 독성 행성으로 포격당했습니다."
 ehof_red_toxin.2.a:0 "끔찍하군!"
 bombed_to_red_toxic:0 "이 행성에는 생명이 살 수 없지만 매우 빠르게 테라포밍할 수 있습니다."
 ehof_red_toxin.3.desc:0 "우리 함대는 진홍빛 재앙 폭격으로 적 행성을 붉은 독성 행성으로 만들었습니다."
 ehof_red_toxic_world:0 "테라포밍 효율 증가"
 ehof_red_toxic_world_desc:0 "진홍빛 재앙은 테라포밍 효율을 높여 행성을 매우 빠르게 테라포밍할 수 있습니다."
 building_ehof_sm_forge_1:0 "감각 금속 주조소"
 building_ehof_sm_forge_1_desc:0 "$building_ehof_sm_forge_1$은 £alloys£ §Y$alloys$§!와 £energy£ §Y$energy$§!를 £giga_sr_sentient_metal£ §YSentient Metal§!의 축적에 공급하여 더 많은 £giga_sr_sentient_metal£ §YSentient Metal§!을 복제하는 전문화된 시설입니다."
 building_ehof_sm_forge_2:0 "지능형 금속 주조 단지"
 building_ehof_sm_forge_2_desc:0 "$building_ehof_sm_forge_2$는 이전 모델보다 더 크고 효율적인 변형입니다. 이는 우리의 확장된 £giga_sr_sentient_metal£ §YSentient Metal§!에 대한 지식을 활용하여 더 적은 시간에 더 많은 물자를 생산합니다."
 building_giga_research_lab_1:0 "추상 조사 기관"
 building_giga_research_lab_1_desc:0 "추상 물리학의 분야에서 현상 연구와 실험을 전문으로 하는 기관으로, 엄청난 수의 연구 요원이 속해있습니다."
 building_giga_research_lab_2:0 "비국부적 연구 시설"
 building_giga_research_lab_2_desc:0 "추상 물리학의 분야에서 현상 연구와 실험을 전문으로 하는 기관으로, 엄청난 수의 연구 요원이 속해있습니다."
 building_giga_institute_1:0 "변칙 두뇌 집단"
 building_giga_institute_1_desc:0 "$building_giga_institute_1$는 추상 물리학 연구에 전념하는 거대한 시설입니다. 행성의 연구 생산량이 증가합니다."
 building_giga_supercomputer_1:0 "추상 슈퍼컴퓨터"
 building_giga_supercomputer_1_desc:0 "$building_giga_supercomputer_1$은 추상 물리학을 위한 행성의 중앙 처리 및 연구 시설로 설계된 거대한 설치물입니다. 이 놀라운 시설 덕분에 행성의 연구 생산량이 크게 증가합니다."
 building_giga_supercomputer_2:0 "추상 하이퍼컴퓨터"
 building_giga_supercomputer_2_desc:0 "이 최첨단 특수 시설 덕분에, 추상 물리학을 통해 발견된 비국부적 현상을 연구하고 실험할 수 있습니다."
 building_giga_institute_2:0 "초인과 사이언스 넥서스"
 building_giga_institute_2_desc:0 "초인과적 사이언스 넥서스는 어마어마한 시설입니다. 이 곳에서 추상 물리학의 비국부적 초인과 현상에 대한 거대한 최신 연구 프로젝트와 실험이 진행됩니다."
 building_giga_energy_nexus_1:0 "레이저 전도 에너지 분배시설"
 building_giga_energy_nexus_1_desc:0 "강력한 고에너지 광도체를 사용해 같은 성계 내의 행성 간의 에너지를 전송하는 거대한 복합단지입니다."
 building_giga_energy_nexus_2:0 "초공간 항로 동력 전송기"
 building_giga_energy_nexus_2_desc:0 "이 초고용량 에너지 전송기는 성계 간에 에너지를 전달하여 우리 제국 내에서 더욱 효율적으로 에너지를 분배합니다."
 building_giga_energy_nexus_3:0 "초항성 양자장 얽힘 시설"
 building_giga_energy_nexus_3_desc:0 "이 거대한 시설을 통해 은하계의 다양한 위치의 양자장을 직접 얽히게할 수 있으며, 이 덕분에 우리 제국 내에서 에너지를 즉각적으로 전송할 수 있게 됩니다."
 building_giga_planetary_shield_generator_2:0 "음질량 물질 보호기"
 building_giga_planetary_shield_generator_2_desc:0 "행성의 대기 주위에 £giga_sr_negative_mass£ §Y부정 질량§!을 이용하여 질량-에너지 반발층을 생성함으로써, 이 구조물은 행성을 가장 강력한 궤도 폭격으로부터 보호합니다. 오직 장기적인 폭격과 극도로 높은 에너지 빔만이 반발층을 시간 내에 관통할 수 있습니다."
 building_negative_mass_factory_1:0 "초기형 에너지 반-변형기"
 building_negative_mass_factory_1_desc:0 "추상 물리학의 발전으로 £giga_sr_negative_mass£ §Y부정 질량§! 생성용 실험 시설의 개발과 건설이 가능해졌습니다. $ building_negative_mass_factory_1$에서 사용되는 시스템은 아직 완벽하지 않기 때문에 생산 효율성과 수확량이 매우 낮습니다."
 building_negative_mass_factory_2:0 "음질량 물질 변형기"
 building_negative_mass_factory_2_desc:0 "£giga_sr_negative_mass£ §Y부정 질량§! 생산의 다음 단계인 $building_negative_mass_factory_2$는 효율성과 수확량이 증가한 $building_negative_mass_factory_1$의 완성된 형태입니다. 그러나 에너지에서 부정 에너지로의 변환은 여전히 비효율적이며, 두 상태 간의 완벽한 변환 방법을 알아낼 때까지 이 상태가 계속될 것입니다."
 edict_giga_photonic_matter_sb:0 "광자 물질 보호막 강화"
 edict_giga_photonic_matter_sb_desc:0 "광자 물질을 사용해 일시적으로 함선의 보호막 회복 효율을 높입니다."
 edict_giga_negative_pressure_ti:0 "음성 압력 추진 향상"
 edict_giga_negative_pressure_ti_desc:0 "음성 압력을 기존의 추진기에 정밀하게 적용함으로써, 그 효율을 높일 수 있습니다."
 edict_giga_negative_mass_build:0 "음질량 물질 건축 가속"
 edict_giga_negative_mass_build_desc:0 "건설 공정 내에서 음질량 물질을 활용함으로써 프로젝트 완성까지의 시간을 단축할 수 있습니다."
 edict_giga_sterile_hyper_neutrino_d_s:0 "비활성 초중성미자 감지 지원"
 edict_giga_sterile_hyper_neutrino_d_s_desc:0 "일반적으로 EHOF 오메가에서 사용되는 비활성 초중성미자 감지기는 암흑 물질 원천에서 더 많은 암흑 물질 감지하고 추출하는데 사용될 수도 있습니다."
 pc_red_toxic:0 "붉은 유독성 행성"
 pc_red_toxic_desc:0 "매우 독특한 유형의 행성입니다. 붉은 독성 입자들이 대기를 가득 채우고 있습니다."
 pc_ehof_habitat:0 "소행성 거주지"
 pc_ehof_habitat_desc:0 "지금은 멸절된 문명에 의해 건설된 여러 개의 소행성으로 구성된 대규모 거주지입니다. 이를 만든 자들에게 무슨 일이 일어났는지는 알 수 없습니다."
 pc_ehof_unhabitat:0 "$pc_ehof_habitat$"
 pc_ehof_unhabitat_desc:0 "$pc_ehof_habitat_desc$"
 sc_ehof_black_hole:0 "$pc_ehof_black_hole$"
 sc_ehof_black_hole_desc:0 "$pc_ehof_black_hole_desc$"
 sc_annihilator:0 "격변성"
 sc_annihilator_desc:0 "M형 항성으로 알려져있지만 이 별에는 뭔가 이상한 점이 있습니다..."
 sc_white_hole:0 "$pc_wh_star$"
 sc_white_hole_desc:0 "$pc_wh_star_desc$"
 giga_dialog.4201.name:0 "초거대 E.H.O.F. 건설 현장 완공"
 giga_dialog.4201.desc:0 "조잡한 동물 수레에서 증기 및 핵 추진 차량, FTL 여행, 그리고 하이퍼 릴레이와 게이트웨이에 이르기까지, 모든 문명의 발전과 성장은 운송 기술의 지속적인 개선에 달려 있으며, 이는 우리의 야망을 더욱더 멀리 투사할 수 있게 합니다.\n\n그리고 이제 은하 핵 주위에 미래의 §Y초거대 E.H.O.F.§!를 위한 건설 현장이 완공됨에 따라, 우리는 또 다른, 그리고 아마도 가장 위대한 운송 혁명의 정점에 서 있습니다.\n\n이 플랫폼은 은하의 초거대 블랙홀 주위에 초대형 이벤트 호라이즌 오프셋 시설(E.H.O.F.)을 건설하기 위한 물류 허브 역할을 할 것이며, 이는 때가 되면 우리의 FTL 능력을 전례 없는 수준으로 강화하고 수많은 초소형 웜홀 네트워크 덕분에 제국의 모든 구석을 연결할 것입니다."
 giga_dialog.4201.a:0 "경이롭군."
 giga_dialog.4202.name:0 "초거대 E.H.O.F. 전약 하이퍼프레임 완공"
 giga_dialog.4202.desc:0 "초거대 E.H.O.F.의 §Y전약 하이퍼프레임§!이 이제 설치되었습니다. 이 거대한 프레임은 초거대 블랙홀의 사건의 지평선 주위에 거대한 전약장을 생성할 것이며, 여기서 확률적 웜홀이 아직 건설되지 않은 두 개의 준-장 조작기에 의해 '뽑혀져' 은하 전역으로 팽창될 것입니다."
 giga_dialog.4202.a:0 "말이 되는군... 아마도."
 giga_dialog.4203.name:0 "초거대 E.H.O.F. 준-장 조작기 완공"
 giga_dialog.4203.desc:0 "§Y준-장 조작기§!가 완공됨에 따라, 우리 초거대 E.H.O.F.의 구조는 본질적으로 완성되었습니다. 이 조작기들은 하이퍼프레임에 의해 생성된 전약장을 조작하여 주변 시공간을 조작기에서 발산되는 두 개의 거대한 소용돌이로 비틀 것입니다.\n\n이는 이론적으로 초소형 웜홀이 생성될 수 있는 범위를 은하 전체와 그 너머로 확장하는 동시에 무기한으로 안정적으로 유지될 수 있게 해야 합니다.\n\n이제 남은 일은 장치를 활성화하는 것뿐입니다."
 giga_dialog.4203.a:0 "'이론적으로'라니 무슨 뜻이지?"
 giga_dialog.4204.name:0 "초거대 E.H.O.F. 가동"
 giga_dialog.4204.desc:0 "막대한 에너지와 준-음성 질량 주입 덕분에 우리의 경이로운 §Y초거대 E.H.O.F.§!가 생명을 얻어 포효했습니다. 단순한 찰흙처럼 시공간을 비틀고 구부리며, 이 장치의 거대한 힘은 본질적으로 우리 은하의 기저 준-공간에 대한 거의 완전한 통제권을 부여합니다.\n\n이미 우리 제국 전체에 걸쳐 초소형 웜홀이 생성되어 한때 분리되었던 세계들을 마치 하나인 것처럼 연결하고 이동 시간을 거의 0으로 단축하는 동시에, 웜홀이 우리 군함들이 이전보다 더 빠르게 공허를 횡단할 수 있게 하여 전례 없는 기동성을 누리게 합니다.\n\n이 위대한 장치의 완전한 활성화로, 우리 제국의 크기로 인한 물류 및 관료적 문제들은 곧 먼 기억에 불과하게 될 것이며, 우리는 전례 없는 응집력과 은하적 협력의 시대로 접어듭니다."
 giga_dialog.4204.a:0 "이제 은하는 진정 우리의 영역이다!"
 name_supermassive_ehof:0 "초거대 E.H.O.F."
 supermassive_ehof_0:0 "$gc_tera$$name_supermassive_ehof$ 건설 현장"
 supermassive_ehof_0_DESC:0 "미래의 $name_supermassive_ehof$를 위한 건설 현장입니다. 이 비교적 작은 플랫폼은 은하 전역에 걸쳐 거의 완벽한 기동성과 응집력을 부여하는 기계를 건설하기 위한 기반으로 사용될 것입니다."
 supermassive_ehof_0_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_terastructure$ - $giga_list_category_transportation$\n대폭적으로 §Y초공간 속도§!을 증가시키고, £unity£ §Y통합§!을 증가시키며, £trade_value£ §Y무역 가치§!를 증가시키고, §Y제국 규모§!를 감소시킵니다.\n§LE.H.O.F. 시설을 확장하여 은하 어디에서나 즉석에서 마이크로 웜홀을 생성하도록 설계되었습니다.§!\" #megalistentry SUPERMASSIVE EHOF"
 supermassive_ehof_0_CONSTRUCTION_INFO_DELAYED:0 "$giga_list_additional_data$ - §Y초거대 E.H.O.F.§!는 시공간을 조작하고 은하 어디에서나 즉석에서 미세 웜홀을 생성하여 기존의 FTL 여행 방식을 보강할 수 있으며, §Y하이퍼드라이브 쿨다운§!을 거의 없애고 §Y점프 드라이브§!에 무한한 범위를 부여합니다.\n\n이 웜홀은 또한 제국의 모든 부분을 더 가깝게 연결하여 §Y통합§!과 §Y무역 가치§!를 증가시키고 §Y제국 규모§!와 §Y재정착 비용§!을 줄입니다.\n\n또한 §Y양자 캐터펄트§!로 작용할 수 있으며, 무한한 범위와 거의 완벽한 정확도를 가지고 있습니다( §Y오버로드§! DLC와 함께). 기회가 주어진다면, §Y은간섭 우주§!를 탐사할 수 있게 해줄 수도 있습니다.\n\n웜홀을 생성하는 것은 무료가 아니며, 현재의 §Y팝§! 수에 따라 §Y에너지§!와 §Y준부정 질량§! 유지비가 발생합니다(§Y4§! £energy£ 및 §Y0.04§! £giga_sr_negative_mass£당), §Y행성§! (§Y100§! £energy£ 및 §Y1§! £giga_sr_negative_mass£당) 및 §Y함선§! (§Y2§! £energy£당)."
 supermassive_ehof_1:0 "초거대 E.H.O.F. 전약 하이퍼프레임"
 supermassive_ehof_1_DESC:0 "전약 하이퍼프레임은 사건의 지평선 주위에 전약장을 생성하는 중요한 역할을 하며, 여기서 확률적 초소형 웜홀이 뽑혀 나올 수 있습니다."
 supermassive_ehof_2:0 "초거대 E.H.O.F. 준-장 조작기"
 supermassive_ehof_2_DESC:0 "준-장 조작기는 하이퍼프레임의 전약장을 구부리고 비틀어 은하 전역의 준-공간에 대한 거의 완전한 통제를 가능하게 합니다."
 supermassive_ehof_3:0 "초거대 E.H.O.F."
 supermassive_ehof_3_DESC:0 "초거대 E.H.O.F.는 은하 내 어디든 거의 무한한 양의 초소형 웜홀을 생성하여 전례 없는 기동성과 응집력을 가능하게 합니다. 따라서 유지비는 팝, 행성 및 함선 수에 정비례합니다."
 supermassive_ehof_3_no_catapult:0 "초거대 E.H.O.F."
 supermassive_ehof_3_no_catapult_DESC:0 "$supermassive_ehof_3_DESC$² "
 requires_ehof_phase_04:0 "$TRIGGER_FAIL$£engineering_research£ §Y$tech_ehof_phase_04$§! 기술이 필요합니다."
 ap_supermassive_ehof:0 "해방된 수송"
 ap_supermassive_ehof_desc:0 "너무 오랫동안 은하의 광대한 크기는 우리의 은하적 야망을 가로막는 상존하는 장애물이었습니다. 이제는 아닙니다! 은하 핵 주위에 건설된 확장형 이벤트 호라이즌 오프셋 시설은 제국의 가장 먼 변경까지 연결하고, 강력한 전함들이 공허를 극도로 쉽게 가로지르게 할 것입니다."
 giga_tech_supermassive_ehof:0 "이벤트 호라이즌 오프셋 시설 초확장"
 giga_tech_supermassive_ehof_desc:0 "초거대구조물 공학의 최신 발전과 결합된 E.H.O.F. 개발의 정점입니다. 가장 큰 블랙홀 주위에 건설된 이 거대한 구조물은 이론적으로 은하 내 어디든 거의 무한한 양의 초소형 웜홀을 생성할 수 있어, 우리 함대에 전례 없는 기동성을 부여하고 제국 크기에 내재된 대부분의 거리 관련 물류 문제를 대폭 억제합니다."
 allow_supermassive_ehof:0 "§H거대구조물 잠금 해제:§! $name_supermassive_ehof$"
 desc_supermassive_ehof:0 "초거대 E.H.O.F.는 비교할 수 없는 FTL 이동과 제국 응집력을 가능하게 합니다."
 requires_no_existing_supermassive_ehof:0 "$TRIGGER_FAIL$$name_supermassive_ehof$은(는) 하나만 건설할 수 있습니다."
 giga_blokkat.10021.name:0 "은하간 탐사 제안"
 giga_blokkat.10021.desc:0 "중력 이상 현상이 놀라운 속도로 우리 은하를 향해 돌진함에 따라, 일부에서는 물체가 도착하기를 가만히 기다리기보다는 선제 조치를 취하여 §Y초거대 E.H.O.F.§!를 활용해 은하간 공간 내 접근하는 이상 현상을 향해 직접 탐사선을 쏘아 보내자고 제안하고 있습니다.\n\n성공한다면 이는 의심할 여지 없이 물체의 본질에 관한 귀중한 데이터를 제공할 것이지만, 물론 우리는 만반의 준비를 해야 합니다. 이제 이를 진행하기로 한다면, 몇 가지 다른 선택지가 제시되었습니다.\n\n첫째, 안전하게 무인 과학선을 보내 이상 현상을 탐사하고 가능한 많은 데이터를 회수할 수 있습니다. 만약 이상 현상이 적대적이거나 위험한 것으로 판명되면, 우리는 많은 것을 잃지 않으면서 도착에 대비하는 방법에 대한 귀중한 통찰력을 얻을 수 있습니다.\n\n다른 대담한 선택지로는 함대를 보내 이상 현상을 가로막고 아마도 우리에게 도달하기 전에 파괴하는 것이지만, 실제로 그것이 얼마나 강력한지 전혀 알 수 없으므로 성공 보장은 없습니다.\n\n마지막으로, 일부에서는 값비싼 함대를 보내는 것은 자원 낭비에 불과하다고 주장하며, 대신 강력한 폭발 장치를 보내 이상 현상의 경로를 변경하여 파괴하거나 적어도 격퇴하려는 위험 없는 시도를 옹호합니다."
 giga_blokkat.10021.a:0 "그냥 무인 과학 탐사선을 보내자."
 giga_blokkat.10021.b:0 "우리 함대가 저것이 무엇이든 빠르게 처리할 것이다!"
 giga_blokkat.10021.c:0 "강력한 폭발 장치가 그것을 경로에서 벗어나게 하기를 바란다."
 giga_blokkat.10021.d:0 "거부한다. 위험과 비용을 감수할 가치가 없다."
 EHOF_PROBE_BLOKKATS:0 "은하간 이상 현상 탐사"
 EHOF_PROBE_BLOKKATS_DESC:0 "은하간 이상 현상에 무인 과학선을 보내면 그 진정한 본질에 대해 약간의 빛을 밝힐 수 있습니다. 실제로 함선을 회수할 가능성이 낮으므로 지도자를 탑승시켜서는 안 됩니다."
 EHOF_FIGHT_BLOKKATS:0 "은하간 이상 현상 교전"
 EHOF_FIGHT_BLOKKATS_DESC:0 "우리는 이상 현상이 우리에게 도달하기 전에 가로막고 바라건대 파괴하기 위해 전투 함대를 보낼 것입니다. 그러나 성공 보장이 없으므로 실패할 경우를 대비해 너무 큰 함대를 투입하지 않아야 합니다.\n§R이것은 프로젝트 연구에 사용 중인 함대를 투입할 것입니다!§!"
 giga_blokkat.10022.name:0 "은하간 이상 현상 탐사 보고서"
 giga_blokkat.10022.desc:0 "우리 §Y초거대 E.H.O.F.§! 직원이... 불길한 소식을 가져왔습니다.\n\n우리 무인 과학선이 성공적으로 이상 현상에 도달했지만, 격변적인 에너지에 의해 파괴되기 전 단 몇 초 동안만 탐사할 수 있었습니다. 그리고 전송된 데이터는 우리 제국의 최악의 두려움을 확인시켜 주었습니다: 이 물체는 자연적인 것이 아닙니다.\n\n그것은 함선입니다! 더 정확하게는 일종의 고에너지 핵 주위에 배열된 커다란 동심원 고리로 구성된 완전히 외계적인 디자인의 거대한 함선입니다.\n\n불행히도 구성 요소의 목적을 이해할 시간이 충분하지 않았고, 전송된 데이터 대부분은 결정적인 맥락 부족으로 현재 사용할 수 없습니다. 다행히 우리 과학자들은 이상 현상이 실제로 도착하면 분석을 완료할 수 있을 것으로 믿지만, 지금은 최악의 상황에 대비해야 합니다."
 giga_blokkat.10023.name:0 "은하간 이상 현상 전투 보고서"
 giga_blokkat.10023.desc:0 "이전에 어떤 [Root.GetSpeciesName]도 가본 적 없는 곳으로 향하며, 우리 전투 함대는 §Y초거대 E.H.O.F.§!에 의해 짜여진 무한히 뒤틀린 공간 주머니를 타고 전례 없는 속도로 은하간 공간을 질주합니다.\n\n불과 며칠 만에 이상 현상이 시야에 들어왔고, 모두의 완전한 실망과 놀라움 속에서 그것은... 작았습니다? 가로질러 수백 킬로미터에 불과하여 우리 전투 함대의 폭 안에 여러 번 들어갈 수 있을 정도였습니다. 어쨌든, 함대가 사격을 개시하자 그것은 중요하지 않았습니다. 크고 작은 대포들이 [ROOT.Capital.GetName]의 대부분을 평탄화할 만큼 강력한 포탄으로 이상 현상을 퍼부었습니다.\n\n하지만 아무 일도 일어나지 않습니다. 이상 현상은 우리의 개입에 전혀 동요하지 않고 계속 전진하며, 우리 함대는 따라잡기 위해 고군분투합니다. 그래서 우리는 다시 한번 사격을 개시했지만, 이번에는 이상 현상이 갑자기 멈추면서 반응이 있었습니다. 순식간에 에너지 판독값이 급증하고... 모든 것이 조용해졌습니다.\n\n우리 최고 사령부는 연락을 되찾기 위해 분주하지만, 침묵 외에는 아무것도 받지 못합니다. 결론은 명확합니다: 저것이 무엇이든, 혹은 누구든, 그것이 마침내 도착했을 때 우리는 모든 것을 동원하여 맞설 준비가 되어 있어야 합니다."
 giga_blokkat.10023.a:0 "우리는 극복할 것이다. 전투를 준비하라."
 giga_blokkat.10023.b:0 "우리의 위대한 프로젝트들이 제때 준비되도록 하라."
 giga_blokkat.10023.c:0 "기술 발전에 더 많이 투자하라."
 giga_blokkat.10023.d:0 "기다리며 지켜보겠다."
 giga_blokkat.10024.name:0 "은하간 이상 현상 폭격 보고서"
 giga_blokkat.10024.desc:0 "우리 §Y초거대 E.H.O.F.§! 직원은 은하간 공간의 이상 현상을 향해 폭발 장치를 성공적으로 발사했지만... 제한적인 결과를 얻었다고 보고합니다.\n\n이상 현상은 우리 은하에서 멀어지게 했어야 할 방식으로 충격을 받았음에도 불구하고 경로가 전혀 변경되지 않았지만, 속도가 다소 감소하여 도착 준비 시간을 좀 더 벌 수 있기를 바랍니다.\n\n흥미롭게도 이 감속은 실제 충격 직후가 아닌 약간의 시간이 지난 후에 발생했으며, 일부에서는 이것이 이상 현상 내부의 무언가 또는 누군가가 강제로 감속된 것이 아니라 충격에 반응한 결과일 수 있다고 추측합니다.\n\n어쨌든, 우리는 이것이 도착 준비를 위해 추가적인 §Y5년§!을 벌어주었다고 추정합니다..."
 giga_blokkat.10024.a:0 "훌륭하다."
 preparing_to_fight_blokkats:0 "은하간 이상 현상 - 군사 준비"
 preparing_to_tech_blokkats:0 "은하간 이상 현상 - 기술 준비"
 preparing_to_mega_blokkats:0 "은하간 이상 현상 - 공학 준비"
 probed_blokkats_early:0 "블록캣 탐사 데이터"
 fought_blokkats_early:0 "블록캣 전투 데이터"
 giga_blokkat.10025.name:0 "은하간 이상 현상 전투 데이터 분석됨"
 giga_blokkat.10025.desc:0 "블록캣이 우리 은하에 도착한 후, 우리 연구국은 은하간 공간에서 블록캣-베스터와의 짧은 전투 교전에서 얻은 약간의 데이터를 연구하는 데 힘써 왔습니다.\n\n이를 현재 블록캣 연구에서 쏟아져 나오는 데이터와 교차 분석함으로써, 우리는 블록캣 함선에 대해 약간의 군사적 우위를 점할 수 있을 것입니다."
 giga_blokkat.10025.a:0 "훌륭하다. 그럼 헛수고는 아니었군."
 giga_blokkat.10026.name:0 "은하간 이상 현상 탐사 데이터 분석됨"
 giga_blokkat.10026.desc:0 "블록캣이 우리 은하에 도착한 후, 우리 연구국은 우리 탐사선이 은하간 이상 현상과 접촉했을 때 얻은 데이터를 연구하는 데 힘써 왔습니다.\n\n이를 현재 블록캣 연구에서 쏟아져 나오는 데이터와 교차 분석함으로써, 우리는 블록캣을 적어도 조금 더 잘 이해할 수 있을 것입니다."
 giga_blokkat.10026.a:0 "아주 좋아!"
 tremendous_ring:0 "거대한 고리"
 tremendous_ring_desc:0 "이 거대 가스 행성은 직경 3억 7800만 km의 거대한 고리를 지니고 있습니다."
 methane_oceans:0 "메탄 바다"
 methane_oceans_desc:0 "이 추운 불모지 행성의 가장 거대한 크레이터에는 액체 메탄 바다가 존재합니다."
 nanite_deserts:0 "나노 로봇 사막"
 nanite_deserts_desc:0 "이 행성에 존재하는 사막의 50% 이상은 모래를 흉내내는 나노 로봇들로 이루어져 있습니다."
 coreless_planet:0 "핵이 없는 행성"
 coreless_planet_desc:0 "이 행성은 철로 구성된 핵 자체가 존재하지 않습니다. 물리학 연구에 가치있는 장소임은 분명합니다."
 core_facility:0 "핵 탐사 시설"
 core_facility_desc:0 "이 행성은 철로 구성된 핵 자체가 존재하지 않지만 행성 표면 아래에 거대한 연구 시설이 존재합니다. 이를 통해 고급 연구를 진행할 수 있을 것입니다."
 cataclysmic_star:0 "격변변광성"
 cataclysmic_star_desc:0 "백색 왜성을 안에 가지고 있는 이 별은 극도의 불안정성을 보여줍니다."
 oxygen_world:0 "결정화된 산소 행성"
 oxygen_world_desc:0 "이 행성의 표면은 결정화된 산소로 이루어져 있어 과학적으로 엄청난 가치를 지닙니다."
 natural_network:0 "전세계적 생체 연결망"
 natural_network_desc:0 "행성에 서식하는 특이한 생물속의 식물들이 전 세계적인 연결망을 구축하여 과학적으로 엄청난 가치를 지닙니다. "
 fire_life:0 "플라스마 생명체"
 fire_life_desc:0 "이 행성의 표면을 돌아다니는 특이한 형태의 플라스마 생명체는 유기적 생명체에게 극도로 적대적입니다."
 red_toxic:0 "붉은 유독성 행성"
 red_toxic_desc:0 "최근에 탐사된 이 독성 행성은 알려지지 않은 물질로 구성된 붉은색 독성 입자로 가득찬 대기를 가지고 있습니다."
 scarlet_scourge:0 "붉은 유독성 행성"
 scarlet_scourge_desc:0 "매우 치명적인 독성 물질이 대기에 빽빽하게 들어있는 이 행성은 모든 생명체에게 적대적인 환경입니다."
 remnants_civ:0 "문명의 잔존물"
 remnants_civ_desc:0 "진홍빛 재앙에 파괴당한 채로, 한 때 위대했던 문명의 일부가 이 행성에 남아있습니다."
 the_repository1:0 "저장소"
 the_repository1_desc:0 "행성에 존재하는 이노베이션 포지 속의 광대한 시설들은 이 행성에 대한 고급 연구 및 개발을 가능하게 합니다."
 the_repository2:0 "저장소"
 the_repository2_desc:0 "행성에 존재하는 이노베이션 포지 속의 광대한 시설들은 행성에 진홍빛 재앙이 남아있어도 연구 및 개발을 가능하게 합니다."
 urmazin_utopia:0 "우르마진 유토피아"
 urmazin_utopia_desc:0 "우르마진은 은하계와 격리된 낙원에 살고 있습니다. 불행할 이유가 있나요?"
 giga_compound_immunity:0 "피해 무시"
 weapon_type_anticompound:0 "§Y안티컴파운드§!"
 mod_weapon_type_anticompound_weapon_damage_mult:0 "안티컴파운드 무기"
 compound_situation:0 "$ehof_the_compound$ 파괴"
 compound_situation_type:0 "$ehof_the_compound$ 파괴"
 compound_situation_desc:0 "살아남으려면 $ehof_the_compound$에게 피해를 줄 방법을 모색해야 합니다. 해결책을 찾을 수 있을만한 시간이 있기를 바랍니다."
 compound_situation_monthly_change_tooltip:0 "생존은 중대 사항입니다"
 compound_situation_desc_1:0 "$ehof_the_compound_text$를 관찰하고 진행 방법에 대한 계획을 세우십시오.\n\n§ROur choice will be locked in after§! §Y1 Year§! £time£ §R.§!"
 compound_situation_desc_2:0 "상대를 분석해야 합니다. 눈 크게 뜨세요."
 compound_situation_desc_2_a:0 "지금 우리의 결심을 버린다면, 다시 시도하기에는 너무 늦을 것입니다. 우리 제국이 살아남으려면 실험을 완료해야 합니다."
 compound_situation_desc_3:0 "우리는 해결책을 기다립니다... 희망 밖에 없습니다."
 compound_situation_desc_3_a:0 "우리는 기초 $giga_sr_negative_mass$ 무기를 얻었지만, 그것들은 작고 약합니다. 적어도 시간을 벌 수는 있습니다."
 compound_situation_desc_3_b:0 "실험이 실패했습니다. 이제는 바랄 수 밖에 없습니다. 너무 늦었습니다."
 compound_situation_finisher:0 "올바른 해결책이 곧 밝혀질 것이지만, 너무 오래 걸릴 수도 있습니다.\n\n기다릴까요, 아니면 조치를 취할까요?\n무엇이 되었든지, 서둘러야 합니다."
 compound_situation_stage_1_tooltip:0 "관찰 단계"
 compound_situation_stage_2_tooltip:0 "실험 단계"
 compound_situation_stage_3_tooltip:0 "배치 단계"
 compound_approach_wait:0 "데이터 수집"
 compound_approach_wait_tooltip:0 "더 많은 정보를 수집할 때까지 기다리고 관찰할 여유가 있습니다."
 compound_approach_qnm1:0 "신속 해결"
 compound_approach_qnm1_tooltip:0 "급진적인 해결책을 시도하고 빠른 방법을 찾을 수 있습니다."
 compound_approach_qnm2:0 "프로토타입 함선"
 compound_approach_qnm2_tooltip:0 "우리는 $ehof_the_compounds_text$ 함대에서 샘플을 얻을 수 없으므로, 작동하는 기술을 찾을 수 있기를 바라며 실험적 기술을 현장 테스트해야 합니다."
 compound_approach_qnm3:0 "음질량 물질 무기"
 compound_approach_qnm3_tooltip:0 "우리는 $giga_sr_negative_mass$가 $ehof_the_compound_text$에 해를 끼칠 수 있다는 것을 배웠습니다. 아직 그들의 진정한 잠재력을 열지 못했지만, 최소한 이 유형의 물질을 활용하는 소형 무기를 만들 수 있습니다."
 compound_approach_blokkat:0 "블록캣 병기"
 compound_approach_blokkat_tooltip:0 "블록캣 병기는 근본적인 수준에서 현실을 찢어버립니다. 이 괴물들에게 피해를 줄 수 있을지도 모릅니다."
 compound_approach_DEBUG:0 "§P디버그§!"
 compound_approach_DEBUG_tooltip:0 "§P디버그 커맨드입니다. 보이면 안됩니다.§!\n\n\n"
 compound_approach_DEBUG_ADD:0 "§P덧셈 (디버그)§!"
 compound_approach_DEBUG_SUB:0 "§P뺄셈 (디버그)§!"
 compound_approach_DEBUG_VAR:0 "$compound_approach_DEBUG_tooltip$VAR 소유자.복합_프로토쉽_소모: [owner.compound_protoships_eaten]\n\n\n"
 compound_gimmeyaships:0 "$ehof_the_compound$ 시험"
 compound_gimmeyaships_type:0 "$ehof_the_compound$ 시험"
 compound_gimmeyaships_desc:0 "우리는 그들에게 해를 끼칠 방법이 없지만, $ehof_the_compound_text$에 우리의 함선을 던져 어떤 약점을 발견해 보려고 합니다.\n\n§W우리는 $compound_situation$ 상황의 타이머가 끝나기 전에 그들의 세력에 §!§Y[owner.compound_protoships_tobeeaten]§!§W 함선을 공급해야 합니다.§!"
 compound_gimmeyaships_monthly_change_tooltip:0 "우주선 뷔페"
 compound_gimmeyaships_approach:0 "우주선 뷔페"
 compound_gimmeyaships_approach_tooltip:0 "우리 [Owner.GetEngineerPlural]는 우리의 함대에 무작위 프로토타입 기술을 장착하여 그들이 할 수 있는 모든 것을 시험해 보도록 했습니다. $ehof_the_compound_text$에 그것들을 던져 결과를 확인해 보세요."
 compound_gimmeyaships_finisher:0 "우리의 희생 선박에 장착된 실험적 기술이 마침내 $ehof_the_compound_text$의 본질에 대한 통찰을 제공하였습니다.\n"
 compound_situation.1.title:0 "블록캣 병기"
 compound_situation.1.desc:0 "우리는 이미 $ehof_the_compound_text$를 무너뜨리는 데 필요한 모든 것을 가지고 있습니다. 어리석은 프로젝트에 시간을 낭비할 필요가 없습니다."
 compound_situation.1.a:0 "§R각오하는게 좋을 것이다§!"
 compound_situation.1.a.tooltip:0 "§R상황 취소§!"
 compound_situation.1.b:0 "어찌됐든 조사하는 것이 나을 것입니다."
 compound_situation.2.title:0 "기다리고 지켜보기"
 compound_situation.2.desc:0 "우리는 $ehof_the_compound_text$가 당장 우리에게 위협이 되지 않는다고 판단했습니다. 다음 행동을 결정하기 전에 그들을 지켜볼 여유가 있습니다."
 compound_situation.2.a:0 "또다른 위기일 뿐입니다."
 compound_situation.3.title:0 "해결책을 찾아서"
 compound_situation.3.desc:0 "$ehof_the_compound_text$는 멈출 수 없는 위협처럼 보입니다 - 하지만 우리는 이 우주에서 항상 어딘가에, 어떻게든 답이 있다는 것을 충분히 보아왔습니다. 그들은 분명 약점이 있을 것입니다.\n\n우리는 다양한 실험 무기를 갖춘 많은 함선을 건조하고, 뭔가 효과가 있을 때까지 싸울 것입니다."
 compound_situation.3.a:0 "연구실이 아닌 총으로 연구하는 겁니다!"
 compound_situation.4.title:0 "약점 발견"
 compound_situation.4.desc:0 "우리가 해냈습니다! 우리는 $ehof_the_compound_text$의 미묘한 약점을 찾아냈습니다 - 그들조차도 알지 못할 수도 있는 약점입니다. $giga_sr_negative_mass$가 그들에게 해를 끼칠 수 있다는 사실이 밝혀졌습니다! 불행히도, 이 기술에 대한 우리의 숙련도는 제한적이며, 우리는 더 작은 무기 설계만을 생각해낼 수 있습니다. 적어도 이것들이 우리에게 더 많은 시간을 벌어줄 수 있을 것입니다."
 compound_situation.4.a:0 "잘 될겁니다. 여러분 모두 잘 해주셨습니다."
 compound_situation.5.title:0 "약점 발견 실패"
 compound_situation.5.desc:0 "비록 최선을 다했지만, 우리는 $ehof_the_compound_text$에서 의미 있는 약점을 찾고 활용하는 데 실패했습니다. 남은 시간이 많지 않으며, 우리 제국의 지도자들은 이 위기를 극복할 수 있다는 희망을 잃기 시작했습니다."
 compound_situation.5.a:0 "희망이란 덧없는 것이죠."
 compound_situation.6.title:0 "기다리는 중"
 compound_situation.6.desc:0 "무언가가 일어나기를 기다리는 동안, 은하계는 우리 주위에서 타오르고 있습니다.\n\n$ehof_the_compound_text$는 무시하면 괜찮을 것입니다.\n\n무지함은 행복이죠?"
 compound_situation.6.a:0 "괜찮습니다"
 compound_situation.9.title:0 "프로젝트 중지됨"
 compound_situation.9.desc:0 "__식별자__ 형태의 마커는 Stellaris 게임 토큰을 대체한 것입니다. 번역문에 반드시 그대로 포함하세요. 절대 삭제하거나 번역하지 마세요.   우리는 $ehof_the_compound_text$에 대처하기 위한 더 나은 해결책에 대한 소식을 받았으며 현재 진행 중인 프로젝트를 중단했습니다."
 compound_situation.9.a:0 "닫기"
 compound_situation.10.title:0 "데이터 수집됨"
 compound_situation.10.desc:0 "우리는 $ehof_the_compounds_text$ 함선이 우리의 공격에 반응하는 방식에 대한 방대한 양의 데이터를 기록했습니다. 이제 우리는 전문가들이 이를 분석하고 해결책을 제시하기를 기다립니다."
 compound_situation.10.a:0 "가치가 있었으면 좋겠네요."
 compound_situation.10.a.tooltip:0 "$compound_situation$ 상황이 §G+20§!만큼 진행"
 compound_situation_already_open:0 "대화창이 이미 열려있습니다, 닫아주세요"
 compound_situation_no_qnm_tech:0 "\n§R우리가 찾고 있는 답은 $ehof_ehof_abr$에 의해 생성된 웜홀을 통해 있을지도 모릅니다...§!"
 compound_situation_chosen_route:0 "이미 행동 방침을 결정했습니다."
 compound_situation_qnm2_failed:0 "약점 발견에 실패했습니다."
 NAME_The_Compound:0 "$ehof_the_compound$"
 creators_admiral:0 "항성 절멸 의식"
 NAME_ehof_trader_species:0 "우르마진"
 NAME_ehof_trader_ruler:0 "시오닉"
 NAME_ehof_traders:0 "우르마진 무역상"
 NAME_Hauler:0 "고대의 화물선"
 compound_invincible:0 "완벽이 부른다"
 compound_invincible_2:0 "$compound_invincible$"
 compound_invincible_3:0 "$compound_invincible$"
 compound_invincible_desc:0 "$ehof_the_compound_text$는 사실상 파괴 불가능합니다."
 compound_invincible_2_desc:0 "$compound_invincible_desc$ $tech_qnm_utilities$의 발견으로, 그들은 취약해졌습니다."
 compound_invincible_3_desc:0 "$compound_invincible_2_desc$"
 repair_annihilator:0 "$ehof_the_stellar_annihilator$ 수리 중"
 repair_annihilator2:0 "$repair_annihilator$"
 pc_ehof_cplanet:0 "$ehof_the_sphere$"
 pc_ehof_cplanet_desc:0 "이 거대한 구체는 끊임없이 변화하는 것처럼 보이는 미지의 물질로 구성되어 있습니다."
 pc_ehof_planet:0 "암흑 물질 보주"
 pc_ehof_planet_desc:0 "어마어마한 크기의 암흑 물질 구체입니다. $ehof_the_compound_text$는 이를 사용하여 함대를 강화합니다."
 decision_compound_cleanse_planet:0 "어두운 물질 해체"
 decision_compound_cleanse_planet_desc:0 "행성을 부정 질량의 광선으로 세척하여 복합체의 잔여 물질을 파괴하고 행성을 바리온 상태로 복원합니다."
 decision_compound_cleanse_planet_tooltip:0 "§Y행성이 일반 상태로 복원됩니다. 만약 $pc_ehof_terraforming_candidate$ 보정치가 있다면, 고유한 자원이 있는 $pc_nuked$로 변형됩니다.§!\n\n§R $i_dark_matter$의 궤도 자원이 제거됩니다.§!"
 pc_ehof_terraforming_candidate:0 "잠재적 응집력"
 pc_ehof_terraforming_candidate_desc:0 "이 행성은 거주 가능한 세계의 특징과 관련된 여러 가지 퇴화된 특성을 가지고 있으며, 이를 다시 완전한 형태로 되살릴 수 있을지도 모릅니다."
 pc_ehof_terraforming_candidate_tooltip:0 "이 행성에서 §Y$decision_compound_cleanse_planet$§! 결정을 사용하면 독특한 자원이 있는 $pc_nuked$으로 변형됩니다."
 decision_compound_cleanse_planet_available_tooltip:0 "이제 §Y$decision_compound_cleanse_planet$§! 결정을 $pc_ehof_planet$에 사용할 수 있으며, 이를 정상 상태로 되돌릴 수 있습니다. 이전에 거주 가능했던 세계는 독특한 자원을 가진 거주 가능 세계로 다시 변모할 것입니다."
 d_compound_blocker_1:0 "변환 본능"
 d_compound_blocker_1_desc:0 "이 지역의 야생 생물은 외부 생명체를 암흑 물질로 "변환"하려는 충동을 가진 것처럼 보입니다. 실제로 그렇게 할 수는 없지만, 그럼에도 불구하고 우리의 보안 군을 압박하고 있습니다."
 d_compound_blocker_2:0 "중력 황무지"
 d_compound_blocker_2_desc:0 "지역의 지형이 특정 기본 힘과 불규칙하게 상호작용하여 개발 노력에 매우 방해가 되는 형성을 초래합니다."
 d_compound_blocker_3:0 "물자 불일치"
 d_compound_blocker_3_desc:0 "이 지역의 물질은 비일관성 해소 이후 제대로 정착되지 않았으며, 부적절하고 때때로 위험한 상태 변화를 겪습니다."
 d_compound_blocker_4:0 "이국적 방사능 오염"
 d_compound_blocker_4_desc:0 "이 행성의 잘못 조정된 비일관성으로 인한 잉여 에너지가 비생명체와 생명체 재료에 손상을 줍니다."
 d_compound_blocker_5:0 "자발적 변환"
 d_compound_blocker_5_desc:0 "어두운 물질 구조의 거의 보이지 않는 준바이러스 전염병이 변형 발병의 지속적인 위험을 초래합니다."
 d_compound_boon_1:0 "디코히어런스 간헐천"
 d_compound_boon_1_desc:0 "어둠의 물질의 잔여 광맥이 유사하게 남아 있는 음의 질량과 접촉할 때 에너지를 방출하며 비일관성을 잃습니다."
 d_compound_boon_2:0 "초전이 지질학"
 d_compound_boon_2_desc:0 "독특하고 귀중한 복합체가 비바리온 물질의 불완전한 비일관성과 재형성의 부산물로 형성되었습니다."
 d_compound_boon_3:0 "Tenebro-Accumulators"
 d_compound_boon_3_desc:0 "지역 식물의 놀라운 적응력 덕분에 특정 형태의 암흑 물질을 안전하게 흡수하고 농축할 수 있는 종족이 생겨났습니다."
 d_compound_boon_4:0 "잔여물 비축"
 d_compound_boon_4_desc:0 "복합형 암흑 물질 현상은 통제된 환경에서 보존되어 지속 가능한 실험 공급을 제공합니다."
 d_compound_boon_5:0 "비바리온 생물"
 d_compound_boon_5_desc:0 "이 지역에는 놀랍도록 비정상적인 생명체의 공동체가 존재합니다. 이 형체가 불완전한 유기체들은 비교 진화 분야에 있어 금광과도 같습니다."
 d_compound_boon_6:0 "지오중력 이상"
 d_compound_boon_6_desc:0 "구조 공학의 혁신을 강요하는 반예측 가능한 대량 변동에 대한 지속적인 적응."
 d_compound_boon_7:0 "토착 미세 웜홀"
 d_compound_boon_7_desc:0 "공간-시간이 여기에서 변동하며, 이는 거시적 규모의 양자 거품과 다르지 않습니다. 이는 특정 이국적 에너지 변환 과정을 촉진할 수 있습니다."
 d_compound_boon_8:0 "감응 금속 도가니"
 d_compound_boon_8_desc:0 "지능을 가진 금속 호수의 얼음 같은 물결이 주변 지형을 느긋하게 흡수하고 재흡수합니다."
 d_compound_boon_10:0 "프로토 지능 생태계"
 d_compound_boon_10_desc:0 "복합체 총체의 반태생 이식체가 여기 미생물군집을 가득 채우고 있습니다. 지속적인 훈련을 통해 눈에 띄지 않는 자애로운 의지로 형성될 수 있습니다."
