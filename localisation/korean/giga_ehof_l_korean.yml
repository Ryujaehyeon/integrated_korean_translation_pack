 tech_qnm_utilities:0 "부정 질량 향상"
 tech_qnm_utilities_desc:0 "$ehof_the_compound_text$는 은하의 모든 생명체에게 위협이며, 어쩌면 그 너머까지도 해당됩니다. 우리의 실험 결과, 부정 질량만이 그들에게 해를 끼칠 수 있는 유일한 것으로 나타났습니다. 이 단서를 바탕으로 우리는 부정 질량을 이용한 에너지 무기를 개발하기 시작하여 마침내 반격할 수 있도록 하고 있습니다."
 tech_qnm_thrusters:0 "부정 질량 스러스터"
 tech_qnm_thrusters_desc:0 "부정 질량에 대한 연구를 통해 우리 제국 내에서의 활용을 확장할 수 있게 되었습니다. 이 물질의 이국적인 특성은 이론적으로 비하이퍼드라이브 기반의 초공간 여행을 가능하게 하지만, 우리의 선박 구조의 보다 일반적인 특성으로 인해 우리는 단순히 정말, 정말 빠르게 이동하는 스러스터에 만족해야 합니다."
 TECH_UNLOCK_QNM_THRUSTER_TITLE:0 "§H부품 잠금 해제:§! $tech_qnm_thrusters$"
 TECH_UNLOCK_QNM_THRUSTER_2_DESC:0 "§H$tech_qnm_thrusters$§!\n은하에서 지금까지 보았던 것 중 가장 빠른 추진기!"
 tech_qnm_sensors:0 "부정 질량 감지기"
 tech_qnm_sensors_desc:0 "부정 질량은 기존의 감지기를 보강하여 훨씬 더 정밀한 신호 필터를 생성할 수 있게 해주며, 그 결과 스캔 해상도와 함대 탐지가 향상됩니다."
 TECH_UNLOCK_QNM_SENSOR_TITLE:0 "§H부품 잠금 해제:§! $tech_qnm_sensors$"
 TECH_UNLOCK_QNM_SENSOR_DESC:0 "§H$tech_qnm_sensors$§!\n$tech_qnm_sensors_desc$"
 tech_qnm_shields:0 "부정 질량 보호막"
 tech_qnm_shields_desc:0 "부정 질량 보호막은 충돌하는 물질과 에너지를 단순히 충돌 지점에서 소산시키는 대신, 이를 적극적으로 반발합니다."
 tech_qnm_reactors:0 "부정 질량 반응로"
 tech_qnm_reactors_desc:0 "부정 질량 반응기는 물질의 편극 흐름과 "정상" 에너지를 이용하여 거의 완벽한 소멸을 달성하고 그에 상응하는 막대한 전력 출력을 생성합니다."
 TECH_UNLOCK_QNM_REACTORS_TITLE:0 "§H부품 잠금 해제:§! $tech_qnm_reactors$"
 TECH_UNLOCK_QNM_REACTORS_DESC:0 "§H$tech_qnm_reactors$§!\n$tech_qnm_reactors_desc$"
 tech_qnm_jumpdrive:0 "부정 질량 점프 드라이브 강화"
 tech_qnm_jumpdrive_desc:0 "점프 드라이브는 그 자체로도 믿을 수 없는 발명품이지만, 음의 질량이라는 독특한 특성을 통해 우리는 이를 더욱 향상시킬 수 있었습니다! 점프 순간에 함선을 해당 물질로 주입함으로써, 우리는 선박의 질량을 대폭 줄일 수 있으며, 그 결과로 우주를 가로지르는 데 필요한 에너지 양도 줄일 수 있습니다. 이를 통해 우리는 같은 기초 점프 드라이브 설계를 바탕으로 더 멀리 그리고 더 자주 여행할 수 있게 되었습니다."
 TECH_UNLOCK_QNM_E_JUMP_DRIVE_TITLE:0 "§H부품 잠금 해제:§! $tech_qnm_jumpdrive$"
 TECH_UNLOCK_QNM_E_JUMP_DRIVE_TITLE_DESC:0 "§H$tech_qnm_jumpdrive$§!\n기존의 점프 드라이브보다 더 빠르고 더 멀리 점프합니다."
 tech_sm_armor:0 "감응 금속 갑옷"
 tech_sm_armor_desc:0 "감각 금속은 손상 시 재구성되고 복제되며, 환경 효과에 동적으로 적응합니다. 이는 방어구에 완벽한 물질이 됩니다."
 tech_sm_auto_repair:0 "감응 금속 선체 재생"
 tech_sm_auto_repair_desc:0 "우리 함선의 선체를 감응 금속과 물자 저장소의 흔적이 포함된 물자로 건설함으로써, 우리 함선은 극도로 효율적으로 자가 수리를 할 수 있습니다."
 tech_sm_computers:0 "감응 금속 지능"
 tech_sm_computers_desc:0 "감정 금속 하이브 마인드의 능력은 엄청나며, 우리의 가장 강력한 정보 처리 네트워크를 훨씬 초월합니다. 이를 우리의 함선과 구조물 시스템에 직접 연결함으로써, 이전의 어떤 함선 컴퓨터와도 비교할 수 없는 방식으로 우리의 함선과 기지를 제어할 수 있는 상위 명령을 구현할 수 있습니다."
 TECH_UNLOCK_SM_COMPUTERS_TITLE:0 "§H부품 잠금 해제:§! $tech_sm_computers$"
 TECH_UNLOCK_SM_COMPUTERS_DESC:0 "§H$tech_sm_computers$§!\n$tech_sm_computers_desc$"
 tech_sm_flak_batteries:0 "감응 금속 대공 포대"
 tech_sm_flak_batteries_desc:0 "$tech_sm_flak_batteries$는 물자의 지역 네트워크 정보를 활용하여 이전보다 더 정밀하고 정확하게 다가오는 발사체를 조준할 수 있습니다."
 tech_sm_autocannons:0 "감응 금속 절단기"
 tech_sm_autocannons_desc:0 "$tech_sm_autocannons$는 수많은 작은 감응 금속 스파이크를 발사합니다. 이 스파이크는 접촉하는 모든 형태의 물질을 동화하도록 프로그래밍되어 있으며, 이후 구체로 응축되고 접촉 지점에서 분리됩니다."
 tech_sm_mass_drivers:0 "감응 금속 레일건"
 tech_sm_mass_drivers_desc:0 "$tech_sm_mass_drivers$는 접촉하는 모든 형태의 물자를 흡수하도록 프로그래밍된 작은 감응 금속 스파이크를 융합한 후 발사합니다. 발사체가 흡수한 물자의 특정 임계값에 도달하면 구형으로 응축되고 분리됩니다."
 tech_sm_kinetic_artillery:0 "감응 금속 포병"
 tech_sm_kinetic_artillery_desc:0 "$tech_sm_kinetic_artillery$는 $giga_sr_sentient_metal$로 프로그래밍된 대형 스파이크를 융합하여 발사합니다. 이 스파이크는 접촉하는 모든 형태의 물질을 흡수합니다. 전투기와 소형 선박은 즉시 동화되며, 대형 선박은 감각 금속이 선체에서 덩어리를 찢어내면서 심각한 피해를 입습니다."
 tech_sm_mass_accelerator:0 "감응 금속 흡수기"
 tech_sm_mass_accelerator_desc:0 "$giga_sr_sentient_metal$ 흡수기는 거대한 $giga_sr_sentient_metal$ 스파이크를 발사하여, 종종 작은 함선을 한 번의 발사로 완전히 동화시킬 수 있을 만큼 큽니다."
 tech_sm_titanic:0 "감정이 있는 금속 포식자"
 tech_sm_titanic_desc:0 "$tech_sm_titanic$은 목표를 공격하기 위해 감응 금속을 직접적으로 사용하지 않습니다. 대신, 물자의 $ehof_the_sphere_named$와 $ehof_ep$에 대한 연결을 이용하여 $ehof_the_sphere_named$가 에너지 전송 $ehof_wormhole_text$를 열도록 합니다. 그 결과로 발생하는 거대한 에너지 방출을 적 함선으로 향하게 합니다."
 tech_qnm_pd_tracking:0 "부정 질량 포인트 방어"
 tech_qnm_pd_tracking_desc:0 "$tech_qnm_pd_tracking$는 다가오는 발사체를 향해 부정 질량의 확장하는 파동을 발사하여 그 경로를 이탈시킵니다."
 tech_qnm_lasers:0 "부정 질량 레이저"
 tech_qnm_lasers_desc:0 "$tech_qnm_lasers$는 바리온 물질을 포함한 모든 형태의 물질을 비일관화하기 위해 집중된 음의 질량 전도체를 사용합니다."
 tech_qnm_plasma:0 "부정 질량 유사 플라스마 발사기"
 tech_qnm_plasma_desc:0 "$tech_qnm_plasma$는 부정 질량의 일관된 구체를 발사하여 충돌하는 모든 형태의 물질을 폭발적으로 파괴합니다."
 tech_qnm_disruptors:0 "부정 질량 방해기"
 tech_qnm_disruptors_desc:0 "$tech_qnm_disruptors$는 엄청나게 파괴적인 음의 질량의 파동을 발사하여 대량의 물질을 비결정화합니다. 불행히도, 이러한 파동은 짧은 거리 후에 소멸합니다."
 tech_qnm_energy_torpedoes:0 "부정 질량 어뢰"
 tech_qnm_energy_torpedoes_desc:0 "$tech_qnm_energy_torpedoes$는 음의 질량의 반발력을 이용하여 우리의 집합된 중성자 전투부의 파괴력을 증대시킵니다."
 tech_qnm_energy_lance:0 "부정 질량 랜스"
 tech_qnm_energy_lance_desc:0 "$tech_qnm_energy_lance$는 지속적인 음의 질량 광선을 발사하여 가장 강화된 물자 방어조차도 아원자(또는 동등한) 수준에서 찢어버립니다."
 tech_qnm_arc_emitter:0 "부정 질량 방출기"
 tech_qnm_arc_emitter_desc:0 "$tech_qnm_arc_emitter$는 무작위로 편광되고 회전하는 음의 질량 광선을 산란 발사하여, 이를 방어하는 전용 방어체계는 단지 더 많은 선체에 불과합니다."
 tech_qnm_titanic:0 "부정 질량 빔"
 tech_qnm_titanic_desc:0 "$tech_qnm_titanic$은 단 한 번의 타격으로 방대한 물질을 비틀어 놓는 거대한 초점 광선입니다."
 tech_compound_armor:0 "위험 물질 흡수기"
 tech_compound_armor_desc:0 "§M우리는 하나로 일합니다.§!\n$tech_compound_armor$는 알려진 모든 형태의 들어오는 피해를 알 수 없는 과정을 통해 사용할 수 있는 에너지로 변환합니다."
 tech_compound_computers:0 "위험 물질 의식"
 tech_compound_computers_desc:0 "§M우리는 하나로 생각합니다.§!\n$tech_compound_computers$는 어두운 물질 하이브 마인드의 즉흥적인 노드 일치를 수행하여 함선을 조종하고 위협에 대응합니다."
 TECH_UNLOCK_COMPOUND_COMPUTERS_TITLE:0 "§H부품 잠금 해제:§! $tech_compound_computers$"
 TECH_UNLOCK_COMPOUND_COMPUTERS_DESC:0 "§H$tech_compound_computers$§!\n$tech_compound_computers_desc$"
 tech_compound_drives:0 "위험 물질 점프 드라이브"
 tech_compound_drives_desc:0 "§M우리는 하나로 움직입니다.§!\n$tech_compound_drives$는 수수께끼의 암흑 물질 유래 힘을 적용하여 지역 현실을 이동시킵니다."
 TECH_UNLOCK_COMPOUND_JUMPDRIVE_TITLE:0 "§H부품 잠금 해제:§! $tech_compound_drives$"
 TECH_UNLOCK_COMPOUND_JUMPDRIVE_DESC:0 "§H$tech_compound_drives$§!\n$tech_compound_drives_desc$"
 tech_compound_reactors:0 "위험 물질 반응로"
 tech_compound_reactors_desc:0 "§M우리는 하나로서 굶주립니다.§!\n$tech_compound_reactors$는 암흑 물질을 조작하여 막대한 양의 에너지를 생산합니다."
 TECH_UNLOCK_COMPOUND_REACTOR_TITLE:0 "§H부품 잠금 해제:§! $tech_compound_reactors$"
 TECH_UNLOCK_COMPOUND_REACTOR_DESC:0 "§H$tech_compound_reactors$§!\n$tech_compound_reactors_desc$"
 tech_compound_sensors:0 "위험 물질 감지기"
 tech_compound_sensors_desc:0 "§M우리는 하나로 보고 있습니다.§!\n$tech_compound_sensors$는 은하를 유지하는 은하의 암흑 물질 흐름을 관찰하며, 거대한 규모에서 함대의 움직임을 추적합니다."
 TECH_UNLOCK_COMPOUND_SENSOR_TITLE:0 "§H부품 잠금 해제:§! $tech_compound_sensors$"
 TECH_UNLOCK_COMPOUND_SENSOR_DESC:0 "§H$tech_compound_sensors$§!\n$tech_compound_sensors_desc$"
 tech_compound_shields:0 "위험 물질 왜곡장"
 tech_compound_shields_desc:0 "§M우리는 하나로서 방어합니다.§!\n$tech_compound_shields$는 모든 알려진 형태의 공격 피해를 분산시킵니다."
 tech_compound_thrusters:0 "위험 물질 추진기"
 tech_compound_thrusters_desc:0 "§M우리는 하나로 움직입니다.§!\n$tech_compound_thrusters$는 물자 현실에 상대적으로 선박을 이동시켜 관성 없는 거의 임의의 빠른 이동을 가능하게 합니다."
 TECH_UNLOCK_COMPOUND_THRUSTER_TITLE:0 "§H부품 잠금 해제:§! $tech_compound_thrusters$"
 TECH_UNLOCK_COMPOUND_THRUSTER_2_DESC:0 "§H$tech_compound_thrusters$§!\n$tech_compound_thrusters_desc$"
 NAME_Dark_Matter_Species:0 "테네브리스"
 NAME_Stellar_Annihilator_Species:0 "§B12-등급-파괴-함선§!"
 name_list_creators:0 "창조자들"
 name_list_compound:0 "컴파운드"
 SUBJECT_guardian:0 "수호자"
 SUBJECT_DESC_guardian:0 "그들의 대군주의 수호를 맹세한 자들"
 bombardment_compound:0 "궤도 변환"
 bombardment_compound_desc:0 "$bombardment_compound$ 폭격이 행성을 정화합니다, 모든 생명들을 존재함에서 해방시킵니다.\n- §HArmies§!에게 §R막대한§! 피해\n- §HPlanet§!에게 §R막대한§! 피해\n- §HPops§!에게 §R막대한§! 피해\n- 보호되고 있지 않는 행성을 포격합니다\n- 행성을 거주불가능상태로 격하할 수 있습니다"
 resolution_galactic_focus_crisis_compound:0 "집중: $ehof_the_compound_text$"
 resolution_galactic_focus_crisis_compound_desc:0 "$ehof_the_compound_text$는 은하의 모든 생명에 대한 심각한 위협입니다. 우리가 이를 막기 위해 단결하지 않는다면, 우리는 모두 파괴될 것입니다. 이 위기에 대처하는 것이 은하적 초점이 되어야 합니다."
 resolution_galactic_focus_crisis_compound_effect_success:0 "$resolution_galactic_focus_crisis_effect_success$"
 resolution_category_compound_focus:0 "$resolution_category_galactic_focus$"
 galcom_gigas_threatened_compound:0 "$ehof_the_compound_text$에 의해 위협받고 있습니다."
 galcom_gigas_not_threatened_compoud:0 "$ehof_the_compound_text$에 의해 위협받지 않음"
 galactic_focus_crisis_compound:0 "$TRIGGER_FAIL$ $ehof_the_compound_text$을(를) 무찌르십시오."
 galactic_focus_crisis_compound_desc:0 "$ehof_the_compound_text$는 진정한 위기이며 은하 전체에 대한 위협입니다. 우리는 단결하여 이 위협을 물리쳐야 합니다."
 ehof_shroud:0 "§P장막§!"
 ehof_shroud_ftl:0 "§P장막 FTL§!"
 ehof_the_creators:0 "§B창조자들§!"
 ehof_the_compound:0 "컴파운드"
 ehof_the_compounds:0 "컴파운드"
 ehof_the_compound_text:0 "§M복합체§!"
 ehof_the_compounds_text:0 "§M화합물§!의"
 ehof_preservation_sphere:0 "§H보존 구체§!"
 ehof_the_stellar_annihilator:0 "§B항성 절멸자§!"
 ehof_the_stellar_annihilators:0 "§B항성 절멸자§!"
 ehof_the_stellar_eradicator:0 "§R항성 근절자§!"
 ehof_the_stellar_eradicators:0 "§R항성 근절자§!"
 job_compound_purge:0 "변환"
 job_compound_purge_plural:0 "변환"
 job_compound_purge_desc:0 "이 팝은 변형되고 있습니다. 완벽이 손짓합니다."
 pop_cat_compound_purge:0 "선택 받은 자"
 pop_cat_compound_purge_plural:0 "선택 받은 자"
 pop_cat_compound_purge_desc:0 "저 선택받은 자들은, 자유다."
 mod_damage_vs_country_type_compound_empire_mult:0 "$ehof_the_compound_text$에 대한 피해"
 ehof_sa_prefix:0 "$ehof_the_stellar_annihilator$: "
 ehof_sa_line:0 "\n-------------------------------\n"
 ehof_sa_defend:0 "$ehof_sa_prefix$ 방어$ehof_sa_line$$ehof_the_stellar_annihilator$가 §H[root.Capital.GetName]§!에서 10 점프 거리 내에 위치할 것이며, 가장 가까운 §M컴파운드§! 함대를 공격하고 쿨다운이 아닐 때 $ehof_shroud_ftl$을 사용할 것입니다."
 ehof_sa_sphere:0 "$ehof_sa_prefix$$ehof_preservation_sphere$$ehof_sa_line$$ehof_the_stellar_annihilator$가 $ehof_preservation_sphere$로의 가장 짧은 경로로 움직일 것입니다."
 ehof_sa_follow:0 "$ehof_sa_prefix$따르기$ehof_sa_line$$ehof_the_stellar_annihilator$가 쿨다운이 아닐 때 $ehof_shroud_ftl$을 사용하며 §H[discoverer_fleet.GetName]§!(을)를 따라갈 것입니다."
 ehof_sa_attack:0 "$ehof_sa_prefix$공격$ehof_sa_line$$ehof_the_stellar_annihilator$가 가장 가까운 §M컴파운드§! 성계를 공격할 것입니다."
 ehof_sa_comm:0 "$ehof_sa_prefix$통신$ehof_sa_line$$ehof_the_stellar_annihilator$와의 통신을 개시합니다."
