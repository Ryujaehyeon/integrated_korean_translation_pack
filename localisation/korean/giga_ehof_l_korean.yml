 origin_incohesive:0 "고독"
 origin_incohesive_desc:0 "이 문명은 우주에서 멀리 떨어진 공간의 음울하고 죽은 행성에서 발전했습니다."
 origin_incohesive_effect_desc:0 "- §L웜홀-고립 성단§! 내에서 시작하며, 주변에 폐허가 된 §LEHOF 알파§!가 있는 블랙홀 성계가 존재합니다.\n- 또한 EHOF 기술이 어느정도 발전한 상태로 시작하므로, EHOF를 좀 더 일찍 복구할 수 있을 것입니다.\n\n§R멀티플레이에 맞는 밸런스는 아닙니다."
