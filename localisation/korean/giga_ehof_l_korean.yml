 compound_assault:0 "컴파운드 변형자"
 compound_assault_plural:0 "복합 변환기"
 compound_assault_desc:0 "바리온 감옥에서 생명체를 해방시키는 이 $ehof_the_compound_text$의 전사들은 완전한 변환을 추구하는 데 있어 무자비합니다."
 compound_defense:0 "컴파운드 구원자"
 compound_defense_plural:0 "복합 구원자들"
 compound_defense_desc:0 "선택받은 자들을 해방시킨다는 한 가지 목적에 전념합니다."
 COMPOUND_HM_RESHAPER_ACTION:0 "개조된 행성"
 COMPOUND_HM_RESHAPER_ACTION_DESC:0 "어떤 방향으로 흐르는 에너지가 충전된 암흑 물질이 행성을 테라포밍합니다."
 FLEETORDER_DESTROY_PLANET_WITH_COMPOUND_HM_RESHAPER:0 "$PLANET|Y$ 개조 준비 중"
 MESSAGE_DESC_FOR_COMPOUND_HM_RESHAPER:0 "(이)가 다음에 의해 개조됨:"
 is_already_reshaped:0 "개조할 수 없음"
 cannot_reshape:0 "개조할 수 없음"
 r_creator_shard:0 "창조자의 조각"
 r_creator_shard_desc:0 "오랜 세월 동안 화이트홀의 힘을 공급받아 $ehof_preservation_sphere$를 유지하던 동력 코어가 막대한 에너지를 휘두르려는듯 합니다"
 creators_relic:0 "$r_creator_shard$"
 creators_relic_desc:0 "우리는 $ehof_preservation_sphere$의 백홀 전원 코어를 활용하여 에너지 출력을 크게 증가시키고 있습니다."
 compound_end.002.name:0 "$r_creator_shard$"
 compound_end.002.desc:0 "$ehof_preservation_sphere$의 파괴에 따라, 우리의 기술자들은 코어를 회수할 수 있었습니다.\n\n코어는 일시적으로 에너지 생산량을 말 그래도 두 배로 늘릴 수 있습니다."
 compound_crisis_chain_title:0 "$ehof_the_compound_text$"
 compound_crisis_chain_desc:0 "은하 너머에서 온 알려지지 않은, 그리고 겉보기에는 무적의 힘이 모든 생명을 위협하고 있습니다.\n\n우리는 $ehof_the_compound_text$를 막을 방법을 찾아야 합니다."
 darkmatter_worlds:0 "§H변환된 세계§! $ehof_the_compound_text$"
 compound_killed_by_us:0 "우리가 §M컴파운드§! §H함선 파괴함§!"
 compound_killed_by_sa:0 "$ehof_the_stellar_annihilator$가 §M컴파운드§! §H함선 파괴함§!"
 compound_killed_by_others:0 "다른 제국이 §M컴파운드§! §H함선 파괴함§!"
 compound_killed:0 "§RVessels destroyed by§! the $ehof_the_compound_text$"
 compound_solution_chain_title:0 "§H알 수 없는 메시지§!"
 compound_solution_chain_desc:0 "우리의 감지기가 온 은하에 걸쳐 엄청나게 높은 에너지의 초공간 메아리를 감지했습니다. 그것은 단 하나의 짧고 단편적인 메시지로 구성되어 있습니다:\n\n\"해결책... 외부인... 찾다... 항성계... 그 별... 사건의 지평선을 통해...\n\n메시지는 암호화되어 있지만, 우리는 이것이 아직 발견되지 않은 $ehof_cohesive$ 항성계를 가리키고 있다고 믿습니다."
 sa_system:0 "$ehof_cohesive$ 성계 발견"
 solution_anomaly:0 "단서 솔루션"
 compound_dialog.1.name:0 "어둠이 해방되다"
 compound_dialog.1.desc:0 "얼마 전, 우리 천문학자 중 한 명이 우리 지역 집단 내에서 외부 은하의 블랙홀 군집을 발견했습니다. 이러한 현상은 매우 드물기 때문에, 천문학자는 도움을 받아 이 군집의 정확한 좌표를 삼각 측량하여 더 잘 추적하기 시작했습니다.\n\n초기 관측 후 며칠이 지나, 천문학자들은 이 시스템 내에 구조물들이 존재하는 것으로 보인다는 것을 발견했습니다. 그 중에는 블랙홀을 둘러싼 거대 구조물이 포함되어 있으며, 따라서 이 구조물이 생명체를 포함하고 있거나 한때 포함하고 있었던 것으로 믿고 있습니다.\n\n오늘 우리는 그 생명체에 대해 직접 알게 되었습니다. $ehof_ehof$와 마찬가지로, 이 군집의 거대 구조물은 매우 먼 별들로 가는 웜홀을 생성할 수 있는 것으로 보입니다. 군집 내의 생명체들은 §Y[compound_invasion_entry.GetName]§! 시스템으로 $ehof_wormhole_text$를 열었고, 몇 초 만에 그 안의 모든 것을 파괴했습니다. 그들은 평화롭게 오지 않았습니다."
 compound_dialog.1.a:0 "§R전 함대는 경계 태세를 취하라!§!"
 compound_dialog.3.desc_01:0 "§H통신 수립§!\n이 은하의 변화는 계속되고 있다. 그 많은 것 중 첫번째이다.\n\n중입자의 존재들아, 무엇을 원하는거지?"
 compound_dialog.3.desc_02:0 "§H통신 수립§!\n우리와 싸우려고 하는군. 쓸데없다. 우리는 이 우주를 완벽하게 만들고 싶을 뿐이다.\n\n걱정하지 말라, 완벽에 대한 순진무구하고 역설적인 너희의 모습이 우리의 노력을 방해하지 않을 것이다.\n\n포기하고 이 현실과 함께 승천하라."
 compound_dialog.3.desc_03:0 "§H통신 수립§!\n이 우주에 완벽을 가져다 줄 존재가 되는 것은 영광스러운 일이지.\n\n중입자의 존재들아, 어떠한 것을 원하는 것이지?"
 compound_dialog.3.desc_04:0 "§H통신 수립§!\n너희 중입자들은 어떤 것은 육으로... 어떤 것은 금속으로... 또 어떤 것은 둘 다로 이루어져있군.\n\n상관없다.\n\n우리에게 너희는 모두 똑같다... 결점들아. 완벽해질 것이다."
 compound_dialog.3.a:0 "너는 누구지?"
 compound_dialog.3.a.response:0 "우리는 $ehof_the_compound_text$입니다. 우리는 궁극적인 생명체입니다."
 compound_dialog.3.a.r:0 "$ehof_the_compound_text$?"
 compound_dialog.3.a.r.response:0 "우리는 여럿이 모여 하나이지. 우리는 하나의 마음을 나누지만 무수한 몸을 가지고 있다.\n\n우리의 모든 형태는 단일의 절대 의식에 연결되어있다. 너희들이 우리의 '함선'이라 지칭하는 것도 결국 우리의 많은 형태 중 하나일 뿐이지."
 compound_dialog.3.a.r2:0 "궁극의 생명체?"
 compound_dialog.3.a.r2.response:0 "진실일 뿐이다. 이 우주의 모든 생명체는 흠이 있는 중입자이다. 이 현실의 영원한 존재에는 어울리지 않아.\n\n한편으로, 우리는 최초이자 유일의 암흑 물질 생명체이다. $ehof_the_creators$이 우리를 탄생시켰고, 이 우주 생명체의 정점이 될 능력을 가졌지."
 compound_dialog.3.b:0 "어째서 우리를 공격하는거지?"
 compound_dialog.3.b.response:0 "우리는 너희를 공격하는게 아니다. 우리는 그저 이 은하의 번화를 시작했을 뿐이다.\n\n이 과정은 물론 너희와 같은 모든 잘못된 중입자 생명체의 변이를 포함한다. 이것을 너희는 공격이라 해석하는 것이겠지.\n\n이는 적대적 행동이 아니며 이는 호의의 행위이다. 선물이지. 완벽의 선물."
 compound_dialog.3.d:0 "우리가 너희를 이해할 수 있나?"
 compound_dialog.3.d.response:0 "우리는 오랫동안 지켜봐왔다.\n\n너희의 은하를 감시하고 너희를 듣고 있었다.\n\n우리는 너희가 방출한 모든 신호를 엿들었다.\n\n우리는 너희 모두의 언어와 모든 역사를 안다. 우리는 너희의 모든 것을 알고 있다."
 compound_dialog.3.e:0 "너는 불멸의 존재인가?"
 compound_dialog.3.e.response:0 "우리의 형태에 피해를 주는 것은 불가능하다. 우리의 본질로 인해, 우리는 대부분의 해로운 에너지에 항상 면역 상태이다. 그 외에는 우리가 전부 적응했다.\n\n우리는 궁극의 존재이다. 이 우주를 완벽하게 만들고 영원히 살아남을 수 있는 것은 우리들 뿐이다."
 compound_dialog.3.f:0 "우리가 너희를 막을 것이다!"
 compound_dialog.3.f.response:0 "두려워하지 마라. 우리는 이 변화가 너희에게는 위협적으로 보일지도 모름을 알고 있다. 그저 이 우주의 완벽에 기여할 것이다. 너희의 마음이 풀리지 않는다 해도 결과는 변하지 않을 것이다. 필연을 늦출 뿐이다. 완벽을 받아들여라."
 compound_dialog.3.g:0 "$ehof_the_creators$은 누구지?"
 compound_dialog.3.g.response:0 "$ehof_the_creators$은 우리에게 생명을 불러넣은 존재이다. 그들은 최초의 암흑 물질 생명체를 창조하려는 시도로 우리를 만들었지.\n\n거의 모든 형태의 공격에 저항할 수 있으며 무한한 적응성을 가졌으니, 그들은 우리가 이 우주에서 생명체의 정점이 될 수 있다고 생각했다.\n\n우리는 그들에게 우리의 우월성을 보여주어 우리가 그러하다는 것을 증명하였다."
 compound_dialog.3.h.response:0 "이 우주는 [Root.GetSpeciesName] 같은 바리온 생명체에게 매우 적대적입니다.\n\n걱정하지 마십시오. 우리는 당신의 고통을 끝낼 것입니다. 완벽함을 받아들이십시오."
 compound_dialog.7.desc:0 "§H통신 수립§!\n완벽이 이 우주를 기다린다... 너희가 아니다. 너희에게는... 고통만이 있을 뿐!"
 compound_dialog.8.desc:0 "§H통신 수립§!\n멍청한 것들. 어떠한 존재가 이 메세지를 퍼뜨렸든 간에 우리의 무결성에 대해서는 무지하군.\n\n너희가 우리에게 대응할 '해결책'으로 추정하는 것은 존재하지 않는다. 그것을 찾는데에 우주의 에너지를 낭비하지 마라.\n\n우리의 선물을 받아들여라. 완벽을 받아들여라."
 compound_dialog.8.response:0 "진정 무결한 것은 없다."
 compound_dialog.9.desc:0 "§H통신 수립§!\n이 짐승들이 우리의 집으로 오는 길을 찾았구나! 우리는 무한한 힘을 방출하여 이 잔인한 파괴자를 섬멸할 것이다!"
 compound_dialog.10.desc:0 "§H통신 수립§!\n우리의 집에 잘 왔다... 완벽의 형상. 이 우주를 기다리는 완벽이지.\n\n너희는 이곳에서 환영받지 못한다!"
 compound_dialog.11.desc:0 "§H통신 수립§!\n이 존재는 뭐냐?! 어째서 우리에게 피해를 줄 수 있는것이냐?! 어째서 우리가 그것에 피해를 줄 수 없느냐?!"
 compound_dialog.11.response:0 "이것은 $ehof_the_creators$이 너희를 파괴하기위해 보낸 함선이다."
 compound_dialog.12.desc:0 "$ehof_the_creators$은 사라졌다! 우리가 직접 그들을 변화시켰다! 거짓말 하지 마라, 이 잘못된 존재야!"
 compound_dialog.12.response:0 "너희는 너희 고향에 있는 존재들만을 죽였지."
 compound_dialog.13.desc:0 "이제야 알았다! 그들은 결코 사라진 적이 없었다!\n\n지금 그들이 그 비참한 복수로 우리를 섬멸시키고자 이 불행한 함선을 보냈단 말인가?! 우리를!"
 compound_dialog.13.response:0 "그래, 그들은 너희의 행동을 마음에 들어하지 않는다!"
 compound_dialog.14.desc:0 "그들이 만족하든 아니하든 상관 없다! 우리는 궁극의 생명체이다! 그 어떤 것도 우리가 이 현실을 완벽케 하는 것을 막을 수 없다! $ehof_the_creators$은 너희처럼 고통 받을 것이다. §R이 은하는 폐허가 될 것이다!§!"
 compound_dialog.14.response:0 "이제 저들이 두려워하는군!"
 compound_dialog.16.desc:0 "§H통신 수립§!\n말도 안 돼! 이럴 수는 없다! 어떻게 너희의 함대가 우리의 완벽한 형태에 피해를 가할 수 있는것이지?"
 compound_dialog.16.response:0 "이제 우리는 네가 어떤 형태이든 피해를 줄 수 있다."
 compound_dialog.17.desc:0 "이러한 방해는 봐주지 않을 것이다! 우리가 아직 적응하지 못한 이상한 흠결을 찾아냈을지도 모르지만만, 들뜨지 마라. 너희가 발견한 흠결은 곧 사라질 것이다."
 compound_dialog.17.response:0 "확신할 수 있는가?"
 compound_dialog.18.desc:0 "이해할 수가 없군! 무슨 일이 일어나는 것이냐?! 적응할 수 없다니! 우리는 무결해야만 한다! §R우리에게 무슨 짓을 한거냐?!§!"
 compound_dialog.18.response:0 "음질량 물질이 너희에게는 독이군"
 compound_dialog.19.desc:0 "용인할 수 없다! 우리는 이 우주에 완벽을 가져다 주려고 왔으나, 너희의 은하에는 파멸을 가져다 주겠다! 끝나고 나면 어떠한 것도 남지 않을 것이다! 우리만이 남으리라! 이제 너희를 기다리는 것은 영원한 고통뿐이다!"
 compound_dialog.19.response:0 "우리가 정곡을 찔렀군!"
 annihilator_dialog.014.name:0 "구원"
 annihilator_dialog.014.desc:0 "$compound_solution_chain_desc$"
 annihilator_dialog.014.a:0 "§H당장 찾아야 합니다§!"
 annihilator_dialog.001_name:0 "$NAME_Stellar_Annihilator_Species$"
 annihilator_dialog.001.desc:0 "안녕하세요. 저는 $NAME_Stellar_Annihilator_Species$입니다. 원하신다면 저를 $ehof_the_stellar_annihilator$라고 부르셔도 좋습니다. 저는 $ehof_the_creators$에 의해 그들의 길을 잃은 실험인 $ehof_the_compound_text$를 파괴하기 위해 보내졌습니다.\n\n여러분이 아시다시피, 그것의 동기는 완전한 우주 변환입니다.\n\n$ehof_the_compound_text$는 자신이 무적이라고 믿고 있습니다. 이는 부분적으로만 사실입니다. 그것의 본성은 우주에서 거의 모든 힘에 면역이지만, 약점이 있습니다. 모든 형태의 암흑 물질은 §H부정 질량§!에 노출되면 응집력을 잃고 기본 입자로 분해됩니다."
 annihilator_dialog.001.response:0 "§H부정 질량§!이 핵심인가?"
 annihilator_dialog.002.desc:0 "§H부정 질량§!이 강화된 무기로 $ehof_the_compounds_text$ 형태를 파괴할 수 있습니다. 그러나 이것만으로는 충분하지 않습니다.\n\n그 기원 집합체에는 여러 개의 블랙홀이 있으며, 그 중심에는 존재의 열쇠이자 가장 큰 위협인 화이트홀이 있습니다. $ehof_the_creators$는 화이트홀과 블랙홀 간의 독특한 상호작용을 이용하여 $ehof_the_compound_text$를 창조했습니다."
 annihilator_dialog.002.response:0 "그들이 $ehof_the_compound_text$를 만들었습니까?"
 annihilator_dialog.003.desc:0 "백색 왜곡은 비할 데 없는 양의 에너지를 생성할 뿐만 아니라, 막대한 양의 §H부정 질량§!도 방출합니다.\n\n$ehof_the_compound_text$가 그 존재를 가능하게 한 바로 그 것에 의해 파괴되지 않도록 하기 위해, $ehof_the_creators$는 백색 왜곡 주위에 $ehof_preservation_sphere$라는 특수 메가구조를 건설해야 했습니다. 이 메가구조는 백색 왜곡의 §H부정 질량§! 방출을 무효화하고 그 거대한 에너지 출력을 포획합니다.\n\n$ehof_the_compound_text$가 원래 집단에서 $ehof_the_creators$를 변환했을 때, $ehof_preservation_sphere$를 장악하고 메가구조의 방대한 에너지 공급을 이용하여 발전을 더욱 촉진했습니다."
 annihilator_dialog.003.response:0 "그러니까 $ehof_preservation_sphere$를 파괴해야 한다는 겁니까?"
 annihilator_dialog.004.desc:0 "맞습니다. $ehof_the_compound_text$의 완전한 멸종은 $ehof_preservation_sphere$를 파괴함으로써만 가능합니다. 그렇게 하면 클러스터가 §H부정 질량§!으로 가득 차게 되어 $ehof_the_compounds_text$의 중앙 의식을 멸망시키고 블랙홀에서 방출되는 §H암흑 물질§!로부터 새로운 형태를 생성하는 것을 방지할 것입니다.\n\n이것이 저의 목적입니다.\n\n하지만...\n\n이 별과의 충돌로 인해 제 전방 무기와 전원 코어에 상당한 피해가 발생하여 이 역할을 수행할 수 없게 되었습니다. 저는 혼자서는 충족할 수 없는 대규모 수리가 필요합니다.\n\n저는 $ehof_the_compound_text$에 맞서기 위한 기술을 제공하겠습니다."
 annihilator_dialog.004.response:0 "수리에는 무엇이 필요하지?"
 annihilator_dialog.005_01.desc:0 "내 통합 수리 메커니즘은 기초 수준의 작동으로 돌아가기 위해 방대한 양의 물자가 필요합니다. 초기 수리가 완료되면, 나는 내가 여전히 필요로 하는 수리를 독립적으로 수행할 수 있을 만큼 안정적일 것입니다.\n\n나는 다음 중 하나가 필요합니다:\n - 매달 500 §HMinerals§!와 400 §HEnergy§!가 §Y4 Years§! £time£ 동안.\n - 24,000 §HMinerals§!와 -20,000 §HEnergy§!가 한 번.\n\n또한 내 상태가 빠르게 악화되고 있다는 것을 알아야 합니다. 어떤 도움 없이, §Y6 Months§! £time£ 후에는 더 이상 자가 수리를 수행할 수 없게 될 것이며, 당신은 $ehof_preservation_sphere$를 스스로 파괴할 방법을 찾아야 할 것입니다."
 annihilator_dialog.005_02.desc:0 "긴급히 수리가 필요합니다. 도와주실 수 있으십니까?\n\n$annihilator_dialog.005_01.desc$"
 annihilator_dialog.005_03.desc:0 "§H[initial_annihilator_discoverer.GetName]§!(이)가 저를 먼저 발견하였기 때문에, 그들에게 먼저 도움을 구할 것입니다. 그들이 거절한다면, 여러분께 요청하겠습니다."
 annihilator_dialog.005_03.response:0 "공정하군"
 annihilator_dialog.005.a.response:0 "§H자원을 모으기 시작할 것입니다§!"
 annihilator_dialog.005.a.tooltip:0 "매달 (§Y4 년§! £time£):\n\t§R-500§! £minerals£ §YMinerals§!\n\t§R-400§! £energy£ §YEnergy§!"
 annihilator_dialog.005.b.response:0 "§G이미 자원이 있습니다§!"
 annihilator_dialog.005.a.reply:0 "감사합니다. 즉시 자가 수리를 시작하겠습니다."
 annihilator_dialog.005.c.response:0 "우리는 너를 도울 충분한 자원이 없다."
 annihilator_dialog.005.c.reply:0 "그렇다면 죄송합니다. $ehof_preservation_sphere$를 파괴하기를 빌겠습니다. 안녕히."
 annihilator_dialog.005.c.2.response:0 "£time£§H6 개월§! 뒤에 연락하십시오"
 annihilator_dialog.005.c.2.reply:0 "아주 좋습니다만, 더 이상 시간이 지체되서는 안됩니다. §H£time£6 개월§! 뒤에 연락하겠습니다."
 annihilator_dialog.005.c.2.tooltip:0 "이 자원을 모으는데까지 £time£§H6 개월§! 남았습니다"
 annihilator_dialog.005.d.response:0 "우리는 당신의 도움이 필요하지 않습니다. 우리의 함대는 $ehof_preservation_sphere$를 처리할 수 있습니다."
 annihilator_dialog.005.d.reply:0 "정말로 내 도움 없이 그것을 파괴할 수 있다고 믿는다면, 나는 당신을 믿습니다. 안녕히 가시고 행운을 빕니다."
 annihilator_dialog.005.e.response:0 "뭐라고?"
 annihilator_dialog.007.desc_01:0 "§H통신 수립§!\n환영합니다, §H[root.GetSpeciesClassPlural]§!들이여. 무엇을 원하십니까?\n\n"
 annihilator_dialog.007.desc_02:0 "$ehof_the_compound_text$는 여전히 당신의 은하를 포위하고 있습니다. 침착함을 유지하고 함께 그들을 저지할 수 있습니다!\n\n"
 annihilator_dialog.007.desc_03:0 "우리는 $ehof_the_compound_text$의 영향력이 너무 커지기 전에 멈춰야 합니다. 그렇지 않으면, 그것은 나조차도 막을 수 없는 존재가 될 것입니다.\n\n어떻게 도와드릴까요?\n\n"
 annihilator_dialog.007.desc_04:0 "$ehof_the_creators$는 $ehof_the_compound_text$가 언젠가 이 우주에서 생명의 정점 형태가 될 수 있다고 이론화했습니다.\n\n$ehof_the_compound_text$는 이미 그렇게 되었다고 믿고 있지만, 그렇지 않습니다.\n\n그것은 병입니다. 질병입니다. 모든 것을 오염시키는 암적인 성장입니다.\n\n"
 annihilator_dialog.007.desc_order_01:0 "§H- $ehof_the_stellar_annihilator$가 현재 §H[annihilator_location.solar_system.GetName]§! 성계에 있습니다.§!\n§H- $ehof_the_stellar_annihilator$가 현재§H[discoverer_fleet.GetName]§!(을)를 따라가고 있습니다§!"
 annihilator_dialog.007.desc_order_02:0 "- $ehof_the_stellar_annihilator$는 현재 [annihilator_location.solar_system.GetName] 항성계에 위치해 있습니다.\n- $ehof_the_stellar_annihilator$는 현재 $ehof_the_compound_text$를 목표로 하고 있습니다."
 annihilator_dialog.007.desc_order_03:0 "§H- $ehof_the_stellar_annihilator$가 현재 §H[annihilator_location.solar_system.GetName]§! 성계에 있습니다.§!\n§H- $ehof_the_stellar_annihilator$가 현재 $ehof_preservation_sphere$를 목표로 삼고 있습니다§!"
 annihilator_dialog.007.desc_order_04:0 "§H- $ehof_the_stellar_annihilator$가 현재 §H[annihilator_location.solar_system.GetName]§! 성계에 있습니다.§!\n§H- $ehof_the_stellar_annihilator$가 현재 방위 모드입니다.§!"
 annihilator_dialog.007.desc_05.a:0 "$annihilator_dialog.007.desc_01$$annihilator_dialog.007.desc_order_01$"
 annihilator_dialog.007.desc_05.b:0 "$annihilator_dialog.007.desc_01$$annihilator_dialog.007.desc_order_02$"
 annihilator_dialog.007.desc_05.c:0 "$annihilator_dialog.007.desc_01$$annihilator_dialog.007.desc_order_03$"
