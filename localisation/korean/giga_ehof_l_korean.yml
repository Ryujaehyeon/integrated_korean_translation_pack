 ehof_system_list_title:0 "$ehof_ehof$"
 ehof_system_list_desc:0 "우리는 우리가 착수한 모든 외부 은하 탐험 기록을 보관하기로 했습니다.\n\n우리는 성계의 좌표, 별의 수와 이름, 행성과 거주 가능한 행성, 위성과 소행성을 기록하고 있습니다. 우리는 성계가 가지고있을법한 자원이 무엇인지에 대한 추정도 기록할것입니다.\n\n우리는 이러한 정보가 각 성계의 과정을 추적하는데 사용하고, 많은 양의 정보를 해결할 경우 또는 해결 시 매우 중요한 것으로 판명될것이라 믿습니다."
