l_korean:
 mem_science_convention.1.name:0 "과학 협회"
 mem_science_convention.1.desc:0 "우리 과학자들은 학문 간 융합에 집중하는 대규모 과학 협회를 만들 때 우리의 모든 연구를 크게 항상 시킬 수 있을 것이라 믿습니다."
 mem_science_convention.1.ayes:0 "훌륭한 생각이군."
 mem_sciencecon_1.a.tooltip:0 "과학 협회는 준비 과정 중에 있으며 12개월 뒤에 완성될 것입니다."
 mem_sciencecon_1.b.tooltip:0 "과학 협회는 준비 과정 중에 있으며 12개월 뒤에 완성될 것입니다. 기다리는 동안 우린 초대장을 보내야 할 것입니다."
 mem_sciencecon_1.c.tooltip:0 "과학 컨벤션을 시작할 수 없습니다. 자금이 부족합니다.\n필요한 자원 - \n£energy  §Y250§! \n£minerals  §Y250§!"
 mem_science_convention.1.ano:0 "아쉽게도 우린 이런 거대한 프로젝트를 진행할 자금이 없다."
 mem_science_convention.1.b:0 "그래, 또 누가 참여하고 싶어하는지 보자."
 mem_science_convention.1.c:0 "아니, 지금도 이미 충분히 힘든 작업이다."
 mem_science_convention.2.name:0 "과학 협회 준비 끝"
 mem_science_convention.2.desc:0 "협회의 준비과정이 끝났습니다. 이제 개회식을 진행하면 됩니다."
 mem_science_convention.2.a:0 "쇼타임이다!"
 mem_science_convention.3.name:0 "엄청난 성공!"
 mem_science_convention.3.desc:0 "학문 간 융합을 위한 과학 협회는 매우 성공적이었습니다! 제국 곳곳에서 과학자들이 모여서 아이디어를 공유하고, 새로운 이론을 개발하고 새로운 물건들을 발명했습니다. 이렇게 많은 지식인이 모인 결과 수많은 수수께끼가 해결되었고 기존은 메커니즘들도 간소화되거나 더 나은 것으로 교체되었습니다."
 mem_science_convention.3.a.desc:0 "학제 간 과학 회의는 대성공을 거두었습니다! 우리 제국 전역의 과학자들이 모여 개념과 아이디어를 공유하고, 새로운 발명을 설명하며, 함께 새로운 이론을 개발했습니다. 다양한 과제가 주어진 이 새로운 인재들의 도움으로 여러 어려운 문제들이 해결되었고, 여러 기존 메커니즘이 간소화되거나 더 나은 것으로 완전히 대체되었습니다. 우리의 다양한 과학 분야에 대한 혜택은 측정할 수 없을 정도로 크며, 회의의 창조자로서의 우리의 역할은 관련된 모두의 눈에 훨씬 더 긍정적으로 비춰지게 만들었습니다."
 mem_science_convention.3.b.desc:0 "학문 간 융합을 위한 과학 협회는 매우 성공적이었습니다! 비록 §Y[invite_sender.GetName]§!의 과학자들에 비해 우리의 과학자들의 존재감은 매우 적었지만, 그들은 우리를 환영했습니다. 아이디어의 자유로운 교환은 우리의 다양한 연구에 진전을 가져와 주었고, §Y[invite_sender.GetAdj]§!의 강의는 우리의 과학자들의 상상을 초월할 정도로 유익했습니다. 우리 과학자들은 상당히 긍정적으로 반응했으며 미래에도 이 이벤트를 다시 개최하면 참여하겠다고 했습니다."
 mem_science_convention.3.a:0 "역사에 남을 업적이다!"
 mem_science_convention.4.name:0 "주목할 만한 일이군."
 mem_science_convention.4.desc:0 "학제 간 과학 회의는 예상대로 진행되었습니다. 다양한 항성계의 과학자들이 참석하였고, 다양한 지적 교류가 여러 새로운 흥미로운 연구 방향을 열었습니다. 우리의 주최자들은 이것이 우리의 다양한 연구 분야에 매우 유익한 행사였다고 확신합니다."
 mem_science_convention.4.a.desc:0 "우리 과학자들은 의구심이 있었지만, 학제 간 과학 회의가 무사히 진행되었다고 기쁜 마음으로 보고합니다. 시연된 많은 기술과 전시된 대부분의 개념은 이미 우리에게 익숙한 것이었지만, radically 다른 배경을 가진 과학 공동체와 아이디어와 이론을 교환할 기회는 우리 과학자들에게 많은 사색의 기회를 제공했으며, 그들이 이전에는 갖지 못했던 §Y[invite_sender.GetSpeciesNamePlural]§!에 대한 이해를 가져다주었습니다."
 mem_science_convention.4.a:0 "훌륭한 소식이군."
 mem_science_convention.5.name:0 "불행스러운 대실패였다."
 mem_science_convention.5.desc:0 "학제 간 과학 회의는 불행히도 우리가 기대했던 것만큼 잘 진행되지 않았습니다. 보안 팀은 건물 안으로 어떤 물질도 반입하지 못하도록 엄격한 지시를 받았음에도 불구하고, 누군가가 그 물질을 몰래 반입하여 여러 과학자들이 취하게 되고 공개적으로 망신을 당하는 사태가 발생했습니다. 게다가, 우리의 연구원들이 각자의 분야를 바탕으로 서로 간의 경쟁을 벌이고 있는 것 같으며, 많은 물리학자들이 공학 부서를 자극할 때 소란을 일으켰습니다."
 mem_science_convention.5.a.desc:0 "학제 간 과학 회의는 다소 실패로 돌아갔습니다. 주최자의 최선의 노력에도 불구하고, 그들의 다루기 힘든 과학자 몇 명이 보안을 뚫고 몇 가지 중독성 물질을 몰래 반입하는 데 성공했으며, 고조된 적대감으로 인해 그들의 경쟁 연구원들 간에 몇 차례 폭력적인 충돌이 발생했습니다. 우리 과학자들은 거의 말을 꺼낼 수 없었고, 많은 이들이 이 사건을 '완전한 시간 낭비'로 간주하고 있습니다. 아마 다음 번에는 참석하지 않는 것이 좋을 것입니다."
 mem_science_convention.5.a:0 "비난받을만 하다."
 mem_science_convention.6.name:0 "총체적 재앙!"
 mem_science_convention.6.desc:0 "학제 간 과학 회의는 절대적인 실패였습니다. 건물 안으로 어떤 물질도 반입하지 말라는 엄격한 명령에도 불구하고, 우리의 보안 팀은 다양한 약물이 회의에 반입되는 것을 허용하여 광범위한 혼란과 여러 명의 입원자를 초래했습니다. 게다가, 우리 직원 중 한 존경받는 과학자가 잠재적인 짝에게 깊은 인상을 주기 위해 자신의 설계로 된 실험용 무기를 조기에 작동시키려 했습니다. 그 무기는 즉시 폭발하여 광범위한 공황을 일으키고 여러 연구원에게 부상을 입혔으며, 해당 과학자는 사망했습니다. 이 시점에서 회의는 취소되었고, 많은 과학 담당자들이 구금되어야 했습니다."
 mem_science_convention.6.a.desc:0 "학제 간 과학 회의는 절대적인 실패였습니다. 건물 내부에 어떤 물질도 반입하지 말라는 엄격한 명령에도 불구하고, 우리의 보안 팀은 다양한 약물이 회의에 반입되는 것을 허용하여 광범위한 혼란과 여러 명의 입원자를 초래했습니다. 게다가, 우리 직원 중 한 명의 존경받는 과학자가 자신의 설계로 실험용 무기를 조기에 작동시켜 잠재적인 짝에게 인상을 주려 했습니다. 그 무기는 즉시 폭발하여 광범위한 공황을 일으키고 여러 연구원이 부상을 입었으며, 해당 과학자는 사망했습니다. 이 시점에서 회의는 취소되었고, 많은 과학 담당자들이 구금되어야 했습니다. 이 회의는 이전에 없었던 국가적 실패로 간주되었으며, 초청된 많은 손님들이 우리를 좋지 않게 바라보게 되었습니다. 우리의 명성에서 이 오점을 지우는 데는 다소 시간이 걸릴 수 있습니다."
 mem_science_convention.6.b.desc:0 "우리가 참석한 학제 간 과학 회의는 최악의 경우 우리 민족에 대한 직접적인 모욕이었고, 최선의 경우에도 혐오스러운 것이었습니다. 주최 측의 과학자들은 무책임하고 유체적이었으며, 위험한 기술을 무심코 사용하고 사소한 경쟁의 만족을 위해 다른 이들을 위험에 빠뜨렸습니다. 한 특정 개인이 잠재적인 짝에게 인상을 주려는 시도로 인해 여러 명이 부상을 당하고 자신의 생명을 잃는 결과를 초래했으며, 이로 인해 행사는 조기에 신속하게 종료되었습니다. 이것이 불쾌한 농담이었는지, 우리 민족에 대한 의도된 모욕이었는지는 여러 과학자들이 §Y[invite_sender.GetName]§!와의 외교 관계를 유지할 가치가 없다고 믿고 있습니다."
 mem_science_convention.6.a:0 "우주적인 망신이다."
 mem_science_convention.6.a.host.tooltip:0 "과학자가 사망했습니다!"
 mem_science_convention.8.name:0 "과학 협회에 [invite_sender.GetSpeciesAdj]을(를) 초대하다"
 mem_science_convention.8.desc:0 "학문과 과학의 계몽을 지속적으로 추구하는 §Y[invite_sender.GetName]§!는 은하에서 가장 뛰어난 인재들이 모이는 자리를 마련하였습니다.\n\n우리는 §Y[This.GetName]§!의 저명한 과학자들을 '학제 간 과학 회의'에 참여하도록 초대합니다. 두 제국 모두 귀하의 연구원들이 회의에 참여함으로써 큰 혜택을 받을 것입니다."
 mem_science_convention.8.a:0 "흥미로운 결단이군. 승낙하지."
 mem_science_convention.8.b:0 "우리 과학자들은 여기에 낭비할 시간이 없다."
 mem_science_convention.8.phobe:0 "너희들의 '과학'은 미개하고 조잡하다. 거절하지."
 mem_science_convention.8.spi:0 "과학은 우주의 신비를 이해하지 못한다."
 mem_science_convention.8.phile:0 "외계 과학과 외계인 과학자들? 참여하겠다."
 mem_science_convention.8.mat:0 "우리 함께 더 나은 미래를 발견하자."
 mem_science_convention.8.col:0 "우린 과학은 물론이고 모든 분야에서 협력해야 한다."
 mem_science_convention.8.ind:0 "이러한 회의는 집단사고만을 초래할 것입니다."
 mem_science_convention.11.name:0 "과학 협회의 초대장"
 mem_science_convention.11.desc:0 "훌륭한 생각이군. 당신의 제안을 기쁘게 받아들입니다."
 mem_science_convention.11.a.desc:0 "[invite_sender.GetRulerTitle] [invite_sender.GetRulerName]도 우리와 마찬가지로 지식의 축적을 최우선 사항으로 여긴다는 사실이 기쁘군요. 우린 참여하겠습니다."
 mem_science_convention.11.b.desc:0 "이러한 이벤트는 우리 양국간의 외교 관계를 더욱 탄탄히 할 것이다. 우리는 참가하겠다."
 mem_science_convention.11.c.desc:0 "과학자 파티? 당연히 참여하지!"
 mem_science_convention.11.d.desc:0 "새로운 상품을 탐색해보는 것은 나쁜 생각이 아니지. 우린 참가하겠다."
 mem_science_convention.11.a:0 "환영합니다!"
 mem_science_convention.12.name:0 "과학 협회의 초대장"
 mem_science_convention.12.desc:0 "현재 이 제안이 우리의 이익에 부합한다고 생각하지 않습니다. 우리는 귀하의 제안을 거절해야 합니다."
 mem_science_convention.12.a.desc:0 "너희 같은 억압자들의 협회에 참가하라고? 농담이겠지."
 mem_science_convention.12.b.desc:0 "우린 너희 같은 외계인들과 과학을 의논하자니 차라리 집단 자살을 선택하겠다."
 mem_science_convention.12.c.desc:0 "우주적 외톨이들이 개최한 지식인들의 모임이라니, 이건 농담이겠지."
 mem_science_convention.12.a:0 "불행한 일이군."
 mem_opinion_science_convention_fantastic_time:0 "환상적인 과학 협회"
 mem_opinion_science_convention_good_time:0 "그럭저럭 잘된 과학협회"
 mem_opinion_science_convention_waste_of_time:0 "과학 협회는 시간낭비였다"
 mem_opinion_science_convention_scientist_dead:0 "끔찍한 과학 협회"
