l_korean:
 MEM_ALBINO_CRYSTAL_MEDIUM_SCALES:0 "알비노 수정 비늘"
 MEM_ALBINO_CRYSTAL_MEDIUM_ARMOR:0 "알비노 수정 내벽"
 MEM_ALBINO_CRYSTAL_LARGE_SHARD_THROWER:0 "알비노 수정 방사기"
 MEM_ALBINO_CRYSTAL_MEDIUM_SHARD_THROWER:0 "알비노 수정 방사기"
 mem_albino_crystal_ship:0 "거대한 수정 결정체"
 mem_albino_crystal_ship_plural:0 "거대한 수정 결정체"
 mem_albino_crystal_ship_child:0 "어린 수정 결정체"
 mem_albino_crystal_ship_child_plural:0 "어린 수정 결정체"
 mem_albino_crystal_will_become_hostile:0 "§Y수정 결정체§!가 §R적대적§!으로 변합니다!"
 mem_albino_crystal.1.name:0 "창백해보이는 소행성"
 mem_albino_crystal.1.desc:0 "[Root.GetName]는 [From.GetName]을 조사하는 동안 비정상적인 결정 형성을 관찰했다고 보고합니다. 초경질의 변색된 결정 구조가 소행성의 표면에서 확장되고 있습니다. 소행성의 중심에서는 설명할 수 없는 미세한 에너지 신호도 감지되었습니다."
 mem_albino_crystal.2.name:0 "수정 결정체 감지"
 mem_albino_crystal.2.desc:0 "우리는 §SCrystal Entity§!가 §Y[asteroids_star_system.GetName] 시스템§!에 접근하고 있음을 감지하고 있습니다.\n\n예상치 못하게, 그것은 적대적인 의도를 보이지 않지만, 실제로 읽을 수 있는 신호의 일종을 송신하고 있는 것 같습니다."
 mem_albino_crystal.2.ai:0 "나는 그저 멍청한 AI일 뿐이야, 이건 처리할 수 없어!\" # 이 선택지는 AI의 이익을 위해 대화를 건너뜁니다. 플레이어는 이를 볼 수 없습니다."
 mem_albino_crystal.3.name:0 "수정 결정체로부터의 통신"
 mem_albino_crystal.3.desc:0 "이것... 이-해한다?"
 mem_albino_crystal.3.a:0 "네가 보내는 신호를 받고 있으니... 아마도?"
 mem_albino_crystal.3.purifier:0 "혐오스러운 외계인아! 죽어라!"
 mem_albino_crystal.4.desc:0 "이것이... 자르고 있다. 자르는것-멈춰야한다! 그렇지 않으면-고통받을 것이다!\n\n§g결정체가 소행성 §Y[crystal_asteroid.GetName]§!(으)로 보이는 좌표를 신호로 보내고 있습니다."
 mem_albino_crystal.4.a:0 "당신은 우리가 채굴 작업을 중단하기를 원하십니까? 알겠습니다."
 mem_albino_crystal.4.a.response:0 "이것은-똑똑하다. 또-자르면 안된다."
 mem_albino_crystal.4.b:0 "네 요청을 들어주기 어렵군."
 mem_albino_crystal.4.b.phobe:0 "우리는 돌맹이 따위에게 명령받지 않는다!"
 mem_albino_crystal.4.b.response:0 "그러면-이것-고통받게 해준다! 이것-엄청-아플것이다!"
 mem_albino_crystal.5.desc:0 "§R거짓말! 거짓말!§!\n\n자르지 않는다-라고 했는데! 약속했는데! 하지만 다시-자른다. 이것! 고통받게 될-것이다!"
 mem_albino_crystal.5.a:0 "안됐군."
 mem_albino_crystal.5.b:0 "뭐? 우리가 뭘 약속했는데?"
 mem_albino_crystal.7.name:0 "백색 수정 부화"
 mem_albino_crystal.7.desc:0 "우리는 [From.solar_system.GetName] 항성계에서 비정상적인 활동을 관찰하고 있습니다. \n\n소행성 §Y[From.GetName]§!에 박혀 있는 결정들이 복잡한 구조로 형성되어 바위와 분리되었으며, 이제 스스로 움직일 수 있게 되었습니다. 우리는 새로운 결정체의 탄생을 목격하고 있는 것 같습니다."
 mem_albino_crystal.8.name:0 "백색 수정 부화"
 mem_albino_crystal.8.desc:0 "$mem_albino_crystal.7.desc$ \n\n전초 기지에서 발사한 일부 원거리 채굴 탐사선이 이 존재 안에 갇혀 있는 것 같습니다. 이를 통해 우리는 생물체와 원거리로 연결하여 그 행동에 영향을 미칠 수 있습니다. 모든 의도와 목적에 따라, 우리는 애완용 수정 하나를 얻은 것입니다."
 mem_albino_crystal.8.a:0 "흥미롭군. 계속 가지고 있자고."
 mem_albino_crystal.8.a.tooltip:0 "어린 §S알비노 수정§!이 해군에 합류합니다."
 mem_albino_crystal.8.b:0 "수정 파편으로 부숴버려."
 mem_albino_crystal.9.name:0 "$mem_albino_crystal.7.name$"
 mem_albino_crystal.9.desc:0 "$mem_albino_crystal.7.desc$"
 mem_albino_crystal.10.name:0 "애완 수정"
 mem_albino_crystal.10.desc:0 "우리의 통제 아래에서 백색 결정체가 태어난 지 꽤 시간이 지났습니다. 그 본질은 우리의 과학자들을 매료시키고 있으며, 인구 사이에서도 지지를 얻고 있습니다. \n\n이 생물에게 적절한 이름을 붙이자는 요청이 있었으며, 다양한 제안들이 제시되었습니다."
 mem_albino_crystal.10.a:0 "굳이 이름을 줄 필요가 있나."
 mem_albino_crystal.10.b:0 "못."
 mem_albino_crystal.10.c:0 "반짝이."
 mem_albino_crystal.10.d:0 "다이아몬드."
 mem_albino_crystal.10.e:0 "지르콘."
 mem_albino_crystal.10.f:0 "바위."
 mem_albino_crystal.10.g:0 "빛나."
 mem_albino_crystal.10.h:0 "뾰족이."
 mem_albino_crystal.10.i:0 "광휘."
 mem_albino_crystal.10.j:0 "번개."
 mem_albino_crystal.10.k:0 "흑요석."
 mem_albino_crystal.10.l:0 "실로."
 mem_albino_crystal.10.m:0 "크리스탈 맥크리스탈페이스."
 mem_albino_crystal.11.name:0 "[Root.GetName]이(가) 자람"
 mem_albino_crystal.11.desc:0 "우리의 애완 결정체는 지난 몇 년 동안 활발히 우주 먼지를 모으고 우주 방사선을 흡수해왔습니다. 어떻게 된 일인지, 이로 인해 몸이 기하급수적으로 성장했습니다. 공격력과 방어력 또한 새로운 크기에 맞게 증가했습니다."
 mem_albino_crystal.12.name:0 "원로 수정의 죽음"
 mem_albino_crystal.12.desc:0 "우리 군대가 [FromFrom.Solar_System.GetName] 항성계에서 거대한 §SAlbino Crystal§!과 교전하여 파괴했습니다. \n\n그 생물의 몸체는 수많은 작은 조각으로 부서졌으며, 이는 우리 산업에 유용할 것으로 보입니다."
 mem_albino_crystal.12.a:0 "정제를 위해 잔해를 모으도록."
 mem_albino_crystal_modifier_1:0 "수정 군집"
 mem_albino_crystal_modifier_1_desc:0 "변색된 수정 결정체가 이 소행성에서 자라고 있습니다."
 mem_albino_crystal_modifier_2:0 "수정 둥지"
 mem_albino_crystal_modifier_2_desc:0 "수정 결정체가 이 소행성에서 부화하고 그 흔적을 남기고 떠났습니다."
 mem_albino_crystal_patriarch_power:0 "크리스탈 파워"
